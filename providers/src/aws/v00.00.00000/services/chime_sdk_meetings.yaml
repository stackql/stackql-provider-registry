openapi: 3.0.0
info:
  version: "2021-07-15"
  title: Amazon Chime SDK Meetings
  description: Amazon Chime SDK Meetings
  x-serviceName: chime
  x-serviceAlias: chime_sdk_meetings
  x-protocol: rest-json
  x-apiVersion: "2021-07-15"
  x-endpointPrefix: meetings-chime
servers:
  - url: https://meetings-chime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chime-sdk-meetings
paths:
  /meetings/{meeting_id}/attendees?operation=batch-create:
    post:
      operationId: BatchCreateAttendee
      description: Creates up to 100 attendees for an active Amazon Chime SDK meeting. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK ID of the meeting to which you're adding attendees.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Attendees:
                  $ref: "#/components/schemas/CreateAttendeeRequestItemList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateAttendeeResponse"
  /meetings/{meeting_id}/attendees/capabilities?operation=batch-update-except:
    put:
      operationId: BatchUpdateAttendeeCapabilitiesExcept
      description: "Updates AttendeeCapabilities except the capabilities listed in an ExcludedAttendeeIds table. You use the capabilities with a set of values that control what the capabilities can do, such as SendReceive data. For more information about those values, see . When using capabilities, be aware of these corner cases: If you specify MeetingFeatures:Video:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Video will be rejected with ValidationError 400. If you specify MeetingFeatures:Content:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Content will be rejected with ValidationError 400. You can't set content capabilities to SendReceive or Receive unless you also set video capabilities to SendReceive or Receive. If you don't set the video capability to receive, the response will contain an HTTP 400 Bad Request status code. However, you can set your video capability to receive and you set your content capability to not receive. If meeting features is defined as Video:MaxResolution:None but Content:MaxResolution is defined as something other than None and attendee capabilities are not defined in the API request, then the default attendee video capability is set to Receive and attendee content capability is set to SendReceive. This is because content SendReceive requires video to be at least Receive. When you change an audio capability from None or Receive to Send or SendReceive , and if the attendee left their microphone unmuted, audio will flow from the attendee to the other meeting participants. When you change a video or content capability from None or Receive to Send or SendReceive , and if the attendee turned on their video or content streams, remote attendees can receive those streams, but only after media renegotiation between the client and the Amazon Chime back-end server."
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the meeting associated with the update request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ExcludedAttendeeIds:
                  $ref: "#/components/schemas/AttendeeIdsList"
                Capabilities:
                  $ref: "#/components/schemas/AttendeeCapabilities"
              required:
                - ExcludedAttendeeIds
                - Capabilities
      responses:
        "200":
          description: Success
  /meetings/{meeting_id}/attendees:
    post:
      operationId: CreateAttendee
      description: Creates a new attendee for an active Amazon Chime SDK meeting. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The unique ID of the meeting.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ExternalUserId:
                  $ref: "#/components/schemas/ExternalUserId"
                Capabilities:
                  $ref: "#/components/schemas/AttendeeCapabilities"
              required:
                - ExternalUserId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAttendeeResponse"
    get:
      operationId: ListAttendees
      description: Lists the attendees for the specified Amazon Chime SDK meeting. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttendeesResponse"
  /meetings:
    post:
      operationId: CreateMeeting
      description: "Creates a new Amazon Chime SDK meeting in the specified media Region with no initial attendees. For more information about specifying media Regions, see Available Regions and Using meeting Regions, both in the Amazon Chime SDK Developer Guide. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime SDK Developer Guide. If you use this API in conjuction with the and APIs, and you don't specify the MeetingFeatures.Content.MaxResolution or MeetingFeatures.Video.MaxResolution parameters, the following defaults are used: Content.MaxResolution: FHD Video.MaxResolution: HD"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                MediaRegion:
                  $ref: "#/components/schemas/MediaRegion"
                MeetingHostId:
                  $ref: "#/components/schemas/ExternalUserId"
                ExternalMeetingId:
                  $ref: "#/components/schemas/ExternalMeetingId"
                NotificationsConfiguration:
                  $ref: "#/components/schemas/NotificationsConfiguration"
                MeetingFeatures:
                  $ref: "#/components/schemas/MeetingFeaturesConfiguration"
                PrimaryMeetingId:
                  $ref: "#/components/schemas/PrimaryMeetingId"
                TenantIds:
                  $ref: "#/components/schemas/TenantIdList"
                Tags:
                  $ref: "#/components/schemas/TagList"
                MediaPlacementNetworkType:
                  $ref: "#/components/schemas/MediaPlacementNetworkType"
              required:
                - ClientRequestToken
                - MediaRegion
                - ExternalMeetingId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMeetingResponse"
  /meetings?operation=create-attendees:
    post:
      operationId: CreateMeetingWithAttendees
      description: "Creates a new Amazon Chime SDK meeting in the specified media Region, with attendees. For more information about specifying media Regions, see Available Regions and Using meeting Regions, both in the Amazon Chime SDK Developer Guide. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime SDK Developer Guide. If you use this API in conjuction with the and APIs, and you don't specify the MeetingFeatures.Content.MaxResolution or MeetingFeatures.Video.MaxResolution parameters, the following defaults are used: Content.MaxResolution: FHD Video.MaxResolution: HD"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                MediaRegion:
                  $ref: "#/components/schemas/MediaRegion"
                MeetingHostId:
                  $ref: "#/components/schemas/ExternalUserId"
                ExternalMeetingId:
                  $ref: "#/components/schemas/ExternalMeetingId"
                MeetingFeatures:
                  $ref: "#/components/schemas/MeetingFeaturesConfiguration"
                NotificationsConfiguration:
                  $ref: "#/components/schemas/NotificationsConfiguration"
                Attendees:
                  $ref: "#/components/schemas/CreateMeetingWithAttendeesRequestItemList"
                PrimaryMeetingId:
                  $ref: "#/components/schemas/PrimaryMeetingId"
                TenantIds:
                  $ref: "#/components/schemas/TenantIdList"
                Tags:
                  $ref: "#/components/schemas/TagList"
                MediaPlacementNetworkType:
                  $ref: "#/components/schemas/MediaPlacementNetworkType"
              required:
                - ClientRequestToken
                - MediaRegion
                - ExternalMeetingId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMeetingWithAttendeesResponse"
  /meetings/{meeting_id}/attendees/{attendee_id}:
    delete:
      operationId: DeleteAttendee
      description: Deletes an attendee from the specified Amazon Chime SDK meeting and deletes their JoinToken. Attendees are automatically deleted when a Amazon Chime SDK meeting is deleted. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
        - name: attendee_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK attendee ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetAttendee
      description: Gets the Amazon Chime SDK attendee details for a specified meeting ID and attendee ID. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
        - name: attendee_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK attendee ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAttendeeResponse"
  /meetings/{meeting_id}:
    delete:
      operationId: DeleteMeeting
      description: Deletes the specified Amazon Chime SDK meeting. The operation deletes all attendees, disconnects all clients, and prevents new clients from joining the meeting. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetMeeting
      description: Gets the Amazon Chime SDK meeting details for the specified meeting ID. For more information about the Amazon Chime SDK, see Using the Amazon Chime SDK in the Amazon Chime Developer Guide.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeetingResponse"
  /tags:
    get:
      operationId: ListTagsForResource
      description: Returns a list of the tags available for the specified resource.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /meetings/{meeting_id}/transcription?operation=start:
    post:
      operationId: StartMeetingTranscription
      description: Starts transcription for the specified meetingId. For more information, refer to Using Amazon Chime SDK live transcription in the Amazon Chime SDK Developer Guide. If you specify an invalid configuration, a TranscriptFailed event will be sent with the contents of the BadRequestException generated by Amazon Transcribe. For more information on each parameter and which combinations are valid, refer to the StartStreamTranscription API in the Amazon Transcribe Developer Guide. By default, Amazon Transcribe may use and store audio content processed by the service to develop and improve Amazon Web Services AI/ML services as further described in section 50 of the Amazon Web Services Service Terms. Using Amazon Transcribe may be subject to federal and state laws or regulations regarding the recording or interception of electronic communications. It is your and your end users’ responsibility to comply with all applicable laws regarding the recording, including properly notifying all participants in a recorded session or communication that the session or communication is being recorded, and obtaining all necessary consents. You can opt out from Amazon Web Services using audio content to develop and improve AWS AI/ML services by configuring an AI services opt out policy using Amazon Web Services Organizations.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The unique ID of the meeting being transcribed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TranscriptionConfiguration:
                  $ref: "#/components/schemas/TranscriptionConfiguration"
              required:
                - TranscriptionConfiguration
      responses:
        "200":
          description: Success
  /meetings/{meeting_id}/transcription?operation=stop:
    post:
      operationId: StopMeetingTranscription
      description: Stops transcription for the specified meetingId. For more information, refer to Using Amazon Chime SDK live transcription in the Amazon Chime SDK Developer Guide. By default, Amazon Transcribe may use and store audio content processed by the service to develop and improve Amazon Web Services AI/ML services as further described in section 50 of the Amazon Web Services Service Terms. Using Amazon Transcribe may be subject to federal and state laws or regulations regarding the recording or interception of electronic communications. It is your and your end users’ responsibility to comply with all applicable laws regarding the recording, including properly notifying all participants in a recorded session or communication that the session or communication is being recorded, and obtaining all necessary consents. You can opt out from Amazon Web Services using audio content to develop and improve Amazon Web Services AI/ML services by configuring an AI services opt out policy using Amazon Web Services Organizations.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The unique ID of the meeting for which you stop transcription.
      responses:
        "200":
          description: Success
  /tags?operation=tag-resource:
    post:
      operationId: TagResource
      description: The resource that supports tags.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /tags?operation=untag-resource:
    post:
      operationId: UntagResource
      description: "Removes the specified tags from the specified resources. When you specify a tag key, the action removes both that key and its associated value. The operation succeeds even if you attempt to remove tags from a resource that were already removed. Note the following: To remove tags from a resource, you need the necessary permissions for the service that the resource belongs to as well as permissions for removing tags. For more information, see the documentation for the service whose resource you want to untag. You can only tag resources that are located in the specified Amazon Web Services Region for the calling Amazon Web Services account. Minimum permissions In addition to the tag:UntagResources permission required by this operation, you must also have the remove tags permission defined by the service that created the resource. For example, to remove the tags from an Amazon EC2 instance using the UntagResources operation, you must have both of the following permissions: tag:UntagResource ChimeSDKMeetings:DeleteTags"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /meetings/{meeting_id}/attendees/{attendee_id}/capabilities:
    put:
      operationId: UpdateAttendeeCapabilities
      description: "The capabilities that you want to update. You use the capabilities with a set of values that control what the capabilities can do, such as SendReceive data. For more information about those values, see . When using capabilities, be aware of these corner cases: If you specify MeetingFeatures:Video:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Video will be rejected with ValidationError 400. If you specify MeetingFeatures:Content:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Content will be rejected with ValidationError 400. You can't set content capabilities to SendReceive or Receive unless you also set video capabilities to SendReceive or Receive. If you don't set the video capability to receive, the response will contain an HTTP 400 Bad Request status code. However, you can set your video capability to receive and you set your content capability to not receive. If meeting features is defined as Video:MaxResolution:None but Content:MaxResolution is defined as something other than None and attendee capabilities are not defined in the API request, then the default attendee video capability is set to Receive and attendee content capability is set to SendReceive. This is because content SendReceive requires video to be at least Receive. When you change an audio capability from None or Receive to Send or SendReceive , and if the attendee left their microphone unmuted, audio will flow from the attendee to the other meeting participants. When you change a video or content capability from None or Receive to Send or SendReceive , and if the attendee turned on their video or content streams, remote attendees can receive those streams, but only after media renegotiation between the client and the Amazon Chime back-end server."
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the meeting associated with the update request.
        - name: attendee_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The ID of the attendee associated with the update request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Capabilities:
                  $ref: "#/components/schemas/AttendeeCapabilities"
              required:
                - Capabilities
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAttendeeCapabilitiesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GuidString:
      type: string
      pattern: "[a-fA-F0-9]{8}(?:-[a-fA-F0-9]{4}){3}-[a-fA-F0-9]{12}"
    CreateAttendeeRequestItemList:
      type: array
      items:
        $ref: "#/components/schemas/CreateAttendeeRequestItem"
    CreateAttendeeRequestItem:
      description: The Amazon Chime SDK attendee fields to create, used with the BatchCreateAttendee action.
      type: object
      properties:
        ExternalUserId:
          $ref: "#/components/schemas/ExternalUserId"
          description: "The Amazon Chime SDK external user ID. An idempotency token. Links the attendee to an identity managed by a builder application. Pattern: [-_&@+=,(){}\\[\\]\\/«».:|'\"#a-zA-Z0-9À-ÿ\\s]* Values that begin with aws: are reserved. You can't configure a value that uses this prefix. Case insensitive."
        Capabilities:
          $ref: "#/components/schemas/AttendeeCapabilities"
          description: A list of one or more capabilities.
      required:
        - ExternalUserId
    ExternalUserId:
      type: string
      minLength: 2
      maxLength: 64
    AttendeeCapabilities:
      description: "The media capabilities of an attendee: audio, video, or content. You use the capabilities with a set of values that control what the capabilities can do, such as SendReceive data. For more information, refer to and . When using capabilities, be aware of these corner cases: If you specify MeetingFeatures:Video:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Video will be rejected with ValidationError 400. If you specify MeetingFeatures:Content:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Content will be rejected with ValidationError 400. You can't set content capabilities to SendReceive or Receive unless you also set video capabilities to SendReceive or Receive. If you don't set the video capability to receive, the response will contain an HTTP 400 Bad Request status code. However, you can set your video capability to receive and you set your content capability to not receive. If meeting features is defined as Video:MaxResolution:None but Content:MaxResolution is defined as something other than None and attendee capabilities are not defined in the API request, then the default attendee video capability is set to Receive and attendee content capability is set to SendReceive. This is because content SendReceive requires video to be at least Receive. When you change an audio capability from None or Receive to Send or SendReceive , and an attendee unmutes their microphone, audio flows from the attendee to the other meeting participants. When you change a video or content capability from None or Receive to Send or SendReceive , and the attendee turns on their video or content streams, remote attendees can receive those streams, but only after media renegotiation between the client and the Amazon Chime back-end server."
      type: object
      properties:
        Audio:
          $ref: "#/components/schemas/MediaCapabilities"
          description: The audio capability assigned to an attendee.
        Video:
          $ref: "#/components/schemas/MediaCapabilities"
          description: The video capability assigned to an attendee.
        Content:
          $ref: "#/components/schemas/MediaCapabilities"
          description: The content capability assigned to an attendee.
      required:
        - Audio
        - Video
        - Content
    MediaCapabilities:
      type: string
      enum:
        - SendReceive
        - Send
        - Receive
        - None
    BatchCreateAttendeeResponse:
      type: object
      properties:
        Attendees:
          $ref: "#/components/schemas/AttendeeList"
          description: The attendee information, including attendees' IDs and join tokens.
        Errors:
          $ref: "#/components/schemas/BatchCreateAttendeeErrorList"
          description: If the action fails for one or more of the attendees in the request, a list of the attendees is returned, along with error codes and error messages.
    AttendeeList:
      type: array
      items:
        $ref: "#/components/schemas/Attendee"
    Attendee:
      description: An Amazon Chime SDK meeting attendee. Includes a unique AttendeeId and JoinToken. The JoinToken allows a client to authenticate and join as the specified attendee. The JoinToken expires when the meeting ends, or when DeleteAttendee is called. After that, the attendee is unable to join the meeting. We recommend securely transferring each JoinToken from your server application to the client so that no other client has access to the token except for the one authorized to represent the attendee.
      type: object
      properties:
        ExternalUserId:
          $ref: "#/components/schemas/ExternalUserId"
          description: "The Amazon Chime SDK external user ID. An idempotency token. Links the attendee to an identity managed by a builder application. Pattern: [-_&@+=,(){}\\[\\]\\/«».:|'\"#a-zA-Z0-9À-ÿ\\s]* Values that begin with aws: are reserved. You can't configure a value that uses this prefix. Case insensitive."
        AttendeeId:
          $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK attendee ID.
        JoinToken:
          $ref: "#/components/schemas/JoinTokenString"
          description: The join token used by the Amazon Chime SDK attendee.
        Capabilities:
          $ref: "#/components/schemas/AttendeeCapabilities"
          description: "The capabilities assigned to an attendee: audio, video, or content. You use the capabilities with a set of values that control what the capabilities can do, such as SendReceive data. For more information about those values, see . When using capabilities, be aware of these corner cases: If you specify MeetingFeatures:Video:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Video will be rejected with ValidationError 400. If you specify MeetingFeatures:Content:MaxResolution:None when you create a meeting, all API requests that include SendReceive, Send, or Receive for AttendeeCapabilities:Content will be rejected with ValidationError 400. You can't set content capabilities to SendReceive or Receive unless you also set video capabilities to SendReceive or Receive. If you don't set the video capability to receive, the response will contain an HTTP 400 Bad Request status code. However, you can set your video capability to receive and you set your content capability to not receive. If meeting features is defined as Video:MaxResolution:None but Content:MaxResolution is defined as something other than None and attendee capabilities are not defined in the API request, then the default attendee video capability is set to Receive and attendee content capability is set to SendReceive. This is because content SendReceive requires video to be at least Receive. When you change an audio capability from None or Receive to Send or SendReceive , and if the attendee left their microphone unmuted, audio will flow from the attendee to the other meeting participants. When you change a video or content capability from None or Receive to Send or SendReceive , and if the attendee turned on their video or content streams, remote attendees can receive those streams, but only after media renegotiation between the client and the Amazon Chime back-end server."
    JoinTokenString:
      type: string
      minLength: 2
      maxLength: 2048
    BatchCreateAttendeeErrorList:
      type: array
      items:
        $ref: "#/components/schemas/CreateAttendeeError"
    CreateAttendeeError:
      description: The list of errors returned when errors are encountered during the BatchCreateAttendee and CreateAttendee actions. This includes external user IDs, error codes, and error messages.
      type: object
      properties:
        ExternalUserId:
          $ref: "#/components/schemas/ExternalUserId"
          description: "The Amazon Chime SDK external user ID. An idempotency token. Links the attendee to an identity managed by a builder application. Pattern: [-_&@+=,(){}\\[\\]\\/«».:|'\"#a-zA-Z0-9À-ÿ\\s]* Values that begin with aws: are reserved. You can't configure a value that uses this prefix. Case insensitive."
        ErrorCode:
          $ref: "#/components/schemas/String"
          description: The error code.
        ErrorMessage:
          $ref: "#/components/schemas/String"
