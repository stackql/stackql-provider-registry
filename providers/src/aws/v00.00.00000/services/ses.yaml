          schema:
            $ref: "#/components/schemas/MessageTagList"
        - name: ConfigurationSetName
          in: query
          required: false
          description: The name of the configuration set to use when you send an email using SendRawEmail.
          schema:
            $ref: "#/components/schemas/ConfigurationSetName"
