  /?Action=CreateConfigurationSetTrackingOptions&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateConfigurationSetTrackingOptions
      description: Creates an association between a configuration set and a custom domain for open and click event tracking. By default, images and links used for tracking open and click events are hosted on domains operated by Amazon SES. You can configure a subdomain of your own to handle these events. For information about using custom domains, see the Amazon SES Developer Guide.
      parameters:
        - name: ConfigurationSetName
          in: query
          required: true
          description: The name of the configuration set that the tracking options should be associated with.
          schema:
            $ref: "#/components/schemas/ConfigurationSetName"
        - name: TrackingOptions
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TrackingOptions"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateConfigurationSetTrackingOptionsOutputDisplay"
    post:
      operationId: POST_CreateConfigurationSetTrackingOptions
      description: Creates an association between a configuration set and a custom domain for open and click event tracking. By default, images and links used for tracking open and click events are hosted on domains operated by Amazon SES. You can configure a subdomain of your own to handle these events. For information about using custom domains, see the Amazon SES Developer Guide.
      responses:
