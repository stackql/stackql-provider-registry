  /?Action=CreateConfigurationSetEventDestination&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateConfigurationSetEventDestination
      description: Creates a configuration set event destination. When you create or update an event destination, you must provide one, and only one, destination. The destination can be CloudWatch, Amazon Kinesis Firehose, or Amazon Simple Notification Service (Amazon SNS). An event destination is the Amazon Web Services service to which Amazon SES publishes the email sending events associated with a configuration set. For information about using configuration sets, see the Amazon SES Developer Guide. You can execute this operation no more than once per second.
      parameters:
        - name: ConfigurationSetName
          in: query
          required: true
          description: The name of the configuration set that the event destination should be associated with.
          schema:
            $ref: "#/components/schemas/ConfigurationSetName"
        - name: EventDestination
          in: query
          required: true
          description: An object that describes the Amazon Web Services service that email sending event where information is published.
          schema:
            $ref: "#/components/schemas/EventDestination"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateConfigurationSetEventDestinationOutputDisplay"
    post:
      operationId: POST_CreateConfigurationSetEventDestination
      description: Creates a configuration set event destination. When you create or update an event destination, you must provide one, and only one, destination. The destination can be CloudWatch, Amazon Kinesis Firehose, or Amazon Simple Notification Service (Amazon SNS). An event destination is the Amazon Web Services service to which Amazon SES publishes the email sending events associated with a configuration set. For information about using configuration sets, see the Amazon SES Developer Guide. You can execute this operation no more than once per second.
      responses:
