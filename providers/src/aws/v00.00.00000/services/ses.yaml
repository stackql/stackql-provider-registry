      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: The name of the receipt rule set to make active. Setting this value to null disables all email receiving.
    SetIdentityDkimEnabledResponseDisplay:
