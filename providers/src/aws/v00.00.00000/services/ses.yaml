    DimensionValueSource:
      type: string
      enum:
        - messageTag
        - emailHeader
        - linkTag
    DefaultDimensionValue:
      type: string
    SNSDestination:
      description: Contains the topic ARN associated with an Amazon Simple Notification Service (Amazon SNS) event destination. Event destinations, such as Amazon SNS, are associated with configuration sets, which enable you to publish email sending events. For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        TopicARN:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the Amazon SNS topic for email sending events. You can find the ARN of a topic by using the ListTopics Amazon SNS operation. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
