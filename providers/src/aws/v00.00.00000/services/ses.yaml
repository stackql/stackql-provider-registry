    VerifyDomainDkimResponseDisplay:
      type: object
      properties:
        DkimTokens:
          type: string
          description: A set of character strings that represent the domain's identity. If the identity is an email address, the tokens represent the domain of that address. Using these tokens, you need to create DNS CNAME records that point to DKIM public keys that are hosted by Amazon SES. Amazon Web Services eventually detects that you've updated your DNS records. This detection process might take up to 72 hours. After successful detection, Amazon SES is able to DKIM-sign email originating from that domain. (This only applies to domain identities, not email address identities.) For more information about creating DNS records using DKIM tokens, see the Amazon SES Developer Guide.
    VerifyDomainDkimOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/VerifyDomainDkimResponseDisplay"
    VerifyDomainDkimRequest:
      description: Represents a request to generate the CNAME records needed to set up Easy DKIM with Amazon SES. For more information about setting up Easy DKIM, see the Amazon SES Developer Guide.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/Domain"
          description: The name of the domain to be verified for Easy DKIM signing.
      required:
        - Domain
    VerifyDomainIdentityResponseDisplay:
      type: object
      properties:
        VerificationToken:
          type: string
          description: A TXT record that you must place in the DNS settings of the domain to complete domain verification with Amazon SES. As Amazon SES searches for the TXT record, the domain's verification status is "Pending". When Amazon SES detects the record, the domain's verification status changes to "Success". If Amazon SES is unable to detect the record within 72 hours, the domain's verification status changes to "Failed." In that case, to verify the domain, you must restart the verification process from the beginning. The domain's verification status also changes to "Success" when it is DKIM verified.
    VerifyDomainIdentityOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/VerifyDomainIdentityResponseDisplay"
    VerifyDomainIdentityRequest:
      description: Represents a request to begin Amazon SES domain verification and to generate the TXT records that you must publish to the DNS server of your domain to complete the verification. For information about domain verification, see the Amazon SES Developer Guide.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/Domain"
          description: The domain to be verified.
      required:
        - Domain
    VerifyEmailAddressRequest:
      description: Represents a request to begin email address verification with Amazon SES. For information about email address verification, see the Amazon SES Developer Guide.
      type: object
      properties:
        EmailAddress:
          $ref: "#/components/schemas/Address"
          description: The email address to be verified.
      required:
        - EmailAddress
    VerifyEmailIdentityResponseDisplay:
      type: object
      properties: {}
    VerifyEmailIdentityOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/VerifyEmailIdentityResponseDisplay"
    VerifyEmailIdentityRequest:
      description: Represents a request to begin email address verification with Amazon SES. For information about email address verification, see the Amazon SES Developer Guide.
      type: object
      properties:
        EmailAddress:
          $ref: "#/components/schemas/Address"
          description: The email address to be verified.
      required:
        - EmailAddress
