    SetIdentityDkimEnabledOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SetIdentityDkimEnabledResponseDisplay"
    SetIdentityDkimEnabledRequest:
      description: Represents a request to enable or disable Amazon SES Easy DKIM signing for an identity. For more information about setting up Easy DKIM, see the Amazon SES Developer Guide.
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: The identity for which DKIM signing should be enabled or disabled.
        DkimEnabled:
          $ref: "#/components/schemas/Enabled"
          description: Sets whether DKIM signing is enabled for an identity. Set to true to enable DKIM signing for this identity; false to disable it.
      required:
        - Identity
        - DkimEnabled
    SetIdentityFeedbackForwardingEnabledResponseDisplay:
      type: object
      properties: {}
    SetIdentityFeedbackForwardingEnabledOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SetIdentityFeedbackForwardingEnabledResponseDisplay"
    SetIdentityFeedbackForwardingEnabledRequest:
      description: Represents a request to enable or disable whether Amazon SES forwards you bounce and complaint notifications through email. For information about email feedback forwarding, see the Amazon SES Developer Guide.
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: "The identity for which to set bounce and complaint notification forwarding. Examples: user@example.com, example.com."
        ForwardingEnabled:
          $ref: "#/components/schemas/Enabled"
          description: Sets whether Amazon SES forwards bounce and complaint notifications as email. true specifies that Amazon SES forwards bounce and complaint notifications as email, in addition to any Amazon SNS topic publishing otherwise specified. false specifies that Amazon SES publishes bounce and complaint notifications only through Amazon SNS. This value can only be set to false when Amazon SNS topics are set for both Bounce and Complaint notification types.
      required:
        - Identity
        - ForwardingEnabled
    NotificationType:
      type: string
      enum:
        - Bounce
        - Complaint
        - Delivery
    SetIdentityHeadersInNotificationsEnabledResponseDisplay:
      type: object
      properties: {}
    SetIdentityHeadersInNotificationsEnabledOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SetIdentityHeadersInNotificationsEnabledResponseDisplay"
    SetIdentityHeadersInNotificationsEnabledRequest:
      description: Represents a request to set whether Amazon SES includes the original email headers in the Amazon SNS notifications of a specified type. For information about notifications, see the Amazon SES Developer Guide.
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: "The identity for which to enable or disable headers in notifications. Examples: user@example.com, example.com."
        NotificationType:
          $ref: "#/components/schemas/NotificationType"
          description: The notification type for which to enable or disable headers in notifications.
        Enabled:
          $ref: "#/components/schemas/Enabled"
          description: Sets whether Amazon SES includes the original email headers in Amazon SNS notifications of the specified notification type. A value of true specifies that Amazon SES includes headers in notifications, and a value of false specifies that Amazon SES does not include headers in notifications. This value can only be set when NotificationType is already set to use a particular Amazon SNS topic.
      required:
        - Identity
        - NotificationType
        - Enabled
    MailFromDomainName:
      type: string
    BehaviorOnMXFailure:
      type: string
      enum:
        - UseDefaultValue
        - RejectMessage
    SetIdentityMailFromDomainResponseDisplay:
      type: object
      properties: {}
    SetIdentityMailFromDomainOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SetIdentityMailFromDomainResponseDisplay"
    SetIdentityMailFromDomainRequest:
      description: Represents a request to enable or disable the Amazon SES custom MAIL FROM domain setup for a verified identity. For information about using a custom MAIL FROM domain, see the Amazon SES Developer Guide.
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: The verified identity.
        MailFromDomain:
          $ref: "#/components/schemas/MailFromDomainName"
          description: The custom MAIL FROM domain for the verified identity to use. The MAIL FROM domain must 1) be a subdomain of the verified identity, 2) not be used in a "From" address if the MAIL FROM domain is the destination of email feedback forwarding (for more information, see the Amazon SES Developer Guide), and 3) not be used to receive emails. A value of null disables the custom MAIL FROM setting for the identity.
        BehaviorOnMXFailure:
          $ref: "#/components/schemas/BehaviorOnMXFailure"
          description: The action for Amazon SES to take if it cannot successfully read the required MX record when you send an email. If you choose UseDefaultValue, Amazon SES uses amazonses.com (or a subdomain of that) as the MAIL FROM domain. If you choose RejectMessage, Amazon SES returns a MailFromDomainNotVerified error and not send the email. The action specified in BehaviorOnMXFailure is taken when the custom MAIL FROM domain setup is in the Pending, Failed, and TemporaryFailure states.
      required:
        - Identity
    NotificationTopic:
      type: string
    SetIdentityNotificationTopicResponseDisplay:
      type: object
      properties: {}
    SetIdentityNotificationTopicOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SetIdentityNotificationTopicResponseDisplay"
    SetIdentityNotificationTopicRequest:
      description: Represents a request to specify the Amazon SNS topic to which Amazon SES publishes bounce, complaint, or delivery notifications for emails sent with that identity as the source. For information about Amazon SES notifications, see the Amazon SES Developer Guide.
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: "The identity (email address or domain) for the Amazon SNS topic. You can only specify a verified identity for this parameter. You can specify an identity by using its name or by using its Amazon Resource Name (ARN). The following examples are all valid identities: sender@example.com, example.com, arn:aws:ses:us-east-1:123456789012:identity/example.com."
        NotificationType:
          $ref: "#/components/schemas/NotificationType"
          description: The type of notifications that are published to the specified Amazon SNS topic.
        SnsTopic:
          $ref: "#/components/schemas/NotificationTopic"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic. If the parameter is omitted from the request or a null value is passed, SnsTopic is cleared and publishing is disabled.
      required:
        - Identity
        - NotificationType
