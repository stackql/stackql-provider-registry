        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CloneReceiptRuleSetResponseDisplay"
    CloneReceiptRuleSetRequest:
      description: Represents a request to create a receipt rule set by cloning an existing one. You use receipt rule sets to receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: "The name of the rule set to create. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). Start and end with a letter or number. Contain 64 characters or fewer."
        OriginalRuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: The name of the rule set to clone.
      required:
        - RuleSetName
        - OriginalRuleSetName
    ConfigurationSet:
      description: The name of the configuration set. Configuration sets let you create groups of rules that you can apply to the emails you send using Amazon SES. For more information about using configuration sets, see Using Amazon SES Configuration Sets in the Amazon SES Developer Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ConfigurationSetName"
          description: "The name of the configuration set. The name must meet the following requirements: Contain only letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). Contain 64 characters or fewer."
      required:
        - Name
    ConfigurationSetName:
      type: string
    CreateConfigurationSetResponseDisplay:
      type: object
      properties: {}
    CreateConfigurationSetOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateConfigurationSetResponseDisplay"
    CreateConfigurationSetRequest:
      description: Represents a request to create a configuration set. Configuration sets enable you to publish email sending events. For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        ConfigurationSet:
          $ref: "#/components/schemas/ConfigurationSet"
          description: A data structure that contains the name of the configuration set.
      required:
        - ConfigurationSet
    EventDestination:
      description: Contains information about an event destination. When you create or update an event destination, you must provide one, and only one, destination. The destination can be Amazon CloudWatch, Amazon Kinesis Firehose or Amazon Simple Notification Service (Amazon SNS). Event destinations are associated with configuration sets, which enable you to publish email sending events to Amazon CloudWatch, Amazon Kinesis Firehose, or Amazon Simple Notification Service (Amazon SNS). For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EventDestinationName"
          description: "The name of the event destination. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). Contain 64 characters or fewer."
        Enabled:
          $ref: "#/components/schemas/Enabled"
          description: Sets whether Amazon SES publishes events to this destination when you send an email with the associated configuration set. Set to true to enable publishing to this destination; set to false to prevent publishing to this destination. The default value is false.
        MatchingEventTypes:
          $ref: "#/components/schemas/EventTypes"
          description: The type of email sending events to publish to the event destination. send - The call was successful and Amazon SES is attempting to deliver the email. reject - Amazon SES determined that the email contained a virus and rejected it. bounce - The recipient's mail server permanently rejected the email. This corresponds to a hard bounce. complaint - The recipient marked the email as spam. delivery - Amazon SES successfully delivered the email to the recipient's mail server. open - The recipient received the email and opened it in their email client. click - The recipient clicked one or more links in the email. renderingFailure - Amazon SES did not send the email because of a template rendering issue.
        KinesisFirehoseDestination:
          $ref: "#/components/schemas/KinesisFirehoseDestination"
          description: An object that contains the delivery stream ARN and the IAM role ARN associated with an Amazon Kinesis Firehose event destination.
        CloudWatchDestination:
          $ref: "#/components/schemas/CloudWatchDestination"
          description: An object that contains the names, default values, and sources of the dimensions associated with an Amazon CloudWatch event destination.
        SNSDestination:
          $ref: "#/components/schemas/SNSDestination"
          description: An object that contains the topic ARN associated with an Amazon Simple Notification Service (Amazon SNS) event destination.
      required:
        - Name
        - MatchingEventTypes
    EventDestinationName:
      type: string
    Enabled:
      type: boolean
    EventTypes:
      type: array
      items:
        $ref: "#/components/schemas/EventType"
    EventType:
      type: string
      enum:
        - send
        - reject
        - bounce
        - complaint
        - delivery
        - open
        - click
        - renderingFailure
    KinesisFirehoseDestination:
      description: Contains the delivery stream ARN and the IAM role ARN associated with an Amazon Kinesis Firehose event destination. Event destinations, such as Amazon Kinesis Firehose, are associated with configuration sets, which enable you to publish email sending events. For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        IAMRoleARN:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the IAM role under which Amazon SES publishes email sending events to the Amazon Kinesis Firehose stream.
        DeliveryStreamARN:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the Amazon Kinesis Firehose stream that email sending events should be published to.
      required:
        - IAMRoleARN
        - DeliveryStreamARN
    AmazonResourceName:
      type: string
    CloudWatchDestination:
      description: Contains information associated with an Amazon CloudWatch event destination to which email sending events are published. Event destinations, such as Amazon CloudWatch, are associated with configuration sets, which enable you to publish email sending events. For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        DimensionConfigurations:
          $ref: "#/components/schemas/CloudWatchDimensionConfigurations"
          description: A list of dimensions upon which to categorize your emails when you publish email sending events to Amazon CloudWatch.
      required:
        - DimensionConfigurations
    CloudWatchDimensionConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchDimensionConfiguration"
    CloudWatchDimensionConfiguration:
      description: Contains the dimension configuration to use when you publish email sending events to Amazon CloudWatch. For information about publishing email sending events to Amazon CloudWatch, see the Amazon SES Developer Guide.
      type: object
      properties:
        DimensionName:
          $ref: "#/components/schemas/DimensionName"
          description: "The name of an Amazon CloudWatch dimension associated with an email sending metric. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), dashes (-), or colons (:). Contain 256 characters or fewer."
        DimensionValueSource:
          $ref: "#/components/schemas/DimensionValueSource"
          description: The place where Amazon SES finds the value of a dimension to publish to Amazon CloudWatch. To use the message tags that you specify using an X-SES-MESSAGE-TAGS header or a parameter to the SendEmail/SendRawEmail API, specify messageTag. To use your own email headers, specify emailHeader. To put a custom tag on any link included in your email, specify linkTag.
        DefaultDimensionValue:
          $ref: "#/components/schemas/DefaultDimensionValue"
          description: "The default value of the dimension that is published to Amazon CloudWatch if you do not provide the value of the dimension when you send an email. The default value must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), dashes (-), at signs (@), or periods (.). Contain 256 characters or fewer."
      required:
        - DimensionName
        - DimensionValueSource
        - DefaultDimensionValue
