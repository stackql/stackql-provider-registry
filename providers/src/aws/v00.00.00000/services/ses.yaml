      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/Destination"
        ReplacementTags:
          $ref: "#/components/schemas/MessageTagList"
          description: A list of tags, in the form of name/value pairs, to apply to an email that you send using SendBulkTemplatedEmail. Tags correspond to characteristics of the email that you define, so that you can publish email sending events.
        ReplacementTemplateData:
