        BounceType:
          $ref: "#/components/schemas/BounceType"
          description: The reason for the bounce. You must provide either this parameter or RecipientDsnFields.
        RecipientDsnFields:
          $ref: "#/components/schemas/RecipientDsnFields"
          description: Recipient-related DSN fields, most of which would normally be filled in automatically when provided with a BounceType. You must provide either this parameter or BounceType.
      required:
        - Recipient
    BounceType:
      type: string
      enum:
        - DoesNotExist
        - MessageTooLarge
        - ExceededQuota
        - ContentRejected
        - Undefined
        - TemporaryFailure
    RecipientDsnFields:
      description: Recipient-related information to include in the Delivery Status Notification (DSN) when an email that Amazon SES receives on your behalf bounces. For information about receiving email through Amazon SES, see the Amazon SES Developer Guide.
      type: object
      properties:
        FinalRecipient:
          $ref: "#/components/schemas/Address"
          description: The email address that the message was ultimately delivered to. This corresponds to the Final-Recipient in the DSN. If not specified, FinalRecipient is set to the Recipient specified in the BouncedRecipientInfo structure. Either FinalRecipient or the recipient in BouncedRecipientInfo must be a recipient of the original bounced message. Do not prepend the FinalRecipient email address with rfc 822;, as described in RFC 3798.
        Action:
          $ref: "#/components/schemas/DsnAction"
          description: The action performed by the reporting mail transfer agent (MTA) as a result of its attempt to deliver the message to the recipient address. This is required by RFC 3464.
        RemoteMta:
          $ref: "#/components/schemas/RemoteMta"
          description: The MTA to which the remote MTA attempted to deliver the message, formatted as specified in RFC 3464 (mta-name-type; mta-name). This parameter typically applies only to propagating synchronous bounces.
        Status:
          $ref: "#/components/schemas/DsnStatus"
          description: The status code that indicates what went wrong. This is required by RFC 3464.
        DiagnosticCode:
          $ref: "#/components/schemas/DiagnosticCode"
          description: An extended explanation of what went wrong; this is usually an SMTP response. See RFC 3463 for the correct formatting of this parameter.
        LastAttemptDate:
          $ref: "#/components/schemas/LastAttemptDate"
          description: The time the final delivery attempt was made, in RFC 822 date-time format.
        ExtensionFields:
          $ref: "#/components/schemas/ExtensionFieldList"
          description: Additional X-headers to include in the DSN.
      required:
        - Action
        - Status
    DsnAction:
      type: string
      enum:
        - failed
        - delayed
        - delivered
        - relayed
        - expanded
    RemoteMta:
      type: string
    DsnStatus:
      type: string
    DiagnosticCode:
      type: string
    LastAttemptDate:
      type: string
      format: date-time
    SendBounceResponseDisplay:
