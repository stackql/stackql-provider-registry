openapi: 3.0.0
info:
  version: "2010-12-01"
  title: Amazon Simple Email Service
  description: Amazon Simple Email Service
  x-serviceName: ses
  x-serviceAlias: ses
  x-protocol: query
  x-apiVersion: "2010-12-01"
  x-endpointPrefix: email
servers:
  - url: https://email.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ses
paths:
  /?Action=CloneReceiptRuleSet&Version=2010-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CloneReceiptRuleSet
      description: Creates a receipt rule set by cloning an existing one. All receipt rules and configurations are copied to the new receipt rule set and are completely independent of the source rule set. For information about setting up rule sets, see the Amazon SES Developer Guide. You can execute this operation no more than once per second.
      parameters:
        - name: RuleSetName
          in: query
          required: true
          description: "The name of the rule set to create. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). Start and end with a letter or number. Contain 64 characters or fewer."
          schema:
            $ref: "#/components/schemas/ReceiptRuleSetName"
        - name: OriginalRuleSetName
          in: query
          required: true
          description: The name of the rule set to clone.
          schema:
            $ref: "#/components/schemas/ReceiptRuleSetName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CloneReceiptRuleSetOutputDisplay"
    post:
      operationId: POST_CloneReceiptRuleSet
      description: Creates a receipt rule set by cloning an existing one. All receipt rules and configurations are copied to the new receipt rule set and are completely independent of the source rule set. For information about setting up rule sets, see the Amazon SES Developer Guide. You can execute this operation no more than once per second.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CloneReceiptRuleSetOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CloneReceiptRuleSetRequest"
