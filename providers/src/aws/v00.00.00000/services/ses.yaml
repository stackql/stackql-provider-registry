        DefaultTags:
          $ref: "#/components/schemas/MessageTagList"
          description: A list of tags, in the form of name/value pairs, to apply to an email that you send to a destination using SendBulkTemplatedEmail.
        Template:
          $ref: "#/components/schemas/TemplateName"
          description: The template to use when sending this email.
        TemplateArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the template to use when sending this email.
        DefaultTemplateData:
          $ref: "#/components/schemas/TemplateData"
          description: A list of replacement values to apply to the template when replacement data is not specified in a Destination object. These values act as a default or fallback option when no other data is available. The template data is a JSON object, typically consisting of key-value pairs in which the keys correspond to replacement tags in the email template.
        Destinations:
          $ref: "#/components/schemas/BulkEmailDestinationList"
          description: One or more Destination objects. All of the recipients in a Destination receive the same version of the email. You can specify up to 50 Destination objects within a Destinations array.
      required:
