    DeleteReceiptRuleResponseDisplay:
      type: object
      properties: {}
    DeleteReceiptRuleOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteReceiptRuleResponseDisplay"
    DeleteReceiptRuleRequest:
      description: Represents a request to delete a receipt rule. You use receipt rules to receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: The name of the receipt rule set that contains the receipt rule to delete.
        RuleName:
          $ref: "#/components/schemas/ReceiptRuleName"
          description: The name of the receipt rule to delete.
      required:
        - RuleSetName
        - RuleName
    DeleteReceiptRuleSetResponseDisplay:
      type: object
      properties: {}
    DeleteReceiptRuleSetOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteReceiptRuleSetResponseDisplay"
    DeleteReceiptRuleSetRequest:
      description: Represents a request to delete a receipt rule set and all of the receipt rules it contains. You use receipt rule sets to receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: The name of the receipt rule set to delete.
      required:
        - RuleSetName
    DeleteTemplateResponseDisplay:
      type: object
      properties: {}
    DeleteTemplateOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteTemplateResponseDisplay"
    DeleteTemplateRequest:
      description: Represents a request to delete an email template. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        TemplateName:
          $ref: "#/components/schemas/TemplateName"
          description: The name of the template to be deleted.
      required:
        - TemplateName
    DeleteVerifiedEmailAddressRequest:
      description: Represents a request to delete an email address from the list of email addresses you have attempted to verify under your Amazon Web Services account.
      type: object
      properties:
        EmailAddress:
          $ref: "#/components/schemas/Address"
          description: An email address to be removed from the list of verified addresses.
      required:
        - EmailAddress
    ReceiptRuleDisplay:
      type: object
      properties:
        Name:
          type: string
          description: "The name of the receipt rule. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), dashes (-), or periods (.). Start and end with a letter or number. Contain 64 characters or fewer."
        Enabled:
