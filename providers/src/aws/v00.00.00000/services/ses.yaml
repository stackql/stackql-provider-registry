        - Allow
    Cidr:
      type: string
    CreateReceiptFilterResponseDisplay:
      type: object
      properties: {}
    CreateReceiptFilterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateReceiptFilterResponseDisplay"
    CreateReceiptFilterRequest:
      description: Represents a request to create a new IP address filter. You use IP address filters when you receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        Filter:
          $ref: "#/components/schemas/ReceiptFilter"
          description: A data structure that describes the IP address filter to create, which consists of a name, an IP address range, and whether to allow or block mail from it.
      required:
        - Filter
    ReceiptRuleName:
      type: string
    ReceiptRule:
      description: Receipt rules enable you to specify which actions Amazon SES should take when it receives mail on behalf of one or more email addresses or domains that you own. Each receipt rule defines a set of email addresses or domains that it applies to. If the email addresses or domains match at least one recipient address of the message, Amazon SES executes all of the receipt rule's actions on the message. For information about setting up receipt rules, see the Amazon SES Developer Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ReceiptRuleName"
          description: "The name of the receipt rule. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), dashes (-), or periods (.). Start and end with a letter or number. Contain 64 characters or fewer."
        Enabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, the receipt rule is active. The default value is false.
        TlsPolicy:
          $ref: "#/components/schemas/TlsPolicy"
          description: Specifies whether Amazon SES should require that incoming email is delivered over a connection encrypted with Transport Layer Security (TLS). If this parameter is set to Require, Amazon SES bounces emails that are not received over TLS. The default is Optional.
        Recipients:
          $ref: "#/components/schemas/RecipientsList"
          description: The recipient domains and email addresses that the receipt rule applies to. If this field is not specified, this rule matches all recipients on all verified domains.
        Actions:
          $ref: "#/components/schemas/ReceiptActionsList"
          description: An ordered list of actions to perform on messages that match at least one of the recipient email addresses or domains specified in the receipt rule.
        ScanEnabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, then messages that this receipt rule applies to are scanned for spam and viruses. The default value is false.
      required:
        - Name
    TlsPolicy:
      type: string
      enum:
        - Require
        - Optional
    RecipientsList:
      type: array
      items:
        $ref: "#/components/schemas/Recipient"
    Recipient:
      type: string
    ReceiptActionsList:
      type: array
      items:
        $ref: "#/components/schemas/ReceiptAction"
    ReceiptAction:
      description: An action that Amazon SES can take when it receives an email on behalf of one or more email addresses or domains that you own. An instance of this data type can represent only one action. For information about setting up receipt rules, see the Amazon SES Developer Guide.
      type: object
      properties:
        S3Action:
          $ref: "#/components/schemas/S3Action"
          description: Saves the received message to an Amazon Simple Storage Service (Amazon S3) bucket and, optionally, publishes a notification to Amazon SNS.
        BounceAction:
          $ref: "#/components/schemas/BounceAction"
          description: Rejects the received email by returning a bounce response to the sender and, optionally, publishes a notification to Amazon Simple Notification Service (Amazon SNS).
        WorkmailAction:
          $ref: "#/components/schemas/WorkmailAction"
          description: Calls Amazon WorkMail and, optionally, publishes a notification to Amazon Amazon SNS.
        LambdaAction:
          $ref: "#/components/schemas/LambdaAction"
          description: Calls an Amazon Web Services Lambda function, and optionally, publishes a notification to Amazon SNS.
        StopAction:
          $ref: "#/components/schemas/StopAction"
          description: Terminates the evaluation of the receipt rule set and optionally publishes a notification to Amazon SNS.
        AddHeaderAction:
          $ref: "#/components/schemas/AddHeaderAction"
          description: Adds a header to the received email.
        SNSAction:
          $ref: "#/components/schemas/SNSAction"
          description: Publishes the email content within a notification to Amazon SNS.
        ConnectAction:
          $ref: "#/components/schemas/ConnectAction"
          description: Parses the received message and starts an email contact in Amazon Connect on your behalf.
    S3Action:
      description: When included in a receipt rule, this action saves the received message to an Amazon Simple Storage Service (Amazon S3) bucket and, optionally, publishes a notification to Amazon Simple Notification Service (Amazon SNS). To enable Amazon SES to write emails to your Amazon S3 bucket, use an Amazon Web Services KMS key to encrypt your emails, or publish to an Amazon SNS topic of another account, Amazon SES must have permission to access those resources. For information about granting permissions, see the Amazon SES Developer Guide. When you save your emails to an Amazon S3 bucket, the maximum email size (including headers) is 40 MB. Emails larger than that bounces. For information about specifying Amazon S3 actions in receipt rules, see the Amazon SES Developer Guide.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the Amazon SNS topic to notify when the message is saved to the Amazon S3 bucket. You can find the ARN of a topic by using the ListTopics operation in Amazon SNS. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
        BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the Amazon S3 bucket for incoming email.
        ObjectKeyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: The key prefix of the Amazon S3 bucket. The key prefix is similar to a directory name that enables you to store similar data under the same directory in a bucket.
        KmsKeyArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: "The customer managed key that Amazon SES should use to encrypt your emails before saving them to the Amazon S3 bucket. You can use the Amazon Web Services managed key or a customer managed key that you created in Amazon Web Services KMS as follows: To use the Amazon Web Services managed key, provide an ARN in the form of arn:aws:kms:REGION:ACCOUNT-ID-WITHOUT-HYPHENS:alias/aws/ses. For example, if your Amazon Web Services account ID is 123456789012 and you want to use the Amazon Web Services managed key in the US West (Oregon) Region, the ARN of the Amazon Web Services managed key would be arn:aws:kms:us-west-2:123456789012:alias/aws/ses. If you use the Amazon Web Services managed key, you don't need to perform any extra steps to give Amazon SES permission to use the key. To use a customer managed key that you created in Amazon Web Services KMS, provide the ARN of the customer managed key and ensure that you add a statement to your key's policy to give Amazon SES permission to use it. For more information about giving permissions, see the Amazon SES Developer Guide. For more information about key policies, see the Amazon Web Services KMS Developer Guide. If you do not specify an Amazon Web Services KMS key, Amazon SES does not encrypt your emails. Your mail is encrypted by Amazon SES using the Amazon S3 encryption client before the mail is submitted to Amazon S3 for storage. It is not encrypted using Amazon S3 server-side encryption. This means that you must use the Amazon S3 encryption client to decrypt the email after retrieving it from Amazon S3, as the service has no access to use your Amazon Web Services KMS keys for decryption. This encryption client is currently available with the Amazon Web Services SDK for Java and Amazon Web Services SDK for Ruby only. For more information about client-side encryption using Amazon Web Services KMS managed keys, see the Amazon S3 Developer Guide."
        IamRoleArn:
          $ref: "#/components/schemas/IAMRoleARN"
          description: "The ARN of the IAM role to be used by Amazon Simple Email Service while writing to the Amazon S3 bucket, optionally encrypting your mail via the provided customer managed key, and publishing to the Amazon SNS topic. This role should have access to the following APIs: s3:PutObject, kms:Encrypt and kms:GenerateDataKey for the given Amazon S3 bucket. kms:GenerateDataKey for the given Amazon Web Services KMS customer managed key. sns:Publish for the given Amazon SNS topic. If an IAM role ARN is provided, the role (and only the role) is used to access all the given resources (Amazon S3 bucket, Amazon Web Services KMS customer managed key and Amazon SNS topic). Therefore, setting up individual resource access permissions is not required."
      required:
        - BucketName
    S3BucketName:
      type: string
    S3KeyPrefix:
      type: string
    IAMRoleARN:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w-]+:iam::[0-9]+:role(\u002F)([\u0021-\u007E]+\u002F)?([\w+=,.@-]+)
    BounceAction:
      description: When included in a receipt rule, this action rejects the received email by returning a bounce response to the sender and, optionally, publishes a notification to Amazon Simple Notification Service (Amazon SNS). For information about sending a bounce message in response to a received email, see the Amazon SES Developer Guide.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to notify when the bounce action is taken. You can find the ARN of a topic by using the ListTopics operation in Amazon SNS. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
        SmtpReplyCode:
          $ref: "#/components/schemas/BounceSmtpReplyCode"
          description: The SMTP reply code, as defined by RFC 5321.
        StatusCode:
          $ref: "#/components/schemas/BounceStatusCode"
          description: The SMTP enhanced status code, as defined by RFC 3463.
        Message:
          $ref: "#/components/schemas/BounceMessage"
          description: Human-readable text to include in the bounce message.
        Sender:
          $ref: "#/components/schemas/Address"
          description: The email address of the sender of the bounced email. This is the address from which the bounce message is sent.
      required:
        - SmtpReplyCode
        - Message
        - Sender
    BounceSmtpReplyCode:
      type: string
    BounceStatusCode:
      type: string
    BounceMessage:
      type: string
    Address:
      type: string
    WorkmailAction:
      description: When included in a receipt rule, this action calls Amazon WorkMail and, optionally, publishes a notification to Amazon Simple Notification Service (Amazon SNS). It usually isn't necessary to set this up manually, because Amazon WorkMail adds the rule automatically during its setup procedure. For information using a receipt rule to call Amazon WorkMail, see the Amazon SES Developer Guide.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to notify when the WorkMail action is called. You can find the ARN of a topic by using the ListTopics operation in Amazon SNS. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
        OrganizationArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: 'The Amazon Resource Name (ARN) of the Amazon WorkMail organization. Amazon WorkMail ARNs use the following format: arn:aws:workmail:`<region>`:`<awsAccountId>`:organization/`<workmailOrganizationId>` You can find the ID of your organization by using the ListOrganizations operation in Amazon WorkMail. Amazon WorkMail organization IDs begin with "m-", followed by a string of alphanumeric characters. For information about Amazon WorkMail organizations, see the Amazon WorkMail Administrator Guide.'
      required:
        - OrganizationArn
    LambdaAction:
      description: When included in a receipt rule, this action calls an Amazon Web Services Lambda function and, optionally, publishes a notification to Amazon Simple Notification Service (Amazon SNS). To enable Amazon SES to call your Amazon Web Services Lambda function or to publish to an Amazon SNS topic of another account, Amazon SES must have permission to access those resources. For information about giving permissions, see the Amazon SES Developer Guide. For information about using Amazon Web Services Lambda actions in receipt rules, see the Amazon SES Developer Guide.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to notify when the Lambda action is executed. You can find the ARN of a topic by using the ListTopics operation in Amazon SNS. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
        FunctionArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Lambda function. An example of an Amazon Web Services Lambda function ARN is arn:aws:lambda:us-west-2:account-id:function:MyFunction. For more information about Amazon Web Services Lambda, see the Amazon Web Services Lambda Developer Guide.
        InvocationType:
          $ref: "#/components/schemas/InvocationType"
          description: The invocation type of the Amazon Web Services Lambda function. An invocation type of RequestResponse means that the execution of the function immediately results in a response, and a value of Event means that the function is invoked asynchronously. The default value is Event. For information about Amazon Web Services Lambda invocation types, see the Amazon Web Services Lambda Developer Guide. There is a 30-second timeout on RequestResponse invocations. You should use Event invocation in most cases. Use RequestResponse only to make a mail flow decision, such as whether to stop the receipt rule or the receipt rule set.
      required:
        - FunctionArn
    InvocationType:
      type: string
      enum:
        - Event
        - RequestResponse
    StopAction:
      description: When included in a receipt rule, this action terminates the evaluation of the receipt rule set and, optionally, publishes a notification to Amazon Simple Notification Service (Amazon SNS). For information about setting a stop action in a receipt rule, see the Amazon SES Developer Guide.
      type: object
      properties:
        Scope:
          $ref: "#/components/schemas/StopScope"
          description: The scope of the StopAction. The only acceptable value is RuleSet.
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to notify when the stop action is taken. You can find the ARN of a topic by using the ListTopics Amazon SNS operation. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
      required:
        - Scope
    StopScope:
      type: string
      enum:
        - RuleSet
    AddHeaderAction:
      description: When included in a receipt rule, this action adds a header to the received email. For information about adding a header using a receipt rule, see the Amazon SES Developer Guide.
      type: object
      properties:
        HeaderName:
          $ref: "#/components/schemas/HeaderName"
          description: The name of the header to add to the incoming message. The name must contain at least one character, and can contain up to 50 characters. It consists of alphanumeric (a–z, A–Z, 0–9) characters and dashes.
        HeaderValue:
          $ref: "#/components/schemas/HeaderValue"
          description: The content to include in the header. This value can contain up to 2048 characters. It can't contain newline (\n) or carriage return (\r) characters.
      required:
        - HeaderName
        - HeaderValue
    HeaderName:
      type: string
    HeaderValue:
      type: string
    SNSAction:
      description: When included in a receipt rule, this action publishes a notification to Amazon Simple Notification Service (Amazon SNS). This action includes a complete copy of the email content in the Amazon SNS notifications. Amazon SNS notifications for all other actions simply provide information about the email. They do not include the email content itself. If you own the Amazon SNS topic, you don't need to do anything to give Amazon SES permission to publish emails to it. However, if you don't own the Amazon SNS topic, you need to attach a policy to the topic to give Amazon SES permissions to access it. For information about giving permissions, see the Amazon SES Developer Guide. You can only publish emails that are 150 KB or less (including the header) to Amazon SNS. Larger emails bounce. If you anticipate emails larger than 150 KB, use the S3 action instead. For information about using a receipt rule to publish an Amazon SNS notification, see the Amazon SES Developer Guide.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to notify. You can find the ARN of a topic by using the ListTopics operation in Amazon SNS. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
        Encoding:
          $ref: "#/components/schemas/SNSActionEncoding"
          description: The encoding to use for the email within the Amazon SNS notification. UTF-8 is easier to use, but may not preserve all special characters when a message was encoded with a different encoding format. Base64 preserves all special characters. The default value is UTF-8.
      required:
        - TopicArn
    SNSActionEncoding:
      type: string
      enum:
        - UTF-8
        - Base64
    ConnectAction:
      description: When included in a receipt rule, this action parses the received message and starts an email contact in Amazon Connect on your behalf. When you receive emails, the maximum email size (including headers) is 40 MB. Additionally, emails may only have up to 10 attachments. Emails larger than 40 MB or with more than 10 attachments will be bounced. We recommend that you configure this action via Amazon Connect.
      type: object
      properties:
        InstanceARN:
          $ref: "#/components/schemas/ConnectInstanceArn"
          description: The Amazon Resource Name (ARN) for the Amazon Connect instance that Amazon SES integrates with for starting email contacts. For more information about Amazon Connect instances, see the Amazon Connect Administrator Guide
        IAMRoleARN:
          $ref: "#/components/schemas/IAMRoleARN"
          description: The Amazon Resource Name (ARN) of the IAM role to be used by Amazon Simple Email Service while starting email contacts to the Amazon Connect instance. This role should have permission to invoke connect:StartEmailContact for the given Amazon Connect instance.
      required:
        - InstanceARN
        - IAMRoleARN
    ConnectInstanceArn:
      type: string
      pattern: arn:(aws|aws-us-gov):connect:[a-z]{2}-[a-z]+-[0-9-]{1}:[0-9]{1,20}:instance/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}
    CreateReceiptRuleResponseDisplay:
      type: object
      properties: {}
    CreateReceiptRuleOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateReceiptRuleResponseDisplay"
    CreateReceiptRuleRequest:
      description: Represents a request to create a receipt rule. You use receipt rules to receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: The name of the rule set where the receipt rule is added.
        After:
          $ref: "#/components/schemas/ReceiptRuleName"
          description: The name of an existing rule after which the new rule is placed. If this parameter is null, the new rule is inserted at the beginning of the rule list.
        Rule:
          $ref: "#/components/schemas/ReceiptRule"
          description: A data structure that contains the specified rule's name, actions, recipients, domains, enabled status, scan status, and TLS policy.
      required:
        - RuleSetName
        - Rule
    CreateReceiptRuleSetResponseDisplay:
      type: object
      properties: {}
    CreateReceiptRuleSetOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateReceiptRuleSetResponseDisplay"
    CreateReceiptRuleSetRequest:
      description: Represents a request to create an empty receipt rule set. You use receipt rule sets to receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        RuleSetName:
          $ref: "#/components/schemas/ReceiptRuleSetName"
          description: "The name of the rule set to create. The name must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). Start and end with a letter or number. Contain 64 characters or fewer."
      required:
        - RuleSetName
    Template:
      description: The content of the email, composed of a subject line and either an HTML part or a text-only part.
      type: object
      properties:
        TemplateName:
          $ref: "#/components/schemas/TemplateName"
          description: The name of the template. You use this name when you send email using the SendTemplatedEmail or SendBulkTemplatedEmail operations.
        SubjectPart:
          $ref: "#/components/schemas/SubjectPart"
          description: The subject line of the email.
        TextPart:
          $ref: "#/components/schemas/TextPart"
          description: The email body that is visible to recipients whose email clients do not display HTML content.
        HtmlPart:
          $ref: "#/components/schemas/HtmlPart"
          description: The HTML body of the email.
      required:
        - TemplateName
    SubjectPart:
      type: string
    TextPart:
      type: string
    HtmlPart:
      type: string
    CreateTemplateResponseDisplay:
      type: object
      properties: {}
    CreateTemplateOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateTemplateResponseDisplay"
    CreateTemplateRequest:
      description: Represents a request to create an email template. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        Template:
          $ref: "#/components/schemas/Template"
          description: The content of the email, composed of a subject line and either an HTML part or a text-only part.
      required:
        - Template
    DeleteConfigurationSetResponseDisplay:
      type: object
      properties: {}
    DeleteConfigurationSetOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteConfigurationSetResponseDisplay"
    DeleteConfigurationSetRequest:
      description: Represents a request to delete a configuration set. Configuration sets enable you to publish email sending events. For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        ConfigurationSetName:
          $ref: "#/components/schemas/ConfigurationSetName"
          description: The name of the configuration set to delete.
      required:
        - ConfigurationSetName
    DeleteConfigurationSetEventDestinationResponseDisplay:
      type: object
      properties: {}
    DeleteConfigurationSetEventDestinationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteConfigurationSetEventDestinationResponseDisplay"
    DeleteConfigurationSetEventDestinationRequest:
      description: Represents a request to delete a configuration set event destination. Configuration set event destinations are associated with configuration sets, which enable you to publish email sending events. For information about using configuration sets, see the Amazon SES Developer Guide.
      type: object
      properties:
        ConfigurationSetName:
          $ref: "#/components/schemas/ConfigurationSetName"
          description: The name of the configuration set from which to delete the event destination.
        EventDestinationName:
          $ref: "#/components/schemas/EventDestinationName"
          description: The name of the event destination to delete.
      required:
        - ConfigurationSetName
        - EventDestinationName
    DeleteConfigurationSetTrackingOptionsResponseDisplay:
      type: object
      properties: {}
    DeleteConfigurationSetTrackingOptionsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteConfigurationSetTrackingOptionsResponseDisplay"
    DeleteConfigurationSetTrackingOptionsRequest:
      description: Represents a request to delete open and click tracking options in a configuration set.
      type: object
      properties:
        ConfigurationSetName:
          $ref: "#/components/schemas/ConfigurationSetName"
          description: The name of the configuration set.
      required:
        - ConfigurationSetName
    DeleteCustomVerificationEmailTemplateRequest:
      description: Represents a request to delete an existing custom verification email template.
      type: object
      properties:
        TemplateName:
          $ref: "#/components/schemas/TemplateName"
          description: The name of the custom verification email template to delete.
      required:
        - TemplateName
    Identity:
      type: string
    DeleteIdentityResponseDisplay:
      type: object
      properties: {}
    DeleteIdentityOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteIdentityResponseDisplay"
    DeleteIdentityRequest:
      description: Represents a request to delete one of your Amazon SES identities (an email address or domain).
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: The identity to be removed from the list of identities for the Amazon Web Services account.
      required:
        - Identity
    PolicyName:
      type: string
      minLength: 1
      maxLength: 64
    DeleteIdentityPolicyResponseDisplay:
      type: object
      properties: {}
    DeleteIdentityPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteIdentityPolicyResponseDisplay"
    DeleteIdentityPolicyRequest:
      description: Represents a request to delete a sending authorization policy for an identity. Sending authorization is an Amazon SES feature that enables you to authorize other senders to use your identities. For information, see the Amazon SES Developer Guide.
      type: object
      properties:
        Identity:
          $ref: "#/components/schemas/Identity"
          description: "The identity that is associated with the policy to delete. You can specify the identity by using its name or by using its Amazon Resource Name (ARN). Examples: user@example.com, example.com, arn:aws:ses:us-east-1:123456789012:identity/example.com. To successfully call this operation, you must own the identity."
        PolicyName:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the policy to be deleted.
      required:
        - Identity
        - PolicyName
    DeleteReceiptFilterResponseDisplay:
      type: object
      properties: {}
    DeleteReceiptFilterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteReceiptFilterResponseDisplay"
    DeleteReceiptFilterRequest:
      description: Represents a request to delete an IP address filter. You use IP address filters when you receive email with Amazon SES. For more information, see the Amazon SES Developer Guide.
      type: object
      properties:
        FilterName:
          $ref: "#/components/schemas/ReceiptFilterName"
          description: The name of the IP address filter to delete.
      required:
