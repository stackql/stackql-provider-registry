        Value:
          $ref: "#/components/schemas/MessageTagValue"
          description: "The value of the tag. The value must meet the following requirements: Contain only ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). Contain 256 characters or fewer."
