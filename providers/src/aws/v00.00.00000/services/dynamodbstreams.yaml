openapi: 3.0.0
info:
  version: "2012-08-10"
  title: Amazon DynamoDB Streams
  description: Amazon DynamoDB Streams
  x-serviceName: dynamodb
  x-serviceAlias: dynamodbstreams
  x-protocol: json
  x-apiVersion: "2012-08-10"
  x-endpointPrefix: streams.dynamodb
  x-targetPrefix: DynamoDBStreams_20120810
  x-jsonVersion: "1.0"
servers:
  - url: https://streams.dynamodb.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for dynamodbstreams
paths:
  /DescribeStream:
    post:
      operationId: DescribeStream
      description: Returns information about a stream, including the current status of the stream, its Amazon Resource Name (ARN), the composition of its shards, and its corresponding DynamoDB table. You can call DescribeStream at a maximum rate of 10 times per second. Each shard in the stream has a SequenceNumberRange associated with it. If the SequenceNumberRange has a StartingSequenceNumber but no EndingSequenceNumber, then the shard is still open (able to receive more stream records). If both StartingSequenceNumber and EndingSequenceNumber are present, then that shard is closed and can no longer receive more data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDBStreams_20120810.DescribeStream
            default: DynamoDBStreams_20120810.DescribeStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                StreamArn:
                  $ref: "#/components/schemas/StreamArn"
                  description: The Amazon Resource Name (ARN) for the stream.
                Limit:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: The maximum number of shard objects to return. The upper limit is 100.
                ExclusiveStartShardId:
                  $ref: "#/components/schemas/ShardId"
                  description: The shard ID of the first item that this operation will evaluate. Use the value that was returned for LastEvaluatedShardId in the previous operation.
                ShardFilter:
                  $ref: "#/components/schemas/ShardFilter"
                  description: This optional field contains the filter definition for the DescribeStream API.
              required:
                - StreamArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeStreamOutput"
  /GetRecords:
    post:
      operationId: GetRecords
      description: Retrieves the stream records from a given shard. Specify a shard iterator using the ShardIterator parameter. The shard iterator specifies the position in the shard from which you want to start reading stream records sequentially. If there are no stream records available in the portion of the shard that the iterator points to, GetRecords returns an empty list. Note that it might take multiple calls to get to a portion of the shard that contains stream records. GetRecords can retrieve a maximum of 1 MB of data or 1000 stream records, whichever comes first.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDBStreams_20120810.GetRecords
            default: DynamoDBStreams_20120810.GetRecords
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ShardIterator:
                  $ref: "#/components/schemas/ShardIterator"
                  description: A shard iterator that was retrieved from a previous GetShardIterator operation. This iterator can be used to access the stream records in this shard.
                Limit:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: The maximum number of records to return from the shard. The upper limit is 1000.
              required:
                - ShardIterator
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecordsOutput"
  /GetShardIterator:
    post:
      operationId: GetShardIterator
      description: Returns a shard iterator. A shard iterator provides information about how to retrieve the stream records from within a shard. Use the shard iterator in a subsequent GetRecords request to read the stream records from the shard. A shard iterator expires 15 minutes after it is returned to the requester.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDBStreams_20120810.GetShardIterator
            default: DynamoDBStreams_20120810.GetShardIterator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                StreamArn:
                  $ref: "#/components/schemas/StreamArn"
                  description: The Amazon Resource Name (ARN) for the stream.
                ShardId:
                  $ref: "#/components/schemas/ShardId"
                  description: The identifier of the shard. The iterator will be returned for this shard ID.
                ShardIteratorType:
                  $ref: "#/components/schemas/ShardIteratorType"
                  description: "Determines how the shard iterator is used to start reading stream records from the shard: AT_SEQUENCE_NUMBER - Start reading exactly from the position denoted by a specific sequence number. AFTER_SEQUENCE_NUMBER - Start reading right after the position denoted by a specific sequence number. TRIM_HORIZON - Start reading at the last (untrimmed) stream record, which is the oldest record in the shard. In DynamoDB Streams, there is a 24 hour limit on data retention. Stream records whose age exceeds this limit are subject to removal (trimming) from the stream. LATEST - Start reading just after the most recent stream record in the shard, so that you always read the most recent data in the shard."
                SequenceNumber:
                  $ref: "#/components/schemas/SequenceNumber"
                  description: The sequence number of a stream record in the shard from which to start reading.
              required:
                - StreamArn
                - ShardId
                - ShardIteratorType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetShardIteratorOutput"
  /ListStreams:
    post:
      operationId: ListStreams
      description: Returns an array of stream ARNs associated with the current account and endpoint. If the TableName parameter is present, then ListStreams will return only the streams ARNs for that table. You can call ListStreams at a maximum rate of 5 times per second.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDBStreams_20120810.ListStreams
            default: DynamoDBStreams_20120810.ListStreams
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableName"
                  description: If this parameter is provided, then only the streams associated with this table name are returned.
                Limit:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: The maximum number of streams to return. The upper limit is 100.
                ExclusiveStartStreamArn:
                  $ref: "#/components/schemas/StreamArn"
                  description: The ARN (Amazon Resource Name) of the first item that this operation will evaluate. Use the value that was returned for LastEvaluatedStreamArn in the previous operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    StreamArn:
      type: string
      minLength: 37
      maxLength: 1024
    PositiveIntegerObject:
      type: integer
      minimum: 1
    ShardId:
      type: string
      minLength: 28
      maxLength: 65
    ShardFilter:
      description: This optional field contains the filter definition for the DescribeStream API.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ShardFilterType"
          description: Contains the type of filter to be applied on the DescribeStream API. Currently, the only value this parameter accepts is CHILD_SHARDS.
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: "Contains the shardId of the parent shard for which you are requesting child shards. Sample request:"
    ShardFilterType:
      type: string
      enum:
        - CHILD_SHARDS
    DescribeStreamOutput:
      description: Represents the output of a DescribeStream operation.
      type: object
      properties:
        StreamDescription:
          $ref: "#/components/schemas/StreamDescription"
          description: A complete description of the stream, including its creation date and time, the DynamoDB table associated with the stream, the shard IDs within the stream, and the beginning and ending sequence numbers of stream records within the shards.
    StreamDescription:
      description: Represents all of the data describing a particular stream.
      type: object
      properties:
        StreamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The Amazon Resource Name (ARN) for the stream.
        StreamLabel:
          $ref: "#/components/schemas/String"
          description: "A timestamp, in ISO 8601 format, for this stream. Note that LatestStreamLabel is not a unique identifier for the stream, because it is possible that a stream from another table might have the same timestamp. However, the combination of the following three elements is guaranteed to be unique: the Amazon Web Services customer ID. the table name the StreamLabel"
        StreamStatus:
          $ref: "#/components/schemas/StreamStatus"
          description: "Indicates the current status of the stream: ENABLING - Streams is currently being enabled on the DynamoDB table. ENABLED - the stream is enabled. DISABLING - Streams is currently being disabled on the DynamoDB table. DISABLED - the stream is disabled."
        StreamViewType:
          $ref: "#/components/schemas/StreamViewType"
          description: "Indicates the format of the records within this stream: KEYS_ONLY - only the key attributes of items that were modified in the DynamoDB table. NEW_IMAGE - entire items from the table, as they appeared after they were modified. OLD_IMAGE - entire items from the table, as they appeared before they were modified. NEW_AND_OLD_IMAGES - both the new and the old images of the items from the table."
        CreationRequestDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the request to create this stream was issued.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The DynamoDB table with which the stream is associated.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: The key attribute(s) of the stream's DynamoDB table.
        Shards:
          $ref: "#/components/schemas/ShardDescriptionList"
          description: The shards that comprise the stream.
        LastEvaluatedShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID of the item where the operation stopped, inclusive of the previous result set. Use this value to start a new operation, excluding this value in the new request. If LastEvaluatedShardId is empty, then the "last page" of results has been processed and there is currently no more data to be retrieved. If LastEvaluatedShardId is not empty, it does not necessarily mean that there is more data in the result set. The only way to know when you have reached the end of the result set is when LastEvaluatedShardId is empty.
    String:
      type: string
    StreamStatus:
      type: string
      enum:
        - ENABLING
        - ENABLED
        - DISABLING
        - DISABLED
    StreamViewType:
      type: string
      enum:
        - NEW_IMAGE
        - OLD_IMAGE
        - NEW_AND_OLD_IMAGES
        - KEYS_ONLY
    Date:
      type: string
      format: date-time
    TableName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    KeySchema:
      type: array
      items:
        $ref: "#/components/schemas/KeySchemaElement"
    KeySchemaElement:
      description: Represents a single element of a key schema. A key schema specifies the attributes that make up the primary key of a table, or the key attributes of an index. A KeySchemaElement represents exactly one attribute of the primary key. For example, a simple primary key would be represented by one KeySchemaElement (for the partition key). A composite primary key would require one KeySchemaElement for the partition key, and another KeySchemaElement for the sort key. A KeySchemaElement must be a scalar, top-level attribute (not a nested attribute). The data type must be one of String, Number, or Binary. The attribute cannot be nested within a List or a Map.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/KeySchemaAttributeName"
          description: The name of a key attribute.
        KeyType:
          $ref: "#/components/schemas/KeyType"
          description: "The role that this key attribute will assume: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
      required:
        - AttributeName
        - KeyType
    KeySchemaAttributeName:
      type: string
      minLength: 1
      maxLength: 255
    KeyType:
      type: string
      enum:
        - HASH
        - RANGE
    ShardDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/Shard"
    Shard:
      description: A uniquely identified group of stream records within a stream.
      type: object
      properties:
        ShardId:
          $ref: "#/components/schemas/ShardId"
          description: The system-generated identifier for this shard.
        SequenceNumberRange:
          $ref: "#/components/schemas/SequenceNumberRange"
          description: The range of possible sequence numbers for the shard.
        ParentShardId:
          $ref: "#/components/schemas/ShardId"
          description: The shard ID of the current shard's parent.
    SequenceNumberRange:
      description: The beginning and ending sequence numbers for the stream records contained within a shard.
      type: object
      properties:
        StartingSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The first sequence number for the stream records contained within a shard. String contains numeric characters only.
        EndingSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The last sequence number for the stream records contained within a shard. String contains numeric characters only.
    SequenceNumber:
      type: string
      minLength: 21
      maxLength: 40
    ShardIterator:
      type: string
      minLength: 1
      maxLength: 2048
    GetRecordsOutput:
      description: Represents the output of a GetRecords operation.
      type: object
      properties:
        Records:
          $ref: "#/components/schemas/RecordList"
          description: The stream records from the shard, which were retrieved using the shard iterator.
        NextShardIterator:
          $ref: "#/components/schemas/ShardIterator"
          description: The next position in the shard from which to start sequentially reading stream records. If set to null, the shard has been closed and the requested iterator will not return any more data.
    RecordList:
      type: array
      items:
        $ref: "#/components/schemas/Record"
    Record:
      description: A description of a unique event within a stream.
      type: object
      properties:
        eventID:
          $ref: "#/components/schemas/String"
          description: A globally unique identifier for the event that was recorded in this stream record.
        eventName:
          $ref: "#/components/schemas/OperationType"
          description: "The type of data modification that was performed on the DynamoDB table: INSERT - a new item was added to the table. MODIFY - one or more of an existing item's attributes were modified. REMOVE - the item was deleted from the table"
        eventVersion:
          $ref: "#/components/schemas/String"
          description: The version number of the stream record format. This number is updated whenever the structure of Record is modified. Client applications must not assume that eventVersion will remain at a particular value, as this number is subject to change at any time. In general, eventVersion will only increase as the low-level DynamoDB Streams API evolves.
        eventSource:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services service from which the stream record originated. For DynamoDB Streams, this is aws:dynamodb.
        awsRegion:
          $ref: "#/components/schemas/String"
          description: The region in which the GetRecords request was received.
        dynamodb:
          $ref: "#/components/schemas/StreamRecord"
          description: The main body of the stream record, containing all of the DynamoDB-specific fields.
        userIdentity:
          $ref: "#/components/schemas/Identity"
          description: 'Items that are deleted by the Time to Live process after expiration have the following fields: Records[].userIdentity.type "Service" Records[].userIdentity.principalId "dynamodb.amazonaws.com"'
    OperationType:
      type: string
      enum:
        - INSERT
        - MODIFY
        - REMOVE
    StreamRecord:
      description: A description of a single data modification that was performed on an item in a DynamoDB table.
      type: object
      properties:
        ApproximateCreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The approximate date and time when the stream record was created, in ISO 8601 format and rounded down to the closest second.
        Keys:
          type: object
          properties: {}
          description: The primary key attribute(s) for the DynamoDB item that was modified.
        NewImage:
          type: object
          properties: {}
          description: The item in the DynamoDB table as it appeared after it was modified.
        OldImage:
          type: object
          properties: {}
          description: The item in the DynamoDB table as it appeared before it was modified.
        SequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The sequence number of the stream record.
        SizeBytes:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The size of the stream record, in bytes.
        StreamViewType:
          $ref: "#/components/schemas/StreamViewType"
          description: "The type of data from the modified DynamoDB item that was captured in this stream record: KEYS_ONLY - only the key attributes of the modified item. NEW_IMAGE - the entire item, as it appeared after it was modified. OLD_IMAGE - the entire item, as it appeared before it was modified. NEW_AND_OLD_IMAGES - both the new and the old item images of the item."
    PositiveLongObject:
      type: integer
      format: int64
      minimum: 1
    Identity:
      description: Contains details about the type of identity that made the request.
      type: object
      properties:
        PrincipalId:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the entity that made the call. For Time To Live, the principalId is "dynamodb.amazonaws.com".
        Type:
          $ref: "#/components/schemas/String"
          description: The type of the identity. For Time To Live, the type is "Service".
    ShardIteratorType:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
        - AT_SEQUENCE_NUMBER
        - AFTER_SEQUENCE_NUMBER
    GetShardIteratorOutput:
      description: Represents the output of a GetShardIterator operation.
      type: object
      properties:
        ShardIterator:
          $ref: "#/components/schemas/ShardIterator"
          description: The position in the shard from which to start reading stream records sequentially. A shard iterator specifies this position using the sequence number of a stream record in a shard.
    ListStreamsOutput:
      description: Represents the output of a ListStreams operation.
      type: object
      properties:
        Streams:
          $ref: "#/components/schemas/StreamList"
          description: A list of stream descriptors associated with the current account and endpoint.
        LastEvaluatedStreamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The stream ARN of the item where the operation stopped, inclusive of the previous result set. Use this value to start a new operation, excluding this value in the new request. If LastEvaluatedStreamArn is empty, then the "last page" of results has been processed and there is no more data to be retrieved. If LastEvaluatedStreamArn is not empty, it does not necessarily mean that there is more data in the result set. The only way to know when you have reached the end of the result set is when LastEvaluatedStreamArn is empty.
    StreamList:
      type: array
      items:
        $ref: "#/components/schemas/Stream"
    Stream:
      description: Represents all of the data describing a particular stream.
      type: object
      properties:
        StreamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The Amazon Resource Name (ARN) for the stream.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The DynamoDB table with which the stream is associated.
        StreamLabel:
          $ref: "#/components/schemas/String"
          description: "A timestamp, in ISO 8601 format, for this stream. Note that LatestStreamLabel is not a unique identifier for the stream, because it is possible that a stream from another table might have the same timestamp. However, the combination of the following three elements is guaranteed to be unique: the Amazon Web Services customer ID. the table name the StreamLabel"
  x-stackQL-resources:
    streams:
      id: aws.dynamodbstreams.streams
      name: streams
      title: streams
      methods:
        describe_stream:
          operation:
            $ref: "#/paths/~1DescribeStream/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.StreamDescription
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        list_streams:
          operation:
            $ref: "#/paths/~1ListStreams/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/streams/methods/describe_stream"
          - $ref: "#/components/x-stackQL-resources/streams/methods/list_streams"
        insert: []
        update: []
        delete: []
    records:
      id: aws.dynamodbstreams.records
      name: records
      title: records
      methods:
        get_records:
          operation:
            $ref: "#/paths/~1GetRecords/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/records/methods/get_records"
        insert: []
        update: []
        delete: []
    shard_iterators:
      id: aws.dynamodbstreams.shard_iterators
      name: shard_iterators
      title: shard_iterators
      methods:
        get_shard_iterator:
          operation:
            $ref: "#/paths/~1GetShardIterator/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/shard_iterators/methods/get_shard_iterator"
        insert: []
        update: []
        delete: []
