openapi: 3.0.0
info:
  version: "2017-07-25"
  title: AWS Glue DataBrew
  description: AWS Glue DataBrew
  x-serviceName: databrew
  x-serviceAlias: databrew
  x-protocol: rest-json
  x-apiVersion: "2017-07-25"
  x-endpointPrefix: databrew
  x-jsonVersion: "1.1"
servers:
  - url: https://databrew.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for databrew
paths:
  /recipes/{name}/batchDeleteRecipeVersion:
    post:
      operationId: BatchDeleteRecipeVersion
      description: "Deletes one or more versions of a recipe at a time. The entire request will be rejected if: The recipe does not exist. There is an invalid version identifier in the list of versions. The version list is empty. The version list size exceeds 50. The version list contains duplicate entries. The request will complete successfully, but with partial failures, if: A version does not exist. A version is being used by a job. You specify LATEST_WORKING, but it's being used by a project. The version fails to be deleted. The LATEST_WORKING version will only be deleted if the recipe has no other versions. If you try to delete LATEST_WORKING while other versions exist (or if they can't be deleted), then LATEST_WORKING will be listed as partial failure in the response."
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe whose versions are to be deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RecipeVersions:
                  $ref: "#/components/schemas/RecipeVersionList"
              required:
                - RecipeVersions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteRecipeVersionResponse"
  /datasets:
    post:
      operationId: CreateDataset
      description: Creates a new DataBrew dataset.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DatasetName"
                Format:
                  $ref: "#/components/schemas/InputFormat"
                FormatOptions:
                  $ref: "#/components/schemas/FormatOptions"
                Input:
                  $ref: "#/components/schemas/Input"
                PathOptions:
                  $ref: "#/components/schemas/PathOptions"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetResponse"
    get:
      operationId: ListDatasets
      description: Lists all of the DataBrew datasets.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatasetsResponse"
  /profileJobs:
    post:
      operationId: CreateProfileJob
      description: Creates a new job to analyze a dataset and create its data profile.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DatasetName:
                  $ref: "#/components/schemas/DatasetName"
                EncryptionKeyArn:
                  $ref: "#/components/schemas/EncryptionKeyArn"
                EncryptionMode:
                  $ref: "#/components/schemas/EncryptionMode"
                Name:
                  $ref: "#/components/schemas/JobName"
                LogSubscription:
                  $ref: "#/components/schemas/LogSubscription"
                MaxCapacity:
                  $ref: "#/components/schemas/MaxCapacity"
                MaxRetries:
                  $ref: "#/components/schemas/MaxRetries"
                OutputLocation:
                  $ref: "#/components/schemas/S3Location"
                Configuration:
                  $ref: "#/components/schemas/ProfileConfiguration"
                ValidationConfigurations:
                  $ref: "#/components/schemas/ValidationConfigurationList"
                RoleArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Timeout:
                  $ref: "#/components/schemas/Timeout"
                JobSample:
                  $ref: "#/components/schemas/JobSample"
              required:
                - DatasetName
                - OutputLocation
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfileJobResponse"
  /projects:
    post:
      operationId: CreateProject
      description: Creates a new DataBrew project.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DatasetName:
                  $ref: "#/components/schemas/DatasetName"
                Name:
                  $ref: "#/components/schemas/ProjectName"
                RecipeName:
                  $ref: "#/components/schemas/RecipeName"
                Sample:
                  $ref: "#/components/schemas/Sample"
                RoleArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - DatasetName
                - RecipeName
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
    get:
      operationId: ListProjects
      description: Lists all of the DataBrew projects that are defined.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProjectsResponse"
  /recipes:
    post:
      operationId: CreateRecipe
      description: Creates a new DataBrew recipe.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/RecipeDescription"
                Name:
                  $ref: "#/components/schemas/RecipeName"
                Steps:
                  $ref: "#/components/schemas/RecipeStepList"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecipeResponse"
    get:
      operationId: ListRecipes
      description: Lists all of the DataBrew recipes that are defined.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
        - name: recipeVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecipeVersion"
          description: "Return only those recipes with a version identifier of LATEST_WORKING or LATEST_PUBLISHED. If RecipeVersion is omitted, ListRecipes returns all of the LATEST_PUBLISHED recipe versions. Valid values: LATEST_WORKING | LATEST_PUBLISHED"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecipesResponse"
  /recipeJobs:
    post:
      operationId: CreateRecipeJob
      description: Creates a new job to transform input data, using steps defined in an existing Glue DataBrew recipe
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DatasetName:
                  $ref: "#/components/schemas/DatasetName"
                EncryptionKeyArn:
                  $ref: "#/components/schemas/EncryptionKeyArn"
                EncryptionMode:
                  $ref: "#/components/schemas/EncryptionMode"
                Name:
                  $ref: "#/components/schemas/JobName"
                LogSubscription:
                  $ref: "#/components/schemas/LogSubscription"
                MaxCapacity:
                  $ref: "#/components/schemas/MaxCapacity"
                MaxRetries:
                  $ref: "#/components/schemas/MaxRetries"
                Outputs:
                  $ref: "#/components/schemas/OutputList"
                DataCatalogOutputs:
                  $ref: "#/components/schemas/DataCatalogOutputList"
                DatabaseOutputs:
                  $ref: "#/components/schemas/DatabaseOutputList"
                ProjectName:
                  $ref: "#/components/schemas/ProjectName"
                RecipeReference:
                  $ref: "#/components/schemas/RecipeReference"
                RoleArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Timeout:
                  $ref: "#/components/schemas/Timeout"
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecipeJobResponse"
  /rulesets:
    post:
      operationId: CreateRuleset
      description: Creates a new ruleset that can be used in a profile job to validate the data quality of a dataset.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/RulesetName"
                Description:
                  $ref: "#/components/schemas/RulesetDescription"
                TargetArn:
                  $ref: "#/components/schemas/Arn"
                Rules:
                  $ref: "#/components/schemas/RuleList"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - TargetArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRulesetResponse"
    get:
      operationId: ListRulesets
      description: List all rulesets available in the current account or rulesets associated with a specific resource (dataset).
      parameters:
        - name: targetArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of a resource (dataset). Using this parameter indicates to return only those rulesets that are associated with the specified resource.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token generated by DataBrew that specifies where to continue pagination if a previous request was truncated. To get the next set of pages, pass in the NextToken value from the response object of the previous page call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRulesetsResponse"
  /schedules:
    post:
      operationId: CreateSchedule
      description: Creates a new schedule for one or more DataBrew jobs. Jobs can be run at a specific date and time, or at regular intervals.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                JobNames:
                  $ref: "#/components/schemas/JobNameList"
                CronExpression:
                  $ref: "#/components/schemas/CronExpression"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Name:
                  $ref: "#/components/schemas/ScheduleName"
              required:
                - CronExpression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduleResponse"
    get:
      operationId: ListSchedules
      description: Lists the DataBrew schedules that are defined.
      parameters:
        - name: jobName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job that these schedules apply to.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchedulesResponse"
  /datasets/{name}:
    delete:
      operationId: DeleteDataset
      description: Deletes a dataset from DataBrew.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDatasetResponse"
    get:
      operationId: DescribeDataset
      description: Returns the definition of a specific DataBrew dataset.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDatasetResponse"
    put:
      operationId: UpdateDataset
      description: Modifies the definition of an existing DataBrew dataset.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Format:
                  $ref: "#/components/schemas/InputFormat"
                FormatOptions:
                  $ref: "#/components/schemas/FormatOptions"
                Input:
                  $ref: "#/components/schemas/Input"
                PathOptions:
                  $ref: "#/components/schemas/PathOptions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDatasetResponse"
  /jobs/{name}:
    delete:
      operationId: DeleteJob
      description: Deletes the specified DataBrew job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJobResponse"
    get:
      operationId: DescribeJob
      description: Returns the definition of a specific DataBrew job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobResponse"
  /projects/{name}:
    delete:
      operationId: DeleteProject
      description: Deletes an existing DataBrew project.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectName"
          description: The name of the project to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProjectResponse"
    get:
      operationId: DescribeProject
      description: Returns the definition of a specific DataBrew project.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectName"
          description: The name of the project to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProjectResponse"
    put:
      operationId: UpdateProject
      description: Modifies the definition of an existing DataBrew project.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectName"
          description: The name of the project to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sample:
                  $ref: "#/components/schemas/Sample"
                RoleArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProjectResponse"
  /recipes/{name}/recipeVersion/{recipe_version}:
    delete:
      operationId: DeleteRecipeVersion
      description: Deletes a single version of a DataBrew recipe.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe.
        - name: recipe_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecipeVersion"
          description: The version of the recipe to be deleted. You can specify a numeric versions (X.Y) or LATEST_WORKING. LATEST_PUBLISHED is not supported.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRecipeVersionResponse"
  /rulesets/{name}:
    delete:
      operationId: DeleteRuleset
      description: Deletes a ruleset.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RulesetName"
          description: The name of the ruleset to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRulesetResponse"
    get:
      operationId: DescribeRuleset
      description: Retrieves detailed information about the ruleset.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RulesetName"
          description: The name of the ruleset to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRulesetResponse"
    put:
      operationId: UpdateRuleset
      description: Updates specified ruleset.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RulesetName"
          description: The name of the ruleset to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/RulesetDescription"
                Rules:
                  $ref: "#/components/schemas/RuleList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRulesetResponse"
  /schedules/{name}:
    delete:
      operationId: DeleteSchedule
      description: Deletes the specified DataBrew schedule.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScheduleName"
          description: The name of the schedule to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduleResponse"
    get:
      operationId: DescribeSchedule
      description: Returns the definition of a specific DataBrew schedule.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScheduleName"
          description: The name of the schedule to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScheduleResponse"
    put:
      operationId: UpdateSchedule
      description: Modifies the definition of an existing DataBrew schedule.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScheduleName"
          description: The name of the schedule to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                JobNames:
                  $ref: "#/components/schemas/JobNameList"
                CronExpression:
                  $ref: "#/components/schemas/CronExpression"
              required:
                - CronExpression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduleResponse"
  /jobs/{name}/jobRun/{run_id}:
    get:
      operationId: DescribeJobRun
      description: Represents one run of a DataBrew job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job being processed during this run.
        - name: run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobRunId"
          description: The unique identifier of the job run.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobRunResponse"
  /recipes/{name}:
    get:
      operationId: DescribeRecipe
      description: Returns the definition of a specific DataBrew recipe corresponding to a particular version.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe to be described.
        - name: recipeVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecipeVersion"
          description: The recipe version identifier. If this parameter isn't specified, then the latest published version is returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRecipeResponse"
    put:
      operationId: UpdateRecipe
      description: Modifies the definition of the LATEST_WORKING version of a DataBrew recipe.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe to be updated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/RecipeDescription"
                Steps:
                  $ref: "#/components/schemas/RecipeStepList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecipeResponse"
  /jobs/{name}/jobRuns:
    get:
      operationId: ListJobRuns
      description: Lists all of the previous runs of a particular DataBrew job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobRunsResponse"
  /jobs:
    get:
      operationId: ListJobs
      description: Lists all of the DataBrew jobs that are defined.
      parameters:
        - name: datasetName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: The name of a dataset. Using this parameter indicates to return only those jobs that act on the specified dataset.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token generated by DataBrew that specifies where to continue pagination if a previous request was truncated. To get the next set of pages, pass in the NextToken value from the response object of the previous page call.
        - name: projectName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProjectName"
          description: The name of a project. Using this parameter indicates to return only those jobs that are associated with the specified project.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResponse"
  /recipeVersions:
    get:
      operationId: ListRecipeVersions
      description: Lists the versions of a particular DataBrew recipe, except for LATEST_WORKING.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults100"
          description: The maximum number of results to return in this request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
        - name: name
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe for which to return version information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecipeVersionsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all the tags for a DataBrew resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) string that uniquely identifies the DataBrew resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds metadata tags to a DataBrew resource, such as a dataset, project, recipe, job, or schedule.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The DataBrew resource to which tags should be added. The value for this parameter is an Amazon Resource Name (ARN). For DataBrew, you can tag a dataset, a job, a project, or a recipe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes metadata tags from a DataBrew resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: A DataBrew resource from which you want to remove a tag or tags. The value for this parameter is an Amazon Resource Name (ARN).
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys (names) of one or more tags to be removed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /recipes/{name}/publishRecipe:
    post:
      operationId: PublishRecipe
      description: Publishes a new version of a DataBrew recipe.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe to be published.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/RecipeDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishRecipeResponse"
  /projects/{name}/sendProjectSessionAction:
    put:
      operationId: SendProjectSessionAction
      description: Performs a recipe step within an interactive DataBrew session that's currently open.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectName"
          description: The name of the project to apply the action to.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Preview:
                  $ref: "#/components/schemas/Preview"
                RecipeStep:
                  $ref: "#/components/schemas/RecipeStep"
                StepIndex:
                  $ref: "#/components/schemas/StepIndex"
                ClientSessionId:
                  $ref: "#/components/schemas/ClientSessionId"
                ViewFrame:
                  $ref: "#/components/schemas/ViewFrame"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendProjectSessionActionResponse"
  /jobs/{name}/startJobRun:
    post:
      operationId: StartJobRun
      description: Runs a DataBrew job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job to be run.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobRunResponse"
  /projects/{name}/startProjectSession:
    put:
      operationId: StartProjectSession
      description: Creates an interactive session, enabling you to manipulate data in a DataBrew project.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectName"
          description: The name of the project to act upon.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AssumeControl:
                  $ref: "#/components/schemas/AssumeControl"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartProjectSessionResponse"
  /jobs/{name}/jobRun/{run_id}/stopJobRun:
    post:
      operationId: StopJobRun
      description: Stops a particular run of a job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job to be stopped.
        - name: run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobRunId"
          description: The ID of the job run to be stopped.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopJobRunResponse"
  /profileJobs/{name}:
    put:
      operationId: UpdateProfileJob
      description: Modifies the definition of an existing profile job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Configuration:
                  $ref: "#/components/schemas/ProfileConfiguration"
                EncryptionKeyArn:
                  $ref: "#/components/schemas/EncryptionKeyArn"
                EncryptionMode:
                  $ref: "#/components/schemas/EncryptionMode"
                LogSubscription:
                  $ref: "#/components/schemas/LogSubscription"
                MaxCapacity:
                  $ref: "#/components/schemas/MaxCapacity"
                MaxRetries:
                  $ref: "#/components/schemas/MaxRetries"
                OutputLocation:
                  $ref: "#/components/schemas/S3Location"
                ValidationConfigurations:
                  $ref: "#/components/schemas/ValidationConfigurationList"
                RoleArn:
                  $ref: "#/components/schemas/Arn"
                Timeout:
                  $ref: "#/components/schemas/Timeout"
                JobSample:
                  $ref: "#/components/schemas/JobSample"
              required:
                - OutputLocation
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileJobResponse"
  /recipeJobs/{name}:
    put:
      operationId: UpdateRecipeJob
      description: Modifies the definition of an existing DataBrew recipe job.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobName"
          description: The name of the job to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EncryptionKeyArn:
                  $ref: "#/components/schemas/EncryptionKeyArn"
                EncryptionMode:
                  $ref: "#/components/schemas/EncryptionMode"
                LogSubscription:
                  $ref: "#/components/schemas/LogSubscription"
                MaxCapacity:
                  $ref: "#/components/schemas/MaxCapacity"
                MaxRetries:
                  $ref: "#/components/schemas/MaxRetries"
                Outputs:
                  $ref: "#/components/schemas/OutputList"
                DataCatalogOutputs:
                  $ref: "#/components/schemas/DataCatalogOutputList"
                DatabaseOutputs:
                  $ref: "#/components/schemas/DatabaseOutputList"
                RoleArn:
                  $ref: "#/components/schemas/Arn"
                Timeout:
                  $ref: "#/components/schemas/Timeout"
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecipeJobResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RecipeName:
      type: string
      minLength: 1
      maxLength: 255
    RecipeVersionList:
      type: array
      items:
        $ref: "#/components/schemas/RecipeVersion"
    RecipeVersion:
      type: string
      minLength: 1
      maxLength: 16
    BatchDeleteRecipeVersionResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe that was modified.
        Errors:
          $ref: "#/components/schemas/RecipeErrorList"
          description: Errors, if any, that occurred while attempting to delete the recipe versions.
      required:
        - Name
    RecipeErrorList:
      type: array
      items:
        $ref: "#/components/schemas/RecipeVersionErrorDetail"
    RecipeVersionErrorDetail:
      description: Represents any errors encountered when attempting to delete multiple recipe versions.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The HTTP status code for the error.
        ErrorMessage:
          $ref: "#/components/schemas/RecipeErrorMessage"
          description: The text of the error message.
        RecipeVersion:
          $ref: "#/components/schemas/RecipeVersion"
          description: The identifier for the recipe version associated with this error.
    ErrorCode:
      type: string
      pattern: ^[1-5][0-9][0-9]$
    RecipeErrorMessage:
      type: string
    DatasetName:
      type: string
      minLength: 1
      maxLength: 255
    InputFormat:
      type: string
      enum:
        - CSV
        - JSON
        - PARQUET
        - EXCEL
        - ORC
    FormatOptions:
      description: Represents a set of options that define the structure of either comma-separated value (CSV), Excel, or JSON input.
      type: object
      properties:
        Json:
          $ref: "#/components/schemas/JsonOptions"
          description: Options that define how JSON input is to be interpreted by DataBrew.
        Excel:
          $ref: "#/components/schemas/ExcelOptions"
          description: Options that define how Excel input is to be interpreted by DataBrew.
        Csv:
          $ref: "#/components/schemas/CsvOptions"
          description: Options that define how CSV input is to be interpreted by DataBrew.
    JsonOptions:
      description: Represents the JSON-specific options that define how input is to be interpreted by Glue DataBrew.
      type: object
      properties:
        MultiLine:
          $ref: "#/components/schemas/MultiLine"
          description: A value that specifies whether JSON input contains embedded new line characters.
    MultiLine:
      type: boolean
    ExcelOptions:
      description: Represents a set of options that define how DataBrew will interpret a Microsoft Excel file when creating a dataset from that file.
      type: object
      properties:
        SheetNames:
          $ref: "#/components/schemas/SheetNameList"
          description: One or more named sheets in the Excel file that will be included in the dataset.
        SheetIndexes:
          $ref: "#/components/schemas/SheetIndexList"
          description: One or more sheet numbers in the Excel file that will be included in the dataset.
        HeaderRow:
          $ref: "#/components/schemas/HeaderRow"
          description: A variable that specifies whether the first row in the file is parsed as the header. If this value is false, column names are auto-generated.
    SheetNameList:
      type: array
      items:
        $ref: "#/components/schemas/SheetName"
    SheetName:
      type: string
      minLength: 1
      maxLength: 31
    SheetIndexList:
      type: array
      items:
        $ref: "#/components/schemas/SheetIndex"
    SheetIndex:
      type: integer
      minimum: 0
      maximum: 200
    HeaderRow:
      type: boolean
    CsvOptions:
      description: Represents a set of options that define how DataBrew will read a comma-separated value (CSV) file when creating a dataset from that file.
      type: object
      properties:
        Delimiter:
          $ref: "#/components/schemas/Delimiter"
          description: A single character that specifies the delimiter being used in the CSV file.
        HeaderRow:
          $ref: "#/components/schemas/HeaderRow"
          description: A variable that specifies whether the first row in the file is parsed as the header. If this value is false, column names are auto-generated.
    Delimiter:
      type: string
      minLength: 1
      maxLength: 1
    Input:
      description: Represents information on how DataBrew can find data, in either the Glue Data Catalog or Amazon S3.
      type: object
      properties:
        S3InputDefinition:
          $ref: "#/components/schemas/S3Location"
          description: The Amazon S3 location where the data is stored.
        DataCatalogInputDefinition:
          $ref: "#/components/schemas/DataCatalogInputDefinition"
          description: The Glue Data Catalog parameters for the data.
        DatabaseInputDefinition:
          $ref: "#/components/schemas/DatabaseInputDefinition"
          description: Connection information for dataset input files stored in a database.
        Metadata:
          $ref: "#/components/schemas/Metadata"
          description: Contains additional resource information needed for specific datasets.
    S3Location:
      description: Represents an Amazon S3 location (bucket name, bucket owner, and object key) where DataBrew can read input data, or write output from a job.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/Bucket"
          description: The Amazon S3 bucket name.
        Key:
          $ref: "#/components/schemas/Key"
          description: The unique name of the object in the bucket.
        BucketOwner:
          $ref: "#/components/schemas/BucketOwner"
          description: The Amazon Web Services account ID of the bucket owner.
      required:
        - Bucket
    Bucket:
      type: string
      minLength: 3
      maxLength: 63
    Key:
      type: string
      minLength: 1
      maxLength: 1280
    BucketOwner:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^[0-9]{12}$
    DataCatalogInputDefinition:
      description: Represents how metadata stored in the Glue Data Catalog is defined in a DataBrew dataset.
      type: object
      properties:
        CatalogId:
          $ref: "#/components/schemas/CatalogId"
          description: The unique identifier of the Amazon Web Services account that holds the Data Catalog that stores the data.
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of a database in the Data Catalog.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of a database table in the Data Catalog. This table corresponds to a DataBrew dataset.
        TempDirectory:
          $ref: "#/components/schemas/S3Location"
          description: Represents an Amazon location where DataBrew can store intermediate results.
      required:
        - DatabaseName
        - TableName
    CatalogId:
      type: string
      minLength: 1
      maxLength: 255
    DatabaseName:
      type: string
      minLength: 1
      maxLength: 255
    TableName:
      type: string
      minLength: 1
      maxLength: 255
    DatabaseInputDefinition:
      description: Connection information for dataset input files stored in a database.
      type: object
      properties:
        GlueConnectionName:
          $ref: "#/components/schemas/GlueConnectionName"
          description: The Glue Connection that stores the connection information for the target database.
        DatabaseTableName:
          $ref: "#/components/schemas/DatabaseTableName"
          description: The table within the target database.
        TempDirectory:
          $ref: "#/components/schemas/S3Location"
        QueryString:
          $ref: "#/components/schemas/QueryString"
          description: Custom SQL to run against the provided Glue connection. This SQL will be used as the input for DataBrew projects and jobs.
      required:
        - GlueConnectionName
    GlueConnectionName:
      type: string
      minLength: 1
      maxLength: 255
    DatabaseTableName:
      type: string
      minLength: 1
      maxLength: 255
    QueryString:
      type: string
      minLength: 1
      maxLength: 10000
    Metadata:
      description: Contains additional resource information needed for specific datasets.
      type: object
      properties:
        SourceArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) associated with the dataset. Currently, DataBrew only supports ARNs from Amazon AppFlow.
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
    PathOptions:
      description: Represents a set of options that define how DataBrew selects files for a given Amazon S3 path in a dataset.
      type: object
      properties:
        LastModifiedDateCondition:
          $ref: "#/components/schemas/FilterExpression"
          description: If provided, this structure defines a date range for matching Amazon S3 objects based on their LastModifiedDate attribute in Amazon S3.
        FilesLimit:
          $ref: "#/components/schemas/FilesLimit"
          description: If provided, this structure imposes a limit on a number of files that should be selected.
        Parameters:
          type: object
          properties: {}
          description: A structure that maps names of parameters used in the Amazon S3 path of a dataset to their definitions.
    FilterExpression:
      description: "Represents a structure for defining parameter conditions. Supported conditions are described here: Supported conditions for dynamic datasets in the Glue DataBrew Developer Guide."
      type: object
      properties:
        Expression:
          $ref: "#/components/schemas/Expression"
          description: The expression which includes condition names followed by substitution variables, possibly grouped and combined with other conditions. For example, "(starts_with :prefix1 or starts_with :prefix2) and (ends_with :suffix1 or ends_with :suffix2)". Substitution variables should start with ':' symbol.
        ValuesMap:
          type: object
          properties: {}
          description: The map of substitution variable names to their values used in this filter expression.
      required:
        - Expression
        - ValuesMap
    Expression:
      type: string
      minLength: 4
      maxLength: 1024
      pattern: ^[<>0-9A-Za-z_.,:)(!= ]+$
    FilesLimit:
      description: Represents a limit imposed on number of Amazon S3 files that should be selected for a dataset from a connected Amazon S3 path.
      type: object
      properties:
        MaxFiles:
          $ref: "#/components/schemas/MaxFiles"
          description: The number of Amazon S3 files to select.
        OrderedBy:
          $ref: "#/components/schemas/OrderedBy"
          description: A criteria to use for Amazon S3 files sorting before their selection. By default uses LAST_MODIFIED_DATE as a sorting criteria. Currently it's the only allowed value.
        Order:
          $ref: "#/components/schemas/Order"
          description: A criteria to use for Amazon S3 files sorting before their selection. By default uses DESCENDING order, i.e. most recent files are selected first. Another possible value is ASCENDING.
      required:
        - MaxFiles
    MaxFiles:
      type: integer
      minimum: 1
    OrderedBy:
      type: string
      enum:
        - LAST_MODIFIED_DATE
    Order:
      type: string
      enum:
        - DESCENDING
        - ASCENDING
    TagMap:
      type: object
      properties: {}
    CreateDatasetResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset that you created.
      required:
        - Name
    EncryptionKeyArn:
      type: string
      minLength: 20
      maxLength: 2048
    EncryptionMode:
      type: string
      enum:
        - SSE-KMS
        - SSE-S3
    JobName:
      type: string
      minLength: 1
      maxLength: 240
    LogSubscription:
      type: string
      enum:
        - ENABLE
        - DISABLE
    MaxCapacity:
      type: integer
    MaxRetries:
      type: integer
      minimum: 0
    ProfileConfiguration:
      description: Configuration for profile jobs. Configuration can be used to select columns, do evaluations, and override default parameters of evaluations. When configuration is undefined, the profile job will apply default settings to all supported columns.
      type: object
      properties:
        DatasetStatisticsConfiguration:
          $ref: "#/components/schemas/StatisticsConfiguration"
          description: Configuration for inter-column evaluations. Configuration can be used to select evaluations and override parameters of evaluations. When configuration is undefined, the profile job will run all supported inter-column evaluations.
        ProfileColumns:
          $ref: "#/components/schemas/ColumnSelectorList"
          description: List of column selectors. ProfileColumns can be used to select columns from the dataset. When ProfileColumns is undefined, the profile job will profile all supported columns.
        ColumnStatisticsConfigurations:
          $ref: "#/components/schemas/ColumnStatisticsConfigurationList"
          description: List of configurations for column evaluations. ColumnStatisticsConfigurations are used to select evaluations and override parameters of evaluations for particular columns. When ColumnStatisticsConfigurations is undefined, the profile job will profile all supported columns and run all supported evaluations.
        EntityDetectorConfiguration:
          $ref: "#/components/schemas/EntityDetectorConfiguration"
          description: Configuration of entity detection for a profile job. When undefined, entity detection is disabled.
    StatisticsConfiguration:
      description: Configuration of evaluations for a profile job. This configuration can be used to select evaluations and override the parameters of selected evaluations.
      type: object
      properties:
        IncludedStatistics:
          $ref: "#/components/schemas/StatisticList"
          description: List of included evaluations. When the list is undefined, all supported evaluations will be included.
        Overrides:
          $ref: "#/components/schemas/StatisticOverrideList"
          description: List of overrides for evaluations.
    StatisticList:
      type: array
      items:
        $ref: "#/components/schemas/Statistic"
    Statistic:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[A-Z\_]+$
    StatisticOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/StatisticOverride"
    StatisticOverride:
      description: Override of a particular evaluation for a profile job.
      type: object
      properties:
        Statistic:
          $ref: "#/components/schemas/Statistic"
          description: The name of an evaluation
        Parameters:
          type: object
          properties: {}
          description: A map that includes overrides of an evaluation’s parameters.
      required:
        - Statistic
        - Parameters
    ColumnSelectorList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnSelector"
    ColumnSelector:
      description: Selector of a column from a dataset for profile job configuration. One selector includes either a column name or a regular expression.
      type: object
      properties:
        Regex:
          $ref: "#/components/schemas/ColumnName"
          description: A regular expression for selecting a column from a dataset.
        Name:
          $ref: "#/components/schemas/ColumnName"
          description: The name of a column from a dataset.
    ColumnName:
      type: string
      minLength: 1
      maxLength: 255
    ColumnStatisticsConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnStatisticsConfiguration"
    ColumnStatisticsConfiguration:
      description: Configuration for column evaluations for a profile job. ColumnStatisticsConfiguration can be used to select evaluations and override parameters of evaluations for particular columns.
      type: object
      properties:
        Selectors:
          $ref: "#/components/schemas/ColumnSelectorList"
          description: List of column selectors. Selectors can be used to select columns from the dataset. When selectors are undefined, configuration will be applied to all supported columns.
        Statistics:
          $ref: "#/components/schemas/StatisticsConfiguration"
          description: Configuration for evaluations. Statistics can be used to select evaluations and override parameters of evaluations.
      required:
        - Statistics
    EntityDetectorConfiguration:
      description: Configuration of entity detection for a profile job. When undefined, entity detection is disabled.
      type: object
      properties:
        EntityTypes:
          $ref: "#/components/schemas/EntityTypeList"
          description: "Entity types to detect. Can be any of the following: USA_SSN EMAIL USA_ITIN USA_PASSPORT_NUMBER PHONE_NUMBER USA_DRIVING_LICENSE BANK_ACCOUNT CREDIT_CARD IP_ADDRESS MAC_ADDRESS USA_DEA_NUMBER USA_HCPCS_CODE USA_NATIONAL_PROVIDER_IDENTIFIER USA_NATIONAL_DRUG_CODE USA_HEALTH_INSURANCE_CLAIM_NUMBER USA_MEDICARE_BENEFICIARY_IDENTIFIER USA_CPT_CODE PERSON_NAME DATE The Entity type group USA_ALL is also supported, and includes all of the above entity types except PERSON_NAME and DATE."
        AllowedStatistics:
          $ref: "#/components/schemas/AllowedStatisticList"
          description: Configuration of statistics that are allowed to be run on columns that contain detected entities. When undefined, no statistics will be computed on columns that contain detected entities.
      required:
        - EntityTypes
    EntityTypeList:
      type: array
      items:
        $ref: "#/components/schemas/EntityType"
    EntityType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[A-Z_][A-Z\\d_]*$
    AllowedStatisticList:
      type: array
      items:
        $ref: "#/components/schemas/AllowedStatistics"
    AllowedStatistics:
      description: Configuration of statistics that are allowed to be run on columns that contain detected entities. When undefined, no statistics will be computed on columns that contain detected entities.
      type: object
      properties:
        Statistics:
          $ref: "#/components/schemas/StatisticList"
          description: One or more column statistics to allow for columns that contain detected entities.
      required:
        - Statistics
    ValidationConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/ValidationConfiguration"
    ValidationConfiguration:
      description: Configuration for data quality validation. Used to select the Rulesets and Validation Mode to be used in the profile job. When ValidationConfiguration is null, the profile job will run without data quality validation.
      type: object
      properties:
        RulesetArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the ruleset to be validated in the profile job. The TargetArn of the selected ruleset should be the same as the Amazon Resource Name (ARN) of the dataset that is associated with the profile job.
        ValidationMode:
          $ref: "#/components/schemas/ValidationMode"
          description: Mode of data quality validation. Default mode is “CHECK_ALL” which verifies all rules defined in the selected ruleset.
      required:
        - RulesetArn
    ValidationMode:
      type: string
      enum:
        - CHECK_ALL
    Timeout:
      type: integer
      minimum: 0
    JobSample:
      description: A sample configuration for profile jobs only, which determines the number of rows on which the profile job is run. If a JobSample value isn't provided, the default is used. The default value is CUSTOM_ROWS for the mode parameter and 20,000 for the size parameter.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/SampleMode"
          description: "A value that determines whether the profile job is run on the entire dataset or a specified number of rows. This value must be one of the following: FULL_DATASET - The profile job is run on the entire dataset. CUSTOM_ROWS - The profile job is run on the number of rows specified in the Size parameter."
        Size:
          $ref: "#/components/schemas/JobSize"
          description: The Size parameter is only required when the mode is CUSTOM_ROWS. The profile job is run on the specified number of rows. The maximum value for size is Long.MAX_VALUE. Long.MAX_VALUE = 9223372036854775807
    SampleMode:
      type: string
      enum:
        - FULL_DATASET
        - CUSTOM_ROWS
    JobSize:
      type: integer
      format: int64
    CreateProfileJobResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/JobName"
          description: The name of the job that was created.
      required:
        - Name
    ProjectName:
      type: string
      minLength: 1
      maxLength: 255
    Sample:
      description: Represents the sample size and sampling type for DataBrew to use for interactive data analysis.
      type: object
      properties:
        Size:
          $ref: "#/components/schemas/SampleSize"
          description: The number of rows in the sample.
        Type:
          $ref: "#/components/schemas/SampleType"
          description: The way in which DataBrew obtains rows from a dataset.
      required:
        - Type
    SampleSize:
      type: integer
      minimum: 1
      maximum: 5000
    SampleType:
      type: string
      enum:
        - FIRST_N
        - LAST_N
        - RANDOM
    CreateProjectResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ProjectName"
          description: The name of the project that you created.
      required:
        - Name
    RecipeDescription:
      type: string
      maxLength: 1024
    RecipeStepList:
      type: array
      items:
        $ref: "#/components/schemas/RecipeStep"
    RecipeStep:
      description: Represents a single step from a DataBrew recipe to be performed.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/RecipeAction"
          description: The particular action to be performed in the recipe step.
        ConditionExpressions:
          $ref: "#/components/schemas/ConditionExpressionList"
          description: One or more conditions that must be met for the recipe step to succeed. All of the conditions in the array must be met. In other words, all of the conditions must be combined using a logical AND operation.
      required:
        - Action
    RecipeAction:
      description: Represents a transformation and associated parameters that are used to apply a change to a DataBrew dataset. For more information, see Recipe actions reference.
      type: object
      properties:
        Operation:
          $ref: "#/components/schemas/Operation"
          description: The name of a valid DataBrew transformation to be performed on the data.
        Parameters:
          type: object
          properties: {}
          description: Contextual parameters for the transformation.
      required:
        - Operation
    Operation:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[A-Z\_]+$
    ConditionExpressionList:
      type: array
      items:
        $ref: "#/components/schemas/ConditionExpression"
    ConditionExpression:
      description: Represents an individual condition that evaluates to true or false. Conditions are used with recipe actions. The action is only performed for column values where the condition evaluates to true. If a recipe requires more than one condition, then the recipe must specify multiple ConditionExpression elements. Each condition is applied to the rows in a dataset first, before the recipe action is performed.
      type: object
      properties:
        Condition:
          $ref: "#/components/schemas/Condition"
          description: A specific condition to apply to a recipe action. For more information, see Recipe structure in the Glue DataBrew Developer Guide.
        Value:
          $ref: "#/components/schemas/ConditionValue"
          description: A value that the condition must evaluate to for the condition to succeed.
        TargetColumn:
          $ref: "#/components/schemas/TargetColumn"
          description: A column to apply this condition to.
      required:
        - Condition
        - TargetColumn
    Condition:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[A-Z\_]+$
    ConditionValue:
      type: string
      maxLength: 1024
    TargetColumn:
      type: string
      minLength: 1
      maxLength: 1024
    CreateRecipeResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe that you created.
      required:
        - Name
    OutputList:
      type: array
      items:
        $ref: "#/components/schemas/Output"
    Output:
      description: Represents options that specify how and where in Amazon S3 DataBrew writes the output generated by recipe jobs or profile jobs.
      type: object
      properties:
        CompressionFormat:
          $ref: "#/components/schemas/CompressionFormat"
          description: The compression algorithm used to compress the output text of the job.
        Format:
          $ref: "#/components/schemas/OutputFormat"
          description: The data format of the output of the job.
        PartitionColumns:
          $ref: "#/components/schemas/ColumnNameList"
          description: The names of one or more partition columns for the output of the job.
        Location:
          $ref: "#/components/schemas/S3Location"
          description: The location in Amazon S3 where the job writes its output.
        Overwrite:
          $ref: "#/components/schemas/OverwriteOutput"
          description: A value that, if true, means that any data in the location specified for output is overwritten with new output.
        FormatOptions:
          $ref: "#/components/schemas/OutputFormatOptions"
          description: Represents options that define how DataBrew formats job output files.
        MaxOutputFiles:
          $ref: "#/components/schemas/MaxOutputFiles"
          description: Maximum number of files to be generated by the job and written to the output folder. For output partitioned by column(s), the MaxOutputFiles value is the maximum number of files per partition.
      required:
        - Location
    CompressionFormat:
      type: string
      enum:
        - GZIP
        - LZ4
        - SNAPPY
        - BZIP2
        - DEFLATE
        - LZO
        - BROTLI
        - ZSTD
        - ZLIB
    OutputFormat:
      type: string
      enum:
        - CSV
        - JSON
        - PARQUET
        - GLUEPARQUET
        - AVRO
        - ORC
        - XML
        - TABLEAUHYPER
    ColumnNameList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnName"
    OverwriteOutput:
      type: boolean
    OutputFormatOptions:
      description: Represents a set of options that define the structure of comma-separated (CSV) job output.
      type: object
      properties:
        Csv:
          $ref: "#/components/schemas/CsvOutputOptions"
          description: Represents a set of options that define the structure of comma-separated value (CSV) job output.
    CsvOutputOptions:
      description: Represents a set of options that define how DataBrew will write a comma-separated value (CSV) file.
      type: object
      properties:
        Delimiter:
          $ref: "#/components/schemas/Delimiter"
          description: A single character that specifies the delimiter used to create CSV job output.
    MaxOutputFiles:
      type: integer
      minimum: 1
      maximum: 999
    DataCatalogOutputList:
      type: array
      items:
        $ref: "#/components/schemas/DataCatalogOutput"
    DataCatalogOutput:
      description: Represents options that specify how and where in the Glue Data Catalog DataBrew writes the output generated by recipe jobs.
      type: object
      properties:
        CatalogId:
          $ref: "#/components/schemas/CatalogId"
          description: The unique identifier of the Amazon Web Services account that holds the Data Catalog that stores the data.
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of a database in the Data Catalog.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of a table in the Data Catalog.
        S3Options:
          $ref: "#/components/schemas/S3TableOutputOptions"
          description: Represents options that specify how and where DataBrew writes the Amazon S3 output generated by recipe jobs.
        DatabaseOptions:
          $ref: "#/components/schemas/DatabaseTableOutputOptions"
          description: Represents options that specify how and where DataBrew writes the database output generated by recipe jobs.
        Overwrite:
          $ref: "#/components/schemas/OverwriteOutput"
          description: A value that, if true, means that any data in the location specified for output is overwritten with new output. Not supported with DatabaseOptions.
      required:
        - DatabaseName
        - TableName
    S3TableOutputOptions:
      description: Represents options that specify how and where DataBrew writes the Amazon S3 output generated by recipe jobs.
      type: object
      properties:
        Location:
          $ref: "#/components/schemas/S3Location"
          description: Represents an Amazon S3 location (bucket name and object key) where DataBrew can write output from a job.
      required:
        - Location
    DatabaseTableOutputOptions:
      description: Represents options that specify how and where DataBrew writes the database output generated by recipe jobs.
      type: object
      properties:
        TempDirectory:
          $ref: "#/components/schemas/S3Location"
          description: Represents an Amazon S3 location (bucket name and object key) where DataBrew can store intermediate results.
        TableName:
          $ref: "#/components/schemas/DatabaseTableName"
          description: A prefix for the name of a table DataBrew will create in the database.
      required:
        - TableName
    DatabaseOutputList:
      type: array
      items:
        $ref: "#/components/schemas/DatabaseOutput"
    DatabaseOutput:
      description: Represents a JDBC database output object which defines the output destination for a DataBrew recipe job to write into.
      type: object
      properties:
        GlueConnectionName:
          $ref: "#/components/schemas/GlueConnectionName"
          description: The Glue connection that stores the connection information for the target database.
        DatabaseOptions:
          $ref: "#/components/schemas/DatabaseTableOutputOptions"
          description: Represents options that specify how and where DataBrew writes the database output generated by recipe jobs.
        DatabaseOutputMode:
          $ref: "#/components/schemas/DatabaseOutputMode"
          description: "The output mode to write into the database. Currently supported option: NEW_TABLE."
      required:
        - GlueConnectionName
        - DatabaseOptions
    DatabaseOutputMode:
      type: string
      enum:
        - NEW_TABLE
    RecipeReference:
      description: Represents the name and version of a DataBrew recipe.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RecipeName"
          description: The name of the recipe.
        RecipeVersion:
          $ref: "#/components/schemas/RecipeVersion"
          description: The identifier for the version for the recipe.
      required:
        - Name
    CreateRecipeJobResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/JobName"
          description: The name of the job that you created.
      required:
        - Name
    RulesetName:
      type: string
      minLength: 1
      maxLength: 255
    RulesetDescription:
      type: string
      maxLength: 1024
    RuleList:
      type: array
      items:
        $ref: "#/components/schemas/Rule"
    Rule:
      description: Represents a single data quality requirement that should be validated in the scope of this dataset.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RuleName"
          description: The name of the rule.
        Disabled:
          $ref: "#/components/schemas/Disabled"
          description: A value that specifies whether the rule is disabled. Once a rule is disabled, a profile job will not validate it during a job run. Default value is false.
        CheckExpression:
          $ref: "#/components/schemas/Expression"
          description: The expression which includes column references, condition names followed by variable references, possibly grouped and combined with other conditions. For example, (:col1 starts_with :prefix1 or :col1 starts_with :prefix2) and (:col1 ends_with :suffix1 or :col1 ends_with :suffix2). Column and value references are substitution variables that should start with the ':' symbol. Depending on the context, substitution variables' values can be either an actual value or a column name. These values are defined in the SubstitutionMap. If a CheckExpression starts with a column reference, then ColumnSelectors in the rule should be null. If ColumnSelectors has been defined, then there should be no column reference in the left side of a condition, for example, is_between :val1 and :val2. For more information, see Available checks
        SubstitutionMap:
          type: object
          properties: {}
          description: "The map of substitution variable names to their values used in a check expression. Variable names should start with a ':' (colon). Variable values can either be actual values or column names. To differentiate between the two, column names should be enclosed in backticks, for example, \":col1\": \"`Column A`\"."
        Threshold:
          $ref: "#/components/schemas/Threshold"
          description: The threshold used with a non-aggregate check expression. Non-aggregate check expressions will be applied to each row in a specific column, and the threshold will be used to determine whether the validation succeeds.
        ColumnSelectors:
          $ref: "#/components/schemas/ColumnSelectorList"
          description: List of column selectors. Selectors can be used to select columns using a name or regular expression from the dataset. Rule will be applied to selected columns.
      required:
        - Name
        - CheckExpression
    RuleName:
      type: string
      minLength: 1
      maxLength: 128
    Disabled:
      type: boolean
    Threshold:
      description: The threshold used with a non-aggregate check expression. The non-aggregate check expression will be applied to each row in a specific column. Then the threshold will be used to determine whether the validation succeeds.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/ThresholdValue"
          description: The value of a threshold.
        Type:
          $ref: "#/components/schemas/ThresholdType"
          description: The type of a threshold. Used for comparison of an actual count of rows that satisfy the rule to the threshold value.
        Unit:
          $ref: "#/components/schemas/ThresholdUnit"
          description: Unit of threshold value. Can be either a COUNT or PERCENTAGE of the full sample size used for validation.
      required:
        - Value
    ThresholdValue:
      type: number
      format: double
      minimum: 0
    ThresholdType:
      type: string
      enum:
        - GREATER_THAN_OR_EQUAL
        - LESS_THAN_OR_EQUAL
        - GREATER_THAN
        - LESS_THAN
    ThresholdUnit:
      type: string
      enum:
        - COUNT
        - PERCENTAGE
