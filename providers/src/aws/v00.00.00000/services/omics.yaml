components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SequenceStoreId:
      type: string
      minLength: 10
      maxLength: 36
      pattern: "[0-9]+"
    UploadId:
      type: string
      minLength: 10
      maxLength: 36
      pattern: "[0-9]+"
    AbortMultipartReadSetUploadResponse:
      type: object
    String:
      type: string
    AcceptShareResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ShareStatus"
          description: The status of the resource share.
    ShareStatus:
      type: string
      enum:
        - PENDING
        - ACTIVATING
        - ACTIVE
        - DELETING
        - DELETED
        - FAILED
    ReadSetIdList:
      type: array
      items:
        $ref: "#/components/schemas/ReadSetId"
    ReadSetId:
      type: string
      minLength: 10
      maxLength: 36
      pattern: "[0-9]+"
    BatchDeleteReadSetResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/ReadSetBatchErrorList"
          description: Errors returned by individual delete operations.
    ReadSetBatchErrorList:
      type: array
      items:
        $ref: "#/components/schemas/ReadSetBatchError"
    ReadSetBatchError:
      description: An error from a batch read set operation.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ReadSetId"
          description: The error's ID.
        code:
          $ref: "#/components/schemas/String"
          description: The error's code.
        message:
          $ref: "#/components/schemas/String"
          description: The error's message.
      required:
        - id
        - code
        - message
    ResourceId:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    CancelAnnotationImportResponse:
      type: object
    RunId:
      type: string
      minLength: 1
      maxLength: 18
      pattern: "[0-9]+"
    BatchId:
      type: string
      minLength: 1
      maxLength: 18
      pattern: "[0-9]+"
    CancelRunBatchResponse:
      type: object
    CancelVariantImportResponse:
      type: object
    CompleteReadSetUploadPartList:
      type: array
      items:
        $ref: "#/components/schemas/CompleteReadSetUploadPartListItem"
    CompleteReadSetUploadPartListItem:
      description: Part of the response to the CompleteReadSetUpload API, including metadata.
      type: object
      properties:
        partNumber:
          $ref: "#/components/schemas/CompleteReadSetUploadPartListItemPartNumberInteger"
          description: A number identifying the part in a read set upload.
        partSource:
          $ref: "#/components/schemas/ReadSetPartSource"
          description: The source file of the part being uploaded.
        checksum:
          $ref: "#/components/schemas/CompleteReadSetUploadPartListItemChecksumString"
          description: A unique identifier used to confirm that parts are being added to the correct upload.
      required:
        - partNumber
        - partSource
        - checksum
    CompleteReadSetUploadPartListItemPartNumberInteger:
      type: integer
      minimum: 1
      maximum: 10000
    ReadSetPartSource:
      type: string
      enum:
        - SOURCE1
        - SOURCE2
    CompleteReadSetUploadPartListItemChecksumString:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    CompleteMultipartReadSetUploadResponse:
      type: object
      properties:
        readSetId:
          $ref: "#/components/schemas/ReadSetId"
          description: The read set ID created for an uploaded read set.
      required:
        - readSetId
    ReferenceItem:
      description: A genome reference.
      type: object
      properties:
        referenceArn:
          $ref: "#/components/schemas/ReferenceArn"
          description: The reference's ARN.
    ReferenceArn:
      type: string
      minLength: 1
      maxLength: 127
      pattern: arn:.+
    StoreName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: ([a-z]){1}([a-z0-9_]){2,254}
    Description:
      type: string
      minLength: 0
      maxLength: 500
    TagMap:
      type: object
      properties: {}
    VersionName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: ([a-z]){1}([a-z0-9_]){2,254}
    SseConfig:
      description: Server-side encryption (SSE) settings for a store.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EncryptionType"
          description: The encryption type.
        keyArn:
          $ref: "#/components/schemas/SseConfigKeyArnString"
          description: An encryption key ARN.
      required:
        - type_
    EncryptionType:
      type: string
      enum:
        - KMS
    SseConfigKeyArnString:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ".*arn:([^: ]*):([^: ]*):([^: ]*):([0-9]{12}):([^: ]*).*"
    StoreFormat:
      type: string
      enum:
        - GFF
        - TSV
        - VCF
    StoreOptions:
      description: Settings for a store.
      type: object
      properties:
        tsvStoreOptions:
          $ref: "#/components/schemas/TsvStoreOptions"
          description: File settings for a TSV store.
    TsvStoreOptions:
      description: File settings for a TSV store.
      type: object
      properties:
        annotationType:
          $ref: "#/components/schemas/AnnotationType"
          description: The store's annotation type.
        formatToHeader:
          type: object
          properties: {}
          description: The store's header key to column name mapping.
        schema:
          $ref: "#/components/schemas/TsvStoreOptionsSchemaList"
          description: The store's schema.
    AnnotationType:
      type: string
      enum:
        - GENERIC
        - CHR_POS
        - CHR_POS_REF_ALT
        - CHR_START_END_ONE_BASE
        - CHR_START_END_REF_ALT_ONE_BASE
        - CHR_START_END_ZERO_BASE
        - CHR_START_END_REF_ALT_ZERO_BASE
    TsvStoreOptionsSchemaList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaItem"
    SchemaItem:
      type: object
      properties: {}
    CreateAnnotationStoreResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
          description: The store's ID.
        reference:
          $ref: "#/components/schemas/ReferenceItem"
          description: The store's genome reference. Required for all stores except TSV format with generic annotations.
        storeFormat:
          $ref: "#/components/schemas/StoreFormat"
          description: The annotation file format of the store.
        storeOptions:
          $ref: "#/components/schemas/StoreOptions"
          description: The store's file parsing options.
        status:
          $ref: "#/components/schemas/StoreStatus"
          description: The store's status.
        name:
          $ref: "#/components/schemas/String"
          description: The store's name.
        versionName:
          $ref: "#/components/schemas/VersionName"
          description: The name given to an annotation store version to distinguish it from other versions.
        creationTime:
          $ref: "#/components/schemas/CreationTime"
          description: When the store was created.
      required:
        - id
        - status
        - name
        - versionName
        - creationTime
    StoreStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - ACTIVE
        - FAILED
    CreationTime:
      type: string
      format: date-time
    VersionOptions:
      description: The options for an annotation store version.
      type: object
      properties:
        tsvVersionOptions:
          $ref: "#/components/schemas/TsvVersionOptions"
          description: File settings for a version of a TSV store.
    TsvVersionOptions:
      description: The options for a TSV file.
      type: object
      properties:
        annotationType:
          $ref: "#/components/schemas/AnnotationType"
          description: The store version's annotation type.
        formatToHeader:
          type: object
          properties: {}
          description: The annotation store version's header key to column name mapping.
        schema:
          $ref: "#/components/schemas/TsvVersionOptionsSchemaList"
          description: The TSV schema for an annotation store version.
    TsvVersionOptionsSchemaList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaItem"
    CreateAnnotationStoreVersionResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceId"
          description: A generated ID for the annotation store
        versionName:
          $ref: "#/components/schemas/VersionName"
          description: The name given to an annotation store version to distinguish it from other versions.
        storeId:
          $ref: "#/components/schemas/ResourceId"
          description: The ID for the annotation store from which new versions are being created.
        versionOptions:
          $ref: "#/components/schemas/VersionOptions"
          description: The options for an annotation store version.
        name:
          $ref: "#/components/schemas/StoreName"
          description: The name given to an annotation store version to distinguish it from other versions.
        status:
          $ref: "#/components/schemas/VersionStatus"
          description: The status of a annotation store version.
        creationTime:
          $ref: "#/components/schemas/CreationTime"
          description: The time stamp for the creation of an annotation store version.
      required:
        - id
        - versionName
        - storeId
        - name
        - status
        - creationTime
    VersionStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - ACTIVE
        - FAILED
    ConfigurationName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9][A-Za-z0-9\\-\\._]*"
    ConfigurationDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    RunConfigurations:
      description: Run-specific configuration settings.
      type: object
      properties:
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: VPC configuration for workflow runs.
    VpcConfig:
      description: VPC configuration for workflow runs.
      type: object
      properties:
        securityGroupIds:
          $ref: "#/components/schemas/VpcConfigSecurityGroupIdsList"
          description: List of security group IDs. Maximum of 5 security groups allowed.
        subnetIds:
          $ref: "#/components/schemas/VpcConfigSubnetIdsList"
          description: List of subnet IDs. Maximum of 16 subnets allowed.
    VpcConfigSecurityGroupIdsList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 4
      maxLength: 128
      pattern: sg-[0-9a-f]+
    VpcConfigSubnetIdsList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 8
      maxLength: 128
      pattern: subnet-[0-9a-f]+
    ConfigurationRequestId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    CreateConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ConfigurationArn"
          description: Unique resource identifier for the configuration.
        uuid:
          $ref: "#/components/schemas/ConfigurationUuid"
          description: Unique identifier for the configuration.
        name:
          $ref: "#/components/schemas/ConfigurationName"
          description: User-friendly name for the configuration.
        description:
          $ref: "#/components/schemas/ConfigurationDescription"
          description: Description for the configuration.
        runConfigurations:
          $ref: "#/components/schemas/RunConfigurationsResponse"
          description: Run-specific configurations.
        status:
          $ref: "#/components/schemas/ConfigurationStatus"
          description: Current configuration status.
        creationTime:
          $ref: "#/components/schemas/ConfigurationTimestamp"
          description: Configuration creation timestamp.
        tags:
          type: object
          properties: {}
          description: Tags for the configuration.
    ConfigurationArn:
      type: string
      minLength: 1
      maxLength: 190
      pattern: arn:.+
    ConfigurationUuid:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    RunConfigurationsResponse:
      description: Run-specific configuration settings with computed values.
      type: object
      properties:
        vpcConfig:
          $ref: "#/components/schemas/VpcConfigResponse"
          description: VPC configuration for workflow runs with computed VPC ID.
    VpcConfigResponse:
      description: VPC configuration for workflow runs with computed VPC ID.
      type: object
      properties:
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: List of security group IDs.
        subnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: List of subnet IDs.
        vpcId:
          $ref: "#/components/schemas/VpcId"
          description: VPC ID computed from the provided subnet IDs.
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    VpcId:
      type: string
      minLength: 5
      maxLength: 128
      pattern: vpc-[0-9a-f]+
    ConfigurationStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - DELETED
        - FAILED
    ConfigurationTimestamp:
      type: string
      format: date-time
    ClientToken:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    FileType:
      type: string
      enum:
        - FASTQ
        - BAM
        - CRAM
        - UBAM
    SubjectId:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    SampleId:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    GeneratedFrom:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    ReadSetName:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    ReadSetDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    CreateMultipartReadSetUploadResponse:
      type: object
      properties:
        sequenceStoreId:
          $ref: "#/components/schemas/SequenceStoreId"
          description: The sequence store ID for the store that the read set will be created in.
        uploadId:
          $ref: "#/components/schemas/UploadId"
          description: The ID for the initiated multipart upload.
        sourceFileType:
          $ref: "#/components/schemas/FileType"
          description: The file type of the read set source.
        subjectId:
          $ref: "#/components/schemas/SubjectId"
          description: The source's subject ID.
        sampleId:
          $ref: "#/components/schemas/SampleId"
          description: The source's sample ID.
        generatedFrom:
          $ref: "#/components/schemas/GeneratedFrom"
          description: The source of the read set.
        referenceArn:
          $ref: "#/components/schemas/ReferenceArn"
          description: The read set source's reference ARN.
        name:
          $ref: "#/components/schemas/ReadSetName"
          description: The name of the read set.
        description:
          $ref: "#/components/schemas/ReadSetDescription"
          description: The description of the read set.
        tags:
          type: object
          properties: {}
          description: The tags to add to the read set.
        creationTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The creation time of the multipart upload.
      required:
        - sequenceStoreId
        - uploadId
        - sourceFileType
        - subjectId
        - sampleId
        - referenceArn
        - creationTime
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    ReferenceStoreName:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    ReferenceStoreDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    CreateReferenceStoreResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ReferenceStoreId"
          description: The store's ID.
        arn:
          $ref: "#/components/schemas/ReferenceStoreArn"
          description: The store's ARN.
        name:
          $ref: "#/components/schemas/ReferenceStoreName"
          description: The store's name.
        description:
          $ref: "#/components/schemas/ReferenceStoreDescription"
          description: The store's description.
        sseConfig:
          $ref: "#/components/schemas/SseConfig"
          description: The store's SSE settings.
        creationTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: When the store was created.
      required:
        - id
        - arn
        - creationTime
    ReferenceStoreId:
      type: string
      minLength: 10
      maxLength: 36
      pattern: "[0-9]+"
    ReferenceStoreArn:
      type: string
      minLength: 1
      maxLength: 127
      pattern: arn:.+
    CacheBehavior:
      type: string
      enum:
        - CACHE_ON_FAILURE
        - CACHE_ALWAYS
      minLength: 1
      maxLength: 64
    S3UriForBucketOrObject:
      description: Uri to a S3 object or bucket
      type: string
      pattern: s3://([a-z0-9][a-z0-9-.]{1,61}[a-z0-9])(/(.{0,1024}))?
    UserCustomDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    UserCustomName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    RunCacheRequestId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    AwsAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]+"
    CreateRunCacheResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RunCacheArn"
          description: Unique resource identifier for the run cache.
        id:
          $ref: "#/components/schemas/RunCacheId"
          description: Identifier for the run cache.
        status:
          $ref: "#/components/schemas/RunCacheStatus"
          description: Run cache status.
        tags:
          type: object
          properties: {}
          description: The tags associated with this run cache.
    RunCacheArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:.+
    RunCacheId:
      type: string
      minLength: 1
      maxLength: 18
      pattern: "[0-9]+"
    RunCacheStatus:
      type: string
      enum:
        - ACTIVE
        - DELETED
        - FAILED
      minLength: 1
      maxLength: 64
    RunGroupName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    CreateRunGroupRequestMaxCpusInteger:
      type: integer
      minimum: 1
      maximum: 100000
    CreateRunGroupRequestMaxRunsInteger:
      type: integer
      minimum: 1
      maximum: 100000
    CreateRunGroupRequestMaxDurationInteger:
      type: integer
      minimum: 1
      maximum: 100000
    RunGroupRequestId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    CreateRunGroupRequestMaxGpusInteger:
      type: integer
      minimum: 1
      maximum: 100000
    CreateRunGroupResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RunGroupArn"
          description: The group's ARN.
        id:
          $ref: "#/components/schemas/RunGroupId"
          description: The group's ID.
        tags:
          type: object
          properties: {}
          description: Tags for the run group.
    RunGroupArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:.+
    RunGroupId:
      type: string
      minLength: 1
      maxLength: 18
      pattern: "[0-9]+"
    SequenceStoreName:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    SequenceStoreDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\p{L}||\\p{M}||\\p{Z}||\\p{S}||\\p{N}||\\p{P}]+"
    FallbackLocation:
      type: string
      pattern: $|^s3://([a-z0-9][a-z0-9-.]{1,61}[a-z0-9])/?((.{1,1024})/)?
    ETagAlgorithmFamily:
      type: string
      enum:
        - MD5up
        - SHA256up
        - SHA512up
    PropagatedSetLevelTags:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    S3AccessConfig:
      description: S3 access configuration parameters.
      type: object
      properties:
        accessLogLocation:
          $ref: "#/components/schemas/AccessLogLocation"
          description: Location of the access logs.
    AccessLogLocation:
      type: string
      pattern: $|^s3://([a-z0-9][a-z0-9-.]{1,61}[a-z0-9])/?((.{1,800})/)?
    CreateSequenceStoreResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/SequenceStoreId"
          description: The store's ID.
        arn:
          $ref: "#/components/schemas/SequenceStoreArn"
          description: The store's ARN.
        name:
          $ref: "#/components/schemas/SequenceStoreName"
          description: The store's name.
        description:
          $ref: "#/components/schemas/SequenceStoreDescription"
          description: The store's description.
        sseConfig:
          $ref: "#/components/schemas/SseConfig"
          description: Server-side encryption (SSE) settings for the store. This contains the KMS key ARN that is used to encrypt read set objects.
        creationTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: When the store was created.
        fallbackLocation:
          $ref: "#/components/schemas/FallbackLocation"
          description: An S3 location that is used to store files that have failed a direct upload.
        eTagAlgorithmFamily:
          $ref: "#/components/schemas/ETagAlgorithmFamily"
          description: The algorithm family of the ETag.
        status:
          $ref: "#/components/schemas/SequenceStoreStatus"
          description: The status of the sequence store.
        statusMessage:
          $ref: "#/components/schemas/SequenceStoreStatusMessage"
          description: The status message of the sequence store.
        propagatedSetLevelTags:
          $ref: "#/components/schemas/PropagatedSetLevelTags"
          description: The tags keys to propagate to the S3 objects associated with read sets in the sequence store.
        s3Access:
          $ref: "#/components/schemas/SequenceStoreS3Access"
      required:
        - id
        - arn
        - creationTime
    SequenceStoreArn:
      type: string
      minLength: 1
      maxLength: 127
      pattern: arn:.+
    SequenceStoreStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - DELETING
        - FAILED
    SequenceStoreStatusMessage:
      type: string
      minLength: 1
      maxLength: 127
