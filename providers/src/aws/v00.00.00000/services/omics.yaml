          description: The IAM role ARN that grants HealthOmics permissions to access required AWS resources such as Amazon S3 and CloudWatch. The role must have the same permissions required for individual StartRun calls.
        name:
          $ref: "#/components/schemas/RunName"
          description: An optional user-friendly name applied to each workflow run. Can be overridden per run.
        cacheId:
          $ref: "#/components/schemas/NumericIdInArn"
          description: The identifier of the run cache to associate with the runs.
        cacheBehavior:
          $ref: "#/components/schemas/CacheBehavior"
          description: The cache behavior for the runs. Requires cacheId to be set.
        runGroupId:
          $ref: "#/components/schemas/RunGroupId"
          description: The ID of the run group to contain all workflow runs in the batch.
        priority:
          $ref: "#/components/schemas/DefaultRunSettingPriorityInteger"
          description: An integer priority for the workflow runs. Higher values correspond to higher priority. A value of 0 corresponds to the lowest priority. Can be overridden per run.
        parameters:
          $ref: "#/components/schemas/RunParameters"
          description: Workflow parameter names and values shared across all runs. Merged with per-run parameters; run-specific values take precedence when keys overlap. Can be overridden per run.
        storageCapacity:
          $ref: "#/components/schemas/DefaultRunSettingStorageCapacityInteger"
          description: The filesystem size in gibibytes (GiB) provisioned for each workflow run and shared by all tasks in that run. Defaults to 1200 GiB if not specified.
        outputUri:
          $ref: "#/components/schemas/RunOutputUri"
          description: The destination S3 URI for workflow outputs. Must begin with s3://. The roleArn must grant write permissions to this bucket. Can be overridden per run.
        logLevel:
          $ref: "#/components/schemas/RunLogLevel"
          description: The verbosity level for CloudWatch Logs emitted during each run.
        runTags:
          type: object
          properties: {}
          description: AWS tags to associate with each workflow run. Merged with per-run runTags; run-specific values take precedence when keys overlap.
        retentionMode:
          $ref: "#/components/schemas/RunRetentionMode"
          description: The retention behavior for runs after completion.
        storageType:
          $ref: "#/components/schemas/StorageType"
          description: The storage type for the workflow runs.
        workflowOwnerId:
          $ref: "#/components/schemas/WorkflowOwnerId"
          description: The AWS account ID of the workflow owner, used for cross-account workflow sharing.
        outputBucketOwnerId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The expected AWS account ID of the owner of the output S3 bucket. Can be overridden per run.
        workflowVersionName:
          $ref: "#/components/schemas/WorkflowVersionName"
          description: The version name of the specified workflow.
        networkingMode:
          $ref: "#/components/schemas/NetworkingMode"
          description: Optional configuration for run networking behavior. If not specified, this will default to RESTRICTED.
        configurationName:
          $ref: "#/components/schemas/ConfigurationName"
          description: Optional configuration name to use for the workflow run.
      required:
        - workflowId
        - roleArn
