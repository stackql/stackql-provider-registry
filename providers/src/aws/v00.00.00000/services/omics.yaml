openapi: 3.0.0
info:
  version: "2022-11-28"
  title: Amazon Omics
  description: Amazon Omics
  x-serviceName: omics
  x-serviceAlias: omics
  x-protocol: rest-json
  x-apiVersion: "2022-11-28"
  x-endpointPrefix: omics
servers:
  - url: https://omics.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for omics
paths:
  /sequencestore/{sequence_store_id}/upload/{upload_id}/abort:
    delete:
      operationId: AbortMultipartReadSetUpload
      description: Stops a multipart read set upload into a sequence store and returns a response with no body if the operation is successful. To confirm that a multipart read set upload has been stopped, use the ListMultipartReadSetUploads API operation to view all active multipart read set uploads.
      parameters:
        - name: sequence_store_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SequenceStoreId"
          description: The sequence store ID for the store involved in the multipart upload.
        - name: upload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UploadId"
          description: The ID for the multipart upload.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbortMultipartReadSetUploadResponse"
  /share/{share_id}:
    post:
      operationId: AcceptShare
      description: Accept a resource share request.
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the resource share.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptShareResponse"
    delete:
      operationId: DeleteShare
      description: Deletes a resource share. If you are the resource owner, the subscriber will no longer have access to the shared resource. If you are the subscriber, this operation deletes your access to the share.
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID for the resource share to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteShareResponse"
    get:
      operationId: GetShare
      description: Retrieves the metadata for the specified resource share.
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the share.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetShareResponse"
  /sequencestore/{sequence_store_id}/readset/batch/delete:
    post:
      operationId: BatchDeleteReadSet
      description: Deletes one or more read sets. If the operation is successful, it returns a response with no body. If there is an error with deleting one of the read sets, the operation returns an error list. If the operation successfully deletes only a subset of files, it will return an error list for the remaining files that fail to be deleted. There is a limit of 100 read sets that can be deleted in each BatchDeleteReadSet API call.
      parameters:
        - name: sequence_store_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SequenceStoreId"
          description: The read sets' sequence store ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  $ref: "#/components/schemas/ReadSetIdList"
              required:
                - ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteReadSetResponse"
  /import/annotation/{job_id}:
    delete:
      operationId: CancelAnnotationImportJob
      description: Amazon Web Services HealthOmics variant stores and annotation stores are no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services HealthOmics variant store and annotation store availability change. Cancels an annotation import job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAnnotationImportResponse"
    get:
      operationId: GetAnnotationImportJob
      description: Amazon Web Services HealthOmics variant stores and annotation stores are no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services HealthOmics variant store and annotation store availability change. Gets information about an annotation import job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnnotationImportResponse"
  /run/{id}/cancel:
    post:
      operationId: CancelRun
      description: Cancels a run using its ID and returns a response with no body if the operation is successful. To confirm that the run has been cancelled, use the ListRuns API operation to check that it is no longer listed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RunId"
          description: The run's ID.
      responses:
        "202":
          description: Success
  /runBatch/cancel:
    post:
      operationId: CancelRunBatch
      description: Cancels all runs within a specified batch. This operation prevents not-yet-submitted runs from starting and submits CancelRun requests for runs that have already started. Cancel is only allowed on batches in PENDING, SUBMITTING, or INPROGRESS state. Cancel operations are non-atomic and may be partially successful. Use GetBatch to review successfulCancelSubmissionCount and failedCancelSubmissionCount in the submissionSummary. Only one cancel or delete operation per batch is allowed at a time.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                batchId:
                  $ref: "#/components/schemas/BatchId"
              required:
                - batchId
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelRunBatchResponse"
  /import/variant/{job_id}:
    delete:
      operationId: CancelVariantImportJob
      description: Amazon Web Services HealthOmics variant stores and annotation stores are no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services HealthOmics variant store and annotation store availability change. Cancels a variant import job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelVariantImportResponse"
    get:
      operationId: GetVariantImportJob
      description: Amazon Web Services HealthOmics variant stores and annotation stores are no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services HealthOmics variant store and annotation store availability change. Gets information about a variant import job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The job's ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVariantImportResponse"
  /sequencestore/{sequence_store_id}/upload/{upload_id}/complete:
    post:
      operationId: CompleteMultipartReadSetUpload
      description: Completes a multipart read set upload into a sequence store after you have initiated the upload process with CreateMultipartReadSetUpload and uploaded all read set parts using UploadReadSetPart. You must specify the parts you uploaded using the parts parameter. If the operation is successful, it returns the read set ID(s) of the uploaded read set(s). For more information, see Direct upload to a sequence store in the Amazon Web Services HealthOmics User Guide.
      parameters:
        - name: sequence_store_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SequenceStoreId"
          description: The sequence store ID for the store involved in the multipart upload.
        - name: upload_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UploadId"
          description: The ID for the multipart upload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parts:
                  $ref: "#/components/schemas/CompleteReadSetUploadPartList"
              required:
                - parts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMultipartReadSetUploadResponse"
  /annotationStore:
    post:
      operationId: CreateAnnotationStore
      description: Amazon Web Services HealthOmics variant stores and annotation stores are no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services HealthOmics variant store and annotation store availability change. Creates an annotation store.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reference:
                  $ref: "#/components/schemas/ReferenceItem"
                name:
                  $ref: "#/components/schemas/StoreName"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/TagMap"
                versionName:
                  $ref: "#/components/schemas/VersionName"
                sseConfig:
                  $ref: "#/components/schemas/SseConfig"
                storeFormat:
                  $ref: "#/components/schemas/StoreFormat"
                storeOptions:
                  $ref: "#/components/schemas/StoreOptions"
              required:
                - storeFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnnotationStoreResponse"
  /annotationStore/{name}/version:
    post:
      operationId: CreateAnnotationStoreVersion
      description: Creates a new version of an annotation store.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StoreName"
          description: The name of an annotation store version from which versions are being created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                versionName:
                  $ref: "#/components/schemas/VersionName"
                description:
                  $ref: "#/components/schemas/Description"
                versionOptions:
                  $ref: "#/components/schemas/VersionOptions"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - versionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnnotationStoreVersionResponse"
  /configuration:
    post:
      operationId: CreateConfiguration
      description: Create a new configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ConfigurationName"
                description:
                  $ref: "#/components/schemas/ConfigurationDescription"
                runConfigurations:
                  $ref: "#/components/schemas/RunConfigurations"
                tags:
                  $ref: "#/components/schemas/TagMap"
                requestId:
                  $ref: "#/components/schemas/ConfigurationRequestId"
              required:
                - name
                - runConfigurations
                - requestId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationResponse"
    get:
      operationId: ListConfigurations
      description: List all configurations for the account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListConfigurationsRequestMaxResultsInteger"
          description: Maximum number of results to return.
        - name: startingToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConfigurationListToken"
          description: Pagination token for retrieving next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationsResponse"
  /sequencestore/{sequence_store_id}/upload:
    post:
      operationId: CreateMultipartReadSetUpload
      description: "Initiates a multipart read set upload for uploading partitioned source files into a sequence store. You can directly import source files from an EC2 instance and other local compute, or from an S3 bucket. To separate these source files into parts, use the split operation. Each part cannot be larger than 100 MB. If the operation is successful, it provides an uploadId which is required by the UploadReadSetPart API operation to upload parts into a sequence store. To continue uploading a multipart read set into your sequence store, you must use the UploadReadSetPart API operation to upload each part individually following the steps below: Specify the uploadId obtained from the previous call to CreateMultipartReadSetUpload. Upload parts for that uploadId. When you have finished uploading parts, use the CompleteMultipartReadSetUpload API to complete the multipart read set upload and to retrieve the final read set IDs in the response. To learn more about creating parts and the split operation, see Direct upload to a sequence store in the Amazon Web Services HealthOmics User Guide."
      parameters:
        - name: sequence_store_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SequenceStoreId"
          description: The sequence store ID for the store that is the destination of the multipart uploads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                sourceFileType:
                  $ref: "#/components/schemas/FileType"
                subjectId:
                  $ref: "#/components/schemas/SubjectId"
                sampleId:
                  $ref: "#/components/schemas/SampleId"
                generatedFrom:
                  $ref: "#/components/schemas/GeneratedFrom"
                referenceArn:
                  $ref: "#/components/schemas/ReferenceArn"
                name:
                  $ref: "#/components/schemas/ReadSetName"
                description:
                  $ref: "#/components/schemas/ReadSetDescription"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - sourceFileType
                - subjectId
                - sampleId
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMultipartReadSetUploadResponse"
  /referencestore:
    post:
      operationId: CreateReferenceStore
      description: Creates a reference store and returns metadata in JSON format. Reference stores are used to store reference genomes in FASTA format. A reference store is created when the first reference genome is imported. To import additional reference genomes from an Amazon S3 bucket, use the StartReferenceImportJob API operation. For more information, see Creating a HealthOmics reference store in the Amazon Web Services HealthOmics User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ReferenceStoreName"
                description:
                  $ref: "#/components/schemas/ReferenceStoreDescription"
                sseConfig:
                  $ref: "#/components/schemas/SseConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReferenceStoreResponse"
  /runCache:
    post:
      operationId: CreateRunCache
      description: Creates a run cache to store and reference task outputs from completed private runs. Specify an Amazon S3 location where Amazon Web Services HealthOmics saves the cached data. This data must be immediately accessible and not in an archived state. You can save intermediate task files to a run cache if they are declared as task outputs in the workflow definition file. For more information, see Call caching and Creating a run cache in the Amazon Web Services HealthOmics User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cacheBehavior:
                  $ref: "#/components/schemas/CacheBehavior"
                cacheS3Location:
                  $ref: "#/components/schemas/S3UriForBucketOrObject"
                description:
                  $ref: "#/components/schemas/UserCustomDescription"
                name:
                  $ref: "#/components/schemas/UserCustomName"
                requestId:
                  $ref: "#/components/schemas/RunCacheRequestId"
                tags:
                  $ref: "#/components/schemas/TagMap"
                cacheBucketOwnerId:
                  $ref: "#/components/schemas/AwsAccountId"
              required:
                - cacheS3Location
                - requestId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRunCacheResponse"
    get:
      operationId: ListRunCaches
      description: Retrieves a list of your run caches and the metadata for each cache.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRunCachesRequestMaxResultsInteger"
          description: The maximum number of results to return.
        - name: startingToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListToken"
          description: Optional pagination token returned from a prior call to the ListRunCaches API operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRunCachesResponse"
  /runGroup:
    post:
      operationId: CreateRunGroup
      description: Creates a run group to limit the compute resources for the runs that are added to the group. Returns an ARN, ID, and tags for the run group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RunGroupName"
                maxCpus:
                  $ref: "#/components/schemas/CreateRunGroupRequestMaxCpusInteger"
                maxRuns:
                  $ref: "#/components/schemas/CreateRunGroupRequestMaxRunsInteger"
                maxDuration:
                  $ref: "#/components/schemas/CreateRunGroupRequestMaxDurationInteger"
                tags:
                  $ref: "#/components/schemas/TagMap"
                requestId:
                  $ref: "#/components/schemas/RunGroupRequestId"
                maxGpus:
                  $ref: "#/components/schemas/CreateRunGroupRequestMaxGpusInteger"
              required:
                - requestId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRunGroupResponse"
    get:
      operationId: ListRunGroups
      description: Retrieves a list of all run groups and returns the metadata for each run group.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunGroupName"
          description: The run groups' name.
        - name: startingToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunGroupListToken"
          description: Specify the pagination token from a previous request to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRunGroupsRequestMaxResultsInteger"
          description: The maximum number of run groups to return in one page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRunGroupsResponse"
  /sequencestore:
    post:
      operationId: CreateSequenceStore
      description: "Creates a sequence store and returns its metadata. Sequence stores are used to store sequence data files called read sets that are saved in FASTQ, BAM, uBAM, or CRAM formats. For aligned formats (BAM and CRAM), a sequence store can only use one reference genome. For unaligned formats (FASTQ and uBAM), a reference genome is not required. You can create multiple sequence stores per region per account. The following are optional parameters you can specify for your sequence store: Use s3AccessConfig to configure your sequence store with S3 access logs (recommended). Use sseConfig to define your own KMS key for encryption. Use eTagAlgorithmFamily to define which algorithm to use for the HealthOmics eTag on objects. Use fallbackLocation to define a backup location for storing files that have failed a direct upload. Use propagatedSetLevelTags to configure tags that propagate to all objects in your store. For more information, see Creating a HealthOmics sequence store in the Amazon Web Services HealthOmics User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/SequenceStoreName"
                description:
                  $ref: "#/components/schemas/SequenceStoreDescription"
                sseConfig:
                  $ref: "#/components/schemas/SseConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                fallbackLocation:
                  $ref: "#/components/schemas/FallbackLocation"
                eTagAlgorithmFamily:
                  $ref: "#/components/schemas/ETagAlgorithmFamily"
                propagatedSetLevelTags:
                  $ref: "#/components/schemas/PropagatedSetLevelTags"
                s3AccessConfig:
                  $ref: "#/components/schemas/S3AccessConfig"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSequenceStoreResponse"
  /share:
    post:
      operationId: CreateShare
      description: "Creates a cross-account shared resource. The resource owner makes an offer to share the resource with the principal subscriber (an AWS user with a different account than the resource owner). The following resources support cross-account sharing: HealthOmics variant stores HealthOmics annotation stores Private workflows"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/String"
                principalSubscriber:
                  $ref: "#/components/schemas/String"
                shareName:
                  $ref: "#/components/schemas/ShareName"
              required:
                - resourceArn
                - principalSubscriber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateShareResponse"
  /variantStore:
    post:
      operationId: CreateVariantStore
      description: Amazon Web Services HealthOmics variant stores and annotation stores are no longer open to new customers. Existing customers can continue to use the service as normal. For more information, see Amazon Web Services HealthOmics variant store and annotation store availability change. Creates a variant store.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reference:
                  $ref: "#/components/schemas/ReferenceItem"
                name:
                  $ref: "#/components/schemas/StoreName"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/TagMap"
                sseConfig:
                  $ref: "#/components/schemas/SseConfig"
              required:
                - reference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVariantStoreResponse"
  /workflow:
    post:
      operationId: CreateWorkflow
      description: "Creates a private workflow. Before you create a private workflow, you must create and configure these required resources: Workflow definition file: A workflow definition file written in WDL, Nextflow, or CWL. The workflow definition specifies the inputs and outputs for runs that use the workflow. It also includes specifications for the runs and run tasks for your workflow, including compute and memory requirements. The workflow definition file must be in .zip format. For more information, see Workflow definition files in Amazon Web Services HealthOmics. You can use Amazon Q CLI to build and validate your workflow definition files in WDL, Nextflow, and CWL. For more information, see Example prompts for Amazon Q CLI and the Amazon Web Services HealthOmics Agentic generative AI tutorial on GitHub. (Optional) Parameter template file: A parameter template file written in JSON. Create the file to define the run parameters, or Amazon Web Services HealthOmics generates the parameter template for you. For more information, see Parameter template files for HealthOmics workflows. ECR container images: Create container images for the workflow in a private ECR repository, or synchronize images from a supported upstream registry with your Amazon ECR private repository. (Optional) Sentieon licenses: Request a Sentieon license to use the Sentieon software in private workflows. For more information, see Creating or updating a private workflow in Amazon Web Services HealthOmics in the Amazon Web Services HealthOmics User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/WorkflowName"
                description:
                  $ref: "#/components/schemas/WorkflowDescription"
                engine:
                  $ref: "#/components/schemas/WorkflowEngine"
                definitionZip:
                  $ref: "#/components/schemas/Blob"
                definitionUri:
                  $ref: "#/components/schemas/WorkflowDefinition"
                main:
                  $ref: "#/components/schemas/WorkflowMain"
                parameterTemplate:
                  $ref: "#/components/schemas/WorkflowParameterTemplate"
                storageCapacity:
                  $ref: "#/components/schemas/CreateWorkflowRequestStorageCapacityInteger"
                tags:
                  $ref: "#/components/schemas/TagMap"
                requestId:
                  $ref: "#/components/schemas/WorkflowRequestId"
                accelerators:
                  $ref: "#/components/schemas/Accelerators"
                storageType:
                  $ref: "#/components/schemas/StorageType"
                containerRegistryMap:
                  $ref: "#/components/schemas/ContainerRegistryMap"
                containerRegistryMapUri:
                  $ref: "#/components/schemas/Uri"
                readmeMarkdown:
                  $ref: "#/components/schemas/ReadmeMarkdown"
                parameterTemplatePath:
                  $ref: "#/components/schemas/ParameterTemplatePath"
                readmePath:
                  $ref: "#/components/schemas/ReadmePath"
                definitionRepository:
                  $ref: "#/components/schemas/DefinitionRepository"
                workflowBucketOwnerId:
                  $ref: "#/components/schemas/WorkflowBucketOwnerId"
                readmeUri:
                  $ref: "#/components/schemas/S3UriForObject"
              required:
                - requestId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowResponse"
    get:
      operationId: ListWorkflows
      description: Retrieves a list of existing workflows. You can filter for specific workflows by their name and type. Using the type parameter, specify PRIVATE to retrieve a list of private workflows or specify READY2RUN for a list of all Ready2Run workflows. If you do not specify the type of workflow, this operation returns a list of existing workflows.
      parameters:
