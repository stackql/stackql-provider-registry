                $ref: "#/components/schemas/Connections"
  /DescribeConnectionsOnInterconnect:
    post:
      operationId: DescribeConnectionsOnInterconnect
      description: Deprecated. Use DescribeHostedConnections instead. Lists the connections that have been provisioned on the specified interconnect. Intended for use by Direct Connect Partners only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DescribeConnectionsOnInterconnect
            default: OvertureService.DescribeConnectionsOnInterconnect
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
