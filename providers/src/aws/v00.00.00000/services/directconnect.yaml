      description: Adds the specified tags to the specified Direct Connect resource. Each resource can have a maximum of 50 tags. Each tag consists of a key and an optional value. If a tag with the same key is already associated with the resource, this action updates its value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.TagResource
            default: OvertureService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to add.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from the specified Direct Connect resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.UntagResource
            default: OvertureService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The tag keys of the tags to remove.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateConnection:
    post:
      operationId: UpdateConnection
      description: "Updates the Direct Connect connection configuration. You can update the following parameters for a connection: The connection name The connection's MAC Security (MACsec) encryption mode."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.UpdateConnection
            default: OvertureService.UpdateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection. You can use DescribeConnections to retrieve the connection ID.
                connectionName:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection.
                encryptionMode:
                  $ref: "#/components/schemas/EncryptionMode"
                  description: The connection MAC Security (MACsec) encryption mode. The valid values are no_encrypt, should_encrypt, and must_encrypt.
              required:
                - connectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /UpdateDirectConnectGateway:
    post:
      operationId: UpdateDirectConnectGateway
      description: Updates the name of a current Direct Connect gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.UpdateDirectConnectGateway
            default: OvertureService.UpdateDirectConnectGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway to update.
                newDirectConnectGatewayName:
                  $ref: "#/components/schemas/DirectConnectGatewayName"
                  description: The new name for the Direct Connect gateway.
              required:
                - directConnectGatewayId
                - newDirectConnectGatewayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDirectConnectGatewayResponse"
  /UpdateDirectConnectGatewayAssociation:
    post:
      operationId: UpdateDirectConnectGatewayAssociation
      description: Updates the specified attributes of the Direct Connect gateway association. Add or remove prefixes from the association.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.UpdateDirectConnectGatewayAssociation
            default: OvertureService.UpdateDirectConnectGatewayAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                associationId:
                  $ref: "#/components/schemas/DirectConnectGatewayAssociationId"
                  description: The ID of the Direct Connect gateway association.
                addAllowedPrefixesToDirectConnectGateway:
                  $ref: "#/components/schemas/RouteFilterPrefixList"
                  description: The Amazon VPC prefixes to advertise to the Direct Connect gateway.
                removeAllowedPrefixesToDirectConnectGateway:
                  $ref: "#/components/schemas/RouteFilterPrefixList"
                  description: The Amazon VPC prefixes to no longer advertise to the Direct Connect gateway.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDirectConnectGatewayAssociationResult"
  /UpdateLag:
    post:
      operationId: UpdateLag
      description: "Updates the attributes of the specified link aggregation group (LAG). You can update the following LAG attributes: The name of the LAG. The value for the minimum number of connections that must be operational for the LAG itself to be operational. The LAG's MACsec encryption mode. Amazon Web Services assigns this value to each connection which is part of the LAG. The tags If you adjust the threshold value for the minimum number of operational connections, ensure that the new value does not cause the LAG to fall below the threshold and become non-operational."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.UpdateLag
            default: OvertureService.UpdateLag
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                lagId:
                  $ref: "#/components/schemas/LagId"
                  description: The ID of the LAG.
                lagName:
                  $ref: "#/components/schemas/LagName"
                  description: The name of the LAG.
                minimumLinks:
                  $ref: "#/components/schemas/Count"
                  description: The minimum number of physical connections that must be operational for the LAG itself to be operational.
                encryptionMode:
                  $ref: "#/components/schemas/EncryptionMode"
                  description: The LAG MAC Security (MACsec) encryption mode. Amazon Web Services applies the value to all connections which are part of the LAG.
              required:
                - lagId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lag"
  /UpdateVirtualInterfaceAttributes:
    post:
      operationId: UpdateVirtualInterfaceAttributes
      description: Updates the specified attributes of the specified virtual private interface. Setting the MTU of a virtual interface to 8500 (jumbo frames) can cause an update to the underlying physical connection if it wasn't updated to support jumbo frames. Updating the connection disrupts network connectivity for all virtual interfaces associated with the connection for up to 30 seconds. To check whether your connection supports jumbo frames, call DescribeConnections. To check whether your virtual interface supports jumbo frames, call DescribeVirtualInterfaces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.UpdateVirtualInterfaceAttributes
            default: OvertureService.UpdateVirtualInterfaceAttributes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual private interface.
                mtu:
                  $ref: "#/components/schemas/MTU"
                  description: The maximum transmission unit (MTU), in bytes. The supported values are 1500 and 8500. The default value is 1500.
                enableSiteLink:
                  $ref: "#/components/schemas/EnableSiteLink"
                  description: Indicates whether to enable or disable SiteLink.
                virtualInterfaceName:
                  $ref: "#/components/schemas/VirtualInterfaceName"
                  description: The name of the virtual private interface.
              required:
                - virtualInterfaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualInterface"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DirectConnectGatewayId:
      type: string
    DirectConnectGatewayAssociationProposalId:
      type: string
    OwnerAccount:
      type: string
    RouteFilterPrefixList:
      type: array
      items:
        $ref: "#/components/schemas/RouteFilterPrefix"
    RouteFilterPrefix:
      description: Information about a route filter prefix that a customer can advertise through Border Gateway Protocol (BGP) over a public virtual interface.
      type: object
      properties:
        cidr:
          $ref: "#/components/schemas/CIDR"
          description: The CIDR block for the advertised route. Separate multiple routes using commas. An IPv6 CIDR must use /64 or shorter.
    CIDR:
      type: string
    AcceptDirectConnectGatewayAssociationProposalResult:
      type: object
      properties:
        directConnectGatewayAssociation:
          $ref: "#/components/schemas/DirectConnectGatewayAssociation"
          description: Information about an association between a Direct Connect gateway and a virtual gateway or transit gateway.
    DirectConnectGatewayAssociation:
      description: Information about an association between a Direct Connect gateway and a virtual private gateway or transit gateway.
      type: object
      properties:
        directConnectGatewayId:
          $ref: "#/components/schemas/DirectConnectGatewayId"
          description: The ID of the Direct Connect gateway.
        directConnectGatewayOwnerAccount:
          $ref: "#/components/schemas/OwnerAccount"
          description: The ID of the Amazon Web Services account that owns the associated gateway.
        associationState:
          $ref: "#/components/schemas/DirectConnectGatewayAssociationState"
          description: "The state of the association. The following are the possible values: associating: The initial state after calling CreateDirectConnectGatewayAssociation. associated: The Direct Connect gateway and virtual private gateway or transit gateway are successfully associated and ready to pass traffic. disassociating: The initial state after calling DeleteDirectConnectGatewayAssociation. disassociated: The virtual private gateway or transit gateway is disassociated from the Direct Connect gateway. Traffic flow between the Direct Connect gateway and virtual private gateway or transit gateway is stopped. updating: The CIDR blocks for the virtual private gateway or transit gateway are currently being updated. This could be new CIDR blocks added or current CIDR blocks removed."
        stateChangeError:
          $ref: "#/components/schemas/StateChangeError"
          description: The error message if the state of an object failed to advance.
        associatedGateway:
          $ref: "#/components/schemas/AssociatedGateway"
          description: Information about the associated gateway.
        associationId:
          $ref: "#/components/schemas/DirectConnectGatewayAssociationId"
          description: The ID of the Direct Connect gateway association.
        allowedPrefixesToDirectConnectGateway:
          $ref: "#/components/schemas/RouteFilterPrefixList"
          description: The Amazon VPC prefixes to advertise to the Direct Connect gateway.
        associatedCoreNetwork:
          $ref: "#/components/schemas/AssociatedCoreNetwork"
          description: The ID of the Cloud WAN core network associated with the Direct Connect gateway attachment.
        virtualGatewayId:
          $ref: "#/components/schemas/VirtualGatewayId"
          description: The ID of the virtual private gateway. Applies only to private virtual interfaces.
        virtualGatewayRegion:
          $ref: "#/components/schemas/VirtualGatewayRegion"
          description: The Amazon Web Services Region where the virtual private gateway is located.
        virtualGatewayOwnerAccount:
          $ref: "#/components/schemas/OwnerAccount"
          description: The ID of the Amazon Web Services account that owns the virtual private gateway.
    DirectConnectGatewayAssociationState:
      type: string
      enum:
        - associating
        - associated
        - disassociating
        - disassociated
        - updating
    StateChangeError:
      type: string
    AssociatedGateway:
      description: Information about the associated gateway.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/GatewayIdentifier"
          description: The ID of the associated gateway.
        type_:
          $ref: "#/components/schemas/GatewayType"
          description: The type of associated gateway.
        ownerAccount:
          $ref: "#/components/schemas/OwnerAccount"
          description: The ID of the Amazon Web Services account that owns the associated virtual private gateway or transit gateway.
        region:
          $ref: "#/components/schemas/Region"
          description: The Region where the associated gateway is located.
    GatewayIdentifier:
      type: string
    GatewayType:
      type: string
      enum:
        - virtualPrivateGateway
        - transitGateway
    Region:
      type: string
    DirectConnectGatewayAssociationId:
      type: string
    AssociatedCoreNetwork:
      description: The Amazon Web Services Cloud WAN core network that the Direct Connect gateway is associated to. This is only returned when a Direct Connect gateway is associated to a Cloud WAN core network.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CoreNetworkIdentifier"
          description: The ID of the Cloud WAN core network that the Direct Connect gateway is associated to.
        ownerAccount:
          $ref: "#/components/schemas/OwnerAccount"
          description: The account owner of the Cloud WAN core network.
        attachmentId:
          $ref: "#/components/schemas/CoreNetworkAttachmentId"
          description: the ID of the Direct Connect gateway attachment.
    CoreNetworkIdentifier:
      type: string
      minLength: 14
      maxLength: 30
      pattern: ^core-network-([0-9a-f]{1,17})$
    CoreNetworkAttachmentId:
      type: string
      minLength: 12
      maxLength: 28
      pattern: ^attachment-([0-9a-f]{1,17})$
    VirtualGatewayId:
      type: string
    VirtualGatewayRegion:
      type: string
    Bandwidth:
      type: string
    ConnectionName:
      type: string
    InterconnectId:
      type: string
    VLAN:
      type: integer
    Connection:
      description: Information about an Direct Connect connection.
      type: object
      properties:
        ownerAccount:
          $ref: "#/components/schemas/OwnerAccount"
          description: The ID of the Amazon Web Services account that owns the connection.
        connectionId:
          $ref: "#/components/schemas/ConnectionId"
          description: The ID of the connection.
        connectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection.
        connectionState:
          $ref: "#/components/schemas/ConnectionState"
          description: "The state of the connection. The following are the possible values: ordering: The initial state of a hosted connection provisioned on an interconnect. The connection stays in the ordering state until the owner of the hosted connection confirms or declines the connection order. requested: The initial state of a standard connection. The connection stays in the requested state until the Letter of Authorization (LOA) is sent to the customer. pending: The connection has been approved and is being initialized. available: The network link is up and the connection is ready for use. down: The network link is down. deleting: The connection is being deleted. deleted: The connection has been deleted. rejected: A hosted connection in the ordering state enters the rejected state if it is deleted by the customer. unknown: The state of the connection is not available."
        region:
          $ref: "#/components/schemas/Region"
          description: The Amazon Web Services Region where the connection is located.
        location:
          $ref: "#/components/schemas/LocationCode"
          description: The location of the connection.
        bandwidth:
          $ref: "#/components/schemas/Bandwidth"
          description: The bandwidth of the connection.
        vlan:
          $ref: "#/components/schemas/VLAN"
          description: The ID of the VLAN.
        partnerName:
          $ref: "#/components/schemas/PartnerName"
          description: The name of the Direct Connect service provider associated with the connection.
        loaIssueTime:
          $ref: "#/components/schemas/LoaIssueTime"
          description: The time of the most recent call to DescribeLoa for this connection.
        lagId:
          $ref: "#/components/schemas/LagId"
          description: The ID of the LAG.
        awsDevice:
          $ref: "#/components/schemas/AwsDevice"
          description: The Direct Connect endpoint on which the physical connection terminates.
        jumboFrameCapable:
          $ref: "#/components/schemas/JumboFrameCapable"
          description: Indicates whether jumbo frames are supported.
        awsDeviceV2:
          $ref: "#/components/schemas/AwsDeviceV2"
          description: The Direct Connect endpoint that terminates the physical connection.
        awsLogicalDeviceId:
          $ref: "#/components/schemas/AwsLogicalDeviceId"
          description: The Direct Connect endpoint that terminates the logical connection. This device might be different than the device that terminates the physical connection.
        hasLogicalRedundancy:
          $ref: "#/components/schemas/HasLogicalRedundancy"
          description: Indicates whether the connection supports a secondary BGP peer in the same address family (IPv4/IPv6).
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the connection.
        providerName:
          $ref: "#/components/schemas/ProviderName"
          description: The name of the service provider associated with the connection.
        macSecCapable:
          $ref: "#/components/schemas/MacSecCapable"
          description: Indicates whether the connection supports MAC Security (MACsec).
        portEncryptionStatus:
          $ref: "#/components/schemas/PortEncryptionStatus"
          description: The MAC Security (MACsec) port link status of the connection. The valid values are Encryption Up, which means that there is an active Connection Key Name, or Encryption Down.
        encryptionMode:
          $ref: "#/components/schemas/EncryptionMode"
          description: The MAC Security (MACsec) connection encryption mode. The valid values are no_encrypt, should_encrypt, and must_encrypt.
        macSecKeys:
          $ref: "#/components/schemas/MacSecKeyList"
          description: The MAC Security (MACsec) security keys associated with the connection.
        partnerInterconnectMacSecCapable:
          $ref: "#/components/schemas/PartnerInterconnectMacSecCapable"
          description: Indicates whether the interconnect hosting this connection supports MAC Security (MACsec).
    ConnectionId:
      type: string
    ConnectionState:
      type: string
      enum:
        - ordering
        - requested
        - pending
        - available
        - down
        - deleting
        - deleted
        - rejected
        - unknown
    LocationCode:
      type: string
    PartnerName:
      type: string
    LoaIssueTime:
      type: string
      format: date-time
    LagId:
      type: string
    AwsDevice:
      type: string
    JumboFrameCapable:
      type: boolean
    AwsDeviceV2:
      type: string
    AwsLogicalDeviceId:
      type: string
    HasLogicalRedundancy:
      type: string
      enum:
        - unknown
        - "yes"
        - "no"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Information about a tag.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The value.
      required:
        - key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    ProviderName:
      type: string
    MacSecCapable:
      type: boolean
    PortEncryptionStatus:
      type: string
    EncryptionMode:
      type: string
    MacSecKeyList:
      type: array
      items:
        $ref: "#/components/schemas/MacSecKey"
    MacSecKey:
      description: Information about the MAC Security (MACsec) secret key.
      type: object
      properties:
        secretARN:
          $ref: "#/components/schemas/SecretARN"
          description: The Amazon Resource Name (ARN) of the MAC Security (MACsec) secret key.
        ckn:
          $ref: "#/components/schemas/Ckn"
          description: The Connection Key Name (CKN) for the MAC Security secret key.
        state:
          $ref: "#/components/schemas/State"
          description: "The state of the MAC Security (MACsec) secret key. The possible values are: associating: The MAC Security (MACsec) secret key is being validated and not yet associated with the connection or LAG. associated: The MAC Security (MACsec) secret key is validated and associated with the connection or LAG. disassociating: The MAC Security (MACsec) secret key is being disassociated from the connection or LAG disassociated: The MAC Security (MACsec) secret key is no longer associated with the connection or LAG."
        startOn:
          $ref: "#/components/schemas/StartOnDate"
          description: The date that the MAC Security (MACsec) secret key takes effect. The value is displayed in UTC format.
    SecretARN:
      type: string
    Ckn:
      type: string
    State:
      type: string
    StartOnDate:
      type: string
    PartnerInterconnectMacSecCapable:
      type: boolean
    NewPrivateVirtualInterfaceAllocation:
      description: Information about a private virtual interface to be provisioned on a connection.
      type: object
      properties:
        virtualInterfaceName:
          $ref: "#/components/schemas/VirtualInterfaceName"
          description: "The name of the virtual interface assigned by the customer network. The name has a maximum of 100 characters. The following are valid characters: a-z, 0-9 and a hyphen (-)."
        vlan:
          $ref: "#/components/schemas/VLAN"
          description: The ID of the VLAN.
        asn:
          $ref: "#/components/schemas/ASN"
          description: The autonomous system number (ASN). The valid range is from 1 to 2147483646 for Border Gateway Protocol (BGP) configuration. If you provide a number greater than the maximum, an error is returned. Use asnLong instead. You can use asnLong or asn, but not both. We recommend using asnLong as it supports a greater pool of numbers. The asnLong attribute accepts both ASN and long ASN ranges. If you provide a value in the same API call for both asn and asnLong, the API will only accept the value for asnLong. The valid values are 1-2147483646.
        asnLong:
          $ref: "#/components/schemas/LongAsn"
          description: The ASN when allocating a new private virtual interface. The valid range is from 1 to 4294967294 for BGP configuration. You can use asnLong or asn, but not both. We recommend using asnLong as it supports a greater pool of numbers. The asnLong attribute accepts both ASN and long ASN ranges. If you provide a value in the same API call for both asn and asnLong, the API will only accept the value for asnLong.
        mtu:
          $ref: "#/components/schemas/MTU"
          description: The maximum transmission unit (MTU), in bytes. The supported values are 1500 and 8500. The default value is 1500.
        authKey:
          $ref: "#/components/schemas/BGPAuthKey"
          description: The authentication key for BGP configuration. This string has a minimum length of 6 characters and and a maximun lenth of 80 characters.
        amazonAddress:
          $ref: "#/components/schemas/AmazonAddress"
          description: The IP address assigned to the Amazon interface.
        addressFamily:
          $ref: "#/components/schemas/AddressFamily"
          description: The address family for the BGP peer.
        customerAddress:
          $ref: "#/components/schemas/CustomerAddress"
          description: The IP address assigned to the customer interface.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the private virtual interface.
      required:
        - virtualInterfaceName
        - vlan
    VirtualInterfaceName:
      type: string
    ASN:
      type: integer
    LongAsn:
      type: integer
      format: int64
    MTU:
      type: integer
    BGPAuthKey:
      type: string
    AmazonAddress:
      type: string
    AddressFamily:
      type: string
      enum:
        - ipv4
        - ipv6
    CustomerAddress:
      type: string
    VirtualInterface:
      description: Information about a virtual interface.
      type: object
      properties:
        ownerAccount:
          $ref: "#/components/schemas/OwnerAccount"
          description: The ID of the Amazon Web Services account that owns the virtual interface.
        virtualInterfaceId:
          $ref: "#/components/schemas/VirtualInterfaceId"
          description: The ID of the virtual interface.
        location:
          $ref: "#/components/schemas/LocationCode"
          description: The location of the connection.
        connectionId:
          $ref: "#/components/schemas/ConnectionId"
          description: The ID of the connection.
        virtualInterfaceType:
          $ref: "#/components/schemas/VirtualInterfaceType"
          description: The type of virtual interface. The possible values are private, public and transit.
        virtualInterfaceName:
          $ref: "#/components/schemas/VirtualInterfaceName"
          description: "The name of the virtual interface assigned by the customer network. The name has a maximum of 100 characters. The following are valid characters: a-z, 0-9 and a hyphen (-)."
        vlan:
          $ref: "#/components/schemas/VLAN"
          description: The ID of the VLAN.
        asn:
          $ref: "#/components/schemas/ASN"
          description: The autonomous system number (ASN). The valid range is from 1 to 2147483646 for Border Gateway Protocol (BGP) configuration. If you provide a number greater than the maximum, an error is returned. Use asnLong instead. You can use asnLong or asn, but not both. We recommend using asnLong as it supports a greater pool of numbers. The asnLong attribute accepts both ASN and long ASN ranges. If you provide a value in the same API call for both asn and asnLong, the API will only accept the value for asnLong.
        asnLong:
          $ref: "#/components/schemas/LongAsn"
          description: The long ASN for the virtual interface. The valid range is from 1 to 4294967294 for BGP configuration. You can use asnLong or asn, but not both. We recommend using asnLong as it supports a greater pool of numbers. The asnLong attribute accepts both ASN and long ASN ranges. If you provide a value in the same API call for both asn and asnLong, the API will only accept the value for asnLong.
        amazonSideAsn:
          $ref: "#/components/schemas/LongAsn"
          description: The autonomous system number (AS) for the Amazon side of the connection.
        authKey:
          $ref: "#/components/schemas/BGPAuthKey"
