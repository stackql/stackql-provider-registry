      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                interconnectId:
                  $ref: "#/components/schemas/InterconnectId"
                  description: The ID of the interconnect.
              required:
                - interconnectId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInterconnectResponse"
  /DeleteLag:
    post:
      operationId: DeleteLag
      description: Deletes the specified link aggregation group (LAG). You cannot delete a LAG if it has active virtual interfaces or hosted connections.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DeleteLag
            default: OvertureService.DeleteLag
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                lagId:
                  $ref: "#/components/schemas/LagId"
                  description: The ID of the LAG.
              required:
                - lagId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lag"
  /DeleteVirtualInterface:
    post:
      operationId: DeleteVirtualInterface
      description: Deletes a virtual interface.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DeleteVirtualInterface
            default: OvertureService.DeleteVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
              required:
                - virtualInterfaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVirtualInterfaceResponse"
  /DescribeConnectionLoa:
    post:
      operationId: DescribeConnectionLoa
      description: Deprecated. Use DescribeLoa instead. Gets the LOA-CFA for a connection. The Letter of Authorization - Connecting Facility Assignment (LOA-CFA) is a document that your APN partner or service provider uses when establishing your cross connect to Amazon Web Services at the colocation facility. For more information, see Requesting Cross Connects at Direct Connect Locations in the Direct Connect User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DescribeConnectionLoa
            default: OvertureService.DescribeConnectionLoa
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection.
                providerName:
                  $ref: "#/components/schemas/ProviderName"
                  description: The name of the APN partner or service provider who establishes connectivity on your behalf. If you specify this parameter, the LOA-CFA lists the provider name alongside your company name as the requester of the cross connect.
                loaContentType:
                  $ref: "#/components/schemas/LoaContentType"
                  description: The standard media type for the LOA-CFA document. The only supported value is application/pdf.
              required:
                - connectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectionLoaResponse"
  /DescribeConnections:
    post:
      operationId: DescribeConnections
      description: Displays the specified connection or all connections in this Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DescribeConnections
            default: OvertureService.DescribeConnections
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
