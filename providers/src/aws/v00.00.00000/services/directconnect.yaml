      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
              required:
                - directConnectGatewayId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDirectConnectGatewayResult"
  /DeleteDirectConnectGatewayAssociation:
    post:
      operationId: DeleteDirectConnectGatewayAssociation
      description: Deletes the association between the specified Direct Connect gateway and virtual private gateway. We recommend that you specify the associationID to delete the association. Alternatively, if you own virtual gateway and a Direct Connect gateway association, you can specify the virtualGatewayId and directConnectGatewayId to delete an association.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DeleteDirectConnectGatewayAssociation
            default: OvertureService.DeleteDirectConnectGatewayAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                associationId:
                  $ref: "#/components/schemas/DirectConnectGatewayAssociationId"
                  description: The ID of the Direct Connect gateway association.
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
                virtualGatewayId:
                  $ref: "#/components/schemas/VirtualGatewayId"
                  description: The ID of the virtual private gateway.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDirectConnectGatewayAssociationResult"
  /DeleteDirectConnectGatewayAssociationProposal:
    post:
      operationId: DeleteDirectConnectGatewayAssociationProposal
      description: Deletes the association proposal request between the specified Direct Connect gateway and virtual private gateway or transit gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DeleteDirectConnectGatewayAssociationProposal
            default: OvertureService.DeleteDirectConnectGatewayAssociationProposal
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                proposalId:
                  $ref: "#/components/schemas/DirectConnectGatewayAssociationProposalId"
                  description: The ID of the proposal.
              required:
                - proposalId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDirectConnectGatewayAssociationProposalResult"
  /DeleteInterconnect:
    post:
      operationId: DeleteInterconnect
      description: Deletes the specified interconnect. Intended for use by Direct Connect Partners only.
      parameters:
        - name: X-Amz-Target
          in: header
