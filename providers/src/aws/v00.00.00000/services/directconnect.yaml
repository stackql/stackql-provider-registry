          description: "The state of the interconnect. The following are the possible values: requested: The initial state of an interconnect. The interconnect stays in the requested state until the Letter of Authorization (LOA) is sent to the customer. pending: The interconnect is approved, and is being initialized. available: The network link is up, and the interconnect is ready for use. down: The network link is down. deleting: The interconnect is being deleted. deleted: The interconnect is deleted. unknown: The state of the interconnect is not available."
    DeleteVirtualInterfaceResponse:
      type: object
      properties:
        virtualInterfaceState:
          $ref: "#/components/schemas/VirtualInterfaceState"
          description: "The state of the virtual interface. The following are the possible values: confirming: The creation of the virtual interface is pending confirmation from the virtual interface owner. If the owner of the virtual interface is different from the owner of the connection on which it is provisioned, then the virtual interface will remain in this state until it is confirmed by the virtual interface owner. verifying: This state only applies to public virtual interfaces. Each public virtual interface needs validation before the virtual interface can be created. pending: A virtual interface is in this state from the time that it is created until the virtual interface is ready to forward traffic. available: A virtual interface that is able to forward traffic. down: A virtual interface that is BGP down. testing: A virtual interface is in this state immediately after calling StartBgpFailoverTest and remains in this state during the duration of the test. deleting: A virtual interface is in this state immediately after calling DeleteVirtualInterface until it can no longer forward traffic. deleted: A virtual interface that cannot forward traffic. rejected: The virtual interface owner has declined creation of the virtual interface. If a virtual interface in the Confirming state is deleted by the virtual interface owner, the virtual interface enters the Rejected state. unknown: The state of the virtual interface is not available."
