openapi: 3.0.0
info:
  version: "2012-10-25"
  title: AWS Direct Connect
  description: AWS Direct Connect
  x-serviceName: directconnect
  x-serviceAlias: directconnect
  x-protocol: json
  x-apiVersion: "2012-10-25"
  x-endpointPrefix: directconnect
  x-targetPrefix: OvertureService
  x-jsonVersion: "1.1"
servers:
  - url: https://directconnect.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for directconnect
paths:
  /AcceptDirectConnectGatewayAssociationProposal:
    post:
      operationId: AcceptDirectConnectGatewayAssociationProposal
      description: Accepts a proposal request to attach a virtual private gateway or transit gateway to a Direct Connect gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AcceptDirectConnectGatewayAssociationProposal
            default: OvertureService.AcceptDirectConnectGatewayAssociationProposal
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
                proposalId:
                  $ref: "#/components/schemas/DirectConnectGatewayAssociationProposalId"
                  description: The ID of the request proposal.
                associatedGatewayOwnerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account that owns the virtual private gateway or transit gateway.
                overrideAllowedPrefixesToDirectConnectGateway:
                  $ref: "#/components/schemas/RouteFilterPrefixList"
                  description: Overrides the Amazon VPC prefixes advertised to the Direct Connect gateway. For information about how to set the prefixes, see Allowed Prefixes in the Direct Connect User Guide.
              required:
                - directConnectGatewayId
                - proposalId
                - associatedGatewayOwnerAccount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptDirectConnectGatewayAssociationProposalResult"
  /AllocateConnectionOnInterconnect:
    post:
      operationId: AllocateConnectionOnInterconnect
      description: Deprecated. Use AllocateHostedConnection instead. Creates a hosted connection on an interconnect. Allocates a VLAN number and a specified amount of bandwidth for use by a hosted connection on the specified interconnect. Intended for use by Direct Connect Partners only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AllocateConnectionOnInterconnect
            default: OvertureService.AllocateConnectionOnInterconnect
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                bandwidth:
                  $ref: "#/components/schemas/Bandwidth"
                  description: The bandwidth of the connection. The possible values are 50Mbps, 100Mbps, 200Mbps, 300Mbps, 400Mbps, 500Mbps, 1Gbps, 2Gbps, 5Gbps, and 10Gbps. Note that only those Direct Connect Partners who have met specific requirements are allowed to create a 1Gbps, 2Gbps, 5Gbps or 10Gbps hosted connection.
                connectionName:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the provisioned connection.
                ownerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account of the customer for whom the connection will be provisioned.
                interconnectId:
                  $ref: "#/components/schemas/InterconnectId"
                  description: The ID of the interconnect on which the connection will be provisioned.
                vlan:
                  $ref: "#/components/schemas/VLAN"
                  description: The dedicated VLAN provisioned to the connection.
              required:
                - bandwidth
                - connectionName
                - ownerAccount
                - interconnectId
                - vlan
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /AllocateHostedConnection:
    post:
      operationId: AllocateHostedConnection
      description: Creates a hosted connection on the specified interconnect or a link aggregation group (LAG) of interconnects. Allocates a VLAN number and a specified amount of capacity (bandwidth) for use by a hosted connection on the specified interconnect or LAG of interconnects. Amazon Web Services polices the hosted connection for the specified capacity and the Direct Connect Partner must also police the hosted connection for the specified capacity. Intended for use by Direct Connect Partners only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AllocateHostedConnection
            default: OvertureService.AllocateHostedConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the interconnect or LAG.
                ownerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account ID of the customer for the connection.
                bandwidth:
                  $ref: "#/components/schemas/Bandwidth"
                  description: The bandwidth of the connection. The possible values are 50Mbps, 100Mbps, 200Mbps, 300Mbps, 400Mbps, 500Mbps, 1Gbps, 2Gbps, 5Gbps, 10Gbps, and 25Gbps. Note that only those Direct Connect Partners who have met specific requirements are allowed to create a 1Gbps, 2Gbps, 5Gbps, 10Gbps, or 25Gbps hosted connection.
                connectionName:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the hosted connection.
                vlan:
                  $ref: "#/components/schemas/VLAN"
                  description: The dedicated VLAN provisioned to the hosted connection.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags associated with the connection.
              required:
                - connectionId
                - ownerAccount
                - bandwidth
                - connectionName
                - vlan
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /AllocatePrivateVirtualInterface:
    post:
      operationId: AllocatePrivateVirtualInterface
      description: Provisions a private virtual interface to be owned by the specified Amazon Web Services account. Virtual interfaces created using this action must be confirmed by the owner using ConfirmPrivateVirtualInterface. Until then, the virtual interface is in the Confirming state and is not available to handle traffic.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AllocatePrivateVirtualInterface
            default: OvertureService.AllocatePrivateVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection on which the private virtual interface is provisioned.
                ownerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account that owns the virtual private interface.
                newPrivateVirtualInterfaceAllocation:
                  $ref: "#/components/schemas/NewPrivateVirtualInterfaceAllocation"
                  description: Information about the private virtual interface.
              required:
                - connectionId
                - ownerAccount
                - newPrivateVirtualInterfaceAllocation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualInterface"
  /AllocatePublicVirtualInterface:
    post:
      operationId: AllocatePublicVirtualInterface
      description: Provisions a public virtual interface to be owned by the specified Amazon Web Services account. The owner of a connection calls this function to provision a public virtual interface to be owned by the specified Amazon Web Services account. Virtual interfaces created using this function must be confirmed by the owner using ConfirmPublicVirtualInterface. Until this step has been completed, the virtual interface is in the confirming state and is not available to handle traffic. When creating an IPv6 public virtual interface, omit the Amazon address and customer address. IPv6 addresses are automatically assigned from the Amazon pool of IPv6 addresses; you cannot specify custom IPv6 addresses.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AllocatePublicVirtualInterface
            default: OvertureService.AllocatePublicVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection on which the public virtual interface is provisioned.
                ownerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account that owns the public virtual interface.
                newPublicVirtualInterfaceAllocation:
                  $ref: "#/components/schemas/NewPublicVirtualInterfaceAllocation"
                  description: Information about the public virtual interface.
              required:
                - connectionId
                - ownerAccount
                - newPublicVirtualInterfaceAllocation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualInterface"
  /AllocateTransitVirtualInterface:
    post:
      operationId: AllocateTransitVirtualInterface
      description: Provisions a transit virtual interface to be owned by the specified Amazon Web Services account. Use this type of interface to connect a transit gateway to your Direct Connect gateway. The owner of a connection provisions a transit virtual interface to be owned by the specified Amazon Web Services account. After you create a transit virtual interface, it must be confirmed by the owner using ConfirmTransitVirtualInterface. Until this step has been completed, the transit virtual interface is in the requested state and is not available to handle traffic.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AllocateTransitVirtualInterface
            default: OvertureService.AllocateTransitVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection on which the transit virtual interface is provisioned.
                ownerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account that owns the transit virtual interface.
                newTransitVirtualInterfaceAllocation:
                  $ref: "#/components/schemas/NewTransitVirtualInterfaceAllocation"
                  description: Information about the transit virtual interface.
              required:
                - connectionId
                - ownerAccount
                - newTransitVirtualInterfaceAllocation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocateTransitVirtualInterfaceResult"
  /AssociateConnectionWithLag:
    post:
      operationId: AssociateConnectionWithLag
      description: Associates an existing connection with a link aggregation group (LAG). The connection is interrupted and re-established as a member of the LAG (connectivity to Amazon Web Services is interrupted). The connection must be hosted on the same Direct Connect endpoint as the LAG, and its bandwidth must match the bandwidth for the LAG. You can re-associate a connection that's currently associated with a different LAG; however, if removing the connection would cause the original LAG to fall below its setting for minimum number of operational connections, the request fails. Any virtual interfaces that are directly associated with the connection are automatically re-associated with the LAG. If the connection was originally associated with a different LAG, the virtual interfaces remain associated with the original LAG. For interconnects, any hosted connections are automatically re-associated with the LAG. If the interconnect was originally associated with a different LAG, the hosted connections remain associated with the original LAG.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AssociateConnectionWithLag
            default: OvertureService.AssociateConnectionWithLag
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection.
                lagId:
                  $ref: "#/components/schemas/LagId"
                  description: The ID of the LAG with which to associate the connection.
              required:
                - connectionId
                - lagId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /AssociateHostedConnection:
    post:
      operationId: AssociateHostedConnection
      description: Associates a hosted connection and its virtual interfaces with a link aggregation group (LAG) or interconnect. If the target interconnect or LAG has an existing hosted connection with a conflicting VLAN number or IP address, the operation fails. This action temporarily interrupts the hosted connection's connectivity to Amazon Web Services as it is being migrated. Intended for use by Direct Connect Partners only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AssociateHostedConnection
            default: OvertureService.AssociateHostedConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the hosted connection.
                parentConnectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the interconnect or the LAG.
              required:
                - connectionId
                - parentConnectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /AssociateMacSecKey:
    post:
      operationId: AssociateMacSecKey
      description: Associates a MAC Security (MACsec) Connection Key Name (CKN)/ Connectivity Association Key (CAK) pair with a Direct Connect connection. You must supply either the secretARN, or the CKN/CAK (ckn and cak) pair in the request. For information about MAC Security (MACsec) key considerations, see MACsec pre-shared CKN/CAK key considerations in the Direct Connect User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AssociateMacSecKey
            default: OvertureService.AssociateMacSecKey
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the dedicated connection (dxcon-xxxx), interconnect (dxcon-xxxx), or LAG (dxlag-xxxx). You can use DescribeConnections, DescribeInterconnects, or DescribeLags to retrieve connection ID.
                secretARN:
                  $ref: "#/components/schemas/SecretARN"
                  description: The Amazon Resource Name (ARN) of the MAC Security (MACsec) secret key to associate with the connection. You can use DescribeConnections or DescribeLags to retrieve the MAC Security (MACsec) secret key. If you use this request parameter, you do not use the ckn and cak request parameters.
                ckn:
                  $ref: "#/components/schemas/Ckn"
                  description: The MAC Security (MACsec) CKN to associate with the connection. You can create the CKN/CAK pair using an industry standard tool. The valid values are 64 hexadecimal characters (0-9, A-E). If you use this request parameter, you must use the cak request parameter and not use the secretARN request parameter.
                cak:
                  $ref: "#/components/schemas/Cak"
                  description: The MAC Security (MACsec) CAK to associate with the connection. You can create the CKN/CAK pair using an industry standard tool. The valid values are 64 hexadecimal characters (0-9, A-E). If you use this request parameter, you must use the ckn request parameter and not use the secretARN request parameter.
              required:
                - connectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMacSecKeyResponse"
  /AssociateVirtualInterface:
    post:
      operationId: AssociateVirtualInterface
      description: Associates a virtual interface with a specified link aggregation group (LAG) or connection. Connectivity to Amazon Web Services is temporarily interrupted as the virtual interface is being migrated. If the target connection or LAG has an associated virtual interface with a conflicting VLAN number or a conflicting IP address, the operation fails. Virtual interfaces associated with a hosted connection cannot be associated with a LAG; hosted connections must be migrated along with their virtual interfaces using AssociateHostedConnection. To reassociate a virtual interface to a new connection or LAG, the requester must own either the virtual interface itself or the connection to which the virtual interface is currently associated. Additionally, the requester must own the connection or LAG for the association.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.AssociateVirtualInterface
            default: OvertureService.AssociateVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the LAG or connection.
              required:
                - virtualInterfaceId
                - connectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualInterface"
  /ConfirmConnection:
    post:
      operationId: ConfirmConnection
      description: Confirms the creation of the specified hosted connection on an interconnect. Upon creation, the hosted connection is initially in the Ordering state, and remains in this state until the owner confirms creation of the hosted connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.ConfirmConnection
            default: OvertureService.ConfirmConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the hosted connection.
              required:
                - connectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmConnectionResponse"
  /ConfirmCustomerAgreement:
    post:
      operationId: ConfirmCustomerAgreement
      description: The confirmation of the terms of agreement when creating the connection/link aggregation group (LAG).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.ConfirmCustomerAgreement
            default: OvertureService.ConfirmCustomerAgreement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                agreementName:
                  $ref: "#/components/schemas/AgreementName"
                  description: The name of the customer agreement.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmCustomerAgreementResponse"
  /ConfirmPrivateVirtualInterface:
    post:
      operationId: ConfirmPrivateVirtualInterface
      description: Accepts ownership of a private virtual interface created by another Amazon Web Services account. After the virtual interface owner makes this call, the virtual interface is created and attached to the specified virtual private gateway or Direct Connect gateway, and is made available to handle traffic.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.ConfirmPrivateVirtualInterface
            default: OvertureService.ConfirmPrivateVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
                virtualGatewayId:
                  $ref: "#/components/schemas/VirtualGatewayId"
                  description: The ID of the virtual private gateway.
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
              required:
                - virtualInterfaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmPrivateVirtualInterfaceResponse"
  /ConfirmPublicVirtualInterface:
    post:
      operationId: ConfirmPublicVirtualInterface
      description: Accepts ownership of a public virtual interface created by another Amazon Web Services account. After the virtual interface owner makes this call, the specified virtual interface is created and made available to handle traffic.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.ConfirmPublicVirtualInterface
            default: OvertureService.ConfirmPublicVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
              required:
                - virtualInterfaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmPublicVirtualInterfaceResponse"
  /ConfirmTransitVirtualInterface:
    post:
      operationId: ConfirmTransitVirtualInterface
      description: Accepts ownership of a transit virtual interface created by another Amazon Web Services account. After the owner of the transit virtual interface makes this call, the specified transit virtual interface is created and made available to handle traffic.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.ConfirmTransitVirtualInterface
            default: OvertureService.ConfirmTransitVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
              required:
                - virtualInterfaceId
                - directConnectGatewayId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmTransitVirtualInterfaceResponse"
  /CreateBGPPeer:
    post:
      operationId: CreateBGPPeer
      description: Creates a BGP peer on the specified virtual interface. You must create a BGP peer for the corresponding address family (IPv4/IPv6) in order to access Amazon Web Services resources that also use that address family. If logical redundancy is not supported by the connection, interconnect, or LAG, the BGP peer cannot be in the same address family as an existing BGP peer on the virtual interface. When creating a IPv6 BGP peer, omit the Amazon address and customer address. IPv6 addresses are automatically assigned from the Amazon pool of IPv6 addresses; you cannot specify custom IPv6 addresses. If you let Amazon Web Services auto-assign IPv4 addresses, a /30 CIDR will be allocated from 169.254.0.0/16. Amazon Web Services does not recommend this option if you intend to use the customer router peer IP address as the source and destination for traffic. Instead you should use RFC 1918 or other addressing, and specify the address yourself. For more information about RFC 1918 see Address Allocation for Private Internets. For a public virtual interface, the Autonomous System Number (ASN) must be private or already on the allow list for the virtual interface.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateBGPPeer
            default: OvertureService.CreateBGPPeer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
                newBGPPeer:
                  $ref: "#/components/schemas/NewBGPPeer"
                  description: Information about the BGP peer.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBGPPeerResponse"
  /CreateConnection:
    post:
      operationId: CreateConnection
      description: Creates a connection between a customer network and a specific Direct Connect location. A connection links your internal network to an Direct Connect location over a standard Ethernet fiber-optic cable. One end of the cable is connected to your router, the other to an Direct Connect router. To find the locations for your Region, use DescribeLocations. You can automatically add the new connection to a link aggregation group (LAG) by specifying a LAG ID in the request. This ensures that the new connection is allocated on the same Direct Connect endpoint that hosts the specified LAG. If there are no available ports on the endpoint, the request fails and no connection is created.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateConnection
            default: OvertureService.CreateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                location:
                  $ref: "#/components/schemas/LocationCode"
                  description: The location of the connection.
                bandwidth:
                  $ref: "#/components/schemas/Bandwidth"
                  description: The bandwidth of the connection.
                connectionName:
                  $ref: "#/components/schemas/ConnectionName"
                  description: The name of the connection.
                lagId:
                  $ref: "#/components/schemas/LagId"
                  description: The ID of the LAG.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to associate with the lag.
                providerName:
                  $ref: "#/components/schemas/ProviderName"
                  description: The name of the service provider associated with the requested connection.
                requestMACSec:
                  $ref: "#/components/schemas/RequestMACSec"
                  description: Indicates whether you want the connection to support MAC Security (MACsec). MAC Security (MACsec) is unavailable on hosted connections. For information about MAC Security (MACsec) prerequisites, see MAC Security in Direct Connect in the Direct Connect User Guide.
              required:
                - location
                - bandwidth
                - connectionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /CreateDirectConnectGateway:
    post:
      operationId: CreateDirectConnectGateway
      description: Creates a Direct Connect gateway, which is an intermediate object that enables you to connect a set of virtual interfaces and virtual private gateways. A Direct Connect gateway is global and visible in any Amazon Web Services Region after it is created. The virtual interfaces and virtual private gateways that are connected through a Direct Connect gateway can be in different Amazon Web Services Regions. This enables you to connect to a VPC in any Region, regardless of the Region in which the virtual interfaces are located, and pass traffic between them.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateDirectConnectGateway
            default: OvertureService.CreateDirectConnectGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                directConnectGatewayName:
                  $ref: "#/components/schemas/DirectConnectGatewayName"
                  description: The name of the Direct Connect gateway.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key-value pair tags associated with the request.
                amazonSideAsn:
                  $ref: "#/components/schemas/LongAsn"
                  description: The autonomous system number (ASN) for Border Gateway Protocol (BGP) to be configured on the Amazon side of the connection. The ASN must be in the private range of 64,512 to 65,534 or 4,200,000,000 to 4,294,967,294. The default is 64512.
              required:
                - directConnectGatewayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectConnectGatewayResult"
  /CreateDirectConnectGatewayAssociation:
    post:
      operationId: CreateDirectConnectGatewayAssociation
      description: Creates an association between a Direct Connect gateway and a virtual private gateway. The virtual private gateway must be attached to a VPC and must not be associated with another Direct Connect gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateDirectConnectGatewayAssociation
            default: OvertureService.CreateDirectConnectGatewayAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
                gatewayId:
                  $ref: "#/components/schemas/GatewayIdToAssociate"
                  description: The ID of the virtual private gateway or transit gateway.
                addAllowedPrefixesToDirectConnectGateway:
                  $ref: "#/components/schemas/RouteFilterPrefixList"
                  description: The Amazon VPC prefixes to advertise to the Direct Connect gateway This parameter is required when you create an association to a transit gateway. For information about how to set the prefixes, see Allowed Prefixes in the Direct Connect User Guide.
                virtualGatewayId:
                  $ref: "#/components/schemas/VirtualGatewayId"
                  description: The ID of the virtual private gateway.
              required:
                - directConnectGatewayId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectConnectGatewayAssociationResult"
  /CreateDirectConnectGatewayAssociationProposal:
    post:
      operationId: CreateDirectConnectGatewayAssociationProposal
      description: Creates a proposal to associate the specified virtual private gateway or transit gateway with the specified Direct Connect gateway. You can associate a Direct Connect gateway and virtual private gateway or transit gateway that is owned by any Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateDirectConnectGatewayAssociationProposal
            default: OvertureService.CreateDirectConnectGatewayAssociationProposal
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                directConnectGatewayId:
                  $ref: "#/components/schemas/DirectConnectGatewayId"
                  description: The ID of the Direct Connect gateway.
                directConnectGatewayOwnerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The ID of the Amazon Web Services account that owns the Direct Connect gateway.
                gatewayId:
                  $ref: "#/components/schemas/GatewayIdToAssociate"
                  description: The ID of the virtual private gateway or transit gateway.
                addAllowedPrefixesToDirectConnectGateway:
                  $ref: "#/components/schemas/RouteFilterPrefixList"
                  description: The Amazon VPC prefixes to advertise to the Direct Connect gateway.
                removeAllowedPrefixesToDirectConnectGateway:
                  $ref: "#/components/schemas/RouteFilterPrefixList"
                  description: The Amazon VPC prefixes to no longer advertise to the Direct Connect gateway.
              required:
                - directConnectGatewayId
                - directConnectGatewayOwnerAccount
                - gatewayId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectConnectGatewayAssociationProposalResult"
  /CreateInterconnect:
    post:
      operationId: CreateInterconnect
      description: Creates an interconnect between an Direct Connect Partner's network and a specific Direct Connect location. An interconnect is a connection that is capable of hosting other connections. The Direct Connect Partner can use an interconnect to provide Direct Connect hosted connections to customers through their own network services. Like a standard connection, an interconnect links the partner's network to an Direct Connect location over a standard Ethernet fiber-optic cable. One end is connected to the partner's router, the other to an Direct Connect router. You can automatically add the new interconnect to a link aggregation group (LAG) by specifying a LAG ID in the request. This ensures that the new interconnect is allocated on the same Direct Connect endpoint that hosts the specified LAG. If there are no available ports on the endpoint, the request fails and no interconnect is created. For each end customer, the Direct Connect Partner provisions a connection on their interconnect by calling AllocateHostedConnection. The end customer can then connect to Amazon Web Services resources by creating a virtual interface on their connection, using the VLAN assigned to them by the Direct Connect Partner. Intended for use by Direct Connect Partners only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateInterconnect
            default: OvertureService.CreateInterconnect
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                interconnectName:
                  $ref: "#/components/schemas/InterconnectName"
                  description: The name of the interconnect.
                bandwidth:
                  $ref: "#/components/schemas/Bandwidth"
                  description: The port bandwidth, in Gbps. The possible values are 1, 10, and 100.
                location:
                  $ref: "#/components/schemas/LocationCode"
                  description: The location of the interconnect.
                lagId:
                  $ref: "#/components/schemas/LagId"
                  description: The ID of the LAG.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to associate with the interconnect.
                providerName:
                  $ref: "#/components/schemas/ProviderName"
                  description: The name of the service provider associated with the interconnect.
                requestMACSec:
                  $ref: "#/components/schemas/RequestMACSec"
                  description: Indicates whether you want the interconnect to support MAC Security (MACsec).
              required:
                - interconnectName
                - bandwidth
                - location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interconnect"
  /CreateLag:
    post:
      operationId: CreateLag
      description: Creates a link aggregation group (LAG) with the specified number of bundled physical dedicated connections between the customer network and a specific Direct Connect location. A LAG is a logical interface that uses the Link Aggregation Control Protocol (LACP) to aggregate multiple interfaces, enabling you to treat them as a single interface. All connections in a LAG must use the same bandwidth (either 1Gbps, 10Gbps, 100Gbps, or 400Gbps) and must terminate at the same Direct Connect endpoint. You can have up to 10 dedicated connections per location. Regardless of this limit, if you request more connections for the LAG than Direct Connect can allocate on a single endpoint, no LAG is created.. You can specify an existing physical dedicated connection or interconnect to include in the LAG (which counts towards the total number of connections). Doing so interrupts the current physical dedicated connection, and re-establishes them as a member of the LAG. The LAG will be created on the same Direct Connect endpoint to which the dedicated connection terminates. Any virtual interfaces associated with the dedicated connection are automatically disassociated and re-associated with the LAG. The connection ID does not change. If the Amazon Web Services account used to create a LAG is a registered Direct Connect Partner, the LAG is automatically enabled to host sub-connections. For a LAG owned by a partner, any associated virtual interfaces cannot be directly configured.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateLag
            default: OvertureService.CreateLag
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                numberOfConnections:
                  $ref: "#/components/schemas/Count"
                  description: The number of physical dedicated connections initially provisioned and bundled by the LAG. You can have a maximum of four connections when the port speed is 1Gbps or 10Gbps, or two when the port speed is 100Gbps or 400Gbps.
                location:
                  $ref: "#/components/schemas/LocationCode"
                  description: The location for the LAG.
                connectionsBandwidth:
                  $ref: "#/components/schemas/Bandwidth"
                  description: The bandwidth of the individual physical dedicated connections bundled by the LAG. The possible values are 1Gbps,10Gbps, 100Gbps, and 400Gbps.
                lagName:
                  $ref: "#/components/schemas/LagName"
                  description: The name of the LAG.
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of an existing dedicated connection to migrate to the LAG.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to associate with the LAG.
                childConnectionTags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to associate with the automtically created LAGs.
                providerName:
                  $ref: "#/components/schemas/ProviderName"
                  description: The name of the service provider associated with the LAG.
                requestMACSec:
                  $ref: "#/components/schemas/RequestMACSec"
                  description: Indicates whether the connection will support MAC Security (MACsec). All connections in the LAG must be capable of supporting MAC Security (MACsec). For information about MAC Security (MACsec) prerequisties, see MACsec prerequisties in the Direct Connect User Guide.
              required:
                - numberOfConnections
                - location
                - connectionsBandwidth
                - lagName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lag"
  /CreatePrivateVirtualInterface:
    post:
      operationId: CreatePrivateVirtualInterface
      description: Creates a private virtual interface. A virtual interface is the VLAN that transports Direct Connect traffic. A private virtual interface can be connected to either a Direct Connect gateway or a Virtual Private Gateway (VGW). Connecting the private virtual interface to a Direct Connect gateway enables the possibility for connecting to multiple VPCs, including VPCs in different Amazon Web Services Regions. Connecting the private virtual interface to a VGW only provides access to a single VPC within the same Region. Setting the MTU of a virtual interface to 8500 (jumbo frames) can cause an update to the underlying physical connection if it wasn't updated to support jumbo frames. Updating the connection disrupts network connectivity for all virtual interfaces associated with the connection for up to 30 seconds. To check whether your connection supports jumbo frames, call DescribeConnections. To check whether your virtual interface supports jumbo frames, call DescribeVirtualInterfaces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreatePrivateVirtualInterface
            default: OvertureService.CreatePrivateVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection.
                newPrivateVirtualInterface:
                  $ref: "#/components/schemas/NewPrivateVirtualInterface"
                  description: Information about the private virtual interface.
              required:
                - connectionId
                - newPrivateVirtualInterface
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualInterface"
  /CreatePublicVirtualInterface:
    post:
      operationId: CreatePublicVirtualInterface
      description: Creates a public virtual interface. A virtual interface is the VLAN that transports Direct Connect traffic. A public virtual interface supports sending traffic to public services of Amazon Web Services such as Amazon S3. When creating an IPv6 public virtual interface (addressFamily is ipv6), leave the customer and amazon address fields blank to use auto-assigned IPv6 space. Custom IPv6 addresses are not supported.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreatePublicVirtualInterface
            default: OvertureService.CreatePublicVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection.
                newPublicVirtualInterface:
                  $ref: "#/components/schemas/NewPublicVirtualInterface"
                  description: Information about the public virtual interface.
              required:
                - connectionId
                - newPublicVirtualInterface
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualInterface"
  /CreateTransitVirtualInterface:
    post:
      operationId: CreateTransitVirtualInterface
      description: Creates a transit virtual interface. A transit virtual interface should be used to access one or more transit gateways associated with Direct Connect gateways. A transit virtual interface enables the connection of multiple VPCs attached to a transit gateway to a Direct Connect gateway. If you associate your transit gateway with one or more Direct Connect gateways, the Autonomous System Number (ASN) used by the transit gateway and the Direct Connect gateway must be different. For example, if you use the default ASN 64512 for both your the transit gateway and Direct Connect gateway, the association request fails. A jumbo MTU value must be either 1500 or 8500. No other values will be accepted. Setting the MTU of a virtual interface to 8500 (jumbo frames) can cause an update to the underlying physical connection if it wasn't updated to support jumbo frames. Updating the connection disrupts network connectivity for all virtual interfaces associated with the connection for up to 30 seconds. To check whether your connection supports jumbo frames, call DescribeConnections. To check whether your virtual interface supports jumbo frames, call DescribeVirtualInterfaces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.CreateTransitVirtualInterface
            default: OvertureService.CreateTransitVirtualInterface
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection.
                newTransitVirtualInterface:
                  $ref: "#/components/schemas/NewTransitVirtualInterface"
                  description: Information about the transit virtual interface.
              required:
                - connectionId
                - newTransitVirtualInterface
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransitVirtualInterfaceResult"
  /DeleteBGPPeer:
    post:
      operationId: DeleteBGPPeer
      description: Deletes the specified BGP peer on the specified virtual interface with the specified customer address and ASN. You cannot delete the last BGP peer from a virtual interface.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DeleteBGPPeer
            default: OvertureService.DeleteBGPPeer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                virtualInterfaceId:
                  $ref: "#/components/schemas/VirtualInterfaceId"
                  description: The ID of the virtual interface.
                asn:
                  $ref: "#/components/schemas/ASN"
                  description: The autonomous system number (ASN). The valid range is from 1 to 2147483646 for Border Gateway Protocol (BGP) configuration. If you provide a number greater than the maximum, an error is returned. Use asnLong instead. You can use asnLong or asn, but not both. We recommend using asnLong as it supports a greater pool of numbers. The asnLong attribute accepts both ASN and long ASN ranges. If you provide a value in the same API call for both asn and asnLong, the API will only accept the value for asnLong.
                asnLong:
                  $ref: "#/components/schemas/LongAsn"
                  description: The long ASN for the BGP peer to be deleted from a Direct Connect virtual interface. The valid range is from 1 to 4294967294 for BGP configuration. You can use asnLong or asn, but not both. We recommend using asnLong as it supports a greater pool of numbers. The asnLong attribute accepts both ASN and long ASN ranges. If you provide a value in the same API call for both asn and asnLong, the API will only accept the value for asnLong.
                customerAddress:
                  $ref: "#/components/schemas/CustomerAddress"
                  description: The IP address assigned to the customer interface.
                bgpPeerId:
                  $ref: "#/components/schemas/BGPPeerId"
                  description: The ID of the BGP peer.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBGPPeerResponse"
  /DeleteConnection:
    post:
      operationId: DeleteConnection
      description: Deletes the specified connection. Deleting a connection only stops the Direct Connect port hour and data transfer charges. If you are partnering with any third parties to connect with the Direct Connect location, you must cancel your service with them separately.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OvertureService.DeleteConnection
            default: OvertureService.DeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                connectionId:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The ID of the connection.
              required:
                - connectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
  /DeleteDirectConnectGateway:
    post:
      operationId: DeleteDirectConnectGateway
      description: Deletes the specified Direct Connect gateway. You must first delete all virtual interfaces that are attached to the Direct Connect gateway and disassociate all virtual private gateways associated with the Direct Connect gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
