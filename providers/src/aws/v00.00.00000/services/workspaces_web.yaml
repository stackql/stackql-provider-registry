        browserSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the browser settings.
      required:
        - portalArn
        - browserSettingsArn
    AssociateDataProtectionSettingsResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        dataProtectionSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the data protection settings resource.
      required:
        - portalArn
        - dataProtectionSettingsArn
    AssociateIpAccessSettingsResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        ipAccessSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the IP access settings resource.
      required:
        - portalArn
        - ipAccessSettingsArn
    AssociateNetworkSettingsResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        networkSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the network settings.
      required:
        - portalArn
        - networkSettingsArn
    AssociateSessionLoggerResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the portal.
        sessionLoggerArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the session logger.
      required:
        - portalArn
        - sessionLoggerArn
    AssociateTrustStoreResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        trustStoreArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the trust store.
      required:
        - portalArn
        - trustStoreArn
    AssociateUserAccessLoggingSettingsResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        userAccessLoggingSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the user access logging settings.
      required:
        - portalArn
        - userAccessLoggingSettingsArn
    AssociateUserSettingsResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        userSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the user settings.
      required:
        - portalArn
        - userSettingsArn
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: The tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    keyArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=\/,.@-]+:kms:[a-zA-Z0-9\-]*:[a-zA-Z0-9]{1,12}:key\/[a-zA-Z0-9-]+
    EncryptionContextMap:
      type: object
      properties: {}
    BrowserPolicy:
      type: string
      minLength: 2
      maxLength: 131072
      pattern: \{[\S\s]*\}\s*
    ClientToken:
      type: string
      minLength: 1
      maxLength: 512
    WebContentFilteringPolicy:
      description: The policy that specifies which URLs end users are allowed to access or which URLs or domain categories they are restricted from accessing for enhanced security.
      type: object
      properties:
        blockedCategories:
          $ref: "#/components/schemas/BlockedCategories"
          description: Categories of websites that are blocked on the end user’s browsers.
        allowedUrls:
          $ref: "#/components/schemas/UrlPatternList"
          description: URLs and domains that are always accessible to end users.
        blockedUrls:
          $ref: "#/components/schemas/UrlPatternList"
          description: URLs and domains that end users cannot access.
    BlockedCategories:
      type: array
      items:
        $ref: "#/components/schemas/Category"
    Category:
      type: string
      enum:
        - Cults
        - Gambling
        - Nudity
        - Pornography
        - SexEducation
        - Tasteless
        - Violence
        - DownloadSites
        - ImageSharing
        - PeerToPeer
        - StreamingMediaAndDownloads
        - GenerativeAI
        - CriminalActivity
        - Hacking
        - HateAndIntolerance
        - IllegalDrug
        - IllegalSoftware
        - SchoolCheating
        - SelfHarm
        - Weapons
        - Chat
        - Games
        - InstantMessaging
        - ProfessionalNetwork
        - SocialNetworking
        - WebBasedEmail
        - ParkedDomains
    UrlPatternList:
      type: array
      items:
        $ref: "#/components/schemas/UrlPattern"
    UrlPattern:
      type: string
      pattern: ((([a-zA-Z][a-zA-Z0-9+.-]*):\/\/(\*|[\w%._\-\+~#=@]+)?(\/[^@\s]*)?(?:\?([^*\s]+(?:\*?)))?)|(\*|[\w%._\-\+~#=@]+\.[\w%._\-\+~#=@]+)(?::(\d{1,5}))?(\/[^@\s]*)?(?:\?([^*\s]+(?:\*?)))?|(([a-zA-Z][a-zA-Z0-9+.-]*):(\/\/)?\*))
    CreateBrowserSettingsResponse:
      type: object
      properties:
        browserSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the browser settings.
      required:
        - browserSettingsArn
    DisplayNameSafe:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[ _\\-\\d\\w]+"
    DescriptionSafe:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[ _\\-\\d\\w]+"
    InlineRedactionConfiguration:
      description: The configuration for in-session inline redaction.
      type: object
      properties:
        inlineRedactionPatterns:
          $ref: "#/components/schemas/InlineRedactionPatterns"
          description: The inline redaction patterns to be enabled for the inline redaction configuration.
        globalEnforcedUrls:
          $ref: "#/components/schemas/GlobalInlineRedactionUrls"
          description: The global enforced URL configuration for the inline redaction configuration. This is applied to patterns that do not have a pattern-level enforced URL list.
        globalExemptUrls:
          $ref: "#/components/schemas/GlobalInlineRedactionUrls"
          description: The global exempt URL configuration for the inline redaction configuration. This is applied to patterns that do not have a pattern-level exempt URL list.
        globalConfidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          description: The global confidence level for the inline redaction configuration. This indicates the certainty of data type matches in the redaction process. Confidence level 3 means high confidence, and requires a formatted text pattern match in order for content to be redacted. Confidence level 2 means medium confidence, and redaction considers both formatted and unformatted text, and adds keyword associate to the logic. Confidence level 1 means low confidence, and redaction is enforced for both formatted pattern + unformatted pattern without keyword. This is applied to patterns that do not have a pattern-level confidence level. Defaults to confidence level 2.
      required:
        - inlineRedactionPatterns
    InlineRedactionPatterns:
      type: array
      items:
        $ref: "#/components/schemas/InlineRedactionPattern"
    InlineRedactionPattern:
      description: The set of patterns that determine the data types redacted in session.
      type: object
      properties:
        builtInPatternId:
          $ref: "#/components/schemas/BuiltInPatternId"
          description: The built-in pattern from the list of preconfigured patterns. Either a customPattern or builtInPatternId is required.
        customPattern:
          $ref: "#/components/schemas/CustomPattern"
          description: ">The configuration for a custom pattern. Either a customPattern or builtInPatternId is required."
        redactionPlaceHolder:
          $ref: "#/components/schemas/RedactionPlaceHolder"
          description: The redaction placeholder that will replace the redacted text in session for the inline redaction pattern.
        enforcedUrls:
          $ref: "#/components/schemas/InlineRedactionUrls"
          description: The enforced URL configuration for the inline redaction pattern. This will override the global enforced URL configuration.
        exemptUrls:
          $ref: "#/components/schemas/InlineRedactionUrls"
          description: The exempt URL configuration for the inline redaction pattern. This will override the global exempt URL configuration for the inline redaction pattern.
        confidenceLevel:
          $ref: "#/components/schemas/ConfidenceLevel"
          description: The confidence level for inline redaction pattern. This indicates the certainty of data type matches in the redaction process. Confidence level 3 means high confidence, and requires a formatted text pattern match in order for content to be redacted. Confidence level 2 means medium confidence, and redaction considers both formatted and unformatted text, and adds keyword associate to the logic. Confidence level 1 means low confidence, and redaction is enforced for both formatted pattern + unformatted pattern without keyword. This overrides the global confidence level.
      required:
        - redactionPlaceHolder
    BuiltInPatternId:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[_\\-\\d\\w]+"
    CustomPattern:
      description: The pattern configuration for redacting custom data types in session.
      type: object
      properties:
        patternName:
          $ref: "#/components/schemas/PatternName"
          description: The pattern name for the custom pattern.
        patternRegex:
          $ref: "#/components/schemas/Regex"
          description: "The pattern regex for the customer pattern. The format must follow JavaScript regex format. The pattern must be enclosed between slashes, and can have flags behind the second slash. For example: “/ab+c/gi”."
        patternDescription:
          $ref: "#/components/schemas/DescriptionSafe"
          description: The pattern description for the customer pattern.
        keywordRegex:
          $ref: "#/components/schemas/Regex"
          description: The keyword regex for the customer pattern. After there is a match to the pattern regex, the keyword regex is used to search within the proximity of the match. If there is a keyword match, then the match is confirmed. If no keyword regex is provided, the pattern regex match will automatically be confirmed. The format must follow JavaScript regex format. The pattern must be enclosed between slashes, and can have flags behind the second slash. For example, “/ab+c/gi”
      required:
        - patternName
        - patternRegex
    PatternName:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[_\\-\\d\\w]+"
    Regex:
      type: string
      minLength: 0
      maxLength: 300
      pattern: \/((?:[^\n])+)\/([gimsuyvd]{0,8})
    RedactionPlaceHolder:
      description: The redaction placeholder that will replace the redacted text in session.
      type: object
      properties:
        redactionPlaceHolderType:
          $ref: "#/components/schemas/RedactionPlaceHolderType"
          description: The redaction placeholder type that will replace the redacted text in session.
        redactionPlaceHolderText:
          $ref: "#/components/schemas/RedactionPlaceHolderText"
          description: The redaction placeholder text that will replace the redacted text in session for the custom text redaction placeholder type.
      required:
        - redactionPlaceHolderType
    RedactionPlaceHolderType:
      type: string
      enum:
        - CustomText
    RedactionPlaceHolderText:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[*_\\-\\d\\w]+"
    InlineRedactionUrls:
      type: array
      items:
        $ref: "#/components/schemas/InlineRedactionUrl"
    InlineRedactionUrl:
      type: string
      pattern: ((([a-zA-Z][a-zA-Z0-9+.-]*):\/\/(\*|[\w%._\-\+~#=@]+)?(\/[^@\s]*)?(?:\?([^*\s]+(?:\*?)))?)|(\*|[\w%._\-\+~#=@]+\.[\w%._\-\+~#=@]+)(?::(\d{1,5}))?(\/[^@\s]*)?(?:\?([^*\s]+(?:\*?)))?|(([a-zA-Z][a-zA-Z0-9+.-]*):(\/\/)?\*))
    ConfidenceLevel:
      type: integer
      minimum: 1
      maximum: 3
    GlobalInlineRedactionUrls:
      type: array
      items:
        $ref: "#/components/schemas/InlineRedactionUrl"
    CreateDataProtectionSettingsResponse:
      type: object
      properties:
        dataProtectionSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the data protection settings resource.
      required:
        - dataProtectionSettingsArn
    IdentityProviderName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[^_][\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}][^_]+"
    IdentityProviderType:
      type: string
      enum:
        - SAML
        - Facebook
        - Google
        - LoginWithAmazon
        - SignInWithApple
        - OIDC
    IdentityProviderDetails:
      type: object
      properties: {}
    CreateIdentityProviderResponse:
      type: object
      properties:
        identityProviderArn:
          $ref: "#/components/schemas/SubresourceARN"
          description: The ARN of the identity provider.
      required:
        - identityProviderArn
    SubresourceARN:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=\/,.@-]+:[a-zA-Z0-9\-]+:[a-zA-Z0-9\-]*:[a-zA-Z0-9]{1,12}:[a-zA-Z]+(\/[a-fA-F0-9\-]{36}){2,}
    DisplayName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .+
    Description:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .+
    IpRuleList:
      type: array
      items:
        $ref: "#/components/schemas/IpRule"
    IpRule:
      description: The IP rules of the IP access settings.
      type: object
      properties:
        ipRange:
          $ref: "#/components/schemas/IpRange"
          description: The IP range of the IP rule.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the IP rule.
      required:
        - ipRange
    IpRange:
      description: A single IP address or an IP address range in CIDR notation
      type: string
    CreateIpAccessSettingsResponse:
      type: object
      properties:
        ipAccessSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the IP access settings resource.
      required:
        - ipAccessSettingsArn
    VpcId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: vpc-[0-9a-z]*
    SubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: subnet-([0-9a-f]{8}|[0-9a-f]{17})
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+\\-]+"
    CreateNetworkSettingsResponse:
      type: object
      properties:
        networkSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the network settings.
      required:
        - networkSettingsArn
    AuthenticationType:
      type: string
      enum:
        - Standard
        - IAM_Identity_Center
    InstanceType:
      type: string
      enum:
        - standard.regular
        - standard.large
        - standard.xlarge
    MaxConcurrentSessions:
      type: integer
      minimum: 1
      maximum: 5000
    PortalCustomDomain:
      type: string
      minLength: 0
      maxLength: 128
      pattern: (|[a-zA-Z0-9]?((?!-)([A-Za-z0-9-]*[A-Za-z0-9])\.)+[a-zA-Z0-9]+)
    CreatePortalResponse:
      type: object
      properties:
        portalArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the web portal.
        portalEndpoint:
          $ref: "#/components/schemas/PortalEndpoint"
          description: The endpoint URL of the web portal that users access in order to start streaming sessions.
      required:
        - portalArn
        - portalEndpoint
    PortalEndpoint:
      type: string
      minLength: 1
      maxLength: 253
      pattern: (?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z0-9][a-z0-9-]{0,61}[a-z0-9]
    EventFilter:
      description: The filter that specifies the events to monitor.
      type: object
      properties:
        all:
          $ref: "#/components/schemas/Unit"
          description: The filter that monitors all of the available events, including any new events emitted in the future.
        include:
          $ref: "#/components/schemas/Events"
          description: The filter that monitors only the listed set of events. New events are not auto-monitored.
    Unit:
      type: object
    Events:
      type: array
      items:
        $ref: "#/components/schemas/Event"
    Event:
      type: string
      enum:
        - WebsiteInteract
        - FileDownloadFromSecureBrowserToRemoteDisk
        - FileTransferFromRemoteToLocalDisk
        - FileTransferFromLocalToRemoteDisk
        - FileUploadFromRemoteDiskToSecureBrowser
        - ContentPasteToWebsite
        - ContentTransferFromLocalToRemoteClipboard
        - ContentCopyFromWebsite
        - UrlLoad
        - TabOpen
        - TabClose
        - PrintJobSubmit
        - SessionConnect
        - SessionStart
        - SessionDisconnect
        - SessionEnd
        - UrlBlockByContentFilter
    LogConfiguration:
      description: The configuration of the log.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3LogConfiguration"
          description: The configuration for delivering the logs to S3.
    S3LogConfiguration:
      description: The S3 log configuration.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The S3 bucket name where logs are delivered.
        keyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: The S3 path prefix that determines where log files are stored.
        bucketOwner:
          $ref: "#/components/schemas/S3BucketOwner"
          description: The expected bucket owner of the target S3 bucket. The caller must have permissions to write to the target bucket.
        logFileFormat:
          $ref: "#/components/schemas/LogFileFormat"
          description: The format of the LogFile that is written to S3.
        folderStructure:
          $ref: "#/components/schemas/FolderStructure"
          description: The folder structure that defines the organizational structure for log files in S3.
      required:
        - bucket
        - logFileFormat
        - folderStructure
    S3Bucket:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    S3KeyPrefix:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\d\\w\\-_/!().*']+"
    S3BucketOwner:
      type: string
      pattern: "[0-9]{12}"
    LogFileFormat:
      type: string
      enum:
        - JSONLines
        - Json
    FolderStructure:
      type: string
      enum:
        - Flat
        - NestedByDate
    CreateSessionLoggerResponse:
      type: object
      properties:
        sessionLoggerArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the session logger.
      required:
        - sessionLoggerArn
    CertificateList:
      type: array
      items:
        $ref: "#/components/schemas/CertificateAuthorityBody"
    CertificateAuthorityBody:
      type: string
      format: byte
      minLength: 1
      maxLength: 32768
    CreateTrustStoreResponse:
      type: object
      properties:
        trustStoreArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the trust store.
      required:
        - trustStoreArn
    KinesisStreamArn:
      description: Kinesis stream ARN to which log events are published.
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=/,.@-]+:kinesis:[a-zA-Z0-9\-]*:[a-zA-Z0-9]{1,12}:stream/.+
    CreateUserAccessLoggingSettingsResponse:
      type: object
      properties:
        userAccessLoggingSettingsArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN of the user access logging settings.
      required:
        - userAccessLoggingSettingsArn
    EnabledType:
      type: string
      enum:
        - Disabled
        - Enabled
    DisconnectTimeoutInMinutes:
      type: integer
      minimum: 1
      maximum: 600
    IdleDisconnectTimeoutInMinutes:
      type: integer
      minimum: 0
      maximum: 60
    CookieSynchronizationConfiguration:
      description: The configuration that specifies which cookies should be synchronized from the end user's local browser to the remote browser.
      type: object
      properties:
        allowlist:
          $ref: "#/components/schemas/CookieSpecifications"
          description: The list of cookie specifications that are allowed to be synchronized to the remote browser.
        blocklist:
          $ref: "#/components/schemas/CookieSpecifications"
          description: The list of cookie specifications that are blocked from being synchronized to the remote browser.
      required:
        - allowlist
    CookieSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/CookieSpecification"
    CookieSpecification:
      description: Specifies a single cookie or set of cookies in an end user's browser.
      type: object
      properties:
        domain:
          $ref: "#/components/schemas/CookieDomain"
          description: The domain of the cookie.
        name:
          $ref: "#/components/schemas/CookieName"
          description: The name of the cookie.
        path:
          $ref: "#/components/schemas/CookiePath"
          description: The path of the cookie.
      required:
        - domain
    CookieDomain:
      type: string
      minLength: 0
      maxLength: 253
      pattern: (\.?)(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)*[a-z0-9][a-z0-9-]{0,61}[a-z0-9]
    CookieName:
      type: string
      minLength: 0
      maxLength: 4096
    CookiePath:
      type: string
      minLength: 0
      maxLength: 2000
      pattern: /(\S)*
    ToolbarConfiguration:
      description: The configuration of the toolbar. This allows administrators to select the toolbar type and visual mode, set maximum display resolution for sessions, and choose which items are visible to end users during their sessions. If administrators do not modify these settings, end users retain control over their toolbar preferences.
      type: object
      properties:
        toolbarType:
          $ref: "#/components/schemas/ToolbarType"
          description: The type of toolbar displayed during the session.
        visualMode:
          $ref: "#/components/schemas/VisualMode"
          description: The visual mode of the toolbar.
        hiddenToolbarItems:
          $ref: "#/components/schemas/HiddenToolbarItemList"
          description: The list of toolbar items to be hidden.
        maxDisplayResolution:
          $ref: "#/components/schemas/MaxDisplayResolution"
          description: The maximum display resolution that is allowed for the session.
    ToolbarType:
      type: string
      enum:
        - Floating
        - Docked
    VisualMode:
      type: string
      enum:
        - Dark
        - Light
    HiddenToolbarItemList:
      type: array
      items:
        $ref: "#/components/schemas/ToolbarItem"
    ToolbarItem:
      type: string
      enum:
        - Windows
        - DualMonitor
        - FullScreen
        - Webcam
        - Microphone
    MaxDisplayResolution:
      type: string
      enum:
        - size4096X2160
        - size3840X2160
        - size3440X1440
        - size2560X1440
        - size1920X1080
        - size1280X720
        - size1024X768
        - size800X600
    BrandingConfigurationCreateInput:
      description: The input configuration for creating branding settings.
      type: object
      properties:
        logo:
          $ref: "#/components/schemas/IconImageInput"
          description: The logo image for the portal. Provide either a binary image file or an S3 URI pointing to the image file. Maximum 100 KB in JPEG, PNG, or ICO format.
        wallpaper:
          $ref: "#/components/schemas/WallpaperImageInput"
          description: The wallpaper image for the portal. Provide either a binary image file or an S3 URI pointing to the image file. Maximum 5 MB in JPEG or PNG format. If not provided, a default wallpaper will be used as the background image.
        favicon:
          $ref: "#/components/schemas/IconImageInput"
          description: The favicon image for the portal. Provide either a binary image file or an S3 URI pointing to the image file. Maximum 100 KB in JPEG, PNG, or ICO format.
        localizedStrings:
          type: object
          properties: {}
