    VirtualNodeConnectionPool:
      description: An object that represents the type of virtual node connection pool. Only one protocol is used at a time and should be the same protocol as the one chosen under port mapping. If not present the default value for maxPendingRequests is 2147483647.
      type: object
      properties:
        grpc:
          $ref: "#/components/schemas/VirtualNodeGrpcConnectionPool"
          description: An object that represents a type of connection pool.
        http:
          $ref: "#/components/schemas/VirtualNodeHttpConnectionPool"
          description: An object that represents a type of connection pool.
        http2:
          $ref: "#/components/schemas/VirtualNodeHttp2ConnectionPool"
          description: An object that represents a type of connection pool.
        tcp:
          $ref: "#/components/schemas/VirtualNodeTcpConnectionPool"
          description: An object that represents a type of connection pool.
