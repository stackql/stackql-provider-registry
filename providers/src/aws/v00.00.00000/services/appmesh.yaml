    ClientPolicy:
      description: An object that represents a client policy.
      type: object
      properties:
        tls:
          $ref: "#/components/schemas/ClientPolicyTls"
          description: A reference to an object that represents a Transport Layer Security (TLS) client policy.
    ClientPolicyTls:
      description: A reference to an object that represents a Transport Layer Security (TLS) client policy.
