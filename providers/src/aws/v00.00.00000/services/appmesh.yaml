openapi: 3.0.0
info:
  version: "2019-01-25"
  title: AWS App Mesh
  description: AWS App Mesh
  x-serviceName: appmesh
  x-serviceAlias: appmesh
  x-protocol: rest-json
  x-apiVersion: "2019-01-25"
  x-endpointPrefix: appmesh
  x-jsonVersion: "1.1"
servers:
  - url: https://appmesh.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appmesh
paths:
  /v20190125/meshes/{mesh_name}/virtualGateway/{virtual_gateway_name}/gatewayRoutes:
    put:
      operationId: CreateGatewayRoute
      description: Creates a gateway route. A gateway route is attached to a virtual gateway and routes traffic to an existing virtual service. If a route matches a request, it can distribute traffic to a target virtual service. For more information about gateway routes, see Gateway routes.
      parameters:
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to create the gateway route in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then the account that you specify must share the mesh with your account before you can create the resource in the service mesh. For more information about mesh sharing, see Working with shared meshes.
        - name: virtual_gateway_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the virtual gateway to associate the gateway route with. If the virtual gateway is in a shared mesh, then you must be the owner of the virtual gateway resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                gatewayRouteName:
                  $ref: "#/components/schemas/ResourceName"
                spec:
                  $ref: "#/components/schemas/GatewayRouteSpec"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - gatewayRouteName
                - spec
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGatewayRouteOutput"
    get:
      operationId: ListGatewayRoutes
      description: Returns a list of existing gateway routes that are associated to a virtual gateway.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListGatewayRoutesLimit"
          description: The maximum number of results returned by ListGatewayRoutes in paginated output. When you use this parameter, ListGatewayRoutes returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListGatewayRoutes request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListGatewayRoutes returns up to 100 results and a nextToken value if applicable.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to list gateway routes in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListGatewayRoutes request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
        - name: virtual_gateway_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the virtual gateway to list gateway routes in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewayRoutesOutput"
  /v20190125/meshes:
    put:
      operationId: CreateMesh
      description: Creates a service mesh. A service mesh is a logical boundary for network traffic between services that are represented by resources within the mesh. After you create your service mesh, you can create virtual services, virtual nodes, virtual routers, and routes to distribute traffic between the applications in your mesh. For more information about service meshes, see Service meshes.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                meshName:
                  $ref: "#/components/schemas/ResourceName"
                spec:
                  $ref: "#/components/schemas/MeshSpec"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - meshName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMeshOutput"
    get:
      operationId: ListMeshes
      description: Returns a list of existing service meshes.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListMeshesLimit"
          description: The maximum number of results returned by ListMeshes in paginated output. When you use this parameter, ListMeshes returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListMeshes request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListMeshes returns up to 100 results and a nextToken value if applicable.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListMeshes request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This token should be treated as an opaque identifier that is used only to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMeshesOutput"
  /v20190125/meshes/{mesh_name}/virtualRouter/{virtual_router_name}/routes:
    put:
      operationId: CreateRoute
      description: Creates a route that is associated with a virtual router. You can route several different protocols and define a retry policy for a route. Traffic can be routed to one or more virtual nodes. For more information about routes, see Routes.
      parameters:
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to create the route in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then the account that you specify must share the mesh with your account before you can create the resource in the service mesh. For more information about mesh sharing, see Working with shared meshes.
        - name: virtual_router_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the virtual router in which to create the route. If the virtual router is in a shared mesh, then you must be the owner of the virtual router resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                routeName:
                  $ref: "#/components/schemas/ResourceName"
                spec:
                  $ref: "#/components/schemas/RouteSpec"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - routeName
                - spec
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRouteOutput"
    get:
      operationId: ListRoutes
      description: Returns a list of existing routes in a service mesh.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRoutesLimit"
          description: The maximum number of results returned by ListRoutes in paginated output. When you use this parameter, ListRoutes returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListRoutes request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListRoutes returns up to 100 results and a nextToken value if applicable.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to list routes in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListRoutes request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
        - name: virtual_router_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the virtual router to list routes in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoutesOutput"
  /v20190125/meshes/{mesh_name}/virtualGateways:
    put:
      operationId: CreateVirtualGateway
      description: Creates a virtual gateway. A virtual gateway allows resources outside your mesh to communicate to resources that are inside your mesh. The virtual gateway represents an Envoy proxy running in an Amazon ECS task, in a Kubernetes service, or on an Amazon EC2 instance. Unlike a virtual node, which represents an Envoy running with an application, a virtual gateway represents Envoy deployed by itself. For more information about virtual gateways, see Virtual gateways.
      parameters:
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to create the virtual gateway in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then the account that you specify must share the mesh with your account before you can create the resource in the service mesh. For more information about mesh sharing, see Working with shared meshes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                spec:
                  $ref: "#/components/schemas/VirtualGatewaySpec"
                tags:
                  $ref: "#/components/schemas/TagList"
                virtualGatewayName:
                  $ref: "#/components/schemas/ResourceName"
              required:
                - spec
                - virtualGatewayName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVirtualGatewayOutput"
    get:
      operationId: ListVirtualGateways
      description: Returns a list of existing virtual gateways in a service mesh.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListVirtualGatewaysLimit"
          description: The maximum number of results returned by ListVirtualGateways in paginated output. When you use this parameter, ListVirtualGateways returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListVirtualGateways request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListVirtualGateways returns up to 100 results and a nextToken value if applicable.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to list virtual gateways in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListVirtualGateways request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVirtualGatewaysOutput"
  /v20190125/meshes/{mesh_name}/virtualNodes:
    put:
      operationId: CreateVirtualNode
      description: Creates a virtual node within a service mesh. A virtual node acts as a logical pointer to a particular task group, such as an Amazon ECS service or a Kubernetes deployment. When you create a virtual node, you can specify the service discovery information for your task group, and whether the proxy running in a task group will communicate with other proxies using Transport Layer Security (TLS). You define a listener for any inbound traffic that your virtual node expects. Any virtual service that your virtual node expects to communicate to is specified as a backend. The response metadata for your new virtual node contains the arn that is associated with the virtual node. Set this value to the full ARN; for example, arn:aws:appmesh:us-west-2:123456789012:myMesh/default/virtualNode/myApp) as the APPMESH_RESOURCE_ARN environment variable for your task group's Envoy proxy container in your task definition or pod spec. This is then mapped to the node.id and node.cluster Envoy parameters. By default, App Mesh uses the name of the resource you specified in APPMESH_RESOURCE_ARN when Envoy is referring to itself in metrics and traces. You can override this behavior by setting the APPMESH_RESOURCE_CLUSTER environment variable with your own name. For more information about virtual nodes, see Virtual nodes. You must be using 1.15.0 or later of the Envoy image when setting these variables. For more information aboutApp Mesh Envoy variables, see Envoy image in the App Mesh User Guide.
      parameters:
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to create the virtual node in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then the account that you specify must share the mesh with your account before you can create the resource in the service mesh. For more information about mesh sharing, see Working with shared meshes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                spec:
                  $ref: "#/components/schemas/VirtualNodeSpec"
                tags:
                  $ref: "#/components/schemas/TagList"
                virtualNodeName:
                  $ref: "#/components/schemas/ResourceName"
              required:
                - spec
                - virtualNodeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVirtualNodeOutput"
    get:
      operationId: ListVirtualNodes
      description: Returns a list of existing virtual nodes.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListVirtualNodesLimit"
          description: The maximum number of results returned by ListVirtualNodes in paginated output. When you use this parameter, ListVirtualNodes returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListVirtualNodes request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListVirtualNodes returns up to 100 results and a nextToken value if applicable.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to list virtual nodes in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListVirtualNodes request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVirtualNodesOutput"
  /v20190125/meshes/{mesh_name}/virtualRouters:
    put:
      operationId: CreateVirtualRouter
      description: Creates a virtual router within a service mesh. Specify a listener for any inbound traffic that your virtual router receives. Create a virtual router for each protocol and port that you need to route. Virtual routers handle traffic for one or more virtual services within your mesh. After you create your virtual router, create and associate routes for your virtual router that direct incoming requests to different virtual nodes. For more information about virtual routers, see Virtual routers.
      parameters:
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to create the virtual router in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then the account that you specify must share the mesh with your account before you can create the resource in the service mesh. For more information about mesh sharing, see Working with shared meshes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                spec:
                  $ref: "#/components/schemas/VirtualRouterSpec"
                tags:
                  $ref: "#/components/schemas/TagList"
                virtualRouterName:
                  $ref: "#/components/schemas/ResourceName"
              required:
                - spec
                - virtualRouterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVirtualRouterOutput"
    get:
      operationId: ListVirtualRouters
      description: Returns a list of existing virtual routers in a service mesh.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListVirtualRoutersLimit"
          description: The maximum number of results returned by ListVirtualRouters in paginated output. When you use this parameter, ListVirtualRouters returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListVirtualRouters request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListVirtualRouters returns up to 100 results and a nextToken value if applicable.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to list virtual routers in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListVirtualRouters request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVirtualRoutersOutput"
  /v20190125/meshes/{mesh_name}/virtualServices:
    put:
      operationId: CreateVirtualService
      description: Creates a virtual service within a service mesh. A virtual service is an abstraction of a real service that is provided by a virtual node directly or indirectly by means of a virtual router. Dependent services call your virtual service by its virtualServiceName, and those requests are routed to the virtual node or virtual router that is specified as the provider for the virtual service. For more information about virtual services, see Virtual services.
      parameters:
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to create the virtual service in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then the account that you specify must share the mesh with your account before you can create the resource in the service mesh. For more information about mesh sharing, see Working with shared meshes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                spec:
                  $ref: "#/components/schemas/VirtualServiceSpec"
                tags:
                  $ref: "#/components/schemas/TagList"
                virtualServiceName:
                  $ref: "#/components/schemas/ServiceName"
              required:
                - spec
                - virtualServiceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVirtualServiceOutput"
    get:
      operationId: ListVirtualServices
      description: Returns a list of existing virtual services in a service mesh.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListVirtualServicesLimit"
          description: The maximum number of results returned by ListVirtualServices in paginated output. When you use this parameter, ListVirtualServices returns only limit results in a single page along with a nextToken response element. You can see the remaining results of the initial request by sending another ListVirtualServices request with the returned nextToken value. This value can be between 1 and 100. If you don't use this parameter, ListVirtualServices returns up to 100 results and a nextToken value if applicable.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to list virtual services in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The nextToken value returned from a previous paginated ListVirtualServices request where limit was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVirtualServicesOutput"
  /v20190125/meshes/{mesh_name}/virtualGateway/{virtual_gateway_name}/gatewayRoutes/{gateway_route_name}:
    delete:
      operationId: DeleteGatewayRoute
      description: Deletes an existing gateway route.
      parameters:
        - name: gateway_route_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the gateway route to delete.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh to delete the gateway route from.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: virtual_gateway_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the virtual gateway to delete the route from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGatewayRouteOutput"
    get:
      operationId: DescribeGatewayRoute
      description: Describes an existing gateway route.
      parameters:
        - name: gateway_route_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the gateway route to describe.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh that the gateway route resides in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: virtual_gateway_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the virtual gateway that the gateway route is associated with.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGatewayRouteOutput"
    put:
      operationId: UpdateGatewayRoute
      description: Updates an existing gateway route that is associated to a specified virtual gateway in a service mesh.
      parameters:
        - name: gateway_route_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the gateway route to update.
        - name: mesh_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the service mesh that the gateway route resides in.
        - name: meshOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services IAM account ID of the service mesh owner. If the account ID is not your own, then it's the ID of the account that shared the mesh with your account. For more information about mesh sharing, see Working with shared meshes.
        - name: virtual_gateway_name
          in: path
          required: true
