        TargetVisualsConfiguration:
          $ref: "#/components/schemas/FilterOperationTargetVisualsConfiguration"
          description: The configuration that chooses the target visuals to be filtered.
      required:
        - SelectedFieldsConfiguration
        - TargetVisualsConfiguration
    FilterOperationSelectedFieldsConfiguration:
      description: The configuration of selected fields in theCustomActionFilterOperation. This is a union type structure. For this structure to be valid, only one of the attributes can be defined.
      type: object
      properties:
        SelectedFields:
          $ref: "#/components/schemas/SelectedFieldList"
          description: Chooses the fields that are filtered in CustomActionFilterOperation.
        SelectedFieldOptions:
          $ref: "#/components/schemas/SelectedFieldOptions"
          description: "A structure that contains the options that choose which fields are filtered in the CustomActionFilterOperation. Valid values are defined as follows: ALL_FIELDS: Applies the filter operation to all fields."
