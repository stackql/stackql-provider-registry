      description: A constant used in a category filter.
      type: object
      properties:
        ConstantType:
          $ref: "#/components/schemas/ConstantType"
          description: The type of category filter constant. This element is used to specify whether a constant is a singular or collective. Valid values are SINGULAR and COLLECTIVE.
        SingularConstant:
          $ref: "#/components/schemas/LimitedString"
          description: A singular constant used in a category filter. This element is used to specify a single value for the constant.
        CollectiveConstant:
          $ref: "#/components/schemas/CollectiveConstant"
