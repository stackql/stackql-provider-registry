      description: A structure that contains the information for the snapshot that you want to generate. This information is provided by you when you start a new snapshot job.
      type: object
      properties:
        SheetSelections:
          $ref: "#/components/schemas/SnapshotFileSheetSelectionList"
          description: A list of SnapshotFileSheetSelection objects that contain information on the dashboard sheet that is exported. These objects provide information about the snapshot artifacts that are generated during the job. This structure can hold a maximum of 5 CSV configurations, 5 Excel configurations, or 1 configuration for PDF.
        FormatType:
          $ref: "#/components/schemas/SnapshotFileFormatType"
          description: The format of the snapshot file to be generated. You can choose between CSV, Excel, or PDF.
      required:
        - SheetSelections
        - FormatType
    SnapshotFileSheetSelectionList:
      type: array
      items:
        $ref: "#/components/schemas/SnapshotFileSheetSelection"
    SnapshotFileSheetSelection:
      description: A structure that contains information that identifies the snapshot that needs to be generated.
      type: object
      properties:
        SheetId:
          $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The sheet ID of the dashboard to generate the snapshot artifact from. This value is required for CSV, Excel, and PDF format types.
        SelectionScope:
          $ref: "#/components/schemas/SnapshotFileSheetSelectionScope"
          description: The selection scope of the visuals on a sheet of a dashboard that you are generating a snapthot of. You can choose one of the following options. ALL_VISUALS - Selects all visuals that are on the sheet. This value is required if the snapshot is a PDF. SELECTED_VISUALS - Select the visual that you want to add to the snapshot. This value is required if the snapshot is a CSV or Excel workbook.
        VisualIds:
          $ref: "#/components/schemas/SnapshotFileSheetSelectionVisualIdList"
          description: A structure that lists the IDs of the visuals in the selected sheet. Supported visual types are table, pivot table visuals. This value is required if you are generating a CSV or Excel workbook. This value supports a maximum of 1 visual ID for CSV and 5 visual IDs across up to 5 sheet selections for Excel. If you are generating an Excel workbook, the order of the visual IDs provided in this structure determines the order of the worksheets in the Excel file.
