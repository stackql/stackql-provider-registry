    DataSourceCredentials:
      description: Data source credentials. This is a variant type structure. For this structure to be valid, only one of the attributes can be non-null.
      type: object
      properties:
        CredentialPair:
          $ref: "#/components/schemas/CredentialPair"
          description: Credential pair. For more information, see CredentialPair .
        CopySourceArn:
          $ref: "#/components/schemas/CopySourceArn"
          description: The Amazon Resource Name (ARN) of a data source that has the credential pair that you want to use. When CopySourceArn is not null, the credential pair from the data source in the ARN is used as the credentials for the DataSourceCredentials structure.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The Amazon Resource Name (ARN) of the secret associated with the data source in Amazon Secrets Manager.
        KeyPairCredentials:
          $ref: "#/components/schemas/KeyPairCredentials"
          description: The credentials for connecting using key-pair.
        WebProxyCredentials:
          $ref: "#/components/schemas/WebProxyCredentials"
          description: The credentials for connecting through a web proxy server.
        OAuthClientCredentials:
          $ref: "#/components/schemas/OAuthClientCredentials"
          description: The OAuth client credentials for connecting to a data source using OAuth 2.0 client credentials (2LO) authentication. For more information, see OAuthClientCredentials .
    CredentialPair:
      description: The combination of user name and password that are used as credentials.
      type: object
      properties:
        Username:
          $ref: "#/components/schemas/DbUsername"
          description: User name.
        Password:
          $ref: "#/components/schemas/Password"
          description: Password.
        AlternateDataSourceParameters:
          $ref: "#/components/schemas/DataSourceParametersList"
          description: A set of alternate data source parameters that you want to share for these credentials. The credentials are applied in tandem with the data source parameters when you copy a data source by using a create or update request. The API operation compares the DataSourceParameters structure that's in the request with the structures in the AlternateDataSourceParameters allow list. If the structures are an exact match, the request is allowed to use the new data source with the existing credentials. If the AlternateDataSourceParameters list is null, the DataSourceParameters originally used with these Credentials is automatically allowed.
      required:
        - Username
        - Password
    DbUsername:
      type: string
      minLength: 1
      maxLength: 64
    Password:
      type: string
      minLength: 1
      maxLength: 1024
    DataSourceParametersList:
      type: array
      items:
        $ref: "#/components/schemas/DataSourceParameters"
    CopySourceArn:
      type: string
      pattern: ^arn:[-a-z0-9]*:quicksight:[-a-z0-9]*:[0-9]{12}:datasource/.+
    SecretArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:[-a-z0-9]*:secretsmanager:[-a-z0-9]*:[0-9]{12}:secret:.+
    KeyPairCredentials:
      description: The combination of username, private key and passphrase that are used as credentials.
      type: object
      properties:
        KeyPairUsername:
          $ref: "#/components/schemas/DbUsername"
          description: Username
        PrivateKey:
          $ref: "#/components/schemas/PrivateKey"
          description: PrivateKey
        PrivateKeyPassphrase:
          $ref: "#/components/schemas/PrivateKeyPassphrase"
          description: PrivateKeyPassphrase
      required:
        - KeyPairUsername
        - PrivateKey
    PrivateKey:
      type: string
      minLength: 1600
      maxLength: 8000
      pattern: ^-{5}BEGIN (ENCRYPTED )?PRIVATE KEY-{5}\u000D?\u000A([A-Za-z0-9/+]{64}\u000D?\u000A)*[A-Za-z0-9/+]{1,64}={0,2}\u000D?\u000A-{5}END (ENCRYPTED )?PRIVATE KEY-{5}(\u000D?\u000A)?$
    PrivateKeyPassphrase:
      type: string
      maxLength: 256
    WebProxyCredentials:
      description: The credentials for authenticating with a web proxy server.
      type: object
      properties:
        WebProxyUsername:
          $ref: "#/components/schemas/DbUsername"
          description: The username for authenticating with the web proxy server.
        WebProxyPassword:
          $ref: "#/components/schemas/Password"
          description: The password for authenticating with the web proxy server.
      required:
        - WebProxyUsername
        - WebProxyPassword
    OAuthClientCredentials:
      description: The OAuth 2.0 client credentials used for authenticating a data source connection. Use this structure to provide a client ID, client secret, and username directly instead of referencing a secret stored in Amazon Secrets Manager. This structure supports data sources that use two-legged OAuth (2LO) authentication, such as Snowflake.
      type: object
      properties:
        ClientId:
          $ref: "#/components/schemas/OAuthClientId"
          description: The client ID of the OAuth 2.0 application that is registered with the data source provider.
        ClientSecret:
          $ref: "#/components/schemas/OAuthClientSecret"
          description: The client secret of the OAuth 2.0 application that is registered with the data source provider.
        Username:
          $ref: "#/components/schemas/OAuthUsername"
          description: The username of the account that is used for OAuth 2.0 client credentials authentication with the data source provider.
    OAuthClientId:
      type: string
      minLength: 1
      maxLength: 256
    OAuthClientSecret:
      type: string
      minLength: 1
      maxLength: 2048
    OAuthUsername:
      type: string
      minLength: 1
      maxLength: 64
    SslProperties:
      description: Secure Socket Layer (SSL) properties that apply when Quick Sight connects to your underlying data source.
      type: object
      properties:
        DisableSsl:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean option to control whether SSL should be disabled.
    CreateDataSourceResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the data source.
        DataSourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the data source. This ID is unique per Amazon Web Services Region for each Amazon Web Services account.
        CreationStatus:
          $ref: "#/components/schemas/ResourceStatus"
          description: The status of creating the data source.
        RequestId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services request ID for this operation.
        Status:
          $ref: "#/components/schemas/StatusCode"
          description: The HTTP status of the request.
    RestrictiveResourceId:
      type: string
