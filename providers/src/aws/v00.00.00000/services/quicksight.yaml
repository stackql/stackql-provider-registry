    AssetBundleExportJobWarningList:
      type: array
      items:
        $ref: "#/components/schemas/AssetBundleExportJobWarning"
    AssetBundleExportJobWarning:
      description: Describes a warning that occurred during an Asset Bundle export job.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the resource whose processing caused a warning.
        Message:
          $ref: "#/components/schemas/NonEmptyString"
          description: A description of the warning.
    IncludeFolderMembers:
      type: string
      enum:
        - RECURSE
        - ONE_LEVEL
        - NONE
    DescribeAssetBundleImportJobResponse:
      type: object
      properties:
        JobStatus:
          $ref: "#/components/schemas/AssetBundleImportJobStatus"
          description: "Indicates the status of a job through its queuing and execution. Poll the DescribeAssetBundleImport API until JobStatus returns one of the following values: SUCCESSFUL FAILED FAILED_ROLLBACK_COMPLETED FAILED_ROLLBACK_ERROR"
        Errors:
          $ref: "#/components/schemas/AssetBundleImportJobErrorList"
          description: An array of error records that describes any failures that occurred during the export job processing. Error records accumulate while the job is still running. The complete set of error records is available after the job has completed and failed.
        RollbackErrors:
          $ref: "#/components/schemas/AssetBundleImportJobErrorList"
          description: An array of error records that describes any failures that occurred while an import job was attempting a rollback. Error records accumulate while the job is still running. The complete set of error records is available after the job has completed and failed.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the import job.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the import job was created.
        AssetBundleImportJobId:
          $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the job. The job ID is set when you start a new job with a StartAssetBundleImportJob API call.
        AwsAccountId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account the import job was executed in.
        AssetBundleImportSource:
          $ref: "#/components/schemas/AssetBundleImportSourceDescription"
          description: The source of the asset bundle zip file that contains the data that is imported by the job.
        OverrideParameters:
          $ref: "#/components/schemas/AssetBundleImportJobOverrideParameters"
          description: Optional overrides that are applied to the resource configuration before import.
        FailureAction:
          $ref: "#/components/schemas/AssetBundleImportFailureAction"
          description: The failure action for the import job.
        RequestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Web Services request ID for this operation.
        Status:
          $ref: "#/components/schemas/StatusCode"
          description: The HTTP status of the response.
        OverridePermissions:
          $ref: "#/components/schemas/AssetBundleImportJobOverridePermissions"
          description: Optional permission overrides that are applied to the resource configuration before import.
        OverrideTags:
          $ref: "#/components/schemas/AssetBundleImportJobOverrideTags"
          description: Optional tag overrides that are applied to the resource configuration before import.
        OverrideValidationStrategy:
          $ref: "#/components/schemas/AssetBundleImportJobOverrideValidationStrategy"
          description: An optional validation strategy override for all analyses and dashboards to be applied to the resource configuration before import.
        Warnings:
          $ref: "#/components/schemas/AssetBundleImportJobWarningList"
          description: An array of warning records that describe all permitted errors that are encountered during the import job.
    AssetBundleImportJobStatus:
      type: string
      enum:
        - QUEUED_FOR_IMMEDIATE_EXECUTION
        - IN_PROGRESS
        - SUCCESSFUL
        - FAILED
        - FAILED_ROLLBACK_IN_PROGRESS
        - FAILED_ROLLBACK_COMPLETED
        - FAILED_ROLLBACK_ERROR
    AssetBundleImportJobErrorList:
      type: array
      items:
        $ref: "#/components/schemas/AssetBundleImportJobError"
    AssetBundleImportJobError:
      description: Describes an error that occurred within an Asset Bundle import execution.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the resource whose processing caused an error.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: The specific error type or the error that occurred.
        Message:
          $ref: "#/components/schemas/NonEmptyString"
          description: A description of the error.
    AssetBundleImportSourceDescription:
      description: A description of the import source that you provide at the start of an import job. This value is set to either Body or S3Uri, depending on how the StartAssetBundleImportJobRequest is configured.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/SensitiveS3Uri"
          description: An HTTPS download URL for the provided asset bundle that you optionally provided at the start of the import job. This URL is valid for five minutes after issuance. Call DescribeAssetBundleExportJob again for a fresh URL if needed. The downloaded asset bundle is a .qs zip file.
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI that you provided at the start of the import job.
    S3Uri:
      type: string
      pattern: ^(https|s3)://([^/]+)/?(.*)$
    AssetBundleImportJobOverrideParameters:
      description: A list of overrides that modify the asset bundle resource configuration before the resource is imported.
      type: object
      properties:
        ResourceIdOverrideConfiguration:
          $ref: "#/components/schemas/AssetBundleImportJobResourceIdOverrideConfiguration"
          description: An optional structure that configures resource ID overrides to be applied within the import job.
        VPCConnections:
          $ref: "#/components/schemas/AssetBundleImportJobVPCConnectionOverrideParametersList"
          description: A list of overrides for any VPCConnection resources that are present in the asset bundle that is imported.
        RefreshSchedules:
          $ref: "#/components/schemas/AssetBundleImportJobRefreshScheduleOverrideParametersList"
          description: A list of overrides for any RefreshSchedule resources that are present in the asset bundle that is imported.
        DataSources:
          $ref: "#/components/schemas/AssetBundleImportJobDataSourceOverrideParametersList"
          description: A list of overrides for any DataSource resources that are present in the asset bundle that is imported.
        DataSets:
          $ref: "#/components/schemas/AssetBundleImportJobDataSetOverrideParametersList"
          description: A list of overrides for any DataSet resources that are present in the asset bundle that is imported.
        Themes:
          $ref: "#/components/schemas/AssetBundleImportJobThemeOverrideParametersList"
          description: A list of overrides for any Theme resources that are present in the asset bundle that is imported.
        Analyses:
          $ref: "#/components/schemas/AssetBundleImportJobAnalysisOverrideParametersList"
          description: A list of overrides for any Analysis resources that are present in the asset bundle that is imported.
        Dashboards:
          $ref: "#/components/schemas/AssetBundleImportJobDashboardOverrideParametersList"
          description: A list of overrides for any Dashboard resources that are present in the asset bundle that is imported.
        Folders:
          $ref: "#/components/schemas/AssetBundleImportJobFolderOverrideParametersList"
          description: A list of overrides for any Folder resources that are present in the asset bundle that is imported.
    AssetBundleImportJobResourceIdOverrideConfiguration:
      description: An optional structure that configures resource ID overrides for the import job.
      type: object
      properties:
        PrefixForAllResources:
          $ref: "#/components/schemas/String"
          description: An option to request a CloudFormation variable for a prefix to be prepended to each resource's ID before import. The prefix is only added to the asset IDs and does not change the name of the asset.
    AssetBundleImportJobVPCConnectionOverrideParametersList:
      type: array
      items:
        $ref: "#/components/schemas/AssetBundleImportJobVPCConnectionOverrideParameters"
    AssetBundleImportJobVPCConnectionOverrideParameters:
      description: The override parameters for a single VPC connection that is imported.
      type: object
      properties:
        VPCConnectionId:
          $ref: "#/components/schemas/VPCConnectionResourceIdUnrestricted"
          description: The ID of the VPC Connection to apply overrides to.
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: A new name for the VPC connection.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: A list of new subnet IDs for the VPC connection you are importing. This field is required if you are importing the VPC connection from another Amazon Web Services account or Region.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: A new security group ID for the VPC connection you are importing. This field is required if you are importing the VPC connection from another Amazon Web Services account or Region.
        DnsResolvers:
          $ref: "#/components/schemas/DnsResolverList"
          description: An optional override of DNS resolvers to be used by the VPC connection.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: An optional override of the role ARN to be used by the VPC connection.
      required:
        - VPCConnectionId
    AssetBundleImportJobRefreshScheduleOverrideParametersList:
      type: array
      items:
        $ref: "#/components/schemas/AssetBundleImportJobRefreshScheduleOverrideParameters"
    AssetBundleImportJobRefreshScheduleOverrideParameters:
      description: A list of overrides for a specific RefreshsSchedule resource that is present in the asset bundle that is imported.
      type: object
      properties:
        DataSetId:
          $ref: "#/components/schemas/ResourceId"
          description: A partial identifier for the specific RefreshSchedule resource that is being overridden. This structure is used together with the ScheduleID structure.
        ScheduleId:
          $ref: "#/components/schemas/String"
          description: A partial identifier for the specific RefreshSchedule resource being overridden. This structure is used together with the DataSetId structure.
        StartAfterDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: An override for the StartAfterDateTime of a RefreshSchedule. Make sure that the StartAfterDateTime is set to a time that takes place in the future.
      required:
