    AggregationFunction:
      description: An aggregation function aggregates values from a dimension or measure. This is a union type structure. For this structure to be valid, only one of the attributes can be defined.
      type: object
      properties:
        NumericalAggregationFunction:
          $ref: "#/components/schemas/NumericalAggregationFunction"
          description: Aggregation for numerical values.
        CategoricalAggregationFunction:
          $ref: "#/components/schemas/CategoricalAggregationFunction"
          description: "Aggregation for categorical values. COUNT: Aggregate by the total number of values, including duplicates. DISTINCT_COUNT: Aggregate by the total number of distinct values."
        DateAggregationFunction:
          $ref: "#/components/schemas/DateAggregationFunction"
          description: "Aggregation for date values. COUNT: Aggregate by the total number of values, including duplicates. DISTINCT_COUNT: Aggregate by the total number of distinct values. MIN: Select the smallest date value. MAX: Select the largest date value."
        AttributeAggregationFunction:
          $ref: "#/components/schemas/AttributeAggregationFunction"
          description: Aggregation for attributes.
    NumericalAggregationFunction:
      description: Aggregation for numerical values.
      type: object
      properties:
        SimpleNumericalAggregation:
          $ref: "#/components/schemas/SimpleNumericalAggregationFunction"
          description: "Built-in aggregation functions for numerical values. SUM: The sum of a dimension or measure. AVERAGE: The average of a dimension or measure. MIN: The minimum value of a dimension or measure. MAX: The maximum value of a dimension or measure. COUNT: The count of a dimension or measure. DISTINCT_COUNT: The count of distinct values in a dimension or measure. VAR: The variance of a dimension or measure. VARP: The partitioned variance of a dimension or measure. STDEV: The standard deviation of a dimension or measure. STDEVP: The partitioned standard deviation of a dimension or measure. MEDIAN: The median value of a dimension or measure."
        PercentileAggregation:
          $ref: "#/components/schemas/PercentileAggregation"
          description: An aggregation based on the percentile of values in a dimension or measure.
    SimpleNumericalAggregationFunction:
      type: string
      enum:
        - SUM
        - AVERAGE
        - MIN
        - MAX
        - COUNT
        - DISTINCT_COUNT
        - VAR
        - VARP
        - STDEV
        - STDEVP
        - MEDIAN
    PercentileAggregation:
      description: An aggregation based on the percentile of values in a dimension or measure.
      type: object
      properties:
        PercentileValue:
          $ref: "#/components/schemas/PercentileValue"
          description: The percentile value. This value can be any numeric constant 0–100. A percentile value of 50 computes the median value of the measure.
    PercentileValue:
      type: number
      format: double
      minimum: 0
      maximum: 100
    CategoricalAggregationFunction:
      type: string
      enum:
        - COUNT
        - DISTINCT_COUNT
    DateAggregationFunction:
      type: string
      enum:
        - COUNT
        - DISTINCT_COUNT
