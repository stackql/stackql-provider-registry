          $ref: "#/components/schemas/RegisteredUserDashboardVisualEmbeddingConfiguration"
          description: The type of embedding experience. In this case, Amazon Quick Sight visuals.
        GenerativeQnA:
          $ref: "#/components/schemas/RegisteredUserGenerativeQnAEmbeddingConfiguration"
          description: The configuration details for embedding the Generative Q&A experience. For more information about embedding the Generative Q&A experience, see Embedding Overview in the Amazon Quick Sight User Guide.
