  /accounts/{aws_account_id}/asset-bundle-export-jobs/export:
    post:
      operationId: StartAssetBundleExportJob
      description: Starts an Asset Bundle export job. An Asset Bundle export job exports specified Amazon Quick Sight assets. You can also choose to export any asset dependencies in the same job. Export jobs run asynchronously and can be polled with a DescribeAssetBundleExportJob API call. When a job is successfully completed, a download URL that contains the exported assets is returned. The URL is valid for 5 minutes and can be refreshed with a DescribeAssetBundleExportJob API call. Each Amazon Quick Sight account can run up to 5 export jobs concurrently. The API caller must have the necessary permissions in their IAM role to access each resource before the resources can be exported.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account to export assets from.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AssetBundleExportJobId:
                  $ref: "#/components/schemas/ShortRestrictiveResourceId"
                ResourceArns:
                  $ref: "#/components/schemas/AssetBundleResourceArns"
                IncludeAllDependencies:
                  $ref: "#/components/schemas/Boolean"
                ExportFormat:
                  $ref: "#/components/schemas/AssetBundleExportFormat"
                CloudFormationOverridePropertyConfiguration:
                  $ref: "#/components/schemas/AssetBundleCloudFormationOverridePropertyConfiguration"
                IncludePermissions:
                  $ref: "#/components/schemas/Boolean"
                IncludeTags:
                  $ref: "#/components/schemas/Boolean"
                ValidationStrategy:
                  $ref: "#/components/schemas/AssetBundleExportJobValidationStrategy"
                IncludeFolderMemberships:
                  $ref: "#/components/schemas/Boolean"
                IncludeFolderMembers:
                  $ref: "#/components/schemas/IncludeFolderMembers"
              required:
                - AssetBundleExportJobId
                - ResourceArns
                - ExportFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAssetBundleExportJobResponse"
  /accounts/{aws_account_id}/asset-bundle-import-jobs/import:
    post:
      operationId: StartAssetBundleImportJob
      description: Starts an Asset Bundle import job. An Asset Bundle import job imports specified Amazon Quick Sight assets into an Amazon Quick Sight account. You can also choose to import a naming prefix and specified configuration overrides. The assets that are contained in the bundle file that you provide are used to create or update a new or existing asset in your Amazon Quick Sight account. Each Amazon Quick Sight account can run up to 5 import jobs concurrently. The API caller must have the necessary "create", "describe", and "update" permissions in their IAM role to access each resource type that is contained in the bundle file before the resources can be imported.
      parameters:
        - name: aws_account_id
          in: path
