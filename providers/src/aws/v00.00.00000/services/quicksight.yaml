          description: Indicates the status of a job through its queuing and execution. Poll this DescribeAssetBundleExportApi until JobStatus is either SUCCESSFUL or FAILED.
        DownloadUrl:
          $ref: "#/components/schemas/SensitiveS3Uri"
          description: The URL to download the exported asset bundle data from. This URL is available only after the job has succeeded. This URL is valid for 5 minutes after issuance. Call DescribeAssetBundleExportJob again for a fresh URL if needed. The downloaded asset bundle is a zip file named assetbundle-{jobId}.qs. The file has a .qs extension. This URL can't be used in a StartAssetBundleImportJob API call and should only be used for download purposes.
        Errors:
          $ref: "#/components/schemas/AssetBundleExportJobErrorList"
          description: An array of error records that describes any failures that occurred during the export job processing. Error records accumulate while the job runs. The complete set of error records is available after the job has completed and failed.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the export job.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the export job was created.
        AssetBundleExportJobId:
          $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the job. The job ID is set when you start a new job with a StartAssetBundleExportJob API call.
        AwsAccountId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that the export job was executed in.
        ResourceArns:
          $ref: "#/components/schemas/AssetBundleResourceArns"
          description: A list of resource ARNs that exported with the job.
        IncludeAllDependencies:
          $ref: "#/components/schemas/Boolean"
          description: The include dependencies flag.
        ExportFormat:
          $ref: "#/components/schemas/AssetBundleExportFormat"
          description: The format of the exported asset bundle. A QUICKSIGHT_JSON formatted file can be used to make a StartAssetBundleImportJob API call. A CLOUDFORMATION_JSON formatted file can be used in the CloudFormation console and with the CloudFormation APIs.
        CloudFormationOverridePropertyConfiguration:
          $ref: "#/components/schemas/AssetBundleCloudFormationOverridePropertyConfiguration"
          description: The CloudFormation override property configuration for the export job.
        RequestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Web Services request ID for this operation.
        Status:
          $ref: "#/components/schemas/StatusCode"
          description: The HTTP status of the response.
        IncludePermissions:
          $ref: "#/components/schemas/Boolean"
          description: The include permissions flag.
        IncludeTags:
          $ref: "#/components/schemas/Boolean"
          description: The include tags flag.
        ValidationStrategy:
          $ref: "#/components/schemas/AssetBundleExportJobValidationStrategy"
          description: The validation strategy that is used to export the analysis or dashboard.
        Warnings:
          $ref: "#/components/schemas/AssetBundleExportJobWarningList"
          description: An array of warning records that describe the analysis or dashboard that is exported. This array includes UI errors that can be skipped during the validation process. This property only appears if StrictModeForAllResources in ValidationStrategy is set to FALSE.
