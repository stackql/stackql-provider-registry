        - StaticFileId
    SheetImageScalingConfiguration:
      description: Determines how the image is scaled
      type: object
      properties:
        ScalingType:
          $ref: "#/components/schemas/SheetImageScalingType"
          description: "The scaling option to use when fitting the image inside the container. Valid values are defined as follows: SCALE_TO_WIDTH: The image takes up the entire width of the container. The image aspect ratio is preserved. SCALE_TO_HEIGHT: The image takes up the entire height of the container. The image aspect ratio is preserved. SCALE_TO_CONTAINER: The image takes up the entire width and height of the container. The image aspect ratio is not preserved. SCALE_NONE: The image is displayed in its original size and is not scaled to the container."
