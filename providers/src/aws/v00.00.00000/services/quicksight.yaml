          $ref: "#/components/schemas/NumericEqualityFilter"
          description: A NumericEqualityFilter filters numeric values that equal or do not equal a given numeric value.
        TimeEqualityFilter:
          $ref: "#/components/schemas/TimeEqualityFilter"
          description: A TimeEqualityFilter filters date-time values that equal or do not equal a given date/time value.
        TimeRangeFilter:
