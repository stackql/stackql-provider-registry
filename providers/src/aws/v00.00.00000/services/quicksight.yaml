          $ref: "#/components/schemas/CategoryFilterSelectAllOptions"
          description: Select all of the values. Null is not the assigned value of select all. FILTER_ALL_VALUES
        NullOption:
          $ref: "#/components/schemas/FilterNullOption"
          description: "This option determines how null values should be treated when filtering data. ALL_VALUES: Include null values in filtered results. NULLS_ONLY: Only include null values in filtered results. NON_NULLS_ONLY: Exclude null values from filtered results."
