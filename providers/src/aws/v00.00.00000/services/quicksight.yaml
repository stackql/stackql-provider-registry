                  $ref: "#/components/schemas/TemplateName"
                Definition:
                  $ref: "#/components/schemas/TemplateVersionDefinition"
                ValidationStrategy:
                  $ref: "#/components/schemas/ValidationStrategy"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTemplateResponse"
