          description: A list of SnapshotJobResultFileGroup objects that contain information about the snapshot that is generated. This list can hold a maximum of 6 FileGroup configurations.
        DestinationConfiguration:
          $ref: "#/components/schemas/SnapshotDestinationConfiguration"
          description: A structure that contains information on the Amazon S3 bucket that the generated snapshot is stored in.
        Parameters:
          $ref: "#/components/schemas/Parameters"
      required:
        - FileGroups
    SnapshotFileGroupList:
      type: array
      items:
        $ref: "#/components/schemas/SnapshotFileGroup"
