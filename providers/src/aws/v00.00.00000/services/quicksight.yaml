                ExperienceConfiguration:
                  $ref: "#/components/schemas/RegisteredUserEmbeddingExperienceConfiguration"
                AllowedDomains:
                  $ref: "#/components/schemas/StringList"
              required:
                - UserArn
                - ExperienceConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateEmbedUrlForRegisteredUserResponse"
  /accounts/{aws_account_id}/embed-url/registered-user-with-identity:
    post:
      operationId: GenerateEmbedUrlForRegisteredUserWithIdentity
      description: Generates an embed URL that you can use to embed an Amazon Quick Sight experience in your website. This action can be used for any type of user that is registered in an Amazon Quick Sight account that uses IAM Identity Center for authentication. This API requires identity-enhanced IAM Role sessions for the authenticated user that the API call is being made for. This API uses trusted identity propagation to ensure that an end user is authenticated and receives the embed URL that is specific to that user. The IAM Identity Center application that the user has logged into needs to have trusted Identity Propagation enabled for Amazon Quick Sight with the scope value set to quicksight:read. Before you use this action, make sure that you have configured the relevant Amazon Quick Sight resource and permissions.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services registered user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SessionLifetimeInMinutes:
                  $ref: "#/components/schemas/SessionLifetimeInMinutes"
                ExperienceConfiguration:
                  $ref: "#/components/schemas/RegisteredUserEmbeddingExperienceConfiguration"
                AllowedDomains:
                  $ref: "#/components/schemas/StringList"
              required:
                - ExperienceConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateEmbedUrlForRegisteredUserWithIdentityResponse"
  /accounts/{aws_account_id}/dashboards/{dashboard_id}/embed-url:
    get:
      operationId: GetDashboardEmbedUrl
      description: "Generates a temporary session URL and authorization code(bearer token) that you can use to embed an Amazon Quick Sight read-only dashboard in your website or application. Before you use this command, make sure that you have configured the dashboards and permissions. Currently, you can use GetDashboardEmbedURL only from the server, not from the user's browser. The following rules apply to the generated URL: They must be used together. They can be used one time only. They are valid for 5 minutes after you run this command. You are charged only when the URL is used or there is interaction with Quick. The resulting user session is valid for 15 minutes (default) up to 10 hours (maximum). You can use the optional SessionLifetimeInMinutes parameter to customize session duration. For more information, see Embedding Analytics Using GetDashboardEmbedUrl in the Amazon Quick User Guide. For more information about the high-level steps for embedding and for an interactive demo of the ways you can customize embedding, visit the Amazon Quick Developer Portal."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that contains the dashboard that you're embedding.
        - name: dashboard_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID for the dashboard, also added to the Identity and Access Management (IAM) policy.
        - name: creds-type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/EmbeddingIdentityType"
          description: The authentication method that the user uses to sign in.
        - name: session-lifetime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SessionLifetimeInMinutes"
          description: How many minutes the session is valid. The session lifetime must be 15-600 minutes.
        - name: undo-redo-disabled
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Remove the undo/redo button on the embedded dashboard. The default is FALSE, which enables the undo/redo button.
        - name: reset-disabled
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Remove the reset button on the embedded dashboard. The default is FALSE, which enables the reset button.
        - name: state-persistence-enabled
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Adds persistence of state for the user session in an embedded dashboard. Persistence applies to the sheet and the parameter settings. These are control settings that the dashboard subscriber (Amazon Quick Sight reader) chooses while viewing the dashboard. If this is set to TRUE, the settings are the same when the subscriber reopens the same dashboard URL. The state is stored in Amazon Quick Sight, not in a browser cookie. If this is set to FALSE, the state of the user session is not persisted. The default is FALSE.
        - name: user-arn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Arn"
          description: "The Amazon Quick user's Amazon Resource Name (ARN), for use with QUICKSIGHT identity type. You can use this for any Amazon Quick users in your account (readers, authors, or admins) authenticated as one of the following: Active Directory (AD) users or group members Invited nonfederated users IAM users and IAM role-based sessions authenticated through Federated Single Sign-On using SAML, OpenID Connect, or IAM federation. Omit this parameter for users in the third group – IAM users and IAM role-based sessions."
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Namespace"
          description: The Amazon Quick Sight namespace that contains the dashboard IDs in this request. If you're not using a custom namespace, set Namespace = default.
        - name: additional-dashboard-ids
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AdditionalDashboardIdList"
          description: A list of one or more dashboard IDs that you want anonymous users to have tempporary access to. Currently, the IdentityType parameter must be set to ANONYMOUS because other identity types authenticate as Quick or IAM users. For example, if you set "--dashboard-id dash_id1 --dashboard-id dash_id2 dash_id3 identity-type ANONYMOUS", the session can access all three dashboards.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDashboardEmbedUrlResponse"
