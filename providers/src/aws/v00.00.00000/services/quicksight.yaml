components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AwsAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^[0-9]{12}$
    TopicId:
      type: string
      maxLength: 256
      pattern: ^[A-Za-z0-9-_.\\+]*$
    CreateTopicReviewedAnswers:
      type: array
      items:
        $ref: "#/components/schemas/CreateTopicReviewedAnswer"
    CreateTopicReviewedAnswer:
