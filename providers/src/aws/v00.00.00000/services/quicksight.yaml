      description: A structure that contains the information on the snapshot files.
      type: object
      properties:
        Files:
          $ref: "#/components/schemas/SnapshotFileList"
          description: A list of SnapshotFile objects that contain the information on the snapshot files that need to be generated. This structure can hold 1 configuration at a time.
    SnapshotFileList:
      type: array
      items:
        $ref: "#/components/schemas/SnapshotFile"
