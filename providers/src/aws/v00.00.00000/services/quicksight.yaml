      description: The configuration that determines what the type of layout will be used on a sheet. This is a union type structure. For this structure to be valid, only one of the attributes can be defined.
      type: object
      properties:
        GridLayout:
          $ref: "#/components/schemas/GridLayoutConfiguration"
          description: "A type of layout that can be used on a sheet. In a grid layout, visuals snap to a grid with standard spacing and alignment. Dashboards are displayed as designed, with options to fit to screen or view at actual size. A grid layout can be configured to behave in one of two ways when the viewport is resized: FIXED or RESPONSIVE."
        FreeFormLayout:
          $ref: "#/components/schemas/FreeFormLayoutConfiguration"
          description: A free-form is optimized for a fixed width and has more control over the exact placement of layout elements.
        SectionBasedLayout:
          $ref: "#/components/schemas/SectionBasedLayoutConfiguration"
          description: A section based layout organizes visuals into multiple sections and has customized header, footer and page break.
    GridLayoutConfiguration:
      description: The configuration for a grid layout. Also called a tiled layout. Visuals snap to a grid with standard spacing and alignment. Dashboards are displayed as designed, with options to fit to screen or view at actual size.
      type: object
      properties:
        Elements:
          $ref: "#/components/schemas/GridLayoutElementList"
          description: The elements that are included in a grid layout.
