  /accounts/{aws_account_id}/embed-url/anonymous-user:
    post:
      operationId: GenerateEmbedUrlForAnonymousUser
      description: "Generates an embed URL that you can use to embed an Amazon Quick dashboard or visual in your website, without having to register any reader users. Before you use this action, make sure that you have configured the dashboards and permissions. The following rules apply to the generated URL: It contains a temporary bearer token. It is valid for 5 minutes after it is generated. Once redeemed within this period, it cannot be re-used again. The URL validity period should not be confused with the actual session lifetime that can be customized using the SessionLifetimeInMinutes parameter. The resulting user session is valid for 15 minutes (minimum) to 10 hours (maximum). The default session duration is 10 hours. You are charged only when the URL is used or there is interaction with Amazon Quick. For more information, see Embedded Analytics in the Amazon Quick User Guide. For more information about the high-level steps for embedding and for an interactive demo of the ways you can customize embedding, visit the Amazon Quick Developer Portal."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that contains the dashboard that you're embedding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SessionLifetimeInMinutes:
                  $ref: "#/components/schemas/SessionLifetimeInMinutes"
                Namespace:
                  $ref: "#/components/schemas/Namespace"
                SessionTags:
                  $ref: "#/components/schemas/SessionTagList"
                AuthorizedResourceArns:
                  $ref: "#/components/schemas/ArnList"
                ExperienceConfiguration:
                  $ref: "#/components/schemas/AnonymousUserEmbeddingExperienceConfiguration"
                AllowedDomains:
                  $ref: "#/components/schemas/StringList"
              required:
                - Namespace
                - AuthorizedResourceArns
                - ExperienceConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateEmbedUrlForAnonymousUserResponse"
  /accounts/{aws_account_id}/embed-url/registered-user:
    post:
      operationId: GenerateEmbedUrlForRegisteredUser
      description: "Generates an embed URL that you can use to embed an Amazon Quick experience in your website. This action can be used for any type of user registered in an Amazon Quick account. Before you use this action, make sure that you have configured the relevant Amazon Quick resource and permissions. The following rules apply to the generated URL: It contains a temporary bearer token. It is valid for 5 minutes after it is generated. Once redeemed within this period, it cannot be re-used again. The URL validity period should not be confused with the actual session lifetime that can be customized using the SessionLifetimeInMinutes parameter. The resulting user session is valid for 15 minutes (minimum) to 10 hours (maximum). The default session duration is 10 hours. You are charged only when the URL is used or there is interaction with Amazon Quick. For more information, see Embedded Analytics in the Amazon Quick User Guide. For more information about the high-level steps for embedding and for an interactive demo of the ways you can customize embedding, visit the Amazon Quick Developer Portal."
