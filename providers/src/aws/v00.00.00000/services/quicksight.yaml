          $ref: "#/components/schemas/SignupResponse"
          description: A SignupResponse object that returns information about a newly created Quick Sight account.
        Status:
          $ref: "#/components/schemas/StatusCode"
          description: The HTTP status of the request.
        RequestId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services request ID for this operation.
    SignupResponse:
      description: A SignupResponse object that contains a summary of a newly created account.
      type: object
      properties:
        IAMUser:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean that is TRUE if the Amazon Quick Sight uses IAM as an authentication method.
        userLoginName:
          $ref: "#/components/schemas/String"
          description: The user login name for your Amazon Quick Sight account.
        accountName:
          $ref: "#/components/schemas/String"
          description: The name of your Quick Sight account.
        directoryType:
          $ref: "#/components/schemas/String"
          description: The type of Active Directory that is being used to authenticate the Amazon Quick Sight account. Valid values are SIMPLE_AD, AD_CONNECTOR, and MICROSOFT_AD.
    ShortRestrictiveResourceId:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\w\\-]+"
    ActionConnectorName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z0-9](?:[\\w- ]*[A-Za-z0-9])?"
    ActionConnectorType:
      type: string
      enum:
        - GENERIC_HTTP
        - SERVICENOW_NOW_PLATFORM
        - SALESFORCE_CRM
        - MICROSOFT_OUTLOOK
        - PAGERDUTY_ADVANCE
        - JIRA_CLOUD
        - ATLASSIAN_CONFLUENCE
        - AMAZON_S3
        - AMAZON_BEDROCK_AGENT_RUNTIME
        - AMAZON_BEDROCK_RUNTIME
        - AMAZON_BEDROCK_DATA_AUTOMATION_RUNTIME
        - AMAZON_TEXTRACT
        - AMAZON_COMPREHEND
        - AMAZON_COMPREHEND_MEDICAL
        - MICROSOFT_ONEDRIVE
        - MICROSOFT_SHAREPOINT
        - MICROSOFT_TEAMS
        - SAP_BUSINESSPARTNER
        - SAP_PRODUCTMASTERDATA
        - SAP_PHYSICALINVENTORY
        - SAP_BILLOFMATERIALS
        - SAP_MATERIALSTOCK
        - ZENDESK_SUITE
        - SMARTSHEET
        - SLACK
        - ASANA
        - BAMBOO_HR
    AuthConfig:
      description: Authentication configuration for connecting to external services.
      type: object
      properties:
        AuthenticationType:
          $ref: "#/components/schemas/ConnectionAuthType"
          description: The type of authentication method.
        AuthenticationMetadata:
          $ref: "#/components/schemas/AuthenticationMetadata"
          description: The authentication metadata containing the specific configuration for the chosen authentication type.
      required:
        - AuthenticationType
        - AuthenticationMetadata
    ConnectionAuthType:
      type: string
      enum:
        - BASIC
        - API_KEY
        - OAUTH2_CLIENT_CREDENTIALS
        - NONE
        - IAM
        - OAUTH2_AUTHORIZATION_CODE
    AuthenticationMetadata:
      description: Union type containing authentication metadata for different authentication methods.
      type: object
      properties:
        AuthorizationCodeGrantMetadata:
          $ref: "#/components/schemas/AuthorizationCodeGrantMetadata"
          description: OAuth 2.0 authorization code grant authentication metadata.
        ClientCredentialsGrantMetadata:
          $ref: "#/components/schemas/ClientCredentialsGrantMetadata"
          description: OAuth 2.0 client credentials grant authentication metadata.
        BasicAuthConnectionMetadata:
          $ref: "#/components/schemas/BasicAuthConnectionMetadata"
          description: Basic authentication metadata using username and password.
        ApiKeyConnectionMetadata:
          $ref: "#/components/schemas/APIKeyConnectionMetadata"
          description: API key authentication metadata.
        NoneConnectionMetadata:
          $ref: "#/components/schemas/NoneConnectionMetadata"
          description: No authentication metadata for services that don't require authentication.
        IamConnectionMetadata:
          $ref: "#/components/schemas/IAMConnectionMetadata"
          description: IAM role-based authentication metadata for Amazon Web Services services.
    AuthorizationCodeGrantMetadata:
      description: Metadata for OAuth 2.0 authorization code grant authentication.
      type: object
      properties:
        BaseEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The base URL endpoint for the external service.
        RedirectUrl:
          $ref: "#/components/schemas/Endpoint"
          description: The redirect URL for the OAuth authorization flow.
        AuthorizationCodeGrantCredentialsSource:
          $ref: "#/components/schemas/AuthorizationCodeGrantCredentialsSource"
          description: The source of the authorization code grant credentials.
        AuthorizationCodeGrantCredentialsDetails:
          $ref: "#/components/schemas/AuthorizationCodeGrantCredentialsDetails"
          description: The detailed credentials configuration for authorization code grant.
      required:
        - BaseEndpoint
        - RedirectUrl
    Endpoint:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: https://.*
    AuthorizationCodeGrantCredentialsSource:
      type: string
      enum:
        - PLAIN_CREDENTIALS
    AuthorizationCodeGrantCredentialsDetails:
      description: Details for OAuth 2.0 authorization code grant credentials.
      type: object
      properties:
        AuthorizationCodeGrantDetails:
          $ref: "#/components/schemas/AuthorizationCodeGrantDetails"
          description: The authorization code grant configuration details.
    AuthorizationCodeGrantDetails:
      description: Configuration details for OAuth 2.0 authorization code grant flow.
      type: object
      properties:
        ClientId:
          $ref: "#/components/schemas/ClientId"
          description: The client ID for the OAuth application.
        ClientSecret:
          $ref: "#/components/schemas/ClientSecret"
          description: The client secret for the OAuth application.
        TokenEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The token endpoint URL for obtaining access tokens.
        AuthorizationEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The authorization endpoint URL for the OAuth flow.
      required:
        - ClientId
        - ClientSecret
        - TokenEndpoint
        - AuthorizationEndpoint
    ClientId:
      type: string
      minLength: 0
      maxLength: 1024
    ClientSecret:
      type: string
      minLength: 0
      maxLength: 2048
    ClientCredentialsGrantMetadata:
      description: Configuration for OAuth 2.0 client credentials grant authentication, including client ID, client secret, token endpoint, and optional scopes.
      type: object
      properties:
        BaseEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The base endpoint URL for the external service.
        ClientCredentialsSource:
          $ref: "#/components/schemas/ClientCredentialsSource"
          description: The source of the client credentials configuration.
        ClientCredentialsDetails:
          $ref: "#/components/schemas/ClientCredentialsDetails"
          description: The detailed client credentials configuration including client ID, client secret, and token endpoint.
      required:
        - BaseEndpoint
    ClientCredentialsSource:
      type: string
      enum:
        - PLAIN_CREDENTIALS
    ClientCredentialsDetails:
      description: Details for OAuth 2.0 client credentials grant authentication.
      type: object
      properties:
        ClientCredentialsGrantDetails:
          $ref: "#/components/schemas/ClientCredentialsGrantDetails"
          description: The OAuth2 client credentials grant configuration details for authentication.
    ClientCredentialsGrantDetails:
      description: Configuration details for OAuth2 client credentials grant flow, including client ID, client secret, token endpoint, and optional scopes.
      type: object
      properties:
        ClientId:
          $ref: "#/components/schemas/ClientId"
          description: The client identifier issued to the client during the registration process with the authorization server.
        ClientSecret:
          $ref: "#/components/schemas/ClientSecret"
          description: The client secret issued to the client during the registration process with the authorization server.
        TokenEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The authorization server endpoint used to obtain access tokens via the client credentials grant flow.
      required:
        - ClientId
        - ClientSecret
        - TokenEndpoint
    BasicAuthConnectionMetadata:
      description: Metadata for basic authentication using username and password.
      type: object
      properties:
        BaseEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The base URL endpoint for the external service.
        Username:
          $ref: "#/components/schemas/ActionUserName"
          description: The username for basic authentication.
        Password:
          $ref: "#/components/schemas/ActionPassword"
          description: The password for basic authentication.
      required:
        - BaseEndpoint
        - Username
        - Password
    ActionUserName:
      type: string
    ActionPassword:
      type: string
    APIKeyConnectionMetadata:
      description: Configuration for API key-based authentication to external services.
      type: object
      properties:
        BaseEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The base URL endpoint for the external service.
        ApiKey:
          $ref: "#/components/schemas/APIKey"
          description: The API key used for authentication.
        Email:
          $ref: "#/components/schemas/Email"
          description: The email address associated with the API key, if required.
      required:
        - BaseEndpoint
        - ApiKey
    APIKey:
      type: string
    Email:
      type: string
      pattern: "[\\w.%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
    NoneConnectionMetadata:
      description: Authentication metadata for connections that do not require authentication credentials.
      type: object
      properties:
        BaseEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The base endpoint URL for connections that do not require authentication.
      required:
        - BaseEndpoint
    IAMConnectionMetadata:
      description: Authentication metadata for IAM-based connections, used for first-party Amazon Web Services service integrations.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role to assume for authentication with Amazon Web Services services. This IAM role should be in the same account as Quick Sight.
      required:
        - RoleArn
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
    ActionConnectorDescription:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[A-Za-z0-9 _.,!?-]*"
    ResourcePermissionList:
      type: array
      items:
        $ref: "#/components/schemas/ResourcePermission"
    ResourcePermission:
      description: Permission for the resource.
      type: object
      properties:
        Principal:
          $ref: "#/components/schemas/Principal"
          description: "The Amazon Resource Name (ARN) of the principal. This can be one of the following: The ARN of an Quick Sight user or group associated with a data source or dataset. (This is common.) The ARN of an Quick Sight user, group, or namespace associated with an analysis, dashboard, template, or theme. Namespace sharing is not supported for action connectors. (This is common.) The ARN of an Amazon Web Services account root: This is an IAM ARN rather than a Quick Sight ARN. Use this option only to share resources (templates) across Amazon Web Services accounts. Account root sharing is not supported for action connectors. (This is less common.)"
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: The IAM action to grant or revoke permissions on.
      required:
        - Principal
        - Actions
    Principal:
      type: string
      minLength: 1
      maxLength: 256
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CreateActionConnectorResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the created action connector.
        CreationStatus:
          $ref: "#/components/schemas/ResourceStatus"
          description: The creation status of the action connector.
        ActionConnectorId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the created action connector.
        RequestId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services request ID for this operation.
        Status:
          $ref: "#/components/schemas/StatusCode"
          description: The HTTP status code of the request.
    ResourceStatus:
      type: string
      enum:
        - CREATION_IN_PROGRESS
        - CREATION_SUCCESSFUL
        - CREATION_FAILED
        - UPDATE_IN_PROGRESS
        - UPDATE_SUCCESSFUL
        - UPDATE_FAILED
        - DELETED
    AnalysisName:
      type: string
      minLength: 1
      maxLength: 2048
    Parameters:
      description: A list of Quick Sight parameters and the list's override values.
      type: object
      properties:
        StringParameters:
          $ref: "#/components/schemas/StringParameterList"
          description: The parameters that have a data type of string.
        IntegerParameters:
          $ref: "#/components/schemas/IntegerParameterList"
          description: The parameters that have a data type of integer.
        DecimalParameters:
          $ref: "#/components/schemas/DecimalParameterList"
          description: The parameters that have a data type of decimal.
        DateTimeParameters:
          $ref: "#/components/schemas/DateTimeParameterList"
          description: The parameters that have a data type of date-time.
    StringParameterList:
      type: array
      items:
        $ref: "#/components/schemas/StringParameter"
    StringParameter:
      description: A string parameter.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: A display name for a string parameter.
        Values:
          $ref: "#/components/schemas/SensitiveStringList"
          description: The values of a string parameter.
      required:
        - Name
        - Values
    NonEmptyString:
      type: string
      pattern: .*\S.*
    SensitiveStringList:
      type: array
      items:
        $ref: "#/components/schemas/SensitiveString"
    SensitiveString:
      type: string
    IntegerParameterList:
      type: array
      items:
        $ref: "#/components/schemas/IntegerParameter"
    IntegerParameter:
      description: An integer parameter.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the integer parameter.
        Values:
          $ref: "#/components/schemas/SensitiveLongList"
          description: The values for the integer parameter.
      required:
        - Name
        - Values
    SensitiveLongList:
      type: array
      items:
        $ref: "#/components/schemas/SensitiveLong"
    SensitiveLong:
      type: integer
      format: int64
    DecimalParameterList:
      type: array
      items:
        $ref: "#/components/schemas/DecimalParameter"
    DecimalParameter:
      description: A decimal parameter.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: A display name for the decimal parameter.
        Values:
          $ref: "#/components/schemas/SensitiveDoubleList"
          description: The values for the decimal parameter.
      required:
        - Name
        - Values
    SensitiveDoubleList:
      type: array
      items:
        $ref: "#/components/schemas/SensitiveDouble"
    SensitiveDouble:
      type: number
      format: double
    DateTimeParameterList:
      type: array
      items:
        $ref: "#/components/schemas/DateTimeParameter"
    DateTimeParameter:
      description: A date-time parameter.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: A display name for the date-time parameter.
        Values:
          $ref: "#/components/schemas/SensitiveTimestampList"
          description: The values for the date-time parameter.
      required:
        - Name
        - Values
    SensitiveTimestampList:
      type: array
      items:
        $ref: "#/components/schemas/SensitiveTimestamp"
    SensitiveTimestamp:
      type: string
      format: date-time
    AnalysisSourceEntity:
      description: The source entity of an analysis.
      type: object
      properties:
        SourceTemplate:
          $ref: "#/components/schemas/AnalysisSourceTemplate"
          description: The source template for the source entity of the analysis.
    AnalysisSourceTemplate:
      description: The source template of an analysis.
      type: object
      properties:
        DataSetReferences:
          $ref: "#/components/schemas/DataSetReferenceList"
          description: The dataset references of the source template of an analysis.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the source template of an analysis.
      required:
        - DataSetReferences
        - Arn
    DataSetReferenceList:
      type: array
      items:
        $ref: "#/components/schemas/DataSetReference"
    DataSetReference:
      description: Dataset reference.
      type: object
      properties:
        DataSetPlaceholder:
          $ref: "#/components/schemas/NonEmptyString"
          description: Dataset placeholder.
        DataSetArn:
          $ref: "#/components/schemas/Arn"
          description: Dataset Amazon Resource Name (ARN).
      required:
        - DataSetPlaceholder
        - DataSetArn
    AnalysisDefinition:
      description: The definition of an analysis.
      type: object
      properties:
        DataSetIdentifierDeclarations:
          $ref: "#/components/schemas/DataSetIdentifierDeclarationList"
          description: An array of dataset identifier declarations. This mapping allows the usage of dataset identifiers instead of dataset ARNs throughout analysis sub-structures.
        Sheets:
          $ref: "#/components/schemas/SheetDefinitionList"
          description: An array of sheet definitions for an analysis. Each SheetDefinition provides detailed information about a sheet within this analysis.
        TooltipSheets:
          $ref: "#/components/schemas/TooltipSheetDefinitionList"
          description: An array of tooltip sheet definitions for an analysis. Each TooltipSheetDefinition provides detailed information about a tooltip sheet within this analysis.
        CalculatedFields:
          $ref: "#/components/schemas/CalculatedFields"
          description: An array of calculated field definitions for the analysis.
        ParameterDeclarations:
          $ref: "#/components/schemas/ParameterDeclarationList"
          description: An array of parameter declarations for an analysis. Parameters are named variables that can transfer a value for use by an action or an object. For more information, see Parameters in Amazon Quick Sight in the Amazon Quick Suite User Guide.
        FilterGroups:
          $ref: "#/components/schemas/FilterGroupList"
          description: Filter definitions for an analysis. For more information, see Filtering Data in Amazon Quick Sight in the Amazon Quick Suite User Guide.
        ColumnConfigurations:
          $ref: "#/components/schemas/ColumnConfigurationList"
          description: An array of analysis-level column configurations. Column configurations can be used to set default formatting for a column to be used throughout an analysis.
        AnalysisDefaults:
          $ref: "#/components/schemas/AnalysisDefaults"
        Options:
          $ref: "#/components/schemas/AssetOptions"
          description: An array of option definitions for an analysis.
        QueryExecutionOptions:
          $ref: "#/components/schemas/QueryExecutionOptions"
        StaticFiles:
          $ref: "#/components/schemas/StaticFileList"
          description: The static files for the definition.
      required:
        - DataSetIdentifierDeclarations
    DataSetIdentifierDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/DataSetIdentifierDeclaration"
    DataSetIdentifierDeclaration:
      description: A data set.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/DataSetIdentifier"
          description: The identifier of the data set, typically the data set's name.
        DataSetArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the data set.
      required:
        - Identifier
        - DataSetArn
    DataSetIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
    SheetDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/SheetDefinition"
    SheetDefinition:
      description: A sheet is an object that contains a set of visuals that are viewed together on one page in a paginated report. Every analysis and dashboard must contain at least one sheet.
      type: object
      properties:
        SheetId:
          $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The unique identifier of a sheet.
        Title:
          $ref: "#/components/schemas/SheetTitle"
          description: The title of the sheet.
        Description:
          $ref: "#/components/schemas/SheetDescription"
          description: A description of the sheet.
        Name:
          $ref: "#/components/schemas/SheetName"
          description: The name of the sheet. This name is displayed on the sheet's tab in the Quick console.
        ParameterControls:
          $ref: "#/components/schemas/ParameterControlList"
          description: The list of parameter controls that are on a sheet. For more information, see Using a Control with a Parameter in Amazon Quick Sight in the Amazon Quick Suite User Guide.
        FilterControls:
          $ref: "#/components/schemas/FilterControlList"
          description: The list of filter controls that are on a sheet. For more information, see Adding filter controls to analysis sheets in the Amazon Quick Suite User Guide.
        Visuals:
          $ref: "#/components/schemas/VisualList"
          description: A list of the visuals that are on a sheet. Visual placement is determined by the layout of the sheet.
        TextBoxes:
          $ref: "#/components/schemas/SheetTextBoxList"
          description: The text boxes that are on a sheet.
        Images:
          $ref: "#/components/schemas/SheetImageList"
          description: A list of images on a sheet.
        Layouts:
          $ref: "#/components/schemas/LayoutList"
          description: Layouts define how the components of a sheet are arranged. For more information, see Types of layout in the Amazon Quick Suite User Guide.
        SheetControlLayouts:
          $ref: "#/components/schemas/SheetControlLayoutList"
          description: The control layouts of the sheet.
        ContentType:
          $ref: "#/components/schemas/SheetContentType"
          description: "The layout content type of the sheet. Choose one of the following options: PAGINATED: Creates a sheet for a paginated report. INTERACTIVE: Creates a sheet for an interactive dashboard."
        CustomActionDefaults:
          $ref: "#/components/schemas/VisualCustomActionDefaults"
          description: A list of visual custom actions for the sheet.
      required:
        - SheetId
    SheetTitle:
      type: string
      minLength: 1
      maxLength: 1024
    SheetDescription:
      type: string
      minLength: 1
      maxLength: 1024
    SheetName:
      type: string
      minLength: 1
      maxLength: 2048
    ParameterControlList:
      type: array
      items:
        $ref: "#/components/schemas/ParameterControl"
    ParameterControl:
      description: The control of a parameter that users can interact with in a dashboard or an analysis. This is a union type structure. For this structure to be valid, only one of the attributes can be defined.
      type: object
      properties:
        DateTimePicker:
          $ref: "#/components/schemas/ParameterDateTimePickerControl"
          description: A control from a date parameter that specifies date and time.
        List:
          $ref: "#/components/schemas/ParameterListControl"
          description: A control to display a list with buttons or boxes that are used to select either a single value or multiple values.
        Dropdown:
          $ref: "#/components/schemas/ParameterDropDownControl"
          description: A control to display a dropdown list with buttons that are used to select a single value.
        TextField:
          $ref: "#/components/schemas/ParameterTextFieldControl"
          description: A control to display a text box that is used to enter a single entry.
        TextArea:
          $ref: "#/components/schemas/ParameterTextAreaControl"
          description: A control to display a text box that is used to enter multiple entries.
        Slider:
          $ref: "#/components/schemas/ParameterSliderControl"
          description: A control to display a horizontal toggle bar. This is used to change a value by sliding the toggle.
    ParameterDateTimePickerControl:
      description: A control from a date parameter that specifies date and time.
      type: object
      properties:
        ParameterControlId:
          $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the ParameterDateTimePickerControl.
        Title:
          $ref: "#/components/schemas/SheetControlTitle"
          description: The title of the ParameterDateTimePickerControl.
        SourceParameterName:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the ParameterDateTimePickerControl.
        DisplayOptions:
          $ref: "#/components/schemas/DateTimePickerControlDisplayOptions"
          description: The display options of a control.
        ControlTitleFormatText:
          $ref: "#/components/schemas/ControlTitleFormatText"
          description: The title text format configuration for the control.
      required:
        - ParameterControlId
        - SourceParameterName
    SheetControlTitle:
      type: string
      minLength: 0
      maxLength: 2048
    ParameterName:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[a-zA-Z0-9]+$
    DateTimePickerControlDisplayOptions:
      description: The display options of a control.
      type: object
      properties:
        TitleOptions:
          $ref: "#/components/schemas/LabelOptions"
          description: The options to configure the title visibility, name, and font size.
        DateTimeFormat:
          $ref: "#/components/schemas/DateTimeFormat"
          description: Customize how dates are formatted in controls.
        InfoIconLabelOptions:
          $ref: "#/components/schemas/SheetControlInfoIconLabelOptions"
          description: The configuration of info icon label options.
        HelperTextVisibility:
          $ref: "#/components/schemas/Visibility"
          description: The helper text visibility of the DateTimePickerControlDisplayOptions.
        DateIconVisibility:
          $ref: "#/components/schemas/Visibility"
          description: The date icon visibility of the DateTimePickerControlDisplayOptions.
    LabelOptions:
      description: The share label options for the labels.
      type: object
      properties:
        Visibility:
          $ref: "#/components/schemas/Visibility"
          description: Determines whether or not the label is visible.
        FontConfiguration:
          $ref: "#/components/schemas/FontConfiguration"
          description: The font configuration of the label.
        CustomLabel:
          $ref: "#/components/schemas/String"
          description: The text for the label.
    Visibility:
      type: string
      enum:
        - HIDDEN
        - VISIBLE
    FontConfiguration:
      description: Configures the display properties of the given text.
      type: object
      properties:
        FontSize:
          $ref: "#/components/schemas/FontSize"
          description: The option that determines the text display size.
        FontDecoration:
          $ref: "#/components/schemas/FontDecoration"
          description: Determines the appearance of decorative lines on the text.
        FontColor:
          $ref: "#/components/schemas/HexColor"
          description: Determines the color of the text.
        FontWeight:
          $ref: "#/components/schemas/FontWeight"
          description: The option that determines the text display weight, or boldness.
        FontStyle:
          $ref: "#/components/schemas/FontStyle"
          description: Determines the text display face that is inherited by the given font family.
        FontFamily:
          $ref: "#/components/schemas/LimitedString"
          description: The font family that you want to use.
    FontSize:
      description: The option that determines the text display size.
      type: object
      properties:
        Relative:
          $ref: "#/components/schemas/RelativeFontSize"
          description: The lexical name for the text size, proportional to its surrounding context.
        Absolute:
          $ref: "#/components/schemas/PixelLength"
          description: The font size that you want to use in px.
    RelativeFontSize:
      type: string
      enum:
        - EXTRA_SMALL
        - SMALL
        - MEDIUM
        - LARGE
        - EXTRA_LARGE
    PixelLength:
      description: String based length that is composed of value and unit in px
      type: string
    FontDecoration:
      type: string
      enum:
        - UNDERLINE
        - NONE
    HexColor:
      type: string
      pattern: ^#[A-F0-9]{6}$
    FontWeight:
      description: The option that determines the text display weight, or boldness.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FontWeightName"
          description: The lexical name for the level of boldness of the text display.
    FontWeightName:
      type: string
      enum:
