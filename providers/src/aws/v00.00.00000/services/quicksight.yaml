    LayoutList:
      type: array
      items:
        $ref: "#/components/schemas/Layout"
    Layout:
      description: A Layout defines the placement of elements within a sheet. For more information, see Types of layout in the Amazon Quick Suite User Guide. This is a union type structure. For this structure to be valid, only one of the attributes can be defined.
      type: object
      properties:
