          $ref: "#/components/schemas/GridLayoutElementColumnIndex"
          description: The column index for the upper left corner of an element.
        ColumnSpan:
          $ref: "#/components/schemas/GridLayoutElementColumnSpan"
          description: The width of a grid element expressed as a number of grid columns.
        RowIndex:
          $ref: "#/components/schemas/GridLayoutElementRowIndex"
          description: The row index for the upper left corner of an element.
        RowSpan:
          $ref: "#/components/schemas/GridLayoutElementRowSpan"
          description: The height of a grid element expressed as a number of grid rows.
        BorderStyle:
          $ref: "#/components/schemas/GridLayoutElementBorderStyle"
          description: The border style configuration of a grid layout element.
        SelectedBorderStyle:
          $ref: "#/components/schemas/GridLayoutElementBorderStyle"
          description: The border style configuration of a grid layout element. This border style is used when the element is selected.
        BackgroundStyle:
          $ref: "#/components/schemas/GridLayoutElementBackgroundStyle"
          description: The background style configuration of a grid layout element.
        LoadingAnimation:
          $ref: "#/components/schemas/LoadingAnimation"
        BorderRadius:
          $ref: "#/components/schemas/BorderRadius"
          description: The border radius of a grid layout element.
        Padding:
          $ref: "#/components/schemas/Padding"
          description: The padding of a grid layout element.
      required:
        - ElementId
        - ElementType
        - ColumnSpan
        - RowSpan
