    RefreshSchedule:
      description: The refresh schedule of a dataset.
      type: object
      properties:
        ScheduleId:
          $ref: "#/components/schemas/String"
          description: An identifier for the refresh schedule.
        ScheduleFrequency:
          $ref: "#/components/schemas/RefreshFrequency"
          description: The frequency for the refresh schedule.
        StartAfterDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: Time after which the refresh schedule can be started, expressed in YYYY-MM-DDTHH:MM:SS format.
        RefreshType:
          $ref: "#/components/schemas/IngestionType"
          description: "The type of refresh that a datset undergoes. Valid values are as follows: FULL_REFRESH: A complete refresh of a dataset. INCREMENTAL_REFRESH: A partial refresh of some rows of a dataset, based on the time window specified. For more information on full and incremental refreshes, see Refreshing SPICE data in the Amazon Quick Suite User Guide."
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the refresh schedule.
      required:
        - ScheduleId
        - ScheduleFrequency
        - RefreshType
    RefreshFrequency:
      description: Specifies the interval between each scheduled refresh of a dataset.
      type: object
      properties:
        Interval:
          $ref: "#/components/schemas/RefreshInterval"
          description: "The interval between scheduled refreshes. Valid values are as follows: MINUTE15: The dataset refreshes every 15 minutes. This value is only supported for incremental refreshes. This interval can only be used for one schedule per dataset. MINUTE30:The dataset refreshes every 30 minutes. This value is only supported for incremental refreshes. This interval can only be used for one schedule per dataset. HOURLY: The dataset refreshes every hour. This interval can only be used for one schedule per dataset. DAILY: The dataset refreshes every day. WEEKLY: The dataset refreshes every week. MONTHLY: The dataset refreshes every month."
        RefreshOnDay:
          $ref: "#/components/schemas/ScheduleRefreshOnEntity"
          description: The day of the week that you want to schedule the refresh on. This value is required for weekly and monthly refresh intervals.
        Timezone:
          $ref: "#/components/schemas/String"
          description: The timezone that you want the refresh schedule to use. The timezone ID must match a corresponding ID found on java.util.time.getAvailableIDs().
        TimeOfTheDay:
          $ref: "#/components/schemas/String"
          description: The time of day that you want the datset to refresh. This value is expressed in HH:MM format. This field is not required for schedules that refresh hourly.
      required:
        - Interval
    RefreshInterval:
      type: string
      enum:
        - MINUTE15
        - MINUTE30
        - HOURLY
        - DAILY
        - WEEKLY
        - MONTHLY
    ScheduleRefreshOnEntity:
      description: The refresh on entity for weekly or monthly schedules.
      type: object
      properties:
        DayOfWeek:
          $ref: "#/components/schemas/DayOfWeek"
          description: The day of the week that you want to schedule a refresh on.
        DayOfMonth:
          $ref: "#/components/schemas/DayOfMonth"
          description: The day of the month that you want to schedule refresh on.
    DayOfWeek:
      type: string
      enum:
        - SUNDAY
        - MONDAY
        - TUESDAY
        - WEDNESDAY
        - THURSDAY
        - FRIDAY
        - SATURDAY
    DayOfMonth:
      type: string
      minLength: 1
      maxLength: 17
      pattern: ^(?:LAST_DAY_OF_MONTH|1[0-9]|2[0-8]|[12]|[3-9])$
