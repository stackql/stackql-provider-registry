  /accounts/{aws_account_id}/dashboards/{dashboard_id}/snapshot-jobs/{snapshot_job_id}:
    get:
      operationId: DescribeDashboardSnapshotJob
      description: "Describes an existing snapshot job. Poll job descriptions after a job starts to know the status of the job. For information on available status codes, see JobStatus. Registered user support This API can be called as before to get status of a job started by the same Quick Sight user. Possible error scenarios Request will fail with an Access Denied error in the following scenarios: The credentials have expired. Job has been started by a different user. Impersonated Quick Sight user doesn't have access to the specified dashboard in the job."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that the dashboard snapshot job is executed in.
        - name: dashboard_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the dashboard that you have started a snapshot job for.
        - name: snapshot_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the job to be described. The job ID is set when you start a new job with a StartDashboardSnapshotJob API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDashboardSnapshotJobResponse"
  /accounts/{aws_account_id}/dashboards/{dashboard_id}/snapshot-jobs/{snapshot_job_id}/result:
    get:
      operationId: DescribeDashboardSnapshotJobResult
      description: "Describes the result of an existing snapshot job that has finished running. A finished snapshot job will return a COMPLETED or FAILED status when you poll the job with a DescribeDashboardSnapshotJob API call. If the job has not finished running, this operation returns a message that says Dashboard Snapshot Job with id `<SnapshotjobId>` has not reached a terminal state.. Registered user support This API can be called as before to get the result of a job started by the same Quick Sight user. The result for the user will be returned in RegisteredUsers response attribute. The attribute will contain a list with at most one object in it. Possible error scenarios The request fails with an Access Denied error in the following scenarios: The credentials have expired. The job was started by a different user. The registered user doesn't have access to the specified dashboard. The request succeeds but the job fails in the following scenarios: DASHBOARD_ACCESS_DENIED - The registered user lost access to the dashboard. CAPABILITY_RESTRICTED - The registered user is restricted from exporting data in all selected formats. The request succeeds but the response contains an error code in the following scenarios: CAPABILITY_RESTRICTED - The registered user is restricted from exporting data in some selected formats. RLS_CHANGED - Row-level security settings have changed. Re-run the job with current settings. CLS_CHANGED - Column-level security settings have changed. Re-run the job with current settings. DATASET_DELETED - The dataset has been deleted. Verify the dataset exists before re-running the job."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that the dashboard snapshot job is executed in.
        - name: dashboard_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the dashboard that you have started a snapshot job for.
        - name: snapshot_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the job to be described. The job ID is set when you start a new job with a StartDashboardSnapshotJob API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDashboardSnapshotJobResultResponse"
