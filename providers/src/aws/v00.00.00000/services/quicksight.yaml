  /accounts/{aws_account_id}/templates/{template_id}:
    post:
      operationId: CreateTemplate
      description: Creates a template either from a TemplateDefinition or from an existing Quick Sight analysis or template. You can use the resulting template to create additional dashboards, templates, or analyses. A template is an entity in Quick Sight that encapsulates the metadata required to create an analysis and that you can use to create s dashboard. A template adds a layer of abstraction by using placeholders to replace the dataset associated with the analysis. You can use templates to create dashboards by replacing dataset placeholders with datasets that follow the same schema that was used to create the source analysis and template.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that the group is in. You use the ID for the Amazon Web Services account that contains your Amazon Quick Sight account.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: An ID for the template that you want to create. This template is unique per Amazon Web Services Region; in each Amazon Web Services account.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/TemplateName"
                Permissions:
                  $ref: "#/components/schemas/ResourcePermissionList"
                SourceEntity:
                  $ref: "#/components/schemas/TemplateSourceEntity"
                Tags:
                  $ref: "#/components/schemas/TagList"
                VersionDescription:
                  $ref: "#/components/schemas/VersionDescription"
                Definition:
                  $ref: "#/components/schemas/TemplateVersionDefinition"
                ValidationStrategy:
                  $ref: "#/components/schemas/ValidationStrategy"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTemplateResponse"
    delete:
      operationId: DeleteTemplate
      description: Deletes a template.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that contains the template that you're deleting.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: An ID for the template you want to delete.
        - name: version-number
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionNumber"
          description: Specifies the version of the template that you want to delete. If you don't provide a version number, DeleteTemplate deletes all versions of the template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTemplateResponse"
    get:
      operationId: DescribeTemplate
      description: Describes a template's metadata.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that contains the template that you're describing.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID for the template.
        - name: version-number
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VersionNumber"
          description: (Optional) The number for the version to describe. If a VersionNumber parameter value isn't provided, the latest version of the template is described.
        - name: alias-name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AliasName"
          description: The alias of the template that you want to describe. If you name a specific alias, you describe the version that the alias points to. You can specify the latest version of the template by providing the keyword $LATEST in the AliasName parameter. The keyword $PUBLISHED doesn't apply to templates.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTemplateResponse"
