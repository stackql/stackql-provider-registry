openapi: 3.0.0
info:
  version: "2018-04-01"
  title: Amazon QuickSight
  description: Amazon QuickSight
  x-serviceName: quicksight
  x-serviceAlias: quicksight
  x-protocol: rest-json
  x-apiVersion: "2018-04-01"
  x-endpointPrefix: quicksight
  x-jsonVersion: "1.0"
servers:
  - url: https://quicksight.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for quicksight
paths:
  /accounts/{aws_account_id}/topics/{topic_id}/batch-create-reviewed-answers:
    post:
      operationId: BatchCreateTopicReviewedAnswer
      description: Creates new reviewed answers for a Q Topic.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that you want to create a reviewed answer in.
        - name: topic_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TopicId"
          description: The ID for the topic reviewed answer that you want to create. This ID is unique per Amazon Web Services Region for each Amazon Web Services account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Answers:
                  $ref: "#/components/schemas/CreateTopicReviewedAnswers"
              required:
                - Answers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateTopicReviewedAnswerResponse"
  /accounts/{aws_account_id}/topics/{topic_id}/batch-delete-reviewed-answers:
    post:
      operationId: BatchDeleteTopicReviewedAnswer
      description: Deletes reviewed answers for Q Topic.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that you want to delete a reviewed answers in.
        - name: topic_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TopicId"
          description: The ID for the topic reviewed answer that you want to delete. This ID is unique per Amazon Web Services Region for each Amazon Web Services account.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AnswerIds:
                  $ref: "#/components/schemas/AnswerIds"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteTopicReviewedAnswerResponse"
  /accounts/{aws_account_id}/data-sets/{data_set_id}/ingestions/{ingestion_id}:
    delete:
      operationId: CancelIngestion
      description: Cancels an ongoing ingestion of data into SPICE.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID.
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the dataset used in the ingestion.
        - name: ingestion_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IngestionId"
          description: An ID for the ingestion.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelIngestionResponse"
    put:
      operationId: CreateIngestion
      description: Creates and starts a new SPICE ingestion for a dataset. You can manually refresh datasets in an Enterprise edition account 32 times in a 24-hour period. You can manually refresh datasets in a Standard edition account 8 times in a 24-hour period. Each 24-hour period is measured starting 24 hours before the current date and time. Any ingestions operating on tagged datasets inherit the same tags automatically for use in access control. For an example, see How do I create an IAM policy to control access to Amazon EC2 resources using tags? in the Amazon Web Services Knowledge Center. Tags are visible on the tagged dataset, but not on the ingestion resource.
      parameters:
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the dataset used in the ingestion.
        - name: ingestion_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IngestionId"
          description: An ID for the ingestion.
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                IngestionType:
                  $ref: "#/components/schemas/IngestionType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIngestionResponse"
    get:
      operationId: DescribeIngestion
      description: Describes a SPICE ingestion.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID.
        - name: data_set_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the dataset used in the ingestion.
        - name: ingestion_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IngestionId"
          description: An ID for the ingestion.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeIngestionResponse"
  /accounts/{aws_account_id}/customizations:
    post:
      operationId: CreateAccountCustomization
      description: Creates Amazon Quick Sight customizations. Currently, you can add a custom default theme by using the CreateAccountCustomization or UpdateAccountCustomization API operation. To further customize Amazon Quick Sight by removing Amazon Quick Sight sample assets and videos for all new users, see Customizing Quick Sight in the Amazon Quick Sight User Guide. You can create customizations for your Amazon Web Services account or, if you specify a namespace, for a Quick Sight namespace instead. Customizations that apply to a namespace always override customizations that apply to an Amazon Web Services account. To find out which customizations apply, use the DescribeAccountCustomization API operation. Before you use the CreateAccountCustomization API operation to add a theme as the namespace default, make sure that you first share the theme with the namespace. If you don't share it with the namespace, the theme isn't visible to your users even if you make it the default theme. To check if the theme is shared, view the current permissions by using the DescribeThemePermissions API operation. To share the theme, grant permissions by using the UpdateThemePermissions API operation.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that you want to customize Quick Sight for.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Namespace"
          description: The Quick Sight namespace that you want to add customizations to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountCustomization:
                  $ref: "#/components/schemas/AccountCustomization"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - AccountCustomization
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountCustomizationResponse"
    delete:
      operationId: DeleteAccountCustomization
      description: "This API permanently deletes all Quick Sight customizations for the specified Amazon Web Services account and namespace. When you delete account customizations: All customizations are removed including themes, branding, and visual settings This action cannot be undone through the API Users will see default Quick Sight styling after customizations are deleted Before proceeding: Ensure you have backups of any custom themes or branding elements you may want to recreate. Deletes all Amazon Quick Sight customizations for the specified Amazon Web Services account and Quick Sight namespace."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that you want to delete Quick Sight customizations from.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Namespace"
          description: The Quick Sight namespace that you're deleting the customizations from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountCustomizationResponse"
    get:
      operationId: DescribeAccountCustomization
      description: "Describes the customizations associated with the provided Amazon Web Services account and Amazon Quick Sight namespace. The Quick Sight console evaluates which customizations to apply by running this API operation with the Resolved flag included. To determine what customizations display when you run this command, it can help to visualize the relationship of the entities involved. Amazon Web Services account - The Amazon Web Services account exists at the top of the hierarchy. It has the potential to use all of the Amazon Web Services Regions and Amazon Web Services Services. When you subscribe to Quick Sight, you choose one Amazon Web Services Region to use as your home Region. That's where your free SPICE capacity is located. You can use Quick Sight in any supported Amazon Web Services Region. Amazon Web Services Region - You can sign in to Quick Sight in any Amazon Web Services Region. If you have a user directory, it resides in us-east-1, which is US East (N. Virginia). Generally speaking, these users have access to Quick Sight in any Amazon Web Services Region, unless they are constrained to a namespace. To run the command in a different Amazon Web Services Region, you change your Region settings. If you're using the CLI, you can use one of the following options: Use command line options. Use named profiles. Run aws configure to change your default Amazon Web Services Region. Use Enter to key the same settings for your keys. For more information, see Configuring the CLI. Namespace - A Quick Sight namespace is a partition that contains users and assets (data sources, datasets, dashboards, and so on). To access assets that are in a specific namespace, users and groups must also be part of the same namespace. People who share a namespace are completely isolated from users and assets in other namespaces, even if they are in the same Amazon Web Services account and Amazon Web Services Region. Applied customizations - Quick Sight customizations can apply to an Amazon Web Services account or to a namespace. Settings that you apply to a namespace override settings that you apply to an Amazon Web Services account."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that you want to describe Quick Sight customizations for.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Namespace"
          description: The Quick Sight namespace that you want to describe Quick Sight customizations for.
        - name: resolved
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/boolean"
          description: The Resolved flag works with the other parameters to determine which view of Quick Sight customizations is returned. You can add this flag to your command to use the same view that Quick Sight uses to identify which customizations to apply to the console. Omit this flag, or set it to no-resolved, to reveal customizations that are configured at different levels.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountCustomizationResponse"
    put:
      operationId: UpdateAccountCustomization
      description: Updates Amazon Quick Sight customizations. Currently, the only customization that you can use is a theme. You can use customizations for your Amazon Web Services account or, if you specify a namespace, for a Quick Sight namespace instead. Customizations that apply to a namespace override customizations that apply to an Amazon Web Services account. To find out which customizations apply, use the DescribeAccountCustomization API operation.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID for the Amazon Web Services account that you want to update Quick Sight customizations for.
        - name: namespace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Namespace"
          description: The namespace that you want to update Quick Sight customizations for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountCustomization:
                  $ref: "#/components/schemas/AccountCustomization"
              required:
                - AccountCustomization
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountCustomizationResponse"
  /account/{aws_account_id}:
    post:
      operationId: CreateAccountSubscription
      description: Creates an Amazon Quick Sight account, or subscribes to Amazon Quick Sight Q. The Amazon Web Services Region for the account is derived from what is configured in the CLI or SDK. Before you use this operation, make sure that you can connect to an existing Amazon Web Services account. If you don't have an Amazon Web Services account, see Sign up for Amazon Web Services in the Amazon Quick Sight User Guide. The person who signs up for Amazon Quick Sight needs to have the correct Identity and Access Management (IAM) permissions. For more information, see IAM Policy Examples for Amazon Quick Sight in the Amazon Quick Sight User Guide. If your IAM policy includes both the Subscribe and CreateAccountSubscription actions, make sure that both actions are set to Allow. If either action is set to Deny, the Deny action prevails and your API call fails. You can't pass an existing IAM role to access other Amazon Web Services services using this API operation. To pass your existing IAM role to Amazon Quick Sight, see Passing IAM roles to Amazon Quick Sight in the Amazon Quick Sight User Guide. You can't set default resource access on the new account from the Amazon Quick Sight API. Instead, add default resource access from the Amazon Quick Sight console. For more information about setting default resource access to Amazon Web Services services, see Setting default resource access to Amazon Web Services services in the Amazon Quick Sight User Guide.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID of the account that you're using to create your Quick Sight account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Edition:
                  $ref: "#/components/schemas/Edition"
                AuthenticationMethod:
                  $ref: "#/components/schemas/AuthenticationMethodOption"
                AccountName:
                  $ref: "#/components/schemas/AccountName"
                NotificationEmail:
                  $ref: "#/components/schemas/String"
                ActiveDirectoryName:
                  $ref: "#/components/schemas/String"
                Realm:
                  $ref: "#/components/schemas/String"
                DirectoryId:
                  $ref: "#/components/schemas/String"
                AdminGroup:
                  $ref: "#/components/schemas/GroupsList"
                AuthorGroup:
                  $ref: "#/components/schemas/GroupsList"
                ReaderGroup:
                  $ref: "#/components/schemas/GroupsList"
                AdminProGroup:
                  $ref: "#/components/schemas/GroupsList"
                AuthorProGroup:
                  $ref: "#/components/schemas/GroupsList"
                ReaderProGroup:
                  $ref: "#/components/schemas/GroupsList"
                FirstName:
                  $ref: "#/components/schemas/String"
                LastName:
                  $ref: "#/components/schemas/String"
                EmailAddress:
                  $ref: "#/components/schemas/String"
                ContactNumber:
                  $ref: "#/components/schemas/String"
                IAMIdentityCenterInstanceArn:
                  $ref: "#/components/schemas/String"
              required:
                - AuthenticationMethod
                - AccountName
                - NotificationEmail
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountSubscriptionResponse"
    delete:
      operationId: DeleteAccountSubscription
      description: "Deleting your Quick Sight account subscription has permanent, irreversible consequences across all Amazon Web Services regions: Global deletion – Running this operation from any single region will delete your Quick Sight account and all data in every Amazon Web Services region where you have Quick Sight resources. Complete data loss – All dashboards, analyses, datasets, data sources, and custom visuals will be permanently deleted across all regions. Embedded content failure – All embedded dashboards and visuals in your applications will immediately stop working and display errors to end users. Shared resources removed – All shared dashboards, folders, and resources will become inaccessible to other users and external recipients. User access terminated – All Quick Sight users in your account will lose access immediately, including authors, readers, and administrators. No recovery possible – Once deleted, your Quick Sight account and all associated data cannot be restored. Consider exporting critical dashboards and data before proceeding with account deletion. Use the DeleteAccountSubscription operation to delete an Quick Sight account. This operation will result in an error message if you have configured your account termination protection settings to True. To change this setting and delete your account, call the UpdateAccountSettings API and set the value of the TerminationProtectionEnabled parameter to False, then make another call to the DeleteAccountSubscription API."
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID of the account that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountSubscriptionResponse"
    get:
      operationId: DescribeAccountSubscription
      description: Use the DescribeAccountSubscription operation to receive a description of an Quick Sight account's subscription. A successful API call returns an AccountInfo object that includes an account's name, subscription status, authentication type, edition, and notification email address.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID associated with your Quick Sight account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountSubscriptionResponse"
  /accounts/{aws_account_id}/action-connectors:
    post:
      operationId: CreateActionConnector
      description: Creates an action connector that enables Amazon Quick Sight to connect to external services and perform actions. Action connectors support various authentication methods and can be configured with specific actions from supported connector types like Amazon S3, Salesforce, JIRA.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID associated with the action connector.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionConnectorId:
                  $ref: "#/components/schemas/ShortRestrictiveResourceId"
                Name:
                  $ref: "#/components/schemas/ActionConnectorName"
                Type:
                  $ref: "#/components/schemas/ActionConnectorType"
                AuthenticationConfig:
                  $ref: "#/components/schemas/AuthConfig"
                Description:
                  $ref: "#/components/schemas/ActionConnectorDescription"
                Permissions:
                  $ref: "#/components/schemas/ResourcePermissionList"
                VpcConnectionArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ActionConnectorId
                - AuthenticationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActionConnectorResponse"
    get:
      operationId: ListActionConnectors
      description: Lists all action connectors in the specified Amazon Web Services account. Returns summary information for each connector including its name, type, creation time, and status.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The Amazon Web Services account ID for which to list action connectors.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of action connectors to return in a single response. Valid range is 1 to 100.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token to retrieve the next set of results. Use the token returned from a previous call to continue listing action connectors.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionConnectorsResponse"
  /accounts/{aws_account_id}/analyses/{analysis_id}:
    post:
      operationId: CreateAnalysis
      description: Creates an analysis in Amazon Quick Sight. Analyses can be created either from a template or from an AnalysisDefinition.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account where you are creating an analysis.
        - name: analysis_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID for the analysis that you're creating. This ID displays in the URL of the analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AnalysisName"
                Parameters:
                  $ref: "#/components/schemas/Parameters"
                Permissions:
                  $ref: "#/components/schemas/ResourcePermissionList"
                SourceEntity:
                  $ref: "#/components/schemas/AnalysisSourceEntity"
                ThemeArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagList"
                Definition:
                  $ref: "#/components/schemas/AnalysisDefinition"
                ValidationStrategy:
                  $ref: "#/components/schemas/ValidationStrategy"
                FolderArns:
                  $ref: "#/components/schemas/FolderArnList"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnalysisResponse"
    delete:
      operationId: DeleteAnalysis
      description: Deletes an analysis from Amazon Quick Sight. You can optionally include a recovery window during which you can restore the analysis. If you don't specify a recovery window value, the operation defaults to 30 days. Amazon Quick Sight attaches a DeletionTime stamp to the response that specifies the end of the recovery window. At the end of the recovery window, Amazon Quick Sight deletes the analysis permanently. At any time before recovery window ends, you can use the RestoreAnalysis API operation to remove the DeletionTime stamp and cancel the deletion of the analysis. The analysis remains visible in the API until it's deleted, so you can describe it but you can't make a template from it. An analysis that's scheduled for deletion isn't accessible in the Amazon Quick Sight console. To access it in the console, restore it. Deleting an analysis doesn't delete the dashboards that you publish from it.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account where you want to delete an analysis.
        - name: analysis_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the analysis that you're deleting.
        - name: recovery-window-in-days
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecoveryWindowInDays"
          description: A value that specifies the number of days that Amazon Quick Sight waits before it deletes the analysis. You can't use this parameter with the ForceDeleteWithoutRecovery option in the same API call. The default value is 30.
        - name: force-delete-without-recovery
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: This option defaults to the value NoForceDeleteWithoutRecovery. To immediately delete the analysis, add the ForceDeleteWithoutRecovery option. You can't restore an analysis after it's deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAnalysisResponse"
    get:
      operationId: DescribeAnalysis
      description: Provides a summary of the metadata for an analysis.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that contains the analysis. You must be using the Amazon Web Services account that the analysis is in.
        - name: analysis_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the analysis that you're describing. The ID is part of the URL of the analysis.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAnalysisResponse"
    put:
      operationId: UpdateAnalysis
      description: Updates an analysis in Amazon Quick Sight
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that contains the analysis that you're updating.
        - name: analysis_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID for the analysis that you're updating. This ID displays in the URL of the analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AnalysisName"
                Parameters:
                  $ref: "#/components/schemas/Parameters"
                SourceEntity:
                  $ref: "#/components/schemas/AnalysisSourceEntity"
                ThemeArn:
                  $ref: "#/components/schemas/Arn"
                Definition:
                  $ref: "#/components/schemas/AnalysisDefinition"
                ValidationStrategy:
                  $ref: "#/components/schemas/ValidationStrategy"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAnalysisResponse"
  /accounts/{aws_account_id}/brands/{brand_id}:
    post:
      operationId: CreateBrand
      description: Creates an Quick Sight brand.
      parameters:
        - name: aws_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the Amazon Web Services account that owns the brand.
        - name: brand_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ShortRestrictiveResourceId"
          description: The ID of the Quick brand.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BrandDefinition:
                  $ref: "#/components/schemas/BrandDefinition"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBrandResponse"
    delete:
      operationId: DeleteBrand
