        - SELECTED_VISUALS
    SnapshotFileSheetSelectionVisualIdList:
      type: array
      items:
        $ref: "#/components/schemas/ShortRestrictiveResourceId"
    SnapshotFileFormatType:
      type: string
      enum:
        - CSV
        - PDF
        - EXCEL
