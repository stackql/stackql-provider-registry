        - Count
        - Percentage
    Float:
      type: number
      format: float
    CategoricalValues:
      description: Entity that comprises information on categorical values in data.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/StatisticalIssueStatus"
          description: Indicates whether there is a potential data issue related to categorical values.
