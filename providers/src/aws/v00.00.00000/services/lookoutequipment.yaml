openapi: 3.0.0
info:
  version: "2020-12-15"
  title: Amazon Lookout for Equipment
  description: Amazon Lookout for Equipment
  x-serviceName: lookoutequipment
  x-serviceAlias: lookoutequipment
  x-protocol: json
  x-apiVersion: "2020-12-15"
  x-endpointPrefix: lookoutequipment
  x-targetPrefix: AWSLookoutEquipmentFrontendService
  x-jsonVersion: "1.0"
servers:
  - url: https://lookoutequipment.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lookoutequipment
paths:
  /CreateDataset:
    post:
      operationId: CreateDataset
      description: Creates a container for a collection of data being ingested for analysis. The dataset contains the metadata describing where the data is and what the data actually looks like. For example, it contains the location of the data source, the data schema, and other information. A dataset also contains any tags associated with the ingested data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.CreateDataset
            default: AWSLookoutEquipmentFrontendService.CreateDataset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatasetName:
                  $ref: "#/components/schemas/DatasetName"
                  description: The name of the dataset being created.
                DatasetSchema:
                  $ref: "#/components/schemas/DatasetSchema"
                  description: A JSON description of the data that is in each time series dataset, including names, column names, and data types.
                ServerSideKmsKeyId:
                  $ref: "#/components/schemas/NameOrArn"
                  description: Provides the identifier of the KMS key used to encrypt dataset data by Amazon Lookout for Equipment.
                ClientToken:
                  $ref: "#/components/schemas/IdempotenceToken"
                  description: A unique identifier for the request. If you do not set the client request token, Amazon Lookout for Equipment generates one.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Any tags associated with the ingested data described in the dataset.
              required:
                - DatasetName
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetResponse"
  /CreateInferenceScheduler:
    post:
      operationId: CreateInferenceScheduler
      description: Creates a scheduled inference. Scheduling an inference is setting up a continuous real-time inference plan to analyze new measurement data. When setting up the schedule, you provide an S3 bucket location for the input data, assign it a delimiter between separate entries in the data, set an offset delay if desired, and set the frequency of inferencing. You must also provide an S3 bucket location for the output data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.CreateInferenceScheduler
            default: AWSLookoutEquipmentFrontendService.CreateInferenceScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the previously trained machine learning model being used to create the inference scheduler.
                InferenceSchedulerName:
                  $ref: "#/components/schemas/InferenceSchedulerName"
                  description: The name of the inference scheduler being created.
                DataDelayOffsetInMinutes:
                  $ref: "#/components/schemas/DataDelayOffsetInMinutes"
                  description: The interval (in minutes) of planned delay at the start of each inference segment. For example, if inference is set to run every ten minutes, the delay is set to five minutes and the time is 09:08. The inference scheduler will wake up at the configured interval (which, without a delay configured, would be 09:10) plus the additional five minute delay time (so 09:15) to check your Amazon S3 bucket. The delay provides a buffer for you to upload data at the same frequency, so that you don't have to stop and restart the scheduler when uploading new data. For more information, see Understanding the inference process.
                DataUploadFrequency:
                  $ref: "#/components/schemas/DataUploadFrequency"
                  description: How often data is uploaded to the source Amazon S3 bucket for the input data. The value chosen is the length of time between data uploads. For instance, if you select 5 minutes, Amazon Lookout for Equipment will upload the real-time data to the source bucket once every 5 minutes. This frequency also determines how often Amazon Lookout for Equipment runs inference on your data. For more information, see Understanding the inference process.
                DataInputConfiguration:
                  $ref: "#/components/schemas/InferenceInputConfiguration"
                  description: Specifies configuration information for the input data for the inference scheduler, including delimiter, format, and dataset location.
                DataOutputConfiguration:
                  $ref: "#/components/schemas/InferenceOutputConfiguration"
                  description: Specifies configuration information for the output results for the inference scheduler, including the S3 location for the output.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of a role with permission to access the data source being used for the inference.
                ServerSideKmsKeyId:
                  $ref: "#/components/schemas/NameOrArn"
                  description: Provides the identifier of the KMS key used to encrypt inference scheduler data by Amazon Lookout for Equipment.
                ClientToken:
                  $ref: "#/components/schemas/IdempotenceToken"
                  description: A unique identifier for the request. If you do not set the client request token, Amazon Lookout for Equipment generates one.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Any tags associated with the inference scheduler.
              required:
                - ModelName
                - InferenceSchedulerName
                - DataUploadFrequency
                - DataInputConfiguration
                - DataOutputConfiguration
                - RoleArn
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInferenceSchedulerResponse"
  /CreateLabel:
    post:
      operationId: CreateLabel
      description: Creates a label for an event.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.CreateLabel
            default: AWSLookoutEquipmentFrontendService.CreateLabel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: The name of a group of labels. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start time of the labeled event.
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end time of the labeled event.
                Rating:
                  $ref: "#/components/schemas/LabelRating"
                  description: Indicates whether a labeled event represents an anomaly.
                FaultCode:
                  $ref: "#/components/schemas/FaultCode"
                  description: Provides additional information about the label. The fault code must be defined in the FaultCodes attribute of the label group. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                Notes:
                  $ref: "#/components/schemas/Comments"
                  description: Metadata providing additional information about the label. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                Equipment:
                  $ref: "#/components/schemas/Equipment"
                  description: Indicates that a label pertains to a particular piece of equipment. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                ClientToken:
                  $ref: "#/components/schemas/IdempotenceToken"
                  description: A unique identifier for the request to create a label. If you do not set the client request token, Lookout for Equipment generates one.
              required:
                - LabelGroupName
                - StartTime
                - EndTime
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLabelResponse"
  /CreateLabelGroup:
    post:
      operationId: CreateLabelGroup
      description: Creates a group of labels.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.CreateLabelGroup
            default: AWSLookoutEquipmentFrontendService.CreateLabelGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: Names a group of labels. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                FaultCodes:
                  $ref: "#/components/schemas/FaultCodes"
                  description: The acceptable fault codes (indicating the type of anomaly associated with the label) that can be used with this label group. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                ClientToken:
                  $ref: "#/components/schemas/IdempotenceToken"
                  description: A unique identifier for the request to create a label group. If you do not set the client request token, Lookout for Equipment generates one.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags that provide metadata about the label group you are creating. Data in this field will be retained for service usage. Follow best practices for the security of your data.
              required:
                - LabelGroupName
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLabelGroupResponse"
  /CreateModel:
    post:
      operationId: CreateModel
      description: Creates a machine learning model for data inference. A machine-learning (ML) model is a mathematical model that finds patterns in your data. In Amazon Lookout for Equipment, the model learns the patterns of normal behavior and detects abnormal behavior that could be potential equipment failure (or maintenance events). The models are made by analyzing normal data and abnormalities in machine behavior that have already occurred. Your model is trained using a portion of the data from your dataset and uses that data to learn patterns of normal behavior and abnormal patterns that lead to equipment failure. Another portion of the data is used to evaluate the model's accuracy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.CreateModel
            default: AWSLookoutEquipmentFrontendService.CreateModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name for the machine learning model to be created.
                DatasetName:
                  $ref: "#/components/schemas/DatasetIdentifier"
                  description: The name of the dataset for the machine learning model being created.
                DatasetSchema:
                  $ref: "#/components/schemas/DatasetSchema"
                  description: The data schema for the machine learning model being created.
                LabelsInputConfiguration:
                  $ref: "#/components/schemas/LabelsInputConfiguration"
                  description: The input configuration for the labels being used for the machine learning model that's being created.
                ClientToken:
                  $ref: "#/components/schemas/IdempotenceToken"
                  description: A unique identifier for the request. If you do not set the client request token, Amazon Lookout for Equipment generates one.
                TrainingDataStartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: Indicates the time reference in the dataset that should be used to begin the subset of training data for the machine learning model.
                TrainingDataEndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: Indicates the time reference in the dataset that should be used to end the subset of training data for the machine learning model.
                EvaluationDataStartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: Indicates the time reference in the dataset that should be used to begin the subset of evaluation data for the machine learning model.
                EvaluationDataEndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: Indicates the time reference in the dataset that should be used to end the subset of evaluation data for the machine learning model.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of a role with permission to access the data source being used to create the machine learning model.
                DataPreProcessingConfiguration:
                  $ref: "#/components/schemas/DataPreProcessingConfiguration"
                  description: The configuration is the TargetSamplingRate, which is the sampling rate of the data after post processing by Amazon Lookout for Equipment. For example, if you provide data that has been collected at a 1 second level and you want the system to resample the data at a 1 minute rate before training, the TargetSamplingRate is 1 minute. When providing a value for the TargetSamplingRate, you must attach the prefix "PT" to the rate you want. The value for a 1 second rate is therefore PT1S, the value for a 15 minute rate is PT15M, and the value for a 1 hour rate is PT1H
                ServerSideKmsKeyId:
                  $ref: "#/components/schemas/NameOrArn"
                  description: Provides the identifier of the KMS key used to encrypt model data by Amazon Lookout for Equipment.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Any tags associated with the machine learning model being created.
                OffCondition:
                  $ref: "#/components/schemas/OffCondition"
                  description: Indicates that the asset associated with this sensor has been shut off. As long as this condition is met, Lookout for Equipment will not use data from this asset for training, evaluation, or inference.
                ModelDiagnosticsOutputConfiguration:
                  $ref: "#/components/schemas/ModelDiagnosticsOutputConfiguration"
                  description: The Amazon S3 location where you want Amazon Lookout for Equipment to save the pointwise model diagnostics. You must also specify the RoleArn request parameter.
              required:
                - ModelName
                - DatasetName
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateModelResponse"
  /CreateRetrainingScheduler:
    post:
      operationId: CreateRetrainingScheduler
      description: Creates a retraining scheduler on the specified model.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.CreateRetrainingScheduler
            default: AWSLookoutEquipmentFrontendService.CreateRetrainingScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the model to add the retraining scheduler to.
                RetrainingStartDate:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start date for the retraining scheduler. Lookout for Equipment truncates the time you provide to the nearest UTC day.
                RetrainingFrequency:
                  $ref: "#/components/schemas/RetrainingFrequency"
                  description: "This parameter uses the ISO 8601 standard to set the frequency at which you want retraining to occur in terms of Years, Months, and/or Days (note: other parameters like Time are not currently supported). The minimum value is 30 days (P30D) and the maximum value is 1 year (P1Y). For example, the following values are valid: P3M15D – Every 3 months and 15 days P2M – Every 2 months P150D – Every 150 days"
                LookbackWindow:
                  $ref: "#/components/schemas/LookbackWindow"
                  description: The number of past days of data that will be used for retraining.
                PromoteMode:
                  $ref: "#/components/schemas/ModelPromoteMode"
                  description: Indicates how the service will use new models. In MANAGED mode, new models will automatically be used for inference if they have better performance than the current model. In MANUAL mode, the new models will not be used until they are manually activated.
                ClientToken:
                  $ref: "#/components/schemas/IdempotenceToken"
                  description: A unique identifier for the request. If you do not set the client request token, Amazon Lookout for Equipment generates one.
              required:
                - ModelName
                - RetrainingFrequency
                - LookbackWindow
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRetrainingSchedulerResponse"
  /DeleteDataset:
    post:
      operationId: DeleteDataset
      description: Deletes a dataset and associated artifacts. The operation will check to see if any inference scheduler or data ingestion job is currently using the dataset, and if there isn't, the dataset, its metadata, and any associated data stored in S3 will be deleted. This does not affect any models that used this dataset for training and evaluation, but does prevent it from being used in the future.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteDataset
            default: AWSLookoutEquipmentFrontendService.DeleteDataset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatasetName:
                  $ref: "#/components/schemas/DatasetIdentifier"
                  description: The name of the dataset to be deleted.
              required:
                - DatasetName
      responses:
        "200":
          description: Success
  /DeleteInferenceScheduler:
    post:
      operationId: DeleteInferenceScheduler
      description: Deletes an inference scheduler that has been set up. Prior inference results will not be deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteInferenceScheduler
            default: AWSLookoutEquipmentFrontendService.DeleteInferenceScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InferenceSchedulerName:
                  $ref: "#/components/schemas/InferenceSchedulerIdentifier"
                  description: The name of the inference scheduler to be deleted.
              required:
                - InferenceSchedulerName
      responses:
        "200":
          description: Success
  /DeleteLabel:
    post:
      operationId: DeleteLabel
      description: Deletes a label.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteLabel
            default: AWSLookoutEquipmentFrontendService.DeleteLabel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: The name of the label group that contains the label that you want to delete. Data in this field will be retained for service usage. Follow best practices for the security of your data.
                LabelId:
                  $ref: "#/components/schemas/LabelId"
                  description: The ID of the label that you want to delete.
              required:
                - LabelGroupName
                - LabelId
      responses:
        "200":
          description: Success
  /DeleteLabelGroup:
    post:
      operationId: DeleteLabelGroup
      description: Deletes a group of labels.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteLabelGroup
            default: AWSLookoutEquipmentFrontendService.DeleteLabelGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: The name of the label group that you want to delete. Data in this field will be retained for service usage. Follow best practices for the security of your data.
              required:
                - LabelGroupName
      responses:
        "200":
          description: Success
  /DeleteModel:
    post:
      operationId: DeleteModel
      description: Deletes a machine learning model currently available for Amazon Lookout for Equipment. This will prevent it from being used with an inference scheduler, even one that is already set up.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteModel
            default: AWSLookoutEquipmentFrontendService.DeleteModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the machine learning model to be deleted.
              required:
                - ModelName
      responses:
        "200":
          description: Success
  /DeleteResourcePolicy:
    post:
      operationId: DeleteResourcePolicy
      description: Deletes the resource policy attached to the resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteResourcePolicy
            default: AWSLookoutEquipmentFrontendService.DeleteResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource for which the resource policy should be deleted.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
  /DeleteRetrainingScheduler:
    post:
      operationId: DeleteRetrainingScheduler
      description: Deletes a retraining scheduler from a model. The retraining scheduler must be in the STOPPED status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DeleteRetrainingScheduler
            default: AWSLookoutEquipmentFrontendService.DeleteRetrainingScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the model whose retraining scheduler you want to delete.
              required:
                - ModelName
      responses:
        "200":
          description: Success
  /DescribeDataIngestionJob:
    post:
      operationId: DescribeDataIngestionJob
      description: Provides information on a specific data ingestion job such as creation time, dataset ARN, and status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DescribeDataIngestionJob
            default: AWSLookoutEquipmentFrontendService.DescribeDataIngestionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/IngestionJobId"
                  description: The job ID of the data ingestion job.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDataIngestionJobResponse"
  /DescribeDataset:
    post:
      operationId: DescribeDataset
      description: Provides a JSON description of the data in each time series dataset, including names, column names, and data types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DescribeDataset
            default: AWSLookoutEquipmentFrontendService.DescribeDataset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DatasetName:
                  $ref: "#/components/schemas/DatasetIdentifier"
                  description: The name of the dataset to be described.
              required:
                - DatasetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDatasetResponse"
  /DescribeInferenceScheduler:
    post:
      operationId: DescribeInferenceScheduler
      description: Specifies information about the inference scheduler being used, including name, model, status, and associated metadata
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DescribeInferenceScheduler
            default: AWSLookoutEquipmentFrontendService.DescribeInferenceScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InferenceSchedulerName:
                  $ref: "#/components/schemas/InferenceSchedulerIdentifier"
                  description: The name of the inference scheduler being described.
              required:
                - InferenceSchedulerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeInferenceSchedulerResponse"
  /DescribeLabel:
    post:
      operationId: DescribeLabel
      description: Returns the name of the label.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DescribeLabel
            default: AWSLookoutEquipmentFrontendService.DescribeLabel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: Returns the name of the group containing the label.
                LabelId:
                  $ref: "#/components/schemas/LabelId"
                  description: Returns the ID of the label.
              required:
                - LabelGroupName
                - LabelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLabelResponse"
  /DescribeLabelGroup:
    post:
      operationId: DescribeLabelGroup
      description: Returns information about the label group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.DescribeLabelGroup
            default: AWSLookoutEquipmentFrontendService.DescribeLabelGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: Returns the name of the label group.
              required:
                - LabelGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLabelGroupResponse"
  /DescribeModel:
    post:
