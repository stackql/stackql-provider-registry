      description: Summary of ingestion statistics like whether data exists, number of missing values, number of invalid values and so on related to the particular sensor.
      type: object
      properties:
        ComponentName:
          $ref: "#/components/schemas/ComponentName"
          description: Name of the component to which the particular sensor belongs for which the statistics belong to.
        SensorName:
          $ref: "#/components/schemas/SensorName"
          description: Name of the sensor that the statistics belong to.
        DataExists:
          $ref: "#/components/schemas/Boolean"
          description: Parameter that indicates whether data exists for the sensor that the statistics belong to.
        MissingValues:
          $ref: "#/components/schemas/CountPercent"
          description: Parameter that describes the total number of, and percentage of, values that are missing for the sensor that the statistics belong to.
        InvalidValues:
          $ref: "#/components/schemas/CountPercent"
          description: Parameter that describes the total number of, and percentage of, values that are invalid for the sensor that the statistics belong to.
        InvalidDateEntries:
          $ref: "#/components/schemas/CountPercent"
          description: Parameter that describes the total number of invalid date entries associated with the sensor that the statistics belong to.
        DuplicateTimestamps:
          $ref: "#/components/schemas/CountPercent"
          description: Parameter that describes the total number of duplicate timestamp records associated with the sensor that the statistics belong to.
        CategoricalValues:
          $ref: "#/components/schemas/CategoricalValues"
          description: Parameter that describes potential risk about whether data associated with the sensor is categorical.
        MultipleOperatingModes:
          $ref: "#/components/schemas/MultipleOperatingModes"
          description: Parameter that describes potential risk about whether data associated with the sensor has more than one operating mode.
        LargeTimestampGaps:
          $ref: "#/components/schemas/LargeTimestampGaps"
          description: Parameter that describes potential risk about whether data associated with the sensor contains one or more large gaps between consecutive timestamps.
        MonotonicValues:
          $ref: "#/components/schemas/MonotonicValues"
          description: Parameter that describes potential risk about whether data associated with the sensor is mostly monotonic.
