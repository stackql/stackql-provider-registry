  /UpdateInferenceScheduler:
    post:
      operationId: UpdateInferenceScheduler
      description: Updates an inference scheduler.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.UpdateInferenceScheduler
            default: AWSLookoutEquipmentFrontendService.UpdateInferenceScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                InferenceSchedulerName:
                  $ref: "#/components/schemas/InferenceSchedulerIdentifier"
                  description: The name of the inference scheduler to be updated.
                DataDelayOffsetInMinutes:
                  $ref: "#/components/schemas/DataDelayOffsetInMinutes"
                  description: A period of time (in minutes) by which inference on the data is delayed after the data starts. For instance, if you select an offset delay time of five minutes, inference will not begin on the data until the first data measurement after the five minute mark. For example, if five minutes is selected, the inference scheduler will wake up at the configured frequency with the additional five minute delay time to check the customer S3 bucket. The customer can upload data at the same frequency and they don't need to stop and restart the scheduler when uploading new data.
                DataUploadFrequency:
                  $ref: "#/components/schemas/DataUploadFrequency"
                  description: How often data is uploaded to the source S3 bucket for the input data. The value chosen is the length of time between data uploads. For instance, if you select 5 minutes, Amazon Lookout for Equipment will upload the real-time data to the source bucket once every 5 minutes. This frequency also determines how often Amazon Lookout for Equipment starts a scheduled inference on your data. In this example, it starts once every 5 minutes.
                DataInputConfiguration:
                  $ref: "#/components/schemas/InferenceInputConfiguration"
                  description: Specifies information for the input data for the inference scheduler, including delimiter, format, and dataset location.
                DataOutputConfiguration:
                  $ref: "#/components/schemas/InferenceOutputConfiguration"
                  description: Specifies information for the output results from the inference scheduler, including the output S3 location.
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of a role with permission to access the data source for the inference scheduler.
              required:
                - InferenceSchedulerName
      responses:
        "200":
          description: Success
  /UpdateLabelGroup:
    post:
      operationId: UpdateLabelGroup
      description: Updates the label group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.UpdateLabelGroup
            default: AWSLookoutEquipmentFrontendService.UpdateLabelGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                LabelGroupName:
                  $ref: "#/components/schemas/LabelGroupName"
                  description: The name of the label group to be updated.
                FaultCodes:
                  $ref: "#/components/schemas/FaultCodes"
                  description: Updates the code indicating the type of anomaly associated with the label. Data in this field will be retained for service usage. Follow best practices for the security of your data.
              required:
                - LabelGroupName
      responses:
        "200":
          description: Success
  /UpdateModel:
    post:
      operationId: UpdateModel
      description: Updates a model in the account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.UpdateModel
            default: AWSLookoutEquipmentFrontendService.UpdateModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the model to update.
                LabelsInputConfiguration:
                  $ref: "#/components/schemas/LabelsInputConfiguration"
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the model to update.
                ModelDiagnosticsOutputConfiguration:
                  $ref: "#/components/schemas/ModelDiagnosticsOutputConfiguration"
                  description: The Amazon S3 location where you want Amazon Lookout for Equipment to save the pointwise model diagnostics for the model. You must also specify the RoleArn request parameter.
              required:
                - ModelName
      responses:
        "200":
          description: Success
  /UpdateRetrainingScheduler:
    post:
      operationId: UpdateRetrainingScheduler
      description: Updates a retraining scheduler.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.UpdateRetrainingScheduler
            default: AWSLookoutEquipmentFrontendService.UpdateRetrainingScheduler
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the model whose retraining scheduler you want to update.
                RetrainingStartDate:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start date for the retraining scheduler. Lookout for Equipment truncates the time you provide to the nearest UTC day.
                RetrainingFrequency:
                  $ref: "#/components/schemas/RetrainingFrequency"
                  description: "This parameter uses the ISO 8601 standard to set the frequency at which you want retraining to occur in terms of Years, Months, and/or Days (note: other parameters like Time are not currently supported). The minimum value is 30 days (P30D) and the maximum value is 1 year (P1Y). For example, the following values are valid: P3M15D – Every 3 months and 15 days P2M – Every 2 months P150D – Every 150 days"
                LookbackWindow:
                  $ref: "#/components/schemas/LookbackWindow"
                  description: The number of past days of data that will be used for retraining.
                PromoteMode:
                  $ref: "#/components/schemas/ModelPromoteMode"
                  description: Indicates how the service will use new models. In MANAGED mode, new models will automatically be used for inference if they have better performance than the current model. In MANUAL mode, the new models will not be used until they are manually activated.
              required:
                - ModelName
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DatasetName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z_-]{1,200}$
    DatasetSchema:
      description: Provides information about the data schema used with the given dataset.
      type: object
      properties:
        InlineDataSchema:
          $ref: "#/components/schemas/InlineDataSchema"
          description: The data schema used within the given dataset.
    InlineDataSchema:
      type: string
      minLength: 1
      maxLength: 1000000
    NameOrArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]{0,2048}$
    IdempotenceToken:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \p{ASCII}{1,256}
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag is a key-value pair that can be added to a resource as metadata.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key for the specified tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value for the specified tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^(?!aws:)[a-zA-Z+-=._:/]+$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\s\\w+-=\\.:/@]*"
    CreateDatasetResponse:
      type: object
      properties:
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset being created.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the dataset being created.
        Status:
          $ref: "#/components/schemas/DatasetStatus"
          description: Indicates the status of the CreateDataset operation.
    DatasetArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:lookoutequipment:[a-zA-Z0-9\-]*:[0-9]{12}:dataset\/[0-9a-zA-Z_-]{1,200}\/.+
    DatasetStatus:
      type: string
      enum:
        - CREATED
        - INGESTION_IN_PROGRESS
        - ACTIVE
        - IMPORT_IN_PROGRESS
    ModelName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z_-]{1,200}$
    InferenceSchedulerName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z_-]{1,200}$
    DataDelayOffsetInMinutes:
      type: integer
      format: int64
      minimum: 0
      maximum: 60
    DataUploadFrequency:
      type: string
      enum:
        - PT5M
        - PT10M
        - PT15M
        - PT30M
        - PT1H
    InferenceInputConfiguration:
      description: Specifies configuration information for the input data for the inference, including Amazon S3 location of input data..
      type: object
      properties:
        S3InputConfiguration:
          $ref: "#/components/schemas/InferenceS3InputConfiguration"
          description: Specifies configuration information for the input data for the inference, including Amazon S3 location of input data.
        InputTimeZoneOffset:
          $ref: "#/components/schemas/TimeZoneOffset"
          description: Indicates the difference between your time zone and Coordinated Universal Time (UTC).
        InferenceInputNameConfiguration:
          $ref: "#/components/schemas/InferenceInputNameConfiguration"
          description: Specifies configuration information for the input data for the inference, including timestamp format and delimiter.
    InferenceS3InputConfiguration:
      description: Specifies configuration information for the input data for the inference, including input data S3 location.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The bucket containing the input dataset for the inference.
        Prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The prefix for the S3 bucket used for the input data for the inference.
      required:
        - Bucket
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9]$
    S3Prefix:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: (^$)|([\u0009\u000A\u000D\u0020-\u00FF]{1,1023}/$)
    TimeZoneOffset:
      type: string
      pattern: ^(\+|\-)[0-9]{2}\:[0-9]{2}$
    InferenceInputNameConfiguration:
      description: Specifies configuration information for the input data for the inference, including timestamp format and delimiter.
      type: object
      properties:
        TimestampFormat:
          $ref: "#/components/schemas/FileNameTimestampFormat"
          description: The format of the timestamp, whether Epoch time, or standard, with or without hyphens (-).
        ComponentTimestampDelimiter:
          $ref: "#/components/schemas/ComponentTimestampDelimiter"
          description: Indicates the delimiter character used between items in the data.
    FileNameTimestampFormat:
      type: string
      pattern: ^EPOCH|yyyy-MM-dd-HH-mm-ss|yyyyMMddHHmmss$
    ComponentTimestampDelimiter:
      type: string
      minLength: 0
      maxLength: 1
      pattern: ^(\-|\_|\s)?$
    InferenceOutputConfiguration:
      description: Specifies configuration information for the output results from for the inference, including KMS key ID and output S3 location.
      type: object
      properties:
        S3OutputConfiguration:
          $ref: "#/components/schemas/InferenceS3OutputConfiguration"
          description: Specifies configuration information for the output results from for the inference, output S3 location.
        KmsKeyId:
          $ref: "#/components/schemas/NameOrArn"
          description: The ID number for the KMS key key used to encrypt the inference output.
      required:
        - S3OutputConfiguration
    InferenceS3OutputConfiguration:
      description: Specifies configuration information for the output results from the inference, including output S3 location.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The bucket containing the output results from the inference
        Prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The prefix for the S3 bucket used for the output results from the inference.
      required:
        - Bucket
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    CreateInferenceSchedulerResponse:
      type: object
      properties:
        InferenceSchedulerArn:
          $ref: "#/components/schemas/InferenceSchedulerArn"
          description: The Amazon Resource Name (ARN) of the inference scheduler being created.
        InferenceSchedulerName:
          $ref: "#/components/schemas/InferenceSchedulerName"
          description: The name of inference scheduler being created.
        Status:
          $ref: "#/components/schemas/InferenceSchedulerStatus"
          description: Indicates the status of the CreateInferenceScheduler operation.
        ModelQuality:
          $ref: "#/components/schemas/ModelQuality"
          description: Provides a quality assessment for a model that uses labels. If Lookout for Equipment determines that the model quality is poor based on training metrics, the value is POOR_QUALITY_DETECTED. Otherwise, the value is QUALITY_THRESHOLD_MET. If the model is unlabeled, the model quality can't be assessed and the value of ModelQuality is CANNOT_DETERMINE_QUALITY. In this situation, you can get a model quality assessment by adding labels to the input dataset and retraining the model. For information about using labels with your models, see Understanding labeling. For information about improving the quality of a model, see Best practices with Amazon Lookout for Equipment.
    InferenceSchedulerArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:lookoutequipment:[a-zA-Z0-9\-]*:[0-9]{12}:inference-scheduler\/.+
    InferenceSchedulerStatus:
      type: string
      enum:
        - PENDING
        - RUNNING
        - STOPPING
        - STOPPED
    ModelQuality:
      type: string
      enum:
        - QUALITY_THRESHOLD_MET
        - CANNOT_DETERMINE_QUALITY
        - POOR_QUALITY_DETECTED
    LabelGroupName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z_-]{1,200}$
    Timestamp:
      type: string
      format: date-time
    LabelRating:
      type: string
      enum:
        - ANOMALY
        - NO_ANOMALY
        - NEUTRAL
    FaultCode:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[\\P{M}\\p{M}]{1,100}"
    Comments:
      type: string
      minLength: 1
      maxLength: 2560
      pattern: "[\\P{M}\\p{M}]{1,2560}"
    Equipment:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[\\P{M}\\p{M}]{1,200}"
    CreateLabelResponse:
      type: object
      properties:
        LabelId:
          $ref: "#/components/schemas/LabelId"
          description: The ID of the label that you have created.
    LabelId:
      type: string
      maxLength: 32
      pattern: "[A-Fa-f0-9]{0,32}"
    FaultCodes:
      type: array
      items:
        $ref: "#/components/schemas/FaultCode"
    CreateLabelGroupResponse:
      type: object
      properties:
        LabelGroupName:
          $ref: "#/components/schemas/LabelGroupName"
          description: The name of the label group that you have created. Data in this field will be retained for service usage. Follow best practices for the security of your data.
        LabelGroupArn:
          $ref: "#/components/schemas/LabelGroupArn"
          description: The Amazon Resource Name (ARN) of the label group that you have created.
    LabelGroupArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:lookoutequipment:[a-zA-Z0-9\-]*:[0-9]{12}:label-group\/.+
    DatasetIdentifier:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z_-]{1,200}$
    LabelsInputConfiguration:
      description: Contains the configuration information for the S3 location being used to hold label data.
      type: object
      properties:
        S3InputConfiguration:
          $ref: "#/components/schemas/LabelsS3InputConfiguration"
          description: Contains location information for the S3 location being used for label data.
        LabelGroupName:
          $ref: "#/components/schemas/LabelGroupName"
          description: The name of the label group to be used for label data.
    LabelsS3InputConfiguration:
      description: The location information (prefix and bucket name) for the s3 location being used for label data.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the S3 bucket holding the label data.
        Prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The prefix for the S3 bucket used for the label data.
      required:
        - Bucket
    DataPreProcessingConfiguration:
      description: The configuration is the TargetSamplingRate, which is the sampling rate of the data after post processing by Amazon Lookout for Equipment. For example, if you provide data that has been collected at a 1 second level and you want the system to resample the data at a 1 minute rate before training, the TargetSamplingRate is 1 minute. When providing a value for the TargetSamplingRate, you must attach the prefix "PT" to the rate you want. The value for a 1 second rate is therefore PT1S, the value for a 15 minute rate is PT15M, and the value for a 1 hour rate is PT1H
      type: object
      properties:
        TargetSamplingRate:
          $ref: "#/components/schemas/TargetSamplingRate"
          description: The sampling rate of the data after post processing by Amazon Lookout for Equipment. For example, if you provide data that has been collected at a 1 second level and you want the system to resample the data at a 1 minute rate before training, the TargetSamplingRate is 1 minute. When providing a value for the TargetSamplingRate, you must attach the prefix "PT" to the rate you want. The value for a 1 second rate is therefore PT1S, the value for a 15 minute rate is PT15M, and the value for a 1 hour rate is PT1H
    TargetSamplingRate:
      type: string
      enum:
        - PT1S
        - PT5S
        - PT10S
        - PT15S
        - PT30S
        - PT1M
        - PT5M
        - PT10M
        - PT15M
        - PT30M
        - PT1H
    OffCondition:
      type: string
      minLength: 1
      maxLength: 2048
    ModelDiagnosticsOutputConfiguration:
      description: Output configuration information for the pointwise model diagnostics for an Amazon Lookout for Equipment model.
      type: object
      properties:
        S3OutputConfiguration:
          $ref: "#/components/schemas/ModelDiagnosticsS3OutputConfiguration"
          description: The Amazon S3 location for the pointwise model diagnostics.
        KmsKeyId:
          $ref: "#/components/schemas/NameOrArn"
          description: The Amazon Web Services Key Management Service (KMS) key identifier to encrypt the pointwise model diagnostics files.
      required:
        - S3OutputConfiguration
    ModelDiagnosticsS3OutputConfiguration:
      description: The Amazon S3 location for the pointwise model diagnostics for an Amazon Lookout for Equipment model.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the Amazon S3 bucket where the pointwise model diagnostics are located. You must be the owner of the Amazon S3 bucket.
        Prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The Amazon S3 prefix for the location of the pointwise model diagnostics. The prefix specifies the folder and evaluation result file name. (bucket). When you call CreateModel or UpdateModel, specify the path within the bucket that you want Lookout for Equipment to save the model to. During training, Lookout for Equipment creates the model evaluation model as a compressed JSON file with the name model_diagnostics_results.json.gz. When you call DescribeModel or DescribeModelVersion, prefix contains the file path and filename of the model evaluation file.
      required:
        - Bucket
    CreateModelResponse:
      type: object
      properties:
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the model being created.
        Status:
          $ref: "#/components/schemas/ModelStatus"
          description: Indicates the status of the CreateModel operation.
    ModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:lookoutequipment:[a-zA-Z0-9\-]*:[0-9]{12}:model\/.+
    ModelStatus:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCESS
        - FAILED
        - IMPORT_IN_PROGRESS
    RetrainingFrequency:
      type: string
      minLength: 1
      maxLength: 10
      pattern: ^P(\dY)?(\d{1,2}M)?(\d{1,3}D)?$
    LookbackWindow:
      type: string
      pattern: ^P180D$|^P360D$|^P540D$|^P720D$
    ModelPromoteMode:
      type: string
      enum:
        - MANAGED
        - MANUAL
    CreateRetrainingSchedulerResponse:
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the model that you added the retraining scheduler to.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The ARN of the model that you added the retraining scheduler to.
        Status:
          $ref: "#/components/schemas/RetrainingSchedulerStatus"
          description: The status of the retraining scheduler.
    RetrainingSchedulerStatus:
      type: string
      enum:
        - PENDING
        - RUNNING
        - STOPPING
        - STOPPED
    InferenceSchedulerIdentifier:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z_-]{1,200}$
    ResourceArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:lookoutequipment:[a-zA-Z0-9\-]*:[0-9]{12}:.+
    IngestionJobId:
      type: string
      maxLength: 32
      pattern: "[A-Fa-f0-9]{0,32}"
    DescribeDataIngestionJobResponse:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/IngestionJobId"
          description: Indicates the job ID of the data ingestion job.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the dataset being used in the data ingestion job.
        IngestionInputConfiguration:
          $ref: "#/components/schemas/IngestionInputConfiguration"
          description: Specifies the S3 location configuration for the data input for the data ingestion job.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role with permission to access the data source being ingested.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the data ingestion job was created.
        Status:
          $ref: "#/components/schemas/IngestionJobStatus"
          description: Indicates the status of the DataIngestionJob operation.
        FailedReason:
          $ref: "#/components/schemas/BoundedLengthString"
          description: Specifies the reason for failure when a data ingestion job has failed.
        DataQualitySummary:
          $ref: "#/components/schemas/DataQualitySummary"
          description: Gives statistics about a completed ingestion job. These statistics primarily relate to quantifying incorrect data such as MissingCompleteSensorData, MissingSensorData, UnsupportedDateFormats, InsufficientSensorData, and DuplicateTimeStamps.
        IngestedFilesSummary:
          $ref: "#/components/schemas/IngestedFilesSummary"
        StatusDetail:
          $ref: "#/components/schemas/BoundedLengthString"
          description: Provides details about status of the ingestion job that is currently in progress.
        IngestedDataSize:
          $ref: "#/components/schemas/DataSizeInBytes"
          description: Indicates the size of the ingested dataset.
        DataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the earliest timestamp corresponding to data that was successfully ingested during this specific ingestion job.
        DataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the latest timestamp corresponding to data that was successfully ingested during this specific ingestion job.
        SourceDatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the source dataset from which the data used for the data ingestion job was imported from.
    IngestionInputConfiguration:
      description: Specifies configuration information for the input data for the data ingestion job, including input data S3 location.
      type: object
      properties:
        S3InputConfiguration:
          $ref: "#/components/schemas/IngestionS3InputConfiguration"
          description: The location information for the S3 bucket used for input data for the data ingestion.
      required:
        - S3InputConfiguration
    IngestionS3InputConfiguration:
      description: Specifies S3 configuration information for the input data for the data ingestion job.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the S3 bucket used for the input data for the data ingestion.
        Prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The prefix for the S3 location being used for the input data for the data ingestion.
        KeyPattern:
          $ref: "#/components/schemas/KeyPattern"
          description: "The pattern for matching the Amazon S3 files that will be used for ingestion. If the schema was created previously without any KeyPattern, then the default KeyPattern {prefix}/{component_name}/* is used to download files from Amazon S3 according to the schema. This field is required when ingestion is being done for the first time. Valid Values: {prefix}/{component_name}_* | {prefix}/{component_name}/* | {prefix}/{component_name}[DELIMITER]* (Allowed delimiters : space, dot, underscore, hyphen)"
      required:
        - Bucket
    KeyPattern:
      type: string
      minLength: 1
      maxLength: 2048
    IngestionJobStatus:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCESS
        - FAILED
        - IMPORT_IN_PROGRESS
    BoundedLengthString:
      type: string
      minLength: 1
      maxLength: 5000
      pattern: "[\\P{M}\\p{M}]{1,5000}"
    DataQualitySummary:
      description: DataQualitySummary gives aggregated statistics over all the sensors about a completed ingestion job. It primarily gives more information about statistics over different incorrect data like MissingCompleteSensorData, MissingSensorData, UnsupportedDateFormats, InsufficientSensorData, DuplicateTimeStamps.
      type: object
      properties:
        InsufficientSensorData:
          $ref: "#/components/schemas/InsufficientSensorData"
          description: Parameter that gives information about insufficient data for sensors in the dataset. This includes information about those sensors that have complete data missing and those with a short date range.
        MissingSensorData:
          $ref: "#/components/schemas/MissingSensorData"
          description: Parameter that gives information about data that is missing over all the sensors in the input data.
        InvalidSensorData:
          $ref: "#/components/schemas/InvalidSensorData"
          description: Parameter that gives information about data that is invalid over all the sensors in the input data.
        UnsupportedTimestamps:
          $ref: "#/components/schemas/UnsupportedTimestamps"
          description: Parameter that gives information about unsupported timestamps in the input data.
        DuplicateTimestamps:
          $ref: "#/components/schemas/DuplicateTimestamps"
          description: Parameter that gives information about duplicate timestamps in the input data.
      required:
        - InsufficientSensorData
        - MissingSensorData
        - InvalidSensorData
        - UnsupportedTimestamps
        - DuplicateTimestamps
    InsufficientSensorData:
      description: Entity that comprises aggregated information on sensors having insufficient data.
      type: object
      properties:
        MissingCompleteSensorData:
          $ref: "#/components/schemas/MissingCompleteSensorData"
          description: Parameter that describes the total number of sensors that have data completely missing for it.
        SensorsWithShortDateRange:
          $ref: "#/components/schemas/SensorsWithShortDateRange"
          description: Parameter that describes the total number of sensors that have a short date range of less than 14 days of data overall.
      required:
        - MissingCompleteSensorData
        - SensorsWithShortDateRange
    MissingCompleteSensorData:
      description: Entity that comprises information on sensors that have sensor data completely missing.
      type: object
      properties:
        AffectedSensorCount:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of sensors that have data missing completely.
      required:
        - AffectedSensorCount
    Integer:
      type: integer
    SensorsWithShortDateRange:
      description: Entity that comprises information on sensors that have shorter date range.
      type: object
      properties:
        AffectedSensorCount:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of sensors that have less than 14 days of data.
      required:
        - AffectedSensorCount
    MissingSensorData:
      description: Entity that comprises aggregated information on sensors having missing data.
      type: object
      properties:
        AffectedSensorCount:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of sensors that have atleast some data missing.
        TotalNumberOfMissingValues:
          $ref: "#/components/schemas/Integer"
          description: Indicates the total number of missing values across all the sensors.
      required:
        - AffectedSensorCount
        - TotalNumberOfMissingValues
    InvalidSensorData:
      description: Entity that comprises aggregated information on sensors having insufficient data.
      type: object
      properties:
        AffectedSensorCount:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of sensors that have at least some invalid values.
        TotalNumberOfInvalidValues:
          $ref: "#/components/schemas/Integer"
          description: Indicates the total number of invalid values across all the sensors.
      required:
        - AffectedSensorCount
        - TotalNumberOfInvalidValues
    UnsupportedTimestamps:
      description: Entity that comprises information abount unsupported timestamps in the dataset.
      type: object
      properties:
        TotalNumberOfUnsupportedTimestamps:
          $ref: "#/components/schemas/Integer"
          description: Indicates the total number of unsupported timestamps across the ingested data.
      required:
        - TotalNumberOfUnsupportedTimestamps
    DuplicateTimestamps:
      description: Entity that comprises information abount duplicate timestamps in the dataset.
      type: object
      properties:
        TotalNumberOfDuplicateTimestamps:
          $ref: "#/components/schemas/Integer"
          description: Indicates the total number of duplicate timestamps.
      required:
        - TotalNumberOfDuplicateTimestamps
    IngestedFilesSummary:
      description: Gives statistics about how many files have been ingested, and which files have not been ingested, for a particular ingestion job.
      type: object
      properties:
        TotalNumberOfFiles:
          $ref: "#/components/schemas/Integer"
          description: Indicates the total number of files that were submitted for ingestion.
        IngestedNumberOfFiles:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of files that were successfully ingested.
        DiscardedFiles:
          $ref: "#/components/schemas/ListOfDiscardedFiles"
          description: Indicates the number of files that were discarded. A file could be discarded because its format is invalid (for example, a jpg or pdf) or not readable.
      required:
        - TotalNumberOfFiles
        - IngestedNumberOfFiles
    ListOfDiscardedFiles:
      type: array
      items:
        $ref: "#/components/schemas/S3Object"
    S3Object:
      description: Contains information about an S3 bucket.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the specific S3 bucket.
        Key:
          $ref: "#/components/schemas/S3Key"
          description: The Amazon Web Services Key Management Service (KMS key) key being used to encrypt the S3 object. Without this key, data in the bucket is not accessible.
      required:
        - Bucket
        - Key
    S3Key:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\P{M}\\p{M}]{1,1024}[^/]$"
    DataSizeInBytes:
      type: integer
      format: int64
      minimum: 0
    DescribeDatasetResponse:
      type: object
      properties:
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset being described.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the dataset being described.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the time the dataset was created in Lookout for Equipment.
        LastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the time the dataset was last updated, if it was.
        Status:
          $ref: "#/components/schemas/DatasetStatus"
          description: Indicates the status of the dataset.
        Schema:
          $ref: "#/components/schemas/InlineDataSchema"
          description: A JSON description of the data that is in each time series dataset, including names, column names, and data types.
        ServerSideKmsKeyId:
          $ref: "#/components/schemas/KmsKeyArn"
          description: Provides the identifier of the KMS key used to encrypt dataset data by Amazon Lookout for Equipment.
        IngestionInputConfiguration:
          $ref: "#/components/schemas/IngestionInputConfiguration"
          description: Specifies the S3 location configuration for the data input for the data ingestion job.
        DataQualitySummary:
          $ref: "#/components/schemas/DataQualitySummary"
          description: Gives statistics associated with the given dataset for the latest successful associated ingestion job id. These statistics primarily relate to quantifying incorrect data such as MissingCompleteSensorData, MissingSensorData, UnsupportedDateFormats, InsufficientSensorData, and DuplicateTimeStamps.
        IngestedFilesSummary:
          $ref: "#/components/schemas/IngestedFilesSummary"
          description: IngestedFilesSummary associated with the given dataset for the latest successful associated ingestion job id.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that you are using for this the data ingestion job.
        DataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the earliest timestamp corresponding to data that was successfully ingested during the most recent ingestion of this particular dataset.
        DataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the latest timestamp corresponding to data that was successfully ingested during the most recent ingestion of this particular dataset.
        SourceDatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the source dataset from which the current data being described was imported from.
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:aws[a-z\-]*:kms:[a-z0-9\-]*:\d{12}:[\w\-\/]+
    DescribeInferenceSchedulerResponse:
      type: object
      properties:
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the machine learning model of the inference scheduler being described.
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the machine learning model of the inference scheduler being described.
        InferenceSchedulerName:
          $ref: "#/components/schemas/InferenceSchedulerName"
          description: The name of the inference scheduler being described.
        InferenceSchedulerArn:
          $ref: "#/components/schemas/InferenceSchedulerArn"
          description: The Amazon Resource Name (ARN) of the inference scheduler being described.
        Status:
          $ref: "#/components/schemas/InferenceSchedulerStatus"
          description: Indicates the status of the inference scheduler.
        DataDelayOffsetInMinutes:
          $ref: "#/components/schemas/DataDelayOffsetInMinutes"
          description: A period of time (in minutes) by which inference on the data is delayed after the data starts. For instance, if you select an offset delay time of five minutes, inference will not begin on the data until the first data measurement after the five minute mark. For example, if five minutes is selected, the inference scheduler will wake up at the configured frequency with the additional five minute delay time to check the customer S3 bucket. The customer can upload data at the same frequency and they don't need to stop and restart the scheduler when uploading new data.
        DataUploadFrequency:
          $ref: "#/components/schemas/DataUploadFrequency"
          description: Specifies how often data is uploaded to the source S3 bucket for the input data. This value is the length of time between data uploads. For instance, if you select 5 minutes, Amazon Lookout for Equipment will upload the real-time data to the source bucket once every 5 minutes. This frequency also determines how often Amazon Lookout for Equipment starts a scheduled inference on your data. In this example, it starts once every 5 minutes.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the time at which the inference scheduler was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Specifies the time at which the inference scheduler was last updated, if it was.
        DataInputConfiguration:
          $ref: "#/components/schemas/InferenceInputConfiguration"
          description: Specifies configuration information for the input data for the inference scheduler, including delimiter, format, and dataset location.
        DataOutputConfiguration:
          $ref: "#/components/schemas/InferenceOutputConfiguration"
          description: Specifies information for the output results for the inference scheduler, including the output S3 location.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of a role with permission to access the data source for the inference scheduler being described.
        ServerSideKmsKeyId:
          $ref: "#/components/schemas/KmsKeyArn"
          description: Provides the identifier of the KMS key used to encrypt inference scheduler data by Amazon Lookout for Equipment.
        LatestInferenceResult:
          $ref: "#/components/schemas/LatestInferenceResult"
          description: Indicates whether the latest execution for the inference scheduler was Anomalous (anomalous events found) or Normal (no anomalous events found).
    LatestInferenceResult:
      type: string
      enum:
        - ANOMALOUS
        - NORMAL
    DescribeLabelResponse:
      type: object
      properties:
        LabelGroupName:
          $ref: "#/components/schemas/LabelGroupName"
          description: The name of the requested label group.
        LabelGroupArn:
          $ref: "#/components/schemas/LabelGroupArn"
          description: The Amazon Resource Name (ARN) of the requested label group.
        LabelId:
          $ref: "#/components/schemas/LabelId"
          description: The ID of the requested label.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the requested label.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the requested label.
        Rating:
          $ref: "#/components/schemas/LabelRating"
          description: Indicates whether a labeled event represents an anomaly.
        FaultCode:
          $ref: "#/components/schemas/FaultCode"
          description: Indicates the type of anomaly associated with the label. Data in this field will be retained for service usage. Follow best practices for the security of your data.
        Notes:
          $ref: "#/components/schemas/Comments"
          description: Metadata providing additional information about the label. Data in this field will be retained for service usage. Follow best practices for the security of your data.
        Equipment:
          $ref: "#/components/schemas/Equipment"
          description: Indicates that a label pertains to a particular piece of equipment.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the label was created.
    DescribeLabelGroupResponse:
      type: object
      properties:
        LabelGroupName:
          $ref: "#/components/schemas/LabelGroupName"
          description: The name of the label group.
        LabelGroupArn:
          $ref: "#/components/schemas/LabelGroupArn"
          description: The Amazon Resource Name (ARN) of the label group.
        FaultCodes:
          $ref: "#/components/schemas/FaultCodes"
          description: Codes indicating the type of anomaly associated with the labels in the lagbel group.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the label group was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the label group was updated.
    DescribeModelResponse:
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the machine learning model being described.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the machine learning model being described.
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset being used by the machine learning being described.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resouce Name (ARN) of the dataset used to create the machine learning model being described.
        Schema:
          $ref: "#/components/schemas/InlineDataSchema"
          description: A JSON description of the data that is in each time series dataset, including names, column names, and data types.
        LabelsInputConfiguration:
          $ref: "#/components/schemas/LabelsInputConfiguration"
          description: Specifies configuration information about the labels input, including its S3 location.
        TrainingDataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time reference in the dataset that was used to begin the subset of training data for the machine learning model.
        TrainingDataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time reference in the dataset that was used to end the subset of training data for the machine learning model.
        EvaluationDataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time reference in the dataset that was used to begin the subset of evaluation data for the machine learning model.
        EvaluationDataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time reference in the dataset that was used to end the subset of evaluation data for the machine learning model.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of a role with permission to access the data source for the machine learning model being described.
        DataPreProcessingConfiguration:
          $ref: "#/components/schemas/DataPreProcessingConfiguration"
          description: The configuration is the TargetSamplingRate, which is the sampling rate of the data after post processing by Amazon Lookout for Equipment. For example, if you provide data that has been collected at a 1 second level and you want the system to resample the data at a 1 minute rate before training, the TargetSamplingRate is 1 minute. When providing a value for the TargetSamplingRate, you must attach the prefix "PT" to the rate you want. The value for a 1 second rate is therefore PT1S, the value for a 15 minute rate is PT15M, and the value for a 1 hour rate is PT1H
        Status:
          $ref: "#/components/schemas/ModelStatus"
          description: Specifies the current status of the model being described. Status describes the status of the most recent action of the model.
        TrainingExecutionStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time at which the training of the machine learning model began.
        TrainingExecutionEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time at which the training of the machine learning model was completed.
        FailedReason:
          $ref: "#/components/schemas/BoundedLengthString"
          description: If the training of the machine learning model failed, this indicates the reason for that failure.
        ModelMetrics:
          $ref: "#/components/schemas/ModelMetrics"
          description: The Model Metrics show an aggregated summary of the model's performance within the evaluation time range. This is the JSON content of the metrics created when evaluating the model.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the last time the machine learning model was updated. The type of update is not specified.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time and date at which the machine learning model was created.
        ServerSideKmsKeyId:
          $ref: "#/components/schemas/KmsKeyArn"
          description: Provides the identifier of the KMS key used to encrypt model data by Amazon Lookout for Equipment.
        OffCondition:
          $ref: "#/components/schemas/OffCondition"
          description: Indicates that the asset associated with this sensor has been shut off. As long as this condition is met, Lookout for Equipment will not use data from this asset for training, evaluation, or inference.
        SourceModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: The Amazon Resource Name (ARN) of the source model version. This field appears if the active model version was imported.
        ImportJobStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the import job was started. This field appears if the active model version was imported.
        ImportJobEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the import job was completed. This field appears if the active model version was imported.
        ActiveModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The name of the model version used by the inference schedular when running a scheduled inference execution.
        ActiveModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: The Amazon Resource Name (ARN) of the model version used by the inference scheduler when running a scheduled inference execution.
        ModelVersionActivatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date the active model version was activated.
        PreviousActiveModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The model version that was set as the active model version prior to the current active model version.
        PreviousActiveModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: The ARN of the model version that was set as the active model version prior to the current active model version.
        PreviousModelVersionActivatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the previous active model version was activated.
        PriorModelMetrics:
          $ref: "#/components/schemas/ModelMetrics"
          description: If the model version was retrained, this field shows a summary of the performance of the prior model on the new training range. You can use the information in this JSON-formatted object to compare the new model version and the prior model version.
        LatestScheduledRetrainingFailedReason:
          $ref: "#/components/schemas/BoundedLengthString"
          description: If the model version was generated by retraining and the training failed, this indicates the reason for that failure.
        LatestScheduledRetrainingStatus:
          $ref: "#/components/schemas/ModelVersionStatus"
          description: Indicates the status of the most recent scheduled retraining run.
        LatestScheduledRetrainingModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: Indicates the most recent model version that was generated by retraining.
        LatestScheduledRetrainingStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the start time of the most recent scheduled retraining run.
        LatestScheduledRetrainingAvailableDataInDays:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of days of data used in the most recent scheduled retraining run.
        NextScheduledRetrainingStartDate:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the date and time that the next scheduled retraining run will start on. Lookout for Equipment truncates the time you provide to the nearest UTC day.
        AccumulatedInferenceDataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the start time of the inference data that has been accumulated.
        AccumulatedInferenceDataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the end time of the inference data that has been accumulated.
        RetrainingSchedulerStatus:
          $ref: "#/components/schemas/RetrainingSchedulerStatus"
          description: Indicates the status of the retraining scheduler.
        ModelDiagnosticsOutputConfiguration:
          $ref: "#/components/schemas/ModelDiagnosticsOutputConfiguration"
          description: Configuration information for the model's pointwise model diagnostics.
        ModelQuality:
          $ref: "#/components/schemas/ModelQuality"
          description: Provides a quality assessment for a model that uses labels. If Lookout for Equipment determines that the model quality is poor based on training metrics, the value is POOR_QUALITY_DETECTED. Otherwise, the value is QUALITY_THRESHOLD_MET. If the model is unlabeled, the model quality can't be assessed and the value of ModelQuality is CANNOT_DETERMINE_QUALITY. In this situation, you can get a model quality assessment by adding labels to the input dataset and retraining the model. For information about using labels with your models, see Understanding labeling. For information about improving the quality of a model, see Best practices with Amazon Lookout for Equipment.
    ModelMetrics:
      type: string
      minLength: 1
      maxLength: 50000
    ModelVersionArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws(-[^:]+)?:lookoutequipment:[a-zA-Z0-9\-]*:[0-9]{12}:model\/[0-9a-zA-Z_-]{1,200}\/.+\/model-version\/[0-9]{1,}$
    ModelVersion:
      type: integer
      format: int64
      minimum: 1
    ModelVersionStatus:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCESS
        - FAILED
        - IMPORT_IN_PROGRESS
        - CANCELED
    DescribeModelVersionResponse:
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the machine learning model that this version belongs to.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the parent machine learning model that this version belong to.
        ModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The version of the machine learning model.
        ModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: The Amazon Resource Name (ARN) of the model version.
        Status:
          $ref: "#/components/schemas/ModelVersionStatus"
          description: The current status of the model version.
        SourceType:
          $ref: "#/components/schemas/ModelVersionSourceType"
          description: Indicates whether this model version was created by training or by importing.
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset used to train the model version.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the dataset used to train the model version.
        Schema:
          $ref: "#/components/schemas/InlineDataSchema"
          description: The schema of the data used to train the model version.
        LabelsInputConfiguration:
          $ref: "#/components/schemas/LabelsInputConfiguration"
        TrainingDataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date on which the training data began being gathered. If you imported the version, this is the date that the training data in the source version began being gathered.
        TrainingDataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date on which the training data finished being gathered. If you imported the version, this is the date that the training data in the source version finished being gathered.
        EvaluationDataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date on which the data in the evaluation set began being gathered. If you imported the version, this is the date that the evaluation set data in the source version began being gathered.
        EvaluationDataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date on which the data in the evaluation set began being gathered. If you imported the version, this is the date that the evaluation set data in the source version finished being gathered.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the role that was used to train the model version.
        DataPreProcessingConfiguration:
          $ref: "#/components/schemas/DataPreProcessingConfiguration"
        TrainingExecutionStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the training of the version began.
        TrainingExecutionEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the training of the version completed.
        FailedReason:
          $ref: "#/components/schemas/BoundedLengthString"
          description: The failure message if the training of the model version failed.
        ModelMetrics:
          $ref: "#/components/schemas/ModelMetrics"
          description: Shows an aggregated summary, in JSON format, of the model's performance within the evaluation time range. These metrics are created when evaluating the model.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the last time the machine learning model version was updated.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time and date at which the machine learning model version was created.
        ServerSideKmsKeyId:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The identifier of the KMS key key used to encrypt model version data by Amazon Lookout for Equipment.
        OffCondition:
          $ref: "#/components/schemas/OffCondition"
          description: Indicates that the asset associated with this sensor has been shut off. As long as this condition is met, Lookout for Equipment will not use data from this asset for training, evaluation, or inference.
        SourceModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: If model version was imported, then this field is the arn of the source model version.
        ImportJobStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the import job began. This field appears if the model version was imported.
        ImportJobEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the import job completed. This field appears if the model version was imported.
        ImportedDataSizeInBytes:
          $ref: "#/components/schemas/DataSizeInBytes"
          description: The size in bytes of the imported data. This field appears if the model version was imported.
        PriorModelMetrics:
          $ref: "#/components/schemas/ModelMetrics"
          description: If the model version was retrained, this field shows a summary of the performance of the prior model on the new training range. You can use the information in this JSON-formatted object to compare the new model version and the prior model version.
        RetrainingAvailableDataInDays:
          $ref: "#/components/schemas/Integer"
          description: Indicates the number of days of data used in the most recent scheduled retraining run.
        AutoPromotionResult:
          $ref: "#/components/schemas/AutoPromotionResult"
          description: Indicates whether the model version was promoted to be the active version after retraining or if there was an error with or cancellation of the retraining.
        AutoPromotionResultReason:
          $ref: "#/components/schemas/AutoPromotionResultReason"
          description: Indicates the reason for the AutoPromotionResult. For example, a model might not be promoted if its performance was worse than the active version, if there was an error during training, or if the retraining scheduler was using MANUAL promote mode. The model will be promoted in MANAGED promote mode if the performance is better than the previous model.
        ModelDiagnosticsOutputConfiguration:
          $ref: "#/components/schemas/ModelDiagnosticsOutputConfiguration"
          description: The Amazon S3 location where Amazon Lookout for Equipment saves the pointwise model diagnostics for the model version.
        ModelDiagnosticsResultsObject:
          $ref: "#/components/schemas/S3Object"
          description: The Amazon S3 output prefix for where Lookout for Equipment saves the pointwise model diagnostics for the model version.
        ModelQuality:
          $ref: "#/components/schemas/ModelQuality"
          description: Provides a quality assessment for a model that uses labels. If Lookout for Equipment determines that the model quality is poor based on training metrics, the value is POOR_QUALITY_DETECTED. Otherwise, the value is QUALITY_THRESHOLD_MET. If the model is unlabeled, the model quality can't be assessed and the value of ModelQuality is CANNOT_DETERMINE_QUALITY. In this situation, you can get a model quality assessment by adding labels to the input dataset and retraining the model. For information about using labels with your models, see Understanding labeling. For information about improving the quality of a model, see Best practices with Amazon Lookout for Equipment.
    ModelVersionSourceType:
      type: string
      enum:
        - TRAINING
        - RETRAINING
        - IMPORT
    AutoPromotionResult:
      type: string
      enum:
        - MODEL_PROMOTED
        - MODEL_NOT_PROMOTED
        - RETRAINING_INTERNAL_ERROR
        - RETRAINING_CUSTOMER_ERROR
        - RETRAINING_CANCELLED
    AutoPromotionResultReason:
      type: string
      minLength: 1
      maxLength: 256
    DescribeResourcePolicyResponse:
      type: object
      properties:
        PolicyRevisionId:
          $ref: "#/components/schemas/PolicyRevisionId"
          description: A unique identifier for a revision of the resource policy.
        ResourcePolicy:
          $ref: "#/components/schemas/Policy"
          description: The resource policy in a JSON-formatted string.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the resource policy was created.
        LastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the resource policy was last modified.
    PolicyRevisionId:
      type: string
      maxLength: 50
      pattern: "[0-9A-Fa-f]+"
    Policy:
      type: string
      minLength: 1
      maxLength: 20000
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    DescribeRetrainingSchedulerResponse:
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the model that the retraining scheduler is attached to.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The ARN of the model that the retraining scheduler is attached to.
        RetrainingStartDate:
          $ref: "#/components/schemas/Timestamp"
          description: The start date for the retraining scheduler. Lookout for Equipment truncates the time you provide to the nearest UTC day.
        RetrainingFrequency:
          $ref: "#/components/schemas/RetrainingFrequency"
          description: The frequency at which the model retraining is set. This follows the ISO 8601 guidelines.
        LookbackWindow:
          $ref: "#/components/schemas/LookbackWindow"
          description: The number of past days of data used for retraining.
        Status:
          $ref: "#/components/schemas/RetrainingSchedulerStatus"
          description: The status of the retraining scheduler.
        PromoteMode:
          $ref: "#/components/schemas/ModelPromoteMode"
          description: Indicates how the service uses new models. In MANAGED mode, new models are used for inference if they have better performance than the current model. In MANUAL mode, the new models are not used until they are manually activated.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time and date at which the retraining scheduler was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time and date at which the retraining scheduler was updated.
    ImportDatasetResponse:
      type: object
      properties:
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the created machine learning dataset.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the dataset that was imported.
        Status:
          $ref: "#/components/schemas/DatasetStatus"
          description: The status of the ImportDataset operation.
        JobId:
          $ref: "#/components/schemas/IngestionJobId"
          description: A unique identifier for the job of importing the dataset.
    InferenceDataImportStrategy:
      type: string
      enum:
        - NO_IMPORT
        - ADD_WHEN_EMPTY
        - OVERWRITE
    ImportModelVersionResponse:
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name for the machine learning model.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the model being created.
        ModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: The Amazon Resource Name (ARN) of the model version being created.
        ModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The version of the model being created.
        Status:
          $ref: "#/components/schemas/ModelVersionStatus"
          description: The status of the ImportModelVersion operation.
    NextToken:
      type: string
      maxLength: 8192
      pattern: \p{ASCII}{0,8192}
    MaxResults:
      type: integer
      minimum: 1
      maximum: 500
    ListDataIngestionJobsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token indicating where to continue the listing of data ingestion jobs.
        DataIngestionJobSummaries:
          $ref: "#/components/schemas/DataIngestionJobSummaries"
          description: Specifies information about the specific data ingestion job, including dataset name and status.
    DataIngestionJobSummaries:
      type: array
      items:
        $ref: "#/components/schemas/DataIngestionJobSummary"
    DataIngestionJobSummary:
      description: Provides information about a specified data ingestion job, including dataset information, data ingestion configuration, and status.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/IngestionJobId"
          description: Indicates the job ID of the data ingestion job.
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset used for the data ingestion job.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the dataset used in the data ingestion job.
        IngestionInputConfiguration:
          $ref: "#/components/schemas/IngestionInputConfiguration"
          description: Specifies information for the input data for the data inference job, including data Amazon S3 location parameters.
        Status:
          $ref: "#/components/schemas/IngestionJobStatus"
          description: Indicates the status of the data ingestion job.
    ListDatasetsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token indicating where to continue the listing of datasets.
        DatasetSummaries:
          $ref: "#/components/schemas/DatasetSummaries"
          description: Provides information about the specified dataset, including creation time, dataset ARN, and status.
    DatasetSummaries:
      type: array
      items:
        $ref: "#/components/schemas/DatasetSummary"
    DatasetSummary:
      description: Contains information about the specific data set, including name, ARN, and status.
      type: object
      properties:
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset.
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The Amazon Resource Name (ARN) of the specified dataset.
        Status:
          $ref: "#/components/schemas/DatasetStatus"
          description: Indicates the status of the dataset.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the dataset was created in Amazon Lookout for Equipment.
    ListInferenceEventsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token indicating where to continue the listing of inference executions.
        InferenceEventSummaries:
          $ref: "#/components/schemas/InferenceEventSummaries"
          description: Provides an array of information about the individual inference events returned from the ListInferenceEvents operation, including scheduler used, event start time, event end time, diagnostics, and so on.
    InferenceEventSummaries:
      type: array
      items:
        $ref: "#/components/schemas/InferenceEventSummary"
    InferenceEventSummary:
      description: Contains information about the specific inference event, including start and end time, diagnostics information, event duration and so on.
      type: object
      properties:
        InferenceSchedulerArn:
          $ref: "#/components/schemas/InferenceSchedulerArn"
          description: The Amazon Resource Name (ARN) of the inference scheduler being used for the inference event.
        InferenceSchedulerName:
          $ref: "#/components/schemas/InferenceSchedulerName"
          description: The name of the inference scheduler being used for the inference events.
        EventStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the starting time of an inference event.
        EventEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the ending time of an inference event.
        Diagnostics:
          $ref: "#/components/schemas/ModelMetrics"
          description: An array which specifies the names and values of all sensors contributing to an inference event.
        EventDurationInSeconds:
          $ref: "#/components/schemas/EventDurationInSeconds"
          description: Indicates the size of an inference event in seconds.
    EventDurationInSeconds:
      type: integer
      format: int64
      minimum: 0
    InferenceExecutionStatus:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCESS
        - FAILED
    ListInferenceExecutionsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token indicating where to continue the listing of inference executions.
        InferenceExecutionSummaries:
          $ref: "#/components/schemas/InferenceExecutionSummaries"
          description: Provides an array of information about the individual inference executions returned from the ListInferenceExecutions operation, including model used, inference scheduler, data configuration, and so on. If you don't supply the InferenceSchedulerName request parameter, or if you supply the name of an inference scheduler that doesn't exist, ListInferenceExecutions returns an empty array in InferenceExecutionSummaries.
    InferenceExecutionSummaries:
      type: array
      items:
        $ref: "#/components/schemas/InferenceExecutionSummary"
    InferenceExecutionSummary:
      description: Contains information about the specific inference execution, including input and output data configuration, inference scheduling information, status, and so on.
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the machine learning model being used for the inference execution.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the machine learning model used for the inference execution.
        InferenceSchedulerName:
          $ref: "#/components/schemas/InferenceSchedulerName"
          description: The name of the inference scheduler being used for the inference execution.
        InferenceSchedulerArn:
          $ref: "#/components/schemas/InferenceSchedulerArn"
          description: The Amazon Resource Name (ARN) of the inference scheduler being used for the inference execution.
        ScheduledStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the start time at which the inference scheduler began the specific inference execution.
        DataStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time reference in the dataset at which the inference execution began.
        DataEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time reference in the dataset at which the inference execution stopped.
        DataInputConfiguration:
          $ref: "#/components/schemas/InferenceInputConfiguration"
          description: Specifies configuration information for the input data for the inference scheduler, including delimiter, format, and dataset location.
        DataOutputConfiguration:
          $ref: "#/components/schemas/InferenceOutputConfiguration"
          description: Specifies configuration information for the output results from for the inference execution, including the output Amazon S3 location.
        CustomerResultObject:
          $ref: "#/components/schemas/S3Object"
          description: The S3 object that the inference execution results were uploaded to.
        Status:
          $ref: "#/components/schemas/InferenceExecutionStatus"
          description: Indicates the status of the inference execution.
        FailedReason:
          $ref: "#/components/schemas/BoundedLengthString"
          description: Specifies the reason for failure when an inference execution has failed.
        ModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The model version used for the inference execution.
        ModelVersionArn:
          $ref: "#/components/schemas/ModelVersionArn"
          description: The Amazon Resource Number (ARN) of the model version used for the inference execution.
    ListInferenceSchedulersResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token indicating where to continue the listing of inference schedulers.
        InferenceSchedulerSummaries:
          $ref: "#/components/schemas/InferenceSchedulerSummaries"
          description: Provides information about the specified inference scheduler, including data upload frequency, model name and ARN, and status.
    InferenceSchedulerSummaries:
      type: array
      items:
        $ref: "#/components/schemas/InferenceSchedulerSummary"
    InferenceSchedulerSummary:
      description: Contains information about the specific inference scheduler, including data delay offset, model name and ARN, status, and so on.
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the machine learning model used for the inference scheduler.
        ModelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the machine learning model used by the inference scheduler.
        InferenceSchedulerName:
          $ref: "#/components/schemas/InferenceSchedulerName"
          description: The name of the inference scheduler.
        InferenceSchedulerArn:
          $ref: "#/components/schemas/InferenceSchedulerArn"
          description: The Amazon Resource Name (ARN) of the inference scheduler.
        Status:
          $ref: "#/components/schemas/InferenceSchedulerStatus"
          description: Indicates the status of the inference scheduler.
        DataDelayOffsetInMinutes:
          $ref: "#/components/schemas/DataDelayOffsetInMinutes"
          description: A period of time (in minutes) by which inference on the data is delayed after the data starts. For instance, if an offset delay time of five minutes was selected, inference will not begin on the data until the first data measurement after the five minute mark. For example, if five minutes is selected, the inference scheduler will wake up at the configured frequency with the additional five minute delay time to check the customer S3 bucket. The customer can upload data at the same frequency and they don't need to stop and restart the scheduler when uploading new data.
        DataUploadFrequency:
          $ref: "#/components/schemas/DataUploadFrequency"
          description: How often data is uploaded to the source S3 bucket for the input data. This value is the length of time between data uploads. For instance, if you select 5 minutes, Amazon Lookout for Equipment will upload the real-time data to the source bucket once every 5 minutes. This frequency also determines how often Amazon Lookout for Equipment starts a scheduled inference on your data. In this example, it starts once every 5 minutes.
        LatestInferenceResult:
          $ref: "#/components/schemas/LatestInferenceResult"
          description: Indicates whether the latest execution for the inference scheduler was Anomalous (anomalous events found) or Normal (no anomalous events found).
    ListLabelGroupsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque pagination token indicating where to continue the listing of label groups.
        LabelGroupSummaries:
          $ref: "#/components/schemas/LabelGroupSummaries"
          description: A summary of the label groups.
    LabelGroupSummaries:
      type: array
      items:
        $ref: "#/components/schemas/LabelGroupSummary"
    LabelGroupSummary:
      description: Contains information about the label group.
