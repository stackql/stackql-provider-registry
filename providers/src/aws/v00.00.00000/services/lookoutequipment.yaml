  /TagResource:
    post:
      operationId: TagResource
      description: Associates a given tag to a resource in your account. A tag is a key-value pair which can be added to an Amazon Lookout for Equipment resource as metadata. Tags can be used for organizing your resources as well as helping you to search and filter by tag. Multiple tags can be added to a resource, either when you create it, or later. Up to 50 tags can be associated with each resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLookoutEquipmentFrontendService.TagResource
            default: AWSLookoutEquipmentFrontendService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceArn"
                  description: The Amazon Resource Name (ARN) of the specific resource to which the tag should be associated.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tag or tags to be associated with a specific resource. Both the tag key and value are specified.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
