                  $ref: "#/components/schemas/OptOutListNameOrArn"
                  description: The OptOutList to add the phone number to. You can use either the opt out list name or the opt out list ARN.
                InternationalSendingEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: By default this is set to false. When set to true the international sending of phone number is Enabled.
                DeletionProtectionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: By default this is set to false. When set to true the phone number can't be deleted.
              required:
