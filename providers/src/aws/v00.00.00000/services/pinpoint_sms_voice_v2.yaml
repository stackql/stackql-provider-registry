        - TEXT_INVALID
        - TEXT_INVALID_MESSAGE
        - TEXT_UNREACHABLE
        - TEXT_CARRIER_UNREACHABLE
        - TEXT_BLOCKED
        - TEXT_CARRIER_BLOCKED
        - TEXT_SPAM
        - TEXT_UNKNOWN
