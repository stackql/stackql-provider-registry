                  $ref: "#/components/schemas/TwoWayChannelArn"
                  description: The Amazon Resource Name (ARN) of the two way channel.
                TwoWayChannelRole:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: An optional IAM Role Arn for a service to assume, to be able to post inbound SMS messages.
                SelfManagedOptOutsEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: By default this is set to false. When set to false and an end recipient sends a message that begins with HELP or STOP to one of your dedicated numbers, End User Messaging SMS automatically replies with a customizable message and adds the end recipient to the OptOutList. When set to true you're responsible for responding to HELP and STOP requests. You're also responsible for tracking and honoring opt-out requests.
