openapi: 3.0.0
info:
  version: "2022-03-31"
  title: Amazon Pinpoint SMS Voice V2
  description: Amazon Pinpoint SMS Voice V2
  x-serviceName: sms-voice
  x-serviceAlias: pinpoint_sms_voice_v2
  x-protocol: json
  x-apiVersion: "2022-03-31"
  x-endpointPrefix: sms-voice
  x-targetPrefix: PinpointSMSVoiceV2
  x-jsonVersion: "1.0"
servers:
  - url: https://sms-voice.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pinpoint-sms-voice-v2
paths:
  /AssociateOriginationIdentity:
    post:
      operationId: AssociateOriginationIdentity
      description: Associates the specified origination identity with a pool. If the origination identity is a phone number and is already associated with another pool, an error is returned. A sender ID can be associated with multiple pools. If the origination identity configuration doesn't match the pool's configuration, an error is returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.AssociateOriginationIdentity
            default: PinpointSMSVoiceV2.AssociateOriginationIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                PoolId:
                  $ref: "#/components/schemas/PoolIdOrArn"
                  description: The pool to update with the new Identity. This value can be either the PoolId or PoolArn, and you can find these values using DescribePools. If you are using a shared End User Messaging SMS; resource then you must use the full Amazon Resource Name(ARN).
                OriginationIdentity:
                  $ref: "#/components/schemas/PhoneOrSenderIdOrArn"
                  description: The origination identity to use, such as PhoneNumberId, PhoneNumberArn, SenderId, or SenderIdArn. You can use DescribePhoneNumbers to find the values for PhoneNumberId and PhoneNumberArn, while DescribeSenderIds can be used to get the values for SenderId and SenderIdArn. If you are using a shared End User Messaging SMS resource then you must use the full Amazon Resource Name(ARN).
                IsoCountryCode:
                  $ref: "#/components/schemas/IsoCountryCode"
                  description: The new two-character code, in ISO 3166-1 alpha-2 format, for the country or region of the origination identity. This field is optional and is not required for origination identity types that are not country-specific, such as RCS agents.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - PoolId
                - OriginationIdentity
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateOriginationIdentityResult"
  /AssociateProtectConfiguration:
    post:
      operationId: AssociateProtectConfiguration
      description: Associate a protect configuration with a configuration set. This replaces the configuration sets current protect configuration. A configuration set can only be associated with one protect configuration at a time. A protect configuration can be associated with multiple configuration sets.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.AssociateProtectConfiguration
            default: PinpointSMSVoiceV2.AssociateProtectConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProtectConfigurationId:
                  $ref: "#/components/schemas/ProtectConfigurationIdOrArn"
                  description: The unique identifier for the protect configuration.
                ConfigurationSetName:
                  $ref: "#/components/schemas/ConfigurationSetNameOrArn"
                  description: The name of the ConfigurationSet.
              required:
                - ProtectConfigurationId
                - ConfigurationSetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateProtectConfigurationResult"
  /CarrierLookup:
    post:
      operationId: CarrierLookup
      description: Returns information about a destination phone number, including whether the number type and whether it is valid, the carrier, and more.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CarrierLookup
            default: PinpointSMSVoiceV2.CarrierLookup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                PhoneNumber:
                  $ref: "#/components/schemas/CarrierLookupInputPhoneNumberType"
                  description: The phone number that you want to retrieve information about. You can provide the phone number in various formats including special characters such as parentheses, brackets, spaces, hyphens, periods, and commas. The service automatically converts the input to E164 format for processing.
              required:
                - PhoneNumber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierLookupResult"
  /CreateConfigurationSet:
    post:
      operationId: CreateConfigurationSet
      description: Creates a new configuration set. After you create the configuration set, you can add one or more event destinations to it. A configuration set is a set of rules that you apply to the SMS and voice messages that you send. When you send a message, you can optionally specify a single configuration set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateConfigurationSet
            default: PinpointSMSVoiceV2.CreateConfigurationSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConfigurationSetName:
                  $ref: "#/components/schemas/ConfigurationSetName"
                  description: The name to use for the new configuration set.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key and value pair tags that's associated with the new configuration set.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - ConfigurationSetName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationSetResult"
  /CreateEventDestination:
    post:
      operationId: CreateEventDestination
      description: Creates a new event destination in a configuration set. An event destination is a location where you send message events. The event options are Amazon CloudWatch, Amazon Data Firehose, or Amazon SNS. For example, when a message is delivered successfully, you can send information about that event to an event destination, or send notifications to endpoints that are subscribed to an Amazon SNS topic. You can only create one event destination at a time. You must provide a value for a single event destination using either CloudWatchLogsDestination, KinesisFirehoseDestination or SnsDestination. If an event destination isn't provided then an exception is returned. Each configuration set can contain between 0 and 5 event destinations. Each event destination can contain a reference to a single destination, such as a CloudWatch or Firehose destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateEventDestination
            default: PinpointSMSVoiceV2.CreateEventDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConfigurationSetName:
                  $ref: "#/components/schemas/ConfigurationSetNameOrArn"
                  description: Either the name of the configuration set or the configuration set ARN to apply event logging to. The ConfigurateSetName and ConfigurationSetArn can be found using the DescribeConfigurationSets action.
                EventDestinationName:
                  $ref: "#/components/schemas/EventDestinationName"
                  description: The name that identifies the event destination.
                MatchingEventTypes:
                  $ref: "#/components/schemas/EventTypeList"
                  description: An array of event types that determine which events to log. If "ALL" is used, then End User Messaging SMS logs every event type. The TEXT_SENT event type is not supported.
                CloudWatchLogsDestination:
                  $ref: "#/components/schemas/CloudWatchLogsDestination"
                  description: An object that contains information about an event destination for logging to Amazon CloudWatch Logs.
                KinesisFirehoseDestination:
                  $ref: "#/components/schemas/KinesisFirehoseDestination"
                  description: An object that contains information about an event destination for logging to Amazon Data Firehose.
                SnsDestination:
                  $ref: "#/components/schemas/SnsDestination"
                  description: An object that contains information about an event destination for logging to Amazon SNS.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - ConfigurationSetName
                - EventDestinationName
                - MatchingEventTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventDestinationResult"
  /CreateNotifyConfiguration:
    post:
      operationId: CreateNotifyConfiguration
      description: Creates a new notify configuration for managed messaging. A notify configuration defines the settings for sending templated messages, including the display name, use case, enabled channels, and enabled countries.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateNotifyConfiguration
            default: PinpointSMSVoiceV2.CreateNotifyConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DisplayName:
                  $ref: "#/components/schemas/NotifyConfigurationDisplayName"
                  description: The display name to associate with the notify configuration.
                UseCase:
                  $ref: "#/components/schemas/NotifyConfigurationUseCase"
                  description: The use case for the notify configuration.
                DefaultTemplateId:
                  $ref: "#/components/schemas/NotifyTemplateId"
                  description: The default template identifier to associate with the notify configuration. If specified, this template is used when sending messages without an explicit template identifier.
                PoolId:
                  $ref: "#/components/schemas/PoolIdOrArn"
                  description: The identifier of the pool to associate with the notify configuration.
                EnabledCountries:
                  $ref: "#/components/schemas/IsoCountryCodeList"
                  description: An array of two-character ISO country codes, in ISO 3166-1 alpha-2 format, that are enabled for the notify configuration.
                EnabledChannels:
                  $ref: "#/components/schemas/NotifyEnabledChannelsList"
                  description: An array of channels to enable for the notify configuration. Supported values include SMS and VOICE.
                DeletionProtectionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: By default this is set to false. When set to true the notify configuration can't be deleted. You can change this value using the UpdateNotifyConfiguration action.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) associated with the notify configuration.
              required:
                - DisplayName
                - UseCase
                - EnabledChannels
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotifyConfigurationResult"
  /CreateOptOutList:
    post:
      operationId: CreateOptOutList
      description: Creates a new opt-out list. If the opt-out list name already exists, an error is returned. An opt-out list is a list of phone numbers that are opted out, meaning you can't send SMS or voice messages to them. If end user replies with the keyword "STOP," an entry for the phone number is added to the opt-out list. In addition to STOP, your recipients can use any supported opt-out keyword, such as CANCEL or OPTOUT. For a list of supported opt-out keywords, see SMS opt out in the End User Messaging SMS User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateOptOutList
            default: PinpointSMSVoiceV2.CreateOptOutList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                OptOutListName:
                  $ref: "#/components/schemas/OptOutListName"
                  description: The name of the new OptOutList.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) to associate with the new OptOutList.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - OptOutListName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOptOutListResult"
  /CreatePool:
    post:
      operationId: CreatePool
      description: Creates a new pool and associates the specified origination identity to the pool. A pool can include one or more phone numbers and SenderIds that are associated with your Amazon Web Services account. The new pool inherits its configuration from the specified origination identity. This includes keywords, message type, opt-out list, two-way configuration, and self-managed opt-out configuration. Deletion protection isn't inherited from the origination identity and defaults to false. If the origination identity is a phone number and is already associated with another pool, an error is returned. A sender ID can be associated with multiple pools.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreatePool
            default: PinpointSMSVoiceV2.CreatePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                OriginationIdentity:
                  $ref: "#/components/schemas/PhoneOrSenderIdOrArn"
                  description: The origination identity to use such as a PhoneNumberId, PhoneNumberArn, SenderId or SenderIdArn. You can use DescribePhoneNumbers to find the values for PhoneNumberId and PhoneNumberArn, and use DescribeSenderIds can be used to get the values for SenderId and SenderIdArn. After the pool is created you can add more origination identities to the pool by using AssociateOriginationIdentity. If you are using a shared End User Messaging SMS resource then you must use the full Amazon Resource Name(ARN).
                IsoCountryCode:
                  $ref: "#/components/schemas/IsoCountryCode"
                  description: The new two-character code, in ISO 3166-1 alpha-2 format, for the country or region of the new pool. This field is optional and is not required for origination identity types that are not country-specific, such as RCS agents.
                MessageType:
                  $ref: "#/components/schemas/MessageType"
                  description: The type of message. Valid values are TRANSACTIONAL for messages that are critical or time-sensitive and PROMOTIONAL for messages that aren't critical or time-sensitive. After the pool is created the MessageType can't be changed.
                DeletionProtectionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: By default this is set to false. When set to true the pool can't be deleted. You can change this value using the UpdatePool action.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) associated with the pool.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - OriginationIdentity
                - MessageType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePoolResult"
  /CreateProtectConfiguration:
    post:
      operationId: CreateProtectConfiguration
      description: Create a new protect configuration. By default all country rule sets for each capability are set to ALLOW. Update the country rule sets using UpdateProtectConfigurationCountryRuleSet. A protect configurations name is stored as a Tag with the key set to Name and value as the name of the protect configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateProtectConfiguration
            default: PinpointSMSVoiceV2.CreateProtectConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
                DeletionProtectionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: When set to true deletion protection is enabled. By default this is set to false.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key and value pair tags that are associated with the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProtectConfigurationResult"
  /CreateRcsAgent:
    post:
      operationId: CreateRcsAgent
      description: Creates a new RCS agent for sending rich messages through the RCS channel. The RCS agent serves as an origination identity for sending RCS messages to your recipients.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateRcsAgent
            default: PinpointSMSVoiceV2.CreateRcsAgent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DeletionProtectionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: By default this is set to false. When set to true the RCS agent can't be deleted. You can change this value using the UpdateRcsAgent action.
                OptOutListName:
                  $ref: "#/components/schemas/OptOutListNameOrArn"
                  description: The OptOutList to associate with the RCS agent. Valid values are either OptOutListName or OptOutListArn.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) associated with the RCS agent.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRcsAgentResult"
  /CreateRegistration:
    post:
      operationId: CreateRegistration
      description: Creates a new registration based on the RegistrationType field.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateRegistration
            default: PinpointSMSVoiceV2.CreateRegistration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RegistrationType:
                  $ref: "#/components/schemas/RegistrationType"
                  description: The type of registration form to create. The list of RegistrationTypes can be found using the DescribeRegistrationTypeDefinitions action.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) to associate with the registration.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - RegistrationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRegistrationResult"
  /CreateRegistrationAssociation:
    post:
      operationId: CreateRegistrationAssociation
      description: Associate the registration with an origination identity such as a phone number or sender ID.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateRegistrationAssociation
            default: PinpointSMSVoiceV2.CreateRegistrationAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RegistrationId:
                  $ref: "#/components/schemas/RegistrationIdOrArn"
                  description: The unique identifier for the registration.
                ResourceId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier for the origination identity. For example this could be a PhoneNumberId or SenderId.
              required:
                - RegistrationId
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRegistrationAssociationResult"
  /CreateRegistrationAttachment:
    post:
      operationId: CreateRegistrationAttachment
      description: Create a new registration attachment to use for uploading a file or a URL to a file. The maximum file size is 500KB and valid file extensions are PDF, JPEG and PNG. For example, many sender ID registrations require a signed “letter of authorization” (LOA) to be submitted. Use either AttachmentUrl or AttachmentBody to upload your attachment. If both are specified then an exception is returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateRegistrationAttachment
            default: PinpointSMSVoiceV2.CreateRegistrationAttachment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AttachmentBody:
                  $ref: "#/components/schemas/AttachmentBody"
                  description: The registration file to upload. The maximum file size is 500KB and valid file extensions are PDF, JPEG and PNG.
                AttachmentUrl:
                  $ref: "#/components/schemas/AttachmentUrl"
                  description: Registration files have to be stored in an Amazon S3 bucket. The URI to use when sending is in the format s3://BucketName/FileName.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) to associate with the registration attachment.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRegistrationAttachmentResult"
  /CreateRegistrationVersion:
    post:
      operationId: CreateRegistrationVersion
      description: Create a new version of the registration and increase the VersionNumber. The previous version of the registration becomes read-only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateRegistrationVersion
            default: PinpointSMSVoiceV2.CreateRegistrationVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RegistrationId:
                  $ref: "#/components/schemas/RegistrationIdOrArn"
                  description: The unique identifier for the registration.
              required:
                - RegistrationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRegistrationVersionResult"
  /CreateVerifiedDestinationNumber:
    post:
      operationId: CreateVerifiedDestinationNumber
      description: You can only send messages to verified destination numbers when your account is in the sandbox. You can add up to 10 verified destination numbers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.CreateVerifiedDestinationNumber
            default: PinpointSMSVoiceV2.CreateVerifiedDestinationNumber
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                DestinationPhoneNumber:
                  $ref: "#/components/schemas/PhoneNumber"
                  description: The verified destination phone number, in E.164 format.
                RcsAgentId:
                  $ref: "#/components/schemas/RcsAgentIdOrArn"
                  description: The unique identifier of the RCS agent to associate with the verified destination number. You can use either the RcsAgentId or RcsAgentArn.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tags (key and value pairs) to associate with the destination number.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, a randomly generated token is used for the request to ensure idempotency.
              required:
                - DestinationPhoneNumber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVerifiedDestinationNumberResult"
  /DeleteAccountDefaultProtectConfiguration:
    post:
      operationId: DeleteAccountDefaultProtectConfiguration
      description: Removes the current account default protect configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.DeleteAccountDefaultProtectConfiguration
            default: PinpointSMSVoiceV2.DeleteAccountDefaultProtectConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountDefaultProtectConfigurationResult"
  /DeleteConfigurationSet:
    post:
      operationId: DeleteConfigurationSet
      description: Deletes an existing configuration set. A configuration set is a set of rules that you apply to voice and SMS messages that you send. In a configuration set, you can specify a destination for specific types of events related to voice and SMS messages.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
