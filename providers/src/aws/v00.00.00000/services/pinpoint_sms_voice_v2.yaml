      maxLength: 3
      pattern: "[\\d]+"
    MCCType:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "[\\d]+"
    MNCType:
      type: string
      minLength: 2
      maxLength: 3
      pattern: "[\\d]+"
    PhoneNumberType:
      type: string
      enum:
        - MOBILE
        - LANDLINE
        - OTHER
        - INVALID
    TagList:
