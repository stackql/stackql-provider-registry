        - MEDIA_SUCCESSFUL
        - MEDIA_DELIVERED
        - MEDIA_INVALID
        - MEDIA_INVALID_MESSAGE
        - MEDIA_UNREACHABLE
        - MEDIA_CARRIER_UNREACHABLE
        - MEDIA_BLOCKED
