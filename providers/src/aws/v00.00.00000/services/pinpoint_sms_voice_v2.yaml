    ProtectConfigurationId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9_-]+"
    CarrierLookupInputPhoneNumberType:
      type: string
      minLength: 1
      maxLength: 40
      pattern: \+[({\s\[]?[1-9][0-9(){}\s\[\],.-]{1,38}
    CarrierLookupResult:
      type: object
      properties:
        E164PhoneNumber:
          $ref: "#/components/schemas/E164PhoneNumberType"
          description: The phone number in E164 format, sanitized from the original input by removing any formatting characters.
        DialingCountryCode:
          $ref: "#/components/schemas/DialingCountryCodeType"
          description: The country or region numeric dialing code for the phone number.
        IsoCountryCode:
          $ref: "#/components/schemas/IsoCountryCode"
          description: The two-character country or region code, in ISO 3166-1 alpha-2 format, for the phone number.
        Country:
          $ref: "#/components/schemas/String"
          description: The name of the country or region for the phone number.
        MCC:
          $ref: "#/components/schemas/MCCType"
          description: The phone number's mobile country code, for mobile phone number types
        MNC:
          $ref: "#/components/schemas/MNCType"
          description: The phone number's mobile network code, for mobile phone number types.
        Carrier:
          $ref: "#/components/schemas/String"
          description: The carrier or service provider that the phone number is currently registered with. In some countries and regions, this value may be the carrier or service provider that the phone number was originally registered with.
        PhoneNumberType:
          $ref: "#/components/schemas/PhoneNumberType"
          description: "Describes the type of phone number. Valid values are: MOBILE, LANDLINE, OTHER, and INVALID. Avoid sending SMS or voice messages to INVALID phone numbers, as these numbers are unlikely to belong to actual recipients."
      required:
        - E164PhoneNumber
        - PhoneNumberType
    E164PhoneNumberType:
      type: string
      minLength: 1
      maxLength: 20
      pattern: \+[1-9][0-9]{1,18}
