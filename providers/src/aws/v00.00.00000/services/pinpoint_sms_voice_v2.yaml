                  $ref: "#/components/schemas/PrimitiveBoolean"
                  description: When set to true, the message is checked and validated, but isn't sent to the end recipient. You are not charged for using DryRun. The Message Parts per Second (MPS) limit when using DryRun is five. If your origination identity has a lower MPS limit then the lower MPS limit is used. For more information about MPS limits, see Message Parts per Second (MPS) limits in the End User Messaging SMS User Guide..
                ProtectConfigurationId:
                  $ref: "#/components/schemas/ProtectConfigurationIdOrArn"
                  description: The unique identifier for the protect configuration.
                MessageFeedbackEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Set to true to enable message feedback for the message. When a user receives the message you need to update the message status using PutMessageFeedback.
              required:
                - DestinationPhoneNumber
