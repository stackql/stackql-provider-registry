                - IsoCountryCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSenderIdResult"
  /VerifyDestinationNumber:
    post:
      operationId: VerifyDestinationNumber
      description: Use the verification code that was received by the verified destination phone number to opt-in the verified destination phone number to receive more messages.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PinpointSMSVoiceV2.VerifyDestinationNumber
            default: PinpointSMSVoiceV2.VerifyDestinationNumber
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                VerifiedDestinationNumberId:
                  $ref: "#/components/schemas/VerifiedDestinationNumberIdOrArn"
                  description: The unique identifier for the verififed destination phone number.
                VerificationCode:
                  $ref: "#/components/schemas/VerificationCode"
                  description: The verification code that was received by the verified destination phone number.
              required:
                - VerifiedDestinationNumberId
                - VerificationCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDestinationNumberResult"
