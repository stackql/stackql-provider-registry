openapi: 3.0.0
info:
  version: "2019-12-20"
  title: Redshift Data API Service
  description: Redshift Data API Service
  x-serviceName: redshift-data
  x-serviceAlias: redshift_data
  x-protocol: json
  x-apiVersion: "2019-12-20"
  x-endpointPrefix: redshift-data
  x-targetPrefix: RedshiftData
  x-jsonVersion: "1.1"
servers:
  - url: https://redshift-data.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for redshift-data
paths:
  /BatchExecuteStatement:
    post:
      operationId: BatchExecuteStatement
      description: "Runs one or more SQL statements, which can be data manipulation language (DML) or data definition language (DDL). Depending on the authorization method, use one of the following combinations of request parameters: Secrets Manager - when connecting to a cluster, provide the secret-arn of a secret stored in Secrets Manager which has username and password. The specified secret contains credentials to connect to the database you specify. When you are connecting to a cluster, you also supply the database name, If you provide a cluster identifier (dbClusterIdentifier), it must match the cluster identifier stored in the secret. When you are connecting to a serverless workgroup, you also supply the database name. Temporary credentials - when connecting to your data warehouse, choose one of the following options: When connecting to a serverless workgroup, specify the workgroup name and database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift-serverless:GetCredentials operation is required. When connecting to a cluster as an IAM identity, specify the cluster identifier and the database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift:GetClusterCredentialsWithIAM operation is required. When connecting to a cluster as a database user, specify the cluster identifier, the database name, and the database user name. Also, permission to call the redshift:GetClusterCredentials operation is required. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.BatchExecuteStatement
            default: RedshiftData.BatchExecuteStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Sqls:
                  $ref: "#/components/schemas/SqlList"
                  description: One or more SQL statements to run. The SQL statements are run as a single transaction. They run serially in the order of the array. Subsequent SQL statements don't start until the previous statement in the array completes. If any SQL statement fails, then because they are run as one transaction, all work is rolled back.
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. This parameter is required when connecting to a cluster and authenticating using either Secrets Manager or temporary credentials.
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: The name or ARN of the secret that enables access to the database. This parameter is required when authenticating using Secrets Manager.
                DbUser:
                  $ref: "#/components/schemas/String"
                  description: The database user name. This parameter is required when connecting to a cluster as a database user and authenticating using temporary credentials.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database. This parameter is required when authenticating using either Secrets Manager or temporary credentials.
                WithEvent:
                  $ref: "#/components/schemas/Boolean"
                  description: A value that indicates whether to send an event to the Amazon EventBridge event bus after the SQL statements run.
                StatementName:
                  $ref: "#/components/schemas/StatementNameString"
                  description: The name of the SQL statements. You can name the SQL statements when you create them to identify the query.
                Parameters:
                  $ref: "#/components/schemas/SqlParametersList"
                  description: The parameters for the SQL statements. The parameters are shared across all SQL statements in the batch.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). This parameter is required when connecting to a serverless workgroup and authenticating using either Secrets Manager or temporary credentials.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                ResultFormat:
                  $ref: "#/components/schemas/ResultFormatString"
                  description: The data format of the result of the SQL statement. If no format is specified, the default is JSON.
                SessionKeepAliveSeconds:
                  $ref: "#/components/schemas/SessionAliveSeconds"
                  description: The number of seconds to keep the session alive after the query finishes. The maximum time a session can keep alive is 24 hours. After 24 hours, the session is forced closed and the query is terminated.
                SessionId:
                  $ref: "#/components/schemas/UUID"
                  description: The session identifier of the query.
              required:
                - Sqls
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchExecuteStatementOutput"
  /CancelStatement:
    post:
      operationId: CancelStatement
      description: Cancels a running query. To be canceled, a query must be running. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.CancelStatement
            default: RedshiftData.CancelStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/UUID"
                  description: The identifier of the SQL statement to cancel. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API. This identifier is returned by BatchExecuteStatment, ExecuteStatment, and ListStatements.
              required:
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelStatementResponse"
  /DescribeStatement:
    post:
      operationId: DescribeStatement
      description: Describes the details about a specific instance when a query was run by the Amazon Redshift Data API. The information includes when the query started, when it finished, the query status, the number of rows returned, and the SQL statement. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.DescribeStatement
            default: RedshiftData.DescribeStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/UUID"
                  description: The identifier of the SQL statement to describe. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API. A suffix indicates the number of the SQL statement. For example, d9b6c0c9-0747-4bf4-b142-e8883122f766:2 has a suffix of :2 that indicates the second SQL statement of a batch query. This identifier is returned by BatchExecuteStatment, ExecuteStatement, and ListStatements.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeStatementResponse"
  /DescribeTable:
    post:
      operationId: DescribeTable
      description: "Describes the detailed information about a table from metadata in the cluster. The information includes its columns. A token is returned to page through the column list. Depending on the authorization method, use one of the following combinations of request parameters: Secrets Manager - when connecting to a cluster, provide the secret-arn of a secret stored in Secrets Manager which has username and password. The specified secret contains credentials to connect to the database you specify. When you are connecting to a cluster, you also supply the database name, If you provide a cluster identifier (dbClusterIdentifier), it must match the cluster identifier stored in the secret. When you are connecting to a serverless workgroup, you also supply the database name. Temporary credentials - when connecting to your data warehouse, choose one of the following options: When connecting to a serverless workgroup, specify the workgroup name and database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift-serverless:GetCredentials operation is required. When connecting to a cluster as an IAM identity, specify the cluster identifier and the database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift:GetClusterCredentialsWithIAM operation is required. When connecting to a cluster as a database user, specify the cluster identifier, the database name, and the database user name. Also, permission to call the redshift:GetClusterCredentials operation is required. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.DescribeTable
            default: RedshiftData.DescribeTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. This parameter is required when connecting to a cluster and authenticating using either Secrets Manager or temporary credentials.
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: The name or ARN of the secret that enables access to the database. This parameter is required when authenticating using Secrets Manager.
                DbUser:
                  $ref: "#/components/schemas/String"
                  description: The database user name. This parameter is required when connecting to a cluster as a database user and authenticating using temporary credentials.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database that contains the tables to be described. If ConnectedDatabase is not specified, this is also the database to connect to with your authentication credentials.
                ConnectedDatabase:
                  $ref: "#/components/schemas/String"
                  description: A database name. The connected database is specified when you connect with your authentication credentials.
                Schema:
                  $ref: "#/components/schemas/String"
                  description: The schema that contains the table. If no schema is specified, then matching tables for all schemas are returned.
                Table:
                  $ref: "#/components/schemas/String"
                  description: The table name. If no table is specified, then all tables for all matching schemas are returned. If no table and no schema is specified, then all tables for all schemas in the database are returned
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of tables to return in the response. If more tables exist than fit in one response, then NextToken is returned to page through the results.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). This parameter is required when connecting to a serverless workgroup and authenticating using either Secrets Manager or temporary credentials.
              required:
                - Database
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTableResponse"
  /ExecuteStatement:
    post:
      operationId: ExecuteStatement
      description: "Runs an SQL statement, which can be data manipulation language (DML) or data definition language (DDL). This statement must be a single SQL statement. Depending on the authorization method, use one of the following combinations of request parameters: Secrets Manager - when connecting to a cluster, provide the secret-arn of a secret stored in Secrets Manager which has username and password. The specified secret contains credentials to connect to the database you specify. When you are connecting to a cluster, you also supply the database name, If you provide a cluster identifier (dbClusterIdentifier), it must match the cluster identifier stored in the secret. When you are connecting to a serverless workgroup, you also supply the database name. Temporary credentials - when connecting to your data warehouse, choose one of the following options: When connecting to a serverless workgroup, specify the workgroup name and database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift-serverless:GetCredentials operation is required. When connecting to a cluster as an IAM identity, specify the cluster identifier and the database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift:GetClusterCredentialsWithIAM operation is required. When connecting to a cluster as a database user, specify the cluster identifier, the database name, and the database user name. Also, permission to call the redshift:GetClusterCredentials operation is required. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.ExecuteStatement
            default: RedshiftData.ExecuteStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Sql:
                  $ref: "#/components/schemas/StatementString"
                  description: The SQL statement text to run.
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. This parameter is required when connecting to a cluster and authenticating using either Secrets Manager or temporary credentials.
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: The name or ARN of the secret that enables access to the database. This parameter is required when authenticating using Secrets Manager.
                DbUser:
                  $ref: "#/components/schemas/String"
                  description: The database user name. This parameter is required when connecting to a cluster as a database user and authenticating using temporary credentials.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database. This parameter is required when authenticating using either Secrets Manager or temporary credentials.
                WithEvent:
                  $ref: "#/components/schemas/Boolean"
                  description: A value that indicates whether to send an event to the Amazon EventBridge event bus after the SQL statement runs.
                StatementName:
                  $ref: "#/components/schemas/StatementNameString"
                  description: The name of the SQL statement. You can name the SQL statement when you create it to identify the query.
                Parameters:
                  $ref: "#/components/schemas/SqlParametersList"
                  description: The parameters for the SQL statement.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). This parameter is required when connecting to a serverless workgroup and authenticating using either Secrets Manager or temporary credentials.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                ResultFormat:
                  $ref: "#/components/schemas/ResultFormatString"
                  description: The data format of the result of the SQL statement. If no format is specified, the default is JSON.
                SessionKeepAliveSeconds:
                  $ref: "#/components/schemas/SessionAliveSeconds"
                  description: The number of seconds to keep the session alive after the query finishes. The maximum time a session can keep alive is 24 hours. After 24 hours, the session is forced closed and the query is terminated.
                SessionId:
                  $ref: "#/components/schemas/UUID"
                  description: The session identifier of the query.
              required:
                - Sql
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteStatementOutput"
  /GetStatementResult:
    post:
      operationId: GetStatementResult
      description: Fetches the temporarily cached result of an SQL statement in JSON format. The ExecuteStatement or BatchExecuteStatement operation that ran the SQL statement must have specified ResultFormat as JSON , or let the format default to JSON. A token is returned to page through the statement results. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.GetStatementResult
            default: RedshiftData.GetStatementResult
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/UUID"
                  description: The identifier of the SQL statement whose results are to be fetched. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API. A suffix indicates then number of the SQL statement. For example, d9b6c0c9-0747-4bf4-b142-e8883122f766:2 has a suffix of :2 that indicates the second SQL statement of a batch query. This identifier is returned by BatchExecuteStatment, ExecuteStatment, and ListStatements.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
              required:
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStatementResultOutputDisplay"
  /GetStatementResultV2:
    post:
      operationId: GetStatementResultV2
      description: Fetches the temporarily cached result of an SQL statement in CSV format. The ExecuteStatement or BatchExecuteStatement operation that ran the SQL statement must have specified ResultFormat as CSV. A token is returned to page through the statement results. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.GetStatementResultV2
            default: RedshiftData.GetStatementResultV2
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/UUID"
                  description: The identifier of the SQL statement whose results are to be fetched. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API. A suffix indicates then number of the SQL statement. For example, d9b6c0c9-0747-4bf4-b142-e8883122f766:2 has a suffix of :2 that indicates the second SQL statement of a batch query. This identifier is returned by BatchExecuteStatment, ExecuteStatment, and ListStatements.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
              required:
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStatementResultV2Response"
  /ListDatabases:
    post:
      operationId: ListDatabases
      description: "List the databases in a cluster. A token is returned to page through the database list. Depending on the authorization method, use one of the following combinations of request parameters: Secrets Manager - when connecting to a cluster, provide the secret-arn of a secret stored in Secrets Manager which has username and password. The specified secret contains credentials to connect to the database you specify. When you are connecting to a cluster, you also supply the database name, If you provide a cluster identifier (dbClusterIdentifier), it must match the cluster identifier stored in the secret. When you are connecting to a serverless workgroup, you also supply the database name. Temporary credentials - when connecting to your data warehouse, choose one of the following options: When connecting to a serverless workgroup, specify the workgroup name and database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift-serverless:GetCredentials operation is required. When connecting to a cluster as an IAM identity, specify the cluster identifier and the database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift:GetClusterCredentialsWithIAM operation is required. When connecting to a cluster as a database user, specify the cluster identifier, the database name, and the database user name. Also, permission to call the redshift:GetClusterCredentials operation is required. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.ListDatabases
            default: RedshiftData.ListDatabases
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. This parameter is required when connecting to a cluster and authenticating using either Secrets Manager or temporary credentials.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database. This parameter is required when authenticating using either Secrets Manager or temporary credentials.
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: The name or ARN of the secret that enables access to the database. This parameter is required when authenticating using Secrets Manager.
                DbUser:
                  $ref: "#/components/schemas/String"
                  description: The database user name. This parameter is required when connecting to a cluster as a database user and authenticating using temporary credentials.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of databases to return in the response. If more databases exist than fit in one response, then NextToken is returned to page through the results.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). This parameter is required when connecting to a serverless workgroup and authenticating using either Secrets Manager or temporary credentials.
              required:
                - Database
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatabasesOutputDisplay"
  /ListSchemas:
    post:
      operationId: ListSchemas
      description: "Lists the schemas in a database. A token is returned to page through the schema list. Depending on the authorization method, use one of the following combinations of request parameters: Secrets Manager - when connecting to a cluster, provide the secret-arn of a secret stored in Secrets Manager which has username and password. The specified secret contains credentials to connect to the database you specify. When you are connecting to a cluster, you also supply the database name, If you provide a cluster identifier (dbClusterIdentifier), it must match the cluster identifier stored in the secret. When you are connecting to a serverless workgroup, you also supply the database name. Temporary credentials - when connecting to your data warehouse, choose one of the following options: When connecting to a serverless workgroup, specify the workgroup name and database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift-serverless:GetCredentials operation is required. When connecting to a cluster as an IAM identity, specify the cluster identifier and the database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift:GetClusterCredentialsWithIAM operation is required. When connecting to a cluster as a database user, specify the cluster identifier, the database name, and the database user name. Also, permission to call the redshift:GetClusterCredentials operation is required. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.ListSchemas
            default: RedshiftData.ListSchemas
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. This parameter is required when connecting to a cluster and authenticating using either Secrets Manager or temporary credentials.
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: The name or ARN of the secret that enables access to the database. This parameter is required when authenticating using Secrets Manager.
                DbUser:
                  $ref: "#/components/schemas/String"
                  description: The database user name. This parameter is required when connecting to a cluster as a database user and authenticating using temporary credentials.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database that contains the schemas to list. If ConnectedDatabase is not specified, this is also the database to connect to with your authentication credentials.
                ConnectedDatabase:
                  $ref: "#/components/schemas/String"
                  description: A database name. The connected database is specified when you connect with your authentication credentials.
                SchemaPattern:
                  $ref: "#/components/schemas/String"
                  description: A pattern to filter results by schema name. Within a schema pattern, "%" means match any substring of 0 or more characters and "_" means match any one character. Only schema name entries matching the search pattern are returned.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of schemas to return in the response. If more schemas exist than fit in one response, then NextToken is returned to page through the results.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). This parameter is required when connecting to a serverless workgroup and authenticating using either Secrets Manager or temporary credentials.
              required:
                - Database
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasOutputDisplay"
  /ListStatements:
    post:
      operationId: ListStatements
      description: List of SQL statements. By default, only finished statements are shown. A token is returned to page through the statement list. When you use identity-enhanced role sessions to list statements, you must provide either the cluster-identifier or workgroup-name parameter. This ensures that the IdC user can only access the Amazon Redshift IdC applications they are assigned. For more information, see Trusted identity propagation overview. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.ListStatements
            default: RedshiftData.ListStatements
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
                MaxResults:
                  $ref: "#/components/schemas/ListStatementsLimit"
                  description: The maximum number of SQL statements to return in the response. If more SQL statements exist than fit in one response, then NextToken is returned to page through the results.
                StatementName:
                  $ref: "#/components/schemas/StatementNameString"
                  description: The name of the SQL statement specified as input to BatchExecuteStatement or ExecuteStatement to identify the query. You can list multiple statements by providing a prefix that matches the beginning of the statement name. For example, to list myStatement1, myStatement2, myStatement3, and so on, then provide the a value of myStatement. Data API does a case-sensitive match of SQL statement names to the prefix value you provide.
                Status:
                  $ref: "#/components/schemas/StatusString"
                  description: "The status of the SQL statement to list. Status values are defined as follows: ABORTED - The query run was stopped by the user. ALL - A status value that includes all query statuses. This value can be used to filter results. FAILED - The query run failed. FINISHED - The query has finished running. PICKED - The query has been chosen to be run. STARTED - The query run has started. SUBMITTED - The query was submitted, but not yet processed."
                RoleLevel:
                  $ref: "#/components/schemas/Boolean"
                  description: A value that filters which statements to return in the response. If true, all statements run by the caller's IAM role are returned. If false, only statements run by the caller's IAM role in the current IAM session are returned. The default is true.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database when listing statements run against a ClusterIdentifier or WorkgroupName.
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. Only statements that ran on this cluster are returned. When providing ClusterIdentifier, then WorkgroupName can't be specified.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). Only statements that ran on this workgroup are returned. When providing WorkgroupName, then ClusterIdentifier can't be specified.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStatementsResponse"
  /ListTables:
    post:
      operationId: ListTables
      description: "List the tables in a database. If neither SchemaPattern nor TablePattern are specified, then all tables in the database are returned. A token is returned to page through the table list. Depending on the authorization method, use one of the following combinations of request parameters: Secrets Manager - when connecting to a cluster, provide the secret-arn of a secret stored in Secrets Manager which has username and password. The specified secret contains credentials to connect to the database you specify. When you are connecting to a cluster, you also supply the database name, If you provide a cluster identifier (dbClusterIdentifier), it must match the cluster identifier stored in the secret. When you are connecting to a serverless workgroup, you also supply the database name. Temporary credentials - when connecting to your data warehouse, choose one of the following options: When connecting to a serverless workgroup, specify the workgroup name and database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift-serverless:GetCredentials operation is required. When connecting to a cluster as an IAM identity, specify the cluster identifier and the database name. The database user name is derived from the IAM identity. For example, arn:iam::123456789012:user:foo has the database user name IAM:foo. Also, permission to call the redshift:GetClusterCredentialsWithIAM operation is required. When connecting to a cluster as a database user, specify the cluster identifier, the database name, and the database user name. Also, permission to call the redshift:GetClusterCredentials operation is required. For more information about the Amazon Redshift Data API and CLI usage examples, see Using the Amazon Redshift Data API in the Amazon Redshift Management Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftData.ListTables
            default: RedshiftData.ListTables
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterIdentifier:
                  $ref: "#/components/schemas/ClusterIdentifierString"
                  description: The cluster identifier. This parameter is required when connecting to a cluster and authenticating using either Secrets Manager or temporary credentials.
                SecretArn:
                  $ref: "#/components/schemas/SecretArn"
                  description: The name or ARN of the secret that enables access to the database. This parameter is required when authenticating using Secrets Manager.
                DbUser:
                  $ref: "#/components/schemas/String"
                  description: The database user name. This parameter is required when connecting to a cluster as a database user and authenticating using temporary credentials.
                Database:
                  $ref: "#/components/schemas/String"
                  description: The name of the database that contains the tables to list. If ConnectedDatabase is not specified, this is also the database to connect to with your authentication credentials.
                ConnectedDatabase:
                  $ref: "#/components/schemas/String"
                  description: A database name. The connected database is specified when you connect with your authentication credentials.
                SchemaPattern:
                  $ref: "#/components/schemas/String"
                  description: A pattern to filter results by schema name. Within a schema pattern, "%" means match any substring of 0 or more characters and "_" means match any one character. Only schema name entries matching the search pattern are returned. If SchemaPattern is not specified, then all tables that match TablePattern are returned. If neither SchemaPattern or TablePattern are specified, then all tables are returned.
                TablePattern:
                  $ref: "#/components/schemas/String"
                  description: A pattern to filter results by table name. Within a table pattern, "%" means match any substring of 0 or more characters and "_" means match any one character. Only table name entries matching the search pattern are returned. If TablePattern is not specified, then all tables that match SchemaPatternare returned. If neither SchemaPattern or TablePattern are specified, then all tables are returned.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of tables to return in the response. If more tables exist than fit in one response, then NextToken is returned to page through the results.
                WorkgroupName:
                  $ref: "#/components/schemas/WorkgroupNameString"
                  description: The serverless workgroup name or Amazon Resource Name (ARN). This parameter is required when connecting to a serverless workgroup and authenticating using either Secrets Manager or temporary credentials.
              required:
                - Database
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTablesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SqlList:
      type: array
      items:
        $ref: "#/components/schemas/StatementString"
    StatementString:
      type: string
    ClusterIdentifierString:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-z][a-z0-9]*(-[a-z0-9]+)*"
    SecretArn:
      type: string
    String:
      type: string
    Boolean:
      type: boolean
    StatementNameString:
      type: string
      minLength: 0
      maxLength: 2048
    SqlParametersList:
      type: array
      items:
        $ref: "#/components/schemas/SqlParameter"
    SqlParameter:
      description: A parameter used in a SQL statement.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the parameter.
        value:
          $ref: "#/components/schemas/ParameterValue"
          description: The value of the parameter. Amazon Redshift implicitly converts to the proper data type. For more information, see Data types in the Amazon Redshift Database Developer Guide.
      required:
        - name
        - value
    ParameterName:
      type: string
      pattern: "[0-9a-zA-Z_]+"
    ParameterValue:
      type: string
      minLength: 1
    WorkgroupNameString:
      type: string
      minLength: 3
      maxLength: 128
      pattern: .*((^[a-z0-9-]{3,63}$)|^(arn:(aws(-[a-z]+)*):redshift-serverless:[a-z]{2}(-gov|(-iso[a-z]?))?-[a-z]+-\d{1}:\d{12}:workgroup/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}))
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
    ResultFormatString:
      type: string
      enum:
        - JSON
        - CSV
    SessionAliveSeconds:
      type: integer
      minimum: 0
      maximum: 86400
    UUID:
      type: string
      pattern: "[a-z0-9]{8}(-[a-z0-9]{4}){3}-[a-z0-9]{12}(:\\d{0,2})?"
    BatchExecuteStatementOutput:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/UUID"
          description: The identifier of the SQL statement whose results are to be fetched. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API. This identifier is returned by BatchExecuteStatment.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time (UTC) the statement was created.
        ClusterIdentifier:
          $ref: "#/components/schemas/ClusterIdentifierString"
          description: The cluster identifier. This element is not returned when connecting to a serverless workgroup.
        DbUser:
          $ref: "#/components/schemas/String"
          description: The database user name.
        DbGroups:
          $ref: "#/components/schemas/DbGroupList"
          description: A list of colon (:) separated names of database groups.
        Database:
          $ref: "#/components/schemas/String"
          description: The name of the database.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The name or ARN of the secret that enables access to the database.
        WorkgroupName:
          $ref: "#/components/schemas/WorkgroupNameString"
          description: The serverless workgroup name or Amazon Resource Name (ARN). This element is not returned when connecting to a provisioned cluster.
        SessionId:
          $ref: "#/components/schemas/UUID"
          description: The session identifier of the query.
    Timestamp:
      type: string
      format: date-time
    DbGroupList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CancelStatementResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/Boolean"
          description: A value that indicates whether the cancel statement succeeded (true).
    DescribeStatementResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/UUID"
          description: The identifier of the SQL statement described. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The name or Amazon Resource Name (ARN) of the secret that enables access to the database.
        DbUser:
          $ref: "#/components/schemas/String"
          description: The database user name.
        Database:
          $ref: "#/components/schemas/String"
          description: The name of the database.
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The cluster identifier.
        Duration:
          $ref: "#/components/schemas/Long"
          description: The amount of time in nanoseconds that the statement ran.
        Error:
          $ref: "#/components/schemas/String"
          description: The error message from the cluster if the SQL statement encountered an error while running.
        Status:
          $ref: "#/components/schemas/StatusString"
          description: "The status of the SQL statement being described. Status values are defined as follows: ABORTED - The query run was stopped by the user. ALL - A status value that includes all query statuses. This value can be used to filter results. FAILED - The query run failed. FINISHED - The query has finished running. PICKED - The query has been chosen to be run. STARTED - The query run has started. SUBMITTED - The query was submitted, but not yet processed."
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time (UTC) when the SQL statement was submitted to run.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time (UTC) that the metadata for the SQL statement was last updated. An example is the time the status last changed.
        RedshiftPid:
          $ref: "#/components/schemas/Long"
          description: The process identifier from Amazon Redshift.
        HasResultSet:
          $ref: "#/components/schemas/Boolean"
          description: A value that indicates whether the statement has a result set. The result set can be empty. The value is true for an empty result set. The value is true if any substatement returns a result set.
        QueryString:
          $ref: "#/components/schemas/StatementString"
          description: The SQL statement text.
        ResultRows:
          $ref: "#/components/schemas/Long"
          description: Either the number of rows returned from the SQL statement or the number of rows affected. If result size is greater than zero, the result rows can be the number of rows affected by SQL statements such as INSERT, UPDATE, DELETE, COPY, and others. A -1 indicates the value is null.
        ResultSize:
          $ref: "#/components/schemas/Long"
          description: The size in bytes of the returned results. A -1 indicates the value is null.
        RedshiftQueryId:
          $ref: "#/components/schemas/Long"
          description: The identifier of the query generated by Amazon Redshift. These identifiers are also available in the query column of the STL_QUERY system view.
        QueryParameters:
          $ref: "#/components/schemas/SqlParametersList"
          description: The parameters for the SQL statement.
        SubStatements:
          $ref: "#/components/schemas/SubStatementList"
          description: The SQL statements from a multiple statement run.
        WorkgroupName:
          $ref: "#/components/schemas/WorkgroupNameString"
          description: The serverless workgroup name or Amazon Resource Name (ARN).
        ResultFormat:
          $ref: "#/components/schemas/ResultFormatString"
          description: The data format of the result of the SQL statement.
        SessionId:
          $ref: "#/components/schemas/String"
          description: The session identifier of the query.
      required:
        - Id
    Long:
      type: integer
      format: int64
    StatusString:
      type: string
      enum:
        - SUBMITTED
        - PICKED
        - STARTED
        - FINISHED
        - ABORTED
        - FAILED
        - ALL
    SubStatementList:
      type: array
      items:
        $ref: "#/components/schemas/SubStatementData"
    SubStatementData:
      description: Information about an SQL statement.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/UUID"
          description: The identifier of the SQL statement. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API. A suffix indicates the number of the SQL statement. For example, d9b6c0c9-0747-4bf4-b142-e8883122f766:2 has a suffix of :2 that indicates the second SQL statement of a batch query.
        Duration:
          $ref: "#/components/schemas/Long"
          description: The amount of time in nanoseconds that the statement ran.
        Error:
          $ref: "#/components/schemas/String"
          description: The error message from the cluster if the SQL statement encountered an error while running.
        Status:
          $ref: "#/components/schemas/StatementStatusString"
          description: The status of the SQL statement. An example is the that the SQL statement finished.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time (UTC) the statement was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time (UTC) that the statement metadata was last updated.
        QueryString:
          $ref: "#/components/schemas/StatementString"
          description: The SQL statement text.
        ResultRows:
          $ref: "#/components/schemas/Long"
          description: Either the number of rows returned from the SQL statement or the number of rows affected. If result size is greater than zero, the result rows can be the number of rows affected by SQL statements such as INSERT, UPDATE, DELETE, COPY, and others. A -1 indicates the value is null.
        ResultSize:
          $ref: "#/components/schemas/Long"
          description: The size in bytes of the returned results. A -1 indicates the value is null.
        RedshiftQueryId:
          $ref: "#/components/schemas/Long"
          description: The SQL statement identifier. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API.
        HasResultSet:
          $ref: "#/components/schemas/Boolean"
          description: A value that indicates whether the statement has a result set. The result set can be empty. The value is true for an empty result set.
      required:
        - Id
    StatementStatusString:
      type: string
      enum:
        - SUBMITTED
        - PICKED
        - STARTED
        - FINISHED
        - ABORTED
        - FAILED
    PageSize:
      type: integer
      minimum: 0
      maximum: 1000
    DescribeTableResponse:
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/String"
          description: The table name.
        ColumnList:
          $ref: "#/components/schemas/ColumnList"
          description: A list of columns in the table.
        NextToken:
          $ref: "#/components/schemas/String"
          description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
    ColumnList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnMetadata"
    ColumnMetadata:
      description: The properties (metadata) of a column.
      type: object
      properties:
        isCaseSensitive:
          $ref: "#/components/schemas/bool"
          description: A value that indicates whether the column is case-sensitive.
        isCurrency:
          $ref: "#/components/schemas/bool"
          description: A value that indicates whether the column contains currency values.
        isSigned:
          $ref: "#/components/schemas/bool"
          description: A value that indicates whether an integer column is signed.
        label:
          $ref: "#/components/schemas/String"
          description: The label for the column.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the column.
        nullable_:
          $ref: "#/components/schemas/Integer"
          description: A value that indicates whether the column is nullable.
        precision:
          $ref: "#/components/schemas/Integer"
          description: The precision value of a decimal number column, or the column length for a non-numeric column.
        scale:
          $ref: "#/components/schemas/Integer"
          description: The scale value of a decimal number column.
        schemaName:
          $ref: "#/components/schemas/String"
          description: The name of the schema that contains the table that includes the column.
        tableName:
          $ref: "#/components/schemas/String"
          description: The name of the table that includes the column.
        typeName:
          $ref: "#/components/schemas/String"
          description: The database-specific data type of the column.
        length:
          $ref: "#/components/schemas/Integer"
          description: The length of the column.
        columnDefault:
          $ref: "#/components/schemas/String"
          description: The default value of the column.
    bool:
      type: boolean
    Integer:
      type: integer
    ExecuteStatementOutput:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/UUID"
          description: The identifier of the SQL statement whose results are to be fetched. This value is a universally unique identifier (UUID) generated by Amazon Redshift Data API.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time (UTC) the statement was created.
        ClusterIdentifier:
          $ref: "#/components/schemas/ClusterIdentifierString"
          description: The cluster identifier. This element is not returned when connecting to a serverless workgroup.
        DbUser:
          $ref: "#/components/schemas/String"
          description: The database user name.
        DbGroups:
          $ref: "#/components/schemas/DbGroupList"
          description: A list of colon (:) separated names of database groups.
        Database:
          $ref: "#/components/schemas/String"
          description: The name of the database.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The name or ARN of the secret that enables access to the database.
        WorkgroupName:
          $ref: "#/components/schemas/WorkgroupNameString"
          description: The serverless workgroup name or Amazon Resource Name (ARN). This element is not returned when connecting to a provisioned cluster.
        SessionId:
          $ref: "#/components/schemas/UUID"
          description: The session identifier of the query.
    GetStatementResultRowDisplay:
      type: object
      properties:
        record:
          type: array
          description: The results of the SQL statement in JSON format.
    GetStatementResultOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetStatementResultRowDisplay"
    GetStatementResultV2Response:
      type: object
      properties:
        Records:
          $ref: "#/components/schemas/FormattedSqlRecords"
          description: The results of the SQL statement in CSV format.
        ColumnMetadata:
          $ref: "#/components/schemas/ColumnMetadataList"
          description: The properties (metadata) of a column.
        TotalNumRows:
          $ref: "#/components/schemas/Long"
          description: The total number of rows in the result set returned from a query. You can use this number to estimate the number of calls to the GetStatementResultV2 operation needed to page through the results.
        ResultFormat:
          $ref: "#/components/schemas/ResultFormatString"
          description: The data format of the result of the SQL statement.
        NextToken:
          $ref: "#/components/schemas/String"
          description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
      required:
        - Records
    FormattedSqlRecords:
      type: array
      items:
        $ref: "#/components/schemas/QueryRecords"
    QueryRecords:
      description: The results of the SQL statement.
      type: object
      properties:
        CSVRecords:
          $ref: "#/components/schemas/String"
          description: The results of the SQL statement in CSV format.
    ColumnMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnMetadata"
    ListDatabasesRowDisplay:
      type: object
      properties:
        databas:
          type: string
          description: The names of databases.
    ListDatabasesOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ListDatabasesRowDisplay"
    ListSchemasRowDisplay:
      type: object
      properties:
        schema:
          type: string
          description: The schemas that match the request pattern.
    ListSchemasOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ListSchemasRowDisplay"
    ListStatementsLimit:
      type: integer
      minimum: 0
      maximum: 100
    ListStatementsResponse:
      type: object
      properties:
        Statements:
          $ref: "#/components/schemas/StatementList"
          description: The SQL statements.
        NextToken:
          $ref: "#/components/schemas/String"
          description: A value that indicates the starting point for the next set of response records in a subsequent request. If a value is returned in a response, you can retrieve the next set of records by providing this returned NextToken value in the next NextToken parameter and retrying the command. If the NextToken field is empty, all response records have been retrieved for the request.
      required:
        - Statements
    StatementList:
      type: array
