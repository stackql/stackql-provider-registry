openapi: 3.0.0
info:
  version: "2014-06-30"
  title: Amazon Cognito Identity
  description: Amazon Cognito Identity
  x-serviceName: cognito-identity
  x-serviceAlias: cognito_identity
  x-protocol: json
  x-apiVersion: "2014-06-30"
  x-endpointPrefix: cognito-identity
  x-targetPrefix: AWSCognitoIdentityService
  x-jsonVersion: "1.1"
servers:
  - url: https://cognito-identity.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cognito-identity
paths:
  /CreateIdentityPool:
    post:
      operationId: CreateIdentityPool
      description: "Creates a new identity pool. The identity pool is a store of user identity information that is specific to your Amazon Web Services account. The keys for SupportedLoginProviders are as follows: Facebook: graph.facebook.com Google: accounts.google.com Sign in With Apple: appleid.apple.com Amazon: www.amazon.com Twitter: api.twitter.com Digits: www.digits.com If you don't provide a value for a parameter, Amazon Cognito sets it to its default value. You must use Amazon Web Services developer credentials to call this operation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.CreateIdentityPool
            default: AWSCognitoIdentityService.CreateIdentityPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolName:
                  $ref: "#/components/schemas/IdentityPoolName"
                  description: A string that you provide.
                AllowUnauthenticatedIdentities:
                  $ref: "#/components/schemas/IdentityPoolUnauthenticated"
                  description: TRUE if the identity pool supports unauthenticated logins.
                AllowClassicFlow:
                  $ref: "#/components/schemas/ClassicFlow"
                  description: Enables or disables the Basic (Classic) authentication flow. For more information, see Identity Pools (Federated Identities) Authentication Flow in the Amazon Cognito Developer Guide.
                SupportedLoginProviders:
                  $ref: "#/components/schemas/IdentityProviders"
                  description: Optional key:value pairs mapping provider names to provider app IDs.
                DeveloperProviderName:
                  $ref: "#/components/schemas/DeveloperProviderName"
                  description: The "domain" by which Cognito will refer to your users. This name acts as a placeholder that allows your backend and the Cognito service to communicate about the developer provider. For the DeveloperProviderName, you can use letters as well as period (.), underscore (_), and dash (-). Once you have set a developer provider name, you cannot change it. Please take care in setting this parameter.
                OpenIdConnectProviderARNs:
                  $ref: "#/components/schemas/OIDCProviderList"
                  description: The Amazon Resource Names (ARN) of the OpenID Connect providers.
                CognitoIdentityProviders:
                  $ref: "#/components/schemas/CognitoIdentityProviderList"
                  description: An array of Amazon Cognito user pools and their client IDs.
                SamlProviderARNs:
                  $ref: "#/components/schemas/SAMLProviderList"
                  description: An array of Amazon Resource Names (ARNs) of the SAML provider for your identity pool.
                IdentityPoolTags:
                  $ref: "#/components/schemas/IdentityPoolTagsType"
                  description: Tags to assign to the identity pool. A tag is a label that you can apply to identity pools to categorize and manage them in different ways, such as by purpose, owner, environment, or other criteria.
              required:
                - IdentityPoolName
                - AllowUnauthenticatedIdentities
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPool"
  /DeleteIdentities:
    post:
      operationId: DeleteIdentities
      description: Deletes identities from an identity pool. You can specify a list of 1-60 identities that you want to delete. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.DeleteIdentities
            default: AWSCognitoIdentityService.DeleteIdentities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityIdsToDelete:
                  $ref: "#/components/schemas/IdentityIdList"
                  description: A list of 1-60 identities that you want to delete.
              required:
                - IdentityIdsToDelete
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIdentitiesResponse"
  /DeleteIdentityPool:
    post:
      operationId: DeleteIdentityPool
      description: Deletes an identity pool. Once a pool is deleted, users will not be able to authenticate with the pool. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.DeleteIdentityPool
            default: AWSCognitoIdentityService.DeleteIdentityPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
              required:
                - IdentityPoolId
      responses:
        "200":
          description: Success
  /DescribeIdentity:
    post:
      operationId: DescribeIdentity
      description: Returns metadata related to the given identity, including when the identity was created and any associated linked logins. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.DescribeIdentity
            default: AWSCognitoIdentityService.DescribeIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
              required:
                - IdentityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityDescription"
  /DescribeIdentityPool:
    post:
      operationId: DescribeIdentityPool
      description: Gets details about a particular identity pool, including the pool name, ID description, creation date, and current number of users. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.DescribeIdentityPool
            default: AWSCognitoIdentityService.DescribeIdentityPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
              required:
                - IdentityPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPool"
  /GetCredentialsForIdentity:
    post:
      operationId: GetCredentialsForIdentity
      description: Returns credentials for the provided identity ID. Any provided logins will be validated against supported login providers. If the token is for cognito-identity.amazonaws.com, it will be passed through to Security Token Service with the appropriate role for the token. This is a public API. You do not need any credentials to call this API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.GetCredentialsForIdentity
            default: AWSCognitoIdentityService.GetCredentialsForIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
                Logins:
                  $ref: "#/components/schemas/LoginsMap"
                  description: 'A set of optional name-value pairs that map provider names to provider tokens. The name-value pair will follow the syntax "provider_name": "provider_user_identifier". Logins should not be specified when trying to get credentials for an unauthenticated identity. The Logins parameter is required when using identities associated with external identity providers such as Facebook. For examples of Logins maps, see the code examples in the External Identity Providers section of the Amazon Cognito Developer Guide.'
                CustomRoleArn:
                  $ref: "#/components/schemas/ARNString"
                  description: The Amazon Resource Name (ARN) of the role to be assumed when multiple roles were received in the token from the identity provider. For example, a SAML-based identity provider. This parameter is optional for identity providers that do not support role customization.
              required:
                - IdentityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCredentialsForIdentityResponse"
  /GetId:
    post:
      operationId: GetId
      description: Generates (or retrieves) IdentityID. Supplying multiple logins will create an implicit linked account. This is a public API. You do not need any credentials to call this API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.GetId
            default: AWSCognitoIdentityService.GetId
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: A standard Amazon Web Services account ID (9+ digits).
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                Logins:
                  $ref: "#/components/schemas/LoginsMap"
                  description: "A set of optional name-value pairs that map provider names to provider tokens. The available provider names for Logins are as follows: Facebook: graph.facebook.com Amazon Cognito user pool: cognito-idp.`<region>`.amazonaws.com/`<YOUR_USER_POOL_ID>`, for example, cognito-idp.us-east-1.amazonaws.com/us-east-1_123456789. Google: accounts.google.com Amazon: www.amazon.com Twitter: api.twitter.com Digits: www.digits.com"
              required:
                - IdentityPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIdResponse"
  /GetIdentityPoolRoles:
    post:
      operationId: GetIdentityPoolRoles
      description: Gets the roles for an identity pool. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.GetIdentityPoolRoles
            default: AWSCognitoIdentityService.GetIdentityPoolRoles
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
              required:
                - IdentityPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIdentityPoolRolesResponse"
  /GetOpenIdToken:
    post:
      operationId: GetOpenIdToken
      description: Gets an OpenID token, using a known Cognito ID. This known Cognito ID is returned by GetId. You can optionally add additional logins for the identity. Supplying multiple logins creates an implicit link. The OpenID token is valid for 10 minutes. This is a public API. You do not need any credentials to call this API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.GetOpenIdToken
            default: AWSCognitoIdentityService.GetOpenIdToken
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
                Logins:
                  $ref: "#/components/schemas/LoginsMap"
                  description: A set of optional name-value pairs that map provider names to provider tokens. When using graph.facebook.com and www.amazon.com, supply the access_token returned from the provider's authflow. For accounts.google.com, an Amazon Cognito user pool provider, or any other OpenID Connect provider, always include the id_token.
              required:
                - IdentityId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOpenIdTokenResponse"
  /GetOpenIdTokenForDeveloperIdentity:
    post:
      operationId: GetOpenIdTokenForDeveloperIdentity
      description: Registers (or retrieves) a Cognito IdentityId and an OpenID Connect token for a user authenticated by your backend authentication process. Supplying multiple logins will create an implicit linked account. You can only specify one developer provider as part of the Logins map, which is linked to the identity pool. The developer provider is the "domain" by which Cognito will refer to your users. You can use GetOpenIdTokenForDeveloperIdentity to create a new identity and to link new logins (that is, user credentials issued by a public provider or developer provider) to an existing identity. When you want to create a new identity, the IdentityId should be null. When you want to associate a new login with an existing authenticated/unauthenticated identity, you can do so by providing the existing IdentityId. This API will create the identity in the specified IdentityPoolId. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.GetOpenIdTokenForDeveloperIdentity
            default: AWSCognitoIdentityService.GetOpenIdTokenForDeveloperIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
                Logins:
                  $ref: "#/components/schemas/LoginsMap"
                  description: 'A set of optional name-value pairs that map provider names to provider tokens. Each name-value pair represents a user from a public provider or developer provider. If the user is from a developer provider, the name-value pair will follow the syntax "developer_provider_name": "developer_user_identifier". The developer provider is the "domain" by which Cognito will refer to your users; you provided this domain while creating/updating the identity pool. The developer user identifier is an identifier from your backend that uniquely identifies a user. When you create an identity pool, you can specify the supported logins.'
                PrincipalTags:
                  $ref: "#/components/schemas/PrincipalTags"
                  description: Use this operation to configure attribute mappings for custom providers.
                TokenDuration:
                  $ref: "#/components/schemas/TokenDuration"
                  description: "The expiration time of the token, in seconds. You can specify a custom expiration time for the token so that you can cache it. If you don't provide an expiration time, the token is valid for 15 minutes. You can exchange the token with Amazon STS for temporary Amazon Web Services credentials, which are valid for a maximum of one hour. The maximum token duration you can set is 24 hours. You should take care in setting the expiration time for a token, as there are significant security implications: an attacker could use a leaked token to access your Amazon Web Services resources for the token's duration. Please provide for a small grace period, usually no more than 5 minutes, to account for clock skew."
              required:
                - IdentityPoolId
                - Logins
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOpenIdTokenForDeveloperIdentityResponse"
  /GetPrincipalTagAttributeMap:
    post:
      operationId: GetPrincipalTagAttributeMap
      description: Use GetPrincipalTagAttributeMap to list all mappings between PrincipalTags and user attributes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.GetPrincipalTagAttributeMap
            default: AWSCognitoIdentityService.GetPrincipalTagAttributeMap
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: You can use this operation to get the ID of the Identity Pool you setup attribute mappings for.
                IdentityProviderName:
                  $ref: "#/components/schemas/IdentityProviderName"
                  description: You can use this operation to get the provider name.
              required:
                - IdentityPoolId
                - IdentityProviderName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPrincipalTagAttributeMapResponse"
  /ListIdentities:
    post:
      operationId: ListIdentities
      description: Lists the identities in an identity pool. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.ListIdentities
            default: AWSCognitoIdentityService.ListIdentities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                MaxResults:
                  $ref: "#/components/schemas/QueryLimit"
                  description: The maximum number of identities to return.
                NextToken:
                  $ref: "#/components/schemas/PaginationKey"
                  description: A pagination token.
                HideDisabled:
                  $ref: "#/components/schemas/HideDisabled"
                  description: An optional boolean parameter that allows you to hide disabled identities. If omitted, the ListIdentities API will include disabled identities in the response.
              required:
                - IdentityPoolId
                - MaxResults
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdentitiesResponse"
  /ListIdentityPools:
    post:
      operationId: ListIdentityPools
      description: Lists all of the Cognito identity pools registered for your account. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.ListIdentityPools
            default: AWSCognitoIdentityService.ListIdentityPools
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/QueryLimit"
                  description: The maximum number of identities to return.
                NextToken:
                  $ref: "#/components/schemas/PaginationKey"
                  description: A pagination token.
              required:
                - MaxResults
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdentityPoolsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags that are assigned to an Amazon Cognito identity pool. A tag is a label that you can apply to identity pools to categorize and manage them in different ways, such as by purpose, owner, environment, or other criteria. You can use this action up to 10 times per second, per account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.ListTagsForResource
            default: AWSCognitoIdentityService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ARNString"
                  description: The Amazon Resource Name (ARN) of the identity pool that the tags are assigned to.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /LookupDeveloperIdentity:
    post:
      operationId: LookupDeveloperIdentity
      description: "Retrieves the IdentityID associated with a DeveloperUserIdentifier or the list of DeveloperUserIdentifier values associated with an IdentityId for an existing identity. Either IdentityID or DeveloperUserIdentifier must not be null. If you supply only one of these values, the other value will be searched in the database and returned as a part of the response. If you supply both, DeveloperUserIdentifier will be matched against IdentityID. If the values are verified against the database, the response returns both values and is the same as the request. Otherwise, a ResourceConflictException is thrown. LookupDeveloperIdentity is intended for low-throughput control plane operations: for example, to enable customer service to locate an identity ID by username. If you are using it for higher-volume operations such as user authentication, your requests are likely to be throttled. GetOpenIdTokenForDeveloperIdentity is a better option for higher-volume operations for user authentication. You must use Amazon Web Services developer credentials to call this operation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.LookupDeveloperIdentity
            default: AWSCognitoIdentityService.LookupDeveloperIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
                DeveloperUserIdentifier:
                  $ref: "#/components/schemas/DeveloperUserIdentifier"
                  description: A unique ID used by your backend authentication process to identify a user. Typically, a developer identity provider would issue many developer user identifiers, in keeping with the number of users.
                MaxResults:
                  $ref: "#/components/schemas/QueryLimit"
                  description: The maximum number of identities to return.
                NextToken:
                  $ref: "#/components/schemas/PaginationKey"
                  description: A pagination token. The first call you make will have NextToken set to null. After that the service will return NextToken values as needed. For example, let's say you make a request with MaxResults set to 10, and there are 20 matches in the database. The service will return a pagination token as a part of the response. This token can be used to call the API again and get results starting from the 11th match.
              required:
                - IdentityPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupDeveloperIdentityResponse"
  /MergeDeveloperIdentities:
    post:
      operationId: MergeDeveloperIdentities
      description: Merges two users having different IdentityIds, existing in the same identity pool, and identified by the same developer provider. You can use this action to request that discrete users be merged and identified as a single user in the Cognito environment. Cognito associates the given source user (SourceUserIdentifier) with the IdentityId of the DestinationUserIdentifier. Only developer-authenticated users can be merged. If the users to be merged are associated with the same public provider, but as two different users, an exception will be thrown. The number of linked logins is limited to 20. So, the number of linked logins for the source user, SourceUserIdentifier, and the destination user, DestinationUserIdentifier, together should not be larger than 20. Otherwise, an exception will be thrown. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.MergeDeveloperIdentities
            default: AWSCognitoIdentityService.MergeDeveloperIdentities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SourceUserIdentifier:
                  $ref: "#/components/schemas/DeveloperUserIdentifier"
                  description: User identifier for the source user. The value should be a DeveloperUserIdentifier.
                DestinationUserIdentifier:
                  $ref: "#/components/schemas/DeveloperUserIdentifier"
                  description: User identifier for the destination user. The value should be a DeveloperUserIdentifier.
                DeveloperProviderName:
                  $ref: "#/components/schemas/DeveloperProviderName"
                  description: The "domain" by which Cognito will refer to your users. This is a (pseudo) domain name that you provide while creating an identity pool. This name acts as a placeholder that allows your backend and the Cognito service to communicate about the developer provider. For the DeveloperProviderName, you can use letters as well as period (.), underscore (_), and dash (-).
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
              required:
                - SourceUserIdentifier
                - DestinationUserIdentifier
                - DeveloperProviderName
                - IdentityPoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeDeveloperIdentitiesResponse"
  /SetIdentityPoolRoles:
    post:
      operationId: SetIdentityPoolRoles
      description: Sets the roles for an identity pool. These roles are used when making calls to GetCredentialsForIdentity action. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.SetIdentityPoolRoles
            default: AWSCognitoIdentityService.SetIdentityPoolRoles
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                Roles:
                  $ref: "#/components/schemas/RolesMap"
                  description: The map of roles associated with this pool. For a given role, the key will be either "authenticated" or "unauthenticated" and the value will be the Role ARN.
                RoleMappings:
                  $ref: "#/components/schemas/RoleMappingMap"
                  description: How users for a specific identity provider are to mapped to roles. This is a string to RoleMapping object map. The string identifies the identity provider, for example, graph.facebook.com or cognito-idp.us-east-1.amazonaws.com/us-east-1_abcdefghi:app_client_id. Up to 25 rules can be specified per identity provider.
              required:
                - IdentityPoolId
      responses:
        "200":
          description: Success
  /SetPrincipalTagAttributeMap:
    post:
      operationId: SetPrincipalTagAttributeMap
      description: You can use this operation to use default (username and clientID) attribute or custom attribute mappings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.SetPrincipalTagAttributeMap
            default: AWSCognitoIdentityService.SetPrincipalTagAttributeMap
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: The ID of the Identity Pool you want to set attribute mappings for.
                IdentityProviderName:
                  $ref: "#/components/schemas/IdentityProviderName"
                  description: The provider name you want to use for attribute mappings.
                UseDefaults:
                  $ref: "#/components/schemas/UseDefaults"
                  description: You can use this operation to use default (username and clientID) attribute mappings.
                PrincipalTags:
                  $ref: "#/components/schemas/PrincipalTags"
                  description: You can use this operation to add principal tags.
              required:
                - IdentityPoolId
                - IdentityProviderName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetPrincipalTagAttributeMapResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Assigns a set of tags to the specified Amazon Cognito identity pool. A tag is a label that you can use to categorize and manage identity pools in different ways, such as by purpose, owner, environment, or other criteria. Each tag consists of a key and value, both of which you define. A key is a general category for more specific values. For example, if you have two versions of an identity pool, one for testing and another for production, you might assign an Environment tag key to both identity pools. The value of this key might be Test for one identity pool and Production for the other. Tags are useful for cost tracking and access control. You can activate your tags so that they appear on the Billing and Cost Management console, where you can track the costs associated with your identity pools. In an IAM policy, you can constrain permissions for identity pools based on specific tags or tag values. You can use this action up to 5 times per second, per account. An identity pool can have as many as 50 tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.TagResource
            default: AWSCognitoIdentityService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ARNString"
                  description: The Amazon Resource Name (ARN) of the identity pool.
                Tags:
                  $ref: "#/components/schemas/IdentityPoolTagsType"
                  description: The tags to assign to the identity pool.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UnlinkDeveloperIdentity:
    post:
      operationId: UnlinkDeveloperIdentity
      description: Unlinks a DeveloperUserIdentifier from an existing identity. Unlinked developer users will be considered new identities next time they are seen. If, for a given Cognito identity, you remove all federated identities as well as the developer user identifier, the Cognito identity becomes inaccessible. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.UnlinkDeveloperIdentity
            default: AWSCognitoIdentityService.UnlinkDeveloperIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                DeveloperProviderName:
                  $ref: "#/components/schemas/DeveloperProviderName"
                  description: The "domain" by which Cognito will refer to your users.
                DeveloperUserIdentifier:
                  $ref: "#/components/schemas/DeveloperUserIdentifier"
                  description: A unique ID used by your backend authentication process to identify a user.
              required:
                - IdentityId
                - IdentityPoolId
                - DeveloperProviderName
                - DeveloperUserIdentifier
      responses:
        "200":
          description: Success
  /UnlinkIdentity:
    post:
      operationId: UnlinkIdentity
      description: Unlinks a federated identity from an existing account. Unlinked logins will be considered new identities next time they are seen. Removing the last linked login will make this identity inaccessible. This is a public API. You do not need any credentials to call this API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.UnlinkIdentity
            default: AWSCognitoIdentityService.UnlinkIdentity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityId:
                  $ref: "#/components/schemas/IdentityId"
                  description: A unique identifier in the format REGION:GUID.
                Logins:
                  $ref: "#/components/schemas/LoginsMap"
                  description: A set of optional name-value pairs that map provider names to provider tokens.
                LoginsToRemove:
                  $ref: "#/components/schemas/LoginsList"
                  description: Provider names to unlink from this identity.
              required:
                - IdentityId
                - LoginsToRemove
      responses:
        "200":
          description: Success
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the specified tags from the specified Amazon Cognito identity pool. You can use this action up to 5 times per second, per account
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.UntagResource
            default: AWSCognitoIdentityService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ARNString"
                  description: The Amazon Resource Name (ARN) of the identity pool.
                TagKeys:
                  $ref: "#/components/schemas/IdentityPoolTagsListType"
                  description: The keys of the tags to remove from the user pool.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateIdentityPool:
    post:
      operationId: UpdateIdentityPool
      description: Updates the configuration of an identity pool. If you don't provide a value for a parameter, Amazon Cognito sets it to its default value. You must use Amazon Web Services developer credentials to call this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSCognitoIdentityService.UpdateIdentityPool
            default: AWSCognitoIdentityService.UpdateIdentityPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityPoolId:
                  $ref: "#/components/schemas/IdentityPoolId"
                  description: An identity pool ID in the format REGION:GUID.
                IdentityPoolName:
                  $ref: "#/components/schemas/IdentityPoolName"
                  description: A string that you provide.
                AllowUnauthenticatedIdentities:
                  $ref: "#/components/schemas/IdentityPoolUnauthenticated"
                  description: TRUE if the identity pool supports unauthenticated logins.
                AllowClassicFlow:
                  $ref: "#/components/schemas/ClassicFlow"
                  description: Enables or disables the Basic (Classic) authentication flow. For more information, see Identity Pools (Federated Identities) Authentication Flow in the Amazon Cognito Developer Guide.
                SupportedLoginProviders:
                  $ref: "#/components/schemas/IdentityProviders"
                  description: Optional key:value pairs mapping provider names to provider app IDs.
                DeveloperProviderName:
                  $ref: "#/components/schemas/DeveloperProviderName"
                  description: The "domain" by which Cognito will refer to your users.
                OpenIdConnectProviderARNs:
                  $ref: "#/components/schemas/OIDCProviderList"
                  description: The ARNs of the OpenID Connect providers.
                CognitoIdentityProviders:
                  $ref: "#/components/schemas/CognitoIdentityProviderList"
                  description: A list representing an Amazon Cognito user pool and its client ID.
                SamlProviderARNs:
                  $ref: "#/components/schemas/SAMLProviderList"
                  description: An array of Amazon Resource Names (ARNs) of the SAML provider for your identity pool.
                IdentityPoolTags:
                  $ref: "#/components/schemas/IdentityPoolTagsType"
                  description: The tags that are assigned to the identity pool. A tag is a label that you can apply to identity pools to categorize and manage them in different ways, such as by purpose, owner, environment, or other criteria.
              required:
                - IdentityPoolId
                - IdentityPoolName
                - AllowUnauthenticatedIdentities
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPool"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    IdentityPoolName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w\\s+=,.@-]+"
    IdentityPoolUnauthenticated:
      type: boolean
    ClassicFlow:
      type: boolean
    IdentityProviders:
      type: object
      properties: {}
    DeveloperProviderName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w._-]+"
    OIDCProviderList:
      type: array
      items:
        $ref: "#/components/schemas/ARNString"
    ARNString:
      type: string
      minLength: 20
      maxLength: 2048
    CognitoIdentityProviderList:
      type: array
      items:
        $ref: "#/components/schemas/CognitoIdentityProvider"
    CognitoIdentityProvider:
      description: A provider representing an Amazon Cognito user pool and its client ID.
      type: object
      properties:
        ProviderName:
          $ref: "#/components/schemas/CognitoIdentityProviderName"
          description: The provider name for an Amazon Cognito user pool. For example, cognito-idp.us-east-1.amazonaws.com/us-east-1_123456789.
        ClientId:
          $ref: "#/components/schemas/CognitoIdentityProviderClientId"
          description: The client ID for the Amazon Cognito user pool.
        ServerSideTokenCheck:
          $ref: "#/components/schemas/CognitoIdentityProviderTokenCheck"
          description: TRUE if server-side token validation is enabled for the identity provider’s token. Once you set ServerSideTokenCheck to TRUE for an identity pool, that identity pool will check with the integrated user pools to make sure that the user has not been globally signed out or deleted before the identity pool provides an OIDC token or Amazon Web Services credentials for the user. If the user is signed out or deleted, the identity pool will return a 400 Not Authorized error.
    CognitoIdentityProviderName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w._:/-]+"
    CognitoIdentityProviderClientId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w_]+"
    CognitoIdentityProviderTokenCheck:
      type: boolean
    SAMLProviderList:
      type: array
      items:
        $ref: "#/components/schemas/ARNString"
    IdentityPoolTagsType:
      type: object
      properties: {}
    IdentityPool:
      description: An object representing an Amazon Cognito identity pool.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: An identity pool ID in the format REGION:GUID.
        IdentityPoolName:
          $ref: "#/components/schemas/IdentityPoolName"
          description: A string that you provide.
        AllowUnauthenticatedIdentities:
          $ref: "#/components/schemas/IdentityPoolUnauthenticated"
          description: TRUE if the identity pool supports unauthenticated logins.
        AllowClassicFlow:
          $ref: "#/components/schemas/ClassicFlow"
          description: Enables or disables the Basic (Classic) authentication flow. For more information, see Identity Pools (Federated Identities) Authentication Flow in the Amazon Cognito Developer Guide.
        SupportedLoginProviders:
          type: object
          properties: {}
          description: Optional key:value pairs mapping provider names to provider app IDs.
        DeveloperProviderName:
          $ref: "#/components/schemas/DeveloperProviderName"
          description: The "domain" by which Cognito will refer to your users.
        OpenIdConnectProviderARNs:
          $ref: "#/components/schemas/OIDCProviderList"
          description: The ARNs of the OpenID Connect providers.
        CognitoIdentityProviders:
          $ref: "#/components/schemas/CognitoIdentityProviderList"
          description: A list representing an Amazon Cognito user pool and its client ID.
        SamlProviderARNs:
          $ref: "#/components/schemas/SAMLProviderList"
          description: An array of Amazon Resource Names (ARNs) of the SAML provider for your identity pool.
        IdentityPoolTags:
          type: object
          properties: {}
          description: The tags that are assigned to the identity pool. A tag is a label that you can apply to identity pools to categorize and manage them in different ways, such as by purpose, owner, environment, or other criteria.
      required:
        - IdentityPoolId
        - IdentityPoolName
        - AllowUnauthenticatedIdentities
    IdentityPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+:[0-9a-f-]+"
    IdentityIdList:
      type: array
      items:
        $ref: "#/components/schemas/IdentityId"
    IdentityId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+:[0-9a-f-]+"
    DeleteIdentitiesResponse:
      description: Returned in response to a successful DeleteIdentities operation.
      type: object
      properties:
        UnprocessedIdentityIds:
          $ref: "#/components/schemas/UnprocessedIdentityIdList"
          description: An array of UnprocessedIdentityId objects, each of which contains an ErrorCode and IdentityId.
    UnprocessedIdentityIdList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedIdentityId"
    UnprocessedIdentityId:
      description: An array of UnprocessedIdentityId objects, each of which contains an ErrorCode and IdentityId.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code indicating the type of error that occurred.
    ErrorCode:
      type: string
      enum:
        - AccessDenied
        - InternalServerError
    IdentityDescription:
      description: A description of the identity.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
        Logins:
          $ref: "#/components/schemas/LoginsList"
          description: The provider names.
        CreationDate:
          $ref: "#/components/schemas/DateType"
          description: Date on which the identity was created.
        LastModifiedDate:
          $ref: "#/components/schemas/DateType"
          description: Date on which the identity was last modified.
    LoginsList:
      type: array
      items:
        $ref: "#/components/schemas/IdentityProviderName"
    IdentityProviderName:
      type: string
      minLength: 1
      maxLength: 128
    DateType:
      type: string
      format: date-time
    LoginsMap:
      type: object
      properties: {}
    GetCredentialsForIdentityResponse:
      description: Returned in response to a successful GetCredentialsForIdentity operation.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
        Credentials:
          $ref: "#/components/schemas/Credentials"
          description: Credentials for the provided identity ID.
    Credentials:
      description: Credentials for the provided identity ID.
      type: object
      properties:
        AccessKeyId:
          $ref: "#/components/schemas/AccessKeyString"
          description: The Access Key portion of the credentials.
        SecretKey:
          $ref: "#/components/schemas/SecretKeyString"
          description: The Secret Access Key portion of the credentials
        SessionToken:
          $ref: "#/components/schemas/SessionTokenString"
          description: The Session Token portion of the credentials
        Expiration:
          $ref: "#/components/schemas/DateType"
          description: The date at which these credentials will expire.
    AccessKeyString:
      type: string
    SecretKeyString:
      type: string
    SessionTokenString:
      type: string
    AccountId:
      type: string
      minLength: 1
      maxLength: 15
      pattern: \d+
    GetIdResponse:
      description: Returned in response to a GetId request.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
    GetIdentityPoolRolesResponse:
      description: Returned in response to a successful GetIdentityPoolRoles operation.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: An identity pool ID in the format REGION:GUID.
        Roles:
          type: object
          properties: {}
          description: The map of roles associated with this pool. Currently only authenticated and unauthenticated roles are supported.
        RoleMappings:
          type: object
          properties: {}
          description: How users for a specific identity provider are to mapped to roles. This is a String-to-RoleMapping object map. The string identifies the identity provider, for example, graph.facebook.com or cognito-idp.us-east-1.amazonaws.com/us-east-1_abcdefghi:app_client_id.
    GetOpenIdTokenResponse:
      description: Returned in response to a successful GetOpenIdToken request.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID. Note that the IdentityId returned may not match the one passed on input.
        Token:
          $ref: "#/components/schemas/OIDCToken"
          description: An OpenID token, valid for 10 minutes.
    OIDCToken:
      type: string
    PrincipalTags:
      type: object
      properties: {}
    TokenDuration:
      type: integer
      format: int64
      minimum: 1
      maximum: 86400
    GetOpenIdTokenForDeveloperIdentityResponse:
      description: Returned in response to a successful GetOpenIdTokenForDeveloperIdentity request.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
        Token:
          $ref: "#/components/schemas/OIDCToken"
          description: An OpenID token.
    GetPrincipalTagAttributeMapResponse:
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: You can use this operation to get the ID of the Identity Pool you setup attribute mappings for.
        IdentityProviderName:
          $ref: "#/components/schemas/IdentityProviderName"
          description: You can use this operation to get the provider name.
        UseDefaults:
          $ref: "#/components/schemas/UseDefaults"
          description: You can use this operation to list
        PrincipalTags:
          type: object
          properties: {}
          description: You can use this operation to add principal tags. The PrincipalTagsoperation enables you to reference user attributes in your IAM permissions policy.
    UseDefaults:
      type: boolean
    QueryLimit:
      type: integer
      minimum: 1
      maximum: 60
    PaginationKey:
      type: string
      minLength: 1
      maxLength: 65535
      pattern: "[\\S]+"
    HideDisabled:
      type: boolean
    ListIdentitiesResponse:
      description: The response to a ListIdentities request.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: An identity pool ID in the format REGION:GUID.
        Identities:
          $ref: "#/components/schemas/IdentitiesList"
          description: An object containing a set of identities and associated mappings.
        NextToken:
          $ref: "#/components/schemas/PaginationKey"
          description: A pagination token.
    IdentitiesList:
      type: array
      items:
        $ref: "#/components/schemas/IdentityDescription"
    ListIdentityPoolsResponse:
      description: The result of a successful ListIdentityPools action.
      type: object
      properties:
        IdentityPools:
          $ref: "#/components/schemas/IdentityPoolsList"
          description: The identity pools returned by the ListIdentityPools action.
        NextToken:
          $ref: "#/components/schemas/PaginationKey"
          description: A pagination token.
    IdentityPoolsList:
      type: array
      items:
        $ref: "#/components/schemas/IdentityPoolShortDescription"
    IdentityPoolShortDescription:
      description: A description of the identity pool.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: An identity pool ID in the format REGION:GUID.
        IdentityPoolName:
          $ref: "#/components/schemas/IdentityPoolName"
          description: A string that you provide.
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The tags that are assigned to the identity pool.
    DeveloperUserIdentifier:
      type: string
      minLength: 1
      maxLength: 1024
    LookupDeveloperIdentityResponse:
      description: Returned in response to a successful LookupDeveloperIdentity action.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
        DeveloperUserIdentifierList:
          $ref: "#/components/schemas/DeveloperUserIdentifierList"
          description: This is the list of developer user identifiers associated with an identity ID. Cognito supports the association of multiple developer user identifiers with an identity ID.
        NextToken:
          $ref: "#/components/schemas/PaginationKey"
          description: A pagination token. The first call you make will have NextToken set to null. After that the service will return NextToken values as needed. For example, let's say you make a request with MaxResults set to 10, and there are 20 matches in the database. The service will return a pagination token as a part of the response. This token can be used to call the API again and get results starting from the 11th match.
    DeveloperUserIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/DeveloperUserIdentifier"
    MergeDeveloperIdentitiesResponse:
      description: Returned in response to a successful MergeDeveloperIdentities action.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A unique identifier in the format REGION:GUID.
    RolesMap:
      type: object
      properties: {}
    RoleMappingMap:
      type: object
      properties: {}
    SetPrincipalTagAttributeMapResponse:
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: The ID of the Identity Pool you want to set attribute mappings for.
        IdentityProviderName:
          $ref: "#/components/schemas/IdentityProviderName"
          description: The provider name you want to use for attribute mappings.
        UseDefaults:
          $ref: "#/components/schemas/UseDefaults"
          description: You can use this operation to select default (username and clientID) attribute mappings.
        PrincipalTags:
          type: object
          properties: {}
          description: You can use this operation to add principal tags. The PrincipalTagsoperation enables you to reference user attributes in your IAM permissions policy.
    TagResourceResponse:
      type: object
    IdentityPoolTagsListType:
      type: array
      items:
        $ref: "#/components/schemas/TagKeysType"
    TagKeysType:
      type: string
      minLength: 1
      maxLength: 128
    UntagResourceResponse:
      type: object
