openapi: 3.0.0
info:
  version: "2021-01-01"
  title: Amazon MemoryDB
  description: Amazon MemoryDB
  x-serviceName: memorydb
  x-serviceAlias: memorydb
  x-protocol: json
  x-apiVersion: "2021-01-01"
  x-endpointPrefix: memory-db
  x-targetPrefix: AmazonMemoryDB
  x-jsonVersion: "1.1"
servers:
  - url: https://memory-db.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for memorydb
paths:
  /BatchUpdateCluster:
    post:
      operationId: BatchUpdateCluster
      description: Apply the service update to a list of clusters supplied. For more information on service updates and applying them, see Applying the service updates.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.BatchUpdateCluster
            default: AmazonMemoryDB.BatchUpdateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterNames:
                  $ref: "#/components/schemas/ClusterNameList"
                  description: The cluster names to apply the updates.
                ServiceUpdate:
                  $ref: "#/components/schemas/ServiceUpdateRequest"
                  description: The unique ID of the service update
              required:
                - ClusterNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateClusterResponse"
  /CopySnapshot:
    post:
      operationId: CopySnapshot
      description: Makes a copy of an existing snapshot.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CopySnapshot
            default: AmazonMemoryDB.CopySnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SourceSnapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of an existing snapshot from which to make a copy.
                TargetSnapshotName:
                  $ref: "#/components/schemas/String"
                  description: A name for the snapshot copy. MemoryDB does not permit overwriting a snapshot, therefore this name must be unique within its context - MemoryDB or an Amazon S3 bucket if exporting.
                TargetBucket:
                  $ref: "#/components/schemas/TargetBucket"
                  description: "The Amazon S3 bucket to which the snapshot is exported. This parameter is used only when exporting a snapshot for external access. When using this parameter to export a snapshot, be sure MemoryDB has the needed permissions to this S3 bucket. For more information, see Step 2: Grant MemoryDB Access to Your Amazon S3 Bucket."
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The ID of the KMS key used to encrypt the target snapshot.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
              required:
                - SourceSnapshotName
                - TargetSnapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopySnapshotResponse"
  /CreateACL:
    post:
      operationId: CreateACL
      description: Creates an Access Control List. For more information, see Authenticating users with Access Contol Lists (ACLs).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateACL
            default: AmazonMemoryDB.CreateACL
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ACLName:
                  $ref: "#/components/schemas/String"
                  description: The name of the Access Control List.
                UserNames:
                  $ref: "#/components/schemas/UserNameListInput"
                  description: The list of users that belong to the Access Control List.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
              required:
                - ACLName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateACLResponse"
  /CreateCluster:
    post:
      operationId: CreateCluster
      description: Creates a cluster. All nodes in the cluster run the same protocol-compliant engine software.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateCluster
            default: AmazonMemoryDB.CreateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the cluster. This value must be unique as it also serves as the cluster identifier.
                NodeType:
                  $ref: "#/components/schemas/String"
                  description: The compute and memory capacity of the nodes in the cluster.
                MultiRegionClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the multi-Region cluster to be created.
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group associated with the cluster.
                Description:
                  $ref: "#/components/schemas/String"
                  description: An optional description of the cluster.
                NumShards:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of shards the cluster will contain. The default value is 1.
                NumReplicasPerShard:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of replicas to apply to each shard. The default value is 1. The maximum is 5.
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the subnet group to be used for the cluster.
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIdsList"
                  description: A list of security group names to associate with this cluster.
                MaintenanceWindow:
                  $ref: "#/components/schemas/String"
                  description: "Specifies the weekly time range during which maintenance on the cluster is performed. It is specified as a range in the format ddd:hh24:mi-ddd:hh24:mi (24H Clock UTC). The minimum maintenance window is a 60 minute period. Valid values for ddd are: sun mon tue wed thu fri sat Example: sun:23:00-mon:01:30"
                Port:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The port number on which each of the nodes accepts connections.
                SnsTopicArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the Amazon Simple Notification Service (SNS) topic to which notifications are sent.
                TLSEnabled:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: A flag to enable in-transit encryption on the cluster.
                KmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the KMS key used to encrypt the cluster.
                SnapshotArns:
                  $ref: "#/components/schemas/SnapshotArnsList"
                  description: A list of Amazon Resource Names (ARN) that uniquely identify the RDB snapshot files stored in Amazon S3. The snapshot files are used to populate the new cluster. The Amazon S3 object name in the ARN cannot contain any commas.
                SnapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of a snapshot from which to restore data into the new cluster. The snapshot status changes to restoring while the new cluster is being created.
                SnapshotRetentionLimit:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of days for which MemoryDB retains automatic snapshots before deleting them. For example, if you set SnapshotRetentionLimit to 5, a snapshot that was taken today is retained for 5 days before being deleted.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "A list of tags to be added to this resource. Tags are comma-separated key,value pairs (e.g. Key=myKey, Value=myKeyValue. You can include multiple tags as shown following: Key=myKey, Value=myKeyValue Key=mySecondKey, Value=mySecondKeyValue."
                SnapshotWindow:
                  $ref: "#/components/schemas/String"
                  description: "The daily time range (in UTC) during which MemoryDB begins taking a daily snapshot of your shard. Example: 05:00-09:00 If you do not specify this parameter, MemoryDB automatically chooses an appropriate time range."
                ACLName:
                  $ref: "#/components/schemas/ACLName"
                  description: The name of the Access Control List to associate with the cluster.
                Engine:
                  $ref: "#/components/schemas/String"
                  description: The name of the engine to be used for the cluster.
                EngineVersion:
                  $ref: "#/components/schemas/String"
                  description: The version number of the Redis OSS engine to be used for the cluster.
                AutoMinorVersionUpgrade:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: When set to true, the cluster will automatically receive minor engine version upgrades after launch.
                DataTiering:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Enables data tiering. Data tiering is only supported for clusters using the r6gd node type. This parameter must be set when using r6gd nodes. For more information, see Data tiering.
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: Specifies the IP address type for the cluster. Valid values are 'ipv4', 'ipv6', or 'dual_stack'. When set to 'ipv4', the cluster will only be accessible via IPv4 addresses. When set to 'ipv6', the cluster will only be accessible via IPv6 addresses. When set to 'dual_stack', the cluster will be accessible via both IPv4 and IPv6 addresses. If not specified, the default is 'ipv4'.
                IpDiscovery:
                  $ref: "#/components/schemas/IpDiscovery"
                  description: The mechanism for discovering IP addresses for the cluster discovery protocol. Valid values are 'ipv4' or 'ipv6'. When set to 'ipv4', cluster discovery functions such as cluster slots, cluster shards, and cluster nodes return IPv4 addresses for cluster nodes. When set to 'ipv6', the cluster discovery functions return IPv6 addresses for cluster nodes. The value must be compatible with the NetworkType parameter. If not specified, the default is 'ipv4'.
              required:
                - ClusterName
                - NodeType
                - ACLName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
  /CreateMultiRegionCluster:
    post:
      operationId: CreateMultiRegionCluster
      description: Creates a new multi-Region cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateMultiRegionCluster
            default: AmazonMemoryDB.CreateMultiRegionCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MultiRegionClusterNameSuffix:
                  $ref: "#/components/schemas/String"
                  description: A suffix to be added to the Multi-Region cluster name. Amazon MemoryDB automatically applies a prefix to the Multi-Region cluster Name when it is created. Each Amazon Region has its own prefix. For instance, a Multi-Region cluster Name created in the US-West-1 region will begin with "virxk", along with the suffix name you provide. The suffix guarantees uniqueness of the Multi-Region cluster name across multiple regions.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description for the multi-Region cluster.
                Engine:
                  $ref: "#/components/schemas/String"
                  description: The name of the engine to be used for the multi-Region cluster.
                EngineVersion:
                  $ref: "#/components/schemas/String"
                  description: The version of the engine to be used for the multi-Region cluster.
                NodeType:
                  $ref: "#/components/schemas/String"
                  description: The node type to be used for the multi-Region cluster.
                MultiRegionParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the multi-Region parameter group to be associated with the cluster.
                NumShards:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of shards for the multi-Region cluster.
                TLSEnabled:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Whether to enable TLS encryption for the multi-Region cluster.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be applied to the multi-Region cluster.
              required:
                - MultiRegionClusterNameSuffix
                - NodeType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMultiRegionClusterResponse"
  /CreateParameterGroup:
    post:
      operationId: CreateParameterGroup
      description: Creates a new MemoryDB parameter group. A parameter group is a collection of parameters and their values that are applied to all of the nodes in any cluster. For more information, see Configuring engine parameters using parameter groups.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateParameterGroup
            default: AmazonMemoryDB.CreateParameterGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group.
                Family:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group family that the parameter group can be used with.
                Description:
                  $ref: "#/components/schemas/String"
                  description: An optional description of the parameter group.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
              required:
                - ParameterGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateParameterGroupResponse"
  /CreateSnapshot:
    post:
      operationId: CreateSnapshot
      description: Creates a copy of an entire cluster at a specific moment in time.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateSnapshot
            default: AmazonMemoryDB.CreateSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The snapshot is created from this cluster.
                SnapshotName:
                  $ref: "#/components/schemas/String"
                  description: A name for the snapshot being created.
                KmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the KMS key used to encrypt the snapshot.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
              required:
                - ClusterName
                - SnapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotResponse"
  /CreateSubnetGroup:
    post:
      operationId: CreateSubnetGroup
      description: Creates a subnet group. A subnet group is a collection of subnets (typically private) that you can designate for your clusters running in an Amazon Virtual Private Cloud (VPC) environment. When you create a cluster in an Amazon VPC, you must specify a subnet group. MemoryDB uses that subnet group to choose a subnet and IP addresses within that subnet to associate with your nodes. For more information, see Subnets and subnet groups.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateSubnetGroup
            default: AmazonMemoryDB.CreateSubnetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the subnet group.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A description for the subnet group.
                SubnetIds:
                  $ref: "#/components/schemas/SubnetIdentifierList"
                  description: A list of VPC subnet IDs for the subnet group.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
              required:
                - SubnetGroupName
                - SubnetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubnetGroupResponse"
  /CreateUser:
    post:
      operationId: CreateUser
      description: Creates a MemoryDB user. For more information, see Authenticating users with Access Contol Lists (ACLs).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.CreateUser
            default: AmazonMemoryDB.CreateUser
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserName:
                  $ref: "#/components/schemas/UserName"
                  description: The name of the user. This value must be unique as it also serves as the user identifier.
                AuthenticationMode:
                  $ref: "#/components/schemas/AuthenticationMode"
                  description: Denotes the user's authentication properties, such as whether it requires a password to authenticate.
                AccessString:
                  $ref: "#/components/schemas/AccessString"
                  description: Access permissions string used for this user.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to be added to this resource. A tag is a key-value pair. A tag key must be accompanied by a tag value, although null is accepted.
              required:
                - UserName
                - AuthenticationMode
                - AccessString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
  /DeleteACL:
    post:
      operationId: DeleteACL
      description: Deletes an Access Control List. The ACL must first be disassociated from the cluster before it can be deleted. For more information, see Authenticating users with Access Contol Lists (ACLs).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteACL
            default: AmazonMemoryDB.DeleteACL
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ACLName:
                  $ref: "#/components/schemas/String"
                  description: The name of the Access Control List to delete.
              required:
                - ACLName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteACLResponse"
  /DeleteCluster:
    post:
      operationId: DeleteCluster
      description: Deletes a cluster. It also deletes all associated nodes and node endpoints. CreateSnapshot permission is required to create a final snapshot. Without this permission, the API call will fail with an Access Denied exception.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteCluster
            default: AmazonMemoryDB.DeleteCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the cluster to be deleted
                MultiRegionClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the multi-Region cluster to be deleted.
                FinalSnapshotName:
                  $ref: "#/components/schemas/String"
                  description: The user-supplied name of a final cluster snapshot. This is the unique name that identifies the snapshot. MemoryDB creates the snapshot, and then deletes the cluster immediately afterward.
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterResponse"
  /DeleteMultiRegionCluster:
    post:
      operationId: DeleteMultiRegionCluster
      description: Deletes an existing multi-Region cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteMultiRegionCluster
            default: AmazonMemoryDB.DeleteMultiRegionCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MultiRegionClusterName:
                  $ref: "#/components/schemas/String"
                  description: The name of the multi-Region cluster to be deleted.
              required:
                - MultiRegionClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMultiRegionClusterResponse"
  /DeleteParameterGroup:
    post:
      operationId: DeleteParameterGroup
      description: Deletes the specified parameter group. You cannot delete a parameter group if it is associated with any clusters. You cannot delete the default parameter groups in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteParameterGroup
            default: AmazonMemoryDB.DeleteParameterGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group to delete.
              required:
                - ParameterGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteParameterGroupResponse"
  /DeleteSnapshot:
    post:
      operationId: DeleteSnapshot
      description: Deletes an existing snapshot. When you receive a successful response from this operation, MemoryDB immediately begins deleting the snapshot; you cannot cancel or revert this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteSnapshot
            default: AmazonMemoryDB.DeleteSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SnapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of the snapshot to delete.
              required:
                - SnapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSnapshotResponse"
  /DeleteSubnetGroup:
    post:
      operationId: DeleteSubnetGroup
      description: Deletes a subnet group. You cannot delete a default subnet group or one that is associated with any clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteSubnetGroup
            default: AmazonMemoryDB.DeleteSubnetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubnetGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the subnet group to delete.
              required:
                - SubnetGroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubnetGroupResponse"
  /DeleteUser:
    post:
      operationId: DeleteUser
      description: Deletes a user. The user will be removed from all ACLs and in turn removed from all clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DeleteUser
            default: AmazonMemoryDB.DeleteUser
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserName:
                  $ref: "#/components/schemas/UserName"
                  description: The name of the user to delete
              required:
                - UserName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserResponse"
  /DescribeACLs:
    post:
      operationId: DescribeACLs
      description: Returns a list of ACLs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DescribeACLs
            default: AmazonMemoryDB.DescribeACLs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ACLName:
                  $ref: "#/components/schemas/String"
                  description: The name of the ACL.
                MaxResults:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The maximum number of records to include in the response. If more records exist than the specified MaxResults value, a token is included in the response so that the remaining results can be retrieved.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: An optional argument to pass in case the total number of records exceeds the value of MaxResults. If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeACLsResponse"
  /DescribeClusters:
    post:
      operationId: DescribeClusters
      description: Returns information about all provisioned clusters if no cluster identifier is specified, or about a specific cluster if a cluster name is supplied.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.DescribeClusters
            default: AmazonMemoryDB.DescribeClusters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
