                NodeType:
                  $ref: "#/components/schemas/String"
                  description: The new node type to be used for the multi-Region cluster.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A new description for the multi-Region cluster.
                EngineVersion:
                  $ref: "#/components/schemas/String"
                  description: The new engine version to be used for the multi-Region cluster.
                ShardConfiguration:
                  $ref: "#/components/schemas/ShardConfigurationRequest"
                MultiRegionParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The new multi-Region parameter group to be associated with the cluster.
                UpdateStrategy:
                  $ref: "#/components/schemas/UpdateStrategy"
                  description: The strategy to use for the update operation. Supported values are "coordinated" or "uncoordinated".
              required:
                - MultiRegionClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMultiRegionClusterResponse"
  /UpdateParameterGroup:
    post:
      operationId: UpdateParameterGroup
      description: Updates the parameters of a parameter group. You can modify up to 20 parameters in a single request by submitting a list parameter name and value pairs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonMemoryDB.UpdateParameterGroup
            default: AmazonMemoryDB.UpdateParameterGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ParameterGroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the parameter group to update.
                ParameterNameValues:
                  $ref: "#/components/schemas/ParameterNameValueList"
                  description: An array of parameter names and values for the parameter update. You must supply at least one parameter name and value; subsequent arguments are optional. A maximum of 20 parameters may be updated per request.
              required:
                - ParameterGroupName
                - ParameterNameValues
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateParameterGroupResponse"
  /UpdateSubnetGroup:
    post:
      operationId: UpdateSubnetGroup
      description: Updates a subnet group. For more information, see Updating a subnet group
      parameters:
        - name: X-Amz-Target
