openapi: 3.0.0
info:
  version: "2022-11-30"
  title: Amazon VPC Lattice
  description: Amazon VPC Lattice
  x-serviceName: vpc-lattice
  x-serviceAlias: vpc_lattice
  x-protocol: rest-json
  x-apiVersion: "2022-11-30"
  x-endpointPrefix: vpc-lattice
servers:
  - url: https://vpc-lattice.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for vpc-lattice
paths:
  /services/{service_identifier}/listeners/{listener_identifier}/rules:
    patch:
      operationId: BatchUpdateRule
      description: "Updates the listener rules in a batch. You can use this operation to change the priority of listener rules. This can be useful when bulk updating or swapping rule priority. Required permissions: vpc-lattice:UpdateRule For more information, see How Amazon VPC Lattice works with IAM in the Amazon VPC Lattice User Guide."
      parameters:
        - name: service_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceIdentifier"
          description: The ID or ARN of the service.
        - name: listener_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ListenerIdentifier"
          description: The ID or ARN of the listener.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rules:
                  $ref: "#/components/schemas/RuleUpdateList"
              required:
                - rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateRuleResponse"
    post:
      operationId: CreateRule
      description: Creates a listener rule. Each listener has a default rule for checking connection requests, but you can define additional rules. Each rule consists of a priority, one or more actions, and one or more conditions. For more information, see Listener rules in the Amazon VPC Lattice User Guide.
      parameters:
        - name: service_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceIdentifier"
          description: The ID or ARN of the service.
        - name: listener_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ListenerIdentifier"
          description: The ID or ARN of the listener.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RuleName"
                match:
                  $ref: "#/components/schemas/RuleMatch"
                priority:
                  $ref: "#/components/schemas/RulePriority"
                action:
                  $ref: "#/components/schemas/RuleAction"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - match
                - priority
                - action
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRuleResponse"
    get:
      operationId: ListRules
      description: Lists the rules for the specified listener.
      parameters:
        - name: service_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceIdentifier"
          description: The ID or ARN of the service.
        - name: listener_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ListenerIdentifier"
          description: The ID or ARN of the listener.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRulesResponse"
  /accesslogsubscriptions:
    post:
      operationId: CreateAccessLogSubscription
      description: Enables access logs to be sent to Amazon CloudWatch, Amazon S3, and Amazon Kinesis Data Firehose. The service network owner can use the access logs to audit the services in the network. The service network owner can only see access logs from clients and services that are associated with their service network. Access log entries represent traffic originated from VPCs associated with that network. For more information, see Access logs in the Amazon VPC Lattice User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                resourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                destinationArn:
                  $ref: "#/components/schemas/AccessLogDestinationArn"
                serviceNetworkLogType:
                  $ref: "#/components/schemas/ServiceNetworkLogType"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - resourceIdentifier
                - destinationArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessLogSubscriptionResponse"
    get:
      operationId: ListAccessLogSubscriptions
      description: Lists the access log subscriptions for the specified service network or service.
      parameters:
        - name: resourceIdentifier
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdentifier"
          description: The ID or ARN of the service network or service.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessLogSubscriptionsResponse"
  /services/{service_identifier}/listeners:
    post:
      operationId: CreateListener
      description: Creates a listener for a service. Before you start using your Amazon VPC Lattice service, you must add one or more listeners. A listener is a process that checks for connection requests to your services. For more information, see Listeners in the Amazon VPC Lattice User Guide.
      parameters:
        - name: service_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceIdentifier"
          description: The ID or ARN of the service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ListenerName"
                protocol:
                  $ref: "#/components/schemas/ListenerProtocol"
                port:
                  $ref: "#/components/schemas/Port"
                defaultAction:
                  $ref: "#/components/schemas/RuleAction"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - protocol
                - defaultAction
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateListenerResponse"
    get:
      operationId: ListListeners
      description: Lists the listeners for the specified service.
      parameters:
        - name: service_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceIdentifier"
          description: The ID or ARN of the service.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListListenersResponse"
  /resourceconfigurations:
    post:
      operationId: CreateResourceConfiguration
      description: Creates a resource configuration. A resource configuration defines a specific resource. You can associate a resource configuration with a service network or a VPC endpoint.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceConfigurationName"
                type:
                  $ref: "#/components/schemas/ResourceConfigurationType"
                portRanges:
                  $ref: "#/components/schemas/PortRangeList"
                protocol:
                  $ref: "#/components/schemas/ProtocolType"
                resourceGatewayIdentifier:
                  $ref: "#/components/schemas/ResourceGatewayIdentifier"
                resourceConfigurationGroupIdentifier:
                  $ref: "#/components/schemas/ResourceConfigurationIdentifier"
                resourceConfigurationDefinition:
                  $ref: "#/components/schemas/ResourceConfigurationDefinition"
                allowAssociationToShareableServiceNetwork:
                  $ref: "#/components/schemas/Boolean"
                customDomainName:
                  $ref: "#/components/schemas/DomainName"
                groupDomain:
                  $ref: "#/components/schemas/DomainName"
                domainVerificationIdentifier:
                  $ref: "#/components/schemas/DomainVerificationIdentifier"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - type
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceConfigurationResponse"
    get:
      operationId: ListResourceConfigurations
      description: Lists the resource configurations owned by or shared with this account.
      parameters:
        - name: resourceGatewayIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceGatewayIdentifier"
          description: The ID of the resource gateway for the resource configuration.
        - name: resourceConfigurationGroupIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceConfigurationIdentifier"
          description: The ID of the resource configuration of type Group.
        - name: domainVerificationIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DomainVerificationIdentifier"
          description: The domain verification ID.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum page size.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceConfigurationsResponse"
  /resourcegateways:
    post:
      operationId: CreateResourceGateway
      description: A resource gateway is a point of ingress into the VPC where a resource resides. It spans multiple Availability Zones. For your resource to be accessible from all Availability Zones, you should create your resource gateways to span as many Availability Zones as possible. A VPC can have multiple resource gateways.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ResourceGatewayName"
                vpcIdentifier:
                  $ref: "#/components/schemas/VpcId"
                subnetIds:
                  $ref: "#/components/schemas/SubnetList"
                securityGroupIds:
                  $ref: "#/components/schemas/CreateResourceGatewayRequestSecurityGroupIdsList"
                ipAddressType:
                  $ref: "#/components/schemas/ResourceGatewayIpAddressType"
                ipv4AddressesPerEni:
                  $ref: "#/components/schemas/Ipv4AddressesPerEni"
                resourceConfigDnsResolution:
                  $ref: "#/components/schemas/ResourceConfigDnsResolution"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceGatewayResponse"
    get:
      operationId: ListResourceGateways
      description: Lists the resource gateways that you own or that were shared with you.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum page size.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If there are additional results, a pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceGatewaysResponse"
  /services:
    post:
      operationId: CreateService
      description: Creates a service. A service is any software application that can run on instances containers, or serverless functions within an account or virtual private cloud (VPC). For more information, see Services in the Amazon VPC Lattice User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ServiceName"
                tags:
                  $ref: "#/components/schemas/TagMap"
                customDomainName:
                  $ref: "#/components/schemas/ServiceCustomDomainName"
                certificateArn:
                  $ref: "#/components/schemas/CertificateArn"
                authType:
                  $ref: "#/components/schemas/AuthType"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceResponse"
    get:
      operationId: ListServices
      description: Lists the services owned by the caller account or shared with the caller account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServicesResponse"
  /servicenetworks:
    post:
      operationId: CreateServiceNetwork
      description: Creates a service network. A service network is a logical boundary for a collection of services. You can associate services and VPCs with a service network. For more information, see Service networks in the Amazon VPC Lattice User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ServiceNetworkName"
                authType:
                  $ref: "#/components/schemas/AuthType"
                tags:
                  $ref: "#/components/schemas/TagMap"
                sharingConfig:
                  $ref: "#/components/schemas/SharingConfig"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceNetworkResponse"
    get:
      operationId: ListServiceNetworks
      description: Lists the service networks owned by or shared with this account. The account ID in the ARN shows which account owns the service network.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceNetworksResponse"
  /servicenetworkresourceassociations:
    post:
      operationId: CreateServiceNetworkResourceAssociation
      description: Associates the specified service network with the specified resource configuration. This allows the resource configuration to receive connections through the service network, including through a service network VPC endpoint.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                resourceConfigurationIdentifier:
                  $ref: "#/components/schemas/ResourceConfigurationIdentifier"
                serviceNetworkIdentifier:
                  $ref: "#/components/schemas/ServiceNetworkIdentifierWithoutRegex"
                privateDnsEnabled:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - resourceConfigurationIdentifier
                - serviceNetworkIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceNetworkResourceAssociationResponse"
    get:
      operationId: ListServiceNetworkResourceAssociations
      description: Lists the associations between a service network and a resource configuration.
      parameters:
        - name: serviceNetworkIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ServiceNetworkIdentifier"
          description: The ID of the service network.
        - name: resourceConfigurationIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceConfigurationIdentifier"
          description: The ID of the resource configuration.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum page size.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If there are additional results, a pagination token for the next page of results.
        - name: includeChildren
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Include service network resource associations of the child resource configuration with the grouped resource configuration. The type is boolean and the default value is false.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceNetworkResourceAssociationsResponse"
  /servicenetworkserviceassociations:
    post:
      operationId: CreateServiceNetworkServiceAssociation
      description: Associates the specified service with the specified service network. For more information, see Manage service associations in the Amazon VPC Lattice User Guide. You can't use this operation if the service and service network are already associated or if there is a disassociation or deletion in progress. If the association fails, you can retry the operation by deleting the association and recreating it. You cannot associate a service and service network that are shared with a caller. The caller must own either the service or the service network. As a result of this operation, the association is created in the service network account and the association owner account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                serviceIdentifier:
                  $ref: "#/components/schemas/ServiceIdentifier"
                serviceNetworkIdentifier:
                  $ref: "#/components/schemas/ServiceNetworkIdentifier"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - serviceIdentifier
                - serviceNetworkIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceNetworkServiceAssociationResponse"
    get:
      operationId: ListServiceNetworkServiceAssociations
      description: Lists the associations between a service network and a service. You can filter the list either by service or service network. You must provide either the service network identifier or the service identifier. Every association in Amazon VPC Lattice has a unique Amazon Resource Name (ARN), such as when a service network is associated with a VPC or when a service is associated with a service network. If the association is for a resource is shared with another account, the association includes the local account ID as the prefix in the ARN.
      parameters:
        - name: serviceNetworkIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ServiceNetworkIdentifier"
          description: The ID or ARN of the service network.
        - name: serviceIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ServiceIdentifier"
          description: The ID or ARN of the service.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceNetworkServiceAssociationsResponse"
  /servicenetworkvpcassociations:
    post:
      operationId: CreateServiceNetworkVpcAssociation
      description: Associates a VPC with a service network. When you associate a VPC with the service network, it enables all the resources within that VPC to be clients and communicate with other services in the service network. For more information, see Manage VPC associations in the Amazon VPC Lattice User Guide. You can't use this operation if there is a disassociation in progress. If the association fails, retry by deleting the association and recreating it. As a result of this operation, the association gets created in the service network account and the VPC owner account. If you add a security group to the service network and VPC association, the association must continue to always have at least one security group. You can add or edit security groups at any time. However, to remove all security groups, you must first delete the association and recreate it without security groups.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                serviceNetworkIdentifier:
                  $ref: "#/components/schemas/ServiceNetworkIdentifier"
                vpcIdentifier:
                  $ref: "#/components/schemas/VpcId"
                privateDnsEnabled:
                  $ref: "#/components/schemas/Boolean"
                securityGroupIds:
                  $ref: "#/components/schemas/CreateServiceNetworkVpcAssociationRequestSecurityGroupIdsList"
                tags:
                  $ref: "#/components/schemas/TagMap"
                dnsOptions:
                  $ref: "#/components/schemas/DnsOptions"
              required:
                - serviceNetworkIdentifier
                - vpcIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceNetworkVpcAssociationResponse"
    get:
      operationId: ListServiceNetworkVpcAssociations
      description: Lists the associations between a service network and a VPC. You can filter the list either by VPC or service network. You must provide either the ID of the service network identifier or the ID of the VPC.
      parameters:
        - name: serviceNetworkIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ServiceNetworkIdentifier"
          description: The ID or ARN of the service network.
        - name: vpcIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VpcId"
          description: The ID or ARN of the VPC.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceNetworkVpcAssociationsResponse"
  /targetgroups:
    post:
      operationId: CreateTargetGroup
      description: Creates a target group. A target group is a collection of targets, or compute resources, that run your application or service. A target group can only be used by a single service. For more information, see Target groups in the Amazon VPC Lattice User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TargetGroupName"
                type:
                  $ref: "#/components/schemas/TargetGroupType"
                config:
                  $ref: "#/components/schemas/TargetGroupConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - type
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTargetGroupResponse"
    get:
      operationId: ListTargetGroups
      description: Lists your target groups. You can narrow your search by using the filters below in your request.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A pagination token for the next page of results.
        - name: vpcIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VpcId"
          description: The ID or ARN of the VPC.
        - name: targetGroupType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetGroupType"
          description: The target group type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTargetGroupsResponse"
  /accesslogsubscriptions/{access_log_subscription_identifier}:
    delete:
      operationId: DeleteAccessLogSubscription
      description: Deletes the specified access log subscription.
      parameters:
        - name: access_log_subscription_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessLogSubscriptionIdentifier"
          description: The ID or ARN of the access log subscription.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccessLogSubscriptionResponse"
    get:
      operationId: GetAccessLogSubscription
      description: Retrieves information about the specified access log subscription.
      parameters:
        - name: access_log_subscription_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessLogSubscriptionIdentifier"
          description: The ID or ARN of the access log subscription.
      responses:
        "200":
          description: Success
          content:
