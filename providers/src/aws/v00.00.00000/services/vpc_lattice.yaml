      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                domainName:
                  $ref: "#/components/schemas/DomainName"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - domainName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDomainVerificationResponse"
  /resourceendpointassociations:
