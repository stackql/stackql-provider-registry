openapi: 3.0.0
info:
  version: "2020-01-01"
  title: Amazon Macie 2
  description: Amazon Macie 2
  x-serviceName: macie2
  x-serviceAlias: macie2
  x-protocol: rest-json
  x-apiVersion: "2020-01-01"
  x-endpointPrefix: macie2
  x-jsonVersion: "1.1"
servers:
  - url: https://macie2.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for macie2
paths:
  /invitations/accept:
    post:
      operationId: AcceptInvitation
      description: Accepts an Amazon Macie membership invitation that was received from a specific account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                administratorAccountId:
                  $ref: "#/components/schemas/__string"
                invitationId:
                  $ref: "#/components/schemas/__string"
                masterAccount:
                  $ref: "#/components/schemas/__string"
              required:
                - invitationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInvitationResponse"
  /custom-data-identifiers/get:
    post:
      operationId: BatchGetCustomDataIdentifiers
      description: Retrieves information about one or more custom data identifiers.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCustomDataIdentifiersResponse"
  /automated-discovery/accounts:
    patch:
      operationId: BatchUpdateAutomatedDiscoveryAccounts
      description: Changes the status of automated sensitive data discovery for one or more accounts.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accounts:
                  $ref: "#/components/schemas/__listOfAutomatedDiscoveryAccountUpdate"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAutomatedDiscoveryAccountsResponse"
    get:
      operationId: ListAutomatedDiscoveryAccounts
      description: Retrieves the status of automated sensitive data discovery for one or more accounts.
      parameters:
        - name: accountIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: The Amazon Web Services account ID for each account, for as many as 50 accounts. To retrieve the status for multiple accounts, append the accountIds parameter and argument for each account, separated by an ampersand (&). To retrieve the status for all the accounts in an organization, omit this parameter.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to include in each page of a paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The nextToken string that specifies which page of results to return in a paginated response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomatedDiscoveryAccountsResponse"
  /allow-lists:
    post:
      operationId: CreateAllowList
      description: Creates and defines the settings for an allow list.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/__string"
                criteria:
                  $ref: "#/components/schemas/AllowListCriteria"
                description:
                  $ref: "#/components/schemas/__stringMin1Max512PatternSS"
                name:
                  $ref: "#/components/schemas/__stringMin1Max128Pattern"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - clientToken
                - criteria
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAllowListResponse"
    get:
      operationId: ListAllowLists
      description: Retrieves a subset of information about all the allow lists for an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to include in each page of a paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The nextToken string that specifies which page of results to return in a paginated response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAllowListsResponse"
  /jobs:
    post:
      operationId: CreateClassificationJob
      description: Creates and defines the settings for a classification job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                allowListIds:
                  $ref: "#/components/schemas/__listOf__string"
                clientToken:
                  $ref: "#/components/schemas/__string"
                customDataIdentifierIds:
                  $ref: "#/components/schemas/__listOf__string"
                description:
                  $ref: "#/components/schemas/__string"
                initialRun:
                  $ref: "#/components/schemas/__boolean"
                jobType:
                  $ref: "#/components/schemas/JobType"
                managedDataIdentifierIds:
                  $ref: "#/components/schemas/__listOf__string"
                managedDataIdentifierSelector:
                  $ref: "#/components/schemas/ManagedDataIdentifierSelector"
                name:
                  $ref: "#/components/schemas/__string"
                s3JobDefinition:
                  $ref: "#/components/schemas/S3JobDefinition"
                samplingPercentage:
                  $ref: "#/components/schemas/__integer"
                scheduleFrequency:
                  $ref: "#/components/schemas/JobScheduleFrequency"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - clientToken
                - jobType
                - name
                - s3JobDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClassificationJobResponse"
  /custom-data-identifiers:
    post:
      operationId: CreateCustomDataIdentifier
      description: Creates and defines the criteria and other settings for a custom data identifier.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/__string"
                description:
                  $ref: "#/components/schemas/__string"
                ignoreWords:
                  $ref: "#/components/schemas/__listOf__string"
                keywords:
                  $ref: "#/components/schemas/__listOf__string"
                maximumMatchDistance:
                  $ref: "#/components/schemas/__integer"
                name:
                  $ref: "#/components/schemas/__string"
                regex:
                  $ref: "#/components/schemas/__string"
                severityLevels:
                  $ref: "#/components/schemas/SeverityLevelList"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - regex
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomDataIdentifierResponse"
  /findingsfilters:
    post:
      operationId: CreateFindingsFilter
      description: Creates and defines the criteria and other settings for a findings filter.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  $ref: "#/components/schemas/FindingsFilterAction"
                clientToken:
                  $ref: "#/components/schemas/__string"
                description:
                  $ref: "#/components/schemas/__string"
                findingCriteria:
                  $ref: "#/components/schemas/FindingCriteria"
                name:
                  $ref: "#/components/schemas/__string"
                position:
                  $ref: "#/components/schemas/__integer"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - action
                - findingCriteria
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFindingsFilterResponse"
    get:
      operationId: ListFindingsFilters
      description: Retrieves a subset of information about all the findings filters for an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to include in each page of a paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The nextToken string that specifies which page of results to return in a paginated response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFindingsFiltersResponse"
  /invitations:
    post:
      operationId: CreateInvitations
      description: Sends an Amazon Macie membership invitation to one or more accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/__listOf__string"
                disableEmailNotification:
                  $ref: "#/components/schemas/__boolean"
                message:
                  $ref: "#/components/schemas/__string"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvitationsResponse"
    get:
      operationId: ListInvitations
      description: Retrieves information about Amazon Macie membership invitations that were received by an account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to include in each page of a paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The nextToken string that specifies which page of results to return in a paginated response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvitationsResponse"
  /members:
    post:
      operationId: CreateMember
      description: Associates an account with an Amazon Macie administrator account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  $ref: "#/components/schemas/AccountDetail"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - account
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMemberResponse"
    get:
      operationId: ListMembers
      description: Retrieves information about the accounts that are associated with an Amazon Macie administrator account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to include in each page of a paginated response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The nextToken string that specifies which page of results to return in a paginated response.
        - name: onlyAssociated
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifies which accounts to include in the response, based on the status of an account's relationship with the administrator account. By default, the response includes only current member accounts. To include all accounts, set this value to false.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembersResponse"
  /findings/sample:
    post:
      operationId: CreateSampleFindings
      description: Creates sample findings.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                findingTypes:
                  $ref: "#/components/schemas/__listOfFindingType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSampleFindingsResponse"
  /invitations/decline:
    post:
      operationId: DeclineInvitations
      description: Declines Amazon Macie membership invitations that were received from specific accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/__listOf__string"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeclineInvitationsResponse"
  /allow-lists/{id}:
    delete:
      operationId: DeleteAllowList
      description: Deletes an allow list.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
        - name: ignoreJobChecks
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifies whether to force deletion of the allow list, even if active classification jobs are configured to use the list. When you try to delete an allow list, Amazon Macie checks for classification jobs that use the list and have a status other than COMPLETE or CANCELLED. By default, Macie rejects your request if any jobs meet these criteria. To skip these checks and delete the list, set this value to true. To delete the list only if no active jobs are configured to use it, set this value to false.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllowListResponse"
    get:
      operationId: GetAllowList
      description: Retrieves the settings and status of an allow list.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllowListResponse"
    put:
      operationId: UpdateAllowList
      description: Updates the settings for an allow list.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                criteria:
                  $ref: "#/components/schemas/AllowListCriteria"
                description:
                  $ref: "#/components/schemas/__stringMin1Max512PatternSS"
                name:
                  $ref: "#/components/schemas/__stringMin1Max128Pattern"
              required:
                - criteria
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAllowListResponse"
  /custom-data-identifiers/{id}:
    delete:
      operationId: DeleteCustomDataIdentifier
      description: Soft deletes a custom data identifier.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomDataIdentifierResponse"
    get:
      operationId: GetCustomDataIdentifier
      description: Retrieves the criteria and other settings for a custom data identifier.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomDataIdentifierResponse"
  /findingsfilters/{id}:
    delete:
      operationId: DeleteFindingsFilter
      description: Deletes a findings filter.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFindingsFilterResponse"
    get:
      operationId: GetFindingsFilter
      description: Retrieves the criteria and other settings for a findings filter.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingsFilterResponse"
    patch:
      operationId: UpdateFindingsFilter
      description: Updates the criteria and other settings for a findings filter.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  $ref: "#/components/schemas/FindingsFilterAction"
                clientToken:
                  $ref: "#/components/schemas/__string"
                description:
                  $ref: "#/components/schemas/__string"
                findingCriteria:
                  $ref: "#/components/schemas/FindingCriteria"
                name:
                  $ref: "#/components/schemas/__string"
                position:
                  $ref: "#/components/schemas/__integer"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFindingsFilterResponse"
  /invitations/delete:
    post:
      operationId: DeleteInvitations
      description: Deletes Amazon Macie membership invitations that were received from specific accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/__listOf__string"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInvitationsResponse"
  /members/{id}:
    delete:
      operationId: DeleteMember
      description: Deletes the association between an Amazon Macie administrator account and an account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMemberResponse"
    get:
      operationId: GetMember
      description: Retrieves information about an account that's associated with an Amazon Macie administrator account.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Macie resource that the request applies to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMemberResponse"
  /datasources/s3:
    post:
      operationId: DescribeBuckets
      description: Retrieves (queries) statistical data and other information about one or more S3 buckets that Amazon Macie monitors and analyzes for an account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                criteria:
                  $ref: "#/components/schemas/BucketCriteria"
                maxResults:
                  $ref: "#/components/schemas/__integer"
                nextToken:
                  $ref: "#/components/schemas/__string"
                sortCriteria:
                  $ref: "#/components/schemas/BucketSortCriteria"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBucketsResponse"
  /jobs/{job_id}:
    get:
      operationId: DescribeClassificationJob
      description: Retrieves the status and settings for a classification job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the classification job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClassificationJobResponse"
    patch:
      operationId: UpdateClassificationJob
      description: Changes the status of a classification job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique identifier for the classification job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobStatus:
                  $ref: "#/components/schemas/JobStatus"
              required:
                - jobStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClassificationJobResponse"
  /admin/configuration:
    get:
      operationId: DescribeOrganizationConfiguration
      description: Retrieves the Amazon Macie configuration settings for an organization in Organizations.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOrganizationConfigurationResponse"
    patch:
      operationId: UpdateOrganizationConfiguration
      description: Updates the Amazon Macie configuration settings for an organization in Organizations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                autoEnable:
                  $ref: "#/components/schemas/__boolean"
              required:
                - autoEnable
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOrganizationConfigurationResponse"
  /macie:
    delete:
      operationId: DisableMacie
      description: Disables Amazon Macie and deletes all settings and resources for a Macie account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableMacieResponse"
    post:
      operationId: EnableMacie
      description: Enables Amazon Macie and specifies the configuration settings for a Macie account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/__string"
                findingPublishingFrequency:
                  $ref: "#/components/schemas/FindingPublishingFrequency"
                status:
                  $ref: "#/components/schemas/MacieStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableMacieResponse"
    get:
      operationId: GetMacieSession
      description: Retrieves the status and configuration settings for an Amazon Macie account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMacieSessionResponse"
    patch:
      operationId: UpdateMacieSession
      description: Suspends or re-enables Amazon Macie, or updates the configuration settings for a Macie account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                findingPublishingFrequency:
                  $ref: "#/components/schemas/FindingPublishingFrequency"
                status:
                  $ref: "#/components/schemas/MacieStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMacieSessionResponse"
  /admin:
    delete:
      operationId: DisableOrganizationAdminAccount
      description: Disables an account as the delegated Amazon Macie administrator account for an organization in Organizations.
      parameters:
        - name: adminAccountId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID of the delegated Amazon Macie administrator account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableOrganizationAdminAccountResponse"
    post:
      operationId: EnableOrganizationAdminAccount
      description: Designates an account as the delegated Amazon Macie administrator account for an organization in Organizations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adminAccountId:
                  $ref: "#/components/schemas/__string"
                clientToken:
                  $ref: "#/components/schemas/__string"
              required:
                - adminAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableOrganizationAdminAccountResponse"
    get:
      operationId: ListOrganizationAdminAccounts
      description: Retrieves information about the delegated Amazon Macie administrator account for an organization in Organizations.
      parameters:
