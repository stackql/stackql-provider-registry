    MatchingBucket:
      description: Provides statistical data and other information about an S3 bucket that Amazon Macie monitors and analyzes for your account. By default, object count and storage size values include data for object parts that are the result of incomplete multipart uploads. For more information, see How Macie monitors Amazon S3 data security in the Amazon Macie User Guide. If an error or issue prevents Macie from retrieving and processing information about the bucket or the bucket's objects, the value for many of these properties is null. Key exceptions are accountId and bucketName. To identify the cause, refer to the errorCode and errorMessage values.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that owns the bucket.
        automatedDiscoveryMonitoringStatus:
          $ref: "#/components/schemas/AutomatedDiscoveryMonitoringStatus"
          description: "Specifies whether automated sensitive data discovery is currently configured to analyze objects in the bucket. Possible values are: MONITORED, the bucket is included in analyses; and, NOT_MONITORED, the bucket is excluded from analyses. If automated sensitive data discovery is disabled for your account, this value is NOT_MONITORED."
