        $ref: "#/components/schemas/SuppressDataIdentifier"
    SuppressDataIdentifier:
      description: Specifies a custom data identifier or managed data identifier that detected a type of sensitive data to exclude from an S3 bucket's sensitivity score.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the custom data identifier or managed data identifier that detected the type of sensitive data to exclude from the score.
        type_:
          $ref: "#/components/schemas/DataIdentifierType"
          description: "The type of data identifier that detected the sensitive data. Possible values are: CUSTOM, for a custom data identifier; and, MANAGED, for a managed data identifier."
    UpdateResourceProfileDetectionsResponse:
      type: object
    UpdateRetrievalConfiguration:
      description: Specifies the access method and settings to use when retrieving occurrences of sensitive data reported by findings. If your request specifies an Identity and Access Management (IAM) role to assume, Amazon Macie verifies that the role exists and the attached policies are configured correctly. If there's an issue, Macie returns an error. For information about addressing the issue, see Configuration options for retrieving sensitive data samples in the Amazon Macie User Guide.
      type: object
      properties:
        retrievalMode:
          $ref: "#/components/schemas/RetrievalMode"
          description: "The access method to use when retrieving sensitive data from affected S3 objects. Valid values are: ASSUME_ROLE, assume an IAM role that is in the affected Amazon Web Services account and delegates access to Amazon Macie; and, CALLER_CREDENTIALS, use the credentials of the IAM user who requests the sensitive data. If you specify ASSUME_ROLE, also specify the name of an existing IAM role for Macie to assume (roleName). If you change this value from ASSUME_ROLE to CALLER_CREDENTIALS for an existing configuration, Macie permanently deletes the external ID and role name currently specified for the configuration. These settings can't be recovered after they're deleted."
        roleName:
          $ref: "#/components/schemas/__stringMin1Max64PatternW"
          description: The name of the IAM role that is in the affected Amazon Web Services account and Amazon Macie is allowed to assume when retrieving sensitive data from affected S3 objects for the account. The trust and permissions policies for the role must meet all requirements for Macie to assume the role.
      required:
        - retrievalMode
    UpdateRevealConfigurationResponse:
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/RevealConfiguration"
          description: The KMS key to use to encrypt the sensitive data, and the status of the configuration for the Amazon Macie account.
        retrievalConfiguration:
          $ref: "#/components/schemas/RetrievalConfiguration"
          description: The access method and settings to use when retrieving the sensitive data.
    UpdateSensitivityInspectionTemplateResponse:
      type: object
