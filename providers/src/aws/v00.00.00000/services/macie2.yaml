    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    AcceptInvitationResponse:
      type: object
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    BatchGetCustomDataIdentifiersResponse:
      type: object
      properties:
        customDataIdentifiers:
          $ref: "#/components/schemas/__listOfBatchGetCustomDataIdentifierSummary"
          description: An array of objects, one for each custom data identifier that matches the criteria specified in the request.
        notFoundIdentifierIds:
          $ref: "#/components/schemas/__listOf__string"
          description: An array of custom data identifier IDs, one for each custom data identifier that was specified in the request but doesn't correlate to an existing custom data identifier.
    __listOfBatchGetCustomDataIdentifierSummary:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetCustomDataIdentifierSummary"
    BatchGetCustomDataIdentifierSummary:
      description: Provides information about a custom data identifier.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the custom data identifier.
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the custom data identifier was created.
        deleted:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the custom data identifier was deleted. If you delete a custom data identifier, Amazon Macie doesn't delete it permanently. Instead, it soft deletes the identifier.
        description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the custom data identifier.
        id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the custom data identifier.
        name:
          $ref: "#/components/schemas/__string"
          description: The custom name of the custom data identifier.
    __timestampIso8601:
      type: string
      format: date-time
    __boolean:
      type: boolean
    __listOfAutomatedDiscoveryAccountUpdate:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedDiscoveryAccountUpdate"
    AutomatedDiscoveryAccountUpdate:
      description: Changes the status of automated sensitive data discovery for an Amazon Macie account.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the account.
        status:
          $ref: "#/components/schemas/AutomatedDiscoveryAccountStatus"
          description: "The new status of automated sensitive data discovery for the account. Valid values are: ENABLED, perform automated sensitive data discovery activities for the account; and, DISABLED, don't perform automated sensitive data discovery activities for the account."
    AutomatedDiscoveryAccountStatus:
      description: "The status of automated sensitive data discovery for an Amazon Macie account. Valid values are:"
      type: string
      enum:
        - ENABLED
        - DISABLED
    BatchUpdateAutomatedDiscoveryAccountsResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/__listOfAutomatedDiscoveryAccountUpdateError"
          description: An array of objects, one for each account whose status wasn't changed. Each object identifies the account and explains why the status of automated sensitive data discovery wasn't changed for the account. This value is null if the request succeeded for all specified accounts.
    __listOfAutomatedDiscoveryAccountUpdateError:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedDiscoveryAccountUpdateError"
    AutomatedDiscoveryAccountUpdateError:
      description: Provides information about a request that failed to change the status of automated sensitive data discovery for an Amazon Macie account.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the account that the request applied to.
        errorCode:
          $ref: "#/components/schemas/AutomatedDiscoveryAccountUpdateErrorCode"
          description: "The error code for the error that caused the request to fail for the account (accountId). Possible values are: ACCOUNT_NOT_FOUND, the account doesn't exist or you're not the Amazon Macie administrator for the account; and, ACCOUNT_PAUSED, Macie isn't enabled for the account in the current Amazon Web Services Region."
    AutomatedDiscoveryAccountUpdateErrorCode:
      description: "The error code that indicates why a request failed to change the status of automated sensitive data discovery for an Amazon Macie account. Possible values are:"
      type: string
      enum:
        - ACCOUNT_PAUSED
        - ACCOUNT_NOT_FOUND
    AllowListCriteria:
      description: Specifies the criteria for an allow list. The criteria must specify a regular expression (regex) or an S3 object (s3WordsList). It can't specify both.
      type: object
      properties:
        regex:
          $ref: "#/components/schemas/__stringMin1Max512PatternSS"
          description: The regular expression (regex) that defines the text pattern to ignore. The expression can contain as many as 512 characters.
        s3WordsList:
          $ref: "#/components/schemas/S3WordsList"
          description: The location and name of the S3 object that lists specific text to ignore.
    __stringMin1Max512PatternSS:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[\s\S]+$
    S3WordsList:
      description: Provides information about an S3 object that lists specific text to ignore.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/__stringMin3Max255PatternAZaZ093255"
          description: The full name of the S3 bucket that contains the object.
        objectKey:
          $ref: "#/components/schemas/__stringMin1Max1024PatternSS"
          description: The full name (key) of the object.
      required:
        - bucketName
        - objectKey
    __stringMin3Max255PatternAZaZ093255:
      type: string
      minLength: 3
      maxLength: 255
      pattern: ^[A-Za-z0-9.\-_]{3,255}$
    __stringMin1Max1024PatternSS:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[\s\S]+$
    __stringMin1Max128Pattern:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^.+$
    TagMap:
      description: A string-to-string map of key-value pairs that specifies the tags (keys and values) for an Amazon Macie resource.
      type: object
      properties: {}
    CreateAllowListResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__stringMin71Max89PatternArnAwsAwsCnAwsUsGovMacie2AZ19920D12AllowListAZ0922"
          description: The Amazon Resource Name (ARN) of the allow list.
        id:
          $ref: "#/components/schemas/__stringMin22Max22PatternAZ0922"
          description: The unique identifier for the allow list.
    __stringMin71Max89PatternArnAwsAwsCnAwsUsGovMacie2AZ19920D12AllowListAZ0922:
      type: string
      minLength: 71
      maxLength: 89
      pattern: ^arn:(aws|aws-cn|aws-us-gov):macie2:[a-z1-9-]{9,20}:\d{12}:allow-list\/[a-z0-9]{22}$
    __stringMin22Max22PatternAZ0922:
      type: string
      minLength: 22
      maxLength: 22
      pattern: ^[a-z0-9]{22}$
    JobType:
      description: "The schedule for running a classification job. Valid values are:"
      type: string
      enum:
        - ONE_TIME
        - SCHEDULED
    ManagedDataIdentifierSelector:
      description: "The selection type that determines which managed data identifiers a classification job uses to analyze data. Valid values are:"
      type: string
      enum:
        - ALL
        - EXCLUDE
        - INCLUDE
        - NONE
        - RECOMMENDED
    S3JobDefinition:
      description: Specifies which S3 buckets contain the objects that a classification job analyzes, and the scope of that analysis. The bucket specification can be static (bucketDefinitions) or dynamic (bucketCriteria). If it's static, the job analyzes objects in the same predefined set of buckets each time the job runs. If it's dynamic, the job analyzes objects in any buckets that match the specified criteria each time the job starts to run.
      type: object
      properties:
        bucketCriteria:
          $ref: "#/components/schemas/S3BucketCriteriaForJob"
          description: The property- and tag-based conditions that determine which S3 buckets to include or exclude from the analysis. Each time the job runs, the job uses these criteria to determine which buckets contain objects to analyze. A job's definition can contain a bucketCriteria object or a bucketDefinitions array, not both.
        bucketDefinitions:
          $ref: "#/components/schemas/__listOfS3BucketDefinitionForJob"
          description: An array of objects, one for each Amazon Web Services account that owns specific S3 buckets to analyze. Each object specifies the account ID for an account and one or more buckets to analyze for that account. A job's definition can contain a bucketDefinitions array or a bucketCriteria object, not both.
        scoping:
          $ref: "#/components/schemas/Scoping"
          description: The property- and tag-based conditions that determine which S3 objects to include or exclude from the analysis. Each time the job runs, the job uses these criteria to determine which objects to analyze.
    S3BucketCriteriaForJob:
      description: Specifies property- and tag-based conditions that define criteria for including or excluding S3 buckets from a classification job. Exclude conditions take precedence over include conditions.
      type: object
      properties:
        excludes:
          $ref: "#/components/schemas/CriteriaBlockForJob"
          description: The property- and tag-based conditions that determine which buckets to exclude from the job.
        includes:
          $ref: "#/components/schemas/CriteriaBlockForJob"
          description: The property- and tag-based conditions that determine which buckets to include in the job.
    CriteriaBlockForJob:
      description: Specifies one or more property- and tag-based conditions that define criteria for including or excluding S3 buckets from a classification job.
      type: object
      properties:
        and:
          $ref: "#/components/schemas/__listOfCriteriaForJob"
          description: An array of conditions, one for each condition that determines which buckets to include or exclude from the job. If you specify more than one condition, Amazon Macie uses AND logic to join the conditions.
    __listOfCriteriaForJob:
      type: array
      items:
        $ref: "#/components/schemas/CriteriaForJob"
    CriteriaForJob:
      description: Specifies a property- or tag-based condition that defines criteria for including or excluding S3 buckets from a classification job.
      type: object
      properties:
        simpleCriterion:
          $ref: "#/components/schemas/SimpleCriterionForJob"
          description: A property-based condition that defines a property, operator, and one or more values for including or excluding buckets from the job.
        tagCriterion:
          $ref: "#/components/schemas/TagCriterionForJob"
          description: A tag-based condition that defines an operator and tag keys, tag values, or tag key and value pairs for including or excluding buckets from the job.
    SimpleCriterionForJob:
      description: Specifies a property-based condition that determines whether an S3 bucket is included or excluded from a classification job.
      type: object
      properties:
        comparator:
          $ref: "#/components/schemas/JobComparator"
          description: The operator to use in the condition. Valid values are EQ (equals) and NE (not equals).
        key:
          $ref: "#/components/schemas/SimpleCriterionKeyForJob"
          description: The property to use in the condition.
        values:
          $ref: "#/components/schemas/__listOf__string"
          description: "An array that lists one or more values to use in the condition. If you specify multiple values, Amazon Macie uses OR logic to join the values. Valid values for each supported property (key) are: ACCOUNT_ID - A string that represents the unique identifier for the Amazon Web Services account that owns the bucket. S3_BUCKET_EFFECTIVE_PERMISSION - A string that represents an enumerated value that Macie defines for the BucketPublicAccess.effectivePermission property of a bucket. S3_BUCKET_NAME - A string that represents the name of a bucket. S3_BUCKET_SHARED_ACCESS - A string that represents an enumerated value that Macie defines for the BucketMetadata.sharedAccess property of a bucket. Values are case sensitive. Also, Macie doesn't support use of partial values or wildcard characters in these values."
    JobComparator:
      description: "The operator to use in a condition. Depending on the type of condition, possible values are:"
      type: string
      enum:
        - EQ
        - GT
        - GTE
        - LT
        - LTE
        - NE
        - CONTAINS
        - STARTS_WITH
    SimpleCriterionKeyForJob:
      description: "The property to use in a condition that determines whether an S3 bucket is included or excluded from a classification job. Valid values are:"
      type: string
      enum:
        - ACCOUNT_ID
        - S3_BUCKET_NAME
        - S3_BUCKET_EFFECTIVE_PERMISSION
        - S3_BUCKET_SHARED_ACCESS
    TagCriterionForJob:
      description: Specifies a tag-based condition that determines whether an S3 bucket is included or excluded from a classification job.
      type: object
      properties:
        comparator:
          $ref: "#/components/schemas/JobComparator"
          description: The operator to use in the condition. Valid values are EQ (equals) and NE (not equals).
        tagValues:
          $ref: "#/components/schemas/__listOfTagCriterionPairForJob"
          description: The tag keys, tag values, or tag key and value pairs to use in the condition.
    __listOfTagCriterionPairForJob:
      type: array
      items:
        $ref: "#/components/schemas/TagCriterionPairForJob"
    TagCriterionPairForJob:
      description: Specifies a tag key, a tag value, or a tag key and value (as a pair) to use in a tag-based condition that determines whether an S3 bucket is included or excluded from a classification job. Tag keys and values are case sensitive. Also, Amazon Macie doesn't support use of partial values or wildcard characters in tag-based conditions.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/__string"
          description: The value for the tag key to use in the condition.
        value:
          $ref: "#/components/schemas/__string"
          description: The tag value to use in the condition.
    __listOfS3BucketDefinitionForJob:
      type: array
      items:
        $ref: "#/components/schemas/S3BucketDefinitionForJob"
    S3BucketDefinitionForJob:
      description: Specifies an Amazon Web Services account that owns S3 buckets for a classification job to analyze, and one or more specific buckets to analyze for that account.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that owns the buckets.
        buckets:
          $ref: "#/components/schemas/__listOf__string"
          description: An array that lists the names of the buckets.
      required:
        - accountId
        - buckets
    Scoping:
      description: Specifies one or more property- and tag-based conditions that define criteria for including or excluding S3 objects from a classification job. Exclude conditions take precedence over include conditions.
      type: object
      properties:
        excludes:
          $ref: "#/components/schemas/JobScopingBlock"
          description: The property- and tag-based conditions that determine which objects to exclude from the analysis.
        includes:
          $ref: "#/components/schemas/JobScopingBlock"
          description: The property- and tag-based conditions that determine which objects to include in the analysis.
    JobScopingBlock:
      description: Specifies one or more property- and tag-based conditions that define criteria for including or excluding S3 objects from a classification job.
      type: object
      properties:
        and:
          $ref: "#/components/schemas/__listOfJobScopeTerm"
          description: An array of conditions, one for each property- or tag-based condition that determines which objects to include or exclude from the job. If you specify more than one condition, Amazon Macie uses AND logic to join the conditions.
    __listOfJobScopeTerm:
      type: array
      items:
        $ref: "#/components/schemas/JobScopeTerm"
    JobScopeTerm:
      description: Specifies a property- or tag-based condition that defines criteria for including or excluding S3 objects from a classification job. A JobScopeTerm object can contain only one simpleScopeTerm object or one tagScopeTerm object.
      type: object
      properties:
        simpleScopeTerm:
          $ref: "#/components/schemas/SimpleScopeTerm"
          description: A property-based condition that defines a property, operator, and one or more values for including or excluding objects from the job.
        tagScopeTerm:
          $ref: "#/components/schemas/TagScopeTerm"
          description: A tag-based condition that defines the operator and tag keys or tag key and value pairs for including or excluding objects from the job.
    SimpleScopeTerm:
      description: Specifies a property-based condition that determines whether an S3 object is included or excluded from a classification job.
      type: object
      properties:
        comparator:
          $ref: "#/components/schemas/JobComparator"
          description: "The operator to use in the condition. Valid values for each supported property (key) are: OBJECT_EXTENSION - EQ (equals) or NE (not equals) OBJECT_KEY - STARTS_WITH OBJECT_LAST_MODIFIED_DATE - EQ (equals), GT (greater than), GTE (greater than or equals), LT (less than), LTE (less than or equals), or NE (not equals) OBJECT_SIZE - EQ (equals), GT (greater than), GTE (greater than or equals), LT (less than), LTE (less than or equals), or NE (not equals)"
        key:
          $ref: "#/components/schemas/ScopeFilterKey"
          description: The object property to use in the condition.
        values:
          $ref: "#/components/schemas/__listOf__string"
          description: "An array that lists the values to use in the condition. If the value for the key property is OBJECT_EXTENSION or OBJECT_KEY, this array can specify multiple values and Amazon Macie uses OR logic to join the values. Otherwise, this array can specify only one value. Valid values for each supported property (key) are: OBJECT_EXTENSION - A string that represents the file name extension of an object. For example: docx or pdf OBJECT_KEY - A string that represents the key prefix (folder name or path) of an object. For example: logs or awslogs/eventlogs. This value applies a condition to objects whose keys (names) begin with the specified value. OBJECT_LAST_MODIFIED_DATE - The date and time (in UTC and extended ISO 8601 format) when an object was created or last changed, whichever is latest. For example: 2023-09-24T14:31:13Z OBJECT_SIZE - An integer that represents the storage size (in bytes) of an object. Macie doesn't support use of wildcard characters in these values. Also, string values are case sensitive."
    ScopeFilterKey:
      description: "The property to use in a condition that determines whether an S3 object is included or excluded from a classification job. Valid values are:"
      type: string
      enum:
        - OBJECT_EXTENSION
        - OBJECT_LAST_MODIFIED_DATE
        - OBJECT_SIZE
        - OBJECT_KEY
    TagScopeTerm:
      description: Specifies a tag-based condition that determines whether an S3 object is included or excluded from a classification job.
      type: object
      properties:
        comparator:
          $ref: "#/components/schemas/JobComparator"
          description: The operator to use in the condition. Valid values are EQ (equals) or NE (not equals).
        key:
          $ref: "#/components/schemas/__string"
          description: The object property to use in the condition. The only valid value is TAG.
        tagValues:
          $ref: "#/components/schemas/__listOfTagValuePair"
          description: The tag keys or tag key and value pairs to use in the condition. To specify only tag keys in a condition, specify the keys in this array and set the value for each associated tag value to an empty string.
        target:
          $ref: "#/components/schemas/TagTarget"
          description: The type of object to apply the condition to.
    __listOfTagValuePair:
      type: array
      items:
        $ref: "#/components/schemas/TagValuePair"
    TagValuePair:
      description: Specifies a tag key or tag key and value pair to use in a tag-based condition that determines whether an S3 object is included or excluded from a classification job. Tag keys and values are case sensitive. Also, Amazon Macie doesn't support use of partial values or wildcard characters in tag-based conditions.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/__string"
          description: The value for the tag key to use in the condition.
        value:
          $ref: "#/components/schemas/__string"
          description: The tag value, associated with the specified tag key (key), to use in the condition. To specify only a tag key for a condition, specify the tag key for the key property and set this value to an empty string.
    TagTarget:
      description: "The type of object to apply a tag-based condition to. Valid values are:"
      type: string
      enum:
        - S3_OBJECT
    __integer:
      type: integer
    JobScheduleFrequency:
      description: Specifies the recurrence pattern for running a classification job.
      type: object
      properties:
        dailySchedule:
          $ref: "#/components/schemas/DailySchedule"
          description: Specifies a daily recurrence pattern for running the job.
        monthlySchedule:
          $ref: "#/components/schemas/MonthlySchedule"
          description: Specifies a monthly recurrence pattern for running the job.
        weeklySchedule:
          $ref: "#/components/schemas/WeeklySchedule"
          description: Specifies a weekly recurrence pattern for running the job.
    DailySchedule:
      description: Specifies that a classification job runs once a day, every day. This is an empty object.
      type: object
    MonthlySchedule:
      description: Specifies a monthly recurrence pattern for running a classification job.
      type: object
      properties:
        dayOfMonth:
          $ref: "#/components/schemas/__integer"
          description: The numeric day of the month when Amazon Macie runs the job. This value can be an integer from 1 through 31. If this value exceeds the number of days in a certain month, Macie doesn't run the job that month. Macie runs the job only during months that have the specified day. For example, if this value is 31 and a month has only 30 days, Macie doesn't run the job that month. To run the job every month, specify a value that's less than 29.
    WeeklySchedule:
      description: Specifies a weekly recurrence pattern for running a classification job.
      type: object
      properties:
        dayOfWeek:
          $ref: "#/components/schemas/DayOfWeek"
          description: The day of the week when Amazon Macie runs the job.
    DayOfWeek:
      type: string
      enum:
        - SUNDAY
        - MONDAY
        - TUESDAY
        - WEDNESDAY
        - THURSDAY
        - FRIDAY
        - SATURDAY
    CreateClassificationJobResponse:
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the job.
        jobId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the job.
    SeverityLevelList:
      description: "The severity to assign to findings that the custom data identifier produces, based on the number of occurrences of text that matches the custom data identifier's detection criteria. You can specify as many as three SeverityLevel objects in this array, one for each severity: LOW, MEDIUM, or HIGH. If you specify more than one, the occurrences thresholds must be in ascending order by severity, moving from LOW to HIGH. For example, 1 for LOW, 50 for MEDIUM, and 100 for HIGH. If an S3 object contains fewer occurrences than the lowest specified threshold, Amazon Macie doesn't create a finding. If you don't specify any values for this array, Macie creates findings for S3 objects that contain at least one occurrence of text that matches the detection criteria, and Macie automatically assigns the MEDIUM severity to those findings."
      type: array
      items:
        $ref: "#/components/schemas/SeverityLevel"
    SeverityLevel:
      description: Specifies a severity level for findings that a custom data identifier produces. A severity level determines which severity is assigned to the findings, based on the number of occurrences of text that match the custom data identifier's detection criteria.
      type: object
      properties:
        occurrencesThreshold:
          $ref: "#/components/schemas/__long"
          description: The minimum number of occurrences of text that must match the custom data identifier's detection criteria in order to produce a finding with the specified severity (severity).
        severity:
          $ref: "#/components/schemas/DataIdentifierSeverity"
          description: "The severity to assign to a finding: if the number of occurrences is greater than or equal to the specified threshold (occurrencesThreshold); and, if applicable, the number of occurrences is less than the threshold for the next consecutive severity level for the custom data identifier, moving from LOW to HIGH."
      required:
        - occurrencesThreshold
        - severity
    __long:
      type: integer
      format: int64
    DataIdentifierSeverity:
      description: "The severity of a finding, ranging from LOW, for least severe, to HIGH, for most severe. Valid values are:"
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    CreateCustomDataIdentifierResponse:
      type: object
      properties:
        customDataIdentifierId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the custom data identifier that was created.
    FindingsFilterAction:
      description: "The action to perform on findings that match the filter criteria. To suppress (automatically archive) findings that match the criteria, set this value to ARCHIVE. Valid values are:"
      type: string
      enum:
        - ARCHIVE
        - NOOP
    FindingCriteria:
      description: Specifies, as a map, one or more property-based conditions that filter the results of a query for findings.
      type: object
      properties:
        criterion:
          type: object
          properties: {}
          description: A condition that specifies the property, operator, and one or more values to use to filter the results.
    CreateFindingsFilterResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the filter that was created.
        id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the filter that was created.
    CreateInvitationsResponse:
      type: object
      properties:
        unprocessedAccounts:
          $ref: "#/components/schemas/__listOfUnprocessedAccount"
          description: An array of objects, one for each account whose invitation hasn't been processed. Each object identifies the account and explains why the invitation hasn't been processed for the account.
    __listOfUnprocessedAccount:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedAccount"
    UnprocessedAccount:
      description: Provides information about an account-related request that hasn't been processed.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the account that the request applies to.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The source of the issue or delay in processing the request.
        errorMessage:
          $ref: "#/components/schemas/__string"
          description: The reason why the request hasn't been processed.
    ErrorCode:
      description: "The source of an issue or delay. Possible values are:"
      type: string
      enum:
        - ClientError
        - InternalError
    AccountDetail:
      description: Specifies the details of an account to associate with an Amazon Macie administrator account.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the account.
        email:
          $ref: "#/components/schemas/__string"
          description: The email address for the account.
      required:
        - email
        - accountId
    CreateMemberResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the account that was associated with the administrator account.
    __listOfFindingType:
      type: array
      items:
        $ref: "#/components/schemas/FindingType"
    FindingType:
      description: "The type of finding. For details about each type, see Types of findings in the Amazon Macie User Guide. Possible values are:"
      type: string
      enum:
        - SensitiveData:S3Object/Multiple
        - SensitiveData:S3Object/Financial
        - SensitiveData:S3Object/Personal
        - SensitiveData:S3Object/Credentials
        - SensitiveData:S3Object/CustomIdentifier
