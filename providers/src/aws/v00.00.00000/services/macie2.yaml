    __listOfBucketMetadata:
      type: array
      items:
        $ref: "#/components/schemas/BucketMetadata"
    BucketMetadata:
      description: Provides statistical data and other information about an S3 bucket that Amazon Macie monitors and analyzes for your account. By default, object count and storage size values include data for object parts that are the result of incomplete multipart uploads. For more information, see How Macie monitors Amazon S3 data security in the Amazon Macie User Guide. If an error or issue prevents Macie from retrieving and processing metadata from Amazon S3 for the bucket or the bucket's objects, the value for the versioning property is false and the value for most other properties is null or UNKNOWN. Key exceptions are accountId, bucketArn, bucketCreatedAt, bucketName, lastUpdated, and region. To identify the cause, refer to the errorCode and errorMessage values.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that owns the bucket.
        allowsUnencryptedObjectUploads:
          $ref: "#/components/schemas/AllowsUnencryptedObjectUploads"
          description: "Specifies whether the bucket policy for the bucket requires server-side encryption of objects when objects are added to the bucket. Possible values are: FALSE - The bucket policy requires server-side encryption of new objects. PutObject requests must include a valid server-side encryption header. TRUE - The bucket doesn't have a bucket policy or it has a bucket policy that doesn't require server-side encryption of new objects. If a bucket policy exists, it doesn't require PutObject requests to include a valid server-side encryption header. UNKNOWN - Amazon Macie can't determine whether the bucket policy requires server-side encryption of new objects. Valid server-side encryption headers are: x-amz-server-side-encryption with a value of AES256 or aws:kms, and x-amz-server-side-encryption-customer-algorithm with a value of AES256."
        automatedDiscoveryMonitoringStatus:
          $ref: "#/components/schemas/AutomatedDiscoveryMonitoringStatus"
          description: "Specifies whether automated sensitive data discovery is currently configured to analyze objects in the bucket. Possible values are: MONITORED, the bucket is included in analyses; and, NOT_MONITORED, the bucket is excluded from analyses. If automated sensitive data discovery is disabled for your account, this value is NOT_MONITORED."
        bucketArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the bucket.
        bucketCreatedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the bucket was created. This value can also indicate when changes such as edits to the bucket's policy were most recently made to the bucket.
        bucketName:
          $ref: "#/components/schemas/__string"
          description: The name of the bucket.
        classifiableObjectCount:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie can analyze in the bucket. These objects use a supported storage class and have a file name extension for a supported file or storage format.
        classifiableSizeInBytes:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the objects that Amazon Macie can analyze in the bucket. These objects use a supported storage class and have a file name extension for a supported file or storage format. If versioning is enabled for the bucket, Macie calculates this value based on the size of the latest version of each applicable object in the bucket. This value doesn't reflect the storage size of all versions of each applicable object in the bucket.
        errorCode:
          $ref: "#/components/schemas/BucketMetadataErrorCode"
          description: "The code for an error or issue that prevented Amazon Macie from retrieving and processing information about the bucket and the bucket's objects. Possible values are: ACCESS_DENIED - Macie doesn't have permission to retrieve the information. For example, the bucket has a restrictive bucket policy and Amazon S3 denied the request. BUCKET_COUNT_EXCEEDS_QUOTA - Retrieving and processing the information would exceed the quota for the number of buckets that Macie monitors for an account (10,000). If this value is null, Macie was able to retrieve and process the information."
        errorMessage:
          $ref: "#/components/schemas/__string"
          description: A brief description of the error or issue (errorCode) that prevented Amazon Macie from retrieving and processing information about the bucket and the bucket's objects. This value is null if Macie was able to retrieve and process the information.
        jobDetails:
          $ref: "#/components/schemas/JobDetails"
          description: Specifies whether any one-time or recurring classification jobs are configured to analyze objects in the bucket, and, if so, the details of the job that ran most recently.
        lastAutomatedDiscoveryTime:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when Amazon Macie most recently analyzed objects in the bucket while performing automated sensitive data discovery. This value is null if this analysis hasn't occurred.
        lastUpdated:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when Amazon Macie most recently retrieved bucket or object metadata from Amazon S3 for the bucket.
        objectCount:
          $ref: "#/components/schemas/__long"
          description: The total number of objects in the bucket.
        objectCountByEncryptionType:
          $ref: "#/components/schemas/ObjectCountByEncryptionType"
          description: The total number of objects in the bucket, grouped by server-side encryption type. This includes a grouping that reports the total number of objects that aren't encrypted or use client-side encryption.
        publicAccess:
          $ref: "#/components/schemas/BucketPublicAccess"
          description: Specifies whether the bucket is publicly accessible due to the combination of permissions settings that apply to the bucket, and provides information about those settings.
        region:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services Region that hosts the bucket.
        replicationDetails:
          $ref: "#/components/schemas/ReplicationDetails"
          description: Specifies whether the bucket is configured to replicate one or more objects to buckets for other Amazon Web Services accounts and, if so, which accounts.
        sensitivityScore:
          $ref: "#/components/schemas/__integer"
          description: "The sensitivity score for the bucket, ranging from -1 (classification error) to 100 (sensitive). If automated sensitive data discovery has never been enabled for your account or it's been disabled for your organization or standalone account for more than 30 days, possible values are: 1, the bucket is empty; or, 50, the bucket stores objects but it's been excluded from recent analyses."
        serverSideEncryption:
          $ref: "#/components/schemas/BucketServerSideEncryption"
          description: The default server-side encryption settings for the bucket.
        sharedAccess:
          $ref: "#/components/schemas/SharedAccess"
          description: "Specifies whether the bucket is shared with another Amazon Web Services account, an Amazon CloudFront origin access identity (OAI), or a CloudFront origin access control (OAC). Possible values are: EXTERNAL - The bucket is shared with one or more of the following or any combination of the following: a CloudFront OAI, a CloudFront OAC, or an Amazon Web Services account that isn't part of your Amazon Macie organization. INTERNAL - The bucket is shared with one or more Amazon Web Services accounts that are part of your Amazon Macie organization. It isn't shared with a CloudFront OAI or OAC. NOT_SHARED - The bucket isn't shared with another Amazon Web Services account, a CloudFront OAI, or a CloudFront OAC. UNKNOWN - Amazon Macie wasn't able to evaluate the shared access settings for the bucket. An Amazon Macie organization is a set of Macie accounts that are centrally managed as a group of related accounts through Organizations or by Macie invitation."
        sizeInBytes:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the bucket. If versioning is enabled for the bucket, Amazon Macie calculates this value based on the size of the latest version of each object in the bucket. This value doesn't reflect the storage size of all versions of each object in the bucket.
        sizeInBytesCompressed:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the objects that are compressed (.gz, .gzip, .zip) files in the bucket. If versioning is enabled for the bucket, Amazon Macie calculates this value based on the size of the latest version of each applicable object in the bucket. This value doesn't reflect the storage size of all versions of each applicable object in the bucket.
        tags:
          $ref: "#/components/schemas/__listOfKeyValuePair"
          description: An array that specifies the tags (keys and values) that are associated with the bucket.
        unclassifiableObjectCount:
          $ref: "#/components/schemas/ObjectLevelStatistics"
          description: The total number of objects that Amazon Macie can't analyze in the bucket. These objects don't use a supported storage class or don't have a file name extension for a supported file or storage format.
        unclassifiableObjectSizeInBytes:
          $ref: "#/components/schemas/ObjectLevelStatistics"
          description: The total storage size, in bytes, of the objects that Amazon Macie can't analyze in the bucket. These objects don't use a supported storage class or don't have a file name extension for a supported file or storage format.
        versioning:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether versioning is enabled for the bucket.
    AllowsUnencryptedObjectUploads:
      type: string
      enum:
        - "TRUE"
        - "FALSE"
        - UNKNOWN
    AutomatedDiscoveryMonitoringStatus:
      description: "Specifies whether automated sensitive data discovery is currently configured to analyze objects in an S3 bucket. Possible values are:"
      type: string
      enum:
        - MONITORED
        - NOT_MONITORED
    BucketMetadataErrorCode:
      description: The code for an error or issue that prevented Amazon Macie from retrieving and processing information about an S3 bucket and the bucket's objects.
      type: string
      enum:
        - ACCESS_DENIED
        - BUCKET_COUNT_EXCEEDS_QUOTA
    JobDetails:
      description: Specifies whether any one-time or recurring classification jobs are configured to analyze objects in an S3 bucket, and, if so, the details of the job that ran most recently.
      type: object
      properties:
        isDefinedInJob:
          $ref: "#/components/schemas/IsDefinedInJob"
          description: "Specifies whether any one-time or recurring jobs are configured to analyze objects in the bucket. Possible values are: TRUE - The bucket is explicitly included in the bucket definition (S3BucketDefinitionForJob) for one or more jobs and at least one of those jobs has a status other than CANCELLED. Or the bucket matched the bucket criteria (S3BucketCriteriaForJob) for at least one job that previously ran. FALSE - The bucket isn't explicitly included in the bucket definition (S3BucketDefinitionForJob) for any jobs, all the jobs that explicitly include the bucket in their bucket definitions have a status of CANCELLED, or the bucket didn't match the bucket criteria (S3BucketCriteriaForJob) for any jobs that previously ran. UNKNOWN - An exception occurred when Amazon Macie attempted to retrieve job data for the bucket."
        isMonitoredByJob:
          $ref: "#/components/schemas/IsMonitoredByJob"
          description: "Specifies whether any recurring jobs are configured to analyze objects in the bucket. Possible values are: TRUE - The bucket is explicitly included in the bucket definition (S3BucketDefinitionForJob) for one or more recurring jobs or the bucket matches the bucket criteria (S3BucketCriteriaForJob) for one or more recurring jobs. At least one of those jobs has a status other than CANCELLED. FALSE - The bucket isn't explicitly included in the bucket definition (S3BucketDefinitionForJob) for any recurring jobs, the bucket doesn't match the bucket criteria (S3BucketCriteriaForJob) for any recurring jobs, or all the recurring jobs that are configured to analyze data in the bucket have a status of CANCELLED. UNKNOWN - An exception occurred when Amazon Macie attempted to retrieve job data for the bucket."
        lastJobId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the job that ran most recently and is configured to analyze objects in the bucket, either the latest run of a recurring job or the only run of a one-time job. This value is typically null if the value for the isDefinedInJob property is FALSE or UNKNOWN.
        lastJobRunTime:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the job (lastJobId) started. If the job is a recurring job, this value indicates when the most recent run started. This value is typically null if the value for the isDefinedInJob property is FALSE or UNKNOWN.
    IsDefinedInJob:
      type: string
      enum:
        - "TRUE"
        - "FALSE"
        - UNKNOWN
    IsMonitoredByJob:
      type: string
      enum:
        - "TRUE"
        - "FALSE"
        - UNKNOWN
    ObjectCountByEncryptionType:
      description: Provides information about the number of objects that are in an S3 bucket and use certain types of server-side encryption, use client-side encryption, or aren't encrypted.
      type: object
      properties:
        customerManaged:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that are encrypted with customer-provided keys. The objects use server-side encryption with customer-provided keys (SSE-C).
        kmsManaged:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that are encrypted with KMS keys, either Amazon Web Services managed keys or customer managed keys. The objects use dual-layer server-side encryption or server-side encryption with KMS keys (DSSE-KMS or SSE-KMS).
        s3Managed:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that are encrypted with Amazon S3 managed keys. The objects use server-side encryption with Amazon S3 managed keys (SSE-S3).
        unencrypted:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that use client-side encryption or aren't encrypted.
        unknown:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie doesn't have current encryption metadata for. Macie can't provide current data about the encryption settings for these objects.
    BucketPublicAccess:
      description: Provides information about the permissions settings that determine whether an S3 bucket is publicly accessible.
      type: object
      properties:
        effectivePermission:
          $ref: "#/components/schemas/EffectivePermission"
          description: "Specifies whether the bucket is publicly accessible due to the combination of permissions settings that apply to the bucket. Possible values are: NOT_PUBLIC - The bucket isn't publicly accessible. PUBLIC - The bucket is publicly accessible. UNKNOWN - Amazon Macie can't determine whether the bucket is publicly accessible."
        permissionConfiguration:
          $ref: "#/components/schemas/BucketPermissionConfiguration"
          description: The account-level and bucket-level permissions settings for the bucket.
    EffectivePermission:
      type: string
      enum:
        - PUBLIC
        - NOT_PUBLIC
        - UNKNOWN
    BucketPermissionConfiguration:
      description: Provides information about the account-level and bucket-level permissions settings for an S3 bucket.
      type: object
      properties:
        accountLevelPermissions:
          $ref: "#/components/schemas/AccountLevelPermissions"
          description: The account-level permissions settings that apply to the bucket.
        bucketLevelPermissions:
          $ref: "#/components/schemas/BucketLevelPermissions"
          description: The bucket-level permissions settings for the bucket.
    AccountLevelPermissions:
      description: Provides information about the account-level permissions settings that apply to an S3 bucket.
      type: object
      properties:
        blockPublicAccess:
          $ref: "#/components/schemas/BlockPublicAccess"
          description: The block public access settings for the Amazon Web Services account that owns the bucket.
    BlockPublicAccess:
      description: Provides information about the block public access settings for an S3 bucket. These settings can apply to a bucket at the account or bucket level. For detailed information about each setting, see Blocking public access to your Amazon S3 storage in the Amazon Simple Storage Service User Guide.
      type: object
      properties:
        blockPublicAcls:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether Amazon S3 blocks public access control lists (ACLs) for the bucket and objects in the bucket.
        blockPublicPolicy:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether Amazon S3 blocks public bucket policies for the bucket.
        ignorePublicAcls:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether Amazon S3 ignores public ACLs for the bucket and objects in the bucket.
        restrictPublicBuckets:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether Amazon S3 restricts public bucket policies for the bucket.
    BucketLevelPermissions:
      description: Provides information about the bucket-level permissions settings for an S3 bucket.
      type: object
      properties:
        accessControlList:
          $ref: "#/components/schemas/AccessControlList"
          description: The permissions settings of the access control list (ACL) for the bucket. This value is null if an ACL hasn't been defined for the bucket.
        blockPublicAccess:
          $ref: "#/components/schemas/BlockPublicAccess"
          description: The block public access settings for the bucket.
        bucketPolicy:
          $ref: "#/components/schemas/BucketPolicy"
          description: The permissions settings of the bucket policy for the bucket. This value is null if a bucket policy hasn't been defined for the bucket.
    AccessControlList:
      description: Provides information about the permissions settings of the bucket-level access control list (ACL) for an S3 bucket.
      type: object
      properties:
        allowsPublicReadAccess:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the ACL grants the general public with read access permissions for the bucket.
        allowsPublicWriteAccess:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the ACL grants the general public with write access permissions for the bucket.
    BucketPolicy:
      description: Provides information about the permissions settings of the bucket policy for an S3 bucket.
      type: object
      properties:
        allowsPublicReadAccess:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the bucket policy allows the general public to have read access to the bucket.
        allowsPublicWriteAccess:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the bucket policy allows the general public to have write access to the bucket.
    ReplicationDetails:
      description: Provides information about settings that define whether one or more objects in an S3 bucket are replicated to S3 buckets for other Amazon Web Services accounts and, if so, which accounts.
      type: object
      properties:
        replicated:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the bucket is configured to replicate one or more objects to any destination.
        replicatedExternally:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the bucket is configured to replicate one or more objects to a bucket for an Amazon Web Services account that isn't part of your Amazon Macie organization. An Amazon Macie organization is a set of Macie accounts that are centrally managed as a group of related accounts through Organizations or by Macie invitation.
        replicationAccounts:
          $ref: "#/components/schemas/__listOf__string"
          description: An array of Amazon Web Services account IDs, one for each Amazon Web Services account that owns a bucket that the bucket is configured to replicate one or more objects to.
    BucketServerSideEncryption:
      description: Provides information about the default server-side encryption settings for an S3 bucket. For detailed information about these settings, see Setting default server-side encryption behavior for Amazon S3 buckets in the Amazon Simple Storage Service User Guide.
      type: object
      properties:
        kmsMasterKeyId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) or unique identifier (key ID) for the KMS key that's used by default to encrypt objects that are added to the bucket. This value is null if the bucket is configured to use an Amazon S3 managed key to encrypt new objects.
        type_:
          $ref: "#/components/schemas/Type"
          description: "The server-side encryption algorithm that's used by default to encrypt objects that are added to the bucket. Possible values are: AES256 - New objects use SSE-S3 encryption. They're encrypted with an Amazon S3 managed key. aws:kms - New objects use SSE-KMS encryption. They're encrypted with an KMS key (kmsMasterKeyId), either an Amazon Web Services managed key or a customer managed key. aws:kms:dsse - New objects use DSSE-KMS encryption. They're encrypted with an KMS key (kmsMasterKeyId), either an Amazon Web Services managed key or a customer managed key. NONE - The bucket's default encryption settings don't specify server-side encryption behavior for new objects."
    Type:
      type: string
      enum:
        - NONE
        - AES256
        - aws:kms
        - aws:kms:dsse
    SharedAccess:
      type: string
      enum:
        - EXTERNAL
        - INTERNAL
        - NOT_SHARED
        - UNKNOWN
    __listOfKeyValuePair:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    KeyValuePair:
      description: Provides information about the tags that are associated with an S3 bucket or object. Each tag consists of a required tag key and an associated tag value.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/__string"
          description: One part of a key-value pair that comprises a tag. A tag key is a general label that acts as a category for more specific tag values.
        value:
          $ref: "#/components/schemas/__string"
          description: One part of a key-value pair that comprises a tag. A tag value acts as a descriptor for a tag key. A tag value can be an empty string.
    ObjectLevelStatistics:
      description: Provides information about the total storage size (in bytes) or number of objects that Amazon Macie can't analyze in one or more S3 buckets. In a BucketMetadata or MatchingBucket object, this data is for a specific bucket. In a GetBucketStatisticsResponse object, this data is aggregated for all the buckets in the query results. If versioning is enabled for a bucket, storage size values are based on the size of the latest version of each applicable object in the bucket.
      type: object
      properties:
        fileType:
          $ref: "#/components/schemas/__long"
          description: The total storage size (in bytes) or number of objects that Amazon Macie can't analyze because the objects don't have a file name extension for a supported file or storage format.
        storageClass:
          $ref: "#/components/schemas/__long"
          description: The total storage size (in bytes) or number of objects that Amazon Macie can't analyze because the objects use an unsupported storage class.
        total:
          $ref: "#/components/schemas/__long"
          description: The total storage size (in bytes) or number of objects that Amazon Macie can't analyze because the objects use an unsupported storage class or don't have a file name extension for a supported file or storage format.
    DescribeClassificationJobResponse:
      type: object
      properties:
        allowListIds:
          $ref: "#/components/schemas/__listOf__string"
          description: An array of unique identifiers, one for each allow list that the job is configured to use when it analyzes data.
        clientToken:
          $ref: "#/components/schemas/__string"
          description: The token that was provided to ensure the idempotency of the request to create the job.
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the job was created.
        customDataIdentifierIds:
          $ref: "#/components/schemas/__listOf__string"
          description: An array of unique identifiers, one for each custom data identifier that the job is configured to use when it analyzes data. This value is null if the job is configured to use only managed data identifiers to analyze data.
        description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the job.
        initialRun:
          $ref: "#/components/schemas/__boolean"
          description: For a recurring job, specifies whether you configured the job to analyze all existing, eligible objects immediately after the job was created (true). If you configured the job to analyze only those objects that were created or changed after the job was created and before the job's first scheduled run, this value is false. This value is also false for a one-time job.
        jobArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the job.
        jobId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the job.
        jobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: "The current status of the job. Possible values are: CANCELLED - You cancelled the job or, if it's a one-time job, you paused the job and didn't resume it within 30 days. COMPLETE - For a one-time job, Amazon Macie finished processing the data specified for the job. This value doesn't apply to recurring jobs. IDLE - For a recurring job, the previous scheduled run is complete and the next scheduled run is pending. This value doesn't apply to one-time jobs. PAUSED - Macie started running the job but additional processing would exceed the monthly sensitive data discovery quota for your account or one or more member accounts that the job analyzes data for. RUNNING - For a one-time job, the job is in progress. For a recurring job, a scheduled run is in progress. USER_PAUSED - You paused the job. If you paused the job while it had a status of RUNNING and you don't resume it within 30 days of pausing it, the job or job run will expire and be cancelled, depending on the job's type. To check the expiration date, refer to the UserPausedDetails.jobExpiresAt property."
        jobType:
          $ref: "#/components/schemas/JobType"
          description: "The schedule for running the job. Possible values are: ONE_TIME - The job runs only once. SCHEDULED - The job runs on a daily, weekly, or monthly basis. The scheduleFrequency property indicates the recurrence pattern for the job."
        lastRunErrorStatus:
          $ref: "#/components/schemas/LastRunErrorStatus"
          description: Specifies whether any account- or bucket-level access errors occurred when the job ran. For a recurring job, this value indicates the error status of the job's most recent run.
        lastRunTime:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the job started. If the job is a recurring job, this value indicates when the most recent run started or, if the job hasn't run yet, when the job was created.
        managedDataIdentifierIds:
          $ref: "#/components/schemas/__listOf__string"
          description: An array of unique identifiers, one for each managed data identifier that the job is explicitly configured to include (use) or exclude (not use) when it analyzes data. Inclusion or exclusion depends on the managed data identifier selection type specified for the job (managedDataIdentifierSelector). This value is null if the job's managed data identifier selection type is ALL, NONE, or RECOMMENDED.
        managedDataIdentifierSelector:
          $ref: "#/components/schemas/ManagedDataIdentifierSelector"
          description: "The selection type that determines which managed data identifiers the job uses when it analyzes data. Possible values are: ALL - Use all managed data identifiers. EXCLUDE - Use all managed data identifiers except the ones specified by the managedDataIdentifierIds property. INCLUDE - Use only the managed data identifiers specified by the managedDataIdentifierIds property. NONE - Don't use any managed data identifiers. Use only custom data identifiers (customDataIdentifierIds). RECOMMENDED (default) - Use the recommended set of managed data identifiers. If this value is null, the job uses the recommended set of managed data identifiers. If the job is a recurring job and this value is ALL or EXCLUDE, each job run automatically uses new managed data identifiers that are released. If this value is null or RECOMMENDED for a recurring job, each job run uses all the managed data identifiers that are in the recommended set when the run starts. To learn about individual managed data identifiers or determine which ones are in the recommended set, see Using managed data identifiers or Recommended managed data identifiers in the Amazon Macie User Guide."
        name:
          $ref: "#/components/schemas/__string"
          description: The custom name of the job.
        s3JobDefinition:
          $ref: "#/components/schemas/S3JobDefinition"
          description: The S3 buckets that contain the objects to analyze, and the scope of that analysis.
        samplingPercentage:
          $ref: "#/components/schemas/__integer"
          description: The sampling depth, as a percentage, that determines the percentage of eligible objects that the job analyzes.
        scheduleFrequency:
          $ref: "#/components/schemas/JobScheduleFrequency"
          description: The recurrence pattern for running the job. This value is null if the job is configured to run only once.
        statistics:
          $ref: "#/components/schemas/Statistics"
          description: The number of times that the job has run and processing statistics for the job's current run.
        tags:
          type: object
          properties: {}
          description: A map of key-value pairs that specifies which tags (keys and values) are associated with the job.
        userPausedDetails:
          $ref: "#/components/schemas/UserPausedDetails"
          description: If the current status of the job is USER_PAUSED, specifies when the job was paused and when the job or job run will expire and be cancelled if it isn't resumed. This value is present only if the value for jobStatus is USER_PAUSED.
    JobStatus:
      description: "The status of a classification job. Possible values are:"
      type: string
      enum:
        - RUNNING
        - PAUSED
        - CANCELLED
        - COMPLETE
        - IDLE
        - USER_PAUSED
    LastRunErrorStatus:
      description: Specifies whether any account- or bucket-level access errors occurred when a classification job ran. For information about using logging data to investigate these errors, see Monitoring sensitive data discovery jobs in the Amazon Macie User Guide.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/LastRunErrorStatusCode"
          description: "Specifies whether any account- or bucket-level access errors occurred when the job ran. For a recurring job, this value indicates the error status of the job's most recent run. Possible values are: ERROR - One or more errors occurred. Amazon Macie didn't process all the data specified for the job. NONE - No errors occurred. Macie processed all the data specified for the job."
    LastRunErrorStatusCode:
      description: "Specifies whether any account- or bucket-level access errors occurred during the run of a one-time classification job or the most recent run of a recurring classification job. Possible values are:"
      type: string
      enum:
        - NONE
        - ERROR
    Statistics:
      description: Provides processing statistics for a classification job.
      type: object
      properties:
        approximateNumberOfObjectsToProcess:
          $ref: "#/components/schemas/__double"
          description: The approximate number of objects that the job has yet to process during its current run.
        numberOfRuns:
          $ref: "#/components/schemas/__double"
          description: The number of times that the job has run.
    __double:
      type: number
      format: double
    UserPausedDetails:
      description: Provides information about when a classification job was paused. For a one-time job, this object also specifies when the job will expire and be cancelled if it isn't resumed. For a recurring job, this object also specifies when the paused job run will expire and be cancelled if it isn't resumed. This object is present only if a job's current status (jobStatus) is USER_PAUSED. The information in this object applies only to a job that was paused while it had a status of RUNNING.
      type: object
      properties:
        jobExpiresAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the job or job run will expire and be cancelled if you don't resume it first.
        jobImminentExpirationHealthEventArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the Health event that Amazon Macie sent to notify you of the job or job run's pending expiration and cancellation. This value is null if a job has been paused for less than 23 days.
        jobPausedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when you paused the job.
    DescribeOrganizationConfigurationResponse:
      type: object
      properties:
        autoEnable:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether Amazon Macie is enabled automatically for accounts that are added to the organization.
        maxAccountLimitReached:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the maximum number of Amazon Macie member accounts are part of the organization.
    DisableMacieResponse:
      type: object
    DisableOrganizationAdminAccountResponse:
      type: object
    DisassociateFromAdministratorAccountResponse:
      type: object
    DisassociateFromMasterAccountResponse:
      type: object
    DisassociateMemberResponse:
      type: object
    FindingPublishingFrequency:
      description: "The frequency with which Amazon Macie publishes updates to policy findings for an account. This includes publishing updates to Security Hub and Amazon EventBridge (formerly Amazon CloudWatch Events). For more information, see Monitoring and processing findings in the Amazon Macie User Guide. Valid values are:"
      type: string
      enum:
        - FIFTEEN_MINUTES
        - ONE_HOUR
        - SIX_HOURS
    MacieStatus:
      description: "The status of an Amazon Macie account. Valid values are:"
      type: string
      enum:
        - PAUSED
        - ENABLED
    EnableMacieResponse:
      type: object
    EnableOrganizationAdminAccountResponse:
      type: object
    GetAdministratorAccountResponse:
      type: object
      properties:
        administrator:
          $ref: "#/components/schemas/Invitation"
          description: The Amazon Web Services account ID for the administrator account. If the accounts are associated by an Amazon Macie membership invitation, this object also provides details about the invitation that was sent to establish the relationship between the accounts.
    Invitation:
      description: Provides information about an Amazon Macie membership invitation.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the account that sent the invitation.
        invitationId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the invitation.
        invitedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the invitation was sent.
        relationshipStatus:
          $ref: "#/components/schemas/RelationshipStatus"
          description: The status of the relationship between the account that sent the invitation and the account that received the invitation.
    RelationshipStatus:
      description: "The current status of the relationship between an account and an associated Amazon Macie administrator account. Possible values are:"
      type: string
      enum:
        - Enabled
        - Paused
        - Invited
        - Created
        - Removed
        - Resigned
        - EmailVerificationInProgress
        - EmailVerificationFailed
        - RegionDisabled
        - AccountSuspended
    GetAllowListResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__stringMin71Max89PatternArnAwsAwsCnAwsUsGovMacie2AZ19920D12AllowListAZ0922"
          description: The Amazon Resource Name (ARN) of the allow list.
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the allow list was created in Amazon Macie.
        criteria:
          $ref: "#/components/schemas/AllowListCriteria"
          description: The criteria that specify the text or text pattern to ignore. The criteria can be the location and name of an S3 object that lists specific text to ignore (s3WordsList), or a regular expression (regex) that defines a text pattern to ignore.
        description:
          $ref: "#/components/schemas/__stringMin1Max512PatternSS"
          description: The custom description of the allow list.
        id:
          $ref: "#/components/schemas/__stringMin22Max22PatternAZ0922"
          description: The unique identifier for the allow list.
        name:
          $ref: "#/components/schemas/__stringMin1Max128Pattern"
          description: The custom name of the allow list.
        status:
          $ref: "#/components/schemas/AllowListStatus"
          description: The current status of the allow list, which indicates whether Amazon Macie can access and use the list's criteria.
        tags:
          type: object
          properties: {}
          description: A map of key-value pairs that specifies which tags (keys and values) are associated with the allow list.
        updatedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the allow list's settings were most recently changed in Amazon Macie.
    AllowListStatus:
      description: Provides information about the current status of an allow list, which indicates whether Amazon Macie can access and use the list's criteria.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/AllowListStatusCode"
          description: "The current status of the allow list. If the list's criteria specify a regular expression (regex), this value is typically OK. Amazon Macie can compile the expression. If the list's criteria specify an S3 object, possible values are: OK - Macie can retrieve and parse the contents of the object. S3_OBJECT_ACCESS_DENIED - Macie isn't allowed to access the object or the object is encrypted with a customer managed KMS key that Macie isn't allowed to use. Check the bucket policy and other permissions settings for the bucket and the object. If the object is encrypted, also ensure that it's encrypted with a key that Macie is allowed to use. S3_OBJECT_EMPTY - Macie can retrieve the object but the object doesn't contain any content. Ensure that the object contains the correct entries. Also ensure that the list's criteria specify the correct bucket and object names. S3_OBJECT_NOT_FOUND - The object doesn't exist in Amazon S3. Ensure that the list's criteria specify the correct bucket and object names. S3_OBJECT_OVERSIZE - Macie can retrieve the object. However, the object contains too many entries or its storage size exceeds the quota for an allow list. Try breaking the list into multiple files and ensure that each file doesn't exceed any quotas. Then configure list settings in Macie for each file. S3_THROTTLED - Amazon S3 throttled the request to retrieve the object. Wait a few minutes and then try again. S3_USER_ACCESS_DENIED - Amazon S3 denied the request to retrieve the object. If the specified object exists, you're not allowed to access it or it's encrypted with an KMS key that you're not allowed to use. Work with your Amazon Web Services administrator to ensure that the list's criteria specify the correct bucket and object names, and you have read access to the bucket and the object. If the object is encrypted, also ensure that it's encrypted with a key that you're allowed to use. UNKNOWN_ERROR - A transient or internal error occurred when Macie attempted to retrieve or parse the object. Wait a few minutes and then try again. A list can also have this status if it's encrypted with a key that Amazon S3 and Macie can't access or use."
        description:
          $ref: "#/components/schemas/__stringMin1Max1024PatternSS"
          description: A brief description of the status of the allow list. Amazon Macie uses this value to provide additional information about an error that occurred when Macie tried to access and use the list's criteria.
      required:
        - code
    AllowListStatusCode:
      description: "Indicates the current status of an allow list. Depending on the type of criteria that the list specifies, possible values are:"
      type: string
      enum:
        - OK
        - S3_OBJECT_NOT_FOUND
        - S3_USER_ACCESS_DENIED
        - S3_OBJECT_ACCESS_DENIED
        - S3_THROTTLED
        - S3_OBJECT_OVERSIZE
        - S3_OBJECT_EMPTY
        - UNKNOWN_ERROR
    GetAutomatedDiscoveryConfigurationResponse:
      type: object
      properties:
        autoEnableOrganizationMembers:
          $ref: "#/components/schemas/AutoEnableMode"
          description: "Specifies whether automated sensitive data discovery is enabled automatically for accounts in the organization. Possible values are: ALL, enable it for all existing accounts and new member accounts; NEW, enable it only for new member accounts; and, NONE, don't enable it for any accounts."
        classificationScopeId:
          $ref: "#/components/schemas/ClassificationScopeId"
          description: The unique identifier for the classification scope that's used when performing automated sensitive data discovery. The classification scope specifies S3 buckets to exclude from analyses.
        disabledAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time, in UTC and extended ISO 8601 format, when automated sensitive data discovery was most recently disabled. This value is null if automated sensitive data discovery is currently enabled.
        firstEnabledAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time, in UTC and extended ISO 8601 format, when automated sensitive data discovery was initially enabled. This value is null if automated sensitive data discovery has never been enabled.
        lastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time, in UTC and extended ISO 8601 format, when the configuration settings or status of automated sensitive data discovery was most recently changed.
        sensitivityInspectionTemplateId:
          $ref: "#/components/schemas/SensitivityInspectionTemplateId"
          description: The unique identifier for the sensitivity inspection template that's used when performing automated sensitive data discovery. The template specifies which allow lists, custom data identifiers, and managed data identifiers to use when analyzing data.
        status:
          $ref: "#/components/schemas/AutomatedDiscoveryStatus"
          description: "The current status of automated sensitive data discovery for the organization or account. Possible values are: ENABLED, use the specified settings to perform automated sensitive data discovery activities; and, DISABLED, don't perform automated sensitive data discovery activities."
    AutoEnableMode:
      description: "Specifies whether to automatically enable automated sensitive data discovery for accounts that are part of an organization in Amazon Macie. Valid values are:"
      type: string
      enum:
        - ALL
        - NEW
        - NONE
    ClassificationScopeId:
      description: The unique identifier the classification scope.
      type: string
      pattern: ^[0-9a-z]*$
    Timestamp:
      description: Specifies a date and time in UTC and extended ISO 8601 format.
      type: string
      format: date-time
    SensitivityInspectionTemplateId:
      description: The unique identifier for the sensitivity inspection template.
      type: string
    AutomatedDiscoveryStatus:
      description: "The status of the automated sensitive data discovery configuration for an organization in Amazon Macie or a standalone Macie account. Valid values are:"
      type: string
      enum:
        - ENABLED
        - DISABLED
    GetBucketStatisticsResponse:
      type: object
      properties:
        bucketCount:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets.
        bucketCountByEffectivePermission:
          $ref: "#/components/schemas/BucketCountByEffectivePermission"
          description: The total number of buckets that are publicly accessible due to a combination of permissions settings for each bucket.
        bucketCountByEncryptionType:
          $ref: "#/components/schemas/BucketCountByEncryptionType"
          description: The total number of buckets whose settings do or don't specify default server-side encryption behavior for objects that are added to the buckets.
        bucketCountByObjectEncryptionRequirement:
          $ref: "#/components/schemas/BucketCountPolicyAllowsUnencryptedObjectUploads"
          description: The total number of buckets whose bucket policies do or don't require server-side encryption of objects when objects are added to the buckets.
        bucketCountBySharedAccessType:
          $ref: "#/components/schemas/BucketCountBySharedAccessType"
          description: The total number of buckets that are or aren't shared with other Amazon Web Services accounts, Amazon CloudFront origin access identities (OAIs), or CloudFront origin access controls (OACs).
        bucketStatisticsBySensitivity:
          $ref: "#/components/schemas/BucketStatisticsBySensitivity"
          description: The aggregated sensitive data discovery statistics for the buckets. If automated sensitive data discovery is currently disabled for your account, the value for most statistics is 0.
        classifiableObjectCount:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie can analyze in the buckets. These objects use a supported storage class and have a file name extension for a supported file or storage format.
        classifiableSizeInBytes:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of all the objects that Amazon Macie can analyze in the buckets. These objects use a supported storage class and have a file name extension for a supported file or storage format. If versioning is enabled for any of the buckets, this value is based on the size of the latest version of each applicable object in the buckets. This value doesn't reflect the storage size of all versions of all applicable objects in the buckets.
        lastUpdated:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when Amazon Macie most recently retrieved bucket or object metadata from Amazon S3 for the buckets.
        objectCount:
          $ref: "#/components/schemas/__long"
          description: The total number of objects in the buckets.
        sizeInBytes:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the buckets. If versioning is enabled for any of the buckets, this value is based on the size of the latest version of each object in the buckets. This value doesn't reflect the storage size of all versions of the objects in the buckets.
        sizeInBytesCompressed:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the objects that are compressed (.gz, .gzip, .zip) files in the buckets. If versioning is enabled for any of the buckets, this value is based on the size of the latest version of each applicable object in the buckets. This value doesn't reflect the storage size of all versions of the applicable objects in the buckets.
        unclassifiableObjectCount:
          $ref: "#/components/schemas/ObjectLevelStatistics"
          description: The total number of objects that Amazon Macie can't analyze in the buckets. These objects don't use a supported storage class or don't have a file name extension for a supported file or storage format.
        unclassifiableObjectSizeInBytes:
          $ref: "#/components/schemas/ObjectLevelStatistics"
          description: The total storage size, in bytes, of the objects that Amazon Macie can't analyze in the buckets. These objects don't use a supported storage class or don't have a file name extension for a supported file or storage format.
    BucketCountByEffectivePermission:
      description: Provides information about the number of S3 buckets that are publicly accessible due to a combination of permissions settings for each bucket.
      type: object
      properties:
        publiclyAccessible:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that allow the general public to have read or write access to the bucket.
        publiclyReadable:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that allow the general public to have read access to the bucket.
        publiclyWritable:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that allow the general public to have write access to the bucket.
        unknown:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that Amazon Macie wasn't able to evaluate permissions settings for. For example, the buckets' policies or a quota prevented Macie from retrieving the requisite data. Macie can't determine whether the buckets are publicly accessible.
    BucketCountByEncryptionType:
      description: Provides information about the number of S3 buckets whose settings do or don't specify default server-side encryption behavior for objects that are added to the buckets. For detailed information about these settings, see Setting default server-side encryption behavior for Amazon S3 buckets in the Amazon Simple Storage Service User Guide.
      type: object
      properties:
        kmsManaged:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets whose default encryption settings are configured to encrypt new objects with an KMS key, either an Amazon Web Services managed key or a customer managed key. By default, these buckets encrypt new objects automatically using DSSE-KMS or SSE-KMS encryption.
        s3Managed:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets whose default encryption settings are configured to encrypt new objects with an Amazon S3 managed key. By default, these buckets encrypt new objects automatically using SSE-S3 encryption.
        unencrypted:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that don't specify default server-side encryption behavior for new objects. Default encryption settings aren't configured for these buckets.
        unknown:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that Amazon Macie doesn't have current encryption metadata for. For example, the buckets' permissions settings or a quota prevented Macie from retrieving the default encryption settings for the buckets.
    BucketCountPolicyAllowsUnencryptedObjectUploads:
      description: Provides information about the number of S3 buckets whose bucket policies do or don't require server-side encryption of objects when objects are added to the buckets.
      type: object
      properties:
        allowsUnencryptedObjectUploads:
          $ref: "#/components/schemas/__long"
          description: "The total number of buckets that don't have a bucket policy or have a bucket policy that doesn't require server-side encryption of new objects. If a bucket policy exists, the policy doesn't require PutObject requests to include a valid server-side encryption header: the x-amz-server-side-encryption header with a value of AES256 or aws:kms, or the x-amz-server-side-encryption-customer-algorithm header with a value of AES256."
        deniesUnencryptedObjectUploads:
          $ref: "#/components/schemas/__long"
          description: "The total number of buckets whose bucket policies require server-side encryption of new objects. PutObject requests for these buckets must include a valid server-side encryption header: the x-amz-server-side-encryption header with a value of AES256 or aws:kms, or the x-amz-server-side-encryption-customer-algorithm header with a value of AES256."
        unknown:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that Amazon Macie wasn't able to evaluate server-side encryption requirements for. For example, the buckets' permissions settings or a quota prevented Macie from retrieving the requisite data. Macie can't determine whether bucket policies for the buckets require server-side encryption of new objects.
    BucketCountBySharedAccessType:
      description: Provides information about the number of S3 buckets that are or aren't shared with other Amazon Web Services accounts, Amazon CloudFront origin access identities (OAIs), or CloudFront origin access controls (OACs). In this data, an Amazon Macie organization is defined as a set of Macie accounts that are centrally managed as a group of related accounts through Organizations or by Macie invitation.
      type: object
      properties:
        external:
          $ref: "#/components/schemas/__long"
          description: "The total number of buckets that are shared with one or more of the following or any combination of the following: an Amazon CloudFront OAI, a CloudFront OAC, or an Amazon Web Services account that isn't in the same Amazon Macie organization."
        internal:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that are shared with one or more Amazon Web Services accounts in the same Amazon Macie organization. These buckets aren't shared with Amazon CloudFront OAIs or OACs.
        notShared:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that aren't shared with other Amazon Web Services accounts, Amazon CloudFront OAIs, or CloudFront OACs.
        unknown:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that Amazon Macie wasn't able to evaluate shared access settings for. For example, the buckets' permissions settings or a quota prevented Macie from retrieving the requisite data. Macie can't determine whether the buckets are shared with other Amazon Web Services accounts, Amazon CloudFront OAIs, or CloudFront OACs.
    BucketStatisticsBySensitivity:
      description: Provides aggregated statistical data for sensitive data discovery metrics that apply to S3 buckets, grouped by bucket sensitivity score (sensitivityScore). If automated sensitive data discovery is currently disabled for your account, the value for most of these metrics is 0.
      type: object
      properties:
        classificationError:
          $ref: "#/components/schemas/SensitivityAggregations"
          description: The aggregated statistical data for all buckets that have a sensitivity score of -1.
        notClassified:
          $ref: "#/components/schemas/SensitivityAggregations"
          description: The aggregated statistical data for all buckets that have a sensitivity score of 50.
        notSensitive:
          $ref: "#/components/schemas/SensitivityAggregations"
          description: The aggregated statistical data for all buckets that have a sensitivity score of 1-49.
        sensitive:
          $ref: "#/components/schemas/SensitivityAggregations"
          description: The aggregated statistical data for all buckets that have a sensitivity score of 51-100.
    SensitivityAggregations:
      description: Provides aggregated statistical data for sensitive data discovery metrics that apply to S3 buckets. Each field contains aggregated data for all the buckets that have a sensitivity score (sensitivityScore) of a specified value or within a specified range (BucketStatisticsBySensitivity). If automated sensitive data discovery is currently disabled for your account, the value for most fields is 0.
      type: object
      properties:
        classifiableSizeInBytes:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of all the objects that Amazon Macie can analyze in the buckets. These objects use a supported storage class and have a file name extension for a supported file or storage format. If versioning is enabled for any of the buckets, this value is based on the size of the latest version of each applicable object in the buckets. This value doesn't reflect the storage size of all versions of all applicable objects in the buckets.
        publiclyAccessibleCount:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets that are publicly accessible due to a combination of permissions settings for each bucket.
        totalCount:
          $ref: "#/components/schemas/__long"
          description: The total number of buckets.
        totalSizeInBytes:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the buckets. If versioning is enabled for any of the buckets, this value is based on the size of the latest version of each object in the buckets. This value doesn't reflect the storage size of all versions of the objects in the buckets.
    GetClassificationExportConfigurationResponse:
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/ClassificationExportConfiguration"
          description: The location where data classification results are stored, and the encryption settings that are used when storing results in that location.
    ClassificationExportConfiguration:
      description: Specifies where to store data classification results, and the encryption settings to use when storing results in that location. The location must be an S3 general purpose bucket.
      type: object
      properties:
        s3Destination:
          $ref: "#/components/schemas/S3Destination"
          description: The S3 bucket to store data classification results in, and the encryption settings to use when storing results in that bucket.
    S3Destination:
      description: Specifies an S3 bucket to store data classification results in, and the encryption settings to use when storing results in that bucket. The bucket must be an existing general purpose bucket. It can be a bucket in your own account or a bucket that another account owns. If another account owns the bucket, you must specify both the unique identifier for the account and the name of the bucket.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/__string"
          description: The name of the bucket. This must be the name of an existing general purpose bucket.
        expectedBucketOwner:
          $ref: "#/components/schemas/__string"
          description: The unique identifier (ID) for the Amazon Web Services account that owns the bucket. This must be the ID for the account that owns the specified bucket.
        keyPrefix:
          $ref: "#/components/schemas/__string"
          description: The path prefix to use in the path to the location in the bucket. This prefix specifies where to store classification results in the bucket.
        kmsKeyArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the customer managed KMS key to use for encryption of the results. This must be the ARN of an existing, symmetric encryption KMS key that's enabled in the same Amazon Web Services Region as the bucket.
      required:
        - bucketName
        - kmsKeyArn
    GetClassificationScopeResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ClassificationScopeId"
          description: The unique identifier for the classification scope.
        name:
          $ref: "#/components/schemas/ClassificationScopeName"
          description: "The name of the classification scope: automated-sensitive-data-discovery."
        s3:
          $ref: "#/components/schemas/S3ClassificationScope"
          description: The S3 buckets that are excluded from automated sensitive data discovery.
    ClassificationScopeName:
      description: The name of the classification scope.
      type: string
      pattern: ^[0-9a-zA-Z_\\-]*$
    S3ClassificationScope:
      description: Specifies the S3 buckets that are excluded from automated sensitive data discovery for an Amazon Macie account.
      type: object
      properties:
        excludes:
          $ref: "#/components/schemas/S3ClassificationScopeExclusion"
          description: The S3 buckets that are excluded.
      required:
        - excludes
    S3ClassificationScopeExclusion:
      description: Specifies the names of the S3 buckets that are excluded from automated sensitive data discovery.
      type: object
      properties:
        bucketNames:
          $ref: "#/components/schemas/__listOfS3BucketName"
          description: An array of strings, one for each S3 bucket that is excluded. Each string is the full name of an excluded bucket.
      required:
        - bucketNames
    __listOfS3BucketName:
      type: array
      items:
        $ref: "#/components/schemas/S3BucketName"
    S3BucketName:
      description: The name of an S3 bucket.
      type: string
      pattern: ^[A-Za-z0-9.\-_]{3,255}$
    GetCustomDataIdentifierResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the custom data identifier.
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the custom data identifier was created.
        deleted:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the custom data identifier was deleted. If you delete a custom data identifier, Amazon Macie doesn't delete it permanently. Instead, it soft deletes the identifier.
        description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the custom data identifier.
        id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the custom data identifier.
        ignoreWords:
          $ref: "#/components/schemas/__listOf__string"
          description: An array that lists specific character sequences (ignore words) to exclude from the results. If the text matched by the regular expression contains any string in this array, Amazon Macie ignores it. Ignore words are case sensitive.
        keywords:
          $ref: "#/components/schemas/__listOf__string"
          description: An array that lists specific character sequences (keywords), one of which must precede and be within proximity (maximumMatchDistance) of the regular expression to match. Keywords aren't case sensitive.
        maximumMatchDistance:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of characters that can exist between the end of at least one complete character sequence specified by the keywords array and the end of the text that matches the regex pattern. If a complete keyword precedes all the text that matches the pattern and the keyword is within the specified distance, Amazon Macie includes the result. Otherwise, Macie excludes the result.
        name:
          $ref: "#/components/schemas/__string"
          description: The custom name of the custom data identifier.
        regex:
          $ref: "#/components/schemas/__string"
          description: The regular expression (regex) that defines the pattern to match.
        severityLevels:
          $ref: "#/components/schemas/SeverityLevelList"
          description: Specifies the severity that's assigned to findings that the custom data identifier produces, based on the number of occurrences of text that match the custom data identifier's detection criteria. By default, Amazon Macie creates findings for S3 objects that contain at least one occurrence of text that matches the detection criteria, and Macie assigns the MEDIUM severity to those findings.
        tags:
          type: object
          properties: {}
          description: A map of key-value pairs that identifies the tags (keys and values) that are associated with the custom data identifier.
    GroupBy:
      type: string
      enum:
        - resourcesAffected.s3Bucket.name
        - type
        - classificationDetails.jobId
        - severity.description
    FindingStatisticsSortCriteria:
      description: Specifies criteria for sorting the results of a query that retrieves aggregated statistical data about findings.
      type: object
      properties:
        attributeName:
          $ref: "#/components/schemas/FindingStatisticsSortAttributeName"
          description: "The grouping to sort the results by. Valid values are: count, sort the results by the number of findings in each group of results; and, groupKey, sort the results by the name of each group of results."
        orderBy:
          $ref: "#/components/schemas/OrderBy"
          description: "The sort order to apply to the results, based on the value for the property specified by the attributeName property. Valid values are: ASC, sort the results in ascending order; and, DESC, sort the results in descending order."
    FindingStatisticsSortAttributeName:
      description: "The grouping to sort the results by. Valid values are:"
      type: string
      enum:
        - groupKey
        - count
    GetFindingStatisticsResponse:
      type: object
      properties:
        countsByGroup:
          $ref: "#/components/schemas/__listOfGroupCount"
          description: An array of objects, one for each group of findings that matches the filter criteria specified in the request.
    __listOfGroupCount:
      type: array
      items:
        $ref: "#/components/schemas/GroupCount"
    GroupCount:
      description: Provides a group of results for a query that retrieved aggregated statistical data about findings.
      type: object
      properties:
        count:
          $ref: "#/components/schemas/__long"
          description: The total number of findings in the group of query results.
        groupKey:
          $ref: "#/components/schemas/__string"
          description: The name of the property that defines the group in the query results, as specified by the groupBy property in the query request.
    SortCriteria:
      description: Specifies criteria for sorting the results of a request for findings.
      type: object
      properties:
        attributeName:
          $ref: "#/components/schemas/__string"
          description: "The name of the property to sort the results by. Valid values are: count, createdAt, policyDetails.action.apiCallDetails.firstSeen, policyDetails.action.apiCallDetails.lastSeen, resourcesAffected, severity.score, type, and updatedAt."
        orderBy:
          $ref: "#/components/schemas/OrderBy"
          description: "The sort order to apply to the results, based on the value for the property specified by the attributeName property. Valid values are: ASC, sort the results in ascending order; and, DESC, sort the results in descending order."
    GetFindingsResponse:
      type: object
      properties:
        findings:
          $ref: "#/components/schemas/__listOfFinding"
          description: An array of objects, one for each finding that matches the criteria specified in the request.
    __listOfFinding:
      type: array
      items:
        $ref: "#/components/schemas/Finding"
    Finding:
      description: Provides the details of a finding.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that the finding applies to. This is typically the account that owns the affected resource.
        archived:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the finding is archived (suppressed).
        category:
          $ref: "#/components/schemas/FindingCategory"
          description: "The category of the finding. Possible values are: CLASSIFICATION, for a sensitive data finding; and, POLICY, for a policy finding."
        classificationDetails:
          $ref: "#/components/schemas/ClassificationDetails"
          description: The details of a sensitive data finding. This value is null for a policy finding.
        count:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of the finding. For sensitive data findings, this value is always 1. All sensitive data findings are considered unique.
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when Amazon Macie created the finding.
        description:
          $ref: "#/components/schemas/__string"
          description: The description of the finding.
        id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the finding. This is a random string that Amazon Macie generates and assigns to a finding when it creates the finding.
        partition:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services partition that Amazon Macie created the finding in.
        policyDetails:
          $ref: "#/components/schemas/PolicyDetails"
          description: The details of a policy finding. This value is null for a sensitive data finding.
        region:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services Region that Amazon Macie created the finding in.
        resourcesAffected:
          $ref: "#/components/schemas/ResourcesAffected"
          description: The resources that the finding applies to.
        sample:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the finding is a sample finding. A sample finding is a finding that uses example data to demonstrate what a finding might contain.
        schemaVersion:
          $ref: "#/components/schemas/__string"
          description: The version of the schema that was used to define the data structures in the finding.
        severity:
          $ref: "#/components/schemas/Severity"
          description: The severity level and score for the finding.
        title_:
          $ref: "#/components/schemas/__string"
          description: The brief description of the finding.
        type_:
          $ref: "#/components/schemas/FindingType"
          description: The type of the finding.
        updatedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when Amazon Macie last updated the finding. For sensitive data findings, this value is the same as the value for the createdAt property. All sensitive data findings are considered new.
    FindingCategory:
      description: "The category of the finding. Possible values are:"
      type: string
      enum:
        - CLASSIFICATION
        - POLICY
    ClassificationDetails:
      description: Provides information about a sensitive data finding and the details of the finding.
      type: object
      properties:
        detailedResultsLocation:
          $ref: "#/components/schemas/__string"
          description: The path to the folder or file in Amazon S3 that contains the corresponding sensitive data discovery result for the finding. If a finding applies to a large archive or compressed file, this value is the path to a folder. Otherwise, this value is the path to a file.
        jobArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the classification job that produced the finding. This value is null if the origin of the finding (originType) is AUTOMATED_SENSITIVE_DATA_DISCOVERY.
        jobId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the classification job that produced the finding. This value is null if the origin of the finding (originType) is AUTOMATED_SENSITIVE_DATA_DISCOVERY.
        originType:
          $ref: "#/components/schemas/OriginType"
          description: "Specifies how Amazon Macie found the sensitive data that produced the finding. Possible values are: SENSITIVE_DATA_DISCOVERY_JOB, for a classification job; and, AUTOMATED_SENSITIVE_DATA_DISCOVERY, for automated sensitive data discovery."
        result:
          $ref: "#/components/schemas/ClassificationResult"
          description: The status and other details of the finding.
    OriginType:
      description: "Specifies how Amazon Macie found the sensitive data that produced a finding. Possible values are:"
      type: string
      enum:
        - SENSITIVE_DATA_DISCOVERY_JOB
        - AUTOMATED_SENSITIVE_DATA_DISCOVERY
    ClassificationResult:
      description: Provides the details of a sensitive data finding, including the types, number of occurrences, and locations of the sensitive data that was detected.
      type: object
      properties:
        additionalOccurrences:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether Amazon Macie detected additional occurrences of sensitive data in the S3 object. A finding includes location data for a maximum of 15 occurrences of sensitive data. This value can help you determine whether to investigate additional occurrences of sensitive data in an object. You can do this by referring to the corresponding sensitive data discovery result for the finding (classificationDetails.detailedResultsLocation).
        customDataIdentifiers:
          $ref: "#/components/schemas/CustomDataIdentifiers"
          description: The custom data identifiers that detected the sensitive data and the number of occurrences of the data that they detected.
        mimeType:
          $ref: "#/components/schemas/__string"
          description: The type of content, as a MIME type, that the finding applies to. For example, application/gzip, for a GNU Gzip compressed archive file, or application/pdf, for an Adobe Portable Document Format file.
        sensitiveData:
          $ref: "#/components/schemas/SensitiveData"
          description: The category, types, and number of occurrences of the sensitive data that produced the finding.
        sizeClassified:
          $ref: "#/components/schemas/__long"
          description: The total size, in bytes, of the data that the finding applies to.
        status:
          $ref: "#/components/schemas/ClassificationResultStatus"
          description: The status of the finding.
    CustomDataIdentifiers:
      description: Provides information about custom data identifiers that produced a sensitive data finding, and the number of occurrences of the data that they detected for the finding.
      type: object
      properties:
        detections:
          $ref: "#/components/schemas/CustomDetections"
          description: The custom data identifiers that detected the data, and the number of occurrences of the data that each identifier detected.
        totalCount:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of the data that was detected by the custom data identifiers and produced the finding.
    CustomDetections:
      description: Provides information about custom data identifiers that produced a sensitive data finding, and the number of occurrences of the data that each identifier detected.
      type: array
      items:
        $ref: "#/components/schemas/CustomDetection"
    CustomDetection:
      description: Provides information about a custom data identifier that produced a sensitive data finding, and the sensitive data that it detected for the finding.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the custom data identifier.
        count:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of the sensitive data that the custom data identifier detected.
        name:
          $ref: "#/components/schemas/__string"
          description: The name of the custom data identifier.
        occurrences:
          $ref: "#/components/schemas/Occurrences"
          description: The location of 1-15 occurrences of the sensitive data that the custom data identifier detected. A finding includes location data for a maximum of 15 occurrences of sensitive data.
    Occurrences:
      description: Specifies the location of 1-15 occurrences of sensitive data that was detected by a managed data identifier or a custom data identifier and produced a sensitive data finding.
      type: object
      properties:
        cells:
          $ref: "#/components/schemas/Cells"
          description: An array of objects, one for each occurrence of sensitive data in a Microsoft Excel workbook, CSV file, or TSV file. This value is null for all other types of files. Each Cell object specifies a cell or field that contains the sensitive data.
        lineRanges:
          $ref: "#/components/schemas/Ranges"
          description: "An array of objects, one for each occurrence of sensitive data in an email message or a non-binary text file such as an HTML, TXT, or XML file. Each Range object specifies a line or inclusive range of lines that contains the sensitive data, and the position of the data on the specified line or lines. This value is often null for file types that are supported by Cell, Page, or Record objects. Exceptions are the location of sensitive data in: unstructured sections of an otherwise structured file, such as a comment in a file; a malformed file that Amazon Macie analyzes as plain text; and, a CSV or TSV file that has any column names that contain sensitive data."
        offsetRanges:
          $ref: "#/components/schemas/Ranges"
          description: Reserved for future use.
        pages:
          $ref: "#/components/schemas/Pages"
          description: An array of objects, one for each occurrence of sensitive data in an Adobe Portable Document Format file. This value is null for all other types of files. Each Page object specifies a page that contains the sensitive data.
        records:
          $ref: "#/components/schemas/Records"
          description: An array of objects, one for each occurrence of sensitive data in an Apache Avro object container, Apache Parquet file, JSON file, or JSON Lines file. This value is null for all other types of files. For an Avro object container or Parquet file, each Record object specifies a record index and the path to a field in a record that contains the sensitive data. For a JSON or JSON Lines file, each Record object specifies the path to a field or array that contains the sensitive data. For a JSON Lines file, it also specifies the index of the line that contains the data.
    Cells:
      description: Specifies the location of occurrences of sensitive data in a Microsoft Excel workbook, CSV file, or TSV file.
      type: array
      items:
        $ref: "#/components/schemas/Cell"
    Cell:
      description: Specifies the location of an occurrence of sensitive data in a Microsoft Excel workbook, CSV file, or TSV file.
      type: object
      properties:
        cellReference:
          $ref: "#/components/schemas/__string"
          description: The location of the cell, as an absolute cell reference, that contains the sensitive data, for example Sheet2!C5 for cell C5 on Sheet2 in a Microsoft Excel workbook. This value is null for CSV and TSV files.
        column:
          $ref: "#/components/schemas/__long"
          description: "The column number of the column that contains the sensitive data. For a Microsoft Excel workbook, this value correlates to the alphabetical character(s) for a column identifier, for example: 1 for column A, 2 for column B, and so on."
        columnName:
          $ref: "#/components/schemas/__string"
          description: The name of the column that contains the sensitive data, if available.
        row:
          $ref: "#/components/schemas/__long"
          description: The row number of the row that contains the sensitive data.
    Ranges:
      description: Specifies the locations of occurrences of sensitive data in a non-binary text file.
      type: array
      items:
        $ref: "#/components/schemas/Range"
    Range:
      description: Specifies the location of an occurrence of sensitive data in an email message or a non-binary text file such as an HTML, TXT, or XML file.
      type: object
      properties:
        end:
          $ref: "#/components/schemas/__long"
          description: The number of lines from the beginning of the file to the end of the sensitive data.
        start:
          $ref: "#/components/schemas/__long"
          description: The number of lines from the beginning of the file to the beginning of the sensitive data.
        startColumn:
          $ref: "#/components/schemas/__long"
          description: The number of characters, with spaces and starting from 1, from the beginning of the first line that contains the sensitive data (start) to the beginning of the sensitive data.
    Pages:
      description: Specifies the location of occurrences of sensitive data in an Adobe Portable Document Format file.
      type: array
      items:
        $ref: "#/components/schemas/Page"
    Page:
      description: Specifies the location of an occurrence of sensitive data in an Adobe Portable Document Format file.
      type: object
      properties:
        lineRange:
          $ref: "#/components/schemas/Range"
          description: Reserved for future use.
        offsetRange:
          $ref: "#/components/schemas/Range"
          description: Reserved for future use.
        pageNumber:
          $ref: "#/components/schemas/__long"
          description: The page number of the page that contains the sensitive data.
    Records:
      description: Specifies the locations of occurrences of sensitive data in an Apache Avro object container or a structured data file.
      type: array
      items:
        $ref: "#/components/schemas/Record"
    Record:
      description: Specifies the location of an occurrence of sensitive data in an Apache Avro object container, Apache Parquet file, JSON file, or JSON Lines file.
      type: object
      properties:
        jsonPath:
          $ref: "#/components/schemas/__string"
          description: The path, as a JSONPath expression, to the sensitive data. For an Avro object container or Parquet file, this is the path to the field in the record (recordIndex) that contains the data. For a JSON or JSON Lines file, this is the path to the field or array that contains the data. If the data is a value in an array, the path also indicates which value contains the data. If Amazon Macie detects sensitive data in the name of any element in the path, Macie omits this field. If the name of an element exceeds 240 characters, Macie truncates the name by removing characters from the beginning of the name. If the resulting full path exceeds 250 characters, Macie also truncates the path, starting with the first element in the path, until the path contains 250 or fewer characters.
        recordIndex:
          $ref: "#/components/schemas/__long"
          description: For an Avro object container or Parquet file, the record index, starting from 0, for the record that contains the sensitive data. For a JSON Lines file, the line index, starting from 0, for the line that contains the sensitive data. This value is always 0 for JSON files.
    SensitiveData:
      description: Provides information about the category and number of occurrences of sensitive data that produced a finding.
      type: array
      items:
        $ref: "#/components/schemas/SensitiveDataItem"
    SensitiveDataItem:
      description: Provides information about the category, types, and occurrences of sensitive data that produced a sensitive data finding.
      type: object
      properties:
        category:
          $ref: "#/components/schemas/SensitiveDataItemCategory"
          description: "The category of sensitive data that was detected. For example: CREDENTIALS, for credentials data such as private keys or Amazon Web Services secret access keys; FINANCIAL_INFORMATION, for financial data such as credit card numbers; or, PERSONAL_INFORMATION, for personal health information, such as health insurance identification numbers, or personally identifiable information, such as passport numbers."
        detections:
          $ref: "#/components/schemas/DefaultDetections"
          description: An array of objects, one for each type of sensitive data that was detected. Each object reports the number of occurrences of a specific type of sensitive data that was detected, and the location of up to 15 of those occurrences.
        totalCount:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of the sensitive data that was detected.
    SensitiveDataItemCategory:
      description: "For a finding, the category of sensitive data that was detected and produced the finding. For a managed data identifier, the category of sensitive data that the managed data identifier detects. Possible values are:"
      type: string
      enum:
        - FINANCIAL_INFORMATION
        - PERSONAL_INFORMATION
        - CREDENTIALS
        - CUSTOM_IDENTIFIER
    DefaultDetections:
      description: Provides information about sensitive data that was detected by managed data identifiers and produced a sensitive data finding, and the number of occurrences of each type of sensitive data that was detected.
      type: array
      items:
        $ref: "#/components/schemas/DefaultDetection"
    DefaultDetection:
      description: Provides information about a type of sensitive data that was detected by a managed data identifier and produced a sensitive data finding.
      type: object
      properties:
        count:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of the type of sensitive data that was detected.
        occurrences:
          $ref: "#/components/schemas/Occurrences"
          description: The location of 1-15 occurrences of the sensitive data that was detected. A finding includes location data for a maximum of 15 occurrences of sensitive data.
        type_:
          $ref: "#/components/schemas/__string"
          description: The type of sensitive data that was detected. For example, AWS_CREDENTIALS, PHONE_NUMBER, or ADDRESS.
    ClassificationResultStatus:
      description: Provides information about the status of a sensitive data finding.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/__string"
          description: "The status of the finding. Possible values are: COMPLETE - Amazon Macie successfully completed its analysis of the S3 object that the finding applies to. PARTIAL - Macie analyzed only a subset of the data in the S3 object that the finding applies to. For example, the object is an archive file that contains files in an unsupported format. SKIPPED - Macie wasn't able to analyze the S3 object that the finding applies to. For example, the object is a file that uses an unsupported format."
        reason:
          $ref: "#/components/schemas/__string"
          description: "A brief description of the status of the finding. This value is null if the status (code) of the finding is COMPLETE. Amazon Macie uses this value to notify you of any errors, warnings, or considerations that might impact your analysis of the finding and the affected S3 object. Possible values are: ARCHIVE_CONTAINS_UNPROCESSED_FILES - The object is an archive file and Macie extracted and analyzed only some or none of the files in the archive. To determine which files Macie analyzed, if any, refer to the corresponding sensitive data discovery result for the finding (classificationDetails.detailedResultsLocation). ARCHIVE_EXCEEDS_SIZE_LIMIT - The object is an archive file whose total storage size exceeds the size quota for this type of archive. ARCHIVE_NESTING_LEVEL_OVER_LIMIT - The object is an archive file whose nested depth exceeds the quota for the maximum number of nested levels that Macie analyzes for this type of archive. ARCHIVE_TOTAL_BYTES_EXTRACTED_OVER_LIMIT - The object is an archive file that exceeds the quota for the maximum amount of data that Macie extracts and analyzes for this type of archive. ARCHIVE_TOTAL_DOCUMENTS_PROCESSED_OVER_LIMIT - The object is an archive file that contains more than the maximum number of files that Macie extracts and analyzes for this type of archive. FILE_EXCEEDS_SIZE_LIMIT - The storage size of the object exceeds the size quota for this type of file. INVALID_ENCRYPTION - The object is encrypted using server-side encryption but Macie isn't allowed to use the key. Macie can't decrypt and analyze the object. INVALID_KMS_KEY - The object is encrypted with an KMS key that was disabled or is being deleted. Macie can't decrypt and analyze the object. INVALID_OBJECT_STATE - The object doesn't use a supported Amazon S3 storage class. JSON_NESTING_LEVEL_OVER_LIMIT - The object contains JSON data and the nested depth of the data exceeds the quota for the number of nested levels that Macie analyzes for this type of file. MALFORMED_FILE - The object is a malformed or corrupted file. An error occurred when Macie attempted to detect the file's type or extract data from the file. MALFORMED_OR_FILE_SIZE_EXCEEDS_LIMIT - The object is a Microsoft Office file that is malformed or exceeds the size quota for this type of file. If the file is malformed, an error occurred when Macie attempted to extract data from the file. NO_SUCH_BUCKET_AVAILABLE - The object was in a bucket that was deleted shortly before or when Macie attempted to analyze the object. OBJECT_VERSION_MISMATCH - The object was changed while Macie was analyzing it. OOXML_UNCOMPRESSED_RATIO_EXCEEDS_LIMIT - The object is an Office Open XML file whose compression ratio exceeds the compression quota for this type of file. OOXML_UNCOMPRESSED_SIZE_EXCEEDS_LIMIT - The object is an Office Open XML file that exceeds the size quota for this type of file. PERMISSION_DENIED - Macie isn't allowed to access the object. The object's permissions settings prevent Macie from analyzing the object. SOURCE_OBJECT_NO_LONGER_AVAILABLE - The object was deleted shortly before or when Macie attempted to analyze it. TIME_CUT_OFF_REACHED - Macie started analyzing the object but additional analysis would exceed the time quota for analyzing an object. UNABLE_TO_PARSE_FILE - The object is a file that contains structured data and an error occurred when Macie attempted to parse the data. UNSUPPORTED_FILE_TYPE_EXCEPTION - The object is a file that uses an unsupported file or storage format. For information about quotas, supported storage classes, and supported file and storage formats, see Quotas and Supported storage classes and formats in the Amazon Macie User Guide."
    PolicyDetails:
      description: Provides the details of a policy finding.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/FindingAction"
          description: The action that produced the finding.
        actor:
          $ref: "#/components/schemas/FindingActor"
          description: The entity that performed the action that produced the finding.
    FindingAction:
      description: Provides information about an action that occurred for a resource and produced a policy finding.
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/FindingActionType"
          description: The type of action that occurred for the affected resource. This value is typically AWS_API_CALL, which indicates that an entity invoked an API operation for the resource.
        apiCallDetails:
          $ref: "#/components/schemas/ApiCallDetails"
          description: The invocation details of the API operation that an entity invoked for the affected resource, if the value for the actionType property is AWS_API_CALL.
    FindingActionType:
      description: "The type of action that occurred for the resource and produced the policy finding:"
      type: string
      enum:
        - AWS_API_CALL
    ApiCallDetails:
      description: Provides information about an API operation that an entity invoked for an affected resource.
      type: object
      properties:
        api:
          $ref: "#/components/schemas/__string"
          description: The name of the operation that was invoked most recently and produced the finding.
        apiServiceName:
          $ref: "#/components/schemas/__string"
          description: "The URL of the Amazon Web Services service that provides the operation, for example: s3.amazonaws.com."
        firstSeen:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The first date and time, in UTC and extended ISO 8601 format, when any operation was invoked and produced the finding.
        lastSeen:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The most recent date and time, in UTC and extended ISO 8601 format, when the specified operation (api) was invoked and produced the finding.
    FindingActor:
      description: Provides information about an entity that performed an action that produced a policy finding for a resource.
      type: object
      properties:
        domainDetails:
          $ref: "#/components/schemas/DomainDetails"
          description: The domain name of the device that the entity used to perform the action on the affected resource.
        ipAddressDetails:
          $ref: "#/components/schemas/IpAddressDetails"
          description: The IP address and related details about the device that the entity used to perform the action on the affected resource. The details can include information such as the owner and geographic location of the IP address.
        userIdentity:
          $ref: "#/components/schemas/UserIdentity"
          description: The type and other characteristics of the entity that performed the action on the affected resource. This value is null if the action was performed by an anonymous (unauthenticated) entity.
    DomainDetails:
      description: Provides information about the domain name of the device that an entity used to perform an action on an affected resource.
      type: object
      properties:
        domainName:
          $ref: "#/components/schemas/__string"
          description: The name of the domain.
    IpAddressDetails:
      description: Provides information about the IP address of the device that an entity used to perform an action on an affected resource.
      type: object
      properties:
        ipAddressV4:
          $ref: "#/components/schemas/__string"
          description: The Internet Protocol version 4 (IPv4) address of the device.
        ipCity:
          $ref: "#/components/schemas/IpCity"
          description: The city that the IP address originated from.
        ipCountry:
          $ref: "#/components/schemas/IpCountry"
          description: The country that the IP address originated from.
        ipGeoLocation:
          $ref: "#/components/schemas/IpGeoLocation"
          description: The geographic coordinates of the location that the IP address originated from.
        ipOwner:
          $ref: "#/components/schemas/IpOwner"
          description: The registered owner of the IP address.
    IpCity:
      description: Provides information about the city that an IP address originated from.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/__string"
          description: The name of the city.
    IpCountry:
      description: Provides information about the country that an IP address originated from.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/__string"
          description: The two-character code, in ISO 3166-1 alpha-2 format, for the country that the IP address originated from. For example, US for the United States.
        name:
          $ref: "#/components/schemas/__string"
          description: The name of the country that the IP address originated from.
    IpGeoLocation:
      description: Provides geographic coordinates that indicate where a specified IP address originated from.
      type: object
      properties:
        lat:
          $ref: "#/components/schemas/__double"
          description: The latitude coordinate of the location, rounded to four decimal places.
        lon:
          $ref: "#/components/schemas/__double"
          description: The longitude coordinate of the location, rounded to four decimal places.
    IpOwner:
      description: Provides information about the registered owner of an IP address.
      type: object
      properties:
        asn:
          $ref: "#/components/schemas/__string"
          description: The autonomous system number (ASN) for the autonomous system that included the IP address.
        asnOrg:
          $ref: "#/components/schemas/__string"
          description: The organization identifier that's associated with the autonomous system number (ASN) for the autonomous system that included the IP address.
        isp:
          $ref: "#/components/schemas/__string"
          description: The name of the internet service provider (ISP) that owned the IP address.
        org:
          $ref: "#/components/schemas/__string"
          description: The name of the organization that owned the IP address.
    UserIdentity:
      description: Provides information about the type and other characteristics of an entity that performed an action on an affected resource.
      type: object
      properties:
        assumedRole:
          $ref: "#/components/schemas/AssumedRole"
          description: If the action was performed with temporary security credentials that were obtained using the AssumeRole operation of the Security Token Service (STS) API, the identifiers, session context, and other details about the identity.
        awsAccount:
          $ref: "#/components/schemas/AwsAccount"
          description: If the action was performed using the credentials for another Amazon Web Services account, the details of that account.
        awsService:
          $ref: "#/components/schemas/AwsService"
          description: If the action was performed by an Amazon Web Services account that belongs to an Amazon Web Services service, the name of the service.
        federatedUser:
          $ref: "#/components/schemas/FederatedUser"
          description: If the action was performed with temporary security credentials that were obtained using the GetFederationToken operation of the Security Token Service (STS) API, the identifiers, session context, and other details about the identity.
        iamUser:
          $ref: "#/components/schemas/IamUser"
          description: If the action was performed using the credentials for an Identity and Access Management (IAM) user, the name and other details about the user.
        root:
          $ref: "#/components/schemas/UserIdentityRoot"
          description: If the action was performed using the credentials for your Amazon Web Services account, the details of your account.
        type_:
          $ref: "#/components/schemas/UserIdentityType"
          description: The type of entity that performed the action.
    AssumedRole:
      description: Provides information about an identity that performed an action on an affected resource by using temporary security credentials. The credentials were obtained using the AssumeRole operation of the Security Token Service (STS) API.
      type: object
      properties:
        accessKeyId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services access key ID that identifies the credentials.
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that owns the entity that was used to get the credentials.
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the entity that was used to get the credentials.
        principalId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the entity that was used to get the credentials.
        sessionContext:
          $ref: "#/components/schemas/SessionContext"
          description: The details of the session that was created for the credentials, including the entity that issued the session.
    SessionContext:
      description: Provides information about a session that was created for an entity that performed an action by using temporary security credentials.
      type: object
      properties:
        attributes:
          $ref: "#/components/schemas/SessionContextAttributes"
          description: The date and time when the credentials were issued, and whether the credentials were authenticated with a multi-factor authentication (MFA) device.
        sessionIssuer:
          $ref: "#/components/schemas/SessionIssuer"
          description: The source and type of credentials that were issued to the entity.
    SessionContextAttributes:
      description: Provides information about the context in which temporary security credentials were issued to an entity.
      type: object
      properties:
        creationDate:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and ISO 8601 format, when the credentials were issued.
        mfaAuthenticated:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the credentials were authenticated with a multi-factor authentication (MFA) device.
    SessionIssuer:
      description: Provides information about the source and type of temporary security credentials that were issued to an entity.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that owns the entity that was used to get the credentials.
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the source account, Identity and Access Management (IAM) user, or role that was used to get the credentials.
        principalId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the entity that was used to get the credentials.
        type_:
          $ref: "#/components/schemas/__string"
          description: The source of the temporary security credentials, such as Root, IAMUser, or Role.
        userName:
          $ref: "#/components/schemas/__string"
          description: The name or alias of the user or role that issued the session. This value is null if the credentials were obtained from a root account that doesn't have an alias.
    AwsAccount:
      description: Provides information about an Amazon Web Services account and entity that performed an action on an affected resource. The action was performed using the credentials for an Amazon Web Services account other than your own account.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account.
        principalId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the entity that performed the action.
    AwsService:
      description: Provides information about an Amazon Web Service that performed an action on an affected resource.
      type: object
      properties:
        invokedBy:
          $ref: "#/components/schemas/__string"
          description: The name of the Amazon Web Service that performed the action.
    FederatedUser:
      description: Provides information about an identity that performed an action on an affected resource by using temporary security credentials. The credentials were obtained using the GetFederationToken operation of the Security Token Service (STS) API.
      type: object
      properties:
        accessKeyId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services access key ID that identifies the credentials.
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that owns the entity that was used to get the credentials.
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the entity that was used to get the credentials.
        principalId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the entity that was used to get the credentials.
        sessionContext:
          $ref: "#/components/schemas/SessionContext"
          description: The details of the session that was created for the credentials, including the entity that issued the session.
    IamUser:
      description: Provides information about an Identity and Access Management (IAM) user who performed an action on an affected resource.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account that's associated with the IAM user who performed the action.
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the principal that performed the action. The last section of the ARN contains the name of the user who performed the action.
        principalId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the IAM user who performed the action.
        userName:
          $ref: "#/components/schemas/__string"
          description: The username of the IAM user who performed the action.
    UserIdentityRoot:
      description: Provides information about an Amazon Web Services account and entity that performed an action on an affected resource. The action was performed using the credentials for your Amazon Web Services account.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Amazon Web Services account.
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the principal that performed the action. The last section of the ARN contains the name of the user or role that performed the action.
        principalId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the entity that performed the action.
    UserIdentityType:
      description: "The type of entity that performed the action on the affected resource. Possible values are:"
      type: string
      enum:
        - AssumedRole
        - IAMUser
        - FederatedUser
        - Root
        - AWSAccount
        - AWSService
    ResourcesAffected:
      description: Provides information about the resources that a finding applies to.
      type: object
      properties:
        s3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The details of the S3 bucket that the finding applies to.
        s3Object:
          $ref: "#/components/schemas/S3Object"
          description: The details of the S3 object that the finding applies to.
    S3Bucket:
      description: "Provides information about the S3 bucket that a finding applies to. If a quota prevented Amazon Macie from retrieving and processing all the bucket's information prior to generating the finding, the following values are UNKNOWN or null: allowsUnencryptedObjectUploads, defaultServerSideEncryption, publicAccess, and tags."
      type: object
      properties:
        allowsUnencryptedObjectUploads:
          $ref: "#/components/schemas/AllowsUnencryptedObjectUploads"
          description: "Specifies whether the bucket policy for the bucket requires server-side encryption of objects when objects are added to the bucket. Possible values are: FALSE - The bucket policy requires server-side encryption of new objects. PutObject requests must include a valid server-side encryption header. TRUE - The bucket doesn't have a bucket policy or it has a bucket policy that doesn't require server-side encryption of new objects. If a bucket policy exists, it doesn't require PutObject requests to include a valid server-side encryption header. UNKNOWN - Amazon Macie can't determine whether the bucket policy requires server-side encryption of new objects. Valid server-side encryption headers are: x-amz-server-side-encryption with a value of AES256 or aws:kms, and x-amz-server-side-encryption-customer-algorithm with a value of AES256."
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the bucket.
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the bucket was created. This value can also indicate when changes such as edits to the bucket's policy were most recently made to the bucket, relative to when the finding was created or last updated.
        defaultServerSideEncryption:
          $ref: "#/components/schemas/ServerSideEncryption"
          description: The default server-side encryption settings for the bucket.
        name:
          $ref: "#/components/schemas/__string"
          description: The name of the bucket.
        owner:
          $ref: "#/components/schemas/S3BucketOwner"
          description: The display name and canonical user ID for the Amazon Web Services account that owns the bucket.
        publicAccess:
          $ref: "#/components/schemas/BucketPublicAccess"
          description: The permissions settings that determine whether the bucket is publicly accessible.
        tags:
          $ref: "#/components/schemas/KeyValuePairList"
          description: The tags that are associated with the bucket.
    ServerSideEncryption:
      description: Provides information about the default server-side encryption settings for an S3 bucket or the encryption settings for an S3 object.
      type: object
      properties:
        encryptionType:
          $ref: "#/components/schemas/EncryptionType"
          description: The server-side encryption algorithm that's used when storing data in the bucket or object. If default encryption settings aren't configured for the bucket or the object isn't encrypted using server-side encryption, this value is NONE.
        kmsMasterKeyId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) or unique identifier (key ID) for the KMS key that's used to encrypt data in the bucket or the object. This value is null if an KMS key isn't used to encrypt the data.
    EncryptionType:
      description: "The server-side encryption algorithm that was used to encrypt an S3 object or is used by default to encrypt objects that are added to an S3 bucket. Possible values are:"
      type: string
      enum:
        - NONE
        - AES256
        - aws:kms
        - UNKNOWN
        - aws:kms:dsse
    S3BucketOwner:
      description: Provides information about the Amazon Web Services account that owns an S3 bucket.
      type: object
      properties:
        displayName:
          $ref: "#/components/schemas/__string"
          description: The display name of the account that owns the bucket.
        id:
          $ref: "#/components/schemas/__string"
          description: The canonical user ID for the account that owns the bucket.
    KeyValuePairList:
      description: Provides information about the tags that are associated with an S3 bucket or object. Each tag consists of a required tag key and an associated tag value.
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    S3Object:
      description: Provides information about the S3 object that a finding applies to.
      type: object
      properties:
        bucketArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the bucket that contains the object.
        eTag:
          $ref: "#/components/schemas/__string"
          description: The entity tag (ETag) that identifies the affected version of the object. If the object was overwritten or changed after Amazon Macie produced the finding, this value might be different from the current ETag for the object.
        extension:
          $ref: "#/components/schemas/__string"
          description: The file name extension of the object. If the object doesn't have a file name extension, this value is "".
        key:
          $ref: "#/components/schemas/__string"
          description: The full name (key) of the object, including the object's prefix if applicable.
        lastModified:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the object was last modified.
        path:
          $ref: "#/components/schemas/__string"
          description: The full path to the affected object, including the name of the affected bucket and the object's name (key).
        publicAccess:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the object is publicly accessible due to the combination of permissions settings that apply to the object.
        serverSideEncryption:
          $ref: "#/components/schemas/ServerSideEncryption"
          description: The type of server-side encryption that was used to encrypt the object.
        size:
          $ref: "#/components/schemas/__long"
          description: The total storage size, in bytes, of the object.
        storageClass:
          $ref: "#/components/schemas/StorageClass"
          description: The storage class of the object.
        tags:
          $ref: "#/components/schemas/KeyValuePairList"
          description: The tags that are associated with the object.
        versionId:
          $ref: "#/components/schemas/__string"
          description: The identifier for the affected version of the object.
    StorageClass:
      description: "The storage class of the S3 object. Possible values are:"
      type: string
      enum:
        - STANDARD
        - REDUCED_REDUNDANCY
        - STANDARD_IA
        - INTELLIGENT_TIERING
        - DEEP_ARCHIVE
        - ONEZONE_IA
        - GLACIER
        - GLACIER_IR
        - OUTPOSTS
    Severity:
      description: Provides the numerical and qualitative representations of a finding's severity.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/SeverityDescription"
          description: The qualitative representation of the finding's severity, ranging from Low (least severe) to High (most severe).
        score:
          $ref: "#/components/schemas/__long"
          description: The numerical representation of the finding's severity, ranging from 1 (least severe) to 3 (most severe).
    SeverityDescription:
      description: "The qualitative representation of the finding's severity. Possible values are:"
      type: string
      enum:
        - Low
        - Medium
        - High
    GetFindingsFilterResponse:
      type: object
      properties:
        action:
          $ref: "#/components/schemas/FindingsFilterAction"
          description: "The action that's performed on findings that match the filter criteria (findingCriteria). Possible values are: ARCHIVE, suppress (automatically archive) the findings; and, NOOP, don't perform any action on the findings."
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the filter.
        description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the filter.
        findingCriteria:
          $ref: "#/components/schemas/FindingCriteria"
          description: The criteria that's used to filter findings.
        id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the filter.
        name:
          $ref: "#/components/schemas/__string"
          description: The custom name of the filter.
        position:
          $ref: "#/components/schemas/__integer"
          description: The position of the filter in the list of saved filters on the Amazon Macie console. This value also determines the order in which the filter is applied to findings, relative to other filters that are also applied to the findings.
        tags:
          type: object
          properties: {}
          description: A map of key-value pairs that specifies which tags (keys and values) are associated with the filter.
    GetFindingsPublicationConfigurationResponse:
      type: object
      properties:
        securityHubConfiguration:
          $ref: "#/components/schemas/SecurityHubConfiguration"
          description: The configuration settings that determine which findings are published to Security Hub.
    SecurityHubConfiguration:
      description: Specifies configuration settings that determine which findings are published to Security Hub automatically. For information about how Macie publishes findings to Security Hub, see Evaluating findings with Security Hub in the Amazon Macie User Guide.
      type: object
      properties:
        publishClassificationFindings:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether to publish sensitive data findings to Security Hub. If you set this value to true, Amazon Macie automatically publishes all sensitive data findings that weren't suppressed by a findings filter. The default value is false.
        publishPolicyFindings:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether to publish policy findings to Security Hub. If you set this value to true, Amazon Macie automatically publishes all new and updated policy findings that weren't suppressed by a findings filter. The default value is true.
      required:
        - publishPolicyFindings
        - publishClassificationFindings
    GetInvitationsCountResponse:
      type: object
      properties:
        invitationsCount:
          $ref: "#/components/schemas/__long"
          description: The total number of invitations that were received by the account, not including the currently accepted invitation.
    GetMacieSessionResponse:
      type: object
      properties:
        createdAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when the Amazon Macie account was created.
        findingPublishingFrequency:
          $ref: "#/components/schemas/FindingPublishingFrequency"
          description: The frequency with which Amazon Macie publishes updates to policy findings for the account. This includes publishing updates to Security Hub and Amazon EventBridge (formerly Amazon CloudWatch Events).
        serviceRole:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the service-linked role that allows Amazon Macie to monitor and analyze data in Amazon Web Services resources for the account.
        status:
          $ref: "#/components/schemas/MacieStatus"
          description: "The current status of the Amazon Macie account. Possible values are: PAUSED, the account is enabled but all Macie activities are suspended (paused) for the account; and, ENABLED, the account is enabled and all Macie activities are enabled for the account."
        updatedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, of the most recent change to the status or configuration settings for the Amazon Macie account.
    GetMasterAccountResponse:
      type: object
      properties:
        master:
          $ref: "#/components/schemas/Invitation"
          description: (Deprecated) The Amazon Web Services account ID for the administrator account. If the accounts are associated by a Macie membership invitation, this object also provides details about the invitation that was sent to establish the relationship between the accounts.
    GetMemberResponse:
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the account.
        administratorAccountId:
          $ref: "#/components/schemas/__string"
          description: The Amazon Web Services account ID for the administrator account.
        arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the account.
        email:
          $ref: "#/components/schemas/__string"
          description: The email address for the account. This value is null if the account is associated with the administrator account through Organizations.
        invitedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when an Amazon Macie membership invitation was last sent to the account. This value is null if a Macie membership invitation hasn't been sent to the account.
        masterAccountId:
          $ref: "#/components/schemas/__string"
          description: (Deprecated) The Amazon Web Services account ID for the administrator account. This property has been replaced by the administratorAccountId property and is retained only for backward compatibility.
        relationshipStatus:
          $ref: "#/components/schemas/RelationshipStatus"
          description: The current status of the relationship between the account and the administrator account.
        tags:
          type: object
          properties: {}
          description: A map of key-value pairs that specifies which tags (keys and values) are associated with the account in Amazon Macie.
        updatedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, of the most recent change to the status of the relationship between the account and the administrator account.
    GetResourceProfileResponse:
      type: object
      properties:
        profileUpdatedAt:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The date and time, in UTC and extended ISO 8601 format, when Amazon Macie most recently recalculated sensitive data discovery statistics and details for the bucket. If the bucket's sensitivity score is calculated automatically, this includes the score.
        sensitivityScore:
          $ref: "#/components/schemas/__integer"
          description: The current sensitivity score for the bucket, ranging from -1 (classification error) to 100 (sensitive). By default, this score is calculated automatically based on the amount of data that Amazon Macie has analyzed in the bucket and the amount of sensitive data that Macie has found in the bucket.
        sensitivityScoreOverridden:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the bucket's current sensitivity score was set manually. If this value is true, the score was manually changed to 100. If this value is false, the score was calculated automatically by Amazon Macie.
        statistics:
          $ref: "#/components/schemas/ResourceStatistics"
          description: The sensitive data discovery statistics for the bucket. The statistics capture the results of automated sensitive data discovery activities that Amazon Macie has performed for the bucket.
    ResourceStatistics:
      description: Provides statistical data for sensitive data discovery metrics that apply to an S3 bucket that Amazon Macie monitors and analyzes for an account, if automated sensitive data discovery has been enabled for the account. The data captures the results of automated sensitive data discovery activities that Macie has performed for the bucket.
      type: object
      properties:
        totalBytesClassified:
          $ref: "#/components/schemas/__long"
          description: The total amount of data, in bytes, that Amazon Macie has analyzed in the bucket.
        totalDetections:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of sensitive data that Amazon Macie has found in the bucket's objects. This includes occurrences that are currently suppressed by the sensitivity scoring settings for the bucket (totalDetectionsSuppressed).
        totalDetectionsSuppressed:
          $ref: "#/components/schemas/__long"
          description: The total number of occurrences of sensitive data that are currently suppressed by the sensitivity scoring settings for the bucket. These represent occurrences of sensitive data that Amazon Macie found in the bucket's objects, but the occurrences were manually suppressed. By default, suppressed occurrences are excluded from the bucket's sensitivity score.
        totalItemsClassified:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie has analyzed in the bucket.
        totalItemsSensitive:
          $ref: "#/components/schemas/__long"
          description: The total number of the bucket's objects that Amazon Macie has found sensitive data in.
        totalItemsSkipped:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie wasn't able to analyze in the bucket due to an object-level issue or error. For example, an object is a malformed file. This value includes objects that Macie wasn't able to analyze for reasons reported by other statistics in the ResourceStatistics object.
        totalItemsSkippedInvalidEncryption:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie wasn't able to analyze in the bucket because the objects are encrypted with a key that Macie can't access. The objects use server-side encryption with customer-provided keys (SSE-C).
        totalItemsSkippedInvalidKms:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie wasn't able to analyze in the bucket because the objects are encrypted with KMS keys that were disabled, are scheduled for deletion, or were deleted.
        totalItemsSkippedPermissionDenied:
          $ref: "#/components/schemas/__long"
          description: The total number of objects that Amazon Macie wasn't able to analyze in the bucket due to the permissions settings for the objects or the permissions settings for the keys that were used to encrypt the objects.
    GetRevealConfigurationResponse:
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/RevealConfiguration"
          description: The KMS key that's used to encrypt the sensitive data, and the status of the configuration for the Amazon Macie account.
        retrievalConfiguration:
          $ref: "#/components/schemas/RetrievalConfiguration"
          description: The access method and settings that are used to retrieve the sensitive data.
    RevealConfiguration:
      description: Specifies the status of the Amazon Macie configuration for retrieving occurrences of sensitive data reported by findings, and the Key Management Service (KMS) key to use to encrypt sensitive data that's retrieved. When you enable the configuration for the first time, your request must specify an KMS key. Otherwise, an error occurs.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/__stringMin1Max2048"
          description: "The Amazon Resource Name (ARN), ID, or alias of the KMS key to use to encrypt sensitive data that's retrieved. The key must be an existing, customer managed, symmetric encryption key that's enabled in the same Amazon Web Services Region as the Amazon Macie account. If this value specifies an alias, it must include the following prefix: alias/. If this value specifies a key that's owned by another Amazon Web Services account, it must specify the ARN of the key or the ARN of the key's alias."
        status:
          $ref: "#/components/schemas/RevealStatus"
          description: "The status of the configuration for the Amazon Macie account. In a response, possible values are: ENABLED, the configuration is currently enabled for the account; and, DISABLED, the configuration is currently disabled for the account. In a request, valid values are: ENABLED, enable the configuration for the account; and, DISABLED, disable the configuration for the account. If you disable the configuration, you also permanently delete current settings that specify how to access affected S3 objects. If your current access method is ASSUME_ROLE, Macie also deletes the external ID and role name currently specified for the configuration. These settings can't be recovered after they're deleted."
      required:
        - status
    __stringMin1Max2048:
      type: string
      minLength: 1
      maxLength: 2048
    RevealStatus:
      description: "The status of the configuration for retrieving occurrences of sensitive data reported by findings. Valid values are:"
      type: string
      enum:
        - ENABLED
        - DISABLED
    RetrievalConfiguration:
