      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetARN:
                  $ref: "#/components/schemas/TargetARN"
                  description: The Amazon Resource Name (ARN) of the iSCSI volume target. Use the DescribeStorediSCSIVolumes operation to return to retrieve the TargetARN for specified VolumeARN.
                InitiatorName:
                  $ref: "#/components/schemas/IqnName"
                  description: The iSCSI initiator that connects to the target.
              required:
                - TargetARN
                - InitiatorName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChapCredentialsOutput"
  /DeleteFileShare:
    post:
      operationId: DeleteFileShare
      description: Deletes a file share from an S3 File Gateway. This operation is only supported for S3 File Gateways.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteFileShare
            default: StorageGateway_20130630.DeleteFileShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
                  description: The Amazon Resource Name (ARN) of the file share to be deleted.
                ForceDelete:
                  $ref: "#/components/schemas/boolean"
                  description: "If this value is set to true, the operation deletes a file share immediately and aborts all data uploads to Amazon Web Services. Otherwise, the file share is not deleted until all data is uploaded to Amazon Web Services. This process aborts the data upload process, and the file share enters the FORCE_DELETING status. Valid Values: true | false"
              required:
                - FileShareARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFileShareOutput"
  /DeleteGateway:
    post:
      operationId: DeleteGateway
      description: Deletes a gateway. To specify which gateway to delete, use the Amazon Resource Name (ARN) of the gateway in your request. The operation deletes the gateway; however, it does not delete the gateway virtual machine (VM) from your host computer. After you delete a gateway, you cannot reactivate it. Completed snapshots of the gateway volumes are not deleted upon deleting the gateway, however, pending snapshots will not complete. After you delete a gateway, your next step is to remove it from your environment. You no longer pay software charges after the gateway is deleted; however, your existing Amazon EBS snapshots persist and you will continue to be billed for these snapshots. You can choose to remove all remaining Amazon EBS snapshots by canceling your Amazon EC2 subscription. If you prefer not to cancel your Amazon EC2 subscription, you can delete your snapshots using the Amazon EC2 console. For more information, see the Storage Gateway detail page.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteGateway
            default: StorageGateway_20130630.DeleteGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGatewayOutput"
  /DeleteSnapshotSchedule:
    post:
      operationId: DeleteSnapshotSchedule
      description: Deletes a snapshot of a volume. You can take snapshots of your gateway volumes on a scheduled or ad hoc basis. This API action enables you to delete a snapshot schedule for a volume. For more information, see Backing up your volumes. In the DeleteSnapshotSchedule request, you identify the volume by providing its Amazon Resource Name (ARN). This operation is only supported for cached volume gateway types. To list or delete a snapshot, you must use the Amazon EC2 API. For more information, go to DescribeSnapshots in the Amazon Elastic Compute Cloud API Reference.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteSnapshotSchedule
            default: StorageGateway_20130630.DeleteSnapshotSchedule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The volume which snapshot schedule to delete.
              required:
                - VolumeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSnapshotScheduleOutput"
  /DeleteTape:
    post:
      operationId: DeleteTape
      description: Deletes the specified virtual tape. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteTape
            default: StorageGateway_20130630.DeleteTape
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The unique Amazon Resource Name (ARN) of the gateway that the virtual tape to delete is associated with. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The Amazon Resource Name (ARN) of the virtual tape to delete.
                BypassGovernanceRetention:
                  $ref: "#/components/schemas/boolean"
                  description: Set to TRUE to delete an archived tape that belongs to a custom pool with tape retention lock. Only archived tapes with tape retention lock set to governance can be deleted. Archived tapes with tape retention lock set to compliance can't be deleted.
              required:
                - GatewayARN
                - TapeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTapeOutput"
  /DeleteTapeArchive:
    post:
      operationId: DeleteTapeArchive
      description: Deletes the specified virtual tape from the virtual tape shelf (VTS). This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteTapeArchive
            default: StorageGateway_20130630.DeleteTapeArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The Amazon Resource Name (ARN) of the virtual tape to delete from the virtual tape shelf (VTS).
                BypassGovernanceRetention:
                  $ref: "#/components/schemas/boolean"
                  description: Set to TRUE to delete an archived tape that belongs to a custom pool with tape retention lock. Only archived tapes with tape retention lock set to governance can be deleted. Archived tapes with tape retention lock set to compliance can't be deleted.
              required:
                - TapeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTapeArchiveOutput"
  /DeleteTapePool:
    post:
      operationId: DeleteTapePool
      description: Delete a custom tape pool. A custom tape pool can only be deleted if there are no tapes in the pool and if there are no automatic tape creation policies that reference the custom tape pool.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteTapePool
            default: StorageGateway_20130630.DeleteTapePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PoolARN:
                  $ref: "#/components/schemas/PoolARN"
                  description: The Amazon Resource Name (ARN) of the custom tape pool to delete.
              required:
                - PoolARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTapePoolOutput"
  /DeleteVolume:
    post:
      operationId: DeleteVolume
      description: Deletes the specified storage volume that you previously created using the CreateCachediSCSIVolume or CreateStorediSCSIVolume API. This operation is only supported in the cached volume and stored volume types. For stored volume gateways, the local disk that was configured as the storage volume is not deleted. You can reuse the local disk to create another storage volume. Before you delete a volume, make sure there are no iSCSI connections to the volume you are deleting. You should also make sure there is no snapshot in progress. You can use the Amazon Elastic Compute Cloud (Amazon EC2) API to query snapshots on the volume you are deleting and check the snapshot status. For more information, go to DescribeSnapshots in the Amazon Elastic Compute Cloud API Reference. In the request, you must provide the Amazon Resource Name (ARN) of the storage volume you want to delete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteVolume
            default: StorageGateway_20130630.DeleteVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume. Use the ListVolumes operation to return a list of gateway volumes.
              required:
                - VolumeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVolumeOutput"
  /DescribeAvailabilityMonitorTest:
    post:
      operationId: DescribeAvailabilityMonitorTest
      description: Returns information about the most recent high availability monitoring test that was performed on the host in a cluster. If a test isn't performed, the status and start time in the response would be null.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
