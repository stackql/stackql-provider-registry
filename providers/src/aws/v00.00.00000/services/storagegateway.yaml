      type: object
      properties:
        VolumeARN:
          $ref: "#/components/schemas/VolumeARN"
          description: The Amazon Resource Name (ARN) of the volume that was detached.
    DisableGatewayOutput:
      description: DisableGatewayOutput
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
