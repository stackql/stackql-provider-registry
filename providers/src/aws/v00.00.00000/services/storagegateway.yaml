            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                  description: The Amazon Resource Name (ARN) of the resource for which you want to list tags.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: An opaque string that indicates the position at which to begin returning the list of tags.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the list of tags returned be limited to the specified number of items.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /ListTapePools:
    post:
      operationId: ListTapePools
      description: Lists custom tape pools. You specify custom tape pools to list by specifying one or more custom tape pool Amazon Resource Names (ARNs). If you don't specify a custom tape pool ARN, the operation lists all custom tape pools. This operation supports pagination. You can optionally specify the Limit parameter in the body to limit the number of tape pools in the response. If the number of tape pools returned in the response is truncated, the response includes a Marker element that you can use in your subsequent request to retrieve the next set of tape pools.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListTapePools
            default: StorageGateway_20130630.ListTapePools
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PoolARNs:
                  $ref: "#/components/schemas/PoolARNs"
                  description: The Amazon Resource Name (ARN) of each of the custom tape pools you want to list. If you don't specify a custom tape pool ARN, the response lists all custom tape pools.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: A string that indicates the position at which to begin the returned list of tape pools.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: An optional number limit for the tape pools in the list returned by this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTapePoolsOutput"
  /ListTapes:
    post:
      operationId: ListTapes
      description: Lists virtual tapes in your virtual tape library (VTL) and your virtual tape shelf (VTS). You specify the tapes to list by specifying one or more tape Amazon Resource Names (ARNs). If you don't specify a tape ARN, the operation lists all virtual tapes in both your VTL and VTS. This operation supports pagination. By default, the operation returns a maximum of up to 100 tapes. You can optionally specify the Limit parameter in the body to limit the number of tapes in the response. If the number of tapes returned in the response is truncated, the response includes a Marker element that you can use in your subsequent request to retrieve the next set of tapes. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListTapes
            default: StorageGateway_20130630.ListTapes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TapeARNs:
                  $ref: "#/components/schemas/TapeARNs"
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: A string that indicates the position at which to begin the returned list of tapes.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: An optional number limit for the tapes in the list returned by this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTapesOutput"
  /ListVolumeInitiators:
    post:
      operationId: ListVolumeInitiators
      description: Lists iSCSI initiators that are connected to a volume. You can use this operation to determine whether a volume is being used or not. This operation is only supported in the cached volume and stored volume gateway types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListVolumeInitiators
            default: StorageGateway_20130630.ListVolumeInitiators
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume. Use the ListVolumes operation to return a list of gateway volumes for the gateway.
              required:
                - VolumeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVolumeInitiatorsOutputDisplay"
  /ListVolumeRecoveryPoints:
    post:
      operationId: ListVolumeRecoveryPoints
      description: Lists the recovery points for a specified gateway. This operation is only supported in the cached volume gateway type. Each cache volume has one recovery point. A volume recovery point is a point in time at which all data of the volume is consistent and from which you can create a snapshot or clone a new cached volume from a source volume. To create a snapshot from a volume recovery point use the CreateSnapshotFromVolumeRecoveryPoint operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListVolumeRecoveryPoints
            default: StorageGateway_20130630.ListVolumeRecoveryPoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVolumeRecoveryPointsOutput"
  /ListVolumes:
    post:
      operationId: ListVolumes
      description: Lists the iSCSI stored volumes of a gateway. Results are sorted by volume ARN. The response includes only the volume ARNs. If you want additional volume information, use the DescribeStorediSCSIVolumes or the DescribeCachediSCSIVolumes API. The operation supports pagination. By default, the operation returns a maximum of up to 100 volumes. You can optionally specify the Limit field in the body to limit the number of volumes in the response. If the number of volumes returned in the response is truncated, the response includes a Marker field. You can use this Marker value in your subsequent request to retrieve the next set of volumes. This operation is only supported in the cached volume and stored volume gateway types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListVolumes
            default: StorageGateway_20130630.ListVolumes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: A string that indicates the position at which to begin the returned list of volumes. Obtain the marker from the response of a previous List iSCSI Volumes request.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the list of volumes returned be limited to the specified number of items.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVolumesOutput"
  /NotifyWhenUploaded:
    post:
      operationId: NotifyWhenUploaded
      description: Sends you notification through Amazon EventBridge when all files written to your file share have been uploaded to Amazon S3. Storage Gateway can send a notification through Amazon EventBridge when all files written to your file share up to that point in time have been uploaded to Amazon S3. These files include files written to the file share up to the time that you make a request for notification. When the upload is done, Storage Gateway sends you notification through EventBridge. You can configure EventBridge to send the notification through event targets such as Amazon SNS or Lambda function. This operation is only supported for S3 File Gateways. For more information, see Getting file upload notification in the Amazon S3 File Gateway User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.NotifyWhenUploaded
            default: StorageGateway_20130630.NotifyWhenUploaded
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
              required:
                - FileShareARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyWhenUploadedOutput"
  /RefreshCache:
    post:
      operationId: RefreshCache
      description: "Refreshes the cached inventory of objects for the specified file share. This operation finds objects in the Amazon S3 bucket that were added, removed, or replaced since the gateway last listed the bucket's contents and cached the results. This operation does not import files into the S3 File Gateway cache storage. It only updates the cached inventory to reflect changes in the inventory of the objects in the S3 bucket. This operation is only supported in the S3 File Gateway types. You can subscribe to be notified through an Amazon CloudWatch event when your RefreshCache operation completes. For more information, see Getting notified about file operations in the Amazon S3 File Gateway User Guide. This operation is Only supported for S3 File Gateways. When this API is called, it only initiates the refresh operation. When the API call completes and returns a success code, it doesn't necessarily mean that the file refresh has completed. You should use the refresh-complete notification to determine that the operation has completed before you check for new files on the gateway file share. You can subscribe to be notified through a CloudWatch event when your RefreshCache operation completes. Throttle limit: This API is asynchronous, so the gateway will accept no more than two refreshes at any time. We recommend using the refresh-complete CloudWatch event notification before issuing additional requests. For more information, see Getting notified about file operations in the Amazon S3 File Gateway User Guide. Wait at least 60 seconds between consecutive RefreshCache API requests. If you invoke the RefreshCache API when two requests are already being processed, any new request will cause an InvalidGatewayRequestException error because too many requests were sent to the server. The S3 bucket name does not need to be included when entering the list of folders in the FolderList parameter. For more information, see Getting notified about file operations in the Amazon S3 File Gateway User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.RefreshCache
            default: StorageGateway_20130630.RefreshCache
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
                  description: The Amazon Resource Name (ARN) of the file share you want to refresh.
                FolderList:
                  $ref: "#/components/schemas/FolderList"
                  description: A comma-separated list of the paths of folders to refresh in the cache. The default is ["/"]. The default refreshes objects and folders at the root of the Amazon S3 bucket. If Recursive is set to true, the entire S3 bucket that the file share has access to is refreshed. Do not include / when specifying folder names. For example, you would specify samplefolder rather than samplefolder/.
                Recursive:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that specifies whether to recursively refresh folders in the cache. The refresh includes folders that were in the cache the last time the gateway listed the folder's contents. If this value set to true, each folder that is listed in FolderList is recursively updated. Otherwise, subfolders listed in FolderList are not refreshed. Only objects that are in folders listed directly under FolderList are found and used for the update. The default is true. Valid Values: true | false"
              required:
                - FileShareARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshCacheOutput"
  /RemoveTagsFromResource:
    post:
      operationId: RemoveTagsFromResource
      description: Removes one or more tags from the specified resource. This operation is supported in storage gateways of all types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.RemoveTagsFromResource
            default: StorageGateway_20130630.RemoveTagsFromResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                  description: The Amazon Resource Name (ARN) of the resource you want to remove the tags from.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: The keys of the tags you want to remove from the specified resource. A tag is composed of a key-value pair.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveTagsFromResourceOutput"
  /ResetCache:
    post:
      operationId: ResetCache
      description: Resets all cache disks that have encountered an error and makes the disks available for reconfiguration as cache storage. If your cache disk encounters an error, the gateway prevents read and write operations on virtual tapes in the gateway. For example, an error can occur when a disk is corrupted or removed from the gateway. When a cache is reset, the gateway loses its cache storage. At this point, you can reconfigure the disks as cache disks. This operation is only supported in the cached volume and tape types. If the cache disk you are resetting contains data that has not been uploaded to Amazon S3 yet, that data can be lost. After you reset cache disks, there will be no configured cache disks left in the gateway, so you must configure at least one new cache disk for your gateway to function properly.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ResetCache
            default: StorageGateway_20130630.ResetCache
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetCacheOutput"
  /RetrieveTapeArchive:
    post:
      operationId: RetrieveTapeArchive
      description: Retrieves an archived virtual tape from the virtual tape shelf (VTS) to a tape gateway. Virtual tapes archived in the VTS are not associated with any gateway. However after a tape is retrieved, it is associated with a gateway, even though it is also listed in the VTS, that is, archive. This operation is only supported in the tape gateway type. Once a tape is successfully retrieved to a gateway, it cannot be retrieved again to another gateway. You must archive the tape again before you can retrieve it to another gateway. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.RetrieveTapeArchive
            default: StorageGateway_20130630.RetrieveTapeArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The Amazon Resource Name (ARN) of the virtual tape you want to retrieve from the virtual tape shelf (VTS).
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The Amazon Resource Name (ARN) of the gateway you want to retrieve the virtual tape to. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region. You retrieve archived virtual tapes to only one gateway and the gateway must be a tape gateway.
              required:
                - TapeARN
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveTapeArchiveOutput"
  /RetrieveTapeRecoveryPoint:
    post:
      operationId: RetrieveTapeRecoveryPoint
      description: Retrieves the recovery point for the specified virtual tape. This operation is only supported in the tape gateway type. A recovery point is a point in time view of a virtual tape at which all the data on the tape is consistent. If your gateway crashes, virtual tapes that have recovery points can be recovered to a new gateway. The virtual tape can be retrieved to only one gateway. The retrieved tape is read-only. The virtual tape can be retrieved to only a tape gateway. There is no charge for retrieving recovery points.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.RetrieveTapeRecoveryPoint
            default: StorageGateway_20130630.RetrieveTapeRecoveryPoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The Amazon Resource Name (ARN) of the virtual tape for which you want to retrieve the recovery point.
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - TapeARN
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveTapeRecoveryPointOutput"
  /SetLocalConsolePassword:
    post:
      operationId: SetLocalConsolePassword
      description: Sets the password for your VM local console. When you log in to the local console for the first time, you log in to the VM with the default credentials. We recommend that you set a new password. You don't need to know the default password to set a new password.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.SetLocalConsolePassword
            default: StorageGateway_20130630.SetLocalConsolePassword
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                LocalConsolePassword:
                  $ref: "#/components/schemas/LocalConsolePassword"
                  description: The password you want to set for your VM local console.
              required:
                - GatewayARN
                - LocalConsolePassword
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetLocalConsolePasswordOutput"
  /SetSMBGuestPassword:
    post:
      operationId: SetSMBGuestPassword
      description: Sets the password for the guest user smbguest. The smbguest user is the user when the authentication method for the file share is set to GuestAccess. This operation only supported for S3 File Gateways
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.SetSMBGuestPassword
            default: StorageGateway_20130630.SetSMBGuestPassword
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The Amazon Resource Name (ARN) of the S3 File Gateway the SMB file share is associated with.
                Password:
                  $ref: "#/components/schemas/SMBGuestPassword"
                  description: The password that you want to set for your SMB server.
              required:
                - GatewayARN
                - Password
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetSMBGuestPasswordOutput"
  /ShutdownGateway:
    post:
      operationId: ShutdownGateway
      description: Shuts down a Tape Gateway or Volume Gateway. To specify which gateway to shut down, use the Amazon Resource Name (ARN) of the gateway in the body of your request. This API action cannot be used to shut down S3 File Gateway or FSx File Gateway. The operation shuts down the gateway service component running in the gateway's virtual machine (VM) and not the host VM. If you want to shut down the VM, it is recommended that you first shut down the gateway component in the VM to avoid unpredictable conditions. After the gateway is shutdown, you cannot call any other API except StartGateway, DescribeGatewayInformation, and ListGateways. For more information, see ActivateGateway. Your applications cannot read from or write to the gateway's storage volumes, and there are no snapshots taken. When you make a shutdown request, you will get a 200 OK success response immediately. However, it might take some time for the gateway to shut down. You can call the DescribeGatewayInformation API to check the status. For more information, see ActivateGateway. If do not intend to use the gateway again, you must delete the gateway (using DeleteGateway) to no longer pay software charges associated with the gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ShutdownGateway
            default: StorageGateway_20130630.ShutdownGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShutdownGatewayOutput"
  /StartAvailabilityMonitorTest:
    post:
      operationId: StartAvailabilityMonitorTest
      description: Start a test that verifies that the specified gateway is configured for High Availability monitoring in your host environment. This request only initiates the test and that a successful response only indicates that the test was started. It doesn't indicate that the test passed. For the status of the test, invoke the DescribeAvailabilityMonitorTest API. Starting this test will cause your gateway to go offline for a brief period.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.StartAvailabilityMonitorTest
            default: StorageGateway_20130630.StartAvailabilityMonitorTest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAvailabilityMonitorTestOutput"
  /StartCacheReport:
    post:
      operationId: StartCacheReport
      description: "Starts generating a report of the file metadata currently cached by an S3 File Gateway for a specific file share. You can use this report to identify and resolve issues if you have files failing upload from your gateway to Amazon S3. The report is a CSV file containing a list of files which match the set of filter parameters you specify in the request. The Files Failing Upload flag is reset every 24 hours and during gateway reboot. If this report captures the files after the reset, but before they become flagged again, they will not be reported as Files Failing Upload. The following requirements must be met to successfully generate a cache report: You must have s3:PutObject and s3:AbortMultipartUpload permissions for the Amazon S3 bucket where you want to store the cache report. No other cache reports can currently be in-progress for the specified file share. There must be fewer than 10 existing cache reports for the specified file share. The gateway must be online and connected to Amazon Web Services. The root disk must have at least 20GB of free space when report generation starts. You must specify at least one value for InclusionFilters or ExclusionFilters in the request."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.StartCacheReport
            default: StorageGateway_20130630.StartCacheReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
                Role:
                  $ref: "#/components/schemas/Role"
                  description: The ARN of the IAM role used when saving the cache report to Amazon S3.
                LocationARN:
                  $ref: "#/components/schemas/LocationARN"
                  description: The ARN of the Amazon S3 bucket where you want to save the cache report. We do not recommend saving the cache report to the same Amazon S3 bucket for which you are generating the report. This field does not accept access point ARNs.
                BucketRegion:
                  $ref: "#/components/schemas/RegionId"
                  description: The Amazon Web Services Region of the Amazon S3 bucket where you want to save the cache report.
                VPCEndpointDNSName:
                  $ref: "#/components/schemas/DNSHostName"
                  description: The DNS name of the VPC endpoint associated with the Amazon S3 where you want to save the cache report. Optional.
                InclusionFilters:
                  $ref: "#/components/schemas/CacheReportFilterList"
                  description: The list of filters and parameters that determine which files are included in the report. You must specify at least one value for InclusionFilters or ExclusionFilters in a StartCacheReport request.
                ExclusionFilters:
                  $ref: "#/components/schemas/CacheReportFilterList"
                  description: The list of filters and parameters that determine which files are excluded from the report. You must specify at least one value for InclusionFilters or ExclusionFilters in a StartCacheReport request.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier that you use to ensure idempotent report generation if you need to retry an unsuccessful StartCacheReport request. If you retry a request, use the same ClientToken you specified in the initial request.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of up to 50 key/value tags that you can assign to the cache report. Using tags can help you categorize your reports and more easily locate them in search results.
              required:
                - FileShareARN
                - Role
                - LocationARN
                - BucketRegion
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCacheReportOutput"
  /StartGateway:
    post:
      operationId: StartGateway
      description: Starts a gateway that you previously shut down (see ShutdownGateway). After the gateway starts, you can then make other API calls, your applications can read from or write to the gateway's storage volumes and you will be able to take snapshot backups. When you make a request, you will get a 200 OK success response immediately. However, it might take some time for the gateway to be ready. You should call DescribeGatewayInformation and check the status before making any additional API calls. For more information, see ActivateGateway. To specify which gateway to start, use the Amazon Resource Name (ARN) of the gateway in your request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.StartGateway
            default: StorageGateway_20130630.StartGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartGatewayOutput"
  /UpdateAutomaticTapeCreationPolicy:
    post:
      operationId: UpdateAutomaticTapeCreationPolicy
      description: Updates the automatic tape creation policy of a gateway. Use this to update the policy with a new set of automatic tape creation rules. This is only supported for tape gateways. By default, there is no automatic tape creation policy. A gateway can have only one automatic tape creation policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateAutomaticTapeCreationPolicy
            default: StorageGateway_20130630.UpdateAutomaticTapeCreationPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AutomaticTapeCreationRules:
                  $ref: "#/components/schemas/AutomaticTapeCreationRules"
                  description: An automatic tape creation policy consists of a list of automatic tape creation rules. The rules determine when and how to automatically create new tapes.
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - AutomaticTapeCreationRules
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAutomaticTapeCreationPolicyOutput"
  /UpdateBandwidthRateLimit:
    post:
      operationId: UpdateBandwidthRateLimit
      description: Updates the bandwidth rate limits of a gateway. You can update both the upload and download bandwidth rate limit or specify only one of the two. If you don't set a bandwidth rate limit, the existing rate limit remains. This operation is supported only for the stored volume, cached volume, and tape gateway types. To update bandwidth rate limits for S3 file gateways, use UpdateBandwidthRateLimitSchedule. By default, a gateway's bandwidth rate limits are not set. If you don't set any limit, the gateway does not have any limitations on its bandwidth usage and could potentially use the maximum available bandwidth. To specify which gateway to update, use the Amazon Resource Name (ARN) of the gateway in your request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateBandwidthRateLimit
            default: StorageGateway_20130630.UpdateBandwidthRateLimit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                AverageUploadRateLimitInBitsPerSec:
                  $ref: "#/components/schemas/BandwidthUploadRateLimit"
                  description: The average upload bandwidth rate limit in bits per second.
                AverageDownloadRateLimitInBitsPerSec:
                  $ref: "#/components/schemas/BandwidthDownloadRateLimit"
                  description: The average download bandwidth rate limit in bits per second.
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBandwidthRateLimitOutput"
  /UpdateBandwidthRateLimitSchedule:
    post:
      operationId: UpdateBandwidthRateLimitSchedule
      description: Updates the bandwidth rate limit schedule for a specified gateway. By default, gateways do not have bandwidth rate limit schedules, which means no bandwidth rate limiting is in effect. Use this to initiate or update a gateway's bandwidth rate limit schedule. This operation is supported for volume, tape, and S3 file gateways. S3 file gateways support bandwidth rate limits for upload only. FSx file gateways do not support bandwidth rate limits.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateBandwidthRateLimitSchedule
            default: StorageGateway_20130630.UpdateBandwidthRateLimitSchedule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                BandwidthRateLimitIntervals:
                  $ref: "#/components/schemas/BandwidthRateLimitIntervals"
                  description: An array containing bandwidth rate limit schedule intervals for a gateway. When no bandwidth rate limit intervals have been scheduled, the array is empty.
              required:
                - GatewayARN
                - BandwidthRateLimitIntervals
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBandwidthRateLimitScheduleOutput"
  /UpdateChapCredentials:
    post:
      operationId: UpdateChapCredentials
      description: Updates the Challenge-Handshake Authentication Protocol (CHAP) credentials for a specified iSCSI target. By default, a gateway does not have CHAP enabled; however, for added security, you might use it. This operation is supported in the volume and tape gateway types. When you update CHAP credentials, all existing connections on the target are closed and initiators must reconnect with the new credentials.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateChapCredentials
            default: StorageGateway_20130630.UpdateChapCredentials
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetARN:
                  $ref: "#/components/schemas/TargetARN"
                  description: The Amazon Resource Name (ARN) of the iSCSI volume target. Use the DescribeStorediSCSIVolumes operation to return the TargetARN for specified VolumeARN.
                SecretToAuthenticateInitiator:
                  $ref: "#/components/schemas/ChapSecret"
                  description: The secret key that the initiator (for example, the Windows client) must provide to participate in mutual CHAP with the target. The secret key must be between 12 and 16 bytes when encoded in UTF-8.
                InitiatorName:
                  $ref: "#/components/schemas/IqnName"
                  description: The iSCSI initiator that connects to the target.
                SecretToAuthenticateTarget:
                  $ref: "#/components/schemas/ChapSecret"
                  description: "The secret key that the target must provide to participate in mutual CHAP with the initiator (e.g. Windows client). Byte constraints: Minimum bytes of 12. Maximum bytes of 16. The secret key must be between 12 and 16 bytes when encoded in UTF-8."
              required:
                - TargetARN
                - SecretToAuthenticateInitiator
                - InitiatorName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChapCredentialsOutput"
  /UpdateFileSystemAssociation:
    post:
      operationId: UpdateFileSystemAssociation
      description: Updates a file system association. This operation is only supported in the FSx File Gateways.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateFileSystemAssociation
            default: StorageGateway_20130630.UpdateFileSystemAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileSystemAssociationARN:
                  $ref: "#/components/schemas/FileSystemAssociationARN"
                  description: The Amazon Resource Name (ARN) of the file system association that you want to update.
                UserName:
                  $ref: "#/components/schemas/DomainUserName"
                  description: The user name of the user credential that has permission to access the root share D$ of the Amazon FSx file system. The user account must belong to the Amazon FSx delegated admin user group.
                Password:
                  $ref: "#/components/schemas/DomainUserPassword"
                  description: The password of the user credential.
                AuditDestinationARN:
                  $ref: "#/components/schemas/AuditDestinationARN"
                  description: The Amazon Resource Name (ARN) of the storage used for the audit logs.
                CacheAttributes:
                  $ref: "#/components/schemas/CacheAttributes"
              required:
                - FileSystemAssociationARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFileSystemAssociationOutput"
  /UpdateGatewayInformation:
    post:
      operationId: UpdateGatewayInformation
      description: Updates a gateway's metadata, which includes the gateway's name, time zone, and metadata cache size. To specify which gateway to update, use the Amazon Resource Name (ARN) of the gateway in your request. For gateways activated after September 2, 2015, the gateway's ARN contains the gateway ID rather than the gateway name. However, changing the name of the gateway has no effect on the gateway's ARN.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateGatewayInformation
            default: StorageGateway_20130630.UpdateGatewayInformation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                GatewayName:
                  $ref: "#/components/schemas/GatewayName"
                GatewayTimezone:
                  $ref: "#/components/schemas/GatewayTimezone"
                  description: A value that indicates the time zone of the gateway.
                CloudWatchLogGroupARN:
                  $ref: "#/components/schemas/CloudWatchLogGroupARN"
                  description: The Amazon Resource Name (ARN) of the Amazon CloudWatch log group that you want to use to monitor and log events in the gateway. For more information, see What is Amazon CloudWatch Logs?
                GatewayCapacity:
                  $ref: "#/components/schemas/GatewayCapacity"
                  description: Specifies the size of the gateway's metadata cache. This setting impacts gateway performance and hardware recommendations. For more information, see Performance guidance for gateways with multiple file shares in the Amazon S3 File Gateway User Guide.
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGatewayInformationOutput"
  /UpdateGatewaySoftwareNow:
    post:
      operationId: UpdateGatewaySoftwareNow
      description: Updates the gateway virtual machine (VM) software. The request immediately triggers the software update. When you make this request, you get a 200 OK success response immediately. However, it might take some time for the update to complete. You can call DescribeGatewayInformation to verify the gateway is in the STATE_RUNNING state. A software update forces a system restart of your gateway. You can minimize the chance of any disruption to your applications by increasing your iSCSI Initiators' timeouts. For more information about increasing iSCSI Initiator timeouts for Windows and Linux, see Customizing your Windows iSCSI settings and Customizing your Linux iSCSI settings, respectively.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateGatewaySoftwareNow
            default: StorageGateway_20130630.UpdateGatewaySoftwareNow
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGatewaySoftwareNowOutput"
  /UpdateMaintenanceStartTime:
    post:
      operationId: UpdateMaintenanceStartTime
      description: Updates a gateway's maintenance window schedule, with settings for monthly or weekly cadence, specific day and time to begin maintenance, and which types of updates to apply. Time configuration uses the gateway's time zone. You can pass values for a complete maintenance schedule, or update policy, or both. Previous values will persist for whichever setting you choose not to modify. If an incomplete or invalid maintenance schedule is passed, the entire request will be rejected with an error and no changes will occur. A complete maintenance schedule must include values for both MinuteOfHour and HourOfDay, and either DayOfMonth or DayOfWeek. We recommend keeping maintenance updates turned on, except in specific use cases where the brief disruptions caused by updating the gateway could critically impact your deployment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateMaintenanceStartTime
            default: StorageGateway_20130630.UpdateMaintenanceStartTime
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                HourOfDay:
                  $ref: "#/components/schemas/HourOfDay"
                  description: The hour component of the maintenance start time represented as hh, where hh is the hour (00 to 23). The hour of the day is in the time zone of the gateway.
                MinuteOfHour:
                  $ref: "#/components/schemas/MinuteOfHour"
                  description: The minute component of the maintenance start time represented as mm, where mm is the minute (00 to 59). The minute of the hour is in the time zone of the gateway.
                DayOfWeek:
                  $ref: "#/components/schemas/DayOfWeek"
                  description: The day of the week component of the maintenance start time week represented as an ordinal number from 0 to 6, where 0 represents Sunday and 6 represents Saturday.
                DayOfMonth:
                  $ref: "#/components/schemas/DayOfMonth"
                  description: The day of the month component of the maintenance start time represented as an ordinal number from 1 to 28, where 1 represents the first day of the month. It is not possible to set the maintenance schedule to start on days 29 through 31.
                SoftwareUpdatePreferences:
                  $ref: "#/components/schemas/SoftwareUpdatePreferences"
                  description: "A set of variables indicating the software update preferences for the gateway. Includes AutomaticUpdatePolicy field with the following inputs: ALL_VERSIONS - Enables regular gateway maintenance updates. EMERGENCY_VERSIONS_ONLY - Disables regular gateway maintenance updates. The gateway will still receive emergency version updates on rare occasions if necessary to remedy highly critical security or durability issues. You will be notified before an emergency version update is applied. These updates are applied during your gateway's scheduled maintenance window."
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMaintenanceStartTimeOutput"
  /UpdateNFSFileShare:
    post:
      operationId: UpdateNFSFileShare
      description: "Updates a Network File System (NFS) file share. This operation is only supported in S3 File Gateways. To leave a file share field unchanged, set the corresponding input field to null. Updates the following file share settings: Default storage class for your S3 bucket Metadata defaults for your S3 bucket Allowed NFS clients for your file share Squash settings Write status of your file share"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateNFSFileShare
            default: StorageGateway_20130630.UpdateNFSFileShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
                  description: The Amazon Resource Name (ARN) of the file share to be updated.
                EncryptionType:
                  $ref: "#/components/schemas/EncryptionType"
                  description: A value that specifies the type of server-side encryption that the file share will use for the data that it stores in Amazon S3. We recommend using EncryptionType instead of KMSEncrypted to set the file share encryption method. You do not need to provide values for both parameters. If values for both parameters exist in the same request, then the specified encryption methods must not conflict. For example, if EncryptionType is SseS3, then KMSEncrypted must be false. If EncryptionType is SseKms or DsseKms, then KMSEncrypted must be true.
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Optional. Set to true to use Amazon S3 server-side encryption with your own KMS key (SSE-KMS), or false to use a key managed by Amazon S3 (SSE-S3). To use dual-layer encryption (DSSE-KMS), set the EncryptionType parameter instead. We recommend using EncryptionType instead of KMSEncrypted to set the file share encryption method. You do not need to provide values for both parameters. If values for both parameters exist in the same request, then the specified encryption methods must not conflict. For example, if EncryptionType is SseS3, then KMSEncrypted must be false. If EncryptionType is SseKms or DsseKms, then KMSEncrypted must be true. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: Optional. The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value must be set if KMSEncrypted is true, or if EncryptionType is SseKms or DsseKms.
                NFSFileShareDefaults:
                  $ref: "#/components/schemas/NFSFileShareDefaults"
                  description: The default values for the file share. Optional.
                DefaultStorageClass:
                  $ref: "#/components/schemas/StorageClass"
                  description: "The default storage class for objects put into an Amazon S3 bucket by the S3 File Gateway. The default value is S3_STANDARD. Optional. Valid Values: S3_STANDARD | S3_INTELLIGENT_TIERING | S3_STANDARD_IA | S3_ONEZONE_IA"
                ObjectACL:
                  $ref: "#/components/schemas/ObjectACL"
                  description: A value that sets the access control list (ACL) permission for objects in the S3 bucket that a S3 File Gateway puts objects into. The default value is private.
                ClientList:
                  $ref: "#/components/schemas/FileShareClientList"
                  description: The list of clients that are allowed to access the S3 File Gateway. The list must contain either valid IPv4/IPv6 addresses or valid CIDR blocks.
                Squash:
                  $ref: "#/components/schemas/Squash"
                  description: "The user mapped to anonymous user. Valid values are the following: RootSquash: Only root is mapped to anonymous user. NoSquash: No one is mapped to anonymous user. AllSquash: Everyone is mapped to anonymous user."
                ReadOnly:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that sets the write status of a file share. Set this value to true to set the write status to read-only, otherwise set to false. Valid Values: true | false"
                GuessMIMETypeEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that enables guessing of the MIME type for uploaded objects based on file extensions. Set this value to true to enable MIME type guessing, otherwise set to false. The default value is true. Valid Values: true | false"
                RequesterPays:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that sets who pays the cost of the request and the cost associated with data download from the S3 bucket. If this value is set to true, the requester pays the costs; otherwise, the S3 bucket owner pays. However, the S3 bucket owner always pays the cost of storing data. RequesterPays is a configuration for the S3 bucket that backs the file share, so make sure that the configuration on the file share is the same as the S3 bucket configuration. Valid Values: true | false"
                FileShareName:
                  $ref: "#/components/schemas/FileShareName"
                  description: "The name of the file share. Optional. FileShareName must be set if an S3 prefix name is set in LocationARN, or if an access point or access point alias is used. A valid NFS file share name can only contain the following characters: a-z, A-Z, 0-9, -, ., and _."
                CacheAttributes:
                  $ref: "#/components/schemas/CacheAttributes"
                  description: Specifies refresh cache information for the file share.
                NotificationPolicy:
                  $ref: "#/components/schemas/NotificationPolicy"
                  description: "The notification policy of the file share. SettlingTimeInSeconds controls the number of seconds to wait after the last point in time a client wrote to a file before generating an ObjectUploaded notification. Because clients can make many small writes to files, it's best to set this parameter for as long as possible to avoid generating multiple notifications for the same file in a small time period. SettlingTimeInSeconds has no effect on the timing of the object uploading to Amazon S3, only the timing of the notification. This setting is not meant to specify an exact time at which the notification will be sent. In some cases, the gateway might require more than the specified delay time to generate and send notifications. The following example sets NotificationPolicy on with SettlingTimeInSeconds set to 60. {\\\"Upload\\\": {\\\"SettlingTimeInSeconds\\\": 60}} The following example sets NotificationPolicy off. {}"
                AuditDestinationARN:
                  $ref: "#/components/schemas/AuditDestinationARN"
                  description: The Amazon Resource Name (ARN) of the storage used for audit logs.
              required:
                - FileShareARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNFSFileShareOutput"
  /UpdateSMBFileShare:
    post:
      operationId: UpdateSMBFileShare
      description: Updates a Server Message Block (SMB) file share. This operation is only supported for S3 File Gateways. To leave a file share field unchanged, set the corresponding input field to null. File gateways require Security Token Service (Amazon Web Services STS) to be activated to enable you to create a file share. Make sure that Amazon Web Services STS is activated in the Amazon Web Services Region you are creating your file gateway in. If Amazon Web Services STS is not activated in this Amazon Web Services Region, activate it. For information about how to activate Amazon Web Services STS, see Activating and deactivating Amazon Web Services STS in an Amazon Web Services Region in the Identity and Access Management User Guide. File gateways don't support creating hard or symbolic links on a file share.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateSMBFileShare
            default: StorageGateway_20130630.UpdateSMBFileShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
                  description: The Amazon Resource Name (ARN) of the SMB file share that you want to update.
                EncryptionType:
                  $ref: "#/components/schemas/EncryptionType"
                  description: A value that specifies the type of server-side encryption that the file share will use for the data that it stores in Amazon S3. We recommend using EncryptionType instead of KMSEncrypted to set the file share encryption method. You do not need to provide values for both parameters. If values for both parameters exist in the same request, then the specified encryption methods must not conflict. For example, if EncryptionType is SseS3, then KMSEncrypted must be false. If EncryptionType is SseKms or DsseKms, then KMSEncrypted must be true.
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Optional. Set to true to use Amazon S3 server-side encryption with your own KMS key (SSE-KMS), or false to use a key managed by Amazon S3 (SSE-S3). To use dual-layer encryption (DSSE-KMS), set the EncryptionType parameter instead. We recommend using EncryptionType instead of KMSEncrypted to set the file share encryption method. You do not need to provide values for both parameters. If values for both parameters exist in the same request, then the specified encryption methods must not conflict. For example, if EncryptionType is SseS3, then KMSEncrypted must be false. If EncryptionType is SseKms or DsseKms, then KMSEncrypted must be true. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: Optional. The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value must be set if KMSEncrypted is true, or if EncryptionType is SseKms or DsseKms.
                DefaultStorageClass:
                  $ref: "#/components/schemas/StorageClass"
                  description: "The default storage class for objects put into an Amazon S3 bucket by the S3 File Gateway. The default value is S3_STANDARD. Optional. Valid Values: S3_STANDARD | S3_INTELLIGENT_TIERING | S3_STANDARD_IA | S3_ONEZONE_IA"
                ObjectACL:
                  $ref: "#/components/schemas/ObjectACL"
                  description: A value that sets the access control list (ACL) permission for objects in the S3 bucket that a S3 File Gateway puts objects into. The default value is private.
                ReadOnly:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that sets the write status of a file share. Set this value to true to set write status to read-only, otherwise set to false. Valid Values: true | false"
                GuessMIMETypeEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that enables guessing of the MIME type for uploaded objects based on file extensions. Set this value to true to enable MIME type guessing, otherwise set to false. The default value is true. Valid Values: true | false"
                RequesterPays:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that sets who pays the cost of the request and the cost associated with data download from the S3 bucket. If this value is set to true, the requester pays the costs; otherwise, the S3 bucket owner pays. However, the S3 bucket owner always pays the cost of storing data. RequesterPays is a configuration for the S3 bucket that backs the file share, so make sure that the configuration on the file share is the same as the S3 bucket configuration. Valid Values: true | false"
                SMBACLEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set this value to true to enable access control list (ACL) on the SMB file share. Set it to false to map file and directory permissions to the POSIX permissions. For more information, see Using Windows ACLs to limit SMB file share access in the Amazon S3 File Gateway User Guide. Valid Values: true | false"
                AccessBasedEnumeration:
                  $ref: "#/components/schemas/Boolean"
                  description: The files and folders on this share will only be visible to users with read access.
                AdminUserList:
                  $ref: "#/components/schemas/UserList"
                  description: "A list of users or groups in the Active Directory that have administrator rights to the file share. A group must be prefixed with the @ character. Acceptable formats include: DOMAIN\\User1, user1, @group1, and @DOMAIN\\group1. Can only be set if Authentication is set to ActiveDirectory."
                ValidUserList:
                  $ref: "#/components/schemas/UserList"
                  description: "A list of users or groups in the Active Directory that are allowed to access the file share. A group must be prefixed with the @ character. Acceptable formats include: DOMAIN\\User1, user1, @group1, and @DOMAIN\\group1. Can only be set if Authentication is set to ActiveDirectory."
                InvalidUserList:
                  $ref: "#/components/schemas/UserList"
                  description: "A list of users or groups in the Active Directory that are not allowed to access the file share. A group must be prefixed with the @ character. Acceptable formats include: DOMAIN\\User1, user1, @group1, and @DOMAIN\\group1. Can only be set if Authentication is set to ActiveDirectory."
                AuditDestinationARN:
                  $ref: "#/components/schemas/AuditDestinationARN"
                  description: The Amazon Resource Name (ARN) of the storage used for audit logs.
                CaseSensitivity:
                  $ref: "#/components/schemas/CaseSensitivity"
                  description: The case of an object name in an Amazon S3 bucket. For ClientSpecified, the client determines the case sensitivity. For CaseSensitive, the gateway determines the case sensitivity. The default value is ClientSpecified.
                FileShareName:
                  $ref: "#/components/schemas/FileShareName"
                  description: 'The name of the file share. Optional. FileShareName must be set if an S3 prefix name is set in LocationARN, or if an access point or access point alias is used. A valid SMB file share name cannot contain the following characters: [,],#,;,<,>,:,",\,/,|,?,*,+, or ASCII control characters 1-31.'
                CacheAttributes:
                  $ref: "#/components/schemas/CacheAttributes"
                  description: Specifies refresh cache information for the file share.
                NotificationPolicy:
                  $ref: "#/components/schemas/NotificationPolicy"
                  description: "The notification policy of the file share. SettlingTimeInSeconds controls the number of seconds to wait after the last point in time a client wrote to a file before generating an ObjectUploaded notification. Because clients can make many small writes to files, it's best to set this parameter for as long as possible to avoid generating multiple notifications for the same file in a small time period. SettlingTimeInSeconds has no effect on the timing of the object uploading to Amazon S3, only the timing of the notification. This setting is not meant to specify an exact time at which the notification will be sent. In some cases, the gateway might require more than the specified delay time to generate and send notifications. The following example sets NotificationPolicy on with SettlingTimeInSeconds set to 60. {\\\"Upload\\\": {\\\"SettlingTimeInSeconds\\\": 60}} The following example sets NotificationPolicy off. {}"
                OplocksEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: "Specifies whether opportunistic locking is enabled for the SMB file share. Enabling opportunistic locking on case-sensitive shares is not recommended for workloads that involve access to files with the same name in different case. Valid Values: true | false"
              required:
                - FileShareARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSMBFileShareOutput"
  /UpdateSMBFileShareVisibility:
    post:
      operationId: UpdateSMBFileShareVisibility
      description: Controls whether the shares on an S3 File Gateway are visible in a net view or browse list. The operation is only supported for S3 File Gateways.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateSMBFileShareVisibility
            default: StorageGateway_20130630.UpdateSMBFileShareVisibility
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                FileSharesVisible:
                  $ref: "#/components/schemas/Boolean"
                  description: The shares on this gateway appear when listing shares.
              required:
                - GatewayARN
                - FileSharesVisible
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSMBFileShareVisibilityOutput"
  /UpdateSMBLocalGroups:
    post:
      operationId: UpdateSMBLocalGroups
      description: Updates the list of Active Directory users and groups that have special permissions for SMB file shares on the gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateSMBLocalGroups
            default: StorageGateway_20130630.UpdateSMBLocalGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                SMBLocalGroups:
                  $ref: "#/components/schemas/SMBLocalGroups"
                  description: A list of Active Directory users and groups that you want to grant special permissions for SMB file shares on the gateway.
              required:
                - GatewayARN
                - SMBLocalGroups
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSMBLocalGroupsOutput"
  /UpdateSMBSecurityStrategy:
    post:
      operationId: UpdateSMBSecurityStrategy
      description: Updates the SMB security strategy level for an Amazon S3 file gateway. This action is only supported for Amazon S3 file gateways. For information about configuring this setting using the Amazon Web Services console, see Setting a security level for your gateway in the Amazon S3 File Gateway User Guide. A higher security strategy level can affect performance of the gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateSMBSecurityStrategy
            default: StorageGateway_20130630.UpdateSMBSecurityStrategy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                SMBSecurityStrategy:
                  $ref: "#/components/schemas/SMBSecurityStrategy"
                  description: "Specifies the type of security strategy. ClientSpecified: If you choose this option, requests are established based on what is negotiated by the client. This option is recommended when you want to maximize compatibility across different clients in your environment. Supported only for S3 File Gateway. MandatorySigning: If you choose this option, File Gateway only allows connections from SMBv2 or SMBv3 clients that have signing enabled. This option works with SMB clients on Microsoft Windows Vista, Windows Server 2008 or newer. MandatoryEncryption: If you choose this option, File Gateway only allows connections from SMBv3 clients that have encryption enabled. This option is recommended for environments that handle sensitive data. This option works with SMB clients on Microsoft Windows 8, Windows Server 2012 or newer. MandatoryEncryptionNoAes128: If you choose this option, File Gateway only allows connections from SMBv3 clients that use 256-bit AES encryption algorithms. 128-bit algorithms are not allowed. This option is recommended for environments that handle sensitive data. It works with SMB clients on Microsoft Windows 8, Windows Server 2012, or later."
              required:
                - GatewayARN
                - SMBSecurityStrategy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSMBSecurityStrategyOutput"
  /UpdateSnapshotSchedule:
    post:
      operationId: UpdateSnapshotSchedule
      description: Updates a snapshot schedule configured for a gateway volume. This operation is only supported in the cached volume and stored volume gateway types. The default snapshot schedule for volume is once every 24 hours, starting at the creation time of the volume. You can use this API to change the snapshot schedule configured for the volume. In the request you must identify the gateway volume whose snapshot schedule you want to update, and the schedule information, including when you want the snapshot to begin on a day and the frequency (in hours) of snapshots.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateSnapshotSchedule
            default: StorageGateway_20130630.UpdateSnapshotSchedule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume. Use the ListVolumes operation to return a list of gateway volumes.
                StartAt:
                  $ref: "#/components/schemas/HourOfDay"
                  description: The hour of the day at which the snapshot schedule begins represented as hh, where hh is the hour (0 to 23). The hour of the day is in the time zone of the gateway.
                RecurrenceInHours:
                  $ref: "#/components/schemas/RecurrenceInHours"
                  description: Frequency of snapshots. Specify the number of hours between snapshots.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: Optional description of the snapshot that overwrites the existing description.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to a snapshot. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - VolumeARN
                - StartAt
                - RecurrenceInHours
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSnapshotScheduleOutput"
  /UpdateVTLDeviceType:
    post:
      operationId: UpdateVTLDeviceType
      description: Updates the type of medium changer in a tape gateway. When you activate a tape gateway, you select a medium changer type for the tape gateway. This operation enables you to select a different type of medium changer after a tape gateway is activated. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.UpdateVTLDeviceType
            default: StorageGateway_20130630.UpdateVTLDeviceType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VTLDeviceARN:
                  $ref: "#/components/schemas/VTLDeviceARN"
                  description: The Amazon Resource Name (ARN) of the medium changer you want to select.
                DeviceType:
                  $ref: "#/components/schemas/DeviceType"
                  description: "The type of medium changer you want to select. Valid Values: STK-L700 | AWS-Gateway-VTL | IBM-03584L32-0402"
              required:
                - VTLDeviceARN
                - DeviceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVTLDeviceTypeOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ActivationKey:
      type: string
      minLength: 1
      maxLength: 50
    GatewayName:
      description: The name you configured for your gateway.
      type: string
      minLength: 2
      maxLength: 255
      pattern: ^[ -\.0-\[\]-~]*[!-\.0-\[\]-~][ -\.0-\[\]-~]*$
    GatewayTimezone:
      type: string
      minLength: 3
      maxLength: 10
    RegionId:
      type: string
      minLength: 1
      maxLength: 25
    GatewayType:
      type: string
      minLength: 2
      maxLength: 20
    TapeDriveType:
      type: string
      minLength: 2
      maxLength: 50
    MediumChangerType:
      type: string
      minLength: 2
      maxLength: 50
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A key-value pair that helps you manage, filter, and search for your resource. Allowed characters: letters, white space, and numbers, representable in UTF-8, and the following characters: + - = . _ : /."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Tag key. The key can't start with aws:.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: Value of the tag key.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      maxLength: 256
    ActivateGatewayOutput:
      description: Storage Gateway returns the Amazon Resource Name (ARN) of the activated gateway. It is a string made of information such as your account, gateway name, and Amazon Web Services Region. This ARN is used to reference the gateway in other API operations as well as resource-based authorization. For gateways activated prior to September 02, 2015, the gateway ARN contains the gateway name rather than the gateway ID. Changing the name of the gateway has no effect on the gateway ARN.
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
    GatewayARN:
      description: The Amazon Resource Name (ARN) of the gateway. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
      type: string
      minLength: 50
      maxLength: 500
    DiskIds:
      type: array
      items:
        $ref: "#/components/schemas/DiskId"
    DiskId:
      type: string
      minLength: 1
      maxLength: 300
    AddCacheOutput:
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
    ResourceARN:
      type: string
      minLength: 50
      maxLength: 500
    AddTagsToResourceOutput:
      description: AddTagsToResourceOutput
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the resource you want to add tags to.
    AddUploadBufferOutput:
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
    AddWorkingStorageOutput:
      description: A JSON object containing the Amazon Resource Name (ARN) of the gateway for which working storage was configured.
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
    TapeARN:
      type: string
      minLength: 50
      maxLength: 500
      pattern: arn:(aws(|-cn|-us-gov|-iso[A-Za-z0-9_-]*|-eusc)):storagegateway:[a-z\-0-9]+:[0-9]+:tape\/[0-9A-Z]{5,16}$
    PoolId:
      type: string
      minLength: 1
      maxLength: 100
    boolean:
      type: boolean
    AssignTapePoolOutput:
      type: object
      properties:
        TapeARN:
          $ref: "#/components/schemas/TapeARN"
          description: The unique Amazon Resource Names (ARN) of the virtual tape that was added to the tape pool.
    DomainUserName:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^\w[\w\.\- ]*$
    DomainUserPassword:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[ -~]+$
    ClientToken:
      type: string
      minLength: 5
      maxLength: 100
    FileSystemLocationARN:
      type: string
      minLength: 8
      maxLength: 512
    AuditDestinationARN:
      type: string
      maxLength: 1024
    CacheAttributes:
      description: The refresh cache information for the file share or FSx file systems.
      type: object
      properties:
        CacheStaleTimeoutInSeconds:
          $ref: "#/components/schemas/CacheStaleTimeoutInSeconds"
          description: Refreshes a file share's cache by using Time To Live (TTL). TTL is the length of time since the last refresh after which access to the directory would cause the file gateway to first refresh that directory's contents from the Amazon S3 bucket or Amazon FSx file system. The TTL duration is in seconds. Valid Values:0, 300 to 2,592,000 seconds (5 minutes to 30 days)
    CacheStaleTimeoutInSeconds:
      type: integer
    EndpointNetworkConfiguration:
      description: Specifies network configuration information for the gateway associated with the Amazon FSx file system.
      type: object
      properties:
        IpAddresses:
          $ref: "#/components/schemas/IpAddressList"
          description: A list of gateway IP addresses on which the associated Amazon FSx file system is available. If multiple file systems are associated with this gateway, this field is required.
    IpAddressList:
      type: array
      items:
        $ref: "#/components/schemas/IPV4Address"
    IPV4Address:
      type: string
      minLength: 7
      maxLength: 15
      pattern: ^((25[0-5]|(2[0-4]|1[0-9]|[1-9]|)[0-9])(\.(?!$)|$)){4}
    AssociateFileSystemOutput:
      type: object
      properties:
        FileSystemAssociationARN:
          $ref: "#/components/schemas/FileSystemAssociationARN"
          description: The ARN of the newly created file system association.
    FileSystemAssociationARN:
      type: string
      minLength: 50
      maxLength: 500
    TargetName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[-\.;a-z0-9]+$
    VolumeARN:
      type: string
      minLength: 50
      maxLength: 500
      pattern: arn:(aws(|-cn|-us-gov|-iso[A-Za-z0-9_-]*|-eusc)):storagegateway:[a-z\-0-9]+:[0-9]+:gateway\/(.+)\/volume\/vol-(\S+)
    NetworkInterfaceId:
      type: string
    AttachVolumeOutput:
      description: AttachVolumeOutput
      type: object
      properties:
        VolumeARN:
          $ref: "#/components/schemas/VolumeARN"
          description: The Amazon Resource Name (ARN) of the volume that was attached to the gateway.
        TargetARN:
          $ref: "#/components/schemas/TargetARN"
          description: The Amazon Resource Name (ARN) of the volume target, which includes the iSCSI name for the initiator that was used to connect to the target.
    TargetARN:
      type: string
      minLength: 50
      maxLength: 800
    CancelArchivalOutput:
      description: CancelArchivalOutput
      type: object
      properties:
        TapeARN:
          $ref: "#/components/schemas/TapeARN"
          description: The Amazon Resource Name (ARN) of the virtual tape for which archiving was canceled.
    CacheReportARN:
      type: string
      minLength: 50
      maxLength: 500
    CancelCacheReportOutput:
      type: object
      properties:
        CacheReportARN:
          $ref: "#/components/schemas/CacheReportARN"
          description: The Amazon Resource Name (ARN) of the cache report you want to cancel.
    CancelRetrievalOutput:
      description: CancelRetrievalOutput
      type: object
      properties:
        TapeARN:
          $ref: "#/components/schemas/TapeARN"
          description: The Amazon Resource Name (ARN) of the virtual tape for which retrieval was canceled.
    long:
      type: integer
      format: int64
    SnapshotId:
      type: string
      pattern: \Asnap-([0-9A-Fa-f]{8}|[0-9A-Fa-f]{17})\z
    Boolean:
      type: boolean
    KMSKey:
      description: Optional. The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value must be set if KMSEncrypted is true, or if EncryptionType is SseKms or DsseKms.
      type: string
      minLength: 7
      maxLength: 2048
      pattern: (^arn:(aws(|-cn|-us-gov|-iso[A-Za-z0-9_-]*|-eusc)):kms:([a-zA-Z0-9-]+):([0-9]+):(key|alias)/(\S+)$)|(^alias/(\S+)$)
    CreateCachediSCSIVolumeOutput:
      type: object
      properties:
        VolumeARN:
          $ref: "#/components/schemas/VolumeARN"
          description: The Amazon Resource Name (ARN) of the configured volume.
        TargetARN:
          $ref: "#/components/schemas/TargetARN"
          description: The Amazon Resource Name (ARN) of the volume target, which includes the iSCSI name that initiators can use to connect to the target.
    NFSFileShareDefaults:
      description: Describes Network File System (NFS) file share default values. Files and folders stored as Amazon S3 objects in S3 buckets don't, by default, have Unix file permissions assigned to them. Upon discovery in an S3 bucket by Storage Gateway, the S3 objects that represent files and folders are assigned these default Unix permissions. This operation is only supported for S3 File Gateways.
      type: object
      properties:
        FileMode:
          $ref: "#/components/schemas/PermissionMode"
          description: The Unix file mode in the form "nnnn". For example, 0666 represents the default file mode inside the file share. The default value is 0666.
        DirectoryMode:
          $ref: "#/components/schemas/PermissionMode"
          description: The Unix directory mode in the form "nnnn". For example, 0666 represents the default access mode for all directories inside the file share. The default value is 0777.
        GroupId:
          $ref: "#/components/schemas/PermissionId"
          description: The default group ID for the file share (unless the files have another group ID specified). The default value is nfsnobody.
        OwnerId:
          $ref: "#/components/schemas/PermissionId"
          description: The default owner ID for files in the file share (unless the files have another owner ID specified). The default value is nfsnobody.
    PermissionMode:
      type: string
      minLength: 1
      maxLength: 4
      pattern: ^[0-7]{4}$
    PermissionId:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967294
    EncryptionType:
      type: string
      enum:
        - SseS3
        - SseKms
        - DsseKms
    Role:
      description: The ARN of the IAM role that an S3 File Gateway assumes when it accesses the underlying storage.
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:(aws(|-cn|-us-gov|-iso[A-Za-z0-9_-]*|-eusc)):iam::([0-9]+):role/(\S+)$
    LocationARN:
      description: "A custom ARN for the backend storage used for storing data for file shares. It includes a resource ARN with an optional prefix concatenation. The prefix must end with a forward slash (/). You can specify LocationARN as a bucket ARN, access point ARN or access point alias, as shown in the following examples. Bucket ARN: arn:aws:s3:::amzn-s3-demo-bucket/prefix/ Access point ARN: arn:aws:s3:region:account-id:accesspoint/access-point-name/prefix/ If you specify an access point, the bucket policy must be configured to delegate access control to the access point. For information, see Delegating access control to access points in the Amazon S3 User Guide. Access point alias: test-ap-ab123cdef4gehijklmn5opqrstuvuse1a-s3alias"
      type: string
      minLength: 16
      maxLength: 1400
    StorageClass:
      type: string
      minLength: 5
      maxLength: 50
    ObjectACL:
      description: A value that sets the access control list (ACL) permission for objects in the S3 bucket that an S3 File Gateway puts objects into. The default value is private.
      type: string
      enum:
        - private
        - public-read
        - public-read-write
        - authenticated-read
        - bucket-owner-read
        - bucket-owner-full-control
        - aws-exec-read
    FileShareClientList:
      description: The list of clients that are allowed to access the S3 File Gateway. The list must contain either valid IPv4/IPv6 addresses or valid CIDR blocks.
      type: array
      items:
        $ref: "#/components/schemas/Ipv4OrIpv6AddressCIDR"
    Ipv4OrIpv6AddressCIDR:
      type: string
      pattern: ^(?:(?:[0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}(?:[0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(?:\/(?:[0-9]|[1-2][0-9]|3[0-2]))?$|^(?:(?:(?:[A-Fa-f0-9]{1,4}:){6}|(?=(?:[A-Fa-f0-9]{0,4}:){0,6}(?:[0-9]{1,3}\.){3}[0-9]{1,3}(?![:.\w]))(?:(?:[0-9A-Fa-f]{1,4}:){0,5}|:)(?:(?::[0-9A-Fa-f]{1,4}){1,5}:|:)|::(?:[A-Fa-f0-9]{1,4}:){5})(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)|(?:[A-Fa-f0-9]{1,4}:){7}[A-Fa-f0-9]{1,4}|(?=(?:[A-Fa-f0-9]{0,4}:){0,7}[A-Fa-f0-9]{0,4}(?![:.\w]))(?:(?:[0-9A-Fa-f]{1,4}:){1,7}|:)(?:(:[0-9A-Fa-f]{1,4}){1,7}|:)|(?:[A-Fa-f0-9]{1,4}:){7}:|:(:[A-Fa-f0-9]{1,4}){7})(?:\/(?:12[0-8]|1[01][0-9]|[1-9]?[0-9]))?$
    Squash:
      description: "The user mapped to anonymous user. Valid options are the following: RootSquash: Only root is mapped to anonymous user. NoSquash: No one is mapped to anonymous user. AllSquash: Everyone is mapped to anonymous user."
      type: string
      minLength: 5
      maxLength: 15
