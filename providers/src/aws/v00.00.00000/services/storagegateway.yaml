              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomaticTapeCreationPoliciesOutput"
  /ListCacheReports:
