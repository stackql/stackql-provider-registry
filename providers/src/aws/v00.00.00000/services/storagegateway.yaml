  /CreateSnapshot:
    post:
      operationId: CreateSnapshot
      description: Initiates a snapshot of a volume. Storage Gateway provides the ability to back up point-in-time snapshots of your data to Amazon Simple Storage (Amazon S3) for durable off-site recovery, and also import the data to an Amazon Elastic Block Store (EBS) volume in Amazon Elastic Compute Cloud (EC2). You can take snapshots of your gateway volume on a scheduled or ad hoc basis. This API enables you to take an ad hoc snapshot. For more information, see Editing a snapshot schedule. In the CreateSnapshot request, you identify the volume by providing its Amazon Resource Name (ARN). You must also provide description for the snapshot. When Storage Gateway takes the snapshot of specified volume, the snapshot and description appears in the Storage Gateway console. In response, Storage Gateway returns you a snapshot ID. You can use this snapshot ID to check the snapshot progress or later use it when you want to create a volume from a snapshot. This operation is only supported in stored and cached volume gateway type. To list or delete a snapshot, you must use the Amazon EC2 API. For more information, see DescribeSnapshots or DeleteSnapshot in the Amazon Elastic Compute Cloud API Reference. Volume and snapshot IDs are changing to a longer length ID format. For more information, see the important note on the Welcome page.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateSnapshot
            default: StorageGateway_20130630.CreateSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume. Use the ListVolumes operation to return a list of gateway volumes.
                SnapshotDescription:
                  $ref: "#/components/schemas/SnapshotDescription"
                  description: Textual description of the snapshot that appears in the Amazon EC2 console, Elastic Block Store snapshots panel in the Description field, and in the Storage Gateway snapshot Details pane, Description field.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to a snapshot. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - VolumeARN
                - SnapshotDescription
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotOutput"
  /CreateSnapshotFromVolumeRecoveryPoint:
    post:
      operationId: CreateSnapshotFromVolumeRecoveryPoint
      description: Initiates a snapshot of a gateway from a volume recovery point. This operation is only supported in the cached volume gateway type. A volume recovery point is a point in time at which all data of the volume is consistent and from which you can create a snapshot. To get a list of volume recovery point for cached volume gateway, use ListVolumeRecoveryPoints. In the CreateSnapshotFromVolumeRecoveryPoint request, you identify the volume by providing its Amazon Resource Name (ARN). You must also provide a description for the snapshot. When the gateway takes a snapshot of the specified volume, the snapshot and its description appear in the Storage Gateway console. In response, the gateway returns you a snapshot ID. You can use this snapshot ID to check the snapshot progress or later use it when you want to create a volume from a snapshot. To list or delete a snapshot, you must use the Amazon EC2 API. For more information, see DescribeSnapshots or DeleteSnapshot in the Amazon Elastic Compute Cloud API Reference.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateSnapshotFromVolumeRecoveryPoint
            default: StorageGateway_20130630.CreateSnapshotFromVolumeRecoveryPoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the iSCSI volume target. Use the DescribeStorediSCSIVolumes operation to return to retrieve the TargetARN for specified VolumeARN.
                SnapshotDescription:
                  $ref: "#/components/schemas/SnapshotDescription"
                  description: Textual description of the snapshot that appears in the Amazon EC2 console, Elastic Block Store snapshots panel in the Description field, and in the Storage Gateway snapshot Details pane, Description field.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to a snapshot. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - VolumeARN
                - SnapshotDescription
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotFromVolumeRecoveryPointOutput"
  /CreateStorediSCSIVolume:
    post:
      operationId: CreateStorediSCSIVolume
      description: Creates a volume on a specified gateway. This operation is only supported in the stored volume gateway type. The size of the volume to create is inferred from the disk size. You can choose to preserve existing data on the disk, create volume from an existing snapshot, or create an empty volume. If you choose to create an empty gateway volume, then any existing data on the disk is erased. In the request, you must specify the gateway and the disk information on which you are creating the volume. In response, the gateway creates the volume and returns volume information such as the volume Amazon Resource Name (ARN), its size, and the iSCSI target ARN that initiators can use to connect to the volume target.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateStorediSCSIVolume
            default: StorageGateway_20130630.CreateStorediSCSIVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                DiskId:
                  $ref: "#/components/schemas/DiskId"
                  description: The unique identifier for the gateway local disk that is configured as a stored volume. Use ListLocalDisks to list disk IDs for a gateway.
                SnapshotId:
                  $ref: "#/components/schemas/SnapshotId"
                  description: The snapshot ID (e.g., "snap-1122aabb") of the snapshot to restore as the new stored volume. Specify this field if you want to create the iSCSI storage volume from a snapshot; otherwise, do not include this field. To list snapshots for your account use DescribeSnapshots in the Amazon Elastic Compute Cloud API Reference.
                PreserveExistingData:
                  $ref: "#/components/schemas/boolean"
                  description: "Set to true if you want to preserve the data on the local disk. Otherwise, set to false to create an empty volume. Valid Values: true | false"
                TargetName:
                  $ref: "#/components/schemas/TargetName"
                  description: The name of the iSCSI target used by an initiator to connect to a volume and used as a suffix for the target ARN. For example, specifying TargetName as myvolume results in the target ARN of arn:aws:storagegateway:us-east-2:111122223333:gateway/sgw-12A3456B/target/iqn.1997-05.com.amazon:myvolume. The target name must be unique across all volumes on a gateway. If you don't specify a value, Storage Gateway uses the value that was previously used for this volume as the new target name.
                NetworkInterfaceId:
                  $ref: "#/components/schemas/NetworkInterfaceId"
                  description: "The network interface of the gateway on which to expose the iSCSI target. Accepts IPv4 and IPv6 addresses. Use DescribeGatewayInformation to get a list of the network interfaces available on a gateway. Valid Values: A valid IP address."
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set to true to use Amazon S3 server-side encryption with your own KMS key, or false to use a key managed by Amazon S3. Optional. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value can only be set when KMSEncrypted is true. Optional.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to a stored volume. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - GatewayARN
                - DiskId
                - PreserveExistingData
                - TargetName
                - NetworkInterfaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStorediSCSIVolumeOutput"
  /CreateTapePool:
    post:
      operationId: CreateTapePool
      description: Creates a new custom tape pool. You can use custom tape pool to enable tape retention lock on tapes that are archived in the custom pool.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateTapePool
            default: StorageGateway_20130630.CreateTapePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PoolName:
                  $ref: "#/components/schemas/PoolName"
                  description: The name of the new custom tape pool.
                StorageClass:
                  $ref: "#/components/schemas/TapeStorageClass"
                  description: The storage class that is associated with the new custom pool. When you use your backup application to eject the tape, the tape is archived directly into the storage class (S3 Glacier or S3 Glacier Deep Archive) that corresponds to the pool.
                RetentionLockType:
                  $ref: "#/components/schemas/RetentionLockType"
                  description: Tape retention lock can be configured in two modes. When configured in governance mode, Amazon Web Services accounts with specific IAM permissions are authorized to remove the tape retention lock from archived virtual tapes. When configured in compliance mode, the tape retention lock cannot be removed by any user, including the root Amazon Web Services account.
                RetentionLockTimeInDays:
                  $ref: "#/components/schemas/RetentionLockTimeInDays"
                  description: Tape retention lock time is set in days. Tape retention lock can be enabled for up to 100 years (36,500 days).
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to tape pool. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - PoolName
                - StorageClass
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTapePoolOutput"
  /CreateTapeWithBarcode:
    post:
      operationId: CreateTapeWithBarcode
      description: Creates a virtual tape by using your own barcode. You write data to the virtual tape and then archive the tape. A barcode is unique and cannot be reused if it has already been used on a tape. This applies to barcodes used on deleted tapes. This operation is only supported in the tape gateway type. Cache storage must be allocated to the gateway before you can create a virtual tape. Use the AddCache operation to add cache storage to a gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateTapeWithBarcode
            default: StorageGateway_20130630.CreateTapeWithBarcode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The unique Amazon Resource Name (ARN) that represents the gateway to associate the virtual tape with. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
                TapeSizeInBytes:
                  $ref: "#/components/schemas/TapeSize"
                  description: The size, in bytes, of the virtual tape that you want to create. The size must be aligned by gigabyte (1024*1024*1024 bytes).
                TapeBarcode:
                  $ref: "#/components/schemas/TapeBarcode"
                  description: The barcode that you want to assign to the tape. Barcodes cannot be reused. This includes barcodes used for tapes that have been deleted.
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set to true to use Amazon S3 server-side encryption with your own KMS key, or false to use a key managed by Amazon S3. Optional. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value can only be set when KMSEncrypted is true. Optional.
                PoolId:
                  $ref: "#/components/schemas/PoolId"
                  description: The ID of the pool that you want to add your tape to for archiving. The tape in this pool is archived in the S3 storage class that is associated with the pool. When you use your backup application to eject the tape, the tape is archived directly into the storage class (S3 Glacier or S3 Deep Archive) that corresponds to the pool.
                Worm:
                  $ref: "#/components/schemas/boolean"
                  description: Set to TRUE if the tape you are creating is to be configured as a write-once-read-many (WORM) tape.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to a virtual tape that has a barcode. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - GatewayARN
                - TapeSizeInBytes
                - TapeBarcode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTapeWithBarcodeOutput"
  /CreateTapes:
    post:
      operationId: CreateTapes
      description: Creates one or more virtual tapes. You write data to the virtual tapes and then archive the tapes. This operation is only supported in the tape gateway type. Cache storage must be allocated to the gateway before you can create virtual tapes. Use the AddCache operation to add cache storage to a gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateTapes
            default: StorageGateway_20130630.CreateTapes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The unique Amazon Resource Name (ARN) that represents the gateway to associate the virtual tapes with. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
                TapeSizeInBytes:
                  $ref: "#/components/schemas/TapeSize"
                  description: The size, in bytes, of the virtual tapes that you want to create. The size must be aligned by gigabyte (1024*1024*1024 bytes).
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier that you use to retry a request. If you retry a request, use the same ClientToken you specified in the initial request. Using the same ClientToken prevents creating the tape multiple times.
                NumTapesToCreate:
                  $ref: "#/components/schemas/NumTapesToCreate"
                  description: The number of virtual tapes that you want to create.
                TapeBarcodePrefix:
                  $ref: "#/components/schemas/TapeBarcodePrefix"
                  description: A prefix that you append to the barcode of the virtual tape you are creating. This prefix makes the barcode unique. The prefix must be 1-4 characters in length and must be one of the uppercase letters from A to Z.
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set to true to use Amazon S3 server-side encryption with your own KMS key, or false to use a key managed by Amazon S3. Optional. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value can only be set when KMSEncrypted is true. Optional.
                PoolId:
                  $ref: "#/components/schemas/PoolId"
                  description: The ID of the pool that you want to add your tape to for archiving. The tape in this pool is archived in the S3 storage class that is associated with the pool. When you use your backup application to eject the tape, the tape is archived directly into the storage class (S3 Glacier or S3 Glacier Deep Archive) that corresponds to the pool.
                Worm:
                  $ref: "#/components/schemas/boolean"
                  description: Set to TRUE if the tape you are creating is to be configured as a write-once-read-many (WORM) tape.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to a virtual tape. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - GatewayARN
                - TapeSizeInBytes
                - ClientToken
                - NumTapesToCreate
                - TapeBarcodePrefix
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTapesOutput"
  /DeleteAutomaticTapeCreationPolicy:
    post:
      operationId: DeleteAutomaticTapeCreationPolicy
      description: Deletes the automatic tape creation policy of a gateway. If you delete this policy, new virtual tapes must be created manually. Use the Amazon Resource Name (ARN) of the gateway in your request to remove the policy.
      parameters:
