            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAutomaticTapeCreationPolicyOutput"
  /DeleteBandwidthRateLimit:
    post:
      operationId: DeleteBandwidthRateLimit
      description: Deletes the bandwidth rate limits of a gateway. You can delete either the upload and download bandwidth rate limit, or you can delete both. If you delete only one of the limits, the other limit remains unchanged. To specify which gateway to work with, use the Amazon Resource Name (ARN) of the gateway in your request. This operation is supported only for the stored volume, cached volume, and tape gateway types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteBandwidthRateLimit
            default: StorageGateway_20130630.DeleteBandwidthRateLimit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                BandwidthType:
                  $ref: "#/components/schemas/BandwidthType"
                  description: "One of the BandwidthType values that indicates the gateway bandwidth rate limit to delete. Valid Values: UPLOAD | DOWNLOAD | ALL"
              required:
                - GatewayARN
                - BandwidthType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBandwidthRateLimitOutput"
  /DeleteCacheReport:
    post:
      operationId: DeleteCacheReport
      description: Deletes the specified cache report and any associated tags from the Storage Gateway database. You can only delete completed reports. If the status of the report you attempt to delete still IN-PROGRESS, the delete operation returns an error. You can use CancelCacheReport to cancel an IN-PROGRESS report. DeleteCacheReport does not delete the report object from your Amazon S3 bucket.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DeleteCacheReport
            default: StorageGateway_20130630.DeleteCacheReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CacheReportARN:
                  $ref: "#/components/schemas/CacheReportARN"
                  description: The Amazon Resource Name (ARN) of the cache report you want to delete.
              required:
                - CacheReportARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCacheReportOutput"
  /DeleteChapCredentials:
    post:
      operationId: DeleteChapCredentials
      description: Deletes Challenge-Handshake Authentication Protocol (CHAP) credentials for a specified iSCSI target and initiator pair. This operation is supported in volume and tape gateway types.
      parameters:
        - name: X-Amz-Target
          in: header
