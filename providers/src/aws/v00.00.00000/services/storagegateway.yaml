    DescribeMaintenanceStartTimeOutput:
      description: "A JSON object containing the following fields: DescribeMaintenanceStartTimeOutput$SoftwareUpdatePreferences DescribeMaintenanceStartTimeOutput$DayOfMonth DescribeMaintenanceStartTimeOutput$DayOfWeek DescribeMaintenanceStartTimeOutput$HourOfDay DescribeMaintenanceStartTimeOutput$MinuteOfHour DescribeMaintenanceStartTimeOutput$Timezone"
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        HourOfDay:
          $ref: "#/components/schemas/HourOfDay"
          description: The hour component of the maintenance start time represented as hh, where hh is the hour (0 to 23). The hour of the day is in the time zone of the gateway.
        MinuteOfHour:
          $ref: "#/components/schemas/MinuteOfHour"
          description: The minute component of the maintenance start time represented as mm, where mm is the minute (0 to 59). The minute of the hour is in the time zone of the gateway.
        DayOfWeek:
          $ref: "#/components/schemas/DayOfWeek"
          description: An ordinal number between 0 and 6 that represents the day of the week, where 0 represents Sunday and 6 represents Saturday. The day of week is in the time zone of the gateway.
        DayOfMonth:
          $ref: "#/components/schemas/DayOfMonth"
          description: The day of the month component of the maintenance start time represented as an ordinal number from 1 to 28, where 1 represents the first day of the month. It is not possible to set the maintenance schedule to start on days 29 through 31.
        Timezone:
          $ref: "#/components/schemas/GatewayTimezone"
          description: A value that indicates the time zone that is set for the gateway. The start time and day of week specified should be in the time zone of the gateway.
        SoftwareUpdatePreferences:
          $ref: "#/components/schemas/SoftwareUpdatePreferences"
          description: "A set of variables indicating the software update preferences for the gateway. Includes AutomaticUpdatePolicy parameter with the following inputs: ALL_VERSIONS - Enables regular gateway maintenance updates. EMERGENCY_VERSIONS_ONLY - Disables regular gateway maintenance updates. The gateway will still receive emergency version updates on rare occasions if necessary to remedy highly critical security or durability issues. You will be notified before an emergency version update is applied. These updates are applied during your gateway's scheduled maintenance window."
    DayOfMonth:
      type: integer
      minimum: 1
      maximum: 28
    SoftwareUpdatePreferences:
      description: A set of variables indicating the software update preferences for the gateway.
      type: object
      properties:
        AutomaticUpdatePolicy:
          $ref: "#/components/schemas/AutomaticUpdatePolicy"
          description: Indicates the automatic update policy for a gateway. ALL_VERSIONS - Enables regular gateway maintenance updates. EMERGENCY_VERSIONS_ONLY - Disables regular gateway maintenance updates. The gateway will still receive emergency version updates on rare occasions if necessary to remedy highly critical security or durability issues. You will be notified before an emergency version update is applied. These updates are applied during your gateway's scheduled maintenance window.
    AutomaticUpdatePolicy:
      type: string
      enum:
        - ALL_VERSIONS
        - EMERGENCY_VERSIONS_ONLY
