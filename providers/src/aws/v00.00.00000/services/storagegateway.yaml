            default: StorageGateway_20130630.DescribeSnapshotSchedule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume. Use the ListVolumes operation to return a list of gateway volumes.
              required:
                - VolumeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSnapshotScheduleOutput"
  /DescribeStorediSCSIVolumes:
    post:
      operationId: DescribeStorediSCSIVolumes
      description: Returns the description of the gateway volumes specified in the request. The list of gateway volumes in the request must be from one gateway. In the response, Storage Gateway returns volume information sorted by volume ARNs. This operation is only supported in stored volume gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeStorediSCSIVolumes
            default: StorageGateway_20130630.DescribeStorediSCSIVolumes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARNs:
                  $ref: "#/components/schemas/VolumeARNs"
                  description: An array of strings where each string represents the Amazon Resource Name (ARN) of a stored volume. All of the specified stored volumes must be from the same gateway. Use ListVolumes to get volume ARNs for a gateway.
              required:
                - VolumeARNs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeStorediSCSIVolumesOutput"
  /DescribeTapeArchives:
    post:
      operationId: DescribeTapeArchives
      description: Returns a description of specified virtual tapes in the virtual tape shelf (VTS). This operation is only supported in the tape gateway type. If a specific TapeARN is not specified, Storage Gateway returns a description of all virtual tapes found in the VTS associated with your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeTapeArchives
            default: StorageGateway_20130630.DescribeTapeArchives
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TapeARNs:
                  $ref: "#/components/schemas/TapeARNs"
                  description: Specifies one or more unique Amazon Resource Names (ARNs) that represent the virtual tapes you want to describe.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: An opaque string that indicates the position at which to begin describing virtual tapes.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the number of virtual tapes described be limited to the specified number.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTapeArchivesOutput"
  /DescribeTapeRecoveryPoints:
    post:
      operationId: DescribeTapeRecoveryPoints
      description: Returns a list of virtual tape recovery points that are available for the specified tape gateway. A recovery point is a point-in-time view of a virtual tape at which all the data on the virtual tape is consistent. If your gateway crashes, virtual tapes that have recovery points can be recovered to a new gateway. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeTapeRecoveryPoints
            default: StorageGateway_20130630.DescribeTapeRecoveryPoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: An opaque string that indicates the position at which to begin describing the virtual tape recovery points.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the number of virtual tape recovery points that are described be limited to the specified number.
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTapeRecoveryPointsOutput"
  /DescribeTapes:
    post:
      operationId: DescribeTapes
      description: Returns a description of virtual tapes that correspond to the specified Amazon Resource Names (ARNs). If TapeARN is not specified, returns a description of the virtual tapes associated with the specified gateway. This operation is only supported for the tape gateway type. The operation supports pagination. By default, the operation returns a maximum of up to 100 tapes. You can optionally specify the Limit field in the body to limit the number of tapes in the response. If the number of tapes returned in the response is truncated, the response includes a Marker field. You can use this Marker value in your subsequent request to retrieve the next set of tapes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeTapes
            default: StorageGateway_20130630.DescribeTapes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                TapeARNs:
                  $ref: "#/components/schemas/TapeARNs"
                  description: Specifies one or more unique Amazon Resource Names (ARNs) that represent the virtual tapes you want to describe. If this parameter is not specified, Tape gateway returns a description of all virtual tapes associated with the specified gateway.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: A marker value, obtained in a previous call to DescribeTapes. This marker indicates which page of results to retrieve. If not specified, the first page of results is retrieved.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the number of virtual tapes described be limited to the specified number. Amazon Web Services may impose its own limit, if this field is not set.
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTapesOutput"
  /DescribeUploadBuffer:
    post:
      operationId: DescribeUploadBuffer
      description: Returns information about the upload buffer of a gateway. This operation is supported for the stored volume, cached volume, and tape gateway types. The response includes disk IDs that are configured as upload buffer space, and it includes the amount of upload buffer space allocated and used.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeUploadBuffer
            default: StorageGateway_20130630.DescribeUploadBuffer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeUploadBufferOutput"
  /DescribeVTLDevices:
    post:
      operationId: DescribeVTLDevices
      description: Returns a description of virtual tape library (VTL) devices for the specified tape gateway. In the response, Storage Gateway returns VTL device information. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeVTLDevices
            default: StorageGateway_20130630.DescribeVTLDevices
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                VTLDeviceARNs:
                  $ref: "#/components/schemas/VTLDeviceARNs"
                  description: An array of strings, where each string represents the Amazon Resource Name (ARN) of a VTL device. All of the specified VTL devices must be from the same gateway. If no VTL devices are specified, the result will contain all devices on the specified gateway.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: An opaque string that indicates the position at which to begin describing the VTL devices.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the number of VTL devices described be limited to the specified number.
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVTLDevicesOutput"
  /DescribeWorkingStorage:
    post:
      operationId: DescribeWorkingStorage
      description: Returns information about the working storage of a gateway. This operation is only supported in the stored volumes gateway type. This operation is deprecated in cached volumes API version (20120630). Use DescribeUploadBuffer instead. Working storage is also referred to as upload buffer. You can also use the DescribeUploadBuffer operation to add upload buffer to a stored volume gateway. The response includes disk IDs that are configured as working storage, and it includes the amount of working storage allocated and used.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DescribeWorkingStorage
            default: StorageGateway_20130630.DescribeWorkingStorage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkingStorageOutput"
  /DetachVolume:
    post:
      operationId: DetachVolume
      description: Disconnects a volume from an iSCSI connection and then detaches the volume from the specified gateway. Detaching and attaching a volume enables you to recover your data from one gateway to a different gateway without creating a snapshot. It also makes it easier to move your volumes from an on-premises gateway to a gateway hosted on an Amazon EC2 instance. This operation is only supported in the volume gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DetachVolume
            default: StorageGateway_20130630.DetachVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume to detach from the gateway.
                ForceDetach:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set to true to forcibly remove the iSCSI connection of the target volume and detach the volume. The default is false. If this value is set to false, you must manually disconnect the iSCSI connection from the target volume. Valid Values: true | false"
              required:
                - VolumeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetachVolumeOutput"
  /DisableGateway:
    post:
      operationId: DisableGateway
      description: Disables a tape gateway when the gateway is no longer functioning. For example, if your gateway VM is damaged, you can disable the gateway so you can recover virtual tapes. Use this operation for a tape gateway that is not reachable or not functioning. This operation is only supported in the tape gateway type. After a gateway is disabled, it cannot be enabled.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DisableGateway
            default: StorageGateway_20130630.DisableGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableGatewayOutput"
  /DisassociateFileSystem:
    post:
      operationId: DisassociateFileSystem
      description: Disassociates an Amazon FSx file system from the specified gateway. After the disassociation process finishes, the gateway can no longer access the Amazon FSx file system. This operation is only supported in the FSx File Gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.DisassociateFileSystem
            default: StorageGateway_20130630.DisassociateFileSystem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileSystemAssociationARN:
                  $ref: "#/components/schemas/FileSystemAssociationARN"
                  description: The Amazon Resource Name (ARN) of the file system association to be deleted.
                ForceDelete:
                  $ref: "#/components/schemas/boolean"
                  description: If this value is set to true, the operation disassociates an Amazon FSx file system immediately. It ends all data uploads to the file system, and the file system association enters the FORCE_DELETING status. If this value is set to false, the Amazon FSx file system does not disassociate until all data is uploaded.
              required:
                - FileSystemAssociationARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateFileSystemOutput"
  /EvictFilesFailingUpload:
    post:
      operationId: EvictFilesFailingUpload
      description: Starts a process that cleans the specified file share's cache of file entries that are failing upload to Amazon S3. This API operation reports success if the request is received with valid arguments, and there are no other cache clean operations currently in-progress for the specified file share. After a successful request, the cache clean operation occurs asynchronously and reports progress using CloudWatch logs and notifications. If ForceRemove is set to True, the cache clean operation will delete file data from the gateway which might otherwise be recoverable. We recommend using this operation only after all other methods to clear files failing upload have been exhausted, and if your business need outweighs the potential data loss.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.EvictFilesFailingUpload
            default: StorageGateway_20130630.EvictFilesFailingUpload
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FileShareARN:
                  $ref: "#/components/schemas/FileShareARN"
                  description: The Amazon Resource Name (ARN) of the file share for which you want to start the cache clean operation.
                ForceRemove:
                  $ref: "#/components/schemas/boolean"
                  description: "Specifies whether cache entries with full or partial file data currently stored on the gateway will be forcibly removed by the cache clean operation. Valid arguments: False - The cache clean operation skips cache entries failing upload if they are associated with data currently stored on the gateway. This preserves the cached data. True - The cache clean operation removes cache entries failing upload even if they are associated with data currently stored on the gateway. This deletes the cached data. If ForceRemove is set to True, the cache clean operation will delete file data from the gateway which might otherwise be recoverable."
              required:
                - FileShareARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvictFilesFailingUploadOutput"
  /JoinDomain:
    post:
      operationId: JoinDomain
      description: Adds a file gateway to an Active Directory domain. This operation is only supported for file gateways that support the SMB file protocol. Joining a domain creates an Active Directory computer account in the default organizational unit, using the gateway's Gateway ID as the account name (for example, SGW-1234ADE). If your Active Directory environment requires that you pre-stage accounts to facilitate the join domain process, you will need to create this account ahead of time. To create the gateway's computer account in an organizational unit other than the default, you must specify the organizational unit when joining the domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.JoinDomain
            default: StorageGateway_20130630.JoinDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The Amazon Resource Name (ARN) of the gateway. Use the ListGateways operation to return a list of gateways for your account and Amazon Web Services Region.
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that you want the gateway to join.
                OrganizationalUnit:
                  $ref: "#/components/schemas/OrganizationalUnit"
                  description: The organizational unit (OU) is a container in an Active Directory that can hold users, groups, computers, and other OUs and this parameter specifies the OU that the gateway will join within the AD domain.
                DomainControllers:
                  $ref: "#/components/schemas/Hosts"
                  description: List of IP addresses, NetBIOS names, or host names of your domain server. If you need to specify the port number include it after the colon (“:”). For example, mydc.mydomain.com:389. S3 File Gateway supports IPv6 addresses in addition to IPv4 and other existing formats. FSx File Gateway does not support IPv6.
                TimeoutInSeconds:
                  $ref: "#/components/schemas/TimeoutInSeconds"
                  description: Specifies the time in seconds, in which the JoinDomain operation must complete. The default is 20 seconds.
                UserName:
                  $ref: "#/components/schemas/DomainUserName"
                  description: Sets the user name of user who has permission to add the gateway to the Active Directory domain. The domain user account should be enabled to join computers to the domain. For example, you can use the domain administrator account or an account with delegated permissions to join computers to the domain.
                Password:
                  $ref: "#/components/schemas/DomainUserPassword"
                  description: Sets the password of the user who has permission to add the gateway to the Active Directory domain.
              required:
                - GatewayARN
                - DomainName
                - UserName
                - Password
