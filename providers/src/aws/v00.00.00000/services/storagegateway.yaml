      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: Opaque pagination token returned from a previous ListCacheReports operation. If present, Marker specifies where to continue the list from after a previous call to ListCacheReports. Optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCacheReportsOutput"
  /ListFileShares:
    post:
      operationId: ListFileShares
      description: Gets a list of the file shares for a specific S3 File Gateway, or the list of file shares that belong to the calling Amazon Web Services account. This operation is only supported for S3 File Gateways.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListFileShares
            default: StorageGateway_20130630.ListFileShares
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The Amazon Resource Name (ARN) of the gateway whose file shares you want to list. If this field is not present, all file shares under your account are listed.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: The maximum number of file shares to return in the response. The value must be an integer with a value greater than zero. Optional.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: Opaque pagination token returned from a previous ListFileShares operation. If present, Marker specifies where to continue the list from after a previous call to ListFileShares. Optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFileSharesOutput"
  /ListFileSystemAssociations:
    post:
      operationId: ListFileSystemAssociations
      description: Gets a list of FileSystemAssociationSummary objects. Each object contains a summary of a file system association. This operation is only supported for FSx File Gateways.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListFileSystemAssociations
            default: StorageGateway_20130630.ListFileSystemAssociations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: The maximum number of file system associations to return in the response. If present, Limit must be an integer with a value greater than zero. Optional.
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: Opaque pagination token returned from a previous ListFileSystemAssociations operation. If present, Marker specifies where to continue the list from after a previous call to ListFileSystemAssociations. Optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFileSystemAssociationsOutput"
  /ListGateways:
    post:
      operationId: ListGateways
      description: Lists gateways owned by an Amazon Web Services account in an Amazon Web Services Region specified in the request. The returned list is ordered by gateway Amazon Resource Name (ARN). By default, the operation returns a maximum of 100 gateways. This operation supports pagination that allows you to optionally reduce the number of gateways returned in a response. If you have more gateways than are returned in a response (that is, the response returns only a truncated list of your gateways), the response contains a marker that you can specify in your next request to fetch the next page of gateways.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListGateways
            default: StorageGateway_20130630.ListGateways
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Marker:
                  $ref: "#/components/schemas/Marker"
                  description: An opaque string that indicates the position at which to begin the returned list of gateways.
                Limit:
                  $ref: "#/components/schemas/PositiveIntObject"
                  description: Specifies that the list of gateways returned be limited to the specified number of items.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewaysOutput"
  /ListLocalDisks:
    post:
      operationId: ListLocalDisks
      description: Returns a list of the gateway's local disks. To specify which gateway to describe, you use the Amazon Resource Name (ARN) of the gateway in the body of the request. The request returns a list of all disks, specifying which are configured as working storage, cache storage, or stored volume or not configured at all. The response includes a DiskStatus field. This field can have a value of present (the disk is available to use), missing (the disk is no longer connected to the gateway), or mismatch (the disk node is occupied by a disk that has incorrect metadata or the disk content is corrupted).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListLocalDisks
            default: StorageGateway_20130630.ListLocalDisks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
              required:
                - GatewayARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLocalDisksOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags that have been added to the specified resource. This operation is supported in storage gateways of all types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ListTagsForResource
            default: StorageGateway_20130630.ListTagsForResource
      requestBody:
