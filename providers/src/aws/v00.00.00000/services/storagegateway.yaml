          description: Refresh cache information for the file share.
        NotificationPolicy:
          $ref: "#/components/schemas/NotificationPolicy"
          description: "The notification policy of the file share. SettlingTimeInSeconds controls the number of seconds to wait after the last point in time a client wrote to a file before generating an ObjectUploaded notification. Because clients can make many small writes to files, it's best to set this parameter for as long as possible to avoid generating multiple notifications for the same file in a small time period. SettlingTimeInSeconds has no effect on the timing of the object uploading to Amazon S3, only the timing of the notification. This setting is not meant to specify an exact time at which the notification will be sent. In some cases, the gateway might require more than the specified delay time to generate and send notifications. The following example sets NotificationPolicy on with SettlingTimeInSeconds set to 60. {\\\"Upload\\\": {\\\"SettlingTimeInSeconds\\\": 60}} The following example sets NotificationPolicy off. {}"
        VPCEndpointDNSName:
          $ref: "#/components/schemas/DNSHostName"
          description: Specifies the DNS name for the VPC endpoint that the SMB file share uses to connect to Amazon S3. This parameter is required for SMB file shares that connect to Amazon S3 through a VPC endpoint, a VPC access point, or an access point alias that points to a VPC access point.
        BucketRegion:
          $ref: "#/components/schemas/RegionId"
          description: Specifies the Region of the S3 bucket where the SMB file share stores files. This parameter is required for SMB file shares that connect to Amazon S3 through a VPC endpoint, a VPC access point, or an access point alias that points to a VPC access point.
        OplocksEnabled:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether opportunistic locking is enabled for the SMB file share. Enabling opportunistic locking on case-sensitive shares is not recommended for workloads that involve access to files with the same name in different case. Valid Values: true | false"
    DescribeSMBSettingsOutput:
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: The name of the domain that the gateway is joined to.
        ActiveDirectoryStatus:
          $ref: "#/components/schemas/ActiveDirectoryStatus"
          description: "Indicates the status of a gateway that is a member of the Active Directory domain. This field is only used as part of a JoinDomain request. It is not affected by Active Directory connectivity changes that occur after the JoinDomain request succeeds. ACCESS_DENIED: Indicates that the JoinDomain operation failed due to an authentication error. DETACHED: Indicates that gateway is not joined to a domain. JOINED: Indicates that the gateway has successfully joined a domain. JOINING: Indicates that a JoinDomain operation is in progress. NETWORK_ERROR: Indicates that JoinDomain operation failed due to a network or connectivity error. TIMEOUT: Indicates that the JoinDomain operation failed because the operation didn't complete within the allotted time. UNKNOWN_ERROR: Indicates that the JoinDomain operation failed due to another type of error."
        SMBGuestPasswordSet:
          $ref: "#/components/schemas/Boolean"
          description: "This value is true if a password for the guest user smbguest is set, otherwise false. Only supported for S3 File Gateways. Valid Values: true | false"
        SMBSecurityStrategy:
          $ref: "#/components/schemas/SMBSecurityStrategy"
          description: "The type of security strategy that was specified for file gateway. ClientSpecified: If you choose this option, requests are established based on what is negotiated by the client. This option is recommended when you want to maximize compatibility across different clients in your environment. Supported only for S3 File Gateway. MandatorySigning: If you choose this option, File Gateway only allows connections from SMBv2 or SMBv3 clients that have signing turned on. This option works with SMB clients on Microsoft Windows Vista, Windows Server 2008, or later. MandatoryEncryption: If you choose this option, File Gateway only allows connections from SMBv3 clients that have encryption turned on. Both 256-bit and 128-bit algorithms are allowed. This option is recommended for environments that handle sensitive data. It works with SMB clients on Microsoft Windows 8, Windows Server 2012, or later. MandatoryEncryptionNoAes128: If you choose this option, File Gateway only allows connections from SMBv3 clients that use 256-bit AES encryption algorithms. 128-bit algorithms are not allowed. This option is recommended for environments that handle sensitive data. It works with SMB clients on Microsoft Windows 8, Windows Server 2012, or later."
        FileSharesVisible:
          $ref: "#/components/schemas/Boolean"
          description: The shares on this gateway appear when listing shares. Only supported for S3 File Gateways.
        SMBLocalGroups:
          $ref: "#/components/schemas/SMBLocalGroups"
          description: A list of Active Directory users and groups that have special permissions for SMB file shares on the gateway.
    DomainName:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^([a-zA-Z0-9]+[\\.-])+([a-zA-Z0-9])+$
    ActiveDirectoryStatus:
      type: string
      enum:
        - ACCESS_DENIED
        - DETACHED
        - JOINED
        - JOINING
        - NETWORK_ERROR
        - TIMEOUT
        - UNKNOWN_ERROR
        - INSUFFICIENT_PERMISSIONS
    SMBSecurityStrategy:
      type: string
      enum:
        - ClientSpecified
        - MandatorySigning
        - MandatoryEncryption
        - MandatoryEncryptionNoAes128
    SMBLocalGroups:
      description: A list of Active Directory users and groups that have special permissions for SMB file shares on the gateway.
      type: object
      properties:
        GatewayAdmins:
          $ref: "#/components/schemas/UserList"
          description: "A list of Active Directory users and groups that have local Gateway Admin permissions. Acceptable formats include: DOMAIN\\User1, user1, DOMAIN\\group1, and group1. Gateway Admins can use the Shared Folders Microsoft Management Console snap-in to force-close files that are open and locked."
    DescribeSnapshotScheduleOutput:
      type: object
      properties:
        VolumeARN:
          $ref: "#/components/schemas/VolumeARN"
          description: The Amazon Resource Name (ARN) of the volume that was specified in the request.
        StartAt:
          $ref: "#/components/schemas/HourOfDay"
          description: The hour of the day at which the snapshot schedule begins represented as hh, where hh is the hour (0 to 23). The hour of the day is in the time zone of the gateway.
        RecurrenceInHours:
          $ref: "#/components/schemas/RecurrenceInHours"
          description: The number of hours between snapshots.
        Description:
          $ref: "#/components/schemas/Description"
          description: The snapshot description.
        Timezone:
          $ref: "#/components/schemas/GatewayTimezone"
          description: A value that indicates the time zone of the gateway.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: A list of up to 50 tags assigned to the snapshot schedule, sorted alphabetically by key name. Each tag is a key-value pair. For a gateway with more than 10 tags assigned, you can view all tags using the ListTagsForResource API operation.
    RecurrenceInHours:
      type: integer
      minimum: 1
      maximum: 24
    Description:
      type: string
      minLength: 1
      maxLength: 255
    DescribeStorediSCSIVolumesOutput:
      type: object
      properties:
        StorediSCSIVolumes:
          $ref: "#/components/schemas/StorediSCSIVolumes"
          description: "Describes a single unit of output from DescribeStorediSCSIVolumes. The following fields are returned: ChapEnabled: Indicates whether mutual CHAP is enabled for the iSCSI target. LunNumber: The logical disk number. NetworkInterfaceId: The network interface ID of the stored volume that initiator use to map the stored volume as an iSCSI target. NetworkInterfacePort: The port used to communicate with iSCSI targets. PreservedExistingData: Indicates when the stored volume was created, existing data on the underlying local disk was preserved. SourceSnapshotId: If the stored volume was created from a snapshot, this field contains the snapshot ID used, e.g. snap-1122aabb. Otherwise, this field is not included. StorediSCSIVolumes: An array of StorediSCSIVolume objects where each object contains metadata about one stored volume. TargetARN: The Amazon Resource Name (ARN) of the volume target. VolumeARN: The Amazon Resource Name (ARN) of the stored volume. VolumeDiskId: The disk ID of the local disk that was specified in the CreateStorediSCSIVolume operation. VolumeId: The unique identifier of the storage volume, e.g. vol-1122AABB. VolumeiSCSIAttributes: An VolumeiSCSIAttributes object that represents a collection of iSCSI attributes for one stored volume. VolumeProgress: Represents the percentage complete if the volume is restoring or bootstrapping that represents the percent of data transferred. This field does not appear in the response if the stored volume is not restoring or bootstrapping. VolumeSizeInBytes: The size of the volume in bytes. VolumeStatus: One of the VolumeStatus values that indicates the state of the volume. VolumeType: One of the enumeration values describing the type of the volume. Currently, only STORED volumes are supported."
    StorediSCSIVolumes:
      type: array
      items:
        $ref: "#/components/schemas/StorediSCSIVolume"
    StorediSCSIVolume:
      description: Describes an iSCSI stored volume.
      type: object
      properties:
        VolumeARN:
          $ref: "#/components/schemas/VolumeARN"
          description: The Amazon Resource Name (ARN) of the storage volume.
        VolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: The unique identifier of the volume, e.g., vol-AE4B946D.
        VolumeType:
          $ref: "#/components/schemas/VolumeType"
          description: One of the VolumeType enumeration values describing the type of the volume.
        VolumeStatus:
          $ref: "#/components/schemas/VolumeStatus"
          description: One of the VolumeStatus values that indicates the state of the storage volume.
        VolumeAttachmentStatus:
          $ref: "#/components/schemas/VolumeAttachmentStatus"
          description: A value that indicates whether a storage volume is attached to, detached from, or is in the process of detaching from a gateway. For more information, see Moving your volumes to a different gateway.
        VolumeSizeInBytes:
          $ref: "#/components/schemas/long"
          description: The size of the volume in bytes.
        VolumeProgress:
          $ref: "#/components/schemas/DoubleObject"
          description: Represents the percentage complete if the volume is restoring or bootstrapping that represents the percent of data transferred. This field does not appear in the response if the stored volume is not restoring or bootstrapping.
        VolumeDiskId:
          $ref: "#/components/schemas/DiskId"
          description: The ID of the local disk that was specified in the CreateStorediSCSIVolume operation.
        SourceSnapshotId:
          $ref: "#/components/schemas/SnapshotId"
          description: If the stored volume was created from a snapshot, this field contains the snapshot ID used, e.g. snap-78e22663. Otherwise, this field is not included.
        PreservedExistingData:
          $ref: "#/components/schemas/boolean"
          description: "Indicates if when the stored volume was created, existing data on the underlying local disk was preserved. Valid Values: true | false"
        VolumeiSCSIAttributes:
          $ref: "#/components/schemas/VolumeiSCSIAttributes"
          description: An VolumeiSCSIAttributes object that represents a collection of iSCSI attributes for one stored volume.
        CreatedDate:
          $ref: "#/components/schemas/CreatedDate"
          description: The date the volume was created. Volumes created prior to March 28, 2017 don’t have this timestamp.
        VolumeUsedInBytes:
          $ref: "#/components/schemas/VolumeUsedInBytes"
          description: The size of the data stored on the volume in bytes. This value is calculated based on the number of blocks that are touched, instead of the actual amount of data written. This value can be useful for sequential write patterns but less accurate for random write patterns. VolumeUsedInBytes is different from the compressed size of the volume, which is the value that is used to calculate your bill. This value is not available for volumes created prior to May 13, 2015, until you store data on the volume.
        KMSKey:
          $ref: "#/components/schemas/KMSKey"
        TargetName:
          $ref: "#/components/schemas/TargetName"
          description: The name of the iSCSI target used by an initiator to connect to a volume and used as a suffix for the target ARN. For example, specifying TargetName as myvolume results in the target ARN of arn:aws:storagegateway:us-east-2:111122223333:gateway/sgw-12A3456B/target/iqn.1997-05.com.amazon:myvolume. The target name must be unique across all volumes on a gateway. If you don't specify a value, Storage Gateway uses the value that was previously used for this volume as the new target name.
    Marker:
      type: string
      minLength: 1
      maxLength: 2000
    DescribeTapeArchivesOutput:
      description: DescribeTapeArchivesOutput
      type: object
      properties:
        TapeArchives:
          $ref: "#/components/schemas/TapeArchives"
          description: An array of virtual tape objects in the virtual tape shelf (VTS). The description includes of the Amazon Resource Name (ARN) of the virtual tapes. The information returned includes the Amazon Resource Names (ARNs) of the tapes, size of the tapes, status of the tapes, progress of the description, and tape barcode.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: An opaque string that indicates the position at which the virtual tapes that were fetched for description ended. Use this marker in your next request to fetch the next set of virtual tapes in the virtual tape shelf (VTS). If there are no more virtual tapes to describe, this field does not appear in the response.
    TapeArchives:
      type: array
      items:
        $ref: "#/components/schemas/TapeArchive"
    TapeArchive:
      description: Represents a virtual tape that is archived in the virtual tape shelf (VTS).
      type: object
      properties:
        TapeARN:
          $ref: "#/components/schemas/TapeARN"
          description: The Amazon Resource Name (ARN) of an archived virtual tape.
        TapeBarcode:
          $ref: "#/components/schemas/TapeBarcode"
          description: The barcode that identifies the archived virtual tape.
        TapeCreatedDate:
          $ref: "#/components/schemas/Time"
          description: The date the virtual tape was created.
        TapeSizeInBytes:
          $ref: "#/components/schemas/TapeSize"
          description: The size, in bytes, of the archived virtual tape.
        CompletionTime:
          $ref: "#/components/schemas/Time"
          description: The time that the archiving of the virtual tape was completed. The default timestamp format is in the ISO8601 extended YYYY-MM-DD'T'HH:MM:SS'Z' format.
        RetrievedTo:
          $ref: "#/components/schemas/GatewayARN"
          description: The Amazon Resource Name (ARN) of the tape gateway that the virtual tape is being retrieved to. The virtual tape is retrieved from the virtual tape shelf (VTS).
        TapeStatus:
          $ref: "#/components/schemas/TapeArchiveStatus"
          description: The current state of the archived virtual tape.
        TapeUsedInBytes:
          $ref: "#/components/schemas/TapeUsage"
          description: The size, in bytes, of data stored on the virtual tape. This value is not available for tapes created prior to May 13, 2015.
        KMSKey:
          $ref: "#/components/schemas/KMSKey"
        PoolId:
          $ref: "#/components/schemas/PoolId"
          description: The ID of the pool that was used to archive the tape. The tapes in this pool are archived in the S3 storage class that is associated with the pool.
        Worm:
          $ref: "#/components/schemas/boolean"
          description: Set to true if the archived tape is stored as write-once-read-many (WORM).
        RetentionStartDate:
          $ref: "#/components/schemas/Time"
          description: If the archived tape is subject to tape retention lock, the date that the archived tape started being retained.
        PoolEntryDate:
          $ref: "#/components/schemas/Time"
          description: The time that the tape entered the custom tape pool. The default timestamp format is in the ISO8601 extended YYYY-MM-DD'T'HH:MM:SS'Z' format.
    TapeArchiveStatus:
      type: string
    TapeUsage:
      type: integer
      format: int64
    DescribeTapeRecoveryPointsOutput:
      description: DescribeTapeRecoveryPointsOutput
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        TapeRecoveryPointInfos:
          $ref: "#/components/schemas/TapeRecoveryPointInfos"
          description: An array of TapeRecoveryPointInfos that are available for the specified gateway.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: An opaque string that indicates the position at which the virtual tape recovery points that were listed for description ended. Use this marker in your next request to list the next set of virtual tape recovery points in the list. If there are no more recovery points to describe, this field does not appear in the response.
    TapeRecoveryPointInfos:
      type: array
      items:
        $ref: "#/components/schemas/TapeRecoveryPointInfo"
    TapeRecoveryPointInfo:
      description: Describes a recovery point.
      type: object
      properties:
        TapeARN:
          $ref: "#/components/schemas/TapeARN"
          description: The Amazon Resource Name (ARN) of the virtual tape.
        TapeRecoveryPointTime:
          $ref: "#/components/schemas/Time"
          description: The time when the point-in-time view of the virtual tape was replicated for later recovery. The default timestamp format of the tape recovery point time is in the ISO8601 extended YYYY-MM-DD'T'HH:MM:SS'Z' format.
        TapeSizeInBytes:
          $ref: "#/components/schemas/TapeSize"
          description: The size, in bytes, of the virtual tapes to recover.
        TapeStatus:
          $ref: "#/components/schemas/TapeRecoveryPointStatus"
          description: The status of the virtual tapes.
    TapeRecoveryPointStatus:
      type: string
    DescribeTapesOutput:
      description: DescribeTapesOutput
      type: object
      properties:
        Tapes:
          $ref: "#/components/schemas/Tapes"
          description: An array of virtual tape descriptions.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: An opaque string that can be used as part of a subsequent DescribeTapes call to retrieve the next page of results. If a response does not contain a marker, then there are no more results to be retrieved.
    Tapes:
      type: array
      items:
        $ref: "#/components/schemas/Tape"
    Tape:
      description: Describes a virtual tape object.
      type: object
      properties:
        TapeARN:
          $ref: "#/components/schemas/TapeARN"
          description: The Amazon Resource Name (ARN) of the virtual tape.
        TapeBarcode:
          $ref: "#/components/schemas/TapeBarcode"
          description: The barcode that identifies a specific virtual tape.
        TapeCreatedDate:
          $ref: "#/components/schemas/Time"
          description: The date the virtual tape was created.
        TapeSizeInBytes:
          $ref: "#/components/schemas/TapeSize"
          description: The size, in bytes, of the virtual tape capacity.
        TapeStatus:
          $ref: "#/components/schemas/TapeStatus"
          description: The current state of the virtual tape.
        VTLDevice:
          $ref: "#/components/schemas/VTLDeviceARN"
          description: The virtual tape library (VTL) device that the virtual tape is associated with.
        Progress:
          $ref: "#/components/schemas/DoubleObject"
          description: "For archiving virtual tapes, indicates how much data remains to be uploaded before archiving is complete. Range: 0 (not started) to 100 (complete)."
        TapeUsedInBytes:
          $ref: "#/components/schemas/TapeUsage"
          description: The size, in bytes, of data stored on the virtual tape. This value is not available for tapes created prior to May 13, 2015.
        KMSKey:
          $ref: "#/components/schemas/KMSKey"
        PoolId:
          $ref: "#/components/schemas/PoolId"
          description: The ID of the pool that contains tapes that will be archived. The tapes in this pool are archived in the S3 storage class that is associated with the pool. When you use your backup application to eject the tape, the tape is archived directly into the storage class (S3 Glacier or S3 Glacier Deep Archive) that corresponds to the pool.
        Worm:
          $ref: "#/components/schemas/boolean"
          description: If the tape is archived as write-once-read-many (WORM), this value is true.
        RetentionStartDate:
          $ref: "#/components/schemas/Time"
          description: The date that the tape is first archived with tape retention lock enabled.
        PoolEntryDate:
          $ref: "#/components/schemas/Time"
          description: The date that the tape enters a custom tape pool.
    TapeStatus:
      type: string
    VTLDeviceARN:
      type: string
      minLength: 50
      maxLength: 500
    DescribeUploadBufferOutput:
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        DiskIds:
          $ref: "#/components/schemas/DiskIds"
          description: An array of the gateway's local disk IDs that are configured as working storage. Each local disk ID is specified as a string (minimum length of 1 and maximum length of 300). If no local disks are configured as working storage, then the DiskIds array is empty.
        UploadBufferUsedInBytes:
          $ref: "#/components/schemas/long"
          description: The total number of bytes being used in the gateway's upload buffer.
        UploadBufferAllocatedInBytes:
          $ref: "#/components/schemas/long"
          description: The total number of bytes allocated in the gateway's as upload buffer.
    VTLDeviceARNs:
      type: array
      items:
        $ref: "#/components/schemas/VTLDeviceARN"
    DescribeVTLDevicesOutput:
      description: DescribeVTLDevicesOutput
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        VTLDevices:
          $ref: "#/components/schemas/VTLDevices"
          description: An array of VTL device objects composed of the Amazon Resource Name (ARN) of the VTL devices.
        Marker:
          $ref: "#/components/schemas/Marker"
          description: An opaque string that indicates the position at which the VTL devices that were fetched for description ended. Use the marker in your next request to fetch the next set of VTL devices in the list. If there are no more VTL devices to describe, this field does not appear in the response.
    VTLDevices:
      type: array
      items:
        $ref: "#/components/schemas/VTLDevice"
    VTLDevice:
      description: Represents a device object associated with a tape gateway.
      type: object
      properties:
        VTLDeviceARN:
          $ref: "#/components/schemas/VTLDeviceARN"
          description: Specifies the unique Amazon Resource Name (ARN) of the device (tape drive or media changer).
        VTLDeviceType:
          $ref: "#/components/schemas/VTLDeviceType"
          description: Specifies the type of device that the VTL device emulates.
        VTLDeviceVendor:
          $ref: "#/components/schemas/VTLDeviceVendor"
          description: Specifies the vendor of the device that the VTL device object emulates.
        VTLDeviceProductIdentifier:
          $ref: "#/components/schemas/VTLDeviceProductIdentifier"
          description: Specifies the model number of device that the VTL device emulates.
        DeviceiSCSIAttributes:
          $ref: "#/components/schemas/DeviceiSCSIAttributes"
          description: A list of iSCSI information about a VTL device.
    VTLDeviceType:
      type: string
    VTLDeviceVendor:
      type: string
    VTLDeviceProductIdentifier:
      type: string
    DeviceiSCSIAttributes:
      description: Lists iSCSI information about a VTL device.
      type: object
      properties:
        TargetARN:
          $ref: "#/components/schemas/TargetARN"
          description: Specifies the unique Amazon Resource Name (ARN) that encodes the iSCSI qualified name(iqn) of a tape drive or media changer target.
        NetworkInterfaceId:
          $ref: "#/components/schemas/NetworkInterfaceId"
          description: The network interface identifier of the VTL device.
        NetworkInterfacePort:
          $ref: "#/components/schemas/integer"
          description: The port used to communicate with iSCSI VTL device targets.
        ChapEnabled:
          $ref: "#/components/schemas/boolean"
          description: Indicates whether mutual CHAP is enabled for the iSCSI target.
    DescribeWorkingStorageOutput:
      description: "A JSON object containing the following fields:"
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        DiskIds:
          $ref: "#/components/schemas/DiskIds"
          description: An array of the gateway's local disk IDs that are configured as working storage. Each local disk ID is specified as a string (minimum length of 1 and maximum length of 300). If no local disks are configured as working storage, then the DiskIds array is empty.
        WorkingStorageUsedInBytes:
          $ref: "#/components/schemas/long"
          description: The total working storage in bytes in use by the gateway. If no working storage is configured for the gateway, this field returns 0.
        WorkingStorageAllocatedInBytes:
          $ref: "#/components/schemas/long"
          description: The total working storage in bytes allocated for the gateway. If no working storage is configured for the gateway, this field returns 0.
    DetachVolumeOutput:
