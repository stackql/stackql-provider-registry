openapi: 3.0.0
info:
  version: "2013-06-30"
  title: AWS Storage Gateway
  description: AWS Storage Gateway
  x-serviceName: storagegateway
  x-serviceAlias: storagegateway
  x-protocol: json
  x-apiVersion: "2013-06-30"
  x-endpointPrefix: storagegateway
  x-targetPrefix: StorageGateway_20130630
  x-jsonVersion: "1.1"
servers:
  - url: https://storagegateway.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for storagegateway
paths:
  /ActivateGateway:
    post:
      operationId: ActivateGateway
      description: Activates the gateway you previously deployed on your host. In the activation process, you specify information such as the Amazon Web Services Region that you want to use for storing snapshots or tapes, the time zone for scheduled snapshots the gateway snapshot schedule window, an activation key, and a name for your gateway. The activation process also associates your gateway with your account. For more information, see UpdateGatewayInformation. You must turn on the gateway VM before you can activate your gateway.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.ActivateGateway
            default: StorageGateway_20130630.ActivateGateway
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ActivationKey:
                  $ref: "#/components/schemas/ActivationKey"
                  description: Your gateway activation key. You can obtain the activation key by sending an HTTP GET request with redirects enabled to the gateway IP address (port 80). The redirect URL returned in the response provides you the activation key for your gateway in the query string parameter activationKey. It may also include other activation-related parameters, however, these are merely defaults -- the arguments you pass to the ActivateGateway API call determine the actual configuration of your gateway. For more information, see Getting activation key in the Storage Gateway User Guide.
                GatewayName:
                  $ref: "#/components/schemas/GatewayName"
                  description: The name you configured for your gateway.
                GatewayTimezone:
                  $ref: "#/components/schemas/GatewayTimezone"
                  description: A value that indicates the time zone you want to set for the gateway. The time zone is of the format "GMT", "GMT-hr:mm", or "GMT+hr:mm". For example, GMT indicates Greenwich Mean Time without any offset. GMT-4:00 indicates the time is 4 hours behind GMT. GMT+2:00 indicates the time is 2 hours ahead of GMT. The time zone is used, for example, for scheduling snapshots and your gateway's maintenance schedule.
                GatewayRegion:
                  $ref: "#/components/schemas/RegionId"
                  description: "A value that indicates the Amazon Web Services Region where you want to store your data. The gateway Amazon Web Services Region specified must be the same Amazon Web Services Region as the Amazon Web Services Region in your Host header in the request. For more information about available Amazon Web Services Regions and endpoints for Storage Gateway, see Storage Gateway endpoints and quotas in the Amazon Web Services General Reference. Valid Values: See Storage Gateway endpoints and quotas in the Amazon Web Services General Reference."
                GatewayType:
                  $ref: "#/components/schemas/GatewayType"
                  description: "A value that defines the type of gateway to activate. The type specified is critical to all later functions of the gateway and cannot be changed after activation. The default value is CACHED. Amazon FSx File Gateway is no longer available to new customers. Existing customers of FSx File Gateway can continue to use the service normally. For capabilities similar to FSx File Gateway, visit this blog post. Valid Values: STORED | CACHED | VTL | FILE_S3 | FILE_FSX_SMB"
                TapeDriveType:
                  $ref: "#/components/schemas/TapeDriveType"
                  description: "The value that indicates the type of tape drive to use for tape gateway. This field is optional. Valid Values: IBM-ULT3580-TD5"
                MediumChangerType:
                  $ref: "#/components/schemas/MediumChangerType"
                  description: "The value that indicates the type of medium changer to use for tape gateway. This field is optional. Valid Values: STK-L700 | AWS-Gateway-VTL | IBM-03584L32-0402"
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that you can assign to the gateway. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers that can be represented in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256 characters."
              required:
                - ActivationKey
                - GatewayName
                - GatewayTimezone
                - GatewayRegion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateGatewayOutput"
  /AddCache:
    post:
      operationId: AddCache
      description: Configures one or more gateway local disks as cache for a gateway. This operation is only supported in the cached volume, tape, and file gateway type (see How Storage Gateway works (architecture). In the request, you specify the gateway Amazon Resource Name (ARN) to which you want to add cache, and one or more disk IDs that you want to configure as cache.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AddCache
            default: StorageGateway_20130630.AddCache
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                DiskIds:
                  $ref: "#/components/schemas/DiskIds"
                  description: An array of strings that identify disks that are to be configured as working storage. Each string has a minimum length of 1 and maximum length of 300. You can get the disk IDs from the ListLocalDisks API.
              required:
                - GatewayARN
                - DiskIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddCacheOutput"
  /AddTagsToResource:
    post:
      operationId: AddTagsToResource
      description: "Adds one or more tags to the specified resource. You use tags to add metadata to resources, which you can use to categorize these resources. For example, you can categorize resources by purpose, owner, environment, or team. Each tag consists of a key and a value, which you define. You can add tags to the following Storage Gateway resources: Storage gateways of all types Storage volumes Virtual tapes NFS and SMB file shares File System associations You can create a maximum of 50 tags for each resource. Virtual tapes and storage volumes that are recovered to a new gateway maintain their tags."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AddTagsToResource
            default: StorageGateway_20130630.AddTagsToResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                  description: The Amazon Resource Name (ARN) of the resource you want to add tags to.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "The key-value pair that represents the tag you want to add to the resource. The value can be an empty string. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
              required:
                - ResourceARN
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceOutput"
  /AddUploadBuffer:
    post:
      operationId: AddUploadBuffer
      description: Configures one or more gateway local disks as upload buffer for a specified gateway. This operation is supported for the stored volume, cached volume, and tape gateway types. In the request, you specify the gateway Amazon Resource Name (ARN) to which you want to add upload buffer, and one or more disk IDs that you want to configure as upload buffer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AddUploadBuffer
            default: StorageGateway_20130630.AddUploadBuffer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                DiskIds:
                  $ref: "#/components/schemas/DiskIds"
                  description: An array of strings that identify disks that are to be configured as working storage. Each string has a minimum length of 1 and maximum length of 300. You can get the disk IDs from the ListLocalDisks API.
              required:
                - GatewayARN
                - DiskIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddUploadBufferOutput"
  /AddWorkingStorage:
    post:
      operationId: AddWorkingStorage
      description: Configures one or more gateway local disks as working storage for a gateway. This operation is only supported in the stored volume gateway type. This operation is deprecated in cached volume API version 20120630. Use AddUploadBuffer instead. Working storage is also referred to as upload buffer. You can also use the AddUploadBuffer operation to add upload buffer to a stored volume gateway. In the request, you specify the gateway Amazon Resource Name (ARN) to which you want to add working storage, and one or more disk IDs that you want to configure as working storage.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AddWorkingStorage
            default: StorageGateway_20130630.AddWorkingStorage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                DiskIds:
                  $ref: "#/components/schemas/DiskIds"
                  description: An array of strings that identify disks that are to be configured as working storage. Each string has a minimum length of 1 and maximum length of 300. You can get the disk IDs from the ListLocalDisks API.
              required:
                - GatewayARN
                - DiskIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddWorkingStorageOutput"
  /AssignTapePool:
    post:
      operationId: AssignTapePool
      description: Assigns a tape to a tape pool for archiving. The tape assigned to a pool is archived in the S3 storage class that is associated with the pool. When you use your backup application to eject the tape, the tape is archived directly into the S3 storage class (S3 Glacier or S3 Glacier Deep Archive) that corresponds to the pool.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AssignTapePool
            default: StorageGateway_20130630.AssignTapePool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The unique Amazon Resource Name (ARN) of the virtual tape that you want to add to the tape pool.
                PoolId:
                  $ref: "#/components/schemas/PoolId"
                  description: The ID of the pool that you want to add your tape to for archiving. The tape in this pool is archived in the S3 storage class that is associated with the pool. When you use your backup application to eject the tape, the tape is archived directly into the storage class (S3 Glacier or S3 Glacier Deep Archive) that corresponds to the pool.
                BypassGovernanceRetention:
                  $ref: "#/components/schemas/boolean"
                  description: "Set permissions to bypass governance retention. If the lock type of the archived tape is Governance, the tape's archived age is not older than RetentionLockInDays, and the user does not already have BypassGovernanceRetention, setting this to TRUE enables the user to bypass the retention lock. This parameter is set to true by default for calls from the console. Valid values: TRUE | FALSE"
              required:
                - TapeARN
                - PoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignTapePoolOutput"
  /AssociateFileSystem:
    post:
      operationId: AssociateFileSystem
      description: Associate an Amazon FSx file system with the FSx File Gateway. After the association process is complete, the file shares on the Amazon FSx file system are available for access through the gateway. This operation only supports the FSx File Gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AssociateFileSystem
            default: StorageGateway_20130630.AssociateFileSystem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                UserName:
                  $ref: "#/components/schemas/DomainUserName"
                  description: The user name of the user credential that has permission to access the root share D$ of the Amazon FSx file system. The user account must belong to the Amazon FSx delegated admin user group.
                Password:
                  $ref: "#/components/schemas/DomainUserPassword"
                  description: The password of the user credential.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique string value that you supply that is used by the FSx File Gateway to ensure idempotent file system association creation.
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                LocationARN:
                  $ref: "#/components/schemas/FileSystemLocationARN"
                  description: The Amazon Resource Name (ARN) of the Amazon FSx file system to associate with the FSx File Gateway.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of up to 50 tags that can be assigned to the file system association. Each tag is a key-value pair.
                AuditDestinationARN:
                  $ref: "#/components/schemas/AuditDestinationARN"
                  description: The Amazon Resource Name (ARN) of the storage used for the audit logs.
                CacheAttributes:
                  $ref: "#/components/schemas/CacheAttributes"
                EndpointNetworkConfiguration:
                  $ref: "#/components/schemas/EndpointNetworkConfiguration"
                  description: Specifies the network configuration information for the gateway associated with the Amazon FSx file system. If multiple file systems are associated with this gateway, this parameter's IpAddresses field is required.
              required:
                - UserName
                - Password
                - ClientToken
                - GatewayARN
                - LocationARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFileSystemOutput"
  /AttachVolume:
    post:
      operationId: AttachVolume
      description: Connects a volume to an iSCSI connection and then attaches the volume to the specified gateway. Detaching and attaching a volume enables you to recover your data from one gateway to a different gateway without creating a snapshot. It also makes it easier to move your volumes from an on-premises gateway to a gateway hosted on an Amazon EC2 instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.AttachVolume
            default: StorageGateway_20130630.AttachVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The Amazon Resource Name (ARN) of the gateway that you want to attach the volume to.
                TargetName:
                  $ref: "#/components/schemas/TargetName"
                  description: The name of the iSCSI target used by an initiator to connect to a volume and used as a suffix for the target ARN. For example, specifying TargetName as myvolume results in the target ARN of arn:aws:storagegateway:us-east-2:111122223333:gateway/sgw-12A3456B/target/iqn.1997-05.com.amazon:myvolume. The target name must be unique across all volumes on a gateway. If you don't specify a value, Storage Gateway uses the value that was previously used for this volume as the new target name.
                VolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The Amazon Resource Name (ARN) of the volume to attach to the specified gateway.
                NetworkInterfaceId:
                  $ref: "#/components/schemas/NetworkInterfaceId"
                  description: "The network interface of the gateway on which to expose the iSCSI target. Accepts IPv4 and IPv6 addresses. Use DescribeGatewayInformation to get a list of the network interfaces available on a gateway. Valid Values: A valid IP address."
                DiskId:
                  $ref: "#/components/schemas/DiskId"
                  description: The unique device ID or other distinguishing data that identifies the local disk used to create the volume. This value is only required when you are attaching a stored volume.
              required:
                - GatewayARN
                - VolumeARN
                - NetworkInterfaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachVolumeOutput"
  /CancelArchival:
    post:
      operationId: CancelArchival
      description: Cancels archiving of a virtual tape to the virtual tape shelf (VTS) after the archiving process is initiated. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CancelArchival
            default: StorageGateway_20130630.CancelArchival
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The Amazon Resource Name (ARN) of the virtual tape you want to cancel archiving for.
              required:
                - GatewayARN
                - TapeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelArchivalOutput"
  /CancelCacheReport:
    post:
      operationId: CancelCacheReport
      description: Cancels generation of a specified cache report. You can use this operation to manually cancel an IN-PROGRESS report for any reason. This action changes the report status from IN-PROGRESS to CANCELLED. You can only cancel in-progress reports. If the the report you attempt to cancel is in FAILED, ERROR, or COMPLETED state, the cancel operation returns an error.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CancelCacheReport
            default: StorageGateway_20130630.CancelCacheReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CacheReportARN:
                  $ref: "#/components/schemas/CacheReportARN"
                  description: The Amazon Resource Name (ARN) of the cache report you want to cancel.
              required:
                - CacheReportARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelCacheReportOutput"
  /CancelRetrieval:
    post:
      operationId: CancelRetrieval
      description: Cancels retrieval of a virtual tape from the virtual tape shelf (VTS) to a gateway after the retrieval process is initiated. The virtual tape is returned to the VTS. This operation is only supported in the tape gateway type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CancelRetrieval
            default: StorageGateway_20130630.CancelRetrieval
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                TapeARN:
                  $ref: "#/components/schemas/TapeARN"
                  description: The Amazon Resource Name (ARN) of the virtual tape you want to cancel retrieval for.
              required:
                - GatewayARN
                - TapeARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelRetrievalOutput"
  /CreateCachediSCSIVolume:
    post:
      operationId: CreateCachediSCSIVolume
      description: Creates a cached volume on a specified cached volume gateway. This operation is only supported in the cached volume gateway type. Cache storage must be allocated to the gateway before you can create a cached volume. Use the AddCache operation to add cache storage to a gateway. In the request, you must specify the gateway, size of the volume in bytes, the iSCSI target name, an IP address on which to expose the target, and a unique client token. In response, the gateway creates the volume and returns information about it. This information includes the volume Amazon Resource Name (ARN), its size, and the iSCSI target ARN that initiators can use to connect to the volume target. Optionally, you can provide the ARN for an existing volume as the SourceVolumeARN for this cached volume, which creates an exact copy of the existing volume’s latest recovery point. The VolumeSizeInBytes value must be equal to or larger than the size of the copied volume, in bytes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateCachediSCSIVolume
            default: StorageGateway_20130630.CreateCachediSCSIVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                VolumeSizeInBytes:
                  $ref: "#/components/schemas/long"
                  description: The size of the volume in bytes.
                SnapshotId:
                  $ref: "#/components/schemas/SnapshotId"
                  description: The snapshot ID (e.g. "snap-1122aabb") of the snapshot to restore as the new cached volume. Specify this field if you want to create the iSCSI storage volume from a snapshot; otherwise, do not include this field. To list snapshots for your account use DescribeSnapshots in the Amazon Elastic Compute Cloud API Reference.
                TargetName:
                  $ref: "#/components/schemas/TargetName"
                  description: The name of the iSCSI target used by an initiator to connect to a volume and used as a suffix for the target ARN. For example, specifying TargetName as myvolume results in the target ARN of arn:aws:storagegateway:us-east-2:111122223333:gateway/sgw-12A3456B/target/iqn.1997-05.com.amazon:myvolume. The target name must be unique across all volumes on a gateway. If you don't specify a value, Storage Gateway uses the value that was previously used for this volume as the new target name.
                SourceVolumeARN:
                  $ref: "#/components/schemas/VolumeARN"
                  description: The ARN for an existing volume. Specifying this ARN makes the new volume into an exact copy of the specified existing volume's latest recovery point. The VolumeSizeInBytes value for this new volume must be equal to or larger than the size of the existing volume, in bytes.
                NetworkInterfaceId:
                  $ref: "#/components/schemas/NetworkInterfaceId"
                  description: "The network interface of the gateway on which to expose the iSCSI target. Accepts IPv4 and IPv6 addresses. Use DescribeGatewayInformation to get a list of the network interfaces available on a gateway. Valid Values: A valid IP address."
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique identifier that you use to retry a request. If you retry a request, use the same ClientToken you specified in the initial request.
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set to true to use Amazon S3 server-side encryption with your own KMS key, or false to use a key managed by Amazon S3. Optional. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value can only be set when KMSEncrypted is true. Optional.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that you can assign to a cached volume. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers that you can represent in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256 characters."
              required:
                - GatewayARN
                - VolumeSizeInBytes
                - TargetName
                - NetworkInterfaceId
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCachediSCSIVolumeOutput"
  /CreateNFSFileShare:
    post:
      operationId: CreateNFSFileShare
      description: Creates a Network File System (NFS) file share on an existing S3 File Gateway. In Storage Gateway, a file share is a file system mount point backed by Amazon S3 cloud storage. Storage Gateway exposes file shares using an NFS interface. This operation is only supported for S3 File Gateways. S3 File gateway requires Security Token Service (Amazon Web Services STS) to be activated to enable you to create a file share. Make sure Amazon Web Services STS is activated in the Amazon Web Services Region you are creating your S3 File Gateway in. If Amazon Web Services STS is not activated in the Amazon Web Services Region, activate it. For information about how to activate Amazon Web Services STS, see Activating and deactivating Amazon Web Services STS in an Amazon Web Services Region in the Identity and Access Management User Guide. S3 File Gateways do not support creating hard or symbolic links on a file share.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StorageGateway_20130630.CreateNFSFileShare
            default: StorageGateway_20130630.CreateNFSFileShare
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique string value that you supply that is used by S3 File Gateway to ensure idempotent file share creation.
                NFSFileShareDefaults:
                  $ref: "#/components/schemas/NFSFileShareDefaults"
                  description: File share default values. Optional.
                GatewayARN:
                  $ref: "#/components/schemas/GatewayARN"
                  description: The Amazon Resource Name (ARN) of the S3 File Gateway on which you want to create a file share.
                EncryptionType:
                  $ref: "#/components/schemas/EncryptionType"
                  description: A value that specifies the type of server-side encryption that the file share will use for the data that it stores in Amazon S3. We recommend using EncryptionType instead of KMSEncrypted to set the file share encryption method. You do not need to provide values for both parameters. If values for both parameters exist in the same request, then the specified encryption methods must not conflict. For example, if EncryptionType is SseS3, then KMSEncrypted must be false. If EncryptionType is SseKms or DsseKms, then KMSEncrypted must be true.
                KMSEncrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: "Optional. Set to true to use Amazon S3 server-side encryption with your own KMS key (SSE-KMS), or false to use a key managed by Amazon S3 (SSE-S3). To use dual-layer encryption (DSSE-KMS), set the EncryptionType parameter instead. We recommend using EncryptionType instead of KMSEncrypted to set the file share encryption method. You do not need to provide values for both parameters. If values for both parameters exist in the same request, then the specified encryption methods must not conflict. For example, if EncryptionType is SseS3, then KMSEncrypted must be false. If EncryptionType is SseKms or DsseKms, then KMSEncrypted must be true. Valid Values: true | false"
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: Optional. The Amazon Resource Name (ARN) of a symmetric customer master key (CMK) used for Amazon S3 server-side encryption. Storage Gateway does not support asymmetric CMKs. This value must be set if KMSEncrypted is true, or if EncryptionType is SseKms or DsseKms.
                Role:
                  $ref: "#/components/schemas/Role"
                  description: The ARN of the Identity and Access Management (IAM) role that an S3 File Gateway assumes when it accesses the underlying storage.
                LocationARN:
                  $ref: "#/components/schemas/LocationARN"
                  description: "A custom ARN for the backend storage used for storing data for file shares. It includes a resource ARN with an optional prefix concatenation. The prefix must end with a forward slash (/). You can specify LocationARN as a bucket ARN, access point ARN or access point alias, as shown in the following examples. Bucket ARN: arn:aws:s3:::amzn-s3-demo-bucket/prefix/ Access point ARN: arn:aws:s3:region:account-id:accesspoint/access-point-name/prefix/ If you specify an access point, the bucket policy must be configured to delegate access control to the access point. For information, see Delegating access control to access points in the Amazon S3 User Guide. Access point alias: test-ap-ab123cdef4gehijklmn5opqrstuvuse1a-s3alias"
                DefaultStorageClass:
                  $ref: "#/components/schemas/StorageClass"
                  description: "The default storage class for objects put into an Amazon S3 bucket by the S3 File Gateway. The default value is S3_STANDARD. Optional. Valid Values: S3_STANDARD | S3_INTELLIGENT_TIERING | S3_STANDARD_IA | S3_ONEZONE_IA"
                ObjectACL:
                  $ref: "#/components/schemas/ObjectACL"
                  description: A value that sets the access control list (ACL) permission for objects in the S3 bucket that a S3 File Gateway puts objects into. The default value is private.
                ClientList:
                  $ref: "#/components/schemas/FileShareClientList"
                  description: The list of clients that are allowed to access the S3 File Gateway. The list must contain either valid IPv4/IPv6 addresses or valid CIDR blocks.
                Squash:
                  $ref: "#/components/schemas/Squash"
                  description: "A value that maps a user to anonymous user. Valid values are the following: RootSquash: Only root is mapped to anonymous user. NoSquash: No one is mapped to anonymous user. AllSquash: Everyone is mapped to anonymous user."
                ReadOnly:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that sets the write status of a file share. Set this value to true to set the write status to read-only, otherwise set to false. Valid Values: true | false"
                GuessMIMETypeEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that enables guessing of the MIME type for uploaded objects based on file extensions. Set this value to true to enable MIME type guessing, otherwise set to false. The default value is true. Valid Values: true | false"
                RequesterPays:
                  $ref: "#/components/schemas/Boolean"
                  description: "A value that sets who pays the cost of the request and the cost associated with data download from the S3 bucket. If this value is set to true, the requester pays the costs; otherwise, the S3 bucket owner pays. However, the S3 bucket owner always pays the cost of storing data. RequesterPays is a configuration for the S3 bucket that backs the file share, so make sure that the configuration on the file share is the same as the S3 bucket configuration. Valid Values: true | false"
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: "A list of up to 50 tags that can be assigned to the NFS file share. Each tag is a key-value pair. Valid characters for key and value are letters, spaces, and numbers representable in UTF-8 format, and the following special characters: + - = . _ : / @. The maximum length of a tag's key is 128 characters, and the maximum length for a tag's value is 256."
                FileShareName:
                  $ref: "#/components/schemas/FileShareName"
                  description: "The name of the file share. Optional. FileShareName must be set if an S3 prefix name is set in LocationARN, or if an access point or access point alias is used. A valid NFS file share name can only contain the following characters: a-z, A-Z, 0-9, -, ., and _."
                CacheAttributes:
                  $ref: "#/components/schemas/CacheAttributes"
                  description: Specifies refresh cache information for the file share.
                NotificationPolicy:
                  $ref: "#/components/schemas/NotificationPolicy"
                  description: "The notification policy of the file share. SettlingTimeInSeconds controls the number of seconds to wait after the last point in time a client wrote to a file before generating an ObjectUploaded notification. Because clients can make many small writes to files, it's best to set this parameter for as long as possible to avoid generating multiple notifications for the same file in a small time period. SettlingTimeInSeconds has no effect on the timing of the object uploading to Amazon S3, only the timing of the notification. This setting is not meant to specify an exact time at which the notification will be sent. In some cases, the gateway might require more than the specified delay time to generate and send notifications. The following example sets NotificationPolicy on with SettlingTimeInSeconds set to 60. {\\\"Upload\\\": {\\\"SettlingTimeInSeconds\\\": 60}} The following example sets NotificationPolicy off. {}"
                VPCEndpointDNSName:
                  $ref: "#/components/schemas/DNSHostName"
                  description: Specifies the DNS name for the VPC endpoint that the NFS file share uses to connect to Amazon S3. This parameter is required for NFS file shares that connect to Amazon S3 through a VPC endpoint, a VPC access point, or an access point alias that points to a VPC access point.
                BucketRegion:
                  $ref: "#/components/schemas/RegionId"
                  description: Specifies the Region of the S3 bucket where the NFS file share stores files. This parameter is required for NFS file shares that connect to Amazon S3 through a VPC endpoint, a VPC access point, or an access point alias that points to a VPC access point.
                AuditDestinationARN:
                  $ref: "#/components/schemas/AuditDestinationARN"
                  description: The Amazon Resource Name (ARN) of the storage used for audit logs.
              required:
                - ClientToken
                - GatewayARN
                - Role
                - LocationARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNFSFileShareOutput"
  /CreateSMBFileShare:
