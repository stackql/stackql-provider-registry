        - COMPLETE
        - FAILED
        - PENDING
    Time:
      type: string
      format: date-time
    DescribeBandwidthRateLimitOutput:
      description: "A JSON object containing the following fields:"
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        AverageUploadRateLimitInBitsPerSec:
          $ref: "#/components/schemas/BandwidthUploadRateLimit"
          description: The average upload bandwidth rate limit in bits per second. This field does not appear in the response if the upload rate limit is not set.
        AverageDownloadRateLimitInBitsPerSec:
          $ref: "#/components/schemas/BandwidthDownloadRateLimit"
          description: The average download bandwidth rate limit in bits per second. This field does not appear in the response if the download rate limit is not set.
    BandwidthUploadRateLimit:
      type: integer
      format: int64
      minimum: 51200
    BandwidthDownloadRateLimit:
      type: integer
      format: int64
      minimum: 102400
    DescribeBandwidthRateLimitScheduleOutput:
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
        BandwidthRateLimitIntervals:
          $ref: "#/components/schemas/BandwidthRateLimitIntervals"
          description: An array that contains the bandwidth rate limit intervals for a tape or volume gateway.
    BandwidthRateLimitIntervals:
      type: array
      items:
        $ref: "#/components/schemas/BandwidthRateLimitInterval"
    BandwidthRateLimitInterval:
      description: Describes a bandwidth rate limit interval for a gateway. A bandwidth rate limit schedule consists of one or more bandwidth rate limit intervals. A bandwidth rate limit interval defines a period of time on one or more days of the week, during which bandwidth rate limits are specified for uploading, downloading, or both. FSx File Gateway does not support this feature.
      type: object
      properties:
        StartHourOfDay:
          $ref: "#/components/schemas/HourOfDay"
          description: The hour of the day to start the bandwidth rate limit interval.
        StartMinuteOfHour:
          $ref: "#/components/schemas/MinuteOfHour"
          description: The minute of the hour to start the bandwidth rate limit interval. The interval begins at the start of that minute. To begin an interval exactly at the start of the hour, use the value 0.
        EndHourOfDay:
          $ref: "#/components/schemas/HourOfDay"
          description: The hour of the day to end the bandwidth rate limit interval.
        EndMinuteOfHour:
          $ref: "#/components/schemas/MinuteOfHour"
          description: The minute of the hour to end the bandwidth rate limit interval. The bandwidth rate limit interval ends at the end of the minute. To end an interval at the end of an hour, use the value 59.
        DaysOfWeek:
          $ref: "#/components/schemas/DaysOfWeek"
          description: The days of the week component of the bandwidth rate limit interval, represented as ordinal numbers from 0 to 6, where 0 represents Sunday and 6 represents Saturday.
        AverageUploadRateLimitInBitsPerSec:
          $ref: "#/components/schemas/BandwidthUploadRateLimit"
          description: The average upload rate limit component of the bandwidth rate limit interval, in bits per second. This field does not appear in the response if the upload rate limit is not set. For Tape Gateway and Volume Gateway, the minimum value is 51200. This field is required for S3 File Gateway, and the minimum value is 104857600.
        AverageDownloadRateLimitInBitsPerSec:
          $ref: "#/components/schemas/BandwidthDownloadRateLimit"
          description: The average download rate limit component of the bandwidth rate limit interval, in bits per second. This field does not appear in the response if the download rate limit is not set. S3 File Gateway does not support this feature.
      required:
        - StartHourOfDay
        - StartMinuteOfHour
        - EndHourOfDay
        - EndMinuteOfHour
        - DaysOfWeek
    HourOfDay:
      type: integer
      minimum: 0
      maximum: 23
    MinuteOfHour:
      type: integer
      minimum: 0
      maximum: 59
    DaysOfWeek:
      type: array
      items:
        $ref: "#/components/schemas/DayOfWeek"
    DayOfWeek:
      type: integer
      minimum: 0
      maximum: 6
    DescribeCacheOutput:
