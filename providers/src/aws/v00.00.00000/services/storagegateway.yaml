    DisassociateFileSystemOutput:
      type: object
      properties:
        FileSystemAssociationARN:
          $ref: "#/components/schemas/FileSystemAssociationARN"
          description: The Amazon Resource Name (ARN) of the deleted file system association.
    EvictFilesFailingUploadOutput:
      type: object
      properties:
        NotificationId:
          $ref: "#/components/schemas/string"
          description: The randomly generated ID of the CloudWatch notification associated with the cache clean operation. This ID is in UUID format.
    OrganizationalUnit:
      type: string
      minLength: 1
      maxLength: 1024
    Hosts:
      type: array
      items:
        $ref: "#/components/schemas/Host"
    Host:
      type: string
      minLength: 2
      maxLength: 1024
