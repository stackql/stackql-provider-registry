    JoinDomainOutput:
      description: JoinDomainOutput
      type: object
      properties:
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
          description: The unique Amazon Resource Name (ARN) of the gateway that joined the domain.
        ActiveDirectoryStatus:
          $ref: "#/components/schemas/ActiveDirectoryStatus"
          description: "Indicates the status of the gateway as a member of the Active Directory domain. This field is only used as part of a JoinDomain request. It is not affected by Active Directory connectivity changes that occur after the JoinDomain request succeeds. ACCESS_DENIED: Indicates that the JoinDomain operation failed due to an authentication error. DETACHED: Indicates that gateway is not joined to a domain. JOINED: Indicates that the gateway has successfully joined a domain. JOINING: Indicates that a JoinDomain operation is in progress. INSUFFICIENT_PERMISSIONS: Indicates that the JoinDomain operation failed because the specified user lacks the necessary permissions to join the domain. NETWORK_ERROR: Indicates that JoinDomain operation failed due to a network or connectivity error. TIMEOUT: Indicates that the JoinDomain operation failed because the operation didn't complete within the allotted time. UNKNOWN_ERROR: Indicates that the JoinDomain operation failed due to another type of error."
    ListAutomaticTapeCreationPoliciesOutput:
      type: object
      properties:
        AutomaticTapeCreationPolicyInfos:
          $ref: "#/components/schemas/AutomaticTapeCreationPolicyInfos"
          description: Gets a listing of information about the gateway's automatic tape creation policies, including the automatic tape creation rules and the gateway that is using the policies.
    AutomaticTapeCreationPolicyInfos:
      type: array
      items:
        $ref: "#/components/schemas/AutomaticTapeCreationPolicyInfo"
    AutomaticTapeCreationPolicyInfo:
      description: Information about the gateway's automatic tape creation policies, including the automatic tape creation rules and the gateway that is using the policies.
      type: object
      properties:
        AutomaticTapeCreationRules:
          $ref: "#/components/schemas/AutomaticTapeCreationRules"
          description: An automatic tape creation policy consists of a list of automatic tape creation rules. This returns the rules that determine when and how to automatically create new tapes.
        GatewayARN:
          $ref: "#/components/schemas/GatewayARN"
    AutomaticTapeCreationRules:
      type: array
      items:
        $ref: "#/components/schemas/AutomaticTapeCreationRule"
    AutomaticTapeCreationRule:
      description: An automatic tape creation policy consists of automatic tape creation rules where each rule defines when and how to create new tapes. For more information about automatic tape creation, see Creating Tapes Automatically.
      type: object
      properties:
        TapeBarcodePrefix:
          $ref: "#/components/schemas/TapeBarcodePrefix"
          description: A prefix that you append to the barcode of the virtual tape that you are creating. This prefix makes the barcode unique. The prefix must be 1-4 characters in length and must be one of the uppercase letters from A to Z.
        PoolId:
          $ref: "#/components/schemas/PoolId"
          description: The ID of the pool that you want to add your tape to for archiving. The tape in this pool is archived in the Amazon S3 storage class that is associated with the pool. When you use your backup application to eject the tape, the tape is archived directly into the storage class (S3 Glacier or S3 Glacier Deep Archive) that corresponds to the pool.
        TapeSizeInBytes:
          $ref: "#/components/schemas/TapeSize"
          description: The size, in bytes, of the virtual tape capacity.
        MinimumNumTapes:
          $ref: "#/components/schemas/MinimumNumTapes"
          description: The minimum number of available virtual tapes that the gateway maintains at all times. If the number of tapes on the gateway goes below this value, the gateway creates as many new tapes as are needed to have MinimumNumTapes on the gateway. For more information about automatic tape creation, see Creating Tapes Automatically.
        Worm:
          $ref: "#/components/schemas/boolean"
          description: Set to true to indicate that tapes are to be archived as write-once-read-many (WORM). Set to false when WORM is not enabled for tapes.
      required:
        - TapeBarcodePrefix
        - PoolId
        - TapeSizeInBytes
        - MinimumNumTapes
    MinimumNumTapes:
      type: integer
      minimum: 1
      maximum: 10
