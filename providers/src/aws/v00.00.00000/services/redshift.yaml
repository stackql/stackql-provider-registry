      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateUsageLimit
      description: Creates a usage limit for a specified Amazon Redshift feature on a cluster. The usage limit is identified by the returned usage limit identifier.
      parameters:
        - name: ClusterIdentifier
          in: query
          required: true
          description: The identifier of the cluster that you want to limit usage.
          schema:
            $ref: "#/components/schemas/String"
        - name: FeatureType
          in: query
          required: true
          description: The Amazon Redshift feature that you want to limit.
          schema:
            $ref: "#/components/schemas/UsageLimitFeatureType"
        - name: LimitType
          in: query
          required: true
          description: The type of limit. Depending on the feature type, this can be based on a time duration or data size. If FeatureType is spectrum, then LimitType must be data-scanned. If FeatureType is concurrency-scaling, then LimitType must be time. If FeatureType is cross-region-datasharing, then LimitType must be data-scanned. If FeatureType is extra-compute-for-automatic-optimization, then LimitType must be time.
          schema:
            $ref: "#/components/schemas/UsageLimitLimitType"
        - name: Amount
          in: query
          required: false
          description: The limit amount. If time-based, this amount is in minutes. If data-based, this amount is in terabytes (TB). The value must be a positive number.
          schema:
            $ref: "#/components/schemas/Long"
        - name: Period
          in: query
          required: false
          description: The time period that the amount applies to. A weekly period begins on Sunday. The default is monthly.
          schema:
            $ref: "#/components/schemas/UsageLimitPeriod"
        - name: BreachAction
          in: query
          required: false
          description: The action that Amazon Redshift takes when the limit is reached. The default is log. For more information about this parameter, see UsageLimit.
          schema:
            $ref: "#/components/schemas/UsageLimitBreachAction"
        - name: Tags
          in: query
          required: false
          description: A list of tag instances.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateUsageLimitOutputDisplay"
    post:
      operationId: POST_CreateUsageLimit
      description: Creates a usage limit for a specified Amazon Redshift feature on a cluster. The usage limit is identified by the returned usage limit identifier.
