        - monthly
    UsageLimitBreachAction:
      type: string
      enum:
        - log
        - emit-metric
        - disable
    UsageLimitDisplay:
      type: object
      properties:
        UsageLimitId:
          type: string
          description: The identifier of the usage limit.
        ClusterIdentifier:
          type: string
          description: The identifier of the cluster with a usage limit.
        FeatureType:
          type: string
          description: The Amazon Redshift feature to which the limit applies.
        LimitType:
          type: string
          description: The type of limit. Depending on the feature type, this can be based on a time duration or data size.
        Amount:
          type: integer
          description: The limit amount. If time-based, this amount is in minutes. If data-based, this amount is in terabytes (TB).
        Period:
          type: string
          description: The time period that the amount applies to. A weekly period begins on Sunday. The default is monthly.
        BreachAction:
          type: string
          description: "The action that Amazon Redshift takes when the limit is reached. Possible values are: log - To log an event in a system table. The default is log. emit-metric - To emit CloudWatch metrics. disable - To disable the feature until the next usage period begins."
        Tags:
          type: string
          description: A list of tag instances.
    CreateUsageLimitOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/UsageLimitDisplay"
    CreateUsageLimitMessage:
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the cluster that you want to limit usage.
        FeatureType:
          $ref: "#/components/schemas/UsageLimitFeatureType"
          description: The Amazon Redshift feature that you want to limit.
        LimitType:
          $ref: "#/components/schemas/UsageLimitLimitType"
          description: The type of limit. Depending on the feature type, this can be based on a time duration or data size. If FeatureType is spectrum, then LimitType must be data-scanned. If FeatureType is concurrency-scaling, then LimitType must be time. If FeatureType is cross-region-datasharing, then LimitType must be data-scanned. If FeatureType is extra-compute-for-automatic-optimization, then LimitType must be time.
        Amount:
          $ref: "#/components/schemas/Long"
          description: The limit amount. If time-based, this amount is in minutes. If data-based, this amount is in terabytes (TB). The value must be a positive number.
        Period:
          $ref: "#/components/schemas/UsageLimitPeriod"
          description: The time period that the amount applies to. A weekly period begins on Sunday. The default is monthly.
        BreachAction:
          $ref: "#/components/schemas/UsageLimitBreachAction"
          description: The action that Amazon Redshift takes when the limit is reached. The default is log. For more information about this parameter, see UsageLimit.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tag instances.
      required:
        - ClusterIdentifier
        - FeatureType
        - LimitType
        - Amount
