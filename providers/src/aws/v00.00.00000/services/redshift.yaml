  /?Action=ResizeCluster&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ResizeCluster
      description: "Changes the size of the cluster. You can change the cluster's type, or change the number or type of nodes. The default behavior is to use the elastic resize method. With an elastic resize, your cluster is available for read and write operations more quickly than with the classic resize method. Elastic resize operations have the following restrictions: You can only resize clusters of the following types: dc2.large dc2.8xlarge rg.xlarge rg.4xlarge ra3.large ra3.xlplus ra3.4xlarge ra3.16xlarge The type of nodes that you add must match the node type for the cluster."
      parameters:
        - name: ClusterIdentifier
          in: query
          required: true
          description: The unique identifier for the cluster to resize.
          schema:
            $ref: "#/components/schemas/String"
        - name: ClusterType
          in: query
          required: false
          description: The new cluster type for the specified cluster.
          schema:
            $ref: "#/components/schemas/String"
        - name: NodeType
          in: query
          required: false
          description: The new node type for the nodes you are adding. If not specified, the cluster's current node type is used.
          schema:
            $ref: "#/components/schemas/String"
        - name: NumberOfNodes
          in: query
          required: false
          description: The new number of nodes for the cluster. If not specified, the cluster's current number of nodes is used.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: Classic
          in: query
          required: false
          description: A boolean value indicating whether the resize operation is using the classic resize process. If you don't provide this parameter or set the value to false, the resize type is elastic.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ReservedNodeId
          in: query
          required: false
          description: The identifier of the reserved node.
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetReservedNodeOfferingId
          in: query
          required: false
          description: The identifier of the target reserved node offering.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ResizeClusterOutputDisplay"
    post:
      operationId: POST_ResizeCluster
      description: "Changes the size of the cluster. You can change the cluster's type, or change the number or type of nodes. The default behavior is to use the elastic resize method. With an elastic resize, your cluster is available for read and write operations more quickly than with the classic resize method. Elastic resize operations have the following restrictions: You can only resize clusters of the following types: dc2.large dc2.8xlarge rg.xlarge rg.4xlarge ra3.large ra3.xlplus ra3.4xlarge ra3.16xlarge The type of nodes that you add must match the node type for the cluster."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ResizeClusterOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ResizeClusterMessage"
  /?Action=RestoreFromClusterSnapshot&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_RestoreFromClusterSnapshot
      description: "Creates a new cluster from a snapshot. By default, Amazon Redshift creates the resulting cluster with the same configuration as the original cluster from which the snapshot was created, except that the new cluster is created with the default cluster security and parameter groups. After Amazon Redshift creates the cluster, you can use the ModifyCluster API to associate a different security group and different parameter group with the restored cluster. If you are using a DS node type, you can also choose to change to another DS node type of the same size during restore. If you restore a cluster into a VPC, you must provide a cluster subnet group where you want the cluster restored. VPC Block Public Access (BPA) enables you to block resources in VPCs and subnets that you own in a Region from reaching or being reached from the internet through internet gateways and egress-only internet gateways. If a subnet group for a provisioned cluster is in an account with VPC BPA turned on, the following capabilities are blocked: Creating a public cluster Restoring a public cluster Modifying a private cluster to be public Adding a subnet with VPC BPA turned on to the subnet group when there's at least one public cluster within the group For more information about VPC BPA, see Block public access to VPCs and subnets in the Amazon VPC User Guide. For more information about working with snapshots, go to Amazon Redshift Snapshots in the Amazon Redshift Cluster Management Guide."
      parameters:
        - name: ClusterIdentifier
          in: query
          required: true
          description: "The identifier of the cluster that will be created from restoring the snapshot. Constraints: Must contain from 1 to 63 alphanumeric characters or hyphens. Alphabetic characters must be lowercase. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Must be unique for all clusters within an Amazon Web Services account."
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotIdentifier
          in: query
          required: false
          description: "The name of the snapshot from which to create the new cluster. This parameter isn't case sensitive. You must specify this parameter or snapshotArn, but not both. Example: my-snapshot-id"
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the snapshot associated with the message to restore from a cluster. You must specify this parameter or snapshotIdentifier, but not both.
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotClusterIdentifier
          in: query
          required: false
          description: The name of the cluster the source snapshot was created from. This parameter is required if your IAM user has a policy containing a snapshot resource element that specifies anything other than * for the cluster name.
          schema:
            $ref: "#/components/schemas/String"
        - name: Port
          in: query
          required: false
          description: "The port number on which the cluster accepts connections. Default: The same port as the original cluster. Valid values: For clusters with DC2 nodes, must be within the range 1150-65535. For clusters with RG or RA3 nodes, must be within the ranges 5431-5455 or 8191-8215."
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: AvailabilityZone
          in: query
          required: false
          description: "The Amazon EC2 Availability Zone in which to restore the cluster. Default: A random, system-chosen Availability Zone. Example: us-east-2a"
          schema:
            $ref: "#/components/schemas/String"
        - name: AllowVersionUpgrade
          in: query
          required: false
          description: "If true, major version upgrades can be applied during the maintenance window to the Amazon Redshift engine that is running on the cluster. Default: true"
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ClusterSubnetGroupName
          in: query
          required: false
          description: The name of the subnet group where you want to cluster restored. A snapshot of cluster in VPC can be restored only in VPC. Therefore, you must provide subnet group name where you want the cluster restored.
          schema:
            $ref: "#/components/schemas/String"
        - name: PubliclyAccessible
          in: query
          required: false
          description: "If true, the cluster can be accessed from a public network. Default: false"
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: OwnerAccount
          in: query
          required: false
          description: The Amazon Web Services account used to create or copy the snapshot. Required if you are restoring a snapshot you do not own, optional if you own the snapshot.
          schema:
            $ref: "#/components/schemas/String"
        - name: HsmClientCertificateIdentifier
          in: query
          required: false
          description: Specifies the name of the HSM client certificate the Amazon Redshift cluster uses to retrieve the data encryption keys stored in an HSM.
          schema:
            $ref: "#/components/schemas/String"
        - name: HsmConfigurationIdentifier
          in: query
          required: false
          description: Specifies the name of the HSM configuration that contains the information the Amazon Redshift cluster can use to retrieve and store keys in an HSM.
          schema:
            $ref: "#/components/schemas/String"
        - name: ElasticIp
          in: query
          required: false
          description: The Elastic IP (EIP) address for the cluster. Don't specify the Elastic IP address for a publicly accessible cluster with availability zone relocation turned on.
          schema:
            $ref: "#/components/schemas/String"
        - name: ClusterParameterGroupName
          in: query
          required: false
          description: "The name of the parameter group to be associated with this cluster. Default: The default Amazon Redshift cluster parameter group. For information about the default parameter group, go to Working with Amazon Redshift Parameter Groups. Constraints: Must be 1 to 255 alphanumeric characters or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens."
          schema:
            $ref: "#/components/schemas/String"
        - name: ClusterSecurityGroups
          in: query
          required: false
          description: "A list of security groups to be associated with this cluster. Default: The default cluster security group for Amazon Redshift. Cluster security groups only apply to clusters outside of VPCs."
          schema:
            $ref: "#/components/schemas/ClusterSecurityGroupNameList"
        - name: VpcSecurityGroupIds
          in: query
          required: false
          description: "A list of Virtual Private Cloud (VPC) security groups to be associated with the cluster. Default: The default VPC security group is associated with the cluster. VPC security groups only apply to clusters in VPCs."
          schema:
            $ref: "#/components/schemas/VpcSecurityGroupIdList"
        - name: PreferredMaintenanceWindow
          in: query
          required: false
          description: "The weekly time range (in UTC) during which automated cluster maintenance can occur. Format: ddd:hh24:mi-ddd:hh24:mi Default: The value selected for the cluster from which the snapshot was taken. For more information about the time blocks for each region, see Maintenance Windows in Amazon Redshift Cluster Management Guide. Valid Days: Mon | Tue | Wed | Thu | Fri | Sat | Sun Constraints: Minimum 30-minute window."
          schema:
            $ref: "#/components/schemas/String"
        - name: AutomatedSnapshotRetentionPeriod
          in: query
          required: false
          description: "The number of days that automated snapshots are retained. If the value is 0, automated snapshots are disabled. Even if automated snapshots are disabled, you can still create manual snapshots when you want with CreateClusterSnapshot. You can't disable automated snapshots for RG or RA3 node types. Set the automated retention period from 1-35 days. Default: The value selected for the cluster from which the snapshot was taken. Constraints: Must be a value from 0 to 35."
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: ManualSnapshotRetentionPeriod
          in: query
          required: false
          description: The default number of days to retain a manual snapshot. If the value is -1, the snapshot is retained indefinitely. This setting doesn't change the retention period of existing snapshots. The value must be either -1 or an integer between 1 and 3,653.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: KmsKeyId
          in: query
          required: false
          description: The Key Management Service (KMS) key ID of the encryption key that encrypts data in the cluster restored from a shared snapshot. You can also provide the key ID when you restore from an unencrypted snapshot to an encrypted cluster in the same account. Additionally, you can specify a new KMS key ID when you restore from an encrypted snapshot in the same account in order to change it. In that case, the restored cluster is encrypted with the new KMS key ID.
          schema:
            $ref: "#/components/schemas/String"
        - name: NodeType
          in: query
          required: false
          description: The node type that the restored cluster will be provisioned with. If you have a DC instance type, you must restore into that same instance type and size. In other words, you can only restore a dc2.large node type into another dc2 type. For more information about node types, see About Clusters and Nodes in the Amazon Redshift Cluster Management Guide.
          schema:
            $ref: "#/components/schemas/String"
        - name: EnhancedVpcRouting
          in: query
          required: false
          description: "An option that specifies whether to create the cluster with enhanced VPC routing enabled. To create a cluster that uses enhanced VPC routing, the cluster must be in a VPC. For more information, see Enhanced VPC Routing in the Amazon Redshift Cluster Management Guide. If this option is true, enhanced VPC routing is enabled. Default: false"
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: AdditionalInfo
          in: query
          required: false
          description: Reserved.
          schema:
            $ref: "#/components/schemas/String"
        - name: IamRoles
          in: query
          required: false
          description: A list of Identity and Access Management (IAM) roles that can be used by the cluster to access other Amazon Web Services services. You must supply the IAM roles in their Amazon Resource Name (ARN) format. The maximum number of IAM roles that you can associate is subject to a quota. For more information, go to Quotas and limits in the Amazon Redshift Cluster Management Guide.
          schema:
            $ref: "#/components/schemas/IamRoleArnList"
        - name: MaintenanceTrackName
          in: query
          required: false
          description: The name of the maintenance track for the restored cluster. When you take a snapshot, the snapshot inherits the MaintenanceTrack value from the cluster. The snapshot might be on a different track than the cluster that was the source for the snapshot. For example, suppose that you take a snapshot of a cluster that is on the current track and then change the cluster to be on the trailing track. In this case, the snapshot and the source cluster are on different tracks.
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotScheduleIdentifier
          in: query
          required: false
          description: A unique identifier for the snapshot schedule.
          schema:
            $ref: "#/components/schemas/String"
        - name: NumberOfNodes
          in: query
          required: false
          description: The number of nodes specified when provisioning the restored cluster.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: AvailabilityZoneRelocation
          in: query
          required: false
          description: The option to enable relocation for an Amazon Redshift cluster between Availability Zones after the cluster is restored.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: AquaConfigurationStatus
          in: query
          required: false
          description: This parameter is retired. It does not set the AQUA configuration status. Amazon Redshift automatically determines whether to use AQUA (Advanced Query Accelerator).
          schema:
            $ref: "#/components/schemas/AquaConfigurationStatus"
        - name: DefaultIamRoleArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) for the IAM role that was set as default for the cluster when the cluster was last modified while it was restored from a snapshot.
          schema:
            $ref: "#/components/schemas/String"
        - name: ReservedNodeId
          in: query
          required: false
          description: The identifier of the target reserved node offering.
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetReservedNodeOfferingId
          in: query
          required: false
          description: The identifier of the target reserved node offering.
          schema:
            $ref: "#/components/schemas/String"
        - name: Encrypted
          in: query
          required: false
          description: Enables support for restoring an unencrypted snapshot to a cluster encrypted with Key Management Service (KMS) and a customer managed key.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ManageMasterPassword
          in: query
          required: false
          description: If true, Amazon Redshift uses Secrets Manager to manage the restored cluster's admin credentials. If ManageMasterPassword is false or not set, Amazon Redshift uses the admin credentials the cluster had at the time the snapshot was taken.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: MasterPasswordSecretKmsKeyId
          in: query
          required: false
          description: The ID of the Key Management Service (KMS) key used to encrypt and store the cluster's admin credentials secret. You can only use this parameter if ManageMasterPassword is true.
          schema:
            $ref: "#/components/schemas/String"
        - name: IpAddressType
          in: query
          required: false
          description: The IP address type for the cluster. Possible values are ipv4 and dualstack.
          schema:
            $ref: "#/components/schemas/String"
        - name: MultiAZ
          in: query
          required: false
          description: If true, the snapshot will be restored to a cluster deployed in two Availability Zones.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: CatalogName
          in: query
          required: false
          description: "The name of the Glue Data Catalog that will be associated with the cluster enabled with Amazon Redshift federated permissions. Constraints: Must contain at least one lowercase letter. Can only contain lowercase letters (a-z), numbers (0-9), underscores (_), and hyphens (-). Pattern: ^[a-z0-9_-]*[a-z]+[a-z0-9_-]*$ Example: my-catalog_01"
          schema:
            $ref: "#/components/schemas/CatalogNameString"
        - name: RedshiftIdcApplicationArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the IAM Identity Center application used for enabling Amazon Web Services IAM Identity Center trusted identity propagation on a cluster enabled with Amazon Redshift federated permissions.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreFromClusterSnapshotOutputDisplay"
    post:
      operationId: POST_RestoreFromClusterSnapshot
      description: "Creates a new cluster from a snapshot. By default, Amazon Redshift creates the resulting cluster with the same configuration as the original cluster from which the snapshot was created, except that the new cluster is created with the default cluster security and parameter groups. After Amazon Redshift creates the cluster, you can use the ModifyCluster API to associate a different security group and different parameter group with the restored cluster. If you are using a DS node type, you can also choose to change to another DS node type of the same size during restore. If you restore a cluster into a VPC, you must provide a cluster subnet group where you want the cluster restored. VPC Block Public Access (BPA) enables you to block resources in VPCs and subnets that you own in a Region from reaching or being reached from the internet through internet gateways and egress-only internet gateways. If a subnet group for a provisioned cluster is in an account with VPC BPA turned on, the following capabilities are blocked: Creating a public cluster Restoring a public cluster Modifying a private cluster to be public Adding a subnet with VPC BPA turned on to the subnet group when there's at least one public cluster within the group For more information about VPC BPA, see Block public access to VPCs and subnets in the Amazon VPC User Guide. For more information about working with snapshots, go to Amazon Redshift Snapshots in the Amazon Redshift Cluster Management Guide."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreFromClusterSnapshotOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/RestoreFromClusterSnapshotMessage"
  /?Action=RestoreTableFromClusterSnapshot&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_RestoreTableFromClusterSnapshot
      description: Creates a new table from a table in an Amazon Redshift cluster snapshot. You must create the new table within the Amazon Redshift cluster that the snapshot was taken from. You cannot use RestoreTableFromClusterSnapshot to restore a table with the same name as an existing table in an Amazon Redshift cluster. That is, you cannot overwrite an existing table in a cluster with a restored table. If you want to replace your original table with a new, restored table, then rename or drop your original table before you call RestoreTableFromClusterSnapshot. When you have renamed your original table, then you can pass the original name of the table as the NewTableName parameter value in the call to RestoreTableFromClusterSnapshot. This way, you can replace the original table with the table created from the snapshot. You can't use this operation to restore tables with interleaved sort keys.
      parameters:
        - name: ClusterIdentifier
          in: query
          required: true
          description: The identifier of the Amazon Redshift cluster to restore the table to.
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotIdentifier
          in: query
          required: true
          description: The identifier of the snapshot to restore the table from. This snapshot must have been created from the Amazon Redshift cluster specified by the ClusterIdentifier parameter.
          schema:
            $ref: "#/components/schemas/String"
        - name: SourceDatabaseName
          in: query
          required: true
          description: The name of the source database that contains the table to restore from.
          schema:
            $ref: "#/components/schemas/String"
        - name: SourceSchemaName
          in: query
          required: false
          description: The name of the source schema that contains the table to restore from. If you do not specify a SourceSchemaName value, the default is public.
          schema:
            $ref: "#/components/schemas/String"
        - name: SourceTableName
          in: query
          required: true
          description: The name of the source table to restore from.
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDatabaseName
          in: query
          required: false
          description: The name of the database to restore the table to.
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetSchemaName
          in: query
          required: false
          description: The name of the schema to restore the table to.
          schema:
            $ref: "#/components/schemas/String"
        - name: NewTableName
          in: query
          required: true
          description: The name of the table to create as a result of the current request.
          schema:
            $ref: "#/components/schemas/String"
        - name: EnableCaseSensitiveIdentifier
          in: query
          required: false
          description: Indicates whether name identifiers for database, schema, and table are case sensitive. If true, the names are case sensitive. If false (default), the names are not case sensitive.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreTableFromClusterSnapshotOutputDisplay"
    post:
      operationId: POST_RestoreTableFromClusterSnapshot
      description: Creates a new table from a table in an Amazon Redshift cluster snapshot. You must create the new table within the Amazon Redshift cluster that the snapshot was taken from. You cannot use RestoreTableFromClusterSnapshot to restore a table with the same name as an existing table in an Amazon Redshift cluster. That is, you cannot overwrite an existing table in a cluster with a restored table. If you want to replace your original table with a new, restored table, then rename or drop your original table before you call RestoreTableFromClusterSnapshot. When you have renamed your original table, then you can pass the original name of the table as the NewTableName parameter value in the call to RestoreTableFromClusterSnapshot. This way, you can replace the original table with the table created from the snapshot. You can't use this operation to restore tables with interleaved sort keys.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreTableFromClusterSnapshotOutputDisplay"
      parameters: []
      requestBody:
