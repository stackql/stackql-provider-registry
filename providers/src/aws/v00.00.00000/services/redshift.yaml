    ScheduledActionType:
      description: The action type that specifies an Amazon Redshift API operation that is supported by the Amazon Redshift scheduler.
      type: object
      properties:
        ResizeCluster:
          $ref: "#/components/schemas/ResizeClusterMessage"
          description: An action that runs a ResizeCluster API operation.
        PauseCluster:
          $ref: "#/components/schemas/PauseClusterMessage"
          description: An action that runs a PauseCluster API operation.
        ResumeCluster:
          $ref: "#/components/schemas/ResumeClusterMessage"
          description: An action that runs a ResumeCluster API operation.
    ResizeClusterMessage:
      description: Describes a resize cluster operation. For example, a scheduled action to run the ResizeCluster API operation.
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the cluster to resize.
        ClusterType:
          $ref: "#/components/schemas/String"
          description: The new cluster type for the specified cluster.
        NodeType:
          $ref: "#/components/schemas/String"
          description: The new node type for the nodes you are adding. If not specified, the cluster's current node type is used.
        NumberOfNodes:
          $ref: "#/components/schemas/IntegerOptional"
          description: The new number of nodes for the cluster. If not specified, the cluster's current number of nodes is used.
        Classic:
          $ref: "#/components/schemas/BooleanOptional"
          description: A boolean value indicating whether the resize operation is using the classic resize process. If you don't provide this parameter or set the value to false, the resize type is elastic.
        ReservedNodeId:
          $ref: "#/components/schemas/String"
          description: The identifier of the reserved node.
        TargetReservedNodeOfferingId:
          $ref: "#/components/schemas/String"
          description: The identifier of the target reserved node offering.
      required:
        - ClusterIdentifier
    PauseClusterMessage:
      description: Describes a pause cluster operation. For example, a scheduled action to run the PauseCluster API operation.
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the cluster to be paused.
      required:
        - ClusterIdentifier
    ResumeClusterMessage:
      description: Describes a resume cluster operation. For example, a scheduled action to run the ResumeCluster API operation.
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the cluster to be resumed.
      required:
        - ClusterIdentifier
    TStamp:
      type: string
      format: date-time
    ScheduledActionDisplay:
      type: object
      properties:
        ScheduledActionName:
          type: string
          description: The name of the scheduled action.
        TargetAction:
          type: string
          description: A JSON format string of the Amazon Redshift API operation with input parameters. "{\"ResizeCluster\":{\"NodeType\":\"ra3.4xlarge\",\"ClusterIdentifier\":\"my-test-cluster\",\"NumberOfNodes\":3}}".
        Schedule:
          type: string
          description: The schedule for a one-time (at format) or recurring (cron format) scheduled action. Schedule invocations must be separated by at least one hour. Format of at expressions is "at(yyyy-mm-ddThh:mm:ss)". For example, "at(2016-03-04T17:27:00)". Format of cron expressions is "cron(Minutes Hours Day-of-month Month Day-of-week Year)". For example, "cron(0 10 ? * MON *)". For more information, see Cron Expressions in the Amazon CloudWatch Events User Guide.
        IamRole:
          type: string
          description: The IAM role to assume to run the scheduled action. This IAM role must have permission to run the Amazon Redshift API operation in the scheduled action. This IAM role must allow the Amazon Redshift scheduler (Principal scheduler.redshift.amazonaws.com) to assume permissions on your behalf. For more information about the IAM role to use with the Amazon Redshift scheduler, see Using Identity-Based Policies for Amazon Redshift in the Amazon Redshift Cluster Management Guide.
        ScheduledActionDescription:
          type: string
          description: The description of the scheduled action.
        State:
          type: string
          description: The state of the scheduled action. For example, DISABLED.
        NextInvocations:
          type: string
          description: List of times when the scheduled action will run.
        StartTime:
          type: string
          description: The start time in UTC when the schedule is active. Before this time, the scheduled action does not trigger.
        EndTime:
          type: string
          description: The end time in UTC when the schedule is no longer active. After this time, the scheduled action does not trigger.
    CreateScheduledActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledActionDisplay"
    CreateScheduledActionMessage:
      type: object
      properties:
        ScheduledActionName:
          $ref: "#/components/schemas/String"
          description: The name of the scheduled action. The name must be unique within an account. For more information about this parameter, see ScheduledAction.
        TargetAction:
          $ref: "#/components/schemas/ScheduledActionType"
          description: A JSON format string of the Amazon Redshift API operation with input parameters. For more information about this parameter, see ScheduledAction.
        Schedule:
          $ref: "#/components/schemas/String"
          description: The schedule in at( ) or cron( ) format. For more information about this parameter, see ScheduledAction.
        IamRole:
          $ref: "#/components/schemas/String"
          description: The IAM role to assume to run the target action. For more information about this parameter, see ScheduledAction.
        ScheduledActionDescription:
          $ref: "#/components/schemas/String"
          description: The description of the scheduled action.
        StartTime:
          $ref: "#/components/schemas/TStamp"
          description: The start time in UTC of the scheduled action. Before this time, the scheduled action does not trigger. For more information about this parameter, see ScheduledAction.
        EndTime:
          $ref: "#/components/schemas/TStamp"
          description: The end time in UTC of the scheduled action. After this time, the scheduled action does not trigger. For more information about this parameter, see ScheduledAction.
        Enable:
          $ref: "#/components/schemas/BooleanOptional"
          description: If true, the schedule is enabled. If false, the scheduled action does not trigger. For more information about state of the scheduled action, see ScheduledAction.
      required:
        - ScheduledActionName
        - TargetAction
        - Schedule
        - IamRole
