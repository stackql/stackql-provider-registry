  /?Action=BatchModifyClusterSnapshots&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_BatchModifyClusterSnapshots
      description: Modifies the settings for a set of cluster snapshots.
      parameters:
        - name: SnapshotIdentifierList
          in: query
          required: true
          description: A list of snapshot identifiers you want to modify.
          schema:
            $ref: "#/components/schemas/SnapshotIdentifierList"
        - name: ManualSnapshotRetentionPeriod
          in: query
          required: false
          description: The number of days that a manual snapshot is retained. If you specify the value -1, the manual snapshot is retained indefinitely. The number must be either -1 or an integer between 1 and 3,653. If you decrease the manual snapshot retention period from its current value, existing manual snapshots that fall outside of the new retention period will return an error. If you want to suppress the errors and delete the snapshots, use the force option.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: Force
          in: query
          required: false
          description: A boolean value indicating whether to override an exception if the retention period has passed.
          schema:
            $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchModifyClusterSnapshotsOutputDisplay"
    post:
      operationId: POST_BatchModifyClusterSnapshots
      description: Modifies the settings for a set of cluster snapshots.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchModifyClusterSnapshotsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/BatchModifyClusterSnapshotsMessage"
