          description: 'The status of the Amazon Redshift event notification subscription. Constraints: Can be one of the following: active | no-permission | topic-not-exist The status "no-permission" indicates that Amazon Redshift no longer has permission to post to the Amazon SNS topic. The status "topic-not-exist" indicates that the topic was deleted after the subscription was created.'
        SubscriptionCreationTime:
          type: string
          description: The date and time the Amazon Redshift event notification subscription was created.
