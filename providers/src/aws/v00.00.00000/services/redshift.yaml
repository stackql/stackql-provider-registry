      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AuthorizeEndpointAccessMessage"
  /?Action=AuthorizeSnapshotAccess&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AuthorizeSnapshotAccess
      description: Authorizes the specified Amazon Web Services account to restore the specified snapshot. For more information about working with snapshots, go to Amazon Redshift Snapshots in the Amazon Redshift Cluster Management Guide.
      parameters:
        - name: SnapshotIdentifier
          in: query
          required: false
          description: The identifier of the snapshot the account is authorized to restore.
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the snapshot to authorize access to.
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotClusterIdentifier
          in: query
          required: false
          description: The identifier of the cluster the snapshot was created from. If the snapshot to access doesn't exist and the associated IAM policy doesn't allow access to all (*) snapshots - This parameter is required. Otherwise, permissions aren't available to check if the snapshot exists. If the snapshot to access exists - This parameter isn't required. Redshift can retrieve the cluster identifier and use it to validate snapshot authorization.
          schema:
            $ref: "#/components/schemas/String"
        - name: AccountWithRestoreAccess
          in: query
          required: true
          description: The identifier of the Amazon Web Services account authorized to restore the specified snapshot. To share a snapshot with Amazon Web Services Support, specify amazon-redshift-support.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeSnapshotAccessOutputDisplay"
    post:
      operationId: POST_AuthorizeSnapshotAccess
      description: Authorizes the specified Amazon Web Services account to restore the specified snapshot. For more information about working with snapshots, go to Amazon Redshift Snapshots in the Amazon Redshift Cluster Management Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeSnapshotAccessOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AuthorizeSnapshotAccessMessage"
