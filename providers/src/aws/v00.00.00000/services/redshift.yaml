        AllowVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: "If true, major version upgrades can be applied during the maintenance window to the Amazon Redshift engine that is running on the cluster. Default: true"
        ClusterSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the subnet group where you want to cluster restored. A snapshot of cluster in VPC can be restored only in VPC. Therefore, you must provide subnet group name where you want the cluster restored.
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: "If true, the cluster can be accessed from a public network. Default: false"
        OwnerAccount:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account used to create or copy the snapshot. Required if you are restoring a snapshot you do not own, optional if you own the snapshot.
        HsmClientCertificateIdentifier:
          $ref: "#/components/schemas/String"
          description: Specifies the name of the HSM client certificate the Amazon Redshift cluster uses to retrieve the data encryption keys stored in an HSM.
        HsmConfigurationIdentifier:
          $ref: "#/components/schemas/String"
          description: Specifies the name of the HSM configuration that contains the information the Amazon Redshift cluster can use to retrieve and store keys in an HSM.
        ElasticIp:
          $ref: "#/components/schemas/String"
          description: The Elastic IP (EIP) address for the cluster. Don't specify the Elastic IP address for a publicly accessible cluster with availability zone relocation turned on.
        ClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the parameter group to be associated with this cluster. Default: The default Amazon Redshift cluster parameter group. For information about the default parameter group, go to Working with Amazon Redshift Parameter Groups. Constraints: Must be 1 to 255 alphanumeric characters or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens."
        ClusterSecurityGroups:
          $ref: "#/components/schemas/ClusterSecurityGroupNameList"
          description: "A list of security groups to be associated with this cluster. Default: The default cluster security group for Amazon Redshift. Cluster security groups only apply to clusters outside of VPCs."
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: "A list of Virtual Private Cloud (VPC) security groups to be associated with the cluster. Default: The default VPC security group is associated with the cluster. VPC security groups only apply to clusters in VPCs."
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range (in UTC) during which automated cluster maintenance can occur. Format: ddd:hh24:mi-ddd:hh24:mi Default: The value selected for the cluster from which the snapshot was taken. For more information about the time blocks for each region, see Maintenance Windows in Amazon Redshift Cluster Management Guide. Valid Days: Mon | Tue | Wed | Thu | Fri | Sat | Sun Constraints: Minimum 30-minute window."
        AutomatedSnapshotRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days that automated snapshots are retained. If the value is 0, automated snapshots are disabled. Even if automated snapshots are disabled, you can still create manual snapshots when you want with CreateClusterSnapshot. You can't disable automated snapshots for RG or RA3 node types. Set the automated retention period from 1-35 days. Default: The value selected for the cluster from which the snapshot was taken. Constraints: Must be a value from 0 to 35."
        ManualSnapshotRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: The default number of days to retain a manual snapshot. If the value is -1, the snapshot is retained indefinitely. This setting doesn't change the retention period of existing snapshots. The value must be either -1 or an integer between 1 and 3,653.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Key Management Service (KMS) key ID of the encryption key that encrypts data in the cluster restored from a shared snapshot. You can also provide the key ID when you restore from an unencrypted snapshot to an encrypted cluster in the same account. Additionally, you can specify a new KMS key ID when you restore from an encrypted snapshot in the same account in order to change it. In that case, the restored cluster is encrypted with the new KMS key ID.
        NodeType:
          $ref: "#/components/schemas/String"
          description: The node type that the restored cluster will be provisioned with. If you have a DC instance type, you must restore into that same instance type and size. In other words, you can only restore a dc2.large node type into another dc2 type. For more information about node types, see About Clusters and Nodes in the Amazon Redshift Cluster Management Guide.
        EnhancedVpcRouting:
          $ref: "#/components/schemas/BooleanOptional"
          description: "An option that specifies whether to create the cluster with enhanced VPC routing enabled. To create a cluster that uses enhanced VPC routing, the cluster must be in a VPC. For more information, see Enhanced VPC Routing in the Amazon Redshift Cluster Management Guide. If this option is true, enhanced VPC routing is enabled. Default: false"
        AdditionalInfo:
          $ref: "#/components/schemas/String"
          description: Reserved.
        IamRoles:
          $ref: "#/components/schemas/IamRoleArnList"
          description: A list of Identity and Access Management (IAM) roles that can be used by the cluster to access other Amazon Web Services services. You must supply the IAM roles in their Amazon Resource Name (ARN) format. The maximum number of IAM roles that you can associate is subject to a quota. For more information, go to Quotas and limits in the Amazon Redshift Cluster Management Guide.
        MaintenanceTrackName:
          $ref: "#/components/schemas/String"
          description: The name of the maintenance track for the restored cluster. When you take a snapshot, the snapshot inherits the MaintenanceTrack value from the cluster. The snapshot might be on a different track than the cluster that was the source for the snapshot. For example, suppose that you take a snapshot of a cluster that is on the current track and then change the cluster to be on the trailing track. In this case, the snapshot and the source cluster are on different tracks.
        SnapshotScheduleIdentifier:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the snapshot schedule.
        NumberOfNodes:
          $ref: "#/components/schemas/IntegerOptional"
          description: The number of nodes specified when provisioning the restored cluster.
        AvailabilityZoneRelocation:
          $ref: "#/components/schemas/BooleanOptional"
          description: The option to enable relocation for an Amazon Redshift cluster between Availability Zones after the cluster is restored.
        AquaConfigurationStatus:
          $ref: "#/components/schemas/AquaConfigurationStatus"
          description: This parameter is retired. It does not set the AQUA configuration status. Amazon Redshift automatically determines whether to use AQUA (Advanced Query Accelerator).
        DefaultIamRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the IAM role that was set as default for the cluster when the cluster was last modified while it was restored from a snapshot.
        ReservedNodeId:
          $ref: "#/components/schemas/String"
          description: The identifier of the target reserved node offering.
        TargetReservedNodeOfferingId:
          $ref: "#/components/schemas/String"
          description: The identifier of the target reserved node offering.
        Encrypted:
          $ref: "#/components/schemas/BooleanOptional"
          description: Enables support for restoring an unencrypted snapshot to a cluster encrypted with Key Management Service (KMS) and a customer managed key.
        ManageMasterPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: If true, Amazon Redshift uses Secrets Manager to manage the restored cluster's admin credentials. If ManageMasterPassword is false or not set, Amazon Redshift uses the admin credentials the cluster had at the time the snapshot was taken.
        MasterPasswordSecretKmsKeyId:
          $ref: "#/components/schemas/String"
          description: The ID of the Key Management Service (KMS) key used to encrypt and store the cluster's admin credentials secret. You can only use this parameter if ManageMasterPassword is true.
        IpAddressType:
          $ref: "#/components/schemas/String"
          description: The IP address type for the cluster. Possible values are ipv4 and dualstack.
        MultiAZ:
          $ref: "#/components/schemas/BooleanOptional"
          description: If true, the snapshot will be restored to a cluster deployed in two Availability Zones.
        CatalogName:
          $ref: "#/components/schemas/CatalogNameString"
          description: "The name of the Glue Data Catalog that will be associated with the cluster enabled with Amazon Redshift federated permissions. Constraints: Must contain at least one lowercase letter. Can only contain lowercase letters (a-z), numbers (0-9), underscores (_), and hyphens (-). Pattern: ^[a-z0-9_-]*[a-z]+[a-z0-9_-]*$ Example: my-catalog_01"
        RedshiftIdcApplicationArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM Identity Center application used for enabling Amazon Web Services IAM Identity Center trusted identity propagation on a cluster enabled with Amazon Redshift federated permissions.
      required:
        - ClusterIdentifier
    RestoreTableFromClusterSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/TableRestoreStatusDisplay"
    RestoreTableFromClusterSnapshotMessage:
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the Amazon Redshift cluster to restore the table to.
        SnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the snapshot to restore the table from. This snapshot must have been created from the Amazon Redshift cluster specified by the ClusterIdentifier parameter.
        SourceDatabaseName:
          $ref: "#/components/schemas/String"
          description: The name of the source database that contains the table to restore from.
        SourceSchemaName:
          $ref: "#/components/schemas/String"
          description: The name of the source schema that contains the table to restore from. If you do not specify a SourceSchemaName value, the default is public.
        SourceTableName:
          $ref: "#/components/schemas/String"
          description: The name of the source table to restore from.
        TargetDatabaseName:
          $ref: "#/components/schemas/String"
          description: The name of the database to restore the table to.
        TargetSchemaName:
          $ref: "#/components/schemas/String"
          description: The name of the schema to restore the table to.
        NewTableName:
          $ref: "#/components/schemas/String"
          description: The name of the table to create as a result of the current request.
        EnableCaseSensitiveIdentifier:
          $ref: "#/components/schemas/BooleanOptional"
          description: Indicates whether name identifiers for database, schema, and table are case sensitive. If true, the names are case sensitive. If false (default), the names are not case sensitive.
      required:
        - ClusterIdentifier
        - SnapshotIdentifier
        - SourceDatabaseName
        - SourceTableName
        - NewTableName
    ResumeClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ClusterDisplay"
    RevokeClusterSecurityGroupIngressOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ClusterSecurityGroupDisplay"
    RevokeClusterSecurityGroupIngressMessage:
      type: object
      properties:
        ClusterSecurityGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the security Group from which to revoke the ingress rule.
        CIDRIP:
          $ref: "#/components/schemas/String"
          description: The IP range for which to revoke access. This range must be a valid Classless Inter-Domain Routing (CIDR) block of IP addresses. If CIDRIP is specified, EC2SecurityGroupName and EC2SecurityGroupOwnerId cannot be provided.
        EC2SecurityGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the EC2 Security Group whose access is to be revoked. If EC2SecurityGroupName is specified, EC2SecurityGroupOwnerId must also be provided and CIDRIP cannot be provided.
        EC2SecurityGroupOwnerId:
          $ref: "#/components/schemas/String"
          description: "The Amazon Web Services account number of the owner of the security group specified in the EC2SecurityGroupName parameter. The Amazon Web Services access key ID is not an acceptable value. If EC2SecurityGroupOwnerId is specified, EC2SecurityGroupName must also be provided. and CIDRIP cannot be provided. Example: 111122223333"
      required:
        - ClusterSecurityGroupName
    RevokeEndpointAccessOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/EndpointAuthorizationDisplay"
    RevokeEndpointAccessMessage:
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The cluster to revoke access from.
        Account:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account ID whose access is to be revoked.
        VpcIds:
          $ref: "#/components/schemas/VpcIdentifierList"
          description: The virtual private cloud (VPC) identifiers for which access is to be revoked.
        Force:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether to force the revoke action. If true, the Redshift-managed VPC endpoints associated with the endpoint authorization are also deleted.
    RevokeSnapshotAccessOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SnapshotDisplay"
    RevokeSnapshotAccessMessage:
      type: object
      properties:
        SnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the snapshot that the account can no longer access.
        SnapshotArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the snapshot associated with the message to revoke access.
        SnapshotClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the cluster the snapshot was created from. This parameter is required if your IAM user has a policy containing a snapshot resource element that specifies anything other than * for the cluster name.
        AccountWithRestoreAccess:
          $ref: "#/components/schemas/String"
          description: The identifier of the Amazon Web Services account that can no longer restore the specified snapshot.
      required:
        - AccountWithRestoreAccess
    RotateEncryptionKeyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ClusterDisplay"
    RotateEncryptionKeyMessage:
      type: object
      properties:
        ClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The unique identifier of the cluster that you want to rotate the encryption keys for. Constraints: Must be the name of valid cluster that has encryption enabled."
      required:
