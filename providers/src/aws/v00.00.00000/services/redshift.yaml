        Severity:
          type: string
          description: "The event severity specified in the Amazon Redshift event notification subscription. Values: ERROR, INFO"
        Enabled:
          type: boolean
          description: A boolean value indicating whether the subscription is enabled; true indicates that the subscription is enabled.
        Tags:
          type: string
          description: The list of tags for the event subscription.
    CreateEventSubscriptionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
