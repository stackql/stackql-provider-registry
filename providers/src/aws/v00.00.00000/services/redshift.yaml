openapi: 3.0.0
info:
  version: "2012-12-01"
  title: Amazon Redshift
  description: Amazon Redshift
  x-serviceName: redshift
  x-serviceAlias: redshift
  x-protocol: query
  x-apiVersion: "2012-12-01"
  x-endpointPrefix: redshift
servers:
  - url: https://redshift.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for redshift
paths:
  /?Action=AcceptReservedNodeExchange&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AcceptReservedNodeExchange
      description: Exchanges a DC1 Reserved Node for a DC2 Reserved Node with no changes to the configuration (term, payment type, or number of nodes) and no additional costs.
      parameters:
        - name: ReservedNodeId
          in: query
          required: true
          description: A string representing the node identifier of the DC1 Reserved Node to be exchanged.
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetReservedNodeOfferingId
          in: query
          required: true
          description: The unique identifier of the DC2 Reserved Node offering to be used for the exchange. You can obtain the value for the parameter by calling GetReservedNodeExchangeOfferings
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AcceptReservedNodeExchangeOutputDisplay"
    post:
      operationId: POST_AcceptReservedNodeExchange
      description: Exchanges a DC1 Reserved Node for a DC2 Reserved Node with no changes to the configuration (term, payment type, or number of nodes) and no additional costs.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AcceptReservedNodeExchangeOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AcceptReservedNodeExchangeInputMessage"
  /?Action=AddPartner&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddPartner
      description: Adds a partner integration to a cluster. This operation authorizes a partner to push status updates for the specified database. To complete the integration, you also set up the integration on the partner website.
      parameters:
        - name: AccountId
          in: query
          required: true
          description: The Amazon Web Services account ID that owns the cluster.
          schema:
            $ref: "#/components/schemas/PartnerIntegrationAccountId"
        - name: ClusterIdentifier
          in: query
          required: true
          description: The cluster identifier of the cluster that receives data from the partner.
          schema:
            $ref: "#/components/schemas/PartnerIntegrationClusterIdentifier"
        - name: DatabaseName
          in: query
          required: true
          description: The name of the database that receives data from the partner.
          schema:
            $ref: "#/components/schemas/PartnerIntegrationDatabaseName"
        - name: PartnerName
          in: query
          required: true
          description: The name of the partner that is authorized to send data.
          schema:
            $ref: "#/components/schemas/PartnerIntegrationPartnerName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddPartnerOutputDisplay"
    post:
      operationId: POST_AddPartner
      description: Adds a partner integration to a cluster. This operation authorizes a partner to push status updates for the specified database. To complete the integration, you also set up the integration on the partner website.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddPartnerOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/PartnerIntegrationInputMessage"
  /?Action=AssociateDataShareConsumer&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AssociateDataShareConsumer
      description: From a datashare consumer account, associates a datashare with the account (AssociateEntireAccount) or the specified namespace (ConsumerArn). If you make this association, the consumer can consume the datashare.
      parameters:
        - name: DataShareArn
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the datashare that the consumer is to use.
          schema:
            $ref: "#/components/schemas/String"
        - name: AssociateEntireAccount
          in: query
          required: false
          description: A value that specifies whether the datashare is associated with the entire account.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ConsumerArn
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the consumer namespace associated with the datashare.
          schema:
            $ref: "#/components/schemas/String"
        - name: ConsumerRegion
          in: query
          required: false
          description: From a datashare consumer account, associates a datashare with all existing and future namespaces in the specified Amazon Web Services Region.
          schema:
            $ref: "#/components/schemas/String"
        - name: AllowWrites
          in: query
          required: false
          description: If set to true, allows write operations for a datashare.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AssociateDataShareConsumerOutputDisplay"
    post:
      operationId: POST_AssociateDataShareConsumer
      description: From a datashare consumer account, associates a datashare with the account (AssociateEntireAccount) or the specified namespace (ConsumerArn). If you make this association, the consumer can consume the datashare.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AssociateDataShareConsumerOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AssociateDataShareConsumerMessage"
  /?Action=AuthorizeClusterSecurityGroupIngress&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AuthorizeClusterSecurityGroupIngress
      description: Adds an inbound (ingress) rule to an Amazon Redshift security group. Depending on whether the application accessing your cluster is running on the Internet or an Amazon EC2 instance, you can authorize inbound access to either a Classless Interdomain Routing (CIDR)/Internet Protocol (IP) range or to an Amazon EC2 security group. You can add as many as 20 ingress rules to an Amazon Redshift security group. If you authorize access to an Amazon EC2 security group, specify EC2SecurityGroupName and EC2SecurityGroupOwnerId. The Amazon EC2 security group and Amazon Redshift cluster must be in the same Amazon Web Services Region. If you authorize access to a CIDR/IP address range, specify CIDRIP. For an overview of CIDR blocks, see the Wikipedia article on Classless Inter-Domain Routing. You must also associate the security group with a cluster so that clients running on these IP addresses or the EC2 instance are authorized to connect to the cluster. For information about managing security groups, go to Working with Security Groups in the Amazon Redshift Cluster Management Guide.
      parameters:
        - name: ClusterSecurityGroupName
          in: query
          required: true
          description: The name of the security group to which the ingress rule is added.
          schema:
            $ref: "#/components/schemas/String"
        - name: CIDRIP
          in: query
          required: false
          description: The IP range to be added the Amazon Redshift security group.
          schema:
            $ref: "#/components/schemas/String"
        - name: EC2SecurityGroupName
          in: query
          required: false
          description: The EC2 security group to be added the Amazon Redshift security group.
          schema:
            $ref: "#/components/schemas/String"
        - name: EC2SecurityGroupOwnerId
          in: query
          required: false
          description: "The Amazon Web Services account number of the owner of the security group specified by the EC2SecurityGroupName parameter. The Amazon Web Services Access Key ID is not an acceptable value. Example: 111122223333"
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeClusterSecurityGroupIngressOutputDisplay"
    post:
      operationId: POST_AuthorizeClusterSecurityGroupIngress
      description: Adds an inbound (ingress) rule to an Amazon Redshift security group. Depending on whether the application accessing your cluster is running on the Internet or an Amazon EC2 instance, you can authorize inbound access to either a Classless Interdomain Routing (CIDR)/Internet Protocol (IP) range or to an Amazon EC2 security group. You can add as many as 20 ingress rules to an Amazon Redshift security group. If you authorize access to an Amazon EC2 security group, specify EC2SecurityGroupName and EC2SecurityGroupOwnerId. The Amazon EC2 security group and Amazon Redshift cluster must be in the same Amazon Web Services Region. If you authorize access to a CIDR/IP address range, specify CIDRIP. For an overview of CIDR blocks, see the Wikipedia article on Classless Inter-Domain Routing. You must also associate the security group with a cluster so that clients running on these IP addresses or the EC2 instance are authorized to connect to the cluster. For information about managing security groups, go to Working with Security Groups in the Amazon Redshift Cluster Management Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeClusterSecurityGroupIngressOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AuthorizeClusterSecurityGroupIngressMessage"
  /?Action=AuthorizeDataShare&Version=2012-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AuthorizeDataShare
      description: From a data producer account, authorizes the sharing of a datashare with one or more consumer accounts or managing entities. To authorize a datashare for a data consumer, the producer account must have the correct access permissions.
      parameters:
        - name: DataShareArn
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the datashare namespace that producers are to authorize sharing for.
          schema:
            $ref: "#/components/schemas/String"
        - name: ConsumerIdentifier
          in: query
          required: true
          description: The identifier of the data consumer that is authorized to access the datashare. This identifier is an Amazon Web Services account ID or a keyword, such as ADX.
          schema:
            $ref: "#/components/schemas/String"
        - name: AllowWrites
          in: query
          required: false
          description: If set to true, allows write operations for a datashare.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeDataShareOutputDisplay"
    post:
      operationId: POST_AuthorizeDataShare
      description: From a data producer account, authorizes the sharing of a datashare with one or more consumer accounts or managing entities. To authorize a datashare for a data consumer, the producer account must have the correct access permissions.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AuthorizeDataShareOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AuthorizeDataShareMessage"
  /?Action=AuthorizeEndpointAccess&Version=2012-12-01:
