    ReservedNodeDisplay:
      type: object
      properties:
        ReservedNodeId:
          type: string
          description: The unique identifier for the reservation.
        ReservedNodeOfferingId:
          type: string
          description: The identifier for the reserved node offering.
        NodeType:
          type: string
          description: The node type of the reserved node.
        StartTime:
          type: string
          description: The time the reservation started. You purchase a reserved node offering for a duration. This is the start time of that duration.
        Duration:
          type: integer
          description: The duration of the node reservation in seconds.
        FixedPrice:
          type: number
          description: The fixed cost Amazon Redshift charges you for this reserved node.
        UsagePrice:
          type: number
          description: The hourly rate Amazon Redshift charges you for this reserved node.
        CurrencyCode:
          type: string
          description: The currency code for the reserved cluster.
        NodeCount:
          type: integer
          description: The number of reserved compute nodes.
        State:
          type: string
          description: "The state of the reserved compute node. Possible Values: pending-payment-This reserved node has recently been purchased, and the sale has been approved, but payment has not yet been confirmed. active-This reserved node is owned by the caller and is available for use. payment-failed-Payment failed for the purchase attempt. retired-The reserved node is no longer available. exchanging-The owner is exchanging the reserved node for another reserved node."
        OfferingType:
          type: string
          description: The anticipated utilization of the reserved node, as defined in the reserved node offering.
        RecurringCharges:
          type: string
          description: The recurring charges for the reserved node.
        ReservedNodeOfferingType:
          type: string
