components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    JobId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    DescribeEntitiesDetectionV2JobResponse:
      type: object
      properties:
        ComprehendMedicalAsyncJobProperties:
          $ref: "#/components/schemas/ComprehendMedicalAsyncJobProperties"
          description: An object that contains the properties associated with a detection job.
    ComprehendMedicalAsyncJobProperties:
      description: Provides information about a detection job.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The identifier assigned to the detection job.
        JobName:
          $ref: "#/components/schemas/JobName"
          description: The name that you assigned to the detection job.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The current status of the detection job. If the status is FAILED, the Message field shows the reason for the failure.
        Message:
          $ref: "#/components/schemas/AnyLengthString"
          description: A description of the status of a job.
        SubmitTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the detection job was submitted for processing.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the detection job completed.
        ExpirationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that job metadata is deleted from the server. Output files in your S3 bucket will not be deleted. After the metadata is deleted, the job will no longer appear in the results of the ListEntitiesDetectionV2Job or the ListPHIDetectionJobs operation.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: The input data configuration that you supplied when you created the detection job.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: The output data configuration that you supplied when you created the detection job.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code of the input documents.
        DataAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) that gives Amazon Comprehend Medical read access to your input data.
        ManifestFilePath:
          $ref: "#/components/schemas/ManifestFilePath"
          description: The path to the file that describes the results of a batch job.
        KMSKey:
          $ref: "#/components/schemas/KMSKey"
          description: The AWS Key Management Service key, if any, used to encrypt the output files.
        ModelVersion:
          $ref: "#/components/schemas/ModelVersion"
          description: The version of the model used to analyze the documents. The version number looks like X.X.X. You can use this information to track the model used for a particular batch of documents.
    JobName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    JobStatus:
      type: string
      enum:
        - SUBMITTED
        - IN_PROGRESS
        - COMPLETED
        - PARTIAL_SUCCESS
        - FAILED
        - STOP_REQUESTED
        - STOPPED
    AnyLengthString:
      type: string
    Timestamp:
      type: string
      format: date-time
    InputDataConfig:
      description: The input properties for an entities detection job. This includes the name of the S3 bucket and the path to the files to be analyzed.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The URI of the S3 bucket that contains the input data. The bucket must be in the same region as the API endpoint that you are calling.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: The path to the input data files in the S3 bucket.
      required:
        - S3Bucket
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[0-9a-z\.\-_]*(?!\.)$
    S3Key:
      type: string
      maxLength: 1024
      pattern: .*
    OutputDataConfig:
      description: The output properties for a detection job.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: When you use the OutputDataConfig object with asynchronous operations, you specify the Amazon S3 location where you want to write the output data. The URI must be in the same region as the API endpoint that you are calling. The location is used as the prefix for the actual location of the output.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: The path to the output data files in the S3 bucket. Amazon Comprehend Medical creates an output directory using the job ID so that the output from one job does not overwrite the output of another.
      required:
        - S3Bucket
    LanguageCode:
      type: string
      enum:
        - en
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    ManifestFilePath:
      type: string
      minLength: 1
      maxLength: 4096
    KMSKey:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*
    ModelVersion:
      type: string
    DescribeICD10CMInferenceJobResponse:
      type: object
      properties:
        ComprehendMedicalAsyncJobProperties:
          $ref: "#/components/schemas/ComprehendMedicalAsyncJobProperties"
          description: An object that contains the properties associated with a detection job.
    DescribePHIDetectionJobResponse:
      type: object
      properties:
        ComprehendMedicalAsyncJobProperties:
          $ref: "#/components/schemas/ComprehendMedicalAsyncJobProperties"
          description: An object that contains the properties associated with a detection job.
    DescribeRxNormInferenceJobResponse:
      type: object
      properties:
        ComprehendMedicalAsyncJobProperties:
          $ref: "#/components/schemas/ComprehendMedicalAsyncJobProperties"
          description: An object that contains the properties associated with a detection job.
    DescribeSNOMEDCTInferenceJobResponse:
      type: object
      properties:
        ComprehendMedicalAsyncJobProperties:
          $ref: "#/components/schemas/ComprehendMedicalAsyncJobProperties"
    BoundedLengthString:
      type: string
      minLength: 1
      maxLength: 20000
    DetectEntitiesResponse:
      type: object
      properties:
        Entities:
          $ref: "#/components/schemas/EntityList"
          description: The collection of medical entities extracted from the input text and their associated information. For each entity, the response provides the entity text, the entity category, where the entity text begins and ends, and the level of confidence that Amazon Comprehend Medical has in the detection and analysis. Attributes and traits of the entity are also returned.
        UnmappedAttributes:
          $ref: "#/components/schemas/UnmappedAttributeList"
          description: Attributes extracted from the input text that we were unable to relate to an entity.
        PaginationToken:
          $ref: "#/components/schemas/String"
          description: If the result of the previous request to DetectEntities was truncated, include the PaginationToken to fetch the next page of entities.
        ModelVersion:
          $ref: "#/components/schemas/String"
          description: The version of the model used to analyze the documents. The version number looks like X.X.X. You can use this information to track the model used for a particular batch of documents.
      required:
        - Entities
        - ModelVersion
    EntityList:
      type: array
      items:
        $ref: "#/components/schemas/Entity"
    Entity:
      description: Provides information about an extracted medical entity.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Integer"
          description: The numeric identifier for the entity. This is a monotonically increasing id unique within this response rather than a global unique identifier.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The 0-based character offset in the input text that shows where the entity begins. The offset returns the UTF-8 code point in the string.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The 0-based character offset in the input text that shows where the entity ends. The offset returns the UTF-8 code point in the string.
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend Medical has in the accuracy of the detection.
        Text:
          $ref: "#/components/schemas/String"
          description: The segment of input text extracted as this entity.
        Category:
          $ref: "#/components/schemas/EntityType"
          description: The category of the entity.
        Type:
          $ref: "#/components/schemas/EntitySubType"
          description: Describes the specific type of entity with category of entities.
        Traits:
          $ref: "#/components/schemas/TraitList"
          description: Contextual information for the entity.
        Attributes:
          $ref: "#/components/schemas/AttributeList"
          description: The extracted attributes that relate to this entity.
    Integer:
      type: integer
    Float:
      type: number
      format: float
    String:
      type: string
      minLength: 1
    EntityType:
      type: string
      enum:
        - MEDICATION
        - MEDICAL_CONDITION
        - PROTECTED_HEALTH_INFORMATION
        - TEST_TREATMENT_PROCEDURE
        - ANATOMY
        - TIME_EXPRESSION
        - BEHAVIORAL_ENVIRONMENTAL_SOCIAL
    EntitySubType:
      type: string
      enum:
        - NAME
        - DX_NAME
        - DOSAGE
        - ROUTE_OR_MODE
        - FORM
        - FREQUENCY
        - DURATION
        - GENERIC_NAME
        - BRAND_NAME
        - STRENGTH
        - RATE
        - ACUITY
        - TEST_NAME
        - TEST_VALUE
        - TEST_UNITS
        - TEST_UNIT
        - PROCEDURE_NAME
        - TREATMENT_NAME
        - DATE
        - AGE
        - CONTACT_POINT
        - PHONE_OR_FAX
        - EMAIL
        - IDENTIFIER
        - ID
        - URL
        - ADDRESS
        - PROFESSION
        - SYSTEM_ORGAN_SITE
        - DIRECTION
        - QUALITY
        - QUANTITY
        - TIME_EXPRESSION
        - TIME_TO_MEDICATION_NAME
        - TIME_TO_DX_NAME
        - TIME_TO_TEST_NAME
        - TIME_TO_PROCEDURE_NAME
        - TIME_TO_TREATMENT_NAME
        - AMOUNT
        - GENDER
        - RACE_ETHNICITY
        - ALLERGIES
        - TOBACCO_USE
        - ALCOHOL_CONSUMPTION
        - REC_DRUG_USE
    TraitList:
      type: array
      items:
        $ref: "#/components/schemas/Trait"
    Trait:
      description: Provides contextual information about the extracted entity.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/AttributeName"
          description: Provides a name or contextual description about the trait.
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend Medical has in the accuracy of this trait.
    AttributeName:
      type: string
      enum:
        - SIGN
        - SYMPTOM
        - DIAGNOSIS
        - NEGATION
        - PERTAINS_TO_FAMILY
        - HYPOTHETICAL
        - LOW_CONFIDENCE
        - PAST_HISTORY
        - FUTURE
    AttributeList:
      type: array
      items:
        $ref: "#/components/schemas/Attribute"
    Attribute:
      description: An extracted segment of the text that is an attribute of an entity, or otherwise related to an entity, such as the dosage of a medication taken. It contains information about the attribute such as id, begin and end offset within the input text, and the segment of the input text.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EntitySubType"
          description: The type of attribute.
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend Medical has that the segment of text is correctly recognized as an attribute.
        RelationshipScore:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend Medical has that this attribute is correctly related to this entity.
        RelationshipType:
          $ref: "#/components/schemas/RelationshipType"
          description: The type of relationship between the entity and attribute. Type for the relationship is OVERLAP, indicating that the entity occurred at the same time as the Date_Expression.
        Id:
          $ref: "#/components/schemas/Integer"
          description: The numeric identifier for this attribute. This is a monotonically increasing id unique within this response rather than a global unique identifier.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The 0-based character offset in the input text that shows where the attribute begins. The offset returns the UTF-8 code point in the string.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The 0-based character offset in the input text that shows where the attribute ends. The offset returns the UTF-8 code point in the string.
        Text:
          $ref: "#/components/schemas/String"
          description: The segment of input text extracted as this attribute.
        Category:
          $ref: "#/components/schemas/EntityType"
          description: The category of attribute.
        Traits:
          $ref: "#/components/schemas/TraitList"
          description: Contextual information for this attribute.
    RelationshipType:
      type: string
      enum:
        - EVERY
        - WITH_DOSAGE
        - ADMINISTERED_VIA
        - FOR
        - NEGATIVE
        - OVERLAP
        - DOSAGE
        - ROUTE_OR_MODE
        - FORM
        - FREQUENCY
        - DURATION
        - STRENGTH
        - RATE
        - ACUITY
        - TEST_VALUE
        - TEST_UNITS
        - TEST_UNIT
        - DIRECTION
        - SYSTEM_ORGAN_SITE
        - AMOUNT
        - USAGE
        - QUALITY
    UnmappedAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/UnmappedAttribute"
    UnmappedAttribute:
      description: An attribute that was extracted, but Amazon Comprehend Medical was unable to relate to an entity.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EntityType"
          description: 'The type of the unmapped attribute, could be one of the following values: "MEDICATION", "MEDICAL_CONDITION", "ANATOMY", "TEST_AND_TREATMENT_PROCEDURE" or "PROTECTED_HEALTH_INFORMATION".'
        Attribute:
          $ref: "#/components/schemas/Attribute"
          description: The specific attribute that has been extracted but not mapped to an entity.
    DetectEntitiesV2Response:
      type: object
      properties:
        Entities:
          $ref: "#/components/schemas/EntityList"
          description: The collection of medical entities extracted from the input text and their associated information. For each entity, the response provides the entity text, the entity category, where the entity text begins and ends, and the level of confidence in the detection and analysis. Attributes and traits of the entity are also returned.
        UnmappedAttributes:
          $ref: "#/components/schemas/UnmappedAttributeList"
          description: Attributes extracted from the input text that couldn't be related to an entity.
        PaginationToken:
          $ref: "#/components/schemas/String"
          description: If the result to the DetectEntitiesV2 operation was truncated, include the PaginationToken to fetch the next page of entities.
        ModelVersion:
          $ref: "#/components/schemas/String"
          description: The version of the model used to analyze the documents. The version number looks like X.X.X. You can use this information to track the model used for a particular batch of documents.
      required:
        - Entities
        - ModelVersion
    DetectPHIResponse:
      type: object
      properties:
        Entities:
          $ref: "#/components/schemas/EntityList"
          description: The collection of PHI entities extracted from the input text and their associated information. For each entity, the response provides the entity text, the entity category, where the entity text begins and ends, and the level of confidence that Amazon Comprehend Medical has in its detection.
        PaginationToken:
          $ref: "#/components/schemas/String"
          description: If the result of the previous request to DetectPHI was truncated, include the PaginationToken to fetch the next page of PHI entities.
        ModelVersion:
          $ref: "#/components/schemas/String"
          description: The version of the model used to analyze the documents. The version number looks like X.X.X. You can use this information to track the model used for a particular batch of documents.
      required:
        - Entities
        - ModelVersion
    OntologyLinkingBoundedLengthString:
      type: string
      minLength: 1
      maxLength: 10000
    InferICD10CMResponse:
      type: object
      properties:
        Entities:
          $ref: "#/components/schemas/ICD10CMEntityList"
          description: The medical conditions detected in the text linked to ICD-10-CM concepts. If the action is successful, the service sends back an HTTP 200 response, as well as the entities detected.
        PaginationToken:
          $ref: "#/components/schemas/String"
          description: If the result of the previous request to InferICD10CM was truncated, include the PaginationToken to fetch the next page of medical condition entities.
        ModelVersion:
          $ref: "#/components/schemas/String"
          description: The version of the model used to analyze the documents, in the format n.n.n You can use this information to track the model used for a particular batch of documents.
      required:
        - Entities
    ICD10CMEntityList:
      type: array
      items:
        $ref: "#/components/schemas/ICD10CMEntity"
    ICD10CMEntity:
      description: The collection of medical entities extracted from the input text and their associated information. For each entity, the response provides the entity text, the entity category, where the entity text begins and ends, and the level of confidence that Amazon Comprehend Medical has in the detection and analysis. Attributes and traits of the entity are also returned.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Integer"
          description: The numeric identifier for the entity. This is a monotonically increasing id unique within this response rather than a global unique identifier.
        Text:
          $ref: "#/components/schemas/OntologyLinkingBoundedLengthString"
          description: The segment of input text that is matched to the detected entity.
        Category:
          $ref: "#/components/schemas/ICD10CMEntityCategory"
          description: The category of the entity. InferICD10CM detects entities in the MEDICAL_CONDITION category.
        Type:
          $ref: "#/components/schemas/ICD10CMEntityType"
          description: Describes the specific type of entity with category of entities. InferICD10CM detects entities of the type DX_NAME and TIME_EXPRESSION.
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend Medical has in the accuracy of the detection.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The 0-based character offset in the input text that shows where the entity begins. The offset returns the UTF-8 code point in the string.
