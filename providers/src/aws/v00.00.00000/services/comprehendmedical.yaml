openapi: 3.0.0
info:
  version: "2018-10-30"
  title: AWS Comprehend Medical
  description: AWS Comprehend Medical
  x-serviceName: comprehendmedical
  x-serviceAlias: comprehendmedical
  x-protocol: json
  x-apiVersion: "2018-10-30"
  x-endpointPrefix: comprehendmedical
  x-targetPrefix: ComprehendMedical_20181030
  x-jsonVersion: "1.1"
servers:
  - url: https://comprehendmedical.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for comprehendmedical
paths:
  /DescribeEntitiesDetectionV2Job:
    post:
      operationId: DescribeEntitiesDetectionV2Job
      description: Gets the properties associated with a medical entities detection job. Use this operation to get the status of a detection job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComprehendMedical_20181030.DescribeEntitiesDetectionV2Job
            default: ComprehendMedical_20181030.DescribeEntitiesDetectionV2Job
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The identifier that Amazon Comprehend Medical generated for the job. The StartEntitiesDetectionV2Job operation returns this identifier in its response.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEntitiesDetectionV2JobResponse"
  /DescribeICD10CMInferenceJob:
    post:
      operationId: DescribeICD10CMInferenceJob
      description: Gets the properties associated with an InferICD10CM job. Use this operation to get the status of an inference job.
