      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferSNOMEDCTResponse"
  /ListEntitiesDetectionV2Jobs:
    post:
      operationId: ListEntitiesDetectionV2Jobs
      description: Gets a list of medical entity detection jobs that you have submitted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComprehendMedical_20181030.ListEntitiesDetectionV2Jobs
            default: ComprehendMedical_20181030.ListEntitiesDetectionV2Jobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Filter:
                  $ref: "#/components/schemas/ComprehendMedicalAsyncJobFilter"
                  description: Filters the jobs that are returned. You can filter jobs based on their names, status, or the date and time that they were submitted. You can only set one filter at a time.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: Identifies the next page of results to return.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsInteger"
                  description: The maximum number of results to return in each page. The default is 100.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntitiesDetectionV2JobsResponse"
  /ListICD10CMInferenceJobs:
