  /StartEntitiesDetectionV2Job:
    post:
      operationId: StartEntitiesDetectionV2Job
      description: Starts an asynchronous medical entity detection job for a collection of documents. Use the DescribeEntitiesDetectionV2Job operation to track the status of a job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComprehendMedical_20181030.StartEntitiesDetectionV2Job
            default: ComprehendMedical_20181030.StartEntitiesDetectionV2Job
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InputDataConfig:
                  $ref: "#/components/schemas/InputDataConfig"
                  description: The input configuration that specifies the format and location of the input data for the job.
                OutputDataConfig:
                  $ref: "#/components/schemas/OutputDataConfig"
                  description: The output configuration that specifies where to send the output files.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that grants Amazon Comprehend Medical read access to your input data. For more information, see Role-Based Permissions Required for Asynchronous Operations.
                JobName:
                  $ref: "#/components/schemas/JobName"
                  description: The identifier of the job.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                  description: A unique identifier for the request. If you don't set the client request token, Amazon Comprehend Medical generates one for you.
                KMSKey:
                  $ref: "#/components/schemas/KMSKey"
                  description: An AWS Key Management Service key to encrypt your output files. If you do not specify a key, the files are written in plain text.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. All documents must be in the same language. Amazon Comprehend Medical processes files in US English (en).
              required:
                - InputDataConfig
                - OutputDataConfig
                - DataAccessRoleArn
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEntitiesDetectionV2JobResponse"
  /StartICD10CMInferenceJob:
