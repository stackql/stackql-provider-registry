      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferRxNormResponse"
  /InferSNOMEDCT:
    post:
      operationId: InferSNOMEDCT
      description: InferSNOMEDCT detects possible medical concepts as entities and links them to codes from the Systematized Nomenclature of Medicine, Clinical Terms (SNOMED-CT) ontology
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComprehendMedical_20181030.InferSNOMEDCT
            default: ComprehendMedical_20181030.InferSNOMEDCT
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Text:
                  $ref: "#/components/schemas/OntologyLinkingBoundedLengthString"
                  description: The input text to be analyzed using InferSNOMEDCT.
              required:
