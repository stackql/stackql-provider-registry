openapi: 3.0.0
info:
  version: "2020-05-15"
  title: AWS App Runner
  description: AWS App Runner
  x-serviceName: apprunner
  x-serviceAlias: apprunner
  x-protocol: json
  x-apiVersion: "2020-05-15"
  x-endpointPrefix: apprunner
  x-targetPrefix: AppRunner
  x-jsonVersion: "1.0"
servers:
  - url: https://apprunner.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for apprunner
paths:
  /AssociateCustomDomain:
    post:
      operationId: AssociateCustomDomain
      description: Associate your own domain name with the App Runner subdomain URL of your App Runner service. After you call AssociateCustomDomain and receive a successful response, use the information in the CustomDomain record that's returned to add CNAME records to your Domain Name System (DNS). For each mapped domain name, add a mapping to the target App Runner subdomain and one or more certificate validation records. App Runner then performs DNS validation to verify that you own or control the domain name that you associated. App Runner tracks domain validity in a certificate stored in AWS Certificate Manager (ACM).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.AssociateCustomDomain
            default: AppRunner.AssociateCustomDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ServiceArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner service that you want to associate a custom domain name with.
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: A custom domain endpoint to associate. Specify a root domain (for example, example.com), a subdomain (for example, login.example.com or admin.login.example.com), or a wildcard (for example, *.example.com).
                EnableWWWSubdomain:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: "Set to true to associate the subdomain www.DomainName with the App Runner service in addition to the base domain. Default: true"
              required:
                - ServiceArn
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateCustomDomainResponse"
  /CreateAutoScalingConfiguration:
    post:
      operationId: CreateAutoScalingConfiguration
      description: Create an App Runner automatic scaling configuration resource. App Runner requires this resource when you create or update App Runner services and you require non-default auto scaling settings. You can share an auto scaling configuration across multiple services. Create multiple revisions of a configuration by calling this action multiple times using the same AutoScalingConfigurationName. The call returns incremental AutoScalingConfigurationRevision values. When you create a service and configure an auto scaling configuration resource, the service uses the latest active revision of the auto scaling configuration by default. You can optionally configure the service to use a specific revision. Configure a higher MinSize to increase the spread of your App Runner service over more Availability Zones in the Amazon Web Services Region. The tradeoff is a higher minimal cost. Configure a lower MaxSize to control your cost. The tradeoff is lower responsiveness during peak demand.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.CreateAutoScalingConfiguration
            default: AppRunner.CreateAutoScalingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AutoScalingConfigurationName:
                  $ref: "#/components/schemas/AutoScalingConfigurationName"
                  description: "A name for the auto scaling configuration. When you use it for the first time in an Amazon Web Services Region, App Runner creates revision number 1 of this name. When you use the same name in subsequent calls, App Runner creates incremental revisions of the configuration. Prior to the release of Auto scale configuration enhancements, the name DefaultConfiguration was reserved. This restriction is no longer in place. You can now manage DefaultConfiguration the same way you manage your custom auto scaling configurations. This means you can do the following with the DefaultConfiguration that App Runner provides: Create new revisions of the DefaultConfiguration. Delete the revisions of the DefaultConfiguration. Delete the auto scaling configuration for which the App Runner DefaultConfiguration was created. If you delete the auto scaling configuration you can create another custom auto scaling configuration with the same DefaultConfiguration name. The original DefaultConfiguration resource provided by App Runner remains in your account unless you make changes to it."
                MaxConcurrency:
                  $ref: "#/components/schemas/ASConfigMaxConcurrency"
                  description: "The maximum number of concurrent requests that you want an instance to process. If the number of concurrent requests exceeds this limit, App Runner scales up your service. Default: 100"
                MinSize:
                  $ref: "#/components/schemas/ASConfigMinSize"
                  description: "The minimum number of instances that App Runner provisions for your service. The service always has at least MinSize provisioned instances. Some of them actively serve traffic. The rest of them (provisioned and inactive instances) are a cost-effective compute capacity reserve and are ready to be quickly activated. You pay for memory usage of all the provisioned instances. You pay for CPU usage of only the active subset. App Runner temporarily doubles the number of provisioned instances during deployments, to maintain the same capacity for both old and new code. Default: 1"
                MaxSize:
                  $ref: "#/components/schemas/ASConfigMaxSize"
                  description: "The maximum number of instances that your service scales up to. At most MaxSize instances actively serve traffic for your service. Default: 25"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of metadata items that you can associate with your auto scaling configuration resource. A tag is a key-value pair.
              required:
                - AutoScalingConfigurationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutoScalingConfigurationResponse"
  /CreateConnection:
    post:
      operationId: CreateConnection
      description: Create an App Runner connection resource. App Runner requires a connection resource when you create App Runner services that access private repositories from certain third-party providers. You can share a connection across multiple services. A connection resource is needed to access GitHub and Bitbucket repositories. Both require a user interface approval process through the App Runner console before you can use the connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.CreateConnection
            default: AppRunner.CreateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionName:
                  $ref: "#/components/schemas/ConnectionName"
                  description: A name for the new connection. It must be unique across all App Runner connections for the Amazon Web Services account in the Amazon Web Services Region.
                ProviderType:
                  $ref: "#/components/schemas/ProviderType"
                  description: The source repository provider.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of metadata items that you can associate with your connection resource. A tag is a key-value pair.
              required:
                - ConnectionName
                - ProviderType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionResponse"
  /CreateObservabilityConfiguration:
    post:
      operationId: CreateObservabilityConfiguration
      description: Create an App Runner observability configuration resource. App Runner requires this resource when you create or update App Runner services and you want to enable non-default observability features. You can share an observability configuration across multiple services. Create multiple revisions of a configuration by calling this action multiple times using the same ObservabilityConfigurationName. The call returns incremental ObservabilityConfigurationRevision values. When you create a service and configure an observability configuration resource, the service uses the latest active revision of the observability configuration by default. You can optionally configure the service to use a specific revision. The observability configuration resource is designed to configure multiple features (currently one feature, tracing). This action takes optional parameters that describe the configuration of these features (currently one parameter, TraceConfiguration). If you don't specify a feature parameter, App Runner doesn't enable the feature.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.CreateObservabilityConfiguration
            default: AppRunner.CreateObservabilityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ObservabilityConfigurationName:
                  $ref: "#/components/schemas/ObservabilityConfigurationName"
                  description: A name for the observability configuration. When you use it for the first time in an Amazon Web Services Region, App Runner creates revision number 1 of this name. When you use the same name in subsequent calls, App Runner creates incremental revisions of the configuration. The name DefaultConfiguration is reserved. You can't use it to create a new observability configuration, and you can't create a revision of it. When you want to use your own observability configuration for your App Runner service, create a configuration with a different name, and then provide it when you create or update your service.
                TraceConfiguration:
                  $ref: "#/components/schemas/TraceConfiguration"
                  description: The configuration of the tracing feature within this observability configuration. If you don't specify it, App Runner doesn't enable tracing.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of metadata items that you can associate with your observability configuration resource. A tag is a key-value pair.
              required:
                - ObservabilityConfigurationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateObservabilityConfigurationResponse"
  /CreateService:
    post:
      operationId: CreateService
      description: Create an App Runner service. After the service is created, the action also automatically starts a deployment. This is an asynchronous operation. On a successful call, you can use the returned OperationId and the ListOperations call to track the operation's progress.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.CreateService
            default: AppRunner.CreateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ServiceName:
                  $ref: "#/components/schemas/ServiceName"
                  description: A name for the App Runner service. It must be unique across all the running App Runner services in your Amazon Web Services account in the Amazon Web Services Region.
                SourceConfiguration:
                  $ref: "#/components/schemas/SourceConfiguration"
                  description: The source to deploy to the App Runner service. It can be a code or an image repository.
                InstanceConfiguration:
                  $ref: "#/components/schemas/InstanceConfiguration"
                  description: The runtime configuration of instances (scaling units) of your service.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the App Runner service resource. A tag is a key-value pair.
                EncryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: An optional custom encryption key that App Runner uses to encrypt the copy of your source repository that it maintains and your service logs. By default, App Runner uses an Amazon Web Services managed key.
                HealthCheckConfiguration:
                  $ref: "#/components/schemas/HealthCheckConfiguration"
                  description: The settings for the health check that App Runner performs to monitor the health of the App Runner service.
                AutoScalingConfigurationArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: "The Amazon Resource Name (ARN) of an App Runner automatic scaling configuration resource that you want to associate with your service. If not provided, App Runner associates the latest revision of a default auto scaling configuration. Specify an ARN with a name and a revision number to associate that revision. For example: arn:aws:apprunner:us-east-1:123456789012:autoscalingconfiguration/high-availability/3 Specify just the name to associate the latest revision. For example: arn:aws:apprunner:us-east-1:123456789012:autoscalingconfiguration/high-availability"
                NetworkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                  description: Configuration settings related to network traffic of the web application that the App Runner service runs.
                ObservabilityConfiguration:
                  $ref: "#/components/schemas/ServiceObservabilityConfiguration"
                  description: The observability configuration of your service.
              required:
                - ServiceName
                - SourceConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceResponse"
  /CreateVpcConnector:
    post:
      operationId: CreateVpcConnector
      description: Create an App Runner VPC connector resource. App Runner requires this resource when you want to associate your App Runner service to a custom Amazon Virtual Private Cloud (Amazon VPC).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.CreateVpcConnector
            default: AppRunner.CreateVpcConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                VpcConnectorName:
                  $ref: "#/components/schemas/VpcConnectorName"
                  description: A name for the VPC connector.
                Subnets:
                  $ref: "#/components/schemas/StringList"
                  description: A list of IDs of subnets that App Runner should use when it associates your service with a custom Amazon VPC. Specify IDs of subnets of a single Amazon VPC. App Runner determines the Amazon VPC from the subnets you specify. App Runner only supports subnets of IP address type IPv4 and dual stack (IPv4 and IPv6).
                SecurityGroups:
                  $ref: "#/components/schemas/StringList"
                  description: A list of IDs of security groups that App Runner should use for access to Amazon Web Services resources under the specified subnets. If not specified, App Runner uses the default security group of the Amazon VPC. The default security group allows all outbound traffic.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of metadata items that you can associate with your VPC connector resource. A tag is a key-value pair.
              required:
                - VpcConnectorName
                - Subnets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVpcConnectorResponse"
  /CreateVpcIngressConnection:
    post:
      operationId: CreateVpcIngressConnection
      description: Create an App Runner VPC Ingress Connection resource. App Runner requires this resource when you want to associate your App Runner service with an Amazon VPC endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.CreateVpcIngressConnection
            default: AppRunner.CreateVpcIngressConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ServiceArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) for this App Runner service that is used to create the VPC Ingress Connection resource.
                VpcIngressConnectionName:
                  $ref: "#/components/schemas/VpcIngressConnectionName"
                  description: A name for the VPC Ingress Connection resource. It must be unique across all the active VPC Ingress Connections in your Amazon Web Services account in the Amazon Web Services Region.
                IngressVpcConfiguration:
                  $ref: "#/components/schemas/IngressVpcConfiguration"
                  description: Specifications for the customer’s Amazon VPC and the related Amazon Web Services PrivateLink VPC endpoint that are used to create the VPC Ingress Connection resource.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An optional list of metadata items that you can associate with the VPC Ingress Connection resource. A tag is a key-value pair.
              required:
                - ServiceArn
                - VpcIngressConnectionName
                - IngressVpcConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVpcIngressConnectionResponse"
  /DeleteAutoScalingConfiguration:
    post:
      operationId: DeleteAutoScalingConfiguration
      description: Delete an App Runner automatic scaling configuration resource. You can delete a top level auto scaling configuration, a specific revision of one, or all revisions associated with the top level configuration. You can't delete the default auto scaling configuration or a configuration that's used by one or more App Runner services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DeleteAutoScalingConfiguration
            default: AppRunner.DeleteAutoScalingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AutoScalingConfigurationArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner auto scaling configuration that you want to delete. The ARN can be a full auto scaling configuration ARN, or a partial ARN ending with either .../name or .../name/revision . If a revision isn't specified, the latest active revision is deleted.
                DeleteAllRevisions:
                  $ref: "#/components/schemas/Boolean"
                  description: "Set to true to delete all of the revisions associated with the AutoScalingConfigurationArn parameter value. When DeleteAllRevisions is set to true, the only valid value for the Amazon Resource Name (ARN) is a partial ARN ending with: .../name."
              required:
                - AutoScalingConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAutoScalingConfigurationResponse"
  /DeleteConnection:
    post:
      operationId: DeleteConnection
      description: Delete an App Runner connection. You must first ensure that there are no running App Runner services that use this connection. If there are any, the DeleteConnection action fails.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DeleteConnection
            default: AppRunner.DeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner connection that you want to delete.
              required:
                - ConnectionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectionResponse"
  /DeleteObservabilityConfiguration:
    post:
      operationId: DeleteObservabilityConfiguration
      description: Delete an App Runner observability configuration resource. You can delete a specific revision or the latest active revision. You can't delete a configuration that's used by one or more App Runner services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DeleteObservabilityConfiguration
            default: AppRunner.DeleteObservabilityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ObservabilityConfigurationArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner observability configuration that you want to delete. The ARN can be a full observability configuration ARN, or a partial ARN ending with either .../name or .../name/revision . If a revision isn't specified, the latest active revision is deleted.
              required:
                - ObservabilityConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteObservabilityConfigurationResponse"
  /DeleteService:
    post:
      operationId: DeleteService
      description: Delete an App Runner service. This is an asynchronous operation. On a successful call, you can use the returned OperationId and the ListOperations call to track the operation's progress. Make sure that you don't have any active VPCIngressConnections associated with the service you want to delete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DeleteService
            default: AppRunner.DeleteService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ServiceArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner service that you want to delete.
              required:
                - ServiceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceResponse"
  /DeleteVpcConnector:
    post:
      operationId: DeleteVpcConnector
      description: Delete an App Runner VPC connector resource. You can't delete a connector that's used by one or more App Runner services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DeleteVpcConnector
            default: AppRunner.DeleteVpcConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                VpcConnectorArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner VPC connector that you want to delete. The ARN must be a full VPC connector ARN.
              required:
                - VpcConnectorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVpcConnectorResponse"
  /DeleteVpcIngressConnection:
    post:
      operationId: DeleteVpcIngressConnection
      description: "Delete an App Runner VPC Ingress Connection resource that's associated with an App Runner service. The VPC Ingress Connection must be in one of the following states to be deleted: AVAILABLE FAILED_CREATION FAILED_UPDATE FAILED_DELETION"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DeleteVpcIngressConnection
            default: AppRunner.DeleteVpcIngressConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                VpcIngressConnectionArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner VPC Ingress Connection that you want to delete.
              required:
                - VpcIngressConnectionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVpcIngressConnectionResponse"
  /DescribeAutoScalingConfiguration:
    post:
      operationId: DescribeAutoScalingConfiguration
      description: Return a full description of an App Runner automatic scaling configuration resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DescribeAutoScalingConfiguration
            default: AppRunner.DescribeAutoScalingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AutoScalingConfigurationArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner auto scaling configuration that you want a description for. The ARN can be a full auto scaling configuration ARN, or a partial ARN ending with either .../name or .../name/revision . If a revision isn't specified, the latest active revision is described.
              required:
                - AutoScalingConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAutoScalingConfigurationResponse"
  /DescribeCustomDomains:
    post:
      operationId: DescribeCustomDomains
      description: Return a description of custom domain names that are associated with an App Runner service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DescribeCustomDomains
            default: AppRunner.DescribeCustomDomains
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ServiceArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner service that you want associated custom domain names to be described for.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: A token from a previous result page. It's used for a paginated request. The request retrieves the next result page. All other parameter values must be identical to the ones that are specified in the initial request. If you don't specify NextToken, the request retrieves the first result page.
                MaxResults:
                  $ref: "#/components/schemas/DescribeCustomDomainsMaxResults"
                  description: The maximum number of results that each response (result page) can include. It's used for a paginated request. If you don't specify MaxResults, the request retrieves all available results in a single response.
              required:
                - ServiceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCustomDomainsResponse"
  /DescribeObservabilityConfiguration:
    post:
      operationId: DescribeObservabilityConfiguration
      description: Return a full description of an App Runner observability configuration resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DescribeObservabilityConfiguration
            default: AppRunner.DescribeObservabilityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ObservabilityConfigurationArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner observability configuration that you want a description for. The ARN can be a full observability configuration ARN, or a partial ARN ending with either .../name or .../name/revision . If a revision isn't specified, the latest active revision is described.
              required:
                - ObservabilityConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeObservabilityConfigurationResponse"
  /DescribeService:
    post:
      operationId: DescribeService
      description: Return a full description of an App Runner service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AppRunner.DescribeService
            default: AppRunner.DescribeService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ServiceArn:
                  $ref: "#/components/schemas/AppRunnerResourceArn"
                  description: The Amazon Resource Name (ARN) of the App Runner service that you want a description for.
              required:
                - ServiceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeServiceResponse"
  /DescribeVpcConnector:
    post:
      operationId: DescribeVpcConnector
      description: Return a description of an App Runner VPC connector resource.
      parameters:
        - name: X-Amz-Target
          in: header
