openapi: 3.0.0
info:
  version: "2018-11-14"
  title: AWS MediaConnect
  description: AWS MediaConnect
  x-serviceName: mediaconnect
  x-serviceAlias: mediaconnect
  x-protocol: rest-json
  x-apiVersion: "2018-11-14"
  x-endpointPrefix: mediaconnect
servers:
  - url: https://mediaconnect.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediaconnect
paths:
  /v1/bridges/{bridge_arn}/outputs:
    post:
      operationId: AddBridgeOutputs
      description: Adds outputs to an existing bridge.
      parameters:
        - name: bridge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AddBridgeOutputsRequestBridgeArnString"
          description: The Amazon Resource Name (ARN) of the bridge that you want to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Outputs:
                  $ref: "#/components/schemas/__listOfAddBridgeOutputRequest"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddBridgeOutputsResponse"
  /v1/bridges/{bridge_arn}/sources:
    post:
      operationId: AddBridgeSources
      description: Adds sources to an existing bridge.
      parameters:
        - name: bridge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BridgeArn"
          description: The Amazon Resource Name (ARN) of the bridge that you want to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sources:
                  $ref: "#/components/schemas/__listOfAddBridgeSourceRequest"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddBridgeSourcesResponse"
  /v1/flows/{flow_arn}/mediaStreams:
    post:
      operationId: AddFlowMediaStreams
      description: Adds media streams to an existing flow. After you add a media stream to a flow, you can associate it with a source and/or an output that uses the ST 2110 JPEG XS or CDI protocol.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AddFlowMediaStreamsRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MediaStreams:
                  $ref: "#/components/schemas/__listOfAddMediaStreamRequest"
              required:
                - MediaStreams
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFlowMediaStreamsResponse"
  /v1/flows/{flow_arn}/outputs:
    post:
      operationId: AddFlowOutputs
      description: Adds outputs to an existing flow. You can create up to 50 outputs per flow.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AddFlowOutputsRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow that you want to add outputs to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Outputs:
                  $ref: "#/components/schemas/__listOfAddOutputRequest"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFlowOutputsResponse"
  /v1/flows/{flow_arn}/source:
    post:
      operationId: AddFlowSources
      description: Adds sources to a flow.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AddFlowSourcesRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow that you want to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sources:
                  $ref: "#/components/schemas/__listOfSetSourceRequest"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFlowSourcesResponse"
  /v1/flows/{flow_arn}/vpcInterfaces:
    post:
      operationId: AddFlowVpcInterfaces
      description: Adds VPC interfaces to a flow.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AddFlowVpcInterfacesRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow that you want to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                VpcInterfaces:
                  $ref: "#/components/schemas/__listOfVpcInterfaceRequest"
              required:
                - VpcInterfaces
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFlowVpcInterfacesResponse"
  /v1/routerInputs:
    get:
      operationId: BatchGetRouterInput
      description: Retrieves information about multiple router inputs in AWS Elemental MediaConnect.
      parameters:
        - name: arns
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BatchGetRouterInputRequestArnsList"
          description: The Amazon Resource Names (ARNs) of the router inputs you want to retrieve information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRouterInputResponse"
    post:
      operationId: ListRouterInputs
      description: Retrieves a list of router inputs in AWS Elemental MediaConnect.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRouterInputsRequestMaxResultsInteger"
          description: The maximum number of router inputs to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A token used to retrieve the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/RouterInputFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRouterInputsResponse"
  /v1/routerNetworkInterfaces:
    get:
      operationId: BatchGetRouterNetworkInterface
      description: Retrieves information about multiple router network interfaces in AWS Elemental MediaConnect.
      parameters:
        - name: arns
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BatchGetRouterNetworkInterfaceRequestArnsList"
          description: The Amazon Resource Names (ARNs) of the router network interfaces you want to retrieve information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRouterNetworkInterfaceResponse"
    post:
      operationId: ListRouterNetworkInterfaces
      description: Retrieves a list of router network interfaces in AWS Elemental MediaConnect.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRouterNetworkInterfacesRequestMaxResultsInteger"
          description: The maximum number of router network interfaces to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A token used to retrieve the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/RouterNetworkInterfaceFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRouterNetworkInterfacesResponse"
  /v1/routerOutputs:
    get:
      operationId: BatchGetRouterOutput
      description: Retrieves information about multiple router outputs in AWS Elemental MediaConnect.
      parameters:
        - name: arns
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BatchGetRouterOutputRequestArnsList"
          description: The Amazon Resource Names (ARNs) of the router outputs you want to retrieve information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRouterOutputResponse"
    post:
      operationId: ListRouterOutputs
      description: Retrieves a list of router outputs in AWS Elemental MediaConnect.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRouterOutputsRequestMaxResultsInteger"
          description: The maximum number of router outputs to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A token used to retrieve the next page of results.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/RouterOutputFilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRouterOutputsResponse"
  /v1/bridges:
    post:
      operationId: CreateBridge
      description: Creates a new bridge. The request must include one source.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EgressGatewayBridge:
                  $ref: "#/components/schemas/AddEgressGatewayBridgeRequest"
                IngressGatewayBridge:
                  $ref: "#/components/schemas/AddIngressGatewayBridgeRequest"
                Name:
                  $ref: "#/components/schemas/String"
                Outputs:
                  $ref: "#/components/schemas/__listOfAddBridgeOutputRequest"
                PlacementArn:
                  $ref: "#/components/schemas/String"
                SourceFailoverConfig:
                  $ref: "#/components/schemas/FailoverConfig"
                Sources:
                  $ref: "#/components/schemas/__listOfAddBridgeSourceRequest"
              required:
                - PlacementArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBridgeResponse"
    get:
      operationId: ListBridges
      description: Displays a list of bridges that are associated with this account and an optionally specified Amazon Resource Name (ARN). This request returns a paginated result.
      parameters:
        - name: filterArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Filter the list results to display only the bridges associated with the selected ARN.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per API request. For example, you submit a ListBridges request with MaxResults set at 5. Although 20 items match your request, the service returns no more than the first 5 items. (The service also returns a NextToken value that you can use to fetch the next batch of results.) The service might return fewer results than the MaxResults value. If MaxResults is not included in the request, the service defaults to pagination with a maximum of 10 results per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token that identifies the batch of results that you want to see. For example, you submit a ListBridges request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListBridges request a second time and specify the NextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBridgesResponse"
  /v1/flows:
    post:
      operationId: CreateFlow
      description: Creates a new flow. The request must include one source. The request optionally can include outputs (up to 50) and entitlements (up to 50).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AvailabilityZone:
                  $ref: "#/components/schemas/String"
                Entitlements:
                  $ref: "#/components/schemas/__listOfGrantEntitlementRequest"
                MediaStreams:
                  $ref: "#/components/schemas/__listOfAddMediaStreamRequest"
                Name:
                  $ref: "#/components/schemas/String"
                Outputs:
                  $ref: "#/components/schemas/__listOfAddOutputRequest"
                Source:
                  $ref: "#/components/schemas/SetSourceRequest"
                SourceFailoverConfig:
                  $ref: "#/components/schemas/FailoverConfig"
                Sources:
                  $ref: "#/components/schemas/__listOfSetSourceRequest"
                VpcInterfaces:
                  $ref: "#/components/schemas/__listOfVpcInterfaceRequest"
                Maintenance:
                  $ref: "#/components/schemas/AddMaintenance"
                SourceMonitoringConfig:
                  $ref: "#/components/schemas/MonitoringConfig"
                FlowSize:
                  $ref: "#/components/schemas/FlowSize"
                NdiConfig:
                  $ref: "#/components/schemas/NdiConfig"
                EncodingConfig:
                  $ref: "#/components/schemas/EncodingConfig"
                FlowTags:
                  $ref: "#/components/schemas/__mapOfString"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFlowResponse"
    get:
      operationId: ListFlows
      description: Displays a list of flows that are associated with this account. This request returns a paginated result.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per API request. For example, you submit a ListFlows request with MaxResults set at 5. Although 20 items match your request, the service returns no more than the first 5 items. (The service also returns a NextToken value that you can use to fetch the next batch of results.) The service might return fewer results than the MaxResults value. If MaxResults is not included in the request, the service defaults to pagination with a maximum of 10 results per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token that identifies the batch of results that you want to see. For example, you submit a ListFlows request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListFlows request a second time and specify the NextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowsResponse"
  /v1/gateways:
    post:
      operationId: CreateGateway
      description: Creates a new gateway. The request must include at least one network (up to four).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EgressCidrBlocks:
                  $ref: "#/components/schemas/__listOfString"
                Name:
                  $ref: "#/components/schemas/String"
                Networks:
                  $ref: "#/components/schemas/__listOfGatewayNetwork"
              required:
                - EgressCidrBlocks
                - Networks
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGatewayResponse"
    get:
      operationId: ListGateways
      description: Displays a list of gateways that are associated with this account. This request returns a paginated result.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per API request. For example, you submit a ListGateways request with MaxResults set at 5. Although 20 items match your request, the service returns no more than the first 5 items. (The service also returns a NextToken value that you can use to fetch the next batch of results.) The service might return fewer results than the MaxResults value. If MaxResults is not included in the request, the service defaults to pagination with a maximum of 10 results per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token that identifies the batch of results that you want to see. For example, you submit a ListGateways request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListGateways request a second time and specify the NextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGatewaysResponse"
  /v1/routerInput:
    post:
      operationId: CreateRouterInput
      description: Creates a new router input in AWS Elemental MediaConnect.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CreateRouterInputRequestNameString"
                Configuration:
                  $ref: "#/components/schemas/RouterInputConfiguration"
                MaximumBitrate:
                  $ref: "#/components/schemas/Long"
                RoutingScope:
                  $ref: "#/components/schemas/RoutingScope"
                Tier:
                  $ref: "#/components/schemas/RouterInputTier"
                RegionName:
                  $ref: "#/components/schemas/String"
                AvailabilityZone:
                  $ref: "#/components/schemas/String"
                TransitEncryption:
                  $ref: "#/components/schemas/RouterInputTransitEncryption"
                MaintenanceConfiguration:
                  $ref: "#/components/schemas/MaintenanceConfiguration"
                Tags:
                  $ref: "#/components/schemas/__mapOfString"
                ClientToken:
                  $ref: "#/components/schemas/String"
              required:
                - Configuration
                - MaximumBitrate
                - RoutingScope
                - Tier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRouterInputResponse"
  /v1/routerNetworkInterface:
    post:
      operationId: CreateRouterNetworkInterface
      description: Creates a new router network interface in AWS Elemental MediaConnect.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CreateRouterNetworkInterfaceRequestNameString"
                Configuration:
                  $ref: "#/components/schemas/RouterNetworkInterfaceConfiguration"
                RegionName:
                  $ref: "#/components/schemas/String"
                Tags:
                  $ref: "#/components/schemas/__mapOfString"
                ClientToken:
                  $ref: "#/components/schemas/String"
              required:
                - Configuration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRouterNetworkInterfaceResponse"
  /v1/routerOutput:
    post:
      operationId: CreateRouterOutput
      description: Creates a new router output in AWS Elemental MediaConnect.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CreateRouterOutputRequestNameString"
                Configuration:
                  $ref: "#/components/schemas/RouterOutputConfiguration"
                MaximumBitrate:
                  $ref: "#/components/schemas/Long"
                RoutingScope:
                  $ref: "#/components/schemas/RoutingScope"
                Tier:
                  $ref: "#/components/schemas/RouterOutputTier"
                RegionName:
                  $ref: "#/components/schemas/String"
                AvailabilityZone:
                  $ref: "#/components/schemas/String"
                MaintenanceConfiguration:
                  $ref: "#/components/schemas/MaintenanceConfiguration"
                Tags:
                  $ref: "#/components/schemas/__mapOfString"
                ClientToken:
                  $ref: "#/components/schemas/String"
              required:
                - Configuration
                - MaximumBitrate
                - RoutingScope
                - Tier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRouterOutputResponse"
  /v1/bridges/{bridge_arn}:
    delete:
      operationId: DeleteBridge
      description: Deletes a bridge. Before you can delete a bridge, you must stop the bridge.
      parameters:
        - name: bridge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeleteBridgeRequestBridgeArnString"
          description: The Amazon Resource Name (ARN) of the bridge that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBridgeResponse"
    get:
      operationId: DescribeBridge
      description: Displays the details of a bridge.
      parameters:
        - name: bridge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DescribeBridgeRequestBridgeArnString"
          description: The Amazon Resource Name (ARN) of the bridge that you want to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBridgeResponse"
    put:
      operationId: UpdateBridge
      description: Updates the bridge.
      parameters:
        - name: bridge_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UpdateBridgeRequestBridgeArnString"
          description: TheAmazon Resource Name (ARN) of the bridge that you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                EgressGatewayBridge:
                  $ref: "#/components/schemas/UpdateEgressGatewayBridgeRequest"
                IngressGatewayBridge:
                  $ref: "#/components/schemas/UpdateIngressGatewayBridgeRequest"
                SourceFailoverConfig:
                  $ref: "#/components/schemas/UpdateFailoverConfig"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBridgeResponse"
  /v1/flows/{flow_arn}:
    delete:
      operationId: DeleteFlow
      description: Deletes a flow. Before you can delete a flow, you must stop the flow.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeleteFlowRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow that you want to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFlowResponse"
    get:
      operationId: DescribeFlow
      description: Displays the details of a flow. The response includes the flow Amazon Resource Name (ARN), name, and Availability Zone, as well as details about the source, outputs, and entitlements.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DescribeFlowRequestFlowArnString"
          description: The ARN of the flow that you want to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFlowResponse"
    put:
      operationId: UpdateFlow
      description: "Updates an existing flow. Because UpdateFlowSources and UpdateFlow are separate operations, you can't change both the source type AND the flow size in a single request. If you have a MEDIUM flow and you want to change the flow source to NDI®: First, use the UpdateFlow operation to upgrade the flow size to LARGE. After that, you can then use the UpdateFlowSource operation to configure the NDI source. If you're switching from an NDI source to a transport stream (TS) source and want to downgrade the flow size: First, use the UpdateFlowSource operation to change the flow source type. After that, you can then use the UpdateFlow operation to downgrade the flow size to MEDIUM."
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UpdateFlowRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow that you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceFailoverConfig:
                  $ref: "#/components/schemas/UpdateFailoverConfig"
                Maintenance:
                  $ref: "#/components/schemas/UpdateMaintenance"
                SourceMonitoringConfig:
                  $ref: "#/components/schemas/MonitoringConfig"
                NdiConfig:
                  $ref: "#/components/schemas/NdiConfig"
                FlowSize:
                  $ref: "#/components/schemas/FlowSize"
                EncodingConfig:
                  $ref: "#/components/schemas/EncodingConfig"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFlowResponse"
  /v1/gateways/{gateway_arn}:
    delete:
      operationId: DeleteGateway
      description: Deletes a gateway. Before you can delete a gateway, you must deregister its instances and delete its bridges.
      parameters:
        - name: gateway_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeleteGatewayRequestGatewayArnString"
          description: The Amazon Resource Name (ARN) of the gateway that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGatewayResponse"
    get:
      operationId: DescribeGateway
      description: Displays the details of a gateway. The response includes the gateway Amazon Resource Name (ARN), name, and CIDR blocks, as well as details about the networks.
      parameters:
        - name: gateway_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DescribeGatewayRequestGatewayArnString"
          description: The ARN of the gateway that you want to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGatewayResponse"
  /v1/routerInput/{arn}:
    delete:
      operationId: DeleteRouterInput
      description: Deletes a router input from AWS Elemental MediaConnect.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RouterInputArn"
