        - MinimumLatencyMilliseconds
    SrtCallerRouterOutputConfigurationDestinationPortInteger:
      type: integer
      minimum: 1024
      maximum: 65535
    SrtCallerRouterOutputConfigurationMinimumLatencyMillisecondsLong:
      type: integer
      format: int64
      minimum: 10
      maximum: 10000
    RtpRouterOutputConfiguration:
