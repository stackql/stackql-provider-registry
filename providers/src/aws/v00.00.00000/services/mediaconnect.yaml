                MaxSyncBuffer:
                  $ref: "#/components/schemas/Integer"
                MediaStreamSourceConfigurations:
                  $ref: "#/components/schemas/__listOfMediaStreamSourceConfigurationRequest"
                MinLatency:
                  $ref: "#/components/schemas/Integer"
                Protocol:
                  $ref: "#/components/schemas/Protocol"
                SenderControlPort:
                  $ref: "#/components/schemas/Integer"
                SenderIpAddress:
                  $ref: "#/components/schemas/String"
                SourceListenerAddress:
                  $ref: "#/components/schemas/String"
                SourceListenerPort:
                  $ref: "#/components/schemas/Integer"
                StreamId:
                  $ref: "#/components/schemas/String"
                VpcInterfaceName:
                  $ref: "#/components/schemas/String"
                WhitelistCidr:
                  $ref: "#/components/schemas/String"
                GatewayBridgeSource:
                  $ref: "#/components/schemas/UpdateGatewayBridgeSourceRequest"
                NdiSourceSettings:
                  $ref: "#/components/schemas/NdiSourceSettings"
                RouterIntegrationState:
                  $ref: "#/components/schemas/State"
                RouterIntegrationTransitDecryption:
                  $ref: "#/components/schemas/FlowTransitEncryption"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFlowSourceResponse"
