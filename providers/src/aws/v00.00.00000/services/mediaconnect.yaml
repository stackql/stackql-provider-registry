        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeFlowEntitlementResponse"
    put:
      operationId: UpdateFlowEntitlement
      description: Updates an entitlement. You can change an entitlement's description, subscribers, and encryption. If you change the subscribers, the service will remove the outputs that are are used by the subscribers that are removed.
      parameters:
        - name: entitlement_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UpdateFlowEntitlementRequestEntitlementArnString"
          description: The Amazon Resource Name (ARN) of the entitlement that you want to update.
        - name: flow_arn
          in: path
          required: true
