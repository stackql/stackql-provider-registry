        $ref: "#/components/schemas/MediaStream"
    MediaStream:
      description: A media stream represents one component of your content, such as video, audio, or ancillary data. After you add a media stream to your flow, you can associate it with sources and outputs that use the ST 2110 JPEG XS or CDI protocol.
      type: object
      properties:
        Attributes:
          $ref: "#/components/schemas/MediaStreamAttributes"
