components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AddBridgeOutputsRequestBridgeArnString:
      type: string
      pattern: arn:.+:mediaconnect.+:bridge:.+
    __listOfAddBridgeOutputRequest:
      type: array
      items:
        $ref: "#/components/schemas/AddBridgeOutputRequest"
    AddBridgeOutputRequest:
      description: Add outputs to the specified bridge.
      type: object
      properties:
        NetworkOutput:
          $ref: "#/components/schemas/AddBridgeNetworkOutputRequest"
          description: The network output of the bridge. A network output is delivered to your premises.
    AddBridgeNetworkOutputRequest:
      description: Add a network output to an existing bridge.
      type: object
      properties:
        IpAddress:
          $ref: "#/components/schemas/String"
          description: The network output IP Address.
        Name:
          $ref: "#/components/schemas/String"
          description: The network output name. This name is used to reference the output and must be unique among outputs in this bridge.
        NetworkName:
          $ref: "#/components/schemas/String"
          description: The network output's gateway network name.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The network output port.
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: The network output protocol. Elemental MediaConnect no longer supports the Fujitsu QoS protocol. This reference is maintained for legacy purposes only.
        Ttl:
          $ref: "#/components/schemas/Integer"
          description: The network output TTL.
      required:
        - IpAddress
        - Name
        - NetworkName
        - Port
        - Protocol
        - Ttl
    String:
      type: string
    Integer:
      type: integer
    Protocol:
      type: string
      enum:
        - zixi-push
        - rtp-fec
        - rtp
        - zixi-pull
        - rist
        - st2110-jpegxs
        - cdi
        - srt-listener
        - srt-caller
        - fujitsu-qos
        - udp
        - ndi-speed-hq
    AddBridgeOutputsResponse:
      type: object
      properties:
        BridgeArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the bridge that you added outputs to.
        Outputs:
          $ref: "#/components/schemas/__listOfBridgeOutput"
          description: The outputs that you added to this bridge.
    __listOfBridgeOutput:
      type: array
      items:
        $ref: "#/components/schemas/BridgeOutput"
    BridgeOutput:
      description: The output of the bridge.
      type: object
      properties:
        FlowOutput:
          $ref: "#/components/schemas/BridgeFlowOutput"
          description: The output of the associated flow.
        NetworkOutput:
          $ref: "#/components/schemas/BridgeNetworkOutput"
          description: The network output for the bridge.
    BridgeFlowOutput:
      description: The output of the bridge. A flow output is delivered to the Amazon Web Services cloud.
      type: object
      properties:
        FlowArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Number (ARN) of the cloud flow.
        FlowSourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Number (ARN) of the flow source.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the bridge's output.
      required:
        - FlowArn
        - FlowSourceArn
        - Name
    BridgeNetworkOutput:
      description: The output of the bridge. A network output is delivered to your premises.
      type: object
      properties:
        IpAddress:
          $ref: "#/components/schemas/String"
          description: The network output IP address.
        Name:
          $ref: "#/components/schemas/String"
          description: The network output name.
        NetworkName:
          $ref: "#/components/schemas/String"
          description: The network output's gateway network name.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The network output's port.
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: The network output protocol. Elemental MediaConnect no longer supports the Fujitsu QoS protocol. This reference is maintained for legacy purposes only.
        Ttl:
          $ref: "#/components/schemas/Integer"
          description: The network output TTL.
      required:
        - IpAddress
        - Name
        - NetworkName
        - Port
        - Protocol
        - Ttl
    BridgeArn:
      type: string
    __listOfAddBridgeSourceRequest:
      type: array
      items:
        $ref: "#/components/schemas/AddBridgeSourceRequest"
    AddBridgeSourceRequest:
      description: Add an output to a bridge.
      type: object
      properties:
        FlowSource:
          $ref: "#/components/schemas/AddBridgeFlowSourceRequest"
          description: The source of the flow.
        NetworkSource:
          $ref: "#/components/schemas/AddBridgeNetworkSourceRequest"
          description: The source of the network.
    AddBridgeFlowSourceRequest:
      description: Add a flow source to an existing bridge.
      type: object
      properties:
        FlowArn:
          $ref: "#/components/schemas/AddBridgeFlowSourceRequestFlowArnString"
          description: The Amazon Resource Number (ARN) of the flow to use as a source of this bridge.
        FlowVpcInterfaceAttachment:
          $ref: "#/components/schemas/VpcInterfaceAttachment"
          description: The name of the VPC interface attachment to use for this source.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the flow source. This name is used to reference the source and must be unique among sources in this bridge.
      required:
        - FlowArn
        - Name
    AddBridgeFlowSourceRequestFlowArnString:
      type: string
      pattern: arn:.+:mediaconnect.+:flow:.+
    VpcInterfaceAttachment:
      description: The settings for attaching a VPC interface to an resource.
      type: object
      properties:
        VpcInterfaceName:
          $ref: "#/components/schemas/String"
          description: The name of the VPC interface to use for this resource.
    AddBridgeNetworkSourceRequest:
      description: Add a network source to an existing bridge.
      type: object
      properties:
        MulticastIp:
          $ref: "#/components/schemas/String"
          description: The network source multicast IP.
        MulticastSourceSettings:
          $ref: "#/components/schemas/MulticastSourceSettings"
          description: The settings related to the multicast source.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the network source. This name is used to reference the source and must be unique among sources in this bridge.
        NetworkName:
          $ref: "#/components/schemas/String"
          description: The network source's gateway network name.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The network source port.
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: The network source protocol. Elemental MediaConnect no longer supports the Fujitsu QoS protocol. This reference is maintained for legacy purposes only.
      required:
        - MulticastIp
        - Name
        - NetworkName
        - Port
        - Protocol
    MulticastSourceSettings:
      description: The settings related to the multicast source.
      type: object
      properties:
        MulticastSourceIp:
          $ref: "#/components/schemas/String"
          description: The IP address of the source for source-specific multicast (SSM).
    AddBridgeSourcesResponse:
      type: object
      properties:
        BridgeArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the bridge that you added sources to.
        Sources:
          $ref: "#/components/schemas/__listOfBridgeSource"
          description: The sources that you added to this bridge.
    __listOfBridgeSource:
      type: array
      items:
        $ref: "#/components/schemas/BridgeSource"
    BridgeSource:
      description: The bridge's source.
      type: object
      properties:
        FlowSource:
          $ref: "#/components/schemas/BridgeFlowSource"
          description: The source of the associated flow.
        NetworkSource:
          $ref: "#/components/schemas/BridgeNetworkSource"
          description: The network source for the bridge.
    BridgeFlowSource:
      description: The source of the bridge. A flow source originates in MediaConnect as an existing cloud flow.
      type: object
      properties:
        FlowArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the cloud flow used as a source of this bridge.
        FlowVpcInterfaceAttachment:
          $ref: "#/components/schemas/VpcInterfaceAttachment"
          description: The name of the VPC interface attachment to use for this source.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the flow source.
        OutputArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Number (ARN) of the output.
      required:
        - FlowArn
