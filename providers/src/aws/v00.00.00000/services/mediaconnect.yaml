          description: Indicates if router integration is enabled or disabled on the flow output.
        RouterIntegrationTransitEncryption:
          $ref: "#/components/schemas/FlowTransitEncryption"
          description: The encryption configuration for the output when router integration is enabled.
        ConnectedRouterInputArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the router input that's connected to this flow output.
