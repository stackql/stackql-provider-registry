      description: Removes a source from an existing flow. This request can be made only if there is more than one source on the flow.
      parameters:
        - name: flow_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RemoveFlowSourceRequestFlowArnString"
          description: The Amazon Resource Name (ARN) of the flow that you want to remove a source from.
