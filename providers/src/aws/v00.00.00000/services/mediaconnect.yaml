          $ref: "#/components/schemas/StandardRouterOutputStreamDetails"
        MediaConnectFlow:
          $ref: "#/components/schemas/MediaConnectFlowRouterOutputStreamDetails"
        MediaLiveInput:
          $ref: "#/components/schemas/MediaLiveInputRouterOutputStreamDetails"
    StandardRouterOutputStreamDetails:
      description: Configuration details for a standard router output stream type. Contains information about the destination IP address and connection state for basic output routing.
      type: object
      properties:
        DestinationIpAddress:
          $ref: "#/components/schemas/String"
          description: The IP address where the output stream will be sent. This is the destination address that will receive the routed media content.
    MediaConnectFlowRouterOutputStreamDetails:
      description: Configuration details for a MediaConnect flow when used as a router output destination.
      type: object
    MediaLiveInputRouterOutputStreamDetails:
      description: Configuration details for a MediaLive input when used as a router output destination.
      type: object
    BatchGetRouterOutputErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetRouterOutputError"
    BatchGetRouterOutputError:
