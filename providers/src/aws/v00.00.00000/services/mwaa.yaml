openapi: 3.0.0
info:
  version: "2020-07-01"
  title: AmazonMWAA
  description: AmazonMWAA
  x-serviceName: airflow
  x-serviceAlias: mwaa
  x-protocol: rest-json
  x-apiVersion: "2020-07-01"
  x-endpointPrefix: airflow
servers:
  - url: https://airflow.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mwaa
paths:
  /clitoken/{name}:
    post:
      operationId: CreateCliToken
      description: Creates a CLI token for the Airflow CLI. To learn more, see Creating an Apache Airflow CLI token.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCliTokenResponse"
  /environments/{name}:
    put:
      operationId: CreateEnvironment
      description: Creates an Amazon Managed Workflows for Apache Airflow (Amazon MWAA) environment.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ExecutionRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                SourceBucketArn:
                  $ref: "#/components/schemas/S3BucketArn"
                DagS3Path:
                  $ref: "#/components/schemas/RelativePath"
                NetworkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                PluginsS3Path:
                  $ref: "#/components/schemas/RelativePath"
                PluginsS3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                RequirementsS3Path:
                  $ref: "#/components/schemas/RelativePath"
                RequirementsS3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                StartupScriptS3Path:
                  $ref: "#/components/schemas/RelativePath"
                StartupScriptS3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                AirflowConfigurationOptions:
                  $ref: "#/components/schemas/AirflowConfigurationOptions"
                EnvironmentClass:
                  $ref: "#/components/schemas/EnvironmentClass"
                MaxWorkers:
                  $ref: "#/components/schemas/MaxWorkers"
                KmsKey:
                  $ref: "#/components/schemas/KmsKey"
                AirflowVersion:
                  $ref: "#/components/schemas/AirflowVersion"
                LoggingConfiguration:
                  $ref: "#/components/schemas/LoggingConfigurationInput"
                WeeklyMaintenanceWindowStart:
                  $ref: "#/components/schemas/WeeklyMaintenanceWindowStart"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                WebserverAccessMode:
                  $ref: "#/components/schemas/WebserverAccessMode"
                MinWorkers:
                  $ref: "#/components/schemas/MinWorkers"
                Schedulers:
                  $ref: "#/components/schemas/Schedulers"
                EndpointManagement:
                  $ref: "#/components/schemas/EndpointManagement"
                MinWebservers:
                  $ref: "#/components/schemas/MinWebservers"
                MaxWebservers:
                  $ref: "#/components/schemas/MaxWebservers"
              required:
                - ExecutionRoleArn
                - SourceBucketArn
                - DagS3Path
                - NetworkConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentOutput"
    delete:
      operationId: DeleteEnvironment
      description: Deletes an Amazon Managed Workflows for Apache Airflow (Amazon MWAA) environment.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentOutput"
    get:
      operationId: GetEnvironment
      description: Describes an Amazon Managed Workflows for Apache Airflow (MWAA) environment.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnvironmentOutput"
    patch:
      operationId: UpdateEnvironment
      description: Updates an Amazon Managed Workflows for Apache Airflow (MWAA) environment.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of your Amazon MWAA environment. For example, MyMWAAEnvironment.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ExecutionRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                AirflowConfigurationOptions:
                  $ref: "#/components/schemas/AirflowConfigurationOptions"
                AirflowVersion:
                  $ref: "#/components/schemas/AirflowVersion"
                DagS3Path:
                  $ref: "#/components/schemas/RelativePath"
                EnvironmentClass:
                  $ref: "#/components/schemas/EnvironmentClass"
                LoggingConfiguration:
                  $ref: "#/components/schemas/LoggingConfigurationInput"
                MaxWorkers:
                  $ref: "#/components/schemas/MaxWorkers"
                MinWorkers:
                  $ref: "#/components/schemas/MinWorkers"
                MaxWebservers:
                  $ref: "#/components/schemas/MaxWebservers"
                MinWebservers:
                  $ref: "#/components/schemas/MinWebservers"
                WorkerReplacementStrategy:
                  $ref: "#/components/schemas/WorkerReplacementStrategy"
                NetworkConfiguration:
                  $ref: "#/components/schemas/UpdateNetworkConfigurationInput"
                PluginsS3Path:
                  $ref: "#/components/schemas/RelativePath"
                PluginsS3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                RequirementsS3Path:
                  $ref: "#/components/schemas/RelativePath"
                RequirementsS3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                Schedulers:
                  $ref: "#/components/schemas/Schedulers"
                SourceBucketArn:
                  $ref: "#/components/schemas/S3BucketArn"
                StartupScriptS3Path:
                  $ref: "#/components/schemas/RelativePath"
                StartupScriptS3ObjectVersion:
                  $ref: "#/components/schemas/S3ObjectVersion"
                WebserverAccessMode:
                  $ref: "#/components/schemas/WebserverAccessMode"
                WeeklyMaintenanceWindowStart:
                  $ref: "#/components/schemas/WeeklyMaintenanceWindowStart"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnvironmentOutput"
  /webtoken/{name}:
    post:
      operationId: CreateWebLoginToken
      description: Creates a web login token for the Airflow Web UI. To learn more, see Creating an Apache Airflow web login token.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWebLoginTokenResponse"
  /restapi/{name}:
    post:
      operationId: InvokeRestApi
      description: Invokes the Apache Airflow REST API on the webserver with the specified inputs. To learn more, see Using the Apache Airflow REST API
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Path:
                  $ref: "#/components/schemas/RestApiPath"
                Method:
                  $ref: "#/components/schemas/RestApiMethod"
                QueryParameters:
                  $ref: "#/components/schemas/Document"
                Body:
                  $ref: "#/components/schemas/RestApiRequestBody"
              required:
                - Path
                - Method
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeRestApiResponse"
  /environments:
    get:
      operationId: ListEnvironments
      description: Lists the Amazon Managed Workflows for Apache Airflow (MWAA) environments.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Retrieves the next page of the results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListEnvironmentsInputMaxResultsInteger"
          description: The maximum number of results to retrieve per page. For example, 5 environments per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentsOutputDisplay"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: 'Lists the key-value tag pairs associated to the Amazon Managed Workflows for Apache Airflow (MWAA) environment. For example, "Environment": "Staging".'
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) of the Amazon MWAA environment. For example, arn:aws:airflow:us-east-1:123456789012:environment/MyMWAAEnvironment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Associates key-value tag pairs to your Amazon Managed Workflows for Apache Airflow (MWAA) environment.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) of the Amazon MWAA environment. For example, arn:aws:airflow:us-east-1:123456789012:environment/MyMWAAEnvironment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: 'Removes key-value tag pairs associated to your Amazon Managed Workflows for Apache Airflow (MWAA) environment. For example, "Environment": "Staging".'
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) of the Amazon MWAA environment. For example, arn:aws:airflow:us-east-1:123456789012:environment/MyMWAAEnvironment.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: 'The key-value tag pair you want to remove. For example, "Environment": "Staging".'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /metrics/environments/{environment_name}:
    post:
      operationId: PublishMetrics
      description: Internal only. Publishes environment health metrics to Amazon CloudWatch.
      parameters:
        - name: environment_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentName"
          description: Internal only. The name of the environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MetricData:
                  $ref: "#/components/schemas/MetricData"
              required:
                - MetricData
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishMetricsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EnvironmentName:
      type: string
      minLength: 1
      maxLength: 80
      pattern: "[a-zA-Z][0-9a-zA-Z-_]*"
    CreateCliTokenResponse:
      type: object
      properties:
        CliToken:
          $ref: "#/components/schemas/Token"
          description: An Airflow CLI login token.
        WebServerHostname:
          $ref: "#/components/schemas/Hostname"
          description: The Airflow web server hostname for the environment.
    Token:
      type: string
    Hostname:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])
    IamRoleArn:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:aws(-[a-z]+)?:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    S3BucketArn:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:aws(-[a-z]+)?:s3:::[a-z0-9.\-]+
    RelativePath:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*
    NetworkConfiguration:
      description: Describes the VPC networking components used to secure and enable network traffic between the Amazon Web Services resources for your environment. For more information, refer to About networking on Amazon MWAA.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetList"
          description: A list of subnet IDs. For more information, refer to About networking on Amazon MWAA.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupList"
          description: A list of security group IDs. For more information, refer to Security in your VPC on Amazon MWAA.
    SubnetList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: subnet-[a-zA-Z0-9\-._]+
    SecurityGroupList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: sg-[a-zA-Z0-9\-._]+
    S3ObjectVersion:
      type: string
      minLength: 1
      maxLength: 1024
    AirflowConfigurationOptions:
      type: object
      properties: {}
    EnvironmentClass:
      type: string
      minLength: 1
      maxLength: 1024
    MaxWorkers:
      type: integer
      minimum: 1
    KmsKey:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: (((arn:aws(-[a-z]+)?:kms:[a-z]{2}-[a-z]+-\d:\d+:)?key\/)?[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}|(arn:aws(-[a-z]+)?:kms:[a-z]{2}-[a-z]+-\d:\d+:)?alias/.+)
    AirflowVersion:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[0-9a-z.]+"
    LoggingConfigurationInput:
      description: Defines the Apache Airflow log types to send to CloudWatch Logs.
      type: object
      properties:
        DagProcessingLogs:
          $ref: "#/components/schemas/ModuleLoggingConfigurationInput"
          description: Publishes Airflow DAG processing logs to CloudWatch Logs.
        SchedulerLogs:
          $ref: "#/components/schemas/ModuleLoggingConfigurationInput"
          description: Publishes Airflow scheduler logs to CloudWatch Logs.
        WebserverLogs:
          $ref: "#/components/schemas/ModuleLoggingConfigurationInput"
          description: Publishes Airflow web server logs to CloudWatch Logs.
        WorkerLogs:
          $ref: "#/components/schemas/ModuleLoggingConfigurationInput"
          description: Publishes Airflow worker logs to CloudWatch Logs.
        TaskLogs:
          $ref: "#/components/schemas/ModuleLoggingConfigurationInput"
          description: Publishes Airflow task logs to CloudWatch Logs.
    ModuleLoggingConfigurationInput:
      description: Enables the Apache Airflow log type (e.g. DagProcessingLogs) and defines the log level to send to CloudWatch Logs (e.g. INFO).
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/LoggingEnabled"
          description: Indicates whether to enable the Apache Airflow log type (e.g. DagProcessingLogs).
        LogLevel:
          $ref: "#/components/schemas/LoggingLevel"
          description: Defines the Apache Airflow log level (e.g. INFO) to send to CloudWatch Logs.
      required:
        - Enabled
        - LogLevel
    LoggingEnabled:
      type: boolean
    LoggingLevel:
      type: string
      enum:
        - CRITICAL
        - ERROR
        - WARNING
        - INFO
        - DEBUG
    WeeklyMaintenanceWindowStart:
      type: string
      minLength: 1
      maxLength: 9
      pattern: .*(MON|TUE|WED|THU|FRI|SAT|SUN):([01]\d|2[0-3]):(00|30).*
    TagMap:
      type: object
      properties: {}
    WebserverAccessMode:
      type: string
      enum:
        - PRIVATE_ONLY
        - PUBLIC_ONLY
        - PUBLIC_AND_PRIVATE
    MinWorkers:
      type: integer
      minimum: 1
    Schedulers:
      type: integer
      maximum: 5
    EndpointManagement:
      type: string
      enum:
        - CUSTOMER
        - SERVICE
    MinWebservers:
      type: integer
      minimum: 1
    MaxWebservers:
      type: integer
      minimum: 1
    CreateEnvironmentOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) returned in the response for the environment.
    EnvironmentArn:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:aws(-[a-z]+)?:airflow:[a-z0-9\-]+:\d{12}:environment/\w+.*
    CreateWebLoginTokenResponse:
      type: object
      properties:
        WebToken:
          $ref: "#/components/schemas/Token"
          description: An Airflow web server login token.
        WebServerHostname:
          $ref: "#/components/schemas/Hostname"
          description: The Airflow web server hostname for the environment.
        IamIdentity:
          $ref: "#/components/schemas/IamIdentity"
          description: The name of the IAM identity creating the web login token. This might be an IAM user, or an assumed or federated identity. For example, assumed-role/Admin/your-name.
        AirflowIdentity:
          $ref: "#/components/schemas/AirflowIdentity"
          description: The user name of the Apache Airflow identity creating the web login token.
    IamIdentity:
      type: string
    AirflowIdentity:
      type: string
      minLength: 1
      maxLength: 64
    DeleteEnvironmentOutput:
      type: object
    GetEnvironmentOutput:
      type: object
      properties:
        Environment:
          $ref: "#/components/schemas/Environment"
          description: An object containing all available details about the environment.
    Environment:
      description: Describes an Amazon Managed Workflows for Apache Airflow (MWAA) environment.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EnvironmentName"
          description: The name of the Amazon MWAA environment. For example, MyMWAAEnvironment.
        Status:
          $ref: "#/components/schemas/EnvironmentStatus"
          description: "The status of the Amazon MWAA environment. Valid values: CREATING - The request to create the environment is in progress. CREATING_SNAPSHOT - The request to update environment details, or upgrade the environment version, is in progress and Amazon MWAA is creating a storage volume snapshot of the Amazon RDS database cluster associated with the environment. A database snapshot is a backup created at a specific point in time. Amazon MWAA uses snapshots to recover environment metadata if the process to update or upgrade an environment fails. CREATE_FAILED - The request to create the environment failed and the environment was not created. AVAILABLE - The request was successful and the environment is ready to use. PENDING - The request was successful, but the process to create the environment is paused until you create the required VPC endpoints in your VPC. After you create the VPC endpoints, the process resumes. UPDATING - The request to update the environment is in progress. ROLLING_BACK - The request to update environment details or upgrade the environment version failed and Amazon MWAA is restoring the environment using the latest storage volume snapshot. DELETING - The request to delete the environment is in progress. DELETED - The request to delete the environment is complete, and the environment has been deleted. UNAVAILABLE - The request failed, but the environment did not return to its previous state and is not stable. UPDATE_FAILED - The request to update the environment failed and the environment was restored to its previous state successfully and is ready to use. MAINTENANCE - The environment is undergoing maintenance. Depending on the type of work Amazon MWAA is performing, your environment might be unavailable during this process. Note that as part of the maintenance work, Amazon MWAA performs with a GRACEFUL workerReplacementStrategy . You can review our troubleshooting guide for a list of common errors and their solutions. For more information, refer to Amazon MWAA troubleshooting."
        Arn:
          $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) of the Amazon MWAA environment.
        CreatedAt:
          $ref: "#/components/schemas/CreatedAt"
          description: The day and time the environment was created.
        WebserverUrl:
          $ref: "#/components/schemas/WebserverUrl"
          description: The Apache Airflow web server host name for the Amazon MWAA environment. For more information, refer to Accessing the Apache Airflow UI.
        ExecutionRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the execution role in IAM that allows MWAA to access Amazon Web Services resources in your environment. For example, arn:aws:iam::123456789:role/my-execution-role. For more information, refer to Amazon MWAA Execution role.
        ServiceRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) for the service-linked role of the environment. For more information, refer to Amazon MWAA Service-linked role.
        KmsKey:
          $ref: "#/components/schemas/KmsKey"
          description: The KMS encryption key used to encrypt the data in your environment.
        AirflowVersion:
          $ref: "#/components/schemas/AirflowVersion"
          description: "The Apache Airflow version on your environment. Valid values: 2.7.2, 2.8.1, 2.9.2, 2.10.1, 2.10.3, 2.11.0, and 3.0.6."
        SourceBucketArn:
          $ref: "#/components/schemas/S3BucketArn"
          description: The Amazon Resource Name (ARN) of the Amazon S3 bucket where your DAG code and supporting files are stored. For example, arn:aws:s3:::my-airflow-bucket-unique-name. For more information, refer to Create an Amazon S3 bucket for Amazon MWAA.
        DagS3Path:
          $ref: "#/components/schemas/RelativePath"
          description: The relative path to the DAGs folder in your Amazon S3 bucket. For example, s3://mwaa-environment/dags. For more information, refer to Adding or updating DAGs.
        PluginsS3Path:
          $ref: "#/components/schemas/RelativePath"
          description: The relative path to the file in your Amazon S3 bucket. For example, s3://mwaa-environment/plugins.zip. For more information, refer to Installing custom plugins.
        PluginsS3ObjectVersion:
          $ref: "#/components/schemas/S3ObjectVersion"
          description: "The version of the plugins.zip file in your Amazon S3 bucket. You must specify the version ID that Amazon S3 assigns to the file. Version IDs are Unicode, UTF-8 encoded, URL-ready, opaque strings that are no more than 1,024 bytes long. The following is an example: 3sL4kqtJlcpXroDTDmJ+rmSpXd3dIbrHY+MTRCxf3vjVBH40Nr8X8gdRQBpUMLUo For more information, refer to Installing custom plugins."
        RequirementsS3Path:
          $ref: "#/components/schemas/RelativePath"
          description: The relative path to the requirements.txt file in your Amazon S3 bucket. For example, s3://mwaa-environment/requirements.txt. For more information, refer to Installing Python dependencies.
        RequirementsS3ObjectVersion:
          $ref: "#/components/schemas/S3ObjectVersion"
          description: "The version of the requirements.txt file on your Amazon S3 bucket. You must specify the version ID that Amazon S3 assigns to the file. Version IDs are Unicode, UTF-8 encoded, URL-ready, opaque strings that are no more than 1,024 bytes long. The following is an example: 3sL4kqtJlcpXroDTDmJ+rmSpXd3dIbrHY+MTRCxf3vjVBH40Nr8X8gdRQBpUMLUo For more information, refer to Installing Python dependencies."
        StartupScriptS3Path:
          $ref: "#/components/schemas/String"
          description: The relative path to the startup shell script in your Amazon S3 bucket. For example, s3://mwaa-environment/startup.sh. Amazon MWAA runs the script as your environment starts, and before running the Apache Airflow process. You can use this script to install dependencies, modify Apache Airflow configuration options, and set environment variables. For more information, refer to Using a startup script.
        StartupScriptS3ObjectVersion:
          $ref: "#/components/schemas/String"
          description: "The version of the startup shell script in your Amazon S3 bucket. You must specify the version ID that Amazon S3 assigns to the file. Version IDs are Unicode, UTF-8 encoded, URL-ready, opaque strings that are no more than 1,024 bytes long. The following is an example: 3sL4kqtJlcpXroDTDmJ+rmSpXd3dIbrHY+MTRCxf3vjVBH40Nr8X8gdRQBpUMLUo For more information, refer to Using a startup script."
        AirflowConfigurationOptions:
          type: object
          properties: {}
          description: A list of key-value pairs containing the Apache Airflow configuration options attached to your environment. For more information, refer to Apache Airflow configuration options.
        EnvironmentClass:
          $ref: "#/components/schemas/EnvironmentClass"
          description: "The environment class type. Valid values: mw1.micro, mw1.small, mw1.medium, mw1.large, mw1.xlarge, and mw1.2xlarge. For more information, refer to Amazon MWAA environment class."
        MaxWorkers:
          $ref: "#/components/schemas/MaxWorkers"
          description: The maximum number of workers that run in your environment. For example, 20.
        NetworkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: Describes the VPC networking components used to secure and enable network traffic between the Amazon Web Services resources for your environment. For more information, refer to About networking on Amazon MWAA.
        LoggingConfiguration:
          $ref: "#/components/schemas/LoggingConfiguration"
          description: The Apache Airflow logs published to CloudWatch Logs.
        LastUpdate:
          $ref: "#/components/schemas/LastUpdate"
          description: The status of the last update on the environment.
        WeeklyMaintenanceWindowStart:
          $ref: "#/components/schemas/WeeklyMaintenanceWindowStart"
          description: "The day and time of the week in Coordinated Universal Time (UTC) 24-hour standard time that weekly maintenance updates are scheduled. For example: TUE:03:30."
        Tags:
          type: object
          properties: {}
          description: 'The key-value tag pairs associated to your environment. For example, "Environment": "Staging". For more information, refer to Tagging Amazon Web Services resources.'
        WebserverAccessMode:
          $ref: "#/components/schemas/WebserverAccessMode"
          description: The Apache Airflow web server access mode. For more information, refer to Apache Airflow access modes.
        MinWorkers:
          $ref: "#/components/schemas/MinWorkers"
          description: The minimum number of workers that run in your environment. For example, 2.
        Schedulers:
          $ref: "#/components/schemas/Schedulers"
          description: The number of Apache Airflow schedulers that run in your Amazon MWAA environment.
        WebserverVpcEndpointService:
          $ref: "#/components/schemas/VpcEndpointServiceName"
          description: The VPC endpoint for the environment's web server.
        DatabaseVpcEndpointService:
          $ref: "#/components/schemas/VpcEndpointServiceName"
          description: The VPC endpoint for the environment's Amazon RDS database.
        CeleryExecutorQueue:
          $ref: "#/components/schemas/CeleryExecutorQueue"
          description: The queue ARN for the environment's Celery Executor. Amazon MWAA uses a Celery Executor to distribute tasks across multiple workers. When you create an environment in a shared VPC, you must provide access to the Celery Executor queue from your VPC.
        EndpointManagement:
          $ref: "#/components/schemas/EndpointManagement"
          description: Defines whether the VPC endpoints configured for the environment are created, and managed, by the customer or by Amazon MWAA. If set to SERVICE, Amazon MWAA will create and manage the required VPC endpoints in your VPC. If set to CUSTOMER, you must create, and manage, the VPC endpoints in your VPC.
        MinWebservers:
          $ref: "#/components/schemas/MinWebservers"
          description: "The minimum number of web servers that you want to run in your environment. Amazon MWAA scales the number of Apache Airflow web servers up to the number you specify for MaxWebservers when you interact with your Apache Airflow environment using Apache Airflow REST API, or the Apache Airflow CLI. As the transaction-per-second rate, and the network load, decrease, Amazon MWAA disposes of the additional web servers, and scales down to the number set in MinxWebserers. Valid values: For environments larger than mw1.micro, accepts values from 2 to 5. Defaults to 2 for all environment sizes except mw1.micro, which defaults to 1."
        MaxWebservers:
          $ref: "#/components/schemas/MaxWebservers"
          description: "The maximum number of web servers that you want to run in your environment. Amazon MWAA scales the number of Apache Airflow web servers up to the number you specify for MaxWebservers when you interact with your Apache Airflow environment using Apache Airflow REST API, or the Apache Airflow CLI. For example, in scenarios where your workload requires network calls to the Apache Airflow REST API with a high transaction-per-second (TPS) rate, Amazon MWAA will increase the number of web servers up to the number set in MaxWebserers. As TPS rates decrease Amazon MWAA disposes of the additional web servers, and scales down to the number set in MinxWebserers. Valid values: For environments larger than mw1.micro, accepts values from 2 to 5. Defaults to 2 for all environment sizes except mw1.micro, which defaults to 1."
    EnvironmentStatus:
      type: string
      enum:
        - CREATING
        - CREATE_FAILED
        - AVAILABLE
        - UPDATING
        - DELETING
        - DELETED
        - UNAVAILABLE
        - UPDATE_FAILED
        - ROLLING_BACK
        - CREATING_SNAPSHOT
        - PENDING
        - MAINTENANCE
    CreatedAt:
      type: string
      format: date-time
    WebserverUrl:
      type: string
      minLength: 1
      maxLength: 256
      pattern: https://.+
    String:
      type: string
    LoggingConfiguration:
      description: Describes the Apache Airflow log types that are published to CloudWatch Logs.
      type: object
      properties:
        DagProcessingLogs:
          $ref: "#/components/schemas/ModuleLoggingConfiguration"
          description: The Airflow DAG processing logs published to CloudWatch Logs and the log level.
        SchedulerLogs:
          $ref: "#/components/schemas/ModuleLoggingConfiguration"
          description: The Airflow scheduler logs published to CloudWatch Logs and the log level.
        WebserverLogs:
          $ref: "#/components/schemas/ModuleLoggingConfiguration"
          description: The Airflow web server logs published to CloudWatch Logs and the log level.
        WorkerLogs:
          $ref: "#/components/schemas/ModuleLoggingConfiguration"
          description: The Airflow worker logs published to CloudWatch Logs and the log level.
        TaskLogs:
          $ref: "#/components/schemas/ModuleLoggingConfiguration"
          description: The Airflow task logs published to CloudWatch Logs and the log level.
    ModuleLoggingConfiguration:
      description: Describes the Apache Airflow log details for the log type (e.g. DagProcessingLogs).
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/LoggingEnabled"
          description: Indicates whether the Apache Airflow log type (e.g. DagProcessingLogs) is enabled.
        LogLevel:
          $ref: "#/components/schemas/LoggingLevel"
          description: The Apache Airflow log level for the log type (e.g. DagProcessingLogs).
        CloudWatchLogGroupArn:
          $ref: "#/components/schemas/CloudWatchLogGroupArn"
          description: The Amazon Resource Name (ARN) for the CloudWatch Logs group where the Apache Airflow log type (e.g. DagProcessingLogs) is published. For example, arn:aws:logs:us-east-1:123456789012:log-group:airflow-MyMWAAEnvironment-MwaaEnvironment-DAGProcessing:*.
    CloudWatchLogGroupArn:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:aws(-[a-z]+)?:logs:[a-z0-9\-]+:\d{12}:log-group:\w+.*
    LastUpdate:
      description: Describes the status of the last update on the environment, and any errors that were encountered.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/UpdateStatus"
          description: The status of the last update on the environment.
        CreatedAt:
          $ref: "#/components/schemas/UpdateCreatedAt"
          description: The day and time of the last update on the environment.
        Error:
          $ref: "#/components/schemas/UpdateError"
          description: The error that was encountered during the last update of the environment.
        Source:
          $ref: "#/components/schemas/UpdateSource"
          description: The source of the last update to the environment. Includes internal processes by Amazon MWAA, such as an environment maintenance update.
        WorkerReplacementStrategy:
          $ref: "#/components/schemas/WorkerReplacementStrategy"
          description: The worker replacement strategy used in the last update of the environment.
    UpdateStatus:
      type: string
      enum:
        - SUCCESS
        - PENDING
        - FAILED
    UpdateCreatedAt:
      type: string
      format: date-time
    UpdateError:
      description: Describes the error(s) encountered with the last update of the environment.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code that corresponds to the error with the last update.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message that corresponds to the error code.
    ErrorCode:
      type: string
    ErrorMessage:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .+
    UpdateSource:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .+
    WorkerReplacementStrategy:
      type: string
      enum:
        - FORCED
        - GRACEFUL
    VpcEndpointServiceName:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: ([a-z.-]+)?com\.amazonaws\.vpce\.[a-z0-9\-]+\.[a-zA-Z_0-9+=,.@\-_/]+
    CeleryExecutorQueue:
      type: string
      minLength: 1
      maxLength: 1224
      pattern: arn:aws(-[a-z]+)?:sqs:[a-z0-9\-]+:\d{12}:[a-zA-Z_0-9+=,.@\-_/]+
    RestApiPath:
      type: string
      minLength: 1
      maxLength: 64
    RestApiMethod:
      type: string
      enum:
        - GET
        - PUT
        - POST
        - PATCH
        - DELETE
    Document:
      type: object
    RestApiRequestBody:
      type: object
    InvokeRestApiResponse:
      type: object
      properties:
        RestApiStatusCode:
          $ref: "#/components/schemas/Integer"
          description: The HTTP status code returned by the Apache Airflow REST API call.
        RestApiResponse:
          $ref: "#/components/schemas/RestApiResponse"
          description: The response data from the Apache Airflow REST API call, provided as a JSON object.
    Integer:
      type: integer
    RestApiResponse:
      type: object
    NextToken:
      type: string
      minLength: 0
      maxLength: 2048
    ListEnvironmentsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 25
    ListEnvironmentsRowDisplay:
      type: object
      properties:
        environment:
          type: string
          description: Returns a list of Amazon MWAA environments.
    ListEnvironmentsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ListEnvironmentsRowDisplay"
    ListTagsForResourceOutput:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The key-value tag pairs associated to your environment. For more information, refer to Tagging Amazon Web Services resources.
    MetricData:
      type: array
      items:
        $ref: "#/components/schemas/MetricDatum"
    MetricDatum:
      description: Internal only. Collects Apache Airflow metrics. To learn more about the metrics published to Amazon CloudWatch, see Amazon MWAA performance metrics in Amazon CloudWatch.
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/String"
          description: Internal only. The name of the metric.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Internal only. The time the metric data was received, expressed as an ISO 8601 datetime string.
        Dimensions:
          $ref: "#/components/schemas/Dimensions"
          description: Internal only. The dimensions associated with the metric.
        Value:
          $ref: "#/components/schemas/Double"
          description: Internal only. The value for the metric.
        Unit:
          $ref: "#/components/schemas/Unit"
          description: Internal only. The unit used to store the metric.
        StatisticValues:
          $ref: "#/components/schemas/StatisticSet"
          description: Internal only. The statistical values for the metric.
      required:
        - MetricName
        - Timestamp
    Timestamp:
      type: string
      format: date-time
    Dimensions:
      type: array
      items:
        $ref: "#/components/schemas/Dimension"
    Dimension:
      description: Internal only. Represents the dimensions of a metric. To learn more about the metrics published to Amazon CloudWatch, see Amazon MWAA performance metrics in Amazon CloudWatch.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Internal only. The name of the dimension.
        Value:
          $ref: "#/components/schemas/String"
          description: Internal only. The value of the dimension.
      required:
        - Name
        - Value
    Double:
      type: number
      format: double
    Unit:
      type: string
      enum:
        - Seconds
        - Microseconds
        - Milliseconds
        - Bytes
        - Kilobytes
        - Megabytes
        - Gigabytes
        - Terabytes
        - Bits
        - Kilobits
        - Megabits
        - Gigabits
        - Terabits
        - Percent
        - Count
        - Bytes/Second
        - Kilobytes/Second
        - Megabytes/Second
        - Gigabytes/Second
        - Terabytes/Second
        - Bits/Second
        - Kilobits/Second
        - Megabits/Second
        - Gigabits/Second
        - Terabits/Second
        - Count/Second
        - None
    StatisticSet:
      description: Internal only. Represents a set of statistics that describe a specific metric. To learn more about the metrics published to Amazon CloudWatch, see Amazon MWAA performance metrics in Amazon CloudWatch.
      type: object
      properties:
        SampleCount:
          $ref: "#/components/schemas/Integer"
          description: Internal only. The number of samples used for the statistic set.
        Sum:
          $ref: "#/components/schemas/Double"
          description: Internal only. The sum of values for the sample set.
        Minimum:
          $ref: "#/components/schemas/Double"
          description: Internal only. The minimum value of the sample set.
        Maximum:
          $ref: "#/components/schemas/Double"
          description: Internal only. The maximum value of the sample set.
    PublishMetricsOutput:
      type: object
    TagResourceOutput:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    UntagResourceOutput:
      type: object
    UpdateNetworkConfigurationInput:
      description: Defines the VPC networking components used to secure and enable network traffic between the Amazon Web Services resources for your environment. For more information, refer to About networking on Amazon MWAA.
      type: object
      properties:
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupList"
          description: A list of security group IDs. A security group must be attached to the same VPC as the subnets. For more information, refer to Security in your VPC on Amazon MWAA.
      required:
        - SecurityGroupIds
    UpdateEnvironmentOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/EnvironmentArn"
          description: The Amazon Resource Name (ARN) of the Amazon MWAA environment. For example, arn:aws:airflow:us-east-1:123456789012:environment/MyMWAAEnvironment.
  x-stackQL-resources:
    cli_tokens:
      id: aws.mwaa.cli_tokens
      name: cli_tokens
      title: cli_tokens
      methods:
        create_cli_token:
          operation:
            $ref: "#/paths/~1clitoken~1{name}/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
      sqlVerbs:
        select: []
        insert:
          - $ref: "#/components/x-stackQL-resources/cli_tokens/methods/create_cli_token"
        update: []
        delete: []
    environments:
      id: aws.mwaa.environments
      name: environments
      title: environments
      methods:
        create_environment:
          operation:
            $ref: "#/paths/~1environments~1{name}/put"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_environment:
          operation:
            $ref: "#/paths/~1environments~1{name}/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        get_environment:
          operation:
            $ref: "#/paths/~1environments~1{name}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Environment
        update_environment:
          operation:
            $ref: "#/paths/~1environments~1{name}/patch"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_environments:
          operation:
            $ref: "#/paths/~1environments/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            overrideMediaType: application/json
            schema_override:
              $ref: "#/components/schemas/ListEnvironmentsOutputDisplay"
            transform:
              type: golang_template_json_v0.3.0
              body: '{{- $lst := index . "Environments" -}}{{- $tok := index . "NextToken" -}}{"line_items": [{{- if eq (kindOf $lst) "slice" -}}{{- range $i, $v := $lst -}}{{- if $i }},{{ end }}{"environment": {{ toJson $v }}}{{- end -}}{{- end -}}]{{- if $tok }}, "NextToken": {{ toJson $tok }}{{- end }}}'
            objectKey: $.line_items
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: NextToken
                location: query
              responseToken:
                key: $.NextToken
                location: body
        publish_metrics:
          operation:
            $ref: "#/paths/~1metrics~1environments~1{environment_name}/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/environments/methods/get_environment"
          - $ref: "#/components/x-stackQL-resources/environments/methods/list_environments"
        insert:
          - $ref: "#/components/x-stackQL-resources/environments/methods/create_environment"
        update:
          - $ref: "#/components/x-stackQL-resources/environments/methods/update_environment"
        delete:
          - $ref: "#/components/x-stackQL-resources/environments/methods/delete_environment"
    web_login_tokens:
      id: aws.mwaa.web_login_tokens
      name: web_login_tokens
      title: web_login_tokens
      methods:
        create_web_login_token:
          operation:
            $ref: "#/paths/~1webtoken~1{name}/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
      sqlVerbs:
        select: []
        insert:
          - $ref: "#/components/x-stackQL-resources/web_login_tokens/methods/create_web_login_token"
        update: []
        delete: []
    tags:
      id: aws.mwaa.tags
      name: tags
      title: tags
      methods:
        list_tags_for_resource:
          operation:
            $ref: "#/paths/~1tags~1{resource_arn}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        tag_resource:
          operation:
            $ref: "#/paths/~1tags~1{resource_arn}/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        untag_resource:
          operation:
            $ref: "#/paths/~1tags~1{resource_arn}/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tags/methods/list_tags_for_resource"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/tags/methods/untag_resource"
          - $ref: "#/components/x-stackQL-resources/tags/methods/tag_resource"
        delete: []
