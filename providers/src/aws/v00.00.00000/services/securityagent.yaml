openapi: 3.0.0
info:
  version: "2025-09-06"
  title: AWS Security Agent
  description: AWS Security Agent
  x-serviceName: securityagent
  x-serviceAlias: securityagent
  x-protocol: rest-json
  x-apiVersion: "2025-09-06"
  x-endpointPrefix: securityagent
servers:
  - url: https://securityagent.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for securityagent
paths:
  /AddArtifact:
    post:
      operationId: AddArtifact
      description: Uploads an artifact to an agent space. Artifacts provide additional context for security testing, such as architecture diagrams, API specifications, or configuration files.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                artifactContent:
                  $ref: "#/components/schemas/Blob"
                artifactType:
                  $ref: "#/components/schemas/ArtifactType"
                fileName:
                  $ref: "#/components/schemas/String"
              required:
                - agentSpaceId
                - artifactContent
                - artifactType
                - fileName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddArtifactOutput"
  /BatchDeleteCodeReviews:
    post:
      operationId: BatchDeleteCodeReviews
      description: Deletes one or more code reviews from an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                codeReviewIds:
                  $ref: "#/components/schemas/CodeReviewIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - codeReviewIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteCodeReviewsOutput"
  /BatchDeletePentests:
    post:
      operationId: BatchDeletePentests
      description: Deletes one or more pentests from an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pentestIds:
                  $ref: "#/components/schemas/PentestIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - pentestIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeletePentestsOutput"
  /BatchGetAgentSpaces:
    post:
      operationId: BatchGetAgentSpaces
      description: Retrieves information about one or more agent spaces.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceIds:
                  $ref: "#/components/schemas/AgentSpaceIdList"
              required:
                - agentSpaceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAgentSpacesOutput"
  /BatchGetArtifactMetadata:
    post:
      operationId: BatchGetArtifactMetadata
      description: Retrieves metadata for one or more artifacts in an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                artifactIds:
                  $ref: "#/components/schemas/ArtifactIds"
              required:
                - agentSpaceId
                - artifactIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetArtifactMetadataOutput"
  /BatchGetCodeReviewJobTasks:
    post:
      operationId: BatchGetCodeReviewJobTasks
      description: Retrieves information about one or more tasks within a code review job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/String"
                codeReviewJobTaskIds:
                  $ref: "#/components/schemas/TaskIdList"
              required:
                - agentSpaceId
                - codeReviewJobTaskIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCodeReviewJobTasksOutput"
  /BatchGetCodeReviewJobs:
    post:
      operationId: BatchGetCodeReviewJobs
      description: Retrieves information about one or more code review jobs in an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                codeReviewJobIds:
                  $ref: "#/components/schemas/CodeReviewJobIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - codeReviewJobIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCodeReviewJobsOutput"
  /BatchGetCodeReviews:
    post:
      operationId: BatchGetCodeReviews
      description: Retrieves information about one or more code reviews in an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                codeReviewIds:
                  $ref: "#/components/schemas/CodeReviewIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - codeReviewIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCodeReviewsOutput"
  /BatchGetFindings:
    post:
      operationId: BatchGetFindings
      description: Retrieves information about one or more security findings in an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                findingIds:
                  $ref: "#/components/schemas/FindingIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - findingIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetFindingsOutput"
  /BatchGetPentestJobTasks:
    post:
      operationId: BatchGetPentestJobTasks
      description: Retrieves information about one or more tasks within a pentest job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/String"
                taskIds:
                  $ref: "#/components/schemas/TaskIdList"
              required:
                - agentSpaceId
                - taskIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPentestJobTasksOutput"
  /BatchGetPentestJobs:
    post:
      operationId: BatchGetPentestJobs
      description: Retrieves information about one or more pentest jobs in an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pentestJobIds:
                  $ref: "#/components/schemas/PentestJobIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - pentestJobIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPentestJobsOutput"
  /BatchGetPentests:
    post:
      operationId: BatchGetPentests
      description: Retrieves information about one or more pentests in an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pentestIds:
                  $ref: "#/components/schemas/PentestIdList"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - pentestIds
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPentestsOutput"
  /BatchGetTargetDomains:
    post:
      operationId: BatchGetTargetDomains
      description: Retrieves information about one or more target domains.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetDomainIds:
                  $ref: "#/components/schemas/TargetDomainIdList"
              required:
                - targetDomainIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetTargetDomainsOutput"
  /CreateAgentSpace:
    post:
      operationId: CreateAgentSpace
      description: Creates a new agent space. An agent space is a dedicated workspace for securing a specific application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AgentName"
                description:
                  $ref: "#/components/schemas/String"
                awsResources:
                  $ref: "#/components/schemas/AWSResources"
                targetDomainIds:
                  $ref: "#/components/schemas/TargetDomainIdList"
                codeReviewSettings:
                  $ref: "#/components/schemas/CodeReviewSettings"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentSpaceOutput"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Creates a new application. An application is the top-level organizational unit that supports IAM Identity Center integration.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                idcInstanceArn:
                  $ref: "#/components/schemas/IdCInstanceArn"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                defaultKmsKeyId:
                  $ref: "#/components/schemas/DefaultKmsKeyId"
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
  /CreateCodeReview:
    post:
      operationId: CreateCodeReview
      description: Creates a new code review configuration in an agent space. A code review defines the parameters for automated security-focused code analysis.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/String"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
                assets:
                  $ref: "#/components/schemas/Assets"
                serviceRole:
                  $ref: "#/components/schemas/ServiceRole"
                logConfig:
                  $ref: "#/components/schemas/CloudWatchLog"
                codeRemediationStrategy:
                  $ref: "#/components/schemas/CodeRemediationStrategy"
              required:
                - title
                - agentSpaceId
                - assets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeReviewOutput"
  /CreateIntegration:
    post:
      operationId: CreateIntegration
      description: Creates a new integration with a third-party provider, such as GitHub, for code review and remediation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  $ref: "#/components/schemas/Provider"
                input:
                  $ref: "#/components/schemas/ProviderInput"
                integrationDisplayName:
                  $ref: "#/components/schemas/String"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - provider
                - input
                - integrationDisplayName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIntegrationOutput"
  /CreateMembership:
    post:
      operationId: CreateMembership
      description: Creates a new membership, granting a user access to an agent space within an application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationId:
                  $ref: "#/components/schemas/ApplicationId"
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                membershipId:
                  $ref: "#/components/schemas/MembershipId"
                memberType:
                  $ref: "#/components/schemas/MembershipType"
                config:
                  $ref: "#/components/schemas/MembershipConfig"
              required:
                - applicationId
                - agentSpaceId
                - membershipId
                - memberType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembershipResponse"
  /CreatePentest:
    post:
      operationId: CreatePentest
      description: Creates a new pentest configuration in an agent space. A pentest defines the security test parameters, including target assets, risk type exclusions, and logging configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/String"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
                assets:
                  $ref: "#/components/schemas/Assets"
                excludeRiskTypes:
                  $ref: "#/components/schemas/RiskTypeList"
                serviceRole:
                  $ref: "#/components/schemas/ServiceRole"
                logConfig:
                  $ref: "#/components/schemas/CloudWatchLog"
                vpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                networkTrafficConfig:
                  $ref: "#/components/schemas/NetworkTrafficConfig"
                codeRemediationStrategy:
                  $ref: "#/components/schemas/CodeRemediationStrategy"
              required:
                - title
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePentestOutput"
  /CreateTargetDomain:
    post:
      operationId: CreateTargetDomain
      description: Creates a new target domain for penetration testing. A target domain is a web domain that must be registered and verified before it can be tested.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetDomainName:
                  $ref: "#/components/schemas/String"
                verificationMethod:
                  $ref: "#/components/schemas/DomainVerificationMethod"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - targetDomainName
                - verificationMethod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTargetDomainOutput"
  /DeleteAgentSpace:
    post:
      operationId: DeleteAgentSpace
      description: Deletes an agent space and all of its associated resources, including pentests, findings, and artifacts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
              required:
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAgentSpaceOutput"
  /DeleteApplication:
    post:
      operationId: DeleteApplication
      description: Deletes an application and its associated configuration, including IAM Identity Center settings.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationId:
                  $ref: "#/components/schemas/ApplicationId"
              required:
                - applicationId
      responses:
        "200":
          description: Success
  /DeleteArtifact:
    post:
      operationId: DeleteArtifact
      description: Deletes an artifact from an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                artifactId:
                  $ref: "#/components/schemas/ArtifactId"
              required:
                - agentSpaceId
                - artifactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteArtifactOutput"
  /DeleteIntegration:
    post:
      operationId: DeleteIntegration
      description: Deletes an integration with a third-party provider.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                integrationId:
                  $ref: "#/components/schemas/IntegrationId"
              required:
                - integrationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIntegrationOutput"
  /DeleteMembership:
    post:
      operationId: DeleteMembership
      description: Deletes a membership, revoking a user's access to an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationId:
                  $ref: "#/components/schemas/ApplicationId"
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                membershipId:
                  $ref: "#/components/schemas/MembershipId"
                memberType:
                  $ref: "#/components/schemas/MembershipType"
              required:
                - applicationId
                - agentSpaceId
                - membershipId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMembershipResponse"
  /DeleteTargetDomain:
    post:
      operationId: DeleteTargetDomain
      description: Deletes a target domain registration. After deletion, the domain can no longer be used for penetration testing.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetDomainId:
                  $ref: "#/components/schemas/TargetDomainId"
              required:
                - targetDomainId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTargetDomainOutput"
  /GetApplication:
    post:
      operationId: GetApplication
      description: Retrieves information about an application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationId:
                  $ref: "#/components/schemas/ApplicationId"
              required:
                - applicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationResponse"
  /GetArtifact:
    post:
      operationId: GetArtifact
      description: Retrieves an artifact from an agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                artifactId:
                  $ref: "#/components/schemas/ArtifactId"
              required:
                - agentSpaceId
                - artifactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetArtifactOutput"
  /GetIntegration:
    post:
      operationId: GetIntegration
      description: Retrieves information about an integration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                integrationId:
                  $ref: "#/components/schemas/IntegrationId"
              required:
                - integrationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIntegrationOutput"
  /oauth2/provider/register:
    post:
      operationId: InitiateProviderRegistration
      description: Initiates the OAuth registration flow with a third-party provider. Returns a redirect URL and CSRF state token for completing the authorization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  $ref: "#/components/schemas/Provider"
              required:
                - provider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateProviderRegistrationOutput"
  /ListAgentSpaces:
    post:
      operationId: ListAgentSpaces
      description: Returns a paginated list of agent space summaries in your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentSpacesOutput"
  /ListApplications:
    post:
      operationId: ListApplications
      description: Returns a paginated list of application summaries in your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /ListArtifacts:
    post:
      operationId: ListArtifacts
      description: Returns a paginated list of artifact summaries for the specified agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/AgentSpaceId"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListArtifactsOutput"
  /ListCodeReviewJobTasks:
    post:
      operationId: ListCodeReviewJobTasks
      description: Returns a paginated list of task summaries for the specified code review job, optionally filtered by step name or category.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentSpaceId:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                codeReviewJobId:
                  $ref: "#/components/schemas/String"
                stepName:
                  $ref: "#/components/schemas/StepName"
                categoryName:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodeReviewJobTasksOutput"
  /ListCodeReviewJobsForCodeReview:
    post:
      operationId: ListCodeReviewJobsForCodeReview
      description: Returns a paginated list of code review job summaries for the specified code review configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                codeReviewId:
                  $ref: "#/components/schemas/String"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - codeReviewId
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodeReviewJobsForCodeReviewOutput"
  /ListCodeReviews:
    post:
      operationId: ListCodeReviews
      description: Returns a paginated list of code review summaries for the specified agent space.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                agentSpaceId:
                  $ref: "#/components/schemas/String"
              required:
                - agentSpaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCodeReviewsOutput"
  /ListDiscoveredEndpoints:
    post:
      operationId: ListDiscoveredEndpoints
      description: Returns a paginated list of endpoints discovered during a pentest job execution.
      parameters: []
      requestBody:
        required: true
        content:
