          $ref: "#/components/schemas/String"
          description: The type of security risk identified by the finding.
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
          description: The risk level of the finding. Valid values include UNKNOWN, INFORMATIONAL, LOW, MEDIUM, HIGH, and CRITICAL.
        riskScore:
          $ref: "#/components/schemas/String"
          description: The numerical risk score of the finding.
