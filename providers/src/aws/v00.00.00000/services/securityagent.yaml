  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns the tags associated with the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource to list tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds tags to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource to tag.
      requestBody:
        required: true
        content:
