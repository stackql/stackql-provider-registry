components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AgentSpaceId:
      description: Unique identifier of the agent space.
      type: string
    Blob:
      type: string
      format: byte
    ArtifactType:
      description: Supported file extension types for artifacts.
      type: string
      enum:
        - TXT
        - PNG
        - JPEG
        - MD
        - PDF
        - DOCX
        - DOC
        - JSON
        - YAML
    String:
      type: string
    AddArtifactOutput:
      type: object
      properties:
        artifactId:
          $ref: "#/components/schemas/ArtifactId"
          description: The unique identifier assigned to the uploaded artifact.
      required:
        - artifactId
    ArtifactId:
      description: The id of the artifact.
      type: string
    CodeReviewIdList:
      description: List of code review IDs.
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchDeleteCodeReviewsOutput:
      description: Output for the BatchDeleteCodeReviews operation.
      type: object
      properties:
        deleted:
          $ref: "#/components/schemas/CodeReviewIdList"
          description: The list of identifiers of the code reviews that were successfully deleted.
        failed:
          $ref: "#/components/schemas/DeleteCodeReviewFailureList"
          description: The list of code reviews that failed to delete, including the reason for each failure.
    DeleteCodeReviewFailureList:
      description: List of code review deletion failures.
      type: array
      items:
        $ref: "#/components/schemas/DeleteCodeReviewFailure"
    DeleteCodeReviewFailure:
      description: Contains information about a code review that failed to delete.
      type: object
      properties:
        codeReviewId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review that failed to delete.
        reason:
          $ref: "#/components/schemas/String"
          description: The reason the code review failed to delete.
    PentestIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchDeletePentestsOutput:
      description: Output for the BatchDeletePentests operation.
      type: object
      properties:
        deleted:
          $ref: "#/components/schemas/PentestList"
          description: The list of pentests that were successfully deleted.
        failed:
          $ref: "#/components/schemas/DeletePentestFailureList"
          description: The list of pentests that failed to delete, including the reason for each failure.
    PentestList:
      type: array
      items:
        $ref: "#/components/schemas/Pentest"
    Pentest:
      description: Represents a pentest configuration that defines the parameters for security testing, including target assets, risk type exclusions, and infrastructure settings.
      type: object
      properties:
        pentestId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the pentest.
        agentSpaceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the agent space that contains the pentest.
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the pentest.
        assets:
          $ref: "#/components/schemas/Assets"
          description: The assets included in the pentest.
        excludeRiskTypes:
          $ref: "#/components/schemas/RiskTypeList"
          description: The list of risk types excluded from the pentest.
        serviceRole:
          $ref: "#/components/schemas/ServiceRole"
          description: The IAM service role used for the pentest.
        logConfig:
          $ref: "#/components/schemas/CloudWatchLog"
          description: The CloudWatch Logs configuration for the pentest.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The VPC configuration for the pentest.
        networkTrafficConfig:
          $ref: "#/components/schemas/NetworkTrafficConfig"
          description: The network traffic configuration for the pentest.
        codeRemediationStrategy:
          $ref: "#/components/schemas/CodeRemediationStrategy"
          description: The code remediation strategy for the pentest.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the pentest was created, in UTC format.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the pentest was last updated, in UTC format.
      required:
        - pentestId
        - agentSpaceId
        - title_
        - assets
    Assets:
      description: The collection of assets used in a pentest configuration, including endpoints, actors, documents, source code repositories, and integrated repositories.
      type: object
      properties:
        endpoints:
          $ref: "#/components/schemas/EndpointList"
          description: The list of endpoints to test during the pentest.
        actors:
          $ref: "#/components/schemas/ActorList"
          description: The list of actors used during penetration testing.
        documents:
          $ref: "#/components/schemas/DocumentList"
          description: The list of documents that provide context for the pentest.
        sourceCode:
          $ref: "#/components/schemas/SourceCodeRepositoryList"
          description: The list of source code repositories to analyze during the pentest.
        integratedRepositories:
          $ref: "#/components/schemas/IntegratedRepositoryList"
          description: The list of integrated repositories associated with the pentest.
    EndpointList:
      type: array
      items:
        $ref: "#/components/schemas/Endpoint"
    Endpoint:
      description: Represents a target endpoint for penetration testing.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/String"
          description: The URI of the endpoint.
    ActorList:
      type: array
      items:
        $ref: "#/components/schemas/Actor"
    Actor:
      description: Represents an actor used during penetration testing. An actor defines a user or entity that interacts with the target application, including authentication credentials and target URIs.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the actor.
        uris:
          $ref: "#/components/schemas/UriList"
          description: The list of URIs that the actor targets during testing.
        authentication:
          $ref: "#/components/schemas/Authentication"
          description: The authentication configuration for the actor.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the actor.
    UriList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Authentication:
      description: The authentication configuration for an actor, specifying the provider type and credentials.
      type: object
      properties:
        providerType:
          $ref: "#/components/schemas/AuthenticationProviderType"
          description: The type of authentication provider. Valid values include SECRETS_MANAGER, AWS_LAMBDA, AWS_IAM_ROLE, and AWS_INTERNAL.
        value:
          $ref: "#/components/schemas/String"
          description: The authentication value, such as a secret ARN, Lambda function ARN, or IAM role ARN, depending on the provider type.
    AuthenticationProviderType:
      description: Type of authentication provider.
      type: string
      enum:
        - SECRETS_MANAGER
        - AWS_LAMBDA
        - AWS_IAM_ROLE
        - AWS_INTERNAL
    DocumentList:
      type: array
      items:
        $ref: "#/components/schemas/DocumentInfo"
    DocumentInfo:
      description: Represents a document that provides context for security testing.
      type: object
      properties:
        s3Location:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 location of the document.
        artifactId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the artifact associated with the document.
    SourceCodeRepositoryList:
      type: array
      items:
        $ref: "#/components/schemas/SourceCodeRepository"
    SourceCodeRepository:
      description: Represents a source code repository used for security analysis during a pentest.
      type: object
      properties:
        s3Location:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 location of the source code repository archive.
    IntegratedRepositoryList:
      type: array
      items:
        $ref: "#/components/schemas/IntegratedRepository"
    IntegratedRepository:
      description: Represents a code repository that is integrated with the service through a third-party provider.
      type: object
      properties:
        integrationId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the integration that provides access to the repository.
        providerResourceId:
          $ref: "#/components/schemas/String"
          description: The provider-specific resource identifier for the repository.
      required:
        - integrationId
        - providerResourceId
    RiskTypeList:
      type: array
      items:
        $ref: "#/components/schemas/RiskType"
    RiskType:
      description: Type of security risk.
      type: string
      enum:
        - CROSS_SITE_SCRIPTING
        - DEFAULT_CREDENTIALS
        - INSECURE_DIRECT_OBJECT_REFERENCE
        - PRIVILEGE_ESCALATION
        - SERVER_SIDE_TEMPLATE_INJECTION
        - COMMAND_INJECTION
        - CODE_INJECTION
        - SQL_INJECTION
        - ARBITRARY_FILE_UPLOAD
        - INSECURE_DESERIALIZATION
        - LOCAL_FILE_INCLUSION
        - INFORMATION_DISCLOSURE
        - PATH_TRAVERSAL
        - SERVER_SIDE_REQUEST_FORGERY
        - JSON_WEB_TOKEN_VULNERABILITIES
        - XML_EXTERNAL_ENTITY
        - FILE_DELETION
        - OTHER
        - GRAPHQL_VULNERABILITIES
        - BUSINESS_LOGIC_VULNERABILITIES
        - CRYPTOGRAPHIC_VULNERABILITIES
        - DENIAL_OF_SERVICE
        - FILE_ACCESS
        - FILE_CREATION
        - DATABASE_MODIFICATION
        - DATABASE_ACCESS
        - OUTBOUND_SERVICE_REQUEST
        - UNKNOWN
    ServiceRole:
      description: ARN of an IAM role that the service can assume to access customer resources.
      type: string
    CloudWatchLog:
      description: The Amazon CloudWatch Logs configuration for pentest job logging.
      type: object
      properties:
        logGroup:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch log group.
        logStream:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch log stream.
    VpcConfig:
      description: The VPC configuration for a pentest, specifying the VPC, security groups, and subnets to use during testing.
      type: object
      properties:
        vpcArn:
          $ref: "#/components/schemas/VpcArn"
          description: The Amazon Resource Name (ARN) of the VPC.
        securityGroupArns:
          $ref: "#/components/schemas/SecurityGroupArns"
          description: The Amazon Resource Names (ARNs) of the security groups for the VPC configuration.
        subnetArns:
          $ref: "#/components/schemas/SubnetArns"
          description: The Amazon Resource Names (ARNs) of the subnets for the VPC configuration.
    VpcArn:
      description: ARN or ID of a VPC.
      type: string
    SecurityGroupArns:
      description: A list of one or more security group ARNs or IDs in the customer VPC.
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupArn"
    SecurityGroupArn:
      description: ARN or ID of a security group.
      type: string
    SubnetArns:
      description: A list of one or more subnet ARNs or IDs in the customer VPC.
      type: array
      items:
        $ref: "#/components/schemas/SubnetArn"
    SubnetArn:
      description: ARN or ID of a subnet.
      type: string
    NetworkTrafficConfig:
      description: The network traffic configuration for a pentest, including custom headers and traffic rules.
      type: object
      properties:
        rules:
          $ref: "#/components/schemas/NetworkTrafficRuleList"
          description: The list of network traffic rules that control which URLs are allowed or denied during testing.
        customHeaders:
          $ref: "#/components/schemas/CustomHeaderList"
          description: The list of custom HTTP headers to include in network traffic during testing.
    NetworkTrafficRuleList:
      description: List of network traffic rules.
      type: array
      items:
        $ref: "#/components/schemas/NetworkTrafficRule"
    NetworkTrafficRule:
      description: A rule that controls network traffic during penetration testing by allowing or denying traffic to specific URL patterns.
      type: object
      properties:
        effect:
          $ref: "#/components/schemas/NetworkTrafficRuleEffect"
          description: The effect of the rule. Valid values are ALLOW and DENY.
        pattern_:
          $ref: "#/components/schemas/String"
          description: The URL pattern to match for the rule.
        networkTrafficRuleType:
          $ref: "#/components/schemas/NetworkTrafficRuleType"
          description: The type of the network traffic rule. Currently, only URL is supported.
    NetworkTrafficRuleEffect:
      description: Effect of a network traffic rule.
      type: string
      enum:
        - ALLOW
        - DENY
    NetworkTrafficRuleType:
      description: Type of network traffic rule.
      type: string
      enum:
        - URL
    CustomHeaderList:
      description: List of custom headers.
      type: array
      items:
        $ref: "#/components/schemas/CustomHeader"
    CustomHeader:
      description: A custom HTTP header to include in network traffic during penetration testing.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the custom header.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the custom header.
    CodeRemediationStrategy:
      description: Strategy for automated code remediation.
      type: string
      enum:
        - AUTOMATIC
        - DISABLED
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    DeletePentestFailureList:
      type: array
      items:
        $ref: "#/components/schemas/DeletePentestFailure"
    DeletePentestFailure:
      description: Contains information about a pentest that failed to delete.
      type: object
      properties:
        pentestId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the pentest that failed to delete.
        reason:
          $ref: "#/components/schemas/String"
          description: The reason the pentest failed to delete.
    AgentSpaceIdList:
      type: array
      items:
        $ref: "#/components/schemas/AgentSpaceId"
    BatchGetAgentSpacesOutput:
      description: Output for the BatchGetAgentSpaces operation.
      type: object
      properties:
        agentSpaces:
          $ref: "#/components/schemas/AgentSpaceList"
          description: The list of agent spaces that were found.
        notFound:
          $ref: "#/components/schemas/AgentSpaceIdList"
          description: The list of agent space identifiers that were not found.
    AgentSpaceList:
      type: array
      items:
        $ref: "#/components/schemas/AgentSpace"
    AgentSpace:
      description: Represents an agent space, which is a dedicated workspace for securing a specific application. An agent space contains the configuration, resources, and settings needed for security testing.
      type: object
      properties:
        agentSpaceId:
          $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the agent space.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the agent space.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the agent space.
        awsResources:
          $ref: "#/components/schemas/AWSResources"
          description: The AWS resources associated with the agent space.
        targetDomainIds:
          $ref: "#/components/schemas/TargetDomainIdList"
          description: The list of target domain identifiers associated with the agent space.
        codeReviewSettings:
          $ref: "#/components/schemas/CodeReviewSettings"
          description: The code review settings for the agent space.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The identifier of the AWS KMS key used to encrypt data in the agent space.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the agent space was created, in UTC format.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the agent space was last updated, in UTC format.
      required:
        - agentSpaceId
        - name
    AWSResources:
      description: The AWS resources associated with an agent space, including VPCs, log groups, S3 buckets, secrets, Lambda functions, and IAM roles.
      type: object
      properties:
        vpcs:
          $ref: "#/components/schemas/VpcConfigs"
          description: The VPC configurations associated with the agent space.
        logGroups:
          $ref: "#/components/schemas/LogGroupArns"
          description: The Amazon Resource Names (ARNs) of the CloudWatch log groups associated with the agent space.
        s3Buckets:
          $ref: "#/components/schemas/S3BucketArns"
          description: The Amazon Resource Names (ARNs) of the S3 buckets associated with the agent space.
        secretArns:
          $ref: "#/components/schemas/SecretArns"
          description: The Amazon Resource Names (ARNs) of the Secrets Manager secrets associated with the agent space.
        lambdaFunctionArns:
          $ref: "#/components/schemas/LambdaFunctionArns"
          description: The Amazon Resource Names (ARNs) of the Lambda functions associated with the agent space.
        iamRoles:
          $ref: "#/components/schemas/IamRoles"
          description: The IAM roles associated with the agent space.
    VpcConfigs:
      type: array
      items:
        $ref: "#/components/schemas/VpcConfig"
    LogGroupArns:
      type: array
      items:
        $ref: "#/components/schemas/LogGroupArn"
    LogGroupArn:
      description: Log group ARN or name for agent space AWS resources.
      type: string
    S3BucketArns:
      type: array
      items:
        $ref: "#/components/schemas/S3BucketArn"
    S3BucketArn:
      description: S3 bucket ARN or name for agent space AWS resources.
      type: string
    SecretArns:
      type: array
      items:
        $ref: "#/components/schemas/SecretArn"
    SecretArn:
      description: Secret ARN or name for agent space AWS resources.
      type: string
    LambdaFunctionArns:
      type: array
      items:
        $ref: "#/components/schemas/LambdaFunctionArn"
    LambdaFunctionArn:
      description: Lambda function ARN or name for agent space AWS resources.
      type: string
    IamRoles:
      type: array
      items:
        $ref: "#/components/schemas/ServiceRole"
    TargetDomainIdList:
      description: List of target domain IDs.
      type: array
      items:
        $ref: "#/components/schemas/String"
    CodeReviewSettings:
      description: The code review settings for an agent space, controlling which types of scanning are enabled.
      type: object
      properties:
        controlsScanning:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether controls scanning is enabled for code reviews.
        generalPurposeScanning:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether general-purpose scanning is enabled for code reviews.
      required:
        - controlsScanning
        - generalPurposeScanning
    Boolean:
      type: boolean
    KmsKeyId:
      description: Identifier of a KMS key. Can be a key ID, key ARN, alias name, or alias ARN.
      type: string
    ArtifactIds:
      type: array
      items:
        $ref: "#/components/schemas/ArtifactId"
    BatchGetArtifactMetadataOutput:
      type: object
      properties:
        artifactMetadataList:
          $ref: "#/components/schemas/ArtifactMetadataList"
          description: The list of artifact metadata items that were found.
      required:
        - artifactMetadataList
    ArtifactMetadataList:
      description: List of metadata objects containing artifacts details.
      type: array
      items:
        $ref: "#/components/schemas/ArtifactMetadataItem"
    ArtifactMetadataItem:
      description: Contains metadata about an artifact.
      type: object
      properties:
        agentSpaceId:
          $ref: "#/components/schemas/AgentSpaceId"
          description: The unique identifier of the agent space that contains the artifact.
        artifactId:
          $ref: "#/components/schemas/ArtifactId"
          description: The unique identifier of the artifact.
        fileName:
          $ref: "#/components/schemas/String"
          description: The file name of the artifact.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the artifact was last updated, in UTC format.
      required:
        - agentSpaceId
        - artifactId
        - fileName
        - updatedAt
    TaskIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchGetCodeReviewJobTasksOutput:
      description: Output for the BatchGetCodeReviewJobTasks operation.
      type: object
      properties:
        codeReviewJobTasks:
          $ref: "#/components/schemas/CodeReviewJobTaskList"
          description: The list of code review job tasks that were found.
        notFound:
          $ref: "#/components/schemas/TaskIdList"
          description: The list of task identifiers that were not found.
    CodeReviewJobTaskList:
      description: List of code review job tasks.
      type: array
      items:
        $ref: "#/components/schemas/CodeReviewJobTask"
    CodeReviewJobTask:
      description: Represents an individual security test task within a code review job. Each task targets a specific risk type and executes independently.
      type: object
      properties:
        taskId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the task.
        codeReviewId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review associated with the task.
        codeReviewJobId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review job that contains the task.
        agentSpaceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the agent space.
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the task.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the task.
        categories:
          $ref: "#/components/schemas/CategoryList"
          description: The list of categories assigned to the task.
        riskType:
          $ref: "#/components/schemas/RiskType"
          description: The type of security risk the task is testing for.
        executionStatus:
          $ref: "#/components/schemas/TaskExecutionStatus"
          description: The current execution status of the task.
        logsLocation:
          $ref: "#/components/schemas/LogLocation"
          description: The location of the task execution logs.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the task was created, in UTC format.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the task was last updated, in UTC format.
      required:
        - taskId
    CategoryList:
      type: array
      items:
        $ref: "#/components/schemas/Category"
    Category:
      description: Represents a category assigned to a security testing task.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the category.
        isPrimary:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this is the primary category for the task.
    TaskExecutionStatus:
      description: Execution status of a task.
      type: string
      enum:
        - IN_PROGRESS
        - ABORTED
        - COMPLETED
        - INTERNAL_ERROR
        - FAILED
    LogLocation:
      description: The log location for a task, specifying where task execution logs are stored.
      type: object
      properties:
        logType:
          $ref: "#/components/schemas/LogType"
          description: The type of log storage. Currently, only CLOUDWATCH is supported.
        cloudWatchLog:
          $ref: "#/components/schemas/CloudWatchLog"
          description: The CloudWatch Logs location for the task logs.
    LogType:
      description: Type of log storage.
      type: string
      enum:
        - CLOUDWATCH
    CodeReviewJobIdList:
      description: List of code review job IDs.
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchGetCodeReviewJobsOutput:
      description: Output for the BatchGetCodeReviewJobs operation.
      type: object
      properties:
        codeReviewJobs:
          $ref: "#/components/schemas/CodeReviewJobList"
          description: The list of code review jobs that were found.
        notFound:
          $ref: "#/components/schemas/CodeReviewJobIdList"
          description: The list of code review job identifiers that were not found.
    CodeReviewJobList:
      description: List of code review jobs.
      type: array
      items:
        $ref: "#/components/schemas/CodeReviewJob"
    CodeReviewJob:
      description: Represents a code review job, which is an execution instance of a code review. A code review job progresses through preflight, static analysis, and finalizing steps.
      type: object
      properties:
        codeReviewJobId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review job.
        codeReviewId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review associated with the job.
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the code review job.
        overview:
          $ref: "#/components/schemas/String"
          description: An overview of the code review job results.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The current status of the code review job.
        documents:
          $ref: "#/components/schemas/DocumentList"
          description: The list of documents providing context for the code review job.
        sourceCode:
          $ref: "#/components/schemas/SourceCodeRepositoryList"
          description: The list of source code repositories analyzed during the code review job.
        steps:
          $ref: "#/components/schemas/StepList"
          description: The list of steps in the code review job execution.
        executionContext:
          $ref: "#/components/schemas/ExecutionContextList"
          description: The execution context messages for the code review job.
        serviceRole:
          $ref: "#/components/schemas/ServiceRole"
          description: The IAM service role used for the code review job.
        logConfig:
          $ref: "#/components/schemas/CloudWatchLog"
          description: The CloudWatch Logs configuration for the code review job.
        errorInformation:
          $ref: "#/components/schemas/ErrorInformation"
          description: Error information if the code review job encountered an error.
        integratedRepositories:
          $ref: "#/components/schemas/IntegratedRepositoryList"
          description: The list of integrated repositories associated with the code review job.
        codeRemediationStrategy:
          $ref: "#/components/schemas/CodeRemediationStrategy"
          description: The code remediation strategy for the code review job.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the code review job was created, in UTC format.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the code review job was last updated, in UTC format.
    JobStatus:
      description: Status of a pentest job.
      type: string
      enum:
        - IN_PROGRESS
        - STOPPING
        - STOPPED
        - FAILED
        - COMPLETED
    StepList:
      description: List of pentest job steps.
      type: array
      items:
        $ref: "#/components/schemas/Step"
    Step:
      description: Represents a step in the pentest job execution pipeline. Steps include preflight, static analysis, pentest, and finalizing.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/StepName"
          description: The name of the step. Valid values include PREFLIGHT, STATIC_ANALYSIS, PENTEST, and FINALIZING.
        status:
          $ref: "#/components/schemas/StepStatus"
          description: The current status of the step.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the step was created, in UTC format.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the step was last updated, in UTC format.
    StepName:
      description: Pentest job step names.
      type: string
      enum:
        - PREFLIGHT
        - STATIC_ANALYSIS
        - PENTEST
        - FINALIZING
    StepStatus:
      description: Pentest job step status.
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
        - FAILED
        - STOPPED
    ExecutionContextList:
      type: array
      items:
        $ref: "#/components/schemas/ExecutionContext"
    ExecutionContext:
      description: Contains contextual information about the execution of a pentest job, such as errors, warnings, or informational messages.
      type: object
      properties:
        contextType:
          $ref: "#/components/schemas/ContextType"
          description: The type of context. Valid values include ERROR, CLIENT_ERROR, WARNING, and INFO.
        context:
          $ref: "#/components/schemas/String"
          description: The context message.
        timestamp:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the context was recorded, in UTC format.
    ContextType:
      description: Category of execution context.
      type: string
      enum:
        - ERROR
        - CLIENT_ERROR
        - WARNING
        - INFO
    ErrorInformation:
      description: Contains error information for a pentest job that encountered an error.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code. Valid values include CLIENT_ERROR, INTERNAL_ERROR, and STOPPED_BY_USER.
        message:
          $ref: "#/components/schemas/String"
          description: A message describing the error.
    ErrorCode:
      description: Error code for pentest job failure.
      type: string
      enum:
        - CLIENT_ERROR
        - INTERNAL_ERROR
        - STOPPED_BY_USER
    BatchGetCodeReviewsOutput:
      description: Output for the BatchGetCodeReviews operation.
      type: object
      properties:
        codeReviews:
          $ref: "#/components/schemas/CodeReviewList"
          description: The list of code reviews that were found.
        notFound:
          $ref: "#/components/schemas/CodeReviewIdList"
          description: The list of code review identifiers that were not found.
    CodeReviewList:
      description: List of code reviews.
      type: array
      items:
        $ref: "#/components/schemas/CodeReview"
    CodeReview:
      description: Represents a code review configuration that defines the parameters for automated security-focused code analysis, including target assets and logging configuration.
      type: object
      properties:
        codeReviewId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review.
        agentSpaceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the agent space that contains the code review.
        title_:
          $ref: "#/components/schemas/String"
          description: The title of the code review.
        assets:
          $ref: "#/components/schemas/Assets"
          description: The assets included in the code review.
        serviceRole:
          $ref: "#/components/schemas/ServiceRole"
          description: The IAM service role used for the code review.
        logConfig:
          $ref: "#/components/schemas/CloudWatchLog"
          description: The CloudWatch Logs configuration for the code review.
        codeRemediationStrategy:
          $ref: "#/components/schemas/CodeRemediationStrategy"
          description: The code remediation strategy for the code review.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the code review was created, in UTC format.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date and time the code review was last updated, in UTC format.
      required:
        - codeReviewId
        - agentSpaceId
        - title_
        - assets
    FindingIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchGetFindingsOutput:
      description: Output for the BatchGetFindings operation.
      type: object
      properties:
        findings:
          $ref: "#/components/schemas/FindingList"
          description: The list of findings that were found.
        notFound:
          $ref: "#/components/schemas/FindingIdList"
          description: The list of finding identifiers that were not found.
    FindingList:
      description: List of findings.
      type: array
      items:
        $ref: "#/components/schemas/Finding"
    Finding:
      description: Represents a security finding discovered during a pentest job. A finding contains details about a vulnerability, including its risk level, confidence, and remediation status.
      type: object
      properties:
        findingId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the finding.
        agentSpaceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the agent space associated with the finding.
        pentestId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the pentest associated with the finding.
        pentestJobId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the pentest job that produced the finding.
        codeReviewId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review associated with the finding.
        codeReviewJobId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the code review job that produced the finding.
        taskId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the task that produced the finding.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the finding.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the finding.
        status:
          $ref: "#/components/schemas/FindingStatus"
