openapi: 3.0.0
info:
  version: "2020-08-07"
  title: Amazon Lex Runtime V2
  description: Amazon Lex Runtime V2
  x-serviceName: lex
  x-serviceAlias: lexv2_runtime
  x-protocol: rest-json
  x-apiVersion: "2020-08-07"
  x-endpointPrefix: runtime-v2-lex
  x-jsonVersion: "1.1"
servers:
  - url: https://runtime-v2-lex.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lexv2-runtime
paths:
  /bots/{bot_id}/botAliases/{bot_alias_id}/botLocales/{locale_id}/sessions/{session_id}:
    delete:
      operationId: DeleteSession
      description: Removes session information for a specified bot, alias, and user ID. You can use this operation to restart a conversation with a bot. When you remove a session, the entire history of the session is removed so that you can start again. You don't need to delete a session. Sessions have a time limit and will expire. Set the session time limit when you create the bot. The default is 5 minutes, but you can specify anything between 1 minute and 24 hours. If you specify a bot or alias ID that doesn't exist, you receive a BadRequestException. If the locale doesn't exist in the bot, or if the locale hasn't been enables for the alias, you receive a BadRequestException.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot that contains the session data.
        - name: bot_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier in use for the bot that contains the session data.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The locale where the session is in use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the session to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSessionResponse"
    get:
      operationId: GetSession
      description: Returns session information for a specified bot, alias, and user. For example, you can use this operation to retrieve session information for a user that has left a long-running session in use. If the bot, alias, or session identifier doesn't exist, Amazon Lex V2 returns a BadRequestException. If the locale doesn't exist or is not enabled for the alias, you receive a BadRequestException.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot that contains the session data.
        - name: bot_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier in use for the bot that contains the session data.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The locale where the session is in use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the session to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"
    post:
      operationId: PutSession
      description: Creates a new session or modifies an existing session with an Amazon Lex V2 bot. Use this operation to enable your application to set the state of the bot.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot that receives the session data.
        - name: bot_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier of the bot that receives the session data.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The locale where the session is in use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the session that receives the session data.
        - name: ResponseContentType
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The message that Amazon Lex V2 returns in the response can be either text or speech depending on the value of this parameter. If the value is text/plain; charset=utf-8, Amazon Lex V2 returns text in the response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  $ref: "#/components/schemas/Messages"
                sessionState:
                  $ref: "#/components/schemas/SessionState"
                requestAttributes:
                  $ref: "#/components/schemas/StringMap"
              required:
                - sessionState
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSessionResponse"
  /bots/{bot_id}/botAliases/{bot_alias_id}/botLocales/{locale_id}/sessions/{session_id}/text:
    post:
      operationId: RecognizeText
      description: Sends user input to Amazon Lex V2. Client applications use this API to send requests to Amazon Lex V2 at runtime. Amazon Lex V2 then interprets the user input using the machine learning model that it build for the bot. In response, Amazon Lex V2 returns the next message to convey to the user and an optional response card to display. If the optional post-fulfillment response is specified, the messages are returned as follows. For more information, see PostFulfillmentStatusSpecification. Success message - Returned if the Lambda function completes successfully and the intent state is fulfilled or ready fulfillment if the message is present. Failed message - The failed message is returned if the Lambda function throws an exception or if the Lambda function returns a failed intent state without a message. Timeout message - If you don't configure a timeout message and a timeout, and the Lambda function doesn't return within 30 seconds, the timeout message is returned. If you configure a timeout, the timeout message is returned when the period times out. For more information, see Completion message.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot that processes the request.
        - name: bot_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier in use for the bot that processes the request.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The locale where the session is in use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the user session that is having the conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  $ref: "#/components/schemas/Text"
                sessionState:
                  $ref: "#/components/schemas/SessionState"
                requestAttributes:
                  $ref: "#/components/schemas/StringMap"
              required:
                - text
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecognizeTextResponse"
  /bots/{bot_id}/botAliases/{bot_alias_id}/botLocales/{locale_id}/sessions/{session_id}/utterance:
    post:
      operationId: RecognizeUtterance
      description: Sends user input to Amazon Lex V2. You can send text or speech. Clients use this API to send text and audio requests to Amazon Lex V2 at runtime. Amazon Lex V2 interprets the user input using the machine learning model built for the bot. The following request fields must be compressed with gzip and then base64 encoded before you send them to Amazon Lex V2. requestAttributes sessionState The following response fields are compressed using gzip and then base64 encoded by Amazon Lex V2. Before you can use these fields, you must decode and decompress them. inputTranscript interpretations messages requestAttributes sessionState The example contains a Java application that compresses and encodes a Java object to send to Amazon Lex V2, and a second that decodes and decompresses a response from Amazon Lex V2. If the optional post-fulfillment response is specified, the messages are returned as follows. For more information, see PostFulfillmentStatusSpecification. Success message - Returned if the Lambda function completes successfully and the intent state is fulfilled or ready fulfillment if the message is present. Failed message - The failed message is returned if the Lambda function throws an exception or if the Lambda function returns a failed intent state without a message. Timeout message - If you don't configure a timeout message and a timeout, and the Lambda function doesn't return within 30 seconds, the timeout message is returned. If you configure a timeout, the timeout message is returned when the period times out. For more information, see Completion message.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot that should receive the request.
        - name: bot_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier in use for the bot that should receive the request.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The locale where the session is in use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the session in use.
        - name: x-amz-lex-session-state
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: Sets the state of the session with the user. You can use this to set the current intent, attributes, context, and dialog action. Use the dialog action to determine the next step that Amazon Lex V2 should use in the conversation with the user. The sessionState field must be compressed using gzip and then base64 encoded before sending to Amazon Lex V2.
        - name: x-amz-lex-request-attributes
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: "Request-specific information passed between the client application and Amazon Lex V2 The namespace x-amz-lex: is reserved for special attributes. Don't create any request attributes for prefix x-amz-lex:. The requestAttributes field must be compressed using gzip and then base64 encoded before sending to Amazon Lex V2."
        - name: Content-Type
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: "Indicates the format for audio input or that the content is text. The header must start with one of the following prefixes: PCM format, audio data must be in little-endian byte order. audio/l16; rate=16000; channels=1 audio/x-l16; sample-rate=16000; channel-count=1 audio/lpcm; sample-rate=8000; sample-size-bits=16; channel-count=1; is-big-endian=false Opus format audio/x-cbr-opus-with-preamble;preamble-size=0;bit-rate=256000;frame-size-milliseconds=4 Text format text/plain; charset=utf-8"
        - name: Response-Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: "The message that Amazon Lex V2 returns in the response can be either text or speech based on the responseContentType value. If the value is text/plain;charset=utf-8, Amazon Lex V2 returns text in the response. If the value begins with audio/, Amazon Lex V2 returns speech in the response. Amazon Lex V2 uses Amazon Polly to generate the speech using the configuration that you specified in the responseContentType parameter. For example, if you specify audio/mpeg as the value, Amazon Lex V2 returns speech in the MPEG format. If the value is audio/pcm, the speech returned is audio/pcm at 16 KHz in 16-bit, little-endian format. The following are the accepted values: audio/mpeg audio/ogg audio/pcm (16 KHz) audio/* (defaults to mpeg) text/plain; charset=utf-8"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inputStream:
                  $ref: "#/components/schemas/BlobStream"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecognizeUtteranceResponse"
  /bots/{bot_id}/botAliases/{bot_alias_id}/botLocales/{locale_id}/sessions/{session_id}/conversation:
    post:
      operationId: StartConversation
      description: "Starts an HTTP/2 bidirectional event stream that enables you to send audio, text, or DTMF input in real time. After your application starts a conversation, users send input to Amazon Lex V2 as a stream of events. Amazon Lex V2 processes the incoming events and responds with streaming text or audio events. Audio input must be in the following format: audio/lpcm sample-rate=8000 sample-size-bits=16 channel-count=1; is-big-endian=false. If the optional post-fulfillment response is specified, the messages are returned as follows. For more information, see PostFulfillmentStatusSpecification. Success message - Returned if the Lambda function completes successfully and the intent state is fulfilled or ready fulfillment if the message is present. Failed message - The failed message is returned if the Lambda function throws an exception or if the Lambda function returns a failed intent state without a message. Timeout message - If you don't configure a timeout message and a timeout, and the Lambda function doesn't return within 30 seconds, the timeout message is returned. If you configure a timeout, the timeout message is returned when the period times out. For more information, see Completion message. If the optional update message is configured, it is played at the specified frequency while the Lambda function is running and the update message state is active. If the fulfillment update message is not active, the Lambda function runs with a 30 second timeout. For more information, see Update message The StartConversation operation is supported only in the following SDKs: AWS SDK for C++ AWS SDK for Java V2 AWS SDK for Ruby V3"
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot to process the request.
        - name: bot_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier in use for the bot that processes the request.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The locale where the session is in use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the user session that is having the conversation.
        - name: x-amz-lex-conversation-mode
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ConversationMode"
          description: The conversation type that you are using the Amazon Lex V2. If the conversation mode is AUDIO you can send both audio and DTMF information. If the mode is TEXT you can only send text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestEventStream:
                  $ref: "#/components/schemas/StartConversationRequestEventStream"
              required:
                - requestEventStream
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartConversationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BotIdentifier:
      type: string
      minLength: 10
      maxLength: 10
      pattern: ^[0-9a-zA-Z]+$
    BotAliasIdentifier:
      type: string
    LocaleId:
      type: string
      minLength: 1
    SessionId:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "[0-9a-zA-Z._:-]+"
    DeleteSessionResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot that contained the session data.
        botAliasId:
          $ref: "#/components/schemas/BotAliasIdentifier"
          description: The alias identifier in use for the bot that contained the session data.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale where the session was used.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The identifier of the deleted session.
    GetSessionResponse:
      type: object
      properties:
        sessionId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the returned session.
        messages:
          $ref: "#/components/schemas/Messages"
          description: A list of messages that were last sent to the user. The messages are ordered based on the order that your returned the messages from your Lambda function or the order that messages are defined in the bot.
        interpretations:
          $ref: "#/components/schemas/Interpretations"
          description: A list of intents that Amazon Lex V2 determined might satisfy the user's utterance. Each interpretation includes the intent, a score that indicates how confident Amazon Lex V2 is that the interpretation is the correct one, and an optional sentiment response that indicates the sentiment expressed in the utterance.
        sessionState:
          $ref: "#/components/schemas/SessionState"
          description: Represents the current state of the dialog between the user and the bot. You can use this to determine the progress of the conversation and what the next action might be.
    NonEmptyString:
      type: string
      minLength: 1
    Messages:
      type: array
      items:
        $ref: "#/components/schemas/Message"
    Message:
      description: Container for text that is returned to the customer..
      type: object
      properties:
        content:
          $ref: "#/components/schemas/Text"
          description: The text of the message.
        contentType:
          $ref: "#/components/schemas/MessageContentType"
          description: Indicates the type of response.
        imageResponseCard:
          $ref: "#/components/schemas/ImageResponseCard"
      required:
        - contentType
    Text:
      type: string
      minLength: 1
      maxLength: 1024
    MessageContentType:
      type: string
      enum:
        - CustomPayload
        - ImageResponseCard
        - PlainText
        - SSML
    ImageResponseCard:
      description: A card that is shown to the user by a messaging platform. You define the contents of the card, the card is displayed by the platform. When you use a response card, the response from the user is constrained to the text associated with a button on the card.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/AttachmentTitle"
          description: The title to display on the response card. The format of the title is determined by the platform displaying the response card.
        subtitle:
          $ref: "#/components/schemas/AttachmentTitle"
          description: The subtitle to display on the response card. The format of the subtitle is determined by the platform displaying the response card.
        imageUrl:
          $ref: "#/components/schemas/AttachmentUrl"
          description: The URL of an image to display on the response card. The image URL must be publicly available so that the platform displaying the response card has access to the image.
        buttons:
          $ref: "#/components/schemas/ButtonsList"
          description: A list of buttons that should be displayed on the response card. The arrangement of the buttons is determined by the platform that displays the button.
      required:
        - title_
    AttachmentTitle:
      type: string
      minLength: 1
      maxLength: 250
    AttachmentUrl:
      type: string
      minLength: 1
      maxLength: 250
    ButtonsList:
      type: array
      items:
        $ref: "#/components/schemas/Button"
    Button:
      description: A button that appears on a response card show to the user.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/ButtonText"
          description: The text that is displayed on the button.
        value:
          $ref: "#/components/schemas/ButtonValue"
          description: The value returned to Amazon Lex V2 when a user chooses the button.
      required:
        - text
        - value
    ButtonText:
      type: string
      minLength: 1
      maxLength: 50
    ButtonValue:
      type: string
      minLength: 1
      maxLength: 50
    Interpretations:
      type: array
      items:
        $ref: "#/components/schemas/Interpretation"
    Interpretation:
      description: An object containing information about an intent that Amazon Lex V2 determined might satisfy the user's utterance. The intents are ordered by the confidence score.
      type: object
      properties:
        nluConfidence:
          $ref: "#/components/schemas/ConfidenceScore"
          description: Determines the threshold where Amazon Lex V2 will insert the AMAZON.FallbackIntent, AMAZON.KendraSearchIntent, or both when returning alternative intents in a response. AMAZON.FallbackIntent and AMAZON.KendraSearchIntent are only inserted if they are configured for the bot.
        sentimentResponse:
          $ref: "#/components/schemas/SentimentResponse"
          description: The sentiment expressed in an utterance. When the bot is configured to send utterances to Amazon Comprehend for sentiment analysis, this field contains the result of the analysis.
        intent:
          $ref: "#/components/schemas/Intent"
          description: A list of intents that might satisfy the user's utterance. The intents are ordered by the confidence score.
        interpretationSource:
          $ref: "#/components/schemas/InterpretationSource"
          description: Specifies the service that interpreted the input.
    ConfidenceScore:
      description: Provides a score that indicates the confidence that Amazon Lex V2 has that an intent is the one that satisfies the user's intent.
      type: object
      properties:
        score:
          $ref: "#/components/schemas/Double"
          description: A score that indicates how confident Amazon Lex V2 is that an intent satisfies the user's intent. Ranges between 0.00 and 1.00. Higher scores indicate higher confidence.
    Double:
      type: number
      format: double
    SentimentResponse:
      description: Provides information about the sentiment expressed in a user's response in a conversation. Sentiments are determined using Amazon Comprehend. Sentiments are only returned if they are enabled for the bot. For more information, see Determine Sentiment in the Amazon Comprehend developer guide.
      type: object
      properties:
        sentiment:
          $ref: "#/components/schemas/SentimentType"
          description: The overall sentiment expressed in the user's response. This is the sentiment most likely expressed by the user based on the analysis by Amazon Comprehend.
        sentimentScore:
          $ref: "#/components/schemas/SentimentScore"
    SentimentType:
      type: string
      enum:
        - MIXED
        - NEGATIVE
        - NEUTRAL
        - POSITIVE
    SentimentScore:
      description: The individual sentiment responses for the utterance.
      type: object
      properties:
        positive:
          $ref: "#/components/schemas/Double"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the POSITIVE sentiment.
        negative:
          $ref: "#/components/schemas/Double"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the NEGATIVE sentiment.
        neutral:
          $ref: "#/components/schemas/Double"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the NEUTRAL sentiment.
        mixed:
          $ref: "#/components/schemas/Double"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the MIXED sentiment.
    Intent:
      description: The current intent that Amazon Lex V2 is attempting to fulfill.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the intent.
        slots:
          type: object
          properties: {}
          description: A map of all of the slots for the intent. The name of the slot maps to the value of the slot. If a slot has not been filled, the value is null.
        state:
          $ref: "#/components/schemas/IntentState"
          description: "Indicates the fulfillment state for the intent. The meanings of each value are as follows: Failed – The bot failed to fulfill the intent. Fulfilled – The bot has completed fulfillment of the intent. FulfillmentInProgress – The bot is in the middle of fulfilling the intent. InProgress – The bot is in the middle of eliciting the slot values that are necessary to fulfill the intent. ReadyForFulfillment – The bot has elicited all the slot values for the intent and is ready to fulfill the intent. Waiting – The bot is waiting for a response from the user (limited to streaming conversations)."
        confirmationState:
          $ref: "#/components/schemas/ConfirmationState"
          description: Indicates whether the intent has been Confirmed, Denied, or None if the confirmation stage has not yet been reached.
      required:
        - name
    IntentState:
      type: string
      enum:
        - Failed
        - Fulfilled
        - InProgress
        - ReadyForFulfillment
        - Waiting
        - FulfillmentInProgress
    ConfirmationState:
      type: string
      enum:
        - Confirmed
        - Denied
        - None
    InterpretationSource:
      type: string
      enum:
        - Bedrock
        - Lex
    SessionState:
      description: The state of the user's session with Amazon Lex V2.
      type: object
      properties:
        dialogAction:
          $ref: "#/components/schemas/DialogAction"
          description: The next step that Amazon Lex V2 should take in the conversation with a user.
        intent:
          $ref: "#/components/schemas/Intent"
          description: The active intent that Amazon Lex V2 is processing.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextsList"
          description: One or more contexts that indicate to Amazon Lex V2 the context of a request. When a context is active, Amazon Lex V2 considers intents with the matching context as a trigger as the next intent in a session.
        sessionAttributes:
          type: object
          properties: {}
          description: Map of key/value pairs representing session-specific context information. It contains application information passed between Amazon Lex V2 and a client application.
        originatingRequestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: A unique identifier for a specific request.
        runtimeHints:
          $ref: "#/components/schemas/RuntimeHints"
          description: Hints for phrases that a customer is likely to use for a slot. Amazon Lex V2 uses the hints to help determine the correct value of a slot.
    DialogAction:
      description: The next action that Amazon Lex V2 should take.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DialogActionType"
          description: 'The next action that the bot should take in its interaction with the user. The following values are possible: Close – Indicates that there will not be a response from the user. For example, the statement "Your order has been placed" does not require a response. ConfirmIntent – The next action is asking the user if the intent is complete and ready to be fulfilled. This is a yes/no question such as "Place the order?" Delegate – The next action is determined by Amazon Lex V2. ElicitIntent – The next action is to elicit an intent from the user. ElicitSlot – The next action is to elicit a slot value from the user.'
        slotToElicit:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the slot that should be elicited from the user.
        slotElicitationStyle:
          $ref: "#/components/schemas/StyleType"
          description: Configures the slot to use spell-by-letter or spell-by-word style. When you use a style on a slot, users can spell out their input to make it clear to your bot. Spell by letter - "b" "o" "b" Spell by word - "b as in boy" "o as in oscar" "b as in boy" For more information, see Using spelling to enter slot values .
        subSlotToElicit:
          $ref: "#/components/schemas/ElicitSubSlot"
          description: The name of the constituent sub slot of the composite slot specified in slotToElicit that should be elicited from the user.
      required:
        - type_
    DialogActionType:
      type: string
      enum:
        - Close
        - ConfirmIntent
        - Delegate
        - ElicitIntent
        - ElicitSlot
        - None
    StyleType:
      type: string
      enum:
        - Default
        - SpellByLetter
        - SpellByWord
    ElicitSubSlot:
      description: The specific constituent sub slot of the composite slot to elicit in dialog action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the slot that should be elicited from the user.
        subSlotToElicit:
          $ref: "#/components/schemas/ElicitSubSlot"
          description: The field is not supported.
      required:
        - name
    ActiveContextsList:
      type: array
      items:
        $ref: "#/components/schemas/ActiveContext"
    ActiveContext:
      description: Contains information about the contexts that a user is using in a session. You can configure Amazon Lex V2 to set a context when an intent is fulfilled, or you can set a context using the , , or operations. Use a context to indicate to Amazon Lex V2 intents that should be used as follow-up intents. For example, if the active context is order-fulfilled, only intents that have order-fulfilled configured as a trigger are considered for follow up.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActiveContextName"
          description: The name of the context.
        timeToLive:
          $ref: "#/components/schemas/ActiveContextTimeToLive"
          description: Indicates the number of turns or seconds that the context is active. Once the time to live expires, the context is no longer returned in a response.
        contextAttributes:
          type: object
          properties: {}
          description: A list of contexts active for the request. A context can be activated when a previous intent is fulfilled, or by including the context in the request. If you don't specify a list of contexts, Amazon Lex V2 will use the current list of contexts for the session. If you specify an empty list, all contexts for the session are cleared.
      required:
        - name
        - timeToLive
        - contextAttributes
    ActiveContextName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z0-9]_?)+$
    ActiveContextTimeToLive:
      description: The time that a context is active. You can specify the time to live in seconds or in conversation turns.
      type: object
      properties:
        timeToLiveInSeconds:
          $ref: "#/components/schemas/ActiveContextTimeToLiveInSeconds"
          description: The number of seconds that the context is active. You can specify between 5 and 86400 seconds (24 hours).
        turnsToLive:
          $ref: "#/components/schemas/ActiveContextTurnsToLive"
          description: The number of turns that the context is active. You can specify up to 20 turns. Each request and response from the bot is a turn.
      required:
        - timeToLiveInSeconds
        - turnsToLive
    ActiveContextTimeToLiveInSeconds:
      type: integer
      minimum: 5
      maximum: 86400
    ActiveContextTurnsToLive:
      type: integer
      minimum: 1
      maximum: 20
    RuntimeHints:
      description: You can provide Amazon Lex V2 with hints to the phrases that a customer is likely to use for a slot. When a slot with hints is resolved, the phrases in the runtime hints are preferred in the resolution. You can provide hints for a maximum of 100 intents. You can provide a maximum of 100 slots. Before you can use runtime hints with an existing bot, you must first rebuild the bot. For more information, see Using runtime hints to improve recognition of slot values.
      type: object
      properties:
        slotHints:
          type: object
          properties: {}
          description: A list of the slots in the intent that should have runtime hints added, and the phrases that should be added for each slot. The first level of the slotHints map is the name of the intent. The second level is the name of the slot within the intent. For more information, see Using hints to improve accuracy. The intent name and slot name must exist.
    StringMap:
      type: object
      properties: {}
    PutSessionResponse:
      type: object
      properties:
        contentType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of response. Same as the type specified in the responseContentType field in the request.
        messages:
          $ref: "#/components/schemas/NonEmptyString"
          description: A list of messages that were last sent to the user. The messages are ordered based on how you return the messages from you Lambda function or the order that the messages are defined in the bot.
        sessionState:
          $ref: "#/components/schemas/NonEmptyString"
          description: A base-64-encoded gzipped field that represents the current state of the dialog between the user and the bot. Use this to determine the progress of the conversation and what the next action may be.
        requestAttributes:
          $ref: "#/components/schemas/NonEmptyString"
          description: A base-64-encoded gzipped field that provides request-specific information passed between the client application and Amazon Lex V2. These are the same as the requestAttribute parameter in the call to the PutSession operation.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The identifier of the session that received the data.
        audioStream:
          $ref: "#/components/schemas/BlobStream"
          description: If the requested content type was audio, the audio version of the message to convey to the user.
    BlobStream:
      type: string
      format: byte
    RecognizeTextResponse:
      type: object
      properties:
        messages:
          $ref: "#/components/schemas/Messages"
          description: A list of messages last sent to the user. The messages are ordered based on the order that you returned the messages from your Lambda function or the order that the messages are defined in the bot.
        sessionState:
          $ref: "#/components/schemas/SessionState"
          description: Represents the current state of the dialog between the user and the bot. Use this to determine the progress of the conversation and what the next action may be.
        interpretations:
          $ref: "#/components/schemas/Interpretations"
          description: A list of intents that Amazon Lex V2 determined might satisfy the user's utterance. Each interpretation includes the intent, a score that indicates now confident Amazon Lex V2 is that the interpretation is the correct one, and an optional sentiment response that indicates the sentiment expressed in the utterance.
        requestAttributes:
          type: object
          properties: {}
          description: The attributes sent in the request.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The identifier of the session in use.
        recognizedBotMember:
          $ref: "#/components/schemas/RecognizedBotMember"
          description: The bot member that recognized the text.
    RecognizedBotMember:
      description: The bot member that processes the request.
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/BotIdentifier"
          description: The identifier of the bot member that processes the request.
        botName:
          $ref: "#/components/schemas/Name"
          description: The name of the bot member that processes the request.
      required:
        - botId
    Name:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([0-9a-zA-Z][_-]?)+$
    SensitiveNonEmptyString:
      type: string
    RecognizeUtteranceResponse:
      type: object
      properties:
        inputMode:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates whether the input mode to the operation was text, speech, or from a touch-tone keypad.
        contentType:
          $ref: "#/components/schemas/NonEmptyString"
          description: Content type as specified in the responseContentType in the request.
        messages:
          $ref: "#/components/schemas/NonEmptyString"
          description: A list of messages that were last sent to the user. The messages are ordered based on the order that you returned the messages from your Lambda function or the order that the messages are defined in the bot. The messages field is compressed with gzip and then base64 encoded. Before you can use the contents of the field, you must decode and decompress the contents. See the example for a simple function to decode and decompress the contents.
        interpretations:
          $ref: "#/components/schemas/NonEmptyString"
          description: A list of intents that Amazon Lex V2 determined might satisfy the user's utterance. Each interpretation includes the intent, a score that indicates how confident Amazon Lex V2 is that the interpretation is the correct one, and an optional sentiment response that indicates the sentiment expressed in the utterance. The interpretations field is compressed with gzip and then base64 encoded. Before you can use the contents of the field, you must decode and decompress the contents. See the example for a simple function to decode and decompress the contents.
        sessionState:
          $ref: "#/components/schemas/NonEmptyString"
          description: Represents the current state of the dialog between the user and the bot. Use this to determine the progress of the conversation and what the next action might be. The sessionState field is compressed with gzip and then base64 encoded. Before you can use the contents of the field, you must decode and decompress the contents. See the example for a simple function to decode and decompress the contents.
        requestAttributes:
          $ref: "#/components/schemas/NonEmptyString"
          description: The attributes sent in the request. The requestAttributes field is compressed with gzip and then base64 encoded. Before you can use the contents of the field, you must decode and decompress the contents.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The identifier of the session in use.
        inputTranscript:
          $ref: "#/components/schemas/NonEmptyString"
          description: The text used to process the request. If the input was an audio stream, the inputTranscript field contains the text extracted from the audio stream. This is the text that is actually processed to recognize intents and slot values. You can use this information to determine if Amazon Lex V2 is correctly processing the audio that you send. The inputTranscript field is compressed with gzip and then base64 encoded. Before you can use the contents of the field, you must decode and decompress the contents. See the example for a simple function to decode and decompress the contents.
        audioStream:
          $ref: "#/components/schemas/BlobStream"
          description: "The prompt or statement to send to the user. This is based on the bot configuration and context. For example, if Amazon Lex V2 did not understand the user intent, it sends the clarificationPrompt configured for the bot. If the intent requires confirmation before taking the fulfillment action, it sends the confirmationPrompt. Another example: Suppose that the Lambda function successfully fulfilled the intent, and sent a message to convey to the user. Then Amazon Lex V2 sends that message in the response."
        recognizedBotMember:
          $ref: "#/components/schemas/NonEmptyString"
          description: The bot member that recognized the utterance.
    ConversationMode:
      type: string
      enum:
        - AUDIO
        - TEXT
    StartConversationRequestEventStream:
      description: Represents a stream of events between your application and Amazon Lex V2.
      type: object
      properties:
        ConfigurationEvent:
          $ref: "#/components/schemas/ConfigurationEvent"
          description: Configuration information sent from your client application to Amazon Lex V2
        AudioInputEvent:
          $ref: "#/components/schemas/AudioInputEvent"
          description: Speech audio sent from your client application to Amazon Lex V2. Audio starts accumulating when Amazon Lex V2 identifies a voice and continues until a natural pause in the speech is found before processing.
        DTMFInputEvent:
          $ref: "#/components/schemas/DTMFInputEvent"
          description: DTMF information sent to Amazon Lex V2 by your application. Amazon Lex V2 accumulates the DMTF information from when the user sends the first character and ends when there's a pause longer that the value configured for the end timeout. when there's a digit that is the configured end character. when Amazon Lex V2 accumulates characters equal to the maximum DTMF character configuration.
        TextInputEvent:
          $ref: "#/components/schemas/TextInputEvent"
          description: Text sent from your client application to Amazon Lex V2. Each TextInputEvent is processed individually.
        PlaybackCompletionEvent:
          $ref: "#/components/schemas/PlaybackCompletionEvent"
          description: Event sent from the client application to Amazon Lex V2 to indicate that it has finished playing audio and that Amazon Lex V2 should start listening for user input.
        DisconnectionEvent:
          $ref: "#/components/schemas/DisconnectionEvent"
          description: Event sent from the client application to indicate to Amazon Lex V2 that the conversation is over.
    ConfigurationEvent:
      description: The initial event sent from the application to Amazon Lex V2 to configure the conversation, including session and request attributes and the response content type.
      type: object
      properties:
        requestAttributes:
          type: object
          properties: {}
          description: "Request-specific information passed between the client application and Amazon Lex V2. The namespace x-amz-lex: is reserved for special attributes. Don't create any request attributes for prefix x-amz-lex:."
        responseContentType:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The message that Amazon Lex V2 returns in the response can be either text or speech based on the responseContentType value. If the value is text/plain;charset=utf-8, Amazon Lex V2 returns text in the response. If the value begins with audio/, Amazon Lex V2 returns speech in the response. Amazon Lex V2 uses Amazon Polly to generate the speech using the configuration that you specified in the requestContentType parameter. For example, if you specify audio/mpeg as the value, Amazon Lex V2 returns speech in the MPEG format. If the value is audio/pcm, the speech returned is audio/pcm in 16-bit, little-endian format. The following are the accepted values: audio/mpeg audio/ogg audio/pcm audio/* (defaults to mpeg) text/plain; charset=utf-8"
        sessionState:
          $ref: "#/components/schemas/SessionState"
        welcomeMessages:
          $ref: "#/components/schemas/Messages"
          description: A list of messages to send to the user. If you set the welcomeMessage field, you must also set the DialogAction structure's type field.
        disablePlayback:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether Amazon Lex V2 should send audio responses to the client application. Set this field to false when the client is operating in a playback mode where audio responses are played to the user. If the client isn't operating in playback mode, such as a text chat application, set this to true so that Amazon Lex V2 doesn't wait for the prompt to finish playing on the client.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier that your application assigns to the event. You can use this to identify events in logs.
        clientTimestampMillis:
          $ref: "#/components/schemas/EpochMillis"
          description: A timestamp set by the client of the date and time that the event was sent to Amazon Lex V2.
      required:
        - responseContentType
    Boolean:
      type: boolean
    EventId:
      type: string
      minLength: 2
      maxLength: 100
      pattern: "[0-9a-zA-Z._:-]+"
    EpochMillis:
      type: integer
      format: int64
    AudioInputEvent:
      description: Represents a chunk of audio sent from the client application to Amazon Lex V2. The audio is all or part of an utterance from the user. Amazon Lex V2 accumulates audio chunks until it recognizes a natural pause in speech before processing the input.
      type: object
      properties:
        audioChunk:
          $ref: "#/components/schemas/AudioChunk"
          description: An encoded stream of audio.
        contentType:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The encoding used for the audio chunk. You must use 8 KHz PCM 16-bit mono-channel little-endian format. The value of the field should be: audio/lpcm; sample-rate=8000; sample-size-bits=16; channel-count=1; is-big-endian=false"
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier that your application assigns to the event. You can use this to identify events in logs.
        clientTimestampMillis:
          $ref: "#/components/schemas/EpochMillis"
          description: A timestamp set by the client of the date and time that the event was sent to Amazon Lex V2.
      required:
        - contentType
    AudioChunk:
      type: string
      format: byte
    DTMFInputEvent:
      description: A DTMF character sent from the client application. DTMF characters are typically sent from a phone keypad to represent numbers. For example, you can have Amazon Lex V2 process a credit card number input from a phone.
      type: object
      properties:
        inputCharacter:
          $ref: "#/components/schemas/DTMFRegex"
          description: "The DTMF character that the user pressed. The allowed characters are A - D, 0 - 9, # and *."
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier that your application assigns to the event. You can use this to identify events in logs.
        clientTimestampMillis:
          $ref: "#/components/schemas/EpochMillis"
          description: A timestamp set by the client of the date and time that the event was sent to Amazon Lex V2.
      required:
        - inputCharacter
    DTMFRegex:
      type: string
      minLength: 1
      maxLength: 1
      pattern: ^[A-D0-9#*]{1}$
    TextInputEvent:
      description: The event sent from your client application to Amazon Lex V2 with text input from the user.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/Text"
          description: The text from the user. Amazon Lex V2 processes this as a complete statement.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier that your application assigns to the event. You can use this to identify events in logs.
        clientTimestampMillis:
          $ref: "#/components/schemas/EpochMillis"
          description: A timestamp set by the client of the date and time that the event was sent to Amazon Lex V2.
      required:
        - text
    PlaybackCompletionEvent:
      description: Event sent from the client application to Amazon Lex V2 to indicate that playback of audio is complete and that Amazon Lex V2 should start processing the user's input.
      type: object
      properties:
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier that your application assigns to the event. You can use this to identify events in logs.
        clientTimestampMillis:
          $ref: "#/components/schemas/EpochMillis"
          description: A timestamp set by the client of the date and time that the event was sent to Amazon Lex V2.
    DisconnectionEvent:
      description: A notification from the client that it is disconnecting from Amazon Lex V2. Sending a DisconnectionEvent event is optional, but can help identify a conversation in logs.
      type: object
      properties:
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier that your application assigns to the event. You can use this to identify events in logs.
        clientTimestampMillis:
          $ref: "#/components/schemas/EpochMillis"
          description: A timestamp set by the client of the date and time that the event was sent to Amazon Lex V2.
    StartConversationResponse:
      type: object
      properties:
        responseEventStream:
          $ref: "#/components/schemas/StartConversationResponseEventStream"
          description: Represents the stream of events from Amazon Lex V2 to your application. The events are encoded as HTTP/2 data frames.
    StartConversationResponseEventStream:
      description: Represents a stream of events between Amazon Lex V2 and your application.
      type: object
      properties:
        PlaybackInterruptionEvent:
          $ref: "#/components/schemas/PlaybackInterruptionEvent"
        TranscriptEvent:
          $ref: "#/components/schemas/TranscriptEvent"
        IntentResultEvent:
          $ref: "#/components/schemas/IntentResultEvent"
          description: Event sent from Amazon Lex V2 to the client application containing the current state of the conversation between the user and Amazon Lex V2.
        TextResponseEvent:
          $ref: "#/components/schemas/TextResponseEvent"
        AudioResponseEvent:
          $ref: "#/components/schemas/AudioResponseEvent"
        HeartbeatEvent:
          $ref: "#/components/schemas/HeartbeatEvent"
        AccessDeniedException:
          $ref: "#/components/schemas/AccessDeniedException"
          description: Exception thrown when the credentials passed with the request are invalid or expired. Also thrown when the credentials in the request do not have permission to access the StartConversation operation.
        ResourceNotFoundException:
          $ref: "#/components/schemas/ResourceNotFoundException"
          description: Exception thrown if one of the input parameters points to a resource that does not exist. For example, if the bot ID specified does not exist.
        ValidationException:
          $ref: "#/components/schemas/ValidationException"
          description: Exception thrown when one or more parameters could not be validated. The message contains the name of the field that isn't valid.
        ThrottlingException:
          $ref: "#/components/schemas/ThrottlingException"
          description: Exception thrown when your application exceeds the maximum number of concurrent requests.
        InternalServerException:
          $ref: "#/components/schemas/InternalServerException"
          description: An error occurred with Amazon Lex V2.
        ConflictException:
          $ref: "#/components/schemas/ConflictException"
          description: Exception thrown when two clients are using the same AWS account, Amazon Lex V2 bot, and session ID.
        DependencyFailedException:
          $ref: "#/components/schemas/DependencyFailedException"
        BadGatewayException:
          $ref: "#/components/schemas/BadGatewayException"
    PlaybackInterruptionEvent:
      description: Event sent from Amazon Lex V2 to indicate to the client application should stop playback of audio. For example, if the client is playing a prompt that asks for the user's telephone number, the user might start to say the phone number before the prompt is complete. Amazon Lex V2 sends this event to the client application to indicate that the user is responding and that Amazon Lex V2 is processing their input.
      type: object
      properties:
        eventReason:
          $ref: "#/components/schemas/PlaybackInterruptionReason"
          description: Indicates the type of user input that Amazon Lex V2 detected.
        causedByEventId:
          $ref: "#/components/schemas/EventId"
          description: The identifier of the event that contained the audio, DTMF, or text that caused the interruption.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier of the event sent by Amazon Lex V2. The identifier is in the form RESPONSE-N, where N is a number starting with one and incremented for each event sent by Amazon Lex V2 in the current session.
    PlaybackInterruptionReason:
      type: string
      enum:
        - DTMF_START_DETECTED
        - TEXT_DETECTED
        - VOICE_START_DETECTED
    TranscriptEvent:
      description: Event sent from Amazon Lex V2 to your client application that contains a transcript of voice audio.
      type: object
      properties:
        transcript:
          $ref: "#/components/schemas/String"
          description: The transcript of the voice audio from the user.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier of the event sent by Amazon Lex V2. The identifier is in the form RESPONSE-N, where N is a number starting with one and incremented for each event sent by Amazon Lex V2 in the current session.
    String:
      type: string
    IntentResultEvent:
      description: Contains the current state of the conversation between the client application and Amazon Lex V2.
      type: object
      properties:
        inputMode:
          $ref: "#/components/schemas/InputMode"
          description: Indicates whether the input to the operation was text, speech, or from a touch-tone keypad.
        interpretations:
          $ref: "#/components/schemas/Interpretations"
          description: A list of intents that Amazon Lex V2 determined might satisfy the user's utterance. Each interpretation includes the intent, a score that indicates how confident Amazon Lex V2 is that the interpretation is the correct one, and an optional sentiment response that indicates the sentiment expressed in the utterance.
        sessionState:
          $ref: "#/components/schemas/SessionState"
        requestAttributes:
          type: object
          properties: {}
          description: The attributes sent in the request.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The identifier of the session in use.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier of the event sent by Amazon Lex V2. The identifier is in the form RESPONSE-N, where N is a number starting with one and incremented for each event sent by Amazon Lex V2 in the current session.
        recognizedBotMember:
          $ref: "#/components/schemas/RecognizedBotMember"
          description: The bot member that is processing the intent.
    InputMode:
      type: string
      enum:
        - Text
        - Speech
        - DTMF
    TextResponseEvent:
      description: The event sent from Amazon Lex V2 to your application with text to present to the user.
      type: object
      properties:
        messages:
          $ref: "#/components/schemas/Messages"
          description: A list of messages to send to the user. Messages are ordered based on the order that you returned the messages from your Lambda function or the order that the messages are defined in the bot.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier of the event sent by Amazon Lex V2. The identifier is in the form RESPONSE-N, where N is a number starting with one and incremented for each event sent by Amazon Lex V2 in the current session.
    AudioResponseEvent:
      description: An event sent from Amazon Lex V2 to your client application containing audio to play to the user.
      type: object
      properties:
        audioChunk:
          $ref: "#/components/schemas/AudioChunk"
          description: A chunk of the audio to play.
        contentType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The encoding of the audio chunk. This is the same as the encoding configure in the contentType field of the ConfigurationEvent.
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier of the event sent by Amazon Lex V2. The identifier is in the form RESPONSE-N, where N is a number starting with one and incremented for each event sent by Amazon Lex V2 in the current session.
    HeartbeatEvent:
      description: Event that Amazon Lex V2 sends to indicate that the stream is still open between the client application and Amazon Lex V2
      type: object
      properties:
        eventId:
          $ref: "#/components/schemas/EventId"
          description: A unique identifier of the event sent by Amazon Lex V2. The identifier is in the form RESPONSE-N, where N is a number starting with one and incremented for each event sent by Amazon Lex V2 in the current session.
    AccessDeniedException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    ResourceNotFoundException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    ValidationException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    ThrottlingException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    InternalServerException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    ConflictException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    DependencyFailedException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
    BadGatewayException:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
      required:
        - message
