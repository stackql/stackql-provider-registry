openapi: 3.0.0
info:
  version: "2019-07-18"
  title: Amazon CodeGuru Profiler
  description: Amazon CodeGuru Profiler
  x-serviceName: codeguru-profiler
  x-serviceAlias: codeguruprofiler
  x-protocol: rest-json
  x-apiVersion: "2019-07-18"
  x-endpointPrefix: codeguru-profiler
  x-jsonVersion: "1.1"
servers:
  - url: https://codeguru-profiler.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codeguruprofiler
paths:
  /profilingGroups/{profiling_group_name}/notificationConfiguration:
    post:
      operationId: AddNotificationChannels
      description: Add up to 2 anomaly notifications channels for a profiling group.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group that we are setting up notifications for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  $ref: "#/components/schemas/Channels"
              required:
                - channels
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddNotificationChannelsResponse"
    get:
      operationId: GetNotificationConfiguration
      description: Get the current configuration for anomaly notifications for a profiling group.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group we want to get the notification configuration for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationConfigurationResponse"
  /profilingGroups/{profiling_group_name}/frames/-/metrics:
    post:
      operationId: BatchGetFrameMetricData
      description: Returns the time series of values for a requested list of frame metrics from a time period.
      parameters:
        - name: endTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end time of the time period for the returned time series values. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        - name: period
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Period"
          description: The duration of the frame metrics used to return the time series values. Specify using the ISO 8601 format. The maximum period duration is one day (PT24H or P1D).
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group associated with the the frame metrics used to return the time series values.
        - name: startTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start time of the time period for the frame metrics used to return the time series values. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        - name: targetResolution
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AggregationPeriod"
          description: The requested resolution of time steps for the returned time series of values. If the requested target resolution is not available due to data not being retained we provide a best effort result by falling back to the most granular available resolution after the target resolution. There are 3 valid values. P1D — 1 day PT1H — 1 hour PT5M — 5 minutes
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                frameMetrics:
                  $ref: "#/components/schemas/FrameMetrics"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetFrameMetricDataResponse"
  /profilingGroups/{profiling_group_name}/configureAgent:
    post:
      operationId: ConfigureAgent
      description: Used by profiler agents to report their current state and to receive remote configuration updates. For example, ConfigureAgent can be used to tell an agent whether to profile or not and for how long to return profiling data.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group for which the configured agent is collecting profiling data.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fleetInstanceId:
                  $ref: "#/components/schemas/FleetInstanceId"
                metadata:
                  $ref: "#/components/schemas/Metadata"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureAgentResponse"
  /profilingGroups:
    post:
      operationId: CreateProfilingGroup
      description: Creates a profiling group.
      parameters:
        - name: clientToken
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: Amazon CodeGuru Profiler uses this universally unique identifier (UUID) to prevent the accidental creation of duplicate profiling groups if there are failures and retries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentOrchestrationConfig:
                  $ref: "#/components/schemas/AgentOrchestrationConfig"
                computePlatform:
                  $ref: "#/components/schemas/ComputePlatform"
                profilingGroupName:
                  $ref: "#/components/schemas/ProfilingGroupName"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - profilingGroupName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfilingGroupResponse"
    get:
      operationId: ListProfilingGroups
      description: Returns a list of profiling groups. The profiling groups are returned as ProfilingGroupDescription objects.
      parameters:
        - name: includeDescription
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A Boolean value indicating whether to include a description. If true, then a list of ProfilingGroupDescription objects that contain detailed information about profiling groups is returned. If false, then a list of profiling group names is returned.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of profiling groups results returned by ListProfilingGroups in paginated output. When this parameter is used, ListProfilingGroups only returns maxResults results in a single page along with a nextToken response element. The remaining results of the initial request can be seen by sending another ListProfilingGroups request with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value returned from a previous paginated ListProfilingGroups request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This token should be treated as an opaque identifier that is only used to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfilingGroupsResponse"
  /profilingGroups/{profiling_group_name}:
    delete:
      operationId: DeleteProfilingGroup
      description: Deletes a profiling group.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group to delete.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProfilingGroupResponse"
    get:
      operationId: DescribeProfilingGroup
      description: Returns a ProfilingGroupDescription object that contains information about the requested profiling group.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProfilingGroupResponse"
    put:
      operationId: UpdateProfilingGroup
      description: Updates a profiling group.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentOrchestrationConfig:
                  $ref: "#/components/schemas/AgentOrchestrationConfig"
              required:
                - agentOrchestrationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfilingGroupResponse"
  /internal/findingsReports:
    get:
      operationId: GetFindingsReportAccountSummary
      description: Returns a list of FindingsReportSummary objects that contain analysis results for all profiling groups in your AWS account.
      parameters:
        - name: dailyReportsOnly
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A Boolean value indicating whether to only return reports from daily profiles. If set to True, only analysis data from daily profiles is returned. If set to False, analysis data is returned from smaller time windows (for example, one hour).
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results returned by GetFindingsReportAccountSummary in paginated output. When this parameter is used, GetFindingsReportAccountSummary only returns maxResults results in a single page along with a nextToken response element. The remaining results of the initial request can be seen by sending another GetFindingsReportAccountSummary request with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value returned from a previous paginated GetFindingsReportAccountSummary request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This token should be treated as an opaque identifier that is only used to retrieve the next items in a list and not for other programmatic purposes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingsReportAccountSummaryResponse"
  /profilingGroups/{profiling_group_name}/policy:
    get:
      operationId: GetPolicy
      description: Returns the JSON-formatted resource-based policy on a profiling group.
      parameters:
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyResponse"
  /profilingGroups/{profiling_group_name}/profile:
    get:
      operationId: GetProfile
      description: "Gets the aggregated profile of a profiling group for a specified time range. Amazon CodeGuru Profiler collects posted agent profiles for a profiling group into aggregated profiles. `<note>` `<p>` Because aggregated profiles expire over time `<code>`GetProfile</code> is not idempotent. </p> </note> `<p>` Specify the time range for the requested aggregated profile using 1 or 2 of the following parameters: `<code>`startTime</code>, `<code>`endTime</code>, `<code>`period</code>. The maximum time range allowed is 7 days. If you specify all 3 parameters, an exception is thrown. If you specify only `<code>`period</code>, the latest aggregated profile is returned. </p> `<p>` Aggregated profiles are available with aggregation periods of 5 minutes, 1 hour, and 1 day, aligned to UTC. The aggregation period of an aggregated profile determines how long it is retained. For more information, see <a href=\"https://docs.aws.amazon.com/codeguru/latest/profiler-api/API_AggregatedProfileTime.html\"> `<code>`AggregatedProfileTime</code> </a>. The aggregated profile's aggregation period determines how long it is retained by CodeGuru Profiler. </p> `<ul>` `<li>` `<p>` If the aggregation period is 5 minutes, the aggregated profile is retained for 15 days. </p> </li> `<li>` `<p>` If the aggregation period is 1 hour, the aggregated profile is retained for 60 days. </p> </li> `<li>` `<p>` If the aggregation period is 1 day, the aggregated profile is retained for 3 years. </p> </li> </ul> `<p>`There are two use cases for calling `<code>`GetProfile</code>.</p> `<ol>` `<li>` `<p>` If you want to return an aggregated profile that already exists, use <a href=\"https://docs.aws.amazon.com/codeguru/latest/profiler-api/API_ListProfileTimes.html\"> `<code>`ListProfileTimes</code> </a> to view the time ranges of existing aggregated profiles. Use them in a `<code>`GetProfile</code> request to return a specific, existing aggregated profile. </p> </li> `<li>` `<p>` If you want to return an aggregated profile for a time range that doesn't align with an existing aggregated profile, then CodeGuru Profiler makes a best effort to combine existing aggregated profiles from the requested time range and return them as one aggregated profile. </p> `<p>` If aggregated profiles do not exist for the full time range requested, then aggregated profiles for a smaller time range are returned. For example, if the requested time range is from 00:00 to 00:20, and the existing aggregated profiles are from 00:15 and 00:25, then the aggregated profiles from 00:15 to 00:20 are returned. </p> </li> </ol>"
      parameters:
        - name: Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: 'The format of the returned profiling data. The format maps to the Accept and Content-Type headers of the HTTP request. You can specify one of the following: or the default . `<ul>` `<li>` `<p>` `<code>`application/json</code> — standard JSON format </p> </li> `<li>` `<p>` `<code>`application/x-amzn-ion</code> — the Amazon Ion data format. For more information, see <a href="http://amzn.github.io/ion-docs/">Amazon Ion</a>. </p> </li> </ul>'
        - name: endTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end time of the requested profile. Specify using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC. If you specify endTime, then you must also specify period or startTime, but not both.
        - name: maxDepth
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxDepth"
          description: The maximum depth of the stacks in the code that is represented in the aggregated profile. For example, if CodeGuru Profiler finds a method A, which calls method B, which calls method C, which calls method D, then the depth is 4. If the maxDepth is set to 2, then the aggregated profile contains representations of methods A and B.
        - name: period
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Period"
          description: Used with startTime or endTime to specify the time range for the returned aggregated profile. Specify using the ISO 8601 format. For example, P1DT1H1M1S. `<p>` To get the latest aggregated profile, specify only `<code>`period</code>. </p>
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group to get.
        - name: startTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start time of the profile to get. Specify using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC. `<p>` If you specify `<code>`startTime</code>, then you must also specify `<code>`period</code> or `<code>`endTime</code>, but not both. </p>
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResponse"
  /internal/profilingGroups/{profiling_group_name}/recommendations:
    get:
      operationId: GetRecommendations
      description: Returns a list of Recommendation objects that contain recommendations for a profiling group for a given time period. A list of Anomaly objects that contains details about anomalies detected in the profiling group for the same time period is also returned.
      parameters:
        - name: endTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start time of the profile to get analysis data about. You must specify startTime and endTime. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        - name: locale
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Locale"
          description: The language used to provide analysis. Specify using a string that is one of the following BCP 47 language codes. de-DE - German, Germany en-GB - English, United Kingdom en-US - English, United States es-ES - Spanish, Spain fr-FR - French, France it-IT - Italian, Italy ja-JP - Japanese, Japan ko-KR - Korean, Republic of Korea pt-BR - Portugese, Brazil zh-CN - Chinese, China zh-TW - Chinese, Taiwan
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group to get analysis data about.
        - name: startTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end time of the profile to get analysis data about. You must specify startTime and endTime. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecommendationsResponse"
  /internal/profilingGroups/{profiling_group_name}/findingsReports:
    get:
      operationId: ListFindingsReports
      description: List the available reports for a given profiling group and time range.
      parameters:
        - name: dailyReportsOnly
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A Boolean value indicating whether to only return reports from daily profiles. If set to True, only analysis data from daily profiles is returned. If set to False, analysis data is returned from smaller time windows (for example, one hour).
        - name: endTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end time of the profile to get analysis data about. You must specify startTime and endTime. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of report results returned by ListFindingsReports in paginated output. When this parameter is used, ListFindingsReports only returns maxResults results in a single page along with a nextToken response element. The remaining results of the initial request can be seen by sending another ListFindingsReports request with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value returned from a previous paginated ListFindingsReportsRequest request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This token should be treated as an opaque identifier that is only used to retrieve the next items in a list and not for other programmatic purposes.
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group from which to search for analysis data.
        - name: startTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start time of the profile to get analysis data about. You must specify startTime and endTime. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFindingsReportsResponse"
  /profilingGroups/{profiling_group_name}/profileTimes:
    get:
      operationId: ListProfileTimes
      description: Lists the start times of the available aggregated profiles of a profiling group for an aggregation period within the specified time range.
      parameters:
        - name: endTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The end time of the time range from which to list the profiles.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of profile time results returned by ListProfileTimes in paginated output. When this parameter is used, ListProfileTimes only returns maxResults results in a single page with a nextToken response element. The remaining results of the initial request can be seen by sending another ListProfileTimes request with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value returned from a previous paginated ListProfileTimes request where maxResults was used and the results exceeded the value of that parameter. Pagination continues from the end of the previous results that returned the nextToken value. This token should be treated as an opaque identifier that is only used to retrieve the next items in a list and not for other programmatic purposes.
        - name: orderBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderBy"
          description: The order (ascending or descending by start time of the profile) to use when listing profiles. Defaults to TIMESTAMP_DESCENDING.
        - name: period
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AggregationPeriod"
          description: The aggregation period. This specifies the period during which an aggregation profile collects posted agent profiles for a profiling group. There are 3 valid values. P1D — 1 day PT1H — 1 hour PT5M — 5 minutes
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group.
        - name: startTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The start time of the time range from which to list the profiles.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfileTimesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of the tags that are assigned to a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupArn"
          description: The Amazon Resource Name (ARN) of the resource that contains the tags to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Use to assign one or more tags to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupArn"
          description: The Amazon Resource Name (ARN) of the resource that the tags are added to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Use to remove one or more tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupArn"
          description: The Amazon Resource Name (ARN) of the resource that contains the tags to remove.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: A list of tag keys. Existing tags of resources with keys in this list are removed from the specified resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /profilingGroups/{profiling_group_name}/agentProfile:
    post:
      operationId: PostAgentProfile
      description: Submits profiling data to an aggregated profile of a profiling group. To get an aggregated profile that is created with this profiling data, use GetProfile .
      parameters:
        - name: Content-Type
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: 'The format of the submitted profiling data. The format maps to the Accept and Content-Type headers of the HTTP request. You can specify one of the following: or the default . `<ul>` `<li>` `<p>` `<code>`application/json</code> — standard JSON format </p> </li> `<li>` `<p>` `<code>`application/x-amzn-ion</code> — the Amazon Ion data format. For more information, see <a href="http://amzn.github.io/ion-docs/">Amazon Ion</a>. </p> </li> </ul>'
        - name: profileToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: Amazon CodeGuru Profiler uses this universally unique identifier (UUID) to prevent the accidental submission of duplicate profiling data if there are failures and retries.
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group with the aggregated profile that receives the submitted profiling data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentProfile:
                  $ref: "#/components/schemas/AgentProfile"
              required:
                - agentProfile
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAgentProfileResponse"
  /profilingGroups/{profiling_group_name}/policy/{action_group}:
    put:
      operationId: PutPermission
      description: Adds permissions to a profiling group's resource-based policy that are provided using an action group. If a profiling group doesn't have a resource-based policy, one is created for it using the permissions in the action group and the roles and users in the principals parameter. `<p>` The one supported action group that can be added is `<code>`agentPermission</code> which grants `<code>`ConfigureAgent</code> and `<code>`PostAgent</code> permissions. For more information, see <a href="https://docs.aws.amazon.com/codeguru/latest/profiler-ug/resource-based-policies.html">Resource-based policies in CodeGuru Profiler</a> in the `<i>`Amazon CodeGuru Profiler User Guide</i>, <a href="https://docs.aws.amazon.com/codeguru/latest/profiler-api/API_ConfigureAgent.html"> `<code>`ConfigureAgent</code> </a>, and <a href="https://docs.aws.amazon.com/codeguru/latest/profiler-api/API_PostAgentProfile.html"> `<code>`PostAgentProfile</code> </a>. </p> `<p>` The first time you call `<code>`PutPermission</code> on a profiling group, do not specify a `<code>`revisionId</code> because it doesn't have a resource-based policy. Subsequent calls must provide a `<code>`revisionId</code> to specify which revision of the resource-based policy to add the permissions to. </p> `<p>` The response contains the profiling group's JSON-formatted resource policy. </p>
      parameters:
        - name: action_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ActionGroup"
          description: Specifies an action group that contains permissions to add to a profiling group resource. One action group is supported, agentPermissions, which grants permission to perform actions required by the profiling agent, ConfigureAgent and PostAgentProfile permissions.
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group to grant access to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                principals:
                  $ref: "#/components/schemas/Principals"
                revisionId:
                  $ref: "#/components/schemas/RevisionId"
              required:
                - principals
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutPermissionResponse"
    delete:
      operationId: RemovePermission
      description: Removes permissions from a profiling group's resource-based policy that are provided using an action group. The one supported action group that can be removed is agentPermission which grants ConfigureAgent and PostAgent permissions. For more information, see Resource-based policies in CodeGuru Profiler in the Amazon CodeGuru Profiler User Guide, ConfigureAgent , and PostAgentProfile .
      parameters:
        - name: action_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ActionGroup"
          description: Specifies an action group that contains the permissions to remove from a profiling group's resource-based policy. One action group is supported, agentPermissions, which grants ConfigureAgent and PostAgentProfile permissions.
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group.
        - name: revisionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RevisionId"
          description: A universally unique identifier (UUID) for the revision of the resource-based policy from which you want to remove permissions.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemovePermissionResponse"
  /profilingGroups/{profiling_group_name}/notificationConfiguration/{channel_id}:
    delete:
      operationId: RemoveNotificationChannel
      description: Remove one anomaly notifications channel for a profiling group.
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelId"
          description: The id of the channel that we want to stop receiving notifications.
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group we want to change notification configuration for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveNotificationChannelResponse"
  /internal/profilingGroups/{profiling_group_name}/anomalies/{anomaly_instance_id}/feedback:
    post:
      operationId: SubmitFeedback
      description: Sends feedback to CodeGuru Profiler about whether the anomaly detected by the analysis is useful or not.
      parameters:
        - name: anomaly_instance_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnomalyInstanceId"
          description: The universally unique identifier (UUID) of the AnomalyInstance object that is included in the analysis data.
        - name: profiling_group_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group that is associated with the analysis data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  $ref: "#/components/schemas/String"
                type:
                  $ref: "#/components/schemas/FeedbackType"
              required:
                - type
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitFeedbackResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ProfilingGroupName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[\w-]+$
    Channels:
      type: array
      items:
        $ref: "#/components/schemas/Channel"
    Channel:
      description: Notification medium for users to get alerted for events that occur in application profile. We support SNS topic as a notification channel.
      type: object
      properties:
        eventPublishers:
          $ref: "#/components/schemas/EventPublishers"
          description: List of publishers for different type of events that may be detected in an application from the profile. Anomaly detection is the only event publisher in Profiler.
        id:
          $ref: "#/components/schemas/ChannelId"
          description: Unique identifier for each Channel in the notification configuration of a Profiling Group. A random UUID for channelId is used when adding a channel to the notification configuration if not specified in the request.
        uri:
          $ref: "#/components/schemas/ChannelUri"
          description: Unique arn of the resource to be used for notifications. We support a valid SNS topic arn as a channel uri.
      required:
        - eventPublishers
        - uri
    EventPublishers:
      type: array
      items:
        $ref: "#/components/schemas/EventPublisher"
    EventPublisher:
      type: string
      enum:
        - AnomalyDetection
    ChannelId:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    ChannelUri:
      description: Channel URI uniquely identifies a Notification Channel. TopicArn is the uri for an SNS channel, emailId is uri for an email channel etc. Currently we only support SNS channels and thus required to be an ARN
      type: string
    AddNotificationChannelsResponse:
      description: The structure representing the AddNotificationChannelsResponse.
      type: object
      properties:
        notificationConfiguration:
          $ref: "#/components/schemas/NotificationConfiguration"
          description: The new notification configuration for this profiling group.
    NotificationConfiguration:
      description: The configuration for notifications stored for each profiling group. This includes up to to two channels and a list of event publishers associated with each channel.
      type: object
      properties:
        channels:
          $ref: "#/components/schemas/Channels"
          description: List of up to two channels to be used for sending notifications for events detected from the application profile.
    Timestamp:
      type: string
      format: date-time
    Period:
      type: string
      minLength: 1
      maxLength: 64
    AggregationPeriod:
      type: string
      enum:
        - PT5M
        - PT1H
        - P1D
    FrameMetrics:
      type: array
      items:
        $ref: "#/components/schemas/FrameMetric"
    FrameMetric:
      description: The frame name, metric type, and thread states. These are used to derive the value of the metric for the frame.
      type: object
      properties:
        frameName:
          $ref: "#/components/schemas/String"
          description: Name of the method common across the multiple occurrences of a frame in an application profile.
        threadStates:
          $ref: "#/components/schemas/ThreadStates"
          description: List of application runtime thread states used to get the counts for a frame a derive a metric value.
        type_:
          $ref: "#/components/schemas/MetricType"
          description: A type of aggregation that specifies how a metric for a frame is analyzed. The supported value AggregatedRelativeTotalTime is an aggregation of the metric value for one frame that is calculated across the occurrences of all frames in a profile.
      required:
        - frameName
        - threadStates
        - type_
    String:
      type: string
    ThreadStates:
      type: array
      items:
        $ref: "#/components/schemas/String"
    MetricType:
      type: string
      enum:
        - AggregatedRelativeTotalTime
    BatchGetFrameMetricDataResponse:
      description: The structure representing the BatchGetFrameMetricDataResponse.
      type: object
      properties:
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the time period for the returned time series values. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        endTimes:
          $ref: "#/components/schemas/ListOfTimestamps"
          description: List of instances, or time steps, in the time series. For example, if the period is one day (PT24H)), and the resolution is five minutes (PT5M), then there are 288 endTimes in the list that are each five minutes appart.
        frameMetricData:
          $ref: "#/components/schemas/FrameMetricData"
          description: Details of the metrics to request a time series of values. The metric includes the name of the frame, the aggregation type to calculate the metric value for the frame, and the thread states to use to get the count for the metric value of the frame.
        resolution:
          $ref: "#/components/schemas/AggregationPeriod"
          description: Resolution or granularity of the profile data used to generate the time series. This is the value used to jump through time steps in a time series. There are 3 valid values. P1D — 1 day PT1H — 1 hour PT5M — 5 minutes
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the time period for the returned time series values. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        unprocessedEndTimes:
          type: object
          properties: {}
          description: List of instances which remained unprocessed. This will create a missing time step in the list of end times.
      required:
        - endTime
        - endTimes
        - frameMetricData
        - resolution
        - startTime
        - unprocessedEndTimes
    ListOfTimestamps:
      type: array
      items:
        $ref: "#/components/schemas/TimestampStructure"
    TimestampStructure:
      description: A data type that contains a Timestamp object. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/Timestamp"
          description: A Timestamp. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
      required:
        - value
    FrameMetricData:
      type: array
      items:
        $ref: "#/components/schemas/FrameMetricDatum"
    FrameMetricDatum:
      description: Information about a frame metric and its values.
      type: object
      properties:
        frameMetric:
          $ref: "#/components/schemas/FrameMetric"
        values:
          $ref: "#/components/schemas/FrameMetricValues"
          description: A list of values that are associated with a frame metric.
      required:
        - frameMetric
        - values
    FrameMetricValues:
      type: array
      items:
        $ref: "#/components/schemas/FrameMetricValue"
    FrameMetricValue:
      type: number
      format: double
    FleetInstanceId:
      type: string
      minLength: 1
      maxLength: 255
    Metadata:
      type: object
      properties: {}
    ConfigureAgentResponse:
      description: The structure representing the configureAgentResponse.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/AgentConfiguration"
          description: An AgentConfiguration object that specifies if an agent profiles or not and for how long to return profiling data.
      required:
        - configuration
    AgentConfiguration:
      description: The response of ConfigureAgent that specifies if an agent profiles or not and for how long to return profiling data.
      type: object
      properties:
        agentParameters:
          type: object
          properties: {}
          description: "Parameters used by the profiler. The valid parameters are: MaxStackDepth - The maximum depth of the stacks in the code that is represented in the profile. For example, if CodeGuru Profiler finds a method A, which calls method B, which calls method C, which calls method D, then the depth is 4. If the maxDepth is set to 2, then the profiler evaluates A and B. MemoryUsageLimitPercent - The percentage of memory that is used by the profiler. MinimumTimeForReportingInMilliseconds - The minimum time in milliseconds between sending reports. ReportingIntervalInMilliseconds - The reporting interval in milliseconds used to report profiles. SamplingIntervalInMilliseconds - The sampling interval in milliseconds that is used to profile samples."
        periodInSeconds:
          $ref: "#/components/schemas/Integer"
          description: How long a profiling agent should send profiling data using ConfigureAgent . For example, if this is set to 300, the profiling agent calls ConfigureAgent every 5 minutes to submit the profiled data collected during that period.
        shouldProfile:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean that specifies whether the profiling agent collects profiling data or not. Set to true to enable profiling.
      required:
        - periodInSeconds
        - shouldProfile
    Integer:
      type: integer
    Boolean:
      type: boolean
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[\w-]+$
    AgentOrchestrationConfig:
      description: Specifies whether profiling is enabled or disabled for a profiling group. It is used by ConfigureAgent to enable or disable profiling for a profiling group.
      type: object
      properties:
        profilingEnabled:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean that specifies whether the profiling agent collects profiling data or not. Set to true to enable profiling.
      required:
        - profilingEnabled
    ComputePlatform:
      type: string
      enum:
        - Default
        - AWSLambda
    TagsMap:
      type: object
      properties: {}
    CreateProfilingGroupResponse:
      description: The structure representing the createProfilingGroupResponse.
      type: object
      properties:
        profilingGroup:
          $ref: "#/components/schemas/ProfilingGroupDescription"
          description: The returned ProfilingGroupDescription object that contains information about the created profiling group.
      required:
        - profilingGroup
    ProfilingGroupDescription:
      description: Contains information about a profiling group.
      type: object
      properties:
        agentOrchestrationConfig:
          $ref: "#/components/schemas/AgentOrchestrationConfig"
          description: An AgentOrchestrationConfig object that indicates if the profiling group is enabled for profiled or not.
        arn:
          $ref: "#/components/schemas/ProfilingGroupArn"
          description: The Amazon Resource Name (ARN) identifying the profiling group resource.
        computePlatform:
          $ref: "#/components/schemas/ComputePlatform"
          description: The compute platform of the profiling group. If it is set to AWSLambda, then the profiled application runs on AWS Lambda. If it is set to Default, then the profiled application runs on a compute platform that is not AWS Lambda, such an Amazon EC2 instance, an on-premises server, or a different platform. The default is Default.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the profiling group was created. Specify using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        name:
          $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group.
        profilingStatus:
          $ref: "#/components/schemas/ProfilingStatus"
          description: A ProfilingStatus object that includes information about the last time a profile agent pinged back, the last time a profile was received, and the aggregation period and start time for the most recent aggregated profile.
        tags:
          type: object
          properties: {}
          description: A list of the tags that belong to this profiling group.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the profiling group was last updated. Specify using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
    ProfilingGroupArn:
      type: string
    ProfilingStatus:
      description: Profiling status includes information about the last time a profile agent pinged back, the last time a profile was received, and the aggregation period and start time for the most recent aggregated profile.
      type: object
      properties:
        latestAgentOrchestratedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the profiling agent most recently pinged back. Specify using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        latestAgentProfileReportedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the most recent profile was received. Specify using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        latestAggregatedProfile:
          $ref: "#/components/schemas/AggregatedProfileTime"
          description: An AggregatedProfileTime object that contains the aggregation period and start time for an aggregated profile.
    AggregatedProfileTime:
      description: Specifies the aggregation period and aggregation start time for an aggregated profile. An aggregated profile is used to collect posted agent profiles during an aggregation period. There are three possible aggregation periods (1 day, 1 hour, or 5 minutes).
      type: object
      properties:
        period:
          $ref: "#/components/schemas/AggregationPeriod"
          description: The aggregation period. This indicates the period during which an aggregation profile collects posted agent profiles for a profiling group. Use one of three valid durations that are specified using the ISO 8601 format. P1D — 1 day PT1H — 1 hour PT5M — 5 minutes
        start:
          $ref: "#/components/schemas/Timestamp"
          description: The time that aggregation of posted agent profiles for a profiling group starts. The aggregation profile contains profiles posted by the agent starting at this time for an aggregation period specified by the period property of the AggregatedProfileTime object. Specify start using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
    DeleteProfilingGroupResponse:
      description: The structure representing the deleteProfilingGroupResponse.
      type: object
    DescribeProfilingGroupResponse:
      description: The structure representing the describeProfilingGroupResponse.
      type: object
      properties:
        profilingGroup:
          $ref: "#/components/schemas/ProfilingGroupDescription"
          description: The returned ProfilingGroupDescription object that contains information about the requested profiling group.
      required:
        - profilingGroup
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    PaginationToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[\w-]+$
    GetFindingsReportAccountSummaryResponse:
      description: The structure representing the GetFindingsReportAccountSummaryResponse.
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value to include in a future GetFindingsReportAccountSummary request. When the results of a GetFindingsReportAccountSummary request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
        reportSummaries:
          $ref: "#/components/schemas/FindingsReportSummaries"
          description: The return list of FindingsReportSummary objects taht contain summaries of analysis results for all profiling groups in your AWS account.
      required:
        - reportSummaries
    FindingsReportSummaries:
      type: array
      items:
        $ref: "#/components/schemas/FindingsReportSummary"
    FindingsReportSummary:
      description: Information about potential recommendations that might be created from the analysis of profiling data.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/FindingsReportId"
          description: The universally unique identifier (UUID) of the recommendation report.
        profileEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the period during which the metric is flagged as anomalous. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        profileStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the profile the analysis data is about. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        profilingGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the profiling group that is associated with the analysis data.
        totalNumberOfFindings:
          $ref: "#/components/schemas/Integer"
          description: The total number of different recommendations that were found by the analysis.
    FindingsReportId:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    GetNotificationConfigurationResponse:
      description: The structure representing the GetNotificationConfigurationResponse.
      type: object
      properties:
        notificationConfiguration:
          $ref: "#/components/schemas/NotificationConfiguration"
          description: The current notification configuration for this profiling group.
      required:
        - notificationConfiguration
    GetPolicyResponse:
      description: The structure representing the getPolicyResponse.
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/String"
          description: The JSON-formatted resource-based policy attached to the ProfilingGroup.
        revisionId:
          $ref: "#/components/schemas/RevisionId"
          description: A unique identifier for the current revision of the returned policy.
      required:
        - policy
        - revisionId
    RevisionId:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    MaxDepth:
      type: integer
      minimum: 1
      maximum: 10000
    GetProfileResponse:
      description: The structure representing the getProfileResponse.
      type: object
      properties:
        contentEncoding:
          $ref: "#/components/schemas/String"
          description: The content encoding of the profile.
        contentType:
          $ref: "#/components/schemas/String"
          description: The content type of the profile in the payload. It is either application/json or the default application/x-amzn-ion.
        profile:
          $ref: "#/components/schemas/AggregatedProfile"
          description: Information about the profile.
      required:
        - contentType
        - profile
    AggregatedProfile:
      type: string
      format: byte
    Locale:
      description: "BCP47 language code. Supported locales: de-DE, en-GB, en-US, es-ES, fr-FR, it-IT, ja-JP, ko-KR, pt-BR, zh-CN, zh-TW"
      type: string
    GetRecommendationsResponse:
      description: The structure representing the GetRecommendationsResponse.
      type: object
      properties:
        anomalies:
          $ref: "#/components/schemas/Anomalies"
          description: The list of anomalies that the analysis has found for this profile.
        profileEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the profile the analysis data is about. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        profileStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the profile the analysis data is about. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        profilingGroupName:
          $ref: "#/components/schemas/ProfilingGroupName"
          description: The name of the profiling group the analysis data is about.
        recommendations:
          $ref: "#/components/schemas/Recommendations"
          description: The list of recommendations that the analysis found for this profile.
      required:
        - anomalies
        - profileEndTime
        - profileStartTime
        - profilingGroupName
        - recommendations
    Anomalies:
      type: array
      items:
        $ref: "#/components/schemas/Anomaly"
    Anomaly:
      description: Details about an anomaly in a specific metric of application profile. The anomaly is detected using analysis of the metric data over a period of time.
      type: object
      properties:
        instances:
          $ref: "#/components/schemas/AnomalyInstances"
          description: A list of the instances of the detected anomalies during the requested period.
        metric:
          $ref: "#/components/schemas/Metric"
          description: Details about the metric that the analysis used when it detected the anomaly. The metric includes the name of the frame that was analyzed with the type and thread states used to derive the metric value for that frame.
        reason:
          $ref: "#/components/schemas/String"
          description: The reason for which metric was flagged as anomalous.
      required:
        - instances
        - metric
        - reason
    AnomalyInstances:
      type: array
      items:
        $ref: "#/components/schemas/AnomalyInstance"
    AnomalyInstance:
      description: The specific duration in which the metric is flagged as anomalous.
      type: object
      properties:
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the period during which the metric is flagged as anomalous. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        id:
          $ref: "#/components/schemas/String"
          description: The universally unique identifier (UUID) of an instance of an anomaly in a metric.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the period during which the metric is flagged as anomalous. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        userFeedback:
          $ref: "#/components/schemas/UserFeedback"
          description: Feedback type on a specific instance of anomaly submitted by the user.
      required:
        - id
        - startTime
    UserFeedback:
      description: Feedback that can be submitted for each instance of an anomaly by the user. Feedback is be used for improvements in generating recommendations for the application.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FeedbackType"
          description: Optional Positive or Negative feedback submitted by the user about whether the recommendation is useful or not.
      required:
        - type_
    FeedbackType:
      type: string
      enum:
        - Positive
        - Negative
    Metric:
      description: Details about the metric that the analysis used when it detected the anomaly. The metric what is analyzed to create recommendations. It includes the name of the frame that was analyzed and the type and thread states used to derive the metric value for that frame.
      type: object
      properties:
        frameName:
          $ref: "#/components/schemas/String"
          description: The name of the method that appears as a frame in any stack in a profile.
        threadStates:
          $ref: "#/components/schemas/Strings"
          description: The list of application runtime thread states that is used to calculate the metric value for the frame.
        type_:
          $ref: "#/components/schemas/MetricType"
          description: A type that specifies how a metric for a frame is analyzed. The supported value AggregatedRelativeTotalTime is an aggregation of the metric value for one frame that is calculated across the occurences of all frames in a profile.
      required:
        - frameName
        - threadStates
        - type_
    Strings:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Recommendations:
      type: array
      items:
        $ref: "#/components/schemas/Recommendation"
    Recommendation:
      description: A potential improvement that was found from analyzing the profiling data.
      type: object
      properties:
        allMatchesCount:
          $ref: "#/components/schemas/Integer"
          description: How many different places in the profile graph triggered a match.
        allMatchesSum:
          $ref: "#/components/schemas/Double"
          description: How much of the total sample count is potentially affected.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: End time of the profile that was used by this analysis. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        pattern_:
          $ref: "#/components/schemas/Pattern"
          description: The pattern that analysis recognized in the profile to make this recommendation.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the profile that was used by this analysis. This is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
        topMatches:
          $ref: "#/components/schemas/Matches"
          description: List of the matches with most impact.
      required:
        - allMatchesCount
        - allMatchesSum
        - endTime
        - pattern_
        - startTime
        - topMatches
    Double:
      type: number
      format: double
    Pattern:
      description: A set of rules used to make a recommendation during an analysis.
      type: object
      properties:
        countersToAggregate:
          $ref: "#/components/schemas/Strings"
          description: A list of the different counters used to determine if there is a match.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the recommendation. This explains a potential inefficiency in a profiled application.
        id:
          $ref: "#/components/schemas/String"
          description: The universally unique identifier (UUID) of this pattern.
        name:
          $ref: "#/components/schemas/String"
          description: The name for this pattern.
        resolutionSteps:
          $ref: "#/components/schemas/String"
          description: A string that contains the steps recommended to address the potential inefficiency.
        targetFrames:
          $ref: "#/components/schemas/TargetFrames"
          description: A list of frame names that were searched during the analysis that generated a recommendation.
        thresholdPercent:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of time an application spends in one method that triggers a recommendation. The percentage of time is the same as the percentage of the total gathered sample counts during analysis.
    TargetFrames:
      type: array
      items:
        $ref: "#/components/schemas/TargetFrame"
    TargetFrame:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Percentage:
      type: number
      format: double
      minimum: 0
      maximum: 100
    Matches:
      type: array
      items:
        $ref: "#/components/schemas/Match"
    Match:
      description: The part of a profile that contains a recommendation found during analysis.
      type: object
      properties:
        frameAddress:
          $ref: "#/components/schemas/String"
          description: The location in the profiling graph that contains a recommendation found during analysis.
        targetFramesIndex:
          $ref: "#/components/schemas/Integer"
          description: The target frame that triggered a match.
        thresholdBreachValue:
          $ref: "#/components/schemas/Double"
          description: The value in the profile data that exceeded the recommendation threshold.
    ListFindingsReportsResponse:
      description: The structure representing the ListFindingsReportsResponse.
      type: object
      properties:
        findingsReportSummaries:
          $ref: "#/components/schemas/FindingsReportSummaries"
          description: The list of analysis results summaries.
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value to include in a future ListFindingsReports request. When the results of a ListFindingsReports request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
      required:
        - findingsReportSummaries
    OrderBy:
      type: string
      enum:
        - TimestampDescending
        - TimestampAscending
    ListProfileTimesResponse:
      description: The structure representing the listProfileTimesResponse.
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value to include in a future ListProfileTimes request. When the results of a ListProfileTimes request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
        profileTimes:
          $ref: "#/components/schemas/ProfileTimes"
          description: The list of start times of the available profiles for the aggregation period in the specified time range.
      required:
        - profileTimes
    ProfileTimes:
      type: array
      items:
        $ref: "#/components/schemas/ProfileTime"
    ProfileTime:
      description: Contains the start time of a profile.
      type: object
      properties:
        start:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of a profile. It is specified using the ISO 8601 format. For example, 2020-06-01T13:15:02.001Z represents 1 millisecond past June 1, 2020 1:15:02 PM UTC.
    ListProfilingGroupsResponse:
      description: The structure representing the listProfilingGroupsResponse.
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The nextToken value to include in a future ListProfilingGroups request. When the results of a ListProfilingGroups request exceed maxResults, this value can be used to retrieve the next page of results. This value is null when there are no more results to return.
        profilingGroupNames:
          $ref: "#/components/schemas/ProfilingGroupNames"
          description: A returned list of profiling group names. A list of the names is returned only if includeDescription is false, otherwise a list of ProfilingGroupDescription objects is returned.
        profilingGroups:
          $ref: "#/components/schemas/ProfilingGroupDescriptions"
          description: A returned list ProfilingGroupDescription objects. A list of ProfilingGroupDescription objects is returned only if includeDescription is true, otherwise a list of profiling group names is returned.
      required:
        - profilingGroupNames
    ProfilingGroupNames:
      type: array
      items:
        $ref: "#/components/schemas/ProfilingGroupName"
    ProfilingGroupDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/ProfilingGroupDescription"
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: The list of tags assigned to the specified resource. This is the list of tags returned in the response.
    AgentProfile:
      type: string
      format: byte
    PostAgentProfileResponse:
      description: The structure representing the postAgentProfileResponse.
      type: object
    ActionGroup:
      type: string
      enum:
        - agentPermissions
    Principals:
      type: array
      items:
        $ref: "#/components/schemas/Principal"
    Principal:
      type: string
    PutPermissionResponse:
      description: The structure representing the putPermissionResponse.
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/String"
          description: The JSON-formatted resource-based policy on the profiling group that includes the added permissions.
        revisionId:
          $ref: "#/components/schemas/RevisionId"
          description: A universally unique identifier (UUID) for the revision of the resource-based policy that includes the added permissions. The JSON-formatted policy is in the policy element of the response.
      required:
        - policy
        - revisionId
    RemoveNotificationChannelResponse:
      description: The structure representing the RemoveNotificationChannelResponse.
      type: object
      properties:
        notificationConfiguration:
          $ref: "#/components/schemas/NotificationConfiguration"
          description: The new notification configuration for this profiling group.
    RemovePermissionResponse:
      description: The structure representing the removePermissionResponse.
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/String"
          description: The JSON-formatted resource-based policy on the profiling group after the specified permissions were removed.
        revisionId:
          $ref: "#/components/schemas/RevisionId"
          description: A universally unique identifier (UUID) for the revision of the resource-based policy after the specified permissions were removed. The updated JSON-formatted policy is in the policy element of the response.
      required:
        - policy
        - revisionId
    AnomalyInstanceId:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    SubmitFeedbackResponse:
      description: The structure representing the SubmitFeedbackResponse.
      type: object
    TagResourceResponse:
      type: object
    TagKeys:
      type: array
      items:
        $ref: "#/components/schemas/String"
    UntagResourceResponse:
      type: object
    UpdateProfilingGroupResponse:
      description: The structure representing the updateProfilingGroupResponse.
      type: object
      properties:
        profilingGroup:
          $ref: "#/components/schemas/ProfilingGroupDescription"
          description: A ProfilingGroupDescription that contains information about the returned updated profiling group.
      required:
        - profilingGroup
