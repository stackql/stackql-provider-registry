openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Partner Central Benefits API
  description: Partner Central Benefits API
  x-serviceName: partnercentral-benefits
  x-serviceAlias: partnercentral_benefits
  x-protocol: json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: partnercentral-benefits
  x-targetPrefix: PartnerCentralBenefitsService
  x-jsonVersion: "1.0"
servers:
  - url: https://partnercentral-benefits.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for partnercentral-benefits
paths:
  /AmendBenefitApplication:
    post:
      operationId: AmendBenefitApplication
      description: Modifies an existing benefit application by applying amendments to specific fields while maintaining revision control.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.AmendBenefitApplication
            default: PartnerCentralBenefitsService.AmendBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                ClientToken:
                  $ref: "#/components/schemas/AmendBenefitApplicationInputClientTokenString"
                  description: A unique, case-sensitive identifier to ensure idempotent processing of the amendment request.
                Revision:
                  $ref: "#/components/schemas/String"
                  description: The current revision number of the benefit application to ensure optimistic concurrency control.
                Identifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to be amended.
                AmendmentReason:
                  $ref: "#/components/schemas/AmendBenefitApplicationInputAmendmentReasonString"
                  description: A descriptive reason explaining why the benefit application is being amended.
                Amendments:
                  $ref: "#/components/schemas/AmendmentList"
                  description: A list of specific field amendments to apply to the benefit application.
              required:
                - Catalog
                - ClientToken
                - Revision
                - Identifier
                - AmendmentReason
                - Amendments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmendBenefitApplicationOutput"
  /AssociateBenefitApplicationResource:
    post:
      operationId: AssociateBenefitApplicationResource
      description: Links an AWS resource to an existing benefit application for tracking and management purposes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.AssociateBenefitApplicationResource
            default: PartnerCentralBenefitsService.AssociateBenefitApplicationResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                BenefitApplicationIdentifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to associate the resource with.
                ResourceArn:
                  $ref: "#/components/schemas/AssociateBenefitApplicationResourceInputResourceArnString"
                  description: The Amazon Resource Name (ARN) of the AWS resource to associate with the benefit application.
              required:
                - BenefitApplicationIdentifier
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateBenefitApplicationResourceOutput"
  /CancelBenefitApplication:
    post:
      operationId: CancelBenefitApplication
      description: Cancels a benefit application that is currently in progress, preventing further processing.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.CancelBenefitApplication
            default: PartnerCentralBenefitsService.CancelBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                ClientToken:
                  $ref: "#/components/schemas/CancelBenefitApplicationInputClientTokenString"
                  description: A unique, case-sensitive identifier to ensure idempotent processing of the cancellation request.
                Identifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to cancel.
                Reason:
                  $ref: "#/components/schemas/CancelBenefitApplicationInputReasonString"
                  description: A descriptive reason explaining why the benefit application is being cancelled.
              required:
                - ClientToken
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBenefitApplicationOutput"
  /CreateBenefitApplication:
    post:
      operationId: CreateBenefitApplication
      description: Creates a new benefit application for a partner to request access to AWS benefits and programs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.CreateBenefitApplication
            default: PartnerCentralBenefitsService.CreateBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog to create the application in.
                ClientToken:
                  $ref: "#/components/schemas/CreateBenefitApplicationInputClientTokenString"
                  description: A unique, case-sensitive identifier to ensure idempotent processing of the creation request.
                Name:
                  $ref: "#/components/schemas/BenefitApplicationName"
                  description: A human-readable name for the benefit application.
                Description:
                  $ref: "#/components/schemas/BenefitApplicationDescription"
                  description: A detailed description of the benefit application and its intended use.
                BenefitIdentifier:
                  $ref: "#/components/schemas/CreateBenefitApplicationInputBenefitIdentifierString"
                  description: The unique identifier of the benefit being requested in this application.
                FulfillmentTypes:
                  $ref: "#/components/schemas/FulfillmentTypes"
                  description: The types of fulfillment requested for this benefit application (e.g., credits, access, disbursement).
                BenefitApplicationDetails:
                  $ref: "#/components/schemas/Document"
                  description: Detailed information and requirements specific to the benefit being requested.
                Tags:
                  $ref: "#/components/schemas/CreateBenefitApplicationInputTagsList"
                  description: Key-value pairs to categorize and organize the benefit application.
                AssociatedResources:
                  $ref: "#/components/schemas/CreateBenefitApplicationInputAssociatedResourcesList"
                  description: AWS resources that are associated with this benefit application.
                PartnerContacts:
                  $ref: "#/components/schemas/CreateBenefitApplicationInputPartnerContactsList"
                  description: Contact information for partner representatives responsible for this benefit application.
                FileDetails:
                  $ref: "#/components/schemas/CreateBenefitApplicationInputFileDetailsList"
                  description: Supporting documents and files attached to the benefit application.
              required:
                - ClientToken
                - BenefitIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBenefitApplicationOutput"
  /DisassociateBenefitApplicationResource:
    post:
      operationId: DisassociateBenefitApplicationResource
      description: Removes the association between an AWS resource and a benefit application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.DisassociateBenefitApplicationResource
            default: PartnerCentralBenefitsService.DisassociateBenefitApplicationResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                BenefitApplicationIdentifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to disassociate the resource from.
                ResourceArn:
                  $ref: "#/components/schemas/DisassociateBenefitApplicationResourceInputResourceArnString"
                  description: The Amazon Resource Name (ARN) of the AWS resource to disassociate from the benefit application.
              required:
                - BenefitApplicationIdentifier
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateBenefitApplicationResourceOutput"
  /GetBenefit:
    post:
      operationId: GetBenefit
      description: Retrieves detailed information about a specific benefit available in the partner catalog.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.GetBenefit
            default: PartnerCentralBenefitsService.GetBenefit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog to query.
                Identifier:
                  $ref: "#/components/schemas/GetBenefitInputIdentifierString"
                  description: The unique identifier of the benefit to retrieve.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBenefitOutput"
  /GetBenefitAllocation:
    post:
      operationId: GetBenefitAllocation
      description: Retrieves detailed information about a specific benefit allocation that has been granted to a partner.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.GetBenefitAllocation
            default: PartnerCentralBenefitsService.GetBenefitAllocation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog to query.
                Identifier:
                  $ref: "#/components/schemas/BenefitAllocationIdentifier"
                  description: The unique identifier of the benefit allocation to retrieve.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBenefitAllocationOutput"
  /GetBenefitApplication:
    post:
      operationId: GetBenefitApplication
      description: Retrieves detailed information about a specific benefit application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.GetBenefitApplication
            default: PartnerCentralBenefitsService.GetBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog to query.
                Identifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to retrieve.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBenefitApplicationOutput"
  /ListBenefitAllocations:
    post:
      operationId: ListBenefitAllocations
      description: Retrieves a paginated list of benefit allocations based on specified filter criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.ListBenefitAllocations
            default: PartnerCentralBenefitsService.ListBenefitAllocations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier to filter benefit allocations by catalog.
                FulfillmentTypes:
                  $ref: "#/components/schemas/ListBenefitAllocationsInputFulfillmentTypesList"
                  description: Filter benefit allocations by specific fulfillment types.
                BenefitIdentifiers:
                  $ref: "#/components/schemas/ListBenefitAllocationsInputBenefitIdentifiersList"
                  description: Filter benefit allocations by specific benefit identifiers.
                BenefitApplicationIdentifiers:
                  $ref: "#/components/schemas/ListBenefitAllocationsInputBenefitApplicationIdentifiersList"
                  description: Filter benefit allocations by specific benefit application identifiers.
                Status:
                  $ref: "#/components/schemas/ListBenefitAllocationsInputStatusList"
                  description: Filter benefit allocations by their current status.
                MaxResults:
                  $ref: "#/components/schemas/ListBenefitAllocationsInputMaxResultsInteger"
                  description: The maximum number of benefit allocations to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/ListBenefitAllocationsInputNextTokenString"
                  description: A pagination token to retrieve the next set of results from a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBenefitAllocationsOutput"
  /ListBenefitApplications:
    post:
      operationId: ListBenefitApplications
      description: Retrieves a paginated list of benefit applications based on specified filter criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.ListBenefitApplications
            default: PartnerCentralBenefitsService.ListBenefitApplications
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier to filter benefit applications by catalog.
                Programs:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputProgramsList"
                  description: Filter benefit applications by specific AWS partner programs.
                FulfillmentTypes:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputFulfillmentTypesList"
                  description: Filter benefit applications by specific fulfillment types.
                BenefitIdentifiers:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputBenefitIdentifiersList"
                  description: Filter benefit applications by specific benefit identifiers.
                Status:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputStatusList"
                  description: Filter benefit applications by their current processing status.
                Stages:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputStagesList"
                  description: Filter benefit applications by their current processing stage.
                AssociatedResources:
                  $ref: "#/components/schemas/AssociatedResources"
                  description: Filter benefit applications by associated AWS resources.
                AssociatedResourceArns:
                  $ref: "#/components/schemas/Arns"
                  description: Filter benefit applications by specific AWS resource ARNs.
                MaxResults:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputMaxResultsInteger"
                  description: The maximum number of benefit applications to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/ListBenefitApplicationsInputNextTokenString"
                  description: A pagination token to retrieve the next set of results from a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBenefitApplicationsOutput"
  /ListBenefits:
    post:
      operationId: ListBenefits
      description: Retrieves a paginated list of available benefits based on specified filter criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.ListBenefits
            default: PartnerCentralBenefitsService.ListBenefits
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier to filter benefits by catalog.
                Programs:
                  $ref: "#/components/schemas/ListBenefitsInputProgramsList"
                  description: Filter benefits by specific AWS partner programs.
                FulfillmentTypes:
                  $ref: "#/components/schemas/ListBenefitsInputFulfillmentTypesList"
                  description: Filter benefits by specific fulfillment types.
                Status:
                  $ref: "#/components/schemas/ListBenefitsInputStatusList"
                  description: Filter benefits by their current status.
                MaxResults:
                  $ref: "#/components/schemas/ListBenefitsInputMaxResultsInteger"
                  description: The maximum number of benefits to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/ListBenefitsInputNextTokenString"
                  description: A pagination token to retrieve the next set of results from a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBenefitsOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Retrieves all tags associated with a specific resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.ListTagsForResource
            default: PartnerCentralBenefitsService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to list tags for.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /RecallBenefitApplication:
    post:
      operationId: RecallBenefitApplication
      description: Recalls a submitted benefit application, returning it to draft status for further modifications.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.RecallBenefitApplication
            default: PartnerCentralBenefitsService.RecallBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                ClientToken:
                  $ref: "#/components/schemas/String"
                  description: A unique, case-sensitive identifier to ensure idempotent processing of the recall request.
                Identifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to recall.
                Reason:
                  $ref: "#/components/schemas/String"
                  description: A descriptive reason explaining why the benefit application is being recalled.
              required:
                - Catalog
                - Identifier
                - Reason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallBenefitApplicationOutput"
  /SubmitBenefitApplication:
    post:
      operationId: SubmitBenefitApplication
      description: Submits a benefit application for review and processing by AWS.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.SubmitBenefitApplication
            default: PartnerCentralBenefitsService.SubmitBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                Identifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to submit.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitBenefitApplicationOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or updates tags for a specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.TagResource
            default: PartnerCentralBenefitsService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to add tags to.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of key-value pairs to add as tags to the resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes specified tags from a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.UntagResource
            default: PartnerCentralBenefitsService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to remove tags from.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys to remove from the resource.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateBenefitApplication:
    post:
      operationId: UpdateBenefitApplication
      description: Updates an existing benefit application with new information while maintaining revision control.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralBenefitsService.UpdateBenefitApplication
            default: PartnerCentralBenefitsService.UpdateBenefitApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/CatalogName"
                  description: The catalog identifier that specifies which benefit catalog the application belongs to.
                ClientToken:
                  $ref: "#/components/schemas/UpdateBenefitApplicationInputClientTokenString"
                  description: A unique, case-sensitive identifier to ensure idempotent processing of the update request.
                Name:
                  $ref: "#/components/schemas/BenefitApplicationName"
                  description: The updated human-readable name for the benefit application.
                Description:
                  $ref: "#/components/schemas/BenefitApplicationDescription"
                  description: The updated detailed description of the benefit application.
                Identifier:
                  $ref: "#/components/schemas/BenefitApplicationIdentifier"
                  description: The unique identifier of the benefit application to update.
                Revision:
                  $ref: "#/components/schemas/String"
                  description: The current revision number of the benefit application to ensure optimistic concurrency control.
                BenefitApplicationDetails:
                  $ref: "#/components/schemas/Document"
                  description: Updated detailed information and requirements specific to the benefit being requested.
                PartnerContacts:
                  $ref: "#/components/schemas/UpdateBenefitApplicationInputPartnerContactsList"
                  description: Updated contact information for partner representatives responsible for this benefit application.
                FileDetails:
                  $ref: "#/components/schemas/UpdateBenefitApplicationInputFileDetailsList"
                  description: Updated supporting documents and files attached to the benefit application.
              required:
                - ClientToken
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBenefitApplicationOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CatalogName:
      type: string
      pattern: "[A-Za-z0-9_-]+"
    AmendBenefitApplicationInputClientTokenString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-]{1,64}"
    String:
      type: string
    BenefitApplicationIdentifier:
      type: string
      pattern: (arn:.+|benappl-[0-9a-z]{14})
    AmendBenefitApplicationInputAmendmentReasonString:
      type: string
      minLength: 0
      maxLength: 1000
    AmendmentList:
      type: array
