          description: "Number indicating the result of address validation. Each possible result is defined as follows: 0 - Address validation succeeded. 1 - Address validation succeeded. The address was a close enough match and has been corrected as part of the address object. 2 - Address validation failed. You should re-submit the validation request with candidates from the CandidateAddressList result, if it's a close match."
        AddressExternalId:
          $ref: "#/components/schemas/String"
          description: The ID that represents the address.
        Address:
          $ref: "#/components/schemas/Address"
          description: The validated address.
        CandidateAddressList:
          $ref: "#/components/schemas/CandidateAddressList"
          description: The list of address suggestions..
    ValidationResult:
      type: integer
      minimum: 0
      maximum: 2
    Address:
      description: A validated address.
      type: object
      properties:
        streetName:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The address street, such as 8th Avenue.
        streetSuffix:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The address suffix, such as the N in 8th Avenue N.
        postDirectional:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: An address suffix location, such as the S. Unit A in Central Park S. Unit A.
        preDirectional:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: An address prefix location, such as the N in N. Third St.
        streetNumber:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The numeric portion of an address.
        city:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The city of an address.
        state:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The state of an address.
        postalCode:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The postal code of an address.
        postalCodePlus4:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The zip + 4 or postal code + 4 of an address.
        country:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The country of an address.
    CandidateAddressList:
      type: array
      items:
        $ref: "#/components/schemas/CandidateAddress"
    CandidateAddress:
      description: A suggested address.
      type: object
      properties:
        streetInfo:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The street information of the candidate address.
        streetNumber:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The numeric portion of the candidate address.
