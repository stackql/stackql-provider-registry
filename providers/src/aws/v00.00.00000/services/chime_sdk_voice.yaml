components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NonEmptyString:
      type: string
      pattern: .*\S.*
    E164PhoneNumberList:
      type: array
      items:
        $ref: "#/components/schemas/E164PhoneNumber"
    E164PhoneNumber:
      type: string
      pattern: ^\+?[1-9]\d{1,14}$
    NullableBoolean:
      type: boolean
    AssociatePhoneNumbersWithVoiceConnectorResponse:
      type: object
      properties:
        PhoneNumberErrors:
          $ref: "#/components/schemas/PhoneNumberErrorList"
          description: If the action fails for one or more of the phone numbers in the request, a list of the phone numbers is returned, along with error codes and error messages.
    PhoneNumberErrorList:
      type: array
      items:
        $ref: "#/components/schemas/PhoneNumberError"
    PhoneNumberError:
      description: If a phone number action fails for one or more of the phone numbers in a request, a list of the failed phone numbers is returned, along with error codes and error messages.
      type: object
      properties:
        PhoneNumberId:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The phone number ID for which the action failed.
        ErrorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: The error message.
    SensitiveNonEmptyString:
      type: string
      pattern: .*\S.*
    ErrorCode:
      type: string
      enum:
        - BadRequest
        - Conflict
        - Forbidden
        - NotFound
        - PreconditionFailed
        - ResourceLimitExceeded
        - ServiceFailure
        - AccessDenied
        - ServiceUnavailable
        - Throttled
        - Throttling
        - Unauthorized
        - Unprocessable
        - VoiceConnectorGroupAssociationsExist
        - PhoneNumberAssociationsExist
        - Gone
    String:
      type: string
    AssociatePhoneNumbersWithVoiceConnectorGroupResponse:
      type: object
      properties:
        PhoneNumberErrors:
          $ref: "#/components/schemas/PhoneNumberErrorList"
          description: If the action fails for one or more of the phone numbers in the request, a list of the phone numbers is returned, along with error codes and error messages.
    NonEmptyStringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    BatchDeletePhoneNumberResponse:
      type: object
      properties:
        PhoneNumberErrors:
          $ref: "#/components/schemas/PhoneNumberErrorList"
          description: If the action fails for one or more of the phone numbers in the request, a list of the phone numbers is returned, along with error codes and error messages.
    UpdatePhoneNumberRequestItemList:
      type: array
      items:
        $ref: "#/components/schemas/UpdatePhoneNumberRequestItem"
    UpdatePhoneNumberRequestItem:
      description: The phone number ID, product type, or calling name fields to update, used with the BatchUpdatePhoneNumber and UpdatePhoneNumber actions.
      type: object
      properties:
        PhoneNumberId:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The phone number ID to update.
        ProductType:
          $ref: "#/components/schemas/PhoneNumberProductType"
          description: The product type to update.
        CallingName:
          $ref: "#/components/schemas/CallingName"
          description: The outbound calling name to update.
        Name:
          $ref: "#/components/schemas/PhoneNumberName"
          description: The name of the phone number.
      required:
        - PhoneNumberId
    PhoneNumberProductType:
      type: string
      enum:
        - VoiceConnector
        - SipMediaApplicationDialIn
    CallingName:
      type: string
      pattern: ^$|^[a-zA-Z0-9 ]{2,15}$
    PhoneNumberName:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^$|^[a-zA-Z0-9\,\.\_\-]+(\s+[a-zA-Z0-9\,\.\_\-]+)*$
    BatchUpdatePhoneNumberResponse:
      type: object
      properties:
        PhoneNumberErrors:
          $ref: "#/components/schemas/PhoneNumberErrorList"
          description: A list of failed phone numbers and their error messages.
    CreatePhoneNumberOrderResponse:
      type: object
      properties:
        PhoneNumberOrder:
          $ref: "#/components/schemas/PhoneNumberOrder"
          description: The phone number order details.
    PhoneNumberOrder:
      description: The details of an Amazon Chime SDK phone number order.
      type: object
      properties:
        PhoneNumberOrderId:
          $ref: "#/components/schemas/GuidString"
          description: The ID of the phone order.
        ProductType:
          $ref: "#/components/schemas/PhoneNumberProductType"
          description: The phone number order product type.
        Status:
          $ref: "#/components/schemas/PhoneNumberOrderStatus"
          description: The status of the phone number order.
        OrderType:
          $ref: "#/components/schemas/PhoneNumberOrderType"
          description: The type of phone number being ordered, local or toll-free.
        OrderedPhoneNumbers:
          $ref: "#/components/schemas/OrderedPhoneNumberList"
          description: The ordered phone number details, such as the phone number in E.164 format and the phone number status.
        CreatedTimestamp:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The phone number order creation time stamp, in ISO 8601 format.
        UpdatedTimestamp:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The updated phone number order time stamp, in ISO 8601 format.
        FocDate:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The Firm Order Commitment (FOC) date for phone number porting orders. This field is null if a phone number order is not a porting order.
    GuidString:
      type: string
      pattern: "[a-fA-F0-9]{8}(?:-[a-fA-F0-9]{4}){3}-[a-fA-F0-9]{12}"
    PhoneNumberOrderStatus:
      type: string
      enum:
        - Processing
        - Successful
        - Failed
        - Partial
        - PendingDocuments
        - Submitted
        - FOC
        - ChangeRequested
        - Exception
        - CancelRequested
        - Cancelled
    PhoneNumberOrderType:
      type: string
      enum:
        - New
        - Porting
    OrderedPhoneNumberList:
      type: array
      items:
        $ref: "#/components/schemas/OrderedPhoneNumber"
    OrderedPhoneNumber:
      description: A phone number for which an order has been placed.
      type: object
      properties:
        E164PhoneNumber:
          $ref: "#/components/schemas/E164PhoneNumber"
          description: The phone number, in E.164 format.
        Status:
          $ref: "#/components/schemas/OrderedPhoneNumberStatus"
          description: The phone number status.
    OrderedPhoneNumberStatus:
      type: string
      enum:
        - Processing
        - Acquired
        - Failed
    Iso8601Timestamp:
      type: string
      format: date-time
    NonEmptyString128:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*\S.*
    ParticipantPhoneNumberList:
      type: array
      items:
        $ref: "#/components/schemas/E164PhoneNumber"
    ProxySessionNameString:
      type: string
      pattern: ^$|^[a-zA-Z0-9 ]{0,30}$
    PositiveInteger:
      type: integer
      minimum: 1
    CapabilityList:
      type: array
      items:
        $ref: "#/components/schemas/Capability"
    Capability:
      type: string
      enum:
        - Voice
        - SMS
    NumberSelectionBehavior:
      type: string
      enum:
        - PreferSticky
        - AvoidSticky
    GeoMatchLevel:
      type: string
      enum:
        - Country
        - AreaCode
    GeoMatchParams:
      description: The country and area code for a proxy phone number in a proxy phone session.
      type: object
      properties:
        Country:
          $ref: "#/components/schemas/Country"
          description: The country.
        AreaCode:
          $ref: "#/components/schemas/AreaCode"
          description: The area code.
      required:
        - Country
        - AreaCode
    Country:
      type: string
      pattern: ^$|^[A-Z]{2,2}$
    AreaCode:
      type: string
      pattern: ^$|^[0-9]{3,3}$
    CreateProxySessionResponse:
      type: object
      properties:
        ProxySession:
          $ref: "#/components/schemas/ProxySession"
          description: The proxy session details.
    ProxySession:
      description: The proxy session for an Amazon Chime SDK Voice Connector.
      type: object
      properties:
        VoiceConnectorId:
          $ref: "#/components/schemas/NonEmptyString128"
          description: The Voice Connector ID.
        ProxySessionId:
          $ref: "#/components/schemas/NonEmptyString128"
