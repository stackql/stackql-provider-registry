          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The city of the candidate address.
        state:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The state of the candidate address.
        postalCode:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
