openapi: 3.0.0
info:
  version: "2022-08-03"
  title: Amazon Chime SDK Voice
  description: Amazon Chime SDK Voice
  x-serviceName: chime
  x-serviceAlias: chime_sdk_voice
  x-protocol: rest-json
  x-apiVersion: "2022-08-03"
  x-endpointPrefix: voice-chime
servers:
  - url: https://voice-chime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chime-sdk-voice
paths:
  /voice-connectors/{voice_connector_id}?operation=associate-phone-numbers:
    post:
      operationId: AssociatePhoneNumbersWithVoiceConnector
      description: Associates phone numbers with the specified Amazon Chime SDK Voice Connector.
      parameters:
        - name: voice_connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Voice Connector ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                E164PhoneNumbers:
                  $ref: "#/components/schemas/E164PhoneNumberList"
                ForceAssociate:
                  $ref: "#/components/schemas/NullableBoolean"
              required:
                - E164PhoneNumbers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePhoneNumbersWithVoiceConnectorResponse"
  /voice-connector-groups/{voice_connector_group_id}?operation=associate-phone-numbers:
    post:
      operationId: AssociatePhoneNumbersWithVoiceConnectorGroup
      description: Associates phone numbers with the specified Amazon Chime SDK Voice Connector group.
      parameters:
        - name: voice_connector_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime SDK Voice Connector group ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                E164PhoneNumbers:
                  $ref: "#/components/schemas/E164PhoneNumberList"
                ForceAssociate:
                  $ref: "#/components/schemas/NullableBoolean"
              required:
                - E164PhoneNumbers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePhoneNumbersWithVoiceConnectorGroupResponse"
  /phone-numbers?operation=batch-delete:
    post:
      operationId: BatchDeletePhoneNumber
      description: Moves phone numbers into the Deletion queue. Phone numbers must be disassociated from any users or Amazon Chime SDK Voice Connectors before they can be deleted. Phone numbers remain in the Deletion queue for 7 days before they are deleted permanently.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PhoneNumberIds:
                  $ref: "#/components/schemas/NonEmptyStringList"
              required:
                - PhoneNumberIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeletePhoneNumberResponse"
  /phone-numbers?operation=batch-update:
    post:
      operationId: BatchUpdatePhoneNumber
      description: Updates phone number product types, calling names, or phone number names. You can update one attribute at a time for each UpdatePhoneNumberRequestItem. For example, you can update the product type, the calling name, or phone name. You cannot have a duplicate phoneNumberId in a request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UpdatePhoneNumberRequestItems:
                  $ref: "#/components/schemas/UpdatePhoneNumberRequestItemList"
              required:
                - UpdatePhoneNumberRequestItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdatePhoneNumberResponse"
  /phone-number-orders:
    post:
      operationId: CreatePhoneNumberOrder
      description: Creates an order for phone numbers to be provisioned. For numbers outside the U.S., you must use the Amazon Chime SDK SIP media application dial-in product type.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProductType:
                  $ref: "#/components/schemas/PhoneNumberProductType"
                E164PhoneNumbers:
                  $ref: "#/components/schemas/E164PhoneNumberList"
                Name:
                  $ref: "#/components/schemas/PhoneNumberName"
              required:
                - ProductType
                - E164PhoneNumbers
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePhoneNumberOrderResponse"
    get:
      operationId: ListPhoneNumberOrders
      description: Lists the phone numbers for an administrator's Amazon Chime SDK account.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPhoneNumberOrdersResponse"
  /voice-connectors/{voice_connector_id}/proxy-sessions:
    post:
      operationId: CreateProxySession
      description: Creates a proxy session for the specified Amazon Chime SDK Voice Connector for the specified participant phone numbers.
      parameters:
        - name: voice_connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The Voice Connector ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ParticipantPhoneNumbers:
                  $ref: "#/components/schemas/ParticipantPhoneNumberList"
                Name:
                  $ref: "#/components/schemas/ProxySessionNameString"
                ExpiryMinutes:
                  $ref: "#/components/schemas/PositiveInteger"
                Capabilities:
                  $ref: "#/components/schemas/CapabilityList"
                NumberSelectionBehavior:
                  $ref: "#/components/schemas/NumberSelectionBehavior"
                GeoMatchLevel:
                  $ref: "#/components/schemas/GeoMatchLevel"
                GeoMatchParams:
                  $ref: "#/components/schemas/GeoMatchParams"
              required:
                - ParticipantPhoneNumbers
                - Capabilities
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProxySessionResponse"
    get:
      operationId: ListProxySessions
      description: Lists the proxy sessions for the specified Amazon Chime SDK Voice Connector.
      parameters:
        - name: voice_connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The Voice Connector ID.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProxySessionStatus"
          description: The proxy session status.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token used to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProxySessionsResponse"
  /sip-media-applications:
    post:
      operationId: CreateSipMediaApplication
      description: Creates a SIP media application. For more information about SIP media applications, see Managing SIP media applications and rules in the Amazon Chime SDK Administrator Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AwsRegion:
                  $ref: "#/components/schemas/String"
                Name:
                  $ref: "#/components/schemas/SipMediaApplicationName"
                Endpoints:
                  $ref: "#/components/schemas/SipMediaApplicationEndpointList"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - AwsRegion
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSipMediaApplicationResponse"
    get:
      operationId: ListSipMediaApplications
      description: Lists the SIP media applications under the administrator's AWS account.
      parameters:
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call. Defaults to 100.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token used to return the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSipMediaApplicationsResponse"
  /sip-media-applications/{sip_media_application_id}/calls:
    post:
      operationId: CreateSipMediaApplicationCall
      description: Creates an outbound call to a phone number from the phone number specified in the request, and it invokes the endpoint of the specified sipMediaApplicationId.
      parameters:
        - name: sip_media_application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the SIP media application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FromPhoneNumber:
                  $ref: "#/components/schemas/E164PhoneNumber"
                ToPhoneNumber:
                  $ref: "#/components/schemas/E164PhoneNumber"
                SipHeaders:
                  $ref: "#/components/schemas/SipHeadersMap"
                ArgumentsMap:
                  $ref: "#/components/schemas/SMACreateCallArgumentsMap"
              required:
                - FromPhoneNumber
                - ToPhoneNumber
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSipMediaApplicationCallResponse"
  /sip-rules:
    post:
      operationId: CreateSipRule
      description: Creates a SIP rule, which can be used to run a SIP media application as a target for a specific trigger type. For more information about SIP rules, see Managing SIP media applications and rules in the Amazon Chime SDK Administrator Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SipRuleName"
                TriggerType:
                  $ref: "#/components/schemas/SipRuleTriggerType"
                TriggerValue:
                  $ref: "#/components/schemas/NonEmptyString"
                Disabled:
                  $ref: "#/components/schemas/NullableBoolean"
                TargetApplications:
                  $ref: "#/components/schemas/SipRuleTargetApplicationList"
              required:
                - TriggerType
                - TriggerValue
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSipRuleResponse"
    get:
      operationId: ListSipRules
      description: Lists the SIP rules under the administrator's AWS account.
      parameters:
        - name: sip-media-application
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP media application ID.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call. Defaults to 100.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextTokenString"
          description: The token used to return the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSipRulesResponse"
  /voice-connectors:
    post:
      operationId: CreateVoiceConnector
      description: Creates an Amazon Chime SDK Voice Connector. For more information about Voice Connectors, see Managing Amazon Chime SDK Voice Connector groups in the Amazon Chime SDK Administrator Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/VoiceConnectorName"
                AwsRegion:
                  $ref: "#/components/schemas/VoiceConnectorAwsRegion"
                RequireEncryption:
                  $ref: "#/components/schemas/Boolean"
                Tags:
                  $ref: "#/components/schemas/TagList"
                IntegrationType:
                  $ref: "#/components/schemas/VoiceConnectorIntegrationType"
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
              required:
                - Name
                - RequireEncryption
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVoiceConnectorResponse"
    get:
      operationId: ListVoiceConnectors
      description: Lists the Amazon Chime SDK Voice Connectors in the administrators AWS account.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to return the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVoiceConnectorsResponse"
  /voice-connector-groups:
    post:
      operationId: CreateVoiceConnectorGroup
      description: Creates an Amazon Chime SDK Voice Connector group under the administrator's AWS account. You can associate Amazon Chime SDK Voice Connectors with the Voice Connector group by including VoiceConnectorItems in the request. You can include Voice Connectors from different AWS Regions in your group. This creates a fault tolerant mechanism for fallback in case of availability events.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/VoiceConnectorGroupName"
                VoiceConnectorItems:
                  $ref: "#/components/schemas/VoiceConnectorItemList"
              required:
                - Name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVoiceConnectorGroupResponse"
    get:
      operationId: ListVoiceConnectorGroups
      description: Lists the Amazon Chime SDK Voice Connector groups in the administrator's AWS account.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to return the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVoiceConnectorGroupsResponse"
  /voice-profiles:
    post:
      operationId: CreateVoiceProfile
      description: Creates a voice profile, which consists of an enrolled user and their latest voice print. Before creating any voice profiles, you must provide all notices and obtain all consents from the speaker as required under applicable privacy and biometrics laws, and as required under the AWS service terms for the Amazon Chime SDK. For more information about voice profiles and voice analytics, see Using Amazon Chime SDK Voice Analytics in the Amazon Chime SDK Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SpeakerSearchTaskId:
                  $ref: "#/components/schemas/NonEmptyString256"
              required:
                - SpeakerSearchTaskId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVoiceProfileResponse"
    get:
      operationId: ListVoiceProfiles
      description: Lists the voice profiles in a voice profile domain.
      parameters:
        - name: voice-profile-domain-id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString256"
          description: The ID of the voice profile domain.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results in the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVoiceProfilesResponse"
  /voice-profile-domains:
    post:
      operationId: CreateVoiceProfileDomain
      description: Creates a voice profile domain, a collection of voice profiles, their voice prints, and encrypted enrollment audio. Before creating any voice profiles, you must provide all notices and obtain all consents from the speaker as required under applicable privacy and biometrics laws, and as required under the AWS service terms for the Amazon Chime SDK. For more information about voice profile domains, see Using Amazon Chime SDK Voice Analytics in the Amazon Chime SDK Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/VoiceProfileDomainName"
                Description:
                  $ref: "#/components/schemas/VoiceProfileDomainDescription"
                ServerSideEncryptionConfiguration:
                  $ref: "#/components/schemas/ServerSideEncryptionConfiguration"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestId"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - Name
                - ServerSideEncryptionConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVoiceProfileDomainResponse"
    get:
      operationId: ListVoiceProfileDomains
      description: Lists the specified voice profile domains in the administrator's AWS account.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token used to return the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVoiceProfileDomainsResponse"
  /phone-numbers/{phone_number_id}:
    delete:
      operationId: DeletePhoneNumber
      description: Moves the specified phone number into the Deletion queue. A phone number must be disassociated from any users or Amazon Chime SDK Voice Connectors before it can be deleted. Deleted phone numbers remain in the Deletion queue queue for 7 days before they are deleted permanently.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The phone number ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetPhoneNumber
      description: Retrieves details for the specified phone number ID, such as associations, capabilities, and product type.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The phone number ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPhoneNumberResponse"
    post:
      operationId: UpdatePhoneNumber
      description: Updates phone number details, such as product type, calling name, or phone number name for the specified phone number ID. You can update one phone number detail at a time. For example, you can update either the product type, calling name, or phone number name in one action. For numbers outside the U.S., you must use the Amazon Chime SDK SIP Media Application Dial-In product type. Updates to outbound calling names can take 72 hours to complete. Pending updates to outbound calling names must be complete before you can request another update.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: The phone number ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ProductType:
                  $ref: "#/components/schemas/PhoneNumberProductType"
                CallingName:
                  $ref: "#/components/schemas/CallingName"
                Name:
                  $ref: "#/components/schemas/PhoneNumberName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePhoneNumberResponse"
  /voice-connectors/{voice_connector_id}/proxy-sessions/{proxy_session_id}:
    delete:
      operationId: DeleteProxySession
      description: Deletes the specified proxy session from the specified Amazon Chime SDK Voice Connector.
      parameters:
        - name: voice_connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The Voice Connector ID.
        - name: proxy_session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The proxy session ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetProxySession
      description: Retrieves the specified proxy session details for the specified Amazon Chime SDK Voice Connector.
      parameters:
        - name: voice_connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The Voice Connector ID.
        - name: proxy_session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The proxy session ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProxySessionResponse"
    post:
      operationId: UpdateProxySession
      description: Updates the specified proxy session details, such as voice or SMS capabilities.
      parameters:
        - name: voice_connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The Voice Connector ID.
        - name: proxy_session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString128"
          description: The proxy session ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Capabilities:
                  $ref: "#/components/schemas/CapabilityList"
                ExpiryMinutes:
                  $ref: "#/components/schemas/PositiveInteger"
              required:
                - Capabilities
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProxySessionResponse"
  /sip-media-applications/{sip_media_application_id}:
    delete:
      operationId: DeleteSipMediaApplication
      description: Deletes a SIP media application.
      parameters:
        - name: sip_media_application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP media application ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetSipMediaApplication
      description: Retrieves the information for a SIP media application, including name, AWS Region, and endpoints.
      parameters:
        - name: sip_media_application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP media application ID .
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSipMediaApplicationResponse"
    put:
      operationId: UpdateSipMediaApplication
      description: Updates the details of the specified SIP media application.
      parameters:
        - name: sip_media_application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP media application ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SipMediaApplicationName"
                Endpoints:
                  $ref: "#/components/schemas/SipMediaApplicationEndpointList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSipMediaApplicationResponse"
  /sip-rules/{sip_rule_id}:
    delete:
      operationId: DeleteSipRule
      description: Deletes a SIP rule.
      parameters:
        - name: sip_rule_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP rule ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetSipRule
      description: Retrieves the details of a SIP rule, such as the rule ID, name, triggers, and target endpoints.
      parameters:
        - name: sip_rule_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP rule ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSipRuleResponse"
    put:
      operationId: UpdateSipRule
      description: Updates the details of the specified SIP rule.
      parameters:
        - name: sip_rule_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The SIP rule ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
