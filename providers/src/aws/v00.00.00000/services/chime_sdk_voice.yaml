      type: array
      items:
        $ref: "#/components/schemas/OriginationRoute"
    OriginationRoute:
      description: "Origination routes define call distribution properties for your SIP hosts to receive inbound calls using an Amazon Chime SDK Voice Connector. Limit: Ten origination routes for each Voice Connector. The parameters listed below are not required, but you must use at least one."
      type: object
      properties:
        Host:
          $ref: "#/components/schemas/String"
          description: The FQDN or IP address to contact for origination traffic.
        Port:
          $ref: "#/components/schemas/Port"
          description: The designated origination route port. Defaults to 5060.
        Protocol:
          $ref: "#/components/schemas/OriginationRouteProtocol"
          description: The protocol to use for the origination route. Encryption-enabled Amazon Chime SDK Voice Connectors use TCP protocol by default.
        Priority:
          $ref: "#/components/schemas/OriginationRoutePriority"
          description: The priority associated with the host, with 1 being the highest priority. Higher priority hosts are attempted first.
        Weight:
          $ref: "#/components/schemas/OriginationRouteWeight"
          description: The weight assigned to an origination route. When hosts have equal priority, calls are distributed between them based on their relative weights.
