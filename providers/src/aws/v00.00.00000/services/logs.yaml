        $ref: "#/components/schemas/Delivery"
    DescribeDeliveryDestinationsResponse:
      type: object
      properties:
        deliveryDestinations:
          $ref: "#/components/schemas/DeliveryDestinations"
          description: An array of structures. Each structure contains information about one delivery destination in the account.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    DeliveryDestinations:
      type: array
      items:
        $ref: "#/components/schemas/DeliveryDestination"
    DeliveryDestination:
      description: "This structure contains information about one delivery destination in your account. A delivery destination is an Amazon Web Services resource that represents an Amazon Web Services service that logs can be sent to. CloudWatch Logs, Amazon S3, Firehose, and X-Ray are supported as delivery destinations. To configure logs delivery between a supported Amazon Web Services service and a destination, you must do the following: Create a delivery source, which is a logical object that represents the resource that is actually sending the logs. For more information, see PutDeliverySource. Create a delivery destination, which is a logical object that represents the actual delivery destination. If you are delivering logs cross-account, you must use PutDeliveryDestinationPolicy in the destination account to assign an IAM policy to the destination. This policy allows delivery to that destination. Create a delivery by pairing exactly one delivery source and one delivery destination. For more information, see CreateDelivery. You can configure a single delivery source to send logs to multiple destinations by creating multiple deliveries. You can also create multiple deliveries to configure multiple delivery sources to send logs to the same delivery destination."
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DeliveryDestinationName"
          description: The name of this delivery destination.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that uniquely identifies this delivery destination.
        deliveryDestinationType:
          $ref: "#/components/schemas/DeliveryDestinationType"
          description: Displays whether this delivery destination is CloudWatch Logs, Amazon S3, Firehose, or X-Ray.
        outputFormat:
          $ref: "#/components/schemas/OutputFormat"
          description: The format of the logs that are sent to this delivery destination.
        deliveryDestinationConfiguration:
          $ref: "#/components/schemas/DeliveryDestinationConfiguration"
          description: A structure that contains the ARN of the Amazon Web Services resource that will receive the logs.
        tags:
          type: object
          properties: {}
          description: The tags that have been assigned to this delivery destination.
    DeliveryDestinationConfiguration:
      description: A structure that contains information about one logs delivery destination.
      type: object
      properties:
        destinationResourceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the Amazon Web Services destination that this delivery destination represents. That Amazon Web Services destination can be a log group in CloudWatch Logs, an Amazon S3 bucket, or a delivery stream in Firehose.
      required:
        - destinationResourceArn
    DescribeDeliverySourcesResponse:
      type: object
      properties:
        deliverySources:
          $ref: "#/components/schemas/DeliverySources"
          description: An array of structures. Each structure contains information about one delivery source in the account.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    DeliverySources:
      type: array
      items:
        $ref: "#/components/schemas/DeliverySource"
    DeliverySource:
      description: "This structure contains information about one delivery source in your account. A delivery source is an Amazon Web Services resource that sends logs to an Amazon Web Services destination. The destination can be CloudWatch Logs, Amazon S3, or Firehose. Only some Amazon Web Services services support being configured as a delivery source. These services are listed as Supported [V2 Permissions] in the table at Enabling logging from Amazon Web Services services. To configure logs delivery between a supported Amazon Web Services service and a destination, you must do the following: Create a delivery source, which is a logical object that represents the resource that is actually sending the logs. For more information, see PutDeliverySource. Create a delivery destination, which is a logical object that represents the actual delivery destination. For more information, see PutDeliveryDestination. If you are delivering logs cross-account, you must use PutDeliveryDestinationPolicy in the destination account to assign an IAM policy to the destination. This policy allows delivery to that destination. Create a delivery by pairing exactly one delivery source and one delivery destination. For more information, see CreateDelivery. You can configure a single delivery source to send logs to multiple destinations by creating multiple deliveries. You can also create multiple deliveries to configure multiple delivery sources to send logs to the same delivery destination."
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DeliverySourceName"
          description: The unique name of the delivery source.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that uniquely identifies this delivery source.
        resourceArns:
          $ref: "#/components/schemas/ResourceArns"
          description: This array contains the ARN of the Amazon Web Services resource that sends logs and is represented by this delivery source. Currently, only one ARN can be in the array.
        service:
          $ref: "#/components/schemas/Service"
          description: The Amazon Web Services service that is sending logs.
        logType:
          $ref: "#/components/schemas/LogType"
          description: The type of log that the source is sending. For valid values for this parameter, see the documentation for the source service.
        tags:
          type: object
          properties: {}
          description: The tags that have been assigned to this delivery source.
        deliverySourceConfiguration:
          type: object
          properties: {}
          description: The map of key-value pairs that configure the delivery source.
        status:
          $ref: "#/components/schemas/DeliverySourceStatus"
          description: "The status of the delivery source. A delivery source can have the status ACTIVE or INACTIVE. Note: This value is defined for selective log types."
        statusReason:
          $ref: "#/components/schemas/DeliverySourceStatusReason"
          description: "The reason for the status of the delivery source. A status reason of RESOURCE_DELETED indicates that the resource associated with the delivery source has been deleted. Note: This value is defined for selective log types."
    ResourceArns:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    DeliverySourceStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    DeliverySourceStatusReason:
      type: string
      enum:
        - RESOURCE_DELETED
    DescribeDestinationsResponse:
      type: object
      properties:
        destinations:
          $ref: "#/components/schemas/Destinations"
