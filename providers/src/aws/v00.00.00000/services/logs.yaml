openapi: 3.0.0
info:
  version: "2014-03-28"
  title: Amazon CloudWatch Logs
  description: Amazon CloudWatch Logs
  x-serviceName: logs
  x-serviceAlias: logs
  x-protocol: json
  x-apiVersion: "2014-03-28"
  x-endpointPrefix: logs
  x-targetPrefix: Logs_20140328
  x-jsonVersion: "1.1"
servers:
  - url: https://logs.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for logs
paths:
  /AssociateKmsKey:
    post:
      operationId: AssociateKmsKey
      description: Associates the specified KMS key with either one log group in the account, or with all stored CloudWatch Logs query insights results in the account. When you use AssociateKmsKey, you specify either the logGroupName parameter or the resourceIdentifier parameter. You can't specify both of those parameters in the same operation. Specify the logGroupName parameter to cause log events ingested into that log group to be encrypted with that key. Only the log events ingested after the key is associated are encrypted with that key. Associating a KMS key with a log group overrides any existing associations between the log group and a KMS key. After a KMS key is associated with a log group, all newly ingested data for the log group is encrypted using the KMS key. This association is stored as long as the data encrypted with the KMS key is still within CloudWatch Logs. This enables CloudWatch Logs to decrypt this data whenever it is requested. Associating a key with a log group does not cause the results of queries of that log group to be encrypted with that key. To have query results encrypted with a KMS key, you must use an AssociateKmsKey operation with the resourceIdentifier parameter that specifies a query-result resource. Specify the resourceIdentifier parameter with a query-result resource, to use that key to encrypt the stored results of all future StartQuery operations in the account. The response from a GetQueryResults operation will still return the query results in plain text. Even if you have not associated a key with your query results, the query results are encrypted when stored, using the default CloudWatch Logs method. If you run a query from a monitoring account that queries logs in a source account, the query results key from the monitoring account, if any, is used. If you delete the key that is used to encrypt log events or log group query results, then all the associated stored log events or query results that were encrypted with that key will be unencryptable and unusable. CloudWatch Logs supports only symmetric KMS keys. Do not associate an asymmetric KMS key with your log group or query results. For more information, see Using Symmetric and Asymmetric Keys. It can take up to 5 minutes for this operation to take effect. If you attempt to associate a KMS key with a log group but the KMS key does not exist or the KMS key is disabled, you receive an InvalidParameterException error.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.AssociateKmsKey
            default: Logs_20140328.AssociateKmsKey
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group. In your AssociateKmsKey operation, you must specify either the resourceIdentifier parameter or the logGroup parameter, but you can't specify both.
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The Amazon Resource Name (ARN) of the KMS key to use when encrypting log data. This must be a symmetric KMS key. For more information, see Amazon Resource Names and Using Symmetric and Asymmetric Keys.
                resourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                  description: "Specifies the target for this operation. You must specify one of the following: Specify the following ARN to have future GetQueryResults operations in this account encrypt the results with the specified KMS key. Replace REGION and ACCOUNT_ID with your Region and account ID. arn:aws:logs:REGION:ACCOUNT_ID:query-result:* Specify the ARN of a log group to have CloudWatch Logs use the KMS key to encrypt log events that are ingested and stored by that log group. The log group ARN must be in the following format. Replace REGION and ACCOUNT_ID with your Region and account ID. arn:aws:logs:REGION:ACCOUNT_ID:log-group:LOG_GROUP_NAME In your AssociateKmsKey operation, you must specify either the resourceIdentifier parameter or the logGroup parameter, but you can't specify both."
              required:
                - kmsKeyId
      responses:
        "200":
          description: Success
  /AssociateSourceToS3TableIntegration:
    post:
      operationId: AssociateSourceToS3TableIntegration
      description: Associates a data source with an S3 Table Integration for query access in the 'logs' namespace. This enables querying log data using analytics engines that support Iceberg such as Amazon Athena, Amazon Redshift, and Apache Spark.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.AssociateSourceToS3TableIntegration
            default: Logs_20140328.AssociateSourceToS3TableIntegration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                integrationArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the S3 Table Integration to associate the data source with.
                dataSource:
                  $ref: "#/components/schemas/DataSource"
                  description: The data source to associate with the S3 Table Integration. Contains the name and type of the data source.
              required:
                - integrationArn
                - dataSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSourceToS3TableIntegrationResponse"
  /CancelExportTask:
    post:
      operationId: CancelExportTask
      description: Cancels the specified export task. The task must be in the PENDING or RUNNING state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CancelExportTask
            default: Logs_20140328.CancelExportTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                taskId:
                  $ref: "#/components/schemas/ExportTaskId"
                  description: The ID of the export task.
              required:
                - taskId
      responses:
        "200":
          description: Success
  /CancelImportTask:
    post:
      operationId: CancelImportTask
      description: Cancels an active import task and stops importing data from the CloudTrail Lake Event Data Store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CancelImportTask
            default: Logs_20140328.CancelImportTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                importId:
                  $ref: "#/components/schemas/ImportId"
                  description: The ID of the import task to cancel.
              required:
                - importId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelImportTaskResponse"
  /CreateDelivery:
    post:
      operationId: CreateDelivery
      description: "Creates a delivery. A delivery is a connection between a logical delivery source and a logical delivery destination that you have already created. Only some Amazon Web Services services support being configured as a delivery source using this operation. These services are listed as Supported [V2 Permissions] in the table at Enabling logging from Amazon Web Services services. A delivery destination can represent a log group in CloudWatch Logs, an Amazon S3 bucket, a delivery stream in Firehose, or X-Ray. To configure logs delivery between a supported Amazon Web Services service and a destination, you must do the following: Create a delivery source, which is a logical object that represents the resource that is actually sending the logs. For more information, see PutDeliverySource. Create a delivery destination, which is a logical object that represents the actual delivery destination. For more information, see PutDeliveryDestination. If you are delivering logs cross-account, you must use PutDeliveryDestinationPolicy in the destination account to assign an IAM policy to the destination. This policy allows delivery to that destination. Use CreateDelivery to create a delivery by pairing exactly one delivery source and one delivery destination. You can configure a single delivery source to send logs to multiple destinations by creating multiple deliveries. You can also create multiple deliveries to configure multiple delivery sources to send logs to the same delivery destination. To update an existing delivery configuration, use UpdateDeliveryConfiguration."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateDelivery
            default: Logs_20140328.CreateDelivery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deliverySourceName:
                  $ref: "#/components/schemas/DeliverySourceName"
                  description: The name of the delivery source to use for this delivery.
                deliveryDestinationArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the delivery destination to use for this delivery.
                recordFields:
                  $ref: "#/components/schemas/RecordFields"
                  description: The list of record fields to be delivered to the destination, in order. If the delivery's log source has mandatory fields, they must be included in this list.
                fieldDelimiter:
                  $ref: "#/components/schemas/FieldDelimiter"
                  description: The field delimiter to use between record fields when the final output format of a delivery is in Plain, W3C, or Raw format.
                s3DeliveryConfiguration:
                  $ref: "#/components/schemas/S3DeliveryConfiguration"
                  description: This structure contains parameters that are valid only when the delivery's delivery destination is an S3 bucket.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An optional list of key-value pairs to associate with the resource. For more information about tagging, see Tagging Amazon Web Services resources
              required:
                - deliverySourceName
                - deliveryDestinationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeliveryResponse"
  /CreateExportTask:
    post:
      operationId: CreateExportTask
      description: Creates an export task so that you can efficiently export data from a log group to an Amazon S3 bucket. When you perform a CreateExportTask operation, you must use credentials that have permission to write to the S3 bucket that you specify as the destination. Exporting log data to S3 buckets that are encrypted by KMS is supported. Exporting log data to Amazon S3 buckets that have S3 Object Lock enabled with a retention period is also supported. Exporting to S3 buckets that are encrypted with AES-256 is supported. This is an asynchronous call. If all the required information is provided, this operation initiates an export task and responds with the ID of the task. After the task has started, you can use DescribeExportTasks to get the status of the export task. Each account can only have one active (RUNNING or PENDING) export task at a time. To cancel an export task, use CancelExportTask. You can export logs from multiple log groups or multiple time ranges to the same S3 bucket. To separate log data for each export task, specify a prefix to be used as the Amazon S3 key prefix for all exported objects. We recommend that you don't regularly export to Amazon S3 as a way to continuously archive your logs. For that use case, we instead recommend that you use subscriptions. For more information about subscriptions, see Real-time processing of log data with subscriptions. Time-based sorting on chunks of log data inside an exported file is not guaranteed. You can sort the exported log field data by using Linux utilities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateExportTask
            default: Logs_20140328.CreateExportTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                taskName:
                  $ref: "#/components/schemas/ExportTaskName"
                  description: The name of the export task.
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                logStreamNamePrefix:
                  $ref: "#/components/schemas/LogStreamName"
                  description: Export only log streams that match the provided prefix. If you don't specify a value, no prefix filter is applied.
                from:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start time of the range for the request, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC. Events with a timestamp earlier than this time are not exported.
                to:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end time of the range for the request, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC. Events with a timestamp later than this time are not exported. You must specify a time that is not earlier than when this log group was created.
                destination:
                  $ref: "#/components/schemas/ExportDestinationBucket"
                  description: The name of S3 bucket for the exported log data. The bucket must be in the same Amazon Web Services Region.
                destinationPrefix:
                  $ref: "#/components/schemas/ExportDestinationPrefix"
                  description: The prefix used as the start of the key for every object exported. If you don't specify a value, the default is exportedlogs. The length of this parameter must comply with the S3 object key name length limits. The object key name is a sequence of Unicode characters with UTF-8 encoding, and can be up to 1,024 bytes.
              required:
                - logGroupName
                - from
                - to
                - destination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExportTaskResponse"
  /CreateImportTask:
    post:
      operationId: CreateImportTask
      description: "Starts an import from a data source to CloudWatch Log and creates a managed log group as the destination for the imported data. Currently, CloudTrail Event Data Store is the only supported data source. The import task must satisfy the following constraints: The specified source must be in an ACTIVE state. The API caller must have permissions to access the data in the provided source and to perform iam:PassRole on the provided import role which has the same permissions, as described below. The provided IAM role must trust the \"cloudtrail.amazonaws.com\" principal and have the following permissions: cloudtrail:GetEventDataStoreData logs:CreateLogGroup logs:CreateLogStream logs:PutResourcePolicy (If source has an associated Amazon Web Services KMS Key) kms:Decrypt (If source has an associated Amazon Web Services KMS Key) kms:GenerateDataKey Example IAM policy for provided import role: [ { \"Effect\": \"Allow\", \"Action\": \"iam:PassRole\", \"Resource\": \"arn:aws:iam::123456789012:role/apiCallerCredentials\", \"Condition\": { \"StringLike\": { \"iam:AssociatedResourceARN\": \"arn:aws:logs:us-east-1:123456789012:log-group:aws/cloudtrail/f1d45bff-d0e3-4868-b5d9-2eb678aa32fb:*\" } } }, { \"Effect\": \"Allow\", \"Action\": [ \"cloudtrail:GetEventDataStoreData\" ], \"Resource\": [ \"arn:aws:cloudtrail:us-east-1:123456789012:eventdatastore/f1d45bff-d0e3-4868-b5d9-2eb678aa32fb\" ] }, { \"Effect\": \"Allow\", \"Action\": [ \"logs:CreateImportTask\", \"logs:CreateLogGroup\", \"logs:CreateLogStream\", \"logs:PutResourcePolicy\" ], \"Resource\": [ \"arn:aws:logs:us-east-1:123456789012:log-group:/aws/cloudtrail/*\" ] }, { \"Effect\": \"Allow\", \"Action\": [ \"kms:Decrypt\", \"kms:GenerateDataKey\" ], \"Resource\": [ \"arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012\" ] } ] If the import source has a customer managed key, the \"cloudtrail.amazonaws.com\" principal needs permissions to perform kms:Decrypt and kms:GenerateDataKey. There can be no more than 3 active imports per account at a given time. The startEventTime must be less than or equal to endEventTime. The data being imported must be within the specified source's retention period."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateImportTask
            default: Logs_20140328.CreateImportTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                importSourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the source to import from.
                importRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the IAM role that grants CloudWatch Logs permission to import from the CloudTrail Lake Event Data Store.
                importFilter:
                  $ref: "#/components/schemas/ImportFilter"
                  description: Optional filters to constrain the import by CloudTrail event time. Times are specified in Unix timestamp milliseconds. The range of data being imported must be within the specified source's retention period.
              required:
                - importSourceArn
                - importRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateImportTaskResponse"
  /CreateLogAnomalyDetector:
    post:
      operationId: CreateLogAnomalyDetector
      description: "Creates an anomaly detector that regularly scans one or more log groups and look for patterns and anomalies in the logs. An anomaly detector can help surface issues by automatically discovering anomalies in your log event traffic. An anomaly detector uses machine learning algorithms to scan log events and find patterns. A pattern is a shared text structure that recurs among your log fields. Patterns provide a useful tool for analyzing large sets of logs because a large number of log events can often be compressed into a few patterns. The anomaly detector uses pattern recognition to find anomalies, which are unusual log events. It uses the evaluationFrequency to compare current log events and patterns with trained baselines. Fields within a pattern are called tokens. Fields that vary within a pattern, such as a request ID or timestamp, are referred to as dynamic tokens and represented by <*>. The following is an example of a pattern: [INFO] Request time: <*> ms This pattern represents log events like [INFO] Request time: 327 ms and other similar log events that differ only by the number, in this csse 327. When the pattern is displayed, the different numbers are replaced by <*> Any parts of log events that are masked as sensitive data are not scanned for anomalies. For more information about masking sensitive data, see Help protect sensitive log data with masking."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateLogAnomalyDetector
            default: Logs_20140328.CreateLogAnomalyDetector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupArnList:
                  $ref: "#/components/schemas/LogGroupArnList"
                  description: An array containing the ARN of the log group that this anomaly detector will watch. You can specify only one log group ARN.
                detectorName:
                  $ref: "#/components/schemas/DetectorName"
                  description: A name for this anomaly detector.
                evaluationFrequency:
                  $ref: "#/components/schemas/EvaluationFrequency"
                  description: Specifies how often the anomaly detector is to run and look for anomalies. Set this value according to the frequency that the log group receives new logs. For example, if the log group receives new log events every 10 minutes, then 15 minutes might be a good setting for evaluationFrequency .
                filterPattern:
                  $ref: "#/components/schemas/FilterPattern"
                  description: You can use this parameter to limit the anomaly detection model to examine only log events that match the pattern you specify here. For more information, see Filter and Pattern Syntax.
                kmsKeyId:
                  $ref: "#/components/schemas/DetectorKmsKeyArn"
                  description: Optionally assigns a KMS key to secure this anomaly detector and its findings. If a key is assigned, the anomalies found and the model used by this detector are encrypted at rest with the key. If a key is assigned to an anomaly detector, a user must have permissions for both this key and for the anomaly detector to retrieve information about the anomalies that it finds. Make sure the value provided is a valid KMS key ARN. For more information about using a KMS key and to see the required IAM policy, see Use a KMS key with an anomaly detector.
                anomalyVisibilityTime:
                  $ref: "#/components/schemas/AnomalyVisibilityTime"
                  description: The number of days to have visibility on an anomaly. After this time period has elapsed for an anomaly, it will be automatically baselined and the anomaly detector will treat new occurrences of a similar anomaly as normal. Therefore, if you do not correct the cause of an anomaly during the time period specified in anomalyVisibilityTime, it will be considered normal going forward and will not be detected as an anomaly.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An optional list of key-value pairs to associate with the resource. For more information about tagging, see Tagging Amazon Web Services resources
              required:
                - logGroupArnList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLogAnomalyDetectorResponse"
  /CreateLogGroup:
    post:
      operationId: CreateLogGroup
      description: "Creates a log group with the specified name. You can create up to 1,000,000 log groups per Region per account. You must use the following guidelines when naming a log group: Log group names must be unique within a Region for an Amazon Web Services account. Log group names can be between 1 and 512 characters long. Log group names consist of the following characters: a-z, A-Z, 0-9, '_' (underscore), '-' (hyphen), '/' (forward slash), '.' (period), and '#' (number sign) Log group names can't start with the string aws/ When you create a log group, by default the log events in the log group do not expire. To set a retention policy so that events expire and are deleted after a specified time, use PutRetentionPolicy. If you associate an KMS key with the log group, ingested data is encrypted using the KMS key. This association is stored as long as the data encrypted with the KMS key is still within CloudWatch Logs. This enables CloudWatch Logs to decrypt this data whenever it is requested. If you attempt to associate a KMS key with the log group but the KMS key does not exist or the KMS key is disabled, you receive an InvalidParameterException error. CloudWatch Logs supports only symmetric KMS keys. Do not associate an asymmetric KMS key with your log group. For more information, see Using Symmetric and Asymmetric Keys."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateLogGroup
            default: Logs_20140328.CreateLogGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: A name for the log group.
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The Amazon Resource Name (ARN) of the KMS key to use when encrypting log data. For more information, see Amazon Resource Names.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: The key-value pairs to use for the tags. You can grant users access to certain log groups while preventing them from accessing other log groups. To do so, tag your groups and use IAM policies that refer to those tags. To assign tags when you create a log group, you must have either the logs:TagResource or logs:TagLogGroup permission. For more information about tagging, see Tagging Amazon Web Services resources. For more information about using tags to control access, see Controlling access to Amazon Web Services resources using tags.
                logGroupClass:
                  $ref: "#/components/schemas/LogGroupClass"
                  description: "Use this parameter to specify the log group class for this log group. There are three classes: The Standard log class supports all CloudWatch Logs features. The Infrequent Access log class supports a subset of CloudWatch Logs features and incurs lower costs. Use the Delivery log class only for delivering Lambda logs to store in Amazon S3 or Amazon Data Firehose. Log events in log groups in the Delivery class are kept in CloudWatch Logs for only one day. This log class doesn't offer rich CloudWatch Logs capabilities such as CloudWatch Logs Insights queries. If you omit this parameter, the default of STANDARD is used. The value of logGroupClass can't be changed after a log group is created. For details about the features supported by each class, see Log classes"
                deletionProtectionEnabled:
                  $ref: "#/components/schemas/DeletionProtectionEnabled"
                  description: Use this parameter to enable deletion protection for the new log group. When enabled on a log group, deletion protection blocks all deletion operations until it is explicitly disabled. By default log groups are created without deletion protection enabled.
              required:
                - logGroupName
      responses:
        "200":
          description: Success
  /CreateLogStream:
    post:
      operationId: CreateLogStream
      description: "Creates a log stream for the specified log group. A log stream is a sequence of log events that originate from a single source, such as an application instance or a resource that is being monitored. There is no limit on the number of log streams that you can create for a log group. There is a limit of 50 TPS on CreateLogStream operations, after which transactions are throttled. You must use the following guidelines when naming a log stream: Log stream names must be unique within the log group. Log stream names can be between 1 and 512 characters long. Don't use ':' (colon) or '*' (asterisk) characters."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateLogStream
            default: Logs_20140328.CreateLogStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                logStreamName:
                  $ref: "#/components/schemas/LogStreamName"
                  description: The name of the log stream.
              required:
                - logGroupName
                - logStreamName
      responses:
        "200":
          description: Success
  /CreateLookupTable:
    post:
      operationId: CreateLookupTable
      description: Creates a lookup table by uploading CSV data. You can use lookup tables to enrich log data in CloudWatch Logs Insights queries with reference data such as user details, application names, or error descriptions. The table name must be unique within your account and Region. The CSV content must include a header row with column names, use UTF-8 encoding, and not exceed 10 MB.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateLookupTable
            default: Logs_20140328.CreateLookupTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                lookupTableName:
                  $ref: "#/components/schemas/LookupTableName"
                  description: The name of the lookup table. The name must be unique within your account and Region. The name can contain only alphanumeric characters and underscores, and can be up to 256 characters long.
                description:
                  $ref: "#/components/schemas/LookupTableDescription"
                  description: A description of the lookup table. The description can be up to 1024 characters long.
                tableBody:
                  $ref: "#/components/schemas/TableBody"
                  description: The CSV content of the lookup table. The first row must be a header row with column names. The content must use UTF-8 encoding and not exceed 10 MB.
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The ARN of the KMS key to use to encrypt the lookup table data. If you don't specify a key, the data is encrypted with an Amazon Web Services-owned key.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of key-value pairs to associate with the lookup table. You can associate as many as 50 tags with a lookup table. Tags can help you organize and categorize your resources.
              required:
                - lookupTableName
                - tableBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLookupTableResponse"
  /CreateScheduledQuery:
    post:
      operationId: CreateScheduledQuery
      description: Creates a scheduled query that runs CloudWatch Logs Insights queries at regular intervals. Scheduled queries enable proactive monitoring by automatically executing queries to detect patterns and anomalies in your log data. Query results can be delivered to Amazon S3 for analysis or further processing.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.CreateScheduledQuery
            default: Logs_20140328.CreateScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ScheduledQueryName"
                  description: The name of the scheduled query. The name must be unique within your account and region. Valid characters are alphanumeric characters, hyphens, underscores, and periods. Length must be between 1 and 255 characters.
                description:
                  $ref: "#/components/schemas/ScheduledQueryDescription"
                  description: An optional description for the scheduled query to help identify its purpose and functionality.
                queryLanguage:
                  $ref: "#/components/schemas/QueryLanguage"
                  description: The query language to use for the scheduled query. Valid values are CWLI, PPL, and SQL.
                queryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The query string to execute. This is the same query syntax used in CloudWatch Logs Insights. Maximum length is 10,000 characters.
                logGroupIdentifiers:
                  $ref: "#/components/schemas/ScheduledQueryLogGroupIdentifiers"
                  description: An array of log group names or ARNs to query. You can specify between 1 and 50 log groups. Log groups can be identified by name or full ARN.
                scheduleExpression:
                  $ref: "#/components/schemas/ScheduleExpression"
                  description: A cron expression that defines when the scheduled query runs. The expression uses standard cron syntax and supports minute-level precision. Maximum length is 256 characters.
                timezone:
                  $ref: "#/components/schemas/ScheduleTimezone"
                  description: The timezone for evaluating the schedule expression. This determines when the scheduled query executes relative to the specified timezone.
                startTimeOffset:
                  $ref: "#/components/schemas/StartTimeOffset"
                  description: The time offset in seconds that defines the lookback period for the query. This determines how far back in time the query searches from the execution time.
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
                  description: Configuration for where to deliver query results. Currently supports Amazon S3 destinations for storing query output.
                scheduleStartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start time for the scheduled query in Unix epoch format. The query will not execute before this time.
                scheduleEndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end time for the scheduled query in Unix epoch format. The query will stop executing after this time.
                executionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of the IAM role that grants permissions to execute the query and deliver results to the specified destination. The role must have permissions to read from the specified log groups and write to the destination.
                state:
                  $ref: "#/components/schemas/ScheduledQueryState"
                  description: The initial state of the scheduled query. Valid values are ENABLED and DISABLED. Default is ENABLED.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: Key-value pairs to associate with the scheduled query for resource management and cost allocation.
              required:
                - name
                - queryLanguage
                - queryString
                - scheduleExpression
                - executionRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduledQueryResponse"
  /DeleteAccountPolicy:
    post:
      operationId: DeleteAccountPolicy
      description: Deletes a CloudWatch Logs account policy. This stops the account-wide policy from applying to log groups or data sources in the account. If you delete a data protection policy or subscription filter policy, any log-group level policies of those types remain in effect. This operation supports deletion of data source-based field index policies, including facet configurations, in addition to log group-based policies. To use this operation, you must be signed on with the correct permissions depending on the type of policy that you are deleting. To delete a data protection policy, you must have the logs:DeleteDataProtectionPolicy and logs:DeleteAccountPolicy permissions. To delete a subscription filter policy, you must have the logs:DeleteSubscriptionFilter and logs:DeleteAccountPolicy permissions. To delete a transformer policy, you must have the logs:DeleteTransformer and logs:DeleteAccountPolicy permissions. To delete a field index policy, you must have the logs:DeleteIndexPolicy and logs:DeleteAccountPolicy permissions. If you delete a field index policy that included facet configurations, those facets will no longer be available for interactive exploration in the CloudWatch Logs Insights console. However, facet data is retained for up to 30 days. If you delete a field index policy, the indexing of the log events that happened before you deleted the policy will still be used for up to 30 days to improve CloudWatch Logs Insights queries.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteAccountPolicy
            default: Logs_20140328.DeleteAccountPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                policyName:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy to delete.
                policyType:
                  $ref: "#/components/schemas/PolicyType"
                  description: The type of policy to delete.
              required:
                - policyName
                - policyType
      responses:
        "200":
          description: Success
  /DeleteDataProtectionPolicy:
    post:
      operationId: DeleteDataProtectionPolicy
      description: Deletes the data protection policy from the specified log group. For more information about data protection policies, see PutDataProtectionPolicy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteDataProtectionPolicy
            default: Logs_20140328.DeleteDataProtectionPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifier:
                  $ref: "#/components/schemas/LogGroupIdentifier"
                  description: The name or ARN of the log group that you want to delete the data protection policy for.
              required:
                - logGroupIdentifier
      responses:
        "200":
          description: Success
  /DeleteDelivery:
    post:
      operationId: DeleteDelivery
      description: Deletes a delivery. A delivery is a connection between a logical delivery source and a logical delivery destination. Deleting a delivery only deletes the connection between the delivery source and delivery destination. It does not delete the delivery destination or the delivery source.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteDelivery
            default: Logs_20140328.DeleteDelivery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/DeliveryId"
                  description: The unique ID of the delivery to delete. You can find the ID of a delivery with the DescribeDeliveries operation.
              required:
                - id
      responses:
        "200":
          description: Success
  /DeleteDeliveryDestination:
    post:
      operationId: DeleteDeliveryDestination
      description: Deletes a delivery destination. A delivery is a connection between a logical delivery source and a logical delivery destination. You can't delete a delivery destination if any current deliveries are associated with it. To find whether any deliveries are associated with this delivery destination, use the DescribeDeliveries operation and check the deliveryDestinationArn field in the results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteDeliveryDestination
            default: Logs_20140328.DeleteDeliveryDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DeliveryDestinationName"
                  description: The name of the delivery destination that you want to delete. You can find a list of delivery destination names by using the DescribeDeliveryDestinations operation.
              required:
                - name
      responses:
        "200":
          description: Success
  /DeleteDeliveryDestinationPolicy:
    post:
      operationId: DeleteDeliveryDestinationPolicy
      description: Deletes a delivery destination policy. For more information about these policies, see PutDeliveryDestinationPolicy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteDeliveryDestinationPolicy
            default: Logs_20140328.DeleteDeliveryDestinationPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deliveryDestinationName:
                  $ref: "#/components/schemas/DeliveryDestinationName"
                  description: The name of the delivery destination that you want to delete the policy for.
              required:
                - deliveryDestinationName
      responses:
        "200":
          description: Success
  /DeleteDeliverySource:
    post:
      operationId: DeleteDeliverySource
      description: Deletes a delivery source. A delivery is a connection between a logical delivery source and a logical delivery destination. You can't delete a delivery source if any current deliveries are associated with it. To find whether any deliveries are associated with this delivery source, use the DescribeDeliveries operation and check the deliverySourceName field in the results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteDeliverySource
            default: Logs_20140328.DeleteDeliverySource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DeliverySourceName"
                  description: The name of the delivery source that you want to delete.
              required:
                - name
      responses:
        "200":
          description: Success
  /DeleteDestination:
    post:
      operationId: DeleteDestination
      description: Deletes the specified destination, and eventually disables all the subscription filters that publish to it. This operation does not delete the physical resource encapsulated by the destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteDestination
            default: Logs_20140328.DeleteDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                destinationName:
                  $ref: "#/components/schemas/DestinationName"
                  description: The name of the destination.
              required:
                - destinationName
      responses:
        "200":
          description: Success
  /DeleteIndexPolicy:
    post:
      operationId: DeleteIndexPolicy
      description: Deletes a log-group level field index policy that was applied to a single log group. The indexing of the log events that happened before you delete the policy will still be used for as many as 30 days to improve CloudWatch Logs Insights queries. If the deleted policy included facet configurations, those facets will no longer be available for interactive exploration in the CloudWatch Logs Insights console for this log group. However, facet data is retained for up to 30 days. You can't use this operation to delete an account-level index policy. Instead, use DeleteAccountPolicy. If you delete a log-group level field index policy and there is an account-level field index policy, in a few minutes the log group begins using that account-wide policy to index new incoming log events. This operation only affects log group-level policies, including any facet configurations, and preserves any data source-based account policies that may apply to the log group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteIndexPolicy
            default: Logs_20140328.DeleteIndexPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifier:
                  $ref: "#/components/schemas/LogGroupIdentifier"
                  description: The log group to delete the index policy for. You can specify either the name or the ARN of the log group.
              required:
                - logGroupIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIndexPolicyResponse"
  /DeleteIntegration:
    post:
      operationId: DeleteIntegration
      description: Deletes the integration between CloudWatch Logs and OpenSearch Service. If your integration has active vended logs dashboards, you must specify true for the force parameter, otherwise the operation will fail. If you delete the integration by setting force to true, all your vended logs dashboards powered by OpenSearch Service will be deleted and the data that was on them will no longer be accessible.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteIntegration
            default: Logs_20140328.DeleteIntegration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                integrationName:
                  $ref: "#/components/schemas/IntegrationName"
                  description: The name of the integration to delete. To find the name of your integration, use ListIntegrations.
                force:
                  $ref: "#/components/schemas/Force"
                  description: Specify true to force the deletion of the integration even if vended logs dashboards currently exist. The default is false.
              required:
                - integrationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIntegrationResponse"
  /DeleteLogAnomalyDetector:
    post:
      operationId: DeleteLogAnomalyDetector
      description: Deletes the specified CloudWatch Logs anomaly detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
