        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ARN of the KMS key assigned to this anomaly detector, if any.
        creationTimeStamp:
          $ref: "#/components/schemas/EpochMillis"
          description: The date and time when this anomaly detector was created.
        lastModifiedTimeStamp:
          $ref: "#/components/schemas/EpochMillis"
          description: The date and time when this anomaly detector was most recently modified.
        anomalyVisibilityTime:
          $ref: "#/components/schemas/AnomalyVisibilityTime"
          description: The number of days used as the life cycle of anomalies. After this time, anomalies are automatically baselined and the anomaly detector model will treat new occurrences of similar event as normal.
    AnomalyDetectorStatus:
      type: string
      enum:
        - INITIALIZING
        - TRAINING
        - ANALYZING
        - FAILED
        - DELETED
        - PAUSED
    EpochMillis:
      type: integer
      format: int64
      minimum: 0
    StartFromHead:
      type: boolean
    GetLogEventsResponse:
