        - INFINITE
    SuppressionPeriod:
      description: If you are suppressing an anomaly temporariliy, this structure defines how long the suppression period is to be.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/Integer"
          description: Specifies the number of seconds, minutes or hours to suppress this anomaly. There is no maximum.
