          description: The name to use when specifying this record field in a CreateDelivery or UpdateDeliveryConfiguration operation.
        mandatory:
          $ref: "#/components/schemas/Boolean"
          description: If this is true, the record field must be present in the recordFields parameter provided to a CreateDelivery or UpdateDeliveryConfiguration operation.
    OutputFormats:
