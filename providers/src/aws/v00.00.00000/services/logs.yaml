          description: The name of the log group.
        logGroupArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the log group.
        logGroupClass:
          $ref: "#/components/schemas/LogGroupClass"
          description: The log group class for this log group. For details about the features supported by each log group class, see Log classes
    ListLogGroupsForQueryMaxResults:
