      type: object
      properties:
        transformedLogs:
          $ref: "#/components/schemas/TransformedLogs"
          description: An array where each member of the array includes both the original version and the transformed version of one of the log events that you input.
    TransformedLogs:
      type: array
      items:
        $ref: "#/components/schemas/TransformedLogRecord"
    TransformedLogRecord:
      description: This structure contains information for one log event that has been processed by a log transformer.
      type: object
      properties:
        eventNumber:
          $ref: "#/components/schemas/EventNumber"
          description: The event number.
        eventMessage:
          $ref: "#/components/schemas/EventMessage"
          description: The original log event message before it was transformed.
        transformedEventMessage:
          $ref: "#/components/schemas/TransformedEventMessage"
          description: The log event message after being transformed.
