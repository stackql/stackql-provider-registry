          description: The key of the new entry to be added to the log event
        value:
          $ref: "#/components/schemas/AddKeyValue"
          description: The value of the new entry to be added to the log event
        overwriteIfExists:
          $ref: "#/components/schemas/OverwriteIfExists"
          description: Specifies whether to overwrite the value if the key already exists in the log event. If you omit this, the default is false.
      required:
        - key
        - value
    Key:
      type: string
      minLength: 1
      maxLength: 128
    AddKeyValue:
      type: string
      minLength: 1
      maxLength: 256
    OverwriteIfExists:
      type: boolean
    CopyValue:
      description: "This processor copies values within a log event. You can also use this processor to add metadata to log events by copying the values of the following metadata keys into the log events: @logGroupName, @logGroupStream, @accountId, @regionName. For more information about this processor including examples, see copyValue in the CloudWatch Logs User Guide."
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/CopyValueEntries"
          description: An array of CopyValueEntry objects, where each object contains the information about one field value to copy.
      required:
        - entries
    CopyValueEntries:
      type: array
      items:
        $ref: "#/components/schemas/CopyValueEntry"
    CopyValueEntry:
      description: This object defines one value to be copied with the copyValue processor.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The key to copy.
        target:
          $ref: "#/components/schemas/Target"
          description: The key of the field to copy the value to.
        overwriteIfExists:
          $ref: "#/components/schemas/OverwriteIfExists"
          description: Specifies whether to overwrite the value if the destination key already exists. If you omit this, the default is false.
      required:
        - source
        - target
    Source:
      type: string
      minLength: 1
      maxLength: 128
    Target:
      type: string
      minLength: 1
      maxLength: 128
    CSV:
      description: The CSV processor parses comma-separated values (CSV) from the log events into columns. For more information about this processor including examples, see csv in the CloudWatch Logs User Guide.
      type: object
      properties:
        quoteCharacter:
          $ref: "#/components/schemas/QuoteCharacter"
          description: The character used used as a text qualifier for a single column of data. If you omit this, the double quotation mark " character is used.
        delimiter:
          $ref: "#/components/schemas/Delimiter"
          description: The character used to separate each column in the original comma-separated value log event. If you omit this, the processor looks for the comma , character as the delimiter.
        columns:
          $ref: "#/components/schemas/Columns"
          description: An array of names to use for the columns in the transformed log event. If you omit this, default column names ([column_1, column_2 ...]) are used.
        source:
          $ref: "#/components/schemas/Source"
          description: The path to the field in the log event that has the comma separated values to be parsed. If you omit this value, the whole log message is processed.
        destination:
          $ref: "#/components/schemas/DestinationField"
          description: The path to the parent field to put transformed key value pairs under. If you omit this value, the key value pairs will be placed under the root node.
    QuoteCharacter:
      type: string
      minLength: 1
      maxLength: 1
    Delimiter:
      type: string
      minLength: 1
      maxLength: 2
    Columns:
      type: array
      items:
        $ref: "#/components/schemas/Column"
    Column:
      type: string
      minLength: 1
      maxLength: 128
    DestinationField:
      type: string
      minLength: 1
      maxLength: 128
    DateTimeConverter:
      description: This processor converts a datetime string into a format that you specify. For more information about this processor including examples, see datetimeConverter in the CloudWatch Logs User Guide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The key to apply the date conversion to.
        target:
          $ref: "#/components/schemas/Target"
          description: The JSON field to store the result in.
        targetFormat:
          $ref: "#/components/schemas/TargetFormat"
          description: The datetime format to use for the converted data in the target field. If you omit this, the default of yyyy-MM-dd'T'HH:mm:ss.SSS'Z is used.
        matchPatterns:
          $ref: "#/components/schemas/MatchPatterns"
          description: A list of patterns to match against the source field.
        sourceTimezone:
          $ref: "#/components/schemas/SourceTimezone"
          description: The time zone of the source field. If you omit this, the default used is the UTC zone.
        targetTimezone:
          $ref: "#/components/schemas/TargetTimezone"
          description: The time zone of the target field. If you omit this, the default used is the UTC zone.
        locale:
          $ref: "#/components/schemas/Locale"
          description: The locale of the source field. If you omit this, the default of locale.ROOT is used.
      required:
        - source
        - target
        - matchPatterns
    TargetFormat:
      type: string
      minLength: 1
      maxLength: 64
    MatchPatterns:
      type: array
      items:
        $ref: "#/components/schemas/MatchPattern"
    MatchPattern:
      type: string
      minLength: 1
    SourceTimezone:
      type: string
      minLength: 1
    TargetTimezone:
      type: string
      minLength: 1
    Locale:
      type: string
      minLength: 1
    DeleteKeys:
      description: This processor deletes entries from a log event. These entries are key-value pairs. For more information about this processor including examples, see deleteKeys in the CloudWatch Logs User Guide.
      type: object
      properties:
        withKeys:
          $ref: "#/components/schemas/DeleteWithKeys"
          description: The list of keys to delete.
      required:
        - withKeys
    DeleteWithKeys:
      type: array
      items:
        $ref: "#/components/schemas/WithKey"
    WithKey:
      type: string
      minLength: 1
    Grok:
      description: This processor uses pattern matching to parse and structure unstructured data. This processor can also extract fields from log messages. For more information about this processor including examples, see grok in the CloudWatch Logs User Guide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The path to the field in the log event that you want to parse. If you omit this value, the whole log message is parsed.
        match:
          $ref: "#/components/schemas/GrokMatch"
          description: The grok pattern to match against the log event. For a list of supported grok patterns, see Supported grok patterns.
      required:
        - match
    GrokMatch:
      type: string
      minLength: 1
      maxLength: 512
    ListToMap:
      description: This processor takes a list of objects that contain key fields, and converts them into a map of target keys. For more information about this processor including examples, see listToMap in the CloudWatch Logs User Guide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The key in the log event that has a list of objects that will be converted to a map.
        key:
          $ref: "#/components/schemas/Key"
          description: The key of the field to be extracted as keys in the generated map
        valueKey:
          $ref: "#/components/schemas/ValueKey"
          description: If this is specified, the values that you specify in this parameter will be extracted from the source objects and put into the values of the generated map. Otherwise, original objects in the source list will be put into the values of the generated map.
        target:
          $ref: "#/components/schemas/Target"
          description: The key of the field that will hold the generated map
        flatten:
          $ref: "#/components/schemas/Flatten"
          description: A Boolean value to indicate whether the list will be flattened into single items. Specify true to flatten the list. The default is false
        flattenedElement:
          $ref: "#/components/schemas/FlattenedElement"
          description: If you set flatten to true, use flattenedElement to specify which element, first or last, to keep. You must specify this parameter if flatten is true
      required:
        - source
        - key
    ValueKey:
      type: string
      minLength: 1
      maxLength: 128
    Flatten:
      type: boolean
    FlattenedElement:
      type: string
      enum:
        - first
        - last
    LowerCaseString:
      description: This processor converts a string to lowercase. For more information about this processor including examples, see lowerCaseString in the CloudWatch Logs User Guide.
      type: object
      properties:
        withKeys:
          $ref: "#/components/schemas/LowerCaseStringWithKeys"
          description: The array caontaining the keys of the fields to convert to lowercase.
      required:
        - withKeys
    LowerCaseStringWithKeys:
      type: array
      items:
        $ref: "#/components/schemas/WithKey"
    MoveKeys:
      description: This processor moves a key from one field to another. The original key is deleted. For more information about this processor including examples, see moveKeys in the CloudWatch Logs User Guide.
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/MoveKeyEntries"
          description: An array of objects, where each object contains the information about one key to move.
      required:
        - entries
    MoveKeyEntries:
      type: array
      items:
        $ref: "#/components/schemas/MoveKeyEntry"
    MoveKeyEntry:
      description: This object defines one key that will be moved with the moveKey processor.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The key to move.
        target:
          $ref: "#/components/schemas/Target"
          description: The key to move to.
        overwriteIfExists:
          $ref: "#/components/schemas/OverwriteIfExists"
          description: Specifies whether to overwrite the value if the destination key already exists. If you omit this, the default is false.
      required:
        - source
        - target
    ParseCloudfront:
      description: This processor parses CloudFront vended logs, extract fields, and convert them into JSON format. Encoded field values are decoded. Values that are integers and doubles are treated as such. For more information about this processor including examples, see parseCloudfront For more information about CloudFront log format, see Configure and use standard logs (access logs). If you use this processor, it must be the first processor in your transformer.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Omit this parameter and the whole log message will be processed by this processor. No other value than @message is allowed for source.
    ParseJSON:
      description: This processor parses log events that are in JSON format. It can extract JSON key-value pairs and place them under a destination that you specify. Additionally, because you must have at least one parse-type processor in a transformer, you can use ParseJSON as that processor for JSON-format logs, so that you can also apply other processors, such as mutate processors, to these logs. For more information about this processor including examples, see parseJSON in the CloudWatch Logs User Guide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Path to the field in the log event that will be parsed. Use dot notation to access child fields. For example, store.book
        destination:
          $ref: "#/components/schemas/DestinationField"
          description: The location to put the parsed key value pair into. If you omit this parameter, it is placed under the root node.
    ParseKeyValue:
      description: This processor parses a specified field in the original log event into key-value pairs. For more information about this processor including examples, see parseKeyValue in the CloudWatch Logs User Guide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Path to the field in the log event that will be parsed. Use dot notation to access child fields. For example, store.book
        destination:
          $ref: "#/components/schemas/DestinationField"
          description: The destination field to put the extracted key-value pairs into
        fieldDelimiter:
          $ref: "#/components/schemas/ParserFieldDelimiter"
          description: The field delimiter string that is used between key-value pairs in the original log events. If you omit this, the ampersand & character is used.
        keyValueDelimiter:
          $ref: "#/components/schemas/KeyValueDelimiter"
          description: The delimiter string to use between the key and value in each pair in the transformed log event. If you omit this, the equal = character is used.
        keyPrefix:
          $ref: "#/components/schemas/KeyPrefix"
          description: If you want to add a prefix to all transformed keys, specify it here.
        nonMatchValue:
          $ref: "#/components/schemas/NonMatchValue"
          description: A value to insert into the value field in the result, when a key-value pair is not successfully split.
        overwriteIfExists:
          $ref: "#/components/schemas/OverwriteIfExists"
          description: Specifies whether to overwrite the value if the destination key already exists. If you omit this, the default is false.
    ParserFieldDelimiter:
      type: string
      minLength: 1
      maxLength: 128
    KeyValueDelimiter:
      type: string
      minLength: 1
      maxLength: 128
    KeyPrefix:
      type: string
      minLength: 1
      maxLength: 128
    NonMatchValue:
      type: string
      minLength: 1
      maxLength: 128
    ParseRoute53:
      description: Use this processor to parse Route 53 vended logs, extract fields, and and convert them into a JSON format. This processor always processes the entire log event message. For more information about this processor including examples, see parseRoute53. If you use this processor, it must be the first processor in your transformer.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Omit this parameter and the whole log message will be processed by this processor. No other value than @message is allowed for source.
    ParseToOCSF:
      description: This processor converts logs into Open Cybersecurity Schema Framework (OCSF) events. For more information about this processor including examples, see parseToOCSF in the CloudWatch Logs User Guide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The path to the field in the log event that you want to parse. If you omit this value, the whole log message is parsed.
        eventSource:
          $ref: "#/components/schemas/EventSource"
          description: Specify the service or process that produces the log events that will be converted with this processor.
        ocsfVersion:
          $ref: "#/components/schemas/OCSFVersion"
          description: Specify which version of the OCSF schema to use for the transformed log events.
        mappingVersion:
          $ref: "#/components/schemas/MappingVersion"
          description: The version of the OCSF mapping to use for parsing log data.
      required:
        - eventSource
        - ocsfVersion
    EventSource:
      type: string
      enum:
        - CloudTrail
        - Route53Resolver
        - VPCFlow
        - EKSAudit
        - AWSWAF
    OCSFVersion:
      type: string
      enum:
        - V1.1
        - V1.5
    MappingVersion:
      type: string
      minLength: 1
      maxLength: 10
      pattern: ^\d+\.\d+(\.\d+)?$
    ParsePostgres:
      description: Use this processor to parse RDS for PostgreSQL vended logs, extract fields, and and convert them into a JSON format. This processor always processes the entire log event message. For more information about this processor including examples, see parsePostGres. For more information about RDS for PostgreSQL log format, see RDS for PostgreSQL database log filesTCP flag sequence. If you use this processor, it must be the first processor in your transformer.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Omit this parameter and the whole log message will be processed by this processor. No other value than @message is allowed for source.
    ParseVPC:
      description: Use this processor to parse Amazon VPC vended logs, extract fields, and and convert them into a JSON format. This processor always processes the entire log event message. This processor doesn't support custom log formats, such as NAT gateway logs. For more information about custom log formats in Amazon VPC, see parseVPC For more information about this processor including examples, see parseVPC. If you use this processor, it must be the first processor in your transformer.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Omit this parameter and the whole log message will be processed by this processor. No other value than @message is allowed for source.
    ParseWAF:
      description: Use this processor to parse WAF vended logs, extract fields, and and convert them into a JSON format. This processor always processes the entire log event message. For more information about this processor including examples, see parseWAF. For more information about WAF log format, see Log examples for web ACL traffic. If you use this processor, it must be the first processor in your transformer.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: Omit this parameter and the whole log message will be processed by this processor. No other value than @message is allowed for source.
    RenameKeys:
      description: Use this processor to rename keys in a log event. For more information about this processor including examples, see renameKeys in the CloudWatch Logs User Guide.
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/RenameKeyEntries"
          description: An array of RenameKeyEntry objects, where each object contains the information about a single key to rename.
      required:
        - entries
    RenameKeyEntries:
      type: array
      items:
        $ref: "#/components/schemas/RenameKeyEntry"
    RenameKeyEntry:
      description: This object defines one key that will be renamed with the renameKey processor.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/Key"
          description: The key to rename
        renameTo:
          $ref: "#/components/schemas/RenameTo"
          description: The string to use for the new key name
        overwriteIfExists:
          $ref: "#/components/schemas/OverwriteIfExists"
          description: Specifies whether to overwrite the existing value if the destination key already exists. The default is false
      required:
        - key
        - renameTo
    RenameTo:
      type: string
      minLength: 1
      maxLength: 128
    SplitString:
      description: Use this processor to split a field into an array of strings using a delimiting character. For more information about this processor including examples, see splitString in the CloudWatch Logs User Guide.
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/SplitStringEntries"
          description: An array of SplitStringEntry objects, where each object contains the information about one field to split.
      required:
        - entries
    SplitStringEntries:
      type: array
      items:
        $ref: "#/components/schemas/SplitStringEntry"
    SplitStringEntry:
      description: This object defines one log field that will be split with the splitString processor.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The key of the field to split.
        delimiter:
          $ref: "#/components/schemas/SplitStringDelimiter"
          description: The separator characters to split the string entry on.
      required:
        - source
        - delimiter
    SplitStringDelimiter:
      type: string
      minLength: 1
      maxLength: 128
    SubstituteString:
      description: This processor matches a key’s value against a regular expression and replaces all matches with a replacement string. For more information about this processor including examples, see substituteString in the CloudWatch Logs User Guide.
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/SubstituteStringEntries"
          description: An array of objects, where each object contains the information about one key to match and replace.
      required:
        - entries
    SubstituteStringEntries:
      type: array
      items:
        $ref: "#/components/schemas/SubstituteStringEntry"
    SubstituteStringEntry:
      description: This object defines one log field key that will be replaced using the substituteString processor.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
          description: The key to modify
        from:
          $ref: "#/components/schemas/FromKey"
          description: The regular expression string to be replaced. Special regex characters such as [ and ] must be escaped using \\ when using double quotes and with \ when using single quotes. For more information, see Class Pattern on the Oracle web site.
        to:
          $ref: "#/components/schemas/ToKey"
          description: The string to be substituted for each match of from
      required:
        - source
        - from
        - to
    FromKey:
      type: string
      minLength: 1
      maxLength: 128
    ToKey:
      type: string
      minLength: 1
      maxLength: 128
    TrimString:
      description: Use this processor to remove leading and trailing whitespace. For more information about this processor including examples, see trimString in the CloudWatch Logs User Guide.
      type: object
      properties:
        withKeys:
          $ref: "#/components/schemas/TrimStringWithKeys"
          description: The array containing the keys of the fields to trim.
      required:
        - withKeys
    TrimStringWithKeys:
      type: array
      items:
        $ref: "#/components/schemas/WithKey"
    TypeConverter:
      description: "Use this processor to convert a value type associated with the specified key to the specified type. It's a casting processor that changes the types of the specified fields. Values can be converted into one of the following datatypes: integer, double, string and boolean. For more information about this processor including examples, see trimString in the CloudWatch Logs User Guide."
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/TypeConverterEntries"
          description: An array of TypeConverterEntry objects, where each object contains the information about one field to change the type of.
      required:
        - entries
    TypeConverterEntries:
      type: array
      items:
        $ref: "#/components/schemas/TypeConverterEntry"
    TypeConverterEntry:
      description: This object defines one value type that will be converted using the typeConverter processor.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/Key"
          description: The key with the value that is to be converted to a different type.
        type_:
          $ref: "#/components/schemas/Type"
          description: The type to convert the field value to. Valid values are integer, double, string and boolean.
      required:
        - key
        - type_
    Type:
      type: string
      enum:
        - boolean
        - integer
        - double
        - string
    UpperCaseString:
      description: This processor converts a string field to uppercase. For more information about this processor including examples, see upperCaseString in the CloudWatch Logs User Guide.
      type: object
      properties:
        withKeys:
          $ref: "#/components/schemas/UpperCaseStringWithKeys"
          description: The array of containing the keys of the field to convert to uppercase.
      required:
        - withKeys
    UpperCaseStringWithKeys:
      type: array
      items:
        $ref: "#/components/schemas/WithKey"
    LogGroupNameRegexPattern:
      type: string
      minLength: 3
      maxLength: 129
      pattern: (\^?[\.\-_\/#A-Za-z0-9]{3,24})(\|\^?[\.\-_\/#A-Za-z0-9]{3,24}){0,4}
    DataSourceFilters:
      type: array
      items:
        $ref: "#/components/schemas/DataSourceFilter"
    DataSourceFilter:
      description: Filter criteria for data sources, used to specify which data sources to include in operations based on name and type.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataSourceName"
          description: The name pattern to filter data sources by.
        type_:
          $ref: "#/components/schemas/DataSourceType"
          description: The type pattern to filter data sources by.
      required:
        - name
    ListAggregateLogGroupSummariesGroupBy:
      type: string
      enum:
        - DATA_SOURCE_NAME_TYPE_AND_FORMAT
        - DATA_SOURCE_NAME_AND_TYPE
    ListLogGroupsRequestLimit:
      type: integer
      minimum: 1
      maximum: 50
    ListAggregateLogGroupSummariesResponse:
      type: object
      properties:
        aggregateLogGroupSummaries:
          $ref: "#/components/schemas/AggregateLogGroupSummaries"
          description: The list of aggregate log group summaries grouped by the specified data source characteristics.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    AggregateLogGroupSummaries:
      type: array
      items:
        $ref: "#/components/schemas/AggregateLogGroupSummary"
    AggregateLogGroupSummary:
      description: Contains an aggregate summary of log groups grouped by data source characteristics, including the count of log groups and their grouping identifiers.
      type: object
      properties:
        logGroupCount:
          $ref: "#/components/schemas/LogGroupCount"
          description: The number of log groups in this aggregate summary group.
        groupingIdentifiers:
          $ref: "#/components/schemas/GroupingIdentifiers"
          description: An array of key-value pairs that identify the data source characteristics used to group the log groups. The size and content of this array depends on the groupBy parameter specified in the request.
    LogGroupCount:
      type: integer
    GroupingIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/GroupingIdentifier"
    GroupingIdentifier:
      description: A key-value pair that identifies how log groups are grouped in aggregate summaries.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/GroupingIdentifierKey"
          description: The key that identifies the grouping characteristic. The format of the key uses dot notation. Examples are, dataSource.Name, dataSource.Type, and dataSource.Format.
        value:
          $ref: "#/components/schemas/GroupingIdentifierValue"
          description: The value associated with the grouping characteristic. Examples are amazon_vpc, flow, and OCSF.
    GroupingIdentifierKey:
      type: string
    GroupingIdentifierValue:
      type: string
    SuppressionState:
      type: string
      enum:
        - SUPPRESSED
        - UNSUPPRESSED
    ListAnomaliesLimit:
      type: integer
      minimum: 1
      maximum: 50
    ListAnomaliesResponse:
      type: object
      properties:
        anomalies:
          $ref: "#/components/schemas/Anomalies"
          description: An array of structures, where each structure contains information about one anomaly that a log anomaly detector has found.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    Anomalies:
      type: array
      items:
        $ref: "#/components/schemas/Anomaly"
    Anomaly:
      description: This structure represents one anomaly that has been found by a logs anomaly detector. For more information about patterns and anomalies, see CreateLogAnomalyDetector.
      type: object
      properties:
        anomalyId:
          $ref: "#/components/schemas/AnomalyId"
          description: The unique ID that CloudWatch Logs assigned to this anomaly.
        patternId:
          $ref: "#/components/schemas/PatternId"
          description: The ID of the pattern used to help identify this anomaly.
        anomalyDetectorArn:
          $ref: "#/components/schemas/AnomalyDetectorArn"
          description: The ARN of the anomaly detector that identified this anomaly.
        patternString:
          $ref: "#/components/schemas/PatternString"
          description: The pattern used to help identify this anomaly, in string format.
        patternRegex:
          $ref: "#/components/schemas/PatternRegex"
          description: The pattern used to help identify this anomaly, in regular expression format.
        priority:
          $ref: "#/components/schemas/Priority"
          description: The priority level of this anomaly, as determined by CloudWatch Logs. Priority is computed based on log severity labels such as FATAL and ERROR and the amount of deviation from the baseline. Possible values are HIGH, MEDIUM, and LOW.
        firstSeen:
          $ref: "#/components/schemas/EpochMillis"
          description: The date and time when the anomaly detector first saw this anomaly. It is specified as epoch time, which is the number of seconds since January 1, 1970, 00:00:00 UTC.
        lastSeen:
          $ref: "#/components/schemas/EpochMillis"
          description: The date and time when the anomaly detector most recently saw this anomaly. It is specified as epoch time, which is the number of seconds since January 1, 1970, 00:00:00 UTC.
        description:
          $ref: "#/components/schemas/Description"
          description: A human-readable description of the anomaly. This description is generated by CloudWatch Logs.
        active:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether this anomaly is still ongoing.
        state:
          $ref: "#/components/schemas/State"
          description: Indicates the current state of this anomaly. If it is still being treated as an anomaly, the value is Active. If you have suppressed this anomaly by using the UpdateAnomaly operation, the value is Suppressed. If this behavior is now considered to be normal, the value is Baseline.
        histogram:
          type: object
          properties: {}
          description: A map showing times when the anomaly detector ran, and the number of occurrences of this anomaly that were detected at each of those runs. The times are specified in epoch time, which is the number of seconds since January 1, 1970, 00:00:00 UTC.
        logSamples:
          $ref: "#/components/schemas/LogSamples"
          description: An array of sample log event messages that are considered to be part of this anomaly.
        patternTokens:
          $ref: "#/components/schemas/PatternTokens"
          description: An array of structures where each structure contains information about one token that makes up the pattern.
        logGroupArnList:
          $ref: "#/components/schemas/LogGroupArnList"
          description: An array of ARNS of the log groups that contained log events considered to be part of this anomaly.
        suppressed:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this anomaly is currently suppressed. To suppress an anomaly, use UpdateAnomaly.
        suppressedDate:
          $ref: "#/components/schemas/EpochMillis"
          description: If the anomaly is suppressed, this indicates when it was suppressed.
        suppressedUntil:
          $ref: "#/components/schemas/EpochMillis"
          description: If the anomaly is suppressed, this indicates when the suppression will end. If this value is 0, the anomaly was suppressed with no expiration, with the INFINITE value.
        isPatternLevelSuppression:
          $ref: "#/components/schemas/Boolean"
          description: If this anomaly is suppressed, this field is true if the suppression is because the pattern is suppressed. If false, then only this particular anomaly is suppressed.
      required:
        - anomalyId
        - patternId
        - anomalyDetectorArn
        - patternString
        - firstSeen
        - lastSeen
        - description
        - active
        - state
        - histogram
        - logSamples
        - patternTokens
        - logGroupArnList
    AnomalyId:
      type: string
      minLength: 36
      maxLength: 36
    PatternId:
      type: string
      minLength: 32
      maxLength: 32
    PatternString:
      type: string
      minLength: 1
    PatternRegex:
      type: string
      minLength: 1
    Priority:
      type: string
      minLength: 1
    Description:
      type: string
      minLength: 1
    State:
      type: string
      enum:
        - Active
        - Suppressed
        - Baseline
    LogSamples:
      type: array
      items:
        $ref: "#/components/schemas/LogEvent"
    LogEvent:
      description: This structure contains the information for one sample log event that is associated with an anomaly found by a log anomaly detector.
      type: object
      properties:
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time stamp of the log event.
        message:
          $ref: "#/components/schemas/EventMessage"
          description: The message content of the log event.
    PatternTokens:
      type: array
      items:
        $ref: "#/components/schemas/PatternToken"
    PatternToken:
      description: A structure that contains information about one pattern token related to an anomaly. For more information about patterns and tokens, see CreateLogAnomalyDetector.
      type: object
      properties:
        dynamicTokenPosition:
          $ref: "#/components/schemas/DynamicTokenPosition"
          description: For a dynamic token, this indicates where in the pattern that this token appears, related to other dynamic tokens. The dynamic token that appears first has a value of 1, the one that appears second is 2, and so on.
        isDynamic:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether this is a dynamic token.
        tokenString:
          $ref: "#/components/schemas/TokenString"
          description: The string represented by this token. If this is a dynamic token, the value will be <*>
        enumerations:
          type: object
          properties: {}
          description: Contains the values found for a dynamic token, and the number of times each value was found.
        inferredTokenName:
          $ref: "#/components/schemas/InferredTokenName"
          description: A name that CloudWatch Logs assigned to this dynamic token to make the pattern more readable. The string part of the inferredTokenName gives you a clearer idea of the content of this token. The number part of the inferredTokenName shows where in the pattern this token appears, compared to other dynamic tokens. CloudWatch Logs assigns the string part of the name based on analyzing the content of the log events that contain it. For example, an inferred token name of IPAddress-3 means that the token represents an IP address, and this token is the third dynamic token in the pattern.
    DynamicTokenPosition:
      type: integer
    TokenString:
      type: string
      minLength: 1
    InferredTokenName:
      type: string
      minLength: 1
    IntegrationNamePrefix:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    ListIntegrationsResponse:
      type: object
      properties:
        integrationSummaries:
          $ref: "#/components/schemas/IntegrationSummaries"
          description: An array, where each object in the array contains information about one CloudWatch Logs integration in this account.
    IntegrationSummaries:
      type: array
      items:
        $ref: "#/components/schemas/IntegrationSummary"
    IntegrationSummary:
      description: This structure contains information about one CloudWatch Logs integration. This structure is returned by a ListIntegrations operation.
      type: object
      properties:
        integrationName:
          $ref: "#/components/schemas/IntegrationName"
          description: The name of this integration.
        integrationType:
          $ref: "#/components/schemas/IntegrationType"
          description: The type of integration. Integrations with OpenSearch Service have the type OPENSEARCH.
        integrationStatus:
          $ref: "#/components/schemas/IntegrationStatus"
          description: The current status of this integration.
    ListLogAnomalyDetectorsLimit:
      type: integer
      minimum: 1
      maximum: 50
    ListLogAnomalyDetectorsResponse:
      type: object
      properties:
        anomalyDetectors:
          $ref: "#/components/schemas/AnomalyDetectors"
          description: An array of structures, where each structure in the array contains information about one anomaly detector.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    AnomalyDetectors:
      type: array
      items:
        $ref: "#/components/schemas/AnomalyDetector"
    AnomalyDetector:
      description: Contains information about one anomaly detector in the account.
      type: object
      properties:
        anomalyDetectorArn:
          $ref: "#/components/schemas/AnomalyDetectorArn"
          description: The ARN of the anomaly detector.
        detectorName:
          $ref: "#/components/schemas/DetectorName"
          description: The name of the anomaly detector.
        logGroupArnList:
          $ref: "#/components/schemas/LogGroupArnList"
          description: A list of the ARNs of the log groups that this anomaly detector watches.
        evaluationFrequency:
          $ref: "#/components/schemas/EvaluationFrequency"
          description: Specifies how often the anomaly detector runs and look for anomalies.
        filterPattern:
          $ref: "#/components/schemas/FilterPattern"
        anomalyDetectorStatus:
          $ref: "#/components/schemas/AnomalyDetectorStatus"
          description: Specifies the current status of the anomaly detector. To pause an anomaly detector, use the enabled parameter in the UpdateLogAnomalyDetector operation.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ARN of the KMS key assigned to this anomaly detector, if any.
        creationTimeStamp:
          $ref: "#/components/schemas/EpochMillis"
          description: The date and time when this anomaly detector was created.
        lastModifiedTimeStamp:
          $ref: "#/components/schemas/EpochMillis"
          description: The date and time when this anomaly detector was most recently modified.
        anomalyVisibilityTime:
          $ref: "#/components/schemas/AnomalyVisibilityTime"
          description: The number of days used as the life cycle of anomalies. After this time, anomalies are automatically baselined and the anomaly detector model will treat new occurrences of similar event as normal.
    ListLimit:
      type: integer
      minimum: 1
      maximum: 1000
    FieldIndexNames:
      type: array
      items:
        $ref: "#/components/schemas/FieldIndexName"
    TagFilters:
      type: array
      items:
        $ref: "#/components/schemas/TagFilter"
    TagFilter:
      description: A tag filter that specifies a tag key and optional tag values for filtering log groups by tags.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagFilterKey"
          description: The tag key to filter on.
        values:
          $ref: "#/components/schemas/TagFilterValues"
          description: An optional list of tag values to filter on. If you specify a filter that contains more than one value for a key, the response returns log groups that match any of the specified values for that key. If you don't specify values, the response returns all log groups that are tagged with that key, with any or no value. Use * for wildcard matching. For example, prod* matches values that start with prod. Use ! as a prefix for negation. For example, !prod matches values that are not prod. Exact matching and negation are case-sensitive. Wildcard matching is case-insensitive.
      required:
        - key
    TagFilterKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]+)$
    TagFilterValues:
      type: array
      items:
        $ref: "#/components/schemas/TagFilterValue"
    TagFilterValue:
      type: string
      minLength: 0
      maxLength: 259
      pattern: ^!?\*?([\p{L}\p{Z}\p{N}_.:/=+\-@]*)\*?$
    ListLogGroupsResponse:
      type: object
      properties:
        logGroups:
          $ref: "#/components/schemas/LogGroupSummaries"
          description: An array of structures, where each structure contains the information about one log group.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    LogGroupSummaries:
      type: array
      items:
        $ref: "#/components/schemas/LogGroupSummary"
    LogGroupSummary:
      description: This structure contains information about one log group in your account.
      type: object
      properties:
        logGroupName:
