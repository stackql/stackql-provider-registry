    GetQueryResultsNextToken:
      type: string
      maxLength: 1024
    GetQueryResultsMaxItems:
      type: integer
      minimum: 0
      maximum: 10000
    GetQueryResultsResponse:
      type: object
      properties:
        queryLanguage:
          $ref: "#/components/schemas/QueryLanguage"
          description: The query language used for this query. For more information about the query languages that CloudWatch Logs supports, see Supported query languages.
        results:
          $ref: "#/components/schemas/QueryResults"
          description: The log events that matched the query criteria during the most recent time it ran. The results value is an array of arrays. Each log event is one object in the top-level array. Each of these log event objects is an array of field/value pairs.
        statistics:
          $ref: "#/components/schemas/QueryStatistics"
          description: Includes the number of log events scanned by the query, the number of log events that matched the query criteria, and the total number of bytes in the scanned log events. These values reflect the full raw results of the query.
        status:
          $ref: "#/components/schemas/QueryStatus"
          description: The status of the most recent running of the query. Possible values are Cancelled, Complete, Failed, Running, Scheduled, Timeout, and Unknown. Queries time out after 60 minutes of runtime. To avoid having your queries time out, reduce the time range being searched or partition your query into a number of queries.
        encryptionKey:
          $ref: "#/components/schemas/EncryptionKey"
          description: If you associated an KMS key with the CloudWatch Logs Insights query results in this account, this field displays the ARN of the key that's used to encrypt the query results when StartQuery stores them.
        nextToken:
          $ref: "#/components/schemas/GetQueryResultsNextToken"
          description: If there are more log events remaining in the results, the response includes a nextToken. You can use this token in a subsequent GetQueryResults request to get the next set of results. You can retrieve up to 100,000 log event results from a query by paginating with this token.
    QueryResults:
      type: array
      items:
        $ref: "#/components/schemas/ResultRows"
    ResultRows:
      type: array
      items:
        $ref: "#/components/schemas/ResultField"
    ResultField:
      description: Contains one field from one log event returned by a CloudWatch Logs Insights query, along with the value of that field. For more information about the fields that are generated by CloudWatch logs, see Supported Logs and Discovered Fields.
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Field"
          description: The log event field.
        value:
          $ref: "#/components/schemas/Value"
          description: The value of this field.
    Value:
      type: string
    QueryStatistics:
      description: Contains the number of log events scanned by the query, the number of log events that matched the query criteria, and the total number of bytes in the log events that were scanned. If the query involved log groups that have field index policies, the estimated number of skipped log events and the total bytes of those skipped log events are included. Using field indexes to skip log events in queries reduces scan volume and improves performance. For more information, see Create field indexes to improve query performance and reduce scan volume.
      type: object
      properties:
        recordsMatched:
          $ref: "#/components/schemas/StatsValue"
          description: The number of log events that matched the query string.
        recordsScanned:
          $ref: "#/components/schemas/StatsValue"
          description: The total number of log events scanned during the query.
        estimatedRecordsSkipped:
          $ref: "#/components/schemas/StatsValue"
          description: An estimate of the number of log events that were skipped when processing this query, because the query contained an indexed field. Skipping these entries lowers query costs and improves the query performance time. For more information about field indexes, see PutIndexPolicy.
        bytesScanned:
          $ref: "#/components/schemas/StatsValue"
          description: The total number of bytes in the log events scanned during the query.
        estimatedBytesSkipped:
          $ref: "#/components/schemas/StatsValue"
          description: An estimate of the number of bytes in the log events that were skipped when processing this query, because the query contained an indexed field. Skipping these entries lowers query costs and improves the query performance time. For more information about field indexes, see PutIndexPolicy.
        logGroupsScanned:
          $ref: "#/components/schemas/StatsValue"
          description: The number of log groups that were scanned by this query.
