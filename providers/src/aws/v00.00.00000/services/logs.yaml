      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
              required:
                - logGroupName
      responses:
        "200":
          description: Success
  /DeleteLogStream:
    post:
      operationId: DeleteLogStream
      description: Deletes the specified log stream and permanently deletes all the archived log events associated with the log stream.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteLogStream
            default: Logs_20140328.DeleteLogStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                logStreamName:
                  $ref: "#/components/schemas/LogStreamName"
                  description: The name of the log stream.
              required:
                - logGroupName
                - logStreamName
      responses:
        "200":
          description: Success
  /DeleteLookupTable:
    post:
      operationId: DeleteLookupTable
      description: Deletes a lookup table permanently. This operation cannot be undone. Queries that reference a deleted table will return an error. Before deleting a lookup table, review any saved queries or dashboards that may reference it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteLookupTable
            default: Logs_20140328.DeleteLookupTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                lookupTableArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the lookup table to delete.
              required:
                - lookupTableArn
      responses:
        "200":
          description: Success
  /DeleteMetricFilter:
    post:
      operationId: DeleteMetricFilter
      description: Deletes the specified metric filter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteMetricFilter
            default: Logs_20140328.DeleteMetricFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                filterName:
                  $ref: "#/components/schemas/FilterName"
                  description: The name of the metric filter.
              required:
                - logGroupName
                - filterName
      responses:
        "200":
          description: Success
  /DeleteQueryDefinition:
    post:
      operationId: DeleteQueryDefinition
      description: Deletes a saved CloudWatch Logs Insights query definition. A query definition contains details about a saved CloudWatch Logs Insights query. Each DeleteQueryDefinition operation can delete one query definition. You must have the logs:DeleteQueryDefinition permission to be able to perform this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteQueryDefinition
            default: Logs_20140328.DeleteQueryDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                queryDefinitionId:
                  $ref: "#/components/schemas/QueryId"
                  description: The ID of the query definition that you want to delete. You can use DescribeQueryDefinitions to retrieve the IDs of your saved query definitions.
              required:
                - queryDefinitionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQueryDefinitionResponse"
  /DeleteResourcePolicy:
    post:
      operationId: DeleteResourcePolicy
      description: Deletes a resource policy from this account. This revokes the access of the identities in that policy to put log events to this account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
