          description: The data type of the log field.
        element:
          $ref: "#/components/schemas/LogFieldType"
          description: For array or collection types, specifies the element type information.
        fields:
          $ref: "#/components/schemas/LogFieldsList"
          description: For complex types, contains the nested field definitions.
    DataType:
      type: string
    GetLogGroupFieldsResponse:
      type: object
      properties:
        logGroupFields:
