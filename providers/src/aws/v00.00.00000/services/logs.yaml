        message:
          $ref: "#/components/schemas/EventMessage"
          description: The log event message text.
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp specifying when this log event was created.
        ingestionTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp specifying when this log event was ingested into the log group.
    SessionTimeoutException:
      description: This exception is returned in a Live Tail stream when the Live Tail session times out. Live Tail sessions time out after three hours.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/Message"
    SessionStreamingException:
      description: This exception is returned if an unknown error occurs during a Live Tail session.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/Message"
    LogGroupIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/LogGroupIdentifier"
    EventsLimitStartQuery:
      type: integer
      minimum: 1
      maximum: 100000
