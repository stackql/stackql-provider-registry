  /PutDeliveryDestination:
    post:
      operationId: PutDeliveryDestination
      description: "Creates or updates a logical delivery destination. A delivery destination is an Amazon Web Services resource that represents an Amazon Web Services service that logs can be sent to. CloudWatch Logs, Amazon S3, and Firehose are supported as logs delivery destinations and X-Ray as the trace delivery destination. To configure logs delivery between a supported Amazon Web Services service and a destination, you must do the following: Create a delivery source, which is a logical object that represents the resource that is actually sending the logs. For more information, see PutDeliverySource. Use PutDeliveryDestination to create a delivery destination in the same account of the actual delivery destination. The delivery destination that you create is a logical object that represents the actual delivery destination. If you are delivering logs cross-account, you must use PutDeliveryDestinationPolicy in the destination account to assign an IAM policy to the destination. This policy allows delivery to that destination. Use CreateDelivery to create a delivery by pairing exactly one delivery source and one delivery destination. For more information, see CreateDelivery. You can configure a single delivery source to send logs to multiple destinations by creating multiple deliveries. You can also create multiple deliveries to configure multiple delivery sources to send logs to the same delivery destination. Only some Amazon Web Services services support being configured as a delivery source. These services are listed as Supported [V2 Permissions] in the table at Enabling logging from Amazon Web Services services. If you use this operation to update an existing delivery destination, all the current delivery destination parameters are overwritten with the new parameter values that you specify."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutDeliveryDestination
            default: Logs_20140328.PutDeliveryDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DeliveryDestinationName"
                  description: A name for this delivery destination. This name must be unique for all delivery destinations in your account.
                outputFormat:
                  $ref: "#/components/schemas/OutputFormat"
                  description: The format for the logs that this delivery destination will receive.
                deliveryDestinationConfiguration:
                  $ref: "#/components/schemas/DeliveryDestinationConfiguration"
                  description: A structure that contains the ARN of the Amazon Web Services resource that will receive the logs. deliveryDestinationConfiguration is required for CloudWatch Logs, Amazon S3, Firehose log delivery destinations and not required for X-Ray trace delivery destinations. deliveryDestinationType is needed for X-Ray trace delivery destinations but not required for other logs delivery destinations.
                deliveryDestinationType:
                  $ref: "#/components/schemas/DeliveryDestinationType"
                  description: "The type of delivery destination. This parameter specifies the target service where log data will be delivered. Valid values include: S3 - Amazon S3 for long-term storage and analytics CWL - CloudWatch Logs for centralized log management FH - Amazon Kinesis Data Firehose for real-time data streaming XRAY - Amazon Web Services X-Ray for distributed tracing and application monitoring The delivery destination type determines the format and configuration options available for log delivery."
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An optional list of key-value pairs to associate with the resource. For more information about tagging, see Tagging Amazon Web Services resources
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutDeliveryDestinationResponse"
  /PutDeliveryDestinationPolicy:
    post:
      operationId: PutDeliveryDestinationPolicy
      description: "Creates and assigns an IAM policy that grants permissions to CloudWatch Logs to deliver logs cross-account to a specified destination in this account. To configure the delivery of logs from an Amazon Web Services service in another account to a logs delivery destination in the current account, you must do the following: Create a delivery source, which is a logical object that represents the resource that is actually sending the logs. For more information, see PutDeliverySource. Create a delivery destination, which is a logical object that represents the actual delivery destination. For more information, see PutDeliveryDestination. Use this operation in the destination account to assign an IAM policy to the destination. This policy allows delivery to that destination. Create a delivery by pairing exactly one delivery source and one delivery destination. For more information, see CreateDelivery. Only some Amazon Web Services services support being configured as a delivery source. These services are listed as Supported [V2 Permissions] in the table at Enabling logging from Amazon Web Services services. The contents of the policy must include two statements. One statement enables general logs delivery, and the other allows delivery to the chosen destination. See the examples for the needed policies."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutDeliveryDestinationPolicy
            default: Logs_20140328.PutDeliveryDestinationPolicy
      requestBody:
