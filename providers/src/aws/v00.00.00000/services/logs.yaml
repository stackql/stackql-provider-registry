        collectionArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the collection.
        status:
          $ref: "#/components/schemas/OpenSearchResourceStatus"
          description: This structure contains information about the status of this OpenSearch Service resource.
    OpenSearchCollectionEndpoint:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^https://[\.\-_/#:A-Za-z0-9]+\.com$
    OpenSearchWorkspace:
      description: This structure contains information about the OpenSearch Service workspace used for this integration. An OpenSearch Service workspace is the collection of dashboards along with other OpenSearch Service tools. This workspace was created automatically as part of the integration setup. For more information, see Centralized OpenSearch user interface (Dashboards) with OpenSearch Service.
      type: object
      properties:
        workspaceId:
          $ref: "#/components/schemas/OpenSearchWorkspaceId"
          description: The ID of this workspace.
        status:
          $ref: "#/components/schemas/OpenSearchResourceStatus"
          description: This structure contains information about the status of an OpenSearch Service resource.
    OpenSearchWorkspaceId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    OpenSearchEncryptionPolicy:
      description: This structure contains information about the OpenSearch Service encryption policy used for this integration. The encryption policy was created automatically when you created the integration. For more information, see Encryption policies in the OpenSearch Service Developer Guide.
      type: object
      properties:
        policyName:
          $ref: "#/components/schemas/OpenSearchPolicyName"
