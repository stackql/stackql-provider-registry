      type: object
      properties:
        queryId:
          $ref: "#/components/schemas/QueryId"
          description: The unique ID of the query.
    StopQueryResponse:
      type: object
      properties:
        success:
          $ref: "#/components/schemas/Success"
          description: This is true if the query was stopped by the StopQuery operation.
