      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteSubscriptionFilter
            default: Logs_20140328.DeleteSubscriptionFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                filterName:
                  $ref: "#/components/schemas/FilterName"
                  description: The name of the subscription filter.
              required:
                - logGroupName
                - filterName
      responses:
        "200":
          description: Success
  /DeleteTransformer:
    post:
      operationId: DeleteTransformer
      description: Deletes the log transformer for the specified log group. As soon as you do this, the transformation of incoming log events according to that transformer stops. If this account has an account-level transformer that applies to this log group, the log group begins using that account-level transformer when this log-group level transformer is deleted. After you delete a transformer, be sure to edit any metric filters or subscription filters that relied on the transformed versions of the log events.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteTransformer
            default: Logs_20140328.DeleteTransformer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifier:
                  $ref: "#/components/schemas/LogGroupIdentifier"
                  description: Specify either the name or ARN of the log group to delete the transformer for. If the log group is in a source account and you are using a monitoring account, you must use the log group ARN.
              required:
                - logGroupIdentifier
      responses:
        "200":
          description: Success
  /DescribeAccountPolicies:
    post:
      operationId: DescribeAccountPolicies
      description: Returns a list of all CloudWatch Logs account policies in the account. To use this operation, you must be signed on with the correct permissions depending on the type of policy that you are retrieving information for. To see data protection policies, you must have the logs:GetDataProtectionPolicy and logs:DescribeAccountPolicies permissions. To see subscription filter policies, you must have the logs:DescribeSubscriptionFilters and logs:DescribeAccountPolicies permissions. To see transformer policies, you must have the logs:GetTransformer and logs:DescribeAccountPolicies permissions. To see field index policies, you must have the logs:DescribeIndexPolicies and logs:DescribeAccountPolicies permissions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DescribeAccountPolicies
            default: Logs_20140328.DescribeAccountPolicies
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                policyType:
                  $ref: "#/components/schemas/PolicyType"
                  description: Use this parameter to limit the returned policies to only the policies that match the policy type that you specify.
                policyName:
                  $ref: "#/components/schemas/PolicyName"
                  description: Use this parameter to limit the returned policies to only the policy with the name that you specify.
                accountIdentifiers:
                  $ref: "#/components/schemas/AccountIds"
                  description: If you are using an account that is set up as a monitoring account for CloudWatch unified cross-account observability, you can use this to specify the account ID of a source account. If you do, the operation returns the account policy for the specified account. Currently, you can specify only one account ID in this parameter. If you omit this parameter, only the policy in the current account is returned.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for the next set of items to return. (You received this token from a previous call.)
              required:
                - policyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountPoliciesResponse"
  /DescribeConfigurationTemplates:
    post:
      operationId: DescribeConfigurationTemplates
      description: Use this operation to return the valid and default values that are used when creating delivery sources, delivery destinations, and deliveries. For more information about deliveries, see CreateDelivery.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DescribeConfigurationTemplates
            default: Logs_20140328.DescribeConfigurationTemplates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                service:
                  $ref: "#/components/schemas/Service"
                  description: Use this parameter to filter the response to include only the configuration templates that apply to the Amazon Web Services service that you specify here.
                logTypes:
                  $ref: "#/components/schemas/LogTypes"
                  description: Use this parameter to filter the response to include only the configuration templates that apply to the log types that you specify here.
                resourceTypes:
                  $ref: "#/components/schemas/ResourceTypes"
                  description: Use this parameter to filter the response to include only the configuration templates that apply to the resource types that you specify here.
