    LogGroup:
      description: Represents a log group.
      type: object
      properties:
        logGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The name of the log group.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the log group, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
        retentionInDays:
          $ref: "#/components/schemas/Days"
        metricFilterCount:
          $ref: "#/components/schemas/FilterCount"
          description: The number of metric filters.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the log group. This version of the ARN includes a trailing :* after the log group name. Use this version to refer to the ARN in IAM policies when specifying permissions for most API actions. The exception is when specifying permissions for TagResource, UntagResource, and ListTagsForResource. The permissions for those three actions require the ARN version that doesn't include a trailing :*.
        storedBytes:
          $ref: "#/components/schemas/StoredBytes"
          description: The number of bytes stored.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Resource Name (ARN) of the KMS key to use when encrypting log data.
        dataProtectionStatus:
          $ref: "#/components/schemas/DataProtectionStatus"
          description: Displays whether this log group has a protection policy, or whether it had one in the past. For more information, see PutDataProtectionPolicy.
        inheritedProperties:
          $ref: "#/components/schemas/InheritedProperties"
          description: Displays all the properties that this log group has inherited from account-level settings.
        logGroupClass:
          $ref: "#/components/schemas/LogGroupClass"
          description: "This specifies the log group class for this log group. There are three classes: The Standard log class supports all CloudWatch Logs features. The Infrequent Access log class supports a subset of CloudWatch Logs features and incurs lower costs. Use the Delivery log class only for delivering Lambda logs to store in Amazon S3 or Amazon Data Firehose. Log events in log groups in the Delivery class are kept in CloudWatch Logs for only one day. This log class doesn't offer rich CloudWatch Logs capabilities such as CloudWatch Logs Insights queries. For details about the features supported by the Standard and Infrequent Access classes, see Log classes"
        logGroupArn:
          $ref: "#/components/schemas/Arn"
          description: "The Amazon Resource Name (ARN) of the log group. This version of the ARN doesn't include a trailing :* after the log group name. Use this version to refer to the ARN in the following situations: In the logGroupIdentifier input field in many CloudWatch Logs APIs. In the resourceArn field in tagging APIs In IAM policies, when specifying permissions for TagResource, UntagResource, and ListTagsForResource."
        deletionProtectionEnabled:
          $ref: "#/components/schemas/DeletionProtectionEnabled"
          description: Indicates whether deletion protection is enabled for this log group. When enabled, deletion protection blocks all deletion operations until it is explicitly disabled.
        bearerTokenAuthenticationEnabled:
          $ref: "#/components/schemas/BearerTokenAuthenticationEnabled"
          description: Indicates whether bearer token authentication is enabled for this log group. When enabled, bearer token authentication is allowed on operations until it is explicitly disabled.
    Days:
      description: "The number of days to retain the log events in the specified log group. Possible values are: 1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1096, 1827, 2192, 2557, 2922, 3288, and 3653. To set a log group so that its log events do not expire, use DeleteRetentionPolicy."
      type: integer
    FilterCount:
