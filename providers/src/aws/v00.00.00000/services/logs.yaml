          description: The actual log data content returned in the streaming response. This contains the fields and values of the log event in a structured format that can be parsed and processed by the client.
    Data:
      type: string
      format: byte
    InternalStreamingException:
      description: An internal error occurred during the streaming of log data. This exception is thrown when there's an issue with the internal streaming mechanism used by the GetLogObject operation.
      type: object
      properties:
        message:
