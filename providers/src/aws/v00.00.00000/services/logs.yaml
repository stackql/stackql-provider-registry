      responses:
        "200":
          description: Success
  /UpdateAnomaly:
    post:
      operationId: UpdateAnomaly
      description: Use this operation to suppress anomaly detection for a specified anomaly or pattern. If you suppress an anomaly, CloudWatch Logs won't report new occurrences of that anomaly and won't update that anomaly with new data. If you suppress a pattern, CloudWatch Logs won't report any anomalies related to that pattern. You must specify either anomalyId or patternId, but you can't specify both parameters in the same operation. If you have previously used this operation to suppress detection of a pattern or anomaly, you can use it again to cause CloudWatch Logs to end the suppression. To do this, use this operation and specify the anomaly or pattern to stop suppressing, and omit the suppressionType and suppressionPeriod parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.UpdateAnomaly
            default: Logs_20140328.UpdateAnomaly
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                anomalyId:
                  $ref: "#/components/schemas/AnomalyId"
                  description: If you are suppressing or unsuppressing an anomaly, specify its unique ID here. You can find anomaly IDs by using the ListAnomalies operation.
                patternId:
                  $ref: "#/components/schemas/PatternId"
                  description: If you are suppressing or unsuppressing an pattern, specify its unique ID here. You can find pattern IDs by using the ListAnomalies operation.
                anomalyDetectorArn:
                  $ref: "#/components/schemas/AnomalyDetectorArn"
                  description: The ARN of the anomaly detector that this operation is to act on.
                suppressionType:
                  $ref: "#/components/schemas/SuppressionType"
                  description: Use this to specify whether the suppression to be temporary or infinite. If you specify LIMITED, you must also specify a suppressionPeriod. If you specify INFINITE, any value for suppressionPeriod is ignored.
                suppressionPeriod:
                  $ref: "#/components/schemas/SuppressionPeriod"
                  description: If you are temporarily suppressing an anomaly or pattern, use this structure to specify how long the suppression is to last.
                baseline:
                  $ref: "#/components/schemas/Baseline"
                  description: Set this to true to prevent CloudWatch Logs from displaying this behavior as an anomaly in the future. The behavior is then treated as baseline behavior. However, if similar but more severe occurrences of this behavior occur in the future, those will still be reported as anomalies. The default is false
              required:
                - anomalyDetectorArn
      responses:
        "200":
          description: Success
  /UpdateDeliveryConfiguration:
    post:
      operationId: UpdateDeliveryConfiguration
      description: Use this operation to update the configuration of a delivery to change either the S3 path pattern or the format of the delivered logs. You can't use this operation to change the source or destination of the delivery.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.UpdateDeliveryConfiguration
            default: Logs_20140328.UpdateDeliveryConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/DeliveryId"
                  description: The ID of the delivery to be updated by this request.
                recordFields:
                  $ref: "#/components/schemas/RecordFields"
                  description: The list of record fields to be delivered to the destination, in order. If the delivery's log source has mandatory fields, they must be included in this list.
                fieldDelimiter:
                  $ref: "#/components/schemas/FieldDelimiter"
                  description: The field delimiter to use between record fields when the final output format of a delivery is in Plain, W3C, or Raw format.
                s3DeliveryConfiguration:
                  $ref: "#/components/schemas/S3DeliveryConfiguration"
                  description: This structure contains parameters that are valid only when the delivery's delivery destination is an S3 bucket.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDeliveryConfigurationResponse"
  /UpdateLogAnomalyDetector:
    post:
      operationId: UpdateLogAnomalyDetector
      description: Updates an existing log anomaly detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.UpdateLogAnomalyDetector
            default: Logs_20140328.UpdateLogAnomalyDetector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                anomalyDetectorArn:
                  $ref: "#/components/schemas/AnomalyDetectorArn"
                  description: The ARN of the anomaly detector that you want to update.
                evaluationFrequency:
                  $ref: "#/components/schemas/EvaluationFrequency"
                  description: Specifies how often the anomaly detector runs and look for anomalies. Set this value according to the frequency that the log group receives new logs. For example, if the log group receives new log events every 10 minutes, then setting evaluationFrequency to FIFTEEN_MIN might be appropriate.
                filterPattern:
                  $ref: "#/components/schemas/FilterPattern"
                anomalyVisibilityTime:
                  $ref: "#/components/schemas/AnomalyVisibilityTime"
                  description: The number of days to use as the life cycle of anomalies. After this time, anomalies are automatically baselined and the anomaly detector model will treat new occurrences of similar event as normal. Therefore, if you do not correct the cause of an anomaly during this time, it will be considered normal going forward and will not be detected.
                enabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Use this parameter to pause or restart the anomaly detector.
              required:
                - anomalyDetectorArn
                - enabled
      responses:
        "200":
          description: Success
  /UpdateLookupTable:
    post:
      operationId: UpdateLookupTable
      description: Updates an existing lookup table by replacing all of its CSV content. After the update completes, queries that use this table will use the new data. This is a full replacement operation. All existing content is replaced with the new CSV data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.UpdateLookupTable
            default: Logs_20140328.UpdateLookupTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                lookupTableArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the lookup table to update.
                description:
                  $ref: "#/components/schemas/LookupTableDescription"
                  description: An updated description of the lookup table.
                tableBody:
                  $ref: "#/components/schemas/TableBody"
                  description: The new CSV content to replace the existing data. The first row must be a header row with column names. The content must use UTF-8 encoding and not exceed 10 MB.
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The ARN of the KMS key to use to encrypt the lookup table data. You can use this parameter to add, update, or remove the KMS key. To remove the KMS key and use an Amazon Web Services-owned key instead, specify an empty string.
              required:
                - lookupTableArn
                - tableBody
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLookupTableResponse"
  /UpdateScheduledQuery:
    post:
      operationId: UpdateScheduledQuery
      description: Updates an existing scheduled query with new configuration. This operation uses PUT semantics, allowing modification of query parameters, schedule, and destinations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.UpdateScheduledQuery
            default: Logs_20140328.UpdateScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/ScheduledQueryIdentifier"
                  description: The ARN or name of the scheduled query to update.
                description:
                  $ref: "#/components/schemas/ScheduledQueryDescription"
                  description: An updated description for the scheduled query.
                queryLanguage:
                  $ref: "#/components/schemas/QueryLanguage"
                  description: The updated query language for the scheduled query.
                queryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The updated query string to execute.
                logGroupIdentifiers:
                  $ref: "#/components/schemas/ScheduledQueryLogGroupIdentifiers"
                  description: The updated array of log group names or ARNs to query.
                scheduleExpression:
                  $ref: "#/components/schemas/ScheduleExpression"
                  description: The updated cron expression that defines when the scheduled query runs.
                timezone:
                  $ref: "#/components/schemas/ScheduleTimezone"
                  description: The updated timezone for evaluating the schedule expression.
                startTimeOffset:
                  $ref: "#/components/schemas/StartTimeOffset"
                  description: The updated time offset in seconds that defines the lookback period for the query.
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
                  description: The updated configuration for where to deliver query results.
                scheduleStartTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The updated start time for the scheduled query in Unix epoch format.
                scheduleEndTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The updated end time for the scheduled query in Unix epoch format.
                executionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The updated ARN of the IAM role that grants permissions to execute the query and deliver results.
                state:
                  $ref: "#/components/schemas/ScheduledQueryState"
                  description: The updated state of the scheduled query.
              required:
                - identifier
                - queryLanguage
                - queryString
                - scheduleExpression
                - executionRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduledQueryResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    KmsKeyId:
      type: string
      maxLength: 256
    ResourceIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\w+=/:,.@\\-\\*]*"
    Arn:
      type: string
    DataSource:
      description: Represents a data source that categorizes logs by originating service and log type, providing service-based organization complementing traditional log groups.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/DataSourceName"
          description: The name of the data source.
        type_:
          $ref: "#/components/schemas/DataSourceType"
          description: The type of the data source.
      required:
        - name
    DataSourceName:
      type: string
    DataSourceType:
      type: string
    AssociateSourceToS3TableIntegrationResponse:
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/S3TableIntegrationSourceIdentifier"
          description: The unique identifier for the association between the data source and S3 Table Integration.
    S3TableIntegrationSourceIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
    ExportTaskId:
      type: string
      minLength: 1
      maxLength: 512
    ImportId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\-a-zA-Z0-9]+"
    CancelImportTaskResponse:
      type: object
      properties:
        importId:
          $ref: "#/components/schemas/ImportId"
          description: The ID of the cancelled import task.
        importStatistics:
          $ref: "#/components/schemas/ImportStatistics"
          description: Statistics about the import progress at the time of cancellation.
        importStatus:
          $ref: "#/components/schemas/ImportStatus"
          description: The final status of the import task. This will be set to CANCELLED.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the import task was created, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
        lastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the import task was cancelled, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
    ImportStatistics:
      description: Statistics about the import progress
      type: object
      properties:
        bytesImported:
          $ref: "#/components/schemas/StoredBytes"
          description: The total number of bytes that have been imported to the managed log group.
    StoredBytes:
      type: integer
      format: int64
      minimum: 0
    ImportStatus:
      type: string
      enum:
        - IN_PROGRESS
        - CANCELLED
        - COMPLETED
        - FAILED
    Timestamp:
      type: integer
      format: int64
      minimum: 0
    DeliverySourceName:
      type: string
      minLength: 1
      maxLength: 60
      pattern: "[\\w-]*"
    RecordFields:
      type: array
      items:
        $ref: "#/components/schemas/FieldHeader"
    FieldHeader:
      type: string
      minLength: 1
      maxLength: 64
    FieldDelimiter:
      type: string
      minLength: 0
      maxLength: 5
    S3DeliveryConfiguration:
      description: This structure contains delivery configurations that apply only when the delivery destination resource is an S3 bucket.
      type: object
      properties:
        suffixPath:
          $ref: "#/components/schemas/DeliverySuffixPath"
          description: This string allows re-configuring the S3 object prefix to contain either static or variable sections. The valid variables to use in the suffix path will vary by each log source. To find the values supported for the suffix path for each log source, use the DescribeConfigurationTemplates operation and check the allowedSuffixPathFields field in the response.
        enableHiveCompatiblePath:
          $ref: "#/components/schemas/Boolean"
          description: This parameter causes the S3 objects that contain delivered logs to use a prefix structure that allows for integration with Apache Hive.
    DeliverySuffixPath:
      type: string
      minLength: 1
      maxLength: 256
    Boolean:
      type: boolean
    Tags:
      type: object
      properties: {}
    CreateDeliveryResponse:
      type: object
      properties:
        delivery:
          $ref: "#/components/schemas/Delivery"
          description: A structure that contains information about the delivery that you just created.
    Delivery:
      description: This structure contains information about one delivery in your account. A delivery is a connection between a logical delivery source and a logical delivery destination. For more information, see CreateDelivery. To update an existing delivery configuration, use UpdateDeliveryConfiguration.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/DeliveryId"
          description: The unique ID that identifies this delivery in your account.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that uniquely identifies this delivery.
        deliverySourceName:
          $ref: "#/components/schemas/DeliverySourceName"
          description: The name of the delivery source that is associated with this delivery.
        deliveryDestinationArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the delivery destination that is associated with this delivery.
        deliveryDestinationType:
          $ref: "#/components/schemas/DeliveryDestinationType"
          description: Displays whether the delivery destination associated with this delivery is CloudWatch Logs, Amazon S3, Firehose, or X-Ray.
        recordFields:
          $ref: "#/components/schemas/RecordFields"
          description: The record fields used in this delivery.
        fieldDelimiter:
          $ref: "#/components/schemas/FieldDelimiter"
          description: The field delimiter that is used between record fields when the final output format of a delivery is in Plain, W3C, or Raw format.
        s3DeliveryConfiguration:
          $ref: "#/components/schemas/S3DeliveryConfiguration"
          description: This structure contains delivery configurations that apply only when the delivery destination resource is an S3 bucket.
        tags:
          type: object
          properties: {}
          description: The tags that have been assigned to this delivery.
    DeliveryId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[0-9A-Za-z]+$
    DeliveryDestinationType:
      type: string
      enum:
        - S3
        - CWL
        - FH
        - XRAY
    ExportTaskName:
      type: string
      minLength: 1
      maxLength: 512
    LogStreamName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[^:*]*"
    ExportDestinationBucket:
      type: string
      minLength: 1
      maxLength: 512
    ExportDestinationPrefix:
      type: string
    CreateExportTaskResponse:
      type: object
      properties:
        taskId:
          $ref: "#/components/schemas/ExportTaskId"
          description: The ID of the export task.
    RoleArn:
      type: string
      minLength: 1
    ImportFilter:
      description: The filter criteria used for import tasks
      type: object
      properties:
        startEventTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start of the time range for events to import, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
        endEventTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the time range for events to import, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
    CreateImportTaskResponse:
      type: object
      properties:
        importId:
          $ref: "#/components/schemas/ImportId"
          description: A unique identifier for the import task.
        importDestinationArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the CloudWatch Logs log group created as the destination for the imported events.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the import task was created, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
    LogGroupArnList:
      type: array
      items:
        $ref: "#/components/schemas/LogGroupArn"
    LogGroupArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\w#+=/:,.@-]*"
    DetectorName:
      type: string
      minLength: 1
    EvaluationFrequency:
      type: string
      enum:
        - ONE_MIN
        - FIVE_MIN
        - TEN_MIN
        - FIFTEEN_MIN
        - THIRTY_MIN
        - ONE_HOUR
    FilterPattern:
      description: A symbolic description of how CloudWatch Logs should interpret the data in each log event. For example, a log event can contain timestamps, IP addresses, strings, and so on. You use the filter pattern to specify what to look for in the log event message.
      type: string
      minLength: 0
      maxLength: 1024
    DetectorKmsKeyArn:
      type: string
      maxLength: 256
      pattern: ^arn:aws[a-z\-]*:kms:[-a-z0-9]*:[0-9]*:key/[-a-z0-9]*$
    AnomalyVisibilityTime:
      type: integer
      format: int64
      minimum: 7
      maximum: 90
    CreateLogAnomalyDetectorResponse:
      type: object
      properties:
        anomalyDetectorArn:
          $ref: "#/components/schemas/AnomalyDetectorArn"
          description: The ARN of the log anomaly detector that you just created.
    AnomalyDetectorArn:
      type: string
      minLength: 1
      pattern: "[\\w#+=/:,.@-]*"
    LogGroupClass:
      type: string
      enum:
        - STANDARD
        - INFREQUENT_ACCESS
        - DELIVERY
    DeletionProtectionEnabled:
      type: boolean
    LookupTableName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9_]+$
    LookupTableDescription:
      type: string
      minLength: 0
      maxLength: 1024
    TableBody:
      type: string
      minLength: 1
      maxLength: 10485760
    CreateLookupTableResponse:
      type: object
      properties:
        lookupTableArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the lookup table that was created.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the lookup table was created, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
    ScheduledQueryName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9_\-/.#]+$
    ScheduledQueryDescription:
      type: string
      maxLength: 1024
    QueryLanguage:
      type: string
      enum:
        - CWLI
        - SQL
        - PPL
    QueryString:
      type: string
      minLength: 0
      maxLength: 10000
    ScheduledQueryLogGroupIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/LogGroupIdentifier"
    LogGroupIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\w#+=/:,.@-]*"
    ScheduleExpression:
      type: string
      maxLength: 256
    ScheduleTimezone:
      type: string
      minLength: 1
    StartTimeOffset:
      type: integer
      format: int64
    DestinationConfiguration:
      description: Configuration for where to deliver scheduled query results. Specifies the destination type and associated settings for result delivery.
      type: object
      properties:
        s3Configuration:
          $ref: "#/components/schemas/S3Configuration"
          description: Configuration for delivering query results to Amazon S3.
      required:
        - s3Configuration
    S3Configuration:
      description: Configuration for Amazon S3 destination where scheduled query results are delivered.
      type: object
      properties:
        destinationIdentifier:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI where query results are delivered. Must be a valid S3 URI format.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role that grants permissions to write query results to the specified Amazon S3 destination.
        ownerAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services accountId for the bucket owning account.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The Amazon Resource Name (ARN) of the KMS encryption key. Must belong to the same Amazon Web Services Region as the destination Amazon S3 bucket.
      required:
        - destinationIdentifier
        - roleArn
    S3Uri:
      type: string
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^\d{12}$
    ScheduledQueryState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateScheduledQueryResponse:
      type: object
      properties:
        scheduledQueryArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the created scheduled query.
        state:
          $ref: "#/components/schemas/ScheduledQueryState"
          description: The current state of the scheduled query.
    PolicyName:
      type: string
    PolicyType:
      type: string
      enum:
        - DATA_PROTECTION_POLICY
        - SUBSCRIPTION_FILTER_POLICY
        - FIELD_INDEX_POLICY
        - TRANSFORMER_POLICY
        - METRIC_EXTRACTION_POLICY
    DeliveryDestinationName:
      type: string
      minLength: 1
      maxLength: 60
      pattern: "[\\w-]*"
    DestinationName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[^:*]*"
    DeleteIndexPolicyResponse:
      type: object
    IntegrationName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    Force:
      type: boolean
    DeleteIntegrationResponse:
      type: object
    FilterName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[^:*]*"
    QueryId:
      type: string
      minLength: 1
      maxLength: 256
    DeleteQueryDefinitionResponse:
      type: object
      properties:
        success:
          $ref: "#/components/schemas/Success"
          description: A value of TRUE indicates that the operation succeeded. FALSE indicates that the operation failed.
    Success:
      type: boolean
    ExpectedRevisionId:
      type: string
      minLength: 1
    ScheduledQueryIdentifier:
      type: string
      pattern: "[\\w#+=/:,.@-]*"
    DeleteScheduledQueryResponse:
      type: object
    AccountIds:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    NextToken:
      description: The token for the next set of items to return. The token expires after 24 hours.
      type: string
      minLength: 1
    DescribeAccountPoliciesResponse:
      type: object
      properties:
        accountPolicies:
          $ref: "#/components/schemas/AccountPolicies"
          description: An array of structures that contain information about the CloudWatch Logs account policies that match the specified filters.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use when requesting the next set of items. The token expires after 24 hours.
    AccountPolicies:
      type: array
      items:
        $ref: "#/components/schemas/AccountPolicy"
    AccountPolicy:
      description: A structure that contains information about one CloudWatch Logs account policy.
      type: object
      properties:
        policyName:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the account policy.
        policyDocument:
          $ref: "#/components/schemas/AccountPolicyDocument"
          description: The policy document for this account policy. The JSON specified in policyDocument can be up to 30,720 characters.
        lastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that this policy was most recently updated.
        policyType:
          $ref: "#/components/schemas/PolicyType"
          description: The type of policy for this account policy.
        scope:
          $ref: "#/components/schemas/Scope"
          description: The scope of the account policy.
        selectionCriteria:
          $ref: "#/components/schemas/SelectionCriteria"
          description: The log group selection criteria that is used for this policy.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that the policy applies to.
    AccountPolicyDocument:
      type: string
    Scope:
      type: string
      enum:
        - ALL
    SelectionCriteria:
      type: string
    Service:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w_-]*"
    LogTypes:
      type: array
      items:
        $ref: "#/components/schemas/LogType"
    LogType:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w]*"
    ResourceTypes:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceType:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w-_]*"
    DeliveryDestinationTypes:
      type: array
      items:
        $ref: "#/components/schemas/DeliveryDestinationType"
    DescribeLimit:
      type: integer
      minimum: 1
      maximum: 50
    DescribeConfigurationTemplatesResponse:
      type: object
      properties:
        configurationTemplates:
          $ref: "#/components/schemas/ConfigurationTemplates"
          description: An array of objects, where each object describes one configuration template that matches the filters that you specified in the request.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    ConfigurationTemplates:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationTemplate"
    ConfigurationTemplate:
      description: A structure containing information about the deafult settings and available settings that you can use to configure a delivery or a delivery destination.
      type: object
      properties:
        service:
          $ref: "#/components/schemas/Service"
          description: A string specifying which service this configuration template applies to. For more information about supported services see Enable logging from Amazon Web Services services..
        logType:
          $ref: "#/components/schemas/LogType"
          description: A string specifying which log type this configuration template applies to.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: A string specifying which resource type this configuration template applies to.
        deliveryDestinationType:
          $ref: "#/components/schemas/DeliveryDestinationType"
          description: A string specifying which destination type this configuration template applies to.
        defaultDeliveryConfigValues:
          $ref: "#/components/schemas/ConfigurationTemplateDeliveryConfigValues"
          description: A mapping that displays the default value of each property within a delivery's configuration, if it is not specified in the request.
        allowedFields:
          $ref: "#/components/schemas/AllowedFields"
          description: The allowed fields that a caller can use in the recordFields parameter of a CreateDelivery or UpdateDeliveryConfiguration operation.
        allowedOutputFormats:
          $ref: "#/components/schemas/OutputFormats"
          description: The list of delivery destination output formats that are supported by this log source.
        allowedActionForAllowVendedLogsDeliveryForResource:
          $ref: "#/components/schemas/AllowedActionForAllowVendedLogsDeliveryForResource"
          description: The action permissions that a caller needs to have to be able to successfully create a delivery source on the desired resource type when calling PutDeliverySource.
        allowedFieldDelimiters:
          $ref: "#/components/schemas/AllowedFieldDelimiters"
          description: The valid values that a caller can use as field delimiters when calling CreateDelivery or UpdateDeliveryConfiguration on a delivery that delivers in Plain, W3C, or Raw format.
        allowedSuffixPathFields:
          $ref: "#/components/schemas/RecordFields"
          description: The list of variable fields that can be used in the suffix path of a delivery that delivers to an S3 bucket.
