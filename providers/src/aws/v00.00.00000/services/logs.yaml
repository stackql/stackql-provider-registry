          $ref: "#/components/schemas/OpenSearchResourceConfig"
          description: This structure contains configuration details about an integration between CloudWatch Logs and OpenSearch Service.
    OpenSearchResourceConfig:
      description: This structure contains configuration details about an integration between CloudWatch Logs and OpenSearch Service.
      type: object
      properties:
        kmsKeyArn:
          $ref: "#/components/schemas/Arn"
          description: To have the vended dashboard data encrypted with KMS instead of the CloudWatch Logs default encryption method, specify the ARN of the KMS key that you want to use.
        dataSourceRoleArn:
          $ref: "#/components/schemas/Arn"
          description: Specify the ARN of an IAM role that CloudWatch Logs will use to create the integration. This role must have the permissions necessary to access the OpenSearch Service collection to be able to create the dashboards. For more information about the permissions needed, see Permissions that the integration needs in the CloudWatch Logs User Guide.
        dashboardViewerPrincipals:
          $ref: "#/components/schemas/DashboardViewerPrincipals"
          description: Specify the ARNs of IAM roles and IAM users who you want to grant permission to for viewing the dashboards. In addition to specifying these users here, you must also grant them the CloudWatchOpenSearchDashboardAccess IAM policy. For more information, see IAM policies for users.
        applicationArn:
          $ref: "#/components/schemas/Arn"
          description: If you want to use an existing OpenSearch Service application for your integration with OpenSearch Service, specify it here. If you omit this, a new application will be created.
        retentionDays:
          $ref: "#/components/schemas/CollectionRetentionDays"
          description: Specify how many days that you want the data derived by OpenSearch Service to be retained in the index that the dashboard refers to. This also sets the maximum time period that you can choose when viewing data in the dashboard. Choosing a longer time frame will incur additional costs.
      required:
        - dataSourceRoleArn
        - dashboardViewerPrincipals
        - retentionDays
    DashboardViewerPrincipals:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    CollectionRetentionDays:
      type: integer
      minimum: 1
      maximum: 30
    PutIntegrationResponse:
      type: object
      properties:
        integrationName:
          $ref: "#/components/schemas/IntegrationName"
          description: The name of the integration that you just created.
        integrationStatus:
          $ref: "#/components/schemas/IntegrationStatus"
