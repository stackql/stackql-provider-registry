          description: The number of data rows in the lookup table, excluding the header row.
        sizeBytes:
          $ref: "#/components/schemas/StoredBytes"
          description: The size of the lookup table in bytes.
        lastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the lookup table was last updated, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ARN of the KMS key used to encrypt the lookup table data, if applicable.
    TableFields:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    RecordsCount:
      type: integer
      format: int64
      minimum: 0
    MetricName:
      description: The name of the CloudWatch metric to which the monitored log information should be published. For example, you might publish to a metric named ErrorCount.
      type: string
      maxLength: 255
      pattern: "[^:*$]*"
    MetricNamespace:
      type: string
      maxLength: 255
      pattern: "[^:*$]*"
    DescribeMetricFiltersResponse:
      type: object
      properties:
        metricFilters:
          $ref: "#/components/schemas/MetricFilters"
          description: The metric filters.
        nextToken:
          $ref: "#/components/schemas/NextToken"
    MetricFilters:
      type: array
      items:
        $ref: "#/components/schemas/MetricFilter"
    MetricFilter:
      description: Metric filters express how CloudWatch Logs would extract metric observations from ingested log events and transform them into metric data in a CloudWatch metric.
      type: object
      properties:
        filterName:
          $ref: "#/components/schemas/FilterName"
          description: The name of the metric filter.
        filterPattern:
          $ref: "#/components/schemas/FilterPattern"
        metricTransformations:
          $ref: "#/components/schemas/MetricTransformations"
          description: The metric transformations.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the metric filter, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC.
        logGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The name of the log group.
        applyOnTransformedLogs:
          $ref: "#/components/schemas/ApplyOnTransformedLogs"
          description: This parameter is valid only for log groups that have an active log transformer. For more information about log transformers, see PutTransformer. If this value is true, the metric filter is applied on the transformed version of the log events instead of the original ingested log events.
        fieldSelectionCriteria:
          $ref: "#/components/schemas/FieldSelectionCriteria"
          description: The filter expression that specifies which log events are processed by this metric filter based on system fields. Returns the fieldSelectionCriteria value if it was specified when the metric filter was created.
        emitSystemFieldDimensions:
          $ref: "#/components/schemas/EmitSystemFields"
          description: The list of system fields that are emitted as additional dimensions in the generated metrics. Returns the emitSystemFieldDimensions value if it was specified when the metric filter was created.
    MetricTransformations:
      type: array
      items:
        $ref: "#/components/schemas/MetricTransformation"
    MetricTransformation:
      description: Indicates how to transform ingested log events to metric data in a CloudWatch metric.
      type: object
      properties:
        metricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the CloudWatch metric.
        metricNamespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: A custom namespace to contain your metric in CloudWatch. Use namespaces to group together metrics that are similar. For more information, see Namespaces.
        metricValue:
          $ref: "#/components/schemas/MetricValue"
          description: The value to publish to the CloudWatch metric when a filter pattern matches a log event.
        defaultValue:
          $ref: "#/components/schemas/DefaultValue"
          description: (Optional) The value to emit when a filter pattern does not match a log event. This value can be null.
        dimensions:
          type: object
          properties: {}
          description: The fields to use as dimensions for the metric. One metric filter can include as many as three dimensions. Metrics extracted from log events are charged as custom metrics. To prevent unexpected high charges, do not specify high-cardinality fields such as IPAddress or requestID as dimensions. Each different value found for a dimension is treated as a separate metric and accrues charges as a separate custom metric. CloudWatch Logs disables a metric filter if it generates 1000 different name/value pairs for your specified dimensions within a certain amount of time. This helps to prevent accidental high charges. You can also set up a billing alarm to alert you if your charges are higher than expected. For more information, see Creating a Billing Alarm to Monitor Your Estimated Amazon Web Services Charges.
        unit:
          $ref: "#/components/schemas/StandardUnit"
          description: The unit to assign to the metric. If you omit this, the unit is set as None.
      required:
        - metricName
        - metricNamespace
        - metricValue
    MetricValue:
      description: The value to publish to the CloudWatch metric. For example, if you're counting the occurrences of a term like Error, the value is 1 for each occurrence. If you're counting the bytes transferred, the value is the value in the log event.
      type: string
      maxLength: 100
    DefaultValue:
      type: number
      format: double
    StandardUnit:
      type: string
      enum:
        - Seconds
        - Microseconds
        - Milliseconds
        - Bytes
        - Kilobytes
        - Megabytes
        - Gigabytes
        - Terabytes
        - Bits
        - Kilobits
        - Megabits
        - Gigabits
        - Terabits
        - Percent
        - Count
        - Bytes/Second
        - Kilobytes/Second
        - Megabytes/Second
        - Gigabytes/Second
        - Terabytes/Second
        - Bits/Second
        - Kilobits/Second
        - Megabits/Second
        - Gigabits/Second
        - Terabits/Second
        - Count/Second
        - None
