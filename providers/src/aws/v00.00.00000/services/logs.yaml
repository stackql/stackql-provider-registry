      type: object
      properties:
        openSearchIntegrationDetails:
          $ref: "#/components/schemas/OpenSearchIntegrationDetails"
          description: This structure contains complete information about one integration between CloudWatch Logs and OpenSearch Service.
    OpenSearchIntegrationDetails:
      description: This structure contains complete information about one CloudWatch Logs integration. This structure is returned by a GetIntegration operation.
      type: object
      properties:
        dataSource:
          $ref: "#/components/schemas/OpenSearchDataSource"
          description: This structure contains information about the OpenSearch Service data source used for this integration. This data source was created as part of the integration setup. An OpenSearch Service data source defines the source and destination for OpenSearch Service queries. It includes the role required to execute queries and write to collections. For more information about OpenSearch Service data sources , see Creating OpenSearch Service data source integrations with Amazon S3.
        application:
          $ref: "#/components/schemas/OpenSearchApplication"
          description: This structure contains information about the OpenSearch Service application used for this integration. An OpenSearch Service application is the web application that was created by the integration with CloudWatch Logs. It hosts the vended logs dashboards.
        collection:
          $ref: "#/components/schemas/OpenSearchCollection"
          description: This structure contains information about the OpenSearch Service collection used for this integration. This collection was created as part of the integration setup. An OpenSearch Service collection is a logical grouping of one or more indexes that represent an analytics workload. For more information, see Creating and managing OpenSearch Service Serverless collections.
        workspace:
          $ref: "#/components/schemas/OpenSearchWorkspace"
          description: This structure contains information about the OpenSearch Service workspace used for this integration. An OpenSearch Service workspace is the collection of dashboards along with other OpenSearch Service tools. This workspace was created automatically as part of the integration setup. For more information, see Centralized OpenSearch user interface (Dashboards) with OpenSearch Service.
        encryptionPolicy:
          $ref: "#/components/schemas/OpenSearchEncryptionPolicy"
          description: This structure contains information about the OpenSearch Service encryption policy used for this integration. The encryption policy was created automatically when you created the integration. For more information, see Encryption policies in the OpenSearch Service Developer Guide.
        networkPolicy:
          $ref: "#/components/schemas/OpenSearchNetworkPolicy"
          description: This structure contains information about the OpenSearch Service network policy used for this integration. The network policy assigns network access settings to collections. For more information, see Network policies in the OpenSearch Service Developer Guide.
        accessPolicy:
          $ref: "#/components/schemas/OpenSearchDataAccessPolicy"
          description: This structure contains information about the OpenSearch Service data access policy used for this integration. The access policy defines the access controls for the collection. This data access policy was automatically created as part of the integration setup. For more information about OpenSearch Service data access policies, see Data access control for Amazon OpenSearch Serverless in the OpenSearch Service Developer Guide.
        lifecyclePolicy:
          $ref: "#/components/schemas/OpenSearchLifecyclePolicy"
          description: This structure contains information about the OpenSearch Service data lifecycle policy used for this integration. The lifecycle policy determines the lifespan of the data in the collection. It was automatically created as part of the integration setup. For more information, see Using data lifecycle policies with OpenSearch Service Serverless in the OpenSearch Service Developer Guide.
    OpenSearchDataSource:
      description: This structure contains information about the OpenSearch Service data source used for this integration. This data source was created as part of the integration setup. An OpenSearch Service data source defines the source and destination for OpenSearch Service queries. It includes the role required to execute queries and write to collections. For more information about OpenSearch Service data sources , see Creating OpenSearch Service data source integrations with Amazon S3.
      type: object
      properties:
        dataSourceName:
          $ref: "#/components/schemas/OpenSearchDataSourceName"
          description: The name of the OpenSearch Service data source.
        status:
          $ref: "#/components/schemas/OpenSearchResourceStatus"
          description: This structure contains information about the status of this OpenSearch Service resource.
