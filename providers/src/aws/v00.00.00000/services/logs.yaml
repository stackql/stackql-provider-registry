      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                policyName:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy to be revoked. This parameter is required.
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the CloudWatch Logs resource for which the resource policy needs to be deleted
                expectedRevisionId:
                  $ref: "#/components/schemas/ExpectedRevisionId"
                  description: The expected revision ID of the resource policy. Required when deleting a resource-scoped policy to prevent concurrent modifications.
      responses:
        "200":
          description: Success
  /DeleteRetentionPolicy:
    post:
      operationId: DeleteRetentionPolicy
