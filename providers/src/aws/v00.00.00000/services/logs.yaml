                  $ref: "#/components/schemas/LogType"
                  description: Defines the type of log that the source is sending. For Amazon Bedrock Agents, the valid values are APPLICATION_LOGS and EVENT_LOGS. For Amazon Bedrock Knowledge Bases, the valid value is APPLICATION_LOGS. For Amazon Bedrock AgentCore Runtime, the valid values are APPLICATION_LOGS, USAGE_LOGS and TRACES. For Amazon Bedrock AgentCore Tools, the valid values are APPLICATION_LOGS, USAGE_LOGS and TRACES. For Amazon Bedrock AgentCore Identity, the valid values are APPLICATION_LOGS and TRACES. For Amazon Bedrock AgentCore Memory, the valid values are APPLICATION_LOGS and TRACES. For Amazon Bedrock AgentCore Gateway, the valid values are APPLICATION_LOGS and TRACES. For CloudFront, the valid value is ACCESS_LOGS. For DevOps Agent, the valid value is APPLICATION_LOGS. For Amazon CodeWhisperer, the valid value is EVENT_LOGS. For Elemental MediaPackage, the valid values are EGRESS_ACCESS_LOGS and INGRESS_ACCESS_LOGS. For Elemental MediaTailor, the valid values are AD_DECISION_SERVER_LOGS, MANIFEST_SERVICE_LOGS, and TRANSCODE_LOGS. For Amazon EKS Auto Mode, the valid values are AUTO_MODE_BLOCK_STORAGE_LOGS, AUTO_MODE_COMPUTE_LOGS, AUTO_MODE_IPAM_LOGS, and AUTO_MODE_LOAD_BALANCING_LOGS. For Entity Resolution, the valid value is WORKFLOW_LOGS. For IAM Identity Center, the valid value is ERROR_LOGS. For Network Firewall Proxy, the valid values are ALERT_LOGS, ALLOW_LOGS, and DENY_LOGS. For Network Load Balancer, the valid value is NLB_ACCESS_LOGS. For PCS, the valid values are PCS_SCHEDULER_LOGS, PCS_JOBCOMP_LOGS, and PCS_SCHEDULER_AUDIT_LOGS. For Quick, the valid values are CHAT_LOGS and FEEDBACK_LOGS. For Amazon Web Services RTB Fabric, the valid values is APPLICATION_LOGS. For Amazon Q, the valid values are EVENT_LOGS and SYNC_JOB_LOGS. For Amazon Web Services Security Hub CSPM, the valid value is SECURITY_FINDING_LOGS. For Amazon Web Services Security Hub, the valid value is SECURITY_FINDING_LOGS. For Amazon SES mail manager, the valid values are APPLICATION_LOGS and TRAFFIC_POLICY_DEBUG_LOGS. For Amazon WorkMail, the valid values are ACCESS_CONTROL_LOGS, AUTHENTICATION_LOGS, WORKMAIL_AVAILABILITY_PROVIDER_LOGS, WORKMAIL_MAILBOX_ACCESS_LOGS, and WORKMAIL_PERSONAL_ACCESS_TOKEN_LOGS. For Amazon VPC Route Server, the valid value is EVENT_LOGS.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An optional list of key-value pairs to associate with the resource. For more information about tagging, see Tagging Amazon Web Services resources
                deliverySourceConfiguration:
                  $ref: "#/components/schemas/DeliverySourceConfiguration"
                  description: 'A map of key-value pairs to configure the delivery source. Both keys and values must be between 1 and 255 characters in length. For example, {"samplingRate": "50"}.'
              required:
                - name
                - resourceArn
                - logType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutDeliverySourceResponse"
  /PutDestination:
    post:
      operationId: PutDestination
      description: Creates or updates a destination. This operation is used only to create destinations for cross-account subscriptions. A destination encapsulates a physical resource (such as an Amazon Kinesis stream). With a destination, you can subscribe to a real-time stream of log events for a different account, ingested using PutLogEvents. Through an access policy, a destination controls what is written to it. By default, PutDestination does not set any access policy with the destination, which means a cross-account user cannot call PutSubscriptionFilter against this destination. To enable this, the destination owner must call PutDestinationPolicy after PutDestination. To perform a PutDestination operation, you must also have the iam:PassRole permission.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutDestination
            default: Logs_20140328.PutDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                destinationName:
                  $ref: "#/components/schemas/DestinationName"
                  description: A name for the destination.
                targetArn:
                  $ref: "#/components/schemas/TargetArn"
                  description: The ARN of an Amazon Kinesis stream to which to deliver matching log events.
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of an IAM role that grants CloudWatch Logs permissions to call the Amazon Kinesis PutRecord operation on the destination stream.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An optional list of key-value pairs to associate with the resource. For more information about tagging, see Tagging Amazon Web Services resources
              required:
                - destinationName
                - targetArn
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutDestinationResponse"
  /PutDestinationPolicy:
    post:
      operationId: PutDestinationPolicy
      description: Creates or updates an access policy associated with an existing destination. An access policy is an IAM policy document that is used to authorize claims to register a subscription filter against a given destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutDestinationPolicy
            default: Logs_20140328.PutDestinationPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                destinationName:
                  $ref: "#/components/schemas/DestinationName"
                  description: A name for an existing destination.
                accessPolicy:
                  $ref: "#/components/schemas/AccessPolicy"
                  description: An IAM policy document that authorizes cross-account users to deliver their log events to the associated destination. This can be up to 5120 bytes.
                forceUpdate:
                  $ref: "#/components/schemas/ForceUpdate"
                  description: Specify true if you are updating an existing destination policy to grant permission to an organization ID instead of granting permission to individual Amazon Web Services accounts. Before you update a destination policy this way, you must first update the subscription filters in the accounts that send logs to this destination. If you do not, the subscription filters might stop working. By specifying true for forceUpdate, you are affirming that you have already updated the subscription filters. For more information, see Updating an existing cross-account subscription If you omit this parameter, the default of false is used.
              required:
                - destinationName
                - accessPolicy
      responses:
        "200":
          description: Success
  /PutIndexPolicy:
    post:
      operationId: PutIndexPolicy
      description: "Creates or updates a field index policy for the specified log group. Only log groups in the Standard log class support field index policies. For more information about log classes, see Log classes. You can use field index policies to create field indexes on fields found in log events in the log group. Creating field indexes speeds up and lowers the costs for CloudWatch Logs Insights queries that reference those field indexes, because these queries attempt to skip the processing of log events that are known to not match the indexed field. Good fields to index are fields that you often need to query for and fields or values that match only a small fraction of the total log events. Common examples of indexes include request ID, session ID, userID, and instance IDs. For more information, see Create field indexes to improve query performance and reduce costs. You can configure indexed fields as facets to enable interactive exploration and filtering of your logs in the CloudWatch Logs Insights console. Facets allow you to view value distributions and counts for indexed fields without running queries. When you create a field index, you can optionally set it as a facet to enable this interactive analysis capability. For more information, see Use facets to group and explore logs. To find the fields that are in your log group events, use the GetLogGroupFields operation. For example, suppose you have created a field index for requestId. Then, any CloudWatch Logs Insights query on that log group that includes requestId = value or requestId IN [value, value, ...] will process fewer log events to reduce costs, and have improved performance. CloudWatch Logs provides default field indexes for all log groups in the Standard log class. Default field indexes are automatically available for the following fields: @logStream @aws.region @aws.account @source.log traceId Default field indexes are in addition to any custom field indexes you define within your policy. Default field indexes are not counted towards your field index quota. Each index policy has the following quotas and restrictions: As many as 20 fields can be included in the policy. Each field name can include as many as 100 characters. Matches of log events to the names of indexed fields are case-sensitive. For example, a field index of RequestId won't match a log event containing requestId. Log group-level field index policies created with PutIndexPolicy override account-level field index policies created with PutAccountPolicy that apply to log groups. If you use PutIndexPolicy to create a field index policy for a log group, that log group uses only that policy for log group-level indexing, including any facet configurations. The log group ignores any account-wide field index policy that applies to log groups, but data source-based account policies may still apply."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutIndexPolicy
            default: Logs_20140328.PutIndexPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifier:
                  $ref: "#/components/schemas/LogGroupIdentifier"
                  description: Specify either the log group name or log group ARN to apply this field index policy to. If you specify an ARN, use the format arn:aws:logs:region:account-id:log-group:log_group_name Don't include an * at the end.
                policyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: 'The index policy document, in JSON format. The following is an example of an index policy document that creates indexes with different types. "policyDocument": "{"Fields": [ "TransactionId" ], "FieldsV2": {"RequestId": {"type": "FIELD_INDEX"}, "APIName": {"type": "FACET"}, "StatusCode": {"type": "FACET"}}}" You can use FieldsV2 to specify the type for each field. Supported types are FIELD_INDEX and FACET. Field names within Fields and FieldsV2 must be mutually exclusive. The policy document must include at least one field index. For more information about the fields that can be included and other restrictions, see Field index syntax and quotas.'
              required:
                - logGroupIdentifier
                - policyDocument
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutIndexPolicyResponse"
  /PutIntegration:
    post:
      operationId: PutIntegration
      description: Creates an integration between CloudWatch Logs and another service in this account. Currently, only integrations with OpenSearch Service are supported, and currently you can have only one integration in your account. Integrating with OpenSearch Service makes it possible for you to create curated vended logs dashboards, powered by OpenSearch Service analytics. For more information, see Vended log dashboards powered by Amazon OpenSearch Service. You can use this operation only to create a new integration. You can't modify an existing integration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutIntegration
            default: Logs_20140328.PutIntegration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                integrationName:
                  $ref: "#/components/schemas/IntegrationName"
                  description: A name for the integration.
                resourceConfig:
                  $ref: "#/components/schemas/ResourceConfig"
                  description: A structure that contains configuration information for the integration that you are creating.
                integrationType:
                  $ref: "#/components/schemas/IntegrationType"
                  description: The type of integration. Currently, the only supported type is OPENSEARCH.
              required:
                - integrationName
                - resourceConfig
                - integrationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutIntegrationResponse"
  /PutLogEvents:
    post:
      operationId: PutLogEvents
      description: "Uploads a batch of log events to the specified log stream. The sequence token is now ignored in PutLogEvents actions. PutLogEvents actions are always accepted and never return InvalidSequenceTokenException or DataAlreadyAcceptedException even if the sequence token is not valid. You can use parallel PutLogEvents actions on the same log stream. The batch of events must satisfy the following constraints: The maximum batch size is 1,048,576 bytes. This size is calculated as the sum of all event messages in UTF-8, plus 26 bytes for each log event. Events more than 2 hours in the future are rejected while processing remaining valid events. Events older than 14 days or preceding the log group's retention period are rejected while processing remaining valid events. The log events in the batch must be in chronological order by their timestamp. The timestamp is the time that the event occurred, expressed as the number of milliseconds after Jan 1, 1970 00:00:00 UTC. (In Amazon Web Services Tools for PowerShell and the Amazon Web Services SDK for .NET, the timestamp is specified in .NET format: yyyy-mm-ddThh:mm:ss. For example, 2017-09-15T13:45:30.) A batch of log events in a single request must be in a chronological order. Otherwise, the operation fails. Each log event can be no larger than 1 MB. The maximum number of log events in a batch is 10,000. For valid events (within 14 days in the past to 2 hours in future), the time span in a single batch cannot exceed 24 hours. Otherwise, the operation fails. The quota of five requests per second per log stream has been removed. Instead, PutLogEvents actions are throttled based on a per-second per-account quota. You can request an increase to the per-second throttling quota by using the Service Quotas service. If a call to PutLogEvents returns \"UnrecognizedClientException\" the most likely cause is a non-valid Amazon Web Services access key ID or secret key."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutLogEvents
            default: Logs_20140328.PutLogEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                logStreamName:
                  $ref: "#/components/schemas/LogStreamName"
                  description: The name of the log stream.
                logEvents:
                  $ref: "#/components/schemas/InputLogEvents"
                  description: The log events.
                sequenceToken:
                  $ref: "#/components/schemas/SequenceToken"
                  description: The sequence token obtained from the response of the previous PutLogEvents call. The sequenceToken parameter is now ignored in PutLogEvents actions. PutLogEvents actions are now accepted and never return InvalidSequenceTokenException or DataAlreadyAcceptedException even if the sequence token is not valid.
                entity:
                  $ref: "#/components/schemas/Entity"
                  description: The entity associated with the log events.
              required:
                - logGroupName
                - logStreamName
                - logEvents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutLogEventsResponse"
  /PutLogGroupDeletionProtection:
    post:
      operationId: PutLogGroupDeletionProtection
      description: Enables or disables deletion protection for the specified log group. When enabled on a log group, deletion protection blocks all deletion operations until it is explicitly disabled. For information about the parameters that are common to all actions, see Common Parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutLogGroupDeletionProtection
            default: Logs_20140328.PutLogGroupDeletionProtection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifier:
                  $ref: "#/components/schemas/LogGroupIdentifier"
                  description: "The name or ARN of the log group. Type: String Length Constraints: Minimum length of 1. Maximum length of 512. Pattern: [\\.\\-_/#A-Za-z0-9]+ Required: Yes"
                deletionProtectionEnabled:
                  $ref: "#/components/schemas/DeletionProtectionEnabled"
                  description: "Whether to enable deletion protection. Type: Boolean Required: Yes"
              required:
                - logGroupIdentifier
                - deletionProtectionEnabled
      responses:
        "200":
          description: Success
  /PutMetricFilter:
    post:
      operationId: PutMetricFilter
      description: Creates or updates a metric filter and associates it with the specified log group. With metric filters, you can configure rules to extract metric data from log events ingested through PutLogEvents. The maximum number of metric filters that can be associated with a log group is 100. Using regular expressions in filter patterns is supported. For these filters, there is a quota of two regular expression patterns within a single filter pattern. There is also a quota of five regular expression patterns per log group. For more information about using regular expressions in filter patterns, see Filter pattern syntax for metric filters, subscription filters, filter log events, and Live Tail. When you create a metric filter, you can also optionally assign a unit and dimensions to the metric that is created. Metrics extracted from log events are charged as custom metrics. To prevent unexpected high charges, do not specify high-cardinality fields such as IPAddress or requestID as dimensions. Each different value found for a dimension is treated as a separate metric and accrues charges as a separate custom metric. CloudWatch Logs might disable a metric filter if it generates 1,000 different name/value pairs for your specified dimensions within one hour. You can also set up a billing alarm to alert you if your charges are higher than expected. For more information, see Creating a Billing Alarm to Monitor Your Estimated Amazon Web Services Charges.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutMetricFilter
            default: Logs_20140328.PutMetricFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                filterName:
                  $ref: "#/components/schemas/FilterName"
                  description: A name for the metric filter.
                filterPattern:
                  $ref: "#/components/schemas/FilterPattern"
                  description: A filter pattern for extracting metric data out of ingested log events.
                metricTransformations:
                  $ref: "#/components/schemas/MetricTransformations"
                  description: A collection of information that defines how metric data gets emitted.
                applyOnTransformedLogs:
                  $ref: "#/components/schemas/ApplyOnTransformedLogs"
                  description: This parameter is valid only for log groups that have an active log transformer. For more information about log transformers, see PutTransformer. If the log group uses either a log-group level or account-level transformer, and you specify true, the metric filter will be applied on the transformed version of the log events instead of the original ingested log events.
                fieldSelectionCriteria:
                  $ref: "#/components/schemas/FieldSelectionCriteria"
                  description: 'A filter expression that specifies which log events should be processed by this metric filter based on system fields such as source account and source region. Uses selection criteria syntax with operators like =, !=, AND, OR, IN, NOT IN. Example: @aws.region = "us-east-1" or @aws.account IN ["123456789012", "987654321098"]. Maximum length: 2000 characters.'
                emitSystemFieldDimensions:
                  $ref: "#/components/schemas/EmitSystemFields"
                  description: A list of system fields to emit as additional dimensions in the generated metrics. Valid values are @aws.account and @aws.region. These dimensions help identify the source of centralized log data and count toward the total dimension limit for metric filters.
              required:
                - logGroupName
                - filterName
                - filterPattern
                - metricTransformations
      responses:
        "200":
          description: Success
  /PutQueryDefinition:
    post:
      operationId: PutQueryDefinition
      description: Creates or updates a query definition for CloudWatch Logs Insights. For more information, see Analyzing Log Data with CloudWatch Logs Insights. To update a query definition, specify its queryDefinitionId in your request. The values of name, queryString, and logGroupNames are changed to the values that you specify in your update operation. No current values are retained from the current query definition. For example, imagine updating a current query definition that includes log groups. If you don't specify the logGroupNames parameter in your update operation, the query definition changes to contain no log groups. You must have the logs:PutQueryDefinition permission to be able to perform this operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutQueryDefinition
            default: Logs_20140328.PutQueryDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                queryLanguage:
                  $ref: "#/components/schemas/QueryLanguage"
                  description: Specify the query language to use for this query. The options are Logs Insights QL, OpenSearch PPL, and OpenSearch SQL. For more information about the query languages that CloudWatch Logs supports, see Supported query languages.
                name:
                  $ref: "#/components/schemas/QueryDefinitionName"
                  description: A name for the query definition. If you are saving numerous query definitions, we recommend that you name them. This way, you can find the ones you want by using the first part of the name as a filter in the queryDefinitionNamePrefix parameter of DescribeQueryDefinitions.
                queryDefinitionId:
                  $ref: "#/components/schemas/QueryId"
                  description: If you are updating a query definition, use this parameter to specify the ID of the query definition that you want to update. You can use DescribeQueryDefinitions to retrieve the IDs of your saved query definitions. If you are creating a query definition, do not specify this parameter. CloudWatch generates a unique ID for the new query definition and include it in the response to this operation.
                logGroupNames:
                  $ref: "#/components/schemas/LogGroupNames"
                  description: Use this parameter to include specific log groups as part of your query definition. If your query uses the OpenSearch Service query language, you specify the log group names inside the querystring instead of here. If you are updating an existing query definition for the Logs Insights QL or OpenSearch Service PPL and you omit this parameter, then the updated definition will contain no log groups.
                queryString:
                  $ref: "#/components/schemas/QueryDefinitionString"
                  description: The query string to use for this definition. For more information, see CloudWatch Logs Insights Query Syntax.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Used as an idempotency token, to avoid returning an exception if the service receives the same request twice because of a network error.
                parameters:
                  $ref: "#/components/schemas/QueryParameterList"
                  description: Use this parameter to include specific query parameters as part of your query definition. Query parameters are supported only for Logs Insights QL queries. Query parameters allow you to use placeholder variables in your query string that are substituted with values at execution time. Use the {{parameterName}} syntax in your query string to reference a parameter.
              required:
                - name
                - queryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutQueryDefinitionResponse"
  /PutResourcePolicy:
    post:
      operationId: PutResourcePolicy
      description: "Creates or updates a resource policy allowing other Amazon Web Services services to put log events to this account, such as Amazon Route 53. This API has the following restrictions: Supported actions - Policy only supports logs:PutLogEvents and logs:CreateLogStream actions Supported principals - Policy only applies when operations are invoked by Amazon Web Services service principals (not IAM users, roles, or cross-account principals Policy limits - An account can have a maximum of 10 policies without resourceARN and one per LogGroup resourceARN Resource policies with actions invoked by non-Amazon Web Services service principals (such as IAM users, roles, or other Amazon Web Services accounts) will not be enforced. For access control involving these principals, use the IAM policies."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutResourcePolicy
            default: Logs_20140328.PutResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                policyName:
                  $ref: "#/components/schemas/PolicyName"
                  description: Name of the new policy. This parameter is required.
                policyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: 'Details of the new policy, including the identity of the principal that is enabled to put logs to this account. This is formatted as a JSON string. This parameter is required. The following example creates a resource policy enabling the Route 53 service to put DNS query logs in to the specified log group. Replace "logArn" with the ARN of your CloudWatch Logs resource, such as a log group or log stream. CloudWatch Logs also supports aws:SourceArn and aws:SourceAccount condition context keys. In the example resource policy, you would replace the value of SourceArn with the resource making the call from Route 53 to CloudWatch Logs. You would also replace the value of SourceAccount with the Amazon Web Services account ID making that call. { "Version": "2012-10-17", "Statement": [ { "Sid": "Route53LogsToCloudWatchLogs", "Effect": "Allow", "Principal": { "Service": [ "route53.amazonaws.com" ] }, "Action": "logs:PutLogEvents", "Resource": "logArn", "Condition": { "ArnLike": { "aws:SourceArn": "myRoute53ResourceArn" }, "StringEquals": { "aws:SourceAccount": "myAwsAccountId" } } } ] }'
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The ARN of the CloudWatch Logs resource to which the resource policy needs to be added or attached. Currently only supports LogGroup ARN.
                expectedRevisionId:
                  $ref: "#/components/schemas/ExpectedRevisionId"
                  description: The expected revision ID of the resource policy. Required when resourceArn is provided to prevent concurrent modifications. Use null when creating a resource policy for the first time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResponse"
  /PutRetentionPolicy:
    post:
      operationId: PutRetentionPolicy
      description: Sets the retention of the specified log group. With a retention policy, you can configure the number of days for which to retain log events in the specified log group. CloudWatch Logs doesn't immediately delete log events when they reach their retention setting. It typically takes up to 72 hours after that before log events are deleted, but in rare situations might take longer. To illustrate, imagine that you change a log group to have a longer retention setting when it contains log events that are past the expiration date, but haven't been deleted. Those log events will take up to 72 hours to be deleted after the new retention date is reached. To make sure that log data is deleted permanently, keep a log group at its lower retention setting until 72 hours after the previous retention period ends. Alternatively, wait to change the retention setting until you confirm that the earlier log events are deleted. When log events reach their retention setting they are marked for deletion. After they are marked for deletion, they do not add to your archival storage costs anymore, even if they are not actually deleted until later. These log events marked for deletion are also not included when you use an API to retrieve the storedBytes value to see how many bytes a log group is storing.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutRetentionPolicy
            default: Logs_20140328.PutRetentionPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                retentionInDays:
                  $ref: "#/components/schemas/Days"
              required:
                - logGroupName
                - retentionInDays
      responses:
        "200":
          description: Success
  /PutSubscriptionFilter:
    post:
      operationId: PutSubscriptionFilter
      description: "Creates or updates a subscription filter and associates it with the specified log group. With subscription filters, you can subscribe to a real-time stream of log events ingested through PutLogEvents and have them delivered to a specific destination. When log events are sent to the receiving service, they are Base64 encoded and compressed with the GZIP format. The following destinations are supported for subscription filters: An Amazon Kinesis data stream belonging to the same account as the subscription filter, for same-account delivery. A logical destination created with PutDestination that belongs to a different account, for cross-account delivery. We currently support Kinesis Data Streams and Firehose as logical destinations. An Amazon Kinesis Data Firehose delivery stream that belongs to the same account as the subscription filter, for same-account delivery. An Lambda function that belongs to the same account as the subscription filter, for same-account delivery. Each log group can have up to two subscription filters associated with it. If you are updating an existing filter, you must specify the correct name in filterName. Using regular expressions in filter patterns is supported. For these filters, there is a quotas of quota of two regular expression patterns within a single filter pattern. There is also a quota of five regular expression patterns per log group. For more information about using regular expressions in filter patterns, see Filter pattern syntax for metric filters, subscription filters, filter log events, and Live Tail. To perform a PutSubscriptionFilter operation for any destination except a Lambda function, you must also have the iam:PassRole permission."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutSubscriptionFilter
            default: Logs_20140328.PutSubscriptionFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                filterName:
                  $ref: "#/components/schemas/FilterName"
                  description: A name for the subscription filter. If you are updating an existing filter, you must specify the correct name in filterName. To find the name of the filter currently associated with a log group, use DescribeSubscriptionFilters.
                filterPattern:
                  $ref: "#/components/schemas/FilterPattern"
                  description: A filter pattern for subscribing to a filtered stream of log events.
                destinationArn:
                  $ref: "#/components/schemas/DestinationArn"
                  description: "The ARN of the destination to deliver matching log events to. Currently, the supported destinations are: An Amazon Kinesis stream belonging to the same account as the subscription filter, for same-account delivery. A logical destination (specified using an ARN) belonging to a different account, for cross-account delivery. If you're setting up a cross-account subscription, the destination must have an IAM policy associated with it. The IAM policy must allow the sender to send logs to the destination. For more information, see PutDestinationPolicy. A Kinesis Data Firehose delivery stream belonging to the same account as the subscription filter, for same-account delivery. A Lambda function belonging to the same account as the subscription filter, for same-account delivery."
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The ARN of an IAM role that grants CloudWatch Logs permissions to deliver ingested log events to the destination stream. You don't need to provide the ARN when you are working with a logical destination for cross-account delivery.
                distribution:
                  $ref: "#/components/schemas/Distribution"
                  description: The method used to distribute log data to the destination. By default, log data is grouped by log stream, but the grouping can be set to random for a more even distribution. This property is only applicable when the destination is an Amazon Kinesis data stream.
                applyOnTransformedLogs:
                  $ref: "#/components/schemas/ApplyOnTransformedLogs"
                  description: This parameter is valid only for log groups that have an active log transformer. For more information about log transformers, see PutTransformer. If the log group uses either a log-group level or account-level transformer, and you specify true, the subscription filter will be applied on the transformed version of the log events instead of the original ingested log events.
                fieldSelectionCriteria:
                  $ref: "#/components/schemas/FieldSelectionCriteria"
                  description: 'A filter expression that specifies which log events should be processed by this subscription filter based on system fields such as source account and source region. Uses selection criteria syntax with operators like =, !=, AND, OR, IN, NOT IN. Example: @aws.region NOT IN ["cn-north-1"] or @aws.account = "123456789012" AND @aws.region = "us-east-1". Maximum length: 2000 characters.'
                emitSystemFields:
                  $ref: "#/components/schemas/EmitSystemFields"
                  description: A list of system fields to include in the log events sent to the subscription destination. Valid values are @aws.account and @aws.region. These fields provide source information for centralized log data in the forwarded payload.
              required:
                - logGroupName
                - filterName
                - filterPattern
                - destinationArn
      responses:
        "200":
          description: Success
  /PutTransformer:
    post:
      operationId: PutTransformer
      description: Creates or updates a log transformer for a single log group. You use log transformers to transform log events into a different format, making them easier for you to process and analyze. You can also transform logs from different sources into standardized formats that contains relevant, source-specific information. After you have created a transformer, CloudWatch Logs performs the transformations at the time of log ingestion. You can then refer to the transformed versions of the logs during operations such as querying with CloudWatch Logs Insights or creating metric filters or subscription filers. You can also use a transformer to copy metadata from metadata keys into the log events themselves. This metadata can include log group name, log stream name, account ID and Region. A transformer for a log group is a series of processors, where each processor applies one type of transformation to the log events ingested into this log group. The processors work one after another, in the order that you list them, like a pipeline. For more information about the available processors to use in a transformer, see Processors that you can use. Having log events in standardized format enables visibility across your applications for your log analysis, reporting, and alarming needs. CloudWatch Logs provides transformation for common log types with out-of-the-box transformation templates for major Amazon Web Services log sources such as VPC flow logs, Lambda, and Amazon RDS. You can use pre-built transformation templates or create custom transformation policies. You can create transformers only for the log groups in the Standard log class. You can also set up a transformer at the account level. For more information, see PutAccountPolicy. If there is both a log-group level transformer created with PutTransformer and an account-level transformer that could apply to the same log group, the log group uses only the log-group level transformer. It ignores the account-level transformer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.PutTransformer
            default: Logs_20140328.PutTransformer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifier:
                  $ref: "#/components/schemas/LogGroupIdentifier"
                  description: Specify either the name or ARN of the log group to create the transformer for.
                transformerConfig:
                  $ref: "#/components/schemas/Processors"
                  description: This structure contains the configuration of this log transformer. A log transformer is an array of processors, where each processor applies one type of transformation to the log events that are ingested.
              required:
                - logGroupIdentifier
                - transformerConfig
      responses:
        "200":
          description: Success
  /StartLiveTail:
    post:
      operationId: StartLiveTail
      description: "Starts a Live Tail streaming session for one or more log groups. A Live Tail session returns a stream of log events that have been recently ingested in the log groups. For more information, see Use Live Tail to view logs in near real time. The response to this operation is a response stream, over which the server sends live log events and the client receives them. The following objects are sent over the stream: A single LiveTailSessionStart object is sent at the start of the session. Every second, a LiveTailSessionUpdate object is sent. Each of these objects contains an array of the actual log events. If no new log events were ingested in the past second, the LiveTailSessionUpdate object will contain an empty array. The array of log events contained in a LiveTailSessionUpdate can include as many as 500 log events. If the number of log events matching the request exceeds 500 per second, the log events are sampled down to 500 log events to be included in each LiveTailSessionUpdate object. If your client consumes the log events slower than the server produces them, CloudWatch Logs buffers up to 10 LiveTailSessionUpdate events or 5000 log events, after which it starts dropping the oldest events. A SessionStreamingException object is returned if an unknown error occurs on the server side. A SessionTimeoutException object is returned when the session times out, after it has been kept open for three hours. The StartLiveTail API routes requests using SDK host prefix injection. SDK versions released before April 1, 2026 route to streaming-logs.Region.amazonaws.com, which does not support VPC endpoints. SDK versions released on or after April 1, 2026 route to stream-logs.Region.amazonaws.com, which supports VPC endpoints. To set up a VPC endpoint for this API, see Creating a VPC endpoint for CloudWatch Logs . You can end a session before it times out by closing the session stream or by closing the client that is receiving the stream. The session also ends if the established connection between the client and the server breaks. For examples of using an SDK to start a Live Tail session, see Start a Live Tail session using an Amazon Web Services SDK."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.StartLiveTail
            default: Logs_20140328.StartLiveTail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupIdentifiers:
                  $ref: "#/components/schemas/StartLiveTailLogGroupIdentifiers"
                  description: An array where each item in the array is a log group to include in the Live Tail session. Specify each log group by its ARN. If you specify an ARN, the ARN can't end with an asterisk (*). You can include up to 10 log groups.
                logStreamNames:
                  $ref: "#/components/schemas/InputLogStreamNames"
                  description: If you specify this parameter, then only log events in the log streams that you specify here are included in the Live Tail session. If you specify this field, you can't also specify the logStreamNamePrefixes field. You can specify this parameter only if you specify only one log group in logGroupIdentifiers.
                logStreamNamePrefixes:
                  $ref: "#/components/schemas/InputLogStreamNames"
                  description: If you specify this parameter, then only log events in the log streams that have names that start with the prefixes that you specify here are included in the Live Tail session. If you specify this field, you can't also specify the logStreamNames field. You can specify this parameter only if you specify only one log group in logGroupIdentifiers.
                logEventFilterPattern:
                  $ref: "#/components/schemas/FilterPattern"
                  description: An optional pattern to use to filter the results to include only log events that match the pattern. For example, a filter pattern of error 404 causes only log events that include both error and 404 to be included in the Live Tail stream. Regular expression filter patterns are supported. For more information about filter pattern syntax, see Filter and Pattern Syntax.
              required:
                - logGroupIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartLiveTailResponse"
  /StartQuery:
    post:
      operationId: StartQuery
      description: "Starts a query of one or more log groups or data sources using CloudWatch Logs Insights. You specify the log groups or data sources and time range to query and the query string to use. You can query up to 10 data sources in a single query. For more information, see CloudWatch Logs Insights Query Syntax. After you run a query using StartQuery, the query results are stored by CloudWatch Logs. You can use GetQueryResults to retrieve the results of a query, using the queryId that StartQuery returns. Interactive queries started with StartQuery share concurrency limits with automated scheduled query executions. Both types of queries count toward the same regional concurrent query quota, so high scheduled query activity may affect the availability of concurrent slots for interactive queries. To specify the log groups to query, a StartQuery operation must include one of the following: Either exactly one of the following parameters: logGroupName, logGroupNames, or logGroupIdentifiers Or the queryString must include a SOURCE command to select log groups for the query. The SOURCE command can select log groups based on log group name prefix, account ID, and log class, or select data sources using dataSource syntax in LogsQL, PPL, and SQL. In LogsQL, the SOURCE command also supports filtering by log group tags. For more information about the SOURCE command, see SOURCE. If you have associated a KMS key with the query results in this account, then StartQuery uses that key to encrypt the results when it stores them. If no key is associated with query results, the query results are encrypted with the default CloudWatch Logs encryption method. Queries time out after 60 minutes of runtime. If your queries are timing out, reduce the time range being searched or partition your query into a number of queries. If you are using CloudWatch cross-account observability, you can use this operation in a monitoring account to start a query in a linked source account. For more information, see CloudWatch cross-account observability. For a cross-account StartQuery operation, the query definition must be defined in the monitoring account. You can have up to 100 concurrent CloudWatch Logs insights queries, including queries that have been added to dashboards."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.StartQuery
            default: Logs_20140328.StartQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                queryLanguage:
                  $ref: "#/components/schemas/QueryLanguage"
                  description: Specify the query language to use for this query. The options are Logs Insights QL, OpenSearch PPL, and OpenSearch SQL. For more information about the query languages that CloudWatch Logs supports, see Supported query languages.
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: "The log group on which to perform the query. A StartQuery operation must include exactly one of the following parameters: logGroupName, logGroupNames, or logGroupIdentifiers. The exception is queries using the OpenSearch Service SQL query language, where you specify the log group names inside the querystring instead of here."
                logGroupNames:
                  $ref: "#/components/schemas/LogGroupNames"
                  description: "The list of log groups to be queried. You can include up to 50 log groups. A StartQuery operation must include exactly one of the following parameters: logGroupName, logGroupNames, or logGroupIdentifiers. The exception is queries using the OpenSearch Service SQL query language, where you specify the log group names inside the querystring instead of here."
                logGroupIdentifiers:
                  $ref: "#/components/schemas/LogGroupIdentifiers"
                  description: "The list of log groups to query. You can include up to 50 log groups. You can specify them by the log group name or ARN. If a log group that you're querying is in a source account and you're using a monitoring account, you must specify the ARN of the log group here. The query definition must also be defined in the monitoring account. If you specify an ARN, use the format arn:aws:logs:region:account-id:log-group:log_group_name Don't include an * at the end. A StartQuery operation must include exactly one of the following parameters: logGroupName, logGroupNames, or logGroupIdentifiers. The exception is queries using the OpenSearch Service SQL query language, where you specify the log group names inside the querystring instead of here."
                startTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The beginning of the time range to query. The range is inclusive, so the specified start time is included in the query. Specified as epoch time, the number of seconds since January 1, 1970, 00:00:00 UTC.
                endTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end of the time range to query. The range is inclusive, so the specified end time is included in the query. Specified as epoch time, the number of seconds since January 1, 1970, 00:00:00 UTC.
                queryString:
                  $ref: "#/components/schemas/QueryString"
                  description: The query string to use. For more information, see CloudWatch Logs Insights Query Syntax.
                limit:
                  $ref: "#/components/schemas/EventsLimitStartQuery"
                  description: The maximum number of log events to return in the query. If the query string uses the fields command, only the specified fields and their values are returned. The default is 10,000. The maximum value is 100,000.
              required:
                - startTime
                - endTime
                - queryString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQueryResponse"
  /StopQuery:
    post:
      operationId: StopQuery
      description: Stops a CloudWatch Logs Insights query that is in progress. If the query has already ended, the operation returns an error indicating that the specified query is not running. This operation can be used to cancel both interactive queries and individual scheduled query executions. When used with scheduled queries, StopQuery cancels only the specific execution identified by the query ID, not the scheduled query configuration itself.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.StopQuery
            default: Logs_20140328.StopQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                queryId:
                  $ref: "#/components/schemas/QueryId"
                  description: The ID number of the query to stop. To find this ID number, use DescribeQueries.
              required:
                - queryId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopQueryResponse"
  /TagLogGroup:
    post:
      operationId: TagLogGroup
      description: The TagLogGroup operation is on the path to deprecation. We recommend that you use TagResource instead. Adds or updates the specified tags for the specified log group. To list the tags for a log group, use ListTagsForResource. To remove tags, use UntagResource. For more information about tags, see Tag Log Groups in Amazon CloudWatch Logs in the Amazon CloudWatch Logs User Guide. CloudWatch Logs doesn't support IAM policies that prevent users from assigning specified tags to log groups using the aws:Resource/key-name or aws:TagKeys condition keys. For more information about using tags to control access, see Controlling access to Amazon Web Services resources using tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.TagLogGroup
            default: Logs_20140328.TagLogGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: The key-value pairs to use for the tags.
              required:
                - logGroupName
                - tags
      responses:
        "200":
          description: Success
  /TagResource:
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified CloudWatch Logs resource. Currently, the only CloudWatch Logs resources that can be tagged are log groups and destinations. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with a resource that already has tags. If you specify a new tag key for the alarm, this tag is appended to the list of tags associated with the alarm. If you specify a tag key that is already associated with the alarm, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a CloudWatch Logs resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.TagResource
            default: Logs_20140328.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the resource that you're adding tags to. The ARN format of a log group is arn:aws:logs:Region:account-id:log-group:log-group-name The ARN format of a destination is arn:aws:logs:Region:account-id:destination:destination-name For more information about ARN format, see CloudWatch Logs resources and operations.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: The list of key-value pairs to associate with the resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
  /TestMetricFilter:
    post:
      operationId: TestMetricFilter
      description: Tests the filter pattern of a metric filter against a sample of log event messages. You can use this operation to validate the correctness of a metric filter pattern.
      parameters:
        - name: X-Amz-Target
          in: header
