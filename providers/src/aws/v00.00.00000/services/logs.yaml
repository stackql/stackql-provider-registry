    OpenSearchApplicationId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    OpenSearchCollection:
      description: This structure contains information about the OpenSearch Service collection used for this integration. An OpenSearch Service collection is a logical grouping of one or more indexes that represent an analytics workload. For more information, see Creating and managing OpenSearch Service Serverless collections.
      type: object
      properties:
        collectionEndpoint:
          $ref: "#/components/schemas/OpenSearchCollectionEndpoint"
