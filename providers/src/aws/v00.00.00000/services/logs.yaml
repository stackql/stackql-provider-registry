          description: "The attributes of the entity which identify the specific entity, as a list of key-value pairs. Entities with the same keyAttributes are considered to be the same entity. There are five allowed attributes (key names): Type, ResourceType, Identifier Name, and Environment. For details about how to use the key attributes, see How to add related information to telemetry in the CloudWatch User Guide."
        attributes:
          type: object
          properties: {}
          description: Additional attributes of the entity that are not used to specify the identity of the entity. A list of key-value pairs. For details about how to use the attributes, see How to add related information to telemetry in the CloudWatch User Guide.
    PutLogEventsResponse:
      type: object
      properties:
        nextSequenceToken:
          $ref: "#/components/schemas/SequenceToken"
          description: The next sequence token. This field has been deprecated. The sequence token is now ignored in PutLogEvents actions. PutLogEvents actions are always accepted even if the sequence token is not valid. You can use parallel PutLogEvents actions on the same log stream and you do not need to wait for the response of a previous PutLogEvents action to obtain the nextSequenceToken value.
        rejectedLogEventsInfo:
          $ref: "#/components/schemas/RejectedLogEventsInfo"
          description: The rejected events.
        rejectedEntityInfo:
          $ref: "#/components/schemas/RejectedEntityInfo"
          description: Information about why the entity is rejected when calling PutLogEvents. Only returned when the entity is rejected. When the entity is rejected, the events may still be accepted.
    RejectedLogEventsInfo:
      description: Represents the rejected events.
      type: object
      properties:
        tooNewLogEventStartIndex:
          $ref: "#/components/schemas/LogEventIndex"
          description: The index of the first log event that is too new. This field is inclusive.
        tooOldLogEventEndIndex:
          $ref: "#/components/schemas/LogEventIndex"
          description: The index of the last log event that is too old. This field is exclusive.
        expiredLogEventEndIndex:
          $ref: "#/components/schemas/LogEventIndex"
          description: The expired log events.
    LogEventIndex:
      type: integer
    RejectedEntityInfo:
      description: If an entity is rejected when a PutLogEvents request was made, this includes details about the reason for the rejection.
      type: object
      properties:
        errorType:
          $ref: "#/components/schemas/EntityRejectionErrorType"
          description: The type of error that caused the rejection of the entity when calling PutLogEvents.
      required:
        - errorType
    EntityRejectionErrorType:
      type: string
      enum:
        - InvalidEntity
        - InvalidTypeValue
        - InvalidKeyAttributes
        - InvalidAttributes
        - EntitySizeTooLarge
        - UnsupportedLogGroupType
        - MissingRequiredFields
    ClientToken:
      type: string
      minLength: 36
      maxLength: 128
      pattern: \S{36,128}
    PutQueryDefinitionResponse:
      type: object
      properties:
        queryDefinitionId:
          $ref: "#/components/schemas/QueryId"
          description: The ID of the query definition.
    PutResourcePolicyResponse:
      type: object
      properties:
        resourcePolicy:
          $ref: "#/components/schemas/ResourcePolicy"
          description: The new policy.
        revisionId:
          $ref: "#/components/schemas/ExpectedRevisionId"
          description: The revision ID of the created or updated resource policy. Only returned for resource-scoped policies.
    StartLiveTailLogGroupIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/LogGroupIdentifier"
    StartLiveTailResponse:
      type: object
      properties:
        responseStream:
          $ref: "#/components/schemas/StartLiveTailResponseStream"
          description: An object that includes the stream returned by your request. It can include both log events and exceptions.
    StartLiveTailResponseStream:
      description: This object includes the stream returned by your StartLiveTail request.
      type: object
      properties:
        sessionStart:
          $ref: "#/components/schemas/LiveTailSessionStart"
          description: This object contains information about this Live Tail session, including the log groups included and the log stream filters, if any.
        sessionUpdate:
          $ref: "#/components/schemas/LiveTailSessionUpdate"
          description: This object contains the log events and session metadata.
        SessionTimeoutException:
          $ref: "#/components/schemas/SessionTimeoutException"
          description: This exception is returned in the stream when the Live Tail session times out. Live Tail sessions time out after three hours.
        SessionStreamingException:
          $ref: "#/components/schemas/SessionStreamingException"
          description: This exception is returned if an unknown error occurs.
    LiveTailSessionStart:
      description: This object contains information about this Live Tail session, including the log groups included and the log stream filters, if any.
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The unique ID generated by CloudWatch Logs to identify this Live Tail session request.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The unique ID generated by CloudWatch Logs to identify this Live Tail session.
        logGroupIdentifiers:
          $ref: "#/components/schemas/StartLiveTailLogGroupIdentifiers"
          description: An array of the names and ARNs of the log groups included in this Live Tail session.
        logStreamNames:
          $ref: "#/components/schemas/InputLogStreamNames"
          description: If your StartLiveTail operation request included a logStreamNames parameter that filtered the session to only include certain log streams, these streams are listed here.
        logStreamNamePrefixes:
          $ref: "#/components/schemas/InputLogStreamNames"
          description: If your StartLiveTail operation request included a logStreamNamePrefixes parameter that filtered the session to only include log streams that have names that start with certain prefixes, these prefixes are listed here.
        logEventFilterPattern:
          $ref: "#/components/schemas/FilterPattern"
          description: An optional pattern to filter the results to include only log events that match the pattern. For example, a filter pattern of error 404 displays only log events that include both error and 404. For more information about filter pattern syntax, see Filter and Pattern Syntax.
    RequestId:
      type: string
      minLength: 0
      maxLength: 256
    SessionId:
      type: string
      minLength: 0
      maxLength: 256
    LiveTailSessionUpdate:
      description: This object contains the log events and metadata for a Live Tail session.
      type: object
      properties:
        sessionMetadata:
          $ref: "#/components/schemas/LiveTailSessionMetadata"
          description: This object contains the session metadata for a Live Tail session.
        sessionResults:
          $ref: "#/components/schemas/LiveTailSessionResults"
          description: An array, where each member of the array includes the information for one log event in the Live Tail session. A sessionResults array can include as many as 500 log events. If the number of log events matching the request exceeds 500 per second, the log events are sampled down to 500 log events to be included in each sessionUpdate structure.
    LiveTailSessionMetadata:
      description: This object contains the metadata for one LiveTailSessionUpdate structure. It indicates whether that update includes only a sample of 500 log events out of a larger number of ingested log events, or if it contains all of the matching log events ingested during that second of time.
      type: object
      properties:
        sampled:
          $ref: "#/components/schemas/IsSampled"
          description: If this is true, then more than 500 log events matched the request for this update, and the sessionResults includes a sample of 500 of those events. If this is false, then 500 or fewer log events matched the request for this update, so no sampling was necessary. In this case, the sessionResults array includes all log events that matched your request during this time.
    IsSampled:
      type: boolean
    LiveTailSessionResults:
      type: array
      items:
        $ref: "#/components/schemas/LiveTailSessionLogEvent"
    LiveTailSessionLogEvent:
      description: This object contains the information for one log event returned in a Live Tail stream.
      type: object
      properties:
        logStreamName:
          $ref: "#/components/schemas/LogStreamName"
          description: The name of the log stream that ingested this log event.
        logGroupIdentifier:
          $ref: "#/components/schemas/LogGroupIdentifier"
