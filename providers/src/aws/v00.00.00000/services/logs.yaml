        - json
        - plain
        - w3c
        - raw
        - parquet
    AllowedActionForAllowVendedLogsDeliveryForResource:
      type: string
    AllowedFieldDelimiters:
      type: array
      items:
        $ref: "#/components/schemas/FieldDelimiter"
    DeliverySourceConfigurationSchemas:
      description: A list of DeliverySourceConfigurationSchema objects that describe the available configuration parameters for a delivery source.
      type: array
      items:
        $ref: "#/components/schemas/DeliverySourceConfigurationSchema"
    DeliverySourceConfigurationSchema:
      description: A structure that describes a single configuration for a log type, including its name, value type, default value, and the range of supported values.
      type: object
      properties:
        keyName:
          $ref: "#/components/schemas/DeliverySourceConfigurationSchemaField"
          description: The name of the configuration.
        valueType:
