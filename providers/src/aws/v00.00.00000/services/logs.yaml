            type: string
            enum:
              - Logs_20140328.DeleteRetentionPolicy
            default: Logs_20140328.DeleteRetentionPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                logGroupName:
                  $ref: "#/components/schemas/LogGroupName"
                  description: The name of the log group.
              required:
                - logGroupName
      responses:
        "200":
          description: Success
  /DeleteScheduledQuery:
    post:
      operationId: DeleteScheduledQuery
      description: Deletes a scheduled query and stops all future executions. This operation also removes any configured actions and associated resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Logs_20140328.DeleteScheduledQuery
            default: Logs_20140328.DeleteScheduledQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/ScheduledQueryIdentifier"
                  description: The ARN or name of the scheduled query to delete.
