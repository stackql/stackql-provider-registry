    GetCallerIdentityRequest:
      type: object
    tradeInTokenType:
      type: string
    GetDelegatedAccessTokenResponseDisplay:
      type: object
      properties:
        Credentials:
          type: string
          description: Amazon Web Services credentials for API authentication.
        PackedPolicySize:
          type: integer
          description: The percentage of the maximum policy size that is used by the session policy. The policy size is calculated as the sum of all the session policies and permission boundaries attached to the session. If the packed size exceeds 100%, the request fails.
        AssumedPrincipal:
          type: string
          description: The Amazon Resource Name (ARN) of the principal that was assumed when obtaining the delegated access token. This ARN identifies the IAM entity whose permissions are granted by the temporary credentials.
    GetDelegatedAccessTokenOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetDelegatedAccessTokenResponseDisplay"
    GetDelegatedAccessTokenRequest:
      type: object
      properties:
        TradeInToken:
          $ref: "#/components/schemas/tradeInTokenType"
          description: The token to exchange for temporary Amazon Web Services credentials. This token must be valid and unexpired at the time of the request.
      required:
