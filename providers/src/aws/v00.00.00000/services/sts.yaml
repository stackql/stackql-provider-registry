          description: The unique identifier of the calling entity. The exact value depends on the type of entity that is making the call. The values returned are those listed in the aws:userid column in the Principal table found on the Policy Variables reference page in the IAM User Guide.
        Account:
          type: string
          description: The Amazon Web Services account ID number of the account that owns or contains the calling entity.
        Arn:
