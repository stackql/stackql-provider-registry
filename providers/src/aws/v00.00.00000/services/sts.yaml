    GetAccessKeyInfoOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetAccessKeyInfoResponseDisplay"
    GetAccessKeyInfoRequest:
      type: object
      properties:
        AccessKeyId:
          $ref: "#/components/schemas/accessKeyIdType"
          description: The identifier of an access key. This parameter allows (through its regex pattern) a string of characters that can consist of any upper- or lowercase letter or digit.
      required:
