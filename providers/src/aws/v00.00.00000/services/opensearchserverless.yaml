                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
                - policyVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLifecyclePolicyResponse"
  /UpdateSecurityConfig:
    post:
      operationId: UpdateSecurityConfig
      description: Updates a security configuration for OpenSearch Serverless. For more information, see SAML authentication for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.UpdateSecurityConfig
            default: OpenSearchServerless.UpdateSecurityConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/SecurityConfigId"
                  description: The security configuration identifier. For SAML the ID will be saml/`<accountId>`/`<idpProviderName>`. For example, saml/123456789123/OKTADev.
                configVersion:
                  $ref: "#/components/schemas/PolicyVersion"
                  description: The version of the security configuration to be updated. You can find the most recent version of a security configuration using the GetSecurityPolicy command.
                description:
                  $ref: "#/components/schemas/ConfigDescription"
                  description: A description of the security configuration.
                samlOptions:
                  $ref: "#/components/schemas/SamlConfigOptions"
                  description: SAML options in in the form of a key-value map.
                iamIdentityCenterOptionsUpdates:
                  $ref: "#/components/schemas/UpdateIamIdentityCenterConfigOptions"
                  description: Describes IAM Identity Center options in the form of a key-value map.
                iamFederationOptions:
                  $ref: "#/components/schemas/IamFederationConfigOptions"
                  description: Describes IAM federation options in the form of a key-value map for updating an existing security configuration. Use this field to modify IAM federation settings for the security configuration.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - id
                - configVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSecurityConfigResponse"
  /UpdateSecurityPolicy:
    post:
      operationId: UpdateSecurityPolicy
      description: Updates an OpenSearch Serverless security policy. For more information, see Network access for Amazon OpenSearch Serverless and Encryption at rest for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.UpdateSecurityPolicy
            default: OpenSearchServerless.UpdateSecurityPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/SecurityPolicyType"
                  description: The type of access policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy.
                policyVersion:
                  $ref: "#/components/schemas/PolicyVersion"
                  description: The version of the policy being updated.
                description:
                  $ref: "#/components/schemas/PolicyDescription"
                  description: A description of the policy. Typically used to store information about the permissions defined in the policy.
                policy:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The JSON policy document to use as the content for the new policy.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
                - policyVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSecurityPolicyResponse"
  /UpdateVpcEndpoint:
    post:
      operationId: UpdateVpcEndpoint
      description: Updates an OpenSearch Serverless-managed interface endpoint. For more information, see Access Amazon OpenSearch Serverless using an interface endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.UpdateVpcEndpoint
            default: OpenSearchServerless.UpdateVpcEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/VpcEndpointId"
                  description: The unique identifier of the interface endpoint to update.
                addSubnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                  description: The ID of one or more subnets to add to the endpoint.
                removeSubnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                  description: The unique identifiers of the subnets to remove from the endpoint.
                addSecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: The unique identifiers of the security groups to add to the endpoint. Security groups define the ports, protocols, and sources for inbound traffic that you are authorizing into your endpoint.
                removeSecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: The unique identifiers of the security groups to remove from the endpoint.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVpcEndpointResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CollectionIds:
      type: array
      items:
        $ref: "#/components/schemas/CollectionId"
    CollectionId:
      type: string
      minLength: 3
      maxLength: 40
      pattern: "[a-z0-9]{3,40}"
    CollectionNames:
      type: array
      items:
        $ref: "#/components/schemas/CollectionName"
    CollectionName:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "[a-z][a-z0-9-]+"
    BatchGetCollectionResponse:
      type: object
      properties:
        collectionDetails:
          $ref: "#/components/schemas/CollectionDetails"
          description: Details about each collection.
        collectionErrorDetails:
          $ref: "#/components/schemas/CollectionErrorDetails"
          description: Error information for the request.
    CollectionDetails:
      type: array
      items:
        $ref: "#/components/schemas/CollectionDetail"
    CollectionDetail:
      description: Details about each OpenSearch Serverless collection, including the collection endpoint, the OpenSearch Dashboards endpoint, and FIPS-compliant endpoints for federal government workloads.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CollectionId"
          description: A unique identifier for the collection.
        name:
          $ref: "#/components/schemas/CollectionName"
          description: The name of the collection.
        status:
          $ref: "#/components/schemas/CollectionStatus"
          description: The current status of the collection.
        type_:
          $ref: "#/components/schemas/CollectionType"
          description: The type of collection.
        description:
          $ref: "#/components/schemas/String"
          description: A description of the collection.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the collection.
        kmsKeyArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon Web Services KMS key used to encrypt the collection.
        standbyReplicas:
          $ref: "#/components/schemas/StandbyReplicas"
          description: Details about an OpenSearch Serverless collection.
        vectorOptions:
          $ref: "#/components/schemas/VectorOptions"
          description: Configuration options for vector search capabilities in the collection.
        createdDate:
          $ref: "#/components/schemas/Long"
          description: The Epoch time when the collection was created.
        lastModifiedDate:
          $ref: "#/components/schemas/Long"
          description: The date and time when the collection was last modified.
        collectionEndpoint:
          $ref: "#/components/schemas/String"
          description: Collection-specific endpoint used to submit index, search, and data upload requests to an OpenSearch Serverless collection.
        dashboardEndpoint:
          $ref: "#/components/schemas/String"
          description: Collection-specific endpoint used to access OpenSearch Dashboards.
        fipsEndpoints:
          $ref: "#/components/schemas/FipsEndpoints"
          description: FIPS-compliant endpoints for the collection. These endpoints use FIPS 140-3 validated cryptographic modules and are required for federal government workloads that must comply with FedRAMP security standards.
        failureCode:
          $ref: "#/components/schemas/String"
          description: A failure code associated with the request.
        failureMessage:
          $ref: "#/components/schemas/String"
          description: A message associated with the failure code.
        collectionGroupName:
          $ref: "#/components/schemas/CollectionGroupName"
          description: The name of the collection group that contains this collection.
    CollectionStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - ACTIVE
        - FAILED
        - UPDATE_FAILED
    CollectionType:
      type: string
      enum:
        - SEARCH
        - TIMESERIES
        - VECTORSEARCH
    String:
      type: string
    StandbyReplicas:
      type: string
      enum:
        - ENABLED
        - DISABLED
    VectorOptions:
      description: Configuration options for vector search capabilities in an OpenSearch Serverless collection.
      type: object
      properties:
        ServerlessVectorAcceleration:
          $ref: "#/components/schemas/ServerlessVectorAccelerationStatus"
          description: Specifies whether serverless vector acceleration is enabled for the collection.
      required:
        - ServerlessVectorAcceleration
    ServerlessVectorAccelerationStatus:
      description: Specifies whether serverless vector acceleration is enabled for the collection.
      type: string
      enum:
        - ENABLED
        - DISABLED
        - ALLOWED
    Long:
      type: integer
      format: int64
    FipsEndpoints:
      description: FIPS-compliant endpoint URLs for an OpenSearch Serverless collection. These endpoints ensure all data transmission uses FIPS 140-3 validated cryptographic implementations, meeting federal security requirements for government workloads.
      type: object
      properties:
        collectionEndpoint:
          $ref: "#/components/schemas/String"
          description: FIPS-compliant collection endpoint used to submit index, search, and data upload requests to an OpenSearch Serverless collection. This endpoint uses FIPS 140-3 validated cryptography and is required for federal government workloads.
        dashboardEndpoint:
          $ref: "#/components/schemas/String"
          description: FIPS-compliant endpoint used to access OpenSearch Dashboards. This endpoint uses FIPS 140-3 validated cryptography and is required for federal government workloads that need dashboard visualization capabilities.
    CollectionGroupName:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "[a-z][a-z0-9-]+"
    CollectionErrorDetails:
      type: array
      items:
        $ref: "#/components/schemas/CollectionErrorDetail"
    CollectionErrorDetail:
      description: Error information for an OpenSearch Serverless request.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CollectionId"
          description: If the request contains collection IDs, the response includes the IDs provided in the request.
        name:
          $ref: "#/components/schemas/CollectionName"
          description: If the request contains collection names, the response includes the names provided in the request.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: A description of the error. For example, The specified Collection is not found.
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code for the request. For example, NOT_FOUND.
    CollectionGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/CollectionGroupId"
    CollectionGroupId:
      type: string
      minLength: 3
      maxLength: 40
      pattern: "[a-z0-9]{3,40}"
    CollectionGroupNames:
      type: array
      items:
        $ref: "#/components/schemas/CollectionGroupName"
    BatchGetCollectionGroupResponse:
      type: object
      properties:
        collectionGroupDetails:
          $ref: "#/components/schemas/CollectionGroupDetails"
          description: Details about each collection group.
        collectionGroupErrorDetails:
          $ref: "#/components/schemas/CollectionGroupErrorDetails"
          description: Error information for the request.
    CollectionGroupDetails:
      type: array
      items:
        $ref: "#/components/schemas/CollectionGroupDetail"
    CollectionGroupDetail:
      description: Details about a collection group.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CollectionGroupId"
          description: The unique identifier of the collection group.
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the collection group.
        name:
          $ref: "#/components/schemas/CollectionGroupName"
          description: The name of the collection group.
        standbyReplicas:
          $ref: "#/components/schemas/StandbyReplicas"
          description: Indicates whether standby replicas are used for the collection group.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the collection group.
        tags:
          $ref: "#/components/schemas/Tags"
          description: A map of key-value pairs associated with the collection group.
        createdDate:
          $ref: "#/components/schemas/Long"
          description: The Epoch time when the collection group was created.
        capacityLimits:
          $ref: "#/components/schemas/CollectionGroupCapacityLimits"
          description: The capacity limits for the collection group, in OpenSearch Compute Units (OCUs).
        numberOfCollections:
          $ref: "#/components/schemas/Integer"
          description: The number of collections associated with the collection group.
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A map of key-value pairs associated to an OpenSearch Serverless resource.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key to use in the tag.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CollectionGroupCapacityLimits:
      description: Capacity limits for a collection group. These limits define the minimum and maximum OpenSearch Compute Units (OCUs) for indexing and search operations that can be used by collections in the group.
      type: object
      properties:
        maxIndexingCapacityInOCU:
          $ref: "#/components/schemas/CollectionGroupIndexingCapacityValue"
          description: The maximum indexing capacity for collections in the group.
        maxSearchCapacityInOCU:
          $ref: "#/components/schemas/CollectionGroupSearchCapacityValue"
          description: The maximum search capacity for collections in the group.
        minIndexingCapacityInOCU:
          $ref: "#/components/schemas/CollectionGroupIndexingCapacityValue"
          description: The minimum indexing capacity for collections in the group.
        minSearchCapacityInOCU:
          $ref: "#/components/schemas/CollectionGroupSearchCapacityValue"
          description: The minimum search capacity for collections in the group.
    CollectionGroupIndexingCapacityValue:
      type: number
      format: float
      minimum: 1
    CollectionGroupSearchCapacityValue:
      type: number
      format: float
      minimum: 1
    Integer:
      type: integer
    CollectionGroupErrorDetails:
      type: array
      items:
        $ref: "#/components/schemas/CollectionGroupErrorDetail"
    CollectionGroupErrorDetail:
      description: Error details for a collection group operation.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/CollectionGroupId"
          description: If the request contains collection group IDs, the response includes the IDs provided in the request.
        name:
          $ref: "#/components/schemas/CollectionGroupName"
          description: If the request contains collection group names, the response includes the names provided in the request.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: A description of the error. For example, The specified Collection Group is not found.
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code for the request. For example, NOT_FOUND.
    LifecyclePolicyResourceIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicyResourceIdentifier"
    LifecyclePolicyResourceIdentifier:
      description: The unique identifiers of policy types and resource names.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyType"
          description: The type of lifecycle policy.
        resource:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the OpenSearch Serverless ilndex resource.
      required:
        - type_
        - resource
    LifecyclePolicyType:
      type: string
      enum:
        - retention
    ResourceName:
      type: string
      pattern: index/[a-z][a-z0-9-]{3,32}/([a-z;0-9&$%][+.~=\-_a-z;0-9&$%]*)
    BatchGetEffectiveLifecyclePolicyResponse:
      type: object
      properties:
        effectiveLifecyclePolicyDetails:
          $ref: "#/components/schemas/EffectiveLifecyclePolicyDetails"
          description: A list of lifecycle policies applied to the OpenSearch Serverless indexes.
        effectiveLifecyclePolicyErrorDetails:
          $ref: "#/components/schemas/EffectiveLifecyclePolicyErrorDetails"
          description: A list of resources for which retrieval failed.
    EffectiveLifecyclePolicyDetails:
      type: array
      items:
        $ref: "#/components/schemas/EffectiveLifecyclePolicyDetail"
    EffectiveLifecyclePolicyDetail:
      description: Error information for an OpenSearch Serverless request.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyType"
          description: The type of lifecycle policy.
        resource:
          $ref: "#/components/schemas/Resource"
          description: The name of the OpenSearch Serverless index resource.
        policyName:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the lifecycle policy.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of OpenSearch Serverless resource. Currently, the only supported resource is index.
        retentionPeriod:
          $ref: "#/components/schemas/String"
          description: The minimum number of index retention in days or hours. This is an optional parameter that will return only if it’s set.
        noMinRetentionPeriod:
          $ref: "#/components/schemas/Boolean"
          description: The minimum number of index retention days set. That is an optional param that will return as true if the minimum number of days or hours is not set to a index resource.
    Resource:
      type: string
    PolicyName:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "[a-z][a-z0-9-]+"
    ResourceType:
      type: string
      enum:
        - index
    Boolean:
      type: boolean
    EffectiveLifecyclePolicyErrorDetails:
      type: array
      items:
        $ref: "#/components/schemas/EffectiveLifecyclePolicyErrorDetail"
    EffectiveLifecyclePolicyErrorDetail:
      description: Error information for an OpenSearch Serverless request.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyType"
          description: The type of lifecycle policy.
        resource:
          $ref: "#/components/schemas/Resource"
          description: The name of OpenSearch Serverless index resource.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: A description of the error. For example, The specified Index resource is not found.
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code for the request.
    LifecyclePolicyIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicyIdentifier"
    LifecyclePolicyIdentifier:
      description: The unique identifiers of policy types and policy names.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyType"
          description: The type of lifecycle policy.
        name:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the lifecycle policy.
      required:
        - type_
        - name
    BatchGetLifecyclePolicyResponse:
      type: object
      properties:
        lifecyclePolicyDetails:
          $ref: "#/components/schemas/LifecyclePolicyDetails"
          description: A list of lifecycle policies matched to the input policy name and policy type.
        lifecyclePolicyErrorDetails:
          $ref: "#/components/schemas/LifecyclePolicyErrorDetails"
          description: A list of lifecycle policy names and policy types for which retrieval failed.
    LifecyclePolicyDetails:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicyDetail"
    LifecyclePolicyDetail:
      description: Details about an OpenSearch Serverless lifecycle policy.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyType"
          description: The type of lifecycle policy.
        name:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the lifecycle policy.
        policyVersion:
          $ref: "#/components/schemas/PolicyVersion"
          description: The version of the lifecycle policy.
        description:
          $ref: "#/components/schemas/PolicyDescription"
          description: The description of the lifecycle policy.
        policy:
          $ref: "#/components/schemas/Document"
          description: The JSON policy document without any whitespaces.
        createdDate:
          $ref: "#/components/schemas/Long"
          description: The date the lifecycle policy was created.
        lastModifiedDate:
          $ref: "#/components/schemas/Long"
          description: The timestamp of when the lifecycle policy was last modified.
    PolicyVersion:
      type: string
      minLength: 20
      maxLength: 36
      pattern: ([0-9a-zA-Z+/]{4})*(([0-9a-zA-Z+/]{2}==)|([0-9a-zA-Z+/]{3}=))?
    PolicyDescription:
      type: string
      minLength: 0
      maxLength: 1000
    Document:
      type: object
    LifecyclePolicyErrorDetails:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicyErrorDetail"
    LifecyclePolicyErrorDetail:
      description: Error information for an OpenSearch Serverless request.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyType"
          description: The type of lifecycle policy.
        name:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the lifecycle policy.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: A description of the error. For example, The specified Lifecycle Policy is not found.
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code for the request. For example, NOT_FOUND.
    VpcEndpointIds:
      type: array
      items:
        $ref: "#/components/schemas/VpcEndpointId"
    VpcEndpointId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: vpce-[0-9a-z]*
    BatchGetVpcEndpointResponse:
      type: object
      properties:
        vpcEndpointDetails:
          $ref: "#/components/schemas/VpcEndpointDetails"
          description: Details about the specified VPC endpoint.
        vpcEndpointErrorDetails:
          $ref: "#/components/schemas/VpcEndpointErrorDetails"
          description: Error information for a failed request.
    VpcEndpointDetails:
      type: array
      items:
        $ref: "#/components/schemas/VpcEndpointDetail"
    VpcEndpointDetail:
      description: Details about an OpenSearch Serverless-managed interface endpoint.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/VpcEndpointId"
          description: The unique identifier of the endpoint.
        name:
          $ref: "#/components/schemas/VpcEndpointName"
          description: The name of the endpoint.
        vpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the VPC from which you access OpenSearch Serverless.
        subnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The ID of the subnets from which you access OpenSearch Serverless.
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The unique identifiers of the security groups that define the ports, protocols, and sources for inbound traffic that you are authorizing into your endpoint.
        status:
          $ref: "#/components/schemas/VpcEndpointStatus"
          description: The current status of the endpoint.
        createdDate:
          $ref: "#/components/schemas/Long"
          description: The date the endpoint was created.
        failureCode:
          $ref: "#/components/schemas/String"
          description: A failure code associated with the request.
        failureMessage:
          $ref: "#/components/schemas/String"
          description: A message associated with the failure code.
    VpcEndpointName:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "[a-z][a-z0-9-]+"
    VpcId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: vpc-[0-9a-z]*
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: subnet-([0-9a-f]{8}|[0-9a-f]{17})
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+\\-]+"
    VpcEndpointStatus:
      type: string
      enum:
        - PENDING
        - DELETING
        - ACTIVE
        - FAILED
    VpcEndpointErrorDetails:
      type: array
      items:
        $ref: "#/components/schemas/VpcEndpointErrorDetail"
    VpcEndpointErrorDetail:
      description: Error information for a failed BatchGetVpcEndpoint request.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/VpcEndpointId"
          description: The unique identifier of the VPC endpoint.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: An error message describing the reason for the failure.
        errorCode:
          $ref: "#/components/schemas/String"
