openapi: 3.0.0
info:
  version: "2021-11-01"
  title: OpenSearch Service Serverless
  description: OpenSearch Service Serverless
  x-serviceName: aoss
  x-serviceAlias: opensearchserverless
  x-protocol: json
  x-apiVersion: "2021-11-01"
  x-endpointPrefix: aoss
  x-targetPrefix: OpenSearchServerless
  x-jsonVersion: "1.0"
servers:
  - url: https://aoss.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for opensearchserverless
paths:
  /BatchGetCollection:
    post:
      operationId: BatchGetCollection
      description: Returns attributes for one or more collections, including the collection endpoint, the OpenSearch Dashboards endpoint, and FIPS-compliant endpoints. For more information, see Creating and managing Amazon OpenSearch Serverless collections.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.BatchGetCollection
            default: OpenSearchServerless.BatchGetCollection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ids:
                  $ref: "#/components/schemas/CollectionIds"
                  description: A list of collection IDs. You can't provide names and IDs in the same request. The ID is part of the collection endpoint. You can also retrieve it using the ListCollections API.
                names:
                  $ref: "#/components/schemas/CollectionNames"
                  description: A list of collection names. You can't provide names and IDs in the same request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCollectionResponse"
  /BatchGetCollectionGroup:
    post:
      operationId: BatchGetCollectionGroup
      description: Returns attributes for one or more collection groups, including capacity limits and the number of collections in each group. For more information, see Creating and managing Amazon OpenSearch Serverless collections.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.BatchGetCollectionGroup
            default: OpenSearchServerless.BatchGetCollectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ids:
                  $ref: "#/components/schemas/CollectionGroupIds"
                  description: A list of collection group IDs. You can't provide names and IDs in the same request.
                names:
                  $ref: "#/components/schemas/CollectionGroupNames"
                  description: A list of collection group names. You can't provide names and IDs in the same request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCollectionGroupResponse"
  /BatchGetEffectiveLifecyclePolicy:
    post:
      operationId: BatchGetEffectiveLifecyclePolicy
      description: Returns a list of successful and failed retrievals for the OpenSearch Serverless indexes. For more information, see Viewing data lifecycle policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.BatchGetEffectiveLifecyclePolicy
            default: OpenSearchServerless.BatchGetEffectiveLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceIdentifiers:
                  $ref: "#/components/schemas/LifecyclePolicyResourceIdentifiers"
                  description: The unique identifiers of policy types and resource names.
              required:
                - resourceIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetEffectiveLifecyclePolicyResponse"
  /BatchGetLifecyclePolicy:
    post:
      operationId: BatchGetLifecyclePolicy
      description: Returns one or more configured OpenSearch Serverless lifecycle policies. For more information, see Viewing data lifecycle policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.BatchGetLifecyclePolicy
            default: OpenSearchServerless.BatchGetLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                identifiers:
                  $ref: "#/components/schemas/LifecyclePolicyIdentifiers"
                  description: The unique identifiers of policy types and policy names.
              required:
                - identifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetLifecyclePolicyResponse"
  /BatchGetVpcEndpoint:
    post:
      operationId: BatchGetVpcEndpoint
      description: Returns attributes for one or more VPC endpoints associated with the current account. For more information, see Access Amazon OpenSearch Serverless using an interface endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.BatchGetVpcEndpoint
            default: OpenSearchServerless.BatchGetVpcEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ids:
                  $ref: "#/components/schemas/VpcEndpointIds"
                  description: A list of VPC endpoint identifiers.
              required:
                - ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetVpcEndpointResponse"
  /CreateAccessPolicy:
    post:
      operationId: CreateAccessPolicy
      description: Creates a data access policy for OpenSearch Serverless. Access policies limit access to collections and the resources within them, and allow a user to access that data irrespective of the access mechanism or network source. For more information, see Data access control for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateAccessPolicy
            default: OpenSearchServerless.CreateAccessPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/AccessPolicyType"
                  description: The type of policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy.
                description:
                  $ref: "#/components/schemas/PolicyDescription"
                  description: A description of the policy. Typically used to store information about the permissions defined in the policy.
                policy:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The JSON policy document to use as the content for the policy.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessPolicyResponse"
  /CreateCollection:
    post:
      operationId: CreateCollection
      description: Creates a new OpenSearch Serverless collection. For more information, see Creating and managing Amazon OpenSearch Serverless collections.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateCollection
            default: OpenSearchServerless.CreateCollection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CollectionName"
                  description: Name of the collection.
                type:
                  $ref: "#/components/schemas/CollectionType"
                  description: The type of collection.
                description:
                  $ref: "#/components/schemas/CreateCollectionRequestDescriptionString"
                  description: Description of the collection.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An arbitrary set of tags (key–value pairs) to associate with the OpenSearch Serverless collection.
                standbyReplicas:
                  $ref: "#/components/schemas/StandbyReplicas"
                  description: Indicates whether standby replicas should be used for a collection.
                vectorOptions:
                  $ref: "#/components/schemas/VectorOptions"
                  description: Configuration options for vector search capabilities in the collection.
                collectionGroupName:
                  $ref: "#/components/schemas/CollectionGroupName"
                  description: The name of the collection group to associate with the collection.
                encryptionConfig:
                  $ref: "#/components/schemas/EncryptionConfig"
                  description: Encryption settings for the collection.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCollectionResponse"
  /CreateCollectionGroup:
    post:
      operationId: CreateCollectionGroup
      description: Creates a collection group within OpenSearch Serverless. Collection groups let you manage OpenSearch Compute Units (OCUs) at a group level, with multiple collections sharing the group's capacity limits. For more information, see Managing collection groups.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateCollectionGroup
            default: OpenSearchServerless.CreateCollectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/CollectionGroupName"
                  description: The name of the collection group.
                standbyReplicas:
                  $ref: "#/components/schemas/StandbyReplicas"
                  description: Indicates whether standby replicas should be used for a collection group.
                description:
                  $ref: "#/components/schemas/CreateCollectionGroupRequestDescriptionString"
                  description: A description of the collection group.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: An arbitrary set of tags (key–value pairs) to associate with the OpenSearch Serverless collection group.
                capacityLimits:
                  $ref: "#/components/schemas/CollectionGroupCapacityLimits"
                  description: The capacity limits for the collection group, in OpenSearch Compute Units (OCUs). These limits control the maximum and minimum capacity for collections within the group.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - name
                - standbyReplicas
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCollectionGroupResponse"
  /CreateIndex:
    post:
      operationId: CreateIndex
      description: Creates an index within an OpenSearch Serverless collection. Unlike other OpenSearch indexes, indexes created by this API are automatically configured to conduct automatic semantic enrichment ingestion and search. For more information, see About automatic semantic enrichment in the OpenSearch User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateIndex
            default: OpenSearchServerless.CreateIndex
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/CollectionId"
                  description: The unique identifier of the collection in which to create the index.
                indexName:
                  $ref: "#/components/schemas/IndexName"
                  description: The name of the index to create. Index names must be lowercase and can't begin with underscores (_) or hyphens (-).
                indexSchema:
                  $ref: "#/components/schemas/IndexSchema"
                  description: The JSON schema definition for the index, including field mappings and settings.
              required:
                - id
                - indexName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexResponse"
  /CreateLifecyclePolicy:
    post:
      operationId: CreateLifecyclePolicy
      description: Creates a lifecyle policy to be applied to OpenSearch Serverless indexes. Lifecycle policies define the number of days or hours to retain the data on an OpenSearch Serverless index. For more information, see Creating data lifecycle policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateLifecyclePolicy
            default: OpenSearchServerless.CreateLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/LifecyclePolicyType"
                  description: The type of lifecycle policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the lifecycle policy.
                description:
                  $ref: "#/components/schemas/PolicyDescription"
                  description: A description of the lifecycle policy.
                policy:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The JSON policy document to use as the content for the lifecycle policy.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLifecyclePolicyResponse"
  /CreateSecurityConfig:
    post:
      operationId: CreateSecurityConfig
      description: Specifies a security configuration for OpenSearch Serverless. For more information, see SAML authentication for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateSecurityConfig
            default: OpenSearchServerless.CreateSecurityConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/SecurityConfigType"
                  description: The type of security configuration.
                name:
                  $ref: "#/components/schemas/ConfigName"
                  description: The name of the security configuration.
                description:
                  $ref: "#/components/schemas/ConfigDescription"
                  description: A description of the security configuration.
                samlOptions:
                  $ref: "#/components/schemas/SamlConfigOptions"
                  description: Describes SAML options in the form of a key-value map. This field is required if you specify SAML for the type parameter.
                iamIdentityCenterOptions:
                  $ref: "#/components/schemas/CreateIamIdentityCenterConfigOptions"
                  description: Describes IAM Identity Center options in the form of a key-value map. This field is required if you specify iamidentitycenter for the type parameter.
                iamFederationOptions:
                  $ref: "#/components/schemas/IamFederationConfigOptions"
                  description: Describes IAM federation options in the form of a key-value map. This field is required if you specify iamFederation for the type parameter.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSecurityConfigResponse"
  /CreateSecurityPolicy:
    post:
      operationId: CreateSecurityPolicy
      description: Creates a security policy to be used by one or more OpenSearch Serverless collections. Security policies provide access to a collection and its OpenSearch Dashboards endpoint from public networks or specific VPC endpoints. They also allow you to secure a collection with a KMS encryption key. For more information, see Network access for Amazon OpenSearch Serverless and Encryption at rest for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateSecurityPolicy
            default: OpenSearchServerless.CreateSecurityPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/SecurityPolicyType"
                  description: The type of security policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy.
                description:
                  $ref: "#/components/schemas/PolicyDescription"
                  description: A description of the policy. Typically used to store information about the permissions defined in the policy.
                policy:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The JSON policy document to use as the content for the new policy.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSecurityPolicyResponse"
  /CreateVpcEndpoint:
    post:
      operationId: CreateVpcEndpoint
      description: Creates an OpenSearch Serverless-managed interface VPC endpoint. For more information, see Access Amazon OpenSearch Serverless using an interface endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.CreateVpcEndpoint
            default: OpenSearchServerless.CreateVpcEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/VpcEndpointName"
                  description: The name of the interface endpoint.
                vpcId:
                  $ref: "#/components/schemas/VpcId"
                  description: The ID of the VPC from which you'll access OpenSearch Serverless.
                subnetIds:
                  $ref: "#/components/schemas/SubnetIds"
                  description: The ID of one or more subnets from which you'll access OpenSearch Serverless.
                securityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: The unique identifiers of the security groups that define the ports, protocols, and sources for inbound traffic that you are authorizing into your endpoint.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - name
                - vpcId
                - subnetIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVpcEndpointResponse"
  /DeleteAccessPolicy:
    post:
      operationId: DeleteAccessPolicy
      description: Deletes an OpenSearch Serverless access policy. For more information, see Data access control for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteAccessPolicy
            default: OpenSearchServerless.DeleteAccessPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/AccessPolicyType"
                  description: The type of policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy to delete.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccessPolicyResponse"
  /DeleteCollection:
    post:
      operationId: DeleteCollection
      description: Deletes an OpenSearch Serverless collection. For more information, see Creating and managing Amazon OpenSearch Serverless collections.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteCollection
            default: OpenSearchServerless.DeleteCollection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/CollectionId"
                  description: The unique identifier of the collection. For example, 1iu5usc406kd. The ID is part of the collection endpoint. You can also retrieve it using the ListCollections API.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCollectionResponse"
  /DeleteCollectionGroup:
    post:
      operationId: DeleteCollectionGroup
      description: Deletes a collection group. You can only delete empty collection groups that contain no collections. For more information, see Creating and managing Amazon OpenSearch Serverless collections.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteCollectionGroup
            default: OpenSearchServerless.DeleteCollectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/CollectionGroupId"
                  description: The unique identifier of the collection group to delete.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCollectionGroupResponse"
  /DeleteIndex:
    post:
      operationId: DeleteIndex
      description: Deletes an index from an OpenSearch Serverless collection. Be aware that the index might be configured to conduct automatic semantic enrichment ingestion and search. For more information, see About automatic semantic enrichment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteIndex
            default: OpenSearchServerless.DeleteIndex
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/CollectionId"
                  description: The unique identifier of the collection containing the index to delete.
                indexName:
                  $ref: "#/components/schemas/IndexName"
                  description: The name of the index to delete.
              required:
                - id
                - indexName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIndexResponse"
  /DeleteLifecyclePolicy:
    post:
      operationId: DeleteLifecyclePolicy
      description: Deletes an OpenSearch Serverless lifecycle policy. For more information, see Deleting data lifecycle policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteLifecyclePolicy
            default: OpenSearchServerless.DeleteLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/LifecyclePolicyType"
                  description: The type of lifecycle policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy to delete.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLifecyclePolicyResponse"
  /DeleteSecurityConfig:
    post:
      operationId: DeleteSecurityConfig
      description: Deletes a security configuration for OpenSearch Serverless. For more information, see SAML authentication for Amazon OpenSearch Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteSecurityConfig
            default: OpenSearchServerless.DeleteSecurityConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/SecurityConfigId"
                  description: The security configuration identifier. For SAML the ID will be saml/`<accountId>`/`<idpProviderName>`. For example, saml/123456789123/OKTADev.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSecurityConfigResponse"
  /DeleteSecurityPolicy:
    post:
      operationId: DeleteSecurityPolicy
      description: Deletes an OpenSearch Serverless security policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - OpenSearchServerless.DeleteSecurityPolicy
            default: OpenSearchServerless.DeleteSecurityPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/SecurityPolicyType"
                  description: The type of policy.
                name:
                  $ref: "#/components/schemas/PolicyName"
                  description: The name of the policy to delete.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - type
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSecurityPolicyResponse"
  /DeleteVpcEndpoint:
    post:
      operationId: DeleteVpcEndpoint
