        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Text:
                  $ref: "#/components/schemas/CustomerInputString"
                  description: A UTF-8 text string. The maximum string size is 100 KB. If you enter text using this parameter, do not use the Bytes parameter.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. You can specify any of the primary languages supported by Amazon Comprehend. If your request includes the endpoint for a custom entity recognition model, Amazon Comprehend uses the language of your custom model, and it ignores any language code that you specify here. All input documents must be in the same language.
