components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CustomerInputStringList:
      type: array
      items:
        $ref: "#/components/schemas/CustomerInputString"
    CustomerInputString:
      type: string
      minLength: 1
    BatchDetectDominantLanguageResponse:
      type: object
      properties:
        ResultList:
          $ref: "#/components/schemas/ListOfDetectDominantLanguageResult"
          description: A list of objects containing the results of the operation. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If all of the documents contain an error, the ResultList is empty.
        ErrorList:
          $ref: "#/components/schemas/BatchItemErrorList"
          description: A list containing one object for each document that contained an error. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If there are no errors in the batch, the ErrorList is empty.
      required:
        - ResultList
        - ErrorList
    ListOfDetectDominantLanguageResult:
      type: array
      items:
        $ref: "#/components/schemas/BatchDetectDominantLanguageItemResult"
    BatchDetectDominantLanguageItemResult:
      description: The result of calling the operation. The operation returns one object for each document that is successfully processed by the operation.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
          description: The zero-based index of the document in the input list.
        Languages:
          $ref: "#/components/schemas/ListOfDominantLanguages"
          description: One or more DominantLanguage objects describing the dominant languages in the document.
    Integer:
      type: integer
    ListOfDominantLanguages:
