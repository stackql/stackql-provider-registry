          description: One or more KeyPhrase objects, one for each key phrase detected in the document.
    ListOfKeyPhrases:
      type: array
      items:
        $ref: "#/components/schemas/KeyPhrase"
    KeyPhrase:
      description: Describes a key noun phrase.
      type: object
      properties:
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of the detection.
        Text:
          $ref: "#/components/schemas/String"
          description: The text of a key noun phrase.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based offset from the beginning of the source text to the first character in the key phrase.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based offset from the beginning of the source text to the last character in the key phrase.
    BatchDetectSentimentResponse:
      type: object
      properties:
        ResultList:
          $ref: "#/components/schemas/ListOfDetectSentimentResult"
          description: A list of objects containing the results of the operation. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If all of the documents contain an error, the ResultList is empty.
        ErrorList:
          $ref: "#/components/schemas/BatchItemErrorList"
          description: A list containing one object for each document that contained an error. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If there are no errors in the batch, the ErrorList is empty.
      required:
        - ResultList
        - ErrorList
    ListOfDetectSentimentResult:
      type: array
      items:
        $ref: "#/components/schemas/BatchDetectSentimentItemResult"
    BatchDetectSentimentItemResult:
      description: The result of calling the operation. The operation returns one object for each document that is successfully processed by the operation.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
          description: The zero-based index of the document in the input list.
        Sentiment:
          $ref: "#/components/schemas/SentimentType"
          description: The sentiment detected in the document.
        SentimentScore:
          $ref: "#/components/schemas/SentimentScore"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its sentiment detection.
    SentimentType:
      type: string
      enum:
        - POSITIVE
        - NEGATIVE
        - NEUTRAL
        - MIXED
    SentimentScore:
      description: Describes the level of confidence that Amazon Comprehend has in the accuracy of its detection of sentiments.
      type: object
      properties:
        Positive:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the POSITIVE sentiment.
        Negative:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the NEGATIVE sentiment.
        Neutral:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the NEUTRAL sentiment.
        Mixed:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of its detection of the MIXED sentiment.
    SyntaxLanguageCode:
      type: string
      enum:
        - en
        - es
        - fr
        - de
        - it
        - pt
    BatchDetectSyntaxResponse:
      type: object
      properties:
        ResultList:
          $ref: "#/components/schemas/ListOfDetectSyntaxResult"
          description: A list of objects containing the results of the operation. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If all of the documents contain an error, the ResultList is empty.
        ErrorList:
          $ref: "#/components/schemas/BatchItemErrorList"
          description: A list containing one object for each document that contained an error. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If there are no errors in the batch, the ErrorList is empty.
      required:
        - ResultList
        - ErrorList
    ListOfDetectSyntaxResult:
      type: array
      items:
        $ref: "#/components/schemas/BatchDetectSyntaxItemResult"
    BatchDetectSyntaxItemResult:
      description: The result of calling the operation. The operation returns one object that is successfully processed by the operation.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
          description: The zero-based index of the document in the input list.
        SyntaxTokens:
          $ref: "#/components/schemas/ListOfSyntaxTokens"
          description: The syntax tokens for the words in the document, one token for each word.
    ListOfSyntaxTokens:
      type: array
      items:
        $ref: "#/components/schemas/SyntaxToken"
    SyntaxToken:
      description: Represents a work in the input text that was recognized and assigned a part of speech. There is one syntax token record for each word in the source text.
      type: object
      properties:
        TokenId:
          $ref: "#/components/schemas/Integer"
          description: A unique identifier for a token.
        Text:
          $ref: "#/components/schemas/String"
          description: The word that was recognized in the source text.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based offset from the beginning of the source text to the first character in the word.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based offset from the beginning of the source text to the last character in the word.
        PartOfSpeech:
          $ref: "#/components/schemas/PartOfSpeechTag"
          description: Provides the part of speech label and the confidence level that Amazon Comprehend has that the part of speech was correctly identified. For more information, see Syntax in the Comprehend Developer Guide.
    PartOfSpeechTag:
      description: Identifies the part of speech represented by the token and gives the confidence that Amazon Comprehend has that the part of speech was correctly identified. For more information about the parts of speech that Amazon Comprehend can identify, see Syntax in the Comprehend Developer Guide.
      type: object
      properties:
        Tag:
          $ref: "#/components/schemas/PartOfSpeechTagType"
          description: Identifies the part of speech that the token represents.
        Score:
          $ref: "#/components/schemas/Float"
          description: The confidence that Amazon Comprehend has that the part of speech was correctly identified.
    PartOfSpeechTagType:
      type: string
      enum:
        - ADJ
        - ADP
        - ADV
        - AUX
        - CONJ
        - CCONJ
        - DET
        - INTJ
        - NOUN
        - NUM
        - O
        - PART
        - PRON
        - PROPN
        - PUNCT
        - SCONJ
        - SYM
        - VERB
    BatchDetectTargetedSentimentResponse:
      type: object
      properties:
        ResultList:
          $ref: "#/components/schemas/ListOfDetectTargetedSentimentResult"
          description: A list of objects containing the results of the operation. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If all of the documents contain an error, the ResultList is empty.
        ErrorList:
          $ref: "#/components/schemas/BatchItemErrorList"
          description: List of errors that the operation can return.
      required:
        - ResultList
        - ErrorList
    ListOfDetectTargetedSentimentResult:
      type: array
      items:
        $ref: "#/components/schemas/BatchDetectTargetedSentimentItemResult"
    BatchDetectTargetedSentimentItemResult:
      description: Analysis results for one of the documents in the batch.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
          description: The zero-based index of this result in the input list.
        Entities:
          $ref: "#/components/schemas/ListOfTargetedSentimentEntities"
          description: An array of targeted sentiment entities.
    ListOfTargetedSentimentEntities:
      type: array
      items:
        $ref: "#/components/schemas/TargetedSentimentEntity"
    TargetedSentimentEntity:
      description: Information about one of the entities found by targeted sentiment analysis. For more information about targeted sentiment, see Targeted sentiment in the Amazon Comprehend Developer Guide.
      type: object
      properties:
        DescriptiveMentionIndex:
          $ref: "#/components/schemas/ListOfDescriptiveMentionIndices"
          description: One or more index into the Mentions array that provides the best name for the entity group.
        Mentions:
          $ref: "#/components/schemas/ListOfMentions"
          description: An array of mentions of the entity in the document. The array represents a co-reference group. See Co-reference group for an example.
    ListOfDescriptiveMentionIndices:
      type: array
      items:
        $ref: "#/components/schemas/Integer"
    ListOfMentions:
      type: array
      items:
        $ref: "#/components/schemas/TargetedSentimentMention"
    TargetedSentimentMention:
      description: Information about one mention of an entity. The mention information includes the location of the mention in the text and the sentiment of the mention. For more information about targeted sentiment, see Targeted sentiment in the Amazon Comprehend Developer Guide.
      type: object
      properties:
        Score:
          $ref: "#/components/schemas/Float"
          description: Model confidence that the entity is relevant. Value range is zero to one, where one is highest confidence.
        GroupScore:
          $ref: "#/components/schemas/Float"
          description: The confidence that all the entities mentioned in the group relate to the same entity.
        Text:
          $ref: "#/components/schemas/String"
          description: The text in the document that identifies the entity.
        Type:
          $ref: "#/components/schemas/TargetedSentimentEntityType"
          description: The type of the entity. Amazon Comprehend supports a variety of entity types.
        MentionSentiment:
          $ref: "#/components/schemas/MentionSentiment"
          description: Contains the sentiment and sentiment score for the mention.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The offset into the document text where the mention begins.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The offset into the document text where the mention ends.
    TargetedSentimentEntityType:
      type: string
      enum:
        - PERSON
        - LOCATION
        - ORGANIZATION
        - FACILITY
        - BRAND
        - COMMERCIAL_ITEM
        - MOVIE
        - MUSIC
        - BOOK
        - SOFTWARE
        - GAME
        - PERSONAL_TITLE
        - EVENT
        - DATE
        - QUANTITY
        - ATTRIBUTE
        - OTHER
    MentionSentiment:
      description: Contains the sentiment and sentiment score for one mention of an entity. For more information about targeted sentiment, see Targeted sentiment in the Amazon Comprehend Developer Guide.
      type: object
      properties:
        Sentiment:
          $ref: "#/components/schemas/SentimentType"
          description: The sentiment of the mention.
        SentimentScore:
          $ref: "#/components/schemas/SentimentScore"
    DocumentClassifierEndpointArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:([0-9]{12}|aws):document-classifier-endpoint/[a-zA-Z0-9](-*[a-zA-Z0-9])*
    SemiStructuredDocumentBlob:
      type: string
      format: byte
      minLength: 1
    DocumentReaderConfig:
      description: "Provides configuration parameters to override the default actions for extracting text from PDF documents and image files. By default, Amazon Comprehend performs the following actions to extract text from files, based on the input file type: Word files - Amazon Comprehend parser extracts the text. Digital PDF files - Amazon Comprehend parser extracts the text. Image files and scanned PDF files - Amazon Comprehend uses the Amazon Textract DetectDocumentText API to extract the text. DocumentReaderConfig does not apply to plain text files or Word files. For image files and PDF documents, you can override these default actions using the fields listed below. For more information, see Setting text extraction options in the Comprehend Developer Guide."
      type: object
      properties:
        DocumentReadAction:
          $ref: "#/components/schemas/DocumentReadAction"
          description: "This field defines the Amazon Textract API operation that Amazon Comprehend uses to extract text from PDF files and image files. Enter one of the following values: TEXTRACT_DETECT_DOCUMENT_TEXT - The Amazon Comprehend service uses the DetectDocumentText API operation. TEXTRACT_ANALYZE_DOCUMENT - The Amazon Comprehend service uses the AnalyzeDocument API operation."
        DocumentReadMode:
          $ref: "#/components/schemas/DocumentReadMode"
          description: "Determines the text extraction actions for PDF files. Enter one of the following values: SERVICE_DEFAULT - use the Amazon Comprehend service defaults for PDF files. FORCE_DOCUMENT_READ_ACTION - Amazon Comprehend uses the Textract API specified by DocumentReadAction for all PDF files, including digital PDF files."
        FeatureTypes:
          $ref: "#/components/schemas/ListOfDocumentReadFeatureTypes"
          description: "Specifies the type of Amazon Textract features to apply. If you chose TEXTRACT_ANALYZE_DOCUMENT as the read action, you must specify one or both of the following values: TABLES - Returns additional information about any tables that are detected in the input document. FORMS - Returns additional information about any forms that are detected in the input document."
      required:
        - DocumentReadAction
    DocumentReadAction:
      type: string
      enum:
        - TEXTRACT_DETECT_DOCUMENT_TEXT
        - TEXTRACT_ANALYZE_DOCUMENT
    DocumentReadMode:
      type: string
      enum:
        - SERVICE_DEFAULT
        - FORCE_DOCUMENT_READ_ACTION
    ListOfDocumentReadFeatureTypes:
      type: array
      items:
        $ref: "#/components/schemas/DocumentReadFeatureTypes"
    DocumentReadFeatureTypes:
      description: TABLES or FORMS
      type: string
      enum:
        - TABLES
        - FORMS
    ClassifyDocumentResponse:
      type: object
      properties:
        Classes:
          $ref: "#/components/schemas/ListOfClasses"
          description: The classes used by the document being analyzed. These are used for models trained in multi-class mode. Individual classes are mutually exclusive and each document is expected to have only a single class assigned to it. For example, an animal can be a dog or a cat, but not both at the same time. For prompt safety classification, the response includes only two classes (SAFE_PROMPT and UNSAFE_PROMPT), along with a confidence score for each class. The value range of the score is zero to one, where one is the highest confidence.
        Labels:
          $ref: "#/components/schemas/ListOfLabels"
          description: The labels used in the document being analyzed. These are used for multi-label trained models. Individual labels represent different categories that are related in some manner and are not mutually exclusive. For example, a movie can be just an action movie, or it can be an action movie, a science fiction movie, and a comedy, all at the same time.
        DocumentMetadata:
          $ref: "#/components/schemas/DocumentMetadata"
          description: Extraction information about the document. This field is present in the response only if your request includes the Byte parameter.
        DocumentType:
          $ref: "#/components/schemas/ListOfDocumentType"
          description: The document type for each page in the input document. This field is present in the response only if your request includes the Byte parameter.
        Errors:
          $ref: "#/components/schemas/ListOfErrors"
          description: Page-level errors that the system detected while processing the input document. The field is empty if the system encountered no errors.
        Warnings:
          $ref: "#/components/schemas/ListOfWarnings"
          description: Warnings detected while processing the input document. The response includes a warning if there is a mismatch between the input document type and the model type associated with the endpoint that you specified. The response can also include warnings for individual pages that have a mismatch. The field is empty if the system generated no warnings.
    ListOfClasses:
      type: array
      items:
        $ref: "#/components/schemas/DocumentClass"
    DocumentClass:
      description: Specifies the class that categorizes the document being analyzed
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the class.
        Score:
          $ref: "#/components/schemas/Float"
          description: The confidence score that Amazon Comprehend has this class correctly attributed.
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number in the input document. This field is present in the response only if your request includes the Byte parameter.
    ListOfLabels:
      type: array
      items:
        $ref: "#/components/schemas/DocumentLabel"
    DocumentLabel:
      description: Specifies one of the label or labels that categorize the document being analyzed.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the label.
        Score:
          $ref: "#/components/schemas/Float"
          description: The confidence score that Amazon Comprehend has this label correctly attributed.
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number where the label occurs. This field is present in the response only if your request includes the Byte parameter.
    DocumentMetadata:
      description: Information about the document, discovered during text extraction.
      type: object
      properties:
        Pages:
          $ref: "#/components/schemas/Integer"
          description: Number of pages in the document.
        ExtractedCharacters:
          $ref: "#/components/schemas/ListOfExtractedCharacters"
          description: List of pages in the document, with the number of characters extracted from each page.
    ListOfExtractedCharacters:
      type: array
      items:
        $ref: "#/components/schemas/ExtractedCharactersListItem"
    ExtractedCharactersListItem:
      description: Array of the number of characters extracted from each page.
      type: object
      properties:
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number.
        Count:
          $ref: "#/components/schemas/Integer"
          description: Number of characters extracted from each page.
    ListOfDocumentType:
      type: array
      items:
        $ref: "#/components/schemas/DocumentTypeListItem"
    DocumentTypeListItem:
      description: Document type for each page in the document.
      type: object
      properties:
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number.
        Type:
          $ref: "#/components/schemas/DocumentType"
          description: Document type.
    DocumentType:
      type: string
      enum:
        - NATIVE_PDF
        - SCANNED_PDF
        - MS_WORD
        - IMAGE
        - PLAIN_TEXT
        - TEXTRACT_DETECT_DOCUMENT_TEXT_JSON
        - TEXTRACT_ANALYZE_DOCUMENT_JSON
    ListOfErrors:
      type: array
      items:
        $ref: "#/components/schemas/ErrorsListItem"
    ErrorsListItem:
      description: "Text extraction encountered one or more page-level errors in the input document. The ErrorCode contains one of the following values: TEXTRACT_BAD_PAGE - Amazon Textract cannot read the page. For more information about page limits in Amazon Textract, see Page Quotas in Amazon Textract. TEXTRACT_PROVISIONED_THROUGHPUT_EXCEEDED - The number of requests exceeded your throughput limit. For more information about throughput quotas in Amazon Textract, see Default quotas in Amazon Textract. PAGE_CHARACTERS_EXCEEDED - Too many text characters on the page (10,000 characters maximum). PAGE_SIZE_EXCEEDED - The maximum page size is 10 MB. INTERNAL_SERVER_ERROR - The request encountered a service issue. Try the API request again."
      type: object
      properties:
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number where the error occurred.
        ErrorCode:
          $ref: "#/components/schemas/PageBasedErrorCode"
          description: Error code for the cause of the error.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: Text message explaining the reason for the error.
    PageBasedErrorCode:
      type: string
      enum:
        - TEXTRACT_BAD_PAGE
        - TEXTRACT_PROVISIONED_THROUGHPUT_EXCEEDED
        - PAGE_CHARACTERS_EXCEEDED
        - PAGE_SIZE_EXCEEDED
        - INTERNAL_SERVER_ERROR
    ListOfWarnings:
      type: array
      items:
        $ref: "#/components/schemas/WarningsListItem"
    WarningsListItem:
      description: "The system identified one of the following warnings while processing the input document: The document to classify is plain text, but the classifier is a native document model. The document to classify is semi-structured, but the classifier is a plain-text model."
      type: object
      properties:
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number in the input document.
        WarnCode:
          $ref: "#/components/schemas/PageBasedWarningCode"
          description: The type of warning.
        WarnMessage:
          $ref: "#/components/schemas/String"
          description: Text message associated with the warning.
    PageBasedWarningCode:
      type: string
      enum:
        - INFERENCING_PLAINTEXT_WITH_NATIVE_TRAINED_MODEL
        - INFERENCING_NATIVE_DOCUMENT_WITH_PLAINTEXT_TRAINED_MODEL
    ContainsPiiEntitiesResponse:
      type: object
      properties:
        Labels:
          $ref: "#/components/schemas/ListOfEntityLabels"
          description: The labels used in the document being analyzed. Individual labels represent personally identifiable information (PII) entity types.
    ListOfEntityLabels:
      type: array
      items:
        $ref: "#/components/schemas/EntityLabel"
    EntityLabel:
      description: Specifies one of the label or labels that categorize the personally identifiable information (PII) entity being analyzed.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PiiEntityType"
          description: The name of the label.
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of the detection.
    PiiEntityType:
      type: string
      enum:
        - BANK_ACCOUNT_NUMBER
        - BANK_ROUTING
        - CREDIT_DEBIT_NUMBER
        - CREDIT_DEBIT_CVV
        - CREDIT_DEBIT_EXPIRY
        - PIN
        - EMAIL
        - ADDRESS
        - NAME
        - PHONE
        - SSN
        - DATE_TIME
        - PASSPORT_NUMBER
        - DRIVER_ID
        - URL
        - AGE
        - USERNAME
        - PASSWORD
        - AWS_ACCESS_KEY
        - AWS_SECRET_KEY
        - IP_ADDRESS
        - MAC_ADDRESS
        - ALL
        - LICENSE_PLATE
        - VEHICLE_IDENTIFICATION_NUMBER
        - UK_NATIONAL_INSURANCE_NUMBER
        - CA_SOCIAL_INSURANCE_NUMBER
        - US_INDIVIDUAL_TAX_IDENTIFICATION_NUMBER
        - UK_UNIQUE_TAXPAYER_REFERENCE_NUMBER
        - IN_PERMANENT_ACCOUNT_NUMBER
        - IN_NREGA
        - INTERNATIONAL_BANK_ACCOUNT_NUMBER
        - SWIFT_CODE
        - UK_NATIONAL_HEALTH_SERVICE_NUMBER
        - CA_HEALTH_NUMBER
        - IN_AADHAAR
        - IN_VOTER_NUMBER
    ComprehendFlywheelArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:flywheel/[a-zA-Z0-9](-*[a-zA-Z0-9])*
    ComprehendArnName:
      type: string
      maxLength: 63
      pattern: ^[a-zA-Z0-9](-*[a-zA-Z0-9])*$
    DatasetType:
      type: string
      enum:
        - TRAIN
        - TEST
    Description:
      type: string
      maxLength: 2048
      pattern: ^([a-zA-Z0-9_])[\\a-zA-Z0-9_@#%*+=:?./!\s-]*$
    DatasetInputDataConfig:
      description: Specifies the format and location of the input data for the dataset.
      type: object
      properties:
        AugmentedManifests:
          $ref: "#/components/schemas/DatasetAugmentedManifestsList"
          description: A list of augmented manifest files that provide training data for your custom model. An augmented manifest file is a labeled dataset that is produced by Amazon SageMaker Ground Truth.
        DataFormat:
          $ref: "#/components/schemas/DatasetDataFormat"
          description: "COMPREHEND_CSV: The data format is a two-column CSV file, where the first column contains labels and the second column contains documents. AUGMENTED_MANIFEST: The data format"
        DocumentClassifierInputDataConfig:
          $ref: "#/components/schemas/DatasetDocumentClassifierInputDataConfig"
          description: The input properties for training a document classifier model. For more information on how the input file is formatted, see Preparing training data in the Comprehend Developer Guide.
        EntityRecognizerInputDataConfig:
          $ref: "#/components/schemas/DatasetEntityRecognizerInputDataConfig"
          description: The input properties for training an entity recognizer model.
    DatasetAugmentedManifestsList:
      type: array
      items:
        $ref: "#/components/schemas/DatasetAugmentedManifestsListItem"
    DatasetAugmentedManifestsListItem:
      description: An augmented manifest file that provides training data for your custom model. An augmented manifest file is a labeled dataset that is produced by Amazon SageMaker Ground Truth.
      type: object
      properties:
        AttributeNames:
          $ref: "#/components/schemas/AttributeNamesList"
          description: The JSON attribute that contains the annotations for your training documents. The number of attribute names that you specify depends on whether your augmented manifest file is the output of a single labeling job or a chained labeling job. If your file is the output of a single labeling job, specify the LabelAttributeName key that was used when the job was created in Ground Truth. If your file is the output of a chained labeling job, specify the LabelAttributeName key for one or more jobs in the chain. Each LabelAttributeName key provides the annotations from an individual job.
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location of the augmented manifest file.
        AnnotationDataS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 prefix to the annotation files that are referred in the augmented manifest file.
        SourceDocumentsS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 prefix to the source files (PDFs) that are referred to in the augmented manifest file.
        DocumentType:
          $ref: "#/components/schemas/AugmentedManifestsDocumentTypeFormat"
          description: The type of augmented manifest. If you don't specify, the default is PlainTextDocument. PLAIN_TEXT_DOCUMENT A document type that represents any unicode text that is encoded in UTF-8.
      required:
        - AttributeNames
        - S3Uri
    AttributeNamesList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeNamesListItem"
    AttributeNamesListItem:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[a-zA-Z0-9](-*[a-zA-Z0-9])*
    S3Uri:
      type: string
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
    AugmentedManifestsDocumentTypeFormat:
      type: string
      enum:
        - PLAIN_TEXT_DOCUMENT
        - SEMI_STRUCTURED_DOCUMENT
    DatasetDataFormat:
      type: string
      enum:
        - COMPREHEND_CSV
        - AUGMENTED_MANIFEST
    DatasetDocumentClassifierInputDataConfig:
      description: Describes the dataset input data configuration for a document classifier model. For more information on how the input file is formatted, see Preparing training data in the Comprehend Developer Guide.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI for the input data. The S3 bucket must be in the same Region as the API endpoint that you are calling. The URI can point to a single input file or it can provide the prefix for a collection of input files. For example, if you use the URI S3://bucketName/prefix, if the prefix is a single file, Amazon Comprehend uses that file as input. If more than one file begins with the prefix, Amazon Comprehend uses all of them as input. This parameter is required if you set DataFormat to COMPREHEND_CSV.
        LabelDelimiter:
          $ref: "#/components/schemas/LabelDelimiter"
          description: Indicates the delimiter used to separate each label for training a multi-label classifier. The default delimiter between labels is a pipe (|). You can use a different character as a delimiter (if it's an allowed character) by specifying it under Delimiter for labels. If the training documents use a delimiter other than the default or the delimiter you specify, the labels on that line will be combined to make a single unique label, such as LABELLABELLABEL.
      required:
        - S3Uri
    LabelDelimiter:
      type: string
      minLength: 1
      maxLength: 1
      pattern: ^[ ~!@#$%^*\-_+=|\\:;\t>?/]$
    DatasetEntityRecognizerInputDataConfig:
      description: Specifies the format and location of the input data. You must provide either the Annotations parameter or the EntityList parameter.
      type: object
      properties:
        Annotations:
          $ref: "#/components/schemas/DatasetEntityRecognizerAnnotations"
          description: The S3 location of the annotation documents for your custom entity recognizer.
        Documents:
          $ref: "#/components/schemas/DatasetEntityRecognizerDocuments"
          description: The format and location of the training documents for your custom entity recognizer.
        EntityList:
          $ref: "#/components/schemas/DatasetEntityRecognizerEntityList"
          description: The S3 location of the entity list for your custom entity recognizer.
      required:
        - Documents
    DatasetEntityRecognizerAnnotations:
      description: Describes the annotations associated with a entity recognizer.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: Specifies the Amazon S3 location where the training documents for an entity recognizer are located. The URI must be in the same Region as the API endpoint that you are calling.
      required:
        - S3Uri
    DatasetEntityRecognizerDocuments:
      description: Describes the documents submitted with a dataset for an entity recognizer model.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: Specifies the Amazon S3 location where the documents for the dataset are located.
        InputFormat:
          $ref: "#/components/schemas/InputFormat"
          description: Specifies how the text in an input file should be processed. This is optional, and the default is ONE_DOC_PER_LINE. ONE_DOC_PER_FILE - Each file is considered a separate document. Use this option when you are processing large documents, such as newspaper articles or scientific papers. ONE_DOC_PER_LINE - Each line in a file is considered a separate document. Use this option when you are processing many short documents, such as text messages.
      required:
        - S3Uri
    InputFormat:
      type: string
      enum:
        - ONE_DOC_PER_FILE
        - ONE_DOC_PER_LINE
    DatasetEntityRecognizerEntityList:
      description: Describes the dataset entity list for an entity recognizer model. For more information on how the input file is formatted, see Preparing training data in the Comprehend Developer Guide.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: Specifies the Amazon S3 location where the entity list is located.
      required:
        - S3Uri
    ClientRequestTokenString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-]+$
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair that adds as a metadata to a resource used by Amazon Comprehend. For example, a tag with the key-value pair ‘Department’:’Sales’ might be added to a resource to indicate its use by a particular department.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The initial part of a key-value pair that forms a tag associated with a given resource. For instance, if you want to show which resources are used by which departments, you might use “Department” as the key portion of the pair, with multiple possible values such as “sales,” “legal,” and “administration.”
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The second part of a key-value pair that forms a tag associated with a given resource. For instance, if you want to show which resources are used by which departments, you might use “Department” as the initial (key) portion of the pair, with a value of “sales” to indicate the sales department.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateDatasetResponse:
      type: object
      properties:
        DatasetArn:
          $ref: "#/components/schemas/ComprehendDatasetArn"
          description: The ARN of the dataset.
    ComprehendDatasetArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:flywheel/[a-zA-Z0-9](-*[a-zA-Z0-9])*/dataset/[a-zA-Z0-9](-*[a-zA-Z0-9])*
    VersionName:
      type: string
      maxLength: 63
      pattern: ^[a-zA-Z0-9](-*[a-zA-Z0-9])*$
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    DocumentClassifierInputDataConfig:
      description: The input properties for training a document classifier. For more information on how the input file is formatted, see Preparing training data in the Comprehend Developer Guide.
      type: object
      properties:
        DataFormat:
          $ref: "#/components/schemas/DocumentClassifierDataFormat"
          description: "The format of your training data: COMPREHEND_CSV: A two-column CSV file, where labels are provided in the first column, and documents are provided in the second. If you use this value, you must provide the S3Uri parameter in your request. AUGMENTED_MANIFEST: A labeled dataset that is produced by Amazon SageMaker Ground Truth. This file is in JSON lines format. Each line is a complete JSON object that contains a training document and its associated labels. If you use this value, you must provide the AugmentedManifests parameter in your request. If you don't specify a value, Amazon Comprehend uses COMPREHEND_CSV as the default."
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI for the input data. The S3 bucket must be in the same Region as the API endpoint that you are calling. The URI can point to a single input file or it can provide the prefix for a collection of input files. For example, if you use the URI S3://bucketName/prefix, if the prefix is a single file, Amazon Comprehend uses that file as input. If more than one file begins with the prefix, Amazon Comprehend uses all of them as input. This parameter is required if you set DataFormat to COMPREHEND_CSV.
        TestS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: This specifies the Amazon S3 location that contains the test annotations for the document classifier. The URI must be in the same Amazon Web Services Region as the API endpoint that you are calling.
        LabelDelimiter:
          $ref: "#/components/schemas/LabelDelimiter"
          description: Indicates the delimiter used to separate each label for training a multi-label classifier. The default delimiter between labels is a pipe (|). You can use a different character as a delimiter (if it's an allowed character) by specifying it under Delimiter for labels. If the training documents use a delimiter other than the default or the delimiter you specify, the labels on that line will be combined to make a single unique label, such as LABELLABELLABEL.
        AugmentedManifests:
          $ref: "#/components/schemas/DocumentClassifierAugmentedManifestsList"
          description: A list of augmented manifest files that provide training data for your custom model. An augmented manifest file is a labeled dataset that is produced by Amazon SageMaker Ground Truth. This parameter is required if you set DataFormat to AUGMENTED_MANIFEST.
        DocumentType:
          $ref: "#/components/schemas/DocumentClassifierDocumentTypeFormat"
          description: The type of input documents for training the model. Provide plain-text documents to create a plain-text model, and provide semi-structured documents to create a native document model.
        Documents:
          $ref: "#/components/schemas/DocumentClassifierDocuments"
          description: The S3 location of the training documents. This parameter is required in a request to create a native document model.
        DocumentReaderConfig:
          $ref: "#/components/schemas/DocumentReaderConfig"
    DocumentClassifierDataFormat:
      type: string
      enum:
        - COMPREHEND_CSV
        - AUGMENTED_MANIFEST
    DocumentClassifierAugmentedManifestsList:
      type: array
      items:
        $ref: "#/components/schemas/AugmentedManifestsListItem"
    AugmentedManifestsListItem:
      description: An augmented manifest file that provides training data for your custom model. An augmented manifest file is a labeled dataset that is produced by Amazon SageMaker Ground Truth.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 location of the augmented manifest file.
        Split:
          $ref: "#/components/schemas/Split"
          description: The purpose of the data you've provided in the augmented manifest. You can either train or test this data. If you don't specify, the default is train. TRAIN - all of the documents in the manifest will be used for training. If no test documents are provided, Amazon Comprehend will automatically reserve a portion of the training documents for testing. TEST - all of the documents in the manifest will be used for testing.
        AttributeNames:
          $ref: "#/components/schemas/AttributeNamesList"
          description: The JSON attribute that contains the annotations for your training documents. The number of attribute names that you specify depends on whether your augmented manifest file is the output of a single labeling job or a chained labeling job. If your file is the output of a single labeling job, specify the LabelAttributeName key that was used when the job was created in Ground Truth. If your file is the output of a chained labeling job, specify the LabelAttributeName key for one or more jobs in the chain. Each LabelAttributeName key provides the annotations from an individual job.
        AnnotationDataS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 prefix to the annotation files that are referred in the augmented manifest file.
        SourceDocumentsS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 prefix to the source files (PDFs) that are referred to in the augmented manifest file.
        DocumentType:
          $ref: "#/components/schemas/AugmentedManifestsDocumentTypeFormat"
          description: The type of augmented manifest. PlainTextDocument or SemiStructuredDocument. If you don't specify, the default is PlainTextDocument. PLAIN_TEXT_DOCUMENT A document type that represents any unicode text that is encoded in UTF-8. SEMI_STRUCTURED_DOCUMENT A document type with positional and structural context, like a PDF. For training with Amazon Comprehend, only PDFs are supported. For inference, Amazon Comprehend support PDFs, DOCX and TXT.
      required:
        - S3Uri
        - AttributeNames
    Split:
      type: string
      enum:
        - TRAIN
        - TEST
    DocumentClassifierDocumentTypeFormat:
      type: string
      enum:
        - PLAIN_TEXT_DOCUMENT
        - SEMI_STRUCTURED_DOCUMENT
    DocumentClassifierDocuments:
      description: The location of the training documents. This parameter is required in a request to create a semi-structured document classification model.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 URI location of the training documents specified in the S3Uri CSV file.
        TestS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 URI location of the test documents included in the TestS3Uri CSV file. This field is not required if you do not specify a test CSV file.
      required:
        - S3Uri
    DocumentClassifierOutputDataConfig:
      description: Provide the location for output data from a custom classifier job. This field is mandatory if you are training a native document model.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: When you use the OutputDataConfig object while creating a custom classifier, you specify the Amazon S3 location where you want to write the confusion matrix and other output files. The URI must be in the same Region as the API endpoint that you are calling. The location is used as the prefix for the actual location of this output file. When the custom classifier job is finished, the service creates the output file in a directory specific to the job. The S3Uri field contains the location of the output file, called output.tar.gz. It is a compressed archive that contains the confusion matrix.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'ID for the Amazon Web Services Key Management Service (KMS) key that Amazon Comprehend uses to encrypt the output results from an analysis job. The KmsKeyId can be one of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab" KMS Key Alias: "alias/ExampleAlias" ARN of a KMS Key Alias: "arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias"'
        FlywheelStatsS3Prefix:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 prefix for the data lake location of the flywheel statistics.
    KmsKeyId:
      type: string
      maxLength: 2048
      pattern: ^\p{ASCII}+$
    VpcConfig:
      description: Configuration parameters for an optional private Virtual Private Cloud (VPC) containing the resources you are using for the job. For more information, see Amazon VPC.
      type: object
      properties:
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: 'The ID number for a security group on an instance of your private VPC. Security groups on your VPC function serve as a virtual firewall to control inbound and outbound traffic and provides security for the resources that you’ll be accessing on the VPC. This ID number is preceded by "sg-", for instance: "sg-03b388029b0a285ea". For more information, see Security Groups for your VPC.'
        Subnets:
          $ref: "#/components/schemas/Subnets"
          description: 'The ID for each subnet being used in your private VPC. This subnet is a subset of the a range of IPv4 addresses used by the VPC and is specific to a given availability zone in the VPC’s Region. This ID number is preceded by "subnet-", for instance: "subnet-04ccf456919e69055". For more information, see VPCs and Subnets.'
      required:
        - SecurityGroupIds
        - Subnets
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    Subnets:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[-0-9a-zA-Z]+"
    DocumentClassifierMode:
      type: string
      enum:
        - MULTI_CLASS
        - MULTI_LABEL
    Policy:
      type: string
      minLength: 1
      maxLength: 20000
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    CreateDocumentClassifierResponse:
      type: object
      properties:
        DocumentClassifierArn:
          $ref: "#/components/schemas/DocumentClassifierArn"
          description: The Amazon Resource Name (ARN) that identifies the document classifier.
    DocumentClassifierArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:document-classifier/[a-zA-Z0-9](-*[a-zA-Z0-9])*(/version/[a-zA-Z0-9](-*[a-zA-Z0-9])*)?
    ComprehendEndpointName:
      type: string
      maxLength: 40
      pattern: ^[a-zA-Z0-9](-*[a-zA-Z0-9])*$
    ComprehendModelArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:(document-classifier|entity-recognizer)/[a-zA-Z0-9](-*[a-zA-Z0-9])*(/version/[a-zA-Z0-9](-*[a-zA-Z0-9])*)?
    InferenceUnitsInteger:
      type: integer
      minimum: 1
    CreateEndpointResponse:
      type: object
      properties:
        EndpointArn:
          $ref: "#/components/schemas/ComprehendEndpointArn"
          description: The Amazon Resource Number (ARN) of the endpoint being created.
        ModelArn:
          $ref: "#/components/schemas/ComprehendModelArn"
          description: The Amazon Resource Number (ARN) of the model to which the endpoint is attached.
    ComprehendEndpointArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:(document-classifier-endpoint|entity-recognizer-endpoint)/[a-zA-Z0-9](-*[a-zA-Z0-9])*
    EntityRecognizerInputDataConfig:
      description: Specifies the format and location of the input data.
      type: object
      properties:
        DataFormat:
          $ref: "#/components/schemas/EntityRecognizerDataFormat"
          description: "The format of your training data: COMPREHEND_CSV: A CSV file that supplements your training documents. The CSV file contains information about the custom entities that your trained model will detect. The required format of the file depends on whether you are providing annotations or an entity list. If you use this value, you must provide your CSV file by using either the Annotations or EntityList parameters. You must provide your training documents by using the Documents parameter. AUGMENTED_MANIFEST: A labeled dataset that is produced by Amazon SageMaker Ground Truth. This file is in JSON lines format. Each line is a complete JSON object that contains a training document and its labels. Each label annotates a named entity in the training document. If you use this value, you must provide the AugmentedManifests parameter in your request. If you don't specify a value, Amazon Comprehend uses COMPREHEND_CSV as the default."
        EntityTypes:
          $ref: "#/components/schemas/EntityTypesList"
          description: "The entity types in the labeled training data that Amazon Comprehend uses to train the custom entity recognizer. Any entity types that you don't specify are ignored. A maximum of 25 entity types can be used at one time to train an entity recognizer. Entity types must not contain the following invalid characters: \\n (line break), \\\\n (escaped line break), \\r (carriage return), \\\\r (escaped carriage return), \\t (tab), \\\\t (escaped tab), space, and , (comma)."
        Documents:
          $ref: "#/components/schemas/EntityRecognizerDocuments"
          description: The S3 location of the folder that contains the training documents for your custom entity recognizer. This parameter is required if you set DataFormat to COMPREHEND_CSV.
        Annotations:
          $ref: "#/components/schemas/EntityRecognizerAnnotations"
          description: The S3 location of the CSV file that annotates your training documents.
        EntityList:
          $ref: "#/components/schemas/EntityRecognizerEntityList"
          description: The S3 location of the CSV file that has the entity list for your custom entity recognizer.
        AugmentedManifests:
          $ref: "#/components/schemas/EntityRecognizerAugmentedManifestsList"
          description: A list of augmented manifest files that provide training data for your custom model. An augmented manifest file is a labeled dataset that is produced by Amazon SageMaker Ground Truth. This parameter is required if you set DataFormat to AUGMENTED_MANIFEST.
      required:
        - EntityTypes
    EntityRecognizerDataFormat:
      type: string
      enum:
        - COMPREHEND_CSV
        - AUGMENTED_MANIFEST
    EntityTypesList:
      type: array
      items:
        $ref: "#/components/schemas/EntityTypesListItem"
    EntityTypesListItem:
      description: An entity type within a labeled training dataset that Amazon Comprehend uses to train a custom entity recognizer.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EntityTypeName"
          description: "An entity type within a labeled training dataset that Amazon Comprehend uses to train a custom entity recognizer. Entity types must not contain the following invalid characters: \\n (line break), \\\\n (escaped line break, \\r (carriage return), \\\\r (escaped carriage return), \\t (tab), \\\\t (escaped tab), and , (comma)."
      required:
        - Type
    EntityTypeName:
      type: string
      maxLength: 64
      pattern: ^(?![^\n\r\t,]*\\n|\\r|\\t)[^\n\r\t,]+$
    EntityRecognizerDocuments:
      description: Describes the training documents submitted with an entity recognizer.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: Specifies the Amazon S3 location where the training documents for an entity recognizer are located. The URI must be in the same Region as the API endpoint that you are calling.
        TestS3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: Specifies the Amazon S3 location where the test documents for an entity recognizer are located. The URI must be in the same Amazon Web Services Region as the API endpoint that you are calling.
        InputFormat:
          $ref: "#/components/schemas/InputFormat"
          description: Specifies how the text in an input file should be processed. This is optional, and the default is ONE_DOC_PER_LINE. ONE_DOC_PER_FILE - Each file is considered a separate document. Use this option when you are processing large documents, such as newspaper articles or scientific papers. ONE_DOC_PER_LINE - Each line in a file is considered a separate document. Use this option when you are processing many short documents, such as text messages.
      required:
        - S3Uri
    EntityRecognizerAnnotations:
      description: Describes the annotations associated with a entity recognizer.
      type: object
      properties:
        S3Uri:
