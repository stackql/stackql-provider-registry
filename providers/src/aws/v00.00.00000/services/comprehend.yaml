        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: Configuration parameters for a private Virtual Private Cloud (VPC) containing the resources you are using for your document classification job. For more information, see Amazon VPC.
        FlywheelArn:
          $ref: "#/components/schemas/ComprehendFlywheelArn"
          description: The Amazon Resource Number (ARN) of the flywheel
    ComprehendArn:
      type: string
      maxLength: 256
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:[a-zA-Z0-9-]{1,64}/[a-zA-Z0-9](-*[a-zA-Z0-9])*((/dataset/[a-zA-Z0-9](-*[a-zA-Z0-9])*)|(/version/[a-zA-Z0-9](-*[a-zA-Z0-9])*))?
    JobName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    JobStatus:
      type: string
      enum:
        - SUBMITTED
        - IN_PROGRESS
        - COMPLETED
        - FAILED
        - STOP_REQUESTED
        - STOPPED
    InputDataConfig:
      description: The input properties for an inference job. The document reader config field applies only to non-text inputs for custom analysis.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI for the input data. The URI must be in same Region as the API endpoint that you are calling. The URI can point to a single input file or it can provide the prefix for a collection of data files. For example, if you use the URI S3://bucketName/prefix, if the prefix is a single file, Amazon Comprehend uses that file as input. If more than one file begins with the prefix, Amazon Comprehend uses all of them as input.
        InputFormat:
          $ref: "#/components/schemas/InputFormat"
          description: "Specifies how the text in an input file should be processed: ONE_DOC_PER_FILE - Each file is considered a separate document. Use this option when you are processing large documents, such as newspaper articles or scientific papers. ONE_DOC_PER_LINE - Each line in a file is considered a separate document. Use this option when you are processing many short documents, such as text messages."
        DocumentReaderConfig:
          $ref: "#/components/schemas/DocumentReaderConfig"
          description: Provides configuration parameters to override the default actions for extracting text from PDF documents and image files.
      required:
        - S3Uri
    OutputDataConfig:
      description: Provides configuration parameters for the output of inference jobs.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: When you use the OutputDataConfig object with asynchronous operations, you specify the Amazon S3 location where you want to write the output data. The URI must be in the same Region as the API endpoint that you are calling. The location is used as the prefix for the actual location of the output file. When the topic detection job is finished, the service creates an output file in a directory specific to the job. The S3Uri field contains the location of the output file, called output.tar.gz. It is a compressed archive that contains the ouput of the operation. For a PII entity detection job, the output file is plain text, not a compressed archive. The output file name is the same as the input file, with .out appended at the end.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'ID for the Amazon Web Services Key Management Service (KMS) key that Amazon Comprehend uses to encrypt the output results from an analysis job. Specify the Key Id of a symmetric key, because you cannot use an asymmetric key for uploading data to S3. The KmsKeyId can be one of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab" KMS Key Alias: "alias/ExampleAlias" ARN of a KMS Key Alias: "arn:aws:kms:us-west-2:111122223333:alias/ExampleAlias"'
      required:
        - S3Uri
    DescribeDocumentClassifierResponse:
      type: object
      properties:
        DocumentClassifierProperties:
          $ref: "#/components/schemas/DocumentClassifierProperties"
          description: An object that contains the properties associated with a document classifier.
    DocumentClassifierProperties:
      description: Provides information about a document classifier.
      type: object
      properties:
        DocumentClassifierArn:
          $ref: "#/components/schemas/DocumentClassifierArn"
          description: The Amazon Resource Name (ARN) that identifies the document classifier.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code for the language of the documents that the classifier was trained on.
        Status:
          $ref: "#/components/schemas/ModelStatus"
          description: The status of the document classifier. If the status is TRAINED the classifier is ready to use. If the status is TRAINED_WITH_WARNINGS the classifier training succeeded, but you should review the warnings returned in the CreateDocumentClassifier response. If the status is FAILED you can see additional information about why the classifier wasn't trained in the Message field.
        Message:
          $ref: "#/components/schemas/AnyLengthString"
          description: Additional information about the status of the classifier.
        SubmitTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the document classifier was submitted for training.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that training the document classifier completed.
        TrainingStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: Indicates the time when the training starts on documentation classifiers. You are billed for the time interval between this time and the value of TrainingEndTime.
        TrainingEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that training of the document classifier was completed. Indicates the time when the training completes on documentation classifiers. You are billed for the time interval between this time and the value of TrainingStartTime.
        InputDataConfig:
          $ref: "#/components/schemas/DocumentClassifierInputDataConfig"
          description: The input data configuration that you supplied when you created the document classifier for training.
        OutputDataConfig:
          $ref: "#/components/schemas/DocumentClassifierOutputDataConfig"
          description: Provides output results configuration parameters for custom classifier jobs.
        ClassifierMetadata:
          $ref: "#/components/schemas/ClassifierMetadata"
          description: Information about the document classifier, including the number of documents used for training the classifier, the number of documents used for test the classifier, and an accuracy rating.
        DataAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that grants Amazon Comprehend read access to your input data.
        VolumeKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'ID for the Amazon Web Services Key Management Service (KMS) key that Amazon Comprehend uses to encrypt data on the storage volume attached to the ML compute instance(s) that process the analysis job. The VolumeKmsKeyId can be either of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
        VpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: Configuration parameters for a private Virtual Private Cloud (VPC) containing the resources you are using for your custom classifier. For more information, see Amazon VPC.
        Mode:
          $ref: "#/components/schemas/DocumentClassifierMode"
          description: Indicates the mode in which the specific classifier was trained. This also indicates the format of input documents and the format of the confusion matrix. Each classifier can only be trained in one mode and this cannot be changed once the classifier is trained.
        ModelKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: 'ID for the KMS key that Amazon Comprehend uses to encrypt trained custom models. The ModelKmsKeyId can be either of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
        VersionName:
          $ref: "#/components/schemas/VersionName"
          description: The version name that you assigned to the document classifier.
        SourceModelArn:
          $ref: "#/components/schemas/DocumentClassifierArn"
          description: The Amazon Resource Name (ARN) of the source model. This model was imported from a different Amazon Web Services account to create the document classifier model in your Amazon Web Services account.
        FlywheelArn:
          $ref: "#/components/schemas/ComprehendFlywheelArn"
          description: The Amazon Resource Number (ARN) of the flywheel
    ModelStatus:
      type: string
      enum:
        - SUBMITTED
        - TRAINING
        - DELETING
        - STOP_REQUESTED
        - STOPPED
        - IN_ERROR
        - TRAINED
        - TRAINED_WITH_WARNING
    ClassifierMetadata:
      description: Provides information about a document classifier.
      type: object
      properties:
        NumberOfLabels:
          $ref: "#/components/schemas/Integer"
          description: The number of labels in the input data.
        NumberOfTrainedDocuments:
          $ref: "#/components/schemas/Integer"
          description: The number of documents in the input data that were used to train the classifier. Typically this is 80 to 90 percent of the input documents.
        NumberOfTestDocuments:
          $ref: "#/components/schemas/Integer"
          description: The number of documents in the input data that were used to test the classifier. Typically this is 10 to 20 percent of the input documents, up to 10,000 documents.
        EvaluationMetrics:
          $ref: "#/components/schemas/ClassifierEvaluationMetrics"
          description: Describes the result metrics for the test data associated with an documentation classifier.
    ClassifierEvaluationMetrics:
      description: Describes the result metrics for the test data associated with an documentation classifier.
      type: object
      properties:
        Accuracy:
          $ref: "#/components/schemas/Double"
          description: The fraction of the labels that were correct recognized. It is computed by dividing the number of labels in the test documents that were correctly recognized by the total number of labels in the test documents.
        Precision:
          $ref: "#/components/schemas/Double"
          description: A measure of the usefulness of the classifier results in the test data. High precision means that the classifier returned substantially more relevant results than irrelevant ones.
        Recall:
          $ref: "#/components/schemas/Double"
          description: A measure of how complete the classifier results are for the test data. High recall means that the classifier returned most of the relevant results.
        F1Score:
          $ref: "#/components/schemas/Double"
          description: A measure of how accurate the classifier results are for the test data. It is derived from the Precision and Recall values. The F1Score is the harmonic average of the two scores. The highest score is 1, and the worst score is 0.
        MicroPrecision:
          $ref: "#/components/schemas/Double"
          description: A measure of the usefulness of the recognizer results in the test data. High precision means that the recognizer returned substantially more relevant results than irrelevant ones. Unlike the Precision metric which comes from averaging the precision of all available labels, this is based on the overall score of all precision scores added together.
        MicroRecall:
          $ref: "#/components/schemas/Double"
          description: A measure of how complete the classifier results are for the test data. High recall means that the classifier returned most of the relevant results. Specifically, this indicates how many of the correct categories in the text that the model can predict. It is a percentage of correct categories in the text that can found. Instead of averaging the recall scores of all labels (as with Recall), micro Recall is based on the overall score of all recall scores added together.
        MicroF1Score:
          $ref: "#/components/schemas/Double"
          description: A measure of how accurate the classifier results are for the test data. It is a combination of the Micro Precision and Micro Recall values. The Micro F1Score is the harmonic mean of the two scores. The highest score is 1, and the worst score is 0.
        HammingLoss:
          $ref: "#/components/schemas/Double"
          description: Indicates the fraction of labels that are incorrectly predicted. Also seen as the fraction of wrong labels compared to the total number of labels. Scores closer to zero are better.
    Double:
      type: number
      format: double
