openapi: 3.0.0
info:
  version: "2017-11-27"
  title: Amazon Comprehend
  description: Amazon Comprehend
  x-serviceName: comprehend
  x-serviceAlias: comprehend
  x-protocol: json
  x-apiVersion: "2017-11-27"
  x-endpointPrefix: comprehend
  x-targetPrefix: Comprehend_20171127
  x-jsonVersion: "1.1"
servers:
  - url: https://comprehend.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for comprehend
paths:
  /BatchDetectDominantLanguage:
    post:
      operationId: BatchDetectDominantLanguage
      description: Determines the dominant language of the input text for a batch of documents. For a list of languages that Amazon Comprehend can detect, see Amazon Comprehend Supported Languages.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.BatchDetectDominantLanguage
            default: Comprehend_20171127.BatchDetectDominantLanguage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TextList:
                  $ref: "#/components/schemas/CustomerInputStringList"
                  description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. Each document should contain at least 20 characters. The maximum size of each document is 5 KB.
              required:
                - TextList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetectDominantLanguageResponse"
  /BatchDetectEntities:
    post:
      operationId: BatchDetectEntities
      description: Inspects the text of a batch of documents for named entities and returns information about them. For more information about named entities, see Entities in the Comprehend Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.BatchDetectEntities
            default: Comprehend_20171127.BatchDetectEntities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TextList:
                  $ref: "#/components/schemas/CustomerInputStringList"
                  description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. The maximum size of each document is 5 KB.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. You can specify any of the primary languages supported by Amazon Comprehend. All documents must be in the same language.
              required:
                - TextList
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetectEntitiesResponse"
  /BatchDetectKeyPhrases:
    post:
      operationId: BatchDetectKeyPhrases
      description: Detects the key noun phrases found in a batch of documents.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.BatchDetectKeyPhrases
            default: Comprehend_20171127.BatchDetectKeyPhrases
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TextList:
                  $ref: "#/components/schemas/CustomerInputStringList"
                  description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. The maximum size of each document is 5 KB.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. You can specify any of the primary languages supported by Amazon Comprehend. All documents must be in the same language.
              required:
                - TextList
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetectKeyPhrasesResponse"
  /BatchDetectSentiment:
    post:
      operationId: BatchDetectSentiment
      description: Inspects a batch of documents and returns an inference of the prevailing sentiment, POSITIVE, NEUTRAL, MIXED, or NEGATIVE, in each one.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.BatchDetectSentiment
            default: Comprehend_20171127.BatchDetectSentiment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TextList:
                  $ref: "#/components/schemas/CustomerInputStringList"
                  description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. The maximum size of each document is 5 KB.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. You can specify any of the primary languages supported by Amazon Comprehend. All documents must be in the same language.
              required:
                - TextList
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetectSentimentResponse"
  /BatchDetectSyntax:
    post:
      operationId: BatchDetectSyntax
      description: Inspects the text of a batch of documents for the syntax and part of speech of the words in the document and returns information about them. For more information, see Syntax in the Comprehend Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.BatchDetectSyntax
            default: Comprehend_20171127.BatchDetectSyntax
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TextList:
                  $ref: "#/components/schemas/CustomerInputStringList"
                  description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. The maximum size for each document is 5 KB.
                LanguageCode:
                  $ref: "#/components/schemas/SyntaxLanguageCode"
                  description: 'The language of the input documents. You can specify any of the following languages supported by Amazon Comprehend: German ("de"), English ("en"), Spanish ("es"), French ("fr"), Italian ("it"), or Portuguese ("pt"). All documents must be in the same language.'
              required:
                - TextList
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetectSyntaxResponse"
  /BatchDetectTargetedSentiment:
    post:
      operationId: BatchDetectTargetedSentiment
      description: Inspects a batch of documents and returns a sentiment analysis for each entity identified in the documents. For more information about targeted sentiment, see Targeted sentiment in the Amazon Comprehend Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.BatchDetectTargetedSentiment
            default: Comprehend_20171127.BatchDetectTargetedSentiment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TextList:
                  $ref: "#/components/schemas/CustomerInputStringList"
                  description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. The maximum size of each document is 5 KB.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. Currently, English is the only supported language.
              required:
                - TextList
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetectTargetedSentimentResponse"
  /ClassifyDocument:
    post:
      operationId: ClassifyDocument
      description: "Creates a classification request to analyze a single document in real-time. ClassifyDocument supports the following model types: Custom classifier - a custom model that you have created and trained. For input, you can provide plain text, a single-page document (PDF, Word, or image), or Amazon Textract API output. For more information, see Custom classification in the Amazon Comprehend Developer Guide. Prompt safety classifier - Amazon Comprehend provides a pre-trained model for classifying input prompts for generative AI applications. For input, you provide English plain text input. For prompt safety classification, the response includes only the Classes field. For more information about prompt safety classifiers, see Prompt safety classification in the Amazon Comprehend Developer Guide. If the system detects errors while processing a page in the input document, the API response includes an Errors field that describes the errors. If the system detects a document-level error in your input document, the API returns an InvalidRequestException error response. For details about this exception, see Errors in semi-structured documents in the Comprehend Developer Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.ClassifyDocument
            default: Comprehend_20171127.ClassifyDocument
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Text:
                  $ref: "#/components/schemas/CustomerInputString"
                  description: The document text to be analyzed. If you enter text using this parameter, do not use the Bytes parameter.
                EndpointArn:
                  $ref: "#/components/schemas/DocumentClassifierEndpointArn"
                  description: The Amazon Resource Number (ARN) of the endpoint. For prompt safety classification, Amazon Comprehend provides the endpoint ARN. For more information about prompt safety classifiers, see Prompt safety classification in the Amazon Comprehend Developer Guide For custom classification, you create an endpoint for your custom model. For more information, see Using Amazon Comprehend endpoints.
                Bytes:
                  $ref: "#/components/schemas/SemiStructuredDocumentBlob"
                  description: Use the Bytes parameter to input a text, PDF, Word or image file. When you classify a document using a custom model, you can also use the Bytes parameter to input an Amazon Textract DetectDocumentText or AnalyzeDocument output file. To classify a document using the prompt safety classifier, use the Text parameter for input. Provide the input document as a sequence of base64-encoded bytes. If your code uses an Amazon Web Services SDK to classify documents, the SDK may encode the document file bytes for you. The maximum length of this field depends on the input document type. For details, see Inputs for real-time custom analysis in the Comprehend Developer Guide. If you use the Bytes parameter, do not use the Text parameter.
                DocumentReaderConfig:
                  $ref: "#/components/schemas/DocumentReaderConfig"
                  description: Provides configuration parameters to override the default actions for extracting text from PDF documents and image files.
              required:
                - EndpointArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyDocumentResponse"
  /ContainsPiiEntities:
    post:
      operationId: ContainsPiiEntities
      description: Analyzes input text for the presence of personally identifiable information (PII) and returns the labels of identified PII entity types such as name, address, bank account number, or phone number.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.ContainsPiiEntities
            default: Comprehend_20171127.ContainsPiiEntities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Text:
                  $ref: "#/components/schemas/String"
                  description: A UTF-8 text string. The maximum string size is 100 KB.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents.
              required:
                - Text
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainsPiiEntitiesResponse"
  /CreateDataset:
    post:
      operationId: CreateDataset
      description: Creates a dataset to upload training or test data for a model associated with a flywheel. For more information about datasets, see Flywheel overview in the Amazon Comprehend Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.CreateDataset
            default: Comprehend_20171127.CreateDataset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FlywheelArn:
                  $ref: "#/components/schemas/ComprehendFlywheelArn"
                  description: The Amazon Resource Number (ARN) of the flywheel of the flywheel to receive the data.
                DatasetName:
                  $ref: "#/components/schemas/ComprehendArnName"
                  description: Name of the dataset.
                DatasetType:
                  $ref: "#/components/schemas/DatasetType"
                  description: The dataset type. You can specify that the data in a dataset is for training the model or for testing the model.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: Description of the dataset.
                InputDataConfig:
                  $ref: "#/components/schemas/DatasetInputDataConfig"
                  description: Information about the input data configuration. The type of input data varies based on the format of the input and whether the data is for a classifier model or an entity recognition model.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                  description: A unique identifier for the request. If you don't set the client request token, Amazon Comprehend generates one.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags for the dataset.
              required:
                - FlywheelArn
                - DatasetName
                - InputDataConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetResponse"
  /CreateDocumentClassifier:
    post:
      operationId: CreateDocumentClassifier
      description: Creates a new document classifier that you can use to categorize documents. To create a classifier, you provide a set of training documents that are labeled with the categories that you want to use. For more information, see Training classifier models in the Comprehend Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.CreateDocumentClassifier
            default: Comprehend_20171127.CreateDocumentClassifier
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DocumentClassifierName:
                  $ref: "#/components/schemas/ComprehendArnName"
                  description: The name of the document classifier.
                VersionName:
                  $ref: "#/components/schemas/VersionName"
                  description: The version name given to the newly created classifier. Version names can have a maximum of 256 characters. Alphanumeric characters, hyphens (-) and underscores (_) are allowed. The version name must be unique among all models with the same classifier name in the Amazon Web Services account/Amazon Web Services Region.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that grants Amazon Comprehend read access to your input data.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to associate with the document classifier. A tag is a key-value pair that adds as a metadata to a resource used by Amazon Comprehend. For example, a tag with "Sales" as the key might be added to a resource to indicate its use by the sales department.
                InputDataConfig:
                  $ref: "#/components/schemas/DocumentClassifierInputDataConfig"
                  description: Specifies the format and location of the input data for the job.
                OutputDataConfig:
                  $ref: "#/components/schemas/DocumentClassifierOutputDataConfig"
                  description: Specifies the location for the output files from a custom classifier job. This parameter is required for a request that creates a native document model.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                  description: A unique identifier for the request. If you don't set the client request token, Amazon Comprehend generates one.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language of the input documents. You can specify any of the languages supported by Amazon Comprehend. All documents must be in the same language.
                VolumeKmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: 'ID for the Amazon Web Services Key Management Service (KMS) key that Amazon Comprehend uses to encrypt data on the storage volume attached to the ML compute instance(s) that process the analysis job. The VolumeKmsKeyId can be either of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: Configuration parameters for an optional private Virtual Private Cloud (VPC) containing the resources you are using for your custom classifier. For more information, see Amazon VPC.
                Mode:
                  $ref: "#/components/schemas/DocumentClassifierMode"
                  description: Indicates the mode in which the classifier will be trained. The classifier can be trained in multi-class (single-label) mode or multi-label mode. Multi-class mode identifies a single class label for each document and multi-label mode identifies one or more class labels for each document. Multiple labels for an individual document are separated by a delimiter. The default delimiter between labels is a pipe (|).
                ModelKmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: 'ID for the KMS key that Amazon Comprehend uses to encrypt trained custom models. The ModelKmsKeyId can be either of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
                ModelPolicy:
                  $ref: "#/components/schemas/Policy"
                  description: "The resource-based policy to attach to your custom document classifier model. You can use this policy to allow another Amazon Web Services account to import your custom model. Provide your policy as a JSON body that you enter as a UTF-8 encoded string without line breaks. To provide valid JSON, enclose the attribute names and values in double quotes. If the JSON body is also enclosed in double quotes, then you must escape the double quotes that are inside the policy: \"{\\\"attribute\\\": \\\"value\\\", \\\"attribute\\\": [\\\"value\\\"]}\" To avoid escaping quotes, you can use single quotes to enclose the policy and double quotes to enclose the JSON names and values: '{\"attribute\": \"value\", \"attribute\": [\"value\"]}'"
              required:
                - DocumentClassifierName
                - DataAccessRoleArn
                - InputDataConfig
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDocumentClassifierResponse"
  /CreateEndpoint:
    post:
      operationId: CreateEndpoint
      description: Creates a model-specific endpoint for synchronous inference for a previously trained custom model For information about endpoints, see Managing endpoints.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.CreateEndpoint
            default: Comprehend_20171127.CreateEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointName:
                  $ref: "#/components/schemas/ComprehendEndpointName"
                  description: This is the descriptive suffix that becomes part of the EndpointArn used for all subsequent requests to this resource.
                ModelArn:
                  $ref: "#/components/schemas/ComprehendModelArn"
                  description: The Amazon Resource Number (ARN) of the model to which the endpoint will be attached.
                DesiredInferenceUnits:
                  $ref: "#/components/schemas/InferenceUnitsInteger"
                  description: The desired number of inference units to be used by the model using this endpoint. Each inference unit represents of a throughput of 100 characters per second.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                  description: An idempotency token provided by the customer. If this token matches a previous endpoint creation request, Amazon Comprehend will not return a ResourceInUseException.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to associate with the endpoint. A tag is a key-value pair that adds metadata to the endpoint. For example, a tag with "Sales" as the key might be added to an endpoint to indicate its use by the sales department.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that grants Amazon Comprehend read access to trained custom models encrypted with a customer managed key (ModelKmsKeyId).
                FlywheelArn:
                  $ref: "#/components/schemas/ComprehendFlywheelArn"
                  description: The Amazon Resource Number (ARN) of the flywheel to which the endpoint will be attached.
              required:
                - EndpointName
                - DesiredInferenceUnits
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEndpointResponse"
  /CreateEntityRecognizer:
    post:
      operationId: CreateEntityRecognizer
      description: Creates an entity recognizer using submitted files. After your CreateEntityRecognizer request is submitted, you can check job status using the DescribeEntityRecognizer API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.CreateEntityRecognizer
            default: Comprehend_20171127.CreateEntityRecognizer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RecognizerName:
                  $ref: "#/components/schemas/ComprehendArnName"
                  description: The name given to the newly created recognizer. Recognizer names can be a maximum of 256 characters. Alphanumeric characters, hyphens (-) and underscores (_) are allowed. The name must be unique in the account/Region.
                VersionName:
                  $ref: "#/components/schemas/VersionName"
                  description: The version name given to the newly created recognizer. Version names can be a maximum of 256 characters. Alphanumeric characters, hyphens (-) and underscores (_) are allowed. The version name must be unique among all models with the same recognizer name in the account/Region.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The Amazon Resource Name (ARN) of the IAM role that grants Amazon Comprehend read access to your input data.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to associate with the entity recognizer. A tag is a key-value pair that adds as a metadata to a resource used by Amazon Comprehend. For example, a tag with "Sales" as the key might be added to a resource to indicate its use by the sales department.
                InputDataConfig:
                  $ref: "#/components/schemas/EntityRecognizerInputDataConfig"
                  description: Specifies the format and location of the input data. The S3 bucket containing the input data must be located in the same Region as the entity recognizer being created.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestTokenString"
                  description: A unique identifier for the request. If you don't set the client request token, Amazon Comprehend generates one.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: 'You can specify any of the following languages: English ("en"), Spanish ("es"), French ("fr"), Italian ("it"), German ("de"), or Portuguese ("pt"). If you plan to use this entity recognizer with PDF, Word, or image input files, you must specify English as the language. All training documents must be in the same language.'
                VolumeKmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: 'ID for the Amazon Web Services Key Management Service (KMS) key that Amazon Comprehend uses to encrypt data on the storage volume attached to the ML compute instance(s) that process the analysis job. The VolumeKmsKeyId can be either of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfig"
                  description: Configuration parameters for an optional private Virtual Private Cloud (VPC) containing the resources you are using for your custom entity recognizer. For more information, see Amazon VPC.
                ModelKmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: 'ID for the KMS key that Amazon Comprehend uses to encrypt trained custom models. The ModelKmsKeyId can be either of the following formats: KMS Key ID: "1234abcd-12ab-34cd-56ef-1234567890ab" Amazon Resource Name (ARN) of a KMS Key: "arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab"'
                ModelPolicy:
                  $ref: "#/components/schemas/Policy"
                  description: "The JSON resource-based policy to attach to your custom entity recognizer model. You can use this policy to allow another Amazon Web Services account to import your custom model. Provide your JSON as a UTF-8 encoded string without line breaks. To provide valid JSON for your policy, enclose the attribute names and values in double quotes. If the JSON body is also enclosed in double quotes, then you must escape the double quotes that are inside the policy: \"{\\\"attribute\\\": \\\"value\\\", \\\"attribute\\\": [\\\"value\\\"]}\" To avoid escaping quotes, you can use single quotes to enclose the policy and double quotes to enclose the JSON names and values: '{\"attribute\": \"value\", \"attribute\": [\"value\"]}'"
              required:
                - RecognizerName
                - DataAccessRoleArn
                - InputDataConfig
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEntityRecognizerResponse"
  /CreateFlywheel:
    post:
      operationId: CreateFlywheel
      description: A flywheel is an Amazon Web Services resource that orchestrates the ongoing training of a model for custom classification or custom entity recognition. You can create a flywheel to start with an existing trained model, or Comprehend can create and train a new model. When you create the flywheel, Comprehend creates a data lake in your account. The data lake holds the training data and test data for all versions of the model. To use a flywheel with an existing trained model, you specify the active model version. Comprehend copies the model's training data and test data into the flywheel's data lake. To use the flywheel with a new model, you need to provide a dataset for training data (and optional test data) when you create the flywheel. For more information about flywheels, see Flywheel overview in the Amazon Comprehend Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Comprehend_20171127.CreateFlywheel
            default: Comprehend_20171127.CreateFlywheel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FlywheelName:
                  $ref: "#/components/schemas/ComprehendArnName"
                  description: Name for the flywheel.
                ActiveModelArn:
                  $ref: "#/components/schemas/ComprehendModelArn"
                  description: To associate an existing model with the flywheel, specify the Amazon Resource Number (ARN) of the model version. Do not set TaskConfig or ModelType if you specify an ActiveModelArn.
