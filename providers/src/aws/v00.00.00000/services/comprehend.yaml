      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:entity-recognizer-endpoint/[a-zA-Z0-9](-*[a-zA-Z0-9])*
    DetectEntitiesResponse:
      type: object
      properties:
        Entities:
          $ref: "#/components/schemas/ListOfEntities"
          description: A collection of entities identified in the input text. For each entity, the response provides the entity text, entity type, where the entity text begins and ends, and the level of confidence that Amazon Comprehend has in the detection. If your request uses a custom entity recognition model, Amazon Comprehend detects the entities that the model is trained to recognize. Otherwise, it detects the default entity types. For a list of default entity types, see Entities in the Comprehend Developer Guide.
        DocumentMetadata:
          $ref: "#/components/schemas/DocumentMetadata"
          description: Information about the document, discovered during text extraction. This field is present in the response only if your request used the Byte parameter.
        DocumentType:
          $ref: "#/components/schemas/ListOfDocumentType"
          description: The document type for each page in the input document. This field is present in the response only if your request used the Byte parameter.
        Blocks:
          $ref: "#/components/schemas/ListOfBlocks"
          description: Information about each block of text in the input document. Blocks are nested. A page block contains a block for each line of text, which contains a block for each word. The Block content for a Word input document does not include a Geometry field. The Block field is not present in the response for plain-text inputs.
        Errors:
          $ref: "#/components/schemas/ListOfErrors"
          description: Page-level errors that the system detected while processing the input document. The field is empty if the system encountered no errors.
