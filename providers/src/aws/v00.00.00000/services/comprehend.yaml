      description: Information about each word or line of text in the input document. For additional information, see Block in the Amazon Textract API reference.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/String"
          description: Unique identifier for the block.
        BlockType:
          $ref: "#/components/schemas/BlockType"
          description: The block represents a line of text or one word of text. WORD - A word that's detected on a document page. A word is one or more ISO basic Latin script characters that aren't separated by spaces. LINE - A string of tab-delimited, contiguous words that are detected on a document page
        Text:
          $ref: "#/components/schemas/String"
          description: The word or line of text extracted from the block.
        Page:
          $ref: "#/components/schemas/Integer"
          description: Page number where the block appears.
        Geometry:
          $ref: "#/components/schemas/Geometry"
          description: Co-ordinates of the rectangle or polygon that contains the text.
        Relationships:
          $ref: "#/components/schemas/ListOfRelationships"
          description: A list of child blocks of the current block. For example, a LINE object has child blocks for each WORD block that's part of the line of text.
    BlockType:
      type: string
      enum:
        - LINE
        - WORD
    Geometry:
      description: Information about the location of items on a document page. For additional information, see Geometry in the Amazon Textract API reference.
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: An axis-aligned coarse representation of the location of the recognized item on the document page.
        Polygon:
          $ref: "#/components/schemas/Polygon"
          description: Within the bounding box, a fine-grained polygon around the recognized item.
    BoundingBox:
      description: The bounding box around the detected page or around an element on a document page. The left (x-coordinate) and top (y-coordinate) are coordinates that represent the top and left sides of the bounding box. Note that the upper-left corner of the image is the origin (0,0). For additional information, see BoundingBox in the Amazon Textract API reference.
      type: object
      properties:
        Height:
          $ref: "#/components/schemas/Float"
          description: The height of the bounding box as a ratio of the overall document page height.
        Left:
          $ref: "#/components/schemas/Float"
          description: The left coordinate of the bounding box as a ratio of overall document page width.
        Top:
          $ref: "#/components/schemas/Float"
          description: The top coordinate of the bounding box as a ratio of overall document page height.
        Width:
          $ref: "#/components/schemas/Float"
          description: The width of the bounding box as a ratio of the overall document page width.
    Polygon:
      type: array
      items:
        $ref: "#/components/schemas/Point"
