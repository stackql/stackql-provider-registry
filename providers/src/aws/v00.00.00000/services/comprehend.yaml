      type: object
      properties:
        LanguageCode:
          $ref: "#/components/schemas/String"
          description: The RFC 5646 language code for the dominant language. For more information about RFC 5646, see Tags for Identifying Languages on the IETF Tools web site.
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of the detection.
    String:
      type: string
      minLength: 1
    Float:
      type: number
      format: float
    BatchItemErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchItemError"
    BatchItemError:
      description: Describes an error that occurred while processing a document in a batch. The operation returns on BatchItemError object for each document that contained an error.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
          description: The zero-based index of the document in the input list.
        ErrorCode:
          $ref: "#/components/schemas/String"
          description: The numeric error code of the error.
        ErrorMessage:
          $ref: "#/components/schemas/String"
          description: A text description of the error.
    LanguageCode:
      type: string
      enum:
        - en
        - es
        - fr
        - de
        - it
        - pt
        - ar
        - hi
        - ja
        - ko
        - zh
        - zh-TW
    BatchDetectEntitiesResponse:
      type: object
      properties:
        ResultList:
          $ref: "#/components/schemas/ListOfDetectEntitiesResult"
          description: A list of objects containing the results of the operation. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If all of the documents contain an error, the ResultList is empty.
        ErrorList:
          $ref: "#/components/schemas/BatchItemErrorList"
          description: A list containing one object for each document that contained an error. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If there are no errors in the batch, the ErrorList is empty.
      required:
        - ResultList
        - ErrorList
    ListOfDetectEntitiesResult:
      type: array
      items:
        $ref: "#/components/schemas/BatchDetectEntitiesItemResult"
    BatchDetectEntitiesItemResult:
      description: The result of calling the operation. The operation returns one object for each document that is successfully processed by the operation.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
          description: The zero-based index of the document in the input list.
        Entities:
          $ref: "#/components/schemas/ListOfEntities"
          description: One or more Entity objects, one for each entity detected in the document.
    ListOfEntities:
      type: array
      items:
        $ref: "#/components/schemas/Entity"
    Entity:
      description: Provides information about an entity.
      type: object
      properties:
        Score:
          $ref: "#/components/schemas/Float"
          description: The level of confidence that Amazon Comprehend has in the accuracy of the detection.
        Type:
          $ref: "#/components/schemas/EntityType"
          description: The entity type. For entity detection using the built-in model, this field contains one of the standard entity types listed below. For custom entity detection, this field contains one of the entity types that you specified when you trained your custom model.
        Text:
          $ref: "#/components/schemas/String"
          description: The text of the entity.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based offset from the beginning of the source text to the first character in the entity. This field is empty for non-text input.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: The zero-based offset from the beginning of the source text to the last character in the entity. This field is empty for non-text input.
        BlockReferences:
          $ref: "#/components/schemas/ListOfBlockReferences"
          description: A reference to each block for this entity. This field is empty for plain-text input.
    EntityType:
      type: string
      enum:
        - PERSON
        - LOCATION
        - ORGANIZATION
        - COMMERCIAL_ITEM
        - EVENT
        - DATE
        - QUANTITY
        - TITLE
        - OTHER
    ListOfBlockReferences:
      type: array
      items:
        $ref: "#/components/schemas/BlockReference"
    BlockReference:
      description: A reference to a block.
      type: object
      properties:
        BlockId:
          $ref: "#/components/schemas/String"
          description: Unique identifier for the block.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: Offset of the start of the block within its parent block.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: Offset of the end of the block within its parent block.
        ChildBlocks:
          $ref: "#/components/schemas/ListOfChildBlocks"
          description: List of child blocks within this block.
    ListOfChildBlocks:
      type: array
      items:
        $ref: "#/components/schemas/ChildBlock"
    ChildBlock:
      description: Nested block contained within a block.
      type: object
      properties:
        ChildBlockId:
          $ref: "#/components/schemas/String"
          description: Unique identifier for the child block.
        BeginOffset:
          $ref: "#/components/schemas/Integer"
          description: Offset of the start of the child block within its parent block.
        EndOffset:
          $ref: "#/components/schemas/Integer"
          description: Offset of the end of the child block within its parent block.
    BatchDetectKeyPhrasesResponse:
      type: object
      properties:
        ResultList:
          $ref: "#/components/schemas/ListOfDetectKeyPhrasesResult"
          description: A list of objects containing the results of the operation. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If all of the documents contain an error, the ResultList is empty.
        ErrorList:
          $ref: "#/components/schemas/BatchItemErrorList"
          description: A list containing one object for each document that contained an error. The results are sorted in ascending order by the Index field and match the order of the documents in the input list. If there are no errors in the batch, the ErrorList is empty.
      required:
        - ResultList
        - ErrorList
    ListOfDetectKeyPhrasesResult:
      type: array
      items:
        $ref: "#/components/schemas/BatchDetectKeyPhrasesItemResult"
    BatchDetectKeyPhrasesItemResult:
      description: The result of calling the operation. The operation returns one object for each document that is successfully processed by the operation.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/Integer"
