openapi: 3.0.0
info:
  version: "2020-11-02"
  title: AWS Route53 Recovery Control Config
  description: AWS Route53 Recovery Control Config
  x-serviceName: route53-recovery-control-config
  x-serviceAlias: route53_recovery_control_config
  x-protocol: rest-json
  x-apiVersion: "2020-11-02"
  x-endpointPrefix: route53-recovery-control-config
  x-jsonVersion: "1.1"
servers:
  - url: https://route53-recovery-control-config.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for route53-recovery-control-config
paths:
  /cluster:
    post:
      operationId: CreateCluster
      description: Create a new cluster. A cluster is a set of redundant Regional endpoints against which you can run API calls to update or get the state of one or more routing controls. Each cluster has a name, status, Amazon Resource Name (ARN), and an array of the five cluster endpoints (one for each supported Amazon Web Services Region) that you can use with API calls to the cluster data plane.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
                ClusterName:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
                Tags:
                  $ref: "#/components/schemas/__mapOf__stringMin0Max256PatternS"
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
              required:
                - ClusterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
    get:
      operationId: ListClusters
      description: Returns an array of all the clusters in an account.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersResponse"
    put:
      operationId: UpdateCluster
      description: Updates an existing cluster. You can only update the network type of a cluster.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClusterArn:
                  $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
                NetworkType:
                  $ref: "#/components/schemas/NetworkType"
              required:
                - ClusterArn
                - NetworkType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClusterResponse"
  /controlpanel:
    post:
      operationId: CreateControlPanel
      description: Creates a new control panel. A control panel represents a group of routing controls that can be changed together in a single transaction. You can use a control panel to centrally view the operational status of applications across your organization, and trigger multi-app failovers in a single transaction, for example, to fail over an Availability Zone or Amazon Web Services Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
                ClusterArn:
                  $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
                ControlPanelName:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
                Tags:
                  $ref: "#/components/schemas/__mapOf__stringMin0Max256PatternS"
              required:
                - ClusterArn
                - ControlPanelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateControlPanelResponse"
    put:
      operationId: UpdateControlPanel
      description: Updates a control panel. The only update you can make to a control panel is to change the name of the control panel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ControlPanelArn:
                  $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
                ControlPanelName:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
              required:
                - ControlPanelArn
                - ControlPanelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateControlPanelResponse"
  /routingcontrol:
    post:
      operationId: CreateRoutingControl
      description: "Creates a new routing control. A routing control has one of two states: ON and OFF. You can map the routing control state to the state of an Amazon Route 53 health check, which can be used to control traffic routing. To get or update the routing control state, see the Recovery Cluster (data plane) API actions for Amazon Route 53 Application Recovery Controller."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
                ClusterArn:
                  $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
                ControlPanelArn:
                  $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
                RoutingControlName:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
              required:
                - ClusterArn
                - RoutingControlName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRoutingControlResponse"
    put:
      operationId: UpdateRoutingControl
      description: Updates a routing control. You can only update the name of the routing control. To get or update the routing control state, see the Recovery Cluster (data plane) API actions for Amazon Route 53 Application Recovery Controller.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RoutingControlArn:
                  $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
                RoutingControlName:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
              required:
                - RoutingControlArn
                - RoutingControlName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRoutingControlResponse"
  /safetyrule:
    post:
      operationId: CreateSafetyRule
      description: 'Creates a safety rule in a control panel. Safety rules let you add safeguards around changing routing control states, and for enabling and disabling routing controls, to help prevent unexpected outcomes. There are two types of safety rules: assertion rules and gating rules. Assertion rule: An assertion rule enforces that, when you change a routing control state, that a certain criteria is met. For example, the criteria might be that at least one routing control state is On after the transaction so that traffic continues to flow to at least one cell for the application. This ensures that you avoid a fail-open scenario. Gating rule: A gating rule lets you configure a gating routing control as an overall "on/off" switch for a group of routing controls. Or, you can configure more complex gating scenarios, for example by configuring multiple gating routing controls. For more information, see Safety rules in the Amazon Route 53 Application Recovery Controller Developer Guide.'
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AssertionRule:
                  $ref: "#/components/schemas/NewAssertionRule"
                ClientToken:
                  $ref: "#/components/schemas/__stringMin1Max64PatternS"
                GatingRule:
                  $ref: "#/components/schemas/NewGatingRule"
                Tags:
                  $ref: "#/components/schemas/__mapOf__stringMin0Max256PatternS"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSafetyRuleResponse"
    put:
      operationId: UpdateSafetyRule
      description: Update a safety rule (an assertion rule or gating rule). You can only update the name and the waiting period for a safety rule. To make other updates, delete the safety rule and create a new one.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AssertionRuleUpdate:
                  $ref: "#/components/schemas/AssertionRuleUpdate"
                GatingRuleUpdate:
                  $ref: "#/components/schemas/GatingRuleUpdate"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSafetyRuleResponse"
  /cluster/{cluster_arn}:
    delete:
      operationId: DeleteCluster
      description: Delete a cluster.
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster that you're deleting.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClusterResponse"
    get:
      operationId: DescribeCluster
      description: Display the details about a cluster. The response includes the cluster name, endpoints, status, and Amazon Resource Name (ARN).
      parameters:
        - name: cluster_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterResponse"
  /controlpanel/{control_panel_arn}:
    delete:
      operationId: DeleteControlPanel
      description: Deletes a control panel.
      parameters:
        - name: control_panel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the control panel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteControlPanelResponse"
    get:
      operationId: DescribeControlPanel
      description: Displays details about a control panel.
      parameters:
        - name: control_panel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the control panel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeControlPanelResponse"
  /routingcontrol/{routing_control_arn}:
    delete:
      operationId: DeleteRoutingControl
      description: Deletes a routing control.
      parameters:
        - name: routing_control_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the routing control that you're deleting.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRoutingControlResponse"
    get:
      operationId: DescribeRoutingControl
      description: "Displays details about a routing control. A routing control has one of two states: ON and OFF. You can map the routing control state to the state of an Amazon Route 53 health check, which can be used to control routing. To get or update the routing control state, see the Recovery Cluster (data plane) API actions for Amazon Route 53 Application Recovery Controller."
      parameters:
        - name: routing_control_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the routing control.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRoutingControlResponse"
  /safetyrule/{safety_rule_arn}:
    delete:
      operationId: DeleteSafetyRule
      description: Deletes a safety rule. />
      parameters:
        - name: safety_rule_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ARN of the safety rule.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSafetyRuleResponse"
    get:
      operationId: DescribeSafetyRule
      description: Returns information about a safety rule.
      parameters:
        - name: safety_rule_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ARN of the safety rule.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSafetyRuleResponse"
  /resourcePolicy/{resource_arn}:
    get:
      operationId: GetResourcePolicy
      description: Get information about the resource policy for a cluster.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
  /routingcontrol/{routing_control_arn}/associatedRoute53HealthChecks:
    get:
      operationId: ListAssociatedRoute53HealthChecks
      description: Returns an array of all Amazon Route 53 health checks associated with a specific routing control.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
        - name: routing_control_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the routing control.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociatedRoute53HealthChecksOutputDisplay"
  /controlpanels:
    get:
      operationId: ListControlPanels
      description: Returns an array of control panels in an account or in a cluster.
      parameters:
        - name: ClusterArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of a cluster.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListControlPanelsResponse"
  /controlpanel/{control_panel_arn}/routingcontrols:
    get:
      operationId: ListRoutingControls
      description: "Returns an array of routing controls for a control panel. A routing control is an Amazon Route 53 Application Recovery Controller construct that has one of two states: ON and OFF. You can map the routing control state to the state of an Amazon Route 53 health check, which can be used to control routing."
      parameters:
        - name: control_panel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the control panel.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoutingControlsResponse"
  /controlpanel/{control_panel_arn}/safetyrules:
    get:
      operationId: ListSafetyRules
      description: List the safety rules (the assertion rules and gating rules) that you've defined for the routing controls in a control panel.
      parameters:
        - name: control_panel_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the control panel.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that identifies which batch of results you want to see.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSafetyRulesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the resource that's tagged.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds a tag to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the resource that's tagged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/__mapOf__stringMin0Max256PatternS"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the resource that's tagged.
        - name: TagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: Keys for the tags to be removed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __stringMin1Max64PatternS:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^\S+$
    __mapOf__stringMin0Max256PatternS:
      type: object
      properties: {}
    NetworkType:
      description: "The network type of a cluster. NetworkType can be one of the following: IPV4: Cluster endpoints support IPv4 only. DUALSTACK: Cluster endpoints support both IPv4 and IPv6."
      type: string
      enum:
        - IPV4
        - DUALSTACK
    CreateClusterResponse:
      type: object
      properties:
        Cluster:
          $ref: "#/components/schemas/Cluster"
          description: The cluster that was created.
    Cluster:
      description: A set of five redundant Regional endpoints against which you can execute API calls to update or get the state of routing controls. You can host multiple control panels and routing controls on one cluster.
      type: object
      properties:
        ClusterArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the cluster.
        ClusterEndpoints:
          $ref: "#/components/schemas/__listOfClusterEndpoint"
          description: Endpoints for a cluster. Specify one of these endpoints when you want to set or retrieve a routing control state in the cluster. To get or update the routing control state, see the Amazon Route 53 Application Recovery Controller Routing Control Actions.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: The name of the cluster.
        Status:
          $ref: "#/components/schemas/Status"
          description: "Deployment status of a resource. Status can be one of the following: PENDING, DEPLOYED, PENDING_DELETION."
        Owner:
          $ref: "#/components/schemas/__stringMin12Max12PatternD12"
          description: The Amazon Web Services account ID of the cluster owner.
        NetworkType:
          $ref: "#/components/schemas/NetworkType"
          description: "The network type of the cluster. NetworkType can be one of the following: IPV4, DUALSTACK."
    __stringMin1Max256PatternAZaZ09:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[A-Za-z0-9:\/_-]*$
    __listOfClusterEndpoint:
      type: array
      items:
        $ref: "#/components/schemas/ClusterEndpoint"
    ClusterEndpoint:
      description: A cluster endpoint. Specify an endpoint when you want to set or retrieve a routing control state in the cluster.
      type: object
      properties:
        Endpoint:
          $ref: "#/components/schemas/__stringMin1Max128PatternAZaZ09"
          description: A cluster endpoint. Specify an endpoint and Amazon Web Services Region when you want to set or retrieve a routing control state in the cluster. To get or update the routing control state, see the Amazon Route 53 Application Recovery Controller Routing Control Actions.
        Region:
          $ref: "#/components/schemas/__stringMin1Max32PatternS"
          description: The Amazon Web Services Region for a cluster endpoint.
    __stringMin1Max128PatternAZaZ09:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[A-Za-z0-9:.\/_-]*$
    __stringMin1Max32PatternS:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^\S+$
    Status:
      description: "The deployment status of a resource. Status can be one of the following: PENDING: Amazon Route 53 Application Recovery Controller is creating the resource. DEPLOYED: The resource is deployed and ready to use. PENDING_DELETION: Amazon Route 53 Application Recovery Controller is deleting the resource."
      type: string
      enum:
        - PENDING
        - DEPLOYED
        - PENDING_DELETION
    __stringMin12Max12PatternD12:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^\d{12}$
    CreateControlPanelResponse:
      type: object
      properties:
        ControlPanel:
          $ref: "#/components/schemas/ControlPanel"
          description: Information about a control panel.
    ControlPanel:
      description: A control panel represents a group of routing controls that can be changed together in a single transaction.
      type: object
      properties:
        ClusterArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the cluster that includes the control panel.
        ControlPanelArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the control panel.
        DefaultControlPanel:
          $ref: "#/components/schemas/__boolean"
          description: A flag that Amazon Route 53 Application Recovery Controller sets to true to designate the default control panel for a cluster. When you create a cluster, Amazon Route 53 Application Recovery Controller creates a control panel, and sets this flag for that control panel. If you create a control panel yourself, this flag is set to false.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: The name of the control panel. You can use any non-white space character in the name.
        RoutingControlCount:
          $ref: "#/components/schemas/__integer"
          description: The number of routing controls in the control panel.
        Status:
          $ref: "#/components/schemas/Status"
          description: "The deployment status of control panel. Status can be one of the following: PENDING, DEPLOYED, PENDING_DELETION."
        Owner:
          $ref: "#/components/schemas/__stringMin12Max12PatternD12"
          description: The Amazon Web Services account ID of the control panel owner.
    __boolean:
      type: boolean
    __integer:
      type: integer
    CreateRoutingControlResponse:
      type: object
      properties:
        RoutingControl:
          $ref: "#/components/schemas/RoutingControl"
          description: The routing control that is created.
    RoutingControl:
      description: "A routing control has one of two states: ON and OFF. You can map the routing control state to the state of an Amazon Route 53 health check, which can be used to control traffic routing."
      type: object
      properties:
        ControlPanelArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the control panel that includes the routing control.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: The name of the routing control.
        RoutingControlArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the routing control.
        Status:
          $ref: "#/components/schemas/Status"
          description: "The deployment status of a routing control. Status can be one of the following: PENDING, DEPLOYED, PENDING_DELETION."
        Owner:
          $ref: "#/components/schemas/__stringMin12Max12PatternD12"
          description: The Amazon Web Services account ID of the routing control owner.
    NewAssertionRule:
      description: A new assertion rule for a control panel.
      type: object
      properties:
        AssertedControls:
          $ref: "#/components/schemas/__listOf__stringMin1Max256PatternAZaZ09"
          description: The routing controls that are part of transactions that are evaluated to determine if a request to change a routing control state is allowed. For example, you might include three routing controls, one for each of three Amazon Web Services Regions.
        ControlPanelArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) for the control panel.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: The name of the assertion rule. You can use any non-white space character in the name.
        RuleConfig:
          $ref: "#/components/schemas/RuleConfig"
          description: The criteria that you set for specific assertion controls (routing controls) that designate how many control states must be ON as the result of a transaction. For example, if you have three assertion controls, you might specify ATLEAST 2 for your rule configuration. This means that at least two assertion controls must be ON, so that at least two Amazon Web Services Regions have traffic flowing to them.
        WaitPeriodMs:
          $ref: "#/components/schemas/__integer"
          description: An evaluation period, in milliseconds (ms), during which any request against the target routing controls will fail. This helps prevent "flapping" of state. The wait period is 5000 ms by default, but you can choose a custom value.
      required:
        - ControlPanelArn
        - AssertedControls
        - RuleConfig
        - WaitPeriodMs
        - Name
    __listOf__stringMin1Max256PatternAZaZ09:
      type: array
      items:
        $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
    RuleConfig:
      description: The rule configuration for an assertion rule. That is, the criteria that you set for specific assertion controls (routing controls) that specify how many control states must be ON after a transaction completes.
      type: object
      properties:
        Inverted:
          $ref: "#/components/schemas/__boolean"
          description: Logical negation of the rule. If the rule would usually evaluate true, it's evaluated as false, and vice versa.
        Threshold:
          $ref: "#/components/schemas/__integer"
          description: The value of N, when you specify an ATLEAST rule type. That is, Threshold is the number of controls that must be set when you specify an ATLEAST type.
        Type:
          $ref: "#/components/schemas/RuleType"
          description: "A rule can be one of the following: ATLEAST, AND, or OR."
      required:
        - Type
        - Inverted
        - Threshold
    RuleType:
      description: 'An enumerated type that determines how the evaluated rules are processed. RuleType can be one of the following: ATLEAST - At least N routing controls must be set. You specify N as the Threshold in the rule configuration. AND - All routing controls must be set. This is a shortcut for "At least N," where N is the total number of controls in the rule. OR - Any control must be set. This is a shortcut for "At least N," where N is 1.'
      type: string
      enum:
        - ATLEAST
        - AND
        - OR
    NewGatingRule:
      description: A new gating rule for a control panel.
      type: object
      properties:
        ControlPanelArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the control panel.
        GatingControls:
          $ref: "#/components/schemas/__listOf__stringMin1Max256PatternAZaZ09"
          description: The gating controls for the new gating rule. That is, routing controls that are evaluated by the rule configuration that you specify.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: The name for the new gating rule.
        RuleConfig:
          $ref: "#/components/schemas/RuleConfig"
          description: The criteria that you set for specific gating controls (routing controls) that designate how many control states must be ON to allow you to change (set or unset) the target control states.
        TargetControls:
          $ref: "#/components/schemas/__listOf__stringMin1Max256PatternAZaZ09"
          description: Routing controls that can only be set or unset if the specified RuleConfig evaluates to true for the specified GatingControls. For example, say you have three gating controls, one for each of three Amazon Web Services Regions. Now you specify ATLEAST 2 as your RuleConfig. With these settings, you can only change (set or unset) the routing controls that you have specified as TargetControls if that rule evaluates to true. In other words, your ability to change the routing controls that you have specified as TargetControls is gated by the rule that you set for the routing controls in GatingControls.
        WaitPeriodMs:
          $ref: "#/components/schemas/__integer"
          description: An evaluation period, in milliseconds (ms), during which any request against the target routing controls will fail. This helps prevent "flapping" of state. The wait period is 5000 ms by default, but you can choose a custom value.
      required:
        - TargetControls
        - ControlPanelArn
        - GatingControls
        - RuleConfig
        - WaitPeriodMs
        - Name
    CreateSafetyRuleResponse:
      type: object
      properties:
        AssertionRule:
          $ref: "#/components/schemas/AssertionRule"
          description: The assertion rule created.
        GatingRule:
          $ref: "#/components/schemas/GatingRule"
          description: The gating rule created.
    AssertionRule:
      description: An assertion rule enforces that, when you change a routing control state, that the criteria that you set in the rule configuration is met. Otherwise, the change to the routing control is not accepted. For example, the criteria might be that at least one routing control state is On after the transaction so that traffic continues to flow to at least one cell for the application. This ensures that you avoid a fail-open scenario.
      type: object
      properties:
        AssertedControls:
          $ref: "#/components/schemas/__listOf__stringMin1Max256PatternAZaZ09"
          description: The routing controls that are part of transactions that are evaluated to determine if a request to change a routing control state is allowed. For example, you might include three routing controls, one for each of three Amazon Web Services Regions.
        ControlPanelArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the control panel.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: Name of the assertion rule. You can use any non-white space character in the name.
        RuleConfig:
          $ref: "#/components/schemas/RuleConfig"
          description: The criteria that you set for specific assertion routing controls (AssertedControls) that designate how many routing control states must be ON as the result of a transaction. For example, if you have three assertion routing controls, you might specify ATLEAST 2 for your rule configuration. This means that at least two assertion routing control states must be ON, so that at least two Amazon Web Services Regions have traffic flowing to them.
        SafetyRuleArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the assertion rule.
        Status:
          $ref: "#/components/schemas/Status"
          description: "The deployment status of an assertion rule. Status can be one of the following: PENDING, DEPLOYED, PENDING_DELETION."
        WaitPeriodMs:
          $ref: "#/components/schemas/__integer"
          description: An evaluation period, in milliseconds (ms), during which any request against the target routing controls will fail. This helps prevent "flapping" of state. The wait period is 5000 ms by default, but you can choose a custom value.
        Owner:
          $ref: "#/components/schemas/__stringMin12Max12PatternD12"
          description: The Amazon Web Services account ID of the assertion rule owner.
      required:
        - Status
        - ControlPanelArn
        - SafetyRuleArn
        - AssertedControls
        - RuleConfig
        - WaitPeriodMs
        - Name
    GatingRule:
      description: A gating rule verifies that a gating routing control or set of gating routing controls, evaluates as true, based on a rule configuration that you specify, which allows a set of routing control state changes to complete. For example, if you specify one gating routing control and you set the Type in the rule configuration to OR, that indicates that you must set the gating routing control to On for the rule to evaluate as true; that is, for the gating control "switch" to be "On". When you do that, then you can update the routing control states for the target routing controls that you specify in the gating rule.
      type: object
      properties:
        ControlPanelArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the control panel.
        GatingControls:
          $ref: "#/components/schemas/__listOf__stringMin1Max256PatternAZaZ09"
          description: An array of gating routing control Amazon Resource Names (ARNs). For a simple "on/off" switch, specify the ARN for one routing control. The gating routing controls are evaluated by the rule configuration that you specify to determine if the target routing control states can be changed.
        Name:
          $ref: "#/components/schemas/__stringMin1Max64PatternS"
          description: The name for the gating rule. You can use any non-white space character in the name.
        RuleConfig:
          $ref: "#/components/schemas/RuleConfig"
          description: The criteria that you set for gating routing controls that designate how many of the routing control states must be ON to allow you to update target routing control states.
        SafetyRuleArn:
          $ref: "#/components/schemas/__stringMin1Max256PatternAZaZ09"
          description: The Amazon Resource Name (ARN) of the gating rule.
        Status:
          $ref: "#/components/schemas/Status"
          description: "The deployment status of a gating rule. Status can be one of the following: PENDING, DEPLOYED, PENDING_DELETION."
        TargetControls:
          $ref: "#/components/schemas/__listOf__stringMin1Max256PatternAZaZ09"
          description: An array of target routing control Amazon Resource Names (ARNs) for which the states can only be updated if the rule configuration that you specify evaluates to true for the gating routing control. As a simple example, if you have a single gating control, it acts as an overall "on/off" switch for a set of target routing controls. You can use this to manually override automated failover, for example.
        WaitPeriodMs:
          $ref: "#/components/schemas/__integer"
          description: An evaluation period, in milliseconds (ms), during which any request against the target routing controls will fail. This helps prevent "flapping" of state. The wait period is 5000 ms by default, but you can choose a custom value.
        Owner:
          $ref: "#/components/schemas/__stringMin12Max12PatternD12"
          description: The Amazon Web Services account ID of the gating rule owner.
      required:
        - Status
        - TargetControls
        - ControlPanelArn
        - SafetyRuleArn
        - GatingControls
        - RuleConfig
        - WaitPeriodMs
        - Name
