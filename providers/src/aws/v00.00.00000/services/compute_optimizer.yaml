openapi: 3.0.0
info:
  version: "2019-11-01"
  title: AWS Compute Optimizer
  description: AWS Compute Optimizer
  x-serviceName: compute-optimizer
  x-serviceAlias: compute_optimizer
  x-protocol: json
  x-apiVersion: "2019-11-01"
  x-endpointPrefix: compute-optimizer
  x-targetPrefix: ComputeOptimizerService
  x-jsonVersion: "1.0"
servers:
  - url: https://compute-optimizer.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for compute-optimizer
paths:
  /DeleteRecommendationPreferences:
    post:
      operationId: DeleteRecommendationPreferences
      description: Deletes a recommendation preference, such as enhanced infrastructure metrics. For more information, see Activating enhanced infrastructure metrics in the Compute Optimizer User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.DeleteRecommendationPreferences
            default: ComputeOptimizerService.DeleteRecommendationPreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: The target resource type of the recommendation preference to delete. The Ec2Instance option encompasses standalone instances and instances that are part of Auto Scaling groups. The AutoScalingGroup option encompasses only instances that are part of an Auto Scaling group.
                scope:
                  $ref: "#/components/schemas/Scope"
                  description: An object that describes the scope of the recommendation preference to delete. You can delete recommendation preferences that are created at the organization level (for management accounts of an organization only), account level, and resource level. For more information, see Activating enhanced infrastructure metrics in the Compute Optimizer User Guide.
                recommendationPreferenceNames:
                  $ref: "#/components/schemas/RecommendationPreferenceNames"
                  description: The name of the recommendation preference to delete.
              required:
                - resourceType
                - recommendationPreferenceNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRecommendationPreferencesResponse"
  /DescribeRecommendationExportJobs:
    post:
      operationId: DescribeRecommendationExportJobs
      description: Describes recommendation export jobs created in the last seven days. Use the ExportAutoScalingGroupRecommendations or ExportEC2InstanceRecommendations actions to request an export of your recommendations. Then use the DescribeRecommendationExportJobs action to view your export jobs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.DescribeRecommendationExportJobs
            default: ComputeOptimizerService.DescribeRecommendationExportJobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                jobIds:
                  $ref: "#/components/schemas/JobIds"
                  description: The identification numbers of the export jobs to return. An export job ID is returned when you create an export using the ExportAutoScalingGroupRecommendations or ExportEC2InstanceRecommendations actions. All export jobs created in the last seven days are returned if this parameter is omitted.
                filters:
                  $ref: "#/components/schemas/JobFilters"
                  description: An array of objects to specify a filter that returns a more specific list of export jobs.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token to advance to the next page of export jobs.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of export jobs to return with a single request. To retrieve the remaining results, make another request with the returned nextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRecommendationExportJobsResponse"
  /ExportAutoScalingGroupRecommendations:
    post:
      operationId: ExportAutoScalingGroupRecommendations
      description: Exports optimization recommendations for Auto Scaling groups. Recommendations are exported in a comma-separated values (.csv) file, and its metadata in a JavaScript Object Notation (JSON) (.json) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one Auto Scaling group export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportAutoScalingGroupRecommendations
            default: ComputeOptimizerService.ExportAutoScalingGroupRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The IDs of the Amazon Web Services accounts for which to export Auto Scaling group recommendations. If your account is the management account of an organization, use this parameter to specify the member account for which you want to export recommendations. This parameter cannot be specified together with the include member accounts parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the include member accounts parameter, is omitted. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/Filters"
                  description: An array of objects to specify a filter that exports a more specific set of Auto Scaling group recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableAutoScalingGroupFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                  description: An object to specify the destination Amazon Simple Storage Service (Amazon S3) bucket name and key prefix for the export job. You must create the destination Amazon S3 bucket for your recommendations export before you create the export job. Compute Optimizer does not create the S3 bucket for you. After you create the S3 bucket, ensure that it has the required permissions policy to allow Compute Optimizer to write the export file to it. If you plan to specify an object prefix when you create the export job, you must include the object prefix in the policy that you add to the S3 bucket. For more information, see Amazon S3 Bucket Policy for Compute Optimizer in the Compute Optimizer User Guide.
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The only export file format currently supported is Csv.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: Indicates whether to include recommendations for resources in all member accounts of the organization if your account is the management account of an organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. Recommendations for member accounts of the organization are not included in the export file if this parameter is omitted. This parameter cannot be specified together with the account IDs parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the account IDs parameter, is omitted.
                recommendationPreferences:
                  $ref: "#/components/schemas/RecommendationPreferences"
                  description: An object to specify the preferences for the Auto Scaling group recommendations to export.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportAutoScalingGroupRecommendationsResponse"
  /ExportEBSVolumeRecommendations:
    post:
      operationId: ExportEBSVolumeRecommendations
      description: Exports optimization recommendations for Amazon EBS volumes. Recommendations are exported in a comma-separated values (.csv) file, and its metadata in a JavaScript Object Notation (JSON) (.json) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one Amazon EBS volume export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportEBSVolumeRecommendations
            default: ComputeOptimizerService.ExportEBSVolumeRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The IDs of the Amazon Web Services accounts for which to export Amazon EBS volume recommendations. If your account is the management account of an organization, use this parameter to specify the member account for which you want to export recommendations. This parameter cannot be specified together with the include member accounts parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the include member accounts parameter, is omitted. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/EBSFilters"
                  description: An array of objects to specify a filter that exports a more specific set of Amazon EBS volume recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableVolumeFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The only export file format currently supported is Csv.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: Indicates whether to include recommendations for resources in all member accounts of the organization if your account is the management account of an organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. Recommendations for member accounts of the organization are not included in the export file if this parameter is omitted. This parameter cannot be specified together with the account IDs parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the account IDs parameter, is omitted.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportEBSVolumeRecommendationsResponse"
  /ExportEC2InstanceRecommendations:
    post:
      operationId: ExportEC2InstanceRecommendations
      description: Exports optimization recommendations for Amazon EC2 instances. Recommendations are exported in a comma-separated values (.csv) file, and its metadata in a JavaScript Object Notation (JSON) (.json) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one Amazon EC2 instance export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportEC2InstanceRecommendations
            default: ComputeOptimizerService.ExportEC2InstanceRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The IDs of the Amazon Web Services accounts for which to export instance recommendations. If your account is the management account of an organization, use this parameter to specify the member account for which you want to export recommendations. This parameter cannot be specified together with the include member accounts parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the include member accounts parameter, is omitted. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/Filters"
                  description: An array of objects to specify a filter that exports a more specific set of instance recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableInstanceFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                  description: An object to specify the destination Amazon Simple Storage Service (Amazon S3) bucket name and key prefix for the export job. You must create the destination Amazon S3 bucket for your recommendations export before you create the export job. Compute Optimizer does not create the S3 bucket for you. After you create the S3 bucket, ensure that it has the required permissions policy to allow Compute Optimizer to write the export file to it. If you plan to specify an object prefix when you create the export job, you must include the object prefix in the policy that you add to the S3 bucket. For more information, see Amazon S3 Bucket Policy for Compute Optimizer in the Compute Optimizer User Guide.
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The only export file format currently supported is Csv.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: Indicates whether to include recommendations for resources in all member accounts of the organization if your account is the management account of an organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. Recommendations for member accounts of the organization are not included in the export file if this parameter is omitted. Recommendations for member accounts are not included in the export if this parameter, or the account IDs parameter, is omitted.
                recommendationPreferences:
                  $ref: "#/components/schemas/RecommendationPreferences"
                  description: An object to specify the preferences for the Amazon EC2 instance recommendations to export.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportEC2InstanceRecommendationsResponse"
  /ExportECSServiceRecommendations:
    post:
      operationId: ExportECSServiceRecommendations
      description: Exports optimization recommendations for Amazon ECS services on Fargate. Recommendations are exported in a CSV file, and its metadata in a JSON file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can only have one Amazon ECS service export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportECSServiceRecommendations
            default: ComputeOptimizerService.ExportECSServiceRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The Amazon Web Services account IDs for the export Amazon ECS service recommendations. If your account is the management account or the delegated administrator of an organization, use this parameter to specify the member account you want to export recommendations to. This parameter can't be specified together with the include member accounts parameter. The parameters are mutually exclusive. If this parameter or the include member accounts parameter is omitted, the recommendations for member accounts aren't included in the export. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/ECSServiceRecommendationFilters"
                  description: An array of objects to specify a filter that exports a more specific set of Amazon ECS service recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableECSServiceFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The CSV file is the only export file format currently supported.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: If your account is the management account or the delegated administrator of an organization, this parameter indicates whether to include recommendations for resources in all member accounts of the organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. If this parameter is omitted, recommendations for member accounts of the organization aren't included in the export file. If this parameter or the account ID parameter is omitted, recommendations for member accounts aren't included in the export.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportECSServiceRecommendationsResponse"
  /ExportIdleRecommendations:
    post:
      operationId: ExportIdleRecommendations
      description: Export optimization recommendations for your idle resources. Recommendations are exported in a comma-separated values (CSV) file, and its metadata in a JavaScript Object Notation (JSON) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one idle resource export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportIdleRecommendations
            default: ComputeOptimizerService.ExportIdleRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The Amazon Web Services account IDs for the export idle resource recommendations. If your account is the management account or the delegated administrator of an organization, use this parameter to specify the member account you want to export recommendations to. This parameter can't be specified together with the include member accounts parameter. The parameters are mutually exclusive. If this parameter or the include member accounts parameter is omitted, the recommendations for member accounts aren't included in the export. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/IdleRecommendationFilters"
                  description: An array of objects to specify a filter that exports a more specific set of idle resource recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableIdleFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The CSV file is the only export file format currently supported.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: If your account is the management account or the delegated administrator of an organization, this parameter indicates whether to include recommendations for resources in all member accounts of the organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. If this parameter is omitted, recommendations for member accounts of the organization aren't included in the export file. If this parameter or the account ID parameter is omitted, recommendations for member accounts aren't included in the export.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportIdleRecommendationsResponse"
  /ExportLambdaFunctionRecommendations:
    post:
      operationId: ExportLambdaFunctionRecommendations
      description: Exports optimization recommendations for Lambda functions. Recommendations are exported in a comma-separated values (.csv) file, and its metadata in a JavaScript Object Notation (JSON) (.json) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one Lambda function export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportLambdaFunctionRecommendations
            default: ComputeOptimizerService.ExportLambdaFunctionRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The IDs of the Amazon Web Services accounts for which to export Lambda function recommendations. If your account is the management account of an organization, use this parameter to specify the member account for which you want to export recommendations. This parameter cannot be specified together with the include member accounts parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the include member accounts parameter, is omitted. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/LambdaFunctionRecommendationFilters"
                  description: An array of objects to specify a filter that exports a more specific set of Lambda function recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableLambdaFunctionFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The only export file format currently supported is Csv.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: Indicates whether to include recommendations for resources in all member accounts of the organization if your account is the management account of an organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. Recommendations for member accounts of the organization are not included in the export file if this parameter is omitted. This parameter cannot be specified together with the account IDs parameter. The parameters are mutually exclusive. Recommendations for member accounts are not included in the export if this parameter, or the account IDs parameter, is omitted.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportLambdaFunctionRecommendationsResponse"
  /ExportLicenseRecommendations:
    post:
      operationId: ExportLicenseRecommendations
      description: Export optimization recommendations for your licenses. Recommendations are exported in a comma-separated values (CSV) file, and its metadata in a JavaScript Object Notation (JSON) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one license export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportLicenseRecommendations
            default: ComputeOptimizerService.ExportLicenseRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The IDs of the Amazon Web Services accounts for which to export license recommendations. If your account is the management account of an organization, use this parameter to specify the member account for which you want to export recommendations. This parameter can't be specified together with the include member accounts parameter. The parameters are mutually exclusive. If this parameter is omitted, recommendations for member accounts aren't included in the export. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/LicenseRecommendationFilters"
                  description: An array of objects to specify a filter that exports a more specific set of license recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableLicenseFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. A CSV file is the only export format currently supported.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: Indicates whether to include recommendations for resources in all member accounts of the organization if your account is the management account of an organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. If this parameter is omitted, recommendations for member accounts of the organization aren't included in the export file . This parameter cannot be specified together with the account IDs parameter. The parameters are mutually exclusive.
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportLicenseRecommendationsResponse"
  /ExportRDSDatabaseRecommendations:
    post:
      operationId: ExportRDSDatabaseRecommendations
      description: Export optimization recommendations for your Amazon Aurora and Amazon Relational Database Service (Amazon RDS) databases. Recommendations are exported in a comma-separated values (CSV) file, and its metadata in a JavaScript Object Notation (JSON) file, to an existing Amazon Simple Storage Service (Amazon S3) bucket that you specify. For more information, see Exporting Recommendations in the Compute Optimizer User Guide. You can have only one Amazon Aurora or RDS export job in progress per Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.ExportRDSDatabaseRecommendations
            default: ComputeOptimizerService.ExportRDSDatabaseRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The Amazon Web Services account IDs for the export Amazon Aurora and RDS database recommendations. If your account is the management account or the delegated administrator of an organization, use this parameter to specify the member account you want to export recommendations to. This parameter can't be specified together with the include member accounts parameter. The parameters are mutually exclusive. If this parameter or the include member accounts parameter is omitted, the recommendations for member accounts aren't included in the export. You can specify multiple account IDs per request.
                filters:
                  $ref: "#/components/schemas/RDSDBRecommendationFilters"
                  description: An array of objects to specify a filter that exports a more specific set of Amazon Aurora and RDS recommendations.
                fieldsToExport:
                  $ref: "#/components/schemas/ExportableRDSDBFields"
                  description: The recommendations data to include in the export file. For more information about the fields that can be exported, see Exported files in the Compute Optimizer User Guide.
                s3DestinationConfig:
                  $ref: "#/components/schemas/S3DestinationConfig"
                fileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format of the export file. The CSV file is the only export file format currently supported.
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: If your account is the management account or the delegated administrator of an organization, this parameter indicates whether to include recommendations for resources in all member accounts of the organization. The member accounts must also be opted in to Compute Optimizer, and trusted access for Compute Optimizer must be enabled in the organization account. For more information, see Compute Optimizer and Amazon Web Services Organizations trusted access in the Compute Optimizer User Guide. If this parameter is omitted, recommendations for member accounts of the organization aren't included in the export file. If this parameter or the account ID parameter is omitted, recommendations for member accounts aren't included in the export.
                recommendationPreferences:
                  $ref: "#/components/schemas/RecommendationPreferences"
              required:
                - s3DestinationConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRDSDatabaseRecommendationsResponse"
  /GetAutoScalingGroupRecommendations:
    post:
      operationId: GetAutoScalingGroupRecommendations
      description: Returns Auto Scaling group recommendations. Compute Optimizer generates recommendations for Amazon EC2 Auto Scaling groups that meet a specific set of requirements. For more information, see the Supported resources and requirements in the Compute Optimizer User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.GetAutoScalingGroupRecommendations
            default: ComputeOptimizerService.GetAutoScalingGroupRecommendations
      requestBody:
        required: true
