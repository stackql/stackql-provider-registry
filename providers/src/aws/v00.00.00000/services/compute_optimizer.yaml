          $ref: "#/components/schemas/GetRecommendationErrors"
          description: An array of objects that describe errors of the request.
    ECSServiceRecommendations:
      type: array
      items:
        $ref: "#/components/schemas/ECSServiceRecommendation"
    ECSServiceRecommendation:
      description: Describes an Amazon ECS service recommendation.
      type: object
      properties:
        serviceArn:
          $ref: "#/components/schemas/ServiceArn"
          description: "The Amazon Resource Name (ARN) of the current Amazon ECS service. The following is the format of the ARN: arn:aws:ecs:region:aws_account_id:service/cluster-name/service-name"
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the Amazon ECS service.
        currentServiceConfiguration:
          $ref: "#/components/schemas/ServiceConfiguration"
          description: The configuration of the current Amazon ECS service.
        utilizationMetrics:
          $ref: "#/components/schemas/ECSServiceUtilizationMetrics"
          description: An array of objects that describe the utilization metrics of the Amazon ECS service.
        lookbackPeriodInDays:
          $ref: "#/components/schemas/LookBackPeriodInDays"
          description: The number of days the Amazon ECS service utilization metrics were analyzed.
        launchType:
          $ref: "#/components/schemas/ECSServiceLaunchType"
          description: The launch type the Amazon ECS service is using. Compute Optimizer only supports the Fargate launch type.
        lastRefreshTimestamp:
          $ref: "#/components/schemas/LastRefreshTimestamp"
          description: The timestamp of when the Amazon ECS service recommendation was last generated.
        finding:
          $ref: "#/components/schemas/ECSServiceRecommendationFinding"
          description: "The finding classification of an Amazon ECS service. Findings for Amazon ECS services include: Underprovisioned — When Compute Optimizer detects that there’s not enough memory or CPU, an Amazon ECS service is considered under-provisioned. An under-provisioned service might result in poor application performance. Overprovisioned — When Compute Optimizer detects that there’s excessive memory or CPU, an Amazon ECS service is considered over-provisioned. An over-provisioned service might result in additional infrastructure costs. Optimized — When both the CPU and memory of your Amazon ECS service meet the performance requirements of your workload, the service is considered optimized."
        findingReasonCodes:
          $ref: "#/components/schemas/ECSServiceRecommendationFindingReasonCodes"
          description: "The reason for the finding classification of an Amazon ECS service. Finding reason codes for Amazon ECS services include: CPUUnderprovisioned — The service CPU configuration can be sized up to enhance the performance of your workload. This is identified by analyzing the CPUUtilization metric of the current service during the look-back period. CPUOverprovisioned — The service CPU configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the CPUUtilization metric of the current service during the look-back period. MemoryUnderprovisioned — The service memory configuration can be sized up to enhance the performance of your workload. This is identified by analyzing the MemoryUtilization metric of the current service during the look-back period. MemoryOverprovisioned — The service memory configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the MemoryUtilization metric of the current service during the look-back period."
        serviceRecommendationOptions:
          $ref: "#/components/schemas/ECSServiceRecommendationOptions"
          description: An array of objects that describe the recommendation options for the Amazon ECS service.
        currentPerformanceRisk:
          $ref: "#/components/schemas/CurrentPerformanceRisk"
          description: The risk of the current Amazon ECS service not meeting the performance needs of its workloads. The higher the risk, the more likely the current service can't meet the performance requirements of its workload.
        effectiveRecommendationPreferences:
          $ref: "#/components/schemas/ECSEffectiveRecommendationPreferences"
          description: Describes the effective recommendation preferences for Amazon ECS services.
        tags:
          $ref: "#/components/schemas/Tags"
          description: A list of tags assigned to your Amazon ECS service recommendations.
    ServiceConfiguration:
      description: The Amazon ECS service configurations used for recommendations.
      type: object
      properties:
        memory:
          $ref: "#/components/schemas/NullableMemory"
          description: The amount of memory used by the tasks in the Amazon ECS service.
        cpu:
          $ref: "#/components/schemas/NullableCpu"
          description: The number of CPU units used by the tasks in the Amazon ECS service.
        containerConfigurations:
          $ref: "#/components/schemas/ContainerConfigurations"
          description: The container configurations within a task of an Amazon ECS service.
        autoScalingConfiguration:
          $ref: "#/components/schemas/AutoScalingConfiguration"
          description: "Describes the Auto Scaling configuration methods for an Amazon ECS service. This affects the generated recommendations. For example, if Auto Scaling is configured on a service’s CPU, then Compute Optimizer doesn’t generate CPU size recommendations. The Auto Scaling configuration methods include: TARGET_TRACKING_SCALING_CPU — If the Amazon ECS service is configured to use target scaling on CPU, Compute Optimizer doesn't generate CPU recommendations. TARGET_TRACKING_SCALING_MEMORY — If the Amazon ECS service is configured to use target scaling on memory, Compute Optimizer doesn't generate memory recommendations. For more information about step scaling and target scaling, see Step scaling policies for Application Auto Scaling and Target tracking scaling policies for Application Auto Scaling in the Application Auto Scaling User Guide."
        taskDefinitionArn:
          $ref: "#/components/schemas/TaskDefinitionArn"
          description: The task definition ARN used by the tasks in the Amazon ECS service.
