        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to advance to the next page of Auto Scaling group recommendations. This value is null when there are no more pages of Auto Scaling group recommendations to return.
        autoScalingGroupRecommendations:
          $ref: "#/components/schemas/AutoScalingGroupRecommendations"
          description: An array of objects that describe Auto Scaling group recommendations.
        errors:
          $ref: "#/components/schemas/GetRecommendationErrors"
          description: An array of objects that describe errors of the request. For example, an error is returned if you request recommendations for an unsupported Auto Scaling group.
    AutoScalingGroupRecommendations:
      type: array
      items:
        $ref: "#/components/schemas/AutoScalingGroupRecommendation"
    AutoScalingGroupRecommendation:
      description: Describes an Auto Scaling group recommendation.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the Auto Scaling group.
        autoScalingGroupArn:
          $ref: "#/components/schemas/AutoScalingGroupArn"
          description: The Amazon Resource Name (ARN) of the Auto Scaling group.
        autoScalingGroupName:
          $ref: "#/components/schemas/AutoScalingGroupName"
          description: The name of the Auto Scaling group.
        finding:
          $ref: "#/components/schemas/Finding"
          description: "The finding classification of the Auto Scaling group. Findings for Auto Scaling groups include: NotOptimized —An Auto Scaling group is considered not optimized when Compute Optimizer identifies a recommendation that can provide better performance for your workload. Optimized —An Auto Scaling group is considered optimized when Compute Optimizer determines that the group is correctly provisioned to run your workload based on the chosen instance type. For optimized resources, Compute Optimizer might recommend a new generation instance type."
        utilizationMetrics:
          $ref: "#/components/schemas/UtilizationMetrics"
          description: An array of objects that describe the utilization metrics of the Auto Scaling group.
        lookBackPeriodInDays:
          $ref: "#/components/schemas/LookBackPeriodInDays"
          description: The number of days for which utilization metrics were analyzed for the Auto Scaling group.
        currentConfiguration:
          $ref: "#/components/schemas/AutoScalingGroupConfiguration"
          description: An array of objects that describe the current configuration of the Auto Scaling group.
        currentInstanceGpuInfo:
          $ref: "#/components/schemas/GpuInfo"
          description: Describes the GPU accelerator settings for the current instance type of the Auto Scaling group.
        recommendationOptions:
          $ref: "#/components/schemas/AutoScalingGroupRecommendationOptions"
          description: An array of objects that describe the recommendation options for the Auto Scaling group.
        lastRefreshTimestamp:
          $ref: "#/components/schemas/LastRefreshTimestamp"
          description: The timestamp of when the Auto Scaling group recommendation was last generated.
        currentPerformanceRisk:
          $ref: "#/components/schemas/CurrentPerformanceRisk"
          description: The risk of the current Auto Scaling group not meeting the performance needs of its workloads. The higher the risk, the more likely the current Auto Scaling group configuration has insufficient capacity and cannot meet workload requirements.
        effectiveRecommendationPreferences:
          $ref: "#/components/schemas/EffectiveRecommendationPreferences"
          description: An object that describes the effective recommendation preferences for the Auto Scaling group.
        inferredWorkloadTypes:
          $ref: "#/components/schemas/InferredWorkloadTypes"
          description: "The applications that might be running on the instances in the Auto Scaling group as inferred by Compute Optimizer. Compute Optimizer can infer if one of the following applications might be running on the instances: AmazonEmr - Infers that Amazon EMR might be running on the instances. ApacheCassandra - Infers that Apache Cassandra might be running on the instances. ApacheHadoop - Infers that Apache Hadoop might be running on the instances. Memcached - Infers that Memcached might be running on the instances. NGINX - Infers that NGINX might be running on the instances. PostgreSql - Infers that PostgreSQL might be running on the instances. Redis - Infers that Redis might be running on the instances. Kafka - Infers that Kafka might be running on the instance. SQLServer - Infers that SQLServer might be running on the instance."
    AutoScalingGroupName:
      type: string
    Finding:
      type: string
      enum:
        - Underprovisioned
        - Overprovisioned
        - Optimized
        - NotOptimized
    UtilizationMetrics:
      type: array
      items:
        $ref: "#/components/schemas/UtilizationMetric"
    UtilizationMetric:
      description: Describes a utilization metric of a resource, such as an Amazon EC2 instance. Compare the utilization metric data of your resource against its projected utilization metric data to determine the performance difference between your current resource and the recommended option.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/MetricName"
          description: "The name of the utilization metric. The following utilization metrics are available: Cpu - The percentage of allocated EC2 compute units that are currently in use on the instance. This metric identifies the processing power required to run an application on the instance. Depending on the instance type, tools in your operating system can show a lower percentage than CloudWatch when the instance is not allocated a full processor core. Units: Percent Memory - The percentage of memory that is currently in use on the instance. This metric identifies the amount of memory required to run an application on the instance. Units: Percent The Memory metric is returned only for resources that have the unified CloudWatch agent installed on them. For more information, see Enabling Memory Utilization with the CloudWatch Agent. GPU - The percentage of allocated GPUs that currently run on the instance. GPU_MEMORY - The percentage of total GPU memory that currently runs on the instance. The GPU and GPU_MEMORY metrics are only returned for resources with the unified CloudWatch Agent installed on them. For more information, see Enabling NVIDIA GPU utilization with the CloudWatch Agent. EBS_READ_OPS_PER_SECOND - The completed read operations from all EBS volumes attached to the instance in a specified period of time. Unit: Count EBS_WRITE_OPS_PER_SECOND - The completed write operations to all EBS volumes attached to the instance in a specified period of time. Unit: Count EBS_READ_BYTES_PER_SECOND - The bytes read from all EBS volumes attached to the instance in a specified period of time. Unit: Bytes EBS_WRITE_BYTES_PER_SECOND - The bytes written to all EBS volumes attached to the instance in a specified period of time. Unit: Bytes DISK_READ_OPS_PER_SECOND - The completed read operations from all instance store volumes available to the instance in a specified period of time. If there are no instance store volumes, either the value is 0 or the metric is not reported. DISK_WRITE_OPS_PER_SECOND - The completed write operations from all instance store volumes available to the instance in a specified period of time. If there are no instance store volumes, either the value is 0 or the metric is not reported. DISK_READ_BYTES_PER_SECOND - The bytes read from all instance store volumes available to the instance. This metric is used to determine the volume of the data the application reads from the disk of the instance. This can be used to determine the speed of the application. If there are no instance store volumes, either the value is 0 or the metric is not reported. DISK_WRITE_BYTES_PER_SECOND - The bytes written to all instance store volumes available to the instance. This metric is used to determine the volume of the data the application writes onto the disk of the instance. This can be used to determine the speed of the application. If there are no instance store volumes, either the value is 0 or the metric is not reported. NETWORK_IN_BYTES_PER_SECOND - The number of bytes received by the instance on all network interfaces. This metric identifies the volume of incoming network traffic to a single instance. NETWORK_OUT_BYTES_PER_SECOND - The number of bytes sent out by the instance on all network interfaces. This metric identifies the volume of outgoing network traffic from a single instance. NETWORK_PACKETS_IN_PER_SECOND - The number of packets received by the instance on all network interfaces. This metric identifies the volume of incoming traffic in terms of the number of packets on a single instance. NETWORK_PACKETS_OUT_PER_SECOND - The number of packets sent out by the instance on all network interfaces. This metric identifies the volume of outgoing traffic in terms of the number of packets on a single instance."
        statistic:
          $ref: "#/components/schemas/MetricStatistic"
          description: The statistic of the utilization metric. The Compute Optimizer API, Command Line Interface (CLI), and SDKs return utilization metrics using only the Maximum statistic, which is the highest value observed during the specified period. The Compute Optimizer console displays graphs for some utilization metrics using the Average statistic, which is the value of Sum / SampleCount during the specified period. For more information, see Viewing resource recommendations in the Compute Optimizer User Guide. You can also get averaged utilization metric data for your resources using Amazon CloudWatch. For more information, see the Amazon CloudWatch User Guide.
        value:
          $ref: "#/components/schemas/MetricValue"
          description: The value of the utilization metric.
    MetricName:
      type: string
      enum:
        - Cpu
        - Memory
        - EBS_READ_OPS_PER_SECOND
        - EBS_WRITE_OPS_PER_SECOND
        - EBS_READ_BYTES_PER_SECOND
        - EBS_WRITE_BYTES_PER_SECOND
        - DISK_READ_OPS_PER_SECOND
        - DISK_WRITE_OPS_PER_SECOND
        - DISK_READ_BYTES_PER_SECOND
        - DISK_WRITE_BYTES_PER_SECOND
        - NETWORK_IN_BYTES_PER_SECOND
        - NETWORK_OUT_BYTES_PER_SECOND
        - NETWORK_PACKETS_IN_PER_SECOND
        - NETWORK_PACKETS_OUT_PER_SECOND
        - GPU_PERCENTAGE
        - GPU_MEMORY_PERCENTAGE
    MetricStatistic:
      type: string
      enum:
        - Maximum
        - Average
    MetricValue:
      type: number
      format: double
    LookBackPeriodInDays:
      type: number
      format: double
    AutoScalingGroupConfiguration:
      description: Describes the configuration of an EC2 Auto Scaling group.
      type: object
      properties:
        desiredCapacity:
          $ref: "#/components/schemas/DesiredCapacity"
          description: The desired capacity, or number of instances, for the EC2 Auto Scaling group.
        minSize:
          $ref: "#/components/schemas/MinSize"
          description: The minimum size, or minimum number of instances, for the EC2 Auto Scaling group.
        maxSize:
          $ref: "#/components/schemas/MaxSize"
          description: The maximum size, or maximum number of instances, for the EC2 Auto Scaling group.
        instanceType:
          $ref: "#/components/schemas/NullableInstanceType"
          description: The instance type for the EC2 Auto Scaling group.
        allocationStrategy:
          $ref: "#/components/schemas/AllocationStrategy"
          description: Describes the allocation strategy that the EC2 Auto Scaling group uses. This field is only available for EC2 Auto Scaling groups with mixed instance types.
        estimatedInstanceHourReductionPercentage:
          $ref: "#/components/schemas/NullableEstimatedInstanceHourReductionPercentage"
          description: Describes the projected percentage reduction in instance hours after adopting the recommended configuration. This field is only available for EC2 Auto Scaling groups with scaling policies.
        type_:
          $ref: "#/components/schemas/AsgType"
          description: Describes whether the EC2 Auto Scaling group has a single instance type or a mixed instance type configuration.
        mixedInstanceTypes:
          $ref: "#/components/schemas/MixedInstanceTypes"
          description: List the instance types within an EC2 Auto Scaling group that has mixed instance types.
    DesiredCapacity:
