    ECSServiceUtilizationMetrics:
      type: array
      items:
        $ref: "#/components/schemas/ECSServiceUtilizationMetric"
    ECSServiceUtilizationMetric:
      description: Describes the utilization metric of an Amazon ECS service. To determine the performance difference between your current Amazon ECS service and the recommended option, compare the utilization metric data of your service against its projected utilization metric data.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ECSServiceMetricName"
          description: "The name of the utilization metric. The following utilization metrics are available: Cpu — The amount of CPU capacity that's used in the service. Memory — The amount of memory that's used in the service."
        statistic:
          $ref: "#/components/schemas/ECSServiceMetricStatistic"
          description: The statistic of the utilization metric. The Compute Optimizer API, Command Line Interface (CLI), and SDKs return utilization metrics using only the Maximum statistic, which is the highest value observed during the specified period. The Compute Optimizer console displays graphs for some utilization metrics using the Average statistic, which is the value of Sum / SampleCount during the specified period. For more information, see Viewing resource recommendations in the Compute Optimizer User Guide. You can also get averaged utilization metric data for your resources using Amazon CloudWatch. For more information, see the Amazon CloudWatch User Guide.
        value:
          $ref: "#/components/schemas/MetricValue"
          description: The value of the utilization metric.
    ECSServiceMetricStatistic:
      type: string
      enum:
        - Maximum
        - Average
    ECSServiceLaunchType:
      type: string
      enum:
        - EC2
        - Fargate
    ECSServiceRecommendationFinding:
      type: string
      enum:
        - Optimized
        - Underprovisioned
        - Overprovisioned
    ECSServiceRecommendationFindingReasonCodes:
      type: array
