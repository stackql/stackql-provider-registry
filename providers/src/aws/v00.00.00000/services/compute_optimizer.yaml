        performanceRisk:
          $ref: "#/components/schemas/PerformanceRisk"
          description: The performance risk of the volume recommendation option. Performance risk is the likelihood of the recommended volume type meeting the performance requirement of your workload. The value ranges from 0 - 4, with 0 meaning that the recommended resource is predicted to always provide enough hardware capability. The higher the performance risk is, the more likely you should validate whether the recommendation will meet the performance requirements of your workload before migrating your resource.
        rank:
          $ref: "#/components/schemas/Rank"
          description: The rank of the volume recommendation option. The top recommendation option is ranked as 1.
        savingsOpportunity:
          $ref: "#/components/schemas/SavingsOpportunity"
          description: An object that describes the savings opportunity for the EBS volume recommendation option. Savings opportunity includes the estimated monthly savings amount and percentage.
        savingsOpportunityAfterDiscounts:
          $ref: "#/components/schemas/EBSSavingsOpportunityAfterDiscounts"
          description: An object that describes the savings opportunity for the Amazon EBS volume recommendation option with specific discounts. Savings opportunity includes the estimated monthly savings and percentage.
    EBSSavingsOpportunityAfterDiscounts:
      description: Describes the savings opportunity for Amazon EBS volume recommendations after applying specific discounts.
      type: object
      properties:
        savingsOpportunityPercentage:
          $ref: "#/components/schemas/SavingsOpportunityPercentage"
          description: The estimated monthly savings possible as a percentage of monthly cost after applying the specific discounts. This saving can be achieved by adopting Compute Optimizer’s Amazon EBS volume recommendations.
        estimatedMonthlySavings:
          $ref: "#/components/schemas/EBSEstimatedMonthlySavings"
          description: The estimated monthly savings possible as a percentage of monthly cost by adopting Compute Optimizer’s Amazon EBS volume recommendations. This saving includes any applicable discounts.
    EBSEstimatedMonthlySavings:
      description: An object that describes the estimated monthly savings possible by adopting Compute Optimizer’s Amazon EBS volume recommendations. This includes any applicable discounts.
      type: object
      properties:
        currency:
          $ref: "#/components/schemas/Currency"
          description: The currency of the estimated monthly savings.
        value:
          $ref: "#/components/schemas/Value"
          description: The value of the estimated monthly savings.
    EBSEffectiveRecommendationPreferences:
      description: Describes the effective recommendation preferences for Amazon EBS volumes.
      type: object
      properties:
        savingsEstimationMode:
          $ref: "#/components/schemas/EBSSavingsEstimationMode"
          description: Describes the savings estimation mode preference applied for calculating savings opportunity for Amazon EBS volumes.
    EBSSavingsEstimationMode:
      description: Describes the savings estimation mode used for calculating savings opportunity for Amazon EBS volumes.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/EBSSavingsEstimationModeSource"
          description: Describes the source for calculating the savings opportunity for Amazon EBS volumes.
    EBSSavingsEstimationModeSource:
      type: string
      enum:
        - PublicPricing
        - CostExplorerRightsizing
        - CostOptimizationHub
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A list of tag key and value pairs that you define.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that makes up a tag. A key is a general label that acts like a category for more specific tag values.
        value:
          $ref: "#/components/schemas/TagValue"
          description: One part of a key-value pair that make up a tag. A value acts as a descriptor within a tag category (key). The value can be empty or null.
    TagKey:
      type: string
    TagValue:
      type: string
    InstanceArns:
      type: array
      items:
        $ref: "#/components/schemas/InstanceArn"
    InstanceArn:
      type: string
    GetEC2InstanceRecommendationsResponse:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to advance to the next page of instance recommendations. This value is null when there are no more pages of instance recommendations to return.
        instanceRecommendations:
          $ref: "#/components/schemas/InstanceRecommendations"
          description: An array of objects that describe instance recommendations.
        errors:
          $ref: "#/components/schemas/GetRecommendationErrors"
          description: An array of objects that describe errors of the request. For example, an error is returned if you request recommendations for an instance of an unsupported instance family.
    InstanceRecommendations:
      type: array
      items:
        $ref: "#/components/schemas/InstanceRecommendation"
    InstanceRecommendation:
      description: Describes an Amazon EC2 instance recommendation.
      type: object
      properties:
        instanceArn:
          $ref: "#/components/schemas/InstanceArn"
          description: The Amazon Resource Name (ARN) of the current instance.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the instance.
        instanceName:
          $ref: "#/components/schemas/InstanceName"
          description: The name of the current instance.
        currentInstanceType:
          $ref: "#/components/schemas/CurrentInstanceType"
          description: The instance type of the current instance.
        finding:
          $ref: "#/components/schemas/Finding"
          description: "The finding classification of the instance. Findings for instances include: Underprovisioned —An instance is considered under-provisioned when at least one specification of your instance, such as CPU, memory, or network, does not meet the performance requirements of your workload. Under-provisioned instances may lead to poor application performance. Overprovisioned —An instance is considered over-provisioned when at least one specification of your instance, such as CPU, memory, or network, can be sized down while still meeting the performance requirements of your workload, and no specification is under-provisioned. Over-provisioned instances may lead to unnecessary infrastructure cost. Optimized —An instance is considered optimized when all specifications of your instance, such as CPU, memory, and network, meet the performance requirements of your workload and is not over provisioned. For optimized resources, Compute Optimizer might recommend a new generation instance type. The valid values in your API responses appear as OVER_PROVISIONED, UNDER_PROVISIONED, or OPTIMIZED."
        findingReasonCodes:
          $ref: "#/components/schemas/InstanceRecommendationFindingReasonCodes"
          description: "The reason for the finding classification of the instance. Finding reason codes for instances include: CPUOverprovisioned — The instance’s CPU configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the CPUUtilization metric of the current instance during the look-back period. CPUUnderprovisioned — The instance’s CPU configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better CPU performance. This is identified by analyzing the CPUUtilization metric of the current instance during the look-back period. MemoryOverprovisioned — The instance’s memory configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the memory utilization metric of the current instance during the look-back period. MemoryUnderprovisioned — The instance’s memory configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better memory performance. This is identified by analyzing the memory utilization metric of the current instance during the look-back period. Memory utilization is analyzed only for resources that have the unified CloudWatch agent installed on them. For more information, see Enabling memory utilization with the Amazon CloudWatch Agent in the Compute Optimizer User Guide. On Linux instances, Compute Optimizer analyses the mem_used_percent metric in the CWAgent namespace, or the legacy MemoryUtilization metric in the System/Linux namespace. On Windows instances, Compute Optimizer analyses the Memory % Committed Bytes In Use metric in the CWAgent namespace. EBSThroughputOverprovisioned — The instance’s EBS throughput configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the VolumeReadBytes and VolumeWriteBytes metrics of EBS volumes attached to the current instance during the look-back period. EBSThroughputUnderprovisioned — The instance’s EBS throughput configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better EBS throughput performance. This is identified by analyzing the VolumeReadBytes and VolumeWriteBytes metrics of EBS volumes attached to the current instance during the look-back period. EBSIOPSOverprovisioned — The instance’s EBS IOPS configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the VolumeReadOps and VolumeWriteOps metric of EBS volumes attached to the current instance during the look-back period. EBSIOPSUnderprovisioned — The instance’s EBS IOPS configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better EBS IOPS performance. This is identified by analyzing the VolumeReadOps and VolumeWriteOps metric of EBS volumes attached to the current instance during the look-back period. NetworkBandwidthOverprovisioned — The instance’s network bandwidth configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the NetworkIn and NetworkOut metrics of the current instance during the look-back period. NetworkBandwidthUnderprovisioned — The instance’s network bandwidth configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better network bandwidth performance. This is identified by analyzing the NetworkIn and NetworkOut metrics of the current instance during the look-back period. This finding reason happens when the NetworkIn or NetworkOut performance of an instance is impacted. NetworkPPSOverprovisioned — The instance’s network PPS (packets per second) configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the NetworkPacketsIn and NetworkPacketsIn metrics of the current instance during the look-back period. NetworkPPSUnderprovisioned — The instance’s network PPS (packets per second) configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better network PPS performance. This is identified by analyzing the NetworkPacketsIn and NetworkPacketsIn metrics of the current instance during the look-back period. DiskIOPSOverprovisioned — The instance’s disk IOPS configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the DiskReadOps and DiskWriteOps metrics of the current instance during the look-back period. DiskIOPSUnderprovisioned — The instance’s disk IOPS configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better disk IOPS performance. This is identified by analyzing the DiskReadOps and DiskWriteOps metrics of the current instance during the look-back period. DiskThroughputOverprovisioned — The instance’s disk throughput configuration can be sized down while still meeting the performance requirements of your workload. This is identified by analyzing the DiskReadBytes and DiskWriteBytes metrics of the current instance during the look-back period. DiskThroughputUnderprovisioned — The instance’s disk throughput configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better disk throughput performance. This is identified by analyzing the DiskReadBytes and DiskWriteBytes metrics of the current instance during the look-back period. For more information about instance metrics, see List the available CloudWatch metrics for your instances in the Amazon Elastic Compute Cloud User Guide. For more information about EBS volume metrics, see Amazon CloudWatch metrics for Amazon EBS in the Amazon Elastic Compute Cloud User Guide."
        utilizationMetrics:
          $ref: "#/components/schemas/UtilizationMetrics"
          description: An array of objects that describe the utilization metrics of the instance.
        lookBackPeriodInDays:
          $ref: "#/components/schemas/LookBackPeriodInDays"
          description: The number of days for which utilization metrics were analyzed for the instance.
        recommendationOptions:
          $ref: "#/components/schemas/RecommendationOptions"
          description: An array of objects that describe the recommendation options for the instance.
        recommendationSources:
          $ref: "#/components/schemas/RecommendationSources"
          description: An array of objects that describe the source resource of the recommendation.
        lastRefreshTimestamp:
          $ref: "#/components/schemas/LastRefreshTimestamp"
          description: The timestamp of when the instance recommendation was last generated.
        currentPerformanceRisk:
          $ref: "#/components/schemas/CurrentPerformanceRisk"
          description: The risk of the current instance not meeting the performance needs of its workloads. The higher the risk, the more likely the current instance cannot meet the performance requirements of its workload.
        effectiveRecommendationPreferences:
          $ref: "#/components/schemas/EffectiveRecommendationPreferences"
          description: An object that describes the effective recommendation preferences for the instance.
        inferredWorkloadTypes:
          $ref: "#/components/schemas/InferredWorkloadTypes"
          description: "The applications that might be running on the instance as inferred by Compute Optimizer. Compute Optimizer can infer if one of the following applications might be running on the instance: AmazonEmr - Infers that Amazon EMR might be running on the instance. ApacheCassandra - Infers that Apache Cassandra might be running on the instance. ApacheHadoop - Infers that Apache Hadoop might be running on the instance. Memcached - Infers that Memcached might be running on the instance. NGINX - Infers that NGINX might be running on the instance. PostgreSql - Infers that PostgreSQL might be running on the instance. Redis - Infers that Redis might be running on the instance. Kafka - Infers that Kafka might be running on the instance. SQLServer - Infers that SQLServer might be running on the instance."
        instanceState:
          $ref: "#/components/schemas/InstanceState"
          description: The state of the instance when the recommendation was generated.
        tags:
          $ref: "#/components/schemas/Tags"
          description: A list of tags assigned to your Amazon EC2 instance recommendations.
        externalMetricStatus:
          $ref: "#/components/schemas/ExternalMetricStatus"
          description: An object that describes Compute Optimizer's integration status with your external metrics provider.
        currentInstanceGpuInfo:
          $ref: "#/components/schemas/GpuInfo"
          description: Describes the GPU accelerator settings for the current instance type.
        idle:
          $ref: "#/components/schemas/InstanceIdle"
          description: Describes if an Amazon EC2 instance is idle.
    InstanceName:
      type: string
    CurrentInstanceType:
