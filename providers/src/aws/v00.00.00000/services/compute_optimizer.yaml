      properties:
        savingsOpportunityPercentage:
          $ref: "#/components/schemas/SavingsOpportunityPercentage"
          description: The estimated monthly savings possible as a percentage of monthly cost by adopting Compute Optimizer’s Amazon ECS service recommendations. This includes any applicable Savings Plans discounts.
        estimatedMonthlySavings:
          $ref: "#/components/schemas/ECSEstimatedMonthlySavings"
          description: The estimated monthly savings possible by adopting Compute Optimizer’s Amazon ECS service recommendations. This includes any applicable Savings Plans discounts.
    ECSEstimatedMonthlySavings:
