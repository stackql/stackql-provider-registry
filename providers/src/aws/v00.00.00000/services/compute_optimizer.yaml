                accountIds:
                  $ref: "#/components/schemas/AccountIds"
                  description: The ID of the Amazon Web Services account for which to return recommendation summaries. If your account is the management account of an organization, use this parameter to specify the member account for which you want to return recommendation summaries. Only one account ID can be specified per request.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token to advance to the next page of recommendation summaries.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of recommendation summaries to return with a single request. To retrieve the remaining results, make another request with the returned nextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecommendationSummariesResponse"
  /PutRecommendationPreferences:
    post:
      operationId: PutRecommendationPreferences
      description: Creates a new recommendation preference or updates an existing recommendation preference, such as enhanced infrastructure metrics. For more information, see Activating enhanced infrastructure metrics in the Compute Optimizer User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.PutRecommendationPreferences
            default: ComputeOptimizerService.PutRecommendationPreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: The target resource type of the recommendation preference to create. The Ec2Instance option encompasses standalone instances and instances that are part of Auto Scaling groups. The AutoScalingGroup option encompasses only instances that are part of an Auto Scaling group.
                scope:
                  $ref: "#/components/schemas/Scope"
                  description: An object that describes the scope of the recommendation preference to create. You can create recommendation preferences at the organization level (for management accounts of an organization only), account level, and resource level. For more information, see Activating enhanced infrastructure metrics in the Compute Optimizer User Guide. You cannot create recommendation preferences for Auto Scaling groups at the organization and account levels. You can create recommendation preferences for Auto Scaling groups only at the resource level by specifying a scope name of ResourceArn and a scope value of the Auto Scaling group Amazon Resource Name (ARN). This will configure the preference for all instances that are part of the specified Auto Scaling group. You also cannot create recommendation preferences at the resource level for instances that are part of an Auto Scaling group. You can create recommendation preferences at the resource level only for standalone instances.
                enhancedInfrastructureMetrics:
                  $ref: "#/components/schemas/EnhancedInfrastructureMetrics"
                  description: The status of the enhanced infrastructure metrics recommendation preference to create or update. Specify the Active status to activate the preference, or specify Inactive to deactivate the preference. For more information, see Enhanced infrastructure metrics in the Compute Optimizer User Guide.
                inferredWorkloadTypes:
                  $ref: "#/components/schemas/InferredWorkloadTypesPreference"
                  description: The status of the inferred workload types recommendation preference to create or update. The inferred workload type feature is active by default. To deactivate it, create a recommendation preference. Specify the Inactive status to deactivate the feature, or specify Active to activate it. For more information, see Inferred workload types in the Compute Optimizer User Guide.
                externalMetricsPreference:
                  $ref: "#/components/schemas/ExternalMetricsPreference"
                  description: The provider of the external metrics recommendation preference to create or update. Specify a valid provider in the source field to activate the preference. To delete this preference, see the DeleteRecommendationPreferences action. This preference can only be set for the Ec2Instance resource type. For more information, see External metrics ingestion in the Compute Optimizer User Guide.
                lookBackPeriod:
                  $ref: "#/components/schemas/LookBackPeriodPreference"
                  description: The preference to control the number of days the utilization metrics of the Amazon Web Services resource are analyzed. When this preference isn't specified, we use the default value DAYS_14. You can only set this preference for the Amazon EC2 instance and Auto Scaling group resource types. Amazon EC2 instance lookback preferences can be set at the organization, account, and resource levels. Auto Scaling group lookback preferences can only be set at the resource level.
                utilizationPreferences:
                  $ref: "#/components/schemas/UtilizationPreferences"
                  description: "The preference to control the resource’s CPU utilization threshold, CPU utilization headroom, and memory utilization headroom. When this preference isn't specified, we use the following default values. CPU utilization: P99_5 for threshold PERCENT_20 for headroom Memory utilization: PERCENT_20 for headroom You can only set CPU and memory utilization preferences for the Amazon EC2 instance resource type. The threshold setting isn’t available for memory utilization."
                preferredResources:
                  $ref: "#/components/schemas/PreferredResources"
                  description: The preference to control which resource type values are considered when generating rightsizing recommendations. You can specify this preference as a combination of include and exclude lists. You must specify either an includeList or excludeList. If the preference is an empty set of resource type values, an error occurs. You can only set this preference for the Amazon EC2 instance and Auto Scaling group resource types.
                savingsEstimationMode:
                  $ref: "#/components/schemas/SavingsEstimationMode"
                  description: The status of the savings estimation mode preference to create or update. Specify the AfterDiscounts status to activate the preference, or specify BeforeDiscounts to deactivate the preference. Only the account manager or delegated administrator of your organization can activate this preference. For more information, see Savings estimation mode in the Compute Optimizer User Guide.
              required:
                - resourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRecommendationPreferencesResponse"
  /UpdateEnrollmentStatus:
    post:
      operationId: UpdateEnrollmentStatus
      description: Updates the enrollment (opt in and opt out) status of an account to the Compute Optimizer service. If the account is a management account of an organization, this action can also be used to enroll member accounts of the organization. You must have the appropriate permissions to opt in to Compute Optimizer, to view its recommendations, and to opt out. For more information, see Controlling access with Amazon Web Services Identity and Access Management in the Compute Optimizer User Guide. When you opt in, Compute Optimizer automatically creates a service-linked role in your account to access its data. For more information, see Using Service-Linked Roles for Compute Optimizer in the Compute Optimizer User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ComputeOptimizerService.UpdateEnrollmentStatus
            default: ComputeOptimizerService.UpdateEnrollmentStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/Status"
                  description: "The new enrollment status of the account. The following status options are available: Active - Opts in your account to the Compute Optimizer service. Compute Optimizer begins analyzing the configuration and utilization metrics of your Amazon Web Services resources after you opt in. For more information, see Metrics analyzed by Compute Optimizer in the Compute Optimizer User Guide. Inactive - Opts out your account from the Compute Optimizer service. Your account's recommendations and related metrics data will be deleted from Compute Optimizer after you opt out. The Pending and Failed options cannot be used to update the enrollment status of an account. They are returned in the response of a request to update the enrollment status of an account."
                includeMemberAccounts:
                  $ref: "#/components/schemas/IncludeMemberAccounts"
                  description: Indicates whether to enroll member accounts of the organization if the account is the management account of an organization.
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnrollmentStatusResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceType:
      type: string
      enum:
        - Ec2Instance
        - AutoScalingGroup
        - EbsVolume
        - LambdaFunction
        - NotApplicable
        - EcsService
        - License
        - RdsDBInstance
        - AuroraDBClusterStorage
        - Idle
    Scope:
      description: Describes the scope of a recommendation preference. Recommendation preferences can be created at the organization level (for management accounts of an organization only), account level, and resource level. For more information, see Activating enhanced infrastructure metrics in the Compute Optimizer User Guide. You cannot create recommendation preferences for Auto Scaling groups at the organization and account levels. You can create recommendation preferences for Auto Scaling groups only at the resource level by specifying a scope name of ResourceArn and a scope value of the Auto Scaling group Amazon Resource Name (ARN). This will configure the preference for all instances that are part of the specified Auto Scaling group. You also cannot create recommendation preferences at the resource level for instances that are part of an Auto Scaling group. You can create recommendation preferences at the resource level only for standalone instances.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ScopeName"
          description: "The name of the scope. The following scopes are possible: Organization - Specifies that the recommendation preference applies at the organization level, for all member accounts of an organization. AccountId - Specifies that the recommendation preference applies at the account level, for all resources of a given resource type in an account. ResourceArn - Specifies that the recommendation preference applies at the individual resource level."
        value:
          $ref: "#/components/schemas/ScopeValue"
          description: "The value of the scope. If you specified the name of the scope as: Organization - The value must be ALL_ACCOUNTS. AccountId - The value must be a 12-digit Amazon Web Services account ID. ResourceArn - The value must be the Amazon Resource Name (ARN) of an EC2 instance or an Auto Scaling group. Only EC2 instance and Auto Scaling group ARNs are currently supported."
    ScopeName:
      type: string
      enum:
        - Organization
        - AccountId
        - ResourceArn
    ScopeValue:
      type: string
    RecommendationPreferenceNames:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationPreferenceName"
    RecommendationPreferenceName:
      type: string
      enum:
        - EnhancedInfrastructureMetrics
        - InferredWorkloadTypes
        - ExternalMetricsPreference
        - LookBackPeriodPreference
        - PreferredResources
        - UtilizationPreferences
    DeleteRecommendationPreferencesResponse:
      type: object
    JobIds:
      type: array
      items:
        $ref: "#/components/schemas/JobId"
    JobId:
      type: string
    JobFilters:
      type: array
      items:
        $ref: "#/components/schemas/JobFilter"
    JobFilter:
      description: Describes a filter that returns a more specific list of recommendation export jobs. Use this filter with the DescribeRecommendationExportJobs action. You can use EBSFilter with the GetEBSVolumeRecommendations action, LambdaFunctionRecommendationFilter with the GetLambdaFunctionRecommendations action, and Filter with the GetAutoScalingGroupRecommendations and GetEC2InstanceRecommendations actions.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/JobFilterName"
          description: The name of the filter. Specify ResourceType to return export jobs of a specific resource type (for example, Ec2Instance). Specify JobStatus to return export jobs with a specific status (e.g, Complete).
        values:
          $ref: "#/components/schemas/FilterValues"
          description: "The value of the filter. The valid values for this parameter are as follows, depending on what you specify for the name parameter: Specify Ec2Instance or AutoScalingGroup if you specify the name parameter as ResourceType. There is no filter for EBS volumes because volume recommendations cannot be exported at this time. Specify Queued, InProgress, Complete, or Failed if you specify the name parameter as JobStatus."
    JobFilterName:
      type: string
      enum:
        - ResourceType
        - JobStatus
    FilterValues:
      type: array
      items:
        $ref: "#/components/schemas/FilterValue"
    FilterValue:
      type: string
    NextToken:
      type: string
    MaxResults:
      type: integer
      minimum: 0
      maximum: 1000
    DescribeRecommendationExportJobsResponse:
      type: object
      properties:
        recommendationExportJobs:
          $ref: "#/components/schemas/RecommendationExportJobs"
          description: An array of objects that describe recommendation export jobs.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to advance to the next page of export jobs. This value is null when there are no more pages of export jobs to return.
    RecommendationExportJobs:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationExportJob"
    RecommendationExportJob:
      description: Describes a recommendation export job. Use the DescribeRecommendationExportJobs action to view your recommendation export jobs. Use the ExportAutoScalingGroupRecommendations or ExportEC2InstanceRecommendations actions to request an export of your recommendations.
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/JobId"
          description: The identification number of the export job.
        destination:
          $ref: "#/components/schemas/ExportDestination"
          description: An object that describes the destination of the export file.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type of the exported recommendations.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the export job.
        creationTimestamp:
          $ref: "#/components/schemas/CreationTimestamp"
          description: The timestamp of when the export job was created.
        lastUpdatedTimestamp:
          $ref: "#/components/schemas/LastUpdatedTimestamp"
          description: The timestamp of when the export job was last updated.
        failureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason for an export job failure.
    ExportDestination:
      description: Describes the destination of the recommendations export and metadata files.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Destination"
          description: An object that describes the destination Amazon Simple Storage Service (Amazon S3) bucket name and object keys of a recommendations export file, and its associated metadata file.
    S3Destination:
      description: Describes the destination Amazon Simple Storage Service (Amazon S3) bucket name and object keys of a recommendations export file, and its associated metadata file.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/DestinationBucket"
          description: The name of the Amazon S3 bucket used as the destination of an export file.
        key:
          $ref: "#/components/schemas/DestinationKey"
          description: The Amazon S3 bucket key of an export file. The key uniquely identifies the object, or export file, in the S3 bucket.
        metadataKey:
          $ref: "#/components/schemas/MetadataKey"
          description: The Amazon S3 bucket key of a metadata file. The key uniquely identifies the object, or metadata file, in the S3 bucket.
    DestinationBucket:
      type: string
    DestinationKey:
      type: string
    MetadataKey:
      type: string
    JobStatus:
      type: string
      enum:
        - Queued
        - InProgress
        - Complete
        - Failed
    CreationTimestamp:
      type: string
      format: date-time
    LastUpdatedTimestamp:
      type: string
      format: date-time
    FailureReason:
      type: string
    AccountIds:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
    Filters:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: Describes a filter that returns a more specific list of recommendations. Use this filter with the GetAutoScalingGroupRecommendations and GetEC2InstanceRecommendations actions. You can use EBSFilter with the GetEBSVolumeRecommendations action, LambdaFunctionRecommendationFilter with the GetLambdaFunctionRecommendations action, and JobFilter with the DescribeRecommendationExportJobs action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FilterName"
          description: The name of the filter. Specify Finding to return recommendations with a specific finding classification. For example, Underprovisioned. Specify RecommendationSourceType to return recommendations of a specific resource type. For example, Ec2Instance. Specify FindingReasonCodes to return recommendations with a specific finding reason code. For example, CPUUnderprovisioned. Specify InferredWorkloadTypes to return recommendations of a specific inferred workload. For example, Redis. You can filter your EC2 instance recommendations by tag:key and tag-key tags. A tag:key is a key and value combination of a tag assigned to your recommendations. Use the tag key in the filter name and the tag value as the filter value. For example, to find all recommendations that have a tag with the key of Owner and the value of TeamA, specify tag:Owner for the filter name and TeamA for the filter value. A tag-key is the key of a tag assigned to your recommendations. Use this filter to find all of your recommendations that have a tag with a specific key. This doesn’t consider the tag value. For example, you can find your recommendations with a tag key value of Owner or without any tag keys assigned.
        values:
          $ref: "#/components/schemas/FilterValues"
          description: "The value of the filter. The valid values for this parameter are as follows, depending on what you specify for the name parameter and the resource type that you wish to filter results for: Specify Optimized or NotOptimized if you specify the name parameter as Finding and you want to filter results for Auto Scaling groups. Specify Underprovisioned, Overprovisioned, or Optimized if you specify the name parameter as Finding and you want to filter results for EC2 instances. Specify Ec2Instance or AutoScalingGroup if you specify the name parameter as RecommendationSourceType. Specify one of the following options if you specify the name parameter as FindingReasonCodes: CPUOverprovisioned — The instance’s CPU configuration can be sized down while still meeting the performance requirements of your workload. CPUUnderprovisioned — The instance’s CPU configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better CPU performance. MemoryOverprovisioned — The instance’s memory configuration can be sized down while still meeting the performance requirements of your workload. MemoryUnderprovisioned — The instance’s memory configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better memory performance. EBSThroughputOverprovisioned — The instance’s EBS throughput configuration can be sized down while still meeting the performance requirements of your workload. EBSThroughputUnderprovisioned — The instance’s EBS throughput configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better EBS throughput performance. EBSIOPSOverprovisioned — The instance’s EBS IOPS configuration can be sized down while still meeting the performance requirements of your workload. EBSIOPSUnderprovisioned — The instance’s EBS IOPS configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better EBS IOPS performance. NetworkBandwidthOverprovisioned — The instance’s network bandwidth configuration can be sized down while still meeting the performance requirements of your workload. NetworkBandwidthUnderprovisioned — The instance’s network bandwidth configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better network bandwidth performance. This finding reason happens when the NetworkIn or NetworkOut performance of an instance is impacted. NetworkPPSOverprovisioned — The instance’s network PPS (packets per second) configuration can be sized down while still meeting the performance requirements of your workload. NetworkPPSUnderprovisioned — The instance’s network PPS (packets per second) configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better network PPS performance. DiskIOPSOverprovisioned — The instance’s disk IOPS configuration can be sized down while still meeting the performance requirements of your workload. DiskIOPSUnderprovisioned — The instance’s disk IOPS configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better disk IOPS performance. DiskThroughputOverprovisioned — The instance’s disk throughput configuration can be sized down while still meeting the performance requirements of your workload. DiskThroughputUnderprovisioned — The instance’s disk throughput configuration doesn't meet the performance requirements of your workload and there is an alternative instance type that provides better disk throughput performance."
    FilterName:
      type: string
      enum:
        - Finding
        - FindingReasonCodes
        - RecommendationSourceType
        - InferredWorkloadTypes
    ExportableAutoScalingGroupFields:
      type: array
      items:
        $ref: "#/components/schemas/ExportableAutoScalingGroupField"
    ExportableAutoScalingGroupField:
