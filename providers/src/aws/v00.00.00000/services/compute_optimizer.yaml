    MinSize:
      type: integer
    MaxSize:
      type: integer
    NullableInstanceType:
      type: string
    AllocationStrategy:
      type: string
      enum:
        - Prioritized
        - LowestPrice
    NullableEstimatedInstanceHourReductionPercentage:
