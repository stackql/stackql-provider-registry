    AutoScalingGroupRecommendationOptions:
      type: array
      items:
        $ref: "#/components/schemas/AutoScalingGroupRecommendationOption"
    AutoScalingGroupRecommendationOption:
      description: Describes a recommendation option for an Auto Scaling group.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/AutoScalingGroupConfiguration"
          description: An array of objects that describe an Auto Scaling group configuration.
        instanceGpuInfo:
          $ref: "#/components/schemas/GpuInfo"
          description: Describes the GPU accelerator settings for the recommended instance type of the Auto Scaling group.
        projectedUtilizationMetrics:
          $ref: "#/components/schemas/ProjectedUtilizationMetrics"
          description: An array of objects that describe the projected utilization metrics of the Auto Scaling group recommendation option. The Cpu and Memory metrics are the only projected utilization metrics returned. Additionally, the Memory metric is returned only for resources that have the unified CloudWatch agent installed on them. For more information, see Enabling Memory Utilization with the CloudWatch Agent.
        performanceRisk:
          $ref: "#/components/schemas/PerformanceRisk"
          description: The performance risk of the Auto Scaling group configuration recommendation. Performance risk indicates the likelihood of the recommended instance type not meeting the resource needs of your workload. Compute Optimizer calculates an individual performance risk score for each specification of the recommended instance, including CPU, memory, EBS throughput, EBS IOPS, disk throughput, disk IOPS, network throughput, and network PPS. The performance risk of the recommended instance is calculated as the maximum performance risk score across the analyzed resource specifications. The value ranges from 0 - 4, with 0 meaning that the recommended resource is predicted to always provide enough hardware capability. The higher the performance risk is, the more likely you should validate whether the recommendation will meet the performance requirements of your workload before migrating your resource.
        rank:
          $ref: "#/components/schemas/Rank"
          description: The rank of the Auto Scaling group recommendation option. The top recommendation option is ranked as 1.
        savingsOpportunity:
          $ref: "#/components/schemas/SavingsOpportunity"
          description: An object that describes the savings opportunity for the Auto Scaling group recommendation option. Savings opportunity includes the estimated monthly savings amount and percentage.
        savingsOpportunityAfterDiscounts:
          $ref: "#/components/schemas/AutoScalingGroupSavingsOpportunityAfterDiscounts"
          description: An object that describes the savings opportunity for the Auto Scaling group recommendation option that includes Savings Plans and Reserved Instances discounts. Savings opportunity includes the estimated monthly savings and percentage.
        migrationEffort:
          $ref: "#/components/schemas/MigrationEffort"
          description: The level of effort required to migrate from the current instance type to the recommended instance type. For example, the migration effort is Low if Amazon EMR is the inferred workload type and an Amazon Web Services Graviton instance type is recommended. The migration effort is Medium if a workload type couldn't be inferred but an Amazon Web Services Graviton instance type is recommended. The migration effort is VeryLow if both the current and recommended instance types are of the same CPU architecture.
    ProjectedUtilizationMetrics:
      type: array
      items:
        $ref: "#/components/schemas/UtilizationMetric"
    PerformanceRisk:
      type: number
      format: double
      minimum: 0
      maximum: 4
    Rank:
      type: integer
    SavingsOpportunity:
      description: Describes the savings opportunity for recommendations of a given resource type or for the recommendation option of an individual resource. Savings opportunity represents the estimated monthly savings you can achieve by implementing a given Compute Optimizer recommendation. Savings opportunity data requires that you opt in to Cost Explorer, as well as activate Receive Amazon EC2 resource recommendations in the Cost Explorer preferences page. That creates a connection between Cost Explorer and Compute Optimizer. With this connection, Cost Explorer generates savings estimates considering the price of existing resources, the price of recommended resources, and historical usage data. Estimated monthly savings reflects the projected dollar savings associated with each of the recommendations generated. For more information, see Enabling Cost Explorer and Optimizing your cost with Rightsizing Recommendations in the Cost Management User Guide.
      type: object
      properties:
        savingsOpportunityPercentage:
          $ref: "#/components/schemas/SavingsOpportunityPercentage"
          description: The estimated monthly savings possible as a percentage of monthly cost by adopting Compute Optimizer recommendations for a given resource.
        estimatedMonthlySavings:
          $ref: "#/components/schemas/EstimatedMonthlySavings"
          description: An object that describes the estimated monthly savings amount possible by adopting Compute Optimizer recommendations for a given resource. This is based on the On-Demand instance pricing..
    SavingsOpportunityPercentage:
      type: number
      format: double
    EstimatedMonthlySavings:
      description: Describes the estimated monthly savings amount possible, based on On-Demand instance pricing, by adopting Compute Optimizer recommendations for a given resource. For more information, see Estimated monthly savings and savings opportunities in the Compute Optimizer User Guide.
      type: object
      properties:
        currency:
          $ref: "#/components/schemas/Currency"
          description: The currency of the estimated monthly savings.
        value:
          $ref: "#/components/schemas/Value"
          description: The value of the estimated monthly savings.
    Currency:
      type: string
      enum:
        - USD
        - CNY
    Value:
      type: number
      format: double
    AutoScalingGroupSavingsOpportunityAfterDiscounts:
      description: Describes the savings opportunity for Auto Scaling group recommendations after applying the Savings Plans and Reserved Instances discounts. Savings opportunity represents the estimated monthly savings you can achieve by implementing Compute Optimizer recommendations.
      type: object
      properties:
        savingsOpportunityPercentage:
          $ref: "#/components/schemas/SavingsOpportunityPercentage"
          description: The estimated monthly savings possible as a percentage of monthly cost after applying the Savings Plans and Reserved Instances discounts. This saving can be achieved by adopting Compute Optimizer’s Auto Scaling group recommendations.
        estimatedMonthlySavings:
          $ref: "#/components/schemas/AutoScalingGroupEstimatedMonthlySavings"
          description: An object that describes the estimated monthly savings possible by adopting Compute Optimizer’s Auto Scaling group recommendations. This is based on the Savings Plans and Reserved Instances pricing discounts.
    AutoScalingGroupEstimatedMonthlySavings:
      description: An object that describes the estimated monthly savings possible by adopting Compute Optimizer’s Auto Scaling group recommendations. This is based on the Savings Plans and Reserved Instances discounts.
      type: object
      properties:
        currency:
          $ref: "#/components/schemas/Currency"
          description: The currency of the estimated monthly savings.
        value:
          $ref: "#/components/schemas/Value"
          description: The value of the estimated monthly savings.
    MigrationEffort:
      type: string
      enum:
        - VeryLow
        - Low
        - Medium
        - High
    LastRefreshTimestamp:
      type: string
      format: date-time
    CurrentPerformanceRisk:
      type: string
      enum:
        - VeryLow
        - Low
        - Medium
        - High
    EffectiveRecommendationPreferences:
      description: Describes the effective recommendation preferences for a resource.
      type: object
      properties:
        cpuVendorArchitectures:
          $ref: "#/components/schemas/CpuVendorArchitectures"
          description: "Describes the CPU vendor and architecture for an instance or Auto Scaling group recommendations. For example, when you specify AWS_ARM64 with: A GetEC2InstanceRecommendations or GetAutoScalingGroupRecommendations request, Compute Optimizer returns recommendations that consist of Graviton instance types only. A GetEC2RecommendationProjectedMetrics request, Compute Optimizer returns projected utilization metrics for Graviton instance type recommendations only. A ExportEC2InstanceRecommendations or ExportAutoScalingGroupRecommendations request, Compute Optimizer exports recommendations that consist of Graviton instance types only."
        enhancedInfrastructureMetrics:
          $ref: "#/components/schemas/EnhancedInfrastructureMetrics"
          description: Describes the activation status of the enhanced infrastructure metrics preference. A status of Active confirms that the preference is applied in the latest recommendation refresh, and a status of Inactive confirms that it's not yet applied to recommendations. For more information, see Enhanced infrastructure metrics in the Compute Optimizer User Guide.
        inferredWorkloadTypes:
          $ref: "#/components/schemas/InferredWorkloadTypesPreference"
          description: Describes the activation status of the inferred workload types preference. A status of Active confirms that the preference is applied in the latest recommendation refresh. A status of Inactive confirms that it's not yet applied to recommendations.
        externalMetricsPreference:
          $ref: "#/components/schemas/ExternalMetricsPreference"
          description: An object that describes the external metrics recommendation preference. If the preference is applied in the latest recommendation refresh, an object with a valid source value appears in the response. If the preference isn't applied to the recommendations already, then this object doesn't appear in the response.
        lookBackPeriod:
          $ref: "#/components/schemas/LookBackPeriodPreference"
          description: The number of days the utilization metrics of the Amazon Web Services resource are analyzed.
        utilizationPreferences:
          $ref: "#/components/schemas/UtilizationPreferences"
          description: The resource’s CPU and memory utilization preferences, such as threshold and headroom, that are used to generate rightsizing recommendations. This preference is only available for the Amazon EC2 instance resource type.
        preferredResources:
          $ref: "#/components/schemas/EffectivePreferredResources"
          description: The resource type values that are considered as candidates when generating rightsizing recommendations.
        savingsEstimationMode:
          $ref: "#/components/schemas/InstanceSavingsEstimationMode"
          description: Describes the savings estimation mode applied for calculating savings opportunity for a resource.
    EnhancedInfrastructureMetrics:
