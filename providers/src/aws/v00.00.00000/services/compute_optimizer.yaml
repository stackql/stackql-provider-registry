    GetRecommendationPreferencesResponse:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to advance to the next page of recommendation preferences. This value is null when there are no more pages of recommendation preferences to return.
        recommendationPreferencesDetails:
          $ref: "#/components/schemas/RecommendationPreferencesDetails"
          description: An array of objects that describe recommendation preferences.
    RecommendationPreferencesDetails:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationPreferencesDetail"
    RecommendationPreferencesDetail:
      description: Describes a recommendation preference.
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/Scope"
          description: An object that describes the scope of the recommendation preference. Recommendation preferences can be created at the organization level (for management accounts of an organization only), account level, and resource level. For more information, see Activating enhanced infrastructure metrics in the Compute Optimizer User Guide.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The target resource type of the recommendation preference to create. The Ec2Instance option encompasses standalone instances and instances that are part of Auto Scaling groups. The AutoScalingGroup option encompasses only instances that are part of an Auto Scaling group.
        enhancedInfrastructureMetrics:
          $ref: "#/components/schemas/EnhancedInfrastructureMetrics"
          description: The status of the enhanced infrastructure metrics recommendation preference. When the recommendations page is refreshed, a status of Active confirms that the preference is applied to the recommendations, and a status of Inactive confirms that the preference isn't yet applied to recommendations. For more information, see Enhanced infrastructure metrics in the Compute Optimizer User Guide.
        inferredWorkloadTypes:
          $ref: "#/components/schemas/InferredWorkloadTypesPreference"
          description: The status of the inferred workload types recommendation preference. When the recommendations page is refreshed, a status of Active confirms that the preference is applied to the recommendations, and a status of Inactive confirms that the preference isn't yet applied to recommendations.
        externalMetricsPreference:
          $ref: "#/components/schemas/ExternalMetricsPreference"
          description: An object that describes the external metrics recommendation preference. If the preference is applied in the latest recommendation refresh, an object with a valid source value appears in the response. If the preference isn't applied to the recommendations already, then this object doesn't appear in the response.
        lookBackPeriod:
          $ref: "#/components/schemas/LookBackPeriodPreference"
          description: The preference to control the number of days the utilization metrics of the Amazon Web Services resource are analyzed. If the preference isn’t set, this object is null.
        utilizationPreferences:
          $ref: "#/components/schemas/UtilizationPreferences"
          description: The preference to control the resource’s CPU utilization threshold, CPU utilization headroom, and memory utilization headroom. If the preference isn’t set, this object is null. This preference is only available for the Amazon EC2 instance resource type.
        preferredResources:
          $ref: "#/components/schemas/EffectivePreferredResources"
          description: The preference to control which resource type values are considered when generating rightsizing recommendations. This object resolves any wildcard expressions and returns the effective list of candidate resource type values. If the preference isn’t set, this object is null.
        savingsEstimationMode:
          $ref: "#/components/schemas/SavingsEstimationMode"
          description: Describes the savings estimation mode used for calculating savings opportunity. Only the account manager or delegated administrator of your organization can activate this preference.
    SavingsEstimationMode:
      type: string
      enum:
        - AfterDiscounts
        - BeforeDiscounts
    GetRecommendationSummariesResponse:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to advance to the next page of recommendation summaries. This value is null when there are no more pages of recommendation summaries to return.
        recommendationSummaries:
          $ref: "#/components/schemas/RecommendationSummaries"
          description: An array of objects that summarize a recommendation.
    RecommendationSummaries:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationSummary"
    RecommendationSummary:
      description: A summary of a recommendation.
      type: object
      properties:
        summaries:
          $ref: "#/components/schemas/Summaries"
          description: An array of objects that describe a recommendation summary.
        idleSummaries:
          $ref: "#/components/schemas/IdleSummaries"
          description: Describes the findings summary of the idle resources.
        recommendationResourceType:
          $ref: "#/components/schemas/RecommendationSourceType"
          description: The resource type that the recommendation summary applies to.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the recommendation summary.
        savingsOpportunity:
          $ref: "#/components/schemas/SavingsOpportunity"
          description: An object that describes the savings opportunity for a given resource type. Savings opportunity includes the estimated monthly savings amount and percentage.
        idleSavingsOpportunity:
          $ref: "#/components/schemas/SavingsOpportunity"
        aggregatedSavingsOpportunity:
          $ref: "#/components/schemas/SavingsOpportunity"
        currentPerformanceRiskRatings:
          $ref: "#/components/schemas/CurrentPerformanceRiskRatings"
          description: An object that describes the performance risk ratings for a given resource type.
        inferredWorkloadSavings:
          $ref: "#/components/schemas/InferredWorkloadSavings"
          description: An array of objects that describes the estimated monthly saving amounts for the instances running on the specified inferredWorkloadTypes. The array contains the top five savings opportunites for the instances that run inferred workload types.
    Summaries:
      type: array
      items:
        $ref: "#/components/schemas/Summary"
    Summary:
      description: The summary of a recommendation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Finding"
          description: The finding classification of the recommendation.
        value:
          $ref: "#/components/schemas/SummaryValue"
          description: The value of the recommendation summary.
        reasonCodeSummaries:
          $ref: "#/components/schemas/ReasonCodeSummaries"
          description: An array of objects that summarize a finding reason code.
    SummaryValue:
      type: number
      format: double
    ReasonCodeSummaries:
      type: array
      items:
        $ref: "#/components/schemas/ReasonCodeSummary"
    ReasonCodeSummary:
      description: A summary of a finding reason code.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/FindingReasonCode"
          description: The name of the finding reason code.
        value:
          $ref: "#/components/schemas/SummaryValue"
          description: The value of the finding reason code summary.
    FindingReasonCode:
      type: string
      enum:
        - MemoryOverprovisioned
        - MemoryUnderprovisioned
    IdleSummaries:
      type: array
      items:
        $ref: "#/components/schemas/IdleSummary"
    IdleSummary:
      description: Describes the findings summary of the idle resources.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/IdleFinding"
          description: The name of the finding group for the idle resources.
        value:
          $ref: "#/components/schemas/SummaryValue"
          description: The count of idle resources in the finding group.
    CurrentPerformanceRiskRatings:
      description: Describes the performance risk ratings for a given resource type. Resources with a high or medium rating are at risk of not meeting the performance needs of their workloads, while resources with a low rating are performing well in their workloads.
      type: object
      properties:
        high:
          $ref: "#/components/schemas/High"
          description: A count of the applicable resource types with a high performance risk rating.
        medium:
          $ref: "#/components/schemas/Medium"
          description: A count of the applicable resource types with a medium performance risk rating.
        low:
          $ref: "#/components/schemas/Low"
          description: A count of the applicable resource types with a low performance risk rating.
        veryLow:
          $ref: "#/components/schemas/VeryLow"
          description: A count of the applicable resource types with a very low performance risk rating.
    High:
      type: integer
      format: int64
    Medium:
      type: integer
      format: int64
    Low:
      type: integer
      format: int64
    VeryLow:
      type: integer
      format: int64
    InferredWorkloadSavings:
      type: array
      items:
        $ref: "#/components/schemas/InferredWorkloadSaving"
    InferredWorkloadSaving:
      description: The estimated monthly savings after you adjust the configurations of your instances running on the inferred workload types to the recommended configurations. If the inferredWorkloadTypes list contains multiple entries, then the savings are the sum of the monthly savings from instances that run the exact combination of the inferred workload types.
      type: object
      properties:
        inferredWorkloadTypes:
          $ref: "#/components/schemas/InferredWorkloadTypes"
          description: "The applications that might be running on the instance as inferred by Compute Optimizer. Compute Optimizer can infer if one of the following applications might be running on the instance: AmazonEmr - Infers that Amazon EMR might be running on the instance. ApacheCassandra - Infers that Apache Cassandra might be running on the instance. ApacheHadoop - Infers that Apache Hadoop might be running on the instance. Memcached - Infers that Memcached might be running on the instance. NGINX - Infers that NGINX might be running on the instance. PostgreSql - Infers that PostgreSQL might be running on the instance. Redis - Infers that Redis might be running on the instance. Kafka - Infers that Kafka might be running on the instance. SQLServer - Infers that SQLServer might be running on the instance."
        estimatedMonthlySavings:
          $ref: "#/components/schemas/EstimatedMonthlySavings"
          description: An object that describes the estimated monthly savings amount possible by adopting Compute Optimizer recommendations for a given resource. This is based on the On-Demand instance pricing.
    PreferredResources:
      type: array
      items:
        $ref: "#/components/schemas/PreferredResource"
    PreferredResource:
      description: The preference to control which resource type values are considered when generating rightsizing recommendations. You can specify this preference as a combination of include and exclude lists. You must specify either an includeList or excludeList. If the preference is an empty set of resource type values, an error occurs. For more information, see Rightsizing recommendation preferences in the Compute Optimizer User Guide. This preference is only available for the Amazon EC2 instance and Auto Scaling group resource types. Compute Optimizer only supports the customization of Ec2InstanceTypes.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/PreferredResourceName"
          description: The type of preferred resource to customize. Compute Optimizer only supports the customization of Ec2InstanceTypes.
        includeList:
          $ref: "#/components/schemas/PreferredResourceValues"
          description: The preferred resource type values to include in the recommendation candidates. You can specify the exact resource type value, such as m5.large, or use wild card expressions, such as m5. If this isn’t specified, all supported resources are included by default. You can specify up to 1000 values in this list.
        excludeList:
          $ref: "#/components/schemas/PreferredResourceValues"
          description: The preferred resource type values to exclude from the recommendation candidates. If this isn’t specified, all supported resources are included by default. You can specify up to 1000 values in this list.
    PutRecommendationPreferencesResponse:
      type: object
    UpdateEnrollmentStatusResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/Status"
          description: The enrollment status of the account.
        statusReason:
          $ref: "#/components/schemas/StatusReason"
          description: The reason for the enrollment status of the account. For example, an account might show a status of Pending because member accounts of an organization require more time to be enrolled in the service.
