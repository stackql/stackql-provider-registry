    Timestamp:
      type: string
      format: date-time
    GetEC2RecommendationProjectedMetricsResponse:
      type: object
      properties:
        recommendedOptionProjectedMetrics:
          $ref: "#/components/schemas/RecommendedOptionProjectedMetrics"
          description: An array of objects that describes projected metrics.
    RecommendedOptionProjectedMetrics:
      type: array
      items:
        $ref: "#/components/schemas/RecommendedOptionProjectedMetric"
    RecommendedOptionProjectedMetric:
      description: Describes a projected utilization metric of a recommendation option. The Cpu and Memory metrics are the only projected utilization metrics returned when you run the GetEC2RecommendationProjectedMetrics action. Additionally, the Memory metric is returned only for resources that have the unified CloudWatch agent installed on them. For more information, see Enabling Memory Utilization with the CloudWatch Agent.
      type: object
      properties:
        recommendedInstanceType:
          $ref: "#/components/schemas/RecommendedInstanceType"
          description: The recommended instance type.
        rank:
          $ref: "#/components/schemas/Rank"
          description: The rank of the recommendation option projected metric. The top recommendation option is ranked as 1. The projected metric rank correlates to the recommendation option rank. For example, the projected metric ranked as 1 is related to the recommendation option that is also ranked as 1 in the same response.
        projectedMetrics:
          $ref: "#/components/schemas/ProjectedMetrics"
          description: An array of objects that describe a projected utilization metric.
    RecommendedInstanceType:
      type: string
    ProjectedMetrics:
      type: array
      items:
        $ref: "#/components/schemas/ProjectedMetric"
    ProjectedMetric:
      description: Describes a projected utilization metric of a recommendation option, such as an Amazon EC2 instance. This represents the projected utilization of a recommendation option had you used that resource during the analyzed period. Compare the utilization metric data of your resource against its projected utilization metric data to determine the performance difference between your current resource and the recommended option. The Cpu, Memory, GPU, and GPU_MEMORY metrics are the only projected utilization metrics returned when you run the GetEC2RecommendationProjectedMetrics action. Additionally, these metrics are only returned for resources with the unified CloudWatch agent installed on them. For more information, see Enabling Memory Utilization with the CloudWatch Agent and Enabling NVIDIA GPU utilization with the CloudWatch Agent.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/MetricName"
          description: "The name of the projected utilization metric. The following projected utilization metrics are returned: Cpu - The projected percentage of allocated EC2 compute units that would be in use on the recommendation option had you used that resource during the analyzed period. This metric identifies the processing power required to run an application on the recommendation option. Depending on the instance type, tools in your operating system can show a lower percentage than CloudWatch when the instance is not allocated a full processor core. Memory - The percentage of memory that would be in use on the recommendation option had you used that resource during the analyzed period. This metric identifies the amount of memory required to run an application on the recommendation option. Units: Percent The Memory metric is only returned for resources with the unified CloudWatch agent installed on them. For more information, see Enabling Memory Utilization with the CloudWatch Agent. GPU - The projected percentage of allocated GPUs if you adjust your configurations to Compute Optimizer's recommendation option. GPU_MEMORY - The projected percentage of total GPU memory if you adjust your configurations to Compute Optimizer's recommendation option. The GPU and GPU_MEMORY metrics are only returned for resources with the unified CloudWatch Agent installed on them. For more information, see Enabling NVIDIA GPU utilization with the CloudWatch Agent."
        timestamps:
          $ref: "#/components/schemas/Timestamps"
          description: The timestamps of the projected utilization metric.
        values:
          $ref: "#/components/schemas/MetricValues"
          description: The values of the projected utilization metrics.
    Timestamps:
      type: array
      items:
        $ref: "#/components/schemas/Timestamp"
    MetricValues:
      type: array
      items:
        $ref: "#/components/schemas/MetricValue"
    ServiceArn:
      type: string
    GetECSServiceRecommendationProjectedMetricsResponse:
      type: object
      properties:
        recommendedOptionProjectedMetrics:
          $ref: "#/components/schemas/ECSServiceRecommendedOptionProjectedMetrics"
          description: An array of objects that describes the projected metrics.
    ECSServiceRecommendedOptionProjectedMetrics:
      type: array
      items:
        $ref: "#/components/schemas/ECSServiceRecommendedOptionProjectedMetric"
    ECSServiceRecommendedOptionProjectedMetric:
      description: Describes the projected metrics of an Amazon ECS service recommendation option. To determine the performance difference between your current Amazon ECS service and the recommended option, compare the metric data of your service against its projected metric data.
      type: object
      properties:
        recommendedCpuUnits:
          $ref: "#/components/schemas/CpuSize"
          description: The recommended CPU size for the Amazon ECS service.
        recommendedMemorySize:
          $ref: "#/components/schemas/MemorySize"
          description: The recommended memory size for the Amazon ECS service.
        projectedMetrics:
          $ref: "#/components/schemas/ECSServiceProjectedMetrics"
          description: An array of objects that describe the projected metric.
    CpuSize:
      type: integer
    MemorySize:
      type: integer
    ECSServiceProjectedMetrics:
      type: array
      items:
        $ref: "#/components/schemas/ECSServiceProjectedMetric"
    ECSServiceProjectedMetric:
      description: Describes the projected metrics of an Amazon ECS service recommendation option. To determine the performance difference between your current Amazon ECS service and the recommended option, compare the metric data of your service against its projected metric data.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ECSServiceMetricName"
          description: "The name of the projected metric. The following metrics are available: Cpu — The percentage of allocated compute units that are currently in use on the service tasks. Memory — The percentage of memory that's currently in use on the service tasks."
        timestamps:
          $ref: "#/components/schemas/Timestamps"
          description: The timestamps of the projected metric.
        upperBoundValues:
          $ref: "#/components/schemas/MetricValues"
          description: The upper bound values for the projected metric.
        lowerBoundValues:
          $ref: "#/components/schemas/MetricValues"
