    S3DestinationConfig:
      description: Describes the destination Amazon Simple Storage Service (Amazon S3) bucket name and key prefix for a recommendations export job. You must create the destination Amazon S3 bucket for your recommendations export before you create the export job. Compute Optimizer does not create the S3 bucket for you. After you create the S3 bucket, ensure that it has the required permission policy to allow Compute Optimizer to write the export file to it. If you plan to specify an object prefix when you create the export job, you must include the object prefix in the policy that you add to the S3 bucket. For more information, see Amazon S3 Bucket Policy for Compute Optimizer in the Compute Optimizer User Guide.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/DestinationBucket"
          description: The name of the Amazon S3 bucket to use as the destination for an export job.
        keyPrefix:
          $ref: "#/components/schemas/DestinationKeyPrefix"
          description: The Amazon S3 bucket prefix for an export job.
    DestinationKeyPrefix:
      type: string
    FileFormat:
      type: string
      enum:
        - Csv
    IncludeMemberAccounts:
      type: boolean
    RecommendationPreferences:
      description: Describes the recommendation preferences to return in the response of a GetAutoScalingGroupRecommendations, GetEC2InstanceRecommendations, GetEC2RecommendationProjectedMetrics, GetRDSDatabaseRecommendations, and GetRDSDatabaseRecommendationProjectedMetrics request.
      type: object
      properties:
        cpuVendorArchitectures:
          $ref: "#/components/schemas/CpuVendorArchitectures"
          description: "Specifies the CPU vendor and architecture for Amazon EC2 instance and Auto Scaling group recommendations. For example, when you specify AWS_ARM64 with: A GetEC2InstanceRecommendations or GetAutoScalingGroupRecommendations request, Compute Optimizer returns recommendations that consist of Graviton instance types only. A GetEC2RecommendationProjectedMetrics request, Compute Optimizer returns projected utilization metrics for Graviton instance type recommendations only. A ExportEC2InstanceRecommendations or ExportAutoScalingGroupRecommendations request, Compute Optimizer exports recommendations that consist of Graviton instance types only."
    CpuVendorArchitectures:
      type: array
      items:
        $ref: "#/components/schemas/CpuVendorArchitecture"
    CpuVendorArchitecture:
      type: string
      enum:
        - AWS_ARM64
        - CURRENT
    ExportAutoScalingGroupRecommendationsResponse:
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/JobId"
          description: The identification number of the export job. Use the DescribeRecommendationExportJobs action, and specify the job ID to view the status of an export job.
        s3Destination:
          $ref: "#/components/schemas/S3Destination"
          description: An object that describes the destination Amazon S3 bucket of a recommendations export file.
    EBSFilters:
      type: array
      items:
        $ref: "#/components/schemas/EBSFilter"
    EBSFilter:
      description: Describes a filter that returns a more specific list of Amazon Elastic Block Store (Amazon EBS) volume recommendations. Use this filter with the GetEBSVolumeRecommendations action. You can use LambdaFunctionRecommendationFilter with the GetLambdaFunctionRecommendations action, JobFilter with the DescribeRecommendationExportJobs action, and Filter with the GetAutoScalingGroupRecommendations and GetEC2InstanceRecommendations actions.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/EBSFilterName"
          description: The name of the filter. Specify Finding to return recommendations with a specific finding classification (for example, NotOptimized). You can filter your Amazon EBS volume recommendations by tag:key and tag-key tags. A tag:key is a key and value combination of a tag assigned to your Amazon EBS volume recommendations. Use the tag key in the filter name and the tag value as the filter value. For example, to find all Amazon EBS volume recommendations that have a tag with the key of Owner and the value of TeamA, specify tag:Owner for the filter name and TeamA for the filter value. A tag-key is the key of a tag assigned to your Amazon EBS volume recommendations. Use this filter to find all of your Amazon EBS volume recommendations that have a tag with a specific key. This doesn’t consider the tag value. For example, you can find your Amazon EBS volume recommendations with a tag key value of Owner or without any tag keys assigned.
        values:
          $ref: "#/components/schemas/FilterValues"
          description: The value of the filter. The valid values are Optimized, or NotOptimized.
    EBSFilterName:
      type: string
      enum:
        - Finding
