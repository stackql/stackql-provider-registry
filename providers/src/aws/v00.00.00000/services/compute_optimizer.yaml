          description: "The headroom value in percentage used for the specified metric parameter. The following lists the valid values for CPU and memory utilization. CPU utilization: PERCENT_30 | PERCENT_20 | PERCENT_0 Memory utilization: PERCENT_30 | PERCENT_20 | PERCENT_10"
    CustomizableMetricThreshold:
