      properties:
        functionArn:
          $ref: "#/components/schemas/FunctionArn"
          description: The Amazon Resource Name (ARN) of the current function.
        functionVersion:
          $ref: "#/components/schemas/FunctionVersion"
          description: The version number of the current function.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the function.
        currentMemorySize:
          $ref: "#/components/schemas/MemorySize"
          description: The amount of memory, in MB, that's allocated to the current function.
        numberOfInvocations:
          $ref: "#/components/schemas/NumberOfInvocations"
          description: The number of times your function code was applied during the look-back period.
        utilizationMetrics:
          $ref: "#/components/schemas/LambdaFunctionUtilizationMetrics"
          description: An array of objects that describe the utilization metrics of the function.
        lookbackPeriodInDays:
          $ref: "#/components/schemas/LookBackPeriodInDays"
          description: The number of days for which utilization metrics were analyzed for the function.
        lastRefreshTimestamp:
          $ref: "#/components/schemas/LastRefreshTimestamp"
          description: The timestamp of when the function recommendation was last generated.
        finding:
          $ref: "#/components/schemas/LambdaFunctionRecommendationFinding"
          description: "The finding classification of the function. Findings for functions include: Optimized — The function is correctly provisioned to run your workload based on its current configuration and its utilization history. This finding classification does not include finding reason codes. NotOptimized — The function is performing at a higher level (over-provisioned) or at a lower level (under-provisioned) than required for your workload because its current configuration is not optimal. Over-provisioned resources might lead to unnecessary infrastructure cost, and under-provisioned resources might lead to poor application performance. This finding classification can include the MemoryUnderprovisioned and MemoryUnderprovisioned finding reason codes. Unavailable — Compute Optimizer was unable to generate a recommendation for the function. This could be because the function has not accumulated sufficient metric data, or the function does not qualify for a recommendation. This finding classification can include the InsufficientData and Inconclusive finding reason codes. Functions with a finding of unavailable are not returned unless you specify the filter parameter with a value of Unavailable in your GetLambdaFunctionRecommendations request."
        findingReasonCodes:
          $ref: "#/components/schemas/LambdaFunctionRecommendationFindingReasonCodes"
          description: "The reason for the finding classification of the function. Functions that have a finding classification of Optimized don't have a finding reason code. Finding reason codes for functions include: MemoryOverprovisioned — The function is over-provisioned when its memory configuration can be sized down while still meeting the performance requirements of your workload. An over-provisioned function might lead to unnecessary infrastructure cost. This finding reason code is part of the NotOptimized finding classification. MemoryUnderprovisioned — The function is under-provisioned when its memory configuration doesn't meet the performance requirements of the workload. An under-provisioned function might lead to poor application performance. This finding reason code is part of the NotOptimized finding classification. InsufficientData — The function does not have sufficient metric data for Compute Optimizer to generate a recommendation. For more information, see the Supported resources and requirements in the Compute Optimizer User Guide. This finding reason code is part of the Unavailable finding classification. Inconclusive — The function does not qualify for a recommendation because Compute Optimizer cannot generate a recommendation with a high degree of confidence. This finding reason code is part of the Unavailable finding classification."
        memorySizeRecommendationOptions:
          $ref: "#/components/schemas/LambdaFunctionMemoryRecommendationOptions"
          description: An array of objects that describe the memory configuration recommendation options for the function.
        currentPerformanceRisk:
          $ref: "#/components/schemas/CurrentPerformanceRisk"
          description: The risk of the current Lambda function not meeting the performance needs of its workloads. The higher the risk, the more likely the current Lambda function requires more memory.
        effectiveRecommendationPreferences:
          $ref: "#/components/schemas/LambdaEffectiveRecommendationPreferences"
          description: Describes the effective recommendation preferences for Lambda functions.
        tags:
          $ref: "#/components/schemas/Tags"
          description: A list of tags assigned to your Lambda function recommendations.
    FunctionVersion:
      type: string
    NumberOfInvocations:
      type: integer
      format: int64
    LambdaFunctionUtilizationMetrics:
      type: array
      items:
        $ref: "#/components/schemas/LambdaFunctionUtilizationMetric"
    LambdaFunctionUtilizationMetric:
      description: Describes a utilization metric of an Lambda function.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/LambdaFunctionMetricName"
          description: "The name of the utilization metric. The following utilization metrics are available: Duration - The amount of time that your function code spends processing an event. Memory - The amount of memory used per invocation."
        statistic:
          $ref: "#/components/schemas/LambdaFunctionMetricStatistic"
          description: The statistic of the utilization metric. The Compute Optimizer API, Command Line Interface (CLI), and SDKs return utilization metrics using only the Maximum statistic, which is the highest value observed during the specified period. The Compute Optimizer console displays graphs for some utilization metrics using the Average statistic, which is the value of Sum / SampleCount during the specified period. For more information, see Viewing resource recommendations in the Compute Optimizer User Guide. You can also get averaged utilization metric data for your resources using Amazon CloudWatch. For more information, see the Amazon CloudWatch User Guide.
        value:
          $ref: "#/components/schemas/MetricValue"
          description: The value of the utilization metric.
