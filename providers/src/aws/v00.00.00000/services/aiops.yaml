openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS AI Ops
  description: AWS AI Ops
  x-serviceName: aiops
  x-serviceAlias: aiops
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: aiops
servers:
  - url: https://aiops.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for aiops
paths:
  /investigationGroups:
    post:
      operationId: CreateInvestigationGroup
      description: "Creates an investigation group in your account. Creating an investigation group is a one-time setup task for each Region in your account. It is a necessary task to be able to perform investigations. Settings in the investigation group help you centrally manage the common properties of your investigations, such as the following: Who can access the investigations Whether investigation data is encrypted with a customer managed Key Management Service key. How long investigations and their data are retained by default. Currently, you can have one investigation group in each Region in your account. Each investigation in a Region is a part of the investigation group in that Region To create an investigation group and set up CloudWatch investigations, you must be signed in to an IAM principal that has either the AIOpsConsoleAdminPolicy or the AdministratorAccess IAM policy attached, or to an account that has similar permissions. You can configure CloudWatch alarms to start investigations and add events to investigations. If you create your investigation group with CreateInvestigationGroup and you want to enable alarms to do this, you must use PutInvestigationGroupPolicy to create a resource policy that grants this permission to CloudWatch alarms. For more information about configuring CloudWatch alarms, see Using Amazon CloudWatch alarms"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/StringWithPatternAndLengthLimits"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                retentionInDays:
                  $ref: "#/components/schemas/Retention"
                tags:
                  $ref: "#/components/schemas/Tags"
                tagKeyBoundaries:
                  $ref: "#/components/schemas/TagKeyBoundaries"
                chatbotNotificationChannel:
                  $ref: "#/components/schemas/ChatbotNotificationChannel"
                isCloudTrailEventHistoryEnabled:
                  $ref: "#/components/schemas/Boolean"
                crossAccountConfigurations:
                  $ref: "#/components/schemas/CrossAccountConfigurations"
              required:
                - name
                - roleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvestigationGroupOutput"
    get:
      operationId: ListInvestigationGroups
      description: Returns the ARN and name of each investigation group in the account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SensitiveStringWithLengthLimits"
          description: Include this value, if it was returned by the previous operation, to get the next set of service operations.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListInvestigationGroupsInputMaxResultsInteger"
          description: The maximum number of results to return in one operation. If you omit this parameter, the default of 50 is used.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvestigationGroupsOutput"
  /investigationGroups/{identifier}:
    delete:
      operationId: DeleteInvestigationGroup
      description: Deletes the specified investigation group from your account. You can currently have one investigation group per Region in your account. After you delete an investigation group, you can later create a new investigation group in the same Region.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvestigationGroupIdentifier"
          description: Specify either the name or the ARN of the investigation group that you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetInvestigationGroup
      description: Returns the configuration information for the specified investigation group.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvestigationGroupIdentifier"
          description: Specify either the name or the ARN of the investigation group that you want to view. This is used to set the name of the investigation group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInvestigationGroupResponse"
    patch:
      operationId: UpdateInvestigationGroup
      description: Updates the configuration of the specified investigation group.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvestigationGroupIdentifier"
          description: Specify either the name or the ARN of the investigation group that you want to modify.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                tagKeyBoundaries:
                  $ref: "#/components/schemas/TagKeyBoundaries"
                chatbotNotificationChannel:
                  $ref: "#/components/schemas/ChatbotNotificationChannel"
                isCloudTrailEventHistoryEnabled:
                  $ref: "#/components/schemas/Boolean"
                crossAccountConfigurations:
                  $ref: "#/components/schemas/CrossAccountConfigurations"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInvestigationGroupOutput"
  /investigationGroups/{identifier}/policy:
    delete:
      operationId: DeleteInvestigationGroupPolicy
      description: Removes the IAM resource policy from being associated with the investigation group that you specify.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvestigationGroupIdentifier"
          description: Specify either the name or the ARN of the investigation group that you want to remove the policy from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInvestigationGroupPolicyOutput"
    get:
      operationId: GetInvestigationGroupPolicy
      description: Returns the JSON of the IAM resource policy associated with the specified investigation group in a string. For example, {\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"Service\":\"aiops.alarms.cloudwatch.amazonaws.com\"},\"Action\":[\"aiops:CreateInvestigation\",\"aiops:CreateInvestigationEvent\"],\"Resource\":\"*\",\"Condition\":{\"StringEquals\":{\"aws:SourceAccount\":\"111122223333\"},\"ArnLike\":{\"aws:SourceArn\":\"arn:aws:cloudwatch:us-east-1:111122223333:alarm:*\"}}}]}.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvestigationGroupIdentifier"
          description: Specify either the name or the ARN of the investigation group that you want to view the policy of.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInvestigationGroupPolicyResponse"
    post:
      operationId: PutInvestigationGroupPolicy
      description: 'Creates an IAM resource policy and assigns it to the specified investigation group. If you create your investigation group with CreateInvestigationGroup and you want to enable CloudWatch alarms to create investigations and add events to investigations, you must use this operation to create a policy similar to this example. { "Version": "2008-10-17", "Statement": [ { "Effect": "Allow", "Principal": { "Service": "aiops.alarms.cloudwatch.amazonaws.com" }, "Action": [ "aiops:CreateInvestigation", "aiops:CreateInvestigationEvent" ], "Resource": "*", "Condition": { "StringEquals": { "aws:SourceAccount": "account-id" }, "ArnLike": { "aws:SourceArn": "arn:aws:cloudwatch:region:account-id:alarm:*" } } } ] }'
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InvestigationGroupIdentifier"
          description: Specify either the name or the ARN of the investigation group that you want to assign the policy to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  $ref: "#/components/schemas/InvestigationGroupPolicyDocument"
              required:
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutInvestigationGroupPolicyResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Displays the tags associated with a CloudWatch investigations resource. Currently, investigation groups support tagging.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the CloudWatch investigations resource that you want to view tags for. You can use the ListInvestigationGroups operation to find the ARNs of investigation groups. The ARN format for an investigation group is arn:aws:aiops:Region:account-id:investigation-group:investigation-group-id .
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified resource. Tags can help you organize and categorize your resources. You can also use them to scope user permissions by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can associate as many as 50 tags with a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that you want to apply the tags to. You can use the ListInvestigationGroups operation to find the ARNs of investigation groups.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that you want to remove the tags from. You can use theListInvestigationGroups operation to find the ARNs of investigation groups.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    StringWithPatternAndLengthLimits:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\-_A-Za-z0-9\\[\\]\\(\\)\\{\\}\\.: ]+"
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:.*
    EncryptionConfiguration:
      description: Use this structure to specify a customer managed KMS key to use to encrypt investigation data.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/EncryptionConfigurationType"
          description: Displays whether investigation data is encrypted by a customer managed key or an Amazon Web Services owned key.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: If the investigation group uses a customer managed key for encryption, this field displays the ID of that key.
    EncryptionConfigurationType:
      type: string
      enum:
        - AWS_OWNED_KEY
        - CUSTOMER_MANAGED_KMS_KEY
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: arn:.*
    Retention:
      type: integer
      format: int64
      minimum: 7
      maximum: 90
    Tags:
      type: object
      properties: {}
    TagKeyBoundaries:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]+)
    ChatbotNotificationChannel:
      type: object
      properties: {}
    Boolean:
      type: boolean
    CrossAccountConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CrossAccountConfiguration"
    CrossAccountConfiguration:
      description: This structure contains information about the cross-account configuration in the account.
      type: object
      properties:
        sourceRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of an existing role which will be used to do investigations on your behalf.
    CreateInvestigationGroupOutput:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/InvestigationGroupArn"
          description: The ARN of the investigation group that you just created.
    InvestigationGroupArn:
      type: string
      pattern: arn:(aws|aws-us-gov|aws-cn|aws-iso|aws-iso-b):aiops:[a-zA-Z0-9-]*:[0-9]{12}:investigation-group\/[A-Za-z0-9]{16}
    InvestigationGroupIdentifier:
      type: string
      pattern: (?:[\-_A-Za-z0-9]{1,512}|arn:(aws|aws-us-gov|aws-cn|aws-iso|aws-iso-b):aiops:[a-zA-Z0-9-]*:[0-9]{12}:investigation-group\/[A-Za-z0-9]{16})
    DeleteInvestigationGroupPolicyOutput:
      type: object
    GetInvestigationGroupResponse:
      type: object
      properties:
        createdBy:
          $ref: "#/components/schemas/IdentifierStringWithPatternAndLengthLimits"
          description: The name of the user who created the investigation group.
        createdAt:
          $ref: "#/components/schemas/Long"
          description: The date and time that the investigation group was created.
        lastModifiedBy:
          $ref: "#/components/schemas/IdentifierStringWithPatternAndLengthLimits"
          description: The name of the user who created the investigation group.
        lastModifiedAt:
          $ref: "#/components/schemas/Long"
          description: The date and time that the investigation group was most recently modified.
        name:
          $ref: "#/components/schemas/StringWithPatternAndLengthLimits"
          description: The name of the investigation group.
        arn:
          $ref: "#/components/schemas/InvestigationGroupArn"
          description: The Amazon Resource Name (ARN) of the investigation group.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role that the investigation group uses for permissions to gather data.
        encryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: Specifies the customer managed KMS key that the investigation group uses to encrypt data, if there is one. If not, the investigation group uses an Amazon Web Services key to encrypt the data.
        retentionInDays:
          $ref: "#/components/schemas/Retention"
          description: Specifies how long that investigation data is kept.
        chatbotNotificationChannel:
          type: object
          properties: {}
          description: This structure is a string array. The first string is the ARN of a Amazon SNS topic. The array of strings display the ARNs of chat applications configurations that are associated with that topic. For more information about these configuration ARNs, see Getting started with Amazon Q in chat applications and Resource type defined by Amazon Web Services Chatbot.
        tagKeyBoundaries:
          $ref: "#/components/schemas/TagKeyBoundaries"
          description: Displays the custom tag keys for custom applications in your system that you have specified in the investigation group. Resource tags help CloudWatch investigations narrow the search space when it is unable to discover definite relationships between resources.
        isCloudTrailEventHistoryEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether CloudWatch investigationshas access to change events that are recorded by CloudTrail.
        crossAccountConfigurations:
          $ref: "#/components/schemas/CrossAccountConfigurations"
          description: Lists the AWSAccountId of the accounts configured for cross-account access and the results of the last scan performed on each account.
    IdentifierStringWithPatternAndLengthLimits:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\-_\\/A-Za-z0-9:\\.]+"
    Long:
      type: integer
      format: int64
    GetInvestigationGroupPolicyResponse:
      type: object
      properties:
        investigationGroupArn:
          $ref: "#/components/schemas/InvestigationGroupArn"
          description: The Amazon Resource Name (ARN) of the investigation group that you want to view the policy of.
        policy:
          $ref: "#/components/schemas/InvestigationGroupPolicyDocument"
          description: The policy, in JSON format.
    InvestigationGroupPolicyDocument:
      type: string
      minLength: 1
      maxLength: 32768
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    SensitiveStringWithLengthLimits:
      type: string
      minLength: 0
      maxLength: 2048
    ListInvestigationGroupsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 50
    ListInvestigationGroupsOutput:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/SensitiveStringWithLengthLimits"
          description: Include this value in your next use of this operation to get the next set of service operations.
        investigationGroups:
          $ref: "#/components/schemas/InvestigationGroups"
          description: An array of structures, where each structure contains the information about one investigation group in the account.
    InvestigationGroups:
      type: array
      items:
        $ref: "#/components/schemas/ListInvestigationGroupsModel"
    ListInvestigationGroupsModel:
      description: This structure contains information about one investigation group in the account.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/InvestigationGroupArn"
          description: The Amazon Resource Name (ARN) of the investigation group.
        name:
          $ref: "#/components/schemas/StringWithPatternAndLengthLimits"
          description: The name of the investigation group.
    String:
      type: string
    ListTagsForResourceOutput:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: The list of tag keys and values associated with the resource you specified.
    PutInvestigationGroupPolicyResponse:
      type: object
      properties:
        investigationGroupArn:
          $ref: "#/components/schemas/InvestigationGroupArn"
          description: The ARN of the investigation group that will use this policy.
    TagResourceResponse:
      type: object
    TagKeys:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    UpdateInvestigationGroupOutput:
      type: object
  x-stackQL-resources:
