          response:
            openAPIDocKey: "200"
            mediaType: application/json
        get_investigation_group_policy:
          operation:
            $ref: "#/paths/~1investigationGroups~1{identifier}~1policy/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        put_investigation_group_policy:
          operation:
            $ref: "#/paths/~1investigationGroups~1{identifier}~1policy/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/investigation_group_policies/methods/get_investigation_group_policy"
        insert: []
