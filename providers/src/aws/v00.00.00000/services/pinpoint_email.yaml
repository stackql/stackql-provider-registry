    GetAccountResponse:
      description: A list of details about the email-sending capabilities of your Amazon Pinpoint account in the current AWS Region.
      type: object
      properties:
        SendQuota:
          $ref: "#/components/schemas/SendQuota"
          description: An object that contains information about the per-day and per-second sending limits for your Amazon Pinpoint account in the current AWS Region.
        SendingEnabled:
          $ref: "#/components/schemas/Enabled"
          description: Indicates whether or not email sending is enabled for your Amazon Pinpoint account in the current AWS Region.
        DedicatedIpAutoWarmupEnabled:
          $ref: "#/components/schemas/Enabled"
          description: Indicates whether or not the automatic warm-up feature is enabled for dedicated IP addresses that are associated with your account.
        EnforcementStatus:
          $ref: "#/components/schemas/GeneralEnforcementStatus"
          description: "The reputation status of your Amazon Pinpoint account. The status can be one of the following: HEALTHY – There are no reputation-related issues that currently impact your account. PROBATION – We've identified some issues with your Amazon Pinpoint account. We're placing your account under review while you work on correcting these issues. SHUTDOWN – Your account's ability to send email is currently paused because of an issue with the email sent from your account. When you correct the issue, you can contact us and request that your account's ability to send email is resumed."
        ProductionAccessEnabled:
          $ref: "#/components/schemas/Enabled"
          description: Indicates whether or not your account has production access in the current AWS Region. If the value is false, then your account is in the sandbox. When your account is in the sandbox, you can only send email to verified identities. Additionally, the maximum number of emails you can send in a 24-hour period (your sending quota) is 200, and the maximum number of emails you can send per second (your maximum sending rate) is 1. If the value is true, then your account has production access. When your account has production access, you can send email to any address. The sending quota and maximum sending rate for your account vary based on your specific use case.
    SendQuota:
      description: An object that contains information about the per-day and per-second sending limits for your Amazon Pinpoint account in the current AWS Region.
      type: object
      properties:
        Max24HourSend:
          $ref: "#/components/schemas/Max24HourSend"
          description: The maximum number of emails that you can send in the current AWS Region over a 24-hour period. This value is also called your sending quota.
        MaxSendRate:
          $ref: "#/components/schemas/MaxSendRate"
          description: The maximum number of emails that you can send per second in the current AWS Region. This value is also called your maximum sending rate or your maximum TPS (transactions per second) rate.
        SentLast24Hours:
          $ref: "#/components/schemas/SentLast24Hours"
          description: The number of emails sent from your Amazon Pinpoint account in the current AWS Region over the past 24 hours.
    Max24HourSend:
      type: number
      format: double
    MaxSendRate:
      type: number
      format: double
    SentLast24Hours:
      type: number
      format: double
    GeneralEnforcementStatus:
      type: string
    BlacklistItemNames:
      type: array
      items:
        $ref: "#/components/schemas/BlacklistItemName"
    BlacklistItemName:
