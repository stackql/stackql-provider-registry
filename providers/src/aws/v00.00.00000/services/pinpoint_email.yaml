    GetEmailIdentityResponse:
      description: Details about an email identity.
      type: object
      properties:
        IdentityType:
          $ref: "#/components/schemas/IdentityType"
          description: The email identity type.
        FeedbackForwardingStatus:
          $ref: "#/components/schemas/Enabled"
          description: The feedback forwarding configuration for the identity. If the value is true, Amazon Pinpoint sends you email notifications when bounce or complaint events occur. Amazon Pinpoint sends this notification to the address that you specified in the Return-Path header of the original email. When you set this value to false, Amazon Pinpoint sends notifications through other mechanisms, such as by notifying an Amazon SNS topic or another event destination. You're required to have a method of tracking bounces and complaints. If you haven't set up another mechanism for receiving bounce or complaint notifications, Amazon Pinpoint sends an email notification when these events occur (even if this setting is disabled).
        VerifiedForSendingStatus:
          $ref: "#/components/schemas/Enabled"
          description: Specifies whether or not the identity is verified. In Amazon Pinpoint, you can only send email from verified email addresses or domains. For more information about verifying identities, see the Amazon Pinpoint User Guide.
        DkimAttributes:
          $ref: "#/components/schemas/DkimAttributes"
          description: An object that contains information about the DKIM attributes for the identity. This object includes the tokens that you use to create the CNAME records that are required to complete the DKIM verification process.
        MailFromAttributes:
          $ref: "#/components/schemas/MailFromAttributes"
          description: An object that contains information about the Mail-From attributes for the email identity.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of objects that define the tags (keys and values) that are associated with the email identity.
    MailFromAttributes:
      description: A list of attributes that are associated with a MAIL FROM domain.
      type: object
      properties:
        MailFromDomain:
          $ref: "#/components/schemas/MailFromDomainName"
          description: The name of a domain that an email identity uses as a custom MAIL FROM domain.
        MailFromDomainStatus:
          $ref: "#/components/schemas/MailFromDomainStatus"
          description: "The status of the MAIL FROM domain. This status can have the following values: PENDING – Amazon Pinpoint hasn't started searching for the MX record yet. SUCCESS – Amazon Pinpoint detected the required MX record for the MAIL FROM domain. FAILED – Amazon Pinpoint can't find the required MX record, or the record no longer exists. TEMPORARY_FAILURE – A temporary issue occurred, which prevented Amazon Pinpoint from determining the status of the MAIL FROM domain."
        BehaviorOnMxFailure:
          $ref: "#/components/schemas/BehaviorOnMxFailure"
          description: The action that Amazon Pinpoint to takes if it can't read the required MX record for a custom MAIL FROM domain. When you set this value to UseDefaultValue, Amazon Pinpoint uses amazonses.com as the MAIL FROM domain. When you set this value to RejectMessage, Amazon Pinpoint returns a MailFromDomainNotVerified error, and doesn't attempt to deliver the email. These behaviors are taken when the custom MAIL FROM domain configuration is in the Pending, Failed, and TemporaryFailure states.
      required:
        - MailFromDomain
        - MailFromDomainStatus
        - BehaviorOnMxFailure
    MailFromDomainName:
      description: The domain that you want to use as a MAIL FROM domain.
      type: string
    MailFromDomainStatus:
      description: "The status of the MAIL FROM domain. This status can have the following values: PENDING – Amazon Pinpoint hasn't started searching for the MX record yet. SUCCESS – Amazon Pinpoint detected the required MX record for the MAIL FROM domain. FAILED – Amazon Pinpoint can't find the required MX record, or the record no longer exists. TEMPORARY_FAILURE – A temporary issue occurred, which prevented Amazon Pinpoint from determining the status of the MAIL FROM domain."
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED
        - TEMPORARY_FAILURE
    BehaviorOnMxFailure:
      description: The action that you want Amazon Pinpoint to take if it can't read the required MX record for a custom MAIL FROM domain. When you set this value to UseDefaultValue, Amazon Pinpoint uses amazonses.com as the MAIL FROM domain. When you set this value to RejectMessage, Amazon Pinpoint returns a MailFromDomainNotVerified error, and doesn't attempt to deliver the email. These behaviors are taken when the custom MAIL FROM domain configuration is in the Pending, Failed, and TemporaryFailure states.
      type: string
      enum:
        - USE_DEFAULT_VALUE
        - REJECT_MESSAGE
