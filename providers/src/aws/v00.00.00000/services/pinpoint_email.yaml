  /v1/email/outbound-emails:
    post:
      operationId: SendEmail
      description: "Sends an email message. You can use the Amazon Pinpoint Email API to send two types of messages: Simple – A standard email message. When you create this type of message, you specify the sender, the recipient, and the message body, and Amazon Pinpoint assembles the message for you. Raw – A raw, MIME-formatted email message. When you send this type of email, you have to specify all of the message headers, as well as the message body. You can use this message type to send messages that contain attachments. The message that you specify has to be a valid MIME message."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FromEmailAddress:
                  $ref: "#/components/schemas/EmailAddress"
                Destination:
                  $ref: "#/components/schemas/Destination"
                ReplyToAddresses:
                  $ref: "#/components/schemas/EmailAddressList"
                FeedbackForwardingEmailAddress:
                  $ref: "#/components/schemas/EmailAddress"
                Content:
                  $ref: "#/components/schemas/EmailContent"
                EmailTags:
                  $ref: "#/components/schemas/MessageTagList"
                ConfigurationSetName:
                  $ref: "#/components/schemas/ConfigurationSetName"
              required:
                - Destination
                - Content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ConfigurationSetName:
      description: The name of a configuration set. In Amazon Pinpoint, configuration sets are groups of rules that you can apply to the emails you send. You apply a configuration set to an email by including a reference to the configuration set in the headers of the email. When you apply a configuration set to an email, all of the rules in that configuration set are applied to the email.
      type: string
    TrackingOptions:
      description: An object that defines the tracking options for a configuration set. When you use Amazon Pinpoint to send an email, it contains an invisible image that's used to track when recipients open your email. If your email contains links, those links are changed slightly in order to track when recipients click them. These images and links include references to a domain operated by AWS. You can optionally configure Amazon Pinpoint to use a domain that you operate for these images and links.
      type: object
      properties:
        CustomRedirectDomain:
          $ref: "#/components/schemas/CustomRedirectDomain"
          description: The domain that you want to use for tracking open and click events.
      required:
        - CustomRedirectDomain
    CustomRedirectDomain:
      description: The domain that you want to use for tracking open and click events.
      type: string
    DeliveryOptions:
      description: Used to associate a configuration set with a dedicated IP pool.
      type: object
      properties:
        TlsPolicy:
          $ref: "#/components/schemas/TlsPolicy"
          description: Specifies whether messages that use the configuration set are required to use Transport Layer Security (TLS). If the value is Require, messages are only delivered if a TLS connection can be established. If the value is Optional, messages can be delivered in plain text if a TLS connection can't be established.
        SendingPoolName:
          $ref: "#/components/schemas/PoolName"
          description: The name of the dedicated IP pool that you want to associate with the configuration set.
    TlsPolicy:
      description: Specifies whether messages that use the configuration set are required to use Transport Layer Security (TLS). If the value is Require, messages are only delivered if a TLS connection can be established. If the value is Optional, messages can be delivered in plain text if a TLS connection can't be established.
      type: string
      enum:
        - REQUIRE
        - OPTIONAL
    PoolName:
      description: The name of a dedicated IP pool.
      type: string
    ReputationOptions:
      description: Enable or disable collection of reputation metrics for emails that you send using this configuration set in the current AWS Region.
      type: object
      properties:
        ReputationMetricsEnabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, tracking of reputation metrics is enabled for the configuration set. If false, tracking of reputation metrics is disabled for the configuration set.
        LastFreshStart:
          $ref: "#/components/schemas/LastFreshStart"
          description: The date and time (in Unix time) when the reputation metrics were last given a fresh start. When your account is given a fresh start, your reputation metrics are calculated starting from the date of the fresh start.
    Enabled:
      type: boolean
    LastFreshStart:
      description: The date and time (in Unix time) when the reputation metrics were last given a fresh start. When your account is given a fresh start, your reputation metrics are calculated starting from the date of the fresh start.
      type: string
      format: date-time
    SendingOptions:
      description: Used to enable or disable email sending for messages that use this configuration set in the current AWS Region.
      type: object
      properties:
        SendingEnabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, email sending is enabled for the configuration set. If false, email sending is disabled for the configuration set.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "An object that defines the tags that are associated with a resource. A tag is a label that you optionally define and associate with a resource in Amazon Pinpoint. Tags can help you categorize and manage resources in different ways, such as by purpose, owner, environment, or other criteria. A resource can have as many as 50 tags. Each tag consists of a required tag key and an associated tag value, both of which you define. A tag key is a general label that acts as a category for a more specific tag value. A tag value acts as a descriptor within a tag key. A tag key can contain as many as 128 characters. A tag value can contain as many as 256 characters. The characters can be Unicode letters, digits, white space, or one of the following symbols: _ . : / = + -. The following additional restrictions apply to tags: Tag keys and values are case sensitive. For each associated resource, each tag key must be unique and it can have only one value. The aws: prefix is reserved for use by AWS; you can’t use it in any tag keys or values that you define. In addition, you can't edit or remove tag keys or values that use this prefix. Tags that use this prefix don’t count against the limit of 50 tags per resource. You can associate tags with public or shared resources, but the tags are available only for your AWS account, not any other accounts that share the resource. In addition, the tags are available only for resources that are located in the specified AWS Region for your AWS account."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that defines a tag. The maximum length of a tag key is 128 characters. The minimum length is 1 character.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The optional part of a key-value pair that defines a tag. The maximum length of a tag value is 256 characters. The minimum length is 0 characters. If you don’t want a resource to have a specific tag value, don’t specify a value for this parameter. Amazon Pinpoint will set the value to an empty string.
      required:
        - Key
        - Value
    TagKey:
      type: string
    TagValue:
      type: string
    CreateConfigurationSetResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    EventDestinationName:
      description: The name of an event destination. In Amazon Pinpoint, events include message sends, deliveries, opens, clicks, bounces, and complaints. Event destinations are places that you can send information about these events to. For example, you can send event data to Amazon SNS to receive notifications when you receive bounces or complaints, or you can use Amazon Kinesis Data Firehose to stream data to Amazon S3 for long-term storage.
      type: string
    EventDestinationDefinition:
      description: An object that defines the event destination. Specifically, it defines which services receive events from emails sent using the configuration set that the event destination is associated with. Also defines the types of events that are sent to the event destination.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, the event destination is enabled. When the event destination is enabled, the specified event types are sent to the destinations in this EventDestinationDefinition. If false, the event destination is disabled. When the event destination is disabled, events aren't sent to the specified destinations.
        MatchingEventTypes:
          $ref: "#/components/schemas/EventTypes"
          description: An array that specifies which events Amazon Pinpoint should send to the destinations in this EventDestinationDefinition.
        KinesisFirehoseDestination:
          $ref: "#/components/schemas/KinesisFirehoseDestination"
          description: An object that defines an Amazon Kinesis Data Firehose destination for email events. You can use Amazon Kinesis Data Firehose to stream data to other services, such as Amazon S3 and Amazon Redshift.
        CloudWatchDestination:
          $ref: "#/components/schemas/CloudWatchDestination"
          description: An object that defines an Amazon CloudWatch destination for email events. You can use Amazon CloudWatch to monitor and gain insights on your email sending metrics.
        SnsDestination:
          $ref: "#/components/schemas/SnsDestination"
          description: An object that defines an Amazon SNS destination for email events. You can use Amazon SNS to send notification when certain email events occur.
        PinpointDestination:
          $ref: "#/components/schemas/PinpointDestination"
          description: An object that defines a Amazon Pinpoint destination for email events. You can use Amazon Pinpoint events to create attributes in Amazon Pinpoint projects. You can use these attributes to create segments for your campaigns.
    EventTypes:
      type: array
      items:
        $ref: "#/components/schemas/EventType"
    EventType:
      description: An email sending event type. For example, email sends, opens, and bounces are all email events.
      type: string
      enum:
        - SEND
        - REJECT
        - BOUNCE
        - COMPLAINT
        - DELIVERY
        - OPEN
        - CLICK
        - RENDERING_FAILURE
    KinesisFirehoseDestination:
      description: An object that defines an Amazon Kinesis Data Firehose destination for email events. You can use Amazon Kinesis Data Firehose to stream data to other services, such as Amazon S3 and Amazon Redshift.
      type: object
      properties:
        IamRoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the IAM role that Amazon Pinpoint uses when sending email events to the Amazon Kinesis Data Firehose stream.
        DeliveryStreamArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Kinesis Data Firehose stream that Amazon Pinpoint sends email events to.
      required:
        - IamRoleArn
        - DeliveryStreamArn
    AmazonResourceName:
      type: string
    CloudWatchDestination:
      description: An object that defines an Amazon CloudWatch destination for email events. You can use Amazon CloudWatch to monitor and gain insights on your email sending metrics.
      type: object
      properties:
        DimensionConfigurations:
          $ref: "#/components/schemas/CloudWatchDimensionConfigurations"
          description: An array of objects that define the dimensions to use when you send email events to Amazon CloudWatch.
      required:
        - DimensionConfigurations
    CloudWatchDimensionConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchDimensionConfiguration"
    CloudWatchDimensionConfiguration:
      description: An object that defines the dimension configuration to use when you send Amazon Pinpoint email events to Amazon CloudWatch.
      type: object
      properties:
        DimensionName:
          $ref: "#/components/schemas/DimensionName"
          description: "The name of an Amazon CloudWatch dimension associated with an email sending metric. The name has to meet the following criteria: It can only contain ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). It can contain no more than 256 characters."
        DimensionValueSource:
          $ref: "#/components/schemas/DimensionValueSource"
          description: The location where Amazon Pinpoint finds the value of a dimension to publish to Amazon CloudWatch. If you want Amazon Pinpoint to use the message tags that you specify using an X-SES-MESSAGE-TAGS header or a parameter to the SendEmail/SendRawEmail API, choose messageTag. If you want Amazon Pinpoint to use your own email headers, choose emailHeader. If you want Amazon Pinpoint to use link tags, choose linkTags.
        DefaultDimensionValue:
          $ref: "#/components/schemas/DefaultDimensionValue"
          description: "The default value of the dimension that is published to Amazon CloudWatch if you don't provide the value of the dimension when you send an email. This value has to meet the following criteria: It can only contain ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). It can contain no more than 256 characters."
      required:
        - DimensionName
        - DimensionValueSource
        - DefaultDimensionValue
    DimensionName:
      description: "The name of an Amazon CloudWatch dimension associated with an email sending metric. The name has to meet the following criteria: It can only contain ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). It can contain no more than 256 characters."
      type: string
    DimensionValueSource:
      description: The location where Amazon Pinpoint finds the value of a dimension to publish to Amazon CloudWatch. If you want Amazon Pinpoint to use the message tags that you specify using an X-SES-MESSAGE-TAGS header or a parameter to the SendEmail/SendRawEmail API, choose messageTag. If you want Amazon Pinpoint to use your own email headers, choose emailHeader. If you want Amazon Pinpoint to use link tags, choose linkTags.
      type: string
      enum:
        - MESSAGE_TAG
        - EMAIL_HEADER
        - LINK_TAG
    DefaultDimensionValue:
      description: "The default value of the dimension that is published to Amazon CloudWatch if you don't provide the value of the dimension when you send an email. This value has to meet the following criteria: It can only contain ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). It can contain no more than 256 characters."
      type: string
    SnsDestination:
      description: An object that defines an Amazon SNS destination for email events. You can use Amazon SNS to send notification when certain email events occur.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic that you want to publish email events to. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
      required:
        - TopicArn
    PinpointDestination:
      description: An object that defines a Amazon Pinpoint destination for email events. You can use Amazon Pinpoint events to create attributes in Amazon Pinpoint projects. You can use these attributes to create segments for your campaigns.
      type: object
      properties:
        ApplicationArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Pinpoint project that you want to send email events to.
    CreateConfigurationSetEventDestinationResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    CreateDedicatedIpPoolResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    ReportName:
      description: A name that helps you identify a report generated by the Deliverability dashboard.
      type: string
    EmailAddress:
      type: string
    EmailContent:
      description: An object that defines the entire content of the email, including the message headers and the body content. You can create a simple email message, in which you specify the subject and the text and HTML versions of the message body. You can also create raw messages, in which you specify a complete MIME-formatted message. Raw messages can include attachments and custom headers.
      type: object
      properties:
        Simple:
          $ref: "#/components/schemas/Message"
          description: The simple email message. The message consists of a subject and a message body.
        Raw:
          $ref: "#/components/schemas/RawMessage"
          description: "The raw email message. The message has to meet the following criteria: The message has to contain a header and a body, separated by one blank line. All of the required header fields must be present in the message. Each part of a multipart MIME message must be formatted properly. If you include attachments, they must be in a file format that Amazon Pinpoint supports. The entire message must be Base64 encoded. If any of the MIME parts in your message contain content that is outside of the 7-bit ASCII character range, you should encode that content to ensure that recipients' email clients render the message properly. The length of any single line of text in the message can't exceed 1,000 characters. This restriction is defined in RFC 5321."
        Template:
          $ref: "#/components/schemas/Template"
          description: The template to use for the email message.
    Message:
      description: Represents the email message that you're sending. The Message object consists of a subject line and a message body.
      type: object
      properties:
        Subject:
          $ref: "#/components/schemas/Content"
          description: The subject line of the email. The subject line can only contain 7-bit ASCII characters. However, you can specify non-ASCII characters in the subject line by using encoded-word syntax, as described in RFC 2047.
        Body:
          $ref: "#/components/schemas/Body"
          description: The body of the message. You can specify an HTML version of the message, a text-only version of the message, or both.
      required:
        - Subject
        - Body
    Content:
      description: An object that represents the content of the email, and optionally a character set specification.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/MessageData"
          description: The content of the message itself.
        Charset:
          $ref: "#/components/schemas/Charset"
          description: The character set for the content. Because of the constraints of the SMTP protocol, Amazon Pinpoint uses 7-bit ASCII by default. If the text includes characters outside of the ASCII range, you have to specify a character set. For example, you could specify UTF-8, ISO-8859-1, or Shift_JIS.
      required:
        - Data
    MessageData:
      type: string
    Charset:
      type: string
    Body:
      description: Represents the body of the email message.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/Content"
          description: An object that represents the version of the message that is displayed in email clients that don't support HTML, or clients where the recipient has disabled HTML rendering.
        Html:
          $ref: "#/components/schemas/Content"
          description: An object that represents the version of the message that is displayed in email clients that support HTML. HTML messages can include formatted text, hyperlinks, images, and more.
    RawMessage:
      description: The raw email message.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/RawMessageData"
          description: "The raw email message. The message has to meet the following criteria: The message has to contain a header and a body, separated by one blank line. All of the required header fields must be present in the message. Each part of a multipart MIME message must be formatted properly. Attachments must be in a file format that Amazon Pinpoint supports. The entire message must be Base64 encoded. If any of the MIME parts in your message contain content that is outside of the 7-bit ASCII character range, you should encode that content to ensure that recipients' email clients render the message properly. The length of any single line of text in the message can't exceed 1,000 characters. This restriction is defined in RFC 5321."
      required:
        - Data
    RawMessageData:
      description: "The raw email message. The message has to meet the following criteria: The message has to contain a header and a body, separated by one blank line. All of the required header fields must be present in the message. Each part of a multipart MIME message must be formatted properly. Attachments must be in a file format that Amazon Pinpoint supports. The entire message must be Base64 encoded. If any of the MIME parts in your message contain content that is outside of the 7-bit ASCII character range, you should encode that content to ensure that recipients' email clients render the message properly. The length of any single line of text in the message can't exceed 1,000 characters. This restriction is defined in RFC 5321."
      type: string
      format: byte
    Template:
      type: object
      properties:
        TemplateArn:
          $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) of the template.
        TemplateData:
          $ref: "#/components/schemas/TemplateData"
          description: An object that defines the values to use for message variables in the template. This object is a set of key-value pairs. Each key defines a message variable in the template. The corresponding value defines the value to use for that variable.
    TemplateArn:
      type: string
    TemplateData:
      type: string
      maxLength: 262144
    CreateDeliverabilityTestReportResponse:
      description: Information about the predictive inbox placement test that you created.
      type: object
      properties:
        ReportId:
          $ref: "#/components/schemas/ReportId"
          description: A unique string that identifies the predictive inbox placement test.
        DeliverabilityTestStatus:
          $ref: "#/components/schemas/DeliverabilityTestStatus"
          description: The status of the predictive inbox placement test. If the status is IN_PROGRESS, then the predictive inbox placement test is currently running. Predictive inbox placement tests are usually complete within 24 hours of creating the test. If the status is COMPLETE, then the test is finished, and you can use the GetDeliverabilityTestReport to view the results of the test.
      required:
        - ReportId
        - DeliverabilityTestStatus
    ReportId:
      description: A unique string that identifies a Deliverability dashboard report.
      type: string
    DeliverabilityTestStatus:
      description: The status of a predictive inbox placement test. If the status is IN_PROGRESS, then the predictive inbox placement test is currently running. Predictive inbox placement tests are usually complete within 24 hours of creating the test. If the status is COMPLETE, then the test is finished, and you can use the GetDeliverabilityTestReport operation to view the results of the test.
      type: string
      enum:
        - IN_PROGRESS
        - COMPLETED
    Identity:
      type: string
    CreateEmailIdentityResponse:
      description: If the email identity is a domain, this object contains tokens that you can use to create a set of CNAME records. To sucessfully verify your domain, you have to add these records to the DNS configuration for your domain. If the email identity is an email address, this object is empty.
      type: object
      properties:
        IdentityType:
          $ref: "#/components/schemas/IdentityType"
          description: The email identity type.
        VerifiedForSendingStatus:
          $ref: "#/components/schemas/Enabled"
          description: Specifies whether or not the identity is verified. In Amazon Pinpoint, you can only send email from verified email addresses or domains. For more information about verifying identities, see the Amazon Pinpoint User Guide.
        DkimAttributes:
          $ref: "#/components/schemas/DkimAttributes"
          description: An object that contains information about the DKIM attributes for the identity. This object includes the tokens that you use to create the CNAME records that are required to complete the DKIM verification process.
    IdentityType:
      description: "The email identity type. The identity type can be one of the following: EMAIL_ADDRESS – The identity is an email address. DOMAIN – The identity is a domain."
      type: string
      enum:
        - EMAIL_ADDRESS
        - DOMAIN
        - MANAGED_DOMAIN
    DkimAttributes:
      description: An object that contains information about the DKIM configuration for an email identity.
      type: object
      properties:
        SigningEnabled:
          $ref: "#/components/schemas/Enabled"
          description: If the value is true, then the messages that Amazon Pinpoint sends from the identity are DKIM-signed. If the value is false, then the messages that Amazon Pinpoint sends from the identity aren't DKIM-signed.
        Status:
          $ref: "#/components/schemas/DkimStatus"
          description: "Describes whether or not Amazon Pinpoint has successfully located the DKIM records in the DNS records for the domain. The status can be one of the following: PENDING – Amazon Pinpoint hasn't yet located the DKIM records in the DNS configuration for the domain, but will continue to attempt to locate them. SUCCESS – Amazon Pinpoint located the DKIM records in the DNS configuration for the domain and determined that they're correct. Amazon Pinpoint can now send DKIM-signed email from the identity. FAILED – Amazon Pinpoint was unable to locate the DKIM records in the DNS settings for the domain, and won't continue to search for them. TEMPORARY_FAILURE – A temporary issue occurred, which prevented Amazon Pinpoint from determining the DKIM status for the domain. NOT_STARTED – Amazon Pinpoint hasn't yet started searching for the DKIM records in the DKIM records for the domain."
        Tokens:
          $ref: "#/components/schemas/DnsTokenList"
          description: A set of unique strings that you use to create a set of CNAME records that you add to the DNS configuration for your domain. When Amazon Pinpoint detects these records in the DNS configuration for your domain, the DKIM authentication process is complete. Amazon Pinpoint usually detects these records within about 72 hours of adding them to the DNS configuration for your domain.
    DkimStatus:
      description: "The DKIM authentication status of the identity. The status can be one of the following: PENDING – The DKIM verification process was initiated, and Amazon Pinpoint is still waiting for the required CNAME records to appear in the DNS configuration for the domain. SUCCESS – The DKIM authentication process completed successfully. FAILED – The DKIM authentication process failed. This can happen when Amazon Pinpoint fails to find the required CNAME records in the DNS configuration of the domain. TEMPORARY_FAILURE – A temporary issue is preventing Amazon Pinpoint from determining the DKIM authentication status of the domain. NOT_STARTED – The DKIM verification process hasn't been initiated for the domain."
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED
        - TEMPORARY_FAILURE
        - NOT_STARTED
    DnsTokenList:
      type: array
      items:
        $ref: "#/components/schemas/DnsToken"
    DnsToken:
      type: string
    DeleteConfigurationSetResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
