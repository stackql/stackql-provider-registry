  /PutRetentionConfiguration:
    post:
      operationId: PutRetentionConfiguration
      description: Creates and updates the retention configuration with details about retention period (number of days) that Config stores your historical information. The API creates the RetentionConfiguration object and names the object as default. When you have a RetentionConfiguration object named default, calling the API modifies the default object. Currently, Config supports only one retention configuration per region in your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.PutRetentionConfiguration
            default: StarlingDoveService.PutRetentionConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RetentionPeriodInDays:
                  $ref: "#/components/schemas/RetentionPeriodInDays"
                  description: Number of days Config stores your historical information. Currently, only applicable to the configuration item history.
              required:
                - RetentionPeriodInDays
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutRetentionConfigurationResponse"
  /PutServiceLinkedConfigurationRecorder:
    post:
      operationId: PutServiceLinkedConfigurationRecorder
      description: Creates a service-linked configuration recorder that is linked to a specific Amazon Web Services service based on the ServicePrincipal you specify. The configuration recorder's name, recordingGroup, recordingMode, and recordingScope is set by the service that is linked to the configuration recorder. For more information and a list of supported services/service principals, see Working with the Configuration Recorder in the Config Developer Guide. This API creates a service-linked role AWSServiceRoleForConfig in your account. The service-linked role is created only when the role does not exist in your account. The recording scope determines if you receive configuration items The recording scope is set by the service that is linked to the configuration recorder and determines whether you receive configuration items (CIs) in the delivery channel. If the recording scope is internal, you will not receive CIs in the delivery channel. Tags are added at creation and cannot be updated with this operation Use TagResource and UntagResource to update tags after creation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.PutServiceLinkedConfigurationRecorder
            default: StarlingDoveService.PutServiceLinkedConfigurationRecorder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServicePrincipal:
                  $ref: "#/components/schemas/ServicePrincipal"
                  description: The service principal of the Amazon Web Services service for the service-linked configuration recorder that you want to create.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: The tags for a service-linked configuration recorder. Each tag consists of a key and an optional value, both of which you define.
              required:
                - ServicePrincipal
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutServiceLinkedConfigurationRecorderResponse"
  /PutStoredQuery:
    post:
      operationId: PutStoredQuery
      description: Saves a new query or updates an existing saved query. The QueryName must be unique for a single Amazon Web Services account and a single Amazon Web Services Region. You can create upto 300 queries in a single Amazon Web Services account and a single Amazon Web Services Region. Tags are added at creation and cannot be updated PutStoredQuery is an idempotent API. Subsequent requests won’t create a duplicate resource if one was already created. If a following request has different tags values, Config will ignore these differences and treat it as an idempotent request of the previous. In this case, tags will not be updated, even if they are different.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.PutStoredQuery
            default: StarlingDoveService.PutStoredQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                StoredQuery:
                  $ref: "#/components/schemas/StoredQuery"
                  description: A list of StoredQuery objects. The mandatory fields are QueryName and Expression. When you are creating a query, you must provide a query name and an expression. When you are updating a query, you must provide a query name but updating the description is optional.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: A list of Tags object.
              required:
                - StoredQuery
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutStoredQueryResponse"
  /SelectAggregateResourceConfig:
    post:
      operationId: SelectAggregateResourceConfig
      description: Accepts a structured query language (SQL) SELECT command and an aggregator to query configuration state of Amazon Web Services resources across multiple accounts and regions, performs the corresponding search, and returns resource configurations matching the properties. For more information about query components, see the Query Components section in the Config Developer Guide. If you run an aggregation query (i.e., using GROUP BY or using aggregate functions such as COUNT; e.g., SELECT resourceId, COUNT(*) WHERE resourceType = 'AWS::IAM::Role' GROUP BY resourceId) and do not specify the MaxResults or the Limit query parameters, the default page size is set to 500. If you run a non-aggregation query (i.e., not using GROUP BY or aggregate function; e.g., SELECT * WHERE resourceType = 'AWS::IAM::Role') and do not specify the MaxResults or the Limit query parameters, the default page size is set to 25.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.SelectAggregateResourceConfig
            default: StarlingDoveService.SelectAggregateResourceConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Expression:
                  $ref: "#/components/schemas/Expression"
                  description: The SQL query SELECT command.
                ConfigurationAggregatorName:
                  $ref: "#/components/schemas/ConfigurationAggregatorName"
                  description: The name of the configuration aggregator.
                Limit:
                  $ref: "#/components/schemas/Limit"
                  description: The maximum number of query results returned on each page.
                MaxResults:
                  $ref: "#/components/schemas/Limit"
                  description: The maximum number of query results returned on each page. Config also allows the Limit request parameter.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken string returned in a previous request that you use to request the next page of results in a paginated response.
              required:
                - Expression
                - ConfigurationAggregatorName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelectAggregateResourceConfigResponse"
  /SelectResourceConfig:
    post:
      operationId: SelectResourceConfig
      description: Accepts a structured query language (SQL) SELECT command, performs the corresponding search, and returns resource configurations matching the properties. For more information about query components, see the Query Components section in the Config Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
