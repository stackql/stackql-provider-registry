          description: A string to string map that contains additional contents for the resource configuration.Config returns this field for certain resource types to supplement the information returned for the configuration field. This string needs to be deserialized using json.loads() before you can access the contents.
        recordingFrequency:
          $ref: "#/components/schemas/RecordingFrequency"
          description: The recording frequency that Config uses to record configuration changes for the resource. This field only appears in the API response when DAILY recording is enabled for a resource type. If this field is not present, CONTINUOUS recording is enabled for that resource type. For more information on daily recording and continuous recording, see Recording Frequency in the Config Developer Guide.
        configurationItemDeliveryTime:
