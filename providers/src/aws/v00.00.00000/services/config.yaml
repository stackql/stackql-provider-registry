openapi: 3.0.0
info:
  version: "2014-11-12"
  title: AWS Config
  description: AWS Config
  x-serviceName: config
  x-serviceAlias: config
  x-protocol: json
  x-apiVersion: "2014-11-12"
  x-endpointPrefix: config
  x-targetPrefix: StarlingDoveService
  x-jsonVersion: "1.1"
servers:
  - url: https://config.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for config
paths:
  /AssociateResourceTypes:
    post:
      operationId: AssociateResourceTypes
      description: Adds all resource types specified in the ResourceTypes list to the RecordingGroup of specified configuration recorder and includes those resource types when recording. For this operation, the specified configuration recorder must use a RecordingStrategy that is either INCLUSION_BY_RESOURCE_TYPES or EXCLUSION_BY_RESOURCE_TYPES.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.AssociateResourceTypes
            default: StarlingDoveService.AssociateResourceTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationRecorderArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the specified configuration recorder.
                ResourceTypes:
                  $ref: "#/components/schemas/ResourceTypeList"
                  description: The list of resource types you want to add to the recording group of the specified configuration recorder.
              required:
                - ConfigurationRecorderArn
                - ResourceTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResourceTypesResponse"
  /BatchGetAggregateResourceConfig:
    post:
      operationId: BatchGetAggregateResourceConfig
      description: Returns the current configuration items for resources that are present in your Config aggregator. The operation also returns a list of resources that are not processed in the current request. If there are no unprocessed resources, the operation returns an empty unprocessedResourceIdentifiers list. The API does not return results for deleted resources. The API does not return tags and relationships.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.BatchGetAggregateResourceConfig
            default: StarlingDoveService.BatchGetAggregateResourceConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationAggregatorName:
                  $ref: "#/components/schemas/ConfigurationAggregatorName"
                  description: The name of the configuration aggregator.
                ResourceIdentifiers:
                  $ref: "#/components/schemas/ResourceIdentifiersList"
                  description: A list of aggregate ResourceIdentifiers objects.
              required:
                - ConfigurationAggregatorName
                - ResourceIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAggregateResourceConfigResponse"
  /BatchGetResourceConfig:
    post:
      operationId: BatchGetResourceConfig
      description: Returns the BaseConfigurationItem for one or more requested resources. The operation also returns a list of resources that are not processed in the current request. If there are no unprocessed resources, the operation returns an empty unprocessedResourceKeys list. The API does not return results for deleted resources. The API does not return any tags for the requested resources. This information is filtered out of the supplementaryConfiguration section of the API response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.BatchGetResourceConfig
            default: StarlingDoveService.BatchGetResourceConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceKeys:
                  $ref: "#/components/schemas/ResourceKeys"
                  description: A list of resource keys to be processed with the current request. Each element in the list consists of the resource type and resource ID.
              required:
                - resourceKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetResourceConfigResponse"
  /DeleteAggregationAuthorization:
    post:
      operationId: DeleteAggregationAuthorization
      description: Deletes the authorization granted to the specified configuration aggregator account in a specified region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteAggregationAuthorization
            default: StarlingDoveService.DeleteAggregationAuthorization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AuthorizedAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The 12-digit account ID of the account authorized to aggregate data.
                AuthorizedAwsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                  description: The region authorized to collect aggregated data.
              required:
                - AuthorizedAccountId
                - AuthorizedAwsRegion
      responses:
        "200":
          description: Success
  /DeleteConfigRule:
    post:
      operationId: DeleteConfigRule
      description: "Deletes the specified Config rule and all of its evaluation results. Config sets the state of a rule to DELETING until the deletion is complete. You cannot update a rule while it is in this state. If you make a PutConfigRule or DeleteConfigRule request for the rule, you will receive a ResourceInUseException. You can check the state of a rule by using the DescribeConfigRules request. Recommendation: Consider excluding the AWS::Config::ResourceCompliance resource type from recording before deleting rules Deleting rules creates configuration items (CIs) for AWS::Config::ResourceCompliance that can affect your costs for the configuration recorder. If you are deleting rules which evaluate a large number of resource types, this can lead to a spike in the number of CIs recorded. To avoid the associated costs, you can opt to disable recording for the AWS::Config::ResourceCompliance resource type before deleting rules, and re-enable recording after the rules have been deleted. However, since deleting rules is an asynchronous process, it might take an hour or more to complete. During the time when recording is disabled for AWS::Config::ResourceCompliance, rule evaluations will not be recorded in the associated resource’s history."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteConfigRule
            default: StarlingDoveService.DeleteConfigRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigRuleName:
                  $ref: "#/components/schemas/ConfigRuleName"
                  description: The name of the Config rule that you want to delete.
              required:
                - ConfigRuleName
      responses:
        "200":
          description: Success
  /DeleteConfigurationAggregator:
    post:
      operationId: DeleteConfigurationAggregator
      description: Deletes the specified configuration aggregator and the aggregated data associated with the aggregator.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteConfigurationAggregator
            default: StarlingDoveService.DeleteConfigurationAggregator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationAggregatorName:
                  $ref: "#/components/schemas/ConfigurationAggregatorName"
                  description: The name of the configuration aggregator.
              required:
                - ConfigurationAggregatorName
      responses:
        "200":
          description: Success
  /DeleteConfigurationRecorder:
    post:
      operationId: DeleteConfigurationRecorder
      description: Deletes the customer managed configuration recorder. This operation does not delete the configuration information that was previously recorded. You will be able to access the previously recorded information by using the GetResourceConfigHistory operation, but you will not be able to access this information in the Config console until you have created a new customer managed configuration recorder.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteConfigurationRecorder
            default: StarlingDoveService.DeleteConfigurationRecorder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationRecorderName:
                  $ref: "#/components/schemas/RecorderName"
                  description: The name of the customer managed configuration recorder that you want to delete. You can retrieve the name of your configuration recorders by using the DescribeConfigurationRecorders operation.
              required:
                - ConfigurationRecorderName
      responses:
        "200":
          description: Success
  /DeleteConformancePack:
    post:
      operationId: DeleteConformancePack
      description: "Deletes the specified conformance pack and all the Config rules, remediation actions, and all evaluation results within that conformance pack. Config sets the conformance pack to DELETE_IN_PROGRESS until the deletion is complete. You cannot update a conformance pack while it is in this state. Recommendation: Consider excluding the AWS::Config::ResourceCompliance resource type from recording before deleting rules Deleting rules creates configuration items (CIs) for AWS::Config::ResourceCompliance that can affect your costs for the configuration recorder. If you are deleting rules which evaluate a large number of resource types, this can lead to a spike in the number of CIs recorded. To avoid the associated costs, you can opt to disable recording for the AWS::Config::ResourceCompliance resource type before deleting rules, and re-enable recording after the rules have been deleted. However, since deleting rules is an asynchronous process, it might take an hour or more to complete. During the time when recording is disabled for AWS::Config::ResourceCompliance, rule evaluations will not be recorded in the associated resource’s history."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteConformancePack
            default: StarlingDoveService.DeleteConformancePack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConformancePackName:
                  $ref: "#/components/schemas/ConformancePackName"
                  description: Name of the conformance pack you want to delete.
              required:
                - ConformancePackName
      responses:
        "200":
          description: Success
  /DeleteDeliveryChannel:
    post:
      operationId: DeleteDeliveryChannel
      description: Deletes the delivery channel. Before you can delete the delivery channel, you must stop the customer managed configuration recorder. You can use the StopConfigurationRecorder operation to stop the customer managed configuration recorder.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteDeliveryChannel
            default: StarlingDoveService.DeleteDeliveryChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DeliveryChannelName:
                  $ref: "#/components/schemas/ChannelName"
                  description: The name of the delivery channel that you want to delete.
              required:
                - DeliveryChannelName
      responses:
        "200":
          description: Success
  /DeleteEvaluationResults:
    post:
      operationId: DeleteEvaluationResults
      description: Deletes the evaluation results for the specified Config rule. You can specify one Config rule per request. After you delete the evaluation results, you can call the StartConfigRulesEvaluation API to start evaluating your Amazon Web Services resources against the rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteEvaluationResults
            default: StarlingDoveService.DeleteEvaluationResults
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigRuleName:
                  $ref: "#/components/schemas/StringWithCharLimit64"
                  description: The name of the Config rule for which you want to delete the evaluation results.
              required:
                - ConfigRuleName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEvaluationResultsResponse"
  /DeleteOrganizationConfigRule:
    post:
      operationId: DeleteOrganizationConfigRule
      description: "Deletes the specified organization Config rule and all of its evaluation results from all member accounts in that organization. Only a management account and a delegated administrator account can delete an organization Config rule. When calling this API with a delegated administrator, you must ensure Organizations ListDelegatedAdministrator permissions are added. Config sets the state of a rule to DELETE_IN_PROGRESS until the deletion is complete. You cannot update a rule while it is in this state. Recommendation: Consider excluding the AWS::Config::ResourceCompliance resource type from recording before deleting rules Deleting rules creates configuration items (CIs) for AWS::Config::ResourceCompliance that can affect your costs for the configuration recorder. If you are deleting rules which evaluate a large number of resource types, this can lead to a spike in the number of CIs recorded. To avoid the associated costs, you can opt to disable recording for the AWS::Config::ResourceCompliance resource type before deleting rules, and re-enable recording after the rules have been deleted. However, since deleting rules is an asynchronous process, it might take an hour or more to complete. During the time when recording is disabled for AWS::Config::ResourceCompliance, rule evaluations will not be recorded in the associated resource’s history."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteOrganizationConfigRule
            default: StarlingDoveService.DeleteOrganizationConfigRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OrganizationConfigRuleName:
                  $ref: "#/components/schemas/OrganizationConfigRuleName"
                  description: The name of organization Config rule that you want to delete.
              required:
                - OrganizationConfigRuleName
      responses:
        "200":
          description: Success
  /DeleteOrganizationConformancePack:
    post:
      operationId: DeleteOrganizationConformancePack
      description: "Deletes the specified organization conformance pack and all of the Config rules and remediation actions from all member accounts in that organization. Only a management account or a delegated administrator account can delete an organization conformance pack. When calling this API with a delegated administrator, you must ensure Organizations ListDelegatedAdministrator permissions are added. Config sets the state of a conformance pack to DELETE_IN_PROGRESS until the deletion is complete. You cannot update a conformance pack while it is in this state. Recommendation: Consider excluding the AWS::Config::ResourceCompliance resource type from recording before deleting rules Deleting rules creates configuration items (CIs) for AWS::Config::ResourceCompliance that can affect your costs for the configuration recorder. If you are deleting rules which evaluate a large number of resource types, this can lead to a spike in the number of CIs recorded. To avoid the associated costs, you can opt to disable recording for the AWS::Config::ResourceCompliance resource type before deleting rules, and re-enable recording after the rules have been deleted. However, since deleting rules is an asynchronous process, it might take an hour or more to complete. During the time when recording is disabled for AWS::Config::ResourceCompliance, rule evaluations will not be recorded in the associated resource’s history."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteOrganizationConformancePack
            default: StarlingDoveService.DeleteOrganizationConformancePack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OrganizationConformancePackName:
                  $ref: "#/components/schemas/OrganizationConformancePackName"
                  description: The name of organization conformance pack that you want to delete.
              required:
                - OrganizationConformancePackName
      responses:
        "200":
          description: Success
  /DeletePendingAggregationRequest:
    post:
      operationId: DeletePendingAggregationRequest
      description: Deletes pending authorization requests for a specified aggregator account in a specified region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeletePendingAggregationRequest
            default: StarlingDoveService.DeletePendingAggregationRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RequesterAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The 12-digit account ID of the account requesting to aggregate data.
                RequesterAwsRegion:
                  $ref: "#/components/schemas/AwsRegion"
                  description: The region requesting to aggregate data.
              required:
                - RequesterAccountId
                - RequesterAwsRegion
      responses:
        "200":
          description: Success
  /DeleteRemediationConfiguration:
    post:
      operationId: DeleteRemediationConfiguration
      description: Deletes the remediation configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteRemediationConfiguration
            default: StarlingDoveService.DeleteRemediationConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigRuleName:
                  $ref: "#/components/schemas/ConfigRuleName"
                  description: The name of the Config rule for which you want to delete remediation configuration.
                ResourceType:
                  $ref: "#/components/schemas/String"
                  description: The type of a resource.
              required:
                - ConfigRuleName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRemediationConfigurationResponse"
  /DeleteRemediationExceptions:
    post:
      operationId: DeleteRemediationExceptions
      description: Deletes one or more remediation exceptions mentioned in the resource keys. Config generates a remediation exception when a problem occurs executing a remediation action to a specific resource. Remediation exceptions blocks auto-remediation until the exception is cleared.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteRemediationExceptions
            default: StarlingDoveService.DeleteRemediationExceptions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigRuleName:
                  $ref: "#/components/schemas/ConfigRuleName"
                  description: The name of the Config rule for which you want to delete remediation exception configuration.
                ResourceKeys:
                  $ref: "#/components/schemas/RemediationExceptionResourceKeys"
                  description: An exception list of resource exception keys to be processed with the current request. Config adds exception for each resource key. For example, Config adds 3 exceptions for 3 resource keys.
              required:
                - ConfigRuleName
                - ResourceKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRemediationExceptionsResponse"
  /DeleteResourceConfig:
    post:
      operationId: DeleteResourceConfig
      description: Records the configuration state for a custom resource that has been deleted. This API records a new ConfigurationItem with a ResourceDeleted status. You can retrieve the ConfigurationItems recorded for this resource in your Config History.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteResourceConfig
            default: StarlingDoveService.DeleteResourceConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceType:
                  $ref: "#/components/schemas/ResourceTypeString"
                  description: The type of the resource.
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: Unique identifier of the resource.
              required:
                - ResourceType
                - ResourceId
      responses:
        "200":
          description: Success
  /DeleteRetentionConfiguration:
    post:
      operationId: DeleteRetentionConfiguration
      description: Deletes the retention configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteRetentionConfiguration
            default: StarlingDoveService.DeleteRetentionConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RetentionConfigurationName:
                  $ref: "#/components/schemas/RetentionConfigurationName"
                  description: The name of the retention configuration to delete.
              required:
                - RetentionConfigurationName
      responses:
        "200":
          description: Success
  /DeleteServiceLinkedConfigurationRecorder:
    post:
      operationId: DeleteServiceLinkedConfigurationRecorder
      description: Deletes an existing service-linked configuration recorder. This operation does not delete the configuration information that was previously recorded. You will be able to access the previously recorded information by using the GetResourceConfigHistory operation, but you will not be able to access this information in the Config console until you have created a new service-linked configuration recorder for the same service. The recording scope determines if you receive configuration items The recording scope is set by the service that is linked to the configuration recorder and determines whether you receive configuration items (CIs) in the delivery channel. If the recording scope is internal, you will not receive CIs in the delivery channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteServiceLinkedConfigurationRecorder
            default: StarlingDoveService.DeleteServiceLinkedConfigurationRecorder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServicePrincipal:
                  $ref: "#/components/schemas/ServicePrincipal"
                  description: The service principal of the Amazon Web Services service for the service-linked configuration recorder that you want to delete.
              required:
                - ServicePrincipal
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteServiceLinkedConfigurationRecorderResponse"
  /DeleteStoredQuery:
    post:
      operationId: DeleteStoredQuery
      description: Deletes the stored query for a single Amazon Web Services account and a single Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeleteStoredQuery
            default: StarlingDoveService.DeleteStoredQuery
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                QueryName:
                  $ref: "#/components/schemas/QueryName"
                  description: The name of the query that you want to delete.
              required:
                - QueryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStoredQueryResponse"
  /DeliverConfigSnapshot:
    post:
      operationId: DeliverConfigSnapshot
      description: Schedules delivery of a configuration snapshot to the Amazon S3 bucket in the specified delivery channel. After the delivery has started, Config sends the following notifications using an Amazon SNS topic that you have specified. Notification of the start of the delivery. Notification of the completion of the delivery, if the delivery was successfully completed. Notification of delivery failure, if the delivery failed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DeliverConfigSnapshot
            default: StarlingDoveService.DeliverConfigSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                deliveryChannelName:
                  $ref: "#/components/schemas/ChannelName"
                  description: The name of the delivery channel through which the snapshot is delivered.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliverConfigSnapshotResponse"
  /DescribeAggregateComplianceByConfigRules:
    post:
      operationId: DescribeAggregateComplianceByConfigRules
      description: Returns a list of compliant and noncompliant rules with the number of resources for compliant and noncompliant rules. Does not display rules that do not have compliance results. The results can return an empty result page, but if you have a nextToken, the results are displayed on the next page.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DescribeAggregateComplianceByConfigRules
            default: StarlingDoveService.DescribeAggregateComplianceByConfigRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationAggregatorName:
                  $ref: "#/components/schemas/ConfigurationAggregatorName"
                  description: The name of the configuration aggregator.
                Filters:
                  $ref: "#/components/schemas/ConfigRuleComplianceFilters"
                  description: Filters the results by ConfigRuleComplianceFilters object.
                Limit:
                  $ref: "#/components/schemas/GroupByAPILimit"
                  description: The maximum number of evaluation results returned on each page. The default is maximum. If you specify 0, Config uses the default.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken string returned on a previous page that you use to get the next page of results in a paginated response.
              required:
                - ConfigurationAggregatorName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAggregateComplianceByConfigRulesResponse"
  /DescribeAggregateComplianceByConformancePacks:
    post:
      operationId: DescribeAggregateComplianceByConformancePacks
      description: Returns a list of the existing and deleted conformance packs and their associated compliance status with the count of compliant and noncompliant Config rules within each conformance pack. Also returns the total rule count which includes compliant rules, noncompliant rules, and rules that cannot be evaluated due to insufficient data. The results can return an empty result page, but if you have a nextToken, the results are displayed on the next page.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.DescribeAggregateComplianceByConformancePacks
            default: StarlingDoveService.DescribeAggregateComplianceByConformancePacks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationAggregatorName:
                  $ref: "#/components/schemas/ConfigurationAggregatorName"
                  description: The name of the configuration aggregator.
                Filters:
                  $ref: "#/components/schemas/AggregateConformancePackComplianceFilters"
                  description: Filters the result by AggregateConformancePackComplianceFilters object.
                Limit:
