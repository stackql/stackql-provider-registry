        ServicePrincipal:
          $ref: "#/components/schemas/AggregatorFilterServicePrincipal"
          description: An object to filter service-linked configuration recorders in an aggregator based on the linked Amazon Web Services service.
    AggregatorFilterResourceType:
      description: An object to filter the configuration recorders based on the resource types in scope for recording.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/AggregatorFilterType"
