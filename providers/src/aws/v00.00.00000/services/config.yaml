                  description: The name of the customer managed configuration recorder that you want to stop.
              required:
                - ConfigurationRecorderName
      responses:
        "200":
          description: Success
  /TagResource:
    post:
      operationId: TagResource
      description: Associates the specified tags to a resource with the specified ResourceArn. If existing tags on a resource are not specified in the request parameters, they are not changed. If existing tags are specified, however, then their values will be updated. When a resource is deleted, the tags associated with that resource are deleted as well.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.TagResource
            default: StarlingDoveService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: "The Amazon Resource Name (ARN) that identifies the resource for which to list the tags. The following resources are supported: ConfigurationRecorder ConfigRule OrganizationConfigRule ConformancePack OrganizationConformancePack ConfigurationAggregator AggregationAuthorization StoredQuery"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of tag object.
              required:
                - ResourceArn
                - Tags
      responses:
        "200":
          description: Success
  /UntagResource:
    post:
      operationId: UntagResource
      description: Deletes specified tags from a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.UntagResource
            default: StarlingDoveService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: "The Amazon Resource Name (ARN) that identifies the resource for which to list the tags. The following resources are supported: ConfigurationRecorder ConfigRule OrganizationConfigRule ConformancePack OrganizationConformancePack ConfigurationAggregator AggregationAuthorization StoredQuery"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The keys of the tags to be removed.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
