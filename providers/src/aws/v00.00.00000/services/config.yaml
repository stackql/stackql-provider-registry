            schema:
              type: object
              properties:
                ResourceType:
                  $ref: "#/components/schemas/ResourceTypeString"
                  description: The type of the resource. The custom resource type must be registered with CloudFormation. You cannot use the organization names “amzn”, “amazon”, “alexa”, “custom” with custom resource types. It is the first part of the ResourceType up to the first ::.
                SchemaVersionId:
                  $ref: "#/components/schemas/SchemaVersionId"
                  description: Version of the schema registered for the ResourceType in CloudFormation.
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: Unique identifier of the resource.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: Name of the resource.
                Configuration:
                  $ref: "#/components/schemas/Configuration"
                  description: The configuration object of the resource in valid JSON format. It must match the schema registered with CloudFormation. The configuration JSON must not exceed 64 KB.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: Tags associated with the resource. This field is not to be confused with the Amazon Web Services-wide tag feature for Amazon Web Services resources. Tags for PutResourceConfig are tags that you supply for the configuration items of your custom resources.
              required:
