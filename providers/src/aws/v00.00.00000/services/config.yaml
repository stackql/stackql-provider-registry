          $ref: "#/components/schemas/String"
          description: The string that you use in a subsequent request to get the next page of results in a paginated response.
    ConfigRuleEvaluationStatusList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigRuleEvaluationStatus"
    ConfigRuleEvaluationStatus:
      description: Status information for your Config Managed rules and Config Custom Policy rules. The status includes information such as the last time the rule ran, the last time it failed, and the related error for the last failure. This operation does not return status information about Config Custom Lambda rules.
      type: object
      properties:
        ConfigRuleName:
          $ref: "#/components/schemas/ConfigRuleName"
          description: The name of the Config rule.
        ConfigRuleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Config rule.
        ConfigRuleId:
          $ref: "#/components/schemas/String"
          description: The ID of the Config rule.
        LastSuccessfulInvocationTime:
          $ref: "#/components/schemas/Date"
          description: The time that Config last successfully invoked the Config rule to evaluate your Amazon Web Services resources.
        LastFailedInvocationTime:
          $ref: "#/components/schemas/Date"
          description: The time that Config last failed to invoke the Config rule to evaluate your Amazon Web Services resources.
        LastSuccessfulEvaluationTime:
          $ref: "#/components/schemas/Date"
          description: The time that Config last successfully evaluated your Amazon Web Services resources against the rule.
        LastFailedEvaluationTime:
          $ref: "#/components/schemas/Date"
          description: The time that Config last failed to evaluate your Amazon Web Services resources against the rule.
        FirstActivatedTime:
          $ref: "#/components/schemas/Date"
          description: The time that you first activated the Config rule.
        LastDeactivatedTime:
          $ref: "#/components/schemas/Date"
          description: The time that you last turned off the Config rule.
        LastErrorCode:
          $ref: "#/components/schemas/String"
          description: The error code that Config returned when the rule last failed.
        LastErrorMessage:
          $ref: "#/components/schemas/String"
          description: The error message that Config returned when the rule last failed.
        FirstEvaluationStarted:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Config has evaluated your resources against the rule at least once. true - Config has evaluated your Amazon Web Services resources against the rule at least once. false - Config has not finished evaluating your Amazon Web Services resources against the rule at least once.
        LastDebugLogDeliveryStatus:
          $ref: "#/components/schemas/String"
          description: The status of the last attempted delivery of a debug log for your Config Custom Policy rules. Either Successful or Failed.
        LastDebugLogDeliveryStatusReason:
          $ref: "#/components/schemas/String"
          description: The reason Config was not able to deliver a debug log. This is for the last failed attempt to retrieve a debug log for your Config Custom Policy rules.
        LastDebugLogDeliveryTime:
          $ref: "#/components/schemas/Date"
          description: The time Config last attempted to deliver a debug log for your Config Custom Policy rules.
    DescribeConfigRulesFilters:
      description: Returns a filtered list of Detective or Proactive Config rules. By default, if the filter is not defined, this API returns an unfiltered list. For more information on Detective or Proactive Config rules, see Evaluation Mode in the Config Developer Guide.
      type: object
      properties:
        EvaluationMode:
          $ref: "#/components/schemas/EvaluationMode"
          description: The mode of an evaluation. The valid values are Detective or Proactive.
    EvaluationMode:
      type: string
      enum:
        - DETECTIVE
        - PROACTIVE
    DescribeConfigRulesResponse:
      type: object
      properties:
        ConfigRules:
          $ref: "#/components/schemas/ConfigRules"
          description: The details about your Config rules.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The string that you use in a subsequent request to get the next page of results in a paginated response.
    ConfigRules:
      type: array
      items:
        $ref: "#/components/schemas/ConfigRule"
    ConfigRule:
      description: "Config rules evaluate the configuration settings of your Amazon Web Services resources. A rule can run when Config detects a configuration change to an Amazon Web Services resource or at a periodic frequency that you choose (for example, every 24 hours). There are two types of rules: Config Managed Rules and Config Custom Rules. Config Managed Rules are predefined, customizable rules created by Config. For a list of managed rules, see List of Config Managed Rules. Config Custom Rules are rules that you create from scratch. There are two ways to create Config custom rules: with Lambda functions ( Lambda Developer Guide) and with Guard (Guard GitHub Repository), a policy-as-code language. Config custom rules created with Lambda are called Config Custom Lambda Rules and Config custom rules created with Guard are called Config Custom Policy Rules. For more information about developing and using Config rules, see Evaluating Resource with Config Rules in the Config Developer Guide. You can use the Amazon Web Services CLI and Amazon Web Services SDKs if you want to create a rule that triggers evaluations for your resources when Config delivers the configuration snapshot. For more information, see ConfigSnapshotDeliveryProperties."
      type: object
      properties:
        ConfigRuleName:
          $ref: "#/components/schemas/ConfigRuleName"
          description: The name that you assign to the Config rule. The name is required if you are adding a new rule.
        ConfigRuleArn:
          $ref: "#/components/schemas/StringWithCharLimit256"
          description: The Amazon Resource Name (ARN) of the Config rule.
        ConfigRuleId:
          $ref: "#/components/schemas/StringWithCharLimit64"
          description: The ID of the Config rule.
        Description:
          $ref: "#/components/schemas/EmptiableStringWithCharLimit256"
          description: The description that you provide for the Config rule.
        Scope:
          $ref: "#/components/schemas/Scope"
          description: Defines which resources can trigger an evaluation for the rule. The scope can include one or more resource types, a combination of one resource type and one resource ID, or a combination of a tag key and value. Specify a scope to constrain the resources that can trigger an evaluation for the rule. If you do not specify a scope, evaluations are triggered when any resource in the recording group changes.
        Source:
          $ref: "#/components/schemas/Source"
          description: Provides the rule owner (Amazon Web Services for managed rules, CUSTOM_POLICY for Custom Policy rules, and CUSTOM_LAMBDA for Custom Lambda rules), the rule identifier, and the notifications that cause the function to evaluate your Amazon Web Services resources.
        InputParameters:
          $ref: "#/components/schemas/StringWithCharLimit1024"
          description: A string, in JSON format, that is passed to the Config rule Lambda function.
        MaximumExecutionFrequency:
          $ref: "#/components/schemas/MaximumExecutionFrequency"
          description: "The maximum frequency with which Config runs evaluations for a rule. You can specify a value for MaximumExecutionFrequency when: This is for an Config managed rule that is triggered at a periodic frequency. Your custom rule is triggered when Config delivers the configuration snapshot. For more information, see ConfigSnapshotDeliveryProperties. By default, rules with a periodic trigger are evaluated every 24 hours. To change the frequency, specify a valid value for the MaximumExecutionFrequency parameter."
        ConfigRuleState:
          $ref: "#/components/schemas/ConfigRuleState"
          description: Indicates whether the Config rule is active or is currently being deleted by Config. It can also indicate the evaluation status for the Config rule. Config sets the state of the rule to EVALUATING temporarily after you use the StartConfigRulesEvaluation request to evaluate your resources against the Config rule. Config sets the state of the rule to DELETING_RESULTS temporarily after you use the DeleteEvaluationResults request to delete the current evaluation results for the Config rule. Config temporarily sets the state of a rule to DELETING after you use the DeleteConfigRule request to delete the rule. After Config deletes the rule, the rule and all of its evaluations are erased and are no longer available.
        CreatedBy:
          $ref: "#/components/schemas/StringWithCharLimit256"
          description: Service principal name of the service that created the rule. The field is populated only if the service-linked rule is created by a service. The field is empty if you create your own rule.
        EvaluationModes:
          $ref: "#/components/schemas/EvaluationModes"
          description: The modes the Config rule can be evaluated in. The valid values are distinct objects. By default, the value is Detective evaluation mode only.
      required:
        - Source
    EmptiableStringWithCharLimit256:
      type: string
      minLength: 0
      maxLength: 256
    Scope:
      description: Defines which resources trigger an evaluation for an Config rule. The scope can include one or more resource types, a combination of a tag key and value, or a combination of one resource type and one resource ID. Specify a scope to constrain which resources trigger an evaluation for a rule. Otherwise, evaluations for the rule are triggered when any resource in your recording group changes in configuration.
      type: object
      properties:
        ComplianceResourceTypes:
          $ref: "#/components/schemas/ComplianceResourceTypes"
          description: The resource types of only those Amazon Web Services resources that you want to trigger an evaluation for the rule. You can only specify one type if you also specify a resource ID for ComplianceResourceId.
        TagKey:
          $ref: "#/components/schemas/StringWithCharLimit128"
          description: The tag key that is applied to only those Amazon Web Services resources that you want to trigger an evaluation for the rule.
        TagValue:
          $ref: "#/components/schemas/StringWithCharLimit256"
          description: The tag value applied to only those Amazon Web Services resources that you want to trigger an evaluation for the rule. If you specify a value for TagValue, you must also specify a value for TagKey.
        ComplianceResourceId:
          $ref: "#/components/schemas/BaseResourceId"
          description: The ID of the only Amazon Web Services resource that you want to trigger an evaluation for the rule. If you specify a resource ID, you must specify one resource type for ComplianceResourceTypes.
    ComplianceResourceTypes:
      type: array
      items:
        $ref: "#/components/schemas/StringWithCharLimit256"
    StringWithCharLimit128:
      type: string
      minLength: 1
      maxLength: 128
    Source:
      description: Provides the CustomPolicyDetails, the rule owner (Amazon Web Services for managed rules, CUSTOM_POLICY for Custom Policy rules, and CUSTOM_LAMBDA for Custom Lambda rules), the rule identifier, and the events that cause the evaluation of your Amazon Web Services resources.
      type: object
      properties:
        Owner:
          $ref: "#/components/schemas/Owner"
          description: Indicates whether Amazon Web Services or the customer owns and manages the Config rule. Config Managed Rules are predefined rules owned by Amazon Web Services. For more information, see Config Managed Rules in the Config developer guide. Config Custom Rules are rules that you can develop either with Guard (CUSTOM_POLICY) or Lambda (CUSTOM_LAMBDA). For more information, see Config Custom Rules in the Config developer guide.
        SourceIdentifier:
          $ref: "#/components/schemas/StringWithCharLimit256"
          description: For Config Managed rules, a predefined identifier from a list. For example, IAM_PASSWORD_POLICY is a managed rule. To reference a managed rule, see List of Config Managed Rules. For Config Custom Lambda rules, the identifier is the Amazon Resource Name (ARN) of the rule's Lambda function, such as arn:aws:lambda:us-east-2:123456789012:function:custom_rule_name. For Config Custom Policy rules, this field will be ignored.
        SourceDetails:
          $ref: "#/components/schemas/SourceDetails"
          description: Provides the source and the message types that cause Config to evaluate your Amazon Web Services resources against a rule. It also provides the frequency with which you want Config to run evaluations for the rule if the trigger type is periodic. If the owner is set to CUSTOM_POLICY, the only acceptable values for the Config rule trigger message type are ConfigurationItemChangeNotification and OversizedConfigurationItemChangeNotification.
        CustomPolicyDetails:
          $ref: "#/components/schemas/CustomPolicyDetails"
          description: Provides the runtime system, policy definition, and whether debug logging is enabled. Required when owner is set to CUSTOM_POLICY.
      required:
        - Owner
    Owner:
      type: string
      enum:
        - CUSTOM_LAMBDA
        - AWS
        - CUSTOM_POLICY
    SourceDetails:
      type: array
      items:
        $ref: "#/components/schemas/SourceDetail"
    SourceDetail:
      description: Provides the source and the message types that trigger Config to evaluate your Amazon Web Services resources against a rule. It also provides the frequency with which you want Config to run evaluations for the rule if the trigger type is periodic. You can specify the parameter values for SourceDetail only for custom rules.
      type: object
      properties:
        EventSource:
          $ref: "#/components/schemas/EventSource"
          description: The source of the event, such as an Amazon Web Services service, that triggers Config to evaluate your Amazon Web Services resources.
        MessageType:
          $ref: "#/components/schemas/MessageType"
          description: "The type of notification that triggers Config to run an evaluation for a rule. You can specify the following notification types: ConfigurationItemChangeNotification - Triggers an evaluation when Config delivers a configuration item as a result of a resource change. OversizedConfigurationItemChangeNotification - Triggers an evaluation when Config delivers an oversized configuration item. Config may generate this notification type when a resource changes and the notification exceeds the maximum size allowed by Amazon SNS. ScheduledNotification - Triggers a periodic evaluation at the frequency specified for MaximumExecutionFrequency. ConfigurationSnapshotDeliveryCompleted - Triggers a periodic evaluation when Config delivers a configuration snapshot. If you want your custom rule to be triggered by configuration changes, specify two SourceDetail objects, one for ConfigurationItemChangeNotification and one for OversizedConfigurationItemChangeNotification."
        MaximumExecutionFrequency:
          $ref: "#/components/schemas/MaximumExecutionFrequency"
          description: The frequency at which you want Config to run evaluations for a custom rule with a periodic trigger. If you specify a value for MaximumExecutionFrequency, then MessageType must use the ScheduledNotification value. By default, rules with a periodic trigger are evaluated every 24 hours. To change the frequency, specify a valid value for the MaximumExecutionFrequency parameter. Based on the valid value you choose, Config runs evaluations once for each valid value. For example, if you choose Three_Hours, Config runs evaluations once every three hours. In this case, Three_Hours is the frequency of this rule.
    EventSource:
      type: string
      enum:
        - aws.config
    MessageType:
      type: string
      enum:
        - ConfigurationItemChangeNotification
        - ConfigurationSnapshotDeliveryCompleted
        - ScheduledNotification
        - OversizedConfigurationItemChangeNotification
    MaximumExecutionFrequency:
      type: string
      enum:
        - One_Hour
        - Three_Hours
        - Six_Hours
        - Twelve_Hours
        - TwentyFour_Hours
    CustomPolicyDetails:
      description: Provides the runtime system, policy definition, and whether debug logging enabled. You can specify the following CustomPolicyDetails parameter values only for Config Custom Policy rules.
      type: object
      properties:
        PolicyRuntime:
          $ref: "#/components/schemas/PolicyRuntime"
          description: The runtime system for your Config Custom Policy rule. Guard is a policy-as-code language that allows you to write policies that are enforced by Config Custom Policy rules. For more information about Guard, see the Guard GitHub Repository.
        PolicyText:
          $ref: "#/components/schemas/PolicyText"
          description: The policy definition containing the logic for your Config Custom Policy rule.
        EnableDebugLogDelivery:
          $ref: "#/components/schemas/Boolean"
          description: The boolean expression for enabling debug logging for your Config Custom Policy rule. The default value is false.
      required:
        - PolicyRuntime
        - PolicyText
    PolicyRuntime:
      type: string
      minLength: 1
      maxLength: 64
      pattern: guard\-2\.x\.x
    PolicyText:
      type: string
      minLength: 0
      maxLength: 10000
    ConfigRuleState:
      type: string
      enum:
        - ACTIVE
        - DELETING
        - DELETING_RESULTS
        - EVALUATING
    EvaluationModes:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationModeConfiguration"
    EvaluationModeConfiguration:
      description: The configuration object for Config rule evaluation mode. The supported valid values are Detective or Proactive.
      type: object
