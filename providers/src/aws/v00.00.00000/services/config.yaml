                  $ref: "#/components/schemas/PageSizeLimit"
                  description: The maximum number of conformance pack compliance scores returned on each page.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken string in a prior request that you can use to get the paginated response for the next set of conformance pack compliance scores.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConformancePackComplianceScoresResponse"
  /ListDiscoveredResources:
    post:
      operationId: ListDiscoveredResources
      description: "Returns a list of resource resource identifiers for the specified resource types for the resources of that type. A resource identifier includes the resource type, ID, and (if available) the custom resource name. The results consist of resources that Config has discovered, including those that Config is not currently recording. You can narrow the results to include only resources that have specific resource IDs or a resource name. You can specify either resource IDs or a resource name, but not both, in the same request. CloudFormation stack recording behavior in Config When a CloudFormation stack fails to create (for example, it enters the ROLLBACK_FAILED state), Config does not record a configuration item (CI) for that stack. Configuration items are only recorded for stacks that reach the following states: CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE UPDATE_ROLLBACK_FAILED DELETE_FAILED DELETE_COMPLETE Because no CI is created for a failed stack creation, you won't see configuration history for that stack in Config, even after the stack is deleted. This helps make sure that Config only tracks resources that were successfully provisioned."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.ListDiscoveredResources
            default: StarlingDoveService.ListDiscoveredResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: The type of resources that you want Config to list in the response.
                resourceIds:
                  $ref: "#/components/schemas/ResourceIdList"
                  description: The IDs of only those resources that you want Config to list in the response. If you do not specify this parameter, Config lists all resources of the specified type that it has discovered. You can list a minimum of 1 resourceID and a maximum of 20 resourceIds.
                resourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: The custom name of only those resources that you want Config to list in the response. If you do not specify this parameter, Config lists all resources of the specified type that it has discovered.
                limit:
                  $ref: "#/components/schemas/Limit"
                  description: The maximum number of resource identifiers returned on each page. The default is 100. You cannot specify a number greater than 100. If you specify 0, Config uses the default.
                includeDeletedResources:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether Config includes deleted resources in the results. By default, deleted resources are not included.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken string returned on a previous page that you use to get the next page of results in a paginated response.
              required:
                - resourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDiscoveredResourcesResponse"
