            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ConformancePackComplianceScoresFilters"
                  description: Filters the results based on the ConformancePackComplianceScoresFilters.
                SortOrder:
                  $ref: "#/components/schemas/SortOrder"
                  description: Determines the order in which conformance pack compliance scores are sorted. Either in ascending or descending order. By default, conformance pack compliance scores are sorted in alphabetical order by name of the conformance pack. Conformance pack compliance scores are sorted in reverse alphabetical order if you enter DESCENDING. You can sort conformance pack compliance scores by the numerical value of the compliance score by entering SCORE in the SortBy action. When compliance scores are sorted by SCORE, conformance packs with a compliance score of INSUFFICIENT_DATA will be last when sorting by ascending order and first when sorting by descending order.
                SortBy:
                  $ref: "#/components/schemas/SortBy"
                  description: Sorts your conformance pack compliance scores in either ascending or descending order, depending on SortOrder. By default, conformance pack compliance scores are sorted in alphabetical order by name of the conformance pack. Enter SCORE, to sort conformance pack compliance scores by the numerical value of the compliance score.
