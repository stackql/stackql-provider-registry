              required:
                - DeliveryChannel
      responses:
        "200":
          description: Success
  /PutEvaluations:
    post:
      operationId: PutEvaluations
      description: Used by an Lambda function to deliver evaluation results to Config. This operation is required in every Lambda function that is invoked by an Config rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
