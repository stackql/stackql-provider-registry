                  $ref: "#/components/schemas/Limit"
                  description: The maximum number of query results returned on each page.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken string returned in a previous request that you use to request the next page of results in a paginated response.
              required:
                - Expression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelectResourceConfigResponse"
  /StartConfigRulesEvaluation:
    post:
      operationId: StartConfigRulesEvaluation
      description: "Runs an on-demand evaluation for the specified Config rules against the last known configuration state of the resources. Use StartConfigRulesEvaluation when you want to test that a rule you updated is working as expected. StartConfigRulesEvaluation does not re-record the latest configuration state for your resources. It re-runs an evaluation against the last known state of your resources. You can specify up to 25 Config rules per request. An existing StartConfigRulesEvaluation call for the specified rules must complete before you can call the API again. If you chose to have Config stream to an Amazon SNS topic, you will receive a ConfigRuleEvaluationStarted notification when the evaluation starts. You don't need to call the StartConfigRulesEvaluation API to run an evaluation for a new rule. When you create a rule, Config evaluates your resources against the rule automatically. The StartConfigRulesEvaluation API is useful if you want to run on-demand evaluations, such as the following example: You have a custom rule that evaluates your IAM resources every 24 hours. You update your Lambda function to add additional conditions to your rule. Instead of waiting for the next periodic evaluation, you call the StartConfigRulesEvaluation API. Config invokes your Lambda function and evaluates your IAM resources. Your custom rule will still run periodic evaluations every 24 hours."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.StartConfigRulesEvaluation
            default: StarlingDoveService.StartConfigRulesEvaluation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigRuleNames:
                  $ref: "#/components/schemas/ReevaluateConfigRuleNames"
                  description: The list of names of Config rules that you want to run evaluations for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartConfigRulesEvaluationResponse"
  /StartConfigurationRecorder:
    post:
      operationId: StartConfigurationRecorder
      description: Starts the customer managed configuration recorder. The customer managed configuration recorder will begin recording configuration changes for the resource types you specify. You must have created a delivery channel to successfully start the customer managed configuration recorder. You can use the PutDeliveryChannel operation to create a delivery channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.StartConfigurationRecorder
            default: StarlingDoveService.StartConfigurationRecorder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationRecorderName:
                  $ref: "#/components/schemas/RecorderName"
                  description: The name of the customer managed configuration recorder that you want to start.
              required:
                - ConfigurationRecorderName
      responses:
        "200":
          description: Success
  /StartRemediationExecution:
    post:
      operationId: StartRemediationExecution
      description: Runs an on-demand remediation for the specified Config rules against the last known remediation configuration. It runs an execution against the current state of your resources. Remediation execution is asynchronous. You can specify up to 100 resource keys per request. An existing StartRemediationExecution call for the specified resource keys must complete before you can call the API again.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.StartRemediationExecution
            default: StarlingDoveService.StartRemediationExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigRuleName:
                  $ref: "#/components/schemas/ConfigRuleName"
                  description: The list of names of Config rules that you want to run remediation execution for.
                ResourceKeys:
                  $ref: "#/components/schemas/ResourceKeys"
                  description: A list of resource keys to be processed with the current request. Each element in the list consists of the resource type and resource ID.
              required:
                - ConfigRuleName
                - ResourceKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRemediationExecutionResponse"
  /StartResourceEvaluation:
    post:
      operationId: StartResourceEvaluation
      description: 'Runs an on-demand evaluation for the specified resource to determine whether the resource details will comply with configured Config rules. You can also use it for evaluation purposes. Config recommends using an evaluation context. It runs an execution against the resource details with all of the Config rules in your account that match with the specified proactive mode and resource type. Ensure you have the cloudformation:DescribeType role setup to validate the resource type schema. You can find the Resource type schema in "Amazon Web Services public extensions" within the CloudFormation registry or with the following CLI commmand: aws cloudformation describe-type --type-name "AWS::S3::Bucket" --type RESOURCE. For more information, see Managing extensions through the CloudFormation registry and Amazon Web Services resource and property types reference in the CloudFormation User Guide.'
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.StartResourceEvaluation
            default: StarlingDoveService.StartResourceEvaluation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceDetails:
                  $ref: "#/components/schemas/ResourceDetails"
                  description: Returns a ResourceDetails object.
                EvaluationContext:
                  $ref: "#/components/schemas/EvaluationContext"
                  description: Returns an EvaluationContext object.
                EvaluationMode:
                  $ref: "#/components/schemas/EvaluationMode"
                  description: The mode of an evaluation. The only valid value for this API is PROACTIVE.
                EvaluationTimeout:
                  $ref: "#/components/schemas/EvaluationTimeout"
                  description: The timeout for an evaluation. The default is 900 seconds. You cannot specify a number greater than 3600. If you specify 0, Config uses the default.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A client token is a unique, case-sensitive string of up to 64 ASCII characters. To make an idempotent API request using one of these actions, specify a client token in the request. Avoid reusing the same client token for other API requests. If you retry a request that completed successfully using the same client token and the same parameters, the retry succeeds without performing any further actions. If you retry a successful request using the same client token, but one or more of the parameters are different, other than the Region or Availability Zone, the retry fails with an IdempotentParameterMismatch error.
              required:
                - ResourceDetails
                - EvaluationMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResourceEvaluationResponse"
  /StopConfigurationRecorder:
    post:
      operationId: StopConfigurationRecorder
      description: Stops the customer managed configuration recorder. The customer managed configuration recorder will stop recording configuration changes for the resource types you have specified.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
