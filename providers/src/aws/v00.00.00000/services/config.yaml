            default: StarlingDoveService.PutConfigurationRecorder
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConfigurationRecorder:
                  $ref: "#/components/schemas/ConfigurationRecorder"
                  description: An object for the configuration recorder. A configuration recorder records configuration changes for the resource types in scope.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: The tags for the customer managed configuration recorder. Each tag consists of a key and an optional value, both of which you define.
              required:
                - ConfigurationRecorder
      responses:
        "200":
          description: Success
  /PutConformancePack:
    post:
      operationId: PutConformancePack
      description: "Creates or updates a conformance pack. A conformance pack is a collection of Config rules that can be easily deployed in an account and a region and across an organization. For information on how many conformance packs you can have per account, see Service Limits in the Config Developer Guide. When you use PutConformancePack to deploy conformance packs in your account, the operation can create Config rules and remediation actions without requiring config:PutConfigRule or config:PutRemediationConfigurations permissions in your account IAM policies. This API uses the AWSServiceRoleForConfigConforms service-linked role in your account to create conformance pack resources. This service-linked role includes the permissions to create Config rules and remediation configurations, even if your account IAM policies explicitly deny these actions. This API creates a service-linked role AWSServiceRoleForConfigConforms in your account. The service-linked role is created only when the role does not exist in your account. You must specify only one of the follow parameters: TemplateS3Uri, TemplateBody or TemplateSSMDocumentDetails. Tags are added at creation and cannot be updated with this operation PutConformancePack is an idempotent API. Subsequent requests won't create a duplicate resource if one was already created. If a following request has different tags values, Config will ignore these differences and treat it as an idempotent request of the previous. In this case, tags will not be updated, even if they are different. Use TagResource and UntagResource to update tags after creation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - StarlingDoveService.PutConformancePack
            default: StarlingDoveService.PutConformancePack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConformancePackName:
                  $ref: "#/components/schemas/ConformancePackName"
                  description: The unique name of the conformance pack you want to deploy.
                TemplateS3Uri:
                  $ref: "#/components/schemas/TemplateS3Uri"
                  description: "The location of the file containing the template body (s3://bucketname/prefix). The uri must point to a conformance pack template (max size: 300 KB) that is located in an Amazon S3 bucket in the same Region as the conformance pack. You must have access to read Amazon S3 bucket. In addition, in order to ensure a successful deployment, the template object must not be in an archived storage class if this parameter is passed."
                TemplateBody:
                  $ref: "#/components/schemas/TemplateBody"
                  description: "A string that contains the full conformance pack template body. The structure containing the template body has a minimum length of 1 byte and a maximum length of 51,200 bytes. You can use a YAML template with two resource types: Config rule (AWS::Config::ConfigRule) and remediation action (AWS::Config::RemediationConfiguration)."
                DeliveryS3Bucket:
                  $ref: "#/components/schemas/DeliveryS3Bucket"
                  description: The name of the Amazon S3 bucket where Config stores conformance pack templates. This field is optional.
                DeliveryS3KeyPrefix:
                  $ref: "#/components/schemas/DeliveryS3KeyPrefix"
                  description: The prefix for the Amazon S3 bucket. This field is optional.
                ConformancePackInputParameters:
                  $ref: "#/components/schemas/ConformancePackInputParameters"
                  description: A list of ConformancePackInputParameter objects.
                TemplateSSMDocumentDetails:
                  $ref: "#/components/schemas/TemplateSSMDocumentDetails"
                  description: An object of type TemplateSSMDocumentDetails, which contains the name or the Amazon Resource Name (ARN) of the Amazon Web Services Systems Manager document (SSM document) and the version of the SSM document that is used to create a conformance pack.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: The tags for the conformance pack. Each tag consists of a key and an optional value, both of which you define.
              required:
                - ConformancePackName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutConformancePackResponse"
  /PutDeliveryChannel:
    post:
      operationId: PutDeliveryChannel
      description: Creates or updates a delivery channel to deliver configuration information and other compliance information. You can use this operation to create a new delivery channel or to update the Amazon S3 bucket and the Amazon SNS topic of an existing delivery channel. For more information, see Working with the Delivery Channel in the Config Developer Guide. One delivery channel per account per Region You can have only one delivery channel for each account for each Amazon Web Services Region.
      parameters:
