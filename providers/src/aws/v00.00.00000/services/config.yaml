    DeliveryChannel:
      description: The channel through which Config delivers notifications and updated configuration states.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ChannelName"
          description: The name of the delivery channel. By default, Config assigns the name "default" when creating the delivery channel. To change the delivery channel name, you must use the DeleteDeliveryChannel action to delete your current delivery channel, and then you must use the PutDeliveryChannel command to create a delivery channel that has the desired name.
        s3BucketName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon S3 bucket to which Config delivers configuration snapshots and configuration history files. If you specify a bucket that belongs to another Amazon Web Services account, that bucket must have policies that grant access permissions to Config. For more information, see Permissions for the Amazon S3 Bucket in the Config Developer Guide.
        s3KeyPrefix:
          $ref: "#/components/schemas/String"
          description: The prefix for the specified Amazon S3 bucket.
        s3KmsKeyArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Key Management Service (KMS ) KMS key (KMS key) used to encrypt objects delivered by Config. Must belong to the same Region as the destination S3 bucket.
        snsTopicARN:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to which Config sends notifications about configuration changes. If you choose a topic from another account, the topic must have policies that grant access permissions to Config. For more information, see Permissions for the Amazon SNS Topic in the Config Developer Guide.
        configSnapshotDeliveryProperties:
          $ref: "#/components/schemas/ConfigSnapshotDeliveryProperties"
          description: The options for how often Config delivers configuration snapshots to the Amazon S3 bucket.
    ConfigSnapshotDeliveryProperties:
      description: "Provides options for how often Config delivers configuration snapshots to the Amazon S3 bucket in your delivery channel. The frequency for a rule that triggers evaluations for your resources when Config delivers the configuration snapshot is set by one of two values, depending on which is less frequent: The value for the deliveryFrequency parameter within the delivery channel configuration, which sets how often Config delivers configuration snapshots. This value also sets how often Config invokes evaluations for Config rules. The value for the MaximumExecutionFrequency parameter, which sets the maximum frequency with which Config invokes evaluations for the rule. For more information, see ConfigRule. If the deliveryFrequency value is less frequent than the MaximumExecutionFrequency value for a rule, Config invokes the rule only as often as the deliveryFrequency value. For example, you want your rule to run evaluations when Config delivers the configuration snapshot. You specify the MaximumExecutionFrequency value for Six_Hours. You then specify the delivery channel deliveryFrequency value for TwentyFour_Hours. Because the value for deliveryFrequency is less frequent than MaximumExecutionFrequency, Config invokes evaluations for the rule every 24 hours. You should set the MaximumExecutionFrequency value to be at least as frequent as the deliveryFrequency value. You can view the deliveryFrequency value by using the DescribeDeliveryChannnels action. To update the deliveryFrequency with which Config delivers your configuration snapshots, use the PutDeliveryChannel action."
      type: object
      properties:
        deliveryFrequency:
          $ref: "#/components/schemas/MaximumExecutionFrequency"
          description: The frequency with which Config delivers configuration snapshots.
