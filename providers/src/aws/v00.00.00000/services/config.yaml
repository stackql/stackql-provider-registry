                ResourceType:
                  $ref: "#/components/schemas/StringWithCharLimit256"
                  description: The types of Amazon Web Services resources for which you want compliance information (for example, AWS::EC2::Instance). For this operation, you can specify that the resource type is an Amazon Web Services account by specifying AWS::::Account.
                ResourceId:
                  $ref: "#/components/schemas/BaseResourceId"
                  description: The ID of the Amazon Web Services resource for which you want compliance information. You can specify only one resource ID. If you specify a resource ID, you must also specify a type for ResourceType.
                ComplianceTypes:
                  $ref: "#/components/schemas/ComplianceTypes"
                  description: Filters the results by compliance.
                Limit:
                  $ref: "#/components/schemas/Limit"
                  description: The maximum number of evaluation results returned on each page. The default is 10. You cannot specify a number greater than 100. If you specify 0, Config uses the default.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The nextToken string returned on a previous page that you use to get the next page of results in a paginated response.
