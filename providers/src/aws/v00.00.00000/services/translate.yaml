        Languages:
          $ref: "#/components/schemas/LanguagesList"
          description: The list of supported languages.
        DisplayLanguageCode:
          $ref: "#/components/schemas/DisplayLanguageCode"
          description: The language code passed in with the request.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response does not include all remaining results, use the NextToken in the next request to fetch the next group of supported languages.
    LanguagesList:
      type: array
      items:
        $ref: "#/components/schemas/Language"
    Language:
      description: A supported language.
      type: object
      properties:
        LanguageName:
          $ref: "#/components/schemas/LocalizedNameString"
          description: Language name of the supported language.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: Language code for the supported language.
      required:
        - LanguageName
        - LanguageCode
    LocalizedNameString:
      type: string
      minLength: 1
      maxLength: 256
    ListParallelDataResponse:
      type: object
      properties:
        ParallelDataPropertiesList:
          $ref: "#/components/schemas/ParallelDataPropertiesList"
          description: The properties of the parallel data resources returned by this request.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The string to use in a subsequent request to get the next page of results in a paginated response. This value is null if there are no additional pages.
    ParallelDataPropertiesList:
      type: array
      items:
        $ref: "#/components/schemas/ParallelDataProperties"
    ResourceArn:
      type: string
      minLength: 1
      maxLength: 512
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Tags associated with the Amazon Translate resource being queried. A tag is a key-value pair that adds as a metadata to a resource used by Amazon Translate. For example, a tag with "Sales" as the key might be added to a resource to indicate its use by the sales department.
    ListTerminologiesResponse:
      type: object
      properties:
        TerminologyPropertiesList:
          $ref: "#/components/schemas/TerminologyPropertiesList"
          description: The properties list of the custom terminologies returned on the list request.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response to the ListTerminologies was truncated, the NextToken fetches the next group of custom terminologies.
    TerminologyPropertiesList:
      type: array
      items:
        $ref: "#/components/schemas/TerminologyProperties"
    TextTranslationJobFilter:
      description: Provides information for filtering a list of translation jobs. For more information, see ListTextTranslationJobs.
      type: object
      properties:
        JobName:
          $ref: "#/components/schemas/JobName"
          description: Filters the list of jobs by name.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: Filters the list of jobs based by job status.
        SubmittedBeforeTime:
          $ref: "#/components/schemas/Timestamp"
          description: Filters the list of jobs based on the time that the job was submitted for processing and returns only the jobs submitted before the specified time. Jobs are returned in ascending order, oldest to newest.
        SubmittedAfterTime:
          $ref: "#/components/schemas/Timestamp"
          description: Filters the list of jobs based on the time that the job was submitted for processing and returns only the jobs submitted after the specified time. Jobs are returned in descending order, newest to oldest.
    ListTextTranslationJobsResponse:
      type: object
      properties:
        TextTranslationJobPropertiesList:
          $ref: "#/components/schemas/TextTranslationJobPropertiesList"
          description: A list containing the properties of each job that is returned.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token to use to retrieve the next page of results. This value is null when there are no more results to return.
    TextTranslationJobPropertiesList:
      type: array
      items:
        $ref: "#/components/schemas/TextTranslationJobProperties"
    StartTextTranslationJobResponse:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The identifier generated for the job. To get the status of a job, use this ID with the DescribeTextTranslationJob operation.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: "The status of the job. Possible values include: SUBMITTED - The job has been received and is queued for processing. IN_PROGRESS - Amazon Translate is processing the job. COMPLETED - The job was successfully completed and the output is available. COMPLETED_WITH_ERROR - The job was completed with errors. The errors can be analyzed in the job's output. FAILED - The job did not complete. To get details, use the DescribeTextTranslationJob operation. STOP_REQUESTED - The user who started the job has requested that it be stopped. STOPPED - The job has been stopped."
    StopTextTranslationJobResponse:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The job ID of the stopped batch translation job.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the designated job. Upon successful completion, the job's status will be STOPPED.
    TagResourceResponse:
      type: object
    Document:
      description: The content and content type of a document.
      type: object
      properties:
        Content:
          $ref: "#/components/schemas/DocumentContent"
          description: The Contentfield type is Binary large object (blob). This object contains the document content converted into base64-encoded binary data. If you use one of the AWS SDKs, the SDK performs the Base64-encoding on this field before sending the request.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: "Describes the format of the document. You can specify one of the following: text/html - The input data consists of HTML content. Amazon Translate translates only the text in the HTML element. text/plain - The input data consists of unformatted text. Amazon Translate translates every character in the content. application/vnd.openxmlformats-officedocument.wordprocessingml.document - The input data consists of a Word document (.docx)."
      required:
        - Content
        - ContentType
    DocumentContent:
      type: string
      format: byte
      maxLength: 102400
    TranslateDocumentResponse:
      type: object
      properties:
        TranslatedDocument:
          $ref: "#/components/schemas/TranslatedDocument"
          description: The document containing the translated content. The document format matches the source document format.
        SourceLanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: The language code of the source document.
        TargetLanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: The language code of the translated document.
        AppliedTerminologies:
          $ref: "#/components/schemas/AppliedTerminologyList"
          description: The names of the custom terminologies applied to the input text by Amazon Translate to produce the translated text document.
        AppliedSettings:
          $ref: "#/components/schemas/TranslationSettings"
      required:
        - TranslatedDocument
        - SourceLanguageCode
        - TargetLanguageCode
    TranslatedDocument:
      description: The translated content.
      type: object
      properties:
        Content:
          $ref: "#/components/schemas/TranslatedDocumentContent"
          description: The document containing the translated content.
      required:
        - Content
    TranslatedDocumentContent:
      type: string
      format: byte
    AppliedTerminologyList:
      type: array
      items:
        $ref: "#/components/schemas/AppliedTerminology"
    AppliedTerminology:
      description: The custom terminology applied to the input text by Amazon Translate for the translated text response. This is optional in the response and will only be present if you specified terminology input in the request. Currently, only one terminology can be applied per TranslateText request.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the custom terminology applied to the input text by Amazon Translate for the translated text response.
        Terms:
          $ref: "#/components/schemas/TermList"
          description: The specific terms of the custom terminology applied to the input text by Amazon Translate for the translated text response. A maximum of 250 terms will be returned, and the specific terms applied will be the first 250 terms in the source text.
    TermList:
      type: array
      items:
        $ref: "#/components/schemas/Term"
    Term:
      description: The term being translated by the custom terminology.
      type: object
      properties:
        SourceText:
          $ref: "#/components/schemas/String"
          description: The source text of the term being translated by the custom terminology.
        TargetText:
          $ref: "#/components/schemas/String"
          description: The target text of the term being translated by the custom terminology.
    BoundedLengthString:
      type: string
      minLength: 1
      maxLength: 10000
      pattern: "[\\P{M}\\p{M}]{1,10000}"
    TranslateTextResponse:
      type: object
      properties:
        TranslatedText:
          $ref: "#/components/schemas/TranslatedTextString"
          description: The translated text.
        SourceLanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: The language code for the language of the source text.
        TargetLanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: The language code for the language of the target text.
        AppliedTerminologies:
          $ref: "#/components/schemas/AppliedTerminologyList"
          description: The names of the custom terminologies applied to the input text by Amazon Translate for the translated text response.
        AppliedSettings:
          $ref: "#/components/schemas/TranslationSettings"
          description: Optional settings that modify the translation output.
      required:
        - TranslatedText
        - SourceLanguageCode
        - TargetLanguageCode
    TranslatedTextString:
      type: string
      maxLength: 20000
      pattern: "[\\P{M}\\p{M}]{0,20000}"
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    UpdateParallelDataResponse:
      type: object
      properties:
        Name:
