      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([A-Za-z0-9-]_?)+$
    Description:
      type: string
      maxLength: 256
      pattern: "[\\P{M}\\p{M}]{0,256}"
    ParallelDataConfig:
      description: Specifies the format and S3 location of the parallel data input file.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The URI of the Amazon S3 folder that contains the parallel data input file. The folder must be in the same Region as the API endpoint you are calling.
        Format:
          $ref: "#/components/schemas/ParallelDataFormat"
          description: The format of the parallel data input file.
    S3Uri:
      type: string
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
    ParallelDataFormat:
      type: string
      enum:
        - TSV
        - CSV
        - TMX
    EncryptionKey:
      description: The encryption key used to encrypt this object.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EncryptionKeyType"
          description: The type of encryption key used by Amazon Translate to encrypt this object.
        Id:
          $ref: "#/components/schemas/EncryptionKeyID"
          description: The Amazon Resource Name (ARN) of the encryption key being used to encrypt this object.
      required:
        - Type
        - Id
    EncryptionKeyType:
      type: string
      enum:
        - KMS
    EncryptionKeyID:
      type: string
      minLength: 1
      maxLength: 400
      pattern: (arn:aws((-us-gov)|(-iso)|(-iso-b)|(-cn))?:kms:)?([a-z]{2}-[a-z]+(-[a-z]+)?-\d:)?(\d{12}:)?(((key/)?[a-zA-Z0-9-_]+)|(alias/[a-zA-Z0-9:/_-]+))
    ClientTokenString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-]+$
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair that adds as a metadata to a resource used by Amazon Translate.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The initial part of a key-value pair that forms a tag associated with a given resource.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The second part of a key-value pair that forms a tag associated with a given resource.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateParallelDataResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The custom name that you assigned to the parallel data resource.
        Status:
          $ref: "#/components/schemas/ParallelDataStatus"
          description: The status of the parallel data resource. When the resource is ready for you to use, the status is ACTIVE.
    ParallelDataStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - ACTIVE
        - DELETING
        - FAILED
    DeleteParallelDataResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the parallel data resource that is being deleted.
        Status:
          $ref: "#/components/schemas/ParallelDataStatus"
          description: The status of the parallel data deletion.
    JobId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    DescribeTextTranslationJobResponse:
      type: object
      properties:
        TextTranslationJobProperties:
          $ref: "#/components/schemas/TextTranslationJobProperties"
          description: An object that contains the properties associated with an asynchronous batch translation job.
    TextTranslationJobProperties:
      description: Provides information about a translation job.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The ID of the translation job.
        JobName:
          $ref: "#/components/schemas/JobName"
          description: The user-defined name of the translation job.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the translation job.
        JobDetails:
          $ref: "#/components/schemas/JobDetails"
          description: The number of documents successfully and unsuccessfully processed during the translation job.
        SourceLanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: The language code of the language of the source text. The language must be a language supported by Amazon Translate.
        TargetLanguageCodes:
          $ref: "#/components/schemas/TargetLanguageCodeStringList"
          description: The language code of the language of the target text. The language must be a language supported by Amazon Translate.
        TerminologyNames:
          $ref: "#/components/schemas/ResourceNameList"
          description: A list containing the names of the terminologies applied to a translation job. Only one terminology can be applied per StartTextTranslationJob request at this time.
        ParallelDataNames:
          $ref: "#/components/schemas/ResourceNameList"
          description: A list containing the names of the parallel data resources applied to the translation job.
        Message:
          $ref: "#/components/schemas/UnboundedLengthString"
          description: An explanation of any errors that may have occurred during the translation job.
        SubmittedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the translation job was submitted.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the translation job ended.
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: The input configuration properties that were specified when the job was requested.
        OutputDataConfig:
          $ref: "#/components/schemas/OutputDataConfig"
          description: The output configuration properties that were specified when the job was requested.
        DataAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of an AWS Identity Access and Management (IAM) role that granted Amazon Translate read access to the job's input data.
        Settings:
          $ref: "#/components/schemas/TranslationSettings"
          description: Settings that modify the translation output.
    JobName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-%@]*)$
    JobStatus:
      type: string
      enum:
        - SUBMITTED
        - IN_PROGRESS
        - COMPLETED
        - COMPLETED_WITH_ERROR
        - FAILED
        - STOP_REQUESTED
        - STOPPED
    JobDetails:
      description: The number of documents successfully and unsuccessfully processed during a translation job.
      type: object
      properties:
        TranslatedDocumentsCount:
          $ref: "#/components/schemas/Integer"
          description: The number of documents successfully processed during a translation job.
        DocumentsWithErrorsCount:
          $ref: "#/components/schemas/Integer"
          description: The number of documents that could not be processed during a translation job.
        InputDocumentsCount:
          $ref: "#/components/schemas/Integer"
          description: The number of documents used as input in a translation job.
    Integer:
      type: integer
    LanguageCodeString:
      type: string
      minLength: 2
      maxLength: 5
    TargetLanguageCodeStringList:
      type: array
      items:
        $ref: "#/components/schemas/LanguageCodeString"
    ResourceNameList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceName"
    UnboundedLengthString:
      type: string
    Timestamp:
      type: string
      format: date-time
    InputDataConfig:
      description: The input configuration properties for requesting a batch translation job.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The URI of the AWS S3 folder that contains the input files. Amazon Translate translates all the files in the folder and all its sub-folders. The folder must be in the same Region as the API endpoint you are calling.
        ContentType:
          $ref: "#/components/schemas/ContentType"
          description: "Describes the format of the data that you submit to Amazon Translate as input. You can specify one of the following multipurpose internet mail extension (MIME) types: text/html: The input data consists of one or more HTML files. Amazon Translate translates only the text that resides in the html element in each file. text/plain: The input data consists of one or more unformatted text files. Amazon Translate translates every character in this type of input. application/vnd.openxmlformats-officedocument.wordprocessingml.document: The input data consists of one or more Word documents (.docx). application/vnd.openxmlformats-officedocument.presentationml.presentation: The input data consists of one or more PowerPoint Presentation files (.pptx). application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: The input data consists of one or more Excel Workbook files (.xlsx). application/x-xliff+xml: The input data consists of one or more XML Localization Interchange File Format (XLIFF) files (.xlf). Amazon Translate supports only XLIFF version 1.2. If you structure your input data as HTML, ensure that you set this parameter to text/html. By doing so, you cut costs by limiting the translation to the contents of the html element in each file. Otherwise, if you set this parameter to text/plain, your costs will cover the translation of every character."
      required:
        - S3Uri
        - ContentType
    ContentType:
      type: string
      maxLength: 256
      pattern: ^[-\w.]+\/[-\w.+]+$
    OutputDataConfig:
      description: The output configuration properties for a batch translation job.
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The URI of the S3 folder that contains a translation job's output file. The folder must be in the same Region as the API endpoint that you are calling.
        EncryptionKey:
          $ref: "#/components/schemas/EncryptionKey"
      required:
        - S3Uri
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
    TranslationSettings:
      description: "Settings to configure your translation output. You can configure the following options: Brevity: reduces the length of the translation output for most translations. Available for TranslateText only. Formality: sets the formality level of the translation output. Profanity: masks profane words and phrases in the translation output."
      type: object
      properties:
        Formality:
          $ref: "#/components/schemas/Formality"
          description: You can specify the desired level of formality for translations to supported target languages. The formality setting controls the level of formal language usage (also known as register) in the translation output. You can set the value to informal or formal. If you don't specify a value for formality, or if the target language doesn't support formality, the translation will ignore the formality setting. If you specify multiple target languages for the job, translate ignores the formality setting for any unsupported target language. For a list of target languages that support formality, see Supported languages in the Amazon Translate Developer Guide.
        Profanity:
          $ref: "#/components/schemas/Profanity"
          description: You can enable the profanity setting if you want to mask profane words and phrases in your translation output. To mask profane words and phrases, Amazon Translate replaces them with the grawlix string “?$#@$“. This 5-character sequence is used for each profane word or phrase, regardless of the length or number of words. Amazon Translate doesn't detect profanity in all of its supported languages. For languages that don't support profanity detection, see Unsupported languages in the Amazon Translate Developer Guide. If you specify multiple target languages for the job, all the target languages must support profanity masking. If any of the target languages don't support profanity masking, the translation job won't mask profanity for any target language.
        Brevity:
          $ref: "#/components/schemas/Brevity"
          description: When you turn on brevity, Amazon Translate reduces the length of the translation output for most translations (when compared with the same translation with brevity turned off). By default, brevity is turned off. If you turn on brevity for a translation request with an unsupported language pair, the translation proceeds with the brevity setting turned off. For the language pairs that brevity supports, see Using brevity in the Amazon Translate Developer Guide.
    Formality:
      type: string
      enum:
        - FORMAL
        - INFORMAL
    Profanity:
      type: string
      enum:
        - MASK
    Brevity:
      type: string
      enum:
        - "ON"
    GetParallelDataResponse:
      type: object
      properties:
        ParallelDataProperties:
          $ref: "#/components/schemas/ParallelDataProperties"
          description: The properties of the parallel data resource that is being retrieved.
        DataLocation:
          $ref: "#/components/schemas/ParallelDataDataLocation"
          description: The Amazon S3 location of the most recent parallel data input file that was successfully imported into Amazon Translate. The location is returned as a presigned URL that has a 30-minute expiration. Amazon Translate doesn't scan all input files for the risk of CSV injection attacks. CSV injection occurs when a .csv or .tsv file is altered so that a record contains malicious code. The record begins with a special character, such as =, +, -, or @. When the file is opened in a spreadsheet program, the program might interpret the record as a formula and run the code within it. Before you download an input file from Amazon S3, ensure that you recognize the file and trust its creator.
        AuxiliaryDataLocation:
          $ref: "#/components/schemas/ParallelDataDataLocation"
          description: The Amazon S3 location of a file that provides any errors or warnings that were produced by your input file. This file was created when Amazon Translate attempted to create a parallel data resource. The location is returned as a presigned URL to that has a 30-minute expiration.
        LatestUpdateAttemptAuxiliaryDataLocation:
          $ref: "#/components/schemas/ParallelDataDataLocation"
          description: The Amazon S3 location of a file that provides any errors or warnings that were produced by your input file. This file was created when Amazon Translate attempted to update a parallel data resource. The location is returned as a presigned URL to that has a 30-minute expiration.
    ParallelDataProperties:
      description: The properties of a parallel data resource.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ResourceName"
          description: The custom name assigned to the parallel data resource.
        Arn:
          $ref: "#/components/schemas/ParallelDataArn"
          description: The Amazon Resource Name (ARN) of the parallel data resource.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description assigned to the parallel data resource.
        Status:
          $ref: "#/components/schemas/ParallelDataStatus"
          description: The status of the parallel data resource. When the parallel data is ready for you to use, the status is ACTIVE.
        SourceLanguageCode:
          $ref: "#/components/schemas/LanguageCodeString"
          description: The source language of the translations in the parallel data file.
        TargetLanguageCodes:
          $ref: "#/components/schemas/LanguageCodeStringList"
          description: The language codes for the target languages available in the parallel data file. All possible target languages are returned as an array.
        ParallelDataConfig:
          $ref: "#/components/schemas/ParallelDataConfig"
          description: Specifies the format and S3 location of the parallel data input file.
        Message:
          $ref: "#/components/schemas/UnboundedLengthString"
          description: Additional information from Amazon Translate about the parallel data resource.
        ImportedDataSize:
          $ref: "#/components/schemas/Long"
          description: The number of UTF-8 characters that Amazon Translate imported from the parallel data input file. This number includes only the characters in your translation examples. It does not include characters that are used to format your file. For example, if you provided a Translation Memory Exchange (.tmx) file, this number does not include the tags.
        ImportedRecordCount:
          $ref: "#/components/schemas/Long"
          description: The number of records successfully imported from the parallel data input file.
        FailedRecordCount:
          $ref: "#/components/schemas/Long"
          description: The number of records unsuccessfully imported from the parallel data input file.
        SkippedRecordCount:
          $ref: "#/components/schemas/Long"
          description: The number of items in the input file that Amazon Translate skipped when you created or updated the parallel data resource. For example, Amazon Translate skips empty records, empty target texts, and empty lines.
        EncryptionKey:
          $ref: "#/components/schemas/EncryptionKey"
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the parallel data resource was created.
        LastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the parallel data resource was last updated.
        LatestUpdateAttemptStatus:
          $ref: "#/components/schemas/ParallelDataStatus"
          description: The status of the most recent update attempt for the parallel data resource.
        LatestUpdateAttemptAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the most recent update was attempted.
    ParallelDataArn:
      type: string
      minLength: 1
      maxLength: 512
    LanguageCodeStringList:
      type: array
      items:
        $ref: "#/components/schemas/LanguageCodeString"
    Long:
      type: integer
      format: int64
    ParallelDataDataLocation:
      description: The location of the most recent parallel data input file that was successfully imported into Amazon Translate.
      type: object
      properties:
        RepositoryType:
          $ref: "#/components/schemas/String"
          description: Describes the repository that contains the parallel data input file.
        Location:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 location of the parallel data input file. The location is returned as a presigned URL to that has a 30-minute expiration. Amazon Translate doesn't scan all input files for the risk of CSV injection attacks. CSV injection occurs when a .csv or .tsv file is altered so that a record contains malicious code. The record begins with a special character, such as =, +, -, or @. When the file is opened in a spreadsheet program, the program might interpret the record as a formula and run the code within it. Before you download an input file from Amazon S3, ensure that you recognize the file and trust its creator.
      required:
        - RepositoryType
        - Location
    String:
      type: string
      maxLength: 10000
      pattern: "[\\P{M}\\p{M}]{0,10000}"
    TerminologyDataFormat:
      type: string
      enum:
        - CSV
        - TMX
        - TSV
    GetTerminologyResponse:
      type: object
      properties:
