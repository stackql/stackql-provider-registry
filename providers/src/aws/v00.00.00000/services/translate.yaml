          description: The name of the parallel data resource being updated.
        Status:
          $ref: "#/components/schemas/ParallelDataStatus"
          description: The status of the parallel data resource that you are attempting to update. Your update request is accepted only if this status is either ACTIVE or FAILED.
        LatestUpdateAttemptStatus:
          $ref: "#/components/schemas/ParallelDataStatus"
          description: The status of the parallel data update attempt. When the updated parallel data resource is ready for you to use, the status is ACTIVE.
        LatestUpdateAttemptAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the most recent update was attempted.
