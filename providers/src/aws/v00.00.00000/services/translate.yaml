        Location:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 location of the most recent custom terminology input file that was successfully imported into Amazon Translate. The location is returned as a presigned URL that has a 30-minute expiration . Amazon Translate doesn't scan all input files for the risk of CSV injection attacks. CSV injection occurs when a .csv or .tsv file is altered so that a record contains malicious code. The record begins with a special character, such as =, +, -, or @. When the file is opened in a spreadsheet program, the program might interpret the record as a formula and run the code within it. Before you download an input file from Amazon S3, ensure that you recognize the file and trust its creator.
      required:
        - RepositoryType
        - Location
    MergeStrategy:
      type: string
      enum:
        - OVERWRITE
    TerminologyData:
      description: The data associated with the custom terminology. For information about the custom terminology file, see Creating a Custom Terminology.
      type: object
      properties:
        File:
          $ref: "#/components/schemas/TerminologyFile"
          description: The file containing the custom terminology data. Your version of the AWS SDK performs a Base64-encoding on this field before sending a request to the AWS service. Users of the SDK should not perform Base64-encoding themselves.
        Format:
          $ref: "#/components/schemas/TerminologyDataFormat"
          description: The data format of the custom terminology.
        Directionality:
          $ref: "#/components/schemas/Directionality"
          description: The directionality of your terminology resource indicates whether it has one source language (uni-directional) or multiple (multi-directional). UNI The terminology resource has one source language (for example, the first column in a CSV file), and all of its other languages are target languages. MULTI Any language in the terminology resource can be the source language or a target language. A single multi-directional terminology resource can be used for jobs that translate different language pairs. For example, if the terminology contains English and Spanish terms, it can be used for jobs that translate English to Spanish and Spanish to English. When you create a custom terminology resource without specifying the directionality, it behaves as uni-directional terminology, although this parameter will have a null value.
      required:
        - File
        - Format
