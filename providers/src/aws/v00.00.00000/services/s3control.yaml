openapi: 3.0.0
info:
  version: "2018-08-20"
  title: AWS S3 Control
  description: AWS S3 Control
  x-serviceName: s3
  x-serviceAlias: s3control
  x-protocol: rest-xml
  x-apiVersion: "2018-08-20"
  x-endpointPrefix: s3-control
servers:
  - url: https://s3-control.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for s3control
paths:
  /v20180820/accessgrantsinstance/identitycenter:
    post:
      operationId: AssociateAccessGrantsIdentityCenter
      description: "Associate your S3 Access Grants instance with an Amazon Web Services IAM Identity Center instance. Use this action if you want to create access grants for users or groups from your corporate identity directory. First, you must add your corporate identity directory to Amazon Web Services IAM Identity Center. Then, you can associate this IAM Identity Center instance with your S3 Access Grants instance. Permissions You must have the s3:AssociateAccessGrantsIdentityCenter permission to use this operation. Additional Permissions You must also have the following permissions: sso:CreateApplication, sso:PutApplicationGrant, and sso:PutApplicationAuthenticationMethod."
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                IdentityCenterArn:
                  $ref: "#/components/schemas/IdentityCenterArn"
              required:
                - IdentityCenterArn
      responses:
        "200":
          description: Success
    delete:
      operationId: DissociateAccessGrantsIdentityCenter
      description: Dissociates the Amazon Web Services IAM Identity Center instance from the S3 Access Grants instance. Permissions You must have the s3:DissociateAccessGrantsIdentityCenter permission to use this operation. Additional Permissions You must have the sso:DeleteApplication permission to use this operation.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      responses:
        "200":
          description: Success
  /v20180820/accessgrantsinstance/grant:
    post:
      operationId: CreateAccessGrant
      description: Creates an access grant that gives a grantee access to your S3 data. The grantee can be an IAM user or role or a directory user, or group. Before you can create a grant, you must have an S3 Access Grants instance in the same Region as the S3 data. You can create an S3 Access Grants instance using the CreateAccessGrantsInstance. You must also have registered at least one S3 data location in your S3 Access Grants instance using CreateAccessGrantsLocation. Permissions You must have the s3:CreateAccessGrant permission to use this operation. Additional Permissions For any directory identity - sso:DescribeInstance and sso:DescribeApplication For directory users - identitystore:DescribeUser For directory groups - identitystore:DescribeGroup
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                AccessGrantsLocationId:
                  $ref: "#/components/schemas/AccessGrantsLocationId"
                AccessGrantsLocationConfiguration:
                  $ref: "#/components/schemas/AccessGrantsLocationConfiguration"
                Grantee:
                  $ref: "#/components/schemas/Grantee"
                Permission:
                  $ref: "#/components/schemas/Permission"
                ApplicationArn:
                  $ref: "#/components/schemas/IdentityCenterApplicationArn"
                S3PrefixType:
                  $ref: "#/components/schemas/S3PrefixType"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - AccessGrantsLocationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessGrantOutputDisplay"
  /v20180820/accessgrantsinstance:
    post:
      operationId: CreateAccessGrantsInstance
      description: Creates an S3 Access Grants instance, which serves as a logical grouping for access grants. You can create one S3 Access Grants instance per Region per account. Permissions You must have the s3:CreateAccessGrantsInstance permission to use this operation. Additional Permissions To associate an IAM Identity Center instance with your S3 Access Grants instance, you must also have the sso:DescribeInstance, sso:CreateApplication, sso:PutApplicationGrant, and sso:PutApplicationAuthenticationMethod permissions.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      requestBody:
        required: false
        content:
          application/xml:
            schema:
              type: object
              properties:
                IdentityCenterArn:
                  $ref: "#/components/schemas/IdentityCenterArn"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessGrantsInstanceOutputDisplay"
    delete:
      operationId: DeleteAccessGrantsInstance
      description: Deletes your S3 Access Grants instance. You must first delete the access grants and locations before S3 Access Grants can delete the instance. See DeleteAccessGrant and DeleteAccessGrantsLocation. If you have associated an IAM Identity Center instance with your S3 Access Grants instance, you must first dissassociate the Identity Center instance from the S3 Access Grants instance before you can delete the S3 Access Grants instance. See AssociateAccessGrantsIdentityCenter and DissociateAccessGrantsIdentityCenter. Permissions You must have the s3:DeleteAccessGrantsInstance permission to use this operation.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAccessGrantsInstance
      description: Retrieves the S3 Access Grants instance for a Region in your account. Permissions You must have the s3:GetAccessGrantsInstance permission to use this operation. GetAccessGrantsInstance is not supported for cross-account access. You can only call the API from the account that owns the S3 Access Grants instance.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccessGrantsInstanceOutputDisplay"
  /v20180820/accessgrantsinstance/location:
    post:
      operationId: CreateAccessGrantsLocation
      description: "The S3 data location that you would like to register in your S3 Access Grants instance. Your S3 data must be in the same Region as your S3 Access Grants instance. The location can be one of the following: The default S3 location s3:// A bucket - S3://`<bucket-name>` A bucket and prefix - S3://`<bucket-name>`/`<prefix>` When you register a location, you must include the IAM role that has permission to manage the S3 location that you are registering. Give S3 Access Grants permission to assume this role using a policy. S3 Access Grants assumes this role to manage access to the location and to vend temporary credentials to grantees or client applications. Permissions You must have the s3:CreateAccessGrantsLocation permission to use this operation. Additional Permissions You must also have the following permission for the specified IAM role: iam:PassRole"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                LocationScope:
                  $ref: "#/components/schemas/S3Prefix"
                IAMRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - LocationScope
                - IAMRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessGrantsLocationOutputDisplay"
  /v20180820/accesspoint/{name}:
    put:
      operationId: CreateAccessPoint
      description: "Creates an access point and associates it to a specified bucket. For more information, see Managing access to shared datasets with access points or Managing access to shared datasets in directory buckets with access points in the Amazon S3 User Guide. To create an access point and attach it to a volume on an Amazon FSx file system, see CreateAndAttachS3AccessPoint in the Amazon FSx API Reference. S3 on Outposts only supports VPC-style access points. For more information, see Accessing Amazon S3 on Outposts using virtual private cloud (VPC) only access points in the Amazon S3 User Guide. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. The following actions are related to CreateAccessPoint: GetAccessPoint DeleteAccessPoint ListAccessPoints ListAccessPointsForDirectoryBuckets"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the account that owns the specified access point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPointName"
          description: The name you want to assign to this access point. For directory buckets, the access point name must consist of a base name that you provide and suffix that includes the ZoneID (Amazon Web Services Availability Zone or Local Zone) of your bucket location, followed by --xa-s3. For more information, see Managing access to shared datasets in directory buckets with access points in the Amazon S3 User Guide.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Bucket:
                  $ref: "#/components/schemas/BucketName"
                VpcConfiguration:
                  $ref: "#/components/schemas/VpcConfiguration"
                PublicAccessBlockConfiguration:
                  $ref: "#/components/schemas/PublicAccessBlockConfiguration"
                BucketAccountId:
                  $ref: "#/components/schemas/AccountId"
                Scope:
                  $ref: "#/components/schemas/Scope"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessPointOutputDisplay"
    delete:
      operationId: DeleteAccessPoint
      description: "Deletes the specified access point. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. The following actions are related to DeleteAccessPoint: CreateAccessPoint GetAccessPoint ListAccessPoints"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the account that owns the specified access point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPointName"
          description: The name of the access point you want to delete. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the access point accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/accesspoint/`<my-accesspoint-name>`. For example, to access the access point reports-ap through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/accesspoint/reports-ap. The value must be URL encoded.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAccessPoint
      description: "Returns configuration information about the specified access point. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. The following actions are related to GetAccessPoint: CreateAccessPoint DeleteAccessPoint ListAccessPoints"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the account that owns the specified access point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPointName"
          description: The name of the access point whose configuration information you want to retrieve. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the access point accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/accesspoint/`<my-accesspoint-name>`. For example, to access the access point reports-ap through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/accesspoint/reports-ap. The value must be URL encoded.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccessPointOutputDisplay"
  /v20180820/accesspointforobjectlambda/{name}:
    put:
      operationId: CreateAccessPointForObjectLambda
      description: "This operation is not supported by directory buckets. Creates an Object Lambda Access Point. For more information, see Transforming objects with Object Lambda Access Points in the Amazon S3 User Guide. The following actions are related to CreateAccessPointForObjectLambda: DeleteAccessPointForObjectLambda GetAccessPointForObjectLambda ListAccessPointsForObjectLambda"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for owner of the specified Object Lambda Access Point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ObjectLambdaAccessPointName"
          description: The name you want to assign to this Object Lambda Access Point.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Configuration:
                  $ref: "#/components/schemas/ObjectLambdaConfiguration"
              required:
                - Configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessPointForObjectLambdaOutputDisplay"
    delete:
      operationId: DeleteAccessPointForObjectLambda
      description: "This operation is not supported by directory buckets. Deletes the specified Object Lambda Access Point. The following actions are related to DeleteAccessPointForObjectLambda: CreateAccessPointForObjectLambda GetAccessPointForObjectLambda ListAccessPointsForObjectLambda"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID for the account that owns the specified Object Lambda Access Point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ObjectLambdaAccessPointName"
          description: The name of the access point you want to delete.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAccessPointForObjectLambda
      description: "This operation is not supported by directory buckets. Returns configuration information about the specified Object Lambda Access Point The following actions are related to GetAccessPointForObjectLambda: CreateAccessPointForObjectLambda DeleteAccessPointForObjectLambda ListAccessPointsForObjectLambda"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID for the account that owns the specified Object Lambda Access Point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ObjectLambdaAccessPointName"
          description: The name of the Object Lambda Access Point.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccessPointForObjectLambdaOutputDisplay"
  /v20180820/bucket/{name}:
    put:
      operationId: CreateBucket
      description: "This action creates an Amazon S3 on Outposts bucket. To create an S3 bucket, see Create Bucket in the Amazon S3 API Reference. Creates a new Outposts bucket. By creating the bucket, you become the bucket owner. To create an Outposts bucket, you must have S3 on Outposts. For more information, see Using Amazon S3 on Outposts in Amazon S3 User Guide. Not every string is an acceptable bucket name. For information on bucket naming restrictions, see Working with Amazon S3 Buckets. S3 on Outposts buckets support: Tags LifecycleConfigurations for deleting expired objects For a complete list of restrictions and Amazon S3 feature limitations on S3 on Outposts, see Amazon S3 on Outposts Restrictions and Limitations. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and x-amz-outpost-id in your API request, see the Examples section. The following actions are related to CreateBucket for Amazon S3 on Outposts: PutObject GetBucket DeleteBucket CreateAccessPoint PutAccessPointPolicy"
      parameters:
        - name: x-amz-acl
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/BucketCannedACL"
          description: The canned ACL to apply to the bucket. This is not supported by Amazon S3 on Outposts buckets.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BucketName"
          description: The name of the bucket.
        - name: x-amz-grant-full-control
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GrantFullControl"
          description: Allows grantee the read, write, read ACP, and write ACP permissions on the bucket. This is not supported by Amazon S3 on Outposts buckets.
        - name: x-amz-grant-read
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GrantRead"
          description: Allows grantee to list the objects in the bucket. This is not supported by Amazon S3 on Outposts buckets.
        - name: x-amz-grant-read-acp
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GrantReadACP"
          description: Allows grantee to read the bucket ACL. This is not supported by Amazon S3 on Outposts buckets.
        - name: x-amz-grant-write
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GrantWrite"
          description: Allows grantee to create, overwrite, and delete any object in the bucket. This is not supported by Amazon S3 on Outposts buckets.
        - name: x-amz-grant-write-acp
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GrantWriteACP"
          description: Allows grantee to write the ACL for the applicable bucket. This is not supported by Amazon S3 on Outposts buckets.
        - name: x-amz-bucket-object-lock-enabled
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ObjectLockEnabledForBucket"
          description: Specifies whether you want S3 Object Lock to be enabled for the new bucket. This is not supported by Amazon S3 on Outposts buckets.
        - name: x-amz-outpost-id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength64String"
          description: The ID of the Outposts where the bucket is being created. This ID is required by Amazon S3 on Outposts buckets.
      requestBody:
        required: false
        content:
          application/xml:
            schema:
              type: object
              properties:
                CreateBucketConfiguration:
                  $ref: "#/components/schemas/CreateBucketConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBucketOutputDisplay"
    delete:
      operationId: DeleteBucket
      description: This action deletes an Amazon S3 on Outposts bucket. To delete an S3 bucket, see DeleteBucket in the Amazon S3 API Reference. Deletes the Amazon S3 on Outposts bucket. All objects (including all object versions and delete markers) in the bucket must be deleted before the bucket itself can be deleted. For more information, see Using Amazon S3 on Outposts in Amazon S3 User Guide. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. Related Resources CreateBucket GetBucket DeleteObject
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID that owns the Outposts bucket.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BucketName"
          description: Specifies the bucket being deleted. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the bucket accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/bucket/`<my-bucket-name>`. For example, to access the bucket reports through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/bucket/reports. The value must be URL encoded.
      responses:
        "200":
          description: Success
    get:
      operationId: GetBucket
      description: "Gets an Amazon S3 on Outposts bucket. For more information, see Using Amazon S3 on Outposts in the Amazon S3 User Guide. If you are using an identity other than the root user of the Amazon Web Services account that owns the Outposts bucket, the calling identity must have the s3-outposts:GetBucket permissions on the specified Outposts bucket and belong to the Outposts bucket owner's account in order to use this action. Only users from Outposts bucket owner account with the right permissions can perform actions on an Outposts bucket. If you don't have s3-outposts:GetBucket permissions or you're not using an identity that belongs to the bucket owner's account, Amazon S3 returns a 403 Access Denied error. The following actions are related to GetBucket for Amazon S3 on Outposts: All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. PutObject CreateBucket DeleteBucket"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the Outposts bucket.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BucketName"
          description: Specifies the bucket. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the bucket accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/bucket/`<my-bucket-name>`. For example, to access the bucket reports through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/bucket/reports. The value must be URL encoded.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBucketOutputDisplay"
  /v20180820/jobs:
    post:
      operationId: CreateJob
      description: "This operation creates an S3 Batch Operations job. You can use S3 Batch Operations to perform large-scale batch actions on Amazon S3 objects. Batch Operations can run a single action on lists of Amazon S3 objects that you specify. For more information, see S3 Batch Operations in the Amazon S3 User Guide. Permissions For information about permissions required to use the Batch Operations, see Granting permissions for S3 Batch Operations in the Amazon S3 User Guide. Related actions include: DescribeJob ListJobs UpdateJobPriority UpdateJobStatus JobOperation"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that creates the job.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                ConfirmationRequired:
                  $ref: "#/components/schemas/ConfirmationRequired"
                Operation:
                  $ref: "#/components/schemas/JobOperation"
                Report:
                  $ref: "#/components/schemas/JobReport"
                ClientRequestToken:
                  $ref: "#/components/schemas/NonEmptyMaxLength64String"
                Manifest:
                  $ref: "#/components/schemas/JobManifest"
                Description:
                  $ref: "#/components/schemas/NonEmptyMaxLength256String"
                Priority:
                  $ref: "#/components/schemas/JobPriority"
                RoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                Tags:
                  $ref: "#/components/schemas/S3TagSet"
                ManifestGenerator:
                  $ref: "#/components/schemas/JobManifestGenerator"
              required:
                - ClientRequestToken
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobOutputDisplay"
    get:
      operationId: ListJobs
      description: "Lists current S3 Batch Operations jobs as well as the jobs that have ended within the last 90 days for the Amazon Web Services account making the request. For more information, see S3 Batch Operations in the Amazon S3 User Guide. Permissions To use the ListJobs operation, you must have permission to perform the s3:ListJobs action. Related actions include: CreateJob DescribeJob UpdateJobPriority UpdateJobStatus"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the S3 Batch Operations job.
        - name: jobStatuses
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatusList"
