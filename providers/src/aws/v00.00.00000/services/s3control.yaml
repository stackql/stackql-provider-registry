            $ref: "#/components/schemas/MultiRegionAccessPointName"
          description: Specifies the Multi-Region Access Point. The name of the Multi-Region Access Point is different from the alias. For more information about the distinction between the name and the alias of an Multi-Region Access Point, see Rules for naming Amazon S3 Multi-Region Access Points in the Amazon S3 User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMultiRegionAccessPointPolicyStatusOutputDisplay"
  /v20180820/mrap/instances/{mrap}/routes:
    get:
      operationId: GetMultiRegionAccessPointRoutes
      description: "This operation is not supported by directory buckets. Returns the routing configuration for a Multi-Region Access Point, indicating which Regions are active or passive. To obtain routing control changes and failover requests, use the Amazon S3 failover control infrastructure endpoints in these five Amazon Web Services Regions: us-east-1 us-west-2 ap-southeast-2 ap-northeast-1 eu-west-1"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the owner of the Multi-Region Access Point.
        - name: mrap
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MultiRegionAccessPointId"
          description: The Multi-Region Access Point ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMultiRegionAccessPointRoutesOutputDisplay"
    patch:
      operationId: SubmitMultiRegionAccessPointRoutes
      description: "This operation is not supported by directory buckets. Submits an updated route configuration for a Multi-Region Access Point. This API operation updates the routing status for the specified Regions from active to passive, or from passive to active. A value of 0 indicates a passive status, which means that traffic won't be routed to the specified Region. A value of 100 indicates an active status, which means that traffic will be routed to the specified Region. At least one Region must be active at all times. When the routing configuration is changed, any in-progress operations (uploads, copies, deletes, and so on) to formerly active Regions will continue to run to their final completion state (success or failure). The routing configurations of any Regions that aren’t specified remain unchanged. Updated routing configurations might not be immediately applied. It can take up to 2 minutes for your changes to take effect. To submit routing control changes and failover requests, use the Amazon S3 failover control infrastructure endpoints in these five Amazon Web Services Regions: us-east-1 us-west-2 ap-southeast-2 ap-northeast-1 eu-west-1"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the owner of the Multi-Region Access Point.
        - name: mrap
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MultiRegionAccessPointId"
          description: The Multi-Region Access Point ARN.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                RouteUpdates:
                  $ref: "#/components/schemas/RouteList"
              required:
                - RouteUpdates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitMultiRegionAccessPointRoutesOutputDisplay"
  /v20180820/accessgrantsinstance/grants:
    get:
      operationId: ListAccessGrants
      description: Returns the list of access grants in your S3 Access Grants instance. Permissions You must have the s3:ListAccessGrants permission to use this operation.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContinuationToken"
          description: A pagination token to request the next page of results. Pass this value into a subsequent List Access Grants request in order to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access grants that you would like returned in the List Access Grants response. If the results include the pagination token NextToken, make another call using the NextToken to determine if there are more results.
        - name: granteetype
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GranteeType"
          description: "The type of the grantee to which access has been granted. It can be one of the following values: IAM - An IAM user or role. DIRECTORY_USER - Your corporate directory user. You can use this option if you have added your corporate identity directory to IAM Identity Center and associated the IAM Identity Center instance with your S3 Access Grants instance. DIRECTORY_GROUP - Your corporate directory group. You can use this option if you have added your corporate identity directory to IAM Identity Center and associated the IAM Identity Center instance with your S3 Access Grants instance."
        - name: granteeidentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GranteeIdentifier"
          description: The unique identifer of the Grantee. If the grantee type is IAM, the identifier is the IAM Amazon Resource Name (ARN) of the user or role. If the grantee type is a directory user or group, the identifier is 128-bit universally unique identifier (UUID) in the format a1b2c3d4-5678-90ab-cdef-EXAMPLE11111. You can obtain this UUID from your Amazon Web Services IAM Identity Center instance.
        - name: permission
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Permission"
          description: "The type of permission granted to your S3 data, which can be set to one of the following values: READ – Grant read-only access to the S3 data. WRITE – Grant write-only access to the S3 data. READWRITE – Grant both read and write access to the S3 data."
        - name: grantscope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/S3Prefix"
          description: The S3 path of the data to which you are granting access. It is the result of appending the Subprefix to the location scope.
        - name: application_arn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdentityCenterApplicationArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services IAM Identity Center application associated with your Identity Center instance. If the grant includes an application ARN, the grantee can only access the S3 data through this application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessGrantsOutputDisplay"
  /v20180820/accessgrantsinstances:
    get:
      operationId: ListAccessGrantsInstances
      description: Returns a list of S3 Access Grants instances. An S3 Access Grants instance serves as a logical grouping for your individual access grants. You can only have one S3 Access Grants instance per Region per account. Permissions You must have the s3:ListAccessGrantsInstances permission to use this operation.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
