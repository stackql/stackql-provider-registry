          schema:
            $ref: "#/components/schemas/ContinuationToken"
          description: A pagination token to request the next page of results. Pass this value into a subsequent List Access Grants Instances request in order to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access grants that you would like returned in the List Access Grants response. If the results include the pagination token NextToken, make another call using the NextToken to determine if there are more results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessGrantsInstancesOutputDisplay"
  /v20180820/accessgrantsinstance/locations:
    get:
      operationId: ListAccessGrantsLocations
      description: Returns a list of the locations registered in your S3 Access Grants instance. Permissions You must have the s3:ListAccessGrantsLocations permission to use this operation.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContinuationToken"
          description: A pagination token to request the next page of results. Pass this value into a subsequent List Access Grants Locations request in order to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access grants that you would like returned in the List Access Grants response. If the results include the pagination token NextToken, make another call using the NextToken to determine if there are more results.
        - name: locationscope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/S3Prefix"
          description: The S3 path to the location that you are registering. The location scope can be the default S3 location s3://, the S3 path to a bucket s3://`<bucket>`, or the S3 path to a bucket and prefix s3://`<bucket>`/`<prefix>`. A prefix in S3 is a string of characters at the beginning of an object key name used to organize the objects that you store in your S3 buckets. For example, object key names that start with the engineering/ prefix or object key names that start with the marketing/campaigns/ prefix.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessGrantsLocationsOutputDisplay"
  /v20180820/accesspoint:
    get:
      operationId: ListAccessPoints
      description: "This operation is not supported by directory buckets. Returns a list of the access points. You can retrieve up to 1,000 access points per call. If the call returns more than 1,000 access points (or the number specified in maxResults, whichever is less), the response will include a continuation token that you can use to list the additional access points. Returns only access points attached to S3 buckets by default. To return all access points specify DataSourceType as ALL. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. The following actions are related to ListAccessPoints: CreateAccessPoint DeleteAccessPoint GetAccessPoint"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the account that owns the specified access points.
        - name: bucket
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BucketName"
          description: The name of the bucket whose associated access points you want to list. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the bucket accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/bucket/`<my-bucket-name>`. For example, to access the bucket reports through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/bucket/reports. The value must be URL encoded.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: A continuation token. If a previous call to ListAccessPoints returned a continuation token in the NextToken field, then providing that value here causes Amazon S3 to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access points that you want to include in the list. If the specified bucket has more than this number of access points, then the response will include a continuation token in the NextToken field that you can use to retrieve the next page of access points.
        - name: dataSourceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataSourceId"
          description: The unique identifier for the data source of the access point.
        - name: dataSourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DataSourceType"
          description: The type of the data source that the access point is attached to. Returns only access points attached to S3 buckets by default. To return all access points specify DataSourceType as ALL.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPointsOutputDisplay"
  /v20180820/accesspointfordirectory:
    get:
      operationId: ListAccessPointsForDirectoryBuckets
      description: Returns a list of the access points that are owned by the Amazon Web Services account and that are associated with the specified directory bucket. To list access points for general purpose buckets, see ListAccesspoints. To use this operation, you must have the permission to perform the s3express:ListAccessPointsForDirectoryBuckets action. For information about REST API errors, see REST error responses.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that owns the access points.
        - name: directoryBucket
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BucketName"
          description: The name of the directory bucket associated with the access points you want to list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: If NextToken is returned, there are more access points available than requested in the maxResults value. The value of NextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access points that you would like returned in the ListAccessPointsForDirectoryBuckets response. If the directory bucket is associated with more than this number of access points, the results include the pagination token NextToken. Make another call using the NextToken to retrieve more results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPointsForDirectoryBucketsOutputDisplay"
  /v20180820/accesspointforobjectlambda:
    get:
      operationId: ListAccessPointsForObjectLambda
      description: "This operation is not supported by directory buckets. Returns some or all (up to 1,000) access points associated with the Object Lambda Access Point per call. If there are more access points than what can be returned in one call, the response will include a continuation token that you can use to list the additional access points. The following actions are related to ListAccessPointsForObjectLambda: CreateAccessPointForObjectLambda DeleteAccessPointForObjectLambda GetAccessPointForObjectLambda"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID for the account that owns the specified Object Lambda Access Point.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: If the list has more access points than can be returned in one call to this API, this field contains a continuation token that you can provide in subsequent calls to this API to retrieve additional access points.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access points that you want to include in the list. The response may contain fewer access points but will never contain more. If there are more than this number of access points, then the response will include a continuation token in the NextToken field that you can use to retrieve the next page of access points.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPointsForObjectLambdaOutputDisplay"
  /v20180820/accessgrantsinstance/caller/grants:
    get:
      operationId: ListCallerAccessGrants
      description: Use this API to list the access grants that grant the caller access to Amazon S3 data through S3 Access Grants. The caller (grantee) can be an Identity and Access Management (IAM) identity or Amazon Web Services Identity Center corporate directory identity. You must pass the Amazon Web Services account of the S3 data owner (grantor) in the request. You can, optionally, narrow the results by GrantScope, using a fragment of the data's S3 path, and S3 Access Grants will return only the grants with a path that contains the path fragment. You can also pass the AllowedByApplication filter in the request, which returns only the grants authorized for applications, whether the application is the caller's Identity Center application or any other application (ALL). For more information, see List the caller's access grants in the Amazon S3 User Guide. Permissions You must have the s3:ListCallerAccessGrants permission to use this operation.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
        - name: grantscope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/S3Prefix"
          description: The S3 path of the data that you would like to access. Must start with s3://. You can optionally pass only the beginning characters of a path, and S3 Access Grants will search for all applicable grants for the path fragment.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContinuationToken"
          description: A pagination token to request the next page of results. Pass this value into a subsequent List Caller Access Grants request in order to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of access grants that you would like returned in the List Caller Access Grants response. If the results include the pagination token NextToken, make another call using the NextToken to determine if there are more results.
        - name: allowedByApplication
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: If this optional parameter is passed in the request, a filter is applied to the results. The results will include only the access grants for the caller's Identity Center application or for any other applications (ALL).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCallerAccessGrantsOutputDisplay"
  /v20180820/mrap/instances:
    get:
      operationId: ListMultiRegionAccessPoints
      description: "This operation is not supported by directory buckets. Returns a list of the Multi-Region Access Points currently associated with the specified Amazon Web Services account. Each call can return up to 100 Multi-Region Access Points, the maximum number of Multi-Region Access Points that can be associated with a single account. This action will always be routed to the US West (Oregon) Region. For more information about the restrictions around working with Multi-Region Access Points, see Multi-Region Access Point restrictions and limitations in the Amazon S3 User Guide. The following actions are related to ListMultiRegionAccessPoint: CreateMultiRegionAccessPoint DeleteMultiRegionAccessPoint DescribeMultiRegionAccessPointOperation GetMultiRegionAccessPoint"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the owner of the Multi-Region Access Point.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: Not currently used. Do not use this parameter.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Not currently used. Do not use this parameter.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMultiRegionAccessPointsOutputDisplay"
  /v20180820/bucket:
    get:
      operationId: ListRegionalBuckets
      description: This operation is not supported by directory buckets. Returns a list of all Outposts buckets in an Outpost that are owned by the authenticated sender of the request. For more information, see Using Amazon S3 on Outposts in the Amazon S3 User Guide. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and x-amz-outpost-id in your request, see the Examples section.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the Outposts bucket.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: x-amz-outpost-id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyMaxLength64String"
          description: The ID of the Outposts resource. This ID is required by Amazon S3 on Outposts buckets.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRegionalBucketsOutputDisplay"
  /v20180820/storagelens:
    get:
      operationId: ListStorageLensConfigurations
      description: This operation is not supported by directory buckets. Gets a list of Amazon S3 Storage Lens configurations. For more information about S3 Storage Lens, see Assessing your storage activity and usage with Amazon S3 Storage Lens in the Amazon S3 User Guide. To use this action, you must have permission to perform the s3:ListStorageLensConfigurations action. For more information, see Setting permissions to use Amazon S3 Storage Lens in the Amazon S3 User Guide.
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID of the requester.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContinuationToken"
          description: A pagination token to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStorageLensConfigurationsOutputDisplay"
  /v20180820/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: "This operation allows you to list all of the tags for a specified resource. Each tag is a label consisting of a key and value. Tags can help you organize, track costs for, and control access to resources. This operation is only supported for the following Amazon S3 resources: General purpose buckets Access Points for directory buckets Access Points for general purpose buckets Directory buckets S3 Storage Lens groups S3 Access Grants instances, registered locations, and grants. Permissions For general purpose buckets, access points for general purpose buckets, Storage Lens groups, and S3 Access Grants, you must have the s3:ListTagsForResource permission to use this operation. Directory bucket permissions For directory buckets, you must have the s3express:ListTagsForResource permission to use this operation. For more information about directory buckets policies and permissions, see Identity and Access Management (IAM) for S3 Express One Zone in the Amazon S3 User Guide. HTTP Host header syntax Directory buckets - The HTTP Host header syntax is s3express-control.region.amazonaws.com. For information about S3 Tagging errors, see List of Amazon S3 Tagging error codes."
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the resource owner.
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/S3ResourceArn"
          description: The Amazon Resource Name (ARN) of the S3 resource that you want to list tags for. The tagged resource can be a directory bucket, S3 Storage Lens group or S3 Access Grants instance, registered location, or grant.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutputDisplay"
    post:
      operationId: TagResource
      description: "Creates a new user-defined tag or updates an existing tag. Each tag is a label consisting of a key and value that is applied to your resource. Tags can help you organize, track costs for, and control access to your resources. You can add up to 50 Amazon Web Services resource tags for each S3 resource. This operation is only supported for the following Amazon S3 resource: General purpose buckets Access Points for directory buckets Access Points for general purpose buckets Directory buckets S3 Storage Lens groups S3 Access Grants instances, registered locations, or grants. Permissions For general purpose buckets, access points for general purpose buckets, Storage Lens groups, and S3 Access Grants, you must have the s3:TagResource permission to use this operation. Directory bucket permissions For directory buckets, you must have the s3express:TagResource permission to use this operation. For more information about directory buckets policies and permissions, see Identity and Access Management (IAM) for S3 Express One Zone in the Amazon S3 User Guide. HTTP Host header syntax Directory buckets - The HTTP Host header syntax is s3express-control.region.amazonaws.com. For information about S3 Tagging errors, see List of Amazon S3 Tagging error codes."
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that created the S3 resource that you're trying to add tags to or the requester's account ID.
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/S3ResourceArn"
          description: The Amazon Resource Name (ARN) of the S3 resource that you're applying tags to. The tagged resource can be a directory bucket, S3 Storage Lens group or S3 Access Grants instance, registered location, or grant.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutputDisplay"
    delete:
      operationId: UntagResource
      description: "This operation removes the specified user-defined tags from an S3 resource. You can pass one or more tag keys. This operation is only supported for the following Amazon S3 resources: General purpose buckets Access Points for directory buckets Access Points for general purpose buckets Directory buckets S3 Storage Lens groups S3 Access Grants instances, registered locations, and grants. Permissions For general purpose buckets, access points for general purpose buckets, Storage Lens groups, and S3 Access Grants, you must have the s3:UntagResource permission to use this operation. Directory bucket permissions For directory buckets, you must have the s3express:UntagResource permission to use this operation. For more information about directory buckets policies and permissions, see Identity and Access Management (IAM) for S3 Express One Zone in the Amazon S3 User Guide. HTTP Host header syntax Directory buckets - The HTTP Host header syntax is s3express-control.region.amazonaws.com. For information about S3 Tagging errors, see List of Amazon S3 Tagging error codes."
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that owns the resource that you're trying to remove the tags from.
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/S3ResourceArn"
          description: The Amazon Resource Name (ARN) of the S3 resource that you're removing tags from. The tagged resource can be a directory bucket, S3 Storage Lens group or S3 Access Grants instance, registered location, or grant.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The array of tag key-value pairs that you're trying to remove from of the S3 resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutputDisplay"
  /v20180820/async-requests/mrap/put-policy:
    post:
      operationId: PutMultiRegionAccessPointPolicy
      description: "This operation is not supported by directory buckets. Associates an access control policy with the specified Multi-Region Access Point. Each Multi-Region Access Point can have only one policy, so a request made to this action replaces any existing policy that is associated with the specified Multi-Region Access Point. This action will always be routed to the US West (Oregon) Region. For more information about the restrictions around working with Multi-Region Access Points, see Multi-Region Access Point restrictions and limitations in the Amazon S3 User Guide. The following actions are related to PutMultiRegionAccessPointPolicy: GetMultiRegionAccessPointPolicy GetMultiRegionAccessPointPolicyStatus"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for the owner of the Multi-Region Access Point.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/MultiRegionAccessPointClientToken"
                Details:
                  $ref: "#/components/schemas/PutMultiRegionAccessPointPolicyInput"
              required:
                - ClientToken
                - Details
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutMultiRegionAccessPointPolicyOutputDisplay"
  /v20180820/jobs/{id}/priority:
    post:
      operationId: UpdateJobPriority
      description: "Updates an existing S3 Batch Operations job's priority. For more information, see S3 Batch Operations in the Amazon S3 User Guide. Permissions To use the UpdateJobPriority operation, you must have permission to perform the s3:UpdateJobPriority action. Related actions include: CreateJob ListJobs DescribeJob UpdateJobStatus"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the S3 Batch Operations job.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The ID for the job whose priority you want to update.
        - name: priority
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/JobPriority"
          description: The priority you want to assign to this job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateJobPriorityOutputDisplay"
  /v20180820/jobs/{id}/status:
    post:
      operationId: UpdateJobStatus
      description: "Updates the status for the specified job. Use this operation to confirm that you want to run a job or to cancel an existing job. For more information, see S3 Batch Operations in the Amazon S3 User Guide. Permissions To use the UpdateJobStatus operation, you must have permission to perform the s3:UpdateJobStatus action. Related actions include: CreateJob ListJobs DescribeJob UpdateJobStatus"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the S3 Batch Operations job.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The ID of the job whose status you want to update.
        - name: requestedJobStatus
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RequestedJobStatus"
          description: The status that you want to move the specified job to.
        - name: statusUpdateReason
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatusUpdateReason"
          description: A description of the reason why you want to change the specified job's status. This field can be any string up to the maximum length.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateJobStatusOutputDisplay"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AccountId:
      type: string
      maxLength: 64
      pattern: ^\d{12}$
    IdentityCenterArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: arn:[^:]+:sso::(\d{12}){0,1}:instance/.*$
    AccessGrantsLocationId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9\\-]+"
    AccessGrantsLocationConfiguration:
      description: The configuration options of the S3 Access Grants location. It contains the S3SubPrefix field. The grant scope, the data to which you are granting access, is the result of appending the Subprefix field to the scope of the registered location.
      type: object
      properties:
        S3SubPrefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The S3SubPrefix is appended to the location scope creating the grant scope. Use this field to narrow the scope of the grant to a subset of the location scope. This field is required if the location scope is the default location s3:// because you cannot create a grant for all of your S3 data in the Region and must narrow the scope. For example, if the location scope is the default location s3://, the S3SubPrefx can be a `<bucket-name>`/*, so the full grant scope path would be s3://`<bucket-name>`/*. Or the S3SubPrefx can be `<bucket-name>`/`<prefix-name>`*, so the full grant scope path would be or s3://`<bucket-name>`/`<prefix-name>`*. If the S3SubPrefix includes a prefix, append the wildcard character * after the prefix to indicate that you want to include all object key names in the bucket that start with that prefix.
    S3Prefix:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: ^.+$
    Grantee:
      description: The user, group, or role to which you are granting access. You can grant access to an IAM user or role. If you have added your corporate directory to Amazon Web Services IAM Identity Center and associated your Identity Center instance with your S3 Access Grants instance, the grantee can also be a corporate directory user or group.
      type: object
      properties:
        GranteeType:
          $ref: "#/components/schemas/GranteeType"
          description: "The type of the grantee to which access has been granted. It can be one of the following values: IAM - An IAM user or role. DIRECTORY_USER - Your corporate directory user. You can use this option if you have added your corporate identity directory to IAM Identity Center and associated the IAM Identity Center instance with your S3 Access Grants instance. DIRECTORY_GROUP - Your corporate directory group. You can use this option if you have added your corporate identity directory to IAM Identity Center and associated the IAM Identity Center instance with your S3 Access Grants instance."
        GranteeIdentifier:
          $ref: "#/components/schemas/GranteeIdentifier"
          description: The unique identifier of the Grantee. If the grantee type is IAM, the identifier is the IAM Amazon Resource Name (ARN) of the user or role. If the grantee type is a directory user or group, the identifier is 128-bit universally unique identifier (UUID) in the format a1b2c3d4-5678-90ab-cdef-EXAMPLE11111. You can obtain this UUID from your Amazon Web Services IAM Identity Center instance.
    GranteeType:
      type: string
      enum:
        - DIRECTORY_USER
        - DIRECTORY_GROUP
        - IAM
    GranteeIdentifier:
      type: string
    Permission:
      type: string
      enum:
        - READ
        - WRITE
        - READWRITE
    IdentityCenterApplicationArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: arn:[^:]+:sso::\d{12}:application/.*$
    S3PrefixType:
      type: string
      enum:
        - Object
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair that you use to label your resources. You can add tags to new resources when you create them, or you can add tags to existing resources. Tags can help you organize, track costs for, and control access to resources.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKeyString"
          description: "The key of the key-value pair of a tag added to your Amazon Web Services resource. A tag key can be up to 128 Unicode characters in length and is case-sensitive. System created tags that begin with aws: aren’t supported."
        Value:
          $ref: "#/components/schemas/TagValueString"
          description: The value of the key-value pair of a tag added to your Amazon Web Services resource. A tag value can be up to 256 Unicode characters in length and is case-sensitive.
      required:
        - Key
        - Value
    TagKeyString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValueString:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    CreateAccessGrantResultDisplay:
      type: object
      properties:
        CreatedAt:
          type: string
          description: The date and time when you created the access grant.
        AccessGrantId:
          type: string
          description: The ID of the access grant. S3 Access Grants auto-generates this ID when you create the access grant.
        AccessGrantArn:
          type: string
          description: The Amazon Resource Name (ARN) of the access grant.
        Grantee:
          type: string
          description: The user, group, or role to which you are granting access. You can grant access to an IAM user or role. If you have added your corporate directory to Amazon Web Services IAM Identity Center and associated your Identity Center instance with your S3 Access Grants instance, the grantee can also be a corporate directory user or group.
        AccessGrantsLocationId:
          type: string
          description: The ID of the registered location to which you are granting access. S3 Access Grants assigns this ID when you register the location. S3 Access Grants assigns the ID default to the default location s3:// and assigns an auto-generated ID to other locations that you register.
        AccessGrantsLocationConfiguration:
          type: string
          description: The configuration options of the grant location. The grant location is the S3 path to the data to which you are granting access.
        Permission:
          type: string
          description: "The type of access that you are granting to your S3 data, which can be set to one of the following values: READ – Grant read-only access to the S3 data. WRITE – Grant write-only access to the S3 data. READWRITE – Grant both read and write access to the S3 data."
        ApplicationArn:
          type: string
          description: The Amazon Resource Name (ARN) of an Amazon Web Services IAM Identity Center application associated with your Identity Center instance. If the grant includes an application ARN, the grantee can only access the S3 data through this application.
        GrantScope:
          type: string
          description: The S3 path of the data to which you are granting access. It is the result of appending the Subprefix to the location scope.
    CreateAccessGrantOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccessGrantResultDisplay"
    CreateAccessGrantsInstanceResultDisplay:
      type: object
      properties:
        CreatedAt:
          type: string
          description: The date and time when you created the S3 Access Grants instance.
        AccessGrantsInstanceId:
          type: string
          description: The ID of the S3 Access Grants instance. The ID is default. You can have one S3 Access Grants instance per Region per account.
        AccessGrantsInstanceArn:
          type: string
          description: The Amazon Resource Name (ARN) of the Amazon Web Services IAM Identity Center instance that you are associating with your S3 Access Grants instance. An IAM Identity Center instance is your corporate identity directory that you added to the IAM Identity Center. You can use the ListInstances API operation to retrieve a list of your Identity Center instances and their ARNs.
        IdentityCenterArn:
          type: string
          description: If you associated your S3 Access Grants instance with an Amazon Web Services IAM Identity Center instance, this field returns the Amazon Resource Name (ARN) of the IAM Identity Center instance application; a subresource of the original Identity Center instance. S3 Access Grants creates this Identity Center application for the specific S3 Access Grants instance.
        IdentityCenterInstanceArn:
          type: string
          description: The Amazon Resource Name (ARN) of the Amazon Web Services IAM Identity Center instance that you are associating with your S3 Access Grants instance. An IAM Identity Center instance is your corporate identity directory that you added to the IAM Identity Center. You can use the ListInstances API operation to retrieve a list of your Identity Center instances and their ARNs.
        IdentityCenterApplicationArn:
          type: string
          description: If you associated your S3 Access Grants instance with an Amazon Web Services IAM Identity Center instance, this field returns the Amazon Resource Name (ARN) of the IAM Identity Center instance application; a subresource of the original Identity Center instance. S3 Access Grants creates this Identity Center application for the specific S3 Access Grants instance.
    CreateAccessGrantsInstanceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccessGrantsInstanceResultDisplay"
    IAMRoleArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:[^:]+:iam::\d{12}:role/.*
    CreateAccessGrantsLocationResultDisplay:
      type: object
      properties:
        CreatedAt:
          type: string
          description: The date and time when you registered the location.
        AccessGrantsLocationId:
          type: string
          description: The ID of the registered location to which you are granting access. S3 Access Grants assigns this ID when you register the location. S3 Access Grants assigns the ID default to the default location s3:// and assigns an auto-generated ID to other locations that you register.
        AccessGrantsLocationArn:
          type: string
          description: The Amazon Resource Name (ARN) of the location you are registering.
        LocationScope:
          type: string
          description: The S3 URI path to the location that you are registering. The location scope can be the default S3 location s3://, the S3 path to a bucket, or the S3 path to a bucket and prefix. A prefix in S3 is a string of characters at the beginning of an object key name used to organize the objects that you store in your S3 buckets. For example, object key names that start with the engineering/ prefix or object key names that start with the marketing/campaigns/ prefix.
        IAMRoleArn:
          type: string
          description: The Amazon Resource Name (ARN) of the IAM role for the registered location. S3 Access Grants assumes this role to manage access to the registered location.
    CreateAccessGrantsLocationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccessGrantsLocationResultDisplay"
    AccessPointName:
      type: string
      minLength: 3
      maxLength: 255
    BucketName:
      type: string
      minLength: 3
      maxLength: 255
    VpcConfiguration:
      description: The virtual private cloud (VPC) configuration for an access point.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: If this field is specified, this access point will only allow connections from the specified VPC ID.
      required:
        - VpcId
    VpcId:
      type: string
      minLength: 1
      maxLength: 1024
    PublicAccessBlockConfiguration:
      description: The PublicAccessBlock configuration that you want to apply to this Amazon S3 account. You can enable the configuration options in any combination. For more information about when Amazon S3 considers a bucket or object public, see The Meaning of "Public" in the Amazon S3 User Guide. This data type is not supported for Amazon S3 on Outposts.
      type: object
      properties:
        BlockPublicAcls:
          $ref: "#/components/schemas/Setting"
          description: "Specifies whether Amazon S3 should block public access control lists (ACLs) for buckets in this account. Setting this element to TRUE causes the following behavior: PutBucketAcl and PutObjectAcl calls fail if the specified ACL is public. PUT Object calls fail if the request includes a public ACL. PUT Bucket calls fail if the request includes a public ACL. Enabling this setting doesn't affect existing policies or ACLs. This property is not supported for Amazon S3 on Outposts."
        IgnorePublicAcls:
          $ref: "#/components/schemas/Setting"
          description: Specifies whether Amazon S3 should ignore public ACLs for buckets in this account. Setting this element to TRUE causes Amazon S3 to ignore all public ACLs on buckets in this account and any objects that they contain. Enabling this setting doesn't affect the persistence of any existing ACLs and doesn't prevent new public ACLs from being set. This property is not supported for Amazon S3 on Outposts.
        BlockPublicPolicy:
          $ref: "#/components/schemas/Setting"
          description: Specifies whether Amazon S3 should block public bucket policies for buckets in this account. Setting this element to TRUE causes Amazon S3 to reject calls to PUT Bucket policy if the specified bucket policy allows public access. Enabling this setting doesn't affect existing bucket policies. This property is not supported for Amazon S3 on Outposts.
        RestrictPublicBuckets:
          $ref: "#/components/schemas/Setting"
          description: Specifies whether Amazon S3 should restrict public bucket policies for buckets in this account. Setting this element to TRUE restricts access to buckets with public policies to only Amazon Web Services service principals and authorized users within this account. Enabling this setting doesn't affect previously stored bucket policies, except that public and cross-account access within any public bucket policy, including non-public delegation to specific accounts, is blocked. This property is not supported for Amazon S3 on Outposts.
    Setting:
      type: boolean
    Scope:
      description: You can use the access point scope to restrict access to specific prefixes, API operations, or a combination of both. For more information, see Manage the scope of your access points for directory buckets.
      type: object
      properties:
        Prefixes:
          $ref: "#/components/schemas/PrefixesList"
          description: You can specify any amount of prefixes, but the total length of characters of all prefixes must be less than 256 bytes in size.
        Permissions:
          $ref: "#/components/schemas/ScopePermissionList"
          description: You can include one or more API operations as permissions.
    PrefixesList:
      type: array
      items:
        $ref: "#/components/schemas/Prefix"
    Prefix:
      type: string
    ScopePermissionList:
      type: array
      items:
        $ref: "#/components/schemas/ScopePermission"
    ScopePermission:
      type: string
      enum:
        - GetObject
        - GetObjectAttributes
        - ListMultipartUploadParts
        - ListBucket
        - ListBucketMultipartUploads
        - PutObject
        - DeleteObject
        - AbortMultipartUpload
    CreateAccessPointResultDisplay:
      type: object
      properties:
        AccessPointArn:
          type: string
          description: The ARN of the access point. This is only supported by Amazon S3 on Outposts.
        Alias:
          type: string
          description: The name or alias of the access point.
    CreateAccessPointOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccessPointResultDisplay"
    ObjectLambdaAccessPointName:
      type: string
      minLength: 3
      maxLength: 45
      pattern: ^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$
    ObjectLambdaConfiguration:
      description: A configuration used when creating an Object Lambda Access Point.
      type: object
      properties:
        SupportingAccessPoint:
          $ref: "#/components/schemas/ObjectLambdaSupportingAccessPointArn"
          description: Standard access point associated with the Object Lambda Access Point.
        CloudWatchMetricsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: A container for whether the CloudWatch metrics configuration is enabled.
        AllowedFeatures:
          $ref: "#/components/schemas/ObjectLambdaAllowedFeaturesList"
          description: A container for allowed features. Valid inputs are GetObject-Range, GetObject-PartNumber, HeadObject-Range, and HeadObject-PartNumber.
        TransformationConfigurations:
          $ref: "#/components/schemas/ObjectLambdaTransformationConfigurationsList"
          description: A container for transformation configurations for an Object Lambda Access Point.
      required:
        - SupportingAccessPoint
        - TransformationConfigurations
    ObjectLambdaSupportingAccessPointArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:[^:]+:s3:[^:]*:\d{12}:accesspoint/.*
    Boolean:
      type: boolean
    ObjectLambdaAllowedFeaturesList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectLambdaAllowedFeature"
    ObjectLambdaAllowedFeature:
      type: string
      enum:
        - GetObject-Range
        - GetObject-PartNumber
        - HeadObject-Range
        - HeadObject-PartNumber
    ObjectLambdaTransformationConfigurationsList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectLambdaTransformationConfiguration"
    ObjectLambdaTransformationConfiguration:
      description: A configuration used when creating an Object Lambda Access Point transformation.
      type: object
      properties:
        Actions:
          $ref: "#/components/schemas/ObjectLambdaTransformationConfigurationActionsList"
          description: A container for the action of an Object Lambda Access Point configuration. Valid inputs are GetObject, ListObjects, HeadObject, and ListObjectsV2.
        ContentTransformation:
          $ref: "#/components/schemas/ObjectLambdaContentTransformation"
          description: A container for the content transformation of an Object Lambda Access Point configuration.
      required:
        - Actions
        - ContentTransformation
    ObjectLambdaTransformationConfigurationActionsList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectLambdaTransformationConfigurationAction"
    ObjectLambdaTransformationConfigurationAction:
      type: string
      enum:
        - GetObject
        - HeadObject
        - ListObjects
        - ListObjectsV2
    ObjectLambdaContentTransformation:
      description: A container for AwsLambdaTransformation.
      type: object
      properties:
        AwsLambda:
          $ref: "#/components/schemas/AwsLambdaTransformation"
          description: A container for an Lambda function.
    AwsLambdaTransformation:
      description: Lambda function used to transform objects through an Object Lambda Access Point.
      type: object
      properties:
        FunctionArn:
          $ref: "#/components/schemas/FunctionArnString"
          description: The Amazon Resource Name (ARN) of the Lambda function.
        FunctionPayload:
          $ref: "#/components/schemas/AwsLambdaTransformationPayload"
          description: Additional JSON that provides supplemental data to the Lambda function used to transform objects.
      required:
        - FunctionArn
    FunctionArnString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: (arn:(aws[a-zA-Z-]*)?:lambda:)?([a-z]{2}((-gov)|(-iso([a-z]?)))?-[a-z]+-\d{1}:)?(\d{12}:)?(function:)?([a-zA-Z0-9-_]+)(:(\$LATEST|[a-zA-Z0-9-_]+))?
    AwsLambdaTransformationPayload:
      type: string
    CreateAccessPointForObjectLambdaResultDisplay:
      type: object
      properties:
        ObjectLambdaAccessPointArn:
          type: string
          description: Specifies the ARN for the Object Lambda Access Point.
        Alias:
          type: string
          description: The alias of the Object Lambda Access Point.
    CreateAccessPointForObjectLambdaOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccessPointForObjectLambdaResultDisplay"
    BucketCannedACL:
      type: string
      enum:
        - private
        - public-read
        - public-read-write
        - authenticated-read
    GrantFullControl:
      type: string
    GrantRead:
      type: string
    GrantReadACP:
      type: string
    GrantWrite:
      type: string
    GrantWriteACP:
      type: string
    ObjectLockEnabledForBucket:
      type: boolean
    NonEmptyMaxLength64String:
      type: string
      minLength: 1
      maxLength: 64
    CreateBucketConfiguration:
      description: The container for the bucket configuration. This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        LocationConstraint:
          $ref: "#/components/schemas/BucketLocationConstraint"
          description: Specifies the Region where the bucket will be created. If you are creating a bucket on the US East (N. Virginia) Region (us-east-1), you do not need to specify the location. This is not supported by Amazon S3 on Outposts buckets.
    BucketLocationConstraint:
      type: string
      enum:
        - EU
        - eu-west-1
        - us-west-1
        - us-west-2
        - ap-south-1
        - ap-southeast-1
        - ap-southeast-2
        - ap-northeast-1
        - sa-east-1
        - cn-north-1
        - eu-central-1
    CreateBucketResultDisplay:
      type: object
      properties:
        Location:
          type: string
          description: The location of the bucket.
        BucketArn:
          type: string
          description: The Amazon Resource Name (ARN) of the bucket. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the bucket accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/bucket/`<my-bucket-name>`. For example, to access the bucket reports through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/bucket/reports. The value must be URL encoded.
    CreateBucketOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateBucketResultDisplay"
    ConfirmationRequired:
      type: boolean
    JobOperation:
      description: The operation that you want this job to perform on every object listed in the manifest. For more information about the available operations, see Operations in the Amazon S3 User Guide.
      type: object
      properties:
        LambdaInvoke:
          $ref: "#/components/schemas/LambdaInvokeOperation"
          description: Directs the specified job to invoke an Lambda function on every object in the manifest.
        S3PutObjectCopy:
          $ref: "#/components/schemas/S3CopyObjectOperation"
          description: Directs the specified job to run a PUT Copy object call on every object in the manifest.
        S3PutObjectAcl:
          $ref: "#/components/schemas/S3SetObjectAclOperation"
          description: Directs the specified job to run a PutObjectAcl call on every object in the manifest. This functionality is not supported by directory buckets.
        S3PutObjectTagging:
          $ref: "#/components/schemas/S3SetObjectTaggingOperation"
          description: Directs the specified job to run a PUT Object tagging call on every object in the manifest. This functionality is not supported by directory buckets.
        S3DeleteObjectTagging:
          $ref: "#/components/schemas/S3DeleteObjectTaggingOperation"
          description: Directs the specified job to execute a DELETE Object tagging call on every object in the manifest. This functionality is not supported by directory buckets.
        S3InitiateRestoreObject:
          $ref: "#/components/schemas/S3InitiateRestoreObjectOperation"
          description: Directs the specified job to initiate restore requests for every archived object in the manifest. This functionality is not supported by directory buckets.
        S3PutObjectLegalHold:
          $ref: "#/components/schemas/S3SetObjectLegalHoldOperation"
        S3PutObjectRetention:
          $ref: "#/components/schemas/S3SetObjectRetentionOperation"
        S3ReplicateObject:
          $ref: "#/components/schemas/S3ReplicateObjectOperation"
          description: Directs the specified job to invoke ReplicateObject on every object in the job's manifest. This functionality is not supported by directory buckets.
        S3ComputeObjectChecksum:
          $ref: "#/components/schemas/S3ComputeObjectChecksumOperation"
          description: Directs the specified job to compute checksum values for every object in the manifest.
        S3UpdateObjectEncryption:
          $ref: "#/components/schemas/S3UpdateObjectEncryptionOperation"
          description: Updates the server-side encryption type of an existing encrypted object in a general purpose bucket. You can use the UpdateObjectEncryption operation to change encrypted objects from server-side encryption with Amazon S3 managed keys (SSE-S3) to server-side encryption with Key Management Service (KMS) keys (SSE-KMS), or to apply S3 Bucket Keys. You can also use the UpdateObjectEncryption operation to change the customer-managed KMS key used to encrypt your data so that you can comply with custom key-rotation standards.
    LambdaInvokeOperation:
      description: Contains the configuration parameters for a Lambda Invoke operation.
      type: object
      properties:
        FunctionArn:
          $ref: "#/components/schemas/FunctionArnString"
          description: The Amazon Resource Name (ARN) for the Lambda function that the specified job will invoke on every object in the manifest.
        InvocationSchemaVersion:
          $ref: "#/components/schemas/NonEmptyMaxLength64String"
          description: Specifies the schema version for the payload that Batch Operations sends when invoking an Lambda function. Version 1.0 is the default. Version 2.0 is required when you use Batch Operations to invoke Lambda functions that act on directory buckets, or if you need to specify UserArguments. For more information, see Automate object processing in Amazon S3 directory buckets with S3 Batch Operations and Lambda in the Amazon Web Services Storage Blog. Ensure that your Lambda function code expects InvocationSchemaVersion 2.0 and uses bucket name rather than bucket ARN. If the InvocationSchemaVersion does not match what your Lambda function expects, your function might not work as expected. Directory buckets - To initiate Amazon Web Services Lambda function to perform custom actions on objects in directory buckets, you must specify 2.0.
        UserArguments:
          type: object
          properties: {}
          description: Key-value pairs that are passed in the payload that Batch Operations sends when invoking an Lambda function. You must specify InvocationSchemaVersion 2.0 for LambdaInvoke operations that include UserArguments. For more information, see Automate object processing in Amazon S3 directory buckets with S3 Batch Operations and Lambda in the Amazon Web Services Storage Blog.
    S3CopyObjectOperation:
      description: Contains the configuration parameters for a PUT Copy object operation. S3 Batch Operations passes every object to the underlying CopyObject API operation. For more information about the parameters for this operation, see CopyObject.
      type: object
      properties:
        TargetResource:
          $ref: "#/components/schemas/S3RegionalOrS3ExpressBucketArnString"
          description: Specifies the destination bucket Amazon Resource Name (ARN) for the batch copy operation. General purpose buckets - For example, to copy objects to a general purpose bucket named destinationBucket, set the TargetResource property to arn:aws:s3:::destinationBucket. Directory buckets - For example, to copy objects to a directory bucket named destinationBucket in the Availability Zone identified by the AZ ID usw2-az1, set the TargetResource property to arn:aws:s3express:region:account_id:/bucket/destination_bucket_base_name--usw2-az1--x-s3. A directory bucket as a destination bucket can be in Availability Zone or Local Zone. Copying objects across different Amazon Web Services Regions isn't supported when the source or destination bucket is in Amazon Web Services Local Zones. The source and destination buckets must have the same parent Amazon Web Services Region. Otherwise, you get an HTTP 400 Bad Request error with the error code InvalidRequest.
        CannedAccessControlList:
          $ref: "#/components/schemas/S3CannedAccessControlList"
          description: This functionality is not supported by directory buckets.
        AccessControlGrants:
          $ref: "#/components/schemas/S3GrantList"
          description: This functionality is not supported by directory buckets.
        MetadataDirective:
          $ref: "#/components/schemas/S3MetadataDirective"
        ModifiedSinceConstraint:
          $ref: "#/components/schemas/TimeStamp"
        NewObjectMetadata:
          $ref: "#/components/schemas/S3ObjectMetadata"
          description: If you don't provide this parameter, Amazon S3 copies all the metadata from the original objects. If you specify an empty set, the new objects will have no tags. Otherwise, Amazon S3 assigns the supplied tags to the new objects.
        NewObjectTagging:
          $ref: "#/components/schemas/S3TagSet"
          description: Specifies a list of tags to add to the destination objects after they are copied. If NewObjectTagging is not specified, the tags of the source objects are copied to destination objects by default. Directory buckets - Tags aren't supported by directory buckets. If your source objects have tags and your destination bucket is a directory bucket, specify an empty tag set in the NewObjectTagging field to prevent copying the source object tags to the directory bucket.
        RedirectLocation:
          $ref: "#/components/schemas/NonEmptyMaxLength2048String"
          description: If the destination bucket is configured as a website, specifies an optional metadata property for website redirects, x-amz-website-redirect-location. Allows webpage redirects if the object copy is accessed through a website endpoint. This functionality is not supported by directory buckets.
        RequesterPays:
          $ref: "#/components/schemas/Boolean"
          description: This functionality is not supported by directory buckets.
        StorageClass:
          $ref: "#/components/schemas/S3StorageClass"
          description: Specify the storage class for the destination objects in a Copy operation. Directory buckets - This functionality is not supported by directory buckets.
        UnModifiedSinceConstraint:
          $ref: "#/components/schemas/TimeStamp"
        SSEAwsKmsKeyId:
          $ref: "#/components/schemas/KmsKeyArnString"
          description: Specifies the KMS key ID (Key ID, Key ARN, or Key Alias) to use for object encryption. If the KMS key doesn't exist in the same account that's issuing the command, you must use the full Key ARN not the Key ID. Directory buckets - If you specify SSEAlgorithm with KMS, you must specify the SSEAwsKmsKeyId parameter with the ID (Key ID or Key ARN) of the KMS symmetric encryption customer managed key to use. Otherwise, you get an HTTP 400 Bad Request error. The key alias format of the KMS key isn't supported. To encrypt new object copies in a directory bucket with SSE-KMS, you must specify SSE-KMS as the directory bucket's default encryption configuration with a KMS key (specifically, a customer managed key). The Amazon Web Services managed key (aws/s3) isn't supported. Your SSE-KMS configuration can only support 1 customer managed key per directory bucket for the lifetime of the bucket. After you specify a customer managed key for SSE-KMS as the bucket default encryption, you can't override the customer managed key for the bucket's SSE-KMS configuration. Then, when you specify server-side encryption settings for new object copies with SSE-KMS, you must make sure the encryption key is the same customer managed key that you specified for the directory bucket's default encryption configuration.
        TargetKeyPrefix:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: Specifies the folder prefix that you want the objects to be copied into. For example, to copy objects into a folder named Folder1 in the destination bucket, set the TargetKeyPrefix property to Folder1.
        ObjectLockLegalHoldStatus:
          $ref: "#/components/schemas/S3ObjectLockLegalHoldStatus"
          description: The legal hold status to be applied to all objects in the Batch Operations job. This functionality is not supported by directory buckets.
        ObjectLockMode:
          $ref: "#/components/schemas/S3ObjectLockMode"
          description: The retention mode to be applied to all objects in the Batch Operations job. This functionality is not supported by directory buckets.
        ObjectLockRetainUntilDate:
          $ref: "#/components/schemas/TimeStamp"
          description: The date when the applied object retention configuration expires on all objects in the Batch Operations job. This functionality is not supported by directory buckets.
        BucketKeyEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether Amazon S3 should use an S3 Bucket Key for object encryption with server-side encryption using Amazon Web Services KMS (SSE-KMS). Setting this header to true causes Amazon S3 to use an S3 Bucket Key for object encryption with SSE-KMS. Specifying this header with an Copy action doesn’t affect bucket-level settings for S3 Bucket Key. Directory buckets - S3 Bucket Keys aren't supported, when you copy SSE-KMS encrypted objects from general purpose buckets to directory buckets, from directory buckets to general purpose buckets, or between directory buckets, through the Copy operation in Batch Operations. In this case, Amazon S3 makes a call to KMS every time a copy request is made for a KMS-encrypted object.
        ChecksumAlgorithm:
          $ref: "#/components/schemas/S3ChecksumAlgorithm"
          description: Indicates the algorithm that you want Amazon S3 to use to create the checksum. For more information, see Checking object integrity in the Amazon S3 User Guide.
    S3RegionalOrS3ExpressBucketArnString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:[^:]+:(s3|s3express):.*
    S3CannedAccessControlList:
      type: string
      enum:
        - private
        - public-read
        - public-read-write
        - aws-exec-read
        - authenticated-read
        - bucket-owner-read
        - bucket-owner-full-control
    S3GrantList:
      type: array
      items:
        $ref: "#/components/schemas/S3Grant"
    S3Grant:
