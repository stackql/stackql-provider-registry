  /v20180820/bucket/{name}/versioning:
    get:
      operationId: GetBucketVersioning
      description: This operation returns the versioning state for S3 on Outposts buckets only. To return the versioning state for an S3 bucket, see GetBucketVersioning in the Amazon S3 API Reference. Returns the versioning state for an S3 on Outposts bucket. With S3 Versioning, you can save multiple distinct copies of your objects and recover from unintended user actions and application failures. If you've never set versioning on your bucket, it has no versioning state. In that case, the GetBucketVersioning request does not return a versioning state value. For more information about versioning, see Versioning in the Amazon S3 User Guide. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. The following operations are related to GetBucketVersioning for S3 on Outposts. PutBucketVersioning PutBucketLifecycleConfiguration GetBucketLifecycleConfiguration
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 on Outposts bucket.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BucketName"
          description: The S3 on Outposts bucket to return the versioning state for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBucketVersioningOutputDisplay"
    put:
      operationId: PutBucketVersioning
      description: "This operation sets the versioning state for S3 on Outposts buckets only. To set the versioning state for an S3 bucket, see PutBucketVersioning in the Amazon S3 API Reference. Sets the versioning state for an S3 on Outposts bucket. With S3 Versioning, you can save multiple distinct copies of your objects and recover from unintended user actions and application failures. You can set the versioning state to one of the following: Enabled - Enables versioning for the objects in the bucket. All objects added to the bucket receive a unique version ID. Suspended - Suspends versioning for the objects in the bucket. All objects added to the bucket receive the version ID null. If you've never set versioning on your bucket, it has no versioning state. In that case, a GetBucketVersioning request does not return a versioning state value. When you enable S3 Versioning, for each object in your bucket, you have a current version and zero or more noncurrent versions. You can configure your bucket S3 Lifecycle rules to expire noncurrent versions after a specified time period. For more information, see Creating and managing a lifecycle configuration for your S3 on Outposts bucket in the Amazon S3 User Guide. If you have an object expiration lifecycle configuration in your non-versioned bucket and you want to maintain the same permanent delete behavior when you enable versioning, you must add a noncurrent expiration policy. The noncurrent expiration lifecycle configuration will manage the deletes of the noncurrent object versions in the version-enabled bucket. For more information, see Versioning in the Amazon S3 User Guide. All Amazon S3 on Outposts REST API requests for this action require an additional parameter of x-amz-outpost-id to be passed with the request. In addition, you must use an S3 on Outposts endpoint hostname prefix instead of s3-control. For an example of the request syntax for Amazon S3 on Outposts that uses the S3 on Outposts endpoint hostname prefix and the x-amz-outpost-id derived by using the access point ARN, see the Examples section. The following operations are related to PutBucketVersioning for S3 on Outposts. GetBucketVersioning PutBucketLifecycleConfiguration GetBucketLifecycleConfiguration"
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 on Outposts bucket.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BucketName"
          description: The S3 on Outposts bucket to set the versioning state for.
        - name: x-amz-mfa
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MFA"
          description: The concatenation of the authentication device's serial number, a space, and the value that is displayed on your authentication device.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                VersioningConfiguration:
                  $ref: "#/components/schemas/VersioningConfiguration"
              required:
                - VersioningConfiguration
      responses:
        "200":
          description: Success
  /v20180820/accessgrantsinstance/dataaccess:
    get:
      operationId: GetDataAccess
      description: "Returns a temporary access credential from S3 Access Grants to the grantee or client application. The temporary credential is an Amazon Web Services STS token that grants them access to the S3 data. Permissions You must have the s3:GetDataAccess permission to use this operation. Additional Permissions The IAM role that S3 Access Grants assumes must have the following permissions specified in the trust policy when registering the location: sts:AssumeRole, for directory users or groups sts:SetContext, and for IAM users or roles sts:SetSourceIdentity."
      parameters:
        - name: x-amz-account-id
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the S3 Access Grants instance.
        - name: target
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/S3Prefix"
          description: The S3 URI path of the data to which you are requesting temporary access credentials. If the requesting account has an access grant for this data, S3 Access Grants vends temporary access credentials in the response.
        - name: permission
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Permission"
          description: "The type of permission granted to your S3 data, which can be set to one of the following values: READ – Grant read-only access to the S3 data. WRITE – Grant write-only access to the S3 data. READWRITE – Grant both read and write access to the S3 data."
        - name: durationSeconds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DurationSeconds"
          description: The session duration, in seconds, of the temporary access credential that S3 Access Grants vends to the grantee or client application. The default value is 1 hour, but the grantee can specify a range from 900 seconds (15 minutes) up to 43200 seconds (12 hours). If the grantee requests a value higher than this maximum, the operation fails.
        - name: privilege
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Privilege"
          description: The scope of the temporary access credential that S3 Access Grants vends to the grantee or client application. Default – The scope of the returned temporary access token is the scope of the grant that is closest to the target scope. Minimal – The scope of the returned temporary access token is the same as the requested target scope as long as the requested scope is the same as or a subset of the grant scope.
        - name: targetType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/S3PrefixType"
          description: The type of Target. The only possible value is Object. Pass this value if the target data that you would like to access is a path to an object. Do not pass this value if the target data is a bucket or a bucket and a prefix.
        - name: auditContext
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AuditContext"
          description: The context to identify the job or query associated with the credential request. This information will be displayed in CloudTrail log in your account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataAccessOutputDisplay"
  /v20180820/mrap/instances/{name}:
    get:
      operationId: GetMultiRegionAccessPoint
      description: "This operation is not supported by directory buckets. Returns configuration information about the specified Multi-Region Access Point. This action will always be routed to the US West (Oregon) Region. For more information about the restrictions around working with Multi-Region Access Points, see Multi-Region Access Point restrictions and limitations in the Amazon S3 User Guide. The following actions are related to GetMultiRegionAccessPoint: CreateMultiRegionAccessPoint DeleteMultiRegionAccessPoint DescribeMultiRegionAccessPointOperation ListMultiRegionAccessPoints"
