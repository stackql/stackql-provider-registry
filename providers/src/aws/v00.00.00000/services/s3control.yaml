    CreateMultiRegionAccessPointOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateMultiRegionAccessPointResultDisplay"
    StorageLensGroup:
      description: A custom grouping of objects that include filters for prefixes, suffixes, object tags, object size, or object age. You can create an S3 Storage Lens group that includes a single filter or multiple filter conditions. To specify multiple filter conditions, you use AND or OR logical operators.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/StorageLensGroupName"
          description: Contains the name of the Storage Lens group.
        Filter:
          $ref: "#/components/schemas/StorageLensGroupFilter"
          description: Sets the criteria for the Storage Lens group data that is displayed. For multiple filter conditions, the AND or OR logical operator is used.
        StorageLensGroupArn:
          $ref: "#/components/schemas/StorageLensGroupArn"
          description: Contains the Amazon Resource Name (ARN) of the Storage Lens group. This property is read-only.
      required:
        - Name
        - Filter
    StorageLensGroupName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9\\-\\_]+"
    StorageLensGroupFilter:
      description: The filter element sets the criteria for the Storage Lens group data that is displayed. For multiple filter conditions, the AND or OR logical operator is used.
      type: object
      properties:
        MatchAnyPrefix:
          $ref: "#/components/schemas/MatchAnyPrefix"
          description: Contains a list of prefixes. At least one prefix must be specified. Up to 10 prefixes are allowed.
        MatchAnySuffix:
          $ref: "#/components/schemas/MatchAnySuffix"
          description: Contains a list of suffixes. At least one suffix must be specified. Up to 10 suffixes are allowed.
        MatchAnyTag:
          $ref: "#/components/schemas/MatchAnyTag"
          description: Contains the list of S3 object tags. At least one object tag must be specified. Up to 10 object tags are allowed.
        MatchObjectAge:
          $ref: "#/components/schemas/MatchObjectAge"
          description: Contains DaysGreaterThan and DaysLessThan to define the object age range (minimum and maximum number of days).
        MatchObjectSize:
          $ref: "#/components/schemas/MatchObjectSize"
          description: Contains BytesGreaterThan and BytesLessThan to define the object size range (minimum and maximum number of Bytes).
        And:
          $ref: "#/components/schemas/StorageLensGroupAndOperator"
          description: A logical operator that allows multiple filter conditions to be joined for more complex comparisons of Storage Lens group data. Objects must match all of the listed filter conditions that are joined by the And logical operator. Only one of each filter condition is allowed.
        Or:
          $ref: "#/components/schemas/StorageLensGroupOrOperator"
          description: A single logical operator that allows multiple filter conditions to be joined. Objects can match any of the listed filter conditions, which are joined by the Or logical operator. Only one of each filter condition is allowed.
    MatchAnyPrefix:
      type: array
      items:
        $ref: "#/components/schemas/Prefix"
    MatchAnySuffix:
      type: array
      items:
        $ref: "#/components/schemas/Suffix"
    Suffix:
      type: string
    MatchAnyTag:
      type: array
      items:
        $ref: "#/components/schemas/S3Tag"
    MatchObjectAge:
      description: A filter condition that specifies the object age range of included objects in days. Only integers are supported.
      type: object
      properties:
        DaysGreaterThan:
          $ref: "#/components/schemas/ObjectAgeValue"
          description: Specifies the maximum object age in days. Must be a positive whole number, greater than the minimum object age and less than or equal to 2,147,483,647.
        DaysLessThan:
          $ref: "#/components/schemas/ObjectAgeValue"
          description: Specifies the minimum object age in days. The value must be a positive whole number, greater than 0 and less than or equal to 2,147,483,647.
    ObjectAgeValue:
      type: integer
    MatchObjectSize:
      description: A filter condition that specifies the object size range of included objects in bytes. Only integers are supported.
      type: object
      properties:
        BytesGreaterThan:
          $ref: "#/components/schemas/ObjectSizeValue"
          description: Specifies the minimum object size in Bytes. The value must be a positive number, greater than 0 and less than 50 TB.
        BytesLessThan:
          $ref: "#/components/schemas/ObjectSizeValue"
          description: Specifies the maximum object size in Bytes. The value must be a positive number, greater than the minimum object size and less than 50 TB.
    ObjectSizeValue:
      type: integer
      format: int64
    StorageLensGroupAndOperator:
      description: A logical operator that allows multiple filter conditions to be joined for more complex comparisons of Storage Lens group data.
      type: object
      properties:
        MatchAnyPrefix:
          $ref: "#/components/schemas/MatchAnyPrefix"
          description: Contains a list of prefixes. At least one prefix must be specified. Up to 10 prefixes are allowed.
        MatchAnySuffix:
          $ref: "#/components/schemas/MatchAnySuffix"
          description: Contains a list of suffixes. At least one suffix must be specified. Up to 10 suffixes are allowed.
        MatchAnyTag:
          $ref: "#/components/schemas/MatchAnyTag"
          description: Contains the list of object tags. At least one object tag must be specified. Up to 10 object tags are allowed.
        MatchObjectAge:
          $ref: "#/components/schemas/MatchObjectAge"
          description: Contains DaysGreaterThan and DaysLessThan to define the object age range (minimum and maximum number of days).
        MatchObjectSize:
          $ref: "#/components/schemas/MatchObjectSize"
          description: Contains BytesGreaterThan and BytesLessThan to define the object size range (minimum and maximum number of Bytes).
    StorageLensGroupOrOperator:
      description: A container element for specifying Or rule conditions. The rule conditions determine the subset of objects to which the Or rule applies. Objects can match any of the listed filter conditions, which are joined by the Or logical operator. Only one of each filter condition is allowed.
      type: object
      properties:
        MatchAnyPrefix:
          $ref: "#/components/schemas/MatchAnyPrefix"
          description: Filters objects that match any of the specified prefixes.
        MatchAnySuffix:
          $ref: "#/components/schemas/MatchAnySuffix"
          description: Filters objects that match any of the specified suffixes.
        MatchAnyTag:
          $ref: "#/components/schemas/MatchAnyTag"
          description: Filters objects that match any of the specified S3 object tags.
        MatchObjectAge:
          $ref: "#/components/schemas/MatchObjectAge"
          description: Filters objects that match the specified object age range.
        MatchObjectSize:
          $ref: "#/components/schemas/MatchObjectSize"
          description: Filters objects that match the specified object size range.
    StorageLensGroupArn:
      type: string
      minLength: 4
      maxLength: 1024
      pattern: arn:[a-z\-]+:s3:[a-z0-9\-]+:\d{12}:storage\-lens\-group\/.*
    AccessGrantId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9\\-]+"
    JobId:
      type: string
      minLength: 5
      maxLength: 36
      pattern: "[a-zA-Z0-9\\-\\_]+"
    DeleteJobTaggingResultDisplay:
      type: object
      properties: {}
    DeleteJobTaggingOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DeleteJobTaggingResultDisplay"
    DeleteMultiRegionAccessPointInput:
      description: A container for the information associated with a DeleteMultiRegionAccessPoint request.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MultiRegionAccessPointName"
