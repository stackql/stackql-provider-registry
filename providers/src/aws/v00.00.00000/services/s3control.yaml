          schema:
            $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID for owner of the bucket associated with the specified access point.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPointName"
          description: The name of the access point that you want to associate with the specified policy. For using this parameter with Amazon S3 on Outposts with the REST API, you must specify the name and the x-amz-outpost-id as well. For using this parameter with S3 on Outposts with the Amazon Web Services SDK and CLI, you must specify the ARN of the access point accessed in the format arn:aws:s3-outposts:`<Region>`:`<account-id>`:outpost/`<outpost-id>`/accesspoint/`<my-accesspoint-name>`. For example, to access the access point reports-ap through Outpost my-outpost owned by account 123456789012 in Region us-west-2, use the URL encoding of arn:aws:s3-outposts:us-west-2:123456789012:outpost/my-outpost/accesspoint/reports-ap. The value must be URL encoded.
      requestBody:
