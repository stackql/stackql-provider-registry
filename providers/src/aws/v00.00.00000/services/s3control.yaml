        BucketAccountId:
          type: string
          description: The Amazon Web Services account ID associated with the S3 bucket associated with this access point.
        DataSourceId:
          type: string
          description: A unique identifier for the data source of the access point.
        DataSourceType:
          type: string
          description: The type of the data source that the access point is attached to.
