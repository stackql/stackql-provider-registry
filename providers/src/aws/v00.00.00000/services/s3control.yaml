    UpdateAccessGrantsLocationResultDisplay:
      type: object
      properties:
        CreatedAt:
          type: string
          description: The date and time when you registered the location.
        AccessGrantsLocationId:
          type: string
          description: The ID of the registered location to which you are granting access. S3 Access Grants assigned this ID when you registered the location. S3 Access Grants assigns the ID default to the default location s3:// and assigns an auto-generated ID to other locations that you register.
        AccessGrantsLocationArn:
          type: string
          description: The Amazon Resource Name (ARN) of the registered location that you are updating.
        LocationScope:
          type: string
          description: The S3 URI path of the location that you are updating. You cannot update the scope of the registered location. The location scope can be the default S3 location s3://, the S3 path to a bucket s3://`<bucket>`, or the S3 path to a bucket and prefix s3://`<bucket>`/`<prefix>`.
        IAMRoleArn:
          type: string
          description: The Amazon Resource Name (ARN) of the IAM role of the registered location. S3 Access Grants assumes this role to manage access to the registered location.
    UpdateAccessGrantsLocationOutputDisplay:
      type: object
      properties:
        line_items:
