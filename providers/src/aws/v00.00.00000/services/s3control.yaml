    Policy:
      type: string
    ObjectLambdaPolicy:
      type: string
    LifecycleConfiguration:
      description: The container for the Outposts bucket lifecycle configuration.
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/LifecycleRules"
          description: A lifecycle rule for individual objects in an Outposts bucket.
    LifecycleRules:
      type: array
      items:
        $ref: "#/components/schemas/LifecycleRule"
    LifecycleRule:
      description: The container for the Outposts bucket lifecycle rule.
      type: object
      properties:
        Expiration:
          $ref: "#/components/schemas/LifecycleExpiration"
          description: Specifies the expiration for the lifecycle of the object in the form of date, days and, whether the object has a delete marker.
        ID:
          $ref: "#/components/schemas/ID"
          description: Unique identifier for the rule. The value cannot be longer than 255 characters.
        Filter:
          $ref: "#/components/schemas/LifecycleRuleFilter"
          description: The container for the filter of lifecycle rule.
        Status:
          $ref: "#/components/schemas/ExpirationStatus"
          description: If 'Enabled', the rule is currently being applied. If 'Disabled', the rule is not currently being applied.
        Transitions:
          $ref: "#/components/schemas/TransitionList"
          description: Specifies when an Amazon S3 object transitions to a specified storage class. This is not supported by Amazon S3 on Outposts buckets.
        NoncurrentVersionTransitions:
          $ref: "#/components/schemas/NoncurrentVersionTransitionList"
          description: Specifies the transition rule for the lifecycle rule that describes when noncurrent objects transition to a specific storage class. If your bucket is versioning-enabled (or versioning is suspended), you can set this action to request that Amazon S3 transition noncurrent object versions to a specific storage class at a set period in the object's lifetime. This is not supported by Amazon S3 on Outposts buckets.
        NoncurrentVersionExpiration:
          $ref: "#/components/schemas/NoncurrentVersionExpiration"
          description: The noncurrent version expiration of the lifecycle rule.
        AbortIncompleteMultipartUpload:
          $ref: "#/components/schemas/AbortIncompleteMultipartUpload"
          description: Specifies the days since the initiation of an incomplete multipart upload that Amazon S3 waits before permanently removing all parts of the upload. For more information, see Aborting Incomplete Multipart Uploads Using a Bucket Lifecycle Configuration in the Amazon S3 User Guide.
      required:
        - Status
    LifecycleExpiration:
      description: The container of the Outposts bucket lifecycle expiration.
      type: object
      properties:
        Date:
          $ref: "#/components/schemas/Date"
          description: Indicates at what date the object is to be deleted. Should be in GMT ISO 8601 format.
        Days:
          $ref: "#/components/schemas/Days"
          description: Indicates the lifetime, in days, of the objects that are subject to the rule. The value must be a non-zero positive integer.
        ExpiredObjectDeleteMarker:
          $ref: "#/components/schemas/ExpiredObjectDeleteMarker"
          description: Indicates whether Amazon S3 will remove a delete marker with no noncurrent versions. If set to true, the delete marker will be expired. If set to false, the policy takes no action. This cannot be specified with Days or Date in a Lifecycle Expiration Policy. To learn more about delete markers, see Working with delete markers.
    Date:
      type: string
      format: date-time
    Days:
      type: integer
    ExpiredObjectDeleteMarker:
      type: boolean
    ID:
      type: string
    LifecycleRuleFilter:
      description: The container for the filter of the lifecycle rule.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: Prefix identifying one or more objects to which the rule applies. When you're using XML requests, you must replace special characters (such as carriage returns) in object keys with their equivalent XML entity codes. For more information, see XML-related object key constraints in the Amazon S3 User Guide.
        Tag:
          $ref: "#/components/schemas/S3Tag"
        And:
          $ref: "#/components/schemas/LifecycleRuleAndOperator"
          description: The container for the AND condition for the lifecycle rule.
        ObjectSizeGreaterThan:
          $ref: "#/components/schemas/ObjectSizeGreaterThanBytes"
          description: Minimum object size to which the rule applies.
        ObjectSizeLessThan:
          $ref: "#/components/schemas/ObjectSizeLessThanBytes"
          description: Maximum object size to which the rule applies.
    LifecycleRuleAndOperator:
      description: The container for the Outposts bucket lifecycle rule and operator.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: Prefix identifying one or more objects to which the rule applies.
        Tags:
          $ref: "#/components/schemas/S3TagSet"
          description: All of these tags must exist in the object's tag set in order for the rule to apply.
        ObjectSizeGreaterThan:
          $ref: "#/components/schemas/ObjectSizeGreaterThanBytes"
          description: The non-inclusive minimum object size for the lifecycle rule. Setting this property to 7 means the rule applies to objects with a size that is greater than 7.
        ObjectSizeLessThan:
          $ref: "#/components/schemas/ObjectSizeLessThanBytes"
          description: The non-inclusive maximum object size for the lifecycle rule. Setting this property to 77 means the rule applies to objects with a size that is less than 77.
    ExpirationStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    TransitionList:
      type: array
      items:
        $ref: "#/components/schemas/Transition"
    Transition:
      description: Specifies when an object transitions to a specified storage class. For more information about Amazon S3 Lifecycle configuration rules, see Transitioning objects using Amazon S3 Lifecycle in the Amazon S3 User Guide.
      type: object
      properties:
        Date:
          $ref: "#/components/schemas/Date"
          description: Indicates when objects are transitioned to the specified storage class. The date value must be in ISO 8601 format. The time is always midnight UTC.
        Days:
          $ref: "#/components/schemas/Days"
          description: Indicates the number of days after creation when objects are transitioned to the specified storage class. The value must be a positive integer.
        StorageClass:
          $ref: "#/components/schemas/TransitionStorageClass"
          description: The storage class to which you want the object to transition.
    TransitionStorageClass:
      type: string
      enum:
        - GLACIER
        - STANDARD_IA
        - ONEZONE_IA
        - INTELLIGENT_TIERING
        - DEEP_ARCHIVE
    NoncurrentVersionTransitionList:
      type: array
      items:
        $ref: "#/components/schemas/NoncurrentVersionTransition"
    NoncurrentVersionTransition:
      description: The container for the noncurrent version transition.
      type: object
      properties:
        NoncurrentDays:
          $ref: "#/components/schemas/Days"
          description: Specifies the number of days an object is noncurrent before Amazon S3 can perform the associated action. For information about the noncurrent days calculations, see How Amazon S3 Calculates How Long an Object Has Been Noncurrent in the Amazon S3 User Guide.
        StorageClass:
          $ref: "#/components/schemas/TransitionStorageClass"
          description: The class of storage used to store the object.
    NoncurrentVersionExpiration:
      description: The container of the noncurrent version expiration.
      type: object
      properties:
        NoncurrentDays:
          $ref: "#/components/schemas/Days"
          description: Specifies the number of days an object is noncurrent before Amazon S3 can perform the associated action. For information about the noncurrent days calculations, see How Amazon S3 Calculates When an Object Became Noncurrent in the Amazon S3 User Guide.
        NewerNoncurrentVersions:
          $ref: "#/components/schemas/NoncurrentVersionCount"
          description: Specifies how many noncurrent versions S3 on Outposts will retain. If there are this many more recent noncurrent versions, S3 on Outposts will take the associated action. For more information about noncurrent versions, see Lifecycle configuration elements in the Amazon S3 User Guide.
    NoncurrentVersionCount:
      type: integer
    AbortIncompleteMultipartUpload:
      description: The container for abort incomplete multipart upload
      type: object
      properties:
        DaysAfterInitiation:
          $ref: "#/components/schemas/DaysAfterInitiation"
          description: Specifies the number of days after which Amazon S3 aborts an incomplete multipart upload to the Outposts bucket.
    DaysAfterInitiation:
      type: integer
    ConfirmRemoveSelfBucketAccess:
      type: boolean
    ReplicationConfiguration:
      description: A container for one or more replication rules. A replication configuration must have at least one rule and you can add up to 100 rules. The maximum size of a replication configuration is 128 KB.
      type: object
      properties:
        Role:
          $ref: "#/components/schemas/Role"
          description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that S3 on Outposts assumes when replicating objects. For information about S3 replication on Outposts configuration, see Setting up replication in the Amazon S3 User Guide.
        Rules:
          $ref: "#/components/schemas/ReplicationRules"
          description: A container for one or more replication rules. A replication configuration must have at least one rule and can contain an array of 100 rules at the most.
      required:
        - Role
        - Rules
    Role:
      type: string
    ReplicationRules:
      type: array
      items:
        $ref: "#/components/schemas/ReplicationRule"
    ReplicationRule:
      description: Specifies which S3 on Outposts objects to replicate and where to store the replicas.
      type: object
      properties:
        ID:
          $ref: "#/components/schemas/ID"
          description: A unique identifier for the rule. The maximum value is 255 characters.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: The priority indicates which rule has precedence whenever two or more replication rules conflict. S3 on Outposts attempts to replicate objects according to all replication rules. However, if there are two or more rules with the same destination Outposts bucket, then objects will be replicated according to the rule with the highest priority. The higher the number, the higher the priority. For more information, see Creating replication rules on Outposts in the Amazon S3 User Guide.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the object or objects to which the rule applies. The maximum prefix length is 1,024 characters. To include all objects in an Outposts bucket, specify an empty string. When you're using XML requests, you must replace special characters (such as carriage returns) in object keys with their equivalent XML entity codes. For more information, see XML-related object key constraints in the Amazon S3 User Guide.
        Filter:
          $ref: "#/components/schemas/ReplicationRuleFilter"
          description: A filter that identifies the subset of objects to which the replication rule applies. A Filter element must specify exactly one Prefix, Tag, or And child element.
        Status:
          $ref: "#/components/schemas/ReplicationRuleStatus"
          description: Specifies whether the rule is enabled.
        SourceSelectionCriteria:
          $ref: "#/components/schemas/SourceSelectionCriteria"
          description: A container that describes additional filters for identifying the source Outposts objects that you want to replicate. You can choose to enable or disable the replication of these objects.
        ExistingObjectReplication:
          $ref: "#/components/schemas/ExistingObjectReplication"
          description: An optional configuration to replicate existing source bucket objects. This is not supported by Amazon S3 on Outposts buckets.
        Destination:
          $ref: "#/components/schemas/Destination"
          description: A container for information about the replication destination and its configurations.
        DeleteMarkerReplication:
          $ref: "#/components/schemas/DeleteMarkerReplication"
          description: Specifies whether S3 on Outposts replicates delete markers. If you specify a Filter element in your replication configuration, you must also include a DeleteMarkerReplication element. If your Filter includes a Tag element, the DeleteMarkerReplication element's Status child element must be set to Disabled, because S3 on Outposts doesn't support replicating delete markers for tag-based rules. For more information about delete marker replication, see How delete operations affect replication in the Amazon S3 User Guide.
        Bucket:
          $ref: "#/components/schemas/BucketIdentifierString"
          description: The Amazon Resource Name (ARN) of the access point for the source Outposts bucket that you want S3 on Outposts to replicate the objects from.
      required:
        - Status
        - Destination
        - Bucket
    Priority:
      type: integer
    ReplicationRuleFilter:
      description: A filter that identifies the subset of objects to which the replication rule applies. A Filter element must specify exactly one Prefix, Tag, or And child element.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the subset of objects that the rule applies to. When you're using XML requests, you must replace special characters (such as carriage returns) in object keys with their equivalent XML entity codes. For more information, see XML-related object key constraints in the Amazon S3 User Guide.
        Tag:
          $ref: "#/components/schemas/S3Tag"
        And:
          $ref: "#/components/schemas/ReplicationRuleAndOperator"
          description: "A container for specifying rule filters. The filters determine the subset of objects that the rule applies to. This element is required only if you specify more than one filter. For example: If you specify both a Prefix and a Tag filter, wrap these filters in an And element. If you specify a filter based on multiple tags, wrap the Tag elements in an And element."
    ReplicationRuleAndOperator:
      description: "A container for specifying rule filters. The filters determine the subset of objects to which the rule applies. This element is required only if you specify more than one filter. For example: If you specify both a Prefix and a Tag filter, wrap these filters in an And element. If you specify a filter based on multiple tags, wrap the Tag elements in an And element."
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the subset of objects that the rule applies to.
        Tags:
          $ref: "#/components/schemas/S3TagSet"
          description: An array of tags that contain key and value pairs.
    ReplicationRuleStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    SourceSelectionCriteria:
      description: A container that describes additional filters for identifying the source objects that you want to replicate. You can choose to enable or disable the replication of these objects.
      type: object
      properties:
        SseKmsEncryptedObjects:
          $ref: "#/components/schemas/SseKmsEncryptedObjects"
          description: A filter that you can use to select Amazon S3 objects that are encrypted with server-side encryption by using Key Management Service (KMS) keys. If you include SourceSelectionCriteria in the replication configuration, this element is required. This is not supported by Amazon S3 on Outposts buckets.
        ReplicaModifications:
          $ref: "#/components/schemas/ReplicaModifications"
          description: A filter that you can use to specify whether replica modification sync is enabled. S3 on Outposts replica modification sync can help you keep object metadata synchronized between replicas and source objects. By default, S3 on Outposts replicates metadata from the source objects to the replicas only. When replica modification sync is enabled, S3 on Outposts replicates metadata changes made to the replica copies back to the source object, making the replication bidirectional. To replicate object metadata modifications on replicas, you can specify this element and set the Status of this element to Enabled. You must enable replica modification sync on the source and destination buckets to replicate replica metadata changes between the source and the replicas.
    SseKmsEncryptedObjects:
      description: A container for filter information that you can use to select S3 objects that are encrypted with Key Management Service (KMS). This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SseKmsEncryptedObjectsStatus"
          description: Specifies whether Amazon S3 replicates objects that are created with server-side encryption by using an KMS key stored in Key Management Service.
      required:
        - Status
    SseKmsEncryptedObjectsStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ReplicaModifications:
      description: A filter that you can use to specify whether replica modification sync is enabled. S3 on Outposts replica modification sync can help you keep object metadata synchronized between replicas and source objects. By default, S3 on Outposts replicates metadata from the source objects to the replicas only. When replica modification sync is enabled, S3 on Outposts replicates metadata changes made to the replica copies back to the source object, making the replication bidirectional. To replicate object metadata modifications on replicas, you can specify this element and set the Status of this element to Enabled. You must enable replica modification sync on the source and destination buckets to replicate replica metadata changes between the source and the replicas.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ReplicaModificationsStatus"
          description: Specifies whether S3 on Outposts replicates modifications to object metadata on replicas.
      required:
        - Status
    ReplicaModificationsStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ExistingObjectReplication:
      description: An optional configuration to replicate existing source bucket objects. This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ExistingObjectReplicationStatus"
          description: Specifies whether Amazon S3 replicates existing source bucket objects.
      required:
        - Status
    ExistingObjectReplicationStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    Destination:
      description: Specifies information about the replication destination bucket and its settings for an S3 on Outposts replication configuration.
      type: object
      properties:
        Account:
          $ref: "#/components/schemas/AccountId"
          description: The destination bucket owner's account ID.
        Bucket:
          $ref: "#/components/schemas/BucketIdentifierString"
          description: The Amazon Resource Name (ARN) of the access point for the destination bucket where you want S3 on Outposts to store the replication results.
        ReplicationTime:
          $ref: "#/components/schemas/ReplicationTime"
          description: A container that specifies S3 Replication Time Control (S3 RTC) settings, including whether S3 RTC is enabled and the time when all objects and operations on objects must be replicated. Must be specified together with a Metrics block. This is not supported by Amazon S3 on Outposts buckets.
        AccessControlTranslation:
          $ref: "#/components/schemas/AccessControlTranslation"
          description: Specify this property only in a cross-account scenario (where the source and destination bucket owners are not the same), and you want to change replica ownership to the Amazon Web Services account that owns the destination bucket. If this property is not specified in the replication configuration, the replicas are owned by same Amazon Web Services account that owns the source object. This is not supported by Amazon S3 on Outposts buckets.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: A container that provides information about encryption. If SourceSelectionCriteria is specified, you must specify this element. This is not supported by Amazon S3 on Outposts buckets.
        Metrics:
          $ref: "#/components/schemas/Metrics"
          description: A container that specifies replication metrics-related settings.
        StorageClass:
          $ref: "#/components/schemas/ReplicationStorageClass"
          description: The storage class to use when replicating objects. All objects stored on S3 on Outposts are stored in the OUTPOSTS storage class. S3 on Outposts uses the OUTPOSTS storage class to create the object replicas. Values other than OUTPOSTS aren't supported by Amazon S3 on Outposts.
      required:
        - Bucket
    BucketIdentifierString:
      type: string
    ReplicationTime:
      description: A container that specifies S3 Replication Time Control (S3 RTC) related information, including whether S3 RTC is enabled and the time when all objects and operations on objects must be replicated. This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ReplicationTimeStatus"
          description: Specifies whether S3 Replication Time Control (S3 RTC) is enabled.
        Time:
          $ref: "#/components/schemas/ReplicationTimeValue"
          description: A container that specifies the time by which replication should be complete for all objects and operations on objects.
      required:
        - Status
        - Time
    ReplicationTimeStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ReplicationTimeValue:
      description: A container that specifies the time value for S3 Replication Time Control (S3 RTC). This value is also used for the replication metrics EventThreshold element. This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        Minutes:
          $ref: "#/components/schemas/Minutes"
          description: "Contains an integer that specifies the time period in minutes. Valid value: 15"
    Minutes:
      type: integer
    AccessControlTranslation:
      description: A container for information about access control for replicas. This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        Owner:
          $ref: "#/components/schemas/OwnerOverride"
          description: Specifies the replica ownership.
      required:
        - Owner
    OwnerOverride:
      type: string
      enum:
        - Destination
    EncryptionConfiguration:
      description: Specifies encryption-related information for an Amazon S3 bucket that is a destination for replicated objects. If you're specifying a customer managed KMS key, we recommend using a fully qualified KMS key ARN. If you use a KMS key alias instead, then KMS resolves the key within the requester’s account. This behavior can result in data that's encrypted with a KMS key that belongs to the requester, and not the bucket owner. This is not supported by Amazon S3 on Outposts buckets.
      type: object
      properties:
        ReplicaKmsKeyID:
          $ref: "#/components/schemas/ReplicaKmsKeyID"
          description: Specifies the ID of the customer managed KMS key that's stored in Key Management Service (KMS) for the destination bucket. This ID is either the Amazon Resource Name (ARN) for the KMS key or the alias ARN for the KMS key. Amazon S3 uses this KMS key to encrypt replica objects. Amazon S3 supports only symmetric encryption KMS keys. For more information, see Symmetric encryption KMS keys in the Amazon Web Services Key Management Service Developer Guide.
    ReplicaKmsKeyID:
      type: string
    Metrics:
      description: A container that specifies replication metrics-related settings.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/MetricsStatus"
          description: Specifies whether replication metrics are enabled.
        EventThreshold:
          $ref: "#/components/schemas/ReplicationTimeValue"
          description: A container that specifies the time threshold for emitting the s3:Replication:OperationMissedThreshold event. This is not supported by Amazon S3 on Outposts buckets.
      required:
        - Status
    MetricsStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ReplicationStorageClass:
      type: string
      enum:
        - STANDARD
        - REDUCED_REDUNDANCY
        - STANDARD_IA
        - ONEZONE_IA
        - INTELLIGENT_TIERING
        - GLACIER
        - DEEP_ARCHIVE
        - OUTPOSTS
        - GLACIER_IR
    DeleteMarkerReplication:
      description: Specifies whether S3 on Outposts replicates delete markers. If you specify a Filter element in your replication configuration, you must also include a DeleteMarkerReplication element. If your Filter includes a Tag element, the DeleteMarkerReplication element's Status child element must be set to Disabled, because S3 on Outposts does not support replicating delete markers for tag-based rules. For more information about delete marker replication, see How delete operations affect replication in the Amazon S3 User Guide.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/DeleteMarkerReplicationStatus"
          description: Indicates whether to replicate delete markers.
      required:
        - Status
    DeleteMarkerReplicationStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    Tagging:
      type: object
      properties:
        TagSet:
          $ref: "#/components/schemas/S3TagSet"
          description: A collection for a set of tags.
      required:
        - TagSet
    MFA:
      type: string
    VersioningConfiguration:
      description: Describes the versioning state of an Amazon S3 on Outposts bucket. For more information, see PutBucketVersioning.
      type: object
      properties:
        MFADelete:
          $ref: "#/components/schemas/MFADelete"
          description: Specifies whether MFA delete is enabled or disabled in the bucket versioning configuration for the S3 on Outposts bucket.
        Status:
          $ref: "#/components/schemas/BucketVersioningStatus"
          description: Sets the versioning state of the S3 on Outposts bucket.
    MFADelete:
      type: string
      enum:
        - Enabled
        - Disabled
    BucketVersioningStatus:
      type: string
      enum:
        - Enabled
        - Suspended
    PutJobTaggingResultDisplay:
      type: object
      properties: {}
    PutJobTaggingOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/PutJobTaggingResultDisplay"
    PutMultiRegionAccessPointPolicyInput:
      description: A container for the information associated with a PutMultiRegionAccessPoint request.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MultiRegionAccessPointName"
          description: The name of the Multi-Region Access Point associated with the request.
        Policy:
          $ref: "#/components/schemas/Policy"
          description: The policy details for the PutMultiRegionAccessPoint request.
      required:
        - Name
        - Policy
    PutMultiRegionAccessPointPolicyResultDisplay:
      type: object
      properties:
        RequestTokenARN:
          type: string
          description: The request token associated with the request. You can use this token with DescribeMultiRegionAccessPointOperation to determine the status of asynchronous requests.
    PutMultiRegionAccessPointPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/PutMultiRegionAccessPointPolicyResultDisplay"
    StorageLensConfiguration:
      description: A container for the Amazon S3 Storage Lens configuration.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ConfigId"
          description: A container for the Amazon S3 Storage Lens configuration ID.
        AccountLevel:
          $ref: "#/components/schemas/AccountLevel"
          description: A container for all the account-level configurations of your S3 Storage Lens configuration.
        Include:
          $ref: "#/components/schemas/Include"
          description: A container for what is included in this configuration. This container can only be valid if there is no Exclude container submitted, and it's not empty.
        Exclude:
          $ref: "#/components/schemas/Exclude"
          description: A container for what is excluded in this configuration. This container can only be valid if there is no Include container submitted, and it's not empty.
        DataExport:
          $ref: "#/components/schemas/StorageLensDataExport"
          description: A container to specify the properties of your S3 Storage Lens metrics export including, the destination, schema and format.
        ExpandedPrefixesDataExport:
          $ref: "#/components/schemas/StorageLensExpandedPrefixesDataExport"
          description: A container that configures your S3 Storage Lens expanded prefixes metrics report.
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container for whether the S3 Storage Lens configuration is enabled.
        AwsOrg:
          $ref: "#/components/schemas/StorageLensAwsOrg"
          description: A container for the Amazon Web Services organization for this S3 Storage Lens configuration.
        StorageLensArn:
          $ref: "#/components/schemas/StorageLensArn"
          description: "The Amazon Resource Name (ARN) of the S3 Storage Lens configuration. This property is read-only and follows the following format: arn:aws:s3:us-east-1:example-account-id:storage-lens/your-dashboard-name"
        PrefixDelimiter:
          $ref: "#/components/schemas/StorageLensPrefixLevelDelimiter"
          description: A container for all prefix delimiters that are used for object keys in this S3 Storage Lens configuration. The prefix delimiters determine how S3 Storage Lens counts prefix depth, by separating the hierarchical levels in object keys. If either a prefix delimiter or existing delimiter is undefined, Amazon S3 uses the delimiter that’s defined. If both the prefix delimiter and existing delimiter are undefined, S3 uses / as the default delimiter. When custom delimiters are used, both the prefix delimiter and existing delimiter must specify the same special character. Otherwise, your request results in an error.
      required:
        - Id
        - AccountLevel
        - IsEnabled
    AccountLevel:
      description: A container element for the account-level Amazon S3 Storage Lens configuration. You must enable Storage Lens metrics consistently at both the account level and bucket level, or your request will fail. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide. For a complete list of S3 Storage Lens metrics, see S3 Storage Lens metrics glossary in the Amazon S3 User Guide.
      type: object
      properties:
        ActivityMetrics:
          $ref: "#/components/schemas/ActivityMetrics"
          description: A container element for S3 Storage Lens activity metrics.
        BucketLevel:
          $ref: "#/components/schemas/BucketLevel"
          description: A container element for the S3 Storage Lens bucket-level configuration.
        AdvancedCostOptimizationMetrics:
          $ref: "#/components/schemas/AdvancedCostOptimizationMetrics"
          description: A container element for S3 Storage Lens advanced cost-optimization metrics.
        AdvancedDataProtectionMetrics:
          $ref: "#/components/schemas/AdvancedDataProtectionMetrics"
          description: A container element for S3 Storage Lens advanced data-protection metrics.
        DetailedStatusCodesMetrics:
          $ref: "#/components/schemas/DetailedStatusCodesMetrics"
          description: A container element for detailed status code metrics.
        AdvancedPerformanceMetrics:
          $ref: "#/components/schemas/AdvancedPerformanceMetrics"
          description: A container element for S3 Storage Lens advanced performance metrics.
        StorageLensGroupLevel:
          $ref: "#/components/schemas/StorageLensGroupLevel"
          description: A container element for S3 Storage Lens groups metrics.
      required:
        - BucketLevel
    ActivityMetrics:
      description: The container element for Amazon S3 Storage Lens activity metrics. Activity metrics show details about how your storage is requested, such as requests (for example, All requests, Get requests, Put requests), bytes uploaded or downloaded, and errors. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide. For a complete list of S3 Storage Lens metrics, see S3 Storage Lens metrics glossary in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether activity metrics are enabled.
    IsEnabled:
      type: boolean
    BucketLevel:
      description: A container for the bucket-level configuration for Amazon S3 Storage Lens. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide.
      type: object
      properties:
        ActivityMetrics:
          $ref: "#/components/schemas/ActivityMetrics"
          description: A container for the bucket-level activity metrics for S3 Storage Lens.
        PrefixLevel:
          $ref: "#/components/schemas/PrefixLevel"
          description: A container for the prefix-level metrics for S3 Storage Lens.
        AdvancedCostOptimizationMetrics:
          $ref: "#/components/schemas/AdvancedCostOptimizationMetrics"
          description: A container for bucket-level advanced cost-optimization metrics for S3 Storage Lens.
        AdvancedDataProtectionMetrics:
          $ref: "#/components/schemas/AdvancedDataProtectionMetrics"
          description: A container for bucket-level advanced data-protection metrics for S3 Storage Lens.
        DetailedStatusCodesMetrics:
          $ref: "#/components/schemas/DetailedStatusCodesMetrics"
          description: A container for bucket-level detailed status code metrics for S3 Storage Lens.
        AdvancedPerformanceMetrics:
          $ref: "#/components/schemas/AdvancedPerformanceMetrics"
          description: A container for bucket-level advanced performance metrics for S3 Storage Lens.
    PrefixLevel:
      description: A container for the prefix-level configuration.
      type: object
      properties:
        StorageMetrics:
          $ref: "#/components/schemas/PrefixLevelStorageMetrics"
          description: A container for the prefix-level storage metrics for S3 Storage Lens.
      required:
        - StorageMetrics
    PrefixLevelStorageMetrics:
      description: A container for the prefix-level storage metrics for S3 Storage Lens.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container for whether prefix-level storage metrics are enabled.
        SelectionCriteria:
          $ref: "#/components/schemas/SelectionCriteria"
    SelectionCriteria:
      type: object
      properties:
        Delimiter:
          $ref: "#/components/schemas/StorageLensPrefixLevelDelimiter"
          description: A container for the delimiter of the selection criteria being used.
        MaxDepth:
          $ref: "#/components/schemas/StorageLensPrefixLevelMaxDepth"
          description: The max depth of the selection criteria
        MinStorageBytesPercentage:
          $ref: "#/components/schemas/MinStorageBytesPercentage"
          description: The minimum number of storage bytes percentage whose metrics will be selected. You must choose a value greater than or equal to 1.0.
    StorageLensPrefixLevelDelimiter:
      type: string
      maxLength: 1
    StorageLensPrefixLevelMaxDepth:
      type: integer
      minimum: 1
      maximum: 10
    MinStorageBytesPercentage:
      type: number
      format: double
      minimum: 0.1
      maximum: 100
    AdvancedCostOptimizationMetrics:
      description: The container element for Amazon S3 Storage Lens advanced cost-optimization metrics. Advanced cost-optimization metrics provide insights that you can use to manage and optimize your storage costs, for example, lifecycle rule counts for transitions, expirations, and incomplete multipart uploads. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide. For a complete list of S3 Storage Lens metrics, see S3 Storage Lens metrics glossary in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether advanced cost-optimization metrics are enabled.
    AdvancedDataProtectionMetrics:
      description: The container element for Amazon S3 Storage Lens advanced data-protection metrics. Advanced data-protection metrics provide insights that you can use to perform audits and protect your data, for example replication rule counts within and across Regions. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide. For a complete list of S3 Storage Lens metrics, see S3 Storage Lens metrics glossary in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether advanced data-protection metrics are enabled.
    DetailedStatusCodesMetrics:
      description: The container element for Amazon S3 Storage Lens detailed status code metrics. Detailed status code metrics generate metrics for HTTP status codes, such as 200 OK, 403 Forbidden, 503 Service Unavailable and others. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide. For a complete list of S3 Storage Lens metrics, see S3 Storage Lens metrics glossary in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether detailed status code metrics are enabled.
    AdvancedPerformanceMetrics:
      description: The container element for S3 Storage Lens advanced performance metrics. Advanced performance metrics provide insights into application performance, such as request efficiency and access patterns. These metrics help you optimize your S3 storage for both cost and performance by providing detailed analytics on how your applications interact with S3 resources. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide. For a complete list of S3 Storage Lens metrics, see S3 Storage Lens metrics glossary in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether S3 Storage Lens advanced performance metrics are enabled.
    StorageLensGroupLevel:
      description: Specifies the Storage Lens groups to include in the Storage Lens group aggregation.
      type: object
      properties:
        SelectionCriteria:
          $ref: "#/components/schemas/StorageLensGroupLevelSelectionCriteria"
          description: Indicates which Storage Lens group ARNs to include or exclude in the Storage Lens group aggregation. If this value is left null, then all Storage Lens groups are selected.
    StorageLensGroupLevelSelectionCriteria:
      description: Indicates which Storage Lens group ARNs to include or exclude in the Storage Lens group aggregation. You can only attach Storage Lens groups to your Storage Lens dashboard if they're included in your Storage Lens group aggregation. If this value is left null, then all Storage Lens groups are selected.
      type: object
      properties:
        Include:
          $ref: "#/components/schemas/StorageLensGroupLevelInclude"
          description: Indicates which Storage Lens group ARNs to include in the Storage Lens group aggregation.
        Exclude:
          $ref: "#/components/schemas/StorageLensGroupLevelExclude"
          description: Indicates which Storage Lens group ARNs to exclude from the Storage Lens group aggregation.
    StorageLensGroupLevelInclude:
      type: array
      items:
        $ref: "#/components/schemas/StorageLensGroupArn"
    StorageLensGroupLevelExclude:
      type: array
      items:
        $ref: "#/components/schemas/StorageLensGroupArn"
    Include:
      description: A container for what Amazon S3 Storage Lens configuration includes.
      type: object
      properties:
        Buckets:
          $ref: "#/components/schemas/Buckets"
          description: A container for the S3 Storage Lens bucket includes.
        Regions:
          $ref: "#/components/schemas/Regions"
          description: A container for the S3 Storage Lens Region includes.
    Buckets:
      type: array
      items:
        $ref: "#/components/schemas/S3BucketArnString"
    Regions:
      type: array
      items:
        $ref: "#/components/schemas/S3AWSRegion"
    S3AWSRegion:
      type: string
      minLength: 5
      maxLength: 30
      pattern: "[a-z0-9\\-]+"
    Exclude:
      description: A container for what Amazon S3 Storage Lens will exclude.
      type: object
      properties:
        Buckets:
          $ref: "#/components/schemas/Buckets"
          description: A container for the S3 Storage Lens bucket excludes.
        Regions:
          $ref: "#/components/schemas/Regions"
          description: A container for the S3 Storage Lens Region excludes.
    StorageLensDataExport:
      description: A container to specify the properties of your S3 Storage Lens metrics export, including the destination, schema, and format.
      type: object
      properties:
        S3BucketDestination:
          $ref: "#/components/schemas/S3BucketDestination"
          description: A container for the bucket where the S3 Storage Lens metrics export will be located. This bucket must be located in the same Region as the storage lens configuration.
        CloudWatchMetrics:
          $ref: "#/components/schemas/CloudWatchMetrics"
          description: A container for enabling Amazon CloudWatch publishing for S3 Storage Lens metrics.
        StorageLensTableDestination:
          $ref: "#/components/schemas/StorageLensTableDestination"
          description: A container for configuring S3 Storage Lens data exports to read-only S3 table buckets.
    S3BucketDestination:
      description: A container for the bucket where the Amazon S3 Storage Lens metrics export files are located.
      type: object
      properties:
        Format:
          $ref: "#/components/schemas/Format"
        OutputSchemaVersion:
          $ref: "#/components/schemas/OutputSchemaVersion"
          description: The schema version of the export file.
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account ID of the owner of the S3 Storage Lens metrics export bucket.
        Arn:
          $ref: "#/components/schemas/S3BucketArnString"
          description: "The Amazon Resource Name (ARN) of the bucket. This property is read-only and follows the following format: arn:aws:s3:us-east-1:example-account-id:bucket/your-destination-bucket-name"
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The prefix of the destination bucket where the metrics export will be delivered.
        Encryption:
          $ref: "#/components/schemas/StorageLensDataExportEncryption"
          description: The container for the type encryption of the metrics exports in this bucket.
      required:
        - Format
        - OutputSchemaVersion
        - AccountId
        - Arn
    Format:
      type: string
      enum:
        - CSV
        - Parquet
    OutputSchemaVersion:
      type: string
      enum:
        - V_1
    StorageLensDataExportEncryption:
      description: A container for the encryption of the S3 Storage Lens metrics exports.
      type: object
      properties:
        SSES3:
          $ref: "#/components/schemas/SSES3"
        SSEKMS:
          $ref: "#/components/schemas/SSEKMS"
    SSES3:
      type: object
    SSEKMS:
      type: object
      properties:
        KeyId:
          $ref: "#/components/schemas/SSEKMSKeyId"
          description: "A container for the ARN of the SSE-KMS encryption. This property is read-only and follows the following format: arn:aws:kms:us-east-1:example-account-id:key/example-9a73-4afc-8d29-8f5900cef44e"
      required:
        - KeyId
    SSEKMSKeyId:
      type: string
    CloudWatchMetrics:
      description: A container for enabling Amazon CloudWatch publishing for S3 Storage Lens metrics. For more information about publishing S3 Storage Lens metrics to CloudWatch, see Monitor S3 Storage Lens metrics in CloudWatch in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether CloudWatch publishing for S3 Storage Lens metrics is enabled. A value of true indicates that CloudWatch publishing for S3 Storage Lens metrics is enabled.
      required:
        - IsEnabled
    StorageLensTableDestination:
      description: A container for configuring your S3 Storage Lens reports to export to read-only S3 table buckets. This parameter enables you to store your Storage Lens metrics in a structured, queryable table format in Apache Iceberg. For more information about S3 Storage Lens, see Assessing your storage activity and usage with S3 Storage Lens in the Amazon S3 User Guide.
      type: object
      properties:
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: A container that indicates whether the export to read-only S3 table buckets is enabled for your S3 Storage Lens configuration. When set to true, Storage Lens reports are automatically exported to tables in addition to other configured destinations.
        Encryption:
          $ref: "#/components/schemas/StorageLensDataExportEncryption"
      required:
        - IsEnabled
    StorageLensExpandedPrefixesDataExport:
      description: A container for your S3 Storage Lens expanded prefix metrics report configuration. Unlike the default Storage Lens metrics report, the enhanced prefix metrics report includes all S3 Storage Lens storage and activity data related to the full list of prefixes in your Storage Lens configuration.
      type: object
      properties:
        S3BucketDestination:
          $ref: "#/components/schemas/S3BucketDestination"
        StorageLensTableDestination:
          $ref: "#/components/schemas/StorageLensTableDestination"
          description: A container for the bucket where the S3 Storage Lens metric export files are located. At least one export destination must be specified.
    StorageLensAwsOrg:
      description: The Amazon Web Services organization for your S3 Storage Lens.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/AwsOrgArn"
          description: "A container for the Amazon Resource Name (ARN) of the Amazon Web Services organization. This property is read-only and follows the following format: arn:aws:organizations:us-east-1:example-account-id:organization/o-ex2l495dck"
      required:
        - Arn
    AwsOrgArn:
      type: string
      minLength: 1
      maxLength: 1024
