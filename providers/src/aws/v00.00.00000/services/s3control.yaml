        - id
        - emailAddress
        - uri
    NonEmptyMaxLength1024String:
      type: string
      minLength: 1
      maxLength: 1024
    S3Permission:
      type: string
      enum:
        - FULL_CONTROL
        - READ
        - WRITE
        - READ_ACP
        - WRITE_ACP
    S3MetadataDirective:
      type: string
      enum:
        - COPY
        - REPLACE
    TimeStamp:
      type: string
      format: date-time
    S3ObjectMetadata:
      type: object
      properties:
        CacheControl:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        ContentDisposition:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        ContentEncoding:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        ContentLanguage:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        UserMetadata:
          type: object
          properties: {}
        ContentLength:
          $ref: "#/components/schemas/S3ContentLength"
          description: This member has been deprecated.
        ContentMD5:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: This member has been deprecated.
        ContentType:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        HttpExpiresDate:
          $ref: "#/components/schemas/TimeStamp"
        RequesterCharged:
          $ref: "#/components/schemas/Boolean"
          description: This member has been deprecated.
        SSEAlgorithm:
          $ref: "#/components/schemas/S3SSEAlgorithm"
          description: "The server-side encryption algorithm used when storing objects in Amazon S3. Directory buckets - For directory buckets, there are only two supported options for server-side encryption: server-side encryption with Amazon S3 managed keys (SSE-S3) (AES256) and server-side encryption with KMS keys (SSE-KMS) (KMS). For more information, see Protecting data with server-side encryption in the Amazon S3 User Guide. For the Copy operation in Batch Operations, see S3CopyObjectOperation."
    S3ContentLength:
      type: integer
      format: int64
      minimum: 0
    S3SSEAlgorithm:
      type: string
      enum:
        - AES256
        - KMS
    S3TagSet:
      type: array
      items:
        $ref: "#/components/schemas/S3Tag"
    S3Tag:
      description: A container for a key-value name pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKeyString"
          description: Key of the tag
        Value:
          $ref: "#/components/schemas/TagValueString"
          description: Value of the tag
      required:
        - Key
        - Value
    NonEmptyMaxLength2048String:
      type: string
      minLength: 1
      maxLength: 2048
    S3StorageClass:
      type: string
      enum:
        - STANDARD
        - STANDARD_IA
        - ONEZONE_IA
        - GLACIER
        - INTELLIGENT_TIERING
        - DEEP_ARCHIVE
        - GLACIER_IR
    KmsKeyArnString:
      type: string
      minLength: 1
      maxLength: 2000
    S3ObjectLockLegalHoldStatus:
      type: string
      enum:
        - "OFF"
        - "ON"
    S3ObjectLockMode:
      type: string
      enum:
        - COMPLIANCE
        - GOVERNANCE
    S3ChecksumAlgorithm:
      type: string
      enum:
        - CRC32
        - CRC32C
        - SHA1
        - SHA256
        - CRC64NVME
        - SHA512
        - MD5
        - XXHASH64
        - XXHASH3
        - XXHASH128
    S3SetObjectAclOperation:
      description: Contains the configuration parameters for a PUT Object ACL operation. S3 Batch Operations passes every object to the underlying PutObjectAcl API operation. For more information about the parameters for this operation, see PutObjectAcl.
      type: object
      properties:
        AccessControlPolicy:
          $ref: "#/components/schemas/S3AccessControlPolicy"
    S3AccessControlPolicy:
      type: object
      properties:
        AccessControlList:
          $ref: "#/components/schemas/S3AccessControlList"
        CannedAccessControlList:
          $ref: "#/components/schemas/S3CannedAccessControlList"
    S3AccessControlList:
      type: object
      properties:
        Owner:
          $ref: "#/components/schemas/S3ObjectOwner"
        Grants:
          $ref: "#/components/schemas/S3GrantList"
      required:
        - Owner
    S3ObjectOwner:
      type: object
      properties:
        ID:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
        DisplayName:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
    S3SetObjectTaggingOperation:
      description: Contains the configuration parameters for a PUT Object Tagging operation. S3 Batch Operations passes every object to the underlying PutObjectTagging API operation. For more information about the parameters for this operation, see PutObjectTagging.
      type: object
      properties:
        TagSet:
          $ref: "#/components/schemas/S3TagSet"
    S3DeleteObjectTaggingOperation:
      description: Contains no configuration parameters because the DELETE Object tagging (DeleteObjectTagging) API operation accepts only the bucket name and key name as parameters, which are defined in the job's manifest.
      type: object
    S3InitiateRestoreObjectOperation:
      description: Contains the configuration parameters for a POST Object restore job. S3 Batch Operations passes every object to the underlying RestoreObject API operation. For more information about the parameters for this operation, see RestoreObject.
      type: object
      properties:
        ExpirationInDays:
          $ref: "#/components/schemas/S3ExpirationInDays"
          description: This argument specifies how long the S3 Glacier or S3 Glacier Deep Archive object remains available in Amazon S3. S3 Initiate Restore Object jobs that target S3 Glacier and S3 Glacier Deep Archive objects require ExpirationInDays set to 1 or greater. Conversely, do not set ExpirationInDays when creating S3 Initiate Restore Object jobs that target S3 Intelligent-Tiering Archive Access and Deep Archive Access tier objects. Objects in S3 Intelligent-Tiering archive access tiers are not subject to restore expiry, so specifying ExpirationInDays results in restore request failure. S3 Batch Operations jobs can operate either on S3 Glacier and S3 Glacier Deep Archive storage class objects or on S3 Intelligent-Tiering Archive Access and Deep Archive Access storage tier objects, but not both types in the same job. If you need to restore objects of both types you must create separate Batch Operations jobs.
        GlacierJobTier:
          $ref: "#/components/schemas/S3GlacierJobTier"
          description: S3 Batch Operations supports STANDARD and BULK retrieval tiers, but not the EXPEDITED retrieval tier.
    S3ExpirationInDays:
      type: integer
      minimum: 0
    S3GlacierJobTier:
      type: string
      enum:
        - BULK
        - STANDARD
    S3SetObjectLegalHoldOperation:
      description: Contains the configuration for an S3 Object Lock legal hold operation that an S3 Batch Operations job passes to every object to the underlying PutObjectLegalHold API operation. For more information, see Using S3 Object Lock legal hold with S3 Batch Operations in the Amazon S3 User Guide. This functionality is not supported by directory buckets.
      type: object
      properties:
        LegalHold:
          $ref: "#/components/schemas/S3ObjectLockLegalHold"
          description: Contains the Object Lock legal hold status to be applied to all objects in the Batch Operations job.
      required:
        - LegalHold
    S3ObjectLockLegalHold:
      description: Whether S3 Object Lock legal hold will be applied to objects in an S3 Batch Operations job.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/S3ObjectLockLegalHoldStatus"
          description: The Object Lock legal hold status to be applied to all objects in the Batch Operations job.
      required:
        - Status
    S3SetObjectRetentionOperation:
      description: Contains the configuration parameters for the Object Lock retention action for an S3 Batch Operations job. Batch Operations passes every object to the underlying PutObjectRetention API operation. For more information, see Using S3 Object Lock retention with S3 Batch Operations in the Amazon S3 User Guide. This functionality is not supported by directory buckets.
      type: object
      properties:
        BypassGovernanceRetention:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the action should be applied to objects in the Batch Operations job even if they have Object Lock GOVERNANCE type in place.
        Retention:
          $ref: "#/components/schemas/S3Retention"
          description: Contains the Object Lock retention mode to be applied to all objects in the Batch Operations job. For more information, see Using S3 Object Lock retention with S3 Batch Operations in the Amazon S3 User Guide.
      required:
        - Retention
    S3Retention:
      description: Contains the S3 Object Lock retention mode to be applied to all objects in the S3 Batch Operations job. If you don't provide Mode and RetainUntilDate data types in your operation, you will remove the retention from your objects. For more information, see Using S3 Object Lock retention with S3 Batch Operations in the Amazon S3 User Guide.
      type: object
      properties:
        RetainUntilDate:
          $ref: "#/components/schemas/TimeStamp"
          description: The date when the applied Object Lock retention will expire on all objects set by the Batch Operations job.
        Mode:
          $ref: "#/components/schemas/S3ObjectLockRetentionMode"
          description: The Object Lock retention mode to be applied to all objects in the Batch Operations job.
    S3ObjectLockRetentionMode:
      type: string
      enum:
        - COMPLIANCE
        - GOVERNANCE
    S3ReplicateObjectOperation:
      description: Directs the specified job to invoke ReplicateObject on every object in the job's manifest.
      type: object
    S3ComputeObjectChecksumOperation:
      description: Directs the specified job to invoke the ComputeObjectChecksum operation on every object listed in the job's manifest.
      type: object
      properties:
        ChecksumAlgorithm:
          $ref: "#/components/schemas/ComputeObjectChecksumAlgorithm"
          description: Indicates the algorithm that you want Amazon S3 to use to create the checksum. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumType:
          $ref: "#/components/schemas/ComputeObjectChecksumType"
          description: Indicates the checksum type that you want Amazon S3 to use to calculate the object's checksum value. For more information, see Checking object integrity in the Amazon S3 User Guide.
    ComputeObjectChecksumAlgorithm:
      type: string
      enum:
        - CRC32
        - CRC32C
        - CRC64NVME
        - MD5
        - SHA1
        - SHA256
        - SHA512
        - XXHASH64
        - XXHASH3
        - XXHASH128
    ComputeObjectChecksumType:
      type: string
      enum:
        - FULL_OBJECT
        - COMPOSITE
    S3UpdateObjectEncryptionOperation:
      description: With the UpdateObjectEncryption operation, you can atomically update the server-side encryption type of an existing object in a general purpose bucket without any data movement.
      type: object
      properties:
        ObjectEncryption:
          $ref: "#/components/schemas/ObjectEncryption"
          description: The updated server-side encryption type for this S3 object. The UpdateObjectEncryption operation supports the SSE-KMS encryption type.
    ObjectEncryption:
      description: "The updated server-side encryption type for this object. The UpdateObjectEncryption operation supports the SSE-KMS encryption type. Valid Values: SSEKMS"
      type: object
      properties:
        SSEKMS:
          $ref: "#/components/schemas/S3UpdateObjectEncryptionSSEKMS"
          description: Specifies to update the object encryption type to server-side encryption with Key Management Service (KMS) keys (SSE-KMS).
    S3UpdateObjectEncryptionSSEKMS:
      description: If SSEKMS is specified for UpdateObjectEncryption, this data type specifies the Amazon Web Services KMS key Amazon Resource Name (ARN) to use and whether to use an S3 Bucket Key for server-side encryption using Key Management Service (KMS) keys (SSE-KMS).
      type: object
      properties:
        KMSKeyArn:
          $ref: "#/components/schemas/NonEmptyKmsKeyArnString"
          description: Specifies the Amazon Web Services KMS key Amazon Resource Name (ARN) to use for the updated server-side encryption type. Required if UpdateObjectEncryption specifies SSEKMS.
        BucketKeyEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether Amazon S3 should use an S3 Bucket Key for object encryption with server-side encryption using Key Management Service (KMS) keys (SSE-KMS). If this value isn't specified, it defaults to false. Setting this value to true causes Amazon S3 to use an S3 Bucket Key for update object encryption with SSE-KMS.
      required:
        - KMSKeyArn
    NonEmptyKmsKeyArnString:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[a-zA-Z0-9-]*:kms:[a-z0-9-]+:[0-9]{12}:key/[a-zA-Z0-9-]+
    JobReport:
      description: Contains the configuration parameters for a job-completion report.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3BucketArnString"
          description: The Amazon Resource Name (ARN) for the bucket where specified job-completion report will be stored. Directory buckets - Directory buckets aren't supported as a location for Batch Operations to store job completion reports.
        Format:
          $ref: "#/components/schemas/JobReportFormat"
          description: The format of the specified job-completion report.
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the specified job will generate a job-completion report.
        Prefix:
          $ref: "#/components/schemas/ReportPrefixString"
          description: An optional prefix to describe where in the specified bucket the job-completion report will be stored. Amazon S3 stores the job-completion report at `<prefix>`/job-`<job-id>`/report.json.
        ReportScope:
          $ref: "#/components/schemas/JobReportScope"
          description: Indicates whether the job-completion report will include details of all tasks or only failed tasks.
        ExpectedBucketOwner:
          $ref: "#/components/schemas/AccountId"
          description: Lists the Amazon Web Services account ID that owns the target bucket, where the completion report is received.
      required:
        - Enabled
    S3BucketArnString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:[^:]+:s3:.*
    JobReportFormat:
      type: string
      enum:
        - Report_CSV_20180820
    ReportPrefixString:
      type: string
      minLength: 1
      maxLength: 512
    JobReportScope:
      type: string
      enum:
        - AllTasks
        - FailedTasksOnly
    JobManifest:
      description: Contains the configuration information for a job's manifest.
      type: object
      properties:
        Spec:
          $ref: "#/components/schemas/JobManifestSpec"
          description: Describes the format of the specified job's manifest. If the manifest is in CSV format, also describes the columns contained within the manifest.
        Location:
          $ref: "#/components/schemas/JobManifestLocation"
          description: Contains the information required to locate the specified job's manifest. Manifests can't be imported from directory buckets. For more information, see Directory buckets.
      required:
        - Spec
        - Location
    JobManifestSpec:
      description: Describes the format of a manifest. If the manifest is in CSV format, also describes the columns contained within the manifest.
      type: object
      properties:
        Format:
          $ref: "#/components/schemas/JobManifestFormat"
          description: Indicates which of the available formats the specified manifest uses.
        Fields:
          $ref: "#/components/schemas/JobManifestFieldList"
          description: If the specified manifest object is in the S3BatchOperations_CSV_20180820 format, this element describes which columns contain the required data.
      required:
        - Format
    JobManifestFormat:
      type: string
      enum:
        - S3BatchOperations_CSV_20180820
        - S3InventoryReport_CSV_20161130
    JobManifestFieldList:
      type: array
      items:
        $ref: "#/components/schemas/JobManifestFieldName"
    JobManifestFieldName:
      type: string
      enum:
        - Ignore
        - Bucket
        - Key
        - VersionId
    JobManifestLocation:
      description: Contains the information required to locate a manifest object. Manifests can't be imported from directory buckets. For more information, see Directory buckets.
      type: object
      properties:
        ObjectArn:
          $ref: "#/components/schemas/S3KeyArnString"
          description: The Amazon Resource Name (ARN) for a manifest object. When you're using XML requests, you must replace special characters (such as carriage returns) in object keys with their equivalent XML entity codes. For more information, see XML-related object key constraints in the Amazon S3 User Guide.
        ObjectVersionId:
          $ref: "#/components/schemas/S3ObjectVersionId"
          description: The optional version ID to identify a specific version of the manifest object.
        ETag:
          $ref: "#/components/schemas/NonEmptyMaxLength1024String"
          description: The ETag for the specified manifest object.
      required:
        - ObjectArn
        - ETag
    S3KeyArnString:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: arn:[^:]+:s3:.*
    S3ObjectVersionId:
      type: string
      minLength: 1
      maxLength: 2000
    NonEmptyMaxLength256String:
      type: string
      minLength: 1
      maxLength: 256
    JobPriority:
      type: integer
      minimum: 0
      maximum: 2147483647
    JobManifestGenerator:
      description: Configures the type of the job's ManifestGenerator.
      type: object
      properties:
        S3JobManifestGenerator:
          $ref: "#/components/schemas/S3JobManifestGenerator"
          description: The S3 job ManifestGenerator's configuration details.
    S3JobManifestGenerator:
      description: The container for the service that will create the S3 manifest.
      type: object
      properties:
        ExpectedBucketOwner:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that owns the bucket the generated manifest is written to. If provided the generated manifest bucket's owner Amazon Web Services account ID must match this value, else the job fails.
        SourceBucket:
          $ref: "#/components/schemas/S3BucketArnString"
          description: The ARN of the source bucket used by the ManifestGenerator. Directory buckets - Directory buckets aren't supported as the source buckets used by S3JobManifestGenerator to generate the job manifest.
        ManifestOutputLocation:
          $ref: "#/components/schemas/S3ManifestOutputLocation"
          description: Specifies the location the generated manifest will be written to. Manifests can't be written to directory buckets. For more information, see Directory buckets.
        Filter:
          $ref: "#/components/schemas/JobManifestGeneratorFilter"
          description: Specifies rules the S3JobManifestGenerator should use to decide whether an object in the source bucket should or should not be included in the generated job manifest.
        EnableManifestOutput:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether or not to write the job's generated manifest to a bucket.
      required:
        - SourceBucket
        - EnableManifestOutput
    S3ManifestOutputLocation:
      description: Location details for where the generated manifest should be written.
      type: object
      properties:
        ExpectedManifestBucketOwner:
          $ref: "#/components/schemas/AccountId"
          description: The Account ID that owns the bucket the generated manifest is written to.
        Bucket:
          $ref: "#/components/schemas/S3BucketArnString"
          description: The bucket ARN the generated manifest should be written to. Directory buckets - Directory buckets aren't supported as the buckets to store the generated manifest.
        ManifestPrefix:
          $ref: "#/components/schemas/ManifestPrefixString"
          description: Prefix identifying one or more objects to which the manifest applies.
        ManifestEncryption:
          $ref: "#/components/schemas/GeneratedManifestEncryption"
          description: Specifies what encryption should be used when the generated manifest objects are written.
        ManifestFormat:
          $ref: "#/components/schemas/GeneratedManifestFormat"
          description: The format of the generated manifest.
      required:
        - Bucket
        - ManifestFormat
    ManifestPrefixString:
      type: string
      minLength: 1
      maxLength: 512
    GeneratedManifestEncryption:
      description: The encryption configuration to use when storing the generated manifest.
      type: object
      properties:
        SSES3:
          $ref: "#/components/schemas/SSES3Encryption"
          description: Specifies the use of SSE-S3 to encrypt generated manifest objects.
        SSEKMS:
          $ref: "#/components/schemas/SSEKMSEncryption"
          description: Configuration details on how SSE-KMS is used to encrypt generated manifest objects.
    SSES3Encryption:
      description: Configuration for the use of SSE-S3 to encrypt generated manifest objects.
      type: object
    SSEKMSEncryption:
      description: Configuration for the use of SSE-KMS to encrypt generated manifest objects.
      type: object
      properties:
        KeyId:
          $ref: "#/components/schemas/KmsKeyArnString"
          description: Specifies the ID of the Amazon Web Services Key Management Service (Amazon Web Services KMS) symmetric encryption customer managed key to use for encrypting generated manifest objects.
      required:
        - KeyId
    GeneratedManifestFormat:
      type: string
      enum:
        - S3InventoryReport_CSV_20211130
    JobManifestGeneratorFilter:
      description: The filter used to describe a set of objects for the job's manifest.
      type: object
      properties:
        EligibleForReplication:
          $ref: "#/components/schemas/Boolean"
          description: Include objects in the generated manifest only if they are eligible for replication according to the Replication configuration on the source bucket.
        CreatedAfter:
          $ref: "#/components/schemas/ObjectCreationTime"
          description: If provided, the generated manifest includes only source bucket objects that were created after this time.
        CreatedBefore:
          $ref: "#/components/schemas/ObjectCreationTime"
          description: If provided, the generated manifest includes only source bucket objects that were created before this time.
        ObjectReplicationStatuses:
          $ref: "#/components/schemas/ReplicationStatusFilterList"
          description: If provided, the generated manifest includes only source bucket objects that have one of the specified Replication statuses.
        KeyNameConstraint:
          $ref: "#/components/schemas/KeyNameConstraint"
          description: If provided, the generated manifest includes only source bucket objects whose object keys match the string constraints specified for MatchAnyPrefix, MatchAnySuffix, and MatchAnySubstring.
        ObjectSizeGreaterThanBytes:
          $ref: "#/components/schemas/ObjectSizeGreaterThanBytes"
          description: If provided, the generated manifest includes only source bucket objects whose file size is greater than the specified number of bytes.
        ObjectSizeLessThanBytes:
          $ref: "#/components/schemas/ObjectSizeLessThanBytes"
          description: If provided, the generated manifest includes only source bucket objects whose file size is less than the specified number of bytes.
        MatchAnyStorageClass:
          $ref: "#/components/schemas/StorageClassList"
          description: If provided, the generated manifest includes only source bucket objects that are stored with the specified storage class.
        MatchAnyObjectEncryption:
          $ref: "#/components/schemas/ObjectEncryptionFilterList"
          description: If provided, the generated object list includes only source bucket objects with the indicated server-side encryption type (SSE-S3, SSE-KMS, DSSE-KMS, SSE-C, or NOT-SSE).
    ObjectCreationTime:
      type: string
      format: date-time
    ReplicationStatusFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicationStatus"
    ReplicationStatus:
      type: string
      enum:
        - COMPLETED
        - FAILED
        - REPLICA
        - NONE
    KeyNameConstraint:
      description: If provided, the generated manifest includes only source bucket objects whose object keys match the string constraints specified for MatchAnyPrefix, MatchAnySuffix, and MatchAnySubstring.
      type: object
      properties:
        MatchAnyPrefix:
          $ref: "#/components/schemas/NonEmptyMaxLength1024StringList"
          description: If provided, the generated manifest includes objects where the specified string appears at the start of the object key string. Each KeyNameConstraint filter accepts an array of strings with a length of 1 string.
        MatchAnySuffix:
          $ref: "#/components/schemas/NonEmptyMaxLength1024StringList"
          description: If provided, the generated manifest includes objects where the specified string appears at the end of the object key string. Each KeyNameConstraint filter accepts an array of strings with a length of 1 string.
        MatchAnySubstring:
          $ref: "#/components/schemas/NonEmptyMaxLength1024StringList"
          description: If provided, the generated manifest includes objects where the specified string appears anywhere within the object key string. Each KeyNameConstraint filter accepts an array of strings with a length of 1 string.
    NonEmptyMaxLength1024StringList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyMaxLength1024String"
    ObjectSizeGreaterThanBytes:
      type: integer
      format: int64
    ObjectSizeLessThanBytes:
      type: integer
      format: int64
    StorageClassList:
      type: array
      items:
        $ref: "#/components/schemas/S3StorageClass"
    ObjectEncryptionFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectEncryptionFilter"
    ObjectEncryptionFilter:
      description: An optional filter for the S3JobManifestGenerator that identifies the subset of objects by encryption type.
      type: object
      properties:
        SSES3:
          $ref: "#/components/schemas/SSES3Filter"
          description: Filters for objects that are encrypted by server-side encryption with Amazon S3 managed keys (SSE-S3).
        SSEKMS:
          $ref: "#/components/schemas/SSEKMSFilter"
          description: Filters for objects that are encrypted by server-side encryption with Amazon Web Services Key Management Service (KMS) keys (SSE-KMS).
        DSSEKMS:
          $ref: "#/components/schemas/DSSEKMSFilter"
          description: Filters for objects that are encrypted by dual-layer server-side encryption with Amazon Web Services Key Management Service (KMS) keys (DSSE-KMS).
        SSEC:
          $ref: "#/components/schemas/SSECFilter"
          description: Filters for objects that are encrypted by server-side encryption with customer-provided keys (SSE-C).
        NOTSSE:
          $ref: "#/components/schemas/NotSSEFilter"
          description: Filters for objects that are not encrypted by server-side encryption.
    SSES3Filter:
      description: A filter that returns objects that are encrypted by server-side encryption with Amazon S3 managed keys (SSE-S3).
      type: object
    SSEKMSFilter:
      description: A filter that returns objects that are encrypted by server-side encryption with Amazon Web Services KMS (SSE-KMS).
      type: object
      properties:
        KmsKeyArn:
          $ref: "#/components/schemas/NonEmptyKmsKeyArnString"
          description: The Amazon Resource Name (ARN) of the customer managed KMS key to use for the filter to return objects that are encrypted by the specified key. For best performance, use keys in the same Region as the S3 Batch Operations job.
        BucketKeyEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether Amazon S3 should use an S3 Bucket Key for object encryption with server-side encryption using Amazon Web Services Key Management Service (Amazon Web Services KMS) keys (SSE-KMS). If specified, will filter SSE-KMS encrypted objects by S3 Bucket Key status.
    DSSEKMSFilter:
      description: A filter that returns objects that are encrypted by dual-layer server-side encryption with Amazon Web Services Key Management Service (KMS) keys (DSSE-KMS). You can further refine your filtering by optionally providing a KMS Key ARN to filter objects encrypted by a specific key.
      type: object
      properties:
        KmsKeyArn:
          $ref: "#/components/schemas/NonEmptyKmsKeyArnString"
          description: The Amazon Resource Name (ARN) of the customer managed KMS key to use for the filter to return objects that are encrypted by the specified key. For best performance, use keys in the same Region as the S3 Batch Operations job.
    SSECFilter:
      description: A filter that returns objects that are encrypted by server-side encryption with customer-provided keys (SSE-C).
      type: object
    NotSSEFilter:
      description: A filter that returns objects that aren't server-side encrypted.
      type: object
    CreateJobResultDisplay:
      type: object
      properties:
        JobId:
          type: string
          description: The ID for this job. Amazon S3 generates this ID automatically and returns it after a successful Create Job request.
    CreateJobOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateJobResultDisplay"
    MultiRegionAccessPointClientToken:
      type: string
