openapi: 3.0.0
info:
  version: "2022-07-26"
  title: Interconnect
  description: Interconnect
  x-serviceName: interconnect
  x-serviceAlias: interconnect
  x-protocol: json
  x-apiVersion: "2022-07-26"
  x-endpointPrefix: interconnect
  x-targetPrefix: Interconnect
  x-jsonVersion: "1.0"
servers:
  - url: https://interconnect.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for interconnect
paths:
  /AcceptConnectionProposal:
    post:
      operationId: AcceptConnectionProposal
      description: Accepts a connection proposal which was generated at a supported partner's portal. The proposal contains the Environment and bandwidth that were chosen on the partner's portal and cannot be modified. Upon accepting the proposal a connection will be made between the AWS network as accessed via the selected Attach Point and the network previously selected network on the partner's portal.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.AcceptConnectionProposal
            default: Interconnect.AcceptConnectionProposal
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                attachPoint:
                  $ref: "#/components/schemas/AttachPoint"
                  description: The Attach Point to which the connection should be associated.
                activationKey:
                  $ref: "#/components/schemas/ActivationKey"
                  description: An Activation Key that was generated on a supported partner's portal. This key captures the desired parameters from the initial creation request. The details of this request can be described using with DescribeConnectionProposal.
                description:
                  $ref: "#/components/schemas/ConnectionDescription"
                  description: A description to distinguish this Connection.
                tags:
                  $ref: "#/components/schemas/TagMap"
                  description: The tags to associate with the resulting Connection.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Idempotency token used for the request.
              required:
                - attachPoint
                - activationKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptConnectionProposalResponse"
  /CreateConnection:
    post:
      operationId: CreateConnection
      description: Initiates the process to create a Connection across the specified Environment. The Environment dictates the specified partner and location to which the other end of the connection should attach. You can see a list of the available Environments by calling ListEnvironments The Attach Point specifies where within the AWS Network your connection will logically connect. After a successful call to this method, the resulting Connection will return an Activation Key which will need to be brought to the specific partner's portal to confirm the Connection on both sides. (See Environment$activationPageUrl for a direct link to the partner portal).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.CreateConnection
            default: Interconnect.CreateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/ConnectionDescription"
                  description: A description to distinguish this Connection.
                bandwidth:
                  $ref: "#/components/schemas/ConnectionBandwidth"
                  description: The desired bandwidth of the requested Connection
                attachPoint:
                  $ref: "#/components/schemas/AttachPoint"
                  description: The Attach Point to which the connection should be associated."
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The identifier of the Environment across which this Connection should be created. The available Environment objects can be determined using ListEnvironments.
                remoteAccount:
                  $ref: "#/components/schemas/RemoteAccountIdentifier"
                  description: Account and/or principal identifying information that can be verified by the partner of this specific Environment.
                tags:
                  $ref: "#/components/schemas/TagMap"
                  description: The tag to associate with the resulting Connection.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Idempotency token used for the request.
              required:
                - bandwidth
                - attachPoint
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionResponse"
  /DeleteConnection:
    post:
      operationId: DeleteConnection
      description: Deletes an existing Connection with the supplied identifier. This operation will also inform the remote partner of your intention to delete your connection. Note, the partner may still require you to delete to fully clean up resources, but the network connectivity provided by the Connection will cease to exist.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.DeleteConnection
            default: Interconnect.DeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The identifier of the Connection to be deleted.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Idempotency token used for the request.
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectionResponse"
  /DescribeConnectionProposal:
    post:
      operationId: DescribeConnectionProposal
      description: Describes the details of a connection proposal generated at a partner's portal.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.DescribeConnectionProposal
            default: Interconnect.DescribeConnectionProposal
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                activationKey:
                  $ref: "#/components/schemas/ActivationKey"
                  description: An Activation Key that was generated on a supported partner's portal. This key captures the desired parameters from the initial creation request.
              required:
                - activationKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectionProposalResponse"
  /GetConnection:
    post:
      operationId: GetConnection
      description: Describes the current state of a Connection resource as specified by the identifier.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.GetConnection
            default: Interconnect.GetConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The identifier of the requested Connection
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionResponse"
  /GetEnvironment:
    post:
      operationId: GetEnvironment
      description: Describes a specific Environment
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.GetEnvironment
            default: Interconnect.GetEnvironment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The identifier of the specific Environment to describe.
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnvironmentResponse"
  /ListAttachPoints:
    post:
      operationId: ListAttachPoints
      description: Lists all Attach Points the caller has access to that are valid for the specified Environment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.ListAttachPoints
            default: Interconnect.ListAttachPoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: The identifier of the Environment for which to list valid Attach Points.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The max number of list results in a single paginated response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A pagination token from a previous paginated response indicating you wish to get the next page.
              required:
                - environmentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttachPointsResponse"
  /ListConnections:
    post:
      operationId: ListConnections
      description: "Lists all connection objects to which the caller has access. Allows for optional filtering by the following properties: state environmentId provider attach point Only Connection objects matching all filters will be returned."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.ListConnections
            default: Interconnect.ListConnections
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The max number of list results in a single paginated response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A pagination token from a previous paginated response indicating you wish to get the next page of results.
                state:
                  $ref: "#/components/schemas/ConnectionState"
                  description: Filter the results to only include Connection objects in the given Connection$state.
                environmentId:
                  $ref: "#/components/schemas/EnvironmentId"
                  description: Filter the results to only include Connection objects on the given Environment.
                provider:
                  $ref: "#/components/schemas/Provider"
                  description: Filter the results to only include Connection objects to the given Provider.
                attachPoint:
                  $ref: "#/components/schemas/AttachPoint"
                  description: Filter results to only include Connection objects attached to the given AttachPoint.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectionsResponse"
  /ListEnvironments:
    post:
      operationId: ListEnvironments
      description: Lists all of the environments that can produce connections that will land in the called AWS region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.ListEnvironments
            default: Interconnect.ListEnvironments
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The max number of list results in a single paginated response.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: A pagination token from a previous paginated response indicating you wish to get the next page of results.
                provider:
                  $ref: "#/components/schemas/Provider"
                  description: Filter results to only include Environment objects that connect to the Provider.
                location:
                  $ref: "#/components/schemas/Location"
                  description: Filter results to only include Environment objects that connect to a given location distiguisher.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: List all current tags on the specified resource. Currently this supports Connection resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.ListTagsForResource
            default: Interconnect.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The resource ARN for which to list tags.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Add new tags to the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.TagResource
            default: Interconnect.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the resource that should receive the new tags.
                tags:
                  $ref: "#/components/schemas/TagMap"
                  description: A map of tags to apply to the specified resource.
              required:
                - arn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.UntagResource
            default: Interconnect.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The ARN of the resource from which the specified tags should be removed.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The list of tag keys that should be removed from the resource.
              required:
                - arn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateConnection:
    post:
      operationId: UpdateConnection
      description: Modifies an existing connection. Currently we support modifications to the connection's description and/or bandwidth.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Interconnect.UpdateConnection
            default: Interconnect.UpdateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The identifier of the Connection that should be updated.
                description:
                  $ref: "#/components/schemas/ConnectionDescription"
                  description: An updated description to apply to the Connection
                bandwidth:
                  $ref: "#/components/schemas/ConnectionBandwidth"
                  description: Request a new bandwidth size on the given Connection. Note that changes to the size may be subject to additional policy, and does require the remote partner provider to acknowledge and permit this new bandwidth size.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: Idempotency token used for the request.
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AttachPoint:
      description: Identifies an attach point to use with a Connection.
      type: object
      properties:
        directConnectGateway:
          $ref: "#/components/schemas/DirectConnectGatewayAttachPoint"
          description: Identifies an DirectConnect Gateway attach point by DirectConnectGatewayID.
        arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: Identifies an attach point by full ARN.
    DirectConnectGatewayAttachPoint:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
    AmazonResourceName:
      type: string
      minLength: 59
      maxLength: 150
      pattern: arn:aws[a-z-]*:interconnect:[^:]+:[0-9]{12}:connection/(mcc|lmcc)-[a-z0-9]{8}
    ActivationKey:
      type: string
      minLength: 1
      maxLength: 2048
    ConnectionDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[-a-zA-Z0-9_ ]+"
    TagMap:
      type: object
      properties: {}
    String:
      type: string
    AcceptConnectionProposalResponse:
      type: object
      properties:
        connection:
          $ref: "#/components/schemas/Connection"
          description: The created Connection object.
    Connection:
      description: The object describing the provided connectivity from the AWS region to the partner location.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ConnectionId"
          description: The short identifier of the connection object.
        arn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: An ARN of a Connection object.
        description:
          $ref: "#/components/schemas/ConnectionDescription"
          description: A descriptive name for the connection.
        bandwidth:
          $ref: "#/components/schemas/ConnectionBandwidth"
          description: The specific selected bandwidth of this connection.
        attachPoint:
          $ref: "#/components/schemas/AttachPoint"
          description: The Attach Point to which the connection should be associated."
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The specific Environment this connection is placed upon.
        provider:
          $ref: "#/components/schemas/Provider"
          description: The provider on the remote side of this Connection.
        location:
          $ref: "#/components/schemas/Location"
          description: The provider specific location on the remote side of this Connection
        type_:
          $ref: "#/components/schemas/ProductType"
          description: The specific product type of this Connection.
        state:
          $ref: "#/components/schemas/ConnectionState"
          description: "requested: The initial state of a connection. The state will remain here until the Connection is accepted on the Partner portal. pending: The connection has been accepted and is being provisioned between AWS and the Partner. available: The connection has been fully provisioned between AWS and the Partner. deleting: The connection is being deleted. deleted: The connection has been deleted. failed: The connection has failed to be created. updating: The connection is being updated."
        sharedId:
          $ref: "#/components/schemas/ConnectionSharedId"
          description: An identifier used by both AWS and the remote partner to identify the specific connection.
        billingTier:
          $ref: "#/components/schemas/BillingTier"
          description: The billing tier this connection is currently assigned.
        ownerAccount:
          $ref: "#/components/schemas/OwnerAccountId"
          description: The account that owns this Connection
        activationKey:
          $ref: "#/components/schemas/ActivationKey"
          description: The Activation Key associated to this connection.
        tags:
          type: object
          properties: {}
          description: The tags on the Connection
      required:
        - id
        - arn
        - description
        - bandwidth
        - attachPoint
        - environmentId
        - provider
        - location
        - type_
        - state
        - sharedId
        - ownerAccount
        - activationKey
    ConnectionId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: (mcc|lmcc)-[a-z0-9]{8}
    ConnectionBandwidth:
      type: string
      minLength: 1
      maxLength: 8
      pattern: \d+[MG]bps
    EnvironmentId:
      type: string
      minLength: 1
      maxLength: 64
    Provider:
      description: Describes the respective AWS Interconnect Partner organization.
      type: object
      properties:
        cloudServiceProvider:
          $ref: "#/components/schemas/CloudServiceProvider"
          description: The provider's name. Specifically, connections to/from this Cloud Service Provider will be considered Multicloud connections.
        lastMileProvider:
          $ref: "#/components/schemas/LastMileProvider"
          description: The provider's name. Specifically, connections to/from this Last Mile Provider will be considered LastMile connections.
    CloudServiceProvider:
      type: string
      minLength: 0
      maxLength: 32
    LastMileProvider:
      type: string
      minLength: 0
      maxLength: 32
    Location:
      type: string
      minLength: 0
      maxLength: 255
    ProductType:
      type: string
      minLength: 5
      maxLength: 32
    ConnectionState:
      type: string
      enum:
        - available
        - requested
        - pending
        - down
        - deleting
        - deleted
        - failed
        - updating
    ConnectionSharedId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
    BillingTier:
      type: integer
      minimum: 0
      maximum: 8
    OwnerAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    RemoteAccountIdentifier:
      description: The types of identifiers that may be needed for remote account specification.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/RemoteOwnerAccount"
          description: A generic bit of identifying information. Can be used in place of any of the more specific types.
    RemoteOwnerAccount:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[-a-zA-Z0-9_@\\.]+"
    CreateConnectionResponse:
      type: object
      properties:
        connection:
          $ref: "#/components/schemas/Connection"
          description: The resulting Connection.
    DeleteConnectionResponse:
      type: object
      properties:
        connection:
          $ref: "#/components/schemas/Connection"
          description: The Connection object that has been marked for deletion.
      required:
        - connection
    DescribeConnectionProposalResponse:
      type: object
      properties:
        bandwidth:
          $ref: "#/components/schemas/ConnectionBandwidth"
          description: The bandwidth of the proposed Connection.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The identifier of the Environment upon which the Connection would be placed if this proposal were accepted.
        provider:
          $ref: "#/components/schemas/Provider"
          description: The partner provider of the specific Environment of the proposal.
        location:
          $ref: "#/components/schemas/Location"
          description: The partner specific location distinguisher of the specific Environment of the proposal.
      required:
        - bandwidth
        - environmentId
        - provider
        - location
    GetConnectionResponse:
      type: object
      properties:
        connection:
          $ref: "#/components/schemas/Connection"
          description: The existing Connection resource.
    GetEnvironmentResponse:
      type: object
      properties:
        environment:
          $ref: "#/components/schemas/Environment"
          description: The requested Environment structure.
      required:
        - environment
    Environment:
      description: Defines the logical topology that an AWS Interconnect Connection is created upon. Specifically, an Environment defines the partner The remote Cloud Service Provider of this resource. or The remote Last Mile Provider of this resource. and the region or location specification to which an AWS Interconnect Connection can be made.
      type: object
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
          description: The provider on the remote side of this Connection.
        location:
          $ref: "#/components/schemas/Location"
          description: The provider specific location on the remote side of this Connection.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The identifier of this Environment
        state:
          $ref: "#/components/schemas/EnvironmentState"
          description: "The state of the Environment. Possible values: available: The environment is available and new Connection objects can be requested. limited: The environment is available, but overall capacity is limited. The set of available bandwidths unavailable: The environment is currently unavailable."
        bandwidths:
          $ref: "#/components/schemas/Bandwidths"
          description: The sets of bandwidths that are available and supported on this environment.
        type_:
          $ref: "#/components/schemas/ProductType"
          description: The specific product type of Connection objects provided by this Environment.
        activationPageUrl:
          $ref: "#/components/schemas/String"
          description: An HTTPS URL on the remote partner portal where the Activation Key should be brought to complete the creation process.
        remoteIdentifierType:
          $ref: "#/components/schemas/RemoteAccountIdentifierType"
          description: The type of identifying information that should be supplied to the remoteAccount parameter of a CreateConnection call for this specific Environment.
      required:
        - provider
        - location
        - environmentId
        - state
        - bandwidths
        - type_
    EnvironmentState:
      type: string
      enum:
        - available
        - limited
        - unavailable
    Bandwidths:
      description: Contains the details about the available and supported bandwidths.
      type: object
      properties:
        available:
          $ref: "#/components/schemas/BandwidthList"
          description: The list of currently available bandwidths.
        supported:
          $ref: "#/components/schemas/BandwidthList"
          description: The list of all bandwidths that this environment plans to support
    BandwidthList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectionBandwidth"
    RemoteAccountIdentifierType:
      type: string
      enum:
        - account
        - email
    MaxResults:
