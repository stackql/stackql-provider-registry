          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic.
        NotificationTypes:
          $ref: "#/components/schemas/AutoScalingNotificationTypes"
          description: The type of event that causes the notification to be sent. To query the notification types supported by Amazon EC2 Auto Scaling, call the DescribeAutoScalingNotificationTypes API.
      required:
        - AutoScalingGroupName
        - TopicARN
        - NotificationTypes
    MinAdjustmentStep:
      type: integer
    MinAdjustmentMagnitude:
      type: integer
    PolicyIncrement:
      type: integer
    StepAdjustments:
      type: array
      items:
        $ref: "#/components/schemas/StepAdjustment"
    StepAdjustment:
      description: "Describes information used to create a step adjustment for a step scaling policy. For the following examples, suppose that you have an alarm with a breach threshold of 50: To trigger the adjustment when the metric is greater than or equal to 50 and less than 60, specify a lower bound of 0 and an upper bound of 10. To trigger the adjustment when the metric is greater than 40 and less than or equal to 50, specify a lower bound of -10 and an upper bound of 0. There are a few rules for the step adjustments for your step policy: The ranges of your step adjustments can't overlap or have a gap. At most, one step adjustment can have a null lower bound. If one step adjustment has a negative lower bound, then there must be a step adjustment with a null lower bound. At most, one step adjustment can have a null upper bound. If one step adjustment has a positive upper bound, then there must be a step adjustment with a null upper bound. The upper and lower bound can't be null in the same step adjustment. For more information, see Step adjustments in the Amazon EC2 Auto Scaling User Guide."
      type: object
      properties:
        MetricIntervalLowerBound:
          $ref: "#/components/schemas/MetricScale"
          description: The lower bound for the difference between the alarm threshold and the CloudWatch metric. If the metric value is above the breach threshold, the lower bound is inclusive (the metric must be greater than or equal to the threshold plus the lower bound). Otherwise, it is exclusive (the metric must be greater than the threshold plus the lower bound). A null value indicates negative infinity.
        MetricIntervalUpperBound:
          $ref: "#/components/schemas/MetricScale"
          description: The upper bound for the difference between the alarm threshold and the CloudWatch metric. If the metric value is above the breach threshold, the upper bound is exclusive (the metric must be less than the threshold plus the upper bound). Otherwise, it is inclusive (the metric must be less than or equal to the threshold plus the upper bound). A null value indicates positive infinity. The upper bound must be greater than the lower bound.
        ScalingAdjustment:
          $ref: "#/components/schemas/PolicyIncrement"
          description: The amount by which to scale, based on the specified adjustment type. A positive value adds to the current capacity while a negative number removes from the current capacity. For exact capacity, you must specify a non-negative value.
      required:
        - ScalingAdjustment
    EstimatedInstanceWarmup:
      type: integer
    TargetTrackingConfiguration:
      description: Represents a target tracking scaling policy configuration to use with Amazon EC2 Auto Scaling.
      type: object
      properties:
        PredefinedMetricSpecification:
          $ref: "#/components/schemas/PredefinedMetricSpecification"
          description: A predefined metric. You must specify either a predefined metric or a customized metric.
        CustomizedMetricSpecification:
          $ref: "#/components/schemas/CustomizedMetricSpecification"
          description: A customized metric. You must specify either a predefined metric or a customized metric.
        TargetValue:
          $ref: "#/components/schemas/MetricScale"
          description: The target value for the metric. Some metrics are based on a count instead of a percentage, such as the request count for an Application Load Balancer or the number of messages in an SQS queue. If the scaling policy specifies one of these metrics, specify the target utilization as the optimal average request or message count per instance during any one-minute interval.
        DisableScaleIn:
          $ref: "#/components/schemas/DisableScaleIn"
          description: Indicates whether scaling in by the target tracking scaling policy is disabled. If scaling in is disabled, the target tracking scaling policy doesn't remove instances from the Auto Scaling group. Otherwise, the target tracking scaling policy can remove instances from the Auto Scaling group. The default is false.
      required:
        - TargetValue
    PredefinedMetricSpecification:
      description: Represents a predefined metric for a target tracking scaling policy to use with Amazon EC2 Auto Scaling.
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/MetricType"
          description: "The metric type. The following predefined metrics are available: ASGAverageCPUUtilization - Average CPU utilization of the Auto Scaling group. ASGAverageNetworkIn - Average number of bytes received on all network interfaces by the Auto Scaling group. ASGAverageNetworkOut - Average number of bytes sent out on all network interfaces by the Auto Scaling group. ALBRequestCountPerTarget - Average Application Load Balancer request count per target for your Auto Scaling group."
        ResourceLabel:
          $ref: "#/components/schemas/XmlStringMaxLen1023"
          description: "A label that uniquely identifies a specific Application Load Balancer target group from which to determine the average request count served by your Auto Scaling group. You can't specify a resource label unless the target group is attached to the Auto Scaling group. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format of the resource label is: app/my-alb/778d41231b141a0f/targetgroup/my-alb-target-group/943f017f100becff. Where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
        - PredefinedMetricType
    MetricType:
      type: string
      enum:
        - ASGAverageCPUUtilization
        - ASGAverageNetworkIn
        - ASGAverageNetworkOut
        - ALBRequestCountPerTarget
    XmlStringMaxLen1023:
      type: string
      minLength: 1
      maxLength: 1023
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    CustomizedMetricSpecification:
      description: "Represents a CloudWatch metric of your choosing for a target tracking scaling policy to use with Amazon EC2 Auto Scaling. To create your customized metric specification: Add values for each required property from CloudWatch. You can use an existing metric, or a new metric that you create. To use your own metric, you must first publish the metric to CloudWatch. For more information, see Publish custom metrics in the Amazon CloudWatch User Guide. Choose a metric that changes proportionally with capacity. The value of the metric should increase or decrease in inverse proportion to the number of capacity units. That is, the value of the metric should decrease when capacity increases. For more information about the CloudWatch terminology below, see Amazon CloudWatch concepts. Each individual service provides information about the metrics, namespace, and dimensions they use. For more information, see Amazon Web Services services that publish CloudWatch metrics in the Amazon CloudWatch User Guide."
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric. To get the exact metric name, namespace, and dimensions, inspect the Metric object that is returned by a call to ListMetrics.
        Namespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: The namespace of the metric.
        Dimensions:
          $ref: "#/components/schemas/MetricDimensions"
          description: "The dimensions of the metric. Conditional: If you published your metric with dimensions, you must specify the same dimensions in your scaling policy."
        Statistic:
          $ref: "#/components/schemas/MetricStatistic"
          description: The statistic of the metric.
        Unit:
          $ref: "#/components/schemas/MetricUnit"
          description: The unit of the metric. For a complete list of the units that CloudWatch supports, see the MetricDatum data type in the Amazon CloudWatch API Reference.
        Period:
          $ref: "#/components/schemas/MetricGranularityInSeconds"
          description: The period of the metric in seconds. The default value is 60. Accepted values are 10, 30, and 60. For high resolution metric, set the value to less than 60. For more information, see Create a target tracking policy using high-resolution metrics for faster response.
        Metrics:
          $ref: "#/components/schemas/TargetTrackingMetricDataQueries"
          description: The metrics to include in the target tracking scaling policy, as a metric data query. This can include both raw metric and metric math expressions.
    MetricName:
      type: string
    MetricNamespace:
      type: string
    MetricDimensions:
      type: array
      items:
        $ref: "#/components/schemas/MetricDimension"
    MetricDimension:
      description: Describes the dimension of a metric.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MetricDimensionName"
          description: The name of the dimension.
        Value:
          $ref: "#/components/schemas/MetricDimensionValue"
          description: The value of the dimension.
      required:
        - Name
        - Value
    MetricDimensionName:
      type: string
    MetricDimensionValue:
      type: string
    MetricStatistic:
      type: string
      enum:
        - Average
        - Minimum
        - Maximum
        - SampleCount
        - Sum
    MetricUnit:
      type: string
    MetricGranularityInSeconds:
      type: integer
      minimum: 1
    TargetTrackingMetricDataQueries:
      type: array
      items:
        $ref: "#/components/schemas/TargetTrackingMetricDataQuery"
    TargetTrackingMetricDataQuery:
      description: The metric data to return. Also defines whether this call is returning data for one metric only, or whether it is performing a math expression on the values of returned metric statistics to create a new time series. A time series is a series of data points, each of which is associated with a timestamp.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/XmlStringMaxLen64"
          description: A short name that identifies the object's results in the response. This name must be unique among all TargetTrackingMetricDataQuery objects specified for a single scaling policy. If you are performing math expressions on this set of data, this name represents that data and can serve as a variable in the mathematical expression. The valid characters are letters, numbers, and underscores. The first character must be a lowercase letter.
        Expression:
          $ref: "#/components/schemas/XmlStringMaxLen2047"
          description: "The math expression to perform on the returned data, if this object is performing a math expression. This expression can use the Id of the other metrics to refer to those metrics, and can also use the Id of other expressions to use the result of those expressions. Conditional: Within each TargetTrackingMetricDataQuery object, you must specify either Expression or MetricStat, but not both."
        MetricStat:
          $ref: "#/components/schemas/TargetTrackingMetricStat"
          description: "Information about the metric data to return. Conditional: Within each TargetTrackingMetricDataQuery object, you must specify either Expression or MetricStat, but not both."
        Label:
          $ref: "#/components/schemas/XmlStringMetricLabel"
          description: A human-readable label for this metric or expression. This is especially useful if this is a math expression, so that you know what the value represents.
        Period:
          $ref: "#/components/schemas/MetricGranularityInSeconds"
          description: The period of the metric in seconds. The default value is 60. Accepted values are 10, 30, and 60. For high resolution metric, set the value to less than 60. For more information, see Create a target tracking policy using high-resolution metrics for faster response.
        ReturnData:
          $ref: "#/components/schemas/ReturnData"
          description: Indicates whether to return the timestamps and raw data values of this metric. If you use any math expressions, specify true for this value for only the final math expression that the metric specification is based on. You must specify false for ReturnData for all the other metrics and expressions used in the metric specification. If you are only retrieving metrics and not performing any math expressions, do not specify anything for ReturnData. This sets it to its default (true).
      required:
        - Id
    XmlStringMaxLen2047:
      type: string
      minLength: 1
      maxLength: 2047
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TargetTrackingMetricStat:
      description: This structure defines the CloudWatch metric to return, along with the statistic and unit. For more information about the CloudWatch terminology below, see Amazon CloudWatch concepts in the Amazon CloudWatch User Guide.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/Metric"
          description: The metric to use.
        Stat:
          $ref: "#/components/schemas/XmlStringMetricStat"
          description: The statistic to return. It can include any CloudWatch statistic or extended statistic. For a list of valid values, see the table in Statistics in the Amazon CloudWatch User Guide. The most commonly used metric for scaling is Average.
        Unit:
          $ref: "#/components/schemas/MetricUnit"
          description: The unit to use for the returned data points. For a complete list of the units that CloudWatch supports, see the MetricDatum data type in the Amazon CloudWatch API Reference.
        Period:
          $ref: "#/components/schemas/MetricGranularityInSeconds"
          description: The period of the metric in seconds. The default value is 60. Accepted values are 10, 30, and 60. For high resolution metric, set the value to less than 60. For more information, see Create a target tracking policy using high-resolution metrics for faster response.
      required:
        - Metric
        - Stat
    Metric:
      description: Represents a specific metric.
      type: object
      properties:
        Namespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: The namespace of the metric. For more information, see the table in Amazon Web Services services that publish CloudWatch metrics in the Amazon CloudWatch User Guide.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric.
        Dimensions:
          $ref: "#/components/schemas/MetricDimensions"
          description: "The dimensions for the metric. For the list of available dimensions, see the Amazon Web Services documentation available from the table in Amazon Web Services services that publish CloudWatch metrics in the Amazon CloudWatch User Guide. Conditional: If you published your metric with dimensions, you must specify the same dimensions in your scaling policy."
      required:
        - Namespace
        - MetricName
    XmlStringMetricStat:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    XmlStringMetricLabel:
      type: string
      maxLength: 2047
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    ReturnData:
      type: boolean
    DisableScaleIn:
      type: boolean
    ScalingPolicyEnabled:
      type: boolean
    PredictiveScalingConfiguration:
      description: Represents a predictive scaling policy configuration to use with Amazon EC2 Auto Scaling.
      type: object
      properties:
        MetricSpecifications:
          $ref: "#/components/schemas/PredictiveScalingMetricSpecifications"
          description: This structure includes the metrics and target utilization to use for predictive scaling. This is an array, but we currently only support a single metric specification. That is, you can specify a target value and a single metric pair, or a target value and one scaling metric and one load metric.
        Mode:
          $ref: "#/components/schemas/PredictiveScalingMode"
          description: The predictive scaling mode. Defaults to ForecastOnly if not specified.
        SchedulingBufferTime:
          $ref: "#/components/schemas/PredictiveScalingSchedulingBufferTime"
          description: The amount of time, in seconds, by which the instance launch time can be advanced. For example, the forecast says to add capacity at 10:00 AM, and you choose to pre-launch instances by 5 minutes. In that case, the instances will be launched at 9:55 AM. The intention is to give resources time to be provisioned. It can take a few minutes to launch an EC2 instance. The actual amount of time required depends on several factors, such as the size of the instance and whether there are startup scripts to complete. The value must be less than the forecast interval duration of 3600 seconds (60 minutes). Defaults to 300 seconds if not specified.
        MaxCapacityBreachBehavior:
          $ref: "#/components/schemas/PredictiveScalingMaxCapacityBreachBehavior"
          description: "Defines the behavior that should be applied if the forecast capacity approaches or exceeds the maximum capacity of the Auto Scaling group. Defaults to HonorMaxCapacity if not specified. The following are possible values: HonorMaxCapacity - Amazon EC2 Auto Scaling can't increase the maximum capacity of the group when the forecast capacity is close to or exceeds the maximum capacity. IncreaseMaxCapacity - Amazon EC2 Auto Scaling can increase the maximum capacity of the group when the forecast capacity is close to or exceeds the maximum capacity. The upper limit is determined by the forecasted capacity and the value for MaxCapacityBuffer. Use caution when allowing the maximum capacity to be automatically increased. This can lead to more instances being launched than intended if the increased maximum capacity is not monitored and managed. The increased maximum capacity then becomes the new normal maximum capacity for the Auto Scaling group until you manually update it. The maximum capacity does not automatically decrease back to the original maximum."
        MaxCapacityBuffer:
          $ref: "#/components/schemas/PredictiveScalingMaxCapacityBuffer"
          description: The size of the capacity buffer to use when the forecast capacity is close to or exceeds the maximum capacity. The value is specified as a percentage relative to the forecast capacity. For example, if the buffer is 10, this means a 10 percent buffer, such that if the forecast capacity is 50, and the maximum capacity is 40, then the effective maximum capacity is 55. If set to 0, Amazon EC2 Auto Scaling may scale capacity higher than the maximum capacity to equal but not exceed forecast capacity. Required if the MaxCapacityBreachBehavior property is set to IncreaseMaxCapacity, and cannot be used otherwise.
      required:
        - MetricSpecifications
    PredictiveScalingMetricSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/PredictiveScalingMetricSpecification"
    PredictiveScalingMetricSpecification:
      description: This structure specifies the metrics and target utilization settings for a predictive scaling policy. You must specify either a metric pair, or a load metric and a scaling metric individually. Specifying a metric pair instead of individual metrics provides a simpler way to configure metrics for a scaling policy. You choose the metric pair, and the policy automatically knows the correct sum and average statistics to use for the load metric and the scaling metric. Example You create a predictive scaling policy and specify ALBRequestCount as the value for the metric pair and 1000.0 as the target value. For this type of metric, you must provide the metric dimension for the corresponding target group, so you also provide a resource label for the Application Load Balancer target group that is attached to your Auto Scaling group. The number of requests the target group receives per minute provides the load metric, and the request count averaged between the members of the target group provides the scaling metric. In CloudWatch, this refers to the RequestCount and RequestCountPerTarget metrics, respectively. For optimal use of predictive scaling, you adhere to the best practice of using a dynamic scaling policy to automatically scale between the minimum capacity and maximum capacity in response to real-time changes in resource utilization. Amazon EC2 Auto Scaling consumes data points for the load metric over the last 14 days and creates an hourly load forecast for predictive scaling. (A minimum of 24 hours of data is required.) After creating the load forecast, Amazon EC2 Auto Scaling determines when to reduce or increase the capacity of your Auto Scaling group in each hour of the forecast period so that the average number of requests received by each instance is as close to 1000 requests per minute as possible at all times. For information about using custom metrics with predictive scaling, see Advanced predictive scaling policy configurations using custom metrics in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        TargetValue:
          $ref: "#/components/schemas/MetricScale"
          description: Specifies the target utilization. Some metrics are based on a count instead of a percentage, such as the request count for an Application Load Balancer or the number of messages in an SQS queue. If the scaling policy specifies one of these metrics, specify the target utilization as the optimal average request or message count per instance during any one-minute interval.
        PredefinedMetricPairSpecification:
          $ref: "#/components/schemas/PredictiveScalingPredefinedMetricPair"
          description: The predefined metric pair specification from which Amazon EC2 Auto Scaling determines the appropriate scaling metric and load metric to use.
        PredefinedScalingMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingPredefinedScalingMetric"
          description: The predefined scaling metric specification.
        PredefinedLoadMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingPredefinedLoadMetric"
          description: The predefined load metric specification.
        CustomizedScalingMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingCustomizedScalingMetric"
          description: The customized scaling metric specification.
        CustomizedLoadMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingCustomizedLoadMetric"
          description: The customized load metric specification.
        CustomizedCapacityMetricSpecification:
          $ref: "#/components/schemas/PredictiveScalingCustomizedCapacityMetric"
          description: The customized capacity metric specification.
      required:
        - TargetValue
    PredictiveScalingPredefinedMetricPair:
      description: Represents a metric pair for a predictive scaling policy.
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/PredefinedMetricPairType"
          description: "Indicates which metrics to use. There are two different types of metrics for each metric type: one is a load metric and one is a scaling metric. For example, if the metric type is ASGCPUUtilization, the Auto Scaling group's total CPU metric is used as the load metric, and the average CPU metric is used for the scaling metric."
        ResourceLabel:
          $ref: "#/components/schemas/XmlStringMaxLen1023"
          description: "A label that uniquely identifies a specific Application Load Balancer target group from which to determine the total and average request count served by your Auto Scaling group. You can't specify a resource label unless the target group is attached to the Auto Scaling group. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format of the resource label is: app/my-alb/778d41231b141a0f/targetgroup/my-alb-target-group/943f017f100becff. Where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
        - PredefinedMetricType
    PredefinedMetricPairType:
      type: string
      enum:
        - ASGCPUUtilization
        - ASGNetworkIn
        - ASGNetworkOut
        - ALBRequestCount
    PredictiveScalingPredefinedScalingMetric:
      description: Describes a scaling metric for a predictive scaling policy. When returned in the output of DescribePolicies, it indicates that a predictive scaling policy uses individually specified load and scaling metrics instead of a metric pair.
      type: object
      properties:
        PredefinedMetricType:
          $ref: "#/components/schemas/PredefinedScalingMetricType"
          description: The metric type.
        ResourceLabel:
          $ref: "#/components/schemas/XmlStringMaxLen1023"
          description: "A label that uniquely identifies a specific Application Load Balancer target group from which to determine the average request count served by your Auto Scaling group. You can't specify a resource label unless the target group is attached to the Auto Scaling group. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format of the resource label is: app/my-alb/778d41231b141a0f/targetgroup/my-alb-target-group/943f017f100becff. Where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
