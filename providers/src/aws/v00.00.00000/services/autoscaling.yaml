          description: The subnet IDs for the instance launch. Either AvailabilityZones or SubnetIds must be specified. If both are specified, the subnets must reside in the specified Availability Zones.
          schema:
            $ref: "#/components/schemas/SubnetIdsLimit1"
        - name: RetryStrategy
