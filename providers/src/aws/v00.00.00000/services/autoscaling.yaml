          description: The maximum size of the Auto Scaling group.
        DesiredCapacity:
          type: integer
          description: The desired size of the Auto Scaling group.
        PredictedCapacity:
          type: integer
          description: The predicted capacity of the group when it has a predictive scaling policy.
        DefaultCooldown:
          type: integer
          description: The duration of the default cooldown period, in seconds, for the Auto Scaling group.
        AvailabilityZones:
          type: string
          description: One or more Availability Zones for the Auto Scaling group.
        AvailabilityZoneIds:
          type: string
