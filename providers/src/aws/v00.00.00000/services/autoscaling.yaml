          description: The name of the Auto Scaling group to launch instances into.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: RequestedCapacity
          in: query
          required: true
          description: The number of instances to launch. Although this value can exceed 100 for instance weights, the actual instance count is limited to 100 instances per launch.
          schema:
            $ref: "#/components/schemas/RequestedCapacity"
        - name: ClientToken
          in: query
