    PredefinedScalingMetricType:
      type: string
      enum:
        - ASGAverageCPUUtilization
        - ASGAverageNetworkIn
        - ASGAverageNetworkOut
        - ALBRequestCountPerTarget
    PredictiveScalingPredefinedLoadMetric:
      description: Describes a load metric for a predictive scaling policy. When returned in the output of DescribePolicies, it indicates that a predictive scaling policy uses individually specified load and scaling metrics instead of a metric pair.
