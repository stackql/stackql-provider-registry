          description: One or more load balancers associated with the group.
        TargetGroupARNs:
          type: string
          description: The Amazon Resource Names (ARN) of the target groups for your load balancer.
        HealthCheckType:
          type: string
          description: One or more comma-separated health check types for the Auto Scaling group.
        HealthCheckGracePeriod:
          type: integer
          description: The duration of the health check grace period, in seconds, for the Auto Scaling group.
        Instances:
          type: string
          description: The EC2 instances associated with the Auto Scaling group.
        CreatedTime:
          type: string
          description: The date and time the Auto Scaling group was created.
        SuspendedProcesses:
          type: string
          description: The suspended processes associated with the Auto Scaling group.
        PlacementGroup:
          type: string
          description: The name of the placement group into which to launch EC2 instances for the Auto Scaling group.
        VPCZoneIdentifier:
          type: string
          description: One or more comma-separated subnet IDs for the Auto Scaling group.
        EnabledMetrics:
          type: string
          description: The metrics enabled for the Auto Scaling group.
        Status:
