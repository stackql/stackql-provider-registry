      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_GetPredictiveScalingForecast
      description: Retrieves the forecast data for a predictive scaling policy. Load forecasts are predictions of the hourly load values using historical load data from CloudWatch and an analysis of historical trends. Capacity forecasts are represented as predicted values for the minimum capacity that is needed on an hourly basis, based on the hourly load forecast. A minimum of 24 hours of data is required to create the initial forecasts. However, having a full 14 days of historical data results in more accurate forecasts. For more information, see Predictive scaling for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide.
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: PolicyName
          in: query
          required: true
          description: The name of the policy.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: StartTime
          in: query
          required: true
          description: The inclusive start time of the time range for the forecast data to get. At most, the date and time can be one year before the current date and time.
          schema:
            $ref: "#/components/schemas/TimestampType"
        - name: EndTime
          in: query
          required: true
          description: The exclusive end time of the time range for the forecast data to get. The maximum time duration between the start and end time is 30 days. Although this parameter can accept a date and time that is more than two days in the future, the availability of forecast data has limits. Amazon EC2 Auto Scaling only issues forecasts for periods of two days in advance.
          schema:
            $ref: "#/components/schemas/TimestampType"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/GetPredictiveScalingForecastOutputDisplay"
    post:
      operationId: POST_GetPredictiveScalingForecast
      description: Retrieves the forecast data for a predictive scaling policy. Load forecasts are predictions of the hourly load values using historical load data from CloudWatch and an analysis of historical trends. Capacity forecasts are represented as predicted values for the minimum capacity that is needed on an hourly basis, based on the hourly load forecast. A minimum of 24 hours of data is required to create the initial forecasts. However, having a full 14 days of historical data results in more accurate forecasts. For more information, see Predictive scaling for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/GetPredictiveScalingForecastOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/GetPredictiveScalingForecastType"
  /?Action=LaunchInstances&Version=2011-01-01:
