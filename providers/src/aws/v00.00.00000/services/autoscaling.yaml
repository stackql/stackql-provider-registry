        MetricDataQueries:
          $ref: "#/components/schemas/MetricDataQueries"
          description: One or more metric data queries to provide the data points for a load metric. Use multiple metric data queries only if you are performing a math expression on returned data.
      required:
        - MetricDataQueries
    PredictiveScalingCustomizedCapacityMetric:
      description: Describes a customized capacity metric for a predictive scaling policy.
      type: object
      properties:
        MetricDataQueries:
          $ref: "#/components/schemas/MetricDataQueries"
          description: One or more metric data queries to provide the data points for a capacity metric. Use multiple metric data queries only if you are performing a math expression on returned data.
      required:
        - MetricDataQueries
    PredictiveScalingMode:
      type: string
      enum:
        - ForecastAndScale
        - ForecastOnly
    PredictiveScalingSchedulingBufferTime:
      type: integer
      minimum: 0
    PredictiveScalingMaxCapacityBreachBehavior:
      type: string
      enum:
        - HonorMaxCapacity
        - IncreaseMaxCapacity
    PredictiveScalingMaxCapacityBuffer:
      type: integer
      minimum: 0
      maximum: 100
    PolicyARNTypeDisplay:
      type: object
      properties:
        PolicyARN:
          type: string
          description: The Amazon Resource Name (ARN) of the policy.
        Alarms:
          type: string
          description: The CloudWatch alarms created for the target tracking scaling policy.
    PutScalingPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/PolicyARNTypeDisplay"
    PutScalingPolicyType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        PolicyName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the policy.
        PolicyType:
          $ref: "#/components/schemas/XmlStringMaxLen64"
          description: "One of the following policy types: TargetTrackingScaling StepScaling SimpleScaling (default) PredictiveScaling"
        AdjustmentType:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: Specifies how the scaling adjustment is interpreted (for example, an absolute number or a percentage). The valid values are ChangeInCapacity, ExactCapacity, and PercentChangeInCapacity. Required if the policy type is StepScaling or SimpleScaling. For more information, see Scaling adjustment types in the Amazon EC2 Auto Scaling User Guide.
        MinAdjustmentStep:
          $ref: "#/components/schemas/MinAdjustmentStep"
          description: Available for backward compatibility. Use MinAdjustmentMagnitude instead.
        MinAdjustmentMagnitude:
          $ref: "#/components/schemas/MinAdjustmentMagnitude"
          description: The minimum value to scale by when the adjustment type is PercentChangeInCapacity. For example, suppose that you create a step scaling policy to scale out an Auto Scaling group by 25 percent and you specify a MinAdjustmentMagnitude of 2. If the group has 4 instances and the scaling policy is performed, 25 percent of 4 is 1. However, because you specified a MinAdjustmentMagnitude of 2, Amazon EC2 Auto Scaling scales out the group by 2 instances. Valid only if the policy type is StepScaling or SimpleScaling. For more information, see Scaling adjustment types in the Amazon EC2 Auto Scaling User Guide. Some Auto Scaling groups use instance weights. In this case, set the MinAdjustmentMagnitude to a value that is at least as large as your largest instance weight.
        ScalingAdjustment:
          $ref: "#/components/schemas/PolicyIncrement"
          description: The amount by which to scale, based on the specified adjustment type. A positive value adds to the current capacity while a negative number removes from the current capacity. For exact capacity, you must specify a non-negative value. Required if the policy type is SimpleScaling. (Not used with any other policy type.)
        Cooldown:
          $ref: "#/components/schemas/Cooldown"
          description: "A cooldown period, in seconds, that applies to a specific simple scaling policy. When a cooldown period is specified here, it overrides the default cooldown. Valid only if the policy type is SimpleScaling. For more information, see Scaling cooldowns for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Default: None"
        MetricAggregationType:
          $ref: "#/components/schemas/XmlStringMaxLen32"
          description: The aggregation type for the CloudWatch metrics. The valid values are Minimum, Maximum, and Average. If the aggregation type is null, the value is treated as Average. Valid only if the policy type is StepScaling.
        StepAdjustments:
          $ref: "#/components/schemas/StepAdjustments"
          description: A set of adjustments that enable you to scale based on the size of the alarm breach. Required if the policy type is StepScaling. (Not used with any other policy type.)
        EstimatedInstanceWarmup:
          $ref: "#/components/schemas/EstimatedInstanceWarmup"
          description: Not needed if the default instance warmup is defined for the group. The estimated time, in seconds, until a newly launched instance can contribute to the CloudWatch metrics. This warm-up period applies to instances launched due to a specific target tracking or step scaling policy. When a warm-up period is specified here, it overrides the default instance warmup. Valid only if the policy type is TargetTrackingScaling or StepScaling. The default is to use the value for the default instance warmup defined for the group. If default instance warmup is null, then EstimatedInstanceWarmup falls back to the value of default cooldown.
        TargetTrackingConfiguration:
          $ref: "#/components/schemas/TargetTrackingConfiguration"
          description: "A target tracking scaling policy. Provides support for predefined or custom metrics. The following predefined metrics are available: ASGAverageCPUUtilization ASGAverageNetworkIn ASGAverageNetworkOut ALBRequestCountPerTarget If you specify ALBRequestCountPerTarget for the metric, you must specify the ResourceLabel property with the PredefinedMetricSpecification. For more information, see TargetTrackingConfiguration in the Amazon EC2 Auto Scaling API Reference. Required if the policy type is TargetTrackingScaling."
        Enabled:
          $ref: "#/components/schemas/ScalingPolicyEnabled"
          description: Indicates whether the scaling policy is enabled or disabled. The default is enabled. For more information, see Disable a scaling policy for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
        PredictiveScalingConfiguration:
          $ref: "#/components/schemas/PredictiveScalingConfiguration"
          description: A predictive scaling policy. Provides support for predefined and custom metrics. Predefined metrics include CPU utilization, network in/out, and the Application Load Balancer request count. For more information, see PredictiveScalingConfiguration in the Amazon EC2 Auto Scaling API Reference. Required if the policy type is PredictiveScaling.
      required:
        - AutoScalingGroupName
        - PolicyName
    PutScheduledUpdateGroupActionType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        ScheduledActionName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of this scaling action.
        Time:
          $ref: "#/components/schemas/TimestampType"
          description: This property is no longer used.
        StartTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time for this action to start, in YYYY-MM-DDThh:mm:ssZ format in UTC/GMT only and in quotes (for example, "2021-06-01T00:00:00Z"). If you specify Recurrence and StartTime, Amazon EC2 Auto Scaling performs the action at this time, and then performs the action based on the specified recurrence.
        EndTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time for the recurring schedule to end, in UTC. For example, "2021-06-01T00:00:00Z".
        Recurrence:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: 'The recurring schedule for this action. This format consists of five fields separated by white spaces: [Minute] [Hour] [Day_of_Month] [Month_of_Year] [Day_of_Week]. The value must be in quotes (for example, "30 0 1 1,6,12 *"). For more information about this format, see Crontab. When StartTime and EndTime are specified with Recurrence, they form the boundaries of when the recurring action starts and stops. Cron expressions use Universal Coordinated Time (UTC) by default.'
        MinSize:
          $ref: "#/components/schemas/AutoScalingGroupMinSize"
          description: The minimum size of the Auto Scaling group.
        MaxSize:
          $ref: "#/components/schemas/AutoScalingGroupMaxSize"
          description: The maximum size of the Auto Scaling group.
        DesiredCapacity:
          $ref: "#/components/schemas/AutoScalingGroupDesiredCapacity"
          description: "The desired capacity is the initial capacity of the Auto Scaling group after the scheduled action runs and the capacity it attempts to maintain. It can scale beyond this capacity if you add more scaling conditions. You must specify at least one of the following properties: MaxSize, MinSize, or DesiredCapacity."
        TimeZone:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: Specifies the time zone for a cron expression. If a time zone is not provided, UTC is used by default. Valid values are the canonical names of the IANA time zones, derived from the IANA Time Zone Database (such as Etc/GMT+9 or Pacific/Tahiti). For more information, see https://en.wikipedia.org/wiki/List_of_tz_database_time_zones.
      required:
        - AutoScalingGroupName
        - ScheduledActionName
    MaxGroupPreparedCapacity:
      type: integer
      minimum: -1
    WarmPoolMinSize:
      type: integer
      minimum: 0
    WarmPoolState:
      type: string
      enum:
        - Stopped
        - Running
        - Hibernated
    InstanceReusePolicy:
      description: Describes an instance reuse policy for a warm pool. For more information, see Warm pools for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        ReuseOnScaleIn:
          $ref: "#/components/schemas/ReuseOnScaleIn"
          description: Specifies whether instances in the Auto Scaling group can be returned to the warm pool on scale in.
    ReuseOnScaleIn:
      type: boolean
    PutWarmPoolAnswerDisplay:
      type: object
      properties: {}
    PutWarmPoolOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/PutWarmPoolAnswerDisplay"
    PutWarmPoolType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        MaxGroupPreparedCapacity:
          $ref: "#/components/schemas/MaxGroupPreparedCapacity"
          description: Specifies the maximum number of instances that are allowed to be in the warm pool or in any state except Terminated for the Auto Scaling group. This is an optional property. Specify it only if you do not want the warm pool size to be determined by the difference between the group's maximum capacity and its desired capacity. If a value for MaxGroupPreparedCapacity is not specified, Amazon EC2 Auto Scaling launches and maintains the difference between the group's maximum capacity and its desired capacity. If you specify a value for MaxGroupPreparedCapacity, Amazon EC2 Auto Scaling uses the difference between the MaxGroupPreparedCapacity and the desired capacity instead. The size of the warm pool is dynamic. Only when MaxGroupPreparedCapacity and MinSize are set to the same value does the warm pool have an absolute size. If the desired capacity of the Auto Scaling group is higher than the MaxGroupPreparedCapacity, the capacity of the warm pool is 0, unless you specify a value for MinSize. To remove a value that you previously set, include the property but specify -1 for the value.
        MinSize:
          $ref: "#/components/schemas/WarmPoolMinSize"
          description: Specifies the minimum number of instances to maintain in the warm pool. This helps you to ensure that there is always a certain number of warmed instances available to handle traffic spikes. Defaults to 0 if not specified.
        PoolState:
          $ref: "#/components/schemas/WarmPoolState"
          description: Sets the instance state to transition to after the lifecycle actions are complete. Default is Stopped.
        InstanceReusePolicy:
          $ref: "#/components/schemas/InstanceReusePolicy"
          description: Indicates whether instances in the Auto Scaling group can be returned to the warm pool on scale in. The default is to terminate instances in the Auto Scaling group when the group scales in.
      required:
        - AutoScalingGroupName
    RecordLifecycleActionHeartbeatAnswerDisplay:
      type: object
      properties: {}
    RecordLifecycleActionHeartbeatOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/RecordLifecycleActionHeartbeatAnswerDisplay"
    RecordLifecycleActionHeartbeatType:
      type: object
      properties:
        LifecycleHookName:
          $ref: "#/components/schemas/AsciiStringMaxLen255"
          description: The name of the lifecycle hook.
        AutoScalingGroupName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Auto Scaling group.
        LifecycleActionToken:
          $ref: "#/components/schemas/LifecycleActionToken"
          description: A token that uniquely identifies a specific lifecycle action associated with an instance. Amazon EC2 Auto Scaling sends this token to the notification target that you specified when you created the lifecycle hook.
        InstanceId:
          $ref: "#/components/schemas/XmlStringMaxLen19"
          description: The ID of the instance.
      required:
        - LifecycleHookName
        - AutoScalingGroupName
    ProcessNames:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen255"
    ScalingProcessQuery:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        ScalingProcesses:
          $ref: "#/components/schemas/ProcessNames"
          description: "One or more of the following processes: Launch Terminate AddToLoadBalancer AlarmNotification AZRebalance HealthCheck InstanceRefresh ReplaceUnhealthy ScheduledActions If you omit this property, all processes are specified."
      required:
        - AutoScalingGroupName
    RollbackInstanceRefreshAnswerDisplay:
      type: object
      properties:
        InstanceRefreshId:
          type: string
          description: The instance refresh ID associated with the request. This is the unique ID assigned to the instance refresh when it was started.
    RollbackInstanceRefreshOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/RollbackInstanceRefreshAnswerDisplay"
    RollbackInstanceRefreshType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
      required:
        - AutoScalingGroupName
    SetDesiredCapacityType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        DesiredCapacity:
          $ref: "#/components/schemas/AutoScalingGroupDesiredCapacity"
          description: The desired capacity is the initial capacity of the Auto Scaling group after this operation completes and the capacity it attempts to maintain.
        HonorCooldown:
          $ref: "#/components/schemas/HonorCooldown"
          description: Indicates whether Amazon EC2 Auto Scaling waits for the cooldown period to complete before initiating a scaling activity to set your Auto Scaling group to its new capacity. By default, Amazon EC2 Auto Scaling does not honor the cooldown period during manual scaling activities.
      required:
        - AutoScalingGroupName
        - DesiredCapacity
    ShouldRespectGracePeriod:
      type: boolean
    SetInstanceHealthQuery:
      type: object
      properties:
        InstanceId:
          $ref: "#/components/schemas/XmlStringMaxLen19"
          description: The ID of the instance.
        HealthStatus:
          $ref: "#/components/schemas/XmlStringMaxLen32"
          description: The health status of the instance. Set to Healthy to have the instance remain in service. Set to Unhealthy to have the instance be out of service. Amazon EC2 Auto Scaling terminates and replaces the unhealthy instance.
        ShouldRespectGracePeriod:
          $ref: "#/components/schemas/ShouldRespectGracePeriod"
          description: If the Auto Scaling group of the specified instance has a HealthCheckGracePeriod specified for the group, by default, this call respects the grace period. Set this to False, to have the call not respect the grace period associated with the group. For more information about the health check grace period, see Set the health check grace period for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
      required:
        - InstanceId
        - HealthStatus
    ProtectedFromScaleIn:
      type: boolean
    SetInstanceProtectionAnswerDisplay:
      type: object
      properties: {}
    SetInstanceProtectionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/SetInstanceProtectionAnswerDisplay"
    SetInstanceProtectionQuery:
      type: object
      properties:
        InstanceIds:
          $ref: "#/components/schemas/InstanceIds"
          description: One or more instance IDs. You can specify up to 50 instances.
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        ProtectedFromScaleIn:
          $ref: "#/components/schemas/ProtectedFromScaleIn"
          description: Indicates whether the instance is protected from termination by Amazon EC2 Auto Scaling when scaling in.
      required:
        - InstanceIds
        - AutoScalingGroupName
        - ProtectedFromScaleIn
    RefreshStrategy:
      type: string
      enum:
        - Rolling
        - ReplaceRootVolume
    DesiredConfiguration:
      description: Describes the desired configuration for an instance refresh. If you specify a desired configuration, you must specify either a LaunchTemplate or a MixedInstancesPolicy.
      type: object
      properties:
        LaunchTemplate:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: Describes the launch template and the version of the launch template that Amazon EC2 Auto Scaling uses to launch Amazon EC2 instances. For more information about launch templates, see Launch templates in the Amazon EC2 Auto Scaling User Guide.
        MixedInstancesPolicy:
          $ref: "#/components/schemas/MixedInstancesPolicy"
          description: Use this structure to launch multiple instance types and On-Demand Instances and Spot Instances within a single Auto Scaling group. A mixed instances policy contains information that Amazon EC2 Auto Scaling can use to launch instances and help optimize your costs. For more information, see Auto Scaling groups with multiple instance types and purchase options in the Amazon EC2 Auto Scaling User Guide.
    RefreshPreferences:
      description: Describes the preferences for an instance refresh.
      type: object
      properties:
        MinHealthyPercentage:
          $ref: "#/components/schemas/IntPercent"
          description: Specifies the minimum percentage of the group to keep in service, healthy, and ready to use to support your workload to allow the operation to continue. The value is expressed as a percentage of the desired capacity of the Auto Scaling group. Value range is 0 to 100. If you do not specify this property, the default is 90 percent, or the percentage set in the instance maintenance policy for the Auto Scaling group, if defined.
        InstanceWarmup:
          $ref: "#/components/schemas/RefreshInstanceWarmup"
          description: A time period, in seconds, during which an instance refresh waits before moving on to replacing the next instance after a new instance enters the InService state. This property is not required for normal usage. Instead, use the DefaultInstanceWarmup property of the Auto Scaling group. The InstanceWarmup and DefaultInstanceWarmup properties work the same way. Only specify this property if you must override the DefaultInstanceWarmup property. If you do not specify this property, the instance warmup by default is the value of the DefaultInstanceWarmup property, if defined (which is recommended in all cases), or the HealthCheckGracePeriod property otherwise.
        CheckpointPercentages:
          $ref: "#/components/schemas/CheckpointPercentages"
          description: (Optional) Threshold values for each checkpoint in ascending order. Each number must be unique. To replace all instances in the Auto Scaling group, the last number in the array must be 100. For usage examples, see Add checkpoints to an instance refresh in the Amazon EC2 Auto Scaling User Guide.
        CheckpointDelay:
          $ref: "#/components/schemas/CheckpointDelay"
          description: (Optional) The amount of time, in seconds, to wait after a checkpoint before continuing. This property is optional, but if you specify a value for it, you must also specify a value for CheckpointPercentages. If you specify a value for CheckpointPercentages and not for CheckpointDelay, the CheckpointDelay defaults to 3600 (1 hour).
        SkipMatching:
          $ref: "#/components/schemas/SkipMatching"
          description: (Optional) Indicates whether skip matching is enabled. If enabled (true), then Amazon EC2 Auto Scaling skips replacing instances that match the desired configuration. If no desired configuration is specified, then it skips replacing instances that have the same launch template and instance types that the Auto Scaling group was using before the start of the instance refresh. The default is false. For more information, see Use an instance refresh with skip matching in the Amazon EC2 Auto Scaling User Guide.
        AutoRollback:
          $ref: "#/components/schemas/AutoRollback"
          description: "(Optional) Indicates whether to roll back the Auto Scaling group to its previous configuration if the instance refresh fails or a CloudWatch alarm threshold is met. The default is false. A rollback is not supported in the following situations: There is no desired configuration specified for the instance refresh. The Auto Scaling group has a launch template that uses an Amazon Web Services Systems Manager parameter instead of an AMI ID for the ImageId property. The Auto Scaling group uses the launch template's $Latest or $Default version. For more information, see Undo changes with a rollback in the Amazon EC2 Auto Scaling User Guide."
        ScaleInProtectedInstances:
          $ref: "#/components/schemas/ScaleInProtectedInstances"
          description: "Choose the behavior that you want Amazon EC2 Auto Scaling to use if instances protected from scale in are found. The following lists the valid values: Refresh Amazon EC2 Auto Scaling replaces instances that are protected from scale in. Ignore Amazon EC2 Auto Scaling ignores instances that are protected from scale in and continues to replace instances that are not protected. Wait (default) Amazon EC2 Auto Scaling waits one hour for you to remove scale-in protection. Otherwise, the instance refresh will fail."
        StandbyInstances:
          $ref: "#/components/schemas/StandbyInstances"
          description: "Choose the behavior that you want Amazon EC2 Auto Scaling to use if instances in Standby state are found. The following lists the valid values: Terminate Amazon EC2 Auto Scaling terminates instances that are in Standby. Ignore Amazon EC2 Auto Scaling ignores instances that are in Standby and continues to replace instances that are in the InService state. Wait (default) Amazon EC2 Auto Scaling waits one hour for you to return the instances to service. Otherwise, the instance refresh will fail."
        AlarmSpecification:
          $ref: "#/components/schemas/AlarmSpecification"
          description: (Optional) The CloudWatch alarm specification. CloudWatch alarms can be used to identify any issues and fail the operation if an alarm threshold is met.
        MaxHealthyPercentage:
          $ref: "#/components/schemas/IntPercent100To200"
          description: Specifies the maximum percentage of the group that can be in service and healthy, or pending, to support your workload when replacing instances. The value is expressed as a percentage of the desired capacity of the Auto Scaling group. Value range is 100 to 200. If you specify MaxHealthyPercentage, you must also specify MinHealthyPercentage, and the difference between them cannot be greater than 100. A larger range increases the number of instances that can be replaced at the same time. If you do not specify this property, the default is 100 percent, or the percentage set in the instance maintenance policy for the Auto Scaling group, if defined.
        BakeTime:
          $ref: "#/components/schemas/BakeTime"
          description: The amount of time, in seconds, to wait at the end of an instance refresh before the instance refresh is considered complete.
    IntPercent:
      type: integer
      minimum: 0
      maximum: 100
    RefreshInstanceWarmup:
      type: integer
      minimum: 0
    CheckpointPercentages:
      type: array
      items:
        $ref: "#/components/schemas/NonZeroIntPercent"
    NonZeroIntPercent:
      type: integer
      minimum: 1
      maximum: 100
    CheckpointDelay:
      type: integer
      minimum: 0
      maximum: 172800
    SkipMatching:
      type: boolean
    AutoRollback:
      type: boolean
    ScaleInProtectedInstances:
      type: string
      enum:
        - Refresh
        - Ignore
        - Wait
    StandbyInstances:
      type: string
      enum:
        - Terminate
        - Ignore
        - Wait
    AlarmSpecification:
      description: Specifies the CloudWatch alarm specification to use in an instance refresh.
      type: object
      properties:
        Alarms:
          $ref: "#/components/schemas/AlarmList"
          description: The names of one or more CloudWatch alarms to monitor for the instance refresh. You can specify up to 10 alarms.
    AlarmList:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen255"
    IntPercent100To200:
      type: integer
      minimum: 100
      maximum: 200
    BakeTime:
      type: integer
      minimum: 0
      maximum: 172800
    StartInstanceRefreshAnswerDisplay:
      type: object
      properties:
        InstanceRefreshId:
          type: string
          description: A unique ID for tracking the progress of the instance refresh.
    StartInstanceRefreshOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/StartInstanceRefreshAnswerDisplay"
    StartInstanceRefreshType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        Strategy:
          $ref: "#/components/schemas/RefreshStrategy"
          description: The strategy to use for the instance refresh. The default value is Rolling.
        DesiredConfiguration:
          $ref: "#/components/schemas/DesiredConfiguration"
          description: The desired configuration. For example, the desired configuration can specify a new launch template or a new version of the current launch template. Once the instance refresh succeeds, Amazon EC2 Auto Scaling updates the settings of the Auto Scaling group to reflect the new desired configuration. When you specify a new launch template or a new version of the current launch template for your desired configuration, consider enabling the SkipMatching property in preferences. If it's enabled, Amazon EC2 Auto Scaling skips replacing instances that already use the specified launch template and instance types. This can help you reduce the number of replacements that are required to apply updates.
        Preferences:
          $ref: "#/components/schemas/RefreshPreferences"
          description: "Sets your preferences for the instance refresh so that it performs as expected when you start it. Includes the instance warmup time, the minimum and maximum healthy percentages, and the behaviors that you want Amazon EC2 Auto Scaling to use if instances that are in Standby state or protected from scale in are found. You can also choose to enable additional features, such as the following: Auto rollback Checkpoints CloudWatch alarms Skip matching Bake time"
      required:
        - AutoScalingGroupName
    TerminateInstanceInAutoScalingGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityDisplay"
    TerminateInstanceInAutoScalingGroupType:
      type: object
      properties:
        InstanceId:
          $ref: "#/components/schemas/XmlStringMaxLen19"
          description: The ID of the instance.
        ShouldDecrementDesiredCapacity:
          $ref: "#/components/schemas/ShouldDecrementDesiredCapacity"
          description: Indicates whether terminating the instance also decrements the size of the Auto Scaling group.
      required:
        - InstanceId
        - ShouldDecrementDesiredCapacity
    UpdatePlacementGroupParam:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    UpdateAutoScalingGroupType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        LaunchConfigurationName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the launch configuration. If you specify LaunchConfigurationName in your update request, you can't specify LaunchTemplate or MixedInstancesPolicy.
        LaunchTemplate:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: The launch template and version to use to specify the updates. If you specify LaunchTemplate in your update request, you can't specify LaunchConfigurationName or MixedInstancesPolicy.
        MixedInstancesPolicy:
          $ref: "#/components/schemas/MixedInstancesPolicy"
          description: The mixed instances policy. For more information, see Auto Scaling groups with multiple instance types and purchase options in the Amazon EC2 Auto Scaling User Guide.
        MinSize:
          $ref: "#/components/schemas/AutoScalingGroupMinSize"
          description: The minimum size of the Auto Scaling group.
        MaxSize:
          $ref: "#/components/schemas/AutoScalingGroupMaxSize"
          description: The maximum size of the Auto Scaling group. With a mixed instances policy that uses instance weighting, Amazon EC2 Auto Scaling may need to go above MaxSize to meet your capacity requirements. In this event, Amazon EC2 Auto Scaling will never go above MaxSize by more than your largest instance weight (weights that define how many units each instance contributes to the desired capacity of the group).
        DesiredCapacity:
          $ref: "#/components/schemas/AutoScalingGroupDesiredCapacity"
          description: The desired capacity is the initial capacity of the Auto Scaling group after this operation completes and the capacity it attempts to maintain. This number must be greater than or equal to the minimum size of the group and less than or equal to the maximum size of the group.
        DefaultCooldown:
          $ref: "#/components/schemas/Cooldown"
          description: Only needed if you use simple scaling policies. The amount of time, in seconds, between one scaling activity ending and another one starting due to simple scaling policies. For more information, see Scaling cooldowns for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide.
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: One or more Availability Zones for the group.
        AvailabilityZoneIds:
          $ref: "#/components/schemas/AvailabilityZoneIds"
          description: A list of Availability Zone IDs for the Auto Scaling group. You cannot specify both AvailabilityZones and AvailabilityZoneIds in the same request.
        HealthCheckType:
          $ref: "#/components/schemas/XmlStringMaxLen32"
          description: A comma-separated value string of one or more health check types. The valid values are EC2, EBS, ELB, and VPC_LATTICE. EC2 is the default health check and cannot be disabled. For more information, see Health checks for instances in an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. Only specify EC2 if you must clear a value that was previously set.
        HealthCheckGracePeriod:
          $ref: "#/components/schemas/HealthCheckGracePeriod"
          description: The amount of time, in seconds, that Amazon EC2 Auto Scaling waits before checking the health status of an EC2 instance that has come into service and marking it unhealthy due to a failed health check. This is useful if your instances do not immediately pass their health checks after they enter the InService state. For more information, see Set the health check grace period for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
        PlacementGroup:
          $ref: "#/components/schemas/UpdatePlacementGroupParam"
          description: The name of an existing placement group into which to launch your instances. To remove the placement group setting, pass an empty string for placement-group. For more information about placement groups, see Placement groups in the Amazon EC2 User Guide. A cluster placement group is a logical grouping of instances within a single Availability Zone. You cannot specify multiple Availability Zones and a cluster placement group.
        VPCZoneIdentifier:
          $ref: "#/components/schemas/XmlStringMaxLen5000"
          description: A comma-separated list of subnet IDs for a virtual private cloud (VPC). If you specify VPCZoneIdentifier with AvailabilityZones, the subnets that you specify must reside in those Availability Zones.
        TerminationPolicies:
          $ref: "#/components/schemas/TerminationPolicies"
          description: "A policy or a list of policies that are used to select the instances to terminate. The policies are executed in the order that you list them. For more information, see Configure termination policies for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Valid values: Default | AllocationStrategy | ClosestToNextInstanceHour | NewestInstance | OldestInstance | OldestLaunchConfiguration | OldestLaunchTemplate | arn:aws:lambda:region:account-id:function:my-function:my-alias"
        NewInstancesProtectedFromScaleIn:
          $ref: "#/components/schemas/InstanceProtected"
          description: Indicates whether newly launched instances are protected from termination by Amazon EC2 Auto Scaling when scaling in. For more information about preventing instances from terminating on scale in, see Use instance scale-in protection in the Amazon EC2 Auto Scaling User Guide.
        ServiceLinkedRoleARN:
          $ref: "#/components/schemas/ResourceName"
          description: The Amazon Resource Name (ARN) of the service-linked role that the Auto Scaling group uses to call other Amazon Web Services on your behalf. For more information, see Service-linked roles in the Amazon EC2 Auto Scaling User Guide.
        MaxInstanceLifetime:
          $ref: "#/components/schemas/MaxInstanceLifetime"
          description: The maximum amount of time, in seconds, that an instance can be in service. The default is null. If specified, the value must be either 0 or a number equal to or greater than 86,400 seconds (1 day). To clear a previously set value, specify a new value of 0. For more information, see Replacing Auto Scaling instances based on maximum instance lifetime in the Amazon EC2 Auto Scaling User Guide.
        CapacityRebalance:
          $ref: "#/components/schemas/CapacityRebalanceEnabled"
          description: Enables or disables Capacity Rebalancing. If Capacity Rebalancing is disabled, proactive replacement of at-risk Spot Instances does not occur. For more information, see Capacity Rebalancing in Auto Scaling to replace at-risk Spot Instances in the Amazon EC2 Auto Scaling User Guide. To suspend rebalancing across Availability Zones, use the SuspendProcesses API.
        Context:
          $ref: "#/components/schemas/Context"
          description: Reserved.
        DesiredCapacityType:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: "The unit of measurement for the value specified for desired capacity. Amazon EC2 Auto Scaling supports DesiredCapacityType for attribute-based instance type selection only. For more information, see Create a mixed instances group using attribute-based instance type selection in the Amazon EC2 Auto Scaling User Guide. By default, Amazon EC2 Auto Scaling specifies units, which translates into number of instances. Valid values: units | vcpu | memory-mib"
        DefaultInstanceWarmup:
          $ref: "#/components/schemas/DefaultInstanceWarmup"
          description: The amount of time, in seconds, until a new instance is considered to have finished initializing and resource consumption to become stable after it enters the InService state. During an instance refresh, Amazon EC2 Auto Scaling waits for the warm-up period after it replaces an instance before it moves on to replacing the next instance. Amazon EC2 Auto Scaling also waits for the warm-up period before aggregating the metrics for new instances with existing instances in the Amazon CloudWatch metrics that are used for scaling, resulting in more reliable usage data. For more information, see Set the default instance warmup for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. To manage various warm-up settings at the group level, we recommend that you set the default instance warmup, even if it is set to 0 seconds. To remove a value that you previously set, include the property but specify -1 for the value. However, we strongly recommend keeping the default instance warmup enabled by specifying a value of 0 or other nominal value.
        InstanceMaintenancePolicy:
          $ref: "#/components/schemas/InstanceMaintenancePolicy"
          description: An instance maintenance policy. For more information, see Set instance maintenance policy in the Amazon EC2 Auto Scaling User Guide.
        AvailabilityZoneDistribution:
          $ref: "#/components/schemas/AvailabilityZoneDistribution"
          description: The instance capacity distribution across Availability Zones.
        AvailabilityZoneImpairmentPolicy:
          $ref: "#/components/schemas/AvailabilityZoneImpairmentPolicy"
          description: The policy for Availability Zone impairment.
        SkipZonalShiftValidation:
          $ref: "#/components/schemas/SkipZonalShiftValidation"
          description: If you enable zonal shift with cross-zone disabled load balancers, capacity could become imbalanced across Availability Zones. To skip the validation, specify true. For more information, see Auto Scaling group zonal shift in the Amazon EC2 Auto Scaling User Guide.
        CapacityReservationSpecification:
          $ref: "#/components/schemas/CapacityReservationSpecification"
          description: The capacity reservation specification for the Auto Scaling group.
        InstanceLifecyclePolicy:
          $ref: "#/components/schemas/InstanceLifecyclePolicy"
          description: The instance lifecycle policy for the Auto Scaling group. This policy controls instance behavior when an instance transitions through its lifecycle states. Configure retention triggers to specify when instances should move to a Retained state instead of automatic termination. For more information, see Control instance retention with instance lifecycle policies in the Amazon EC2 Auto Scaling User Guide.
        DeletionProtection:
          $ref: "#/components/schemas/DeletionProtection"
          description: "The deletion protection setting for the Auto Scaling group. This setting helps safeguard your Auto Scaling group and its instances by controlling whether the DeleteAutoScalingGroup operation is allowed. When deletion protection is enabled, users cannot delete the Auto Scaling group according to the specified protection level until the setting is changed back to a less restrictive level. The valid values are none, prevent-force-deletion, and prevent-all-deletion. Default: none For more information, see Configure deletion protection for your Amazon EC2 Auto Scaling resources in the Amazon EC2 Auto Scaling User Guide."
      required:
        - AutoScalingGroupName
