        ResourceLabel:
          $ref: "#/components/schemas/XmlStringMaxLen1023"
          description: "A label that uniquely identifies a specific Application Load Balancer target group from which to determine the request count served by your Auto Scaling group. You can't specify a resource label unless the target group is attached to the Auto Scaling group. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format of the resource label is: app/my-alb/778d41231b141a0f/targetgroup/my-alb-target-group/943f017f100becff. Where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
