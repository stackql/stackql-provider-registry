      items:
        $ref: "#/components/schemas/ScheduledUpdateGroupActionRequest"
    ScheduledUpdateGroupActionRequest:
      description: Describes information used for one or more scheduled scaling action updates in a BatchPutScheduledUpdateGroupAction operation.
      type: object
      properties:
        ScheduledActionName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the scaling action.
        StartTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time for the action to start, in YYYY-MM-DDThh:mm:ssZ format in UTC/GMT only and in quotes (for example, "2019-06-01T00:00:00Z"). If you specify Recurrence and StartTime, Amazon EC2 Auto Scaling performs the action at this time, and then performs the action based on the specified recurrence. If you try to schedule the action in the past, Amazon EC2 Auto Scaling returns an error message.
        EndTime:
          $ref: "#/components/schemas/TimestampType"
          description: The date and time for the recurring schedule to end, in UTC.
        Recurrence:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: 'The recurring schedule for the action, in Unix cron syntax format. This format consists of five fields separated by white spaces: [Minute] [Hour] [Day_of_Month] [Month_of_Year] [Day_of_Week]. The value must be in quotes (for example, "30 0 1 1,6,12 *"). For more information about this format, see Crontab. When StartTime and EndTime are specified with Recurrence, they form the boundaries of when the recurring action starts and stops. Cron expressions use Universal Coordinated Time (UTC) by default.'
        MinSize:
          $ref: "#/components/schemas/AutoScalingGroupMinSize"
          description: The minimum size of the Auto Scaling group.
        MaxSize:
          $ref: "#/components/schemas/AutoScalingGroupMaxSize"
          description: The maximum size of the Auto Scaling group.
        DesiredCapacity:
          $ref: "#/components/schemas/AutoScalingGroupDesiredCapacity"
          description: The desired capacity is the initial capacity of the Auto Scaling group after the scheduled action runs and the capacity it attempts to maintain.
        TimeZone:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: Specifies the time zone for a cron expression. If a time zone is not provided, UTC is used by default. Valid values are the canonical names of the IANA time zones, derived from the IANA Time Zone Database (such as Etc/GMT+9 or Pacific/Tahiti). For more information, see https://en.wikipedia.org/wiki/List_of_tz_database_time_zones.
      required:
        - ScheduledActionName
    TimestampType:
      type: string
      format: date-time
    AutoScalingGroupMinSize:
      type: integer
    AutoScalingGroupMaxSize:
      type: integer
    AutoScalingGroupDesiredCapacity:
      type: integer
    BatchPutScheduledUpdateGroupActionAnswerDisplay:
      type: object
      properties:
        FailedScheduledUpdateGroupActions:
          type: string
          description: The names of the scheduled actions that could not be created or updated, including an error message.
    BatchPutScheduledUpdateGroupActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/BatchPutScheduledUpdateGroupActionAnswerDisplay"
    BatchPutScheduledUpdateGroupActionType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        ScheduledUpdateGroupActions:
          $ref: "#/components/schemas/ScheduledUpdateGroupActionRequests"
          description: One or more scheduled actions. The maximum number allowed is 50.
      required:
        - AutoScalingGroupName
        - ScheduledUpdateGroupActions
    BooleanType:
      type: boolean
    CancelInstanceRefreshAnswerDisplay:
      type: object
      properties:
        InstanceRefreshId:
          type: string
          description: The instance refresh ID associated with the request. This is the unique ID assigned to the instance refresh when it was started.
    CancelInstanceRefreshOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CancelInstanceRefreshAnswerDisplay"
    CancelInstanceRefreshType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group.
        WaitForTransitioningInstances:
          $ref: "#/components/schemas/BooleanType"
          description: When cancelling an instance refresh, this indicates whether to wait for in-flight launches and terminations to complete. The default is true. When set to false, Amazon EC2 Auto Scaling cancels the instance refresh without waiting for any pending launches or terminations to complete.
      required:
        - AutoScalingGroupName
    AsciiStringMaxLen255:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z0-9\\-_\\/]+"
    ResourceName:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    LifecycleActionToken:
      type: string
      minLength: 36
      maxLength: 36
    LifecycleActionResult:
      type: string
    CompleteLifecycleActionAnswerDisplay:
      type: object
      properties: {}
    CompleteLifecycleActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CompleteLifecycleActionAnswerDisplay"
    CompleteLifecycleActionType:
      type: object
      properties:
        LifecycleHookName:
          $ref: "#/components/schemas/AsciiStringMaxLen255"
          description: The name of the lifecycle hook.
        AutoScalingGroupName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Auto Scaling group.
        LifecycleActionToken:
          $ref: "#/components/schemas/LifecycleActionToken"
          description: A universally unique identifier (UUID) that identifies a specific lifecycle action associated with an instance. Amazon EC2 Auto Scaling sends this token to the notification target you specified when you created the lifecycle hook.
        LifecycleActionResult:
          $ref: "#/components/schemas/LifecycleActionResult"
          description: The action for the group to take. You can specify either CONTINUE or ABANDON.
        InstanceId:
          $ref: "#/components/schemas/XmlStringMaxLen19"
          description: The ID of the instance.
      required:
        - LifecycleHookName
        - AutoScalingGroupName
        - LifecycleActionResult
    LaunchTemplateSpecification:
      description: Describes the launch template and the version of the launch template that Amazon EC2 Auto Scaling uses to launch Amazon EC2 instances. For more information about launch templates, see Launch templates in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        LaunchTemplateId:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: "The ID of the launch template. To get the template ID, use the Amazon EC2 DescribeLaunchTemplates API operation. New launch templates can be created using the Amazon EC2 CreateLaunchTemplate API. Conditional: You must specify either a LaunchTemplateId or a LaunchTemplateName."
        LaunchTemplateName:
          $ref: "#/components/schemas/LaunchTemplateName"
          description: "The name of the launch template. To get the template name, use the Amazon EC2 DescribeLaunchTemplates API operation. New launch templates can be created using the Amazon EC2 CreateLaunchTemplate API. Conditional: You must specify either a LaunchTemplateId or a LaunchTemplateName."
        Version:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The version number, $Latest, or $Default. To get the version number, use the Amazon EC2 DescribeLaunchTemplateVersions API operation. New launch template versions can be created using the Amazon EC2 CreateLaunchTemplateVersion API. If the value is $Latest, Amazon EC2 Auto Scaling selects the latest version of the launch template when launching instances. If the value is $Default, Amazon EC2 Auto Scaling selects the default version of the launch template when launching instances. The default value is $Default.
    LaunchTemplateName:
      type: string
      minLength: 3
      maxLength: 128
      pattern: "[a-zA-Z0-9\\(\\)\\.\\-/_]+"
    MixedInstancesPolicy:
      description: Use this structure to launch multiple instance types and On-Demand Instances and Spot Instances within a single Auto Scaling group. A mixed instances policy contains information that Amazon EC2 Auto Scaling can use to launch instances and help optimize your costs. For more information, see Auto Scaling groups with multiple instance types and purchase options in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        LaunchTemplate:
          $ref: "#/components/schemas/LaunchTemplate"
          description: One or more launch templates and the instance types (overrides) that are used to launch EC2 instances to fulfill On-Demand and Spot capacities.
        InstancesDistribution:
          $ref: "#/components/schemas/InstancesDistribution"
          description: The instances distribution.
    LaunchTemplate:
      description: Use this structure to specify the launch templates and instance types (overrides) for a mixed instances policy.
      type: object
      properties:
        LaunchTemplateSpecification:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: The launch template.
        Overrides:
          $ref: "#/components/schemas/Overrides"
          description: Any properties that you specify override the same properties in the launch template.
    Overrides:
      type: array
      items:
        $ref: "#/components/schemas/LaunchTemplateOverrides"
    LaunchTemplateOverrides:
      description: "Use this structure to let Amazon EC2 Auto Scaling do the following when the Auto Scaling group has a mixed instances policy: Override the instance type that is specified in the launch template. Use multiple instance types. Specify the instance types that you want, or define your instance requirements instead and let Amazon EC2 Auto Scaling provision the available instance types that meet your requirements. This can provide Amazon EC2 Auto Scaling with a larger selection of instance types to choose from when fulfilling Spot and On-Demand capacities. You can view which instance types are matched before you apply the instance requirements to your Auto Scaling group. After you define your instance requirements, you don't have to keep updating these settings to get new EC2 instance types automatically. Amazon EC2 Auto Scaling uses the instance requirements of the Auto Scaling group to determine whether a new EC2 instance type can be used."
      type: object
      properties:
        InstanceType:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The instance type, such as m3.xlarge. You must specify an instance type that is supported in your requested Region and Availability Zones. For more information, see Instance types in the Amazon EC2 User Guide. You can specify up to 40 instance types per Auto Scaling group.
        WeightedCapacity:
          $ref: "#/components/schemas/XmlStringMaxLen32"
          description: If you provide a list of instance types to use, you can specify the number of capacity units provided by each instance type in terms of virtual CPUs, memory, storage, throughput, or other relative performance characteristic. When a Spot or On-Demand Instance is launched, the capacity units count toward the desired capacity. Amazon EC2 Auto Scaling launches instances until the desired capacity is totally fulfilled, even if this results in an overage. For example, if there are two units remaining to fulfill capacity, and Amazon EC2 Auto Scaling can only launch an instance with a WeightedCapacity of five units, the instance is launched, and the desired capacity is exceeded by three units. For more information, see Configure an Auto Scaling group to use instance weights in the Amazon EC2 Auto Scaling User Guide. Value must be in the range of 1–999. If you specify a value for WeightedCapacity for one instance type, you must specify a value for WeightedCapacity for all of them. Every Auto Scaling group has three size parameters (DesiredCapacity, MaxSize, and MinSize). Usually, you set these sizes based on a specific number of instances. However, if you configure a mixed instances policy that defines weights for the instance types, you must specify these sizes with the same units that you use for weighting instances.
        LaunchTemplateSpecification:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: Provides a launch template for the specified instance type or set of instance requirements. For example, some instance types might require a launch template with a different AMI. If not provided, Amazon EC2 Auto Scaling uses the launch template that's specified in the LaunchTemplate definition. For more information, see Specifying a different launch template for an instance type in the Amazon EC2 Auto Scaling User Guide. You can specify up to 20 launch templates per Auto Scaling group. The launch templates specified in the overrides and in the LaunchTemplate definition count towards this limit.
        InstanceRequirements:
          $ref: "#/components/schemas/InstanceRequirements"
          description: The instance requirements. Amazon EC2 Auto Scaling uses your specified requirements to identify instance types. Then, it uses your On-Demand and Spot allocation strategies to launch instances from these instance types. You can specify up to four separate sets of instance requirements per Auto Scaling group. This is useful for provisioning instances from different Amazon Machine Images (AMIs) in the same Auto Scaling group. To do this, create the AMIs and create a new launch template for each AMI. Then, create a compatible set of instance requirements for each launch template. If you specify InstanceRequirements, you can't specify InstanceType.
        ImageId:
          $ref: "#/components/schemas/ImageId"
          description: "The ID of the Amazon Machine Image (AMI) to use for instances launched with this override. When using Instance Refresh with ReplaceRootVolume strategy, this specifies the AMI for root volume replacement operations. For ReplaceRootVolume operations: All overrides in the MixedInstancesPolicy must specify an ImageId The AMI must contain only a single root volume Root volume replacement doesn't support multi-volume AMIs"
    XmlStringMaxLen32:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    InstanceRequirements:
      description: "The attributes for the instance types for a mixed instances policy. Amazon EC2 Auto Scaling uses your specified requirements to identify instance types. Then, it uses your On-Demand and Spot allocation strategies to launch instances from these instance types. When you specify multiple attributes, you get instance types that satisfy all of the specified attributes. If you specify multiple values for an attribute, you get instance types that satisfy any of the specified values. To limit the list of instance types from which Amazon EC2 Auto Scaling can identify matching instance types, you can use one of the following parameters, but not both in the same request: AllowedInstanceTypes - The instance types to include in the list. All other instance types are ignored, even if they match your specified attributes. ExcludedInstanceTypes - The instance types to exclude from the list, even if they match your specified attributes. You must specify VCpuCount and MemoryMiB. All other attributes are optional. Any unspecified optional attribute is set to its default. For more information, see Create a mixed instances group using attribute-based instance type selection in the Amazon EC2 Auto Scaling User Guide. For help determining which instance types match your attributes before you apply them to your Auto Scaling group, see Preview instance types with specified attributes in the Amazon EC2 User Guide."
      type: object
      properties:
        VCpuCount:
          $ref: "#/components/schemas/VCpuCountRequest"
          description: The minimum and maximum number of vCPUs for an instance type.
        MemoryMiB:
          $ref: "#/components/schemas/MemoryMiBRequest"
          description: The minimum and maximum instance memory size for an instance type, in MiB.
        CpuManufacturers:
          $ref: "#/components/schemas/CpuManufacturers"
          description: "Lists which specific CPU manufacturers to include. For instance types with Intel CPUs, specify intel. For instance types with AMD CPUs, specify amd. For instance types with Amazon Web Services CPUs, specify amazon-web-services. For instance types with Apple CPUs, specify apple. Don't confuse the CPU hardware manufacturer with the CPU hardware architecture. Instances will be launched with a compatible CPU architecture based on the Amazon Machine Image (AMI) that you specify in your launch template. Default: Any manufacturer"
        MemoryGiBPerVCpu:
          $ref: "#/components/schemas/MemoryGiBPerVCpuRequest"
          description: "The minimum and maximum amount of memory per vCPU for an instance type, in GiB. Default: No minimum or maximum limits"
        ExcludedInstanceTypes:
          $ref: "#/components/schemas/ExcludedInstanceTypes"
          description: "The instance types to exclude. You can use strings with one or more wild cards, represented by an asterisk (*), to exclude an instance family, type, size, or generation. The following are examples: m5.8xlarge, c5*.*, m5a.*, r*, *3*. For example, if you specify c5*, you are excluding the entire C5 instance family, which includes all C5a and C5n instance types. If you specify m5a.*, Amazon EC2 Auto Scaling will exclude all the M5a instance types, but not the M5n instance types. If you specify ExcludedInstanceTypes, you can't specify AllowedInstanceTypes. Default: No excluded instance types"
        InstanceGenerations:
          $ref: "#/components/schemas/InstanceGenerations"
          description: "Indicates whether current or previous generation instance types are included. For current generation instance types, specify current. The current generation includes EC2 instance types currently recommended for use. This typically includes the latest two to three generations in each instance family. For more information, see Instance types in the Amazon EC2 User Guide. For previous generation instance types, specify previous. Default: Any current or previous generation"
        SpotMaxPricePercentageOverLowestPrice:
          $ref: "#/components/schemas/NullablePositiveInteger"
          description: "[Price protection] The price protection threshold for Spot Instances, as a percentage higher than an identified Spot price. The identified Spot price is the price of the lowest priced current generation C, M, or R instance type with your specified attributes. If no current generation C, M, or R instance type matches your attributes, then the identified price is from either the lowest priced current generation instance types or, failing that, the lowest priced previous generation instance types that match your attributes. When Amazon EC2 Auto Scaling selects instance types with your attributes, we will exclude instance types whose price exceeds your specified threshold. The parameter accepts an integer, which Amazon EC2 Auto Scaling interprets as a percentage. If you set DesiredCapacityType to vcpu or memory-mib, the price protection threshold is based on the per-vCPU or per-memory price instead of the per instance price. Only one of SpotMaxPricePercentageOverLowestPrice or MaxSpotPriceAsPercentageOfOptimalOnDemandPrice can be specified. If you don't specify either, Amazon EC2 Auto Scaling will automatically apply optimal price protection to consistently select from a wide range of instance types. To indicate no price protection threshold for Spot Instances, meaning you want to consider all instance types that match your attributes, include one of these parameters and specify a high value, such as 999999."
        MaxSpotPriceAsPercentageOfOptimalOnDemandPrice:
          $ref: "#/components/schemas/NullablePositiveInteger"
          description: "[Price protection] The price protection threshold for Spot Instances, as a percentage of an identified On-Demand price. The identified On-Demand price is the price of the lowest priced current generation C, M, or R instance type with your specified attributes. If no current generation C, M, or R instance type matches your attributes, then the identified price is from either the lowest priced current generation instance types or, failing that, the lowest priced previous generation instance types that match your attributes. When Amazon EC2 Auto Scaling selects instance types with your attributes, we will exclude instance types whose price exceeds your specified threshold. The parameter accepts an integer, which Amazon EC2 Auto Scaling interprets as a percentage. If you set DesiredCapacityType to vcpu or memory-mib, the price protection threshold is based on the per-vCPU or per-memory price instead of the per instance price. Only one of SpotMaxPricePercentageOverLowestPrice or MaxSpotPriceAsPercentageOfOptimalOnDemandPrice can be specified. If you don't specify either, Amazon EC2 Auto Scaling will automatically apply optimal price protection to consistently select from a wide range of instance types. To indicate no price protection threshold for Spot Instances, meaning you want to consider all instance types that match your attributes, include one of these parameters and specify a high value, such as 999999."
        OnDemandMaxPricePercentageOverLowestPrice:
          $ref: "#/components/schemas/NullablePositiveInteger"
          description: "[Price protection] The price protection threshold for On-Demand Instances, as a percentage higher than an identified On-Demand price. The identified On-Demand price is the price of the lowest priced current generation C, M, or R instance type with your specified attributes. If no current generation C, M, or R instance type matches your attributes, then the identified price is from either the lowest priced current generation instance types or, failing that, the lowest priced previous generation instance types that match your attributes. When Amazon EC2 Auto Scaling selects instance types with your attributes, we will exclude instance types whose price exceeds your specified threshold. The parameter accepts an integer, which Amazon EC2 Auto Scaling interprets as a percentage. To turn off price protection, specify a high value, such as 999999. If you set DesiredCapacityType to vcpu or memory-mib, the price protection threshold is applied based on the per-vCPU or per-memory price instead of the per instance price. Default: 20"
        BareMetal:
          $ref: "#/components/schemas/BareMetal"
          description: "Indicates whether bare metal instance types are included, excluded, or required. Default: excluded"
        BurstablePerformance:
          $ref: "#/components/schemas/BurstablePerformance"
          description: "Indicates whether burstable performance instance types are included, excluded, or required. For more information, see Burstable performance instances in the Amazon EC2 User Guide. Default: excluded"
        RequireHibernateSupport:
          $ref: "#/components/schemas/NullableBoolean"
          description: "Indicates whether instance types must provide On-Demand Instance hibernation support. Default: false"
        NetworkInterfaceCount:
          $ref: "#/components/schemas/NetworkInterfaceCountRequest"
          description: "The minimum and maximum number of network interfaces for an instance type. Default: No minimum or maximum limits"
        LocalStorage:
          $ref: "#/components/schemas/LocalStorage"
          description: "Indicates whether instance types with instance store volumes are included, excluded, or required. For more information, see Amazon EC2 instance store in the Amazon EC2 User Guide. Default: included"
        LocalStorageTypes:
          $ref: "#/components/schemas/LocalStorageTypes"
          description: "Indicates the type of local storage that is required. For instance types with hard disk drive (HDD) storage, specify hdd. For instance types with solid state drive (SSD) storage, specify ssd. Default: Any local storage type"
        TotalLocalStorageGB:
          $ref: "#/components/schemas/TotalLocalStorageGBRequest"
          description: "The minimum and maximum total local storage size for an instance type, in GB. Default: No minimum or maximum limits"
        BaselineEbsBandwidthMbps:
          $ref: "#/components/schemas/BaselineEbsBandwidthMbpsRequest"
          description: "The minimum and maximum baseline bandwidth performance for an instance type, in Mbps. For more information, see Amazon EBS–optimized instances in the Amazon EC2 User Guide. Default: No minimum or maximum limits"
        AcceleratorTypes:
          $ref: "#/components/schemas/AcceleratorTypes"
          description: "Lists the accelerator types that must be on an instance type. For instance types with GPU accelerators, specify gpu. For instance types with FPGA accelerators, specify fpga. For instance types with inference accelerators, specify inference. Default: Any accelerator type"
        AcceleratorCount:
          $ref: "#/components/schemas/AcceleratorCountRequest"
          description: "The minimum and maximum number of accelerators (GPUs, FPGAs, or Amazon Web Services Inferentia chips) for an instance type. To exclude accelerator-enabled instance types, set Max to 0. Default: No minimum or maximum limits"
        AcceleratorManufacturers:
          $ref: "#/components/schemas/AcceleratorManufacturers"
          description: "Indicates whether instance types must have accelerators by specific manufacturers. For instance types with NVIDIA devices, specify nvidia. For instance types with AMD devices, specify amd. For instance types with Amazon Web Services devices, specify amazon-web-services. For instance types with Xilinx devices, specify xilinx. Default: Any manufacturer"
        AcceleratorNames:
          $ref: "#/components/schemas/AcceleratorNames"
          description: "Lists the accelerators that must be on an instance type. For instance types with NVIDIA A100 GPUs, specify a100. For instance types with NVIDIA V100 GPUs, specify v100. For instance types with NVIDIA K80 GPUs, specify k80. For instance types with NVIDIA T4 GPUs, specify t4. For instance types with NVIDIA M60 GPUs, specify m60. For instance types with AMD Radeon Pro V520 GPUs, specify radeon-pro-v520. For instance types with Xilinx VU9P FPGAs, specify vu9p. Default: Any accelerator"
        AcceleratorTotalMemoryMiB:
          $ref: "#/components/schemas/AcceleratorTotalMemoryMiBRequest"
          description: "The minimum and maximum total memory size for the accelerators on an instance type, in MiB. Default: No minimum or maximum limits"
        NetworkBandwidthGbps:
          $ref: "#/components/schemas/NetworkBandwidthGbpsRequest"
          description: "The minimum and maximum amount of network bandwidth, in gigabits per second (Gbps). Default: No minimum or maximum limits"
        AllowedInstanceTypes:
          $ref: "#/components/schemas/AllowedInstanceTypes"
          description: "The instance types to apply your specified attributes against. All other instance types are ignored, even if they match your specified attributes. You can use strings with one or more wild cards, represented by an asterisk (*), to allow an instance type, size, or generation. The following are examples: m5.8xlarge, c5*.*, m5a.*, r*, *3*. For example, if you specify c5*, Amazon EC2 Auto Scaling will allow the entire C5 instance family, which includes all C5a and C5n instance types. If you specify m5a.*, Amazon EC2 Auto Scaling will allow all the M5a instance types, but not the M5n instance types. If you specify AllowedInstanceTypes, you can't specify ExcludedInstanceTypes. Default: All instance types"
        BaselinePerformanceFactors:
          $ref: "#/components/schemas/BaselinePerformanceFactorsRequest"
          description: The baseline performance factors for the instance requirements.
      required:
        - VCpuCount
        - MemoryMiB
    VCpuCountRequest:
