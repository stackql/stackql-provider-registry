        Min:
          $ref: "#/components/schemas/NullablePositiveInteger"
          description: The memory minimum in MiB.
        Max:
          $ref: "#/components/schemas/NullablePositiveInteger"
          description: The memory maximum in MiB.
    NetworkBandwidthGbpsRequest:
      description: Specifies the minimum and maximum for the NetworkBandwidthGbps object when you specify InstanceRequirements for an Auto Scaling group. Setting the minimum bandwidth does not guarantee that your instance will achieve the minimum bandwidth. Amazon EC2 will identify instance types that support the specified minimum bandwidth, but the actual bandwidth of your instance might go below the specified minimum at times. For more information, see Available instance bandwidth in the Amazon EC2 User Guide.
      type: object
      properties:
        Min:
          $ref: "#/components/schemas/NullablePositiveDouble"
          description: The minimum amount of network bandwidth, in gigabits per second (Gbps).
        Max:
          $ref: "#/components/schemas/NullablePositiveDouble"
          description: The maximum amount of network bandwidth, in gigabits per second (Gbps).
    AllowedInstanceTypes:
      type: array
      items:
        $ref: "#/components/schemas/AllowedInstanceType"
    AllowedInstanceType:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-zA-Z0-9\\.\\*\\-]+"
    BaselinePerformanceFactorsRequest:
      description: The baseline performance to consider, using an instance family as a baseline reference. The instance family establishes the lowest acceptable level of performance. Auto Scaling uses this baseline to guide instance type selection, but there is no guarantee that the selected instance types will always exceed the baseline for every application. Currently, this parameter only supports CPU performance as a baseline performance factor. For example, specifying c6i uses the CPU performance of the c6i family as the baseline reference.
      type: object
      properties:
        Cpu:
          $ref: "#/components/schemas/CpuPerformanceFactorRequest"
          description: The CPU performance to consider, using an instance family as the baseline reference.
    CpuPerformanceFactorRequest:
      description: The CPU performance to consider, using an instance family as the baseline reference.
      type: object
      properties:
        References:
          $ref: "#/components/schemas/PerformanceFactorReferenceSetRequest"
          description: Specify an instance family to use as the baseline reference for CPU performance. All instance types that match your specified attributes will be compared against the CPU performance of the referenced instance family, regardless of CPU manufacturer or architecture differences. Currently only one instance family can be specified in the list.
    PerformanceFactorReferenceSetRequest:
      type: array
      items:
        $ref: "#/components/schemas/PerformanceFactorReferenceRequest"
    PerformanceFactorReferenceRequest:
      description: Specify an instance family to use as the baseline reference for CPU performance. All instance types that All instance types that match your specified attributes will be compared against the CPU performance of the referenced instance family, regardless of CPU manufacturer or architecture differences. Currently only one instance family can be specified in the list.
      type: object
      properties:
        InstanceFamily:
          $ref: "#/components/schemas/String"
          description: The instance family to use as a baseline reference. Make sure that you specify the correct value for the instance family. The instance family is everything before the period (.) in the instance type name. For example, in the instance c6i.large, the instance family is c6i, not c6. For more information, see Amazon EC2 instance type naming conventions in Amazon EC2 Instance Types. The following instance types are not supported for performance protection. c1 g3| g3s hpc7g m1| m2 mac1 | mac2 | mac2-m1ultra | mac2-m2 | mac2-m2pro p3dn | p4d | p5 t1 u-12tb1 | u-18tb1 | u-24tb1 | u-3tb1 | u-6tb1 | u-9tb1 | u7i-12tb | u7in-16tb | u7in-24tb | u7in-32tb If you performance protection by specifying a supported instance family, the returned instance types will exclude the preceding unsupported instance families. If you specify an unsupported instance family as a value for baseline performance, the API returns an empty response.
    String:
      type: string
    ImageId:
      type: string
      minLength: 5
      maxLength: 21
      pattern: ^ami-[a-z0-9]{1,17}$
    InstancesDistribution:
      description: Use this structure to specify the distribution of On-Demand Instances and Spot Instances and the allocation strategies used to fulfill On-Demand and Spot capacities for a mixed instances policy.
      type: object
      properties:
        OnDemandAllocationStrategy:
          $ref: "#/components/schemas/XmlString"
          description: "The allocation strategy to apply to your On-Demand Instances when they are launched. Possible instance types are determined by the launch template overrides that you specify. The following lists the valid values: lowest-price Uses price to determine which instance types are the highest priority, launching the lowest priced instance types within an Availability Zone first. This is the default value for Auto Scaling groups that specify InstanceRequirements. prioritized You set the order of instance types for the launch template overrides from highest to lowest priority (from first to last in the list). Amazon EC2 Auto Scaling launches your highest priority instance types first. If all your On-Demand capacity cannot be fulfilled using your highest priority instance type, then Amazon EC2 Auto Scaling launches the remaining capacity using the second priority instance type, and so on. This is the default value for Auto Scaling groups that don't specify InstanceRequirements and cannot be used for groups that do."
        OnDemandBaseCapacity:
          $ref: "#/components/schemas/OnDemandBaseCapacity"
          description: "The minimum amount of the Auto Scaling group's capacity that must be fulfilled by On-Demand Instances. This base portion is launched first as your group scales. This number has the same unit of measurement as the group's desired capacity. If you change the default unit of measurement (number of instances) by specifying weighted capacity values in your launch template overrides list, or by changing the default desired capacity type setting of the group, you must specify this number using the same unit of measurement. Default: 0"
        OnDemandPercentageAboveBaseCapacity:
          $ref: "#/components/schemas/OnDemandPercentageAboveBaseCapacity"
          description: "Controls the percentages of On-Demand Instances and Spot Instances for your additional capacity beyond OnDemandBaseCapacity. Expressed as a number (for example, 20 specifies 20% On-Demand Instances, 80% Spot Instances). If set to 100, only On-Demand Instances are used. Default: 100"
        SpotAllocationStrategy:
          $ref: "#/components/schemas/XmlString"
          description: "The allocation strategy to apply to your Spot Instances when they are launched. Possible instance types are determined by the launch template overrides that you specify. The following lists the valid values: capacity-optimized Requests Spot Instances using pools that are optimally chosen based on the available Spot capacity. This strategy has the lowest risk of interruption. To give certain instance types a higher chance of launching first, use capacity-optimized-prioritized. capacity-optimized-prioritized You set the order of instance types for the launch template overrides from highest to lowest priority (from first to last in the list). Amazon EC2 Auto Scaling honors the instance type priorities on a best effort basis but optimizes for capacity first. Note that if the On-Demand allocation strategy is set to prioritized, the same priority is applied when fulfilling On-Demand capacity. This is not a valid value for Auto Scaling groups that specify InstanceRequirements. lowest-price Requests Spot Instances using the lowest priced pools within an Availability Zone, across the number of Spot pools that you specify for the SpotInstancePools property. To ensure that your desired capacity is met, you might receive Spot Instances from several pools. This is the default value, but it might lead to high interruption rates because this strategy only considers instance price and not available capacity. price-capacity-optimized (recommended) The price and capacity optimized allocation strategy looks at both price and capacity to select the Spot Instance pools that are the least likely to be interrupted and have the lowest possible price."
        SpotInstancePools:
          $ref: "#/components/schemas/SpotInstancePools"
          description: "The number of Spot Instance pools across which to allocate your Spot Instances. The Spot pools are determined from the different instance types in the overrides. Valid only when the SpotAllocationStrategy is lowest-price. Value must be in the range of 1–20. Default: 2"
        SpotMaxPrice:
          $ref: "#/components/schemas/MixedInstanceSpotPrice"
          description: 'The maximum price per unit hour that you are willing to pay for a Spot Instance. If your maximum price is lower than the Spot price for the instance types that you selected, your Spot Instances are not launched. We do not recommend specifying a maximum price because it can lead to increased interruptions. When Spot Instances launch, you pay the current Spot price. To remove a maximum price that you previously set, include the property but specify an empty string ("") for the value. If you specify a maximum price, your instances will be interrupted more frequently than if you do not specify one. Valid Range: Minimum value of 0.001'
    XmlString:
      type: string
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    OnDemandBaseCapacity:
      type: integer
    OnDemandPercentageAboveBaseCapacity:
      type: integer
    SpotInstancePools:
      type: integer
    MixedInstanceSpotPrice:
      type: string
      minLength: 0
      maxLength: 255
    Cooldown:
      type: integer
    AvailabilityZones:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen255"
    AvailabilityZoneIds:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen255"
    HealthCheckGracePeriod:
      type: integer
    XmlStringMaxLen5000:
      type: string
      minLength: 1
      maxLength: 5000
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TerminationPolicies:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen1600"
    XmlStringMaxLen1600:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    InstanceProtected:
      type: boolean
    CapacityRebalanceEnabled:
      type: boolean
    LifecycleHookSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/LifecycleHookSpecification"
    LifecycleHookSpecification:
      description: Describes information used to specify a lifecycle hook for an Auto Scaling group. For more information, see Amazon EC2 Auto Scaling lifecycle hooks in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        LifecycleHookName:
          $ref: "#/components/schemas/AsciiStringMaxLen255"
          description: The name of the lifecycle hook.
        LifecycleTransition:
          $ref: "#/components/schemas/LifecycleTransition"
          description: The lifecycle transition. For Auto Scaling groups, there are two major lifecycle transitions. To create a lifecycle hook for scale-out events, specify autoscaling:EC2_INSTANCE_LAUNCHING. To create a lifecycle hook for scale-in events, specify autoscaling:EC2_INSTANCE_TERMINATING.
        NotificationMetadata:
          $ref: "#/components/schemas/AnyPrintableAsciiStringMaxLen4000"
          description: Additional information that you want to include any time Amazon EC2 Auto Scaling sends a message to the notification target.
        HeartbeatTimeout:
          $ref: "#/components/schemas/HeartbeatTimeout"
          description: The maximum time, in seconds, that can elapse before the lifecycle hook times out. The range is from 30 to 7200 seconds. The default value is 3600 seconds (1 hour).
        DefaultResult:
          $ref: "#/components/schemas/LifecycleActionResult"
          description: "The action the Auto Scaling group takes when the lifecycle hook timeout elapses or if an unexpected failure occurs. The default value is ABANDON. Valid values: CONTINUE | ABANDON"
        NotificationTargetARN:
          $ref: "#/components/schemas/NotificationTargetResourceName"
          description: The Amazon Resource Name (ARN) of the notification target that Amazon EC2 Auto Scaling sends notifications to when an instance is in a wait state for the lifecycle hook. You can specify an Amazon SNS topic or an Amazon SQS queue.
        RoleARN:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The ARN of the IAM role that allows the Auto Scaling group to publish to the specified notification target. For information about creating this role, see Prepare to add a lifecycle hook to your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. Valid only if the notification target is an Amazon SNS topic or an Amazon SQS queue.
      required:
        - LifecycleHookName
        - LifecycleTransition
    LifecycleTransition:
      type: string
    AnyPrintableAsciiStringMaxLen4000:
      type: string
      minLength: 1
      maxLength: 4000
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u007e]+"
    HeartbeatTimeout:
      type: integer
    NotificationTargetResourceName:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    DeletionProtection:
      type: string
      enum:
        - none
        - prevent-force-deletion
        - prevent-all-deletion
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Describes a tag for an Auto Scaling group.
      type: object
      properties:
        ResourceId:
          $ref: "#/components/schemas/XmlString"
          description: The name of the Auto Scaling group.
        ResourceType:
          $ref: "#/components/schemas/XmlString"
          description: The type of resource. The only supported value is auto-scaling-group.
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The tag key.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The tag value.
        PropagateAtLaunch:
          $ref: "#/components/schemas/PropagateAtLaunch"
          description: Determines whether the tag is added to new instances as they are launched in the group.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    PropagateAtLaunch:
      type: boolean
    MaxInstanceLifetime:
      type: integer
    Context:
      type: string
    DefaultInstanceWarmup:
      type: integer
    InstanceMaintenancePolicy:
      description: Describes an instance maintenance policy. For more information, see Set instance maintenance policy in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        MinHealthyPercentage:
          $ref: "#/components/schemas/IntPercentResettable"
          description: Specifies the lower threshold as a percentage of the desired capacity of the Auto Scaling group. It represents the minimum percentage of the group to keep in service, healthy, and ready to use to support your workload when replacing instances. Value range is 0 to 100. To clear a previously set value, specify a value of -1.
        MaxHealthyPercentage:
          $ref: "#/components/schemas/IntPercent100To200Resettable"
          description: Specifies the upper threshold as a percentage of the desired capacity of the Auto Scaling group. It represents the maximum percentage of the group that can be in service and healthy, or pending, to support your workload when replacing instances. Value range is 100 to 200. To clear a previously set value, specify a value of -1. Both MinHealthyPercentage and MaxHealthyPercentage must be specified, and the difference between them cannot be greater than 100. A large range increases the number of instances that can be replaced at the same time.
    IntPercentResettable:
      type: integer
      minimum: -1
      maximum: 100
    IntPercent100To200Resettable:
      type: integer
      minimum: -1
      maximum: 200
    AvailabilityZoneDistribution:
      description: Describes an Availability Zone distribution.
      type: object
      properties:
        CapacityDistributionStrategy:
          $ref: "#/components/schemas/CapacityDistributionStrategy"
          description: If launches fail in an Availability Zone, the following strategies are available. The default is balanced-best-effort. balanced-only - If launches fail in an Availability Zone, Auto Scaling will continue to attempt to launch in the unhealthy zone to preserve a balanced distribution. balanced-best-effort - If launches fail in an Availability Zone, Auto Scaling will attempt to launch in another healthy Availability Zone instead.
    CapacityDistributionStrategy:
      type: string
      enum:
        - balanced-only
        - balanced-best-effort
    AvailabilityZoneImpairmentPolicy:
      description: Describes an Availability Zone impairment policy.
      type: object
      properties:
        ZonalShiftEnabled:
          $ref: "#/components/schemas/ZonalShiftEnabled"
          description: If true, enable zonal shift for your Auto Scaling group.
        ImpairedZoneHealthCheckBehavior:
          $ref: "#/components/schemas/ImpairedZoneHealthCheckBehavior"
          description: Specifies the health check behavior for the impaired Availability Zone in an active zonal shift. If you select Replace unhealthy, instances that appear unhealthy will be replaced in all Availability Zones. If you select Ignore unhealthy, instances will not be replaced in the Availability Zone with the active zonal shift. For more information, see Auto Scaling group zonal shift in the Amazon EC2 Auto Scaling User Guide.
    ZonalShiftEnabled:
      type: boolean
    ImpairedZoneHealthCheckBehavior:
      type: string
      enum:
        - ReplaceUnhealthy
        - IgnoreUnhealthy
    CapacityReservationSpecification:
      description: Describes the Capacity Reservation preference and targeting options. If you specify open or none for CapacityReservationPreference, do not specify a CapacityReservationTarget.
      type: object
      properties:
        CapacityReservationPreference:
          $ref: "#/components/schemas/CapacityReservationPreference"
          description: "The capacity reservation preference. The following options are available: capacity-reservations-only - Auto Scaling will only launch instances into a Capacity Reservation or Capacity Reservation resource group. If capacity isn't available, instances will fail to launch. capacity-reservations-first - Auto Scaling will try to launch instances into a Capacity Reservation or Capacity Reservation resource group first. If capacity isn't available, instances will run in On-Demand capacity. none - Auto Scaling will not launch instances into a Capacity Reservation. Instances will run in On-Demand capacity. default - Auto Scaling uses the Capacity Reservation preference from your launch template or an open Capacity Reservation."
        CapacityReservationTarget:
          $ref: "#/components/schemas/CapacityReservationTarget"
          description: Describes a target Capacity Reservation or Capacity Reservation resource group.
    CapacityReservationPreference:
      type: string
      enum:
        - capacity-reservations-only
        - capacity-reservations-first
        - none
        - default
    CapacityReservationTarget:
      description: The target for the Capacity Reservation. Specify Capacity Reservations IDs or Capacity Reservation resource group ARNs.
      type: object
      properties:
        CapacityReservationIds:
          $ref: "#/components/schemas/CapacityReservationIds"
          description: The Capacity Reservation IDs to launch instances into.
        CapacityReservationResourceGroupArns:
          $ref: "#/components/schemas/CapacityReservationResourceGroupArns"
          description: The resource group ARNs of the Capacity Reservation to launch instances into.
    CapacityReservationIds:
      type: array
      items:
        $ref: "#/components/schemas/AsciiStringMaxLen255"
    CapacityReservationResourceGroupArns:
      type: array
      items:
        $ref: "#/components/schemas/ResourceName"
    InstanceLifecyclePolicy:
      description: The instance lifecycle policy for the Auto Scaling group. This policy controls instance behavior when an instance transitions through its lifecycle states. Configure retention triggers to specify when instances should move to a Retained state instead of automatic termination. For more information, see Control instance retention with instance lifecycle policies in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        RetentionTriggers:
          $ref: "#/components/schemas/RetentionTriggers"
          description: Specifies the conditions that trigger instance retention behavior. These triggers determine when instances should move to a Retained state instead of automatic termination. This allows you to maintain control over instance management when lifecycles transition and operations fail.
    RetentionTriggers:
      description: Defines the specific triggers that cause instances to be retained in a Retained state rather than terminated. Each trigger corresponds to a different failure scenario during the instance lifecycle. This allows fine-grained control over when to preserve instances for manual intervention.
      type: object
      properties:
        TerminateHookAbandon:
          $ref: "#/components/schemas/RetentionAction"
          description: Specifies the action when a termination lifecycle hook is abandoned due to failure, timeout, or explicit abandonment (calling CompleteLifecycleAction). Set to retain to move instances to a retained state. Set to terminate for default termination behavior. Retained instances don't count toward desired capacity and remain until you call TerminateInstanceInAutoScalingGroup.
    RetentionAction:
      type: string
      enum:
        - retain
        - terminate
    CreateAutoScalingGroupType:
      type: object
      properties:
        AutoScalingGroupName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the Auto Scaling group. This name must be unique per Region per account. The name can contain any ASCII character 33 to 126 including most punctuation characters, digits, and upper and lowercased letters. You cannot use a colon (:) in the name.
        LaunchConfigurationName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: "The name of the launch configuration to use to launch instances. Conditional: You must specify either a launch template (LaunchTemplate or MixedInstancesPolicy) or a launch configuration (LaunchConfigurationName or InstanceId)."
        LaunchTemplate:
          $ref: "#/components/schemas/LaunchTemplateSpecification"
          description: "Information used to specify the launch template and version to use to launch instances. Conditional: You must specify either a launch template (LaunchTemplate or MixedInstancesPolicy) or a launch configuration (LaunchConfigurationName or InstanceId). The launch template that is specified must be configured for use with an Auto Scaling group. For more information, see Create a launch template for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide."
        MixedInstancesPolicy:
          $ref: "#/components/schemas/MixedInstancesPolicy"
          description: The mixed instances policy. For more information, see Auto Scaling groups with multiple instance types and purchase options in the Amazon EC2 Auto Scaling User Guide.
        InstanceId:
          $ref: "#/components/schemas/XmlStringMaxLen19"
          description: The ID of the instance used to base the launch configuration on. If specified, Amazon EC2 Auto Scaling uses the configuration values from the specified instance to create a new launch configuration. To get the instance ID, use the Amazon EC2 DescribeInstances API operation. For more information, see Create an Auto Scaling group using parameters from an existing instance in the Amazon EC2 Auto Scaling User Guide.
        MinSize:
          $ref: "#/components/schemas/AutoScalingGroupMinSize"
          description: The minimum size of the group.
        MaxSize:
          $ref: "#/components/schemas/AutoScalingGroupMaxSize"
          description: The maximum size of the group. With a mixed instances policy that uses instance weighting, Amazon EC2 Auto Scaling may need to go above MaxSize to meet your capacity requirements. In this event, Amazon EC2 Auto Scaling will never go above MaxSize by more than your largest instance weight (weights that define how many units each instance contributes to the desired capacity of the group).
        DesiredCapacity:
          $ref: "#/components/schemas/AutoScalingGroupDesiredCapacity"
          description: The desired capacity is the initial capacity of the Auto Scaling group at the time of its creation and the capacity it attempts to maintain. It can scale beyond this capacity if you configure auto scaling. This number must be greater than or equal to the minimum size of the group and less than or equal to the maximum size of the group. If you do not specify a desired capacity, the default is the minimum size of the group.
        DefaultCooldown:
          $ref: "#/components/schemas/Cooldown"
          description: "Only needed if you use simple scaling policies. The amount of time, in seconds, between one scaling activity ending and another one starting due to simple scaling policies. For more information, see Scaling cooldowns for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Default: 300 seconds"
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: A list of Availability Zones where instances in the Auto Scaling group can be created. Used for launching into the default VPC subnet in each Availability Zone when not using the VPCZoneIdentifier property, or for attaching a network interface when an existing network interface ID is specified in a launch template.
        AvailabilityZoneIds:
          $ref: "#/components/schemas/AvailabilityZoneIds"
          description: A list of Availability Zone IDs where the Auto Scaling group can launch instances. You cannot specify both AvailabilityZones and AvailabilityZoneIds in the same request.
        LoadBalancerNames:
          $ref: "#/components/schemas/LoadBalancerNames"
          description: A list of Classic Load Balancers associated with this Auto Scaling group. For Application Load Balancers, Network Load Balancers, and Gateway Load Balancers, specify the TargetGroupARNs property instead.
        TargetGroupARNs:
          $ref: "#/components/schemas/TargetGroupARNs"
          description: The Amazon Resource Names (ARN) of the Elastic Load Balancing target groups to associate with the Auto Scaling group. Instances are registered as targets with the target groups. The target groups receive incoming traffic and route requests to one or more registered targets. For more information, see Use Elastic Load Balancing to distribute traffic across the instances in your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
        HealthCheckType:
          $ref: "#/components/schemas/XmlStringMaxLen32"
          description: A comma-separated value string of one or more health check types. The valid values are EC2, EBS, ELB, and VPC_LATTICE. EC2 is the default health check and cannot be disabled. For more information, see Health checks for instances in an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. Only specify EC2 if you must clear a value that was previously set.
        HealthCheckGracePeriod:
          $ref: "#/components/schemas/HealthCheckGracePeriod"
          description: "The amount of time, in seconds, that Amazon EC2 Auto Scaling waits before checking the health status of an EC2 instance that has come into service and marking it unhealthy due to a failed health check. This is useful if your instances do not immediately pass their health checks after they enter the InService state. For more information, see Set the health check grace period for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. Default: 0 seconds"
        PlacementGroup:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the placement group into which to launch your instances. For more information, see Placement groups in the Amazon EC2 User Guide. A cluster placement group is a logical grouping of instances within a single Availability Zone. You cannot specify multiple Availability Zones and a cluster placement group.
        VPCZoneIdentifier:
          $ref: "#/components/schemas/XmlStringMaxLen5000"
          description: A comma-separated list of subnet IDs for a virtual private cloud (VPC) where instances in the Auto Scaling group can be created. If you specify VPCZoneIdentifier with AvailabilityZones, the subnets that you specify must reside in those Availability Zones.
        TerminationPolicies:
          $ref: "#/components/schemas/TerminationPolicies"
          description: "A policy or a list of policies that are used to select the instance to terminate. These policies are executed in the order that you list them. For more information, see Configure termination policies for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Valid values: Default | AllocationStrategy | ClosestToNextInstanceHour | NewestInstance | OldestInstance | OldestLaunchConfiguration | OldestLaunchTemplate | arn:aws:lambda:region:account-id:function:my-function:my-alias"
        NewInstancesProtectedFromScaleIn:
          $ref: "#/components/schemas/InstanceProtected"
          description: Indicates whether newly launched instances are protected from termination by Amazon EC2 Auto Scaling when scaling in. For more information about preventing instances from terminating on scale in, see Use instance scale-in protection in the Amazon EC2 Auto Scaling User Guide.
        CapacityRebalance:
          $ref: "#/components/schemas/CapacityRebalanceEnabled"
          description: Indicates whether Capacity Rebalancing is enabled. Otherwise, Capacity Rebalancing is disabled. When you turn on Capacity Rebalancing, Amazon EC2 Auto Scaling attempts to launch a Spot Instance whenever Amazon EC2 notifies that a Spot Instance is at an elevated risk of interruption. After launching a new instance, it then terminates an old instance. For more information, see Use Capacity Rebalancing to handle Amazon EC2 Spot Interruptions in the in the Amazon EC2 Auto Scaling User Guide.
        LifecycleHookSpecificationList:
          $ref: "#/components/schemas/LifecycleHookSpecifications"
          description: One or more lifecycle hooks to add to the Auto Scaling group before instances are launched.
        DeletionProtection:
          $ref: "#/components/schemas/DeletionProtection"
          description: "The deletion protection setting for the Auto Scaling group. This setting helps safeguard your Auto Scaling group and its instances by controlling whether the DeleteAutoScalingGroup operation is allowed. When deletion protection is enabled, users cannot delete the Auto Scaling group according to the specified protection level until the setting is changed back to a less restrictive level. The valid values are none, prevent-force-deletion, and prevent-all-deletion. Default: none For more information, see Configure deletion protection for your Amazon EC2 Auto Scaling resources in the Amazon EC2 Auto Scaling User Guide."
        Tags:
          $ref: "#/components/schemas/Tags"
          description: One or more tags. You can tag your Auto Scaling group and propagate the tags to the Amazon EC2 instances it launches. Tags are not propagated to Amazon EBS volumes. To add tags to Amazon EBS volumes, specify the tags in a launch template but use caution. If the launch template specifies an instance tag with a key that is also specified for the Auto Scaling group, Amazon EC2 Auto Scaling overrides the value of that instance tag with the value specified by the Auto Scaling group. For more information, see Tag Auto Scaling groups and instances in the Amazon EC2 Auto Scaling User Guide.
        ServiceLinkedRoleARN:
          $ref: "#/components/schemas/ResourceName"
          description: The Amazon Resource Name (ARN) of the service-linked role that the Auto Scaling group uses to call other Amazon Web Services service on your behalf. By default, Amazon EC2 Auto Scaling uses a service-linked role named AWSServiceRoleForAutoScaling, which it creates if it does not exist. For more information, see Service-linked roles in the Amazon EC2 Auto Scaling User Guide.
        MaxInstanceLifetime:
          $ref: "#/components/schemas/MaxInstanceLifetime"
          description: The maximum amount of time, in seconds, that an instance can be in service. The default is null. If specified, the value must be either 0 or a number equal to or greater than 86,400 seconds (1 day). For more information, see Replace Auto Scaling instances based on maximum instance lifetime in the Amazon EC2 Auto Scaling User Guide.
        Context:
          $ref: "#/components/schemas/Context"
          description: Reserved.
        DesiredCapacityType:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: "The unit of measurement for the value specified for desired capacity. Amazon EC2 Auto Scaling supports DesiredCapacityType for attribute-based instance type selection only. For more information, see Create a mixed instances group using attribute-based instance type selection in the Amazon EC2 Auto Scaling User Guide. By default, Amazon EC2 Auto Scaling specifies units, which translates into number of instances. Valid values: units | vcpu | memory-mib"
        DefaultInstanceWarmup:
          $ref: "#/components/schemas/DefaultInstanceWarmup"
          description: "The amount of time, in seconds, until a new instance is considered to have finished initializing and resource consumption to become stable after it enters the InService state. During an instance refresh, Amazon EC2 Auto Scaling waits for the warm-up period after it replaces an instance before it moves on to replacing the next instance. Amazon EC2 Auto Scaling also waits for the warm-up period before aggregating the metrics for new instances with existing instances in the Amazon CloudWatch metrics that are used for scaling, resulting in more reliable usage data. For more information, see Set the default instance warmup for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. To manage various warm-up settings at the group level, we recommend that you set the default instance warmup, even if it is set to 0 seconds. To remove a value that you previously set, include the property but specify -1 for the value. However, we strongly recommend keeping the default instance warmup enabled by specifying a value of 0 or other nominal value. Default: None"
        TrafficSources:
          $ref: "#/components/schemas/TrafficSources"
          description: "The list of traffic sources to attach to this Auto Scaling group. You can use any of the following as traffic sources for an Auto Scaling group: Classic Load Balancer, Application Load Balancer, Gateway Load Balancer, Network Load Balancer, and VPC Lattice."
        InstanceMaintenancePolicy:
          $ref: "#/components/schemas/InstanceMaintenancePolicy"
          description: An instance maintenance policy. For more information, see Set instance maintenance policy in the Amazon EC2 Auto Scaling User Guide.
        AvailabilityZoneDistribution:
          $ref: "#/components/schemas/AvailabilityZoneDistribution"
          description: The instance capacity distribution across Availability Zones.
        AvailabilityZoneImpairmentPolicy:
          $ref: "#/components/schemas/AvailabilityZoneImpairmentPolicy"
          description: The policy for Availability Zone impairment.
        SkipZonalShiftValidation:
          $ref: "#/components/schemas/SkipZonalShiftValidation"
          description: If you enable zonal shift with cross-zone disabled load balancers, capacity could become imbalanced across Availability Zones. To skip the validation, specify true. For more information, see Auto Scaling group zonal shift in the Amazon EC2 Auto Scaling User Guide.
        CapacityReservationSpecification:
          $ref: "#/components/schemas/CapacityReservationSpecification"
          description: The capacity reservation specification for the Auto Scaling group.
        InstanceLifecyclePolicy:
          $ref: "#/components/schemas/InstanceLifecyclePolicy"
          description: The instance lifecycle policy for the Auto Scaling group. This policy controls instance behavior when an instance transitions through its lifecycle states. Configure retention triggers to specify when instances should move to a Retained state instead of automatic termination. For more information, see Control instance retention with instance lifecycle policies in the Amazon EC2 Auto Scaling User Guide. Instances in a Retained state will continue to incur standard EC2 charges until terminated.
      required:
        - AutoScalingGroupName
        - MinSize
        - MaxSize
    SecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/XmlString"
    ClassicLinkVPCSecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen255"
    XmlStringUserData:
      type: string
      maxLength: 21847
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    BlockDeviceMappings:
      type: array
      items:
        $ref: "#/components/schemas/BlockDeviceMapping"
    BlockDeviceMapping:
      description: Describes a block device mapping.
      type: object
      properties:
        VirtualName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the instance store volume (virtual device) to attach to an instance at launch. The name must be in the form ephemeralX where X is a number starting from zero (0), for example, ephemeral0.
        DeviceName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: "The device name assigned to the volume (for example, /dev/sdh or xvdh). For more information, see Device naming on Linux instances in the Amazon EC2 User Guide. To define a block device mapping, set the device name and exactly one of the following properties: Ebs, NoDevice, or VirtualName."
        Ebs:
          $ref: "#/components/schemas/Ebs"
          description: Information to attach an EBS volume to an instance at launch.
        NoDevice:
          $ref: "#/components/schemas/NoDevice"
          description: Setting this value to true prevents a volume that is included in the block device mapping of the AMI from being mapped to the specified device name at launch. If NoDevice is true for the root device, instances might fail the EC2 health check. In that case, Amazon EC2 Auto Scaling launches replacement instances.
      required:
        - DeviceName
    Ebs:
      description: Describes information used to set up an Amazon EBS volume specified in a block device mapping.
      type: object
      properties:
        SnapshotId:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The snapshot ID of the volume to use. You must specify either a VolumeSize or a SnapshotId.
        VolumeSize:
          $ref: "#/components/schemas/BlockDeviceEbsVolumeSize"
          description: "The volume size, in GiBs. The following are the supported volumes sizes for each volume type: gp2 and gp3: 1-16,384 io1: 4-16,384 st1 and sc1: 125-16,384 standard: 1-1,024 You must specify either a SnapshotId or a VolumeSize. If you specify both SnapshotId and VolumeSize, the volume size must be equal or greater than the size of the snapshot."
        VolumeType:
          $ref: "#/components/schemas/BlockDeviceEbsVolumeType"
          description: "The volume type. For more information, see Amazon EBS volume types in the Amazon EBS User Guide. Valid values: standard | io1 | gp2 | st1 | sc1 | gp3"
        DeleteOnTermination:
          $ref: "#/components/schemas/BlockDeviceEbsDeleteOnTermination"
          description: Indicates whether the volume is deleted on instance termination. For Amazon EC2 Auto Scaling, the default value is true.
        Iops:
          $ref: "#/components/schemas/BlockDeviceEbsIops"
          description: "The number of input/output (I/O) operations per second (IOPS) to provision for the volume. For gp3 and io1 volumes, this represents the number of IOPS that are provisioned for the volume. For gp2 volumes, this represents the baseline performance of the volume and the rate at which the volume accumulates I/O credits for bursting. The following are the supported values for each volume type: gp3: 3,000-16,000 IOPS io1: 100-64,000 IOPS For io1 volumes, we guarantee 64,000 IOPS only for Instances built on the Amazon Web Services Nitro System. Other instance families guarantee performance up to 32,000 IOPS. Iops is supported when the volume type is gp3 or io1 and required only when the volume type is io1. (Not used with standard, gp2, st1, or sc1 volumes.)"
        Encrypted:
          $ref: "#/components/schemas/BlockDeviceEbsEncrypted"
          description: Specifies whether the volume should be encrypted. Encrypted EBS volumes can only be attached to instances that support Amazon EBS encryption. For more information, see Requirements for Amazon EBS encryption in the Amazon EBS User Guide. If your AMI uses encrypted volumes, you can also only launch it on supported instance types. If you are creating a volume from a snapshot, you cannot create an unencrypted volume from an encrypted snapshot. Also, you cannot specify a KMS key ID when using a launch configuration. If you enable encryption by default, the EBS volumes that you create are always encrypted, either using the Amazon Web Services managed KMS key or a customer-managed KMS key, regardless of whether the snapshot was encrypted. For more information, see Use Amazon Web Services KMS keys to encrypt Amazon EBS volumes in the Amazon EC2 Auto Scaling User Guide.
        Throughput:
          $ref: "#/components/schemas/BlockDeviceEbsThroughput"
          description: The throughput (MiBps) to provision for a gp3 volume.
    BlockDeviceEbsVolumeSize:
      type: integer
      minimum: 1
      maximum: 16384
    BlockDeviceEbsVolumeType:
      type: string
      minLength: 1
      maxLength: 255
    BlockDeviceEbsDeleteOnTermination:
      type: boolean
    BlockDeviceEbsIops:
      type: integer
      minimum: 100
      maximum: 20000
    BlockDeviceEbsEncrypted:
      type: boolean
    BlockDeviceEbsThroughput:
      type: integer
      minimum: 125
      maximum: 1000
    NoDevice:
      type: boolean
    InstanceMonitoring:
      description: Describes whether detailed monitoring is enabled for the Auto Scaling instances.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/MonitoringEnabled"
          description: If true, detailed monitoring is enabled. Otherwise, basic monitoring is enabled.
    MonitoringEnabled:
      type: boolean
    SpotPrice:
      type: string
      minLength: 1
      maxLength: 255
    EbsOptimized:
      type: boolean
    AssociatePublicIpAddress:
      type: boolean
    XmlStringMaxLen64:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    InstanceMetadataOptions:
      description: The metadata options for the instances. For more information, see Configure the instance metadata options in the Amazon EC2 Auto Scaling User Guide.
      type: object
      properties:
        HttpTokens:
          $ref: "#/components/schemas/InstanceMetadataHttpTokensState"
          description: The state of token usage for your instance metadata requests. If the parameter is not specified in the request, the default state is optional. If the state is optional, you can choose to retrieve instance metadata with or without a signed token header on your request. If you retrieve the IAM role credentials without a token, the version 1.0 role credentials are returned. If you retrieve the IAM role credentials using a valid signed token, the version 2.0 role credentials are returned. If the state is required, you must send a signed token header with any instance metadata retrieval requests. In this state, retrieving the IAM role credentials always returns the version 2.0 credentials; the version 1.0 credentials are not available.
        HttpPutResponseHopLimit:
          $ref: "#/components/schemas/InstanceMetadataHttpPutResponseHopLimit"
          description: "The desired HTTP PUT response hop limit for instance metadata requests. The larger the number, the further instance metadata requests can travel. Default: 1"
        HttpEndpoint:
          $ref: "#/components/schemas/InstanceMetadataEndpointState"
          description: This parameter enables or disables the HTTP metadata endpoint on your instances. If the parameter is not specified, the default state is enabled. If you specify a value of disabled, you will not be able to access your instance metadata.
    InstanceMetadataHttpTokensState:
      type: string
      enum:
        - optional
        - required
    InstanceMetadataHttpPutResponseHopLimit:
      type: integer
      minimum: 1
      maximum: 64
    InstanceMetadataEndpointState:
      type: string
      enum:
        - disabled
        - enabled
    CreateLaunchConfigurationType:
      type: object
      properties:
        LaunchConfigurationName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the launch configuration. This name must be unique per Region per account.
        ImageId:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The ID of the Amazon Machine Image (AMI) that was assigned during registration. For more information, see Find a Linux AMI in the Amazon EC2 User Guide. If you specify InstanceId, an ImageId is not required.
        KeyName:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The name of the key pair. For more information, see Amazon EC2 key pairs and Amazon EC2 instances in the Amazon EC2 User Guide.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: A list that contains the security group IDs to assign to the instances in the Auto Scaling group. For more information, see Control traffic to your Amazon Web Services resources using security groups in the Amazon Virtual Private Cloud User Guide.
        ClassicLinkVPCId:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: Available for backward compatibility.
        ClassicLinkVPCSecurityGroups:
          $ref: "#/components/schemas/ClassicLinkVPCSecurityGroups"
          description: Available for backward compatibility.
        UserData:
          $ref: "#/components/schemas/XmlStringUserData"
          description: The user data to make available to the launched EC2 instances. For more information, see Instance metadata and user data (Linux) and Instance metadata and user data (Windows). If you are using a command line tool, base64-encoding is performed for you, and you can load the text from a file. Otherwise, you must provide base64-encoded text. User data is limited to 16 KB.
        InstanceId:
          $ref: "#/components/schemas/XmlStringMaxLen19"
          description: The ID of the instance to use to create the launch configuration. The new launch configuration derives attributes from the instance, except for the block device mapping. To create a launch configuration with a block device mapping or override any other instance attributes, specify them as part of the same request. For more information, see Create a launch configuration in the Amazon EC2 Auto Scaling User Guide.
        InstanceType:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: Specifies the instance type of the EC2 instance. For information about available instance types, see Available instance types in the Amazon EC2 User Guide. If you specify InstanceId, an InstanceType is not required.
        KernelId:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The ID of the kernel associated with the AMI. We recommend that you use PV-GRUB instead of kernels and RAM disks. For more information, see User provided kernels in the Amazon EC2 User Guide.
        RamdiskId:
          $ref: "#/components/schemas/XmlStringMaxLen255"
          description: The ID of the RAM disk to select. We recommend that you use PV-GRUB instead of kernels and RAM disks. For more information, see User provided kernels in the Amazon EC2 User Guide.
        BlockDeviceMappings:
          $ref: "#/components/schemas/BlockDeviceMappings"
          description: The block device mapping entries that define the block devices to attach to the instances at launch. By default, the block devices specified in the block device mapping for the AMI are used. For more information, see Block device mappings in the Amazon EC2 User Guide.
        InstanceMonitoring:
          $ref: "#/components/schemas/InstanceMonitoring"
          description: Controls whether instances in this group are launched with detailed (true) or basic (false) monitoring. The default value is true (enabled). When detailed monitoring is enabled, Amazon CloudWatch generates metrics every minute and your account is charged a fee. When you disable detailed monitoring, CloudWatch generates metrics every 5 minutes. For more information, see Configure monitoring for Auto Scaling instances in the Amazon EC2 Auto Scaling User Guide.
        SpotPrice:
          $ref: "#/components/schemas/SpotPrice"
          description: "The maximum hourly price to be paid for any Spot Instance launched to fulfill the request. Spot Instances are launched when the price you specify exceeds the current Spot price. For more information, see Request Spot Instances for fault-tolerant and flexible applications in the Amazon EC2 Auto Scaling User Guide. Valid Range: Minimum value of 0.001 When you change your maximum price by creating a new launch configuration, running instances will continue to run as long as the maximum price for those running instances is higher than the current Spot price."
        IamInstanceProfile:
          $ref: "#/components/schemas/XmlStringMaxLen1600"
          description: The name or the Amazon Resource Name (ARN) of the instance profile associated with the IAM role for the instance. The instance profile contains the IAM role. For more information, see IAM role for applications that run on Amazon EC2 instances in the Amazon EC2 Auto Scaling User Guide.
        EbsOptimized:
          $ref: "#/components/schemas/EbsOptimized"
          description: Specifies whether the launch configuration is optimized for EBS I/O (true) or not (false). The optimization provides dedicated throughput to Amazon EBS and an optimized configuration stack to provide optimal I/O performance. This optimization is not available with all instance types. Additional fees are incurred when you enable EBS optimization for an instance type that is not EBS-optimized by default. For more information, see Amazon EBS-optimized instances in the Amazon EC2 User Guide. The default value is false.
        AssociatePublicIpAddress:
          $ref: "#/components/schemas/AssociatePublicIpAddress"
          description: Specifies whether to assign a public IPv4 address to the group's instances. If the instance is launched into a default subnet, the default is to assign a public IPv4 address, unless you disabled the option to assign a public IPv4 address on the subnet. If the instance is launched into a nondefault subnet, the default is not to assign a public IPv4 address, unless you enabled the option to assign a public IPv4 address on the subnet. If you specify true, each instance in the Auto Scaling group receives a unique public IPv4 address. For more information, see Provide network connectivity for your Auto Scaling instances using Amazon VPC in the Amazon EC2 Auto Scaling User Guide. If you specify this property, you must specify at least one subnet for VPCZoneIdentifier when you create your group.
        PlacementTenancy:
          $ref: "#/components/schemas/XmlStringMaxLen64"
          description: "The tenancy of the instance, either default or dedicated. An instance with dedicated tenancy runs on isolated, single-tenant hardware and can only be launched into a VPC. To launch dedicated instances into a shared tenancy VPC (a VPC with the instance placement tenancy attribute set to default), you must set the value of this property to dedicated. If you specify PlacementTenancy, you must specify at least one subnet for VPCZoneIdentifier when you create your group. Valid values: default | dedicated"
        MetadataOptions:
          $ref: "#/components/schemas/InstanceMetadataOptions"
          description: The metadata options for the instances. For more information, see Configure the instance metadata options in the Amazon EC2 Auto Scaling User Guide.
      required:
        - LaunchConfigurationName
