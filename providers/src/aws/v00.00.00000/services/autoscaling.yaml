          description: A unique, case-sensitive identifier to ensure idempotency of the request.
          schema:
            $ref: "#/components/schemas/ClientToken"
        - name: AvailabilityZones
          in: query
          required: false
          description: The Availability Zones for the instance launch. Must match or be included in the Auto Scaling group's Availability Zone configuration. Either AvailabilityZones or SubnetIds must be specified for groups with multiple Availability Zone configurations.
          schema:
            $ref: "#/components/schemas/AvailabilityZonesLimit1"
        - name: AvailabilityZoneIds
          in: query
