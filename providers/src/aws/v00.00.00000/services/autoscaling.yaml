openapi: 3.0.0
info:
  version: "2011-01-01"
  title: Auto Scaling
  description: Auto Scaling
  x-serviceName: autoscaling
  x-serviceAlias: autoscaling
  x-protocol: query
  x-apiVersion: "2011-01-01"
  x-endpointPrefix: autoscaling
servers:
  - url: https://autoscaling.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for autoscaling
paths:
  /?Action=AttachInstances&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AttachInstances
      description: Attaches one or more EC2 instances to the specified Auto Scaling group. When you attach instances, Amazon EC2 Auto Scaling increases the desired capacity of the group by the number of instances being attached. If the number of instances being attached plus the desired capacity of the group exceeds the maximum size of the group, the operation fails. If there is a Classic Load Balancer attached to your Auto Scaling group, the instances are also registered with the load balancer. If there are target groups attached to your Auto Scaling group, the instances are also registered with the target groups. For more information, see Detach or attach instances in the Amazon EC2 Auto Scaling User Guide.
      parameters:
        - name: InstanceIds
          in: query
          required: false
          description: The IDs of the instances. You can specify up to 20 instances.
          schema:
            $ref: "#/components/schemas/InstanceIds"
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_AttachInstances
      description: Attaches one or more EC2 instances to the specified Auto Scaling group. When you attach instances, Amazon EC2 Auto Scaling increases the desired capacity of the group by the number of instances being attached. If the number of instances being attached plus the desired capacity of the group exceeds the maximum size of the group, the operation fails. If there is a Classic Load Balancer attached to your Auto Scaling group, the instances are also registered with the load balancer. If there are target groups attached to your Auto Scaling group, the instances are also registered with the target groups. For more information, see Detach or attach instances in the Amazon EC2 Auto Scaling User Guide.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AttachInstancesQuery"
  /?Action=AttachLoadBalancerTargetGroups&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AttachLoadBalancerTargetGroups
      description: "This API operation is superseded by AttachTrafficSources, which can attach multiple traffic sources types. We recommend using AttachTrafficSources to simplify how you manage traffic sources. However, we continue to support AttachLoadBalancerTargetGroups. You can use both the original AttachLoadBalancerTargetGroups API operation and AttachTrafficSources on the same Auto Scaling group. Attaches one or more target groups to the specified Auto Scaling group. This operation is used with the following load balancer types: Application Load Balancer - Operates at the application layer (layer 7) and supports HTTP and HTTPS. Network Load Balancer - Operates at the transport layer (layer 4) and supports TCP, TLS, and UDP. Gateway Load Balancer - Operates at the network layer (layer 3). To describe the target groups for an Auto Scaling group, call the DescribeLoadBalancerTargetGroups API. To detach the target group from the Auto Scaling group, call the DetachLoadBalancerTargetGroups API. This operation is additive and does not detach existing target groups or Classic Load Balancers from the Auto Scaling group. For more information, see Use Elastic Load Balancing to distribute traffic across the instances in your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide."
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: TargetGroupARNs
          in: query
          required: true
          description: The Amazon Resource Names (ARNs) of the target groups. You can specify up to 10 target groups. To get the ARN of a target group, use the Elastic Load Balancing DescribeTargetGroups API operation.
          schema:
            $ref: "#/components/schemas/TargetGroupARNs"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancerTargetGroupsOutputDisplay"
    post:
      operationId: POST_AttachLoadBalancerTargetGroups
      description: "This API operation is superseded by AttachTrafficSources, which can attach multiple traffic sources types. We recommend using AttachTrafficSources to simplify how you manage traffic sources. However, we continue to support AttachLoadBalancerTargetGroups. You can use both the original AttachLoadBalancerTargetGroups API operation and AttachTrafficSources on the same Auto Scaling group. Attaches one or more target groups to the specified Auto Scaling group. This operation is used with the following load balancer types: Application Load Balancer - Operates at the application layer (layer 7) and supports HTTP and HTTPS. Network Load Balancer - Operates at the transport layer (layer 4) and supports TCP, TLS, and UDP. Gateway Load Balancer - Operates at the network layer (layer 3). To describe the target groups for an Auto Scaling group, call the DescribeLoadBalancerTargetGroups API. To detach the target group from the Auto Scaling group, call the DetachLoadBalancerTargetGroups API. This operation is additive and does not detach existing target groups or Classic Load Balancers from the Auto Scaling group. For more information, see Use Elastic Load Balancing to distribute traffic across the instances in your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancerTargetGroupsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AttachLoadBalancerTargetGroupsType"
  /?Action=AttachLoadBalancers&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AttachLoadBalancers
      description: This API operation is superseded by AttachTrafficSources, which can attach multiple traffic sources types. We recommend using AttachTrafficSources to simplify how you manage traffic sources. However, we continue to support AttachLoadBalancers. You can use both the original AttachLoadBalancers API operation and AttachTrafficSources on the same Auto Scaling group. Attaches one or more Classic Load Balancers to the specified Auto Scaling group. Amazon EC2 Auto Scaling registers the running instances with these Classic Load Balancers. To describe the load balancers for an Auto Scaling group, call the DescribeLoadBalancers API. To detach a load balancer from the Auto Scaling group, call the DetachLoadBalancers API. This operation is additive and does not detach existing Classic Load Balancers or target groups from the Auto Scaling group. For more information, see Use Elastic Load Balancing to distribute traffic across the instances in your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: LoadBalancerNames
          in: query
          required: true
          description: The names of the load balancers. You can specify up to 10 load balancers.
          schema:
            $ref: "#/components/schemas/LoadBalancerNames"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancersOutputDisplay"
    post:
      operationId: POST_AttachLoadBalancers
      description: This API operation is superseded by AttachTrafficSources, which can attach multiple traffic sources types. We recommend using AttachTrafficSources to simplify how you manage traffic sources. However, we continue to support AttachLoadBalancers. You can use both the original AttachLoadBalancers API operation and AttachTrafficSources on the same Auto Scaling group. Attaches one or more Classic Load Balancers to the specified Auto Scaling group. Amazon EC2 Auto Scaling registers the running instances with these Classic Load Balancers. To describe the load balancers for an Auto Scaling group, call the DescribeLoadBalancers API. To detach a load balancer from the Auto Scaling group, call the DetachLoadBalancers API. This operation is additive and does not detach existing Classic Load Balancers or target groups from the Auto Scaling group. For more information, see Use Elastic Load Balancing to distribute traffic across the instances in your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancersOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AttachLoadBalancersType"
  /?Action=AttachTrafficSources&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AttachTrafficSources
      description: "Attaches one or more traffic sources to the specified Auto Scaling group. You can use any of the following as traffic sources for an Auto Scaling group: Application Load Balancer Classic Load Balancer Gateway Load Balancer Network Load Balancer VPC Lattice This operation is additive and does not detach existing traffic sources from the Auto Scaling group. After the operation completes, use the DescribeTrafficSources API to return details about the state of the attachments between traffic sources and your Auto Scaling group. To detach a traffic source from the Auto Scaling group, call the DetachTrafficSources API."
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: TrafficSources
          in: query
          required: true
          description: The unique identifiers of one or more traffic sources. You can specify up to 10 traffic sources.
          schema:
            $ref: "#/components/schemas/TrafficSources"
        - name: SkipZonalShiftValidation
          in: query
          required: false
          description: If you enable zonal shift with cross-zone disabled load balancers, capacity could become imbalanced across Availability Zones. To skip the validation, specify true. For more information, see Auto Scaling group zonal shift in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/SkipZonalShiftValidation"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachTrafficSourcesOutputDisplay"
    post:
      operationId: POST_AttachTrafficSources
      description: "Attaches one or more traffic sources to the specified Auto Scaling group. You can use any of the following as traffic sources for an Auto Scaling group: Application Load Balancer Classic Load Balancer Gateway Load Balancer Network Load Balancer VPC Lattice This operation is additive and does not detach existing traffic sources from the Auto Scaling group. After the operation completes, use the DescribeTrafficSources API to return details about the state of the attachments between traffic sources and your Auto Scaling group. To detach a traffic source from the Auto Scaling group, call the DetachTrafficSources API."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachTrafficSourcesOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AttachTrafficSourcesType"
  /?Action=BatchDeleteScheduledAction&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_BatchDeleteScheduledAction
      description: Deletes one or more scheduled actions for the specified Auto Scaling group.
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: ScheduledActionNames
          in: query
          required: true
          description: The names of the scheduled actions to delete. The maximum number allowed is 50.
          schema:
            $ref: "#/components/schemas/ScheduledActionNames"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchDeleteScheduledActionOutputDisplay"
    post:
      operationId: POST_BatchDeleteScheduledAction
      description: Deletes one or more scheduled actions for the specified Auto Scaling group.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchDeleteScheduledActionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/BatchDeleteScheduledActionType"
  /?Action=BatchPutScheduledUpdateGroupAction&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_BatchPutScheduledUpdateGroupAction
      description: Creates or updates one or more scheduled scaling actions for an Auto Scaling group.
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: ScheduledUpdateGroupActions
          in: query
          required: true
          description: One or more scheduled actions. The maximum number allowed is 50.
          schema:
            $ref: "#/components/schemas/ScheduledUpdateGroupActionRequests"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchPutScheduledUpdateGroupActionOutputDisplay"
    post:
      operationId: POST_BatchPutScheduledUpdateGroupAction
      description: Creates or updates one or more scheduled scaling actions for an Auto Scaling group.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/BatchPutScheduledUpdateGroupActionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/BatchPutScheduledUpdateGroupActionType"
  /?Action=CancelInstanceRefresh&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CancelInstanceRefresh
      description: Cancels an instance refresh or rollback that is in progress. If an instance refresh or rollback is not in progress, an ActiveInstanceRefreshNotFound error occurs. This operation is part of the instance refresh feature in Amazon EC2 Auto Scaling, which helps you update instances in your Auto Scaling group after you make configuration changes. When you cancel an instance refresh, this does not roll back any changes that it made. Use the RollbackInstanceRefresh API to roll back instead.
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: WaitForTransitioningInstances
          in: query
          required: false
          description: When cancelling an instance refresh, this indicates whether to wait for in-flight launches and terminations to complete. The default is true. When set to false, Amazon EC2 Auto Scaling cancels the instance refresh without waiting for any pending launches or terminations to complete.
          schema:
            $ref: "#/components/schemas/BooleanType"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CancelInstanceRefreshOutputDisplay"
    post:
      operationId: POST_CancelInstanceRefresh
      description: Cancels an instance refresh or rollback that is in progress. If an instance refresh or rollback is not in progress, an ActiveInstanceRefreshNotFound error occurs. This operation is part of the instance refresh feature in Amazon EC2 Auto Scaling, which helps you update instances in your Auto Scaling group after you make configuration changes. When you cancel an instance refresh, this does not roll back any changes that it made. Use the RollbackInstanceRefresh API to roll back instead.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CancelInstanceRefreshOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CancelInstanceRefreshType"
  /?Action=CompleteLifecycleAction&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CompleteLifecycleAction
      description: "Completes the lifecycle action for the specified token or instance with the specified result. This step is a part of the procedure for adding a lifecycle hook to an Auto Scaling group: (Optional) Create a launch template or launch configuration with a user data script that runs while an instance is in a wait state due to a lifecycle hook. (Optional) Create a Lambda function and a rule that allows Amazon EventBridge to invoke your Lambda function when an instance is put into a wait state due to a lifecycle hook. (Optional) Create a notification target and an IAM role. The target can be either an Amazon SQS queue or an Amazon SNS topic. The role allows Amazon EC2 Auto Scaling to publish lifecycle notifications to the target. Create the lifecycle hook. Specify whether the hook is used when the instances launch or terminate. If you need more time, record the lifecycle action heartbeat to keep the instance in a wait state. If you finish before the timeout period ends, send a callback by using the CompleteLifecycleAction API call. For more information, see Complete a lifecycle action in the Amazon EC2 Auto Scaling User Guide."
      parameters:
        - name: LifecycleHookName
          in: query
          required: true
          description: The name of the lifecycle hook.
          schema:
            $ref: "#/components/schemas/AsciiStringMaxLen255"
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/ResourceName"
        - name: LifecycleActionToken
          in: query
          required: false
          description: A universally unique identifier (UUID) that identifies a specific lifecycle action associated with an instance. Amazon EC2 Auto Scaling sends this token to the notification target you specified when you created the lifecycle hook.
          schema:
            $ref: "#/components/schemas/LifecycleActionToken"
        - name: LifecycleActionResult
          in: query
          required: true
          description: The action for the group to take. You can specify either CONTINUE or ABANDON.
          schema:
            $ref: "#/components/schemas/LifecycleActionResult"
        - name: InstanceId
          in: query
          required: false
          description: The ID of the instance.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen19"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CompleteLifecycleActionOutputDisplay"
    post:
      operationId: POST_CompleteLifecycleAction
      description: "Completes the lifecycle action for the specified token or instance with the specified result. This step is a part of the procedure for adding a lifecycle hook to an Auto Scaling group: (Optional) Create a launch template or launch configuration with a user data script that runs while an instance is in a wait state due to a lifecycle hook. (Optional) Create a Lambda function and a rule that allows Amazon EventBridge to invoke your Lambda function when an instance is put into a wait state due to a lifecycle hook. (Optional) Create a notification target and an IAM role. The target can be either an Amazon SQS queue or an Amazon SNS topic. The role allows Amazon EC2 Auto Scaling to publish lifecycle notifications to the target. Create the lifecycle hook. Specify whether the hook is used when the instances launch or terminate. If you need more time, record the lifecycle action heartbeat to keep the instance in a wait state. If you finish before the timeout period ends, send a callback by using the CompleteLifecycleAction API call. For more information, see Complete a lifecycle action in the Amazon EC2 Auto Scaling User Guide."
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CompleteLifecycleActionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CompleteLifecycleActionType"
  /?Action=CreateAutoScalingGroup&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateAutoScalingGroup
      description: We strongly recommend using a launch template when calling this operation to ensure full functionality for Amazon EC2 Auto Scaling and Amazon EC2. Creates an Auto Scaling group with the specified name and attributes. If you exceed your maximum limit of Auto Scaling groups, the call fails. To query this limit, call the DescribeAccountLimits API. For information about updating this limit, see Quotas for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. If you're new to Amazon EC2 Auto Scaling, see the introductory tutorials in Get started with Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Every Auto Scaling group has three size properties (DesiredCapacity, MaxSize, and MinSize). Usually, you set these sizes based on a specific number of instances. However, if you configure a mixed instances policy that defines weights for the instance types, you must specify these sizes with the same units that you use for weighting instances.
      parameters:
        - name: AutoScalingGroupName
          in: query
          required: true
          description: The name of the Auto Scaling group. This name must be unique per Region per account. The name can contain any ASCII character 33 to 126 including most punctuation characters, digits, and upper and lowercased letters. You cannot use a colon (:) in the name.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: LaunchConfigurationName
          in: query
          required: false
          description: "The name of the launch configuration to use to launch instances. Conditional: You must specify either a launch template (LaunchTemplate or MixedInstancesPolicy) or a launch configuration (LaunchConfigurationName or InstanceId)."
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: LaunchTemplate
          in: query
          required: false
          description: "Information used to specify the launch template and version to use to launch instances. Conditional: You must specify either a launch template (LaunchTemplate or MixedInstancesPolicy) or a launch configuration (LaunchConfigurationName or InstanceId). The launch template that is specified must be configured for use with an Auto Scaling group. For more information, see Create a launch template for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide."
          schema:
            $ref: "#/components/schemas/LaunchTemplateSpecification"
        - name: MixedInstancesPolicy
          in: query
          required: false
          description: The mixed instances policy. For more information, see Auto Scaling groups with multiple instance types and purchase options in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/MixedInstancesPolicy"
        - name: InstanceId
          in: query
          required: false
          description: The ID of the instance used to base the launch configuration on. If specified, Amazon EC2 Auto Scaling uses the configuration values from the specified instance to create a new launch configuration. To get the instance ID, use the Amazon EC2 DescribeInstances API operation. For more information, see Create an Auto Scaling group using parameters from an existing instance in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen19"
        - name: MinSize
          in: query
          required: true
          description: The minimum size of the group.
          schema:
            $ref: "#/components/schemas/AutoScalingGroupMinSize"
        - name: MaxSize
          in: query
          required: true
          description: The maximum size of the group. With a mixed instances policy that uses instance weighting, Amazon EC2 Auto Scaling may need to go above MaxSize to meet your capacity requirements. In this event, Amazon EC2 Auto Scaling will never go above MaxSize by more than your largest instance weight (weights that define how many units each instance contributes to the desired capacity of the group).
          schema:
            $ref: "#/components/schemas/AutoScalingGroupMaxSize"
        - name: DesiredCapacity
          in: query
          required: false
          description: The desired capacity is the initial capacity of the Auto Scaling group at the time of its creation and the capacity it attempts to maintain. It can scale beyond this capacity if you configure auto scaling. This number must be greater than or equal to the minimum size of the group and less than or equal to the maximum size of the group. If you do not specify a desired capacity, the default is the minimum size of the group.
          schema:
            $ref: "#/components/schemas/AutoScalingGroupDesiredCapacity"
        - name: DefaultCooldown
          in: query
          required: false
          description: "Only needed if you use simple scaling policies. The amount of time, in seconds, between one scaling activity ending and another one starting due to simple scaling policies. For more information, see Scaling cooldowns for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Default: 300 seconds"
          schema:
            $ref: "#/components/schemas/Cooldown"
        - name: AvailabilityZones
          in: query
          required: false
          description: A list of Availability Zones where instances in the Auto Scaling group can be created. Used for launching into the default VPC subnet in each Availability Zone when not using the VPCZoneIdentifier property, or for attaching a network interface when an existing network interface ID is specified in a launch template.
          schema:
            $ref: "#/components/schemas/AvailabilityZones"
        - name: AvailabilityZoneIds
          in: query
          required: false
          description: A list of Availability Zone IDs where the Auto Scaling group can launch instances. You cannot specify both AvailabilityZones and AvailabilityZoneIds in the same request.
          schema:
            $ref: "#/components/schemas/AvailabilityZoneIds"
        - name: LoadBalancerNames
          in: query
          required: false
          description: A list of Classic Load Balancers associated with this Auto Scaling group. For Application Load Balancers, Network Load Balancers, and Gateway Load Balancers, specify the TargetGroupARNs property instead.
          schema:
            $ref: "#/components/schemas/LoadBalancerNames"
        - name: TargetGroupARNs
          in: query
          required: false
          description: The Amazon Resource Names (ARN) of the Elastic Load Balancing target groups to associate with the Auto Scaling group. Instances are registered as targets with the target groups. The target groups receive incoming traffic and route requests to one or more registered targets. For more information, see Use Elastic Load Balancing to distribute traffic across the instances in your Auto Scaling group in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/TargetGroupARNs"
        - name: HealthCheckType
          in: query
          required: false
          description: A comma-separated value string of one or more health check types. The valid values are EC2, EBS, ELB, and VPC_LATTICE. EC2 is the default health check and cannot be disabled. For more information, see Health checks for instances in an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. Only specify EC2 if you must clear a value that was previously set.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen32"
        - name: HealthCheckGracePeriod
          in: query
          required: false
          description: "The amount of time, in seconds, that Amazon EC2 Auto Scaling waits before checking the health status of an EC2 instance that has come into service and marking it unhealthy due to a failed health check. This is useful if your instances do not immediately pass their health checks after they enter the InService state. For more information, see Set the health check grace period for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. Default: 0 seconds"
          schema:
            $ref: "#/components/schemas/HealthCheckGracePeriod"
        - name: PlacementGroup
          in: query
          required: false
          description: The name of the placement group into which to launch your instances. For more information, see Placement groups in the Amazon EC2 User Guide. A cluster placement group is a logical grouping of instances within a single Availability Zone. You cannot specify multiple Availability Zones and a cluster placement group.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: VPCZoneIdentifier
          in: query
          required: false
          description: A comma-separated list of subnet IDs for a virtual private cloud (VPC) where instances in the Auto Scaling group can be created. If you specify VPCZoneIdentifier with AvailabilityZones, the subnets that you specify must reside in those Availability Zones.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen5000"
        - name: TerminationPolicies
          in: query
          required: false
          description: "A policy or a list of policies that are used to select the instance to terminate. These policies are executed in the order that you list them. For more information, see Configure termination policies for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Valid values: Default | AllocationStrategy | ClosestToNextInstanceHour | NewestInstance | OldestInstance | OldestLaunchConfiguration | OldestLaunchTemplate | arn:aws:lambda:region:account-id:function:my-function:my-alias"
          schema:
            $ref: "#/components/schemas/TerminationPolicies"
        - name: NewInstancesProtectedFromScaleIn
          in: query
          required: false
          description: Indicates whether newly launched instances are protected from termination by Amazon EC2 Auto Scaling when scaling in. For more information about preventing instances from terminating on scale in, see Use instance scale-in protection in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/InstanceProtected"
        - name: CapacityRebalance
          in: query
          required: false
          description: Indicates whether Capacity Rebalancing is enabled. Otherwise, Capacity Rebalancing is disabled. When you turn on Capacity Rebalancing, Amazon EC2 Auto Scaling attempts to launch a Spot Instance whenever Amazon EC2 notifies that a Spot Instance is at an elevated risk of interruption. After launching a new instance, it then terminates an old instance. For more information, see Use Capacity Rebalancing to handle Amazon EC2 Spot Interruptions in the in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/CapacityRebalanceEnabled"
        - name: LifecycleHookSpecificationList
          in: query
          required: false
          description: One or more lifecycle hooks to add to the Auto Scaling group before instances are launched.
          schema:
            $ref: "#/components/schemas/LifecycleHookSpecifications"
        - name: DeletionProtection
          in: query
          required: false
          description: "The deletion protection setting for the Auto Scaling group. This setting helps safeguard your Auto Scaling group and its instances by controlling whether the DeleteAutoScalingGroup operation is allowed. When deletion protection is enabled, users cannot delete the Auto Scaling group according to the specified protection level until the setting is changed back to a less restrictive level. The valid values are none, prevent-force-deletion, and prevent-all-deletion. Default: none For more information, see Configure deletion protection for your Amazon EC2 Auto Scaling resources in the Amazon EC2 Auto Scaling User Guide."
          schema:
            $ref: "#/components/schemas/DeletionProtection"
        - name: Tags
          in: query
          required: false
          description: One or more tags. You can tag your Auto Scaling group and propagate the tags to the Amazon EC2 instances it launches. Tags are not propagated to Amazon EBS volumes. To add tags to Amazon EBS volumes, specify the tags in a launch template but use caution. If the launch template specifies an instance tag with a key that is also specified for the Auto Scaling group, Amazon EC2 Auto Scaling overrides the value of that instance tag with the value specified by the Auto Scaling group. For more information, see Tag Auto Scaling groups and instances in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/Tags"
        - name: ServiceLinkedRoleARN
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the service-linked role that the Auto Scaling group uses to call other Amazon Web Services service on your behalf. By default, Amazon EC2 Auto Scaling uses a service-linked role named AWSServiceRoleForAutoScaling, which it creates if it does not exist. For more information, see Service-linked roles in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/ResourceName"
        - name: MaxInstanceLifetime
          in: query
          required: false
          description: The maximum amount of time, in seconds, that an instance can be in service. The default is null. If specified, the value must be either 0 or a number equal to or greater than 86,400 seconds (1 day). For more information, see Replace Auto Scaling instances based on maximum instance lifetime in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/MaxInstanceLifetime"
        - name: Context
          in: query
          required: false
          description: Reserved.
          schema:
            $ref: "#/components/schemas/Context"
        - name: DesiredCapacityType
          in: query
          required: false
          description: "The unit of measurement for the value specified for desired capacity. Amazon EC2 Auto Scaling supports DesiredCapacityType for attribute-based instance type selection only. For more information, see Create a mixed instances group using attribute-based instance type selection in the Amazon EC2 Auto Scaling User Guide. By default, Amazon EC2 Auto Scaling specifies units, which translates into number of instances. Valid values: units | vcpu | memory-mib"
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: DefaultInstanceWarmup
          in: query
          required: false
          description: "The amount of time, in seconds, until a new instance is considered to have finished initializing and resource consumption to become stable after it enters the InService state. During an instance refresh, Amazon EC2 Auto Scaling waits for the warm-up period after it replaces an instance before it moves on to replacing the next instance. Amazon EC2 Auto Scaling also waits for the warm-up period before aggregating the metrics for new instances with existing instances in the Amazon CloudWatch metrics that are used for scaling, resulting in more reliable usage data. For more information, see Set the default instance warmup for an Auto Scaling group in the Amazon EC2 Auto Scaling User Guide. To manage various warm-up settings at the group level, we recommend that you set the default instance warmup, even if it is set to 0 seconds. To remove a value that you previously set, include the property but specify -1 for the value. However, we strongly recommend keeping the default instance warmup enabled by specifying a value of 0 or other nominal value. Default: None"
          schema:
            $ref: "#/components/schemas/DefaultInstanceWarmup"
        - name: TrafficSources
          in: query
          required: false
          description: "The list of traffic sources to attach to this Auto Scaling group. You can use any of the following as traffic sources for an Auto Scaling group: Classic Load Balancer, Application Load Balancer, Gateway Load Balancer, Network Load Balancer, and VPC Lattice."
          schema:
            $ref: "#/components/schemas/TrafficSources"
        - name: InstanceMaintenancePolicy
          in: query
          required: false
          description: An instance maintenance policy. For more information, see Set instance maintenance policy in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/InstanceMaintenancePolicy"
        - name: AvailabilityZoneDistribution
          in: query
          required: false
          description: The instance capacity distribution across Availability Zones.
          schema:
            $ref: "#/components/schemas/AvailabilityZoneDistribution"
        - name: AvailabilityZoneImpairmentPolicy
          in: query
          required: false
          description: The policy for Availability Zone impairment.
          schema:
            $ref: "#/components/schemas/AvailabilityZoneImpairmentPolicy"
        - name: SkipZonalShiftValidation
          in: query
          required: false
          description: If you enable zonal shift with cross-zone disabled load balancers, capacity could become imbalanced across Availability Zones. To skip the validation, specify true. For more information, see Auto Scaling group zonal shift in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/SkipZonalShiftValidation"
        - name: CapacityReservationSpecification
          in: query
          required: false
          description: The capacity reservation specification for the Auto Scaling group.
          schema:
            $ref: "#/components/schemas/CapacityReservationSpecification"
        - name: InstanceLifecyclePolicy
          in: query
          required: false
          description: The instance lifecycle policy for the Auto Scaling group. This policy controls instance behavior when an instance transitions through its lifecycle states. Configure retention triggers to specify when instances should move to a Retained state instead of automatic termination. For more information, see Control instance retention with instance lifecycle policies in the Amazon EC2 Auto Scaling User Guide. Instances in a Retained state will continue to incur standard EC2 charges until terminated.
          schema:
            $ref: "#/components/schemas/InstanceLifecyclePolicy"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_CreateAutoScalingGroup
      description: We strongly recommend using a launch template when calling this operation to ensure full functionality for Amazon EC2 Auto Scaling and Amazon EC2. Creates an Auto Scaling group with the specified name and attributes. If you exceed your maximum limit of Auto Scaling groups, the call fails. To query this limit, call the DescribeAccountLimits API. For information about updating this limit, see Quotas for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. If you're new to Amazon EC2 Auto Scaling, see the introductory tutorials in Get started with Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. Every Auto Scaling group has three size properties (DesiredCapacity, MaxSize, and MinSize). Usually, you set these sizes based on a specific number of instances. However, if you configure a mixed instances policy that defines weights for the instance types, you must specify these sizes with the same units that you use for weighting instances.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateAutoScalingGroupType"
  /?Action=CreateLaunchConfiguration&Version=2011-01-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateLaunchConfiguration
      description: Creates a launch configuration. If you exceed your maximum limit of launch configurations, the call fails. To query this limit, call the DescribeAccountLimits API. For information about updating this limit, see Quotas for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. For more information, see Launch configurations in the Amazon EC2 Auto Scaling User Guide. Amazon EC2 Auto Scaling configures instances launched as part of an Auto Scaling group using either a launch template or a launch configuration. We strongly recommend that you do not use launch configurations. They do not provide full functionality for Amazon EC2 Auto Scaling or Amazon EC2. For information about using launch templates, see Launch templates in the Amazon EC2 Auto Scaling User Guide.
      parameters:
        - name: LaunchConfigurationName
          in: query
          required: true
          description: The name of the launch configuration. This name must be unique per Region per account.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: ImageId
          in: query
          required: false
          description: The ID of the Amazon Machine Image (AMI) that was assigned during registration. For more information, see Find a Linux AMI in the Amazon EC2 User Guide. If you specify InstanceId, an ImageId is not required.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: KeyName
          in: query
          required: false
          description: The name of the key pair. For more information, see Amazon EC2 key pairs and Amazon EC2 instances in the Amazon EC2 User Guide.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: SecurityGroups
          in: query
          required: false
          description: A list that contains the security group IDs to assign to the instances in the Auto Scaling group. For more information, see Control traffic to your Amazon Web Services resources using security groups in the Amazon Virtual Private Cloud User Guide.
          schema:
            $ref: "#/components/schemas/SecurityGroups"
        - name: ClassicLinkVPCId
          in: query
          required: false
          description: Available for backward compatibility.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: ClassicLinkVPCSecurityGroups
          in: query
          required: false
          description: Available for backward compatibility.
          schema:
            $ref: "#/components/schemas/ClassicLinkVPCSecurityGroups"
        - name: UserData
          in: query
          required: false
          description: The user data to make available to the launched EC2 instances. For more information, see Instance metadata and user data (Linux) and Instance metadata and user data (Windows). If you are using a command line tool, base64-encoding is performed for you, and you can load the text from a file. Otherwise, you must provide base64-encoded text. User data is limited to 16 KB.
          schema:
            $ref: "#/components/schemas/XmlStringUserData"
        - name: InstanceId
          in: query
          required: false
          description: The ID of the instance to use to create the launch configuration. The new launch configuration derives attributes from the instance, except for the block device mapping. To create a launch configuration with a block device mapping or override any other instance attributes, specify them as part of the same request. For more information, see Create a launch configuration in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen19"
        - name: InstanceType
          in: query
          required: false
          description: Specifies the instance type of the EC2 instance. For information about available instance types, see Available instance types in the Amazon EC2 User Guide. If you specify InstanceId, an InstanceType is not required.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: KernelId
          in: query
          required: false
          description: The ID of the kernel associated with the AMI. We recommend that you use PV-GRUB instead of kernels and RAM disks. For more information, see User provided kernels in the Amazon EC2 User Guide.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: RamdiskId
          in: query
          required: false
          description: The ID of the RAM disk to select. We recommend that you use PV-GRUB instead of kernels and RAM disks. For more information, see User provided kernels in the Amazon EC2 User Guide.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen255"
        - name: BlockDeviceMappings
          in: query
          required: false
          description: The block device mapping entries that define the block devices to attach to the instances at launch. By default, the block devices specified in the block device mapping for the AMI are used. For more information, see Block device mappings in the Amazon EC2 User Guide.
          schema:
            $ref: "#/components/schemas/BlockDeviceMappings"
        - name: InstanceMonitoring
          in: query
          required: false
          description: Controls whether instances in this group are launched with detailed (true) or basic (false) monitoring. The default value is true (enabled). When detailed monitoring is enabled, Amazon CloudWatch generates metrics every minute and your account is charged a fee. When you disable detailed monitoring, CloudWatch generates metrics every 5 minutes. For more information, see Configure monitoring for Auto Scaling instances in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/InstanceMonitoring"
        - name: SpotPrice
          in: query
          required: false
          description: "The maximum hourly price to be paid for any Spot Instance launched to fulfill the request. Spot Instances are launched when the price you specify exceeds the current Spot price. For more information, see Request Spot Instances for fault-tolerant and flexible applications in the Amazon EC2 Auto Scaling User Guide. Valid Range: Minimum value of 0.001 When you change your maximum price by creating a new launch configuration, running instances will continue to run as long as the maximum price for those running instances is higher than the current Spot price."
          schema:
            $ref: "#/components/schemas/SpotPrice"
        - name: IamInstanceProfile
          in: query
          required: false
          description: The name or the Amazon Resource Name (ARN) of the instance profile associated with the IAM role for the instance. The instance profile contains the IAM role. For more information, see IAM role for applications that run on Amazon EC2 instances in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen1600"
        - name: EbsOptimized
          in: query
          required: false
          description: Specifies whether the launch configuration is optimized for EBS I/O (true) or not (false). The optimization provides dedicated throughput to Amazon EBS and an optimized configuration stack to provide optimal I/O performance. This optimization is not available with all instance types. Additional fees are incurred when you enable EBS optimization for an instance type that is not EBS-optimized by default. For more information, see Amazon EBS-optimized instances in the Amazon EC2 User Guide. The default value is false.
          schema:
            $ref: "#/components/schemas/EbsOptimized"
        - name: AssociatePublicIpAddress
          in: query
          required: false
          description: Specifies whether to assign a public IPv4 address to the group's instances. If the instance is launched into a default subnet, the default is to assign a public IPv4 address, unless you disabled the option to assign a public IPv4 address on the subnet. If the instance is launched into a nondefault subnet, the default is not to assign a public IPv4 address, unless you enabled the option to assign a public IPv4 address on the subnet. If you specify true, each instance in the Auto Scaling group receives a unique public IPv4 address. For more information, see Provide network connectivity for your Auto Scaling instances using Amazon VPC in the Amazon EC2 Auto Scaling User Guide. If you specify this property, you must specify at least one subnet for VPCZoneIdentifier when you create your group.
          schema:
            $ref: "#/components/schemas/AssociatePublicIpAddress"
        - name: PlacementTenancy
          in: query
          required: false
          description: "The tenancy of the instance, either default or dedicated. An instance with dedicated tenancy runs on isolated, single-tenant hardware and can only be launched into a VPC. To launch dedicated instances into a shared tenancy VPC (a VPC with the instance placement tenancy attribute set to default), you must set the value of this property to dedicated. If you specify PlacementTenancy, you must specify at least one subnet for VPCZoneIdentifier when you create your group. Valid values: default | dedicated"
          schema:
            $ref: "#/components/schemas/XmlStringMaxLen64"
        - name: MetadataOptions
          in: query
          required: false
          description: The metadata options for the instances. For more information, see Configure the instance metadata options in the Amazon EC2 Auto Scaling User Guide.
          schema:
            $ref: "#/components/schemas/InstanceMetadataOptions"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_CreateLaunchConfiguration
      description: Creates a launch configuration. If you exceed your maximum limit of launch configurations, the call fails. To query this limit, call the DescribeAccountLimits API. For information about updating this limit, see Quotas for Amazon EC2 Auto Scaling in the Amazon EC2 Auto Scaling User Guide. For more information, see Launch configurations in the Amazon EC2 Auto Scaling User Guide. Amazon EC2 Auto Scaling configures instances launched as part of an Auto Scaling group using either a launch template or a launch configuration. We strongly recommend that you do not use launch configurations. They do not provide full functionality for Amazon EC2 Auto Scaling or Amazon EC2. For information about using launch templates, see Launch templates in the Amazon EC2 Auto Scaling User Guide.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateLaunchConfigurationType"
