openapi: 3.0.0
info:
  version: "2018-01-06"
  title: AWS Auto Scaling Plans
  description: AWS Auto Scaling Plans
  x-serviceName: autoscaling-plans
  x-serviceAlias: autoscaling_plans
  x-protocol: json
  x-apiVersion: "2018-01-06"
  x-endpointPrefix: autoscaling-plans
  x-targetPrefix: AnyScaleScalingPlannerFrontendService
  x-jsonVersion: "1.1"
servers:
  - url: https://autoscaling-plans.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for autoscaling-plans
paths:
  /CreateScalingPlan:
    post:
      operationId: CreateScalingPlan
      description: Creates a scaling plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleScalingPlannerFrontendService.CreateScalingPlan
            default: AnyScaleScalingPlannerFrontendService.CreateScalingPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScalingPlanName:
                  $ref: "#/components/schemas/ScalingPlanName"
                  description: The name of the scaling plan. Names cannot contain vertical bars, colons, or forward slashes.
                ApplicationSource:
                  $ref: "#/components/schemas/ApplicationSource"
                  description: A CloudFormation stack or set of tags. You can create one scaling plan per application source. For more information, see ApplicationSource in the AWS Auto Scaling API Reference.
                ScalingInstructions:
                  $ref: "#/components/schemas/ScalingInstructions"
                  description: The scaling instructions. For more information, see ScalingInstruction in the AWS Auto Scaling API Reference.
              required:
                - ScalingPlanName
                - ApplicationSource
                - ScalingInstructions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScalingPlanResponse"
  /DeleteScalingPlan:
    post:
      operationId: DeleteScalingPlan
      description: Deletes the specified scaling plan. Deleting a scaling plan deletes the underlying ScalingInstruction for all of the scalable resources that are covered by the plan. If the plan has launched resources or has scaling activities in progress, you must delete those resources separately.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleScalingPlannerFrontendService.DeleteScalingPlan
            default: AnyScaleScalingPlannerFrontendService.DeleteScalingPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScalingPlanName:
                  $ref: "#/components/schemas/ScalingPlanName"
                  description: The name of the scaling plan.
                ScalingPlanVersion:
                  $ref: "#/components/schemas/ScalingPlanVersion"
                  description: The version number of the scaling plan. Currently, the only valid value is 1.
              required:
                - ScalingPlanName
                - ScalingPlanVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScalingPlanResponse"
  /DescribeScalingPlanResources:
    post:
      operationId: DescribeScalingPlanResources
      description: Describes the scalable resources in the specified scaling plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleScalingPlannerFrontendService.DescribeScalingPlanResources
            default: AnyScaleScalingPlannerFrontendService.DescribeScalingPlanResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScalingPlanName:
                  $ref: "#/components/schemas/ScalingPlanName"
                  description: The name of the scaling plan.
                ScalingPlanVersion:
                  $ref: "#/components/schemas/ScalingPlanVersion"
                  description: The version number of the scaling plan. Currently, the only valid value is 1.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of scalable resources to return. The value must be between 1 and 50. The default value is 50.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for the next set of results.
              required:
                - ScalingPlanName
                - ScalingPlanVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScalingPlanResourcesResponse"
  /DescribeScalingPlans:
    post:
      operationId: DescribeScalingPlans
      description: Describes one or more of your scaling plans.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleScalingPlannerFrontendService.DescribeScalingPlans
            default: AnyScaleScalingPlannerFrontendService.DescribeScalingPlans
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScalingPlanNames:
                  $ref: "#/components/schemas/ScalingPlanNames"
                  description: The names of the scaling plans (up to 10). If you specify application sources, you cannot specify scaling plan names.
                ScalingPlanVersion:
                  $ref: "#/components/schemas/ScalingPlanVersion"
                  description: The version number of the scaling plan. Currently, the only valid value is 1. If you specify a scaling plan version, you must also specify a scaling plan name.
                ApplicationSources:
                  $ref: "#/components/schemas/ApplicationSources"
                  description: The sources for the applications (up to 10). If you specify scaling plan names, you cannot specify application sources.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of scalable resources to return. This value can be between 1 and 50. The default value is 50.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScalingPlansResponse"
  /GetScalingPlanResourceForecastData:
    post:
      operationId: GetScalingPlanResourceForecastData
      description: Retrieves the forecast data for a scalable resource. Capacity forecasts are represented as predicted values, or data points, that are calculated using historical data points from a specified CloudWatch load metric. Data points are available for up to 56 days.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleScalingPlannerFrontendService.GetScalingPlanResourceForecastData
            default: AnyScaleScalingPlannerFrontendService.GetScalingPlanResourceForecastData
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScalingPlanName:
                  $ref: "#/components/schemas/ScalingPlanName"
                  description: The name of the scaling plan.
                ScalingPlanVersion:
                  $ref: "#/components/schemas/ScalingPlanVersion"
                  description: The version number of the scaling plan. Currently, the only valid value is 1.
                ServiceNamespace:
                  $ref: "#/components/schemas/ServiceNamespace"
                  description: The namespace of the AWS service. The only valid value is autoscaling.
                ResourceId:
                  $ref: "#/components/schemas/XmlString"
                  description: "The ID of the resource. This string consists of a prefix (autoScalingGroup) followed by the name of a specified Auto Scaling group (my-asg). Example: autoScalingGroup/my-asg."
                ScalableDimension:
                  $ref: "#/components/schemas/ScalableDimension"
                  description: The scalable dimension for the resource. The only valid value is autoscaling:autoScalingGroup:DesiredCapacity.
                ForecastDataType:
                  $ref: "#/components/schemas/ForecastDataType"
                  description: "The type of forecast data to get. LoadForecast: The load metric forecast. CapacityForecast: The capacity forecast. ScheduledActionMinCapacity: The minimum capacity for each scheduled scaling action. This data is calculated as the larger of two values: the capacity forecast or the minimum capacity in the scaling instruction. ScheduledActionMaxCapacity: The maximum capacity for each scheduled scaling action. The calculation used is determined by the predictive scaling maximum capacity behavior setting in the scaling instruction."
                StartTime:
                  $ref: "#/components/schemas/TimestampType"
                  description: The inclusive start time of the time range for the forecast data to get. The date and time can be at most 56 days before the current date and time.
                EndTime:
                  $ref: "#/components/schemas/TimestampType"
                  description: The exclusive end time of the time range for the forecast data to get. The maximum time duration between the start and end time is seven days. Although this parameter can accept a date and time that is more than two days in the future, the availability of forecast data has limits. AWS Auto Scaling only issues forecasts for periods of two days in advance.
              required:
                - ScalingPlanName
                - ScalingPlanVersion
                - ServiceNamespace
                - ResourceId
                - ScalableDimension
                - ForecastDataType
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScalingPlanResourceForecastDataResponse"
  /UpdateScalingPlan:
    post:
      operationId: UpdateScalingPlan
      description: Updates the specified scaling plan. You cannot update a scaling plan if it is in the process of being created, updated, or deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AnyScaleScalingPlannerFrontendService.UpdateScalingPlan
            default: AnyScaleScalingPlannerFrontendService.UpdateScalingPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ScalingPlanName:
                  $ref: "#/components/schemas/ScalingPlanName"
                  description: The name of the scaling plan.
                ScalingPlanVersion:
                  $ref: "#/components/schemas/ScalingPlanVersion"
                  description: The version number of the scaling plan. The only valid value is 1. Currently, you cannot have multiple scaling plan versions.
                ApplicationSource:
                  $ref: "#/components/schemas/ApplicationSource"
                  description: A CloudFormation stack or set of tags. For more information, see ApplicationSource in the AWS Auto Scaling API Reference.
                ScalingInstructions:
                  $ref: "#/components/schemas/ScalingInstructions"
                  description: The scaling instructions. For more information, see ScalingInstruction in the AWS Auto Scaling API Reference.
              required:
                - ScalingPlanName
                - ScalingPlanVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScalingPlanResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ScalingPlanName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{Print}&&[^|:/]]+"
    ApplicationSource:
      description: Represents an application source.
      type: object
      properties:
        CloudFormationStackARN:
          $ref: "#/components/schemas/XmlString"
          description: The Amazon Resource Name (ARN) of a AWS CloudFormation stack.
        TagFilters:
          $ref: "#/components/schemas/TagFilters"
          description: A set of tags (up to 50).
    XmlString:
      type: string
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TagFilters:
      type: array
      items:
        $ref: "#/components/schemas/TagFilter"
    TagFilter:
      description: Represents a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/XmlStringMaxLen128"
          description: The tag key.
        Values:
          $ref: "#/components/schemas/TagValues"
          description: The tag values (0 to 20).
    XmlStringMaxLen128:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    TagValues:
      type: array
      items:
        $ref: "#/components/schemas/XmlStringMaxLen256"
    XmlStringMaxLen256:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    ScalingInstructions:
      type: array
      items:
        $ref: "#/components/schemas/ScalingInstruction"
    ScalingInstruction:
      description: Describes a scaling instruction for a scalable resource in a scaling plan. Each scaling instruction applies to one resource. AWS Auto Scaling creates target tracking scaling policies based on the scaling instructions. Target tracking scaling policies adjust the capacity of your scalable resource as required to maintain resource utilization at the target value that you specified. AWS Auto Scaling also configures predictive scaling for your Amazon EC2 Auto Scaling groups using a subset of parameters, including the load metric, the scaling metric, the target value for the scaling metric, the predictive scaling mode (forecast and scale or forecast only), and the desired behavior when the forecast capacity exceeds the maximum capacity of the resource. With predictive scaling, AWS Auto Scaling generates forecasts with traffic predictions for the two days ahead and schedules scaling actions that proactively add and remove resource capacity to match the forecast. We recommend waiting a minimum of 24 hours after creating an Auto Scaling group to configure predictive scaling. At minimum, there must be 24 hours of historical data to generate a forecast. For more information, see Best Practices for AWS Auto Scaling in the AWS Auto Scaling User Guide.
      type: object
      properties:
        ServiceNamespace:
          $ref: "#/components/schemas/ServiceNamespace"
          description: The namespace of the AWS service.
        ResourceId:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: "The ID of the resource. This string consists of the resource type and unique identifier. Auto Scaling group - The resource type is autoScalingGroup and the unique identifier is the name of the Auto Scaling group. Example: autoScalingGroup/my-asg. ECS service - The resource type is service and the unique identifier is the cluster name and service name. Example: service/default/sample-webapp. Spot Fleet request - The resource type is spot-fleet-request and the unique identifier is the Spot Fleet request ID. Example: spot-fleet-request/sfr-73fbd2ce-aa30-494c-8788-1cee4EXAMPLE. DynamoDB table - The resource type is table and the unique identifier is the resource ID. Example: table/my-table. DynamoDB global secondary index - The resource type is index and the unique identifier is the resource ID. Example: table/my-table/index/my-table-index. Aurora DB cluster - The resource type is cluster and the unique identifier is the cluster name. Example: cluster:my-db-cluster."
        ScalableDimension:
          $ref: "#/components/schemas/ScalableDimension"
          description: The scalable dimension associated with the resource. autoscaling:autoScalingGroup:DesiredCapacity - The desired capacity of an Auto Scaling group. ecs:service:DesiredCount - The desired task count of an ECS service. ec2:spot-fleet-request:TargetCapacity - The target capacity of a Spot Fleet request. dynamodb:table:ReadCapacityUnits - The provisioned read capacity for a DynamoDB table. dynamodb:table:WriteCapacityUnits - The provisioned write capacity for a DynamoDB table. dynamodb:index:ReadCapacityUnits - The provisioned read capacity for a DynamoDB global secondary index. dynamodb:index:WriteCapacityUnits - The provisioned write capacity for a DynamoDB global secondary index. rds:cluster:ReadReplicaCount - The count of Aurora Replicas in an Aurora DB cluster. Available for Aurora MySQL-compatible edition and Aurora PostgreSQL-compatible edition.
        MinCapacity:
          $ref: "#/components/schemas/ResourceCapacity"
          description: The minimum capacity of the resource.
        MaxCapacity:
          $ref: "#/components/schemas/ResourceCapacity"
          description: The maximum capacity of the resource. The exception to this upper limit is if you specify a non-default setting for PredictiveScalingMaxCapacityBehavior.
        TargetTrackingConfigurations:
          $ref: "#/components/schemas/TargetTrackingConfigurations"
          description: The target tracking configurations (up to 10). Each of these structures must specify a unique scaling metric and a target value for the metric.
        PredefinedLoadMetricSpecification:
          $ref: "#/components/schemas/PredefinedLoadMetricSpecification"
          description: The predefined load metric to use for predictive scaling. This parameter or a CustomizedLoadMetricSpecification is required when configuring predictive scaling, and cannot be used otherwise.
        CustomizedLoadMetricSpecification:
          $ref: "#/components/schemas/CustomizedLoadMetricSpecification"
          description: The customized load metric to use for predictive scaling. This parameter or a PredefinedLoadMetricSpecification is required when configuring predictive scaling, and cannot be used otherwise.
        ScheduledActionBufferTime:
          $ref: "#/components/schemas/ScheduledActionBufferTime"
          description: The amount of time, in seconds, to buffer the run time of scheduled scaling actions when scaling out. For example, if the forecast says to add capacity at 10:00 AM, and the buffer time is 5 minutes, then the run time of the corresponding scheduled scaling action will be 9:55 AM. The intention is to give resources time to be provisioned. For example, it can take a few minutes to launch an EC2 instance. The actual amount of time required depends on several factors, such as the size of the instance and whether there are startup scripts to complete. The value must be less than the forecast interval duration of 3600 seconds (60 minutes). The default is 300 seconds. Only valid when configuring predictive scaling.
        PredictiveScalingMaxCapacityBehavior:
          $ref: "#/components/schemas/PredictiveScalingMaxCapacityBehavior"
          description: "Defines the behavior that should be applied if the forecast capacity approaches or exceeds the maximum capacity specified for the resource. The default value is SetForecastCapacityToMaxCapacity. The following are possible values: SetForecastCapacityToMaxCapacity - AWS Auto Scaling cannot scale resource capacity higher than the maximum capacity. The maximum capacity is enforced as a hard limit. SetMaxCapacityToForecastCapacity - AWS Auto Scaling may scale resource capacity higher than the maximum capacity to equal but not exceed forecast capacity. SetMaxCapacityAboveForecastCapacity - AWS Auto Scaling may scale resource capacity higher than the maximum capacity by a specified buffer value. The intention is to give the target tracking scaling policy extra capacity if unexpected traffic occurs. Only valid when configuring predictive scaling."
        PredictiveScalingMaxCapacityBuffer:
          $ref: "#/components/schemas/ResourceCapacity"
          description: The size of the capacity buffer to use when the forecast capacity is close to or exceeds the maximum capacity. The value is specified as a percentage relative to the forecast capacity. For example, if the buffer is 10, this means a 10 percent buffer, such that if the forecast capacity is 50, and the maximum capacity is 40, then the effective maximum capacity is 55. Only valid when configuring predictive scaling. Required if the PredictiveScalingMaxCapacityBehavior is set to SetMaxCapacityAboveForecastCapacity, and cannot be used otherwise. The range is 1-100.
        PredictiveScalingMode:
          $ref: "#/components/schemas/PredictiveScalingMode"
          description: The predictive scaling mode. The default value is ForecastAndScale. Otherwise, AWS Auto Scaling forecasts capacity but does not create any scheduled scaling actions based on the capacity forecast.
        ScalingPolicyUpdateBehavior:
          $ref: "#/components/schemas/ScalingPolicyUpdateBehavior"
          description: "Controls whether a resource's externally created scaling policies are kept or replaced. The default value is KeepExternalPolicies. If the parameter is set to ReplaceExternalPolicies, any scaling policies that are external to AWS Auto Scaling are deleted and new target tracking scaling policies created. Only valid when configuring dynamic scaling. Condition: The number of existing policies to be replaced must be less than or equal to 50. If there are more than 50 policies to be replaced, AWS Auto Scaling keeps all existing policies and does not create new ones."
        DisableDynamicScaling:
          $ref: "#/components/schemas/DisableDynamicScaling"
          description: Controls whether dynamic scaling by AWS Auto Scaling is disabled. When dynamic scaling is enabled, AWS Auto Scaling creates target tracking scaling policies based on the specified target tracking configurations. The default is enabled (false).
      required:
        - ServiceNamespace
        - ResourceId
        - ScalableDimension
        - MinCapacity
        - MaxCapacity
        - TargetTrackingConfigurations
    ServiceNamespace:
      type: string
      enum:
        - autoscaling
        - ecs
        - ec2
        - rds
        - dynamodb
    ResourceIdMaxLen1600:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    ScalableDimension:
      type: string
      enum:
        - autoscaling:autoScalingGroup:DesiredCapacity
        - ecs:service:DesiredCount
        - ec2:spot-fleet-request:TargetCapacity
        - rds:cluster:ReadReplicaCount
        - dynamodb:table:ReadCapacityUnits
        - dynamodb:table:WriteCapacityUnits
        - dynamodb:index:ReadCapacityUnits
        - dynamodb:index:WriteCapacityUnits
    ResourceCapacity:
      type: integer
    TargetTrackingConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/TargetTrackingConfiguration"
    TargetTrackingConfiguration:
      description: Describes a target tracking configuration to use with AWS Auto Scaling. Used with ScalingInstruction and ScalingPolicy.
      type: object
      properties:
        PredefinedScalingMetricSpecification:
          $ref: "#/components/schemas/PredefinedScalingMetricSpecification"
          description: A predefined metric. You can specify either a predefined metric or a customized metric.
        CustomizedScalingMetricSpecification:
          $ref: "#/components/schemas/CustomizedScalingMetricSpecification"
          description: A customized metric. You can specify either a predefined metric or a customized metric.
        TargetValue:
          $ref: "#/components/schemas/MetricScale"
          description: The target value for the metric. Although this property accepts numbers of type Double, it won't accept values that are either too small or too large. Values must be in the range of -2^360 to 2^360.
        DisableScaleIn:
          $ref: "#/components/schemas/DisableScaleIn"
          description: Indicates whether scale in by the target tracking scaling policy is disabled. If the value is true, scale in is disabled and the target tracking scaling policy doesn't remove capacity from the scalable resource. Otherwise, scale in is enabled and the target tracking scaling policy can remove capacity from the scalable resource. The default value is false.
        ScaleOutCooldown:
          $ref: "#/components/schemas/Cooldown"
          description: The amount of time, in seconds, to wait for a previous scale-out activity to take effect. This property is not used if the scalable resource is an Auto Scaling group. With the scale-out cooldown period, the intention is to continuously (but not excessively) scale out. After Auto Scaling successfully scales out using a target tracking scaling policy, it starts to calculate the cooldown time. The scaling policy won't increase the desired capacity again unless either a larger scale out is triggered or the cooldown period ends.
        ScaleInCooldown:
          $ref: "#/components/schemas/Cooldown"
          description: The amount of time, in seconds, after a scale-in activity completes before another scale-in activity can start. This property is not used if the scalable resource is an Auto Scaling group. With the scale-in cooldown period, the intention is to scale in conservatively to protect your application’s availability, so scale-in activities are blocked until the cooldown period has expired. However, if another alarm triggers a scale-out activity during the scale-in cooldown period, Auto Scaling scales out the target immediately. In this case, the scale-in cooldown period stops and doesn't complete.
        EstimatedInstanceWarmup:
          $ref: "#/components/schemas/Cooldown"
          description: The estimated time, in seconds, until a newly launched instance can contribute to the CloudWatch metrics. This value is used only if the resource is an Auto Scaling group.
      required:
        - TargetValue
    PredefinedScalingMetricSpecification:
      description: Represents a predefined metric that can be used for dynamic scaling as part of a target tracking scaling policy.
      type: object
      properties:
        PredefinedScalingMetricType:
          $ref: "#/components/schemas/ScalingMetricType"
          description: The metric type. The ALBRequestCountPerTarget metric type applies only to Auto Scaling groups, Spot Fleet requests, and ECS services.
        ResourceLabel:
          $ref: "#/components/schemas/ResourceLabel"
          description: "Identifies the resource associated with the metric type. You can't specify a resource label unless the metric type is ALBRequestCountPerTarget and there is a target group for an Application Load Balancer attached to the Auto Scaling group, Spot Fleet request, or ECS service. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format is app/`<load-balancer-name>`/`<load-balancer-id>`/targetgroup/`<target-group-name>`/`<target-group-id>`, where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. This is an example: app/EC2Co-EcsEl-1TKLTMITMM0EO/f37c06a68c1748aa/targetgroup/EC2Co-Defau-LDNM7Q3ZH1ZN/6d4ea56ca2d6a18d. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
        - PredefinedScalingMetricType
    ScalingMetricType:
      type: string
      enum:
        - ASGAverageCPUUtilization
        - ASGAverageNetworkIn
        - ASGAverageNetworkOut
        - DynamoDBReadCapacityUtilization
        - DynamoDBWriteCapacityUtilization
        - ECSServiceAverageCPUUtilization
        - ECSServiceAverageMemoryUtilization
        - ALBRequestCountPerTarget
        - RDSReaderAverageCPUUtilization
        - RDSReaderAverageDatabaseConnections
        - EC2SpotFleetRequestAverageCPUUtilization
        - EC2SpotFleetRequestAverageNetworkIn
        - EC2SpotFleetRequestAverageNetworkOut
    ResourceLabel:
      type: string
      minLength: 1
      maxLength: 1023
    CustomizedScalingMetricSpecification:
      description: "Represents a CloudWatch metric of your choosing that can be used for dynamic scaling as part of a target tracking scaling policy. To create your customized scaling metric specification: Add values for each required parameter from CloudWatch. You can use an existing metric, or a new metric that you create. To use your own metric, you must first publish the metric to CloudWatch. For more information, see Publish Custom Metrics in the Amazon CloudWatch User Guide. Choose a metric that changes proportionally with capacity. The value of the metric should increase or decrease in inverse proportion to the number of capacity units. That is, the value of the metric should decrease when capacity increases. For information about terminology, available metrics, or how to publish new metrics, see Amazon CloudWatch Concepts in the Amazon CloudWatch User Guide."
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric.
        Namespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: The namespace of the metric.
        Dimensions:
          $ref: "#/components/schemas/MetricDimensions"
          description: "The dimensions of the metric. Conditional: If you published your metric with dimensions, you must specify the same dimensions in your customized scaling metric specification."
        Statistic:
          $ref: "#/components/schemas/MetricStatistic"
          description: The statistic of the metric.
        Unit:
          $ref: "#/components/schemas/MetricUnit"
          description: The unit of the metric.
      required:
        - MetricName
        - Namespace
        - Statistic
    MetricName:
