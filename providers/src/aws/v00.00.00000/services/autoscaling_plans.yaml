      pattern: \p{Print}+
    PolicyType:
      type: string
      enum:
        - TargetTrackingScaling
    ScalingStatusCode:
      type: string
      enum:
        - Inactive
        - PartiallyActive
        - Active
    ScalingPlanNames:
      type: array
      items:
        $ref: "#/components/schemas/ScalingPlanName"
    ApplicationSources:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationSource"
    DescribeScalingPlansResponse:
      type: object
      properties:
        ScalingPlans:
          $ref: "#/components/schemas/ScalingPlans"
          description: Information about the scaling plans.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The token required to get the next set of results. This value is null if there are no more results to return.
    ScalingPlans:
      type: array
      items:
        $ref: "#/components/schemas/ScalingPlan"
    ScalingPlan:
      description: Represents a scaling plan.
      type: object
      properties:
        ScalingPlanName:
          $ref: "#/components/schemas/ScalingPlanName"
          description: The name of the scaling plan.
        ScalingPlanVersion:
          $ref: "#/components/schemas/ScalingPlanVersion"
          description: The version number of the scaling plan.
        ApplicationSource:
          $ref: "#/components/schemas/ApplicationSource"
          description: A CloudFormation stack or a set of tags. You can create one scaling plan per application source.
        ScalingInstructions:
          $ref: "#/components/schemas/ScalingInstructions"
          description: The scaling instructions.
        StatusCode:
          $ref: "#/components/schemas/ScalingPlanStatusCode"
          description: The status of the scaling plan. Active - The scaling plan is active. ActiveWithProblems - The scaling plan is active, but the scaling configuration for one or more resources could not be applied. CreationInProgress - The scaling plan is being created. CreationFailed - The scaling plan could not be created. DeletionInProgress - The scaling plan is being deleted. DeletionFailed - The scaling plan could not be deleted. UpdateInProgress - The scaling plan is being updated. UpdateFailed - The scaling plan could not be updated.
        StatusMessage:
          $ref: "#/components/schemas/XmlString"
          description: A simple message about the current status of the scaling plan.
        StatusStartTime:
          $ref: "#/components/schemas/TimestampType"
          description: The Unix time stamp when the scaling plan entered the current status.
        CreationTime:
          $ref: "#/components/schemas/TimestampType"
          description: The Unix time stamp when the scaling plan was created.
      required:
        - ScalingPlanName
        - ScalingPlanVersion
        - ApplicationSource
        - ScalingInstructions
        - StatusCode
    ScalingPlanStatusCode:
      type: string
      enum:
        - Active
        - ActiveWithProblems
        - CreationInProgress
        - CreationFailed
        - DeletionInProgress
        - DeletionFailed
        - UpdateInProgress
        - UpdateFailed
    TimestampType:
      type: string
      format: date-time
    ForecastDataType:
      type: string
      enum:
        - CapacityForecast
        - LoadForecast
        - ScheduledActionMinCapacity
        - ScheduledActionMaxCapacity
    GetScalingPlanResourceForecastDataResponse:
      type: object
      properties:
        Datapoints:
          $ref: "#/components/schemas/Datapoints"
          description: The data points to return.
      required:
        - Datapoints
    Datapoints:
      type: array
      items:
        $ref: "#/components/schemas/Datapoint"
    Datapoint:
      description: Represents a single value in the forecast data used for predictive scaling.
      type: object
      properties:
