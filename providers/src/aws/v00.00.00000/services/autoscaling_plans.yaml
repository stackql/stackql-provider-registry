    Cooldown:
      type: integer
    PredefinedLoadMetricSpecification:
      description: Represents a predefined metric that can be used for predictive scaling. After creating your scaling plan, you can use the AWS Auto Scaling console to visualize forecasts for the specified metric. For more information, see View Scaling Information for a Resource in the AWS Auto Scaling User Guide.
      type: object
      properties:
        PredefinedLoadMetricType:
          $ref: "#/components/schemas/LoadMetricType"
          description: The metric type.
        ResourceLabel:
          $ref: "#/components/schemas/ResourceLabel"
          description: "Identifies the resource associated with the metric type. You can't specify a resource label unless the metric type is ALBTargetGroupRequestCount and there is a target group for an Application Load Balancer attached to the Auto Scaling group. You create the resource label by appending the final portion of the load balancer ARN and the final portion of the target group ARN into a single value, separated by a forward slash (/). The format is app/`<load-balancer-name>`/`<load-balancer-id>`/targetgroup/`<target-group-name>`/`<target-group-id>`, where: app/`<load-balancer-name>`/`<load-balancer-id>` is the final portion of the load balancer ARN targetgroup/`<target-group-name>`/`<target-group-id>` is the final portion of the target group ARN. This is an example: app/EC2Co-EcsEl-1TKLTMITMM0EO/f37c06a68c1748aa/targetgroup/EC2Co-Defau-LDNM7Q3ZH1ZN/6d4ea56ca2d6a18d. To find the ARN for an Application Load Balancer, use the DescribeLoadBalancers API operation. To find the ARN for the target group, use the DescribeTargetGroups API operation."
      required:
        - PredefinedLoadMetricType
    LoadMetricType:
      type: string
      enum:
        - ASGTotalCPUUtilization
        - ASGTotalNetworkIn
        - ASGTotalNetworkOut
        - ALBTargetGroupRequestCount
    CustomizedLoadMetricSpecification:
      description: Represents a CloudWatch metric of your choosing that can be used for predictive scaling. For predictive scaling to work with a customized load metric specification, AWS Auto Scaling needs access to the Sum and Average statistics that CloudWatch computes from metric data. When you choose a load metric, make sure that the required Sum and Average statistics for your metric are available in CloudWatch and that they provide relevant data for predictive scaling. The Sum statistic must represent the total load on the resource, and the Average statistic must represent the average load per capacity unit of the resource. For example, there is a metric that counts the number of requests processed by your Auto Scaling group. If the Sum statistic represents the total request count processed by the group, then the Average statistic for the specified metric must represent the average request count processed by each instance of the group. If you publish your own metrics, you can aggregate the data points at a given interval and then publish the aggregated data points to CloudWatch. Before AWS Auto Scaling generates the forecast, it sums up all the metric data points that occurred within each hour to match the granularity period that is used in the forecast (60 minutes). For information about terminology, available metrics, or how to publish new metrics, see Amazon CloudWatch Concepts in the Amazon CloudWatch User Guide. After creating your scaling plan, you can use the AWS Auto Scaling console to visualize forecasts for the specified metric. For more information, see View Scaling Information for a Resource in the AWS Auto Scaling User Guide.
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: The name of the metric.
        Namespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: The namespace of the metric.
        Dimensions:
          $ref: "#/components/schemas/MetricDimensions"
          description: "The dimensions of the metric. Conditional: If you published your metric with dimensions, you must specify the same dimensions in your customized load metric specification."
        Statistic:
          $ref: "#/components/schemas/MetricStatistic"
          description: The statistic of the metric. The only valid value is Sum.
        Unit:
          $ref: "#/components/schemas/MetricUnit"
          description: The unit of the metric.
      required:
        - MetricName
        - Namespace
        - Statistic
    ScheduledActionBufferTime:
      type: integer
      minimum: 0
    PredictiveScalingMaxCapacityBehavior:
      type: string
      enum:
        - SetForecastCapacityToMaxCapacity
        - SetMaxCapacityToForecastCapacity
        - SetMaxCapacityAboveForecastCapacity
    PredictiveScalingMode:
