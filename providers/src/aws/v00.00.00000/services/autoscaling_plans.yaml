    ScalingPlanResources:
      type: array
      items:
        $ref: "#/components/schemas/ScalingPlanResource"
    ScalingPlanResource:
      description: Represents a scalable resource.
      type: object
      properties:
        ScalingPlanName:
          $ref: "#/components/schemas/ScalingPlanName"
          description: The name of the scaling plan.
        ScalingPlanVersion:
          $ref: "#/components/schemas/ScalingPlanVersion"
          description: The version number of the scaling plan.
        ServiceNamespace:
          $ref: "#/components/schemas/ServiceNamespace"
          description: The namespace of the AWS service.
        ResourceId:
          $ref: "#/components/schemas/ResourceIdMaxLen1600"
          description: "The ID of the resource. This string consists of the resource type and unique identifier. Auto Scaling group - The resource type is autoScalingGroup and the unique identifier is the name of the Auto Scaling group. Example: autoScalingGroup/my-asg. ECS service - The resource type is service and the unique identifier is the cluster name and service name. Example: service/default/sample-webapp. Spot Fleet request - The resource type is spot-fleet-request and the unique identifier is the Spot Fleet request ID. Example: spot-fleet-request/sfr-73fbd2ce-aa30-494c-8788-1cee4EXAMPLE. DynamoDB table - The resource type is table and the unique identifier is the resource ID. Example: table/my-table. DynamoDB global secondary index - The resource type is index and the unique identifier is the resource ID. Example: table/my-table/index/my-table-index. Aurora DB cluster - The resource type is cluster and the unique identifier is the cluster name. Example: cluster:my-db-cluster."
        ScalableDimension:
          $ref: "#/components/schemas/ScalableDimension"
          description: The scalable dimension for the resource. autoscaling:autoScalingGroup:DesiredCapacity - The desired capacity of an Auto Scaling group. ecs:service:DesiredCount - The desired task count of an ECS service. ec2:spot-fleet-request:TargetCapacity - The target capacity of a Spot Fleet request. dynamodb:table:ReadCapacityUnits - The provisioned read capacity for a DynamoDB table. dynamodb:table:WriteCapacityUnits - The provisioned write capacity for a DynamoDB table. dynamodb:index:ReadCapacityUnits - The provisioned read capacity for a DynamoDB global secondary index. dynamodb:index:WriteCapacityUnits - The provisioned write capacity for a DynamoDB global secondary index. rds:cluster:ReadReplicaCount - The count of Aurora Replicas in an Aurora DB cluster. Available for Aurora MySQL-compatible edition and Aurora PostgreSQL-compatible edition.
        ScalingPolicies:
          $ref: "#/components/schemas/ScalingPolicies"
          description: The scaling policies.
        ScalingStatusCode:
          $ref: "#/components/schemas/ScalingStatusCode"
          description: The scaling status of the resource. Active - The scaling configuration is active. Inactive - The scaling configuration is not active because the scaling plan is being created or the scaling configuration could not be applied. Check the status message for more information. PartiallyActive - The scaling configuration is partially active because the scaling plan is being created or deleted or the scaling configuration could not be fully applied. Check the status message for more information.
        ScalingStatusMessage:
          $ref: "#/components/schemas/XmlString"
          description: A simple message about the current scaling status of the resource.
      required:
        - ScalingPlanName
        - ScalingPlanVersion
        - ServiceNamespace
        - ResourceId
        - ScalableDimension
        - ScalingStatusCode
    ScalingPolicies:
      type: array
      items:
        $ref: "#/components/schemas/ScalingPolicy"
    ScalingPolicy:
