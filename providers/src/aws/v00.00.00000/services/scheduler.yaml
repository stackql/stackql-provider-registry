openapi: 3.0.0
info:
  version: "2021-06-30"
  title: Amazon EventBridge Scheduler
  description: Amazon EventBridge Scheduler
  x-serviceName: scheduler
  x-serviceAlias: scheduler
  x-protocol: rest-json
  x-apiVersion: "2021-06-30"
  x-endpointPrefix: scheduler
  x-jsonVersion: "1.1"
servers:
  - url: https://scheduler.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for scheduler
paths:
  /schedules/{name}:
    post:
      operationId: CreateSchedule
      description: Creates the specified schedule.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the schedule that you are creating.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionAfterCompletion:
                  $ref: "#/components/schemas/ActionAfterCompletion"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Description:
                  $ref: "#/components/schemas/Description"
                EndDate:
                  $ref: "#/components/schemas/EndDate"
                FlexibleTimeWindow:
                  $ref: "#/components/schemas/FlexibleTimeWindow"
                GroupName:
                  $ref: "#/components/schemas/ScheduleGroupName"
                KmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                ScheduleExpression:
                  $ref: "#/components/schemas/ScheduleExpression"
                ScheduleExpressionTimezone:
                  $ref: "#/components/schemas/ScheduleExpressionTimezone"
                StartDate:
                  $ref: "#/components/schemas/StartDate"
                State:
                  $ref: "#/components/schemas/ScheduleState"
                Target:
                  $ref: "#/components/schemas/Target"
              required:
                - FlexibleTimeWindow
                - ScheduleExpression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduleOutput"
    delete:
      operationId: DeleteSchedule
      description: Deletes the specified schedule.
      parameters:
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: Unique, case-sensitive identifier you provide to ensure the idempotency of the request. If you do not specify a client token, EventBridge Scheduler uses a randomly generated token for the request to ensure idempotency.
        - name: groupName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScheduleGroupName"
          description: The name of the schedule group associated with this schedule. If you omit this, the default schedule group is used.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the schedule to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduleOutput"
    get:
      operationId: GetSchedule
      description: Retrieves the specified schedule.
      parameters:
        - name: groupName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScheduleGroupName"
          description: The name of the schedule group associated with this schedule. If you omit this, EventBridge Scheduler assumes that the schedule is associated with the default group.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the schedule to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScheduleOutput"
    put:
      operationId: UpdateSchedule
      description: Updates the specified schedule. When you call UpdateSchedule, EventBridge Scheduler uses all values, including empty values, specified in the request and overrides the existing schedule. This is by design. This means that if you do not set an optional field in your request, that field will be set to its system-default value after the update. Before calling this operation, we recommend that you call the GetSchedule API operation and make a note of all optional parameters for your UpdateSchedule call.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the schedule that you are updating.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionAfterCompletion:
                  $ref: "#/components/schemas/ActionAfterCompletion"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Description:
                  $ref: "#/components/schemas/Description"
                EndDate:
                  $ref: "#/components/schemas/EndDate"
                FlexibleTimeWindow:
                  $ref: "#/components/schemas/FlexibleTimeWindow"
                GroupName:
                  $ref: "#/components/schemas/ScheduleGroupName"
                KmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                ScheduleExpression:
                  $ref: "#/components/schemas/ScheduleExpression"
                ScheduleExpressionTimezone:
                  $ref: "#/components/schemas/ScheduleExpressionTimezone"
                StartDate:
                  $ref: "#/components/schemas/StartDate"
                State:
                  $ref: "#/components/schemas/ScheduleState"
                Target:
                  $ref: "#/components/schemas/Target"
              required:
                - FlexibleTimeWindow
                - ScheduleExpression
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduleOutput"
  /schedule-groups/{name}:
    post:
      operationId: CreateScheduleGroup
      description: Creates the specified schedule group.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScheduleGroupName"
          description: The name of the schedule group that you are creating.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduleGroupOutput"
    delete:
      operationId: DeleteScheduleGroup
      description: Deletes the specified schedule group. Deleting a schedule group results in EventBridge Scheduler deleting all schedules associated with the group. When you delete a group, it remains in a DELETING state until all of its associated schedules are deleted. Schedules associated with the group that are set to run while the schedule group is in the process of being deleted might continue to invoke their targets until the schedule group and its associated schedules are deleted. This operation is eventually consistent.
      parameters:
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: Unique, case-sensitive identifier you provide to ensure the idempotency of the request. If you do not specify a client token, EventBridge Scheduler uses a randomly generated token for the request to ensure idempotency.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScheduleGroupName"
          description: The name of the schedule group to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduleGroupOutput"
    get:
      operationId: GetScheduleGroup
      description: Retrieves the specified schedule group.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScheduleGroupName"
          description: The name of the schedule group to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScheduleGroupOutput"
  /schedule-groups:
    get:
      operationId: ListScheduleGroups
      description: Returns a paginated list of your schedule groups.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: If specified, limits the number of results returned by this operation. The operation also returns a NextToken which you can use in a subsequent operation to retrieve the next set of results.
        - name: NamePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScheduleGroupNamePrefix"
          description: The name prefix that you can use to return a filtered list of your schedule groups.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScheduleGroupsOutput"
  /schedules:
    get:
      operationId: ListSchedules
      description: Returns a paginated list of your EventBridge Scheduler schedules.
      parameters:
        - name: ScheduleGroup
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScheduleGroupName"
          description: If specified, only lists the schedules whose associated schedule group matches the given filter.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: If specified, limits the number of results returned by this operation. The operation also returns a NextToken which you can use in a subsequent operation to retrieve the next set of results.
        - name: NamePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NamePrefix"
          description: Schedule name prefix to return the filtered list of resources.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token returned by a previous call to retrieve the next set of results.
        - name: State
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ScheduleState"
          description: If specified, only lists the schedules whose current state matches the given filter.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchedulesOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags associated with the Scheduler resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceArn"
          description: The ARN of the EventBridge Scheduler resource for which you want to view tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified EventBridge Scheduler resource. You can only assign tags to schedule groups.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceArn"
          description: The Amazon Resource Name (ARN) of the schedule group that you are adding tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified EventBridge Scheduler schedule group.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TagResourceArn"
          description: The Amazon Resource Name (ARN) of the schedule group from which you are removing tags.
        - name: TagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[0-9a-zA-Z-_.]+$
    ActionAfterCompletion:
      type: string
      enum:
        - NONE
        - DELETE
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-_]+$
    Description:
      type: string
      minLength: 0
      maxLength: 512
    EndDate:
      type: string
      format: date-time
    FlexibleTimeWindow:
      description: Allows you to configure a time window during which EventBridge Scheduler invokes the schedule.
      type: object
      properties:
        MaximumWindowInMinutes:
          $ref: "#/components/schemas/MaximumWindowInMinutes"
          description: The maximum time window during which a schedule can be invoked.
        Mode:
          $ref: "#/components/schemas/FlexibleTimeWindowMode"
          description: Determines whether the schedule is invoked within a flexible time window.
      required:
        - Mode
    MaximumWindowInMinutes:
      type: integer
      minimum: 1
      maximum: 1440
    FlexibleTimeWindowMode:
      type: string
      enum:
        - "OFF"
        - FLEXIBLE
    ScheduleGroupName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[0-9a-zA-Z-_.]+$
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws(-[a-z]+)?:kms:[a-z0-9\-]+:\d{12}:(key|alias)\/[0-9a-zA-Z-_]*$
    ScheduleExpression:
      type: string
      minLength: 1
      maxLength: 256
    ScheduleExpressionTimezone:
      type: string
      minLength: 1
      maxLength: 50
    StartDate:
      type: string
      format: date-time
    ScheduleState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    Target:
      description: The schedule's target. EventBridge Scheduler supports templated target that invoke common API operations, as well as universal targets that you can customize to invoke over 6,000 API operations across more than 270 services. You can only specify one templated or universal target for a schedule.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/TargetArn"
          description: The Amazon Resource Name (ARN) of the target.
        DeadLetterConfig:
          $ref: "#/components/schemas/DeadLetterConfig"
          description: An object that contains information about an Amazon SQS queue that EventBridge Scheduler uses as a dead-letter queue for your schedule. If specified, EventBridge Scheduler delivers failed events that could not be successfully delivered to a target to the queue.
        EcsParameters:
          $ref: "#/components/schemas/EcsParameters"
          description: The templated target type for the Amazon ECS RunTask API operation.
        EventBridgeParameters:
          $ref: "#/components/schemas/EventBridgeParameters"
          description: The templated target type for the EventBridge PutEvents API operation.
        Input:
          $ref: "#/components/schemas/TargetInput"
          description: The text, or well-formed JSON, passed to the target. If you are configuring a templated Lambda, AWS Step Functions, or Amazon EventBridge target, the input must be a well-formed JSON. For all other target types, a JSON is not required. If you do not specify anything for this field, EventBridge Scheduler delivers a default notification to the target.
        KinesisParameters:
          $ref: "#/components/schemas/KinesisParameters"
          description: The templated target type for the Amazon Kinesis PutRecord API operation.
        RetryPolicy:
          $ref: "#/components/schemas/RetryPolicy"
          description: A RetryPolicy object that includes information about the retry policy settings, including the maximum age of an event, and the maximum number of times EventBridge Scheduler will try to deliver the event to a target.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that EventBridge Scheduler will use for this target when the schedule is invoked.
        SageMakerPipelineParameters:
          $ref: "#/components/schemas/SageMakerPipelineParameters"
          description: The templated target type for the Amazon SageMaker StartPipelineExecution API operation.
        SqsParameters:
          $ref: "#/components/schemas/SqsParameters"
          description: The templated target type for the Amazon SQS SendMessage API operation. Contains the message group ID to use when the target is a FIFO queue. If you specify an Amazon SQS FIFO queue as a target, the queue must have content-based deduplication enabled. For more information, see Using the Amazon SQS message deduplication ID in the Amazon SQS Developer Guide.
      required:
        - Arn
        - RoleArn
    TargetArn:
      type: string
      minLength: 1
      maxLength: 1600
    DeadLetterConfig:
      description: An object that contains information about an Amazon SQS queue that EventBridge Scheduler uses as a dead-letter queue for your schedule. If specified, EventBridge Scheduler delivers failed events that could not be successfully delivered to a target to the queue.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/DeadLetterConfigArnString"
          description: The Amazon Resource Name (ARN) of the SQS queue specified as the destination for the dead-letter queue.
    DeadLetterConfigArnString:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^arn:aws(-[a-z]+)?:sqs:[a-z0-9\-]+:\d{12}:[a-zA-Z0-9\-_]+$
    EcsParameters:
      description: The templated target type for the Amazon ECS RunTask API operation.
      type: object
      properties:
        CapacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy to use for the task.
        EnableECSManagedTags:
          $ref: "#/components/schemas/EnableECSManagedTags"
          description: Specifies whether to enable Amazon ECS managed tags for the task. For more information, see Tagging Your Amazon ECS Resources in the Amazon ECS Developer Guide.
        EnableExecuteCommand:
          $ref: "#/components/schemas/EnableExecuteCommand"
          description: Whether or not to enable the execute command functionality for the containers in this task. If true, this enables execute command functionality on all containers in the task.
        Group:
          $ref: "#/components/schemas/Group"
          description: Specifies an ECS task group for the task. The maximum length is 255 characters.
        LaunchType:
          $ref: "#/components/schemas/LaunchType"
          description: Specifies the launch type on which your task is running. The launch type that you specify here must match one of the launch type (compatibilities) of the target task. The FARGATE value is supported only in the Regions where Fargate with Amazon ECS is supported. For more information, see AWS Fargate on Amazon ECS in the Amazon ECS Developer Guide.
        NetworkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: This structure specifies the network configuration for an ECS task.
        PlacementConstraints:
          $ref: "#/components/schemas/PlacementConstraints"
          description: An array of placement constraint objects to use for the task. You can specify up to 10 constraints per task (including constraints in the task definition and those specified at runtime).
        PlacementStrategy:
          $ref: "#/components/schemas/PlacementStrategies"
          description: The task placement strategy for a task or service.
        PlatformVersion:
          $ref: "#/components/schemas/PlatformVersion"
          description: Specifies the platform version for the task. Specify only the numeric portion of the platform version, such as 1.1.0.
        PropagateTags:
          $ref: "#/components/schemas/PropagateTags"
          description: Specifies whether to propagate the tags from the task definition to the task. If no value is specified, the tags are not propagated. Tags can only be propagated to the task during task creation. To add tags to a task after task creation, use Amazon ECS's TagResource API action.
        ReferenceId:
          $ref: "#/components/schemas/ReferenceId"
          description: The reference ID to use for the task.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: The metadata that you apply to the task to help you categorize and organize them. Each tag consists of a key and an optional value, both of which you define. For more information, see RunTask in the Amazon ECS API Reference.
        TaskCount:
          $ref: "#/components/schemas/TaskCount"
          description: The number of tasks to create based on TaskDefinition. The default is 1.
        TaskDefinitionArn:
          $ref: "#/components/schemas/TaskDefinitionArn"
          description: The Amazon Resource Name (ARN) of the task definition to use if the event target is an Amazon ECS task.
      required:
        - TaskDefinitionArn
    CapacityProviderStrategy:
      type: array
      items:
        $ref: "#/components/schemas/CapacityProviderStrategyItem"
    CapacityProviderStrategyItem:
      description: The details of a capacity provider strategy.
      type: object
      properties:
        base:
          $ref: "#/components/schemas/CapacityProviderStrategyItemBase"
          description: The base value designates how many tasks, at a minimum, to run on the specified capacity provider. Only one capacity provider in a capacity provider strategy can have a base defined. If no value is specified, the default value of 0 is used.
        capacityProvider:
          $ref: "#/components/schemas/CapacityProvider"
          description: The short name of the capacity provider.
        weight:
          $ref: "#/components/schemas/CapacityProviderStrategyItemWeight"
          description: The weight value designates the relative percentage of the total number of tasks launched that should use the specified capacity provider. The weight value is taken into consideration after the base value, if defined, is satisfied.
      required:
        - capacityProvider
    CapacityProviderStrategyItemBase:
      type: integer
      minimum: 0
      maximum: 100000
    CapacityProvider:
      type: string
      minLength: 1
      maxLength: 255
    CapacityProviderStrategyItemWeight:
      type: integer
      minimum: 0
      maximum: 1000
    EnableECSManagedTags:
      type: boolean
    EnableExecuteCommand:
      type: boolean
    Group:
      type: string
      minLength: 1
      maxLength: 255
    LaunchType:
      type: string
      enum:
        - EC2
        - FARGATE
        - EXTERNAL
    NetworkConfiguration:
      description: Specifies the network configuration for an ECS task.
      type: object
      properties:
        awsvpcConfiguration:
          $ref: "#/components/schemas/AwsVpcConfiguration"
          description: Specifies the Amazon VPC subnets and security groups for the task, and whether a public IP address is to be used. This structure is relevant only for ECS tasks that use the awsvpc network mode.
    AwsVpcConfiguration:
      description: This structure specifies the VPC subnets and security groups for the task, and whether a public IP address is to be used. This structure is relevant only for ECS tasks that use the awsvpc network mode.
      type: object
      properties:
        AssignPublicIp:
          $ref: "#/components/schemas/AssignPublicIp"
          description: Specifies whether the task's elastic network interface receives a public IP address. You can specify ENABLED only when LaunchType in EcsParameters is set to FARGATE.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: Specifies the security groups associated with the task. These security groups must all be in the same VPC. You can specify as many as five security groups. If you do not specify a security group, the default security group for the VPC is used.
        Subnets:
          $ref: "#/components/schemas/Subnets"
          description: Specifies the subnets associated with the task. These subnets must all be in the same VPC. You can specify as many as 16 subnets.
      required:
        - Subnets
    AssignPublicIp:
      type: string
      enum:
        - ENABLED
        - DISABLED
    SecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroup"
    SecurityGroup:
      type: string
      minLength: 1
      maxLength: 1000
    Subnets:
      type: array
      items:
        $ref: "#/components/schemas/Subnet"
    Subnet:
      type: string
      minLength: 1
      maxLength: 1000
    PlacementConstraints:
      type: array
      items:
        $ref: "#/components/schemas/PlacementConstraint"
    PlacementConstraint:
      description: An object representing a constraint on task placement.
      type: object
      properties:
        expression:
          $ref: "#/components/schemas/PlacementConstraintExpression"
          description: A cluster query language expression to apply to the constraint. You cannot specify an expression if the constraint type is distinctInstance. For more information, see Cluster query language in the Amazon ECS Developer Guide.
        type_:
          $ref: "#/components/schemas/PlacementConstraintType"
          description: The type of constraint. Use distinctInstance to ensure that each task in a particular group is running on a different container instance. Use memberOf to restrict the selection to a group of valid candidates.
    PlacementConstraintExpression:
      type: string
      minLength: 0
      maxLength: 2000
    PlacementConstraintType:
      type: string
      enum:
        - distinctInstance
        - memberOf
    PlacementStrategies:
      type: array
      items:
        $ref: "#/components/schemas/PlacementStrategy"
    PlacementStrategy:
      description: The task placement strategy for a task or service.
      type: object
      properties:
        field:
          $ref: "#/components/schemas/PlacementStrategyField"
          description: The field to apply the placement strategy against. For the spread placement strategy, valid values are instanceId (or instanceId, which has the same effect), or any platform or custom attribute that is applied to a container instance, such as attribute:ecs.availability-zone. For the binpack placement strategy, valid values are cpu and memory. For the random placement strategy, this field is not used.
        type_:
          $ref: "#/components/schemas/PlacementStrategyType"
          description: The type of placement strategy. The random placement strategy randomly places tasks on available candidates. The spread placement strategy spreads placement across available candidates evenly based on the field parameter. The binpack strategy places tasks on available candidates that have the least available amount of the resource that is specified with the field parameter. For example, if you binpack on memory, a task is placed on the instance with the least amount of remaining memory (but still enough to run the task).
    PlacementStrategyField:
      type: string
      minLength: 0
      maxLength: 255
    PlacementStrategyType:
      type: string
      enum:
        - random
        - spread
        - binpack
    PlatformVersion:
      type: string
      minLength: 1
      maxLength: 64
    PropagateTags:
      type: string
      enum:
        - TASK_DEFINITION
    ReferenceId:
      type: string
      minLength: 0
      maxLength: 1024
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/TagMap"
    TagMap:
      type: object
      properties: {}
    TaskCount:
      type: integer
      minimum: 1
      maximum: 10
    TaskDefinitionArn:
      type: string
      minLength: 1
      maxLength: 1600
