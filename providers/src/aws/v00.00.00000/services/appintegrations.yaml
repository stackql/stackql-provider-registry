openapi: 3.0.0
info:
  version: "2020-07-29"
  title: Amazon AppIntegrations Service
  description: Amazon AppIntegrations Service
  x-serviceName: app-integrations
  x-serviceAlias: appintegrations
  x-protocol: rest-json
  x-apiVersion: "2020-07-29"
  x-endpointPrefix: app-integrations
  x-jsonVersion: "1.1"
servers:
  - url: https://app-integrations.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appintegrations
paths:
  /applications:
    post:
      operationId: CreateApplication
      description: Creates and persists an Application resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ApplicationName"
                Namespace:
                  $ref: "#/components/schemas/ApplicationNamespace"
                Description:
                  $ref: "#/components/schemas/Description"
                ApplicationSourceConfig:
                  $ref: "#/components/schemas/ApplicationSourceConfig"
                Subscriptions:
                  $ref: "#/components/schemas/SubscriptionList"
                Publications:
                  $ref: "#/components/schemas/PublicationList"
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Permissions:
                  $ref: "#/components/schemas/PermissionList"
                IsService:
                  $ref: "#/components/schemas/Boolean"
                InitializationTimeout:
                  $ref: "#/components/schemas/InitializationTimeout"
                ApplicationConfig:
                  $ref: "#/components/schemas/ApplicationConfig"
                IframeConfig:
                  $ref: "#/components/schemas/IframeConfig"
                ApplicationType:
                  $ref: "#/components/schemas/ApplicationType"
              required:
                - ApplicationSourceConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
    get:
      operationId: ListApplications
      description: Lists applications in the account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
        - name: applicationType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApplicationType"
          description: The type of application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /dataIntegrations:
    post:
      operationId: CreateDataIntegration
      description: Creates and persists a DataIntegration resource. You cannot create a DataIntegration association for a DataIntegration that has been previously associated. Use a different DataIntegration, or recreate the DataIntegration using the CreateDataIntegration API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
                KmsKey:
                  $ref: "#/components/schemas/NonBlankString"
                SourceURI:
                  $ref: "#/components/schemas/SourceURI"
                ScheduleConfig:
                  $ref: "#/components/schemas/ScheduleConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                FileConfiguration:
                  $ref: "#/components/schemas/FileConfiguration"
                ObjectConfiguration:
                  $ref: "#/components/schemas/ObjectConfiguration"
              required:
                - KmsKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataIntegrationResponse"
    get:
      operationId: ListDataIntegrations
      description: Returns a paginated list of DataIntegrations in the account. You cannot create a DataIntegration association for a DataIntegration that has been previously associated. Use a different DataIntegration, or recreate the DataIntegration using the CreateDataIntegration API.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataIntegrationsResponse"
  /dataIntegrations/{identifier}/associations:
    post:
      operationId: CreateDataIntegrationAssociation
      description: Creates and persists a DataIntegrationAssociation resource.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the DataIntegration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientId:
                  $ref: "#/components/schemas/ClientId"
                ObjectConfiguration:
                  $ref: "#/components/schemas/ObjectConfiguration"
                DestinationURI:
                  $ref: "#/components/schemas/DestinationURI"
                ClientAssociationMetadata:
                  $ref: "#/components/schemas/ClientAssociationMetadata"
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                ExecutionConfiguration:
                  $ref: "#/components/schemas/ExecutionConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataIntegrationAssociationResponse"
    get:
      operationId: ListDataIntegrationAssociations
      description: Returns a paginated list of DataIntegration associations in the account. You cannot create a DataIntegration association for a DataIntegration that has been previously associated. Use a different DataIntegration, or recreate the DataIntegration using the CreateDataIntegration API.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the DataIntegration.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataIntegrationAssociationsResponse"
  /eventIntegrations:
    post:
      operationId: CreateEventIntegration
      description: Creates an EventIntegration, given a specified name, description, and a reference to an Amazon EventBridge bus in your account and a partner event source that pushes events to that bus. No objects are created in the your account, only metadata that is persisted on the EventIntegration control plane.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
                EventFilter:
                  $ref: "#/components/schemas/EventFilter"
                EventBridgeBus:
                  $ref: "#/components/schemas/EventBridgeBus"
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - EventFilter
                - EventBridgeBus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventIntegrationResponse"
    get:
      operationId: ListEventIntegrations
      description: Returns a paginated list of event integrations in the account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventIntegrationsResponse"
  /applications/{application_identifier}:
    delete:
      operationId: DeleteApplication
      description: Deletes the Application. Only Applications that don't have any Application Associations can be deleted.
      parameters:
        - name: application_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnOrUUID"
          description: The Amazon Resource Name (ARN) of the Application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
    get:
      operationId: GetApplication
      description: Get an Application resource.
      parameters:
        - name: application_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnOrUUID"
          description: The Amazon Resource Name (ARN) of the Application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationResponse"
    patch:
      operationId: UpdateApplication
      description: Updates and persists an Application resource.
      parameters:
        - name: application_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnOrUUID"
          description: The Amazon Resource Name (ARN) of the Application.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ApplicationName"
                Description:
                  $ref: "#/components/schemas/Description"
                ApplicationSourceConfig:
                  $ref: "#/components/schemas/ApplicationSourceConfig"
                Subscriptions:
                  $ref: "#/components/schemas/SubscriptionList"
                Publications:
                  $ref: "#/components/schemas/PublicationList"
                Permissions:
                  $ref: "#/components/schemas/PermissionList"
                IsService:
                  $ref: "#/components/schemas/Boolean"
                InitializationTimeout:
                  $ref: "#/components/schemas/InitializationTimeout"
                ApplicationConfig:
                  $ref: "#/components/schemas/ApplicationConfig"
                IframeConfig:
                  $ref: "#/components/schemas/IframeConfig"
                ApplicationType:
                  $ref: "#/components/schemas/ApplicationType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
  /dataIntegrations/{identifier}:
    delete:
      operationId: DeleteDataIntegration
      description: Deletes the DataIntegration. Only DataIntegrations that don't have any DataIntegrationAssociations can be deleted. Deleting a DataIntegration also deletes the underlying Amazon AppFlow flow and service linked role. You cannot create a DataIntegration association for a DataIntegration that has been previously associated. Use a different DataIntegration, or recreate the DataIntegration using the CreateDataIntegration API.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the DataIntegration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataIntegrationResponse"
    get:
      operationId: GetDataIntegration
      description: Returns information about the DataIntegration. You cannot create a DataIntegration association for a DataIntegration that has been previously associated. Use a different DataIntegration, or recreate the DataIntegration using the CreateDataIntegration API.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataIntegrationResponse"
    patch:
      operationId: UpdateDataIntegration
      description: Updates the description of a DataIntegration. You cannot create a DataIntegration association for a DataIntegration that has been previously associated. Use a different DataIntegration, or recreate the DataIntegration using the CreateDataIntegration API.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the DataIntegration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataIntegrationResponse"
  /eventIntegrations/{name}:
    delete:
      operationId: DeleteEventIntegration
      description: Deletes the specified existing event integration. If the event integration is associated with clients, the request is rejected.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the event integration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventIntegrationResponse"
    get:
      operationId: GetEventIntegration
      description: Returns information about the event integration.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the event integration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventIntegrationResponse"
    patch:
      operationId: UpdateEventIntegration
      description: Updates the description of an event integration.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the event integration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventIntegrationResponse"
  /applications/{application_identifier}/associations:
    get:
      operationId: ListApplicationAssociations
      description: Returns a paginated list of application associations for an application.
      parameters:
        - name: application_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ArnOrUUID"
          description: A unique identifier for the Application.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationAssociationsResponse"
  /eventIntegrations/{name}/associations:
    get:
      operationId: ListEventIntegrationAssociations
      description: Returns a paginated list of event integration associations in the account.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the event integration.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventIntegrationAssociationsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds the specified tags to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /dataIntegrations/{identifier}/associations/{data_integration_association_identifier}:
    patch:
      operationId: UpdateDataIntegrationAssociation
      description: Updates and persists a DataIntegrationAssociation resource. Updating a DataIntegrationAssociation with ExecutionConfiguration will rerun the on-demand job.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the DataIntegration.
        - name: data_integration_association_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: A unique identifier. of the DataIntegrationAssociation resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ExecutionConfiguration:
                  $ref: "#/components/schemas/ExecutionConfiguration"
              required:
                - ExecutionConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataIntegrationAssociationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApplicationName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\/\._ \-]+$
    ApplicationNamespace:
      type: string
      minLength: 1
      maxLength: 211
      pattern: ^[a-zA-Z0-9\/\._\-]+$
    Description:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: .*
    ApplicationSourceConfig:
      description: The configuration for where the application should be loaded from.
      type: object
      properties:
        ExternalUrlConfig:
          $ref: "#/components/schemas/ExternalUrlConfig"
          description: The external URL source for the application.
    ExternalUrlConfig:
      description: The external URL source for the application.
      type: object
      properties:
        AccessUrl:
          $ref: "#/components/schemas/URL"
          description: The URL to access the application.
        ApprovedOrigins:
          $ref: "#/components/schemas/ApplicationApprovedOrigins"
          description: Additional URLs to allow list if different than the access URL.
      required:
        - AccessUrl
    URL:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: ^\w+\:\/\/.*$
    ApplicationApprovedOrigins:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationTrustedSource"
    ApplicationTrustedSource:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^\w+\:\/\/.*$
    SubscriptionList:
      type: array
      items:
        $ref: "#/components/schemas/Subscription"
    Subscription:
      description: The configuration of an event that the application subscribes.
      type: object
      properties:
        Event:
          $ref: "#/components/schemas/EventName"
          description: The name of the subscription.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the subscription.
      required:
        - Event
    EventName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\/\._\-]+::[a-zA-Z0-9\/\._\-]+(?:\*)?$
    PublicationList:
      type: array
      items:
        $ref: "#/components/schemas/Publication"
    Publication:
      description: The configuration of an event that the application publishes.
      type: object
      properties:
        Event:
          $ref: "#/components/schemas/EventName"
          description: The name of the publication.
        Schema:
          $ref: "#/components/schemas/EventDefinitionSchema"
          description: The JSON schema of the publication event.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the publication.
      required:
        - Event
        - Schema
    EventDefinitionSchema:
      type: string
      minLength: 1
      maxLength: 10240
      pattern: ^.*$
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*
    TagMap:
      type: object
      properties: {}
    PermissionList:
      type: array
      items:
        $ref: "#/components/schemas/Permission"
    Permission:
      description: The permission of an event or request that the application has access to.
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\/\._\-\*]+$
    Boolean:
      type: boolean
    InitializationTimeout:
      type: integer
      minimum: 1
      maximum: 600000
    ApplicationConfig:
      description: The configuration settings for the application.
      type: object
      properties:
        ContactHandling:
          $ref: "#/components/schemas/ContactHandling"
          description: The contact handling configuration for the application.
    ContactHandling:
      description: The contact handling configuration for the application.
      type: object
      properties:
        Scope:
          $ref: "#/components/schemas/ContactHandlingScope"
          description: Indicates whether the application refreshes for each contact or refreshes only with each new browser session.
    ContactHandlingScope:
      type: string
      enum:
        - CROSS_CONTACTS
        - PER_CONTACT
    IframeConfig:
      description: The iframe configuration for the application.
      type: object
      properties:
        Allow:
          $ref: "#/components/schemas/IframePermissionList"
          description: The list of features that are allowed in the iframe.
        Sandbox:
          $ref: "#/components/schemas/IframePermissionList"
          description: The list of sandbox attributes for the iframe.
    IframePermissionList:
      description: A list of permissions for the iframe.
      type: array
      items:
        $ref: "#/components/schemas/IframePermission"
    IframePermission:
      description: A permission for the iframe.
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[a-z-]+$
    ApplicationType:
      description: The type of application
      type: string
      enum:
        - STANDARD
        - SERVICE
        - MCP_SERVER
    CreateApplicationResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Application.
        Id:
          $ref: "#/components/schemas/UUID"
          description: A unique identifier for the Application.
    Arn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws:[A-Za-z0-9][A-Za-z0-9_/.-]{0,62}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9_/.-]{0,63}:[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]{0,1023}$
    UUID:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    Name:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9\/\._\-]+$
    NonBlankString:
      type: string
