          description: The IPv4 or IPv6 addresses for the DNS servers that your SMB file server belongs to. This element applies only if AuthenticationType is set to KERBEROS.
        KerberosPrincipal:
          $ref: "#/components/schemas/KerberosPrincipal"
          description: The Kerberos principal that has permission to access the files, folders, and file metadata in your SMB file server.
        AuthenticationType:
          $ref: "#/components/schemas/SmbAuthenticationType"
          description: The authentication protocol that DataSync uses to connect to your SMB file server.
        ManagedSecretConfig:
          $ref: "#/components/schemas/ManagedSecretConfig"
          description: Describes configuration information for a DataSync-managed secret, such as a Password or KerberosKeytab that DataSync uses to access a specific storage location. DataSync uses the default Amazon Web Services-managed KMS key to encrypt this secret in Secrets Manager.
        CmkSecretConfig:
          $ref: "#/components/schemas/CmkSecretConfig"
          description: Describes configuration information for a DataSync-managed secret, such as a Password or KerberosKeytab that DataSync uses to access a specific storage location, with a customer-managed KMS key.
        CustomSecretConfig:
          $ref: "#/components/schemas/CustomSecretConfig"
          description: Describes configuration information for a customer-managed secret, such as a Password or KerberosKeytab that DataSync uses to access a specific storage location, with a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
    DescribeTaskResponse:
      description: DescribeTaskResponse
      type: object
      properties:
        TaskArn:
          $ref: "#/components/schemas/TaskArn"
          description: The ARN of your task.
        Status:
          $ref: "#/components/schemas/TaskStatus"
          description: The status of your task. For information about what each status means, see Task statuses.
        Name:
          $ref: "#/components/schemas/TagValue"
          description: The name of your task.
        CurrentTaskExecutionArn:
          $ref: "#/components/schemas/TaskExecutionArn"
          description: The ARN of the most recent task execution.
        SourceLocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of your transfer's source location.
        DestinationLocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of your transfer's destination location.
        CloudWatchLogGroupArn:
          $ref: "#/components/schemas/LogGroupArn"
          description: The Amazon Resource Name (ARN) of an Amazon CloudWatch log group for monitoring your task. For more information, see Monitoring data transfers with CloudWatch Logs.
        SourceNetworkInterfaceArns:
          $ref: "#/components/schemas/SourceNetworkInterfaceArns"
          description: The ARNs of the network interfaces that DataSync created for your source location.
        DestinationNetworkInterfaceArns:
          $ref: "#/components/schemas/DestinationNetworkInterfaceArns"
          description: The ARNs of the network interfaces that DataSync created for your destination location.
        Options:
          $ref: "#/components/schemas/Options"
          description: The task's settings. For example, what file metadata gets preserved, how data integrity gets verified at the end of your transfer, bandwidth limits, among other options.
        Excludes:
          $ref: "#/components/schemas/FilterList"
          description: The exclude filters that define the files, objects, and folders in your source location that you don't want DataSync to transfer. For more information and examples, see Specifying what DataSync transfers by using filters.
        Schedule:
          $ref: "#/components/schemas/TaskSchedule"
          description: The schedule for when you want your task to run. For more information, see Scheduling your task.
        ErrorCode:
          $ref: "#/components/schemas/string"
          description: If there's an issue with your task, you can use the error code to help you troubleshoot the problem. For more information, see Troubleshooting issues with DataSync transfers.
        ErrorDetail:
          $ref: "#/components/schemas/string"
          description: If there's an issue with your task, you can use the error details to help you troubleshoot the problem. For more information, see Troubleshooting issues with DataSync transfers.
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: The time that the task was created.
        Includes:
          $ref: "#/components/schemas/FilterList"
          description: The include filters that define the files, objects, and folders in your source location that you want DataSync to transfer. For more information and examples, see Specifying what DataSync transfers by using filters.
        ManifestConfig:
          $ref: "#/components/schemas/ManifestConfig"
          description: The configuration of the manifest that lists the files or objects that you want DataSync to transfer. For more information, see Specifying what DataSync transfers by using a manifest.
        TaskReportConfig:
          $ref: "#/components/schemas/TaskReportConfig"
          description: The configuration of your task report, which provides detailed information about your DataSync transfer. For more information, see Monitoring your DataSync transfers with task reports.
        ScheduleDetails:
          $ref: "#/components/schemas/TaskScheduleDetails"
          description: The details about your task schedule.
        TaskMode:
          $ref: "#/components/schemas/TaskMode"
          description: The task mode that you're using. For more information, see Choosing a task mode for your data transfer.
    TaskStatus:
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - QUEUED
        - RUNNING
        - UNAVAILABLE
    SourceNetworkInterfaceArns:
      type: array
      items:
        $ref: "#/components/schemas/NetworkInterfaceArn"
    NetworkInterfaceArn:
      type: string
      maxLength: 128
      pattern: ^arn:aws[\-a-z]{0,}:ec2:[a-z\-0-9]*:[0-9]{12}:network-interface/eni-[0-9a-f]+$
    DestinationNetworkInterfaceArns:
      type: array
      items:
        $ref: "#/components/schemas/NetworkInterfaceArn"
    string:
      type: string
    TaskScheduleDetails:
      description: Provides information about your DataSync task schedule.
      type: object
      properties:
        StatusUpdateTime:
          $ref: "#/components/schemas/Time"
          description: Indicates the last time the status of your task schedule changed. For example, if DataSync automatically disables your schedule because of a repeated error, you can see when the schedule was disabled.
        DisabledReason:
          $ref: "#/components/schemas/ScheduleDisabledReason"
          description: Provides a reason if the task schedule is disabled. If your schedule is disabled by USER, you see a Manually disabled by user. message. If your schedule is disabled by SERVICE, you see an error message to help you understand why the task keeps failing. For information on resolving DataSync errors, see Troubleshooting issues with DataSync transfers.
        DisabledBy:
          $ref: "#/components/schemas/ScheduleDisabledBy"
          description: Indicates how your task schedule was disabled. USER - Your schedule was manually disabled by using the UpdateTask operation or DataSync console. SERVICE - Your schedule was automatically disabled by DataSync because the task failed repeatedly with the same error.
    ScheduleDisabledReason:
      type: string
      maxLength: 8192
      pattern: ^[\w\s.,'?!:;\/=|<>()-]*$
    ScheduleDisabledBy:
      type: string
      enum:
        - USER
        - SERVICE
    DescribeTaskExecutionResponse:
      description: DescribeTaskExecutionResponse
      type: object
      properties:
        TaskExecutionArn:
          $ref: "#/components/schemas/TaskExecutionArn"
          description: The ARN of the task execution that you wanted information about. TaskExecutionArn is hierarchical and includes TaskArn for the task that was executed. For example, a TaskExecution value with the ARN arn:aws:datasync:us-east-1:111222333444:task/task-0208075f79cedf4a2/execution/exec-08ef1e88ec491019b executed the task with the ARN arn:aws:datasync:us-east-1:111222333444:task/task-0208075f79cedf4a2.
        Status:
          $ref: "#/components/schemas/TaskExecutionStatus"
          description: The status of the task execution.
        Options:
          $ref: "#/components/schemas/Options"
        Excludes:
          $ref: "#/components/schemas/FilterList"
          description: A list of filter rules that exclude specific data during your transfer. For more information and examples, see Filtering data transferred by DataSync.
        Includes:
          $ref: "#/components/schemas/FilterList"
          description: A list of filter rules that include specific data during your transfer. For more information and examples, see Filtering data transferred by DataSync.
        ManifestConfig:
          $ref: "#/components/schemas/ManifestConfig"
          description: The configuration of the manifest that lists the files or objects to transfer. For more information, see Specifying what DataSync transfers by using a manifest.
        StartTime:
          $ref: "#/components/schemas/Time"
          description: The time that DataSync sends the request to start the task execution. For non-queued tasks, LaunchTime and StartTime are typically the same. For queued tasks, LaunchTime is typically later than StartTime because previously queued tasks must finish running before newer tasks can begin.
        EstimatedFilesToTransfer:
          $ref: "#/components/schemas/long"
          description: "The number of files, objects, and directories that DataSync expects to transfer over the network. This value is calculated while DataSync prepares the transfer. How this gets calculated depends primarily on your task’s transfer mode configuration: If TranserMode is set to CHANGED - The calculation is based on comparing the content of the source and destination locations and determining the difference that needs to be transferred. The difference can include: Anything that's added or modified at the source location. Anything that's in both locations and modified at the destination after an initial transfer (unless OverwriteMode is set to NEVER). (Basic task mode only) The number of items that DataSync expects to delete (if PreserveDeletedFiles is set to REMOVE). If TranserMode is set to ALL - The calculation is based only on the items that DataSync finds at the source location. For Enhanced mode tasks, this counter only includes files or objects. Directories are counted in EstimatedFoldersToTransfer."
        EstimatedBytesToTransfer:
          $ref: "#/components/schemas/long"
          description: The number of logical bytes that DataSync expects to write to the destination location.
        FilesTransferred:
          $ref: "#/components/schemas/long"
          description: The number of files, objects, and directories that DataSync actually transfers over the network. This value is updated periodically during your task execution when something is read from the source and sent over the network. If DataSync fails to transfer something, this value can be less than EstimatedFilesToTransfer. In some cases, this value can also be greater than EstimatedFilesToTransfer. This element is implementation-specific for some location types, so don't use it as an exact indication of what's transferring or to monitor your task execution. For Enhanced mode tasks, this counter only includes files or objects. Directories are counted in FoldersTransferred.
        BytesWritten:
          $ref: "#/components/schemas/long"
          description: The number of logical bytes that DataSync actually writes to the destination location.
        BytesTransferred:
          $ref: "#/components/schemas/long"
          description: The number of bytes that DataSync sends to the network before compression (if compression is possible). For the number of bytes transferred over the network, see BytesCompressed.
        BytesCompressed:
          $ref: "#/components/schemas/long"
          description: The number of physical bytes that DataSync transfers over the network after compression (if compression is possible). This number is typically less than BytesTransferred unless the data isn't compressible.
        Result:
          $ref: "#/components/schemas/TaskExecutionResultDetail"
          description: The result of the task execution.
        TaskReportConfig:
          $ref: "#/components/schemas/TaskReportConfig"
          description: The configuration of your task report, which provides detailed information about for your DataSync transfer. For more information, see Creating a task report.
        FilesDeleted:
          $ref: "#/components/schemas/long"
          description: The number of files, objects, and directories that DataSync actually deletes in your destination location. If you don't configure your task to delete data in the destination that isn't in the source, the value is always 0. For Enhanced mode tasks, this counter only includes files or objects. Directories are counted in FoldersDeleted.
        FilesSkipped:
          $ref: "#/components/schemas/long"
          description: The number of files, objects, and directories that DataSync skips during your transfer. For Enhanced mode tasks, this counter only includes files or objects. Directories are counted in FoldersSkipped.
        FilesVerified:
          $ref: "#/components/schemas/long"
          description: The number of files, objects, and directories that DataSync verifies during your transfer. When you configure your task to verify only the data that's transferred, DataSync doesn't verify directories in some situations or files that fail to transfer. For Enhanced mode tasks, this counter only includes files or objects. Directories are counted in FoldersVerified.
        ReportResult:
          $ref: "#/components/schemas/ReportResult"
          description: Indicates whether DataSync generated a complete task report for your transfer.
        EstimatedFilesToDelete:
          $ref: "#/components/schemas/long"
          description: The number of files, objects, and directories that DataSync expects to delete in your destination location. If you don't configure your task to delete data in the destination that isn't in the source, the value is always 0. For Enhanced mode tasks, this counter only includes files or objects. Directories are counted in EstimatedFoldersToDelete.
        TaskMode:
          $ref: "#/components/schemas/TaskMode"
          description: The task mode that you're using. For more information, see Choosing a task mode for your data transfer.
        FilesPrepared:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync will attempt to transfer after comparing your source and destination locations. Applies only to Enhanced mode tasks. This counter isn't applicable if you configure your task to transfer all data. In that scenario, DataSync copies everything from the source to the destination without comparing differences between the locations.
        FilesListed:
          $ref: "#/components/schemas/TaskExecutionFilesListedDetail"
          description: The number of files or objects that DataSync finds at your locations. Applies only to Enhanced mode tasks.
        FilesFailed:
          $ref: "#/components/schemas/TaskExecutionFilesFailedDetail"
          description: The number of files or objects that DataSync fails to prepare, transfer, verify, and delete during your task execution. Applies only to Enhanced mode tasks.
        EstimatedFoldersToDelete:
          $ref: "#/components/schemas/ItemCount"
          description: The number of directories that DataSync expects to delete in your destination location. If you don't configure your task to delete data in the destination that isn't in the source, the value is always 0. Applies only to Enhanced mode tasks.
        EstimatedFoldersToTransfer:
          $ref: "#/components/schemas/ItemCount"
          description: "The number of directories that DataSync expects to transfer over the network. This value is calculated as DataSync prepares directories to transfer. How this gets calculated depends primarily on your task’s transfer mode configuration: If TranserMode is set to CHANGED - The calculation is based on comparing the content of the source and destination locations and determining the difference that needs to be transferred. The difference can include: Anything that's added or modified at the source location. Anything that's in both locations and modified at the destination after an initial transfer (unless OverwriteMode is set to NEVER). If TranserMode is set to ALL - The calculation is based only on the items that DataSync finds at the source location. Applies only to Enhanced mode tasks."
        FoldersSkipped:
          $ref: "#/components/schemas/ItemCount"
          description: The number of directories that DataSync skips during your transfer. Applies only to Enhanced mode tasks.
        FoldersPrepared:
          $ref: "#/components/schemas/ItemCount"
          description: The number of directories that DataSync will attempt to transfer after comparing your source and destination locations. Applies only to Enhanced mode tasks. This counter isn't applicable if you configure your task to transfer all data. In that scenario, DataSync copies everything from the source to the destination without comparing differences between the locations.
        FoldersTransferred:
          $ref: "#/components/schemas/ItemCount"
          description: The number of directories that DataSync actually transfers over the network. This value is updated periodically during your task execution when something is read from the source and sent over the network. If DataSync fails to transfer something, this value can be less than EstimatedFoldersToTransfer. In some cases, this value can also be greater than EstimatedFoldersToTransfer. Applies only to Enhanced mode tasks.
        FoldersVerified:
          $ref: "#/components/schemas/ItemCount"
          description: The number of directories that DataSync verifies during your transfer. Applies only to Enhanced mode tasks.
        FoldersDeleted:
          $ref: "#/components/schemas/ItemCount"
          description: The number of directories that DataSync actually deletes in your destination location. If you don't configure your task to delete data in the destination that isn't in the source, the value is always 0. Applies only to Enhanced mode tasks.
        FoldersListed:
          $ref: "#/components/schemas/TaskExecutionFoldersListedDetail"
          description: The number of directories that DataSync finds at your locations. Applies only to Enhanced mode tasks.
        FoldersFailed:
          $ref: "#/components/schemas/TaskExecutionFoldersFailedDetail"
          description: The number of directories that DataSync fails to list, prepare, transfer, verify, and delete during your task execution. Applies only to Enhanced mode tasks.
        LaunchTime:
          $ref: "#/components/schemas/Time"
          description: The time that the task execution actually begins. For non-queued tasks, LaunchTime and StartTime are typically the same. For queued tasks, LaunchTime is typically later than StartTime because previously queued tasks must finish running before newer tasks can begin.
        EndTime:
          $ref: "#/components/schemas/Time"
          description: The time that the transfer task ends.
    TaskExecutionStatus:
      type: string
      enum:
        - QUEUED
        - CANCELLING
        - LAUNCHING
        - PREPARING
        - TRANSFERRING
        - VERIFYING
        - SUCCESS
        - ERROR
    long:
      type: integer
      format: int64
    TaskExecutionResultDetail:
      description: Provides detailed information about the result of your DataSync task execution.
      type: object
      properties:
        PrepareDuration:
          $ref: "#/components/schemas/Duration"
          description: The time in milliseconds that your task execution was in the PREPARING step. For more information, see Task execution statuses. For Enhanced mode tasks, the value is always 0. For more information, see How DataSync prepares your data transfer.
        PrepareStatus:
          $ref: "#/components/schemas/PhaseStatus"
          description: The status of the PREPARING step for your task execution. For more information, see Task execution statuses.
        TotalDuration:
          $ref: "#/components/schemas/Duration"
          description: The time in milliseconds that your task execution ran.
        TransferDuration:
          $ref: "#/components/schemas/Duration"
          description: The time in milliseconds that your task execution was in the TRANSFERRING step. For more information, see Task execution statuses. For Enhanced mode tasks, the value is always 0. For more information, see How DataSync transfers your data.
        TransferStatus:
          $ref: "#/components/schemas/PhaseStatus"
          description: The status of the TRANSFERRING step for your task execution. For more information, see Task execution statuses.
        VerifyDuration:
          $ref: "#/components/schemas/Duration"
          description: The time in milliseconds that your task execution was in the VERIFYING step. For more information, see Task execution statuses. For Enhanced mode tasks, the value is always 0. For more information, see How DataSync verifies your data's integrity.
        VerifyStatus:
          $ref: "#/components/schemas/PhaseStatus"
          description: The status of the VERIFYING step for your task execution. For more information, see Task execution statuses.
        ErrorCode:
          $ref: "#/components/schemas/string"
          description: An error that DataSync encountered during your task execution. You can use this information to help troubleshoot issues.
        ErrorDetail:
          $ref: "#/components/schemas/string"
          description: The detailed description of an error that DataSync encountered during your task execution. You can use this information to help troubleshoot issues.
    Duration:
      type: integer
      format: int64
      minimum: 0
    PhaseStatus:
      type: string
      enum:
        - PENDING
        - SUCCESS
        - ERROR
    ReportResult:
      description: Indicates whether DataSync created a complete task report for your transfer.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/PhaseStatus"
          description: Indicates whether DataSync is still working on your report, created a report, or can't create a complete report.
        ErrorCode:
          $ref: "#/components/schemas/string"
          description: Indicates the code associated with the error if DataSync can't create a complete report.
        ErrorDetail:
          $ref: "#/components/schemas/string"
          description: Provides details about issues creating a report.
    TaskExecutionFilesListedDetail:
      description: The number of files or objects that DataSync finds at your locations. Applies only to Enhanced mode tasks.
      type: object
      properties:
        AtSource:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync finds at your source location. With a manifest, DataSync lists only what's in your manifest (and not everything at your source location). With an include filter, DataSync lists only what matches the filter at your source location. With an exclude filter, DataSync lists everything at your source location before applying the filter.
        AtDestinationForDelete:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync finds at your destination location. This counter is only applicable if you configure your task to delete data in the destination that isn't in the source.
    TaskExecutionFilesFailedDetail:
      description: The number of files or objects that DataSync fails to prepare, transfer, verify, and delete during your task execution. Applies only to Enhanced mode tasks.
      type: object
      properties:
        Prepare:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync fails to prepare during your task execution.
        Transfer:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync fails to transfer during your task execution.
        Verify:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync fails to verify during your task execution.
        Delete:
          $ref: "#/components/schemas/long"
          description: The number of files or objects that DataSync fails to delete during your task execution.
    ItemCount:
      type: integer
      format: int64
    TaskExecutionFoldersListedDetail:
      description: The number of directories that DataSync finds at your locations. Applies only to Enhanced mode tasks.
      type: object
      properties:
        AtSource:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync finds at your source location. With a manifest, DataSync lists only what's in your manifest (and not everything at your source location). With an include filter, DataSync lists only what matches the filter at your source location. With an exclude filter, DataSync lists everything at your source location before applying the filter.
        AtDestinationForDelete:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync finds at your destination location. This counter is only applicable if you configure your task to delete data in the destination that isn't in the source.
    TaskExecutionFoldersFailedDetail:
      description: The number of directories that DataSync fails to list, prepare, transfer, verify, and delete during your task execution. Applies only to Enhanced mode tasks.
      type: object
      properties:
        List:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync fails to list during your task execution.
        Prepare:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync fails to prepare during your task execution.
        Transfer:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync fails to transfer during your task execution.
        Verify:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync fails to verify during your task execution.
        Delete:
          $ref: "#/components/schemas/long"
          description: The number of directories that DataSync fails to delete during your task execution.
    MaxResults:
      type: integer
      minimum: 0
      maximum: 100
    NextToken:
      type: string
      maxLength: 65535
      pattern: "[a-zA-Z0-9=_-]+"
    ListAgentsResponse:
      description: ListAgentsResponse
      type: object
      properties:
        Agents:
          $ref: "#/components/schemas/AgentList"
          description: A list of DataSync agents in your Amazon Web Services account in the Amazon Web Services Region specified in the request. The list is ordered by the agents' Amazon Resource Names (ARNs).
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The opaque string that indicates the position to begin the next list of results in the response.
    AgentList:
      type: array
      items:
        $ref: "#/components/schemas/AgentListEntry"
    AgentListEntry:
      description: Represents a single entry in a list (or array) of DataSync agents when you call the ListAgents operation.
      type: object
      properties:
        AgentArn:
          $ref: "#/components/schemas/AgentArn"
          description: The Amazon Resource Name (ARN) of a DataSync agent.
        Name:
          $ref: "#/components/schemas/TagValue"
          description: The name of an agent.
        Status:
          $ref: "#/components/schemas/AgentStatus"
          description: The status of an agent. If the status is ONLINE, the agent is configured properly and ready to use. If the status is OFFLINE, the agent has been out of contact with DataSync for five minutes or longer. This can happen for a few reasons. For more information, see What do I do if my agent is offline?
        Platform:
          $ref: "#/components/schemas/Platform"
          description: The platform-related details about the agent, such as the version number.
    LocationFilters:
      type: array
      items:
        $ref: "#/components/schemas/LocationFilter"
    LocationFilter:
      description: 'Narrow down the list of resources returned by ListLocations. For example, to see all your Amazon S3 locations, create a filter using "Name": "LocationType", "Operator": "Equals", and "Values": "S3". For more information, see filtering resources.'
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/LocationFilterName"
          description: The name of the filter being used. Each API call supports a list of filters that are available for it (for example, LocationType for ListLocations).
        Values:
          $ref: "#/components/schemas/FilterValues"
          description: The values that you want to filter for. For example, you might want to display only Amazon S3 locations.
        Operator:
          $ref: "#/components/schemas/Operator"
          description: The operator that is used to compare filter values (for example, Equals or Contains).
      required:
        - Name
        - Values
        - Operator
    LocationFilterName:
      type: string
      enum:
        - LocationUri
        - LocationType
        - CreationTime
    FilterValues:
      type: array
      items:
        $ref: "#/components/schemas/FilterAttributeValue"
    FilterAttributeValue:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[0-9a-zA-Z_\ \-\:\*\.\\/\?-]*$
    Operator:
      type: string
      enum:
        - Equals
        - NotEquals
        - In
        - LessThanOrEqual
        - LessThan
        - GreaterThanOrEqual
        - GreaterThan
        - Contains
        - NotContains
        - BeginsWith
    ListLocationsResponse:
      description: ListLocationsResponse
      type: object
      properties:
        Locations:
          $ref: "#/components/schemas/LocationList"
          description: An array that contains a list of locations.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque string that indicates the position at which to begin returning the next list of locations.
    LocationList:
      type: array
      items:
        $ref: "#/components/schemas/LocationListEntry"
    LocationListEntry:
      description: Represents a single entry in a list of locations. LocationListEntry returns an array that contains a list of locations when the ListLocations operation is called.
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The Amazon Resource Name (ARN) of the location. For Network File System (NFS) or Amazon EFS, the location is the export path. For Amazon S3, the location is the prefix path that you want to mount and use as the root of the location.
        LocationUri:
          $ref: "#/components/schemas/LocationUri"
          description: "Represents a list of URIs of a location. LocationUri returns an array that contains a list of locations when the ListLocations operation is called. Format: TYPE://GLOBAL_ID/SUBDIR. TYPE designates the type of location (for example, nfs or s3). GLOBAL_ID is the globally unique identifier of the resource that backs the location. An example for EFS is us-east-2.fs-abcd1234. An example for Amazon S3 is the bucket name, such as myBucket. An example for NFS is a valid IPv4 or IPv6 address or a hostname that is compliant with DNS. SUBDIR is a valid file system path, delimited by forward slashes as is the *nix convention. For NFS and Amazon EFS, it's the export path to mount the location. For Amazon S3, it's the prefix path that you mount to and treat as the root of the location."
    TaggableResourceArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):datasync:[a-z\-0-9]+:[0-9]{12}:(((agent|task|location)/(agent|task|loc)-[a-z0-9]{17}(/execution/exec-[a-f0-9]{17})?)|(system/storage-system-[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(/job/discovery-job-[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})?))$
    ListTagsForResourceResponse:
