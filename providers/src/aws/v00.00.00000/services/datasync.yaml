          description: The status of a task execution. For more information, see Task execution statuses.
        TaskMode:
          $ref: "#/components/schemas/TaskMode"
          description: The task mode that you're using. For more information, see Choosing a task mode for your data transfer.
    TaskFilters:
      type: array
      items:
        $ref: "#/components/schemas/TaskFilter"
    TaskFilter:
      description: You can use API filters to narrow down the list of resources returned by ListTasks. For example, to retrieve all tasks on a source location, you can use ListTasks with filter name LocationId and Operator Equals with the ARN for the location. For more information, see filtering DataSync resources.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/TaskFilterName"
          description: The name of the filter being used. Each API call supports a list of filters that are available for it. For example, LocationId for ListTasks.
        Values:
          $ref: "#/components/schemas/FilterValues"
          description: The values that you want to filter for. For example, you might want to display only tasks for a specific destination location.
        Operator:
          $ref: "#/components/schemas/Operator"
          description: The operator that is used to compare filter values (for example, Equals or Contains).
      required:
        - Name
        - Values
        - Operator
    TaskFilterName:
      type: string
      enum:
        - LocationId
        - CreationTime
    ListTasksResponse:
      description: ListTasksResponse
      type: object
      properties:
        Tasks:
          $ref: "#/components/schemas/TaskList"
          description: A list of all the tasks that are returned.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An opaque string that indicates the position at which to begin returning the next list of tasks.
    TaskList:
