      description: Specifies the data transfer protocol that DataSync uses to access your Amazon FSx file system. You can't update the Network File System (NFS) protocol configuration for FSx for ONTAP locations. DataSync currently only supports NFS version 3 with this location type.
      type: object
      properties:
        NFS:
          $ref: "#/components/schemas/FsxProtocolNfs"
        SMB:
          $ref: "#/components/schemas/FsxUpdateProtocolSmb"
          description: Specifies the Server Message Block (SMB) protocol configuration that DataSync uses to access your FSx for ONTAP file system's storage virtual machine (SVM).
    FsxUpdateProtocolSmb:
      description: Specifies the Server Message Block (SMB) protocol configuration that DataSync uses to access your Amazon FSx for NetApp ONTAP file system's storage virtual machine (SVM). For more information, see Providing DataSync access to FSx for ONTAP file systems.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/UpdateSmbDomain"
          description: Specifies the name of the Windows domain that your storage virtual machine (SVM) belongs to. If you have multiple Active Directory domains in your environment, configuring this parameter makes sure that DataSync connects to the right SVM.
        MountOptions:
          $ref: "#/components/schemas/SmbMountOptions"
        Password:
          $ref: "#/components/schemas/SmbPassword"
          description: Specifies the password of a user who has permission to access your SVM.
        User:
          $ref: "#/components/schemas/SmbUser"
          description: Specifies a user that can mount and access the files, folders, and metadata in your SVM. For information about choosing a user with the right level of access for your transfer, see Using the SMB protocol.
        CmkSecretConfig:
          $ref: "#/components/schemas/CmkSecretConfig"
          description: Specifies configuration information for a DataSync-managed secret, such as a Password or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed KMS key.
        CustomSecretConfig:
          $ref: "#/components/schemas/CustomSecretConfig"
          description: Specifies configuration information for a customer-managed secret, such as a Password or set of credentials that DataSync uses to access a specific transfer location. This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret.
    UpdateSmbDomain:
      type: string
      maxLength: 253
      pattern: ^([A-Za-z0-9]((\.|-+)?[A-Za-z0-9]){0,252})?$
    UpdateLocationFsxOntapResponse:
      type: object
    UpdateLocationFsxOpenZfsResponse:
