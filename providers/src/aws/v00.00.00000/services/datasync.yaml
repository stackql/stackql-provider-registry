  /StartTaskExecution:
    post:
      operationId: StartTaskExecution
      description: Starts an DataSync transfer task. For each task, you can only run one task execution at a time. There are several steps to a task execution. For more information, see Task execution statuses. If you're planning to transfer data to or from an Amazon S3 location, review how DataSync can affect your S3 request charges and the DataSync pricing page before you begin.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.StartTaskExecution
            default: FmrsService.StartTaskExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TaskArn:
                  $ref: "#/components/schemas/TaskArn"
                  description: Specifies the Amazon Resource Name (ARN) of the task that you want to start.
                OverrideOptions:
                  $ref: "#/components/schemas/Options"
                Includes:
                  $ref: "#/components/schemas/FilterList"
                  description: Specifies a list of filter rules that determines which files to include when running a task. The pattern should contain a single filter string that consists of the patterns to include. The patterns are delimited by "|" (that is, a pipe), for example, "/folder1|/folder2".
                Excludes:
                  $ref: "#/components/schemas/FilterList"
                  description: Specifies a list of filter rules that determines which files to exclude from a task. The list contains a single filter string that consists of the patterns to exclude. The patterns are delimited by "|" (that is, a pipe), for example, "/folder1|/folder2".
                ManifestConfig:
                  $ref: "#/components/schemas/ManifestConfig"
                  description: Configures a manifest, which is a list of files or objects that you want DataSync to transfer. For more information and configuration examples, see Specifying what DataSync transfers by using a manifest. When using this parameter, your caller identity (the role that you're using DataSync with) must have the iam:PassRole permission. The AWSDataSyncFullAccess policy includes this permission. To remove a manifest configuration, specify this parameter with an empty value.
                TaskReportConfig:
                  $ref: "#/components/schemas/TaskReportConfig"
                  description: Specifies how you want to configure a task report, which provides detailed information about your DataSync transfer. For more information, see Monitoring your DataSync transfers with task reports. When using this parameter, your caller identity (the role that you're using DataSync with) must have the iam:PassRole permission. The AWSDataSyncFullAccess policy includes this permission. To remove a task report configuration, specify this parameter as empty.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies the tags that you want to apply to the Amazon Resource Name (ARN) representing the task execution. Tags are key-value pairs that help you manage, filter, and search for your DataSync resources.
              required:
                - TaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTaskExecutionResponse"
