  /UpdateLocationAzureBlob:
    post:
      operationId: UpdateLocationAzureBlob
      description: Modifies the following configurations of the Microsoft Azure Blob Storage transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with Azure Blob Storage.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationAzureBlob
            default: FmrsService.UpdateLocationAzureBlob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the ARN of the Azure Blob Storage transfer location that you're updating.
                Subdirectory:
                  $ref: "#/components/schemas/AzureBlobSubdirectory"
                  description: Specifies path segments if you want to limit your transfer to a virtual directory in your container (for example, /my/images).
                AuthenticationType:
                  $ref: "#/components/schemas/AzureBlobAuthenticationType"
                  description: Specifies the authentication method DataSync uses to access your Azure Blob Storage. DataSync can access blob storage using a shared access signature (SAS).
                SasConfiguration:
                  $ref: "#/components/schemas/AzureBlobSasConfiguration"
                  description: Specifies the SAS configuration that allows DataSync to access your Azure Blob Storage.
                BlobType:
                  $ref: "#/components/schemas/AzureBlobType"
                  description: Specifies the type of blob that you want your objects or files to be when transferring them into Azure Blob Storage. Currently, DataSync only supports moving data into Azure Blob Storage as block blobs. For more information on blob types, see the Azure Blob Storage documentation.
                AccessTier:
                  $ref: "#/components/schemas/AzureAccessTier"
                  description: Specifies the access tier that you want your objects or files transferred into. This only applies when using the location as a transfer destination. For more information, see Access tiers.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: (Optional) Specifies the Amazon Resource Name (ARN) of the DataSync agent that can connect with your Azure Blob Storage container. If you are setting up an agentless cross-cloud transfer, you do not need to specify a value for this parameter. You can specify more than one agent. For more information, see Using multiple agents for your transfer. You cannot add or remove agents from a storage location after you initially create it.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, such as an authentication token or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed KMS key.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed secret, such as an authentication token or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationAzureBlobResponse"
  /UpdateLocationEfs:
    post:
      operationId: UpdateLocationEfs
      description: Modifies the following configuration parameters of the Amazon EFS transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with Amazon EFS.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationEfs
            default: FmrsService.UpdateLocationEfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the Amazon Resource Name (ARN) of the Amazon EFS transfer location that you're updating.
                Subdirectory:
                  $ref: "#/components/schemas/EfsSubdirectory"
                  description: Specifies a mount path for your Amazon EFS file system. This is where DataSync reads or writes data on your file system (depending on if this is a source or destination location). By default, DataSync uses the root directory (or access point if you provide one by using AccessPointArn). You can also include subdirectories using forward slashes (for example, /path/to/folder).
                AccessPointArn:
                  $ref: "#/components/schemas/UpdatedEfsAccessPointArn"
                  description: Specifies the Amazon Resource Name (ARN) of the access point that DataSync uses to mount your Amazon EFS file system. For more information, see Accessing restricted Amazon EFS file systems.
                FileSystemAccessRoleArn:
                  $ref: "#/components/schemas/UpdatedEfsIamRoleArn"
                  description: Specifies an Identity and Access Management (IAM) role that allows DataSync to access your Amazon EFS file system. For information on creating this role, see Creating a DataSync IAM role for Amazon EFS file system access.
                InTransitEncryption:
                  $ref: "#/components/schemas/EfsInTransitEncryption"
                  description: Specifies whether you want DataSync to use Transport Layer Security (TLS) 1.2 encryption when it transfers data to or from your Amazon EFS file system. If you specify an access point using AccessPointArn or an IAM role using FileSystemAccessRoleArn, you must set this parameter to TLS1_2.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationEfsResponse"
