openapi: 3.0.0
info:
  version: "2018-11-09"
  title: AWS DataSync
  description: AWS DataSync
  x-serviceName: datasync
  x-serviceAlias: datasync
  x-protocol: json
  x-apiVersion: "2018-11-09"
  x-endpointPrefix: datasync
  x-targetPrefix: FmrsService
  x-jsonVersion: "1.1"
servers:
  - url: https://datasync.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for datasync
paths:
  /CancelTaskExecution:
    post:
      operationId: CancelTaskExecution
      description: Stops an DataSync task execution that's in progress. The transfer of some files are abruptly interrupted. File contents that're transferred to the destination might be incomplete or inconsistent with the source files. However, if you start a new task execution using the same task and allow it to finish, file content on the destination will be complete and consistent. This applies to other unexpected failures that interrupt a task execution. In all of these cases, DataSync successfully completes the transfer when you start the next task execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CancelTaskExecution
            default: FmrsService.CancelTaskExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TaskExecutionArn:
                  $ref: "#/components/schemas/TaskExecutionArn"
                  description: The Amazon Resource Name (ARN) of the task execution to stop.
              required:
                - TaskExecutionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelTaskExecutionResponse"
  /CreateAgent:
    post:
      operationId: CreateAgent
      description: Activates an DataSync agent that you deploy in your storage environment. The activation process associates the agent with your Amazon Web Services account. If you haven't deployed an agent yet, see Do I need a DataSync agent?
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateAgent
            default: FmrsService.CreateAgent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ActivationKey:
                  $ref: "#/components/schemas/ActivationKey"
                  description: Specifies your DataSync agent's activation key. If you don't have an activation key, see Activating your agent.
                AgentName:
                  $ref: "#/components/schemas/TagValue"
                  description: Specifies a name for your agent. We recommend specifying a name that you can remember.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least one tag for your agent.
                VpcEndpointId:
                  $ref: "#/components/schemas/VpcEndpointId"
                  description: Specifies the ID of the VPC service endpoint that you're using. For example, a VPC endpoint ID looks like vpce-01234d5aff67890e1. The VPC service endpoint you use must include the DataSync service name (for example, com.amazonaws.us-east-2.datasync).
                SubnetArns:
                  $ref: "#/components/schemas/PLSubnetArnList"
                  description: Specifies the ARN of the subnet where your VPC service endpoint is located. You can only specify one ARN.
                SecurityGroupArns:
                  $ref: "#/components/schemas/PLSecurityGroupArnList"
                  description: Specifies the Amazon Resource Name (ARN) of the security group that allows traffic between your agent and VPC service endpoint. You can only specify one ARN.
              required:
                - ActivationKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
  /CreateLocationAzureBlob:
    post:
      operationId: CreateLocationAzureBlob
      description: Creates a transfer location for a Microsoft Azure Blob Storage container. DataSync can use this location as a transfer source or destination. You can make transfers with or without a DataSync agent that connects to your container. Before you begin, make sure you know how DataSync accesses Azure Blob Storage and works with access tiers and blob types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationAzureBlob
            default: FmrsService.CreateLocationAzureBlob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerUrl:
                  $ref: "#/components/schemas/AzureBlobContainerUrl"
                  description: Specifies the URL of the Azure Blob Storage container involved in your transfer.
                AuthenticationType:
                  $ref: "#/components/schemas/AzureBlobAuthenticationType"
                  description: Specifies the authentication method DataSync uses to access your Azure Blob Storage. DataSync can access blob storage using a shared access signature (SAS).
                SasConfiguration:
                  $ref: "#/components/schemas/AzureBlobSasConfiguration"
                  description: Specifies the SAS configuration that allows DataSync to access your Azure Blob Storage. If you provide an authentication token using SasConfiguration, but do not provide secret configuration details using CmkSecretConfig or CustomSecretConfig, then DataSync stores the token using your Amazon Web Services account's secrets manager secret.
                BlobType:
                  $ref: "#/components/schemas/AzureBlobType"
                  description: Specifies the type of blob that you want your objects or files to be when transferring them into Azure Blob Storage. Currently, DataSync only supports moving data into Azure Blob Storage as block blobs. For more information on blob types, see the Azure Blob Storage documentation.
                AccessTier:
                  $ref: "#/components/schemas/AzureAccessTier"
                  description: Specifies the access tier that you want your objects or files transferred into. This only applies when using the location as a transfer destination. For more information, see Access tiers.
                Subdirectory:
                  $ref: "#/components/schemas/AzureBlobSubdirectory"
                  description: Specifies path segments if you want to limit your transfer to a virtual directory in your container (for example, /my/images).
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: (Optional) Specifies the Amazon Resource Name (ARN) of the DataSync agent that can connect with your Azure Blob Storage container. If you are setting up an agentless cross-cloud transfer, you do not need to specify a value for this parameter. You can specify more than one agent. For more information, see Using multiple agents for your transfer. Make sure you configure this parameter correctly when you first create your storage location. You cannot add or remove agents from a storage location after you create it.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your transfer location.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, which includes the authentication token that DataSync uses to access a specific AzureBlob storage location, with a customer-managed KMS key. When you include this parameter as part of a CreateLocationAzureBlob request, you provide only the KMS key ARN. DataSync uses this KMS key together with the authentication token you specify for SasConfiguration to create a DataSync-managed secret to store the location access credentials. Make sure that DataSync has permission to access the KMS key that you specify. For more information, see Using a service-managed secret encrypted with a custom KMS key. You can use either CmkSecretConfig (with SasConfiguration) or CustomSecretConfig (without SasConfiguration) to provide credentials for a CreateLocationAzureBlob request. Do not provide both parameters for the same request.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed Secrets Manager secret where the authentication token for an AzureBlob storage location is stored in plain text, in Secrets Manager. This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. For more information, see Using a secret that you manage. You can use either CmkSecretConfig (with SasConfiguration) or CustomSecretConfig (without SasConfiguration) to provide credentials for a CreateLocationAzureBlob request. Do not provide both parameters for the same request.
              required:
                - ContainerUrl
                - AuthenticationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationAzureBlobResponse"
  /CreateLocationEfs:
    post:
      operationId: CreateLocationEfs
      description: Creates a transfer location for an Amazon EFS file system. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses Amazon EFS file systems.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationEfs
            default: FmrsService.CreateLocationEfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subdirectory:
                  $ref: "#/components/schemas/EfsSubdirectory"
                  description: Specifies a mount path for your Amazon EFS file system. This is where DataSync reads or writes data on your file system (depending on if this is a source or destination location). By default, DataSync uses the root directory (or access point if you provide one by using AccessPointArn). You can also include subdirectories using forward slashes (for example, /path/to/folder).
                EfsFilesystemArn:
                  $ref: "#/components/schemas/EfsFilesystemArn"
                  description: Specifies the ARN for your Amazon EFS file system.
                Ec2Config:
                  $ref: "#/components/schemas/Ec2Config"
                  description: Specifies the subnet and security groups DataSync uses to connect to one of your Amazon EFS file system's mount targets.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies the key-value pair that represents a tag that you want to add to the resource. The value can be an empty string. This value helps you manage, filter, and search for your resources. We recommend that you create a name tag for your location.
                AccessPointArn:
                  $ref: "#/components/schemas/EfsAccessPointArn"
                  description: Specifies the Amazon Resource Name (ARN) of the access point that DataSync uses to mount your Amazon EFS file system. For more information, see Accessing restricted file systems.
                FileSystemAccessRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: Specifies an Identity and Access Management (IAM) role that allows DataSync to access your Amazon EFS file system. For information on creating this role, see Creating a DataSync IAM role for file system access.
                InTransitEncryption:
                  $ref: "#/components/schemas/EfsInTransitEncryption"
                  description: Specifies whether you want DataSync to use Transport Layer Security (TLS) 1.2 encryption when it transfers data to or from your Amazon EFS file system. If you specify an access point using AccessPointArn or an IAM role using FileSystemAccessRoleArn, you must set this parameter to TLS1_2.
              required:
                - EfsFilesystemArn
                - Ec2Config
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationEfsResponse"
  /CreateLocationFsxLustre:
    post:
      operationId: CreateLocationFsxLustre
      description: Creates a transfer location for an Amazon FSx for Lustre file system. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses FSx for Lustre file systems.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationFsxLustre
            default: FmrsService.CreateLocationFsxLustre
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FsxFilesystemArn:
                  $ref: "#/components/schemas/FsxFilesystemArn"
                  description: Specifies the Amazon Resource Name (ARN) of the FSx for Lustre file system.
                SecurityGroupArns:
                  $ref: "#/components/schemas/Ec2SecurityGroupArnList"
                  description: Specifies the Amazon Resource Names (ARNs) of up to five security groups that provide access to your FSx for Lustre file system. The security groups must be able to access the file system's ports. The file system must also allow access from the security groups. For information about file system access, see the Amazon FSx for Lustre User Guide .
                Subdirectory:
                  $ref: "#/components/schemas/FsxLustreSubdirectory"
                  description: Specifies a mount path for your FSx for Lustre file system. The path can include subdirectories. When the location is used as a source, DataSync reads data from the mount path. When the location is used as a destination, DataSync writes data to the mount path. If you don't include this parameter, DataSync uses the file system's root directory (/).
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your location.
              required:
                - FsxFilesystemArn
                - SecurityGroupArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationFsxLustreResponse"
  /CreateLocationFsxOntap:
    post:
      operationId: CreateLocationFsxOntap
      description: Creates a transfer location for an Amazon FSx for NetApp ONTAP file system. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses FSx for ONTAP file systems.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationFsxOntap
            default: FmrsService.CreateLocationFsxOntap
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Protocol:
                  $ref: "#/components/schemas/FsxProtocol"
                SecurityGroupArns:
                  $ref: "#/components/schemas/Ec2SecurityGroupArnList"
                  description: "Specifies the Amazon EC2 security groups that provide access to your file system's preferred subnet. The security groups must allow outbound traffic on the following ports (depending on the protocol you use): Network File System (NFS): TCP ports 111, 635, and 2049 Server Message Block (SMB): TCP port 445 Your file system's security groups must also allow inbound traffic on the same ports."
                StorageVirtualMachineArn:
                  $ref: "#/components/schemas/StorageVirtualMachineArn"
                  description: Specifies the ARN of the storage virtual machine (SVM) in your file system where you want to copy data to or from.
                Subdirectory:
                  $ref: "#/components/schemas/FsxOntapSubdirectory"
                  description: Specifies a path to the file share in the SVM where you want to transfer data to or from. You can specify a junction path (also known as a mount point), qtree path (for NFS file shares), or share name (for SMB file shares). For example, your mount path might be /vol1, /vol1/tree1, or /share1. Don't specify a junction path in the SVM's root volume. For more information, see Managing FSx for ONTAP storage virtual machines in the Amazon FSx for NetApp ONTAP User Guide.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your location.
              required:
                - SecurityGroupArns
                - StorageVirtualMachineArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationFsxOntapResponse"
  /CreateLocationFsxOpenZfs:
    post:
      operationId: CreateLocationFsxOpenZfs
      description: Creates a transfer location for an Amazon FSx for OpenZFS file system. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses FSx for OpenZFS file systems. Request parameters related to SMB aren't supported with the CreateLocationFsxOpenZfs operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationFsxOpenZfs
            default: FmrsService.CreateLocationFsxOpenZfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FsxFilesystemArn:
                  $ref: "#/components/schemas/FsxFilesystemArn"
                  description: The Amazon Resource Name (ARN) of the FSx for OpenZFS file system.
                Protocol:
                  $ref: "#/components/schemas/FsxProtocol"
                  description: The type of protocol that DataSync uses to access your file system.
                SecurityGroupArns:
                  $ref: "#/components/schemas/Ec2SecurityGroupArnList"
                  description: The ARNs of the security groups that are used to configure the FSx for OpenZFS file system.
                Subdirectory:
                  $ref: "#/components/schemas/FsxOpenZfsSubdirectory"
                  description: A subdirectory in the location's path that must begin with /fsx. DataSync uses this subdirectory to read or write data (depending on whether the file system is a source or destination location).
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: The key-value pair that represents a tag that you want to add to the resource. The value can be an empty string. This value helps you manage, filter, and search for your resources. We recommend that you create a name tag for your location.
              required:
                - FsxFilesystemArn
                - SecurityGroupArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationFsxOpenZfsResponse"
  /CreateLocationFsxWindows:
    post:
      operationId: CreateLocationFsxWindows
      description: Creates a transfer location for an Amazon FSx for Windows File Server file system. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses FSx for Windows File Server file systems.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationFsxWindows
            default: FmrsService.CreateLocationFsxWindows
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subdirectory:
                  $ref: "#/components/schemas/FsxWindowsSubdirectory"
                  description: Specifies a mount path for your file system using forward slashes. This is where DataSync reads or writes data (depending on if this is a source or destination location).
                FsxFilesystemArn:
                  $ref: "#/components/schemas/FsxFilesystemArn"
                  description: Specifies the Amazon Resource Name (ARN) for the FSx for Windows File Server file system.
                SecurityGroupArns:
                  $ref: "#/components/schemas/Ec2SecurityGroupArnList"
                  description: "Specifies the ARNs of the Amazon EC2 security groups that provide access to your file system's preferred subnet. The security groups that you specify must be able to communicate with your file system's security groups. For information about configuring security groups for file system access, see the Amazon FSx for Windows File Server User Guide . If you choose a security group that doesn't allow connections from within itself, do one of the following: Configure the security group to allow it to communicate within itself. Choose a different security group that can communicate with the mount target's security group."
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your location.
                User:
                  $ref: "#/components/schemas/SmbUser"
                  description: Specifies the user with the permissions to mount and access the files, folders, and file metadata in your FSx for Windows File Server file system. For information about choosing a user with the right level of access for your transfer, see required permissions for FSx for Windows File Server locations.
                Domain:
                  $ref: "#/components/schemas/SmbDomain"
                  description: Specifies the name of the Windows domain that the FSx for Windows File Server file system belongs to. If you have multiple Active Directory domains in your environment, configuring this parameter makes sure that DataSync connects to the right file system.
                Password:
                  $ref: "#/components/schemas/SmbPassword"
                  description: Specifies the password of the user with the permissions to mount and access the files, folders, and file metadata in your FSx for Windows File Server file system.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, which includes the password that DataSync uses to access a specific FSx Windows storage location, with a customer-managed KMS key. When you include this parameter as part of a CreateLocationFsxWindows request, you provide only the KMS key ARN. DataSync uses this KMS key together with the Password you specify for to create a DataSync-managed secret to store the location access credentials. Make sure that DataSync has permission to access the KMS key that you specify. For more information, see Using a service-managed secret encrypted with a custom KMS key. You can use either CmkSecretConfig (with Password) or CustomSecretConfig (without Password) to provide credentials for a CreateLocationFsxWindows request. Do not provide both parameters for the same request.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed Secrets Manager secret where the password for an FSx for Windows File Server storage location is stored in plain text, in Secrets Manager. This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. For more information, see Using a secret that you manage. You can use either CmkSecretConfig (with Password) or CustomSecretConfig (without Password) to provide credentials for a CreateLocationFsxWindows request. Do not provide both parameters for the same request.
              required:
                - FsxFilesystemArn
                - SecurityGroupArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationFsxWindowsResponse"
  /CreateLocationHdfs:
    post:
      operationId: CreateLocationHdfs
      description: Creates a transfer location for a Hadoop Distributed File System (HDFS). DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses HDFS clusters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationHdfs
            default: FmrsService.CreateLocationHdfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subdirectory:
                  $ref: "#/components/schemas/HdfsSubdirectory"
                  description: A subdirectory in the HDFS cluster. This subdirectory is used to read data from or write data to the HDFS cluster. If the subdirectory isn't specified, it will default to /.
                NameNodes:
                  $ref: "#/components/schemas/HdfsNameNodeList"
                  description: The NameNode that manages the HDFS namespace. The NameNode performs operations such as opening, closing, and renaming files and directories. The NameNode contains the information to map blocks of data to the DataNodes. You can use only one NameNode.
                BlockSize:
                  $ref: "#/components/schemas/HdfsBlockSize"
                  description: The size of data blocks to write into the HDFS cluster. The block size must be a multiple of 512 bytes. The default block size is 128 mebibytes (MiB).
                ReplicationFactor:
                  $ref: "#/components/schemas/HdfsReplicationFactor"
                  description: The number of DataNodes to replicate the data to when writing to the HDFS cluster. By default, data is replicated to three DataNodes.
                KmsKeyProviderUri:
                  $ref: "#/components/schemas/KmsKeyProviderUri"
                  description: The URI of the HDFS cluster's Key Management Server (KMS).
                QopConfiguration:
                  $ref: "#/components/schemas/QopConfiguration"
                  description: The Quality of Protection (QOP) configuration specifies the Remote Procedure Call (RPC) and data transfer protection settings configured on the Hadoop Distributed File System (HDFS) cluster. If QopConfiguration isn't specified, RpcProtection and DataTransferProtection default to PRIVACY. If you set RpcProtection or DataTransferProtection, the other parameter assumes the same value.
                AuthenticationType:
                  $ref: "#/components/schemas/HdfsAuthenticationType"
                  description: The type of authentication used to determine the identity of the user.
                SimpleUser:
                  $ref: "#/components/schemas/HdfsUser"
                  description: The user name used to identify the client on the host operating system. If SIMPLE is specified for AuthenticationType, this parameter is required.
                KerberosPrincipal:
                  $ref: "#/components/schemas/KerberosPrincipal"
                  description: The Kerberos principal with access to the files and folders on the HDFS cluster. If KERBEROS is specified for AuthenticationType, this parameter is required.
                KerberosKeytab:
                  $ref: "#/components/schemas/KerberosKeytabFile"
                  description: The Kerberos key table (keytab) that contains mappings between the defined Kerberos principal and the encrypted keys. You can load the keytab from a file by providing the file's address. If KERBEROS is specified for AuthenticationType, this parameter is required.
                KerberosKrb5Conf:
                  $ref: "#/components/schemas/KerberosKrb5ConfFile"
                  description: The krb5.conf file that contains the Kerberos configuration information. You can load the krb5.conf file by providing the file's address. If you're using the CLI, it performs the base64 encoding for you. Otherwise, provide the base64-encoded text. If KERBEROS is specified for AuthenticationType, this parameter is required.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: The Amazon Resource Names (ARNs) of the DataSync agents that can connect to your HDFS cluster.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: The key-value pair that represents the tag that you want to add to the location. The value can be an empty string. We recommend using tags to name your resources.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, which includes the Kerberos keytab that DataSync uses to access a specific Hadoop Distributed File System (HDFS) storage location, with a customer-managed KMS key. When you include this parameter as part of a CreateLocationHdfs request, you provide only the KMS key ARN. DataSync uses this KMS key together with the KerberosKeytab you specify for to create a DataSync-managed secret to store the location access credentials. Make sure that DataSync has permission to access the KMS key that you specify. For more information, see Using a service-managed secret encrypted with a custom KMS key. You can use either CmkSecretConfig (with KerberosKeytab) or CustomSecretConfig (without KerberosKeytab) to provide credentials for a CreateLocationHdfs request. Do not provide both parameters for the same request.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed Secrets Manager secret where the Kerberos keytab for the HDFS storage location is stored in binary, in Secrets Manager. This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. For more information, see Using a secret that you manage. You can use either CmkSecretConfig (with KerberosKeytab) or CustomSecretConfig (without KerberosKeytab) to provide credentials for a CreateLocationHdfs request. Do not provide both parameters for the same request.
              required:
                - NameNodes
                - AuthenticationType
                - AgentArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationHdfsResponse"
  /CreateLocationNfs:
    post:
      operationId: CreateLocationNfs
      description: Creates a transfer location for a Network File System (NFS) file server. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses NFS file servers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationNfs
            default: FmrsService.CreateLocationNfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subdirectory:
                  $ref: "#/components/schemas/NfsSubdirectory"
                  description: Specifies the export path in your NFS file server that you want DataSync to mount. This path (or a subdirectory of the path) is where DataSync transfers data to or from. For information on configuring an export for DataSync, see Accessing NFS file servers.
                ServerHostname:
                  $ref: "#/components/schemas/ServerHostname"
                  description: Specifies the DNS name or IP address (IPv4 or IPv6) of the NFS file server that your DataSync agent connects to.
                OnPremConfig:
                  $ref: "#/components/schemas/OnPremConfig"
                  description: Specifies the Amazon Resource Name (ARN) of the DataSync agent that can connect to your NFS file server. You can specify more than one agent. For more information, see Using multiple DataSync agents.
                MountOptions:
                  $ref: "#/components/schemas/NfsMountOptions"
                  description: Specifies the options that DataSync can use to mount your NFS file server.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your location.
              required:
                - Subdirectory
                - ServerHostname
                - OnPremConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationNfsResponse"
  /CreateLocationObjectStorage:
    post:
      operationId: CreateLocationObjectStorage
      description: Creates a transfer location for an object storage system. DataSync can use this location as a source or destination for transferring data. You can make transfers with or without a DataSync agent. Before you begin, make sure that you understand the prerequisites for DataSync to work with object storage systems.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationObjectStorage
            default: FmrsService.CreateLocationObjectStorage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServerHostname:
                  $ref: "#/components/schemas/ServerHostname"
                  description: Specifies the domain name or IP address (IPv4 or IPv6) of the object storage server that your DataSync agent connects to.
                ServerPort:
                  $ref: "#/components/schemas/ObjectStorageServerPort"
                  description: Specifies the port that your object storage server accepts inbound network traffic on (for example, port 443).
                ServerProtocol:
                  $ref: "#/components/schemas/ObjectStorageServerProtocol"
                  description: Specifies the protocol that your object storage server uses to communicate. If not specified, the default value is HTTPS.
                Subdirectory:
                  $ref: "#/components/schemas/S3Subdirectory"
                  description: Specifies the object prefix for your object storage server. If this is a source location, DataSync only copies objects with this prefix. If this is a destination location, DataSync writes all objects with this prefix.
                BucketName:
                  $ref: "#/components/schemas/ObjectStorageBucketName"
                  description: Specifies the name of the object storage bucket involved in the transfer.
                AccessKey:
                  $ref: "#/components/schemas/ObjectStorageAccessKey"
                  description: Specifies the access key (for example, a user name) if credentials are required to authenticate with the object storage server.
                SecretKey:
                  $ref: "#/components/schemas/ObjectStorageSecretKey"
                  description: Specifies the secret key (for example, a password) if credentials are required to authenticate with the object storage server. If you provide a secret using SecretKey, but do not provide secret configuration details using CmkSecretConfig or CustomSecretConfig, then DataSync stores the token using your Amazon Web Services account's Secrets Manager secret.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: (Optional) Specifies the Amazon Resource Names (ARNs) of the DataSync agents that can connect with your object storage system. If you are setting up an agentless cross-cloud transfer, you do not need to specify a value for this parameter. Make sure you configure this parameter correctly when you first create your storage location. You cannot add or remove agents from a storage location after you create it.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies the key-value pair that represents a tag that you want to add to the resource. Tags can help you manage, filter, and search for your resources. We recommend creating a name tag for your location.
                ServerCertificate:
                  $ref: "#/components/schemas/ObjectStorageCertificate"
                  description: "Specifies a certificate chain for DataSync to authenticate with your object storage system if the system uses a private or self-signed certificate authority (CA). You must specify a single .pem file with a full certificate chain (for example, file:///home/user/.ssh/object_storage_certificates.pem). The certificate chain might include: The object storage system's certificate All intermediate certificates (if there are any) The root certificate of the signing CA You can concatenate your certificates into a .pem file (which can be up to 32768 bytes before base64 encoding). The following example cat command creates an object_storage_certificates.pem file that includes three certificates: cat object_server_certificate.pem intermediate_certificate.pem ca_root_certificate.pem > object_storage_certificates.pem To use this parameter, configure ServerProtocol to HTTPS."
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, which includes the SecretKey that DataSync uses to access a specific object storage location, with a customer-managed KMS key. When you include this parameter as part of a CreateLocationObjectStorage request, you provide only the KMS key ARN. DataSync uses this KMS key together with the value you specify for the SecretKey parameter to create a DataSync-managed secret to store the location access credentials. Make sure that DataSync has permission to access the KMS key that you specify. For more information, see Using a service-managed secret encrypted with a custom KMS key. You can use either CmkSecretConfig (with SecretKey) or CustomSecretConfig (without SecretKey) to provide credentials for a CreateLocationObjectStorage request. Do not provide both parameters for the same request.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed Secrets Manager secret where the secret key for a specific object storage location is stored in plain text, in Secrets Manager. This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. For more information, see Using a secret that you manage. You can use either CmkSecretConfig (with SecretKey) or CustomSecretConfig (without SecretKey) to provide credentials for a CreateLocationObjectStorage request. Do not provide both parameters for the same request.
              required:
                - ServerHostname
                - BucketName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationObjectStorageResponse"
  /CreateLocationS3:
    post:
      operationId: CreateLocationS3
      description: "Creates a transfer location for an Amazon S3 bucket. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you read the following topics: Storage class considerations with Amazon S3 locations Evaluating S3 request costs when using DataSync For more information, see Configuring transfers with Amazon S3."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationS3
            default: FmrsService.CreateLocationS3
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subdirectory:
                  $ref: "#/components/schemas/S3Subdirectory"
                  description: "Specifies a prefix in the S3 bucket that DataSync reads from or writes to (depending on whether the bucket is a source or destination location). DataSync can't transfer objects with a prefix that begins with a slash (/) or includes //, /./, or /../ patterns. For example: /photos photos//2006/January photos/./2006/February photos/../2006/March"
                S3BucketArn:
                  $ref: "#/components/schemas/S3BucketArn"
                  description: Specifies the ARN of the S3 bucket that you want to use as a location. (When creating your DataSync task later, you specify whether this location is a transfer source or destination.) If your S3 bucket is located on an Outposts resource, you must specify an Amazon S3 access point. For more information, see Managing data access with Amazon S3 access points in the Amazon S3 User Guide.
                S3StorageClass:
                  $ref: "#/components/schemas/S3StorageClass"
                  description: Specifies the storage class that you want your objects to use when Amazon S3 is a transfer destination. For buckets in Amazon Web Services Regions, the storage class defaults to STANDARD. For buckets on Outposts, the storage class defaults to OUTPOSTS. For more information, see Storage class considerations with Amazon S3 transfers.
                S3Config:
                  $ref: "#/components/schemas/S3Config"
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: (Amazon S3 on Outposts only) Specifies the Amazon Resource Name (ARN) of the DataSync agent on your Outpost. For more information, see Deploy your DataSync agent on Outposts.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your transfer location.
              required:
                - S3BucketArn
                - S3Config
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationS3Response"
  /CreateLocationSmb:
    post:
      operationId: CreateLocationSmb
      description: Creates a transfer location for a Server Message Block (SMB) file server. DataSync can use this location as a source or destination for transferring data. Before you begin, make sure that you understand how DataSync accesses SMB file servers. For more information, see Providing DataSync access to SMB file servers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateLocationSmb
            default: FmrsService.CreateLocationSmb
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Subdirectory:
                  $ref: "#/components/schemas/SmbSubdirectory"
                  description: Specifies the name of the share exported by your SMB file server where DataSync will read or write data. You can include a subdirectory in the share path (for example, /path/to/subdirectory). Make sure that other SMB clients in your network can also mount this path. To copy all data in the subdirectory, DataSync must be able to mount the SMB share and access all of its data. For more information, see Providing DataSync access to SMB file servers.
                ServerHostname:
                  $ref: "#/components/schemas/ServerHostname"
                  description: Specifies the domain name or IP address (IPv4 or IPv6) of the SMB file server that your DataSync agent connects to. If you're using Kerberos authentication, you must specify a domain name.
                User:
                  $ref: "#/components/schemas/SmbUser"
                  description: Specifies the user that can mount and access the files, folders, and file metadata in your SMB file server. This parameter applies only if AuthenticationType is set to NTLM. For information about choosing a user with the right level of access for your transfer, see Providing DataSync access to SMB file servers.
                Domain:
                  $ref: "#/components/schemas/SmbDomain"
                  description: Specifies the Windows domain name that your SMB file server belongs to. This parameter applies only if AuthenticationType is set to NTLM. If you have multiple domains in your environment, configuring this parameter makes sure that DataSync connects to the right file server.
                Password:
                  $ref: "#/components/schemas/SmbPassword"
                  description: Specifies the password of the user who can mount your SMB file server and has permission to access the files and folders involved in your transfer. This parameter applies only if AuthenticationType is set to NTLM.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, either a Password or KerberosKeytab (for NTLM (default) and KERBEROS authentication types, respectively) that DataSync uses to access a specific SMB storage location, with a customer-managed KMS key. When you include this parameter as part of a CreateLocationSmbRequest request, you provide only the KMS key ARN. DataSync uses this KMS key together with either the Password or KerberosKeytab you specify to create a DataSync-managed secret to store the location access credentials. Make sure that DataSync has permission to access the KMS key that you specify. For more information, see Using a service-managed secret encrypted with a custom KMS key. You can use either CmkSecretConfig (with either Password or KerberosKeytab) or CustomSecretConfig (without any Password and KerberosKeytab) to provide credentials for a CreateLocationSmbRequest request. Do not provide both CmkSecretConfig and CustomSecretConfig parameters for the same request.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed Secrets Manager secret where the SMB storage location credentials is stored in Secrets Manager as plain text (for Password) or binary (for KerberosKeytab). This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. For more information, see Using a secret that you manage. You can use either CmkSecretConfig (with SasConfiguration) or CustomSecretConfig (without SasConfiguration) to provide credentials for a CreateLocationSmbRequest request. Do not provide both parameters for the same request.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: Specifies the DataSync agent (or agents) that can connect to your SMB file server. You specify an agent by using its Amazon Resource Name (ARN).
                MountOptions:
                  $ref: "#/components/schemas/SmbMountOptions"
                  description: Specifies the version of the SMB protocol that DataSync uses to access your SMB file server.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies labels that help you categorize, filter, and search for your Amazon Web Services resources. We recommend creating at least a name tag for your location.
                AuthenticationType:
                  $ref: "#/components/schemas/SmbAuthenticationType"
                  description: Specifies the authentication protocol that DataSync uses to connect to your SMB file server. DataSync supports NTLM (default) and KERBEROS authentication. For more information, see Providing DataSync access to SMB file servers.
                DnsIpAddresses:
                  $ref: "#/components/schemas/DnsIpList"
                  description: Specifies the IPv4 or IPv6 addresses for the DNS servers that your SMB file server belongs to. This parameter applies only if AuthenticationType is set to KERBEROS. If you have multiple domains in your environment, configuring this parameter makes sure that DataSync connects to the right SMB file server.
                KerberosPrincipal:
                  $ref: "#/components/schemas/KerberosPrincipal"
                  description: Specifies a Kerberos principal, which is an identity in your Kerberos realm that has permission to access the files, folders, and file metadata in your SMB file server. A Kerberos principal might look like HOST/kerberosuser@MYDOMAIN.ORG. Principal names are case sensitive. Your DataSync task execution will fail if the principal that you specify for this parameter doesn’t exactly match the principal that you use to create the keytab file.
                KerberosKeytab:
                  $ref: "#/components/schemas/KerberosKeytabFile"
                  description: Specifies your Kerberos key table (keytab) file, which includes mappings between your Kerberos principal and encryption keys. To avoid task execution errors, make sure that the Kerberos principal that you use to create the keytab file matches exactly what you specify for KerberosPrincipal.
                KerberosKrb5Conf:
                  $ref: "#/components/schemas/KerberosKrb5ConfFile"
                  description: Specifies a Kerberos configuration file (krb5.conf) that defines your Kerberos realm configuration. The file must be base64 encoded. If you're using the CLI, the encoding is done for you.
              required:
                - Subdirectory
                - ServerHostname
                - AgentArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLocationSmbResponse"
  /CreateTask:
    post:
      operationId: CreateTask
      description: Configures a task, which defines where and how DataSync transfers your data. A task includes a source location, destination location, and transfer options (such as bandwidth limits, scheduling, and more). If you're planning to transfer data to or from an Amazon S3 location, review how DataSync can affect your S3 request charges and the DataSync pricing page before you begin.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.CreateTask
            default: FmrsService.CreateTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SourceLocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the ARN of your transfer's source location.
                DestinationLocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the ARN of your transfer's destination location.
                CloudWatchLogGroupArn:
                  $ref: "#/components/schemas/LogGroupArn"
                  description: Specifies the Amazon Resource Name (ARN) of an Amazon CloudWatch log group for monitoring your task. For Enhanced mode tasks, you don't need to specify anything. DataSync automatically sends logs to a CloudWatch log group named /aws/datasync.
                Name:
                  $ref: "#/components/schemas/TagValue"
                  description: Specifies the name of your task.
                Options:
                  $ref: "#/components/schemas/Options"
                  description: Specifies your task's settings, such as preserving file metadata, verifying data integrity, among other options.
                Excludes:
                  $ref: "#/components/schemas/FilterList"
                  description: Specifies exclude filters that define the files, objects, and folders in your source location that you don't want DataSync to transfer. For more information and examples, see Specifying what DataSync transfers by using filters.
                Schedule:
                  $ref: "#/components/schemas/TaskSchedule"
                  description: Specifies a schedule for when you want your task to run. For more information, see Scheduling your task.
                Tags:
                  $ref: "#/components/schemas/InputTagList"
                  description: Specifies the tags that you want to apply to your task. Tags are key-value pairs that help you manage, filter, and search for your DataSync resources.
                Includes:
                  $ref: "#/components/schemas/FilterList"
                  description: Specifies include filters that define the files, objects, and folders in your source location that you want DataSync to transfer. For more information and examples, see Specifying what DataSync transfers by using filters.
                ManifestConfig:
                  $ref: "#/components/schemas/ManifestConfig"
                  description: Configures a manifest, which is a list of files or objects that you want DataSync to transfer. For more information and configuration examples, see Specifying what DataSync transfers by using a manifest. When using this parameter, your caller identity (the role that you're using DataSync with) must have the iam:PassRole permission. The AWSDataSyncFullAccess policy includes this permission.
                TaskReportConfig:
                  $ref: "#/components/schemas/TaskReportConfig"
                  description: Specifies how you want to configure a task report, which provides detailed information about your DataSync transfer. For more information, see Monitoring your DataSync transfers with task reports. When using this parameter, your caller identity (the role that you're using DataSync with) must have the iam:PassRole permission. The AWSDataSyncFullAccess policy includes this permission.
                TaskMode:
                  $ref: "#/components/schemas/TaskMode"
                  description: "Specifies one of the following task modes for your data transfer: ENHANCED - Transfer virtually unlimited numbers of objects with higher performance than Basic mode. Enhanced mode tasks optimize the data transfer process by listing, preparing, transferring, and verifying data in parallel. Enhanced mode is currently available for transfers between Amazon S3 locations, transfers between Azure Blob and Amazon S3 without an agent, and transfers between other clouds and Amazon S3 without an agent. To create an Enhanced mode task, the IAM role that you use to call the CreateTask operation must have the iam:CreateServiceLinkedRole permission. BASIC (default) - Transfer files or objects between Amazon Web Services storage and all other supported DataSync locations. Basic mode tasks are subject to quotas on the number of files, objects, and directories in a dataset. Basic mode sequentially prepares, transfers, and verifies data, making it slower than Enhanced mode for most workloads. For more information, see Understanding task mode differences."
              required:
                - SourceLocationArn
                - DestinationLocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTaskResponse"
  /DeleteAgent:
