                Subdirectory:
                  $ref: "#/components/schemas/SmbSubdirectory"
                  description: Specifies a mount path for your FSx for Lustre file system. The path can include subdirectories. When the location is used as a source, DataSync reads data from the mount path. When the location is used as a destination, DataSync writes data to the mount path. If you don't include this parameter, DataSync uses the file system's root directory (/).
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationFsxLustreResponse"
  /UpdateLocationFsxOntap:
    post:
      operationId: UpdateLocationFsxOntap
      description: Modifies the following configuration parameters of the Amazon FSx for NetApp ONTAP transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with FSx for ONTAP.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationFsxOntap
            default: FmrsService.UpdateLocationFsxOntap
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the Amazon Resource Name (ARN) of the FSx for ONTAP transfer location that you're updating.
                Protocol:
                  $ref: "#/components/schemas/FsxUpdateProtocol"
                  description: Specifies the data transfer protocol that DataSync uses to access your Amazon FSx file system.
                Subdirectory:
                  $ref: "#/components/schemas/FsxOntapSubdirectory"
                  description: Specifies a path to the file share in the storage virtual machine (SVM) where you want to transfer data to or from. You can specify a junction path (also known as a mount point), qtree path (for NFS file shares), or share name (for SMB file shares). For example, your mount path might be /vol1, /vol1/tree1, or /share1. Don't specify a junction path in the SVM's root volume. For more information, see Managing FSx for ONTAP storage virtual machines in the Amazon FSx for NetApp ONTAP User Guide.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationFsxOntapResponse"
  /UpdateLocationFsxOpenZfs:
    post:
      operationId: UpdateLocationFsxOpenZfs
      description: Modifies the following configuration parameters of the Amazon FSx for OpenZFS transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with FSx for OpenZFS. Request parameters related to SMB aren't supported with the UpdateLocationFsxOpenZfs operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationFsxOpenZfs
            default: FmrsService.UpdateLocationFsxOpenZfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the Amazon Resource Name (ARN) of the FSx for OpenZFS transfer location that you're updating.
                Protocol:
                  $ref: "#/components/schemas/FsxProtocol"
                Subdirectory:
                  $ref: "#/components/schemas/SmbSubdirectory"
                  description: Specifies a subdirectory in the location's path that must begin with /fsx. DataSync uses this subdirectory to read or write data (depending on whether the file system is a source or destination location).
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationFsxOpenZfsResponse"
  /UpdateLocationFsxWindows:
    post:
      operationId: UpdateLocationFsxWindows
      description: Modifies the following configuration parameters of the Amazon FSx for Windows File Server transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with FSx for Windows File Server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationFsxWindows
            default: FmrsService.UpdateLocationFsxWindows
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the ARN of the FSx for Windows File Server transfer location that you're updating.
                Subdirectory:
                  $ref: "#/components/schemas/FsxWindowsSubdirectory"
                  description: Specifies a mount path for your file system using forward slashes. DataSync uses this subdirectory to read or write data (depending on whether the file system is a source or destination location).
                Domain:
                  $ref: "#/components/schemas/UpdateSmbDomain"
                  description: Specifies the name of the Windows domain that your FSx for Windows File Server file system belongs to. If you have multiple Active Directory domains in your environment, configuring this parameter makes sure that DataSync connects to the right file system.
                User:
                  $ref: "#/components/schemas/SmbUser"
                  description: Specifies the user with the permissions to mount and access the files, folders, and file metadata in your FSx for Windows File Server file system. For information about choosing a user with the right level of access for your transfer, see required permissions for FSx for Windows File Server locations.
                Password:
                  $ref: "#/components/schemas/SmbPassword"
                  description: Specifies the password of the user with the permissions to mount and access the files, folders, and file metadata in your FSx for Windows File Server file system.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, such as a Password or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed KMS key.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed secret, such as a Password or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationFsxWindowsResponse"
  /UpdateLocationHdfs:
    post:
      operationId: UpdateLocationHdfs
      description: Modifies the following configuration parameters of the Hadoop Distributed File System (HDFS) transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with an HDFS cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationHdfs
            default: FmrsService.UpdateLocationHdfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: The Amazon Resource Name (ARN) of the source HDFS cluster location.
                Subdirectory:
                  $ref: "#/components/schemas/HdfsSubdirectory"
                  description: A subdirectory in the HDFS cluster. This subdirectory is used to read data from or write data to the HDFS cluster.
                NameNodes:
                  $ref: "#/components/schemas/HdfsNameNodeList"
                  description: The NameNode that manages the HDFS namespace. The NameNode performs operations such as opening, closing, and renaming files and directories. The NameNode contains the information to map blocks of data to the DataNodes. You can use only one NameNode.
                BlockSize:
                  $ref: "#/components/schemas/HdfsBlockSize"
                  description: The size of the data blocks to write into the HDFS cluster.
                ReplicationFactor:
                  $ref: "#/components/schemas/HdfsReplicationFactor"
                  description: The number of DataNodes to replicate the data to when writing to the HDFS cluster.
                KmsKeyProviderUri:
                  $ref: "#/components/schemas/KmsKeyProviderUri"
                  description: The URI of the HDFS cluster's Key Management Server (KMS).
                QopConfiguration:
                  $ref: "#/components/schemas/QopConfiguration"
                  description: The Quality of Protection (QOP) configuration specifies the Remote Procedure Call (RPC) and data transfer privacy settings configured on the Hadoop Distributed File System (HDFS) cluster.
                AuthenticationType:
                  $ref: "#/components/schemas/HdfsAuthenticationType"
                  description: The type of authentication used to determine the identity of the user.
                SimpleUser:
                  $ref: "#/components/schemas/HdfsUser"
                  description: The user name used to identify the client on the host operating system.
                KerberosPrincipal:
                  $ref: "#/components/schemas/KerberosPrincipal"
                  description: The Kerberos principal with access to the files and folders on the HDFS cluster.
                KerberosKeytab:
                  $ref: "#/components/schemas/KerberosKeytabFile"
                  description: The Kerberos key table (keytab) that contains mappings between the defined Kerberos principal and the encrypted keys. You can load the keytab from a file by providing the file's address.
                KerberosKrb5Conf:
                  $ref: "#/components/schemas/KerberosKrb5ConfFile"
                  description: The krb5.conf file that contains the Kerberos configuration information. You can load the krb5.conf file by providing the file's address. If you're using the CLI, it performs the base64 encoding for you. Otherwise, provide the base64-encoded text.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: The Amazon Resource Names (ARNs) of the DataSync agents that can connect to your HDFS cluster.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, such as a KerberosKeytab or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed KMS key.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed secret, such as a KerberosKeytab or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationHdfsResponse"
  /UpdateLocationNfs:
    post:
      operationId: UpdateLocationNfs
      description: Modifies the following configuration parameters of the Network File System (NFS) transfer location that you're using with DataSync. For more information, see Configuring transfers with an NFS file server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationNfs
            default: FmrsService.UpdateLocationNfs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the Amazon Resource Name (ARN) of the NFS transfer location that you want to update.
                Subdirectory:
                  $ref: "#/components/schemas/NfsSubdirectory"
                  description: Specifies the export path in your NFS file server that you want DataSync to mount. This path (or a subdirectory of the path) is where DataSync transfers data to or from. For information on configuring an export for DataSync, see Accessing NFS file servers.
                ServerHostname:
                  $ref: "#/components/schemas/ServerHostname"
                  description: Specifies the DNS name or IP address (IPv4 or IPv6) of the NFS file server that your DataSync agent connects to.
                OnPremConfig:
                  $ref: "#/components/schemas/OnPremConfig"
                MountOptions:
                  $ref: "#/components/schemas/NfsMountOptions"
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationNfsResponse"
  /UpdateLocationObjectStorage:
    post:
      operationId: UpdateLocationObjectStorage
      description: Modifies the following configuration parameters of the object storage transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with an object storage system.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationObjectStorage
            default: FmrsService.UpdateLocationObjectStorage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the ARN of the object storage system location that you're updating.
                ServerPort:
                  $ref: "#/components/schemas/ObjectStorageServerPort"
                  description: Specifies the port that your object storage server accepts inbound network traffic on (for example, port 443).
                ServerProtocol:
                  $ref: "#/components/schemas/ObjectStorageServerProtocol"
                  description: Specifies the protocol that your object storage server uses to communicate.
                Subdirectory:
                  $ref: "#/components/schemas/S3Subdirectory"
                  description: Specifies the object prefix for your object storage server. If this is a source location, DataSync only copies objects with this prefix. If this is a destination location, DataSync writes all objects with this prefix.
                ServerHostname:
                  $ref: "#/components/schemas/ServerHostname"
                  description: Specifies the domain name or IP address (IPv4 or IPv6) of the object storage server that your DataSync agent connects to.
                AccessKey:
                  $ref: "#/components/schemas/ObjectStorageAccessKey"
                  description: Specifies the access key (for example, a user name) if credentials are required to authenticate with the object storage server.
                SecretKey:
                  $ref: "#/components/schemas/ObjectStorageSecretKey"
                  description: Specifies the secret key (for example, a password) if credentials are required to authenticate with the object storage server. If you provide a secret using SecretKey, but do not provide secret configuration details using CmkSecretConfig or CustomSecretConfig, then DataSync stores the token using your Amazon Web Services account's Secrets Manager secret.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: (Optional) Specifies the Amazon Resource Names (ARNs) of the DataSync agents that can connect with your object storage system. If you are setting up an agentless cross-cloud transfer, you do not need to specify a value for this parameter. You cannot add or remove agents from a storage location after you initially create it.
                ServerCertificate:
                  $ref: "#/components/schemas/ObjectStorageCertificate"
                  description: "Specifies a certificate chain for DataSync to authenticate with your object storage system if the system uses a private or self-signed certificate authority (CA). You must specify a single .pem file with a full certificate chain (for example, file:///home/user/.ssh/object_storage_certificates.pem). The certificate chain might include: The object storage system's certificate All intermediate certificates (if there are any) The root certificate of the signing CA You can concatenate your certificates into a .pem file (which can be up to 32768 bytes before base64 encoding). The following example cat command creates an object_storage_certificates.pem file that includes three certificates: cat object_server_certificate.pem intermediate_certificate.pem ca_root_certificate.pem > object_storage_certificates.pem To use this parameter, configure ServerProtocol to HTTPS. Updating this parameter doesn't interfere with tasks that you have in progress."
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, such as an authentication token or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed KMS key.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed secret, such as an authentication token or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationObjectStorageResponse"
  /UpdateLocationS3:
    post:
      operationId: UpdateLocationS3
      description: "Modifies the following configuration parameters of the Amazon S3 transfer location that you're using with DataSync. Before you begin, make sure that you read the following topics: Storage class considerations with Amazon S3 locations Evaluating S3 request costs when using DataSync"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationS3
            default: FmrsService.UpdateLocationS3
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the Amazon Resource Name (ARN) of the Amazon S3 transfer location that you're updating.
                Subdirectory:
                  $ref: "#/components/schemas/S3Subdirectory"
                  description: "Specifies a prefix in the S3 bucket that DataSync reads from or writes to (depending on whether the bucket is a source or destination location). DataSync can't transfer objects with a prefix that begins with a slash (/) or includes //, /./, or /../ patterns. For example: /photos photos//2006/January photos/./2006/February photos/../2006/March"
                S3StorageClass:
                  $ref: "#/components/schemas/S3StorageClass"
                  description: Specifies the storage class that you want your objects to use when Amazon S3 is a transfer destination. For buckets in Amazon Web Services Regions, the storage class defaults to STANDARD. For buckets on Outposts, the storage class defaults to OUTPOSTS. For more information, see Storage class considerations with Amazon S3 transfers.
                S3Config:
                  $ref: "#/components/schemas/S3Config"
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationS3Response"
  /UpdateLocationSmb:
    post:
      operationId: UpdateLocationSmb
      description: Modifies the following configuration parameters of the Server Message Block (SMB) transfer location that you're using with DataSync. For more information, see Configuring DataSync transfers with an SMB file server.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateLocationSmb
            default: FmrsService.UpdateLocationSmb
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LocationArn:
                  $ref: "#/components/schemas/LocationArn"
                  description: Specifies the ARN of the SMB location that you want to update.
                Subdirectory:
                  $ref: "#/components/schemas/SmbSubdirectory"
                  description: Specifies the name of the share exported by your SMB file server where DataSync will read or write data. You can include a subdirectory in the share path (for example, /path/to/subdirectory). Make sure that other SMB clients in your network can also mount this path. To copy all data in the specified subdirectory, DataSync must be able to mount the SMB share and access all of its data. For more information, see Providing DataSync access to SMB file servers.
                ServerHostname:
                  $ref: "#/components/schemas/ServerHostname"
                  description: Specifies the domain name or IP address (IPv4 or IPv6) of the SMB file server that your DataSync agent connects to. If you're using Kerberos authentication, you must specify a domain name.
                User:
                  $ref: "#/components/schemas/SmbUser"
                  description: Specifies the user name that can mount your SMB file server and has permission to access the files and folders involved in your transfer. This parameter applies only if AuthenticationType is set to NTLM. For information about choosing a user with the right level of access for your transfer, see Providing DataSync access to SMB file servers.
                Domain:
                  $ref: "#/components/schemas/SmbDomain"
                  description: Specifies the Windows domain name that your SMB file server belongs to. This parameter applies only if AuthenticationType is set to NTLM. If you have multiple domains in your environment, configuring this parameter makes sure that DataSync connects to the right file server.
                Password:
                  $ref: "#/components/schemas/SmbPassword"
                  description: Specifies the password of the user who can mount your SMB file server and has permission to access the files and folders involved in your transfer. This parameter applies only if AuthenticationType is set to NTLM.
                CmkSecretConfig:
                  $ref: "#/components/schemas/CmkSecretConfig"
                  description: Specifies configuration information for a DataSync-managed secret, such as a Password or KerberosKeytab or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed KMS key.
                CustomSecretConfig:
                  $ref: "#/components/schemas/CustomSecretConfig"
                  description: Specifies configuration information for a customer-managed secret, such as a Password or KerberosKeytab or set of credentials that DataSync uses to access a specific transfer location, and a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
                AgentArns:
                  $ref: "#/components/schemas/AgentArnList"
                  description: Specifies the DataSync agent (or agents) that can connect to your SMB file server. You specify an agent by using its Amazon Resource Name (ARN).
                MountOptions:
                  $ref: "#/components/schemas/SmbMountOptions"
                AuthenticationType:
                  $ref: "#/components/schemas/SmbAuthenticationType"
                  description: Specifies the authentication protocol that DataSync uses to connect to your SMB file server. DataSync supports NTLM (default) and KERBEROS authentication. For more information, see Providing DataSync access to SMB file servers.
                DnsIpAddresses:
                  $ref: "#/components/schemas/DnsIpList"
                  description: Specifies the IP addresses (IPv4 or IPv6) for the DNS servers that your SMB file server belongs to. This parameter applies only if AuthenticationType is set to KERBEROS. If you have multiple domains in your environment, configuring this parameter makes sure that DataSync connects to the right SMB file server.
                KerberosPrincipal:
                  $ref: "#/components/schemas/KerberosPrincipal"
                  description: Specifies a Kerberos prinicpal, which is an identity in your Kerberos realm that has permission to access the files, folders, and file metadata in your SMB file server. A Kerberos principal might look like HOST/kerberosuser@MYDOMAIN.ORG. Principal names are case sensitive. Your DataSync task execution will fail if the principal that you specify for this parameter doesn’t exactly match the principal that you use to create the keytab file.
                KerberosKeytab:
                  $ref: "#/components/schemas/KerberosKeytabFile"
                  description: Specifies your Kerberos key table (keytab) file, which includes mappings between your Kerberos principal and encryption keys. To avoid task execution errors, make sure that the Kerberos principal that you use to create the keytab file matches exactly what you specify for KerberosPrincipal.
                KerberosKrb5Conf:
                  $ref: "#/components/schemas/KerberosKrb5ConfFile"
                  description: Specifies a Kerberos configuration file (krb5.conf) that defines your Kerberos realm configuration. The file must be base64 encoded. If you're using the CLI, the encoding is done for you.
              required:
                - LocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLocationSmbResponse"
  /UpdateTask:
    post:
      operationId: UpdateTask
      description: Updates the configuration of a task, which defines where and how DataSync transfers your data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateTask
            default: FmrsService.UpdateTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TaskArn:
                  $ref: "#/components/schemas/TaskArn"
                  description: Specifies the ARN of the task that you want to update.
                Options:
                  $ref: "#/components/schemas/Options"
                Excludes:
                  $ref: "#/components/schemas/FilterList"
                  description: Specifies exclude filters that define the files, objects, and folders in your source location that you don't want DataSync to transfer. For more information and examples, see Specifying what DataSync transfers by using filters.
                Schedule:
                  $ref: "#/components/schemas/TaskSchedule"
                  description: Specifies a schedule for when you want your task to run. For more information, see Scheduling your task.
                Name:
                  $ref: "#/components/schemas/TagValue"
                  description: Specifies the name of your task.
                CloudWatchLogGroupArn:
                  $ref: "#/components/schemas/LogGroupArn"
                  description: "Specifies the Amazon Resource Name (ARN) of an Amazon CloudWatch log group for monitoring your task. For Enhanced mode tasks, you must use /aws/datasync as your log group name. For example: arn:aws:logs:us-east-1:111222333444:log-group:/aws/datasync:* For more information, see Monitoring data transfers with CloudWatch Logs."
                Includes:
                  $ref: "#/components/schemas/FilterList"
                  description: Specifies include filters define the files, objects, and folders in your source location that you want DataSync to transfer. For more information and examples, see Specifying what DataSync transfers by using filters.
                ManifestConfig:
                  $ref: "#/components/schemas/ManifestConfig"
                  description: Configures a manifest, which is a list of files or objects that you want DataSync to transfer. For more information and configuration examples, see Specifying what DataSync transfers by using a manifest. When using this parameter, your caller identity (the IAM role that you're using DataSync with) must have the iam:PassRole permission. The AWSDataSyncFullAccess policy includes this permission. To remove a manifest configuration, specify this parameter as empty.
                TaskReportConfig:
                  $ref: "#/components/schemas/TaskReportConfig"
                  description: Specifies how you want to configure a task report, which provides detailed information about your DataSync transfer. For more information, see Monitoring your DataSync transfers with task reports. When using this parameter, your caller identity (the IAM role that you're using DataSync with) must have the iam:PassRole permission. The AWSDataSyncFullAccess policy includes this permission. To remove a task report configuration, specify this parameter as empty.
              required:
                - TaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTaskResponse"
  /UpdateTaskExecution:
    post:
      operationId: UpdateTaskExecution
      description: Updates the configuration of a running DataSync task execution. Currently, the only Option that you can modify with UpdateTaskExecution is BytesPerSecond , which throttles bandwidth for a running or queued task execution.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - FmrsService.UpdateTaskExecution
            default: FmrsService.UpdateTaskExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TaskExecutionArn:
                  $ref: "#/components/schemas/TaskExecutionArn"
                  description: Specifies the Amazon Resource Name (ARN) of the task execution that you're updating.
                Options:
                  $ref: "#/components/schemas/Options"
              required:
                - TaskExecutionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTaskExecutionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TaskExecutionArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):datasync:[a-z\-0-9]+:[0-9]{12}:task/task-[0-9a-f]{17}/execution/exec-[0-9a-f]{17}$
    CancelTaskExecutionResponse:
      type: object
    ActivationKey:
      type: string
      maxLength: 29
      pattern: "[A-Z0-9]{5}(-[A-Z0-9]{5}){4}"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^[a-zA-Z0-9\s+=._:@/-]+$
    InputTagList:
      type: array
      items:
        $ref: "#/components/schemas/TagListEntry"
    TagListEntry:
      description: A key-value pair representing a single tag that's been applied to an Amazon Web Services resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key for an Amazon Web Services resource tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value for an Amazon Web Services resource tag.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9\s+=._:/-]+$
    VpcEndpointId:
      type: string
      pattern: ^vpce-[0-9a-f]{17}$
    PLSubnetArnList:
      type: array
      items:
        $ref: "#/components/schemas/Ec2SubnetArn"
    Ec2SubnetArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):ec2:[a-z\-0-9]*:[0-9]{12}:subnet/subnet-[a-f0-9]+$
    PLSecurityGroupArnList:
      type: array
      items:
        $ref: "#/components/schemas/Ec2SecurityGroupArn"
    Ec2SecurityGroupArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):ec2:[a-z\-0-9]*:[0-9]{12}:security-group/sg-[a-f0-9]+$
    CreateAgentResponse:
      description: CreateAgentResponse
      type: object
      properties:
        AgentArn:
          $ref: "#/components/schemas/AgentArn"
          description: The ARN of the agent that you just activated. Use the ListAgents operation to return a list of agents in your Amazon Web Services account and Amazon Web Services Region.
    AgentArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):datasync:[a-z\-0-9]+:[0-9]{12}:agent/agent-[0-9a-z]{17}$
    AzureBlobContainerUrl:
      type: string
      maxLength: 325
      pattern: ^https:\/\/[A-Za-z0-9]((\.|-+)?[A-Za-z0-9]){0,252}\/[a-z0-9](-?[a-z0-9]){2,62}$
    AzureBlobAuthenticationType:
      type: string
      enum:
        - SAS
        - NONE
    AzureBlobSasConfiguration:
      description: The shared access signature (SAS) configuration that allows DataSync to access your Microsoft Azure Blob Storage. For more information, see SAS tokens for accessing your Azure Blob Storage.
      type: object
      properties:
        Token:
          $ref: "#/components/schemas/AzureBlobSasToken"
          description: "Specifies a SAS token that provides permissions to access your Azure Blob Storage. The token is part of the SAS URI string that comes after the storage resource URI and a question mark. A token looks something like this: sp=r&st=2023-12-20T14:54:52Z&se=2023-12-20T22:54:52Z&spr=https&sv=2021-06-08&sr=c&sig=aBBKDWQvyuVcTPH9EBp%2FXTI9E%2F%2Fmq171%2BZU178wcwqU%3D"
      required:
        - Token
    AzureBlobSasToken:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^.+$
    AzureBlobType:
      type: string
      enum:
        - BLOCK
    AzureAccessTier:
      type: string
      enum:
        - HOT
        - COOL
        - ARCHIVE
    AzureBlobSubdirectory:
      type: string
      maxLength: 1024
      pattern: ^[\p{L}\p{M}\p{Z}\p{S}\p{N}\p{P}\p{C}]*$
    AgentArnList:
      type: array
      items:
        $ref: "#/components/schemas/AgentArn"
    CmkSecretConfig:
      description: Specifies configuration information for a DataSync-managed secret, such as an authentication token, secret key, password, or Kerberos keytab that DataSync uses to access a specific storage location, with a customer-managed KMS key. You can use either CmkSecretConfig or CustomSecretConfig to provide credentials for a CreateLocation request. Do not provide both parameters for the same request.
      type: object
      properties:
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: Specifies the ARN for the DataSync-managed Secrets Manager secret that that is used to access a specific storage location. This property is generated by DataSync and is read-only. DataSync encrypts this secret with the KMS key that you specify for KmsKeyArn.
        KmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: Specifies the ARN for the customer-managed KMS key that DataSync uses to encrypt the DataSync-managed secret stored for SecretArn. DataSync provides this key to Secrets Manager.
    SecretArn:
      type: string
      maxLength: 2048
      pattern: ^(arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):secretsmanager:[a-z\-0-9]+:[0-9]{12}:secret:.*|)$
    KmsKeyArn:
      type: string
      maxLength: 2048
      pattern: ^(arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):kms:[a-z\-0-9]+:[0-9]{12}:key/.*|)$
    CustomSecretConfig:
      description: Specifies configuration information for a customer-managed Secrets Manager secret where a storage location credentials is stored in Secrets Manager as plain text (for authentication token, secret key, or password) or as binary (for Kerberos keytab). This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. You can use either CmkSecretConfig or CustomSecretConfig to provide credentials for a CreateLocation request. Do not provide both parameters for the same request.
      type: object
      properties:
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: Specifies the ARN for an Secrets Manager secret.
        SecretAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArnOrEmptyString"
          description: Specifies the ARN for the Identity and Access Management role that DataSync uses to access the secret specified for SecretArn.
    IamRoleArnOrEmptyString:
      type: string
      maxLength: 2048
      pattern: ^(arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):iam::[0-9]{12}:role/[a-zA-Z0-9+=,.@_/-]+|)$
    CreateLocationAzureBlobResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the Azure Blob Storage transfer location that you created.
    LocationArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):datasync:[a-z\-0-9]+:[0-9]{12}:location/loc-[0-9a-z]{17}$
    EfsSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\p{Zs}]*$
    EfsFilesystemArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):elasticfilesystem:[a-z\-0-9]+:[0-9]{12}:file-system/fs-[0-9a-f]{8,40}$
    Ec2Config:
      description: The subnet and security groups that DataSync uses to connect to one of your Amazon EFS file system's mount targets.
      type: object
      properties:
        SubnetArn:
          $ref: "#/components/schemas/Ec2SubnetArn"
          description: "Specifies the ARN of a subnet where DataSync creates the network interfaces for managing traffic during your transfer. The subnet must be located: In the same virtual private cloud (VPC) as the Amazon EFS file system. In the same Availability Zone as at least one mount target for the Amazon EFS file system. You don't need to specify a subnet that includes a file system mount target."
        SecurityGroupArns:
          $ref: "#/components/schemas/Ec2SecurityGroupArnList"
          description: Specifies the Amazon Resource Names (ARNs) of the security groups associated with an Amazon EFS file system's mount target.
      required:
        - SubnetArn
        - SecurityGroupArns
    Ec2SecurityGroupArnList:
      type: array
      items:
        $ref: "#/components/schemas/Ec2SecurityGroupArn"
    EfsAccessPointArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):elasticfilesystem:[a-z\-0-9]+:[0-9]{12}:access-point/fsap-[0-9a-f]{8,40}$
    IamRoleArn:
      type: string
      maxLength: 2048
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):iam::[0-9]{12}:role/.*$
    EfsInTransitEncryption:
      type: string
      enum:
        - NONE
        - TLS1_2
    CreateLocationEfsResponse:
      description: CreateLocationEfs
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The Amazon Resource Name (ARN) of the Amazon EFS file system location that you create.
    FsxFilesystemArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):fsx:[a-z\-0-9]+:[0-9]{12}:file-system/fs-[0-9a-f]+$
    FsxLustreSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\$\p{Zs}]+$
    CreateLocationFsxLustreResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The Amazon Resource Name (ARN) of the FSx for Lustre file system location that you created.
    FsxProtocol:
      description: Specifies the data transfer protocol that DataSync uses to access your Amazon FSx file system.
      type: object
      properties:
        NFS:
          $ref: "#/components/schemas/FsxProtocolNfs"
          description: Specifies the Network File System (NFS) protocol configuration that DataSync uses to access your FSx for OpenZFS file system or FSx for ONTAP file system's storage virtual machine (SVM).
        SMB:
          $ref: "#/components/schemas/FsxProtocolSmb"
          description: Specifies the Server Message Block (SMB) protocol configuration that DataSync uses to access your FSx for ONTAP file system's SVM.
    FsxProtocolNfs:
      description: Specifies the Network File System (NFS) protocol configuration that DataSync uses to access your FSx for OpenZFS file system or FSx for ONTAP file system's storage virtual machine (SVM).
      type: object
      properties:
        MountOptions:
          $ref: "#/components/schemas/NfsMountOptions"
    NfsMountOptions:
      description: Specifies how DataSync can access a location using the NFS protocol.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/NfsVersion"
          description: "Specifies the NFS version that you want DataSync to use when mounting your NFS share. If the server refuses to use the version specified, the task fails. You can specify the following options: AUTOMATIC (default): DataSync chooses NFS version 4.1. NFS3: Stateless protocol version that allows for asynchronous writes on the server. NFSv4_0: Stateful, firewall-friendly protocol version that supports delegations and pseudo file systems. NFSv4_1: Stateful protocol version that supports sessions, directory delegations, and parallel data processing. NFS version 4.1 also includes all features available in version 4.0. DataSync currently only supports NFS version 3 with Amazon FSx for NetApp ONTAP locations."
    NfsVersion:
      type: string
      enum:
        - AUTOMATIC
        - NFS3
        - NFS4_0
        - NFS4_1
    FsxProtocolSmb:
      description: Specifies the Server Message Block (SMB) protocol configuration that DataSync uses to access your Amazon FSx for NetApp ONTAP file system's storage virtual machine (SVM). For more information, see Providing DataSync access to FSx for ONTAP file systems.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/SmbDomain"
          description: Specifies the name of the Windows domain that your storage virtual machine (SVM) belongs to. If you have multiple domains in your environment, configuring this setting makes sure that DataSync connects to the right SVM. If you have multiple Active Directory domains in your environment, configuring this parameter makes sure that DataSync connects to the right SVM.
        MountOptions:
          $ref: "#/components/schemas/SmbMountOptions"
        Password:
          $ref: "#/components/schemas/SmbPassword"
          description: Specifies the password of a user who has permission to access your SVM.
        User:
          $ref: "#/components/schemas/SmbUser"
          description: Specifies a user that can mount and access the files, folders, and metadata in your SVM. For information about choosing a user with the right level of access for your transfer, see Using the SMB protocol.
        ManagedSecretConfig:
          $ref: "#/components/schemas/ManagedSecretConfig"
          description: Describes configuration information for a DataSync-managed secret, such as a Password that DataSync uses to access a specific storage location. DataSync uses the default Amazon Web Services-managed KMS key to encrypt this secret in Secrets Manager. Do not provide this for a CreateLocation request. ManagedSecretConfig is a ReadOnly property and is only be populated in the DescribeLocation response.
        CmkSecretConfig:
          $ref: "#/components/schemas/CmkSecretConfig"
          description: Specifies configuration information for a DataSync-managed secret, which includes the password that DataSync uses to access a specific FSx for ONTAP storage location (using SMB), with a customer-managed KMS key. When you include this parameter as part of a CreateLocationFsxOntap request, you provide only the KMS key ARN. DataSync uses this KMS key together with the Password you specify for to create a DataSync-managed secret to store the location access credentials. Make sure that DataSync has permission to access the KMS key that you specify. For more information, see Using a service-managed secret encrypted with a custom KMS key. You can use either CmkSecretConfig (with Password) or CustomSecretConfig (without Password) to provide credentials for a CreateLocationFsxOntap request. Do not provide both parameters for the same request.
        CustomSecretConfig:
          $ref: "#/components/schemas/CustomSecretConfig"
          description: Specifies configuration information for a customer-managed Secrets Manager secret where the password for an FSx for ONTAP storage location (using SMB) is stored in plain text, in Secrets Manager. This configuration includes the secret ARN, and the ARN for an IAM role that provides access to the secret. For more information, see Using a secret that you manage. You can use either CmkSecretConfig (with Password) or CustomSecretConfig (without Password) to provide credentials for a CreateLocationFsxOntap request. Do not provide both parameters for the same request.
      required:
        - User
    SmbDomain:
      type: string
      maxLength: 253
      pattern: ^[A-Za-z0-9]((\.|-+)?[A-Za-z0-9]){0,252}$
    SmbMountOptions:
      description: Specifies the version of the Server Message Block (SMB) protocol that DataSync uses to access an SMB file server.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/SmbVersion"
          description: "By default, DataSync automatically chooses an SMB protocol version based on negotiation with your SMB file server. You also can configure DataSync to use a specific SMB version, but we recommend doing this only if DataSync has trouble negotiating with the SMB file server automatically. These are the following options for configuring the SMB version: AUTOMATIC (default): DataSync and the SMB file server negotiate the highest version of SMB that they mutually support between 2.1 and 3.1.1. This is the recommended option. If you instead choose a specific version that your file server doesn't support, you may get an Operation Not Supported error. SMB3: Restricts the protocol negotiation to only SMB version 3.0.2. SMB2: Restricts the protocol negotiation to only SMB version 2.1. SMB2_0: Restricts the protocol negotiation to only SMB version 2.0. SMB1: Restricts the protocol negotiation to only SMB version 1.0. The SMB1 option isn't available when creating an Amazon FSx for NetApp ONTAP location."
    SmbVersion:
      type: string
      enum:
        - AUTOMATIC
        - SMB2
        - SMB3
        - SMB1
        - SMB2_0
    SmbPassword:
      type: string
      maxLength: 104
      pattern: ^.{0,104}$
    SmbUser:
      type: string
      maxLength: 104
      pattern: ^[^\x22\x5B\x5D/\\:;|=,+*?\x3C\x3E]{1,104}$
    ManagedSecretConfig:
      description: Specifies configuration information for a DataSync-managed secret, such as an authentication token or set of credentials that DataSync uses to access a specific transfer location. DataSync uses the default Amazon Web Services-managed KMS key to encrypt this secret in Secrets Manager.
      type: object
      properties:
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: Specifies the ARN for an Secrets Manager secret.
    StorageVirtualMachineArn:
      type: string
      maxLength: 162
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):fsx:[a-z\-0-9]+:[0-9]{12}:storage-virtual-machine/fs-[0-9a-f]+/svm-[0-9a-f]{17,}$
    FsxOntapSubdirectory:
      type: string
      maxLength: 255
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,255}$
    CreateLocationFsxOntapResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: Specifies the ARN of the FSx for ONTAP file system location that you create.
    FsxOpenZfsSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[^\u0000\u0085\u2028\u2029\r\n]{1,4096}$
    CreateLocationFsxOpenZfsResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the FSx for OpenZFS file system location that you created.
    FsxWindowsSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\$\p{Zs}]+$
    CreateLocationFsxWindowsResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the FSx for Windows File Server file system location you created.
    HdfsSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\$\p{Zs}]+$
    HdfsNameNodeList:
      type: array
      items:
        $ref: "#/components/schemas/HdfsNameNode"
    HdfsNameNode:
      description: The NameNode of the Hadoop Distributed File System (HDFS). The NameNode manages the file system's namespace. The NameNode performs operations such as opening, closing, and renaming files and directories. The NameNode contains the information to map blocks of data to the DataNodes.
      type: object
      properties:
        Hostname:
          $ref: "#/components/schemas/HdfsServerHostname"
          description: The hostname of the NameNode in the HDFS cluster. This value is the IP address or Domain Name Service (DNS) name of the NameNode. An agent that's installed on-premises uses this hostname to communicate with the NameNode in the network.
        Port:
          $ref: "#/components/schemas/HdfsServerPort"
          description: The port that the NameNode uses to listen to client requests.
      required:
        - Hostname
        - Port
    HdfsServerHostname:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(([a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9\-]*[A-Za-z0-9])$
    HdfsServerPort:
      type: integer
      minimum: 1
      maximum: 65536
    HdfsBlockSize:
      type: integer
      minimum: 1048576
      maximum: 1073741824
    HdfsReplicationFactor:
      type: integer
      minimum: 1
      maximum: 512
    KmsKeyProviderUri:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^kms:\/\/http[s]?@(([a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9\-]*[A-Za-z0-9])(;(([a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9\-]*[A-Za-z0-9]))*:[0-9]{1,5}\/kms$
    QopConfiguration:
      description: The Quality of Protection (QOP) configuration specifies the Remote Procedure Call (RPC) and data transfer privacy settings configured on the Hadoop Distributed File System (HDFS) cluster.
      type: object
      properties:
        RpcProtection:
          $ref: "#/components/schemas/HdfsRpcProtection"
          description: The RPC protection setting configured on the HDFS cluster. This setting corresponds to your hadoop.rpc.protection setting in your core-site.xml file on your Hadoop cluster.
        DataTransferProtection:
          $ref: "#/components/schemas/HdfsDataTransferProtection"
          description: The data transfer protection setting configured on the HDFS cluster. This setting corresponds to your dfs.data.transfer.protection setting in the hdfs-site.xml file on your Hadoop cluster.
    HdfsRpcProtection:
      type: string
      enum:
        - DISABLED
        - AUTHENTICATION
        - INTEGRITY
        - PRIVACY
    HdfsDataTransferProtection:
      type: string
      enum:
        - DISABLED
        - AUTHENTICATION
        - INTEGRITY
        - PRIVACY
    HdfsAuthenticationType:
      type: string
      enum:
        - SIMPLE
        - KERBEROS
    HdfsUser:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[_.A-Za-z0-9][-_.A-Za-z0-9]*$
    KerberosPrincipal:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^.+$
    KerberosKeytabFile:
      type: string
      format: byte
      maxLength: 65536
    KerberosKrb5ConfFile:
      type: string
      format: byte
      maxLength: 131072
    CreateLocationHdfsResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the source HDFS cluster location that you create.
    NfsSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\p{Zs}]+$
    ServerHostname:
      type: string
      maxLength: 255
      pattern: ^(([a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9\-:]*[A-Za-z0-9])$
    OnPremConfig:
      description: The DataSync agents that can connect to your Network File System (NFS) file server.
      type: object
      properties:
        AgentArns:
          $ref: "#/components/schemas/AgentArnList"
          description: The Amazon Resource Names (ARNs) of the DataSync agents that can connect to your NFS file server. You can specify more than one agent. For more information, see Using multiple DataSync agents.
      required:
        - AgentArns
    CreateLocationNfsResponse:
      description: CreateLocationNfsResponse
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the transfer location that you created for your NFS file server.
    ObjectStorageServerPort:
      type: integer
      minimum: 1
      maximum: 65536
    ObjectStorageServerProtocol:
      type: string
      enum:
        - HTTPS
        - HTTP
    S3Subdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\p{Zs}]*$
    ObjectStorageBucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-zA-Z0-9_\-\+\.\(\)\$\p{Zs}]+$
    ObjectStorageAccessKey:
      type: string
      minLength: 0
      maxLength: 200
      pattern: ^.*$
    ObjectStorageSecretKey:
      type: string
      minLength: 0
      maxLength: 200
      pattern: ^.*$
    ObjectStorageCertificate:
      type: string
      format: byte
      maxLength: 32768
    CreateLocationObjectStorageResponse:
      description: CreateLocationObjectStorageResponse
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: Specifies the ARN of the object storage system location that you create.
    S3BucketArn:
      type: string
      maxLength: 268
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):s3:[a-z\-0-9]*:[0-9]{12}:accesspoint[/:][a-zA-Z0-9\-.]{1,63}$|^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):s3-outposts:[a-z\-0-9]+:[0-9]{12}:outpost[/:][a-zA-Z0-9\-]{1,63}[/:]accesspoint[/:][a-zA-Z0-9\-]{1,63}$|^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):s3:::[a-zA-Z0-9.\-_]{1,255}$
    S3StorageClass:
      type: string
      enum:
        - STANDARD
        - STANDARD_IA
        - ONEZONE_IA
        - INTELLIGENT_TIERING
        - GLACIER
        - DEEP_ARCHIVE
        - OUTPOSTS
        - GLACIER_INSTANT_RETRIEVAL
    S3Config:
      description: Specifies the Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that DataSync uses to access your S3 bucket. For more information, see Providing DataSync access to S3 buckets.
      type: object
      properties:
        BucketAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: Specifies the ARN of the IAM role that DataSync uses to access your S3 bucket.
      required:
        - BucketAccessRoleArn
    CreateLocationS3Response:
      description: CreateLocationS3Response
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the S3 location that you created.
    SmbSubdirectory:
      type: string
      maxLength: 4096
      pattern: ^[a-zA-Z0-9_\-\+\./\(\)\$\p{Zs}]+$
    SmbAuthenticationType:
      type: string
      enum:
        - NTLM
        - KERBEROS
    DnsIpList:
      type: array
      items:
        $ref: "#/components/schemas/ServerIpAddress"
    ServerIpAddress:
      type: string
      minLength: 7
      maxLength: 39
      pattern: \A((25[0-5]|2[0-4]\d|[0-1]?\d?\d)(\.(25[0-5]|2[0-4]\d|[0-1]?\d?\d)){3}|([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6}))\z
    CreateLocationSmbResponse:
      description: CreateLocationSmbResponse
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the SMB location that you created.
    LogGroupArn:
      type: string
      maxLength: 562
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):logs:[a-z\-0-9]+:[0-9]{12}:log-group:([^:\*]*)(:\*)?$
    Options:
      description: Indicates how your transfer task is configured. These options include how DataSync handles files, objects, and their associated metadata during your transfer. You also can specify how to verify data integrity, set bandwidth limits for your task, among other options. Each option has a default value. Unless you need to, you don't have to configure any option before calling StartTaskExecution. You also can override your task options for each task execution. For example, you might want to adjust the LogLevel for an individual execution.
      type: object
      properties:
        VerifyMode:
          $ref: "#/components/schemas/VerifyMode"
          description: Specifies if and how DataSync checks the integrity of your data at the end of your transfer. ONLY_FILES_TRANSFERRED (recommended) - DataSync calculates the checksum of transferred data (including metadata) at the source location. At the end of the transfer, DataSync then compares this checksum to the checksum calculated on that data at the destination. This is the default option for Enhanced mode tasks. We recommend this option when transferring to S3 Glacier Flexible Retrieval or S3 Glacier Deep Archive storage classes. For more information, see Storage class considerations with Amazon S3 locations. POINT_IN_TIME_CONSISTENT - At the end of the transfer, DataSync checks the entire source and destination to verify that both locations are fully synchronized. The is the default option for Basic mode tasks and isn't currently supported with Enhanced mode tasks. If you use a manifest, DataSync only scans and verifies what's listed in the manifest. You can't use this option when transferring to S3 Glacier Flexible Retrieval or S3 Glacier Deep Archive storage classes. For more information, see Storage class considerations with Amazon S3 locations. NONE - DataSync performs data integrity checks only during your transfer. Unlike other options, there's no additional verification at the end of your transfer.
        OverwriteMode:
          $ref: "#/components/schemas/OverwriteMode"
          description: Specifies whether DataSync should modify or preserve data at the destination location. ALWAYS (default) - DataSync modifies data in the destination location when source data (including metadata) has changed. If DataSync overwrites objects, you might incur additional charges for certain Amazon S3 storage classes (for example, for retrieval or early deletion). For more information, see Storage class considerations with Amazon S3 transfers. NEVER - DataSync doesn't overwrite data in the destination location even if the source data has changed. You can use this option to protect against overwriting changes made to files or objects in the destination.
        Atime:
          $ref: "#/components/schemas/Atime"
          description: Specifies whether to preserve metadata indicating the last time a file was read or written to. The behavior of Atime isn't fully standard across platforms, so DataSync can only do this on a best-effort basis. BEST_EFFORT (default) - DataSync attempts to preserve the original Atime attribute on all source files (that is, the version before the PREPARING steps of the task execution). This option is recommended. NONE - Ignores Atime. If Atime is set to BEST_EFFORT, Mtime must be set to PRESERVE. If Atime is set to NONE, Mtime must also be NONE.
        Mtime:
          $ref: "#/components/schemas/Mtime"
          description: Specifies whether to preserve metadata indicating the last time that a file was written to before the PREPARING step of your task execution. This option is required when you need to run the a task more than once. PRESERVE (default) - Preserves original Mtime, which is recommended. NONE - Ignores Mtime. If Mtime is set to PRESERVE, Atime must be set to BEST_EFFORT. If Mtime is set to NONE, Atime must also be set to NONE.
        Uid:
          $ref: "#/components/schemas/Uid"
          description: Specifies the POSIX user ID (UID) of the file's owner. INT_VALUE (default) - Preserves the integer value of UID and group ID (GID), which is recommended. NONE - Ignores UID and GID. For more information, see Metadata copied by DataSync.
        Gid:
          $ref: "#/components/schemas/Gid"
          description: Specifies the POSIX group ID (GID) of the file's owners. INT_VALUE (default) - Preserves the integer value of user ID (UID) and GID, which is recommended. NONE - Ignores UID and GID. For more information, see Understanding how DataSync handles file and object metadata.
        PreserveDeletedFiles:
          $ref: "#/components/schemas/PreserveDeletedFiles"
          description: Specifies whether files in the destination location that don't exist in the source should be preserved. This option can affect your Amazon S3 storage cost. If your task deletes objects, you might incur minimum storage duration charges for certain storage classes. For detailed information, see Considerations when working with Amazon S3 storage classes in DataSync. PRESERVE (default) - Ignores such destination files, which is recommended. REMOVE - Deletes destination files that aren’t present in the source. If you set this parameter to REMOVE, you can't set TransferMode to ALL. When you transfer all data, DataSync doesn't scan your destination location and doesn't know what to delete.
        PreserveDevices:
          $ref: "#/components/schemas/PreserveDevices"
          description: Specifies whether DataSync should preserve the metadata of block and character devices in the source location and recreate the files with that device name and metadata on the destination. DataSync copies only the name and metadata of such devices. DataSync can't copy the actual contents of these devices because they're nonterminal and don't return an end-of-file (EOF) marker. NONE (default) - Ignores special devices (recommended). PRESERVE - Preserves character and block device metadata. This option currently isn't supported for Amazon EFS.
        PosixPermissions:
          $ref: "#/components/schemas/PosixPermissions"
          description: Specifies which users or groups can access a file for a specific purpose such as reading, writing, or execution of the file. For more information, see Understanding how DataSync handles file and object metadata. PRESERVE (default) - Preserves POSIX-style permissions, which is recommended. NONE - Ignores POSIX-style permissions. DataSync can preserve extant permissions of a source location.
        BytesPerSecond:
          $ref: "#/components/schemas/BytesPerSecond"
          description: Limits the bandwidth used by a DataSync task. For example, if you want DataSync to use a maximum of 1 MB, set this value to 1048576 (=1024*1024).
        TaskQueueing:
          $ref: "#/components/schemas/TaskQueueing"
          description: Specifies whether your transfer tasks should be put into a queue during certain scenarios when running multiple tasks. This is ENABLED by default.
        LogLevel:
          $ref: "#/components/schemas/LogLevel"
          description: Specifies the type of logs that DataSync publishes to a Amazon CloudWatch Logs log group. To specify the log group, see CloudWatchLogGroupArn. BASIC - Publishes logs with only basic information (such as transfer errors). TRANSFER - Publishes logs for all files or objects that your DataSync task transfers and performs data-integrity checks on. OFF - No logs are published.
        TransferMode:
          $ref: "#/components/schemas/TransferMode"
          description: Specifies whether DataSync transfers only the data (including metadata) that differs between locations following an initial copy or transfers all data every time you run the task. If you're planning on recurring transfers, you might only want to transfer what's changed since your previous task execution. CHANGED (default) - After your initial full transfer, DataSync copies only the data and metadata that differs between the source and destination location. ALL - DataSync copies everything in the source to the destination without comparing differences between the locations.
        SecurityDescriptorCopyFlags:
          $ref: "#/components/schemas/SmbSecurityDescriptorCopyFlags"
          description: "Specifies which components of the SMB security descriptor are copied from source to destination objects. This value is only used for transfers between SMB and Amazon FSx for Windows File Server locations or between two FSx for Windows File Server locations. For more information, see Understanding how DataSync handles file and object metadata. OWNER_DACL (default) - For each copied object, DataSync copies the following metadata: The object owner. NTFS discretionary access control lists (DACLs), which determine whether to grant access to an object. DataSync won't copy NTFS system access control lists (SACLs) with this option. OWNER_DACL_SACL - For each copied object, DataSync copies the following metadata: The object owner. NTFS discretionary access control lists (DACLs), which determine whether to grant access to an object. SACLs, which are used by administrators to log attempts to access a secured object. Copying SACLs requires granting additional permissions to the Windows user that DataSync uses to access your SMB location. For information about choosing a user with the right permissions, see required permissions for SMB, FSx for Windows File Server, or FSx for ONTAP (depending on the type of location in your transfer). NONE - None of the SMB security descriptor components are copied. Destination objects are owned by the user that was provided for accessing the destination location. DACLs and SACLs are set based on the destination server’s configuration."
        ObjectTags:
          $ref: "#/components/schemas/ObjectTags"
          description: Specifies whether you want DataSync to PRESERVE object tags (default behavior) when transferring between object storage systems. If you want your DataSync task to ignore object tags, specify the NONE value.
    VerifyMode:
      type: string
      enum:
        - POINT_IN_TIME_CONSISTENT
        - ONLY_FILES_TRANSFERRED
        - NONE
    OverwriteMode:
      type: string
      enum:
        - ALWAYS
        - NEVER
    Atime:
      type: string
      enum:
        - NONE
        - BEST_EFFORT
    Mtime:
      type: string
      enum:
        - NONE
        - PRESERVE
    Uid:
      type: string
      enum:
        - NONE
        - INT_VALUE
        - NAME
        - BOTH
    Gid:
      type: string
      enum:
        - NONE
        - INT_VALUE
        - NAME
        - BOTH
    PreserveDeletedFiles:
      type: string
      enum:
        - PRESERVE
        - REMOVE
    PreserveDevices:
      type: string
      enum:
        - NONE
        - PRESERVE
    PosixPermissions:
      type: string
      enum:
        - NONE
        - PRESERVE
    BytesPerSecond:
      type: integer
      format: int64
      minimum: -1
    TaskQueueing:
      type: string
      enum:
        - ENABLED
        - DISABLED
    LogLevel:
      type: string
      enum:
        - "OFF"
        - BASIC
        - TRANSFER
    TransferMode:
      type: string
      enum:
        - CHANGED
        - ALL
    SmbSecurityDescriptorCopyFlags:
      type: string
      enum:
        - NONE
        - OWNER_DACL
        - OWNER_DACL_SACL
    ObjectTags:
      type: string
      enum:
        - PRESERVE
        - NONE
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/FilterRule"
    FilterRule:
      description: Specifies which files, folders, and objects to include or exclude when transferring files from source to destination.
      type: object
      properties:
        FilterType:
          $ref: "#/components/schemas/FilterType"
          description: The type of filter rule to apply. DataSync only supports the SIMPLE_PATTERN rule type.
        Value:
          $ref: "#/components/schemas/FilterValue"
          description: 'A single filter string that consists of the patterns to include or exclude. The patterns are delimited by "|" (that is, a pipe), for example: /folder1|/folder2'
    FilterType:
      type: string
      enum:
        - SIMPLE_PATTERN
      maxLength: 128
      pattern: ^[A-Z0-9_]+$
    FilterValue:
      type: string
      maxLength: 102400
      pattern: ^[^\x00]+$
    TaskSchedule:
      description: Configures your DataSync task to run on a schedule (at a minimum interval of 1 hour).
      type: object
      properties:
        ScheduleExpression:
          $ref: "#/components/schemas/ScheduleExpressionCron"
          description: "Specifies your task schedule by using a cron or rate expression. Use cron expressions for task schedules that run on a specific time and day. For example, the following cron expression creates a task schedule that runs at 8 AM on the first Wednesday of every month: cron(0 8 * * 3#1) Use rate expressions for task schedules that run on a regular interval. For example, the following rate expression creates a task schedule that runs every 12 hours: rate(12 hours) For information about cron and rate expression syntax, see the Amazon EventBridge User Guide ."
        Status:
          $ref: "#/components/schemas/ScheduleStatus"
          description: Specifies whether to enable or disable your task schedule. Your schedule is enabled by default, but there can be situations where you need to disable it. For example, you might need to pause a recurring transfer to fix an issue with your task or perform maintenance on your storage system. DataSync might disable your schedule automatically if your task fails repeatedly with the same error. For more information, see TaskScheduleDetails.
      required:
        - ScheduleExpression
    ScheduleExpressionCron:
      type: string
      maxLength: 256
      pattern: ^[a-zA-Z0-9\ \_\*\?\,\|\^\-\/\#\s\(\)\+]*$
    ScheduleStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ManifestConfig:
      description: Configures a manifest, which is a list of files or objects that you want DataSync to transfer. For more information and configuration examples, see Specifying what DataSync transfers by using a manifest.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/ManifestAction"
          description: Specifies what DataSync uses the manifest for.
        Format:
          $ref: "#/components/schemas/ManifestFormat"
          description: Specifies the file format of your manifest. For more information, see Creating a manifest.
        Source:
          $ref: "#/components/schemas/SourceManifestConfig"
          description: Specifies the manifest that you want DataSync to use and where it's hosted. You must specify this parameter if you're configuring a new manifest on or after February 7, 2024. If you don't, you'll get a 400 status code and ValidationException error stating that you're missing the IAM role for DataSync to access the S3 bucket where you're hosting your manifest. For more information, see Providing DataSync access to your manifest.
    ManifestAction:
      type: string
      enum:
        - TRANSFER
    ManifestFormat:
      type: string
      enum:
        - CSV
    SourceManifestConfig:
      description: Specifies the manifest that you want DataSync to use and where it's hosted. For more information and configuration examples, see Specifying what DataSync transfers by using a manifest.
      type: object
      properties:
        S3:
          $ref: "#/components/schemas/S3ManifestConfig"
          description: Specifies the S3 bucket where you're hosting your manifest.
      required:
        - S3
    S3ManifestConfig:
      description: Specifies the S3 bucket where you're hosting the manifest that you want DataSync to use. For more information and configuration examples, see Specifying what DataSync transfers by using a manifest.
      type: object
      properties:
        ManifestObjectPath:
          $ref: "#/components/schemas/S3Subdirectory"
          description: Specifies the Amazon S3 object key of your manifest. This can include a prefix (for example, prefix/my-manifest.csv).
        BucketAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: Specifies the Identity and Access Management (IAM) role that allows DataSync to access your manifest. For more information, see Providing DataSync access to your manifest.
        S3BucketArn:
          $ref: "#/components/schemas/S3BucketArn"
          description: Specifies the Amazon Resource Name (ARN) of the S3 bucket where you're hosting your manifest.
        ManifestObjectVersionId:
          $ref: "#/components/schemas/S3ObjectVersionId"
          description: Specifies the object version ID of the manifest that you want DataSync to use. If you don't set this, DataSync uses the latest version of the object.
      required:
        - ManifestObjectPath
        - BucketAccessRoleArn
        - S3BucketArn
    S3ObjectVersionId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^.+$
    TaskReportConfig:
      description: Specifies how you want to configure a task report, which provides detailed information about for your DataSync transfer. For more information, see Task reports.
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/ReportDestination"
          description: Specifies the Amazon S3 bucket where DataSync uploads your task report. For more information, see Task reports.
        OutputType:
          $ref: "#/components/schemas/ReportOutputType"
          description: "Specifies the type of task report that you want: SUMMARY_ONLY: Provides necessary details about your task, including the number of files, objects, and directories transferred and transfer duration. STANDARD: Provides complete details about your task, including a full list of files, objects, and directories that were transferred, skipped, verified, and more."
        ReportLevel:
          $ref: "#/components/schemas/ReportLevel"
          description: "Specifies whether you want your task report to include only what went wrong with your transfer or a list of what succeeded and didn't. ERRORS_ONLY: A report shows what DataSync was unable to transfer, skip, verify, and delete. SUCCESSES_AND_ERRORS: A report shows what DataSync was able and unable to transfer, skip, verify, and delete."
        ObjectVersionIds:
          $ref: "#/components/schemas/ObjectVersionIds"
          description: Specifies whether your task report includes the new version of each object transferred into an S3 bucket. This only applies if you enable versioning on your bucket. Keep in mind that setting this to INCLUDE can increase the duration of your task execution.
        Overrides:
          $ref: "#/components/schemas/ReportOverrides"
          description: Customizes the reporting level for aspects of your task report. For example, your report might generally only include errors, but you could specify that you want a list of successes and errors just for the files that DataSync attempted to delete in your destination location.
    ReportDestination:
      description: Specifies where DataSync uploads your task report.
      type: object
      properties:
        S3:
          $ref: "#/components/schemas/ReportDestinationS3"
          description: Specifies the Amazon S3 bucket where DataSync uploads your task report.
    ReportDestinationS3:
      description: Specifies the Amazon S3 bucket where DataSync uploads your task report.
      type: object
      properties:
        Subdirectory:
          $ref: "#/components/schemas/S3Subdirectory"
          description: Specifies a bucket prefix for your report.
        S3BucketArn:
          $ref: "#/components/schemas/S3BucketArn"
          description: Specifies the ARN of the S3 bucket where DataSync uploads your report.
        BucketAccessRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: Specifies the Amazon Resource Name (ARN) of the IAM policy that allows DataSync to upload a task report to your S3 bucket. For more information, see Allowing DataSync to upload a task report to an Amazon S3 bucket.
      required:
        - S3BucketArn
        - BucketAccessRoleArn
    ReportOutputType:
      type: string
      enum:
        - SUMMARY_ONLY
        - STANDARD
    ReportLevel:
      type: string
      enum:
        - ERRORS_ONLY
        - SUCCESSES_AND_ERRORS
    ObjectVersionIds:
      type: string
      enum:
        - INCLUDE
        - NONE
    ReportOverrides:
      description: The level of detail included in each aspect of your DataSync task report.
      type: object
      properties:
        Transferred:
          $ref: "#/components/schemas/ReportOverride"
          description: Specifies the level of reporting for the files, objects, and directories that DataSync attempted to transfer.
        Verified:
          $ref: "#/components/schemas/ReportOverride"
          description: Specifies the level of reporting for the files, objects, and directories that DataSync attempted to verify at the end of your transfer.
        Deleted:
          $ref: "#/components/schemas/ReportOverride"
          description: Specifies the level of reporting for the files, objects, and directories that DataSync attempted to delete in your destination location. This only applies if you configure your task to delete data in the destination that isn't in the source.
        Skipped:
          $ref: "#/components/schemas/ReportOverride"
          description: Specifies the level of reporting for the files, objects, and directories that DataSync attempted to skip during your transfer.
    ReportOverride:
      description: Specifies the level of detail for a particular aspect of your DataSync task report.
      type: object
      properties:
        ReportLevel:
          $ref: "#/components/schemas/ReportLevel"
          description: Specifies whether your task report includes errors only or successes and errors. For example, your report might mostly include only what didn't go well in your transfer (ERRORS_ONLY). At the same time, you want to verify that your task filter is working correctly. In this situation, you can get a list of what files DataSync successfully skipped and if something transferred that you didn't to transfer (SUCCESSES_AND_ERRORS).
    TaskMode:
      type: string
      enum:
        - BASIC
        - ENHANCED
    CreateTaskResponse:
      description: CreateTaskResponse
      type: object
      properties:
        TaskArn:
          $ref: "#/components/schemas/TaskArn"
          description: The Amazon Resource Name (ARN) of the task.
    TaskArn:
      type: string
      maxLength: 128
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-eusc|aws-iso|aws-iso-b):datasync:[a-z\-0-9]+:[0-9]{12}:task/task-[0-9a-f]{17}$
    DeleteAgentResponse:
      type: object
    DeleteLocationResponse:
      type: object
    DeleteTaskResponse:
      type: object
    DescribeAgentResponse:
      description: DescribeAgentResponse
      type: object
      properties:
        AgentArn:
          $ref: "#/components/schemas/AgentArn"
          description: The ARN of the agent.
        Name:
          $ref: "#/components/schemas/TagValue"
          description: The name of the agent.
        Status:
          $ref: "#/components/schemas/AgentStatus"
          description: The status of the agent. If the status is ONLINE, the agent is configured properly and ready to use. If the status is OFFLINE, the agent has been out of contact with DataSync for five minutes or longer. This can happen for a few reasons. For more information, see What do I do if my agent is offline?
        LastConnectionTime:
          $ref: "#/components/schemas/Time"
          description: The last time that the agent was communicating with the DataSync service.
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: The time that the agent was activated.
        EndpointType:
          $ref: "#/components/schemas/EndpointType"
          description: The type of service endpoint that your agent is connected to.
        PrivateLinkConfig:
          $ref: "#/components/schemas/PrivateLinkConfig"
          description: The network configuration that the agent uses when connecting to a VPC service endpoint.
        Platform:
          $ref: "#/components/schemas/Platform"
          description: The platform-related details about the agent, such as the version number.
    AgentStatus:
      type: string
      enum:
        - ONLINE
        - OFFLINE
    Time:
      type: string
      format: date-time
    EndpointType:
      type: string
      enum:
        - PUBLIC
        - PRIVATE_LINK
        - FIPS
        - FIPS_PRIVATE_LINK
    PrivateLinkConfig:
      description: Specifies how your DataSync agent connects to Amazon Web Services using a virtual private cloud (VPC) service endpoint. An agent that uses a VPC endpoint isn't accessible over the public internet.
      type: object
      properties:
        VpcEndpointId:
          $ref: "#/components/schemas/VpcEndpointId"
          description: Specifies the ID of the VPC endpoint that your agent connects to.
        PrivateLinkEndpoint:
          $ref: "#/components/schemas/Endpoint"
          description: Specifies the VPC endpoint provided by Amazon Web Services PrivateLink that your agent connects to.
        SubnetArns:
          $ref: "#/components/schemas/PLSubnetArnList"
          description: Specifies the ARN of the subnet where your VPC endpoint is located. You can only specify one ARN.
        SecurityGroupArns:
          $ref: "#/components/schemas/PLSecurityGroupArnList"
          description: Specifies the Amazon Resource Names (ARN) of the security group that provides DataSync access to your VPC endpoint. You can only specify one ARN.
    Endpoint:
      type: string
      minLength: 7
      maxLength: 15
      pattern: \A(25[0-5]|2[0-4]\d|[0-1]?\d?\d)(\.(25[0-5]|2[0-4]\d|[0-1]?\d?\d)){3}\z
    Platform:
      description: The platform-related details about the DataSync agent, such as the version number.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/AgentVersion"
          description: The version of the DataSync agent.
    AgentVersion:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9\s+=._:@/-]+$
    DescribeLocationAzureBlobResponse:
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of your Azure Blob Storage transfer location.
        LocationUri:
          $ref: "#/components/schemas/LocationUri"
          description: The URL of the Azure Blob Storage container involved in your transfer.
        AuthenticationType:
          $ref: "#/components/schemas/AzureBlobAuthenticationType"
          description: The authentication method DataSync uses to access your Azure Blob Storage. DataSync can access blob storage using a shared access signature (SAS).
        BlobType:
          $ref: "#/components/schemas/AzureBlobType"
          description: The type of blob that you want your objects or files to be when transferring them into Azure Blob Storage. Currently, DataSync only supports moving data into Azure Blob Storage as block blobs. For more information on blob types, see the Azure Blob Storage documentation.
        AccessTier:
          $ref: "#/components/schemas/AzureAccessTier"
          description: The access tier that you want your objects or files transferred into. This only applies when using the location as a transfer destination. For more information, see Access tiers.
        AgentArns:
          $ref: "#/components/schemas/AgentArnList"
          description: The ARNs of the DataSync agents that can connect with your Azure Blob Storage container.
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: The time that your Azure Blob Storage transfer location was created.
        ManagedSecretConfig:
          $ref: "#/components/schemas/ManagedSecretConfig"
          description: Describes configuration information for a DataSync-managed secret, such as an authentication token that DataSync uses to access a specific storage location. DataSync uses the default Amazon Web Services-managed KMS key to encrypt this secret in Secrets Manager.
        CmkSecretConfig:
          $ref: "#/components/schemas/CmkSecretConfig"
          description: Describes configuration information for a DataSync-managed secret, such as an authentication token that DataSync uses to access a specific storage location, with a customer-managed KMS key.
        CustomSecretConfig:
          $ref: "#/components/schemas/CustomSecretConfig"
          description: Describes configuration information for a customer-managed secret, such as an authentication token that DataSync uses to access a specific storage location, with a customer-managed Identity and Access Management (IAM) role that provides access to the secret.
    LocationUri:
      type: string
      maxLength: 4360
      pattern: ^(efs|nfs|s3|smb|hdfs|fsx[a-z0-9-]+)://[a-zA-Z0-9.:/\-]+$
    DescribeLocationEfsResponse:
      description: DescribeLocationEfsResponse
      type: object
      properties:
        LocationArn:
          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the Amazon EFS file system location.
        LocationUri:
          $ref: "#/components/schemas/LocationUri"
          description: The URL of the Amazon EFS file system location.
        Ec2Config:
          $ref: "#/components/schemas/Ec2Config"
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: The time that the location was created.
        AccessPointArn:
          $ref: "#/components/schemas/EfsAccessPointArn"
