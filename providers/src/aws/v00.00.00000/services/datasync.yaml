          $ref: "#/components/schemas/LocationUri"
          description: The URL of the Amazon S3 location that was described.
        S3StorageClass:
          $ref: "#/components/schemas/S3StorageClass"
          description: When Amazon S3 is a destination location, this is the storage class that you chose for your objects. Some storage classes have behaviors that can affect your Amazon S3 storage costs. For more information, see Storage class considerations with Amazon S3 transfers.
        S3Config:
          $ref: "#/components/schemas/S3Config"
        AgentArns:
          $ref: "#/components/schemas/AgentArnList"
          description: The ARNs of the DataSync agents deployed on your Outpost when using working with Amazon S3 on Outposts. For more information, see Deploy your DataSync agent on Outposts.
        CreationTime:
          $ref: "#/components/schemas/Time"
          description: The time that the Amazon S3 location was created.
    DescribeLocationSmbResponse:
      description: DescribeLocationSmbResponse
      type: object
      properties:
