      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Specifies the maximum number of DataSync agents to list in a response. By default, a response shows a maximum of 100 agents.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Specifies an opaque string that indicates the position to begin the next list of results in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentsResponse"
  /ListLocations:
