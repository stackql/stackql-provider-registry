          $ref: "#/components/schemas/LocationArn"
          description: The ARN of the SMB location.
        LocationUri:
          $ref: "#/components/schemas/LocationUri"
          description: The URI of the SMB location.
        AgentArns:
          $ref: "#/components/schemas/AgentArnList"
          description: The ARNs of the DataSync agents that can connect with your SMB file server.
        User:
          $ref: "#/components/schemas/SmbUser"
          description: The user that can mount and access the files, folders, and file metadata in your SMB file server. This element applies only if AuthenticationType is set to NTLM.
        Domain:
          $ref: "#/components/schemas/SmbDomain"
          description: The name of the Windows domain that the SMB file server belongs to. This element applies only if AuthenticationType is set to NTLM.
        MountOptions:
