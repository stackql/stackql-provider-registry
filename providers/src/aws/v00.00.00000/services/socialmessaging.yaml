openapi: 3.0.0
info:
  version: "2024-01-01"
  title: AWS End User Messaging Social
  description: AWS End User Messaging Social
  x-serviceName: social-messaging
  x-serviceAlias: socialmessaging
  x-protocol: rest-json
  x-apiVersion: "2024-01-01"
  x-endpointPrefix: social-messaging
servers:
  - url: https://social-messaging.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for socialmessaging
paths:
  /v1/whatsapp/signup:
    post:
      operationId: AssociateWhatsAppBusinessAccount
      description: This is only used through the Amazon Web Services console during sign-up to associate your WhatsApp Business Account to your Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                signupCallback:
                  $ref: "#/components/schemas/WhatsAppSignupCallback"
                setupFinalization:
                  $ref: "#/components/schemas/WhatsAppSetupFinalization"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWhatsAppBusinessAccountOutput"
  /v1/whatsapp/template/put:
    post:
      operationId: CreateWhatsAppMessageTemplate
      description: Creates a new WhatsApp message template from a custom definition. Amazon Web Services End User Messaging Social does not store any WhatsApp message template content.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                templateDefinition:
                  $ref: "#/components/schemas/MetaTemplateDefinition"
                id:
                  $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
              required:
                - templateDefinition
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWhatsAppMessageTemplateOutput"
  /v1/whatsapp/template/create:
    post:
      operationId: CreateWhatsAppMessageTemplateFromLibrary
      description: Creates a new WhatsApp message template using a template from Meta's template library.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metaLibraryTemplate:
                  $ref: "#/components/schemas/MetaLibraryTemplate"
                id:
                  $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
              required:
                - metaLibraryTemplate
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWhatsAppMessageTemplateFromLibraryOutput"
  /v1/whatsapp/template/media:
    post:
      operationId: CreateWhatsAppMessageTemplateMedia
      description: Uploads media for use in a WhatsApp message template.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
                sourceS3File:
                  $ref: "#/components/schemas/S3File"
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWhatsAppMessageTemplateMediaOutput"
  /v1/whatsapp/media:
    delete:
      operationId: DeleteWhatsAppMessageMedia
      description: Delete a media object from the WhatsApp service. If the object is still in an Amazon S3 bucket you should delete it from there too.
      parameters:
        - name: mediaId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/WhatsAppMediaId"
          description: The unique identifier of the media file to delete. Use the mediaId returned from PostWhatsAppMessageMedia.
        - name: originationPhoneNumberId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/WhatsAppPhoneNumberId"
          description: The unique identifier of the originating phone number associated with the media. Phone number identifiers are formatted as phone-number-id-01234567890123456789012345678901. Use GetLinkedWhatsAppBusinessAccount to find a phone number's id.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWhatsAppMessageMediaOutput"
    post:
      operationId: PostWhatsAppMessageMedia
      description: Upload a media file to the WhatsApp service. Only the specified originationPhoneNumberId has the permissions to send the media file when using SendWhatsAppMessage. You must use either sourceS3File or sourceS3PresignedUrl for the source. If both or neither are specified then an InvalidParameterException is returned.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                originationPhoneNumberId:
                  $ref: "#/components/schemas/WhatsAppPhoneNumberId"
                sourceS3PresignedUrl:
                  $ref: "#/components/schemas/S3PresignedUrl"
                sourceS3File:
                  $ref: "#/components/schemas/S3File"
              required:
                - originationPhoneNumberId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostWhatsAppMessageMediaOutput"
  /v1/whatsapp/template:
    delete:
      operationId: DeleteWhatsAppMessageTemplate
      description: Deletes a WhatsApp message template.
      parameters:
        - name: metaTemplateId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MetaTemplateId"
          description: The numeric ID of the template assigned by Meta.
        - name: deleteAllTemplates
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeleteAllLanguages"
          description: If true, deletes all language versions of the template.
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The ID of the WhatsApp Business Account associated with this template.
        - name: templateName
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MetaTemplateName"
          description: The name of the template to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWhatsAppMessageTemplateOutput"
    get:
      operationId: GetWhatsAppMessageTemplate
      description: Retrieves a specific WhatsApp message template.
      parameters:
        - name: metaTemplateId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MetaTemplateId"
          description: The numeric ID of the template assigned by Meta.
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The ID of the WhatsApp Business Account associated with this template.
        - name: templateName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MetaTemplateName"
          description: The name of the message template. Use together with templateLanguageCode as an alternative to metaTemplateId to identify a template.
        - name: templateLanguageCode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MetaTemplateLanguage"
          description: The language code of the message template (for example, en or en_US). Use together with templateName as an alternative to metaTemplateId to identify a template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWhatsAppMessageTemplateOutput"
    post:
      operationId: UpdateWhatsAppMessageTemplate
      description: Updates an existing WhatsApp message template.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
                metaTemplateId:
                  $ref: "#/components/schemas/MetaTemplateId"
                templateName:
                  $ref: "#/components/schemas/MetaTemplateName"
                templateLanguageCode:
                  $ref: "#/components/schemas/MetaTemplateLanguage"
                parameterFormat:
                  $ref: "#/components/schemas/MetaParameterFormat"
                templateCategory:
                  $ref: "#/components/schemas/MetaTemplateCategory"
                templateComponents:
                  $ref: "#/components/schemas/MetaTemplateComponents"
                ctaUrlLinkTrackingOptedOut:
                  $ref: "#/components/schemas/MetaTemplateCtaLinkTrackingOptedOut"
              required:
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWhatsAppMessageTemplateOutput"
  /v1/whatsapp/waba/disassociate:
    delete:
      operationId: DisassociateWhatsAppBusinessAccount
      description: Disassociate a WhatsApp Business Account (WABA) from your Amazon Web Services account.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The unique identifier of your WhatsApp Business Account. WABA identifiers are formatted as waba-01234567890123456789012345678901. Use ListLinkedWhatsAppBusinessAccounts to list all WABAs and their details.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateWhatsAppBusinessAccountOutput"
  /v1/whatsapp/waba/details:
    get:
      operationId: GetLinkedWhatsAppBusinessAccount
      description: Get the details of your linked WhatsApp Business Account.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The unique identifier, from Amazon Web Services, of the linked WhatsApp Business Account. WABA identifiers are formatted as waba-01234567890123456789012345678901. Use ListLinkedWhatsAppBusinessAccounts to list all WABAs and their details.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLinkedWhatsAppBusinessAccountOutput"
  /v1/whatsapp/waba/phone/details:
    get:
      operationId: GetLinkedWhatsAppBusinessAccountPhoneNumber
      description: Retrieve the WABA account id and phone number details of a WhatsApp business account phone number.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/WhatsAppPhoneNumberId"
          description: The unique identifier of the phone number. Phone number identifiers are formatted as phone-number-id-01234567890123456789012345678901. Use GetLinkedWhatsAppBusinessAccount to find a phone number's id.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLinkedWhatsAppBusinessAccountPhoneNumberOutput"
  /v1/whatsapp/media/get:
    post:
      operationId: GetWhatsAppMessageMedia
      description: Get a media file from the WhatsApp service. On successful completion the media file is retrieved from Meta and stored in the specified Amazon S3 bucket. Use either destinationS3File or destinationS3PresignedUrl for the destination. If both are used then an InvalidParameterException is returned.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mediaId:
                  $ref: "#/components/schemas/WhatsAppMediaId"
                originationPhoneNumberId:
                  $ref: "#/components/schemas/WhatsAppPhoneNumberId"
                metadataOnly:
                  $ref: "#/components/schemas/Boolean"
                destinationS3PresignedUrl:
                  $ref: "#/components/schemas/S3PresignedUrl"
                destinationS3File:
                  $ref: "#/components/schemas/S3File"
              required:
                - mediaId
                - originationPhoneNumberId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWhatsAppMessageMediaOutput"
  /v1/whatsapp/waba/list:
    get:
      operationId: ListLinkedWhatsAppBusinessAccounts
      description: List all WhatsApp Business Accounts linked to your Amazon Web Services account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The next token for pagination.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLinkedWhatsAppBusinessAccountsOutput"
  /v1/tags/list:
    get:
      operationId: ListTagsForResource
      description: List all tags associated with a resource, such as a phone number or WABA.
      parameters:
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource to retrieve the tags from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /v1/whatsapp/template/list:
    get:
      operationId: ListWhatsAppMessageTemplates
      description: Lists WhatsApp message templates for a specific WhatsApp Business Account.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The ID of the WhatsApp Business Account to list templates for.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page (1-100).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWhatsAppMessageTemplatesOutput"
  /v1/whatsapp/template/library:
    post:
      operationId: ListWhatsAppTemplateLibrary
      description: Lists templates available in Meta's template library for WhatsApp messaging.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The ID of the WhatsApp Business Account to list library templates for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                filters:
                  $ref: "#/components/schemas/Filter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWhatsAppTemplateLibraryOutput"
  /v1/whatsapp/waba/eventdestinations:
    put:
      operationId: PutWhatsAppBusinessAccountEventDestinations
      description: Add an event destination to log event data from WhatsApp for a WhatsApp Business Account (WABA). A WABA can only have one event destination at a time. All resources associated with the WABA use the same event destination.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
                eventDestinations:
                  $ref: "#/components/schemas/WhatsAppBusinessAccountEventDestinations"
              required:
                - id
                - eventDestinations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutWhatsAppBusinessAccountEventDestinationsOutput"
  /v1/whatsapp/send:
    post:
      operationId: SendWhatsAppMessage
      description: Send a WhatsApp message. For examples of sending a message using the Amazon Web Services CLI, see Sending messages in the Amazon Web Services End User Messaging Social User Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                originationPhoneNumberId:
                  $ref: "#/components/schemas/WhatsAppPhoneNumberId"
                message:
                  $ref: "#/components/schemas/WhatsAppMessageBlob"
                metaApiVersion:
                  $ref: "#/components/schemas/String"
              required:
                - originationPhoneNumberId
                - message
                - metaApiVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendWhatsAppMessageOutput"
  /v1/tags/tag-resource:
    post:
      operationId: TagResource
      description: Adds or overwrites only the specified tags for the specified resource. When you specify an existing tag key, the value is overwritten with the new value.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /v1/tags/untag-resource:
    post:
      operationId: UntagResource
      description: Removes the specified tags from a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/Arn"
                tagKeys:
                  $ref: "#/components/schemas/StringList"
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WhatsAppSignupCallback:
      description: Contains the accessToken provided by Meta during signup.
      type: object
      properties:
        accessToken:
          $ref: "#/components/schemas/WhatsAppSignupCallbackAccessTokenString"
          description: The access token for your WhatsApp Business Account. The accessToken value is provided by Meta.
        callbackUrl:
          $ref: "#/components/schemas/WhatsAppSignupCallbackCallbackUrlString"
          description: The URL where WhatsApp will send callback notifications for this account.
      required:
        - accessToken
    WhatsAppSignupCallbackAccessTokenString:
      type: string
      minLength: 0
      maxLength: 1000
    WhatsAppSignupCallbackCallbackUrlString:
      type: string
      minLength: 0
      maxLength: 100
    WhatsAppSetupFinalization:
      description: The details of linking a WhatsApp Business Account to your Amazon Web Services account.
      type: object
      properties:
        associateInProgressToken:
          $ref: "#/components/schemas/AssociateInProgressToken"
          description: An Amazon Web Services access token generated by WhatsAppSignupCallback and used by WhatsAppSetupFinalization.
        phoneNumbers:
          $ref: "#/components/schemas/WabaPhoneNumberSetupFinalizationList"
          description: An array of WabaPhoneNumberSetupFinalization objects containing the details of each phone number associated with the WhatsApp Business Account.
        phoneNumberParent:
          $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: Used to add a new phone number to an existing WhatsApp Business Account. This field can't be used when the waba field is present.
        waba:
          $ref: "#/components/schemas/WabaSetupFinalization"
          description: Used to create a new WhatsApp Business Account and add a phone number. This field can't be used when the phoneNumberParent field is present.
      required:
        - associateInProgressToken
        - phoneNumbers
    AssociateInProgressToken:
      type: string
      minLength: 0
      maxLength: 50
    WabaPhoneNumberSetupFinalizationList:
      type: array
      items:
        $ref: "#/components/schemas/WabaPhoneNumberSetupFinalization"
    WabaPhoneNumberSetupFinalization:
      description: The registration details for a linked phone number.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/WhatsAppPhoneNumber"
          description: The unique identifier of the originating phone number associated with the media. Phone number identifiers are formatted as phone-number-id-01234567890123456789012345678901. Use the GetLinkedWhatsAppBusinessAccount API action to find a phone number's id.
        twoFactorPin:
          $ref: "#/components/schemas/TwoFactorPin"
          description: The PIN to use for two-step verification. To reset your PIN follow the directions in Updating PIN in the WhatsApp Business Platform Cloud API Reference.
        dataLocalizationRegion:
          $ref: "#/components/schemas/IsoCountryCode"
          description: The two letter ISO region for the location of where Meta will store data. Asia–Pacific (APAC) Australia AU Indonesia ID India IN Japan JP Singapore SG South Korea KR Europe Germany DE Switzerland CH United Kingdom GB Latin America (LATAM) Brazil BR Middle East and Africa (MEA) Bahrain BH South Africa ZA United Arab Emirates AE North America (NORAM) Canada CA
        tags:
          $ref: "#/components/schemas/TagList"
          description: An array of key and value pair tags.
      required:
        - id
        - twoFactorPin
    WhatsAppPhoneNumber:
      type: string
      minLength: 1
      maxLength: 100
    TwoFactorPin:
      type: string
      minLength: 1
      maxLength: 6
    IsoCountryCode:
      type: string
      pattern: "[A-Z]{2}"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: The tag for a resource.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKeyString"
          description: The tag key.
        value:
          $ref: "#/components/schemas/TagValueString"
          description: The tag value.
      required:
        - key
    TagKeyString:
      type: string
      minLength: 1
      maxLength: 128
    TagValueString:
      type: string
      minLength: 0
      maxLength: 256
    LinkedWhatsAppBusinessAccountId:
      type: string
      minLength: 1
      maxLength: 115
      pattern: .*(^waba-.*$)|(^arn:.*:waba/[0-9a-zA-Z]+$).*
    WabaSetupFinalization:
      description: The registration details for a linked WhatsApp Business Account.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/WhatsAppBusinessAccountId"
          description: The ID of the linked WhatsApp Business Account, formatted as waba-01234567890123456789012345678901.
        eventDestinations:
          $ref: "#/components/schemas/WhatsAppBusinessAccountEventDestinations"
          description: The event destinations for the linked WhatsApp Business Account.
        tags:
          $ref: "#/components/schemas/TagList"
          description: An array of key and value pair tags.
    WhatsAppBusinessAccountId:
      type: string
      minLength: 1
      maxLength: 100
    WhatsAppBusinessAccountEventDestinations:
      type: array
      items:
        $ref: "#/components/schemas/WhatsAppBusinessAccountEventDestination"
    WhatsAppBusinessAccountEventDestination:
      description: Contains information on the event destination.
      type: object
      properties:
        eventDestinationArn:
          $ref: "#/components/schemas/EventDestinationArn"
          description: The ARN of the event destination.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an Identity and Access Management role that is able to import phone numbers and write events.
      required:
        - eventDestinationArn
    EventDestinationArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:.*:[a-z-]+([/:](.*))?
    RoleArn:
      type: string
      pattern: arn:.*:iam::\d{12}:role\/[a-zA-Z0-9+=,.@\-_]+
    AssociateWhatsAppBusinessAccountOutput:
      type: object
      properties:
        signupCallbackResult:
          $ref: "#/components/schemas/WhatsAppSignupCallbackResult"
          description: Contains your WhatsApp registration status.
        statusCode:
          $ref: "#/components/schemas/Integer"
          description: The status code for the response.
        linkedWhatsAppBusinessAccountId:
          $ref: "#/components/schemas/LinkedWhatsAppBusinessAccountId"
          description: The ID of the WhatsApp Business Account that was linked to your Amazon Web Services account.
    WhatsAppSignupCallbackResult:
      description: Contains the results of WhatsAppSignupCallback.
      type: object
      properties:
        associateInProgressToken:
          $ref: "#/components/schemas/AssociateInProgressToken"
          description: An Amazon Web Services access token generated by WhatsAppSignupCallback and used by WhatsAppSetupFinalization.
        linkedAccountsWithIncompleteSetup:
          type: object
          properties: {}
          description: A LinkedWhatsAppBusinessAccountIdMetaData object map containing the details of any WhatsAppBusiness accounts that have incomplete setup.
    Integer:
      type: integer
    MetaTemplateDefinition:
      type: string
      format: byte
      minLength: 1
      maxLength: 6000
    CreateWhatsAppMessageTemplateOutput:
      type: object
      properties:
        metaTemplateId:
          $ref: "#/components/schemas/MetaTemplateId"
          description: The numeric ID assigned to the template by Meta.
        templateStatus:
          $ref: "#/components/schemas/String"
          description: The status of the created template, such as PENDING or APPROVED..
        category:
          $ref: "#/components/schemas/MetaTemplateCategory"
          description: The category of the template, such as UTILITY or MARKETING.
    MetaTemplateId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[0-9]+"
    String:
      type: string
    MetaTemplateCategory:
      type: string
