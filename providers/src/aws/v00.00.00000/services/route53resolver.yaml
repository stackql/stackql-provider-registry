          description: A unique string that you specified when you created the Resolver rule. CreatorRequestId identifies the request and allows failed requests to be retried without the risk of running the operation twice.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN (Amazon Resource Name) for the Resolver rule specified by Id.
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: DNS queries for this domain name are forwarded to the IP addresses that are specified in TargetIps. If a query matches multiple Resolver rules (example.com and www.example.com), the query is routed using the Resolver rule that contains the most specific domain name (www.example.com).
        Status:
          $ref: "#/components/schemas/ResolverRuleStatus"
          description: A code that specifies the current status of the Resolver rule.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: A detailed description of the status of a Resolver rule.
        RuleType:
          $ref: "#/components/schemas/RuleTypeOption"
          description: When you want to forward DNS queries for specified domain name to resolvers on your network, specify FORWARD or DELEGATE. If a query matches multiple Resolver rules (example.com and www.example.com), outbound DNS queries are routed using the Resolver rule that contains the most specific domain name (www.example.com). When you have a forwarding rule to forward DNS queries for a domain to your network and you want Resolver to process queries for a subdomain of that domain, specify SYSTEM. For example, to forward DNS queries for example.com to resolvers on your network, you create a rule and specify FORWARD for RuleType. To then have Resolver process queries for apex.example.com, you create a rule and specify SYSTEM for RuleType. Currently, only Resolver can create rules that have a value of RECURSIVE for RuleType.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name for the Resolver rule, which you specified when you created the Resolver rule. The name can be up to 64 characters long and can contain letters (a-z, A-Z), numbers (0-9), hyphens (-), underscores (_), and spaces. The name cannot consist of only numbers.
