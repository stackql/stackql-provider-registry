                FirewallRuleGroupAssociationId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier of the FirewallRuleGroupAssociation.
                Priority:
                  $ref: "#/components/schemas/Priority"
                  description: The setting that determines the processing order of the rule group among the rule groups that you associate with the specified VPC. DNS Firewall filters VPC traffic starting from the rule group with the lowest numeric priority setting. You must specify a unique priority for each rule group that you associate with a single VPC. To make it easier to insert rule groups later, leave space between the numbers, for example, use 100, 200, and so on. You can change the priority setting for a rule group association after you create it.
                MutationProtection:
                  $ref: "#/components/schemas/MutationProtectionStatus"
                  description: If enabled, this setting disallows modification or removal of the association, to help prevent against accidentally altering DNS firewall protections.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the rule group association.
              required:
                - FirewallRuleGroupAssociationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFirewallRuleGroupAssociationResponse"
