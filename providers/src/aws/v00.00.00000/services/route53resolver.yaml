        - DoH
        - Do53
        - DoH-FIPS
    RniEnhancedMetricsEnabled:
      type: boolean
    TargetNameServerMetricsEnabled:
      type: boolean
    Dns64Enabled:
      type: boolean
    Ipv6InternetAccessEnabled:
      type: boolean
    AssociateResolverQueryLogConfigResponse:
      type: object
