openapi: 3.0.0
info:
  version: "2018-04-01"
  title: Amazon Route 53 Resolver
  description: Amazon Route 53 Resolver
  x-serviceName: route53resolver
  x-serviceAlias: route53resolver
  x-protocol: json
  x-apiVersion: "2018-04-01"
  x-endpointPrefix: route53resolver
  x-targetPrefix: Route53Resolver
  x-jsonVersion: "1.1"
servers:
  - url: https://route53resolver.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for route53resolver
paths:
  /AssociateFirewallRuleGroup:
    post:
      operationId: AssociateFirewallRuleGroup
      description: Associates a FirewallRuleGroup with a VPC, to provide DNS filtering for the VPC.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.AssociateFirewallRuleGroup
            default: Route53Resolver.AssociateFirewallRuleGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows failed requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                FirewallRuleGroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the firewall rule group.
                VpcId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the VPC that you want to associate with the rule group.
                Priority:
                  $ref: "#/components/schemas/Priority"
                  description: The setting that determines the processing order of the rule group among the rule groups that you associate with the specified VPC. DNS Firewall filters VPC traffic starting from the rule group with the lowest numeric priority setting. You must specify a unique priority for each rule group that you associate with a single VPC. To make it easier to insert rule groups later, leave space between the numbers, for example, use 101, 200, and so on. You can change the priority setting for a rule group association after you create it. The allowed values for Priority are between 100 and 9900.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A name that lets you identify the association, to manage and use it.
                MutationProtection:
                  $ref: "#/components/schemas/MutationProtectionStatus"
                  description: If enabled, this setting disallows modification or removal of the association, to help prevent against accidentally altering DNS firewall protections. When you create the association, the default setting is DISABLED.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to associate with the rule group association.
              required:
                - CreatorRequestId
                - FirewallRuleGroupId
                - VpcId
                - Priority
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFirewallRuleGroupResponse"
  /AssociateResolverEndpointIpAddress:
    post:
      operationId: AssociateResolverEndpointIpAddress
      description: Adds IP addresses to an inbound or an outbound Resolver endpoint. If you want to add more than one IP address, submit one AssociateResolverEndpointIpAddress request for each IP address. To remove an IP address from an endpoint, see DisassociateResolverEndpointIpAddress.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.AssociateResolverEndpointIpAddress
            default: Route53Resolver.AssociateResolverEndpointIpAddress
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResolverEndpointId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Resolver endpoint that you want to associate IP addresses with.
                IpAddress:
                  $ref: "#/components/schemas/IpAddressUpdate"
                  description: Either the IPv4 address that you want to add to a Resolver endpoint or a subnet ID. If you specify a subnet ID, Resolver chooses an IP address for you from the available IPs in the specified subnet.
              required:
                - ResolverEndpointId
                - IpAddress
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResolverEndpointIpAddressResponse"
  /AssociateResolverQueryLogConfig:
    post:
      operationId: AssociateResolverQueryLogConfig
      description: Associates an Amazon VPC with a specified query logging configuration. Route 53 Resolver logs DNS queries that originate in all of the Amazon VPCs that are associated with a specified query logging configuration. To associate more than one VPC with a configuration, submit one AssociateResolverQueryLogConfig request for each VPC. The VPCs that you associate with a query logging configuration must be in the same Region as the configuration. To remove a VPC from a query logging configuration, see DisassociateResolverQueryLogConfig.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.AssociateResolverQueryLogConfig
            default: Route53Resolver.AssociateResolverQueryLogConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResolverQueryLogConfigId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the query logging configuration that you want to associate a VPC with.
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of an Amazon VPC that you want this query logging configuration to log queries for. The VPCs and the query logging configuration must be in the same Region.
              required:
                - ResolverQueryLogConfigId
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResolverQueryLogConfigResponse"
  /AssociateResolverRule:
    post:
      operationId: AssociateResolverRule
      description: Associates a Resolver rule with a VPC. When you associate a rule with a VPC, Resolver forwards all DNS queries for the domain name that is specified in the rule and that originate in the VPC. The queries are forwarded to the IP addresses for the DNS resolvers that are specified in the rule. For more information about rules, see CreateResolverRule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.AssociateResolverRule
            default: Route53Resolver.AssociateResolverRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResolverRuleId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Resolver rule that you want to associate with the VPC. To list the existing Resolver rules, use ListResolverRules.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A name for the association that you're creating between a Resolver rule and a VPC. The name can be up to 64 characters long and can contain letters (a-z, A-Z), numbers (0-9), hyphens (-), underscores (_), and spaces. The name cannot consist of only numbers.
                VPCId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the VPC that you want to associate the Resolver rule with.
              required:
                - ResolverRuleId
                - VPCId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResolverRuleResponse"
  /CreateFirewallDomainList:
    post:
      operationId: CreateFirewallDomainList
      description: Creates an empty firewall domain list for use in DNS Firewall rules. You can populate the domains for the new list with a file, using ImportFirewallDomains, or with domain strings, using UpdateFirewallDomains.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateFirewallDomainList
            default: Route53Resolver.CreateFirewallDomainList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows you to retry failed requests without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A name that lets you identify the domain list to manage and use it.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to associate with the domain list.
              required:
                - CreatorRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFirewallDomainListResponse"
  /CreateFirewallRule:
    post:
      operationId: CreateFirewallRule
      description: Creates a single DNS Firewall rule in the specified rule group, using the specified domain list.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateFirewallRule
            default: Route53Resolver.CreateFirewallRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows you to retry failed requests without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                FirewallRuleGroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the firewall rule group where you want to create the rule.
                FirewallDomainListId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the domain list that you want to use in the rule. Can't be used together with DnsThreatProtecton.
                Priority:
                  $ref: "#/components/schemas/Priority"
                  description: The setting that determines the processing order of the rule in the rule group. DNS Firewall processes the rules in a rule group by order of priority, starting from the lowest setting. You must specify a unique priority for each rule in a rule group. To make it easier to insert rules later, leave space between the numbers, for example, use 100, 200, and so on. You can change the priority setting for the rules in a rule group at any time.
                Action:
                  $ref: "#/components/schemas/Action"
                  description: "The action that DNS Firewall should take on a DNS query when it matches one of the domains in the rule's domain list, or a threat in a DNS Firewall Advanced rule: ALLOW - Permit the request to go through. Not available for DNS Firewall Advanced rules. ALERT - Permit the request and send metrics and logs to Cloud Watch. BLOCK - Disallow the request. This option requires additional details in the rule's BlockResponse."
                BlockResponse:
                  $ref: "#/components/schemas/BlockResponse"
                  description: The way that you want DNS Firewall to block the request, used with the rule action setting BLOCK. NODATA - Respond indicating that the query was successful, but no response is available for it. NXDOMAIN - Respond indicating that the domain name that's in the query doesn't exist. OVERRIDE - Provide a custom override in the response. This option requires custom handling details in the rule's BlockOverride* settings. This setting is required if the rule action setting is BLOCK.
                BlockOverrideDomain:
                  $ref: "#/components/schemas/BlockOverrideDomain"
                  description: The custom DNS record to send back in response to the query. Used for the rule action BLOCK with a BlockResponse setting of OVERRIDE. This setting is required if the BlockResponse setting is OVERRIDE.
                BlockOverrideDnsType:
                  $ref: "#/components/schemas/BlockOverrideDnsType"
                  description: The DNS record's type. This determines the format of the record value that you provided in BlockOverrideDomain. Used for the rule action BLOCK with a BlockResponse setting of OVERRIDE. This setting is required if the BlockResponse setting is OVERRIDE.
                BlockOverrideTtl:
                  $ref: "#/components/schemas/BlockOverrideTtl"
                  description: The recommended amount of time, in seconds, for the DNS resolver or web browser to cache the provided override record. Used for the rule action BLOCK with a BlockResponse setting of OVERRIDE. This setting is required if the BlockResponse setting is OVERRIDE.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A name that lets you identify the rule in the rule group.
                FirewallDomainRedirectionAction:
                  $ref: "#/components/schemas/FirewallDomainRedirectionAction"
                  description: "How you want the the rule to evaluate DNS redirection in the DNS redirection chain, such as CNAME or DNAME. INSPECT_REDIRECTION_DOMAIN: (Default) inspects all domains in the redirection chain. The individual domains in the redirection chain must be added to the domain list. TRUST_REDIRECTION_DOMAIN: Inspects only the first domain in the redirection chain. You don't need to add the subsequent domains in the domain in the redirection list to the domain list."
                Qtype:
                  $ref: "#/components/schemas/Qtype"
                  description: "The DNS query type you want the rule to evaluate. Allowed values are; A: Returns an IPv4 address. AAAA: Returns an Ipv6 address. CAA: Restricts CAs that can create SSL/TLS certifications for the domain. CNAME: Returns another domain name. DS: Record that identifies the DNSSEC signing key of a delegated zone. MX: Specifies mail servers. NAPTR: Regular-expression-based rewriting of domain names. NS: Authoritative name servers. PTR: Maps an IP address to a domain name. SOA: Start of authority record for the zone. SPF: Lists the servers authorized to send emails from a domain. SRV: Application specific values that identify servers. TXT: Verifies email senders and application-specific values. A query type you define by using the DNS type ID, for example 28 for AAAA. The values must be defined as TYPENUMBER, where the NUMBER can be 1-65334, for example, TYPE28. For more information, see List of DNS record types."
                DnsThreatProtection:
                  $ref: "#/components/schemas/DnsThreatProtection"
                  description: Use to create a DNS Firewall Advanced rule.
                ConfidenceThreshold:
                  $ref: "#/components/schemas/ConfidenceThreshold"
                  description: "The confidence threshold for DNS Firewall Advanced. You must provide this value when you create a DNS Firewall Advanced rule. The confidence level values mean: LOW: Provides the highest detection rate for threats, but also increases false positives. MEDIUM: Provides a balance between detecting threats and false positives. HIGH: Detects only the most well corroborated threats with a low rate of false positives."
              required:
                - CreatorRequestId
                - FirewallRuleGroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFirewallRuleResponse"
  /CreateFirewallRuleGroup:
    post:
      operationId: CreateFirewallRuleGroup
      description: Creates an empty DNS Firewall rule group for filtering DNS network traffic in a VPC. You can add rules to the new rule group by calling CreateFirewallRule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateFirewallRuleGroup
            default: Route53Resolver.CreateFirewallRuleGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string defined by you to identify the request. This allows you to retry failed requests without the risk of running the operation twice. This can be any unique string, for example, a timestamp.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A name that lets you identify the rule group, to manage and use it.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to associate with the rule group.
              required:
                - CreatorRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFirewallRuleGroupResponse"
  /CreateOutpostResolver:
    post:
      operationId: CreateOutpostResolver
      description: Creates a Route 53 Resolver on an Outpost.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateOutpostResolver
            default: Route53Resolver.CreateOutpostResolver
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows failed requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                Name:
                  $ref: "#/components/schemas/OutpostResolverName"
                  description: A friendly name that lets you easily find a configuration in the Resolver dashboard in the Route 53 console.
                InstanceCount:
                  $ref: "#/components/schemas/InstanceCount"
                  description: Number of Amazon EC2 instances for the Resolver on Outpost. The default and minimal value is 4.
                PreferredInstanceType:
                  $ref: "#/components/schemas/OutpostInstanceType"
                  description: The Amazon EC2 instance type. If you specify this, you must also specify a value for the OutpostArn.
                OutpostArn:
                  $ref: "#/components/schemas/OutpostArn"
                  description: The Amazon Resource Name (ARN) of the Outpost. If you specify this, you must also specify a value for the PreferredInstanceType.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A string that helps identify the Route 53 Resolvers on Outpost.
              required:
                - CreatorRequestId
                - PreferredInstanceType
                - OutpostArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutpostResolverResponse"
  /CreateResolverEndpoint:
    post:
      operationId: CreateResolverEndpoint
      description: "Creates a Resolver endpoint. There are two types of Resolver endpoints, inbound and outbound: An inbound Resolver endpoint forwards DNS queries to the DNS service for a VPC from your network. An outbound Resolver endpoint forwards DNS queries from the DNS service for a VPC to your network."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateResolverEndpoint
            default: Route53Resolver.CreateResolverEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows failed requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A friendly name that lets you easily find a configuration in the Resolver dashboard in the Route 53 console.
                SecurityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                  description: The ID of one or more security groups that you want to use to control access to this VPC. The security group that you specify must include one or more inbound rules (for inbound Resolver endpoints) or outbound rules (for outbound Resolver endpoints). Inbound and outbound rules must allow TCP and UDP access. For inbound access, open port 53. For outbound access, open the port that you're using for DNS queries on your network. Some security group rules will cause your connection to be tracked. For outbound resolver endpoint, it can potentially impact the maximum queries per second from outbound endpoint to your target name server. For inbound resolver endpoint, it can bring down the overall maximum queries per second per IP address to as low as 1500. To avoid connection tracking caused by security group, see Untracked connections.
                Direction:
                  $ref: "#/components/schemas/ResolverEndpointDirection"
                  description: "Specify the applicable value: INBOUND: Resolver forwards DNS queries to the DNS service for a VPC from your network. OUTBOUND: Resolver forwards DNS queries from the DNS service for a VPC to your network. INBOUND_DELEGATION: Resolver delegates queries to Route 53 private hosted zones from your network."
                IpAddresses:
                  $ref: "#/components/schemas/IpAddressesRequest"
                  description: The subnets and IP addresses in your VPC that DNS queries originate from (for outbound endpoints) or that you forward DNS queries to (for inbound endpoints). The subnet ID uniquely identifies a VPC. Even though the minimum is 1, Route 53 requires that you create at least two.
                OutpostArn:
                  $ref: "#/components/schemas/OutpostArn"
                  description: The Amazon Resource Name (ARN) of the Outpost. If you specify this, you must also specify a value for the PreferredInstanceType.
                PreferredInstanceType:
                  $ref: "#/components/schemas/OutpostInstanceType"
                  description: The instance type. If you specify this, you must also specify a value for the OutpostArn.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to associate with the endpoint.
                ResolverEndpointType:
                  $ref: "#/components/schemas/ResolverEndpointType"
                  description: For the endpoint type you can choose either IPv4, IPv6, or dual-stack. A dual-stack endpoint means that it will resolve via both IPv4 and IPv6. This endpoint type is applied to all IP addresses.
                Protocols:
                  $ref: "#/components/schemas/ProtocolList"
                  description: "The protocols you want to use for the endpoint. DoH-FIPS is applicable for default inbound endpoints only. For a default inbound endpoint you can apply the protocols as follows: Do53 and DoH in combination. Do53 and DoH-FIPS in combination. Do53 alone. DoH alone. DoH-FIPS alone. None, which is treated as Do53. For a delegation inbound endpoint you can use Do53 only. For an outbound endpoint you can apply the protocols as follows: Do53 and DoH in combination. Do53 alone. DoH alone. None, which is treated as Do53."
                RniEnhancedMetricsEnabled:
                  $ref: "#/components/schemas/RniEnhancedMetricsEnabled"
                  description: Specifies whether RNI enhanced metrics are enabled for the Resolver endpoints. When set to true, one-minute granular metrics are published in CloudWatch for each RNI associated with this endpoint. When set to false, metrics are not published. Default is false. Standard CloudWatch pricing and charges are applied for using the Route 53 Resolver endpoint RNI enhanced metrics. For more information, see Detailed metrics.
                TargetNameServerMetricsEnabled:
                  $ref: "#/components/schemas/TargetNameServerMetricsEnabled"
                  description: Specifies whether target name server metrics are enabled for the outbound Resolver endpoints. When set to true, one-minute granular metrics are published in CloudWatch for each target name server associated with this endpoint. When set to false, metrics are not published. Default is false. This is not supported for inbound Resolver endpoints. Standard CloudWatch pricing and charges are applied for using the Route 53 Resolver endpoint target name server metrics. For more information, see Detailed metrics.
                Dns64Enabled:
                  $ref: "#/components/schemas/Dns64Enabled"
                  description: Specifies whether DNS64 is enabled for the inbound Resolver endpoint. When set to true, Route 53 Resolver synthesizes AAAA (IPv6) records for IPv4-only services by prepending the 64:ff9b::/96 prefix to the IPv4 address. This enables IPv6-only clients that send queries through the inbound endpoint to reach IPv4-only services. DNS64 works with NAT64 to provide complete IPv6-to-IPv4 translation. Default is false.
                Ipv6InternetAccessEnabled:
                  $ref: "#/components/schemas/Ipv6InternetAccessEnabled"
                  description: Specifies whether IPv6 internet access is enabled for the outbound Resolver endpoint. When set to true, the endpoint elastic network interfaces (ENIs) can forward DNS queries to public IPv6 targets through an internet gateway. Default is false. When you enable IPv6 internet access, use network controls like security groups, NACLs, or egress-only internet gateways to protect the endpoint ENIs from unsolicited ingress traffic. Be aware that some network controls can affect DNS query throughput due to connection tracking. For more information, see Amazon EC2 security group connection tracking and Resolver endpoint scaling.
              required:
                - CreatorRequestId
                - SecurityGroupIds
                - IpAddresses
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResolverEndpointResponse"
  /CreateResolverQueryLogConfig:
    post:
      operationId: CreateResolverQueryLogConfig
      description: Creates a Resolver query logging configuration, which defines where you want Resolver to save DNS query logs that originate in your VPCs. Resolver can log queries only for VPCs that are in the same Region as the query logging configuration. To specify which VPCs you want to log queries for, you use AssociateResolverQueryLogConfig. For more information, see AssociateResolverQueryLogConfig. You can optionally use Resource Access Manager (RAM) to share a query logging configuration with other Amazon Web Services accounts. The other accounts can then associate VPCs with the configuration. The query logs that Resolver creates for a configuration include all DNS queries that originate in all VPCs that are associated with the configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateResolverQueryLogConfig
            default: Route53Resolver.CreateResolverQueryLogConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ResolverQueryLogConfigName"
                  description: The name that you want to give the query logging configuration.
                DestinationArn:
                  $ref: "#/components/schemas/DestinationArn"
                  description: "The ARN of the resource that you want Resolver to send query logs. You can send query logs to an S3 bucket, a CloudWatch Logs log group, or a Kinesis Data Firehose delivery stream. Examples of valid values include the following: S3 bucket: arn:aws:s3:::amzn-s3-demo-bucket You can optionally append a file prefix to the end of the ARN. arn:aws:s3:::amzn-s3-demo-bucket/development/ CloudWatch Logs log group: arn:aws:logs:us-west-1:123456789012:log-group:/mystack-testgroup-12ABC1AB12A1:* Kinesis Data Firehose delivery stream: arn:aws:kinesis:us-east-2:0123456789:stream/my_stream_name"
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows failed requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to associate with the query logging configuration.
              required:
                - DestinationArn
                - CreatorRequestId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResolverQueryLogConfigResponse"
  /CreateResolverRule:
    post:
      operationId: CreateResolverRule
      description: For DNS queries that originate in your VPCs, specifies which Resolver endpoint the queries pass through, one domain name that you want to forward to your network, and the IP addresses of the DNS resolvers in your network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.CreateResolverRule
            default: Route53Resolver.CreateResolverRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CreatorRequestId:
                  $ref: "#/components/schemas/CreatorRequestId"
                  description: A unique string that identifies the request and that allows failed requests to be retried without the risk of running the operation twice. CreatorRequestId can be any unique string, for example, a date/time stamp.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: A friendly name that lets you easily find a rule in the Resolver dashboard in the Route 53 console. The name can be up to 64 characters long and can contain letters (a-z, A-Z), numbers (0-9), hyphens (-), underscores (_), and spaces. The name cannot consist of only numbers.
                RuleType:
                  $ref: "#/components/schemas/RuleTypeOption"
                  description: When you want to forward DNS queries for specified domain name to resolvers on your network, specify FORWARD or DELEGATE. When you have a forwarding rule to forward DNS queries for a domain to your network and you want Resolver to process queries for a subdomain of that domain, specify SYSTEM. For example, to forward DNS queries for example.com to resolvers on your network, you create a rule and specify FORWARD for RuleType. To then have Resolver process queries for apex.example.com, you create a rule and specify SYSTEM for RuleType. Currently, only Resolver can create rules that have a value of RECURSIVE for RuleType.
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: DNS queries for this domain name are forwarded to the IP addresses that you specify in TargetIps. If a query matches multiple Resolver rules (example.com and www.example.com), outbound DNS queries are routed using the Resolver rule that contains the most specific domain name (www.example.com).
                TargetIps:
                  $ref: "#/components/schemas/TargetList"
                  description: The IPs that you want Resolver to forward DNS queries to. You can specify either Ipv4 or Ipv6 addresses but not both in the same rule. Separate IP addresses with a space. TargetIps is available only when the value of Rule type is FORWARD. You should not provide TargetIps when the Rule type is DELEGATE. when creating a DELEGATE rule, you must not provide the TargetIps parameter. If you provide the TargetIps, you may receive an ERROR message similar to "Delegate resolver rules need to specify a nameserver name". This error means you should not provide TargetIps.
                ResolverEndpointId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the outbound Resolver endpoint that you want to use to route DNS queries to the IP addresses that you specify in TargetIps.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to associate with the endpoint.
                DelegationRecord:
                  $ref: "#/components/schemas/DelegationRecord"
                  description: DNS queries with the delegation records that match this domain name are forwarded to the resolvers on your network.
