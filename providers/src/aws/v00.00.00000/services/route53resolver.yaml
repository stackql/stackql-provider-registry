          $ref: "#/components/schemas/ResourceId"
          description: The ID of the Amazon VPC that is associated with the query logging configuration.
        Status:
          $ref: "#/components/schemas/ResolverQueryLogConfigAssociationStatus"
          description: "The status of the specified query logging association. Valid values include the following: CREATING: Resolver is creating an association between an Amazon VPC and a query logging configuration. ACTIVE: The association between an Amazon VPC and a query logging configuration was successfully created. Resolver is logging queries that originate in the specified VPC. DELETING: Resolver is deleting this query logging association. FAILED: Resolver either couldn't create or couldn't delete the query logging association."
        Error:
          $ref: "#/components/schemas/ResolverQueryLogConfigAssociationError"
          description: "If the value of Status is FAILED, the value of Error indicates the cause: DESTINATION_NOT_FOUND: The specified destination (for example, an Amazon S3 bucket) was deleted. ACCESS_DENIED: Permissions don't allow sending logs to the destination. If the value of Status is a value other than FAILED, Error is null."
        ErrorMessage:
          $ref: "#/components/schemas/ResolverQueryLogConfigAssociationErrorMessage"
          description: Contains additional information about the error. If the value or Error is null, the value of ErrorMessage also is null.
        CreationTime:
          $ref: "#/components/schemas/Rfc3339TimeString"
          description: The date and time that the VPC was associated with the query logging configuration, in Unix time format and Coordinated Universal Time (UTC).
    ResolverQueryLogConfigAssociationStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - ACTION_NEEDED
        - DELETING
        - FAILED
    ResolverQueryLogConfigAssociationError:
      type: string
      enum:
        - NONE
        - DESTINATION_NOT_FOUND
        - ACCESS_DENIED
        - INTERNAL_SERVICE_ERROR
    ResolverQueryLogConfigAssociationErrorMessage:
      type: string
    AssociateResolverRuleResponse:
      type: object
      properties:
        ResolverRuleAssociation:
          $ref: "#/components/schemas/ResolverRuleAssociation"
          description: Information about the AssociateResolverRule request, including the status of the request.
    ResolverRuleAssociation:
      description: In the response to an AssociateResolverRule, DisassociateResolverRule, or ListResolverRuleAssociations request, provides information about an association between a Resolver rule and a VPC. The association determines which DNS queries that originate in the VPC are forwarded to your network.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the association between a Resolver rule and a VPC. Resolver assigns this value when you submit an AssociateResolverRule request.
        ResolverRuleId:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the Resolver rule that you associated with the VPC that is specified by VPCId.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of an association between a Resolver rule and a VPC. The name can be up to 64 characters long and can contain letters (a-z, A-Z), numbers (0-9), hyphens (-), underscores (_), and spaces. The name cannot consist of only numbers.
        VPCId:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the VPC that you associated the Resolver rule with.
        Status:
          $ref: "#/components/schemas/ResolverRuleAssociationStatus"
          description: A code that specifies the current status of the association between a Resolver rule and a VPC.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: A detailed description of the status of the association between a Resolver rule and a VPC.
    ResolverRuleAssociationStatus:
      type: string
      enum:
        - CREATING
        - COMPLETE
        - DELETING
        - FAILED
        - OVERRIDDEN
    CreateFirewallDomainListResponse:
      type: object
      properties:
        FirewallDomainList:
          $ref: "#/components/schemas/FirewallDomainList"
          description: The domain list that you just created.
    FirewallDomainList:
