  /UpdateFirewallConfig:
    post:
      operationId: UpdateFirewallConfig
      description: Updates the configuration of the firewall behavior provided by DNS Firewall for a single VPC from Amazon Virtual Private Cloud (Amazon VPC).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.UpdateFirewallConfig
            default: Route53Resolver.UpdateFirewallConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the VPC that the configuration is for.
                FirewallFailOpen:
                  $ref: "#/components/schemas/FirewallFailOpenStatus"
                  description: Determines how Route 53 Resolver handles queries during failures, for example when all traffic that is sent to DNS Firewall fails to receive a reply. By default, fail open is disabled, which means the failure mode is closed. This approach favors security over availability. DNS Firewall blocks queries that it is unable to evaluate properly. If you enable this option, the failure mode is open. This approach favors availability over security. DNS Firewall allows queries to proceed if it is unable to properly evaluate them. This behavior is only enforced for VPCs that have at least one DNS Firewall rule group association.
              required:
                - ResourceId
                - FirewallFailOpen
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFirewallConfigResponse"
  /UpdateFirewallDomains:
    post:
      operationId: UpdateFirewallDomains
      description: Updates the firewall domain list from an array of domain specifications.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.UpdateFirewallDomains
            default: Route53Resolver.UpdateFirewallDomains
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FirewallDomainListId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the domain list whose domains you want to update.
                Operation:
                  $ref: "#/components/schemas/FirewallDomainUpdateOperation"
                  description: "What you want DNS Firewall to do with the domains that you are providing: ADD - Add the domains to the ones that are already in the domain list. REMOVE - Search the domain list for the domains and remove them from the list. REPLACE - Update the domain list to exactly match the list that you are providing."
                Domains:
                  $ref: "#/components/schemas/FirewallDomains"
                  description: "A list of domains to use in the update operation. There is a limit of 1000 domains per request. Each domain specification in your domain list must satisfy the following requirements: It can optionally start with * (asterisk). With the exception of the optional starting asterisk, it must only contain the following characters: A-Z, a-z, 0-9, - (hyphen). It must be from 1-255 characters in length."
              required:
                - FirewallDomainListId
                - Operation
                - Domains
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFirewallDomainsResponse"
  /UpdateFirewallRule:
    post:
      operationId: UpdateFirewallRule
      description: Updates the specified firewall rule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.UpdateFirewallRule
            default: Route53Resolver.UpdateFirewallRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FirewallRuleGroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the firewall rule group for the rule.
                FirewallDomainListId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the domain list to use in the rule.
                FirewallThreatProtectionId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The DNS Firewall Advanced rule ID.
                Priority:
                  $ref: "#/components/schemas/Priority"
                  description: The setting that determines the processing order of the rule in the rule group. DNS Firewall processes the rules in a rule group by order of priority, starting from the lowest setting. You must specify a unique priority for each rule in a rule group. To make it easier to insert rules later, leave space between the numbers, for example, use 100, 200, and so on. You can change the priority setting for the rules in a rule group at any time.
                Action:
                  $ref: "#/components/schemas/Action"
                  description: "The action that DNS Firewall should take on a DNS query when it matches one of the domains in the rule's domain list, or a threat in a DNS Firewall Advanced rule: ALLOW - Permit the request to go through. Not available for DNS Firewall Advanced rules. ALERT - Permit the request to go through but send an alert to the logs. BLOCK - Disallow the request. This option requires additional details in the rule's BlockResponse."
                BlockResponse:
                  $ref: "#/components/schemas/BlockResponse"
                  description: The way that you want DNS Firewall to block the request. Used for the rule action setting BLOCK. NODATA - Respond indicating that the query was successful, but no response is available for it. NXDOMAIN - Respond indicating that the domain name that's in the query doesn't exist. OVERRIDE - Provide a custom override in the response. This option requires custom handling details in the rule's BlockOverride* settings.
                BlockOverrideDomain:
                  $ref: "#/components/schemas/BlockOverrideDomain"
                  description: The custom DNS record to send back in response to the query. Used for the rule action BLOCK with a BlockResponse setting of OVERRIDE.
                BlockOverrideDnsType:
                  $ref: "#/components/schemas/BlockOverrideDnsType"
                  description: The DNS record's type. This determines the format of the record value that you provided in BlockOverrideDomain. Used for the rule action BLOCK with a BlockResponse setting of OVERRIDE.
                BlockOverrideTtl:
                  $ref: "#/components/schemas/BlockOverrideTtl"
                  description: The recommended amount of time, in seconds, for the DNS resolver or web browser to cache the provided override record. Used for the rule action BLOCK with a BlockResponse setting of OVERRIDE.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the rule.
                FirewallDomainRedirectionAction:
                  $ref: "#/components/schemas/FirewallDomainRedirectionAction"
                  description: "How you want the the rule to evaluate DNS redirection in the DNS redirection chain, such as CNAME or DNAME. INSPECT_REDIRECTION_DOMAIN: (Default) inspects all domains in the redirection chain. The individual domains in the redirection chain must be added to the domain list. TRUST_REDIRECTION_DOMAIN: Inspects only the first domain in the redirection chain. You don't need to add the subsequent domains in the domain in the redirection list to the domain list."
                Qtype:
                  $ref: "#/components/schemas/Qtype"
                  description: "The DNS query type you want the rule to evaluate. Allowed values are; A: Returns an IPv4 address. AAAA: Returns an Ipv6 address. CAA: Restricts CAs that can create SSL/TLS certifications for the domain. CNAME: Returns another domain name. DS: Record that identifies the DNSSEC signing key of a delegated zone. MX: Specifies mail servers. NAPTR: Regular-expression-based rewriting of domain names. NS: Authoritative name servers. PTR: Maps an IP address to a domain name. SOA: Start of authority record for the zone. SPF: Lists the servers authorized to send emails from a domain. SRV: Application specific values that identify servers. TXT: Verifies email senders and application-specific values. A query type you define by using the DNS type ID, for example 28 for AAAA. The values must be defined as TYPENUMBER, where the NUMBER can be 1-65334, for example, TYPE28. For more information, see List of DNS record types. If you set up a firewall BLOCK rule with action NXDOMAIN on query type equals AAAA, this action will not be applied to synthetic IPv6 addresses generated when DNS64 is enabled."
                DnsThreatProtection:
                  $ref: "#/components/schemas/DnsThreatProtection"
                  description: "The type of the DNS Firewall Advanced rule. Valid values are: DGA: Domain generation algorithms detection. DGAs are used by attackers to generate a large number of domains to to launch malware attacks. DNS_TUNNELING: DNS tunneling detection. DNS tunneling is used by attackers to exfiltrate data from the client by using the DNS tunnel without making a network connection to the client."
                ConfidenceThreshold:
                  $ref: "#/components/schemas/ConfidenceThreshold"
                  description: "The confidence threshold for DNS Firewall Advanced. You must provide this value when you create a DNS Firewall Advanced rule. The confidence level values mean: LOW: Provides the highest detection rate for threats, but also increases false positives. MEDIUM: Provides a balance between detecting threats and false positives. HIGH: Detects only the most well corroborated threats with a low rate of false positives."
              required:
                - FirewallRuleGroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFirewallRuleResponse"
  /UpdateFirewallRuleGroupAssociation:
    post:
      operationId: UpdateFirewallRuleGroupAssociation
      description: Changes the association of a FirewallRuleGroup with a VPC. The association enables DNS filtering for the VPC.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
