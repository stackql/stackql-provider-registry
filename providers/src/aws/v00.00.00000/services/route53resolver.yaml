                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the virtual private cloud (VPC) that you're updating the DNSSEC validation status for.
                Validation:
                  $ref: "#/components/schemas/Validation"
                  description: The new value that you are specifying for DNSSEC validation for the VPC. The value can be ENABLE or DISABLE. Be aware that it can take time for a validation status change to be completed.
              required:
                - ResourceId
                - Validation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResolverDnssecConfigResponse"
  /UpdateResolverEndpoint:
    post:
      operationId: UpdateResolverEndpoint
      description: Updates the name, or endpoint type for an inbound or an outbound Resolver endpoint. You can only update between IPV4 and DUALSTACK, IPV6 endpoint type can't be updated to other type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.UpdateResolverEndpoint
            default: Route53Resolver.UpdateResolverEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResolverEndpointId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Resolver endpoint that you want to update.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: The name of the Resolver endpoint that you want to update.
                ResolverEndpointType:
                  $ref: "#/components/schemas/ResolverEndpointType"
                  description: Specifies the endpoint type for what type of IP address the endpoint uses to forward DNS queries. Updating to IPV6 type isn't currently supported.
                UpdateIpAddresses:
                  $ref: "#/components/schemas/UpdateIpAddresses"
                  description: Specifies the IPv6 address when you update the Resolver endpoint from IPv4 to dual-stack. If you don't specify an IPv6 address, one will be automatically chosen from your subnet.
                Protocols:
                  $ref: "#/components/schemas/ProtocolList"
                  description: "The protocols you want to use for the endpoint. DoH-FIPS is applicable for default inbound endpoints only. For a default inbound endpoint you can apply the protocols as follows: Do53 and DoH in combination. Do53 and DoH-FIPS in combination. Do53 alone. DoH alone. DoH-FIPS alone. None, which is treated as Do53. For a delegation inbound endpoint you can use Do53 only. For an outbound endpoint you can apply the protocols as follows: Do53 and DoH in combination. Do53 alone. DoH alone. None, which is treated as Do53. You can't change the protocol of an inbound endpoint directly from only Do53 to only DoH, or DoH-FIPS. This is to prevent a sudden disruption to incoming traffic that relies on Do53. To change the protocol from Do53 to DoH, or DoH-FIPS, you must first enable both Do53 and DoH, or Do53 and DoH-FIPS, to make sure that all incoming traffic has transferred to using the DoH protocol, or DoH-FIPS, and then remove the Do53."
                RniEnhancedMetricsEnabled:
                  $ref: "#/components/schemas/RniEnhancedMetricsEnabled"
                  description: Updates whether RNI enhanced metrics are enabled for the Resolver endpoints. When set to true, one-minute granular metrics are published in CloudWatch for each RNI associated with this endpoint. When set to false, metrics are not published. Standard CloudWatch pricing and charges are applied for using the Route 53 Resolver endpoint RNI enhanced metrics. For more information, see Detailed metrics.
                TargetNameServerMetricsEnabled:
                  $ref: "#/components/schemas/TargetNameServerMetricsEnabled"
                  description: Updates whether target name server metrics are enabled for the outbound Resolver endpoints. When set to true, one-minute granular metrics are published in CloudWatch for each target name server associated with this endpoint. When set to false, metrics are not published. This setting is not supported for inbound Resolver endpoints. Standard CloudWatch pricing and charges are applied for using the Route 53 Resolver endpoint target name server metrics. For more information, see Detailed metrics.
                Dns64Enabled:
                  $ref: "#/components/schemas/Dns64Enabled"
                  description: Specifies whether DNS64 is enabled for the inbound Resolver endpoint. When set to true, Route 53 Resolver synthesizes AAAA (IPv6) records for IPv4-only services by prepending the 64:ff9b::/96 prefix to the IPv4 address. This enables IPv6-only clients that send queries through the inbound endpoint to reach IPv4-only services. DNS64 works with NAT64 to provide complete IPv6-to-IPv4 translation.
                Ipv6InternetAccessEnabled:
                  $ref: "#/components/schemas/Ipv6InternetAccessEnabled"
                  description: Specifies whether IPv6 internet access is enabled for the outbound Resolver endpoint. When set to true, the endpoint elastic network interfaces (ENIs) can forward DNS queries to public IPv6 targets through an internet gateway. When you enable IPv6 internet access, use network controls like security groups, NACLs, or egress-only internet gateways to protect the endpoint ENIs from unsolicited ingress traffic. Be aware that some network controls can affect DNS query throughput due to connection tracking. For more information, see Amazon EC2 security group connection tracking and Resolver endpoint scaling.
              required:
                - ResolverEndpointId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResolverEndpointResponse"
  /UpdateResolverRule:
    post:
      operationId: UpdateResolverRule
      description: Updates settings for a specified Resolver rule. ResolverRuleId is required, and all other parameters are optional. If you don't specify a parameter, it retains its current value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Resolver.UpdateResolverRule
            default: Route53Resolver.UpdateResolverRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResolverRuleId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the Resolver rule that you want to update.
                Config:
                  $ref: "#/components/schemas/ResolverRuleConfig"
                  description: The new settings for the Resolver rule.
              required:
                - ResolverRuleId
                - Config
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResolverRuleResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CreatorRequestId:
      type: string
      minLength: 1
      maxLength: 255
    ResourceId:
      type: string
      minLength: 1
      maxLength: 64
    Priority:
      type: integer
    Name:
      type: string
      maxLength: 64
      pattern: (?!^[0-9]+$)([a-zA-Z0-9\-_' ']+)
    MutationProtectionStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: One tag that you want to add to the specified resource. A tag consists of a Key (a name for the tag) and a Value.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The name for the tag. For example, if you want to associate Resolver resources with the account IDs of your customers for billing purposes, the value of Key might be account-id.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value for the tag. For example, if Key is account-id, then Value might be the ID of the customer account that you're creating the resource for.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    AssociateFirewallRuleGroupResponse:
      type: object
      properties:
        FirewallRuleGroupAssociation:
          $ref: "#/components/schemas/FirewallRuleGroupAssociation"
          description: The association that you just created. The association has an ID that you can use to identify it in other requests, like update and delete.
    FirewallRuleGroupAssociation:
      description: An association between a firewall rule group and a VPC, which enables DNS filtering for the VPC.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for the association.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the firewall rule group association.
        FirewallRuleGroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the firewall rule group.
        VpcId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier of the VPC that is associated with the rule group.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the association.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: The setting that determines the processing order of the rule group among the rule groups that are associated with a single VPC. DNS Firewall filters VPC traffic starting from rule group with the lowest numeric priority setting.
        MutationProtection:
          $ref: "#/components/schemas/MutationProtectionStatus"
          description: If enabled, this setting disallows modification or removal of the association, to help prevent against accidentally altering DNS firewall protections.
        ManagedOwnerName:
          $ref: "#/components/schemas/ServicePrinciple"
          description: The owner of the association, used only for associations that are not managed by you. If you use Firewall Manager to manage your DNS Firewalls, then this reports Firewall Manager as the managed owner.
        Status:
          $ref: "#/components/schemas/FirewallRuleGroupAssociationStatus"
          description: The current status of the association.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: Additional information about the status of the response, if available.
        CreatorRequestId:
          $ref: "#/components/schemas/CreatorRequestId"
          description: A unique string defined by you to identify the request. This allows you to retry failed requests without the risk of running the operation twice. This can be any unique string, for example, a timestamp.
        CreationTime:
          $ref: "#/components/schemas/Rfc3339TimeString"
          description: The date and time that the association was created, in Unix time format and Coordinated Universal Time (UTC).
        ModificationTime:
          $ref: "#/components/schemas/Rfc3339TimeString"
          description: The date and time that the association was last modified, in Unix time format and Coordinated Universal Time (UTC).
    Arn:
      type: string
      minLength: 1
      maxLength: 255
    ServicePrinciple:
      type: string
      minLength: 1
      maxLength: 512
    FirewallRuleGroupAssociationStatus:
      type: string
      enum:
        - COMPLETE
        - DELETING
        - UPDATING
    StatusMessage:
      type: string
      maxLength: 255
    Rfc3339TimeString:
      type: string
      minLength: 20
      maxLength: 40
    IpAddressUpdate:
      description: In an UpdateResolverEndpoint request, information about an IP address to update.
      type: object
      properties:
        IpId:
          $ref: "#/components/schemas/ResourceId"
          description: "Only when removing an IP address from a Resolver endpoint: The ID of the IP address that you want to remove. To get this ID, use GetResolverEndpoint."
        SubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: The ID of the subnet that includes the IP address that you want to update. To get this ID, use GetResolverEndpoint.
        Ip:
          $ref: "#/components/schemas/Ip"
          description: The new IPv4 address.
        Ipv6:
          $ref: "#/components/schemas/Ipv6"
          description: The new IPv6 address.
    SubnetId:
      type: string
      minLength: 1
      maxLength: 32
    Ip:
      type: string
      minLength: 7
      maxLength: 36
    Ipv6:
      type: string
      minLength: 7
      maxLength: 39
    AssociateResolverEndpointIpAddressResponse:
      type: object
      properties:
        ResolverEndpoint:
          $ref: "#/components/schemas/ResolverEndpoint"
          description: The response to an AssociateResolverEndpointIpAddress request.
    ResolverEndpoint:
      description: In the response to a CreateResolverEndpoint, DeleteResolverEndpoint, GetResolverEndpoint, Updates the name, or ResolverEndpointType for an endpoint, or UpdateResolverEndpoint request, a complex type that contains settings for an existing inbound or outbound Resolver endpoint.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the Resolver endpoint.
        CreatorRequestId:
          $ref: "#/components/schemas/CreatorRequestId"
          description: A unique string that identifies the request that created the Resolver endpoint. The CreatorRequestId allows failed requests to be retried without the risk of running the operation twice.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN (Amazon Resource Name) for the Resolver endpoint.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name that you assigned to the Resolver endpoint when you submitted a CreateResolverEndpoint request.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The ID of one or more security groups that control access to this VPC. The security group must include one or more inbound rules (for inbound endpoints) or outbound rules (for outbound endpoints). Inbound and outbound rules must allow TCP and UDP access. For inbound access, open port 53. For outbound access, open the port that you're using for DNS queries on your network.
        Direction:
          $ref: "#/components/schemas/ResolverEndpointDirection"
          description: "Indicates whether the Resolver endpoint allows inbound or outbound DNS queries: INBOUND: allows DNS queries to your VPC from your network OUTBOUND: allows DNS queries from your VPC to your network INBOUND_DELEGATION: Resolver delegates queries to Route 53 private hosted zones from your network."
        IpAddressCount:
          $ref: "#/components/schemas/IpAddressCount"
          description: The number of IP addresses that the Resolver endpoint can use for DNS queries.
        HostVPCId:
          $ref: "#/components/schemas/ResourceId"
          description: The ID of the VPC that you want to create the Resolver endpoint in.
        Status:
          $ref: "#/components/schemas/ResolverEndpointStatus"
          description: "A code that specifies the current status of the Resolver endpoint. Valid values include the following: CREATING: Resolver is creating and configuring one or more Amazon VPC network interfaces for this endpoint. OPERATIONAL: The Amazon VPC network interfaces for this endpoint are correctly configured and able to pass inbound or outbound DNS queries between your network and Resolver. UPDATING: Resolver is associating or disassociating one or more network interfaces with this endpoint. AUTO_RECOVERING: Resolver is trying to recover one or more of the network interfaces that are associated with this endpoint. During the recovery process, the endpoint functions with limited capacity because of the limit on the number of DNS queries per IP address (per network interface). For the current limit, see Limits on Route 53 Resolver. ACTION_NEEDED: This endpoint is unhealthy, and Resolver can't automatically recover it. To resolve the problem, we recommend that you check each IP address that you associated with the endpoint. For each IP address that isn't available, add another IP address and then delete the IP address that isn't available. (An endpoint must always include at least two IP addresses.) A status of ACTION_NEEDED can have a variety of causes. Here are two common causes: One or more of the network interfaces that are associated with the endpoint were deleted using Amazon VPC. The network interface couldn't be created for some reason that's outside the control of Resolver. DELETING: Resolver is deleting this endpoint and the associated network interfaces."
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: A detailed description of the status of the Resolver endpoint.
        CreationTime:
          $ref: "#/components/schemas/Rfc3339TimeString"
          description: The date and time that the endpoint was created, in Unix time format and Coordinated Universal Time (UTC).
        ModificationTime:
          $ref: "#/components/schemas/Rfc3339TimeString"
          description: The date and time that the endpoint was last modified, in Unix time format and Coordinated Universal Time (UTC).
        OutpostArn:
          $ref: "#/components/schemas/OutpostArn"
          description: The ARN (Amazon Resource Name) for the Outpost.
        PreferredInstanceType:
          $ref: "#/components/schemas/OutpostInstanceType"
          description: The Amazon EC2 instance type.
        ResolverEndpointType:
          $ref: "#/components/schemas/ResolverEndpointType"
          description: The Resolver endpoint IP address type.
        Protocols:
          $ref: "#/components/schemas/ProtocolList"
          description: "Protocols used for the endpoint. DoH-FIPS is applicable for a default inbound endpoints only. For an inbound endpoint you can apply the protocols as follows: Do53 and DoH in combination. Do53 and DoH-FIPS in combination. Do53 alone. DoH alone. DoH-FIPS alone. None, which is treated as Do53. For a delegation inbound endpoint you can use Do53 only. For an outbound endpoint you can apply the protocols as follows: Do53 and DoH in combination. Do53 alone. DoH alone. None, which is treated as Do53."
        RniEnhancedMetricsEnabled:
          $ref: "#/components/schemas/RniEnhancedMetricsEnabled"
          description: Indicates whether RNI enhanced metrics are enabled for the Resolver endpoint. When enabled, one-minute granular metrics are published in CloudWatch for each RNI associated with this endpoint. When disabled, these metrics are not published.
        TargetNameServerMetricsEnabled:
          $ref: "#/components/schemas/TargetNameServerMetricsEnabled"
          description: Indicates whether target name server metrics are enabled for the outbound Resolver endpoint. When enabled, one-minute granular metrics are published in CloudWatch for each target name server associated with this endpoint. When disabled, these metrics are not published. This feature is not supported for inbound Resolver endpoint.
        Dns64Enabled:
          $ref: "#/components/schemas/Dns64Enabled"
          description: Indicates whether DNS64 is enabled for the inbound Resolver endpoint. When true, Route 53 Resolver synthesizes AAAA (IPv6) records for IPv4-only services by prepending the 64:ff9b::/96 prefix to the IPv4 address.
        Ipv6InternetAccessEnabled:
          $ref: "#/components/schemas/Ipv6InternetAccessEnabled"
          description: Indicates whether IPv6 internet access is enabled for the outbound Resolver endpoint. When true, the endpoint elastic network interfaces (ENIs) can forward DNS queries to public IPv6 targets through an internet gateway.
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/ResourceId"
    ResolverEndpointDirection:
      type: string
      enum:
        - INBOUND
        - OUTBOUND
        - INBOUND_DELEGATION
    IpAddressCount:
      type: integer
    ResolverEndpointStatus:
      type: string
      enum:
        - CREATING
        - OPERATIONAL
        - UPDATING
        - AUTO_RECOVERING
        - ACTION_NEEDED
        - DELETING
    OutpostArn:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^arn:aws([a-z-]+)?:outposts:[a-z\d-]+:\d{12}:outpost/op-[a-f0-9]{17}$
    OutpostInstanceType:
      type: string
      minLength: 1
      maxLength: 255
    ResolverEndpointType:
      type: string
