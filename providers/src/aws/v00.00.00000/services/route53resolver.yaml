        ResolverQueryLogConfigAssociation:
          $ref: "#/components/schemas/ResolverQueryLogConfigAssociation"
          description: A complex type that contains settings for a specified association between an Amazon VPC and a query logging configuration.
    ResolverQueryLogConfigAssociation:
      description: In the response to an AssociateResolverQueryLogConfig, DisassociateResolverQueryLogConfig, GetResolverQueryLogConfigAssociation, or ListResolverQueryLogConfigAssociations, request, a complex type that contains settings for a specified association between an Amazon VPC and a query logging configuration.
      type: object
