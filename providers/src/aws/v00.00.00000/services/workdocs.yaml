openapi: 3.0.0
info:
  version: "2016-05-01"
  title: Amazon WorkDocs
  description: Amazon WorkDocs
  x-serviceName: workdocs
  x-serviceAlias: workdocs
  x-protocol: rest-json
  x-apiVersion: "2016-05-01"
  x-endpointPrefix: workdocs
  x-jsonVersion: "1.1"
servers:
  - url: https://workdocs.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for workdocs
paths:
  /api/v1/documents/{document_id}/versions/{version_id}:
    delete:
      operationId: AbortDocumentVersionUpload
      description: Aborts the upload of the specified document version that was previously initiated by InitiateDocumentVersionUpload. The client should make this call only when it no longer intends to upload the document version, or fails to do so.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The ID of the version.
      responses:
        "204":
          description: Success
    get:
      operationId: GetDocumentVersion
      description: Retrieves version metadata for the specified document.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The version ID of the document.
        - name: fields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FieldNamesType"
          description: A comma-separated list of values. Specify "SOURCE" to include a URL for the source document.
        - name: includeCustomMetadata
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanType"
          description: Set this to TRUE to include custom metadata in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDocumentVersionResponse"
    patch:
      operationId: UpdateDocumentVersion
      description: Changes the status of the document version to ACTIVE. Amazon WorkDocs also sets its document container to ACTIVE. This is the last step in a document upload, after the client uploads the document to an S3-presigned URL returned by InitiateDocumentVersionUpload.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The version ID of the document.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                VersionStatus:
                  $ref: "#/components/schemas/DocumentVersionStatus"
      responses:
        "200":
          description: Success
  /api/v1/users/{user_id}/activation:
    post:
      operationId: ActivateUser
      description: Activates the specified user. Only active users can access Amazon WorkDocs.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The ID of the user.
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateUserResponse"
    delete:
      operationId: DeactivateUser
      description: Deactivates the specified user, which revokes the user's access to Amazon WorkDocs.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The ID of the user.
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
      responses:
        "204":
          description: Success
  /api/v1/resources/{resource_id}/permissions:
    post:
      operationId: AddResourcePermissions
      description: Creates a set of permissions for the specified folder or document. The resource permissions are overwritten if the principals already have different permissions.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Principals:
                  $ref: "#/components/schemas/SharePrincipalList"
                NotificationOptions:
                  $ref: "#/components/schemas/NotificationOptions"
              required:
                - Principals
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddResourcePermissionsResponse"
    get:
      operationId: DescribeResourcePermissions
      description: Describes the permissions of a specified resource.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource.
        - name: principalId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdType"
          description: The ID of the principal to filter permissions by.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LimitType"
          description: The maximum number of items to return with this call.
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMarkerType"
          description: The marker for the next set of results. (You received this marker from a previous call)
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResourcePermissionsResponse"
    delete:
      operationId: RemoveAllResourcePermissions
      description: Removes all the permissions from the specified resource.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource.
      responses:
        "204":
          description: Success
  /api/v1/documents/{document_id}/versions/{version_id}/comment:
    post:
      operationId: CreateComment
      description: Adds a new comment to the specified document version.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The ID of the document version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ParentId:
                  $ref: "#/components/schemas/CommentIdType"
                ThreadId:
                  $ref: "#/components/schemas/CommentIdType"
                Text:
                  $ref: "#/components/schemas/CommentTextType"
                Visibility:
                  $ref: "#/components/schemas/CommentVisibilityType"
                NotifyCollaborators:
                  $ref: "#/components/schemas/BooleanType"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommentResponse"
  /api/v1/resources/{resource_id}/customMetadata:
    put:
      operationId: CreateCustomMetadata
      description: Adds one or more custom properties to the specified resource (a folder, document, or version).
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource.
        - name: versionid
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The ID of the version, if the custom metadata is being added to a document version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomMetadata:
                  $ref: "#/components/schemas/CustomMetadataMap"
              required:
                - CustomMetadata
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomMetadataResponse"
    delete:
      operationId: DeleteCustomMetadata
      description: Deletes custom metadata from the specified resource.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource, either a document or folder.
        - name: versionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The ID of the version, if the custom metadata is being deleted from a document version.
        - name: keys
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CustomMetadataKeyList"
          description: List of properties to remove.
        - name: deleteAll
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanType"
          description: Flag to indicate removal of all custom metadata properties from the specified resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomMetadataResponse"
  /api/v1/folders:
    post:
      operationId: CreateFolder
      description: Creates a folder with the specified name and parent folder.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ResourceNameType"
                ParentFolderId:
                  $ref: "#/components/schemas/ResourceIdType"
              required:
                - ParentFolderId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFolderResponse"
  /api/v1/resources/{resource_id}/labels:
    put:
      operationId: CreateLabels
      description: Adds the specified list of labels to the given resource (a document or folder)
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource.
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Labels:
                  $ref: "#/components/schemas/SharedLabels"
              required:
                - Labels
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLabelsResponse"
    delete:
      operationId: DeleteLabels
      description: Deletes the specified list of labels from a resource.
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the resource.
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: labels
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SharedLabels"
          description: List of labels to delete from the resource.
        - name: deleteAll
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanType"
          description: Flag to request removal of all labels from the specified resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLabelsResponse"
  /api/v1/organizations/{organization_id}/subscriptions:
    post:
      operationId: CreateNotificationSubscription
      description: Configure Amazon WorkDocs to use Amazon SNS notifications. The endpoint receives a confirmation message, and must confirm the subscription. For more information, see Setting up notifications for an IAM user or role in the Amazon WorkDocs Developer Guide.
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The ID of the organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Endpoint:
                  $ref: "#/components/schemas/SubscriptionEndPointType"
                Protocol:
                  $ref: "#/components/schemas/SubscriptionProtocolType"
                SubscriptionType:
                  $ref: "#/components/schemas/SubscriptionType"
              required:
                - Endpoint
                - SubscriptionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotificationSubscriptionResponse"
    get:
      operationId: DescribeNotificationSubscriptions
      description: Lists the specified notification subscriptions.
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The ID of the organization.
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMarkerType"
          description: The marker for the next set of results. (You received this marker from a previous call.)
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LimitType"
          description: The maximum number of items to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeNotificationSubscriptionsResponse"
  /api/v1/users:
    post:
      operationId: CreateUser
      description: Creates a user in a Simple AD or Microsoft AD directory. The status of a newly created user is "ACTIVE". New users can access Amazon WorkDocs.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OrganizationId:
                  $ref: "#/components/schemas/IdType"
                Username:
                  $ref: "#/components/schemas/UsernameType"
                EmailAddress:
                  $ref: "#/components/schemas/EmailAddressType"
                GivenName:
                  $ref: "#/components/schemas/UserAttributeValueType"
                Surname:
                  $ref: "#/components/schemas/UserAttributeValueType"
                Password:
                  $ref: "#/components/schemas/PasswordType"
                TimeZoneId:
                  $ref: "#/components/schemas/TimeZoneIdType"
                StorageRule:
                  $ref: "#/components/schemas/StorageRuleType"
              required:
                - GivenName
                - Password
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
    get:
      operationId: DescribeUsers
      description: Describes the specified users. You can describe all users or filter the results (for example, by status or organization). By default, Amazon WorkDocs returns the first 24 active or pending users. If there are more results, the response includes a marker that you can use to request the next set of results.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: organizationId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IdType"
          description: The ID of the organization.
        - name: userIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserIdsType"
          description: The IDs of the users.
        - name: query
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SearchQueryType"
          description: "A query to filter users by user name. Remember the following about the Userids and Query parameters: If you don't use either parameter, the API returns a paginated list of all users on the site. If you use both parameters, the API ignores the Query parameter. The Userid parameter only returns user names that match a corresponding user ID. The Query parameter runs a \"prefix\" search for users by the GivenName, SurName, or UserName fields included in a CreateUser API call. For example, querying on Ma returns Márcia Oliveira, María García, and Mateo Jackson. If you use multiple characters, the API only returns data that matches all characters. For example, querying on Ma J only returns Mateo Jackson."
        - name: include
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserFilterType"
          description: The state of the users. Specify "ALL" to include inactive users.
        - name: order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderType"
          description: The order for the results.
        - name: sort
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserSortType"
          description: The sorting criteria.
        - name: marker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PageMarkerType"
          description: The marker for the next set of results. (You received this marker from a previous call.)
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LimitType"
          description: The maximum number of items to return.
        - name: fields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FieldNamesType"
          description: A comma-separated list of values. Specify "STORAGE_METADATA" to include the user storage quota and utilization information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeUsersResponse"
  /api/v1/documents/{document_id}/versions/{version_id}/comment/{comment_id}:
    delete:
      operationId: DeleteComment
      description: Deletes the specified comment from the document version.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The ID of the document version.
        - name: comment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CommentIdType"
          description: The ID of the comment.
      responses:
        "204":
          description: Success
  /api/v1/documents/{document_id}:
    delete:
      operationId: DeleteDocument
      description: Permanently deletes the specified document and its associated metadata.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
      responses:
        "204":
          description: Success
    get:
      operationId: GetDocument
      description: Retrieves details of a document.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
        - name: includeCustomMetadata
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanType"
          description: Set this to TRUE to include custom metadata in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDocumentResponse"
    patch:
      operationId: UpdateDocument
      description: Updates the specified attributes of a document. The user must have access to both the document and its parent folder, if applicable.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ResourceNameType"
                ParentFolderId:
                  $ref: "#/components/schemas/ResourceIdType"
                ResourceState:
                  $ref: "#/components/schemas/ResourceStateType"
      responses:
        "200":
          description: Success
  /api/v1/documentVersions/{document_id}/versions/{version_id}:
    delete:
      operationId: DeleteDocumentVersion
      description: Deletes a specific version of a document.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: document_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the document associated with the version being deleted.
        - name: version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DocumentVersionIdType"
          description: The ID of the version being deleted.
        - name: deletePriorVersions
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BooleanType"
          description: Deletes all versions of a document prior to the current version.
      responses:
        "204":
          description: Success
  /api/v1/folders/{folder_id}:
    delete:
      operationId: DeleteFolder
      description: Permanently deletes the specified folder and its contents.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: folder_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the folder.
      responses:
        "204":
          description: Success
    get:
      operationId: GetFolder
      description: Retrieves the metadata of the specified folder.
      parameters:
        - name: Authentication
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationHeaderType"
          description: Amazon WorkDocs authentication token. Not required when using Amazon Web Services administrator credentials to access the API.
        - name: folder_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the folder.
        - name: includeCustomMetadata
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BooleanType"
          description: Set to TRUE to include custom metadata in the response.
      responses:
        "200":
