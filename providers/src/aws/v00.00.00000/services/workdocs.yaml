components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AuthenticationHeaderType:
      type: string
      minLength: 1
      maxLength: 8199
    ResourceIdType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+-.@]+"
    DocumentVersionIdType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+-.@]+"
    IdType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[&\\w+-.@]+"
    ActivateUserResponse:
      type: object
      properties:
        User:
          $ref: "#/components/schemas/User"
          description: The user information.
    User:
      description: Describes a user.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/IdType"
          description: The ID of the user.
        Username:
          $ref: "#/components/schemas/UsernameType"
          description: The login name of the user.
        EmailAddress:
          $ref: "#/components/schemas/EmailAddressType"
          description: The email address of the user.
        GivenName:
          $ref: "#/components/schemas/UserAttributeValueType"
          description: The given name of the user.
        Surname:
          $ref: "#/components/schemas/UserAttributeValueType"
          description: The surname of the user.
        OrganizationId:
          $ref: "#/components/schemas/IdType"
          description: The ID of the organization.
        RootFolderId:
          $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the root folder.
        RecycleBinFolderId:
          $ref: "#/components/schemas/ResourceIdType"
          description: The ID of the recycle bin folder.
        Status:
          $ref: "#/components/schemas/UserStatusType"
          description: The status of the user.
        Type:
          $ref: "#/components/schemas/UserType"
          description: The type of user.
        CreatedTimestamp:
          $ref: "#/components/schemas/TimestampType"
