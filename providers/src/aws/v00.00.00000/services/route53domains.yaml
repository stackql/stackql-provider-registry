      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainName:
      type: string
      maxLength: 255
    Password:
      type: string
    AcceptDomainTransferFromAnotherAwsAccountResponse:
      description: The AcceptDomainTransferFromAnotherAwsAccount response includes the following element.
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: Identifier for tracking the progress of the request. To query the operation status, use GetOperationDetail.
    OperationId:
      type: string
      maxLength: 255
    DnssecSigningAttributes:
      description: Information about a delegation signer (DS) record that was created in the registry by AssociateDelegationSignerToDomain.
      type: object
      properties:
        Algorithm:
          $ref: "#/components/schemas/NullableInteger"
          description: Algorithm which was used to generate the digest from the public key.
        Flags:
          $ref: "#/components/schemas/NullableInteger"
          description: Defines the type of key. It can be either a KSK (key-signing-key, value 257) or ZSK (zone-signing-key, value 256). Using KSK is always encouraged. Only use ZSK if your DNS provider isn't Route 53 and you don’t have KSK available. If you have KSK and ZSK keys, always use KSK to create a delegations signer (DS) record. If you have ZSK keys only – use ZSK to create a DS record.
        PublicKey:
          $ref: "#/components/schemas/DnssecPublicKey"
          description: The base64-encoded public key part of the key pair that is passed to the registry.
    NullableInteger:
      type: integer
    DnssecPublicKey:
      type: string
      maxLength: 32768
    AssociateDelegationSignerToDomainResponse:
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The identifier for tracking the progress of the request. To query the operation status, use GetOperationDetail.
    CancelDomainTransferToAnotherAwsAccountResponse:
      description: The CancelDomainTransferToAnotherAwsAccount response includes the following element.
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: The identifier that TransferDomainToAnotherAwsAccount returned to track the progress of the request. Because the transfer request was canceled, the value is no longer valid, and you can't use GetOperationDetail to query the operation status.
    LangCode:
      type: string
      pattern: "|[A-Za-z]{2,3}"
    CheckDomainAvailabilityResponse:
      description: The CheckDomainAvailability response includes the following elements.
      type: object
      properties:
        Availability:
          $ref: "#/components/schemas/DomainAvailability"
          description: "Whether the domain name is available for registering. You can register only domains designated as AVAILABLE. Valid values: AVAILABLE The domain name is available. AVAILABLE_RESERVED The domain name is reserved under specific conditions. AVAILABLE_PREORDER The domain name is available and can be preordered. DONT_KNOW The TLD registry didn't reply with a definitive answer about whether the domain name is available. Route 53 can return this response for a variety of reasons, for example, the registry is performing maintenance. Try again later. INVALID_NAME_FOR_TLD The TLD isn't valid. For example, it can contain characters that aren't allowed. PENDING The TLD registry didn't return a response in the expected amount of time. When the response is delayed, it usually takes just a few extra seconds. You can resubmit the request immediately. RESERVED The domain name has been reserved for another person or organization. UNAVAILABLE The domain name is not available. UNAVAILABLE_PREMIUM The domain name is not available. UNAVAILABLE_RESTRICTED The domain name is forbidden."
    DomainAvailability:
      type: string
      enum:
        - AVAILABLE
        - AVAILABLE_RESERVED
        - AVAILABLE_PREORDER
        - UNAVAILABLE
        - UNAVAILABLE_PREMIUM
        - UNAVAILABLE_RESTRICTED
        - RESERVED
        - DONT_KNOW
        - INVALID_NAME_FOR_TLD
        - PENDING
    DomainAuthCode:
      type: string
      maxLength: 1024
    CheckDomainTransferabilityResponse:
      description: The CheckDomainTransferability response includes the following elements.
      type: object
      properties:
        Transferability:
          $ref: "#/components/schemas/DomainTransferability"
          description: A complex type that contains information about whether the specified domain can be transferred to Route 53.
        Message:
          $ref: "#/components/schemas/Message"
          description: Provides an explanation for when a domain can't be transferred.
    DomainTransferability:
      description: A complex type that contains information about whether the specified domain can be transferred to Route 53.
      type: object
      properties:
        Transferable:
          $ref: "#/components/schemas/Transferable"
    Transferable:
      description: "Whether the domain name can be transferred to Route 53. You can transfer only domains that have a value of TRANSFERABLE or Transferable. Valid values: TRANSFERABLE The domain name can be transferred to Route 53. UNTRANSFERRABLE The domain name can't be transferred to Route 53. DONT_KNOW The TLD registry didn't respond in time or didn't provide a definitive answer about domain transferability, which can occur due to registry maintenance or temporary delays. DOMAIN_IN_OWN_ACCOUNT The domain already exists in the current Amazon Web Services account. DOMAIN_IN_ANOTHER_ACCOUNT The domain exists in another Amazon Web Services account. PREMIUM_DOMAIN Premium domain transfer is not supported."
      type: string
      enum:
        - TRANSFERABLE
        - UNTRANSFERABLE
        - DONT_KNOW
        - DOMAIN_IN_OWN_ACCOUNT
        - DOMAIN_IN_ANOTHER_ACCOUNT
        - PREMIUM_DOMAIN
    Message:
      type: string
    DeleteDomainResponse:
      type: object
      properties:
        OperationId:
          $ref: "#/components/schemas/OperationId"
          description: Identifier for tracking the progress of the request. To query the operation status, use GetOperationDetail.
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    DeleteTagsForDomainResponse:
      type: object
    DisableDomainAutoRenewResponse:
      type: object
    DisableDomainTransferLockResponse:
