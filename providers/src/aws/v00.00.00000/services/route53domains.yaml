    GetContactReachabilityStatusResponse:
      type: object
      properties:
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name for which you requested the reachability status.
        status:
          $ref: "#/components/schemas/ReachabilityStatus"
          description: "Whether the registrant contact has responded. Values include the following: PENDING We sent the confirmation email and haven't received a response yet. DONE We sent the email and got confirmation from the registrant contact. EXPIRED The time limit expired before the registrant contact responded."
    ReachabilityStatus:
      type: string
      enum:
        - PENDING
        - DONE
        - EXPIRED
    GetDomainDetailResponse:
      description: The GetDomainDetail response includes the following elements.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: The name of a domain.
        Nameservers:
          $ref: "#/components/schemas/NameserverList"
          description: The name servers of the domain.
        AutoRenew:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the domain registration is set to renew automatically.
        AdminContact:
          $ref: "#/components/schemas/ContactDetail"
          description: Provides details about the domain administrative contact.
        RegistrantContact:
          $ref: "#/components/schemas/ContactDetail"
          description: Provides details about the domain registrant.
        TechContact:
          $ref: "#/components/schemas/ContactDetail"
          description: Provides details about the domain technical contact.
        AdminPrivacy:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether contact information is concealed from WHOIS queries. If the value is true, WHOIS ("who is") queries return contact information either for Amazon Registrar or for our registrar associate, Gandi. If the value is false, WHOIS queries return the information that you entered for the admin contact.
        RegistrantPrivacy:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether contact information is concealed from WHOIS queries. If the value is true, WHOIS ("who is") queries return contact information either for Amazon Registrar or for our registrar associate, Gandi. If the value is false, WHOIS queries return the information that you entered for the registrant contact (domain owner).
        TechPrivacy:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether contact information is concealed from WHOIS queries. If the value is true, WHOIS ("who is") queries return contact information either for Amazon Registrar or for our registrar associate, Gandi. If the value is false, WHOIS queries return the information that you entered for the technical contact.
        RegistrarName:
          $ref: "#/components/schemas/RegistrarName"
          description: Name of the registrar of the domain as identified in the registry.
        WhoIsServer:
          $ref: "#/components/schemas/RegistrarWhoIsServer"
          description: The fully qualified name of the WHOIS server that can answer the WHOIS query for the domain.
        RegistrarUrl:
          $ref: "#/components/schemas/RegistrarUrl"
          description: Web address of the registrar.
        AbuseContactEmail:
          $ref: "#/components/schemas/Email"
          description: Email address to contact to report incorrect contact information for a domain, to report that the domain is being used to send spam, to report that someone is cybersquatting on a domain name, or report some other type of abuse.
        AbuseContactPhone:
          $ref: "#/components/schemas/ContactNumber"
          description: Phone number for reporting abuse.
        RegistryDomainId:
          $ref: "#/components/schemas/RegistryDomainId"
          description: Reserved for future use.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the domain was created as found in the response to a WHOIS query. The date and time is in Unix time format and Coordinated Universal time (UTC).
        UpdatedDate:
          $ref: "#/components/schemas/Timestamp"
          description: The last updated date of the domain as found in the response to a WHOIS query. The date and time is in Unix time format and Coordinated Universal time (UTC).
        ExpirationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when the registration for the domain is set to expire. The date and time is in Unix time format and Coordinated Universal time (UTC).
        Reseller:
          $ref: "#/components/schemas/Reseller"
          description: Reserved for future use.
        DnsSec:
          $ref: "#/components/schemas/DNSSec"
          description: Deprecated.
        StatusList:
          $ref: "#/components/schemas/DomainStatusList"
          description: An array of domain name status codes, also known as Extensible Provisioning Protocol (EPP) status codes. ICANN, the organization that maintains a central database of domain names, has developed a set of domain name status codes that tell you the status of a variety of operations on a domain name, for example, registering a domain name, transferring a domain name to another registrar, renewing the registration for a domain name, and so on. All registrars use this same set of status codes. For a current list of domain name status codes and an explanation of what each code means, go to the ICANN website and search for epp status codes. (Search on the ICANN website; web searches sometimes return an old version of the document.)
        DnssecKeys:
          $ref: "#/components/schemas/DnssecKeyList"
          description: A complex type that contains information about the DNSSEC configuration.
        BillingContact:
          $ref: "#/components/schemas/ContactDetail"
          description: Provides details about the domain billing contact.
        BillingPrivacy:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether contact information is concealed from WHOIS queries. If the value is true, WHOIS ("who is") queries return contact information either for Amazon Registrar or for our registrar associate, Gandi. If the value is false, WHOIS queries return the information that you entered for the billing contact.
    NameserverList:
      type: array
      items:
        $ref: "#/components/schemas/Nameserver"
