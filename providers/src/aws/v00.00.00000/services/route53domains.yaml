openapi: 3.0.0
info:
  version: "2014-05-15"
  title: Amazon Route 53 Domains
  description: Amazon Route 53 Domains
  x-serviceName: route53domains
  x-serviceAlias: route53domains
  x-protocol: json
  x-apiVersion: "2014-05-15"
  x-endpointPrefix: route53domains
  x-targetPrefix: Route53Domains_v20140515
  x-jsonVersion: "1.1"
servers:
  - url: https://route53domains.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for route53domains
paths:
  /AcceptDomainTransferFromAnotherAwsAccount:
    post:
      operationId: AcceptDomainTransferFromAnotherAwsAccount
      description: Accepts the transfer of a domain from another Amazon Web Services account to the currentAmazon Web Services account. You initiate a transfer between Amazon Web Services accounts using TransferDomainToAnotherAwsAccount. If you use the CLI command at accept-domain-transfer-from-another-aws-account, use JSON format as input instead of text because otherwise CLI will throw an error from domain transfer input that includes single quotes. Use either ListOperations or GetOperationDetail to determine whether the operation succeeded. GetOperationDetail provides additional information, for example, Domain Transfer from Aws Account 111122223333 has been cancelled.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.AcceptDomainTransferFromAnotherAwsAccount
            default: Route53Domains_v20140515.AcceptDomainTransferFromAnotherAwsAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that was specified when another Amazon Web Services account submitted a TransferDomainToAnotherAwsAccount request.
                Password:
                  $ref: "#/components/schemas/Password"
                  description: The password that was returned by the TransferDomainToAnotherAwsAccount request.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptDomainTransferFromAnotherAwsAccountResponse"
  /AssociateDelegationSignerToDomain:
    post:
      operationId: AssociateDelegationSignerToDomain
      description: Creates a delegation signer (DS) record in the registry zone for this domain name. Note that creating DS record at the registry impacts DNSSEC validation of your DNS records. This action may render your domain name unavailable on the internet if the steps are completed in the wrong order, or with incorrect timing. For more information about DNSSEC signing, see Configuring DNSSEC signing in the Route 53 developer guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.AssociateDelegationSignerToDomain
            default: Route53Domains_v20140515.AssociateDelegationSignerToDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain.
                SigningAttributes:
                  $ref: "#/components/schemas/DnssecSigningAttributes"
                  description: The information about a key, including the algorithm, public key-value, and flags.
              required:
                - DomainName
                - SigningAttributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDelegationSignerToDomainResponse"
  /CancelDomainTransferToAnotherAwsAccount:
    post:
      operationId: CancelDomainTransferToAnotherAwsAccount
      description: Cancels the transfer of a domain from the current Amazon Web Services account to another Amazon Web Services account. You initiate a transfer betweenAmazon Web Services accounts using TransferDomainToAnotherAwsAccount. You must cancel the transfer before the other Amazon Web Services account accepts the transfer using AcceptDomainTransferFromAnotherAwsAccount. Use either ListOperations or GetOperationDetail to determine whether the operation succeeded. GetOperationDetail provides additional information, for example, Domain Transfer from Aws Account 111122223333 has been cancelled.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.CancelDomainTransferToAnotherAwsAccount
            default: Route53Domains_v20140515.CancelDomainTransferToAnotherAwsAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain for which you want to cancel the transfer to another Amazon Web Services account.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDomainTransferToAnotherAwsAccountResponse"
  /CheckDomainAvailability:
    post:
      operationId: CheckDomainAvailability
      description: This operation checks the availability of one domain name. Note that if the availability status of a domain is pending, you must submit another request to determine the availability of the domain name.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.CheckDomainAvailability
            default: Route53Domains_v20140515.CheckDomainAvailability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: "The name of the domain that you want to get availability for. The top-level domain (TLD), such as .com, must be a TLD that Route 53 supports. For a list of supported TLDs, see Domains that You Can Register with Amazon Route 53 in the Amazon Route 53 Developer Guide. The domain name can contain only the following characters: Letters a through z. Domain names are not case sensitive. Numbers 0 through 9. Hyphen (-). You can't specify a hyphen at the beginning or end of a label. Period (.) to separate the labels in the name, such as the . in example.com. Internationalized domain names are not supported for some top-level domains. To determine whether the TLD that you want to use supports internationalized domain names, see Domains that You Can Register with Amazon Route 53. For more information, see Formatting Internationalized Domain Names."
                IdnLangCode:
                  $ref: "#/components/schemas/LangCode"
                  description: Reserved for future use.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDomainAvailabilityResponse"
  /CheckDomainTransferability:
    post:
      operationId: CheckDomainTransferability
      description: Checks whether a domain name can be transferred to Amazon Route 53.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.CheckDomainTransferability
            default: Route53Domains_v20140515.CheckDomainTransferability
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: "The name of the domain that you want to transfer to Route 53. The top-level domain (TLD), such as .com, must be a TLD that Route 53 supports. For a list of supported TLDs, see Domains that You Can Register with Amazon Route 53 in the Amazon Route 53 Developer Guide. The domain name can contain only the following characters: Letters a through z. Domain names are not case sensitive. Numbers 0 through 9. Hyphen (-). You can't specify a hyphen at the beginning or end of a label. Period (.) to separate the labels in the name, such as the . in example.com."
                AuthCode:
                  $ref: "#/components/schemas/DomainAuthCode"
                  description: If the registrar for the top-level domain (TLD) requires an authorization code to transfer the domain, the code that you got from the current registrar for the domain.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDomainTransferabilityResponse"
  /DeleteDomain:
    post:
      operationId: DeleteDomain
      description: "This operation deletes the specified domain. This action is permanent. For more information, see Deleting a domain name registration. To transfer the domain registration to another registrar, use the transfer process that’s provided by the registrar to which you want to transfer the registration. Otherwise, the following apply: You can’t get a refund for the cost of a deleted domain registration. The registry for the top-level domain might hold the domain name for a brief time before releasing it for other users to register (varies by registry). When the registration has been deleted, we'll send you a confirmation to the registrant contact. The email will come from noreply@domainnameverification.net or noreply@emailverification.info or noreply@registrar.amazon."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.DeleteDomain
            default: Route53Domains_v20140515.DeleteDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: Name of the domain to be deleted.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainResponse"
  /DeleteTagsForDomain:
    post:
      operationId: DeleteTagsForDomain
      description: This operation deletes the specified tags for a domain. All tag operations are eventually consistent; subsequent operations might not immediately represent all issued operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.DeleteTagsForDomain
            default: Route53Domains_v20140515.DeleteTagsForDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain for which you want to delete one or more tags.
                TagsToDelete:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys to delete.
              required:
                - DomainName
                - TagsToDelete
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTagsForDomainResponse"
  /DisableDomainAutoRenew:
    post:
      operationId: DisableDomainAutoRenew
      description: This operation disables automatic renewal of domain registration for the specified domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.DisableDomainAutoRenew
            default: Route53Domains_v20140515.DisableDomainAutoRenew
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that you want to disable automatic renewal for.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableDomainAutoRenewResponse"
  /DisableDomainTransferLock:
    post:
      operationId: DisableDomainTransferLock
      description: This operation removes the transfer lock on the domain (specifically the clientTransferProhibited status) to allow domain transfers. We recommend you refrain from performing this action unless you intend to transfer the domain to a different registrar. Successful submission returns an operation ID that you can use to track the progress and completion of the action. If the request is not completed successfully, the domain registrant will be notified by email.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.DisableDomainTransferLock
            default: Route53Domains_v20140515.DisableDomainTransferLock
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that you want to remove the transfer lock for.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableDomainTransferLockResponse"
  /DisassociateDelegationSignerFromDomain:
    post:
      operationId: DisassociateDelegationSignerFromDomain
      description: Deletes a delegation signer (DS) record in the registry zone for this domain name.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.DisassociateDelegationSignerFromDomain
            default: Route53Domains_v20140515.DisassociateDelegationSignerFromDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: Name of the domain.
                Id:
                  $ref: "#/components/schemas/String"
                  description: An internal identification number assigned to each DS record after it’s created. You can retrieve it as part of DNSSEC information returned by GetDomainDetail.
              required:
                - DomainName
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateDelegationSignerFromDomainResponse"
  /EnableDomainAutoRenew:
    post:
      operationId: EnableDomainAutoRenew
      description: This operation configures Amazon Route 53 to automatically renew the specified domain before the domain registration expires. The cost of renewing your domain registration is billed to your Amazon Web Services account. The period during which you can renew a domain name varies by TLD. For a list of TLDs and their renewal policies, see Domains That You Can Register with Amazon Route 53 in the Amazon Route 53 Developer Guide. Route 53 requires that you renew before the end of the renewal period so we can complete processing before the deadline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.EnableDomainAutoRenew
            default: Route53Domains_v20140515.EnableDomainAutoRenew
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that you want to enable automatic renewal for.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableDomainAutoRenewResponse"
  /EnableDomainTransferLock:
    post:
      operationId: EnableDomainTransferLock
      description: This operation sets the transfer lock on the domain (specifically the clientTransferProhibited status) to prevent domain transfers. Successful submission returns an operation ID that you can use to track the progress and completion of the action. If the request is not completed successfully, the domain registrant will be notified by email.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.EnableDomainTransferLock
            default: Route53Domains_v20140515.EnableDomainTransferLock
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that you want to set the transfer lock for.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableDomainTransferLockResponse"
  /GetContactReachabilityStatus:
    post:
      operationId: GetContactReachabilityStatus
      description: For operations that require confirmation that the email address for the registrant contact is valid, such as registering a new domain, this operation returns information about whether the registrant contact has responded. If you want us to resend the email, use the ResendContactReachabilityEmail operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.GetContactReachabilityStatus
            default: Route53Domains_v20140515.GetContactReachabilityStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                domainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain for which you want to know whether the registrant contact has confirmed that the email address is valid.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContactReachabilityStatusResponse"
  /GetDomainDetail:
    post:
      operationId: GetDomainDetail
      description: This operation returns detailed information about a specified domain that is associated with the current Amazon Web Services account. Contact information for the domain is also returned as part of the output.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.GetDomainDetail
            default: Route53Domains_v20140515.GetDomainDetail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The name of the domain that you want to get detailed information about.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainDetailResponse"
  /GetDomainSuggestions:
    post:
      operationId: GetDomainSuggestions
      description: The GetDomainSuggestions operation returns a list of suggested domain names.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.GetDomainSuggestions
            default: Route53Domains_v20140515.GetDomainSuggestions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: "A domain name that you want to use as the basis for a list of possible domain names. The top-level domain (TLD), such as .com, must be a TLD that Route 53 supports. For a list of supported TLDs, see Domains that You Can Register with Amazon Route 53 in the Amazon Route 53 Developer Guide. The domain name can contain only the following characters: Letters a through z. Domain names are not case sensitive. Numbers 0 through 9. Hyphen (-). You can't specify a hyphen at the beginning or end of a label. Period (.) to separate the labels in the name, such as the . in example.com. Internationalized domain names are not supported for some top-level domains. To determine whether the TLD that you want to use supports internationalized domain names, see Domains that You Can Register with Amazon Route 53."
                SuggestionCount:
                  $ref: "#/components/schemas/Integer"
                  description: The number of suggested domain names that you want Route 53 to return. Specify a value between 1 and 50. Note that fewer than the requested number might be returned.
                OnlyAvailable:
                  $ref: "#/components/schemas/Boolean"
                  description: If OnlyAvailable is true, Route 53 returns only domain names that are available. If OnlyAvailable is false, Route 53 returns domain names without checking whether they're available to be registered. To determine whether the domain is available, you can call checkDomainAvailability for each suggestion.
              required:
                - DomainName
                - SuggestionCount
                - OnlyAvailable
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainSuggestionsResponse"
  /GetOperationDetail:
    post:
      operationId: GetOperationDetail
      description: This operation returns the current status of an operation that is not completed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.GetOperationDetail
            default: Route53Domains_v20140515.GetOperationDetail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                OperationId:
                  $ref: "#/components/schemas/OperationId"
                  description: The identifier for the operation for which you want to get the status. Route 53 returned the identifier in the response to the original request.
              required:
                - OperationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOperationDetailResponse"
  /ListDomains:
    post:
      operationId: ListDomains
      description: This operation returns all the domain names registered with Amazon Route 53 for the current Amazon Web Services account if no filtering conditions are used.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.ListDomains
            default: Route53Domains_v20140515.ListDomains
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FilterConditions:
                  $ref: "#/components/schemas/FilterConditions"
                  description: A complex type that contains information about the filters applied during the ListDomains request. The filter conditions can include domain name and domain expiration.
                SortCondition:
                  $ref: "#/components/schemas/SortCondition"
                  description: A complex type that contains information about the requested ordering of domains in the returned list.
                Marker:
                  $ref: "#/components/schemas/PageMarker"
                  description: "For an initial request for a list of domains, omit this element. If the number of domains that are associated with the current Amazon Web Services account is greater than the value that you specified for MaxItems, you can use Marker to return additional domains. Get the value of NextPageMarker from the previous response, and submit another request that includes the value of NextPageMarker in the Marker element. Constraints: The marker must match the value specified in the previous request."
                MaxItems:
                  $ref: "#/components/schemas/PageMaxItems"
                  description: "Number of domains to be returned. Default: 20"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDomainsResponse"
  /ListOperations:
    post:
      operationId: ListOperations
      description: Returns information about all of the operations that return an operation ID and that have ever been performed on domains that were registered by the current account. This command runs only in the us-east-1 Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.ListOperations
            default: Route53Domains_v20140515.ListOperations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubmittedSince:
                  $ref: "#/components/schemas/Timestamp"
                  description: An optional parameter that lets you get information about all the operations that you submitted after a specified date and time. Specify the date and time in Unix time format and Coordinated Universal time (UTC).
                Marker:
                  $ref: "#/components/schemas/PageMarker"
                  description: For an initial request for a list of operations, omit this element. If the number of operations that are not yet complete is greater than the value that you specified for MaxItems, you can use Marker to return additional operations. Get the value of NextPageMarker from the previous response, and submit another request that includes the value of NextPageMarker in the Marker element.
                MaxItems:
                  $ref: "#/components/schemas/PageMaxItems"
                  description: "Number of domains to be returned. Default: 20"
                Status:
                  $ref: "#/components/schemas/OperationStatusList"
                  description: The status of the operations.
                Type:
                  $ref: "#/components/schemas/OperationTypeList"
                  description: An arrays of the domains operation types.
                SortBy:
                  $ref: "#/components/schemas/ListOperationsSortAttributeName"
                  description: The sort type for returned values.
                SortOrder:
                  $ref: "#/components/schemas/SortOrder"
                  description: The sort order for returned values, either ascending or descending.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOperationsResponse"
  /ListPrices:
    post:
      operationId: ListPrices
      description: "Lists the following prices for either all the TLDs supported by Route 53, or the specified TLD: Registration Transfer Owner change Domain renewal Domain restoration"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.ListPrices
            default: Route53Domains_v20140515.ListPrices
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Tld:
                  $ref: "#/components/schemas/TldName"
                  description: The TLD for which you want to receive the pricing information. For example. .net. If a Tld value is not provided, a list of prices for all TLDs supported by Route 53 is returned.
                Marker:
                  $ref: "#/components/schemas/PageMarker"
                  description: For an initial request for a list of prices, omit this element. If the number of prices that are not yet complete is greater than the value that you specified for MaxItems, you can use Marker to return additional prices. Get the value of NextPageMarker from the previous response, and submit another request that includes the value of NextPageMarker in the Marker element. Used only for all TLDs. If you specify a TLD, don't specify a Marker.
                MaxItems:
                  $ref: "#/components/schemas/ListPricesPageMaxItems"
                  description: Number of Prices to be returned. Used only for all TLDs. If you specify a TLD, don't specify a MaxItems.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPricesResponse"
  /ListTagsForDomain:
    post:
      operationId: ListTagsForDomain
      description: This operation returns all of the tags that are associated with the specified domain. All tag operations are eventually consistent; subsequent operations might not immediately represent all issued operations.
      parameters:
        - name: X-Amz-Target
