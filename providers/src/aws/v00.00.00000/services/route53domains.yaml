            default: Route53Domains_v20140515.UpdateTagsForDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain for which you want to add or update tags.
                TagsToUpdate:
                  $ref: "#/components/schemas/TagList"
                  description: A list of the tag keys and values that you want to add or update. If you specify a key that already exists, the corresponding value will be replaced.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTagsForDomainResponse"
  /ViewBilling:
    post:
      operationId: ViewBilling
      description: Returns all the domain-related billing records for the current Amazon Web Services account for a specified period
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Route53Domains_v20140515.ViewBilling
            default: Route53Domains_v20140515.ViewBilling
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Start:
                  $ref: "#/components/schemas/Timestamp"
                  description: The beginning date and time for the time period for which you want a list of billing records. Specify the date and time in Unix time format and Coordinated Universal time (UTC).
                End:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end date and time for the time period for which you want a list of billing records. Specify the date and time in Unix time format and Coordinated Universal time (UTC).
                Marker:
                  $ref: "#/components/schemas/PageMarker"
                  description: "For an initial request for a list of billing records, omit this element. If the number of billing records that are associated with the current Amazon Web Services account during the specified period is greater than the value that you specified for MaxItems, you can use Marker to return additional billing records. Get the value of NextPageMarker from the previous response, and submit another request that includes the value of NextPageMarker in the Marker element. Constraints: The marker must match the value of NextPageMarker that was returned in the previous response."
                MaxItems:
                  $ref: "#/components/schemas/PageMaxItems"
                  description: "The number of billing records to be returned. Default: 20"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewBillingResponse"
components:
