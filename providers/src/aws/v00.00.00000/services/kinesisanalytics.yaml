openapi: 3.0.0
info:
  version: "2015-08-14"
  title: Amazon Kinesis Analytics
  description: Amazon Kinesis Analytics
  x-serviceName: kinesisanalytics
  x-serviceAlias: kinesisanalytics
  x-protocol: json
  x-apiVersion: "2015-08-14"
  x-endpointPrefix: kinesisanalytics
  x-targetPrefix: KinesisAnalytics_20150814
  x-jsonVersion: "1.1"
servers:
  - url: https://kinesisanalytics.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kinesisanalytics
paths:
  /AddApplicationCloudWatchLoggingOption:
    post:
      operationId: AddApplicationCloudWatchLoggingOption
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Adds a CloudWatch log stream to monitor application configuration errors. For more information about using CloudWatch log streams with Amazon Kinesis Analytics applications, see Working with Amazon CloudWatch Logs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.AddApplicationCloudWatchLoggingOption
            default: KinesisAnalytics_20150814.AddApplicationCloudWatchLoggingOption
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The Kinesis Analytics application name.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: The version ID of the Kinesis Analytics application.
                CloudWatchLoggingOption:
                  $ref: "#/components/schemas/CloudWatchLoggingOption"
                  description: "Provides the CloudWatch log stream Amazon Resource Name (ARN) and the IAM role ARN. Note: To write application messages to CloudWatch, the IAM role that is used must have the PutLogEvents policy action enabled."
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - CloudWatchLoggingOption
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddApplicationCloudWatchLoggingOptionResponse"
  /AddApplicationInput:
    post:
      operationId: AddApplicationInput
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Adds a streaming source to your Amazon Kinesis application. For conceptual information, see Configuring Application Input. You can add a streaming source either when you create an application or you can use this operation to add a streaming source after you create an application. For more information, see CreateApplication. Any configuration update, including adding a streaming source using this operation, results in a new version of the application. You can use the DescribeApplication operation to find the current application version. This operation requires permissions to perform the kinesisanalytics:AddApplicationInput action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.AddApplicationInput
            default: KinesisAnalytics_20150814.AddApplicationInput
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of your existing Amazon Kinesis Analytics application to which you want to add the streaming source.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: Current version of your Amazon Kinesis Analytics application. You can use the DescribeApplication operation to find the current application version.
                Input:
                  $ref: "#/components/schemas/Input"
                  description: The Input to add.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - Input
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddApplicationInputResponse"
  /AddApplicationInputProcessingConfiguration:
    post:
      operationId: AddApplicationInputProcessingConfiguration
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Adds an InputProcessingConfiguration to an application. An input processor preprocesses records on the input stream before the application's SQL code executes. Currently, the only input processor available is AWS Lambda.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.AddApplicationInputProcessingConfiguration
            default: KinesisAnalytics_20150814.AddApplicationInputProcessingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the application to which you want to add the input processing configuration.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: Version of the application to which you want to add the input processing configuration. You can use the DescribeApplication operation to get the current application version. If the version specified is not the current version, the ConcurrentModificationException is returned.
                InputId:
                  $ref: "#/components/schemas/Id"
                  description: The ID of the input configuration to add the input processing configuration to. You can get a list of the input IDs for an application using the DescribeApplication operation.
                InputProcessingConfiguration:
                  $ref: "#/components/schemas/InputProcessingConfiguration"
                  description: The InputProcessingConfiguration to add to the application.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - InputId
                - InputProcessingConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddApplicationInputProcessingConfigurationResponse"
  /AddApplicationOutput:
    post:
      operationId: AddApplicationOutput
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Adds an external destination to your Amazon Kinesis Analytics application. If you want Amazon Kinesis Analytics to deliver data from an in-application stream within your application to an external destination (such as an Amazon Kinesis stream, an Amazon Kinesis Firehose delivery stream, or an AWS Lambda function), you add the relevant configuration to your application using this operation. You can configure one or more outputs for your application. Each output configuration maps an in-application stream and an external destination. You can use one of the output configurations to deliver data from your in-application error stream to an external destination so that you can analyze the errors. For more information, see Understanding Application Output (Destination). Any configuration update, including adding a streaming source using this operation, results in a new version of the application. You can use the DescribeApplication operation to find the current application version. For the limits on the number of application inputs and outputs you can configure, see Limits. This operation requires permissions to perform the kinesisanalytics:AddApplicationOutput action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.AddApplicationOutput
            default: KinesisAnalytics_20150814.AddApplicationOutput
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the application to which you want to add the output configuration.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: Version of the application to which you want to add the output configuration. You can use the DescribeApplication operation to get the current application version. If the version specified is not the current version, the ConcurrentModificationException is returned.
                Output:
                  $ref: "#/components/schemas/Output"
                  description: An array of objects, each describing one output configuration. In the output configuration, you specify the name of an in-application stream, a destination (that is, an Amazon Kinesis stream, an Amazon Kinesis Firehose delivery stream, or an AWS Lambda function), and record the formation to use when writing to the destination.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - Output
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddApplicationOutputResponse"
  /AddApplicationReferenceDataSource:
    post:
      operationId: AddApplicationReferenceDataSource
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Adds a reference data source to an existing application. Amazon Kinesis Analytics reads reference data (that is, an Amazon S3 object) and creates an in-application table within your application. In the request, you provide the source (S3 bucket name and object key name), name of the in-application table to create, and the necessary mapping information that describes how data in Amazon S3 object maps to columns in the resulting in-application table. For conceptual information, see Configuring Application Input. For the limits on data sources you can add to your application, see Limits. This operation requires permissions to perform the kinesisanalytics:AddApplicationOutput action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.AddApplicationReferenceDataSource
            default: KinesisAnalytics_20150814.AddApplicationReferenceDataSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of an existing application.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: Version of the application for which you are adding the reference data source. You can use the DescribeApplication operation to get the current application version. If the version specified is not the current version, the ConcurrentModificationException is returned.
                ReferenceDataSource:
                  $ref: "#/components/schemas/ReferenceDataSource"
                  description: The reference data source can be an object in your Amazon S3 bucket. Amazon Kinesis Analytics reads the object and copies the data into the in-application table that is created. You provide an S3 bucket, object key name, and the resulting in-application table that is created. You must also provide an IAM role with the necessary permissions that Amazon Kinesis Analytics can assume to read the object from your S3 bucket on your behalf.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - ReferenceDataSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddApplicationReferenceDataSourceResponse"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Creates an Amazon Kinesis Analytics application. You can configure each application with one streaming source as input, application code to process the input, and up to three destinations where you want Amazon Kinesis Analytics to write the output data from your application. For an overview, see How it Works. In the input configuration, you map the streaming source to an in-application stream, which you can think of as a constantly updating table. In the mapping, you must provide a schema for the in-application stream and map each data column in the in-application stream to a data element in the streaming source. Your application code is one or more SQL statements that read input data, transform it, and generate output. Your application code can create one or more SQL artifacts like SQL streams or pumps. In the output configuration, you can configure the application to write data from in-application streams created in your applications to up to three destinations. To read data from your source stream or write data to destination streams, Amazon Kinesis Analytics needs your permissions. You grant these permissions by creating IAM roles. This operation requires permissions to perform the kinesisanalytics:CreateApplication action. For introductory exercises to create an Amazon Kinesis Analytics application, see Getting Started.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.CreateApplication
            default: KinesisAnalytics_20150814.CreateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of your Amazon Kinesis Analytics application (for example, sample-app).
                ApplicationDescription:
                  $ref: "#/components/schemas/ApplicationDescription"
                  description: Summary description of the application.
                Inputs:
                  $ref: "#/components/schemas/Inputs"
                  description: Use this parameter to configure the application input. You can configure your application to receive input from a single streaming source. In this configuration, you map this streaming source to an in-application stream that is created. Your application code can then query the in-application stream like a table (you can think of it as a constantly updating table). For the streaming source, you provide its Amazon Resource Name (ARN) and format of data on the stream (for example, JSON, CSV, etc.). You also must provide an IAM role that Amazon Kinesis Analytics can assume to read this stream on your behalf. To create the in-application stream, you need to specify a schema to transform your data into a schematized version used in SQL. In the schema, you provide the necessary mapping of the data elements in the streaming source to record columns in the in-app stream.
                Outputs:
                  $ref: "#/components/schemas/Outputs"
                  description: You can configure application output to write data from any of the in-application streams to up to three destinations. These destinations can be Amazon Kinesis streams, Amazon Kinesis Firehose delivery streams, AWS Lambda destinations, or any combination of the three. In the configuration, you specify the in-application stream name, the destination stream or Lambda function Amazon Resource Name (ARN), and the format to use when writing data. You must also provide an IAM role that Amazon Kinesis Analytics can assume to write to the destination stream or Lambda function on your behalf. In the output configuration, you also provide the output stream or Lambda function ARN. For stream destinations, you provide the format of data in the stream (for example, JSON, CSV). You also must provide an IAM role that Amazon Kinesis Analytics can assume to write to the stream or Lambda function on your behalf.
                CloudWatchLoggingOptions:
                  $ref: "#/components/schemas/CloudWatchLoggingOptions"
                  description: Use this parameter to configure a CloudWatch log stream to monitor application configuration errors. For more information, see Working with Amazon CloudWatch Logs.
                ApplicationCode:
                  $ref: "#/components/schemas/ApplicationCode"
                  description: One or more SQL statements that read input data, transform it, and generate output. For example, you can write a SQL statement that reads data from one in-application stream, generates a running average of the number of advertisement clicks by vendor, and insert resulting rows in another in-application stream using pumps. For more information about the typical pattern, see Application Code. You can provide such series of SQL statements, where output of one statement can be used as the input for the next statement. You store intermediate results by creating in-application streams and pumps. Note that the application code must create the streams with names specified in the Outputs. For example, if your Outputs defines output streams named ExampleOutputStream1 and ExampleOutputStream2, then your application code must create these streams.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: A list of one or more tags to assign to the application. A tag is a key-value pair that identifies an application. Note that the maximum number of application tags includes system tags. The maximum number of user-defined application tags is 50. For more information, see Using Tagging.
              required:
                - ApplicationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
  /DeleteApplication:
    post:
      operationId: DeleteApplication
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Deletes the specified application. Amazon Kinesis Analytics halts application execution and deletes the application, including any application artifacts (such as in-application streams, reference table, and application code). This operation requires permissions to perform the kinesisanalytics:DeleteApplication action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DeleteApplication
            default: KinesisAnalytics_20150814.DeleteApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the Amazon Kinesis Analytics application to delete.
                CreateTimestamp:
                  $ref: "#/components/schemas/Timestamp"
                  description: You can use the DescribeApplication operation to get this value.
              required:
                - ApplicationName
                - CreateTimestamp
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
  /DeleteApplicationCloudWatchLoggingOption:
    post:
      operationId: DeleteApplicationCloudWatchLoggingOption
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Deletes a CloudWatch log stream from an application. For more information about using CloudWatch log streams with Amazon Kinesis Analytics applications, see Working with Amazon CloudWatch Logs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DeleteApplicationCloudWatchLoggingOption
            default: KinesisAnalytics_20150814.DeleteApplicationCloudWatchLoggingOption
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The Kinesis Analytics application name.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: The version ID of the Kinesis Analytics application.
                CloudWatchLoggingOptionId:
                  $ref: "#/components/schemas/Id"
                  description: The CloudWatchLoggingOptionId of the CloudWatch logging option to delete. You can get the CloudWatchLoggingOptionId by using the DescribeApplication operation.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - CloudWatchLoggingOptionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationCloudWatchLoggingOptionResponse"
  /DeleteApplicationInputProcessingConfiguration:
    post:
      operationId: DeleteApplicationInputProcessingConfiguration
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Deletes an InputProcessingConfiguration from an input.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DeleteApplicationInputProcessingConfiguration
            default: KinesisAnalytics_20150814.DeleteApplicationInputProcessingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: The Kinesis Analytics application name.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: The version ID of the Kinesis Analytics application.
                InputId:
                  $ref: "#/components/schemas/Id"
                  description: The ID of the input configuration from which to delete the input processing configuration. You can get a list of the input IDs for an application by using the DescribeApplication operation.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - InputId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationInputProcessingConfigurationResponse"
  /DeleteApplicationOutput:
    post:
      operationId: DeleteApplicationOutput
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Deletes output destination configuration from your application configuration. Amazon Kinesis Analytics will no longer write data from the corresponding in-application stream to the external output destination. This operation requires permissions to perform the kinesisanalytics:DeleteApplicationOutput action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DeleteApplicationOutput
            default: KinesisAnalytics_20150814.DeleteApplicationOutput
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Amazon Kinesis Analytics application name.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: Amazon Kinesis Analytics application version. You can use the DescribeApplication operation to get the current application version. If the version specified is not the current version, the ConcurrentModificationException is returned.
                OutputId:
                  $ref: "#/components/schemas/Id"
                  description: The ID of the configuration to delete. Each output configuration that is added to the application, either when the application is created or later using the AddApplicationOutput operation, has a unique ID. You need to provide the ID to uniquely identify the output configuration that you want to delete from the application configuration. You can use the DescribeApplication operation to get the specific OutputId.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - OutputId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationOutputResponse"
  /DeleteApplicationReferenceDataSource:
    post:
      operationId: DeleteApplicationReferenceDataSource
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Deletes a reference data source configuration from the specified application configuration. If the application is running, Amazon Kinesis Analytics immediately removes the in-application table that you created using the AddApplicationReferenceDataSource operation. This operation requires permissions to perform the kinesisanalytics.DeleteApplicationReferenceDataSource action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DeleteApplicationReferenceDataSource
            default: KinesisAnalytics_20150814.DeleteApplicationReferenceDataSource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of an existing application.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: Version of the application. You can use the DescribeApplication operation to get the current application version. If the version specified is not the current version, the ConcurrentModificationException is returned.
                ReferenceId:
                  $ref: "#/components/schemas/Id"
                  description: ID of the reference data source. When you add a reference data source to your application using the AddApplicationReferenceDataSource, Amazon Kinesis Analytics assigns an ID. You can use the DescribeApplication operation to get the reference ID.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - ReferenceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationReferenceDataSourceResponse"
  /DescribeApplication:
    post:
      operationId: DescribeApplication
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Returns information about a specific Amazon Kinesis Analytics application. If you want to retrieve a list of all applications in your account, use the ListApplications operation. This operation requires permissions to perform the kinesisanalytics:DescribeApplication action. You can use DescribeApplication to get the current application versionId, which you need to call other operations such as Update.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DescribeApplication
            default: KinesisAnalytics_20150814.DescribeApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the application.
              required:
                - ApplicationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeApplicationResponse"
  /DiscoverInputSchema:
    post:
      operationId: DiscoverInputSchema
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Infers a schema by evaluating sample records on the specified streaming source (Amazon Kinesis stream or Amazon Kinesis Firehose delivery stream) or S3 object. In the response, the operation returns the inferred schema and also the sample records that the operation used to infer the schema. You can use the inferred schema when configuring a streaming source for your application. For conceptual information, see Configuring Application Input. Note that when you create an application using the Amazon Kinesis Analytics console, the console uses this operation to infer a schema and show it in the console user interface. This operation requires permissions to perform the kinesisanalytics:DiscoverInputSchema action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.DiscoverInputSchema
            default: KinesisAnalytics_20150814.DiscoverInputSchema
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
                  description: Amazon Resource Name (ARN) of the streaming source.
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf.
                InputStartingPositionConfiguration:
                  $ref: "#/components/schemas/InputStartingPositionConfiguration"
                  description: Point at which you want Amazon Kinesis Analytics to start reading records from the specified streaming source discovery purposes.
                S3Configuration:
                  $ref: "#/components/schemas/S3Configuration"
                  description: Specify this parameter to discover a schema from data in an Amazon S3 object.
                InputProcessingConfiguration:
                  $ref: "#/components/schemas/InputProcessingConfiguration"
                  description: The InputProcessingConfiguration to use to preprocess the records before discovering the schema of the records.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverInputSchemaResponse"
  /ListApplications:
    post:
      operationId: ListApplications
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Returns a list of Amazon Kinesis Analytics applications in your account. For each application, the response includes the application name, Amazon Resource Name (ARN), and status. If the response returns the HasMoreApplications value as true, you can send another request by adding the ExclusiveStartApplicationName in the request body, and set the value of this to the last application name from the previous response. If you want detailed information about a specific application, use DescribeApplication. This operation requires permissions to perform the kinesisanalytics:ListApplications action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.ListApplications
            default: KinesisAnalytics_20150814.ListApplications
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Limit:
                  $ref: "#/components/schemas/ListApplicationsInputLimit"
                  description: Maximum number of applications to list.
                ExclusiveStartApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the application to start the list with. When using pagination to retrieve the list, you don't need to specify this parameter in the first request. However, in subsequent requests, you add the last application name from the previous response to get the next page of applications.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Retrieves the list of key-value tags assigned to the application. For more information, see Using Tagging.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.ListTagsForResource
            default: KinesisAnalytics_20150814.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/KinesisAnalyticsARN"
                  description: The ARN of the application for which to retrieve tags.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /StartApplication:
    post:
      operationId: StartApplication
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Starts the specified Amazon Kinesis Analytics application. After creating an application, you must exclusively call this operation to start your application. After the application starts, it begins consuming the input data, processes it, and writes the output to the configured destination. The application status must be READY for you to start an application. You can get the application status in the console or using the DescribeApplication operation. After you start the application, you can stop the application from processing the input by calling the StopApplication operation. This operation requires permissions to perform the kinesisanalytics:StartApplication action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.StartApplication
            default: KinesisAnalytics_20150814.StartApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the application.
                InputConfigurations:
                  $ref: "#/components/schemas/InputConfigurations"
                  description: Identifies the specific input, by ID, that the application starts consuming. Amazon Kinesis Analytics starts reading the streaming source associated with the input. You can also specify where in the streaming source you want Amazon Kinesis Analytics to start reading.
              required:
                - ApplicationName
                - InputConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartApplicationResponse"
  /StopApplication:
    post:
      operationId: StopApplication
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Stops the application from processing input data. You can stop an application only if it is in the running state. You can use the DescribeApplication operation to find the application state. After the application is stopped, Amazon Kinesis Analytics stops reading data from the input, the application stops processing data, and there is no output written to the destination. This operation requires permissions to perform the kinesisanalytics:StopApplication action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.StopApplication
            default: KinesisAnalytics_20150814.StopApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the running application to stop.
              required:
                - ApplicationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopApplicationResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds one or more key-value tags to a Kinesis Analytics application. Note that the maximum number of application tags includes system tags. The maximum number of user-defined application tags is 50. For more information, see Using Tagging.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.TagResource
            default: KinesisAnalytics_20150814.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/KinesisAnalyticsARN"
                  description: The ARN of the application to assign the tags.
                Tags:
                  $ref: "#/components/schemas/Tags"
                  description: The key-value tags to assign to the application.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from a Kinesis Analytics application. For more information, see Using Tagging.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.UntagResource
            default: KinesisAnalytics_20150814.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/KinesisAnalyticsARN"
                  description: The ARN of the Kinesis Analytics application from which to remove the tags.
                TagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: A list of keys of tags to remove from the specified application.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateApplication:
    post:
      operationId: UpdateApplication
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Updates an existing Amazon Kinesis Analytics application. Using this API, you can update application code, input configuration, and output configuration. Note that Amazon Kinesis Analytics updates the CurrentApplicationVersionId each time you update your application. This operation requires permission for the kinesisanalytics:UpdateApplication action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KinesisAnalytics_20150814.UpdateApplication
            default: KinesisAnalytics_20150814.UpdateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationName:
                  $ref: "#/components/schemas/ApplicationName"
                  description: Name of the Amazon Kinesis Analytics application to update.
                CurrentApplicationVersionId:
                  $ref: "#/components/schemas/ApplicationVersionId"
                  description: The current application version ID. You can use the DescribeApplication operation to get this value.
                ApplicationUpdate:
                  $ref: "#/components/schemas/ApplicationUpdate"
                  description: Describes application updates.
              required:
                - ApplicationName
                - CurrentApplicationVersionId
                - ApplicationUpdate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApplicationName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.-]+"
    ApplicationVersionId:
      type: integer
      format: int64
      minimum: 1
      maximum: 999999999
    CloudWatchLoggingOption:
      description: Provides a description of CloudWatch logging options, including the log stream Amazon Resource Name (ARN) and the role ARN.
      type: object
      properties:
        LogStreamARN:
          $ref: "#/components/schemas/LogStreamARN"
          description: ARN of the CloudWatch log to receive application messages.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: "IAM ARN of the role to use to send application messages. Note: To write application messages to CloudWatch, the IAM role that is used must have the PutLogEvents policy action enabled."
      required:
        - LogStreamARN
        - RoleARN
    LogStreamARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*
    RoleARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    AddApplicationCloudWatchLoggingOptionResponse:
      type: object
    Input:
      description: When you configure the application input, you specify the streaming source, the in-application stream name that is created, and the mapping between the two. For more information, see Configuring Application Input.
      type: object
      properties:
        NamePrefix:
          $ref: "#/components/schemas/InAppStreamName"
          description: Name prefix to use when creating an in-application stream. Suppose that you specify a prefix "MyInApplicationStream." Amazon Kinesis Analytics then creates one or more (as per the InputParallelism count you specified) in-application streams with names "MyInApplicationStream_001," "MyInApplicationStream_002," and so on.
        InputProcessingConfiguration:
          $ref: "#/components/schemas/InputProcessingConfiguration"
          description: The InputProcessingConfiguration for the input. An input processor transforms records as they are received from the stream, before the application's SQL code executes. Currently, the only input processing configuration available is InputLambdaProcessor.
        KinesisStreamsInput:
          $ref: "#/components/schemas/KinesisStreamsInput"
          description: "If the streaming source is an Amazon Kinesis stream, identifies the stream's Amazon Resource Name (ARN) and an IAM role that enables Amazon Kinesis Analytics to access the stream on your behalf. Note: Either KinesisStreamsInput or KinesisFirehoseInput is required."
        KinesisFirehoseInput:
          $ref: "#/components/schemas/KinesisFirehoseInput"
          description: "If the streaming source is an Amazon Kinesis Firehose delivery stream, identifies the delivery stream's ARN and an IAM role that enables Amazon Kinesis Analytics to access the stream on your behalf. Note: Either KinesisStreamsInput or KinesisFirehoseInput is required."
        InputParallelism:
          $ref: "#/components/schemas/InputParallelism"
          description: Describes the number of in-application streams to create. Data from your source is routed to these in-application input streams. (see Configuring Application Input.
        InputSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns in the in-application stream that is being created. Also used to describe the format of the reference data source.
      required:
        - NamePrefix
        - InputSchema
    InAppStreamName:
      type: string
      minLength: 1
      maxLength: 32
    InputProcessingConfiguration:
      description: Provides a description of a processor that is used to preprocess the records in the stream before being processed by your application code. Currently, the only input processor available is AWS Lambda.
      type: object
      properties:
        InputLambdaProcessor:
          $ref: "#/components/schemas/InputLambdaProcessor"
          description: The InputLambdaProcessor that is used to preprocess the records in the stream before being processed by your application code.
      required:
        - InputLambdaProcessor
    InputLambdaProcessor:
      description: An object that contains the Amazon Resource Name (ARN) of the AWS Lambda function that is used to preprocess records in the stream, and the ARN of the IAM role that is used to access the AWS Lambda function.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: "The ARN of the AWS Lambda function that operates on records in the stream. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: AWS Lambda"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that is used to access the AWS Lambda function.
      required:
        - ResourceARN
        - RoleARN
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*
    KinesisStreamsInput:
      description: Identifies an Amazon Kinesis stream as the streaming source. You provide the stream's Amazon Resource Name (ARN) and an IAM role ARN that enables Amazon Kinesis Analytics to access the stream on your behalf.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: ARN of the input Amazon Kinesis stream to read.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf. You need to grant the necessary permissions to this role.
      required:
        - ResourceARN
        - RoleARN
    KinesisFirehoseInput:
      description: Identifies an Amazon Kinesis Firehose delivery stream as the streaming source. You provide the delivery stream's Amazon Resource Name (ARN) and an IAM role ARN that enables Amazon Kinesis Analytics to access the stream on your behalf.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: ARN of the input delivery stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf. You need to make sure that the role has the necessary permissions to access the stream.
      required:
        - ResourceARN
        - RoleARN
    InputParallelism:
      description: Describes the number of in-application streams to create for a given streaming source. For information about parallelism, see Configuring Application Input.
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/InputParallelismCount"
          description: Number of in-application streams to create. For more information, see Limits.
    InputParallelismCount:
      type: integer
      minimum: 1
      maximum: 64
    SourceSchema:
      description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      type: object
      properties:
        RecordFormat:
          $ref: "#/components/schemas/RecordFormat"
          description: Specifies the format of the records on the streaming source.
        RecordEncoding:
          $ref: "#/components/schemas/RecordEncoding"
          description: Specifies the encoding of the records in the streaming source. For example, UTF-8.
        RecordColumns:
          $ref: "#/components/schemas/RecordColumns"
          description: A list of RecordColumn objects.
      required:
        - RecordFormat
        - RecordColumns
    RecordFormat:
      description: Describes the record format and relevant mapping information that should be applied to schematize the records on the stream.
      type: object
      properties:
        RecordFormatType:
          $ref: "#/components/schemas/RecordFormatType"
          description: The type of record format.
        MappingParameters:
          $ref: "#/components/schemas/MappingParameters"
          description: When configuring application input at the time of creating or updating an application, provides additional mapping information specific to the record format (such as JSON, CSV, or record fields delimited by some delimiter) on the streaming source.
      required:
        - RecordFormatType
    RecordFormatType:
      type: string
      enum:
        - JSON
        - CSV
    MappingParameters:
      description: When configuring application input at the time of creating or updating an application, provides additional mapping information specific to the record format (such as JSON, CSV, or record fields delimited by some delimiter) on the streaming source.
      type: object
      properties:
        JSONMappingParameters:
          $ref: "#/components/schemas/JSONMappingParameters"
          description: Provides additional mapping information when JSON is the record format on the streaming source.
        CSVMappingParameters:
          $ref: "#/components/schemas/CSVMappingParameters"
          description: Provides additional mapping information when the record format uses delimiters (for example, CSV).
    JSONMappingParameters:
      description: Provides additional mapping information when JSON is the record format on the streaming source.
      type: object
      properties:
        RecordRowPath:
          $ref: "#/components/schemas/RecordRowPath"
          description: Path to the top-level parent that contains the records.
      required:
        - RecordRowPath
    RecordRowPath:
      type: string
      minLength: 1
    CSVMappingParameters:
      description: "Provides additional mapping information when the record format uses delimiters, such as CSV. For example, the following sample records use CSV format, where the records use the '\\n' as the row delimiter and a comma (\",\") as the column delimiter: \"name1\", \"address1\" \"name2\", \"address2\""
      type: object
      properties:
        RecordRowDelimiter:
          $ref: "#/components/schemas/RecordRowDelimiter"
          description: Row delimiter. For example, in a CSV format, '\n' is the typical row delimiter.
        RecordColumnDelimiter:
          $ref: "#/components/schemas/RecordColumnDelimiter"
          description: Column delimiter. For example, in a CSV format, a comma (",") is the typical column delimiter.
      required:
        - RecordRowDelimiter
        - RecordColumnDelimiter
    RecordRowDelimiter:
      type: string
      minLength: 1
    RecordColumnDelimiter:
      type: string
      minLength: 1
    RecordEncoding:
      type: string
      pattern: UTF-8
    RecordColumns:
      type: array
      items:
        $ref: "#/components/schemas/RecordColumn"
    RecordColumn:
      description: Describes the mapping of each data element in the streaming source to the corresponding column in the in-application stream. Also used to describe the format of the reference data source.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RecordColumnName"
          description: Name of the column created in the in-application input stream or reference table.
        Mapping:
          $ref: "#/components/schemas/RecordColumnMapping"
          description: Reference to the data element in the streaming input or the reference data source. This element is required if the RecordFormatType is JSON.
        SqlType:
          $ref: "#/components/schemas/RecordColumnSqlType"
          description: Type of column created in the in-application input stream or reference table.
      required:
        - Name
        - SqlType
    RecordColumnName:
      type: string
    RecordColumnMapping:
      type: string
    RecordColumnSqlType:
      type: string
      minLength: 1
    AddApplicationInputResponse:
      type: object
    Id:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[a-zA-Z0-9_.-]+"
    AddApplicationInputProcessingConfigurationResponse:
      type: object
    Output:
      description: Describes application output configuration in which you identify an in-application stream and a destination where you want the in-application stream data to be written. The destination can be an Amazon Kinesis stream or an Amazon Kinesis Firehose delivery stream. For limits on how many destinations an application can write and other limitations, see Limits.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/InAppStreamName"
          description: Name of the in-application stream.
        KinesisStreamsOutput:
          $ref: "#/components/schemas/KinesisStreamsOutput"
          description: Identifies an Amazon Kinesis stream as the destination.
        KinesisFirehoseOutput:
          $ref: "#/components/schemas/KinesisFirehoseOutput"
          description: Identifies an Amazon Kinesis Firehose delivery stream as the destination.
        LambdaOutput:
          $ref: "#/components/schemas/LambdaOutput"
          description: Identifies an AWS Lambda function as the destination.
        DestinationSchema:
          $ref: "#/components/schemas/DestinationSchema"
          description: Describes the data format when records are written to the destination. For more information, see Configuring Application Output.
      required:
        - Name
        - DestinationSchema
    KinesisStreamsOutput:
      description: When configuring application output, identifies an Amazon Kinesis stream as the destination. You provide the stream Amazon Resource Name (ARN) and also an IAM role ARN that Amazon Kinesis Analytics can use to write to the stream on your behalf.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: ARN of the destination Amazon Kinesis stream to write to.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to write to the destination stream on your behalf. You need to grant the necessary permissions to this role.
      required:
        - ResourceARN
        - RoleARN
    KinesisFirehoseOutput:
      description: When configuring application output, identifies an Amazon Kinesis Firehose delivery stream as the destination. You provide the stream Amazon Resource Name (ARN) and an IAM role that enables Amazon Kinesis Analytics to write to the stream on your behalf.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: ARN of the destination Amazon Kinesis Firehose delivery stream to write to.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to write to the destination stream on your behalf. You need to grant the necessary permissions to this role.
      required:
        - ResourceARN
        - RoleARN
    LambdaOutput:
      description: When configuring application output, identifies an AWS Lambda function as the destination. You provide the function Amazon Resource Name (ARN) and also an IAM role ARN that Amazon Kinesis Analytics can use to write to the function on your behalf.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: "Amazon Resource Name (ARN) of the destination Lambda function to write to. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: AWS Lambda"
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to write to the destination function on your behalf. You need to grant the necessary permissions to this role.
      required:
        - ResourceARN
        - RoleARN
    DestinationSchema:
      description: Describes the data format when records are written to the destination. For more information, see Configuring Application Output.
      type: object
      properties:
        RecordFormatType:
          $ref: "#/components/schemas/RecordFormatType"
          description: Specifies the format of the records on the output stream.
      required:
        - RecordFormatType
    AddApplicationOutputResponse:
      type: object
    ReferenceDataSource:
      description: Describes the reference data source by providing the source information (S3 bucket name and object key name), the resulting in-application table name that is created, and the necessary schema to map the data elements in the Amazon S3 object to the in-application table.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/InAppTableName"
          description: Name of the in-application table to create.
        S3ReferenceDataSource:
          $ref: "#/components/schemas/S3ReferenceDataSource"
          description: Identifies the S3 bucket and object that contains the reference data. Also identifies the IAM role Amazon Kinesis Analytics can assume to read this object on your behalf. An Amazon Kinesis Analytics application loads reference data only once. If the data changes, you call the UpdateApplication operation to trigger reloading of data into your application.
        ReferenceSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      required:
        - TableName
        - ReferenceSchema
    InAppTableName:
      type: string
      minLength: 1
      maxLength: 32
    S3ReferenceDataSource:
      description: Identifies the S3 bucket and object that contains the reference data. Also identifies the IAM role Amazon Kinesis Analytics can assume to read this object on your behalf. An Amazon Kinesis Analytics application loads reference data only once. If the data changes, you call the UpdateApplication operation to trigger reloading of data into your application.
      type: object
      properties:
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: Amazon Resource Name (ARN) of the S3 bucket.
        FileKey:
          $ref: "#/components/schemas/FileKey"
          description: Object key name containing reference data.
        ReferenceRoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that the service can assume to read data on your behalf. This role must have permission for the s3:GetObject action on the object and trust policy that allows Amazon Kinesis Analytics service principal to assume this role.
      required:
        - BucketARN
        - FileKey
        - ReferenceRoleARN
    BucketARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:.*
    FileKey:
      type: string
      minLength: 1
      maxLength: 1024
    AddApplicationReferenceDataSourceResponse:
      type: object
    ApplicationDescription:
      type: string
      minLength: 0
      maxLength: 1024
    Inputs:
      type: array
      items:
        $ref: "#/components/schemas/Input"
    Outputs:
      type: array
      items:
        $ref: "#/components/schemas/Output"
    CloudWatchLoggingOptions:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchLoggingOption"
    ApplicationCode:
      type: string
      minLength: 0
      maxLength: 102400
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair (the value is optional) that you can define and assign to AWS resources. If you specify a tag that already exists, the tag value is replaced with the value that you specify in the request. Note that the maximum number of application tags includes system tags. The maximum number of user-defined application tags is 50. For more information, see Using Tagging.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the key-value tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the key-value tag. The value is optional.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateApplicationResponse:
      description: TBD
      type: object
      properties:
        ApplicationSummary:
          $ref: "#/components/schemas/ApplicationSummary"
          description: In response to your CreateApplication request, Amazon Kinesis Analytics returns a response with a summary of the application it created, including the application Amazon Resource Name (ARN), name, and status.
      required:
        - ApplicationSummary
    ApplicationSummary:
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Provides application summary information, including the application Amazon Resource Name (ARN), name, and status.
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: Name of the application.
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: ARN of the application.
        ApplicationStatus:
          $ref: "#/components/schemas/ApplicationStatus"
          description: Status of the application.
      required:
        - ApplicationName
        - ApplicationARN
        - ApplicationStatus
    ApplicationStatus:
      type: string
      enum:
        - DELETING
        - STARTING
        - STOPPING
        - READY
        - RUNNING
        - UPDATING
    Timestamp:
      type: string
      format: date-time
    DeleteApplicationResponse:
      type: object
    DeleteApplicationCloudWatchLoggingOptionResponse:
      type: object
    DeleteApplicationInputProcessingConfigurationResponse:
      type: object
    DeleteApplicationOutputResponse:
      type: object
    DeleteApplicationReferenceDataSourceResponse:
      type: object
    DescribeApplicationResponse:
      type: object
      properties:
        ApplicationDetail:
          $ref: "#/components/schemas/ApplicationDetail"
          description: Provides a description of the application, such as the application Amazon Resource Name (ARN), status, latest version, and input and output configuration details.
      required:
        - ApplicationDetail
    ApplicationDetail:
      description: This documentation is for version 1 of the Amazon Kinesis Data Analytics API, which only supports SQL applications. Version 2 of the API supports SQL and Java applications. For more information about version 2, see Amazon Kinesis Data Analytics API V2 Documentation. Provides a description of the application, including the application Amazon Resource Name (ARN), status, latest version, and input and output configuration.
      type: object
      properties:
        ApplicationName:
          $ref: "#/components/schemas/ApplicationName"
          description: Name of the application.
        ApplicationDescription:
          $ref: "#/components/schemas/ApplicationDescription"
          description: Description of the application.
        ApplicationARN:
          $ref: "#/components/schemas/ResourceARN"
          description: ARN of the application.
        ApplicationStatus:
          $ref: "#/components/schemas/ApplicationStatus"
          description: Status of the application.
        CreateTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp when the application version was created.
        LastUpdateTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Time stamp when the application was last updated.
        InputDescriptions:
          $ref: "#/components/schemas/InputDescriptions"
          description: Describes the application input configuration. For more information, see Configuring Application Input.
        OutputDescriptions:
          $ref: "#/components/schemas/OutputDescriptions"
          description: Describes the application output configuration. For more information, see Configuring Application Output.
        ReferenceDataSourceDescriptions:
          $ref: "#/components/schemas/ReferenceDataSourceDescriptions"
          description: Describes reference data sources configured for the application. For more information, see Configuring Application Input.
        CloudWatchLoggingOptionDescriptions:
          $ref: "#/components/schemas/CloudWatchLoggingOptionDescriptions"
          description: Describes the CloudWatch log streams that are configured to receive application messages. For more information about using CloudWatch log streams with Amazon Kinesis Analytics applications, see Working with Amazon CloudWatch Logs.
        ApplicationCode:
          $ref: "#/components/schemas/ApplicationCode"
          description: Returns the application code that you provided to perform data analysis on any of the in-application streams in your application.
        ApplicationVersionId:
          $ref: "#/components/schemas/ApplicationVersionId"
          description: Provides the current application version.
      required:
        - ApplicationName
        - ApplicationARN
        - ApplicationStatus
        - ApplicationVersionId
    InputDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/InputDescription"
    InputDescription:
      description: Describes the application input configuration. For more information, see Configuring Application Input.
      type: object
      properties:
        InputId:
          $ref: "#/components/schemas/Id"
          description: Input ID associated with the application input. This is the ID that Amazon Kinesis Analytics assigns to each input configuration you add to your application.
        NamePrefix:
          $ref: "#/components/schemas/InAppStreamName"
          description: In-application name prefix.
        InAppStreamNames:
          $ref: "#/components/schemas/InAppStreamNames"
          description: Returns the in-application stream names that are mapped to the stream source.
        InputProcessingConfigurationDescription:
          $ref: "#/components/schemas/InputProcessingConfigurationDescription"
          description: The description of the preprocessor that executes on records in this input before the application's code is run.
        KinesisStreamsInputDescription:
          $ref: "#/components/schemas/KinesisStreamsInputDescription"
          description: If an Amazon Kinesis stream is configured as streaming source, provides Amazon Kinesis stream's Amazon Resource Name (ARN) and an IAM role that enables Amazon Kinesis Analytics to access the stream on your behalf.
        KinesisFirehoseInputDescription:
          $ref: "#/components/schemas/KinesisFirehoseInputDescription"
          description: If an Amazon Kinesis Firehose delivery stream is configured as a streaming source, provides the delivery stream's ARN and an IAM role that enables Amazon Kinesis Analytics to access the stream on your behalf.
        InputSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns in the in-application stream that is being created.
        InputParallelism:
          $ref: "#/components/schemas/InputParallelism"
          description: Describes the configured parallelism (number of in-application streams mapped to the streaming source).
        InputStartingPositionConfiguration:
          $ref: "#/components/schemas/InputStartingPositionConfiguration"
          description: Point at which the application is configured to read from the input stream.
    InAppStreamNames:
      type: array
      items:
        $ref: "#/components/schemas/InAppStreamName"
    InputProcessingConfigurationDescription:
      description: Provides configuration information about an input processor. Currently, the only input processor available is AWS Lambda.
      type: object
      properties:
        InputLambdaProcessorDescription:
          $ref: "#/components/schemas/InputLambdaProcessorDescription"
          description: Provides configuration information about the associated InputLambdaProcessorDescription.
    InputLambdaProcessorDescription:
      description: An object that contains the Amazon Resource Name (ARN) of the AWS Lambda function that is used to preprocess records in the stream, and the ARN of the IAM role that is used to access the AWS Lambda expression.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The ARN of the AWS Lambda function that is used to preprocess the records in the stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the IAM role that is used to access the AWS Lambda function.
    KinesisStreamsInputDescription:
      description: Describes the Amazon Kinesis stream that is configured as the streaming source in the application input configuration.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the Amazon Kinesis stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream.
    KinesisFirehoseInputDescription:
      description: Describes the Amazon Kinesis Firehose delivery stream that is configured as the streaming source in the application input configuration.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the Amazon Kinesis Firehose delivery stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics assumes to access the stream.
    InputStartingPositionConfiguration:
      description: Describes the point at which the application reads from the streaming source.
      type: object
      properties:
        InputStartingPosition:
          $ref: "#/components/schemas/InputStartingPosition"
          description: The starting position on the stream. NOW - Start reading just after the most recent record in the stream, start at the request time stamp that the customer issued. TRIM_HORIZON - Start reading at the last untrimmed record in the stream, which is the oldest record available in the stream. This option is not available for an Amazon Kinesis Firehose delivery stream. LAST_STOPPED_POINT - Resume reading from where the application last stopped reading.
    InputStartingPosition:
      type: string
      enum:
        - NOW
        - TRIM_HORIZON
        - LAST_STOPPED_POINT
    OutputDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/OutputDescription"
    OutputDescription:
      description: Describes the application output configuration, which includes the in-application stream name and the destination where the stream data is written. The destination can be an Amazon Kinesis stream or an Amazon Kinesis Firehose delivery stream.
      type: object
      properties:
        OutputId:
          $ref: "#/components/schemas/Id"
          description: A unique identifier for the output configuration.
        Name:
          $ref: "#/components/schemas/InAppStreamName"
          description: Name of the in-application stream configured as output.
        KinesisStreamsOutputDescription:
          $ref: "#/components/schemas/KinesisStreamsOutputDescription"
          description: Describes Amazon Kinesis stream configured as the destination where output is written.
        KinesisFirehoseOutputDescription:
          $ref: "#/components/schemas/KinesisFirehoseOutputDescription"
          description: Describes the Amazon Kinesis Firehose delivery stream configured as the destination where output is written.
        LambdaOutputDescription:
          $ref: "#/components/schemas/LambdaOutputDescription"
          description: Describes the AWS Lambda function configured as the destination where output is written.
        DestinationSchema:
          $ref: "#/components/schemas/DestinationSchema"
          description: Data format used for writing data to the destination.
    KinesisStreamsOutputDescription:
      description: For an application output, describes the Amazon Kinesis stream configured as its destination.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the Amazon Kinesis stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream.
    KinesisFirehoseOutputDescription:
      description: For an application output, describes the Amazon Kinesis Firehose delivery stream configured as its destination.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the Amazon Kinesis Firehose delivery stream.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream.
    LambdaOutputDescription:
      description: For an application output, describes the AWS Lambda function configured as its destination.
      type: object
      properties:
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the destination Lambda function.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to write to the destination function.
    ReferenceDataSourceDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/ReferenceDataSourceDescription"
    ReferenceDataSourceDescription:
      description: Describes the reference data source configured for an application.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/Id"
          description: ID of the reference data source. This is the ID that Amazon Kinesis Analytics assigns when you add the reference data source to your application using the AddApplicationReferenceDataSource operation.
        TableName:
          $ref: "#/components/schemas/InAppTableName"
          description: The in-application table name created by the specific reference data source configuration.
        S3ReferenceDataSourceDescription:
          $ref: "#/components/schemas/S3ReferenceDataSourceDescription"
          description: Provides the S3 bucket name, the object key name that contains the reference data. It also provides the Amazon Resource Name (ARN) of the IAM role that Amazon Kinesis Analytics can assume to read the Amazon S3 object and populate the in-application reference table.
        ReferenceSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      required:
        - ReferenceId
        - TableName
        - S3ReferenceDataSourceDescription
    S3ReferenceDataSourceDescription:
      description: Provides the bucket name and object key name that stores the reference data.
      type: object
      properties:
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: Amazon Resource Name (ARN) of the S3 bucket.
        FileKey:
          $ref: "#/components/schemas/FileKey"
          description: Amazon S3 object key name.
        ReferenceRoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to read the Amazon S3 object on your behalf to populate the in-application reference table.
      required:
        - BucketARN
        - FileKey
        - ReferenceRoleARN
    CloudWatchLoggingOptionDescriptions:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchLoggingOptionDescription"
    CloudWatchLoggingOptionDescription:
      description: Description of the CloudWatch logging option.
      type: object
      properties:
        CloudWatchLoggingOptionId:
          $ref: "#/components/schemas/Id"
          description: ID of the CloudWatch logging option description.
        LogStreamARN:
          $ref: "#/components/schemas/LogStreamARN"
          description: ARN of the CloudWatch log to receive application messages.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: "IAM ARN of the role to use to send application messages. Note: To write application messages to CloudWatch, the IAM role used must have the PutLogEvents policy action enabled."
      required:
        - LogStreamARN
        - RoleARN
    S3Configuration:
      description: Provides a description of an Amazon S3 data source, including the Amazon Resource Name (ARN) of the S3 bucket, the ARN of the IAM role that is used to access the bucket, and the name of the Amazon S3 object that contains the data.
      type: object
      properties:
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: IAM ARN of the role used to access the data.
        BucketARN:
          $ref: "#/components/schemas/BucketARN"
          description: ARN of the S3 bucket that contains the data.
        FileKey:
          $ref: "#/components/schemas/FileKey"
          description: The name of the object that contains the data.
      required:
        - RoleARN
        - BucketARN
        - FileKey
    DiscoverInputSchemaResponse:
      type: object
      properties:
        InputSchema:
          $ref: "#/components/schemas/SourceSchema"
          description: Schema inferred from the streaming source. It identifies the format of the data in the streaming source and how each data element maps to corresponding columns in the in-application stream that you can create.
        ParsedInputRecords:
          $ref: "#/components/schemas/ParsedInputRecords"
          description: An array of elements, where each element corresponds to a row in a stream record (a stream record can have more than one row).
        ProcessedInputRecords:
          $ref: "#/components/schemas/ProcessedInputRecords"
          description: Stream data that was modified by the processor specified in the InputProcessingConfiguration parameter.
        RawInputRecords:
          $ref: "#/components/schemas/RawInputRecords"
          description: Raw stream data that was sampled to infer the schema.
    ParsedInputRecords:
      type: array
      items:
        $ref: "#/components/schemas/ParsedInputRecord"
    ParsedInputRecord:
      type: array
      items:
        $ref: "#/components/schemas/ParsedInputRecordField"
    ParsedInputRecordField:
      type: string
    ProcessedInputRecords:
      type: array
      items:
        $ref: "#/components/schemas/ProcessedInputRecord"
    ProcessedInputRecord:
      type: string
    RawInputRecords:
      type: array
      items:
        $ref: "#/components/schemas/RawInputRecord"
    RawInputRecord:
      type: string
    ListApplicationsInputLimit:
      type: integer
      minimum: 1
      maximum: 50
    ListApplicationsResponse:
      type: object
      properties:
        ApplicationSummaries:
          $ref: "#/components/schemas/ApplicationSummaries"
          description: List of ApplicationSummary objects.
        HasMoreApplications:
          $ref: "#/components/schemas/BooleanObject"
          description: Returns true if there are more applications to retrieve.
      required:
        - ApplicationSummaries
        - HasMoreApplications
    ApplicationSummaries:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationSummary"
    BooleanObject:
      type: boolean
    KinesisAnalyticsARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws:kinesisanalytics:[a-z]{2}-[a-z]+-\d{1}+:\d{12}+:application/[a-zA-Z0-9_.-]{1,128}
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/Tags"
          description: The key-value tags assigned to the application.
    InputConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/InputConfiguration"
    InputConfiguration:
      description: When you start your application, you provide this configuration, which identifies the input source and the point in the input source at which you want the application to start processing records.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Id"
          description: Input source ID. You can get this ID by calling the DescribeApplication operation.
        InputStartingPositionConfiguration:
          $ref: "#/components/schemas/InputStartingPositionConfiguration"
          description: Point at which you want the application to start processing records from the streaming source.
      required:
        - Id
        - InputStartingPositionConfiguration
    StartApplicationResponse:
      type: object
    StopApplicationResponse:
      type: object
    TagResourceResponse:
      type: object
    TagKeys:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    ApplicationUpdate:
      description: Describes updates to apply to an existing Amazon Kinesis Analytics application.
      type: object
      properties:
        InputUpdates:
          $ref: "#/components/schemas/InputUpdates"
          description: Describes application input configuration updates.
        ApplicationCodeUpdate:
          $ref: "#/components/schemas/ApplicationCode"
          description: Describes application code updates.
        OutputUpdates:
          $ref: "#/components/schemas/OutputUpdates"
          description: Describes application output configuration updates.
        ReferenceDataSourceUpdates:
          $ref: "#/components/schemas/ReferenceDataSourceUpdates"
          description: Describes application reference data source updates.
        CloudWatchLoggingOptionUpdates:
          $ref: "#/components/schemas/CloudWatchLoggingOptionUpdates"
          description: Describes application CloudWatch logging option updates.
    InputUpdates:
      type: array
      items:
        $ref: "#/components/schemas/InputUpdate"
    InputUpdate:
      description: Describes updates to a specific input configuration (identified by the InputId of an application).
      type: object
      properties:
        InputId:
          $ref: "#/components/schemas/Id"
          description: Input ID of the application input to be updated.
        NamePrefixUpdate:
          $ref: "#/components/schemas/InAppStreamName"
          description: Name prefix for in-application streams that Amazon Kinesis Analytics creates for the specific streaming source.
        InputProcessingConfigurationUpdate:
          $ref: "#/components/schemas/InputProcessingConfigurationUpdate"
          description: Describes updates for an input processing configuration.
        KinesisStreamsInputUpdate:
          $ref: "#/components/schemas/KinesisStreamsInputUpdate"
          description: If an Amazon Kinesis stream is the streaming source to be updated, provides an updated stream Amazon Resource Name (ARN) and IAM role ARN.
        KinesisFirehoseInputUpdate:
          $ref: "#/components/schemas/KinesisFirehoseInputUpdate"
          description: If an Amazon Kinesis Firehose delivery stream is the streaming source to be updated, provides an updated stream ARN and IAM role ARN.
        InputSchemaUpdate:
          $ref: "#/components/schemas/InputSchemaUpdate"
          description: Describes the data format on the streaming source, and how record elements on the streaming source map to columns of the in-application stream that is created.
        InputParallelismUpdate:
          $ref: "#/components/schemas/InputParallelismUpdate"
          description: Describes the parallelism updates (the number in-application streams Amazon Kinesis Analytics creates for the specific streaming source).
      required:
        - InputId
    InputProcessingConfigurationUpdate:
      description: Describes updates to an InputProcessingConfiguration.
      type: object
      properties:
        InputLambdaProcessorUpdate:
          $ref: "#/components/schemas/InputLambdaProcessorUpdate"
          description: Provides update information for an InputLambdaProcessor.
      required:
        - InputLambdaProcessorUpdate
    InputLambdaProcessorUpdate:
      description: Represents an update to the InputLambdaProcessor that is used to preprocess the records in the stream.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: "The Amazon Resource Name (ARN) of the new AWS Lambda function that is used to preprocess the records in the stream. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: AWS Lambda"
        RoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: The ARN of the new IAM role that is used to access the AWS Lambda function.
    KinesisStreamsInputUpdate:
      description: When updating application input configuration, provides information about an Amazon Kinesis stream as the streaming source.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the input Amazon Kinesis stream to read.
        RoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf. You need to grant the necessary permissions to this role.
    KinesisFirehoseInputUpdate:
      description: When updating application input configuration, provides information about an Amazon Kinesis Firehose delivery stream as the streaming source.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the input Amazon Kinesis Firehose delivery stream to read.
        RoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf. You need to grant the necessary permissions to this role.
    InputSchemaUpdate:
      description: Describes updates for the application's input schema.
      type: object
      properties:
        RecordFormatUpdate:
          $ref: "#/components/schemas/RecordFormat"
          description: Specifies the format of the records on the streaming source.
        RecordEncodingUpdate:
          $ref: "#/components/schemas/RecordEncoding"
          description: Specifies the encoding of the records in the streaming source. For example, UTF-8.
        RecordColumnUpdates:
          $ref: "#/components/schemas/RecordColumns"
          description: A list of RecordColumn objects. Each object describes the mapping of the streaming source element to the corresponding column in the in-application stream.
    InputParallelismUpdate:
      description: Provides updates to the parallelism count.
      type: object
      properties:
        CountUpdate:
          $ref: "#/components/schemas/InputParallelismCount"
          description: Number of in-application streams to create for the specified streaming source.
    OutputUpdates:
      type: array
      items:
        $ref: "#/components/schemas/OutputUpdate"
    OutputUpdate:
      description: Describes updates to the output configuration identified by the OutputId.
      type: object
      properties:
        OutputId:
          $ref: "#/components/schemas/Id"
          description: Identifies the specific output configuration that you want to update.
        NameUpdate:
          $ref: "#/components/schemas/InAppStreamName"
          description: If you want to specify a different in-application stream for this output configuration, use this field to specify the new in-application stream name.
        KinesisStreamsOutputUpdate:
          $ref: "#/components/schemas/KinesisStreamsOutputUpdate"
          description: Describes an Amazon Kinesis stream as the destination for the output.
        KinesisFirehoseOutputUpdate:
          $ref: "#/components/schemas/KinesisFirehoseOutputUpdate"
          description: Describes an Amazon Kinesis Firehose delivery stream as the destination for the output.
        LambdaOutputUpdate:
          $ref: "#/components/schemas/LambdaOutputUpdate"
          description: Describes an AWS Lambda function as the destination for the output.
        DestinationSchemaUpdate:
          $ref: "#/components/schemas/DestinationSchema"
          description: Describes the data format when records are written to the destination. For more information, see Configuring Application Output.
      required:
        - OutputId
    KinesisStreamsOutputUpdate:
      description: When updating an output configuration using the UpdateApplication operation, provides information about an Amazon Kinesis stream configured as the destination.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the Amazon Kinesis stream where you want to write the output.
        RoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf. You need to grant the necessary permissions to this role.
    KinesisFirehoseOutputUpdate:
      description: When updating an output configuration using the UpdateApplication operation, provides information about an Amazon Kinesis Firehose delivery stream configured as the destination.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: Amazon Resource Name (ARN) of the Amazon Kinesis Firehose delivery stream to write to.
        RoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to access the stream on your behalf. You need to grant the necessary permissions to this role.
    LambdaOutputUpdate:
      description: When updating an output configuration using the UpdateApplication operation, provides information about an AWS Lambda function configured as the destination.
      type: object
      properties:
        ResourceARNUpdate:
          $ref: "#/components/schemas/ResourceARN"
          description: "Amazon Resource Name (ARN) of the destination Lambda function. To specify an earlier version of the Lambda function than the latest, include the Lambda function version in the Lambda function ARN. For more information about Lambda ARNs, see Example ARNs: AWS Lambda"
        RoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to write to the destination function on your behalf. You need to grant the necessary permissions to this role.
    ReferenceDataSourceUpdates:
      type: array
      items:
        $ref: "#/components/schemas/ReferenceDataSourceUpdate"
    ReferenceDataSourceUpdate:
      description: When you update a reference data source configuration for an application, this object provides all the updated values (such as the source bucket name and object key name), the in-application table name that is created, and updated mapping information that maps the data in the Amazon S3 object to the in-application reference table that is created.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/Id"
          description: ID of the reference data source being updated. You can use the DescribeApplication operation to get this value.
        TableNameUpdate:
          $ref: "#/components/schemas/InAppTableName"
          description: In-application table name that is created by this update.
        S3ReferenceDataSourceUpdate:
          $ref: "#/components/schemas/S3ReferenceDataSourceUpdate"
          description: Describes the S3 bucket name, object key name, and IAM role that Amazon Kinesis Analytics can assume to read the Amazon S3 object on your behalf and populate the in-application reference table.
        ReferenceSchemaUpdate:
          $ref: "#/components/schemas/SourceSchema"
          description: Describes the format of the data in the streaming source, and how each data element maps to corresponding columns created in the in-application stream.
      required:
        - ReferenceId
    S3ReferenceDataSourceUpdate:
      description: Describes the S3 bucket name, object key name, and IAM role that Amazon Kinesis Analytics can assume to read the Amazon S3 object on your behalf and populate the in-application reference table.
      type: object
      properties:
        BucketARNUpdate:
          $ref: "#/components/schemas/BucketARN"
          description: Amazon Resource Name (ARN) of the S3 bucket.
        FileKeyUpdate:
          $ref: "#/components/schemas/FileKey"
          description: Object key name.
        ReferenceRoleARNUpdate:
          $ref: "#/components/schemas/RoleARN"
          description: ARN of the IAM role that Amazon Kinesis Analytics can assume to read the Amazon S3 object and populate the in-application.
    CloudWatchLoggingOptionUpdates:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchLoggingOptionUpdate"
    CloudWatchLoggingOptionUpdate:
      description: Describes CloudWatch logging option updates.
