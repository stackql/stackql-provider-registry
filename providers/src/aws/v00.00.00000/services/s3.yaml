          description: Indicates whether an object stored in Amazon S3 has an active legal hold.
        - name: x-amz-fwd-header-x-amz-object-lock-retain-until-date
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ObjectLockRetainUntilDate"
          description: The date and time when Object Lock is configured to expire.
        - name: x-amz-fwd-header-x-amz-mp-parts-count
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PartsCount"
          description: The count of parts this object has.
        - name: x-amz-fwd-header-x-amz-replication-status
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ReplicationStatus"
          description: Indicates if request involves bucket that is either a source or destination in a Replication rule. For more information about S3 Replication, see Replication.
        - name: x-amz-fwd-header-x-amz-request-charged
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/RequestCharged"
        - name: x-amz-fwd-header-x-amz-restore
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Restore"
          description: Provides information about object restoration operation and expiration time of the restored object copy.
        - name: x-amz-fwd-header-x-amz-server-side-encryption
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ServerSideEncryption"
          description: The server-side encryption algorithm used when storing requested object in Amazon S3 or Amazon FSx. When accessing data stored in Amazon FSx file systems using S3 access points, the only valid server side encryption option is aws:fsx.
        - name: x-amz-fwd-header-x-amz-server-side-encryption-customer-algorithm
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SSECustomerAlgorithm"
          description: Encryption algorithm used if server-side encryption with a customer-provided encryption key was specified for object stored in Amazon S3.
        - name: x-amz-fwd-header-x-amz-server-side-encryption-aws-kms-key-id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SSEKMSKeyId"
          description: If present, specifies the ID (Key ID, Key ARN, or Key Alias) of the Amazon Web Services Key Management Service (Amazon Web Services KMS) symmetric encryption customer managed key that was used for stored in Amazon S3 object.
        - name: x-amz-fwd-header-x-amz-server-side-encryption-customer-key-MD5
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SSECustomerKeyMD5"
          description: 128-bit MD5 digest of customer-provided encryption key used in Amazon S3 to encrypt data stored in S3. For more information, see Protecting data using server-side encryption with customer-provided encryption keys (SSE-C).
        - name: x-amz-fwd-header-x-amz-storage-class
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/StorageClass"
          description: Provides storage class information of the object. Amazon S3 returns this header for all objects except for S3 Standard storage class objects. For more information, see Storage Classes.
        - name: x-amz-fwd-header-x-amz-tagging-count
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/TagCount"
          description: The number of tags, if any, on the object.
        - name: x-amz-fwd-header-x-amz-version-id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ObjectVersionId"
          description: An ID used to reference a specific version of the object.
        - name: x-amz-fwd-header-x-amz-server-side-encryption-bucket-key-enabled
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/BucketKeyEnabled"
          description: Indicates whether the object stored in Amazon S3 uses an S3 bucket key for server-side encryption with Amazon Web Services KMS (SSE-KMS).
      requestBody:
        required: false
        content:
          application/xml:
            schema:
              type: object
              properties:
                Body:
                  $ref: "#/components/schemas/Body"
      responses:
        "200":
          description: Success
