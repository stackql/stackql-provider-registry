    ServerSideEncryptionConfiguration:
      description: Specifies the default server-side-encryption configuration.
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/ServerSideEncryptionRules"
          description: Container for information about a particular server-side encryption configuration rule.
      required:
        - Rules
    ServerSideEncryptionRules:
      type: array
      items:
        $ref: "#/components/schemas/ServerSideEncryptionRule"
    ServerSideEncryptionRule:
      description: Specifies the default server-side encryption configuration. General purpose buckets - If you're specifying a customer managed KMS key, we recommend using a fully qualified KMS key ARN. If you use a KMS key alias instead, then KMS resolves the key within the requester’s account. This behavior can result in data that's encrypted with a KMS key that belongs to the requester, and not the bucket owner. Directory buckets - When you specify an KMS customer managed key for encryption in your directory bucket, only use the key ID or key ARN. The key alias format of the KMS key isn't supported.
      type: object
      properties:
        ApplyServerSideEncryptionByDefault:
          $ref: "#/components/schemas/ServerSideEncryptionByDefault"
          description: Specifies the default server-side encryption to apply to new objects in the bucket. If a PUT Object request doesn't specify any server-side encryption, this default encryption will be applied.
        BucketKeyEnabled:
          $ref: "#/components/schemas/BucketKeyEnabled"
          description: Specifies whether Amazon S3 should use an S3 Bucket Key with server-side encryption using KMS (SSE-KMS) for new objects in the bucket. Existing objects are not affected. Setting the BucketKeyEnabled element to true causes Amazon S3 to use an S3 Bucket Key. General purpose buckets - By default, S3 Bucket Key is not enabled. For more information, see Amazon S3 Bucket Keys in the Amazon S3 User Guide. Directory buckets - S3 Bucket Keys are always enabled for GET and PUT operations in a directory bucket and can’t be disabled. S3 Bucket Keys aren't supported, when you copy SSE-KMS encrypted objects from general purpose buckets to directory buckets, from directory buckets to general purpose buckets, or between directory buckets, through CopyObject, UploadPartCopy, the Copy operation in Batch Operations, or the import jobs. In this case, Amazon S3 makes a call to KMS every time a copy request is made for a KMS-encrypted object.
        BlockedEncryptionTypes:
          $ref: "#/components/schemas/BlockedEncryptionTypes"
          description: A bucket-level setting for Amazon S3 general purpose buckets used to prevent the upload of new objects encrypted with the specified server-side encryption type. For example, blocking an encryption type will block PutObject, CopyObject, PostObject, multipart upload, and replication requests to the bucket for objects with the specified encryption type. However, you can continue to read and list any pre-existing objects already encrypted with the specified encryption type. For more information, see Blocking or unblocking SSE-C for a general purpose bucket. Currently, this parameter only supports blocking or unblocking server-side encryption with customer-provided keys (SSE-C). For more information about SSE-C, see Using server-side encryption with customer-provided keys (SSE-C).
    ServerSideEncryptionByDefault:
      description: "Describes the default server-side encryption to apply to new objects in the bucket. If a PUT Object request doesn't specify any server-side encryption, this default encryption will be applied. For more information, see PutBucketEncryption. General purpose buckets - If you don't specify a customer managed key at configuration, Amazon S3 automatically creates an Amazon Web Services KMS key (aws/s3) in your Amazon Web Services account the first time that you add an object encrypted with SSE-KMS to a bucket. By default, Amazon S3 uses this KMS key for SSE-KMS. Directory buckets - Your SSE-KMS configuration can only support 1 customer managed key per directory bucket's lifetime. The Amazon Web Services managed key (aws/s3) isn't supported. Directory buckets - For directory buckets, there are only two supported options for server-side encryption: SSE-S3 and SSE-KMS."
      type: object
      properties:
        SSEAlgorithm:
          $ref: "#/components/schemas/ServerSideEncryption"
          description: "Server-side encryption algorithm to use for the default encryption. For directory buckets, there are only two supported values for server-side encryption: AES256 and aws:kms."
        KMSMasterKeyID:
          $ref: "#/components/schemas/SSEKMSKeyId"
          description: "Amazon Web Services Key Management Service (KMS) customer managed key ID to use for the default encryption. General purpose buckets - This parameter is allowed if and only if SSEAlgorithm is set to aws:kms or aws:kms:dsse. Directory buckets - This parameter is allowed if and only if SSEAlgorithm is set to aws:kms. You can specify the key ID, key alias, or the Amazon Resource Name (ARN) of the KMS key. Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-east-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Key Alias: alias/alias-name If you are using encryption with cross-account or Amazon Web Services service operations, you must use a fully qualified KMS key ARN. For more information, see Using encryption for cross-account operations. General purpose buckets - If you're specifying a customer managed KMS key, we recommend using a fully qualified KMS key ARN. If you use a KMS key alias instead, then KMS resolves the key within the requester’s account. This behavior can result in data that's encrypted with a KMS key that belongs to the requester, and not the bucket owner. Also, if you use a key ID, you can run into a LogDestination undeliverable error when creating a VPC flow log. Directory buckets - When you specify an KMS customer managed key for encryption in your directory bucket, only use the key ID or key ARN. The key alias format of the KMS key isn't supported. Amazon S3 only supports symmetric encryption KMS keys. For more information, see Asymmetric keys in Amazon Web Services KMS in the Amazon Web Services Key Management Service Developer Guide."
      required:
        - SSEAlgorithm
    BlockedEncryptionTypes:
      description: "A bucket-level setting for Amazon S3 general purpose buckets used to prevent the upload of new objects encrypted with the specified server-side encryption type. For example, blocking an encryption type will block PutObject, CopyObject, PostObject, multipart upload, and replication requests to the bucket for objects with the specified encryption type. However, you can continue to read and list any pre-existing objects already encrypted with the specified encryption type. For more information, see Blocking or unblocking SSE-C for a general purpose bucket. This data type is used with the following actions: PutBucketEncryption GetBucketEncryption DeleteBucketEncryption Permissions You must have the s3:PutEncryptionConfiguration permission to block or unblock an encryption type for a bucket. You must have the s3:GetEncryptionConfiguration permission to view a bucket's encryption type."
      type: object
      properties:
        EncryptionType:
          $ref: "#/components/schemas/EncryptionTypeList"
          description: The object encryption type that you want to block or unblock for an Amazon S3 general purpose bucket. Currently, this parameter only supports blocking or unblocking server side encryption with customer-provided keys (SSE-C). For more information about SSE-C, see Using server-side encryption with customer-provided keys (SSE-C).
    EncryptionTypeList:
      type: array
      items:
        $ref: "#/components/schemas/EncryptionType"
    EncryptionType:
      type: string
      enum:
        - NONE
        - SSE-C
    IntelligentTieringConfiguration:
      description: Specifies the S3 Intelligent-Tiering configuration for an Amazon S3 bucket. For information about the S3 Intelligent-Tiering storage class, see Storage class for automatically optimizing frequently and infrequently accessed objects.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/IntelligentTieringId"
          description: The ID used to identify the S3 Intelligent-Tiering configuration.
        Filter:
          $ref: "#/components/schemas/IntelligentTieringFilter"
          description: Specifies a bucket filter. The configuration only includes objects that meet the filter's criteria.
        Status:
          $ref: "#/components/schemas/IntelligentTieringStatus"
          description: Specifies the status of the configuration.
        Tierings:
          $ref: "#/components/schemas/TieringList"
          description: Specifies the S3 Intelligent-Tiering storage class tier of the configuration.
      required:
        - Id
        - Status
        - Tierings
    IntelligentTieringFilter:
      description: The Filter is used to identify objects that the S3 Intelligent-Tiering configuration applies to.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the subset of objects to which the rule applies. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
        Tag:
          $ref: "#/components/schemas/Tag"
        And:
          $ref: "#/components/schemas/IntelligentTieringAndOperator"
          description: A conjunction (logical AND) of predicates, which is used in evaluating a metrics filter. The operator must have at least two predicates, and an object must match all of the predicates in order for the filter to apply.
    IntelligentTieringAndOperator:
      description: A container for specifying S3 Intelligent-Tiering filters. The filters determine the subset of objects to which the rule applies.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the subset of objects to which the configuration applies.
        Tags:
          $ref: "#/components/schemas/TagSet"
          description: All of these tags must exist in the object's tag set in order for the configuration to apply.
    IntelligentTieringStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    TieringList:
      type: array
      items:
        $ref: "#/components/schemas/Tiering"
    Tiering:
      description: The S3 Intelligent-Tiering storage class is designed to optimize storage costs by automatically moving data to the most cost-effective storage access tier, without additional operational overhead.
      type: object
      properties:
        Days:
          $ref: "#/components/schemas/IntelligentTieringDays"
          description: The number of consecutive days of no access after which an object will be eligible to be transitioned to the corresponding tier. The minimum number of days specified for Archive Access tier must be at least 90 days and Deep Archive Access tier must be at least 180 days. The maximum can be up to 2 years (730 days).
        AccessTier:
          $ref: "#/components/schemas/IntelligentTieringAccessTier"
          description: S3 Intelligent-Tiering access tier. See Storage class for automatically optimizing frequently and infrequently accessed objects for a list of access tiers in the S3 Intelligent-Tiering storage class.
      required:
        - Days
        - AccessTier
    IntelligentTieringDays:
      type: integer
    IntelligentTieringAccessTier:
      type: string
      enum:
        - ARCHIVE_ACCESS
        - DEEP_ARCHIVE_ACCESS
    InventoryConfiguration:
      description: Specifies the S3 Inventory configuration for an Amazon S3 bucket. For more information, see GET Bucket inventory in the Amazon S3 API Reference.
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/InventoryDestination"
          description: Contains information about where to publish the inventory results.
        IsEnabled:
          $ref: "#/components/schemas/IsEnabled"
          description: Specifies whether the inventory is enabled or disabled. If set to True, an inventory list is generated. If set to False, no inventory list is generated.
        Filter:
          $ref: "#/components/schemas/InventoryFilter"
          description: Specifies an inventory filter. The inventory only includes objects that meet the filter's criteria.
        Id:
          $ref: "#/components/schemas/InventoryId"
          description: The ID used to identify the inventory configuration.
        IncludedObjectVersions:
          $ref: "#/components/schemas/InventoryIncludedObjectVersions"
          description: Object versions to include in the inventory list. If set to All, the list includes all the object versions, which adds the version-related fields VersionId, IsLatest, and DeleteMarker to the list. If set to Current, the list does not contain these version-related fields.
        OptionalFields:
          $ref: "#/components/schemas/InventoryOptionalFields"
          description: Contains the optional fields that are included in the inventory results. The following optional fields are supported for directory buckets Size | LastModifiedDate | StorageClass | ETag | IsMultipartUploaded | EncryptionStatus | BucketKeyStatus | ChecksumAlgorithm | LifecycleExpirationDate. Throws MalformedXML error if unsupported optional field is provided.
        Schedule:
          $ref: "#/components/schemas/InventorySchedule"
          description: Specifies the schedule for generating inventory results.
      required:
        - Destination
        - IsEnabled
        - Id
        - IncludedObjectVersions
        - Schedule
    InventoryDestination:
      description: Specifies the S3 Inventory configuration for an Amazon S3 bucket.
      type: object
      properties:
        S3BucketDestination:
          $ref: "#/components/schemas/InventoryS3BucketDestination"
          description: Contains the bucket name, file format, bucket owner (optional), and prefix (optional) where inventory results are published.
      required:
        - S3BucketDestination
    InventoryS3BucketDestination:
      description: Contains the bucket name, file format, bucket owner (optional), and prefix (optional) where S3 Inventory results are published.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The account ID that owns the destination S3 bucket. If no account ID is provided, the owner is not validated before exporting data. Although this value is optional, we strongly recommend that you set it to help prevent problems if the destination bucket ownership changes.
        Bucket:
          $ref: "#/components/schemas/BucketName"
          description: The Amazon Resource Name (ARN) of the bucket where inventory results will be published.
        Format:
          $ref: "#/components/schemas/InventoryFormat"
          description: Specifies the output format of the inventory results.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The prefix that is prepended to all inventory results.
        Encryption:
          $ref: "#/components/schemas/InventoryEncryption"
          description: Contains the type of server-side encryption used to encrypt the inventory results.
      required:
        - Bucket
        - Format
    InventoryFormat:
      type: string
      enum:
        - CSV
        - ORC
        - Parquet
    InventoryEncryption:
      description: Contains the type of server-side encryption used to encrypt the S3 Inventory results.
      type: object
      properties:
        SSES3:
          $ref: "#/components/schemas/SSES3"
          description: Specifies the use of SSE-S3 to encrypt delivered inventory reports.
        SSEKMS:
          $ref: "#/components/schemas/SSEKMS"
          description: Specifies the use of SSE-KMS to encrypt delivered inventory reports.
    SSES3:
      description: Specifies the use of SSE-S3 to encrypt delivered inventory reports.
      type: object
    SSEKMS:
      description: Specifies the use of SSE-KMS to encrypt delivered inventory reports.
      type: object
      properties:
        KeyId:
          $ref: "#/components/schemas/SSEKMSKeyId"
          description: Specifies the ID of the Key Management Service (KMS) symmetric encryption customer managed key to use for encrypting inventory reports.
      required:
        - KeyId
    IsEnabled:
      type: boolean
    InventoryFilter:
      description: Specifies an S3 Inventory filter. The inventory only includes objects that meet the filter's criteria.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The prefix that an object must have to be included in the inventory results.
      required:
        - Prefix
    InventoryIncludedObjectVersions:
      type: string
      enum:
        - All
        - Current
    InventoryOptionalFields:
      type: array
      items:
        $ref: "#/components/schemas/InventoryOptionalField"
    InventoryOptionalField:
      type: string
      enum:
        - Size
        - LastModifiedDate
        - StorageClass
        - ETag
        - IsMultipartUploaded
        - ReplicationStatus
        - EncryptionStatus
        - ObjectLockRetainUntilDate
        - ObjectLockMode
        - ObjectLockLegalHoldStatus
        - IntelligentTieringAccessTier
        - BucketKeyStatus
        - ChecksumAlgorithm
        - ObjectAccessControlList
        - ObjectOwner
        - LifecycleExpirationDate
    InventorySchedule:
      description: Specifies the schedule for generating S3 Inventory results.
      type: object
      properties:
        Frequency:
          $ref: "#/components/schemas/InventoryFrequency"
          description: Specifies how frequently inventory results are produced.
      required:
        - Frequency
    InventoryFrequency:
      type: string
      enum:
        - Daily
        - Weekly
    LifecycleConfiguration:
      description: Container for lifecycle rules. You can add as many as 1000 rules. For more information see, Managing your storage lifecycle in the Amazon S3 User Guide.
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/Rules"
          description: Specifies lifecycle configuration rules for an Amazon S3 bucket.
      required:
        - Rules
    Rules:
      type: array
      items:
        $ref: "#/components/schemas/Rule"
    Rule:
      description: Specifies lifecycle rules for an Amazon S3 bucket. For more information, see Put Bucket Lifecycle Configuration in the Amazon S3 API Reference. For examples, see Put Bucket Lifecycle Configuration Examples.
      type: object
      properties:
        Expiration:
          $ref: "#/components/schemas/LifecycleExpiration"
          description: Specifies the expiration for the lifecycle of the object.
        ID:
          $ref: "#/components/schemas/ID"
          description: Unique identifier for the rule. The value can't be longer than 255 characters.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: Object key prefix that identifies one or more objects to which this rule applies. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
        Status:
          $ref: "#/components/schemas/ExpirationStatus"
          description: If Enabled, the rule is currently being applied. If Disabled, the rule is not currently being applied.
        Transition:
          $ref: "#/components/schemas/Transition"
          description: Specifies when an object transitions to a specified storage class. For more information about Amazon S3 lifecycle configuration rules, see Transitioning Objects Using Amazon S3 Lifecycle in the Amazon S3 User Guide.
        NoncurrentVersionTransition:
          $ref: "#/components/schemas/NoncurrentVersionTransition"
        NoncurrentVersionExpiration:
          $ref: "#/components/schemas/NoncurrentVersionExpiration"
        AbortIncompleteMultipartUpload:
          $ref: "#/components/schemas/AbortIncompleteMultipartUpload"
      required:
        - Prefix
        - Status
    LifecycleExpiration:
      description: Container for the expiration for the lifecycle of the object. For more information see, Managing your storage lifecycle in the Amazon S3 User Guide.
      type: object
      properties:
        Date:
          $ref: "#/components/schemas/Date"
          description: Indicates at what date the object is to be moved or deleted. The date value must conform to the ISO 8601 format. The time is always midnight UTC. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
        Days:
          $ref: "#/components/schemas/Days"
          description: Indicates the lifetime, in days, of the objects that are subject to the rule. The value must be a non-zero positive integer.
        ExpiredObjectDeleteMarker:
          $ref: "#/components/schemas/ExpiredObjectDeleteMarker"
          description: Indicates whether Amazon S3 will remove a delete marker with no noncurrent versions. If set to true, the delete marker will be expired; if set to false the policy takes no action. This cannot be specified with Days or Date in a Lifecycle Expiration Policy. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
    Date:
      type: string
      format: date-time
    Days:
      type: integer
    ExpiredObjectDeleteMarker:
      type: boolean
    ExpirationStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    Transition:
      description: Specifies when an object transitions to a specified storage class. For more information about Amazon S3 lifecycle configuration rules, see Transitioning Objects Using Amazon S3 Lifecycle in the Amazon S3 User Guide.
      type: object
      properties:
        Date:
          $ref: "#/components/schemas/Date"
          description: Indicates when objects are transitioned to the specified storage class. The date value must be in ISO 8601 format. The time is always midnight UTC.
        Days:
          $ref: "#/components/schemas/Days"
          description: Indicates the number of days after creation when objects are transitioned to the specified storage class. If the specified storage class is INTELLIGENT_TIERING, GLACIER_IR, GLACIER, or DEEP_ARCHIVE, valid values are 0 or positive integers. If the specified storage class is STANDARD_IA or ONEZONE_IA, valid values are positive integers greater than 30. Be aware that some storage classes have a minimum storage duration and that you're charged for transitioning objects before their minimum storage duration. For more information, see Constraints and considerations for transitions in the Amazon S3 User Guide.
        StorageClass:
          $ref: "#/components/schemas/TransitionStorageClass"
          description: The storage class to which you want the object to transition.
    TransitionStorageClass:
      type: string
      enum:
        - GLACIER
        - STANDARD_IA
        - ONEZONE_IA
        - INTELLIGENT_TIERING
        - DEEP_ARCHIVE
        - GLACIER_IR
    NoncurrentVersionTransition:
      description: Container for the transition rule that describes when noncurrent objects transition to the STANDARD_IA, ONEZONE_IA, INTELLIGENT_TIERING, GLACIER_IR, GLACIER, or DEEP_ARCHIVE storage class. If your bucket is versioning-enabled (or versioning is suspended), you can set this action to request that Amazon S3 transition noncurrent object versions to the STANDARD_IA, ONEZONE_IA, INTELLIGENT_TIERING, GLACIER_IR, GLACIER, or DEEP_ARCHIVE storage class at a specific period in the object's lifetime.
      type: object
      properties:
        NoncurrentDays:
          $ref: "#/components/schemas/Days"
          description: Specifies the number of days an object is noncurrent before Amazon S3 can perform the associated action. For information about the noncurrent days calculations, see How Amazon S3 Calculates How Long an Object Has Been Noncurrent in the Amazon S3 User Guide.
        StorageClass:
          $ref: "#/components/schemas/TransitionStorageClass"
          description: The class of storage used to store the object.
        NewerNoncurrentVersions:
          $ref: "#/components/schemas/VersionCount"
          description: Specifies how many noncurrent versions Amazon S3 will retain in the same storage class before transitioning objects. You can specify up to 100 noncurrent versions to retain. Amazon S3 will transition any additional noncurrent versions beyond the specified number to retain. For more information about noncurrent versions, see Lifecycle configuration elements in the Amazon S3 User Guide.
    VersionCount:
      type: integer
    NoncurrentVersionExpiration:
      description: Specifies when noncurrent object versions expire. Upon expiration, Amazon S3 permanently deletes the noncurrent object versions. You set this lifecycle configuration action on a bucket that has versioning enabled (or suspended) to request that Amazon S3 delete noncurrent object versions at a specific period in the object's lifetime. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
      type: object
      properties:
        NoncurrentDays:
          $ref: "#/components/schemas/Days"
          description: Specifies the number of days an object is noncurrent before Amazon S3 can perform the associated action. The value must be a non-zero positive integer. For information about the noncurrent days calculations, see How Amazon S3 Calculates When an Object Became Noncurrent in the Amazon S3 User Guide. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
        NewerNoncurrentVersions:
          $ref: "#/components/schemas/VersionCount"
          description: Specifies how many noncurrent versions Amazon S3 will retain. You can specify up to 100 noncurrent versions to retain. Amazon S3 will permanently delete any additional noncurrent versions beyond the specified number to retain. For more information about noncurrent versions, see Lifecycle configuration elements in the Amazon S3 User Guide. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
    AbortIncompleteMultipartUpload:
      description: Specifies the days since the initiation of an incomplete multipart upload that Amazon S3 will wait before permanently removing all parts of the upload. For more information, see Aborting Incomplete Multipart Uploads Using a Bucket Lifecycle Configuration in the Amazon S3 User Guide.
      type: object
      properties:
        DaysAfterInitiation:
          $ref: "#/components/schemas/DaysAfterInitiation"
          description: Specifies the number of days after which Amazon S3 aborts an incomplete multipart upload.
    DaysAfterInitiation:
      type: integer
    TransitionDefaultMinimumObjectSize:
      type: string
      enum:
        - varies_by_storage_class
        - all_storage_classes_128K
    BucketLifecycleConfiguration:
      description: Specifies the lifecycle configuration for objects in an Amazon S3 bucket. For more information, see Object Lifecycle Management in the Amazon S3 User Guide.
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/LifecycleRules"
          description: A lifecycle rule for individual objects in an Amazon S3 bucket.
      required:
        - Rules
    LifecycleRules:
      type: array
      items:
        $ref: "#/components/schemas/LifecycleRule"
    LifecycleRule:
      description: A lifecycle rule for individual objects in an Amazon S3 bucket. For more information see, Managing your storage lifecycle in the Amazon S3 User Guide.
      type: object
      properties:
        Expiration:
          $ref: "#/components/schemas/LifecycleExpiration"
          description: Specifies the expiration for the lifecycle of the object in the form of date, days and, whether the object has a delete marker.
        ID:
          $ref: "#/components/schemas/ID"
          description: Unique identifier for the rule. The value cannot be longer than 255 characters.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The general purpose bucket prefix that identifies one or more objects to which the rule applies. We recommend using Filter instead of Prefix for new PUTs. Previous configurations where a prefix is defined will continue to operate as before. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
        Filter:
          $ref: "#/components/schemas/LifecycleRuleFilter"
          description: The Filter is used to identify objects that a Lifecycle Rule applies to. A Filter must have exactly one of Prefix, Tag, ObjectSizeGreaterThan, ObjectSizeLessThan, or And specified. Filter is required if the LifecycleRule does not contain a Prefix element. For more information about Tag filters, see Adding filters to Lifecycle rules in the Amazon S3 User Guide. Tag filters are not supported for directory buckets.
        Status:
          $ref: "#/components/schemas/ExpirationStatus"
          description: If 'Enabled', the rule is currently being applied. If 'Disabled', the rule is not currently being applied.
        Transitions:
          $ref: "#/components/schemas/TransitionList"
          description: Specifies when an Amazon S3 object transitions to a specified storage class. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
        NoncurrentVersionTransitions:
          $ref: "#/components/schemas/NoncurrentVersionTransitionList"
          description: Specifies the transition rule for the lifecycle rule that describes when noncurrent objects transition to a specific storage class. If your bucket is versioning-enabled (or versioning is suspended), you can set this action to request that Amazon S3 transition noncurrent object versions to a specific storage class at a set period in the object's lifetime. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
        NoncurrentVersionExpiration:
          $ref: "#/components/schemas/NoncurrentVersionExpiration"
        AbortIncompleteMultipartUpload:
          $ref: "#/components/schemas/AbortIncompleteMultipartUpload"
      required:
        - Status
    LifecycleRuleFilter:
      description: The Filter is used to identify objects that a Lifecycle Rule applies to. A Filter can have exactly one of Prefix, Tag, ObjectSizeGreaterThan, ObjectSizeLessThan, or And specified. If the Filter element is left empty, the Lifecycle Rule applies to all objects in the bucket.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: Prefix identifying one or more objects to which the rule applies. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
        Tag:
          $ref: "#/components/schemas/Tag"
          description: This tag must exist in the object's tag set in order for the rule to apply. This parameter applies to general purpose buckets only. It is not supported for directory bucket lifecycle configurations.
        ObjectSizeGreaterThan:
          $ref: "#/components/schemas/ObjectSizeGreaterThanBytes"
          description: Minimum object size to which the rule applies.
        ObjectSizeLessThan:
          $ref: "#/components/schemas/ObjectSizeLessThanBytes"
          description: Maximum object size to which the rule applies.
        And:
          $ref: "#/components/schemas/LifecycleRuleAndOperator"
    ObjectSizeGreaterThanBytes:
      type: integer
      format: int64
    ObjectSizeLessThanBytes:
      type: integer
      format: int64
    LifecycleRuleAndOperator:
      description: This is used in a Lifecycle Rule Filter to apply a logical AND to two or more predicates. The Lifecycle Rule will apply to any object matching all of the predicates configured inside the And operator.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: Prefix identifying one or more objects to which the rule applies.
        Tags:
          $ref: "#/components/schemas/TagSet"
          description: All of these tags must exist in the object's tag set in order for the rule to apply.
        ObjectSizeGreaterThan:
          $ref: "#/components/schemas/ObjectSizeGreaterThanBytes"
          description: Minimum object size to which the rule applies.
        ObjectSizeLessThan:
          $ref: "#/components/schemas/ObjectSizeLessThanBytes"
          description: Maximum object size to which the rule applies.
    TransitionList:
      type: array
      items:
        $ref: "#/components/schemas/Transition"
    NoncurrentVersionTransitionList:
      type: array
      items:
        $ref: "#/components/schemas/NoncurrentVersionTransition"
    PutBucketLifecycleConfigurationOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/PutBucketLifecycleConfigurationOutputDisplay"
    BucketLoggingStatus:
      description: Container for logging status information.
      type: object
      properties:
        LoggingEnabled:
          $ref: "#/components/schemas/LoggingEnabled"
    LoggingEnabled:
      description: Describes where logs are stored and the prefix that Amazon S3 assigns to all log object keys for a bucket. For more information, see PUT Bucket logging in the Amazon S3 API Reference.
      type: object
      properties:
        TargetBucket:
          $ref: "#/components/schemas/TargetBucket"
          description: Specifies the bucket where you want Amazon S3 to store server access logs. You can have your logs delivered to any bucket that you own, including the same bucket that is being logged. You can also configure multiple buckets to deliver their logs to the same target bucket. In this case, you should choose a different TargetPrefix for each source bucket so that the delivered log files can be distinguished by key.
        TargetGrants:
          $ref: "#/components/schemas/TargetGrants"
          description: Container for granting information. Buckets that use the bucket owner enforced setting for Object Ownership don't support target grants. For more information, see Permissions for server access log delivery in the Amazon S3 User Guide.
        TargetPrefix:
          $ref: "#/components/schemas/TargetPrefix"
          description: A prefix for all log object keys. If you store log files from multiple Amazon S3 buckets in a single bucket, you can use a prefix to distinguish which log files came from which bucket.
        TargetObjectKeyFormat:
          $ref: "#/components/schemas/TargetObjectKeyFormat"
          description: Amazon S3 key format for log objects.
      required:
        - TargetBucket
        - TargetPrefix
    TargetBucket:
      type: string
    TargetGrants:
      type: array
      items:
        $ref: "#/components/schemas/TargetGrant"
    TargetGrant:
      description: Container for granting information. Buckets that use the bucket owner enforced setting for Object Ownership don't support target grants. For more information, see Permissions server access log delivery in the Amazon S3 User Guide.
      type: object
      properties:
        Grantee:
          $ref: "#/components/schemas/Grantee"
          description: Container for the person being granted permissions.
        Permission:
          $ref: "#/components/schemas/BucketLogsPermission"
          description: Logging permissions assigned to the grantee for the bucket.
    BucketLogsPermission:
      type: string
      enum:
        - FULL_CONTROL
        - READ
        - WRITE
    TargetPrefix:
      type: string
    TargetObjectKeyFormat:
      description: Amazon S3 key format for log objects. Only one format, PartitionedPrefix or SimplePrefix, is allowed.
      type: object
      properties:
        SimplePrefix:
          $ref: "#/components/schemas/SimplePrefix"
          description: To use the simple format for S3 keys for log objects. To specify SimplePrefix format, set SimplePrefix to {}.
        PartitionedPrefix:
          $ref: "#/components/schemas/PartitionedPrefix"
          description: Partitioned S3 key for log objects.
    SimplePrefix:
      description: To use simple format for S3 keys for log objects, set SimplePrefix to an empty object. [DestinationPrefix][YYYY]-[MM]-[DD]-[hh]-[mm]-[ss]-[UniqueString]
      type: object
    PartitionedPrefix:
      description: "Amazon S3 keys for log objects are partitioned in the following format: [DestinationPrefix][SourceAccountId]/[SourceRegion]/[SourceBucket]/[YYYY]/[MM]/[DD]/[YYYY]-[MM]-[DD]-[hh]-[mm]-[ss]-[UniqueString] PartitionedPrefix defaults to EventTime delivery when server access logs are delivered."
      type: object
      properties:
        PartitionDateSource:
          $ref: "#/components/schemas/PartitionDateSource"
          description: Specifies the partition date source for the partitioned prefix. PartitionDateSource can be EventTime or DeliveryTime. For DeliveryTime, the time in the log file names corresponds to the delivery time for the log files. For EventTime, The logs delivered are for a specific day only. The year, month, and day correspond to the day on which the event occurred, and the hour, minutes and seconds are set to 00 in the key.
    PartitionDateSource:
      type: string
      enum:
        - EventTime
        - DeliveryTime
    MetricsConfiguration:
      description: Specifies a metrics configuration for the CloudWatch request metrics (specified by the metrics configuration ID) from an Amazon S3 bucket. If you're updating an existing metrics configuration, note that this is a full replacement of the existing metrics configuration. If you don't include the elements you want to keep, they are erased. For more information, see PutBucketMetricsConfiguration.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/MetricsId"
          description: The ID used to identify the metrics configuration. The ID has a 64 character limit and can only contain letters, numbers, periods, dashes, and underscores.
        Filter:
          $ref: "#/components/schemas/MetricsFilter"
          description: Specifies a metrics configuration filter. The metrics configuration will only include objects that meet the filter's criteria. A filter must be a prefix, an object tag, an access point ARN, or a conjunction (MetricsAndOperator). Metrics configurations for directory buckets do not support tag filters.
      required:
        - Id
    MetricsFilter:
      description: Specifies a metrics configuration filter. The metrics configuration only includes objects that meet the filter's criteria. A filter must be a prefix, an object tag, an access point ARN, or a conjunction (MetricsAndOperator). For more information, see PutBucketMetricsConfiguration.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The prefix used when evaluating a metrics filter.
        Tag:
          $ref: "#/components/schemas/Tag"
          description: The tag used when evaluating a metrics filter. Tag filters are not supported for directory buckets.
        AccessPointArn:
          $ref: "#/components/schemas/AccessPointArn"
          description: The access point ARN used when evaluating a metrics filter.
        And:
          $ref: "#/components/schemas/MetricsAndOperator"
          description: A conjunction (logical AND) of predicates, which is used in evaluating a metrics filter. The operator must have at least two predicates, and an object must match all of the predicates in order for the filter to apply.
    AccessPointArn:
      type: string
    MetricsAndOperator:
      description: A conjunction (logical AND) of predicates, which is used in evaluating a metrics filter. The operator must have at least two predicates, and an object must match all of the predicates in order for the filter to apply.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: The prefix used when evaluating an AND predicate.
        Tags:
          $ref: "#/components/schemas/TagSet"
          description: The list of tags used when evaluating an AND predicate. Tag filters are not supported for directory buckets.
        AccessPointArn:
          $ref: "#/components/schemas/AccessPointArn"
          description: The access point ARN used when evaluating an AND predicate.
    NotificationConfigurationDeprecated:
      type: object
      properties:
        TopicConfiguration:
          $ref: "#/components/schemas/TopicConfigurationDeprecated"
          description: This data type is deprecated. A container for specifying the configuration for publication of messages to an Amazon Simple Notification Service (Amazon SNS) topic when Amazon S3 detects specified events.
        QueueConfiguration:
          $ref: "#/components/schemas/QueueConfigurationDeprecated"
          description: This data type is deprecated. This data type specifies the configuration for publishing messages to an Amazon Simple Queue Service (Amazon SQS) queue when Amazon S3 detects specified events.
        CloudFunctionConfiguration:
          $ref: "#/components/schemas/CloudFunctionConfiguration"
          description: Container for specifying the Lambda notification configuration.
    TopicConfigurationDeprecated:
      description: A container for specifying the configuration for publication of messages to an Amazon Simple Notification Service (Amazon SNS) topic when Amazon S3 detects specified events. This data type is deprecated. Use TopicConfiguration instead.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationId"
        Events:
          $ref: "#/components/schemas/EventList"
          description: A collection of events related to objects
        Event:
          $ref: "#/components/schemas/Event"
          description: Bucket event for which to send notifications.
        Topic:
          $ref: "#/components/schemas/TopicArn"
          description: Amazon SNS topic to which Amazon S3 will publish a message to report the specified events for the bucket.
    NotificationId:
      description: An optional unique identifier for configurations in a notification configuration. If you don't provide one, Amazon S3 will assign an ID.
      type: string
    EventList:
      type: array
      items:
        $ref: "#/components/schemas/Event"
    Event:
      description: The bucket event for which to send notifications.
      type: string
      enum:
        - s3:ReducedRedundancyLostObject
        - s3:ObjectCreated:*
        - s3:ObjectCreated:Put
        - s3:ObjectCreated:Post
        - s3:ObjectCreated:Copy
        - s3:ObjectCreated:CompleteMultipartUpload
        - s3:ObjectRemoved:*
        - s3:ObjectRemoved:Delete
        - s3:ObjectRemoved:DeleteMarkerCreated
        - s3:ObjectRestore:*
        - s3:ObjectRestore:Post
        - s3:ObjectRestore:Completed
        - s3:Replication:*
        - s3:Replication:OperationFailedReplication
        - s3:Replication:OperationNotTracked
        - s3:Replication:OperationMissedThreshold
        - s3:Replication:OperationReplicatedAfterThreshold
        - s3:ObjectRestore:Delete
        - s3:LifecycleTransition
        - s3:IntelligentTiering
        - s3:ObjectAcl:Put
        - s3:LifecycleExpiration:*
        - s3:LifecycleExpiration:Delete
        - s3:LifecycleExpiration:DeleteMarkerCreated
        - s3:ObjectTagging:*
        - s3:ObjectTagging:Put
        - s3:ObjectTagging:Delete
    TopicArn:
      type: string
    QueueConfigurationDeprecated:
      description: This data type is deprecated. Use QueueConfiguration for the same purposes. This data type specifies the configuration for publishing messages to an Amazon Simple Queue Service (Amazon SQS) queue when Amazon S3 detects specified events.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationId"
        Event:
          $ref: "#/components/schemas/Event"
        Events:
          $ref: "#/components/schemas/EventList"
          description: A collection of bucket events for which to send notifications.
        Queue:
          $ref: "#/components/schemas/QueueArn"
          description: The Amazon Resource Name (ARN) of the Amazon SQS queue to which Amazon S3 publishes a message when it detects events of the specified type.
    QueueArn:
      type: string
    CloudFunctionConfiguration:
      description: Container for specifying the Lambda notification configuration.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationId"
        Event:
          $ref: "#/components/schemas/Event"
        Events:
          $ref: "#/components/schemas/EventList"
          description: Bucket events for which to send notifications.
        CloudFunction:
          $ref: "#/components/schemas/CloudFunction"
          description: Lambda cloud function ARN that Amazon S3 can invoke when it detects events of the specified type.
        InvocationRole:
          $ref: "#/components/schemas/CloudFunctionInvocationRole"
          description: The role supporting the invocation of the Lambda function
    CloudFunction:
      type: string
    CloudFunctionInvocationRole:
      type: string
    SkipValidation:
      type: boolean
    NotificationConfiguration:
      description: A container for specifying the notification configuration of the bucket. If this element is empty, notifications are turned off for the bucket.
      type: object
      properties:
        TopicConfigurations:
          $ref: "#/components/schemas/TopicConfigurationList"
          description: The topic to which notifications are sent and the events for which notifications are generated.
        QueueConfigurations:
          $ref: "#/components/schemas/QueueConfigurationList"
          description: The Amazon Simple Queue Service queues to publish messages to and the events for which to publish messages.
        LambdaFunctionConfigurations:
          $ref: "#/components/schemas/LambdaFunctionConfigurationList"
          description: Describes the Lambda functions to invoke and the events for which to invoke them.
        EventBridgeConfiguration:
          $ref: "#/components/schemas/EventBridgeConfiguration"
          description: Enables delivery of events to Amazon EventBridge.
    TopicConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/TopicConfiguration"
    TopicConfiguration:
      description: A container for specifying the configuration for publication of messages to an Amazon Simple Notification Service (Amazon SNS) topic when Amazon S3 detects specified events.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationId"
        TopicArn:
          $ref: "#/components/schemas/TopicArn"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to which Amazon S3 publishes a message when it detects events of the specified type.
        Events:
          $ref: "#/components/schemas/EventList"
          description: The Amazon S3 bucket event about which to send notifications. For more information, see Supported Event Types in the Amazon S3 User Guide.
        Filter:
          $ref: "#/components/schemas/NotificationConfigurationFilter"
      required:
        - TopicArn
        - Events
    NotificationConfigurationFilter:
      description: Specifies object key name filtering rules. For information about key name filtering, see Configuring event notifications using object key name filtering in the Amazon S3 User Guide.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/S3KeyFilter"
    S3KeyFilter:
      description: A container for object key name prefix and suffix filtering rules.
      type: object
      properties:
        FilterRules:
          $ref: "#/components/schemas/FilterRuleList"
    FilterRuleList:
      description: A list of containers for the key-value pair that defines the criteria for the filter rule.
      type: array
      items:
        $ref: "#/components/schemas/FilterRule"
    FilterRule:
      description: Specifies the Amazon S3 object key name to filter on. An object key name is the name assigned to an object in your Amazon S3 bucket. You specify whether to filter on the suffix or prefix of the object key name. A prefix is a specific string of characters at the beginning of an object key name, which you can use to organize objects. For example, you can start the key names of related objects with a prefix, such as 2023- or engineering/. Then, you can use FilterRule to find objects in a bucket with key names that have the same prefix. A suffix is similar to a prefix, but it is at the end of the object key name instead of at the beginning.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FilterRuleName"
          description: The object key name prefix or suffix identifying one or more objects to which the filtering rule applies. The maximum length is 1,024 characters. Overlapping prefixes and suffixes are not supported. For more information, see Configuring Event Notifications in the Amazon S3 User Guide.
        Value:
          $ref: "#/components/schemas/FilterRuleValue"
          description: The value that the filter searches for in object key names.
    FilterRuleName:
      type: string
      enum:
        - prefix
        - suffix
    FilterRuleValue:
      type: string
    QueueConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/QueueConfiguration"
    QueueConfiguration:
      description: Specifies the configuration for publishing messages to an Amazon Simple Queue Service (Amazon SQS) queue when Amazon S3 detects specified events.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationId"
        QueueArn:
          $ref: "#/components/schemas/QueueArn"
          description: The Amazon Resource Name (ARN) of the Amazon SQS queue to which Amazon S3 publishes a message when it detects events of the specified type.
        Events:
          $ref: "#/components/schemas/EventList"
          description: A collection of bucket events for which to send notifications
        Filter:
          $ref: "#/components/schemas/NotificationConfigurationFilter"
      required:
        - QueueArn
        - Events
    LambdaFunctionConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaFunctionConfiguration"
    LambdaFunctionConfiguration:
      description: A container for specifying the configuration for Lambda notifications.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationId"
        LambdaFunctionArn:
          $ref: "#/components/schemas/LambdaFunctionArn"
          description: The Amazon Resource Name (ARN) of the Lambda function that Amazon S3 invokes when the specified event type occurs.
        Events:
          $ref: "#/components/schemas/EventList"
          description: The Amazon S3 bucket event for which to invoke the Lambda function. For more information, see Supported Event Types in the Amazon S3 User Guide.
        Filter:
          $ref: "#/components/schemas/NotificationConfigurationFilter"
      required:
        - LambdaFunctionArn
        - Events
    LambdaFunctionArn:
      type: string
    EventBridgeConfiguration:
      description: A container for specifying the configuration for Amazon EventBridge.
      type: object
    OwnershipControls:
      description: The container element for a bucket's ownership controls.
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/OwnershipControlsRules"
          description: The container element for an ownership control rule.
      required:
        - Rules
    OwnershipControlsRules:
      type: array
      items:
        $ref: "#/components/schemas/OwnershipControlsRule"
    OwnershipControlsRule:
      description: The container element for an ownership control rule.
      type: object
      properties:
        ObjectOwnership:
          $ref: "#/components/schemas/ObjectOwnership"
      required:
        - ObjectOwnership
    ConfirmRemoveSelfBucketAccess:
      type: boolean
    Policy:
      type: string
    ObjectLockToken:
      type: string
    ReplicationConfiguration:
      description: A container for replication rules. You can add up to 1,000 rules. The maximum size of a replication configuration is 2 MB.
      type: object
      properties:
        Role:
          $ref: "#/components/schemas/Role"
          description: The Amazon Resource Name (ARN) of the Identity and Access Management (IAM) role that Amazon S3 assumes when replicating objects. For more information, see How to Set Up Replication in the Amazon S3 User Guide.
        Rules:
          $ref: "#/components/schemas/ReplicationRules"
          description: A container for one or more replication rules. A replication configuration must have at least one rule and can contain a maximum of 1,000 rules.
      required:
        - Role
        - Rules
    Role:
      type: string
    ReplicationRules:
      type: array
      items:
        $ref: "#/components/schemas/ReplicationRule"
    ReplicationRule:
      description: Specifies which Amazon S3 objects to replicate and where to store the replicas.
      type: object
      properties:
        ID:
          $ref: "#/components/schemas/ID"
          description: A unique identifier for the rule. The maximum value is 255 characters.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: The priority indicates which rule has precedence whenever two or more replication rules conflict. Amazon S3 will attempt to replicate objects according to all replication rules. However, if there are two or more rules with the same destination bucket, then objects will be replicated according to the rule with the highest priority. The higher the number, the higher the priority. For more information, see Replication in the Amazon S3 User Guide.
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the object or objects to which the rule applies. The maximum prefix length is 1,024 characters. To include all objects in a bucket, specify an empty string. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
        Filter:
          $ref: "#/components/schemas/ReplicationRuleFilter"
        Status:
          $ref: "#/components/schemas/ReplicationRuleStatus"
          description: Specifies whether the rule is enabled.
        SourceSelectionCriteria:
          $ref: "#/components/schemas/SourceSelectionCriteria"
          description: A container that describes additional filters for identifying the source objects that you want to replicate. You can choose to enable or disable the replication of these objects. Currently, Amazon S3 supports only the filter that you can specify for objects created with server-side encryption using a customer managed key stored in Amazon Web Services Key Management Service (SSE-KMS).
        ExistingObjectReplication:
          $ref: "#/components/schemas/ExistingObjectReplication"
          description: Optional configuration to replicate existing source bucket objects. This parameter is no longer supported. To replicate existing objects, see Replicating existing objects with S3 Batch Replication in the Amazon S3 User Guide.
        Destination:
          $ref: "#/components/schemas/Destination"
          description: A container for information about the replication destination and its configurations including enabling the S3 Replication Time Control (S3 RTC).
        DeleteMarkerReplication:
          $ref: "#/components/schemas/DeleteMarkerReplication"
      required:
        - Status
        - Destination
    Priority:
      type: integer
    ReplicationRuleFilter:
      description: A filter that identifies the subset of objects to which the replication rule applies. A Filter must specify exactly one Prefix, Tag, or an And child element.
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the subset of objects to which the rule applies. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
        Tag:
          $ref: "#/components/schemas/Tag"
          description: A container for specifying a tag key and value. The rule applies only to objects that have the tag in their tag set.
        And:
          $ref: "#/components/schemas/ReplicationRuleAndOperator"
          description: "A container for specifying rule filters. The filters determine the subset of objects to which the rule applies. This element is required only if you specify more than one filter. For example: If you specify both a Prefix and a Tag filter, wrap these filters in an And tag. If you specify a filter based on multiple tags, wrap the Tag elements in an And tag."
    ReplicationRuleAndOperator:
      description: "A container for specifying rule filters. The filters determine the subset of objects to which the rule applies. This element is required only if you specify more than one filter. For example: If you specify both a Prefix and a Tag filter, wrap these filters in an And tag. If you specify a filter based on multiple tags, wrap the Tag elements in an And tag."
      type: object
      properties:
        Prefix:
          $ref: "#/components/schemas/Prefix"
          description: An object key name prefix that identifies the subset of objects to which the rule applies.
        Tags:
          $ref: "#/components/schemas/TagSet"
          description: An array of tags containing key and value pairs.
    ReplicationRuleStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    SourceSelectionCriteria:
      description: A container that describes additional filters for identifying the source objects that you want to replicate. You can choose to enable or disable the replication of these objects. Currently, Amazon S3 supports only the filter that you can specify for objects created with server-side encryption using a customer managed key stored in Amazon Web Services Key Management Service (SSE-KMS).
      type: object
      properties:
        SseKmsEncryptedObjects:
          $ref: "#/components/schemas/SseKmsEncryptedObjects"
          description: A container for filter information for the selection of Amazon S3 objects encrypted with Amazon Web Services KMS. If you include SourceSelectionCriteria in the replication configuration, this element is required.
        ReplicaModifications:
          $ref: "#/components/schemas/ReplicaModifications"
          description: A filter that you can specify for selections for modifications on replicas. Amazon S3 doesn't replicate replica modifications by default. In the latest version of replication configuration (when Filter is specified), you can specify this element and set the status to Enabled to replicate modifications on replicas. If you don't specify the Filter element, Amazon S3 assumes that the replication configuration is the earlier version, V1. In the earlier version, this element is not allowed
    SseKmsEncryptedObjects:
      description: A container for filter information for the selection of S3 objects encrypted with Amazon Web Services KMS.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SseKmsEncryptedObjectsStatus"
          description: Specifies whether Amazon S3 replicates objects created with server-side encryption using an Amazon Web Services KMS key stored in Amazon Web Services Key Management Service.
      required:
        - Status
    SseKmsEncryptedObjectsStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ReplicaModifications:
      description: A filter that you can specify for selection for modifications on replicas. Amazon S3 doesn't replicate replica modifications by default. In the latest version of replication configuration (when Filter is specified), you can specify this element and set the status to Enabled to replicate modifications on replicas. If you don't specify the Filter element, Amazon S3 assumes that the replication configuration is the earlier version, V1. In the earlier version, this element is not allowed.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ReplicaModificationsStatus"
          description: Specifies whether Amazon S3 replicates modifications on replicas.
      required:
        - Status
    ReplicaModificationsStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ExistingObjectReplication:
      description: Optional configuration to replicate existing source bucket objects. This parameter is no longer supported. To replicate existing objects, see Replicating existing objects with S3 Batch Replication in the Amazon S3 User Guide.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ExistingObjectReplicationStatus"
          description: Specifies whether Amazon S3 replicates existing source bucket objects.
      required:
        - Status
    ExistingObjectReplicationStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    Destination:
      description: Specifies information about where to publish analysis or configuration results for an Amazon S3 bucket and S3 Replication Time Control (S3 RTC).
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/BucketName"
          description: The Amazon Resource Name (ARN) of the bucket where you want Amazon S3 to store the results.
        Account:
          $ref: "#/components/schemas/AccountId"
          description: "Destination bucket owner account ID. In a cross-account scenario, if you direct Amazon S3 to change replica ownership to the Amazon Web Services account that owns the destination bucket by specifying the AccessControlTranslation property, this is the account ID of the destination bucket owner. For more information, see Replication Additional Configuration: Changing the Replica Owner in the Amazon S3 User Guide."
        StorageClass:
          $ref: "#/components/schemas/StorageClass"
          description: The storage class to use when replicating objects, such as S3 Standard or reduced redundancy. By default, Amazon S3 uses the storage class of the source object to create the object replica. For valid values, see the StorageClass element of the PUT Bucket replication action in the Amazon S3 API Reference. FSX_OPENZFS is not an accepted value when replicating objects.
        AccessControlTranslation:
          $ref: "#/components/schemas/AccessControlTranslation"
          description: Specify this only in a cross-account scenario (where source and destination bucket owners are not the same), and you want to change replica ownership to the Amazon Web Services account that owns the destination bucket. If this is not specified in the replication configuration, the replicas are owned by same Amazon Web Services account that owns the source object.
        EncryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: A container that provides information about encryption. If SourceSelectionCriteria is specified, you must specify this element.
        ReplicationTime:
          $ref: "#/components/schemas/ReplicationTime"
          description: A container specifying S3 Replication Time Control (S3 RTC), including whether S3 RTC is enabled and the time when all objects and operations on objects must be replicated. Must be specified together with a Metrics block.
        Metrics:
          $ref: "#/components/schemas/Metrics"
          description: A container specifying replication metrics-related settings enabling replication metrics and events.
      required:
        - Bucket
    AccessControlTranslation:
      description: A container for information about access control for replicas.
      type: object
      properties:
        Owner:
          $ref: "#/components/schemas/OwnerOverride"
          description: Specifies the replica ownership. For default and valid values, see PUT bucket replication in the Amazon S3 API Reference.
      required:
        - Owner
    OwnerOverride:
      type: string
      enum:
        - Destination
    EncryptionConfiguration:
      description: Specifies encryption-related information for an Amazon S3 bucket that is a destination for replicated objects. If you're specifying a customer managed KMS key, we recommend using a fully qualified KMS key ARN. If you use a KMS key alias instead, then KMS resolves the key within the requester’s account. This behavior can result in data that's encrypted with a KMS key that belongs to the requester, and not the bucket owner.
      type: object
      properties:
        ReplicaKmsKeyID:
          $ref: "#/components/schemas/ReplicaKmsKeyID"
          description: Specifies the ID (Key ARN or Alias ARN) of the customer managed Amazon Web Services KMS key stored in Amazon Web Services Key Management Service (KMS) for the destination bucket. Amazon S3 uses this key to encrypt replica objects. Amazon S3 only supports symmetric encryption KMS keys. For more information, see Asymmetric keys in Amazon Web Services KMS in the Amazon Web Services Key Management Service Developer Guide.
    ReplicaKmsKeyID:
      type: string
    ReplicationTime:
      description: A container specifying S3 Replication Time Control (S3 RTC) related information, including whether S3 RTC is enabled and the time when all objects and operations on objects must be replicated. Must be specified together with a Metrics block.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ReplicationTimeStatus"
          description: Specifies whether the replication time is enabled.
        Time:
          $ref: "#/components/schemas/ReplicationTimeValue"
          description: A container specifying the time by which replication should be complete for all objects and operations on objects.
      required:
        - Status
        - Time
    ReplicationTimeStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    ReplicationTimeValue:
      description: A container specifying the time value for S3 Replication Time Control (S3 RTC) and replication metrics EventThreshold.
      type: object
      properties:
        Minutes:
          $ref: "#/components/schemas/Minutes"
          description: "Contains an integer specifying time in minutes. Valid value: 15"
    Minutes:
      type: integer
    Metrics:
      description: A container specifying replication metrics-related settings enabling replication metrics and events.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/MetricsStatus"
          description: Specifies whether the replication metrics are enabled.
        EventThreshold:
          $ref: "#/components/schemas/ReplicationTimeValue"
          description: A container specifying the time threshold for emitting the s3:Replication:OperationMissedThreshold event.
      required:
        - Status
    MetricsStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    DeleteMarkerReplication:
      description: Specifies whether Amazon S3 replicates delete markers. If you specify a Filter in your replication configuration, you must also include a DeleteMarkerReplication element. If your Filter includes a Tag element, the DeleteMarkerReplication Status must be set to Disabled, because Amazon S3 does not support replicating delete markers for tag-based rules. For an example configuration, see Basic Rule Configuration. For more information about delete marker replication, see Basic Rule Configuration. If you are using an earlier version of the replication configuration, Amazon S3 handles replication of delete markers differently. For more information, see Backward Compatibility.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/DeleteMarkerReplicationStatus"
          description: Indicates whether to replicate delete markers. Indicates whether to replicate delete markers.
    DeleteMarkerReplicationStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    RequestPaymentConfiguration:
      description: Container for Payer.
      type: object
      properties:
        Payer:
          $ref: "#/components/schemas/Payer"
          description: Specifies who pays for the download and request fees.
      required:
        - Payer
    Payer:
      type: string
      enum:
        - Requester
        - BucketOwner
    Tagging:
      description: Container for TagSet elements.
      type: object
      properties:
        TagSet:
          $ref: "#/components/schemas/TagSet"
          description: A collection for a set of tags
      required:
        - TagSet
    VersioningConfiguration:
      description: Describes the versioning state of an Amazon S3 bucket. For more information, see PUT Bucket versioning in the Amazon S3 API Reference.
      type: object
      properties:
        MFADelete:
          $ref: "#/components/schemas/MFADelete"
          description: Specifies whether MFA delete is enabled in the bucket versioning configuration. This element is only returned if the bucket has been configured with MFA delete. If the bucket has never been so configured, this element is not returned.
        Status:
          $ref: "#/components/schemas/BucketVersioningStatus"
          description: The versioning state of the bucket.
    MFADelete:
      type: string
      enum:
        - Enabled
        - Disabled
    BucketVersioningStatus:
      type: string
      enum:
        - Enabled
        - Suspended
    WebsiteConfiguration:
      description: Specifies website configuration parameters for an Amazon S3 bucket.
      type: object
      properties:
        ErrorDocument:
          $ref: "#/components/schemas/ErrorDocument"
          description: The name of the error document for the website.
        IndexDocument:
          $ref: "#/components/schemas/IndexDocument"
          description: The name of the index document for the website.
        RedirectAllRequestsTo:
          $ref: "#/components/schemas/RedirectAllRequestsTo"
          description: The redirect behavior for every request to this bucket's website endpoint. If you specify this property, you can't specify any other property.
        RoutingRules:
          $ref: "#/components/schemas/RoutingRules"
          description: Rules that define when a redirect is applied and the redirect behavior.
    ErrorDocument:
      description: The error information.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/ObjectKey"
          description: The object key name to use when a 4XX class error occurs. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
      required:
        - Key
    IndexDocument:
      description: Container for the Suffix element.
      type: object
      properties:
        Suffix:
          $ref: "#/components/schemas/Suffix"
          description: A suffix that is appended to a request that is for a directory on the website endpoint. (For example, if the suffix is index.html and you make a request to samplebucket/images/, the data that is returned will be for the object with the key name images/index.html.) The suffix must not be empty and must not include a slash character. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
      required:
        - Suffix
    Suffix:
      type: string
    RedirectAllRequestsTo:
      description: Specifies the redirect behavior of all requests to a website endpoint of an Amazon S3 bucket.
      type: object
      properties:
        HostName:
          $ref: "#/components/schemas/HostName"
          description: Name of the host where requests are redirected.
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: Protocol to use when redirecting requests. The default is the protocol that is used in the original request.
      required:
        - HostName
    HostName:
      type: string
    Protocol:
      type: string
      enum:
        - http
        - https
    RoutingRules:
      type: array
      items:
        $ref: "#/components/schemas/RoutingRule"
    RoutingRule:
      description: Specifies the redirect behavior and when a redirect is applied. For more information about routing rules, see Configuring advanced conditional redirects in the Amazon S3 User Guide.
      type: object
      properties:
        Condition:
          $ref: "#/components/schemas/Condition"
          description: A container for describing a condition that must be met for the specified redirect to apply. For example, 1. If request is for pages in the /docs folder, redirect to the /documents folder. 2. If request results in HTTP error 4xx, redirect request to another host where you might process the error.
        Redirect:
          $ref: "#/components/schemas/Redirect"
          description: Container for redirect information. You can redirect requests to another host, to another page, or with another protocol. In the event of an error, you can specify a different error code to return.
      required:
        - Redirect
    Condition:
      description: A container for describing a condition that must be met for the specified redirect to apply. For example, 1. If request is for pages in the /docs folder, redirect to the /documents folder. 2. If request results in HTTP error 4xx, redirect request to another host where you might process the error.
      type: object
      properties:
        HttpErrorCodeReturnedEquals:
          $ref: "#/components/schemas/HttpErrorCodeReturnedEquals"
          description: The HTTP error code when the redirect is applied. In the event of an error, if the error code equals this value, then the specified redirect is applied. Required when parent element Condition is specified and sibling KeyPrefixEquals is not specified. If both are specified, then both must be true for the redirect to be applied.
        KeyPrefixEquals:
          $ref: "#/components/schemas/KeyPrefixEquals"
          description: The object key name prefix when the redirect is applied. For example, to redirect requests for ExamplePage.html, the key prefix will be ExamplePage.html. To redirect request for all pages with the prefix docs/, the key prefix will be /docs, which identifies all objects in the docs/ folder. Required when the parent element Condition is specified and sibling HttpErrorCodeReturnedEquals is not specified. If both conditions are specified, both must be true for the redirect to be applied. Replacement must be made for object keys containing special characters (such as carriage returns) when using XML requests. For more information, see XML related object key constraints.
    HttpErrorCodeReturnedEquals:
      type: string
    KeyPrefixEquals:
      type: string
    Redirect:
