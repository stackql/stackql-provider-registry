          description: Specifies the customer-provided encryption key for Amazon S3 to use to decrypt the source object. The encryption key provided in this header must be one that was used when the source object was created. This functionality is not supported when the source object is in a directory bucket.
        - name: x-amz-copy-source-server-side-encryption-customer-key-MD5
          in: header
