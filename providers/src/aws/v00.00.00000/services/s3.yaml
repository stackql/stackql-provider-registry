    CompletedPartList:
      type: array
      items:
        $ref: "#/components/schemas/CompletedPart"
    CompletedPart:
      description: Details of the parts that were uploaded.
      type: object
      properties:
        ETag:
          $ref: "#/components/schemas/ETag"
          description: Entity tag returned when the part was uploaded.
        ChecksumCRC32:
          $ref: "#/components/schemas/ChecksumCRC32"
          description: The Base64 encoded, 32-bit CRC32 checksum of the part. This checksum is present if the multipart upload request was created with the CRC32 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumCRC32C:
          $ref: "#/components/schemas/ChecksumCRC32C"
          description: The Base64 encoded, 32-bit CRC32C checksum of the part. This checksum is present if the multipart upload request was created with the CRC32C checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumCRC64NVME:
          $ref: "#/components/schemas/ChecksumCRC64NVME"
          description: The Base64 encoded, 64-bit CRC64NVME checksum of the part. This checksum is present if the multipart upload request was created with the CRC64NVME checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumSHA1:
          $ref: "#/components/schemas/ChecksumSHA1"
          description: The Base64 encoded, 160-bit SHA1 checksum of the part. This checksum is present if the multipart upload request was created with the SHA1 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumSHA256:
          $ref: "#/components/schemas/ChecksumSHA256"
          description: The Base64 encoded, 256-bit SHA256 checksum of the part. This checksum is present if the multipart upload request was created with the SHA256 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumSHA512:
          $ref: "#/components/schemas/ChecksumSHA512"
          description: The Base64 encoded, 512-bit SHA512 digest of the part. This checksum is present if the multipart upload request was created with the SHA512 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumMD5:
          $ref: "#/components/schemas/ChecksumMD5"
          description: The Base64 encoded, 128-bit MD5 digest of the part. This checksum is present if the multipart upload request was created with the MD5 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumXXHASH64:
          $ref: "#/components/schemas/ChecksumXXHASH64"
          description: The Base64 encoded, 64-bit XXHASH64 checksum of the part. This checksum is present if the multipart upload request was created with the XXHASH64 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumXXHASH3:
          $ref: "#/components/schemas/ChecksumXXHASH3"
          description: The Base64 encoded, 64-bit XXHASH3 checksum of the part. This checksum is present if the multipart upload request was created with the XXHASH3 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        ChecksumXXHASH128:
          $ref: "#/components/schemas/ChecksumXXHASH128"
          description: The Base64 encoded, 128-bit XXHASH128 checksum of the part. This checksum is present if the multipart upload request was created with the XXHASH128 checksum algorithm. For more information, see Checking object integrity in the Amazon S3 User Guide.
        PartNumber:
          $ref: "#/components/schemas/PartNumber"
          description: Part number that identifies the part. This is a positive integer between 1 and 10,000. General purpose buckets - In CompleteMultipartUpload, when a additional checksum (including x-amz-checksum-crc32, x-amz-checksum-crc32c, x-amz-checksum-sha1, or x-amz-checksum-sha256) is applied to each part, the PartNumber must start at 1 and the part numbers must be consecutive. Otherwise, Amazon S3 generates an HTTP 400 Bad Request status code and an InvalidPartOrder error code. Directory buckets - In CompleteMultipartUpload, the PartNumber must start at 1 and the part numbers must be consecutive.
