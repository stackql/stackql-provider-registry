openapi: 3.0.0
info:
  version: "2017-01-26"
  title: AWS Resource Groups Tagging API
  description: AWS Resource Groups Tagging API
  x-serviceName: tagging
  x-serviceAlias: resourcegroupstaggingapi
  x-protocol: json
  x-apiVersion: "2017-01-26"
  x-endpointPrefix: tagging
  x-targetPrefix: ResourceGroupsTaggingAPI_20170126
  x-jsonVersion: "1.1"
servers:
  - url: https://tagging.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for resourcegroupstaggingapi
paths:
  /DescribeReportCreation:
    post:
      operationId: DescribeReportCreation
      description: Describes the status of the StartReportCreation operation. You can call this operation only from the organization's management account and from the us-east-1 Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.DescribeReportCreation
            default: ResourceGroupsTaggingAPI_20170126.DescribeReportCreation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReportCreationOutput"
  /GetComplianceSummary:
    post:
      operationId: GetComplianceSummary
      description: Returns a table that shows counts of resources that are noncompliant with their tag policies. For more information on tag policies, see Tag Policies in the Organizations User Guide. You can call this operation only from the organization's management account and from the us-east-1 Region. This operation supports pagination, where the response can be sent in multiple pages. You should check the PaginationToken response parameter to determine if there are additional results available to return. Repeat the query, passing the PaginationToken response parameter value as an input to the next request until you recieve a null value. A null value for PaginationToken indicates that there are no more results waiting to be returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.GetComplianceSummary
            default: ResourceGroupsTaggingAPI_20170126.GetComplianceSummary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetIdFilters:
                  $ref: "#/components/schemas/TargetIdFilterList"
                  description: Specifies target identifiers (usually, specific account IDs) to limit the output by. If you use this parameter, the count of returned noncompliant resources includes only resources with the specified target IDs.
                RegionFilters:
                  $ref: "#/components/schemas/RegionFilterList"
                  description: Specifies a list of Amazon Web Services Regions to limit the output to. If you use this parameter, the count of returned noncompliant resources includes only resources in the specified Regions.
                ResourceTypeFilters:
                  $ref: "#/components/schemas/ResourceTypeFilterList"
                  description: "Specifies that you want the response to include information for only resources of the specified types. The format of each resource type is service[:resourceType]. For example, specifying a resource type of ec2 returns all Amazon EC2 resources (which includes EC2 instances). Specifying a resource type of ec2:instance returns only EC2 instances. The string for each service name and resource type is the same as that embedded in a resource's Amazon Resource Name (ARN). Consult the Amazon Web Services General Reference for the following: For a list of service name strings, see Amazon Web Services Service Namespaces. For resource type strings, see Example ARNs. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces. For the list of services whose resources you can tag using the Resource Groups Tagging API, see Services that support the Resource Groups Tagging API. If an Amazon Web Services service isn't listed on that page, you might still be able to tag that service's resources by using that service's native tagging operations instead of using Resource Groups Tagging API operations. All tagged resources, whether the tagging used the Resource Groups Tagging API or not, are returned by the Get* operation. You can specify multiple resource types by using a comma separated array. The array can include up to 100 items. Note that the length constraint requirement applies to each resource type filter."
                TagKeyFilters:
                  $ref: "#/components/schemas/TagKeyFilterList"
                  description: Specifies that you want the response to include information for only resources that have tags with the specified tag keys. If you use this parameter, the count of returned noncompliant resources includes only resources that have the specified tag keys.
                GroupBy:
                  $ref: "#/components/schemas/GroupBy"
                  description: Specifies a list of attributes to group the counts of noncompliant resources by. If supplied, the counts are sorted by those attributes.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsGetComplianceSummary"
                  description: Specifies the maximum number of results to be returned in each page. A query can return fewer than this maximum, even if there are more results still to return. You should always check the PaginationToken response value to see if there are more results. You can specify a minimum of 1 and a maximum value of 100.
                PaginationToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Specifies a PaginationToken response value from a previous request to indicate that you want the next page of results. Leave this parameter empty in your initial request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComplianceSummaryOutput"
  /GetResources:
    post:
      operationId: GetResources
      description: "Returns all the tagged or previously tagged resources that are located in the specified Amazon Web Services Region for the account. Depending on what information you want returned, you can also specify the following: Filters that specify what tags and resource types you want returned. The response includes all tags that are associated with the requested resources. Information about compliance with the account's effective tag policy. For more information on tag policies, see Tag Policies in the Organizations User Guide. This operation supports pagination, where the response can be sent in multiple pages. You should check the PaginationToken response parameter to determine if there are additional results available to return. Repeat the query, passing the PaginationToken response parameter value as an input to the next request until you recieve a null value. A null value for PaginationToken indicates that there are no more results waiting to be returned. GetResources does not return untagged resources. To find untagged resources in your account, use Amazon Web Services Resource Explorer with a query that uses tag:none. For more information, see Search query syntax reference for Resource Explorer."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.GetResources
            default: ResourceGroupsTaggingAPI_20170126.GetResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PaginationToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Specifies a PaginationToken response value from a previous request to indicate that you want the next page of results. Leave this parameter empty in your initial request.
                TagFilters:
                  $ref: "#/components/schemas/TagFilterList"
                  description: "Specifies a list of TagFilters (keys and values) to restrict the output to only those resources that have tags with the specified keys and, if included, the specified values. Each TagFilter must contain a key with values optional. A request can include up to 50 keys, and each key can include up to 20 values. You can't specify both this parameter and the ResourceArnList parameter in the same request. If you do, you get an Invalid Parameter exception. Note the following when deciding how to use TagFilters: If you don't specify a TagFilter, the response includes all resources that are currently tagged or ever had a tag. Resources that were previously tagged, but do not currently have tags, are shown with an empty tag set, like this: \"Tags\": []. If you specify more than one filter in a single request, the response returns only those resources that satisfy all filters. If you specify a filter that contains more than one value for a key, the response returns resources that match any of the specified values for that key. If you don't specify a value for a key, the response returns all resources that are tagged with that key, with any or no value. For example, for the following filters: filter1= {key1,{value1}}, filter2={key2,{value2,value3,value4}}, filter3= {key3}: GetResources({filter1}) returns resources tagged with key1=value1 GetResources({filter2}) returns resources tagged with key2=value2 or key2=value3 or key2=value4 GetResources({filter3}) returns resources tagged with any tag with the key key3, and with any or no value GetResources({filter1,filter2,filter3}) returns resources tagged with (key1=value1) and (key2=value2 or key2=value3 or key2=value4) and (key3, any or no value)"
                ResourcesPerPage:
                  $ref: "#/components/schemas/ResourcesPerPage"
                  description: Specifies the maximum number of results to be returned in each page. A query can return fewer than this maximum, even if there are more results still to return. You should always check the PaginationToken response value to see if there are more results. You can specify a minimum of 1 and a maximum value of 100.
                TagsPerPage:
                  $ref: "#/components/schemas/TagsPerPage"
                  description: Amazon Web Services recommends using ResourcesPerPage instead of this parameter. A limit that restricts the number of tags (key and value pairs) returned by GetResources in paginated output. A resource with no tags is counted as having one tag (one key and value pair). GetResources does not split a resource and its associated tags across pages. If the specified TagsPerPage would cause such a break, a PaginationToken is returned in place of the affected resource and its tags. Use that token in another request to get the remaining data. For example, if you specify a TagsPerPage of 100 and the account has 22 resources with 10 tags each (meaning that each resource has 10 key and value pairs), the output will consist of three pages. The first page displays the first 10 resources, each with its 10 tags. The second page displays the next 10 resources, each with its 10 tags. The third page displays the remaining 2 resources, each with its 10 tags. You can set TagsPerPage to a minimum of 100 items up to a maximum of 500 items.
                ResourceTypeFilters:
                  $ref: "#/components/schemas/ResourceTypeFilterList"
                  description: "Specifies the resource types that you want included in the response. The format of each resource type is service[:resourceType]. For example, specifying a service of ec2 returns all Amazon EC2 resources (which includes EC2 instances). Specifying a resource type of ec2:instance returns only EC2 instances. You can't specify both this parameter and the ResourceArnList parameter in the same request. If you do, you get an Invalid Parameter exception. The string for each service name and resource type is the same as that embedded in a resource's Amazon Resource Name (ARN). For the list of services whose resources you can tag using the Resource Groups Tagging API, see Services that support the Resource Groups Tagging API. If an Amazon Web Services service isn't listed on that page, you might still be able to tag that service's resources by using that service's native tagging operations instead of using Resource Groups Tagging API operations. All tagged resources, whether the tagging used the Resource Groups Tagging API or not, are returned by the Get* operation. You can specify multiple resource types by using an array. The array can include up to 100 items. Note that the length constraint requirement applies to each resource type filter. For example, the following string would limit the response to only Amazon EC2 instances, Amazon S3 buckets, or any Audit Manager resource: ec2:instance,s3:bucket,auditmanager"
                IncludeComplianceDetails:
                  $ref: "#/components/schemas/IncludeComplianceDetails"
                  description: Specifies whether to include details regarding the compliance with the effective tag policy. Set this to true to determine whether resources are compliant with the tag policy and to get details.
                ExcludeCompliantResources:
                  $ref: "#/components/schemas/ExcludeCompliantResources"
                  description: Specifies whether to exclude resources that are compliant with the tag policy. Set this to true if you are interested in retrieving information on noncompliant resources only. You can use this parameter only if the IncludeComplianceDetails parameter is also set to true.
                ResourceARNList:
                  $ref: "#/components/schemas/ResourceARNListForGet"
                  description: Specifies a list of ARNs of resources for which you want to retrieve tag data. You can't specify both this parameter and the ResourceTypeFilters parameter in the same request. If you do, you get an Invalid Parameter exception. You can't specify both this parameter and the TagFilters parameter in the same request. If you do, you get an Invalid Parameter exception. You can't specify both this parameter and any of the pagination parameters (ResourcesPerPage, TagsPerPage, PaginationToken) in the same request. If you do, you get an Invalid Parameter exception. If a resource specified by this parameter doesn't exist, it doesn't generate an error; it simply isn't included in the response. An ARN (Amazon Resource Name) uniquely identifies a resource. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcesOutput"
  /GetTagKeys:
    post:
      operationId: GetTagKeys
      description: Returns all tag keys currently in use in the specified Amazon Web Services Region for the calling account. This operation supports pagination, where the response can be sent in multiple pages. You should check the PaginationToken response parameter to determine if there are additional results available to return. Repeat the query, passing the PaginationToken response parameter value as an input to the next request until you recieve a null value. A null value for PaginationToken indicates that there are no more results waiting to be returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.GetTagKeys
            default: ResourceGroupsTaggingAPI_20170126.GetTagKeys
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PaginationToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Specifies a PaginationToken response value from a previous request to indicate that you want the next page of results. Leave this parameter empty in your initial request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTagKeysOutputDisplay"
  /GetTagValues:
    post:
      operationId: GetTagValues
      description: Returns all tag values for the specified key that are used in the specified Amazon Web Services Region for the calling account. This operation supports pagination, where the response can be sent in multiple pages. You should check the PaginationToken response parameter to determine if there are additional results available to return. Repeat the query, passing the PaginationToken response parameter value as an input to the next request until you recieve a null value. A null value for PaginationToken indicates that there are no more results waiting to be returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.GetTagValues
            default: ResourceGroupsTaggingAPI_20170126.GetTagValues
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PaginationToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Specifies a PaginationToken response value from a previous request to indicate that you want the next page of results. Leave this parameter empty in your initial request.
                Key:
                  $ref: "#/components/schemas/TagKey"
                  description: Specifies the tag key for which you want to list all existing values that are currently used in the specified Amazon Web Services Region for the calling account.
              required:
                - Key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTagValuesOutputDisplay"
  /ListRequiredTags:
    post:
      operationId: ListRequiredTags
      description: Lists the required tags for supported resource types in an Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.ListRequiredTags
            default: ResourceGroupsTaggingAPI_20170126.ListRequiredTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A token for requesting another page of required tags if the NextToken response element indicates that more required tags are available. Use the value of the returned NextToken element in your request until the token comes back as null. Pass null if this is the first call.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsForListRequiredTags"
                  description: The maximum number of required tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRequiredTagsOutput"
  /StartReportCreation:
    post:
      operationId: StartReportCreation
      description: "Generates a report that lists all tagged resources in the accounts across your organization and tells whether each resource is compliant with the effective tag policy. Compliance data is refreshed daily. The report is generated asynchronously. The generated report is saved to the following location: s3://amzn-s3-demo-bucket/AwsTagPolicies/o-exampleorgid/YYYY-MM-ddTHH:mm:ssZ/report.csv For more information about evaluating resource compliance with tag policies, including the required permissions, review Permissions for evaluating organization-wide compliance in the Tagging Amazon Web Services Resources and Tag Editor user guide. You can call this operation only from the organization's management account and from the us-east-1 Region. If the account associated with the identity used to call StartReportCreation is different from the account that owns the Amazon S3 bucket, there must be a bucket policy attached to the bucket to provide access. For more information, review Amazon S3 bucket policy for report storage in the Tagging Amazon Web Services Resources and Tag Editor user guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.StartReportCreation
            default: ResourceGroupsTaggingAPI_20170126.StartReportCreation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                S3Bucket:
                  $ref: "#/components/schemas/S3Bucket"
                  description: "The name of the Amazon S3 bucket where the report will be stored; for example: amzn-s3-demo-bucket For more information on S3 bucket requirements, including an example bucket policy, see the example Amazon S3 bucket policy on this page."
              required:
                - S3Bucket
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReportCreationOutput"
  /TagResources:
    post:
      operationId: TagResources
      description: "Applies one or more tags to the specified resources. Note the following: Not all resources can have tags. For a list of services with resources that support tagging using this operation, see Services that support the Resource Groups Tagging API. If the resource doesn't yet support this operation, the resource's service might support tagging using its own API operations. For more information, refer to the documentation for that service. Each resource can have up to 50 tags. For other limits, see Tag Naming and Usage Conventions in the Amazon Web Services General Reference. You can only tag resources that are located in the specified Amazon Web Services Region for the Amazon Web Services account. To add tags to a resource, you need the necessary permissions for the service that the resource belongs to as well as permissions for adding tags. For more information, see the documentation for each service. When you use the Amazon Web Services Resource Groups Tagging API to update tags for Amazon Web Services CloudFormation stack sets, Amazon Web Services calls the Amazon Web Services CloudFormation UpdateStack operation. This operation may initiate additional resource property updates in addition to the desired tag updates. To avoid unexpected resource updates, Amazon Web Services recommends that you only apply or update tags to your CloudFormation stack sets using Amazon Web Services CloudFormation. Do not store personally identifiable information (PII) or other confidential or sensitive information in tags. We use tags to provide you with billing and administration services. Tags are not intended to be used for private or sensitive data. Minimum permissions In addition to the tag:TagResources permission required by this operation, you must also have the tagging permission defined by the service that created the resource. For example, to tag an Amazon EC2 instance using the TagResources operation, you must have both of the following permissions: tag:TagResources ec2:CreateTags In addition, some services might have specific requirements for tagging some types of resources. For example, to tag an Amazon S3 bucket, you must also have the s3:GetBucketTagging permission. If the expected minimum permissions don't work, check the documentation for that service's tagging APIs for more information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.TagResources
            default: ResourceGroupsTaggingAPI_20170126.TagResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARNList:
                  $ref: "#/components/schemas/ResourceARNListForTagUntag"
                  description: Specifies the list of ARNs of the resources that you want to apply tags to. An ARN (Amazon Resource Name) uniquely identifies a resource. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                Tags:
                  $ref: "#/components/schemas/TagMap"
                  description: Specifies a list of tags that you want to add to the specified resources. A tag consists of a key and a value that you define.
              required:
                - ResourceARNList
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourcesOutput"
  /UntagResources:
    post:
      operationId: UntagResources
      description: "Removes the specified tags from the specified resources. When you specify a tag key, the action removes both that key and its associated value. The operation succeeds even if you attempt to remove tags from a resource that were already removed. Note the following: To remove tags from a resource, you need the necessary permissions for the service that the resource belongs to as well as permissions for removing tags. For more information, see the documentation for the service whose resource you want to untag. You can only tag resources that are located in the specified Amazon Web Services Region for the calling Amazon Web Services account. Minimum permissions In addition to the tag:UntagResources permission required by this operation, you must also have the remove tags permission defined by the service that created the resource. For example, to remove the tags from an Amazon EC2 instance using the UntagResources operation, you must have both of the following permissions: tag:UntagResources ec2:DeleteTags In addition, some services might have specific requirements for untagging some types of resources. For example, to untag Amazon Web Services Glue Connection, you must also have the glue:GetConnection permission. If the expected minimum permissions don't work, check the documentation for that service's tagging APIs for more information."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ResourceGroupsTaggingAPI_20170126.UntagResources
            default: ResourceGroupsTaggingAPI_20170126.UntagResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARNList:
                  $ref: "#/components/schemas/ResourceARNListForTagUntag"
                  description: Specifies a list of ARNs of the resources that you want to remove tags from. An ARN (Amazon Resource Name) uniquely identifies a resource. For more information, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyListForUntag"
                  description: Specifies a list of tag keys that you want to remove from the specified resources.
              required:
                - ResourceARNList
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourcesOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DescribeReportCreationOutput:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/Status"
          description: "Reports the status of the operation. The operation status can be one of the following: RUNNING - Report creation is in progress. SUCCEEDED - Report creation is complete. You can open the report from the Amazon S3 bucket that you specified when you ran StartReportCreation. FAILED - Report creation timed out or the Amazon S3 bucket is not accessible. NO REPORT - No report was generated in the last 90 days."
        S3Location:
          $ref: "#/components/schemas/S3Location"
          description: The path to the Amazon S3 bucket where the report was stored on creation.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: Details of the common errors that all operations return.
    Status:
      type: string
    S3Location:
      type: string
    ErrorMessage:
      type: string
    TargetIdFilterList:
      type: array
      items:
        $ref: "#/components/schemas/TargetId"
    TargetId:
      type: string
      minLength: 6
      maxLength: 68
      pattern: "[a-zA-Z0-9-]*"
    RegionFilterList:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\s\\S]*"
    ResourceTypeFilterList:
      type: array
      items:
        $ref: "#/components/schemas/AmazonResourceType"
    AmazonResourceType:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\s\\S]*"
    TagKeyFilterList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\s\\S]*"
    GroupBy:
      type: array
      items:
        $ref: "#/components/schemas/GroupByAttribute"
    GroupByAttribute:
      type: string
      enum:
        - TARGET_ID
        - REGION
        - RESOURCE_TYPE
    MaxResultsGetComplianceSummary:
      type: integer
      minimum: 1
      maximum: 1000
    PaginationToken:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\s\\S]*"
    GetComplianceSummaryOutput:
      type: object
      properties:
        SummaryList:
          $ref: "#/components/schemas/SummaryList"
          description: A table that shows counts of noncompliant resources.
        PaginationToken:
          $ref: "#/components/schemas/PaginationToken"
          description: A string that indicates that there is more data available than this response contains. To receive the next part of the response, specify this response value as the PaginationToken value in the request for the next page.
    SummaryList:
      type: array
      items:
        $ref: "#/components/schemas/Summary"
    Summary:
      description: A count of noncompliant resources.
      type: object
      properties:
        LastUpdated:
          $ref: "#/components/schemas/LastUpdated"
          description: The timestamp that shows when this summary was generated in this Region.
        TargetId:
          $ref: "#/components/schemas/TargetId"
          description: The account identifier or the root identifier of the organization. If you don't know the root ID, you can call the Organizations ListRoots API.
        TargetIdType:
          $ref: "#/components/schemas/TargetIdType"
          description: Whether the target is an account, an OU, or the organization root.
        Region:
          $ref: "#/components/schemas/Region"
          description: The Amazon Web Services Region that the summary applies to.
        ResourceType:
          $ref: "#/components/schemas/AmazonResourceType"
          description: The Amazon Web Services resource type.
        NonCompliantResources:
          $ref: "#/components/schemas/NonCompliantResources"
          description: The count of noncompliant resources.
    LastUpdated:
      type: string
    TargetIdType:
      type: string
      enum:
        - ACCOUNT
        - OU
        - ROOT
    NonCompliantResources:
      type: integer
      format: int64
    TagFilterList:
      type: array
