openapi: 3.0.0
info:
  version: "2020-12-01"
  title: AWS Fault Injection Simulator
  description: AWS Fault Injection Simulator
  x-serviceName: fis
  x-serviceAlias: fis
  x-protocol: rest-json
  x-apiVersion: "2020-12-01"
  x-endpointPrefix: fis
  x-jsonVersion: "1.1"
servers:
  - url: https://fis.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for fis
paths:
  /experimentTemplates:
    post:
      operationId: CreateExperimentTemplate
      description: "Creates an experiment template. An experiment template includes the following components: Targets: A target can be a specific resource in your Amazon Web Services environment, or one or more resources that match criteria that you specify, for example, resources that have specific tags. Actions: The actions to carry out on the target. You can specify multiple actions, the duration of each action, and when to start each action during an experiment. Stop conditions: If a stop condition is triggered while an experiment is running, the experiment is automatically stopped. You can define a stop condition as a CloudWatch alarm. For more information, see experiment templates in the Fault Injection Service User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                description:
                  $ref: "#/components/schemas/ExperimentTemplateDescription"
                stopConditions:
                  $ref: "#/components/schemas/CreateExperimentTemplateStopConditionInputList"
                targets:
                  $ref: "#/components/schemas/CreateExperimentTemplateTargetInputMap"
                actions:
                  $ref: "#/components/schemas/CreateExperimentTemplateActionInputMap"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
                logConfiguration:
                  $ref: "#/components/schemas/CreateExperimentTemplateLogConfigurationInput"
                experimentOptions:
                  $ref: "#/components/schemas/CreateExperimentTemplateExperimentOptionsInput"
                experimentReportConfiguration:
                  $ref: "#/components/schemas/CreateExperimentTemplateReportConfigurationInput"
              required:
                - clientToken
                - description
                - stopConditions
                - actions
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExperimentTemplateResponse"
    get:
      operationId: ListExperimentTemplates
      description: Lists your experiment templates.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListExperimentTemplatesMaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExperimentTemplatesResponse"
  /experimentTemplates/{id}/targetAccountConfigurations/{account_id}:
    post:
      operationId: CreateTargetAccountConfiguration
      description: Creates a target account configuration for the experiment template. A target account configuration is required when accountTargeting of experimentOptions is set to multi-account. For more information, see experiment options in the Fault Injection Service User Guide.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The experiment template ID.
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetAccountId"
          description: The Amazon Web Services account ID of the target account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                description:
                  $ref: "#/components/schemas/TargetAccountConfigurationDescription"
              required:
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTargetAccountConfigurationResponse"
    delete:
      operationId: DeleteTargetAccountConfiguration
      description: Deletes the specified target account configuration of the experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetAccountId"
          description: The Amazon Web Services account ID of the target account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTargetAccountConfigurationResponse"
    get:
      operationId: GetTargetAccountConfiguration
      description: Gets information about the specified target account configuration of the experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetAccountId"
          description: The Amazon Web Services account ID of the target account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTargetAccountConfigurationResponse"
    patch:
      operationId: UpdateTargetAccountConfiguration
      description: Updates the target account configuration for the specified experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetAccountId"
          description: The Amazon Web Services account ID of the target account.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                description:
                  $ref: "#/components/schemas/TargetAccountConfigurationDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTargetAccountConfigurationResponse"
  /experimentTemplates/{id}:
    delete:
      operationId: DeleteExperimentTemplate
      description: Deletes the specified experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteExperimentTemplateResponse"
    get:
      operationId: GetExperimentTemplate
      description: Gets information about the specified experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExperimentTemplateResponse"
    patch:
      operationId: UpdateExperimentTemplate
      description: Updates the specified experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/ExperimentTemplateDescription"
                stopConditions:
                  $ref: "#/components/schemas/UpdateExperimentTemplateStopConditionInputList"
                targets:
                  $ref: "#/components/schemas/UpdateExperimentTemplateTargetInputMap"
                actions:
                  $ref: "#/components/schemas/UpdateExperimentTemplateActionInputMap"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                logConfiguration:
                  $ref: "#/components/schemas/UpdateExperimentTemplateLogConfigurationInput"
                experimentOptions:
                  $ref: "#/components/schemas/UpdateExperimentTemplateExperimentOptionsInput"
                experimentReportConfiguration:
                  $ref: "#/components/schemas/UpdateExperimentTemplateReportConfigurationInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateExperimentTemplateResponse"
  /actions/{id}:
    get:
      operationId: GetAction
      description: Gets information about the specified FIS action.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ActionId"
          description: The ID of the action.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetActionResponse"
  /experiments/{id}:
    get:
      operationId: GetExperiment
      description: Gets information about the specified experiment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentId"
          description: The ID of the experiment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExperimentResponse"
    delete:
      operationId: StopExperiment
      description: Stops the specified experiment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentId"
          description: The ID of the experiment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopExperimentResponse"
  /experiments/{id}/targetAccountConfigurations/{account_id}:
    get:
      operationId: GetExperimentTargetAccountConfiguration
      description: Gets information about the specified target account configuration of the experiment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentId"
          description: The ID of the experiment.
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetAccountId"
          description: The Amazon Web Services account ID of the target account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExperimentTargetAccountConfigurationResponse"
  /safetyLevers/{id}:
    get:
      operationId: GetSafetyLever
      description: Gets information about the specified safety lever.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SafetyLeverId"
          description: The ID of the safety lever.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSafetyLeverResponse"
  /targetResourceTypes/{resource_type}:
    get:
      operationId: GetTargetResourceType
      description: Gets information about the specified resource type.
      parameters:
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetResourceTypeId"
          description: The resource type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTargetResourceTypeResponse"
  /actions:
    get:
      operationId: ListActions
      description: Lists the available FIS actions.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListActionsMaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionsResponse"
  /experiments/{id}/resolvedTargets:
    get:
      operationId: ListExperimentResolvedTargets
      description: Lists the resolved targets information of the specified experiment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentId"
          description: The ID of the experiment.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListExperimentResolvedTargetsMaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
        - name: targetName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TargetName"
          description: The name of the target.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExperimentResolvedTargetsResponse"
  /experiments/{id}/targetAccountConfigurations:
    get:
      operationId: ListExperimentTargetAccountConfigurations
      description: Lists the target account configurations of the specified experiment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentId"
          description: The ID of the experiment.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExperimentTargetAccountConfigurationsResponse"
  /experiments:
    get:
      operationId: ListExperiments
      description: Lists your experiments.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListExperimentsMaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
        - name: experimentTemplateId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExperimentsResponse"
    post:
      operationId: StartExperiment
      description: Starts running an experiment from the specified experiment template.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                experimentTemplateId:
                  $ref: "#/components/schemas/ExperimentTemplateId"
                experimentOptions:
                  $ref: "#/components/schemas/StartExperimentExperimentOptionsInput"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - clientToken
                - experimentTemplateId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartExperimentResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Applies the specified tags to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the specified tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /experimentTemplates/{id}/targetAccountConfigurations:
    get:
      operationId: ListTargetAccountConfigurations
      description: Lists the target account configurations of the specified experiment template.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ExperimentTemplateId"
          description: The ID of the experiment template.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTargetAccountConfigurationsMaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTargetAccountConfigurationsResponse"
  /targetResourceTypes:
    get:
      operationId: ListTargetResourceTypes
      description: Lists the target resource types.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListTargetResourceTypesMaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTargetResourceTypesResponse"
  /safetyLevers/{id}/state:
    patch:
      operationId: UpdateSafetyLeverState
      description: Updates the specified safety lever state.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SafetyLeverId"
          description: The ID of the safety lever.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  $ref: "#/components/schemas/UpdateSafetyLeverStateInput"
              required:
                - state
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSafetyLeverStateResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientToken:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\S]+"
    ExperimentTemplateDescription:
      type: string
      maxLength: 512
      pattern: "[\\s\\S]+"
    CreateExperimentTemplateStopConditionInputList:
      type: array
      items:
        $ref: "#/components/schemas/CreateExperimentTemplateStopConditionInput"
    CreateExperimentTemplateStopConditionInput:
      description: Specifies a stop condition for an experiment template.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/StopConditionSource"
          description: The source for the stop condition. Specify aws:cloudwatch:alarm if the stop condition is defined by a CloudWatch alarm. Specify none if there is no stop condition.
        value:
          $ref: "#/components/schemas/StopConditionValue"
          description: The Amazon Resource Name (ARN) of the CloudWatch alarm. This is required if the source is a CloudWatch alarm.
      required:
        - source
    StopConditionSource:
      type: string
      maxLength: 64
      pattern: "[\\S]+"
    StopConditionValue:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: "[\\s\\S]+"
    CreateExperimentTemplateTargetInputMap:
      type: object
      properties: {}
    CreateExperimentTemplateActionInputMap:
      type: object
      properties: {}
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: "[\\S]+"
    TagMap:
      type: object
      properties: {}
    CreateExperimentTemplateLogConfigurationInput:
      description: Specifies the configuration for experiment logging.
      type: object
      properties:
        cloudWatchLogsConfiguration:
          $ref: "#/components/schemas/ExperimentTemplateCloudWatchLogsLogConfigurationInput"
          description: The configuration for experiment logging to Amazon CloudWatch Logs.
        s3Configuration:
          $ref: "#/components/schemas/ExperimentTemplateS3LogConfigurationInput"
          description: The configuration for experiment logging to Amazon S3.
        logSchemaVersion:
          $ref: "#/components/schemas/LogSchemaVersion"
          description: The schema version.
      required:
        - logSchemaVersion
    ExperimentTemplateCloudWatchLogsLogConfigurationInput:
      description: Specifies the configuration for experiment logging to Amazon CloudWatch Logs.
      type: object
      properties:
        logGroupArn:
          $ref: "#/components/schemas/CloudWatchLogGroupArn"
          description: The Amazon Resource Name (ARN) of the destination Amazon CloudWatch Logs log group.
      required:
        - logGroupArn
    CloudWatchLogGroupArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: "[\\S]+"
    ExperimentTemplateS3LogConfigurationInput:
      description: Specifies the configuration for experiment logging to Amazon S3.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the destination bucket.
        prefix:
          $ref: "#/components/schemas/S3ObjectKey"
          description: The bucket prefix.
      required:
        - bucketName
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[\\S]+"
    S3ObjectKey:
      type: string
      minLength: 1
      maxLength: 700
      pattern: "[\\s\\S]+"
    LogSchemaVersion:
      type: integer
    CreateExperimentTemplateExperimentOptionsInput:
      description: Specifies experiment options for an experiment template.
      type: object
      properties:
        accountTargeting:
          $ref: "#/components/schemas/AccountTargeting"
          description: Specifies the account targeting setting for experiment options.
        emptyTargetResolutionMode:
          $ref: "#/components/schemas/EmptyTargetResolutionMode"
          description: Specifies the empty target resolution mode for experiment options.
    AccountTargeting:
      type: string
      enum:
        - single-account
        - multi-account
    EmptyTargetResolutionMode:
      type: string
      enum:
        - fail
        - skip
    CreateExperimentTemplateReportConfigurationInput:
      description: Specifies the configuration for experiment reports.
      type: object
      properties:
        outputs:
          $ref: "#/components/schemas/ExperimentTemplateReportConfigurationOutputsInput"
          description: The output destinations of the experiment report.
        dataSources:
          $ref: "#/components/schemas/ExperimentTemplateReportConfigurationDataSourcesInput"
          description: The data sources for the experiment report.
        preExperimentDuration:
          $ref: "#/components/schemas/ReportConfigurationDuration"
          description: The duration before the experiment start time for the data sources to include in the report.
        postExperimentDuration:
          $ref: "#/components/schemas/ReportConfigurationDuration"
          description: The duration after the experiment end time for the data sources to include in the report.
    ExperimentTemplateReportConfigurationOutputsInput:
      description: Specifies the outputs for the experiment templates.
      type: object
      properties:
        s3Configuration:
          $ref: "#/components/schemas/ReportConfigurationS3OutputInput"
          description: The S3 destination for the experiment report.
    ReportConfigurationS3OutputInput:
      description: Specifies the S3 destination for the experiment report.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket where the experiment report will be stored.
        prefix:
          $ref: "#/components/schemas/ReportConfigurationS3OutputPrefix"
          description: The prefix of the S3 bucket where the experiment report will be stored.
    ReportConfigurationS3OutputPrefix:
      type: string
      maxLength: 256
      pattern: "[\\S]+"
    ExperimentTemplateReportConfigurationDataSourcesInput:
      description: Specifies the data sources for the experiment report.
      type: object
      properties:
        cloudWatchDashboards:
