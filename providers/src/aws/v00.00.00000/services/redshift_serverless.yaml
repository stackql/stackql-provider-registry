                  description: A list of IAM roles to associate with the namespace. This parameter must be updated together with defaultIamRoleArn.
                kmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the Amazon Web Services Key Management Service key used to encrypt your data.
                logExports:
                  $ref: "#/components/schemas/LogExportList"
                  description: The types of logs the namespace can export. The export types are userlog, connectionlog, and useractivitylog.
                manageAdminPassword:
                  $ref: "#/components/schemas/Boolean"
                  description: If true, Amazon Redshift uses Secrets Manager to manage the namespace's admin credentials. You can't use adminUserPassword if manageAdminPassword is true. If manageAdminPassword is false or not set, Amazon Redshift uses adminUserPassword for the admin user account's password.
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the namespace to update. You can't update the name of a namespace once it is created.
              required:
                - namespaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNamespaceResponse"
  /UpdateScheduledAction:
    post:
      operationId: UpdateScheduledAction
      description: Updates a scheduled action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.UpdateScheduledAction
            default: RedshiftServerless.UpdateScheduledAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                enabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to enable the scheduled action.
                endTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end time in UTC of the scheduled action to update.
                roleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the IAM role to assume to run the scheduled action. This IAM role must have permission to run the Amazon Redshift Serverless API operation in the scheduled action. This IAM role must allow the Amazon Redshift scheduler to schedule creating snapshots (Principal scheduler.redshift.amazonaws.com) to assume permissions on your behalf. For more information about the IAM role to use with the Amazon Redshift scheduler, see Using Identity-Based Policies for Amazon Redshift in the Amazon Redshift Management Guide
                schedule:
                  $ref: "#/components/schemas/Schedule"
                  description: The schedule for a one-time (at timestamp format) or recurring (cron format) scheduled action. Schedule invocations must be separated by at least one hour. Times are in UTC. Format of at timestamp is yyyy-mm-ddThh:mm:ss. For example, 2016-03-04T17:27:00. Format of cron expression is (Minutes Hours Day-of-month Month Day-of-week Year). For example, "(0 10 ? * MON *)". For more information, see Cron Expressions in the Amazon CloudWatch Events User Guide.
                scheduledActionDescription:
                  $ref: "#/components/schemas/String"
                  description: The descripion of the scheduled action to update to.
                scheduledActionName:
                  $ref: "#/components/schemas/ScheduledActionName"
                  description: The name of the scheduled action to update to.
                startTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start time in UTC of the scheduled action to update to.
                targetAction:
                  $ref: "#/components/schemas/TargetAction"
              required:
                - scheduledActionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScheduledActionResponse"
  /UpdateSnapshot:
    post:
      operationId: UpdateSnapshot
      description: Updates a snapshot.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.UpdateSnapshot
            default: RedshiftServerless.UpdateSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                retentionPeriod:
                  $ref: "#/components/schemas/Integer"
                  description: The new retention period of the snapshot.
                snapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of the snapshot.
              required:
                - snapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSnapshotResponse"
  /UpdateSnapshotCopyConfiguration:
    post:
      operationId: UpdateSnapshotCopyConfiguration
      description: Updates a snapshot copy configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.UpdateSnapshotCopyConfiguration
            default: RedshiftServerless.UpdateSnapshotCopyConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                snapshotCopyConfigurationId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the snapshot copy configuration to update.
                snapshotRetentionPeriod:
                  $ref: "#/components/schemas/Integer"
                  description: The new retention period of how long to keep a snapshot in the destination Amazon Web Services Region.
              required:
                - snapshotCopyConfigurationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSnapshotCopyConfigurationResponse"
  /UpdateUsageLimit:
    post:
      operationId: UpdateUsageLimit
      description: Update a usage limit in Amazon Redshift Serverless. You can't update the usage type or period of a usage limit.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.UpdateUsageLimit
            default: RedshiftServerless.UpdateUsageLimit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                amount:
                  $ref: "#/components/schemas/Long"
                  description: The new limit amount. If time-based, this amount is in Redshift Processing Units (RPU) consumed per hour. If data-based, this amount is in terabytes (TB) of data transferred between Regions in cross-account sharing. The value must be a positive number.
                breachAction:
                  $ref: "#/components/schemas/UsageLimitBreachAction"
                  description: The new action that Amazon Redshift Serverless takes when the limit is reached.
                usageLimitId:
                  $ref: "#/components/schemas/String"
                  description: The identifier of the usage limit to update.
              required:
                - usageLimitId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUsageLimitResponse"
  /UpdateWorkgroup:
    post:
      operationId: UpdateWorkgroup
      description: "Updates a workgroup with the specified configuration settings. You can't update multiple parameters in one request. For example, you can update baseCapacity or port in a single request, but you can't update both in the same request. VPC Block Public Access (BPA) enables you to block resources in VPCs and subnets that you own in a Region from reaching or being reached from the internet through internet gateways and egress-only internet gateways. If a workgroup is in an account with VPC BPA turned on, the following capabilities are blocked: Creating a public access workgroup Modifying a private workgroup to public Adding a subnet with VPC BPA turned on to the workgroup when the workgroup is public For more information about VPC BPA, see Block public access to VPCs and subnets in the Amazon VPC User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.UpdateWorkgroup
            default: RedshiftServerless.UpdateWorkgroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                baseCapacity:
                  $ref: "#/components/schemas/Integer"
                  description: The new base data warehouse capacity in Redshift Processing Units (RPUs).
                configParameters:
                  $ref: "#/components/schemas/ConfigParameterList"
                  description: An array of parameters to set for advanced control over a database. The options are auto_mv, datestyle, enable_case_sensitive_identifier, enable_user_activity_logging, query_group, search_path, require_ssl, use_fips_ssl, and either wlm_json_configuration or query monitoring metrics that let you define performance boundaries. You can either specify individual query monitoring metrics (such as max_scan_row_count, max_query_execution_time) or use wlm_json_configuration to define query queues with rules, but not both. If you're using wlm_json_configuration, the maximum size of parameterValue is 8000 characters. For more information about query monitoring rules and available metrics, see Query monitoring metrics for Amazon Redshift Serverless.
                enhancedVpcRouting:
                  $ref: "#/components/schemas/Boolean"
                  description: The value that specifies whether to turn on enhanced virtual private cloud (VPC) routing, which forces Amazon Redshift Serverless to route traffic through your VPC.
                extraComputeForAutomaticOptimization:
                  $ref: "#/components/schemas/Boolean"
                  description: "If true, allocates additional compute resources for running automatic optimization operations. Default: false"
                ipAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                  description: The IP address type that the workgroup supports. Possible values are ipv4 and dualstack.
                maxCapacity:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum data-warehouse capacity Amazon Redshift Serverless uses to serve queries. The max capacity is specified in RPUs.
                port:
                  $ref: "#/components/schemas/Integer"
                  description: The custom port to use when connecting to a workgroup. Valid port ranges are 5431-5455 and 8191-8215. The default is 5439.
                pricePerformanceTarget:
                  $ref: "#/components/schemas/PerformanceTarget"
                  description: An object that represents the price performance target settings for the workgroup.
                publiclyAccessible:
                  $ref: "#/components/schemas/Boolean"
                  description: A value that specifies whether the workgroup can be accessible from a public network.
                securityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIdList"
                  description: An array of security group IDs to associate with the workgroup.
                subnetIds:
                  $ref: "#/components/schemas/SubnetIdList"
                  description: An array of VPC subnet IDs to associate with the workgroup.
                trackName:
                  $ref: "#/components/schemas/TrackName"
                  description: An optional parameter for the name of the track for the workgroup. If you don't provide a track name, the workgroup is assigned to the current track.
                workgroupName:
                  $ref: "#/components/schemas/WorkgroupName"
                  description: The name of the workgroup to update. You can't update the name of a workgroup once it is created.
              required:
                - workgroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkgroupResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    Integer:
      type: integer
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A map of key-value pairs.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key to use in the tag.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    ConvertRecoveryPointToSnapshotResponse:
      type: object
      properties:
        snapshot:
          $ref: "#/components/schemas/Snapshot"
          description: The snapshot converted from the recovery point.
    Snapshot:
      description: A snapshot object that contains databases.
      type: object
      properties:
        accountsWithProvisionedRestoreAccess:
          $ref: "#/components/schemas/AccountIdList"
          description: All of the Amazon Web Services accounts that have access to restore a snapshot to a provisioned cluster.
        accountsWithRestoreAccess:
          $ref: "#/components/schemas/AccountIdList"
          description: All of the Amazon Web Services accounts that have access to restore a snapshot to a namespace.
        actualIncrementalBackupSizeInMegaBytes:
          $ref: "#/components/schemas/Double"
          description: The size of the incremental backup in megabytes.
        adminPasswordSecretArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the namespace's admin user credentials secret.
        adminPasswordSecretKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ID of the Key Management Service (KMS) key used to encrypt and store the namespace's admin credentials secret.
        adminUsername:
          $ref: "#/components/schemas/String"
          description: The username of the database within a snapshot.
        backupProgressInMegaBytes:
          $ref: "#/components/schemas/Double"
          description: The size in megabytes of the data that has been backed up to a snapshot.
        currentBackupRateInMegaBytesPerSecond:
          $ref: "#/components/schemas/Double"
          description: The rate at which data is backed up into a snapshot in megabytes per second.
        elapsedTimeInSeconds:
          $ref: "#/components/schemas/Long"
          description: The amount of time it took to back up data into a snapshot.
        estimatedSecondsToCompletion:
          $ref: "#/components/schemas/Long"
          description: The estimated amount of seconds until the snapshot completes backup.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The unique identifier of the KMS key used to encrypt the snapshot.
        namespaceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the namespace the snapshot was created from.
        namespaceName:
          $ref: "#/components/schemas/String"
          description: The name of the namepsace.
        ownerAccount:
          $ref: "#/components/schemas/String"
          description: The owner Amazon Web Services; account of the snapshot.
        snapshotArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the snapshot.
        snapshotCreateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of when the snapshot was created.
        snapshotName:
          $ref: "#/components/schemas/String"
          description: The name of the snapshot.
        snapshotRemainingDays:
          $ref: "#/components/schemas/Integer"
          description: The amount of days until the snapshot is deleted.
        snapshotRetentionPeriod:
          $ref: "#/components/schemas/Integer"
          description: The period of time, in days, of how long the snapshot is retained.
        snapshotRetentionStartTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of when data within the snapshot started getting retained.
        status:
          $ref: "#/components/schemas/SnapshotStatus"
          description: The status of the snapshot.
        totalBackupSizeInMegaBytes:
          $ref: "#/components/schemas/Double"
          description: The total size, in megabytes, of how big the snapshot is.
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Double:
      type: number
      format: double
    KmsKeyId:
      type: string
    Long:
      type: integer
      format: int64
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    SnapshotStatus:
      type: string
      enum:
        - AVAILABLE
        - CREATING
        - DELETED
        - CANCELLED
        - FAILED
        - COPYING
    CustomDomainCertificateArnString:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=/,.@-]+:acm:[\w+=/,.@-]*:[0-9]+:[\w+=,.@-]+(/[\w+=,.@-]+)*
    CustomDomainName:
      type: string
      minLength: 1
      maxLength: 253
      pattern: ^(((?!-)[A-Za-z0-9-]{0,62}[A-Za-z0-9])\.)+((?!-)[A-Za-z0-9-]{1,62}[A-Za-z0-9])$
    WorkgroupName:
      type: string
      minLength: 3
      maxLength: 64
      pattern: ^[a-z0-9-]+$
    CreateCustomDomainAssociationResponse:
      type: object
      properties:
        customDomainCertificateArn:
          $ref: "#/components/schemas/CustomDomainCertificateArnString"
          description: The custom domain name’s certificate Amazon resource name (ARN).
        customDomainCertificateExpiryTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The expiration time for the certificate.
        customDomainName:
          $ref: "#/components/schemas/CustomDomainName"
          description: The custom domain name to associate with the workgroup.
        workgroupName:
          $ref: "#/components/schemas/WorkgroupName"
          description: The name of the workgroup associated with the database.
    OwnerAccount:
      type: string
      minLength: 1
      maxLength: 12
      pattern: (\d{12})
    SubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
    VpcSecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/VpcSecurityGroupId"
    VpcSecurityGroupId:
      type: string
    CreateEndpointAccessResponse:
      type: object
      properties:
        endpoint:
          $ref: "#/components/schemas/EndpointAccess"
          description: The created VPC endpoint.
    EndpointAccess:
      description: Information about an Amazon Redshift Serverless VPC endpoint.
      type: object
      properties:
        address:
          $ref: "#/components/schemas/String"
          description: The DNS address of the endpoint.
        endpointArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the VPC endpoint.
        endpointCreateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time that the endpoint was created.
        endpointName:
          $ref: "#/components/schemas/String"
          description: The name of the VPC endpoint.
        endpointStatus:
          $ref: "#/components/schemas/String"
          description: The status of the VPC endpoint.
        port:
          $ref: "#/components/schemas/Integer"
          description: The port number on which Amazon Redshift Serverless accepts incoming connections.
        subnetIds:
          $ref: "#/components/schemas/SubnetIdList"
          description: The unique identifier of subnets where Amazon Redshift Serverless choose to deploy the VPC endpoint.
        vpcEndpoint:
          $ref: "#/components/schemas/VpcEndpoint"
          description: The connection endpoint for connecting to Amazon Redshift Serverless.
        vpcSecurityGroups:
          $ref: "#/components/schemas/VpcSecurityGroupMembershipList"
          description: The security groups associated with the endpoint.
        workgroupName:
          $ref: "#/components/schemas/String"
          description: The name of the workgroup associated with the endpoint.
    VpcEndpoint:
      description: The connection endpoint for connecting to Amazon Redshift Serverless through the proxy.
      type: object
      properties:
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaceList"
          description: One or more network interfaces of the endpoint. Also known as an interface endpoint.
        vpcEndpointId:
          $ref: "#/components/schemas/String"
          description: The connection endpoint ID for connecting to Amazon Redshift Serverless.
        vpcId:
          $ref: "#/components/schemas/String"
          description: The VPC identifier that the endpoint is associated with.
    NetworkInterfaceList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkInterface"
    NetworkInterface:
      description: Contains information about a network interface in an Amazon Redshift Serverless managed VPC endpoint.
      type: object
      properties:
        availabilityZone:
          $ref: "#/components/schemas/String"
          description: The availability Zone.
        ipv6Address:
          $ref: "#/components/schemas/String"
          description: The IPv6 address of the network interface within the subnet.
        networkInterfaceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the network interface.
        privateIpAddress:
          $ref: "#/components/schemas/String"
          description: The IPv4 address of the network interface within the subnet.
        subnetId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the subnet.
    VpcSecurityGroupMembershipList:
      type: array
      items:
        $ref: "#/components/schemas/VpcSecurityGroupMembership"
    VpcSecurityGroupMembership:
      description: Describes the members of a VPC security group.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/String"
          description: The status of the VPC security group.
        vpcSecurityGroupId:
          $ref: "#/components/schemas/VpcSecurityGroupId"
          description: The unique identifier of the VPC security group.
    DbPassword:
      type: string
    DbUser:
      type: string
    IamRoleArnList:
      type: array
      items:
        $ref: "#/components/schemas/IamRoleArn"
    IamRoleArn:
      type: string
    LogExportList:
      type: array
      items:
        $ref: "#/components/schemas/LogExport"
    LogExport:
      type: string
      enum:
        - useractivitylog
        - userlog
        - connectionlog
    Boolean:
      type: boolean
    NamespaceName:
      type: string
      minLength: 3
      maxLength: 64
      pattern: ^[a-z0-9-]+$
    RedshiftIdcApplicationArn:
      type: string
      minLength: 1
      maxLength: 1024
    CreateNamespaceResponse:
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/Namespace"
          description: The created namespace object.
    Namespace:
      description: A collection of database objects and users.
      type: object
      properties:
        adminPasswordSecretArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the namespace's admin user credentials secret.
        adminPasswordSecretKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ID of the Key Management Service (KMS) key used to encrypt and store the namespace's admin credentials secret.
        adminUsername:
          $ref: "#/components/schemas/DbUser"
          description: The username of the administrator for the first database created in the namespace.
        catalogArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Glue Data Catalog associated with the namespace enabled with Amazon Redshift federated permissions.
        creationDate:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date of when the namespace was created.
        dbName:
          $ref: "#/components/schemas/String"
          description: The name of the first database created in the namespace.
        defaultIamRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role to set as a default in the namespace.
        iamRoles:
          $ref: "#/components/schemas/IamRoleArnList"
          description: A list of IAM roles to associate with the namespace.
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services Key Management Service key used to encrypt your data.
        lakehouseRegistrationStatus:
          $ref: "#/components/schemas/String"
          description: The status of the lakehouse registration for the namespace. Indicates whether the namespace is successfully registered with Amazon Redshift federated permissions.
        logExports:
          $ref: "#/components/schemas/LogExportList"
          description: The types of logs the namespace can export. Available export types are User log, Connection log, and User activity log.
        namespaceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) associated with a namespace.
        namespaceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of a namespace.
        namespaceName:
          $ref: "#/components/schemas/NamespaceName"
          description: The name of the namespace. Must be between 3-64 alphanumeric characters in lowercase, and it cannot be a reserved word. A list of reserved words can be found in Reserved Words in the Amazon Redshift Database Developer Guide.
        status:
          $ref: "#/components/schemas/NamespaceStatus"
          description: The status of the namespace.
    NamespaceStatus:
      type: string
      enum:
        - AVAILABLE
        - MODIFYING
        - DELETING
    Capacity:
      type: integer
    CreateReservationRequestOfferingIdString:
      type: string
      minLength: 1
      maxLength: 64
    CreateReservationResponse:
      type: object
      properties:
        reservation:
          $ref: "#/components/schemas/Reservation"
          description: The reservation object that the CreateReservation action created.
    Reservation:
      description: Represents an Amazon Redshift Serverless reservation, which gives you the option to commit to a specified number of Redshift Processing Units (RPUs) for a year at a discount from Serverless on-demand (OD) rates.
      type: object
      properties:
        capacity:
          $ref: "#/components/schemas/Capacity"
          description: The number of Redshift Processing Units (RPUs) to reserve.
        endDate:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The end date for the serverless reservation. This date is one year after the start date that you specify.
        offering:
          $ref: "#/components/schemas/ReservationOffering"
          description: The type of offering for the reservation. The offering class determines the payment schedule for the reservation.
        reservationArn:
          $ref: "#/components/schemas/ReservationArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the serverless reservation.
        reservationId:
          $ref: "#/components/schemas/ReservationId"
          description: The identifier that uniquely identifies the serverless reservation.
        startDate:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The start date for the serverless reservation. This is the date you created the reservation.
        status:
          $ref: "#/components/schemas/Status"
          description: "The status of the reservation. Possible values include the following: payment-pending active payment-failed retired"
    ReservationOffering:
      description: The class of offering for the reservation. The offering class determines the payment schedule for the reservation.
      type: object
      properties:
        currencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The currency code for the offering.
        duration:
          $ref: "#/components/schemas/Duration"
          description: The duration, in seconds, for which the reservation reserves the RPUs.
        hourlyCharge:
          $ref: "#/components/schemas/Charge"
          description: The rate you are charged for each hour the reservation is active.
