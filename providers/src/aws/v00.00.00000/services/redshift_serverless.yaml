openapi: 3.0.0
info:
  version: "2021-04-21"
  title: Redshift Serverless
  description: Redshift Serverless
  x-serviceName: redshift-serverless
  x-serviceAlias: redshift_serverless
  x-protocol: json
  x-apiVersion: "2021-04-21"
  x-endpointPrefix: redshift-serverless
  x-targetPrefix: RedshiftServerless
  x-jsonVersion: "1.1"
servers:
  - url: https://redshift-serverless.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for redshift-serverless
paths:
  /ConvertRecoveryPointToSnapshot:
    post:
      operationId: ConvertRecoveryPointToSnapshot
      description: Converts a recovery point to a snapshot. For more information about recovery points and snapshots, see Working with snapshots and recovery points.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.ConvertRecoveryPointToSnapshot
            default: RedshiftServerless.ConvertRecoveryPointToSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                recoveryPointId:
                  $ref: "#/components/schemas/String"
                  description: The unique identifier of the recovery point.
                retentionPeriod:
                  $ref: "#/components/schemas/Integer"
                  description: How long to retain the snapshot.
                snapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of the snapshot.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of Tag objects to associate with the created snapshot.
              required:
                - recoveryPointId
                - snapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertRecoveryPointToSnapshotResponse"
  /CreateCustomDomainAssociation:
    post:
      operationId: CreateCustomDomainAssociation
      description: Creates a custom domain association for Amazon Redshift Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateCustomDomainAssociation
            default: RedshiftServerless.CreateCustomDomainAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                customDomainCertificateArn:
                  $ref: "#/components/schemas/CustomDomainCertificateArnString"
                  description: The custom domain name’s certificate Amazon resource name (ARN).
                customDomainName:
                  $ref: "#/components/schemas/CustomDomainName"
                  description: The custom domain name to associate with the workgroup.
                workgroupName:
                  $ref: "#/components/schemas/WorkgroupName"
                  description: The name of the workgroup associated with the database.
              required:
                - customDomainCertificateArn
                - customDomainName
                - workgroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomDomainAssociationResponse"
  /CreateEndpointAccess:
    post:
      operationId: CreateEndpointAccess
      description: Creates an Amazon Redshift Serverless managed VPC endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateEndpointAccess
            default: RedshiftServerless.CreateEndpointAccess
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                endpointName:
                  $ref: "#/components/schemas/String"
                  description: The name of the VPC endpoint. An endpoint name must contain 1-30 characters. Valid characters are A-Z, a-z, 0-9, and hyphen(-). The first character must be a letter. The name can't contain two consecutive hyphens or end with a hyphen.
                ownerAccount:
                  $ref: "#/components/schemas/OwnerAccount"
                  description: The owner Amazon Web Services account for the Amazon Redshift Serverless workgroup.
                subnetIds:
                  $ref: "#/components/schemas/SubnetIdList"
                  description: The unique identifers of subnets from which Amazon Redshift Serverless chooses one to deploy a VPC endpoint.
                vpcSecurityGroupIds:
                  $ref: "#/components/schemas/VpcSecurityGroupIdList"
                  description: The unique identifiers of the security group that defines the ports, protocols, and sources for inbound traffic that you are authorizing into your endpoint.
                workgroupName:
                  $ref: "#/components/schemas/String"
                  description: The name of the workgroup to associate with the VPC endpoint.
              required:
                - endpointName
                - subnetIds
                - workgroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEndpointAccessResponse"
  /CreateNamespace:
    post:
      operationId: CreateNamespace
      description: Creates a namespace in Amazon Redshift Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateNamespace
            default: RedshiftServerless.CreateNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                adminPasswordSecretKmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The ID of the Key Management Service (KMS) key used to encrypt and store the namespace's admin credentials secret. You can only use this parameter if manageAdminPassword is true.
                adminUserPassword:
                  $ref: "#/components/schemas/DbPassword"
                  description: The password of the administrator for the first database created in the namespace. You can't use adminUserPassword if manageAdminPassword is true.
                adminUsername:
                  $ref: "#/components/schemas/DbUser"
                  description: The username of the administrator for the first database created in the namespace.
                dbName:
                  $ref: "#/components/schemas/String"
                  description: The name of the first database created in the namespace.
                defaultIamRoleArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the IAM role to set as a default in the namespace.
                iamRoles:
                  $ref: "#/components/schemas/IamRoleArnList"
                  description: A list of IAM roles to associate with the namespace.
                kmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the Amazon Web Services Key Management Service key used to encrypt your data.
                logExports:
                  $ref: "#/components/schemas/LogExportList"
                  description: The types of logs the namespace can export. Available export types are userlog, connectionlog, and useractivitylog.
                manageAdminPassword:
                  $ref: "#/components/schemas/Boolean"
                  description: If true, Amazon Redshift uses Secrets Manager to manage the namespace's admin credentials. You can't use adminUserPassword if manageAdminPassword is true. If manageAdminPassword is false or not set, Amazon Redshift uses adminUserPassword for the admin user account's password.
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the namespace.
                redshiftIdcApplicationArn:
                  $ref: "#/components/schemas/RedshiftIdcApplicationArn"
                  description: The ARN for the Redshift application that integrates with IAM Identity Center.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tag instances.
              required:
                - namespaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNamespaceResponse"
  /CreateReservation:
    post:
      operationId: CreateReservation
      description: Creates an Amazon Redshift Serverless reservation, which gives you the option to commit to a specified number of Redshift Processing Units (RPUs) for a year at a discount from Serverless on-demand (OD) rates.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateReservation
            default: RedshiftServerless.CreateReservation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                capacity:
                  $ref: "#/components/schemas/Capacity"
                  description: The number of Redshift Processing Units (RPUs) to reserve.
                clientToken:
                  $ref: "#/components/schemas/String"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If not provided, the Amazon Web Services SDK populates this field. This token must be a valid UUIDv4 value. For more information about idempotency, see Making retries safe with idempotent APIs .
                offeringId:
                  $ref: "#/components/schemas/CreateReservationRequestOfferingIdString"
                  description: The ID of the offering associated with the reservation. The offering determines the payment schedule for the reservation.
              required:
                - capacity
                - offeringId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReservationResponse"
  /CreateScheduledAction:
    post:
      operationId: CreateScheduledAction
      description: Creates a scheduled action. A scheduled action contains a schedule and an Amazon Redshift API action. For example, you can create a schedule of when to run the CreateSnapshot API operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateScheduledAction
            default: RedshiftServerless.CreateScheduledAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                enabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether the schedule is enabled. If false, the scheduled action does not trigger. For more information about state of the scheduled action, see ScheduledAction.
                endTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The end time in UTC when the schedule is no longer active. After this time, the scheduled action does not trigger.
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the namespace for which to create a scheduled action.
                roleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The ARN of the IAM role to assume to run the scheduled action. This IAM role must have permission to run the Amazon Redshift Serverless API operation in the scheduled action. This IAM role must allow the Amazon Redshift scheduler to schedule creating snapshots. (Principal scheduler.redshift.amazonaws.com) to assume permissions on your behalf. For more information about the IAM role to use with the Amazon Redshift scheduler, see Using Identity-Based Policies for Amazon Redshift in the Amazon Redshift Management Guide
                schedule:
                  $ref: "#/components/schemas/Schedule"
                  description: The schedule for a one-time (at timestamp format) or recurring (cron format) scheduled action. Schedule invocations must be separated by at least one hour. Times are in UTC. Format of at timestamp is yyyy-mm-ddThh:mm:ss. For example, 2016-03-04T17:27:00. Format of cron expression is (Minutes Hours Day-of-month Month Day-of-week Year). For example, "(0 10 ? * MON *)". For more information, see Cron Expressions in the Amazon CloudWatch Events User Guide.
                scheduledActionDescription:
                  $ref: "#/components/schemas/String"
                  description: The description of the scheduled action.
                scheduledActionName:
                  $ref: "#/components/schemas/ScheduledActionName"
                  description: The name of the scheduled action.
                startTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The start time in UTC when the schedule is active. Before this time, the scheduled action does not trigger.
                targetAction:
                  $ref: "#/components/schemas/TargetAction"
              required:
                - namespaceName
                - roleArn
                - schedule
                - scheduledActionName
                - targetAction
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScheduledActionResponse"
  /CreateSnapshot:
    post:
      operationId: CreateSnapshot
      description: Creates a snapshot of all databases in a namespace. For more information about snapshots, see Working with snapshots and recovery points.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateSnapshot
            default: RedshiftServerless.CreateSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                namespaceName:
                  $ref: "#/components/schemas/String"
                  description: The namespace to create a snapshot for.
                retentionPeriod:
                  $ref: "#/components/schemas/Integer"
                  description: How long to retain the created snapshot.
                snapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of the snapshot.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of Tag objects to associate with the snapshot.
              required:
                - namespaceName
                - snapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotResponse"
  /CreateSnapshotCopyConfiguration:
    post:
      operationId: CreateSnapshotCopyConfiguration
      description: Creates a snapshot copy configuration that lets you copy snapshots to another Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateSnapshotCopyConfiguration
            default: RedshiftServerless.CreateSnapshotCopyConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                destinationKmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The KMS key to use to encrypt your snapshots in the destination Amazon Web Services Region.
                destinationRegion:
                  $ref: "#/components/schemas/String"
                  description: The destination Amazon Web Services Region that you want to copy snapshots to.
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the namespace to copy snapshots from.
                snapshotRetentionPeriod:
                  $ref: "#/components/schemas/Integer"
                  description: The retention period of the snapshots that you copy to the destination Amazon Web Services Region.
              required:
                - destinationRegion
                - namespaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSnapshotCopyConfigurationResponse"
  /CreateUsageLimit:
    post:
      operationId: CreateUsageLimit
      description: Creates a usage limit for a specified Amazon Redshift Serverless usage type. The usage limit is identified by the returned usage limit identifier.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateUsageLimit
            default: RedshiftServerless.CreateUsageLimit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                amount:
                  $ref: "#/components/schemas/Long"
                  description: The limit amount. If time-based, this amount is in Redshift Processing Units (RPU) consumed per hour. If data-based, this amount is in terabytes (TB) of data transferred between Regions in cross-account sharing. The value must be a positive number.
                breachAction:
                  $ref: "#/components/schemas/UsageLimitBreachAction"
                  description: The action that Amazon Redshift Serverless takes when the limit is reached. The default is log.
                period:
                  $ref: "#/components/schemas/UsageLimitPeriod"
                  description: The time period that the amount applies to. A weekly period begins on Sunday. The default is monthly.
                resourceArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the Amazon Redshift Serverless resource to create the usage limit for.
                usageType:
                  $ref: "#/components/schemas/UsageLimitUsageType"
                  description: The type of Amazon Redshift Serverless usage to create a usage limit for.
              required:
                - amount
                - resourceArn
                - usageType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUsageLimitResponse"
  /CreateWorkgroup:
    post:
      operationId: CreateWorkgroup
      description: "Creates an workgroup in Amazon Redshift Serverless. VPC Block Public Access (BPA) enables you to block resources in VPCs and subnets that you own in a Region from reaching or being reached from the internet through internet gateways and egress-only internet gateways. If a workgroup is in an account with VPC BPA turned on, the following capabilities are blocked: Creating a public access workgroup Modifying a private workgroup to public Adding a subnet with VPC BPA turned on to the workgroup when the workgroup is public For more information about VPC BPA, see Block public access to VPCs and subnets in the Amazon VPC User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.CreateWorkgroup
            default: RedshiftServerless.CreateWorkgroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                baseCapacity:
                  $ref: "#/components/schemas/Integer"
                  description: The base data warehouse capacity of the workgroup in Redshift Processing Units (RPUs).
                configParameters:
                  $ref: "#/components/schemas/ConfigParameterList"
                  description: An array of parameters to set for advanced control over a database. The options are auto_mv, datestyle, enable_case_sensitive_identifier, enable_user_activity_logging, query_group, search_path, require_ssl, use_fips_ssl, and either wlm_json_configuration or query monitoring metrics that let you define performance boundaries. You can either specify individual query monitoring metrics (such as max_scan_row_count, max_query_execution_time) or use wlm_json_configuration to define query queues with rules, but not both. If you're using wlm_json_configuration, the maximum size of parameterValue is 8000 characters. For more information about query monitoring rules and available metrics, see Query monitoring metrics for Amazon Redshift Serverless.
                enhancedVpcRouting:
                  $ref: "#/components/schemas/Boolean"
                  description: The value that specifies whether to turn on enhanced virtual private cloud (VPC) routing, which forces Amazon Redshift Serverless to route traffic through your VPC instead of over the internet.
                extraComputeForAutomaticOptimization:
                  $ref: "#/components/schemas/Boolean"
                  description: "If true, allocates additional compute resources for running automatic optimization operations. Default: false"
                ipAddressType:
                  $ref: "#/components/schemas/IpAddressType"
                  description: The IP address type that the workgroup supports. Possible values are ipv4 and dualstack.
                maxCapacity:
                  $ref: "#/components/schemas/Integer"
                  description: The maximum data-warehouse capacity Amazon Redshift Serverless uses to serve queries. The max capacity is specified in RPUs.
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the namespace to associate with the workgroup.
                port:
                  $ref: "#/components/schemas/Integer"
                  description: The custom port to use when connecting to a workgroup. Valid port ranges are 5431-5455 and 8191-8215. The default is 5439.
                pricePerformanceTarget:
                  $ref: "#/components/schemas/PerformanceTarget"
                  description: An object that represents the price performance target settings for the workgroup.
                publiclyAccessible:
                  $ref: "#/components/schemas/Boolean"
                  description: A value that specifies whether the workgroup can be accessed from a public network.
                securityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIdList"
                  description: An array of security group IDs to associate with the workgroup.
                subnetIds:
                  $ref: "#/components/schemas/SubnetIdList"
                  description: An array of VPC subnet IDs to associate with the workgroup.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: A array of tag instances.
                trackName:
                  $ref: "#/components/schemas/TrackName"
                  description: An optional parameter for the name of the track for the workgroup. If you don't provide a track name, the workgroup is assigned to the current track.
                workgroupName:
                  $ref: "#/components/schemas/WorkgroupName"
                  description: The name of the created workgroup.
              required:
                - namespaceName
                - workgroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkgroupResponse"
  /DeleteCustomDomainAssociation:
    post:
      operationId: DeleteCustomDomainAssociation
      description: Deletes a custom domain association for Amazon Redshift Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteCustomDomainAssociation
            default: RedshiftServerless.DeleteCustomDomainAssociation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                customDomainName:
                  $ref: "#/components/schemas/CustomDomainName"
                  description: The custom domain name associated with the workgroup.
                workgroupName:
                  $ref: "#/components/schemas/WorkgroupName"
                  description: The name of the workgroup associated with the database.
              required:
                - customDomainName
                - workgroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomDomainAssociationResponse"
  /DeleteEndpointAccess:
    post:
      operationId: DeleteEndpointAccess
      description: Deletes an Amazon Redshift Serverless managed VPC endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteEndpointAccess
            default: RedshiftServerless.DeleteEndpointAccess
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                endpointName:
                  $ref: "#/components/schemas/String"
                  description: The name of the VPC endpoint to delete.
              required:
                - endpointName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEndpointAccessResponse"
  /DeleteNamespace:
    post:
      operationId: DeleteNamespace
      description: Deletes a namespace from Amazon Redshift Serverless. Before you delete the namespace, you can create a final snapshot that has all of the data within the namespace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteNamespace
            default: RedshiftServerless.DeleteNamespace
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                finalSnapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of the snapshot to be created before the namespace is deleted.
                finalSnapshotRetentionPeriod:
                  $ref: "#/components/schemas/Integer"
                  description: How long to retain the final snapshot.
                namespaceName:
                  $ref: "#/components/schemas/NamespaceName"
                  description: The name of the namespace to delete.
              required:
                - namespaceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNamespaceResponse"
  /DeleteResourcePolicy:
    post:
      operationId: DeleteResourcePolicy
      description: Deletes the specified resource policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteResourcePolicy
            default: RedshiftServerless.DeleteResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the policy to delete.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyResponse"
  /DeleteScheduledAction:
    post:
      operationId: DeleteScheduledAction
      description: Deletes a scheduled action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteScheduledAction
            default: RedshiftServerless.DeleteScheduledAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                scheduledActionName:
                  $ref: "#/components/schemas/ScheduledActionName"
                  description: The name of the scheduled action to delete.
              required:
                - scheduledActionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduledActionResponse"
  /DeleteSnapshot:
    post:
      operationId: DeleteSnapshot
      description: Deletes a snapshot from Amazon Redshift Serverless.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteSnapshot
            default: RedshiftServerless.DeleteSnapshot
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                snapshotName:
                  $ref: "#/components/schemas/String"
                  description: The name of the snapshot to be deleted.
              required:
                - snapshotName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSnapshotResponse"
  /DeleteSnapshotCopyConfiguration:
    post:
      operationId: DeleteSnapshotCopyConfiguration
      description: Deletes a snapshot copy configuration
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RedshiftServerless.DeleteSnapshotCopyConfiguration
            default: RedshiftServerless.DeleteSnapshotCopyConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                snapshotCopyConfigurationId:
                  $ref: "#/components/schemas/String"
                  description: The ID of the snapshot copy configuration to delete.
              required:
                - snapshotCopyConfigurationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSnapshotCopyConfigurationResponse"
  /DeleteUsageLimit:
    post:
      operationId: DeleteUsageLimit
      description: Deletes a usage limit from Amazon Redshift Serverless.
      parameters:
        - name: X-Amz-Target
