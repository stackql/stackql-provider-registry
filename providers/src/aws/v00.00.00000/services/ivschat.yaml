openapi: 3.0.0
info:
  version: "2020-07-14"
  title: Amazon Interactive Video Service Chat
  description: Amazon Interactive Video Service Chat
  x-serviceName: ivschat
  x-serviceAlias: ivschat
  x-protocol: rest-json
  x-apiVersion: "2020-07-14"
  x-endpointPrefix: ivschat
servers:
  - url: https://ivschat.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ivschat
paths:
  /CreateChatToken:
    post:
      operationId: CreateChatToken
      description: Creates an encrypted token that is used by a chat participant to establish an individual WebSocket chat connection to a room. When the token is used to connect to chat, the connection is valid for the session duration specified in the request. The token becomes invalid at the token-expiration timestamp included in the response. Use the capabilities field to permit an end user to send messages or moderate a room. The attributes field securely attaches structured data to the chat session; the data is included within each message sent by the end user and received by other participants in the room. Common use cases for attributes include passing end-user profile data like an icon, display name, colors, badges, and other display features. Encryption keys are owned by Amazon IVS Chat and never used directly by your application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomIdentifier:
                  $ref: "#/components/schemas/RoomIdentifier"
                userId:
                  $ref: "#/components/schemas/UserID"
                capabilities:
                  $ref: "#/components/schemas/ChatTokenCapabilities"
                sessionDurationInMinutes:
                  $ref: "#/components/schemas/SessionDurationInMinutes"
                attributes:
                  $ref: "#/components/schemas/ChatTokenAttributes"
              required:
                - roomIdentifier
                - userId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChatTokenResponse"
  /CreateLoggingConfiguration:
    post:
      operationId: CreateLoggingConfiguration
      description: Creates a logging configuration that allows clients to store and record sent messages.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/LoggingConfigurationName"
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - destinationConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLoggingConfigurationResponse"
  /CreateRoom:
    post:
      operationId: CreateRoom
      description: Creates a room that allows clients to connect and pass messages.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RoomName"
                maximumMessageRatePerSecond:
                  $ref: "#/components/schemas/RoomMaxMessageRatePerSecond"
                maximumMessageLength:
                  $ref: "#/components/schemas/RoomMaxMessageLength"
                messageReviewHandler:
                  $ref: "#/components/schemas/MessageReviewHandler"
                tags:
                  $ref: "#/components/schemas/Tags"
                loggingConfigurationIdentifiers:
                  $ref: "#/components/schemas/LoggingConfigurationIdentifierList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRoomResponse"
  /DeleteLoggingConfiguration:
    post:
      operationId: DeleteLoggingConfiguration
      description: Deletes the specified logging configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/LoggingConfigurationIdentifier"
              required:
                - identifier
      responses:
        "204":
          description: Success
  /DeleteMessage:
    post:
      operationId: DeleteMessage
      description: Sends an event to a specific room which directs clients to delete a specific message; that is, unrender it from view and delete it from the client’s chat history. This event’s EventName is aws:DELETE_MESSAGE. This replicates the DeleteMessage WebSocket operation in the Amazon IVS Chat Messaging API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomIdentifier:
                  $ref: "#/components/schemas/RoomIdentifier"
                id:
                  $ref: "#/components/schemas/MessageID"
                reason:
                  $ref: "#/components/schemas/Reason"
              required:
                - roomIdentifier
                - id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMessageResponse"
  /DeleteRoom:
    post:
      operationId: DeleteRoom
      description: Deletes the specified room.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/RoomIdentifier"
              required:
                - identifier
      responses:
        "204":
          description: Success
  /DisconnectUser:
    post:
      operationId: DisconnectUser
      description: Disconnects all connections using a specified user ID from a room. This replicates the DisconnectUser WebSocket operation in the Amazon IVS Chat Messaging API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomIdentifier:
                  $ref: "#/components/schemas/RoomIdentifier"
                userId:
                  $ref: "#/components/schemas/UserID"
                reason:
                  $ref: "#/components/schemas/Reason"
              required:
                - roomIdentifier
                - userId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisconnectUserResponse"
  /GetLoggingConfiguration:
    post:
      operationId: GetLoggingConfiguration
      description: Gets the specified logging configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/LoggingConfigurationIdentifier"
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLoggingConfigurationResponse"
  /GetRoom:
    post:
      operationId: GetRoom
      description: Gets the specified room.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/RoomIdentifier"
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRoomResponse"
  /ListLoggingConfigurations:
    post:
      operationId: ListLoggingConfigurations
      description: Gets summary information about all your logging configurations in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxLoggingConfigurationResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLoggingConfigurationsResponse"
  /ListRooms:
    post:
      operationId: ListRooms
      description: Gets summary information about all your rooms in the AWS region where the API request is processed. Results are sorted in descending order of updateTime.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RoomName"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxRoomResults"
                messageReviewHandlerUri:
                  $ref: "#/components/schemas/LambdaArn"
                loggingConfigurationIdentifier:
                  $ref: "#/components/schemas/LoggingConfigurationIdentifier"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoomsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Gets information about AWS tags for the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be retrieved. The ARN must be URL-encoded.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds or updates tags for the AWS resource with the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be tagged. The ARN must be URL-encoded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from the resource with the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be untagged. The ARN must be URL-encoded.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Array of tags to be removed. Array of maps, each of the form string:string (key:value). See Best practices and strategies in Tagging Amazon Web Services Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS Chat has no constraints beyond what is documented there.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /SendEvent:
    post:
      operationId: SendEvent
      description: Sends an event to a room. Use this within your application’s business logic to send events to clients of a room; e.g., to notify clients to change the way the chat UI is rendered.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roomIdentifier:
                  $ref: "#/components/schemas/RoomIdentifier"
                eventName:
                  $ref: "#/components/schemas/EventName"
                attributes:
                  $ref: "#/components/schemas/EventAttributes"
              required:
                - roomIdentifier
                - eventName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEventResponse"
  /UpdateLoggingConfiguration:
    post:
      operationId: UpdateLoggingConfiguration
      description: Updates a specified logging configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/LoggingConfigurationIdentifier"
                name:
                  $ref: "#/components/schemas/LoggingConfigurationName"
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLoggingConfigurationResponse"
  /UpdateRoom:
    post:
      operationId: UpdateRoom
      description: Updates a room’s configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/RoomIdentifier"
                name:
                  $ref: "#/components/schemas/RoomName"
                maximumMessageRatePerSecond:
                  $ref: "#/components/schemas/RoomMaxMessageRatePerSecond"
                maximumMessageLength:
                  $ref: "#/components/schemas/RoomMaxMessageLength"
                messageReviewHandler:
                  $ref: "#/components/schemas/MessageReviewHandler"
                loggingConfigurationIdentifiers:
                  $ref: "#/components/schemas/LoggingConfigurationIdentifierList"
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRoomResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RoomIdentifier:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivschat:[a-z0-9-]+:[0-9]+:room/[a-zA-Z0-9-]+
    UserID:
      type: string
      minLength: 1
      maxLength: 128
    ChatTokenCapabilities:
      type: array
      items:
        $ref: "#/components/schemas/ChatTokenCapability"
    ChatTokenCapability:
      type: string
      enum:
        - SEND_MESSAGE
        - DISCONNECT_USER
        - DELETE_MESSAGE
    SessionDurationInMinutes:
      type: integer
      minimum: 1
      maximum: 180
    ChatTokenAttributes:
      type: object
      properties: {}
    CreateChatTokenResponse:
      type: object
      properties:
        token:
          $ref: "#/components/schemas/ChatToken"
          description: The issued client token, encrypted.
        tokenExpirationTime:
          $ref: "#/components/schemas/Time"
          description: Time after which the token is no longer valid and cannot be used to connect to a room. This is an ISO 8601 timestamp; note that this is returned as a string.
        sessionExpirationTime:
          $ref: "#/components/schemas/Time"
          description: Time after which an end user's session is no longer valid. This is an ISO 8601 timestamp; note that this is returned as a string.
    ChatToken:
      type: string
    Time:
      type: string
      format: date-time
    LoggingConfigurationName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    DestinationConfiguration:
      description: A complex type that describes a location where chat logs will be stored. Each member represents the configuration of one log destination. For logging, you define only one type of destination (for CloudWatch Logs, Kinesis Firehose, or S3).
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3DestinationConfiguration"
          description: An Amazon S3 destination configuration where chat activity will be logged.
        cloudWatchLogs:
          $ref: "#/components/schemas/CloudWatchLogsDestinationConfiguration"
          description: An Amazon CloudWatch Logs destination configuration where chat activity will be logged.
        firehose:
          $ref: "#/components/schemas/FirehoseDestinationConfiguration"
          description: An Amazon Kinesis Data Firehose destination configuration where chat activity will be logged.
    S3DestinationConfiguration:
      description: Specifies an S3 location where chat logs will be stored.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/BucketName"
          description: Name of the Amazon S3 bucket where chat activity will be logged.
      required:
        - bucketName
    BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9-.]+"
    CloudWatchLogsDestinationConfiguration:
      description: Specifies a CloudWatch Logs location where chat logs will be stored.
      type: object
      properties:
        logGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: Name of the Amazon Cloudwatch Logs destination where chat activity will be logged.
      required:
        - logGroupName
    LogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    FirehoseDestinationConfiguration:
      description: Specifies a Kinesis Firehose location where chat logs will be stored.
      type: object
      properties:
        deliveryStreamName:
          $ref: "#/components/schemas/DeliveryStreamName"
          description: Name of the Amazon Kinesis Firehose delivery stream where chat activity will be logged.
      required:
        - deliveryStreamName
    DeliveryStreamName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_.-]+"
    Tags:
      type: object
      properties: {}
    CreateLoggingConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/LoggingConfigurationArn"
          description: Logging-configuration ARN, assigned by the system.
        id:
          $ref: "#/components/schemas/LoggingConfigurationID"
          description: Logging-configuration ID, generated by the system. This is a relative identifier, the part of the ARN that uniquely identifies the logging configuration.
        createTime:
          $ref: "#/components/schemas/Time"
          description: Time when the logging configuration was created. This is an ISO 8601 timestamp; note that this is returned as a string.
        updateTime:
          $ref: "#/components/schemas/Time"
          description: Time of the logging configuration’s last update. This is an ISO 8601 timestamp; note that this is returned as a string.
        name:
          $ref: "#/components/schemas/LoggingConfigurationName"
          description: Logging-configuration name, from the request (if specified).
        destinationConfiguration:
          $ref: "#/components/schemas/DestinationConfiguration"
          description: A complex type that contains a destination configuration for where chat content will be logged, from the request. There is only one type of destination (cloudWatchLogs, firehose, or s3) in a destinationConfiguration.
        state:
          $ref: "#/components/schemas/CreateLoggingConfigurationState"
          description: The state of the logging configuration. When the state is ACTIVE, the configuration is ready to log chat content.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource, from the request (if specified). Array of maps, each of the form string:string (key:value).
    LoggingConfigurationArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivschat:[a-z0-9-]+:[0-9]+:logging-configuration/[a-zA-Z0-9-]+
    LoggingConfigurationID:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[a-zA-Z0-9]+"
    CreateLoggingConfigurationState:
      type: string
      enum:
        - ACTIVE
    RoomName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    RoomMaxMessageRatePerSecond:
      type: integer
      minimum: 1
      maximum: 100
    RoomMaxMessageLength:
      type: integer
      minimum: 1
      maximum: 500
    MessageReviewHandler:
      description: Configuration information for optional message review.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/LambdaArn"
          description: Identifier of the message review handler. Currently this must be an ARN of a lambda function.
        fallbackResult:
          $ref: "#/components/schemas/FallbackResult"
          description: "Specifies the fallback behavior (whether the message is allowed or denied) if the handler does not return a valid response, encounters an error, or times out. (For the timeout period, see Service Quotas.) If allowed, the message is delivered with returned content to all users connected to the room. If denied, the message is not delivered to any user. Default: ALLOW."
    LambdaArn:
      type: string
      minLength: 0
      maxLength: 170
      pattern: $|^arn:aws:lambda:[a-z0-9-]+:[0-9]{12}:function:.+.*
    FallbackResult:
      type: string
      enum:
        - ALLOW
        - DENY
    LoggingConfigurationIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/LoggingConfigurationIdentifier"
    LoggingConfigurationIdentifier:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivschat:[a-z0-9-]+:[0-9]+:logging-configuration/[a-zA-Z0-9-]+
    CreateRoomResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RoomArn"
          description: Room ARN, assigned by the system.
        id:
          $ref: "#/components/schemas/RoomID"
          description: Room ID, generated by the system. This is a relative identifier, the part of the ARN that uniquely identifies the room.
        name:
          $ref: "#/components/schemas/RoomName"
          description: Room name, from the request (if specified).
        createTime:
          $ref: "#/components/schemas/Time"
          description: Time when the room was created. This is an ISO 8601 timestamp; note that this is returned as a string.
        updateTime:
          $ref: "#/components/schemas/Time"
          description: Time of the room’s last update. This is an ISO 8601 timestamp; note that this is returned as a string.
        maximumMessageRatePerSecond:
          $ref: "#/components/schemas/RoomMaxMessageRatePerSecond"
          description: Maximum number of messages per second that can be sent to the room (by all clients), from the request (if specified).
        maximumMessageLength:
          $ref: "#/components/schemas/RoomMaxMessageLength"
          description: Maximum number of characters in a single message, from the request (if specified).
        messageReviewHandler:
          $ref: "#/components/schemas/MessageReviewHandler"
          description: Configuration information for optional review of messages.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource, from the request (if specified).
        loggingConfigurationIdentifiers:
          $ref: "#/components/schemas/LoggingConfigurationIdentifierList"
          description: Array of logging configurations attached to the room, from the request (if specified).
    RoomArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivschat:[a-z0-9-]+:[0-9]+:room/[a-zA-Z0-9-]+
    RoomID:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[a-zA-Z0-9]+"
    MessageID:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[a-zA-Z0-9]+"
    Reason:
      type: string
      minLength: 1
      maxLength: 256
    DeleteMessageResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ID"
          description: Operation identifier, generated by Amazon IVS Chat.
    ID:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[a-zA-Z0-9]+"
    DisconnectUserResponse:
      type: object
    GetLoggingConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/LoggingConfigurationArn"
          description: Logging-configuration ARN, from the request (if identifier was an ARN).
        id:
          $ref: "#/components/schemas/LoggingConfigurationID"
          description: Logging-configuration ID, generated by the system. This is a relative identifier, the part of the ARN that uniquely identifies the logging configuration.
        createTime:
          $ref: "#/components/schemas/Time"
          description: Time when the logging configuration was created. This is an ISO 8601 timestamp; note that this is returned as a string.
        updateTime:
          $ref: "#/components/schemas/Time"
          description: Time of the logging configuration’s last update. This is an ISO 8601 timestamp; note that this is returned as a string.
        name:
          $ref: "#/components/schemas/LoggingConfigurationName"
          description: Logging-configuration name. This value does not need to be unique.
        destinationConfiguration:
          $ref: "#/components/schemas/DestinationConfiguration"
          description: A complex type that contains a destination configuration for where chat content will be logged. There is only one type of destination (cloudWatchLogs, firehose, or s3) in a destinationConfiguration.
        state:
          $ref: "#/components/schemas/LoggingConfigurationState"
          description: The state of the logging configuration. When the state is ACTIVE, the configuration is ready to log chat content.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of maps, each of the form string:string (key:value).
    LoggingConfigurationState:
      type: string
      enum:
        - CREATING
        - CREATE_FAILED
        - DELETING
        - DELETE_FAILED
        - UPDATING
        - UPDATE_FAILED
        - ACTIVE
    GetRoomResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RoomArn"
          description: Room ARN, from the request (if identifier was an ARN).
        id:
          $ref: "#/components/schemas/RoomID"
          description: Room ID, generated by the system. This is a relative identifier, the part of the ARN that uniquely identifies the room.
        name:
          $ref: "#/components/schemas/RoomName"
          description: Room name. The value does not need to be unique.
        createTime:
          $ref: "#/components/schemas/Time"
          description: Time when the room was created. This is an ISO 8601 timestamp; note that this is returned as a string.
        updateTime:
          $ref: "#/components/schemas/Time"
          description: Time of the room’s last update. This is an ISO 8601 timestamp; note that this is returned as a string.
        maximumMessageRatePerSecond:
          $ref: "#/components/schemas/RoomMaxMessageRatePerSecond"
          description: "Maximum number of messages per second that can be sent to the room (by all clients). Default: 10."
        maximumMessageLength:
          $ref: "#/components/schemas/RoomMaxMessageLength"
          description: "Maximum number of characters in a single message. Messages are expected to be UTF-8 encoded and this limit applies specifically to rune/code-point count, not number of bytes. Default: 500."
        messageReviewHandler:
          $ref: "#/components/schemas/MessageReviewHandler"
          description: Configuration information for optional review of messages.
        tags:
          type: object
