openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Amazon GameLift Streams
  description: Amazon GameLift Streams
  x-serviceName: gameliftstreams
  x-serviceAlias: gameliftstreams
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: gameliftstreams
servers:
  - url: https://gameliftstreams.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for gameliftstreams
paths:
  /streamgroups/{identifier}/locations:
    post:
      operationId: AddStreamGroupLocations
      description: "Add locations that can host stream sessions. To add a location, the stream group must be in ACTIVE status. You configure locations and their corresponding capacity for each stream group. Creating a stream group in a location that's nearest to your end users can help minimize latency and improve quality. This operation provisions stream capacity at the specified locations. By default, all locations have 1 or 2 capacity, depending on the stream class option: 2 for 'High' and 1 for 'Ultra' and 'Win2022'. This operation also copies the content files of all associated applications to an internal S3 bucket at each location. This allows Amazon GameLift Streams to host performant stream sessions."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "A stream group to add the specified locations to. This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LocationConfigurations:
                  $ref: "#/components/schemas/LocationConfigurations"
              required:
                - LocationConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddStreamGroupLocationsOutput"
    delete:
      operationId: RemoveStreamGroupLocations
      description: Removes a set of remote locations from this stream group. To remove a location, the stream group must be in ACTIVE status. When you remove a location, Amazon GameLift Streams releases allocated compute resources in that location. Stream sessions can no longer start from removed locations in a stream group. Amazon GameLift Streams also deletes the content files of all associated applications that were in Amazon GameLift Streams's internal Amazon S3 bucket at this location. You cannot remove the Amazon Web Services Region location where you initially created this stream group, known as the primary location. However, you can set the stream capacity to zero to avoid incurring costs for allocated compute resources in that location.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "A stream group to remove the specified locations from. This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
        - name: locations
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LocationsList"
          description: A set of locations to remove this stream group. For example, us-east-1. For a complete list of locations that Amazon GameLift Streams supports, refer to Regions, quotas, and limitations in the Amazon GameLift Streams Developer Guide.
      responses:
        "204":
          description: Success
  /streamgroups/{identifier}/associations:
    post:
      operationId: AssociateApplications
      description: When you associate, or link, an application with a stream group, then Amazon GameLift Streams can launch the application using the stream group's allocated compute resources. The stream group must be in ACTIVE status. You can reverse this action by using DisassociateApplications. If a stream group does not already have a linked application, Amazon GameLift Streams will automatically assign the first application provided in ApplicationIdentifiers as the default.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "A stream group to associate to the applications. This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationIdentifiers:
                  $ref: "#/components/schemas/Identifiers"
              required:
                - ApplicationIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateApplicationsOutput"
  /applications:
    post:
      operationId: CreateApplication
      description: Creates an application resource in Amazon GameLift Streams, which specifies the application content you want to stream, such as a game build or other software, and configures the settings to run it. Before you create an application, upload your application content files to an Amazon Simple Storage Service (Amazon S3) bucket. For more information, see Getting Started in the Amazon GameLift Streams Developer Guide. Make sure that your files in the Amazon S3 bucket are the correct version you want to use. If you change the files at a later time, you will need to create a new Amazon GameLift Streams application. If the request is successful, Amazon GameLift Streams begins to create an application and sets the status to INITIALIZED. When an application reaches READY status, you can use the application to set up stream groups and start streams. To track application status, call GetApplication.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
                RuntimeEnvironment:
                  $ref: "#/components/schemas/RuntimeEnvironment"
                ExecutablePath:
                  $ref: "#/components/schemas/ExecutablePath"
                ApplicationSourceUri:
                  $ref: "#/components/schemas/ApplicationSourceUri"
                ApplicationLogPaths:
                  $ref: "#/components/schemas/FilePaths"
                ApplicationLogOutputUri:
                  $ref: "#/components/schemas/ApplicationLogOutputUri"
                Tags:
                  $ref: "#/components/schemas/Tags"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - RuntimeEnvironment
                - ExecutablePath
                - ApplicationSourceUri
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationOutput"
    get:
      operationId: ListApplications
      description: Retrieves a list of all Amazon GameLift Streams applications that are associated with the Amazon Web Services account in use. This operation returns applications in all statuses, in no particular order. You can paginate the results as needed.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that marks the start of the next set of results. Use this token when you retrieve results as sequential pages. To get the first page of results, omit a token value. To get the remaining pages, provide the token returned with the previous result set.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of results to return. Use this parameter with NextToken to return results in sequential pages. Default value is 25.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsOutput"
  /streamgroups:
    post:
      operationId: CreateStreamGroup
      description: "Stream groups manage how Amazon GameLift Streams allocates resources and handles concurrent streams, allowing you to effectively manage capacity and costs. Within a stream group, you specify an application to stream, streaming locations and their capacity, and the stream class you want to use when streaming applications to your end-users. A stream class defines the hardware configuration of the compute resources that Amazon GameLift Streams will use when streaming, such as the CPU, GPU, and memory. Stream capacity represents the number of concurrent streams that can be active at a time. You set stream capacity per location, per stream group. The following capacity settings are available: Always-on capacity: This setting, if non-zero, indicates minimum streaming capacity which is allocated to you and is never released back to the service. You pay for this base level of capacity at all times, whether used or idle. Maximum capacity: This indicates the maximum capacity that the service can allocate for you. Newly created streams may take a few minutes to start. Capacity is released back to the service when idle. You pay for capacity that is allocated to you until it is released. Target-idle capacity: This indicates idle capacity which the service pre-allocates and holds for you in anticipation of future activity. This helps to insulate your users from capacity-allocation delays. You pay for capacity which is held in this intentional idle state. Values for capacity must be whole number multiples of the tenancy value of the stream group's stream class. To adjust the capacity of any ACTIVE stream group, call UpdateStreamGroup. If the CreateStreamGroup request is successful, Amazon GameLift Streams assigns a unique ID to the stream group resource and sets the status to ACTIVATING. It can take a few minutes for Amazon GameLift Streams to finish creating the stream group while it searches for unallocated compute resources and provisions them. When complete, the stream group status will be ACTIVE and you can start stream sessions by using StartStreamSession. To check the stream group's status, call GetStreamGroup. Stream groups should be recreated every 3-4 weeks to pick up important service updates and fixes. Stream groups that are older than 180 days can no longer be updated with new application associations. Stream groups expire when they are 365 days old, at which point they can no longer stream sessions. The exact expiration date is indicated by the date value in the ExpiresAt field."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
                StreamClass:
                  $ref: "#/components/schemas/StreamClass"
                DefaultApplicationIdentifier:
                  $ref: "#/components/schemas/Identifier"
                LocationConfigurations:
                  $ref: "#/components/schemas/LocationConfigurations"
                Tags:
                  $ref: "#/components/schemas/Tags"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - StreamClass
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStreamGroupOutput"
    get:
      operationId: ListStreamGroups
      description: Retrieves a list of all Amazon GameLift Streams stream groups that are associated with the Amazon Web Services account in use. This operation returns stream groups in all statuses, in no particular order. You can paginate the results as needed.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that marks the start of the next set of results. Use this token when you retrieve results as sequential pages. To get the first page of results, omit a token value. To get the remaining pages, provide the token returned with the previous result set.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of results to return. Use this parameter with NextToken to return results in sequential pages. Default value is 25.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamGroupsOutput"
  /streamgroups/{identifier}/streamsessions/{stream_session_identifier}/connections:
    post:
      operationId: CreateStreamSessionConnection
      description: "Enables clients to reconnect to a stream session while preserving all session state and data in the disconnected session. This reconnection process can be initiated when a stream session is in either PENDING_CLIENT_RECONNECTION or ACTIVE status. The process works as follows: Initial disconnect: When a client disconnects or loses connection, the stream session transitions from CONNECTED to PENDING_CLIENT_RECONNECTION Reconnection time window: Clients have ConnectionTimeoutSeconds (defined in StartStreamSession) to reconnect before session termination Your backend server must call CreateStreamSessionConnection to initiate reconnection Session transitions to RECONNECTING status Reconnection completion: On successful CreateStreamSessionConnection, session status changes to ACTIVE Provide the new connection information to the requesting client Client must establish connection within ConnectionTimeoutSeconds Session terminates automatically if client fails to connect in time For more information about the stream session lifecycle, see Stream sessions in the Amazon GameLift Streams Developer Guide. To begin re-connecting to an existing stream session, specify the stream group ID and stream session ID that you want to reconnect to, and the signal request to use with the stream."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4. The stream group that you want to run this stream session with. The stream group must be in ACTIVE status."
        - name: stream_session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "Amazon Resource Name (ARN) or ID that uniquely identifies the stream session resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamsession/sg-1AB2C3De4/ABC123def4567. Example ID: ABC123def4567. The stream session must be in PENDING_CLIENT_RECONNECTION or ACTIVE status."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                SignalRequest:
                  $ref: "#/components/schemas/SignalRequest"
              required:
                - SignalRequest
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStreamSessionConnectionOutput"
  /applications/{identifier}:
    delete:
      operationId: DeleteApplication
      description: "Permanently deletes an Amazon GameLift Streams application resource. This also deletes the application content files stored with Amazon GameLift Streams. However, this does not delete the original files that you uploaded to your Amazon S3 bucket; you can delete these any time after Amazon GameLift Streams creates an application, which is the only time Amazon GameLift Streams accesses your Amazon S3 bucket. You can only delete an application that meets the following conditions: The application is in READY or ERROR status. You cannot delete an application that's in PROCESSING or INITIALIZED status. The application is not the default application of any stream groups. You must first delete the stream group by using DeleteStreamGroup. The application is not linked to any stream groups. You must first unlink the stream group by using DisassociateApplications. An application is not streaming in any ongoing stream session. You must wait until the client ends the stream session or call TerminateStreamSession to end the stream. If any active stream groups exist for this application, this request returns a ValidationException."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the application resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:application/a-9ZY8X7Wv6. Example ID: a-9ZY8X7Wv6."
      responses:
        "204":
          description: Success
    get:
      operationId: GetApplication
      description: Retrieves properties for an Amazon GameLift Streams application resource. Specify the ID of the application that you want to retrieve. If the operation is successful, it returns properties for the requested application.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the application resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:application/a-9ZY8X7Wv6. Example ID: a-9ZY8X7Wv6."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationOutput"
    patch:
      operationId: UpdateApplication
      description: Updates the mutable configuration settings for a Amazon GameLift Streams application resource. You can change the Description, ApplicationLogOutputUri, and ApplicationLogPaths. To update application settings, specify the application ID and provide the new values. If the operation is successful, it returns the complete updated set of settings for the application.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the application resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:application/a-9ZY8X7Wv6. Example ID: a-9ZY8X7Wv6."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/Description"
                ApplicationLogPaths:
                  $ref: "#/components/schemas/FilePaths"
                ApplicationLogOutputUri:
                  $ref: "#/components/schemas/ApplicationLogOutputUri"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationOutput"
  /streamgroups/{identifier}:
    delete:
      operationId: DeleteStreamGroup
      description: Permanently deletes all compute resources and information related to a stream group. To delete a stream group, specify the unique stream group identifier. During the deletion process, the stream group's status is DELETING. This operation stops streams in progress and prevents new streams from starting. As a best practice, before deleting the stream group, call ListStreamSessions to check for streams in progress and take action to stop them. When you delete a stream group, any application associations referring to that stream group are automatically removed.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      responses:
        "204":
          description: Success
    get:
      operationId: GetStreamGroup
      description: Retrieves properties for a Amazon GameLift Streams stream group resource. Specify the ID of the stream group that you want to retrieve. If the operation is successful, it returns properties for the requested stream group.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamGroupOutput"
    patch:
      operationId: UpdateStreamGroup
      description: "Updates the configuration settings for an Amazon GameLift Streams stream group resource. To update a stream group, it must be in ACTIVE status. You can change the description, the set of locations, and the requested capacity of a stream group per location. If you want to change the stream class, create a new stream group. Stream capacity represents the number of concurrent streams that can be active at a time. You set stream capacity per location, per stream group. The following capacity settings are available: Always-on capacity: This setting, if non-zero, indicates minimum streaming capacity which is allocated to you and is never released back to the service. You pay for this base level of capacity at all times, whether used or idle. Maximum capacity: This indicates the maximum capacity that the service can allocate for you. Newly created streams may take a few minutes to start. Capacity is released back to the service when idle. You pay for capacity that is allocated to you until it is released. Target-idle capacity: This indicates idle capacity which the service pre-allocates and holds for you in anticipation of future activity. This helps to insulate your users from capacity-allocation delays. You pay for capacity which is held in this intentional idle state. Values for capacity must be whole number multiples of the tenancy value of the stream group's stream class. To update a stream group, specify the stream group's Amazon Resource Name (ARN) and provide the new values. If the request is successful, Amazon GameLift Streams returns the complete updated metadata for the stream group. Expired stream groups cannot be updated."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LocationConfigurations:
                  $ref: "#/components/schemas/LocationConfigurations"
                Description:
                  $ref: "#/components/schemas/Description"
                DefaultApplicationIdentifier:
                  $ref: "#/components/schemas/Identifier"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStreamGroupOutput"
  /streamgroups/{identifier}/disassociations:
    post:
      operationId: DisassociateApplications
      description: When you disassociate, or unlink, an application from a stream group, you can no longer stream this application by using that stream group's allocated compute resources. Any streams in process will continue until they terminate, which helps avoid interrupting an end-user's stream. Amazon GameLift Streams will not initiate new streams in the stream group using the disassociated application. The disassociate action does not affect the stream capacity of a stream group. To disassociate an application, the stream group must be in ACTIVE status. If you disassociate the default application, Amazon GameLift Streams will automatically choose a new default application from the remaining associated applications. To change which application is the default application, call UpdateStreamGroup and specify a new DefaultApplicationIdentifier.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "A stream group to disassociate these applications from. This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationIdentifiers:
                  $ref: "#/components/schemas/Identifiers"
              required:
                - ApplicationIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateApplicationsOutput"
  /streamgroups/{identifier}/streamsessions/{stream_session_identifier}/exportfiles:
    put:
      operationId: ExportStreamSessionFiles
      description: "Export the files that your application modifies or generates in a stream session, which can help you debug or verify your application. When your application runs, it generates output files such as logs, diagnostic information, crash dumps, save files, user data, screenshots, and so on. The files can be defined by the engine or frameworks that your application uses, or information that you've programmed your application to output. You can only call this action on a stream session that is in progress, specifically in one of the following statuses ACTIVE, CONNECTED, PENDING_CLIENT_RECONNECTION, and RECONNECTING. You must provide an Amazon Simple Storage Service (Amazon S3) bucket to store the files in. When the session ends, Amazon GameLift Streams produces a compressed folder that contains all of the files and directories that were modified or created by the application during the stream session. AWS uses your security credentials to authenticate and authorize access to your Amazon S3 bucket. Amazon GameLift Streams collects the following generated and modified files. Find them in the corresponding folders in the .zip archive. application/: The folder where your application or game is stored. profile/: The user profile folder. temp/: The system temp folder. To verify the status of the exported files, use GetStreamSession. To delete the files, delete the object in the S3 bucket."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
        - name: stream_session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the stream session resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamsession/sg-1AB2C3De4/ABC123def4567. Example ID: ABC123def4567."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OutputUri:
                  $ref: "#/components/schemas/OutputUri"
              required:
                - OutputUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportStreamSessionFilesOutput"
  /streamgroups/{identifier}/streamsessions/{stream_session_identifier}:
    get:
      operationId: GetStreamSession
      description: Retrieves properties for a Amazon GameLift Streams stream session resource. Specify the Amazon Resource Name (ARN) of the stream session that you want to retrieve and its stream group ARN. If the operation is successful, it returns properties for the requested resource.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "The stream group that runs this stream session. This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
        - name: stream_session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "An Amazon Resource Name (ARN) or ID that uniquely identifies the stream session resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamsession/sg-1AB2C3De4/ABC123def4567. Example ID: ABC123def4567."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamSessionOutput"
    delete:
      operationId: TerminateStreamSession
      description: Permanently terminates an active stream session. When called, the stream session status changes to TERMINATING. You can terminate a stream session in any status except ACTIVATING. If the stream session is in ACTIVATING status, an exception is thrown.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4. The stream group that runs this stream session."
        - name: stream_session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "Amazon Resource Name (ARN) or ID that uniquely identifies the stream session resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamsession/sg-1AB2C3De4/ABC123def4567. Example ID: ABC123def4567."
      responses:
        "204":
          description: Success
  /streamgroups/{identifier}/streamsessions:
    get:
      operationId: ListStreamSessions
      description: Retrieves a list of Amazon GameLift Streams stream sessions that a stream group is hosting. To retrieve stream sessions, specify the stream group, and optionally filter by stream session status. You can paginate the results as needed. This operation returns the requested stream sessions in no particular order.
      parameters:
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StreamSessionStatus"
          description: Filter by the stream session status. You can specify one status in each request to retrieve only sessions that are currently in that status.
        - name: ExportFilesStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExportFilesStatus"
          description: "Filter by the exported files status. You can specify one status in each request to retrieve only sessions that currently have that exported files status. Exported files can be in one of the following states: SUCCEEDED: The exported files are successfully stored in an S3 bucket. FAILED: The session ended but Amazon GameLift Streams couldn't collect and upload the files to S3. PENDING: Either the stream session is still in progress, or uploading the exported files to the S3 bucket is in progress."
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that marks the start of the next set of results. Use this token when you retrieve results as sequential pages. To get the first page of results, omit a token value. To get the remaining pages, provide the token returned with the previous result set.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of results to return. Use this parameter with NextToken to return results in sequential pages. Default value is 25.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The unique identifier of a Amazon GameLift Streams stream group to retrieve the stream session for. You can use either the stream group ID or the Amazon Resource Name (ARN).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamSessionsOutput"
    post:
      operationId: StartStreamSession
      description: "This action initiates a new stream session and outputs connection information that clients can use to access the stream. A stream session refers to an instance of a stream that Amazon GameLift Streams transmits from the server to the end-user. A stream session runs on a compute resource that a stream group has allocated. The start stream session process works as follows: Prerequisites: You must have a stream group in ACTIVE status You must have idle or on-demand capacity in a stream group in the location you want to stream from You must have at least one application associated to the stream group (use AssociateApplications if needed) Start stream request: Your backend server calls StartStreamSession to initiate connection Amazon GameLift Streams creates the stream session resource, assigns an Amazon Resource Name (ARN) value, and begins searching for available stream capacity to run the stream Session transitions to ACTIVATING status Placement completion: If Amazon GameLift Streams is successful in finding capacity for the stream, the stream session status changes to ACTIVE status and StartStreamSession returns stream connection information If Amazon GameLift Streams was not successful in finding capacity within the placement timeout period (defined according to the capacity type and platform type), the stream session status changes to ERROR status and StartStreamSession returns a StatusReason of placementTimeout Connection completion: Provide the new connection information to the requesting client Client must establish connection within ConnectionTimeoutSeconds (specified in StartStreamSession parameters) Session terminates automatically if client fails to connect in time For more information about the stream session lifecycle, see Stream sessions in the Amazon GameLift Streams Developer Guide. Timeouts to be aware of that affect a stream session: Placement timeout: The amount of time that Amazon GameLift Streams has to find capacity for a stream request. Placement timeout varies based on the capacity type used to fulfill your stream request: Always-on capacity: 75 seconds On-demand capacity: Linux/Proton runtimes: 90 seconds Windows runtime: 10 minutes Connection timeout: The amount of time that Amazon GameLift Streams waits for a client to connect to a stream session in ACTIVE status, or reconnect to a stream session in PENDING_CLIENT_RECONNECTION status, the latter of which occurs when a client disconnects or loses connection from a stream session. If no client connects before the timeout, Amazon GameLift Streams terminates the stream session. This value is specified by ConnectionTimeoutSeconds in the StartStreamSession parameters. Maximum session length: A stream session will be terminated after this amount of time has elapsed since it started, regardless of any existing client connections. This value is specified by SessionLengthSeconds in the StartStreamSession parameters. To start a new stream session, specify a stream group ID and application ID, along with the transport protocol and signal request to use with the stream session. For stream groups that have multiple locations, provide a set of locations ordered by priority using a Locations parameter. Amazon GameLift Streams will start a single stream session in the next available location. An application must be finished replicating to a remote location before the remote location can host a stream. To reconnect to a stream session after a client disconnects or loses connection, use CreateStreamSessionConnection."
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: "The stream group to run this stream session with. This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Description:
                  $ref: "#/components/schemas/Description"
                Protocol:
                  $ref: "#/components/schemas/Protocol"
                SignalRequest:
                  $ref: "#/components/schemas/SignalRequest"
                ApplicationIdentifier:
                  $ref: "#/components/schemas/Identifier"
                UserId:
                  $ref: "#/components/schemas/UserId"
                Locations:
                  $ref: "#/components/schemas/LocationList"
                ConnectionTimeoutSeconds:
                  $ref: "#/components/schemas/ConnectionTimeoutSeconds"
                SessionLengthSeconds:
                  $ref: "#/components/schemas/SessionLengthSeconds"
                AdditionalLaunchArgs:
                  $ref: "#/components/schemas/GameLaunchArgList"
                AdditionalEnvironmentVariables:
                  $ref: "#/components/schemas/EnvironmentVariables"
                PerformanceStatsConfiguration:
                  $ref: "#/components/schemas/PerformanceStatsConfiguration"
              required:
                - SignalRequest
                - ApplicationIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartStreamSessionOutput"
  /streamsessions:
    get:
      operationId: ListStreamSessionsByAccount
      description: Retrieves a list of Amazon GameLift Streams stream sessions that this user account has access to. In the returned list of stream sessions, the ExportFilesMetadata property only shows the Status value. To get the OutpurUri and StatusReason values, use GetStreamSession. We don't recommend using this operation to regularly check stream session statuses because it's costly. Instead, to check status updates for a specific stream session, use GetStreamSession.
      parameters:
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StreamSessionStatus"
          description: Filter by the stream session status. You can specify one status in each request to retrieve only sessions that are currently in that status.
        - name: ExportFilesStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExportFilesStatus"
          description: Filter by the exported files status. You can specify one status in each request to retrieve only sessions that currently have that exported files status.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that marks the start of the next set of results. Use this token when you retrieve results as sequential pages. To get the first page of results, omit a token value. To get the remaining pages, provide the token returned with the previous result set.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of results to return. Use this parameter with NextToken to return results in sequential pages. Default value is 25.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamSessionsByAccountOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Retrieves all tags assigned to a Amazon GameLift Streams resource. To list tags for a resource, specify the ARN value for the resource. Learn more Tagging Amazon Web Services Resources in the Amazon Web Services General Reference Amazon Web Services Tagging Strategies
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that you want to retrieve tags for. To get an Amazon GameLift Streams resource ARN, call a List or Get operation for the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: "Assigns one or more tags to a Amazon GameLift Streams resource. Use tags to organize Amazon Web Services resources for a range of purposes. You can assign tags to the following Amazon GameLift Streams resource types: Application StreamGroup Learn more Tagging Amazon Web Services Resources in the Amazon Web Services General Reference Amazon Web Services Tagging Strategies"
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Amazon GameLift Streams resource that you want to apply tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from a Amazon GameLift Streams resource. To remove tags, specify the Amazon GameLift Streams resource and a list of one or more tags to remove.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Amazon GameLift Streams resource that you want to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of tag keys to remove from the specified Amazon GameLift Streams resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Identifier:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "(^[a-zA-Z0-9-]+$)|(^arn:aws:gameliftstreams:([^: ]*):([0-9]{12}):([^: ]*)$)"
    LocationConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/LocationConfiguration"
    LocationConfiguration:
      description: Configuration settings that define a stream group's stream capacity for a location. When configuring a location for the first time, you must specify a numeric value for at least one of the two capacity types. To update the capacity for an existing stream group, call UpdateStreamGroup. To add a new location and specify its capacity, call AddStreamGroupLocations.
      type: object
      properties:
        LocationName:
          $ref: "#/components/schemas/LocationName"
          description: A location's name. For example, us-east-1. For a complete list of locations that Amazon GameLift Streams supports, refer to Regions, quotas, and limitations in the Amazon GameLift Streams Developer Guide.
        AlwaysOnCapacity:
          $ref: "#/components/schemas/AlwaysOnCapacity"
          description: This setting, if non-zero, indicates minimum streaming capacity which is allocated to you and is never released back to the service. You pay for this base level of capacity at all times, whether used or idle.
        OnDemandCapacity:
          $ref: "#/components/schemas/OnDemandCapacity"
          description: This field is deprecated. Use MaximumCapacity instead. This parameter cannot be used with MaximumCapacity or TargetIdleCapacity in the same location configuration. The streaming capacity that Amazon GameLift Streams can allocate in response to stream requests, and then de-allocate when the session has terminated. This offers a cost control measure at the expense of a greater startup time (typically under 5 minutes). Default is 0 when creating a stream group or adding a location.
        TargetIdleCapacity:
          $ref: "#/components/schemas/TargetIdleCapacity"
          description: This indicates idle capacity which the service pre-allocates and holds for you in anticipation of future activity. This helps to insulate your users from capacity-allocation delays. You pay for capacity which is held in this intentional idle state.
        MaximumCapacity:
          $ref: "#/components/schemas/MaximumCapacity"
          description: This indicates the maximum capacity that the service can allocate for you. Newly created streams may take a few minutes to start. Capacity is released back to the service when idle. You pay for capacity that is allocated to you until it is released.
        VpcTransitConfiguration:
          $ref: "#/components/schemas/VpcTransitConfiguration"
          description: Configuration for connecting the stream group to resources in your Amazon VPC using AWS Transit Gateway. This setting is optional. If specified, Amazon GameLift Streams creates a Transit Gateway to enable private network connectivity between the service VPC and your VPC. The VPC ID cannot be changed after the stream group is created, but you can update the CIDR blocks by calling UpdateStreamGroup.
      required:
        - LocationName
    LocationName:
      type: string
      minLength: 1
      maxLength: 20
      pattern: "[a-zA-Z0-9-]+"
    AlwaysOnCapacity:
      type: integer
      minimum: 0
    OnDemandCapacity:
      type: integer
      minimum: 0
    TargetIdleCapacity:
      type: integer
      minimum: 0
    MaximumCapacity:
      type: integer
      minimum: 0
    VpcTransitConfiguration:
      description: Configuration for connecting a stream group location to resources in your Amazon VPC using AWS Transit Gateway. When you specify a VPC transit configuration, Amazon GameLift Streams creates a Transit Gateway and shares it with your account using AWS Resource Access Manager. After the stream group is active, you must complete the setup by accepting the resource share, creating a VPC attachment, and configuring routing.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the Amazon VPC that you want to connect to the stream group. The VPC must be in the same Amazon Web Services account as the stream group. This value cannot be changed after the stream group is created.
        Ipv4CidrBlocks:
          $ref: "#/components/schemas/Ipv4CidrBlockList"
          description: A list of IPv4 CIDR blocks in your VPC that you want the stream group to be able to access. You can specify up to 5 CIDR blocks. The CIDR blocks must be valid subsets of the VPC's CIDR blocks and cannot overlap with the service VPC CIDR block.
      required:
        - VpcId
        - Ipv4CidrBlocks
    VpcId:
      type: string
      minLength: 1
      maxLength: 32
    Ipv4CidrBlockList:
      type: array
      items:
        $ref: "#/components/schemas/Ipv4CidrBlock"
    Ipv4CidrBlock:
      type: string
      pattern: (([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])/([0-9]|[1-2][0-9]|3[0-2])
    AddStreamGroupLocationsOutput:
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/Identifier"
          description: "This value is an Amazon Resource Name (ARN) or ID that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4. Example ID: sg-1AB2C3De4."
        Locations:
          $ref: "#/components/schemas/LocationStates"
          description: "This value is set of locations, including their name, current status, and capacities. A location can be in one of the following states: ACTIVATING: Amazon GameLift Streams is preparing the location. You cannot stream from, scale the capacity of, or remove this location yet. ACTIVE: The location is provisioned with initial capacity. You can now stream from, scale the capacity of, or remove this location. ERROR: Amazon GameLift Streams failed to set up this location. The StatusReason field describes the error. You can remove this location and try to add it again. REMOVING: Amazon GameLift Streams is working to remove this location. This will release all provisioned capacity for this location in this stream group."
      required:
        - Identifier
        - Locations
    LocationStates:
      type: array
      items:
        $ref: "#/components/schemas/LocationState"
    LocationState:
      description: Represents a location and its corresponding stream capacity and status.
      type: object
      properties:
        LocationName:
          $ref: "#/components/schemas/LocationName"
          description: A location's name. For example, us-east-1. For a complete list of locations that Amazon GameLift Streams supports, refer to Regions, quotas, and limitations in the Amazon GameLift Streams Developer Guide.
        Status:
          $ref: "#/components/schemas/StreamGroupLocationStatus"
          description: "This value is set of locations, including their name, current status, and capacities. A location can be in one of the following states: ACTIVATING: Amazon GameLift Streams is preparing the location. You cannot stream from, scale the capacity of, or remove this location yet. ACTIVE: The location is provisioned with initial capacity. You can now stream from, scale the capacity of, or remove this location. ERROR: Amazon GameLift Streams failed to set up this location. The StatusReason field describes the error. You can remove this location and try to add it again. REMOVING: Amazon GameLift Streams is working to remove this location. This will release all provisioned capacity for this location in this stream group."
        AlwaysOnCapacity:
          $ref: "#/components/schemas/AlwaysOnCapacity"
          description: This setting, if non-zero, indicates minimum streaming capacity which is allocated to you and is never released back to the service. You pay for this base level of capacity at all times, whether used or idle.
        OnDemandCapacity:
          $ref: "#/components/schemas/OnDemandCapacity"
          description: The streaming capacity that Amazon GameLift Streams can allocate in response to stream requests, and then de-allocate when the session has terminated. This offers a cost control measure at the expense of a greater startup time (typically under 5 minutes). Default is 0 when creating a stream group or adding a location.
        TargetIdleCapacity:
          $ref: "#/components/schemas/TargetIdleCapacity"
          description: This indicates idle capacity which the service pre-allocates and holds for you in anticipation of future activity. This helps to insulate your users from capacity-allocation delays. You pay for capacity which is held in this intentional idle state.
        MaximumCapacity:
          $ref: "#/components/schemas/MaximumCapacity"
          description: This indicates the maximum capacity that the service can allocate for you. Newly created streams may take a few minutes to start. Capacity is released back to the service when idle. You pay for capacity that is allocated to you until it is released.
        RequestedCapacity:
          $ref: "#/components/schemas/CapacityValue"
          description: This value is the always-on capacity that you most recently requested for a stream group. You request capacity separately for each location in a stream group. In response to an increase in requested capacity, Amazon GameLift Streams attempts to provision compute resources to make the stream group's allocated capacity meet requested capacity. When always-on capacity is decreased, it can take a few minutes to deprovision allocated capacity to match the requested capacity.
        AllocatedCapacity:
          $ref: "#/components/schemas/CapacityValue"
          description: This value is the stream capacity that Amazon GameLift Streams has provisioned in a stream group that can respond immediately to stream requests. It includes resources that are currently streaming and resources that are idle and ready to respond to stream requests. When target-idle capacity is configured, the idle resources include the capacity buffer maintained beyond ongoing sessions. You pay for this capacity whether it's in use or not. After making changes to capacity, it can take a few minutes for the allocated capacity count to reflect the change while compute resources are allocated or deallocated. Similarly, when allocated on-demand capacity is no longer needed, it can take a few minutes for Amazon GameLift Streams to spin down the allocated capacity.
        IdleCapacity:
          $ref: "#/components/schemas/CapacityValue"
          description: This value is the amount of allocated capacity that is not currently streaming. It represents the stream group's ability to respond immediately to new stream requests with near-instant startup time.
        InternalVpcIpv4CidrBlock:
          $ref: "#/components/schemas/Ipv4CidrBlock"
          description: The CIDR block of the service VPC for this location. Add this CIDR block to your VPC route table to enable traffic routing through the Transit Gateway.
        VpcTransitConfiguration:
          $ref: "#/components/schemas/VpcTransitConfigurationResponse"
          description: The VPC transit configuration for this location, including the Transit Gateway details needed to complete the VPC attachment setup.
    StreamGroupLocationStatus:
      type: string
      enum:
        - ACTIVATING
        - ACTIVE
        - ERROR
        - REMOVING
    CapacityValue:
      type: integer
      minimum: 0
    VpcTransitConfigurationResponse:
      description: The VPC transit configuration details for a stream group location, including the Transit Gateway information needed to complete the VPC attachment setup.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the Amazon VPC that is connected to the stream group.
        Ipv4CidrBlocks:
          $ref: "#/components/schemas/Ipv4CidrBlockList"
          description: The IPv4 CIDR blocks in your VPC that the stream group can access.
        TransitGatewayId:
          $ref: "#/components/schemas/String"
          description: The ID of the Transit Gateway that Amazon GameLift Streams created for this VPC connection. Use this ID when creating your VPC attachment.
        TransitGatewayResourceShareArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the AWS Resource Access Manager resource share for the Transit Gateway. You must accept this resource share before you can create a VPC attachment.
    String:
      type: string
    Identifiers:
      type: array
      items:
        $ref: "#/components/schemas/Identifier"
    AssociateApplicationsOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: "A stream group that is associated to the applications. This value is an Amazon Resource Name (ARN) that uniquely identifies the stream group resource. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:streamgroup/sg-1AB2C3De4."
        ApplicationArns:
          $ref: "#/components/schemas/ArnList"
          description: "A set of applications that are associated to the stream group. This value is a set of Amazon Resource Names (ARNs) that uniquely identify application resources. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:application/a-9ZY8X7Wv6."
    Arn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "arn:aws:gameliftstreams:([^: ]*):([0-9]{12}):([^: ]*)"
    ArnList:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    Description:
      type: string
      minLength: 1
      maxLength: 80
      pattern: "[a-zA-Z0-9-_.!+@/][a-zA-Z0-9-_.!+@/ ]*"
    RuntimeEnvironment:
      description: "Configuration settings that identify the operating system for an application resource. This can also include a compatibility layer and other drivers. A runtime environment can be one of the following: For Linux applications Ubuntu 22.04 LTS (Type=UBUNTU, Version=22_04_LTS) For Windows applications Microsoft Windows Server 2022 Base (Type=WINDOWS, Version=2022) Proton 10.0-4 (Type=PROTON, Version=20260204) Proton 9.0-2 (Type=PROTON, Version=20250516) Proton 8.0-5 (Type=PROTON, Version=20241007) Proton 8.0-2c (Type=PROTON, Version=20230704)"
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/RuntimeEnvironmentType"
          description: The operating system and other drivers. For Proton, this also includes the Proton compatibility layer.
        Version:
          $ref: "#/components/schemas/RuntimeEnvironmentVersion"
          description: Versioned container environment for the application operating system.
      required:
        - Type
        - Version
    RuntimeEnvironmentType:
      type: string
      enum:
        - PROTON
        - WINDOWS
        - UBUNTU
    RuntimeEnvironmentVersion:
      type: string
      minLength: 1
      maxLength: 256
    ExecutablePath:
      type: string
      minLength: 1
      maxLength: 1024
    ApplicationSourceUri:
      type: string
      minLength: 1
      maxLength: 1024
    FilePaths:
      type: array
      items:
        $ref: "#/components/schemas/FilePath"
    FilePath:
      type: string
      minLength: 0
      maxLength: 1024
    ApplicationLogOutputUri:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: $|^s3://([a-zA-Z0-9][a-zA-Z0-9._-]{1,61}[a-zA-Z0-9])(/[a-zA-Z0-9._-]+)*/?
    Tags:
      type: object
      properties: {}
    ClientToken:
      type: string
      minLength: 32
      maxLength: 128
      pattern: "[\\x21-\\x7E]+"
    CreateApplicationOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) that's assigned to an application resource and uniquely identifies it across all Amazon Web Services Regions. Format is arn:aws:gameliftstreams:[AWS Region]:[AWS account]:application/[resource ID].
        Description:
          $ref: "#/components/schemas/Description"
          description: A human-readable label for the application. You can edit this value.
        RuntimeEnvironment:
          $ref: "#/components/schemas/RuntimeEnvironment"
          description: "Configuration settings that identify the operating system for an application resource. This can also include a compatibility layer and other drivers. A runtime environment can be one of the following: For Linux applications Ubuntu 22.04 LTS (Type=UBUNTU, Version=22_04_LTS) For Windows applications Microsoft Windows Server 2022 Base (Type=WINDOWS, Version=2022) Proton 10.0-4 (Type=PROTON, Version=20260204) Proton 9.0-2 (Type=PROTON, Version=20250516) Proton 8.0-5 (Type=PROTON, Version=20241007) Proton 8.0-2c (Type=PROTON, Version=20230704)"
        ExecutablePath:
          $ref: "#/components/schemas/ExecutablePath"
          description: The relative path and file name of the executable file that launches the content for streaming.
        ApplicationLogPaths:
          $ref: "#/components/schemas/FilePaths"
          description: Locations of log files that your content generates during a stream session. Amazon GameLift Streams uploads log files to the Amazon S3 bucket that you specify in ApplicationLogOutputUri at the end of a stream session. To retrieve stored log files, call GetStreamSession and get the LogFileLocationUri.
        ApplicationLogOutputUri:
          $ref: "#/components/schemas/ApplicationLogOutputUri"
          description: An Amazon S3 URI to a bucket where you would like Amazon GameLift Streams to save application logs. Required if you specify one or more ApplicationLogPaths.
        ApplicationSourceUri:
          $ref: "#/components/schemas/ApplicationSourceUri"
          description: The original Amazon S3 location of uploaded stream content for the application.
        Id:
          $ref: "#/components/schemas/Id"
          description: "A unique ID value that is assigned to the resource when it's created. Format example: a-9ZY8X7Wv6."
        Status:
          $ref: "#/components/schemas/ApplicationStatus"
          description: "The current status of the application resource. Possible statuses include the following: INITIALIZED: Amazon GameLift Streams has received the request and is initiating the work flow to create an application. PROCESSING: The create application work flow is in process. Amazon GameLift Streams is copying the content and caching for future deployment in a stream group. READY: The application is ready to deploy in a stream group. ERROR: An error occurred when setting up the application. See StatusReason for more information. DELETING: Amazon GameLift Streams is in the process of deleting the application."
        StatusReason:
          $ref: "#/components/schemas/ApplicationStatusReason"
          description: A short description of the status reason when the application is in ERROR status.
