          description: "The time at which this stream group expires. Timestamps are expressed using in ISO8601 format, such as: 2022-12-27T22:29:40+00:00 (UTC). After this time, you will no longer be able to update this stream group or use it to start stream sessions. Only Get and Delete operations will work on an expired stream group."
        AssociatedApplications:
          $ref: "#/components/schemas/ArnList"
          description: "A set of applications that this stream group is associated with. You can stream any of these applications with the stream group. This value is a set of Amazon Resource Names (ARNs) that uniquely identify application resources. Example ARN: arn:aws:gameliftstreams:us-west-2:111122223333:application/a-9ZY8X7Wv6."
      required:
        - Arn
