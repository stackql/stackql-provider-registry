        - VAST_RESPONSE
        - REDIRECTED_VAST_RESPONSE
        - FILLED_AVAIL
        - FILLED_OVERLAY_AVAIL
        - BEACON_FIRED
        - WARNING_NO_ADVERTISEMENTS
        - WARNING_VPAID_AD_DROPPED
        - WARNING_URL_VARIABLE_SUBSTITUTION_FAILED
        - ERROR_UNKNOWN
