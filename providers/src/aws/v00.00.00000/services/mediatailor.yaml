      type: string
      enum:
        - VENDED_LOGS
        - LEGACY_CLOUDWATCH
    AdsInteractionLog:
      description: Settings for customizing what events are included in logs for interactions with the ad decision server (ADS). For more information about ADS logs, inlcuding descriptions of the event types, see MediaTailor ADS logs description and event types in Elemental MediaTailor User Guide.
      type: object
      properties:
        PublishOptInEventTypes:
          $ref: "#/components/schemas/__adsInteractionPublishOptInEventTypesList"
          description: Indicates that MediaTailor emits RAW_ADS_RESPONSE logs for playback sessions that are initialized with this configuration.
        ExcludeEventTypes:
          $ref: "#/components/schemas/__adsInteractionExcludeEventTypesList"
          description: Indicates that MediaTailor won't emit the selected events in the logs for playback sessions that are initialized with this configuration.
    __adsInteractionPublishOptInEventTypesList:
      type: array
      items:
        $ref: "#/components/schemas/AdsInteractionPublishOptInEventType"
