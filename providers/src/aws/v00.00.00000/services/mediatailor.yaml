        Body:
          $ref: "#/components/schemas/__string"
          description: An expression that evaluates to the request body. Used with POST requests. The maximum size after evaluation is 64 KB.
        Headers:
          type: object
          properties: {}
          description: A map of HTTP header names to expression values. MediaTailor evaluates each header value expression at runtime and includes the result in the outbound HTTP request. Maximum 50 headers.
      required:
        - Runtime
        - MethodType
        - RequestTimeoutMilliseconds
        - Url
    RuntimeType:
      type: string
      enum:
        - JSONATA
    MethodType:
      type: string
      enum:
        - GET
        - POST
    CustomOutputConfiguration:
      description: The configuration for a CUSTOM_OUTPUT function. MediaTailor evaluates the output expressions against the current session state and commits the results as output bindings. CUSTOM_OUTPUT functions do not make external calls. For more information, see CUSTOM_OUTPUT in the MediaTailor User Guide.
      type: object
      properties:
        Runtime:
          $ref: "#/components/schemas/RuntimeType"
          description: The expression language used to evaluate expressions in the function configuration. Set this to JSONata.
        Output:
          type: object
          properties: {}
          description: A map of output bindings. Each key is a namespaced output path (such as player_params.device_type or temp.variant), and each value is an expression that MediaTailor evaluates at runtime against the current session state. For more information about expression syntax, see JSONata expression reference in the MediaTailor User Guide.
      required:
        - Runtime
    SequentialExecutorConfiguration:
      description: The configuration for a SEQUENTIAL_EXECUTOR function. A SEQUENTIAL_EXECUTOR runs a sequence of child functions in order, passing data between steps through temporary data. For more information, see SEQUENTIAL_EXECUTOR in the MediaTailor User Guide.
      type: object
      properties:
        Runtime:
          $ref: "#/components/schemas/RuntimeType"
          description: The expression language used to evaluate expressions in the function configuration. Set this to JSONata.
        Output:
          type: object
          properties: {}
          description: An optional map of output bindings that controls which bindings the sequence commits to the session state after all steps complete. If omitted, MediaTailor commits all accumulated output bindings from all child steps.
        FunctionList:
          $ref: "#/components/schemas/__listOfFunctionsRef"
          description: An ordered list of 1 to 10 steps. Each step specifies a child function to execute and an optional run condition expression that controls whether the step runs. MediaTailor executes steps in order, passing data between steps through temporary data.
        TimeoutMilliseconds:
          $ref: "#/components/schemas/__integer"
          description: The maximum time, in milliseconds, for the entire sequence to complete. This timeout covers all steps, including any HTTP calls made by child functions. If the sequence exceeds this timeout, MediaTailor discards all output from the sequence and proceeds with default behavior.
      required:
        - Runtime
        - FunctionList
        - TimeoutMilliseconds
    __listOfFunctionsRef:
      type: array
      items:
        $ref: "#/components/schemas/FunctionRef"
    FunctionRef:
      description: A reference to a child function within a SEQUENTIAL_EXECUTOR function.
      type: object
      properties:
        RunCondition:
          $ref: "#/components/schemas/__string"
          description: An optional expression that evaluates to a boolean. MediaTailor evaluates this expression immediately before running the step, using the accumulated state at that point in the sequence. If the expression evaluates to false, MediaTailor skips the step and moves to the next one. If omitted, the step always runs.
        FunctionId:
          $ref: "#/components/schemas/__string"
          description: The identifier of the child function to execute in this step.
    GetPlaybackConfigurationResponse:
      type: object
      properties:
        AdDecisionServerUrl:
          $ref: "#/components/schemas/__string"
          description: The URL for the ad decision server (ADS). This includes the specification of static parameters and placeholders for dynamic parameters. AWS Elemental MediaTailor substitutes player-specific and session-specific parameters as needed when calling the ADS. Alternately, for testing, you can provide a static VAST URL. The maximum length is 25,000 characters.
        AvailSuppression:
          $ref: "#/components/schemas/AvailSuppression"
          description: The configuration for avail suppression, also known as ad suppression. For more information about ad suppression, see Ad Suppression.
        Bumper:
          $ref: "#/components/schemas/Bumper"
          description: The configuration for bumpers. Bumpers are short audio or video clips that play at the start or before the end of an ad break. To learn more about bumpers, see Bumpers.
        CdnConfiguration:
          $ref: "#/components/schemas/CdnConfiguration"
          description: The configuration for using a content delivery network (CDN), like Amazon CloudFront, for content and ad segment management.
        ConfigurationAliases:
          type: object
          properties: {}
          description: The player parameters and aliases used as dynamic variables during session initialization. For more information, see Domain Variables.
        DashConfiguration:
          $ref: "#/components/schemas/DashConfiguration"
          description: The configuration for DASH content.
        HlsConfiguration:
          $ref: "#/components/schemas/HlsConfiguration"
          description: The configuration for HLS content.
        InsertionMode:
          $ref: "#/components/schemas/InsertionMode"
          description: The setting that controls whether players can use stitched or guided ad insertion. The default, STITCHED_ONLY, forces all player sessions to use stitched (server-side) ad insertion. Choosing PLAYER_SELECT allows players to select either stitched or guided ad insertion at session-initialization time. The default for players that do not specify an insertion mode is stitched.
        LivePreRollConfiguration:
          $ref: "#/components/schemas/LivePreRollConfiguration"
          description: The configuration for pre-roll ad insertion.
        LogConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: The configuration that defines where AWS Elemental MediaTailor sends logs for the playback configuration.
        ManifestProcessingRules:
          $ref: "#/components/schemas/ManifestProcessingRules"
          description: The configuration for manifest processing rules. Manifest processing rules enable customization of the personalized manifests created by MediaTailor.
        Name:
          $ref: "#/components/schemas/__string"
          description: The identifier for the playback configuration.
        PersonalizationThresholdSeconds:
          $ref: "#/components/schemas/__integerMin1"
          description: Defines the maximum duration of underfilled ad time (in seconds) allowed in an ad break. If the duration of underfilled ad time exceeds the personalization threshold, then the personalization of the ad break is abandoned and the underlying content is shown. This feature applies to ad replacement in live and VOD streams, rather than ad insertion, because it relies on an underlying content stream. For more information about ad break behavior, including ad replacement and insertion, see Ad Behavior in AWS Elemental MediaTailor.
        PlaybackConfigurationArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the playback configuration.
        PlaybackEndpointPrefix:
          $ref: "#/components/schemas/__string"
          description: The URL that the player accesses to get a manifest from AWS Elemental MediaTailor. This session will use server-side reporting.
        SessionInitializationEndpointPrefix:
          $ref: "#/components/schemas/__string"
          description: The URL that the player uses to initialize a session that uses client-side reporting.
        SlateAdUrl:
          $ref: "#/components/schemas/__string"
          description: The URL for a high-quality video asset to transcode and use to fill in time that's not used by ads. AWS Elemental MediaTailor shows the slate to fill in gaps in media content. Configuring the slate is optional for non-VPAID playback configurations. For VPAID, the slate is required because MediaTailor provides it in the slots designated for dynamic ad content. The slate must be a high-quality asset that contains both audio and video.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the playback configuration. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
        TranscodeProfileName:
          $ref: "#/components/schemas/__string"
          description: The name that is used to associate this playback configuration with a custom transcode profile. This overrides the dynamic transcoding defaults of MediaTailor. Use this only if you have already set up custom profiles with the help of AWS Support.
        VideoContentSourceUrl:
          $ref: "#/components/schemas/__string"
          description: The URL prefix for the parent manifest for the stream, minus the asset ID. The maximum length is 512 characters.
        AdConditioningConfiguration:
          $ref: "#/components/schemas/AdConditioningConfiguration"
          description: The setting that indicates what conditioning MediaTailor will perform on ads that the ad decision server (ADS) returns, and what priority MediaTailor uses when inserting ads.
        AdDecisionServerConfiguration:
          $ref: "#/components/schemas/AdDecisionServerConfiguration"
          description: The configuration for customizing HTTP requests to the ad decision server (ADS). This includes settings for request method, headers, body content, and compression options.
        FunctionMapping:
          type: object
          properties: {}
          description: A map of lifecycle hook event names to function identifiers. The function mapping specifies which function MediaTailor executes at each lifecycle hook during ad insertion. Valid keys are PRE_SESSION_INITIALIZATION and PRE_ADS_REQUEST. For more information, see Functions lifecycle hooks in the MediaTailor User Guide.
    AvailSuppression:
      description: The configuration for avail suppression, also known as ad suppression. For more information about ad suppression, see Ad Suppression.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/Mode"
          description: Sets the ad suppression mode. By default, ad suppression is off and all ad breaks are filled with ads or slate. When Mode is set to BEHIND_LIVE_EDGE, ad suppression is active and MediaTailor won't fill ad breaks on or behind the ad suppression Value time in the manifest lookback window. When Mode is set to AFTER_LIVE_EDGE, ad suppression is active and MediaTailor won't fill ad breaks that are within the live edge plus the avail suppression value.
        Value:
          $ref: "#/components/schemas/__string"
          description: A live edge offset time in HH:MM:SS. MediaTailor won't fill ad breaks on or behind this time in the manifest lookback window. If Value is set to 00:00:00, it is in sync with the live edge, and MediaTailor won't fill any ad breaks on or behind the live edge. If you set a Value time, MediaTailor won't fill any ad breaks on or behind this time in the manifest lookback window. For example, if you set 00:45:00, then MediaTailor will fill ad breaks that occur within 45 minutes behind the live edge, but won't fill ad breaks on or behind 45 minutes behind the live edge.
        FillPolicy:
          $ref: "#/components/schemas/FillPolicy"
          description: Defines the policy to apply to the avail suppression mode. BEHIND_LIVE_EDGE will always use the full avail suppression policy. AFTER_LIVE_EDGE mode can be used to invoke partial ad break fills when a session starts mid-break.
    Mode:
      type: string
      enum:
        - "OFF"
        - BEHIND_LIVE_EDGE
        - AFTER_LIVE_EDGE
    FillPolicy:
      type: string
      enum:
        - FULL_AVAIL_ONLY
        - PARTIAL_AVAIL
    Bumper:
      description: The configuration for bumpers. Bumpers are short audio or video clips that play at the start or before the end of an ad break. To learn more about bumpers, see Bumpers.
      type: object
      properties:
        EndUrl:
          $ref: "#/components/schemas/__string"
          description: The URL for the end bumper asset.
        StartUrl:
          $ref: "#/components/schemas/__string"
          description: The URL for the start bumper asset.
    CdnConfiguration:
      description: The configuration for using a content delivery network (CDN), like Amazon CloudFront, for content and ad segment management.
      type: object
      properties:
        AdSegmentUrlPrefix:
          $ref: "#/components/schemas/__string"
          description: A non-default content delivery network (CDN) to serve ad segments. By default, AWS Elemental MediaTailor uses Amazon CloudFront with default cache settings as its CDN for ad segments. To set up an alternate CDN, create a rule in your CDN for the origin ads.mediatailor.`<region>`.amazonaws.com. Then specify the rule's name in this AdSegmentUrlPrefix. When AWS Elemental MediaTailor serves a manifest, it reports your CDN as the source for ad segments.
        ContentSegmentUrlPrefix:
          $ref: "#/components/schemas/__string"
          description: A content delivery network (CDN) to cache content segments, so that content requests don’t always have to go to the origin server. First, create a rule in your CDN for the content segment origin server. Then specify the rule's name in this ContentSegmentUrlPrefix. When AWS Elemental MediaTailor serves a manifest, it reports your CDN as the source for content segments.
    DashConfiguration:
      description: The configuration for DASH content.
      type: object
      properties:
        ManifestEndpointPrefix:
          $ref: "#/components/schemas/__string"
          description: The URL generated by MediaTailor to initiate a playback session. The session uses server-side reporting. This setting is ignored in PUT operations.
        MpdLocation:
          $ref: "#/components/schemas/__string"
          description: The setting that controls whether MediaTailor includes the Location tag in DASH manifests. MediaTailor populates the Location tag with the URL for manifest update requests, to be used by players that don't support sticky redirects. Disable this if you have CDN routing rules set up for accessing MediaTailor manifests, and you are either using client-side reporting or your players support sticky HTTP redirects. Valid values are DISABLED and EMT_DEFAULT. The EMT_DEFAULT setting enables the inclusion of the tag and is the default value.
        OriginManifestType:
          $ref: "#/components/schemas/OriginManifestType"
          description: The setting that controls whether MediaTailor handles manifests from the origin server as multi-period manifests or single-period manifests. If your origin server produces single-period manifests, set this to SINGLE_PERIOD. The default setting is MULTI_PERIOD. For multi-period manifests, omit this setting or set it to MULTI_PERIOD.
    OriginManifestType:
      type: string
      enum:
        - SINGLE_PERIOD
        - MULTI_PERIOD
    HlsConfiguration:
      description: The configuration for HLS content.
      type: object
      properties:
        ManifestEndpointPrefix:
          $ref: "#/components/schemas/__string"
          description: The URL that is used to initiate a playback session for devices that support Apple HLS. The session uses server-side reporting.
    InsertionMode:
      description: Insertion Mode controls whether players can use stitched or guided ad insertion.
      type: string
      enum:
        - STITCHED_ONLY
        - PLAYER_SELECT
    LivePreRollConfiguration:
      description: The configuration for pre-roll ad insertion.
      type: object
      properties:
        AdDecisionServerUrl:
          $ref: "#/components/schemas/__string"
          description: The URL for the ad decision server (ADS) for pre-roll ads. This includes the specification of static parameters and placeholders for dynamic parameters. AWS Elemental MediaTailor substitutes player-specific and session-specific parameters as needed when calling the ADS. Alternately, for testing, you can provide a static VAST URL. The maximum length is 25,000 characters.
        MaxDurationSeconds:
          $ref: "#/components/schemas/__integer"
          description: The maximum allowed duration for the pre-roll ad avail. AWS Elemental MediaTailor won't play pre-roll ads to exceed this duration, regardless of the total duration of ads that the ADS returns.
    LogConfiguration:
      description: Defines where AWS Elemental MediaTailor sends logs for the playback configuration.
      type: object
      properties:
        PercentEnabled:
          $ref: "#/components/schemas/__integer"
          description: "The percentage of session logs that MediaTailor sends to your configured log destination. For example, if your playback configuration has 1000 sessions and percentEnabled is set to 60, MediaTailor sends logs for 600 of the sessions to CloudWatch Logs. MediaTailor decides at random which of the playback configuration sessions to send logs for. If you want to view logs for a specific session, you can use the debug log mode. Valid values: 0 - 100"
        EnabledLoggingStrategies:
          $ref: "#/components/schemas/__listOfLoggingStrategies"
          description: The method used for collecting logs from AWS Elemental MediaTailor. LEGACY_CLOUDWATCH indicates that MediaTailor is sending logs directly to Amazon CloudWatch Logs. VENDED_LOGS indicates that MediaTailor is sending logs to CloudWatch, which then vends the logs to your destination of choice. Supported destinations are CloudWatch Logs log group, Amazon S3 bucket, and Amazon Data Firehose stream.
        AdsInteractionLog:
          $ref: "#/components/schemas/AdsInteractionLog"
          description: Settings for customizing what events are included in logs for interactions with the ad decision server (ADS).
        ManifestServiceInteractionLog:
          $ref: "#/components/schemas/ManifestServiceInteractionLog"
          description: Settings for customizing what events are included in logs for interactions with the origin server.
      required:
        - PercentEnabled
        - EnabledLoggingStrategies
    ManifestProcessingRules:
      description: The configuration for manifest processing rules. Manifest processing rules enable customization of the personalized manifests created by MediaTailor.
      type: object
      properties:
        AdMarkerPassthrough:
          $ref: "#/components/schemas/AdMarkerPassthrough"
          description: For HLS, when set to true, MediaTailor passes through EXT-X-CUE-IN, EXT-X-CUE-OUT, and EXT-X-SPLICEPOINT-SCTE35 ad markers from the origin manifest to the MediaTailor personalized manifest. No logic is applied to these ad markers. For example, if EXT-X-CUE-OUT has a value of 60, but no ads are filled for that ad break, MediaTailor will not set the value to 0.
    AdMarkerPassthrough:
      description: For HLS, when set to true, MediaTailor passes through EXT-X-CUE-IN, EXT-X-CUE-OUT, and EXT-X-SPLICEPOINT-SCTE35 ad markers from the origin manifest to the MediaTailor personalized manifest. No logic is applied to these ad markers. For example, if EXT-X-CUE-OUT has a value of 60, but no ads are filled for that ad break, MediaTailor will not set the value to 0.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/__boolean"
          description: Enables ad marker passthrough for your configuration.
    __boolean:
      type: boolean
    __integerMin1:
      type: integer
      minimum: 1
    AdConditioningConfiguration:
      description: The setting that indicates what conditioning MediaTailor will perform on ads that the ad decision server (ADS) returns.
      type: object
      properties:
        StreamingMediaFileConditioning:
          $ref: "#/components/schemas/StreamingMediaFileConditioning"
          description: For ads that have media files with streaming delivery and supported file extensions, indicates what transcoding action MediaTailor takes when it first receives these ads from the ADS. TRANSCODE indicates that MediaTailor must transcode the ads. NONE indicates that you have already transcoded the ads outside of MediaTailor and don't need them transcoded as part of the ad insertion workflow. For more information about ad conditioning see Using preconditioned ads in the Elemental MediaTailor user guide.
      required:
        - StreamingMediaFileConditioning
    StreamingMediaFileConditioning:
      type: string
      enum:
        - TRANSCODE
        - NONE
    AdDecisionServerConfiguration:
      description: Configuration parameters for customizing HTTP requests sent to the ad decision server (ADS). This allows you to specify the HTTP method, headers, request body, and compression settings for ADS requests.
      type: object
      properties:
        HttpRequest:
          $ref: "#/components/schemas/HttpRequest"
          description: The HTTP request configuration parameters for the ad decision server.
    HttpRequest:
      description: HTTP request configuration parameters that define how MediaTailor communicates with the ad decision server.
      type: object
      properties:
        Method:
          $ref: "#/components/schemas/Method"
          description: The HTTP method to use when making requests to the ad decision server. Supported values are GET and POST.
        Body:
          $ref: "#/components/schemas/__string"
          description: The request body content to send with HTTP requests to the ad decision server. This value is only eligible for POST requests.
        Headers:
          type: object
          properties: {}
          description: Custom HTTP headers to include in requests to the ad decision server. Specify headers as key-value pairs. This value is only eligible for POST requests.
        CompressRequest:
          $ref: "#/components/schemas/CompressionMethod"
          description: The compression method to apply to requests sent to the ad decision server. Supported values are NONE and GZIP. This value is only eligible for POST requests.
    Method:
      type: string
      enum:
        - GET
        - POST
    CompressionMethod:
      type: string
      enum:
        - NONE
        - GZIP
    GetPrefetchScheduleResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the prefetch schedule.
        Consumption:
          $ref: "#/components/schemas/PrefetchConsumption"
          description: The configuration settings for how and when MediaTailor consumes prefetched ads from the ad decision server for single prefetch schedules. Each consumption configuration contains an end time and an optional start time that define the consumption window. Prefetch schedules automatically expire no earlier than seven days after the end time.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the prefetch schedule. The name must be unique among all prefetch schedules that are associated with the specified playback configuration.
        PlaybackConfigurationName:
          $ref: "#/components/schemas/__string"
          description: The name of the playback configuration to create the prefetch schedule for.
        Retrieval:
          $ref: "#/components/schemas/PrefetchRetrieval"
          description: A complex type that contains settings for prefetch retrieval from the ad decision server (ADS).
        ScheduleType:
          $ref: "#/components/schemas/PrefetchScheduleType"
          description: The frequency that MediaTailor creates prefetch schedules. SINGLE indicates that this schedule applies to one ad break. RECURRING indicates that MediaTailor automatically creates a schedule for each ad avail in a live event.
        RecurringPrefetchConfiguration:
          $ref: "#/components/schemas/RecurringPrefetchConfiguration"
          description: The configuration that defines how and when MediaTailor performs ad prefetching in a live event.
        StreamId:
          $ref: "#/components/schemas/__string"
          description: An optional stream identifier that you can specify in order to prefetch for multiple streams that use the same playback configuration.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the prefetch schedule. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
    ListAlertsResponse:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/__listOfAlert"
          description: A list of alerts that are associated with this resource.
        NextToken:
          $ref: "#/components/schemas/__string"
          description: Pagination token returned by the list request when results exceed the maximum allowed. Use the token to fetch the next page of results.
    __listOfAlert:
      type: array
      items:
        $ref: "#/components/schemas/Alert"
    Alert:
      description: Alert configuration parameters.
      type: object
      properties:
        AlertCode:
          $ref: "#/components/schemas/__string"
          description: The code for the alert. For example, NOT_PROCESSED.
        AlertMessage:
          $ref: "#/components/schemas/__string"
          description: If an alert is generated for a resource, an explanation of the reason for the alert.
        LastModifiedTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp when the alert was last modified.
        RelatedResourceArns:
          $ref: "#/components/schemas/__listOf__string"
          description: The Amazon Resource Names (ARNs) related to this alert.
        ResourceArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource.
        Category:
          $ref: "#/components/schemas/AlertCategory"
          description: The category that MediaTailor assigns to the alert.
      required:
        - AlertCode
        - AlertMessage
        - LastModifiedTime
        - RelatedResourceArns
        - ResourceArn
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    AlertCategory:
      type: string
      enum:
        - SCHEDULING_ERROR
        - PLAYBACK_WARNING
        - INFO
    ListChannelsResponse:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/__listOfChannel"
          description: A list of channels that are associated with this account.
        NextToken:
          $ref: "#/components/schemas/__string"
          description: Pagination token returned by the list request when results exceed the maximum allowed. Use the token to fetch the next page of results.
    __listOfChannel:
      type: array
      items:
        $ref: "#/components/schemas/Channel"
    Channel:
      description: The configuration parameters for a channel. For information about MediaTailor channels, see Working with channels in the MediaTailor User Guide.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The ARN of the channel.
        ChannelName:
          $ref: "#/components/schemas/__string"
          description: The name of the channel.
        ChannelState:
          $ref: "#/components/schemas/__string"
          description: Returns the state whether the channel is running or not.
        CreationTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp of when the channel was created.
        FillerSlate:
          $ref: "#/components/schemas/SlateSource"
          description: The slate used to fill gaps between programs in the schedule. You must configure filler slate if your channel uses the LINEAR PlaybackMode. MediaTailor doesn't support filler slate for channels using the LOOP PlaybackMode.
        LastModifiedTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp of when the channel was last modified.
        Outputs:
          $ref: "#/components/schemas/ResponseOutputs"
          description: The channel's output properties.
        PlaybackMode:
          $ref: "#/components/schemas/__string"
          description: The type of playback mode for this channel. LINEAR - Programs play back-to-back only once. LOOP - Programs play back-to-back in an endless loop. When the last program in the schedule plays, playback loops back to the first program in the schedule.
        Tags:
          type: object
          properties: {}
          description: The tags to assign to the channel. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
        Tier:
          $ref: "#/components/schemas/__string"
          description: The tier for this channel. STANDARD tier channels can contain live programs.
        LogConfiguration:
          $ref: "#/components/schemas/LogConfigurationForChannel"
          description: The log configuration.
        Audiences:
          $ref: "#/components/schemas/Audiences"
          description: The list of audiences defined in channel.
      required:
        - Arn
        - ChannelName
        - ChannelState
        - Outputs
        - PlaybackMode
        - Tier
        - LogConfiguration
    ListFunctionsResponse:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/__listOfFunctionsResponse"
          description: A list of functions associated with your account in the current Region.
        NextToken:
          $ref: "#/components/schemas/__string"
          description: Pagination token returned by the list request when results exceed the maximum allowed. Use the token to fetch the next page of results. For the first ListFunctions request, omit this value. For subsequent requests, get the value of NextToken from the previous response and specify that value for NextToken in the request. Continue making requests until the response no longer includes a NextToken value, which indicates that all results have been retrieved.
    __listOfFunctionsResponse:
      type: array
      items:
        $ref: "#/components/schemas/Function"
    Function:
      description: -- Define Mixin --
      type: object
      properties:
        FunctionId:
          $ref: "#/components/schemas/__string"
          description: The identifier of the function.
        FunctionType:
          $ref: "#/components/schemas/FunctionType"
          description: The type of the function.
        Description:
          $ref: "#/components/schemas/__string"
          description: A description of the function.
        HttpRequestConfiguration:
          $ref: "#/components/schemas/HttpRequestConfiguration"
          description: The configuration for an HTTP_REQUEST function.
        CustomOutputConfiguration:
          $ref: "#/components/schemas/CustomOutputConfiguration"
          description: The configuration for a CUSTOM_OUTPUT function.
        SequentialExecutorConfiguration:
          $ref: "#/components/schemas/SequentialExecutorConfiguration"
          description: The configuration for a SEQUENTIAL_EXECUTOR function.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the function. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the function.
      required:
        - FunctionId
        - FunctionType
    ListLiveSourcesResponse:
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/__listOfLiveSource"
          description: Lists the live sources.
        NextToken:
          $ref: "#/components/schemas/__string"
          description: Pagination token returned by the list request when results exceed the maximum allowed. Use the token to fetch the next page of results.
    __listOfLiveSource:
      type: array
