components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    LogTypes:
      type: array
      items:
        $ref: "#/components/schemas/LogType"
    LogType:
      type: string
      enum:
        - AS_RUN
    ConfigureLogsForChannelResponse:
      type: object
      properties:
        ChannelName:
          $ref: "#/components/schemas/__string"
          description: The name of the channel.
        LogTypes:
          $ref: "#/components/schemas/LogTypes"
          description: The types of logs collected.
    __integer:
      type: integer
    __listOfLoggingStrategies:
      type: array
      items:
        $ref: "#/components/schemas/LoggingStrategy"
