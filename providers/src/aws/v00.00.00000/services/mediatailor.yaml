          description: The method used for collecting logs from AWS Elemental MediaTailor. LEGACY_CLOUDWATCH indicates that MediaTailor is sending logs directly to Amazon CloudWatch Logs. VENDED_LOGS indicates that MediaTailor is sending logs to CloudWatch, which then vends the logs to your destination of choice. Supported destinations are CloudWatch Logs log group, Amazon S3 bucket, and Amazon Data Firehose stream.
        AdsInteractionLog:
          $ref: "#/components/schemas/AdsInteractionLog"
          description: The event types that MediaTailor emits in logs for interactions with the ADS.
        ManifestServiceInteractionLog:
          $ref: "#/components/schemas/ManifestServiceInteractionLog"
          description: The event types that MediaTailor emits in logs for interactions with the origin server.
      required:
        - PercentEnabled
    SlateSource:
      description: Slate VOD source configuration.
      type: object
      properties:
        SourceLocationName:
          $ref: "#/components/schemas/__string"
          description: The name of the source location where the slate VOD source is stored.
        VodSourceName:
          $ref: "#/components/schemas/__string"
          description: The slate VOD source name. The VOD source must already exist in a source location before it can be used for slate.
    RequestOutputs:
      description: An object that represents an object in the CreateChannel request.
      type: array
      items:
        $ref: "#/components/schemas/RequestOutputItem"
    RequestOutputItem:
      description: The output configuration for this channel.
      type: object
      properties:
        DashPlaylistSettings:
          $ref: "#/components/schemas/DashPlaylistSettings"
          description: DASH manifest configuration parameters.
        HlsPlaylistSettings:
          $ref: "#/components/schemas/HlsPlaylistSettings"
          description: HLS playlist configuration parameters.
        ManifestName:
          $ref: "#/components/schemas/__string"
          description: The name of the manifest for the channel. The name appears in the PlaybackUrl.
        SourceGroup:
          $ref: "#/components/schemas/__string"
          description: A string used to match which HttpPackageConfiguration is used for each VodSource.
      required:
        - ManifestName
        - SourceGroup
    DashPlaylistSettings:
      description: Dash manifest configuration parameters.
      type: object
      properties:
        ManifestWindowSeconds:
          $ref: "#/components/schemas/__integer"
          description: "The total duration (in seconds) of each manifest. Minimum value: 30 seconds. Maximum value: 3600 seconds."
        MinBufferTimeSeconds:
          $ref: "#/components/schemas/__integer"
          description: "Minimum amount of content (measured in seconds) that a player must keep available in the buffer. Minimum value: 2 seconds. Maximum value: 60 seconds."
        MinUpdatePeriodSeconds:
          $ref: "#/components/schemas/__integer"
          description: "Minimum amount of time (in seconds) that the player should wait before requesting updates to the manifest. Minimum value: 2 seconds. Maximum value: 60 seconds."
        SuggestedPresentationDelaySeconds:
          $ref: "#/components/schemas/__integer"
          description: "Amount of time (in seconds) that the player should be from the live point at the end of the manifest. Minimum value: 2 seconds. Maximum value: 60 seconds."
    HlsPlaylistSettings:
      description: HLS playlist configuration parameters.
      type: object
      properties:
        ManifestWindowSeconds:
          $ref: "#/components/schemas/__integer"
          description: "The total duration (in seconds) of each manifest. Minimum value: 30 seconds. Maximum value: 3600 seconds."
        AdMarkupType:
          $ref: "#/components/schemas/adMarkupTypes"
          description: Determines the type of SCTE 35 tags to use in ad markup. Specify DATERANGE to use DATERANGE tags (for live or VOD content). Specify SCTE35_ENHANCED to use EXT-X-CUE-OUT and EXT-X-CUE-IN tags (for VOD content only).
    adMarkupTypes:
      type: array
      items:
        $ref: "#/components/schemas/AdMarkupType"
    AdMarkupType:
      type: string
      enum:
        - DATERANGE
        - SCTE35_ENHANCED
    PlaybackMode:
      type: string
      enum:
        - LOOP
        - LINEAR
    __mapOf__string:
      type: object
      properties: {}
    Tier:
      type: string
      enum:
        - BASIC
        - STANDARD
    TimeShiftConfiguration:
      description: The configuration for time-shifted viewing.
      type: object
      properties:
        MaxTimeDelaySeconds:
          $ref: "#/components/schemas/__integer"
          description: The maximum time delay for time-shifted viewing. The minimum allowed maximum time delay is 0 seconds, and the maximum allowed maximum time delay is 21600 seconds (6 hours).
      required:
        - MaxTimeDelaySeconds
    Audiences:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    CreateChannelResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) to assign to the channel.
        ChannelName:
          $ref: "#/components/schemas/__string"
          description: The name to assign to the channel.
        ChannelState:
          $ref: "#/components/schemas/ChannelState"
          description: Indicates whether the channel is in a running state or not.
        CreationTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp of when the channel was created.
        FillerSlate:
          $ref: "#/components/schemas/SlateSource"
          description: Contains information about the slate used to fill gaps between programs in the schedule.
        LastModifiedTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp of when the channel was last modified.
        Outputs:
          $ref: "#/components/schemas/ResponseOutputs"
          description: The output properties to assign to the channel.
        PlaybackMode:
          $ref: "#/components/schemas/__string"
          description: The playback mode to assign to the channel.
        Tags:
          type: object
          properties: {}
          description: The tags to assign to the channel. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
        Tier:
          $ref: "#/components/schemas/__string"
          description: The tier of the channel.
        TimeShiftConfiguration:
          $ref: "#/components/schemas/TimeShiftConfiguration"
          description: The time-shifted viewing configuration assigned to the channel.
        Audiences:
          $ref: "#/components/schemas/Audiences"
          description: The list of audiences defined in channel.
    ChannelState:
      type: string
      enum:
        - RUNNING
        - STOPPED
    __timestampUnix:
      type: string
      format: date-time
    ResponseOutputs:
      type: array
      items:
        $ref: "#/components/schemas/ResponseOutputItem"
    ResponseOutputItem:
      description: The output item response.
      type: object
      properties:
        DashPlaylistSettings:
          $ref: "#/components/schemas/DashPlaylistSettings"
          description: DASH manifest configuration settings.
        HlsPlaylistSettings:
          $ref: "#/components/schemas/HlsPlaylistSettings"
          description: HLS manifest configuration settings.
        ManifestName:
          $ref: "#/components/schemas/__string"
          description: The name of the manifest for the channel that will appear in the channel output's playback URL.
        PlaybackUrl:
          $ref: "#/components/schemas/__string"
          description: The URL used for playback by content players.
        SourceGroup:
          $ref: "#/components/schemas/__string"
          description: A string used to associate a package configuration source group with a channel output.
      required:
        - ManifestName
        - PlaybackUrl
        - SourceGroup
    HttpPackageConfigurations:
      description: The VOD source's HTTP package configuration settings.
      type: array
      items:
        $ref: "#/components/schemas/HttpPackageConfiguration"
    HttpPackageConfiguration:
      description: The HTTP package configuration properties for the requested VOD source.
      type: object
      properties:
        Path:
          $ref: "#/components/schemas/__string"
          description: The relative path to the URL for this VOD source. This is combined with SourceLocation::HttpConfiguration::BaseUrl to form a valid URL.
        SourceGroup:
          $ref: "#/components/schemas/__string"
          description: The name of the source group. This has to match one of the Channel::Outputs::SourceGroup.
        Type:
          $ref: "#/components/schemas/Type"
          description: The streaming protocol for this package configuration. Supported values are HLS and DASH.
      required:
        - Path
        - SourceGroup
        - Type
    Type:
      type: string
      enum:
        - DASH
        - HLS
    CreateLiveSourceResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The ARN to assign to the live source.
        CreationTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time the live source was created.
        HttpPackageConfigurations:
          $ref: "#/components/schemas/HttpPackageConfigurations"
          description: A list of HTTP package configuration parameters for this live source.
        LastModifiedTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time the live source was last modified.
        LiveSourceName:
          $ref: "#/components/schemas/__string"
          description: The name to assign to the live source.
        SourceLocationName:
          $ref: "#/components/schemas/__string"
          description: The name to assign to the source location of the live source.
        Tags:
          type: object
          properties: {}
          description: The tags to assign to the live source. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
    PrefetchConsumption:
      description: For single prefetch, describes how and when that MediaTailor places prefetched ads into upcoming ad breaks.
      type: object
      properties:
        AvailMatchingCriteria:
          $ref: "#/components/schemas/__listOfAvailMatchingCriteria"
          description: If you only want MediaTailor to insert prefetched ads into avails (ad breaks) that match specific dynamic variables, such as scte.event_id, set the avail matching criteria.
        EndTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time when MediaTailor no longer considers the prefetched ads for use in an ad break. MediaTailor automatically deletes prefetch schedules no less than seven days after the end time. If you'd like to manually delete the prefetch schedule, you can call DeletePrefetchSchedule.
        StartTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time when prefetched ads are considered for use in an ad break. If you don't specify StartTime, the prefetched ads are available after MediaTailor retrieves them from the ad decision server.
      required:
        - EndTime
    __listOfAvailMatchingCriteria:
      type: array
      items:
        $ref: "#/components/schemas/AvailMatchingCriteria"
    AvailMatchingCriteria:
      description: MediaTailor only places (consumes) prefetched ads if the ad break meets the criteria defined by the dynamic variables. This gives you granular control over which ad break to place the prefetched ads into. As an example, let's say that you set DynamicVariable to scte.event_id and Operator to EQUALS, and your playback configuration has an ADS URL of https://my.ads.server.com/path?&podId=[scte.avail_num]&event=[scte.event_id]&duration=[session.avail_duration_secs]. And the prefetch request to the ADS contains these values https://my.ads.server.com/path?&podId=3&event=my-awesome-event&duration=30. MediaTailor will only insert the prefetched ads into the ad break if has a SCTE marker with an event id of my-awesome-event, since it must match the event id that MediaTailor uses to query the ADS. You can specify up to five AvailMatchingCriteria. If you specify multiple AvailMatchingCriteria, MediaTailor combines them to match using a logical AND. You can model logical OR combinations by creating multiple prefetch schedules.
      type: object
      properties:
        DynamicVariable:
          $ref: "#/components/schemas/__string"
          description: The dynamic variable(s) that MediaTailor should use as avail matching criteria. MediaTailor only places the prefetched ads into the avail if the avail matches the criteria defined by the dynamic variable. For information about dynamic variables, see Using dynamic ad variables in the MediaTailor User Guide. You can include up to 100 dynamic variables.
        Operator:
          $ref: "#/components/schemas/Operator"
          description: For the DynamicVariable specified in AvailMatchingCriteria, the Operator that is used for the comparison.
      required:
        - DynamicVariable
        - Operator
    Operator:
      type: string
      enum:
        - EQUALS
    PrefetchRetrieval:
      description: A complex type that contains settings governing when MediaTailor prefetches ads, and which dynamic variables that MediaTailor includes in the request to the ad decision server.
      type: object
      properties:
        DynamicVariables:
          type: object
          properties: {}
          description: The dynamic variables to use for substitution during prefetch requests to the ad decision server (ADS). You initially configure dynamic variables for the ADS URL when you set up your playback configuration. When you specify DynamicVariables for prefetch retrieval, MediaTailor includes the dynamic variables in the request to the ADS.
        EndTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time when prefetch retrieval ends for the ad break. Prefetching will be attempted for manifest requests that occur at or before this time.
        StartTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time when prefetch retrievals can start for this break. Ad prefetching will be attempted for manifest requests that occur at or after this time. Defaults to the current time. If not specified, the prefetch retrieval starts as soon as possible.
        TrafficShapingType:
          $ref: "#/components/schemas/TrafficShapingType"
          description: Indicates the type of traffic shaping used to limit the number of requests to the ADS at one time.
        TrafficShapingRetrievalWindow:
          $ref: "#/components/schemas/TrafficShapingRetrievalWindow"
          description: The configuration that tells Elemental MediaTailor how many seconds to spread out requests to the ad decision server (ADS). Instead of sending ADS requests for all sessions at the same time, MediaTailor spreads the requests across the amount of time specified in the retrieval window.
        TrafficShapingTpsConfiguration:
          $ref: "#/components/schemas/TrafficShapingTpsConfiguration"
          description: The configuration for TPS-based traffic shaping. This approach limits requests to the ad decision server (ADS) based on transactions per second and concurrent users.
      required:
        - EndTime
    TrafficShapingType:
      type: string
      enum:
        - RETRIEVAL_WINDOW
        - TPS
    TrafficShapingRetrievalWindow:
      description: The configuration that tells Elemental MediaTailor how many seconds to spread out requests to the ad decision server (ADS). Instead of sending ADS requests for all sessions at the same time, MediaTailor spreads the requests across the amount of time specified in the retrieval window.
      type: object
      properties:
        RetrievalWindowDurationSeconds:
          $ref: "#/components/schemas/__integer"
          description: The amount of time, in seconds, that MediaTailor spreads prefetch requests to the ADS.
    TrafficShapingTpsConfiguration:
      description: The configuration for TPS-based traffic shaping. This approach limits requests to the ad decision server (ADS) based on transactions per second and concurrent users.
      type: object
      properties:
        PeakTps:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of transactions per second (TPS) that your ad decision server (ADS) can handle. MediaTailor uses this value along with concurrent users and headroom multiplier to calculate optimal traffic distribution and prevent ADS overload.
        PeakConcurrentUsers:
          $ref: "#/components/schemas/__integer"
          description: The expected peak number of concurrent viewers for your content. MediaTailor uses this value along with peak TPS to determine how to distribute prefetch requests across the available capacity without exceeding your ADS limits.
    RecurringPrefetchConfiguration:
      description: The configuration that defines how MediaTailor performs recurring prefetch.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The start time for the window that MediaTailor prefetches and inserts ads in a live event.
        EndTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The end time for the window that MediaTailor prefetches and inserts ads in a live event.
        RecurringConsumption:
          $ref: "#/components/schemas/RecurringConsumption"
          description: The settings that determine how and when MediaTailor places prefetched ads into upcoming ad breaks for recurring prefetch scedules.
        RecurringRetrieval:
          $ref: "#/components/schemas/RecurringRetrieval"
          description: The configuration for prefetch ad retrieval from the ADS.
      required:
        - EndTime
        - RecurringConsumption
        - RecurringRetrieval
    RecurringConsumption:
      description: The settings that determine how and when MediaTailor places prefetched ads into upcoming ad breaks for recurring prefetch scedules.
      type: object
      properties:
        RetrievedAdExpirationSeconds:
          $ref: "#/components/schemas/__integer"
          description: The number of seconds that an ad is available for insertion after it was prefetched.
        AvailMatchingCriteria:
          $ref: "#/components/schemas/__listOfAvailMatchingCriteria"
          description: The configuration for the dynamic variables that determine which ad breaks that MediaTailor inserts prefetched ads in.
    RecurringRetrieval:
      description: With recurring prefetch, MediaTailor automatically prefetches ads for every avail that occurs during the retrieval window. The following configurations describe the MediaTailor behavior when prefetching ads for a live event.
      type: object
      properties:
        DynamicVariables:
          type: object
          properties: {}
          description: The dynamic variables to use for substitution during prefetch requests to the ADS.
        DelayAfterAvailEndSeconds:
          $ref: "#/components/schemas/__integer"
          description: The number of seconds that MediaTailor waits after an ad avail before prefetching ads for the next avail. If not set, the default is 0 (no delay).
        TrafficShapingType:
          $ref: "#/components/schemas/TrafficShapingType"
          description: Indicates the type of traffic shaping used to limit the number of requests to the ADS at one time.
        TrafficShapingRetrievalWindow:
          $ref: "#/components/schemas/TrafficShapingRetrievalWindow"
          description: The configuration that tells Elemental MediaTailor how many seconds to spread out requests to the ad decision server (ADS). Instead of sending ADS requests for all sessions at the same time, MediaTailor spreads the requests across the amount of time specified in the retrieval window.
        TrafficShapingTpsConfiguration:
          $ref: "#/components/schemas/TrafficShapingTpsConfiguration"
          description: The configuration for TPS-based traffic shaping. This approach limits requests to the ad decision server (ADS) based on transactions per second and concurrent users.
    PrefetchScheduleType:
      type: string
      enum:
        - SINGLE
        - RECURRING
    CreatePrefetchScheduleResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The ARN to assign to the prefetch schedule.
        Consumption:
          $ref: "#/components/schemas/PrefetchConsumption"
          description: The configuration settings for how and when MediaTailor consumes prefetched ads from the ad decision server for single prefetch schedules. Each consumption configuration contains an end time and an optional start time that define the consumption window. Prefetch schedules automatically expire no earlier than seven days after the end time.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name to assign to the prefetch schedule.
        PlaybackConfigurationName:
          $ref: "#/components/schemas/__string"
          description: The name to assign to the playback configuration.
        Retrieval:
          $ref: "#/components/schemas/PrefetchRetrieval"
          description: The configuration settings for retrieval of prefetched ads from the ad decision server. Only one set of prefetched ads will be retrieved and subsequently consumed for each ad break.
        RecurringPrefetchConfiguration:
          $ref: "#/components/schemas/RecurringPrefetchConfiguration"
          description: The configuration that defines how MediaTailor performs recurring prefetch.
        ScheduleType:
          $ref: "#/components/schemas/PrefetchScheduleType"
          description: The frequency that MediaTailor creates prefetch schedules. SINGLE indicates that this schedule applies to one ad break. RECURRING indicates that MediaTailor automatically creates a schedule for each ad avail in a live event.
        StreamId:
          $ref: "#/components/schemas/__string"
          description: An optional stream identifier that MediaTailor uses to prefetch ads for multiple streams that use the same playback configuration. If StreamId is specified, MediaTailor returns all of the prefetch schedules with an exact match on StreamId. If not specified, MediaTailor returns all of the prefetch schedules for the playback configuration, regardless of StreamId.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the prefetch schedule. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
    __listOfAdBreak:
      type: array
      items:
        $ref: "#/components/schemas/AdBreak"
    AdBreak:
      description: Ad break configuration parameters.
      type: object
      properties:
        MessageType:
          $ref: "#/components/schemas/MessageType"
          description: "The SCTE-35 ad insertion type. Accepted value: SPLICE_INSERT, TIME_SIGNAL."
        OffsetMillis:
          $ref: "#/components/schemas/__long"
          description: How long (in milliseconds) after the beginning of the program that an ad starts. This value must fall within 100ms of a segment boundary, otherwise the ad break will be skipped.
        Slate:
          $ref: "#/components/schemas/SlateSource"
          description: Ad break slate configuration.
        SpliceInsertMessage:
          $ref: "#/components/schemas/SpliceInsertMessage"
          description: This defines the SCTE-35 splice_insert() message inserted around the ad. For information about using splice_insert(), see the SCTE-35 specficiaiton, section 9.7.3.1.
        TimeSignalMessage:
          $ref: "#/components/schemas/TimeSignalMessage"
          description: Defines the SCTE-35 time_signal message inserted around the ad. Programs on a channel's schedule can be configured with one or more ad breaks. You can attach a splice_insert SCTE-35 message to the ad break. This message provides basic metadata about the ad break. See section 9.7.4 of the 2022 SCTE-35 specification for more information.
        AdBreakMetadata:
          $ref: "#/components/schemas/AdBreakMetadataList"
          description: Defines a list of key/value pairs that MediaTailor generates within the EXT-X-ASSETtag for SCTE35_ENHANCED output.
      required:
        - OffsetMillis
    MessageType:
      type: string
      enum:
        - SPLICE_INSERT
        - TIME_SIGNAL
    __long:
      type: integer
      format: int64
    SpliceInsertMessage:
      description: Splice insert message configuration.
      type: object
      properties:
        AvailNum:
          $ref: "#/components/schemas/__integer"
          description: This is written to splice_insert.avail_num, as defined in section 9.7.3.1 of the SCTE-35 specification. The default value is 0. Values must be between 0 and 256, inclusive.
        AvailsExpected:
          $ref: "#/components/schemas/__integer"
          description: This is written to splice_insert.avails_expected, as defined in section 9.7.3.1 of the SCTE-35 specification. The default value is 0. Values must be between 0 and 256, inclusive.
        SpliceEventId:
          $ref: "#/components/schemas/__integer"
          description: This is written to splice_insert.splice_event_id, as defined in section 9.7.3.1 of the SCTE-35 specification. The default value is 1.
        UniqueProgramId:
          $ref: "#/components/schemas/__integer"
          description: This is written to splice_insert.unique_program_id, as defined in section 9.7.3.1 of the SCTE-35 specification. The default value is 0. Values must be between 0 and 256, inclusive.
    TimeSignalMessage:
      description: The SCTE-35 time_signal message can be sent with one or more segmentation_descriptor messages. A time_signal message can be sent only if a single segmentation_descriptor message is sent. The time_signal message contains only the splice_time field which is constructed using a given presentation timestamp. When sending a time_signal message, the splice_command_type field in the splice_info_section message is set to 6 (0x06). See the time_signal() table of the 2022 SCTE-35 specification for more information.
      type: object
      properties:
        SegmentationDescriptors:
          $ref: "#/components/schemas/SegmentationDescriptorList"
          description: The configurations for the SCTE-35 segmentation_descriptor message(s) sent with the time_signal message.
    SegmentationDescriptorList:
      type: array
      items:
        $ref: "#/components/schemas/SegmentationDescriptor"
    SegmentationDescriptor:
      description: The segmentation_descriptor message can contain advanced metadata fields, like content identifiers, to convey a wide range of information about the ad break. MediaTailor writes the ad metadata in the egress manifest as part of the EXT-X-DATERANGE or EventStream ad marker's SCTE-35 data. segmentation_descriptor messages must be sent with the time_signal message type. See the segmentation_descriptor() table of the 2022 SCTE-35 specification for more information.
      type: object
      properties:
        SegmentationEventId:
          $ref: "#/components/schemas/Integer"
          description: The Event Identifier to assign to the segmentation_descriptor.segmentation_event_id message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification. The default value is 1.
        SegmentationUpidType:
          $ref: "#/components/schemas/Integer"
          description: The Upid Type to assign to the segmentation_descriptor.segmentation_upid_type message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification. Values must be between 0 and 256, inclusive. The default value is 14.
        SegmentationUpid:
          $ref: "#/components/schemas/String"
          description: The Upid to assign to the segmentation_descriptor.segmentation_upid message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification. The value must be a hexadecimal string containing only the characters 0 though 9 and A through F. The default value is "" (an empty string).
        SegmentationTypeId:
          $ref: "#/components/schemas/Integer"
          description: The Type Identifier to assign to the segmentation_descriptor.segmentation_type_id message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification. Values must be between 0 and 256, inclusive. The default value is 48.
        SegmentNum:
          $ref: "#/components/schemas/Integer"
          description: The segment number to assign to the segmentation_descriptor.segment_num message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification Values must be between 0 and 256, inclusive. The default value is 0.
        SegmentsExpected:
          $ref: "#/components/schemas/Integer"
          description: The number of segments expected, which is assigned to the segmentation_descriptor.segments_expectedS message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification Values must be between 0 and 256, inclusive. The default value is 0.
        SubSegmentNum:
          $ref: "#/components/schemas/Integer"
          description: The sub-segment number to assign to the segmentation_descriptor.sub_segment_num message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification. Values must be between 0 and 256, inclusive. The defualt value is null.
        SubSegmentsExpected:
          $ref: "#/components/schemas/Integer"
          description: The number of sub-segments expected, which is assigned to the segmentation_descriptor.sub_segments_expected message, as defined in section 10.3.3.1 of the 2022 SCTE-35 specification. Values must be between 0 and 256, inclusive. The default value is null.
    Integer:
      type: integer
    AdBreakMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    KeyValuePair:
      description: For SCTE35_ENHANCED output, defines a key and corresponding value. MediaTailor generates these pairs within the EXT-X-ASSETtag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: For SCTE35_ENHANCED output, defines a key. MediaTailor takes this key, and its associated value, and generates the key/value pair within the EXT-X-ASSETtag. If you specify a key, you must also specify a corresponding value.
        Value:
          $ref: "#/components/schemas/String"
          description: For SCTE35_ENHANCED output, defines a value. MediaTailor; takes this value, and its associated key, and generates the key/value pair within the EXT-X-ASSETtag. If you specify a value, you must also specify a corresponding key.
      required:
        - Key
        - Value
    ScheduleConfiguration:
      description: Schedule configuration parameters. A channel must be stopped before changes can be made to the schedule.
      type: object
      properties:
        Transition:
          $ref: "#/components/schemas/Transition"
          description: Program transition configurations.
        ClipRange:
          $ref: "#/components/schemas/ClipRange"
          description: Program clip range configuration.
      required:
        - Transition
    Transition:
      description: Program transition configuration.
      type: object
      properties:
        DurationMillis:
          $ref: "#/components/schemas/__long"
          description: The duration of the live program in seconds.
        RelativePosition:
          $ref: "#/components/schemas/RelativePosition"
          description: The position where this program will be inserted relative to the RelativePosition.
        RelativeProgram:
          $ref: "#/components/schemas/__string"
          description: The name of the program that this program will be inserted next to, as defined by RelativePosition.
        ScheduledStartTimeMillis:
          $ref: "#/components/schemas/__long"
          description: The date and time that the program is scheduled to start, in epoch milliseconds.
        Type:
          $ref: "#/components/schemas/__string"
          description: "Defines when the program plays in the schedule. You can set the value to ABSOLUTE or RELATIVE. ABSOLUTE - The program plays at a specific wall clock time. This setting can only be used for channels using the LINEAR PlaybackMode. Note the following considerations when using ABSOLUTE transitions: If the preceding program in the schedule has a duration that extends past the wall clock time, MediaTailor truncates the preceding program on a common segment boundary. If there are gaps in playback, MediaTailor plays the FillerSlate you configured for your linear channel. RELATIVE - The program is inserted into the schedule either before or after a program that you specify via RelativePosition."
      required:
        - RelativePosition
        - Type
    RelativePosition:
      type: string
      enum:
        - BEFORE_PROGRAM
        - AFTER_PROGRAM
