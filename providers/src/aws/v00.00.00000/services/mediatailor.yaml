openapi: 3.0.0
info:
  version: "2018-04-23"
  title: AWS MediaTailor
  description: AWS MediaTailor
  x-serviceName: mediatailor
  x-serviceAlias: mediatailor
  x-protocol: rest-json
  x-apiVersion: "2018-04-23"
  x-endpointPrefix: api.mediatailor
servers:
  - url: https://api.mediatailor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediatailor
paths:
  /configureLogs/channel:
    put:
      operationId: ConfigureLogsForChannel
      description: Configures Amazon CloudWatch log settings for a channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelName:
                  $ref: "#/components/schemas/__string"
                LogTypes:
                  $ref: "#/components/schemas/LogTypes"
              required:
                - ChannelName
                - LogTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureLogsForChannelResponse"
  /configureLogs/playbackConfiguration:
    put:
      operationId: ConfigureLogsForPlaybackConfiguration
      description: Defines where AWS Elemental MediaTailor sends logs for the playback configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PercentEnabled:
                  $ref: "#/components/schemas/__integer"
                PlaybackConfigurationName:
                  $ref: "#/components/schemas/__string"
                EnabledLoggingStrategies:
                  $ref: "#/components/schemas/__listOfLoggingStrategies"
                AdsInteractionLog:
                  $ref: "#/components/schemas/AdsInteractionLog"
                ManifestServiceInteractionLog:
                  $ref: "#/components/schemas/ManifestServiceInteractionLog"
              required:
                - PercentEnabled
                - PlaybackConfigurationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureLogsForPlaybackConfigurationResponse"
  /channel/{channel_name}:
    post:
      operationId: CreateChannel
      description: Creates a channel. For information about MediaTailor channels, see Working with channels in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FillerSlate:
                  $ref: "#/components/schemas/SlateSource"
                Outputs:
                  $ref: "#/components/schemas/RequestOutputs"
                PlaybackMode:
                  $ref: "#/components/schemas/PlaybackMode"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
                Tier:
                  $ref: "#/components/schemas/Tier"
                TimeShiftConfiguration:
                  $ref: "#/components/schemas/TimeShiftConfiguration"
                Audiences:
                  $ref: "#/components/schemas/Audiences"
              required:
                - PlaybackMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
    delete:
      operationId: DeleteChannel
      description: Deletes a channel. For information about MediaTailor channels, see Working with channels in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelResponse"
    get:
      operationId: DescribeChannel
      description: Describes a channel. For information about MediaTailor channels, see Working with channels in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChannelResponse"
    put:
      operationId: UpdateChannel
      description: Updates a channel. For information about MediaTailor channels, see Working with channels in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FillerSlate:
                  $ref: "#/components/schemas/SlateSource"
                Outputs:
                  $ref: "#/components/schemas/RequestOutputs"
                TimeShiftConfiguration:
                  $ref: "#/components/schemas/TimeShiftConfiguration"
                Audiences:
                  $ref: "#/components/schemas/Audiences"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelResponse"
  /sourceLocation/{source_location_name}/liveSource/{live_source_name}:
    post:
      operationId: CreateLiveSource
      description: The live source configuration.
      parameters:
        - name: live_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the live source.
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                HttpPackageConfigurations:
                  $ref: "#/components/schemas/HttpPackageConfigurations"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - HttpPackageConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLiveSourceResponse"
    delete:
      operationId: DeleteLiveSource
      description: The live source to delete.
      parameters:
        - name: live_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the live source.
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location associated with this Live Source.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLiveSourceResponse"
    get:
      operationId: DescribeLiveSource
      description: The live source to describe.
      parameters:
        - name: live_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the live source.
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location associated with this Live Source.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLiveSourceResponse"
    put:
      operationId: UpdateLiveSource
      description: Updates a live source's configuration.
      parameters:
        - name: live_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the live source.
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location associated with this Live Source.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                HttpPackageConfigurations:
                  $ref: "#/components/schemas/HttpPackageConfigurations"
              required:
                - HttpPackageConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLiveSourceResponse"
  /prefetchSchedule/{playback_configuration_name}/{name}:
    post:
      operationId: CreatePrefetchSchedule
      description: Creates a prefetch schedule for a playback configuration. A prefetch schedule allows you to tell MediaTailor to fetch and prepare certain ads before an ad break happens. For more information about ad prefetching, see Using ad prefetching in the MediaTailor User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name to assign to the schedule request.
        - name: playback_configuration_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name to assign to the playback configuration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Consumption:
                  $ref: "#/components/schemas/PrefetchConsumption"
                Retrieval:
                  $ref: "#/components/schemas/PrefetchRetrieval"
                RecurringPrefetchConfiguration:
                  $ref: "#/components/schemas/RecurringPrefetchConfiguration"
                ScheduleType:
                  $ref: "#/components/schemas/PrefetchScheduleType"
                StreamId:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrefetchScheduleResponse"
    delete:
      operationId: DeletePrefetchSchedule
      description: Deletes a prefetch schedule for a specific playback configuration. If you call DeletePrefetchSchedule on an expired prefetch schedule, MediaTailor returns an HTTP 404 status code. For more information about ad prefetching, see Using ad prefetching in the MediaTailor User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the prefetch schedule. If the action is successful, the service sends back an HTTP 204 response with an empty HTTP body.
        - name: playback_configuration_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the playback configuration for this prefetch schedule.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePrefetchScheduleResponse"
    get:
      operationId: GetPrefetchSchedule
      description: Retrieves a prefetch schedule for a playback configuration. A prefetch schedule allows you to tell MediaTailor to fetch and prepare certain ads before an ad break happens. For more information about ad prefetching, see Using ad prefetching in the MediaTailor User Guide.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the prefetch schedule. The name must be unique among all prefetch schedules that are associated with the specified playback configuration.
        - name: playback_configuration_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Returns information about the prefetch schedule for a specific playback configuration. If you call GetPrefetchSchedule on an expired prefetch schedule, MediaTailor returns an HTTP 404 status code.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPrefetchScheduleResponse"
  /channel/{channel_name}/program/{program_name}:
    post:
      operationId: CreateProgram
      description: Creates a program within a channel. For information about programs, see Working with programs in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel for this Program.
        - name: program_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the Program.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AdBreaks:
                  $ref: "#/components/schemas/__listOfAdBreak"
                LiveSourceName:
                  $ref: "#/components/schemas/__string"
                ScheduleConfiguration:
                  $ref: "#/components/schemas/ScheduleConfiguration"
                SourceLocationName:
                  $ref: "#/components/schemas/__string"
                VodSourceName:
                  $ref: "#/components/schemas/__string"
                AudienceMedia:
                  $ref: "#/components/schemas/__listOfAudienceMedia"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - ScheduleConfiguration
                - SourceLocationName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProgramResponse"
    delete:
      operationId: DeleteProgram
      description: Deletes a program within a channel. For information about programs, see Working with programs in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel.
        - name: program_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the program.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProgramResponse"
    get:
      operationId: DescribeProgram
      description: Describes a program within a channel. For information about programs, see Working with programs in the MediaTailor User Guide.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel associated with this Program.
        - name: program_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the program.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProgramResponse"
    put:
      operationId: UpdateProgram
      description: Updates a program within a channel.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel for this Program.
        - name: program_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the Program.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AdBreaks:
                  $ref: "#/components/schemas/__listOfAdBreak"
                ScheduleConfiguration:
                  $ref: "#/components/schemas/UpdateProgramScheduleConfiguration"
                AudienceMedia:
                  $ref: "#/components/schemas/__listOfAudienceMedia"
              required:
                - ScheduleConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProgramResponse"
  /sourceLocation/{source_location_name}:
    post:
      operationId: CreateSourceLocation
      description: Creates a source location. A source location is a container for sources. For more information about source locations, see Working with source locations in the MediaTailor User Guide.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name associated with the source location.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccessConfiguration:
                  $ref: "#/components/schemas/AccessConfiguration"
                DefaultSegmentDeliveryConfiguration:
                  $ref: "#/components/schemas/DefaultSegmentDeliveryConfiguration"
                HttpConfiguration:
                  $ref: "#/components/schemas/HttpConfiguration"
                SegmentDeliveryConfigurations:
                  $ref: "#/components/schemas/__listOfSegmentDeliveryConfiguration"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - HttpConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSourceLocationResponse"
    delete:
      operationId: DeleteSourceLocation
      description: Deletes a source location. A source location is a container for sources. For more information about source locations, see Working with source locations in the MediaTailor User Guide.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSourceLocationResponse"
    get:
      operationId: DescribeSourceLocation
      description: Describes a source location. A source location is a container for sources. For more information about source locations, see Working with source locations in the MediaTailor User Guide.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSourceLocationResponse"
    put:
      operationId: UpdateSourceLocation
      description: Updates a source location. A source location is a container for sources. For more information about source locations, see Working with source locations in the MediaTailor User Guide.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccessConfiguration:
                  $ref: "#/components/schemas/AccessConfiguration"
                DefaultSegmentDeliveryConfiguration:
                  $ref: "#/components/schemas/DefaultSegmentDeliveryConfiguration"
                HttpConfiguration:
                  $ref: "#/components/schemas/HttpConfiguration"
                SegmentDeliveryConfigurations:
                  $ref: "#/components/schemas/__listOfSegmentDeliveryConfiguration"
              required:
                - HttpConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSourceLocationResponse"
  /sourceLocation/{source_location_name}/vodSource/{vod_source_name}:
    post:
      operationId: CreateVodSource
      description: The VOD source configuration parameters.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location for this VOD source.
        - name: vod_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name associated with the VOD source.>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                HttpPackageConfigurations:
                  $ref: "#/components/schemas/HttpPackageConfigurations"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - HttpPackageConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVodSourceResponse"
    delete:
      operationId: DeleteVodSource
      description: The video on demand (VOD) source to delete.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location associated with this VOD Source.
        - name: vod_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the VOD source.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVodSourceResponse"
    get:
      operationId: DescribeVodSource
      description: Provides details about a specific video on demand (VOD) source in a specific source location.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location associated with this VOD Source.
        - name: vod_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the VOD Source.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVodSourceResponse"
    put:
      operationId: UpdateVodSource
      description: Updates a VOD source's configuration.
      parameters:
        - name: source_location_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the source location associated with this VOD Source.
        - name: vod_source_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the VOD source.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                HttpPackageConfigurations:
                  $ref: "#/components/schemas/HttpPackageConfigurations"
              required:
                - HttpPackageConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVodSourceResponse"
  /channel/{channel_name}/policy:
    delete:
      operationId: DeleteChannelPolicy
      description: The channel policy to delete.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel associated with this channel policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelPolicyResponse"
    get:
      operationId: GetChannelPolicy
      description: Returns the channel's IAM policy. IAM policies are used to control access to your channel.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the channel associated with this Channel Policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelPolicyResponse"
    put:
      operationId: PutChannelPolicy
      description: Creates an IAM policy for the channel. IAM policies are used to control access to your channel.
      parameters:
        - name: channel_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The channel name associated with this Channel Policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutChannelPolicyResponse"
  /function/{function_id}:
    delete:
      operationId: DeleteFunction
      description: Deletes a function. MediaTailor prevents deletion of a function that is still referenced by a playback configuration or by another function. Remove all references before deleting. For more information about functions, see Working with functions in the MediaTailor User Guide.
      parameters:
        - name: function_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The identifier of the function to delete.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFunctionResponse"
    get:
      operationId: GetFunction
      description: Retrieves the configuration and metadata for a function. For more information about functions, see Working with functions in the MediaTailor User Guide.
      parameters:
        - name: function_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The identifier of the function.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFunctionResponse"
    put:
      operationId: PutFunction
      description: Creates or updates a function. A function defines reusable logic that MediaTailor executes at lifecycle hooks during ad insertion. For more information about functions, see Working with functions in the MediaTailor User Guide.
      parameters:
        - name: function_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The identifier of the function. The identifier must be unique within your account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FunctionType:
                  $ref: "#/components/schemas/FunctionType"
                Description:
                  $ref: "#/components/schemas/__string"
                HttpRequestConfiguration:
                  $ref: "#/components/schemas/HttpRequestConfiguration"
                CustomOutputConfiguration:
                  $ref: "#/components/schemas/CustomOutputConfiguration"
                SequentialExecutorConfiguration:
                  $ref: "#/components/schemas/SequentialExecutorConfiguration"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - FunctionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutFunctionResponse"
  /playbackConfiguration/{name}:
    delete:
      operationId: DeletePlaybackConfiguration
      description: Deletes a playback configuration. For information about MediaTailor configurations, see Working with configurations in AWS Elemental MediaTailor.
      parameters:
        - name: name
          in: path
          required: true
