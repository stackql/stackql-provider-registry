    PrefetchSchedule:
      description: A prefetch schedule allows you to tell MediaTailor to fetch and prepare certain ads before an ad break happens. For more information about ad prefetching, see Using ad prefetching in the MediaTailor User Guide.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the prefetch schedule.
        Consumption:
          $ref: "#/components/schemas/PrefetchConsumption"
          description: Consumption settings determine how, and when, MediaTailor places the prefetched ads into ad breaks for single prefetch schedules. Ad consumption occurs within a span of time that you define, called a consumption window. You can designate which ad breaks that MediaTailor fills with prefetch ads by setting avail matching criteria.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the prefetch schedule. The name must be unique among all prefetch schedules that are associated with the specified playback configuration.
        PlaybackConfigurationName:
          $ref: "#/components/schemas/__string"
          description: The name of the playback configuration to create the prefetch schedule for.
        Retrieval:
          $ref: "#/components/schemas/PrefetchRetrieval"
          description: A complex type that contains settings for prefetch retrieval from the ad decision server (ADS).
        ScheduleType:
          $ref: "#/components/schemas/PrefetchScheduleType"
          description: The frequency that MediaTailor creates prefetch schedules. SINGLE indicates that this schedule applies to one ad break. RECURRING indicates that MediaTailor automatically creates a schedule for each ad avail in a live event. For more information about the prefetch types and when you might use each, see Prefetching ads in Elemental MediaTailor.
        RecurringPrefetchConfiguration:
          $ref: "#/components/schemas/RecurringPrefetchConfiguration"
          description: The settings that determine how and when MediaTailor prefetches ads and inserts them into ad breaks.
        StreamId:
          $ref: "#/components/schemas/__string"
          description: An optional stream identifier that you can specify in order to prefetch for multiple streams that use the same playback configuration.
        Tags:
          type: object
          properties: {}
          description: The tags assigned to the prefetch schedule. Tags are key-value pairs that you can associate with Amazon resources to help with organization, access control, and cost tracking. For more information, see Tagging AWS Elemental MediaTailor Resources.
      required:
        - Arn
        - Name
        - PlaybackConfigurationName
