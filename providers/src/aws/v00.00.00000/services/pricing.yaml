openapi: 3.0.0
info:
  version: "2017-10-15"
  title: AWS Price List Service
  description: AWS Price List Service
  x-serviceName: pricing
  x-serviceAlias: pricing
  x-protocol: json
  x-apiVersion: "2017-10-15"
  x-endpointPrefix: api.pricing
  x-targetPrefix: AWSPriceListService
  x-jsonVersion: "1.1"
servers:
  - url: https://api.pricing.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pricing
paths:
  /DescribeServices:
    post:
      operationId: DescribeServices
      description: Returns the metadata for one service or a list of the metadata for all services. Use this without a service code to get the service codes for all services. Use it with a service code, such as AmazonEC2, to get information specific to that service, such as the attribute names available for that service. For example, some of the attribute names available for EC2 are volumeType, maxIopsVolume, operation, locationType, and instanceCapacity10xlarge.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPriceListService.DescribeServices
            default: AWSPriceListService.DescribeServices
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/String"
                  description: The code for the service whose information you want to retrieve, such as AmazonEC2. You can use the ServiceCode to filter the results in a GetProducts call. To retrieve a list of all services, leave this blank.
                FormatVersion:
                  $ref: "#/components/schemas/FormatVersion"
                  description: "The format version that you want the response to be in. Valid values are: aws_v1"
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token that indicates the next set of results that you want to retrieve.
                MaxResults:
                  $ref: "#/components/schemas/DescribeServicesMaxResults"
                  description: The maximum number of results that you want returned in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeServicesResponse"
  /GetAttributeValues:
    post:
      operationId: GetAttributeValues
      description: Returns a list of attribute values. Attributes are similar to the details in a Price List API offer file. For a list of available attributes, see Offer File Definitions in the Billing and Cost Management User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPriceListService.GetAttributeValues
            default: AWSPriceListService.GetAttributeValues
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/String"
                  description: The service code for the service whose attributes you want to retrieve. For example, if you want the retrieve an EC2 attribute, use AmazonEC2.
                AttributeName:
                  $ref: "#/components/schemas/String"
                  description: The name of the attribute that you want to retrieve the values for, such as volumeType.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token that indicates the next set of results that you want to retrieve.
                MaxResults:
                  $ref: "#/components/schemas/GetAttributeValuesMaxResults"
                  description: The maximum number of results to return in response.
              required:
                - ServiceCode
                - AttributeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAttributeValuesResponse"
  /GetPriceListFileUrl:
    post:
      operationId: GetPriceListFileUrl
      description: This feature is in preview release and is subject to change. Your use of Amazon Web Services Price List API is subject to the Beta Service Participation terms of the Amazon Web Services Service Terms (Section 1.10). This returns the URL that you can retrieve your Price List file from. This URL is based on the PriceListArn and FileFormat that you retrieve from the ListPriceLists response.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPriceListService.GetPriceListFileUrl
            default: AWSPriceListService.GetPriceListFileUrl
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PriceListArn:
                  $ref: "#/components/schemas/PriceListArn"
                  description: The unique identifier that maps to where your Price List files are located. PriceListArn can be obtained from the ListPriceLists response.
                FileFormat:
                  $ref: "#/components/schemas/FileFormat"
                  description: The format that you want to retrieve your Price List files in. The FileFormat can be obtained from the ListPriceLists response.
              required:
                - PriceListArn
                - FileFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPriceListFileUrlResponse"
  /GetProducts:
    post:
      operationId: GetProducts
      description: Returns a list of all products that match the filter criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPriceListService.GetProducts
            default: AWSPriceListService.GetProducts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/String"
                  description: The code for the service whose products you want to retrieve.
                Filters:
                  $ref: "#/components/schemas/Filters"
                  description: The list of filters that limit the returned products. only products that match all filters are returned.
                FormatVersion:
                  $ref: "#/components/schemas/FormatVersion"
                  description: "The format version that you want the response to be in. Valid values are: aws_v1"
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token that indicates the next set of results that you want to retrieve.
                MaxResults:
                  $ref: "#/components/schemas/GetProductsMaxResults"
                  description: The maximum number of results to return in the response.
              required:
                - ServiceCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProductsOutputDisplay"
  /ListPriceLists:
    post:
      operationId: ListPriceLists
      description: This feature is in preview release and is subject to change. Your use of Amazon Web Services Price List API is subject to the Beta Service Participation terms of the Amazon Web Services Service Terms (Section 1.10). This returns a list of Price List references that the requester if authorized to view, given a ServiceCode, CurrencyCode, and an EffectiveDate. Use without a RegionCode filter to list Price List references from all available Amazon Web Services Regions. Use with a RegionCode filter to get the Price List reference that's specific to a specific Amazon Web Services Region. You can use the PriceListArn from the response to get your preferred Price List files through the GetPriceListFileUrl API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSPriceListService.ListPriceLists
            default: AWSPriceListService.ListPriceLists
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceCode:
                  $ref: "#/components/schemas/ServiceCode"
                  description: The service code or the Savings Plans service code for the attributes that you want to retrieve. For example, to get the list of applicable Amazon EC2 price lists, use AmazonEC2. For a full list of service codes containing On-Demand and Reserved Instance (RI) pricing, use the DescribeServices API. To retrieve the Reserved Instance and Compute Savings Plans price lists, use ComputeSavingsPlans. To retrieve Machine Learning Savings Plans price lists, use MachineLearningSavingsPlans.
                EffectiveDate:
                  $ref: "#/components/schemas/EffectiveDate"
                  description: The date that the Price List file prices are effective from.
                RegionCode:
                  $ref: "#/components/schemas/RegionCode"
                  description: This is used to filter the Price List by Amazon Web Services Region. For example, to get the price list only for the US East (N. Virginia) Region, use us-east-1. If nothing is specified, you retrieve price lists for all applicable Regions. The available RegionCode list can be retrieved from GetAttributeValues API.
                CurrencyCode:
                  $ref: "#/components/schemas/CurrencyCode"
                  description: The three alphabetical character ISO-4217 currency code that the Price List files are denominated in.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: The pagination token that indicates the next set of results that you want to retrieve.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in the response.
              required:
                - ServiceCode
                - EffectiveDate
                - CurrencyCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPriceListsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    FormatVersion:
      type: string
      minLength: 1
      maxLength: 32
    DescribeServicesMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    DescribeServicesResponse:
      type: object
      properties:
        Services:
          $ref: "#/components/schemas/ServiceList"
          description: The service metadata for the service or services in the response.
        FormatVersion:
          $ref: "#/components/schemas/FormatVersion"
          description: The format version of the response. For example, aws_v1.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination token for the next set of retrievable results.
    ServiceList:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    Service:
      description: The metadata for a service, such as the service code and available attribute names.
      type: object
      properties:
        ServiceCode:
          $ref: "#/components/schemas/String"
          description: The code for the Amazon Web Services service.
        AttributeNames:
          $ref: "#/components/schemas/AttributeNameList"
          description: The attributes that are available for this service.
      required:
        - ServiceCode
    AttributeNameList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    GetAttributeValuesMaxResults:
      type: integer
      minimum: 1
      maximum: 10000
    GetAttributeValuesResponse:
      type: object
      properties:
        AttributeValues:
          $ref: "#/components/schemas/AttributeValueList"
          description: The list of values for an attribute. For example, Throughput Optimized HDD and Provisioned IOPS are two available values for the AmazonEC2 volumeType.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination token that indicates the next set of results to retrieve.
    AttributeValueList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeValue"
    AttributeValue:
      description: The values of a given attribute, such as Throughput Optimized HDD or Provisioned IOPS for the Amazon EC2 volumeType attribute.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/String"
          description: The specific value of an attributeName.
    PriceListArn:
      type: string
      minLength: 18
      maxLength: 2048
      pattern: arn:[A-Za-z0-9][-.A-Za-z0-9]{0,62}:pricing:::price-list/[A-Za-z0-9+_/.-]{1,1023}
    FileFormat:
      type: string
      minLength: 1
      maxLength: 255
    GetPriceListFileUrlResponse:
      type: object
      properties:
        Url:
          $ref: "#/components/schemas/String"
          description: The URL to download your Price List file from.
    Filters:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: The constraints that you want all returned products to match.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/FilterType"
          description: "The type of filter that you want to use. Valid values are: TERM_MATCH: Returns only products that match both the given filter field and the given value. EQUALS: Returns products that have a field value exactly matching the provided value. CONTAINS: Returns products where the field value contains the provided value as a substring. ANY_OF: Returns products where the field value is any of the provided values. NONE_OF: Returns products where the field value is not any of the provided values."
        Field:
          $ref: "#/components/schemas/Field"
          description: "The product metadata field that you want to filter on. You can filter by just the service code to see all products for a specific service, filter by just the attribute name to see a specific attribute for multiple services, or use both a service code and an attribute name to retrieve only products that match both fields. Valid values include: ServiceCode, and all attribute names For example, you can filter by the AmazonEC2 service code and the volumeType attribute name to get the prices for only Amazon EC2 volumes."
        Value:
          $ref: "#/components/schemas/Value"
          description: The service code or attribute value that you want to filter by. If you're filtering by service code this is the actual service code, such as AmazonEC2. If you're filtering by attribute name, this is the attribute value that you want the returned products to match, such as a Provisioned IOPS volume.
      required:
        - Type
        - Field
        - Value
    FilterType:
      type: string
      enum:
        - TERM_MATCH
        - EQUALS
        - CONTAINS
        - ANY_OF
        - NONE_OF
    Field:
      type: string
      minLength: 1
      maxLength: 1024
    Value:
      type: string
      minLength: 1
      maxLength: 1024
    GetProductsMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    GetProductsRowDisplay:
      type: object
      properties:
        price:
          type: string
          description: The list of products that match your filters. The list contains both the product metadata and the price information.
    GetProductsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GetProductsRowDisplay"
    ServiceCode:
      type: string
      minLength: 1
      maxLength: 32
    EffectiveDate:
      type: string
      format: date-time
    RegionCode:
      type: string
      minLength: 1
      maxLength: 255
    CurrencyCode:
      type: string
      pattern: "[A-Z]{3}"
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListPriceListsResponse:
      type: object
      properties:
        PriceLists:
          $ref: "#/components/schemas/PriceLists"
          description: The type of price list references that match your request.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination token that indicates the next set of results to retrieve.
    PriceLists:
      type: array
      items:
        $ref: "#/components/schemas/PriceList"
    PriceList:
      description: This feature is in preview release and is subject to change. Your use of Amazon Web Services Price List API is subject to the Beta Service Participation terms of the Amazon Web Services Service Terms (Section 1.10). This is the type of price list references that match your request.
      type: object
      properties:
        PriceListArn:
          $ref: "#/components/schemas/PriceListArn"
          description: The unique identifier that maps to where your Price List files are located. PriceListArn can be obtained from the ListPriceList response.
        RegionCode:
          $ref: "#/components/schemas/RegionCode"
          description: This is used to filter the Price List by Amazon Web Services Region. For example, to get the price list only for the US East (N. Virginia) Region, use us-east-1. If nothing is specified, you retrieve price lists for all applicable Regions. The available RegionCode list can be retrieved from GetAttributeValues API.
        CurrencyCode:
          $ref: "#/components/schemas/CurrencyCode"
          description: The three alphabetical character ISO-4217 currency code the Price List files are denominated in.
        FileFormats:
          $ref: "#/components/schemas/FileFormats"
          description: The format you want to retrieve your Price List files. The FileFormat can be obtained from the ListPriceList response.
    FileFormats:
      type: array
      items:
        $ref: "#/components/schemas/FileFormat"
  x-stackQL-resources:
    services:
      id: aws.pricing.services
      name: services
      title: services
      methods:
        describe_services:
          operation:
            $ref: "#/paths/~1DescribeServices/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Services
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/services/methods/describe_services"
        insert: []
        update: []
        delete: []
    attribute_values:
      id: aws.pricing.attribute_values
      name: attribute_values
      title: attribute_values
      methods:
        get_attribute_values:
          operation:
            $ref: "#/paths/~1GetAttributeValues/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.AttributeValues
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/attribute_values/methods/get_attribute_values"
        insert: []
        update: []
        delete: []
    price_list_file_urls:
      id: aws.pricing.price_list_file_urls
      name: price_list_file_urls
      title: price_list_file_urls
      methods:
        get_price_list_file_url:
          operation:
            $ref: "#/paths/~1GetPriceListFileUrl/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/price_list_file_urls/methods/get_price_list_file_url"
        insert: []
        update: []
        delete: []
    products:
      id: aws.pricing.products
      name: products
      title: products
      methods:
        get_products:
          operation:
            $ref: "#/paths/~1GetProducts/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            overrideMediaType: application/json
            schema_override:
              $ref: "#/components/schemas/GetProductsOutputDisplay"
            transform:
              type: golang_template_json_v0.3.0
              body: '{{- $lst := index . "PriceList" -}}{{- $tok := index . "NextToken" -}}{"line_items": [{{- if eq (kindOf $lst) "slice" -}}{{- range $i, $v := $lst -}}{{- if $i }},{{ end }}{"price": {{ toJson $v }}}{{- end -}}{{- end -}}]{{- if $tok }}, "NextToken": {{ toJson $tok }}{{- end }}}'
            objectKey: $.line_items
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/products/methods/get_products"
        insert: []
        update: []
        delete: []
    price_lists:
      id: aws.pricing.price_lists
      name: price_lists
      title: price_lists
      methods:
        list_price_lists:
          operation:
            $ref: "#/paths/~1ListPriceLists/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.PriceLists
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/price_lists/methods/list_price_lists"
        insert: []
        update: []
        delete: []
