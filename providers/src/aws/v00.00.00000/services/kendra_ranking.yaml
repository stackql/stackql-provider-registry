openapi: 3.0.0
info:
  version: "2022-10-19"
  title: Amazon Kendra Intelligent Ranking
  description: Amazon Kendra Intelligent Ranking
  x-serviceName: kendra-ranking
  x-serviceAlias: kendra_ranking
  x-protocol: json
  x-apiVersion: "2022-10-19"
  x-endpointPrefix: kendra-ranking
  x-targetPrefix: AWSKendraRerankingFrontendService
  x-jsonVersion: "1.0"
servers:
  - url: https://kendra-ranking.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kendra-ranking
paths:
  /CreateRescoreExecutionPlan:
    post:
      operationId: CreateRescoreExecutionPlan
      description: Creates a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API. You set the number of capacity units that you require for Amazon Kendra Intelligent Ranking to rescore or re-rank a search service's results. For an example of using the CreateRescoreExecutionPlan API, including using the Python and Java SDKs, see Semantically ranking a search service's results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.CreateRescoreExecutionPlan
            default: AWSKendraRerankingFrontendService.CreateRescoreExecutionPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/RescoreExecutionPlanName"
                  description: A name for the rescore execution plan.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description for the rescore execution plan.
                CapacityUnits:
                  $ref: "#/components/schemas/CapacityUnitsConfiguration"
                  description: You can set additional capacity units to meet the needs of your rescore execution plan. You are given a single capacity unit by default. If you want to use the default capacity, you don't set additional capacity units. For more information on the default capacity and additional capacity units, see Adjusting capacity.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "A list of key-value pairs that identify or categorize your rescore execution plan. You can also use tags to help control access to the rescore execution plan. Tag keys and values can consist of Unicode letters, digits, white space, and any of the following symbols: _ . : / = + - @."
                ClientToken:
                  $ref: "#/components/schemas/ClientTokenName"
                  description: A token that you provide to identify the request to create a rescore execution plan. Multiple calls to the CreateRescoreExecutionPlanRequest API with the same client token will create only one rescore execution plan.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRescoreExecutionPlanResponse"
  /DeleteRescoreExecutionPlan:
    post:
      operationId: DeleteRescoreExecutionPlan
      description: Deletes a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.DeleteRescoreExecutionPlan
            default: AWSKendraRerankingFrontendService.DeleteRescoreExecutionPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/RescoreExecutionPlanId"
                  description: The identifier of the rescore execution plan that you want to delete.
      responses:
        "200":
          description: Success
  /DescribeRescoreExecutionPlan:
    post:
      operationId: DescribeRescoreExecutionPlan
      description: Gets information about a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.DescribeRescoreExecutionPlan
            default: AWSKendraRerankingFrontendService.DescribeRescoreExecutionPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/RescoreExecutionPlanId"
                  description: The identifier of the rescore execution plan that you want to get information on.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRescoreExecutionPlanResponse"
  /ListRescoreExecutionPlans:
    post:
      operationId: ListRescoreExecutionPlans
      description: Lists your rescore execution plans. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.ListRescoreExecutionPlans
            default: AWSKendraRerankingFrontendService.ListRescoreExecutionPlans
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: If the response is truncated, Amazon Kendra Intelligent Ranking returns a pagination token in the response. You can use this pagination token to retrieve the next set of rescore execution plans.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsIntegerForListRescoreExecutionPlansRequest"
                  description: The maximum number of rescore execution plans to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRescoreExecutionPlansResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Gets a list of tags associated with a specified resource. A rescore execution plan is an example of a resource that can have tags associated with it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.ListTagsForResource
            default: AWSKendraRerankingFrontendService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the rescore execution plan to get a list of tags for.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /Rescore:
    post:
      operationId: Rescore
      description: Rescores or re-ranks search results from a search service such as OpenSearch (self managed). You use the semantic search capabilities of Amazon Kendra Intelligent Ranking to improve the search service's results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.Rescore
            default: AWSKendraRerankingFrontendService.Rescore
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RescoreExecutionPlanId:
                  $ref: "#/components/schemas/RescoreExecutionPlanId"
                  description: The identifier of the rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API.
                SearchQuery:
                  $ref: "#/components/schemas/SearchQuery"
                  description: The input query from the search service.
                Documents:
                  $ref: "#/components/schemas/DocumentList"
                  description: The list of documents for Amazon Kendra Intelligent Ranking to rescore or rank on.
              required:
                - RescoreExecutionPlanId
                - SearchQuery
                - Documents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RescoreResult"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds a specified tag to a specified rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API. If the tag already exists, the existing value is replaced with the new value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.TagResource
            default: AWSKendraRerankingFrontendService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the rescore execution plan to tag.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tag keys to add to a rescore execution plan. If a tag already exists, the existing value is replaced with the new value.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes a tag from a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.UntagResource
            default: AWSKendraRerankingFrontendService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the rescore execution plan to remove the tag.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys to remove from the rescore execution plan. If a tag key does not exist on the resource, it is ignored.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateRescoreExecutionPlan:
    post:
      operationId: UpdateRescoreExecutionPlan
      description: Updates a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API. You can update the number of capacity units you require for Amazon Kendra Intelligent Ranking to rescore or re-rank a search service's results.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSKendraRerankingFrontendService.UpdateRescoreExecutionPlan
            default: AWSKendraRerankingFrontendService.UpdateRescoreExecutionPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/RescoreExecutionPlanId"
                  description: The identifier of the rescore execution plan that you want to update.
                Name:
                  $ref: "#/components/schemas/RescoreExecutionPlanName"
                  description: A new name for the rescore execution plan.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A new description for the rescore execution plan.
                CapacityUnits:
                  $ref: "#/components/schemas/CapacityUnitsConfiguration"
                  description: You can set additional capacity units to meet the needs of your rescore execution plan. You are given a single capacity unit by default. If you want to use the default capacity, you don't set additional capacity units. For more information on the default capacity and additional capacity units, see Adjusting capacity.
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RescoreExecutionPlanName:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    Description:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: ^\P{C}*$
    CapacityUnitsConfiguration:
      description: Sets additional capacity units configured for your rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API. You can add and remove capacity units to fit your usage requirements.
      type: object
      properties:
        RescoreCapacityUnits:
          $ref: "#/components/schemas/RescoreCapacityUnit"
          description: The amount of extra capacity for your rescore execution plan. A single extra capacity unit for a rescore execution plan provides 0.01 rescore requests per second. You can add up to 1000 extra capacity units.
      required:
        - RescoreCapacityUnits
    RescoreCapacityUnit:
      type: integer
      minimum: 0
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A key-value pair that identifies or categorizes a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API. You can also use a tag to help control access to a rescore execution plan. A tag key and value can consist of Unicode letters, digits, white space, and any of the following symbols: _ . : / = + - @."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key for the tag. Keys are not case sensitive and must be unique.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value associated with the tag. The value can be an empty string but it can't be null.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    ClientTokenName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^$|[\x00-\x7F]+
    CreateRescoreExecutionPlanResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/RescoreExecutionPlanId"
          description: The identifier of the rescore execution plan.
        Arn:
          $ref: "#/components/schemas/RescoreExecutionPlanArn"
          description: The Amazon Resource Name (ARN) of the rescore execution plan.
      required:
        - Id
        - Arn
    RescoreExecutionPlanId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]*"
    RescoreExecutionPlanArn:
      type: string
      minLength: 0
      maxLength: 1284
      pattern: arn:[a-z0-9-\.]{1,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[a-z0-9-\.]{0,63}:[^/].{0,1023}
    DescribeRescoreExecutionPlanResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/RescoreExecutionPlanId"
          description: The identifier of the rescore execution plan.
        Arn:
          $ref: "#/components/schemas/RescoreExecutionPlanArn"
          description: The Amazon Resource Name (ARN) of the rescore execution plan.
        Name:
          $ref: "#/components/schemas/RescoreExecutionPlanName"
          description: The name for the rescore execution plan.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description for the rescore execution plan.
        CapacityUnits:
          $ref: "#/components/schemas/CapacityUnitsConfiguration"
          description: The capacity units set for the rescore execution plan. A capacity of zero indicates that the rescore execution plan is using the default capacity. For more information on the default capacity and additional capacity units, see Adjusting capacity.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp of when the rescore execution plan was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp of when the rescore execution plan was last updated.
        Status:
          $ref: "#/components/schemas/RescoreExecutionPlanStatus"
          description: The current status of the rescore execution plan. When the value is ACTIVE, the rescore execution plan is ready for use. If the Status field value is FAILED, the ErrorMessage field contains a message that explains why.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: When the Status field value is FAILED, the ErrorMessage field contains a message that explains why.
    Timestamp:
      type: string
      format: date-time
    RescoreExecutionPlanStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - ACTIVE
        - DELETING
        - FAILED
    ErrorMessage:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    NextToken:
      type: string
      minLength: 1
      maxLength: 800
      pattern: ^\P{C}*$
    MaxResultsIntegerForListRescoreExecutionPlansRequest:
      type: integer
      minimum: 1
      maximum: 50
    ListRescoreExecutionPlansResponse:
      type: object
      properties:
        SummaryItems:
          $ref: "#/components/schemas/RescoreExecutionPlanSummaryList"
          description: An array of summary information for one or more rescore execution plans.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response is truncated, Amazon Kendra Intelligent Ranking returns a pagination token in the response.
    RescoreExecutionPlanSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/RescoreExecutionPlanSummary"
    RescoreExecutionPlanSummary:
      description: Summary information for a rescore execution plan. A rescore execution plan is an Amazon Kendra Intelligent Ranking resource used for provisioning the Rescore API.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RescoreExecutionPlanName"
          description: The name of the rescore execution plan.
        Id:
          $ref: "#/components/schemas/RescoreExecutionPlanId"
          description: The identifier of the rescore execution plan.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the rescore execution plan was created.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp when the rescore execution plan was last updated.
        Status:
          $ref: "#/components/schemas/RescoreExecutionPlanStatus"
          description: The current status of the rescore execution plan. When the value is ACTIVE, the rescore execution plan is ready for use.
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
    ListTagsForResourceResponse:
      description: If the action is successful, the service sends back an HTTP 200 response.
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with the rescore execution plan.
    SearchQuery:
      type: string
      minLength: 1
      maxLength: 1000
    DocumentList:
      type: array
      items:
        $ref: "#/components/schemas/Document"
    Document:
      description: Information about a document from a search service such as OpenSearch (self managed). Amazon Kendra Intelligent Ranking uses this information to rank and score on.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document from the search service.
        GroupId:
          $ref: "#/components/schemas/GroupId"
          description: The optional group identifier of the document from the search service. Documents with the same group identifier are grouped together and processed as one document within the service.
        Title:
          $ref: "#/components/schemas/DocumentTitle"
          description: The title of the search service's document.
        Body:
          $ref: "#/components/schemas/DocumentBody"
          description: The body text of the search service's document.
        TokenizedTitle:
          $ref: "#/components/schemas/TitleTokensList"
          description: The title of the search service's document represented as a list of tokens or words. You must choose to provide Title or TokenizedTitle. You cannot provide both.
        TokenizedBody:
          $ref: "#/components/schemas/BodyTokensList"
          description: The body text of the search service's document represented as a list of tokens or words. You must choose to provide Body or TokenizedBody. You cannot provide both.
        OriginalScore:
          $ref: "#/components/schemas/Float"
          description: The original document score or rank from the search service. Amazon Kendra Intelligent Ranking gives the document a new score or rank based on its intelligent search algorithms.
      required:
        - Id
        - OriginalScore
    DocumentId:
      type: string
      minLength: 1
      maxLength: 2048
    GroupId:
      type: string
      minLength: 1
      maxLength: 2048
    DocumentTitle:
      type: string
      minLength: 1
      maxLength: 1024
    DocumentBody:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\P{C}*$
    TitleTokensList:
      type: array
      items:
        $ref: "#/components/schemas/Tokens"
    Tokens:
      type: string
      minLength: 1
      maxLength: 2048
    BodyTokensList:
      type: array
      items:
        $ref: "#/components/schemas/Tokens"
    Float:
      type: number
      format: float
      minimum: -100000
      maximum: 100000
    RescoreResult:
      type: object
      properties:
        RescoreId:
          $ref: "#/components/schemas/RescoreId"
          description: The identifier associated with the scores that Amazon Kendra Intelligent Ranking gives to the results. Amazon Kendra Intelligent Ranking rescores or re-ranks the results for the search service.
        ResultItems:
          $ref: "#/components/schemas/RescoreResultItemList"
          description: A list of result items for documents with new relevancy scores. The results are in descending order.
    RescoreId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-zA-Z0-9][a-zA-Z0-9-]"
    RescoreResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/RescoreResultItem"
    RescoreResultItem:
      description: A result item for a document with a new relevancy score.
      type: object
      properties:
        DocumentId:
          $ref: "#/components/schemas/DocumentId"
          description: The identifier of the document from the search service.
        Score:
          $ref: "#/components/schemas/Float"
          description: The relevancy score or rank that Amazon Kendra Intelligent Ranking gives to the result.
    TagResourceResponse:
      description: If the action is successful, the service sends back an HTTP 200 response with an empty HTTP body.
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      description: If the action is successful, the service sends back an HTTP 200 response with an empty HTTP body.
      type: object
