openapi: 3.0.0
info:
  version: "2017-10-26"
  title: Amazon Transcribe Service
  description: Amazon Transcribe Service
  x-serviceName: transcribe
  x-serviceAlias: transcribe
  x-protocol: json
  x-apiVersion: "2017-10-26"
  x-endpointPrefix: transcribe
  x-targetPrefix: Transcribe
  x-jsonVersion: "1.1"
servers:
  - url: https://transcribe.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for transcribe
paths:
  /CreateCallAnalyticsCategory:
    post:
      operationId: CreateCallAnalyticsCategory
      description: "Creates a new Call Analytics category. All categories are automatically applied to your Call Analytics transcriptions. Note that in order to apply categories to your transcriptions, you must create them before submitting your transcription request, as categories cannot be applied retroactively. When creating a new category, you can use the InputType parameter to label the category as a POST_CALL or a REAL_TIME category. POST_CALL categories can only be applied to post-call transcriptions and REAL_TIME categories can only be applied to real-time transcriptions. If you do not include InputType, your category is created as a POST_CALL category by default. Call Analytics categories are composed of rules. For each category, you must create between 1 and 20 rules. Rules can include these parameters: , , , and . To update an existing category, see . To learn more about Call Analytics categories, see Creating categories for post-call transcriptions and Creating categories for real-time transcriptions."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.CreateCallAnalyticsCategory
            default: Transcribe.CreateCallAnalyticsCategory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CategoryName:
                  $ref: "#/components/schemas/CategoryName"
                  description: A unique name, chosen by you, for your Call Analytics category. It's helpful to use a detailed naming system that will make sense to you in the future. For example, it's better to use sentiment-positive-last30seconds for a category over a generic name like test-category. Category names are case sensitive.
                Rules:
                  $ref: "#/components/schemas/RuleList"
                  description: Rules define a Call Analytics category. When creating a new category, you must create between 1 and 20 rules for that category. For each rule, you specify a filter you want applied to the attributes of a call. For example, you can choose a sentiment filter that detects if a customer's sentiment was positive during the last 30 seconds of the call.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new call analytics category at the time you start this new job. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
                InputType:
                  $ref: "#/components/schemas/InputType"
                  description: Choose whether you want to create a real-time or a post-call category for your Call Analytics transcription. Specifying POST_CALL assigns your category to post-call transcriptions; categories with this input type cannot be applied to streaming (real-time) transcriptions. Specifying REAL_TIME assigns your category to streaming transcriptions; categories with this input type cannot be applied to post-call transcriptions. If you do not include InputType, your category is created as a post-call category by default.
              required:
                - CategoryName
                - Rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCallAnalyticsCategoryResponse"
  /CreateLanguageModel:
    post:
      operationId: CreateLanguageModel
      description: "Creates a new custom language model. When creating a new custom language model, you must specify: If you want a Wideband (audio sample rates over 16,000 Hz) or Narrowband (audio sample rates under 16,000 Hz) base model The location of your training and tuning files (this must be an Amazon S3 URI) The language of your model A unique name for your model"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.CreateLanguageModel
            default: Transcribe.CreateLanguageModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LanguageCode:
                  $ref: "#/components/schemas/CLMLanguageCode"
                  description: The language code that represents the language of your model. Each custom language model must contain terms in only one language, and the language you select for your custom language model must match the language of your training and tuning data. For a list of supported languages and their associated language codes, refer to the Supported languages table. Note that US English (en-US) is the only language supported with Amazon Transcribe Medical. A custom language model can only be used to transcribe files in the same language as the model. For example, if you create a custom language model using US English (en-US), you can only apply this model to files that contain English audio.
                BaseModelName:
                  $ref: "#/components/schemas/BaseModelName"
                  description: "The Amazon Transcribe standard language model, or base model, used to create your custom language model. Amazon Transcribe offers two options for base models: Wideband and Narrowband. If the audio you want to transcribe has a sample rate of 16,000 Hz or greater, choose WideBand. To transcribe audio with a sample rate less than 16,000 Hz, choose NarrowBand."
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: A unique name, chosen by you, for your custom language model. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new custom language model with the same name as an existing custom language model, you get a ConflictException error.
                InputDataConfig:
                  $ref: "#/components/schemas/InputDataConfig"
                  description: "Contains the Amazon S3 location of the training data you want to use to create a new custom language model, and permissions to access this location. When using InputDataConfig, you must include these sub-parameters: S3Uri, which is the Amazon S3 location of your training data, and DataAccessRoleArn, which is the Amazon Resource Name (ARN) of the role that has permission to access your specified Amazon S3 location. You can optionally include TuningDataS3Uri, which is the Amazon S3 location of your tuning data. If you specify different Amazon S3 locations for training and tuning data, the ARN you use must have permissions to access both locations."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new custom language model at the time you create this new model. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
              required:
                - LanguageCode
                - BaseModelName
                - ModelName
                - InputDataConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLanguageModelResponse"
  /CreateMedicalVocabulary:
    post:
      operationId: CreateMedicalVocabulary
      description: Creates a new custom medical vocabulary. Before creating a new custom medical vocabulary, you must first upload a text file that contains your vocabulary table into an Amazon S3 bucket. Note that this differs from , where you can include a list of terms within your request using the Phrases flag; CreateMedicalVocabulary does not support the Phrases flag and only accepts vocabularies in table format. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language. For more information, see Custom vocabularies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.CreateMedicalVocabulary
            default: Transcribe.CreateMedicalVocabulary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyName:
                  $ref: "#/components/schemas/VocabularyName"
                  description: A unique name, chosen by you, for your new custom medical vocabulary. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new custom medical vocabulary with the same name as an existing custom medical vocabulary, you get a ConflictException error.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language of the entries in your custom vocabulary. US English (en-US) is the only language supported with Amazon Transcribe Medical.
                VocabularyFileUri:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location (URI) of the text file that contains your custom medical vocabulary. The URI must be in the same Amazon Web Services Region as the resource you're calling. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-vocab-file.txt"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new custom medical vocabulary at the time you create this new custom vocabulary. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
              required:
                - VocabularyName
                - LanguageCode
                - VocabularyFileUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMedicalVocabularyResponse"
  /CreateVocabulary:
    post:
      operationId: CreateVocabulary
      description: Creates a new custom vocabulary. When creating a new custom vocabulary, you can either upload a text file that contains your new entries, phrases, and terms into an Amazon S3 bucket and include the URI in your request. Or you can include a list of terms directly in your request using the Phrases flag. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language. For more information, see Custom vocabularies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.CreateVocabulary
            default: Transcribe.CreateVocabulary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyName:
                  $ref: "#/components/schemas/VocabularyName"
                  description: A unique name, chosen by you, for your new custom vocabulary. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new custom vocabulary with the same name as an existing custom vocabulary, you get a ConflictException error.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language of the entries in your custom vocabulary. Each custom vocabulary must contain terms in only one language. A custom vocabulary can only be used to transcribe files in the same language as the custom vocabulary. For example, if you create a custom vocabulary using US English (en-US), you can only apply this custom vocabulary to files that contain English audio. For a list of supported languages and their associated language codes, refer to the Supported languages table.
                Phrases:
                  $ref: "#/components/schemas/Phrases"
                  description: Use this parameter if you want to create your custom vocabulary by including all desired terms, as comma-separated values, within your request. The other option for creating your custom vocabulary is to save your entries in a text file and upload them to an Amazon S3 bucket, then specify the location of your file using the VocabularyFileUri parameter. Note that if you include Phrases in your request, you cannot use VocabularyFileUri; you must choose one or the other. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary filter request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language.
                VocabularyFileUri:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location of the text file that contains your custom vocabulary. The URI must be located in the same Amazon Web Services Region as the resource you're calling. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-vocab-file.txt Note that if you include VocabularyFileUri in your request, you cannot use the Phrases flag; you must choose one or the other."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new custom vocabulary at the time you create this new custom vocabulary. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/DataAccessRoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files (in this case, your custom vocabulary). If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
              required:
                - VocabularyName
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVocabularyResponse"
  /CreateVocabularyFilter:
    post:
      operationId: CreateVocabularyFilter
      description: Creates a new custom vocabulary filter. You can use custom vocabulary filters to mask, delete, or flag specific words from your transcript. Custom vocabulary filters are commonly used to mask profanity in transcripts. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary filter request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language. For more information, see Vocabulary filtering.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.CreateVocabularyFilter
            default: Transcribe.CreateVocabularyFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyFilterName:
                  $ref: "#/components/schemas/VocabularyFilterName"
                  description: A unique name, chosen by you, for your new custom vocabulary filter. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new custom vocabulary filter with the same name as an existing custom vocabulary filter, you get a ConflictException error.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language of the entries in your vocabulary filter. Each custom vocabulary filter must contain terms in only one language. A custom vocabulary filter can only be used to transcribe files in the same language as the filter. For example, if you create a custom vocabulary filter using US English (en-US), you can only apply this filter to files that contain English audio. For a list of supported languages and their associated language codes, refer to the Supported languages table.
                Words:
                  $ref: "#/components/schemas/Words"
                  description: Use this parameter if you want to create your custom vocabulary filter by including all desired terms, as comma-separated values, within your request. The other option for creating your vocabulary filter is to save your entries in a text file and upload them to an Amazon S3 bucket, then specify the location of your file using the VocabularyFilterFileUri parameter. Note that if you include Words in your request, you cannot use VocabularyFilterFileUri; you must choose one or the other. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary filter request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language.
                VocabularyFilterFileUri:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location of the text file that contains your custom vocabulary filter terms. The URI must be located in the same Amazon Web Services Region as the resource you're calling. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-vocab-filter-file.txt Note that if you include VocabularyFilterFileUri in your request, you cannot use Words; you must choose one or the other."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new custom vocabulary filter at the time you create this new vocabulary filter. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/DataAccessRoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files (in this case, your custom vocabulary filter). If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
              required:
                - VocabularyFilterName
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVocabularyFilterResponse"
  /DeleteCallAnalyticsCategory:
    post:
      operationId: DeleteCallAnalyticsCategory
      description: Deletes a Call Analytics category. To use this operation, specify the name of the category you want to delete using CategoryName. Category names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteCallAnalyticsCategory
            default: Transcribe.DeleteCallAnalyticsCategory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CategoryName:
                  $ref: "#/components/schemas/CategoryName"
                  description: The name of the Call Analytics category you want to delete. Category names are case sensitive.
              required:
                - CategoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCallAnalyticsCategoryResponse"
  /DeleteCallAnalyticsJob:
    post:
      operationId: DeleteCallAnalyticsJob
      description: Deletes a Call Analytics job. To use this operation, specify the name of the job you want to delete using CallAnalyticsJobName. Job names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteCallAnalyticsJob
            default: Transcribe.DeleteCallAnalyticsJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CallAnalyticsJobName:
                  $ref: "#/components/schemas/CallAnalyticsJobName"
                  description: The name of the Call Analytics job you want to delete. Job names are case sensitive.
              required:
                - CallAnalyticsJobName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCallAnalyticsJobResponse"
  /DeleteLanguageModel:
    post:
      operationId: DeleteLanguageModel
      description: Deletes a custom language model. To use this operation, specify the name of the language model you want to delete using ModelName. custom language model names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteLanguageModel
            default: Transcribe.DeleteLanguageModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the custom language model you want to delete. Model names are case sensitive.
              required:
                - ModelName
      responses:
        "200":
          description: Success
  /DeleteMedicalScribeJob:
    post:
      operationId: DeleteMedicalScribeJob
      description: Deletes a Medical Scribe job. To use this operation, specify the name of the job you want to delete using MedicalScribeJobName. Job names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteMedicalScribeJob
            default: Transcribe.DeleteMedicalScribeJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MedicalScribeJobName:
                  $ref: "#/components/schemas/TranscriptionJobName"
                  description: The name of the Medical Scribe job you want to delete. Job names are case sensitive.
              required:
                - MedicalScribeJobName
      responses:
        "200":
          description: Success
  /DeleteMedicalTranscriptionJob:
    post:
      operationId: DeleteMedicalTranscriptionJob
      description: Deletes a medical transcription job. To use this operation, specify the name of the job you want to delete using MedicalTranscriptionJobName. Job names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteMedicalTranscriptionJob
            default: Transcribe.DeleteMedicalTranscriptionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MedicalTranscriptionJobName:
                  $ref: "#/components/schemas/TranscriptionJobName"
                  description: The name of the medical transcription job you want to delete. Job names are case sensitive.
              required:
                - MedicalTranscriptionJobName
      responses:
        "200":
          description: Success
  /DeleteMedicalVocabulary:
    post:
      operationId: DeleteMedicalVocabulary
      description: Deletes a custom medical vocabulary. To use this operation, specify the name of the custom vocabulary you want to delete using VocabularyName. Custom vocabulary names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteMedicalVocabulary
            default: Transcribe.DeleteMedicalVocabulary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyName:
                  $ref: "#/components/schemas/VocabularyName"
                  description: The name of the custom medical vocabulary you want to delete. Custom medical vocabulary names are case sensitive.
              required:
                - VocabularyName
      responses:
        "200":
          description: Success
  /DeleteTranscriptionJob:
    post:
      operationId: DeleteTranscriptionJob
      description: Deletes a transcription job. To use this operation, specify the name of the job you want to delete using TranscriptionJobName. Job names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteTranscriptionJob
            default: Transcribe.DeleteTranscriptionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TranscriptionJobName:
                  $ref: "#/components/schemas/TranscriptionJobName"
                  description: The name of the transcription job you want to delete. Job names are case sensitive.
              required:
                - TranscriptionJobName
      responses:
        "200":
          description: Success
  /DeleteVocabulary:
    post:
      operationId: DeleteVocabulary
      description: Deletes a custom vocabulary. To use this operation, specify the name of the custom vocabulary you want to delete using VocabularyName. Custom vocabulary names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteVocabulary
            default: Transcribe.DeleteVocabulary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyName:
                  $ref: "#/components/schemas/VocabularyName"
                  description: The name of the custom vocabulary you want to delete. Custom vocabulary names are case sensitive.
              required:
                - VocabularyName
      responses:
        "200":
          description: Success
  /DeleteVocabularyFilter:
    post:
      operationId: DeleteVocabularyFilter
      description: Deletes a custom vocabulary filter. To use this operation, specify the name of the custom vocabulary filter you want to delete using VocabularyFilterName. Custom vocabulary filter names are case sensitive.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DeleteVocabularyFilter
            default: Transcribe.DeleteVocabularyFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyFilterName:
                  $ref: "#/components/schemas/VocabularyFilterName"
                  description: The name of the custom vocabulary filter you want to delete. Custom vocabulary filter names are case sensitive.
              required:
                - VocabularyFilterName
      responses:
        "200":
          description: Success
  /DescribeLanguageModel:
    post:
      operationId: DescribeLanguageModel
      description: Provides information about the specified custom language model. This operation also shows if the base language model that you used to create your custom language model has been updated. If Amazon Transcribe has updated the base model, you can create a new custom language model using the updated base model. If you tried to create a new custom language model and the request wasn't successful, you can use DescribeLanguageModel to help identify the reason for this failure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.DescribeLanguageModel
            default: Transcribe.DescribeLanguageModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ModelName:
                  $ref: "#/components/schemas/ModelName"
                  description: The name of the custom language model you want information about. Model names are case sensitive.
              required:
                - ModelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLanguageModelResponse"
  /GetCallAnalyticsCategory:
    post:
      operationId: GetCallAnalyticsCategory
      description: Provides information about the specified Call Analytics category. To get a list of your Call Analytics categories, use the operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.GetCallAnalyticsCategory
            default: Transcribe.GetCallAnalyticsCategory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CategoryName:
                  $ref: "#/components/schemas/CategoryName"
                  description: The name of the Call Analytics category you want information about. Category names are case sensitive.
              required:
                - CategoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCallAnalyticsCategoryResponse"
  /GetCallAnalyticsJob:
    post:
      operationId: GetCallAnalyticsJob
      description: Provides information about the specified Call Analytics job. To view the job's status, refer to CallAnalyticsJobStatus. If the status is COMPLETED, the job is finished. You can find your completed transcript at the URI specified in TranscriptFileUri. If the status is FAILED, FailureReason provides details on why your transcription job failed. If you enabled personally identifiable information (PII) redaction, the redacted transcript appears at the location specified in RedactedTranscriptFileUri. If you chose to redact the audio in your media file, you can find your redacted media file at the location specified in RedactedMediaFileUri. To get a list of your Call Analytics jobs, use the operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.GetCallAnalyticsJob
            default: Transcribe.GetCallAnalyticsJob
