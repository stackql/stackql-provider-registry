          $ref: "#/components/schemas/FailureReason"
          description: "If TranscriptionJobStatus is FAILED, FailureReason contains information about why the transcription job failed. See also: Common Errors."
        OutputLocationType:
          $ref: "#/components/schemas/OutputLocationType"
          description: Indicates where the specified transcription output is stored. If the value is CUSTOMER_BUCKET, the location is the Amazon S3 bucket you specified using the OutputBucketName parameter in your request. If you also included OutputKey in your request, your output is located in the path you specified in your request. If the value is SERVICE_BUCKET, the location is a service-managed Amazon S3 bucket. To access a transcript stored in a service-managed bucket, use the URI shown in the TranscriptFileUri or RedactedTranscriptFileUri field.
        ContentRedaction:
          $ref: "#/components/schemas/ContentRedaction"
          description: The content redaction settings of the transcription job.
        ModelSettings:
          $ref: "#/components/schemas/ModelSettings"
        IdentifyLanguage:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether automatic language identification was enabled (TRUE) for the specified transcription job.
        IdentifyMultipleLanguages:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether automatic multi-language identification was enabled (TRUE) for the specified transcription job.
        IdentifiedLanguageScore:
          $ref: "#/components/schemas/IdentifiedLanguageScore"
          description: The confidence score associated with the language identified in your media file. Confidence scores are values between 0 and 1; a larger value indicates a higher probability that the identified language correctly matches the language spoken in your media.
        LanguageCodes:
          $ref: "#/components/schemas/LanguageCodeList"
          description: The language codes used to create your transcription job. This parameter is used with multi-language identification. For single-language identification, the singular version of this parameter, LanguageCode, is present.
        ToxicityDetection:
          $ref: "#/components/schemas/ToxicityDetection"
          description: Indicates whether toxicity detection was enabled for the specified transcription job.
    ListVocabulariesResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/VocabularyState"
          description: Lists all custom vocabularies that have the status specified in your request. Vocabularies are ordered by creation date, with the newest vocabulary first.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If NextToken is present in your response, it indicates that not all results are displayed. To view the next set of results, copy the string associated with the NextToken parameter in your results output, then run your request again including NextToken with the value of the copied string. Repeat as needed to view all your results.
        Vocabularies:
          $ref: "#/components/schemas/Vocabularies"
          description: Provides information about the custom vocabularies that match the criteria specified in your request.
    ListVocabularyFiltersResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If NextToken is present in your response, it indicates that not all results are displayed. To view the next set of results, copy the string associated with the NextToken parameter in your results output, then run your request again including NextToken with the value of the copied string. Repeat as needed to view all your results.
        VocabularyFilters:
          $ref: "#/components/schemas/VocabularyFilters"
          description: Provides information about the custom vocabulary filters that match the criteria specified in your request.
    VocabularyFilters:
      type: array
      items:
        $ref: "#/components/schemas/VocabularyFilterInfo"
    VocabularyFilterInfo:
      description: Provides information about a custom vocabulary filter, including the language of the filter, when it was last modified, and its name.
      type: object
      properties:
        VocabularyFilterName:
          $ref: "#/components/schemas/VocabularyFilterName"
          description: A unique name, chosen by you, for your custom vocabulary filter. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code that represents the language of the entries in your vocabulary filter. Each custom vocabulary filter must contain terms in only one language. A custom vocabulary filter can only be used to transcribe files in the same language as the filter. For example, if you create a custom vocabulary filter using US English (en-US), you can only apply this filter to files that contain English audio. For a list of supported languages and their associated language codes, refer to the Supported languages table.
        LastModifiedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified custom vocabulary filter was last modified. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents 12:32 PM UTC-7 on May 4, 2022.
    KMSKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]{0,2048}$
    StartCallAnalyticsJobResponse:
      type: object
      properties:
        CallAnalyticsJob:
          $ref: "#/components/schemas/CallAnalyticsJob"
          description: Provides detailed information about the current Call Analytics job, including job status and, if applicable, failure reason.
    OutputBucketName:
      type: string
      maxLength: 64
      pattern: "[a-z0-9][\\.\\-a-z0-9]{1,61}[a-z0-9]"
    KMSEncryptionContextMap:
      type: object
      properties: {}
    MedicalScribeContext:
      description: The MedicalScribeContext object that contains contextual information used to generate customized clinical notes.
      type: object
      properties:
        PatientContext:
          $ref: "#/components/schemas/MedicalScribePatientContext"
          description: Contains patient-specific information.
    MedicalScribePatientContext:
      description: Contains patient-specific information used to customize the clinical note generation.
      type: object
      properties:
        Pronouns:
          $ref: "#/components/schemas/Pronouns"
          description: The patient's preferred pronouns that the user wants to provide as a context for clinical note generation.
    Pronouns:
      type: string
      enum:
        - HE_HIM
        - SHE_HER
        - THEY_THEM
    StartMedicalScribeJobResponse:
      type: object
      properties:
        MedicalScribeJob:
          $ref: "#/components/schemas/MedicalScribeJob"
          description: Provides detailed information about the current Medical Scribe job, including job status and, if applicable, failure reason.
    OutputKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[a-zA-Z0-9-_.!*'()/]{1,1024}$"
    StartMedicalTranscriptionJobResponse:
      type: object
      properties:
        MedicalTranscriptionJob:
          $ref: "#/components/schemas/MedicalTranscriptionJob"
          description: Provides detailed information about the current medical transcription job, including job status and, if applicable, failure reason.
    Subtitles:
      description: Generate subtitles for your media file with your transcription request. You can choose a start index of 0 or 1, and you can specify either WebVTT or SubRip (or both) as your output format. Note that your subtitle files are placed in the same location as your transcription output.
      type: object
      properties:
        Formats:
          $ref: "#/components/schemas/SubtitleFormats"
          description: Specify the output format for your subtitle file; if you select both WebVTT (vtt) and SubRip (srt) formats, two output files are generated.
        OutputStartIndex:
          $ref: "#/components/schemas/SubtitleOutputStartIndex"
          description: Specify the starting value that is assigned to the first subtitle segment. The default start index for Amazon Transcribe is 0, which differs from the more widely used standard of 1. If you're uncertain which value to use, we recommend choosing 1, as this may improve compatibility with other services.
    LanguageIdSettingsMap:
      type: object
      properties: {}
    StartTranscriptionJobResponse:
      type: object
      properties:
        TranscriptionJob:
          $ref: "#/components/schemas/TranscriptionJob"
          description: Provides detailed information about the current transcription job, including job status and, if applicable, failure reason.
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    UpdateCallAnalyticsCategoryResponse:
      type: object
      properties:
        CategoryProperties:
          $ref: "#/components/schemas/CategoryProperties"
          description: Provides you with the properties of the Call Analytics category you specified in your UpdateCallAnalyticsCategory request.
    UpdateMedicalVocabularyResponse:
      type: object
      properties:
        VocabularyName:
          $ref: "#/components/schemas/VocabularyName"
          description: The name of the updated custom medical vocabulary.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code you selected for your custom medical vocabulary. US English (en-US) is the only language supported with Amazon Transcribe Medical.
        LastModifiedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified custom medical vocabulary was last updated. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents 12:32 PM UTC-7 on May 4, 2022.
        VocabularyState:
          $ref: "#/components/schemas/VocabularyState"
          description: The processing state of your custom medical vocabulary. If the state is READY, you can use the custom vocabulary in a StartMedicalTranscriptionJob request.
    UpdateVocabularyResponse:
      type: object
      properties:
        VocabularyName:
          $ref: "#/components/schemas/VocabularyName"
          description: The name of the updated custom vocabulary.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code you selected for your custom vocabulary.
        LastModifiedTime:
          $ref: "#/components/schemas/DateTime"
