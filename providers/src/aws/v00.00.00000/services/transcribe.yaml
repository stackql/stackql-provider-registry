        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags, each in the form of a key:value pair, assigned to the specified transcription job.
        Subtitles:
          $ref: "#/components/schemas/SubtitlesOutput"
          description: Indicates whether subtitles were generated with your transcription.
        LanguageIdSettings:
          type: object
          properties: {}
          description: Provides the name and language of all custom language models, custom vocabularies, and custom vocabulary filters that you included in your request.
        ToxicityDetection:
          $ref: "#/components/schemas/ToxicityDetection"
          description: Provides information about the toxicity detection settings applied to your transcription.
    Settings:
      description: Allows additional optional settings in your request, including channel identification, alternative transcriptions, and speaker partitioning. You can use that to apply custom vocabularies to your transcription job.
      type: object
      properties:
        VocabularyName:
          $ref: "#/components/schemas/VocabularyName"
          description: The name of the custom vocabulary you want to use in your transcription job request. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account.
        ShowSpeakerLabels:
          $ref: "#/components/schemas/Boolean"
          description: Enables speaker partitioning (diarization) in your transcription output. Speaker partitioning labels the speech from individual speakers in your media file. If you enable ShowSpeakerLabels in your request, you must also include MaxSpeakerLabels. For more information, see Partitioning speakers (diarization).
        MaxSpeakerLabels:
          $ref: "#/components/schemas/MaxSpeakers"
          description: Specify the maximum number of speakers you want to partition in your media. Note that if your media contains more speakers than the specified number, multiple speakers are treated as a single speaker. If you specify the MaxSpeakerLabels field, you must set the ShowSpeakerLabels field to true.
        ChannelIdentification:
          $ref: "#/components/schemas/Boolean"
          description: Enables channel identification in multi-channel audio. Channel identification transcribes the audio on each channel independently, then appends the output for each channel into one transcript. For more information, see Transcribing multi-channel audio.
        ShowAlternatives:
          $ref: "#/components/schemas/Boolean"
          description: To include alternative transcriptions within your transcription output, include ShowAlternatives in your transcription request. If you have multi-channel audio and do not enable channel identification, your audio is transcribed in a continuous manner and your transcript does not separate the speech by channel. If you include ShowAlternatives, you must also include MaxAlternatives, which is the maximum number of alternative transcriptions you want Amazon Transcribe to generate. For more information, see Alternative transcriptions.
        MaxAlternatives:
          $ref: "#/components/schemas/MaxAlternatives"
          description: Indicate the maximum number of alternative transcriptions you want Amazon Transcribe to include in your transcript. If you select a number greater than the number of alternative transcriptions generated by Amazon Transcribe, only the actual number of alternative transcriptions are included. If you include MaxAlternatives in your request, you must also include ShowAlternatives with a value of true. For more information, see Alternative transcriptions.
        VocabularyFilterName:
          $ref: "#/components/schemas/VocabularyFilterName"
          description: The name of the custom vocabulary filter you want to use in your transcription job request. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. Note that if you include VocabularyFilterName in your request, you must also include VocabularyFilterMethod.
        VocabularyFilterMethod:
          $ref: "#/components/schemas/VocabularyFilterMethod"
          description: Specify how you want your custom vocabulary filter applied to your transcript. To replace words with ***, choose mask. To delete words, choose remove. To flag words without changing them, choose tag.
    ModelSettings:
      description: Provides the name of the custom language model that was included in the specified transcription job. Only use ModelSettings with the LanguageModelName sub-parameter if you're not using automatic language identification (). If using LanguageIdSettings in your request, this parameter contains a LanguageModelName sub-parameter.
      type: object
      properties:
        LanguageModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the custom language model you want to use when processing your transcription job. Note that custom language model names are case sensitive. The language of the specified custom language model must match the language code that you specify in your transcription request. If the languages do not match, the custom language model isn't applied. There are no errors or warnings associated with a language mismatch.
    JobExecutionSettings:
      description: "Makes it possible to control how your transcription job is processed. Currently, the only JobExecutionSettings modification you can choose is enabling job queueing using the AllowDeferredExecution sub-parameter. If you include JobExecutionSettings in your request, you must also include the sub-parameters: AllowDeferredExecution and DataAccessRoleArn."
      type: object
      properties:
        AllowDeferredExecution:
          $ref: "#/components/schemas/Boolean"
          description: Makes it possible to enable job queuing when your concurrent request limit is exceeded. When AllowDeferredExecution is set to true, transcription job requests are placed in a queue until the number of jobs falls below the concurrent request limit. If AllowDeferredExecution is set to false and the number of transcription job requests exceed the concurrent request limit, you get a LimitExceededException error. If you include AllowDeferredExecution in your request, you must also include DataAccessRoleArn.
        DataAccessRoleArn:
          $ref: "#/components/schemas/DataAccessRoleArn"
          description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files. If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs. Note that if you include DataAccessRoleArn in your request, you must also include AllowDeferredExecution."
    LanguageCodeList:
      type: array
      items:
        $ref: "#/components/schemas/LanguageCodeItem"
    LanguageCodeItem:
      description: Provides information on the speech contained in a discreet utterance when multi-language identification is enabled in your request. This utterance represents a block of speech consisting of one language, preceded or followed by a block of speech in a different language.
      type: object
      properties:
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: Provides the language code for each language identified in your media.
        DurationInSeconds:
          $ref: "#/components/schemas/DurationInSeconds"
          description: Provides the total time, in seconds, each identified language is spoken in your media.
    DurationInSeconds:
      type: number
      format: float
    SubtitlesOutput:
      description: Provides information about your subtitle file, including format, start index, and Amazon S3 location.
      type: object
      properties:
        Formats:
          $ref: "#/components/schemas/SubtitleFormats"
          description: Provides the format of your subtitle files. If your request included both WebVTT (vtt) and SubRip (srt) formats, both formats are shown.
        SubtitleFileUris:
          $ref: "#/components/schemas/SubtitleFileUris"
          description: The Amazon S3 location of your transcript. You can use this URI to access or download your subtitle file. Your subtitle file is stored in the same location as your transcript. If you specified both WebVTT and SubRip subtitle formats, two URIs are provided. If you included OutputBucketName in your transcription job request, this is the URI of that bucket. If you also included OutputKey in your request, your output is located in the path you specified in your request. If you didn't include OutputBucketName in your transcription job request, your subtitle file is stored in a service-managed bucket, and TranscriptFileUri provides you with a temporary URI you can use for secure access to your subtitle file. Temporary URIs for service-managed Amazon S3 buckets are only valid for 15 minutes. If you get an AccesDenied error, you can get a new temporary URI by running a GetTranscriptionJob or ListTranscriptionJob request.
        OutputStartIndex:
          $ref: "#/components/schemas/SubtitleOutputStartIndex"
          description: Provides the start index value for your subtitle files. If you did not specify a value in your request, the default value of 0 is used.
    SubtitleFormats:
      type: array
      items:
        $ref: "#/components/schemas/SubtitleFormat"
    SubtitleFormat:
      type: string
      enum:
        - vtt
        - srt
    SubtitleFileUris:
      type: array
      items:
        $ref: "#/components/schemas/Uri"
    SubtitleOutputStartIndex:
      type: integer
      minimum: 0
      maximum: 1
    ToxicityDetection:
      type: array
      items:
        $ref: "#/components/schemas/ToxicityDetectionSettings"
    ToxicityDetectionSettings:
      description: Contains ToxicityCategories, which is a required parameter if you want to enable toxicity detection (ToxicityDetection) in your transcription request.
      type: object
      properties:
        ToxicityCategories:
          $ref: "#/components/schemas/ToxicityCategories"
          description: If you include ToxicityDetection in your transcription request, you must also include ToxicityCategories. The only accepted value for this parameter is ALL.
      required:
