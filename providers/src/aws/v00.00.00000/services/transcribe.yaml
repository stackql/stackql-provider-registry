    DescribeLanguageModelResponse:
      type: object
      properties:
        LanguageModel:
          $ref: "#/components/schemas/LanguageModel"
          description: Provides information about the specified custom language model. This parameter also shows if the base language model you used to create your custom language model has been updated. If Amazon Transcribe has updated the base model, you can create a new custom language model using the updated base model. If you tried to create a new custom language model and the request wasn't successful, you can use this DescribeLanguageModel to help identify the reason for this failure.
    LanguageModel:
      description: "Provides information about a custom language model, including: The base model name When the model was created The location of the files used to train the model When the model was last modified The name you chose for the model The model's language The model's processing state Any available upgrades for the base model"
      type: object
      properties:
        ModelName:
          $ref: "#/components/schemas/ModelName"
          description: A unique name, chosen by you, for your custom language model. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account.
        CreateTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified custom language model was created. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents 12:32 PM UTC-7 on May 4, 2022.
        LastModifiedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified custom language model was last modified. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents 12:32 PM UTC-7 on May 4, 2022.
        LanguageCode:
          $ref: "#/components/schemas/CLMLanguageCode"
          description: The language code used to create your custom language model. Each custom language model must contain terms in only one language, and the language you select for your custom language model must match the language of your training and tuning data. For a list of supported languages and their associated language codes, refer to the Supported languages table. Note that US English (en-US) is the only language supported with Amazon Transcribe Medical.
        BaseModelName:
          $ref: "#/components/schemas/BaseModelName"
          description: The Amazon Transcribe standard language model, or base model, used to create your custom language model.
        ModelStatus:
          $ref: "#/components/schemas/ModelStatus"
          description: The status of the specified custom language model. When the status displays as COMPLETED the model is ready for use.
        UpgradeAvailability:
          $ref: "#/components/schemas/Boolean"
          description: Shows if a more current base model is available for use with the specified custom language model. If false, your custom language model is using the most up-to-date base model. If true, there is a newer base model available than the one your language model is using. Note that to update a base model, you must recreate the custom language model using the new base model. Base model upgrades for existing custom language models are not supported.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: "If ModelStatus is FAILED, FailureReason contains information about why the custom language model request failed. See also: Common Errors."
        InputDataConfig:
          $ref: "#/components/schemas/InputDataConfig"
          description: The Amazon S3 location of the input files used to train and tune your custom language model, in addition to the data access role ARN (Amazon Resource Name) that has permissions to access these data.
    GetCallAnalyticsCategoryResponse:
      type: object
      properties:
        CategoryProperties:
          $ref: "#/components/schemas/CategoryProperties"
          description: Provides you with the properties of the Call Analytics category you specified in your GetCallAnalyticsCategory request.
    GetCallAnalyticsJobResponse:
      type: object
      properties:
        CallAnalyticsJob:
          $ref: "#/components/schemas/CallAnalyticsJob"
          description: Provides detailed information about the specified Call Analytics job, including job status and, if applicable, failure reason.
    CallAnalyticsJob:
      description: Provides detailed information about a Call Analytics job. To view the job's status, refer to CallAnalyticsJobStatus. If the status is COMPLETED, the job is finished. You can find your completed transcript at the URI specified in TranscriptFileUri. If the status is FAILED, FailureReason provides details on why your transcription job failed. If you enabled personally identifiable information (PII) redaction, the redacted transcript appears at the location specified in RedactedTranscriptFileUri. If you chose to redact the audio in your media file, you can find your redacted media file at the location specified in the RedactedMediaFileUri field of your response.
      type: object
      properties:
        CallAnalyticsJobName:
          $ref: "#/components/schemas/CallAnalyticsJobName"
          description: The name of the Call Analytics job. Job names are case sensitive and must be unique within an Amazon Web Services account.
        CallAnalyticsJobStatus:
          $ref: "#/components/schemas/CallAnalyticsJobStatus"
          description: Provides the status of the specified Call Analytics job. If the status is COMPLETED, the job is finished and you can find the results at the location specified in TranscriptFileUri (or RedactedTranscriptFileUri, if you requested transcript redaction). If the status is FAILED, FailureReason provides details on why your transcription job failed.
        CallAnalyticsJobDetails:
          $ref: "#/components/schemas/CallAnalyticsJobDetails"
          description: Provides detailed information about a call analytics job, including information about skipped analytics features.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code used to create your Call Analytics job. For a list of supported languages and their associated language codes, refer to the Supported languages table. If you do not know the language spoken in your media file, you can omit this field and let Amazon Transcribe automatically identify the language of your media. To improve the accuracy of language identification, you can include several language codes and Amazon Transcribe chooses the closest match for your transcription.
        MediaSampleRateHertz:
          $ref: "#/components/schemas/MediaSampleRateHertz"
          description: The sample rate, in hertz, of the audio track in your input media file.
        MediaFormat:
          $ref: "#/components/schemas/MediaFormat"
          description: The format of the input media file.
        Media:
          $ref: "#/components/schemas/Media"
          description: Provides the Amazon S3 location of the media file you used in your Call Analytics request.
        Transcript:
          $ref: "#/components/schemas/Transcript"
        StartTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Call Analytics job began processing. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.789000-07:00 represents a transcription job that started processing at 12:32 PM UTC-7 on May 4, 2022.
        CreationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Call Analytics job request was made. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents a transcription job that started processing at 12:32 PM UTC-7 on May 4, 2022.
        CompletionTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Call Analytics job finished processing. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:33:13.922000-07:00 represents a transcription job that started processing at 12:33 PM UTC-7 on May 4, 2022.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: "If CallAnalyticsJobStatus is FAILED, FailureReason contains information about why the Call Analytics job request failed. The FailureReason field contains one of the following values: Unsupported media format. The media format specified in MediaFormat isn't valid. Refer to refer to the MediaFormat parameter for a list of supported formats. The media format provided does not match the detected media format. The media format specified in MediaFormat doesn't match the format of the input file. Check the media format of your media file and correct the specified value. Invalid sample rate for audio file. The sample rate specified in MediaSampleRateHertz isn't valid. The sample rate must be between 8,000 and 48,000 hertz. The sample rate provided does not match the detected sample rate. The sample rate specified in MediaSampleRateHertz doesn't match the sample rate detected in your input media file. Check the sample rate of your media file and correct the specified value. Invalid file size: file size too large. The size of your media file is larger than what Amazon Transcribe can process. For more information, refer to Service quotas. Invalid number of channels: number of channels too large. Your audio contains more channels than Amazon Transcribe is able to process. For more information, refer to Service quotas."
        DataAccessRoleArn:
          $ref: "#/components/schemas/DataAccessRoleArn"
          description: The Amazon Resource Name (ARN) you included in your request.
        IdentifiedLanguageScore:
          $ref: "#/components/schemas/IdentifiedLanguageScore"
          description: The confidence score associated with the language identified in your media file. Confidence scores are values between 0 and 1; a larger value indicates a higher probability that the identified language correctly matches the language spoken in your media.
        Settings:
          $ref: "#/components/schemas/CallAnalyticsJobSettings"
          description: Provides information on any additional settings that were included in your request. Additional settings include content redaction and language identification settings.
        ChannelDefinitions:
          $ref: "#/components/schemas/ChannelDefinitions"
          description: Indicates which speaker is on which channel.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags, each in the form of a key:value pair, assigned to the specified call analytics job.
    CallAnalyticsJobStatus:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - FAILED
        - COMPLETED
    CallAnalyticsJobDetails:
      description: Contains details about a call analytics job, including information about skipped analytics features.
      type: object
      properties:
        Skipped:
          $ref: "#/components/schemas/CallAnalyticsSkippedFeatureList"
          description: Contains information about any skipped analytics features during the analysis of a call analytics job. This array lists all the analytics features that were skipped, along with their corresponding reason code and message.
    CallAnalyticsSkippedFeatureList:
      type: array
      items:
        $ref: "#/components/schemas/CallAnalyticsSkippedFeature"
    CallAnalyticsSkippedFeature:
      description: Represents a skipped analytics feature during the analysis of a call analytics job. The Feature field indicates the type of analytics feature that was skipped. The Message field contains additional information or a message explaining why the analytics feature was skipped. The ReasonCode field provides a code indicating the reason why the analytics feature was skipped.
      type: object
      properties:
        Feature:
          $ref: "#/components/schemas/CallAnalyticsFeature"
          description: Indicates the type of analytics feature that was skipped during the analysis of a call analytics job.
        ReasonCode:
          $ref: "#/components/schemas/CallAnalyticsSkippedReasonCode"
          description: Provides a code indicating the reason why a specific analytics feature was skipped during the analysis of a call analytics job.
        Message:
          $ref: "#/components/schemas/String"
          description: Contains additional information or a message explaining why a specific analytics feature was skipped during the analysis of a call analytics job.
    CallAnalyticsFeature:
      type: string
      enum:
        - GENERATIVE_SUMMARIZATION
    CallAnalyticsSkippedReasonCode:
      type: string
      enum:
        - INSUFFICIENT_CONVERSATION_CONTENT
        - FAILED_SAFETY_GUIDELINES
    String:
      type: string
    MediaSampleRateHertz:
      type: integer
      minimum: 8000
      maximum: 48000
    MediaFormat:
      type: string
      enum:
        - mp3
        - mp4
        - wav
        - flac
        - ogg
        - amr
        - webm
        - m4a
    Media:
      description: Describes the Amazon S3 location of the media file you want to use in your request. For information on supported media formats, refer to the MediaFormat parameter or the Media formats section in the Amazon S3 Developer Guide.
      type: object
      properties:
        MediaFileUri:
          $ref: "#/components/schemas/Uri"
          description: "The Amazon S3 location of the media file you want to transcribe. For example: s3://DOC-EXAMPLE-BUCKET/my-media-file.flac s3://DOC-EXAMPLE-BUCKET/media-files/my-media-file.flac Note that the Amazon S3 bucket that contains your input media must be located in the same Amazon Web Services Region where you're making your transcription request."
        RedactedMediaFileUri:
          $ref: "#/components/schemas/Uri"
          description: "The Amazon S3 location of the media file you want to redact. For example: s3://DOC-EXAMPLE-BUCKET/my-media-file.flac s3://DOC-EXAMPLE-BUCKET/media-files/my-media-file.flac Note that the Amazon S3 bucket that contains your input media must be located in the same Amazon Web Services Region where you're making your transcription request. RedactedMediaFileUri produces a redacted audio file in addition to a redacted transcript. It is only supported for Call Analytics (StartCallAnalyticsJob) transcription requests."
    Transcript:
      description: Provides you with the Amazon S3 URI you can use to access your transcript.
      type: object
      properties:
        TranscriptFileUri:
          $ref: "#/components/schemas/Uri"
          description: The Amazon S3 location of your transcript. You can use this URI to access or download your transcript. If you included OutputBucketName in your transcription job request, this is the URI of that bucket. If you also included OutputKey in your request, your output is located in the path you specified in your request. If you didn't include OutputBucketName in your transcription job request, your transcript is stored in a service-managed bucket, and TranscriptFileUri provides you with a temporary URI you can use for secure access to your transcript. Temporary URIs for service-managed Amazon S3 buckets are only valid for 15 minutes. If you get an AccesDenied error, you can get a new temporary URI by running a GetTranscriptionJob or ListTranscriptionJob request.
        RedactedTranscriptFileUri:
          $ref: "#/components/schemas/Uri"
          description: The Amazon S3 location of your redacted transcript. You can use this URI to access or download your transcript. If you included OutputBucketName in your transcription job request, this is the URI of that bucket. If you also included OutputKey in your request, your output is located in the path you specified in your request. If you didn't include OutputBucketName in your transcription job request, your transcript is stored in a service-managed bucket, and RedactedTranscriptFileUri provides you with a temporary URI you can use for secure access to your transcript. Temporary URIs for service-managed Amazon S3 buckets are only valid for 15 minutes. If you get an AccesDenied error, you can get a new temporary URI by running a GetTranscriptionJob or ListTranscriptionJob request.
    IdentifiedLanguageScore:
      type: number
      format: float
    CallAnalyticsJobSettings:
      description: Provides additional optional settings for your request, including content redaction, automatic language identification; allows you to apply custom language models, custom vocabulary filters, and custom vocabularies.
      type: object
      properties:
        VocabularyName:
          $ref: "#/components/schemas/VocabularyName"
          description: The name of the custom vocabulary you want to include in your Call Analytics transcription request. Custom vocabulary names are case sensitive.
        VocabularyFilterName:
          $ref: "#/components/schemas/VocabularyFilterName"
          description: The name of the custom vocabulary filter you want to include in your Call Analytics transcription request. Custom vocabulary filter names are case sensitive. Note that if you include VocabularyFilterName in your request, you must also include VocabularyFilterMethod.
        VocabularyFilterMethod:
          $ref: "#/components/schemas/VocabularyFilterMethod"
          description: Specify how you want your custom vocabulary filter applied to your transcript. To replace words with ***, choose mask. To delete words, choose remove. To flag words without changing them, choose tag.
        LanguageModelName:
          $ref: "#/components/schemas/ModelName"
          description: The name of the custom language model you want to use when processing your Call Analytics job. Note that custom language model names are case sensitive. The language of the specified custom language model must match the language code that you specify in your transcription request. If the languages do not match, the custom language model isn't applied. There are no errors or warnings associated with a language mismatch.
        ContentRedaction:
          $ref: "#/components/schemas/ContentRedaction"
        LanguageOptions:
          $ref: "#/components/schemas/LanguageOptions"
          description: You can specify two or more language codes that represent the languages you think may be present in your media. Including more than five is not recommended. If you're unsure what languages are present, do not include this parameter. Including language options can improve the accuracy of language identification. For a list of languages supported with Call Analytics, refer to the Supported languages table. To transcribe speech in Modern Standard Arabic (ar-SA) in Amazon Web Services GovCloud (US) (US-West, us-gov-west-1), Amazon Web Services GovCloud (US) (US-East, us-gov-east-1), Canada (Calgary) ca-west-1 and Africa (Cape Town) af-south-1, your media file must be encoded at a sample rate of 16,000 Hz or higher.
        LanguageIdSettings:
          type: object
          properties: {}
          description: If using automatic language identification in your request and you want to apply a custom language model, a custom vocabulary, or a custom vocabulary filter, include LanguageIdSettings with the relevant sub-parameters (VocabularyName, LanguageModelName, and VocabularyFilterName). LanguageIdSettings supports two to five language codes. Each language code you include can have an associated custom language model, custom vocabulary, and custom vocabulary filter. The language codes that you specify must match the languages of the associated custom language models, custom vocabularies, and custom vocabulary filters. It's recommended that you include LanguageOptions when using LanguageIdSettings to ensure that the correct language dialect is identified. For example, if you specify a custom vocabulary that is in en-US but Amazon Transcribe determines that the language spoken in your media is en-AU, your custom vocabulary is not applied to your transcription. If you include LanguageOptions and include en-US as the only English language dialect, your custom vocabulary is applied to your transcription. If you want to include a custom language model, custom vocabulary, or custom vocabulary filter with your request but do not want to use automatic language identification, use instead the parameter with the LanguageModelName, VocabularyName, or VocabularyFilterName sub-parameters. For a list of languages supported with Call Analytics, refer to Supported languages and language-specific features.
        Summarization:
          $ref: "#/components/schemas/Summarization"
          description: Contains GenerateAbstractiveSummary, which is a required parameter if you want to enable Generative call summarization in your Call Analytics request.
    VocabularyFilterMethod:
      type: string
      enum:
        - remove
        - mask
        - tag
    ContentRedaction:
      description: "Makes it possible to redact or flag specified personally identifiable information (PII) in your transcript. If you use ContentRedaction, you must also include the sub-parameters: RedactionOutput and RedactionType. You can optionally include PiiEntityTypes to choose which types of PII you want to redact."
      type: object
      properties:
        RedactionType:
          $ref: "#/components/schemas/RedactionType"
          description: Specify the category of information you want to redact; PII (personally identifiable information) is the only valid value. You can use PiiEntityTypes to choose which types of PII you want to redact. If you do not include PiiEntityTypes in your request, all PII is redacted.
        RedactionOutput:
          $ref: "#/components/schemas/RedactionOutput"
          description: Specify if you want only a redacted transcript, or if you want a redacted and an unredacted transcript. When you choose redacted Amazon Transcribe creates only a redacted transcript. When you choose redacted_and_unredacted Amazon Transcribe creates a redacted and an unredacted transcript (as two separate files).
        PiiEntityTypes:
          $ref: "#/components/schemas/PiiEntityTypes"
          description: Specify which types of personally identifiable information (PII) you want to redact in your transcript. You can include as many types as you'd like, or you can select ALL. If you do not include PiiEntityTypes in your request, all PII is redacted.
      required:
        - RedactionType
        - RedactionOutput
    RedactionType:
      type: string
      enum:
        - PII
    RedactionOutput:
      type: string
      enum:
        - redacted
        - redacted_and_unredacted
    PiiEntityTypes:
      type: array
      items:
        $ref: "#/components/schemas/PiiEntityType"
    PiiEntityType:
      type: string
      enum:
        - BANK_ACCOUNT_NUMBER
        - BANK_ROUTING
        - CREDIT_DEBIT_NUMBER
        - CREDIT_DEBIT_CVV
        - CREDIT_DEBIT_EXPIRY
        - PIN
        - EMAIL
        - ADDRESS
        - NAME
        - PHONE
        - SSN
        - ALL
    LanguageOptions:
      type: array
      items:
        $ref: "#/components/schemas/LanguageCode"
    Summarization:
      description: Contains GenerateAbstractiveSummary, which is a required parameter if you want to enable Generative call summarization in your Call Analytics request.
      type: object
      properties:
        GenerateAbstractiveSummary:
          $ref: "#/components/schemas/Boolean"
          description: Enables Generative call summarization in your Call Analytics request Generative call summarization provides a summary of the transcript including important components discussed in the conversation. For more information, see Enabling generative call summarization.
      required:
        - GenerateAbstractiveSummary
    ChannelDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/ChannelDefinition"
    ChannelDefinition:
      description: Makes it possible to specify which speaker is on which channel. For example, if your agent is the first participant to speak, you would set ChannelId to 0 (to indicate the first channel) and ParticipantRole to AGENT (to indicate that it's the agent speaking).
      type: object
      properties:
        ChannelId:
          $ref: "#/components/schemas/ChannelId"
          description: Specify the audio channel you want to define.
        ParticipantRole:
          $ref: "#/components/schemas/ParticipantRole"
          description: Specify the speaker you want to define. Omitting this parameter is equivalent to specifying both participants.
    ChannelId:
      type: integer
      minimum: 0
      maximum: 1
    GetMedicalScribeJobResponse:
      type: object
      properties:
        MedicalScribeJob:
          $ref: "#/components/schemas/MedicalScribeJob"
          description: Provides detailed information about the specified Medical Scribe job, including job status and, if applicable, failure reason
    MedicalScribeJob:
      description: Provides detailed information about a Medical Scribe job. To view the status of the specified Medical Scribe job, check the MedicalScribeJobStatus field. If the status is COMPLETED, the job is finished and you can find the results at the locations specified in MedicalScribeOutput. If the status is FAILED, FailureReason provides details on why your Medical Scribe job failed.
      type: object
      properties:
        MedicalScribeJobName:
          $ref: "#/components/schemas/TranscriptionJobName"
          description: The name of the Medical Scribe job. Job names are case sensitive and must be unique within an Amazon Web Services account.
        MedicalScribeJobStatus:
          $ref: "#/components/schemas/MedicalScribeJobStatus"
          description: Provides the status of the specified Medical Scribe job. If the status is COMPLETED, the job is finished and you can find the results at the location specified in MedicalScribeOutput If the status is FAILED, FailureReason provides details on why your Medical Scribe job failed.
        LanguageCode:
          $ref: "#/components/schemas/MedicalScribeLanguageCode"
          description: The language code used to create your Medical Scribe job. US English (en-US) is the only supported language for Medical Scribe jobs.
        Media:
          $ref: "#/components/schemas/Media"
        MedicalScribeOutput:
          $ref: "#/components/schemas/MedicalScribeOutput"
          description: The location of the output of your Medical Scribe job. ClinicalDocumentUri holds the Amazon S3 URI for the Clinical Document and TranscriptFileUri holds the Amazon S3 URI for the Transcript.
        StartTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time your Medical Scribe job began processing. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.789000-07:00 represents a Medical Scribe job that started processing at 12:32 PM UTC-7 on May 4, 2022.
        CreationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Medical Scribe job request was made. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents a Medical Scribe job that started processing at 12:32 PM UTC-7 on May 4, 2022.
        CompletionTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Medical Scribe job finished processing. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents a Medical Scribe job that finished processing at 12:32 PM UTC-7 on May 4, 2022.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: "If MedicalScribeJobStatus is FAILED, FailureReason contains information about why the transcription job failed. See also: Common Errors."
        Settings:
          $ref: "#/components/schemas/MedicalScribeSettings"
          description: Makes it possible to control how your Medical Scribe job is processed using a MedicalScribeSettings object. Specify ChannelIdentification if ChannelDefinitions are set. Enabled ShowSpeakerLabels if ChannelIdentification and ChannelDefinitions are not set. One and only one of ChannelIdentification and ShowSpeakerLabels must be set. If ShowSpeakerLabels is set, MaxSpeakerLabels must also be set. Use Settings to specify a vocabulary or vocabulary filter or both using VocabularyName, VocabularyFilterName. VocabularyFilterMethod must be specified if VocabularyFilterName is set.
        DataAccessRoleArn:
          $ref: "#/components/schemas/DataAccessRoleArn"
          description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files, write to the output bucket, and use your KMS key if supplied. If the role that you specify doesn’t have the appropriate permissions your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
        ChannelDefinitions:
          $ref: "#/components/schemas/MedicalScribeChannelDefinitions"
          description: Makes it possible to specify which speaker is on which channel. For example, if the clinician is the first participant to speak, you would set ChannelId of the first ChannelDefinition in the list to 0 (to indicate the first channel) and ParticipantRole to CLINICIAN (to indicate that it's the clinician speaking). Then you would set the ChannelId of the second ChannelDefinition in the list to 1 (to indicate the second channel) and ParticipantRole to PATIENT (to indicate that it's the patient speaking).
        MedicalScribeContextProvided:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the MedicalScribeContext object was provided when the Medical Scribe job was started.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Adds one or more custom tags, each in the form of a key:value pair, to the Medical Scribe job. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
    MedicalScribeJobStatus:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - FAILED
        - COMPLETED
    MedicalScribeLanguageCode:
      type: string
      enum:
        - en-US
    MedicalScribeOutput:
      description: The location of the output of your Medical Scribe job. ClinicalDocumentUri holds the Amazon S3 URI for the Clinical Document and TranscriptFileUri holds the Amazon S3 URI for the Transcript.
      type: object
      properties:
        TranscriptFileUri:
          $ref: "#/components/schemas/Uri"
          description: Holds the Amazon S3 URI for the Transcript.
        ClinicalDocumentUri:
          $ref: "#/components/schemas/Uri"
          description: Holds the Amazon S3 URI for the Clinical Document.
      required:
        - TranscriptFileUri
        - ClinicalDocumentUri
    MedicalScribeSettings:
      description: Makes it possible to control how your Medical Scribe job is processed using a MedicalScribeSettings object. Specify ChannelIdentification if ChannelDefinitions are set. Enabled ShowSpeakerLabels if ChannelIdentification and ChannelDefinitions are not set. One and only one of ChannelIdentification and ShowSpeakerLabels must be set. If ShowSpeakerLabels is set, MaxSpeakerLabels must also be set. Use Settings to specify a vocabulary or vocabulary filter or both using VocabularyName, VocabularyFilterName. VocabularyFilterMethod must be specified if VocabularyFilterName is set.
      type: object
      properties:
        ShowSpeakerLabels:
          $ref: "#/components/schemas/Boolean"
          description: Enables speaker partitioning (diarization) in your Medical Scribe output. Speaker partitioning labels the speech from individual speakers in your media file. If you enable ShowSpeakerLabels in your request, you must also include MaxSpeakerLabels. For more information, see Partitioning speakers (diarization).
        MaxSpeakerLabels:
          $ref: "#/components/schemas/MaxSpeakers"
          description: Specify the maximum number of speakers you want to partition in your media. Note that if your media contains more speakers than the specified number, multiple speakers are treated as a single speaker. If you specify the MaxSpeakerLabels field, you must set the ShowSpeakerLabels field to true.
        ChannelIdentification:
          $ref: "#/components/schemas/Boolean"
          description: Enables channel identification in multi-channel audio. Channel identification transcribes the audio on each channel independently, then appends the output for each channel into one transcript. For more information, see Transcribing multi-channel audio.
        VocabularyName:
          $ref: "#/components/schemas/VocabularyName"
          description: The name of the custom vocabulary you want to include in your Medical Scribe request. Custom vocabulary names are case sensitive.
        VocabularyFilterName:
          $ref: "#/components/schemas/VocabularyFilterName"
          description: The name of the custom vocabulary filter you want to include in your Medical Scribe request. Custom vocabulary filter names are case sensitive. Note that if you include VocabularyFilterName in your request, you must also include VocabularyFilterMethod.
        VocabularyFilterMethod:
          $ref: "#/components/schemas/VocabularyFilterMethod"
          description: Specify how you want your custom vocabulary filter applied to your transcript. To replace words with ***, choose mask. To delete words, choose remove. To flag words without changing them, choose tag.
        ClinicalNoteGenerationSettings:
          $ref: "#/components/schemas/ClinicalNoteGenerationSettings"
          description: Specify settings for the clinical note generation.
    MaxSpeakers:
      type: integer
      minimum: 2
      maximum: 30
    ClinicalNoteGenerationSettings:
      description: The output configuration for clinical note generation.
      type: object
      properties:
        NoteTemplate:
          $ref: "#/components/schemas/MedicalScribeNoteTemplate"
          description: "Specify one of the following templates to use for the clinical note summary. The default is HISTORY_AND_PHYSICAL. HISTORY_AND_PHYSICAL: Provides summaries for key sections of the clinical documentation. Examples of sections include Chief Complaint, History of Present Illness, Review of Systems, Past Medical History, Assessment, and Plan. GIRPP: Provides summaries based on the patients progress toward goals. Examples of sections include Goal, Intervention, Response, Progress, and Plan. BIRP: Focuses on the patient's behavioral patterns and responses. Examples of sections include Behavior, Intervention, Response, and Plan. SIRP: Emphasizes the situational context of therapy. Examples of sections include Situation, Intervention, Response, and Plan. DAP: Provides a simplified format for clinical documentation. Examples of sections include Data, Assessment, and Plan. BEHAVIORAL_SOAP: Behavioral health focused documentation format. Examples of sections include Subjective, Objective, Assessment, and Plan. PHYSICAL_SOAP: Physical health focused documentation format. Examples of sections include Subjective, Objective, Assessment, and Plan."
    MedicalScribeNoteTemplate:
      type: string
      enum:
        - HISTORY_AND_PHYSICAL
        - GIRPP
        - BIRP
        - SIRP
        - DAP
        - BEHAVIORAL_SOAP
        - PHYSICAL_SOAP
    MedicalScribeChannelDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/MedicalScribeChannelDefinition"
    MedicalScribeChannelDefinition:
      description: Indicates which speaker is on which channel. The options are CLINICIAN and PATIENT
      type: object
      properties:
        ChannelId:
          $ref: "#/components/schemas/MedicalScribeChannelId"
          description: Specify the audio channel you want to define.
        ParticipantRole:
          $ref: "#/components/schemas/MedicalScribeParticipantRole"
          description: Specify the participant that you want to flag. The options are CLINICIAN and PATIENT
      required:
        - ChannelId
        - ParticipantRole
    MedicalScribeChannelId:
      type: integer
      minimum: 0
      maximum: 1
    MedicalScribeParticipantRole:
      type: string
      enum:
        - PATIENT
        - CLINICIAN
    GetMedicalTranscriptionJobResponse:
      type: object
      properties:
        MedicalTranscriptionJob:
          $ref: "#/components/schemas/MedicalTranscriptionJob"
          description: Provides detailed information about the specified medical transcription job, including job status and, if applicable, failure reason.
    MedicalTranscriptionJob:
      description: Provides detailed information about a medical transcription job. To view the status of the specified medical transcription job, check the TranscriptionJobStatus field. If the status is COMPLETED, the job is finished and you can find the results at the location specified in TranscriptFileUri. If the status is FAILED, FailureReason provides details on why your transcription job failed.
      type: object
      properties:
        MedicalTranscriptionJobName:
          $ref: "#/components/schemas/TranscriptionJobName"
          description: The name of the medical transcription job. Job names are case sensitive and must be unique within an Amazon Web Services account.
        TranscriptionJobStatus:
          $ref: "#/components/schemas/TranscriptionJobStatus"
          description: Provides the status of the specified medical transcription job. If the status is COMPLETED, the job is finished and you can find the results at the location specified in TranscriptFileUri. If the status is FAILED, FailureReason provides details on why your transcription job failed.
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: The language code used to create your medical transcription job. US English (en-US) is the only supported language for medical transcriptions.
        MediaSampleRateHertz:
          $ref: "#/components/schemas/MedicalMediaSampleRateHertz"
          description: The sample rate, in hertz, of the audio track in your input media file.
        MediaFormat:
          $ref: "#/components/schemas/MediaFormat"
          description: The format of the input media file.
        Media:
          $ref: "#/components/schemas/Media"
        Transcript:
          $ref: "#/components/schemas/MedicalTranscript"
          description: Provides you with the Amazon S3 URI you can use to access your transcript.
        StartTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified medical transcription job began processing. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.789000-07:00 represents a transcription job that started processing at 12:32 PM UTC-7 on May 4, 2022.
        CreationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified medical transcription job request was made. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents a transcription job that started processing at 12:32 PM UTC-7 on May 4, 2022.
        CompletionTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified medical transcription job finished processing. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:33:13.922000-07:00 represents a transcription job that started processing at 12:33 PM UTC-7 on May 4, 2022.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: "If TranscriptionJobStatus is FAILED, FailureReason contains information about why the transcription job request failed. The FailureReason field contains one of the following values: Unsupported media format. The media format specified in MediaFormat isn't valid. Refer to refer to the MediaFormat parameter for a list of supported formats. The media format provided does not match the detected media format. The media format specified in MediaFormat doesn't match the format of the input file. Check the media format of your media file and correct the specified value. Invalid sample rate for audio file. The sample rate specified in MediaSampleRateHertz isn't valid. The sample rate must be between 16,000 and 48,000 hertz. The sample rate provided does not match the detected sample rate. The sample rate specified in MediaSampleRateHertz doesn't match the sample rate detected in your input media file. Check the sample rate of your media file and correct the specified value. Invalid file size: file size too large. The size of your media file is larger than what Amazon Transcribe can process. For more information, refer to Service quotas. Invalid number of channels: number of channels too large. Your audio contains more channels than Amazon Transcribe is able to process. For more information, refer to Service quotas."
        Settings:
          $ref: "#/components/schemas/MedicalTranscriptionSetting"
          description: Provides information on any additional settings that were included in your request. Additional settings include channel identification, alternative transcriptions, speaker partitioning, custom vocabularies, and custom vocabulary filters.
        ContentIdentificationType:
          $ref: "#/components/schemas/MedicalContentIdentificationType"
          description: Indicates whether content identification was enabled for your transcription request.
        Specialty:
          $ref: "#/components/schemas/Specialty"
          description: Describes the medical specialty represented in your media.
        Type:
          $ref: "#/components/schemas/Type"
          description: Indicates whether the input media is a dictation or a conversation, as specified in the StartMedicalTranscriptionJob request.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags, each in the form of a key:value pair, assigned to the specified medical transcription job.
