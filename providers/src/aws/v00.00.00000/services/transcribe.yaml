  /StartCallAnalyticsJob:
    post:
      operationId: StartCallAnalyticsJob
      description: "Transcribes the audio from a customer service call and applies any additional Request Parameters you choose to include in your request. In addition to many standard transcription features, Call Analytics provides you with call characteristics, call summarization, speaker sentiment, and optional redaction of your text transcript and your audio file. You can also apply custom categories to flag specified conditions. To learn more about these features and insights, refer to Analyzing call center audio with Call Analytics. If you want to apply categories to your Call Analytics job, you must create them before submitting your job request. Categories cannot be retroactively applied to a job. To create a new category, use the operation. To learn more about Call Analytics categories, see Creating categories for post-call transcriptions and Creating categories for real-time transcriptions. To make a StartCallAnalyticsJob request, you must first upload your media file into an Amazon S3 bucket; you can then specify the Amazon S3 location of the file using the Media parameter. Job queuing is available for Call Analytics jobs. If you pass a DataAccessRoleArn in your request and you exceed your Concurrent Job Limit, your job will automatically be added to a queue to be processed once your concurrent job count is below the limit. You must include the following parameters in your StartCallAnalyticsJob request: region: The Amazon Web Services Region where you are making your request. For a list of Amazon Web Services Regions supported with Amazon Transcribe, refer to Amazon Transcribe endpoints and quotas. CallAnalyticsJobName: A custom name that you create for your transcription job that's unique within your Amazon Web Services account. Media (MediaFileUri or RedactedMediaFileUri): The Amazon S3 location of your media file. With Call Analytics, you can redact the audio contained in your media file by including RedactedMediaFileUri, instead of MediaFileUri, to specify the location of your input audio. If you choose to redact your audio, you can find your redacted media at the location specified in the RedactedMediaFileUri field of your response."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.StartCallAnalyticsJob
            default: Transcribe.StartCallAnalyticsJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CallAnalyticsJobName:
                  $ref: "#/components/schemas/CallAnalyticsJobName"
                  description: A unique name, chosen by you, for your Call Analytics job. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new job with the same name as an existing job, you get a ConflictException error.
                Media:
                  $ref: "#/components/schemas/Media"
                  description: Describes the Amazon S3 location of the media file you want to use in your Call Analytics request.
                OutputLocation:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location where you want your Call Analytics transcription output stored. You can use any of the following formats to specify the output location: s3://DOC-EXAMPLE-BUCKET s3://DOC-EXAMPLE-BUCKET/my-output-folder/ s3://DOC-EXAMPLE-BUCKET/my-output-folder/my-call-analytics-job.json Unless you specify a file name (option 3), the name of your output file has a default value that matches the name you specified for your transcription job using the CallAnalyticsJobName parameter. You can specify a KMS key to encrypt your output using the OutputEncryptionKMSKeyId parameter. If you do not specify a KMS key, Amazon Transcribe uses the default Amazon S3 key for server-side encryption. If you do not specify OutputLocation, your transcript is placed in a service-managed Amazon S3 bucket and you are provided with a URI to access your transcript."
                OutputEncryptionKMSKeyId:
                  $ref: "#/components/schemas/KMSKeyId"
                  description: "The Amazon Resource Name (ARN) of a KMS key that you want to use to encrypt your Call Analytics output. KMS key ARNs have the format arn:partition:kms:region:account:key/key-id. For example: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab. For more information, see KMS key ARNs. If you do not specify an encryption key, your output is encrypted with the default Amazon S3 key (SSE-S3). Note that the role making the request and the role specified in the DataAccessRoleArn request parameter (if present) must have permission to use the specified KMS key."
                DataAccessRoleArn:
                  $ref: "#/components/schemas/DataAccessRoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files. If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
                Settings:
                  $ref: "#/components/schemas/CallAnalyticsJobSettings"
                  description: Specify additional optional settings in your request, including content redaction; allows you to apply custom language models, vocabulary filters, and custom vocabularies to your Call Analytics job.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new call analytics job at the time you start this new job. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
                ChannelDefinitions:
                  $ref: "#/components/schemas/ChannelDefinitions"
                  description: Makes it possible to specify which speaker is on which channel. For example, if your agent is the first participant to speak, you would set ChannelId to 0 (to indicate the first channel) and ParticipantRole to AGENT (to indicate that it's the agent speaking).
              required:
                - CallAnalyticsJobName
                - Media
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCallAnalyticsJobResponse"
  /StartMedicalScribeJob:
    post:
      operationId: StartMedicalScribeJob
      description: "Transcribes patient-clinician conversations and generates clinical notes. Amazon Web Services HealthScribe automatically provides rich conversation transcripts, identifies speaker roles, classifies dialogues, extracts medical terms, and generates preliminary clinical notes. To learn more about these features, refer to Amazon Web Services HealthScribe. To make a StartMedicalScribeJob request, you must first upload your media file into an Amazon S3 bucket; you can then specify the Amazon S3 location of the file using the Media parameter. You must include the following parameters in your StartMedicalTranscriptionJob request: DataAccessRoleArn: The ARN of an IAM role with the these minimum permissions: read permission on input file Amazon S3 bucket specified in Media, write permission on the Amazon S3 bucket specified in OutputBucketName, and full permissions on the KMS key specified in OutputEncryptionKMSKeyId (if set). The role should also allow transcribe.amazonaws.com to assume it. Media (MediaFileUri): The Amazon S3 location of your media file. MedicalScribeJobName: A custom name you create for your MedicalScribe job that is unique within your Amazon Web Services account. OutputBucketName: The Amazon S3 bucket where you want your output files stored. Settings: A MedicalScribeSettings object that must set exactly one of ShowSpeakerLabels or ChannelIdentification to true. If ShowSpeakerLabels is true, MaxSpeakerLabels must also be set. ChannelDefinitions: A MedicalScribeChannelDefinitions array should be set if and only if the ChannelIdentification value of Settings is set to true."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.StartMedicalScribeJob
            default: Transcribe.StartMedicalScribeJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MedicalScribeJobName:
                  $ref: "#/components/schemas/TranscriptionJobName"
                  description: A unique name, chosen by you, for your Medical Scribe job. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new job with the same name as an existing job, you get a ConflictException error.
                Media:
                  $ref: "#/components/schemas/Media"
                OutputBucketName:
                  $ref: "#/components/schemas/OutputBucketName"
                  description: The name of the Amazon S3 bucket where you want your Medical Scribe output stored. Do not include the S3:// prefix of the specified bucket. Note that the role specified in the DataAccessRoleArn request parameter must have permission to use the specified location. You can change Amazon S3 permissions using the Amazon Web Services Management Console. See also Permissions Required for IAM User Roles.
                OutputEncryptionKMSKeyId:
                  $ref: "#/components/schemas/KMSKeyId"
                  description: "The Amazon Resource Name (ARN) of a KMS key that you want to use to encrypt your Medical Scribe output. KMS key ARNs have the format arn:partition:kms:region:account:key/key-id. For example: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab. For more information, see KMS key ARNs. If you do not specify an encryption key, your output is encrypted with the default Amazon S3 key (SSE-S3). Note that the role making the request and the role specified in the DataAccessRoleArn request parameter (if present) must have permission to use the specified KMS key."
                KMSEncryptionContext:
                  $ref: "#/components/schemas/KMSEncryptionContextMap"
                  description: A map of plain text, non-secret key:value pairs, known as encryption context pairs, that provide an added layer of security for your data. For more information, see KMS encryption context and Asymmetric keys in KMS.
                DataAccessRoleArn:
                  $ref: "#/components/schemas/DataAccessRoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files, write to the output bucket, and use your KMS key if supplied. If the role that you specify doesn’t have the appropriate permissions your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
                Settings:
                  $ref: "#/components/schemas/MedicalScribeSettings"
                  description: Makes it possible to control how your Medical Scribe job is processed using a MedicalScribeSettings object. Specify ChannelIdentification if ChannelDefinitions are set. Enabled ShowSpeakerLabels if ChannelIdentification and ChannelDefinitions are not set. One and only one of ChannelIdentification and ShowSpeakerLabels must be set. If ShowSpeakerLabels is set, MaxSpeakerLabels must also be set. Use Settings to specify a vocabulary or vocabulary filter or both using VocabularyName, VocabularyFilterName. VocabularyFilterMethod must be specified if VocabularyFilterName is set.
                ChannelDefinitions:
                  $ref: "#/components/schemas/MedicalScribeChannelDefinitions"
                  description: Makes it possible to specify which speaker is on which channel. For example, if the clinician is the first participant to speak, you would set ChannelId of the first ChannelDefinition in the list to 0 (to indicate the first channel) and ParticipantRole to CLINICIAN (to indicate that it's the clinician speaking). Then you would set the ChannelId of the second ChannelDefinition in the list to 1 (to indicate the second channel) and ParticipantRole to PATIENT (to indicate that it's the patient speaking).
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to the Medical Scribe job. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
                MedicalScribeContext:
                  $ref: "#/components/schemas/MedicalScribeContext"
                  description: The MedicalScribeContext object that contains contextual information which is used during clinical note generation to add relevant context to the note.
              required:
                - MedicalScribeJobName
                - Media
                - OutputBucketName
                - DataAccessRoleArn
                - Settings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMedicalScribeJobResponse"
  /StartMedicalTranscriptionJob:
    post:
      operationId: StartMedicalTranscriptionJob
      description: "Transcribes the audio from a medical dictation or conversation and applies any additional Request Parameters you choose to include in your request. In addition to many standard transcription features, Amazon Transcribe Medical provides you with a robust medical vocabulary and, optionally, content identification, which adds flags to personal health information (PHI). To learn more about these features, refer to How Amazon Transcribe Medical works. To make a StartMedicalTranscriptionJob request, you must first upload your media file into an Amazon S3 bucket; you can then specify the Amazon S3 location of the file using the Media parameter. You must include the following parameters in your StartMedicalTranscriptionJob request: region: The Amazon Web Services Region where you are making your request. For a list of Amazon Web Services Regions supported with Amazon Transcribe, refer to Amazon Transcribe endpoints and quotas. MedicalTranscriptionJobName: A custom name you create for your transcription job that is unique within your Amazon Web Services account. Media (MediaFileUri): The Amazon S3 location of your media file. LanguageCode: This must be en-US. OutputBucketName: The Amazon S3 bucket where you want your transcript stored. If you want your output stored in a sub-folder of this bucket, you must also include OutputKey. Specialty: This must be PRIMARYCARE. Type: Choose whether your audio is a conversation or a dictation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.StartMedicalTranscriptionJob
            default: Transcribe.StartMedicalTranscriptionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MedicalTranscriptionJobName:
                  $ref: "#/components/schemas/TranscriptionJobName"
                  description: A unique name, chosen by you, for your medical transcription job. The name that you specify is also used as the default name of your transcription output file. If you want to specify a different name for your transcription output, use the OutputKey parameter. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new job with the same name as an existing job, you get a ConflictException error.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language spoken in the input media file. US English (en-US) is the only valid value for medical transcription jobs. Any other value you enter for language code results in a BadRequestException error.
                MediaSampleRateHertz:
                  $ref: "#/components/schemas/MedicalMediaSampleRateHertz"
                  description: The sample rate, in hertz, of the audio track in your input media file. If you do not specify the media sample rate, Amazon Transcribe Medical determines it for you. If you specify the sample rate, it must match the rate detected by Amazon Transcribe Medical; if there's a mismatch between the value that you specify and the value detected, your job fails. Therefore, in most cases, it's advised to omit MediaSampleRateHertz and let Amazon Transcribe Medical determine the sample rate.
                MediaFormat:
                  $ref: "#/components/schemas/MediaFormat"
                  description: Specify the format of your input media file.
                Media:
                  $ref: "#/components/schemas/Media"
                OutputBucketName:
                  $ref: "#/components/schemas/OutputBucketName"
                  description: The name of the Amazon S3 bucket where you want your medical transcription output stored. Do not include the S3:// prefix of the specified bucket. If you want your output to go to a sub-folder of this bucket, specify it using the OutputKey parameter; OutputBucketName only accepts the name of a bucket. For example, if you want your output stored in S3://DOC-EXAMPLE-BUCKET, set OutputBucketName to DOC-EXAMPLE-BUCKET. However, if you want your output stored in S3://DOC-EXAMPLE-BUCKET/test-files/, set OutputBucketName to DOC-EXAMPLE-BUCKET and OutputKey to test-files/. Note that Amazon Transcribe must have permission to use the specified location. You can change Amazon S3 permissions using the Amazon Web Services Management Console. See also Permissions Required for IAM User Roles.
                OutputKey:
                  $ref: "#/components/schemas/OutputKey"
                  description: "Use in combination with OutputBucketName to specify the output location of your transcript and, optionally, a unique name for your output file. The default name for your transcription output is the same as the name you specified for your medical transcription job (MedicalTranscriptionJobName). Here are some examples of how you can use OutputKey: If you specify 'DOC-EXAMPLE-BUCKET' as the OutputBucketName and 'my-transcript.json' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/my-transcript.json. If you specify 'my-first-transcription' as the MedicalTranscriptionJobName, 'DOC-EXAMPLE-BUCKET' as the OutputBucketName, and 'my-transcript' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/my-transcript/my-first-transcription.json. If you specify 'DOC-EXAMPLE-BUCKET' as the OutputBucketName and 'test-files/my-transcript.json' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/test-files/my-transcript.json. If you specify 'my-first-transcription' as the MedicalTranscriptionJobName, 'DOC-EXAMPLE-BUCKET' as the OutputBucketName, and 'test-files/my-transcript' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/test-files/my-transcript/my-first-transcription.json. If you specify the name of an Amazon S3 bucket sub-folder that doesn't exist, one is created for you."
                OutputEncryptionKMSKeyId:
                  $ref: "#/components/schemas/KMSKeyId"
                  description: "The Amazon Resource Name (ARN) of a KMS key that you want to use to encrypt your medical transcription output. KMS key ARNs have the format arn:partition:kms:region:account:key/key-id. For example: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab. For more information, see KMS key ARNs. If you do not specify an encryption key, your output is encrypted with the default Amazon S3 key (SSE-S3). Note that the role making the request and the role specified in the DataAccessRoleArn request parameter (if present) must have permission to use the specified KMS key."
                KMSEncryptionContext:
                  $ref: "#/components/schemas/KMSEncryptionContextMap"
                  description: A map of plain text, non-secret key:value pairs, known as encryption context pairs, that provide an added layer of security for your data. For more information, see KMS encryption context and Asymmetric keys in KMS.
                Settings:
                  $ref: "#/components/schemas/MedicalTranscriptionSetting"
                  description: Specify additional optional settings in your request, including channel identification, alternative transcriptions, and speaker partitioning. You can use that to apply custom vocabularies to your transcription job.
                ContentIdentificationType:
                  $ref: "#/components/schemas/MedicalContentIdentificationType"
                  description: Labels all personal health information (PHI) identified in your transcript. For more information, see Identifying personal health information (PHI) in a transcription.
                Specialty:
                  $ref: "#/components/schemas/Specialty"
                  description: Specify the predominant medical specialty represented in your media. For batch transcriptions, PRIMARYCARE is the only valid value. If you require additional specialties, refer to .
                Type:
                  $ref: "#/components/schemas/Type"
                  description: Specify whether your input media contains only one person (DICTATION) or contains a conversation between two people (CONVERSATION). For example, DICTATION could be used for a medical professional wanting to transcribe voice memos; CONVERSATION could be used for transcribing the doctor-patient dialogue during the patient's office visit.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new medical transcription job at the time you start this new job. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
              required:
                - MedicalTranscriptionJobName
                - LanguageCode
                - Media
                - OutputBucketName
                - Specialty
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMedicalTranscriptionJobResponse"
  /StartTranscriptionJob:
    post:
      operationId: StartTranscriptionJob
      description: "Transcribes the audio from a media file and applies any additional Request Parameters you choose to include in your request. To make a StartTranscriptionJob request, you must first upload your media file into an Amazon S3 bucket; you can then specify the Amazon S3 location of the file using the Media parameter. You must include the following parameters in your StartTranscriptionJob request: region: The Amazon Web Services Region where you are making your request. For a list of Amazon Web Services Regions supported with Amazon Transcribe, refer to Amazon Transcribe endpoints and quotas. TranscriptionJobName: A custom name you create for your transcription job that is unique within your Amazon Web Services account. Media (MediaFileUri): The Amazon S3 location of your media file. One of LanguageCode, IdentifyLanguage, or IdentifyMultipleLanguages: If you know the language of your media file, specify it using the LanguageCode parameter; you can find all valid language codes in the Supported languages table. If you do not know the languages spoken in your media, use either IdentifyLanguage or IdentifyMultipleLanguages and let Amazon Transcribe identify the languages for you."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.StartTranscriptionJob
            default: Transcribe.StartTranscriptionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TranscriptionJobName:
                  $ref: "#/components/schemas/TranscriptionJobName"
                  description: A unique name, chosen by you, for your transcription job. The name that you specify is also used as the default name of your transcription output file. If you want to specify a different name for your transcription output, use the OutputKey parameter. This name is case sensitive, cannot contain spaces, and must be unique within an Amazon Web Services account. If you try to create a new job with the same name as an existing job, you get a ConflictException error.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language spoken in the input media file. If you're unsure of the language spoken in your media file, consider using IdentifyLanguage or IdentifyMultipleLanguages to enable automatic language identification. Note that you must include one of LanguageCode, IdentifyLanguage, or IdentifyMultipleLanguages in your request. If you include more than one of these parameters, your transcription job fails. For a list of supported languages and their associated language codes, refer to the Supported languages table. To transcribe speech in Modern Standard Arabic (ar-SA) in Amazon Web Services GovCloud (US) (US-West, us-gov-west-1), Amazon Web Services GovCloud (US) (US-East, us-gov-east-1), Canada (Calgary, ca-west-1) and Africa (Cape Town, af-south-1), your media file must be encoded at a sample rate of 16,000 Hz or higher.
                MediaSampleRateHertz:
                  $ref: "#/components/schemas/MediaSampleRateHertz"
                  description: The sample rate, in hertz, of the audio track in your input media file. If you do not specify the media sample rate, Amazon Transcribe determines it for you. If you specify the sample rate, it must match the rate detected by Amazon Transcribe. If there's a mismatch between the value that you specify and the value detected, your job fails. In most cases, you can omit MediaSampleRateHertz and let Amazon Transcribe determine the sample rate.
                MediaFormat:
                  $ref: "#/components/schemas/MediaFormat"
                  description: Specify the format of your input media file.
                Media:
                  $ref: "#/components/schemas/Media"
                  description: Describes the Amazon S3 location of the media file you want to use in your request.
                OutputBucketName:
                  $ref: "#/components/schemas/OutputBucketName"
                  description: The name of the Amazon S3 bucket where you want your transcription output stored. Do not include the S3:// prefix of the specified bucket. If you want your output to go to a sub-folder of this bucket, specify it using the OutputKey parameter; OutputBucketName only accepts the name of a bucket. For example, if you want your output stored in S3://DOC-EXAMPLE-BUCKET, set OutputBucketName to DOC-EXAMPLE-BUCKET. However, if you want your output stored in S3://DOC-EXAMPLE-BUCKET/test-files/, set OutputBucketName to DOC-EXAMPLE-BUCKET and OutputKey to test-files/. Note that Amazon Transcribe must have permission to use the specified location. You can change Amazon S3 permissions using the Amazon Web Services Management Console. See also Permissions Required for IAM User Roles. If you do not specify OutputBucketName, your transcript is placed in a service-managed Amazon S3 bucket and you are provided with a URI to access your transcript.
                OutputKey:
                  $ref: "#/components/schemas/OutputKey"
                  description: "Use in combination with OutputBucketName to specify the output location of your transcript and, optionally, a unique name for your output file. The default name for your transcription output is the same as the name you specified for your transcription job (TranscriptionJobName). Here are some examples of how you can use OutputKey: If you specify 'DOC-EXAMPLE-BUCKET' as the OutputBucketName and 'my-transcript.json' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/my-transcript.json. If you specify 'my-first-transcription' as the TranscriptionJobName, 'DOC-EXAMPLE-BUCKET' as the OutputBucketName, and 'my-transcript' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/my-transcript/my-first-transcription.json. If you specify 'DOC-EXAMPLE-BUCKET' as the OutputBucketName and 'test-files/my-transcript.json' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/test-files/my-transcript.json. If you specify 'my-first-transcription' as the TranscriptionJobName, 'DOC-EXAMPLE-BUCKET' as the OutputBucketName, and 'test-files/my-transcript' as the OutputKey, your transcription output path is s3://DOC-EXAMPLE-BUCKET/test-files/my-transcript/my-first-transcription.json. If you specify the name of an Amazon S3 bucket sub-folder that doesn't exist, one is created for you."
                OutputEncryptionKMSKeyId:
                  $ref: "#/components/schemas/KMSKeyId"
                  description: "The Amazon Resource Name (ARN) of a KMS key that you want to use to encrypt your transcription output. KMS key ARNs have the format arn:partition:kms:region:account:key/key-id. For example: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab. For more information, see KMS key ARNs. If you do not specify an encryption key, your output is encrypted with the default Amazon S3 key (SSE-S3). Note that the role making the request and the role specified in the DataAccessRoleArn request parameter (if present) must have permission to use the specified KMS key."
                KMSEncryptionContext:
                  $ref: "#/components/schemas/KMSEncryptionContextMap"
                  description: A map of plain text, non-secret key:value pairs, known as encryption context pairs, that provide an added layer of security for your data. For more information, see KMS encryption context and Asymmetric keys in KMS.
                Settings:
                  $ref: "#/components/schemas/Settings"
                  description: Specify additional optional settings in your request, including channel identification, alternative transcriptions, speaker partitioning. You can use that to apply custom vocabularies and vocabulary filters. If you want to include a custom vocabulary or a custom vocabulary filter (or both) with your request but do not want to use automatic language identification, use Settings with the VocabularyName or VocabularyFilterName (or both) sub-parameter. If you're using automatic language identification with your request and want to include a custom language model, a custom vocabulary, or a custom vocabulary filter, use instead the parameter with the LanguageModelName, VocabularyName or VocabularyFilterName sub-parameters.
                ModelSettings:
                  $ref: "#/components/schemas/ModelSettings"
                  description: Specify the custom language model you want to include with your transcription job. If you include ModelSettings in your request, you must include the LanguageModelName sub-parameter. For more information, see Custom language models.
                JobExecutionSettings:
                  $ref: "#/components/schemas/JobExecutionSettings"
                  description: "Makes it possible to control how your transcription job is processed. Currently, the only JobExecutionSettings modification you can choose is enabling job queueing using the AllowDeferredExecution sub-parameter. If you include JobExecutionSettings in your request, you must also include the sub-parameters: AllowDeferredExecution and DataAccessRoleArn."
                ContentRedaction:
                  $ref: "#/components/schemas/ContentRedaction"
                  description: "Makes it possible to redact or flag specified personally identifiable information (PII) in your transcript. If you use ContentRedaction, you must also include the sub-parameters: RedactionOutput and RedactionType. You can optionally include PiiEntityTypes to choose which types of PII you want to redact. If you do not include PiiEntityTypes in your request, all PII is redacted."
                IdentifyLanguage:
                  $ref: "#/components/schemas/Boolean"
                  description: Enables automatic language identification in your transcription job request. Use this parameter if your media file contains only one language. If your media contains multiple languages, use IdentifyMultipleLanguages instead. If you include IdentifyLanguage, you can optionally include a list of language codes, using LanguageOptions, that you think may be present in your media file. Including LanguageOptions restricts IdentifyLanguage to only the language options that you specify, which can improve transcription accuracy. If you want to apply a custom language model, a custom vocabulary, or a custom vocabulary filter to your automatic language identification request, include LanguageIdSettings with the relevant sub-parameters (VocabularyName, LanguageModelName, and VocabularyFilterName). If you include LanguageIdSettings, also include LanguageOptions. Note that you must include one of LanguageCode, IdentifyLanguage, or IdentifyMultipleLanguages in your request. If you include more than one of these parameters, your transcription job fails.
                IdentifyMultipleLanguages:
                  $ref: "#/components/schemas/Boolean"
                  description: Enables automatic multi-language identification in your transcription job request. Use this parameter if your media file contains more than one language. If your media contains only one language, use IdentifyLanguage instead. If you include IdentifyMultipleLanguages, you can optionally include a list of language codes, using LanguageOptions, that you think may be present in your media file. Including LanguageOptions restricts IdentifyLanguage to only the language options that you specify, which can improve transcription accuracy. If you want to apply a custom vocabulary or a custom vocabulary filter to your automatic language identification request, include LanguageIdSettings with the relevant sub-parameters (VocabularyName and VocabularyFilterName). If you include LanguageIdSettings, also include LanguageOptions. Note that you must include one of LanguageCode, IdentifyLanguage, or IdentifyMultipleLanguages in your request. If you include more than one of these parameters, your transcription job fails.
                LanguageOptions:
                  $ref: "#/components/schemas/LanguageOptions"
                  description: You can specify two or more language codes that represent the languages you think may be present in your media. Including more than five is not recommended. If you're unsure what languages are present, do not include this parameter. If you include LanguageOptions in your request, you must also include IdentifyLanguage. For more information, refer to Supported languages. To transcribe speech in Modern Standard Arabic (ar-SA)in Amazon Web Services GovCloud (US) (US-West, us-gov-west-1), Amazon Web Services GovCloud (US) (US-East, us-gov-east-1), in Canada (Calgary) ca-west-1 and Africa (Cape Town) af-south-1, your media file must be encoded at a sample rate of 16,000 Hz or higher.
                Subtitles:
                  $ref: "#/components/schemas/Subtitles"
                  description: Produces subtitle files for your input media. You can specify WebVTT (*.vtt) and SubRip (*.srt) formats.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to a new transcription job at the time you start this new job. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
                LanguageIdSettings:
                  $ref: "#/components/schemas/LanguageIdSettingsMap"
                  description: If using automatic language identification in your request and you want to apply a custom language model, a custom vocabulary, or a custom vocabulary filter, include LanguageIdSettings with the relevant sub-parameters (VocabularyName, LanguageModelName, and VocabularyFilterName). Note that multi-language identification (IdentifyMultipleLanguages) doesn't support custom language models. LanguageIdSettings supports two to five language codes. Each language code you include can have an associated custom language model, custom vocabulary, and custom vocabulary filter. The language codes that you specify must match the languages of the associated custom language models, custom vocabularies, and custom vocabulary filters. It's recommended that you include LanguageOptions when using LanguageIdSettings to ensure that the correct language dialect is identified. For example, if you specify a custom vocabulary that is in en-US but Amazon Transcribe determines that the language spoken in your media is en-AU, your custom vocabulary is not applied to your transcription. If you include LanguageOptions and include en-US as the only English language dialect, your custom vocabulary is applied to your transcription. If you want to include a custom language model with your request but do not want to use automatic language identification, use instead the parameter with the LanguageModelName sub-parameter. If you want to include a custom vocabulary or a custom vocabulary filter (or both) with your request but do not want to use automatic language identification, use instead the parameter with the VocabularyName or VocabularyFilterName (or both) sub-parameter.
                ToxicityDetection:
                  $ref: "#/components/schemas/ToxicityDetection"
                  description: Enables toxic speech detection in your transcript. If you include ToxicityDetection in your request, you must also include ToxicityCategories. For information on the types of toxic speech Amazon Transcribe can detect, see Detecting toxic speech.
              required:
                - TranscriptionJobName
                - Media
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTranscriptionJobResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds one or more custom tags, each in the form of a key:value pair, to the specified resource. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.TagResource
            default: Transcribe.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TranscribeArn"
                  description: "The Amazon Resource Name (ARN) of the resource you want to tag. ARNs have the format arn:partition:service:region:account-id:resource-type/resource-id. For example, arn:aws:transcribe:us-west-2:111122223333:transcription-job/transcription-job-name. Valid values for resource-type are: transcription-job, medical-transcription-job, vocabulary, medical-vocabulary, vocabulary-filter, and language-model."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Adds one or more custom tags, each in the form of a key:value pair, to the specified resource. To learn more about using tags with Amazon Transcribe, refer to Tagging resources.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the specified tags from the specified Amazon Transcribe resource. If you include UntagResource in your request, you must also include ResourceArn and TagKeys.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.UntagResource
            default: Transcribe.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TranscribeArn"
                  description: "The Amazon Resource Name (ARN) of the Amazon Transcribe resource you want to remove tags from. ARNs have the format arn:partition:service:region:account-id:resource-type/resource-id. For example, arn:aws:transcribe:us-west-2:111122223333:transcription-job/transcription-job-name. Valid values for resource-type are: transcription-job, medical-transcription-job, vocabulary, medical-vocabulary, vocabulary-filter, and language-model."
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: Removes the specified tag keys from the specified Amazon Transcribe resource.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateCallAnalyticsCategory:
    post:
      operationId: UpdateCallAnalyticsCategory
      description: Updates the specified Call Analytics category with new rules. Note that the UpdateCallAnalyticsCategory operation overwrites all existing rules contained in the specified category. You cannot append additional rules onto an existing category. To create a new category, see .
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.UpdateCallAnalyticsCategory
            default: Transcribe.UpdateCallAnalyticsCategory
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CategoryName:
                  $ref: "#/components/schemas/CategoryName"
                  description: The name of the Call Analytics category you want to update. Category names are case sensitive.
                Rules:
                  $ref: "#/components/schemas/RuleList"
                  description: The rules used for the updated Call Analytics category. The rules you provide in this field replace the ones that are currently being used in the specified category.
                InputType:
                  $ref: "#/components/schemas/InputType"
                  description: Choose whether you want to update a real-time or a post-call category. The input type you specify must match the input type specified when the category was created. For example, if you created a category with the POST_CALL input type, you must use POST_CALL as the input type when updating this category.
              required:
                - CategoryName
                - Rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCallAnalyticsCategoryResponse"
  /UpdateMedicalVocabulary:
    post:
      operationId: UpdateMedicalVocabulary
      description: Updates an existing custom medical vocabulary with new values. This operation overwrites all existing information with your new values; you cannot append new terms onto an existing custom vocabulary.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.UpdateMedicalVocabulary
            default: Transcribe.UpdateMedicalVocabulary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyName:
                  $ref: "#/components/schemas/VocabularyName"
                  description: The name of the custom medical vocabulary you want to update. Custom medical vocabulary names are case sensitive.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language of the entries in the custom vocabulary you want to update. US English (en-US) is the only language supported with Amazon Transcribe Medical.
                VocabularyFileUri:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location of the text file that contains your custom medical vocabulary. The URI must be located in the same Amazon Web Services Region as the resource you're calling. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-vocab-file.txt"
              required:
                - VocabularyName
                - LanguageCode
                - VocabularyFileUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMedicalVocabularyResponse"
  /UpdateVocabulary:
    post:
      operationId: UpdateVocabulary
      description: Updates an existing custom vocabulary with new values. This operation overwrites all existing information with your new values; you cannot append new terms onto an existing custom vocabulary.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.UpdateVocabulary
            default: Transcribe.UpdateVocabulary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyName:
                  $ref: "#/components/schemas/VocabularyName"
                  description: The name of the custom vocabulary you want to update. Custom vocabulary names are case sensitive.
                LanguageCode:
                  $ref: "#/components/schemas/LanguageCode"
                  description: The language code that represents the language of the entries in the custom vocabulary you want to update. Each custom vocabulary must contain terms in only one language. A custom vocabulary can only be used to transcribe files in the same language as the custom vocabulary. For example, if you create a custom vocabulary using US English (en-US), you can only apply this custom vocabulary to files that contain English audio. For a list of supported languages and their associated language codes, refer to the Supported languages table.
                Phrases:
                  $ref: "#/components/schemas/Phrases"
                  description: Use this parameter if you want to update your custom vocabulary by including all desired terms, as comma-separated values, within your request. The other option for updating your custom vocabulary is to save your entries in a text file and upload them to an Amazon S3 bucket, then specify the location of your file using the VocabularyFileUri parameter. Note that if you include Phrases in your request, you cannot use VocabularyFileUri; you must choose one or the other. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary filter request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language.
                VocabularyFileUri:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location of the text file that contains your custom vocabulary. The URI must be located in the same Amazon Web Services Region as the resource you're calling. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-vocab-file.txt Note that if you include VocabularyFileUri in your request, you cannot use the Phrases flag; you must choose one or the other."
                DataAccessRoleArn:
                  $ref: "#/components/schemas/DataAccessRoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files (in this case, your custom vocabulary). If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
              required:
                - VocabularyName
                - LanguageCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVocabularyResponse"
  /UpdateVocabularyFilter:
    post:
      operationId: UpdateVocabularyFilter
      description: Updates an existing custom vocabulary filter with a new list of words. The new list you provide overwrites all previous entries; you cannot append new terms onto an existing custom vocabulary filter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Transcribe.UpdateVocabularyFilter
            default: Transcribe.UpdateVocabularyFilter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                VocabularyFilterName:
                  $ref: "#/components/schemas/VocabularyFilterName"
                  description: The name of the custom vocabulary filter you want to update. Custom vocabulary filter names are case sensitive.
                Words:
                  $ref: "#/components/schemas/Words"
                  description: Use this parameter if you want to update your custom vocabulary filter by including all desired terms, as comma-separated values, within your request. The other option for updating your vocabulary filter is to save your entries in a text file and upload them to an Amazon S3 bucket, then specify the location of your file using the VocabularyFilterFileUri parameter. Note that if you include Words in your request, you cannot use VocabularyFilterFileUri; you must choose one or the other. Each language has a character set that contains all allowed characters for that specific language. If you use unsupported characters, your custom vocabulary filter request fails. Refer to Character Sets for Custom Vocabularies to get the character set for your language.
                VocabularyFilterFileUri:
                  $ref: "#/components/schemas/Uri"
                  description: "The Amazon S3 location of the text file that contains your custom vocabulary filter terms. The URI must be located in the same Amazon Web Services Region as the resource you're calling. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-vocab-filter-file.txt Note that if you include VocabularyFilterFileUri in your request, you cannot use Words; you must choose one or the other."
                DataAccessRoleArn:
                  $ref: "#/components/schemas/DataAccessRoleArn"
                  description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files (in this case, your custom vocabulary filter). If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
              required:
                - VocabularyFilterName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateVocabularyFilterResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CategoryName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z._-]+
    RuleList:
      type: array
      items:
        $ref: "#/components/schemas/Rule"
    Rule:
      description: "A rule is a set of criteria that you can specify to flag an attribute in your Call Analytics output. Rules define a Call Analytics category. Rules can include these parameters: , , , and . To learn more about Call Analytics rules and categories, see Creating categories for post-call transcriptions and Creating categories for real-time transcriptions. To learn more about Call Analytics, see Analyzing call center audio with Call Analytics."
      type: object
      properties:
        NonTalkTimeFilter:
          $ref: "#/components/schemas/NonTalkTimeFilter"
          description: Flag the presence or absence of periods of silence in your Call Analytics transcription output. Refer to for more detail.
        InterruptionFilter:
          $ref: "#/components/schemas/InterruptionFilter"
          description: Flag the presence or absence of interruptions in your Call Analytics transcription output. Refer to for more detail.
        TranscriptFilter:
          $ref: "#/components/schemas/TranscriptFilter"
          description: Flag the presence or absence of specific words or phrases in your Call Analytics transcription output. Refer to for more detail.
        SentimentFilter:
          $ref: "#/components/schemas/SentimentFilter"
          description: Flag the presence or absence of specific sentiments in your Call Analytics transcription output. Refer to for more detail.
    NonTalkTimeFilter:
      description: "Flag the presence or absence of periods of silence in your Call Analytics transcription output. Rules using NonTalkTimeFilter are designed to match: The presence of silence at specified periods throughout the call The presence of speech at specified periods throughout the call See Rule criteria for post-call categories for usage examples."
      type: object
      properties:
        Threshold:
          $ref: "#/components/schemas/TimestampMilliseconds"
          description: Specify the duration, in milliseconds, of the period of silence that you want to flag. For example, you can flag a silent period that lasts 30,000 milliseconds.
        AbsoluteTimeRange:
          $ref: "#/components/schemas/AbsoluteTimeRange"
          description: Makes it possible to specify a time range (in milliseconds) in your audio, during which you want to search for a period of silence. See for more detail.
        RelativeTimeRange:
          $ref: "#/components/schemas/RelativeTimeRange"
          description: Makes it possible to specify a time range (in percentage) in your media file, during which you want to search for a period of silence. See for more detail.
        Negate:
          $ref: "#/components/schemas/Boolean"
          description: Set to TRUE to flag periods of speech. Set to FALSE to flag periods of silence
    TimestampMilliseconds:
      type: integer
      format: int64
      minimum: 0
      maximum: 14400000
    AbsoluteTimeRange:
      description: A time range, in milliseconds, between two points in your media file. You can use StartTime and EndTime to search a custom segment. For example, setting StartTime to 10000 and EndTime to 50000 only searches for your specified criteria in the audio contained between the 10,000 millisecond mark and the 50,000 millisecond mark of your media file. You must use StartTime and EndTime as a set; that is, if you include one, you must include both. You can use also First to search from the start of the audio until the time that you specify, or Last to search from the time that you specify until the end of the audio. For example, setting First to 50000 only searches for your specified criteria in the audio contained between the start of the media file to the 50,000 millisecond mark. You can use First and Last independently of each other. If you prefer to use percentage instead of milliseconds, see .
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/TimestampMilliseconds"
          description: The time, in milliseconds, when Amazon Transcribe starts searching for the specified criteria in your audio. If you include StartTime in your request, you must also include EndTime.
        EndTime:
          $ref: "#/components/schemas/TimestampMilliseconds"
          description: The time, in milliseconds, when Amazon Transcribe stops searching for the specified criteria in your audio. If you include EndTime in your request, you must also include StartTime.
        First:
          $ref: "#/components/schemas/TimestampMilliseconds"
          description: The time, in milliseconds, from the start of your media file until the specified value. Amazon Transcribe searches for your specified criteria in this time segment.
        Last:
          $ref: "#/components/schemas/TimestampMilliseconds"
          description: The time, in milliseconds, from the specified value until the end of your media file. Amazon Transcribe searches for your specified criteria in this time segment.
    RelativeTimeRange:
      description: A time range, in percentage, between two points in your media file. You can use StartPercentage and EndPercentage to search a custom segment. For example, setting StartPercentage to 10 and EndPercentage to 50 only searches for your specified criteria in the audio contained between the 10 percent mark and the 50 percent mark of your media file. You can use also First to search from the start of the media file until the time that you specify. Or use Last to search from the time that you specify until the end of the media file. For example, setting First to 10 only searches for your specified criteria in the audio contained in the first 10 percent of the media file. If you prefer to use milliseconds instead of percentage, see .
      type: object
      properties:
        StartPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The time, in percentage, when Amazon Transcribe starts searching for the specified criteria in your media file. If you include StartPercentage in your request, you must also include EndPercentage.
        EndPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The time, in percentage, when Amazon Transcribe stops searching for the specified criteria in your media file. If you include EndPercentage in your request, you must also include StartPercentage.
        First:
          $ref: "#/components/schemas/Percentage"
          description: The time, in percentage, from the start of your media file until the specified value. Amazon Transcribe searches for your specified criteria in this time segment.
        Last:
          $ref: "#/components/schemas/Percentage"
          description: The time, in percentage, from the specified value until the end of your media file. Amazon Transcribe searches for your specified criteria in this time segment.
    Percentage:
      type: integer
      minimum: 0
      maximum: 100
    Boolean:
      type: boolean
    InterruptionFilter:
      description: "Flag the presence or absence of interruptions in your Call Analytics transcription output. Rules using InterruptionFilter are designed to match: Instances where an agent interrupts a customer Instances where a customer interrupts an agent Either participant interrupting the other A lack of interruptions See Rule criteria for post-call categories for usage examples."
      type: object
      properties:
        Threshold:
          $ref: "#/components/schemas/TimestampMilliseconds"
          description: Specify the duration of the interruptions in milliseconds. For example, you can flag speech that contains more than 10,000 milliseconds of interruptions.
        ParticipantRole:
          $ref: "#/components/schemas/ParticipantRole"
          description: Specify the interrupter that you want to flag. Omitting this parameter is equivalent to specifying both participants.
        AbsoluteTimeRange:
          $ref: "#/components/schemas/AbsoluteTimeRange"
          description: Makes it possible to specify a time range (in milliseconds) in your audio, during which you want to search for an interruption. See for more detail.
        RelativeTimeRange:
          $ref: "#/components/schemas/RelativeTimeRange"
          description: Makes it possible to specify a time range (in percentage) in your media file, during which you want to search for an interruption. See for more detail.
        Negate:
          $ref: "#/components/schemas/Boolean"
          description: Set to TRUE to flag speech that does not contain interruptions. Set to FALSE to flag speech that contains interruptions.
    ParticipantRole:
      type: string
      enum:
        - AGENT
        - CUSTOMER
    TranscriptFilter:
      description: "Flag the presence or absence of specific words or phrases detected in your Call Analytics transcription output. Rules using TranscriptFilter are designed to match: Custom words or phrases spoken by the agent, the customer, or both Custom words or phrases not spoken by the agent, the customer, or either Custom words or phrases that occur at a specific time frame See Rule criteria for post-call categories and Rule criteria for streaming categories for usage examples."
      type: object
      properties:
        TranscriptFilterType:
          $ref: "#/components/schemas/TranscriptFilterType"
          description: Flag the presence or absence of an exact match to the phrases that you specify. For example, if you specify the phrase "speak to a manager" as your Targets value, only that exact phrase is flagged. Note that semantic matching is not supported. For example, if your customer says "speak to the manager", instead of "speak to a manager", your content is not flagged.
        AbsoluteTimeRange:
          $ref: "#/components/schemas/AbsoluteTimeRange"
          description: Makes it possible to specify a time range (in milliseconds) in your audio, during which you want to search for the specified key words or phrases. See for more detail.
        RelativeTimeRange:
          $ref: "#/components/schemas/RelativeTimeRange"
          description: Makes it possible to specify a time range (in percentage) in your media file, during which you want to search for the specified key words or phrases. See for more detail.
        ParticipantRole:
          $ref: "#/components/schemas/ParticipantRole"
          description: Specify the participant that you want to flag. Omitting this parameter is equivalent to specifying both participants.
        Negate:
          $ref: "#/components/schemas/Boolean"
          description: Set to TRUE to flag the absence of the phrase that you specified in your request. Set to FALSE to flag the presence of the phrase that you specified in your request.
        Targets:
          $ref: "#/components/schemas/StringTargetList"
          description: Specify the phrases that you want to flag.
      required:
        - TranscriptFilterType
        - Targets
    TranscriptFilterType:
      type: string
      enum:
        - EXACT
    StringTargetList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: .*\S.*
    SentimentFilter:
      description: "Flag the presence or absence of specific sentiments detected in your Call Analytics transcription output. Rules using SentimentFilter are designed to match: The presence or absence of a positive sentiment felt by the customer, agent, or both at specified points in the call The presence or absence of a negative sentiment felt by the customer, agent, or both at specified points in the call The presence or absence of a neutral sentiment felt by the customer, agent, or both at specified points in the call The presence or absence of a mixed sentiment felt by the customer, the agent, or both at specified points in the call See Rule criteria for post-call categories for usage examples."
      type: object
      properties:
        Sentiments:
          $ref: "#/components/schemas/SentimentValueList"
          description: Specify the sentiments that you want to flag.
        AbsoluteTimeRange:
          $ref: "#/components/schemas/AbsoluteTimeRange"
          description: Makes it possible to specify a time range (in milliseconds) in your audio, during which you want to search for the specified sentiments. See for more detail.
        RelativeTimeRange:
          $ref: "#/components/schemas/RelativeTimeRange"
          description: Makes it possible to specify a time range (in percentage) in your media file, during which you want to search for the specified sentiments. See for more detail.
        ParticipantRole:
          $ref: "#/components/schemas/ParticipantRole"
          description: Specify the participant that you want to flag. Omitting this parameter is equivalent to specifying both participants.
        Negate:
          $ref: "#/components/schemas/Boolean"
          description: Set to TRUE to flag the sentiments that you didn't include in your request. Set to FALSE to flag the sentiments that you specified in your request.
      required:
        - Sentiments
    SentimentValueList:
      type: array
      items:
        $ref: "#/components/schemas/SentimentValue"
    SentimentValue:
      type: string
      enum:
        - POSITIVE
        - NEGATIVE
        - NEUTRAL
        - MIXED
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Adds metadata, in the form of a key:value pair, to the specified resource. For example, you could add the tag Department:Sales to a resource to indicate that it pertains to your organization's sales department. You can also use tags for tag-based access control. To learn more about tagging, see Tagging resources.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The first part of a key:value pair that forms a tag associated with a given resource. For example, in the tag Department:Sales, the key is 'Department'.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The second part of a key:value pair that forms a tag associated with a given resource. For example, in the tag Department:Sales, the value is 'Sales'. Note that you can set the value of a tag to an empty string, but you can't set the value of a tag to null. Omitting the tag value is the same as using an empty string.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    InputType:
      type: string
      enum:
        - REAL_TIME
        - POST_CALL
    CreateCallAnalyticsCategoryResponse:
      type: object
      properties:
        CategoryProperties:
          $ref: "#/components/schemas/CategoryProperties"
          description: Provides you with the properties of your new category, including its associated rules.
    CategoryProperties:
      description: Provides you with the properties of the Call Analytics category you specified in your request. This includes the list of rules that define the specified category.
      type: object
      properties:
        CategoryName:
          $ref: "#/components/schemas/CategoryName"
          description: The name of the Call Analytics category. Category names are case sensitive and must be unique within an Amazon Web Services account.
        Rules:
          $ref: "#/components/schemas/RuleList"
          description: The rules used to define a Call Analytics category. Each category can have between 1 and 20 rules.
        CreateTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Call Analytics category was created. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-04T12:32:58.761000-07:00 represents 12:32 PM UTC-7 on May 4, 2022.
        LastUpdateTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time the specified Call Analytics category was last updated. Timestamps are in the format YYYY-MM-DD'T'HH:MM:SS.SSSSSS-UTC. For example, 2022-05-05T12:45:32.691000-07:00 represents 12:45 PM UTC-7 on May 5, 2022.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags, each in the form of a key:value pair, assigned to the specified call analytics category.
        InputType:
          $ref: "#/components/schemas/InputType"
          description: The input type associated with the specified category. POST_CALL refers to a category that is applied to batch transcriptions; REAL_TIME refers to a category that is applied to streaming transcriptions.
    DateTime:
      type: string
      format: date-time
    CLMLanguageCode:
      type: string
      enum:
        - en-US
        - hi-IN
        - es-US
        - en-GB
        - en-AU
        - de-DE
        - ja-JP
    BaseModelName:
      type: string
      enum:
        - NarrowBand
        - WideBand
    ModelName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[0-9a-zA-Z._-]+
    InputDataConfig:
      description: "Contains the Amazon S3 location of the training data you want to use to create a new custom language model, and permissions to access this location. When using InputDataConfig, you must include these sub-parameters: S3Uri and DataAccessRoleArn. You can optionally include TuningDataS3Uri."
      type: object
      properties:
        S3Uri:
          $ref: "#/components/schemas/Uri"
          description: "The Amazon S3 location (URI) of the text files you want to use to train your custom language model. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-model-training-data/"
        TuningDataS3Uri:
          $ref: "#/components/schemas/Uri"
          description: "The Amazon S3 location (URI) of the text files you want to use to tune your custom language model. Here's an example URI path: s3://DOC-EXAMPLE-BUCKET/my-model-tuning-data/"
        DataAccessRoleArn:
          $ref: "#/components/schemas/DataAccessRoleArn"
          description: "The Amazon Resource Name (ARN) of an IAM role that has permissions to access the Amazon S3 bucket that contains your input files. If the role that you specify doesn’t have the appropriate permissions to access the specified Amazon S3 location, your request fails. IAM role ARNs have the format arn:partition:iam::account:role/role-name-with-path. For example: arn:aws:iam::111122223333:role/Admin. For more information, see IAM ARNs."
      required:
        - S3Uri
        - DataAccessRoleArn
    Uri:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: (s3://|http(s*)://).+
    DataAccessRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:(aws|aws-cn|aws-us-gov|aws-iso-{0,1}[a-z]{0,1}):iam::[0-9]{0,63}:role/[A-Za-z0-9:_/+=,@.-]{0,1024}$
