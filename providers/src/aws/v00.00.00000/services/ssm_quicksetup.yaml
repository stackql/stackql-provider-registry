openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Systems Manager QuickSetup
  description: AWS Systems Manager QuickSetup
  x-serviceName: ssm-quicksetup
  x-serviceAlias: ssm_quicksetup
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: ssm-quicksetup
  x-jsonVersion: "1.1"
servers:
  - url: https://ssm-quicksetup.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ssm-quicksetup
paths:
  /configurationManager:
    post:
      operationId: CreateConfigurationManager
      description: Creates a Quick Setup configuration manager resource. This object is a collection of desired state configurations for multiple configuration definitions and summaries describing the deployments of those definitions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConfigurationDefinitions:
                  $ref: "#/components/schemas/ConfigurationDefinitionsInputList"
                Description:
                  $ref: "#/components/schemas/CreateConfigurationManagerInputDescriptionString"
                Name:
                  $ref: "#/components/schemas/CreateConfigurationManagerInputNameString"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - ConfigurationDefinitions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationManagerOutput"
  /configurationManager/{manager_arn}:
    delete:
      operationId: DeleteConfigurationManager
      description: Deletes a configuration manager.
      parameters:
        - name: manager_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeleteConfigurationManagerInputManagerArnString"
          description: The ID of the configuration manager.
      responses:
        "200":
          description: Success
    get:
      operationId: GetConfigurationManager
      description: Returns a configuration manager.
      parameters:
        - name: manager_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetConfigurationManagerInputManagerArnString"
          description: The ARN of the configuration manager.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationManagerOutput"
    put:
      operationId: UpdateConfigurationManager
      description: Updates a Quick Setup configuration manager.
      parameters:
        - name: manager_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UpdateConfigurationManagerInputManagerArnString"
          description: The ARN of the configuration manager.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/UpdateConfigurationManagerInputDescriptionString"
                Name:
                  $ref: "#/components/schemas/UpdateConfigurationManagerInputNameString"
      responses:
        "200":
          description: Success
  /getConfiguration/{configuration_id}:
    get:
      operationId: GetConfiguration
      description: Returns details about the specified configuration.
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetConfigurationInputConfigurationIdString"
          description: A service generated identifier for the configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationOutput"
  /serviceSettings:
    get:
      operationId: GetServiceSettings
      description: Returns settings configured for Quick Setup in the requesting Amazon Web Services account and Amazon Web Services Region.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceSettingsOutput"
    put:
      operationId: UpdateServiceSettings
      description: Updates settings configured for Quick Setup.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ExplorerEnablingRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
      responses:
        "200":
          description: Success
  /listConfigurationManagers:
    post:
      operationId: ListConfigurationManagers
      description: Returns Quick Setup configuration managers.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/FiltersList"
                MaxItems:
                  $ref: "#/components/schemas/ListConfigurationManagersInputMaxItemsInteger"
                StartingToken:
                  $ref: "#/components/schemas/ListConfigurationManagersInputStartingTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationManagersOutput"
  /listConfigurations:
    post:
      operationId: ListConfigurations
      description: Returns configurations deployed by Quick Setup in the requesting Amazon Web Services account and Amazon Web Services Region.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ConfigurationDefinitionId:
                  $ref: "#/components/schemas/ListConfigurationsInputConfigurationDefinitionIdString"
                Filters:
                  $ref: "#/components/schemas/FiltersList"
                ManagerArn:
                  $ref: "#/components/schemas/ListConfigurationsInputManagerArnString"
                MaxItems:
                  $ref: "#/components/schemas/ListConfigurationsInputMaxItemsInteger"
                StartingToken:
                  $ref: "#/components/schemas/ListConfigurationsInputStartingTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationsOutput"
  /listQuickSetupTypes:
    get:
      operationId: ListQuickSetupTypes
      description: Returns the available Quick Setup types.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQuickSetupTypesOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns tags assigned to the resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource the tag is assigned to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    put:
      operationId: TagResource
      description: Assigns key-value pairs of metadata to Amazon Web Services resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagsMap"
      responses:
        "200":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The keys of the tags to remove from the resource.
      responses:
        "200":
          description: Success
  /configurationDefinition/{manager_arn}/{id}:
    put:
      operationId: UpdateConfigurationDefinition
      description: Updates a Quick Setup configuration definition.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UpdateConfigurationDefinitionInputIdString"
          description: The ID of the configuration definition you want to update.
        - name: manager_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UpdateConfigurationDefinitionInputManagerArnString"
          description: The ARN of the configuration manager associated with the definition to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LocalDeploymentAdministrationRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                LocalDeploymentExecutionRoleName:
                  $ref: "#/components/schemas/UpdateConfigurationDefinitionInputLocalDeploymentExecutionRoleNameString"
                Parameters:
                  $ref: "#/components/schemas/ConfigurationParametersMap"
                TypeVersion:
                  $ref: "#/components/schemas/UpdateConfigurationDefinitionInputTypeVersionString"
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ConfigurationDefinitionsInputList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationDefinitionInput"
    ConfigurationDefinitionInput:
      description: Defines the preferences and options for a configuration definition.
      type: object
      properties:
        LocalDeploymentAdministrationRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The ARN of the IAM role used to administrate local configuration deployments.
        LocalDeploymentExecutionRoleName:
          $ref: "#/components/schemas/ConfigurationDefinitionInputLocalDeploymentExecutionRoleNameString"
          description: The name of the IAM role used to deploy local configurations.
        Parameters:
          type: object
          properties: {}
          description: "The parameters for the configuration definition type. Parameters for configuration definitions vary based the configuration type. The following tables outline the parameters for each configuration type. OpsCenter (Type: Amazon Web ServicesQuickSetupType-SSMOpsCenter) DelegatedAccountId Description: (Required) The ID of the delegated administrator account. TargetOrganizationalUnits Description: (Required) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Resource Scheduler (Type: Amazon Web ServicesQuickSetupType-Scheduler) TargetTagKey Description: (Required) The tag key assigned to the instances you want to target. TargetTagValue Description: (Required) The value of the tag key assigned to the instances you want to target. ICalendarString Description: (Required) An iCalendar formatted string containing the schedule you want Change Manager to use. TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Default Host Management Configuration (Type: Amazon Web ServicesQuickSetupType-DHMC) UpdateSSMAgent Description: (Optional) A boolean value that determines whether the SSM Agent is updated on the target instances every 2 weeks. The default value is \"true\". TargetOrganizationalUnits Description: (Required) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Resource Explorer (Type: Amazon Web ServicesQuickSetupType-ResourceExplorer) SelectedAggregatorRegion Description: (Required) The Amazon Web Services Region where you want to create the aggregator index. ReplaceExistingAggregator Description: (Required) A boolean value that determines whether to demote an existing aggregator if it is in a Region that differs from the value you specify for the SelectedAggregatorRegion. TargetOrganizationalUnits Description: (Required) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Change Manager (Type: Amazon Web ServicesQuickSetupType-SSMChangeMgr) DelegatedAccountId Description: (Required) The ID of the delegated administrator account. JobFunction Description: (Required) The name for the Change Manager job function. PermissionType Description: (Optional) Specifies whether you want to use default administrator permissions for the job function role, or provide a custom IAM policy. The valid values are CustomPermissions and AdminPermissions. The default value for the parameter is CustomerPermissions. CustomPermissions Description: (Optional) A JSON string containing the IAM policy you want your job function to use. You must provide a value for this parameter if you specify CustomPermissions for the PermissionType parameter. TargetOrganizationalUnits Description: (Required) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. DevOps Guru (Type: Amazon Web ServicesQuickSetupType-DevOpsGuru) AnalyseAllResources Description: (Optional) A boolean value that determines whether DevOps Guru analyzes all CloudFormation stacks in the account. The default value is \"false\". EnableSnsNotifications Description: (Optional) A boolean value that determines whether DevOps Guru sends notifications when an insight is created. The default value is \"true\". EnableSsmOpsItems Description: (Optional) A boolean value that determines whether DevOps Guru creates an OpsCenter OpsItem when an insight is created. The default value is \"true\". EnableDriftRemediation Description: (Optional) A boolean value that determines whether a drift remediation schedule is used. The default value is \"false\". RemediationSchedule Description: (Optional) A rate expression that defines the schedule for drift remediation. The valid values are rate(30 days), rate(14 days), rate(1 days), and none. The default value is \"none\". TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Conformance Packs (Type: Amazon Web ServicesQuickSetupType-CFGCPacks) DelegatedAccountId Description: (Optional) The ID of the delegated administrator account. This parameter is required for Organization deployments. RemediationSchedule Description: (Optional) A rate expression that defines the schedule for drift remediation. The valid values are rate(30 days), rate(14 days), rate(2 days), and none. The default value is \"none\". CPackNames Description: (Required) A comma separated list of Config conformance packs. TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) The ID of the root of your Organization. This configuration type doesn't currently support choosing specific OUs. The configuration will be deployed to all the OUs in the Organization. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Config Recording (Type: Amazon Web ServicesQuickSetupType-CFGRecording) RecordAllResources Description: (Optional) A boolean value that determines whether all supported resources are recorded. The default value is \"true\". ResourceTypesToRecord Description: (Optional) A comma separated list of resource types you want to record. RecordGlobalResourceTypes Description: (Optional) A boolean value that determines whether global resources are recorded with all resource configurations. The default value is \"false\". GlobalResourceTypesRegion Description: (Optional) Determines the Amazon Web Services Region where global resources are recorded. UseCustomBucket Description: (Optional) A boolean value that determines whether a custom Amazon S3 bucket is used for delivery. The default value is \"false\". DeliveryBucketName Description: (Optional) The name of the Amazon S3 bucket you want Config to deliver configuration snapshots and configuration history files to. DeliveryBucketPrefix Description: (Optional) The key prefix you want to use in the custom Amazon S3 bucket. NotificationOptions Description: (Optional) Determines the notification configuration for the recorder. The valid values are NoStreaming, UseExistingTopic, and CreateTopic. The default value is NoStreaming. CustomDeliveryTopicAccountId Description: (Optional) The ID of the Amazon Web Services account where the Amazon SNS topic you want to use for notifications resides. You must specify a value for this parameter if you use the UseExistingTopic notification option. CustomDeliveryTopicName Description: (Optional) The name of the Amazon SNS topic you want to use for notifications. You must specify a value for this parameter if you use the UseExistingTopic notification option. RemediationSchedule Description: (Optional) A rate expression that defines the schedule for drift remediation. The valid values are rate(30 days), rate(7 days), rate(1 days), and none. The default value is \"none\". TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) The ID of the root of your Organization. This configuration type doesn't currently support choosing specific OUs. The configuration will be deployed to all the OUs in the Organization. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Host Management (Type: Amazon Web ServicesQuickSetupType-SSMHostMgmt) UpdateSSMAgent Description: (Optional) A boolean value that determines whether the SSM Agent is updated on the target instances every 2 weeks. The default value is \"true\". UpdateEc2LaunchAgent Description: (Optional) A boolean value that determines whether the EC2 Launch agent is updated on the target instances every month. The default value is \"false\". CollectInventory Description: (Optional) A boolean value that determines whether the EC2 Launch agent is updated on the target instances every month. The default value is \"true\". ScanInstances Description: (Optional) A boolean value that determines whether the target instances are scanned daily for available patches. The default value is \"true\". InstallCloudWatchAgent Description: (Optional) A boolean value that determines whether the Amazon CloudWatch agent is installed on the target instances. The default value is \"false\". UpdateCloudWatchAgent Description: (Optional) A boolean value that determines whether the Amazon CloudWatch agent is updated on the target instances every month. The default value is \"false\". IsPolicyAttachAllowed Description: (Optional) A boolean value that determines whether Quick Setup attaches policies to instances profiles already associated with the target instances. The default value is \"false\". TargetType Description: (Optional) Determines how instances are targeted for local account deployments. Don't specify a value for this parameter if you're deploying to OUs. The valid values are *, InstanceIds, ResourceGroups, and Tags. Use * to target all instances in the account. TargetInstances Description: (Optional) A comma separated list of instance IDs. You must provide a value for this parameter if you specify InstanceIds for the TargetType parameter. TargetTagKey Description: (Optional) The tag key assigned to the instances you want to target. You must provide a value for this parameter if you specify Tags for the TargetType parameter. TargetTagValue Description: (Optional) The value of the tag key assigned to the instances you want to target. You must provide a value for this parameter if you specify Tags for the TargetType parameter. ResourceGroupName Description: (Optional) The name of the resource group associated with the instances you want to target. You must provide a value for this parameter if you specify ResourceGroups for the TargetType parameter. TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Distributor (Type: Amazon Web ServicesQuickSetupType-Distributor) PackagesToInstall Description: (Required) A comma separated list of packages you want to install on the target instances. The valid values are AWSEFSTools, AWSCWAgent, and AWSEC2LaunchAgent. RemediationSchedule Description: (Optional) A rate expression that defines the schedule for drift remediation. The valid values are rate(30 days), rate(14 days), rate(2 days), and none. The default value is \"rate(30 days)\". IsPolicyAttachAllowed Description: (Optional) A boolean value that determines whether Quick Setup attaches policies to instances profiles already associated with the target instances. The default value is \"false\". TargetType Description: (Optional) Determines how instances are targeted for local account deployments. Don't specify a value for this parameter if you're deploying to OUs. The valid values are *, InstanceIds, ResourceGroups, and Tags. Use * to target all instances in the account. TargetInstances Description: (Optional) A comma separated list of instance IDs. You must provide a value for this parameter if you specify InstanceIds for the TargetType parameter. TargetTagKey Description: (Required) The tag key assigned to the instances you want to target. You must provide a value for this parameter if you specify Tags for the TargetType parameter. TargetTagValue Description: (Required) The value of the tag key assigned to the instances you want to target. You must provide a value for this parameter if you specify Tags for the TargetType parameter. ResourceGroupName Description: (Required) The name of the resource group associated with the instances you want to target. You must provide a value for this parameter if you specify ResourceGroups for the TargetType parameter. TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to. Patch Policy (Type: Amazon Web ServicesQuickSetupType-PatchPolicy) PatchPolicyName Description: (Required) A name for the patch policy. The value you provide is applied to target Amazon EC2 instances as a tag. SelectedPatchBaselines Description: (Required) An array of JSON objects containing the information for the patch baselines to include in your patch policy. PatchBaselineUseDefault Description: (Optional) A boolean value that determines whether the selected patch baselines are all Amazon Web Services provided. ConfigurationOptionsPatchOperation Description: (Optional) Determines whether target instances scan for available patches, or scan and install available patches. The valid values are Scan and ScanAndInstall. The default value for the parameter is Scan. ConfigurationOptionsScanValue Description: (Optional) A cron expression that is used as the schedule for when instances scan for available patches. ConfigurationOptionsInstallValue Description: (Optional) A cron expression that is used as the schedule for when instances install available patches. ConfigurationOptionsScanNextInterval Description: (Optional) A boolean value that determines whether instances should scan for available patches at the next cron interval. The default value is \"false\". ConfigurationOptionsInstallNextInterval Description: (Optional) A boolean value that determines whether instances should scan for available patches at the next cron interval. The default value is \"false\". RebootOption Description: (Optional) Determines whether instances are rebooted after patches are installed. Valid values are RebootIfNeeded and NoReboot. IsPolicyAttachAllowed Description: (Optional) A boolean value that determines whether Quick Setup attaches policies to instances profiles already associated with the target instances. The default value is \"false\". OutputLogEnableS3 Description: (Optional) A boolean value that determines whether command output logs are sent to Amazon S3. OutputS3Location Description: (Optional) A JSON string containing information about the Amazon S3 bucket where you want to store the output details of the request. OutputS3BucketRegion Description: (Optional) The Amazon Web Services Region where the Amazon S3 bucket you want Config to deliver command output to is located. OutputS3BucketName Description: (Optional) The name of the Amazon S3 bucket you want Config to deliver command output to. OutputS3KeyPrefix Description: (Optional) The key prefix you want to use in the custom Amazon S3 bucket. TargetType Description: (Optional) Determines how instances are targeted for local account deployments. Don't specify a value for this parameter if you're deploying to OUs. The valid values are *, InstanceIds, ResourceGroups, and Tags. Use * to target all instances in the account. TargetInstances Description: (Optional) A comma separated list of instance IDs. You must provide a value for this parameter if you specify InstanceIds for the TargetType parameter. TargetTagKey Description: (Required) The tag key assigned to the instances you want to target. You must provide a value for this parameter if you specify Tags for the TargetType parameter. TargetTagValue Description: (Required) The value of the tag key assigned to the instances you want to target. You must provide a value for this parameter if you specify Tags for the TargetType parameter. ResourceGroupName Description: (Required) The name of the resource group associated with the instances you want to target. You must provide a value for this parameter if you specify ResourceGroups for the TargetType parameter. TargetAccounts Description: (Optional) The ID of the Amazon Web Services account initiating the configuration deployment. You only need to provide a value for this parameter if you want to deploy the configuration locally. A value must be provided for either TargetAccounts or TargetOrganizationalUnits. TargetOrganizationalUnits Description: (Optional) A comma separated list of organizational units (OUs) you want to deploy the configuration to. TargetRegions Description: (Required) A comma separated list of Amazon Web Services Regions you want to deploy the configuration to."
        Type:
          $ref: "#/components/schemas/ConfigurationDefinitionInputTypeString"
          description: The type of the Quick Setup configuration.
        TypeVersion:
          $ref: "#/components/schemas/ConfigurationDefinitionInputTypeVersionString"
          description: The version of the Quick Setup type to use.
      required:
        - Parameters
        - Type
    IAMRoleArn:
      type: string
    ConfigurationDefinitionInputLocalDeploymentExecutionRoleNameString:
      type: string
      pattern: ^[\w+=,.@-]{1,64}$
    ConfigurationDefinitionInputTypeString:
      type: string
      pattern: ^[a-zA-Z0-9_\-.:/]{3,200}$
    ConfigurationDefinitionInputTypeVersionString:
      type: string
      minLength: 1
      maxLength: 128
    CreateConfigurationManagerInputDescriptionString:
      type: string
      pattern: ^.{0,512}$
    CreateConfigurationManagerInputNameString:
      type: string
      pattern: ^[ A-Za-z0-9._-]{0,120}$
    TagsMap:
      type: object
      properties: {}
    CreateConfigurationManagerOutput:
      type: object
      properties:
        ManagerArn:
          $ref: "#/components/schemas/String"
          description: The ARN for the newly created configuration manager.
      required:
        - ManagerArn
    String:
      type: string
    DeleteConfigurationManagerInputManagerArnString:
      type: string
      pattern: ^arn:aws:ssm-quicksetup:([^:]+):(\d{12}):configuration-manager/[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
    GetConfigurationInputConfigurationIdString:
      type: string
      pattern: ^[a-zA-Z0-9-_/:]{1,100}$
    GetConfigurationOutput:
      type: object
      properties:
        Account:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services account where the configuration was deployed.
        ConfigurationDefinitionId:
          $ref: "#/components/schemas/String"
          description: The ID of the configuration definition.
        CreatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The datetime stamp when the configuration manager was created.
        Id:
          $ref: "#/components/schemas/String"
          description: A service generated identifier for the configuration.
        LastModifiedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The datetime stamp when the configuration manager was last updated.
        ManagerArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the configuration manager.
        Parameters:
          type: object
          properties: {}
          description: The parameters for the configuration definition type.
        Region:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region where the configuration was deployed.
        StatusSummaries:
          $ref: "#/components/schemas/StatusSummariesList"
          description: A summary of the state of the configuration manager. This includes deployment statuses, association statuses, drift statuses, health checks, and more.
        Type:
          $ref: "#/components/schemas/String"
          description: The type of the Quick Setup configuration.
        TypeVersion:
          $ref: "#/components/schemas/String"
          description: The version of the Quick Setup type used.
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    StatusSummariesList:
      type: array
      items:
        $ref: "#/components/schemas/StatusSummary"
    StatusSummary:
      description: A summarized description of the status.
      type: object
      properties:
        LastUpdatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The datetime stamp when the status was last updated.
        Status:
          $ref: "#/components/schemas/Status"
          description: The current status.
        StatusDetails:
          type: object
          properties: {}
          description: Details about the status.
        StatusMessage:
          $ref: "#/components/schemas/String"
