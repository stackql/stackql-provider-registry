openapi: 3.0.0
info:
  version: "2023-08-22"
  title: Amazon WorkSpaces Thin Client
  description: Amazon WorkSpaces Thin Client
  x-serviceName: thinclient
  x-serviceAlias: workspaces_thin_client
  x-protocol: rest-json
  x-apiVersion: "2023-08-22"
  x-endpointPrefix: thinclient
servers:
  - url: https://thinclient.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for workspaces-thin-client
paths:
  /environments:
    post:
      operationId: CreateEnvironment
      description: Creates an environment for your thin client devices.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EnvironmentName"
                desktopArn:
                  $ref: "#/components/schemas/Arn"
                desktopEndpoint:
                  $ref: "#/components/schemas/DesktopEndpoint"
                softwareSetUpdateSchedule:
                  $ref: "#/components/schemas/SoftwareSetUpdateSchedule"
                maintenanceWindow:
                  $ref: "#/components/schemas/MaintenanceWindow"
                softwareSetUpdateMode:
                  $ref: "#/components/schemas/SoftwareSetUpdateMode"
                desiredSoftwareSetId:
                  $ref: "#/components/schemas/SoftwareSetId"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                deviceCreationTags:
                  $ref: "#/components/schemas/DeviceCreationTagsMap"
              required:
                - desktopArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvironmentResponse"
    get:
      operationId: ListEnvironments
      description: Returns a list of environments.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnvironmentsResponse"
  /devices/{id}:
    delete:
      operationId: DeleteDevice
      description: Deletes a thin client device.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: Specifies a unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDeviceResponse"
    get:
      operationId: GetDevice
      description: Returns information for a thin client device.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device for which to return information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDeviceResponse"
    patch:
      operationId: UpdateDevice
      description: Updates a thin client device.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DeviceName"
                desiredSoftwareSetId:
                  $ref: "#/components/schemas/SoftwareSetId"
                softwareSetUpdateSchedule:
                  $ref: "#/components/schemas/SoftwareSetUpdateSchedule"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDeviceResponse"
  /environments/{id}:
    delete:
      operationId: DeleteEnvironment
      description: Deletes an environment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: Specifies a unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEnvironmentResponse"
    get:
      operationId: GetEnvironment
      description: Returns information for an environment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment for which to return information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnvironmentResponse"
    patch:
      operationId: UpdateEnvironment
      description: Updates an environment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EnvironmentName"
                desktopArn:
                  $ref: "#/components/schemas/Arn"
                desktopEndpoint:
                  $ref: "#/components/schemas/DesktopEndpoint"
                softwareSetUpdateSchedule:
                  $ref: "#/components/schemas/SoftwareSetUpdateSchedule"
                maintenanceWindow:
                  $ref: "#/components/schemas/MaintenanceWindow"
                softwareSetUpdateMode:
                  $ref: "#/components/schemas/SoftwareSetUpdateMode"
                desiredSoftwareSetId:
                  $ref: "#/components/schemas/SoftwareSetIdOrEmptyString"
                deviceCreationTags:
                  $ref: "#/components/schemas/DeviceCreationTagsMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnvironmentResponse"
  /deregister-device/{id}:
    post:
      operationId: DeregisterDevice
      description: Deregisters a thin client device.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device to deregister.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                targetDeviceStatus:
                  $ref: "#/components/schemas/TargetDeviceStatus"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterDeviceResponse"
  /softwaresets/{id}:
    get:
      operationId: GetSoftwareSet
      description: Returns information for a software set.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set for which to return information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSoftwareSetResponse"
    patch:
      operationId: UpdateSoftwareSet
      description: Updates a software set.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                validationStatus:
                  $ref: "#/components/schemas/SoftwareSetValidationStatus"
              required:
                - validationStatus
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSoftwareSetResponse"
  /devices:
    get:
      operationId: ListDevices
      description: Returns a list of thin client devices.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDevicesResponse"
  /softwaresets:
    get:
      operationId: ListSoftwareSets
      description: Returns a list of software sets.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSoftwareSetsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource for which you want to retrieve tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag or tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that you want to untag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The keys of the key-value pairs for the tag or tags you want to remove from the specified resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EnvironmentName:
      type: string
      minLength: 0
      maxLength: 64
      pattern: $|^[0-9\p{IsAlphabetic}+:,.@'" -][0-9\p{IsAlphabetic}+=:,.@'" -]*
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=\/,.@-]+:[a-zA-Z0-9\-]+:[a-zA-Z0-9\-]*:[0-9]{0,12}:[a-zA-Z0-9\-\/\._]+
    DesktopEndpoint:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: (https:\/\/)[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,32}(:[0-9]{1,5})?(\/.*)?
    SoftwareSetUpdateSchedule:
      type: string
      enum:
        - USE_MAINTENANCE_WINDOW
        - APPLY_IMMEDIATELY
    MaintenanceWindow:
      description: Describes the maintenance window for a thin client device.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/MaintenanceWindowType"
          description: An option to select the default or custom maintenance window.
        startTimeHour:
          $ref: "#/components/schemas/Hour"
          description: The hour for the maintenance window start (00-23).
        startTimeMinute:
          $ref: "#/components/schemas/Minute"
          description: The minutes past the hour for the maintenance window start (00-59).
        endTimeHour:
          $ref: "#/components/schemas/Hour"
          description: The hour for the maintenance window end (00-23).
        endTimeMinute:
          $ref: "#/components/schemas/Minute"
          description: The minutes for the maintenance window end (00-59).
        daysOfTheWeek:
          $ref: "#/components/schemas/DayOfWeekList"
          description: The days of the week during which the maintenance window is open.
        applyTimeOf:
          $ref: "#/components/schemas/ApplyTimeOf"
          description: The option to set the maintenance window during the device local time or Universal Coordinated Time (UTC).
      required:
        - type_
    MaintenanceWindowType:
      type: string
      enum:
        - SYSTEM
        - CUSTOM
    Hour:
      type: integer
      minimum: 0
      maximum: 23
    Minute:
      type: integer
      minimum: 0
      maximum: 59
    DayOfWeekList:
      type: array
      items:
        $ref: "#/components/schemas/DayOfWeek"
    DayOfWeek:
      type: string
      enum:
        - MONDAY
        - TUESDAY
        - WEDNESDAY
        - THURSDAY
        - FRIDAY
        - SATURDAY
        - SUNDAY
    ApplyTimeOf:
      type: string
      enum:
        - UTC
        - DEVICE
    SoftwareSetUpdateMode:
      type: string
      enum:
        - USE_LATEST
        - USE_DESIRED
    SoftwareSetId:
      type: string
      pattern: "[0-9]{1,9}"
    KmsKeyArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=\/,.@-]+:kms:[a-zA-Z0-9\-]*:[0-9]{0,12}:key\/[a-zA-Z0-9-]+
    ClientToken:
      type: string
      minLength: 1
      maxLength: 512
    TagsMap:
      type: object
      properties: {}
    DeviceCreationTagsMap:
      type: object
      properties: {}
    CreateEnvironmentResponse:
      type: object
      properties:
        environment:
          $ref: "#/components/schemas/EnvironmentSummary"
          description: Describes an environment.
    EnvironmentSummary:
      description: Describes an environment.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment.
        name:
          $ref: "#/components/schemas/EnvironmentName"
          description: The name of the environment.
        desktopArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the desktop to stream from Amazon WorkSpaces, WorkSpaces Secure Browser, or AppStream 2.0.
        desktopEndpoint:
          $ref: "#/components/schemas/DesktopEndpoint"
          description: The URL for the identity provider login (only for environments that use AppStream 2.0).
        desktopType:
          $ref: "#/components/schemas/DesktopType"
          description: The type of streaming desktop for the environment.
        activationCode:
          $ref: "#/components/schemas/ActivationCode"
          description: The activation code to register a device to the environment.
        softwareSetUpdateSchedule:
          $ref: "#/components/schemas/SoftwareSetUpdateSchedule"
          description: An option to define if software updates should be applied within a maintenance window.
        maintenanceWindow:
          $ref: "#/components/schemas/MaintenanceWindow"
          description: A specification for a time window to apply software updates.
        softwareSetUpdateMode:
          $ref: "#/components/schemas/SoftwareSetUpdateMode"
          description: An option to define which software updates to apply.
        desiredSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set to apply.
        pendingSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set that is pending to be installed.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the environment was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the device was updated.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the environment.
    EnvironmentId:
      type: string
      pattern: "[a-z0-9]{9}"
    DesktopType:
      type: string
      enum:
        - workspaces
        - appstream
        - workspaces-web
    ActivationCode:
      type: string
      pattern: "[a-z]{2}[a-z0-9]{6}"
    Timestamp:
      type: string
      format: date-time
    DeviceId:
      type: string
      pattern: "[a-zA-Z0-9]{24}"
    DeleteDeviceResponse:
      type: object
    DeleteEnvironmentResponse:
      type: object
    TargetDeviceStatus:
      type: string
      enum:
        - DEREGISTERED
        - ARCHIVED
    DeregisterDeviceResponse:
      type: object
    GetDeviceResponse:
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
          description: Describes an device.
    Device:
      description: Describes a thin client device.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/DeviceId"
          description: The ID of the device.
        serialNumber:
          $ref: "#/components/schemas/String"
          description: The hardware serial number of the device.
        name:
          $ref: "#/components/schemas/DeviceName"
          description: The name of the device.
        model:
          $ref: "#/components/schemas/String"
          description: The model number of the device.
        environmentId:
          $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment the device is associated with.
        status:
          $ref: "#/components/schemas/DeviceStatus"
          description: The status of the device.
        currentSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set currently installed on the device.
        currentSoftwareSetVersion:
          $ref: "#/components/schemas/String"
          description: The version of the software set currently installed on the device.
        desiredSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set which the device has been set to.
        pendingSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set that is pending to be installed on the device.
        pendingSoftwareSetVersion:
          $ref: "#/components/schemas/String"
          description: The version of the software set that is pending to be installed on the device.
        softwareSetUpdateSchedule:
          $ref: "#/components/schemas/SoftwareSetUpdateSchedule"
          description: An option to define if software updates should be applied within a maintenance window.
        softwareSetComplianceStatus:
          $ref: "#/components/schemas/DeviceSoftwareSetComplianceStatus"
          description: Describes if the software currently installed on the device is a supported version.
        softwareSetUpdateStatus:
          $ref: "#/components/schemas/SoftwareSetUpdateStatus"
          description: Describes if the device has a supported version of software installed.
        lastConnectedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the most recent session on the device.
        lastPostureAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the most recent check-in of the device.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the device was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the device was updated.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the device.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the Key Management Service key used to encrypt the device.
        lastUserId:
          $ref: "#/components/schemas/UserId"
          description: The user ID of the most recent session on the device.
    String:
      type: string
    DeviceName:
      type: string
      minLength: 0
      maxLength: 64
      pattern: $|^[0-9\p{IsAlphabetic}+:,.@'" -]*
    DeviceStatus:
      type: string
      enum:
        - REGISTERED
        - DEREGISTERING
        - DEREGISTERED
        - ARCHIVED
    DeviceSoftwareSetComplianceStatus:
      type: string
      enum:
        - NONE
        - COMPLIANT
        - NOT_COMPLIANT
    SoftwareSetUpdateStatus:
      type: string
      enum:
        - AVAILABLE
        - IN_PROGRESS
        - UP_TO_DATE
    UserId:
      type: string
    GetEnvironmentResponse:
      type: object
      properties:
        environment:
          $ref: "#/components/schemas/Environment"
          description: Describes an environment.
    Environment:
      description: Describes an environment.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment.
        name:
          $ref: "#/components/schemas/EnvironmentName"
          description: The name of the environment.
        desktopArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the desktop to stream from Amazon WorkSpaces, WorkSpaces Secure Browser, or AppStream 2.0.
        desktopEndpoint:
          $ref: "#/components/schemas/DesktopEndpoint"
          description: The URL for the identity provider login (only for environments that use AppStream 2.0).
        desktopType:
          $ref: "#/components/schemas/DesktopType"
          description: The type of streaming desktop for the environment.
        activationCode:
          $ref: "#/components/schemas/ActivationCode"
          description: The activation code to register a device to the environment.
        registeredDevicesCount:
          $ref: "#/components/schemas/Integer"
          description: The number of devices registered to the environment.
        softwareSetUpdateSchedule:
          $ref: "#/components/schemas/SoftwareSetUpdateSchedule"
          description: An option to define if software updates should be applied within a maintenance window.
        maintenanceWindow:
          $ref: "#/components/schemas/MaintenanceWindow"
          description: A specification for a time window to apply software updates.
        softwareSetUpdateMode:
          $ref: "#/components/schemas/SoftwareSetUpdateMode"
          description: An option to define which software updates to apply.
        desiredSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set to apply.
        pendingSoftwareSetId:
          $ref: "#/components/schemas/SoftwareSetId"
          description: The ID of the software set that is pending to be installed.
        pendingSoftwareSetVersion:
          $ref: "#/components/schemas/String"
          description: The version of the software set that is pending to be installed.
        softwareSetComplianceStatus:
          $ref: "#/components/schemas/EnvironmentSoftwareSetComplianceStatus"
          description: Describes if the software currently installed on all devices in the environment is a supported version.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the environment was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the device was updated.
