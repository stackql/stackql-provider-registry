        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OtaTaskId"
          description: The over-the-air (OTA) task id.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OtaNextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOtaTaskExecutionsResponse"
  /schema-versions/{type}:
    get:
      operationId: ListSchemaVersions
      description: Lists schema versions with the provided information.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SchemaVersionType"
          description: Filter on the type of schema version.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: SchemaIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SchemaId"
          description: Filter on the id of the schema version.
        - name: NamespaceFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SchemaVersionNamespaceName"
          description: Filter on the name of the schema version.
        - name: VisibilityFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SchemaVersionVisibility"
          description: The visibility of the schema version.
        - name: SemanticVersionFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SchemaVersionVersion"
          description: The schema version. If this is left blank, it defaults to the latest version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemaVersionsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IoTManagedIntegrationsResourceARN"
          description: The Amazon Resource Name (ARN) of the resource for which to list tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds tags to a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IoTManagedIntegrationsResourceARN"
          description: The Amazon Resource Name (ARN) of the resource to which to add tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagsMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IoTManagedIntegrationsResourceARN"
          description: The Amazon Resource Name (ARN) of the resource from which to remove tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /managed-thing-associations/register:
    put:
      operationId: RegisterAccountAssociation
      description: Registers an account association with a managed thing, establishing a connection between a device and a third-party account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ManagedThingId:
                  $ref: "#/components/schemas/ManagedThingId"
                AccountAssociationId:
                  $ref: "#/components/schemas/AccountAssociationId"
                DeviceDiscoveryId:
                  $ref: "#/components/schemas/DeviceDiscoveryId"
              required:
                - ManagedThingId
                - AccountAssociationId
                - DeviceDiscoveryId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterAccountAssociationResponse"
  /connector-event/{connector_id}:
    post:
      operationId: SendConnectorEvent
      description: Relays third-party device events for a connector such as a new device or a device state change event.
      parameters:
        - name: connector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorId"
          description: The id of the connector between the third-party cloud provider and IoT managed integrations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UserId:
                  $ref: "#/components/schemas/ThirdPartyUserId"
                Operation:
                  $ref: "#/components/schemas/ConnectorEventOperation"
                OperationVersion:
                  $ref: "#/components/schemas/ConnectorEventOperationVersion"
                StatusCode:
                  $ref: "#/components/schemas/ConnectorEventStatusCode"
                Message:
                  $ref: "#/components/schemas/ConnectorEventMessage"
                DeviceDiscoveryId:
                  $ref: "#/components/schemas/DeviceDiscoveryId"
                ConnectorDeviceId:
                  $ref: "#/components/schemas/ConnectorDeviceId"
                TraceId:
                  $ref: "#/components/schemas/TraceId"
                Devices:
                  $ref: "#/components/schemas/Devices"
                MatterEndpoint:
                  $ref: "#/components/schemas/MatterEndpoint"
              required:
                - Operation
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendConnectorEventResponse"
  /managed-things-command/{managed_thing_id}:
    post:
      operationId: SendManagedThingCommand
      description: Send the command to the device represented by the managed thing.
      parameters:
        - name: managed_thing_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ManagedThingId"
          description: The id of the device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Endpoints:
                  $ref: "#/components/schemas/CommandEndpoints"
                ConnectorAssociationId:
                  $ref: "#/components/schemas/ConnectorAssociationId"
                AccountAssociationId:
                  $ref: "#/components/schemas/AccountAssociationId"
              required:
                - Endpoints
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendManagedThingCommandResponse"
  /account-associations/{account_association_id}/refresh:
    post:
      operationId: StartAccountAssociationRefresh
      description: Initiates a refresh of an existing account association to update its authorization and connection status.
      parameters:
        - name: account_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountAssociationId"
          description: The unique identifier of the account association to refresh.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAccountAssociationRefreshResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9=_-]+"
    ConnectorDestinationId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9-_]+"
    AccountAssociationName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    AccountAssociationDescription:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: "[A-Za-z0-9-_ ]+"
    TagsMap:
      type: object
      properties: {}
    GeneralAuthorizationName:
      description: The General Authorization reference by authorization material name.
      type: object
      properties:
        AuthMaterialName:
          $ref: "#/components/schemas/AuthMaterialName"
          description: The name of the authorization material.
    AuthMaterialName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9=_+/-]+"
    CreateAccountAssociationResponse:
      type: object
      properties:
        OAuthAuthorizationUrl:
          $ref: "#/components/schemas/OAuthAuthorizationUrlOutput"
          description: Third-party IoT platform OAuth authorization server URL backed with all the required parameters to perform end-user authentication. This field will be empty when using General Authorization flows that do not require OAuth.
        AccountAssociationId:
          $ref: "#/components/schemas/AccountAssociationId"
          description: The identifier for the account association request.
        AssociationState:
          $ref: "#/components/schemas/AssociationState"
          description: The current state of the account association request.
        Arn:
          $ref: "#/components/schemas/AccountAssociationArn"
          description: The Amazon Resource Name (ARN) of the account association.
      required:
        - OAuthAuthorizationUrl
        - AccountAssociationId
        - AssociationState
    OAuthAuthorizationUrlOutput:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: $|^(https):\/\/.*
    AccountAssociationId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[0-9a-zA-Z]+"
    AssociationState:
      type: string
      enum:
        - ASSOCIATION_IN_PROGRESS
        - ASSOCIATION_FAILED
        - ASSOCIATION_SUCCEEDED
        - ASSOCIATION_DELETING
        - REFRESH_TOKEN_EXPIRED
    AccountAssociationArn:
      type: string
      minLength: 67
      maxLength: 1011
      pattern: arn:aws:iotmanagedintegrations:[0-9a-zA-Z-]+:[0-9]+:account-association/[0-9a-zA-Z]+
    DisplayName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    EndpointConfig:
      description: The configuration details for an endpoint, which defines how to connect to and communicate with external services.
      type: object
      properties:
        lambda:
          $ref: "#/components/schemas/LambdaConfig"
          description: The Lambda function configuration for the endpoint, used when the endpoint communicates through an AWS Lambda function.
    LambdaConfig:
      description: Configuration details for an AWS Lambda function used as an endpoint for a cloud connector.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function used as an endpoint.
      required:
        - arn
    LambdaArn:
      type: string
      pattern: (arn:aws:lambda:[0-9a-zA-Z-]+:[0-9]+:function:)?([a-zA-Z0-9-_]+(:(\$LATEST|[a-zA-Z0-9-_]+))?)
    CloudConnectorDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[0-9A-Za-z_\\- ]+"
    EndpointType:
      type: string
      enum:
        - LAMBDA
    CreateCloudConnectorResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/CloudConnectorId"
          description: The unique identifier assigned to the newly created cloud connector.
    CloudConnectorId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9-_]+"
    ConnectorDestinationName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    ConnectorDestinationDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[0-9A-Za-z_\\- ]+"
    AuthType:
      type: string
      enum:
        - OAUTH
    AuthConfig:
      description: The authentication configuration details for a connector destination, including OAuth settings and other authentication parameters.
      type: object
      properties:
        oAuth:
          $ref: "#/components/schemas/OAuthConfig"
          description: The OAuth configuration settings used for authentication with the third-party service.
        GeneralAuthorization:
          $ref: "#/components/schemas/AuthMaterials"
          description: The authorization materials for General Authorization.
    OAuthConfig:
      description: Configuration details for OAuth authentication with a third-party service.
      type: object
      properties:
        authUrl:
          $ref: "#/components/schemas/AuthUrl"
          description: The authorization URL for the OAuth service, where users are directed to authenticate and authorize access.
        tokenUrl:
          $ref: "#/components/schemas/TokenUrl"
          description: The token URL for the OAuth service, where authorization codes are exchanged for access tokens.
        scope:
          $ref: "#/components/schemas/String"
          description: The OAuth scopes requested during authorization, which define the permissions granted to the application.
        tokenEndpointAuthenticationScheme:
          $ref: "#/components/schemas/TokenEndpointAuthenticationScheme"
          description: The authentication scheme used when requesting tokens from the token endpoint.
        oAuthCompleteRedirectUrl:
          $ref: "#/components/schemas/String"
          description: The URL where users are redirected after completing the OAuth authorization process.
        proactiveRefreshTokenRenewal:
          $ref: "#/components/schemas/ProactiveRefreshTokenRenewal"
          description: Configuration for proactively refreshing OAuth tokens before they expire.
      required:
        - authUrl
        - tokenUrl
        - tokenEndpointAuthenticationScheme
    AuthUrl:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}([-a-zA-Z0-9()@:%_\+.~#?&\/=]*)
    TokenUrl:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}([-a-zA-Z0-9()@:%_\+.~#?&\/=]*)
    String:
      type: string
    TokenEndpointAuthenticationScheme:
      type: string
      enum:
        - HTTP_BASIC
        - REQUEST_BODY_CREDENTIALS
    ProactiveRefreshTokenRenewal:
      description: Configuration settings for proactively refreshing OAuth tokens before they expire.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether proactive refresh token renewal is enabled.
        DaysBeforeRenewal:
          $ref: "#/components/schemas/ProactiveRefreshTokenRenewalDaysBeforeRenewalInteger"
          description: The days before token expiration when the system should attempt to renew the token, specified in days.
    Boolean:
      type: boolean
    ProactiveRefreshTokenRenewalDaysBeforeRenewalInteger:
      type: integer
      minimum: 30
    AuthMaterials:
      type: array
      items:
        $ref: "#/components/schemas/AuthMaterial"
    AuthMaterial:
      description: The authorization material containing the Secrets Manager arn and version.
      type: object
      properties:
        SecretsManager:
          $ref: "#/components/schemas/SecretsManager"
        AuthMaterialName:
          $ref: "#/components/schemas/AuthMaterialName"
          description: The name of the authorization material.
      required:
        - SecretsManager
        - AuthMaterialName
    SecretsManager:
      description: Configuration for AWS Secrets Manager, used to securely store and manage sensitive information for connector destinations.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/SecretsManagerArn"
          description: The Amazon Resource Name (ARN) of the AWS Secrets Manager secret.
        versionId:
          $ref: "#/components/schemas/SecretsManagerVersionId"
          description: The version ID of the AWS Secrets Manager secret.
      required:
        - arn
        - versionId
    SecretsManagerArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws:secretsmanager:[0-9a-zA-Z-]{1,32}:\d{12}:secret:[A-Za-z0-9/_+=.@-]{8,520}
    SecretsManagerVersionId:
      type: string
      minLength: 32
      maxLength: 64
      pattern: "[a-zA-Z0-9-_]+"
    CreateConnectorDestinationResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ConnectorDestinationId"
          description: The identifier of the C2C connector destination creation request.
    CredentialLockerName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    CreateCredentialLockerResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/CredentialLockerId"
          description: The identifier of the credential locker creation request.
        Arn:
          $ref: "#/components/schemas/CredentialLockerArn"
          description: The Amazon Resource Name (ARN) of the credential locker.
        CreatedAt:
          $ref: "#/components/schemas/CredentialLockerCreatedAt"
          description: The timestamp value of when the credential locker request occurred.
    CredentialLockerId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9]*"
    CredentialLockerArn:
      type: string
      minLength: 32
      maxLength: 1011
      pattern: arn:aws:iotmanagedintegrations:[0-9a-zA-Z-]+:[0-9]+:credential-locker/[0-9a-zA-Z]+
    CredentialLockerCreatedAt:
      type: string
      format: date-time
    DeliveryDestinationArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws:[0-9a-zA-Z]+:[0-9a-zA-Z-]+:[0-9]+:[0-9a-zA-Z]+/[0-9a-zA-Z._-]+
    DeliveryDestinationType:
      type: string
      enum:
        - KINESIS
    DestinationName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{N} ._-]+"
    DeliveryDestinationRoleArn:
      type: string
    DestinationDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[0-9A-Za-z_\\- ]+"
    CreateDestinationResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DestinationName"
          description: The name of the customer-managed destination.
    SmartHomeResourceType:
      type: string
      pattern: "[*]$|^(managed-thing|credential-locker|provisioning-profile|ota-task|account-association)"
    SmartHomeResourceId:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9+*]*"
    LogLevel:
      type: string
      enum:
        - DEBUG
        - ERROR
        - INFO
        - WARN
    CreateEventLogConfigurationResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/LogConfigurationId"
          description: The identifier of the event log configuration request.
    LogConfigurationId:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[A-Za-z0-9]+"
    Role:
      type: string
      enum:
        - CONTROLLER
        - DEVICE
    Owner:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_.,@-]+"
    AuthMaterialString:
      type: string
      minLength: 1
      maxLength: 512
      pattern: '[0-9A-Za-z!#$%&()*\+\-;<=>?@^_`{|}~\/: {},\\"]+'
    AuthMaterialType:
      type: string
      enum:
        - CUSTOM_PROTOCOL_QR_BAR_CODE
        - WIFI_SETUP_QR_BAR_CODE
        - ZWAVE_QR_BAR_CODE
        - ZIGBEE_QR_BAR_CODE
        - DISCOVERED_DEVICE
        - PRE_ONBOARDED_CLOUD
    WiFiSimpleSetupConfiguration:
      description: The Wi-Fi Simple Setup configuration for the managed thing, which defines provisioning capabilities and timeout settings.
      type: object
      properties:
        EnableAsProvisioner:
          $ref: "#/components/schemas/EnableAsProvisioner"
          description: Indicates whether the device can act as a provisioner in Wi-Fi Simple Setup, allowing it to configure other devices.
        EnableAsProvisionee:
          $ref: "#/components/schemas/EnableAsProvisionee"
          description: Indicates whether the device can act as a provisionee in Wi-Fi Simple Setup, allowing it to be configured by other devices.
        TimeoutInMinutes:
          $ref: "#/components/schemas/TimeoutInMinutes"
          description: The timeout duration in minutes for Wi-Fi Simple Setup. Valid range is 5 to 15 minutes.
    EnableAsProvisioner:
      type: boolean
    EnableAsProvisionee:
      type: boolean
    TimeoutInMinutes:
      type: integer
      minimum: 5
      maximum: 15
    SerialNumber:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    Brand:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    Model:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9-_ ]+"
    Name:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{N} ._-]+"
    CapabilityReport:
      description: Report of all capabilities supported by the device.
      type: object
      properties:
        version:
          $ref: "#/components/schemas/CapabilityReportVersion"
          description: The version of the capability report.
        nodeId:
          $ref: "#/components/schemas/NodeId"
          description: The numeric identifier of the node.
        endpoints:
          $ref: "#/components/schemas/CapabilityReportEndpoints"
          description: The endpoints used in the capability report.
      required:
        - version
        - endpoints
    CapabilityReportVersion:
      type: string
      minLength: 1
      maxLength: 10
      pattern: 1\.0\.0
    NodeId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9=_.,@\\+\\-/]+"
    CapabilityReportEndpoints:
      type: array
      items:
        $ref: "#/components/schemas/CapabilityReportEndpoint"
    CapabilityReportEndpoint:
      description: The endpoint used in the capability report.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/EndpointId"
          description: The id of the endpoint used in the capability report.
        deviceTypes:
          $ref: "#/components/schemas/DeviceTypes"
          description: The type of device.
        capabilities:
          $ref: "#/components/schemas/CapabilityReportCapabilities"
          description: The capabilities used in the capability report.
      required:
        - id
        - deviceTypes
        - capabilities
    EndpointId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[0-9a-zA-Z]+"
    DeviceTypes:
      type: array
      items:
        $ref: "#/components/schemas/DeviceType"
    DeviceType:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[a-zA-Z0-9=_. ,@\\+\\-/]+"
    CapabilityReportCapabilities:
      type: array
      items:
        $ref: "#/components/schemas/CapabilityReportCapability"
    CapabilityReportCapability:
      description: The capability used in capability report.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/SchemaVersionedId"
          description: The id of the schema version.
        name:
          $ref: "#/components/schemas/CapabilityName"
          description: The name of the capability.
        version:
          $ref: "#/components/schemas/CapabilityVersion"
          description: The version of the capability.
        properties_:
          $ref: "#/components/schemas/CapabilityReportProperties"
          description: The capability properties used in the capability report.
        actions:
          $ref: "#/components/schemas/CapabilityReportActions"
          description: The capability actions used in the capability report.
        events:
          $ref: "#/components/schemas/CapabilityReportEvents"
          description: The capability events used in the capability report.
      required:
        - id
        - name
        - version
        - properties_
        - actions
        - events
    SchemaVersionedId:
      type: string
      minLength: 7
      maxLength: 128
      pattern: "[a-zA-Z0-9.]+@(\\d+\\.\\d+(\\.\\d+)?|\\$latest)"
    CapabilityName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[/a-zA-Z0-9\\._ -]+"
    CapabilityVersion:
      type: string
      minLength: 1
      maxLength: 64
      pattern: (0|[1-9][0-9]*)
    CapabilityReportProperties:
      type: array
      items:
        $ref: "#/components/schemas/PropertyName"
    PropertyName:
      type: string
      minLength: 1
      maxLength: 128
