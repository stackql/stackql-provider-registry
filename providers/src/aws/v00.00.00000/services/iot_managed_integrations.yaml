openapi: 3.0.0
info:
  version: "2025-03-03"
  title: Managed integrations for AWS IoT Device Management
  description: Managed integrations for AWS IoT Device Management
  x-serviceName: iotmanagedintegrations
  x-serviceAlias: iot_managed_integrations
  x-protocol: rest-json
  x-apiVersion: "2025-03-03"
  x-endpointPrefix: api.iotmanagedintegrations
servers:
  - url: https://api.iotmanagedintegrations.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iot-managed-integrations
paths:
  /account-associations:
    post:
      operationId: CreateAccountAssociation
      description: Creates a new account association via the destination id.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                ConnectorDestinationId:
                  $ref: "#/components/schemas/ConnectorDestinationId"
                Name:
                  $ref: "#/components/schemas/AccountAssociationName"
                Description:
                  $ref: "#/components/schemas/AccountAssociationDescription"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
                GeneralAuthorization:
                  $ref: "#/components/schemas/GeneralAuthorizationName"
              required:
                - ConnectorDestinationId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountAssociationResponse"
    get:
      operationId: ListAccountAssociations
      description: Lists all account associations, with optional filtering by connector destination ID.
      parameters:
        - name: ConnectorDestinationId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectorDestinationId"
          description: The identifier of the connector destination to filter account associations by.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of account associations to return in a single response.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token used for pagination of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountAssociationsResponse"
  /cloud-connectors:
    post:
      operationId: CreateCloudConnector
      description: Creates a C2C (cloud-to-cloud) connector.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DisplayName"
                EndpointConfig:
                  $ref: "#/components/schemas/EndpointConfig"
                Description:
                  $ref: "#/components/schemas/CloudConnectorDescription"
                EndpointType:
                  $ref: "#/components/schemas/EndpointType"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - EndpointConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudConnectorResponse"
    get:
      operationId: ListCloudConnectors
      description: Returns a list of connectors filtered by its Lambda Amazon Resource Name (ARN) and type.
      parameters:
        - name: Type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CloudConnectorType"
          description: The type of cloud connectors to filter by when listing available connectors.
        - name: LambdaArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function to filter cloud connectors by.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCloudConnectorsResponse"
  /connector-destinations:
    post:
      operationId: CreateConnectorDestination
      description: Create a connector destination for connecting a cloud-to-cloud (C2C) connector to the customer's Amazon Web Services account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ConnectorDestinationName"
                Description:
                  $ref: "#/components/schemas/ConnectorDestinationDescription"
                CloudConnectorId:
                  $ref: "#/components/schemas/CloudConnectorId"
                AuthType:
                  $ref: "#/components/schemas/AuthType"
                AuthConfig:
                  $ref: "#/components/schemas/AuthConfig"
                SecretsManager:
                  $ref: "#/components/schemas/SecretsManager"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - CloudConnectorId
                - AuthConfig
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorDestinationResponse"
    get:
      operationId: ListConnectorDestinations
      description: Lists all connector destinations, with optional filtering by cloud connector ID.
      parameters:
        - name: CloudConnectorId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CloudConnectorId"
          description: The identifier of the cloud connector to filter connector destinations by.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token used for pagination of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of connector destinations to return in a single response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorDestinationsResponse"
  /credential-lockers:
    post:
      operationId: CreateCredentialLocker
      description: Create a credential locker. This operation will not trigger the creation of all the manufacturing resources.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CredentialLockerName"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCredentialLockerResponse"
    get:
      operationId: ListCredentialLockers
      description: List information on an existing credential locker.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCredentialLockersResponse"
  /destinations:
    post:
      operationId: CreateDestination
      description: Create a notification destination such as Kinesis Data Streams that receive events and notifications from Managed integrations. Managed integrations uses the destination to determine where to deliver notifications.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeliveryDestinationArn:
                  $ref: "#/components/schemas/DeliveryDestinationArn"
                DeliveryDestinationType:
                  $ref: "#/components/schemas/DeliveryDestinationType"
                Name:
                  $ref: "#/components/schemas/DestinationName"
                RoleArn:
                  $ref: "#/components/schemas/DeliveryDestinationRoleArn"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Description:
                  $ref: "#/components/schemas/DestinationDescription"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - DeliveryDestinationArn
                - DeliveryDestinationType
                - RoleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDestinationResponse"
    get:
      operationId: ListDestinations
      description: List all notification destinations.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDestinationsResponse"
  /event-log-configurations:
    post:
      operationId: CreateEventLogConfiguration
      description: Set the event log configuration for the account, resource type, or specific resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceType:
                  $ref: "#/components/schemas/SmartHomeResourceType"
                ResourceId:
                  $ref: "#/components/schemas/SmartHomeResourceId"
                EventLogLevel:
                  $ref: "#/components/schemas/LogLevel"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - ResourceType
                - EventLogLevel
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventLogConfigurationResponse"
    get:
      operationId: ListEventLogConfigurations
      description: List all event log configurations for an account.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventLogConfigurationsResponse"
  /managed-things:
    post:
      operationId: CreateManagedThing
      description: Creates a managed thing. A managed thing contains the device identifier, protocol supported, and capabilities of the device in a data model format defined by Managed integrations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Role:
                  $ref: "#/components/schemas/Role"
                Owner:
                  $ref: "#/components/schemas/Owner"
                CredentialLockerId:
                  $ref: "#/components/schemas/CredentialLockerId"
                AuthenticationMaterial:
                  $ref: "#/components/schemas/AuthMaterialString"
                AuthenticationMaterialType:
                  $ref: "#/components/schemas/AuthMaterialType"
                WiFiSimpleSetupConfiguration:
                  $ref: "#/components/schemas/WiFiSimpleSetupConfiguration"
                SerialNumber:
                  $ref: "#/components/schemas/SerialNumber"
                Brand:
                  $ref: "#/components/schemas/Brand"
                Model:
                  $ref: "#/components/schemas/Model"
                Name:
                  $ref: "#/components/schemas/Name"
                CapabilityReport:
                  $ref: "#/components/schemas/CapabilityReport"
                CapabilitySchemas:
                  $ref: "#/components/schemas/CapabilitySchemas"
                Capabilities:
                  $ref: "#/components/schemas/Capabilities"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Classification:
                  $ref: "#/components/schemas/Classification"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
                MetaData:
                  $ref: "#/components/schemas/MetaData"
              required:
                - AuthenticationMaterial
                - AuthenticationMaterialType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateManagedThingResponse"
    get:
      operationId: ListManagedThings
      description: Listing all managed things with provision for filters.
      parameters:
        - name: OwnerFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Owner"
          description: Filter on device owners when listing managed things.
        - name: CredentialLockerFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CredentialLockerId"
          description: Filter on a credential locker for a managed thing.
        - name: RoleFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Role"
          description: Filter on the type of device used. This will be the Amazon Web Services hub controller, cloud device, or IoT device.
        - name: ParentControllerIdentifierFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ParentControllerId"
          description: Filter on a parent controller id for a managed thing.
        - name: ConnectorPolicyIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectorPolicyId"
          description: Filter on a connector policy id for a managed thing.
        - name: ConnectorDestinationIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectorDestinationId"
          description: Filter managed things by the connector destination ID they are associated with.
        - name: ConnectorDeviceIdFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectorDeviceId"
          description: Filter managed things by the connector device ID they are associated with. When specified, only managed things with this connector device ID will be returned.
        - name: SerialNumberFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SerialNumber"
          description: Filter on the serial number of the device.
        - name: ProvisioningStatusFilter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProvisioningStatus"
          description: Filter on the status of the device. For more information, see Device Provisioning.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedThingsResponse"
  /notification-configurations:
    post:
      operationId: CreateNotificationConfiguration
      description: Creates a notification configuration. A configuration is a connection between an event type and a destination that you have already created.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EventType:
                  $ref: "#/components/schemas/EventType"
                DestinationName:
                  $ref: "#/components/schemas/DestinationName"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - EventType
                - DestinationName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNotificationConfigurationResponse"
    get:
      operationId: ListNotificationConfigurations
      description: List all notification configurations.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationConfigurationsResponse"
  /ota-tasks:
    post:
      operationId: CreateOtaTask
      description: Create an over-the-air (OTA) task to target a device.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/OtaDescription"
                S3Url:
                  $ref: "#/components/schemas/S3Url"
                Protocol:
                  $ref: "#/components/schemas/OtaProtocol"
                Target:
                  $ref: "#/components/schemas/Target"
                TaskConfigurationId:
                  $ref: "#/components/schemas/OtaTaskConfigurationId"
                OtaMechanism:
                  $ref: "#/components/schemas/OtaMechanism"
                OtaType:
                  $ref: "#/components/schemas/OtaType"
                OtaTargetQueryString:
                  $ref: "#/components/schemas/OtaTargetQueryString"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                OtaSchedulingConfig:
                  $ref: "#/components/schemas/OtaTaskSchedulingConfig"
                OtaTaskExecutionRetryConfig:
                  $ref: "#/components/schemas/OtaTaskExecutionRetryConfig"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - S3Url
                - OtaType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOtaTaskResponse"
    get:
      operationId: ListOtaTasks
      description: List all of the over-the-air (OTA) tasks.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OtaNextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOtaTasksResponse"
  /ota-task-configurations:
    post:
      operationId: CreateOtaTaskConfiguration
      description: Create a configuraiton for the over-the-air (OTA) task.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/OtaDescription"
                Name:
                  $ref: "#/components/schemas/OtaTaskConfigurationName"
                PushConfig:
                  $ref: "#/components/schemas/PushConfig"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOtaTaskConfigurationResponse"
    get:
      operationId: ListOtaTaskConfigurations
      description: List all of the over-the-air (OTA) task configurations.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOtaTaskConfigurationsResponse"
  /provisioning-profiles:
    post:
      operationId: CreateProvisioningProfile
      description: Create a provisioning profile for executing device provisioning flows. The provisioning profile is a document that defines the set of resources and policies applied to a device during the provisioning process.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProvisioningType:
                  $ref: "#/components/schemas/ProvisioningType"
                CaCertificate:
                  $ref: "#/components/schemas/CaCertificate"
                ClaimCertificate:
                  $ref: "#/components/schemas/ClaimCertificate"
                Name:
                  $ref: "#/components/schemas/ProvisioningProfileName"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - ProvisioningType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProvisioningProfileResponse"
    get:
      operationId: ListProvisioningProfiles
      description: List the provisioning profiles within the Amazon Web Services account.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token that can be used to retrieve the next set of results.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at one time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProvisioningProfilesResponse"
  /account-associations/{account_association_id}:
    delete:
      operationId: DeleteAccountAssociation
      description: Remove a third-party account association for an end user. You must first call the DeregisterAccountAssociation to remove the connection between the managed thing and the third-party account before calling the DeleteAccountAssociation API.
      parameters:
        - name: account_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountAssociationId"
          description: The unique identifier of the account association to be deleted.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAccountAssociation
      description: Get an account association for an Amazon Web Services account linked to a customer-managed destination.
      parameters:
        - name: account_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountAssociationId"
          description: The unique identifier of the account association to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountAssociationResponse"
    put:
      operationId: UpdateAccountAssociation
      description: Updates the properties of an existing account association.
      parameters:
        - name: account_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountAssociationId"
          description: The unique identifier of the account association to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AccountAssociationName"
                Description:
                  $ref: "#/components/schemas/AccountAssociationDescription"
      responses:
        "204":
          description: Success
  /cloud-connectors/{identifier}:
    delete:
      operationId: DeleteCloudConnector
      description: Delete a cloud connector.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CloudConnectorId"
          description: The identifier of the cloud connector.
      responses:
        "200":
          description: Success
    get:
      operationId: GetCloudConnector
      description: Get configuration details for a cloud connector.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CloudConnectorId"
          description: The identifier of the C2C connector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCloudConnectorResponse"
    put:
      operationId: UpdateCloudConnector
      description: Update an existing cloud connector.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CloudConnectorId"
          description: The unique identifier of the cloud connector to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DisplayName"
                Description:
                  $ref: "#/components/schemas/CloudConnectorDescription"
      responses:
        "200":
          description: Success
  /connector-destinations/{identifier}:
    delete:
      operationId: DeleteConnectorDestination
      description: Delete a connector destination linked to a cloud-to-cloud (C2C) connector. Deletion can't be done if the account association has used this connector destination.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorDestinationId"
          description: The identifier of the connector destination.
      responses:
        "200":
          description: Success
    get:
      operationId: GetConnectorDestination
      description: Get connector destination details linked to a cloud-to-cloud (C2C) connector.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorDestinationId"
          description: The identifier of the C2C connector destination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectorDestinationResponse"
    put:
      operationId: UpdateConnectorDestination
      description: Updates the properties of an existing connector destination.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorDestinationId"
          description: The unique identifier of the connector destination to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ConnectorDestinationDescription"
                Name:
                  $ref: "#/components/schemas/ConnectorDestinationName"
