openapi: 3.0.0
info:
  version: "2017-05-31"
  title: AWS Migration Hub
  description: AWS Migration Hub
  x-serviceName: mgh
  x-serviceAlias: mgh
  x-protocol: json
  x-apiVersion: "2017-05-31"
  x-endpointPrefix: mgh
  x-targetPrefix: AWSMigrationHub
  x-jsonVersion: "1.1"
servers:
  - url: https://mgh.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mgh
paths:
  /AssociateCreatedArtifact:
    post:
      operationId: AssociateCreatedArtifact
      description: "Associates a created artifact of an AWS cloud resource, the target receiving the migration, with the migration task performed by a migration tool. This API has the following traits: Migration tools can call the AssociateCreatedArtifact operation to indicate which AWS artifact is associated with a migration task. The created artifact name must be provided in ARN (Amazon Resource Name) format which will contain information about type and region; for example: arn:aws:ec2:us-east-1:488216288981:image/ami-6d0ba87b. Examples of the AWS resource behind the created artifact are, AMI's, EC2 instance, or DMS endpoint, etc."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.AssociateCreatedArtifact
            default: AWSMigrationHub.AssociateCreatedArtifact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: Unique identifier that references the migration task. Do not store personal data in this field.
                CreatedArtifact:
                  $ref: "#/components/schemas/CreatedArtifact"
                  description: An ARN of the AWS resource related to the migration (e.g., AMI, EC2 instance, RDS instance, etc.)
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - CreatedArtifact
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateCreatedArtifactResult"
  /AssociateDiscoveredResource:
    post:
      operationId: AssociateDiscoveredResource
      description: Associates a discovered resource ID from Application Discovery Service with a migration task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.AssociateDiscoveredResource
            default: AWSMigrationHub.AssociateDiscoveredResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: The identifier given to the MigrationTask. Do not store personal data in this field.
                DiscoveredResource:
                  $ref: "#/components/schemas/DiscoveredResource"
                  description: Object representing a Resource.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - DiscoveredResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDiscoveredResourceResult"
  /AssociateSourceResource:
    post:
      operationId: AssociateSourceResource
      description: Associates a source resource with a migration task. For example, the source resource can be a source server, an application, or a migration wave.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.AssociateSourceResource
            default: AWSMigrationHub.AssociateSourceResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the progress-update stream, which is used for access control as well as a namespace for migration-task names that is implicitly linked to your AWS account. The progress-update stream must uniquely identify the migration tool as it is used for all updates made by the tool; however, it does not need to be unique for each AWS account because it is scoped to the AWS account.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: A unique identifier that references the migration task. Do not include sensitive data in this field.
                SourceResource:
                  $ref: "#/components/schemas/SourceResource"
                  description: The source resource that you want to associate.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: This is an optional parameter that you can use to test whether the call will succeed. Set this parameter to true to verify that you have the permissions that are required to make the call, and that you have specified the other parameters in the call correctly.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - SourceResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSourceResourceResult"
  /CreateProgressUpdateStream:
    post:
      operationId: CreateProgressUpdateStream
      description: Creates a progress update stream which is an AWS resource used for access control as well as a namespace for migration task names that is implicitly linked to your AWS account. It must uniquely identify the migration tool as it is used for all updates made by the tool; however, it does not need to be unique for each AWS account because it is scoped to the AWS account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.CreateProgressUpdateStream
            default: AWSMigrationHub.CreateProgressUpdateStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStreamName:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream. Do not store personal data in this field.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProgressUpdateStreamResult"
  /DeleteProgressUpdateStream:
    post:
      operationId: DeleteProgressUpdateStream
      description: 'Deletes a progress update stream, including all of its tasks, which was previously created as an AWS resource used for access control. This API has the following traits: The only parameter needed for DeleteProgressUpdateStream is the stream name (same as a CreateProgressUpdateStream call). The call will return, and a background process will asynchronously delete the stream and all of its resources (tasks, associated resources, resource attributes, created artifacts). If the stream takes time to be deleted, it might still show up on a ListProgressUpdateStreams call. CreateProgressUpdateStream, ImportMigrationTask, NotifyMigrationTaskState, and all Associate[*] APIs related to the tasks belonging to the stream will throw "InvalidInputException" if the stream of the same name is in the process of being deleted. Once the stream and all of its resources are deleted, CreateProgressUpdateStream for a stream of the same name will succeed, and that stream will be an entirely new logical resource (without any resources associated with the old stream).'
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.DeleteProgressUpdateStream
            default: AWSMigrationHub.DeleteProgressUpdateStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStreamName:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream. Do not store personal data in this field.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStreamName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProgressUpdateStreamResult"
  /DescribeApplicationState:
    post:
      operationId: DescribeApplicationState
      description: Gets the migration status of an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.DescribeApplicationState
            default: AWSMigrationHub.DescribeApplicationState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                  description: The configurationId in Application Discovery Service that uniquely identifies the grouped application.
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeApplicationStateResult"
  /DescribeMigrationTask:
    post:
      operationId: DescribeMigrationTask
      description: Retrieves a list of all attributes associated with a specific migration task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.DescribeMigrationTask
            default: AWSMigrationHub.DescribeMigrationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: The identifier given to the MigrationTask. Do not store personal data in this field.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeMigrationTaskResult"
  /DisassociateCreatedArtifact:
    post:
      operationId: DisassociateCreatedArtifact
      description: "Disassociates a created artifact of an AWS resource with a migration task performed by a migration tool that was previously associated. This API has the following traits: A migration user can call the DisassociateCreatedArtifacts operation to disassociate a created AWS Artifact from a migration task. The created artifact name must be provided in ARN (Amazon Resource Name) format which will contain information about type and region; for example: arn:aws:ec2:us-east-1:488216288981:image/ami-6d0ba87b. Examples of the AWS resource behind the created artifact are, AMI's, EC2 instance, or RDS instance, etc."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.DisassociateCreatedArtifact
            default: AWSMigrationHub.DisassociateCreatedArtifact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: Unique identifier that references the migration task to be disassociated with the artifact. Do not store personal data in this field.
                CreatedArtifactName:
                  $ref: "#/components/schemas/CreatedArtifactName"
                  description: An ARN of the AWS resource related to the migration (e.g., AMI, EC2 instance, RDS instance, etc.)
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - CreatedArtifactName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateCreatedArtifactResult"
  /DisassociateDiscoveredResource:
    post:
      operationId: DisassociateDiscoveredResource
      description: Disassociate an Application Discovery Service discovered resource from a migration task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.DisassociateDiscoveredResource
            default: AWSMigrationHub.DisassociateDiscoveredResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: The identifier given to the MigrationTask. Do not store personal data in this field.
                ConfigurationId:
                  $ref: "#/components/schemas/ConfigurationId"
                  description: ConfigurationId of the Application Discovery Service resource to be disassociated.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - ConfigurationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateDiscoveredResourceResult"
  /DisassociateSourceResource:
    post:
      operationId: DisassociateSourceResource
      description: Removes the association between a source resource and a migration task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.DisassociateSourceResource
            default: AWSMigrationHub.DisassociateSourceResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the progress-update stream, which is used for access control as well as a namespace for migration-task names that is implicitly linked to your AWS account. The progress-update stream must uniquely identify the migration tool as it is used for all updates made by the tool; however, it does not need to be unique for each AWS account because it is scoped to the AWS account.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: A unique identifier that references the migration task. Do not include sensitive data in this field.
                SourceResourceName:
                  $ref: "#/components/schemas/SourceResourceName"
                  description: The name that was specified for the source resource.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: This is an optional parameter that you can use to test whether the call will succeed. Set this parameter to true to verify that you have the permissions that are required to make the call, and that you have specified the other parameters in the call correctly.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - SourceResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateSourceResourceResult"
  /ImportMigrationTask:
    post:
      operationId: ImportMigrationTask
      description: Registers a new migration task which represents a server, database, etc., being migrated to AWS by a migration tool. This API is a prerequisite to calling the NotifyMigrationTaskState API as the migration tool must first register the migration task with Migration Hub.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ImportMigrationTask
            default: AWSMigrationHub.ImportMigrationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream. >
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: Unique identifier that references the migration task. Do not store personal data in this field.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportMigrationTaskResult"
  /ListApplicationStates:
    post:
      operationId: ListApplicationStates
      description: Lists all the migration statuses for your applications. If you use the optional ApplicationIds parameter, only the migration statuses for those applications will be returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListApplicationStates
            default: AWSMigrationHub.ListApplicationStates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationIds:
                  $ref: "#/components/schemas/ApplicationIds"
                  description: The configurationIds from the Application Discovery Service that uniquely identifies your applications.
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If a NextToken was returned by a previous call, there are more results available. To retrieve the next page of results, make the call again using the returned token in NextToken.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Maximum number of results to be returned per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationStatesResult"
  /ListCreatedArtifacts:
    post:
      operationId: ListCreatedArtifacts
      description: "Lists the created artifacts attached to a given migration task in an update stream. This API has the following traits: Gets the list of the created artifacts while migration is taking place. Shows the artifacts created by the migration tool that was associated by the AssociateCreatedArtifact API. Lists created artifacts in a paginated interface."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListCreatedArtifacts
            default: AWSMigrationHub.ListCreatedArtifacts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: Unique identifier that references the migration task. Do not store personal data in this field.
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If a NextToken was returned by a previous call, there are more results available. To retrieve the next page of results, make the call again using the returned token in NextToken.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsCreatedArtifacts"
                  description: Maximum number of results to be returned per page.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCreatedArtifactsResult"
  /ListDiscoveredResources:
    post:
      operationId: ListDiscoveredResources
      description: Lists discovered resources associated with the given MigrationTask.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListDiscoveredResources
            default: AWSMigrationHub.ListDiscoveredResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: The name of the MigrationTask. Do not store personal data in this field.
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If a NextToken was returned by a previous call, there are more results available. To retrieve the next page of results, make the call again using the returned token in NextToken.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsResources"
                  description: The maximum number of results returned per page.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDiscoveredResourcesResult"
  /ListMigrationTaskUpdates:
    post:
      operationId: ListMigrationTaskUpdates
      description: This is a paginated API that returns all the migration-task states for the specified MigrationTaskName and ProgressUpdateStream.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListMigrationTaskUpdates
            default: AWSMigrationHub.ListMigrationTaskUpdates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the progress-update stream, which is used for access control as well as a namespace for migration-task names that is implicitly linked to your AWS account. The progress-update stream must uniquely identify the migration tool as it is used for all updates made by the tool; however, it does not need to be unique for each AWS account because it is scoped to the AWS account.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: A unique identifier that references the migration task. Do not include sensitive data in this field.
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If NextToken was returned by a previous call, there are more results available. The value of NextToken is a unique pagination token for each page. To retrieve the next page of results, specify the NextToken value that the previous call returned. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to include in the response. If more results exist than the value that you specify here for MaxResults, the response will include a token that you can use to retrieve the next set of results.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMigrationTaskUpdatesResult"
  /ListMigrationTasks:
    post:
      operationId: ListMigrationTasks
      description: "Lists all, or filtered by resource name, migration tasks associated with the user account making this call. This API has the following traits: Can show a summary list of the most recent migration tasks. Can show a summary list of migration tasks associated with a given discovered resource. Lists migration tasks in a paginated interface."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListMigrationTasks
            default: AWSMigrationHub.ListMigrationTasks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If a NextToken was returned by a previous call, there are more results available. To retrieve the next page of results, make the call again using the returned token in NextToken.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Value to specify how many results are returned per page.
                ResourceName:
                  $ref: "#/components/schemas/ResourceName"
                  description: Filter migration tasks by discovered resource name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMigrationTasksResult"
  /ListProgressUpdateStreams:
    post:
      operationId: ListProgressUpdateStreams
      description: Lists progress update streams associated with the user account making this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListProgressUpdateStreams
            default: AWSMigrationHub.ListProgressUpdateStreams
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If a NextToken was returned by a previous call, there are more results available. To retrieve the next page of results, make the call again using the returned token in NextToken.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Filter to limit the maximum number of results to list per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProgressUpdateStreamsResult"
  /ListSourceResources:
    post:
      operationId: ListSourceResources
      description: Lists all the source resource that are associated with the specified MigrationTaskName and ProgressUpdateStream.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.ListSourceResources
            default: AWSMigrationHub.ListSourceResources
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the progress-update stream, which is used for access control as well as a namespace for migration-task names that is implicitly linked to your AWS account. The progress-update stream must uniquely identify the migration tool as it is used for all updates made by the tool; however, it does not need to be unique for each AWS account because it is scoped to the AWS account.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: A unique identifier that references the migration task. Do not store confidential data in this field.
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: If NextToken was returned by a previous call, there are more results available. The value of NextToken is a unique pagination token for each page. To retrieve the next page of results, specify the NextToken value that the previous call returned. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
                MaxResults:
                  $ref: "#/components/schemas/MaxResultsSourceResources"
                  description: The maximum number of results to include in the response. If more results exist than the value that you specify here for MaxResults, the response will include a token that you can use to retrieve the next set of results.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSourceResourcesResult"
  /NotifyApplicationState:
    post:
      operationId: NotifyApplicationState
      description: "Sets the migration state of an application. For a given application identified by the value passed to ApplicationId, its status is set or updated by passing one of three values to Status: NOT_STARTED | IN_PROGRESS | COMPLETED."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.NotifyApplicationState
            default: AWSMigrationHub.NotifyApplicationState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                  description: The configurationId in Application Discovery Service that uniquely identifies the grouped application.
                Status:
                  $ref: "#/components/schemas/ApplicationStatus"
                  description: Status of the application - Not Started, In-Progress, Complete.
                UpdateDateTime:
                  $ref: "#/components/schemas/UpdateDateTime"
                  description: The timestamp when the application state changed.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ApplicationId
                - Status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyApplicationStateResult"
  /NotifyMigrationTaskState:
    post:
      operationId: NotifyMigrationTaskState
      description: "Notifies Migration Hub of the current status, progress, or other detail regarding a migration task. This API has the following traits: Migration tools will call the NotifyMigrationTaskState API to share the latest progress and status. MigrationTaskName is used for addressing updates to the correct target. ProgressUpdateStream is used for access control and to provide a namespace for each migration tool."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.NotifyMigrationTaskState
            default: AWSMigrationHub.NotifyMigrationTaskState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: Unique identifier that references the migration task. Do not store personal data in this field.
                Task:
                  $ref: "#/components/schemas/Task"
                  description: Information about the task's progress and status.
                UpdateDateTime:
                  $ref: "#/components/schemas/UpdateDateTime"
                  description: The timestamp when the task was gathered.
                NextUpdateSeconds:
                  $ref: "#/components/schemas/NextUpdateSeconds"
                  description: Number of seconds after the UpdateDateTime within which the Migration Hub can expect an update. If Migration Hub does not receive an update within the specified interval, then the migration task will be considered stale.
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - Task
                - UpdateDateTime
                - NextUpdateSeconds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyMigrationTaskStateResult"
  /PutResourceAttributes:
    post:
      operationId: PutResourceAttributes
      description: Provides identifying details of the resource being migrated so that it can be associated in the Application Discovery Service repository. This association occurs asynchronously after PutResourceAttributes returns. Keep in mind that subsequent calls to PutResourceAttributes will override previously stored attributes. For example, if it is first called with a MAC address, but later, it is desired to add an IP address, it will then be required to call it with both the IP and MAC addresses to prevent overriding the MAC address. Note the instructions regarding the special use case of the ResourceAttributeList parameter when specifying any "VM" related value. Because this is an asynchronous call, it will always return 200, whether an association occurs or not. To confirm if an association was found based on the provided details, call ListDiscoveredResources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSMigrationHub.PutResourceAttributes
            default: AWSMigrationHub.PutResourceAttributes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProgressUpdateStream:
                  $ref: "#/components/schemas/ProgressUpdateStream"
                  description: The name of the ProgressUpdateStream.
                MigrationTaskName:
                  $ref: "#/components/schemas/MigrationTaskName"
                  description: Unique identifier that references the migration task. Do not store personal data in this field.
                ResourceAttributeList:
                  $ref: "#/components/schemas/ResourceAttributeList"
                  description: 'Information about the resource that is being migrated. This data will be used to map the task to a resource in the Application Discovery Service repository. Takes the object array of ResourceAttribute where the Type field is reserved for the following values: IPV4_ADDRESS | IPV6_ADDRESS | MAC_ADDRESS | FQDN | VM_MANAGER_ID | VM_MANAGED_OBJECT_REFERENCE | VM_NAME | VM_PATH | BIOS_ID | MOTHERBOARD_SERIAL_NUMBER where the identifying value can be a string up to 256 characters. If any "VM" related value is set for a ResourceAttribute object, it is required that VM_MANAGER_ID, as a minimum, is always set. If VM_MANAGER_ID is not set, then all "VM" fields will be discarded and "VM" fields will not be used for matching the migration task to a server in Application Discovery Service repository. See the Example section below for a use case of specifying "VM" related values. If a server you are trying to match has multiple IP or MAC addresses, you should provide as many as you know in separate type/value pairs passed to the ResourceAttributeList parameter to maximize the chances of matching.'
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                  description: Optional boolean flag to indicate whether any effect should take place. Used to test if the caller has permission to make the call.
              required:
                - ProgressUpdateStream
                - MigrationTaskName
                - ResourceAttributeList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourceAttributesResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ProgressUpdateStream:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[^/:|\\000-\\037]+"
    MigrationTaskName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[^:|]+"
    CreatedArtifact:
      description: An ARN of the AWS cloud resource target receiving the migration (e.g., AMI, EC2 instance, RDS instance, etc.).
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CreatedArtifactName"
          description: An ARN that uniquely identifies the result of a migration task.
        Description:
          $ref: "#/components/schemas/CreatedArtifactDescription"
          description: A description that can be free-form text to record additional detail about the artifact for clarity or for later reference.
      required:
        - Name
    CreatedArtifactName:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: arn:[a-z-]+:[a-z0-9-]+:(?:[a-z0-9-]+|):(?:[0-9]{12}|):.*
    CreatedArtifactDescription:
      type: string
      minLength: 0
      maxLength: 500
      pattern: ^.{0,500}$
    DryRun:
      type: boolean
    AssociateCreatedArtifactResult:
      type: object
    DiscoveredResource:
      description: Object representing the on-premises resource being migrated.
      type: object
      properties:
        ConfigurationId:
          $ref: "#/components/schemas/ConfigurationId"
          description: The configurationId in Application Discovery Service that uniquely identifies the on-premise resource.
        Description:
          $ref: "#/components/schemas/DiscoveredResourceDescription"
          description: A description that can be free-form text to record additional detail about the discovered resource for clarity or later reference.
      required:
        - ConfigurationId
    ConfigurationId:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^.{1,1600}$
    DiscoveredResourceDescription:
      type: string
      minLength: 0
      maxLength: 500
      pattern: ^.{0,500}$
    AssociateDiscoveredResourceResult:
      type: object
    SourceResource:
      description: A source resource can be a source server, a migration wave, an application, or any other resource that you track.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SourceResourceName"
          description: This is the name that you want to use to identify the resource. If the resource is an AWS resource, we recommend that you set this parameter to the ARN of the resource.
        Description:
          $ref: "#/components/schemas/SourceResourceDescription"
          description: A description that can be free-form text to record additional detail about the resource for clarity or later reference.
        StatusDetail:
          $ref: "#/components/schemas/StatusDetail"
          description: A free-form description of the status of the resource.
      required:
        - Name
    SourceResourceName:
      type: string
      minLength: 1
      maxLength: 1600
    SourceResourceDescription:
      type: string
      minLength: 0
      maxLength: 500
      pattern: ^.{0,500}$
    StatusDetail:
      type: string
      minLength: 0
      maxLength: 2500
      pattern: ^.{0,2500}$
    AssociateSourceResourceResult:
      type: object
    CreateProgressUpdateStreamResult:
      type: object
    DeleteProgressUpdateStreamResult:
      type: object
    ApplicationId:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^.{1,1600}$
    DescribeApplicationStateResult:
      type: object
      properties:
        ApplicationStatus:
          $ref: "#/components/schemas/ApplicationStatus"
          description: Status of the application - Not Started, In-Progress, Complete.
        LastUpdatedTime:
          $ref: "#/components/schemas/UpdateDateTime"
          description: The timestamp when the application status was last updated.
    ApplicationStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - COMPLETED
    UpdateDateTime:
      type: string
      format: date-time
    DescribeMigrationTaskResult:
      type: object
      properties:
        MigrationTask:
          $ref: "#/components/schemas/MigrationTask"
          description: Object encapsulating information about the migration task.
    MigrationTask:
      description: Represents a migration task in a migration tool.
      type: object
      properties:
        ProgressUpdateStream:
          $ref: "#/components/schemas/ProgressUpdateStream"
          description: A name that identifies the vendor of the migration tool being used.
        MigrationTaskName:
          $ref: "#/components/schemas/MigrationTaskName"
          description: Unique identifier that references the migration task. Do not store personal data in this field.
        Task:
          $ref: "#/components/schemas/Task"
          description: Task object encapsulating task information.
        UpdateDateTime:
          $ref: "#/components/schemas/UpdateDateTime"
          description: The timestamp when the task was gathered.
        ResourceAttributeList:
          $ref: "#/components/schemas/LatestResourceAttributeList"
          description: Information about the resource that is being migrated. This data will be used to map the task to a resource in the Application Discovery Service repository.
    Task:
      description: Task object encapsulating task information.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/Status"
          description: Status of the task - Not Started, In-Progress, Complete.
        StatusDetail:
          $ref: "#/components/schemas/StatusDetail"
          description: Details of task status as notified by a migration tool. A tool might use this field to provide clarifying information about the status that is unique to that tool or that explains an error state.
        ProgressPercent:
          $ref: "#/components/schemas/ProgressPercent"
          description: Indication of the percentage completion of the task.
      required:
        - Status
    Status:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - FAILED
        - COMPLETED
    ProgressPercent:
      type: integer
      minimum: 0
      maximum: 100
    LatestResourceAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceAttribute"
    ResourceAttribute:
      description: "Attribute associated with a resource. Note the corresponding format required per type listed below: IPV4 x.x.x.x where x is an integer in the range [0,255] IPV6 y : y : y : y : y : y : y : y where y is a hexadecimal between 0 and FFFF. [0, FFFF] MAC_ADDRESS ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$ FQDN ^[^<>{}\\\\\\\\/?,=\\\\p{Cntrl}]{1,256}$"
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ResourceAttributeType"
          description: Type of resource.
        Value:
          $ref: "#/components/schemas/ResourceAttributeValue"
          description: Value of the resource type.
      required:
        - Type
        - Value
    ResourceAttributeType:
      type: string
      enum:
        - IPV4_ADDRESS
        - IPV6_ADDRESS
        - MAC_ADDRESS
        - FQDN
        - VM_MANAGER_ID
        - VM_MANAGED_OBJECT_REFERENCE
        - VM_NAME
        - VM_PATH
        - BIOS_ID
        - MOTHERBOARD_SERIAL_NUMBER
    ResourceAttributeValue:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^.{1,256}$
    DisassociateCreatedArtifactResult:
      type: object
    DisassociateDiscoveredResourceResult:
      type: object
    DisassociateSourceResourceResult:
      type: object
    ImportMigrationTaskResult:
      type: object
    ApplicationIds:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationId"
    Token:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^[a-zA-Z0-9\/\+\=]{0,2048}$
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListApplicationStatesResult:
      type: object
      properties:
        ApplicationStateList:
          $ref: "#/components/schemas/ApplicationStateList"
          description: A list of Applications that exist in Application Discovery Service.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If a NextToken was returned by a previous call, there are more results available. To retrieve the next page of results, make the call again using the returned token in NextToken.
    ApplicationStateList:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationState"
    ApplicationState:
      description: The state of an application discovered through Migration Hub import, the AWS Agentless Discovery Connector, or the AWS Application Discovery Agent.
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/ApplicationId"
          description: The configurationId from the Application Discovery Service that uniquely identifies an application.
        ApplicationStatus:
          $ref: "#/components/schemas/ApplicationStatus"
          description: The current status of an application.
        LastUpdatedTime:
          $ref: "#/components/schemas/UpdateDateTime"
          description: The timestamp when the application status was last updated.
    MaxResultsCreatedArtifacts:
      type: integer
      minimum: 1
      maximum: 10
    ListCreatedArtifactsResult:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If there are more created artifacts than the max result, return the next token to be passed to the next call as a bookmark of where to start from.
        CreatedArtifactList:
          $ref: "#/components/schemas/CreatedArtifactList"
          description: List of created artifacts up to the maximum number of results specified in the request.
    CreatedArtifactList:
      type: array
      items:
        $ref: "#/components/schemas/CreatedArtifact"
    MaxResultsResources:
      type: integer
      minimum: 1
      maximum: 10
    ListDiscoveredResourcesResult:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If there are more discovered resources than the max result, return the next token to be passed to the next call as a bookmark of where to start from.
        DiscoveredResourceList:
          $ref: "#/components/schemas/DiscoveredResourceList"
          description: Returned list of discovered resources associated with the given MigrationTask.
    DiscoveredResourceList:
      type: array
      items:
        $ref: "#/components/schemas/DiscoveredResource"
    ListMigrationTaskUpdatesResult:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If the response includes a NextToken value, that means that there are more results available. The value of NextToken is a unique pagination token for each page. To retrieve the next page of results, call this API again and specify this NextToken value in the request. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
        MigrationTaskUpdateList:
          $ref: "#/components/schemas/MigrationTaskUpdateList"
          description: The list of migration-task updates.
    MigrationTaskUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/MigrationTaskUpdate"
    MigrationTaskUpdate:
      description: A migration-task progress update.
      type: object
      properties:
        UpdateDateTime:
          $ref: "#/components/schemas/UpdateDateTime"
          description: The timestamp for the update.
        UpdateType:
          $ref: "#/components/schemas/UpdateType"
          description: The type of the update.
        MigrationTaskState:
          $ref: "#/components/schemas/Task"
    UpdateType:
      type: string
      enum:
        - MIGRATION_TASK_STATE_UPDATED
    ResourceName:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: ^.{1,1600}$
    ListMigrationTasksResult:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If there are more migration tasks than the max result, return the next token to be passed to the next call as a bookmark of where to start from.
        MigrationTaskSummaryList:
          $ref: "#/components/schemas/MigrationTaskSummaryList"
          description: "Lists the migration task's summary which includes: MigrationTaskName, ProgressPercent, ProgressUpdateStream, Status, and the UpdateDateTime for each task."
    MigrationTaskSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/MigrationTaskSummary"
    MigrationTaskSummary:
      description: MigrationTaskSummary includes MigrationTaskName, ProgressPercent, ProgressUpdateStream, Status, and UpdateDateTime for each task.
      type: object
      properties:
        ProgressUpdateStream:
          $ref: "#/components/schemas/ProgressUpdateStream"
          description: An AWS resource used for access control. It should uniquely identify the migration tool as it is used for all updates made by the tool.
        MigrationTaskName:
          $ref: "#/components/schemas/MigrationTaskName"
          description: Unique identifier that references the migration task. Do not store personal data in this field.
        Status:
          $ref: "#/components/schemas/Status"
          description: Status of the task.
        ProgressPercent:
          $ref: "#/components/schemas/ProgressPercent"
          description: Indication of the percentage completion of the task.
        StatusDetail:
          $ref: "#/components/schemas/StatusDetail"
          description: Detail information of what is being done within the overall status state.
        UpdateDateTime:
          $ref: "#/components/schemas/UpdateDateTime"
          description: The timestamp when the task was gathered.
    ListProgressUpdateStreamsResult:
      type: object
      properties:
        ProgressUpdateStreamSummaryList:
          $ref: "#/components/schemas/ProgressUpdateStreamSummaryList"
          description: List of progress update streams up to the max number of results passed in the input.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If there are more streams created than the max result, return the next token to be passed to the next call as a bookmark of where to start from.
    ProgressUpdateStreamSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ProgressUpdateStreamSummary"
    ProgressUpdateStreamSummary:
      description: Summary of the AWS resource used for access control that is implicitly linked to your AWS account.
      type: object
      properties:
        ProgressUpdateStreamName:
          $ref: "#/components/schemas/ProgressUpdateStream"
          description: The name of the ProgressUpdateStream. Do not store personal data in this field.
    MaxResultsSourceResources:
      type: integer
      minimum: 1
      maximum: 10
    ListSourceResourcesResult:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/Token"
          description: If the response includes a NextToken value, that means that there are more results available. The value of NextToken is a unique pagination token for each page. To retrieve the next page of results, call this API again and specify this NextToken value in the request. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
        SourceResourceList:
          $ref: "#/components/schemas/SourceResourceList"
          description: The list of source resources.
    SourceResourceList:
      type: array
      items:
        $ref: "#/components/schemas/SourceResource"
    NotifyApplicationStateResult:
      type: object
    NextUpdateSeconds:
      type: integer
      minimum: 0
    NotifyMigrationTaskStateResult:
      type: object
    ResourceAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceAttribute"
    PutResourceAttributesResult:
      type: object
