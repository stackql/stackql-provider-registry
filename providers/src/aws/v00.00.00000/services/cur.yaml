openapi: 3.0.0
info:
  version: "2017-01-06"
  title: AWS Cost and Usage Report Service
  description: AWS Cost and Usage Report Service
  x-serviceName: cur
  x-serviceAlias: cur
  x-protocol: json
  x-apiVersion: "2017-01-06"
  x-endpointPrefix: cur
  x-targetPrefix: AWSOrigamiServiceGatewayService
  x-jsonVersion: "1.1"
servers:
  - url: https://cur.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cur
paths:
  /DeleteReportDefinition:
    post:
      operationId: DeleteReportDefinition
      description: Deletes the specified report. Any tags associated with the report are also deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.DeleteReportDefinition
            default: AWSOrigamiServiceGatewayService.DeleteReportDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportName:
                  $ref: "#/components/schemas/ReportName"
                  description: The name of the report that you want to delete. The name must be unique, is case sensitive, and can't include spaces.
              required:
                - ReportName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReportDefinitionResponse"
  /DescribeReportDefinitions:
    post:
      operationId: DescribeReportDefinitions
      description: Lists the Amazon Web Services Cost and Usage Report available to this account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.DescribeReportDefinitions
            default: AWSOrigamiServiceGatewayService.DescribeReportDefinitions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/GenericString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReportDefinitionsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags associated with the specified report definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.ListTagsForResource
            default: AWSOrigamiServiceGatewayService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportName:
                  $ref: "#/components/schemas/ReportName"
                  description: The report name of the report definition that tags are to be returned for.
              required:
                - ReportName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ModifyReportDefinition:
    post:
      operationId: ModifyReportDefinition
      description: Allows you to programmatically update your report preferences.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.ModifyReportDefinition
            default: AWSOrigamiServiceGatewayService.ModifyReportDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportName:
                  $ref: "#/components/schemas/ReportName"
                ReportDefinition:
                  $ref: "#/components/schemas/ReportDefinition"
              required:
                - ReportName
                - ReportDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyReportDefinitionResponse"
  /PutReportDefinition:
    post:
      operationId: PutReportDefinition
      description: Creates a new report using the description that you provide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.PutReportDefinition
            default: AWSOrigamiServiceGatewayService.PutReportDefinition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportDefinition:
                  $ref: "#/components/schemas/ReportDefinition"
                  description: Represents the output of the PutReportDefinition operation. The content consists of the detailed metadata and data file information.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the report definition resource.
              required:
                - ReportDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutReportDefinitionResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Associates a set of tags with a report definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.TagResource
            default: AWSOrigamiServiceGatewayService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportName:
                  $ref: "#/components/schemas/ReportName"
                  description: The report name of the report definition that tags are to be associated with.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the report definition resource.
              required:
                - ReportName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Disassociates a set of tags from a report definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSOrigamiServiceGatewayService.UntagResource
            default: AWSOrigamiServiceGatewayService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportName:
                  $ref: "#/components/schemas/ReportName"
                  description: The report name of the report definition that tags are to be disassociated from.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The tags to be disassociated from the report definition resource.
              required:
                - ReportName
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ReportName:
      description: The name of the report that you want to create. The name must be unique, is case sensitive, and can't include spaces.
      type: string
      maxLength: 256
      pattern: "[0-9A-Za-z!\\-_.*\\'()]+"
    DeleteReportDefinitionResponse:
      description: If the action is successful, the service sends back an HTTP 200 response.
      type: object
      properties:
        ResponseMessage:
          $ref: "#/components/schemas/DeleteResponseMessage"
    DeleteResponseMessage:
      description: Whether the deletion was successful or not.
      type: string
    MaxResults:
      description: The maximum number of results that Amazon Web Services returns for the operation.
      type: integer
      minimum: 5
      maximum: 5
    GenericString:
      description: A generic string.
      type: string
      maxLength: 256
      pattern: "[A-Za-z0-9_\\.\\-=]*"
    DescribeReportDefinitionsResponse:
      description: If the action is successful, the service sends back an HTTP 200 response.
      type: object
      properties:
        ReportDefinitions:
          $ref: "#/components/schemas/ReportDefinitionList"
          description: An Amazon Web Services Cost and Usage Report list owned by the account.
        NextToken:
          $ref: "#/components/schemas/GenericString"
    ReportDefinitionList:
      description: A list of report definitions.
      type: array
      items:
        $ref: "#/components/schemas/ReportDefinition"
    ReportDefinition:
      description: The definition of Amazon Web Services Cost and Usage Report. You can specify the report name, time unit, report format, compression format, S3 bucket, additional artifacts, and schema elements in the definition.
      type: object
      properties:
        ReportName:
          $ref: "#/components/schemas/ReportName"
        TimeUnit:
          $ref: "#/components/schemas/TimeUnit"
        Format:
          $ref: "#/components/schemas/ReportFormat"
        Compression:
          $ref: "#/components/schemas/CompressionFormat"
        AdditionalSchemaElements:
          $ref: "#/components/schemas/SchemaElementList"
          description: A list of strings that indicate additional content that Amazon Web Services includes in the report, such as individual resource IDs.
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
        S3Prefix:
          $ref: "#/components/schemas/S3Prefix"
        S3Region:
          $ref: "#/components/schemas/AWSRegion"
        AdditionalArtifacts:
          $ref: "#/components/schemas/AdditionalArtifactList"
          description: A list of manifests that you want Amazon Web Services to create for this report.
        RefreshClosedReports:
          $ref: "#/components/schemas/RefreshClosedReports"
          description: Whether you want Amazon Web Services to update your reports after they have been finalized if Amazon Web Services detects charges related to previous months. These charges can include refunds, credits, or support fees.
        ReportVersioning:
          $ref: "#/components/schemas/ReportVersioning"
          description: Whether you want Amazon Web Services to overwrite the previous version of each report or to deliver the report in addition to the previous versions.
        BillingViewArn:
          $ref: "#/components/schemas/BillingViewArn"
          description: "The Amazon resource name of the billing view. The BillingViewArn is needed to create Amazon Web Services Cost and Usage Report for each billing group maintained in the Amazon Web Services Billing Conductor service. The BillingViewArn for a billing group can be constructed as: arn:aws:billing::payer-account-id:billingview/billing-group-primary-account-id"
        ReportStatus:
          $ref: "#/components/schemas/ReportStatus"
          description: The status of the report.
      required:
        - ReportName
        - TimeUnit
        - Format
        - Compression
        - AdditionalSchemaElements
        - S3Bucket
        - S3Prefix
        - S3Region
    TimeUnit:
      description: The length of time covered by the report.
      type: string
      enum:
        - HOURLY
        - DAILY
        - MONTHLY
    ReportFormat:
      description: The format that Amazon Web Services saves the report in.
      type: string
      enum:
        - textORcsv
        - Parquet
    CompressionFormat:
      description: The compression format that Amazon Web Services uses for the report.
      type: string
      enum:
        - ZIP
        - GZIP
        - Parquet
    SchemaElementList:
      description: A list of strings that indicate the content that is included in the report, such as service or usage type.
      type: array
      items:
        $ref: "#/components/schemas/SchemaElement"
    SchemaElement:
      description: Whether or not Amazon Web Services includes resource IDs in the report.
      type: string
      enum:
        - RESOURCES
        - SPLIT_COST_ALLOCATION_DATA
        - MANUAL_DISCOUNT_COMPATIBILITY
    S3Bucket:
      description: The S3 bucket where Amazon Web Services delivers the report.
      type: string
      maxLength: 256
      pattern: "[A-Za-z0-9_\\.\\-]+"
    S3Prefix:
      description: The prefix that Amazon Web Services adds to the report name when Amazon Web Services delivers the report. Your prefix can't include spaces.
      type: string
      maxLength: 256
      pattern: "[0-9A-Za-z!\\-_.*\\'()/]*"
    AWSRegion:
      description: The region of the S3 bucket that Amazon Web Services delivers the report into.
      type: string
      enum:
        - af-south-1
        - ap-east-1
        - ap-south-1
        - ap-south-2
        - ap-southeast-1
        - ap-southeast-2
        - ap-southeast-3
        - ap-northeast-1
        - ap-northeast-2
        - ap-northeast-3
        - ca-central-1
        - eu-central-1
        - eu-central-2
        - eu-west-1
        - eu-west-2
        - eu-west-3
        - eu-north-1
        - eu-south-1
        - eu-south-2
        - me-central-1
        - me-south-1
        - sa-east-1
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
        - cn-north-1
        - cn-northwest-1
    AdditionalArtifactList:
      description: A list of additional artifacts.
      type: array
      items:
        $ref: "#/components/schemas/AdditionalArtifact"
    AdditionalArtifact:
      description: The types of manifest that you want Amazon Web Services to create for this report.
      type: string
      enum:
        - REDSHIFT
        - QUICKSIGHT
        - ATHENA
    RefreshClosedReports:
      type: boolean
    ReportVersioning:
      type: string
      enum:
        - CREATE_NEW_REPORT
        - OVERWRITE_REPORT
    BillingViewArn:
      type: string
      maxLength: 128
      pattern: (arn:aws(-cn)?:billing::[0-9]{12}:billingview/)?[a-zA-Z0-9_\+=\.\-@].{1,30}
    ReportStatus:
      description: A two element dictionary with a lastDelivery and lastStatus key whose values describe the date and status of the last delivered report for a particular report definition.
      type: object
      properties:
        lastDelivery:
          $ref: "#/components/schemas/LastDelivery"
          description: A timestamp that gives the date of a report delivery.
        lastStatus:
          $ref: "#/components/schemas/LastStatus"
          description: An enum that gives the status of a report delivery.
    LastDelivery:
      type: string
      minLength: 16
      maxLength: 20
      pattern: "[0-9]{8}[T][0-9]{6}([Z]|[+-][0-9]{4})"
    LastStatus:
      type: string
      enum:
        - SUCCESS
        - ERROR_PERMISSIONS
        - ERROR_NO_BUCKET
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags assigned to the report definition resource.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Describes a tag. A tag is a key-value pair. You can add up to 50 tags to a report definition.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag. Tag keys are case sensitive. Each report definition can only have up to one tag with the same key. If you try to add an existing tag with the same key, the existing tag value will be updated to the new value.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag. Tag values are case-sensitive. This can be an empty string.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*
    ModifyReportDefinitionResponse:
      type: object
    PutReportDefinitionResponse:
      description: If the action is successful, the service sends back an HTTP 200 response with an empty HTTP body.
      type: object
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
  x-stackQL-resources:
    report_definitions:
      id: aws.cur.report_definitions
      name: report_definitions
      title: report_definitions
      methods:
        delete_report_definition:
          operation:
            $ref: "#/paths/~1DeleteReportDefinition/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        describe_report_definitions:
          operation:
            $ref: "#/paths/~1DescribeReportDefinitions/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.ReportDefinitions
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            pagination:
              requestToken:
                key: NextToken
                location: body
              responseToken:
                key: $.NextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
        modify_report_definition:
          operation:
            $ref: "#/paths/~1ModifyReportDefinition/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        put_report_definition:
          operation:
            $ref: "#/paths/~1PutReportDefinition/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/describe_report_definitions"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/modify_report_definition"
        replace:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/put_report_definition"
        delete:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/delete_report_definition"
    tags:
      id: aws.cur.tags
      name: tags
      title: tags
      methods:
        list_tags_for_resource:
          operation:
            $ref: "#/paths/~1ListTagsForResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        tag_resource:
          operation:
            $ref: "#/paths/~1TagResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        untag_resource:
          operation:
            $ref: "#/paths/~1UntagResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tags/methods/list_tags_for_resource"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/tags/methods/untag_resource"
          - $ref: "#/components/x-stackQL-resources/tags/methods/tag_resource"
        delete: []
