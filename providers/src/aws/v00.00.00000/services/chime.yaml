openapi: 3.0.0
info:
  version: "2018-05-01"
  title: Amazon Chime
  description: Amazon Chime
  x-serviceName: chime
  x-serviceAlias: chime
  x-protocol: rest-json
  x-apiVersion: "2018-05-01"
  x-endpointPrefix: chime
servers:
  - url: https://chime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for chime
paths:
  /accounts/{account_id}/users/{user_id}?operation=associate-phone-number:
    post:
      operationId: AssociatePhoneNumberWithUser
      description: Associates a phone number with the specified Amazon Chime user.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Chime account ID.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The user ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                E164PhoneNumber:
                  $ref: "#/components/schemas/E164PhoneNumber"
              required:
                - E164PhoneNumber
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePhoneNumberWithUserResponse"
  /accounts/{account_id}?operation=associate-signin-delegate-groups:
    post:
      operationId: AssociateSigninDelegateGroupsWithAccount
      description: Associates the specified sign-in delegate groups with the specified Amazon Chime account.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SigninDelegateGroups:
                  $ref: "#/components/schemas/SigninDelegateGroupList"
              required:
                - SigninDelegateGroups
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSigninDelegateGroupsWithAccountResponse"
  /accounts/{account_id}/rooms/{room_id}/memberships?operation=batch-create:
    post:
      operationId: BatchCreateRoomMembership
      description: Adds up to 50 members to a chat room in an Amazon Chime Enterprise account. Members can be users or bots. The member role designates whether the member is a chat room administrator or a general chat room member.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: room_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The room ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MembershipItemList:
                  $ref: "#/components/schemas/MembershipItemList"
              required:
                - MembershipItemList
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateRoomMembershipResponse"
  /phone-numbers?operation=batch-delete:
    post:
      operationId: BatchDeletePhoneNumber
      description: Moves phone numbers into the Deletion queue. Phone numbers must be disassociated from any users or Amazon Chime Voice Connectors before they can be deleted. Phone numbers remain in the Deletion queue for 7 days before they are deleted permanently.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PhoneNumberIds:
                  $ref: "#/components/schemas/NonEmptyStringList"
              required:
                - PhoneNumberIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeletePhoneNumberResponse"
  /accounts/{account_id}/users?operation=suspend:
    post:
      operationId: BatchSuspendUser
      description: Suspends up to 50 users from a Team or EnterpriseLWA Amazon Chime account. For more information about different account types, see Managing Your Amazon Chime Accounts in the Amazon Chime Administration Guide. Users suspended from a Team account are disassociated from the account,but they can continue to use Amazon Chime as free users. To remove the suspension from suspended Team account users, invite them to the Team account again. You can use the InviteUsers action to do so. Users suspended from an EnterpriseLWA account are immediately signed out of Amazon Chime and can no longer sign in. To remove the suspension from suspended EnterpriseLWA account users, use the BatchUnsuspendUser action. To sign out users without suspending them, use the LogoutUser action.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UserIdList:
                  $ref: "#/components/schemas/UserIdList"
              required:
                - UserIdList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSuspendUserResponse"
  /accounts/{account_id}/users?operation=unsuspend:
    post:
      operationId: BatchUnsuspendUser
      description: Removes the suspension from up to 50 previously suspended users for the specified Amazon Chime EnterpriseLWA account. Only users on EnterpriseLWA accounts can be unsuspended using this action. For more information about different account types, see Managing Your Amazon Chime Accounts in the account types, in the Amazon Chime Administration Guide. Previously suspended users who are unsuspended using this action are returned to Registered status. Users who are not previously suspended are ignored.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UserIdList:
                  $ref: "#/components/schemas/UserIdList"
              required:
                - UserIdList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUnsuspendUserResponse"
  /phone-numbers?operation=batch-update:
    post:
      operationId: BatchUpdatePhoneNumber
      description: Updates phone number product types or calling names. You can update one attribute at a time for each UpdatePhoneNumberRequestItem. For example, you can update the product type or the calling name. For toll-free numbers, you cannot use the Amazon Chime Business Calling product type. For numbers outside the U.S., you must use the Amazon Chime SIP Media Application Dial-In product type. Updates to outbound calling names can take up to 72 hours to complete. Pending updates to outbound calling names must be complete before you can request another update.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UpdatePhoneNumberRequestItems:
                  $ref: "#/components/schemas/UpdatePhoneNumberRequestItemList"
              required:
                - UpdatePhoneNumberRequestItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdatePhoneNumberResponse"
  /accounts/{account_id}/users:
    post:
      operationId: BatchUpdateUser
      description: Updates user details within the UpdateUserRequestItem object for up to 20 users for the specified Amazon Chime account. Currently, only LicenseType updates are supported for this action.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UpdateUserRequestItems:
                  $ref: "#/components/schemas/UpdateUserRequestItemList"
              required:
                - UpdateUserRequestItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateUserResponse"
    get:
      operationId: ListUsers
      description: Lists the users that belong to the specified Amazon Chime account. You can specify an email address to list only the user that the email address belongs to.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: user-email
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmailAddress"
          description: Optional. The user email address used to filter results. Maximum 1.
        - name: user-type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserType"
          description: The user type.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProfileServiceMaxResults"
          description: The maximum number of results to return in a single call. Defaults to 100.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
  /accounts:
    post:
      operationId: CreateAccount
      description: Creates an Amazon Chime account under the administrator's AWS account. Only Team account types are currently supported for this action. For more information about different account types, see Managing Your Amazon Chime Accounts in the Amazon Chime Administration Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AccountName"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountResponse"
    get:
      operationId: ListAccounts
      description: Lists the Amazon Chime accounts under the administrator's AWS account. You can filter accounts by account name prefix. To find out which Amazon Chime account a user belongs to, you can filter by the user's email address, which returns one account result.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountName"
          description: Amazon Chime account name prefix with which to filter results.
        - name: user-email
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EmailAddress"
          description: User email address with which to filter results.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProfileServiceMaxResults"
          description: The maximum number of results to return in a single call. Defaults to 100.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountsResponse"
  /accounts/{account_id}/bots:
    post:
      operationId: CreateBot
      description: Creates a bot for an Amazon Chime Enterprise account.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DisplayName:
                  $ref: "#/components/schemas/SensitiveString"
                Domain:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - DisplayName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotResponse"
    get:
      operationId: ListBots
      description: Lists the bots associated with the administrator's Amazon Chime Enterprise account ID.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call. The default is 10.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotsResponse"
  /meetings/{meeting_id}/dial-outs:
    post:
      operationId: CreateMeetingDialOut
      description: Uses the join token and call metadata in a meeting request (From number, To number, and so forth) to initiate an outbound call to a public switched telephone network (PSTN) and join them into a Chime meeting. Also ensures that the From number belongs to the customer. To play welcome audio or implement an interactive voice response (IVR), use the CreateSipMediaApplicationCall action with the corresponding SIP media application ID. This API is not available in a dedicated namespace.
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuidString"
          description: The Amazon Chime SDK meeting ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FromPhoneNumber:
                  $ref: "#/components/schemas/E164PhoneNumber"
                ToPhoneNumber:
                  $ref: "#/components/schemas/E164PhoneNumber"
                JoinToken:
                  $ref: "#/components/schemas/JoinTokenString"
              required:
                - FromPhoneNumber
                - ToPhoneNumber
                - JoinToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMeetingDialOutResponse"
  /phone-number-orders:
    post:
      operationId: CreatePhoneNumberOrder
      description: Creates an order for phone numbers to be provisioned. For toll-free numbers, you cannot use the Amazon Chime Business Calling product type. For numbers outside the U.S., you must use the Amazon Chime SIP Media Application Dial-In product type.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProductType:
                  $ref: "#/components/schemas/PhoneNumberProductType"
                E164PhoneNumbers:
                  $ref: "#/components/schemas/E164PhoneNumberList"
              required:
                - ProductType
                - E164PhoneNumbers
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePhoneNumberOrderResponse"
    get:
      operationId: ListPhoneNumberOrders
      description: Lists the phone number orders for the administrator's Amazon Chime account.
      parameters:
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPhoneNumberOrdersResponse"
  /accounts/{account_id}/rooms:
    post:
      operationId: CreateRoom
      description: Creates a chat room for the specified Amazon Chime Enterprise account.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SensitiveString"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - Name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRoomResponse"
    get:
      operationId: ListRooms
      description: Lists the room details for the specified Amazon Chime Enterprise account. Optionally, filter the results by a member ID (user ID or bot ID) to see a list of rooms that the member belongs to.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: member-id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The member ID (user ID or bot ID).
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoomsResponse"
  /accounts/{account_id}/rooms/{room_id}/memberships:
    post:
      operationId: CreateRoomMembership
      description: Adds a member to a chat room in an Amazon Chime Enterprise account. A member can be either a user or a bot. The member role designates whether the member is a chat room administrator or a general chat room member.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: room_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The room ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MemberId:
                  $ref: "#/components/schemas/NonEmptyString"
                Role:
                  $ref: "#/components/schemas/RoomMembershipRole"
              required:
                - MemberId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRoomMembershipResponse"
    get:
      operationId: ListRoomMemberships
      description: Lists the membership details for the specified room in an Amazon Chime Enterprise account, such as the members' IDs, email addresses, and names.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: room_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The room ID.
        - name: max-results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultMax"
          description: The maximum number of results to return in a single call.
        - name: next-token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token to use to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoomMembershipsResponse"
  /accounts/{account_id}/users?operation=create:
    post:
      operationId: CreateUser
      description: Creates a user under the specified Amazon Chime account.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Username:
                  $ref: "#/components/schemas/String"
                Email:
                  $ref: "#/components/schemas/EmailAddress"
                UserType:
                  $ref: "#/components/schemas/UserType"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
  /accounts/{account_id}:
    delete:
      operationId: DeleteAccount
      description: Deletes the specified Amazon Chime account. You must suspend all users before deleting Team account. You can use the BatchSuspendUser action to dodo. For EnterpriseLWA and EnterpriseAD accounts, you must release the claimed domains for your Amazon Chime account before deletion. As soon as you release the domain, all users under that account are suspended. Deleted accounts appear in your Disabled accounts list for 90 days. To restore deleted account from your Disabled accounts list, you must contact AWS Support. After 90 days, deleted accounts are permanently removed from your Disabled accounts list.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountResponse"
    get:
      operationId: GetAccount
      description: Retrieves details for the specified Amazon Chime account, such as account type and supported licenses.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountResponse"
    post:
      operationId: UpdateAccount
      description: Updates account details for the specified Amazon Chime account. Currently, only account name and default license updates are supported for this action.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/AccountName"
                DefaultLicense:
                  $ref: "#/components/schemas/License"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountResponse"
  /accounts/{account_id}/bots/{bot_id}/events-configuration:
    delete:
      operationId: DeleteEventsConfiguration
      description: Deletes the events configuration that allows a bot to receive outgoing events.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The bot ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetEventsConfiguration
      description: Gets details for an events configuration that allows a bot to receive outgoing events, such as an HTTPS endpoint or Lambda function ARN.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The bot ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventsConfigurationResponse"
    put:
      operationId: PutEventsConfiguration
      description: Creates an events configuration that allows a bot to receive outgoing events sent by Amazon Chime. Choose either an HTTPS endpoint or a Lambda function ARN. For more information, see Bot.
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Chime account ID.
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The bot ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                OutboundEventsHTTPSEndpoint:
                  $ref: "#/components/schemas/SensitiveString"
                LambdaFunctionArn:
                  $ref: "#/components/schemas/SensitiveString"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutEventsConfigurationResponse"
  /phone-numbers/{phone_number_id}:
    delete:
      operationId: DeletePhoneNumber
      description: Moves the specified phone number into the Deletion queue. A phone number must be disassociated from any users or Amazon Chime Voice Connectors before it can be deleted. Deleted phone numbers remain in the Deletion queue for 7 days before they are deleted permanently.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The phone number ID.
      responses:
        "204":
          description: Success
    get:
      operationId: GetPhoneNumber
      description: Retrieves details for the specified phone number ID, such as associations, capabilities, and product type.
      parameters:
        - name: phone_number_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The phone number ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPhoneNumberResponse"
    post:
      operationId: UpdatePhoneNumber
      description: Updates phone number details, such as product type or calling name, for the specified phone number ID. You can update one phone number detail at a time. For example, you can update either the product type or the calling name in one action. For toll-free numbers, you cannot use the Amazon Chime Business Calling product type. For numbers outside the U.S., you must use the Amazon Chime SIP Media Application Dial-In product type. Updates to outbound calling names can take 72 hours to complete. Pending updates to outbound calling names must be complete before you can request another update.
      parameters:
        - name: phone_number_id
          in: path
