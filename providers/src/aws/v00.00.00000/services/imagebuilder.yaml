        arn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: "The Amazon Resource Name (ARN) of the component. Semantic versioning is included in each object's Amazon Resource Name (ARN), at the level that applies to that object as follows: Versionless ARNs and Name ARNs do not include specific values in any of the nodes. The nodes are either left off entirely, or they are specified as wildcards, for example: x.x.x. Version ARNs have only the first three nodes: `<major>`.`<minor>`.`<patch>` Build version ARNs have all four nodes, and point to a specific build for a specific version of an object."
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the component.
        version:
          $ref: "#/components/schemas/VersionNumber"
          description: "The semantic version of the component. The semantic version has four nodes: `<major>`.`<minor>`.`<patch>`/`<build>`. You can assign values for the first three, and can filter on all of them. Assignment: For the first three nodes you can assign any positive integer value, including zero, with an upper limit of 2^30-1, or 1073741823 for each node. Image Builder automatically assigns the build number to the fourth node. Patterns: You can use any numeric pattern that adheres to the assignment requirements for the nodes that you can assign. For example, you might choose a software version pattern, such as 1.0.0, or a date, such as 2021.01.01. Filtering: With semantic versioning, you have the flexibility to use wildcards (x) to specify the most recent versions or nodes when selecting the base image or components for your recipe. When you use a wildcard in any node, all nodes to the right of the first wildcard must also be wildcards."
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the component.
        platform:
          $ref: "#/components/schemas/Platform"
          description: The platform of the component.
        supportedOsVersions:
          $ref: "#/components/schemas/OsVersionList"
          description: he operating system (OS) version supported by the component. If the OS information is available, a prefix match is performed against the base image OS version during image recipe creation.
