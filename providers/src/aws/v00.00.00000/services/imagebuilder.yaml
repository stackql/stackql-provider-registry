openapi: 3.0.0
info:
  version: "2019-12-02"
  title: EC2 Image Builder
  description: EC2 Image Builder
  x-serviceName: imagebuilder
  x-serviceAlias: imagebuilder
  x-protocol: rest-json
  x-apiVersion: "2019-12-02"
  x-endpointPrefix: imagebuilder
  x-jsonVersion: "1.1"
servers:
  - url: https://imagebuilder.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for imagebuilder
paths:
  /CancelImageCreation:
    put:
      operationId: CancelImageCreation
      description: CancelImageCreation cancels the creation of Image. This operation can only be used on images in a non-terminal state.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageBuildVersionArn:
                  $ref: "#/components/schemas/ImageBuildVersionArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - imageBuildVersionArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelImageCreationResponse"
  /CancelLifecycleExecution:
    put:
      operationId: CancelLifecycleExecution
      description: Cancel a specific image lifecycle policy runtime instance.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lifecycleExecutionId:
                  $ref: "#/components/schemas/LifecycleExecutionId"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - lifecycleExecutionId
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelLifecycleExecutionResponse"
  /CreateComponent:
    put:
      operationId: CreateComponent
      description: "Creates a new component that can be used to build, validate, test, and assess your image. The component is based on a YAML document that you specify using exactly one of the following methods: Inline, using the data property in the request body. A URL that points to a YAML document file stored in Amazon S3, using the uri property in the request body."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                semanticVersion:
                  $ref: "#/components/schemas/VersionNumber"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                changeDescription:
                  $ref: "#/components/schemas/NonEmptyString"
                platform:
                  $ref: "#/components/schemas/Platform"
                supportedOsVersions:
                  $ref: "#/components/schemas/OsVersionList"
                data:
                  $ref: "#/components/schemas/InlineComponentData"
                uri:
                  $ref: "#/components/schemas/Uri"
                kmsKeyId:
                  $ref: "#/components/schemas/NonEmptyString"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                dryRun:
                  $ref: "#/components/schemas/Boolean"
              required:
                - name
                - semanticVersion
                - platform
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComponentResponse"
  /CreateContainerRecipe:
    put:
      operationId: CreateContainerRecipe
      description: Creates a new container recipe. Container recipes define how images are configured, tested, and assessed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                containerType:
                  $ref: "#/components/schemas/ContainerType"
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                semanticVersion:
                  $ref: "#/components/schemas/WildcardVersionNumber"
                components:
                  $ref: "#/components/schemas/ComponentConfigurationList"
                instanceConfiguration:
                  $ref: "#/components/schemas/InstanceConfiguration"
                dockerfileTemplateData:
                  $ref: "#/components/schemas/InlineDockerFileTemplate"
                dockerfileTemplateUri:
                  $ref: "#/components/schemas/Uri"
                platformOverride:
                  $ref: "#/components/schemas/Platform"
                imageOsVersionOverride:
                  $ref: "#/components/schemas/NonEmptyString"
                parentImage:
                  $ref: "#/components/schemas/NonEmptyString"
                tags:
                  $ref: "#/components/schemas/TagMap"
                workingDirectory:
                  $ref: "#/components/schemas/NonEmptyString"
                targetRepository:
                  $ref: "#/components/schemas/TargetContainerRepository"
                kmsKeyId:
                  $ref: "#/components/schemas/NonEmptyString"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - containerType
                - name
                - semanticVersion
                - parentImage
                - targetRepository
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContainerRecipeResponse"
  /CreateDistributionConfiguration:
    put:
      operationId: CreateDistributionConfiguration
      description: Creates a new distribution configuration. Distribution configurations define and configure the outputs of your pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                distributions:
                  $ref: "#/components/schemas/DistributionList"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - distributions
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDistributionConfigurationResponse"
  /CreateImage:
    put:
      operationId: CreateImage
      description: Creates a new image. This request will create a new image along with all of the configured output resources defined in the distribution configuration. You must specify exactly one recipe for your image, using either a ContainerRecipeArn or an ImageRecipeArn.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageRecipeArn:
                  $ref: "#/components/schemas/ImageRecipeArn"
                containerRecipeArn:
                  $ref: "#/components/schemas/ContainerRecipeArn"
                distributionConfigurationArn:
                  $ref: "#/components/schemas/DistributionConfigurationArn"
                infrastructureConfigurationArn:
                  $ref: "#/components/schemas/InfrastructureConfigurationArn"
                imageTestsConfiguration:
                  $ref: "#/components/schemas/ImageTestsConfiguration"
                enhancedImageMetadataEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                imageScanningConfiguration:
                  $ref: "#/components/schemas/ImageScanningConfiguration"
                workflows:
                  $ref: "#/components/schemas/WorkflowConfigurationList"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                loggingConfiguration:
                  $ref: "#/components/schemas/ImageLoggingConfiguration"
              required:
                - infrastructureConfigurationArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateImageResponse"
  /CreateImagePipeline:
    put:
      operationId: CreateImagePipeline
      description: Creates a new image pipeline. Image pipelines enable you to automate the creation and distribution of images.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                imageRecipeArn:
                  $ref: "#/components/schemas/ImageRecipeArn"
                containerRecipeArn:
                  $ref: "#/components/schemas/ContainerRecipeArn"
                infrastructureConfigurationArn:
                  $ref: "#/components/schemas/InfrastructureConfigurationArn"
                distributionConfigurationArn:
                  $ref: "#/components/schemas/DistributionConfigurationArn"
                imageTestsConfiguration:
                  $ref: "#/components/schemas/ImageTestsConfiguration"
                enhancedImageMetadataEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                schedule:
                  $ref: "#/components/schemas/Schedule"
                status:
                  $ref: "#/components/schemas/PipelineStatus"
                tags:
                  $ref: "#/components/schemas/TagMap"
                imageTags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                imageScanningConfiguration:
                  $ref: "#/components/schemas/ImageScanningConfiguration"
                workflows:
                  $ref: "#/components/schemas/WorkflowConfigurationList"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                loggingConfiguration:
                  $ref: "#/components/schemas/PipelineLoggingConfiguration"
              required:
                - name
                - infrastructureConfigurationArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateImagePipelineResponse"
  /CreateImageRecipe:
    put:
      operationId: CreateImageRecipe
      description: Creates a new image recipe. Image recipes define how images are configured, tested, and assessed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                semanticVersion:
                  $ref: "#/components/schemas/WildcardVersionNumber"
                components:
                  $ref: "#/components/schemas/ComponentConfigurationList"
                parentImage:
                  $ref: "#/components/schemas/NonEmptyString"
                blockDeviceMappings:
                  $ref: "#/components/schemas/InstanceBlockDeviceMappings"
                tags:
                  $ref: "#/components/schemas/TagMap"
                workingDirectory:
                  $ref: "#/components/schemas/NonEmptyString"
                additionalInstanceConfiguration:
                  $ref: "#/components/schemas/AdditionalInstanceConfiguration"
                amiTags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - semanticVersion
                - parentImage
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateImageRecipeResponse"
  /CreateInfrastructureConfiguration:
    put:
      operationId: CreateInfrastructureConfiguration
      description: Creates a new infrastructure configuration. An infrastructure configuration defines the environment in which your image will be built and tested.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                instanceTypes:
                  $ref: "#/components/schemas/InstanceTypeList"
                instanceProfileName:
                  $ref: "#/components/schemas/InstanceProfileNameType"
                securityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                subnetId:
                  $ref: "#/components/schemas/NonEmptyString"
                logging:
                  $ref: "#/components/schemas/Logging"
                keyPair:
                  $ref: "#/components/schemas/NonEmptyString"
                terminateInstanceOnFailure:
                  $ref: "#/components/schemas/NullableBoolean"
                snsTopicArn:
                  $ref: "#/components/schemas/SnsTopicArn"
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagMap"
                instanceMetadataOptions:
                  $ref: "#/components/schemas/InstanceMetadataOptions"
                tags:
                  $ref: "#/components/schemas/TagMap"
                placement:
                  $ref: "#/components/schemas/Placement"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - instanceProfileName
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInfrastructureConfigurationResponse"
  /CreateLifecyclePolicy:
    put:
      operationId: CreateLifecyclePolicy
      description: Create a lifecycle policy resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                status:
                  $ref: "#/components/schemas/LifecyclePolicyStatus"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                resourceType:
                  $ref: "#/components/schemas/LifecyclePolicyResourceType"
                policyDetails:
                  $ref: "#/components/schemas/LifecyclePolicyDetails"
                resourceSelection:
                  $ref: "#/components/schemas/LifecyclePolicyResourceSelection"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - executionRole
                - resourceType
                - policyDetails
                - resourceSelection
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLifecyclePolicyResponse"
  /CreateWorkflow:
    put:
      operationId: CreateWorkflow
      description: Create a new workflow or a new version of an existing workflow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                semanticVersion:
                  $ref: "#/components/schemas/VersionNumber"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                changeDescription:
                  $ref: "#/components/schemas/NonEmptyString"
                data:
                  $ref: "#/components/schemas/InlineWorkflowData"
                uri:
                  $ref: "#/components/schemas/Uri"
                kmsKeyId:
                  $ref: "#/components/schemas/NonEmptyString"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                type:
                  $ref: "#/components/schemas/WorkflowType"
                dryRun:
                  $ref: "#/components/schemas/Boolean"
              required:
                - name
                - semanticVersion
                - clientToken
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkflowResponse"
  /DeleteComponent:
    delete:
      operationId: DeleteComponent
      description: Deletes a component build version.
      parameters:
        - name: componentBuildVersionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ComponentBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the component build version to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteComponentResponse"
  /DeleteContainerRecipe:
    delete:
      operationId: DeleteContainerRecipe
      description: Deletes a container recipe.
      parameters:
        - name: containerRecipeArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ContainerRecipeArn"
          description: The Amazon Resource Name (ARN) of the container recipe to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContainerRecipeResponse"
  /DeleteDistributionConfiguration:
    delete:
      operationId: DeleteDistributionConfiguration
      description: Deletes a distribution configuration.
      parameters:
        - name: distributionConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DistributionConfigurationArn"
          description: The Amazon Resource Name (ARN) of the distribution configuration to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDistributionConfigurationResponse"
  /DeleteImage:
    delete:
      operationId: DeleteImage
      description: Deletes an Image Builder image resource. This does not delete any EC2 AMIs or ECR container images that are created during the image build process. You must clean those up separately, using the appropriate Amazon EC2 or Amazon ECR console actions, or API or CLI commands. To deregister an EC2 Linux AMI, see Deregister your Linux AMI in the Amazon EC2 User Guide . To deregister an EC2 Windows AMI, see Deregister your Windows AMI in the Amazon EC2 Windows Guide . To delete a container image from Amazon ECR, see Deleting an image in the Amazon ECR User Guide.
      parameters:
        - name: imageBuildVersionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImageBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the Image Builder image resource to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteImageResponse"
  /DeleteImagePipeline:
    delete:
      operationId: DeleteImagePipeline
      description: Deletes an image pipeline.
      parameters:
        - name: imagePipelineArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImagePipelineArn"
          description: The Amazon Resource Name (ARN) of the image pipeline to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteImagePipelineResponse"
  /DeleteImageRecipe:
    delete:
      operationId: DeleteImageRecipe
      description: Deletes an image recipe.
      parameters:
        - name: imageRecipeArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImageRecipeArn"
          description: The Amazon Resource Name (ARN) of the image recipe to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteImageRecipeResponse"
  /DeleteInfrastructureConfiguration:
    delete:
      operationId: DeleteInfrastructureConfiguration
      description: Deletes an infrastructure configuration.
      parameters:
        - name: infrastructureConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/InfrastructureConfigurationArn"
          description: The Amazon Resource Name (ARN) of the infrastructure configuration to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInfrastructureConfigurationResponse"
  /DeleteLifecyclePolicy:
    delete:
      operationId: DeleteLifecyclePolicy
      description: Delete the specified lifecycle policy resource.
      parameters:
        - name: lifecyclePolicyArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/LifecyclePolicyArn"
          description: The Amazon Resource Name (ARN) of the lifecycle policy resource to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLifecyclePolicyResponse"
  /DeleteWorkflow:
    delete:
      operationId: DeleteWorkflow
      description: Deletes a specific workflow resource.
      parameters:
        - name: workflowBuildVersionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/WorkflowBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the workflow resource to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowResponse"
  /DistributeImage:
    put:
      operationId: DistributeImage
      description: DistributeImage distributes existing AMIs to additional regions and accounts without rebuilding the image.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceImage:
                  $ref: "#/components/schemas/NonEmptyString"
                distributionConfigurationArn:
                  $ref: "#/components/schemas/DistributionConfigurationArn"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                loggingConfiguration:
                  $ref: "#/components/schemas/ImageLoggingConfiguration"
              required:
                - sourceImage
                - distributionConfigurationArn
                - executionRole
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributeImageResponse"
  /GetComponent:
    get:
      operationId: GetComponent
      description: Gets a component object.
      parameters:
        - name: componentBuildVersionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ComponentVersionArnOrBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the component that you want to get. Regex requires the suffix /\d+$.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentResponse"
  /GetComponentPolicy:
    get:
      operationId: GetComponentPolicy
      description: Gets a component policy.
      parameters:
        - name: componentArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ComponentBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the component whose policy you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentPolicyResponse"
  /GetContainerRecipe:
    get:
      operationId: GetContainerRecipe
      description: Retrieves a container recipe.
      parameters:
        - name: containerRecipeArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ContainerRecipeArn"
          description: The Amazon Resource Name (ARN) of the container recipe to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContainerRecipeResponse"
  /GetContainerRecipePolicy:
    get:
      operationId: GetContainerRecipePolicy
      description: Retrieves the policy for a container recipe.
      parameters:
        - name: containerRecipeArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ContainerRecipeArn"
          description: The Amazon Resource Name (ARN) of the container recipe for the policy being requested.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContainerRecipePolicyResponse"
  /GetDistributionConfiguration:
    get:
      operationId: GetDistributionConfiguration
      description: Gets a distribution configuration.
      parameters:
        - name: distributionConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/DistributionConfigurationArn"
          description: The Amazon Resource Name (ARN) of the distribution configuration that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDistributionConfigurationResponse"
  /GetImage:
    get:
      operationId: GetImage
      description: Gets an image.
      parameters:
        - name: imageBuildVersionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImageVersionArnOrBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the image that you want to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImageResponse"
  /GetImagePipeline:
    get:
      operationId: GetImagePipeline
      description: Gets an image pipeline.
      parameters:
        - name: imagePipelineArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImagePipelineArn"
          description: The Amazon Resource Name (ARN) of the image pipeline that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImagePipelineResponse"
  /GetImagePolicy:
    get:
      operationId: GetImagePolicy
      description: Gets an image policy.
      parameters:
        - name: imageArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImageBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the image whose policy you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImagePolicyResponse"
  /GetImageRecipe:
    get:
      operationId: GetImageRecipe
      description: Gets an image recipe.
      parameters:
        - name: imageRecipeArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImageRecipeArn"
          description: The Amazon Resource Name (ARN) of the image recipe that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImageRecipeResponse"
  /GetImageRecipePolicy:
    get:
      operationId: GetImageRecipePolicy
      description: Gets an image recipe policy.
      parameters:
        - name: imageRecipeArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ImageRecipeArn"
          description: The Amazon Resource Name (ARN) of the image recipe whose policy you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetImageRecipePolicyResponse"
  /GetInfrastructureConfiguration:
    get:
      operationId: GetInfrastructureConfiguration
      description: Gets an infrastructure configuration.
      parameters:
        - name: infrastructureConfigurationArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/InfrastructureConfigurationArn"
          description: The Amazon Resource Name (ARN) of the infrastructure configuration that you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInfrastructureConfigurationResponse"
  /GetLifecycleExecution:
    get:
      operationId: GetLifecycleExecution
      description: Get the runtime information that was logged for a specific runtime instance of the lifecycle policy.
