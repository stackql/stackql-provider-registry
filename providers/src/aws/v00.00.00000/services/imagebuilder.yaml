                $ref: "#/components/schemas/PutComponentPolicyResponse"
  /PutContainerRecipePolicy:
    put:
      operationId: PutContainerRecipePolicy
      description: Applies a policy to a container image. We recommend that you call the RAM API CreateResourceShare (https://docs.aws.amazon.com//ram/latest/APIReference/API_CreateResourceShare.html) to share resources. If you call the Image Builder API PutContainerImagePolicy, you must also call the RAM API PromoteResourceShareCreatedFromPolicy (https://docs.aws.amazon.com//ram/latest/APIReference/API_PromoteResourceShareCreatedFromPolicy.html) in order for the resource to be visible to all principals with whom the resource is shared.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                containerRecipeArn:
                  $ref: "#/components/schemas/ContainerRecipeArn"
                policy:
                  $ref: "#/components/schemas/ResourcePolicyDocument"
              required:
                - containerRecipeArn
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutContainerRecipePolicyResponse"
  /PutImagePolicy:
    put:
      operationId: PutImagePolicy
      description: Applies a policy to an image. We recommend that you call the RAM API CreateResourceShare to share resources. If you call the Image Builder API PutImagePolicy, you must also call the RAM API PromoteResourceShareCreatedFromPolicy in order for the resource to be visible to all principals with whom the resource is shared.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageArn:
                  $ref: "#/components/schemas/ImageBuildVersionArn"
                policy:
                  $ref: "#/components/schemas/ResourcePolicyDocument"
              required:
                - imageArn
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutImagePolicyResponse"
  /PutImageRecipePolicy:
    put:
      operationId: PutImageRecipePolicy
      description: Applies a policy to an image recipe. We recommend that you call the RAM API CreateResourceShare to share resources. If you call the Image Builder API PutImageRecipePolicy, you must also call the RAM API PromoteResourceShareCreatedFromPolicy in order for the resource to be visible to all principals with whom the resource is shared.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageRecipeArn:
                  $ref: "#/components/schemas/ImageRecipeArn"
                policy:
                  $ref: "#/components/schemas/ResourcePolicyDocument"
              required:
                - imageRecipeArn
                - policy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutImageRecipePolicyResponse"
  /RetryImage:
    put:
      operationId: RetryImage
      description: RetryImage retries an image distribution without rebuilding the image.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageBuildVersionArn:
                  $ref: "#/components/schemas/ImageBuildVersionArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - imageBuildVersionArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryImageResponse"
  /SendWorkflowStepAction:
    put:
      operationId: SendWorkflowStepAction
      description: Pauses or resumes image creation when the associated workflow runs a WaitForAction step.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stepExecutionId:
                  $ref: "#/components/schemas/WorkflowStepExecutionId"
                imageBuildVersionArn:
                  $ref: "#/components/schemas/ImageBuildVersionArn"
                action:
                  $ref: "#/components/schemas/WorkflowStepActionType"
                reason:
                  $ref: "#/components/schemas/NonEmptyString"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - stepExecutionId
                - imageBuildVersionArn
                - action
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendWorkflowStepActionResponse"
  /StartImagePipelineExecution:
    put:
      operationId: StartImagePipelineExecution
      description: Manually triggers a pipeline to create an image.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imagePipelineArn:
                  $ref: "#/components/schemas/ImagePipelineArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - imagePipelineArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartImagePipelineExecutionResponse"
  /StartResourceStateUpdate:
    put:
      operationId: StartResourceStateUpdate
      description: Begin asynchronous resource state update for lifecycle changes to the specified image resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ImageBuildVersionArn"
                state:
                  $ref: "#/components/schemas/ResourceState"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                includeResources:
                  $ref: "#/components/schemas/ResourceStateUpdateIncludeResources"
                exclusionRules:
                  $ref: "#/components/schemas/ResourceStateUpdateExclusionRules"
                updateAt:
                  $ref: "#/components/schemas/DateTimeTimestamp"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - resourceArn
                - state
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResourceStateUpdateResponse"
  /UpdateDistributionConfiguration:
    put:
      operationId: UpdateDistributionConfiguration
      description: Updates a new distribution configuration. Distribution configurations define and configure the outputs of your pipeline.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                distributionConfigurationArn:
                  $ref: "#/components/schemas/DistributionConfigurationArn"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                distributions:
                  $ref: "#/components/schemas/DistributionList"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - distributionConfigurationArn
                - distributions
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDistributionConfigurationResponse"
  /UpdateImagePipeline:
    put:
      operationId: UpdateImagePipeline
      description: Updates an image pipeline. Image pipelines enable you to automate the creation and distribution of images. You must specify exactly one recipe for your image, using either a containerRecipeArn or an imageRecipeArn. UpdateImagePipeline does not support selective updates for the pipeline. You must specify all of the required properties in the update request, not just the properties that have changed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imagePipelineArn:
                  $ref: "#/components/schemas/ImagePipelineArn"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                imageRecipeArn:
                  $ref: "#/components/schemas/ImageRecipeArn"
                containerRecipeArn:
                  $ref: "#/components/schemas/ContainerRecipeArn"
                infrastructureConfigurationArn:
                  $ref: "#/components/schemas/InfrastructureConfigurationArn"
                distributionConfigurationArn:
                  $ref: "#/components/schemas/DistributionConfigurationArn"
                imageTestsConfiguration:
                  $ref: "#/components/schemas/ImageTestsConfiguration"
                enhancedImageMetadataEnabled:
                  $ref: "#/components/schemas/NullableBoolean"
                schedule:
                  $ref: "#/components/schemas/Schedule"
                status:
                  $ref: "#/components/schemas/PipelineStatus"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                imageScanningConfiguration:
                  $ref: "#/components/schemas/ImageScanningConfiguration"
                workflows:
                  $ref: "#/components/schemas/WorkflowConfigurationList"
                loggingConfiguration:
                  $ref: "#/components/schemas/PipelineLoggingConfiguration"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                imageTags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - imagePipelineArn
                - infrastructureConfigurationArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateImagePipelineResponse"
  /UpdateInfrastructureConfiguration:
    put:
      operationId: UpdateInfrastructureConfiguration
      description: Updates a new infrastructure configuration. An infrastructure configuration defines the environment in which your image will be built and tested.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                infrastructureConfigurationArn:
                  $ref: "#/components/schemas/InfrastructureConfigurationArn"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                instanceTypes:
                  $ref: "#/components/schemas/InstanceTypeList"
                instanceProfileName:
                  $ref: "#/components/schemas/InstanceProfileNameType"
                securityGroupIds:
                  $ref: "#/components/schemas/SecurityGroupIds"
                subnetId:
                  $ref: "#/components/schemas/NonEmptyString"
                logging:
                  $ref: "#/components/schemas/Logging"
                keyPair:
                  $ref: "#/components/schemas/NonEmptyString"
                terminateInstanceOnFailure:
                  $ref: "#/components/schemas/NullableBoolean"
                snsTopicArn:
                  $ref: "#/components/schemas/SnsTopicArn"
                resourceTags:
                  $ref: "#/components/schemas/ResourceTagMap"
                instanceMetadataOptions:
                  $ref: "#/components/schemas/InstanceMetadataOptions"
                placement:
                  $ref: "#/components/schemas/Placement"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - infrastructureConfigurationArn
                - instanceProfileName
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInfrastructureConfigurationResponse"
  /UpdateLifecyclePolicy:
    put:
      operationId: UpdateLifecyclePolicy
      description: Update the specified lifecycle policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lifecyclePolicyArn:
                  $ref: "#/components/schemas/LifecyclePolicyArn"
                description:
                  $ref: "#/components/schemas/NonEmptyString"
                status:
                  $ref: "#/components/schemas/LifecyclePolicyStatus"
                executionRole:
                  $ref: "#/components/schemas/RoleNameOrArn"
                resourceType:
                  $ref: "#/components/schemas/LifecyclePolicyResourceType"
                policyDetails:
                  $ref: "#/components/schemas/LifecyclePolicyDetails"
                resourceSelection:
                  $ref: "#/components/schemas/LifecyclePolicyResourceSelection"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - lifecyclePolicyArn
                - executionRole
                - resourceType
                - policyDetails
                - resourceSelection
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLifecyclePolicyResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ImageBuildVersionArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws(?:-[a-z-]+)?):image/[a-z0-9-_]+/[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
    CancelImageCreationResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        imageBuildVersionArn:
          $ref: "#/components/schemas/ImageBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the image whose creation this request canceled.
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 1024
    LifecycleExecutionId:
      type: string
      pattern: ^lce-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    CancelLifecycleExecutionResponse:
      type: object
      properties:
        lifecycleExecutionId:
          $ref: "#/components/schemas/LifecycleExecutionId"
          description: The unique identifier for the image lifecycle runtime instance that was canceled.
    ResourceName:
      type: string
      pattern: ^[-_A-Za-z-0-9][-_A-Za-z0-9 ]{1,126}[-_A-Za-z-0-9]$
    VersionNumber:
      type: string
      pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
    Platform:
      type: string
      enum:
        - Windows
        - Linux
        - macOS
    OsVersionList:
      type: array
      items:
        $ref: "#/components/schemas/OsVersion"
    OsVersion:
      type: string
      minLength: 1
    InlineComponentData:
      type: string
      minLength: 1
      maxLength: 16000
      pattern: "[^\\x00]+"
    Uri:
      type: string
    TagMap:
      type: object
      properties: {}
    Boolean:
      type: boolean
    CreateComponentResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        componentBuildVersionArn:
          $ref: "#/components/schemas/ComponentBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the component that the request created.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    ComponentBuildVersionArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws(?:-[a-z-]+)?):component/[a-z0-9-_]+/[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$
    LatestVersionReferences:
      description: The resource ARNs with different wildcard variations of semantic versioning.
      type: object
      properties:
        latestVersionArn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: The latest version Amazon Resource Name (ARN) of the Image Builder resource.
        latestMajorVersionArn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: The latest version Amazon Resource Name (ARN) with the same major version of the Image Builder resource.
        latestMinorVersionArn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: The latest version Amazon Resource Name (ARN) with the same minor version of the Image Builder resource.
        latestPatchVersionArn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: The latest version Amazon Resource Name (ARN) with the same patch version of the Image Builder resource.
    ImageBuilderArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws(?:-[a-z-]+)?):(?:image-recipe|container-recipe|infrastructure-configuration|distribution-configuration|component|image|image-pipeline|lifecycle-policy|workflow\/(?:build|test|distribution))/[a-z0-9-_]+(?:/(?:(?:x|[0-9]+)\.(?:x|[0-9]+)\.(?:x|[0-9]+))(?:/[0-9]+)?)?$
    ContainerType:
      type: string
      enum:
        - DOCKER
    WildcardVersionNumber:
      type: string
      pattern: ^(?:[0-9]+|x)\.(?:[0-9]+|x)\.(?:[0-9]+|x)$
    ComponentConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentConfiguration"
    ComponentConfiguration:
      description: Configuration details of the component.
      type: object
      properties:
        componentArn:
          $ref: "#/components/schemas/ComponentVersionArnOrBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the component.
        parameters:
          $ref: "#/components/schemas/ComponentParameterList"
          description: A group of parameter settings that Image Builder uses to configure the component for a specific recipe.
      required:
        - componentArn
    ComponentVersionArnOrBuildVersionArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws(?:-[a-z-]+)?):component/[a-z0-9-_]+/(?:(?:([0-9]+|x)\.([0-9]+|x)\.([0-9]+|x))|(?:[0-9]+\.[0-9]+\.[0-9]+/[0-9]+))$
    ComponentParameterList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentParameter"
    ComponentParameter:
      description: Contains a key/value pair that sets the named component parameter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ComponentParameterName"
          description: The name of the component parameter to set.
        value:
          $ref: "#/components/schemas/ComponentParameterValueList"
          description: Sets the value for the named component parameter.
      required:
        - name
        - value
    ComponentParameterName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[^\\x00]+"
    ComponentParameterValueList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentParameterValue"
    ComponentParameterValue:
      type: string
      minLength: 0
      pattern: "[^\\x00]*"
    InstanceConfiguration:
      description: Defines a custom base AMI and block device mapping configurations of an instance used for building and testing container images.
      type: object
      properties:
        image:
          $ref: "#/components/schemas/NonEmptyString"
          description: The base image for a container build and test instance. This can contain an AMI ID or it can specify an Amazon Web Services Systems Manager (SSM) Parameter Store Parameter, prefixed by ssm:, followed by the parameter name or ARN. If not specified, Image Builder uses the appropriate ECS-optimized AMI as a base image.
        blockDeviceMappings:
          $ref: "#/components/schemas/InstanceBlockDeviceMappings"
          description: Defines the block devices to attach for building an instance from this Image Builder AMI.
    InstanceBlockDeviceMappings:
      type: array
      items:
        $ref: "#/components/schemas/InstanceBlockDeviceMapping"
    InstanceBlockDeviceMapping:
      description: Defines block device mappings for the instance used to configure your image.
      type: object
      properties:
        deviceName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The device to which these mappings apply.
        ebs:
          $ref: "#/components/schemas/EbsInstanceBlockDeviceSpecification"
          description: Use to manage Amazon EBS-specific configuration for this mapping.
        virtualName:
          $ref: "#/components/schemas/NonEmptyString"
          description: Use to manage instance ephemeral devices.
        noDevice:
          $ref: "#/components/schemas/EmptyString"
          description: Use to remove a mapping from the base image.
    EbsInstanceBlockDeviceSpecification:
      description: Amazon EBS-specific block device mapping specifications.
      type: object
      properties:
        encrypted:
          $ref: "#/components/schemas/NullableBoolean"
          description: Use to configure device encryption.
        deleteOnTermination:
          $ref: "#/components/schemas/NullableBoolean"
          description: Use to configure delete on termination of the associated device.
        iops:
          $ref: "#/components/schemas/EbsIopsInteger"
          description: Use to configure device IOPS.
        kmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) that uniquely identifies the KMS key to use when encrypting the device. This can be either the Key ARN or the Alias ARN. For more information, see Key identifiers (KeyId) in the Key Management Service Developer Guide.
        snapshotId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The snapshot that defines the device contents.
        volumeSize:
          $ref: "#/components/schemas/EbsVolumeSizeInteger"
          description: Use to override the device's volume size.
        volumeType:
          $ref: "#/components/schemas/EbsVolumeType"
          description: Use to override the device's volume type.
        throughput:
          $ref: "#/components/schemas/EbsVolumeThroughput"
          description: For GP3 volumes only – The throughput in MiB/s that the volume supports.
    NullableBoolean:
      type: boolean
    EbsIopsInteger:
      type: integer
      minimum: 100
      maximum: 64000
    EbsVolumeSizeInteger:
      type: integer
      minimum: 1
      maximum: 16000
    EbsVolumeType:
      type: string
      enum:
        - standard
        - io1
        - io2
        - gp2
        - gp3
        - sc1
        - st1
    EbsVolumeThroughput:
      type: integer
      minimum: 125
      maximum: 1000
    EmptyString:
      type: string
      minLength: 0
      maxLength: 0
    InlineDockerFileTemplate:
      type: string
      minLength: 1
      maxLength: 16000
      pattern: "[^\\x00]+"
    TargetContainerRepository:
      description: The container repository where the output container image is stored.
      type: object
      properties:
        service:
          $ref: "#/components/schemas/ContainerRepositoryService"
          description: Specifies the service in which this image was registered.
        repositoryName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the container repository where the output container image is stored. This name is prefixed by the repository location. For example, <repository location url>/repository_name.
      required:
        - service
        - repositoryName
    ContainerRepositoryService:
      type: string
      enum:
        - ECR
    CreateContainerRecipeResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        containerRecipeArn:
          $ref: "#/components/schemas/ContainerRecipeArn"
          description: Returns the Amazon Resource Name (ARN) of the container recipe that the request created.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    ContainerRecipeArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws):container-recipe/[a-z0-9-_]+/(?:[0-9]+|x)\.(?:[0-9]+|x)\.(?:[0-9]+|x)$
    DistributionList:
      type: array
      items:
        $ref: "#/components/schemas/Distribution"
    Distribution:
      description: Defines the settings for a specific Region.
      type: object
      properties:
        region:
          $ref: "#/components/schemas/NonEmptyString"
          description: The target Region.
        amiDistributionConfiguration:
          $ref: "#/components/schemas/AmiDistributionConfiguration"
          description: The specific AMI settings; for example, launch permissions or AMI tags.
        containerDistributionConfiguration:
          $ref: "#/components/schemas/ContainerDistributionConfiguration"
          description: Container distribution settings for encryption, licensing, and sharing in a specific Region.
        licenseConfigurationArns:
          $ref: "#/components/schemas/LicenseConfigurationArnList"
          description: The License Manager Configuration to associate with the AMI in the specified Region.
        launchTemplateConfigurations:
          $ref: "#/components/schemas/LaunchTemplateConfigurationList"
          description: A group of launchTemplateConfiguration settings that apply to image distribution for specified accounts.
        s3ExportConfiguration:
          $ref: "#/components/schemas/S3ExportConfiguration"
          description: Configure export settings to deliver disk images created from your image build, using a file format that is compatible with your VMs in that Region.
        fastLaunchConfigurations:
          $ref: "#/components/schemas/FastLaunchConfigurationList"
          description: The Windows faster-launching configurations to use for AMI distribution.
        ssmParameterConfigurations:
          $ref: "#/components/schemas/SsmParameterConfigurationList"
          description: Contains settings to update Amazon Web Services Systems Manager (SSM) Parameter Store Parameters with output AMI IDs from the build by target Region.
      required:
        - region
    AmiDistributionConfiguration:
      description: Define and configure the output AMIs of the pipeline.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AmiNameString"
          description: The name of the output AMI.
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the AMI distribution configuration. Minimum and maximum length are in characters.
        targetAccountIds:
          $ref: "#/components/schemas/AccountList"
          description: The ID of an account to which you want to distribute an image.
        amiTags:
          type: object
          properties: {}
          description: The tags to apply to AMIs distributed to this Region.
        kmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) that uniquely identifies the KMS key used to encrypt the distributed image. This can be either the Key ARN or the Alias ARN. For more information, see Key identifiers (KeyId) in the Key Management Service Developer Guide.
        launchPermission:
          $ref: "#/components/schemas/LaunchPermissionConfiguration"
          description: Launch permissions can be used to configure which Amazon Web Services accounts can use the AMI to launch instances.
    AmiNameString:
      type: string
      minLength: 1
      maxLength: 127
      pattern: ^[-_A-Za-z0-9{][-_A-Za-z0-9\s:{}\.]+[-_A-Za-z0-9}]$
    AccountList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      pattern: ^[0-9]{12}$
    LaunchPermissionConfiguration:
      description: Describes the configuration for a launch permission. The launch permission modification request is sent to the Amazon EC2 ModifyImageAttribute API on behalf of the user for each Region they have selected to distribute the AMI. To make an AMI public, set the launch permission authorized accounts to all. See the examples for making an AMI public at Amazon EC2 ModifyImageAttribute.
      type: object
      properties:
        userIds:
          $ref: "#/components/schemas/AccountList"
          description: The Amazon Web Services account ID.
        userGroups:
          $ref: "#/components/schemas/StringList"
          description: The name of the group.
        organizationArns:
          $ref: "#/components/schemas/OrganizationArnList"
          description: The ARN for an Amazon Web Services Organization that you want to share your AMI with. For more information, see What is Organizations?.
        organizationalUnitArns:
          $ref: "#/components/schemas/OrganizationalUnitArnList"
          description: The ARN for an Organizations organizational unit (OU) that you want to share your AMI with. For more information about key concepts for Organizations, see Organizations terminology and concepts.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    OrganizationArnList:
      type: array
      items:
        $ref: "#/components/schemas/OrganizationArn"
    OrganizationArn:
      type: string
      pattern: ^arn:aws[^:]*:organizations::[0-9]{12}:organization/o-[a-z0-9]{10,32}$
    OrganizationalUnitArnList:
      type: array
      items:
        $ref: "#/components/schemas/OrganizationalUnitArn"
    OrganizationalUnitArn:
      type: string
      pattern: ^arn:aws[^:]*:organizations::[0-9]{12}:ou/o-[a-z0-9]{10,32}/ou-[0-9a-z]{4,32}-[0-9a-z]{8,32}
    ContainerDistributionConfiguration:
      description: Container distribution settings for encryption, licensing, and sharing in a specific Region.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the container distribution configuration.
        containerTags:
          $ref: "#/components/schemas/StringList"
          description: Tags that are attached to the container distribution configuration.
        targetRepository:
          $ref: "#/components/schemas/TargetContainerRepository"
          description: The destination repository for the container distribution configuration.
      required:
        - targetRepository
    LicenseConfigurationArnList:
      type: array
      items:
        $ref: "#/components/schemas/LicenseConfigurationArn"
    LicenseConfigurationArn:
      type: string
      pattern: ^arn:aws[^:]*:license-manager:[^:]+:[0-9]{12}:license-configuration:lic-[a-z0-9-_]{32}$
    LaunchTemplateConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/LaunchTemplateConfiguration"
    LaunchTemplateConfiguration:
      description: Identifies an Amazon EC2 launch template to use for a specific account.
      type: object
      properties:
        launchTemplateId:
          $ref: "#/components/schemas/LaunchTemplateId"
          description: Identifies the Amazon EC2 launch template to use.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The account ID that this configuration applies to.
        setDefaultVersion:
          $ref: "#/components/schemas/Boolean"
          description: Set the specified Amazon EC2 launch template as the default launch template for the specified account.
      required:
        - launchTemplateId
    LaunchTemplateId:
      type: string
      pattern: ^lt-[a-z0-9-_]{17}$
    S3ExportConfiguration:
      description: Properties that configure export from your build instance to a compatible file format for your VM.
      type: object
      properties:
        roleName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the role that grants VM Import/Export permission to export images to your S3 bucket.
        diskImageFormat:
          $ref: "#/components/schemas/DiskImageFormat"
          description: "Export the updated image to one of the following supported disk image formats: Virtual Hard Disk (VHD) – Compatible with Citrix Xen and Microsoft Hyper-V virtualization products. Stream-optimized ESX Virtual Machine Disk (VMDK) – Compatible with VMware ESX and VMware vSphere versions 4, 5, and 6. Raw – Raw format."
        s3Bucket:
          $ref: "#/components/schemas/NonEmptyString"
          description: The S3 bucket in which to store the output disk images for your VM.
        s3Prefix:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon S3 path for the bucket where the output disk images for your VM are stored.
      required:
        - roleName
        - diskImageFormat
        - s3Bucket
    DiskImageFormat:
      type: string
      enum:
        - VMDK
        - RAW
        - VHD
    FastLaunchConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/FastLaunchConfiguration"
    FastLaunchConfiguration:
      description: Define and configure faster launching for output Windows AMIs.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean that represents the current state of faster launching for the Windows AMI. Set to true to start using Windows faster launching, or false to stop using it.
        snapshotConfiguration:
          $ref: "#/components/schemas/FastLaunchSnapshotConfiguration"
          description: Configuration settings for managing the number of snapshots that are created from pre-provisioned instances for the Windows AMI when faster launching is enabled.
        maxParallelLaunches:
          $ref: "#/components/schemas/MaxParallelLaunches"
          description: The maximum number of parallel instances that are launched for creating resources.
        launchTemplate:
          $ref: "#/components/schemas/FastLaunchLaunchTemplateSpecification"
          description: The launch template that the fast-launch enabled Windows AMI uses when it launches Windows instances to create pre-provisioned snapshots.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The owner account ID for the fast-launch enabled Windows AMI.
      required:
        - enabled
    FastLaunchSnapshotConfiguration:
      description: Configuration settings for creating and managing pre-provisioned snapshots for a fast-launch enabled Windows AMI.
      type: object
      properties:
        targetResourceCount:
          $ref: "#/components/schemas/TargetResourceCount"
          description: The number of pre-provisioned snapshots to keep on hand for a fast-launch enabled Windows AMI.
    TargetResourceCount:
      type: integer
      minimum: 1
      maximum: 10000
    MaxParallelLaunches:
      type: integer
      minimum: 1
    FastLaunchLaunchTemplateSpecification:
      description: Identifies the launch template that the associated Windows AMI uses for launching an instance when faster launching is enabled. You can specify either the launchTemplateName or the launchTemplateId, but not both.
      type: object
      properties:
        launchTemplateId:
          $ref: "#/components/schemas/LaunchTemplateId"
          description: The ID of the launch template to use for faster launching for a Windows AMI.
        launchTemplateName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the launch template to use for faster launching for a Windows AMI.
        launchTemplateVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The version of the launch template to use for faster launching for a Windows AMI.
    SsmParameterConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SsmParameterConfiguration"
    SsmParameterConfiguration:
      description: Configuration for a single Parameter in the Amazon Web Services Systems Manager (SSM) Parameter Store in a given Region.
      type: object
      properties:
        amiAccountId:
          $ref: "#/components/schemas/AccountId"
          description: Specify the account that will own the Parameter in a given Region. During distribution, this account must be specified in distribution settings as a target account for the Region.
        parameterName:
          $ref: "#/components/schemas/SsmParameterName"
          description: This is the name of the Parameter in the target Region or account. The image distribution creates the Parameter if it doesn't already exist. Otherwise, it updates the parameter.
        dataType:
          $ref: "#/components/schemas/SsmParameterDataType"
          description: The data type specifies what type of value the Parameter contains. We recommend that you use data type aws:ec2:image.
      required:
        - parameterName
    SsmParameterName:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: ^[a-zA-Z0-9_.\-\/]+$
    SsmParameterDataType:
      type: string
      enum:
        - text
        - aws:ec2:image
    CreateDistributionConfigurationResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        distributionConfigurationArn:
          $ref: "#/components/schemas/DistributionConfigurationArn"
          description: The Amazon Resource Name (ARN) of the distribution configuration that was created by this request.
    DistributionConfigurationArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws):distribution-configuration/[a-z0-9-_]+$
    ImageRecipeArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws):image-recipe/[a-z0-9-_]+/(?:[0-9]+|x)\.(?:[0-9]+|x)\.(?:[0-9]+|x)$
    InfrastructureConfigurationArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws):infrastructure-configuration/[a-z0-9-_]+$
    ImageTestsConfiguration:
      description: Configure image tests for your pipeline build. Tests run after building the image, to verify that the AMI or container image is valid before distributing it.
      type: object
      properties:
        imageTestsEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Determines if tests should run after building the image. Image Builder defaults to enable tests to run following the image build, before image distribution.
        timeoutMinutes:
          $ref: "#/components/schemas/ImageTestsTimeoutMinutes"
          description: The maximum time in minutes that tests are permitted to run. The timeout property is not currently active. This value is ignored.
    ImageTestsTimeoutMinutes:
      type: integer
      minimum: 60
      maximum: 1440
    ImageScanningConfiguration:
      description: Contains settings for Image Builder image resource and container image scans.
      type: object
      properties:
        imageScanningEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: A setting that indicates whether Image Builder keeps a snapshot of the vulnerability scans that Amazon Inspector runs against the build instance when you create a new image.
        ecrConfiguration:
          $ref: "#/components/schemas/EcrConfiguration"
          description: Contains Amazon ECR settings for vulnerability scans.
    EcrConfiguration:
      description: Settings that Image Builder uses to configure the ECR repository and the output container images that Amazon Inspector scans.
      type: object
      properties:
        repositoryName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the container repository that Amazon Inspector scans to identify findings for your container images. The name includes the path for the repository location. If you don’t provide this information, Image Builder creates a repository in your account named image-builder-image-scanning-repository for vulnerability scans of your output container images.
        containerTags:
          $ref: "#/components/schemas/StringList"
          description: Tags for Image Builder to apply to the output container image that Amazon Inspector scans. Tags can help you identify and manage your scanned images.
    WorkflowConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/WorkflowConfiguration"
    WorkflowConfiguration:
      description: Contains control settings and configurable inputs for a workflow resource.
      type: object
      properties:
        workflowArn:
          $ref: "#/components/schemas/WorkflowVersionArnOrBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the workflow resource.
        parameters:
          $ref: "#/components/schemas/WorkflowParameterList"
          description: Contains parameter values for each of the parameters that the workflow document defined for the workflow resource.
        parallelGroup:
          $ref: "#/components/schemas/ParallelGroup"
          description: Test workflows are defined within named runtime groups called parallel groups. The parallel group is the named group that contains this test workflow. Test workflows within a parallel group can run at the same time. Image Builder starts up to five test workflows in the group at the same time, and starts additional workflows as others complete, until all workflows in the group have completed. This field only applies for test workflows.
        onFailure:
          $ref: "#/components/schemas/OnWorkflowFailure"
          description: The action to take if the workflow fails.
      required:
        - workflowArn
    WorkflowVersionArnOrBuildVersionArn:
      type: string
      pattern: ^arn:aws(?:-[a-z]+)*:imagebuilder:[a-z]{2,}(?:-[a-z]+)+-[0-9]+:(?:[0-9]{12}|aws(?:-[a-z-]+)?):workflow/(build|test|distribution)/[a-z0-9-_]+/(?:(?:([0-9]+|x)\.([0-9]+|x)\.([0-9]+|x))|(?:[0-9]+\.[0-9]+\.[0-9]+/[0-9]+))$
    WorkflowParameterList:
      type: array
      items:
        $ref: "#/components/schemas/WorkflowParameter"
    WorkflowParameter:
      description: Contains a key/value pair that sets the named workflow parameter.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/WorkflowParameterName"
          description: The name of the workflow parameter to set.
        value:
          $ref: "#/components/schemas/WorkflowParameterValueList"
          description: Sets the value for the named workflow parameter.
      required:
        - name
        - value
    WorkflowParameterName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[^\\x00]+"
    WorkflowParameterValueList:
      type: array
      items:
        $ref: "#/components/schemas/WorkflowParameterValue"
    WorkflowParameterValue:
      type: string
      minLength: 0
      pattern: "[^\\x00]*"
    ParallelGroup:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[A-Za-z0-9][A-Za-z0-9-_+#]{0,99}$
    OnWorkflowFailure:
      type: string
      enum:
        - CONTINUE
        - ABORT
    RoleNameOrArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(?:arn:aws(?:-[a-z]+)*:iam::[0-9]{12}:role/)?[a-zA-Z_0-9+=,.@\-_/]+$
    ImageLoggingConfiguration:
      description: The logging configuration that's defined for the image. Image Builder uses the defined settings to direct execution log output during image creation.
      type: object
      properties:
        logGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The log group name that Image Builder uses for image creation. If not specified, the log group name defaults to /aws/imagebuilder/image-name.
    LogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^[a-zA-Z0-9\-_/\.]{1,512}$
    CreateImageResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        imageBuildVersionArn:
          $ref: "#/components/schemas/ImageBuildVersionArn"
          description: The Amazon Resource Name (ARN) of the image that the request created.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    Schedule:
      description: A schedule configures when and how often a pipeline will automatically create a new image.
      type: object
      properties:
        scheduleExpression:
          $ref: "#/components/schemas/NonEmptyString"
          description: The cron expression determines how often EC2 Image Builder evaluates your pipelineExecutionStartCondition. For information on how to format a cron expression in Image Builder, see Use cron expressions in EC2 Image Builder.
        timezone:
          $ref: "#/components/schemas/Timezone"
          description: The timezone that applies to the scheduling expression. For example, "Etc/UTC", "America/Los_Angeles" in the IANA timezone format. If not specified this defaults to UTC.
        pipelineExecutionStartCondition:
          $ref: "#/components/schemas/PipelineExecutionStartCondition"
          description: The start condition configures when the pipeline should trigger a new image build, as follows. If no value is set Image Builder defaults to EXPRESSION_MATCH_AND_DEPENDENCY_UPDATES_AVAILABLE. EXPRESSION_MATCH_AND_DEPENDENCY_UPDATES_AVAILABLE (default) – When you use semantic version filters on the base image or components in your image recipe, EC2 Image Builder builds a new image only when there are new versions of the base image or components in your recipe that match the filter. For semantic version syntax, see CreateComponent. EXPRESSION_MATCH_ONLY – This condition builds a new image every time the CRON expression matches the current time.
        autoDisablePolicy:
          $ref: "#/components/schemas/AutoDisablePolicy"
          description: The policy that configures when Image Builder should automatically disable a pipeline that is failing.
    Timezone:
      type: string
      minLength: 3
      maxLength: 100
      pattern: "[a-zA-Z0-9]{2,}(?:\\/[a-zA-Z0-9-_+]+)*"
    PipelineExecutionStartCondition:
      type: string
      enum:
        - EXPRESSION_MATCH_ONLY
        - EXPRESSION_MATCH_AND_DEPENDENCY_UPDATES_AVAILABLE
    AutoDisablePolicy:
      description: Defines the rules by which an image pipeline is automatically disabled when it fails.
      type: object
      properties:
        failureCount:
          $ref: "#/components/schemas/AutoDisableFailureCount"
          description: The number of consecutive scheduled image pipeline executions that must fail before Image Builder automatically disables the pipeline.
      required:
        - failureCount
    AutoDisableFailureCount:
      type: integer
      minimum: 1
      maximum: 10
    PipelineStatus:
      type: string
      enum:
        - DISABLED
        - ENABLED
    PipelineLoggingConfiguration:
      description: The logging configuration that's defined for pipeline execution.
      type: object
      properties:
        imageLogGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The log group name that Image Builder uses for image creation. If not specified, the log group name defaults to /aws/imagebuilder/image-name.
        pipelineLogGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The log group name that Image Builder uses for the log output during creation of a new pipeline. If not specified, the pipeline log group name defaults to /aws/imagebuilder/pipeline/pipeline-name.
    CreateImagePipelineResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        imagePipelineArn:
          $ref: "#/components/schemas/ImagePipelineArn"
          description: The Amazon Resource Name (ARN) of the image pipeline that was created by this request.
    ImagePipelineArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws):image-pipeline/[a-z0-9-_]+$
    AdditionalInstanceConfiguration:
      description: In addition to your infrastructure configuration, these settings provide an extra layer of control over your build instances. You can also specify commands to run on launch for all of your build instances. Image Builder does not automatically install the Systems Manager agent on Windows instances. If your base image includes the Systems Manager agent, then the AMI that you create will also include the agent. For Linux instances, if the base image does not already include the Systems Manager agent, Image Builder installs it. For Linux instances where Image Builder installs the Systems Manager agent, you can choose whether to keep it for the AMI that you create.
      type: object
      properties:
        systemsManagerAgent:
          $ref: "#/components/schemas/SystemsManagerAgent"
          description: Contains settings for the Systems Manager agent on your build instance.
        userDataOverride:
          $ref: "#/components/schemas/UserDataOverride"
          description: "Use this property to provide commands or a command script to run when you launch your build instance. The userDataOverride property replaces any commands that Image Builder might have added to ensure that Systems Manager is installed on your Linux build instance. If you override the user data, make sure that you add commands to install Systems Manager, if it is not pre-installed on your base image. The user data is always base 64 encoded. For example, the following commands are encoded as IyEvYmluL2Jhc2gKbWtkaXIgLXAgL3Zhci9iYi8KdG91Y2ggL3Zhci$: #!/bin/bash mkdir -p /var/bb/ touch /var"
    SystemsManagerAgent:
      description: Contains settings for the Systems Manager agent on your build instance.
      type: object
      properties:
        uninstallAfterBuild:
          $ref: "#/components/schemas/NullableBoolean"
          description: Controls whether the Systems Manager agent is removed from your final build image, prior to creating the new AMI. If this is set to true, then the agent is removed from the final image. If it's set to false, then the agent is left in, so that it is included in the new AMI. default value is false. The default behavior of uninstallAfterBuild is to remove the SSM Agent if it was installed by EC2 Image Builder
    UserDataOverride:
      type: string
      minLength: 1
      maxLength: 21847
      pattern: ^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
    CreateImageRecipeResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        imageRecipeArn:
          $ref: "#/components/schemas/ImageRecipeArn"
          description: The Amazon Resource Name (ARN) of the image recipe that was created by this request.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    InstanceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceType"
    InstanceType:
      type: string
    InstanceProfileNameType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[\w+=,.@-]+$
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    Logging:
      description: Logging configuration defines where Image Builder uploads your logs.
      type: object
      properties:
        s3Logs:
          $ref: "#/components/schemas/S3Logs"
          description: The Amazon S3 logging configuration.
    S3Logs:
      description: Amazon S3 logging configuration.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The S3 bucket in which to store the logs.
        s3KeyPrefix:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon S3 path to the bucket where the logs are stored.
    SnsTopicArn:
      type: string
      pattern: ^arn:aws[^:]*:sns:[^:]+:[0-9]{12}:[a-zA-Z0-9-_]{1,256}$
    ResourceTagMap:
      type: object
      properties: {}
    InstanceMetadataOptions:
      description: The instance metadata options that apply to the HTTP requests that pipeline builds use to launch EC2 build and test instances. For more information about instance metadata options, see Configure the instance metadata options in the Amazon EC2 User Guide for Linux instances, or Configure the instance metadata options in the Amazon EC2 Windows Guide for Windows instances.
      type: object
      properties:
        httpTokens:
          $ref: "#/components/schemas/HttpTokens"
          description: "Indicates whether a signed token header is required for instance metadata retrieval requests. The values affect the response as follows: required – When you retrieve the IAM role credentials, version 2.0 credentials are returned in all cases. optional – You can include a signed token header in your request to retrieve instance metadata, or you can leave it out. If you include it, version 2.0 credentials are returned for the IAM role. Otherwise, version 1.0 credentials are returned. The default setting is optional."
        httpPutResponseHopLimit:
          $ref: "#/components/schemas/HttpPutResponseHopLimit"
          description: Limit the number of hops that an instance metadata request can traverse to reach its destination. The default is one hop. However, if HTTP tokens are required, container image builds need a minimum of two hops.
    HttpTokens:
      type: string
      pattern: optional|required
    HttpPutResponseHopLimit:
      type: integer
      minimum: 1
      maximum: 64
    Placement:
      description: By default, EC2 instances run on shared tenancy hardware. This means that multiple Amazon Web Services accounts might share the same physical hardware. When you use dedicated hardware, the physical server that hosts your instances is dedicated to your Amazon Web Services account. Instance placement settings contain the details for the physical hardware where instances that Image Builder launches during image creation will run.
      type: object
      properties:
        availabilityZone:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Availability Zone where your build and test instances will launch.
        tenancy:
          $ref: "#/components/schemas/TenancyType"
          description: The tenancy of the instance. An instance with a tenancy of dedicated runs on single-tenant hardware. An instance with a tenancy of host runs on a Dedicated Host. If tenancy is set to host, then you can optionally specify one target for placement – either host ID or host resource group ARN. If automatic placement is enabled for your host, and you don't specify any placement target, Amazon EC2 will try to find an available host for your build and test instances.
        hostId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the Dedicated Host on which build and test instances run. This only applies if tenancy is host. If you specify the host ID, you must not specify the resource group ARN. If you specify both, Image Builder returns an error.
        hostResourceGroupArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the host resource group in which to launch build and test instances. This only applies if tenancy is host. If you specify the resource group ARN, you must not specify the host ID. If you specify both, Image Builder returns an error.
    TenancyType:
      type: string
      enum:
        - default
        - dedicated
        - host
    CreateInfrastructureConfigurationResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token that uniquely identifies the request.
        infrastructureConfigurationArn:
          $ref: "#/components/schemas/InfrastructureConfigurationArn"
          description: The Amazon Resource Name (ARN) of the infrastructure configuration that was created by this request.
    LifecyclePolicyStatus:
      type: string
      enum:
        - DISABLED
        - ENABLED
    LifecyclePolicyResourceType:
      type: string
      enum:
        - AMI_IMAGE
        - CONTAINER_IMAGE
    LifecyclePolicyDetails:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicyDetail"
    LifecyclePolicyDetail:
      description: The configuration details for a lifecycle policy resource.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/LifecyclePolicyDetailAction"
          description: Configuration details for the policy action.
        filter:
          $ref: "#/components/schemas/LifecyclePolicyDetailFilter"
          description: Specifies the resources that the lifecycle policy applies to.
        exclusionRules:
          $ref: "#/components/schemas/LifecyclePolicyDetailExclusionRules"
          description: Additional rules to specify resources that should be exempt from policy actions.
      required:
        - action
        - filter
    LifecyclePolicyDetailAction:
      description: Contains selection criteria for the lifecycle policy.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyDetailActionType"
          description: Specifies the lifecycle action to take.
        includeResources:
          $ref: "#/components/schemas/LifecyclePolicyDetailActionIncludeResources"
          description: Specifies the resources that the lifecycle policy applies to.
      required:
        - type_
    LifecyclePolicyDetailActionType:
      type: string
      enum:
        - DELETE
        - DEPRECATE
        - DISABLE
    LifecyclePolicyDetailActionIncludeResources:
      description: Specifies how the lifecycle policy should apply actions to selected resources.
      type: object
      properties:
        amis:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the lifecycle action should apply to distributed AMIs.
        snapshots:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the lifecycle action should apply to snapshots associated with distributed AMIs.
        containers:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the lifecycle action should apply to distributed containers.
    LifecyclePolicyDetailFilter:
      description: Defines filters that the lifecycle policy uses to determine impacted resource.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/LifecyclePolicyDetailFilterType"
          description: Filter resources based on either age or count.
        value:
          $ref: "#/components/schemas/LifecyclePolicyDetailFilterValue"
          description: The number of units for the time period or for the count. For example, a value of 6 might refer to six months or six AMIs. For count-based filters, this value represents the minimum number of resources to keep on hand. If you have fewer resources than this number, the resource is excluded from lifecycle actions.
        unit:
          $ref: "#/components/schemas/LifecyclePolicyTimeUnit"
          description: Defines the unit of time that the lifecycle policy uses to determine impacted resources. This is required for age-based rules.
        retainAtLeast:
          $ref: "#/components/schemas/LifecyclePolicyDetailFilterRetainAtLeast"
          description: For age-based filters, this is the number of resources to keep on hand after the lifecycle DELETE action is applied. Impacted resources are only deleted if you have more than this number of resources. If you have fewer resources than this number, the impacted resource is not deleted.
      required:
        - type_
        - value
    LifecyclePolicyDetailFilterType:
      type: string
      enum:
        - AGE
        - COUNT
    LifecyclePolicyDetailFilterValue:
      type: integer
      minimum: 1
      maximum: 1000
    LifecyclePolicyTimeUnit:
      type: string
      enum:
        - DAYS
        - WEEKS
        - MONTHS
        - YEARS
    LifecyclePolicyDetailFilterRetainAtLeast:
      type: integer
      minimum: 1
      maximum: 10
    LifecyclePolicyDetailExclusionRules:
      description: Specifies resources that lifecycle policy actions should not apply to.
      type: object
      properties:
        tagMap:
          type: object
          properties: {}
          description: Contains a list of tags that Image Builder uses to skip lifecycle actions for Image Builder image resources that have them.
        amis:
          $ref: "#/components/schemas/LifecyclePolicyDetailExclusionRulesAmis"
          description: Lists configuration values that apply to AMIs that Image Builder should exclude from the lifecycle action.
    LifecyclePolicyDetailExclusionRulesAmis:
      description: Defines criteria for AMIs that are excluded from lifecycle actions.
      type: object
      properties:
        isPublic:
          $ref: "#/components/schemas/Boolean"
          description: Configures whether public AMIs are excluded from the lifecycle action.
        regions:
          $ref: "#/components/schemas/StringList"
          description: Configures Amazon Web Services Regions that are excluded from the lifecycle action.
        sharedAccounts:
          $ref: "#/components/schemas/AccountList"
          description: Specifies Amazon Web Services accounts whose resources are excluded from the lifecycle action.
        lastLaunched:
          $ref: "#/components/schemas/LifecyclePolicyDetailExclusionRulesAmisLastLaunched"
          description: Specifies configuration details for Image Builder to exclude the most recent resources from lifecycle actions.
        tagMap:
          type: object
          properties: {}
          description: Lists tags that should be excluded from lifecycle actions for the AMIs that have them.
    LifecyclePolicyDetailExclusionRulesAmisLastLaunched:
      description: Defines criteria to exclude AMIs from lifecycle actions based on the last time they were used to launch an instance.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/LifecyclePolicyDetailExclusionRulesAmisLastLaunchedValue"
          description: The integer number of units for the time period. For example 6 (months).
        unit:
          $ref: "#/components/schemas/LifecyclePolicyTimeUnit"
          description: "Defines the unit of time that the lifecycle policy uses to calculate elapsed time since the last instance launched from the AMI. For example: days, weeks, months, or years."
      required:
        - value
        - unit
    LifecyclePolicyDetailExclusionRulesAmisLastLaunchedValue:
      type: integer
      minimum: 1
      maximum: 365
    LifecyclePolicyResourceSelection:
      description: Resource selection criteria for the lifecycle policy.
      type: object
      properties:
        recipes:
          $ref: "#/components/schemas/LifecyclePolicyResourceSelectionRecipes"
          description: A list of recipes that are used as selection criteria for the output images that the lifecycle policy applies to.
        tagMap:
          type: object
          properties: {}
          description: A list of tags that are used as selection criteria for the Image Builder image resources that the lifecycle policy applies to.
    LifecyclePolicyResourceSelectionRecipes:
      type: array
      items:
        $ref: "#/components/schemas/LifecyclePolicyResourceSelectionRecipe"
    LifecyclePolicyResourceSelectionRecipe:
      description: Specifies an Image Builder recipe that the lifecycle policy uses for resource selection.
      type: object
