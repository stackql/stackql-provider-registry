    GetComponentResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        component:
          $ref: "#/components/schemas/Component"
          description: The component object specified in the request.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    Component:
      description: A detailed view of a component.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: The Amazon Resource Name (ARN) of the component.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the component.
        version:
          $ref: "#/components/schemas/VersionNumber"
          description: The version of the component.
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the component.
        changeDescription:
          $ref: "#/components/schemas/NonEmptyString"
          description: Describes what change has been made in this version of the component, or what makes this version different from other versions of the component.
        type_:
          $ref: "#/components/schemas/ComponentType"
          description: The component type specifies whether Image Builder uses the component to build the image or only to test it.
        platform:
          $ref: "#/components/schemas/Platform"
          description: The operating system platform of the component.
        supportedOsVersions:
          $ref: "#/components/schemas/OsVersionList"
          description: The operating system (OS) version supported by the component. If the OS information is available, Image Builder performs a prefix match against the base image OS version during image recipe creation.
        state:
          $ref: "#/components/schemas/ComponentState"
          description: Describes the current status of the component.
        parameters:
          $ref: "#/components/schemas/ComponentParameterDetailList"
          description: Contains parameter details for each of the parameters that the component document defined for the component.
        owner:
          $ref: "#/components/schemas/NonEmptyString"
          description: The owner of the component.
        data:
          $ref: "#/components/schemas/ComponentData"
          description: Component data contains the YAML document content for the component.
        kmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The KMS key identifier used to encrypt the component. This can be either the Key ARN or the Alias ARN. For more information, see Key identifiers (KeyId) in the Key Management Service Developer Guide.
        encrypted:
          $ref: "#/components/schemas/NullableBoolean"
          description: The encryption status of the component.
        dateCreated:
          $ref: "#/components/schemas/DateTime"
          description: The date that Image Builder created the component.
        tags:
          type: object
          properties: {}
          description: The tags that apply to the component.
        publisher:
          $ref: "#/components/schemas/NonEmptyString"
          description: Contains the name of the publisher if this is a third-party component. Otherwise, this property is empty.
        obfuscate:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether component source is hidden from view in the console, and from component detail results for API, CLI, or SDK operations.
        productCodes:
          $ref: "#/components/schemas/ProductCodeList"
          description: Contains product codes that are used for billing purposes for Amazon Web Services Marketplace components.
    ComponentType:
      type: string
      enum:
        - BUILD
        - TEST
    ComponentState:
      description: A group of fields that describe the current status of components.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ComponentStatus"
          description: The current state of the component.
        reason:
          $ref: "#/components/schemas/NonEmptyString"
          description: Describes how or why the component changed state.
    ComponentStatus:
      type: string
      enum:
        - DEPRECATED
        - DISABLED
        - ACTIVE
    ComponentParameterDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentParameterDetail"
    ComponentParameterDetail:
      description: Defines a parameter that is used to provide configuration details for the component.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ComponentParameterName"
          description: The name of this input parameter.
        type_:
          $ref: "#/components/schemas/ComponentParameterType"
          description: The type of input this parameter provides. The currently supported value is "string".
        defaultValue:
          $ref: "#/components/schemas/ComponentParameterValueList"
          description: The default value of this parameter if no input is provided.
        description:
          $ref: "#/components/schemas/ComponentParameterDescription"
          description: Describes this parameter.
      required:
        - name
        - type_
    ComponentParameterType:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^String|Integer|Boolean|StringList$
    ComponentParameterDescription:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[^\\x00]+"
    ComponentData:
      type: string
    DateTime:
      type: string
    ProductCodeList:
      type: array
      items:
        $ref: "#/components/schemas/ProductCodeListItem"
    ProductCodeListItem:
      description: Information about a single product code.
      type: object
      properties:
        productCodeId:
          $ref: "#/components/schemas/ProductCodeId"
          description: For Amazon Web Services Marketplace components, this contains the product code ID that can be stamped onto an EC2 AMI to ensure that components are billed correctly. If this property is empty, it might mean that the component is not published.
        productCodeType:
          $ref: "#/components/schemas/ProductCodeType"
          description: The owner of the product code that's billed. If this property is empty, it might mean that the component is not published.
      required:
        - productCodeId
        - productCodeType
    ProductCodeId:
      type: string
      pattern: ^[A-Za-z0-9]{1,25}$
    ProductCodeType:
      type: string
      enum:
        - marketplace
    GetComponentPolicyResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        policy:
          $ref: "#/components/schemas/ResourcePolicyDocument"
          description: The component policy.
    ResourcePolicyDocument:
      type: string
      minLength: 1
      maxLength: 30000
    GetContainerRecipeResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        containerRecipe:
          $ref: "#/components/schemas/ContainerRecipe"
          description: The container recipe object that is returned.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    ContainerRecipe:
      description: A container recipe.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: "The Amazon Resource Name (ARN) of the container recipe. Semantic versioning is included in each object's Amazon Resource Name (ARN), at the level that applies to that object as follows: Versionless ARNs and Name ARNs do not include specific values in any of the nodes. The nodes are either left off entirely, or they are specified as wildcards, for example: x.x.x. Version ARNs have only the first three nodes: `<major>`.`<minor>`.`<patch>` Build version ARNs have all four nodes, and point to a specific build for a specific version of an object."
        containerType:
          $ref: "#/components/schemas/ContainerType"
          description: Specifies the type of container, such as Docker.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the container recipe.
        description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the container recipe.
        platform:
          $ref: "#/components/schemas/Platform"
          description: The system platform for the container, such as Windows or Linux.
        owner:
          $ref: "#/components/schemas/NonEmptyString"
          description: The owner of the container recipe.
        version:
          $ref: "#/components/schemas/VersionNumber"
          description: "The semantic version of the container recipe. The semantic version has four nodes: `<major>`.`<minor>`.`<patch>`/`<build>`. You can assign values for the first three, and can filter on all of them. Assignment: For the first three nodes you can assign any positive integer value, including zero, with an upper limit of 2^30-1, or 1073741823 for each node. Image Builder automatically assigns the build number to the fourth node. Patterns: You can use any numeric pattern that adheres to the assignment requirements for the nodes that you can assign. For example, you might choose a software version pattern, such as 1.0.0, or a date, such as 2021.01.01. Filtering: With semantic versioning, you have the flexibility to use wildcards (x) to specify the most recent versions or nodes when selecting the base image or components for your recipe. When you use a wildcard in any node, all nodes to the right of the first wildcard must also be wildcards."
        components:
          $ref: "#/components/schemas/ComponentConfigurationList"
          description: Build and test components that are included in the container recipe. Recipes require a minimum of one build component, and can have a maximum of 20 build and test components in any combination.
        instanceConfiguration:
          $ref: "#/components/schemas/InstanceConfiguration"
          description: A group of options that can be used to configure an instance for building and testing container images.
        dockerfileTemplateData:
          $ref: "#/components/schemas/DockerFileTemplate"
          description: Dockerfiles are text documents that are used to build Docker containers, and ensure that they contain all of the elements required by the application running inside. The template data consists of contextual variables where Image Builder places build information or scripts, based on your container image recipe.
        kmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) that uniquely identifies which KMS key is used to encrypt the container image for distribution to the target Region. This can be either the Key ARN or the Alias ARN. For more information, see Key identifiers (KeyId) in the Key Management Service Developer Guide.
        encrypted:
          $ref: "#/components/schemas/NullableBoolean"
          description: A flag that indicates if the target container is encrypted.
        parentImage:
          $ref: "#/components/schemas/NonEmptyString"
          description: The base image for customizations specified in the container recipe. This can contain an Image Builder image resource ARN or a container image URI, for example amazonlinux:latest.
        dateCreated:
          $ref: "#/components/schemas/DateTime"
          description: The date when this container recipe was created.
        tags:
          type: object
          properties: {}
          description: Tags that are attached to the container recipe.
        workingDirectory:
          $ref: "#/components/schemas/NonEmptyString"
          description: The working directory for use during build and test workflows.
        targetRepository:
          $ref: "#/components/schemas/TargetContainerRepository"
          description: The destination repository for the container image.
    DockerFileTemplate:
      type: string
    GetContainerRecipePolicyResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        policy:
          $ref: "#/components/schemas/ResourcePolicyDocument"
          description: The container recipe policy object that is returned.
    GetDistributionConfigurationResponse:
      type: object
      properties:
