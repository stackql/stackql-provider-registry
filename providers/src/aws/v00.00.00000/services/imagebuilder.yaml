    DistributionTimeoutMinutes:
      type: integer
      minimum: 30
      maximum: 720
    ImageVersionArnOrBuildVersionArn:
      type: string
      pattern: ^arn:aws[^:]*:imagebuilder:[^:]+:(?:[0-9]{12}|aws(?:-[a-z-]+)?):image/[a-z0-9-_]+/(?:(?:([0-9]+|x)\.([0-9]+|x)\.([0-9]+|x))|(?:[0-9]+\.[0-9]+\.[0-9]+/[0-9]+))$
    GetImageResponse:
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        image:
          $ref: "#/components/schemas/Image"
          description: The image object.
        latestVersionReferences:
          $ref: "#/components/schemas/LatestVersionReferences"
          description: The resource ARNs with different wildcard variations of semantic versioning.
    Image:
      description: An Image Builder image resource that keeps track of all of the settings used to create, configure, and distribute output for that image. You must specify exactly one recipe for the image – either a container recipe (containerRecipe), which creates a container image, or an image recipe (imageRecipe), which creates an AMI.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ImageBuilderArn"
          description: "The Amazon Resource Name (ARN) of the image. Semantic versioning is included in each object's Amazon Resource Name (ARN), at the level that applies to that object as follows: Versionless ARNs and Name ARNs do not include specific values in any of the nodes. The nodes are either left off entirely, or they are specified as wildcards, for example: x.x.x. Version ARNs have only the first three nodes: `<major>`.`<minor>`.`<patch>` Build version ARNs have all four nodes, and point to a specific build for a specific version of an object."
        type_:
          $ref: "#/components/schemas/ImageType"
          description: Specifies whether this image produces an AMI or a container image.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the image.
        version:
          $ref: "#/components/schemas/VersionNumber"
          description: "The semantic version of the image. The semantic version has four nodes: `<major>`.`<minor>`.`<patch>`/`<build>`. You can assign values for the first three, and can filter on all of them. Assignment: For the first three nodes you can assign any positive integer value, including zero, with an upper limit of 2^30-1, or 1073741823 for each node. Image Builder automatically assigns the build number to the fourth node. Patterns: You can use any numeric pattern that adheres to the assignment requirements for the nodes that you can assign. For example, you might choose a software version pattern, such as 1.0.0, or a date, such as 2021.01.01. Filtering: With semantic versioning, you have the flexibility to use wildcards (x) to specify the most recent versions or nodes when selecting the base image or components for your recipe. When you use a wildcard in any node, all nodes to the right of the first wildcard must also be wildcards."
        platform:
          $ref: "#/components/schemas/Platform"
          description: The image operating system platform, such as Linux or Windows.
        enhancedImageMetadataEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether Image Builder collects additional information about the image, such as the operating system (OS) version and package list.
        osVersion:
          $ref: "#/components/schemas/OsVersion"
          description: The operating system version for instances that launch from this image. For example, Amazon Linux 2, Ubuntu 18, or Microsoft Windows Server 2019.
        state:
          $ref: "#/components/schemas/ImageState"
          description: The state of the image.
        imageRecipe:
          $ref: "#/components/schemas/ImageRecipe"
          description: For images that distribute an AMI, this is the image recipe that Image Builder used to create the image. For container images, this is empty.
        containerRecipe:
          $ref: "#/components/schemas/ContainerRecipe"
          description: For container images, this is the container recipe that Image Builder used to create the image. For images that distribute an AMI, this is empty.
        sourcePipelineName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the image pipeline that created this image.
        sourcePipelineArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the image pipeline that created this image.
        infrastructureConfiguration:
          $ref: "#/components/schemas/InfrastructureConfiguration"
          description: The infrastructure that Image Builder used to create this image.
        distributionConfiguration:
          $ref: "#/components/schemas/DistributionConfiguration"
          description: The distribution configuration that Image Builder used to create this image.
        imageTestsConfiguration:
          $ref: "#/components/schemas/ImageTestsConfiguration"
          description: The image tests that ran when that Image Builder created this image.
        dateCreated:
          $ref: "#/components/schemas/DateTime"
          description: The date on which Image Builder created this image.
        outputResources:
          $ref: "#/components/schemas/OutputResources"
          description: The output resources that Image Builder produces for this image.
        tags:
          type: object
          properties: {}
          description: The tags that apply to this image.
        buildType:
          $ref: "#/components/schemas/BuildType"
