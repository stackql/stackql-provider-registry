        requestId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The request ID that uniquely identifies this request.
        imageVersionList:
          $ref: "#/components/schemas/ImageVersionList"
          description: "The list of image semantic versions. The semantic version has four nodes: `<major>`.`<minor>`.`<patch>`/`<build>`. You can assign values for the first three, and can filter on all of them. Filtering: With semantic versioning, you have the flexibility to use wildcards (x) to specify the most recent versions or nodes when selecting the base image or components for your recipe. When you use a wildcard in any node, all nodes to the right of the first wildcard must also be wildcards."
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The next token used for paginated responses. When this field isn't empty, there are additional elements that the service hasn't included in this request. Use this token with the next request to retrieve additional objects.
    ImageVersionList:
      type: array
