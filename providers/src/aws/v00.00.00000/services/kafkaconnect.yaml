openapi: 3.0.0
info:
  version: "2021-09-14"
  title: Managed Streaming for Kafka Connect
  description: Managed Streaming for Kafka Connect
  x-serviceName: kafkaconnect
  x-serviceAlias: kafkaconnect
  x-protocol: rest-json
  x-apiVersion: "2021-09-14"
  x-endpointPrefix: kafkaconnect
servers:
  - url: https://kafkaconnect.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for kafkaconnect
paths:
  /v1/connectors:
    post:
      operationId: CreateConnector
      description: Creates a connector using the specified properties.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                capacity:
                  $ref: "#/components/schemas/Capacity"
                connectorConfiguration:
                  $ref: "#/components/schemas/ConnectorConfiguration"
                connectorDescription:
                  $ref: "#/components/schemas/__stringMax1024"
                connectorName:
                  $ref: "#/components/schemas/__stringMin1Max128"
                kafkaCluster:
                  $ref: "#/components/schemas/KafkaCluster"
                kafkaClusterClientAuthentication:
                  $ref: "#/components/schemas/KafkaClusterClientAuthentication"
                kafkaClusterEncryptionInTransit:
                  $ref: "#/components/schemas/KafkaClusterEncryptionInTransit"
                kafkaConnectVersion:
                  $ref: "#/components/schemas/__string"
                logDelivery:
                  $ref: "#/components/schemas/LogDelivery"
                networkType:
                  $ref: "#/components/schemas/NetworkType"
                plugins:
                  $ref: "#/components/schemas/__listOfPlugin"
                serviceExecutionRoleArn:
                  $ref: "#/components/schemas/__string"
                workerConfiguration:
                  $ref: "#/components/schemas/WorkerConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - capacity
                - connectorConfiguration
                - connectorName
                - kafkaCluster
                - kafkaClusterClientAuthentication
                - kafkaClusterEncryptionInTransit
                - kafkaConnectVersion
                - plugins
                - serviceExecutionRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorResponse"
    get:
      operationId: ListConnectors
      description: Returns a list of all the connectors in this account and Region. The list is limited to connectors whose name starts with the specified prefix. The response also includes a description of each of the listed connectors.
      parameters:
        - name: connectorNamePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The name prefix that you want to use to search for and list connectors.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of connectors to list in one response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: If the response of a ListConnectors operation is truncated, it will include a NextToken. Send this NextToken in a subsequent request to continue listing from where the previous operation left off.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorsResponse"
  /v1/custom-plugins:
    post:
      operationId: CreateCustomPlugin
      description: Creates a custom plugin using the specified properties.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contentType:
                  $ref: "#/components/schemas/CustomPluginContentType"
                description:
                  $ref: "#/components/schemas/__stringMax1024"
                location:
                  $ref: "#/components/schemas/CustomPluginLocation"
                name:
                  $ref: "#/components/schemas/__stringMin1Max128"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - contentType
                - location
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomPluginResponse"
    get:
      operationId: ListCustomPlugins
      description: Returns a list of all of the custom plugins in this account and Region.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of custom plugins to list in one response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: If the response of a ListCustomPlugins operation is truncated, it will include a NextToken. Send this NextToken in a subsequent request to continue listing from where the previous operation left off.
        - name: namePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Lists custom plugin names that start with the specified text string.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomPluginsResponse"
  /v1/worker-configurations:
    post:
      operationId: CreateWorkerConfiguration
      description: Creates a worker configuration using the specified properties.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/__stringMax1024"
                name:
                  $ref: "#/components/schemas/__stringMin1Max128"
                propertiesFileContent:
                  $ref: "#/components/schemas/__sensitiveString"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - name
                - propertiesFileContent
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkerConfigurationResponse"
    get:
      operationId: ListWorkerConfigurations
      description: Returns a list of all of the worker configurations in this account and Region.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of worker configurations to list in one response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: If the response of a ListWorkerConfigurations operation is truncated, it will include a NextToken. Send this NextToken in a subsequent request to continue listing from where the previous operation left off.
        - name: namePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Lists worker configuration names that start with the specified text string.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkerConfigurationsResponse"
  /v1/connectors/{connector_arn}:
    delete:
      operationId: DeleteConnector
      description: Deletes the specified connector.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the connector that you want to delete.
        - name: currentVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The current version of the connector that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectorResponse"
    get:
      operationId: DescribeConnector
      description: Returns summary information about the connector.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the connector that you want to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectorResponse"
    put:
      operationId: UpdateConnector
      description: "Updates the specified connector. For request body, specify only one parameter: either capacity or connectorConfiguration."
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the connector that you want to update.
        - name: currentVersion
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The current version of the connector that you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                capacity:
                  $ref: "#/components/schemas/CapacityUpdate"
                connectorConfiguration:
                  $ref: "#/components/schemas/ConnectorConfigurationUpdate"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectorResponse"
  /v1/custom-plugins/{custom_plugin_arn}:
    delete:
      operationId: DeleteCustomPlugin
      description: Deletes a custom plugin.
      parameters:
        - name: custom_plugin_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the custom plugin that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomPluginResponse"
    get:
      operationId: DescribeCustomPlugin
      description: A summary description of the custom plugin.
      parameters:
        - name: custom_plugin_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Returns information about a custom plugin.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCustomPluginResponse"
  /v1/worker-configurations/{worker_configuration_arn}:
    delete:
      operationId: DeleteWorkerConfiguration
      description: Deletes the specified worker configuration.
      parameters:
        - name: worker_configuration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the worker configuration that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkerConfigurationResponse"
    get:
      operationId: DescribeWorkerConfiguration
      description: Returns information about a worker configuration.
      parameters:
        - name: worker_configuration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the worker configuration that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkerConfigurationResponse"
  /v1/connectorOperations/{connector_operation_arn}:
    get:
      operationId: DescribeConnectorOperation
      description: Returns information about the specified connector's operations.
      parameters:
        - name: connector_operation_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: ARN of the connector operation to be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectorOperationResponse"
  /v1/connectors/{connector_arn}/operations:
    get:
      operationId: ListConnectorOperations
      description: Lists information about a connector's operation(s).
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the connector for which to list operations.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Maximum number of connector operations to fetch in one get request.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: If the response is truncated, it includes a NextToken. Send this NextToken in a subsequent request to continue listing from where it left off.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorOperationsResponse"
  /v1/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all the tags attached to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource for which you want to list all attached tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Attaches tags to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource to which you want to attach tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource from which you want to remove tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The keys of the tags that you want to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Capacity:
      description: Information about the capacity of the connector, whether it is auto scaled or provisioned.
      type: object
      properties:
        autoScaling:
          $ref: "#/components/schemas/AutoScaling"
          description: Information about the auto scaling parameters for the connector.
        provisionedCapacity:
          $ref: "#/components/schemas/ProvisionedCapacity"
          description: Details about a fixed capacity allocated to a connector.
    AutoScaling:
      description: Specifies how the connector scales.
      type: object
      properties:
        maxWorkerCount:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of workers allocated to the connector.
        mcuCount:
          $ref: "#/components/schemas/__integerMin1Max8"
          description: The number of microcontroller units (MCUs) allocated to each connector worker. The valid values are 1,2,4,8.
        minWorkerCount:
          $ref: "#/components/schemas/__integer"
          description: The minimum number of workers allocated to the connector.
        scaleInPolicy:
          $ref: "#/components/schemas/ScaleInPolicy"
          description: The scale-in policy for the connector.
        scaleOutPolicy:
          $ref: "#/components/schemas/ScaleOutPolicy"
          description: The scale-out policy for the connector.
        maxAutoscalingTaskCount:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of tasks allocated to the connector during autoscaling operations. Must be at least equal to maxWorkerCount.
      required:
        - maxWorkerCount
        - mcuCount
        - minWorkerCount
    __integer:
      type: integer
    __integerMin1Max8:
      type: integer
      minimum: 1
      maximum: 8
    ScaleInPolicy:
      description: The scale-in policy for the connector.
      type: object
      properties:
        cpuUtilizationPercentage:
          $ref: "#/components/schemas/__integerMin1Max100"
          description: Specifies the CPU utilization percentage threshold at which you want connector scale in to be triggered.
      required:
        - cpuUtilizationPercentage
    __integerMin1Max100:
      type: integer
      minimum: 1
      maximum: 100
    ScaleOutPolicy:
      description: The scale-out policy for the connector.
      type: object
      properties:
        cpuUtilizationPercentage:
          $ref: "#/components/schemas/__integerMin1Max100"
          description: The CPU utilization percentage threshold at which you want connector scale out to be triggered.
      required:
        - cpuUtilizationPercentage
    ProvisionedCapacity:
      description: Details about a connector's provisioned capacity.
      type: object
      properties:
        mcuCount:
          $ref: "#/components/schemas/__integerMin1Max8"
          description: The number of microcontroller units (MCUs) allocated to each connector worker. The valid values are 1,2,4,8.
        workerCount:
          $ref: "#/components/schemas/__integer"
          description: The number of workers that are allocated to the connector.
      required:
        - mcuCount
        - workerCount
    ConnectorConfiguration:
      type: object
      properties: {}
    __stringMax1024:
      type: string
      minLength: 0
      maxLength: 1024
    __stringMin1Max128:
      type: string
      minLength: 1
      maxLength: 128
    KafkaCluster:
      description: The details of the Apache Kafka cluster to which the connector is connected.
      type: object
      properties:
        apacheKafkaCluster:
          $ref: "#/components/schemas/ApacheKafkaCluster"
          description: The Apache Kafka cluster to which the connector is connected.
      required:
        - apacheKafkaCluster
    ApacheKafkaCluster:
      description: The details of the Apache Kafka cluster to which the connector is connected.
      type: object
      properties:
        bootstrapServers:
          $ref: "#/components/schemas/__string"
          description: The bootstrap servers of the cluster.
        vpc:
          $ref: "#/components/schemas/Vpc"
          description: Details of an Amazon VPC which has network connectivity to the Apache Kafka cluster.
      required:
        - bootstrapServers
        - vpc
    __string:
      type: string
    Vpc:
      description: Information about the VPC in which the connector resides.
      type: object
      properties:
        securityGroups:
          $ref: "#/components/schemas/__listOf__string"
          description: The security groups for the connector.
        subnets:
          $ref: "#/components/schemas/__listOf__string"
          description: The subnets for the connector.
      required:
        - subnets
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    KafkaClusterClientAuthentication:
      description: The client authentication information used in order to authenticate with the Apache Kafka cluster.
      type: object
      properties:
        authenticationType:
          $ref: "#/components/schemas/KafkaClusterClientAuthenticationType"
          description: The type of client authentication used to connect to the Apache Kafka cluster. Value NONE means that no client authentication is used.
      required:
        - authenticationType
    KafkaClusterClientAuthenticationType:
      type: string
      enum:
        - NONE
        - IAM
    KafkaClusterEncryptionInTransit:
      description: Details of encryption in transit to the Apache Kafka cluster.
      type: object
      properties:
        encryptionType:
          $ref: "#/components/schemas/KafkaClusterEncryptionInTransitType"
          description: The type of encryption in transit to the Apache Kafka cluster.
      required:
        - encryptionType
    KafkaClusterEncryptionInTransitType:
      type: string
      enum:
        - PLAINTEXT
        - TLS
    LogDelivery:
      description: Details about log delivery.
      type: object
      properties:
        workerLogDelivery:
          $ref: "#/components/schemas/WorkerLogDelivery"
          description: The workers can send worker logs to different destination types. This configuration specifies the details of these destinations.
      required:
        - workerLogDelivery
    WorkerLogDelivery:
      description: Workers can send worker logs to different destination types. This configuration specifies the details of these destinations.
      type: object
      properties:
        cloudWatchLogs:
          $ref: "#/components/schemas/CloudWatchLogsLogDelivery"
          description: Details about delivering logs to Amazon CloudWatch Logs.
        firehose:
          $ref: "#/components/schemas/FirehoseLogDelivery"
          description: Details about delivering logs to Amazon Kinesis Data Firehose.
        s3:
          $ref: "#/components/schemas/S3LogDelivery"
          description: Details about delivering logs to Amazon S3.
    CloudWatchLogsLogDelivery:
      description: The settings for delivering connector logs to Amazon CloudWatch Logs.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/__boolean"
          description: Whether log delivery to Amazon CloudWatch Logs is enabled.
        logGroup:
          $ref: "#/components/schemas/__string"
          description: The name of the CloudWatch log group that is the destination for log delivery.
      required:
        - enabled
    __boolean:
      type: boolean
    FirehoseLogDelivery:
      description: The settings for delivering logs to Amazon Kinesis Data Firehose.
      type: object
      properties:
        deliveryStream:
          $ref: "#/components/schemas/__string"
          description: The name of the Kinesis Data Firehose delivery stream that is the destination for log delivery.
        enabled:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether connector logs get delivered to Amazon Kinesis Data Firehose.
      required:
        - enabled
    S3LogDelivery:
      description: Details about delivering logs to Amazon S3.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/__string"
          description: The name of the S3 bucket that is the destination for log delivery.
        enabled:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether connector logs get sent to the specified Amazon S3 destination.
        prefix:
          $ref: "#/components/schemas/__string"
          description: The S3 prefix that is the destination for log delivery.
      required:
        - enabled
    NetworkType:
      description: The network type of a connector.
      type: string
      enum:
        - IPV4
        - DUAL
    __listOfPlugin:
      type: array
      items:
        $ref: "#/components/schemas/Plugin"
    Plugin:
      description: A plugin is an Amazon Web Services resource that contains the code that defines your connector logic.
      type: object
      properties:
        customPlugin:
          $ref: "#/components/schemas/CustomPlugin"
          description: Details about a custom plugin.
      required:
        - customPlugin
    CustomPlugin:
      description: A plugin is an Amazon Web Services resource that contains the code that defines a connector's logic.
      type: object
      properties:
        customPluginArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the custom plugin.
        revision:
          $ref: "#/components/schemas/__longMin1"
          description: The revision of the custom plugin.
      required:
        - customPluginArn
        - revision
    __longMin1:
      type: integer
      format: int64
      minimum: 1
      maximum: 9223372036854776000
    WorkerConfiguration:
      description: The configuration of the workers, which are the processes that run the connector logic.
      type: object
      properties:
        revision:
          $ref: "#/components/schemas/__longMin1"
          description: The revision of the worker configuration.
        workerConfigurationArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the worker configuration.
      required:
        - revision
        - workerConfigurationArn
    Tags:
      type: object
      properties: {}
    CreateConnectorResponse:
      type: object
      properties:
        connectorArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that Amazon assigned to the connector.
        connectorName:
          $ref: "#/components/schemas/__string"
          description: The name of the connector.
        connectorState:
          $ref: "#/components/schemas/ConnectorState"
          description: The state of the connector.
    ConnectorState:
      type: string
      enum:
        - RUNNING
        - CREATING
        - UPDATING
        - DELETING
        - FAILED
    CustomPluginContentType:
      type: string
      enum:
        - JAR
        - ZIP
    CustomPluginLocation:
      description: Information about the location of a custom plugin.
      type: object
      properties:
        s3Location:
          $ref: "#/components/schemas/S3Location"
          description: The S3 bucket Amazon Resource Name (ARN), file key, and object version of the plugin file stored in Amazon S3.
      required:
        - s3Location
    S3Location:
      description: The location of an object in Amazon S3.
      type: object
      properties:
        bucketArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of an S3 bucket.
        fileKey:
          $ref: "#/components/schemas/__string"
          description: The file key for an object in an S3 bucket.
        objectVersion:
          $ref: "#/components/schemas/__string"
          description: The version of an object in an S3 bucket.
      required:
        - bucketArn
        - fileKey
    CreateCustomPluginResponse:
      type: object
      properties:
        customPluginArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) that Amazon assigned to the custom plugin.
        customPluginState:
          $ref: "#/components/schemas/CustomPluginState"
          description: The state of the custom plugin.
        name:
          $ref: "#/components/schemas/__string"
          description: The name of the custom plugin.
        revision:
