openapi: 3.0.0
info:
  version: "2018-09-17"
  title: AWS Marketplace Catalog Service
  description: AWS Marketplace Catalog Service
  x-serviceName: aws-marketplace
  x-serviceAlias: marketplace_catalog
  x-protocol: rest-json
  x-apiVersion: "2018-09-17"
  x-endpointPrefix: catalog.marketplace
  x-jsonVersion: "1.1"
servers:
  - url: https://catalog.marketplace.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for marketplace-catalog
paths:
  /BatchDescribeEntities:
    post:
      operationId: BatchDescribeEntities
      description: Returns metadata and content for multiple entities. This is the Batch version of the DescribeEntity API and uses the same IAM permission action as DescribeEntity API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                EntityRequestList:
                  $ref: "#/components/schemas/EntityRequestList"
              required:
                - EntityRequestList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDescribeEntitiesResponse"
  /CancelChangeSet:
    patch:
      operationId: CancelChangeSet
      description: Used to cancel an open change request. Must be sent before the status of the request changes to APPLYING, the final stage of completing your change request. You can describe a change during the 60-day request history retention period for API calls.
      parameters:
        - name: catalog
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Catalog"
          description: "Required. The catalog related to the request. Fixed value: AWSMarketplace."
        - name: changeSetId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: Required. The unique identifier of the StartChangeSet request that you want to cancel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelChangeSetResponse"
  /DeleteResourcePolicy:
    delete:
      operationId: DeleteResourcePolicy
      description: Deletes a resource-based policy on an entity that is identified by its resource ARN.
      parameters:
        - name: resourceArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the entity resource that is associated with the resource policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyResponse"
  /DescribeChangeSet:
    get:
      operationId: DescribeChangeSet
      description: Provides information about a given change set.
      parameters:
        - name: catalog
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Catalog"
          description: "Required. The catalog related to the request. Fixed value: AWSMarketplace"
        - name: changeSetId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: Required. The unique identifier for the StartChangeSet request that you want to describe the details for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeChangeSetResponse"
  /DescribeEntity:
    get:
      operationId: DescribeEntity
      description: Returns the metadata and content of the entity.
      parameters:
        - name: catalog
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Catalog"
          description: "Required. The catalog related to the request. Fixed value: AWSMarketplace"
        - name: entityId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: Required. The unique ID of the entity to describe.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEntityResponse"
  /GetResourcePolicy:
    get:
      operationId: GetResourcePolicy
      description: Gets a resource-based policy of an entity that is identified by its resource ARN.
      parameters:
        - name: resourceArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of the entity resource that is associated with the resource policy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
  /ListChangeSets:
    post:
      operationId: ListChangeSets
      description: Returns the list of change sets owned by the account being used to make the call. You can filter this list by providing any combination of entityId, ChangeSetName, and status. If you provide more than one filter, the API operation applies a logical AND between the filters. You can describe a change during the 60-day request history retention period for API calls.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                FilterList:
                  $ref: "#/components/schemas/FilterList"
                Sort:
                  $ref: "#/components/schemas/Sort"
                MaxResults:
                  $ref: "#/components/schemas/ListChangeSetsMaxResultInteger"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChangeSetsResponse"
  /ListEntities:
    post:
      operationId: ListEntities
      description: Provides the list of entities of a given type.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                EntityType:
                  $ref: "#/components/schemas/EntityType"
                FilterList:
                  $ref: "#/components/schemas/FilterList"
                Sort:
                  $ref: "#/components/schemas/Sort"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/ListEntitiesMaxResultInteger"
                OwnershipType:
                  $ref: "#/components/schemas/OwnershipType"
                EntityTypeFilters:
                  $ref: "#/components/schemas/EntityTypeFilters"
                EntityTypeSort:
                  $ref: "#/components/schemas/EntityTypeSort"
              required:
                - EntityType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEntitiesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all tags that have been added to a resource (either an entity or change set).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceARN"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /PutResourcePolicy:
    post:
      operationId: PutResourcePolicy
      description: "Attaches a resource-based policy to an entity. Examples of an entity include: AmiProduct and ContainerProduct."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceARN"
                Policy:
                  $ref: "#/components/schemas/ResourcePolicyJson"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResponse"
  /StartChangeSet:
    post:
      operationId: StartChangeSet
      description: Allows you to request changes for your entities. Within a single ChangeSet, you can't start the same change type against the same entity multiple times. Additionally, when a ChangeSet is running, all the entities targeted by the different changes are locked until the change set has completed (either succeeded, cancelled, or failed). If you try to start a change set containing a change against an entity that is already locked, you will receive a ResourceInUseException error. For example, you can't start the ChangeSet described in the example later in this topic because it contains two changes to run the same change type (AddRevisions) against the same entity (entity-id@1). For more information about working with change sets, see Working with change sets. For information about change types for single-AMI products, see Working with single-AMI products. Also, for more information about change types available for container-based products, see Working with container products. To download "DetailsDocument" shapes, see Python and Java shapes on GitHub.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                ChangeSet:
                  $ref: "#/components/schemas/RequestedChangeList"
                ChangeSetName:
                  $ref: "#/components/schemas/ChangeSetName"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                ChangeSetTags:
                  $ref: "#/components/schemas/TagList"
                Intent:
                  $ref: "#/components/schemas/Intent"
              required:
                - ChangeSet
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartChangeSetResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Tags a resource (either an entity or change set).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceARN"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes a tag or list of tags from a resource (either an entity or change set).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceARN"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EntityRequestList:
      type: array
      items:
        $ref: "#/components/schemas/EntityRequest"
    EntityRequest:
      description: An object that contains entity ID and the catalog in which the entity is present.
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The name of the catalog the entity is present in. The only value at this time is AWSMarketplace.
        EntityId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the entity.
      required:
        - Catalog
        - EntityId
    Catalog:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z]+$
    EntityId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9][.a-zA-Z0-9/-]+[a-zA-Z0-9]$
    BatchDescribeEntitiesResponse:
      type: object
      properties:
        EntityDetails:
          type: object
          properties: {}
          description: Details about each entity.
        Errors:
          type: object
          properties: {}
          description: A map of errors returned, with EntityId as the key and errorDetail as the value.
    ResourceId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[\w\-]+$
    CancelChangeSetResponse:
      type: object
      properties:
        ChangeSetId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for the change set referenced in this request.
        ChangeSetArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN associated with the change set referenced in this request.
    ARN:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[a-zA-Z0-9:*/-]+$
    ResourceARN:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^arn:[\w+=/,.@-]+:aws-marketplace:[\w+=/,.@-]*:[0-9]+:[\w+=,.@-]+(/[\w+=,.@-]+)*$
    DeleteResourcePolicyResponse:
      type: object
    DescribeChangeSetResponse:
      type: object
      properties:
        ChangeSetId:
          $ref: "#/components/schemas/ResourceId"
          description: Required. The unique identifier for the change set referenced in this request.
        ChangeSetArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN associated with the unique identifier for the change set referenced in this request.
        ChangeSetName:
          $ref: "#/components/schemas/ChangeSetName"
          description: The optional name provided in the StartChangeSet request. If you do not provide a name, one is set by default.
        Intent:
          $ref: "#/components/schemas/Intent"
          description: The optional intent provided in the StartChangeSet request. If you do not provide an intent, APPLY is set by default.
        StartTime:
          $ref: "#/components/schemas/DateTimeISO8601"
          description: The date and time, in ISO 8601 format (2018-02-27T13:45:22Z), the request started.
        EndTime:
          $ref: "#/components/schemas/DateTimeISO8601"
          description: The date and time, in ISO 8601 format (2018-02-27T13:45:22Z), the request transitioned to a terminal state. The change cannot transition to a different state. Null if the request is not in a terminal state.
        Status:
          $ref: "#/components/schemas/ChangeStatus"
          description: The status of the change request.
        FailureCode:
          $ref: "#/components/schemas/FailureCode"
          description: Returned if the change set is in FAILED status. Can be either CLIENT_ERROR, which means that there are issues with the request (see the ErrorDetailList), or SERVER_FAULT, which means that there is a problem in the system, and you should retry your request.
        FailureDescription:
          $ref: "#/components/schemas/ExceptionMessageContent"
          description: Returned if there is a failure on the change set, but that failure is not related to any of the changes in the request.
        ChangeSet:
          $ref: "#/components/schemas/ChangeSetDescription"
          description: An array of ChangeSummary objects.
    ChangeSetName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[\w\s+=.:@-]+$
    Intent:
      type: string
      enum:
        - VALIDATE
        - APPLY
    DateTimeISO8601:
      type: string
      minLength: 20
      maxLength: 20
      pattern: ^([\d]{4})\-(1[0-2]|0[1-9])\-(3[01]|0[1-9]|[12][\d])T(2[0-3]|[01][\d]):([0-5][\d]):([0-5][\d])Z$
    ChangeStatus:
      type: string
      enum:
        - PREPARING
        - APPLYING
        - SUCCEEDED
        - CANCELLED
        - FAILED
    FailureCode:
      type: string
      enum:
        - CLIENT_ERROR
        - SERVER_FAULT
    ExceptionMessageContent:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(.)+$
    ChangeSetDescription:
      type: array
      items:
        $ref: "#/components/schemas/ChangeSummary"
    ChangeSummary:
      description: This object is a container for common summary information about the change. The summary doesn't contain the whole change structure.
      type: object
      properties:
        ChangeType:
          $ref: "#/components/schemas/ChangeType"
          description: The type of the change.
        Entity:
          $ref: "#/components/schemas/Entity"
          description: The entity to be changed.
        Details:
          $ref: "#/components/schemas/Json"
          description: This object contains details specific to the change type of the requested change.
        DetailsDocument:
          $ref: "#/components/schemas/JsonDocumentType"
          description: The JSON value of the details specific to the change type of the requested change. To download the "DetailsDocument" shapes, see the Python and Java shapes on GitHub.
        ErrorDetailList:
          $ref: "#/components/schemas/ErrorDetailList"
          description: An array of ErrorDetail objects associated with the change.
        ChangeName:
          $ref: "#/components/schemas/ChangeName"
          description: Optional name for the change.
    ChangeType:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[A-Z][\w]*$
    Entity:
      description: An entity contains data that describes your product, its supported features, and how it can be used or launched by your customer.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EntityType"
          description: The type of entity.
        Identifier:
          $ref: "#/components/schemas/Identifier"
          description: The identifier for the entity.
      required:
        - Type
    EntityType:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z]+$
    Identifier:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[\w\-@]+$
    Json:
      type: string
      minLength: 2
      maxLength: 16384
      pattern: ^[\s]*\{[\s\S]*\}[\s]*$
    JsonDocumentType:
      type: object
    ErrorDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      description: Details about the error.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/ErrorCodeString"
          description: The error code that identifies the type of error.
        ErrorMessage:
          $ref: "#/components/schemas/ExceptionMessageContent"
          description: The message for the error.
    ErrorCodeString:
      type: string
      minLength: 1
      maxLength: 72
      pattern: ^[a-zA-Z_]+$
    ChangeName:
      type: string
      minLength: 1
      maxLength: 72
      pattern: ^[a-zA-Z]$
    DescribeEntityResponse:
      type: object
      properties:
        EntityType:
          $ref: "#/components/schemas/EntityType"
          description: The named type of the entity, in the format of EntityType@Version.
        EntityIdentifier:
          $ref: "#/components/schemas/Identifier"
          description: The identifier of the entity, in the format of EntityId@RevisionId.
        EntityArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN associated to the unique identifier for the entity referenced in this request.
        LastModifiedDate:
          $ref: "#/components/schemas/DateTimeISO8601"
          description: The last modified date of the entity, in ISO 8601 format (2018-02-27T13:45:22Z).
        Details:
          $ref: "#/components/schemas/Json"
          description: This stringified JSON object includes the details of the entity.
        DetailsDocument:
          $ref: "#/components/schemas/JsonDocumentType"
          description: The JSON value of the details specific to the entity. To download "DetailsDocument" shapes, see the Python and Java shapes on GitHub.
    GetResourcePolicyResponse:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/ResourcePolicyJson"
          description: The policy document to set; formatted in JSON.
    ResourcePolicyJson:
      type: string
      minLength: 1
      maxLength: 10240
      pattern: ^[\u0009\u000A\u000D\u0020-\u00FF]+$
    FilterList:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A filter object, used to optionally filter results from calls to the ListEntities and ListChangeSets actions.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FilterName"
          description: "For ListEntities, the supported value for this is an EntityId. For ListChangeSets, the supported values are as follows:"
        ValueList:
          $ref: "#/components/schemas/ValueList"
          description: "ListEntities - This is a list of unique EntityIds. ListChangeSets - The supported filter names and associated ValueLists is as follows: ChangeSetName - The supported ValueList is a list of non-unique ChangeSetNames. These are defined when you call the StartChangeSet action. Status - The supported ValueList is a list of statuses for all change set requests. EntityId - The supported ValueList is a list of unique EntityIds. BeforeStartTime - The supported ValueList is a list of all change sets that started before the filter value. AfterStartTime - The supported ValueList is a list of all change sets that started after the filter value. BeforeEndTime - The supported ValueList is a list of all change sets that ended before the filter value. AfterEndTime - The supported ValueList is a list of all change sets that ended after the filter value."
    FilterName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z]+$
    ValueList:
      type: array
      items:
        $ref: "#/components/schemas/FilterValueContent"
    FilterValueContent:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(.)+$
    Sort:
      description: An object that contains two attributes, SortBy and SortOrder.
      type: object
      properties:
        SortBy:
          $ref: "#/components/schemas/SortBy"
          description: For ListEntities, supported attributes include LastModifiedDate (default) and EntityId. In addition to LastModifiedDate and EntityId, each EntityType might support additional fields. For ListChangeSets, supported attributes include StartTime and EndTime.
        SortOrder:
          $ref: "#/components/schemas/SortOrder"
          description: The sorting order. Can be ASCENDING or DESCENDING. The default value is DESCENDING.
    SortBy:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z]+$
    SortOrder:
      type: string
      enum:
        - ASCENDING
        - DESCENDING
    ListChangeSetsMaxResultInteger:
      type: integer
      minimum: 1
      maximum: 20
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[\w+=.:@\-\/]$
    ListChangeSetsResponse:
      type: object
      properties:
        ChangeSetSummaryList:
          $ref: "#/components/schemas/ChangeSetSummaryList"
          description: Array of ChangeSetSummaryListItem objects.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The value of the next token, if it exists. Null if there are no more results.
    ChangeSetSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ChangeSetSummaryListItem"
    ChangeSetSummaryListItem:
      description: A summary of a change set returned in a list of change sets when the ListChangeSets action is called.
      type: object
      properties:
        ChangeSetId:
          $ref: "#/components/schemas/ResourceId"
          description: The unique identifier for a change set.
        ChangeSetArn:
          $ref: "#/components/schemas/ARN"
          description: The ARN associated with the unique identifier for the change set referenced in this request.
        ChangeSetName:
          $ref: "#/components/schemas/ChangeSetName"
          description: The non-unique name for the change set.
        StartTime:
          $ref: "#/components/schemas/DateTimeISO8601"
          description: The time, in ISO 8601 format (2018-02-27T13:45:22Z), when the change set was started.
        EndTime:
          $ref: "#/components/schemas/DateTimeISO8601"
          description: The time, in ISO 8601 format (2018-02-27T13:45:22Z), when the change set was finished.
        Status:
          $ref: "#/components/schemas/ChangeStatus"
          description: The current status of the change set.
        EntityIdList:
          $ref: "#/components/schemas/ResourceIdList"
          description: This object is a list of entity IDs (string) that are a part of a change set. The entity ID list is a maximum of 20 entities. It must contain at least one entity.
        FailureCode:
          $ref: "#/components/schemas/FailureCode"
          description: Returned if the change set is in FAILED status. Can be either CLIENT_ERROR, which means that there are issues with the request (see the ErrorDetailList of DescribeChangeSet), or SERVER_FAULT, which means that there is a problem in the system, and you should retry your request.
    ResourceIdList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceId"
    ListEntitiesMaxResultInteger:
      type: integer
      minimum: 1
      maximum: 50
    OwnershipType:
      type: string
      enum:
        - SELF
        - SHARED
    EntityTypeFilters:
      description: Object containing all the filter fields per entity type.
      type: object
      properties:
        DataProductFilters:
          $ref: "#/components/schemas/DataProductFilters"
          description: A filter for data products.
        SaaSProductFilters:
          $ref: "#/components/schemas/SaaSProductFilters"
          description: A filter for SaaS products.
        AmiProductFilters:
          $ref: "#/components/schemas/AmiProductFilters"
          description: A filter for AMI products.
        OfferFilters:
          $ref: "#/components/schemas/OfferFilters"
          description: A filter for offers.
        ContainerProductFilters:
          $ref: "#/components/schemas/ContainerProductFilters"
          description: A filter for container products.
        ResaleAuthorizationFilters:
          $ref: "#/components/schemas/ResaleAuthorizationFilters"
          description: A filter for Resale Authorizations.
        MachineLearningProductFilters:
          $ref: "#/components/schemas/MachineLearningProductFilters"
        OfferSetFilters:
          $ref: "#/components/schemas/OfferSetFilters"
          description: A filter for offer sets.
    DataProductFilters:
      description: Object containing all the filter fields for data products. Client can add only one wildcard filter and a maximum of 8 filters in a single ListEntities request.
