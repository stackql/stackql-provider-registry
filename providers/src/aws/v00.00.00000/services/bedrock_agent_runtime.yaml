        - FAILURE
        - REPROMPT
    FunctionResult:
      description: "Contains information about the function that was called from the action group and the response that was returned. This data type is used in the following API operations: In the returnControlInvocationResults of the InvokeAgent request"
      type: object
      properties:
        actionGroup:
          $ref: "#/components/schemas/String"
          description: The action group that the function belongs to.
        agentId:
          $ref: "#/components/schemas/String"
          description: The agent's ID.
        confirmationState:
          $ref: "#/components/schemas/ConfirmationState"
          description: Contains the user confirmation information about the function that was called.
        function:
