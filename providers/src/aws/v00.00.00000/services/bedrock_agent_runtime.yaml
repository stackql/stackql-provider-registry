          description: The attribute's description.
        key:
          $ref: "#/components/schemas/MetadataAttributeSchemaKeyString"
          description: The attribute's key.
        type_:
          $ref: "#/components/schemas/AttributeType"
          description: The attribute's type.
      required:
        - description
