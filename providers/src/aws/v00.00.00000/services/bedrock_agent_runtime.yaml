    PromptCreationConfigurations:
      description: Specifies parameters that control how the service populates the agent prompt for an InvokeAgent or InvokeInlineAgent request. You can control which aspects of previous invocations in the same agent session the service uses to populate the agent prompt. This gives you more granular control over the contextual history that is used to process the current request.
      type: object
      properties:
        excludePreviousThinkingSteps:
          $ref: "#/components/schemas/Boolean"
          description: If true, the service removes any content between `<thinking>` tags from previous conversations in an agent session. The service will only remove content from already processed turns. This helps you remove content which might not be useful for current and subsequent invocations. This can reduce the input token count and potentially save costs. The default value is false.
        previousConversationTurnsToInclude:
          $ref: "#/components/schemas/PromptCreationConfigurationsPreviousConversationTurnsToIncludeInteger"
          description: The number of previous conversations from the ongoing agent session to include in the conversation history of the agent prompt, during the current invocation. This gives you more granular control over the context that the model is made aware of, and helps the model remove older context which is no longer useful during the ongoing agent session.
    PromptCreationConfigurationsPreviousConversationTurnsToIncludeInteger:
      type: integer
      minimum: 0
    SessionState:
      description: Contains parameters that specify various attributes that persist across a session or prompt. You can define session state attributes as key-value pairs when writing a Lambda function for an action group or pass them when making an InvokeAgent request. Use session state attributes to control and provide conversational context for your agent and to help customize your agent's behavior. For more information, see Control session context.
      type: object
      properties:
        conversationHistory:
          $ref: "#/components/schemas/ConversationHistory"
          description: The state's conversation history.
        files:
          $ref: "#/components/schemas/InputFiles"
          description: Contains information about the files used by code interpreter.
        invocationId:
          $ref: "#/components/schemas/String"
          description: The identifier of the invocation of an action. This value must match the invocationId returned in the InvokeAgent response for the action whose results are provided in the returnControlInvocationResults field. For more information, see Return control to the agent developer and Control session context.
        knowledgeBaseConfigurations:
          $ref: "#/components/schemas/KnowledgeBaseConfigurations"
          description: An array of configurations, each of which applies to a knowledge base attached to the agent.
        promptSessionAttributes:
          type: object
          properties: {}
          description: Contains attributes that persist across a prompt and the values of those attributes. In orchestration prompt template, these attributes replace the $prompt_session_attributes$ placeholder variable. For more information, see Prompt template placeholder variables. In multi-agent collaboration, the promptSessionAttributes will only be used by supervisor agent when $prompt_session_attributes$ is present in prompt template.
        returnControlInvocationResults:
          $ref: "#/components/schemas/ReturnControlInvocationResults"
          description: Contains information about the results from the action group invocation. For more information, see Return control to the agent developer and Control session context. If you include this field, the inputText field will be ignored.
        sessionAttributes:
          type: object
          properties: {}
          description: Contains attributes that persist across a session and the values of those attributes. If sessionAttributes are passed to a supervisor agent in multi-agent collaboration, it will be forwarded to all agent collaborators.
    ConversationHistory:
