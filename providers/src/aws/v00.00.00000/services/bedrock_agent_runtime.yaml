        responseState:
          $ref: "#/components/schemas/ResponseState"
          description: Controls the final response state returned to end user when API/Function execution failed. When this state is FAILURE, the request would fail with dependency failure exception. When this state is REPROMPT, the API/function response will be sent to model for re-prompt
      required:
        - actionGroup
    StreamingConfigurations:
