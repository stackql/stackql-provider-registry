    MetadataConfigurationForReranking:
      description: Contains configurations for the metadata to use in reranking.
      type: object
      properties:
        selectionMode:
          $ref: "#/components/schemas/RerankingMetadataSelectionMode"
          description: Specifies whether to consider all metadata when reranking, or only the metadata that you select. If you specify SELECTIVE, include the selectiveModeConfiguration field.
        selectiveModeConfiguration:
          $ref: "#/components/schemas/RerankingMetadataSelectiveModeConfiguration"
          description: Contains configurations for the metadata fields to include or exclude when considering reranking.
      required:
        - selectionMode
    RerankingMetadataSelectionMode:
      type: string
      enum:
        - SELECTIVE
        - ALL
    RerankingMetadataSelectiveModeConfiguration:
      description: Contains configurations for the metadata fields to include or exclude when considering reranking. If you include the fieldsToExclude field, the reranker ignores all the metadata fields that you specify. If you include the fieldsToInclude field, the reranker uses only the metadata fields that you specify and ignores all others. You can include only one of these fields.
      type: object
      properties:
        fieldsToExclude:
          $ref: "#/components/schemas/FieldsForReranking"
          description: An array of objects, each of which specifies a metadata field to exclude from consideration when reranking.
        fieldsToInclude:
          $ref: "#/components/schemas/FieldsForReranking"
          description: An array of objects, each of which specifies a metadata field to include in consideration when reranking. The remaining metadata fields are ignored.
    FieldsForReranking:
