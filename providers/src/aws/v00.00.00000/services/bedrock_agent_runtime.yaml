openapi: 3.0.0
info:
  version: "2023-07-26"
  title: Agents for Amazon Bedrock Runtime
  description: Agents for Amazon Bedrock Runtime
  x-serviceName: bedrock
  x-serviceAlias: bedrock_agent_runtime
  x-protocol: rest-json
  x-apiVersion: "2023-07-26"
  x-endpointPrefix: bedrock-agent-runtime
  x-jsonVersion: "1.1"
servers:
  - url: https://bedrock-agent-runtime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-agent-runtime
paths:
  /sessions/{session_identifier}/invocations/:
    put:
      operationId: CreateInvocation
      description: Creates a new invocation within a session. An invocation groups the related invocation steps that store the content from a conversation. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions. Related APIs ListInvocations ListSessions GetSession
      parameters:
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the associated session for the invocation. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/InvocationDescription"
                invocationId:
                  $ref: "#/components/schemas/Uuid"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvocationResponse"
    post:
      operationId: ListInvocations
      description: Lists all invocations associated with a specific session. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the session to list invocations for. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvocationsResponse"
  /sessions/:
    put:
      operationId: CreateSession
      description: "Creates a session to temporarily store conversations for generative AI (GenAI) applications built with open-source frameworks such as LangGraph and LlamaIndex. Sessions enable you to save the state of conversations at checkpoints, with the added security and infrastructure of Amazon Web Services. For more information, see Store and retrieve conversation history and context with Amazon Bedrock sessions. By default, Amazon Bedrock uses Amazon Web Services-managed keys for session encryption, including session metadata, or you can use your own KMS key. For more information, see Amazon Bedrock session encryption. You use a session to store state and conversation history for generative AI applications built with open-source frameworks. For Amazon Bedrock Agents, the service automatically manages conversation context and associates them with the agent-specific sessionId you specify in the InvokeAgent API operation. Related APIs: ListSessions GetSession EndSession DeleteSession"
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                encryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                sessionMetadata:
                  $ref: "#/components/schemas/SessionMetadataMap"
                tags:
                  $ref: "#/components/schemas/TagsMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
    post:
      operationId: ListSessions
      description: Lists all sessions in your Amazon Web Services account. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSessionsResponse"
  /agents/{agent_id}/agentAliases/{agent_alias_id}/memories:
    delete:
      operationId: DeleteAgentMemory
      description: Deletes memory from the specified memory identifier.
      parameters:
        - name: agent_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentAliasId"
          description: The unique identifier of an alias of an agent.
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentId"
          description: The unique identifier of the agent to which the alias belongs.
        - name: memoryId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The unique identifier of the memory.
        - name: sessionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The unique session identifier of the memory.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAgentMemoryResponse"
    get:
      operationId: GetAgentMemory
      description: Gets the sessions stored in the memory of the agent.
      parameters:
        - name: agent_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentAliasId"
          description: The unique identifier of an alias of an agent.
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentId"
          description: The unique identifier of the agent to which the alias belongs.
        - name: maxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: memoryId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The unique identifier of the memory.
        - name: memoryType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MemoryType"
          description: The type of memory.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxItems value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgentMemoryResponse"
  /sessions/{session_identifier}/:
    delete:
      operationId: DeleteSession
      description: Deletes a session that you ended. You can't delete a session with an ACTIVE status. To delete an active session, you must first end it with the EndSession API operation. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the session to be deleted. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSessionResponse"
    get:
      operationId: GetSession
      description: Retrieves details about a specific session. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: A unique identifier for the session to retrieve. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"
    put:
      operationId: UpdateSession
      description: Updates the metadata or encryption settings of a session. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier of the session to modify. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionMetadata:
                  $ref: "#/components/schemas/SessionMetadataMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSessionResponse"
  /sessions/{session_identifier}:
    patch:
      operationId: EndSession
      description: Ends the session. After you end a session, you can still access its content but you can’t add to it. To delete the session and it's content, you use the DeleteSession API operation. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the session to end. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndSessionResponse"
  /generateQuery:
    post:
      operationId: GenerateQuery
      description: Generates an SQL query from a natural language query. For more information, see Generate a query for structured data in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                queryGenerationInput:
                  $ref: "#/components/schemas/QueryGenerationInput"
                transformationConfiguration:
                  $ref: "#/components/schemas/TransformationConfiguration"
              required:
                - queryGenerationInput
                - transformationConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateQueryResponse"
  /flows/{flow_identifier}/aliases/{flow_alias_identifier}/executions/{execution_identifier}/flowsnapshot:
    get:
      operationId: GetExecutionFlowSnapshot
      description: Retrieves the flow definition snapshot used for a flow execution. The snapshot represents the flow metadata and definition as it existed at the time the execution was started. Note that even if the flow is edited after an execution starts, the snapshot connected to the execution remains unchanged. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      parameters:
        - name: execution_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowExecutionIdentifier"
          description: The unique identifier of the flow execution.
        - name: flow_alias_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias used for the flow execution.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExecutionFlowSnapshotResponse"
  /flows/{flow_identifier}/aliases/{flow_alias_identifier}/executions/{execution_identifier}:
    get:
      operationId: GetFlowExecution
      description: Retrieves details about a specific flow execution, including its status, start and end times, and any errors that occurred during execution.
      parameters:
        - name: execution_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowExecutionIdentifier"
          description: The unique identifier of the flow execution to retrieve.
        - name: flow_alias_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias used for the execution.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFlowExecutionResponse"
  /sessions/{session_identifier}/invocationSteps/{invocation_step_id}:
    post:
      operationId: GetInvocationStep
      description: Retrieves the details of a specific invocation step within an invocation in a session. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: invocation_step_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The unique identifier (in UUID format) for the specific invocation step to retrieve.
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the invocation step's associated session. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invocationIdentifier:
                  $ref: "#/components/schemas/InvocationIdentifier"
              required:
                - invocationIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInvocationStepResponse"
  /agents/{agent_id}/agentAliases/{agent_alias_id}/sessions/{session_id}/text:
    post:
      operationId: InvokeAgent
      description: "Sends a prompt for the agent to process and respond to. Note the following fields for the request: To continue the same conversation with an agent, use the same sessionId value in the request. To activate trace enablement, turn enableTrace to true. Trace enablement helps you follow the agent's reasoning process that led it to the information it processed, the actions it took, and the final result it yielded. For more information, see Trace enablement. End a conversation by setting endSession to true. In the sessionState object, you can include attributes for the session or prompt or, if you configured an action group to return control, results from invocation of the action group. The response contains both chunk and trace attributes. The final response is returned in the bytes field of the chunk object. The InvokeAgent returns one chunk for the entire interaction. The attribution object contains citations for parts of the response. If you set enableTrace to true in the request, you can trace the agent's steps and reasoning process that led it to the response. If the action predicted was configured to return control, the response returns parameters for the action, elicited from the user, in the returnControl field. Errors are also surfaced in the response."
      parameters:
        - name: agent_alias_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentAliasId"
          description: The alias of the agent to use.
        - name: agent_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AgentId"
          description: The unique identifier of the agent to use.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The unique identifier of the session. Use the same value across requests to continue the same conversation.
        - name: x-amz-source-arn
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/AWSResourceARN"
          description: The ARN of the resource making the request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bedrockModelConfigurations:
                  $ref: "#/components/schemas/BedrockModelConfigurations"
                enableTrace:
                  $ref: "#/components/schemas/Boolean"
                endSession:
                  $ref: "#/components/schemas/Boolean"
                inputText:
                  $ref: "#/components/schemas/InputText"
                memoryId:
                  $ref: "#/components/schemas/MemoryId"
                promptCreationConfigurations:
                  $ref: "#/components/schemas/PromptCreationConfigurations"
                sessionState:
                  $ref: "#/components/schemas/SessionState"
                streamingConfigurations:
                  $ref: "#/components/schemas/StreamingConfigurations"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeAgentResponse"
  /flows/{flow_identifier}/aliases/{flow_alias_identifier}:
    post:
      operationId: InvokeFlow
      description: Invokes an alias of a flow to run the inputs that you specify and return the output of each node as a stream. If there's an error, the error is returned. For more information, see Test a flow in Amazon Bedrock in the Amazon Bedrock User Guide. The CLI doesn't support streaming operations in Amazon Bedrock, including InvokeFlow.
      parameters:
        - name: flow_alias_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enableTrace:
                  $ref: "#/components/schemas/Boolean"
                executionId:
                  $ref: "#/components/schemas/FlowExecutionId"
                inputs:
                  $ref: "#/components/schemas/FlowInputs"
                modelPerformanceConfiguration:
                  $ref: "#/components/schemas/ModelPerformanceConfiguration"
              required:
                - inputs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeFlowResponse"
  /agents/{session_id}:
    post:
      operationId: InvokeInlineAgent
      description: Invokes an inline Amazon Bedrock agent using the configurations you provide with the request. Specify the following fields for security purposes. (Optional) customerEncryptionKeyArn – The Amazon Resource Name (ARN) of a KMS key to encrypt the creation of the agent. (Optional) idleSessionTTLinSeconds – Specify the number of seconds for which the agent should maintain session information. After this time expires, the subsequent InvokeInlineAgent request begins a new session. To override the default prompt behavior for agent orchestration and to use advanced prompts, include a promptOverrideConfiguration object. For more information, see Advanced prompts. The agent instructions will not be honored if your agent has only one knowledge base, uses default prompts, has no action group, and user input is disabled.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The unique identifier of the session. Use the same value across requests to continue the same conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actionGroups:
                  $ref: "#/components/schemas/AgentActionGroups"
                agentCollaboration:
                  $ref: "#/components/schemas/AgentCollaboration"
                agentName:
                  $ref: "#/components/schemas/Name"
                bedrockModelConfigurations:
                  $ref: "#/components/schemas/InlineBedrockModelConfigurations"
                collaboratorConfigurations:
                  $ref: "#/components/schemas/CollaboratorConfigurations"
                collaborators:
                  $ref: "#/components/schemas/Collaborators"
                customOrchestration:
                  $ref: "#/components/schemas/CustomOrchestration"
                customerEncryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                enableTrace:
                  $ref: "#/components/schemas/Boolean"
                endSession:
                  $ref: "#/components/schemas/Boolean"
                foundationModel:
                  $ref: "#/components/schemas/ModelIdentifier"
                guardrailConfiguration:
                  $ref: "#/components/schemas/GuardrailConfigurationWithArn"
                idleSessionTTLInSeconds:
                  $ref: "#/components/schemas/SessionTTL"
                inlineSessionState:
                  $ref: "#/components/schemas/InlineSessionState"
                inputText:
                  $ref: "#/components/schemas/InputText"
                instruction:
                  $ref: "#/components/schemas/Instruction"
                knowledgeBases:
                  $ref: "#/components/schemas/KnowledgeBases"
                orchestrationType:
                  $ref: "#/components/schemas/OrchestrationType"
                promptCreationConfigurations:
                  $ref: "#/components/schemas/PromptCreationConfigurations"
                promptOverrideConfiguration:
                  $ref: "#/components/schemas/PromptOverrideConfiguration"
                streamingConfigurations:
                  $ref: "#/components/schemas/StreamingConfigurations"
              required:
                - foundationModel
                - instruction
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeInlineAgentResponse"
  /flows/{flow_identifier}/aliases/{flow_alias_identifier}/executions/{execution_identifier}/events:
    get:
      operationId: ListFlowExecutionEvents
      description: Lists events that occurred during a flow execution. Events provide detailed information about the execution progress, including node inputs and outputs, flow inputs and outputs, condition results, and failure events. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      parameters:
        - name: eventType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/FlowExecutionEventType"
          description: The type of events to retrieve. Specify Node for node-level events or Flow for flow-level events.
        - name: execution_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowExecutionIdentifier"
          description: The unique identifier of the flow execution.
        - name: flow_alias_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias used for the execution.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of events to return in a single response. If more events exist than the specified maxResults value, a token is included in the response so that the remaining results can be retrieved.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next set of results. This value is returned in the response if more results are available.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowExecutionEventsResponse"
  /flows/{flow_identifier}/executions:
    get:
      operationId: ListFlowExecutions
      description: Lists all executions of a flow. Results can be paginated and include summary information about each execution, such as status, start and end times, and the execution's Amazon Resource Name (ARN). Flow executions is in preview release for Amazon Bedrock and is subject to change.
      parameters:
        - name: flowAliasIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias to list executions for.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow to list executions for.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of flow executions to return in a single response. If more executions exist than the specified maxResults value, a token is included in the response so that the remaining results can be retrieved.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next set of results. This value is returned in the response if more results are available.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowExecutionsResponse"
  /sessions/{session_identifier}/invocationSteps/:
    post:
      operationId: ListInvocationSteps
      description: Lists all invocation steps associated with a session and optionally, an invocation within the session. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the session associated with the invocation steps. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                invocationIdentifier:
                  $ref: "#/components/schemas/InvocationIdentifier"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvocationStepsResponse"
    put:
      operationId: PutInvocationStep
      description: "Add an invocation step to an invocation in a session. An invocation step stores fine-grained state checkpoints, including text and images, for each interaction. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions. Related APIs: GetInvocationStep ListInvocationSteps ListInvocations ListSessions"
      parameters:
        - name: session_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionIdentifier"
          description: The unique identifier for the session to add the invocation step to. You can specify either the session's sessionId or its Amazon Resource Name (ARN).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invocationIdentifier:
                  $ref: "#/components/schemas/InvocationIdentifier"
                invocationStepId:
                  $ref: "#/components/schemas/Uuid"
                invocationStepTime:
                  $ref: "#/components/schemas/DateTimestamp"
                payload:
                  $ref: "#/components/schemas/InvocationStepPayload"
              required:
                - invocationIdentifier
                - invocationStepTime
                - payload
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutInvocationStepResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: List all the tags for the resource you specify.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TaggableResourcesArn"
          description: The Amazon Resource Name (ARN) of the resource for which to list tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Associate tags with a resource. For more information, see Tagging resources in the Amazon Bedrock User Guide.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TaggableResourcesArn"
          description: The Amazon Resource Name (ARN) of the resource to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Remove tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TaggableResourcesArn"
          description: The Amazon Resource Name (ARN) of the resource from which to remove tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of keys of the tags to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /optimize-prompt:
    post:
      operationId: OptimizePrompt
      description: Optimizes a prompt for the task that you specify. For more information, see Optimize a prompt in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  $ref: "#/components/schemas/InputPrompt"
                targetModelId:
                  $ref: "#/components/schemas/OptimizePromptRequestTargetModelIdString"
              required:
                - input
                - targetModelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizePromptResponse"
  /rerank:
    post:
      operationId: Rerank
      description: Reranks the relevance of sources based on queries. For more information, see Improve the relevance of query responses with a reranker model.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                queries:
                  $ref: "#/components/schemas/RerankQueriesList"
                rerankingConfiguration:
                  $ref: "#/components/schemas/RerankingConfiguration"
                sources:
                  $ref: "#/components/schemas/RerankSourcesList"
              required:
                - queries
                - rerankingConfiguration
                - sources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RerankResponse"
  /knowledgebases/{knowledge_base_id}/retrieve:
    post:
      operationId: Retrieve
      description: Queries a knowledge base and retrieves information from it.
      parameters:
        - name: knowledge_base_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/KnowledgeBaseId"
          description: The unique identifier of the knowledge base to query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                guardrailConfiguration:
                  $ref: "#/components/schemas/GuardrailConfiguration"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                retrievalConfiguration:
                  $ref: "#/components/schemas/KnowledgeBaseRetrievalConfiguration"
                retrievalQuery:
                  $ref: "#/components/schemas/KnowledgeBaseQuery"
              required:
                - retrievalQuery
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveResponse"
  /retrieveAndGenerate:
    post:
      operationId: RetrieveAndGenerate
      description: Queries a knowledge base and generates responses based on the retrieved results and using the specified foundation model or inference profile. The response only cites sources that are relevant to the query.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  $ref: "#/components/schemas/RetrieveAndGenerateInput"
                retrieveAndGenerateConfiguration:
                  $ref: "#/components/schemas/RetrieveAndGenerateConfiguration"
                sessionConfiguration:
                  $ref: "#/components/schemas/RetrieveAndGenerateSessionConfiguration"
                sessionId:
                  $ref: "#/components/schemas/SessionId"
              required:
                - input
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveAndGenerateResponse"
  /retrieveAndGenerateStream:
    post:
      operationId: RetrieveAndGenerateStream
      description: Queries a knowledge base and generates responses based on the retrieved results, with output in streaming format. The CLI doesn't support streaming operations in Amazon Bedrock, including InvokeModelWithResponseStream. This operation requires permission for the bedrock:RetrieveAndGenerate action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  $ref: "#/components/schemas/RetrieveAndGenerateInput"
                retrieveAndGenerateConfiguration:
                  $ref: "#/components/schemas/RetrieveAndGenerateConfiguration"
                sessionConfiguration:
                  $ref: "#/components/schemas/RetrieveAndGenerateSessionConfiguration"
                sessionId:
                  $ref: "#/components/schemas/SessionId"
              required:
                - input
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveAndGenerateStreamResponse"
  /flows/{flow_identifier}/aliases/{flow_alias_identifier}/executions:
    post:
      operationId: StartFlowExecution
      description: Starts an execution of an Amazon Bedrock flow. Unlike flows that run until completion or time out after five minutes, flow executions let you run flows asynchronously for longer durations. Flow executions also yield control so that your application can perform other tasks. This operation returns an Amazon Resource Name (ARN) that you can use to track and manage your flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      parameters:
        - name: flow_alias_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias to use for the flow execution.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow to execute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowExecutionName:
                  $ref: "#/components/schemas/FlowExecutionName"
                inputs:
                  $ref: "#/components/schemas/FlowInputs"
                modelPerformanceConfiguration:
                  $ref: "#/components/schemas/ModelPerformanceConfiguration"
              required:
                - inputs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFlowExecutionResponse"
  /flows/{flow_identifier}/aliases/{flow_alias_identifier}/executions/{execution_identifier}/stop:
    post:
      operationId: StopFlowExecution
      description: Stops an Amazon Bedrock flow's execution. This operation prevents further processing of the flow and changes the execution status to Aborted.
      parameters:
        - name: execution_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowExecutionIdentifier"
          description: The unique identifier of the flow execution to stop.
        - name: flow_alias_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias used for the execution.
        - name: flow_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopFlowExecutionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SessionIdentifier:
      type: string
      pattern: ^(arn:aws(-[^:]+)?:bedrock:[a-z0-9-]+:[0-9]{12}:session/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})|([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})$
    InvocationDescription:
      type: string
      minLength: 1
      maxLength: 200
    Uuid:
      type: string
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    CreateInvocationResponse:
      type: object
      properties:
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp for when the invocation was created.
        invocationId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier for the invocation.
        sessionId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier for the session associated with the invocation.
      required:
        - createdAt
        - invocationId
        - sessionId
    DateTimestamp:
      description: Time Stamp.
      type: string
      format: date-time
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws(|-cn|-us-gov):kms:[a-zA-Z0-9-]*:[0-9]{12}:key/[a-zA-Z0-9-]{36}$
    SessionMetadataMap:
      type: object
      properties: {}
    TagsMap:
      description: A map of tag keys and values
      type: object
      properties: {}
    CreateSessionResponse:
      type: object
      properties:
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp for when the session was created.
        sessionArn:
          $ref: "#/components/schemas/SessionArn"
          description: The Amazon Resource Name (ARN) of the created session.
        sessionId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier for the session.
        sessionStatus:
          $ref: "#/components/schemas/SessionStatus"
          description: The current status of the session.
      required:
        - createdAt
        - sessionArn
        - sessionId
        - sessionStatus
    SessionArn:
      type: string
      pattern: ^arn:aws(-[^:]+)?:bedrock:[a-z0-9-]+:[0-9]{12}:session/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    SessionStatus:
      type: string
      enum:
        - ACTIVE
        - EXPIRED
        - ENDED
    AgentAliasId:
      type: string
      minLength: 0
      maxLength: 10
      pattern: ^[0-9a-zA-Z]+$
    AgentId:
      type: string
      minLength: 0
      maxLength: 10
      pattern: ^[0-9a-zA-Z]+$
    MemoryId:
      type: string
      minLength: 2
      maxLength: 100
      pattern: ^[0-9a-zA-Z._:-]+$
    SessionId:
      type: string
      minLength: 2
      maxLength: 100
      pattern: ^[0-9a-zA-Z._:-]+$
    DeleteAgentMemoryResponse:
      type: object
    DeleteSessionResponse:
      type: object
    EndSessionResponse:
      type: object
      properties:
        sessionArn:
          $ref: "#/components/schemas/SessionArn"
          description: The Amazon Resource Name (ARN) of the session you ended.
        sessionId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the session you ended.
        sessionStatus:
          $ref: "#/components/schemas/SessionStatus"
          description: The current status of the session you ended.
      required:
        - sessionArn
        - sessionId
        - sessionStatus
    QueryGenerationInput:
      description: Contains information about a natural language query to transform into SQL.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/QueryGenerationInputTextString"
          description: The text of the query.
        type_:
          $ref: "#/components/schemas/InputQueryType"
          description: The type of the query.
      required:
        - text
        - type_
    QueryGenerationInputTextString:
      type: string
      minLength: 1
      maxLength: 20000
    InputQueryType:
      type: string
      enum:
        - TEXT
    TransformationConfiguration:
      description: Contains configurations for transforming the natural language query into SQL.
      type: object
      properties:
        mode:
          $ref: "#/components/schemas/QueryTransformationMode"
          description: The mode of the transformation.
        textToSqlConfiguration:
          $ref: "#/components/schemas/TextToSqlConfiguration"
          description: Specifies configurations for transforming text to SQL.
      required:
        - mode
    QueryTransformationMode:
      type: string
      enum:
        - TEXT_TO_SQL
    TextToSqlConfiguration:
      description: Contains configurations for transforming text to SQL.
      type: object
      properties:
        knowledgeBaseConfiguration:
          $ref: "#/components/schemas/TextToSqlKnowledgeBaseConfiguration"
          description: Specifies configurations for a knowledge base to use in transformation.
        type_:
          $ref: "#/components/schemas/TextToSqlConfigurationType"
          description: The type of resource to use in transformation.
      required:
        - type_
    TextToSqlKnowledgeBaseConfiguration:
      description: Contains configurations for a knowledge base to use in transformation.
      type: object
      properties:
        knowledgeBaseArn:
          $ref: "#/components/schemas/KnowledgeBaseArn"
          description: The ARN of the knowledge base
      required:
        - knowledgeBaseArn
    KnowledgeBaseArn:
      type: string
      minLength: 0
      maxLength: 128
      pattern: ^arn:aws(|-cn|-us-gov):bedrock:[a-zA-Z0-9-]*:[0-9]{12}:knowledge-base/[0-9a-zA-Z]+$
    TextToSqlConfigurationType:
      type: string
      enum:
        - KNOWLEDGE_BASE
    GenerateQueryResponse:
      type: object
      properties:
        queries:
          $ref: "#/components/schemas/GeneratedQueries"
          description: A list of objects, each of which defines a generated query that can correspond to the natural language queries.
    GeneratedQueries:
      type: array
      items:
        $ref: "#/components/schemas/GeneratedQuery"
    GeneratedQuery:
      description: Contains information about a query generated for a natural language query.
      type: object
      properties:
        sql:
          $ref: "#/components/schemas/String"
          description: An SQL query that corresponds to the natural language query.
        type_:
          $ref: "#/components/schemas/GeneratedQueryType"
          description: The type of transformed query.
    String:
      type: string
    GeneratedQueryType:
      type: string
      enum:
        - REDSHIFT_SQL
    MaxResults:
      description: Max Results.
      type: integer
      minimum: 1
      maximum: 1000
    MemoryType:
      type: string
      enum:
        - SESSION_SUMMARY
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^\S*$
    GetAgentMemoryResponse:
      type: object
      properties:
        memoryContents:
          $ref: "#/components/schemas/Memories"
          description: Contains details of the sessions stored in the memory
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the total number of results is greater than the maxItems value provided in the request, use this token when making another request in the nextToken field to return the next batch of results.
    Memories:
      type: array
      items:
        $ref: "#/components/schemas/Memory"
    Memory:
      description: Contains sessions summaries.
      type: object
      properties:
        sessionSummary:
          $ref: "#/components/schemas/MemorySessionSummary"
          description: Contains summary of a session.
    MemorySessionSummary:
      description: Contains details of a session summary.
      type: object
      properties:
        memoryId:
          $ref: "#/components/schemas/MemoryId"
          description: The unique identifier of the memory where the session summary is stored.
        sessionExpiryTime:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time when the memory duration for the session is set to end.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The identifier for this session.
        sessionStartTime:
          $ref: "#/components/schemas/DateTimestamp"
          description: The start time for this session.
        summaryText:
          $ref: "#/components/schemas/SummaryText"
          description: The summarized text for this session.
    SummaryText:
      type: string
      minLength: 0
      maxLength: 25000000
    FlowExecutionIdentifier:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^[a-zA-Z0-9-]{1,36}$|^(arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:flow/[0-9a-zA-Z]{10}/alias/[0-9a-zA-Z]{10}/execution/[a-zA-Z0-9-]{1,36})$
    FlowAliasIdentifier:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^(arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:flow/[0-9a-zA-Z]{10}/alias/[0-9a-zA-Z]{10})|(\bTSTALIASID\b|[0-9a-zA-Z]+)$
    FlowIdentifier:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^(arn:aws:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:flow/[0-9a-zA-Z]{10})|([0-9a-zA-Z]{10})$
    GetExecutionFlowSnapshotResponse:
      type: object
      properties:
        customerEncryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the customer managed KMS key that's used to encrypt the flow snapshot.
        definition:
          $ref: "#/components/schemas/String"
          description: The flow definition used for the flow execution, including the nodes, connections, and configuration at the time when the execution started. The definition returns as a string that follows the structure of a FlowDefinition object.
        executionRoleArn:
          $ref: "#/components/schemas/FlowExecutionRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM service role that's used by the flow execution.
        flowAliasIdentifier:
          $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias used for the flow execution.
        flowIdentifier:
          $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
        flowVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the flow used for the flow execution.
      required:
        - definition
        - executionRoleArn
        - flowAliasIdentifier
        - flowIdentifier
        - flowVersion
    FlowExecutionRoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^arn:aws(-[^:]+)?:iam::([0-9]{12})?:role/(service-role/)?.+$
    Version:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^(DRAFT|[0-9]{0,4}[1-9][0-9]{0,4})$
    GetFlowExecutionResponse:
      type: object
      properties:
        endedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the flow execution ended. This field is only populated when the execution has completed, failed, timed out, or been aborted.
        errors:
          $ref: "#/components/schemas/FlowExecutionErrors"
          description: A list of errors that occurred during the flow execution. Each error includes an error code, message, and the node where the error occurred, if applicable.
        executionArn:
          $ref: "#/components/schemas/FlowExecutionIdentifier"
          description: The Amazon Resource Name (ARN) that uniquely identifies the flow execution.
        flowAliasIdentifier:
          $ref: "#/components/schemas/FlowAliasIdentifier"
          description: The unique identifier of the flow alias used for the execution.
        flowIdentifier:
          $ref: "#/components/schemas/FlowIdentifier"
          description: The unique identifier of the flow.
        flowVersion:
          $ref: "#/components/schemas/Version"
          description: The version of the flow used for the execution.
        startedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the flow execution started.
        status:
          $ref: "#/components/schemas/FlowExecutionStatus"
          description: The current status of the flow execution. Flow executions time out after 24 hours.
      required:
        - executionArn
        - flowAliasIdentifier
        - flowIdentifier
        - flowVersion
        - startedAt
        - status
    FlowExecutionErrors:
      type: array
      items:
        $ref: "#/components/schemas/FlowExecutionError"
    FlowExecutionError:
      description: Contains information about an error that occurred during an flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        error:
          $ref: "#/components/schemas/FlowExecutionErrorType"
          description: The error code for the type of error that occurred.
        message:
          $ref: "#/components/schemas/String"
          description: A descriptive message that provides details about the error.
        nodeName:
          $ref: "#/components/schemas/NodeName"
          description: The name of the node in the flow where the error occurred (if applicable).
    FlowExecutionErrorType:
      type: string
      enum:
        - ExecutionTimedOut
    NodeName:
      type: string
      pattern: ^[a-zA-Z]([_]?[0-9a-zA-Z]){0,99}$
    FlowExecutionStatus:
      type: string
      enum:
        - Running
        - Succeeded
        - Failed
        - TimedOut
        - Aborted
    InvocationIdentifier:
      type: string
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    GetInvocationStepResponse:
      type: object
      properties:
        invocationStep:
          $ref: "#/components/schemas/InvocationStep"
          description: The complete details of the requested invocation step.
      required:
        - invocationStep
    InvocationStep:
      description: Stores fine-grained state checkpoints, including text and images, for each interaction in an invocation in a session. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      type: object
      properties:
        invocationId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier (in UUID format) for the invocation that includes the invocation step.
        invocationStepId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier (in UUID format) for the invocation step.
        invocationStepTime:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp for when the invocation step was created.
        payload:
          $ref: "#/components/schemas/InvocationStepPayload"
          description: Payload content, such as text and images, for the invocation step.
        sessionId:
          $ref: "#/components/schemas/Uuid"
          description: The unique identifier of the session containing the invocation step.
      required:
        - invocationId
        - invocationStepId
        - invocationStepTime
        - payload
        - sessionId
    InvocationStepPayload:
      description: Payload content, such as text and images, for the invocation step.
      type: object
      properties:
        contentBlocks:
          $ref: "#/components/schemas/BedrockSessionContentBlocks"
          description: The content for the invocation step.
    BedrockSessionContentBlocks:
      type: array
      items:
        $ref: "#/components/schemas/BedrockSessionContentBlock"
    BedrockSessionContentBlock:
      description: A block of content that you pass to, or receive from, a Amazon Bedrock session in an invocation step. You pass the content to a session in the payLoad of the PutInvocationStep API operation. You retrieve the content with the GetInvocationStep API operation. For more information about sessions, see Store and retrieve conversation history and context with Amazon Bedrock sessions.
      type: object
      properties:
        image:
          $ref: "#/components/schemas/ImageBlock"
          description: The image in the invocation step.
        text:
          $ref: "#/components/schemas/BedrockSessionContentBlockTextString"
          description: The text in the invocation step.
    ImageBlock:
      description: Image content for an invocation step.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/ImageFormat"
          description: The format of the image.
        source:
          $ref: "#/components/schemas/ImageSource"
          description: The source for the image.
      required:
        - format_
        - source
    ImageFormat:
      type: string
      enum:
        - png
        - jpeg
        - gif
        - webp
    ImageSource:
