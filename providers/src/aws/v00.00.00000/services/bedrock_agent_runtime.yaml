        - STRING
        - NUMBER
        - BOOLEAN
        - STRING_LIST
    BedrockModelArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(arn:aws(-[^:]+)?:(bedrock|sagemaker):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?$
    KnowledgeBaseVectorSearchConfigurationNumberOfResultsInteger:
      type: integer
