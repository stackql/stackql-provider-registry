          description: Specify a built-in or computer use action for this action group. If you specify a value, you must leave the description, apiSchema, and actionGroupExecutor fields empty for this action group. To allow your agent to request the user for additional information when trying to complete a task, set this field to AMAZON.UserInput. To allow your agent to generate, run, and troubleshoot code when trying to complete a task, set this field to AMAZON.CodeInterpreter. To allow your agent to use an Anthropic computer use tool, specify one of the following values. Computer use is a new Anthropic Claude model capability (in beta) available with Anthropic Claude 3.7 Sonnet and Claude 3.5 Sonnet v2 only. When operating computer use functionality, we recommend taking additional security precautions, such as executing computer actions in virtual environments with restricted data access and limited internet connectivity. For more information, see Configure an Amazon Bedrock Agent to complete tasks with computer use tools. ANTHROPIC.Computer - Gives the agent permission to use the mouse and keyboard and take screenshots. ANTHROPIC.TextEditor - Gives the agent permission to view, create and edit files. ANTHROPIC.Bash - Gives the agent permission to run commands in a bash shell.
        parentActionGroupSignatureParams:
          type: object
          properties: {}
          description: The configuration settings for a computer use action. Computer use is a new Anthropic Claude model capability (in beta) available with Claude 3.7 Sonnet and Claude 3.5 Sonnet v2 only. For more information, see Configure an Amazon Bedrock Agent to complete tasks with computer use tools.
      required:
        - actionGroupName
    ActionGroupExecutor:
      description: Contains details about the Lambda function containing the business logic that is carried out upon invoking the action or the custom control method for handling the information elicited from the user.
      type: object
      properties:
        customControl:
          $ref: "#/components/schemas/CustomControlMethod"
          description: To return the action group invocation results directly in the InvokeInlineAgent response, specify RETURN_CONTROL.
        lambda:
          $ref: "#/components/schemas/LambdaResourceArn"
          description: The Amazon Resource Name (ARN) of the Lambda function containing the business logic that is carried out upon invoking the action.
    CustomControlMethod:
      type: string
      enum:
        - RETURN_CONTROL
    LambdaResourceArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2}(-gov)?-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9-_\.]+(:(\$LATEST|[a-zA-Z0-9-_]+))?$
    ResourceName:
      type: string
      pattern: ^([0-9a-zA-Z][_-]?){1,100}$
    APISchema:
      description: Contains details about the OpenAPI schema for the action group. For more information, see Action group OpenAPI schemas. You can either include the schema directly in the payload field or you can upload it to an S3 bucket and specify the S3 bucket location in the s3 field.
      type: object
      properties:
        payload:
          $ref: "#/components/schemas/Payload"
          description: The JSON or YAML-formatted payload defining the OpenAPI schema for the action group.
        s3:
          $ref: "#/components/schemas/S3Identifier"
          description: Contains details about the S3 object containing the OpenAPI schema for the action group.
    Payload:
      type: string
    S3Identifier:
      description: The identifier information for an Amazon S3 bucket.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket.
        s3ObjectKey:
          $ref: "#/components/schemas/S3ObjectKey"
          description: The S3 object key for the S3 resource.
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9]$
    S3ObjectKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[\.\-\!\*\_\'\(\)a-zA-Z0-9][\.\-\!\*\_\'\(\)\/a-zA-Z0-9]*$
    ResourceDescription:
      description: / @documentation("Description of the using the resource.")
      type: string
      minLength: 1
      maxLength: 200
    FunctionSchema:
      description: Contains details about the function schema for the action group or the JSON or YAML-formatted payload defining the schema.
      type: object
      properties:
        functions:
          $ref: "#/components/schemas/Functions"
          description: A list of functions that each define an action in the action group.
    Functions:
      type: array
      items:
        $ref: "#/components/schemas/FunctionDefinition"
    FunctionDefinition:
      description: Defines parameters that the agent needs to invoke from the user to complete the function. Corresponds to an action in an action group.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/FunctionDescription"
          description: A description of the function and its purpose.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: A name for the function.
        parameters:
          type: object
          properties: {}
          description: The parameters that the agent elicits from the user to fulfill the function.
        requireConfirmation:
          $ref: "#/components/schemas/RequireConfirmation"
          description: Contains information if user confirmation is required to invoke the function.
      required:
        - name
    FunctionDescription:
      type: string
      minLength: 1
      maxLength: 1200
    RequireConfirmation:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ActionGroupSignature:
      type: string
      enum:
        - AMAZON.UserInput
        - AMAZON.CodeInterpreter
        - ANTHROPIC.Computer
        - ANTHROPIC.Bash
        - ANTHROPIC.TextEditor
    AgentCollaboration:
      type: string
      enum:
        - SUPERVISOR
        - SUPERVISOR_ROUTER
        - DISABLED
    InlineBedrockModelConfigurations:
      description: Settings for a model called with InvokeInlineAgent.
      type: object
      properties:
        performanceConfig:
          $ref: "#/components/schemas/PerformanceConfiguration"
          description: The latency configuration for the model.
    CollaboratorConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CollaboratorConfiguration"
    CollaboratorConfiguration:
      description: Settings of an inline collaborator agent.
      type: object
      properties:
        agentAliasArn:
          $ref: "#/components/schemas/AgentAliasArn"
          description: The Amazon Resource Name (ARN) of the inline collaborator agent.
        collaboratorInstruction:
          $ref: "#/components/schemas/CollaborationInstruction"
          description: Instructions that tell the inline collaborator agent what it should do and how it should interact with users.
        collaboratorName:
          $ref: "#/components/schemas/Name"
          description: Name of the inline collaborator agent which must be the same name as specified for agentName.
        relayConversationHistory:
          $ref: "#/components/schemas/RelayConversationHistory"
          description: A relay conversation history for the inline collaborator agent.
      required:
        - collaboratorInstruction
        - collaboratorName
    CollaborationInstruction:
      type: string
      minLength: 1
      maxLength: 4000
    RelayConversationHistory:
      type: string
      enum:
        - TO_COLLABORATOR
        - DISABLED
    Collaborators:
      type: array
      items:
        $ref: "#/components/schemas/Collaborator"
    Collaborator:
      description: List of inline collaborators.
      type: object
      properties:
        actionGroups:
          $ref: "#/components/schemas/AgentActionGroups"
          description: List of action groups with each action group defining tasks the inline collaborator agent needs to carry out.
        agentCollaboration:
          $ref: "#/components/schemas/AgentCollaboration"
          description: Defines how the inline supervisor agent handles information across multiple collaborator agents to coordinate a final response.
        agentName:
          $ref: "#/components/schemas/Name"
          description: Name of the inline collaborator agent which must be the same name as specified for collaboratorName.
        collaboratorConfigurations:
          $ref: "#/components/schemas/CollaboratorConfigurations"
          description: Settings of the collaborator agent.
        customerEncryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the AWS KMS key that encrypts the inline collaborator.
        foundationModel:
          $ref: "#/components/schemas/ModelIdentifier"
          description: The foundation model used by the inline collaborator agent.
        guardrailConfiguration:
          $ref: "#/components/schemas/GuardrailConfigurationWithArn"
          description: Details of the guardwrail associated with the inline collaborator.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The number of seconds for which the Amazon Bedrock keeps information about the user's conversation with the inline collaborator agent. A user interaction remains active for the amount of time specified. If no conversation occurs during this time, the session expires and Amazon Bedrock deletes any data provided before the timeout.
        instruction:
          $ref: "#/components/schemas/Instruction"
          description: Instruction that tell the inline collaborator agent what it should do and how it should interact with users.
        knowledgeBases:
          $ref: "#/components/schemas/KnowledgeBases"
          description: Knowledge base associated with the inline collaborator agent.
        promptOverrideConfiguration:
          $ref: "#/components/schemas/PromptOverrideConfiguration"
          description: Contains configurations to override prompt templates in different parts of an inline collaborator sequence. For more information, see Advanced prompts.
      required:
        - foundationModel
        - instruction
    GuardrailConfigurationWithArn:
      description: The configuration details for the guardrail.
      type: object
      properties:
        guardrailIdentifier:
          $ref: "#/components/schemas/GuardrailIdentifierWithArn"
          description: The unique identifier for the guardrail.
        guardrailVersion:
          $ref: "#/components/schemas/GuardrailVersion"
          description: The version of the guardrail.
      required:
        - guardrailIdentifier
        - guardrailVersion
    GuardrailIdentifierWithArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: ^(([a-z0-9]+)|(arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:guardrail/[a-z0-9]+))$
    GuardrailVersion:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^(([1-9][0-9]{0,7})|(DRAFT))$
    SessionTTL:
      type: integer
      minimum: 60
      maximum: 3600
    Instruction:
      type: string
      minLength: 40
    KnowledgeBases:
      type: array
      items:
        $ref: "#/components/schemas/KnowledgeBase"
    KnowledgeBase:
      description: Details of the knowledge base associated withe inline agent.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the knowledge base associated with the inline agent.
        knowledgeBaseId:
          $ref: "#/components/schemas/KnowledgeBaseId"
          description: The unique identifier for a knowledge base associated with the inline agent.
        retrievalConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseRetrievalConfiguration"
          description: The configurations to apply to the knowledge base during query. For more information, see Query configurations.
      required:
        - description
        - knowledgeBaseId
    PromptOverrideConfiguration:
      description: Contains configurations to override prompts in different parts of an agent sequence. For more information, see Advanced prompts.
      type: object
      properties:
        overrideLambda:
          $ref: "#/components/schemas/LambdaResourceArn"
          description: The ARN of the Lambda function to use when parsing the raw foundation model output in parts of the agent sequence. If you specify this field, at least one of the promptConfigurations must contain a parserMode value that is set to OVERRIDDEN. For more information, see Parser Lambda function in Amazon Bedrock Agents.
        promptConfigurations:
          $ref: "#/components/schemas/PromptConfigurations"
          description: Contains configurations to override a prompt template in one part of an agent sequence. For more information, see Advanced prompts.
      required:
        - promptConfigurations
    PromptConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/PromptConfiguration"
    PromptConfiguration:
      description: Contains configurations to override a prompt template in one part of an agent sequence. For more information, see Advanced prompts.
      type: object
      properties:
        additionalModelRequestFields:
          $ref: "#/components/schemas/Document"
          description: If the Converse or ConverseStream operations support the model, additionalModelRequestFields contains additional inference parameters, beyond the base set of inference parameters in the inferenceConfiguration field. For more information, see Inference request parameters and response fields for foundation models in the Amazon Bedrock user guide.
        basePromptTemplate:
          $ref: "#/components/schemas/BasePromptTemplate"
          description: Defines the prompt template with which to replace the default prompt template. You can use placeholder variables in the base prompt template to customize the prompt. For more information, see Prompt template placeholder variables. For more information, see Configure the prompt templates.
        foundationModel:
          $ref: "#/components/schemas/ModelIdentifier"
          description: The foundation model to use.
        inferenceConfiguration:
          $ref: "#/components/schemas/InferenceConfiguration"
          description: Contains inference parameters to use when the agent invokes a foundation model in the part of the agent sequence defined by the promptType. For more information, see Inference parameters for foundation models.
        parserMode:
          $ref: "#/components/schemas/CreationMode"
          description: Specifies whether to override the default parser Lambda function when parsing the raw foundation model output in the part of the agent sequence defined by the promptType. If you set the field as OVERRIDDEN, the overrideLambda field in the PromptOverrideConfiguration must be specified with the ARN of a Lambda function.
        promptCreationMode:
          $ref: "#/components/schemas/CreationMode"
          description: Specifies whether to override the default prompt template for this promptType. Set this value to OVERRIDDEN to use the prompt that you provide in the basePromptTemplate. If you leave it as DEFAULT, the agent uses a default prompt template.
        promptState:
          $ref: "#/components/schemas/PromptState"
          description: Specifies whether to allow the inline agent to carry out the step specified in the promptType. If you set this value to DISABLED, the agent skips that step. The default state for each promptType is as follows. PRE_PROCESSING – ENABLED ORCHESTRATION – ENABLED KNOWLEDGE_BASE_RESPONSE_GENERATION – ENABLED POST_PROCESSING – DISABLED
        promptType:
          $ref: "#/components/schemas/PromptType"
          description: The step in the agent sequence that this prompt configuration applies to.
    BasePromptTemplate:
      type: string
      minLength: 1
      maxLength: 100000
    PromptState:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CustomOrchestration:
      description: Contains details of the custom orchestration configured for the agent.
      type: object
      properties:
        executor:
          $ref: "#/components/schemas/OrchestrationExecutor"
          description: The structure of the executor invoking the actions in custom orchestration.
    OrchestrationExecutor:
      description: The structure of the executor invoking the actions in custom orchestration.
      type: object
      properties:
        lambda:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function containing the business logic that is carried out upon invoking the action.
    InlineSessionState:
      description: Contains parameters that specify various attributes that persist across a session or prompt. You can define session state attributes as key-value pairs when writing a Lambda function for an action group or pass them when making an InvokeInlineAgent request. Use session state attributes to control and provide conversational context for your inline agent and to help customize your agent's behavior. For more information, see Control session context
      type: object
      properties:
        conversationHistory:
          $ref: "#/components/schemas/ConversationHistory"
          description: Contains the conversation history that persist across sessions.
        files:
          $ref: "#/components/schemas/InputFiles"
          description: Contains information about the files used by code interpreter.
        invocationId:
          $ref: "#/components/schemas/String"
          description: The identifier of the invocation of an action. This value must match the invocationId returned in the InvokeInlineAgent response for the action whose results are provided in the returnControlInvocationResults field. For more information, see Return control to the agent developer.
        promptSessionAttributes:
          type: object
          properties: {}
          description: Contains attributes that persist across a session and the values of those attributes.
        returnControlInvocationResults:
          $ref: "#/components/schemas/ReturnControlInvocationResults"
          description: Contains information about the results from the action group invocation. For more information, see Return control to the agent developer. If you include this field in the sessionState field, the inputText field will be ignored.
        sessionAttributes:
          type: object
          properties: {}
          description: Contains attributes that persist across a session and the values of those attributes.
    OrchestrationType:
      type: string
      enum:
        - DEFAULT
        - CUSTOM_ORCHESTRATION
    InvokeInlineAgentResponse:
      type: object
      properties:
        completion:
          $ref: "#/components/schemas/InlineAgentResponseStream"
          description: The inline agent's response to the user prompt.
        contentType:
          $ref: "#/components/schemas/MimeType"
          description: The MIME type of the input data in the request. The default value is application/json.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The unique identifier of the session with the agent.
      required:
        - completion
        - contentType
        - sessionId
    InlineAgentResponseStream:
      description: The response from invoking the agent and associated citations and trace information.
      type: object
      properties:
        accessDeniedException:
          $ref: "#/components/schemas/AccessDeniedException"
          description: The request is denied because of missing access permissions. Check your permissions and retry your request.
        badGatewayException:
          $ref: "#/components/schemas/BadGatewayException"
          description: There was an issue with a dependency due to a server issue. Retry your request.
        chunk:
          $ref: "#/components/schemas/InlineAgentPayloadPart"
          description: Contains a part of an agent response and citations for it.
        conflictException:
          $ref: "#/components/schemas/ConflictException"
          description: There was a conflict performing an operation. Resolve the conflict and retry your request.
        dependencyFailedException:
          $ref: "#/components/schemas/DependencyFailedException"
          description: There was an issue with a dependency. Check the resource configurations and retry the request.
        files:
          $ref: "#/components/schemas/InlineAgentFilePart"
          description: Contains intermediate response for code interpreter if any files have been generated.
        internalServerException:
          $ref: "#/components/schemas/InternalServerException"
          description: An internal server error occurred. Retry your request.
        resourceNotFoundException:
          $ref: "#/components/schemas/ResourceNotFoundException"
          description: The specified resource Amazon Resource Name (ARN) was not found. Check the Amazon Resource Name (ARN) and try your request again.
        returnControl:
          $ref: "#/components/schemas/InlineAgentReturnControlPayload"
          description: Contains the parameters and information that the agent elicited from the customer to carry out an action. This information is returned to the system and can be used in your own setup for fulfilling the action.
        serviceQuotaExceededException:
          $ref: "#/components/schemas/ServiceQuotaExceededException"
          description: The number of requests exceeds the service quota. Resubmit your request later.
        throttlingException:
          $ref: "#/components/schemas/ThrottlingException"
          description: The number of requests exceeds the limit. Resubmit your request later.
        trace:
          $ref: "#/components/schemas/InlineAgentTracePart"
          description: Contains information about the agent and session, alongside the agent's reasoning process and results from calling actions and querying knowledge bases and metadata about the trace. You can use the trace to understand how the agent arrived at the response it provided the customer. For more information, see Trace events.
        validationException:
          $ref: "#/components/schemas/ValidationException"
          description: Input validation failed. Check your request parameters and retry the request.
    InlineAgentPayloadPart:
      description: Contains a part of an agent response and citations for it.
      type: object
      properties:
        attribution:
          $ref: "#/components/schemas/Attribution"
          description: Contains citations for a part of an agent response.
        bytes:
          $ref: "#/components/schemas/PartBody"
          description: A part of the agent response in bytes.
    InlineAgentFilePart:
      description: Contains intermediate response for code interpreter if any files have been generated.
      type: object
      properties:
        files:
          $ref: "#/components/schemas/OutputFiles"
          description: Files containing intermediate response for the user.
    InlineAgentReturnControlPayload:
      description: Contains information to return from the action group that the agent has predicted to invoke. This data type is used in the InvokeAgent response API operation.
      type: object
      properties:
        invocationId:
          $ref: "#/components/schemas/String"
          description: The identifier of the action group invocation.
        invocationInputs:
          $ref: "#/components/schemas/InvocationInputs"
          description: A list of objects that contain information about the parameters and inputs that need to be sent into the API operation or function, based on what the agent determines from its session with the user.
    InlineAgentTracePart:
      description: Contains information about the agent and session, alongside the agent's reasoning process and results from calling API actions and querying knowledge bases and metadata about the trace. You can use the trace to understand how the agent arrived at the response it provided the customer. For more information, see Trace enablement.
      type: object
      properties:
        callerChain:
          $ref: "#/components/schemas/CallerChain"
          description: The caller chain for the trace part.
        collaboratorName:
          $ref: "#/components/schemas/Name"
          description: The collaborator name for the trace part.
        eventTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time that trace occurred.
        sessionId:
          $ref: "#/components/schemas/SessionId"
          description: The unique identifier of the session with the agent.
        trace:
          $ref: "#/components/schemas/Trace"
          description: Contains one part of the agent's reasoning process and results from calling API actions and querying knowledge bases. You can use the trace to understand how the agent arrived at the response it provided the customer. For more information, see Trace enablement.
    FlowExecutionEventType:
      type: string
      enum:
        - Node
        - Flow
    ListFlowExecutionEventsResponse:
      type: object
      properties:
        flowExecutionEvents:
          $ref: "#/components/schemas/FlowExecutionEvents"
          description: A list of events that occurred during the flow execution. Events can include node inputs and outputs, flow inputs and outputs, condition results, and failure events.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token to retrieve the next set of results. This value is returned if more results are available.
      required:
        - flowExecutionEvents
    FlowExecutionEvents:
      type: array
      items:
        $ref: "#/components/schemas/FlowExecutionEvent"
    FlowExecutionEvent:
      description: Represents an event that occurred during an flow execution. This is a union type that can contain one of several event types, such as node input and output events; flow input and output events; condition node result events, or failure events. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        conditionResultEvent:
          $ref: "#/components/schemas/ConditionResultEvent"
          description: Contains information about a condition evaluation result during the flow execution. This event is generated when a condition node in the flow evaluates its conditions.
        flowFailureEvent:
          $ref: "#/components/schemas/FlowFailureEvent"
          description: Contains information about a failure that occurred at the flow level during execution.
        flowInputEvent:
          $ref: "#/components/schemas/FlowExecutionInputEvent"
          description: Contains information about the inputs provided to the flow at the start of execution.
        flowOutputEvent:
          $ref: "#/components/schemas/FlowExecutionOutputEvent"
          description: Contains information about the outputs produced by the flow at the end of execution.
        nodeActionEvent:
          $ref: "#/components/schemas/NodeActionEvent"
          description: Contains information about an action (operation) called by a node during execution.
        nodeDependencyEvent:
          $ref: "#/components/schemas/NodeDependencyEvent"
          description: Contains information about an internal trace of a specific node during execution.
        nodeFailureEvent:
          $ref: "#/components/schemas/NodeFailureEvent"
          description: Contains information about a failure that occurred at a specific node during execution.
        nodeInputEvent:
          $ref: "#/components/schemas/NodeInputEvent"
          description: Contains information about the inputs provided to a specific node during execution.
        nodeOutputEvent:
          $ref: "#/components/schemas/NodeOutputEvent"
          description: Contains information about the outputs produced by a specific node during execution.
    ConditionResultEvent:
      description: Contains information about a condition evaluation result during a flow execution. This event is generated when a condition node in the flow evaluates its conditions. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        nodeName:
          $ref: "#/components/schemas/NodeName"
          description: The name of the condition node that evaluated the conditions.
        satisfiedConditions:
          $ref: "#/components/schemas/SatisfiedConditions"
          description: A list of conditions that were satisfied during the evaluation.
        timestamp:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the condition evaluation occurred.
      required:
        - nodeName
        - satisfiedConditions
        - timestamp
    SatisfiedConditions:
      type: array
      items:
        $ref: "#/components/schemas/SatisfiedCondition"
    SatisfiedCondition:
      description: Represents a condition that was satisfied during a condition node evaluation in a flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        conditionName:
          $ref: "#/components/schemas/String"
          description: The name of the condition that was satisfied.
      required:
        - conditionName
    FlowFailureEvent:
      description: Contains information about a failure that occurred at the flow level during a flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        errorCode:
          $ref: "#/components/schemas/FlowErrorCode"
          description: The error code that identifies the type of failure that occurred.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: A descriptive message that provides details about the failure.
        timestamp:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the failure occurred.
      required:
        - errorCode
        - errorMessage
        - timestamp
    FlowErrorCode:
      type: string
      enum:
        - VALIDATION
        - INTERNAL_SERVER
        - NODE_EXECUTION_FAILED
    FlowExecutionInputEvent:
      description: Contains information about the inputs provided to the flow at the start of a flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        fields:
          $ref: "#/components/schemas/FlowInputFields"
          description: A list of input fields provided to the flow.
        nodeName:
          $ref: "#/components/schemas/NodeName"
          description: The name of the node that receives the inputs.
        timestamp:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the inputs are provided.
      required:
        - fields
        - nodeName
        - timestamp
    FlowInputFields:
      type: array
      items:
        $ref: "#/components/schemas/FlowInputField"
    FlowInputField:
      description: Represents an input field provided to a flow during a flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        content:
          $ref: "#/components/schemas/FlowExecutionContent"
          description: The content of the input field, which can contain text or structured data.
        name:
          $ref: "#/components/schemas/NodeInputName"
          description: The name of the input field as defined in the flow's input schema.
      required:
        - content
        - name
    FlowExecutionContent:
      description: Contains the content of an flow execution input or output field. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
          description: The document content of the field, which can contain text or structured data.
    FlowExecutionOutputEvent:
      description: Contains information about the outputs produced by the flow during a flow execution. Flow executions is in preview release for Amazon Bedrock and is subject to change.
      type: object
      properties:
        fields:
          $ref: "#/components/schemas/FlowOutputFields"
          description: A list of output fields produced by the flow.
        nodeName:
          $ref: "#/components/schemas/NodeName"
