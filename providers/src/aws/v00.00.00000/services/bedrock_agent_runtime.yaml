    ModelInvocationInput:
      description: The input for the pre-processing step. The type matches the agent step. The text contains the prompt. The inferenceConfiguration, parserMode, and overrideLambda values are set in the PromptOverrideConfiguration object that was set when the agent was created or updated.
      type: object
      properties:
        foundationModel:
          $ref: "#/components/schemas/ModelIdentifier"
          description: The identifier of a foundation model.
        inferenceConfiguration:
          $ref: "#/components/schemas/InferenceConfiguration"
          description: Specifications about the inference parameters that were provided alongside the prompt. These are specified in the PromptOverrideConfiguration object that was set when the agent was created or updated. For more information, see Inference parameters for foundation models.
        overrideLambda:
          $ref: "#/components/schemas/LambdaArn"
          description: The ARN of the Lambda function to use when parsing the raw foundation model output in parts of the agent sequence.
        parserMode:
          $ref: "#/components/schemas/CreationMode"
          description: Specifies whether to override the default parser Lambda function when parsing the raw foundation model output in the part of the agent sequence defined by the promptType.
        promptCreationMode:
          $ref: "#/components/schemas/CreationMode"
          description: Specifies whether the default prompt template was OVERRIDDEN. If it was, the basePromptTemplate that was set in the PromptOverrideConfiguration object when the agent was created or updated is used instead.
        text:
          $ref: "#/components/schemas/PromptText"
          description: The text that prompted the agent at this step.
        traceId:
          $ref: "#/components/schemas/TraceId"
          description: The unique identifier of the trace.
        type_:
          $ref: "#/components/schemas/PromptType"
          description: The step in the agent sequence.
    ModelIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (^arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:(([0-9]{12}:custom-model/[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}(([:][a-z0-9-]{1,63}){0,2})?/[a-z0-9]{12})|(:foundation-model/([a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.]?[a-z0-9-]{1,63})([:][a-z0-9-]{1,63}){0,2})))|(([a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.]?[a-z0-9-]{1,63})([:][a-z0-9-]{1,63}){0,2}))|(([0-9a-zA-Z][_-]?)+))$|(^arn:aws(|-us-gov|-cn|-iso|-iso-b):bedrock:(|[0-9a-z-]{1,20}):(|[0-9]{12}):inference-profile/[a-zA-Z0-9-:.]+)$
    InferenceConfiguration:
      description: Specifications about the inference parameters that were provided alongside the prompt. These are specified in the PromptOverrideConfiguration object that was set when the agent was created or updated. For more information, see Inference parameters for foundation models.
      type: object
      properties:
        maximumLength:
          $ref: "#/components/schemas/MaximumLength"
          description: The maximum number of tokens allowed in the generated response.
        stopSequences:
          $ref: "#/components/schemas/StopSequences"
          description: A list of stop sequences. A stop sequence is a sequence of characters that causes the model to stop generating the response.
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: The likelihood of the model selecting higher-probability options while generating a response. A lower value makes the model more likely to choose higher-probability options, while a higher value makes the model more likely to choose lower-probability options.
        topK:
          $ref: "#/components/schemas/TopK"
          description: While generating a response, the model determines the probability of the following token at each point of generation. The value that you set for topK is the number of most-likely candidates from which the model chooses the next token in the sequence. For example, if you set topK to 50, the model selects the next token from among the top 50 most likely choices.
        topP:
          $ref: "#/components/schemas/TopP"
          description: While generating a response, the model determines the probability of the following token at each point of generation. The value that you set for Top P determines the number of most-likely candidates from which the model chooses the next token in the sequence. For example, if you set topP to 0.8, the model only selects the next token from the top 80% of the probability distribution of next tokens.
    MaximumLength:
      type: integer
      minimum: 0
      maximum: 8192
    StopSequences:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Temperature:
      type: number
      format: float
      minimum: 0
      maximum: 1
    TopK:
      type: integer
      minimum: 0
      maximum: 500
    TopP:
      type: number
      format: float
      minimum: 0
      maximum: 1
    LambdaArn:
      type: string
    CreationMode:
      type: string
      enum:
        - DEFAULT
        - OVERRIDDEN
    PromptText:
      type: string
    PromptType:
      type: string
      enum:
        - PRE_PROCESSING
        - ORCHESTRATION
        - KNOWLEDGE_BASE_RESPONSE_GENERATION
        - POST_PROCESSING
        - ROUTING_CLASSIFIER
    OrchestrationModelInvocationOutput:
      description: The foundation model output from the orchestration step.
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/Metadata"
          description: Contains information about the foundation model output from the orchestration step.
        rawResponse:
          $ref: "#/components/schemas/RawResponse"
          description: Contains details of the raw response from the foundation model output.
        reasoningContent:
          $ref: "#/components/schemas/ReasoningContentBlock"
          description: Contains content about the reasoning that the model made during the orchestration step.
        traceId:
          $ref: "#/components/schemas/TraceId"
          description: The unique identifier of the trace.
    RawResponse:
      description: Contains the raw output from the foundation model.
      type: object
      properties:
        content:
          $ref: "#/components/schemas/String"
          description: The foundation model's raw output content.
    ReasoningContentBlock:
      description: Contains content regarding the reasoning that the foundation model made with respect to the content in the content block. Reasoning refers to a Chain of Thought (CoT) that the model generates to enhance the accuracy of its final response.
      type: object
      properties:
        reasoningText:
          $ref: "#/components/schemas/ReasoningTextBlock"
          description: Contains information about the reasoning that the model used to return the content in the content block.
        redactedContent:
          $ref: "#/components/schemas/Blob"
          description: The content in the reasoning that was encrypted by the model provider for trust and safety reasons.
    ReasoningTextBlock:
      description: Contains information about the reasoning that the model used to return the content in the content block.
      type: object
      properties:
        signature:
          $ref: "#/components/schemas/String"
          description: A hash of all the messages in the conversation to ensure that the content in the reasoning text block isn't tampered with. You must submit the signature in subsequent Converse requests, in addition to the previous messages. If the previous messages are tampered with, the response throws an error.
        text:
          $ref: "#/components/schemas/String"
          description: Text describing the reasoning that the model used to return the content in the content block.
      required:
        - text
    Blob:
      type: string
      format: byte
    Observation:
      description: Contains the result or output of an action group or knowledge base, or the response to the user.
      type: object
      properties:
        actionGroupInvocationOutput:
          $ref: "#/components/schemas/ActionGroupInvocationOutput"
          description: Contains the JSON-formatted string returned by the API invoked by the action group.
        agentCollaboratorInvocationOutput:
          $ref: "#/components/schemas/AgentCollaboratorInvocationOutput"
          description: A collaborator's invocation output.
        codeInterpreterInvocationOutput:
          $ref: "#/components/schemas/CodeInterpreterInvocationOutput"
          description: Contains the JSON-formatted string returned by the API invoked by the code interpreter.
        finalResponse:
          $ref: "#/components/schemas/FinalResponse"
          description: Contains details about the response to the user.
        knowledgeBaseLookupOutput:
          $ref: "#/components/schemas/KnowledgeBaseLookupOutput"
          description: Contains details about the results from looking up the knowledge base.
        repromptResponse:
          $ref: "#/components/schemas/RepromptResponse"
          description: Contains details about the response to reprompt the input.
        traceId:
          $ref: "#/components/schemas/TraceId"
          description: The unique identifier of the trace.
        type_:
          $ref: "#/components/schemas/Type"
          description: Specifies what kind of information the agent returns in the observation. The following values are possible. ACTION_GROUP – The agent returns the result of an action group. KNOWLEDGE_BASE – The agent returns information from a knowledge base. FINISH – The agent returns a final response to the user with no follow-up. ASK_USER – The agent asks the user a question. REPROMPT – The agent prompts the user again for the same information.
    ActionGroupInvocationOutput:
      description: Contains the JSON-formatted string returned by the API invoked by the action group.
      type: object
