        Status:
          $ref: "#/components/schemas/IntegrationStatus"
          description: "The status of the integration being created. The possible statuses are: CREATING: The integration is being created. ACTIVE: The integration creation succeeds. MODIFYING: The integration is being modified. FAILED: The integration creation fails. DELETING: The integration is deleted. SYNCING: The integration is synchronizing. NEEDS_ATTENTION: The integration needs attention, such as synchronization."
        CreateTime:
          $ref: "#/components/schemas/IntegrationTimestamp"
          description: The time when the integration was created, in UTC.
        Errors:
          $ref: "#/components/schemas/IntegrationErrorList"
          description: A list of errors associated with the integration creation.
        DataFilter:
          $ref: "#/components/schemas/String2048"
          description: Selects source tables for the integration using Maxwell filter syntax.
        IntegrationConfig:
          $ref: "#/components/schemas/IntegrationConfig"
          description: The configuration settings.
      required:
        - SourceArn
        - TargetArn
        - IntegrationName
        - IntegrationArn
        - Status
        - CreateTime
    IntegrationStatus:
      type: string
