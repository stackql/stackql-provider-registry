          description: A condition clause used for row-level filtering. Currently unsupported.
        PrimaryKey:
          $ref: "#/components/schemas/PrimaryKeyList"
          description: Provide the primary key set for this table. Currently supported specifically for SAP EntityOf entities upon request. Contact Amazon Web Services Support to make this feature available.
        RecordUpdateField:
          $ref: "#/components/schemas/String128"
          description: Incremental pull timestamp-based field. Currently unsupported.
    SourceTableFieldsList:
      type: array
      items:
        $ref: "#/components/schemas/String128"
    PrimaryKeyList:
      type: array
      items:
        $ref: "#/components/schemas/String128"
    TargetTableConfig:
      description: Properties used by the target leg to partition the data on the target.
      type: object
      properties:
        UnnestSpec:
          $ref: "#/components/schemas/UnnestSpec"
          description: 'Specifies how nested objects are flattened to top-level elements. Valid values are: "TOPLEVEL", "FULL", or "NOUNNEST".'
        PartitionSpec:
          $ref: "#/components/schemas/IntegrationPartitionSpecList"
          description: Determines the file layout on the target.
        TargetTableName:
          $ref: "#/components/schemas/String128"
          description: The optional name of a target table.
    UnnestSpec:
      type: string
      enum:
        - TOPLEVEL
        - FULL
        - NOUNNEST
    IntegrationPartitionSpecList:
      type: array
      items:
        $ref: "#/components/schemas/IntegrationPartition"
    IntegrationPartition:
      description: A structure that describes how data is partitioned on the target.
      type: object
      properties:
        FieldName:
          $ref: "#/components/schemas/String128"
          description: The field name used to partition data on the target. Avoid using columns that have unique values for each row (for example, `LastModifiedTimestamp`, `SystemModTimeStamp`) as the partition column. These columns are not suitable for partitioning because they create a large number of small partitions, which can lead to performance issues.
        FunctionSpec:
          $ref: "#/components/schemas/String128"
          description: "Specifies the function used to partition data on the target. The accepted values for this parameter are: identity - Uses source values directly without transformation year - Extracts the year from timestamp values (e.g., 2023) month - Extracts the month from timestamp values (e.g., 2023-01) day - Extracts the day from timestamp values (e.g., 2023-01-15) hour - Extracts the hour from timestamp values (e.g., 2023-01-15-14)"
        ConversionSpec:
          $ref: "#/components/schemas/String128"
          description: "Specifies the timestamp format of the source data. Valid values are: epoch_sec - Unix epoch timestamp in seconds epoch_milli - Unix epoch timestamp in milliseconds iso - ISO 8601 formatted timestamp Only specify ConversionSpec when using timestamp-based partition functions (year, month, day, or hour). Glue Zero-ETL uses this parameter to correctly transform source data into timestamp format before partitioning. Do not use high-cardinality columns with the identity partition function. High-cardinality columns include: Primary keys Timestamp fields (such as LastModifiedTimestamp, CreatedDate) System-generated timestamps Using high-cardinality columns with identity partitioning creates many small partitions, which can significantly degrade ingestion performance."
    CreateIntegrationTablePropertiesResponse:
      type: object
    GenericMap:
      type: object
      properties: {}
