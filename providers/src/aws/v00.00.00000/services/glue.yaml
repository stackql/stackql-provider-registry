    PartitionIndexStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - FAILED
    BackfillErrors:
      type: array
      items:
        $ref: "#/components/schemas/BackfillError"
    BackfillError:
      description: "A list of errors that can occur when registering partition indexes for an existing table. These errors give the details about why an index registration failed and provide a limited number of partitions in the response, so that you can fix the partitions at fault and try registering the index again. The most common set of errors that can occur are categorized as follows: EncryptedPartitionError: The partitions are encrypted. InvalidPartitionTypeDataError: The partition value doesn't match the data type for that partition column. MissingPartitionValueError: The partitions are encrypted. UnsupportedPartitionCharacterError: Characters inside the partition value are not supported. For example: U+0000 , U+0001, U+0002. InternalError: Any error which does not belong to other error codes."
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/BackfillErrorCode"
          description: The error code for an error that occurred when registering partition indexes for an existing table.
        Partitions:
          $ref: "#/components/schemas/BackfillErroredPartitionsList"
          description: A list of a limited number of partitions in the response.
    BackfillErrorCode:
      type: string
      enum:
        - ENCRYPTED_PARTITION_ERROR
        - INTERNAL_ERROR
        - INVALID_PARTITION_TYPE_DATA_ERROR
        - MISSING_PARTITION_VALUE_ERROR
        - UNSUPPORTED_PARTITION_CHARACTER_ERROR
    BackfillErroredPartitionsList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionValueList"
