          $ref: "#/components/schemas/IcebergTransformString"
          description: The transformation function applied to the source field to create the partition, such as identity, bucket, truncate, year, month, day, or hour.
        Name:
          $ref: "#/components/schemas/ColumnNameString"
          description: The name of the partition field as it will appear in the partitioned table structure.
        FieldId:
          $ref: "#/components/schemas/Integer"
          description: The unique identifier assigned to this partition field within the Iceberg table's partition specification.
      required:
        - SourceId
        - Transform
        - Name
    IcebergTransformString:
      type: string
    IcebergSortOrder:
