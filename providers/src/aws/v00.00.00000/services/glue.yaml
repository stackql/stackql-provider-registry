          description: The ARN for the source of the integration.
        TargetArn:
          $ref: "#/components/schemas/String512"
          description: The ARN for the target of the integration.
        Description:
          $ref: "#/components/schemas/IntegrationDescription"
          description: A description for the integration.
        IntegrationName:
          $ref: "#/components/schemas/String128"
          description: A unique name for the integration.
        IntegrationArn:
          $ref: "#/components/schemas/String128"
          description: The Amazon Resource Name (ARN) for the integration.
        KmsKeyId:
          $ref: "#/components/schemas/String2048"
          description: The ARN of a KMS key used for encrypting the channel.
        AdditionalEncryptionContext:
          type: object
          properties: {}
