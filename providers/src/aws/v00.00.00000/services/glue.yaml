      type: object
      properties:
        MlUserDataEncryptionMode:
          $ref: "#/components/schemas/MLUserDataEncryptionModeString"
          description: "The encryption mode applied to user data. Valid values are: DISABLED: encryption is disabled SSEKMS: use of server-side encryption with Key Management Service (SSE-KMS) for user data stored in Amazon S3."
        KmsKeyId:
          $ref: "#/components/schemas/NameString"
          description: The ID for the customer-provided KMS key.
      required:
        - MlUserDataEncryptionMode
    MLUserDataEncryptionModeString:
      type: string
      enum:
        - DISABLED
        - SSE-KMS
