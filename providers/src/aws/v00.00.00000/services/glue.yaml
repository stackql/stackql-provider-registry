        Status:
          $ref: "#/components/schemas/IntegrationStatus"
          description: "The possible statuses are: CREATING: The integration is being created. ACTIVE: The integration creation succeeds. MODIFYING: The integration is being modified. FAILED: The integration creation fails. DELETING: The integration is deleted. SYNCING: The integration is synchronizing. NEEDS_ATTENTION: The integration needs attention, such as synchronization."
        CreateTime:
