                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: A continuation token, if this is a continuation call.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of catalogs to return in one response.
                Recursive:
                  $ref: "#/components/schemas/Boolean"
                  description: Whether to list all catalogs across the catalog hierarchy, starting from the ParentCatalogId. Defaults to false . When true, all catalog objects in the ParentCatalogID hierarchy are enumerated in the response.
                IncludeRoot:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Whether to list the default catalog in the account and region in the response. Defaults to false. When true and ParentCatalogId = NULL | Amazon Web Services Account ID, all catalogs and the default catalog are enumerated in the response. When the ParentCatalogId is not equal to null, and this attribute is passed as false or true, an InvalidInputException is thrown.
