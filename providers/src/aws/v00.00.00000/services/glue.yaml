          description: The name of the field as it appears in the table schema and query operations.
        Type:
          $ref: "#/components/schemas/IcebergDocument"
          description: The data type definition for this field, specifying the structure and format of the data it contains.
        Required:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this field is required (non-nullable) or optional (nullable) in the table schema.
