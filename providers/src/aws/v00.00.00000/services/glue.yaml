      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    NameString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    PartitionInputList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionInput"
    PartitionInput:
      description: The structure used to create and update a partition.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ValueStringList"
          description: The values of the partition. Although this parameter is not required by the SDK, you must specify this parameter for a valid input. The values for the keys for the new partition must be passed as an array of String objects that must be ordered in the same order as the partition keys appearing in the Amazon S3 prefix. Otherwise Glue will add the values to the wrong keys.
        LastAccessTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time at which the partition was accessed.
        StorageDescriptor:
          $ref: "#/components/schemas/StorageDescriptor"
          description: Provides information about the physical location where the partition is stored.
        Parameters:
          type: object
          properties: {}
          description: These key-value pairs define partition parameters.
        LastAnalyzedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time at which column statistics were computed for this partition.
    ValueStringList:
      type: array
      items:
        $ref: "#/components/schemas/ValueString"
    ValueString:
      type: string
      minLength: 1
      maxLength: 1024
    Timestamp:
      type: string
      format: date-time
    StorageDescriptor:
      description: Describes the physical storage of table data.
      type: object
      properties:
        Columns:
          $ref: "#/components/schemas/ColumnList"
          description: A list of the Columns in the table.
        Location:
          $ref: "#/components/schemas/LocationString"
          description: The physical location of the table. By default, this takes the form of the warehouse location, followed by the database location in the warehouse, followed by the table name.
        AdditionalLocations:
          $ref: "#/components/schemas/LocationStringList"
          description: A list of locations that point to the path where a Delta table is located.
        InputFormat:
          $ref: "#/components/schemas/FormatString"
          description: "The input format: SequenceFileInputFormat (binary), or TextInputFormat, or a custom format."
        OutputFormat:
          $ref: "#/components/schemas/FormatString"
          description: "The output format: SequenceFileOutputFormat (binary), or IgnoreKeyTextOutputFormat, or a custom format."
        Compressed:
          $ref: "#/components/schemas/Boolean"
          description: True if the data in the table is compressed, or False if not.
        NumberOfBuckets:
          $ref: "#/components/schemas/Integer"
          description: Must be specified if the table contains any dimension columns.
        SerdeInfo:
          $ref: "#/components/schemas/SerDeInfo"
          description: The serialization/deserialization (SerDe) information.
        BucketColumns:
          $ref: "#/components/schemas/NameStringList"
          description: A list of reducer grouping columns, clustering columns, and bucketing columns in the table.
        SortColumns:
          $ref: "#/components/schemas/OrderList"
          description: A list specifying the sort order of each bucket in the table.
        Parameters:
          type: object
          properties: {}
          description: The user-supplied properties in key-value form.
        SkewedInfo:
          $ref: "#/components/schemas/SkewedInfo"
          description: The information about values that appear frequently in a column (skewed values).
        StoredAsSubDirectories:
          $ref: "#/components/schemas/Boolean"
          description: True if the table data is stored in subdirectories, or False if not.
        SchemaReference:
          $ref: "#/components/schemas/SchemaReference"
          description: An object that references a schema stored in the Glue Schema Registry. When creating a table, you can pass an empty list of columns for the schema, and instead use a schema reference.
    ColumnList:
      type: array
      items:
        $ref: "#/components/schemas/Column"
    Column:
      description: A column in a Table.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the Column.
        Type:
          $ref: "#/components/schemas/ColumnTypeString"
          description: The data type of the Column.
        Comment:
          $ref: "#/components/schemas/CommentString"
          description: A free-form text comment.
        Parameters:
          type: object
          properties: {}
          description: These key-value pairs define properties associated with the column.
      required:
        - Name
    ColumnTypeString:
      type: string
      minLength: 0
      maxLength: 131072
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    CommentString:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    LocationString:
      type: string
      maxLength: 2056
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    LocationStringList:
      type: array
      items:
        $ref: "#/components/schemas/LocationString"
    FormatString:
      type: string
      maxLength: 128
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    Boolean:
      type: boolean
    Integer:
      type: integer
    SerDeInfo:
      description: Information about a serialization/deserialization program (SerDe) that serves as an extractor and loader.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: Name of the SerDe.
        SerializationLibrary:
          $ref: "#/components/schemas/NameString"
          description: Usually the class that implements the SerDe. An example is org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe.
        Parameters:
          type: object
          properties: {}
          description: These key-value pairs define initialization parameters for the SerDe.
    NameStringList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    OrderList:
      type: array
      items:
        $ref: "#/components/schemas/Order"
    Order:
      description: Specifies the sort order of a sorted column.
      type: object
      properties:
        Column:
          $ref: "#/components/schemas/NameString"
          description: The name of the column.
        SortOrder:
          $ref: "#/components/schemas/IntegerFlag"
          description: Indicates that the column is sorted in ascending order (== 1), or in descending order (==0).
      required:
        - Column
        - SortOrder
    IntegerFlag:
      type: integer
      minimum: 0
      maximum: 1
    SkewedInfo:
      description: Specifies skewed values in a table. Skewed values are those that occur with very high frequency.
      type: object
      properties:
        SkewedColumnNames:
          $ref: "#/components/schemas/NameStringList"
          description: A list of names of columns that contain skewed values.
        SkewedColumnValues:
          $ref: "#/components/schemas/ColumnValueStringList"
          description: A list of values that appear so frequently as to be considered skewed.
        SkewedColumnValueLocationMaps:
          type: object
          properties: {}
          description: A mapping of skewed values to the columns that contain them.
    ColumnValueStringList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnValuesString"
    ColumnValuesString:
      type: string
    SchemaReference:
      description: An object that references a schema stored in the Glue Schema Registry.
      type: object
      properties:
        SchemaId:
          $ref: "#/components/schemas/SchemaId"
          description: A structure that contains schema identity fields. Either this or the SchemaVersionId has to be provided.
        SchemaVersionId:
          $ref: "#/components/schemas/SchemaVersionIdString"
          description: The unique ID assigned to a version of the schema. Either this or the SchemaId has to be provided.
        SchemaVersionNumber:
          $ref: "#/components/schemas/VersionLongNumber"
          description: The version number of the schema.
    SchemaId:
      description: The unique ID of the schema in the Glue schema registry.
      type: object
      properties:
        SchemaArn:
          $ref: "#/components/schemas/GlueResourceArn"
          description: The Amazon Resource Name (ARN) of the schema. One of SchemaArn or SchemaName has to be provided.
        SchemaName:
          $ref: "#/components/schemas/SchemaRegistryNameString"
          description: The name of the schema. One of SchemaArn or SchemaName has to be provided.
        RegistryName:
          $ref: "#/components/schemas/SchemaRegistryNameString"
          description: The name of the schema registry that contains the schema.
    GlueResourceArn:
      type: string
      minLength: 1
      maxLength: 10240
      pattern: arn:aws(-(cn|us-gov|iso(-[bef])?))?:glue:.*
    SchemaRegistryNameString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9-_$#.]+"
    SchemaVersionIdString:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    VersionLongNumber:
      type: integer
      format: int64
      minimum: 1
      maximum: 100000
    BatchCreatePartitionResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/PartitionErrors"
          description: The errors encountered when trying to create the requested partitions.
    PartitionErrors:
      type: array
      items:
        $ref: "#/components/schemas/PartitionError"
    PartitionError:
      description: Contains information about a partition error.
      type: object
      properties:
        PartitionValues:
          $ref: "#/components/schemas/ValueStringList"
          description: The values that define the partition.
        ErrorDetail:
          $ref: "#/components/schemas/ErrorDetail"
          description: The details about the partition error.
    ErrorDetail:
      description: Contains details about an error.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/NameString"
          description: The code associated with this error.
        ErrorMessage:
          $ref: "#/components/schemas/DescriptionString"
          description: A message describing the error.
    DescriptionString:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    DeleteConnectionNameList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    BatchDeleteConnectionResponse:
      type: object
      properties:
        Succeeded:
          $ref: "#/components/schemas/NameStringList"
          description: A list of names of the connection definitions that were successfully deleted.
        Errors:
          type: object
          properties: {}
          description: A map of the names of connections that were not successfully deleted to error details.
    BatchDeletePartitionValueList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionValueList"
    PartitionValueList:
      description: Contains a list of values defining partitions.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ValueStringList"
          description: The list of values.
      required:
        - Values
    BatchDeletePartitionResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/PartitionErrors"
          description: The errors encountered when trying to delete the requested partitions.
    BatchDeleteTableNameList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    TransactionIdString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\p{L}\\p{N}\\p{P}]*"
    BatchDeleteTableResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/TableErrors"
          description: A list of errors encountered in attempting to delete the specified tables.
    TableErrors:
      type: array
      items:
        $ref: "#/components/schemas/TableError"
    TableError:
      description: An error record for table operations.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/NameString"
          description: The name of the table. For Hive compatibility, this must be entirely lowercase.
        ErrorDetail:
          $ref: "#/components/schemas/ErrorDetail"
          description: The details about the error.
    BatchDeleteTableVersionList:
      type: array
      items:
        $ref: "#/components/schemas/VersionString"
    VersionString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    BatchDeleteTableVersionResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/TableVersionErrors"
          description: A list of errors encountered while trying to delete the specified table versions.
    TableVersionErrors:
      type: array
      items:
        $ref: "#/components/schemas/TableVersionError"
    TableVersionError:
      description: An error record for table-version operations.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/NameString"
          description: The name of the table in question.
        VersionId:
          $ref: "#/components/schemas/VersionString"
          description: The ID value of the version in question. A VersionID is a string representation of an integer. Each version is incremented by 1.
        ErrorDetail:
          $ref: "#/components/schemas/ErrorDetail"
          description: The details about the error.
    BatchGetBlueprintNames:
      type: array
      items:
        $ref: "#/components/schemas/OrchestrationNameString"
    OrchestrationNameString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\.\\-_A-Za-z0-9]+"
    NullableBoolean:
      type: boolean
    BatchGetBlueprintsResponse:
      type: object
      properties:
        Blueprints:
          $ref: "#/components/schemas/Blueprints"
          description: Returns a list of blueprint as a Blueprints object.
        MissingBlueprints:
          $ref: "#/components/schemas/BlueprintNames"
          description: Returns a list of BlueprintNames that were not found.
    Blueprints:
      type: array
      items:
        $ref: "#/components/schemas/Blueprint"
    Blueprint:
      description: The details of a blueprint.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/OrchestrationNameString"
          description: The name of the blueprint.
        Description:
          $ref: "#/components/schemas/Generic512CharString"
          description: The description of the blueprint.
        CreatedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time the blueprint was registered.
        LastModifiedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time the blueprint was last modified.
        ParameterSpec:
          $ref: "#/components/schemas/BlueprintParameterSpec"
          description: A JSON string that indicates the list of parameter specifications for the blueprint.
        BlueprintLocation:
          $ref: "#/components/schemas/GenericString"
          description: Specifies the path in Amazon S3 where the blueprint is published.
        BlueprintServiceLocation:
          $ref: "#/components/schemas/GenericString"
          description: Specifies a path in Amazon S3 where the blueprint is copied when you call CreateBlueprint/UpdateBlueprint to register the blueprint in Glue.
        Status:
          $ref: "#/components/schemas/BlueprintStatus"
          description: The status of the blueprint registration. Creating — The blueprint registration is in progress. Active — The blueprint has been successfully registered. Updating — An update to the blueprint registration is in progress. Failed — The blueprint registration failed.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorString"
          description: An error message.
        LastActiveDefinition:
          $ref: "#/components/schemas/LastActiveDefinition"
          description: When there are multiple versions of a blueprint and the latest version has some errors, this attribute indicates the last successful blueprint definition that is available with the service.
    Generic512CharString:
      type: string
      minLength: 1
      maxLength: 512
    TimestampValue:
      type: string
      format: date-time
    BlueprintParameterSpec:
      type: string
      minLength: 1
      maxLength: 131072
    GenericString:
      type: string
    BlueprintStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - UPDATING
        - FAILED
    ErrorString:
      type: string
    LastActiveDefinition:
      description: When there are multiple versions of a blueprint and the latest version has some errors, this attribute indicates the last successful blueprint definition that is available with the service.
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/Generic512CharString"
          description: The description of the blueprint.
        LastModifiedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time the blueprint was last modified.
        ParameterSpec:
          $ref: "#/components/schemas/BlueprintParameterSpec"
          description: A JSON string specifying the parameters for the blueprint.
        BlueprintLocation:
          $ref: "#/components/schemas/GenericString"
          description: Specifies a path in Amazon S3 where the blueprint is published by the Glue developer.
        BlueprintServiceLocation:
          $ref: "#/components/schemas/GenericString"
          description: Specifies a path in Amazon S3 where the blueprint is copied when you create or update the blueprint.
    BlueprintNames:
      type: array
      items:
        $ref: "#/components/schemas/OrchestrationNameString"
    CrawlerNameList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    BatchGetCrawlersResponse:
      type: object
      properties:
        Crawlers:
          $ref: "#/components/schemas/CrawlerList"
          description: A list of crawler definitions.
        CrawlersNotFound:
          $ref: "#/components/schemas/CrawlerNameList"
          description: A list of names of crawlers that were not found.
    CrawlerList:
      type: array
      items:
        $ref: "#/components/schemas/Crawler"
    Crawler:
      description: Specifies a crawler program that examines a data source and uses classifiers to try to determine its schema. If successful, the crawler records metadata concerning the data source in the Glue Data Catalog.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the crawler.
        Role:
          $ref: "#/components/schemas/Role"
          description: The Amazon Resource Name (ARN) of an IAM role that's used to access customer resources, such as Amazon Simple Storage Service (Amazon S3) data.
        Targets:
          $ref: "#/components/schemas/CrawlerTargets"
          description: A collection of targets to crawl.
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of the database in which the crawler's output is stored.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: A description of the crawler.
        Classifiers:
          $ref: "#/components/schemas/ClassifierNameList"
          description: A list of UTF-8 strings that specify the custom classifiers that are associated with the crawler.
        RecrawlPolicy:
          $ref: "#/components/schemas/RecrawlPolicy"
          description: A policy that specifies whether to crawl the entire dataset again, or to crawl only folders that were added since the last crawler run.
        SchemaChangePolicy:
          $ref: "#/components/schemas/SchemaChangePolicy"
          description: The policy that specifies update and delete behaviors for the crawler.
        LineageConfiguration:
          $ref: "#/components/schemas/LineageConfiguration"
          description: A configuration that specifies whether data lineage is enabled for the crawler.
        State:
          $ref: "#/components/schemas/CrawlerState"
          description: Indicates whether the crawler is running, or whether a run is pending.
        TablePrefix:
          $ref: "#/components/schemas/TablePrefix"
          description: The prefix added to the names of tables that are created.
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: For scheduled crawlers, the schedule when the crawler runs.
        CrawlElapsedTime:
          $ref: "#/components/schemas/MillisecondsCount"
          description: If the crawler is running, contains the total time elapsed since the last crawl began.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the crawler was created.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the crawler was last updated.
        LastCrawl:
          $ref: "#/components/schemas/LastCrawlInfo"
          description: The status of the last crawl, and potentially error information if an error occurred.
        Version:
          $ref: "#/components/schemas/VersionId"
          description: The version of the crawler.
        Configuration:
          $ref: "#/components/schemas/CrawlerConfiguration"
          description: Crawler configuration information. This versioned JSON string allows users to specify aspects of a crawler's behavior. For more information, see Setting crawler configuration options.
        CrawlerSecurityConfiguration:
          $ref: "#/components/schemas/CrawlerSecurityConfiguration"
          description: The name of the SecurityConfiguration structure to be used by this crawler.
        LakeFormationConfiguration:
          $ref: "#/components/schemas/LakeFormationConfiguration"
          description: Specifies whether the crawler should use Lake Formation credentials for the crawler instead of the IAM role credentials.
    Role:
      type: string
    CrawlerTargets:
      description: Specifies data stores to crawl.
      type: object
      properties:
        S3Targets:
          $ref: "#/components/schemas/S3TargetList"
          description: Specifies Amazon Simple Storage Service (Amazon S3) targets.
        JdbcTargets:
          $ref: "#/components/schemas/JdbcTargetList"
          description: Specifies JDBC targets.
        MongoDBTargets:
          $ref: "#/components/schemas/MongoDBTargetList"
          description: Specifies Amazon DocumentDB or MongoDB targets.
        DynamoDBTargets:
          $ref: "#/components/schemas/DynamoDBTargetList"
          description: Specifies Amazon DynamoDB targets.
        CatalogTargets:
          $ref: "#/components/schemas/CatalogTargetList"
          description: Specifies Glue Data Catalog targets.
        DeltaTargets:
          $ref: "#/components/schemas/DeltaTargetList"
          description: Specifies Delta data store targets.
        IcebergTargets:
          $ref: "#/components/schemas/IcebergTargetList"
          description: Specifies Apache Iceberg data store targets.
        HudiTargets:
          $ref: "#/components/schemas/HudiTargetList"
          description: Specifies Apache Hudi data store targets.
    S3TargetList:
      type: array
      items:
        $ref: "#/components/schemas/S3Target"
    S3Target:
      description: Specifies a data store in Amazon Simple Storage Service (Amazon S3).
      type: object
      properties:
        Path:
          $ref: "#/components/schemas/Path"
          description: The path to the Amazon S3 target.
        Exclusions:
          $ref: "#/components/schemas/PathList"
          description: A list of glob patterns used to exclude from the crawl. For more information, see Catalog Tables with a Crawler.
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of a connection which allows a job or crawler to access data in Amazon S3 within an Amazon Virtual Private Cloud environment (Amazon VPC).
        SampleSize:
          $ref: "#/components/schemas/NullableInteger"
          description: Sets the number of files in each leaf folder to be crawled when crawling sample files in a dataset. If not set, all the files are crawled. A valid value is an integer between 1 and 249.
        EventQueueArn:
          $ref: "#/components/schemas/EventQueueArn"
          description: A valid Amazon SQS ARN. For example, arn:aws:sqs:region:account:sqs.
        DlqEventQueueArn:
          $ref: "#/components/schemas/EventQueueArn"
          description: A valid Amazon dead-letter SQS ARN. For example, arn:aws:sqs:region:account:deadLetterQueue.
    Path:
      type: string
    PathList:
      type: array
      items:
        $ref: "#/components/schemas/Path"
    ConnectionName:
      type: string
    NullableInteger:
      type: integer
    EventQueueArn:
      type: string
    JdbcTargetList:
      type: array
      items:
        $ref: "#/components/schemas/JdbcTarget"
    JdbcTarget:
      description: Specifies a JDBC data store to crawl.
      type: object
      properties:
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection to use to connect to the JDBC target.
        Path:
          $ref: "#/components/schemas/Path"
          description: The path of the JDBC target.
        Exclusions:
          $ref: "#/components/schemas/PathList"
          description: A list of glob patterns used to exclude from the crawl. For more information, see Catalog Tables with a Crawler.
        EnableAdditionalMetadata:
          $ref: "#/components/schemas/EnableAdditionalMetadata"
          description: Specify a value of RAWTYPES or COMMENTS to enable additional metadata in table responses. RAWTYPES provides the native-level datatype. COMMENTS provides comments associated with a column or table in the database. If you do not need additional metadata, keep the field empty.
    EnableAdditionalMetadata:
      type: array
      items:
        $ref: "#/components/schemas/JdbcMetadataEntry"
    JdbcMetadataEntry:
      type: string
      enum:
        - COMMENTS
        - RAWTYPES
    MongoDBTargetList:
      type: array
      items:
        $ref: "#/components/schemas/MongoDBTarget"
    MongoDBTarget:
      description: Specifies an Amazon DocumentDB or MongoDB data store to crawl.
      type: object
      properties:
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection to use to connect to the Amazon DocumentDB or MongoDB target.
        Path:
          $ref: "#/components/schemas/Path"
          description: The path of the Amazon DocumentDB or MongoDB target (database/collection).
        ScanAll:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether to scan all the records, or to sample rows from the table. Scanning all the records can take a long time when the table is not a high throughput table. A value of true means to scan all records, while a value of false means to sample the records. If no value is specified, the value defaults to true.
    DynamoDBTargetList:
      type: array
      items:
        $ref: "#/components/schemas/DynamoDBTarget"
    DynamoDBTarget:
      description: Specifies an Amazon DynamoDB table to crawl.
      type: object
      properties:
        Path:
          $ref: "#/components/schemas/Path"
          description: The name of the DynamoDB table to crawl.
        scanAll:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether to scan all the records, or to sample rows from the table. Scanning all the records can take a long time when the table is not a high throughput table. A value of true means to scan all records, while a value of false means to sample the records. If no value is specified, the value defaults to true.
        scanRate:
          $ref: "#/components/schemas/NullableDouble"
          description: The percentage of the configured read capacity units to use by the Glue crawler. Read capacity units is a term defined by DynamoDB, and is a numeric value that acts as rate limiter for the number of reads that can be performed on that table per second. The valid values are null or a value between 0.1 to 1.5. A null value is used when user does not provide a value, and defaults to 0.5 of the configured Read Capacity Unit (for provisioned tables), or 0.25 of the max configured Read Capacity Unit (for tables using on-demand mode).
    NullableDouble:
      type: number
      format: double
    CatalogTargetList:
      type: array
      items:
        $ref: "#/components/schemas/CatalogTarget"
    CatalogTarget:
      description: Specifies an Glue Data Catalog target.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/NameString"
          description: The name of the database to be synchronized.
        Tables:
          $ref: "#/components/schemas/CatalogTablesList"
          description: A list of the tables to be synchronized.
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection for an Amazon S3-backed Data Catalog table to be a target of the crawl when using a Catalog connection type paired with a NETWORK Connection type.
        EventQueueArn:
          $ref: "#/components/schemas/EventQueueArn"
          description: A valid Amazon SQS ARN. For example, arn:aws:sqs:region:account:sqs.
        DlqEventQueueArn:
          $ref: "#/components/schemas/EventQueueArn"
          description: A valid Amazon dead-letter SQS ARN. For example, arn:aws:sqs:region:account:deadLetterQueue.
      required:
        - DatabaseName
        - Tables
    CatalogTablesList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    DeltaTargetList:
      type: array
      items:
        $ref: "#/components/schemas/DeltaTarget"
    DeltaTarget:
      description: Specifies a Delta data store to crawl one or more Delta tables.
      type: object
      properties:
        DeltaTables:
          $ref: "#/components/schemas/PathList"
          description: A list of the Amazon S3 paths to the Delta tables.
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection to use to connect to the Delta table target.
        WriteManifest:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether to write the manifest files to the Delta table path.
        CreateNativeDeltaTable:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether the crawler will create native tables, to allow integration with query engines that support querying of the Delta transaction log directly.
    IcebergTargetList:
      type: array
      items:
        $ref: "#/components/schemas/IcebergTarget"
    IcebergTarget:
      description: Specifies an Apache Iceberg data source where Iceberg tables are stored in Amazon S3.
      type: object
      properties:
        Paths:
          $ref: "#/components/schemas/PathList"
          description: One or more Amazon S3 paths that contains Iceberg metadata folders as s3://bucket/prefix.
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection to use to connect to the Iceberg target.
        Exclusions:
          $ref: "#/components/schemas/PathList"
          description: A list of glob patterns used to exclude from the crawl. For more information, see Catalog Tables with a Crawler.
        MaximumTraversalDepth:
          $ref: "#/components/schemas/NullableInteger"
          description: The maximum depth of Amazon S3 paths that the crawler can traverse to discover the Iceberg metadata folder in your Amazon S3 path. Used to limit the crawler run time.
    HudiTargetList:
      type: array
      items:
        $ref: "#/components/schemas/HudiTarget"
    HudiTarget:
      description: Specifies an Apache Hudi data source.
      type: object
      properties:
        Paths:
          $ref: "#/components/schemas/PathList"
          description: An array of Amazon S3 location strings for Hudi, each indicating the root folder with which the metadata files for a Hudi table resides. The Hudi folder may be located in a child folder of the root folder. The crawler will scan all folders underneath a path for a Hudi folder.
        ConnectionName:
          $ref: "#/components/schemas/ConnectionName"
          description: The name of the connection to use to connect to the Hudi target. If your Hudi files are stored in buckets that require VPC authorization, you can set their connection properties here.
        Exclusions:
          $ref: "#/components/schemas/PathList"
          description: A list of glob patterns used to exclude from the crawl. For more information, see Catalog Tables with a Crawler.
        MaximumTraversalDepth:
          $ref: "#/components/schemas/NullableInteger"
          description: The maximum depth of Amazon S3 paths that the crawler can traverse to discover the Hudi metadata folder in your Amazon S3 path. Used to limit the crawler run time.
    DatabaseName:
      type: string
    ClassifierNameList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    RecrawlPolicy:
      description: When crawling an Amazon S3 data source after the first crawl is complete, specifies whether to crawl the entire dataset again or to crawl only folders that were added since the last crawler run. For more information, see Incremental Crawls in Glue in the developer guide.
      type: object
      properties:
        RecrawlBehavior:
          $ref: "#/components/schemas/RecrawlBehavior"
          description: Specifies whether to crawl the entire dataset again or to crawl only folders that were added since the last crawler run. A value of CRAWL_EVERYTHING specifies crawling the entire dataset again. A value of CRAWL_NEW_FOLDERS_ONLY specifies crawling only folders that were added since the last crawler run. A value of CRAWL_EVENT_MODE specifies crawling only the changes identified by Amazon S3 events.
    RecrawlBehavior:
      type: string
      enum:
        - CRAWL_EVERYTHING
        - CRAWL_NEW_FOLDERS_ONLY
        - CRAWL_EVENT_MODE
    SchemaChangePolicy:
      description: A policy that specifies update and deletion behaviors for the crawler.
      type: object
      properties:
        UpdateBehavior:
          $ref: "#/components/schemas/UpdateBehavior"
          description: The update behavior when the crawler finds a changed schema.
        DeleteBehavior:
          $ref: "#/components/schemas/DeleteBehavior"
          description: The deletion behavior when the crawler finds a deleted object.
    UpdateBehavior:
      type: string
      enum:
        - LOG
        - UPDATE_IN_DATABASE
    DeleteBehavior:
      type: string
      enum:
        - LOG
        - DELETE_FROM_DATABASE
        - DEPRECATE_IN_DATABASE
    LineageConfiguration:
      description: Specifies data lineage configuration settings for the crawler.
      type: object
      properties:
        CrawlerLineageSettings:
          $ref: "#/components/schemas/CrawlerLineageSettings"
          description: "Specifies whether data lineage is enabled for the crawler. Valid values are: ENABLE: enables data lineage for the crawler DISABLE: disables data lineage for the crawler"
    CrawlerLineageSettings:
      type: string
      enum:
        - ENABLE
        - DISABLE
    CrawlerState:
      type: string
      enum:
        - READY
        - RUNNING
        - STOPPING
    TablePrefix:
      type: string
      minLength: 0
      maxLength: 128
    Schedule:
      description: A scheduling object using a cron statement to schedule an event.
      type: object
      properties:
        ScheduleExpression:
          $ref: "#/components/schemas/CronExpression"
          description: "A cron expression used to specify the schedule (see Time-Based Schedules for Jobs and Crawlers. For example, to run something every day at 12:15 UTC, you would specify: cron(15 12 * * ? *)."
        State:
          $ref: "#/components/schemas/ScheduleState"
          description: The state of the schedule.
    CronExpression:
      type: string
    ScheduleState:
      type: string
      enum:
        - SCHEDULED
        - NOT_SCHEDULED
        - TRANSITIONING
    MillisecondsCount:
      type: integer
      format: int64
    LastCrawlInfo:
      description: Status and error information about the most recent crawl.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/LastCrawlStatus"
          description: Status of the last crawl.
        ErrorMessage:
          $ref: "#/components/schemas/DescriptionString"
          description: If an error occurred, the error information about the last crawl.
        LogGroup:
          $ref: "#/components/schemas/LogGroup"
          description: The log group for the last crawl.
        LogStream:
          $ref: "#/components/schemas/LogStream"
          description: The log stream for the last crawl.
        MessagePrefix:
          $ref: "#/components/schemas/MessagePrefix"
          description: The prefix for a message about this crawl.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the crawl started.
    LastCrawlStatus:
      type: string
      enum:
        - SUCCEEDED
        - CANCELLED
        - FAILED
    LogGroup:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    LogStream:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[^:*]*"
    MessagePrefix:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    VersionId:
      type: integer
      format: int64
    CrawlerConfiguration:
      type: string
    CrawlerSecurityConfiguration:
      type: string
      minLength: 0
      maxLength: 128
    LakeFormationConfiguration:
      description: Specifies Lake Formation configuration settings for the crawler.
      type: object
      properties:
        UseLakeFormationCredentials:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether to use Lake Formation credentials for the crawler instead of the IAM role credentials.
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: Required for cross account crawls. For same account crawls as the target data, this can be left as null.
    AccountId:
      type: string
      minLength: 0
      maxLength: 12
    CustomEntityTypeNames:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    BatchGetCustomEntityTypesResponse:
      type: object
      properties:
        CustomEntityTypes:
          $ref: "#/components/schemas/CustomEntityTypes"
          description: A list of CustomEntityType objects representing the custom patterns that have been created.
        CustomEntityTypesNotFound:
          $ref: "#/components/schemas/CustomEntityTypeNames"
          description: A list of the names of custom patterns that were not found.
    CustomEntityTypes:
      type: array
      items:
        $ref: "#/components/schemas/CustomEntityType"
    CustomEntityType:
      description: An object representing a custom pattern for detecting sensitive data across the columns and rows of your structured data.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: A name for the custom pattern that allows it to be retrieved or deleted later. This name must be unique per Amazon Web Services account.
        RegexString:
          $ref: "#/components/schemas/NameString"
          description: A regular expression string that is used for detecting sensitive data in a custom pattern.
        ContextWords:
          $ref: "#/components/schemas/ContextWords"
          description: A list of context words. If none of these context words are found within the vicinity of the regular expression the data will not be detected as sensitive data. If no context words are passed only a regular expression is checked.
      required:
        - Name
        - RegexString
    ContextWords:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    DataQualityResultIds:
      type: array
      items:
        $ref: "#/components/schemas/HashString"
    HashString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    BatchGetDataQualityResultResponse:
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/DataQualityResultsList"
          description: A list of DataQualityResult objects representing the data quality results.
        ResultsNotFound:
          $ref: "#/components/schemas/DataQualityResultIds"
          description: A list of result IDs for which results were not found.
      required:
        - Results
    DataQualityResultsList:
      type: array
      items:
        $ref: "#/components/schemas/DataQualityResult"
    DataQualityResult:
      description: Describes a data quality result.
      type: object
      properties:
        ResultId:
          $ref: "#/components/schemas/HashString"
          description: A unique result ID for the data quality result.
        ProfileId:
          $ref: "#/components/schemas/HashString"
          description: The Profile ID for the data quality result.
        Score:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: An aggregate data quality score. Represents the ratio of rules that passed to the total number of rules.
        DataSource:
          $ref: "#/components/schemas/DataSource"
          description: The table associated with the data quality result, if any.
        RulesetName:
          $ref: "#/components/schemas/NameString"
          description: The name of the ruleset associated with the data quality result.
        EvaluationContext:
          $ref: "#/components/schemas/GenericString"
          description: In the context of a job in Glue Studio, each node in the canvas is typically assigned some sort of name and data quality nodes will have names. In the case of multiple nodes, the evaluationContext can differentiate the nodes.
        StartedOn:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when this data quality run started.
        CompletedOn:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when this data quality run completed.
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The job name associated with the data quality result, if any.
        JobRunId:
          $ref: "#/components/schemas/HashString"
          description: The job run ID associated with the data quality result, if any.
        RulesetEvaluationRunId:
          $ref: "#/components/schemas/HashString"
          description: The unique run ID for the ruleset evaluation for this data quality result.
        RuleResults:
          $ref: "#/components/schemas/DataQualityRuleResults"
          description: A list of DataQualityRuleResult objects representing the results for each rule.
        AnalyzerResults:
          $ref: "#/components/schemas/DataQualityAnalyzerResults"
          description: A list of DataQualityAnalyzerResult objects representing the results for each analyzer.
        Observations:
          $ref: "#/components/schemas/DataQualityObservations"
          description: A list of DataQualityObservation objects representing the observations generated after evaluating the rules and analyzers.
        AggregatedMetrics:
          $ref: "#/components/schemas/DataQualityAggregatedMetrics"
          description: A summary of DataQualityAggregatedMetrics objects showing the total counts of processed rows and rules, including their pass/fail statistics based on row-level results.
    GenericBoundedDouble:
      type: number
      format: double
      minimum: 0
      maximum: 1
    DataSource:
      description: A data source (an Glue table) for which you want data quality results.
      type: object
      properties:
        GlueTable:
          $ref: "#/components/schemas/GlueTable"
          description: An Glue table.
        DataQualityGlueTable:
          $ref: "#/components/schemas/DataQualityGlueTable"
          description: An Glue table for Data Quality Operations.
    GlueTable:
      description: The database and table in the Glue Data Catalog that is used for input or output data.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/NameString"
          description: A database name in the Glue Data Catalog.
        TableName:
          $ref: "#/components/schemas/NameString"
          description: A table name in the Glue Data Catalog.
        CatalogId:
          $ref: "#/components/schemas/NameString"
          description: A unique identifier for the Glue Data Catalog.
        ConnectionName:
          $ref: "#/components/schemas/NameString"
          description: The name of the connection to the Glue Data Catalog.
        AdditionalOptions:
          type: object
          properties: {}
          description: "Additional options for the table. Currently there are two keys supported: pushDownPredicate: to filter on partitions without having to list and read all the files in your dataset. catalogPartitionPredicate: to use server-side partition pruning using partition indexes in the Glue Data Catalog."
      required:
        - DatabaseName
        - TableName
    DataQualityGlueTable:
      description: The database and table in the Glue Data Catalog that is used for input or output data for Data Quality Operations.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/NameString"
          description: A database name in the Glue Data Catalog.
        TableName:
          $ref: "#/components/schemas/NameString"
          description: A table name in the Glue Data Catalog.
        CatalogId:
          $ref: "#/components/schemas/NameString"
          description: A unique identifier for the Glue Data Catalog.
        ConnectionName:
          $ref: "#/components/schemas/NameString"
          description: The name of the connection to the Glue Data Catalog.
        AdditionalOptions:
          type: object
          properties: {}
          description: "Additional options for the table. Currently there are two keys supported: pushDownPredicate: to filter on partitions without having to list and read all the files in your dataset. catalogPartitionPredicate: to use server-side partition pruning using partition indexes in the Glue Data Catalog."
        PreProcessingQuery:
          $ref: "#/components/schemas/PreProcessingQueryString"
          description: SQL Query of SparkSQL format that can be used to pre-process the data for the table in Glue Data Catalog, before running the Data Quality Operation.
      required:
        - DatabaseName
        - TableName
    PreProcessingQueryString:
      description: SQL Query of SparkSQL format that can be used to pre-process data before running Data Quality Operations.
      type: string
      minLength: 0
      maxLength: 51200
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    DataQualityRuleResults:
      type: array
      items:
        $ref: "#/components/schemas/DataQualityRuleResult"
    DataQualityRuleResult:
      description: Describes the result of the evaluation of a data quality rule.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the data quality rule.
        Description:
          $ref: "#/components/schemas/DataQualityRuleResultDescription"
          description: A description of the data quality rule.
        EvaluationMessage:
          $ref: "#/components/schemas/DataQualityRuleResultDescription"
          description: An evaluation message.
        Result:
          $ref: "#/components/schemas/DataQualityRuleResultStatus"
          description: A pass or fail status for the rule.
        EvaluatedMetrics:
          type: object
          properties: {}
          description: A map of metrics associated with the evaluation of the rule.
        EvaluatedRule:
          $ref: "#/components/schemas/DataQualityRuleResultDescription"
          description: The evaluated rule.
        RuleMetrics:
          type: object
          properties: {}
          description: A map containing metrics associated with the evaluation of the rule based on row-level results.
        Labels:
          type: object
          properties: {}
          description: A map containing labels assigned to the data quality rule.
    DataQualityRuleResultDescription:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    DataQualityRuleResultStatus:
      type: string
      enum:
        - PASS
        - FAIL
        - ERROR
    DataQualityAnalyzerResults:
      type: array
      items:
        $ref: "#/components/schemas/DataQualityAnalyzerResult"
    DataQualityAnalyzerResult:
      description: Describes the result of the evaluation of a data quality analyzer.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the data quality analyzer.
        Description:
          $ref: "#/components/schemas/DataQualityRuleResultDescription"
          description: A description of the data quality analyzer.
        EvaluationMessage:
          $ref: "#/components/schemas/DataQualityRuleResultDescription"
          description: An evaluation message.
        EvaluatedMetrics:
          type: object
          properties: {}
          description: A map of metrics associated with the evaluation of the analyzer.
    DataQualityObservations:
      type: array
      items:
        $ref: "#/components/schemas/DataQualityObservation"
    DataQualityObservation:
      description: Describes the observation generated after evaluating the rules and analyzers.
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/DataQualityObservationDescription"
          description: A description of the data quality observation.
        MetricBasedObservation:
          $ref: "#/components/schemas/MetricBasedObservation"
          description: An object of type MetricBasedObservation representing the observation that is based on evaluated data quality metrics.
    DataQualityObservationDescription:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    MetricBasedObservation:
      description: Describes the metric based observation generated based on evaluated data quality metrics.
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/NameString"
          description: The name of the data quality metric used for generating the observation.
        StatisticId:
          $ref: "#/components/schemas/HashString"
          description: The Statistic ID.
        MetricValues:
          $ref: "#/components/schemas/DataQualityMetricValues"
          description: An object of type DataQualityMetricValues representing the analysis of the data quality metric value.
        NewRules:
          $ref: "#/components/schemas/NewRules"
          description: A list of new data quality rules generated as part of the observation based on the data quality metric value.
    DataQualityMetricValues:
      description: Describes the data quality metric value according to the analysis of historical data.
      type: object
      properties:
        ActualValue:
          $ref: "#/components/schemas/NullableDouble"
          description: The actual value of the data quality metric.
        ExpectedValue:
          $ref: "#/components/schemas/NullableDouble"
          description: The expected value of the data quality metric according to the analysis of historical data.
        LowerLimit:
          $ref: "#/components/schemas/NullableDouble"
          description: The lower limit of the data quality metric value according to the analysis of historical data.
        UpperLimit:
          $ref: "#/components/schemas/NullableDouble"
          description: The upper limit of the data quality metric value according to the analysis of historical data.
    NewRules:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    DataQualityAggregatedMetrics:
      description: A summary of metrics showing the total counts of processed rows and rules, including their pass/fail statistics based on row-level results.
      type: object
      properties:
        TotalRowsProcessed:
          $ref: "#/components/schemas/NullableDouble"
          description: The total number of rows that were processed during the data quality evaluation.
        TotalRowsPassed:
          $ref: "#/components/schemas/NullableDouble"
          description: The total number of rows that passed all applicable data quality rules.
        TotalRowsFailed:
          $ref: "#/components/schemas/NullableDouble"
          description: The total number of rows that failed one or more data quality rules.
        TotalRulesProcessed:
          $ref: "#/components/schemas/NullableDouble"
          description: The total number of data quality rules that were evaluated.
        TotalRulesPassed:
          $ref: "#/components/schemas/NullableDouble"
          description: The total number of data quality rules that passed their evaluation criteria.
        TotalRulesFailed:
          $ref: "#/components/schemas/NullableDouble"
          description: The total number of data quality rules that failed their evaluation criteria.
    DevEndpointNames:
      type: array
      items:
        $ref: "#/components/schemas/GenericString"
    BatchGetDevEndpointsResponse:
      type: object
      properties:
        DevEndpoints:
          $ref: "#/components/schemas/DevEndpointList"
          description: A list of DevEndpoint definitions.
        DevEndpointsNotFound:
          $ref: "#/components/schemas/DevEndpointNames"
          description: A list of DevEndpoints not found.
    DevEndpointList:
      type: array
      items:
        $ref: "#/components/schemas/DevEndpoint"
    DevEndpoint:
      description: A development endpoint where a developer can remotely debug extract, transform, and load (ETL) scripts.
      type: object
      properties:
        EndpointName:
          $ref: "#/components/schemas/GenericString"
          description: The name of the DevEndpoint.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role used in this DevEndpoint.
        SecurityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: A list of security group identifiers used in this DevEndpoint.
        SubnetId:
          $ref: "#/components/schemas/GenericString"
          description: The subnet ID for this DevEndpoint.
        YarnEndpointAddress:
          $ref: "#/components/schemas/GenericString"
          description: The YARN endpoint address used by this DevEndpoint.
        PrivateAddress:
          $ref: "#/components/schemas/GenericString"
          description: A private IP address to access the DevEndpoint within a VPC if the DevEndpoint is created within one. The PrivateAddress field is present only when you create the DevEndpoint within your VPC.
        ZeppelinRemoteSparkInterpreterPort:
          $ref: "#/components/schemas/IntegerValue"
          description: The Apache Zeppelin port for the remote Apache Spark interpreter.
        PublicAddress:
          $ref: "#/components/schemas/GenericString"
          description: The public IP address used by this DevEndpoint. The PublicAddress field is present only when you create a non-virtual private cloud (VPC) DevEndpoint.
        Status:
          $ref: "#/components/schemas/GenericString"
          description: The current status of this DevEndpoint.
        WorkerType:
          $ref: "#/components/schemas/WorkerType"
          description: "The type of predefined worker that is allocated to the development endpoint. Accepts a value of Standard, G.1X, or G.2X. For the Standard worker type, each worker provides 4 vCPU, 16 GB of memory and a 50GB disk, and 2 executors per worker. For the G.1X worker type, each worker maps to 1 DPU (4 vCPU, 16 GB of memory, 64 GB disk), and provides 1 executor per worker. We recommend this worker type for memory-intensive jobs. For the G.2X worker type, each worker maps to 2 DPU (8 vCPU, 32 GB of memory, 128 GB disk), and provides 1 executor per worker. We recommend this worker type for memory-intensive jobs. Known issue: when a development endpoint is created with the G.2X WorkerType configuration, the Spark drivers for the development endpoint will run on 4 vCPU, 16 GB of memory, and a 64 GB disk."
        GlueVersion:
          $ref: "#/components/schemas/GlueVersionString"
          description: Glue version determines the versions of Apache Spark and Python that Glue supports. The Python version indicates the version supported for running your ETL scripts on development endpoints. For more information about the available Glue versions and corresponding Spark and Python versions, see Glue version in the developer guide. Development endpoints that are created without specifying a Glue version default to Glue 0.9. You can specify a version of Python support for development endpoints by using the Arguments parameter in the CreateDevEndpoint or UpdateDevEndpoint APIs. If no arguments are provided, the version defaults to Python 2.
        NumberOfWorkers:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of workers of a defined workerType that are allocated to the development endpoint. The maximum number of workers you can define are 299 for G.1X, and 149 for G.2X.
        NumberOfNodes:
          $ref: "#/components/schemas/IntegerValue"
          description: The number of Glue Data Processing Units (DPUs) allocated to this DevEndpoint.
        AvailabilityZone:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Web Services Availability Zone where this DevEndpoint is located.
        VpcId:
          $ref: "#/components/schemas/GenericString"
          description: The ID of the virtual private cloud (VPC) used by this DevEndpoint.
        ExtraPythonLibsS3Path:
          $ref: "#/components/schemas/GenericString"
          description: The paths to one or more Python libraries in an Amazon S3 bucket that should be loaded in your DevEndpoint. Multiple values must be complete paths separated by a comma. You can only use pure Python libraries with a DevEndpoint. Libraries that rely on C extensions, such as the pandas Python data analysis library, are not currently supported.
        ExtraJarsS3Path:
          $ref: "#/components/schemas/GenericString"
          description: The path to one or more Java .jar files in an S3 bucket that should be loaded in your DevEndpoint. You can only use pure Java/Scala libraries with a DevEndpoint.
        FailureReason:
          $ref: "#/components/schemas/GenericString"
          description: The reason for a current failure in this DevEndpoint.
        LastUpdateStatus:
          $ref: "#/components/schemas/GenericString"
          description: The status of the last update.
        CreatedTimestamp:
          $ref: "#/components/schemas/TimestampValue"
          description: The point in time at which this DevEndpoint was created.
        LastModifiedTimestamp:
          $ref: "#/components/schemas/TimestampValue"
          description: The point in time at which this DevEndpoint was last modified.
        PublicKey:
          $ref: "#/components/schemas/GenericString"
          description: The public key to be used by this DevEndpoint for authentication. This attribute is provided for backward compatibility because the recommended attribute to use is public keys.
        PublicKeys:
          $ref: "#/components/schemas/PublicKeysList"
          description: A list of public keys to be used by the DevEndpoints for authentication. Using this attribute is preferred over a single public key because the public keys allow you to have a different private key per client. If you previously created an endpoint with a public key, you must remove that key to be able to set a list of public keys. Call the UpdateDevEndpoint API operation with the public key content in the deletePublicKeys attribute, and the list of new keys in the addPublicKeys attribute.
        SecurityConfiguration:
          $ref: "#/components/schemas/NameString"
          description: The name of the SecurityConfiguration structure to be used with this DevEndpoint.
        Arguments:
          type: object
          properties: {}
          description: 'A map of arguments used to configure the DevEndpoint. Valid arguments are: "--enable-glue-datacatalog": "" You can specify a version of Python support for development endpoints by using the Arguments parameter in the CreateDevEndpoint or UpdateDevEndpoint APIs. If no arguments are provided, the version defaults to Python 2.'
    RoleArn:
      type: string
      pattern: arn:aws:iam::\d{12}:role/.*
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/GenericString"
    IntegerValue:
      type: integer
    WorkerType:
      type: string
      enum:
        - Standard
        - G.1X
        - G.2X
        - G.025X
        - G.4X
        - G.8X
        - Z.2X
    GlueVersionString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(\w+\.)+\w+$
    PublicKeysList:
      type: array
      items:
        $ref: "#/components/schemas/GenericString"
    JobNameList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    BatchGetJobsResponse:
      type: object
      properties:
        Jobs:
          $ref: "#/components/schemas/JobList"
          description: A list of job definitions.
        JobsNotFound:
          $ref: "#/components/schemas/JobNameList"
          description: A list of names of jobs not found.
    JobList:
      type: array
      items:
        $ref: "#/components/schemas/Job"
    Job:
      description: Specifies a job definition.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name you assign to this job definition.
        JobMode:
          $ref: "#/components/schemas/JobMode"
          description: "A mode that describes how a job was created. Valid values are: SCRIPT - The job was created using the Glue Studio script editor. VISUAL - The job was created using the Glue Studio visual editor. NOTEBOOK - The job was created using an interactive sessions notebook. When the JobMode field is missing or null, SCRIPT is assigned as the default value."
        JobRunQueuingEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether job run queuing is enabled for the job runs for this job. A value of true means job run queuing is enabled for the job runs. If false or not populated, the job runs will not be considered for queueing. If this field does not match the value set in the job run, then the value from the job run field will be used.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: A description of the job.
        LogUri:
          $ref: "#/components/schemas/UriString"
          description: This field is reserved for future use.
        Role:
          $ref: "#/components/schemas/RoleString"
          description: The name or Amazon Resource Name (ARN) of the IAM role associated with this job.
        CreatedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The time and date that this job definition was created.
        LastModifiedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The last point in time when this job definition was modified.
        ExecutionProperty:
          $ref: "#/components/schemas/ExecutionProperty"
          description: An ExecutionProperty specifying the maximum number of concurrent runs allowed for this job.
        Command:
          $ref: "#/components/schemas/JobCommand"
          description: The JobCommand that runs this job.
        DefaultArguments:
          type: object
          properties: {}
          description: The default arguments for every run of this job, specified as name-value pairs. You can specify arguments here that your own job-execution script consumes, as well as arguments that Glue itself consumes. Job arguments may be logged. Do not pass plaintext secrets as arguments. Retrieve secrets from a Glue Connection, Secrets Manager or other secret management mechanism if you intend to keep them within the Job. For information about how to specify and consume your own Job arguments, see the Calling Glue APIs in Python topic in the developer guide. For information about the arguments you can provide to this field when configuring Spark jobs, see the Special Parameters Used by Glue topic in the developer guide. For information about the arguments you can provide to this field when configuring Ray jobs, see Using job parameters in Ray jobs in the developer guide.
        NonOverridableArguments:
          type: object
          properties: {}
          description: Arguments for this job that are not overridden when providing job arguments in a job run, specified as name-value pairs.
        Connections:
          $ref: "#/components/schemas/ConnectionsList"
          description: The connections used for this job.
        MaxRetries:
          $ref: "#/components/schemas/MaxRetries"
          description: The maximum number of times to retry this job after a JobRun fails.
        AllocatedCapacity:
          $ref: "#/components/schemas/IntegerValue"
          description: This field is deprecated. Use MaxCapacity instead. The number of Glue data processing units (DPUs) allocated to runs of this job. You can allocate a minimum of 2 DPUs; the default is 10. A DPU is a relative measure of processing power that consists of 4 vCPUs of compute capacity and 16 GB of memory. For more information, see the Glue pricing page.
        Timeout:
          $ref: "#/components/schemas/Timeout"
          description: The job timeout in minutes. This is the maximum time that a job run can consume resources before it is terminated and enters TIMEOUT status. Jobs must have timeout values less than 7 days or 10080 minutes. Otherwise, the jobs will throw an exception. When the value is left blank, the timeout is defaulted to 2,880 minutes for Glue version 4.0 and earlier, or 480 minutes for Glue version 5.0 and later. Any existing Glue jobs that had a timeout value greater than 7 days will be defaulted to 7 days. For instance if you have specified a timeout of 20 days for a batch job, it will be stopped on the 7th day. For streaming jobs, if you have set up a maintenance window, it will be restarted during the maintenance window after 7 days.
        MaxCapacity:
          $ref: "#/components/schemas/NullableDouble"
          description: 'For Glue version 1.0 or earlier jobs, using the standard worker type, the number of Glue data processing units (DPUs) that can be allocated when this job runs. A DPU is a relative measure of processing power that consists of 4 vCPUs of compute capacity and 16 GB of memory. For more information, see the Glue pricing page. For Glue version 2.0 or later jobs, you cannot specify a Maximum capacity. Instead, you should specify a Worker type and the Number of workers. Do not set MaxCapacity if using WorkerType and NumberOfWorkers. The value that can be allocated for MaxCapacity depends on whether you are running a Python shell job, an Apache Spark ETL job, or an Apache Spark streaming ETL job: When you specify a Python shell job (JobCommand.Name="pythonshell"), you can allocate either 0.0625 or 1 DPU. The default is 0.0625 DPU. When you specify an Apache Spark ETL job (JobCommand.Name="glueetl") or Apache Spark streaming ETL job (JobCommand.Name="gluestreaming"), you can allocate from 2 to 100 DPUs. The default is 10 DPUs. This job type cannot have a fractional DPU allocation.'
        WorkerType:
          $ref: "#/components/schemas/WorkerType"
          description: "The type of predefined worker that is allocated when a job runs. Glue provides multiple worker types to accommodate different workload requirements: G Worker Types (General-purpose compute workers): G.1X: 1 DPU (4 vCPUs, 16 GB memory, 94GB disk) G.2X: 2 DPU (8 vCPUs, 32 GB memory, 138GB disk) G.4X: 4 DPU (16 vCPUs, 64 GB memory, 256GB disk) G.8X: 8 DPU (32 vCPUs, 128 GB memory, 512GB disk) G.12X: 12 DPU (48 vCPUs, 192 GB memory, 768GB disk) G.16X: 16 DPU (64 vCPUs, 256 GB memory, 1024GB disk) R Worker Types (Memory-optimized workers): R.1X: 1 M-DPU (4 vCPUs, 32 GB memory) R.2X: 2 M-DPU (8 vCPUs, 64 GB memory) R.4X: 4 M-DPU (16 vCPUs, 128 GB memory) R.8X: 8 M-DPU (32 vCPUs, 256 GB memory)"
        NumberOfWorkers:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of workers of a defined workerType that are allocated when a job runs.
        SecurityConfiguration:
          $ref: "#/components/schemas/NameString"
          description: The name of the SecurityConfiguration structure to be used with this job.
        NotificationProperty:
          $ref: "#/components/schemas/NotificationProperty"
          description: Specifies configuration properties of a job notification.
        GlueVersion:
          $ref: "#/components/schemas/GlueVersionString"
          description: In Spark jobs, GlueVersion determines the versions of Apache Spark and Python that Glue available in a job. The Python version indicates the version supported for jobs of type Spark. Ray jobs should set GlueVersion to 4.0 or greater. However, the versions of Ray, Python and additional libraries available in your Ray job are determined by the Runtime parameter of the Job command. For more information about the available Glue versions and corresponding Spark and Python versions, see Glue version in the developer guide. Jobs that are created without specifying a Glue version default to Glue 5.1.
        CodeGenConfigurationNodes:
          type: object
          properties: {}
          description: The representation of a directed acyclic graph on which both the Glue Studio visual component and Glue Studio code generation is based.
        ExecutionClass:
          $ref: "#/components/schemas/ExecutionClass"
          description: Indicates whether the job is run with a standard or flexible execution class. The standard execution class is ideal for time-sensitive workloads that require fast job startup and dedicated resources. The flexible execution class is appropriate for time-insensitive jobs whose start and completion times may vary. Only jobs with Glue version 3.0 and above and command type glueetl will be allowed to set ExecutionClass to FLEX. The flexible execution class is available for Spark jobs.
        SourceControlDetails:
          $ref: "#/components/schemas/SourceControlDetails"
          description: The details for a source control configuration for a job, allowing synchronization of job artifacts to or from a remote repository.
        MaintenanceWindow:
          $ref: "#/components/schemas/MaintenanceWindow"
          description: This field specifies a day of the week and hour for a maintenance window for streaming jobs. Glue periodically performs maintenance activities. During these maintenance windows, Glue will need to restart your streaming jobs. Glue will restart the job within 3 hours of the specified maintenance window. For instance, if you set up the maintenance window for Monday at 10:00AM GMT, your jobs will be restarted between 10:00AM GMT to 1:00PM GMT.
        ProfileName:
          $ref: "#/components/schemas/NameString"
          description: The name of an Glue usage profile associated with the job.
    JobMode:
      type: string
      enum:
        - SCRIPT
        - VISUAL
        - NOTEBOOK
    UriString:
      type: string
    RoleString:
      type: string
    ExecutionProperty:
      description: An execution property of a job.
      type: object
      properties:
        MaxConcurrentRuns:
          $ref: "#/components/schemas/MaxConcurrentRuns"
          description: The maximum number of concurrent runs allowed for the job. The default is 1. An error is returned when this threshold is reached. The maximum value you can specify is controlled by a service limit.
    MaxConcurrentRuns:
      type: integer
    JobCommand:
      description: Specifies code that runs when a job is run.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/GenericString"
          description: The name of the job command. For an Apache Spark ETL job, this must be glueetl. For a Python shell job, it must be pythonshell. For an Apache Spark streaming ETL job, this must be gluestreaming. For a Ray job, this must be glueray.
        ScriptLocation:
          $ref: "#/components/schemas/ScriptLocationString"
          description: Specifies the Amazon Simple Storage Service (Amazon S3) path to a script that runs a job.
        PythonVersion:
          $ref: "#/components/schemas/PythonVersionString"
          description: The Python version being used to run a Python shell job. Allowed values are 2 or 3.
        Runtime:
          $ref: "#/components/schemas/RuntimeNameString"
          description: In Ray jobs, Runtime is used to specify the versions of Ray, Python and additional libraries available in your environment. This field is not used in other job types. For supported runtime environment values, see Supported Ray runtime environments in the Glue Developer Guide.
    ScriptLocationString:
      type: string
      maxLength: 400000
    PythonVersionString:
      type: string
      pattern: ^([2-3]|3[.]9)$
    RuntimeNameString:
      type: string
      maxLength: 64
      pattern: .*
    ConnectionsList:
      description: Specifies the connections used by a job.
      type: object
      properties:
        Connections:
          $ref: "#/components/schemas/ConnectionStringList"
          description: A list of connections used by the job.
    ConnectionStringList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectionString"
    ConnectionString:
      type: string
      maxLength: 255
    MaxRetries:
      type: integer
    Timeout:
      type: integer
      minimum: 1
    NotificationProperty:
      description: Specifies configuration properties of a notification.
      type: object
      properties:
        NotifyDelayAfter:
          $ref: "#/components/schemas/NotifyDelayAfter"
          description: After a job run starts, the number of minutes to wait before sending a job run delay notification.
    NotifyDelayAfter:
      type: integer
      minimum: 1
    ExecutionClass:
      type: string
      enum:
        - FLEX
        - STANDARD
      maxLength: 16
    SourceControlDetails:
      description: The details for a source control configuration for a job, allowing synchronization of job artifacts to or from a remote repository.
      type: object
      properties:
        Provider:
          $ref: "#/components/schemas/SourceControlProvider"
          description: The provider for the remote repository.
        Repository:
          $ref: "#/components/schemas/Generic512CharString"
          description: The name of the remote repository that contains the job artifacts.
        Owner:
          $ref: "#/components/schemas/Generic512CharString"
          description: The owner of the remote repository that contains the job artifacts.
        Branch:
          $ref: "#/components/schemas/Generic512CharString"
          description: An optional branch in the remote repository.
        Folder:
          $ref: "#/components/schemas/Generic512CharString"
          description: An optional folder in the remote repository.
        LastCommitId:
          $ref: "#/components/schemas/Generic512CharString"
          description: The last commit ID for a commit in the remote repository.
        AuthStrategy:
          $ref: "#/components/schemas/SourceControlAuthStrategy"
          description: The type of authentication, which can be an authentication token stored in Amazon Web Services Secrets Manager, or a personal access token.
        AuthToken:
          $ref: "#/components/schemas/Generic512CharString"
          description: The value of an authorization token.
    SourceControlProvider:
      type: string
      enum:
        - GITHUB
        - GITLAB
        - BITBUCKET
        - AWS_CODE_COMMIT
    SourceControlAuthStrategy:
      type: string
      enum:
        - PERSONAL_ACCESS_TOKEN
        - AWS_SECRETS_MANAGER
    MaintenanceWindow:
      type: string
      pattern: ^(Sun|Mon|Tue|Wed|Thu|Fri|Sat):([01]?[0-9]|2[0-3])$
    BatchGetPartitionValueList:
      type: array
      items:
        $ref: "#/components/schemas/PartitionValueList"
    AuditContext:
      description: A structure containing the Lake Formation audit context.
      type: object
      properties:
        AdditionalAuditContext:
          $ref: "#/components/schemas/AuditContextString"
          description: A string containing the additional audit context information.
        RequestedColumns:
          $ref: "#/components/schemas/AuditColumnNamesList"
          description: The requested columns for audit.
        AllColumnsRequested:
          $ref: "#/components/schemas/NullableBoolean"
          description: All columns request for audit.
    AuditContextString:
      type: string
      minLength: 0
      maxLength: 2048
    AuditColumnNamesList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnNameString"
    ColumnNameString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    QuerySessionContext:
      description: A structure used as a protocol between query engines and Lake Formation or Glue. Contains both a Lake Formation generated authorization identifier and information from the request's authorization context.
      type: object
      properties:
        QueryId:
          $ref: "#/components/schemas/HashString"
          description: A unique identifier generated by the query engine for the query.
        QueryStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp provided by the query engine for when the query started.
        ClusterId:
          $ref: "#/components/schemas/NullableString"
          description: An identifier string for the consumer cluster.
        QueryAuthorizationId:
          $ref: "#/components/schemas/HashString"
          description: A cryptographically generated query identifier generated by Glue or Lake Formation.
        AdditionalContext:
          type: object
          properties: {}
          description: An opaque string-string map passed by the query engine.
    NullableString:
      type: string
    BatchGetPartitionResponse:
      type: object
      properties:
        Partitions:
          $ref: "#/components/schemas/PartitionList"
          description: A list of the requested partitions.
        UnprocessedKeys:
          $ref: "#/components/schemas/BatchGetPartitionValueList"
          description: A list of the partition values in the request for which partitions were not returned.
    PartitionList:
      type: array
      items:
        $ref: "#/components/schemas/Partition"
    Partition:
      description: Represents a slice of table data.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ValueStringList"
          description: The values of the partition.
        DatabaseName:
          $ref: "#/components/schemas/NameString"
          description: The name of the catalog database in which to create the partition.
        TableName:
          $ref: "#/components/schemas/NameString"
          description: The name of the database table in which to create the partition.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the partition was created.
        LastAccessTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time at which the partition was accessed.
        StorageDescriptor:
          $ref: "#/components/schemas/StorageDescriptor"
          description: Provides information about the physical location where the partition is stored.
        Parameters:
          type: object
          properties: {}
          description: These key-value pairs define partition parameters.
        LastAnalyzedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time at which column statistics were computed for this partition.
        CatalogId:
          $ref: "#/components/schemas/CatalogIdString"
          description: The ID of the Data Catalog in which the partition resides.
    BatchGetTableOptimizerEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetTableOptimizerEntry"
    BatchGetTableOptimizerEntry:
      description: Represents a table optimizer to retrieve in the BatchGetTableOptimizer operation.
      type: object
      properties:
        catalogId:
          $ref: "#/components/schemas/CatalogIdString"
          description: The Catalog ID of the table.
        databaseName:
          $ref: "#/components/schemas/databaseNameString"
          description: The name of the database in the catalog in which the table resides.
        tableName:
          $ref: "#/components/schemas/tableNameString"
          description: The name of the table.
        type_:
          $ref: "#/components/schemas/TableOptimizerType"
          description: The type of table optimizer.
    databaseNameString:
      type: string
      minLength: 1
    tableNameString:
      type: string
      minLength: 1
    TableOptimizerType:
      type: string
      enum:
        - compaction
        - retention
        - orphan_file_deletion
    BatchGetTableOptimizerResponse:
      type: object
      properties:
        TableOptimizers:
          $ref: "#/components/schemas/BatchTableOptimizers"
          description: A list of BatchTableOptimizer objects.
        Failures:
          $ref: "#/components/schemas/BatchGetTableOptimizerErrors"
          description: A list of errors from the operation.
    BatchTableOptimizers:
      type: array
      items:
        $ref: "#/components/schemas/BatchTableOptimizer"
    BatchTableOptimizer:
      description: Contains details for one of the table optimizers returned by the BatchGetTableOptimizer operation.
      type: object
      properties:
        catalogId:
          $ref: "#/components/schemas/CatalogIdString"
          description: The Catalog ID of the table.
        databaseName:
          $ref: "#/components/schemas/databaseNameString"
          description: The name of the database in the catalog in which the table resides.
        tableName:
          $ref: "#/components/schemas/tableNameString"
          description: The name of the table.
        tableOptimizer:
          $ref: "#/components/schemas/TableOptimizer"
          description: A TableOptimizer object that contains details on the configuration and last run of a table optimizer.
    TableOptimizer:
      description: Contains details about an optimizer associated with a table.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/TableOptimizerType"
          description: "The type of table optimizer. The valid values are: compaction: for managing compaction with a table optimizer. retention: for managing the retention of snapshot with a table optimizer. orphan_file_deletion: for managing the deletion of orphan files with a table optimizer."
        configuration:
          $ref: "#/components/schemas/TableOptimizerConfiguration"
          description: A TableOptimizerConfiguration object that was specified when creating or updating a table optimizer.
        lastRun:
          $ref: "#/components/schemas/TableOptimizerRun"
          description: A TableOptimizerRun object representing the last run of the table optimizer.
        configurationSource:
          $ref: "#/components/schemas/ConfigurationSource"
          description: Specifies the source of the optimizer configuration. This indicates how the table optimizer was configured and which entity or service initiated the configuration.
    TableOptimizerConfiguration:
      description: Contains details on the configuration of a table optimizer. You pass this configuration when creating or updating a table optimizer.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/ArnString"
          description: A role passed by the caller which gives the service permission to update the resources associated with the optimizer on the caller's behalf.
        enabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Whether table optimization is enabled.
        vpcConfiguration:
          $ref: "#/components/schemas/TableOptimizerVpcConfiguration"
          description: A TableOptimizerVpcConfiguration object representing the VPC configuration for a table optimizer. This configuration is necessary to perform optimization on tables that are in a customer VPC.
        compactionConfiguration:
          $ref: "#/components/schemas/CompactionConfiguration"
          description: The configuration for a compaction optimizer. This configuration defines how data files in your table will be compacted to improve query performance and reduce storage costs.
        retentionConfiguration:
          $ref: "#/components/schemas/RetentionConfiguration"
          description: The configuration for a snapshot retention optimizer.
        orphanFileDeletionConfiguration:
          $ref: "#/components/schemas/OrphanFileDeletionConfiguration"
          description: The configuration for an orphan file deletion optimizer.
    ArnString:
      type: string
      minLength: 20
      maxLength: 2048
    TableOptimizerVpcConfiguration:
      description: An object that describes the VPC configuration for a table optimizer. This configuration is necessary to perform optimization on tables that are in a customer VPC.
      type: object
      properties:
        glueConnectionName:
          $ref: "#/components/schemas/glueConnectionNameString"
          description: The name of the Glue connection used for the VPC for the table optimizer.
    glueConnectionNameString:
      type: string
      minLength: 1
    CompactionConfiguration:
      description: The configuration for a compaction optimizer. This configuration defines how data files in your table will be compacted to improve query performance and reduce storage costs.
      type: object
      properties:
        icebergConfiguration:
          $ref: "#/components/schemas/IcebergCompactionConfiguration"
          description: The configuration for an Iceberg compaction optimizer.
    IcebergCompactionConfiguration:
      description: The configuration for an Iceberg compaction optimizer. This configuration defines parameters for optimizing the layout of data files in Iceberg tables.
      type: object
      properties:
        strategy:
          $ref: "#/components/schemas/CompactionStrategy"
          description: "The strategy to use for compaction. Valid values are: binpack: Combines small files into larger files, typically targeting sizes over 100MB, while applying any pending deletes. This is the recommended compaction strategy for most use cases. sort: Organizes data based on specified columns which are sorted hierarchically during compaction, improving query performance for filtered operations. This strategy is recommended when your queries frequently filter on specific columns. To use this strategy, you must first define a sort order in your Iceberg table properties using the sort_order table property. z-order: Optimizes data organization by blending multiple attributes into a single scalar value that can be used for sorting, allowing efficient querying across multiple dimensions. This strategy is recommended when you need to query data across multiple dimensions simultaneously. To use this strategy, you must first define a sort order in your Iceberg table properties using the sort_order table property. If an input is not provided, the default value 'binpack' will be used."
        minInputFiles:
          $ref: "#/components/schemas/NullableInteger"
          description: The minimum number of data files that must be present in a partition before compaction will actually compact files. This parameter helps control when compaction is triggered, preventing unnecessary compaction operations on partitions with few files. If an input is not provided, the default value 100 will be used.
        deleteFileThreshold:
          $ref: "#/components/schemas/NullableInteger"
          description: The minimum number of deletes that must be present in a data file to make it eligible for compaction. This parameter helps optimize compaction by focusing on files that contain a significant number of delete operations, which can improve query performance by removing deleted records. If an input is not provided, the default value 1 will be used.
    CompactionStrategy:
      type: string
      enum:
        - binpack
        - sort
        - z-order
    RetentionConfiguration:
      description: The configuration for a snapshot retention optimizer.
      type: object
      properties:
        icebergConfiguration:
          $ref: "#/components/schemas/IcebergRetentionConfiguration"
          description: The configuration for an Iceberg snapshot retention optimizer.
    IcebergRetentionConfiguration:
      description: The configuration for an Iceberg snapshot retention optimizer.
      type: object
      properties:
        snapshotRetentionPeriodInDays:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of days to retain the Iceberg snapshots. If an input is not provided, the corresponding Iceberg table configuration field will be used or if not present, the default value 5 will be used.
        numberOfSnapshotsToRetain:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of Iceberg snapshots to retain within the retention period. If an input is not provided, the corresponding Iceberg table configuration field will be used or if not present, the default value 1 will be used.
        cleanExpiredFiles:
          $ref: "#/components/schemas/NullableBoolean"
          description: If set to false, snapshots are only deleted from table metadata, and the underlying data and metadata files are not deleted.
        runRateInHours:
          $ref: "#/components/schemas/NullableInteger"
          description: The interval in hours between retention job runs. This parameter controls how frequently the retention optimizer will run to clean up expired snapshots. The value must be between 3 and 168 hours (7 days). If an input is not provided, the default value 24 will be used.
    OrphanFileDeletionConfiguration:
      description: The configuration for an orphan file deletion optimizer.
      type: object
      properties:
        icebergConfiguration:
          $ref: "#/components/schemas/IcebergOrphanFileDeletionConfiguration"
          description: The configuration for an Iceberg orphan file deletion optimizer.
    IcebergOrphanFileDeletionConfiguration:
      description: The configuration for an Iceberg orphan file deletion optimizer.
      type: object
      properties:
        orphanFileRetentionPeriodInDays:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of days that orphan files should be retained before file deletion. If an input is not provided, the default value 3 will be used.
        location:
          $ref: "#/components/schemas/MessageString"
          description: Specifies a directory in which to look for files (defaults to the table's location). You may choose a sub-directory rather than the top-level table location.
        runRateInHours:
          $ref: "#/components/schemas/NullableInteger"
          description: The interval in hours between orphan file deletion job runs. This parameter controls how frequently the orphan file deletion optimizer will run to clean up orphan files. The value must be between 3 and 168 hours (7 days). If an input is not provided, the default value 24 will be used.
    MessageString:
      type: string
    TableOptimizerRun:
      description: Contains details for a table optimizer run.
      type: object
      properties:
        eventType:
          $ref: "#/components/schemas/TableOptimizerEventType"
          description: An event type representing the status of the table optimizer run.
        startTimestamp:
          $ref: "#/components/schemas/TableOptimizerRunTimestamp"
          description: Represents the epoch timestamp at which the compaction job was started within Lake Formation.
        endTimestamp:
          $ref: "#/components/schemas/TableOptimizerRunTimestamp"
          description: Represents the epoch timestamp at which the compaction job ended.
        metrics:
          $ref: "#/components/schemas/RunMetrics"
          description: A RunMetrics object containing metrics for the optimizer run. This member is deprecated. See the individual metric members for compaction, retention, and orphan file deletion.
        error:
          $ref: "#/components/schemas/MessageString"
          description: An error that occured during the optimizer run.
        compactionMetrics:
          $ref: "#/components/schemas/CompactionMetrics"
          description: A CompactionMetrics object containing metrics for the optimizer run.
        compactionStrategy:
          $ref: "#/components/schemas/CompactionStrategy"
          description: "The strategy used for the compaction run. Indicates which algorithm was applied to determine how files were selected and combined during the compaction process. Valid values are: binpack: Combines small files into larger files, typically targeting sizes over 100MB, while applying any pending deletes. This is the recommended compaction strategy for most use cases. sort: Organizes data based on specified columns which are sorted hierarchically during compaction, improving query performance for filtered operations. This strategy is recommended when your queries frequently filter on specific columns. To use this strategy, you must first define a sort order in your Iceberg table properties using the sort_order table property. z-order: Optimizes data organization by blending multiple attributes into a single scalar value that can be used for sorting, allowing efficient querying across multiple dimensions. This strategy is recommended when you need to query data across multiple dimensions simultaneously. To use this strategy, you must first define a sort order in your Iceberg table properties using the sort_order table property."
        retentionMetrics:
          $ref: "#/components/schemas/RetentionMetrics"
          description: A RetentionMetrics object containing metrics for the optimizer run.
        orphanFileDeletionMetrics:
          $ref: "#/components/schemas/OrphanFileDeletionMetrics"
          description: An OrphanFileDeletionMetrics object containing metrics for the optimizer run.
    TableOptimizerEventType:
      type: string
      enum:
        - starting
        - completed
        - failed
        - in_progress
    TableOptimizerRunTimestamp:
      type: string
      format: date-time
    RunMetrics:
      description: Metrics for the optimizer run. This structure is deprecated. See the individual metric members for compaction, retention, and orphan file deletion.
      type: object
      properties:
        NumberOfBytesCompacted:
          $ref: "#/components/schemas/MessageString"
          description: The number of bytes removed by the compaction job run.
        NumberOfFilesCompacted:
          $ref: "#/components/schemas/MessageString"
          description: The number of files removed by the compaction job run.
        NumberOfDpus:
          $ref: "#/components/schemas/MessageString"
          description: The number of DPUs consumed by the job, rounded up to the nearest whole number.
        JobDurationInHour:
          $ref: "#/components/schemas/MessageString"
          description: The duration of the job in hours.
    CompactionMetrics:
      description: A structure that contains compaction metrics for the optimizer run.
      type: object
      properties:
        IcebergMetrics:
          $ref: "#/components/schemas/IcebergCompactionMetrics"
          description: A structure containing the Iceberg compaction metrics for the optimizer run.
    IcebergCompactionMetrics:
      description: Compaction metrics for Iceberg for the optimizer run.
      type: object
      properties:
        NumberOfBytesCompacted:
          $ref: "#/components/schemas/metricCounts"
          description: The number of bytes removed by the compaction job run.
        NumberOfFilesCompacted:
          $ref: "#/components/schemas/metricCounts"
          description: The number of files removed by the compaction job run.
        DpuHours:
          $ref: "#/components/schemas/dpuHours"
          description: The number of DPU hours consumed by the job.
        NumberOfDpus:
          $ref: "#/components/schemas/dpuCounts"
          description: The number of DPUs consumed by the job, rounded up to the nearest whole number.
        JobDurationInHour:
          $ref: "#/components/schemas/dpuDurationInHour"
          description: The duration of the job in hours.
    metricCounts:
      type: integer
      format: int64
    dpuHours:
      type: number
      format: double
    dpuCounts:
      type: integer
    dpuDurationInHour:
      type: number
      format: double
    RetentionMetrics:
      description: A structure that contains retention metrics for the optimizer run.
      type: object
      properties:
        IcebergMetrics:
          $ref: "#/components/schemas/IcebergRetentionMetrics"
          description: A structure containing the Iceberg retention metrics for the optimizer run.
    IcebergRetentionMetrics:
      description: Snapshot retention metrics for Iceberg for the optimizer run.
      type: object
      properties:
        NumberOfDataFilesDeleted:
          $ref: "#/components/schemas/metricCounts"
          description: The number of data files deleted by the retention job run.
        NumberOfManifestFilesDeleted:
          $ref: "#/components/schemas/metricCounts"
          description: The number of manifest files deleted by the retention job run.
        NumberOfManifestListsDeleted:
          $ref: "#/components/schemas/metricCounts"
          description: The number of manifest lists deleted by the retention job run.
        DpuHours:
          $ref: "#/components/schemas/dpuHours"
          description: The number of DPU hours consumed by the job.
        NumberOfDpus:
          $ref: "#/components/schemas/dpuCounts"
          description: The number of DPUs consumed by the job, rounded up to the nearest whole number.
        JobDurationInHour:
          $ref: "#/components/schemas/dpuDurationInHour"
          description: The duration of the job in hours.
    OrphanFileDeletionMetrics:
      description: A structure that contains orphan file deletion metrics for the optimizer run.
      type: object
      properties:
        IcebergMetrics:
          $ref: "#/components/schemas/IcebergOrphanFileDeletionMetrics"
          description: A structure containing the Iceberg orphan file deletion metrics for the optimizer run.
    IcebergOrphanFileDeletionMetrics:
      description: Orphan file deletion metrics for Iceberg for the optimizer run.
      type: object
      properties:
        NumberOfOrphanFilesDeleted:
          $ref: "#/components/schemas/metricCounts"
          description: The number of orphan files deleted by the orphan file deletion job run.
        DpuHours:
          $ref: "#/components/schemas/dpuHours"
          description: The number of DPU hours consumed by the job.
        NumberOfDpus:
          $ref: "#/components/schemas/dpuCounts"
          description: The number of DPUs consumed by the job, rounded up to the nearest whole number.
        JobDurationInHour:
          $ref: "#/components/schemas/dpuDurationInHour"
          description: The duration of the job in hours.
    ConfigurationSource:
      type: string
      enum:
        - catalog
        - table
    BatchGetTableOptimizerErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetTableOptimizerError"
    BatchGetTableOptimizerError:
      description: Contains details on one of the errors in the error list returned by the BatchGetTableOptimizer operation.
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: An ErrorDetail object containing code and message details about the error.
        catalogId:
          $ref: "#/components/schemas/CatalogIdString"
          description: The Catalog ID of the table.
        databaseName:
          $ref: "#/components/schemas/databaseNameString"
          description: The name of the database in the catalog in which the table resides.
        tableName:
          $ref: "#/components/schemas/tableNameString"
          description: The name of the table.
        type_:
          $ref: "#/components/schemas/TableOptimizerType"
          description: The type of table optimizer.
    TriggerNameList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    BatchGetTriggersResponse:
      type: object
      properties:
        Triggers:
          $ref: "#/components/schemas/TriggerList"
          description: A list of trigger definitions.
        TriggersNotFound:
          $ref: "#/components/schemas/TriggerNameList"
          description: A list of names of triggers not found.
    TriggerList:
      type: array
      items:
        $ref: "#/components/schemas/Trigger"
    Trigger:
      description: Information about a specific trigger.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the trigger.
        WorkflowName:
          $ref: "#/components/schemas/NameString"
          description: The name of the workflow associated with the trigger.
        Id:
          $ref: "#/components/schemas/IdString"
          description: Reserved for future use.
        Type:
          $ref: "#/components/schemas/TriggerType"
          description: The type of trigger that this is.
        State:
          $ref: "#/components/schemas/TriggerState"
          description: The current state of the trigger.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: A description of this trigger.
        Schedule:
          $ref: "#/components/schemas/GenericString"
          description: "A cron expression used to specify the schedule (see Time-Based Schedules for Jobs and Crawlers. For example, to run something every day at 12:15 UTC, you would specify: cron(15 12 * * ? *)."
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: The actions initiated by this trigger.
        Predicate:
          $ref: "#/components/schemas/Predicate"
          description: The predicate of this trigger, which defines when it will fire.
        EventBatchingCondition:
          $ref: "#/components/schemas/EventBatchingCondition"
          description: Batch condition that must be met (specified number of events received or batch time window expired) before EventBridge event trigger fires.
    IdString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    TriggerType:
      type: string
      enum:
        - SCHEDULED
        - CONDITIONAL
        - ON_DEMAND
        - EVENT
    TriggerState:
      type: string
      enum:
        - CREATING
        - CREATED
        - ACTIVATING
        - ACTIVATED
        - DEACTIVATING
        - DEACTIVATED
        - DELETING
        - UPDATING
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      description: Defines an action to be initiated by a trigger.
      type: object
      properties:
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of a job to be run.
        Arguments:
          type: object
          properties: {}
          description: The job arguments used when this trigger fires. For this job run, they replace the default arguments set in the job definition itself. You can specify arguments here that your own job-execution script consumes, as well as arguments that Glue itself consumes. For information about how to specify and consume your own Job arguments, see the Calling Glue APIs in Python topic in the developer guide. For information about the key-value pairs that Glue consumes to set up your job, see the Special Parameters Used by Glue topic in the developer guide.
        Timeout:
          $ref: "#/components/schemas/Timeout"
          description: The JobRun timeout in minutes. This is the maximum time that a job run can consume resources before it is terminated and enters TIMEOUT status. This overrides the timeout value set in the parent job. Jobs must have timeout values less than 7 days or 10080 minutes. Otherwise, the jobs will throw an exception. When the value is left blank, the timeout is defaulted to 2,880 minutes for Glue version 4.0 and earlier, or 480 minutes for Glue version 5.0 and later. Any existing Glue jobs that had a timeout value greater than 7 days will be defaulted to 7 days. For instance if you have specified a timeout of 20 days for a batch job, it will be stopped on the 7th day. For streaming jobs, if you have set up a maintenance window, it will be restarted during the maintenance window after 7 days.
        SecurityConfiguration:
          $ref: "#/components/schemas/NameString"
          description: The name of the SecurityConfiguration structure to be used with this action.
        NotificationProperty:
          $ref: "#/components/schemas/NotificationProperty"
          description: Specifies configuration properties of a job run notification.
        CrawlerName:
          $ref: "#/components/schemas/NameString"
          description: The name of the crawler to be used with this action.
    Predicate:
      description: Defines the predicate of the trigger, which determines when it fires.
      type: object
      properties:
        Logical:
          $ref: "#/components/schemas/Logical"
          description: An optional field if only one condition is listed. If multiple conditions are listed, then this field is required.
        Conditions:
          $ref: "#/components/schemas/ConditionList"
          description: A list of the conditions that determine when the trigger will fire.
    Logical:
      type: string
      enum:
        - AND
        - ANY
    ConditionList:
      type: array
      items:
        $ref: "#/components/schemas/Condition"
    Condition:
      description: Defines a condition under which a trigger fires.
      type: object
      properties:
        LogicalOperator:
          $ref: "#/components/schemas/LogicalOperator"
          description: A logical operator.
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of the job whose JobRuns this condition applies to, and on which this trigger waits.
        State:
          $ref: "#/components/schemas/JobRunState"
          description: The condition state. Currently, the only job states that a trigger can listen for are SUCCEEDED, STOPPED, FAILED, and TIMEOUT. The only crawler states that a trigger can listen for are SUCCEEDED, FAILED, and CANCELLED.
        CrawlerName:
          $ref: "#/components/schemas/NameString"
          description: The name of the crawler to which this condition applies.
        CrawlState:
          $ref: "#/components/schemas/CrawlState"
          description: The state of the crawler to which this condition applies.
    LogicalOperator:
      type: string
      enum:
        - EQUALS
    JobRunState:
      type: string
      enum:
        - STARTING
        - RUNNING
        - STOPPING
        - STOPPED
        - SUCCEEDED
        - FAILED
        - TIMEOUT
        - ERROR
        - WAITING
        - EXPIRED
    CrawlState:
      type: string
      enum:
        - RUNNING
        - CANCELLING
        - CANCELLED
        - SUCCEEDED
        - FAILED
        - ERROR
    EventBatchingCondition:
      description: Batch condition that must be met (specified number of events received or batch time window expired) before EventBridge event trigger fires.
      type: object
      properties:
        BatchSize:
          $ref: "#/components/schemas/BatchSize"
          description: Number of events that must be received from Amazon EventBridge before EventBridge event trigger fires.
        BatchWindow:
          $ref: "#/components/schemas/BatchWindow"
          description: Window of time in seconds after which EventBridge event trigger fires. Window starts when first event is received.
      required:
        - BatchSize
    BatchSize:
      type: integer
      minimum: 1
      maximum: 100
    BatchWindow:
      type: integer
      minimum: 1
      maximum: 900
    WorkflowNames:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    BatchGetWorkflowsResponse:
      type: object
      properties:
        Workflows:
          $ref: "#/components/schemas/Workflows"
          description: A list of workflow resource metadata.
        MissingWorkflows:
          $ref: "#/components/schemas/WorkflowNames"
          description: A list of names of workflows not found.
    Workflows:
      type: array
      items:
        $ref: "#/components/schemas/Workflow"
    Workflow:
      description: A workflow is a collection of multiple dependent Glue jobs and crawlers that are run to complete a complex ETL task. A workflow manages the execution and monitoring of all its jobs and crawlers.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the workflow.
        Description:
          $ref: "#/components/schemas/GenericString"
          description: A description of the workflow.
        DefaultRunProperties:
          type: object
          properties: {}
          description: A collection of properties to be used as part of each execution of the workflow. The run properties are made available to each job in the workflow. A job can modify the properties for the next jobs in the flow.
        CreatedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time when the workflow was created.
        LastModifiedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time when the workflow was last modified.
        LastRun:
          $ref: "#/components/schemas/WorkflowRun"
          description: The information about the last execution of the workflow.
        Graph:
          $ref: "#/components/schemas/WorkflowGraph"
          description: The graph representing all the Glue components that belong to the workflow as nodes and directed connections between them as edges.
        MaxConcurrentRuns:
          $ref: "#/components/schemas/NullableInteger"
          description: You can use this parameter to prevent unwanted multiple updates to data, to control costs, or in some cases, to prevent exceeding the maximum number of concurrent runs of any of the component jobs. If you leave this parameter blank, there is no limit to the number of concurrent workflow runs.
        BlueprintDetails:
          $ref: "#/components/schemas/BlueprintDetails"
          description: This structure indicates the details of the blueprint that this particular workflow is created from.
    WorkflowRun:
      description: A workflow run is an execution of a workflow providing all the runtime information.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: Name of the workflow that was run.
        WorkflowRunId:
          $ref: "#/components/schemas/IdString"
          description: The ID of this workflow run.
        PreviousRunId:
          $ref: "#/components/schemas/IdString"
          description: The ID of the previous workflow run.
        WorkflowRunProperties:
          type: object
          properties: {}
          description: The workflow run properties which were set during the run.
        StartedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time when the workflow run was started.
        CompletedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time when the workflow run completed.
        Status:
          $ref: "#/components/schemas/WorkflowRunStatus"
          description: The status of the workflow run.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorString"
          description: 'This error message describes any error that may have occurred in starting the workflow run. Currently the only error message is "Concurrent runs exceeded for workflow: foo."'
        Statistics:
          $ref: "#/components/schemas/WorkflowRunStatistics"
          description: The statistics of the run.
        Graph:
          $ref: "#/components/schemas/WorkflowGraph"
          description: The graph representing all the Glue components that belong to the workflow as nodes and directed connections between them as edges.
        StartingEventBatchCondition:
          $ref: "#/components/schemas/StartingEventBatchCondition"
          description: The batch condition that started the workflow run.
    WorkflowRunStatus:
      type: string
      enum:
        - RUNNING
        - COMPLETED
        - STOPPING
        - STOPPED
        - ERROR
    WorkflowRunStatistics:
      description: Workflow run statistics provides statistics about the workflow run.
      type: object
      properties:
        TotalActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Total number of Actions in the workflow run.
        TimeoutActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Total number of Actions that timed out.
        FailedActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Total number of Actions that have failed.
        StoppedActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Total number of Actions that have stopped.
        SucceededActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Total number of Actions that have succeeded.
        RunningActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Total number Actions in running state.
        ErroredActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Indicates the count of job runs in the ERROR state in the workflow run.
        WaitingActions:
          $ref: "#/components/schemas/IntegerValue"
          description: Indicates the count of job runs in WAITING state in the workflow run.
    WorkflowGraph:
      description: A workflow graph represents the complete workflow containing all the Glue components present in the workflow and all the directed connections between them.
      type: object
      properties:
        Nodes:
          $ref: "#/components/schemas/NodeList"
          description: A list of the the Glue components belong to the workflow represented as nodes.
        Edges:
          $ref: "#/components/schemas/EdgeList"
          description: A list of all the directed connections between the nodes belonging to the workflow.
    NodeList:
      type: array
      items:
        $ref: "#/components/schemas/Node"
    Node:
      description: A node represents an Glue component (trigger, crawler, or job) on a workflow graph.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NodeType"
          description: The type of Glue component represented by the node.
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the Glue component represented by the node.
        UniqueId:
          $ref: "#/components/schemas/NameString"
          description: The unique Id assigned to the node within the workflow.
        TriggerDetails:
          $ref: "#/components/schemas/TriggerNodeDetails"
          description: Details of the Trigger when the node represents a Trigger.
        JobDetails:
          $ref: "#/components/schemas/JobNodeDetails"
          description: Details of the Job when the node represents a Job.
        CrawlerDetails:
          $ref: "#/components/schemas/CrawlerNodeDetails"
          description: Details of the crawler when the node represents a crawler.
    NodeType:
      type: string
      enum:
        - CRAWLER
        - JOB
        - TRIGGER
    TriggerNodeDetails:
      description: The details of a Trigger node present in the workflow.
      type: object
      properties:
        Trigger:
          $ref: "#/components/schemas/Trigger"
          description: The information of the trigger represented by the trigger node.
    JobNodeDetails:
      description: The details of a Job node present in the workflow.
      type: object
      properties:
        JobRuns:
          $ref: "#/components/schemas/JobRunList"
          description: The information for the job runs represented by the job node.
    JobRunList:
      type: array
      items:
        $ref: "#/components/schemas/JobRun"
    JobRun:
      description: Contains information about a job run.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/IdString"
          description: The ID of this job run.
        Attempt:
          $ref: "#/components/schemas/AttemptCount"
          description: The number of the attempt to run this job.
        PreviousRunId:
          $ref: "#/components/schemas/IdString"
          description: The ID of the previous run of this job. For example, the JobRunId specified in the StartJobRun action.
        TriggerName:
          $ref: "#/components/schemas/NameString"
          description: The name of the trigger that started this job run.
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of the job definition being used in this run.
        JobMode:
          $ref: "#/components/schemas/JobMode"
          description: "A mode that describes how a job was created. Valid values are: SCRIPT - The job was created using the Glue Studio script editor. VISUAL - The job was created using the Glue Studio visual editor. NOTEBOOK - The job was created using an interactive sessions notebook. When the JobMode field is missing or null, SCRIPT is assigned as the default value."
        JobRunQueuingEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether job run queuing is enabled for the job run. A value of true means job run queuing is enabled for the job run. If false or not populated, the job run will not be considered for queueing.
        StartedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time at which this job run was started.
        LastModifiedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The last time that this job run was modified.
        CompletedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time that this job run completed.
        JobRunState:
          $ref: "#/components/schemas/JobRunState"
          description: The current state of the job run. For more information about the statuses of jobs that have terminated abnormally, see Glue Job Run Statuses.
        Arguments:
          type: object
          properties: {}
          description: The job arguments associated with this run. For this job run, they replace the default arguments set in the job definition itself. You can specify arguments here that your own job-execution script consumes, as well as arguments that Glue itself consumes. Job arguments may be logged. Do not pass plaintext secrets as arguments. Retrieve secrets from a Glue Connection, Secrets Manager or other secret management mechanism if you intend to keep them within the Job. For information about how to specify and consume your own Job arguments, see the Calling Glue APIs in Python topic in the developer guide. For information about the arguments you can provide to this field when configuring Spark jobs, see the Special Parameters Used by Glue topic in the developer guide. For information about the arguments you can provide to this field when configuring Ray jobs, see Using job parameters in Ray jobs in the developer guide.
        ErrorMessage:
          $ref: "#/components/schemas/ErrorString"
          description: An error message associated with this job run.
        PredecessorRuns:
          $ref: "#/components/schemas/PredecessorList"
          description: A list of predecessors to this job run.
        AllocatedCapacity:
          $ref: "#/components/schemas/IntegerValue"
          description: This field is deprecated. Use MaxCapacity instead. The number of Glue data processing units (DPUs) allocated to this JobRun. From 2 to 100 DPUs can be allocated; the default is 10. A DPU is a relative measure of processing power that consists of 4 vCPUs of compute capacity and 16 GB of memory. For more information, see the Glue pricing page.
        ExecutionTime:
          $ref: "#/components/schemas/ExecutionTime"
          description: The amount of time (in seconds) that the job run consumed resources.
        Timeout:
          $ref: "#/components/schemas/Timeout"
          description: The JobRun timeout in minutes. This is the maximum time that a job run can consume resources before it is terminated and enters TIMEOUT status. This value overrides the timeout value set in the parent job. Jobs must have timeout values less than 7 days or 10080 minutes. Otherwise, the jobs will throw an exception. When the value is left blank, the timeout is defaulted to 2,880 minutes for Glue version 4.0 and earlier, or 480 minutes for Glue version 5.0 and later. Any existing Glue jobs that had a timeout value greater than 7 days will be defaulted to 7 days. For instance if you have specified a timeout of 20 days for a batch job, it will be stopped on the 7th day. For streaming jobs, if you have set up a maintenance window, it will be restarted during the maintenance window after 7 days.
        MaxCapacity:
          $ref: "#/components/schemas/NullableDouble"
          description: 'For Glue version 1.0 or earlier jobs, using the standard worker type, the number of Glue data processing units (DPUs) that can be allocated when this job runs. A DPU is a relative measure of processing power that consists of 4 vCPUs of compute capacity and 16 GB of memory. For more information, see the Glue pricing page. For Glue version 2.0+ jobs, you cannot specify a Maximum capacity. Instead, you should specify a Worker type and the Number of workers. Do not set MaxCapacity if using WorkerType and NumberOfWorkers. The value that can be allocated for MaxCapacity depends on whether you are running a Python shell job, an Apache Spark ETL job, or an Apache Spark streaming ETL job: When you specify a Python shell job (JobCommand.Name="pythonshell"), you can allocate either 0.0625 or 1 DPU. The default is 0.0625 DPU. When you specify an Apache Spark ETL job (JobCommand.Name="glueetl") or Apache Spark streaming ETL job (JobCommand.Name="gluestreaming"), you can allocate from 2 to 100 DPUs. The default is 10 DPUs. This job type cannot have a fractional DPU allocation.'
        WorkerType:
          $ref: "#/components/schemas/WorkerType"
          description: "The type of predefined worker that is allocated when a job runs. Accepts a value of G.1X, G.2X, G.4X, G.8X or G.025X for Spark jobs. Accepts the value Z.2X for Ray jobs. For the G.1X worker type, each worker maps to 1 DPU (4 vCPUs, 16 GB of memory) with 94GB disk, and provides 1 executor per worker. We recommend this worker type for workloads such as data transforms, joins, and queries, to offers a scalable and cost effective way to run most jobs. For the G.2X worker type, each worker maps to 2 DPU (8 vCPUs, 32 GB of memory) with 138GB disk, and provides 1 executor per worker. We recommend this worker type for workloads such as data transforms, joins, and queries, to offers a scalable and cost effective way to run most jobs. For the G.4X worker type, each worker maps to 4 DPU (16 vCPUs, 64 GB of memory) with 256GB disk, and provides 1 executor per worker. We recommend this worker type for jobs whose workloads contain your most demanding transforms, aggregations, joins, and queries. This worker type is available only for Glue version 3.0 or later Spark ETL jobs in the following Amazon Web Services Regions: US East (Ohio), US East (N. Virginia), US West (Oregon), Asia Pacific (Singapore), Asia Pacific (Sydney), Asia Pacific (Tokyo), Canada (Central), Europe (Frankfurt), Europe (Ireland), and Europe (Stockholm). For the G.8X worker type, each worker maps to 8 DPU (32 vCPUs, 128 GB of memory) with 512GB disk, and provides 1 executor per worker. We recommend this worker type for jobs whose workloads contain your most demanding transforms, aggregations, joins, and queries. This worker type is available only for Glue version 3.0 or later Spark ETL jobs, in the same Amazon Web Services Regions as supported for the G.4X worker type. For the G.025X worker type, each worker maps to 0.25 DPU (2 vCPUs, 4 GB of memory) with 84GB disk, and provides 1 executor per worker. We recommend this worker type for low volume streaming jobs. This worker type is only available for Glue version 3.0 or later streaming jobs. For the Z.2X worker type, each worker maps to 2 M-DPU (8vCPUs, 64 GB of memory) with 128 GB disk, and provides up to 8 Ray workers based on the autoscaler."
        NumberOfWorkers:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of workers of a defined workerType that are allocated when a job runs.
        SecurityConfiguration:
          $ref: "#/components/schemas/NameString"
          description: The name of the SecurityConfiguration structure to be used with this job run.
        LogGroupName:
          $ref: "#/components/schemas/GenericString"
          description: The name of the log group for secure logging that can be server-side encrypted in Amazon CloudWatch using KMS. This name can be /aws-glue/jobs/, in which case the default encryption is NONE. If you add a role name and SecurityConfiguration name (in other words, /aws-glue/jobs-yourRoleName-yourSecurityConfigurationName/), then that security configuration is used to encrypt the log group.
        NotificationProperty:
          $ref: "#/components/schemas/NotificationProperty"
          description: Specifies configuration properties of a job run notification.
        GlueVersion:
          $ref: "#/components/schemas/GlueVersionString"
          description: In Spark jobs, GlueVersion determines the versions of Apache Spark and Python that Glue available in a job. The Python version indicates the version supported for jobs of type Spark. Ray jobs should set GlueVersion to 4.0 or greater. However, the versions of Ray, Python and additional libraries available in your Ray job are determined by the Runtime parameter of the Job command. For more information about the available Glue versions and corresponding Spark and Python versions, see Glue version in the developer guide. Jobs that are created without specifying a Glue version default to Glue 5.1.
        DPUSeconds:
          $ref: "#/components/schemas/NullableDouble"
          description: This field can be set for either job runs with execution class FLEX or when Auto Scaling is enabled, and represents the total time each executor ran during the lifecycle of a job run in seconds, multiplied by a DPU factor (1 for G.1X, 2 for G.2X, or 0.25 for G.025X workers). This value may be different than the executionEngineRuntime * MaxCapacity as in the case of Auto Scaling jobs, as the number of executors running at a given time may be less than the MaxCapacity. Therefore, it is possible that the value of DPUSeconds is less than executionEngineRuntime * MaxCapacity.
        ExecutionClass:
          $ref: "#/components/schemas/ExecutionClass"
          description: Indicates whether the job is run with a standard or flexible execution class. The standard execution-class is ideal for time-sensitive workloads that require fast job startup and dedicated resources. The flexible execution class is appropriate for time-insensitive jobs whose start and completion times may vary. Only jobs with Glue version 3.0 and above and command type glueetl will be allowed to set ExecutionClass to FLEX. The flexible execution class is available for Spark jobs.
        MaintenanceWindow:
          $ref: "#/components/schemas/MaintenanceWindow"
          description: This field specifies a day of the week and hour for a maintenance window for streaming jobs. Glue periodically performs maintenance activities. During these maintenance windows, Glue will need to restart your streaming jobs. Glue will restart the job within 3 hours of the specified maintenance window. For instance, if you set up the maintenance window for Monday at 10:00AM GMT, your jobs will be restarted between 10:00AM GMT to 1:00PM GMT.
        ProfileName:
          $ref: "#/components/schemas/NameString"
          description: The name of an Glue usage profile associated with the job run.
        StateDetail:
          $ref: "#/components/schemas/OrchestrationMessageString"
          description: This field holds details that pertain to the state of a job run. The field is nullable. For example, when a job run is in a WAITING state as a result of job run queuing, the field has the reason why the job run is in that state.
        ExecutionRoleSessionPolicy:
          $ref: "#/components/schemas/OrchestrationPolicyJsonString"
          description: This inline session policy to the StartJobRun API allows you to dynamically restrict the permissions of the specified execution role for the scope of the job, without requiring the creation of additional IAM roles.
    AttemptCount:
      type: integer
    PredecessorList:
      type: array
      items:
        $ref: "#/components/schemas/Predecessor"
    Predecessor:
      description: A job run that was used in the predicate of a conditional trigger that triggered this job run.
      type: object
      properties:
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of the job definition used by the predecessor job run.
        RunId:
          $ref: "#/components/schemas/IdString"
          description: The job-run ID of the predecessor job run.
    ExecutionTime:
      type: integer
    OrchestrationMessageString:
      type: string
      maxLength: 400000
    OrchestrationPolicyJsonString:
      type: string
      minLength: 2
      maxLength: 2048
    CrawlerNodeDetails:
      description: The details of a Crawler node present in the workflow.
      type: object
      properties:
        Crawls:
          $ref: "#/components/schemas/CrawlList"
          description: A list of crawls represented by the crawl node.
    CrawlList:
      type: array
      items:
        $ref: "#/components/schemas/Crawl"
    Crawl:
      description: The details of a crawl in the workflow.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/CrawlState"
          description: The state of the crawler.
        StartedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time on which the crawl started.
        CompletedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time on which the crawl completed.
        ErrorMessage:
          $ref: "#/components/schemas/DescriptionString"
          description: The error message associated with the crawl.
        LogGroup:
          $ref: "#/components/schemas/LogGroup"
          description: The log group associated with the crawl.
        LogStream:
          $ref: "#/components/schemas/LogStream"
          description: The log stream associated with the crawl.
    EdgeList:
      type: array
      items:
        $ref: "#/components/schemas/Edge"
    Edge:
      description: An edge represents a directed connection between two Glue components that are part of the workflow the edge belongs to.
      type: object
      properties:
        SourceId:
          $ref: "#/components/schemas/NameString"
          description: The unique of the node within the workflow where the edge starts.
        DestinationId:
          $ref: "#/components/schemas/NameString"
          description: The unique of the node within the workflow where the edge ends.
    StartingEventBatchCondition:
      description: The batch condition that started the workflow run. Either the number of events in the batch size arrived, in which case the BatchSize member is non-zero, or the batch window expired, in which case the BatchWindow member is non-zero.
      type: object
      properties:
        BatchSize:
          $ref: "#/components/schemas/NullableInteger"
          description: Number of events in the batch.
        BatchWindow:
          $ref: "#/components/schemas/NullableInteger"
          description: Duration of the batch window in seconds.
    BlueprintDetails:
      description: The details of a blueprint.
      type: object
      properties:
        BlueprintName:
          $ref: "#/components/schemas/OrchestrationNameString"
          description: The name of the blueprint.
        RunId:
          $ref: "#/components/schemas/IdString"
          description: The run ID for this blueprint.
    InclusionAnnotationList:
      type: array
      items:
        $ref: "#/components/schemas/DatapointInclusionAnnotation"
    DatapointInclusionAnnotation:
      description: An Inclusion Annotation.
      type: object
      properties:
        ProfileId:
          $ref: "#/components/schemas/HashString"
          description: The ID of the data quality profile the statistic belongs to.
        StatisticId:
          $ref: "#/components/schemas/HashString"
          description: The Statistic ID.
        InclusionAnnotation:
          $ref: "#/components/schemas/InclusionAnnotationValue"
          description: The inclusion annotation value to apply to the statistic.
    InclusionAnnotationValue:
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    BatchPutDataQualityStatisticAnnotationResponse:
      type: object
      properties:
        FailedInclusionAnnotations:
          $ref: "#/components/schemas/AnnotationErrorList"
          description: A list of AnnotationError's.
    AnnotationErrorList:
      type: array
      items:
        $ref: "#/components/schemas/AnnotationError"
    AnnotationError:
      description: A failed annotation.
      type: object
      properties:
        ProfileId:
          $ref: "#/components/schemas/HashString"
          description: The Profile ID for the failed annotation.
        StatisticId:
          $ref: "#/components/schemas/HashString"
          description: The Statistic ID for the failed annotation.
        FailureReason:
          $ref: "#/components/schemas/DescriptionString"
          description: The reason why the annotation failed.
    BatchStopJobRunJobRunIdList:
      type: array
      items:
        $ref: "#/components/schemas/IdString"
    BatchStopJobRunResponse:
      type: object
      properties:
        SuccessfulSubmissions:
          $ref: "#/components/schemas/BatchStopJobRunSuccessfulSubmissionList"
          description: A list of the JobRuns that were successfully submitted for stopping.
        Errors:
          $ref: "#/components/schemas/BatchStopJobRunErrorList"
          description: A list of the errors that were encountered in trying to stop JobRuns, including the JobRunId for which each error was encountered and details about the error.
    BatchStopJobRunSuccessfulSubmissionList:
      type: array
      items:
        $ref: "#/components/schemas/BatchStopJobRunSuccessfulSubmission"
    BatchStopJobRunSuccessfulSubmission:
      description: Records a successful request to stop a specified JobRun.
      type: object
      properties:
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of the job definition used in the job run that was stopped.
        JobRunId:
          $ref: "#/components/schemas/IdString"
          description: The JobRunId of the job run that was stopped.
    BatchStopJobRunErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchStopJobRunError"
    BatchStopJobRunError:
      description: Records an error that occurred when attempting to stop a specified job run.
      type: object
      properties:
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of the job definition that is used in the job run in question.
        JobRunId:
          $ref: "#/components/schemas/IdString"
          description: The JobRunId of the job run in question.
        ErrorDetail:
          $ref: "#/components/schemas/ErrorDetail"
          description: Specifies details about the error that was encountered.
    BatchUpdatePartitionRequestEntryList:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdatePartitionRequestEntry"
    BatchUpdatePartitionRequestEntry:
      description: A structure that contains the values and structure used to update a partition.
      type: object
      properties:
        PartitionValueList:
          $ref: "#/components/schemas/BoundedPartitionValueList"
          description: A list of values defining the partitions.
        PartitionInput:
          $ref: "#/components/schemas/PartitionInput"
          description: The structure used to update a partition.
      required:
        - PartitionValueList
        - PartitionInput
    BoundedPartitionValueList:
      type: array
      items:
        $ref: "#/components/schemas/ValueString"
    BatchUpdatePartitionResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchUpdatePartitionFailureList"
          description: The errors encountered when trying to update the requested partitions. A list of BatchUpdatePartitionFailureEntry objects.
    BatchUpdatePartitionFailureList:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdatePartitionFailureEntry"
    BatchUpdatePartitionFailureEntry:
      description: Contains information about a batch update partition error.
      type: object
      properties:
        PartitionValueList:
          $ref: "#/components/schemas/BoundedPartitionValueList"
          description: A list of values defining the partitions.
        ErrorDetail:
          $ref: "#/components/schemas/ErrorDetail"
          description: The details about the batch update partition error.
    CancelDataQualityRuleRecommendationRunResponse:
      type: object
    CancelDataQualityRulesetEvaluationRunResponse:
      type: object
    CancelMLTaskRunResponse:
      type: object
      properties:
        TransformId:
          $ref: "#/components/schemas/HashString"
          description: The unique identifier of the machine learning transform.
        TaskRunId:
          $ref: "#/components/schemas/HashString"
          description: The unique identifier for the task run.
        Status:
          $ref: "#/components/schemas/TaskStatusType"
          description: The status for this run.
    TaskStatusType:
      type: string
      enum:
        - STARTING
        - RUNNING
        - STOPPING
        - STOPPED
        - SUCCEEDED
        - FAILED
        - TIMEOUT
    CancelStatementResponse:
      type: object
    DataFormat:
      type: string
      enum:
        - AVRO
        - JSON
        - PROTOBUF
    SchemaDefinitionString:
      type: string
      minLength: 1
      maxLength: 170000
      pattern: .*\S.*
    CheckSchemaVersionValidityResponse:
      type: object
      properties:
        Valid:
          $ref: "#/components/schemas/IsVersionValid"
          description: Return true, if the schema is valid and false otherwise.
        Error:
          $ref: "#/components/schemas/SchemaValidationError"
          description: A validation failure error message.
    IsVersionValid:
      type: boolean
    SchemaValidationError:
      type: string
      minLength: 1
      maxLength: 5000
    OrchestrationS3Location:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: ^s3://([^/]+)/([^/]+/)*([^/]+)$
    TagsMap:
      type: object
      properties: {}
    CreateBlueprintResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: Returns the name of the blueprint that was registered.
    CatalogNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^(?!(.*[.\/\\]|aws:)).*$
    CatalogInput:
      description: A structure that describes catalog properties.
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: Description string, not more than 2048 bytes long, matching the URI address multi-line string pattern. A description of the catalog.
        FederatedCatalog:
          $ref: "#/components/schemas/FederatedCatalog"
          description: A FederatedCatalog object. A FederatedCatalog structure that references an entity outside the Glue Data Catalog, for example a Redshift database.
        Parameters:
          type: object
          properties: {}
          description: A map array of key-value pairs that define the parameters and properties of the catalog.
        TargetRedshiftCatalog:
          $ref: "#/components/schemas/TargetRedshiftCatalog"
          description: A TargetRedshiftCatalog object that describes a target catalog for resource linking.
        CatalogProperties:
          $ref: "#/components/schemas/CatalogProperties"
          description: A CatalogProperties object that specifies data lake access properties and other custom properties.
        CreateTableDefaultPermissions:
          $ref: "#/components/schemas/PrincipalPermissionsList"
          description: An array of PrincipalPermissions objects. Creates a set of default permissions on the table(s) for principals. Used by Amazon Web Services Lake Formation. Typically should be explicitly set as an empty list.
        CreateDatabaseDefaultPermissions:
          $ref: "#/components/schemas/PrincipalPermissionsList"
          description: An array of PrincipalPermissions objects. Creates a set of default permissions on the database(s) for principals. Used by Amazon Web Services Lake Formation. Typically should be explicitly set as an empty list.
        AllowFullTableExternalDataAccess:
          $ref: "#/components/schemas/AllowFullTableExternalDataAccessEnum"
          description: Allows third-party engines to access data in Amazon S3 locations that are registered with Lake Formation.
        OverwriteChildResourcePermissionsWithDefault:
          $ref: "#/components/schemas/OverwriteChildResourcePermissionsWithDefaultEnum"
          description: Overwrites existing Amazon Web Services Lake Formation permissions with CatalogInput$CreateTableDefaultPermissions and CatalogInput$CreateDatabaseDefaultPermissions for all child resources.
    FederatedCatalog:
      description: A catalog that points to an entity outside the Glue Data Catalog.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FederationIdentifier"
          description: A unique identifier for the federated catalog.
        ConnectionName:
          $ref: "#/components/schemas/NameString"
          description: The name of the connection to an external data source, for example a Redshift-federated catalog.
        ConnectionType:
          $ref: "#/components/schemas/NameString"
          description: The type of connection used to access the federated catalog, specifying the protocol or method for connection to the external data source.
    FederationIdentifier:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    TargetRedshiftCatalog:
      description: A structure that describes a target catalog for resource linking.
      type: object
      properties:
        CatalogArn:
          $ref: "#/components/schemas/ResourceArnString"
          description: The Amazon Resource Name (ARN) of the catalog resource.
      required:
        - CatalogArn
    ResourceArnString:
      type: string
    CatalogProperties:
      description: A structure that specifies data lake access properties and other custom properties.
      type: object
      properties:
        DataLakeAccessProperties:
          $ref: "#/components/schemas/DataLakeAccessProperties"
          description: A DataLakeAccessProperties object that specifies properties to configure data lake access for your catalog resource in the Glue Data Catalog.
        IcebergOptimizationProperties:
          $ref: "#/components/schemas/IcebergOptimizationProperties"
          description: A structure that specifies Iceberg table optimization properties for the catalog. This includes configuration for compaction, retention, and orphan file deletion operations that can be applied to Iceberg tables in this catalog.
        CustomProperties:
          type: object
          properties: {}
          description: Additional key-value properties for the catalog, such as column statistics optimizations.
    DataLakeAccessProperties:
      description: Input properties to configure data lake access for your catalog resource in the Glue Data Catalog.
      type: object
      properties:
        DataLakeAccess:
          $ref: "#/components/schemas/Boolean"
          description: Turns on or off data lake access for Apache Spark applications that access Amazon Redshift databases in the Data Catalog from any non-Redshift engine, such as Amazon Athena, Amazon EMR, or Glue ETL.
        DataTransferRole:
          $ref: "#/components/schemas/IAMRoleArn"
          description: A role that will be assumed by Glue for transferring data into/out of the staging bucket during a query.
        KmsKey:
          $ref: "#/components/schemas/ResourceArnString"
          description: An encryption key that will be used for the staging bucket that will be created along with the catalog.
        CatalogType:
          $ref: "#/components/schemas/NameString"
          description: Specifies a federated catalog type for the native catalog resource. The currently supported type is aws:redshift.
    IAMRoleArn:
      type: string
      pattern: ^arn:aws(-(cn|us-gov|iso(-[bef])?))?:iam::[0-9]{12}:role/.+
    IcebergOptimizationProperties:
      description: A structure that specifies Iceberg table optimization properties for the catalog, including configurations for compaction, retention, and orphan file deletion operations.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that will be assumed to perform Iceberg table optimization operations.
        Compaction:
          type: object
          properties: {}
          description: A map of key-value pairs that specify configuration parameters for Iceberg table compaction operations, which optimize the layout of data files to improve query performance.
        Retention:
          type: object
          properties: {}
          description: A map of key-value pairs that specify configuration parameters for Iceberg table retention operations, which manage the lifecycle of table snapshots to control storage costs.
        OrphanFileDeletion:
          type: object
          properties: {}
          description: A map of key-value pairs that specify configuration parameters for Iceberg orphan file deletion operations, which identify and remove files that are no longer referenced by the table metadata.
    PrincipalPermissionsList:
      type: array
      items:
        $ref: "#/components/schemas/PrincipalPermissions"
    PrincipalPermissions:
      description: Permissions granted to a principal.
      type: object
      properties:
        Principal:
          $ref: "#/components/schemas/DataLakePrincipal"
          description: The principal who is granted permissions.
        Permissions:
          $ref: "#/components/schemas/PermissionList"
          description: The permissions that are granted to the principal.
    DataLakePrincipal:
      description: The Lake Formation principal.
      type: object
      properties:
        DataLakePrincipalIdentifier:
          $ref: "#/components/schemas/DataLakePrincipalString"
          description: An identifier for the Lake Formation principal.
    DataLakePrincipalString:
      type: string
      minLength: 1
      maxLength: 255
    PermissionList:
      type: array
      items:
        $ref: "#/components/schemas/Permission"
    Permission:
      type: string
      enum:
        - ALL
        - SELECT
        - ALTER
        - DROP
        - DELETE
        - INSERT
        - CREATE_DATABASE
        - CREATE_TABLE
        - DATA_LOCATION_ACCESS
    AllowFullTableExternalDataAccessEnum:
      type: string
      enum:
        - "True"
        - "False"
    OverwriteChildResourcePermissionsWithDefaultEnum:
      type: string
      enum:
        - Accept
        - Deny
    CreateCatalogResponse:
      type: object
    CreateGrokClassifierRequest:
      description: Specifies a grok classifier for CreateClassifier to create.
      type: object
      properties:
        Classification:
          $ref: "#/components/schemas/Classification"
          description: An identifier of the data format that the classifier matches, such as Twitter, JSON, Omniture logs, Amazon CloudWatch Logs, and so on.
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the new classifier.
        GrokPattern:
          $ref: "#/components/schemas/GrokPattern"
          description: The grok pattern used by this classifier.
        CustomPatterns:
          $ref: "#/components/schemas/CustomPatterns"
          description: Optional custom grok patterns used by this classifier.
      required:
        - Classification
        - Name
        - GrokPattern
    Classification:
      type: string
    GrokPattern:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\t]*"
    CustomPatterns:
      type: string
      minLength: 0
      maxLength: 16000
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    CreateXMLClassifierRequest:
      description: Specifies an XML classifier for CreateClassifier to create.
      type: object
      properties:
        Classification:
          $ref: "#/components/schemas/Classification"
          description: An identifier of the data format that the classifier matches.
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        RowTag:
          $ref: "#/components/schemas/RowTag"
          description: The XML tag designating the element that contains each record in an XML document being parsed. This can't identify a self-closing element (closed by />). An empty row element that contains only attributes can be parsed as long as it ends with a closing tag (for example, <row item_a="A" item_b="B"></row> is okay, but <row item_a="A" item_b="B" /> is not).
      required:
        - Classification
        - Name
    RowTag:
      type: string
    CreateJsonClassifierRequest:
      description: Specifies a JSON classifier for CreateClassifier to create.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        JsonPath:
          $ref: "#/components/schemas/JsonPath"
          description: A JsonPath string defining the JSON data for the classifier to classify. Glue supports a subset of JsonPath, as described in Writing JsonPath Custom Classifiers.
      required:
        - Name
        - JsonPath
    JsonPath:
      type: string
    CreateCsvClassifierRequest:
      description: Specifies a custom CSV classifier for CreateClassifier to create.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        Delimiter:
          $ref: "#/components/schemas/CsvColumnDelimiter"
          description: A custom symbol to denote what separates each column entry in the row.
        QuoteSymbol:
          $ref: "#/components/schemas/CsvQuoteSymbol"
          description: A custom symbol to denote what combines content into a single column value. Must be different from the column delimiter.
        ContainsHeader:
          $ref: "#/components/schemas/CsvHeaderOption"
          description: Indicates whether the CSV file contains a header.
