    TransformParameters:
      description: The algorithm-specific parameters that are associated with the machine learning transform.
      type: object
      properties:
        TransformType:
          $ref: "#/components/schemas/TransformType"
          description: The type of machine learning transform. For information about the types of machine learning transforms, see Creating Machine Learning Transforms.
        FindMatchesParameters:
          $ref: "#/components/schemas/FindMatchesParameters"
          description: The parameters for the find matches algorithm.
      required:
        - TransformType
    TransformType:
      type: string
      enum:
        - FIND_MATCHES
    FindMatchesParameters:
      description: The parameters to configure the find matches transform.
      type: object
      properties:
        PrimaryKeyColumnName:
          $ref: "#/components/schemas/ColumnNameString"
          description: The name of a column that uniquely identifies rows in the source table. Used to help identify matching records.
        PrecisionRecallTradeoff:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: The value selected when tuning your transform for a balance between precision and recall. A value of 0.5 means no preference; a value of 1.0 means a bias purely for precision, and a value of 0.0 means a bias for recall. Because this is a tradeoff, choosing values close to 1.0 means very low recall, and choosing values close to 0.0 results in very low precision. The precision metric indicates how often your model is correct when it predicts a match. The recall metric indicates that for an actual match, how often your model predicts the match.
        AccuracyCostTradeoff:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: The value that is selected when tuning your transform for a balance between accuracy and cost. A value of 0.5 means that the system balances accuracy and cost concerns. A value of 1.0 means a bias purely for accuracy, which typically results in a higher cost, sometimes substantially higher. A value of 0.0 means a bias purely for cost, which results in a less accurate FindMatches transform, sometimes with unacceptable accuracy. Accuracy measures how well the transform finds true positives and true negatives. Increasing accuracy requires more machine resources and cost. But it also results in increased recall. Cost measures how many compute resources, and thus money, are consumed to run the transform.
        EnforceProvidedLabels:
          $ref: "#/components/schemas/NullableBoolean"
          description: The value to switch on or off to force the output to match the provided labels from users. If the value is True, the find matches transform forces the output to match the provided labels. The results override the normal conflation results. If the value is False, the find matches transform does not ensure all the labels provided are respected, and the results rely on the trained model. Note that setting this value to true may increase the conflation execution time.
    TransformEncryption:
      description: The encryption-at-rest settings of the transform that apply to accessing user data. Machine learning transforms can access user data encrypted in Amazon S3 using KMS. Additionally, imported labels and trained transforms can now be encrypted using a customer provided KMS key.
      type: object
      properties:
        MlUserDataEncryption:
          $ref: "#/components/schemas/MLUserDataEncryption"
          description: An MLUserDataEncryption object containing the encryption mode and customer-provided KMS key ID.
        TaskRunSecurityConfigurationName:
          $ref: "#/components/schemas/NameString"
          description: The name of the security configuration.
    MLUserDataEncryption:
