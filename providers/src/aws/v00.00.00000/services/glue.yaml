    FindMatchesMetrics:
      description: The evaluation metrics for the find matches algorithm. The quality of your machine learning transform is measured by getting your transform to predict some matches and comparing the results to known matches from the same dataset. The quality metrics are based on a subset of your data, so they are not precise.
      type: object
      properties:
        AreaUnderPRCurve:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: The area under the precision/recall curve (AUPRC) is a single number measuring the overall quality of the transform, that is independent of the choice made for precision vs. recall. Higher values indicate that you have a more attractive precision vs. recall tradeoff. For more information, see Precision and recall in Wikipedia.
        Precision:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: The precision metric indicates when often your transform is correct when it predicts a match. Specifically, it measures how well the transform finds true positives from the total true positives possible. For more information, see Precision and recall in Wikipedia.
        Recall:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: The recall metric indicates that for an actual match, how often your transform predicts the match. Specifically, it measures how well the transform finds true positives from the total records in the source data. For more information, see Precision and recall in Wikipedia.
        F1:
          $ref: "#/components/schemas/GenericBoundedDouble"
          description: The maximum F1 metric indicates the transform's accuracy between 0 and 1, where 1 is the best accuracy. For more information, see F1 score in Wikipedia.
        ConfusionMatrix:
          $ref: "#/components/schemas/ConfusionMatrix"
          description: The confusion matrix shows you what your transform is predicting accurately and what types of errors it is making. For more information, see Confusion matrix in Wikipedia.
        ColumnImportances:
          $ref: "#/components/schemas/ColumnImportanceList"
          description: A list of ColumnImportance structures containing column importance metrics, sorted in order of descending importance.
    ConfusionMatrix:
      description: The confusion matrix shows you what your transform is predicting accurately and what types of errors it is making. For more information, see Confusion matrix in Wikipedia.
      type: object
      properties:
        NumTruePositives:
          $ref: "#/components/schemas/RecordsCount"
          description: The number of matches in the data that the transform correctly found, in the confusion matrix for your transform.
        NumFalsePositives:
          $ref: "#/components/schemas/RecordsCount"
          description: The number of nonmatches in the data that the transform incorrectly classified as a match, in the confusion matrix for your transform.
        NumTrueNegatives:
          $ref: "#/components/schemas/RecordsCount"
          description: The number of nonmatches in the data that the transform correctly rejected, in the confusion matrix for your transform.
        NumFalseNegatives:
          $ref: "#/components/schemas/RecordsCount"
          description: The number of matches in the data that the transform didn't find, in the confusion matrix for your transform.
    RecordsCount:
      type: integer
      format: int64
    ColumnImportanceList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnImportance"
    ColumnImportance:
      description: A structure containing the column name and column importance score for a column. Column importance helps you understand how columns contribute to your model, by identifying which columns in your records are more important than others.
