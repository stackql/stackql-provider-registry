        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the table definition was created in the Data Catalog.
        UpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time that the table was updated.
        LastAccessTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time that the table was accessed. This is usually taken from HDFS, and might not be reliable.
        LastAnalyzedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time that column statistics were computed for this table.
        Retention:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: The retention time for this table.
        StorageDescriptor:
          $ref: "#/components/schemas/StorageDescriptor"
          description: A storage descriptor containing information about the physical storage of this table.
        PartitionKeys:
          $ref: "#/components/schemas/ColumnList"
          description: 'A list of columns by which the table is partitioned. Only primitive types are supported as partition keys. When you create a table used by Amazon Athena, and you do not specify any partitionKeys, you must at least set the value of partitionKeys to an empty list. For example: "PartitionKeys": []'
        ViewOriginalText:
          $ref: "#/components/schemas/ViewTextString"
          description: Included for Apache Hive compatibility. Not used in the normal course of Glue operations. If the table is a VIRTUAL_VIEW, certain Athena configuration encoded in base64.
        ViewExpandedText:
          $ref: "#/components/schemas/ViewTextString"
          description: Included for Apache Hive compatibility. Not used in the normal course of Glue operations.
        TableType:
          $ref: "#/components/schemas/TableTypeString"
          description: "The type of this table. Glue will create tables with the EXTERNAL_TABLE type. Other services, such as Athena, may create tables with additional table types. Glue related table types: EXTERNAL_TABLE Hive compatible attribute - indicates a non-Hive managed table. GOVERNED Used by Lake Formation. The Glue Data Catalog understands GOVERNED."
        Parameters:
          type: object
          properties: {}
          description: These key-value pairs define properties associated with the table.
        CreatedBy:
          $ref: "#/components/schemas/NameString"
          description: The person or entity who created the table.
        IsRegisteredWithLakeFormation:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the table has been registered with Lake Formation.
        TargetTable:
