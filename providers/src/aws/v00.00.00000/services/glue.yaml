          $ref: "#/components/schemas/IcebergDocument"
          description: Default value used to populate the field's value for all records that were written before the field was added to the schema. This enables backward compatibility when adding new fields to existing Iceberg tables.
        WriteDefault:
          $ref: "#/components/schemas/IcebergDocument"
          description: Default value used to populate the field's value for any records written after the field was added to the schema, if the writer does not supply the field's value. This can be changed through schema evolution.
      required:
        - Id
        - Name
        - Type
        - Required
