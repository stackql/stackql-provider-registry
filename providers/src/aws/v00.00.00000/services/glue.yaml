        VersionId:
          $ref: "#/components/schemas/VersionString"
          description: The ID of the table version.
        FederatedTable:
          $ref: "#/components/schemas/FederatedTable"
          description: A FederatedTable structure that references an entity outside the Glue Data Catalog.
        ViewDefinition:
          $ref: "#/components/schemas/ViewDefinition"
          description: A structure that contains all the information that defines the view, including the dialect or dialects for the view, and the query.
        IsMultiDialectView:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether the view supports the SQL dialects of one or more different query engines and can therefore be read by those engines.
        IsMaterializedView:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates a table is a MaterializedView.
        Status:
          $ref: "#/components/schemas/TableStatus"
          description: Indicates the the state of an asynchronous change to a table.
      required:
        - Name
    FederatedTable:
      description: A table that points to an entity outside the Glue Data Catalog.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FederationIdentifier"
          description: A unique identifier for the federated table.
        DatabaseIdentifier:
          $ref: "#/components/schemas/FederationIdentifier"
          description: A unique identifier for the federated database.
        ConnectionName:
          $ref: "#/components/schemas/NameString"
          description: The name of the connection to the external metastore.
        ConnectionType:
          $ref: "#/components/schemas/NameString"
          description: The type of connection used to access the federated table, specifying the protocol or method for connecting to the external data source.
    ViewDefinition:
      description: A structure containing details for representations.
      type: object
      properties:
        IsProtected:
          $ref: "#/components/schemas/NullableBoolean"
          description: You can set this flag as true to instruct the engine not to push user-provided operations into the logical plan of the view during query planning. However, setting this flag does not guarantee that the engine will comply. Refer to the engine's documentation to understand the guarantees provided, if any.
        Definer:
          $ref: "#/components/schemas/ArnString"
          description: The definer of a view in SQL.
        ViewVersionId:
          $ref: "#/components/schemas/TableVersionId"
          description: The ID value that identifies this view's version. For materialized views, the version ID is the Apache Iceberg table's snapshot ID.
        ViewVersionToken:
          $ref: "#/components/schemas/HashString"
          description: The version ID of the Apache Iceberg table.
        RefreshSeconds:
          $ref: "#/components/schemas/RefreshSeconds"
          description: Auto refresh interval in seconds for the materialized view. If not specified, the view will not automatically refresh.
        LastRefreshType:
          $ref: "#/components/schemas/LastRefreshType"
          description: Sets the method used for the most recent refresh.
        SubObjects:
          $ref: "#/components/schemas/ViewSubObjectsList"
          description: A list of table Amazon Resource Names (ARNs).
        SubObjectVersionIds:
          $ref: "#/components/schemas/ViewSubObjectVersionIdsList"
          description: List of the Apache Iceberg table versions referenced by the materialized view.
        Representations:
          $ref: "#/components/schemas/ViewRepresentationList"
          description: A list of representations.
    ViewRepresentationList:
      type: array
      items:
        $ref: "#/components/schemas/ViewRepresentation"
    ViewRepresentation:
      description: A structure that contains the dialect of the view, and the query that defines the view.
      type: object
      properties:
        Dialect:
          $ref: "#/components/schemas/ViewDialect"
          description: The dialect of the query engine.
        DialectVersion:
          $ref: "#/components/schemas/ViewDialectVersionString"
          description: The version of the dialect of the query engine. For example, 3.0.0.
        ViewOriginalText:
          $ref: "#/components/schemas/ViewTextString"
          description: The SELECT query provided by the customer during CREATE VIEW DDL. This SQL is not used during a query on a view (ViewExpandedText is used instead). ViewOriginalText is used for cases like SHOW CREATE VIEW where users want to see the original DDL command that created the view.
        ViewExpandedText:
          $ref: "#/components/schemas/ViewTextString"
          description: "The expanded SQL for the view. This SQL is used by engines while processing a query on a view. Engines may perform operations during view creation to transform ViewOriginalText to ViewExpandedText. For example: Fully qualified identifiers: SELECT * from table1 -> SELECT * from db1.table1"
        ValidationConnection:
          $ref: "#/components/schemas/NameString"
          description: The name of the connection to be used to validate the specific representation of the view.
        IsStale:
          $ref: "#/components/schemas/NullableBoolean"
          description: Dialects marked as stale are no longer valid and must be updated before they can be queried in their respective query engines.
    TableStatus:
      description: A structure containing information about the state of an asynchronous change to a table.
      type: object
      properties:
        RequestedBy:
          $ref: "#/components/schemas/NameString"
          description: The ARN of the user who requested the asynchronous change.
        UpdatedBy:
          $ref: "#/components/schemas/NameString"
          description: The ARN of the user to last manually alter the asynchronous change (requesting cancellation, etc).
        RequestTime:
          $ref: "#/components/schemas/Timestamp"
          description: An ISO 8601 formatted date string indicating the time that the change was initiated.
        UpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: An ISO 8601 formatted date string indicating the time that the state was last updated.
        Action:
          $ref: "#/components/schemas/ResourceAction"
          description: Indicates which action was called on the table, currently only CREATE or UPDATE.
        State:
          $ref: "#/components/schemas/ResourceState"
          description: A generic status for the change in progress, such as QUEUED, IN_PROGRESS, SUCCESS, or FAILED.
        Error:
          $ref: "#/components/schemas/ErrorDetail"
          description: An error that will only appear when the state is "FAILED". This is a parent level exception message, there may be different Errors for each dialect.
        Details:
          $ref: "#/components/schemas/StatusDetails"
          description: A StatusDetails object with information about the requested change.
    ResourceAction:
      type: string
      enum:
        - UPDATE
        - CREATE
    ResourceState:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - SUCCESS
        - STOPPED
        - FAILED
    StatusDetails:
      description: A structure containing information about an asynchronous change to a table.
      type: object
      properties:
        RequestedChange:
          $ref: "#/components/schemas/Table"
          description: A Table object representing the requested changes.
        ViewValidations:
          $ref: "#/components/schemas/ViewValidationList"
          description: A list of ViewValidation objects that contain information for an analytical engine to validate a view.
    ViewValidationList:
      type: array
      items:
        $ref: "#/components/schemas/ViewValidation"
    ViewValidation:
      description: A structure that contains information for an analytical engine to validate a view, prior to persisting the view metadata. Used in the case of direct UpdateTable or CreateTable API calls.
      type: object
      properties:
        Dialect:
          $ref: "#/components/schemas/ViewDialect"
          description: The dialect of the query engine.
        DialectVersion:
          $ref: "#/components/schemas/ViewDialectVersionString"
          description: The version of the dialect of the query engine. For example, 3.0.0.
        ViewValidationText:
          $ref: "#/components/schemas/ViewTextString"
          description: The SELECT query that defines the view, as provided by the customer.
        UpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time of the last update.
        State:
          $ref: "#/components/schemas/ResourceState"
          description: The state of the validation.
        Error:
          $ref: "#/components/schemas/ErrorDetail"
          description: An error associated with the validation.
