openapi: 3.0.0
info:
  version: "2017-03-31"
  title: AWS Glue
  description: AWS Glue
  x-serviceName: glue
  x-serviceAlias: glue
  x-protocol: json
  x-apiVersion: "2017-03-31"
  x-endpointPrefix: glue
  x-targetPrefix: AWSGlue
  x-jsonVersion: "1.1"
servers:
  - url: https://glue.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for glue
paths:
  /BatchCreatePartition:
    post:
      operationId: BatchCreatePartition
      description: Creates one or more partitions in a batch operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchCreatePartition
            default: AWSGlue.BatchCreatePartition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the catalog in which the partition is to be created. Currently, this should be the Amazon Web Services account ID.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the metadata database in which the partition is to be created.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the metadata table in which the partition is to be created.
                PartitionInputList:
                  $ref: "#/components/schemas/PartitionInputList"
                  description: A list of PartitionInput structures that define the partitions to be created.
              required:
                - DatabaseName
                - TableName
                - PartitionInputList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreatePartitionResponse"
  /BatchDeleteConnection:
    post:
      operationId: BatchDeleteConnection
      description: Deletes a list of connection definitions from the Data Catalog.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchDeleteConnection
            default: AWSGlue.BatchDeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the Data Catalog in which the connections reside. If none is provided, the Amazon Web Services account ID is used by default.
                ConnectionNameList:
                  $ref: "#/components/schemas/DeleteConnectionNameList"
                  description: A list of names of the connections to delete.
              required:
                - ConnectionNameList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteConnectionResponse"
  /BatchDeletePartition:
    post:
      operationId: BatchDeletePartition
      description: Deletes one or more partitions in a batch operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchDeletePartition
            default: AWSGlue.BatchDeletePartition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the Data Catalog where the partition to be deleted resides. If none is provided, the Amazon Web Services account ID is used by default.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the catalog database in which the table in question resides.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the table that contains the partitions to be deleted.
                PartitionsToDelete:
                  $ref: "#/components/schemas/BatchDeletePartitionValueList"
                  description: A list of PartitionInput structures that define the partitions to be deleted.
              required:
                - DatabaseName
                - TableName
                - PartitionsToDelete
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeletePartitionResponse"
  /BatchDeleteTable:
    post:
      operationId: BatchDeleteTable
      description: Deletes multiple tables at once. After completing this operation, you no longer have access to the table versions and partitions that belong to the deleted table. Glue deletes these "orphaned" resources asynchronously in a timely manner, at the discretion of the service. To ensure the immediate deletion of all related resources, before calling BatchDeleteTable, use DeleteTableVersion or BatchDeleteTableVersion, and DeletePartition or BatchDeletePartition, to delete any resources that belong to the table.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchDeleteTable
            default: AWSGlue.BatchDeleteTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the Data Catalog where the table resides. If none is provided, the Amazon Web Services account ID is used by default.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the catalog database in which the tables to delete reside. For Hive compatibility, this name is entirely lowercase.
                TablesToDelete:
                  $ref: "#/components/schemas/BatchDeleteTableNameList"
                  description: A list of the table to delete.
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
                  description: The transaction ID at which to delete the table contents.
              required:
                - DatabaseName
                - TablesToDelete
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteTableResponse"
  /BatchDeleteTableVersion:
    post:
      operationId: BatchDeleteTableVersion
      description: Deletes a specified batch of versions of a table.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchDeleteTableVersion
            default: AWSGlue.BatchDeleteTableVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the Data Catalog where the tables reside. If none is provided, the Amazon Web Services account ID is used by default.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The database in the catalog in which the table resides. For Hive compatibility, this name is entirely lowercase.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the table. For Hive compatibility, this name is entirely lowercase.
                VersionIds:
                  $ref: "#/components/schemas/BatchDeleteTableVersionList"
                  description: A list of the IDs of versions to be deleted. A VersionId is a string representation of an integer. Each version is incremented by 1.
              required:
                - DatabaseName
                - TableName
                - VersionIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteTableVersionResponse"
  /BatchGetBlueprints:
    post:
      operationId: BatchGetBlueprints
      description: Retrieves information about a list of blueprints.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetBlueprints
            default: AWSGlue.BatchGetBlueprints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Names:
                  $ref: "#/components/schemas/BatchGetBlueprintNames"
                  description: A list of blueprint names.
                IncludeBlueprint:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Specifies whether or not to include the blueprint in the response.
                IncludeParameterSpec:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Specifies whether or not to include the parameters, as a JSON string, for the blueprint in the response.
              required:
                - Names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetBlueprintsResponse"
  /BatchGetCrawlers:
    post:
      operationId: BatchGetCrawlers
      description: Returns a list of resource metadata for a given list of crawler names. After calling the ListCrawlers operation, you can call this operation to access the data to which you have been granted permissions. This operation supports all IAM permissions, including permission conditions that uses tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetCrawlers
            default: AWSGlue.BatchGetCrawlers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CrawlerNames:
                  $ref: "#/components/schemas/CrawlerNameList"
                  description: A list of crawler names, which might be the names returned from the ListCrawlers operation.
              required:
                - CrawlerNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCrawlersResponse"
  /BatchGetCustomEntityTypes:
    post:
      operationId: BatchGetCustomEntityTypes
      description: Retrieves the details for the custom patterns specified by a list of names.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetCustomEntityTypes
            default: AWSGlue.BatchGetCustomEntityTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Names:
                  $ref: "#/components/schemas/CustomEntityTypeNames"
                  description: A list of names of the custom patterns that you want to retrieve.
              required:
                - Names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCustomEntityTypesResponse"
  /BatchGetDataQualityResult:
    post:
      operationId: BatchGetDataQualityResult
      description: Retrieves a list of data quality results for the specified result IDs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetDataQualityResult
            default: AWSGlue.BatchGetDataQualityResult
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResultIds:
                  $ref: "#/components/schemas/DataQualityResultIds"
                  description: A list of unique result IDs for the data quality results.
              required:
                - ResultIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDataQualityResultResponse"
  /BatchGetDevEndpoints:
    post:
      operationId: BatchGetDevEndpoints
      description: Returns a list of resource metadata for a given list of development endpoint names. After calling the ListDevEndpoints operation, you can call this operation to access the data to which you have been granted permissions. This operation supports all IAM permissions, including permission conditions that uses tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetDevEndpoints
            default: AWSGlue.BatchGetDevEndpoints
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DevEndpointNames:
                  $ref: "#/components/schemas/DevEndpointNames"
                  description: The list of DevEndpoint names, which might be the names returned from the ListDevEndpoint operation.
              required:
                - DevEndpointNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDevEndpointsResponse"
  /BatchGetJobs:
    post:
      operationId: BatchGetJobs
      description: Returns a list of resource metadata for a given list of job names. After calling the ListJobs operation, you can call this operation to access the data to which you have been granted permissions. This operation supports all IAM permissions, including permission conditions that uses tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetJobs
            default: AWSGlue.BatchGetJobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobNames:
                  $ref: "#/components/schemas/JobNameList"
                  description: A list of job names, which might be the names returned from the ListJobs operation.
              required:
                - JobNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetJobsResponse"
  /BatchGetPartition:
    post:
      operationId: BatchGetPartition
      description: Retrieves partitions in a batch request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetPartition
            default: AWSGlue.BatchGetPartition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the Data Catalog where the partitions in question reside. If none is supplied, the Amazon Web Services account ID is used by default.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the catalog database where the partitions reside.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the partitions' table.
                PartitionsToGet:
                  $ref: "#/components/schemas/BatchGetPartitionValueList"
                  description: A list of partition values identifying the partitions to retrieve.
                AuditContext:
                  $ref: "#/components/schemas/AuditContext"
                QuerySessionContext:
                  $ref: "#/components/schemas/QuerySessionContext"
              required:
                - DatabaseName
                - TableName
                - PartitionsToGet
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetPartitionResponse"
  /BatchGetTableOptimizer:
    post:
      operationId: BatchGetTableOptimizer
      description: Returns the configuration for the specified table optimizers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetTableOptimizer
            default: AWSGlue.BatchGetTableOptimizer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Entries:
                  $ref: "#/components/schemas/BatchGetTableOptimizerEntries"
                  description: A list of BatchGetTableOptimizerEntry objects specifying the table optimizers to retrieve.
              required:
                - Entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetTableOptimizerResponse"
  /BatchGetTriggers:
    post:
      operationId: BatchGetTriggers
      description: Returns a list of resource metadata for a given list of trigger names. After calling the ListTriggers operation, you can call this operation to access the data to which you have been granted permissions. This operation supports all IAM permissions, including permission conditions that uses tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetTriggers
            default: AWSGlue.BatchGetTriggers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TriggerNames:
                  $ref: "#/components/schemas/TriggerNameList"
                  description: A list of trigger names, which may be the names returned from the ListTriggers operation.
              required:
                - TriggerNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetTriggersResponse"
  /BatchGetWorkflows:
    post:
      operationId: BatchGetWorkflows
      description: Returns a list of resource metadata for a given list of workflow names. After calling the ListWorkflows operation, you can call this operation to access the data to which you have been granted permissions. This operation supports all IAM permissions, including permission conditions that uses tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchGetWorkflows
            default: AWSGlue.BatchGetWorkflows
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Names:
                  $ref: "#/components/schemas/WorkflowNames"
                  description: A list of workflow names, which may be the names returned from the ListWorkflows operation.
                IncludeGraph:
                  $ref: "#/components/schemas/NullableBoolean"
                  description: Specifies whether to include a graph when returning the workflow resource metadata.
              required:
                - Names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetWorkflowsResponse"
  /BatchPutDataQualityStatisticAnnotation:
    post:
      operationId: BatchPutDataQualityStatisticAnnotation
      description: Annotate datapoints over time for a specific data quality statistic. The API requires both profileID and statisticID as part of the InclusionAnnotation input. The API only works for a single statisticId across multiple profiles.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchPutDataQualityStatisticAnnotation
            default: AWSGlue.BatchPutDataQualityStatisticAnnotation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InclusionAnnotations:
                  $ref: "#/components/schemas/InclusionAnnotationList"
                  description: A list of DatapointInclusionAnnotation's. The InclusionAnnotations must contain a profileId and statisticId. If there are multiple InclusionAnnotations, the list must refer to a single statisticId across multiple profileIds.
                ClientToken:
                  $ref: "#/components/schemas/HashString"
                  description: Client Token.
              required:
                - InclusionAnnotations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutDataQualityStatisticAnnotationResponse"
  /BatchStopJobRun:
    post:
      operationId: BatchStopJobRun
      description: Stops one or more job runs for a specified job definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchStopJobRun
            default: AWSGlue.BatchStopJobRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the job definition for which to stop job runs.
                JobRunIds:
                  $ref: "#/components/schemas/BatchStopJobRunJobRunIdList"
                  description: A list of the JobRunIds that should be stopped for that job definition.
              required:
                - JobName
                - JobRunIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStopJobRunResponse"
  /BatchUpdatePartition:
    post:
      operationId: BatchUpdatePartition
      description: Updates one or more partitions in a batch operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.BatchUpdatePartition
            default: AWSGlue.BatchUpdatePartition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the catalog in which the partition is to be updated. Currently, this should be the Amazon Web Services account ID.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the metadata database in which the partition is to be updated.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the metadata table in which the partition is to be updated.
                Entries:
                  $ref: "#/components/schemas/BatchUpdatePartitionRequestEntryList"
                  description: A list of up to 100 BatchUpdatePartitionRequestEntry objects to update.
              required:
                - DatabaseName
                - TableName
                - Entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdatePartitionResponse"
  /CancelDataQualityRuleRecommendationRun:
    post:
      operationId: CancelDataQualityRuleRecommendationRun
      description: Cancels the specified recommendation run that was being used to generate rules.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.CancelDataQualityRuleRecommendationRun
            default: AWSGlue.CancelDataQualityRuleRecommendationRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RunId:
                  $ref: "#/components/schemas/HashString"
                  description: The unique run identifier associated with this run.
              required:
                - RunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDataQualityRuleRecommendationRunResponse"
  /CancelDataQualityRulesetEvaluationRun:
    post:
      operationId: CancelDataQualityRulesetEvaluationRun
      description: Cancels a run where a ruleset is being evaluated against a data source.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.CancelDataQualityRulesetEvaluationRun
            default: AWSGlue.CancelDataQualityRulesetEvaluationRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RunId:
                  $ref: "#/components/schemas/HashString"
                  description: The unique run identifier associated with this run.
              required:
                - RunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDataQualityRulesetEvaluationRunResponse"
  /CancelMLTaskRun:
    post:
      operationId: CancelMLTaskRun
      description: Cancels (stops) a task run. Machine learning task runs are asynchronous tasks that Glue runs on your behalf as part of various machine learning workflows. You can cancel a machine learning task run at any time by calling CancelMLTaskRun with a task run's parent transform's TransformID and the task run's TaskRunId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.CancelMLTaskRun
            default: AWSGlue.CancelMLTaskRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TransformId:
                  $ref: "#/components/schemas/HashString"
                  description: The unique identifier of the machine learning transform.
                TaskRunId:
                  $ref: "#/components/schemas/HashString"
                  description: A unique identifier for the task run.
              required:
                - TransformId
                - TaskRunId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMLTaskRunResponse"
  /CancelStatement:
    post:
      operationId: CancelStatement
      description: Cancels the statement.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.CancelStatement
            default: AWSGlue.CancelStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/NameString"
                  description: The Session ID of the statement to be cancelled.
                Id:
                  $ref: "#/components/schemas/IntegerValue"
                  description: The ID of the statement to be cancelled.
                RequestOrigin:
                  $ref: "#/components/schemas/OrchestrationNameString"
                  description: The origin of the request to cancel the statement.
              required:
                - SessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelStatementResponse"
  /CheckSchemaVersionValidity:
    post:
      operationId: CheckSchemaVersionValidity
      description: Validates the supplied schema. This call has no side effects, it simply validates using the supplied schema using DataFormat as the format. Since it does not take a schema set name, no compatibility checks are performed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
