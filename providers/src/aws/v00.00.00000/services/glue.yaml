  /SearchTables:
    post:
      operationId: SearchTables
      description: Searches a set of tables based on properties in the table metadata as well as on the parent database. You can search against text or filter conditions. You can only get tables that you have access to based on the security policies defined in Lake Formation. You need at least a read-only access to the table for it to be returned. If you do not have access to all the columns in the table, these columns will not be searched against when returning the list of tables back to you. If you have access to the columns but not the data in the columns, those columns and the associated metadata for those columns will be included in the search.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.SearchTables
            default: AWSGlue.SearchTables
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: A unique identifier, consisting of account_id .
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: A continuation token, included if this is a continuation call.
                Filters:
                  $ref: "#/components/schemas/SearchPropertyPredicates"
                  description: "A list of key-value pairs, and a comparator used to filter the search results. Returns all entities matching the predicate. The Comparator member of the PropertyPredicate struct is used only for time fields, and can be omitted for other field types. Also, when comparing string values, such as when Key=Name, a fuzzy match algorithm is used. The Key field (for example, the value of the Name field) is split on certain punctuation characters, for example, -, :, #, etc. into tokens. Then each token is exact-match compared with the Value member of PropertyPredicate. For example, if Key=Name and Value=link, tables named customer-link and xx-link-yy are returned, but xxlinkyy is not returned."
                SearchText:
                  $ref: "#/components/schemas/ValueString"
                  description: A string used for a text search. Specifying a value in quotes filters based on an exact match to the value.
                SortCriteria:
                  $ref: "#/components/schemas/SortCriteria"
                  description: A list of criteria for sorting the results by a field name, in an ascending or descending order.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of tables to return in a single response.
                ResourceShareType:
                  $ref: "#/components/schemas/ResourceShareType"
                  description: Allows you to specify that you want to search the tables shared with your account. The allowable values are FOREIGN or ALL. If set to FOREIGN, will search the tables shared with your account. If set to ALL, will search the tables shared with your account, as well as the tables in yor local account.
                IncludeStatusDetails:
                  $ref: "#/components/schemas/BooleanNullable"
                  description: Specifies whether to include status details related to a request to create or update an Glue Data Catalog view.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchTablesResponse"
