                  description: A map array of key-value pairs. Max is 75 pairs.
                Connections:
                  $ref: "#/components/schemas/ConnectionsList"
                  description: The number of connections to use for the session.
                MaxCapacity:
                  $ref: "#/components/schemas/NullableDouble"
                  description: The number of Glue data processing units (DPUs) that can be allocated when the job runs. A DPU is a relative measure of processing power that consists of 4 vCPUs of compute capacity and 16 GB memory.
                NumberOfWorkers:
                  $ref: "#/components/schemas/NullableInteger"
                  description: The number of workers of a defined WorkerType to use for the session.
                WorkerType:
                  $ref: "#/components/schemas/WorkerType"
                  description: "The type of predefined worker that is allocated when a job runs. Accepts a value of G.1X, G.2X, G.4X, or G.8X for Spark jobs. Accepts the value Z.2X for Ray notebooks. For the G.1X worker type, each worker maps to 1 DPU (4 vCPUs, 16 GB of memory) with 94GB disk, and provides 1 executor per worker. We recommend this worker type for workloads such as data transforms, joins, and queries, to offers a scalable and cost effective way to run most jobs. For the G.2X worker type, each worker maps to 2 DPU (8 vCPUs, 32 GB of memory) with 138GB disk, and provides 1 executor per worker. We recommend this worker type for workloads such as data transforms, joins, and queries, to offers a scalable and cost effective way to run most jobs. For the G.4X worker type, each worker maps to 4 DPU (16 vCPUs, 64 GB of memory) with 256GB disk, and provides 1 executor per worker. We recommend this worker type for jobs whose workloads contain your most demanding transforms, aggregations, joins, and queries. This worker type is available only for Glue version 3.0 or later Spark ETL jobs in the following Amazon Web Services Regions: US East (Ohio), US East (N. Virginia), US West (Oregon), Asia Pacific (Singapore), Asia Pacific (Sydney), Asia Pacific (Tokyo), Canada (Central), Europe (Frankfurt), Europe (Ireland), and Europe (Stockholm). For the G.8X worker type, each worker maps to 8 DPU (32 vCPUs, 128 GB of memory) with 512GB disk, and provides 1 executor per worker. We recommend this worker type for jobs whose workloads contain your most demanding transforms, aggregations, joins, and queries. This worker type is available only for Glue version 3.0 or later Spark ETL jobs, in the same Amazon Web Services Regions as supported for the G.4X worker type. For the Z.2X worker type, each worker maps to 2 M-DPU (8vCPUs, 64 GB of memory) with 128 GB disk, and provides up to 8 Ray workers based on the autoscaler."
                SecurityConfiguration:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the SecurityConfiguration structure to be used with the session
                GlueVersion:
                  $ref: "#/components/schemas/GlueVersionString"
                  description: The Glue version determines the versions of Apache Spark and Python that Glue supports. The GlueVersion must be greater than 2.0.
                Tags:
                  $ref: "#/components/schemas/TagsMap"
                  description: The map of key value pairs (tags) belonging to the session.
                RequestOrigin:
                  $ref: "#/components/schemas/OrchestrationNameString"
                  description: The origin of the request.
              required:
                - Role
                - Command
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
