          description: Specifies where this property should be included in REST requests, such as in headers, query parameters, or request body.
      required:
        - Name
        - Description
        - Required
        - PropertyTypes
    PropertyName:
      type: string
      minLength: 1
      maxLength: 128
    PropertyDescriptionString:
      type: string
      minLength: 0
      maxLength: 1024
    Bool:
      type: boolean
    String:
      type: string
    PropertyTypes:
      type: array
      items:
        $ref: "#/components/schemas/PropertyType"
    PropertyType:
      type: string
