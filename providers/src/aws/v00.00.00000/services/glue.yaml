          description: The name of the partition index.
        Keys:
          $ref: "#/components/schemas/KeySchemaElementList"
          description: A list of one or more keys, as KeySchemaElement structures, for the partition index.
        IndexStatus:
          $ref: "#/components/schemas/PartitionIndexStatus"
          description: "The status of the partition index. The possible statuses are: CREATING: The index is being created. When an index is in a CREATING state, the index or its table cannot be deleted. ACTIVE: The index creation succeeds. FAILED: The index creation fails. DELETING: The index is deleted from the list of indexes."
        BackfillErrors:
          $ref: "#/components/schemas/BackfillErrors"
          description: A list of errors that can occur when registering partition indexes for an existing table.
      required:
        - IndexName
        - Keys
        - IndexStatus
    KeySchemaElementList:
      type: array
      items:
        $ref: "#/components/schemas/KeySchemaElement"
    KeySchemaElement:
      description: A partition key pair consisting of a name and a type.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of a partition key.
        Type:
          $ref: "#/components/schemas/ColumnTypeString"
          description: The type of a partition key.
      required:
