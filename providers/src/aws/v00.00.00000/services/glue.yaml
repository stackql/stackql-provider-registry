  /RegisterConnectionType:
    post:
      operationId: RegisterConnectionType
      description: Registers a custom connection type in Glue based on the configuration provided. This operation enables customers to configure custom connectors for any data source with REST-based APIs, eliminating the need for building custom Lambda connectors. The registered connection type stores details about how requests and responses are interpreted by REST sources, including connection properties, authentication configuration, and REST configuration with entity definitions. Once registered, customers can create connections using this connection type and work with them the same way as natively supported Glue connectors. Supports multiple authentication types including Basic, OAuth2 (Client Credentials, JWT Bearer, Authorization Code), and Custom Auth configurations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.RegisterConnectionType
            default: AWSGlue.RegisterConnectionType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectionType:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the connection type. Must be between 1 and 255 characters and must be prefixed with "REST-" to indicate it is a REST-based connector.
                IntegrationType:
                  $ref: "#/components/schemas/IntegrationType"
                  description: The integration type for the connection. Currently only "REST" protocol is supported.
                Description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the connection type. Can be up to 2048 characters and provides details about the purpose and functionality of the connection type.
                ConnectionProperties:
                  $ref: "#/components/schemas/ConnectionPropertiesConfiguration"
                  description: Defines the base URL and additional request parameters needed during connection creation for this connection type.
                ConnectorAuthenticationConfiguration:
                  $ref: "#/components/schemas/ConnectorAuthenticationConfiguration"
                  description: Defines the supported authentication types and required properties for this connection type, including Basic, OAuth2, and Custom authentication methods.
                RestConfiguration:
                  $ref: "#/components/schemas/RestConfiguration"
                  description: Defines the HTTP request and response configuration, validation endpoint, and entity configurations for REST API interactions.
                Tags:
                  $ref: "#/components/schemas/TagsMap"
                  description: The tags you assign to the connection type.
              required:
                - ConnectionType
                - IntegrationType
                - ConnectionProperties
                - ConnectorAuthenticationConfiguration
                - RestConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterConnectionTypeResponse"
  /RegisterSchemaVersion:
    post:
      operationId: RegisterSchemaVersion
      description: Adds a new version to the existing schema. Returns an error if new version of schema does not meet the compatibility requirements of the schema set. This API will not create a new schema set and will return a 404 error if the schema set is not already present in the Schema Registry. If this is the first schema definition to be registered in the Schema Registry, this API will store the schema version and return immediately. Otherwise, this call has the potential to run longer than other operations due to compatibility modes. You can call the GetSchemaVersion API with the SchemaVersionId to check compatibility modes. If the same schema definition is already stored in Schema Registry as a version, the schema ID of the existing schema is returned to the caller.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.RegisterSchemaVersion
            default: AWSGlue.RegisterSchemaVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SchemaId:
                  $ref: "#/components/schemas/SchemaId"
                  description: "This is a wrapper structure to contain schema identity fields. The structure contains: SchemaId$SchemaArn: The Amazon Resource Name (ARN) of the schema. Either SchemaArn or SchemaName and RegistryName has to be provided. SchemaId$SchemaName: The name of the schema. Either SchemaArn or SchemaName and RegistryName has to be provided."
                SchemaDefinition:
                  $ref: "#/components/schemas/SchemaDefinitionString"
                  description: The schema definition using the DataFormat setting for the SchemaName.
              required:
                - SchemaId
                - SchemaDefinition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSchemaVersionResponse"
