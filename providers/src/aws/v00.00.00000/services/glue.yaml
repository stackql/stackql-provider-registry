                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the table to generate statistics.
                ColumnNameList:
                  $ref: "#/components/schemas/ColumnNameList"
                  description: A list of the column names to generate statistics. If none is supplied, all column names for the table will be used by default.
                Role:
                  $ref: "#/components/schemas/NameString"
                  description: The IAM role that the service assumes to generate statistics.
                SampleSize:
                  $ref: "#/components/schemas/SampleSizePercentage"
                  description: The percentage of rows used to generate statistics. If none is supplied, the entire table will be used to generate stats.
                CatalogID:
                  $ref: "#/components/schemas/NameString"
                  description: The ID of the Data Catalog where the table reside. If none is supplied, the Amazon Web Services account ID is used by default.
                SecurityConfiguration:
                  $ref: "#/components/schemas/NameString"
                  description: Name of the security configuration that is used to encrypt CloudWatch logs for the column stats task run.
              required:
                - DatabaseName
                - TableName
                - Role
