          $ref: "#/components/schemas/GlueResourceArn"
          description: The Amazon Resource Name (ARN) of the schema.
        SchemaName:
          $ref: "#/components/schemas/SchemaRegistryNameString"
          description: The name of the schema.
        RegistryName:
          $ref: "#/components/schemas/SchemaRegistryNameString"
          description: The name of the registry that contains the schema.
    UpdateSourceControlFromJobResponse:
      type: object
      properties:
        JobName:
          $ref: "#/components/schemas/NameString"
          description: The name of the Glue job.
    ViewUpdateAction:
      type: string
      enum:
        - ADD
        - REPLACE
        - ADD_OR_REPLACE
        - DROP
    UpdateOpenTableFormatInput:
      description: Input parameters for updating open table format tables in GlueData Catalog, serving as a wrapper for format-specific update operations such as Apache Iceberg.
      type: object
      properties:
        UpdateIcebergInput:
          $ref: "#/components/schemas/UpdateIcebergInput"
          description: Apache Iceberg-specific update parameters that define the table modifications to be applied, including schema changes, partition specifications, and table properties.
    UpdateIcebergInput:
      description: Input parameters specific to updating Apache Iceberg tables in Glue Data Catalog, containing the update operations to be applied to an existing Iceberg table.
      type: object
      properties:
        UpdateIcebergTableInput:
          $ref: "#/components/schemas/UpdateIcebergTableInput"
          description: The specific update operations to be applied to the Iceberg table, containing a list of updates that define the new state of the table including schema, partitions, and properties.
      required:
        - UpdateIcebergTableInput
    UpdateIcebergTableInput:
      description: Contains the update operations to be applied to an existing Iceberg table inGlue Data Catalog, defining the new state of the table metadata.
      type: object
      properties:
        Updates:
          $ref: "#/components/schemas/IcebergTableUpdateList"
          description: The list of table update operations that specify the changes to be made to the Iceberg table, including schema modifications, partition specifications, and table properties.
      required:
        - Updates
    IcebergTableUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/IcebergTableUpdate"
    IcebergTableUpdate:
      description: Defines a complete set of updates to be applied to an Iceberg table, including schema changes, partitioning modifications, sort order adjustments, location updates, and property changes.
      type: object
      properties:
        Schema:
          $ref: "#/components/schemas/IcebergSchema"
          description: The updated schema definition for the Iceberg table, specifying any changes to field structure, data types, or schema metadata.
        PartitionSpec:
          $ref: "#/components/schemas/IcebergPartitionSpec"
          description: The updated partitioning specification that defines how the table data should be reorganized and partitioned.
        SortOrder:
          $ref: "#/components/schemas/IcebergSortOrder"
          description: The updated sort order specification that defines how data should be ordered within partitions for optimal query performance.
        Location:
          $ref: "#/components/schemas/LocationString"
          description: The updated S3 location where the Iceberg table data will be stored.
        Properties:
          type: object
          properties: {}
          description: Updated key-value pairs of table properties and configuration settings for the Iceberg table.
        Action:
          $ref: "#/components/schemas/IcebergUpdateAction"
          description: The type of update action to be performed on the Iceberg table. Defines the specific operation such as adding schema, setting current schema, adding partition spec, or managing encryption keys.
        EncryptionKey:
          $ref: "#/components/schemas/IcebergEncryptedKey"
          description: Encryption key information associated with an Iceberg table update operation. Used when adding or removing encryption keys from the table metadata during table evolution.
        KeyId:
          $ref: "#/components/schemas/EncryptionKeyIdString"
          description: Identifier of the encryption key involved in an Iceberg table update operation. References the specific key being added to or removed from the table's encryption configuration.
      required:
        - Schema
        - Location
    IcebergUpdateAction:
      type: string
      enum:
        - add-schema
        - set-current-schema
        - add-spec
        - set-default-spec
        - add-sort-order
        - set-default-sort-order
        - set-location
        - set-properties
        - remove-properties
        - add-encryption-key
        - remove-encryption-key
    IcebergEncryptedKey:
      description: Encryption key structure used for Iceberg table encryption. Contains the key ID, encrypted key metadata, optional reference to the encrypting key, and additional properties for the table's encryption scheme.
      type: object
      properties:
        KeyId:
          $ref: "#/components/schemas/EncryptionKeyIdString"
          description: Unique identifier of the encryption key used for Iceberg table encryption. This ID is used to reference the key in table metadata and track which key was used to encrypt specific data.
        EncryptedKeyMetadata:
          $ref: "#/components/schemas/EncryptedKeyMetadataString"
          description: Encrypted key and metadata, base64 encoded. The format of encrypted key metadata is determined by the table's encryption scheme and can be a wrapped format specific to the table's KMS provider.
        EncryptedById:
          $ref: "#/components/schemas/EncryptionKeyIdString"
          description: Optional ID of the key used to encrypt or wrap the key metadata in Iceberg table encryption. This field references another encryption key that was used to encrypt the current key's metadata.
        Properties:
          type: object
          properties: {}
          description: A string to string map of additional metadata used by the table's encryption scheme. These properties provide additional context and configuration for the encryption key implementation.
      required:
        - KeyId
        - EncryptedKeyMetadata
    EncryptionKeyIdString:
      type: string
      maxLength: 2056
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    EncryptedKeyMetadataString:
      type: string
      maxLength: 2056
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    UpdateTableResponse:
      type: object
    UpdateTableOptimizerResponse:
      type: object
    TriggerUpdate:
      description: A structure used to provide information used to update a trigger. This object updates the previous trigger definition by overwriting it completely.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: Reserved for future use.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: A description of this trigger.
        Schedule:
          $ref: "#/components/schemas/GenericString"
          description: "A cron expression used to specify the schedule (see Time-Based Schedules for Jobs and Crawlers. For example, to run something every day at 12:15 UTC, you would specify: cron(15 12 * * ? *)."
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: The actions initiated by this trigger.
        Predicate:
          $ref: "#/components/schemas/Predicate"
          description: The predicate of this trigger, which defines when it will fire.
        EventBatchingCondition:
          $ref: "#/components/schemas/EventBatchingCondition"
          description: Batch condition that must be met (specified number of events received or batch time window expired) before EventBridge event trigger fires.
    UpdateTriggerResponse:
      type: object
      properties:
        Trigger:
          $ref: "#/components/schemas/Trigger"
          description: The resulting trigger definition.
    UpdateUsageProfileResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the usage profile that was updated.
    UpdateUserDefinedFunctionResponse:
      type: object
    UpdateWorkflowResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the workflow which was specified in input.
