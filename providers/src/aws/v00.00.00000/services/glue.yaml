        - USER_INPUT
        - SECRET
        - READ_ONLY
        - UNUSED
        - SECRET_OR_USER_INPUT
    AllowedValues:
      type: array
      items:
        $ref: "#/components/schemas/AllowedValue"
    AllowedValue:
      description: An object representing a value allowed for a property.
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/AllowedValueDescriptionString"
          description: A description of the allowed value.
        Value:
          $ref: "#/components/schemas/AllowedValueValueString"
