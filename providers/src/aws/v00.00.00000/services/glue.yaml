        - IntegrationArn
        - Status
        - CreateTime
    GetBlueprintResponse:
      type: object
      properties:
        Blueprint:
          $ref: "#/components/schemas/Blueprint"
          description: Returns a Blueprint object.
    GetBlueprintRunResponse:
      type: object
      properties:
        BlueprintRun:
          $ref: "#/components/schemas/BlueprintRun"
          description: Returns a BlueprintRun object.
    BlueprintRun:
      description: The details of a blueprint run.
      type: object
      properties:
        BlueprintName:
          $ref: "#/components/schemas/OrchestrationNameString"
          description: The name of the blueprint.
        RunId:
          $ref: "#/components/schemas/IdString"
          description: The run ID for this blueprint run.
        WorkflowName:
          $ref: "#/components/schemas/NameString"
          description: The name of a workflow that is created as a result of a successful blueprint run. If a blueprint run has an error, there will not be a workflow created.
        State:
          $ref: "#/components/schemas/BlueprintRunState"
          description: "The state of the blueprint run. Possible values are: Running — The blueprint run is in progress. Succeeded — The blueprint run completed successfully. Failed — The blueprint run failed and rollback is complete. Rolling Back — The blueprint run failed and rollback is in progress."
        StartedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time that the blueprint run started.
        CompletedOn:
          $ref: "#/components/schemas/TimestampValue"
          description: The date and time that the blueprint run completed.
        ErrorMessage:
          $ref: "#/components/schemas/MessageString"
          description: Indicates any errors that are seen while running the blueprint.
        RollbackErrorMessage:
          $ref: "#/components/schemas/MessageString"
          description: If there are any errors while creating the entities of a workflow, we try to roll back the created entities until that point and delete them. This attribute indicates the errors seen while trying to delete the entities that are created.
        Parameters:
          $ref: "#/components/schemas/BlueprintParameters"
          description: The blueprint parameters as a string. You will have to provide a value for each key that is required from the parameter spec that is defined in the Blueprint$ParameterSpec.
        RoleArn:
          $ref: "#/components/schemas/OrchestrationIAMRoleArn"
          description: The role ARN. This role will be assumed by the Glue service and will be used to create the workflow and other entities of a workflow.
    BlueprintRunState:
      type: string
      enum:
        - RUNNING
        - SUCCEEDED
        - FAILED
        - ROLLING_BACK
    BlueprintParameters:
      type: string
      minLength: 1
      maxLength: 131072
    OrchestrationIAMRoleArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:aws[^:]*:iam::[0-9]*:role/.+
    PageSize:
      type: integer
      minimum: 1
      maximum: 1000
    GetBlueprintRunsResponse:
      type: object
      properties:
        BlueprintRuns:
          $ref: "#/components/schemas/BlueprintRuns"
          description: Returns a list of BlueprintRun objects.
        NextToken:
          $ref: "#/components/schemas/GenericString"
          description: A continuation token, if not all blueprint runs have been returned.
    BlueprintRuns:
      type: array
      items:
        $ref: "#/components/schemas/BlueprintRun"
    GetCatalogResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: A Catalog object. The definition of the specified catalog in the Glue Data Catalog.
    Catalog:
      description: The catalog object represents a logical grouping of databases in the Glue Data Catalog or a federated source. You can now create a Redshift-federated catalog or a catalog containing resource links to Redshift databases in another account or region.
      type: object
      properties:
        CatalogId:
          $ref: "#/components/schemas/CatalogIdString"
          description: The ID of the catalog. To grant access to the default catalog, this field should not be provided.
        Name:
          $ref: "#/components/schemas/CatalogNameString"
          description: The name of the catalog. Cannot be the same as the account ID.
        ResourceArn:
          $ref: "#/components/schemas/ResourceArnString"
          description: The Amazon Resource Name (ARN) assigned to the catalog resource.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: Description string, not more than 2048 bytes long, matching the URI address multi-line string pattern. A description of the catalog.
        Parameters:
          type: object
          properties: {}
          description: A map array of key-value pairs that define parameters and properties of the catalog.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the catalog was created.
        UpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the catalog was last updated.
        TargetRedshiftCatalog:
          $ref: "#/components/schemas/TargetRedshiftCatalog"
          description: A TargetRedshiftCatalog object that describes a target catalog for database resource linking.
        FederatedCatalog:
          $ref: "#/components/schemas/FederatedCatalog"
          description: A FederatedCatalog object that points to an entity outside the Glue Data Catalog.
        CatalogProperties:
          $ref: "#/components/schemas/CatalogPropertiesOutput"
          description: A CatalogProperties object that specifies data lake access properties and other custom properties.
        CreateTableDefaultPermissions:
          $ref: "#/components/schemas/PrincipalPermissionsList"
          description: An array of PrincipalPermissions objects. Creates a set of default permissions on the table(s) for principals. Used by Amazon Web Services Lake Formation. Not used in the normal course of Glue operations.
        CreateDatabaseDefaultPermissions:
          $ref: "#/components/schemas/PrincipalPermissionsList"
          description: An array of PrincipalPermissions objects. Creates a set of default permissions on the database(s) for principals. Used by Amazon Web Services Lake Formation. Not used in the normal course of Glue operations.
        AllowFullTableExternalDataAccess:
          $ref: "#/components/schemas/AllowFullTableExternalDataAccessEnum"
          description: Allows third-party engines to access data in Amazon S3 locations that are registered with Lake Formation.
      required:
        - Name
    CatalogPropertiesOutput:
      description: Property attributes that include configuration properties for the catalog resource.
      type: object
      properties:
        DataLakeAccessProperties:
          $ref: "#/components/schemas/DataLakeAccessPropertiesOutput"
          description: A DataLakeAccessProperties object with input properties to configure data lake access for your catalog resource in the Glue Data Catalog.
        IcebergOptimizationProperties:
          $ref: "#/components/schemas/IcebergOptimizationPropertiesOutput"
          description: An IcebergOptimizationPropertiesOutput object that specifies Iceberg table optimization settings for the catalog, including configurations for compaction, retention, and orphan file deletion operations.
        CustomProperties:
          type: object
          properties: {}
          description: Additional key-value properties for the catalog, such as column statistics optimizations.
    DataLakeAccessPropertiesOutput:
      description: The output properties of the data lake access configuration for your catalog resource in the Glue Data Catalog.
      type: object
      properties:
        DataLakeAccess:
          $ref: "#/components/schemas/Boolean"
          description: Turns on or off data lake access for Apache Spark applications that access Amazon Redshift databases in the Data Catalog.
        DataTransferRole:
          $ref: "#/components/schemas/IAMRoleArn"
          description: A role that will be assumed by Glue for transferring data into/out of the staging bucket during a query.
        KmsKey:
          $ref: "#/components/schemas/ResourceArnString"
          description: An encryption key that will be used for the staging bucket that will be created along with the catalog.
        ManagedWorkgroupName:
          $ref: "#/components/schemas/NameString"
          description: The managed Redshift Serverless compute name that is created for your catalog resource.
        ManagedWorkgroupStatus:
          $ref: "#/components/schemas/NameString"
          description: The managed Redshift Serverless compute status.
        RedshiftDatabaseName:
          $ref: "#/components/schemas/NameString"
          description: The default Redshift database resource name in the managed compute.
        StatusMessage:
          $ref: "#/components/schemas/NameString"
          description: A message that gives more detailed information about the managed workgroup status.
        CatalogType:
          $ref: "#/components/schemas/NameString"
          description: Specifies a federated catalog type for the native catalog resource. The currently supported type is aws:redshift.
    IcebergOptimizationPropertiesOutput:
      description: A structure that contains the output properties of Iceberg table optimization configuration for your catalog resource in the Glue Data Catalog.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that is used to perform Iceberg table optimization operations.
        Compaction:
          type: object
          properties: {}
          description: A map of key-value pairs that specify configuration parameters for Iceberg table compaction operations, which optimize the layout of data files to improve query performance.
        Retention:
          type: object
          properties: {}
          description: A map of key-value pairs that specify configuration parameters for Iceberg table retention operations, which manage the lifecycle of table snapshots to control storage costs.
        OrphanFileDeletion:
          type: object
          properties: {}
          description: A map of key-value pairs that specify configuration parameters for Iceberg orphan file deletion operations, which identify and remove files that are no longer referenced by the table metadata.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the Iceberg optimization properties were last updated.
    GetCatalogImportStatusResponse:
      type: object
      properties:
        ImportStatus:
          $ref: "#/components/schemas/CatalogImportStatus"
          description: The status of the specified catalog migration.
    CatalogImportStatus:
      description: A structure containing migration status information.
      type: object
      properties:
        ImportCompleted:
          $ref: "#/components/schemas/Boolean"
          description: True if the migration has completed, or False otherwise.
        ImportTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the migration was started.
        ImportedBy:
          $ref: "#/components/schemas/NameString"
          description: The name of the person who initiated the migration.
    Token:
      type: string
    GetCatalogsResponse:
      type: object
      properties:
        CatalogList:
          $ref: "#/components/schemas/CatalogList"
          description: An array of Catalog objects. A list of Catalog objects from the specified parent catalog.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: A continuation token for paginating the returned list of tokens, returned if the current segment of the list is not the last.
      required:
        - CatalogList
    CatalogList:
      type: array
      items:
        $ref: "#/components/schemas/Catalog"
    GetClassifierResponse:
      type: object
      properties:
        Classifier:
          $ref: "#/components/schemas/Classifier"
          description: The requested classifier.
    Classifier:
      description: Classifiers are triggered during a crawl task. A classifier checks whether a given file is in a format it can handle. If it is, the classifier creates a schema in the form of a StructType object that matches that data format. You can use the standard classifiers that Glue provides, or you can write your own classifiers to best categorize your data sources and specify the appropriate schemas to use for them. A classifier can be a grok classifier, an XML classifier, a JSON classifier, or a custom CSV classifier, as specified in one of the fields in the Classifier object.
      type: object
      properties:
        GrokClassifier:
          $ref: "#/components/schemas/GrokClassifier"
          description: A classifier that uses grok.
        XMLClassifier:
          $ref: "#/components/schemas/XMLClassifier"
          description: A classifier for XML content.
        JsonClassifier:
          $ref: "#/components/schemas/JsonClassifier"
          description: A classifier for JSON content.
        CsvClassifier:
          $ref: "#/components/schemas/CsvClassifier"
          description: A classifier for comma-separated values (CSV).
    GrokClassifier:
      description: A classifier that uses grok patterns.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        Classification:
          $ref: "#/components/schemas/Classification"
          description: An identifier of the data format that the classifier matches, such as Twitter, JSON, Omniture logs, and so on.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was registered.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was last updated.
        Version:
          $ref: "#/components/schemas/VersionId"
          description: The version of this classifier.
        GrokPattern:
          $ref: "#/components/schemas/GrokPattern"
          description: The grok pattern applied to a data store by this classifier. For more information, see built-in patterns in Writing Custom Classifiers.
        CustomPatterns:
          $ref: "#/components/schemas/CustomPatterns"
          description: Optional custom grok patterns defined by this classifier. For more information, see custom patterns in Writing Custom Classifiers.
      required:
        - Name
        - Classification
        - GrokPattern
    XMLClassifier:
      description: A classifier for XML content.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        Classification:
          $ref: "#/components/schemas/Classification"
          description: An identifier of the data format that the classifier matches.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was registered.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was last updated.
        Version:
          $ref: "#/components/schemas/VersionId"
          description: The version of this classifier.
        RowTag:
          $ref: "#/components/schemas/RowTag"
          description: The XML tag designating the element that contains each record in an XML document being parsed. This can't identify a self-closing element (closed by />). An empty row element that contains only attributes can be parsed as long as it ends with a closing tag (for example, <row item_a="A" item_b="B"></row> is okay, but <row item_a="A" item_b="B" /> is not).
      required:
        - Name
        - Classification
    JsonClassifier:
      description: A classifier for JSON content.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was registered.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was last updated.
        Version:
          $ref: "#/components/schemas/VersionId"
          description: The version of this classifier.
        JsonPath:
          $ref: "#/components/schemas/JsonPath"
          description: A JsonPath string defining the JSON data for the classifier to classify. Glue supports a subset of JsonPath, as described in Writing JsonPath Custom Classifiers.
      required:
        - Name
        - JsonPath
    CsvClassifier:
      description: A classifier for custom CSV content.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the classifier.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was registered.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this classifier was last updated.
        Version:
          $ref: "#/components/schemas/VersionId"
          description: The version of this classifier.
        Delimiter:
          $ref: "#/components/schemas/CsvColumnDelimiter"
          description: A custom symbol to denote what separates each column entry in the row.
        QuoteSymbol:
          $ref: "#/components/schemas/CsvQuoteSymbol"
          description: A custom symbol to denote what combines content into a single column value. It must be different from the column delimiter.
        ContainsHeader:
          $ref: "#/components/schemas/CsvHeaderOption"
          description: Indicates whether the CSV file contains a header.
        Header:
          $ref: "#/components/schemas/CsvHeader"
          description: A list of strings representing column names.
        DisableValueTrimming:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies not to trim values before identifying the type of column values. The default value is true.
        AllowSingleColumn:
          $ref: "#/components/schemas/NullableBoolean"
          description: Enables the processing of files that contain only one column.
        CustomDatatypeConfigured:
          $ref: "#/components/schemas/NullableBoolean"
          description: Enables the custom datatype to be configured.
        CustomDatatypes:
          $ref: "#/components/schemas/CustomDatatypes"
          description: A list of custom datatypes including "BINARY", "BOOLEAN", "DATE", "DECIMAL", "DOUBLE", "FLOAT", "INT", "LONG", "SHORT", "STRING", "TIMESTAMP".
        Serde:
          $ref: "#/components/schemas/CsvSerdeOption"
          description: Sets the SerDe for processing CSV in the classifier, which will be applied in the Data Catalog. Valid values are OpenCSVSerDe, LazySimpleSerDe, and None. You can specify the None value when you want the crawler to do the detection.
      required:
        - Name
    GetClassifiersResponse:
      type: object
      properties:
        Classifiers:
          $ref: "#/components/schemas/ClassifierList"
          description: The requested list of classifier objects.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: A continuation token.
    ClassifierList:
      type: array
      items:
        $ref: "#/components/schemas/Classifier"
    GetColumnNamesList:
      type: array
      items:
        $ref: "#/components/schemas/NameString"
    GetColumnStatisticsForPartitionResponse:
      type: object
      properties:
        ColumnStatisticsList:
          $ref: "#/components/schemas/ColumnStatisticsList"
          description: List of ColumnStatistics that failed to be retrieved.
        Errors:
          $ref: "#/components/schemas/ColumnErrors"
          description: Error occurred during retrieving column statistics data.
    ColumnStatisticsList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnStatistics"
    ColumnStatistics:
      description: Represents the generated column-level statistics for a table or partition.
      type: object
      properties:
        ColumnName:
          $ref: "#/components/schemas/NameString"
          description: Name of column which statistics belong to.
        ColumnType:
          $ref: "#/components/schemas/TypeString"
          description: The data type of the column.
        AnalyzedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when column statistics were generated.
        StatisticsData:
          $ref: "#/components/schemas/ColumnStatisticsData"
          description: A ColumnStatisticData object that contains the statistics data values.
      required:
        - ColumnName
        - ColumnType
        - AnalyzedTime
        - StatisticsData
    TypeString:
      type: string
      minLength: 0
      maxLength: 20000
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\t]*"
    ColumnStatisticsData:
      description: Contains the individual types of column statistics data. Only one data object should be set and indicated by the Type attribute.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ColumnStatisticsType"
          description: The type of column statistics data.
        BooleanColumnStatisticsData:
          $ref: "#/components/schemas/BooleanColumnStatisticsData"
          description: Boolean column statistics data.
        DateColumnStatisticsData:
          $ref: "#/components/schemas/DateColumnStatisticsData"
          description: Date column statistics data.
        DecimalColumnStatisticsData:
          $ref: "#/components/schemas/DecimalColumnStatisticsData"
          description: Decimal column statistics data. UnscaledValues within are Base64-encoded binary objects storing big-endian, two's complement representations of the decimal's unscaled value.
        DoubleColumnStatisticsData:
          $ref: "#/components/schemas/DoubleColumnStatisticsData"
          description: Double column statistics data.
        LongColumnStatisticsData:
          $ref: "#/components/schemas/LongColumnStatisticsData"
          description: Long column statistics data.
        StringColumnStatisticsData:
          $ref: "#/components/schemas/StringColumnStatisticsData"
          description: String column statistics data.
        BinaryColumnStatisticsData:
          $ref: "#/components/schemas/BinaryColumnStatisticsData"
          description: Binary column statistics data.
      required:
        - Type
    ColumnStatisticsType:
      type: string
      enum:
        - BOOLEAN
        - DATE
        - DECIMAL
        - DOUBLE
        - LONG
        - STRING
        - BINARY
    BooleanColumnStatisticsData:
      description: Defines column statistics supported for Boolean data columns.
      type: object
      properties:
        NumberOfTrues:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of true values in the column.
        NumberOfFalses:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of false values in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
      required:
        - NumberOfTrues
        - NumberOfFalses
        - NumberOfNulls
    NonNegativeLong:
      type: integer
      format: int64
      minimum: 0
    DateColumnStatisticsData:
      description: Defines column statistics supported for timestamp data columns.
      type: object
      properties:
        MinimumValue:
          $ref: "#/components/schemas/Timestamp"
          description: The lowest value in the column.
        MaximumValue:
          $ref: "#/components/schemas/Timestamp"
          description: The highest value in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
        NumberOfDistinctValues:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of distinct values in a column.
      required:
        - NumberOfNulls
        - NumberOfDistinctValues
    DecimalColumnStatisticsData:
      description: Defines column statistics supported for fixed-point number data columns.
      type: object
      properties:
        MinimumValue:
          $ref: "#/components/schemas/DecimalNumber"
          description: The lowest value in the column.
        MaximumValue:
          $ref: "#/components/schemas/DecimalNumber"
          description: The highest value in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
        NumberOfDistinctValues:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of distinct values in a column.
      required:
        - NumberOfNulls
        - NumberOfDistinctValues
    DecimalNumber:
      description: Contains a numeric value in decimal format.
      type: object
      properties:
        UnscaledValue:
          $ref: "#/components/schemas/Blob"
          description: The unscaled numeric value.
        Scale:
          $ref: "#/components/schemas/Integer"
          description: The scale that determines where the decimal point falls in the unscaled value.
      required:
        - UnscaledValue
        - Scale
    Blob:
      type: string
      format: byte
    DoubleColumnStatisticsData:
      description: Defines column statistics supported for floating-point number data columns.
      type: object
      properties:
        MinimumValue:
          $ref: "#/components/schemas/Double"
          description: The lowest value in the column.
        MaximumValue:
          $ref: "#/components/schemas/Double"
          description: The highest value in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
        NumberOfDistinctValues:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of distinct values in a column.
      required:
        - NumberOfNulls
        - NumberOfDistinctValues
    Double:
      type: number
      format: double
    LongColumnStatisticsData:
      description: Defines column statistics supported for integer data columns.
      type: object
      properties:
        MinimumValue:
          $ref: "#/components/schemas/Long"
          description: The lowest value in the column.
        MaximumValue:
          $ref: "#/components/schemas/Long"
          description: The highest value in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
        NumberOfDistinctValues:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of distinct values in a column.
      required:
        - NumberOfNulls
        - NumberOfDistinctValues
    Long:
      type: integer
      format: int64
    StringColumnStatisticsData:
      description: Defines column statistics supported for character sequence data values.
      type: object
      properties:
        MaximumLength:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The size of the longest string in the column.
        AverageLength:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The average string length in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
        NumberOfDistinctValues:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of distinct values in a column.
      required:
        - MaximumLength
        - AverageLength
        - NumberOfNulls
        - NumberOfDistinctValues
    NonNegativeDouble:
      type: number
      format: double
      minimum: 0
    BinaryColumnStatisticsData:
      description: Defines column statistics supported for bit sequence data values.
      type: object
      properties:
        MaximumLength:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The size of the longest bit sequence in the column.
        AverageLength:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The average bit sequence length in the column.
        NumberOfNulls:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of null values in the column.
      required:
        - MaximumLength
        - AverageLength
        - NumberOfNulls
    ColumnErrors:
      type: array
      items:
        $ref: "#/components/schemas/ColumnError"
    ColumnError:
      description: Encapsulates a column name that failed and the reason for failure.
      type: object
      properties:
        ColumnName:
          $ref: "#/components/schemas/NameString"
          description: The name of the column that failed.
        Error:
          $ref: "#/components/schemas/ErrorDetail"
          description: An error message with the reason for the failure of an operation.
    GetColumnStatisticsForTableResponse:
      type: object
      properties:
        ColumnStatisticsList:
          $ref: "#/components/schemas/ColumnStatisticsList"
          description: List of ColumnStatistics.
        Errors:
          $ref: "#/components/schemas/ColumnErrors"
          description: List of ColumnStatistics that failed to be retrieved.
    GetColumnStatisticsTaskRunResponse:
      type: object
      properties:
        ColumnStatisticsTaskRun:
          $ref: "#/components/schemas/ColumnStatisticsTaskRun"
          description: A ColumnStatisticsTaskRun object representing the details of the column stats run.
    ColumnStatisticsTaskRun:
      description: The object that shows the details of the column stats run.
      type: object
      properties:
        CustomerId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID.
        ColumnStatisticsTaskRunId:
          $ref: "#/components/schemas/HashString"
          description: The identifier for the particular column statistics task run.
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The database where the table resides.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table for which column statistics is generated.
        ColumnNameList:
          $ref: "#/components/schemas/ColumnNameList"
          description: A list of the column names. If none is supplied, all column names for the table will be used by default.
        CatalogID:
          $ref: "#/components/schemas/CatalogIdString"
          description: The ID of the Data Catalog where the table resides. If none is supplied, the Amazon Web Services account ID is used by default.
        Role:
          $ref: "#/components/schemas/Role"
          description: The IAM role that the service assumes to generate statistics.
        SampleSize:
          $ref: "#/components/schemas/SampleSizePercentage"
          description: The percentage of rows used to generate statistics. If none is supplied, the entire table will be used to generate stats.
        SecurityConfiguration:
          $ref: "#/components/schemas/CrawlerSecurityConfiguration"
          description: Name of the security configuration that is used to encrypt CloudWatch logs for the column stats task run.
        NumberOfWorkers:
          $ref: "#/components/schemas/PositiveInteger"
          description: The number of workers used to generate column statistics. The job is preconfigured to autoscale up to 25 instances.
        WorkerType:
          $ref: "#/components/schemas/NameString"
          description: The type of workers being used for generating stats. The default is g.1x.
        ComputationType:
          $ref: "#/components/schemas/ComputationType"
          description: The type of column statistics computation.
        Status:
          $ref: "#/components/schemas/ColumnStatisticsState"
          description: The status of the task run.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that this task was created.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The last point in time when this task was modified.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the task.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the task.
        ErrorMessage:
          $ref: "#/components/schemas/DescriptionString"
          description: The error message for the job.
        DPUSeconds:
          $ref: "#/components/schemas/NonNegativeDouble"
          description: The calculated DPU usage in seconds for all autoscaled workers.
    TableName:
      type: string
    PositiveInteger:
      type: integer
      minimum: 1
    ComputationType:
      type: string
      enum:
        - FULL
        - INCREMENTAL
    ColumnStatisticsState:
      type: string
      enum:
        - STARTING
        - RUNNING
        - SUCCEEDED
        - FAILED
        - STOPPED
    GetColumnStatisticsTaskRunsResponse:
      type: object
      properties:
        ColumnStatisticsTaskRuns:
          $ref: "#/components/schemas/ColumnStatisticsTaskRunsList"
          description: A list of column statistics task runs.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: A continuation token, if not all task runs have yet been returned.
    ColumnStatisticsTaskRunsList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnStatisticsTaskRun"
    GetColumnStatisticsTaskSettingsResponse:
      type: object
      properties:
        ColumnStatisticsTaskSettings:
          $ref: "#/components/schemas/ColumnStatisticsTaskSettings"
          description: A ColumnStatisticsTaskSettings object representing the settings for the column statistics task.
    ColumnStatisticsTaskSettings:
      description: The settings for a column statistics task.
      type: object
      properties:
        DatabaseName:
          $ref: "#/components/schemas/DatabaseName"
          description: The name of the database where the table resides.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table for which to generate column statistics.
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: A schedule for running the column statistics, specified in CRON syntax.
        ColumnNameList:
          $ref: "#/components/schemas/ColumnNameList"
          description: A list of column names for which to run statistics.
        CatalogID:
          $ref: "#/components/schemas/CatalogIdString"
          description: The ID of the Data Catalog in which the database resides.
        Role:
          $ref: "#/components/schemas/Role"
          description: The role used for running the column statistics.
        SampleSize:
          $ref: "#/components/schemas/SampleSizePercentage"
          description: The percentage of data to sample.
        SecurityConfiguration:
          $ref: "#/components/schemas/CrawlerSecurityConfiguration"
          description: Name of the security configuration that is used to encrypt CloudWatch logs.
        ScheduleType:
          $ref: "#/components/schemas/ScheduleType"
          description: The type of schedule for a column statistics task. Possible values may be CRON or AUTO.
        SettingSource:
          $ref: "#/components/schemas/SettingSource"
          description: The source of setting the column statistics task. Possible values may be CATALOG or TABLE.
        LastExecutionAttempt:
          $ref: "#/components/schemas/ExecutionAttempt"
          description: The last ExecutionAttempt for the column statistics task run.
    ScheduleType:
      type: string
      enum:
        - CRON
        - AUTO
    SettingSource:
      type: string
      enum:
        - CATALOG
        - TABLE
    ExecutionAttempt:
      description: A run attempt for a column statistics task run.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The status of the last column statistics task run.
        ColumnStatisticsTaskRunId:
          $ref: "#/components/schemas/HashString"
          description: A task run ID for the last column statistics task run.
        ExecutionTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp when the last column statistics task run occurred.
        ErrorMessage:
          $ref: "#/components/schemas/DescriptionString"
          description: An error message associated with the last column statistics task run.
    ExecutionStatus:
      type: string
      enum:
        - FAILED
        - STARTED
    GetConnectionResponse:
      type: object
      properties:
        Connection:
          $ref: "#/components/schemas/Connection"
          description: The requested connection definition.
    Connection:
      description: Defines a connection to a data source.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NameString"
          description: The name of the connection definition.
        Description:
          $ref: "#/components/schemas/DescriptionString"
          description: The description of the connection.
        ConnectionType:
          $ref: "#/components/schemas/ConnectionType"
          description: The type of the connection. Currently, SFTP is not supported.
        MatchCriteria:
          $ref: "#/components/schemas/MatchCriteria"
          description: A list of criteria that can be used in selecting this connection.
        ConnectionProperties:
          type: object
          properties: {}
          description: "These key-value pairs define parameters for the connection when using the version 1 Connection schema: HOST - The host URI: either the fully qualified domain name (FQDN) or the IPv4 address of the database host. PORT - The port number, between 1024 and 65535, of the port on which the database host is listening for database connections. USER_NAME - The name under which to log in to the database. The value string for USER_NAME is \"USERNAME\". PASSWORD - A password, if one is used, for the user name. ENCRYPTED_PASSWORD - When you enable connection password protection by setting ConnectionPasswordEncryption in the Data Catalog encryption settings, this field stores the encrypted password. JDBC_DRIVER_JAR_URI - The Amazon Simple Storage Service (Amazon S3) path of the JAR file that contains the JDBC driver to use. JDBC_DRIVER_CLASS_NAME - The class name of the JDBC driver to use. JDBC_ENGINE - The name of the JDBC engine to use. JDBC_ENGINE_VERSION - The version of the JDBC engine to use. CONFIG_FILES - (Reserved for future use.) INSTANCE_ID - The instance ID to use. JDBC_CONNECTION_URL - The URL for connecting to a JDBC data source. JDBC_ENFORCE_SSL - A case-insensitive Boolean string (true, false) specifying whether Secure Sockets Layer (SSL) with hostname matching is enforced for the JDBC connection on the client. The default is false. CUSTOM_JDBC_CERT - An Amazon S3 location specifying the customer's root certificate. Glue uses this root certificate to validate the customer’s certificate when connecting to the customer database. Glue only handles X.509 certificates. The certificate provided must be DER-encoded and supplied in Base64 encoding PEM format. SKIP_CUSTOM_JDBC_CERT_VALIDATION - By default, this is false. Glue validates the Signature algorithm and Subject Public Key Algorithm for the customer certificate. The only permitted algorithms for the Signature algorithm are SHA256withRSA, SHA384withRSA or SHA512withRSA. For the Subject Public Key Algorithm, the key length must be at least 2048. You can set the value of this property to true to skip Glue’s validation of the customer certificate. CUSTOM_JDBC_CERT_STRING - A custom JDBC certificate string which is used for domain match or distinguished name match to prevent a man-in-the-middle attack. In Oracle database, this is used as the SSL_SERVER_CERT_DN; in Microsoft SQL Server, this is used as the hostNameInCertificate. CONNECTION_URL - The URL for connecting to a general (non-JDBC) data source. SECRET_ID - The secret ID used for the secret manager of credentials. CONNECTOR_URL - The connector URL for a MARKETPLACE or CUSTOM connection. CONNECTOR_TYPE - The connector type for a MARKETPLACE or CUSTOM connection. CONNECTOR_CLASS_NAME - The connector class name for a MARKETPLACE or CUSTOM connection. KAFKA_BOOTSTRAP_SERVERS - A comma-separated list of host and port pairs that are the addresses of the Apache Kafka brokers in a Kafka cluster to which a Kafka client will connect to and bootstrap itself. KAFKA_SSL_ENABLED - Whether to enable or disable SSL on an Apache Kafka connection. Default value is \"true\". KAFKA_CUSTOM_CERT - The Amazon S3 URL for the private CA cert file (.pem format). The default is an empty string. KAFKA_SKIP_CUSTOM_CERT_VALIDATION - Whether to skip the validation of the CA cert file or not. Glue validates for three algorithms: SHA256withRSA, SHA384withRSA and SHA512withRSA. Default value is \"false\". KAFKA_CLIENT_KEYSTORE - The Amazon S3 location of the client keystore file for Kafka client side authentication (Optional). KAFKA_CLIENT_KEYSTORE_PASSWORD - The password to access the provided keystore (Optional). KAFKA_CLIENT_KEY_PASSWORD - A keystore can consist of multiple keys, so this is the password to access the client key to be used with the Kafka server side key (Optional). ENCRYPTED_KAFKA_CLIENT_KEYSTORE_PASSWORD - The encrypted version of the Kafka client keystore password (if the user has the Glue encrypt passwords setting selected). ENCRYPTED_KAFKA_CLIENT_KEY_PASSWORD - The encrypted version of the Kafka client key password (if the user has the Glue encrypt passwords setting selected). KAFKA_SASL_MECHANISM - \"SCRAM-SHA-512\", \"GSSAPI\", \"AWS_MSK_IAM\", or \"PLAIN\". These are the supported SASL Mechanisms. KAFKA_SASL_PLAIN_USERNAME - A plaintext username used to authenticate with the \"PLAIN\" mechanism. KAFKA_SASL_PLAIN_PASSWORD - A plaintext password used to authenticate with the \"PLAIN\" mechanism. ENCRYPTED_KAFKA_SASL_PLAIN_PASSWORD - The encrypted version of the Kafka SASL PLAIN password (if the user has the Glue encrypt passwords setting selected). KAFKA_SASL_SCRAM_USERNAME - A plaintext username used to authenticate with the \"SCRAM-SHA-512\" mechanism. KAFKA_SASL_SCRAM_PASSWORD - A plaintext password used to authenticate with the \"SCRAM-SHA-512\" mechanism. ENCRYPTED_KAFKA_SASL_SCRAM_PASSWORD - The encrypted version of the Kafka SASL SCRAM password (if the user has the Glue encrypt passwords setting selected). KAFKA_SASL_SCRAM_SECRETS_ARN - The Amazon Resource Name of a secret in Amazon Web Services Secrets Manager. KAFKA_SASL_GSSAPI_KEYTAB - The S3 location of a Kerberos keytab file. A keytab stores long-term keys for one or more principals. For more information, see MIT Kerberos Documentation: Keytab. KAFKA_SASL_GSSAPI_KRB5_CONF - The S3 location of a Kerberos krb5.conf file. A krb5.conf stores Kerberos configuration information, such as the location of the KDC server. For more information, see MIT Kerberos Documentation: krb5.conf. KAFKA_SASL_GSSAPI_SERVICE - The Kerberos service name, as set with sasl.kerberos.service.name in your Kafka Configuration. KAFKA_SASL_GSSAPI_PRINCIPAL - The name of the Kerberos princial used by Glue. For more information, see Kafka Documentation: Configuring Kafka Brokers. ROLE_ARN - The role to be used for running queries. REGION - The Amazon Web Services Region where queries will be run. WORKGROUP_NAME - The name of an Amazon Redshift serverless workgroup or Amazon Athena workgroup in which queries will run. CLUSTER_IDENTIFIER - The cluster identifier of an Amazon Redshift cluster in which queries will run. DATABASE - The Amazon Redshift database that you are connecting to."
