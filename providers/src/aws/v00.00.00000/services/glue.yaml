        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: A continuation token, present if the current segment is not the last.
    FieldsList:
      type: array
      items:
        $ref: "#/components/schemas/Field"
    Field:
      description: The Field object has information about the different properties associated with a field in the connector.
      type: object
      properties:
        FieldName:
          $ref: "#/components/schemas/EntityFieldName"
          description: A unique identifier for the field.
        Label:
          $ref: "#/components/schemas/FieldLabel"
          description: A readable label used for the field.
        Description:
          $ref: "#/components/schemas/FieldDescription"
          description: A description of the field.
        FieldType:
          $ref: "#/components/schemas/FieldDataType"
          description: The type of data in the field.
        IsPrimaryKey:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can used as a primary key for the given entity.
        IsNullable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can be nullable or not.
        IsRetrievable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can be added in Select clause of SQL query or whether it is retrievable or not.
        IsFilterable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can used in a filter clause (WHERE clause) of a SQL statement when querying data.
        IsPartitionable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether a given field can be used in partitioning the query made to SaaS.
        IsCreateable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can be created as part of a destination write.
        IsUpdateable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can be updated as part of a destination write.
        IsUpsertable:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field can be upserted as part of a destination write.
        IsDefaultOnCreate:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether this field is populated automatically when the object is created, such as a created at timestamp.
        SupportedValues:
          $ref: "#/components/schemas/ListOfString"
          description: A list of supported values for the field.
        SupportedFilterOperators:
          $ref: "#/components/schemas/FieldFilterOperatorsList"
          description: Indicates the support filter operators for this field.
        ParentField:
          $ref: "#/components/schemas/String"
          description: A parent field name for a nested field.
        NativeDataType:
          $ref: "#/components/schemas/String"
          description: The data type returned by the SaaS API, such as “picklist” or “textarea” from Salesforce.
        CustomProperties:
          type: object
          properties: {}
          description: Optional map of keys which may be returned.
    EntityFieldName:
