        - Value
    AllowedValueDescriptionString:
      type: string
      minLength: 0
      maxLength: 1024
    AllowedValueValueString:
      type: string
      minLength: 1
      maxLength: 128
    PropertyLocation:
      type: string
      enum:
        - HEADER
        - BODY
        - QUERY_PARAM
        - PATH
    RestConfiguration:
      description: Configuration that defines HTTP request and response handling, validation endpoints, and entity configurations for REST API interactions.
      type: object
      properties:
        GlobalSourceConfiguration:
          $ref: "#/components/schemas/SourceConfiguration"
          description: Global configuration settings that apply to all REST API requests for this connection type, including common request methods, paths, and parameters.
        ValidationEndpointConfiguration:
          $ref: "#/components/schemas/SourceConfiguration"
          description: Configuration for the endpoint used to validate connection credentials and test connectivity during connection creation.
        EntityConfigurations:
          type: object
          properties: {}
          description: A map of entity configurations that define how to interact with different data entities available through the REST API, including their schemas and access patterns.
    SourceConfiguration:
      description: Configuration that defines how to make requests to endpoints, including request methods, paths, parameters, and response handling.
      type: object
      properties:
        RequestMethod:
          $ref: "#/components/schemas/HTTPMethod"
          description: The HTTP method to use for requests to this endpoint, such as GET, POST.
        RequestPath:
          $ref: "#/components/schemas/PathString"
          description: The URL path for the REST endpoint, which may include parameter placeholders that will be replaced with actual values during requests.
        RequestParameters:
          $ref: "#/components/schemas/ConnectorPropertyList"
          description: Configuration for request parameters that should be included in API calls, such as query parameters, headers, or body content.
        ResponseConfiguration:
          $ref: "#/components/schemas/ResponseConfiguration"
          description: Configuration that defines how to parse and extract data from API responses, including success and error handling.
        PaginationConfiguration:
          $ref: "#/components/schemas/PaginationConfiguration"
          description: Configuration for handling paginated responses from the REST API, supporting both cursor-based and offset-based pagination strategies.
    HTTPMethod:
      type: string
      enum:
        - GET
        - POST
    PathString:
      type: string
      minLength: 1
      maxLength: 512
      pattern: /[a-zA-Z0-9._~:/?#\[\]@!$&'()*+,;={}-]*
    ConnectorPropertyList:
      type: array
      items:
        $ref: "#/components/schemas/ConnectorProperty"
    ConnectorProperty:
      description: Defines a property configuration for connection types, default values, and where the property should be used in requests.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PropertyName"
          description: The name of the property.
        KeyOverride:
          $ref: "#/components/schemas/ConnectorPropertyKey"
          description: A key name to use when sending this property in API requests, if different from the display name.
        Required:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether the property is required.
        DefaultValue:
          $ref: "#/components/schemas/String"
          description: The default value for the property.
        AllowedValues:
          $ref: "#/components/schemas/ListOfString"
          description: A list of AllowedValue objects representing the values allowed for the property.
        PropertyLocation:
          $ref: "#/components/schemas/PropertyLocation"
          description: Specifies where this property should be included in REST requests, such as in headers, query parameters, or request body.
        PropertyType:
          $ref: "#/components/schemas/PropertyType"
          description: The data type of this property
      required:
        - Name
        - Required
        - PropertyType
    ConnectorPropertyKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_-]+"
    ListOfString:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ResponseConfiguration:
      description: Configuration that defines how to parse JSON responses from REST API calls, including paths to result data and error information.
      type: object
      properties:
        ResultPath:
          $ref: "#/components/schemas/JsonPathString"
          description: The JSON path expression that identifies where the actual result data is located within the API response.
        ErrorPath:
          $ref: "#/components/schemas/JsonPathString"
          description: The JSON path expression that identifies where error information is located within API responses when requests fail.
      required:
        - ResultPath
    JsonPathString:
      type: string
      minLength: 1
      maxLength: 512
      pattern: \$(\.[a-zA-Z0-9_.@\[\]\(\)-]+)*
    PaginationConfiguration:
      description: Configuration that defines how to handle paginated responses from REST APIs, supporting different pagination strategies used by various services.
      type: object
      properties:
        CursorConfiguration:
          $ref: "#/components/schemas/CursorConfiguration"
          description: Configuration for cursor-based pagination, where the API provides a cursor or token to retrieve the next page of results.
        OffsetConfiguration:
          $ref: "#/components/schemas/OffsetConfiguration"
          description: Configuration for offset-based pagination, where the API uses numeric offsets and limits to control which results are returned.
    CursorConfiguration:
      description: Cursor-based pagination configuration that defines how to handle pagination using cursor tokens or next page identifiers.
      type: object
      properties:
        NextPage:
          $ref: "#/components/schemas/ExtractedParameter"
          description: The parameter name or JSON path that contains the cursor or token for retrieving the next page of results.
        LimitParameter:
          $ref: "#/components/schemas/ExtractedParameter"
          description: The parameter name used to specify the maximum number of results to return per page.
      required:
        - NextPage
    ExtractedParameter:
      description: Parameter extraction configuration that defines how to extract and map values from API responses to request parameters.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/ConnectorPropertyKey"
          description: The parameter key name that will be used in subsequent requests.
        DefaultValue:
          $ref: "#/components/schemas/DefaultValue"
          description: The default value to use if the parameter cannot be extracted from the response.
        PropertyLocation:
          $ref: "#/components/schemas/PropertyLocation"
          description: Specifies where this extracted parameter should be placed in subsequent requests, such as in headers, query parameters, or request body.
        Value:
          $ref: "#/components/schemas/ResponseExtractionMapping"
          description: The JSON path or extraction mapping that defines how to extract the parameter value from API responses.
    DefaultValue:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*[^<>&'"].*
    ResponseExtractionMapping:
      description: Configuration that defines how to extract values from HTTP response content or headers for use in subsequent requests or parameter mapping.
      type: object
      properties:
        ContentPath:
          $ref: "#/components/schemas/JsonPathString"
          description: A JSON path expression that specifies how to extract a value from the response body content.
        HeaderKey:
          $ref: "#/components/schemas/ConnectorPropertyKey"
          description: The name of an HTTP response header from which to extract the value.
    OffsetConfiguration:
      description: Offset-based pagination configuration that defines how to handle pagination using numeric offsets and limits.
      type: object
      properties:
        OffsetParameter:
          $ref: "#/components/schemas/ExtractedParameter"
          description: The parameter name used to specify the starting position or offset for retrieving results.
        LimitParameter:
          $ref: "#/components/schemas/ExtractedParameter"
          description: The parameter name used to specify the maximum number of results to return per page.
      required:
        - OffsetParameter
        - LimitParameter
    EntityName:
      type: string
    NextToken:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[-a-zA-Z0-9+=/:_]*"
    ApiVersion:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9.-]*"
    DescribeEntityResponse:
      type: object
      properties:
        Fields:
          $ref: "#/components/schemas/FieldsList"
