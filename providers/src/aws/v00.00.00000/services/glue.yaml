          $ref: "#/components/schemas/RoleString"
          description: The name or Amazon Resource Name (ARN) of the IAM role with the required permissions.
        GlueVersion:
          $ref: "#/components/schemas/GlueVersionString"
          description: This value determines which version of Glue this machine learning transform is compatible with. Glue 1.0 is recommended for most customers. If the value is not set, the Glue compatibility defaults to Glue 0.9. For more information, see Glue Versions in the developer guide.
        MaxCapacity:
          $ref: "#/components/schemas/NullableDouble"
          description: The number of Glue data processing units (DPUs) that are allocated to task runs for this transform. You can allocate from 2 to 100 DPUs; the default is 10. A DPU is a relative measure of processing power that consists of 4 vCPUs of compute capacity and 16 GB of memory. For more information, see the Glue pricing page. When the WorkerType field is set to a value other than Standard, the MaxCapacity field is set automatically and becomes read-only.
        WorkerType:
          $ref: "#/components/schemas/WorkerType"
          description: The type of predefined worker that is allocated when this task runs. Accepts a value of Standard, G.1X, or G.2X. For the Standard worker type, each worker provides 4 vCPU, 16 GB of memory and a 50GB disk, and 2 executors per worker. For the G.1X worker type, each worker provides 4 vCPU, 16 GB of memory and a 64GB disk, and 1 executor per worker. For the G.2X worker type, each worker provides 8 vCPU, 32 GB of memory and a 128GB disk, and 1 executor per worker.
        NumberOfWorkers:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of workers of a defined workerType that are allocated when this task runs.
        Timeout:
          $ref: "#/components/schemas/Timeout"
          description: The timeout for a task run for this transform in minutes. This is the maximum time that a task run for this transform can consume resources before it is terminated and enters TIMEOUT status. The default is 2,880 minutes (48 hours).
        MaxRetries:
          $ref: "#/components/schemas/NullableInteger"
          description: The maximum number of times to retry a task for this transform after a task run fails.
        TransformEncryption:
          $ref: "#/components/schemas/TransformEncryption"
          description: The encryption-at-rest settings of the transform that apply to accessing user data. Machine learning transforms can access user data encrypted in Amazon S3 using KMS.
