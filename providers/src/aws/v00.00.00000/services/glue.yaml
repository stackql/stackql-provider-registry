  /GetUnfilteredPartitionsMetadata:
    post:
      operationId: GetUnfilteredPartitionsMetadata
      description: Retrieves partition metadata from the Data Catalog that contains unfiltered metadata. For IAM authorization, the public IAM action associated with this API is glue:GetPartitions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.GetUnfilteredPartitionsMetadata
            default: AWSGlue.GetUnfilteredPartitionsMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Region:
                  $ref: "#/components/schemas/ValueString"
                  description: Specified only if the base tables belong to a different Amazon Web Services Region.
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The ID of the Data Catalog where the partitions in question reside. If none is provided, the AWS account ID is used by default.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the catalog database where the partitions reside.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the table that contains the partition.
                Expression:
                  $ref: "#/components/schemas/PredicateString"
                  description: "An expression that filters the partitions to be returned. The expression uses SQL syntax similar to the SQL WHERE filter clause. The SQL statement parser JSQLParser parses the expression. Operators: The following are the operators that you can use in the Expression API call: = Checks whether the values of the two operands are equal; if yes, then the condition becomes true. Example: Assume 'variable a' holds 10 and 'variable b' holds 20. (a = b) is not true. < > Checks whether the values of two operands are equal; if the values are not equal, then the condition becomes true. Example: (a < > b) is true. > Checks whether the value of the left operand is greater than the value of the right operand; if yes, then the condition becomes true. Example: (a > b) is not true. < Checks whether the value of the left operand is less than the value of the right operand; if yes, then the condition becomes true. Example: (a < b) is true. >= Checks whether the value of the left operand is greater than or equal to the value of the right operand; if yes, then the condition becomes true. Example: (a >= b) is not true. <= Checks whether the value of the left operand is less than or equal to the value of the right operand; if yes, then the condition becomes true. Example: (a <= b) is true. AND, OR, IN, BETWEEN, LIKE, NOT, IS NULL Logical operators. Supported Partition Key Types: The following are the supported partition keys. string date timestamp int bigint long tinyint smallint decimal If an type is encountered that is not valid, an exception is thrown."
                AuditContext:
                  $ref: "#/components/schemas/AuditContext"
                  description: A structure containing Lake Formation audit context information.
                SupportedPermissionTypes:
                  $ref: "#/components/schemas/PermissionTypeList"
                  description: A list of supported permission types.
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: A continuation token, if this is not the first call to retrieve these partitions.
                Segment:
                  $ref: "#/components/schemas/Segment"
                  description: The segment of the table's partitions to scan in this request.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of partitions to return in a single response.
                QuerySessionContext:
                  $ref: "#/components/schemas/QuerySessionContext"
                  description: A structure used as a protocol between query engines and Lake Formation or Glue. Contains both a Lake Formation generated authorization identifier and information from the request's authorization context.
              required:
                - CatalogId
                - DatabaseName
                - TableName
                - SupportedPermissionTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUnfilteredPartitionsMetadataResponse"
  /GetUnfilteredTableMetadata:
    post:
      operationId: GetUnfilteredTableMetadata
      description: Allows a third-party analytical engine to retrieve unfiltered table metadata from the Data Catalog. For IAM authorization, the public IAM action associated with this API is glue:GetTable.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSGlue.GetUnfilteredTableMetadata
            default: AWSGlue.GetUnfilteredTableMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Region:
                  $ref: "#/components/schemas/ValueString"
                  description: Specified only if the base tables belong to a different Amazon Web Services Region.
                CatalogId:
                  $ref: "#/components/schemas/CatalogIdString"
                  description: The catalog ID where the table resides.
                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: (Required) Specifies the name of a database that contains the table.
                Name:
                  $ref: "#/components/schemas/NameString"
                  description: (Required) Specifies the name of a table for which you are requesting metadata.
                AuditContext:
                  $ref: "#/components/schemas/AuditContext"
                  description: A structure containing Lake Formation audit context information.
                SupportedPermissionTypes:
                  $ref: "#/components/schemas/PermissionTypeList"
                  description: "Indicates the level of filtering a third-party analytical engine is capable of enforcing when calling the GetUnfilteredTableMetadata API operation. Accepted values are: COLUMN_PERMISSION - Column permissions ensure that users can access only specific columns in the table. If there are particular columns contain sensitive data, data lake administrators can define column filters that exclude access to specific columns. CELL_FILTER_PERMISSION - Cell-level filtering combines column filtering (include or exclude columns) and row filter expressions to restrict access to individual elements in the table. NESTED_PERMISSION - Nested permissions combines cell-level filtering and nested column filtering to restrict access to columns and/or nested columns in specific rows based on row filter expressions. NESTED_CELL_PERMISSION - Nested cell permissions combines nested permission with nested cell-level filtering. This allows different subsets of nested columns to be restricted based on an array of row filter expressions. Note: Each of these permission types follows a hierarchical order where each subsequent permission type includes all permission of the previous type. Important: If you provide a supported permission type that doesn't match the user's level of permissions on the table, then Lake Formation raises an exception. For example, if the third-party engine calling the GetUnfilteredTableMetadata operation can enforce only column-level filtering, and the user has nested cell filtering applied on the table, Lake Formation throws an exception, and will not return unfiltered table metadata and data access credentials."
                ParentResourceArn:
                  $ref: "#/components/schemas/ArnString"
                  description: The resource ARN of the view.
                RootResourceArn:
                  $ref: "#/components/schemas/ArnString"
                  description: The resource ARN of the root view in a chain of nested views.
                SupportedDialect:
                  $ref: "#/components/schemas/SupportedDialect"
                  description: A structure specifying the dialect and dialect version used by the query engine.
                Permissions:
                  $ref: "#/components/schemas/PermissionList"
                  description: The Lake Formation data permissions of the caller on the table. Used to authorize the call when no view context is found.
                QuerySessionContext:
                  $ref: "#/components/schemas/QuerySessionContext"
                  description: A structure used as a protocol between query engines and Lake Formation or Glue. Contains both a Lake Formation generated authorization identifier and information from the request's authorization context.
              required:
                - CatalogId
                - DatabaseName
                - Name
                - SupportedPermissionTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUnfilteredTableMetadataResponse"
