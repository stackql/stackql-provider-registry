      type: object
      properties:
        SourceId:
          $ref: "#/components/schemas/Integer"
          description: The identifier of the source field from the table schema that this sort field is based on.
        Transform:
          $ref: "#/components/schemas/IcebergTransformString"
          description: The transformation function applied to the source field before sorting, such as identity, bucket, or truncate.
        Direction:
          $ref: "#/components/schemas/IcebergSortDirection"
          description: The sort direction for this field, either ascending or descending.
        NullOrder:
          $ref: "#/components/schemas/IcebergNullOrder"
