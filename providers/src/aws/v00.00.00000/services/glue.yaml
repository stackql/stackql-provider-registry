    GetDataCatalogEncryptionSettingsResponse:
      type: object
      properties:
        DataCatalogEncryptionSettings:
          $ref: "#/components/schemas/DataCatalogEncryptionSettings"
          description: The requested security configuration.
    DataCatalogEncryptionSettings:
      description: Contains configuration information for maintaining Data Catalog security.
      type: object
      properties:
        EncryptionAtRest:
          $ref: "#/components/schemas/EncryptionAtRest"
          description: Specifies the encryption-at-rest configuration for the Data Catalog.
        ConnectionPasswordEncryption:
          $ref: "#/components/schemas/ConnectionPasswordEncryption"
          description: When connection password protection is enabled, the Data Catalog uses a customer-provided key to encrypt the password as part of CreateConnection or UpdateConnection and store it in the ENCRYPTED_PASSWORD field in the connection properties. You can enable catalog encryption or only password encryption.
    EncryptionAtRest:
      description: Specifies the encryption-at-rest configuration for the Data Catalog.
      type: object
      properties:
        CatalogEncryptionMode:
          $ref: "#/components/schemas/CatalogEncryptionMode"
          description: The encryption-at-rest mode for encrypting Data Catalog data.
        SseAwsKmsKeyId:
          $ref: "#/components/schemas/NameString"
          description: The ID of the KMS key to use for encryption at rest.
        CatalogEncryptionServiceRole:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The role that Glue assumes to encrypt and decrypt the Data Catalog objects on the caller's behalf.
      required:
        - CatalogEncryptionMode
    CatalogEncryptionMode:
      type: string
      enum:
        - DISABLED
        - SSE-KMS
        - SSE-KMS-WITH-SERVICE-ROLE
    ConnectionPasswordEncryption:
      description: The data structure used by the Data Catalog to encrypt the password as part of CreateConnection or UpdateConnection and store it in the ENCRYPTED_PASSWORD field in the connection properties. You can enable catalog encryption or only password encryption. When a CreationConnection request arrives containing a password, the Data Catalog first encrypts the password using your KMS key. It then encrypts the whole connection object again if catalog encryption is also enabled. This encryption requires that you set KMS key permissions to enable or restrict access on the password key according to your security requirements. For example, you might want only administrators to have decrypt permission on the password key.
      type: object
      properties:
        ReturnConnectionPasswordEncrypted:
          $ref: "#/components/schemas/Boolean"
          description: When the ReturnConnectionPasswordEncrypted flag is set to "true", passwords remain encrypted in the responses of GetConnection and GetConnections. This encryption takes effect independently from catalog encryption.
        AwsKmsKeyId:
          $ref: "#/components/schemas/NameString"
          description: An KMS key that is used to encrypt the connection password. If connection password protection is enabled, the caller of CreateConnection and UpdateConnection needs at least kms:Encrypt permission on the specified KMS key, to encrypt passwords before storing them in the Data Catalog. You can set the decrypt permission to enable or restrict access on the password key according to your security requirements.
      required:
        - ReturnConnectionPasswordEncrypted
