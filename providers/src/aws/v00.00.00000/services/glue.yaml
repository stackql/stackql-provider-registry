                DatabaseName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the catalog database where the partitions reside.
                TableName:
                  $ref: "#/components/schemas/NameString"
                  description: The name of the partitions' table.
                Expression:
                  $ref: "#/components/schemas/PredicateString"
                  description: "An expression that filters the partitions to be returned. The expression uses SQL syntax similar to the SQL WHERE filter clause. The SQL statement parser JSQLParser parses the expression. Operators: The following are the operators that you can use in the Expression API call: = Checks whether the values of the two operands are equal; if yes, then the condition becomes true. Example: Assume 'variable a' holds 10 and 'variable b' holds 20. (a = b) is not true. < > Checks whether the values of two operands are equal; if the values are not equal, then the condition becomes true. Example: (a < > b) is true. > Checks whether the value of the left operand is greater than the value of the right operand; if yes, then the condition becomes true. Example: (a > b) is not true. < Checks whether the value of the left operand is less than the value of the right operand; if yes, then the condition becomes true. Example: (a < b) is true. >= Checks whether the value of the left operand is greater than or equal to the value of the right operand; if yes, then the condition becomes true. Example: (a >= b) is not true. <= Checks whether the value of the left operand is less than or equal to the value of the right operand; if yes, then the condition becomes true. Example: (a <= b) is true. AND, OR, IN, BETWEEN, LIKE, NOT, IS NULL Logical operators. Supported Partition Key Types: The following are the supported partition keys. string date timestamp int bigint long tinyint smallint decimal If an type is encountered that is not valid, an exception is thrown. The following list shows the valid operators on each type. When you define a crawler, the partitionKey type is created as a STRING, to be compatible with the catalog partitions. Sample API Call:"
                NextToken:
                  $ref: "#/components/schemas/Token"
                  description: A continuation token, if this is not the first call to retrieve these partitions.
                Segment:
                  $ref: "#/components/schemas/Segment"
                  description: The segment of the table's partitions to scan in this request.
                MaxResults:
                  $ref: "#/components/schemas/PageSize"
                  description: The maximum number of partitions to return in a single response.
                ExcludeColumnSchema:
                  $ref: "#/components/schemas/BooleanNullable"
                  description: When true, specifies not returning the partition column schema. Useful when you are interested only in other partition attributes such as partition values or location. This approach avoids the problem of a large response by not returning duplicate data.
                TransactionId:
                  $ref: "#/components/schemas/TransactionIdString"
                  description: The transaction ID at which to read the partition contents.
                QueryAsOfTime:
                  $ref: "#/components/schemas/Timestamp"
                  description: The time as of when to read the partition contents. If not set, the most recent transaction commit time will be used. Cannot be specified along with TransactionId.
                AuditContext:
                  $ref: "#/components/schemas/AuditContext"
              required:
                - DatabaseName
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPartitionsResponse"
