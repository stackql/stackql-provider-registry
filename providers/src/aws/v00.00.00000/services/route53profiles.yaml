openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Route 53 Profiles
  description: Route 53 Profiles
  x-serviceName: route53profiles
  x-serviceAlias: route53profiles
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: route53profiles
  x-jsonVersion: "1.1"
servers:
  - url: https://route53profiles.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for route53profiles
paths:
  /profileassociation:
    post:
      operationId: AssociateProfile
      description: Associates a Route 53 Profiles profile with a VPC. A VPC can have only one Profile associated with it, but a Profile can be associated with 1000 of VPCs (and you can request a higher quota). For more information, see https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/DNSLimitations.html#limits-api-entities.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                ProfileId:
                  $ref: "#/components/schemas/ResourceId"
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ProfileId
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateProfileResponse"
  /profileresourceassociation:
    post:
      operationId: AssociateResourceToProfile
      description: Associates a DNS reource configuration to a Route 53 Profile.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                ProfileId:
                  $ref: "#/components/schemas/ResourceId"
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                ResourceProperties:
                  $ref: "#/components/schemas/ResourceProperties"
              required:
                - ProfileId
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResourceToProfileResponse"
  /profile:
    post:
      operationId: CreateProfile
      description: Creates an empty Route 53 Profile.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/CreatorRequestId"
                Name:
                  $ref: "#/components/schemas/Name"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfileResponse"
  /profile/{profile_id}:
    delete:
      operationId: DeleteProfile
      description: Deletes the specified Route 53 Profile. Before you can delete a profile, you must first disassociate it from all VPCs.
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the Profile that you want to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProfileResponse"
    get:
      operationId: GetProfile
      description: Returns information about a specified Route 53 Profile, such as whether whether the Profile is shared, and the current status of the Profile.
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResponse"
  /profileassociation/Profileid/{profile_id}/resourceid/{resource_id}:
    delete:
      operationId: DisassociateProfile
      description: Dissociates a specified Route 53 Profile from the specified VPC.
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile.
        - name: resource_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the VPC.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateProfileResponse"
  /profileresourceassociation/profileid/{profile_id}/resourcearn/{resource_arn}:
    delete:
      operationId: DisassociateResourceFromProfile
      description: Dissoaciated a specified resource, from the Route 53 Profile.
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the Profile.
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateResourceFromProfileResponse"
  /profileassociation/{profile_association_id}:
    get:
      operationId: GetProfileAssociation
      description: Retrieves a Route 53 Profile association for a VPC. A VPC can have only one Profile association, but a Profile can be associated with up to 5000 VPCs.
      parameters:
        - name: profile_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The identifier of the association you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileAssociationResponse"
  /profileresourceassociation/{profile_resource_association_id}:
    get:
      operationId: GetProfileResourceAssociation
      description: Returns information about a specified Route 53 Profile resource association.
      parameters:
        - name: profile_resource_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the profile resource association that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileResourceAssociationResponse"
    patch:
      operationId: UpdateProfileResourceAssociation
      description: Updates the specified Route 53 Profile resourse association.
      parameters:
        - name: profile_resource_association_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: ID of the resource association.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                ResourceProperties:
                  $ref: "#/components/schemas/ResourceProperties"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileResourceAssociationResponse"
  /profileassociations:
    get:
      operationId: ListProfileAssociations
      description: Lists all the VPCs that the specified Route 53 Profile is associated with.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of objects that you want to return for this request. If more objects are available, in the response, a NextToken value, which you can use in a subsequent call to get the next batch of objects, is provided. If you don't specify a value for MaxResults, up to 100 objects are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: For the first call to this list request, omit this value. When you request a list of objects, at most the number of objects specified by MaxResults is returned. If more objects are available for retrieval, a NextToken value is returned in the response. To retrieve the next batch of objects, use the token that was returned for the prior request in your next request.
        - name: profileId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile.
        - name: resourceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: ID of the VPC.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfileAssociationsResponse"
  /profileresourceassociations/profileid/{profile_id}:
    get:
      operationId: ListProfileResourceAssociations
      description: Lists all the resource associations for the specified Route 53 Profile.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of objects that you want to return for this request. If more objects are available, in the response, a NextToken value, which you can use in a subsequent call to get the next batch of objects, is provided. If you don't specify a value for MaxResults, up to 100 objects are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: For the first call to this list request, omit this value. When you request a list of objects, at most the number of objects specified by MaxResults is returned. If more objects are available for retrieval, a NextToken value is returned in the response. To retrieve the next batch of objects, use the token that was returned for the prior request in your next request.
        - name: profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceId"
          description: The ID of the Profile.
        - name: resourceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: ID of a resource if you want information on only one type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfileResourceAssociationsResponse"
  /profiles:
    get:
      operationId: ListProfiles
      description: Lists all the Route 53 Profiles associated with your Amazon Web Services account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of objects that you want to return for this request. If more objects are available, in the response, a NextToken value, which you can use in a subsequent call to get the next batch of objects, is provided. If you don't specify a value for MaxResults, up to 100 objects are returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: For the first call to this list request, omit this value. When you request a list of objects, at most the number of objects specified by MaxResults is returned. If more objects are available for retrieval, a NextToken value is returned in the response. To retrieve the next batch of objects, use the token that was returned for the prior request in your next request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfilesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags that you associated with the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the resource that you want to list the tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds one or more tags to a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the resource that you want to add tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for the resource that you want to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tags that you want to remove to the specified resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 0
      maxLength: 64
      pattern: ^(?!^[0-9]+$)([a-zA-Z0-9\-_' ']+)$
    ResourceId:
      type: string
      minLength: 1
      maxLength: 64
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Tag for the Profile.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Key associated with the Tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: Value for the Tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    AssociateProfileResponse:
      type: object
      properties:
        ProfileAssociation:
          $ref: "#/components/schemas/ProfileAssociation"
          description: The association that you just created. The association has an ID that you can use to identify it in other requests, like update and delete.
    ProfileAssociation:
      description: An association between a Route 53 Profile and a VPC.
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/Rfc3339Timestamp"
          description: The date and time that the Profile association was created, in Unix time format and Coordinated Universal Time (UTC).
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile association.
        ModificationTime:
          $ref: "#/components/schemas/Rfc3339Timestamp"
          description: The date and time that the Profile association was modified, in Unix time format and Coordinated Universal Time (UTC).
        Name:
          $ref: "#/components/schemas/Name"
          description: Name of the Profile association.
        OwnerId:
          $ref: "#/components/schemas/AccountId"
          description: Amazon Web Services account ID of the Profile association owner.
        ProfileId:
          $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile.
        ResourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The Amazon Resource Name (ARN) of the VPC.
        Status:
          $ref: "#/components/schemas/ProfileStatus"
          description: Status of the Profile association.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: Additional information about the Profile association.
    Rfc3339Timestamp:
      type: string
      format: date-time
    AccountId:
      type: string
      minLength: 12
      maxLength: 32
    ProfileStatus:
      type: string
      enum:
        - COMPLETE
        - DELETING
        - UPDATING
        - CREATING
        - DELETED
        - FAILED
    String:
      type: string
    Arn:
      type: string
      minLength: 1
      maxLength: 255
    ResourceProperties:
      type: string
    AssociateResourceToProfileResponse:
      type: object
      properties:
        ProfileResourceAssociation:
          $ref: "#/components/schemas/ProfileResourceAssociation"
          description: Infromation about the AssociateResourceToProfile, including a status message.
    ProfileResourceAssociation:
      description: The association between a Route 53 Profile and resources.
      type: object
      properties:
        CreationTime:
          $ref: "#/components/schemas/Rfc3339Timestamp"
          description: The date and time that the Profile resource association was created, in Unix time format and Coordinated Universal Time (UTC).
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile resource association.
        ModificationTime:
          $ref: "#/components/schemas/Rfc3339Timestamp"
          description: The date and time that the Profile resource association was modified, in Unix time format and Coordinated Universal Time (UTC).
        Name:
          $ref: "#/components/schemas/Name"
          description: Name of the Profile resource association.
        OwnerId:
          $ref: "#/components/schemas/AccountId"
          description: Amazon Web Services account ID of the Profile resource association owner.
        ProfileId:
          $ref: "#/components/schemas/ResourceId"
          description: Profile ID of the Profile that the resources are associated with.
        ResourceArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource association.
        ResourceProperties:
          $ref: "#/components/schemas/ResourceProperties"
          description: If the DNS resource is a DNS Firewall rule group, this indicates the priority.
        ResourceType:
          $ref: "#/components/schemas/String"
          description: Resource type, such as a private hosted zone, or DNS Firewall rule group.
        Status:
          $ref: "#/components/schemas/ProfileStatus"
          description: Status of the Profile resource association.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: Additional information about the Profile resource association.
    CreatorRequestId:
      type: string
      minLength: 1
      maxLength: 255
    CreateProfileResponse:
      type: object
      properties:
        Profile:
          $ref: "#/components/schemas/Profile"
          description: The Profile that you just created.
    Profile:
      description: A complex type that includes settings for a Route 53 Profile.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Profile.
        ClientToken:
          $ref: "#/components/schemas/CreatorRequestId"
          description: The ClientToken value that was assigned when the Profile was created.
        CreationTime:
          $ref: "#/components/schemas/Rfc3339Timestamp"
          description: The date and time that the Profile was created, in Unix time format and Coordinated Universal Time (UTC).
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile.
        ModificationTime:
          $ref: "#/components/schemas/Rfc3339Timestamp"
          description: The date and time that the Profile was modified, in Unix time format and Coordinated Universal Time (UTC).
        Name:
          $ref: "#/components/schemas/Name"
          description: Name of the Profile.
        OwnerId:
          $ref: "#/components/schemas/AccountId"
          description: Amazon Web Services account ID of the Profile owner.
        ShareStatus:
          $ref: "#/components/schemas/ShareStatus"
          description: Sharing status for the Profile.
        Status:
          $ref: "#/components/schemas/ProfileStatus"
          description: The status for the Profile.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: Status message that includes additiona information about the Profile.
    ShareStatus:
      type: string
      enum:
        - NOT_SHARED
        - SHARED_WITH_ME
        - SHARED_BY_ME
    DeleteProfileResponse:
      type: object
      properties:
        Profile:
          $ref: "#/components/schemas/Profile"
          description: Information about the DeleteProfile request, including the status of the request.
    DisassociateProfileResponse:
      type: object
      properties:
        ProfileAssociation:
          $ref: "#/components/schemas/ProfileAssociation"
          description: Information about the DisassociateProfile request.
    DisassociateResourceFromProfileResponse:
      type: object
      properties:
        ProfileResourceAssociation:
          $ref: "#/components/schemas/ProfileResourceAssociation"
          description: Information about the DisassociateResourceFromProfile request, including the status of the request.
    GetProfileResponse:
      type: object
      properties:
        Profile:
          $ref: "#/components/schemas/Profile"
          description: Information about the Profile, including the status of the Profile.
    GetProfileAssociationResponse:
      type: object
      properties:
        ProfileAssociation:
          $ref: "#/components/schemas/ProfileAssociation"
          description: Information about the Profile association that you specified in a GetProfileAssociation request.
    GetProfileResourceAssociationResponse:
      type: object
      properties:
        ProfileResourceAssociation:
          $ref: "#/components/schemas/ProfileResourceAssociation"
          description: Information about the Profile resource association that you specified in a GetProfileResourceAssociation request.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    NextToken:
      type: string
    ListProfileAssociationsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If more than MaxResults profile associations match the specified criteria, you can submit another ListProfileAssociations request to get the next group of results. In the next request, specify the value of NextToken from the previous response.
        ProfileAssociations:
          $ref: "#/components/schemas/ProfileAssociations"
          description: A complex type that containts settings information about the profile's VPC associations.
    ProfileAssociations:
      type: array
      items:
        $ref: "#/components/schemas/ProfileAssociation"
    ListProfileResourceAssociationsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If more than MaxResults resource associations match the specified criteria, you can submit another ListProfileResourceAssociations request to get the next group of results. In the next request, specify the value of NextToken from the previous response.
        ProfileResourceAssociations:
          $ref: "#/components/schemas/ProfileResourceAssociations"
          description: Information about the profile resource association that you specified in a GetProfileResourceAssociation request.
    ProfileResourceAssociations:
      type: array
      items:
        $ref: "#/components/schemas/ProfileResourceAssociation"
    ListProfilesResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If more than MaxResults resource associations match the specified criteria, you can submit another ListProfiles request to get the next group of results. In the next request, specify the value of NextToken from the previous response.
        ProfileSummaries:
          $ref: "#/components/schemas/ProfileSummaryList"
          description: Summary information about the Profiles.
    ProfileSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ProfileSummary"
    ProfileSummary:
      description: Summary information about a Route 53 Profile.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the Profile.
        Id:
          $ref: "#/components/schemas/ResourceId"
          description: ID of the Profile.
        Name:
          $ref: "#/components/schemas/Name"
          description: Name of the Profile.
        ShareStatus:
          $ref: "#/components/schemas/ShareStatus"
          description: Share status of the Profile.
    ListTagsForResourceResponse:
      type: object
      properties:
        Tags:
          type: object
          properties: {}
          description: The tags that are associated with the resource that you specified in the ListTagsForResource request.
      required:
        - Tags
    TagMap:
      type: object
      properties: {}
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
    UpdateProfileResourceAssociationResponse:
      type: object
      properties:
        ProfileResourceAssociation:
          $ref: "#/components/schemas/ProfileResourceAssociation"
          description: Information about the UpdateProfileResourceAssociation request, including a status message.
  x-stackQL-resources:
    profiles:
      id: aws.route53profiles.profiles
      name: profiles
      title: profiles
      methods:
        associate_profile:
          operation:
            $ref: "#/paths/~1profileassociation/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        associate_resource_to_profile:
          operation:
            $ref: "#/paths/~1profileresourceassociation/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        create_profile:
          operation:
            $ref: "#/paths/~1profile/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_profile:
          operation:
            $ref: "#/paths/~1profile~1{profile_id}/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        get_profile:
          operation:
            $ref: "#/paths/~1profile~1{profile_id}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Profile
        disassociate_profile:
          operation:
            $ref: "#/paths/~1profileassociation~1Profileid~1{profile_id}~1resourceid~1{resource_id}/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        disassociate_resource_from_profile:
          operation:
