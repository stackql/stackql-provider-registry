      type: object
      properties:
        Baseline:
          $ref: "#/components/schemas/EvaluationMetric"
          description: The F1 score, precision, and recall metrics for the baseline model.
        AdapterVersion:
          $ref: "#/components/schemas/EvaluationMetric"
          description: The F1 score, precision, and recall metrics for the baseline model.
        FeatureType:
          $ref: "#/components/schemas/FeatureType"
          description: Indicates the feature type being analyzed by a given adapter version.
    EvaluationMetric:
      description: The evaluation metrics (F1 score, Precision, and Recall) for an adapter version.
      type: object
      properties:
        F1Score:
          $ref: "#/components/schemas/Float"
          description: The F1 score for an adapter version.
        Precision:
          $ref: "#/components/schemas/Float"
          description: The Precision score for an adapter version.
        Recall:
          $ref: "#/components/schemas/Float"
          description: The Recall score for an adapter version.
