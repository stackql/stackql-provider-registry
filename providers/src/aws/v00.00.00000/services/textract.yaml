openapi: 3.0.0
info:
  version: "2018-06-27"
  title: Amazon Textract
  description: Amazon Textract
  x-serviceName: textract
  x-serviceAlias: textract
  x-protocol: json
  x-apiVersion: "2018-06-27"
  x-endpointPrefix: textract
  x-targetPrefix: Textract
  x-jsonVersion: "1.1"
servers:
  - url: https://textract.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for textract
paths:
  /AnalyzeDocument:
    post:
      operationId: AnalyzeDocument
      description: "Analyzes an input document for relationships between detected items. The types of information returned are as follows: Form data (key-value pairs). The related information is returned in two Block objects, each of type KEY_VALUE_SET: a KEY Block object and a VALUE Block object. For example, Name: Ana Silva Carolina contains a key and value. Name: is the key. Ana Silva Carolina is the value. Table and table cell data. A TABLE Block object contains information about a detected table. A CELL Block object is returned for each cell in a table. Lines and words of text. A LINE Block object contains one or more WORD Block objects. All lines and words that are detected in the document are returned (including text that doesn't have a relationship with the value of FeatureTypes). Signatures. A SIGNATURE Block object contains the location information of a signature in a document. If used in conjunction with forms or tables, a signature can be given a Key-Value pairing or be detected in the cell of a table. Query. A QUERY Block object contains the query text, alias and link to the associated Query results block object. Query Result. A QUERY_RESULT Block object contains the answer to the query and an ID that connects it to the query asked. This Block also contains a confidence score. Selection elements such as check boxes and option buttons (radio buttons) can be detected in form data and in tables. A SELECTION_ELEMENT Block object contains information about a selection element, including the selection status. You can choose which type of analysis to perform by specifying the FeatureTypes list. The output is returned in a list of Block objects. AnalyzeDocument is a synchronous operation. To analyze documents asynchronously, use StartDocumentAnalysis. For more information, see Document Text Analysis."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.AnalyzeDocument
            default: Textract.AnalyzeDocument
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Document:
                  $ref: "#/components/schemas/Document"
                  description: The input document as base64-encoded bytes or an Amazon S3 object. If you use the AWS CLI to call Amazon Textract operations, you can't pass image bytes. The document must be an image in JPEG, PNG, PDF, or TIFF format. If you're using an AWS SDK to call Amazon Textract, you might not need to base64-encode image bytes that are passed using the Bytes field.
                FeatureTypes:
                  $ref: "#/components/schemas/FeatureTypes"
                  description: A list of the types of analysis to perform. Add TABLES to the list to return information about the tables that are detected in the input document. Add FORMS to return detected form data. Add SIGNATURES to return the locations of detected signatures. Add LAYOUT to the list to return information about the layout of the document. All lines and words detected in the document are included in the response (including text that isn't related to the value of FeatureTypes).
                HumanLoopConfig:
                  $ref: "#/components/schemas/HumanLoopConfig"
                  description: Sets the configuration for the human in the loop workflow for analyzing documents.
                QueriesConfig:
                  $ref: "#/components/schemas/QueriesConfig"
                  description: Contains Queries and the alias for those Queries, as determined by the input.
                AdaptersConfig:
                  $ref: "#/components/schemas/AdaptersConfig"
                  description: Specifies the adapter to be used when analyzing a document.
              required:
                - Document
                - FeatureTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeDocumentResponse"
  /AnalyzeExpense:
    post:
      operationId: AnalyzeExpense
      description: "AnalyzeExpense synchronously analyzes an input document for financially related relationships between text. Information is returned as ExpenseDocuments and seperated as follows: LineItemGroups- A data set containing LineItems which store information about the lines of text, such as an item purchased and its price on a receipt. SummaryFields- Contains all other information a receipt, such as header information or the vendors name."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.AnalyzeExpense
            default: Textract.AnalyzeExpense
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Document:
                  $ref: "#/components/schemas/Document"
              required:
                - Document
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeExpenseResponse"
  /AnalyzeID:
    post:
      operationId: AnalyzeID
      description: Analyzes identity documents for relevant information. This information is extracted and returned as IdentityDocumentFields, which records both the normalized field and value of the extracted text. Unlike other Amazon Textract operations, AnalyzeID doesn't return any Geometry data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.AnalyzeID
            default: Textract.AnalyzeID
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DocumentPages:
                  $ref: "#/components/schemas/DocumentPages"
                  description: The document being passed to AnalyzeID.
              required:
                - DocumentPages
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeIDResponse"
  /CreateAdapter:
    post:
      operationId: CreateAdapter
      description: Creates an adapter, which can be fine-tuned for enhanced performance on user provided documents. Takes an AdapterName and FeatureType. Currently the only supported feature type is QUERIES. You can also provide a Description, Tags, and a ClientRequestToken. You can choose whether or not the adapter should be AutoUpdated with the AutoUpdate argument. By default, AutoUpdate is set to DISABLED.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.CreateAdapter
            default: Textract.CreateAdapter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdapterName:
                  $ref: "#/components/schemas/AdapterName"
                  description: The name to be assigned to the adapter being created.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token is used to recognize the request. If the same token is used with multiple CreateAdapter requests, the same session is returned. This token is employed to avoid unintentionally creating the same session multiple times.
                Description:
                  $ref: "#/components/schemas/AdapterDescription"
                  description: The description to be assigned to the adapter being created.
                FeatureTypes:
                  $ref: "#/components/schemas/FeatureTypes"
                  description: "The type of feature that the adapter is being trained on. Currrenly, supported feature types are: QUERIES"
                AutoUpdate:
                  $ref: "#/components/schemas/AutoUpdate"
                  description: Controls whether or not the adapter should automatically update.
                Tags:
                  $ref: "#/components/schemas/TagMap"
                  description: A list of tags to be added to the adapter.
              required:
                - AdapterName
                - FeatureTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdapterResponse"
  /CreateAdapterVersion:
    post:
      operationId: CreateAdapterVersion
      description: Creates a new version of an adapter. Operates on a provided AdapterId and a specified dataset provided via the DatasetConfig argument. Requires that you specify an Amazon S3 bucket with the OutputConfig argument. You can provide an optional KMSKeyId, an optional ClientRequestToken, and optional tags.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.CreateAdapterVersion
            default: Textract.CreateAdapterVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdapterId:
                  $ref: "#/components/schemas/AdapterId"
                  description: A string containing a unique ID for the adapter that will receive a new version.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token is used to recognize the request. If the same token is used with multiple CreateAdapterVersion requests, the same session is returned. This token is employed to avoid unintentionally creating the same session multiple times.
                DatasetConfig:
                  $ref: "#/components/schemas/AdapterVersionDatasetConfig"
                  description: Specifies a dataset used to train a new adapter version. Takes a ManifestS3Object as the value.
                KMSKeyId:
                  $ref: "#/components/schemas/KMSKeyId"
                  description: The identifier for your AWS Key Management Service key (AWS KMS key). Used to encrypt your documents.
                OutputConfig:
                  $ref: "#/components/schemas/OutputConfig"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                  description: A set of tags (key-value pairs) that you want to attach to the adapter version.
              required:
                - AdapterId
                - DatasetConfig
                - OutputConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdapterVersionResponse"
  /DeleteAdapter:
    post:
      operationId: DeleteAdapter
      description: Deletes an Amazon Textract adapter. Takes an AdapterId and deletes the adapter specified by the ID.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.DeleteAdapter
            default: Textract.DeleteAdapter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdapterId:
                  $ref: "#/components/schemas/AdapterId"
                  description: A string containing a unique ID for the adapter to be deleted.
              required:
                - AdapterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAdapterResponse"
  /DeleteAdapterVersion:
    post:
      operationId: DeleteAdapterVersion
      description: Deletes an Amazon Textract adapter version. Requires that you specify both an AdapterId and a AdapterVersion. Deletes the adapter version specified by the AdapterId and the AdapterVersion.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.DeleteAdapterVersion
            default: Textract.DeleteAdapterVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdapterId:
                  $ref: "#/components/schemas/AdapterId"
                  description: A string containing a unique ID for the adapter version that will be deleted.
                AdapterVersion:
                  $ref: "#/components/schemas/AdapterVersion"
                  description: Specifies the adapter version to be deleted.
              required:
                - AdapterId
                - AdapterVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAdapterVersionResponse"
  /DetectDocumentText:
    post:
      operationId: DetectDocumentText
      description: "Detects text in the input document. Amazon Textract can detect lines of text and the words that make up a line of text. The input document must be in one of the following image formats: JPEG, PNG, PDF, or TIFF. DetectDocumentText returns the detected text in an array of Block objects. Each document page has as an associated Block of type PAGE. Each PAGE Block object is the parent of LINE Block objects that represent the lines of detected text on a page. A LINE Block object is a parent for each word that makes up the line. Words are represented by Block objects of type WORD. DetectDocumentText is a synchronous operation. To analyze documents asynchronously, use StartDocumentTextDetection. For more information, see Document Text Detection."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.DetectDocumentText
            default: Textract.DetectDocumentText
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Document:
                  $ref: "#/components/schemas/Document"
                  description: The input document as base64-encoded bytes or an Amazon S3 object. If you use the AWS CLI to call Amazon Textract operations, you can't pass image bytes. The document must be an image in JPEG or PNG format. If you're using an AWS SDK to call Amazon Textract, you might not need to base64-encode image bytes that are passed using the Bytes field.
              required:
                - Document
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectDocumentTextResponse"
  /GetAdapter:
    post:
      operationId: GetAdapter
      description: Gets configuration information for an adapter specified by an AdapterId, returning information on AdapterName, Description, CreationTime, AutoUpdate status, and FeatureTypes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetAdapter
            default: Textract.GetAdapter
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdapterId:
                  $ref: "#/components/schemas/AdapterId"
                  description: A string containing a unique ID for the adapter.
              required:
                - AdapterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdapterResponse"
  /GetAdapterVersion:
    post:
      operationId: GetAdapterVersion
      description: "Gets configuration information for the specified adapter version, including: AdapterId, AdapterVersion, FeatureTypes, Status, StatusMessage, DatasetConfig, KMSKeyId, OutputConfig, Tags and EvaluationMetrics."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetAdapterVersion
            default: Textract.GetAdapterVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdapterId:
                  $ref: "#/components/schemas/AdapterId"
                  description: A string specifying a unique ID for the adapter version you want to retrieve information for.
                AdapterVersion:
                  $ref: "#/components/schemas/AdapterVersion"
                  description: A string specifying the adapter version you want to retrieve information for.
              required:
                - AdapterId
                - AdapterVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdapterVersionResponse"
  /GetDocumentAnalysis:
    post:
      operationId: GetDocumentAnalysis
      description: "Gets the results for an Amazon Textract asynchronous operation that analyzes text in a document. You start asynchronous text analysis by calling StartDocumentAnalysis, which returns a job identifier (JobId). When the text analysis operation finishes, Amazon Textract publishes a completion status to the Amazon Simple Notification Service (Amazon SNS) topic that's registered in the initial call to StartDocumentAnalysis. To get the results of the text-detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetDocumentAnalysis, and pass the job identifier (JobId) from the initial call to StartDocumentAnalysis. GetDocumentAnalysis returns an array of Block objects. The following types of information are returned: Form data (key-value pairs). The related information is returned in two Block objects, each of type KEY_VALUE_SET: a KEY Block object and a VALUE Block object. For example, Name: Ana Silva Carolina contains a key and value. Name: is the key. Ana Silva Carolina is the value. Table and table cell data. A TABLE Block object contains information about a detected table. A CELL Block object is returned for each cell in a table. Lines and words of text. A LINE Block object contains one or more WORD Block objects. All lines and words that are detected in the document are returned (including text that doesn't have a relationship with the value of the StartDocumentAnalysis FeatureTypes input parameter). Query. A QUERY Block object contains the query text, alias and link to the associated Query results block object. Query Results. A QUERY_RESULT Block object contains the answer to the query and an ID that connects it to the query asked. This Block also contains a confidence score. While processing a document with queries, look out for INVALID_REQUEST_PARAMETERS output. This indicates that either the per page query limit has been exceeded or that the operation is trying to query a page in the document which doesn’t exist. Selection elements such as check boxes and option buttons (radio buttons) can be detected in form data and in tables. A SELECTION_ELEMENT Block object contains information about a selection element, including the selection status. Use the MaxResults parameter to limit the number of blocks that are returned. If there are more results than specified in MaxResults, the value of NextToken in the operation response contains a pagination token for getting the next set of results. To get the next page of results, call GetDocumentAnalysis, and populate the NextToken request parameter with the token value that's returned from the previous call to GetDocumentAnalysis. For more information, see Document Text Analysis."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetDocumentAnalysis
            default: Textract.GetDocumentAnalysis
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: A unique identifier for the text-detection job. The JobId is returned from StartDocumentAnalysis. A JobId value is only valid for 7 days.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return per paginated call. The largest value that you can specify is 1,000. If you specify a value greater than 1,000, a maximum of 1,000 results is returned. The default value is 1,000.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: If the previous response was incomplete (because there are more blocks to retrieve), Amazon Textract returns a pagination token in the response. You can use this pagination token to retrieve the next set of blocks.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDocumentAnalysisResponse"
  /GetDocumentTextDetection:
    post:
      operationId: GetDocumentTextDetection
      description: Gets the results for an Amazon Textract asynchronous operation that detects text in a document. Amazon Textract can detect lines of text and the words that make up a line of text. You start asynchronous text detection by calling StartDocumentTextDetection, which returns a job identifier (JobId). When the text detection operation finishes, Amazon Textract publishes a completion status to the Amazon Simple Notification Service (Amazon SNS) topic that's registered in the initial call to StartDocumentTextDetection. To get the results of the text-detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetDocumentTextDetection, and pass the job identifier (JobId) from the initial call to StartDocumentTextDetection. GetDocumentTextDetection returns an array of Block objects. Each document page has as an associated Block of type PAGE. Each PAGE Block object is the parent of LINE Block objects that represent the lines of detected text on a page. A LINE Block object is a parent for each word that makes up the line. Words are represented by Block objects of type WORD. Use the MaxResults parameter to limit the number of blocks that are returned. If there are more results than specified in MaxResults, the value of NextToken in the operation response contains a pagination token for getting the next set of results. To get the next page of results, call GetDocumentTextDetection, and populate the NextToken request parameter with the token value that's returned from the previous call to GetDocumentTextDetection. For more information, see Document Text Detection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetDocumentTextDetection
            default: Textract.GetDocumentTextDetection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: A unique identifier for the text detection job. The JobId is returned from StartDocumentTextDetection. A JobId value is only valid for 7 days.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return per paginated call. The largest value you can specify is 1,000. If you specify a value greater than 1,000, a maximum of 1,000 results is returned. The default value is 1,000.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: If the previous response was incomplete (because there are more blocks to retrieve), Amazon Textract returns a pagination token in the response. You can use this pagination token to retrieve the next set of blocks.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDocumentTextDetectionResponse"
  /GetExpenseAnalysis:
    post:
      operationId: GetExpenseAnalysis
      description: Gets the results for an Amazon Textract asynchronous operation that analyzes invoices and receipts. Amazon Textract finds contact information, items purchased, and vendor name, from input invoices and receipts. You start asynchronous invoice/receipt analysis by calling StartExpenseAnalysis, which returns a job identifier (JobId). Upon completion of the invoice/receipt analysis, Amazon Textract publishes the completion status to the Amazon Simple Notification Service (Amazon SNS) topic. This topic must be registered in the initial call to StartExpenseAnalysis. To get the results of the invoice/receipt analysis operation, first ensure that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetExpenseAnalysis, and pass the job identifier (JobId) from the initial call to StartExpenseAnalysis. Use the MaxResults parameter to limit the number of blocks that are returned. If there are more results than specified in MaxResults, the value of NextToken in the operation response contains a pagination token for getting the next set of results. To get the next page of results, call GetExpenseAnalysis, and populate the NextToken request parameter with the token value that's returned from the previous call to GetExpenseAnalysis. For more information, see Analyzing Invoices and Receipts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetExpenseAnalysis
            default: Textract.GetExpenseAnalysis
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: A unique identifier for the text detection job. The JobId is returned from StartExpenseAnalysis. A JobId value is only valid for 7 days.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return per paginated call. The largest value you can specify is 20. If you specify a value greater than 20, a maximum of 20 results is returned. The default value is 20.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: If the previous response was incomplete (because there are more blocks to retrieve), Amazon Textract returns a pagination token in the response. You can use this pagination token to retrieve the next set of blocks.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExpenseAnalysisResponse"
  /GetLendingAnalysis:
    post:
      operationId: GetLendingAnalysis
      description: Gets the results for an Amazon Textract asynchronous operation that analyzes text in a lending document. You start asynchronous text analysis by calling StartLendingAnalysis, which returns a job identifier (JobId). When the text analysis operation finishes, Amazon Textract publishes a completion status to the Amazon Simple Notification Service (Amazon SNS) topic that's registered in the initial call to StartLendingAnalysis. To get the results of the text analysis operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetLendingAnalysis, and pass the job identifier (JobId) from the initial call to StartLendingAnalysis.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetLendingAnalysis
            default: Textract.GetLendingAnalysis
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: A unique identifier for the lending or text-detection job. The JobId is returned from StartLendingAnalysis. A JobId value is only valid for 7 days.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return per paginated call. The largest value that you can specify is 30. If you specify a value greater than 30, a maximum of 30 results is returned. The default value is 30.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: If the previous response was incomplete, Amazon Textract returns a pagination token in the response. You can use this pagination token to retrieve the next set of lending results.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLendingAnalysisResponse"
  /GetLendingAnalysisSummary:
    post:
      operationId: GetLendingAnalysisSummary
      description: Gets summarized results for the StartLendingAnalysis operation, which analyzes text in a lending document. The returned summary consists of information about documents grouped together by a common document type. Information like detected signatures, page numbers, and split documents is returned with respect to the type of grouped document. You start asynchronous text analysis by calling StartLendingAnalysis, which returns a job identifier (JobId). When the text analysis operation finishes, Amazon Textract publishes a completion status to the Amazon Simple Notification Service (Amazon SNS) topic that's registered in the initial call to StartLendingAnalysis. To get the results of the text analysis operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetLendingAnalysisSummary, and pass the job identifier (JobId) from the initial call to StartLendingAnalysis.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.GetLendingAnalysisSummary
            default: Textract.GetLendingAnalysisSummary
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: A unique identifier for the lending or text-detection job. The JobId is returned from StartLendingAnalysis. A JobId value is only valid for 7 days.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLendingAnalysisSummaryResponse"
  /ListAdapterVersions:
    post:
      operationId: ListAdapterVersions
      description: List all version of an adapter that meet the specified filtration criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Textract.ListAdapterVersions
            default: Textract.ListAdapterVersions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
