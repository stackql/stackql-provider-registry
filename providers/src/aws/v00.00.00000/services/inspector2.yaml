          $ref: "#/components/schemas/StringFilterList"
          description: Filters the list of Amazon Web Services Lambda functions by the runtime environment for the Lambda function.
        lambdaFunctionLastModifiedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: Filters the list of Amazon Web Services Lambda functions by the date and time that a user last updated the configuration, in ISO 8601 format
        lambdaFunctionExecutionRoleArn:
          $ref: "#/components/schemas/StringFilterList"
          description: Filters the list of Amazon Web Services Lambda functions by execution role.
