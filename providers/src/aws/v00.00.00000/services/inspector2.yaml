          $ref: "#/components/schemas/StringFilterList"
          description: Filters the list of Amazon Web Services Lambda functions by the name of the function.
        lambdaFunctionLayers:
          $ref: "#/components/schemas/StringFilterList"
          description: Filters the list of Amazon Web Services Lambda functions by the function's layers. A Lambda function can have up to five layers.
