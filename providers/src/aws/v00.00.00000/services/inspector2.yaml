openapi: 3.0.0
info:
  version: "2020-06-08"
  title: Inspector2
  description: Inspector2
  x-serviceName: inspector2
  x-serviceAlias: inspector2
  x-protocol: rest-json
  x-apiVersion: "2020-06-08"
  x-endpointPrefix: inspector2
servers:
  - url: https://inspector2.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for inspector2
paths:
  /members/associate:
    post:
      operationId: AssociateMember
      description: Associates an Amazon Web Services account with an Amazon Inspector delegated administrator. An HTTP 200 response indicates the association was successfully started, but doesn’t indicate whether it was completed. You can check if the association completed by using ListMembers for multiple accounts or GetMembers for a single account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - accountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMemberResponse"
  /codesecurity/scan-configuration/batch/associate:
    post:
      operationId: BatchAssociateCodeSecurityScanConfiguration
      description: Associates multiple code repositories with an Amazon Inspector code security scan configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                associateConfigurationRequests:
                  $ref: "#/components/schemas/AssociateConfigurationRequestList"
              required:
                - associateConfigurationRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateCodeSecurityScanConfigurationResponse"
  /codesecurity/scan-configuration/batch/disassociate:
    post:
      operationId: BatchDisassociateCodeSecurityScanConfiguration
      description: Disassociates multiple code repositories from an Amazon Inspector code security scan configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                disassociateConfigurationRequests:
                  $ref: "#/components/schemas/DisassociateConfigurationRequestList"
              required:
                - disassociateConfigurationRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateCodeSecurityScanConfigurationResponse"
  /status/batch/get:
    post:
      operationId: BatchGetAccountStatus
      description: Retrieves the Amazon Inspector status of multiple Amazon Web Services accounts within your environment.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIdSet"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAccountStatusResponse"
  /codesnippet/batchget:
    post:
      operationId: BatchGetCodeSnippet
      description: Retrieves code snippets from findings that Amazon Inspector detected code vulnerabilities in.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                findingArns:
                  $ref: "#/components/schemas/BatchGetCodeSnippetRequestFindingArnsList"
              required:
                - findingArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCodeSnippetResponse"
  /findings/details/batch/get:
    post:
      operationId: BatchGetFindingDetails
      description: Gets vulnerability details for findings.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                findingArns:
                  $ref: "#/components/schemas/FindingArnList"
              required:
                - findingArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetFindingDetailsResponse"
  /freetrialinfo/batchget:
    post:
      operationId: BatchGetFreeTrialInfo
      description: Gets free trial status for multiple Amazon Web Services accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/BatchGetFreeTrialInfoRequestAccountIdsList"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetFreeTrialInfoResponse"
  /ec2deepinspectionstatus/member/batch/get:
    post:
      operationId: BatchGetMemberEc2DeepInspectionStatus
      description: Retrieves Amazon Inspector deep inspection activation status of multiple member accounts within your organization. You must be the delegated administrator of an organization in Amazon Inspector to use this API.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIdSet"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetMemberEc2DeepInspectionStatusResponse"
  /ec2deepinspectionstatus/member/batch/update:
    post:
      operationId: BatchUpdateMemberEc2DeepInspectionStatus
      description: Activates or deactivates Amazon Inspector deep inspection for the provided member accounts in your organization. You must be the delegated administrator of an organization in Amazon Inspector to use this API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/MemberAccountEc2DeepInspectionStatusList"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateMemberEc2DeepInspectionStatusResponse"
  /reporting/cancel:
    post:
      operationId: CancelFindingsReport
      description: Cancels the given findings report.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reportId:
                  $ref: "#/components/schemas/ReportId"
              required:
                - reportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelFindingsReportResponse"
  /sbomexport/cancel:
    post:
      operationId: CancelSbomExport
      description: Cancels a software bill of materials (SBOM) report.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reportId:
                  $ref: "#/components/schemas/ReportId"
              required:
                - reportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSbomExportResponse"
  /cis/scan-configuration/create:
    post:
      operationId: CreateCisScanConfiguration
      description: Creates a CIS scan configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanName:
                  $ref: "#/components/schemas/CisScanName"
                securityLevel:
                  $ref: "#/components/schemas/CisSecurityLevel"
                schedule:
                  $ref: "#/components/schemas/Schedule"
                targets:
                  $ref: "#/components/schemas/CreateCisTargets"
                tags:
                  $ref: "#/components/schemas/CisTagMap"
              required:
                - scanName
                - securityLevel
                - schedule
                - targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCisScanConfigurationResponse"
  /codesecurity/integration/create:
    post:
      operationId: CreateCodeSecurityIntegration
      description: Creates a code security integration with a source code repository provider. After calling the CreateCodeSecurityIntegration operation, you complete authentication and authorization with your provider. Next you call the UpdateCodeSecurityIntegration operation to provide the details to complete the integration setup
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/IntegrationName"
                type:
                  $ref: "#/components/schemas/IntegrationType"
                details:
                  $ref: "#/components/schemas/CreateIntegrationDetail"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeSecurityIntegrationResponse"
  /codesecurity/scan-configuration/create:
    post:
      operationId: CreateCodeSecurityScanConfiguration
      description: Creates a scan configuration for code security scanning.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ScanConfigurationName"
                level:
                  $ref: "#/components/schemas/ConfigurationLevel"
                configuration:
                  $ref: "#/components/schemas/CodeSecurityScanConfiguration"
                scopeSettings:
                  $ref: "#/components/schemas/ScopeSettings"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - level
                - configuration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCodeSecurityScanConfigurationResponse"
  /filters/create:
    post:
      operationId: CreateFilter
      description: Creates a filter resource using specified filter criteria. When the filter action is set to SUPPRESS this action creates a suppression rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  $ref: "#/components/schemas/FilterAction"
                description:
                  $ref: "#/components/schemas/FilterDescription"
                filterCriteria:
                  $ref: "#/components/schemas/FilterCriteria"
                name:
                  $ref: "#/components/schemas/FilterName"
                tags:
                  $ref: "#/components/schemas/TagMap"
                reason:
                  $ref: "#/components/schemas/FilterReason"
              required:
                - action
                - filterCriteria
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFilterResponse"
  /reporting/create:
    post:
      operationId: CreateFindingsReport
      description: Creates a finding report. By default only ACTIVE findings are returned in the report. To see SUPRESSED or CLOSED findings you must specify a value for the findingStatus filter criteria.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filterCriteria:
                  $ref: "#/components/schemas/FilterCriteria"
                reportFormat:
                  $ref: "#/components/schemas/ReportFormat"
                s3Destination:
                  $ref: "#/components/schemas/Destination"
              required:
                - reportFormat
                - s3Destination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFindingsReportResponse"
  /sbomexport/create:
    post:
      operationId: CreateSbomExport
      description: Creates a software bill of materials (SBOM) report.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceFilterCriteria:
                  $ref: "#/components/schemas/ResourceFilterCriteria"
                reportFormat:
                  $ref: "#/components/schemas/SbomReportFormat"
                s3Destination:
                  $ref: "#/components/schemas/Destination"
              required:
                - reportFormat
                - s3Destination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSbomExportResponse"
  /cis/scan-configuration/delete:
    post:
      operationId: DeleteCisScanConfiguration
      description: Deletes a CIS scan configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanConfigurationArn:
                  $ref: "#/components/schemas/CisScanConfigurationArn"
              required:
                - scanConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCisScanConfigurationResponse"
  /codesecurity/integration/delete:
    post:
      operationId: DeleteCodeSecurityIntegration
      description: Deletes a code security integration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                integrationArn:
                  $ref: "#/components/schemas/CodeSecurityIntegrationArn"
              required:
                - integrationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCodeSecurityIntegrationResponse"
  /codesecurity/scan-configuration/delete:
    post:
      operationId: DeleteCodeSecurityScanConfiguration
      description: Deletes a code security scan configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanConfigurationArn:
                  $ref: "#/components/schemas/ScanConfigurationArn"
              required:
                - scanConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCodeSecurityScanConfigurationResponse"
  /filters/delete:
    post:
      operationId: DeleteFilter
      description: Deletes a filter resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/FilterArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFilterResponse"
  /organizationconfiguration/describe:
    post:
      operationId: DescribeOrganizationConfiguration
      description: Describe Amazon Inspector configuration settings for an Amazon Web Services organization.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOrganizationConfigurationResponse"
  /disable:
    post:
      operationId: Disable
      description: Disables Amazon Inspector scans for one or more Amazon Web Services accounts. Disabling all scan types in an account disables the Amazon Inspector service.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIdSet"
                resourceTypes:
                  $ref: "#/components/schemas/DisableResourceTypeList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableResponse"
  /delegatedadminaccounts/disable:
    post:
      operationId: DisableDelegatedAdminAccount
      description: Disables the Amazon Inspector delegated administrator for your organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delegatedAdminAccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - delegatedAdminAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableDelegatedAdminAccountResponse"
  /members/disassociate:
    post:
      operationId: DisassociateMember
      description: Disassociates a member account from an Amazon Inspector delegated administrator.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - accountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateMemberResponse"
  /enable:
    post:
      operationId: Enable
      description: Enables Amazon Inspector scans for one or more Amazon Web Services accounts.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AccountIdSet"
                resourceTypes:
                  $ref: "#/components/schemas/EnableResourceTypeList"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - resourceTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableResponse"
  /delegatedadminaccounts/enable:
    post:
      operationId: EnableDelegatedAdminAccount
      description: Enables the Amazon Inspector delegated administrator for your Organizations organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delegatedAdminAccountId:
                  $ref: "#/components/schemas/AccountId"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - delegatedAdminAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableDelegatedAdminAccountResponse"
  /cis/scan/report/get:
    post:
      operationId: GetCisScanReport
      description: Retrieves a CIS scan report.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanArn:
                  $ref: "#/components/schemas/CisScanArn"
                targetAccounts:
                  $ref: "#/components/schemas/ReportTargetAccounts"
                reportFormat:
                  $ref: "#/components/schemas/CisReportFormat"
              required:
                - scanArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCisScanReportResponse"
  /cis/scan-result/details/get:
    post:
      operationId: GetCisScanResultDetails
      description: Retrieves CIS scan result details.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanArn:
                  $ref: "#/components/schemas/CisScanArn"
                targetResourceId:
                  $ref: "#/components/schemas/ResourceId"
                accountId:
                  $ref: "#/components/schemas/AccountId"
                filterCriteria:
                  $ref: "#/components/schemas/CisScanResultDetailsFilterCriteria"
                sortBy:
                  $ref: "#/components/schemas/CisScanResultDetailsSortBy"
                sortOrder:
                  $ref: "#/components/schemas/CisSortOrder"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/GetCisScanResultDetailsMaxResults"
              required:
                - scanArn
                - targetResourceId
                - accountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCisScanResultDetailsResponse"
  /cluster/get:
    post:
      operationId: GetClustersForImage
      description: Returns a list of clusters and metadata associated with an image.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/ClusterForImageFilterCriteria"
                maxResults:
                  $ref: "#/components/schemas/GetClustersForImageRequestMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/GetClustersForImageNextToken"
              required:
                - filter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClustersForImageResponse"
  /codesecurity/integration/get:
    post:
      operationId: GetCodeSecurityIntegration
      description: Retrieves information about a code security integration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                integrationArn:
                  $ref: "#/components/schemas/CodeSecurityIntegrationArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - integrationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCodeSecurityIntegrationResponse"
  /codesecurity/scan/get:
    post:
      operationId: GetCodeSecurityScan
      description: Retrieves information about a specific code security scan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resource:
                  $ref: "#/components/schemas/CodeSecurityResource"
                scanId:
                  $ref: "#/components/schemas/CodeSecurityUuid"
              required:
                - resource
                - scanId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCodeSecurityScanResponse"
  /codesecurity/scan-configuration/get:
    post:
      operationId: GetCodeSecurityScanConfiguration
      description: Retrieves information about a code security scan configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scanConfigurationArn:
                  $ref: "#/components/schemas/ScanConfigurationArn"
              required:
                - scanConfigurationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCodeSecurityScanConfigurationResponse"
  /configuration/get:
    post:
      operationId: GetConfiguration
      description: Retrieves setting configurations for Inspector scans.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationResponse"
  /delegatedadminaccounts/get:
    post:
      operationId: GetDelegatedAdminAccount
      description: Retrieves information about the Amazon Inspector delegated administrator for your organization.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDelegatedAdminAccountResponse"
  /ec2deepinspectionconfiguration/get:
    post:
      operationId: GetEc2DeepInspectionConfiguration
      description: Retrieves the activation status of Amazon Inspector deep inspection and custom paths associated with your account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEc2DeepInspectionConfigurationResponse"
  /encryptionkey/get:
    get:
      operationId: GetEncryptionKey
      description: Gets an encryption key.
      parameters:
        - name: scanType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ScanType"
          description: The scan type the key encrypts.
        - name: resourceType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The resource type the key encrypts.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEncryptionKeyResponse"
  /reporting/status/get:
    post:
      operationId: GetFindingsReportStatus
      description: Gets the status of a findings report.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reportId:
                  $ref: "#/components/schemas/ReportId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingsReportStatusResponse"
  /members/get:
    post:
      operationId: GetMember
      description: Gets member information for your organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - accountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMemberResponse"
  /sbomexport/get:
    post:
      operationId: GetSbomExport
      description: Gets details of a software bill of materials (SBOM) report.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reportId:
                  $ref: "#/components/schemas/ReportId"
              required:
                - reportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSbomExportResponse"
  /accountpermissions/list:
    post:
      operationId: ListAccountPermissions
      description: Lists the permissions an account has to configure Amazon Inspector. If the account is a member account or standalone account with resources managed by an Organizations policy, the operation returns fewer permissions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
