          description: Configuration settings for periodic scans that run on a scheduled basis.
        continuousIntegrationScanConfiguration:
          $ref: "#/components/schemas/ContinuousIntegrationScanConfiguration"
          description: Configuration settings for continuous integration scans that run automatically when code changes are made.
        ruleSetCategories:
          $ref: "#/components/schemas/RuleSetCategories"
          description: The categories of security rules to be applied during the scan.
