          $ref: "#/components/schemas/PeriodicScanFrequency"
          description: The frequency at which periodic scans are performed (such as weekly or monthly). If you don't provide the frequencyExpression Amazon Inspector chooses day for the scan to run. If you provide the frequencyExpression, the schedule must match the specified frequency.
        frequencyExpression:
          $ref: "#/components/schemas/FrequencyExpression"
          description: The schedule expression for periodic scans, in cron format.
