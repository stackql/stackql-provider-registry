openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Backup Search
  description: AWS Backup Search
  x-serviceName: backup-search
  x-serviceAlias: backupsearch
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: backup-search
servers:
  - url: https://backup-search.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for backupsearch
paths:
  /search-jobs/{search_job_identifier}:
    get:
      operationId: GetSearchJob
      description: This operation retrieves metadata of a search job, including its progress.
      parameters:
        - name: search_job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericId"
          description: Required unique string that specifies the search job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSearchJobOutput"
  /export-search-jobs/{export_job_identifier}:
    get:
      operationId: GetSearchResultExportJob
      description: This operation retrieves the metadata of an export job. An export job is an operation that transmits the results of a search job to a specified S3 bucket in a .csv file. An export job allows you to retain results of a search beyond the search job's scheduled retention of 7 days.
      parameters:
        - name: export_job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericId"
          description: This is the unique string that identifies a specific export job. Required for this operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSearchResultExportJobOutput"
  /search-jobs/{search_job_identifier}/backups:
    get:
      operationId: ListSearchJobBackups
      description: This operation returns a list of all backups (recovery points) in a paginated format that were included in the search job. If a search does not display an expected backup in the results, you can call this operation to display each backup included in the search. Any backups that were not included because they have a FAILED status from a permissions issue will be displayed, along with a status message. Only recovery points with a backup index that has a status of ACTIVE will be included in search results. If the index has any other status, its status will be displayed along with a status message.
      parameters:
        - name: search_job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericId"
          description: The unique string that specifies the search job.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned backups included in a search job. For example, if a request is made to return MaxResults number of backups, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSearchJobBackupsInputMaxResultsInteger"
          description: The maximum number of resource list items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSearchJobBackupsOutput"
  /search-jobs/{search_job_identifier}/search-results:
    get:
      operationId: ListSearchJobResults
      description: This operation returns a list of a specified search job.
      parameters:
        - name: search_job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericId"
          description: The unique string that specifies the search job.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned search job results. For example, if a request is made to return MaxResults number of search job results, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSearchJobResultsInputMaxResultsInteger"
          description: The maximum number of resource list items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSearchJobResultsOutput"
  /search-jobs:
    get:
      operationId: ListSearchJobs
      description: This operation returns a list of search jobs belonging to an account.
      parameters:
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SearchJobState"
          description: Include this parameter to filter list by search job status.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned search jobs. For example, if a request is made to return MaxResults number of backups, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSearchJobsInputMaxResultsInteger"
          description: The maximum number of resource list items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSearchJobsOutput"
    put:
      operationId: StartSearchJob
      description: This operation creates a search job which returns recovery points filtered by SearchScope and items filtered by ItemFilters. You can optionally include ClientToken, EncryptionKeyArn, Name, and/or Tags.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Name:
                  $ref: "#/components/schemas/StartSearchJobInputNameString"
                EncryptionKeyArn:
                  $ref: "#/components/schemas/EncryptionKeyArn"
                ClientToken:
                  $ref: "#/components/schemas/String"
                SearchScope:
                  $ref: "#/components/schemas/SearchScope"
                ItemFilters:
                  $ref: "#/components/schemas/ItemFilters"
              required:
                - SearchScope
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSearchJobOutput"
  /export-search-jobs:
    get:
      operationId: ListSearchResultExportJobs
      description: This operation exports search results of a search job to a specified destination S3 bucket.
      parameters:
        - name: Status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExportJobStatus"
          description: The search jobs to be included in the export job can be filtered by including this parameter.
        - name: SearchJobIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericId"
          description: The unique string that specifies the search job.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned backups included in a search job. For example, if a request is made to return MaxResults number of backups, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSearchResultExportJobsInputMaxResultsInteger"
          description: The maximum number of resource list items to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSearchResultExportJobsOutput"
    put:
      operationId: StartSearchResultExportJob
      description: This operations starts a job to export the results of search job to a designated S3 bucket.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SearchJobIdentifier:
                  $ref: "#/components/schemas/GenericId"
                ExportSpecification:
                  $ref: "#/components/schemas/ExportSpecification"
                ClientToken:
                  $ref: "#/components/schemas/String"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                RoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
              required:
                - SearchJobIdentifier
                - ExportSpecification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSearchResultExportJobOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: This operation returns the tags for a resource type.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the resource.>
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: This operation puts tags on the resource you indicate.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the resource. This is the resource that will have the indicated tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: This operation removes tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the resource where you want to remove tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: This required parameter contains the tag keys you want to remove from the source.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /search-jobs/{search_job_identifier}/actions/cancel:
    put:
      operationId: StopSearchJob
      description: This operations ends a search job. Only a search job with a status of RUNNING can be stopped.
      parameters:
        - name: search_job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenericId"
          description: The unique string that specifies the search job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopSearchJobOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GenericId:
      type: string
    GetSearchJobOutput:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Returned name of the specified search job.
        SearchScopeSummary:
          $ref: "#/components/schemas/SearchScopeSummary"
          description: "Returned summary of the specified search job scope, including: TotalBackupsToScanCount, the number of recovery points returned by the search. TotalItemsToScanCount, the number of items returned by the search."
        CurrentSearchProgress:
          $ref: "#/components/schemas/CurrentSearchProgress"
          description: Returns numbers representing BackupsScannedCount, ItemsScanned, and ItemsMatched.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: A status message will be returned for either a earch job with a status of ERRORED or a status of COMPLETED jobs with issues. For example, a message may say that a search contained recovery points unable to be scanned because of a permissions issue.
        EncryptionKeyArn:
          $ref: "#/components/schemas/EncryptionKeyArn"
          description: "The encryption key for the specified search job. Example: arn:aws:kms:us-west-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab."
        CompletionTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that a search job completed, in Unix format and Coordinated Universal Time (UTC). The value of CompletionTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        Status:
          $ref: "#/components/schemas/SearchJobState"
          description: "The current status of the specified search job. A search job may have one of the following statuses: RUNNING; COMPLETED; STOPPED; FAILED; TIMED_OUT; or EXPIRED ."
        SearchScope:
          $ref: "#/components/schemas/SearchScope"
          description: The search scope is all backup properties input into a search.
        ItemFilters:
          $ref: "#/components/schemas/ItemFilters"
          description: Item Filters represent all input item properties specified when the search was created.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that a search job was created, in Unix format and Coordinated Universal Time (UTC). The value of CompletionTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        SearchJobIdentifier:
          $ref: "#/components/schemas/GenericId"
          description: The unique string that identifies the specified search job.
        SearchJobArn:
          $ref: "#/components/schemas/SearchJobArn"
          description: The unique string that identifies the Amazon Resource Name (ARN) of the specified search job.
      required:
        - Status
        - SearchScope
        - ItemFilters
        - CreationTime
        - SearchJobIdentifier
        - SearchJobArn
    String:
      type: string
    SearchScopeSummary:
      description: "The summary of the specified search job scope, including: TotalBackupsToScanCount, the number of recovery points returned by the search. TotalItemsToScanCount, the number of items returned by the search."
      type: object
      properties:
        TotalRecoveryPointsToScanCount:
          $ref: "#/components/schemas/Integer"
          description: This is the count of the total number of backups that will be scanned in a search.
        TotalItemsToScanCount:
          $ref: "#/components/schemas/Long"
          description: This is the count of the total number of items that will be scanned in a search.
    Integer:
      type: integer
    Long:
      type: integer
      format: int64
    CurrentSearchProgress:
      description: This contains information results retrieved from a search job that may not have completed.
      type: object
      properties:
        RecoveryPointsScannedCount:
          $ref: "#/components/schemas/Integer"
          description: This number is the sum of all backups that have been scanned so far during a search job.
        ItemsScannedCount:
          $ref: "#/components/schemas/Long"
          description: This number is the sum of all items that have been scanned so far during a search job.
        ItemsMatchedCount:
          $ref: "#/components/schemas/Long"
          description: This number is the sum of all items that match the item filters in a search job in progress.
    EncryptionKeyArn:
      type: string
    Timestamp:
      type: string
      format: date-time
    SearchJobState:
      type: string
      enum:
        - RUNNING
        - COMPLETED
        - STOPPING
        - STOPPED
        - FAILED
    SearchScope:
      description: The search scope is all backup properties input into a search.
      type: object
      properties:
        BackupResourceTypes:
          $ref: "#/components/schemas/ResourceTypeList"
          description: The resource types included in a search. Eligible resource types include S3 and EBS.
        BackupResourceCreationTime:
          $ref: "#/components/schemas/BackupCreationTimeFilter"
          description: This is the time a backup resource was created.
        SourceResourceArns:
          $ref: "#/components/schemas/ResourceArnList"
          description: The Amazon Resource Name (ARN) that uniquely identifies the source resources.
        BackupResourceArns:
          $ref: "#/components/schemas/RecoveryPointArnList"
          description: The Amazon Resource Name (ARN) that uniquely identifies the backup resources.
        BackupResourceTags:
          type: object
          properties: {}
          description: These are one or more tags on the backup (recovery point).
      required:
        - BackupResourceTypes
    ResourceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceType:
      type: string
      enum:
        - S3
        - EBS
    BackupCreationTimeFilter:
      description: This filters by recovery points within the CreatedAfter and CreatedBefore timestamps.
      type: object
      properties:
        CreatedAfter:
          $ref: "#/components/schemas/Timestamp"
          description: This timestamp includes recovery points only created after the specified time.
        CreatedBefore:
          $ref: "#/components/schemas/Timestamp"
          description: This timestamp includes recovery points only created before the specified time.
    ResourceArnList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    RecoveryPointArnList:
      type: array
      items:
        $ref: "#/components/schemas/RecoveryPoint"
    RecoveryPoint:
      type: string
    ItemFilters:
      description: Item Filters represent all input item properties specified when the search was created. Contains either EBSItemFilters or S3ItemFilters
      type: object
      properties:
        S3ItemFilters:
          $ref: "#/components/schemas/S3ItemFilters"
          description: This array can contain CreationTimes, ETags, ObjectKeys, Sizes, or VersionIds objects.
        EBSItemFilters:
          $ref: "#/components/schemas/EBSItemFilters"
          description: This array can contain CreationTimes, FilePaths, LastModificationTimes, or Sizes objects.
    S3ItemFilters:
      type: array
      items:
        $ref: "#/components/schemas/S3ItemFilter"
    S3ItemFilter:
      description: This contains arrays of objects, which may include ObjectKeys, Sizes, CreationTimes, VersionIds, and/or Etags.
      type: object
      properties:
        ObjectKeys:
          $ref: "#/components/schemas/StringConditionList"
          description: You can include 1 to 10 values. If one value is included, the results will return only items that match the value. If more than one value is included, the results will return all items that match any of the values.
        Sizes:
          $ref: "#/components/schemas/LongConditionList"
          description: You can include 1 to 10 values. If one value is included, the results will return only items that match the value. If more than one value is included, the results will return all items that match any of the values.
        CreationTimes:
          $ref: "#/components/schemas/TimeConditionList"
          description: You can include 1 to 10 values. If one value is included, the results will return only items that match the value. If more than one value is included, the results will return all items that match any of the values.
        VersionIds:
          $ref: "#/components/schemas/StringConditionList"
          description: You can include 1 to 10 values. If one value is included, the results will return only items that match the value. If more than one value is included, the results will return all items that match any of the values.
        ETags:
          $ref: "#/components/schemas/StringConditionList"
          description: You can include 1 to 10 values. If one value is included, the results will return only items that match the value. If more than one value is included, the results will return all items that match any of the values.
    StringConditionList:
      type: array
      items:
        $ref: "#/components/schemas/StringCondition"
    StringCondition:
      description: This contains the value of the string and can contain one or more operators.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/String"
          description: The value of the string.
        Operator:
          $ref: "#/components/schemas/StringConditionOperator"
          description: A string that defines what values will be returned. If this is included, avoid combinations of operators that will return all possible values. For example, including both EQUALS_TO and NOT_EQUALS_TO with a value of 4 will return all values.
      required:
        - Value
    StringConditionOperator:
      type: string
      enum:
        - EQUALS_TO
        - NOT_EQUALS_TO
        - CONTAINS
        - DOES_NOT_CONTAIN
        - BEGINS_WITH
        - ENDS_WITH
        - DOES_NOT_BEGIN_WITH
        - DOES_NOT_END_WITH
    LongConditionList:
      type: array
      items:
        $ref: "#/components/schemas/LongCondition"
    LongCondition:
      description: The long condition contains a Value and can optionally contain an Operator.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Long"
          description: The value of an item included in one of the search item filters.
        Operator:
          $ref: "#/components/schemas/LongConditionOperator"
          description: A string that defines what values will be returned. If this is included, avoid combinations of operators that will return all possible values. For example, including both EQUALS_TO and NOT_EQUALS_TO with a value of 4 will return all values.
      required:
        - Value
    LongConditionOperator:
      type: string
      enum:
        - EQUALS_TO
        - NOT_EQUALS_TO
        - LESS_THAN_EQUAL_TO
        - GREATER_THAN_EQUAL_TO
    TimeConditionList:
      type: array
      items:
        $ref: "#/components/schemas/TimeCondition"
    TimeCondition:
      description: A time condition denotes a creation time, last modification time, or other time.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Timestamp"
          description: This is the timestamp value of the time condition.
        Operator:
          $ref: "#/components/schemas/TimeConditionOperator"
          description: A string that defines what values will be returned. If this is included, avoid combinations of operators that will return all possible values. For example, including both EQUALS_TO and NOT_EQUALS_TO with a value of 4 will return all values.
      required:
        - Value
    TimeConditionOperator:
      type: string
      enum:
        - EQUALS_TO
        - NOT_EQUALS_TO
        - LESS_THAN_EQUAL_TO
        - GREATER_THAN_EQUAL_TO
    EBSItemFilters:
      type: array
      items:
        $ref: "#/components/schemas/EBSItemFilter"
    EBSItemFilter:
      description: This contains arrays of objects, which may include CreationTimes time condition objects, FilePaths string objects, LastModificationTimes time condition objects,
      type: object
      properties:
        FilePaths:
          $ref: "#/components/schemas/StringConditionList"
          description: You can include 1 to 10 values. If one file path is included, the results will return only items that match the file path. If more than one file path is included, the results will return all items that match any of the file paths.
        Sizes:
          $ref: "#/components/schemas/LongConditionList"
          description: You can include 1 to 10 values. If one is included, the results will return only items that match. If more than one is included, the results will return all items that match any of the included values.
        CreationTimes:
          $ref: "#/components/schemas/TimeConditionList"
          description: You can include 1 to 10 values. If one is included, the results will return only items that match. If more than one is included, the results will return all items that match any of the included values.
        LastModificationTimes:
          $ref: "#/components/schemas/TimeConditionList"
          description: You can include 1 to 10 values. If one is included, the results will return only items that match. If more than one is included, the results will return all items that match any of the included values.
    SearchJobArn:
      type: string
    GetSearchResultExportJobOutput:
      type: object
      properties:
        ExportJobIdentifier:
          $ref: "#/components/schemas/GenericId"
          description: This is the unique string that identifies the specified export job.
        ExportJobArn:
          $ref: "#/components/schemas/ExportJobArn"
          description: The unique Amazon Resource Name (ARN) that uniquely identifies the export job.
        Status:
          $ref: "#/components/schemas/ExportJobStatus"
          description: This is the current status of the export job.
        CreationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that an export job was created, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        CompletionTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that an export job completed, in Unix format and Coordinated Universal Time (UTC). The value of CreationTime is accurate to milliseconds. For example, the value 1516925490.087 represents Friday, January 26, 2018 12:11:30.087 AM.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: A status message is a string that is returned for search job with a status of FAILED, along with steps to remedy and retry the operation.
        ExportSpecification:
          $ref: "#/components/schemas/ExportSpecification"
          description: The export specification consists of the destination S3 bucket to which the search results were exported, along with the destination prefix.
        SearchJobArn:
          $ref: "#/components/schemas/SearchJobArn"
          description: The unique string that identifies the Amazon Resource Name (ARN) of the specified search job.
      required:
        - ExportJobIdentifier
    ExportJobArn:
      type: string
    ExportJobStatus:
      type: string
      enum:
        - RUNNING
        - FAILED
        - COMPLETED
    ExportSpecification:
      description: This contains the export specification object.
      type: object
      properties:
        s3ExportSpecification:
          $ref: "#/components/schemas/S3ExportSpecification"
          description: This specifies the destination Amazon S3 bucket for the export job. And, if included, it also specifies the destination prefix.
    S3ExportSpecification:
      description: This specification contains a required string of the destination bucket; optionally, you can include the destination prefix.
      type: object
      properties:
        DestinationBucket:
          $ref: "#/components/schemas/String"
          description: This specifies the destination Amazon S3 bucket for the export job.
        DestinationPrefix:
          $ref: "#/components/schemas/String"
          description: This specifies the prefix for the destination Amazon S3 bucket for the export job.
      required:
        - DestinationBucket
    ListSearchJobBackupsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 1000
    ListSearchJobBackupsOutput:
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/SearchJobBackupsResults"
          description: The recovery points returned the results of a search job
        NextToken:
          $ref: "#/components/schemas/String"
          description: The next item following a partial list of returned backups included in a search job. For example, if a request is made to return MaxResults number of backups, NextToken allows you to return more items in your list starting at the location pointed to by the next token.
      required:
