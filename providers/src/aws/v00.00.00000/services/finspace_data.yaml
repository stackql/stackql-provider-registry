openapi: 3.0.0
info:
  version: "2020-07-13"
  title: FinSpace Public API
  description: FinSpace Public API
  x-serviceName: finspace-api
  x-serviceAlias: finspace_data
  x-protocol: rest-json
  x-apiVersion: "2020-07-13"
  x-endpointPrefix: finspace-api
  x-jsonVersion: "1.1"
servers:
  - url: https://finspace-api.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for finspace-data
paths:
  /permission-group/{permission_group_id}/users/{user_id}:
    post:
      operationId: AssociateUserToPermissionGroup
      description: Adds a user to a permission group to grant permissions for actions a user can perform in FinSpace.
      parameters:
        - name: permission_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PermissionGroupId"
          description: The unique identifier for the permission group.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateUserToPermissionGroupResponse"
    delete:
      operationId: DisassociateUserFromPermissionGroup
      description: Removes a user from a permission group.
      parameters:
        - name: permission_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PermissionGroupId"
          description: The unique identifier for the permission group.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A token that ensures idempotency. This token expires in 10 minutes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateUserFromPermissionGroupResponse"
  /datasets/{dataset_id}/changesetsv2:
    post:
      operationId: CreateChangeset
      description: Creates a new Changeset in a FinSpace Dataset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the FinSpace Dataset where the Changeset will be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                changeType:
                  $ref: "#/components/schemas/ChangeType"
                sourceParams:
                  $ref: "#/components/schemas/SourceParams"
                formatParams:
                  $ref: "#/components/schemas/FormatParams"
              required:
                - changeType
                - sourceParams
                - formatParams
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChangesetResponse"
    get:
      operationId: ListChangesets
      description: Lists the FinSpace Changesets for a Dataset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the FinSpace Dataset to which the Changeset belongs.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChangesetsResponse"
  /datasets/{dataset_id}/dataviewsv2:
    post:
      operationId: CreateDataView
      description: Creates a Dataview for a Dataset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique Dataset identifier that is used to create a Dataview.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                autoUpdate:
                  $ref: "#/components/schemas/Boolean"
                sortColumns:
                  $ref: "#/components/schemas/SortColumnList"
                partitionColumns:
                  $ref: "#/components/schemas/PartitionColumnList"
                asOfTimestamp:
                  $ref: "#/components/schemas/TimestampEpoch"
                destinationTypeParams:
                  $ref: "#/components/schemas/DataViewDestinationTypeParams"
              required:
                - destinationTypeParams
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataViewResponse"
    get:
      operationId: ListDataViews
      description: Lists all available Dataviews for a Dataset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier of the Dataset for which to retrieve Dataviews.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataViewsResponse"
  /datasetsv2:
    post:
      operationId: CreateDataset
      description: Creates a new FinSpace Dataset.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                datasetTitle:
                  $ref: "#/components/schemas/DatasetTitle"
                kind:
                  $ref: "#/components/schemas/DatasetKind"
                datasetDescription:
                  $ref: "#/components/schemas/DatasetDescription"
                ownerInfo:
                  $ref: "#/components/schemas/DatasetOwnerInfo"
                permissionGroupParams:
                  $ref: "#/components/schemas/PermissionGroupParams"
                alias:
                  $ref: "#/components/schemas/AliasString"
                schemaDefinition:
                  $ref: "#/components/schemas/SchemaUnion"
              required:
                - datasetTitle
                - kind
                - permissionGroupParams
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDatasetResponse"
    get:
      operationId: ListDatasets
      description: Lists all of the active Datasets that a user has access to.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatasetsResponse"
  /permission-group:
    post:
      operationId: CreatePermissionGroup
      description: Creates a group of permissions for various actions that a user can perform in FinSpace.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PermissionGroupName"
                description:
                  $ref: "#/components/schemas/PermissionGroupDescription"
                applicationPermissions:
                  $ref: "#/components/schemas/ApplicationPermissionList"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - applicationPermissions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePermissionGroupResponse"
    get:
      operationId: ListPermissionGroups
      description: Lists all available permission groups in FinSpace.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionGroupsResponse"
  /user:
    post:
      operationId: CreateUser
      description: Creates a new user in FinSpace.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailAddress:
                  $ref: "#/components/schemas/Email"
                type:
                  $ref: "#/components/schemas/UserType"
                firstName:
                  $ref: "#/components/schemas/FirstName"
                lastName:
                  $ref: "#/components/schemas/LastName"
                apiAccess:
                  $ref: "#/components/schemas/ApiAccess"
                apiAccessPrincipalArn:
                  $ref: "#/components/schemas/RoleArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - emailAddress
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
    get:
      operationId: ListUsers
      description: Lists all available users in FinSpace.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
  /datasetsv2/{dataset_id}:
    delete:
      operationId: DeleteDataset
      description: Deletes a FinSpace Dataset.
      parameters:
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A token that ensures idempotency. This token expires in 10 minutes.
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier of the Dataset to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDatasetResponse"
    get:
      operationId: GetDataset
      description: Returns information about a Dataset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StringValueLength1to255"
          description: The unique identifier for a Dataset.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDatasetResponse"
    put:
      operationId: UpdateDataset
      description: Updates a FinSpace Dataset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the Dataset to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                datasetTitle:
                  $ref: "#/components/schemas/DatasetTitle"
                kind:
                  $ref: "#/components/schemas/DatasetKind"
                datasetDescription:
                  $ref: "#/components/schemas/DatasetDescription"
                alias:
                  $ref: "#/components/schemas/AliasString"
                schemaDefinition:
                  $ref: "#/components/schemas/SchemaUnion"
              required:
                - datasetTitle
                - kind
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDatasetResponse"
  /permission-group/{permission_group_id}:
    delete:
      operationId: DeletePermissionGroup
      description: Deletes a permission group. This action is irreversible.
      parameters:
        - name: permission_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PermissionGroupId"
          description: The unique identifier for the permission group that you want to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A token that ensures idempotency. This token expires in 10 minutes.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePermissionGroupResponse"
    get:
      operationId: GetPermissionGroup
      description: Retrieves the details of a specific permission group.
      parameters:
        - name: permission_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PermissionGroupId"
          description: The unique identifier for the permission group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPermissionGroupResponse"
    put:
      operationId: UpdatePermissionGroup
      description: Modifies the details of a permission group. You cannot modify a permissionGroupID.
      parameters:
        - name: permission_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PermissionGroupId"
          description: The unique identifier for the permission group to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PermissionGroupName"
                description:
                  $ref: "#/components/schemas/PermissionGroupDescription"
                applicationPermissions:
                  $ref: "#/components/schemas/ApplicationPermissionList"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePermissionGroupResponse"
  /user/{user_id}/disable:
    post:
      operationId: DisableUser
      description: Denies access to the FinSpace web application and API for the specified user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user that you want to deactivate.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableUserResponse"
  /user/{user_id}/enable:
    post:
      operationId: EnableUser
      description: Allows the specified user to access the FinSpace web application and API.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user that you want to activate.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableUserResponse"
  /datasets/{dataset_id}/changesetsv2/{changeset_id}:
    get:
      operationId: GetChangeset
      description: Get information about a Changeset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the FinSpace Dataset where the Changeset is created.
        - name: changeset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChangesetId"
          description: The unique identifier of the Changeset for which to get data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChangesetResponse"
    put:
      operationId: UpdateChangeset
      description: Updates a FinSpace Changeset.
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the FinSpace Dataset in which the Changeset is created.
        - name: changeset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChangesetId"
          description: The unique identifier for the Changeset to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                sourceParams:
                  $ref: "#/components/schemas/SourceParams"
                formatParams:
                  $ref: "#/components/schemas/FormatParams"
              required:
                - sourceParams
                - formatParams
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChangesetResponse"
  /datasets/{dataset_id}/dataviewsv2/{dataview_id}:
    get:
      operationId: GetDataView
      description: Gets information about a Dataview.
      parameters:
        - name: dataview_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataViewId"
          description: The unique identifier for the Dataview.
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the Dataset used in the Dataview.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataViewResponse"
  /datasets/{dataset_id}/dataviewsv2/{dataview_id}/external-access-details:
    post:
      operationId: GetExternalDataViewAccessDetails
      description: "Returns the credentials to access the external Dataview from an S3 location. To call this API: You must retrieve the programmatic credentials. You must be a member of a FinSpace user group, where the dataset that you want to access has Read Dataset Data permissions."
      parameters:
        - name: dataview_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataViewId"
          description: The unique identifier for the Dataview that you want to access.
        - name: dataset_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetId"
          description: The unique identifier for the Dataset.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExternalDataViewAccessDetailsResponse"
  /credentials/programmatic:
    get:
      operationId: GetProgrammaticAccessCredentials
      description: Request programmatic credentials to use with FinSpace SDK. For more information, see Step 2. Access credentials programmatically using IAM access key id and secret access key.
      parameters:
        - name: durationInMinutes
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SessionDuration"
          description: The time duration in which the credentials remain valid.
        - name: environmentId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/IdType"
          description: The FinSpace environment identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProgrammaticAccessCredentialsResponse"
  /user/{user_id}:
    get:
      operationId: GetUser
      description: Retrieves details for a specific user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier of the user to get data for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"
    put:
      operationId: UpdateUser
      description: Modifies the details of the specified user. You cannot update the userId for a user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user that you want to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/UserType"
                firstName:
                  $ref: "#/components/schemas/FirstName"
                lastName:
                  $ref: "#/components/schemas/LastName"
                apiAccess:
                  $ref: "#/components/schemas/ApiAccess"
                apiAccessPrincipalArn:
                  $ref: "#/components/schemas/RoleArn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResponse"
  /workingLocationV1:
    post:
      operationId: GetWorkingLocation
      description: A temporary Amazon S3 location, where you can copy your files from a source location to stage or use as a scratch space in FinSpace notebook.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                locationType:
                  $ref: "#/components/schemas/locationType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkingLocationResponse"
  /user/{user_id}/permission-groups:
    get:
      operationId: ListPermissionGroupsByUser
      description: Lists all the permission groups that are associated with a specific user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionGroupsByUserResponse"
  /permission-group/{permission_group_id}/users:
    get:
      operationId: ListUsersByPermissionGroup
      description: Lists details of all the users in a specific permission group.
      parameters:
        - name: permission_group_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PermissionGroupId"
          description: The unique identifier for the permission group.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: A token that indicates where a results page should begin.
        - name: maxResults
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResultLimit"
          description: The maximum number of results per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersByPermissionGroupResponse"
  /user/{user_id}/password:
    post:
      operationId: ResetUserPassword
      description: Resets the password for a specified user ID and generates a temporary one. Only a superuser can reset password for other users. Resetting the password immediately invalidates the previous password associated with the user.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier of the user that a temporary password is requested for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetUserPasswordResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
