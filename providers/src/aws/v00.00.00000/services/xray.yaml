      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/NullableInteger"
          description: Identifier of the edge. Unique within a service map.
    InsightStateList:
      type: array
      items:
        $ref: "#/components/schemas/InsightState"
    GetInsightSummariesMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    GetInsightSummariesResult:
      type: object
      properties:
        InsightSummaries:
          $ref: "#/components/schemas/InsightSummaryList"
          description: The summary of each insight within the group matching the provided filters. The summary contains the InsightID, start and end time, the root cause service, the root cause and client impact statistics, the top anomalous services, and the status of the insight.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: Pagination token.
    InsightSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/InsightSummary"
    InsightSummary:
      description: Information that describes an insight.
      type: object
      properties:
        InsightId:
          $ref: "#/components/schemas/InsightId"
          description: The insights unique identifier.
        GroupARN:
          $ref: "#/components/schemas/GroupARN"
          description: The Amazon Resource Name (ARN) of the group that the insight belongs to.
        GroupName:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group that the insight belongs to.
        RootCauseServiceId:
          $ref: "#/components/schemas/ServiceId"
        Categories:
          $ref: "#/components/schemas/InsightCategoryList"
          description: Categories The categories that label and describe the type of insight.
        State:
          $ref: "#/components/schemas/InsightState"
          description: The current state of the insight.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the insight began.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the insight ended.
        Summary:
          $ref: "#/components/schemas/InsightSummaryText"
          description: A brief description of the insight.
        ClientRequestImpactStatistics:
          $ref: "#/components/schemas/RequestImpactStatistics"
          description: The impact statistics of the client side service. This includes the number of requests to the client service and whether the requests were faults or okay.
        RootCauseServiceRequestImpactStatistics:
          $ref: "#/components/schemas/RequestImpactStatistics"
          description: The impact statistics of the root cause service. This includes the number of requests to the client service and whether the requests were faults or okay.
        TopAnomalousServices:
          $ref: "#/components/schemas/AnomalousServiceList"
          description: The service within the insight that is most impacted by the incident.
        LastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, that the insight was last updated.
    GetRetrievedTracesGraphResult:
      type: object
      properties:
        RetrievalStatus:
          $ref: "#/components/schemas/RetrievalStatus"
          description: Status of the retrieval.
        Services:
          $ref: "#/components/schemas/RetrievedServicesList"
          description: Retrieved services.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Specify the pagination token returned by a previous request to retrieve the next page of indexes.
    RetrievalStatus:
      type: string
      enum:
        - SCHEDULED
        - RUNNING
        - COMPLETE
        - FAILED
        - CANCELLED
        - TIMEOUT
    RetrievedServicesList:
      type: array
      items:
        $ref: "#/components/schemas/RetrievedService"
    RetrievedService:
      description: Retrieved information about an application that processed requests, users that made requests, or downstream services, resources, and applications that an application used.
      type: object
      properties:
        Service:
          $ref: "#/components/schemas/Service"
        Links:
          $ref: "#/components/schemas/LinksList"
          description: Relation between two 2 services.
    Service:
      description: Information about an application that processed requests, users that made requests, or downstream services, resources, and applications that an application used.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/NullableInteger"
          description: Identifier for the service. Unique within the service map.
        Name:
          $ref: "#/components/schemas/String"
          description: The canonical name of the service.
        Names:
          $ref: "#/components/schemas/ServiceNames"
          description: A list of names for the service, including the canonical name.
        Root:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates that the service was the first service to process a request.
        AccountId:
          $ref: "#/components/schemas/String"
          description: Identifier of the Amazon Web Services account in which the service runs.
        Type:
          $ref: "#/components/schemas/String"
          description: The type of service. Amazon Web Services Resource - The type of an Amazon Web Services resource. For example, AWS::EC2::Instance for an application running on Amazon EC2 or AWS::DynamoDB::Table for an Amazon DynamoDB table that the application used. Amazon Web Services Service - The type of an Amazon Web Services service. For example, AWS::DynamoDB for downstream calls to Amazon DynamoDB that didn't target a specific table. client - Represents the clients that sent requests to a root service. remote - A downstream service of indeterminate type.
        State:
          $ref: "#/components/schemas/String"
          description: The service's state.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the first segment that the service generated.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the last segment that the service generated.
        Edges:
          $ref: "#/components/schemas/EdgeList"
          description: Connections to downstream services.
        SummaryStatistics:
          $ref: "#/components/schemas/ServiceStatistics"
          description: Aggregated statistics for the service.
        DurationHistogram:
          $ref: "#/components/schemas/Histogram"
          description: A histogram that maps the spread of service durations.
        ResponseTimeHistogram:
          $ref: "#/components/schemas/Histogram"
          description: A histogram that maps the spread of service response times.
    EdgeList:
      type: array
      items:
        $ref: "#/components/schemas/Edge"
    Edge:
      description: Information about a connection between two services. An edge can be a synchronous connection, such as typical call between client and service, or an asynchronous link, such as a Lambda function which retrieves an event from an SNS queue.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/NullableInteger"
          description: Identifier of the edge. Unique within a service map.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the first segment on the edge.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the last segment on the edge.
        SummaryStatistics:
          $ref: "#/components/schemas/EdgeStatistics"
          description: Response statistics for segments on the edge.
        ResponseTimeHistogram:
          $ref: "#/components/schemas/Histogram"
          description: A histogram that maps the spread of client response times on an edge. Only populated for synchronous edges.
        Aliases:
          $ref: "#/components/schemas/AliasList"
          description: Aliases for the edge.
        EdgeType:
          $ref: "#/components/schemas/String"
          description: Describes an asynchronous connection, with a value of link.
        ReceivedEventAgeHistogram:
          $ref: "#/components/schemas/Histogram"
          description: A histogram that maps the spread of event age when received by consumers. Age is calculated each time an event is received. Only populated when EdgeType is link.
    EdgeStatistics:
      description: Response statistics for an edge.
      type: object
      properties:
        OkCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of requests that completed with a 2xx Success status code.
        ErrorStatistics:
          $ref: "#/components/schemas/ErrorStatistics"
          description: Information about requests that failed with a 4xx Client Error status code.
        FaultStatistics:
          $ref: "#/components/schemas/FaultStatistics"
          description: Information about requests that failed with a 5xx Server Error status code.
        TotalCount:
          $ref: "#/components/schemas/NullableLong"
          description: The total number of completed requests.
        TotalResponseTime:
          $ref: "#/components/schemas/NullableDouble"
          description: The aggregate response time of completed requests.
    ErrorStatistics:
      description: Information about requests that failed with a 4xx Client Error status code.
      type: object
      properties:
        ThrottleCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of requests that failed with a 429 throttling status code.
        OtherCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of requests that failed with untracked 4xx Client Error status codes.
        TotalCount:
          $ref: "#/components/schemas/NullableLong"
          description: The total number of requests that failed with a 4xx Client Error status code.
    FaultStatistics:
      description: Information about requests that failed with a 5xx Server Error status code.
      type: object
      properties:
        OtherCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of requests that failed with untracked 5xx Server Error status codes.
        TotalCount:
          $ref: "#/components/schemas/NullableLong"
          description: The total number of requests that failed with a 5xx Server Error status code.
    Histogram:
      type: array
      items:
        $ref: "#/components/schemas/HistogramEntry"
    HistogramEntry:
      description: An entry in a histogram for a statistic. A histogram maps the range of observed values on the X axis, and the prevalence of each value on the Y axis.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Double"
          description: The value of the entry.
        Count:
          $ref: "#/components/schemas/Integer"
          description: The prevalence of the entry.
    Double:
      type: number
      format: double
    Integer:
      type: integer
    AliasList:
      type: array
      items:
        $ref: "#/components/schemas/Alias"
    Alias:
      description: An alias for an edge.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The canonical name of the alias.
        Names:
          $ref: "#/components/schemas/AliasNames"
          description: A list of names for the alias, including the canonical name.
        Type:
          $ref: "#/components/schemas/String"
          description: The type of the alias.
    AliasNames:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ServiceStatistics:
      description: Response statistics for a service.
      type: object
      properties:
        OkCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of requests that completed with a 2xx Success status code.
        ErrorStatistics:
          $ref: "#/components/schemas/ErrorStatistics"
          description: Information about requests that failed with a 4xx Client Error status code.
        FaultStatistics:
          $ref: "#/components/schemas/FaultStatistics"
          description: Information about requests that failed with a 5xx Server Error status code.
        TotalCount:
          $ref: "#/components/schemas/NullableLong"
          description: The total number of completed requests.
        TotalResponseTime:
          $ref: "#/components/schemas/NullableDouble"
          description: The aggregate response time of completed requests.
    LinksList:
      type: array
      items:
        $ref: "#/components/schemas/GraphLink"
    GraphLink:
      description: The relation between two services.
      type: object
      properties:
        ReferenceType:
          $ref: "#/components/schemas/String"
          description: Relationship of a trace to the corresponding service.
        SourceTraceId:
          $ref: "#/components/schemas/String"
          description: Source trace of a link relationship.
        DestinationTraceIds:
          $ref: "#/components/schemas/TraceIdList"
          description: Destination traces of a link relationship.
    GetSamplingRulesResult:
      type: object
      properties:
        SamplingRuleRecords:
          $ref: "#/components/schemas/SamplingRuleRecordList"
          description: Rule definitions and metadata.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    SamplingRuleRecordList:
      type: array
      items:
        $ref: "#/components/schemas/SamplingRuleRecord"
    GetSamplingStatisticSummariesResult:
      type: object
      properties:
        SamplingStatisticSummaries:
          $ref: "#/components/schemas/SamplingStatisticSummaryList"
          description: Information about the number of requests instrumented for each sampling rule.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    SamplingStatisticSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/SamplingStatisticSummary"
    SamplingStatisticSummary:
      description: Aggregated request sampling data for a sampling rule across all services for a 10-second window.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/String"
          description: The name of the sampling rule.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the reporting window.
        RequestCount:
          $ref: "#/components/schemas/Integer"
          description: The number of requests that matched the rule.
        BorrowCount:
          $ref: "#/components/schemas/Integer"
          description: The number of requests recorded with borrowed reservoir quota.
        SampledCount:
          $ref: "#/components/schemas/Integer"
          description: The number of requests recorded.
    SamplingStatisticsDocumentList:
      type: array
      items:
        $ref: "#/components/schemas/SamplingStatisticsDocument"
    SamplingStatisticsDocument:
      description: Request sampling results for a single rule from a service. Results are for the last 10 seconds unless the service has been assigned a longer reporting interval after a previous call to GetSamplingTargets.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/RuleName"
          description: The name of the sampling rule.
        ClientID:
          $ref: "#/components/schemas/ClientID"
          description: A unique identifier for the service in hexadecimal.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The current time.
        RequestCount:
          $ref: "#/components/schemas/RequestCount"
          description: The number of requests that matched the rule.
        SampledCount:
          $ref: "#/components/schemas/SampledCount"
          description: The number of requests recorded.
        BorrowCount:
          $ref: "#/components/schemas/BorrowCount"
          description: The number of requests recorded with borrowed reservoir quota.
      required:
        - RuleName
        - ClientID
        - Timestamp
        - RequestCount
        - SampledCount
    ClientID:
      type: string
      minLength: 24
      maxLength: 24
    RequestCount:
      type: integer
      minimum: 0
    SampledCount:
      type: integer
      minimum: 0
    BorrowCount:
      type: integer
      minimum: 0
    SamplingBoostStatisticsDocumentList:
      type: array
      items:
        $ref: "#/components/schemas/SamplingBoostStatisticsDocument"
    SamplingBoostStatisticsDocument:
      description: Request anomaly stats for a single rule from a service. Results are for the last 10 seconds unless the service has been assigned a longer reporting interval after a previous call to GetSamplingTargets.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/RuleName"
          description: The name of the sampling rule.
        ServiceName:
          $ref: "#/components/schemas/ServiceName"
          description: Matches the name that the service uses to identify itself in segments.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The current time.
        AnomalyCount:
          $ref: "#/components/schemas/AnomalyCount"
          description: The number of requests with anomaly.
        TotalCount:
          $ref: "#/components/schemas/TotalCount"
          description: The number of requests that associated to the rule.
        SampledAnomalyCount:
          $ref: "#/components/schemas/SampledAnomalyCount"
          description: The number of requests with anomaly recorded.
      required:
        - RuleName
        - ServiceName
        - Timestamp
        - AnomalyCount
        - TotalCount
        - SampledAnomalyCount
    AnomalyCount:
      type: integer
      minimum: 0
    TotalCount:
      type: integer
      minimum: 0
    SampledAnomalyCount:
      type: integer
      minimum: 0
    GetSamplingTargetsResult:
      type: object
      properties:
        SamplingTargetDocuments:
          $ref: "#/components/schemas/SamplingTargetDocumentList"
          description: Updated rules that the service should use to sample requests.
        LastRuleModification:
          $ref: "#/components/schemas/Timestamp"
          description: The last time a user changed the sampling rule configuration. If the sampling rule configuration changed since the service last retrieved it, the service should call GetSamplingRules to get the latest version.
        UnprocessedStatistics:
          $ref: "#/components/schemas/UnprocessedStatisticsList"
          description: Information about SamplingStatisticsDocument that X-Ray could not process.
        UnprocessedBoostStatistics:
          $ref: "#/components/schemas/UnprocessedStatisticsList"
          description: Information about SamplingBoostStatisticsDocument that X-Ray could not process.
    SamplingTargetDocumentList:
      type: array
      items:
        $ref: "#/components/schemas/SamplingTargetDocument"
    SamplingTargetDocument:
      description: Temporary changes to a sampling rule configuration. To meet the global sampling target for a rule, X-Ray calculates a new reservoir for each service based on the recent sampling results of all services that called GetSamplingTargets.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/String"
          description: The name of the sampling rule.
        FixedRate:
          $ref: "#/components/schemas/Double"
          description: The percentage of matching requests to instrument, after the reservoir is exhausted.
        ReservoirQuota:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of requests per second that X-Ray allocated for this service.
        ReservoirQuotaTTL:
          $ref: "#/components/schemas/Timestamp"
          description: When the reservoir quota expires.
        Interval:
          $ref: "#/components/schemas/NullableInteger"
          description: The number of seconds for the service to wait before getting sampling targets again.
        SamplingBoost:
          $ref: "#/components/schemas/SamplingBoost"
          description: The sampling boost that X-Ray allocated for this service.
    SamplingBoost:
      description: Temporary boost sampling rate. X-Ray calculates sampling boost for each service based on the recent sampling boost stats of all services that called GetSamplingTargets.
      type: object
      properties:
        BoostRate:
          $ref: "#/components/schemas/Double"
          description: The calculated sampling boost rate for this service
        BoostRateTTL:
          $ref: "#/components/schemas/Timestamp"
          description: When the sampling boost expires.
      required:
        - BoostRate
        - BoostRateTTL
    UnprocessedStatisticsList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedStatistics"
    UnprocessedStatistics:
      description: Sampling statistics from a call to GetSamplingTargets that X-Ray could not process.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/String"
          description: The name of the sampling rule.
        ErrorCode:
          $ref: "#/components/schemas/String"
          description: The error code.
        Message:
          $ref: "#/components/schemas/String"
          description: The error message.
    GetServiceGraphResult:
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start of the time frame for which the graph was generated.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the time frame for which the graph was generated.
        Services:
          $ref: "#/components/schemas/ServiceList"
          description: The services that have processed a traced request during the specified time frame.
        ContainsOldGroupVersions:
          $ref: "#/components/schemas/Boolean"
          description: A flag indicating whether the group's filter expression has been consistent, or if the returned service graph may show traces from an older version of the group's filter expression.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    ServiceList:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    Boolean:
      type: boolean
    EntitySelectorExpression:
      type: string
      minLength: 1
      maxLength: 500
    GetTimeSeriesServiceStatisticsResult:
      type: object
      properties:
        TimeSeriesServiceStatistics:
          $ref: "#/components/schemas/TimeSeriesServiceStatisticsList"
          description: The collection of statistics.
        ContainsOldGroupVersions:
          $ref: "#/components/schemas/Boolean"
          description: A flag indicating whether or not a group's filter expression has been consistent, or if a returned aggregation might show statistics from an older version of the group's filter expression.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    TimeSeriesServiceStatisticsList:
      type: array
      items:
        $ref: "#/components/schemas/TimeSeriesServiceStatistics"
    TimeSeriesServiceStatistics:
      description: A list of TimeSeriesStatistic structures.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp of the window for which statistics are aggregated.
        EdgeSummaryStatistics:
          $ref: "#/components/schemas/EdgeStatistics"
        ServiceSummaryStatistics:
          $ref: "#/components/schemas/ServiceStatistics"
        ServiceForecastStatistics:
          $ref: "#/components/schemas/ForecastStatistics"
          description: The forecasted high and low fault count values.
        ResponseTimeHistogram:
          $ref: "#/components/schemas/Histogram"
          description: The response time histogram for the selected entities.
    ForecastStatistics:
      description: The predicted high and low fault count. This is used to determine if a service has become anomalous and if an insight should be created.
      type: object
      properties:
        FaultCountHigh:
          $ref: "#/components/schemas/NullableLong"
          description: The upper limit of fault counts for a service.
        FaultCountLow:
          $ref: "#/components/schemas/NullableLong"
          description: The lower limit of fault counts for a service.
    GetTraceGraphResult:
      type: object
      properties:
        Services:
          $ref: "#/components/schemas/ServiceList"
          description: The services that have processed one of the specified requests.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    GetTraceSegmentDestinationResult:
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/TraceSegmentDestination"
          description: Retrieves the current destination.
        Status:
          $ref: "#/components/schemas/TraceSegmentDestinationStatus"
          description: Status of the retrieval.
    TraceSegmentDestination:
      type: string
      enum:
        - XRay
        - CloudWatchLogs
    TraceSegmentDestinationStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
    TimeRangeType:
      type: string
      enum:
        - TraceId
        - Event
        - Service
    SamplingStrategy:
      description: The name and value of a sampling rule to apply to a trace summary.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/SamplingStrategyName"
          description: The name of a sampling rule.
        Value:
          $ref: "#/components/schemas/NullableDouble"
          description: The value of a sampling rule.
    SamplingStrategyName:
      type: string
      enum:
        - PartialScan
        - FixedRate
    GetTraceSummariesResult:
      type: object
      properties:
        TraceSummaries:
          $ref: "#/components/schemas/TraceSummaryList"
          description: Trace IDs and annotations for traces that were found in the specified time frame.
        ApproximateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of this page of results.
        TracesProcessedCount:
          $ref: "#/components/schemas/NullableLong"
          description: The total number of traces processed, including traces that did not match the specified filter expression.
        NextToken:
          $ref: "#/components/schemas/String"
          description: If the requested time frame contained more than one page of results, you can use this token to retrieve the next page. The first page contains the most recent results, closest to the end of the time frame.
    TraceSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/TraceSummary"
    TraceSummary:
      description: Metadata generated from the segment documents in a trace.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/TraceId"
          description: The unique identifier for the request that generated the trace's segments and subsegments.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of a trace, based on the earliest trace segment start time.
        Duration:
          $ref: "#/components/schemas/NullableDouble"
          description: The length of time in seconds between the start time of the earliest segment that started and the end time of the last segment that completed.
        ResponseTime:
          $ref: "#/components/schemas/NullableDouble"
          description: The length of time in seconds between the start and end times of the root segment. If the service performs work asynchronously, the response time measures the time before the response is sent to the user, while the duration measures the amount of time before the last traced activity completes.
        HasFault:
          $ref: "#/components/schemas/NullableBoolean"
          description: The root segment document has a 500 series error.
        HasError:
          $ref: "#/components/schemas/NullableBoolean"
          description: The root segment document has a 400 series error.
        HasThrottle:
          $ref: "#/components/schemas/NullableBoolean"
          description: One or more of the segment documents has a 429 throttling error.
        IsPartial:
          $ref: "#/components/schemas/NullableBoolean"
          description: One or more of the segment documents is in progress.
        Http:
          $ref: "#/components/schemas/Http"
          description: Information about the HTTP request served by the trace.
        Annotations:
          type: object
          properties: {}
          description: Annotations from the trace's segment documents.
        Users:
          $ref: "#/components/schemas/TraceUsers"
          description: Users from the trace's segment documents.
        ServiceIds:
          $ref: "#/components/schemas/ServiceIds"
          description: Service IDs from the trace's segment documents.
        ResourceARNs:
          $ref: "#/components/schemas/TraceResourceARNs"
          description: A list of resource ARNs for any resource corresponding to the trace segments.
        InstanceIds:
          $ref: "#/components/schemas/TraceInstanceIds"
          description: A list of EC2 instance IDs for any instance corresponding to the trace segments.
        AvailabilityZones:
          $ref: "#/components/schemas/TraceAvailabilityZones"
          description: A list of Availability Zones for any zone corresponding to the trace segments.
        EntryPoint:
