openapi: 3.0.0
info:
  version: "2016-04-12"
  title: AWS X-Ray
  description: AWS X-Ray
  x-serviceName: xray
  x-serviceAlias: xray
  x-protocol: rest-json
  x-apiVersion: "2016-04-12"
  x-endpointPrefix: xray
servers:
  - url: https://xray.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for xray
paths:
  /Traces:
    post:
      operationId: BatchGetTraces
      description: You cannot find traces through this API if Transaction Search is enabled since trace is not indexed in X-Ray. Retrieves a list of traces specified by ID. Each trace is a collection of segment documents that originates from a single request. Use GetTraceSummaries to get a list of trace IDs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TraceIds:
                  $ref: "#/components/schemas/TraceIdList"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - TraceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetTracesResult"
  /CancelTraceRetrieval:
    post:
      operationId: CancelTraceRetrieval
      description: Cancels an ongoing trace retrieval job initiated by StartTraceRetrieval using the provided RetrievalToken. A successful cancellation will return an HTTP 200 response.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RetrievalToken:
                  $ref: "#/components/schemas/RetrievalToken"
              required:
                - RetrievalToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelTraceRetrievalResult"
  /CreateGroup:
    post:
      operationId: CreateGroup
      description: Creates a group resource with a name and a filter expression.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                FilterExpression:
                  $ref: "#/components/schemas/FilterExpression"
                InsightsConfiguration:
                  $ref: "#/components/schemas/InsightsConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - GroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupResult"
  /CreateSamplingRule:
    post:
      operationId: CreateSamplingRule
      description: Creates a rule to control sampling behavior for instrumented applications. Services retrieve rules with GetSamplingRules, and evaluate each rule in ascending order of priority for each request. If a rule matches, the service records a trace, borrowing it from the reservoir size. After 10 seconds, the service reports back to X-Ray with GetSamplingTargets to get updated versions of each in-use rule. The updated rule contains a trace quota that the service can use instead of borrowing from the reservoir.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SamplingRule:
                  $ref: "#/components/schemas/SamplingRule"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - SamplingRule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSamplingRuleResult"
  /DeleteGroup:
    post:
      operationId: DeleteGroup
      description: Deletes a group resource.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                GroupARN:
                  $ref: "#/components/schemas/GroupARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupResult"
  /DeleteResourcePolicy:
    post:
      operationId: DeleteResourcePolicy
      description: Deletes a resource policy from the target Amazon Web Services account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PolicyName:
                  $ref: "#/components/schemas/PolicyName"
                PolicyRevisionId:
                  $ref: "#/components/schemas/PolicyRevisionId"
              required:
                - PolicyName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyResult"
  /DeleteSamplingRule:
    post:
      operationId: DeleteSamplingRule
      description: Deletes a sampling rule.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleName:
                  $ref: "#/components/schemas/String"
                RuleARN:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSamplingRuleResult"
  /EncryptionConfig:
    post:
      operationId: GetEncryptionConfig
      description: Retrieves the current encryption configuration for X-Ray data.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEncryptionConfigResult"
  /GetGroup:
    post:
      operationId: GetGroup
      description: Retrieves group resource details.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                GroupARN:
                  $ref: "#/components/schemas/GroupARN"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupResult"
  /Groups:
    post:
      operationId: GetGroups
      description: Retrieves all active group details.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/GetGroupsNextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupsResult"
  /GetIndexingRules:
    post:
      operationId: GetIndexingRules
      description: Retrieves all indexing rules. Indexing rules are used to determine the server-side sampling rate for spans ingested through the CloudWatchLogs destination and indexed by X-Ray. For more information, see Transaction Search.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIndexingRulesResult"
  /Insight:
    post:
      operationId: GetInsight
      description: Retrieves the summary information of an insight. This includes impact to clients and root cause services, the top anomalous services, the category, the state of the insight, and the start and end time of the insight.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightId:
                  $ref: "#/components/schemas/InsightId"
              required:
                - InsightId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInsightResult"
  /InsightEvents:
    post:
      operationId: GetInsightEvents
      description: X-Ray reevaluates insights periodically until they're resolved, and records each intermediate state as an event. You can review an insight's events in the Impact Timeline on the Inspect page in the X-Ray console.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightId:
                  $ref: "#/components/schemas/InsightId"
                MaxResults:
                  $ref: "#/components/schemas/GetInsightEventsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - InsightId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInsightEventsResult"
  /InsightImpactGraph:
    post:
      operationId: GetInsightImpactGraph
      description: Retrieves a service graph structure filtered by the specified insight. The service graph is limited to only structural information. For a complete service graph, use this API with the GetServiceGraph API.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightId:
                  $ref: "#/components/schemas/InsightId"
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - InsightId
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInsightImpactGraphResult"
  /InsightSummaries:
    post:
      operationId: GetInsightSummaries
      description: Retrieves the summaries of all insights in the specified group matching the provided filter values.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                States:
                  $ref: "#/components/schemas/InsightStateList"
                GroupARN:
                  $ref: "#/components/schemas/GroupARN"
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                MaxResults:
                  $ref: "#/components/schemas/GetInsightSummariesMaxResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInsightSummariesResult"
  /GetRetrievedTracesGraph:
    post:
      operationId: GetRetrievedTracesGraph
      description: Retrieves a service graph for traces based on the specified RetrievalToken from the CloudWatch log group generated by Transaction Search. This API does not initiate a retrieval job. You must first execute StartTraceRetrieval to obtain the required RetrievalToken. The trace graph describes services that process incoming requests and any downstream services they call, which may include Amazon Web Services resources, external APIs, or databases. The response is empty until the RetrievalStatus is COMPLETE. Retry the request after the status changes from RUNNING or SCHEDULED to COMPLETE to access the full service graph. When CloudWatch log is the destination, this API can support cross-account observability and service graph retrieval across linked accounts. For retrieving graphs from X-Ray directly as opposed to the Transaction-Search Log group, see GetTraceGraph.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RetrievalToken:
                  $ref: "#/components/schemas/RetrievalToken"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - RetrievalToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRetrievedTracesGraphResult"
  /GetSamplingRules:
    post:
      operationId: GetSamplingRules
      description: Retrieves all sampling rules.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSamplingRulesResult"
  /SamplingStatisticSummaries:
    post:
      operationId: GetSamplingStatisticSummaries
      description: Retrieves information about recent sampling results for all sampling rules.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSamplingStatisticSummariesResult"
  /SamplingTargets:
    post:
      operationId: GetSamplingTargets
      description: Requests a sampling quota for rules that the service is using to sample requests.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SamplingStatisticsDocuments:
                  $ref: "#/components/schemas/SamplingStatisticsDocumentList"
                SamplingBoostStatisticsDocuments:
                  $ref: "#/components/schemas/SamplingBoostStatisticsDocumentList"
              required:
                - SamplingStatisticsDocuments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSamplingTargetsResult"
  /ServiceGraph:
    post:
      operationId: GetServiceGraph
      description: Retrieves a document that describes services that process incoming requests, and downstream services that they call as a result. Root services process incoming requests and make calls to downstream services. Root services are applications that use the Amazon Web Services X-Ray SDK. Downstream services can be other applications, Amazon Web Services resources, HTTP web APIs, or SQL databases.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                GroupARN:
                  $ref: "#/components/schemas/GroupARN"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServiceGraphResult"
  /TimeSeriesServiceStatistics:
    post:
      operationId: GetTimeSeriesServiceStatistics
      description: Get an aggregation of service statistics defined by a specific time range.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                GroupARN:
                  $ref: "#/components/schemas/GroupARN"
                EntitySelectorExpression:
                  $ref: "#/components/schemas/EntitySelectorExpression"
                Period:
                  $ref: "#/components/schemas/NullableInteger"
                ForecastStatistics:
                  $ref: "#/components/schemas/NullableBoolean"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTimeSeriesServiceStatisticsResult"
  /TraceGraph:
    post:
      operationId: GetTraceGraph
      description: Retrieves a service graph for one or more specific trace IDs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TraceIds:
                  $ref: "#/components/schemas/TraceIdList"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - TraceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTraceGraphResult"
  /GetTraceSegmentDestination:
    post:
      operationId: GetTraceSegmentDestination
      description: Retrieves the current destination of data sent to PutTraceSegments and OpenTelemetry protocol (OTLP) endpoint. The Transaction Search feature requires a CloudWatchLogs destination. For more information, see Transaction Search and OpenTelemetry.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTraceSegmentDestinationResult"
  /TraceSummaries:
    post:
      operationId: GetTraceSummaries
      description: 'Retrieves IDs and annotations for traces available for a specified time frame using an optional filter. To get the full traces, pass the trace IDs to BatchGetTraces. A filter expression can target traced requests that hit specific service nodes or edges, have errors, or come from a known user. For example, the following filter expression targets traces that pass through api.example.com: service("api.example.com") This filter expression finds traces that have an annotation named account with the value 12345: annotation.account = "12345" For a full list of indexed fields and keywords that you can use in filter expressions, see Use filter expressions in the Amazon Web Services X-Ray Developer Guide.'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
                TimeRangeType:
                  $ref: "#/components/schemas/TimeRangeType"
                Sampling:
                  $ref: "#/components/schemas/NullableBoolean"
                SamplingStrategy:
                  $ref: "#/components/schemas/SamplingStrategy"
                FilterExpression:
                  $ref: "#/components/schemas/FilterExpression"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTraceSummariesResult"
  /ListResourcePolicies:
    post:
      operationId: ListResourcePolicies
      description: Returns the list of resource policies in the target Amazon Web Services account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/ResourcePolicyNextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcePoliciesResult"
  /ListRetrievedTraces:
    post:
      operationId: ListRetrievedTraces
      description: Retrieves a list of traces for a given RetrievalToken from the CloudWatch log group generated by Transaction Search. For information on what each trace returns, see BatchGetTraces. This API does not initiate a retrieval process. To start a trace retrieval, use StartTraceRetrieval, which generates the required RetrievalToken. When the RetrievalStatus is not COMPLETE, the API will return an empty response. Retry the request once the retrieval has completed to access the full list of traces. For cross-account observability, this API can retrieve traces from linked accounts when CloudWatch log is set as the destination across relevant accounts. For more details, see CloudWatch cross-account observability. For retrieving data from X-Ray directly as opposed to the Transaction Search generated log group, see BatchGetTraces.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RetrievalToken:
                  $ref: "#/components/schemas/RetrievalToken"
                TraceFormat:
                  $ref: "#/components/schemas/TraceFormatType"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - RetrievalToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRetrievedTracesResult"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of tags that are applied to the specified Amazon Web Services X-Ray group or sampling rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                NextToken:
                  $ref: "#/components/schemas/String"
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /PutEncryptionConfig:
    post:
      operationId: PutEncryptionConfig
      description: Updates the encryption configuration for X-Ray data.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyId:
                  $ref: "#/components/schemas/EncryptionKeyId"
                Type:
                  $ref: "#/components/schemas/EncryptionType"
              required:
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutEncryptionConfigResult"
  /PutResourcePolicy:
    post:
      operationId: PutResourcePolicy
      description: Sets the resource policy to grant one or more Amazon Web Services services and accounts permissions to access X-Ray. Each resource policy will be associated with a specific Amazon Web Services account. Each Amazon Web Services account can have a maximum of 5 resource policies, and each policy name must be unique within that account. The maximum size of each resource policy is 5KB.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PolicyName:
                  $ref: "#/components/schemas/PolicyName"
                PolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                PolicyRevisionId:
                  $ref: "#/components/schemas/PolicyRevisionId"
                BypassPolicyLockoutCheck:
                  $ref: "#/components/schemas/Boolean"
              required:
                - PolicyName
                - PolicyDocument
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResult"
  /TelemetryRecords:
    post:
      operationId: PutTelemetryRecords
      description: Used by the Amazon Web Services X-Ray daemon to upload telemetry.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TelemetryRecords:
                  $ref: "#/components/schemas/TelemetryRecordList"
                EC2InstanceId:
                  $ref: "#/components/schemas/EC2InstanceId"
                Hostname:
                  $ref: "#/components/schemas/Hostname"
                ResourceARN:
                  $ref: "#/components/schemas/ResourceARN"
              required:
                - TelemetryRecords
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTelemetryRecordsResult"
  /TraceSegments:
    post:
      operationId: PutTraceSegments
      description: "Uploads segment documents to Amazon Web Services X-Ray. A segment document can be a completed segment, an in-progress segment, or an array of subsegments. Segments must include the following fields. For the full segment document schema, see Amazon Web Services X-Ray Segment Documents in the Amazon Web Services X-Ray Developer Guide. Required segment document fields name - The name of the service that handled the request. id - A 64-bit identifier for the segment, unique among segments in the same trace, in 16 hexadecimal digits. trace_id - A unique identifier that connects all segments and subsegments originating from a single client request. start_time - Time the segment or subsegment was created, in floating point seconds in epoch time, accurate to milliseconds. For example, 1480615200.010 or 1.480615200010E9. end_time - Time the segment or subsegment was closed. For example, 1480615200.090 or 1.480615200090E9. Specify either an end_time or in_progress. in_progress - Set to true instead of specifying an end_time to record that a segment has been started, but is not complete. Send an in-progress segment when your application receives a request that will take a long time to serve, to trace that the request was received. When the response is sent, send the complete segment to overwrite the in-progress segment. A trace_id consists of three numbers separated by hyphens. For example, 1-58406520-a006649127e371903a2de979. For trace IDs created by an X-Ray SDK, or by Amazon Web Services services integrated with X-Ray, a trace ID includes: Trace ID Format The version number, for instance, 1. The time of the original request, in Unix epoch time, in 8 hexadecimal digits. For example, 10:00AM December 2nd, 2016 PST in epoch time is 1480615200 seconds, or 58406520 in hexadecimal. A 96-bit identifier for the trace, globally unique, in 24 hexadecimal digits. Trace IDs created via OpenTelemetry have a different format based on the W3C Trace Context specification. A W3C trace ID must be formatted in the X-Ray trace ID format when sending to X-Ray. For example, a W3C trace ID 4efaaf4d1e8720b39541901950019ee5 should be formatted as 1-4efaaf4d-1e8720b39541901950019ee5 when sending to X-Ray. While X-Ray trace IDs include the original request timestamp in Unix epoch time, this is not required or validated."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TraceSegmentDocuments:
                  $ref: "#/components/schemas/TraceSegmentDocumentList"
              required:
                - TraceSegmentDocuments
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutTraceSegmentsResult"
  /StartTraceRetrieval:
    post:
      operationId: StartTraceRetrieval
      description: Initiates a trace retrieval process using the specified time range and for the given trace IDs in the Transaction Search generated CloudWatch log group. For more information, see Transaction Search. API returns a RetrievalToken, which can be used with ListRetrievedTraces or GetRetrievedTracesGraph to fetch results. Retrievals will time out after 60 minutes. To execute long time ranges, consider segmenting into multiple retrievals. If you are using CloudWatch cross-account observability, you can use this operation in a monitoring account to retrieve data from a linked source account, as long as both accounts have transaction search enabled. For retrieving data from X-Ray directly as opposed to the Transaction-Search Log group, see BatchGetTraces.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TraceIds:
                  $ref: "#/components/schemas/TraceIdListForRetrieval"
                StartTime:
                  $ref: "#/components/schemas/Timestamp"
                EndTime:
                  $ref: "#/components/schemas/Timestamp"
              required:
                - TraceIds
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTraceRetrievalResult"
  /TagResource:
    post:
      operationId: TagResource
      description: Applies tags to an existing Amazon Web Services X-Ray group or sampling rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceARN
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: "Removes tags from an Amazon Web Services X-Ray group or sampling rule. You cannot edit or delete system tags (those with an aws: prefix)."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateGroup:
    post:
      operationId: UpdateGroup
      description: Updates a group resource.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/GroupName"
                GroupARN:
                  $ref: "#/components/schemas/GroupARN"
                FilterExpression:
                  $ref: "#/components/schemas/FilterExpression"
                InsightsConfiguration:
                  $ref: "#/components/schemas/InsightsConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGroupResult"
  /UpdateIndexingRule:
    post:
      operationId: UpdateIndexingRule
      description: Modifies an indexing rule’s configuration. Indexing rules are used for determining the sampling rate for spans indexed from CloudWatch Logs. For more information, see Transaction Search.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/String"
                Rule:
                  $ref: "#/components/schemas/IndexingRuleValueUpdate"
              required:
                - Name
                - Rule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIndexingRuleResult"
  /UpdateSamplingRule:
    post:
      operationId: UpdateSamplingRule
      description: Modifies a sampling rule's configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SamplingRuleUpdate:
                  $ref: "#/components/schemas/SamplingRuleUpdate"
              required:
                - SamplingRuleUpdate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSamplingRuleResult"
  /UpdateTraceSegmentDestination:
    post:
      operationId: UpdateTraceSegmentDestination
      description: Modifies the destination of data sent to PutTraceSegments. The Transaction Search feature requires the CloudWatchLogs destination. For more information, see Transaction Search.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Destination:
                  $ref: "#/components/schemas/TraceSegmentDestination"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTraceSegmentDestinationResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    TraceIdList:
      type: array
      items:
        $ref: "#/components/schemas/TraceId"
    TraceId:
      type: string
      minLength: 1
      maxLength: 35
    String:
      type: string
    BatchGetTracesResult:
      type: object
      properties:
        Traces:
          $ref: "#/components/schemas/TraceList"
          description: Full traces for the specified requests.
        UnprocessedTraceIds:
          $ref: "#/components/schemas/UnprocessedTraceIdList"
          description: Trace IDs of requests that haven't been processed.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    TraceList:
      type: array
      items:
        $ref: "#/components/schemas/Trace"
    Trace:
      description: A collection of segment documents with matching trace IDs.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/TraceId"
          description: The unique identifier for the request that generated the trace's segments and subsegments.
        Duration:
          $ref: "#/components/schemas/NullableDouble"
          description: The length of time in seconds between the start time of the earliest segment that started and the end time of the last segment that completed.
        LimitExceeded:
          $ref: "#/components/schemas/NullableBoolean"
          description: LimitExceeded is set to true when the trace has exceeded the Trace document size limit. For more information about this limit and other X-Ray limits and quotas, see Amazon Web Services X-Ray endpoints and quotas.
        Segments:
          $ref: "#/components/schemas/SegmentList"
          description: Segment documents for the segments and subsegments that comprise the trace.
    NullableDouble:
      type: number
      format: double
    NullableBoolean:
      type: boolean
    SegmentList:
      type: array
      items:
        $ref: "#/components/schemas/Segment"
    Segment:
      description: A segment from a trace that has been ingested by the X-Ray service. The segment can be compiled from documents uploaded with PutTraceSegments, or an inferred segment for a downstream service, generated from a subsegment sent by the service that called it. For the full segment document schema, see Amazon Web Services X-Ray segment documents in the Amazon Web Services X-Ray Developer Guide.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/SegmentId"
          description: The segment's ID.
        Document:
          $ref: "#/components/schemas/SegmentDocument"
          description: The segment document.
    SegmentId:
      type: string
    SegmentDocument:
      type: string
      minLength: 1
    UnprocessedTraceIdList:
      type: array
      items:
        $ref: "#/components/schemas/TraceId"
    RetrievalToken:
      type: string
      minLength: 0
      maxLength: 1020
    CancelTraceRetrievalResult:
      type: object
    GroupName:
      type: string
      minLength: 1
      maxLength: 32
    FilterExpression:
      type: string
    InsightsConfiguration:
      description: The structure containing configurations related to insights.
      type: object
      properties:
        InsightsEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Set the InsightsEnabled value to true to enable insights or false to disable insights.
        NotificationsEnabled:
          $ref: "#/components/schemas/NullableBoolean"
          description: Set the NotificationsEnabled value to true to enable insights notifications. Notifications can only be enabled on a group with InsightsEnabled set to true.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A map that contains tag keys and tag values to attach to an Amazon Web Services X-Ray group or sampling rule. For more information about ways to use tags, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference. The following restrictions apply to tags: Maximum number of user-applied tags per resource: 50 Tag keys and values are case sensitive. Don't use aws: as a prefix for keys; it's reserved for Amazon Web Services use. You cannot edit or delete system tags."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A tag key, such as Stage or Name. A tag key cannot be empty. The key can be a maximum of 128 characters, and can contain only Unicode letters, numbers, or separators, or the following special characters: + - = . _ : /"
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "An optional tag value, such as Production or test-only. The value can be a maximum of 255 characters, and contain only Unicode letters, numbers, or separators, or the following special characters: + - = . _ : /"
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateGroupResult:
      type: object
      properties:
        Group:
          $ref: "#/components/schemas/Group"
          description: The group that was created. Contains the name of the group that was created, the Amazon Resource Name (ARN) of the group that was generated based on the group name, the filter expression, and the insight configuration that was assigned to the group.
    Group:
      description: Details and metadata for a group.
      type: object
      properties:
        GroupName:
          $ref: "#/components/schemas/String"
          description: The unique case-sensitive name of the group.
        GroupARN:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the group generated based on the GroupName.
        FilterExpression:
          $ref: "#/components/schemas/String"
          description: The filter expression defining the parameters to include traces.
        InsightsConfiguration:
          $ref: "#/components/schemas/InsightsConfiguration"
          description: The structure containing configurations related to insights. The InsightsEnabled boolean can be set to true to enable insights for the group or false to disable insights for the group. The NotificationsEnabled boolean can be set to true to enable insights notifications through Amazon EventBridge for the group.
    SamplingRule:
      description: A sampling rule that services use to decide whether to instrument a request. Rule fields can match properties of the service, or properties of a request. The service can ignore rules that don't match its properties.
      type: object
      properties:
        RuleName:
          $ref: "#/components/schemas/RuleName"
          description: The name of the sampling rule. Specify a rule by either name or ARN, but not both.
        RuleARN:
          $ref: "#/components/schemas/String"
          description: The ARN of the sampling rule. Specify a rule by either name or ARN, but not both.
        ResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: Matches the ARN of the Amazon Web Services resource on which the service runs.
        Priority:
          $ref: "#/components/schemas/Priority"
          description: The priority of the sampling rule.
        FixedRate:
          $ref: "#/components/schemas/FixedRate"
          description: The percentage of matching requests to instrument, after the reservoir is exhausted.
        ReservoirSize:
          $ref: "#/components/schemas/ReservoirSize"
          description: A fixed number of matching requests to instrument per second, prior to applying the fixed rate. The reservoir is not used directly by services, but applies to all services using the rule collectively.
        ServiceName:
          $ref: "#/components/schemas/ServiceName"
          description: Matches the name that the service uses to identify itself in segments.
        ServiceType:
          $ref: "#/components/schemas/ServiceType"
          description: Matches the origin that the service uses to identify its type in segments.
        Host:
          $ref: "#/components/schemas/Host"
          description: Matches the hostname from a request URL.
        HTTPMethod:
          $ref: "#/components/schemas/HTTPMethod"
          description: Matches the HTTP method of a request.
        URLPath:
          $ref: "#/components/schemas/URLPath"
          description: Matches the path from a request URL.
        Version:
          $ref: "#/components/schemas/Version"
          description: The version of the sampling rule format (1).
        Attributes:
          type: object
          properties: {}
          description: Matches attributes derived from the request.
        SamplingRateBoost:
          $ref: "#/components/schemas/SamplingRateBoost"
          description: Specifies the multiplier applied to the base sampling rate. This boost allows you to temporarily increase sampling without changing the rule's configuration.
      required:
        - ResourceARN
        - Priority
        - FixedRate
        - ReservoirSize
        - ServiceName
        - ServiceType
        - Host
        - HTTPMethod
        - URLPath
        - Version
    RuleName:
      type: string
      minLength: 1
      maxLength: 32
    ResourceARN:
      type: string
      maxLength: 500
    Priority:
      type: integer
      minimum: 1
      maximum: 9999
    FixedRate:
      type: number
      format: double
      minimum: 0
      maximum: 1
    ReservoirSize:
      type: integer
      minimum: 0
    ServiceName:
      type: string
      maxLength: 64
    ServiceType:
      type: string
      maxLength: 64
    Host:
      type: string
      maxLength: 64
    HTTPMethod:
      type: string
      maxLength: 10
    URLPath:
      type: string
      maxLength: 128
    Version:
      type: integer
      minimum: 1
    SamplingRateBoost:
      description: Enable temporary sampling rate increases when you detect anomalies to improve visibility.
      type: object
      properties:
        MaxRate:
          $ref: "#/components/schemas/MaxRate"
          description: Defines max temporary sampling rate to apply when a boost is triggered. Calculated boost rate by X-Ray will be less than or equal to this max rate.
        CooldownWindowMinutes:
          $ref: "#/components/schemas/CooldownWindowMinutes"
          description: Sets the time window (in minutes) in which only one sampling rate boost can be triggered. After a boost occurs, no further boosts are allowed until the next window.
      required:
        - MaxRate
        - CooldownWindowMinutes
    MaxRate:
      type: number
      format: double
      minimum: 0
      maximum: 1
    CooldownWindowMinutes:
      type: integer
      minimum: 0
    CreateSamplingRuleResult:
      type: object
      properties:
        SamplingRuleRecord:
          $ref: "#/components/schemas/SamplingRuleRecord"
          description: The saved rule definition and metadata.
    SamplingRuleRecord:
      description: A SamplingRule and its metadata.
      type: object
      properties:
        SamplingRule:
          $ref: "#/components/schemas/SamplingRule"
          description: The sampling rule.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: When the rule was created.
        ModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: When the rule was last modified.
    Timestamp:
      type: string
      format: date-time
    GroupARN:
      type: string
      minLength: 1
      maxLength: 400
    DeleteGroupResult:
      type: object
    PolicyName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+=,.@-]+"
    PolicyRevisionId:
      type: string
    DeleteResourcePolicyResult:
      type: object
    DeleteSamplingRuleResult:
      type: object
      properties:
        SamplingRuleRecord:
          $ref: "#/components/schemas/SamplingRuleRecord"
          description: The deleted rule definition and metadata.
    GetEncryptionConfigResult:
      type: object
      properties:
        EncryptionConfig:
          $ref: "#/components/schemas/EncryptionConfig"
          description: The encryption configuration document.
    EncryptionConfig:
      description: A configuration document that specifies encryption configuration settings.
      type: object
      properties:
        KeyId:
          $ref: "#/components/schemas/String"
          description: The ID of the KMS key used for encryption, if applicable.
        Status:
          $ref: "#/components/schemas/EncryptionStatus"
          description: The encryption status. While the status is UPDATING, X-Ray may encrypt data with a combination of the new and old settings.
        Type:
          $ref: "#/components/schemas/EncryptionType"
          description: The type of encryption. Set to KMS for encryption with KMS keys. Set to NONE for default encryption.
    EncryptionStatus:
      type: string
      enum:
        - UPDATING
        - ACTIVE
    EncryptionType:
      type: string
      enum:
        - NONE
        - KMS
    GetGroupResult:
      type: object
      properties:
        Group:
          $ref: "#/components/schemas/Group"
          description: The group that was requested. Contains the name of the group, the ARN of the group, the filter expression, and the insight configuration assigned to the group.
    GetGroupsNextToken:
      type: string
      minLength: 1
      maxLength: 100
    GetGroupsResult:
      type: object
      properties:
        Groups:
          $ref: "#/components/schemas/GroupSummaryList"
          description: The collection of all active groups.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Pagination token.
    GroupSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/GroupSummary"
    GroupSummary:
      description: Details for a group without metadata.
      type: object
      properties:
        GroupName:
          $ref: "#/components/schemas/String"
          description: The unique case-sensitive name of the group.
        GroupARN:
          $ref: "#/components/schemas/String"
          description: The ARN of the group generated based on the GroupName.
        FilterExpression:
          $ref: "#/components/schemas/String"
          description: The filter expression defining the parameters to include traces.
        InsightsConfiguration:
          $ref: "#/components/schemas/InsightsConfiguration"
          description: The structure containing configurations related to insights. The InsightsEnabled boolean can be set to true to enable insights for the group or false to disable insights for the group. The NotificationsEnabled boolean can be set to true to enable insights notifications. Notifications can only be enabled on a group with InsightsEnabled set to true.
    GetIndexingRulesResult:
      type: object
      properties:
        IndexingRules:
          $ref: "#/components/schemas/IndexingRuleList"
          description: Retrieves all indexing rules.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Specify the pagination token returned by a previous request to retrieve the next page of indexes.
    IndexingRuleList:
      type: array
      items:
        $ref: "#/components/schemas/IndexingRule"
    IndexingRule:
      description: Rule used to determine the server-side sampling rate for spans ingested through the CloudWatchLogs destination and indexed by X-Ray.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RuleName"
          description: The name of the indexing rule.
        ModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Displays when the rule was last modified, in Unix time seconds.
        Rule:
          $ref: "#/components/schemas/IndexingRuleValue"
          description: The indexing rule.
    IndexingRuleValue:
      description: The indexing rule configuration.
      type: object
      properties:
        Probabilistic:
          $ref: "#/components/schemas/ProbabilisticRuleValue"
          description: Indexing rule configuration that is used to probabilistically sample traceIds.
    ProbabilisticRuleValue:
      description: The indexing rule configuration for probabilistic sampling.
      type: object
      properties:
        DesiredSamplingPercentage:
          $ref: "#/components/schemas/NullableDouble"
          description: Configured sampling percentage of traceIds. Note that sampling can be subject to limits to ensure completeness of data.
        ActualSamplingPercentage:
          $ref: "#/components/schemas/NullableDouble"
          description: Applied sampling percentage of traceIds.
      required:
        - DesiredSamplingPercentage
    InsightId:
      type: string
      pattern: "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}"
    GetInsightResult:
      type: object
      properties:
        Insight:
          $ref: "#/components/schemas/Insight"
          description: The summary information of an insight.
    Insight:
      description: When fault rates go outside of the expected range, X-Ray creates an insight. Insights tracks emergent issues within your applications.
      type: object
      properties:
        InsightId:
          $ref: "#/components/schemas/InsightId"
          description: The insights unique identifier.
        GroupARN:
          $ref: "#/components/schemas/GroupARN"
          description: The Amazon Resource Name (ARN) of the group that the insight belongs to.
        GroupName:
          $ref: "#/components/schemas/GroupName"
          description: The name of the group that the insight belongs to.
        RootCauseServiceId:
          $ref: "#/components/schemas/ServiceId"
        Categories:
          $ref: "#/components/schemas/InsightCategoryList"
          description: The categories that label and describe the type of insight.
        State:
          $ref: "#/components/schemas/InsightState"
          description: The current state of the insight.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the insight began.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the insight ended.
        Summary:
          $ref: "#/components/schemas/InsightSummaryText"
          description: A brief description of the insight.
        ClientRequestImpactStatistics:
          $ref: "#/components/schemas/RequestImpactStatistics"
          description: The impact statistics of the client side service. This includes the number of requests to the client service and whether the requests were faults or okay.
        RootCauseServiceRequestImpactStatistics:
          $ref: "#/components/schemas/RequestImpactStatistics"
          description: The impact statistics of the root cause service. This includes the number of requests to the client service and whether the requests were faults or okay.
        TopAnomalousServices:
          $ref: "#/components/schemas/AnomalousServiceList"
          description: The service within the insight that is most impacted by the incident.
    ServiceId:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
        Names:
          $ref: "#/components/schemas/ServiceNames"
        AccountId:
          $ref: "#/components/schemas/String"
        Type:
          $ref: "#/components/schemas/String"
    ServiceNames:
      type: array
      items:
        $ref: "#/components/schemas/String"
    InsightCategoryList:
      type: array
      items:
        $ref: "#/components/schemas/InsightCategory"
    InsightCategory:
      type: string
      enum:
        - FAULT
    InsightState:
      type: string
      enum:
        - ACTIVE
        - CLOSED
    InsightSummaryText:
      type: string
    RequestImpactStatistics:
      description: Statistics that describe how the incident has impacted a service.
      type: object
      properties:
        FaultCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of requests that have resulted in a fault,
        OkCount:
          $ref: "#/components/schemas/NullableLong"
          description: The number of successful requests.
        TotalCount:
          $ref: "#/components/schemas/NullableLong"
          description: The total number of requests to the service.
    NullableLong:
      type: integer
      format: int64
    AnomalousServiceList:
      type: array
      items:
        $ref: "#/components/schemas/AnomalousService"
    AnomalousService:
      description: The service within the service graph that has anomalously high fault rates.
      type: object
      properties:
        ServiceId:
          $ref: "#/components/schemas/ServiceId"
    GetInsightEventsMaxResults:
      type: integer
      minimum: 1
      maximum: 50
    Token:
      type: string
      minLength: 1
      maxLength: 2000
    GetInsightEventsResult:
      type: object
      properties:
        InsightEvents:
          $ref: "#/components/schemas/InsightEventList"
          description: A detailed description of the event. This includes the time of the event, client and root cause impact statistics, and the top anomalous service at the time of the event.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: Use this token to retrieve the next page of insight events.
    InsightEventList:
      type: array
      items:
        $ref: "#/components/schemas/InsightEvent"
    InsightEvent:
      description: X-Ray reevaluates insights periodically until they are resolved, and records each intermediate state in an event. You can review incident events in the Impact Timeline on the Inspect page in the X-Ray console.
      type: object
      properties:
        Summary:
          $ref: "#/components/schemas/EventSummaryText"
          description: A brief description of the event.
        EventTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the event was recorded.
        ClientRequestImpactStatistics:
          $ref: "#/components/schemas/RequestImpactStatistics"
          description: The impact statistics of the client side service. This includes the number of requests to the client service and whether the requests were faults or okay.
        RootCauseServiceRequestImpactStatistics:
          $ref: "#/components/schemas/RequestImpactStatistics"
          description: The impact statistics of the root cause service. This includes the number of requests to the client service and whether the requests were faults or okay.
        TopAnomalousServices:
          $ref: "#/components/schemas/AnomalousServiceList"
          description: The service during the event that is most impacted by the incident.
    EventSummaryText:
      type: string
    GetInsightImpactGraphResult:
      type: object
      properties:
        InsightId:
          $ref: "#/components/schemas/InsightId"
          description: The insight's unique identifier.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The provided start time.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The provided end time.
        ServiceGraphStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the service graph started.
        ServiceGraphEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in Unix seconds, at which the service graph ended.
        Services:
          $ref: "#/components/schemas/InsightImpactGraphServiceList"
          description: The Amazon Web Services instrumented services related to the insight.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: Pagination token.
    InsightImpactGraphServiceList:
      type: array
      items:
        $ref: "#/components/schemas/InsightImpactGraphService"
    InsightImpactGraphService:
      description: Information about an application that processed requests, users that made requests, or downstream services, resources, and applications that an application used.
      type: object
      properties:
        ReferenceId:
          $ref: "#/components/schemas/NullableInteger"
          description: Identifier for the service. Unique within the service map.
        Type:
          $ref: "#/components/schemas/String"
          description: Identifier for the service. Unique within the service map. Amazon Web Services Resource - The type of an Amazon Web Services resource. For example, AWS::EC2::Instance for an application running on Amazon EC2 or AWS::DynamoDB::Table for an Amazon DynamoDB table that the application used. Amazon Web Services Service - The type of an Amazon Web Services service. For example, AWS::DynamoDB for downstream calls to Amazon DynamoDB that didn't target a specific table. Amazon Web Services Service - The type of an Amazon Web Services service. For example, AWS::DynamoDB for downstream calls to Amazon DynamoDB that didn't target a specific table. remote - A downstream service of indeterminate type.
        Name:
          $ref: "#/components/schemas/String"
          description: The canonical name of the service.
        Names:
          $ref: "#/components/schemas/ServiceNames"
          description: A list of names for the service, including the canonical name.
        AccountId:
          $ref: "#/components/schemas/String"
          description: Identifier of the Amazon Web Services account in which the service runs.
        Edges:
          $ref: "#/components/schemas/InsightImpactGraphEdgeList"
          description: Connections to downstream services.
    NullableInteger:
      type: integer
    InsightImpactGraphEdgeList:
      type: array
      items:
        $ref: "#/components/schemas/InsightImpactGraphEdge"
    InsightImpactGraphEdge:
