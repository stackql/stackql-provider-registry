openapi: 3.0.0
info:
  version: "2015-12-08"
  title: AWS Certificate Manager
  description: AWS Certificate Manager
  x-serviceName: acm
  x-serviceAlias: acm
  x-protocol: json
  x-apiVersion: "2015-12-08"
  x-endpointPrefix: acm
  x-targetPrefix: CertificateManager
  x-jsonVersion: "1.1"
servers:
  - url: https://acm.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for acm
paths:
  /AddTagsToCertificate:
    post:
      operationId: AddTagsToCertificate
      description: Adds one or more tags to an ACM certificate. Tags are labels that you can use to identify and organize your Amazon Web Services resources. Each tag consists of a key and an optional value. You specify the certificate on input by its Amazon Resource Name (ARN). You specify the tag by using a key-value pair. You can apply a tag to just one certificate if you want to identify a specific characteristic of that certificate, or you can apply the same tag to multiple certificates if you want to filter for a common relationship among those certificates. Similarly, you can apply the same tag to multiple resources if you want to specify a relationship among those resources. For example, you can add the same tag to an ACM certificate and an Elastic Load Balancing load balancer to indicate that they are both used by the same website. For more information, see Tagging ACM certificates. To remove one or more tags, use the RemoveTagsFromCertificate action. To view all of the tags that have been applied to the certificate, use the ListTagsForCertificate action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.AddTagsToCertificate
            default: CertificateManager.AddTagsToCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains the ARN of the ACM certificate to which the tag is to be applied. This must be of the form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key-value pair that defines the tag. The tag value is optional.
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
  /DeleteCertificate:
    post:
      operationId: DeleteCertificate
      description: Deletes a certificate and its associated private key. If this action succeeds, the certificate is not available for use by Amazon Web Services services integrated with ACM. Deleting a certificate is eventually consistent. The may be a short delay before the certificate no longer appears in the list that can be displayed by calling the ListCertificates action or be retrieved by calling the GetCertificate action. You cannot delete an ACM certificate that is being used by another Amazon Web Services service. To delete a certificate that is in use, you must first remove the certificate association using the console or the CLI for the associated service. Deleting a certificate issued by a private certificate authority (CA) has no effect on the CA. You will continue to be charged for the CA until it is deleted. For more information, see Deleting Your Private CA in the Private Certificate Authority User Guide. Deleting a certificate issued by a private certificate authority (CA) has no effect on the CA. You will continue to be charged for the CA until it is deleted. For more information, see Deleting your private CA in the Amazon Web Services Private Certificate Authority User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.DeleteCertificate
            default: CertificateManager.DeleteCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains the ARN of the ACM certificate to be deleted. This must be of the form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
  /DescribeCertificate:
    post:
      operationId: DescribeCertificate
      description: Returns detailed metadata about the specified ACM certificate. If you have just created a certificate using the RequestCertificate action, there is a delay of several seconds before you can retrieve information about it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.DescribeCertificate
            default: CertificateManager.DescribeCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of the ACM certificate. The ARN must have the following form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCertificateResponse"
  /ExportCertificate:
    post:
      operationId: ExportCertificate
      description: Exports a private certificate issued by a private certificate authority (CA) or a public certificate for use anywhere. The exported file contains the certificate, the certificate chain, and the encrypted private key associated with the public key that is embedded in the certificate. For security, you must assign a passphrase for the private key when exporting it. For information about exporting and formatting a certificate using the ACM console or CLI, see Export a private certificate and Export a public certificate. ACM public certificates created prior to June 17, 2025 cannot be exported.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.ExportCertificate
            default: CertificateManager.ExportCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "An Amazon Resource Name (ARN) of the issued certificate. This must be of the form: arn:aws:acm:region:account:certificate/12345678-1234-1234-1234-123456789012"
                Passphrase:
                  $ref: "#/components/schemas/PassphraseBlob"
                  description: "Passphrase to associate with the encrypted exported private key. When creating your passphrase, you can use any ASCII character except #, $, or %. If you want to later decrypt the private key, you must have the passphrase. You can use the following OpenSSL command to decrypt a private key. After entering the command, you are prompted for the passphrase. openssl rsa -in encrypted_key.pem -out decrypted_key.pem"
              required:
                - CertificateArn
                - Passphrase
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportCertificateResponse"
  /GetAccountConfiguration:
    post:
      operationId: GetAccountConfiguration
      description: Returns the account configuration options associated with an Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.GetAccountConfiguration
            default: CertificateManager.GetAccountConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountConfigurationResponse"
  /GetCertificate:
    post:
      operationId: GetCertificate
      description: Retrieves a certificate and its certificate chain. The certificate may be either a public or private certificate issued using the ACM RequestCertificate action, or a certificate imported into ACM using the ImportCertificate action. The chain consists of the certificate of the issuing CA and the intermediate certificates of any other subordinate CAs. All of the certificates are base64 encoded. You can use OpenSSL to decode the certificates and inspect individual fields.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.GetCertificate
            default: CertificateManager.GetCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains a certificate ARN in the following format: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCertificateResponse"
  /ImportCertificate:
    post:
      operationId: ImportCertificate
      description: "Imports a certificate into Certificate Manager (ACM) to use with services that are integrated with ACM. Note that integrated services allow only certificate types and keys they support to be associated with their resources. Further, their support differs depending on whether the certificate is imported into IAM or into ACM. For more information, see the documentation for each service. For more information about importing certificates into ACM, see Importing Certificates in the Certificate Manager User Guide. ACM does not provide managed renewal for certificates that you import. Note the following guidelines when importing third party certificates: You must enter the private key that matches the certificate you are importing. The private key must be unencrypted. You cannot import a private key that is protected by a password or a passphrase. The private key must be no larger than 5 KB (5,120 bytes). The certificate, private key, and certificate chain must be PEM-encoded. The current time must be between the Not Before and Not After certificate fields. The Issuer field must not be empty. The OCSP authority URL, if present, must not exceed 1000 characters. To import a new certificate, omit the CertificateArn argument. Include this argument only when you want to replace a previously imported certificate. When you import a certificate by using the CLI, you must specify the certificate, the certificate chain, and the private key by their file names preceded by fileb://. For example, you can specify a certificate saved in the C:\\temp folder as fileb://C:\\temp\\certificate_to_import.pem. If you are making an HTTP or HTTPS Query request, include these arguments as BLOBs. When you import a certificate by using an SDK, you must specify the certificate, the certificate chain, and the private key files in the manner required by the programming language you're using. The cryptographic algorithm of an imported certificate must match the algorithm of the signing CA. For example, if the signing CA key type is RSA, then the certificate key type must also be RSA. This operation returns the Amazon Resource Name (ARN) of the imported certificate."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.ImportCertificate
            default: CertificateManager.ImportCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of an imported certificate to replace. To import a new certificate, omit this field.
                Certificate:
                  $ref: "#/components/schemas/CertificateBodyBlob"
                  description: The certificate to import.
                PrivateKey:
                  $ref: "#/components/schemas/PrivateKeyBlob"
                  description: The private key that matches the public key in the certificate.
                CertificateChain:
                  $ref: "#/components/schemas/CertificateChainBlob"
                  description: The PEM encoded certificate chain.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "One or more resource tags to associate with the imported certificate. Note: You cannot apply tags when reimporting a certificate."
              required:
                - PrivateKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCertificateResponse"
  /ListCertificates:
    post:
      operationId: ListCertificates
      description: Retrieves a list of certificate ARNs and domain names. You can request that only certificates that match a specific status be listed. You can also filter by specific attributes of the certificate. Default filtering returns only RSA_2048 certificates. For more information, see Filters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.ListCertificates
            default: CertificateManager.ListCertificates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateStatuses:
                  $ref: "#/components/schemas/CertificateStatuses"
                  description: Filter the certificate list by status value.
                Includes:
                  $ref: "#/components/schemas/Filters"
                  description: Filter the certificate list. For more information, see the Filters structure.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Use this parameter only when paginating results and only in a subsequent request after you receive a response with truncated results. Set it to the value of NextToken from the response you just received.
                MaxItems:
                  $ref: "#/components/schemas/MaxItems"
                  description: Use this parameter when paginating results to specify the maximum number of items to return in the response. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
                SortBy:
                  $ref: "#/components/schemas/SortBy"
                  description: Specifies the field to sort results by. If you specify SortBy, you must also specify SortOrder.
                SortOrder:
                  $ref: "#/components/schemas/SortOrder"
                  description: Specifies the order of sorted results. If you specify SortOrder, you must also specify SortBy.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCertificatesResponse"
  /ListTagsForCertificate:
    post:
      operationId: ListTagsForCertificate
      description: Lists the tags that have been applied to the ACM certificate. Use the certificate's Amazon Resource Name (ARN) to specify the certificate. To add a tag to an ACM certificate, use the AddTagsToCertificate action. To delete a tag, use the RemoveTagsFromCertificate action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.ListTagsForCertificate
            default: CertificateManager.ListTagsForCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains the ARN of the ACM certificate for which you want to list the tags. This must have the following form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForCertificateResponse"
  /PutAccountConfiguration:
    post:
      operationId: PutAccountConfiguration
      description: Adds or modifies account-level configurations in ACM. The supported configuration option is DaysBeforeExpiry. This option specifies the number of days prior to certificate expiration when ACM starts generating EventBridge events. ACM sends one event per day per certificate until the certificate expires. By default, accounts receive events starting 45 days before certificate expiration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.PutAccountConfiguration
            default: CertificateManager.PutAccountConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ExpiryEvents:
                  $ref: "#/components/schemas/ExpiryEventsConfiguration"
                  description: Specifies expiration events associated with an account.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Customer-chosen string used to distinguish between calls to PutAccountConfiguration. Idempotency tokens time out after one hour. If you call PutAccountConfiguration multiple times with the same unexpired idempotency token, ACM treats it as the same request and returns the original result. If you change the idempotency token for each call, ACM treats each call as a new request.
              required:
                - IdempotencyToken
      responses:
        "200":
          description: Success
  /RemoveTagsFromCertificate:
    post:
      operationId: RemoveTagsFromCertificate
      description: Remove one or more tags from an ACM certificate. A tag consists of a key-value pair. If you do not specify the value portion of the tag when calling this function, the tag will be removed regardless of value. If you specify a value, the tag is removed only if it is associated with the specified value. To add tags to a certificate, use the AddTagsToCertificate action. To view all of the tags that have been applied to a specific ACM certificate, use the ListTagsForCertificate action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.RemoveTagsFromCertificate
            default: CertificateManager.RemoveTagsFromCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains the ARN of the ACM Certificate with one or more tags that you want to remove. This must be of the form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The key-value pair that defines the tag to remove.
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
  /RenewCertificate:
    post:
      operationId: RenewCertificate
      description: Renews an eligible ACM certificate. In order to renew your Amazon Web Services Private CA certificates with ACM, you must first grant the ACM service principal permission to do so. For more information, see Testing Managed Renewal in the ACM User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.RenewCertificate
            default: CertificateManager.RenewCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains the ARN of the ACM certificate to be renewed. This must be of the form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
              required:
                - CertificateArn
      responses:
        "200":
          description: Success
  /RequestCertificate:
    post:
      operationId: RequestCertificate
      description: Requests an ACM certificate for use with other Amazon Web Services services. To request an ACM certificate, you must specify a fully qualified domain name (FQDN) in the DomainName parameter. You can also specify additional FQDNs in the SubjectAlternativeNames parameter. If you are requesting a private certificate, domain validation is not required. If you are requesting a public certificate, each domain name that you specify must be validated to verify that you own or control the domain. You can use DNS validation or email validation. We recommend that you use DNS validation. ACM behavior differs from the RFC 6125 specification of the certificate validation process. ACM first checks for a Subject Alternative Name, and, if it finds one, ignores the common name (CN). After successful completion of the RequestCertificate action, there is a delay of several seconds before you can retrieve information about the new certificate.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.RequestCertificate
            default: CertificateManager.RequestCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainNameString"
                  description: Fully qualified domain name (FQDN), such as www.example.com, that you want to secure with an ACM certificate. Use an asterisk (*) to create a wildcard certificate that protects several sites in the same domain. For example, *.example.com protects www.example.com, site.example.com, and images.example.com. In compliance with RFC 5280, the length of the domain name (technically, the Common Name) that you provide cannot exceed 64 octets (characters), including periods. To add a longer domain name, specify it in the Subject Alternative Name field, which supports names up to 253 octets in length.
                ValidationMethod:
                  $ref: "#/components/schemas/ValidationMethod"
                  description: The method you want to use if you are requesting a public certificate to validate that you own or control domain. You can validate with DNS or validate with email. We recommend that you use DNS validation.
                SubjectAlternativeNames:
                  $ref: "#/components/schemas/DomainList"
                  description: "Additional FQDNs to be included in the Subject Alternative Name extension of the ACM certificate. For example, add the name www.example.net to a certificate for which the DomainName field is www.example.com if users can reach your site by using either name. The maximum number of domain names that you can add to an ACM certificate is 100. However, the initial quota is 10 domain names. If you need more than 10 names, you must request a quota increase. For more information, see Quotas. The maximum length of a SAN DNS name is 253 octets. The name is made up of multiple labels separated by periods. No label can be longer than 63 octets. Consider the following examples: (63 octets).(63 octets).(63 octets).(61 octets) is legal because the total length is 253 octets (63+1+63+1+63+1+61) and no label exceeds 63 octets. (64 octets).(63 octets).(63 octets).(61 octets) is not legal because the total length exceeds 253 octets (64+1+63+1+63+1+61) and the first label exceeds 63 octets. (63 octets).(63 octets).(63 octets).(62 octets) is not legal because the total length of the DNS name (63+1+63+1+63+1+62) exceeds 253 octets."
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Customer chosen string that can be used to distinguish between calls to RequestCertificate. Idempotency tokens time out after one hour. Therefore, if you call RequestCertificate multiple times with the same idempotency token within one hour, ACM recognizes that you are requesting only one certificate and will issue only one. If you change the idempotency token for each call, ACM recognizes that you are requesting multiple certificates.
                DomainValidationOptions:
                  $ref: "#/components/schemas/DomainValidationOptionList"
                  description: The domain name that you want ACM to use to send you emails so that you can validate domain ownership.
                Options:
                  $ref: "#/components/schemas/CertificateOptions"
                  description: You can use this parameter to specify whether to add the certificate to a certificate transparency log and export your certificate. Certificate transparency makes it possible to detect SSL/TLS certificates that have been mistakenly or maliciously issued. Certificates that have not been logged typically produce an error message in a browser. For more information, see Opting Out of Certificate Transparency Logging. You can export public ACM certificates to use with Amazon Web Services services as well as outside the Amazon Web Services Cloud. For more information, see Certificate Manager exportable public certificate.
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/PcaArn"
                  description: "The Amazon Resource Name (ARN) of the private certificate authority (CA) that will be used to issue the certificate. If you do not provide an ARN and you are trying to request a private certificate, ACM will attempt to issue a public certificate. For more information about private CAs, see the Amazon Web Services Private Certificate Authority user guide. The ARN must have the following form: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more resource tags to associate with the certificate.
                KeyAlgorithm:
                  $ref: "#/components/schemas/KeyAlgorithm"
                  description: "Specifies the algorithm of the public and private key pair that your certificate uses to encrypt data. RSA is the default key algorithm for ACM certificates. Elliptic Curve Digital Signature Algorithm (ECDSA) keys are smaller, offering security comparable to RSA keys but with greater computing efficiency. However, ECDSA is not supported by all network clients. Some Amazon Web Services services may require RSA keys, or only support ECDSA keys of a particular size, while others allow the use of either RSA and ECDSA keys to ensure that compatibility is not broken. Check the requirements for the Amazon Web Services service where you plan to deploy your certificate. For more information about selecting an algorithm, see Key algorithms. Algorithms supported for an ACM certificate request include: RSA_2048 EC_prime256v1 EC_secp384r1 Other listed algorithms are for imported certificates only. When you request a private PKI certificate signed by a CA from Amazon Web Services Private CA, the specified signing algorithm family (RSA or ECDSA) must match the algorithm family of the CA's secret key. Default: RSA_2048"
                ManagedBy:
                  $ref: "#/components/schemas/CertificateManagedBy"
                  description: Identifies the Amazon Web Services service that manages the certificate issued by ACM.
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestCertificateResponse"
  /ResendValidationEmail:
    post:
      operationId: ResendValidationEmail
      description: Resends the email that requests domain ownership validation. The domain owner or an authorized representative must approve the ACM certificate before it can be issued. The certificate can be approved by clicking a link in the mail to navigate to the Amazon certificate approval website and then clicking I Approve. However, the validation email can be blocked by spam filters. Therefore, if you do not receive the original mail, you can request that the mail be resent within 72 hours of requesting the ACM certificate. If more than 72 hours have elapsed since your original request or since your last attempt to resend validation mail, you must request a new certificate. For more information about setting up your contact email addresses, see Configure Email for your Domain.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.ResendValidationEmail
            default: CertificateManager.ResendValidationEmail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "String that contains the ARN of the requested certificate. The certificate ARN is generated and returned by the RequestCertificate action as soon as the request is made. By default, using this parameter causes email to be sent to all top-level domains you specified in the certificate request. The ARN must be of the form: arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
                Domain:
                  $ref: "#/components/schemas/DomainNameString"
                  description: The fully qualified domain name (FQDN) of the certificate that needs to be validated.
                ValidationDomain:
                  $ref: "#/components/schemas/DomainNameString"
                  description: "The base validation domain that will act as the suffix of the email addresses that are used to send the emails. This must be the same as the Domain value or a superdomain of the Domain value. For example, if you requested a certificate for site.subdomain.example.com and specify a ValidationDomain of subdomain.example.com, ACM sends email to the the following five addresses: admin@subdomain.example.com administrator@subdomain.example.com hostmaster@subdomain.example.com postmaster@subdomain.example.com webmaster@subdomain.example.com"
              required:
                - CertificateArn
                - Domain
                - ValidationDomain
      responses:
        "200":
          description: Success
  /RevokeCertificate:
    post:
      operationId: RevokeCertificate
      description: Revokes a public ACM certificate. You can only revoke certificates that have been previously exported. Once a certificate is revoked, you cannot reuse the certificate. Revoking a certificate is permanent.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.RevokeCertificate
            default: CertificateManager.RevokeCertificate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "The Amazon Resource Name (ARN) of the public or private certificate that will be revoked. The ARN must have the following form: arn:aws:acm:region:account:certificate/12345678-1234-1234-1234-123456789012"
                RevocationReason:
                  $ref: "#/components/schemas/RevocationReason"
                  description: Specifies why you revoked the certificate.
              required:
                - CertificateArn
                - RevocationReason
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeCertificateResponse"
  /SearchCertificates:
    post:
      operationId: SearchCertificates
      description: Retrieves a list of certificates matching search criteria. You can filter certificates by X.509 attributes and ACM specific properties like certificate status, type and renewal eligibility. This operation provides more flexible filtering than ListCertificates by supporting complex filter statements.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.SearchCertificates
            default: CertificateManager.SearchCertificates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                FilterStatement:
                  $ref: "#/components/schemas/CertificateFilterStatement"
                  description: A filter statement that defines the search criteria. You can combine multiple filters using AND, OR, and NOT logical operators to create complex queries.
                MaxResults:
                  $ref: "#/components/schemas/SearchMaxResults"
                  description: The maximum number of results to return in the response. Default is 100.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Use this parameter only when paginating results and only in a subsequent request after you receive a response with truncated results. Set it to the value of NextToken from the response you just received.
                SortBy:
                  $ref: "#/components/schemas/SearchCertificatesSortBy"
                  description: Specifies the field to sort results by. Valid values are CREATED_AT, NOT_AFTER, STATUS, RENEWAL_STATUS, EXPORTED, IN_USE, NOT_BEFORE, KEY_ALGORITHM, TYPE, CERTIFICATE_ARN, COMMON_NAME, REVOKED_AT, RENEWAL_ELIGIBILITY, ISSUED_AT, MANAGED_BY, EXPORT_OPTION, VALIDATION_METHOD, and IMPORTED_AT.
                SortOrder:
                  $ref: "#/components/schemas/SearchCertificatesSortOrder"
                  description: Specifies the order of sorted results. Valid values are ASCENDING or DESCENDING.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchCertificatesResponse"
  /UpdateCertificateOptions:
    post:
      operationId: UpdateCertificateOptions
      description: Updates a certificate. You can use this function to specify whether to opt in to or out of recording your certificate in a certificate transparency log and exporting. For more information, see Opting Out of Certificate Transparency Logging and Certificate Manager Exportable Managed Certificates.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CertificateManager.UpdateCertificateOptions
            default: CertificateManager.UpdateCertificateOptions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CertificateArn:
                  $ref: "#/components/schemas/Arn"
                  description: "ARN of the requested certificate to update. This must be of the form: arn:aws:acm:us-east-1:account:certificate/12345678-1234-1234-1234-123456789012"
                Options:
                  $ref: "#/components/schemas/CertificateOptions"
                  description: Use to update the options for your certificate. Currently, you can specify whether to add your certificate to a transparency log or export your certificate. Certificate transparency makes it possible to detect SSL/TLS certificates that have been mistakenly or maliciously issued. Certificates that have not been logged typically produce an error message in a browser.
              required:
                - CertificateArn
                - Options
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=/,.@-]+:acm:[\w+=/,.@-]*:[0-9]+:[\w+=,.@-]+(/[\w+=,.@-]+)*
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair that identifies or specifies metadata about an ACM resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{Z}\\p{N}_.:\\/=+\\-@]*"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\p{L}\\p{Z}\\p{N}_.:\\/=+\\-@]*"
    DescribeCertificateResponse:
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/CertificateDetail"
          description: Metadata about an ACM certificate.
    CertificateDetail:
      description: Contains metadata about an ACM certificate. This structure is returned in the response to a DescribeCertificate request.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the certificate. For more information about ARNs, see Amazon Resource Names (ARNs) in the Amazon Web Services General Reference.
        DomainName:
          $ref: "#/components/schemas/DomainNameString"
          description: The fully qualified domain name for the certificate, such as www.example.com or example.com.
        SubjectAlternativeNames:
          $ref: "#/components/schemas/DomainList"
          description: One or more domain names (subject alternative names) included in the certificate. This list contains the domain names that are bound to the public key that is contained in the certificate. The subject alternative names include the canonical domain name (CN) of the certificate and additional domain names that can be used to connect to the website.
        ManagedBy:
          $ref: "#/components/schemas/CertificateManagedBy"
          description: Identifies the Amazon Web Services service that manages the certificate issued by ACM.
        DomainValidationOptions:
          $ref: "#/components/schemas/DomainValidationList"
          description: Contains information about the initial validation of each domain name that occurs as a result of the RequestCertificate request. This field exists only when the certificate type is AMAZON_ISSUED.
        Serial:
          $ref: "#/components/schemas/String"
          description: The serial number of the certificate.
        Subject:
          $ref: "#/components/schemas/String"
          description: The name of the entity that is associated with the public key contained in the certificate.
        Issuer:
          $ref: "#/components/schemas/String"
          description: The name of the certificate authority that issued and signed the certificate.
        CreatedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was requested.
        IssuedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was issued. This value exists only when the certificate type is AMAZON_ISSUED.
        ImportedAt:
          $ref: "#/components/schemas/TStamp"
          description: The date and time when the certificate was imported. This value exists only when the certificate type is IMPORTED.
        Status:
          $ref: "#/components/schemas/CertificateStatus"
          description: The status of the certificate. A certificate enters status PENDING_VALIDATION upon being requested, unless it fails for any of the reasons given in the troubleshooting topic Certificate request fails. ACM makes repeated attempts to validate a certificate for 72 hours and then times out. If a certificate shows status FAILED or VALIDATION_TIMED_OUT, delete the request, correct the issue with DNS validation or Email validation, and try again. If validation succeeds, the certificate enters status ISSUED.
        RevokedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was revoked. This value exists only when the certificate status is REVOKED.
        RevocationReason:
          $ref: "#/components/schemas/RevocationReason"
          description: The reason the certificate was revoked. This value exists only when the certificate status is REVOKED.
        NotBefore:
          $ref: "#/components/schemas/TStamp"
          description: The time before which the certificate is not valid.
        NotAfter:
          $ref: "#/components/schemas/TStamp"
          description: The time after which the certificate is not valid.
        KeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The algorithm that was used to generate the public-private key pair.
        SignatureAlgorithm:
          $ref: "#/components/schemas/String"
          description: The algorithm that was used to sign the certificate.
        InUseBy:
          $ref: "#/components/schemas/InUseList"
          description: A list of ARNs for the Amazon Web Services resources that are using the certificate. A certificate can be used by multiple Amazon Web Services resources.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason the certificate request failed. This value exists only when the certificate status is FAILED. For more information, see Certificate Request Failed in the Certificate Manager User Guide.
        Type:
          $ref: "#/components/schemas/CertificateType"
          description: The source of the certificate. For certificates provided by ACM, this value is AMAZON_ISSUED. For certificates that you imported with ImportCertificate, this value is IMPORTED. ACM does not provide managed renewal for imported certificates. For more information about the differences between certificates that you import and those that ACM provides, see Importing Certificates in the Certificate Manager User Guide.
        RenewalSummary:
          $ref: "#/components/schemas/RenewalSummary"
          description: Contains information about the status of ACM's managed renewal for the certificate. This field exists only when the certificate type is AMAZON_ISSUED.
        KeyUsages:
          $ref: "#/components/schemas/KeyUsageList"
          description: A list of Key Usage X.509 v3 extension objects. Each object is a string value that identifies the purpose of the public key contained in the certificate. Possible extension values include DIGITAL_SIGNATURE, KEY_ENCHIPHERMENT, NON_REPUDIATION, and more.
        ExtendedKeyUsages:
          $ref: "#/components/schemas/ExtendedKeyUsageList"
          description: Contains a list of Extended Key Usage X.509 v3 extension objects. Each object specifies a purpose for which the certificate public key can be used and consists of a name and an object identifier (OID).
        CertificateAuthorityArn:
          $ref: "#/components/schemas/Arn"
          description: "The Amazon Resource Name (ARN) of the private certificate authority (CA) that issued the certificate. This has the following format: arn:aws:acm-pca:region:account:certificate-authority/12345678-1234-1234-1234-123456789012"
        RenewalEligibility:
          $ref: "#/components/schemas/RenewalEligibility"
          description: Specifies whether the certificate is eligible for renewal. At this time, only exported private certificates can be renewed with the RenewCertificate command.
        Options:
          $ref: "#/components/schemas/CertificateOptions"
          description: Value that specifies whether to add the certificate to a transparency log. Certificate transparency makes it possible to detect SSL certificates that have been mistakenly or maliciously issued. A browser might respond to certificate that has not been logged by showing an error message. The logs are cryptographically secure.
    DomainNameString:
      type: string
      minLength: 1
      maxLength: 253
      pattern: (\*\.)?(((?!-)[A-Za-z0-9-]{0,62}[A-Za-z0-9])\.)+((?!-)[A-Za-z0-9-]{1,62}[A-Za-z0-9])
    DomainList:
      type: array
      items:
        $ref: "#/components/schemas/DomainNameString"
    CertificateManagedBy:
      type: string
      enum:
        - CLOUDFRONT
    DomainValidationList:
      type: array
      items:
        $ref: "#/components/schemas/DomainValidation"
    DomainValidation:
      description: Contains information about the validation of each domain name in the certificate.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/DomainNameString"
          description: A fully qualified domain name (FQDN) in the certificate. For example, www.example.com or example.com.
        ValidationEmails:
          $ref: "#/components/schemas/ValidationEmailList"
          description: A list of email addresses that ACM used to send domain validation emails.
        ValidationDomain:
          $ref: "#/components/schemas/DomainNameString"
          description: The domain name that ACM used to send domain validation emails.
        ValidationStatus:
          $ref: "#/components/schemas/DomainStatus"
          description: "The validation status of the domain name. This can be one of the following values: PENDING_VALIDATION SUCCESS FAILED"
        ResourceRecord:
          $ref: "#/components/schemas/ResourceRecord"
          description: Contains the CNAME record that you add to your DNS database for domain validation. For more information, see Use DNS to Validate Domain Ownership. The CNAME information that you need does not include the name of your domain. If you include your domain name in the DNS database CNAME record, validation fails. For example, if the name is _a79865eb4cd1a6ab990a45779b4e0b96.yourdomain.com, only _a79865eb4cd1a6ab990a45779b4e0b96 must be used.
        HttpRedirect:
          $ref: "#/components/schemas/HttpRedirect"
          description: Contains information for HTTP-based domain validation of certificates requested through Amazon CloudFront and issued by ACM. This field exists only when the certificate type is AMAZON_ISSUED and the validation method is HTTP.
        ValidationMethod:
          $ref: "#/components/schemas/ValidationMethod"
          description: Specifies the domain validation method.
      required:
        - DomainName
    ValidationEmailList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    DomainStatus:
      type: string
      enum:
        - PENDING_VALIDATION
        - SUCCESS
        - FAILED
    ResourceRecord:
      description: Contains a DNS record value that you can use to validate ownership or control of a domain. This is used by the DescribeCertificate action.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the DNS record to create in your domain. This is supplied by ACM.
        Type:
          $ref: "#/components/schemas/RecordType"
          description: The type of DNS record. Currently this can be CNAME.
        Value:
          $ref: "#/components/schemas/String"
          description: The value of the CNAME record to add to your DNS database. This is supplied by ACM.
      required:
        - Name
        - Type
        - Value
    RecordType:
      type: string
      enum:
        - CNAME
    HttpRedirect:
      description: Contains information for HTTP-based domain validation of certificates requested through Amazon CloudFront and issued by ACM. This field exists only when the certificate type is AMAZON_ISSUED and the validation method is HTTP.
      type: object
      properties:
        RedirectFrom:
          $ref: "#/components/schemas/String"
          description: The URL including the domain to be validated. The certificate authority sends GET requests here during validation.
        RedirectTo:
          $ref: "#/components/schemas/String"
          description: The URL hosting the validation token. RedirectFrom must return this content or redirect here.
    ValidationMethod:
      type: string
      enum:
        - EMAIL
        - DNS
        - HTTP
    TStamp:
      type: string
      format: date-time
    CertificateStatus:
      type: string
      enum:
        - PENDING_VALIDATION
        - ISSUED
        - INACTIVE
        - EXPIRED
        - VALIDATION_TIMED_OUT
        - REVOKED
        - FAILED
    RevocationReason:
      type: string
      enum:
        - UNSPECIFIED
        - KEY_COMPROMISE
        - CA_COMPROMISE
        - AFFILIATION_CHANGED
        - SUPERCEDED
        - SUPERSEDED
        - CESSATION_OF_OPERATION
        - CERTIFICATE_HOLD
        - REMOVE_FROM_CRL
        - PRIVILEGE_WITHDRAWN
        - A_A_COMPROMISE
    KeyAlgorithm:
      type: string
      enum:
        - RSA_1024
        - RSA_2048
        - RSA_3072
        - RSA_4096
        - EC_prime256v1
        - EC_secp384r1
        - EC_secp521r1
    InUseList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    FailureReason:
      type: string
      enum:
        - NO_AVAILABLE_CONTACTS
        - ADDITIONAL_VERIFICATION_REQUIRED
        - DOMAIN_NOT_ALLOWED
        - INVALID_PUBLIC_DOMAIN
        - DOMAIN_VALIDATION_DENIED
        - CAA_ERROR
        - PCA_LIMIT_EXCEEDED
        - PCA_INVALID_ARN
        - PCA_INVALID_STATE
        - PCA_REQUEST_FAILED
        - PCA_NAME_CONSTRAINTS_VALIDATION
        - PCA_RESOURCE_NOT_FOUND
        - PCA_INVALID_ARGS
        - PCA_INVALID_DURATION
        - PCA_ACCESS_DENIED
        - SLR_NOT_FOUND
        - OTHER
    CertificateType:
      type: string
      enum:
        - IMPORTED
        - AMAZON_ISSUED
        - PRIVATE
    RenewalSummary:
      description: Contains information about the status of ACM's managed renewal for the certificate. This structure exists only when the certificate type is AMAZON_ISSUED.
      type: object
      properties:
        RenewalStatus:
          $ref: "#/components/schemas/RenewalStatus"
          description: The status of ACM's managed renewal of the certificate.
        DomainValidationOptions:
          $ref: "#/components/schemas/DomainValidationList"
          description: Contains information about the validation of each domain name in the certificate, as it pertains to ACM's managed renewal. This is different from the initial validation that occurs as a result of the RequestCertificate request. This field exists only when the certificate type is AMAZON_ISSUED.
        RenewalStatusReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason that a renewal request was unsuccessful.
        UpdatedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the renewal summary was last updated.
      required:
        - RenewalStatus
        - DomainValidationOptions
        - UpdatedAt
    RenewalStatus:
      type: string
      enum:
        - PENDING_AUTO_RENEWAL
        - PENDING_VALIDATION
        - SUCCESS
        - FAILED
    KeyUsageList:
      type: array
      items:
        $ref: "#/components/schemas/KeyUsage"
    KeyUsage:
      description: The Key Usage X.509 v3 extension defines the purpose of the public key contained in the certificate.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/KeyUsageName"
          description: A string value that contains a Key Usage extension name.
    KeyUsageName:
      type: string
      enum:
        - DIGITAL_SIGNATURE
        - NON_REPUDIATION
        - KEY_ENCIPHERMENT
        - DATA_ENCIPHERMENT
        - KEY_AGREEMENT
        - CERTIFICATE_SIGNING
        - CRL_SIGNING
        - ENCIPHER_ONLY
        - DECIPHER_ONLY
        - ANY
        - CUSTOM
    ExtendedKeyUsageList:
      type: array
      items:
        $ref: "#/components/schemas/ExtendedKeyUsage"
    ExtendedKeyUsage:
      description: The Extended Key Usage X.509 v3 extension defines one or more purposes for which the public key can be used. This is in addition to or in place of the basic purposes specified by the Key Usage extension.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ExtendedKeyUsageName"
          description: The name of an Extended Key Usage value.
        OID:
          $ref: "#/components/schemas/String"
          description: An object identifier (OID) for the extension value. OIDs are strings of numbers separated by periods. The following OIDs are defined in RFC 3280 and RFC 5280. 1.3.6.1.5.5.7.3.1 (TLS_WEB_SERVER_AUTHENTICATION) 1.3.6.1.5.5.7.3.2 (TLS_WEB_CLIENT_AUTHENTICATION) 1.3.6.1.5.5.7.3.3 (CODE_SIGNING) 1.3.6.1.5.5.7.3.4 (EMAIL_PROTECTION) 1.3.6.1.5.5.7.3.8 (TIME_STAMPING) 1.3.6.1.5.5.7.3.9 (OCSP_SIGNING) 1.3.6.1.5.5.7.3.5 (IPSEC_END_SYSTEM) 1.3.6.1.5.5.7.3.6 (IPSEC_TUNNEL) 1.3.6.1.5.5.7.3.7 (IPSEC_USER)
    ExtendedKeyUsageName:
      type: string
      enum:
        - TLS_WEB_SERVER_AUTHENTICATION
        - TLS_WEB_CLIENT_AUTHENTICATION
        - CODE_SIGNING
        - EMAIL_PROTECTION
        - TIME_STAMPING
        - OCSP_SIGNING
        - IPSEC_END_SYSTEM
        - IPSEC_TUNNEL
        - IPSEC_USER
        - ANY
        - NONE
        - CUSTOM
    RenewalEligibility:
      type: string
      enum:
        - ELIGIBLE
        - INELIGIBLE
    CertificateOptions:
      description: Structure that contains options for your certificate. You can use this structure to specify whether to opt in to or out of certificate transparency logging and export your certificate. Some browsers require that public certificates issued for your domain be recorded in a log. Certificates that are not logged typically generate a browser error. Transparency makes it possible for you to detect SSL/TLS certificates that have been mistakenly or maliciously issued for your domain. For general information, see Certificate Transparency Logging. You can export public ACM certificates to use with Amazon Web Services services as well as outside Amazon Web Services Cloud. For more information, see Certificate Manager exportable public certificate.
      type: object
      properties:
        CertificateTransparencyLoggingPreference:
          $ref: "#/components/schemas/CertificateTransparencyLoggingPreference"
          description: You can opt out of certificate transparency logging by specifying the DISABLED option. Opt in by specifying ENABLED.
        Export:
          $ref: "#/components/schemas/CertificateExport"
          description: You can opt in to allow the export of your certificates by specifying ENABLED. You cannot update the value of Export after the the certificate is created.
    CertificateTransparencyLoggingPreference:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CertificateExport:
      type: string
      enum:
        - ENABLED
        - DISABLED
    PassphraseBlob:
      type: string
      format: byte
      minLength: 4
      maxLength: 128
    ExportCertificateResponse:
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/CertificateBody"
          description: The base64 PEM-encoded certificate.
        CertificateChain:
          $ref: "#/components/schemas/CertificateChain"
          description: The base64 PEM-encoded certificate chain. This does not include the certificate that you are exporting.
        PrivateKey:
          $ref: "#/components/schemas/PrivateKey"
          description: "The encrypted private key associated with the public key in the certificate. The key is output in PKCS #8 format and is base64 PEM-encoded."
    CertificateBody:
      type: string
      minLength: 1
      maxLength: 32768
      pattern: -{5}BEGIN CERTIFICATE-{5}\u000D?\u000A([A-Za-z0-9/+]{64}\u000D?\u000A)*[A-Za-z0-9/+]{1,64}={0,2}\u000D?\u000A-{5}END CERTIFICATE-{5}(\u000D?\u000A)?
    CertificateChain:
      type: string
      minLength: 1
      maxLength: 2097152
      pattern: (-{5}BEGIN CERTIFICATE-{5}\u000D?\u000A([A-Za-z0-9/+]{64}\u000D?\u000A)*[A-Za-z0-9/+]{1,64}={0,2}\u000D?\u000A-{5}END CERTIFICATE-{5}\u000D?\u000A)*-{5}BEGIN CERTIFICATE-{5}\u000D?\u000A([A-Za-z0-9/+]{64}\u000D?\u000A)*[A-Za-z0-9/+]{1,64}={0,2}\u000D?\u000A-{5}END CERTIFICATE-{5}(\u000D?\u000A)?
    PrivateKey:
      type: string
      minLength: 1
      maxLength: 524288
      pattern: -{5}BEGIN PRIVATE KEY-{5}\u000D?\u000A([A-Za-z0-9/+]{64}\u000D?\u000A)*[A-Za-z0-9/+]{1,64}={0,2}\u000D?\u000A-{5}END PRIVATE KEY-{5}(\u000D?\u000A)?
    GetAccountConfigurationResponse:
      type: object
      properties:
        ExpiryEvents:
          $ref: "#/components/schemas/ExpiryEventsConfiguration"
          description: Expiration events configuration options associated with the Amazon Web Services account.
    ExpiryEventsConfiguration:
      description: Object containing expiration events options associated with an Amazon Web Services account.
      type: object
      properties:
        DaysBeforeExpiry:
          $ref: "#/components/schemas/PositiveInteger"
          description: Specifies the number of days prior to certificate expiration when ACM starts generating EventBridge events. ACM sends one event per day per certificate until the certificate expires. By default, accounts receive events starting 45 days before certificate expiration.
    PositiveInteger:
      type: integer
      minimum: 1
    GetCertificateResponse:
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/CertificateBody"
          description: The ACM-issued certificate corresponding to the ARN specified as input.
        CertificateChain:
          $ref: "#/components/schemas/CertificateChain"
          description: Certificates forming the requested certificate's chain of trust. The chain consists of the certificate of the issuing CA and the intermediate certificates of any other subordinate CAs.
    CertificateBodyBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 32768
    PrivateKeyBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 5120
    CertificateChainBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 2097152
    ImportCertificateResponse:
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the imported certificate.
    CertificateStatuses:
      type: array
      items:
        $ref: "#/components/schemas/CertificateStatus"
    Filters:
      description: This structure can be used in the ListCertificates action to filter the output of the certificate list.
      type: object
      properties:
        extendedKeyUsage:
          $ref: "#/components/schemas/ExtendedKeyUsageFilterList"
          description: Specify one or more ExtendedKeyUsage extension values.
        keyUsage:
          $ref: "#/components/schemas/KeyUsageFilterList"
          description: Specify one or more KeyUsage extension values.
        keyTypes:
          $ref: "#/components/schemas/KeyAlgorithmList"
          description: 'Specify one or more algorithms that can be used to generate key pairs. Default filtering returns only RSA_1024 and RSA_2048 certificates that have at least one domain. To return other certificate types, provide the desired type signatures in a comma-separated list. For example, "keyTypes": ["RSA_2048","RSA_4096"] returns both RSA_2048 and RSA_4096 certificates.'
        exportOption:
          $ref: "#/components/schemas/CertificateExport"
          description: Specify ENABLED or DISABLED to identify certificates that can be exported.
        managedBy:
          $ref: "#/components/schemas/CertificateManagedBy"
          description: Identifies the Amazon Web Services service that manages the certificate issued by ACM.
    ExtendedKeyUsageFilterList:
      type: array
      items:
        $ref: "#/components/schemas/ExtendedKeyUsageName"
    KeyUsageFilterList:
      type: array
      items:
        $ref: "#/components/schemas/KeyUsageName"
    KeyAlgorithmList:
      type: array
      items:
        $ref: "#/components/schemas/KeyAlgorithm"
    NextToken:
      type: string
      minLength: 1
      maxLength: 10000
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]*"
    MaxItems:
      type: integer
      minimum: 1
      maximum: 1000
    SortBy:
      type: string
      enum:
        - CREATED_AT
    SortOrder:
      type: string
      enum:
        - ASCENDING
        - DESCENDING
    ListCertificatesResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the list is truncated, this value is present and contains the value to use for the NextToken parameter in a subsequent pagination request.
        CertificateSummaryList:
          $ref: "#/components/schemas/CertificateSummaryList"
          description: A list of ACM certificates.
    CertificateSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/CertificateSummary"
    CertificateSummary:
      description: This structure is returned in the response object of ListCertificates action.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: "Amazon Resource Name (ARN) of the certificate. This is of the form: arn:aws:acm:region:123456789012:certificate/12345678-1234-1234-1234-123456789012 For more information about ARNs, see Amazon Resource Names (ARNs)."
        DomainName:
          $ref: "#/components/schemas/DomainNameString"
          description: Fully qualified domain name (FQDN), such as www.example.com or example.com, for the certificate.
        SubjectAlternativeNameSummaries:
          $ref: "#/components/schemas/DomainList"
          description: One or more domain names (subject alternative names) included in the certificate. This list contains the domain names that are bound to the public key that is contained in the certificate. The subject alternative names include the canonical domain name (CN) of the certificate and additional domain names that can be used to connect to the website. When called by ListCertificates, this parameter will only return the first 100 subject alternative names included in the certificate. To display the full list of subject alternative names, use DescribeCertificate.
        HasAdditionalSubjectAlternativeNames:
          $ref: "#/components/schemas/NullableBoolean"
          description: When called by ListCertificates, indicates whether the full list of subject alternative names has been included in the response. If false, the response includes all of the subject alternative names included in the certificate. If true, the response only includes the first 100 subject alternative names included in the certificate. To display the full list of subject alternative names, use DescribeCertificate.
        Status:
          $ref: "#/components/schemas/CertificateStatus"
          description: The status of the certificate. A certificate enters status PENDING_VALIDATION upon being requested, unless it fails for any of the reasons given in the troubleshooting topic Certificate request fails. ACM makes repeated attempts to validate a certificate for 72 hours and then times out. If a certificate shows status FAILED or VALIDATION_TIMED_OUT, delete the request, correct the issue with DNS validation or Email validation, and try again. If validation succeeds, the certificate enters status ISSUED.
        Type:
          $ref: "#/components/schemas/CertificateType"
          description: The source of the certificate. For certificates provided by ACM, this value is AMAZON_ISSUED. For certificates that you imported with ImportCertificate, this value is IMPORTED. ACM does not provide managed renewal for imported certificates. For more information about the differences between certificates that you import and those that ACM provides, see Importing Certificates in the Certificate Manager User Guide.
        KeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The algorithm that was used to generate the public-private key pair.
        KeyUsages:
          $ref: "#/components/schemas/KeyUsageNames"
          description: A list of Key Usage X.509 v3 extension objects. Each object is a string value that identifies the purpose of the public key contained in the certificate. Possible extension values include DIGITAL_SIGNATURE, KEY_ENCHIPHERMENT, NON_REPUDIATION, and more.
        ExtendedKeyUsages:
          $ref: "#/components/schemas/ExtendedKeyUsageNames"
          description: Contains a list of Extended Key Usage X.509 v3 extension objects. Each object specifies a purpose for which the certificate public key can be used and consists of a name and an object identifier (OID).
        ExportOption:
          $ref: "#/components/schemas/CertificateExport"
          description: Indicates if export is enabled for the certificate.
        InUse:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether the certificate is currently in use by any Amazon Web Services resources.
        Exported:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether the certificate has been exported. This value exists only when the certificate type is PRIVATE.
        RenewalEligibility:
          $ref: "#/components/schemas/RenewalEligibility"
          description: Specifies whether the certificate is eligible for renewal. At this time, only exported private certificates can be renewed with the RenewCertificate command.
        NotBefore:
          $ref: "#/components/schemas/TStamp"
          description: The time before which the certificate is not valid.
        NotAfter:
          $ref: "#/components/schemas/TStamp"
          description: The time after which the certificate is not valid.
        CreatedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was requested.
        IssuedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was issued. This value exists only when the certificate type is AMAZON_ISSUED.
        ImportedAt:
          $ref: "#/components/schemas/TStamp"
          description: The date and time when the certificate was imported. This value exists only when the certificate type is IMPORTED.
        RevokedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was revoked. This value exists only when the certificate status is REVOKED.
        ManagedBy:
          $ref: "#/components/schemas/CertificateManagedBy"
          description: Identifies the Amazon Web Services service that manages the certificate issued by ACM.
    NullableBoolean:
      type: boolean
    KeyUsageNames:
      type: array
      items:
        $ref: "#/components/schemas/KeyUsageName"
    ExtendedKeyUsageNames:
      type: array
      items:
        $ref: "#/components/schemas/ExtendedKeyUsageName"
    ListTagsForCertificateResponse:
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The key-value pairs that define the applied tags.
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 32
      pattern: \w+
    DomainValidationOptionList:
      type: array
      items:
        $ref: "#/components/schemas/DomainValidationOption"
    DomainValidationOption:
      description: Contains information about the domain names that you want ACM to use to send you emails that enable you to validate domain ownership.
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/DomainNameString"
          description: A fully qualified domain name (FQDN) in the certificate request.
        ValidationDomain:
          $ref: "#/components/schemas/DomainNameString"
          description: "The domain name that you want ACM to use to send you validation emails. This domain name is the suffix of the email addresses that you want ACM to use. This must be the same as the DomainName value or a superdomain of the DomainName value. For example, if you request a certificate for testing.example.com, you can specify example.com for this value. In that case, ACM sends domain validation emails to the following five addresses: admin@example.com administrator@example.com hostmaster@example.com postmaster@example.com webmaster@example.com"
      required:
        - DomainName
        - ValidationDomain
    PcaArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w+=/,.@-]+:acm-pca:[\w+=/,.@-]*:[0-9]+:[\w+=,.@-]+(/[\w+=,.@-]+)*
    RequestCertificateResponse:
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: "String that contains the ARN of the issued certificate. This must be of the form: arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
    RevokeCertificateResponse:
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the public or private certificate that was revoked.
    CertificateFilterStatement:
      description: A filter statement used to search for certificates. Can contain AND, OR, NOT logical operators or a single filter.
      type: object
      properties:
        And:
          $ref: "#/components/schemas/CertificateFilterStatementList"
          description: A list of filter statements that must all be true.
        Or:
          $ref: "#/components/schemas/CertificateFilterStatementList"
          description: A list of filter statements where at least one must be true.
        Not:
          $ref: "#/components/schemas/CertificateFilterStatement"
          description: A filter statement that must not be true.
        Filter:
          $ref: "#/components/schemas/CertificateFilter"
          description: A single certificate filter.
    CertificateFilterStatementList:
      description: A list of CertificateFilterStatement objects.
      type: array
      items:
        $ref: "#/components/schemas/CertificateFilterStatement"
    CertificateFilter:
      description: Defines a filter for searching certificates by ARN, X.509 attributes, or ACM metadata.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: Filter by certificate ARN.
        X509AttributeFilter:
          $ref: "#/components/schemas/X509AttributeFilter"
          description: Filter by X.509 certificate attributes.
        AcmCertificateMetadataFilter:
          $ref: "#/components/schemas/AcmCertificateMetadataFilter"
          description: Filter by ACM certificate metadata.
    X509AttributeFilter:
      description: Filters certificates by X.509 attributes.
      type: object
      properties:
        Subject:
          $ref: "#/components/schemas/SubjectFilter"
          description: Filter by certificate subject.
        SubjectAlternativeName:
          $ref: "#/components/schemas/SubjectAlternativeNameFilter"
          description: Filter by subject alternative names.
        ExtendedKeyUsage:
          $ref: "#/components/schemas/ExtendedKeyUsageName"
          description: Filter by extended key usage.
        KeyUsage:
          $ref: "#/components/schemas/KeyUsageName"
          description: Filter by key usage.
        KeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: Filter by key algorithm.
        SerialNumber:
          $ref: "#/components/schemas/SerialNumber"
          description: Filter by serial number.
        NotAfter:
          $ref: "#/components/schemas/TimestampRange"
          description: Filter by certificate expiration date. The start date is inclusive.
        NotBefore:
          $ref: "#/components/schemas/TimestampRange"
          description: Filter by certificate validity start date. The start date is inclusive.
    SubjectFilter:
      description: Filters certificates by subject attributes.
      type: object
      properties:
        CommonName:
          $ref: "#/components/schemas/CommonNameFilter"
          description: Filter by common name in the subject.
    CommonNameFilter:
      description: Filters certificates by common name.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/FilterString"
          description: The value to match against.
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator to use.
      required:
        - Value
        - ComparisonOperator
    FilterString:
      type: string
      minLength: 1
      maxLength: 256
    ComparisonOperator:
      description: The comparison operator to use for string filters. Valid values are CONTAINS and EQUALS.
      type: string
      enum:
        - CONTAINS
        - EQUALS
    SubjectAlternativeNameFilter:
      description: Filters certificates by subject alternative name attributes.
      type: object
      properties:
        DnsName:
          $ref: "#/components/schemas/DnsNameFilter"
          description: Filter by DNS name in subject alternative names.
    DnsNameFilter:
      description: Filters certificates by DNS name.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/FilterString"
          description: The DNS name value to match against.
        ComparisonOperator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator to use.
      required:
        - Value
        - ComparisonOperator
    SerialNumber:
      type: string
      minLength: 2
      maxLength: 59
      pattern: "[0-9a-f]{2}(:[0-9a-f]{2}){1,19}"
    TimestampRange:
      description: Specifies a time range for filtering certificates.
      type: object
      properties:
        Start:
          $ref: "#/components/schemas/TStamp"
          description: The start of the time range. This value is inclusive.
        End:
          $ref: "#/components/schemas/TStamp"
          description: The end of the time range. This value is inclusive.
    AcmCertificateMetadataFilter:
      description: Filters certificates by ACM metadata.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/CertificateStatus"
          description: Filter by certificate status.
        RenewalStatus:
          $ref: "#/components/schemas/RenewalStatus"
          description: Filter by certificate renewal status.
        Type:
          $ref: "#/components/schemas/CertificateType"
          description: Filter by certificate type.
        InUse:
          $ref: "#/components/schemas/NullableBoolean"
          description: Filter by whether the certificate is in use.
        Exported:
          $ref: "#/components/schemas/NullableBoolean"
          description: Filter by whether the certificate has been exported.
        ExportOption:
          $ref: "#/components/schemas/CertificateExport"
          description: Filter by certificate export option.
        ManagedBy:
          $ref: "#/components/schemas/CertificateManagedBy"
          description: Filter by the entity that manages the certificate.
        ValidationMethod:
          $ref: "#/components/schemas/ValidationMethod"
          description: Filter by validation method.
    SearchMaxResults:
      type: integer
      minimum: 1
      maximum: 500
    SearchCertificatesSortBy:
      description: The field to sort search results by.
      type: string
      enum:
        - CREATED_AT
        - NOT_AFTER
        - STATUS
        - RENEWAL_STATUS
        - EXPORTED
        - IN_USE
        - NOT_BEFORE
        - KEY_ALGORITHM
        - TYPE
        - CERTIFICATE_ARN
        - COMMON_NAME
        - REVOKED_AT
        - RENEWAL_ELIGIBILITY
        - ISSUED_AT
        - MANAGED_BY
        - EXPORT_OPTION
        - VALIDATION_METHOD
        - IMPORTED_AT
    SearchCertificatesSortOrder:
      description: The order to sort search results.
      type: string
      enum:
        - ASCENDING
        - DESCENDING
    SearchCertificatesResponse:
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/CertificateSearchResultList"
          description: A list of certificate search results containing certificate ARNs, X.509 attributes, and ACM metadata.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: When the list is truncated, this value is present and contains the value to use for the NextToken parameter in a subsequent pagination request.
    CertificateSearchResultList:
      description: A list of CertificateSearchResult objects.
      type: array
      items:
        $ref: "#/components/schemas/CertificateSearchResult"
    CertificateSearchResult:
      description: Contains information about a certificate returned by the SearchCertificates action. This structure includes the certificate ARN, X.509 attributes, and ACM metadata.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the certificate.
        X509Attributes:
          $ref: "#/components/schemas/X509Attributes"
          description: X.509 certificate attributes such as subject, issuer, and validity period.
        CertificateMetadata:
          $ref: "#/components/schemas/CertificateMetadata"
          description: ACM-specific metadata about the certificate.
    X509Attributes:
      description: Contains X.509 certificate attributes extracted from the certificate.
      type: object
      properties:
        Issuer:
          $ref: "#/components/schemas/DistinguishedName"
          description: The distinguished name of the certificate issuer.
        Subject:
          $ref: "#/components/schemas/DistinguishedName"
          description: The distinguished name of the certificate subject.
        SubjectAlternativeNames:
          $ref: "#/components/schemas/GeneralNameList"
          description: One or more domain names (subject alternative names) included in the certificate. This list contains the domain names that are bound to the public key that is contained in the certificate. The subject alternative names include the canonical domain name (CN) of the certificate and additional domain names that can be used to connect to the website.
        ExtendedKeyUsages:
          $ref: "#/components/schemas/ExtendedKeyUsageNames"
          description: Contains a list of Extended Key Usage X.509 v3 extension objects. Each object specifies a purpose for which the certificate public key can be used and consists of a name and an object identifier (OID).
        KeyAlgorithm:
          $ref: "#/components/schemas/KeyAlgorithm"
          description: The algorithm that was used to generate the public-private key pair.
        KeyUsages:
          $ref: "#/components/schemas/KeyUsageNames"
          description: A list of Key Usage X.509 v3 extension objects. Each object is a string value that identifies the purpose of the public key contained in the certificate. Possible extension values include DIGITAL_SIGNATURE, KEY_ENCHIPHERMENT, NON_REPUDIATION, and more.
        SerialNumber:
          $ref: "#/components/schemas/SerialNumber"
          description: The serial number assigned by the certificate authority.
        NotAfter:
          $ref: "#/components/schemas/TStamp"
          description: The time after which the certificate is not valid.
        NotBefore:
          $ref: "#/components/schemas/TStamp"
          description: The time before which the certificate is not valid.
    DistinguishedName:
      description: Contains X.500 distinguished name information.
      type: object
      properties:
        CommonName:
          $ref: "#/components/schemas/String"
          description: The common name (CN) attribute.
        DomainComponents:
          $ref: "#/components/schemas/DomainComponentList"
          description: The domain component attributes.
        Country:
          $ref: "#/components/schemas/String"
          description: The country (C) attribute.
        CustomAttributes:
          $ref: "#/components/schemas/CustomAttributeList"
          description: A list of custom attributes in the distinguished name. Each custom attribute contains an object identifier (OID) and its corresponding value.
        DistinguishedNameQualifier:
          $ref: "#/components/schemas/String"
          description: The distinguished name qualifier attribute.
        GenerationQualifier:
          $ref: "#/components/schemas/String"
          description: The generation qualifier attribute.
        GivenName:
          $ref: "#/components/schemas/String"
          description: The given name attribute.
        Initials:
          $ref: "#/components/schemas/String"
          description: The initials attribute.
        Locality:
          $ref: "#/components/schemas/String"
          description: The locality (L) attribute.
        Organization:
          $ref: "#/components/schemas/String"
          description: The organization (O) attribute.
        OrganizationalUnit:
          $ref: "#/components/schemas/String"
          description: The organizational unit (OU) attribute.
        Pseudonym:
          $ref: "#/components/schemas/String"
          description: The pseudonym attribute.
        SerialNumber:
          $ref: "#/components/schemas/String"
          description: The serial number attribute.
        State:
          $ref: "#/components/schemas/String"
          description: The state or province (ST) attribute.
        Surname:
          $ref: "#/components/schemas/String"
          description: The surname attribute.
        Title:
          $ref: "#/components/schemas/String"
          description: The title attribute.
    DomainComponentList:
      description: A list of domain component strings.
      type: array
      items:
        $ref: "#/components/schemas/String"
    CustomAttributeList:
      description: A list of CustomAttribute objects.
      type: array
      items:
        $ref: "#/components/schemas/CustomAttribute"
    CustomAttribute:
      description: Defines the X.500 relative distinguished name (RDN).
      type: object
      properties:
        ObjectIdentifier:
          $ref: "#/components/schemas/String"
          description: Specifies the object identifier (OID) of the attribute type of the relative distinguished name (RDN).
        Value:
          $ref: "#/components/schemas/String"
          description: Specifies the attribute value of relative distinguished name (RDN).
    GeneralNameList:
      description: A list of GeneralName objects representing subject alternative names.
      type: array
      items:
        $ref: "#/components/schemas/GeneralName"
    GeneralName:
      description: Describes an ASN.1 X.400 GeneralName as defined in RFC 5280. Only one of the following naming options should be provided.
      type: object
      properties:
        DirectoryName:
          $ref: "#/components/schemas/DistinguishedName"
          description: Contains information about the certificate subject. The Subject field in the certificate identifies the entity that owns or controls the public key in the certificate. The entity can be a user, computer, device, or service. The Subject must contain an X.500 distinguished name (DN). A DN is a sequence of relative distinguished names (RDNs). The RDNs are separated by commas in the certificate.
        DnsName:
          $ref: "#/components/schemas/String"
          description: Represents GeneralName as a DNS name.
        IpAddress:
          $ref: "#/components/schemas/String"
          description: Represents GeneralName as an IPv4 or IPv6 address.
        OtherName:
          $ref: "#/components/schemas/OtherName"
          description: Represents GeneralName using an OtherName object.
        RegisteredId:
          $ref: "#/components/schemas/String"
          description: Represents GeneralName as an object identifier (OID).
        Rfc822Name:
          $ref: "#/components/schemas/String"
          description: Represents GeneralName as an RFC 822 email address.
        UniformResourceIdentifier:
          $ref: "#/components/schemas/String"
          description: Represents GeneralName as a URI.
    OtherName:
      description: Defines a custom ASN.1 X.400 GeneralName using an object identifier (OID) and value. For more information, see NIST's definition of Object Identifier (OID).
      type: object
      properties:
        ObjectIdentifier:
          $ref: "#/components/schemas/String"
          description: Specifies an OID.
        Value:
          $ref: "#/components/schemas/String"
          description: Specifies an OID value.
    CertificateMetadata:
      description: Contains metadata about a certificate. Currently supports ACM certificate metadata.
      type: object
      properties:
        AcmCertificateMetadata:
          $ref: "#/components/schemas/AcmCertificateMetadata"
          description: Metadata for an ACM certificate.
    AcmCertificateMetadata:
      description: Contains ACM-specific metadata about a certificate.
      type: object
      properties:
        CreatedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was requested.
        Exported:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether the certificate has been exported.
        ImportedAt:
          $ref: "#/components/schemas/TStamp"
          description: The date and time when the certificate was imported. This value exists only when the certificate type is IMPORTED.
        InUse:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether the certificate is currently in use by an Amazon Web Services service.
        IssuedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was issued. This value exists only when the certificate type is AMAZON_ISSUED.
        RenewalEligibility:
          $ref: "#/components/schemas/RenewalEligibility"
          description: Specifies whether the certificate is eligible for renewal. At this time, only exported private certificates can be renewed with the RenewCertificate command.
        RevokedAt:
          $ref: "#/components/schemas/TStamp"
          description: The time at which the certificate was revoked. This value exists only when the certificate status is REVOKED.
        Status:
          $ref: "#/components/schemas/CertificateStatus"
          description: The status of the certificate. A certificate enters status PENDING_VALIDATION upon being requested, unless it fails for any of the reasons given in the troubleshooting topic Certificate request fails. ACM makes repeated attempts to validate a certificate for 72 hours and then times out. If a certificate shows status FAILED or VALIDATION_TIMED_OUT, delete the request, correct the issue with DNS validation or Email validation, and try again. If validation succeeds, the certificate enters status ISSUED.
        RenewalStatus:
          $ref: "#/components/schemas/RenewalStatus"
          description: The renewal status of the certificate.
        Type:
          $ref: "#/components/schemas/CertificateType"
          description: The source of the certificate. For certificates provided by ACM, this value is AMAZON_ISSUED. For certificates that you imported with ImportCertificate, this value is IMPORTED. ACM does not provide managed renewal for imported certificates. For more information about the differences between certificates that you import and those that ACM provides, see Importing Certificates in the Certificate Manager User Guide.
        ExportOption:
          $ref: "#/components/schemas/CertificateExport"
          description: Indicates whether the certificate can be exported.
        ManagedBy:
          $ref: "#/components/schemas/CertificateManagedBy"
          description: Identifies the Amazon Web Services service that manages the certificate issued by ACM.
        ValidationMethod:
          $ref: "#/components/schemas/ValidationMethod"
          description: Specifies the domain validation method.
  x-stackQL-resources:
    tags:
      id: aws.acm.tags
      name: tags
      title: tags
      methods:
        add_tags_to_certificate:
          operation:
            $ref: "#/paths/~1AddTagsToCertificate/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
