            requestBodyTranslate:
              algorithm: naive
        list_tags_for_certificate:
          operation:
            $ref: "#/paths/~1ListTagsForCertificate/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        remove_tags_from_certificate:
          operation:
            $ref: "#/paths/~1RemoveTagsFromCertificate/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tags/methods/list_tags_for_certificate"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/tags/methods/add_tags_to_certificate"
        delete: []
    certificates:
      id: aws.acm.certificates
      name: certificates
      title: certificates
      methods:
        delete_certificate:
          operation:
            $ref: "#/paths/~1DeleteCertificate/post"
          response:
            openAPIDocKey: "200"
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        describe_certificate:
          operation:
            $ref: "#/paths/~1DescribeCertificate/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.Certificate
          request:
            nativeCasing: pascal
