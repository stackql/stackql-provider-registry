  /UpdateProtectionGroup:
    post:
      operationId: UpdateProtectionGroup
      description: Updates an existing protection group. A protection group is a grouping of protected resources so they can be handled as a collective. This resource grouping improves the accuracy of detection and reduces false positives.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.UpdateProtectionGroup
            default: AWSShield_20160616.UpdateProtectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionGroupId:
                  $ref: "#/components/schemas/ProtectionGroupId"
                  description: The name of the protection group. You use this to identify the protection group in lists and to manage the protection group, for example to update, delete, or describe it.
                Aggregation:
                  $ref: "#/components/schemas/ProtectionGroupAggregation"
                  description: Defines how Shield combines resource data for the group in order to detect, mitigate, and report events. Sum - Use the total traffic across the group. This is a good choice for most cases. Examples include Elastic IP addresses for EC2 instances that scale manually or automatically. Mean - Use the average of the traffic across the group. This is a good choice for resources that share traffic uniformly. Examples include accelerators and load balancers. Max - Use the highest traffic from each resource. This is useful for resources that don't share traffic and for resources that share that traffic in a non-uniform way. Examples include Amazon CloudFront distributions and origin resources for CloudFront distributions.
                Pattern:
                  $ref: "#/components/schemas/ProtectionGroupPattern"
                  description: The criteria to use to choose the protected resources for inclusion in the group. You can include all resources that have protections, provide a list of resource Amazon Resource Names (ARNs), or include all resources of a specified resource type.
                ResourceType:
                  $ref: "#/components/schemas/ProtectedResourceType"
                  description: The resource type to include in the protection group. All protected resources of this type are included in the protection group. You must set this when you set Pattern to BY_RESOURCE_TYPE and you must not set it for any other Pattern setting.
                Members:
                  $ref: "#/components/schemas/ProtectionGroupMembers"
                  description: The Amazon Resource Names (ARNs) of the resources to include in the protection group. You must set this when you set Pattern to ARBITRARY and you must not set it for any other Pattern setting.
              required:
                - ProtectionGroupId
                - Aggregation
                - Pattern
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProtectionGroupResponse"
  /UpdateSubscription:
    post:
      operationId: UpdateSubscription
      description: Updates the details of an existing subscription. Only enter values for parameters you want to change. Empty parameters are not updated. For accounts that are members of an Organizations organization, Shield Advanced subscriptions are billed against the organization's payer account, regardless of whether the payer account itself is subscribed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
