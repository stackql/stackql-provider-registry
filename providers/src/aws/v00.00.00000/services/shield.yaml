                  $ref: "#/components/schemas/AutoRenew"
                  description: When you initally create a subscription, AutoRenew is set to ENABLED. If ENABLED, the subscription will be automatically renewed at the end of the existing subscription period. You can change this by submitting an UpdateSubscription request. If the UpdateSubscription request does not included a value for AutoRenew, the existing value for AutoRenew remains unchanged.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriptionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LogBucket:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^([a-z]|(\d(?!\d{0,2}\.\d{1,3}\.\d{1,3}\.\d{1,3})))([a-z\d]|(\.(?!(\.|-)))|(-(?!\.))){1,61}[a-z\d]$
    AssociateDRTLogBucketResponse:
      type: object
    RoleArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    AssociateDRTRoleResponse:
      type: object
    ProtectionId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-zA-Z0-9\\\\-]*"
    HealthCheckArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws:route53:::healthcheck/\S{36}$
    AssociateHealthCheckResponse:
      type: object
    EmergencyContactList:
      type: array
      items:
        $ref: "#/components/schemas/EmergencyContact"
    EmergencyContact:
      description: Contact information that the SRT can use to contact you if you have proactive engagement enabled, for escalations to the SRT and to initiate proactive customer support.
      type: object
      properties:
        EmailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The email address for the contact.
        PhoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
          description: The phone number for the contact.
        ContactNotes:
          $ref: "#/components/schemas/ContactNotes"
          description: Additional notes regarding the contact.
      required:
        - EmailAddress
    EmailAddress:
      type: string
      minLength: 1
      maxLength: 150
      pattern: ^\S+@\S+\.\S+$
    PhoneNumber:
      type: string
      minLength: 1
      maxLength: 16
      pattern: ^\+[1-9]\d{1,14}$
    ContactNotes:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[\w\s\.\-,:/()+@]*$
    AssociateProactiveEngagementDetailsResponse:
      type: object
    ProtectionName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[ a-zA-Z0-9_\\\\.\\\\-]*"
    ResourceArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:aws.*
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag associated with an Amazon Web Services resource. Tags are key:value pairs that you can use to categorize and manage your resources, for purposes like billing or other management. Typically, the tag key represents a category, such as "environment", and the tag value represents a specific value within that category, such as "test," "development," or "production". Or you might set the tag key to "customer" and the value to the customer name or ID. You can specify one or more tags to add to each Amazon Web Services resource, up to 50 tags for a resource.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Part of the key:value pair that defines a tag. You can use a tag key to describe a category of information, such as "customer." Tag keys are case-sensitive.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: Part of the key:value pair that defines a tag. You can use a tag value to describe a specific value within a category, such as "companyA" or "companyB." Tag values are case-sensitive.
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateProtectionResponse:
      type: object
      properties:
        ProtectionId:
          $ref: "#/components/schemas/ProtectionId"
          description: The unique identifier (ID) for the Protection object that is created.
    ProtectionGroupId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[a-zA-Z0-9\\\\-]*"
    ProtectionGroupAggregation:
      type: string
      enum:
        - SUM
        - MEAN
        - MAX
    ProtectionGroupPattern:
      type: string
      enum:
        - ALL
        - ARBITRARY
        - BY_RESOURCE_TYPE
    ProtectedResourceType:
      type: string
      enum:
        - CLOUDFRONT_DISTRIBUTION
        - ROUTE_53_HOSTED_ZONE
        - ELASTIC_IP_ALLOCATION
        - CLASSIC_LOAD_BALANCER
