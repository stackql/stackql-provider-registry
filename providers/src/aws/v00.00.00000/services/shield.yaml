openapi: 3.0.0
info:
  version: "2016-06-02"
  title: AWS Shield
  description: AWS Shield
  x-serviceName: shield
  x-serviceAlias: shield
  x-protocol: json
  x-apiVersion: "2016-06-02"
  x-endpointPrefix: shield
  x-targetPrefix: AWSShield_20160616
  x-jsonVersion: "1.1"
servers:
  - url: https://shield.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for shield
paths:
  /AssociateDRTLogBucket:
    post:
      operationId: AssociateDRTLogBucket
      description: Authorizes the Shield Response Team (SRT) to access the specified Amazon S3 bucket containing log data such as Application Load Balancer access logs, CloudFront logs, or logs from third party sources. You can associate up to 10 Amazon S3 buckets with your subscription. To use the services of the SRT and make an AssociateDRTLogBucket request, you must be subscribed to the Business Support plan or the Enterprise Support plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.AssociateDRTLogBucket
            default: AWSShield_20160616.AssociateDRTLogBucket
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LogBucket:
                  $ref: "#/components/schemas/LogBucket"
                  description: The Amazon S3 bucket that contains the logs that you want to share.
              required:
                - LogBucket
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDRTLogBucketResponse"
  /AssociateDRTRole:
    post:
      operationId: AssociateDRTRole
      description: "Authorizes the Shield Response Team (SRT) using the specified role, to access your Amazon Web Services account to assist with DDoS attack mitigation during potential attacks. This enables the SRT to inspect your WAF configuration and create or update WAF rules and web ACLs. You can associate only one RoleArn with your subscription. If you submit an AssociateDRTRole request for an account that already has an associated role, the new RoleArn will replace the existing RoleArn. Prior to making the AssociateDRTRole request, you must attach the AWSShieldDRTAccessPolicy managed policy to the role that you'll specify in the request. You can access this policy in the IAM console at AWSShieldDRTAccessPolicy. For more information see Adding and removing IAM identity permissions. The role must also trust the service principal drt.shield.amazonaws.com. For more information, see IAM JSON policy elements: Principal. The SRT will have access only to your WAF and Shield resources. By submitting this request, you authorize the SRT to inspect your WAF and Shield configuration and create and update WAF rules and web ACLs on your behalf. The SRT takes these actions only if explicitly authorized by you. You must have the iam:PassRole permission to make an AssociateDRTRole request. For more information, see Granting a user permissions to pass a role to an Amazon Web Services service. To use the services of the SRT and make an AssociateDRTRole request, you must be subscribed to the Business Support plan or the Enterprise Support plan."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.AssociateDRTRole
            default: AWSShield_20160616.AssociateDRTRole
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the role the SRT will use to access your Amazon Web Services account. Prior to making the AssociateDRTRole request, you must attach the AWSShieldDRTAccessPolicy managed policy to this role. For more information see Attaching and Detaching IAM Policies.
              required:
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateDRTRoleResponse"
  /AssociateHealthCheck:
    post:
      operationId: AssociateHealthCheck
      description: Adds health-based detection to the Shield Advanced protection for a resource. Shield Advanced health-based detection uses the health of your Amazon Web Services resource to improve responsiveness and accuracy in attack detection and response. You define the health check in Route 53 and then associate it with your Shield Advanced protection. For more information, see Shield Advanced Health-Based Detection in the WAF Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.AssociateHealthCheck
            default: AWSShield_20160616.AssociateHealthCheck
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionId:
                  $ref: "#/components/schemas/ProtectionId"
                  description: The unique identifier (ID) for the Protection object to add the health check association to.
                HealthCheckArn:
                  $ref: "#/components/schemas/HealthCheckArn"
                  description: The Amazon Resource Name (ARN) of the health check to associate with the protection.
              required:
                - ProtectionId
                - HealthCheckArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateHealthCheckResponse"
  /AssociateProactiveEngagementDetails:
    post:
      operationId: AssociateProactiveEngagementDetails
      description: Initializes proactive engagement and sets the list of contacts for the Shield Response Team (SRT) to use. You must provide at least one phone number in the emergency contact list. After you have initialized proactive engagement using this call, to disable or enable proactive engagement, use the calls DisableProactiveEngagement and EnableProactiveEngagement. This call defines the list of email addresses and phone numbers that the SRT can use to contact you for escalations to the SRT and to initiate proactive customer support. The contacts that you provide in the request replace any contacts that were already defined. If you already have contacts defined and want to use them, retrieve the list using DescribeEmergencyContactSettings and then provide it to this call.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.AssociateProactiveEngagementDetails
            default: AWSShield_20160616.AssociateProactiveEngagementDetails
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EmergencyContactList:
                  $ref: "#/components/schemas/EmergencyContactList"
                  description: A list of email addresses and phone numbers that the Shield Response Team (SRT) can use to contact you for escalations to the SRT and to initiate proactive customer support. To enable proactive engagement, the contact list must include at least one phone number. The contacts that you provide here replace any contacts that were already defined. If you already have contacts defined and want to use them, retrieve the list using DescribeEmergencyContactSettings and then provide it here.
              required:
                - EmergencyContactList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateProactiveEngagementDetailsResponse"
  /CreateProtection:
    post:
      operationId: CreateProtection
      description: Enables Shield Advanced for a specific Amazon Web Services resource. The resource can be an Amazon CloudFront distribution, Amazon Route 53 hosted zone, Global Accelerator standard accelerator, Elastic IP Address, Application Load Balancer, or a Classic Load Balancer. You can protect Amazon EC2 instances and Network Load Balancers by association with protected Amazon EC2 Elastic IP addresses. You can add protection to only a single resource with each CreateProtection request. You can add protection to multiple resources at once through the Shield Advanced console at https://console.aws.amazon.com/wafv2/shieldv2#/. For more information see Getting Started with Shield Advanced and Adding Shield Advanced protection to Amazon Web Services resources.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.CreateProtection
            default: AWSShield_20160616.CreateProtection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ProtectionName"
                  description: Friendly name for the Protection you are creating.
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: "The ARN (Amazon Resource Name) of the resource to be protected. The ARN should be in one of the following formats: For an Application Load Balancer: arn:aws:elasticloadbalancing:region:account-id:loadbalancer/app/load-balancer-name/load-balancer-id For an Elastic Load Balancer (Classic Load Balancer): arn:aws:elasticloadbalancing:region:account-id:loadbalancer/load-balancer-name For an Amazon CloudFront distribution: arn:aws:cloudfront::account-id:distribution/distribution-id For an Global Accelerator standard accelerator: arn:aws:globalaccelerator::account-id:accelerator/accelerator-id For Amazon Route 53: arn:aws:route53:::hostedzone/hosted-zone-id For an Elastic IP address: arn:aws:ec2:region:account-id:eip-allocation/allocation-id"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tag key-value pairs for the Protection object that is created.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProtectionResponse"
  /CreateProtectionGroup:
    post:
      operationId: CreateProtectionGroup
      description: Creates a grouping of protected resources so they can be handled as a collective. This resource grouping improves the accuracy of detection and reduces false positives.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.CreateProtectionGroup
            default: AWSShield_20160616.CreateProtectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionGroupId:
                  $ref: "#/components/schemas/ProtectionGroupId"
                  description: The name of the protection group. You use this to identify the protection group in lists and to manage the protection group, for example to update, delete, or describe it.
                Aggregation:
                  $ref: "#/components/schemas/ProtectionGroupAggregation"
                  description: Defines how Shield combines resource data for the group in order to detect, mitigate, and report events. Sum - Use the total traffic across the group. This is a good choice for most cases. Examples include Elastic IP addresses for EC2 instances that scale manually or automatically. Mean - Use the average of the traffic across the group. This is a good choice for resources that share traffic uniformly. Examples include accelerators and load balancers. Max - Use the highest traffic from each resource. This is useful for resources that don't share traffic and for resources that share that traffic in a non-uniform way. Examples include Amazon CloudFront and origin resources for CloudFront distributions.
                Pattern:
                  $ref: "#/components/schemas/ProtectionGroupPattern"
                  description: The criteria to use to choose the protected resources for inclusion in the group. You can include all resources that have protections, provide a list of resource Amazon Resource Names (ARNs), or include all resources of a specified resource type.
                ResourceType:
                  $ref: "#/components/schemas/ProtectedResourceType"
                  description: The resource type to include in the protection group. All protected resources of this type are included in the protection group. Newly protected resources of this type are automatically added to the group. You must set this when you set Pattern to BY_RESOURCE_TYPE and you must not set it for any other Pattern setting.
                Members:
                  $ref: "#/components/schemas/ProtectionGroupMembers"
                  description: The Amazon Resource Names (ARNs) of the resources to include in the protection group. You must set this when you set Pattern to ARBITRARY and you must not set it for any other Pattern setting.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tag key-value pairs for the protection group.
              required:
                - ProtectionGroupId
                - Aggregation
                - Pattern
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProtectionGroupResponse"
  /CreateSubscription:
    post:
      operationId: CreateSubscription
      description: Activates Shield Advanced for an account. For accounts that are members of an Organizations organization, Shield Advanced subscriptions are billed against the organization's payer account, regardless of whether the payer account itself is subscribed. When you initially create a subscription, your subscription is set to be automatically renewed at the end of the existing subscription period. You can change this by submitting an UpdateSubscription request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.CreateSubscription
            default: AWSShield_20160616.CreateSubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriptionResponse"
  /DeleteProtection:
    post:
      operationId: DeleteProtection
      description: Deletes an Shield Advanced Protection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DeleteProtection
            default: AWSShield_20160616.DeleteProtection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionId:
                  $ref: "#/components/schemas/ProtectionId"
                  description: The unique identifier (ID) for the Protection object to be deleted.
              required:
                - ProtectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProtectionResponse"
  /DeleteProtectionGroup:
    post:
      operationId: DeleteProtectionGroup
      description: Removes the specified protection group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DeleteProtectionGroup
            default: AWSShield_20160616.DeleteProtectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionGroupId:
                  $ref: "#/components/schemas/ProtectionGroupId"
                  description: The name of the protection group. You use this to identify the protection group in lists and to manage the protection group, for example to update, delete, or describe it.
              required:
                - ProtectionGroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProtectionGroupResponse"
  /DeleteSubscription:
    post:
      operationId: DeleteSubscription
      description: Removes Shield Advanced from an account. Shield Advanced requires a 1-year subscription commitment. You cannot delete a subscription prior to the completion of that commitment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DeleteSubscription
            default: AWSShield_20160616.DeleteSubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSubscriptionResponse"
  /DescribeAttack:
    post:
      operationId: DescribeAttack
      description: Describes the details of a DDoS attack.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeAttack
            default: AWSShield_20160616.DescribeAttack
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AttackId:
                  $ref: "#/components/schemas/AttackId"
                  description: The unique identifier (ID) for the attack.
              required:
                - AttackId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAttackResponse"
  /DescribeAttackStatistics:
    post:
      operationId: DescribeAttackStatistics
      description: Provides information about the number and type of attacks Shield has detected in the last year for all resources that belong to your account, regardless of whether you've defined Shield protections for them. This operation is available to Shield customers as well as to Shield Advanced customers. The operation returns data for the time range of midnight UTC, one year ago, to midnight UTC, today. For example, if the current time is 2020-10-26 15:39:32 PDT, equal to 2020-10-26 22:39:32 UTC, then the time range for the attack data returned is from 2019-10-26 00:00:00 UTC to 2020-10-26 00:00:00 UTC. The time range indicates the period covered by the attack statistics data items.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeAttackStatistics
            default: AWSShield_20160616.DescribeAttackStatistics
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAttackStatisticsResponse"
  /DescribeDRTAccess:
    post:
      operationId: DescribeDRTAccess
      description: Returns the current role and list of Amazon S3 log buckets used by the Shield Response Team (SRT) to access your Amazon Web Services account while assisting with attack mitigation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeDRTAccess
            default: AWSShield_20160616.DescribeDRTAccess
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDRTAccessResponse"
  /DescribeEmergencyContactSettings:
    post:
      operationId: DescribeEmergencyContactSettings
      description: A list of email addresses and phone numbers that the Shield Response Team (SRT) can use to contact you if you have proactive engagement enabled, for escalations to the SRT and to initiate proactive customer support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeEmergencyContactSettings
            default: AWSShield_20160616.DescribeEmergencyContactSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEmergencyContactSettingsResponse"
  /DescribeProtection:
    post:
      operationId: DescribeProtection
      description: Lists the details of a Protection object.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeProtection
            default: AWSShield_20160616.DescribeProtection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionId:
                  $ref: "#/components/schemas/ProtectionId"
                  description: The unique identifier (ID) for the Protection object to describe. You must provide either the ResourceArn of the protected resource or the ProtectionID of the protection, but not both.
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The ARN (Amazon Resource Name) of the protected Amazon Web Services resource. You must provide either the ResourceArn of the protected resource or the ProtectionID of the protection, but not both.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProtectionResponse"
  /DescribeProtectionGroup:
    post:
      operationId: DescribeProtectionGroup
      description: Returns the specification for the specified protection group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeProtectionGroup
            default: AWSShield_20160616.DescribeProtectionGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionGroupId:
                  $ref: "#/components/schemas/ProtectionGroupId"
                  description: The name of the protection group. You use this to identify the protection group in lists and to manage the protection group, for example to update, delete, or describe it.
              required:
                - ProtectionGroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeProtectionGroupResponse"
  /DescribeSubscription:
    post:
      operationId: DescribeSubscription
      description: Provides details about the Shield Advanced subscription for an account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DescribeSubscription
            default: AWSShield_20160616.DescribeSubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSubscriptionResponse"
  /DisableApplicationLayerAutomaticResponse:
    post:
      operationId: DisableApplicationLayerAutomaticResponse
      description: Disable the Shield Advanced automatic application layer DDoS mitigation feature for the protected resource. This stops Shield Advanced from creating, verifying, and applying WAF rules for attacks that it detects for the resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DisableApplicationLayerAutomaticResponse
            default: AWSShield_20160616.DisableApplicationLayerAutomaticResponse
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The ARN (Amazon Resource Name) of the protected resource.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableApplicationLayerAutomaticResponseResponse"
  /DisableProactiveEngagement:
    post:
      operationId: DisableProactiveEngagement
      description: Removes authorization from the Shield Response Team (SRT) to notify contacts about escalations to the SRT and to initiate proactive customer support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DisableProactiveEngagement
            default: AWSShield_20160616.DisableProactiveEngagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableProactiveEngagementResponse"
  /DisassociateDRTLogBucket:
    post:
      operationId: DisassociateDRTLogBucket
      description: Removes the Shield Response Team's (SRT) access to the specified Amazon S3 bucket containing the logs that you shared previously.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DisassociateDRTLogBucket
            default: AWSShield_20160616.DisassociateDRTLogBucket
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LogBucket:
                  $ref: "#/components/schemas/LogBucket"
                  description: The Amazon S3 bucket that contains the logs that you want to share.
              required:
                - LogBucket
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateDRTLogBucketResponse"
  /DisassociateDRTRole:
    post:
      operationId: DisassociateDRTRole
      description: Removes the Shield Response Team's (SRT) access to your Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DisassociateDRTRole
            default: AWSShield_20160616.DisassociateDRTRole
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateDRTRoleResponse"
  /DisassociateHealthCheck:
    post:
      operationId: DisassociateHealthCheck
      description: Removes health-based detection from the Shield Advanced protection for a resource. Shield Advanced health-based detection uses the health of your Amazon Web Services resource to improve responsiveness and accuracy in attack detection and response. You define the health check in Route 53 and then associate or disassociate it with your Shield Advanced protection. For more information, see Shield Advanced Health-Based Detection in the WAF Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSShield_20160616.DisassociateHealthCheck
            default: AWSShield_20160616.DisassociateHealthCheck
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProtectionId:
                  $ref: "#/components/schemas/ProtectionId"
                  description: The unique identifier (ID) for the Protection object to remove the health check association from.
                HealthCheckArn:
                  $ref: "#/components/schemas/HealthCheckArn"
                  description: The Amazon Resource Name (ARN) of the health check that is associated with the protection.
              required:
                - ProtectionId
