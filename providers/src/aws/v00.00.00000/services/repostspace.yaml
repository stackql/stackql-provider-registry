openapi: 3.0.0
info:
  version: "2022-05-13"
  title: AWS re:Post Private
  description: AWS re:Post Private
  x-serviceName: repostspace
  x-serviceAlias: repostspace
  x-protocol: rest-json
  x-apiVersion: "2022-05-13"
  x-endpointPrefix: repostspace
servers:
  - url: https://repostspace.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for repostspace
paths:
  /spaces/{space_id}/channels/{channel_id}/roles:
    post:
      operationId: BatchAddChannelRoleToAccessors
      description: Add role to multiple users or groups in a private re:Post channel.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelId"
          description: The unique ID of the private re:Post channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessorIds:
                  $ref: "#/components/schemas/AccessorIdList"
                channelRole:
                  $ref: "#/components/schemas/ChannelRole"
              required:
                - accessorIds
                - channelRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAddChannelRoleToAccessorsOutput"
    patch:
      operationId: BatchRemoveChannelRoleFromAccessors
      description: Remove a role from multiple users or groups in a private re:Post channel.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelId"
          description: The unique ID of the private re:Post channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessorIds:
                  $ref: "#/components/schemas/AccessorIdList"
                channelRole:
                  $ref: "#/components/schemas/ChannelRole"
              required:
                - accessorIds
                - channelRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRemoveChannelRoleFromAccessorsOutput"
  /spaces/{space_id}/roles:
    post:
      operationId: BatchAddRole
      description: Add a role to multiple users or groups in a private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessorIds:
                  $ref: "#/components/schemas/AccessorIdList"
                role:
                  $ref: "#/components/schemas/Role"
              required:
                - accessorIds
                - role
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAddRoleOutput"
    patch:
      operationId: BatchRemoveRole
      description: Remove a role from multiple users or groups in a private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessorIds:
                  $ref: "#/components/schemas/AccessorIdList"
                role:
                  $ref: "#/components/schemas/Role"
              required:
                - accessorIds
                - role
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRemoveRoleOutput"
  /spaces/{space_id}/channels:
    post:
      operationId: CreateChannel
      description: Creates a channel in an AWS re:Post Private private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelName:
                  $ref: "#/components/schemas/ChannelName"
                channelDescription:
                  $ref: "#/components/schemas/ChannelDescription"
              required:
                - channelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelOutput"
    get:
      operationId: ListChannels
      description: Returns the list of channel within a private re:Post with some information about each channel.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of channel to return. You receive this token from a previous ListChannels operation.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListChannelsLimit"
          description: The maximum number of channels to include in the results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsOutput"
  /spaces:
    post:
      operationId: CreateSpace
      description: Creates an AWS re:Post Private private re:Post.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/SpaceName"
                subdomain:
                  $ref: "#/components/schemas/SpaceSubdomain"
                tier:
                  $ref: "#/components/schemas/TierLevel"
                description:
                  $ref: "#/components/schemas/SpaceDescription"
                userKMSKey:
                  $ref: "#/components/schemas/KMSKey"
                tags:
                  $ref: "#/components/schemas/Tags"
                roleArn:
                  $ref: "#/components/schemas/Arn"
                supportedEmailDomains:
                  $ref: "#/components/schemas/SupportedEmailDomainsParameters"
              required:
                - name
                - subdomain
                - tier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSpaceOutput"
    get:
      operationId: ListSpaces
      description: Returns a list of AWS re:Post Private private re:Posts in the account with some information about each private re:Post.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of private re:Posts to return. You receive this token from a previous ListSpaces operation.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListSpacesLimit"
          description: The maximum number of private re:Posts to include in the results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSpacesOutput"
  /spaces/{space_id}:
    delete:
      operationId: DeleteSpace
      description: Deletes an AWS re:Post Private private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
      responses:
        "200":
          description: Success
    get:
      operationId: GetSpace
      description: Displays information about the AWS re:Post Private private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The ID of the private re:Post.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSpaceOutput"
    put:
      operationId: UpdateSpace
      description: Modifies an existing AWS re:Post Private private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of this private re:Post.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/SpaceDescription"
                tier:
                  $ref: "#/components/schemas/TierLevel"
                roleArn:
                  $ref: "#/components/schemas/Arn"
                supportedEmailDomains:
                  $ref: "#/components/schemas/SupportedEmailDomainsParameters"
      responses:
        "200":
          description: Success
  /spaces/{space_id}/admins/{admin_id}:
    delete:
      operationId: DeregisterAdmin
      description: Removes the user or group from the list of administrators of the private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The ID of the private re:Post to remove the admin from.
        - name: admin_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AdminId"
          description: The ID of the admin to remove.
      responses:
        "200":
          description: Success
    post:
      operationId: RegisterAdmin
      description: Adds a user or group to the list of administrators of the private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The ID of the private re:Post.
        - name: admin_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AdminId"
          description: The ID of the administrator.
      responses:
        "200":
          description: Success
  /spaces/{space_id}/channels/{channel_id}:
    get:
      operationId: GetChannel
      description: Displays information about a channel in a private re:Post.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelId"
          description: The unique ID of the private re:Post channel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelOutput"
    put:
      operationId: UpdateChannel
      description: Modifies an existing channel.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ChannelId"
          description: The unique ID of the private re:Post channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelName:
                  $ref: "#/components/schemas/ChannelName"
                channelDescription:
                  $ref: "#/components/schemas/ChannelDescription"
              required:
                - channelName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns the tags that are associated with the AWS re:Post Private resource specified by the resourceArn. The only resource that can be tagged is a private re:Post.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that the tags are associated with.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Associates tags with an AWS re:Post Private resource. Currently, the only resource that can be tagged is the private re:Post. If you specify a new tag key for the resource, the tag is appended to the list of tags that are associated with the resource. If you specify a tag key that’s already associated with the resource, the new tag value that you specify replaces the previous value for that tag.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource that the tag is associated with.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes the association of the tag with the AWS re:Post Private resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The key values of the tag.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /spaces/{space_id}/invite:
    post:
      operationId: SendInvites
      description: Sends an invitation email to selected users and groups.
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SpaceId"
          description: The ID of the private re:Post.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessorIds:
                  $ref: "#/components/schemas/AccessorIdList"
                title:
                  $ref: "#/components/schemas/InviteTitle"
                body:
                  $ref: "#/components/schemas/InviteBody"
              required:
                - accessorIds
                - title
                - body
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SpaceId:
      type: string
    ChannelId:
      type: string
      minLength: 24
      maxLength: 24
    AccessorIdList:
      type: array
      items:
        $ref: "#/components/schemas/AccessorId"
    AccessorId:
      type: string
    ChannelRole:
      type: string
      enum:
        - ASKER
        - EXPERT
        - MODERATOR
        - SUPPORTREQUESTOR
    BatchAddChannelRoleToAccessorsOutput:
      type: object
      properties:
        addedAccessorIds:
          $ref: "#/components/schemas/AccessorIdList"
          description: An array of successfully updated identifiers.
        errors:
          $ref: "#/components/schemas/BatchErrorList"
          description: An array of errors that occurred when roles were added.
      required:
        - addedAccessorIds
        - errors
    BatchErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchError"
    BatchError:
      description: An error that occurred during a batch operation.
      type: object
      properties:
        accessorId:
          $ref: "#/components/schemas/AccessorId"
          description: The accessor identifier that's related to the error.
        error:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: Description of the error.
      required:
        - accessorId
        - error
        - message
    ErrorCode:
      type: integer
    ErrorMessage:
      type: string
    Role:
      type: string
      enum:
        - EXPERT
        - MODERATOR
        - ADMINISTRATOR
        - SUPPORTREQUESTOR
    BatchAddRoleOutput:
      type: object
      properties:
        addedAccessorIds:
          $ref: "#/components/schemas/AccessorIdList"
          description: An array of successfully updated accessor identifiers.
        errors:
          $ref: "#/components/schemas/BatchErrorList"
          description: An array of errors that occurred when roles were added.
      required:
        - addedAccessorIds
        - errors
    BatchRemoveChannelRoleFromAccessorsOutput:
      type: object
      properties:
        removedAccessorIds:
          $ref: "#/components/schemas/AccessorIdList"
          description: An array of successfully updated identifiers.
        errors:
          $ref: "#/components/schemas/BatchErrorList"
          description: An array of errors that occurred when roles were removed.
      required:
        - removedAccessorIds
        - errors
    BatchRemoveRoleOutput:
      type: object
      properties:
        removedAccessorIds:
          $ref: "#/components/schemas/AccessorIdList"
          description: An array of successfully updated accessor identifiers.
        errors:
          $ref: "#/components/schemas/BatchErrorList"
          description: An array of errors that occurred when roles were removed.
      required:
        - removedAccessorIds
        - errors
    ChannelName:
      type: string
      minLength: 1
      maxLength: 64
    ChannelDescription:
      type: string
      minLength: 1
      maxLength: 255
    CreateChannelOutput:
      type: object
      properties:
        channelId:
          $ref: "#/components/schemas/ChannelId"
          description: The unique ID of the private re:Post channel.
      required:
        - channelId
    SpaceName:
      type: string
      minLength: 1
      maxLength: 30
    SpaceSubdomain:
      type: string
      minLength: 1
      maxLength: 63
    TierLevel:
      type: string
      enum:
        - BASIC
        - STANDARD
    SpaceDescription:
      type: string
      minLength: 1
      maxLength: 255
    KMSKey:
      type: string
    Tags:
      type: object
      properties: {}
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
    SupportedEmailDomainsParameters:
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/FeatureEnableParameter"
        allowedDomains:
          $ref: "#/components/schemas/AllowedDomainsList"
    FeatureEnableParameter:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AllowedDomainsList:
      type: array
      items:
        $ref: "#/components/schemas/EmailDomain"
    EmailDomain:
      type: string
      minLength: 1
      maxLength: 255
    CreateSpaceOutput:
      type: object
      properties:
        spaceId:
          $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
      required:
        - spaceId
    AdminId:
      type: string
    GetChannelOutput:
      type: object
      properties:
        spaceId:
          $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        channelId:
          $ref: "#/components/schemas/ChannelId"
          description: The unique ID of the private re:Post channel.
        channelName:
          $ref: "#/components/schemas/ChannelName"
          description: The name for the channel. This must be unique per private re:Post.
        channelDescription:
          $ref: "#/components/schemas/ChannelDescription"
          description: A description for the channel. This is used only to help you identify this channel.
        createDateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date when the channel was created.
        deleteDateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date when the channel was deleted.
        channelRoles:
          type: object
          properties: {}
          description: The channel roles associated to the users and groups of the channel.
        channelStatus:
          $ref: "#/components/schemas/ChannelStatus"
          description: The status pf the channel.
      required:
        - spaceId
        - channelId
        - channelName
        - createDateTime
        - channelStatus
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    ChannelStatus:
      type: string
      enum:
        - CREATED
        - CREATING
        - CREATE_FAILED
        - DELETED
        - DELETING
        - DELETE_FAILED
    GetSpaceOutput:
      type: object
      properties:
        spaceId:
          $ref: "#/components/schemas/SpaceId"
          description: The unique ID of the private re:Post.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the private re:Post.
        name:
          $ref: "#/components/schemas/SpaceName"
          description: The name of the private re:Post.
        status:
          $ref: "#/components/schemas/ProvisioningStatus"
          description: The creation or deletion status of the private re:Post.
        configurationStatus:
          $ref: "#/components/schemas/ConfigurationStatus"
          description: The configuration status of the private re:Post.
        clientId:
          $ref: "#/components/schemas/ClientId"
          description: The Identity Center identifier for the Application Instance.
        identityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
        applicationArn:
          $ref: "#/components/schemas/Arn"
        description:
          $ref: "#/components/schemas/SpaceDescription"
          description: The description of the private re:Post.
        vanityDomainStatus:
          $ref: "#/components/schemas/VanityDomainStatus"
          description: The approval status of the custom subdomain.
        vanityDomain:
          $ref: "#/components/schemas/Url"
          description: The custom subdomain that you use to access your private re:Post. All custom subdomains must be approved by AWS before use.
        randomDomain:
          $ref: "#/components/schemas/Url"
          description: The AWS generated subdomain of the private re:Post
        customerRoleArn:
          $ref: "#/components/schemas/Arn"
          description: The IAM role that grants permissions to the private re:Post to convert unanswered questions into AWS support tickets.
        createDateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date when the private re:Post was created.
        deleteDateTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The date when the private re:Post was deleted.
        tier:
          $ref: "#/components/schemas/TierLevel"
          description: The pricing tier of the private re:Post.
        storageLimit:
          $ref: "#/components/schemas/StorageLimit"
          description: The storage limit of the private re:Post.
        userAdmins:
          $ref: "#/components/schemas/UserAdmins"
          description: The list of users that are administrators of the private re:Post.
        groupAdmins:
          $ref: "#/components/schemas/GroupAdmins"
          description: The list of groups that are administrators of the private re:Post.
        roles:
          type: object
          properties: {}
          description: A map of accessor identifiers and their roles.
        userKMSKey:
          $ref: "#/components/schemas/KMSKey"
          description: The custom AWS KMS key ARN that’s used for the AWS KMS encryption.
        userCount:
          $ref: "#/components/schemas/UserCount"
          description: The number of users that have onboarded to the private re:Post.
        contentSize:
          $ref: "#/components/schemas/ContentSize"
          description: The content size of the private re:Post.
        supportedEmailDomains:
          $ref: "#/components/schemas/SupportedEmailDomainsStatus"
      required:
        - spaceId
        - arn
        - name
        - status
        - configurationStatus
        - clientId
        - vanityDomainStatus
        - vanityDomain
        - randomDomain
        - createDateTime
        - tier
        - storageLimit
    ProvisioningStatus:
      type: string
      minLength: 1
      maxLength: 30
    ConfigurationStatus:
      type: string
      enum:
        - CONFIGURED
        - UNCONFIGURED
    ClientId:
      type: string
    IdentityStoreId:
      type: string
    VanityDomainStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - UNAPPROVED
    Url:
      type: string
    StorageLimit:
      type: integer
      format: int64
    UserAdmins:
      type: array
      items:
        $ref: "#/components/schemas/AdminId"
    GroupAdmins:
      type: array
      items:
        $ref: "#/components/schemas/AdminId"
    UserCount:
      type: integer
    ContentSize:
      type: integer
      format: int64
    SupportedEmailDomainsStatus:
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/FeatureEnableStatus"
        allowedDomains:
          $ref: "#/components/schemas/AllowedDomainsList"
    FeatureEnableStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - NOT_ALLOWED
    String:
      type: string
