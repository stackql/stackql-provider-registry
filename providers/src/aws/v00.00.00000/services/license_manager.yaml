openapi: 3.0.0
info:
  version: "2018-08-01"
  title: AWS License Manager
  description: AWS License Manager
  x-serviceName: license-manager
  x-serviceAlias: license_manager
  x-protocol: json
  x-apiVersion: "2018-08-01"
  x-endpointPrefix: license-manager
  x-targetPrefix: AWSLicenseManager
  x-jsonVersion: "1.1"
servers:
  - url: https://license-manager.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for license-manager
paths:
  /AcceptGrant:
    post:
      operationId: AcceptGrant
      description: Accepts the specified grant.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.AcceptGrant
            default: AWSLicenseManager.AcceptGrant
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GrantArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the grant.
              required:
                - GrantArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptGrantResponse"
  /CheckInLicense:
    post:
      operationId: CheckInLicense
      description: Checks in the specified license. Check in a license when it is no longer in use.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CheckInLicense
            default: AWSLicenseManager.CheckInLicense
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LicenseConsumptionToken:
                  $ref: "#/components/schemas/String"
                  description: License consumption token.
                Beneficiary:
                  $ref: "#/components/schemas/String"
                  description: License beneficiary.
              required:
                - LicenseConsumptionToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInLicenseResponse"
  /CheckoutBorrowLicense:
    post:
      operationId: CheckoutBorrowLicense
      description: Checks out the specified license for offline use.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CheckoutBorrowLicense
            default: AWSLicenseManager.CheckoutBorrowLicense
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LicenseArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the license. The license must use the borrow consumption configuration.
                Entitlements:
                  $ref: "#/components/schemas/EntitlementDataList"
                  description: License entitlements. Partial checkouts are not supported.
                DigitalSignatureMethod:
                  $ref: "#/components/schemas/DigitalSignatureMethod"
                  description: Digital signature method. The possible value is JSON Web Signature (JWS) algorithm PS384. For more information, see RFC 7518 Digital Signature with RSASSA-PSS.
                NodeId:
                  $ref: "#/components/schemas/String"
                  description: Node ID.
                CheckoutMetadata:
                  $ref: "#/components/schemas/MetadataList"
                  description: Information about constraints.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - LicenseArn
                - Entitlements
                - DigitalSignatureMethod
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutBorrowLicenseResponse"
  /CheckoutLicense:
    post:
      operationId: CheckoutLicense
      description: Checks out the specified license. If the account that created the license is the same that is performing the check out, you must specify the account as the beneficiary.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CheckoutLicense
            default: AWSLicenseManager.CheckoutLicense
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProductSKU:
                  $ref: "#/components/schemas/String"
                  description: Product SKU.
                CheckoutType:
                  $ref: "#/components/schemas/CheckoutType"
                  description: Checkout type.
                KeyFingerprint:
                  $ref: "#/components/schemas/String"
                  description: Key fingerprint identifying the license.
                Entitlements:
                  $ref: "#/components/schemas/EntitlementDataList"
                  description: License entitlements.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                Beneficiary:
                  $ref: "#/components/schemas/String"
                  description: License beneficiary.
                NodeId:
                  $ref: "#/components/schemas/String"
                  description: Node ID.
              required:
                - ProductSKU
                - CheckoutType
                - KeyFingerprint
                - Entitlements
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutLicenseResponse"
  /CreateGrant:
    post:
      operationId: CreateGrant
      description: Creates a grant for the specified license. A grant shares the use of license entitlements with a specific Amazon Web Services account, an organization, or an organizational unit (OU). For more information, see Granted licenses in License Manager in the License Manager User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateGrant
            default: AWSLicenseManager.CreateGrant
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                GrantName:
                  $ref: "#/components/schemas/String"
                  description: Grant name.
                LicenseArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the license.
                Principals:
                  $ref: "#/components/schemas/PrincipalArnList"
                  description: "The grant principals. You can specify one of the following as an Amazon Resource Name (ARN): An Amazon Web Services account, which includes only the account specified. An organizational unit (OU), which includes all accounts in the OU. An organization, which will include all accounts across your organization."
                HomeRegion:
                  $ref: "#/components/schemas/String"
                  description: Home Region of the grant.
                AllowedOperations:
                  $ref: "#/components/schemas/AllowedOperationList"
                  description: Allowed operations for the grant.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to add to the grant. For more information about tagging support in License Manager, see the TagResource operation.
              required:
                - ClientToken
                - GrantName
                - LicenseArn
                - Principals
                - HomeRegion
                - AllowedOperations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGrantResponse"
  /CreateGrantVersion:
    post:
      operationId: CreateGrantVersion
      description: Creates a new version of the specified grant. For more information, see Granted licenses in License Manager in the License Manager User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateGrantVersion
            default: AWSLicenseManager.CreateGrantVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                GrantArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the grant.
                GrantName:
                  $ref: "#/components/schemas/String"
                  description: Grant name.
                AllowedOperations:
                  $ref: "#/components/schemas/AllowedOperationList"
                  description: Allowed operations for the grant.
                Status:
                  $ref: "#/components/schemas/GrantStatus"
                  description: Grant status.
                StatusReason:
                  $ref: "#/components/schemas/StatusReasonMessage"
                  description: Grant status reason.
                SourceVersion:
                  $ref: "#/components/schemas/String"
                  description: Current version of the grant.
                Options:
                  $ref: "#/components/schemas/Options"
                  description: The options specified for the grant.
              required:
                - ClientToken
                - GrantArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGrantVersionResponse"
  /CreateLicense:
    post:
      operationId: CreateLicense
      description: Creates a license.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicense
            default: AWSLicenseManager.CreateLicense
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LicenseName:
                  $ref: "#/components/schemas/String"
                  description: License name.
                ProductName:
                  $ref: "#/components/schemas/String"
                  description: Product name.
                ProductSKU:
                  $ref: "#/components/schemas/String"
                  description: Product SKU.
                Issuer:
                  $ref: "#/components/schemas/Issuer"
                  description: License issuer.
                HomeRegion:
                  $ref: "#/components/schemas/String"
                  description: Home Region for the license.
                Validity:
                  $ref: "#/components/schemas/DatetimeRange"
                  description: Date and time range during which the license is valid, in ISO8601-UTC format.
                Entitlements:
                  $ref: "#/components/schemas/EntitlementList"
                  description: License entitlements.
                Beneficiary:
                  $ref: "#/components/schemas/String"
                  description: License beneficiary.
                ConsumptionConfiguration:
                  $ref: "#/components/schemas/ConsumptionConfiguration"
                  description: Configuration for consumption of the license. Choose a provisional configuration for workloads running with continuous connectivity. Choose a borrow configuration for workloads with offline usage.
                LicenseMetadata:
                  $ref: "#/components/schemas/MetadataList"
                  description: Information about the license.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to add to the license. For more information about tagging support in License Manager, see the TagResource operation.
              required:
                - LicenseName
                - ProductName
                - ProductSKU
                - Issuer
                - HomeRegion
                - Validity
                - Entitlements
                - Beneficiary
                - ConsumptionConfiguration
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseResponse"
  /CreateLicenseAssetGroup:
    post:
      operationId: CreateLicenseAssetGroup
      description: Creates a license asset group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicenseAssetGroup
            default: AWSLicenseManager.CreateLicenseAssetGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/LicenseAssetResourceName"
                  description: License asset group name.
                Description:
                  $ref: "#/components/schemas/LicenseAssetResourceDescription"
                  description: License asset group description.
                LicenseAssetGroupConfigurations:
                  $ref: "#/components/schemas/LicenseAssetGroupConfigurationList"
                  description: License asset group configurations.
                AssociatedLicenseAssetRulesetARNs:
                  $ref: "#/components/schemas/LicenseAssetRulesetArnList"
                  description: ARNs of associated license asset rulesets.
                Properties:
                  $ref: "#/components/schemas/LicenseAssetGroupPropertyList"
                  description: License asset group properties.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to add to the license asset group.
                ClientToken:
                  $ref: "#/components/schemas/String"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - Name
                - LicenseAssetGroupConfigurations
                - AssociatedLicenseAssetRulesetARNs
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseAssetGroupResponse"
  /CreateLicenseAssetRuleset:
    post:
      operationId: CreateLicenseAssetRuleset
      description: Creates a license asset ruleset.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicenseAssetRuleset
            default: AWSLicenseManager.CreateLicenseAssetRuleset
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/LicenseAssetResourceName"
                  description: License asset ruleset name.
                Description:
                  $ref: "#/components/schemas/LicenseAssetResourceDescription"
                  description: License asset ruleset description.
                Rules:
                  $ref: "#/components/schemas/LicenseAssetRuleList"
                  description: License asset rules.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to add to the license asset ruleset.
                ClientToken:
                  $ref: "#/components/schemas/String"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - Name
                - Rules
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseAssetRulesetResponse"
  /CreateLicenseConfiguration:
    post:
      operationId: CreateLicenseConfiguration
      description: Creates a license configuration. A license configuration is an abstraction of a customer license agreement that can be consumed and enforced by License Manager. Components include specifications for the license type (licensing by instance, socket, CPU, or vCPU), allowed tenancy (shared tenancy, Dedicated Instance, Dedicated Host, or all of these), license affinity to host (how long a license must be associated with a host), and the number of licenses purchased and used.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicenseConfiguration
            default: AWSLicenseManager.CreateLicenseConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/String"
                  description: Name of the license configuration.
                Description:
                  $ref: "#/components/schemas/String"
                  description: Description of the license configuration.
                LicenseCountingType:
                  $ref: "#/components/schemas/LicenseCountingType"
                  description: Dimension used to track the license inventory.
                LicenseCount:
                  $ref: "#/components/schemas/BoxLong"
                  description: Number of licenses managed by the license configuration.
                LicenseCountHardLimit:
                  $ref: "#/components/schemas/BoxBoolean"
                  description: Indicates whether hard or soft license enforcement is used. Exceeding a hard limit blocks the launch of new instances.
                LicenseRules:
                  $ref: "#/components/schemas/StringList"
                  description: "License rules. The syntax is #name=value (for example, #allowedTenancy=EC2-DedicatedHost). The available rules vary by dimension, as follows. Cores dimension: allowedTenancy | licenseAffinityToHost | maximumCores | minimumCores Instances dimension: allowedTenancy | maximumVcpus | minimumVcpus Sockets dimension: allowedTenancy | licenseAffinityToHost | maximumSockets | minimumSockets vCPUs dimension: allowedTenancy | honorVcpuOptimization | maximumVcpus | minimumVcpus The unit for licenseAffinityToHost is days and the range is 1 to 180. The possible values for allowedTenancy are EC2-Default, EC2-DedicatedHost, and EC2-DedicatedInstance. The possible values for honorVcpuOptimization are True and False."
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to add to the license configuration.
                DisassociateWhenNotFound:
                  $ref: "#/components/schemas/BoxBoolean"
                  description: When true, disassociates a resource when software is uninstalled.
                ProductInformationList:
                  $ref: "#/components/schemas/ProductInformationList"
                  description: Product information.
                LicenseExpiry:
                  $ref: "#/components/schemas/BoxLong"
                  description: License configuration expiry.
              required:
                - LicenseCountingType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseConfigurationResponse"
  /CreateLicenseConversionTaskForResource:
    post:
      operationId: CreateLicenseConversionTaskForResource
      description: Creates a new license conversion task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicenseConversionTaskForResource
            default: AWSLicenseManager.CreateLicenseConversionTaskForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the resource you are converting the license type for.
                SourceLicenseContext:
                  $ref: "#/components/schemas/LicenseConversionContext"
                  description: Information that identifies the license type you are converting from. For the structure of the source license, see Convert a license type using the CLI in the License Manager User Guide.
                DestinationLicenseContext:
                  $ref: "#/components/schemas/LicenseConversionContext"
                  description: Information that identifies the license type you are converting to. For the structure of the destination license, see Convert a license type using the CLI in the License Manager User Guide.
              required:
                - ResourceArn
                - SourceLicenseContext
                - DestinationLicenseContext
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseConversionTaskForResourceResponse"
  /CreateLicenseManagerReportGenerator:
    post:
      operationId: CreateLicenseManagerReportGenerator
      description: Creates a report generator.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicenseManagerReportGenerator
            default: AWSLicenseManager.CreateLicenseManagerReportGenerator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReportGeneratorName:
                  $ref: "#/components/schemas/ReportGeneratorName"
                  description: Name of the report generator.
                Type:
                  $ref: "#/components/schemas/ReportTypeList"
                  description: "Type of reports to generate. The following report types an be generated: License configuration report - Reports the number and details of consumed licenses for a license configuration. Resource report - Reports the tracked licenses and resource consumption for a license configuration."
                ReportContext:
                  $ref: "#/components/schemas/ReportContext"
                  description: Defines the type of license configuration the report generator tracks.
                ReportFrequency:
                  $ref: "#/components/schemas/ReportFrequency"
                  description: Frequency by which reports are generated. Reports can be generated daily, monthly, or weekly.
                ClientToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                Description:
                  $ref: "#/components/schemas/String"
                  description: Description of the report generator.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to add to the report generator.
              required:
                - ReportGeneratorName
                - Type
                - ReportContext
                - ReportFrequency
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseManagerReportGeneratorResponse"
  /CreateLicenseVersion:
    post:
      operationId: CreateLicenseVersion
      description: Creates a new version of the specified license.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateLicenseVersion
            default: AWSLicenseManager.CreateLicenseVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LicenseArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the license.
                LicenseName:
                  $ref: "#/components/schemas/String"
                  description: License name.
                ProductName:
                  $ref: "#/components/schemas/String"
                  description: Product name.
                Issuer:
                  $ref: "#/components/schemas/Issuer"
                  description: License issuer.
                HomeRegion:
                  $ref: "#/components/schemas/String"
                  description: Home Region of the license.
                Validity:
                  $ref: "#/components/schemas/DatetimeRange"
                  description: Date and time range during which the license is valid, in ISO8601-UTC format.
                LicenseMetadata:
                  $ref: "#/components/schemas/MetadataList"
                  description: Information about the license.
                Entitlements:
                  $ref: "#/components/schemas/EntitlementList"
                  description: License entitlements.
                ConsumptionConfiguration:
                  $ref: "#/components/schemas/ConsumptionConfiguration"
                  description: Configuration for consumption of the license. Choose a provisional configuration for workloads running with continuous connectivity. Choose a borrow configuration for workloads with offline usage.
                Status:
                  $ref: "#/components/schemas/LicenseStatus"
                  description: License status.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                SourceVersion:
                  $ref: "#/components/schemas/String"
                  description: Current version of the license.
              required:
                - LicenseArn
                - LicenseName
                - ProductName
                - Issuer
                - HomeRegion
                - Validity
                - Entitlements
                - ConsumptionConfiguration
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseVersionResponse"
  /CreateToken:
    post:
      operationId: CreateToken
      description: Creates a long-lived token. A refresh token is a JWT token used to get an access token. With an access token, you can call AssumeRoleWithWebIdentity to get role credentials that you can use to call License Manager to manage the specified license.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.CreateToken
            default: AWSLicenseManager.CreateToken
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LicenseArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the license. The ARN is mapped to the aud claim of the JWT token.
                RoleArns:
                  $ref: "#/components/schemas/ArnList"
                  description: Amazon Resource Name (ARN) of the IAM roles to embed in the token. License Manager does not check whether the roles are in use.
                ExpirationInDays:
                  $ref: "#/components/schemas/Integer"
                  description: Token expiration, in days, counted from token creation. The default is 365 days.
                TokenProperties:
                  $ref: "#/components/schemas/MaxSize3StringList"
                  description: Data specified by the caller to be included in the JWT token. The data is mapped to the amr claim of the JWT token.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Idempotency token, valid for 10 minutes.
              required:
                - LicenseArn
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenResponse"
  /DeleteGrant:
    post:
      operationId: DeleteGrant
      description: Deletes the specified grant.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.DeleteGrant
            default: AWSLicenseManager.DeleteGrant
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GrantArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the grant.
                StatusReason:
                  $ref: "#/components/schemas/StatusReasonMessage"
                  description: The Status reason for the delete request.
                Version:
                  $ref: "#/components/schemas/String"
                  description: Current version of the grant.
              required:
                - GrantArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGrantResponse"
  /DeleteLicense:
    post:
      operationId: DeleteLicense
      description: Deletes the specified license.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSLicenseManager.DeleteLicense
            default: AWSLicenseManager.DeleteLicense
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LicenseArn:
                  $ref: "#/components/schemas/Arn"
                  description: Amazon Resource Name (ARN) of the license.
                SourceVersion:
                  $ref: "#/components/schemas/String"
                  description: Current version of the license.
              required:
                - LicenseArn
                - SourceVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
