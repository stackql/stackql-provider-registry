    Timestamp:
      type: string
      format: date-time
    GetIPSetResponse:
      type: object
      properties:
        IPSet:
          $ref: "#/components/schemas/IPSet"
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
    IPSet:
      description: Contains zero or more IP addresses or blocks of IP addresses specified in Classless Inter-Domain Routing (CIDR) notation. WAF supports all IPv4 and IPv6 CIDR ranges except for /0. For information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing. WAF assigns an ARN to each IPSet that you create. To use an IP set in a rule, you provide the ARN to the Rule statement IPSetReferenceStatement.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the IP set. You cannot change the name of an IPSet after you create it.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the set. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the IP set that helps with identification.
        IPAddressVersion:
          $ref: "#/components/schemas/IPAddressVersion"
          description: The version of the IP addresses, either IPV4 or IPV6.
        Addresses:
          $ref: "#/components/schemas/IPAddresses"
          description: 'Contains an array of strings that specifies zero or more IP addresses or blocks of IP addresses that you want WAF to inspect for in incoming requests. All addresses must be specified using Classless Inter-Domain Routing (CIDR) notation. WAF supports all IPv4 and IPv6 CIDR ranges except for /0. Example address strings: For requests that originated from the IP address 192.0.2.44, specify 192.0.2.44/32. For requests that originated from IP addresses from 192.0.2.0 to 192.0.2.255, specify 192.0.2.0/24. For requests that originated from the IP address 1111:0000:0000:0000:0000:0000:0000:0111, specify 1111:0000:0000:0000:0000:0000:0000:0111/128. For requests that originated from IP addresses 1111:0000:0000:0000:0000:0000:0000:0000 to 1111:0000:0000:0000:ffff:ffff:ffff:ffff, specify 1111:0000:0000:0000:0000:0000:0000:0000/64. For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing. Example JSON Addresses specifications: Empty array: "Addresses": [] Array with one address: "Addresses": ["192.0.2.44/32"] Array with three addresses: "Addresses": ["192.0.2.44/32", "192.0.2.0/24", "192.0.0.0/16"] INVALID specification: "Addresses": [""] INVALID'
      required:
        - Name
        - Id
        - ARN
        - IPAddressVersion
        - Addresses
    GetLoggingConfigurationResponse:
      type: object
      properties:
        LoggingConfiguration:
          $ref: "#/components/schemas/LoggingConfiguration"
          description: The LoggingConfiguration for the specified web ACL.
    LoggingConfiguration:
      description: "Defines an association between logging destinations and a web ACL resource, for logging from WAF. As part of the association, you can specify parts of the standard logging fields to keep out of the logs and you can specify filters so that you log only a subset of the logging records. If you configure data protection for the web ACL, the protection applies to the data that WAF sends to the logs. You can define one logging destination per web ACL. You can access information about the traffic that WAF inspects using the following steps: Create your logging destination. You can use an Amazon CloudWatch Logs log group, an Amazon Simple Storage Service (Amazon S3) bucket, or an Amazon Kinesis Data Firehose. The name that you give the destination must start with aws-waf-logs-. Depending on the type of destination, you might need to configure additional settings or permissions. For configuration requirements and pricing information for each destination type, see Logging web ACL traffic in the WAF Developer Guide. Associate your logging destination to your web ACL using a PutLoggingConfiguration request. When you successfully enable logging using a PutLoggingConfiguration request, WAF creates an additional role or policy that is required to write logs to the logging destination. For an Amazon CloudWatch Logs log group, WAF creates a resource policy on the log group. For an Amazon S3 bucket, WAF creates a bucket policy. For an Amazon Kinesis Data Firehose, WAF creates a service-linked role. For additional information about web ACL logging, see Logging web ACL traffic information in the WAF Developer Guide."
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the web ACL that you want to associate with LogDestinationConfigs.
        LogDestinationConfigs:
          $ref: "#/components/schemas/LogDestinationConfigs"
          description: The logging destination configuration that you want to associate with the web ACL. You can associate one logging destination to a web ACL.
        RedactedFields:
          $ref: "#/components/schemas/RedactedFields"
          description: "The parts of the request that you want to keep out of the logs. For example, if you redact the SingleHeader field, the HEADER field in the logs will be REDACTED for all rules that use the SingleHeader FieldToMatch setting. If you configure data protection for the web ACL, the protection applies to the data that WAF sends to the logs. Redaction applies only to the component that's specified in the rule's FieldToMatch setting, so the SingleHeader redaction doesn't apply to rules that use the Headers FieldToMatch. You can specify only the following fields for redaction: UriPath, QueryString, SingleHeader, and Method. This setting has no impact on request sampling. You can only exclude fields from request sampling by disabling sampling in the web ACL visibility configuration or by configuring data protection for the web ACL."
        ManagedByFirewallManager:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the logging configuration was created by Firewall Manager, as part of an WAF policy configuration. If true, only Firewall Manager can modify or delete the configuration. The logging configuration can be created by Firewall Manager for use with any web ACL that Firewall Manager is using for an WAF policy. Web ACLs that Firewall Manager creates and uses have their ManagedByFirewallManager property set to true. Web ACLs that were created by a customer account and then retrofitted by Firewall Manager for use by a policy have their RetrofittedByFirewallManager property set to true. For either case, any corresponding logging configuration will indicate ManagedByFirewallManager.
        LoggingFilter:
          $ref: "#/components/schemas/LoggingFilter"
          description: Filtering that specifies which web requests are kept in the logs and which are dropped. You can filter on the rule action and on the web request labels that were applied by matching rules during web ACL evaluation.
        LogType:
          $ref: "#/components/schemas/LogType"
          description: "Used to distinguish between various logging options. Currently, there is one option. Default: WAF_LOGS"
        LogScope:
          $ref: "#/components/schemas/LogScope"
          description: "The owner of the logging configuration, which must be set to CUSTOMER for the configurations that you manage. The log scope SECURITY_LAKE indicates a configuration that is managed through Amazon Security Lake. You can use Security Lake to collect log and event data from various sources for normalization, analysis, and management. For information, see Collecting data from Amazon Web Services services in the Amazon Security Lake user guide. The log scope CLOUDWATCH_TELEMETRY_RULE_MANAGED indicates a configuration that is managed through Amazon CloudWatch Logs for telemetry data collection and analysis. For information, see What is Amazon CloudWatch Logs ? in the Amazon CloudWatch Logs user guide. Default: CUSTOMER"
      required:
        - ResourceArn
        - LogDestinationConfigs
    LogDestinationConfigs:
      type: array
      items:
        $ref: "#/components/schemas/ResourceArn"
    RedactedFields:
      type: array
      items:
        $ref: "#/components/schemas/FieldToMatch"
    LoggingFilter:
      description: Filtering that specifies which web requests are kept in the logs and which are dropped, defined for a web ACL's LoggingConfiguration. You can filter on the rule action and on the web request labels that were applied by matching rules during web ACL evaluation.
      type: object
      properties:
        Filters:
          $ref: "#/components/schemas/Filters"
          description: The filters that you want to apply to the logs.
        DefaultBehavior:
          $ref: "#/components/schemas/FilterBehavior"
          description: Default handling for logs that don't match any of the specified filtering conditions.
      required:
        - Filters
        - DefaultBehavior
    Filters:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A single logging filter, used in LoggingFilter.
      type: object
      properties:
        Behavior:
          $ref: "#/components/schemas/FilterBehavior"
          description: How to handle logs that satisfy the filter's conditions and requirement.
        Requirement:
          $ref: "#/components/schemas/FilterRequirement"
          description: Logic to apply to the filtering conditions. You can specify that, in order to satisfy the filter, a log must match all conditions or must match at least one condition.
        Conditions:
          $ref: "#/components/schemas/Conditions"
          description: Match conditions for the filter.
      required:
        - Behavior
        - Requirement
        - Conditions
    FilterBehavior:
      type: string
      enum:
        - KEEP
        - DROP
    FilterRequirement:
      type: string
      enum:
        - MEETS_ALL
        - MEETS_ANY
    Conditions:
      type: array
      items:
        $ref: "#/components/schemas/Condition"
    Condition:
      description: A single match condition for a Filter.
      type: object
      properties:
        ActionCondition:
          $ref: "#/components/schemas/ActionCondition"
          description: A single action condition. This is the action setting that a log record must contain in order to meet the condition.
        LabelNameCondition:
          $ref: "#/components/schemas/LabelNameCondition"
          description: A single label name condition. This is the fully qualified label name that a log record must contain in order to meet the condition. Fully qualified labels have a prefix, optional namespaces, and label name. The prefix identifies the rule group or web ACL context of the rule that added the label.
    ActionCondition:
      description: A single action condition for a Condition in a logging filter.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/ActionValue"
          description: The action setting that a log record must contain in order to meet the condition. This is the action that WAF applied to the web request. For rule groups, this is either the configured rule action setting, or if you've applied a rule action override to the rule, it's the override action. The value EXCLUDED_AS_COUNT matches on excluded rules and also on rules that have a rule action override of Count.
      required:
        - Action
    ActionValue:
      type: string
      enum:
        - ALLOW
        - BLOCK
        - COUNT
        - CAPTCHA
        - CHALLENGE
        - EXCLUDED_AS_COUNT
    LabelNameCondition:
      description: A single label name condition for a Condition in a logging filter.
      type: object
      properties:
        LabelName:
          $ref: "#/components/schemas/LabelName"
          description: The label name that a log record must contain in order to meet the condition. This must be a fully qualified label name. Fully qualified labels have a prefix, optional namespaces, and label name. The prefix identifies the rule group or web ACL context of the rule that added the label.
      required:
        - LabelName
    GetManagedRuleSetResponse:
      type: object
      properties:
        ManagedRuleSet:
          $ref: "#/components/schemas/ManagedRuleSet"
          description: The managed rule set that you requested.
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
    ManagedRuleSet:
      description: A set of rules that is managed by Amazon Web Services and Amazon Web Services Marketplace sellers to provide versioned managed rule groups for customers of WAF. This is intended for use only by vendors of managed rule sets. Vendors are Amazon Web Services and Amazon Web Services Marketplace sellers. Vendors, you can use the managed rule set APIs to provide controlled rollout of your versioned managed rule group offerings for your customers. The APIs are ListManagedRuleSets, GetManagedRuleSet, PutManagedRuleSetVersions, and UpdateManagedRuleSetVersionExpiryDate.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the managed rule set. You use this, along with the rule set ID, to identify the rule set. This name is assigned to the corresponding managed rule group, which your customers can access and use.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the managed rule set. The ID is returned in the responses to commands like list. You provide it to operations like get and update.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the set that helps with identification.
        PublishedVersions:
          type: object
          properties: {}
          description: The versions of this managed rule set that are available for use by customers.
        RecommendedVersion:
          $ref: "#/components/schemas/VersionKeyString"
          description: The version that you would like your customers to use.
        LabelNamespace:
          $ref: "#/components/schemas/LabelName"
          description: "The label namespace prefix for the managed rule groups that are offered to customers from this managed rule set. All labels that are added by rules in the managed rule group have this prefix. The syntax for the label namespace prefix for a managed rule group is the following: awswaf:managed:`<vendor>`:<rule group name>: When a rule with a label matches a web request, WAF adds the fully qualified label to the request. A fully qualified label is made up of the label namespace from the rule group or web ACL where the rule is defined and the label from the rule, separated by a colon: <label namespace>:<label from rule>"
      required:
        - Name
        - Id
        - ARN
    GetMobileSdkReleaseResponse:
      type: object
      properties:
        MobileSdkRelease:
          $ref: "#/components/schemas/MobileSdkRelease"
          description: Information for a specified SDK release, including release notes and tags.
    MobileSdkRelease:
      description: Information for a release of the mobile SDK, including release notes and tags. The mobile SDK is not generally available. Customers who have access to the mobile SDK can use it to establish and manage WAF tokens for use in HTTP(S) requests from a mobile device to WAF. For more information, see WAF client application integration in the WAF Developer Guide.
      type: object
      properties:
        ReleaseVersion:
          $ref: "#/components/schemas/VersionKeyString"
          description: The release version.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the release.
        ReleaseNotes:
          $ref: "#/components/schemas/ReleaseNotes"
          description: Notes describing the release.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Tags that are associated with the release.
    ReleaseNotes:
      type: string
    GetPermissionPolicyResponse:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/PolicyString"
          description: The IAM policy that is attached to the specified rule group.
    PolicyString:
      type: string
      minLength: 1
      maxLength: 395000
      pattern: .*\S.*
    GetRateBasedStatementManagedKeysResponse:
      type: object
      properties:
        ManagedKeysIPV4:
          $ref: "#/components/schemas/RateBasedStatementManagedKeysIPSet"
          description: The keys that are of Internet Protocol version 4 (IPv4).
        ManagedKeysIPV6:
          $ref: "#/components/schemas/RateBasedStatementManagedKeysIPSet"
          description: The keys that are of Internet Protocol version 6 (IPv6).
    RateBasedStatementManagedKeysIPSet:
      description: The set of IP addresses that are currently blocked for a RateBasedStatement. This is only available for rate-based rules that aggregate on just the IP address, with the AggregateKeyType set to IP or FORWARDED_IP. A rate-based rule applies its rule action to requests from IP addresses that are in the rule's managed keys list and that match the rule's scope-down statement. When a rule has no scope-down statement, it applies the action to all requests from the IP addresses that are in the list. The rule applies its rule action to rate limit the matching requests. The action is usually Block but it can be any valid rule action except for Allow. The maximum number of IP addresses that can be rate limited by a single rate-based rule instance is 10,000. If more than 10,000 addresses exceed the rate limit, WAF limits those with the highest rates.
      type: object
      properties:
        IPAddressVersion:
          $ref: "#/components/schemas/IPAddressVersion"
          description: The version of the IP addresses, either IPV4 or IPV6.
        Addresses:
          $ref: "#/components/schemas/IPAddresses"
          description: The IP addresses that are currently blocked.
    GetRegexPatternSetResponse:
      type: object
      properties:
        RegexPatternSet:
          $ref: "#/components/schemas/RegexPatternSet"
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
    RegexPatternSet:
      description: Contains one or more regular expressions. WAF assigns an ARN to each RegexPatternSet that you create. To use a set in a rule, you provide the ARN to the Rule statement RegexPatternSetReferenceStatement.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the set. You cannot change the name after you create the set.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the set. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the set that helps with identification.
        RegularExpressionList:
          $ref: "#/components/schemas/RegularExpressionList"
          description: The regular expression patterns in the set.
    GetRuleGroupResponse:
      type: object
      properties:
        RuleGroup:
          $ref: "#/components/schemas/RuleGroup"
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
    RuleGroup:
      description: A rule group defines a collection of rules to inspect and control web requests that you can use in a WebACL. When you create a rule group, you define an immutable capacity limit. If you update a rule group, you must stay within the capacity. This allows others to reuse the rule group with confidence in its capacity requirements.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the rule group. You cannot change the name of a rule group after you create it.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the rule group. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        Capacity:
          $ref: "#/components/schemas/CapacityUnit"
          description: The web ACL capacity units (WCUs) required for this rule group. When you create your own rule group, you define this, and you cannot change it after creation. When you add or modify the rules in a rule group, WAF enforces this limit. You can check the capacity for a set of rules using CheckCapacity. WAF uses WCUs to calculate and control the operating resources that are used to run your rules, rule groups, and web ACLs. WAF calculates capacity differently for each rule type, to reflect the relative cost of each rule. Simple rules that cost little to run use fewer WCUs than more complex rules that use more processing power. Rule group capacity is fixed at creation, which helps users plan their web ACL WCU usage when they use a rule group. For more information, see WAF web ACL capacity units (WCU) in the WAF Developer Guide.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the rule group that helps with identification.
        Rules:
          $ref: "#/components/schemas/Rules"
          description: The Rule statements used to identify the web requests that you want to manage. Each rule includes one top-level statement that WAF uses to identify matching web requests, and parameters that govern how WAF handles them.
        VisibilityConfig:
          $ref: "#/components/schemas/VisibilityConfig"
          description: Defines and enables Amazon CloudWatch metrics and web request sample collection.
        LabelNamespace:
          $ref: "#/components/schemas/LabelName"
          description: "The label namespace prefix for this rule group. All labels added by rules in this rule group have this prefix. The syntax for the label namespace prefix for your rule groups is the following: awswaf:<account ID>:rulegroup:<rule group name>: When a rule with a label matches a web request, WAF adds the fully qualified label to the request. A fully qualified label is made up of the label namespace from the rule group or web ACL where the rule is defined and the label from the rule, separated by a colon: <label namespace>:<label from rule>"
        CustomResponseBodies:
          type: object
          properties: {}
          description: A map of custom response keys and content bodies. When you create a rule with a block action, you can send a custom response to the web request. You define these for the rule group, and then use them in the rules that you define in the rule group. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide. For information about the limits on count and size for custom request and response settings, see WAF quotas in the WAF Developer Guide.
        AvailableLabels:
          $ref: "#/components/schemas/LabelSummaries"
          description: The labels that one or more rules in this rule group add to matching web requests. These labels are defined in the RuleLabels for a Rule.
        ConsumedLabels:
          $ref: "#/components/schemas/LabelSummaries"
          description: The labels that one or more rules in this rule group match against in label match statements. These labels are defined in a LabelMatchStatement specification, in the Statement definition of a rule.
      required:
        - Name
        - Id
        - Capacity
        - ARN
        - VisibilityConfig
    TimeWindow:
      description: In a GetSampledRequests request, the StartTime and EndTime objects specify the time range for which you want WAF to return a sample of web requests. You must specify the times in Coordinated Universal Time (UTC) format. UTC format includes the special designator, Z. For example, "2016-09-27T14:50Z". You can specify any time range in the previous three hours. In a GetSampledRequests response, the StartTime and EndTime objects specify the time range for which WAF actually returned a sample of web requests. WAF gets the specified number of requests from among the first 5,000 requests that your Amazon Web Services resource receives during the specified time period. If your resource receives more than 5,000 requests during that period, WAF stops sampling after the 5,000th request. In that case, EndTime is the time that WAF received the 5,000th request.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The beginning of the time range from which you want GetSampledRequests to return a sample of the requests that your Amazon Web Services resource received. You must specify the times in Coordinated Universal Time (UTC) format. UTC format includes the special designator, Z. For example, "2016-09-27T14:50Z". You can specify any time range in the previous three hours.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the time range from which you want GetSampledRequests to return a sample of the requests that your Amazon Web Services resource received. You must specify the times in Coordinated Universal Time (UTC) format. UTC format includes the special designator, Z. For example, "2016-09-27T14:50Z". You can specify any time range in the previous three hours.
      required:
        - StartTime
        - EndTime
    ListMaxItems:
      type: integer
      format: int64
      minimum: 1
      maximum: 500
    GetSampledRequestsResponse:
      type: object
      properties:
        SampledRequests:
          $ref: "#/components/schemas/SampledHTTPRequests"
          description: A complex type that contains detailed information about each of the requests in the sample.
        PopulationSize:
          $ref: "#/components/schemas/PopulationSize"
          description: The total number of requests from which GetSampledRequests got a sample of MaxItems requests. If PopulationSize is less than MaxItems, the sample includes every request that your Amazon Web Services resource received during the specified time range.
        TimeWindow:
          $ref: "#/components/schemas/TimeWindow"
          description: Usually, TimeWindow is the time range that you specified in the GetSampledRequests request. However, if your Amazon Web Services resource received more than 5,000 requests during the time range that you specified in the request, GetSampledRequests returns the time range for the first 5,000 requests. Times are in Coordinated Universal Time (UTC) format.
    SampledHTTPRequests:
      type: array
      items:
        $ref: "#/components/schemas/SampledHTTPRequest"
    SampledHTTPRequest:
      description: Represents a single sampled web request. The response from GetSampledRequests includes a SampledHTTPRequests complex type that appears as SampledRequests in the response syntax. SampledHTTPRequests contains an array of SampledHTTPRequest objects.
      type: object
      properties:
        Request:
          $ref: "#/components/schemas/HTTPRequest"
          description: A complex type that contains detailed information about the request.
        Weight:
          $ref: "#/components/schemas/SampleWeight"
          description: A value that indicates how one result in the response relates proportionally to other results in the response. For example, a result that has a weight of 2 represents roughly twice as many web requests as a result that has a weight of 1.
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which WAF received the request from your Amazon Web Services resource, in Unix time format (in seconds).
        Action:
          $ref: "#/components/schemas/Action"
          description: The action that WAF applied to the request.
        RuleNameWithinRuleGroup:
          $ref: "#/components/schemas/EntityName"
          description: The name of the Rule that the request matched. For managed rule groups, the format for this name is <vendor name>#<managed rule group name>#<rule name>. For your own rule groups, the format for this name is <rule group name>#<rule name>. If the rule is not in a rule group, this field is absent.
        RequestHeadersInserted:
          $ref: "#/components/schemas/HTTPHeaders"
          description: Custom request headers inserted by WAF into the request, according to the custom request configuration for the matching rule action.
        ResponseCodeSent:
          $ref: "#/components/schemas/ResponseStatusCode"
          description: The response code that was sent for the request.
        Labels:
          $ref: "#/components/schemas/Labels"
          description: Labels applied to the web request by matching rules. WAF applies fully qualified labels to matching web requests. A fully qualified label is the concatenation of a label namespace and a rule label. The rule's rule group or web ACL defines the label namespace. For example, awswaf:111122223333:myRuleGroup:testRules:testNS1:testNS2:labelNameA or awswaf:managed:aws:managed-rule-set:header:encoding:utf8.
        CaptchaResponse:
          $ref: "#/components/schemas/CaptchaResponse"
          description: The CAPTCHA response for the request.
        ChallengeResponse:
          $ref: "#/components/schemas/ChallengeResponse"
          description: The Challenge response for the request.
        OverriddenAction:
          $ref: "#/components/schemas/Action"
          description: Used only for rule group rules that have a rule action override in place in the web ACL. This is the action that the rule group rule is configured for, and not the action that was applied to the request. The action that WAF applied is the Action value.
      required:
        - Request
        - Weight
    HTTPRequest:
      description: Part of the response from GetSampledRequests. This is a complex type that appears as Request in the response syntax. HTTPRequest contains information about one of the web requests.
      type: object
      properties:
        ClientIP:
          $ref: "#/components/schemas/IPString"
          description: "The IP address that the request originated from. If the web ACL is associated with a CloudFront distribution, this is the value of one of the following fields in CloudFront access logs: c-ip, if the viewer did not use an HTTP proxy or a load balancer to send the request x-forwarded-for, if the viewer did use an HTTP proxy or a load balancer to send the request"
        Country:
          $ref: "#/components/schemas/Country"
          description: The two-letter country code for the country that the request originated from. For a current list of country codes, see the Wikipedia entry ISO 3166-1 alpha-2.
        URI:
          $ref: "#/components/schemas/URIString"
          description: The URI path of the request, which identifies the resource, for example, /images/daily-ad.jpg.
        Method:
          $ref: "#/components/schemas/HTTPMethod"
          description: The HTTP method specified in the sampled web request.
        HTTPVersion:
          $ref: "#/components/schemas/HTTPVersion"
          description: The HTTP version specified in the sampled web request, for example, HTTP/1.1.
        Headers:
          $ref: "#/components/schemas/HTTPHeaders"
          description: A complex type that contains the name and value for each header in the sampled web request.
    IPString:
      type: string
    Country:
      type: string
    URIString:
      type: string
    HTTPMethod:
      type: string
    HTTPVersion:
      type: string
    HTTPHeaders:
      type: array
      items:
        $ref: "#/components/schemas/HTTPHeader"
    HTTPHeader:
      description: Part of the response from GetSampledRequests. This is a complex type that appears as Headers in the response syntax. HTTPHeader contains the names and values of all of the headers that appear in one of the web requests.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/HeaderName"
          description: The name of the HTTP header.
        Value:
          $ref: "#/components/schemas/HeaderValue"
          description: The value of the HTTP header.
    HeaderName:
      type: string
    HeaderValue:
      type: string
    SampleWeight:
      type: integer
      format: int64
      minimum: 0
    Action:
      type: string
    CaptchaResponse:
      description: The result from the inspection of the web request for a valid CAPTCHA token.
      type: object
      properties:
        ResponseCode:
          $ref: "#/components/schemas/ResponseCode"
          description: The HTTP response code indicating the status of the CAPTCHA token in the web request. If the token is missing, invalid, or expired, this code is 405 Method Not Allowed.
        SolveTimestamp:
          $ref: "#/components/schemas/SolveTimestamp"
          description: The time that the CAPTCHA was last solved for the supplied token.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason for failure, populated when the evaluation of the token fails.
    ResponseCode:
      type: integer
    SolveTimestamp:
      type: integer
      format: int64
    FailureReason:
      type: string
      enum:
        - TOKEN_MISSING
        - TOKEN_EXPIRED
        - TOKEN_INVALID
        - TOKEN_DOMAIN_MISMATCH
    ChallengeResponse:
      description: The result from the inspection of the web request for a valid challenge token.
      type: object
      properties:
        ResponseCode:
          $ref: "#/components/schemas/ResponseCode"
          description: The HTTP response code indicating the status of the challenge token in the web request. If the token is missing, invalid, or expired, this code is 202 Request Accepted.
        SolveTimestamp:
          $ref: "#/components/schemas/SolveTimestamp"
          description: The time that the challenge was last solved for the supplied token.
        FailureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reason for failure, populated when the evaluation of the token fails.
    PopulationSize:
      type: integer
      format: int64
    UriPathPrefixString:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^\/[^ ]*$
    FilterString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    PathStatisticsLimit:
      type: integer
      minimum: 1
      maximum: 100
    NumberOfTopTrafficBotsPerPath:
      type: integer
      minimum: 1
      maximum: 10
    NextMarker:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    GetTopPathStatisticsByTrafficResponse:
      type: object
      properties:
        PathStatistics:
          $ref: "#/components/schemas/PathStatisticsList"
          description: The list of path statistics, ordered by request count. Each entry includes the path, request count, percentage of total traffic, and the top bots accessing that path.
        TotalRequestCount:
          $ref: "#/components/schemas/RequestCount"
          description: The total number of requests that match the query criteria within the specified time window.
        NextMarker:
          $ref: "#/components/schemas/NextMarker"
          description: When you request a list of objects with a Limit setting, if the number of objects that are still available for retrieval exceeds the limit, WAF returns a NextMarker value in the response. To retrieve the next batch of objects, provide the marker from the prior call in your next request.
        TopCategories:
          $ref: "#/components/schemas/PathStatisticsList"
          description: Category-level aggregations for visualizing bot category to path relationships. This field is only populated when no bot filters are applied to the request. Each entry includes the bot category and the paths accessed by bots in that category.
      required:
        - PathStatistics
        - TotalRequestCount
    PathStatisticsList:
      type: array
      items:
        $ref: "#/components/schemas/PathStatistics"
    PathStatistics:
      description: Statistics about bot traffic to a specific URI path, including the path, request count, percentage of total traffic, and the top bots accessing that path.
      type: object
      properties:
        Source:
          $ref: "#/components/schemas/FilterSource"
          description: Information about the bot filter that was applied to generate these statistics. This field is only populated when you filter by bot category, organization, or name.
        Path:
          $ref: "#/components/schemas/PathString"
          description: The URI path. For example, /api/ or /api/v1/users.
        RequestCount:
          $ref: "#/components/schemas/RequestCount"
          description: The number of requests to this path within the specified time window.
        Percentage:
          $ref: "#/components/schemas/PercentageValue"
          description: The percentage of total requests that were made to this path.
        TopBots:
          $ref: "#/components/schemas/BotStatisticsList"
          description: The list of top bots accessing this path, ordered by request count. The number of bots included is determined by the NumberOfTopTrafficBotsPerPath parameter in the request.
      required:
        - Path
        - RequestCount
        - Percentage
    FilterSource:
      description: Information about the bot filter that was applied to the request. This structure is populated in the response when you filter by bot category, organization, or name.
      type: object
      properties:
        BotCategory:
          $ref: "#/components/schemas/FilterString"
          description: The bot category that was used to filter the results. For example, ai or search_engine.
        BotOrganization:
          $ref: "#/components/schemas/FilterString"
          description: The bot organization that was used to filter the results. For example, OpenAI or Google.
        BotName:
          $ref: "#/components/schemas/FilterString"
          description: The bot name that was used to filter the results. For example, gptbot or googlebot.
    PathString:
      type: string
      minLength: 1
      maxLength: 512
    RequestCount:
      type: integer
      format: int64
      minimum: 0
    PercentageValue:
      type: number
      format: double
      minimum: 0
      maximum: 100
    BotStatisticsList:
      type: array
      items:
        $ref: "#/components/schemas/BotStatistics"
    BotStatistics:
      description: Statistics about a specific bot's traffic to a path, including the bot name, request count, and percentage of traffic.
      type: object
      properties:
        BotName:
          $ref: "#/components/schemas/FilterString"
          description: The name of the bot. For example, gptbot or googlebot.
        RequestCount:
          $ref: "#/components/schemas/RequestCount"
          description: The number of requests from this bot to the associated path within the specified time window.
        Percentage:
          $ref: "#/components/schemas/PercentageValue"
          description: The percentage of total requests to the associated path that came from this bot.
      required:
        - BotName
        - RequestCount
        - Percentage
    GetWebACLResponse:
      type: object
      properties:
        WebACL:
          $ref: "#/components/schemas/WebACL"
          description: The web ACL specification. You can modify the settings in this web ACL and use it to update this web ACL or create a new one.
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
        ApplicationIntegrationURL:
          $ref: "#/components/schemas/OutputUrl"
          description: The URL to use in SDK integrations with Amazon Web Services managed rule groups. For example, you can use the integration SDKs with the account takeover prevention managed rule group AWSManagedRulesATPRuleSet and the account creation fraud prevention managed rule group AWSManagedRulesACFPRuleSet. This is only populated if you are using a rule group in your web ACL that integrates with your applications in this way. For more information, see WAF client application integration in the WAF Developer Guide.
    WebACL:
      description: A web ACL defines a collection of rules to use to inspect and control web requests. Each rule has a statement that defines what to look for in web requests and an action that WAF applies to requests that match the statement. In the web ACL, you assign a default action to take (allow, block) for any request that does not match any of the rules. The rules in a web ACL can be a combination of the types Rule, RuleGroup, and managed rule group. You can associate a web ACL with one or more Amazon Web Services resources to protect. The resource types include Amazon CloudFront distribution, Amazon API Gateway REST API, Application Load Balancer, AppSync GraphQL API, Amazon Cognito user pool, App Runner service, Amplify application, and Amazon Web Services Verified Access instance.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the web ACL. You cannot change the name of a web ACL after you create it.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the WebACL. This ID is returned in the responses to create and list commands. You use this ID to do things like get, update, and delete a WebACL.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the web ACL that you want to associate with the resource.
        DefaultAction:
          $ref: "#/components/schemas/DefaultAction"
          description: The action to perform if none of the Rules contained in the WebACL match.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the web ACL that helps with identification.
        Rules:
          $ref: "#/components/schemas/Rules"
          description: The Rule statements used to identify the web requests that you want to manage. Each rule includes one top-level statement that WAF uses to identify matching web requests, and parameters that govern how WAF handles them.
        VisibilityConfig:
          $ref: "#/components/schemas/VisibilityConfig"
          description: Defines and enables Amazon CloudWatch metrics and web request sample collection.
        DataProtectionConfig:
          $ref: "#/components/schemas/DataProtectionConfig"
          description: Specifies data protection to apply to the web request data for the web ACL. This is a web ACL level data protection option. The data protection that you configure for the web ACL alters the data that's available for any other data collection activity, including your WAF logging destinations, web ACL request sampling, and Amazon Security Lake data collection and management. Your other option for data protection is in the logging configuration, which only affects logging.
        Capacity:
          $ref: "#/components/schemas/ConsumedCapacity"
          description: The web ACL capacity units (WCUs) currently being used by this web ACL. WAF uses WCUs to calculate and control the operating resources that are used to run your rules, rule groups, and web ACLs. WAF calculates capacity differently for each rule type, to reflect the relative cost of each rule. Simple rules that cost little to run use fewer WCUs than more complex rules that use more processing power. Rule group capacity is fixed at creation, which helps users plan their web ACL WCU usage when they use a rule group. For more information, see WAF web ACL capacity units (WCU) in the WAF Developer Guide.
        PreProcessFirewallManagerRuleGroups:
          $ref: "#/components/schemas/FirewallManagerRuleGroups"
          description: The first set of rules for WAF to process in the web ACL. This is defined in an Firewall Manager WAF policy and contains only rule group references. You can't alter these. Any rules and rule groups that you define for the web ACL are prioritized after these. In the Firewall Manager WAF policy, the Firewall Manager administrator can define a set of rule groups to run first in the web ACL and a set of rule groups to run last. Within each set, the administrator prioritizes the rule groups, to determine their relative processing order.
        PostProcessFirewallManagerRuleGroups:
          $ref: "#/components/schemas/FirewallManagerRuleGroups"
          description: The last set of rules for WAF to process in the web ACL. This is defined in an Firewall Manager WAF policy and contains only rule group references. You can't alter these. Any rules and rule groups that you define for the web ACL are prioritized before these. In the Firewall Manager WAF policy, the Firewall Manager administrator can define a set of rule groups to run first in the web ACL and a set of rule groups to run last. Within each set, the administrator prioritizes the rule groups, to determine their relative processing order.
        ManagedByFirewallManager:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this web ACL was created by Firewall Manager and is being managed by Firewall Manager. If true, then only Firewall Manager can delete the web ACL or any Firewall Manager rule groups in the web ACL. See also the properties RetrofittedByFirewallManager, PreProcessFirewallManagerRuleGroups, and PostProcessFirewallManagerRuleGroups.
        LabelNamespace:
          $ref: "#/components/schemas/LabelName"
          description: "The label namespace prefix for this web ACL. All labels added by rules in this web ACL have this prefix. The syntax for the label namespace prefix for a web ACL is the following: awswaf:<account ID>:webacl:<web ACL name>: When a rule with a label matches a web request, WAF adds the fully qualified label to the request. A fully qualified label is made up of the label namespace from the rule group or web ACL where the rule is defined and the label from the rule, separated by a colon: <label namespace>:<label from rule>"
        CustomResponseBodies:
          type: object
          properties: {}
          description: A map of custom response keys and content bodies. When you create a rule with a block action, you can send a custom response to the web request. You define these for the web ACL, and then use them in the rules and default actions that you define in the web ACL. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide. For information about the limits on count and size for custom request and response settings, see WAF quotas in the WAF Developer Guide.
        CaptchaConfig:
          $ref: "#/components/schemas/CaptchaConfig"
          description: Specifies how WAF should handle CAPTCHA evaluations for rules that don't have their own CaptchaConfig settings. If you don't specify this, WAF uses its default settings for CaptchaConfig.
        ChallengeConfig:
          $ref: "#/components/schemas/ChallengeConfig"
          description: Specifies how WAF should handle challenge evaluations for rules that don't have their own ChallengeConfig settings. If you don't specify this, WAF uses its default settings for ChallengeConfig.
        TokenDomains:
          $ref: "#/components/schemas/TokenDomains"
          description: Specifies the domains that WAF should accept in a web request token. This enables the use of tokens across multiple protected websites. When WAF provides a token, it uses the domain of the Amazon Web Services resource that the web ACL is protecting. If you don't specify a list of token domains, WAF accepts tokens only for the domain of the protected resource. With a token domain list, WAF accepts the resource's host domain plus all domains in the token domain list, including their prefixed subdomains.
        AssociationConfig:
          $ref: "#/components/schemas/AssociationConfig"
          description: Specifies custom configurations for the associations between the web ACL and protected resources. Use this to customize the maximum size of the request body that your protected resources forward to WAF for inspection. You can customize this setting for CloudFront, API Gateway, Amazon Cognito, App Runner, or Verified Access resources. The default setting is 16 KB (16,384 bytes). You are charged additional fees when your protected resources forward body sizes that are larger than the default. For more information, see WAF Pricing. For Application Load Balancer and AppSync, the limit is fixed at 8 KB (8,192 bytes).
        RetrofittedByFirewallManager:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this web ACL was created by a customer account and then retrofitted by Firewall Manager. If true, then the web ACL is currently being managed by a Firewall Manager WAF policy, and only Firewall Manager can manage any Firewall Manager rule groups in the web ACL. See also the properties ManagedByFirewallManager, PreProcessFirewallManagerRuleGroups, and PostProcessFirewallManagerRuleGroups.
        OnSourceDDoSProtectionConfig:
          $ref: "#/components/schemas/OnSourceDDoSProtectionConfig"
          description: Configures the level of DDoS protection that applies to web ACLs associated with Application Load Balancers.
        ApplicationConfig:
          $ref: "#/components/schemas/ApplicationConfig"
          description: Returns a list of ApplicationAttributes.
      required:
        - Name
        - Id
        - ARN
        - DefaultAction
        - VisibilityConfig
    FirewallManagerRuleGroups:
      type: array
      items:
        $ref: "#/components/schemas/FirewallManagerRuleGroup"
    FirewallManagerRuleGroup:
      description: A rule group that's defined for an Firewall Manager WAF policy.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the rule group. You cannot change the name of a rule group after you create it.
        Priority:
          $ref: "#/components/schemas/RulePriority"
          description: If you define more than one rule group in the first or last Firewall Manager rule groups, WAF evaluates each request against the rule groups in order, starting from the lowest priority setting. The priorities don't need to be consecutive, but they must all be different.
        FirewallManagerStatement:
          $ref: "#/components/schemas/FirewallManagerStatement"
          description: The processing guidance for an Firewall Manager rule. This is like a regular rule Statement, but it can only contain a rule group reference.
        OverrideAction:
          $ref: "#/components/schemas/OverrideAction"
          description: The action to use in the place of the action that results from the rule group evaluation. Set the override action to none to leave the result of the rule group alone. Set it to count to override the result to count only. You can only use this for rule statements that reference a rule group, like RuleGroupReferenceStatement and ManagedRuleGroupStatement. This option is usually set to none. It does not affect how the rules in the rule group are evaluated. If you want the rules in the rule group to only count matches, do not use this and instead use the rule action override option, with Count action, in your rule group reference statement settings.
        VisibilityConfig:
          $ref: "#/components/schemas/VisibilityConfig"
          description: Defines and enables Amazon CloudWatch metrics and web request sample collection.
      required:
        - Name
        - Priority
        - FirewallManagerStatement
        - OverrideAction
        - VisibilityConfig
    FirewallManagerStatement:
      description: The processing guidance for an Firewall Manager rule. This is like a regular rule Statement, but it can only contain a single rule group reference.
      type: object
      properties:
        ManagedRuleGroupStatement:
          $ref: "#/components/schemas/ManagedRuleGroupStatement"
          description: A statement used by Firewall Manager to run the rules that are defined in a managed rule group. This is managed by Firewall Manager for an Firewall Manager WAF policy.
        RuleGroupReferenceStatement:
          $ref: "#/components/schemas/RuleGroupReferenceStatement"
          description: A statement used by Firewall Manager to run the rules that are defined in a rule group. This is managed by Firewall Manager for an Firewall Manager WAF policy.
    OutputUrl:
      type: string
    GetWebACLForResourceResponse:
      type: object
      properties:
