    ForwardedIPConfig:
      description: The configuration for inspecting IP addresses in an HTTP header that you specify, instead of using the IP address that's reported by the web request origin. Commonly, this is the X-Forwarded-For (XFF) header, but you can specify any header name. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all. This configuration is used for GeoMatchStatement, AsnMatchStatement, and RateBasedStatement. For IPSetReferenceStatement, use IPSetForwardedIPConfig instead. WAF only evaluates the first IP address found in the specified HTTP header.
      type: object
      properties:
        HeaderName:
          $ref: "#/components/schemas/ForwardedIPHeaderName"
          description: The name of the HTTP header to use for the IP address. For example, to use the X-Forwarded-For (XFF) header, set this to X-Forwarded-For. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all.
        FallbackBehavior:
          $ref: "#/components/schemas/FallbackBehavior"
          description: "The match status to assign to the web request if the request doesn't have a valid IP address in the specified position. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all. You can specify the following fallback behaviors: MATCH - Treat the web request as matching the rule statement. WAF applies the rule action to the request. NO_MATCH - Treat the web request as not matching the rule statement."
      required:
        - HeaderName
        - FallbackBehavior
    ForwardedIPHeaderName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-zA-Z0-9-]+$
    RuleGroupReferenceStatement:
      description: A rule statement used to run the rules that are defined in a RuleGroup. To use this, create a rule group with your rules, then provide the ARN of the rule group in this statement. You cannot nest a RuleGroupReferenceStatement, for example for use inside a NotStatement or OrStatement. You cannot use a rule group reference statement inside another rule group. You can only reference a rule group as a top-level statement within a rule that you define in a web ACL.
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
        ExcludedRules:
          $ref: "#/components/schemas/ExcludedRules"
          description: Rules in the referenced rule group whose actions are set to Count. Instead of this option, use RuleActionOverrides. It accepts any valid action setting, including Count.
        RuleActionOverrides:
          $ref: "#/components/schemas/RuleActionOverrides"
          description: Action settings to use in the place of the rule actions that are configured inside the rule group. You specify one override for each rule whose action you want to change. Verify the rule names in your overrides carefully. With managed rule groups, WAF silently ignores any override that uses an invalid rule name. With customer-owned rule groups, invalid rule names in your overrides will cause web ACL updates to fail. An invalid rule name is any name that doesn't exactly match the case-sensitive name of an existing rule in the rule group. You can use overrides for testing, for example you can override all of rule actions to Count and then monitor the resulting count metrics to understand how the rule group would handle your web traffic. You can also permanently override some or all actions, to modify how the rule group manages your web traffic.
      required:
        - ARN
    ExcludedRules:
      type: array
      items:
        $ref: "#/components/schemas/ExcludedRule"
    ExcludedRule:
      description: Specifies a single rule in a rule group whose action you want to override to Count. Instead of this option, use RuleActionOverrides. It accepts any valid action setting, including Count.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the rule whose action you want to override to Count.
      required:
        - Name
    RuleActionOverrides:
      type: array
      items:
        $ref: "#/components/schemas/RuleActionOverride"
    RuleActionOverride:
      description: Action setting to use in the place of a rule action that is configured inside the rule group. You specify one override for each rule whose action you want to change. Verify the rule names in your overrides carefully. With managed rule groups, WAF silently ignores any override that uses an invalid rule name. With customer-owned rule groups, invalid rule names in your overrides will cause web ACL updates to fail. An invalid rule name is any name that doesn't exactly match the case-sensitive name of an existing rule in the rule group. You can use overrides for testing, for example you can override all of rule actions to Count and then monitor the resulting count metrics to understand how the rule group would handle your web traffic. You can also permanently override some or all actions, to modify how the rule group manages your web traffic.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the rule to override. Verify the rule names in your overrides carefully. With managed rule groups, WAF silently ignores any override that uses an invalid rule name. With customer-owned rule groups, invalid rule names in your overrides will cause web ACL updates to fail. An invalid rule name is any name that doesn't exactly match the case-sensitive name of an existing rule in the rule group.
        ActionToUse:
          $ref: "#/components/schemas/RuleAction"
          description: The override action to use, in place of the configured action of the rule in the rule group.
      required:
        - Name
        - ActionToUse
    RuleAction:
      description: The action that WAF should take on a web request when it matches a rule's statement. Settings at the web ACL level can override the rule action setting.
      type: object
      properties:
        Block:
          $ref: "#/components/schemas/BlockAction"
          description: Instructs WAF to block the web request.
        Allow:
          $ref: "#/components/schemas/AllowAction"
          description: Instructs WAF to allow the web request.
        Count:
          $ref: "#/components/schemas/CountAction"
          description: Instructs WAF to count the web request and then continue evaluating the request using the remaining rules in the web ACL.
        Captcha:
          $ref: "#/components/schemas/CaptchaAction"
          description: Instructs WAF to run a CAPTCHA check against the web request.
        Challenge:
          $ref: "#/components/schemas/ChallengeAction"
          description: Instructs WAF to run a Challenge check against the web request.
    BlockAction:
      description: Specifies that WAF should block the request and optionally defines additional custom handling for the response to the web request. This is used in the context of other settings, for example to specify values for RuleAction and web ACL DefaultAction.
      type: object
      properties:
        CustomResponse:
          $ref: "#/components/schemas/CustomResponse"
          description: Defines a custom response for the web request. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
    CustomResponse:
      description: A custom response to send to the client. You can define a custom response for rule actions and default web ACL actions that are set to BlockAction. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
      type: object
      properties:
        ResponseCode:
          $ref: "#/components/schemas/ResponseStatusCode"
          description: The HTTP status code to return to the client. For a list of status codes that you can use in your custom responses, see Supported status codes for custom response in the WAF Developer Guide.
        CustomResponseBodyKey:
          $ref: "#/components/schemas/EntityName"
          description: References the response body that you want WAF to return to the web request client. You can define a custom response for a rule action or a default web ACL action that is set to block. To do this, you first define the response body key and value in the CustomResponseBodies setting for the WebACL or RuleGroup where you want to use it. Then, in the rule action or web ACL default action BlockAction setting, you reference the response body using this key.
        ResponseHeaders:
          $ref: "#/components/schemas/CustomHTTPHeaders"
          description: The HTTP headers to use in the response. You can specify any header name except for content-type. Duplicate header names are not allowed. For information about the limits on count and size for custom request and response settings, see WAF quotas in the WAF Developer Guide.
      required:
        - ResponseCode
    ResponseStatusCode:
      type: integer
      minimum: 200
      maximum: 599
    CustomHTTPHeaders:
      type: array
      items:
        $ref: "#/components/schemas/CustomHTTPHeader"
    CustomHTTPHeader:
      description: A custom header for custom request and response handling. This is used in CustomResponse and CustomRequestHandling.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CustomHTTPHeaderName"
          description: The name of the custom header. For custom request header insertion, when WAF inserts the header into the request, it prefixes this name x-amzn-waf-, to avoid confusion with the headers that are already in the request. For example, for the header name sample, WAF inserts the header x-amzn-waf-sample.
        Value:
          $ref: "#/components/schemas/CustomHTTPHeaderValue"
          description: The value of the custom header.
      required:
        - Name
        - Value
    CustomHTTPHeaderName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9._$-]+$
    CustomHTTPHeaderValue:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    AllowAction:
      description: Specifies that WAF should allow the request and optionally defines additional custom handling for the request. This is used in the context of other settings, for example to specify values for RuleAction and web ACL DefaultAction.
      type: object
      properties:
        CustomRequestHandling:
          $ref: "#/components/schemas/CustomRequestHandling"
          description: Defines custom handling for the web request. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
    CustomRequestHandling:
      description: Custom request handling behavior that inserts custom headers into a web request. You can add custom request handling for WAF to use when the rule action doesn't block the request. For example, CaptchaAction for requests with valid t okens, and AllowAction. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
      type: object
      properties:
        InsertHeaders:
          $ref: "#/components/schemas/CustomHTTPHeaders"
          description: The HTTP headers to insert into the request. Duplicate header names are not allowed. For information about the limits on count and size for custom request and response settings, see WAF quotas in the WAF Developer Guide.
      required:
        - InsertHeaders
    CountAction:
      description: Specifies that WAF should count the request. Optionally defines additional custom handling for the request. This is used in the context of other settings, for example to specify values for RuleAction and web ACL DefaultAction.
      type: object
      properties:
        CustomRequestHandling:
          $ref: "#/components/schemas/CustomRequestHandling"
          description: Defines custom handling for the web request. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
    CaptchaAction:
      description: "Specifies that WAF should run a CAPTCHA check against the request: If the request includes a valid, unexpired CAPTCHA token, WAF applies any custom request handling and labels that you've configured and then allows the web request inspection to proceed to the next rule, similar to a CountAction. If the request doesn't include a valid, unexpired token, WAF discontinues the web ACL evaluation of the request and blocks it from going to its intended destination. WAF generates a response that it sends back to the client, which includes the following: The header x-amzn-waf-action with a value of captcha. The HTTP status code 405 Method Not Allowed. If the request contains an Accept header with a value of text/html, the response includes a CAPTCHA JavaScript page interstitial. You can configure the expiration time in the CaptchaConfig ImmunityTimeProperty setting at the rule and web ACL level. The rule setting overrides the web ACL setting. This action option is available for rules. It isn't available for web ACL default actions."
      type: object
      properties:
        CustomRequestHandling:
          $ref: "#/components/schemas/CustomRequestHandling"
          description: Defines custom handling for the web request, used when the CAPTCHA inspection determines that the request's token is valid and unexpired. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
    ChallengeAction:
      description: "Specifies that WAF should run a Challenge check against the request to verify that the request is coming from a legitimate client session: If the request includes a valid, unexpired challenge token, WAF applies any custom request handling and labels that you've configured and then allows the web request inspection to proceed to the next rule, similar to a CountAction. If the request doesn't include a valid, unexpired challenge token, WAF discontinues the web ACL evaluation of the request and blocks it from going to its intended destination. WAF then generates a challenge response that it sends back to the client, which includes the following: The header x-amzn-waf-action with a value of challenge. The HTTP status code 202 Request Accepted. If the request contains an Accept header with a value of text/html, the response includes a JavaScript page interstitial with a challenge script. Challenges run silent browser interrogations in the background, and don't generally affect the end user experience. A challenge enforces token acquisition using an interstitial JavaScript challenge that inspects the client session for legitimate behavior. The challenge blocks bots or at least increases the cost of operating sophisticated bots. After the client session successfully responds to the challenge, it receives a new token from WAF, which the challenge script uses to resubmit the original request. You can configure the expiration time in the ChallengeConfig ImmunityTimeProperty setting at the rule and web ACL level. The rule setting overrides the web ACL setting. This action option is available for rules. It isn't available for web ACL default actions."
      type: object
      properties:
        CustomRequestHandling:
          $ref: "#/components/schemas/CustomRequestHandling"
          description: Defines custom handling for the web request, used when the challenge inspection determines that the request's token is valid and unexpired. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide.
    IPSetReferenceStatement:
      description: A rule statement used to detect web requests coming from particular IP addresses or address ranges. To use this, create an IPSet that specifies the addresses you want to detect, then use the ARN of that set in this statement. To create an IP set, see CreateIPSet. Each IP set rule statement references an IP set. You create and maintain the set independent of your rules. This allows you to use the single set in multiple rules. When you update the referenced set, WAF automatically updates all rules that reference it.
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the IPSet that this statement references.
        IPSetForwardedIPConfig:
          $ref: "#/components/schemas/IPSetForwardedIPConfig"
          description: The configuration for inspecting IP addresses in an HTTP header that you specify, instead of using the IP address that's reported by the web request origin. Commonly, this is the X-Forwarded-For (XFF) header, but you can specify any header name. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all.
      required:
        - ARN
    IPSetForwardedIPConfig:
      description: The configuration for inspecting IP addresses in an HTTP header that you specify, instead of using the IP address that's reported by the web request origin. Commonly, this is the X-Forwarded-For (XFF) header, but you can specify any header name. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all. This configuration is used only for IPSetReferenceStatement. For GeoMatchStatement and RateBasedStatement, use ForwardedIPConfig instead.
      type: object
      properties:
        HeaderName:
          $ref: "#/components/schemas/ForwardedIPHeaderName"
          description: The name of the HTTP header to use for the IP address. For example, to use the X-Forwarded-For (XFF) header, set this to X-Forwarded-For. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all.
        FallbackBehavior:
          $ref: "#/components/schemas/FallbackBehavior"
          description: "The match status to assign to the web request if the request doesn't have a valid IP address in the specified position. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all. You can specify the following fallback behaviors: MATCH - Treat the web request as matching the rule statement. WAF applies the rule action to the request. NO_MATCH - Treat the web request as not matching the rule statement."
        Position:
          $ref: "#/components/schemas/ForwardedIPPosition"
          description: "The position in the header to search for the IP address. The header can contain IP addresses of the original client and also of proxies. For example, the header value could be 10.1.1.1, 127.0.0.0, 10.10.10.10 where the first IP address identifies the original client and the rest identify proxies that the request went through. The options for this setting are the following: FIRST - Inspect the first IP address in the list of IP addresses in the header. This is usually the client's original IP. LAST - Inspect the last IP address in the list of IP addresses in the header. ANY - Inspect all IP addresses in the header for a match. If the header contains more than 10 IP addresses, WAF inspects the last 10."
      required:
        - HeaderName
        - FallbackBehavior
        - Position
    ForwardedIPPosition:
      type: string
      enum:
        - FIRST
        - LAST
        - ANY
    RegexPatternSetReferenceStatement:
      description: A rule statement used to search web request components for matches with regular expressions. To use this, create a RegexPatternSet that specifies the expressions that you want to detect, then use the ARN of that set in this statement. A web request matches the pattern set rule statement if the request component matches any of the patterns in the set. To create a regex pattern set, see CreateRegexPatternSet. Each regex pattern set rule statement references a regex pattern set. You create and maintain the set independent of your rules. This allows you to use the single set in multiple rules. When you update the referenced set, WAF automatically updates all rules that reference it.
      type: object
      properties:
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the RegexPatternSet that this statement references.
        FieldToMatch:
          $ref: "#/components/schemas/FieldToMatch"
          description: The part of the web request that you want WAF to inspect.
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - ARN
        - FieldToMatch
        - TextTransformations
    RateBasedStatement:
      description: "A rate-based rule counts incoming requests and rate limits requests when they are coming at too fast a rate. The rule categorizes requests according to your aggregation criteria, collects them into aggregation instances, and counts and rate limits the requests for each instance. If you change any of these settings in a rule that's currently in use, the change resets the rule's rate limiting counts. This can pause the rule's rate limiting activities for up to a minute. You can specify individual aggregation keys, like IP address or HTTP method. You can also specify aggregation key combinations, like IP address and HTTP method, or HTTP method, query argument, and cookie. Each unique set of values for the aggregation keys that you specify is a separate aggregation instance, with the value from each key contributing to the aggregation instance definition. For example, assume the rule evaluates web requests with the following IP address and HTTP method values: IP address 10.1.1.1, HTTP method POST IP address 10.1.1.1, HTTP method GET IP address 127.0.0.0, HTTP method POST IP address 10.1.1.1, HTTP method GET The rule would create different aggregation instances according to your aggregation criteria, for example: If the aggregation criteria is just the IP address, then each individual address is an aggregation instance, and WAF counts requests separately for each. The aggregation instances and request counts for our example would be the following: IP address 10.1.1.1: count 3 IP address 127.0.0.0: count 1 If the aggregation criteria is HTTP method, then each individual HTTP method is an aggregation instance. The aggregation instances and request counts for our example would be the following: HTTP method POST: count 2 HTTP method GET: count 2 If the aggregation criteria is IP address and HTTP method, then each IP address and each HTTP method would contribute to the combined aggregation instance. The aggregation instances and request counts for our example would be the following: IP address 10.1.1.1, HTTP method POST: count 1 IP address 10.1.1.1, HTTP method GET: count 2 IP address 127.0.0.0, HTTP method POST: count 1 For any n-tuple of aggregation keys, each unique combination of values for the keys defines a separate aggregation instance, which WAF counts and rate-limits individually. You can optionally nest another statement inside the rate-based statement, to narrow the scope of the rule so that it only counts and rate limits requests that match the nested statement. You can use this nested scope-down statement in conjunction with your aggregation key specifications or you can just count and rate limit all requests that match the scope-down statement, without additional aggregation. When you choose to just manage all requests that match a scope-down statement, the aggregation instance is singular for the rule. You cannot nest a RateBasedStatement inside another statement, for example inside a NotStatement or OrStatement. You can define a RateBasedStatement inside a web ACL and inside a rule group. For additional information about the options, see Rate limiting web requests using rate-based rules in the WAF Developer Guide. If you only aggregate on the individual IP address or forwarded IP address, you can retrieve the list of IP addresses that WAF is currently rate limiting for a rule through the API call GetRateBasedStatementManagedKeys. This option is not available for other aggregation configurations. WAF tracks and manages web requests separately for each instance of a rate-based rule that you use. For example, if you provide the same rate-based rule settings in two web ACLs, each of the two rule statements represents a separate instance of the rate-based rule and gets its own tracking and management by WAF. If you define a rate-based rule inside a rule group, and then use that rule group in multiple places, each use creates a separate instance of the rate-based rule that gets its own tracking and management by WAF."
      type: object
      properties:
        Limit:
          $ref: "#/components/schemas/RateLimit"
          description: 'The limit on requests during the specified evaluation window for a single aggregation instance for the rate-based rule. If the rate-based statement includes a ScopeDownStatement, this limit is applied only to the requests that match the statement. Examples: If you aggregate on just the IP address, this is the limit on requests from any single IP address. If you aggregate on the HTTP method and the query argument name "city", then this is the limit on requests for any single method, city pair.'
        EvaluationWindowSec:
          $ref: "#/components/schemas/EvaluationWindowSec"
          description: "The amount of time, in seconds, that WAF should include in its request counts, looking back from the current time. For example, for a setting of 120, when WAF checks the rate, it counts the requests for the 2 minutes immediately preceding the current time. Valid settings are 60, 120, 300, and 600. This setting doesn't determine how often WAF checks the rate, but how far back it looks each time it checks. WAF checks the rate about every 10 seconds. Default: 300 (5 minutes)"
        AggregateKeyType:
          $ref: "#/components/schemas/RateBasedStatementAggregateKeyType"
          description: Setting that indicates how to aggregate the request counts. Web requests that are missing any of the components specified in the aggregation keys are omitted from the rate-based rule evaluation and handling. CONSTANT - Count and limit the requests that match the rate-based rule's scope-down statement. With this option, the counted requests aren't further aggregated. The scope-down statement is the only specification used. When the count of all requests that satisfy the scope-down statement goes over the limit, WAF applies the rule action to all requests that satisfy the scope-down statement. With this option, you must configure the ScopeDownStatement property. CUSTOM_KEYS - Aggregate the request counts using one or more web request components as the aggregate keys. With this option, you must specify the aggregate keys in the CustomKeys property. To aggregate on only the IP address or only the forwarded IP address, don't use custom keys. Instead, set the aggregate key type to IP or FORWARDED_IP. FORWARDED_IP - Aggregate the request counts on the first IP address in an HTTP header. With this option, you must specify the header to use in the ForwardedIPConfig property. To aggregate on a combination of the forwarded IP address with other aggregate keys, use CUSTOM_KEYS. IP - Aggregate the request counts on the IP address from the web request origin. To aggregate on a combination of the IP address with other aggregate keys, use CUSTOM_KEYS.
        ScopeDownStatement:
          $ref: "#/components/schemas/Statement"
          description: An optional nested statement that narrows the scope of the web requests that are evaluated and managed by the rate-based statement. When you use a scope-down statement, the rate-based rule only tracks and rate limits requests that match the scope-down statement. You can use any nestable Statement in the scope-down statement, and you can nest statements at any level, the same as you can for a rule statement.
        ForwardedIPConfig:
          $ref: "#/components/schemas/ForwardedIPConfig"
          description: The configuration for inspecting IP addresses in an HTTP header that you specify, instead of using the IP address that's reported by the web request origin. Commonly, this is the X-Forwarded-For (XFF) header, but you can specify any header name. If the specified header isn't present in the request, WAF doesn't apply the rule to the web request at all. This is required if you specify a forwarded IP in the rule's aggregate key settings.
        CustomKeys:
          $ref: "#/components/schemas/RateBasedStatementCustomKeys"
          description: Specifies the aggregate keys to use in a rate-base rule.
      required:
        - Limit
        - AggregateKeyType
    RateLimit:
      type: integer
      format: int64
      minimum: 10
      maximum: 2000000000
    EvaluationWindowSec:
      type: integer
      format: int64
    RateBasedStatementAggregateKeyType:
      type: string
      enum:
        - IP
        - FORWARDED_IP
        - CUSTOM_KEYS
        - CONSTANT
    RateBasedStatementCustomKeys:
      type: array
      items:
        $ref: "#/components/schemas/RateBasedStatementCustomKey"
    RateBasedStatementCustomKey:
      description: Specifies a single custom aggregate key for a rate-base rule. Web requests that are missing any of the components specified in the aggregation keys are omitted from the rate-based rule evaluation and handling.
      type: object
      properties:
        Header:
          $ref: "#/components/schemas/RateLimitHeader"
          description: Use the value of a header in the request as an aggregate key. Each distinct value in the header contributes to the aggregation instance. If you use a single header as your custom key, then each value fully defines an aggregation instance.
        Cookie:
          $ref: "#/components/schemas/RateLimitCookie"
          description: Use the value of a cookie in the request as an aggregate key. Each distinct value in the cookie contributes to the aggregation instance. If you use a single cookie as your custom key, then each value fully defines an aggregation instance.
        QueryArgument:
          $ref: "#/components/schemas/RateLimitQueryArgument"
          description: Use the specified query argument as an aggregate key. Each distinct value for the named query argument contributes to the aggregation instance. If you use a single query argument as your custom key, then each value fully defines an aggregation instance.
        QueryString:
          $ref: "#/components/schemas/RateLimitQueryString"
          description: Use the request's query string as an aggregate key. Each distinct string contributes to the aggregation instance. If you use just the query string as your custom key, then each string fully defines an aggregation instance.
        HTTPMethod:
          $ref: "#/components/schemas/RateLimitHTTPMethod"
          description: Use the request's HTTP method as an aggregate key. Each distinct HTTP method contributes to the aggregation instance. If you use just the HTTP method as your custom key, then each method fully defines an aggregation instance.
        ForwardedIP:
          $ref: "#/components/schemas/RateLimitForwardedIP"
          description: Use the first IP address in an HTTP header as an aggregate key. Each distinct forwarded IP address contributes to the aggregation instance. When you specify an IP or forwarded IP in the custom key settings, you must also specify at least one other key to use. You can aggregate on only the forwarded IP address by specifying FORWARDED_IP in your rate-based statement's AggregateKeyType. With this option, you must specify the header to use in the rate-based rule's ForwardedIPConfig property.
        IP:
          $ref: "#/components/schemas/RateLimitIP"
          description: Use the request's originating IP address as an aggregate key. Each distinct IP address contributes to the aggregation instance. When you specify an IP or forwarded IP in the custom key settings, you must also specify at least one other key to use. You can aggregate on only the IP address by specifying IP in your rate-based statement's AggregateKeyType.
        LabelNamespace:
          $ref: "#/components/schemas/RateLimitLabelNamespace"
          description: Use the specified label namespace as an aggregate key. Each distinct fully qualified label name that has the specified label namespace contributes to the aggregation instance. If you use just one label namespace as your custom key, then each label name fully defines an aggregation instance. This uses only labels that have been added to the request by rules that are evaluated before this rate-based rule in the web ACL. For information about label namespaces and names, see Label syntax and naming requirements in the WAF Developer Guide.
        UriPath:
          $ref: "#/components/schemas/RateLimitUriPath"
          description: Use the request's URI path as an aggregate key. Each distinct URI path contributes to the aggregation instance. If you use just the URI path as your custom key, then each URI path fully defines an aggregation instance.
        JA3Fingerprint:
          $ref: "#/components/schemas/RateLimitJA3Fingerprint"
          description: Use the request's JA3 fingerprint as an aggregate key. If you use a single JA3 fingerprint as your custom key, then each value fully defines an aggregation instance.
        JA4Fingerprint:
          $ref: "#/components/schemas/RateLimitJA4Fingerprint"
          description: Use the request's JA4 fingerprint as an aggregate key. If you use a single JA4 fingerprint as your custom key, then each value fully defines an aggregation instance.
        ASN:
          $ref: "#/components/schemas/RateLimitAsn"
          description: Use an Autonomous System Number (ASN) derived from the request's originating or forwarded IP address as an aggregate key. Each distinct ASN contributes to the aggregation instance.
    RateLimitHeader:
      description: Specifies a header as an aggregate key for a rate-based rule. Each distinct value in the header contributes to the aggregation instance. If you use a single header as your custom key, then each value fully defines an aggregation instance.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FieldToMatchData"
          description: The name of the header to use.
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - Name
        - TextTransformations
    RateLimitCookie:
      description: Specifies a cookie as an aggregate key for a rate-based rule. Each distinct value in the cookie contributes to the aggregation instance. If you use a single cookie as your custom key, then each value fully defines an aggregation instance.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FieldToMatchData"
          description: The name of the cookie to use.
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - Name
        - TextTransformations
    RateLimitQueryArgument:
      description: Specifies a query argument in the request as an aggregate key for a rate-based rule. Each distinct value for the named query argument contributes to the aggregation instance. If you use a single query argument as your custom key, then each value fully defines an aggregation instance.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FieldToMatchData"
          description: The name of the query argument to use.
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - Name
        - TextTransformations
    RateLimitQueryString:
      description: Specifies the request's query string as an aggregate key for a rate-based rule. Each distinct string contributes to the aggregation instance. If you use just the query string as your custom key, then each string fully defines an aggregation instance.
      type: object
      properties:
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - TextTransformations
    RateLimitHTTPMethod:
      description: "Specifies the request's HTTP method as an aggregate key for a rate-based rule. Each distinct HTTP method contributes to the aggregation instance. If you use just the HTTP method as your custom key, then each method fully defines an aggregation instance. JSON specification: \"RateLimitHTTPMethod\": {}"
      type: object
    RateLimitForwardedIP:
      description: "Specifies the first IP address in an HTTP header as an aggregate key for a rate-based rule. Each distinct forwarded IP address contributes to the aggregation instance. This setting is used only in the RateBasedStatementCustomKey specification of a rate-based rule statement. When you specify an IP or forwarded IP in the custom key settings, you must also specify at least one other key to use. You can aggregate on only the forwarded IP address by specifying FORWARDED_IP in your rate-based statement's AggregateKeyType. This data type supports using the forwarded IP address in the web request aggregation for a rate-based rule, in RateBasedStatementCustomKey. The JSON specification for using the forwarded IP address doesn't explicitly use this data type. JSON specification: \"ForwardedIP\": {} When you use this specification, you must also configure the forwarded IP address in the rate-based statement's ForwardedIPConfig."
      type: object
    RateLimitIP:
      description: "Specifies the IP address in the web request as an aggregate key for a rate-based rule. Each distinct IP address contributes to the aggregation instance. This setting is used only in the RateBasedStatementCustomKey specification of a rate-based rule statement. To use this in the custom key settings, you must specify at least one other key to use, along with the IP address. To aggregate on only the IP address, in your rate-based statement's AggregateKeyType, specify IP. JSON specification: \"RateLimitIP\": {}"
      type: object
    RateLimitLabelNamespace:
      description: Specifies a label namespace to use as an aggregate key for a rate-based rule. Each distinct fully qualified label name that has the specified label namespace contributes to the aggregation instance. If you use just one label namespace as your custom key, then each label name fully defines an aggregation instance. This uses only labels that have been added to the request by rules that are evaluated before this rate-based rule in the web ACL. For information about label namespaces and names, see Label syntax and naming requirements in the WAF Developer Guide.
      type: object
      properties:
        Namespace:
          $ref: "#/components/schemas/LabelNamespace"
          description: The namespace to use for aggregation.
      required:
        - Namespace
    LabelNamespace:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[0-9A-Za-z_\-:]+:$
    RateLimitUriPath:
      description: Specifies the request's URI path as an aggregate key for a rate-based rule. Each distinct URI path contributes to the aggregation instance. If you use just the URI path as your custom key, then each URI path fully defines an aggregation instance.
      type: object
      properties:
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - TextTransformations
    RateLimitJA3Fingerprint:
      description: Use the request's JA3 fingerprint derived from the TLS Client Hello of an incoming request as an aggregate key. If you use a single JA3 fingerprint as your custom key, then each value fully defines an aggregation instance.
      type: object
      properties:
        FallbackBehavior:
          $ref: "#/components/schemas/FallbackBehavior"
          description: "The match status to assign to the web request if there is insufficient TSL Client Hello information to compute the JA3 fingerprint. You can specify the following fallback behaviors: MATCH - Treat the web request as matching the rule statement. WAF applies the rule action to the request. NO_MATCH - Treat the web request as not matching the rule statement."
      required:
        - FallbackBehavior
    RateLimitJA4Fingerprint:
      description: Use the request's JA4 fingerprint derived from the TLS Client Hello of an incoming request as an aggregate key. If you use a single JA4 fingerprint as your custom key, then each value fully defines an aggregation instance.
      type: object
      properties:
        FallbackBehavior:
          $ref: "#/components/schemas/FallbackBehavior"
          description: "The match status to assign to the web request if there is insufficient TSL Client Hello information to compute the JA4 fingerprint. You can specify the following fallback behaviors: MATCH - Treat the web request as matching the rule statement. WAF applies the rule action to the request. NO_MATCH - Treat the web request as not matching the rule statement."
      required:
        - FallbackBehavior
    RateLimitAsn:
      description: Specifies an Autonomous System Number (ASN) derived from the request's originating or forwarded IP address as an aggregate key for a rate-based rule. Each distinct ASN contributes to the aggregation instance. If you use a single ASN as your custom key, then each ASN fully defines an aggregation instance.
      type: object
    AndStatement:
      description: A logical rule statement used to combine other rule statements with AND logic. You provide more than one Statement within the AndStatement.
      type: object
      properties:
        Statements:
          $ref: "#/components/schemas/Statements"
          description: The statements to combine with AND logic. You can use any statements that can be nested.
      required:
        - Statements
    Statements:
      type: array
      items:
        $ref: "#/components/schemas/Statement"
    OrStatement:
      description: A logical rule statement used to combine other rule statements with OR logic. You provide more than one Statement within the OrStatement.
      type: object
      properties:
        Statements:
          $ref: "#/components/schemas/Statements"
          description: The statements to combine with OR logic. You can use any statements that can be nested.
      required:
        - Statements
    NotStatement:
      description: A logical rule statement used to negate the results of another rule statement. You provide one Statement within the NotStatement.
      type: object
      properties:
        Statement:
          $ref: "#/components/schemas/Statement"
          description: The statement to negate. You can use any statement that can be nested.
      required:
        - Statement
    ManagedRuleGroupStatement:
      description: A rule statement used to run the rules that are defined in a managed rule group. To use this, provide the vendor name and the name of the rule group in this statement. You can retrieve the required names by calling ListAvailableManagedRuleGroups. You cannot nest a ManagedRuleGroupStatement, for example for use inside a NotStatement or OrStatement. You cannot use a managed rule group inside another rule group. You can only reference a managed rule group as a top-level statement within a rule that you define in a web ACL. You are charged additional fees when you use the WAF Bot Control managed rule group AWSManagedRulesBotControlRuleSet, the WAF Fraud Control account takeover prevention (ATP) managed rule group AWSManagedRulesATPRuleSet, or the WAF Fraud Control account creation fraud prevention (ACFP) managed rule group AWSManagedRulesACFPRuleSet. For more information, see WAF Pricing.
      type: object
      properties:
        VendorName:
          $ref: "#/components/schemas/VendorName"
          description: The name of the managed rule group vendor. You use this, along with the rule group name, to identify a rule group.
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the managed rule group. You use this, along with the vendor name, to identify the rule group.
        Version:
          $ref: "#/components/schemas/VersionKeyString"
          description: The version of the managed rule group to use. If you specify this, the version setting is fixed until you change it. If you don't specify this, WAF uses the vendor's default version, and then keeps the version at the vendor's default when the vendor updates the managed rule group settings.
        ExcludedRules:
          $ref: "#/components/schemas/ExcludedRules"
          description: Rules in the referenced rule group whose actions are set to Count. Instead of this option, use RuleActionOverrides. It accepts any valid action setting, including Count.
        ScopeDownStatement:
          $ref: "#/components/schemas/Statement"
          description: An optional nested statement that narrows the scope of the web requests that are evaluated by the managed rule group. Requests are only evaluated by the rule group if they match the scope-down statement. You can use any nestable Statement in the scope-down statement, and you can nest statements at any level, the same as you can for a rule statement.
        ManagedRuleGroupConfigs:
          $ref: "#/components/schemas/ManagedRuleGroupConfigs"
          description: "Additional information that's used by a managed rule group. Many managed rule groups don't require this. The rule groups used for intelligent threat mitigation require additional configuration: Use the AWSManagedRulesACFPRuleSet configuration object to configure the account creation fraud prevention managed rule group. The configuration includes the registration and sign-up pages of your application and the locations in the account creation request payload of data, such as the user email and phone number fields. Use the AWSManagedRulesAntiDDoSRuleSet configuration object to configure the anti-DDoS managed rule group. The configuration includes the sensitivity levels to use in the rules that typically block and challenge requests that might be participating in DDoS attacks and the specification to use to indicate whether a request can handle a silent browser challenge. Use the AWSManagedRulesATPRuleSet configuration object to configure the account takeover prevention managed rule group. The configuration includes the sign-in page of your application and the locations in the login request payload of data such as the username and password. Use the AWSManagedRulesBotControlRuleSet configuration object to configure the protection level that you want the Bot Control rule group to use."
        RuleActionOverrides:
          $ref: "#/components/schemas/RuleActionOverrides"
          description: Action settings to use in the place of the rule actions that are configured inside the rule group. You specify one override for each rule whose action you want to change. Verify the rule names in your overrides carefully. With managed rule groups, WAF silently ignores any override that uses an invalid rule name. With customer-owned rule groups, invalid rule names in your overrides will cause web ACL updates to fail. An invalid rule name is any name that doesn't exactly match the case-sensitive name of an existing rule in the rule group. You can use overrides for testing, for example you can override all of rule actions to Count and then monitor the resulting count metrics to understand how the rule group would handle your web traffic. You can also permanently override some or all actions, to modify how the rule group manages your web traffic.
      required:
        - VendorName
        - Name
    VendorName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*\S.*
    VersionKeyString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[\w#:\.\-/]+$
    ManagedRuleGroupConfigs:
      type: array
      items:
        $ref: "#/components/schemas/ManagedRuleGroupConfig"
    ManagedRuleGroupConfig:
      description: "Additional information that's used by a managed rule group. Many managed rule groups don't require this. The rule groups used for intelligent threat mitigation require additional configuration: Use the AWSManagedRulesACFPRuleSet configuration object to configure the account creation fraud prevention managed rule group. The configuration includes the registration and sign-up pages of your application and the locations in the account creation request payload of data, such as the user email and phone number fields. Use the AWSManagedRulesAntiDDoSRuleSet configuration object to configure the anti-DDoS managed rule group. The configuration includes the sensitivity levels to use in the rules that typically block and challenge requests that might be participating in DDoS attacks and the specification to use to indicate whether a request can handle a silent browser challenge. Use the AWSManagedRulesATPRuleSet configuration object to configure the account takeover prevention managed rule group. The configuration includes the sign-in page of your application and the locations in the login request payload of data such as the username and password. Use the AWSManagedRulesBotControlRuleSet configuration object to configure the protection level that you want the Bot Control rule group to use. For example specifications, see the examples section of CreateWebACL."
      type: object
      properties:
        LoginPath:
          $ref: "#/components/schemas/LoginPathString"
          description: Instead of this setting, provide your configuration under AWSManagedRulesATPRuleSet.
        PayloadType:
          $ref: "#/components/schemas/PayloadType"
          description: Instead of this setting, provide your configuration under the request inspection configuration for AWSManagedRulesATPRuleSet or AWSManagedRulesACFPRuleSet.
        UsernameField:
          $ref: "#/components/schemas/UsernameField"
          description: Instead of this setting, provide your configuration under the request inspection configuration for AWSManagedRulesATPRuleSet or AWSManagedRulesACFPRuleSet.
        PasswordField:
          $ref: "#/components/schemas/PasswordField"
          description: Instead of this setting, provide your configuration under the request inspection configuration for AWSManagedRulesATPRuleSet or AWSManagedRulesACFPRuleSet.
        AWSManagedRulesBotControlRuleSet:
          $ref: "#/components/schemas/AWSManagedRulesBotControlRuleSet"
          description: Additional configuration for using the Bot Control managed rule group. Use this to specify the inspection level that you want to use. For information about using the Bot Control managed rule group, see WAF Bot Control rule group and WAF Bot Control in the WAF Developer Guide.
        AWSManagedRulesATPRuleSet:
          $ref: "#/components/schemas/AWSManagedRulesATPRuleSet"
          description: Additional configuration for using the account takeover prevention (ATP) managed rule group, AWSManagedRulesATPRuleSet. Use this to provide login request information to the rule group. For web ACLs that protect CloudFront distributions, use this to also provide the information about how your distribution responds to login requests. This configuration replaces the individual configuration fields in ManagedRuleGroupConfig and provides additional feature configuration. For information about using the ATP managed rule group, see WAF Fraud Control account takeover prevention (ATP) rule group and WAF Fraud Control account takeover prevention (ATP) in the WAF Developer Guide.
        AWSManagedRulesACFPRuleSet:
          $ref: "#/components/schemas/AWSManagedRulesACFPRuleSet"
          description: Additional configuration for using the account creation fraud prevention (ACFP) managed rule group, AWSManagedRulesACFPRuleSet. Use this to provide account creation request information to the rule group. For web ACLs that protect CloudFront distributions, use this to also provide the information about how your distribution responds to account creation requests. For information about using the ACFP managed rule group, see WAF Fraud Control account creation fraud prevention (ACFP) rule group and WAF Fraud Control account creation fraud prevention (ACFP) in the WAF Developer Guide.
        AWSManagedRulesAntiDDoSRuleSet:
          $ref: "#/components/schemas/AWSManagedRulesAntiDDoSRuleSet"
          description: Additional configuration for using the anti-DDoS managed rule group, AWSManagedRulesAntiDDoSRuleSet. Use this to configure anti-DDoS behavior for the rule group. For information about using the anti-DDoS managed rule group, see WAF Anti-DDoS rule group and Distributed Denial of Service (DDoS) prevention in the WAF Developer Guide.
    LoginPathString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    PayloadType:
      type: string
      enum:
        - JSON
        - FORM_ENCODED
    UsernameField:
      description: The name of the field in the request payload that contains your customer's username. This data type is used in the RequestInspection and RequestInspectionACFP data types.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FieldIdentifier"
          description: 'The name of the username field. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { "form": { "username": "THE_USERNAME" } }, the username field specification is /form/username. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named username1, the username field specification is username1'
      required:
        - Identifier
    FieldIdentifier:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*\S.*
    PasswordField:
      description: The name of the field in the request payload that contains your customer's password. This data type is used in the RequestInspection and RequestInspectionACFP data types.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FieldIdentifier"
          description: 'The name of the password field. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { "form": { "password": "THE_PASSWORD" } }, the password field specification is /form/password. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named password1, the password field specification is password1.'
      required:
        - Identifier
    AWSManagedRulesBotControlRuleSet:
      description: Details for your use of the Bot Control managed rule group, AWSManagedRulesBotControlRuleSet. This configuration is used in ManagedRuleGroupConfig. For additional information about this and the other intelligent threat mitigation rule groups, see Intelligent threat mitigation in WAF and Amazon Web Services Managed Rules rule groups list in the WAF Developer Guide.
      type: object
      properties:
        InspectionLevel:
          $ref: "#/components/schemas/InspectionLevel"
          description: The inspection level to use for the Bot Control rule group. The common level is the least expensive. The targeted level includes all common level rules and adds rules with more advanced inspection criteria. For details, see WAF Bot Control rule group in the WAF Developer Guide.
        EnableMachineLearning:
          $ref: "#/components/schemas/EnableMachineLearning"
          description: "Applies only to the targeted inspection level. Determines whether to use machine learning (ML) to analyze your web traffic for bot-related activity. Machine learning is required for the Bot Control rules TGT_ML_CoordinatedActivityLow and TGT_ML_CoordinatedActivityMedium, which inspect for anomalous behavior that might indicate distributed, coordinated bot activity. For more information about this choice, see the listing for these rules in the table at Bot Control rules listing in the WAF Developer Guide. Default: TRUE"
      required:
        - InspectionLevel
    InspectionLevel:
      type: string
      enum:
        - COMMON
        - TARGETED
    EnableMachineLearning:
      type: boolean
    AWSManagedRulesATPRuleSet:
      description: Details for your use of the account takeover prevention managed rule group, AWSManagedRulesATPRuleSet. This configuration is used in ManagedRuleGroupConfig. For additional information about this and the other intelligent threat mitigation rule groups, see Intelligent threat mitigation in WAF and Amazon Web Services Managed Rules rule groups list in the WAF Developer Guide.
      type: object
      properties:
        LoginPath:
          $ref: "#/components/schemas/String"
          description: The path of the login endpoint for your application. For example, for the URL https://example.com/web/login, you would provide the path /web/login. Login paths that start with the path that you provide are considered a match. For example /web/login matches the login paths /web/login, /web/login/, /web/loginPage, and /web/login/thisPage, but doesn't match the login path /home/web/login or /website/login. The rule group inspects only HTTP POST requests to your specified login endpoint.
        RequestInspection:
          $ref: "#/components/schemas/RequestInspection"
          description: The criteria for inspecting login requests, used by the ATP rule group to validate credentials usage.
        ResponseInspection:
          $ref: "#/components/schemas/ResponseInspection"
          description: The criteria for inspecting responses to login requests, used by the ATP rule group to track login failure rates. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions. The ATP rule group evaluates the responses that your protected resources send back to client login attempts, keeping count of successful and failed attempts for each IP address and client session. Using this information, the rule group labels and mitigates requests from client sessions and IP addresses that have had too many failed login attempts in a short amount of time.
        EnableRegexInPath:
          $ref: "#/components/schemas/Boolean"
          description: Allow the use of regular expressions in the login page path.
      required:
        - LoginPath
    String:
      type: string
    RequestInspection:
      description: The criteria for inspecting login requests, used by the ATP rule group to validate credentials usage. This is part of the AWSManagedRulesATPRuleSet configuration in ManagedRuleGroupConfig. In these settings, you specify how your application accepts login attempts by providing the request payload type and the names of the fields within the request body where the username and password are provided.
      type: object
      properties:
        PayloadType:
          $ref: "#/components/schemas/PayloadType"
          description: The payload type for your login endpoint, either JSON or form encoded.
        UsernameField:
          $ref: "#/components/schemas/UsernameField"
          description: "The name of the field in the request payload that contains your customer's username. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"username\": \"THE_USERNAME\" } }, the username field specification is /form/username. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named username1, the username field specification is username1"
        PasswordField:
          $ref: "#/components/schemas/PasswordField"
          description: "The name of the field in the request payload that contains your customer's password. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"password\": \"THE_PASSWORD\" } }, the password field specification is /form/password. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named password1, the password field specification is password1."
      required:
        - PayloadType
        - UsernameField
        - PasswordField
    ResponseInspection:
      description: The criteria for inspecting responses to login requests and account creation requests, used by the ATP and ACFP rule groups to track login and account creation success and failure rates. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions. The rule groups evaluates the responses that your protected resources send back to client login and account creation attempts, keeping count of successful and failed attempts from each IP address and client session. Using this information, the rule group labels and mitigates requests from client sessions and IP addresses with too much suspicious activity in a short amount of time. This is part of the AWSManagedRulesATPRuleSet and AWSManagedRulesACFPRuleSet configurations in ManagedRuleGroupConfig. Enable response inspection by configuring exactly one component of the response to inspect, for example, Header or StatusCode. You can't configure more than one component for inspection. If you don't configure any of the response inspection options, response inspection is disabled.
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/ResponseInspectionStatusCode"
          description: Configures inspection of the response status code for success and failure indicators.
        Header:
          $ref: "#/components/schemas/ResponseInspectionHeader"
          description: Configures inspection of the response header for success and failure indicators.
        BodyContains:
          $ref: "#/components/schemas/ResponseInspectionBodyContains"
          description: Configures inspection of the response body for success and failure indicators. WAF can inspect the first 65,536 bytes (64 KB) of the response body.
        Json:
          $ref: "#/components/schemas/ResponseInspectionJson"
          description: Configures inspection of the response JSON for success and failure indicators. WAF can inspect the first 65,536 bytes (64 KB) of the response JSON.
    ResponseInspectionStatusCode:
      description: Configures inspection of the response status code. This is part of the ResponseInspection configuration for AWSManagedRulesATPRuleSet and AWSManagedRulesACFPRuleSet. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions.
      type: object
      properties:
        SuccessCodes:
          $ref: "#/components/schemas/ResponseInspectionStatusCodeSuccessCodes"
          description: 'Status codes in the response that indicate a successful login or account creation attempt. To be counted as a success, the response status code must match one of these. Each code must be unique among the success and failure status codes. JSON example: "SuccessCodes": [ 200, 201 ]'
        FailureCodes:
          $ref: "#/components/schemas/ResponseInspectionStatusCodeFailureCodes"
          description: 'Status codes in the response that indicate a failed login or account creation attempt. To be counted as a failure, the response status code must match one of these. Each code must be unique among the success and failure status codes. JSON example: "FailureCodes": [ 400, 404 ]'
      required:
        - SuccessCodes
        - FailureCodes
    ResponseInspectionStatusCodeSuccessCodes:
      type: array
      items:
        $ref: "#/components/schemas/SuccessCode"
    SuccessCode:
      type: integer
      minimum: 0
      maximum: 999
    ResponseInspectionStatusCodeFailureCodes:
      type: array
      items:
        $ref: "#/components/schemas/FailureCode"
    FailureCode:
      type: integer
      minimum: 0
      maximum: 999
    ResponseInspectionHeader:
      description: Configures inspection of the response header. This is part of the ResponseInspection configuration for AWSManagedRulesATPRuleSet and AWSManagedRulesACFPRuleSet. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ResponseInspectionHeaderName"
          description: 'The name of the header to match against. The name must be an exact match, including case. JSON example: "Name": [ "RequestResult" ]'
        SuccessValues:
          $ref: "#/components/schemas/ResponseInspectionHeaderSuccessValues"
          description: 'Values in the response header with the specified name that indicate a successful login or account creation attempt. To be counted as a success, the value must be an exact match, including case. Each value must be unique among the success and failure values. JSON examples: "SuccessValues": [ "LoginPassed", "Successful login" ] and "SuccessValues": [ "AccountCreated", "Successful account creation" ]'
        FailureValues:
          $ref: "#/components/schemas/ResponseInspectionHeaderFailureValues"
          description: 'Values in the response header with the specified name that indicate a failed login or account creation attempt. To be counted as a failure, the value must be an exact match, including case. Each value must be unique among the success and failure values. JSON examples: "FailureValues": [ "LoginFailed", "Failed login" ] and "FailureValues": [ "AccountCreationFailed" ]'
      required:
        - Name
        - SuccessValues
        - FailureValues
    ResponseInspectionHeaderName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: .*\S.*
    ResponseInspectionHeaderSuccessValues:
      type: array
      items:
        $ref: "#/components/schemas/SuccessValue"
    SuccessValue:
      type: string
      minLength: 1
      maxLength: 100
      pattern: .*\S.*
    ResponseInspectionHeaderFailureValues:
      type: array
      items:
        $ref: "#/components/schemas/FailureValue"
    FailureValue:
      type: string
      minLength: 1
      maxLength: 100
      pattern: .*\S.*
    ResponseInspectionBodyContains:
      description: Configures inspection of the response body. WAF can inspect the first 65,536 bytes (64 KB) of the response body. This is part of the ResponseInspection configuration for AWSManagedRulesATPRuleSet and AWSManagedRulesACFPRuleSet. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions.
      type: object
      properties:
        SuccessStrings:
          $ref: "#/components/schemas/ResponseInspectionBodyContainsSuccessStrings"
          description: 'Strings in the body of the response that indicate a successful login or account creation attempt. To be counted as a success, the string can be anywhere in the body and must be an exact match, including case. Each string must be unique among the success and failure strings. JSON examples: "SuccessStrings": [ "Login successful" ] and "SuccessStrings": [ "Account creation successful", "Welcome to our site!" ]'
        FailureStrings:
          $ref: "#/components/schemas/ResponseInspectionBodyContainsFailureStrings"
          description: 'Strings in the body of the response that indicate a failed login or account creation attempt. To be counted as a failure, the string can be anywhere in the body and must be an exact match, including case. Each string must be unique among the success and failure strings. JSON example: "FailureStrings": [ "Request failed" ]'
      required:
        - SuccessStrings
        - FailureStrings
    ResponseInspectionBodyContainsSuccessStrings:
      type: array
      items:
        $ref: "#/components/schemas/SuccessValue"
    ResponseInspectionBodyContainsFailureStrings:
      type: array
      items:
        $ref: "#/components/schemas/FailureValue"
    ResponseInspectionJson:
      description: Configures inspection of the response JSON. WAF can inspect the first 65,536 bytes (64 KB) of the response JSON. This is part of the ResponseInspection configuration for AWSManagedRulesATPRuleSet and AWSManagedRulesACFPRuleSet. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FieldIdentifier"
          description: 'The identifier for the value to match against in the JSON. The identifier must be an exact match, including case. JSON examples: "Identifier": [ "/login/success" ] and "Identifier": [ "/sign-up/success" ]'
        SuccessValues:
          $ref: "#/components/schemas/ResponseInspectionJsonSuccessValues"
          description: 'Values for the specified identifier in the response JSON that indicate a successful login or account creation attempt. To be counted as a success, the value must be an exact match, including case. Each value must be unique among the success and failure values. JSON example: "SuccessValues": [ "True", "Succeeded" ]'
        FailureValues:
          $ref: "#/components/schemas/ResponseInspectionJsonFailureValues"
          description: 'Values for the specified identifier in the response JSON that indicate a failed login or account creation attempt. To be counted as a failure, the value must be an exact match, including case. Each value must be unique among the success and failure values. JSON example: "FailureValues": [ "False", "Failed" ]'
      required:
        - Identifier
        - SuccessValues
        - FailureValues
    ResponseInspectionJsonSuccessValues:
      type: array
      items:
        $ref: "#/components/schemas/SuccessValue"
    ResponseInspectionJsonFailureValues:
      type: array
      items:
        $ref: "#/components/schemas/FailureValue"
    Boolean:
      type: boolean
    AWSManagedRulesACFPRuleSet:
      description: Details for your use of the account creation fraud prevention managed rule group, AWSManagedRulesACFPRuleSet. This configuration is used in ManagedRuleGroupConfig. For additional information about this and the other intelligent threat mitigation rule groups, see Intelligent threat mitigation in WAF and Amazon Web Services Managed Rules rule groups list in the WAF Developer Guide.
      type: object
      properties:
        CreationPath:
          $ref: "#/components/schemas/CreationPathString"
          description: The path of the account creation endpoint for your application. This is the page on your website that accepts the completed registration form for a new user. This page must accept POST requests. For example, for the URL https://example.com/web/newaccount, you would provide the path /web/newaccount. Account creation page paths that start with the path that you provide are considered a match. For example /web/newaccount matches the account creation paths /web/newaccount, /web/newaccount/, /web/newaccountPage, and /web/newaccount/thisPage, but doesn't match the path /home/web/newaccount or /website/newaccount.
        RegistrationPagePath:
          $ref: "#/components/schemas/RegistrationPagePathString"
          description: The path of the account registration endpoint for your application. This is the page on your website that presents the registration form to new users. This page must accept GET text/html requests. For example, for the URL https://example.com/web/registration, you would provide the path /web/registration. Registration page paths that start with the path that you provide are considered a match. For example /web/registration matches the registration paths /web/registration, /web/registration/, /web/registrationPage, and /web/registration/thisPage, but doesn't match the path /home/web/registration or /website/registration.
        RequestInspection:
          $ref: "#/components/schemas/RequestInspectionACFP"
          description: The criteria for inspecting account creation requests, used by the ACFP rule group to validate and track account creation attempts.
        ResponseInspection:
          $ref: "#/components/schemas/ResponseInspection"
          description: The criteria for inspecting responses to account creation requests, used by the ACFP rule group to track account creation success rates. Response inspection is available only in web ACLs that protect Amazon CloudFront distributions. The ACFP rule group evaluates the responses that your protected resources send back to client account creation attempts, keeping count of successful and failed attempts from each IP address and client session. Using this information, the rule group labels and mitigates requests from client sessions and IP addresses that have had too many successful account creation attempts in a short amount of time.
        EnableRegexInPath:
          $ref: "#/components/schemas/Boolean"
          description: Allow the use of regular expressions in the registration page path and the account creation path.
      required:
        - CreationPath
        - RegistrationPagePath
        - RequestInspection
    CreationPathString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    RegistrationPagePathString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    RequestInspectionACFP:
      description: The criteria for inspecting account creation requests, used by the ACFP rule group to validate and track account creation attempts. This is part of the AWSManagedRulesACFPRuleSet configuration in ManagedRuleGroupConfig. In these settings, you specify how your application accepts account creation attempts by providing the request payload type and the names of the fields within the request body where the username, password, email, and primary address and phone number fields are provided.
      type: object
      properties:
        PayloadType:
          $ref: "#/components/schemas/PayloadType"
          description: The payload type for your account creation endpoint, either JSON or form encoded.
        UsernameField:
          $ref: "#/components/schemas/UsernameField"
          description: "The name of the field in the request payload that contains your customer's username. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"username\": \"THE_USERNAME\" } }, the username field specification is /form/username. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named username1, the username field specification is username1"
        PasswordField:
          $ref: "#/components/schemas/PasswordField"
          description: "The name of the field in the request payload that contains your customer's password. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"password\": \"THE_PASSWORD\" } }, the password field specification is /form/password. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named password1, the password field specification is password1."
        EmailField:
          $ref: "#/components/schemas/EmailField"
          description: "The name of the field in the request payload that contains your customer's email. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"email\": \"THE_EMAIL\" } }, the email field specification is /form/email. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named email1, the email field specification is email1."
        PhoneNumberFields:
          $ref: "#/components/schemas/PhoneNumberFields"
          description: "The names of the fields in the request payload that contain your customer's primary phone number. Order the phone number fields in the array exactly as they are ordered in the request payload. How you specify the phone number fields depends on the request inspection payload type. For JSON payloads, specify the field identifiers in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"primaryphoneline1\": \"THE_PHONE1\", \"primaryphoneline2\": \"THE_PHONE2\", \"primaryphoneline3\": \"THE_PHONE3\" } }, the phone number field identifiers are /form/primaryphoneline1, /form/primaryphoneline2, and /form/primaryphoneline3. For form encoded payload types, use the HTML form names. For example, for an HTML form with input elements named primaryphoneline1, primaryphoneline2, and primaryphoneline3, the phone number field identifiers are primaryphoneline1, primaryphoneline2, and primaryphoneline3."
        AddressFields:
          $ref: "#/components/schemas/AddressFields"
          description: "The names of the fields in the request payload that contain your customer's primary physical address. Order the address fields in the array exactly as they are ordered in the request payload. How you specify the address fields depends on the request inspection payload type. For JSON payloads, specify the field identifiers in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { \"form\": { \"primaryaddressline1\": \"THE_ADDRESS1\", \"primaryaddressline2\": \"THE_ADDRESS2\", \"primaryaddressline3\": \"THE_ADDRESS3\" } }, the address field idenfiers are /form/primaryaddressline1, /form/primaryaddressline2, and /form/primaryaddressline3. For form encoded payload types, use the HTML form names. For example, for an HTML form with input elements named primaryaddressline1, primaryaddressline2, and primaryaddressline3, the address fields identifiers are primaryaddressline1, primaryaddressline2, and primaryaddressline3."
      required:
        - PayloadType
    EmailField:
      description: The name of the field in the request payload that contains your customer's email. This data type is used in the RequestInspectionACFP data type.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FieldIdentifier"
          description: 'The name of the email field. How you specify this depends on the request inspection payload type. For JSON payloads, specify the field name in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { "form": { "email": "THE_EMAIL" } }, the email field specification is /form/email. For form encoded payload types, use the HTML form names. For example, for an HTML form with the input element named email1, the email field specification is email1.'
      required:
        - Identifier
    PhoneNumberFields:
      type: array
      items:
        $ref: "#/components/schemas/PhoneNumberField"
    PhoneNumberField:
      description: The name of a field in the request payload that contains part or all of your customer's primary phone number. This data type is used in the RequestInspectionACFP data type.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FieldIdentifier"
          description: 'The name of a single primary phone number field. How you specify the phone number fields depends on the request inspection payload type. For JSON payloads, specify the field identifiers in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { "form": { "primaryphoneline1": "THE_PHONE1", "primaryphoneline2": "THE_PHONE2", "primaryphoneline3": "THE_PHONE3" } }, the phone number field identifiers are /form/primaryphoneline1, /form/primaryphoneline2, and /form/primaryphoneline3. For form encoded payload types, use the HTML form names. For example, for an HTML form with input elements named primaryphoneline1, primaryphoneline2, and primaryphoneline3, the phone number field identifiers are primaryphoneline1, primaryphoneline2, and primaryphoneline3.'
      required:
        - Identifier
    AddressFields:
      type: array
      items:
        $ref: "#/components/schemas/AddressField"
    AddressField:
      description: The name of a field in the request payload that contains part or all of your customer's primary physical address. This data type is used in the RequestInspectionACFP data type.
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/FieldIdentifier"
          description: 'The name of a single primary address field. How you specify the address fields depends on the request inspection payload type. For JSON payloads, specify the field identifiers in JSON pointer syntax. For information about the JSON Pointer syntax, see the Internet Engineering Task Force (IETF) documentation JavaScript Object Notation (JSON) Pointer. For example, for the JSON payload { "form": { "primaryaddressline1": "THE_ADDRESS1", "primaryaddressline2": "THE_ADDRESS2", "primaryaddressline3": "THE_ADDRESS3" } }, the address field idenfiers are /form/primaryaddressline1, /form/primaryaddressline2, and /form/primaryaddressline3. For form encoded payload types, use the HTML form names. For example, for an HTML form with input elements named primaryaddressline1, primaryaddressline2, and primaryaddressline3, the address fields identifiers are primaryaddressline1, primaryaddressline2, and primaryaddressline3.'
      required:
        - Identifier
    AWSManagedRulesAntiDDoSRuleSet:
      description: Configures the use of the anti-DDoS managed rule group, AWSManagedRulesAntiDDoSRuleSet. This configuration is used in ManagedRuleGroupConfig. The configuration that you provide here determines whether and how the rules in the rule group are used. For additional information about this and the other intelligent threat mitigation rule groups, see Intelligent threat mitigation in WAF and Amazon Web Services Managed Rules rule groups list in the WAF Developer Guide.
      type: object
      properties:
        ClientSideActionConfig:
          $ref: "#/components/schemas/ClientSideActionConfig"
          description: Configures the request handling that's applied by the managed rule group rules ChallengeAllDuringEvent and ChallengeDDoSRequests during a distributed denial of service (DDoS) attack.
        SensitivityToBlock:
          $ref: "#/components/schemas/SensitivityToAct"
          description: "The sensitivity that the rule group rule DDoSRequests uses when matching against the DDoS suspicion labeling on a request. The managed rule group adds the labeling during DDoS events, before the DDoSRequests rule runs. The higher the sensitivity, the more levels of labeling that the rule matches: Low sensitivity is less sensitive, causing the rule to match only on the most likely participants in an attack, which are the requests with the high suspicion label awswaf:managed:aws:anti-ddos:high-suspicion-ddos-request. Medium sensitivity causes the rule to match on the medium and high suspicion labels. High sensitivity causes the rule to match on all of the suspicion labels: low, medium, and high. Default: LOW"
      required:
        - ClientSideActionConfig
    ClientSideActionConfig:
      description: This is part of the configuration for the managed rules AWSManagedRulesAntiDDoSRuleSet in ManagedRuleGroupConfig.
      type: object
      properties:
        Challenge:
          $ref: "#/components/schemas/ClientSideAction"
          description: Configuration for the use of the AWSManagedRulesAntiDDoSRuleSet rules ChallengeAllDuringEvent and ChallengeDDoSRequests. This setting isn't related to the configuration of the Challenge action itself. It only configures the use of the two anti-DDoS rules named here. You can enable or disable the use of these rules, and you can configure how to use them when they are enabled.
      required:
        - Challenge
    ClientSideAction:
      description: This is part of the AWSManagedRulesAntiDDoSRuleSet ClientSideActionConfig configuration in ManagedRuleGroupConfig.
      type: object
      properties:
        UsageOfAction:
          $ref: "#/components/schemas/UsageOfAction"
          description: "Determines whether to use the AWSManagedRulesAntiDDoSRuleSet rules ChallengeAllDuringEvent and ChallengeDDoSRequests in the rule group evaluation and the related label awswaf:managed:aws:anti-ddos:challengeable-request. If usage is enabled: The managed rule group adds the label awswaf:managed:aws:anti-ddos:challengeable-request to any web request whose URL does NOT match the regular expressions provided in the ClientSideAction setting ExemptUriRegularExpressions. The two rules are evaluated against web requests for protected resources that are experiencing a DDoS attack. The two rules only apply their action to matching requests that have the label awswaf:managed:aws:anti-ddos:challengeable-request. If usage is disabled: The managed rule group doesn't add the label awswaf:managed:aws:anti-ddos:challengeable-request to any web requests. The two rules are not evaluated. None of the other ClientSideAction settings have any effect. This setting only enables or disables the use of the two anti-DDOS rules ChallengeAllDuringEvent and ChallengeDDoSRequests in the anti-DDoS managed rule group. This setting doesn't alter the action setting in the two rules. To override the actions used by the rules ChallengeAllDuringEvent and ChallengeDDoSRequests, enable this setting, and then override the rule actions in the usual way, in your managed rule group configuration."
        Sensitivity:
          $ref: "#/components/schemas/SensitivityToAct"
          description: "The sensitivity that the rule group rule ChallengeDDoSRequests uses when matching against the DDoS suspicion labeling on a request. The managed rule group adds the labeling during DDoS events, before the ChallengeDDoSRequests rule runs. The higher the sensitivity, the more levels of labeling that the rule matches: Low sensitivity is less sensitive, causing the rule to match only on the most likely participants in an attack, which are the requests with the high suspicion label awswaf:managed:aws:anti-ddos:high-suspicion-ddos-request. Medium sensitivity causes the rule to match on the medium and high suspicion labels. High sensitivity causes the rule to match on all of the suspicion labels: low, medium, and high. Default: HIGH"
        ExemptUriRegularExpressions:
          $ref: "#/components/schemas/RegularExpressionList"
          description: "The regular expression to match against the web request URI, used to identify requests that can't handle a silent browser challenge. When the ClientSideAction setting UsageOfAction is enabled, the managed rule group uses this setting to determine which requests to label with awswaf:managed:aws:anti-ddos:challengeable-request. If UsageOfAction is disabled, this setting has no effect and the managed rule group doesn't add the label to any requests. The anti-DDoS managed rule group doesn't evaluate the rules ChallengeDDoSRequests or ChallengeAllDuringEvent for web requests whose URIs match this regex. This is true regardless of whether you override the rule action for either of the rules in your web ACL configuration. Amazon Web Services recommends using a regular expression. This setting is required if UsageOfAction is set to ENABLED. If required, you can provide between 1 and 5 regex objects in the array of settings. Amazon Web Services recommends starting with the following setting. Review and update it for your application's needs: \\/api\\/|\\.(acc|avi|css|gif|jpe?g|js|mp[34]|ogg|otf|pdf|png|tiff?|ttf|webm|webp|woff2?)$"
      required:
        - UsageOfAction
    UsageOfAction:
      type: string
      enum:
        - ENABLED
        - DISABLED
    SensitivityToAct:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    RegularExpressionList:
      type: array
      items:
        $ref: "#/components/schemas/Regex"
    Regex:
      description: A single regular expression. This is used in a RegexPatternSet and also in the configuration for the Amazon Web Services Managed Rules rule group AWSManagedRulesAntiDDoSRuleSet.
      type: object
      properties:
        RegexString:
          $ref: "#/components/schemas/RegexPatternString"
          description: The string representing the regular expression.
    RegexPatternString:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*
    LabelMatchStatement:
      description: A rule statement to match against labels that have been added to the web request by rules that have already run in the web ACL. The label match statement provides the label or namespace string to search for. The label string can represent a part or all of the fully qualified label name that had been added to the web request. Fully qualified labels have a prefix, optional namespaces, and label name. The prefix identifies the rule group or web ACL context of the rule that added the label. If you do not provide the fully qualified name in your label match string, WAF performs the search for labels that were added in the same context as the label match statement.
      type: object
      properties:
        Scope:
          $ref: "#/components/schemas/LabelMatchScope"
          description: Specify whether you want to match using the label name or just the namespace.
        Key:
          $ref: "#/components/schemas/LabelMatchKey"
          description: "The string to match against. The setting you provide for this depends on the match statement's Scope setting: If the Scope indicates LABEL, then this specification must include the name and can include any number of preceding namespace specifications and prefix up to providing the fully qualified label name. If the Scope indicates NAMESPACE, then this specification can include any number of contiguous namespace strings, and can include the entire label namespace prefix from the rule group or web ACL where the label originates. Labels are case sensitive and components of a label must be separated by colon, for example NS1:NS2:name."
      required:
        - Scope
        - Key
    LabelMatchScope:
      type: string
      enum:
        - LABEL
        - NAMESPACE
    LabelMatchKey:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[0-9A-Za-z_\-:]+$
    RegexMatchStatement:
      description: A rule statement used to search web request components for a match against a single regular expression.
      type: object
      properties:
        RegexString:
          $ref: "#/components/schemas/RegexPatternString"
          description: The string representing the regular expression.
        FieldToMatch:
          $ref: "#/components/schemas/FieldToMatch"
          description: The part of the web request that you want WAF to inspect.
        TextTransformations:
          $ref: "#/components/schemas/TextTransformations"
          description: Text transformations eliminate some of the unusual formatting that attackers use in web requests in an effort to bypass detection. Text transformations are used in rule match statements, to transform the FieldToMatch request component before inspecting it, and they're used in rate-based rule statements, to transform request components before using them as custom aggregation keys. If you specify one or more transformations to apply, WAF performs all transformations on the specified content, starting from the lowest priority setting, and then uses the transformed component contents.
      required:
        - RegexString
        - FieldToMatch
        - TextTransformations
    AsnMatchStatement:
      description: A rule statement that inspects web traffic based on the Autonomous System Number (ASN) associated with the request's IP address. For additional details, see ASN match rule statement in the WAF Developer Guide.
      type: object
      properties:
        AsnList:
          $ref: "#/components/schemas/AsnList"
          description: Contains one or more Autonomous System Numbers (ASNs). ASNs are unique identifiers assigned to large internet networks managed by organizations such as internet service providers, enterprises, universities, or government agencies.
        ForwardedIPConfig:
          $ref: "#/components/schemas/ForwardedIPConfig"
          description: The configuration for inspecting IP addresses to match against an ASN in an HTTP header that you specify, instead of using the IP address that's reported by the web request origin. Commonly, this is the X-Forwarded-For (XFF) header, but you can specify any header name.
      required:
        - AsnList
    AsnList:
      type: array
      items:
        $ref: "#/components/schemas/ASN"
    ASN:
      type: integer
      format: int64
      minimum: 0
      maximum: 4294967295
    OverrideAction:
      description: The action to use in the place of the action that results from the rule group evaluation. Set the override action to none to leave the result of the rule group alone. Set it to count to override the result to count only. You can only use this for rule statements that reference a rule group, like RuleGroupReferenceStatement and ManagedRuleGroupStatement. This option is usually set to none. It does not affect how the rules in the rule group are evaluated. If you want the rules in the rule group to only count matches, do not use this and instead use the rule action override option, with Count action, in your rule group reference statement settings.
      type: object
      properties:
        Count:
          $ref: "#/components/schemas/CountAction"
          description: Override the rule group evaluation result to count only. This option is usually set to none. It does not affect how the rules in the rule group are evaluated. If you want the rules in the rule group to only count matches, do not use this and instead use the rule action override option, with Count action, in your rule group reference statement settings.
        None:
          $ref: "#/components/schemas/NoneAction"
          description: Don't override the rule group evaluation result. This is the most common setting.
    NoneAction:
      description: 'Specifies that WAF should do nothing. This is used for the OverrideAction setting on a Rule when the rule uses a rule group reference statement. This is used in the context of other settings, for example to specify values for RuleAction and web ACL DefaultAction. JSON specification: "None": {}'
      type: object
    Labels:
      type: array
      items:
        $ref: "#/components/schemas/Label"
    Label:
      description: A single label container. This is used as an element of a label array in multiple contexts, for example, in RuleLabels inside a Rule and in Labels inside a SampledHTTPRequest.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/LabelName"
          description: The label string.
      required:
        - Name
    LabelName:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[0-9A-Za-z_\-:]+$
    VisibilityConfig:
      description: Defines and enables Amazon CloudWatch metrics and web request sample collection.
      type: object
      properties:
        SampledRequestsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether WAF should store a sampling of the web requests that match the rules. You can view the sampled requests through the WAF console. If you configure data protection for the web ACL, the protection applies to the web ACL's sampled web request data. Request sampling doesn't provide a field redaction option, and any field redaction that you specify in your logging configuration doesn't affect sampling. You can only exclude fields from request sampling by disabling sampling in the web ACL visibility configuration or by configuring data protection for the web ACL.
        CloudWatchMetricsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the associated resource sends metrics to Amazon CloudWatch. For the list of available metrics, see WAF Metrics in the WAF Developer Guide. For web ACLs, the metrics are for web requests that have the web ACL default action applied. WAF applies the default action to web requests that pass the inspection of all rules in the web ACL without being either allowed or blocked. For more information, see The web ACL default action in the WAF Developer Guide.
        MetricName:
          $ref: "#/components/schemas/MetricName"
          description: "A name of the Amazon CloudWatch metric dimension. The name can contain only the characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore). The name can be from one to 128 characters long. It can't contain whitespace or metric names that are reserved for WAF, for example All and Default_Action."
      required:
        - SampledRequestsEnabled
        - CloudWatchMetricsEnabled
        - MetricName
    MetricName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[\w#:\.\-/]+$
    CaptchaConfig:
      description: Specifies how WAF should handle CAPTCHA evaluations. This is available at the web ACL level and in each rule.
      type: object
      properties:
        ImmunityTimeProperty:
          $ref: "#/components/schemas/ImmunityTimeProperty"
          description: Determines how long a CAPTCHA timestamp in the token remains valid after the client successfully solves a CAPTCHA puzzle.
    ImmunityTimeProperty:
      description: Used for CAPTCHA and challenge token settings. Determines how long a CAPTCHA or challenge timestamp remains valid after WAF updates it for a successful CAPTCHA or challenge response.
      type: object
      properties:
        ImmunityTime:
          $ref: "#/components/schemas/TimeWindowSecond"
          description: The amount of time, in seconds, that a CAPTCHA or challenge timestamp is considered valid by WAF. The default setting is 300. For the Challenge action, the minimum setting is 300.
      required:
        - ImmunityTime
    TimeWindowSecond:
      type: integer
      format: int64
      minimum: 60
      maximum: 259200
    ChallengeConfig:
      description: Specifies how WAF should handle Challenge evaluations. This is available at the web ACL level and in each rule.
      type: object
      properties:
        ImmunityTimeProperty:
          $ref: "#/components/schemas/ImmunityTimeProperty"
          description: Determines how long a challenge timestamp in the token remains valid after the client successfully responds to a challenge.
    CheckCapacityResponse:
      type: object
      properties:
        Capacity:
          $ref: "#/components/schemas/ConsumedCapacity"
          description: The capacity required by the rules and scope.
    ConsumedCapacity:
      type: integer
      format: int64
      minimum: 0
    APIKeyTokenDomains:
      type: array
      items:
        $ref: "#/components/schemas/TokenDomain"
    TokenDomain:
      type: string
      minLength: 1
      maxLength: 253
      pattern: ^[\w\.\-/]+$
    CreateAPIKeyResponse:
      type: object
      properties:
        APIKey:
          $ref: "#/components/schemas/APIKey"
          description: The generated, encrypted API key. You can copy this for use in your JavaScript CAPTCHA integration.
    APIKey:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*\S.*
    EntityDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[\w+=:#@/\-,\.][\w+=:#@/\-,\.\s]+[\w+=:#@/\-,\.]$
    IPAddressVersion:
      type: string
      enum:
        - IPV4
        - IPV6
    IPAddresses:
      type: array
      items:
        $ref: "#/components/schemas/IPAddress"
    IPAddress:
      type: string
      minLength: 1
      maxLength: 50
      pattern: .*\S.*
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A tag associated with an Amazon Web Services resource. Tags are key:value pairs that you can use to categorize and manage your resources, for purposes like billing or other management. Typically, the tag key represents a category, such as \"environment\", and the tag value represents a specific value within that category, such as \"test,\" \"development,\" or \"production\". Or you might set the tag key to \"customer\" and the value to the customer name or ID. You can specify one or more tags to add to each Amazon Web Services resource, up to 50 tags for a resource. You can tag the Amazon Web Services resources that you manage through WAF: web ACLs, rule groups, IP sets, and regex pattern sets. You can't manage or view tags through the WAF console."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Part of the key:value pair that defines a tag. You can use a tag key to describe a category of information, such as "customer." Tag keys are case-sensitive.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: Part of the key:value pair that defines a tag. You can use a tag value to describe a specific value within a category, such as "companyA" or "companyB." Tag values are case-sensitive.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    CreateIPSetResponse:
      type: object
      properties:
        Summary:
          $ref: "#/components/schemas/IPSetSummary"
          description: High-level information about an IPSet, returned by operations like create and list. This provides information like the ID, that you can use to retrieve and manage an IPSet, and the ARN, that you provide to the IPSetReferenceStatement to use the address set in a Rule.
    IPSetSummary:
      description: High-level information about an IPSet, returned by operations like create and list. This provides information like the ID, that you can use to retrieve and manage an IPSet, and the ARN, that you provide to the IPSetReferenceStatement to use the address set in a Rule.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the IP set. You cannot change the name of an IPSet after you create it.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the set. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the IP set that helps with identification.
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
    EntityId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: ^[0-9a-f]{8}-(?:[0-9a-f]{4}-){3}[0-9a-f]{12}$
    LockToken:
      type: string
      minLength: 1
      maxLength: 36
      pattern: ^[0-9a-f]{8}-(?:[0-9a-f]{4}-){3}[0-9a-f]{12}$
    CreateRegexPatternSetResponse:
      type: object
      properties:
        Summary:
          $ref: "#/components/schemas/RegexPatternSetSummary"
          description: High-level information about a RegexPatternSet, returned by operations like create and list. This provides information like the ID, that you can use to retrieve and manage a RegexPatternSet, and the ARN, that you provide to the RegexPatternSetReferenceStatement to use the pattern set in a Rule.
    RegexPatternSetSummary:
      description: High-level information about a RegexPatternSet, returned by operations like create and list. This provides information like the ID, that you can use to retrieve and manage a RegexPatternSet, and the ARN, that you provide to the RegexPatternSetReferenceStatement to use the pattern set in a Rule.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the data type instance. You cannot change the name after you create the instance.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the set. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the set that helps with identification.
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
    CapacityUnit:
      type: integer
      format: int64
      minimum: 1
    CustomResponseBodies:
      type: object
      properties: {}
    CreateRuleGroupResponse:
      type: object
      properties:
        Summary:
          $ref: "#/components/schemas/RuleGroupSummary"
          description: High-level information about a RuleGroup, returned by operations like create and list. This provides information like the ID, that you can use to retrieve and manage a RuleGroup, and the ARN, that you provide to the RuleGroupReferenceStatement to use the rule group in a Rule.
    RuleGroupSummary:
      description: High-level information about a RuleGroup, returned by operations like create and list. This provides information like the ID, that you can use to retrieve and manage a RuleGroup, and the ARN, that you provide to the RuleGroupReferenceStatement to use the rule group in a Rule.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the data type instance. You cannot change the name after you create the instance.
        Id:
          $ref: "#/components/schemas/EntityId"
          description: A unique identifier for the rule group. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        Description:
          $ref: "#/components/schemas/EntityDescription"
          description: A description of the rule group that helps with identification.
        LockToken:
          $ref: "#/components/schemas/LockToken"
          description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
        ARN:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the entity.
    DefaultAction:
      description: In a WebACL, this is the action that you want WAF to perform when a web request doesn't match any of the rules in the WebACL. The default action must be a terminating action.
      type: object
      properties:
        Block:
          $ref: "#/components/schemas/BlockAction"
          description: Specifies that WAF should block requests by default.
        Allow:
          $ref: "#/components/schemas/AllowAction"
          description: Specifies that WAF should allow requests by default.
    DataProtectionConfig:
      description: Specifies data protection to apply to the web request data for the web ACL. This is a web ACL level data protection option. The data protection that you configure for the web ACL alters the data that's available for any other data collection activity, including your WAF logging destinations, web ACL request sampling, and Amazon Security Lake data collection and management. Your other option for data protection is in the logging configuration, which only affects logging. This is part of the data protection configuration for a web ACL.
      type: object
      properties:
        DataProtections:
          $ref: "#/components/schemas/DataProtections"
          description: An array of data protection configurations for specific web request field types. This is defined for each web ACL. WAF applies the specified protection to all web requests that the web ACL inspects.
      required:
        - DataProtections
    DataProtections:
      type: array
      items:
        $ref: "#/components/schemas/DataProtection"
    DataProtection:
      description: Specifies the protection behavior for a field type. This is part of the data protection configuration for a web ACL.
      type: object
      properties:
        Field:
          $ref: "#/components/schemas/FieldToProtect"
          description: Specifies the field type and optional keys to apply the protection behavior to.
        Action:
          $ref: "#/components/schemas/DataProtectionAction"
          description: "Specifies how to protect the field. WAF can apply a one-way hash to the field or hard code a string substitution. One-way hash example: ade099751dEXAMPLEHASH2ea9f3393f80dd5d3bEXAMPLEHASH966ae0d3cd5a1e Substitution example: REDACTED"
        ExcludeRuleMatchDetails:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether to also exclude any rule match details from the data protection you have enabled for a given field. WAF logs these details for non-terminating matching rules and for the terminating matching rule. For additional information, see Log fields for web ACL traffic in the WAF Developer Guide. Default: FALSE"
        ExcludeRateBasedDetails:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether to also exclude any rate-based rule details from the data protection you have enabled for a given field. If you specify this exception, RateBasedDetails will show the value of the field. For additional information, see the log field rateBasedRuleList at Log fields for web ACL traffic in the WAF Developer Guide. Default: FALSE"
      required:
        - Field
        - Action
    FieldToProtect:
      description: Specifies a field type and keys to protect in stored web request data. This is part of the data protection configuration for a web ACL.
      type: object
      properties:
        FieldType:
          $ref: "#/components/schemas/FieldToProtectType"
          description: Specifies the web request component type to protect.
        FieldKeys:
          $ref: "#/components/schemas/FieldToProtectKeys"
          description: Specifies the keys to protect for the specified field type. If you don't specify any key, then all keys for the field type are protected.
      required:
        - FieldType
    FieldToProtectType:
      type: string
      enum:
        - SINGLE_HEADER
        - SINGLE_COOKIE
        - SINGLE_QUERY_ARGUMENT
        - QUERY_STRING
        - BODY
    FieldToProtectKeys:
      type: array
      items:
        $ref: "#/components/schemas/FieldToProtectKeyName"
    FieldToProtectKeyName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*\S.*
    DataProtectionAction:
      type: string
      enum:
        - SUBSTITUTION
        - HASH
    TokenDomains:
      type: array
      items:
        $ref: "#/components/schemas/TokenDomain"
    AssociationConfig:
      description: Specifies custom configurations for the associations between the web ACL and protected resources. Use this to customize the maximum size of the request body that your protected resources forward to WAF for inspection. You can customize this setting for CloudFront, API Gateway, Amazon Cognito, App Runner, or Verified Access resources. The default setting is 16 KB (16,384 bytes). You are charged additional fees when your protected resources forward body sizes that are larger than the default. For more information, see WAF Pricing. For Application Load Balancer and AppSync, the limit is fixed at 8 KB (8,192 bytes).
      type: object
      properties:
        RequestBody:
          type: object
          properties: {}
          description: 'Customizes the maximum size of the request body that your protected CloudFront, API Gateway, Amazon Cognito, App Runner, and Verified Access resources forward to WAF for inspection. The default size is 16 KB (16,384 bytes). You can change the setting for any of the available resource types. You are charged additional fees when your protected resources forward body sizes that are larger than the default. For more information, see WAF Pricing. Example JSON: { "API_GATEWAY": "KB_48", "APP_RUNNER_SERVICE": "KB_32" } For Application Load Balancer and AppSync, the limit is fixed at 8 KB (8,192 bytes).'
    OnSourceDDoSProtectionConfig:
      description: Configures the level of DDoS protection that applies to web ACLs associated with Application Load Balancers.
      type: object
      properties:
        ALBLowReputationMode:
          $ref: "#/components/schemas/LowReputationMode"
          description: The level of DDoS protection that applies to web ACLs associated with Application Load Balancers. ACTIVE_UNDER_DDOS protection is enabled by default whenever a web ACL is associated with an Application Load Balancer. In the event that an Application Load Balancer experiences high-load conditions or suspected DDoS attacks, the ACTIVE_UNDER_DDOS protection automatically rate limits traffic from known low reputation sources without disrupting Application Load Balancer availability. ALWAYS_ON protection provides constant, always-on monitoring of known low reputation sources for suspected DDoS attacks. While this provides a higher level of protection, there may be potential impacts on legitimate traffic.
      required:
        - ALBLowReputationMode
    LowReputationMode:
      type: string
      enum:
        - ACTIVE_UNDER_DDOS
        - ALWAYS_ON
    ApplicationConfig:
      description: A list of ApplicationAttributes that contains information about the application.
      type: object
      properties:
        Attributes:
          $ref: "#/components/schemas/ApplicationAttributes"
          description: Contains the attribute name and a list of values for that attribute.
    ApplicationAttributes:
      type: array
      items:
        $ref: "#/components/schemas/ApplicationAttribute"
    ApplicationAttribute:
      description: Application details defined during the web ACL creation process. Application attributes help WAF give recommendations for protection packs.
