    ManagedProductDescriptor:
      description: The properties of a managed product, such as an Amazon Web Services Managed Rules rule group or an Amazon Web Services Marketplace managed rule group.
      type: object
      properties:
        VendorName:
          $ref: "#/components/schemas/VendorName"
