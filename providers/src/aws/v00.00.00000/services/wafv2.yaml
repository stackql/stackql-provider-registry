openapi: 3.0.0
info:
  version: "2019-07-29"
  title: AWS WAFV2
  description: AWS WAFV2
  x-serviceName: wafv2
  x-serviceAlias: wafv2
  x-protocol: json
  x-apiVersion: "2019-07-29"
  x-endpointPrefix: wafv2
  x-targetPrefix: AWSWAF_20190729
  x-jsonVersion: "1.1"
servers:
  - url: https://wafv2.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for wafv2
paths:
  /AssociateWebACL:
    post:
      operationId: AssociateWebACL
      description: "Associates a web ACL with a resource, to protect the resource. Use this for all resource types except for Amazon CloudFront distributions. For Amazon CloudFront, call UpdateDistribution for the distribution and provide the Amazon Resource Name (ARN) of the web ACL in the web ACL ID. For information, see UpdateDistribution in the Amazon CloudFront Developer Guide. Required permissions for customer-managed IAM policies This call requires permissions that are specific to the protected resource type. For details, see Permissions for AssociateWebACL in the WAF Developer Guide. Temporary inconsistencies during updates When you create or change a web ACL or other WAF resources, the changes take a small amount of time to propagate to all areas where the resources are stored. The propagation time can be from a few seconds to a number of minutes. The following are examples of the temporary inconsistencies that you might notice during change propagation: After you create a web ACL, if you try to associate it with a resource, you might get an exception indicating that the web ACL is unavailable. After you add a rule group to a web ACL, the new rule group rules might be in effect in one area where the web ACL is used and not in another. After you change a rule action setting, you might see the old action in some places and the new action in others. After you add an IP address to an IP set that is in use in a blocking rule, the new address might be blocked in one area while still allowed in another."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.AssociateWebACL
            default: AWSWAF_20190729.AssociateWebACL
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WebACLArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the web ACL that you want to associate with the resource.
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: "The Amazon Resource Name (ARN) of the resource to associate with the web ACL. The ARN must be in one of the following formats: For an Application Load Balancer: arn:partition:elasticloadbalancing:region:account-id:loadbalancer/app/load-balancer-name/load-balancer-id For an Amazon API Gateway REST API: arn:partition:apigateway:region::/restapis/api-id/stages/stage-name For an AppSync GraphQL API: arn:partition:appsync:region:account-id:apis/GraphQLApiId For an Amazon Cognito user pool: arn:partition:cognito-idp:region:account-id:userpool/user-pool-id For an App Runner service: arn:partition:apprunner:region:account-id:service/apprunner-service-name/apprunner-service-id For an Amazon Web Services Verified Access instance: arn:partition:ec2:region:account-id:verified-access-instance/instance-id For an Amplify application: arn:partition:amplify:region:account-id:apps/app-id"
              required:
                - WebACLArn
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWebACLResponse"
  /CheckCapacity:
    post:
      operationId: CheckCapacity
      description: Returns the web ACL capacity unit (WCU) requirements for a specified scope and set of rules. You can use this to check the capacity requirements for the rules you want to use in a RuleGroup or WebACL. WAF uses WCUs to calculate and control the operating resources that are used to run your rules, rule groups, and web ACLs. WAF calculates capacity differently for each rule type, to reflect the relative cost of each rule. Simple rules that cost little to run use fewer WCUs than more complex rules that use more processing power. Rule group capacity is fixed at creation, which helps users plan their web ACL WCU usage when they use a rule group. For more information, see WAF web ACL capacity units (WCU) in the WAF Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.CheckCapacity
            default: AWSWAF_20190729.CheckCapacity
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                Rules:
                  $ref: "#/components/schemas/Rules"
                  description: An array of Rule that you're configuring to use in a rule group or web ACL.
              required:
                - Scope
                - Rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckCapacityResponse"
  /CreateAPIKey:
    post:
      operationId: CreateAPIKey
      description: Creates an API key that contains a set of token domains. API keys are required for the integration of the CAPTCHA API in your JavaScript client applications. The API lets you customize the placement and characteristics of the CAPTCHA puzzle for your end users. For more information about the CAPTCHA JavaScript integration, see WAF client application integration in the WAF Developer Guide. You can use a single key for up to 5 domains. After you generate a key, you can copy it for use in your JavaScript integration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.CreateAPIKey
            default: AWSWAF_20190729.CreateAPIKey
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                TokenDomains:
                  $ref: "#/components/schemas/APIKeyTokenDomains"
                  description: "The client application domains that you want to use this API key for. Example JSON: \"TokenDomains\": [\"abc.com\", \"store.abc.com\"] Public suffixes aren't allowed. For example, you can't use gov.au or co.uk as token domains."
              required:
                - Scope
                - TokenDomains
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
  /CreateIPSet:
    post:
      operationId: CreateIPSet
      description: Creates an IPSet, which you use to identify web requests that originate from specific IP addresses or ranges of IP addresses. For example, if you're receiving a lot of requests from a ranges of IP addresses, you can configure WAF to block them using an IPSet that lists those IP addresses.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.CreateIPSet
            default: AWSWAF_20190729.CreateIPSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the IP set. You cannot change the name of an IPSet after you create it.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                Description:
                  $ref: "#/components/schemas/EntityDescription"
                  description: A description of the IP set that helps with identification.
                IPAddressVersion:
                  $ref: "#/components/schemas/IPAddressVersion"
                  description: The version of the IP addresses, either IPV4 or IPV6.
                Addresses:
                  $ref: "#/components/schemas/IPAddresses"
                  description: 'Contains an array of strings that specifies zero or more IP addresses or blocks of IP addresses that you want WAF to inspect for in incoming requests. All addresses must be specified using Classless Inter-Domain Routing (CIDR) notation. WAF supports all IPv4 and IPv6 CIDR ranges except for /0. Example address strings: For requests that originated from the IP address 192.0.2.44, specify 192.0.2.44/32. For requests that originated from IP addresses from 192.0.2.0 to 192.0.2.255, specify 192.0.2.0/24. For requests that originated from the IP address 1111:0000:0000:0000:0000:0000:0000:0111, specify 1111:0000:0000:0000:0000:0000:0000:0111/128. For requests that originated from IP addresses 1111:0000:0000:0000:0000:0000:0000:0000 to 1111:0000:0000:0000:ffff:ffff:ffff:ffff, specify 1111:0000:0000:0000:0000:0000:0000:0000/64. For more information about CIDR notation, see the Wikipedia entry Classless Inter-Domain Routing. Example JSON Addresses specifications: Empty array: "Addresses": [] Array with one address: "Addresses": ["192.0.2.44/32"] Array with three addresses: "Addresses": ["192.0.2.44/32", "192.0.2.0/24", "192.0.0.0/16"] INVALID specification: "Addresses": [""] INVALID'
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key:value pairs to associate with the resource.
              required:
                - Name
                - Scope
                - IPAddressVersion
                - Addresses
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIPSetResponse"
  /CreateRegexPatternSet:
    post:
      operationId: CreateRegexPatternSet
      description: Creates a RegexPatternSet, which you reference in a RegexPatternSetReferenceStatement, to have WAF inspect a web request component for the specified patterns.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.CreateRegexPatternSet
            default: AWSWAF_20190729.CreateRegexPatternSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the set. You cannot change the name after you create the set.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                Description:
                  $ref: "#/components/schemas/EntityDescription"
                  description: A description of the set that helps with identification.
                RegularExpressionList:
                  $ref: "#/components/schemas/RegularExpressionList"
                  description: Array of regular expression strings.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key:value pairs to associate with the resource.
              required:
                - Name
                - Scope
                - RegularExpressionList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRegexPatternSetResponse"
  /CreateRuleGroup:
    post:
      operationId: CreateRuleGroup
      description: Creates a RuleGroup per the specifications provided. A rule group defines a collection of rules to inspect and control web requests that you can use in a WebACL. When you create a rule group, you define an immutable capacity limit. If you update a rule group, you must stay within the capacity. This allows others to reuse the rule group with confidence in its capacity requirements.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.CreateRuleGroup
            default: AWSWAF_20190729.CreateRuleGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the rule group. You cannot change the name of a rule group after you create it.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                Capacity:
                  $ref: "#/components/schemas/CapacityUnit"
                  description: The web ACL capacity units (WCUs) required for this rule group. When you create your own rule group, you define this, and you cannot change it after creation. When you add or modify the rules in a rule group, WAF enforces this limit. You can check the capacity for a set of rules using CheckCapacity. WAF uses WCUs to calculate and control the operating resources that are used to run your rules, rule groups, and web ACLs. WAF calculates capacity differently for each rule type, to reflect the relative cost of each rule. Simple rules that cost little to run use fewer WCUs than more complex rules that use more processing power. Rule group capacity is fixed at creation, which helps users plan their web ACL WCU usage when they use a rule group. For more information, see WAF web ACL capacity units (WCU) in the WAF Developer Guide.
                Description:
                  $ref: "#/components/schemas/EntityDescription"
                  description: A description of the rule group that helps with identification.
                Rules:
                  $ref: "#/components/schemas/Rules"
                  description: The Rule statements used to identify the web requests that you want to manage. Each rule includes one top-level statement that WAF uses to identify matching web requests, and parameters that govern how WAF handles them.
                VisibilityConfig:
                  $ref: "#/components/schemas/VisibilityConfig"
                  description: Defines and enables Amazon CloudWatch metrics and web request sample collection.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key:value pairs to associate with the resource.
                CustomResponseBodies:
                  $ref: "#/components/schemas/CustomResponseBodies"
                  description: A map of custom response keys and content bodies. When you create a rule with a block action, you can send a custom response to the web request. You define these for the rule group, and then use them in the rules that you define in the rule group. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide. For information about the limits on count and size for custom request and response settings, see WAF quotas in the WAF Developer Guide.
              required:
                - Name
                - Scope
                - Capacity
                - VisibilityConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRuleGroupResponse"
  /CreateWebACL:
    post:
      operationId: CreateWebACL
      description: Creates a WebACL per the specifications provided. A web ACL defines a collection of rules to use to inspect and control web requests. Each rule has a statement that defines what to look for in web requests and an action that WAF applies to requests that match the statement. In the web ACL, you assign a default action to take (allow, block) for any request that does not match any of the rules. The rules in a web ACL can be a combination of the types Rule, RuleGroup, and managed rule group. You can associate a web ACL with one or more Amazon Web Services resources to protect. The resource types include Amazon CloudFront distribution, Amazon API Gateway REST API, Application Load Balancer, AppSync GraphQL API, Amazon Cognito user pool, App Runner service, Amplify application, and Amazon Web Services Verified Access instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.CreateWebACL
            default: AWSWAF_20190729.CreateWebACL
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the web ACL. You cannot change the name of a web ACL after you create it.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                DefaultAction:
                  $ref: "#/components/schemas/DefaultAction"
                  description: The action to perform if none of the Rules contained in the WebACL match.
                Description:
                  $ref: "#/components/schemas/EntityDescription"
                  description: A description of the web ACL that helps with identification.
                Rules:
                  $ref: "#/components/schemas/Rules"
                  description: The Rule statements used to identify the web requests that you want to manage. Each rule includes one top-level statement that WAF uses to identify matching web requests, and parameters that govern how WAF handles them.
                VisibilityConfig:
                  $ref: "#/components/schemas/VisibilityConfig"
                  description: Defines and enables Amazon CloudWatch metrics and web request sample collection.
                DataProtectionConfig:
                  $ref: "#/components/schemas/DataProtectionConfig"
                  description: Specifies data protection to apply to the web request data for the web ACL. This is a web ACL level data protection option. The data protection that you configure for the web ACL alters the data that's available for any other data collection activity, including your WAF logging destinations, web ACL request sampling, and Amazon Security Lake data collection and management. Your other option for data protection is in the logging configuration, which only affects logging.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key:value pairs to associate with the resource.
                CustomResponseBodies:
                  $ref: "#/components/schemas/CustomResponseBodies"
                  description: A map of custom response keys and content bodies. When you create a rule with a block action, you can send a custom response to the web request. You define these for the web ACL, and then use them in the rules and default actions that you define in the web ACL. For information about customizing web requests and responses, see Customizing web requests and responses in WAF in the WAF Developer Guide. For information about the limits on count and size for custom request and response settings, see WAF quotas in the WAF Developer Guide.
                CaptchaConfig:
                  $ref: "#/components/schemas/CaptchaConfig"
                  description: Specifies how WAF should handle CAPTCHA evaluations for rules that don't have their own CaptchaConfig settings. If you don't specify this, WAF uses its default settings for CaptchaConfig.
                ChallengeConfig:
                  $ref: "#/components/schemas/ChallengeConfig"
                  description: Specifies how WAF should handle challenge evaluations for rules that don't have their own ChallengeConfig settings. If you don't specify this, WAF uses its default settings for ChallengeConfig.
                TokenDomains:
                  $ref: "#/components/schemas/TokenDomains"
                  description: "Specifies the domains that WAF should accept in a web request token. This enables the use of tokens across multiple protected websites. When WAF provides a token, it uses the domain of the Amazon Web Services resource that the web ACL is protecting. If you don't specify a list of token domains, WAF accepts tokens only for the domain of the protected resource. With a token domain list, WAF accepts the resource's host domain plus all domains in the token domain list, including their prefixed subdomains. Example JSON: \"TokenDomains\": { \"mywebsite.com\", \"myotherwebsite.com\" } Public suffixes aren't allowed. For example, you can't use gov.au or co.uk as token domains."
                AssociationConfig:
                  $ref: "#/components/schemas/AssociationConfig"
                  description: Specifies custom configurations for the associations between the web ACL and protected resources. Use this to customize the maximum size of the request body that your protected resources forward to WAF for inspection. You can customize this setting for CloudFront, API Gateway, Amazon Cognito, App Runner, or Verified Access resources. The default setting is 16 KB (16,384 bytes). You are charged additional fees when your protected resources forward body sizes that are larger than the default. For more information, see WAF Pricing. For Application Load Balancer and AppSync, the limit is fixed at 8 KB (8,192 bytes).
                OnSourceDDoSProtectionConfig:
                  $ref: "#/components/schemas/OnSourceDDoSProtectionConfig"
                  description: Specifies the type of DDoS protection to apply to web request data for a web ACL. For most scenarios, it is recommended to use the default protection level, ACTIVE_UNDER_DDOS. If a web ACL is associated with multiple Application Load Balancers, the changes you make to DDoS protection in that web ACL will apply to all associated Application Load Balancers.
                ApplicationConfig:
                  $ref: "#/components/schemas/ApplicationConfig"
                  description: Configures the ability for the WAF console to store and retrieve application attributes during the web ACL creation process. Application attributes help WAF give recommendations for protection packs.
              required:
                - Name
                - Scope
                - DefaultAction
                - VisibilityConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWebACLResponse"
  /DeleteAPIKey:
    post:
      operationId: DeleteAPIKey
      description: Deletes the specified API key. After you delete a key, it can take up to 24 hours for WAF to disallow use of the key in all regions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.DeleteAPIKey
            default: AWSWAF_20190729.DeleteAPIKey
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                APIKey:
                  $ref: "#/components/schemas/APIKey"
                  description: The encrypted API key that you want to delete.
              required:
                - Scope
                - APIKey
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAPIKeyResponse"
  /DeleteFirewallManagerRuleGroups:
    post:
      operationId: DeleteFirewallManagerRuleGroups
      description: Deletes all rule groups that are managed by Firewall Manager from the specified WebACL. You can only use this if ManagedByFirewallManager and RetrofittedByFirewallManager are both false in the web ACL.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.DeleteFirewallManagerRuleGroups
            default: AWSWAF_20190729.DeleteFirewallManagerRuleGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WebACLArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the web ACL.
                WebACLLockToken:
                  $ref: "#/components/schemas/LockToken"
                  description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
              required:
                - WebACLArn
                - WebACLLockToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFirewallManagerRuleGroupsResponse"
  /DeleteIPSet:
    post:
      operationId: DeleteIPSet
      description: Deletes the specified IPSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.DeleteIPSet
            default: AWSWAF_20190729.DeleteIPSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the IP set. You cannot change the name of an IPSet after you create it.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                Id:
                  $ref: "#/components/schemas/EntityId"
                  description: A unique identifier for the set. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
                LockToken:
                  $ref: "#/components/schemas/LockToken"
                  description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
              required:
                - Name
                - Scope
                - Id
                - LockToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIPSetResponse"
  /DeleteLoggingConfiguration:
    post:
      operationId: DeleteLoggingConfiguration
      description: Deletes the LoggingConfiguration from the specified web ACL.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.DeleteLoggingConfiguration
            default: AWSWAF_20190729.DeleteLoggingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
