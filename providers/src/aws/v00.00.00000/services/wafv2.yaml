        APIKey:
          $ref: "#/components/schemas/APIKey"
          description: The generated, encrypted API key. You can copy this for use in your JavaScript CAPTCHA integration.
        CreationTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the key was created.
        Version:
