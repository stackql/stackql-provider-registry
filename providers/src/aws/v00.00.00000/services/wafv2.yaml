    DescribeManagedProductsByVendorResponse:
      type: object
      properties:
        ManagedProducts:
          $ref: "#/components/schemas/ManagedProductDescriptors"
          description: High-level information for the managed rule groups owned by the specified vendor.
    DescribeManagedRuleGroupResponse:
      type: object
      properties:
        VersionName:
          $ref: "#/components/schemas/VersionKeyString"
          description: The managed rule group's version.
        SnsTopicArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon resource name (ARN) of the Amazon Simple Notification Service SNS topic that's used to provide notification of changes to the managed rule group. You can subscribe to the SNS topic to receive notifications when the managed rule group is modified, such as for new versions and for version expiration. For more information, see the Amazon Simple Notification Service Developer Guide.
        Capacity:
          $ref: "#/components/schemas/CapacityUnit"
          description: The web ACL capacity units (WCUs) required for this rule group. WAF uses WCUs to calculate and control the operating resources that are used to run your rules, rule groups, and web ACLs. WAF calculates capacity differently for each rule type, to reflect the relative cost of each rule. Simple rules that cost little to run use fewer WCUs than more complex rules that use more processing power. Rule group capacity is fixed at creation, which helps users plan their web ACL WCU usage when they use a rule group. For more information, see WAF web ACL capacity units (WCU) in the WAF Developer Guide.
        Rules:
          $ref: "#/components/schemas/RuleSummaries"
        LabelNamespace:
          $ref: "#/components/schemas/LabelName"
          description: "The label namespace prefix for this rule group. All labels added by rules in this rule group have this prefix. The syntax for the label namespace prefix for a managed rule group is the following: awswaf:managed:`<vendor>`:<rule group name>: When a rule with a label matches a web request, WAF adds the fully qualified label to the request. A fully qualified label is made up of the label namespace from the rule group or web ACL where the rule is defined and the label from the rule, separated by a colon: <label namespace>:<label from rule>"
        AvailableLabels:
          $ref: "#/components/schemas/LabelSummaries"
          description: The labels that one or more rules in this rule group add to matching web requests. These labels are defined in the RuleLabels for a Rule.
        ConsumedLabels:
          $ref: "#/components/schemas/LabelSummaries"
          description: The labels that one or more rules in this rule group match against in label match statements. These labels are defined in a LabelMatchStatement specification, in the Statement definition of a rule.
    RuleSummaries:
      type: array
      items:
        $ref: "#/components/schemas/RuleSummary"
    RuleSummary:
      description: High-level information about a Rule, returned by operations like DescribeManagedRuleGroup. This provides information like the ID, that you can use to retrieve and manage a RuleGroup, and the ARN, that you provide to the RuleGroupReferenceStatement to use the rule group in a Rule.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/EntityName"
          description: The name of the rule.
        Action:
          $ref: "#/components/schemas/RuleAction"
          description: The action that WAF should take on a web request when it matches a rule's statement. Settings at the web ACL level can override the rule action setting.
    LabelSummaries:
      type: array
      items:
        $ref: "#/components/schemas/LabelSummary"
    LabelSummary:
      description: "List of labels used by one or more of the rules of a RuleGroup. This summary object is used for the following rule group lists: AvailableLabels - Labels that rules add to matching requests. These labels are defined in the RuleLabels for a Rule. ConsumedLabels - Labels that rules match against. These labels are defined in a LabelMatchStatement specification, in the Statement definition of a rule."
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/LabelName"
          description: An individual label specification.
    DisassociateWebACLResponse:
      type: object
    Platform:
      type: string
      enum:
        - IOS
        - ANDROID
