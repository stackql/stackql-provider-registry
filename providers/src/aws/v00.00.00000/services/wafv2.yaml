          $ref: "#/components/schemas/WebACL"
          description: The web ACL that is associated with the resource. If there is no associated resource, WAF returns a null web ACL.
    PaginationLimit:
      type: integer
      minimum: 1
      maximum: 100
    ListAPIKeysResponse:
      type: object
      properties:
        NextMarker:
          $ref: "#/components/schemas/NextMarker"
          description: When you request a list of objects with a Limit setting, if the number of objects that are still available for retrieval exceeds the limit, WAF returns a NextMarker value in the response. To retrieve the next batch of objects, provide the marker from the prior call in your next request.
        APIKeySummaries:
          $ref: "#/components/schemas/APIKeySummaries"
          description: The array of key summaries. If you specified a Limit in your request, this might not be the full list.
        ApplicationIntegrationURL:
