          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutLoggingConfigurationResponse"
  /PutManagedRuleSetVersions:
    post:
      operationId: PutManagedRuleSetVersions
      description: Defines the versions of your managed rule set that you are offering to the customers. Customers see your offerings as managed rule groups with versioning. This is intended for use only by vendors of managed rule sets. Vendors are Amazon Web Services and Amazon Web Services Marketplace sellers. Vendors, you can use the managed rule set APIs to provide controlled rollout of your versioned managed rule group offerings for your customers. The APIs are ListManagedRuleSets, GetManagedRuleSet, PutManagedRuleSetVersions, and UpdateManagedRuleSetVersionExpiryDate. Customers retrieve their managed rule group list by calling ListAvailableManagedRuleGroups. The name that you provide here for your managed rule set is the name the customer sees for the corresponding managed rule group. Customers can retrieve the available versions for a managed rule group by calling ListAvailableManagedRuleGroupVersions. You provide a rule group specification for each version. For each managed rule set, you must specify a version that you recommend using. To initiate the expiration of a managed rule group version, use UpdateManagedRuleSetVersionExpiryDate.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.PutManagedRuleSetVersions
            default: AWSWAF_20190729.PutManagedRuleSetVersions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/EntityName"
                  description: The name of the managed rule set. You use this, along with the rule set ID, to identify the rule set. This name is assigned to the corresponding managed rule group, which your customers can access and use.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                Id:
                  $ref: "#/components/schemas/EntityId"
                  description: A unique identifier for the managed rule set. The ID is returned in the responses to commands like list. You provide it to operations like get and update.
                LockToken:
                  $ref: "#/components/schemas/LockToken"
                  description: A token used for optimistic locking. WAF returns a token to your get and list requests, to mark the state of the entity at the time of the request. To make changes to the entity associated with the token, you provide the token to operations like update and delete. WAF uses the token to ensure that no changes have been made to the entity since you last retrieved it. If a change has been made, the update fails with a WAFOptimisticLockException. If this happens, perform another get, and use the new token returned by that operation.
                RecommendedVersion:
                  $ref: "#/components/schemas/VersionKeyString"
                  description: The version of the named managed rule group that you'd like your customers to choose, from among your version offerings.
                VersionsToPublish:
                  $ref: "#/components/schemas/VersionsToPublish"
                  description: The versions of the named managed rule group that you want to offer to your customers.
              required:
