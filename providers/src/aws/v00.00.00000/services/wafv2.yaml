  /GetSampledRequests:
    post:
      operationId: GetSampledRequests
      description: Gets detailed information about a specified number of requests--a sample--that WAF randomly selects from among the first 5,000 requests that your Amazon Web Services resource received during a time range that you choose. You can specify a sample size of up to 500 requests, and you can specify any time range in the previous three hours. GetSampledRequests returns a time range, which is usually the time range that you specified. However, if your resource (such as a CloudFront distribution) received 5,000 requests before the specified time range elapsed, GetSampledRequests returns an updated time range. This new time range indicates the actual period during which WAF selected the requests in the sample.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.GetSampledRequests
            default: AWSWAF_20190729.GetSampledRequests
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WebAclArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon resource name (ARN) of the WebACL for which you want a sample of requests.
                RuleMetricName:
                  $ref: "#/components/schemas/MetricName"
                  description: The metric name assigned to the Rule or RuleGroup dimension for which you want a sample of requests.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: "Specifies whether this is for a global resource type, such as a Amazon CloudFront distribution. For an Amplify application, use CLOUDFRONT. To work with CloudFront, you must also specify the Region US East (N. Virginia) as follows: CLI - Specify the Region when you use the CloudFront scope: --scope=CLOUDFRONT --region=us-east-1. API and SDKs - For all calls, use the Region endpoint us-east-1."
                TimeWindow:
                  $ref: "#/components/schemas/TimeWindow"
                  description: The start date and time and the end date and time of the range for which you want GetSampledRequests to return a sample of requests. You must specify the times in Coordinated Universal Time (UTC) format. UTC format includes the special designator, Z. For example, "2016-09-27T14:50Z". You can specify any time range in the previous three hours. If you specify a start time that's earlier than three hours ago, WAF sets it to three hours ago.
                MaxItems:
                  $ref: "#/components/schemas/ListMaxItems"
                  description: The number of requests that you want WAF to return from among the first 5,000 requests that your Amazon Web Services resource received during the time range. If your resource received fewer requests than the value of MaxItems, GetSampledRequests returns information about all of them.
              required:
                - WebAclArn
                - RuleMetricName
                - Scope
                - TimeWindow
                - MaxItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSampledRequestsResponse"
  /GetTopPathStatisticsByTraffic:
    post:
      operationId: GetTopPathStatisticsByTraffic
      description: Retrieves aggregated statistics about the top URI paths accessed by bot traffic for a specified web ACL and time window. You can use this operation to analyze which paths on your web application receive the most bot traffic and identify the specific bots accessing those paths. The operation supports filtering by bot category, organization, or name, and allows you to drill down into specific path prefixes to view detailed URI-level statistics.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSWAF_20190729.GetTopPathStatisticsByTraffic
            default: AWSWAF_20190729.GetTopPathStatisticsByTraffic
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WebAclArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the web ACL for which you want to retrieve path statistics.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: Specifies whether the web ACL is for an Amazon Web Services CloudFront distribution or for a regional application. A regional application can be an Application Load Balancer, an AppSync GraphQL API, an Amazon Cognito user pool, an Amazon Web Services App Runner service, or an Amazon Web Services Verified Access instance.
                UriPathPrefix:
                  $ref: "#/components/schemas/UriPathPrefixString"
                  description: A URI path prefix to filter the results. When you specify this parameter, the operation returns statistics for individual URIs within the specified path prefix. For example, if you specify /api, the response includes statistics for paths like /api/v1/users and /api/v2/orders. If you don't specify this parameter, the operation returns top-level path statistics.
                TimeWindow:
                  $ref: "#/components/schemas/TimeWindow"
                  description: The time window for which you want to retrieve path statistics. The time window must be within the data retention period for your web ACL.
                BotCategory:
                  $ref: "#/components/schemas/FilterString"
                  description: Filters the results to include only traffic from bots in the specified category. For example, you can filter by ai to see only AI crawler traffic, or search_engine to see only search engine bot traffic. When you apply this filter, the Source field is populated in the response.
                BotOrganization:
                  $ref: "#/components/schemas/FilterString"
                  description: Filters the results to include only traffic from bots belonging to the specified organization. For example, you can filter by openai or google. When you apply this filter, the Source field is populated in the response.
                BotName:
                  $ref: "#/components/schemas/FilterString"
                  description: Filters the results to include only traffic from the specified bot. For example, you can filter by gptbot or googlebot. When you apply this filter, the Source field is populated in the response.
                Limit:
                  $ref: "#/components/schemas/PathStatisticsLimit"
                  description: The maximum number of path statistics to return. Valid values are 1 to 100.
                NumberOfTopTrafficBotsPerPath:
                  $ref: "#/components/schemas/NumberOfTopTrafficBotsPerPath"
                  description: The maximum number of top bots to include in the statistics for each path. Valid values are 1 to 10.
                NextMarker:
                  $ref: "#/components/schemas/NextMarker"
                  description: When you request a list of objects with a Limit setting, if the number of objects that are still available for retrieval exceeds the limit, WAF returns a NextMarker value in the response. To retrieve the next batch of objects, provide the marker from the prior call in your next request.
              required:
                - WebAclArn
                - Scope
                - TimeWindow
                - Limit
                - NumberOfTopTrafficBotsPerPath
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTopPathStatisticsByTrafficResponse"
