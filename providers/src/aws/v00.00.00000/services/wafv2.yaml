        ManagedRuleSetName:
          $ref: "#/components/schemas/EntityName"
          description: The name of the managed rule group. For example, AWSManagedRulesAnonymousIpList or AWSManagedRulesATPRuleSet.
        ProductId:
          $ref: "#/components/schemas/ProductId"
          description: A unique identifier for the rule group. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        ProductLink:
          $ref: "#/components/schemas/ProductLink"
          description: For Amazon Web Services Marketplace managed rule groups only, the link to the rule group product page.
        ProductTitle:
          $ref: "#/components/schemas/ProductTitle"
          description: The display name for the managed rule group. For example, Anonymous IP list or Account takeover prevention.
        ProductDescription:
          $ref: "#/components/schemas/ProductDescription"
          description: A short description of the managed rule group.
        SnsTopicArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon resource name (ARN) of the Amazon Simple Notification Service SNS topic that's used to provide notification of changes to the managed rule group. You can subscribe to the SNS topic to receive notifications when the managed rule group is modified, such as for new versions and for version expiration. For more information, see the Amazon Simple Notification Service Developer Guide.
        IsVersioningSupported:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the rule group is versioned.
        IsAdvancedManagedRuleSet:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the rule group provides an advanced set of protections, such as the the Amazon Web Services Managed Rules rule groups that are used for WAF intelligent threat mitigation.
    ProductId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: .*\S.*
    ProductLink:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*\S.*
    ProductTitle:
