        failures:
          $ref: "#/components/schemas/Failures"
          description: Any failures associated with the call.
    Tasks:
      type: array
      items:
        $ref: "#/components/schemas/Task"
    Task:
      description: Details on a task in a cluster.
      type: object
      properties:
        attachments:
          $ref: "#/components/schemas/Attachments"
          description: The Elastic Network Adapter that's associated with the task if the task uses the awsvpc network mode.
        attributes:
          $ref: "#/components/schemas/Attributes"
          description: The attributes of the task
        availabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone for the task.
        capacityProviderName:
          $ref: "#/components/schemas/String"
          description: The capacity provider that's associated with the task.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the cluster that hosts the task.
        connectivity:
          $ref: "#/components/schemas/Connectivity"
          description: The connectivity status of a task.
        connectivityAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task last went into CONNECTED status.
        containerInstanceArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the container instances that host the task.
        containers:
          $ref: "#/components/schemas/Containers"
          description: The containers that's associated with the task.
        cpu:
          $ref: "#/components/schemas/String"
          description: The number of CPU units used by the task as expressed in a task definition. It can be expressed as an integer using CPU units (for example, 1024). It can also be expressed as a string using vCPUs (for example, 1 vCPU or 1 vcpu). String values are converted to an integer that indicates the CPU units when the task definition is registered. If you're using the EC2 launch type or the external launch type, this field is optional. Supported values are between 128 CPU units (0.125 vCPUs) and 196608 CPU units (192 vCPUs). If you do not specify a value, the parameter is ignored. This field is required for Fargate. For information about the valid values, see Task size in the Amazon Elastic Container Service Developer Guide.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task was created. More specifically, it's for the time when the task entered the PENDING state.
        desiredStatus:
          $ref: "#/components/schemas/String"
          description: The desired status of the task. For more information, see Task Lifecycle.
        enableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether execute command functionality is turned on for this task. If true, execute command functionality is turned on all the containers in the task.
        executionStoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task execution stopped.
        group:
          $ref: "#/components/schemas/String"
          description: The name of the task group that's associated with the task.
        healthStatus:
          $ref: "#/components/schemas/HealthStatus"
          description: The health status for the task. It's determined by the health of the essential containers in the task. If all essential containers in the task are reporting as HEALTHY, the task status also reports as HEALTHY. If any essential containers in the task are reporting as UNHEALTHY or UNKNOWN, the task status also reports as UNHEALTHY or UNKNOWN. The Amazon ECS container agent doesn't monitor or report on Docker health checks that are embedded in a container image and not specified in the container definition. For example, this includes those specified in a parent image or from the image's Dockerfile. Health check parameters that are specified in a container definition override any Docker health checks that are found in the container image.
        inferenceAccelerators:
          $ref: "#/components/schemas/InferenceAccelerators"
          description: The Elastic Inference accelerator that's associated with the task.
        lastStatus:
          $ref: "#/components/schemas/String"
          description: The last known status for the task. For more information, see Task Lifecycle.
        launchType:
          $ref: "#/components/schemas/LaunchType"
          description: The infrastructure where your task runs on. For more information, see Amazon ECS launch types in the Amazon Elastic Container Service Developer Guide.
        memory:
          $ref: "#/components/schemas/String"
          description: "The amount of memory (in MiB) that the task uses as expressed in a task definition. It can be expressed as an integer using MiB (for example, 1024). If it's expressed as a string using GB (for example, 1GB or 1 GB), it's converted to an integer indicating the MiB when the task definition is registered. If you use the EC2 launch type, this field is optional. If you use the Fargate launch type, this field is required. You must use one of the following values. The value that you choose determines the range of supported values for the cpu parameter. 512 (0.5 GB), 1024 (1 GB), 2048 (2 GB) - Available cpu values: 256 (.25 vCPU) 1024 (1 GB), 2048 (2 GB), 3072 (3 GB), 4096 (4 GB) - Available cpu values: 512 (.5 vCPU) 2048 (2 GB), 3072 (3 GB), 4096 (4 GB), 5120 (5 GB), 6144 (6 GB), 7168 (7 GB), 8192 (8 GB) - Available cpu values: 1024 (1 vCPU) Between 4096 (4 GB) and 16384 (16 GB) in increments of 1024 (1 GB) - Available cpu values: 2048 (2 vCPU) Between 8192 (8 GB) and 30720 (30 GB) in increments of 1024 (1 GB) - Available cpu values: 4096 (4 vCPU) Between 16 GB and 60 GB in 4 GB increments - Available cpu values: 8192 (8 vCPU) This option requires Linux platform 1.4.0 or later. Between 32GB and 120 GB in 8 GB increments - Available cpu values: 16384 (16 vCPU) This option requires Linux platform 1.4.0 or later."
        overrides:
          $ref: "#/components/schemas/TaskOverride"
          description: One or more container overrides.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The platform version where your task runs on. A platform version is only specified for tasks that use the Fargate launch type. If you didn't specify one, the LATEST platform version is used. For more information, see Fargate Platform Versions in the Amazon Elastic Container Service Developer Guide.
        platformFamily:
          $ref: "#/components/schemas/String"
          description: The operating system that your tasks are running on. A platform family is specified only for tasks that use the Fargate launch type. All tasks that run as part of this service must use the same platformFamily value as the service (for example, LINUX.).
        pullStartedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the container image pull began.
        pullStoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the container image pull completed.
        startedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task started. More specifically, it's for the time when the task transitioned from the PENDING state to the RUNNING state.
        startedBy:
          $ref: "#/components/schemas/String"
          description: The tag specified when a task is started. If an Amazon ECS service started the task, the startedBy parameter contains the deployment ID of that service.
        stopCode:
          $ref: "#/components/schemas/TaskStopCode"
          description: The stop code indicating why a task was stopped. The stoppedReason might contain additional details. For more information about stop code, see Stopped tasks error codes in the Amazon ECS Developer Guide.
        stoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task was stopped. More specifically, it's for the time when the task transitioned from the RUNNING state to the STOPPED state.
        stoppedReason:
          $ref: "#/components/schemas/String"
          description: The reason that the task was stopped.
        stoppingAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task stops. More specifically, it's for the time when the task transitions from the RUNNING state to STOPPING.
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that you apply to the task to help you categorize and organize the task. Each tag consists of a key and an optional value. You define both the key and value. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        taskArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the task.
        taskDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the task definition that creates the task.
        version:
          $ref: "#/components/schemas/Long"
          description: The version counter for the task. Every time a task experiences a change that starts a CloudWatch event, the version counter is incremented. If you replicate your Amazon ECS task state with CloudWatch Events, you can compare the version of a task reported by the Amazon ECS API actions with the version reported in CloudWatch Events for the task (inside the detail object) to verify that the version in your event stream is current.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The ephemeral storage settings for the task.
        fargateEphemeralStorage:
          $ref: "#/components/schemas/TaskEphemeralStorage"
          description: The Fargate ephemeral storage settings for the task.
    Connectivity:
      type: string
      enum:
        - CONNECTED
        - DISCONNECTED
    Containers:
      type: array
      items:
        $ref: "#/components/schemas/Container"
    Container:
      description: A Docker container that's part of a task.
      type: object
      properties:
        containerArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the container.
        taskArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the task.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the container.
        image:
          $ref: "#/components/schemas/String"
          description: The image used for the container.
        imageDigest:
          $ref: "#/components/schemas/String"
          description: The container image manifest digest.
        runtimeId:
          $ref: "#/components/schemas/String"
          description: The ID of the Docker container.
        lastStatus:
          $ref: "#/components/schemas/String"
          description: The last known status of the container.
        exitCode:
          $ref: "#/components/schemas/BoxedInteger"
          description: The exit code returned from the container.
        reason:
          $ref: "#/components/schemas/String"
          description: A short (1024 max characters) human-readable string to provide additional details about a running or stopped container.
        networkBindings:
          $ref: "#/components/schemas/NetworkBindings"
          description: The network bindings associated with the container.
        networkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaces"
          description: The network interfaces associated with the container.
        healthStatus:
          $ref: "#/components/schemas/HealthStatus"
          description: The health status of the container. If health checks aren't configured for this container in its task definition, then it reports the health status as UNKNOWN.
        managedAgents:
          $ref: "#/components/schemas/ManagedAgents"
          description: The details of any Amazon ECS managed agents associated with the container.
        cpu:
          $ref: "#/components/schemas/String"
          description: The number of CPU units set for the container. The value is 0 if no value was specified in the container definition when the task definition was registered.
        memory:
          $ref: "#/components/schemas/String"
          description: The hard limit (in MiB) of memory set for the container.
        memoryReservation:
          $ref: "#/components/schemas/String"
          description: The soft limit (in MiB) of memory set for the container.
        gpuIds:
          $ref: "#/components/schemas/GpuIds"
          description: The IDs of each GPU assigned to the container.
    NetworkBindings:
      type: array
      items:
        $ref: "#/components/schemas/NetworkBinding"
    NetworkBinding:
      description: Details on the network bindings between a container and its host container instance. After a task reaches the RUNNING status, manual and automatic host and container port assignments are visible in the networkBindings section of DescribeTasks API responses.
      type: object
      properties:
        bindIP:
          $ref: "#/components/schemas/String"
          description: The IP address that the container is bound to on the container instance.
        containerPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port number on the container that's used with the network binding.
        hostPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port number on the host that's used with the network binding.
        protocol:
          $ref: "#/components/schemas/TransportProtocol"
          description: The protocol used for the network binding.
        containerPortRange:
          $ref: "#/components/schemas/String"
          description: "The port number range on the container that's bound to the dynamically mapped host port range. The following rules apply when you specify a containerPortRange: You must use either the bridge network mode or the awsvpc network mode. This parameter is available for both the EC2 and Fargate launch types. This parameter is available for both the Linux and Windows operating systems. The container instance must have at least version 1.67.0 of the container agent and at least version 1.67.0-1 of the ecs-init package You can specify a maximum of 100 port ranges per container. You do not specify a hostPortRange. The value of the hostPortRange is set as follows: For containers in a task with the awsvpc network mode, the hostPortRange is set to the same value as the containerPortRange. This is a static mapping strategy. For containers in a task with the bridge network mode, the Amazon ECS agent finds open host ports from the default ephemeral range and passes it to docker to bind them to the container ports. The containerPortRange valid values are between 1 and 65535. A port can only be included in one port mapping per container. You cannot specify overlapping port ranges. The first port in the range must be less than last port in the range. Docker recommends that you turn off the docker-proxy in the Docker daemon config file when you have a large number of ports. For more information, see Issue #11185 on the Github website. For information about how to turn off the docker-proxy in the Docker daemon config file, see Docker daemon in the Amazon ECS Developer Guide. You can call DescribeTasks to view the hostPortRange which are the host ports that are bound to the container ports."
        hostPortRange:
          $ref: "#/components/schemas/String"
          description: The port number range on the host that's used with the network binding. This is assigned is assigned by Docker and delivered by the Amazon ECS agent.
    NetworkInterfaces:
      type: array
      items:
        $ref: "#/components/schemas/NetworkInterface"
    NetworkInterface:
      description: An object representing the elastic network interface for tasks that use the awsvpc network mode.
      type: object
      properties:
        attachmentId:
          $ref: "#/components/schemas/String"
          description: The attachment ID for the network interface.
        privateIpv4Address:
          $ref: "#/components/schemas/String"
          description: The private IPv4 address for the network interface.
        ipv6Address:
          $ref: "#/components/schemas/String"
          description: The private IPv6 address for the network interface.
    HealthStatus:
      type: string
      enum:
        - HEALTHY
        - UNHEALTHY
        - UNKNOWN
    ManagedAgents:
      type: array
      items:
        $ref: "#/components/schemas/ManagedAgent"
    ManagedAgent:
      description: Details about the managed agent status for the container.
      type: object
      properties:
        lastStartedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the managed agent was last started.
        name:
          $ref: "#/components/schemas/ManagedAgentName"
          description: The name of the managed agent. When the execute command feature is turned on, the managed agent name is ExecuteCommandAgent.
        reason:
          $ref: "#/components/schemas/String"
          description: The reason for why the managed agent is in the state it is in.
        lastStatus:
          $ref: "#/components/schemas/String"
          description: The last known status of the managed agent.
    ManagedAgentName:
      type: string
      enum:
        - ExecuteCommandAgent
    GpuIds:
      type: array
      items:
        $ref: "#/components/schemas/String"
    TaskOverride:
      description: The overrides that are associated with a task.
      type: object
      properties:
        containerOverrides:
          $ref: "#/components/schemas/ContainerOverrides"
          description: One or more container overrides that are sent to a task.
        cpu:
          $ref: "#/components/schemas/String"
          description: The CPU override for the task.
        inferenceAcceleratorOverrides:
          $ref: "#/components/schemas/InferenceAcceleratorOverrides"
          description: The Elastic Inference accelerator override for the task.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the task execution role override for the task. For more information, see Amazon ECS task execution IAM role in the Amazon Elastic Container Service Developer Guide.
        memory:
          $ref: "#/components/schemas/String"
          description: The memory override for the task.
        taskRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the role that containers in this task can assume. All containers in this task are granted the permissions that are specified in this role. For more information, see IAM Role for Tasks in the Amazon Elastic Container Service Developer Guide.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: "The ephemeral storage setting override for the task. This parameter is only supported for tasks hosted on Fargate that use the following platform versions: Linux platform version 1.4.0 or later. Windows platform version 1.0.0 or later."
    ContainerOverrides:
      type: array
      items:
        $ref: "#/components/schemas/ContainerOverride"
    ContainerOverride:
      description: 'The overrides that are sent to a container. An empty container override can be passed in. An example of an empty container override is {"containerOverrides": [ ] }. If a non-empty container override is specified, the name parameter must be included. You can use Secrets Manager or Amazon Web Services Systems Manager Parameter Store to store the sensitive data. For more information, see Retrieve secrets through environment variables in the Amazon ECS Developer Guide.'
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the container that receives the override. This parameter is required if any override is specified.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command to send to the container that overrides the default command from the Docker image or the task definition. You must also specify a container name.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to send to the container. You can add new environment variables, which are added to the container at launch, or you can override the existing environment variables from the Docker image or the task definition. You must also specify a container name.
        environmentFiles:
          $ref: "#/components/schemas/EnvironmentFiles"
          description: A list of files containing the environment variables to pass to a container, instead of the value from the container definition.
        cpu:
          $ref: "#/components/schemas/BoxedInteger"
          description: The number of cpu units reserved for the container, instead of the default value from the task definition. You must also specify a container name.
        memory:
          $ref: "#/components/schemas/BoxedInteger"
