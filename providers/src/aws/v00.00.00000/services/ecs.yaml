      type: array
      items:
        $ref: "#/components/schemas/DaemonDeployment"
    DaemonDeployment:
      description: Information about a daemon deployment. A daemon deployment orchestrates the progressive rollout of daemon task updates across container instances.
      type: object
      properties:
        daemonDeploymentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the daemon deployment.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the cluster that hosts the daemon.
        status:
          $ref: "#/components/schemas/DaemonDeploymentStatus"
          description: The status of the daemon deployment.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Information about why the daemon deployment is in the current status.
        targetDaemonRevision:
          $ref: "#/components/schemas/DaemonDeploymentRevisionDetail"
          description: The daemon revision being deployed.
        sourceDaemonRevisions:
          $ref: "#/components/schemas/DaemonDeploymentRevisionDetailList"
          description: The currently deployed daemon revisions that are being replaced.
        circuitBreaker:
          $ref: "#/components/schemas/DaemonCircuitBreaker"
          description: The circuit breaker configuration that determines when a daemon deployment has failed.
        alarms:
          $ref: "#/components/schemas/DaemonDeploymentAlarms"
          description: The CloudWatch alarms that determine when a daemon deployment fails.
        rollback:
          $ref: "#/components/schemas/DaemonRollback"
          description: The rollback options for the daemon deployment.
        deploymentConfiguration:
          $ref: "#/components/schemas/DaemonDeploymentConfiguration"
          description: The deployment configuration used for this daemon deployment.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the daemon deployment was created. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        startedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the daemon deployment started. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        stoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the daemon deployment stopped. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        finishedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the daemon deployment finished. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
    DaemonDeploymentStatus:
      type: string
      enum:
        - PENDING
        - SUCCESSFUL
        - STOPPED
        - STOP_REQUESTED
        - IN_PROGRESS
        - ROLLBACK_IN_PROGRESS
        - ROLLBACK_SUCCESSFUL
        - ROLLBACK_FAILED
    DaemonDeploymentRevisionDetail:
      description: Details about a daemon revision during a deployment, including running and draining instance counts per capacity provider.
