          description: The list of data volume definitions for the daemon task.
        cpu:
          $ref: "#/components/schemas/String"
          description: The number of CPU units used by the daemon task.
        memory:
          $ref: "#/components/schemas/String"
          description: The amount of memory (in MiB) used by the daemon task.
        status:
          $ref: "#/components/schemas/DaemonTaskDefinitionStatus"
          description: The status of the daemon task definition. The valid values are ACTIVE, DELETE_IN_PROGRESS, and DELETED.
        registeredAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the daemon task definition was registered.
        deleteRequestedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the daemon task definition delete was requested.
        registeredBy:
          $ref: "#/components/schemas/String"
          description: The principal that registered the daemon task definition.
    DaemonContainerDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/DaemonContainerDefinition"
    DaemonContainerDefinition:
      description: A container definition for a daemon task. Daemon container definitions describe the containers that run as part of a daemon task on container instances managed by capacity providers.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the container. Up to 255 letters (uppercase and lowercase), numbers, underscores, and hyphens are allowed.
        image:
          $ref: "#/components/schemas/String"
          description: The image used to start the container. This string is passed directly to the Docker daemon. Images in the Docker Hub registry are available by default. Other repositories are specified with either repository-url/image:tag or repository-url/image@digest .
        memory:
          $ref: "#/components/schemas/BoxedInteger"
          description: The amount (in MiB) of memory to present to the container. If the container attempts to exceed the memory specified here, the container is killed.
        memoryReservation:
          $ref: "#/components/schemas/BoxedInteger"
          description: The soft limit (in MiB) of memory to reserve for the container.
        repositoryCredentials:
          $ref: "#/components/schemas/RepositoryCredentials"
          description: The private repository authentication credentials to use.
        healthCheck:
          $ref: "#/components/schemas/HealthCheck"
          description: The container health check command and associated configuration parameters for the container.
        cpu:
          $ref: "#/components/schemas/Integer"
          description: The number of cpu units reserved for the container.
        essential:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If the essential parameter of a container is marked as true, and that container fails or stops for any reason, all other containers that are part of the task are stopped.
        entryPoint:
          $ref: "#/components/schemas/StringList"
          description: The entry point that's passed to the container.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command that's passed to the container.
        workingDirectory:
          $ref: "#/components/schemas/String"
          description: The working directory to run commands inside the container in.
        environmentFiles:
          $ref: "#/components/schemas/EnvironmentFiles"
          description: A list of files containing the environment variables to pass to a container.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to a container.
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the container.
        readonlyRootFilesystem:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, the container is given read-only access to its root file system.
        mountPoints:
          $ref: "#/components/schemas/MountPointList"
          description: The mount points for data volumes in your container.
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: The log configuration specification for the container.
        firelensConfiguration:
          $ref: "#/components/schemas/FirelensConfiguration"
          description: The FireLens configuration for the container. This is used to specify and configure a log router for container logs.
        privileged:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, the container is given elevated privileges on the host container instance (similar to the root user).
        user:
          $ref: "#/components/schemas/String"
          description: The user to use inside the container.
        ulimits:
          $ref: "#/components/schemas/UlimitList"
          description: A list of ulimits to set in the container.
        linuxParameters:
          $ref: "#/components/schemas/DaemonLinuxParameters"
          description: Linux-specific modifications that are applied to the container configuration, such as Linux kernel capabilities.
        dependsOn:
          $ref: "#/components/schemas/ContainerDependencies"
          description: The dependencies defined for container startup and shutdown. A container can contain multiple dependencies on other containers in a task definition.
        startTimeout:
          $ref: "#/components/schemas/BoxedInteger"
          description: Time duration (in seconds) to wait before giving up on resolving dependencies for a container.
        stopTimeout:
          $ref: "#/components/schemas/BoxedInteger"
          description: Time duration (in seconds) to wait before the container is forcefully killed if it doesn't exit normally on its own.
        systemControls:
          $ref: "#/components/schemas/SystemControls"
          description: A list of namespaced kernel parameters to set in the container.
        interactive:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, you can deploy containerized applications that require stdin or a tty to be allocated.
        pseudoTerminal:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, a TTY is allocated.
        restartPolicy:
          $ref: "#/components/schemas/ContainerRestartPolicy"
          description: The restart policy for the container. When you set up a restart policy, Amazon ECS can restart the container without needing to replace the task.
      required:
        - image
    DaemonLinuxParameters:
      description: The Linux-specific options that are applied to the daemon container, such as Linux kernel capabilities.
      type: object
      properties:
        capabilities:
          $ref: "#/components/schemas/KernelCapabilities"
          description: The Linux capabilities for the container that are added to or dropped from the default configuration provided by Docker.
        devices:
          $ref: "#/components/schemas/DevicesList"
          description: Any host devices to expose to the container.
        initProcessEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Run an init process inside the container that forwards signals and reaps processes.
        tmpfs:
          $ref: "#/components/schemas/TmpfsList"
          description: The container path, mount options, and size (in MiB) of the tmpfs mount.
    DaemonVolumeList:
      type: array
      items:
        $ref: "#/components/schemas/DaemonVolume"
    DaemonVolume:
      description: A data volume definition for a daemon task.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the volume. Up to 255 letters (uppercase and lowercase), numbers, underscores, and hyphens are allowed.
        host:
          $ref: "#/components/schemas/HostVolumeProperties"
          description: The contents of the host parameter determine whether your bind mount host volume persists on the host container instance and where it's stored.
    DaemonTaskDefinitionStatus:
      type: string
      enum:
        - ACTIVE
        - DELETE_IN_PROGRESS
        - DELETED
    ExpressGatewayServiceIncludeList:
      type: array
      items:
        $ref: "#/components/schemas/ExpressGatewayServiceInclude"
    ExpressGatewayServiceInclude:
      type: string
      enum:
        - TAGS
    DescribeExpressGatewayServiceResponse:
      type: object
      properties:
        service:
          $ref: "#/components/schemas/ECSExpressGatewayService"
          description: The full description of the described express service.
    DescribeServiceDeploymentsResponse:
      type: object
      properties:
        serviceDeployments:
          $ref: "#/components/schemas/ServiceDeployments"
          description: The list of service deployments described.
        failures:
          $ref: "#/components/schemas/Failures"
          description: Any failures associated with the call. If you decsribe a deployment with a service revision created before October 25, 2024, the call fails. The failure includes the service revision ARN and the reason set to MISSING.
    ServiceDeployments:
      type: array
      items:
        $ref: "#/components/schemas/ServiceDeployment"
    ServiceDeployment:
      description: Information about the service deployment. Service deployments provide a comprehensive view of your deployments. For information about service deployments, see View service history using Amazon ECS service deployments in the Amazon Elastic Container Service Developer Guide .
      type: object
      properties:
        serviceDeploymentArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service deployment.
        serviceArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service for this service deployment.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the cluster that hosts the service.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the service deployment was created. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        startedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the service deployment statred. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        finishedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time the service deployment finished. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        stoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: "The time the service deployment stopped. The format is yyyy-MM-dd HH:mm:ss.SSSSSS. The service deployment stops when any of the following actions happen: A user manually stops the deployment The rollback option is not in use for the failure detection mechanism (the circuit breaker or alarm-based) and the service fails."
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the service deployment was last updated. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        sourceServiceRevisions:
          $ref: "#/components/schemas/ServiceRevisionsSummaryList"
          description: The currently deployed workload configuration.
        targetServiceRevision:
          $ref: "#/components/schemas/ServiceRevisionSummary"
          description: The workload configuration being deployed.
        status:
          $ref: "#/components/schemas/ServiceDeploymentStatus"
          description: The service deployment state.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Information about why the service deployment is in the current status. For example, the circuit breaker detected a failure.
        lifecycleStage:
          $ref: "#/components/schemas/ServiceDeploymentLifecycleStage"
          description: "The current lifecycle stage of the deployment. Possible values include: RECONCILE_SERVICE The reconciliation stage that only happens when you start a new service deployment with more than 1 service revision in an ACTIVE state. PRE_SCALE_UP The green service revision has not started. The blue service revision is handling 100% of the production traffic. There is no test traffic. SCALE_UP The stage when the green service revision scales up to 100% and launches new tasks. The green service revision is not serving any traffic at this point. POST_SCALE_UP The green service revision has started. The blue service revision is handling 100% of the production traffic. There is no test traffic. TEST_TRAFFIC_SHIFT The blue and green service revisions are running. The blue service revision handles 100% of the production traffic. The green service revision is migrating from 0% to 100% of test traffic. POST_TEST_TRAFFIC_SHIFT The test traffic shift is complete. The green service revision handles 100% of the test traffic. PRODUCTION_TRAFFIC_SHIFT Production traffic is shifting to the green service revision. The green service revision is migrating from 0% to 100% of production traffic. POST_PRODUCTION_TRAFFIC_SHIFT The production traffic shift is complete. BAKE_TIME The stage when both blue and green service revisions are running simultaneously after the production traffic has shifted. CLEAN_UP The stage when the blue service revision has completely scaled down to 0 running tasks. The green service revision is now the production service revision after this stage."
        deploymentConfiguration:
          $ref: "#/components/schemas/DeploymentConfiguration"
        rollback:
          $ref: "#/components/schemas/Rollback"
          description: The rollback options the service deployment uses when the deployment fails.
        deploymentCircuitBreaker:
          $ref: "#/components/schemas/ServiceDeploymentCircuitBreaker"
          description: The circuit breaker configuration that determines a service deployment failed.
        alarms:
          $ref: "#/components/schemas/ServiceDeploymentAlarms"
          description: The CloudWatch alarms that determine when a service deployment fails.
    ServiceRevisionsSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceRevisionSummary"
    ServiceRevisionSummary:
      description: The information about the number of requested, pending, and running tasks for a service revision.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service revision.
        requestedTaskCount:
          $ref: "#/components/schemas/Integer"
          description: The number of requested tasks for the service revision.
        runningTaskCount:
          $ref: "#/components/schemas/Integer"
          description: The number of running tasks for the service revision.
        pendingTaskCount:
          $ref: "#/components/schemas/Integer"
          description: The number of pending tasks for the service revision.
        requestedTestTrafficWeight:
          $ref: "#/components/schemas/Double"
          description: The percentage of test traffic that is directed to this service revision. This value represents a snapshot of the traffic distribution and may not reflect real-time changes during active deployments. Valid values are 0.0 to 100.0.
        requestedProductionTrafficWeight:
          $ref: "#/components/schemas/Double"
          description: The percentage of production traffic that is directed to this service revision. This value represents a snapshot of the traffic distribution and may not reflect real-time changes during active deployments. Valid values are 0.0 to 100.0.
    ServiceDeploymentStatus:
      type: string
      enum:
        - PENDING
        - SUCCESSFUL
        - STOPPED
        - STOP_REQUESTED
        - IN_PROGRESS
        - ROLLBACK_REQUESTED
        - ROLLBACK_IN_PROGRESS
        - ROLLBACK_SUCCESSFUL
        - ROLLBACK_FAILED
    ServiceDeploymentLifecycleStage:
      type: string
      enum:
        - RECONCILE_SERVICE
        - PRE_SCALE_UP
        - SCALE_UP
        - POST_SCALE_UP
        - TEST_TRAFFIC_SHIFT
        - POST_TEST_TRAFFIC_SHIFT
        - PRODUCTION_TRAFFIC_SHIFT
        - POST_PRODUCTION_TRAFFIC_SHIFT
        - BAKE_TIME
        - CLEAN_UP
    Rollback:
      description: Information about the service deployment rollback.
      type: object
      properties:
        reason:
          $ref: "#/components/schemas/String"
          description: The reason the rollback happened. For example, the circuit breaker initiated the rollback operation.
        startedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Time time that the rollback started. The format is yyyy-MM-dd HH:mm:ss.SSSSSS.
        serviceRevisionArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service revision deployed as part of the rollback.
    ServiceDeploymentCircuitBreaker:
      description: Information about the circuit breaker used to determine when a service deployment has failed. The deployment circuit breaker is the rolling update mechanism that determines if the tasks reach a steady state. The deployment circuit breaker has an option that will automatically roll back a failed deployment to the last cpompleted service revision. For more information, see How the Amazon ECS deployment circuit breaker detects failures in the Amazon ECS Developer Guide.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ServiceDeploymentRollbackMonitorsStatus"
          description: The circuit breaker status. Amazon ECS is not using the circuit breaker for service deployment failures when the status is DISABLED.
        failureCount:
          $ref: "#/components/schemas/Integer"
          description: The number of times the circuit breaker detected a service deploymeny failure.
        threshold:
          $ref: "#/components/schemas/Integer"
          description: The threshhold which determines that the service deployment failed. The deployment circuit breaker calculates the threshold value, and then uses the value to determine when to move the deployment to a FAILED state. The deployment circuit breaker has a minimum threshold of 3 and a maximum threshold of 200. and uses the values in the following formula to determine the deployment failure. 0.5 * desired task count
    ServiceDeploymentRollbackMonitorsStatus:
      type: string
      enum:
        - TRIGGERED
        - MONITORING
        - MONITORING_COMPLETE
        - DISABLED
    ServiceDeploymentAlarms:
      description: The CloudWatch alarms used to determine a service deployment failed. Amazon ECS considers the service deployment as failed when any of the alarms move to the ALARM state. For more information, see How CloudWatch alarms detect Amazon ECS deployment failures in the Amazon ECS Developer Guide.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ServiceDeploymentRollbackMonitorsStatus"
          description: The status of the alarms check. Amazon ECS is not using alarms for service deployment failures when the status is DISABLED.
        alarmNames:
          $ref: "#/components/schemas/StringList"
          description: The name of the CloudWatch alarms that determine when a service deployment failed. A "," separates the alarms.
        triggeredAlarmNames:
          $ref: "#/components/schemas/StringList"
          description: One or more CloudWatch alarm names that have been triggered during the service deployment. A "," separates the alarm names.
    DescribeServiceRevisionsResponse:
      type: object
      properties:
        serviceRevisions:
          $ref: "#/components/schemas/ServiceRevisions"
          description: The list of service revisions described.
        failures:
          $ref: "#/components/schemas/Failures"
          description: Any failures associated with the call.
    ServiceRevisions:
      type: array
      items:
        $ref: "#/components/schemas/ServiceRevision"
    ServiceRevision:
      description: Information about the service revision. A service revision contains a record of the workload configuration Amazon ECS is attempting to deploy. Whenever you create or deploy a service, Amazon ECS automatically creates and captures the configuration that you're trying to deploy in the service revision. For information about service revisions, see Amazon ECS service revisions in the Amazon Elastic Container Service Developer Guide .
      type: object
      properties:
        serviceRevisionArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service revision.
        serviceArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service for the service revision.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the cluster that hosts the service.
        taskDefinition:
          $ref: "#/components/schemas/String"
          description: The task definition the service revision uses.
        capacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy the service revision uses.
        launchType:
          $ref: "#/components/schemas/LaunchType"
          description: The launch type the service revision uses.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: For the Fargate launch type, the platform version the service revision uses.
        platformFamily:
          $ref: "#/components/schemas/String"
          description: The platform family the service revision uses.
        loadBalancers:
          $ref: "#/components/schemas/LoadBalancers"
          description: The load balancers the service revision uses.
        serviceRegistries:
          $ref: "#/components/schemas/ServiceRegistries"
          description: The service registries (for Service Discovery) the service revision uses.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
        containerImages:
          $ref: "#/components/schemas/ContainerImages"
          description: The container images the service revision uses.
        guardDutyEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Runtime Monitoring is turned on.
        serviceConnectConfiguration:
          $ref: "#/components/schemas/ServiceConnectConfiguration"
        volumeConfigurations:
          $ref: "#/components/schemas/ServiceVolumeConfigurations"
          description: The volumes that are configured at deployment that the service revision uses.
        fargateEphemeralStorage:
          $ref: "#/components/schemas/DeploymentEphemeralStorage"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the service revision was created. The format is yyyy-mm-dd HH:mm:ss.SSSSS.
        vpcLatticeConfigurations:
          $ref: "#/components/schemas/VpcLatticeConfigurations"
          description: The VPC Lattice configuration for the service revision.
        resolvedConfiguration:
          $ref: "#/components/schemas/ResolvedConfiguration"
          description: The resolved configuration for the service revision which contains the actual resources your service revision uses, such as which target groups serve traffic.
        ecsManagedResources:
          $ref: "#/components/schemas/ECSManagedResources"
          description: The resources created and managed by Amazon ECS when you create an Express service for Amazon ECS.
    ContainerImages:
      type: array
      items:
        $ref: "#/components/schemas/ContainerImage"
    ContainerImage:
      description: The details about the container image a service revision uses. To ensure that all tasks in a service use the same container image, Amazon ECS resolves container image names and any image tags specified in the task definition to container image digests. After the container image digest has been established, Amazon ECS uses the digest to start any other desired tasks, and for any future service and service revision updates. This leads to all tasks in a service always running identical container images, resulting in version consistency for your software. For more information, see Container image resolution in the Amazon ECS Developer Guide.
      type: object
      properties:
        containerName:
          $ref: "#/components/schemas/String"
          description: The name of the container.
        imageDigest:
          $ref: "#/components/schemas/String"
          description: The container image digest.
        image:
          $ref: "#/components/schemas/String"
          description: The container image.
    ResolvedConfiguration:
      description: The resolved configuration for a service revision, which contains the actual resources your service revision uses, such as which target groups serve traffic.
      type: object
      properties:
        loadBalancers:
          $ref: "#/components/schemas/ServiceRevisionLoadBalancers"
          description: The resolved load balancer configuration for the service revision. This includes information about which target groups serve traffic and which listener rules direct traffic to them.
    ServiceRevisionLoadBalancers:
      type: array
      items:
        $ref: "#/components/schemas/ServiceRevisionLoadBalancer"
    ServiceRevisionLoadBalancer:
      description: The resolved load balancer configuration for a service revision. This includes information about which target groups serve traffic and which listener rules direct traffic to them.
      type: object
      properties:
        targetGroupArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the target group associated with the service revision.
        productionListenerRule:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the production listener rule or listener that directs traffic to the target group associated with the service revision.
    ECSManagedResources:
      description: Represents the Amazon Web Services resources managed by Amazon ECS for an Express service, including ingress paths, auto-scaling policies, metric alarms, and security groups.
      type: object
      properties:
        ingressPaths:
          $ref: "#/components/schemas/ManagedIngressPaths"
          description: The ingress paths and endpoints for the Express service.
        autoScaling:
          $ref: "#/components/schemas/ManagedAutoScaling"
          description: The auto-scaling configuration and policies for the Express service.
        metricAlarms:
          $ref: "#/components/schemas/ManagedMetricAlarms"
          description: The CloudWatch metric alarms associated with the Express service.
        serviceSecurityGroups:
          $ref: "#/components/schemas/ManagedSecurityGroups"
          description: The security groups managed by the Express service.
        logGroups:
          $ref: "#/components/schemas/ManagedLogGroups"
          description: The log groups managed by the Express service.
    ManagedIngressPaths:
      type: array
      items:
        $ref: "#/components/schemas/ManagedIngressPath"
    ManagedIngressPath:
      description: The entry point into the Express service.
      type: object
      properties:
        accessType:
          $ref: "#/components/schemas/AccessType"
          description: The type of access to the endpoint for the Express service.
        endpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint for access to the Express service.
        loadBalancer:
          $ref: "#/components/schemas/ManagedLoadBalancer"
          description: The Application Load Balancer associated with the Express service.
        loadBalancerSecurityGroups:
          $ref: "#/components/schemas/ManagedSecurityGroups"
          description: The security groups associated with the Application Load Balancer.
        certificate:
          $ref: "#/components/schemas/ManagedCertificate"
          description: The ACM certificate for the Express service's domain.
        listener:
          $ref: "#/components/schemas/ManagedListener"
          description: The listeners associated with the Application Load Balancer.
        rule:
          $ref: "#/components/schemas/ManagedListenerRule"
          description: The listener rules for the Application Load Balancer.
        targetGroups:
          $ref: "#/components/schemas/ManagedTargetGroups"
          description: The target groups associated with the Application Load Balancer.
      required:
        - accessType
        - endpoint
    ManagedLoadBalancer:
      description: The Application Load Balancer associated with the Express service.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the load balancer.
        status:
          $ref: "#/components/schemas/ManagedResourceStatus"
          description: The status of the load balancer.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Information about why the load balancer is in the current status.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when this load balancer was most recently updated.
        scheme:
          $ref: "#/components/schemas/String"
          description: The scheme of the load balancer. By default, the scheme of the load balancer is internet-facing.
        subnetIds:
          $ref: "#/components/schemas/StringList"
          description: The IDs of the subnets associated with the load balancer.
        securityGroupIds:
          $ref: "#/components/schemas/StringList"
          description: The IDs of the security groups associated with the load balancer.
      required:
        - status
        - updatedAt
        - scheme
    ManagedResourceStatus:
      type: string
      enum:
        - PROVISIONING
        - ACTIVE
        - DEPROVISIONING
        - DELETED
        - FAILED
    ManagedSecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/ManagedSecurityGroup"
    ManagedSecurityGroup:
      description: A security group associated with the Express service.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the security group.
        status:
          $ref: "#/components/schemas/ManagedResourceStatus"
          description: The status of the security group.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Information about why the security group is in the current status.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when the security group was last updated.
      required:
        - status
        - updatedAt
    ManagedCertificate:
      description: The ACM certificate associated with the HTTPS domain created for the Express service.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the ACM certificate.
        status:
          $ref: "#/components/schemas/ManagedResourceStatus"
          description: The status of the ACM; certificate.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Information about why the ACM certificate is in the current status.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when the ACM certificate was last updated
        domainName:
          $ref: "#/components/schemas/String"
          description: The fully qualified domain name (FQDN) that is secured with this ACM certificate.
      required:
        - status
        - updatedAt
        - domainName
    ManagedListener:
      description: The listeners associated with the Express service's Application Load Balancer.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the load balancer listener.
        status:
          $ref: "#/components/schemas/ManagedResourceStatus"
          description: The status of the load balancer listener.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Informaion about why the load balancer listener is in the current status.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when this listener was most recently updated.
      required:
        - status
        - updatedAt
    ManagedListenerRule:
      description: The listener rule associated with the Express service's Application Load Balancer.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the load balancer listener rule.
        status:
          $ref: "#/components/schemas/ManagedResourceStatus"
          description: The status of the load balancer listener rule.
