        $ref: "#/components/schemas/Resource"
    Resource:
      description: Describes the resources available for a container instance.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the resource, such as CPU, MEMORY, PORTS, PORTS_UDP, or a user-defined resource.
        type_:
          $ref: "#/components/schemas/String"
          description: "The type of the resource. Valid values: INTEGER, DOUBLE, LONG, or STRINGSET."
        doubleValue:
          $ref: "#/components/schemas/Double"
          description: When the doubleValue type is set, the value of the resource must be a double precision floating-point type.
        longValue:
          $ref: "#/components/schemas/Long"
          description: When the longValue type is set, the value of the resource must be an extended precision floating-point type.
        integerValue:
          $ref: "#/components/schemas/Integer"
          description: When the integerValue type is set, the value of the resource must be an integer.
        stringSetValue:
          $ref: "#/components/schemas/StringList"
          description: When the stringSetValue type is set, the value of the resource must be a string type.
    AgentUpdateStatus:
      type: string
      enum:
        - PENDING
        - STAGING
        - STAGED
        - UPDATING
        - UPDATED
        - FAILED
    ContainerInstanceHealthStatus:
      description: An object representing the health status of the container instance.
      type: object
      properties:
        overallStatus:
          $ref: "#/components/schemas/InstanceHealthCheckState"
          description: The overall health status of the container instance. This is an aggregate status of all container instance health checks.
        details:
          $ref: "#/components/schemas/InstanceHealthCheckResultList"
          description: An array of objects representing the details of the container instance health status.
    InstanceHealthCheckState:
      type: string
