  /UpdateService:
    post:
      operationId: UpdateService
      description: "Modifies the parameters of a service. On March 21, 2024, a change was made to resolve the task definition revision before authorization. When a task definition revision is not specified, authorization will occur using the latest revision of a task definition. For services using the rolling update (ECS) you can update the desired count, deployment configuration, network configuration, load balancers, service registries, enable ECS managed tags option, propagate tags option, task placement constraints and strategies, and task definition. When you update any of these parameters, Amazon ECS starts new tasks with the new configuration. You can attach Amazon EBS volumes to Amazon ECS tasks by configuring the volume when starting or running a task, or when creating or updating a service. For more information, see Amazon EBS volumes in the Amazon Elastic Container Service Developer Guide. You can update your volume configurations and trigger a new deployment. volumeConfigurations is only supported for REPLICA service and not DAEMON service. If you leave volumeConfigurations null, it doesn't trigger a new deployment. For more information on volumes, see Amazon EBS volumes in the Amazon Elastic Container Service Developer Guide. For services using the blue/green (CODE_DEPLOY) deployment controller, only the desired count, deployment configuration, health check grace period, task placement constraints and strategies, enable ECS managed tags option, and propagate tags can be updated using this API. If the network configuration, platform version, task definition, or load balancer need to be updated, create a new CodeDeploy deployment. For more information, see CreateDeployment in the CodeDeploy API Reference. For services using an external deployment controller, you can update only the desired count, task placement constraints and strategies, health check grace period, enable ECS managed tags option, and propagate tags option, using this API. If the launch type, load balancer, network configuration, platform version, or task definition need to be updated, create a new task set For more information, see CreateTaskSet. You can add to or subtract from the number of instantiations of a task definition in a service by specifying the cluster that the service is running in and a new desiredCount parameter. You can attach Amazon EBS volumes to Amazon ECS tasks by configuring the volume when starting or running a task, or when creating or updating a service. For more information, see Amazon EBS volumes in the Amazon Elastic Container Service Developer Guide. If you have updated the container image of your application, you can create a new task definition with that image and deploy it to your service. The service scheduler uses the minimum healthy percent and maximum percent parameters (in the service's deployment configuration) to determine the deployment strategy. If your updated Docker image uses the same tag as what is in the existing task definition for your service (for example, my_image:latest), you don't need to create a new revision of your task definition. You can update the service using the forceNewDeployment option. The new tasks launched by the deployment pull the current image/tag combination from your repository when they start. You can also update the deployment configuration of a service. When a deployment is triggered by updating the task definition of a service, the service scheduler uses the deployment configuration parameters, minimumHealthyPercent and maximumPercent, to determine the deployment strategy. If minimumHealthyPercent is below 100%, the scheduler can ignore desiredCount temporarily during a deployment. For example, if desiredCount is four tasks, a minimum of 50% allows the scheduler to stop two existing tasks before starting two new tasks. Tasks for services that don't use a load balancer are considered healthy if they're in the RUNNING state. Tasks for services that use a load balancer are considered healthy if they're in the RUNNING state and are reported as healthy by the load balancer. The maximumPercent parameter represents an upper limit on the number of running tasks during a deployment. You can use it to define the deployment batch size. For example, if desiredCount is four tasks, a maximum of 200% starts four new tasks before stopping the four older tasks (provided that the cluster resources required to do this are available). When UpdateService stops a task during a deployment, the equivalent of docker stop is issued to the containers running in the task. This results in a SIGTERM and a 30-second timeout. After this, SIGKILL is sent and the containers are forcibly stopped. If the container handles the SIGTERM gracefully and exits within 30 seconds from receiving it, no SIGKILL is sent. When the service scheduler launches new tasks, it determines task placement in your cluster with the following logic. Determine which of the container instances in your cluster can support your service's task definition. For example, they have the required CPU, memory, ports, and container instance attributes. By default, the service scheduler attempts to balance tasks across Availability Zones in this manner even though you can choose a different placement strategy. Sort the valid container instances by the fewest number of running tasks for this service in the same Availability Zone as the instance. For example, if zone A has one running service task and zones B and C each have zero, valid container instances in either zone B or C are considered optimal for placement. Place the new service task on a valid container instance in an optimal Availability Zone (based on the previous steps), favoring container instances with the fewest number of running tasks for this service. When the service scheduler stops running tasks, it attempts to maintain balance across the Availability Zones in your cluster using the following logic: Sort the container instances by the largest number of running tasks for this service in the same Availability Zone as the instance. For example, if zone A has one running service task and zones B and C each have two, container instances in either zone B or C are considered optimal for termination. Stop the task on a container instance in an optimal Availability Zone (based on the previous steps), favoring container instances with the largest number of running tasks for this service."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerServiceV20141113.UpdateService
            default: AmazonEC2ContainerServiceV20141113.UpdateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                cluster:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the cluster that your service runs on. If you do not specify a cluster, the default cluster is assumed. You can't change the cluster name.
                service:
                  $ref: "#/components/schemas/String"
                  description: The name of the service to update.
                desiredCount:
                  $ref: "#/components/schemas/BoxedInteger"
                  description: The number of instantiations of the task to place and keep running in your service. This parameter doesn't trigger a new service deployment.
                taskDefinition:
                  $ref: "#/components/schemas/String"
                  description: The family and revision (family:revision) or full ARN of the task definition to run in your service. If a revision is not specified, the latest ACTIVE revision is used. If you modify the task definition with UpdateService, Amazon ECS spawns a task with the new version of the task definition and then stops an old task after the new version is running. This parameter triggers a new service deployment.
                capacityProviderStrategy:
                  $ref: "#/components/schemas/CapacityProviderStrategy"
                  description: "The details of a capacity provider strategy. You can set a capacity provider when you create a cluster, run a task, or update a service. If you want to use Amazon ECS Managed Instances, you must use the capacityProviderStrategy request parameter. When you use Fargate, the capacity providers are FARGATE or FARGATE_SPOT. When you use Amazon EC2, the capacity providers are Auto Scaling groups. You can change capacity providers for rolling deployments and blue/green deployments. The following list provides the valid transitions: Update the Fargate launch type to an Auto Scaling group capacity provider. Update the Amazon EC2 launch type to a Fargate capacity provider. Update the Fargate capacity provider to an Auto Scaling group capacity provider. Update the Amazon EC2 capacity provider to a Fargate capacity provider. Update the Auto Scaling group or Fargate capacity provider back to the launch type. Pass an empty list in the capacityProviderStrategy parameter. For information about Amazon Web Services CDK considerations, see Amazon Web Services CDK considerations. This parameter doesn't trigger a new service deployment."
                deploymentConfiguration:
                  $ref: "#/components/schemas/DeploymentConfiguration"
                  description: Optional deployment parameters that control how many tasks run during the deployment and the ordering of stopping and starting tasks. This parameter doesn't trigger a new service deployment.
                availabilityZoneRebalancing:
                  $ref: "#/components/schemas/AvailabilityZoneRebalancing"
                  description: "Indicates whether to use Availability Zone rebalancing for the service. For more information, see Balancing an Amazon ECS service across Availability Zones in the Amazon Elastic Container Service Developer Guide . The default behavior of AvailabilityZoneRebalancing differs between create and update requests: For create service requests, when no value is specified for AvailabilityZoneRebalancing, Amazon ECS defaults the value to ENABLED. For update service requests, when no value is specified for AvailabilityZoneRebalancing, Amazon ECS defaults to the existing service’s AvailabilityZoneRebalancing value. If the service never had an AvailabilityZoneRebalancing value set, Amazon ECS treats this as DISABLED. This parameter doesn't trigger a new service deployment."
                networkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                  description: An object representing the network configuration for the service. This parameter triggers a new service deployment.
                placementConstraints:
                  $ref: "#/components/schemas/PlacementConstraints"
                  description: An array of task placement constraint objects to update the service to use. If no value is specified, the existing placement constraints for the service will remain unchanged. If this value is specified, it will override any existing placement constraints defined for the service. To remove all existing placement constraints, specify an empty array. You can specify a maximum of 10 constraints for each task. This limit includes constraints in the task definition and those specified at runtime. This parameter doesn't trigger a new service deployment.
                placementStrategy:
                  $ref: "#/components/schemas/PlacementStrategies"
                  description: The task placement strategy objects to update the service to use. If no value is specified, the existing placement strategy for the service will remain unchanged. If this value is specified, it will override the existing placement strategy defined for the service. To remove an existing placement strategy, specify an empty object. You can specify a maximum of five strategy rules for each service. This parameter doesn't trigger a new service deployment.
                platformVersion:
                  $ref: "#/components/schemas/String"
                  description: The platform version that your tasks in the service run on. A platform version is only specified for tasks using the Fargate launch type. If a platform version is not specified, the LATEST platform version is used. For more information, see Fargate Platform Versions in the Amazon Elastic Container Service Developer Guide. This parameter triggers a new service deployment.
                forceNewDeployment:
                  $ref: "#/components/schemas/Boolean"
                  description: Determines whether to force a new deployment of the service. By default, deployments aren't forced. You can use this option to start a new deployment with no service definition changes. For example, you can update a service's tasks to use a newer Docker image with the same image/tag combination (my_image:latest) or to roll Fargate tasks onto a newer platform version.
                healthCheckGracePeriodSeconds:
                  $ref: "#/components/schemas/BoxedInteger"
                  description: The period of time, in seconds, that the Amazon ECS service scheduler ignores unhealthy Elastic Load Balancing, VPC Lattice, and container health checks after a task has first started. If you don't specify a health check grace period value, the default value of 0 is used. If you don't use any of the health checks, then healthCheckGracePeriodSeconds is unused. If your service's tasks take a while to start and respond to health checks, you can specify a health check grace period of up to 2,147,483,647 seconds (about 69 years). During that time, the Amazon ECS service scheduler ignores health check status. This grace period can prevent the service scheduler from marking tasks as unhealthy and stopping them before they have time to come up. If your service has more running tasks than desired, unhealthy tasks in the grace period might be stopped to reach the desired count. This parameter doesn't trigger a new service deployment.
                deploymentController:
                  $ref: "#/components/schemas/DeploymentController"
                enableExecuteCommand:
                  $ref: "#/components/schemas/BoxedBoolean"
                  description: If true, this enables execute command functionality on all task containers. If you do not want to override the value that was set when the service was created, you can set this to null when performing this action. This parameter doesn't trigger a new service deployment.
                enableECSManagedTags:
                  $ref: "#/components/schemas/BoxedBoolean"
                  description: Determines whether to turn on Amazon ECS managed tags for the tasks in the service. For more information, see Tagging Your Amazon ECS Resources in the Amazon Elastic Container Service Developer Guide. Only tasks launched after the update will reflect the update. To update the tags on all tasks, set forceNewDeployment to true, so that Amazon ECS starts new tasks with the updated tags. This parameter doesn't trigger a new service deployment.
                loadBalancers:
                  $ref: "#/components/schemas/LoadBalancers"
                  description: You must have a service-linked role when you update this property A list of Elastic Load Balancing load balancer objects. It contains the load balancer name, the container name, and the container port to access from the load balancer. The container name is as it appears in a container definition. When you add, update, or remove a load balancer configuration, Amazon ECS starts new tasks with the updated Elastic Load Balancing configuration, and then stops the old tasks when the new tasks are running. For services that use rolling updates, you can add, update, or remove Elastic Load Balancing target groups. You can update from a single target group to multiple target groups and from multiple target groups to a single target group. For services that use blue/green deployments, you can update Elastic Load Balancing target groups by using CreateDeployment through CodeDeploy. Note that multiple target groups are not supported for blue/green deployments. For more information see Register multiple target groups with a service in the Amazon Elastic Container Service Developer Guide. For services that use the external deployment controller, you can add, update, or remove load balancers by using CreateTaskSet. Note that multiple target groups are not supported for external deployments. For more information see Register multiple target groups with a service in the Amazon Elastic Container Service Developer Guide. You can remove existing loadBalancers by passing an empty list. This parameter triggers a new service deployment.
                propagateTags:
                  $ref: "#/components/schemas/PropagateTags"
                  description: Determines whether to propagate the tags from the task definition or the service to the task. If no value is specified, the tags aren't propagated. Only tasks launched after the update will reflect the update. To update the tags on all tasks, set forceNewDeployment to true, so that Amazon ECS starts new tasks with the updated tags. This parameter doesn't trigger a new service deployment.
                serviceRegistries:
                  $ref: "#/components/schemas/ServiceRegistries"
                  description: You must have a service-linked role when you update this property. For more information about the role see the CreateService request parameter role . The details for the service discovery registries to assign to this service. For more information, see Service Discovery. When you add, update, or remove the service registries configuration, Amazon ECS starts new tasks with the updated service registries configuration, and then stops the old tasks when the new tasks are running. You can remove existing serviceRegistries by passing an empty list. This parameter triggers a new service deployment.
                serviceConnectConfiguration:
                  $ref: "#/components/schemas/ServiceConnectConfiguration"
                  description: The configuration for this service to discover and connect to services, and be discovered by, and connected from, other services within a namespace. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide. This parameter triggers a new service deployment.
                volumeConfigurations:
                  $ref: "#/components/schemas/ServiceVolumeConfigurations"
                  description: The details of the volume that was configuredAtLaunch. You can configure the size, volumeType, IOPS, throughput, snapshot and encryption in ServiceManagedEBSVolumeConfiguration. The name of the volume must match the name from the task definition. If set to null, no new deployment is triggered. Otherwise, if this configuration differs from the existing one, it triggers a new deployment. This parameter triggers a new service deployment.
                vpcLatticeConfigurations:
                  $ref: "#/components/schemas/VpcLatticeConfigurations"
                  description: An object representing the VPC Lattice configuration for the service being updated. This parameter triggers a new service deployment.
              required:
                - service
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceResponse"
  /UpdateServicePrimaryTaskSet:
    post:
      operationId: UpdateServicePrimaryTaskSet
      description: Modifies which task set in a service is the primary task set. Any parameters that are updated on the primary task set in a service will transition to the service. This is used when a service uses the EXTERNAL deployment controller type. For more information, see Amazon ECS Deployment Types in the Amazon Elastic Container Service Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerServiceV20141113.UpdateServicePrimaryTaskSet
            default: AmazonEC2ContainerServiceV20141113.UpdateServicePrimaryTaskSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                cluster:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the cluster that hosts the service that the task set exists in.
                service:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the service that the task set exists in.
                primaryTaskSet:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the task set to set as the primary task set in the deployment.
              required:
                - cluster
                - service
                - primaryTaskSet
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServicePrimaryTaskSetResponse"
  /UpdateTaskProtection:
    post:
      operationId: UpdateTaskProtection
      description: Updates the protection status of a task. You can set protectionEnabled to true to protect your task from termination during scale-in events from Service Autoscaling or deployments. Task-protection, by default, expires after 2 hours at which point Amazon ECS clears the protectionEnabled property making the task eligible for termination by a subsequent scale-in event. You can specify a custom expiration period for task protection from 1 minute to up to 2,880 minutes (48 hours). To specify the custom expiration period, set the expiresInMinutes property. The expiresInMinutes property is always reset when you invoke this operation for a task that already has protectionEnabled set to true. You can keep extending the protection expiration period of a task by invoking this operation repeatedly. To learn more about Amazon ECS task protection, see Task scale-in protection in the Amazon Elastic Container Service Developer Guide . This operation is only supported for tasks belonging to an Amazon ECS service. Invoking this operation for a standalone task will result in an TASK_NOT_VALID failure. For more information, see API failure reasons. If you prefer to set task protection from within the container, we recommend using the Task scale-in protection endpoint.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerServiceV20141113.UpdateTaskProtection
            default: AmazonEC2ContainerServiceV20141113.UpdateTaskProtection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                cluster:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the cluster that hosts the service that the task sets exist in.
                tasks:
                  $ref: "#/components/schemas/StringList"
                  description: A list of up to 10 task IDs or full ARN entries.
                protectionEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Specify true to mark a task for protection and false to unset protection, making it eligible for termination.
                expiresInMinutes:
                  $ref: "#/components/schemas/BoxedInteger"
                  description: If you set protectionEnabled to true, you can specify the duration for task protection in minutes. You can specify a value from 1 minute to up to 2,880 minutes (48 hours). During this time, your task will not be terminated by scale-in events from Service Auto Scaling or deployments. After this time period lapses, protectionEnabled will be reset to false. If you don’t specify the time, then the task is automatically protected for 120 minutes (2 hours).
              required:
                - cluster
                - tasks
                - protectionEnabled
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTaskProtectionResponse"
  /UpdateTaskSet:
    post:
      operationId: UpdateTaskSet
      description: Modifies a task set. This is used when a service uses the EXTERNAL deployment controller type. For more information, see Amazon ECS Deployment Types in the Amazon Elastic Container Service Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonEC2ContainerServiceV20141113.UpdateTaskSet
            default: AmazonEC2ContainerServiceV20141113.UpdateTaskSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                cluster:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the cluster that hosts the service that the task set is found in.
                service:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the service that the task set is found in.
                taskSet:
                  $ref: "#/components/schemas/String"
                  description: The short name or full Amazon Resource Name (ARN) of the task set to update.
                scale:
                  $ref: "#/components/schemas/Scale"
                  description: A floating-point percentage of the desired number of tasks to place and keep running in the task set.
              required:
                - cluster
                - service
                - taskSet
                - scale
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTaskSetResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    AutoScalingGroupProvider:
      description: The details of the Auto Scaling group for the capacity provider.
      type: object
      properties:
        autoScalingGroupArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies the Auto Scaling group, or the Auto Scaling group name.
        managedScaling:
          $ref: "#/components/schemas/ManagedScaling"
          description: The managed scaling settings for the Auto Scaling group capacity provider.
        managedTerminationProtection:
          $ref: "#/components/schemas/ManagedTerminationProtection"
          description: The managed termination protection setting to use for the Auto Scaling group capacity provider. This determines whether the Auto Scaling group has managed termination protection. The default is off. When using managed termination protection, managed scaling must also be used otherwise managed termination protection doesn't work. When managed termination protection is on, Amazon ECS prevents the Amazon EC2 instances in an Auto Scaling group that contain tasks from being terminated during a scale-in action. The Auto Scaling group and each instance in the Auto Scaling group must have instance protection from scale-in actions on as well. For more information, see Instance Protection in the Auto Scaling User Guide. When managed termination protection is off, your Amazon EC2 instances aren't protected from termination when the Auto Scaling group scales in.
        managedDraining:
          $ref: "#/components/schemas/ManagedDraining"
          description: The managed draining option for the Auto Scaling group capacity provider. When you enable this, Amazon ECS manages and gracefully drains the EC2 container instances that are in the Auto Scaling group capacity provider.
      required:
        - autoScalingGroupArn
    ManagedScaling:
      description: The managed scaling settings for the Auto Scaling group capacity provider. When managed scaling is turned on, Amazon ECS manages the scale-in and scale-out actions of the Auto Scaling group. Amazon ECS manages a target tracking scaling policy using an Amazon ECS managed CloudWatch metric with the specified targetCapacity value as the target value for the metric. For more information, see Using managed scaling in the Amazon Elastic Container Service Developer Guide. If managed scaling is off, the user must manage the scaling of the Auto Scaling group.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ManagedScalingStatus"
          description: Determines whether to use managed scaling for the capacity provider.
        targetCapacity:
          $ref: "#/components/schemas/ManagedScalingTargetCapacity"
          description: The target capacity utilization as a percentage for the capacity provider. The specified value must be greater than 0 and less than or equal to 100. For example, if you want the capacity provider to maintain 10% spare capacity, then that means the utilization is 90%, so use a targetCapacity of 90. The default value of 100 percent results in the Amazon EC2 instances in your Auto Scaling group being completely used.
        minimumScalingStepSize:
          $ref: "#/components/schemas/ManagedScalingStepSize"
          description: The minimum number of Amazon EC2 instances that Amazon ECS will scale out at one time. The scale in process is not affected by this parameter If this parameter is omitted, the default value of 1 is used. When additional capacity is required, Amazon ECS will scale up the minimum scaling step size even if the actual demand is less than the minimum scaling step size.
        maximumScalingStepSize:
          $ref: "#/components/schemas/ManagedScalingStepSize"
          description: The maximum number of Amazon EC2 instances that Amazon ECS will scale out at one time. If this parameter is omitted, the default value of 10000 is used.
        instanceWarmupPeriod:
          $ref: "#/components/schemas/ManagedScalingInstanceWarmupPeriod"
          description: The period of time, in seconds, after a newly launched Amazon EC2 instance can contribute to CloudWatch metrics for Auto Scaling group. If this parameter is omitted, the default value of 300 seconds is used.
    ManagedScalingStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ManagedScalingTargetCapacity:
      type: integer
      minimum: 1
      maximum: 100
    ManagedScalingStepSize:
      type: integer
      minimum: 1
      maximum: 10000
    ManagedScalingInstanceWarmupPeriod:
      type: integer
      minimum: 0
      maximum: 10000
    ManagedTerminationProtection:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ManagedDraining:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateManagedInstancesProviderConfiguration:
      description: The configuration for creating a Amazon ECS Managed Instances provider. This specifies how Amazon ECS should manage Amazon EC2 instances, including the infrastructure role, instance launch template, and whether to propagate tags from the capacity provider to the instances.
      type: object
      properties:
        infrastructureRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the infrastructure role that Amazon ECS uses to manage instances on your behalf. This role must have permissions to launch, terminate, and manage Amazon EC2 instances, as well as access to other Amazon Web Services services required for Amazon ECS Managed Instances functionality. For more information, see Amazon ECS infrastructure IAM role in the Amazon ECS Developer Guide.
        instanceLaunchTemplate:
          $ref: "#/components/schemas/InstanceLaunchTemplate"
          description: The launch template configuration that specifies how Amazon ECS should launch Amazon EC2 instances. This includes the instance profile, network configuration, storage settings, and instance requirements for attribute-based instance type selection. For more information, see Store instance launch parameters in Amazon EC2 launch templates in the Amazon EC2 User Guide.
        propagateTags:
          $ref: "#/components/schemas/PropagateMITags"
          description: Specifies whether to propagate tags from the capacity provider to the Amazon ECS Managed Instances. When enabled, tags applied to the capacity provider are automatically applied to all instances launched by this provider.
        infrastructureOptimization:
          $ref: "#/components/schemas/InfrastructureOptimization"
          description: Defines how Amazon ECS Managed Instances optimizes the infrastastructure in your capacity provider. Provides control over the delay between when EC2 instances become idle or underutilized and when Amazon ECS optimizes them.
        autoRepairConfiguration:
          $ref: "#/components/schemas/AutoRepairConfiguration"
          description: The auto repair configuration for the Amazon ECS Managed Instances capacity provider. Use this to enable or disable automatic replacement of container instances that are detected as unhealthy.
      required:
        - infrastructureRoleArn
        - instanceLaunchTemplate
    InstanceLaunchTemplate:
      description: The launch template configuration for Amazon ECS Managed Instances. This defines how Amazon ECS launches Amazon EC2 instances, including the instance profile for your tasks, network and storage configuration, capacity options, and instance requirements for flexible instance type selection.
      type: object
      properties:
        ec2InstanceProfileArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the instance profile that Amazon ECS applies to Amazon ECS Managed Instances. This instance profile must include the necessary permissions for your tasks to access Amazon Web Services services and resources. For more information, see Amazon ECS instance profile for Managed Instances in the Amazon ECS Developer Guide.
        networkConfiguration:
          $ref: "#/components/schemas/ManagedInstancesNetworkConfiguration"
          description: The network configuration for Amazon ECS Managed Instances. This specifies the subnets and security groups that instances use for network connectivity.
        storageConfiguration:
          $ref: "#/components/schemas/ManagedInstancesStorageConfiguration"
          description: The storage configuration for Amazon ECS Managed Instances. This defines the data volume properties for the instances.
        localStorageConfiguration:
          $ref: "#/components/schemas/ManagedInstancesLocalStorageConfiguration"
          description: The local storage configuration for Amazon ECS Managed Instances. This defines how ECS uses instance store volumes available on the container instance.
        monitoring:
          $ref: "#/components/schemas/ManagedInstancesMonitoringOptions"
          description: "CloudWatch provides two categories of monitoring: basic monitoring and detailed monitoring. By default, your managed instance is configured for basic monitoring. You can optionally enable detailed monitoring to help you more quickly identify and act on operational issues. You can enable or turn off detailed monitoring at launch or when the managed instance is running or stopped. For more information, see Detailed monitoring for Amazon ECS Managed Instances in the Amazon ECS Developer Guide."
        capacityOptionType:
          $ref: "#/components/schemas/CapacityOptionType"
          description: "The capacity option type. This determines whether Amazon ECS launches On-Demand, Spot or Capacity Reservation Instances for your managed instance capacity provider. Valid values are: ON_DEMAND - Launches standard On-Demand Instances. On-Demand Instances provide predictable pricing and availability. SPOT - Launches Spot Instances that use spare Amazon EC2 capacity at reduced cost. Spot Instances can be interrupted by Amazon EC2 with a two-minute notification when the capacity is needed back. RESERVED - Launches Instances using Amazon EC2 Capacity Reservations. Capacity Reservations allow you to reserve compute capacity for Amazon EC2 instances in a specific Availability Zone. The default is On-Demand For more information about Amazon EC2 capacity options, see Instance purchasing options in the Amazon EC2 User Guide."
        instanceMetadataTagsPropagation:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether tags are propagated to the instance metadata service (IMDS) for Amazon EC2 instances launched by the Managed Instances capacity provider. When enabled, all tags associated with the instance are available through the instance metadata service. When disabled, tags are not propagated to IMDS. Disable this setting if your tags contain characters that are not compatible with IMDS, such as /. IMDS requires tag keys to match the pattern [0-9a-zA-Z\-_+=,.@:]{1,255}. The default value is true. For more information, see Work with instance tags in instance metadata in the Amazon EC2 User Guide.
        instanceRequirements:
          $ref: "#/components/schemas/InstanceRequirementsRequest"
          description: "The instance requirements. You can specify: The instance types Instance requirements such as vCPU count, memory, network performance, and accelerator specifications Amazon ECS automatically selects the instances that match the specified criteria."
        fipsEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether to enable FIPS 140-2 validated cryptographic modules on EC2 instances launched by the capacity provider. If true, instances use FIPS-compliant cryptographic algorithms and modules for enhanced security compliance. If false, instances use standard cryptographic implementations. If not specified, instances are launched with FIPS enabled in Amazon Web Services GovCloud (US) regions and FIPS disabled in other regions.
        capacityReservations:
          $ref: "#/components/schemas/CapacityReservationRequest"
          description: "Capacity reservation specifications. You can specify: Capacity reservation preference Reservation resource group to be used for targeted capacity reservations Amazon ECS will launch instances according to the specified criteria."
      required:
        - ec2InstanceProfileArn
        - networkConfiguration
    ManagedInstancesNetworkConfiguration:
      description: The network configuration for Amazon ECS Managed Instances. This specifies the VPC subnets and security groups that instances use for network connectivity. Amazon ECS Managed Instances support multiple network modes including awsvpc (instances receive ENIs for task isolation), host (instances share network namespace with tasks), and none (no external network connectivity), ensuring backward compatibility for migrating workloads from Fargate or Amazon EC2.
      type: object
      properties:
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The list of subnet IDs where Amazon ECS can launch Amazon ECS Managed Instances. Instances are distributed across the specified subnets for high availability. All subnets must be in the same VPC.
        securityGroups:
          $ref: "#/components/schemas/StringList"
          description: The list of security group IDs to apply to Amazon ECS Managed Instances. These security groups control the network traffic allowed to and from the instances.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ManagedInstancesStorageConfiguration:
      description: The storage configuration for Amazon ECS Managed Instances. This defines the data volume configuration for the instances.
      type: object
      properties:
        storageSizeGiB:
          $ref: "#/components/schemas/TaskVolumeStorageGiB"
          description: The size of the data volume.
    TaskVolumeStorageGiB:
      type: integer
      minimum: 1
    ManagedInstancesLocalStorageConfiguration:
      description: The local storage configuration for Amazon ECS Managed Instances. This defines how ECS uses and configures instance store volumes available on container instance.
      type: object
      properties:
        useLocalStorage:
          $ref: "#/components/schemas/Boolean"
          description: Use instance store volumes for data storage when available. EBS volumes are not provisioned for data storage. If the container instance has multiple instance store volumes, a single data volume is created. Consider defining instance store requirements using the localStorage, localStorageTypes and totalLocalStorageGB properties.
    Boolean:
      type: boolean
    ManagedInstancesMonitoringOptions:
      type: string
      enum:
        - BASIC
        - DETAILED
    CapacityOptionType:
      type: string
      enum:
        - ON_DEMAND
        - SPOT
        - RESERVED
    BoxedBoolean:
      type: boolean
    InstanceRequirementsRequest:
      description: The instance requirements for attribute-based instance type selection. Instead of specifying exact instance types, you define requirements such as vCPU count, memory size, network performance, and accelerator specifications. Amazon ECS automatically selects Amazon EC2 instance types that match these requirements, providing flexibility and helping to mitigate capacity constraints.
      type: object
      properties:
        vCpuCount:
          $ref: "#/components/schemas/VCpuCountRangeRequest"
          description: The minimum and maximum number of vCPUs for the instance types. Amazon ECS selects instance types that have vCPU counts within this range.
        memoryMiB:
          $ref: "#/components/schemas/MemoryMiBRequest"
          description: The minimum and maximum amount of memory in mebibytes (MiB) for the instance types. Amazon ECS selects instance types that have memory within this range.
        cpuManufacturers:
          $ref: "#/components/schemas/CpuManufacturerSet"
          description: The CPU manufacturers to include or exclude. You can specify intel, amd, or amazon-web-services to control which CPU types are used for your workloads.
        memoryGiBPerVCpu:
          $ref: "#/components/schemas/MemoryGiBPerVCpuRequest"
          description: The minimum and maximum amount of memory per vCPU in gibibytes (GiB). This helps ensure that instance types have the appropriate memory-to-CPU ratio for your workloads.
        excludedInstanceTypes:
          $ref: "#/components/schemas/ExcludedInstanceTypeSet"
          description: The instance types to exclude from selection. Use this to prevent Amazon ECS from selecting specific instance types that may not be suitable for your workloads.
        instanceGenerations:
          $ref: "#/components/schemas/InstanceGenerationSet"
          description: The instance generations to include. You can specify current to use the latest generation instances, or previous to include previous generation instances for cost optimization.
        spotMaxPricePercentageOverLowestPrice:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum price for Spot instances as a percentage over the lowest priced On-Demand instance. This helps control Spot instance costs while maintaining access to capacity.
        onDemandMaxPricePercentageOverLowestPrice:
          $ref: "#/components/schemas/BoxedInteger"
          description: The price protection threshold for On-Demand Instances, as a percentage higher than an identified On-Demand price. The identified On-Demand price is the price of the lowest priced current generation C, M, or R instance type with your specified attributes. If no current generation C, M, or R instance type matches your attributes, then the identified price is from either the lowest priced current generation instance types or, failing that, the lowest priced previous generation instance types that match your attributes. When Amazon ECS selects instance types with your attributes, we will exclude instance types whose price exceeds your specified threshold.
        bareMetal:
          $ref: "#/components/schemas/BareMetal"
          description: Indicates whether to include bare metal instance types. Set to included to allow bare metal instances, excluded to exclude them, or required to use only bare metal instances.
        burstablePerformance:
          $ref: "#/components/schemas/BurstablePerformance"
          description: Indicates whether to include burstable performance instance types (T2, T3, T3a, T4g). Set to included to allow burstable instances, excluded to exclude them, or required to use only burstable instances.
        requireHibernateSupport:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether the instance types must support hibernation. When set to true, only instance types that support hibernation are selected.
        networkInterfaceCount:
          $ref: "#/components/schemas/NetworkInterfaceCountRequest"
          description: The minimum and maximum number of network interfaces for the instance types. This is useful for workloads that require multiple network interfaces.
        localStorage:
          $ref: "#/components/schemas/LocalStorage"
          description: Indicates whether to include instance types with local storage. Set to included to allow local storage, excluded to exclude it, or required to use only instances with local storage.
        localStorageTypes:
          $ref: "#/components/schemas/LocalStorageTypeSet"
          description: The local storage types to include. You can specify hdd for hard disk drives, ssd for solid state drives, or both.
        totalLocalStorageGB:
          $ref: "#/components/schemas/TotalLocalStorageGBRequest"
          description: The minimum and maximum total local storage in gigabytes (GB) for instance types with local storage.
        baselineEbsBandwidthMbps:
          $ref: "#/components/schemas/BaselineEbsBandwidthMbpsRequest"
          description: The minimum and maximum baseline Amazon EBS bandwidth in megabits per second (Mbps). This is important for workloads with high storage I/O requirements.
        acceleratorTypes:
          $ref: "#/components/schemas/AcceleratorTypeSet"
          description: The accelerator types to include. You can specify gpu for graphics processing units, fpga for field programmable gate arrays, or inference for machine learning inference accelerators.
        acceleratorCount:
          $ref: "#/components/schemas/AcceleratorCountRequest"
          description: The minimum and maximum number of accelerators for the instance types. This is used when you need instances with specific numbers of GPUs or other accelerators.
        acceleratorManufacturers:
          $ref: "#/components/schemas/AcceleratorManufacturerSet"
          description: The accelerator manufacturers to include. You can specify nvidia, amd, amazon-web-services, or xilinx depending on your accelerator requirements.
        acceleratorNames:
          $ref: "#/components/schemas/AcceleratorNameSet"
          description: The specific accelerator names to include. For example, you can specify a100, v100, k80, or other specific accelerator models.
        acceleratorTotalMemoryMiB:
          $ref: "#/components/schemas/AcceleratorTotalMemoryMiBRequest"
          description: The minimum and maximum total accelerator memory in mebibytes (MiB). This is important for GPU workloads that require specific amounts of video memory.
        networkBandwidthGbps:
          $ref: "#/components/schemas/NetworkBandwidthGbpsRequest"
          description: The minimum and maximum network bandwidth in gigabits per second (Gbps). This is crucial for network-intensive workloads that require high throughput.
        allowedInstanceTypes:
          $ref: "#/components/schemas/AllowedInstanceTypeSet"
          description: The instance types to include in the selection. When specified, Amazon ECS only considers these instance types, subject to the other requirements specified.
        maxSpotPriceAsPercentageOfOptimalOnDemandPrice:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum price for Spot instances as a percentage of the optimal On-Demand price. This provides more precise cost control for Spot instance selection.
      required:
        - vCpuCount
        - memoryMiB
    VCpuCountRangeRequest:
      description: The minimum and maximum number of vCPUs for instance type selection. This allows you to specify a range of vCPU counts that meet your workload requirements.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum number of vCPUs. Instance types with fewer vCPUs than this value are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum number of vCPUs. Instance types with more vCPUs than this value are excluded from selection.
      required:
        - min
    BoxedInteger:
      type: integer
    MemoryMiBRequest:
      description: The minimum and maximum amount of memory in mebibytes (MiB) for instance type selection. This ensures that selected instance types have adequate memory for your workloads.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum amount of memory in MiB. Instance types with less memory than this value are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum amount of memory in MiB. Instance types with more memory than this value are excluded from selection.
      required:
        - min
    CpuManufacturerSet:
      type: array
      items:
        $ref: "#/components/schemas/CpuManufacturer"
    CpuManufacturer:
      type: string
      enum:
        - intel
        - amd
        - amazon-web-services
    MemoryGiBPerVCpuRequest:
      description: The minimum and maximum amount of memory per vCPU in gibibytes (GiB). This helps ensure that instance types have the appropriate memory-to-CPU ratio for your workloads.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedDouble"
          description: The minimum amount of memory per vCPU in GiB. Instance types with a lower memory-to-vCPU ratio are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedDouble"
          description: The maximum amount of memory per vCPU in GiB. Instance types with a higher memory-to-vCPU ratio are excluded from selection.
    BoxedDouble:
      type: number
      format: double
    ExcludedInstanceTypeSet:
      type: array
      items:
        $ref: "#/components/schemas/ExcludedInstanceType"
    ExcludedInstanceType:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-zA-Z0-9\\.\\*\\-]+"
    InstanceGenerationSet:
      type: array
      items:
        $ref: "#/components/schemas/InstanceGeneration"
    InstanceGeneration:
      type: string
      enum:
        - current
        - previous
    BareMetal:
      type: string
      enum:
        - included
        - required
        - excluded
    BurstablePerformance:
      type: string
      enum:
        - included
        - required
        - excluded
    NetworkInterfaceCountRequest:
      description: The minimum and maximum number of network interfaces for instance type selection. This is useful for workloads that require multiple network interfaces.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum number of network interfaces. Instance types that support fewer network interfaces are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum number of network interfaces. Instance types that support more network interfaces are excluded from selection.
    LocalStorage:
      type: string
      enum:
        - included
        - required
        - excluded
    LocalStorageTypeSet:
      type: array
      items:
        $ref: "#/components/schemas/LocalStorageType"
    LocalStorageType:
      type: string
      enum:
        - hdd
        - ssd
    TotalLocalStorageGBRequest:
      description: The minimum and maximum total local storage in gigabytes (GB) for instance types with local storage. This is useful for workloads that require local storage for temporary data or caching.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedDouble"
          description: The minimum total local storage in GB. Instance types with less local storage are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedDouble"
          description: The maximum total local storage in GB. Instance types with more local storage are excluded from selection.
    BaselineEbsBandwidthMbpsRequest:
      description: The minimum and maximum baseline Amazon EBS bandwidth in megabits per second (Mbps) for instance type selection. This is important for workloads with high storage I/O requirements.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum baseline Amazon EBS bandwidth in Mbps. Instance types with lower Amazon EBS bandwidth are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum baseline Amazon EBS bandwidth in Mbps. Instance types with higher Amazon EBS bandwidth are excluded from selection.
    AcceleratorTypeSet:
      type: array
      items:
        $ref: "#/components/schemas/AcceleratorType"
    AcceleratorType:
      type: string
      enum:
        - gpu
        - fpga
        - inference
    AcceleratorCountRequest:
      description: The minimum and maximum number of accelerators (such as GPUs) for instance type selection. This is used for workloads that require specific numbers of accelerators.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum number of accelerators. Instance types with fewer accelerators are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum number of accelerators. Instance types with more accelerators are excluded from selection.
    AcceleratorManufacturerSet:
      type: array
      items:
        $ref: "#/components/schemas/AcceleratorManufacturer"
    AcceleratorManufacturer:
      type: string
      enum:
        - amazon-web-services
        - amd
        - nvidia
        - xilinx
        - habana
    AcceleratorNameSet:
      type: array
      items:
        $ref: "#/components/schemas/AcceleratorName"
    AcceleratorName:
      type: string
      enum:
        - a100
        - inferentia
        - k520
        - k80
        - m60
        - radeon-pro-v520
        - t4
        - vu9p
        - v100
        - a10g
        - h100
        - t4g
    AcceleratorTotalMemoryMiBRequest:
      description: The minimum and maximum total accelerator memory in mebibytes (MiB) for instance type selection. This is important for GPU workloads that require specific amounts of video memory.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum total accelerator memory in MiB. Instance types with less accelerator memory are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum total accelerator memory in MiB. Instance types with more accelerator memory are excluded from selection.
    NetworkBandwidthGbpsRequest:
      description: The minimum and maximum network bandwidth in gigabits per second (Gbps) for instance type selection. This is important for network-intensive workloads.
      type: object
      properties:
        min:
          $ref: "#/components/schemas/BoxedDouble"
          description: The minimum network bandwidth in Gbps. Instance types with lower network bandwidth are excluded from selection.
        max:
          $ref: "#/components/schemas/BoxedDouble"
          description: The maximum network bandwidth in Gbps. Instance types with higher network bandwidth are excluded from selection.
    AllowedInstanceTypeSet:
      type: array
      items:
        $ref: "#/components/schemas/AllowedInstanceType"
    AllowedInstanceType:
      type: string
      minLength: 1
      maxLength: 30
      pattern: "[a-zA-Z0-9\\.\\*\\-]+"
    CapacityReservationRequest:
      description: The Capacity Reservation configurations to be used when using the RESERVED capacity option type.
      type: object
      properties:
        reservationGroupArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the Capacity Reservation resource group in which to run the instance.
        reservationPreference:
          $ref: "#/components/schemas/CapacityReservationPreference"
          description: "The preference on when capacity reservations should be used. Valid values are: RESERVATIONS_ONLY - Exclusively launch instances into capacity reservations that match the instance requirements configured for the capacity provider. If none exist, instances will fail to provision. RESERVATIONS_FIRST - Prefer to launch instances into a capacity reservation if any exist that match the instance requirements configured for the capacity provider. If none exist, fall back to launching instances On-Demand. RESERVATIONS_EXCLUDED - Avoid using capacity reservations and launch exclusively On-Demand."
    CapacityReservationPreference:
      type: string
      enum:
        - RESERVATIONS_ONLY
        - RESERVATIONS_FIRST
        - RESERVATIONS_EXCLUDED
    PropagateMITags:
      type: string
      enum:
        - CAPACITY_PROVIDER
        - NONE
    InfrastructureOptimization:
      description: The configuration that controls how Amazon ECS optimizes your infrastructure.
      type: object
      properties:
        scaleInAfter:
          $ref: "#/components/schemas/BoxedInteger"
          description: "This parameter defines the number of seconds Amazon ECS Managed Instances waits before optimizing EC2 instances that have become idle or underutilized. A longer delay increases the likelihood of placing new tasks on idle or underutilized instances instances, reducing startup time. A shorter delay helps reduce infrastructure costs by optimizing idle or underutilized instances,instances more quickly. Valid values are: null - Uses the default optimization behavior. -1 - Disables automatic infrastructure optimization. A value between 0 and 3600 (inclusive) - Specifies the number of seconds to wait before optimizing instances."
    AutoRepairConfiguration:
      description: The auto repair configuration for an Amazon ECS Managed Instances capacity provider. When enabled, Amazon ECS automatically replaces container instances that are detected as unhealthy based on container instance health checks, including accelerated compute device and daemon health checks.
      type: object
      properties:
        actionsStatus:
          $ref: "#/components/schemas/AutoRepairActionsStatus"
          description: The status of auto repair actions for the capacity provider. When set to ENABLED, Amazon ECS automatically replaces container instances with an IMPAIRED health status. When set to DISABLED, Amazon ECS still monitors container instance health but does not automatically replace impaired instances.
    AutoRepairActionsStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    Tags:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "The metadata that you apply to a resource to help you categorize and organize them. Each tag consists of a key and an optional value. You define them. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that make up a tag. A key is a general label that acts like a category for more specific tag values.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The optional part of a key-value pair that make up a tag. A value acts as a descriptor within a tag category (key).
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    CreateCapacityProviderResponse:
      type: object
      properties:
        capacityProvider:
          $ref: "#/components/schemas/CapacityProvider"
          description: The full description of the new capacity provider.
    CapacityProvider:
      description: The details for a capacity provider.
      type: object
      properties:
        capacityProviderArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies the capacity provider.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the capacity provider.
        cluster:
          $ref: "#/components/schemas/String"
          description: The cluster that this capacity provider is associated with. Managed instances capacity providers are cluster-scoped, meaning they can only be used within their associated cluster. This is required for Managed instances.
        status:
          $ref: "#/components/schemas/CapacityProviderStatus"
          description: The current status of the capacity provider. Only capacity providers in an ACTIVE state can be used in a cluster. When a capacity provider is successfully deleted, it has an INACTIVE status.
        autoScalingGroupProvider:
          $ref: "#/components/schemas/AutoScalingGroupProvider"
          description: The Auto Scaling group settings for the capacity provider.
        managedInstancesProvider:
          $ref: "#/components/schemas/ManagedInstancesProvider"
          description: The configuration for the Amazon ECS Managed Instances provider. This includes the infrastructure role, the launch template configuration, and tag propagation settings.
        updateStatus:
          $ref: "#/components/schemas/CapacityProviderUpdateStatus"
          description: The update status of the capacity provider. The following are the possible states that is returned. DELETE_IN_PROGRESS The capacity provider is in the process of being deleted. DELETE_COMPLETE The capacity provider was successfully deleted and has an INACTIVE status. DELETE_FAILED The capacity provider can't be deleted. The update status reason provides further details about why the delete failed.
        updateStatusReason:
          $ref: "#/components/schemas/String"
          description: The update status reason. This provides further details about the update status for the capacity provider.
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that you apply to the capacity provider to help you categorize and organize it. Each tag consists of a key and an optional value. You define both. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        type_:
          $ref: "#/components/schemas/CapacityProviderType"
          description: The type of capacity provider. For Amazon ECS Managed Instances, this value is MANAGED_INSTANCES, indicating that Amazon ECS manages the underlying Amazon EC2 instances on your behalf.
    CapacityProviderStatus:
      type: string
      enum:
        - PROVISIONING
        - ACTIVE
        - DEPROVISIONING
        - INACTIVE
    ManagedInstancesProvider:
      description: The configuration for a Amazon ECS Managed Instances provider. Amazon ECS uses this configuration to automatically launch, manage, and terminate Amazon EC2 instances on your behalf. Managed instances provide access to the full range of Amazon EC2 instance types and features while offloading infrastructure management to Amazon Web Services.
      type: object
      properties:
        infrastructureRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the infrastructure role that Amazon ECS assumes to manage instances. This role must include permissions for Amazon EC2 instance lifecycle management, networking, and any additional Amazon Web Services services required for your workloads. For more information, see Amazon ECS infrastructure IAM role in the Amazon ECS Developer Guide.
        instanceLaunchTemplate:
          $ref: "#/components/schemas/InstanceLaunchTemplate"
          description: The launch template that defines how Amazon ECS launches Amazon ECS Managed Instances. This includes the instance profile for your tasks, network and storage configuration, and instance requirements that determine which Amazon EC2 instance types can be used. For more information, see Store instance launch parameters in Amazon EC2 launch templates in the Amazon EC2 User Guide.
        propagateTags:
          $ref: "#/components/schemas/PropagateMITags"
          description: Determines whether tags from the capacity provider are automatically applied to Amazon ECS Managed Instances. This helps with cost allocation and resource management by ensuring consistent tagging across your infrastructure.
        infrastructureOptimization:
          $ref: "#/components/schemas/InfrastructureOptimization"
          description: Defines how Amazon ECS Managed Instances optimizes the infrastastructure in your capacity provider. Configure it to turn on or off the infrastructure optimization in your capacity provider, and to control the idle or underutilized EC2 instances optimization delay.
        autoRepairConfiguration:
          $ref: "#/components/schemas/AutoRepairConfiguration"
          description: The auto repair configuration for the Amazon ECS Managed Instances capacity provider. Indicates whether Amazon ECS automatically replaces container instances that are detected as unhealthy.
    CapacityProviderUpdateStatus:
      type: string
      enum:
        - CREATE_IN_PROGRESS
        - CREATE_COMPLETE
        - CREATE_FAILED
        - DELETE_IN_PROGRESS
        - DELETE_COMPLETE
        - DELETE_FAILED
        - UPDATE_IN_PROGRESS
        - UPDATE_COMPLETE
        - UPDATE_FAILED
    CapacityProviderType:
      type: string
      enum:
        - EC2_AUTOSCALING
        - MANAGED_INSTANCES
        - FARGATE
        - FARGATE_SPOT
    ClusterSettings:
      type: array
      items:
        $ref: "#/components/schemas/ClusterSetting"
    ClusterSetting:
      description: The settings to use when creating a cluster. This parameter is used to turn on CloudWatch Container Insights with enhanced observability or CloudWatch Container Insights for a cluster. Container Insights with enhanced observability provides all the Container Insights metrics, plus additional task and container metrics. This version supports enhanced observability for Amazon ECS clusters using the Amazon EC2 and Fargate launch types. After you configure Container Insights with enhanced observability on Amazon ECS, Container Insights auto-collects detailed infrastructure telemetry from the cluster level down to the container level in your environment and displays these critical performance data in curated dashboards removing the heavy lifting in observability set-up. For more information, see Monitor Amazon ECS containers using Container Insights with enhanced observability in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ClusterSettingName"
          description: The name of the cluster setting. The value is containerInsights.
        value:
          $ref: "#/components/schemas/String"
          description: The value to set for the cluster setting. The supported values are enhanced, enabled, and disabled. To use Container Insights with enhanced observability, set the containerInsights account setting to enhanced. To use Container Insights, set the containerInsights account setting to enabled. If a cluster value is specified, it will override the containerInsights value set with PutAccountSetting or PutAccountSettingDefault.
    ClusterSettingName:
      type: string
      enum:
        - containerInsights
    ClusterConfiguration:
      description: The execute command and managed storage configuration for the cluster.
      type: object
      properties:
        executeCommandConfiguration:
          $ref: "#/components/schemas/ExecuteCommandConfiguration"
          description: The details of the execute command configuration.
        managedStorageConfiguration:
          $ref: "#/components/schemas/ManagedStorageConfiguration"
          description: The details of the managed storage configuration.
    ExecuteCommandConfiguration:
      description: The details of the execute command configuration.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: Specify an Key Management Service key ID to encrypt the data between the local client and the container.
        logging:
          $ref: "#/components/schemas/ExecuteCommandLogging"
          description: "The log setting to use for redirecting logs for your execute command results. The following log settings are available. NONE: The execute command session is not logged. DEFAULT: The awslogs configuration in the task definition is used. If no logging parameter is specified, it defaults to this value. If no awslogs log driver is configured in the task definition, the output won't be logged. OVERRIDE: Specify the logging details as a part of logConfiguration. If the OVERRIDE logging option is specified, the logConfiguration is required."
        logConfiguration:
          $ref: "#/components/schemas/ExecuteCommandLogConfiguration"
          description: The log configuration for the results of the execute command actions. The logs can be sent to CloudWatch Logs or an Amazon S3 bucket. When logging=OVERRIDE is specified, a logConfiguration must be provided.
    ExecuteCommandLogging:
      type: string
      enum:
        - NONE
        - DEFAULT
        - OVERRIDE
    ExecuteCommandLogConfiguration:
      description: The log configuration for the results of the execute command actions. The logs can be sent to CloudWatch Logs or an Amazon S3 bucket.
      type: object
      properties:
        cloudWatchLogGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch log group to send logs to. The CloudWatch log group must already be created.
        cloudWatchEncryptionEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to use encryption on the CloudWatch logs. If not specified, encryption will be off.
        s3BucketName:
          $ref: "#/components/schemas/String"
          description: The name of the S3 bucket to send logs to. The S3 bucket must already be created.
        s3EncryptionEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to use encryption on the S3 logs. If not specified, encryption is not used.
        s3KeyPrefix:
          $ref: "#/components/schemas/String"
          description: An optional folder in the S3 bucket to place logs in.
    ManagedStorageConfiguration:
      description: The managed storage configuration for the cluster.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: "Specify a Key Management Service key ID to encrypt Amazon ECS managed storage. When you specify a kmsKeyId, Amazon ECS uses the key to encrypt data volumes managed by Amazon ECS that are attached to tasks in the cluster. The following data volumes are managed by Amazon ECS: Amazon EBS. For more information about encryption of Amazon EBS volumes attached to Amazon ECS tasks, see Encrypt data stored in Amazon EBS volumes for Amazon ECS in the Amazon Elastic Container Service Developer Guide. The key must be a single Region key."
        fargateEphemeralStorageKmsKeyId:
          $ref: "#/components/schemas/String"
          description: Specify the Key Management Service key ID for Fargate ephemeral storage. When you specify a fargateEphemeralStorageKmsKeyId, Amazon Web Services Fargate uses the key to encrypt data at rest in ephemeral storage. For more information about Fargate ephemeral storage encryption, see Customer managed keys for Amazon Web Services Fargate ephemeral storage for Amazon ECS in the Amazon Elastic Container Service Developer Guide. The key must be a single Region key.
    CapacityProviderStrategy:
      type: array
      items:
        $ref: "#/components/schemas/CapacityProviderStrategyItem"
    CapacityProviderStrategyItem:
      description: The details of a capacity provider strategy. A capacity provider strategy can be set when using the RunTaskor CreateCluster APIs or as the default capacity provider strategy for a cluster with the CreateCluster API. Only capacity providers that are already associated with a cluster and have an ACTIVE or UPDATING status can be used in a capacity provider strategy. The PutClusterCapacityProviders API is used to associate a capacity provider with a cluster. If specifying a capacity provider that uses an Auto Scaling group, the capacity provider must already be created. New Auto Scaling group capacity providers can be created with the CreateClusterCapacityProvider API operation. To use a Fargate capacity provider, specify either the FARGATE or FARGATE_SPOT capacity providers. The Fargate capacity providers are available to all accounts and only need to be associated with a cluster to be used in a capacity provider strategy. With FARGATE_SPOT, you can run interruption tolerant tasks at a rate that's discounted compared to the FARGATE price. FARGATE_SPOT runs tasks on spare compute capacity. When Amazon Web Services needs the capacity back, your tasks are interrupted with a two-minute warning. FARGATE_SPOT supports Linux tasks with the X86_64 architecture on platform version 1.3.0 or later. FARGATE_SPOT supports Linux tasks with the ARM64 architecture on platform version 1.4.0 or later. A capacity provider strategy can contain a maximum of 20 capacity providers.
      type: object
      properties:
        capacityProvider:
          $ref: "#/components/schemas/String"
          description: The short name of the capacity provider.
        weight:
          $ref: "#/components/schemas/CapacityProviderStrategyItemWeight"
          description: "The weight value designates the relative percentage of the total number of tasks launched that should use the specified capacity provider. The weight value is taken into consideration after the base value, if defined, is satisfied. If no weight value is specified, the default value of 0 is used. When multiple capacity providers are specified within a capacity provider strategy, at least one of the capacity providers must have a weight value greater than zero and any capacity providers with a weight of 0 can't be used to place tasks. If you specify multiple capacity providers in a strategy that all have a weight of 0, any RunTask or CreateService actions using the capacity provider strategy will fail. Weight value characteristics: Weight is considered after the base value is satisfied The default value is 0 if not specified The valid range is 0 to 1,000 At least one capacity provider must have a weight greater than zero Capacity providers with weight of 0 cannot place tasks Task distribution logic: Base satisfaction: The minimum number of tasks specified by the base value are placed on that capacity provider Weight distribution: After base requirements are met, additional tasks are distributed according to weight ratios Examples: Equal Distribution: Two capacity providers both with weight 1 will split tasks evenly after base requirements are met. Weighted Distribution: If capacityProviderA has weight 1 and capacityProviderB has weight 4, then for every 1 task on A, 4 tasks will run on B."
        base:
          $ref: "#/components/schemas/CapacityProviderStrategyItemBase"
          description: "The base value designates how many tasks, at a minimum, to run on the specified capacity provider for each service. Only one capacity provider in a capacity provider strategy can have a base defined. If no value is specified, the default value of 0 is used. Base value characteristics: Only one capacity provider in a strategy can have a base defined The default value is 0 if not specified The valid range is 0 to 100,000 Base requirements are satisfied first before weight distribution"
      required:
        - capacityProvider
    CapacityProviderStrategyItemWeight:
      type: integer
      minimum: 0
      maximum: 1000
    CapacityProviderStrategyItemBase:
      type: integer
      minimum: 0
      maximum: 100000
    ClusterServiceConnectDefaultsRequest:
      description: Use this parameter to set a default Service Connect namespace. After you set a default Service Connect namespace, any new services with Service Connect turned on that are created in the cluster are added as client services in the namespace. This setting only applies to new services that set the enabled parameter to true in the ServiceConnectConfiguration. You can set the namespace of each service individually in the ServiceConnectConfiguration to override this default parameter. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/String"
          description: The namespace name or full Amazon Resource Name (ARN) of the Cloud Map namespace that's used when you create a service and don't specify a Service Connect configuration. The namespace name can include up to 1024 characters. The name is case-sensitive. The name can't include greater than (>), less than (<), double quotation marks ("), or slash (/). If you enter an existing namespace name or ARN, then that namespace will be used. Any namespace type is supported. The namespace must be in this account and this Amazon Web Services Region. If you enter a new name, a Cloud Map namespace will be created. Amazon ECS creates a Cloud Map namespace with the "API calls" method of instance discovery only. This instance discovery method is the "HTTP" namespace type in the Command Line Interface. Other types of instance discovery aren't used by Service Connect. If you update the cluster with an empty string "" for the namespace name, the cluster configuration for Service Connect is removed. Note that the namespace will remain in Cloud Map and must be deleted separately. For more information about Cloud Map, see Working with Services in the Cloud Map Developer Guide.
      required:
        - namespace
    CreateClusterResponse:
      type: object
      properties:
        cluster:
          $ref: "#/components/schemas/Cluster"
          description: The full description of your new cluster.
    Cluster:
      description: A regional grouping of one or more container instances where you can run task requests. Each account receives a default cluster the first time you use the Amazon ECS service, but you may also create other clusters. Clusters may contain more than one instance type simultaneously.
      type: object
      properties:
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies the cluster. For more information about the ARN format, see Amazon Resource Name (ARN) in the Amazon ECS Developer Guide.
        clusterName:
          $ref: "#/components/schemas/String"
          description: A user-generated string that you use to identify your cluster.
        configuration:
          $ref: "#/components/schemas/ClusterConfiguration"
          description: The execute command and managed storage configuration for the cluster.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the cluster. The following are the possible states that are returned. ACTIVE The cluster is ready to accept tasks and if applicable you can register container instances with the cluster. PROVISIONING The cluster has capacity providers that are associated with it and the resources needed for the capacity provider are being created. DEPROVISIONING The cluster has capacity providers that are associated with it and the resources needed for the capacity provider are being deleted. FAILED The cluster has capacity providers that are associated with it and the resources needed for the capacity provider have failed to create. INACTIVE The cluster has been deleted. Clusters with an INACTIVE status may remain discoverable in your account for a period of time. However, this behavior is subject to change in the future. We don't recommend that you rely on INACTIVE clusters persisting.
        registeredContainerInstancesCount:
          $ref: "#/components/schemas/Integer"
          description: The number of container instances registered into the cluster. This includes container instances in both ACTIVE and DRAINING status.
        runningTasksCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the cluster that are in the RUNNING state.
        pendingTasksCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the cluster that are in the PENDING state.
        activeServicesCount:
          $ref: "#/components/schemas/Integer"
          description: The number of services that are running on the cluster in an ACTIVE state. You can view these services with ListServices.
        statistics:
          $ref: "#/components/schemas/Statistics"
          description: "Additional information about your clusters that are separated by launch type. They include the following: runningEC2TasksCount RunningFargateTasksCount pendingEC2TasksCount pendingFargateTasksCount activeEC2ServiceCount activeFargateServiceCount drainingEC2ServiceCount drainingFargateServiceCount"
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that you apply to the cluster to help you categorize and organize them. Each tag consists of a key and an optional value. You define both. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        settings:
          $ref: "#/components/schemas/ClusterSettings"
          description: The settings for the cluster. This parameter indicates whether CloudWatch Container Insights is on or off for a cluster.
        capacityProviders:
          $ref: "#/components/schemas/StringList"
          description: The capacity providers associated with the cluster.
        defaultCapacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The default capacity provider strategy for the cluster. When services or tasks are run in the cluster with no launch type or capacity provider strategy specified, the default capacity provider strategy is used.
        attachments:
          $ref: "#/components/schemas/Attachments"
          description: The resources attached to a cluster. When using a capacity provider with a cluster, the capacity provider and associated resources are returned as cluster attachments.
        attachmentsStatus:
          $ref: "#/components/schemas/String"
          description: The status of the capacity providers associated with the cluster. The following are the states that are returned. UPDATE_IN_PROGRESS The available capacity providers for the cluster are updating. UPDATE_COMPLETE The capacity providers have successfully updated. UPDATE_FAILED The capacity provider updates failed.
        serviceConnectDefaults:
          $ref: "#/components/schemas/ClusterServiceConnectDefaults"
          description: Use this parameter to set a default Service Connect namespace. After you set a default Service Connect namespace, any new services with Service Connect turned on that are created in the cluster are added as client services in the namespace. This setting only applies to new services that set the enabled parameter to true in the ServiceConnectConfiguration. You can set the namespace of each service individually in the ServiceConnectConfiguration to override this default parameter. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
    Integer:
      type: integer
    Statistics:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    KeyValuePair:
      description: A key-value pair object.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the key-value pair. For environment variables, this is the name of the environment variable.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the key-value pair. For environment variables, this is the value of the environment variable.
    Attachments:
      type: array
      items:
        $ref: "#/components/schemas/Attachment"
    Attachment:
      description: An object representing a container instance or task attachment.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the attachment.
        type_:
          $ref: "#/components/schemas/String"
          description: The type of the attachment, such as ElasticNetworkInterface, Service Connect, and AmazonElasticBlockStorage.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the attachment. Valid values are PRECREATED, CREATED, ATTACHING, ATTACHED, DETACHING, DETACHED, DELETED, and FAILED.
        details:
          $ref: "#/components/schemas/AttachmentDetails"
          description: Details of the attachment. For elastic network interfaces, this includes the network interface ID, the MAC address, the subnet ID, and the private IPv4 address. For Service Connect services, this includes portName, clientAliases, discoveryName, and ingressPortOverride. For Elastic Block Storage, this includes roleArn, deleteOnTermination, volumeName, volumeId, and statusReason (only when the attachment fails to create or attach).
    AttachmentDetails:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    ClusterServiceConnectDefaults:
      description: Use this parameter to set a default Service Connect namespace. After you set a default Service Connect namespace, any new services with Service Connect turned on that are created in the cluster are added as client services in the namespace. This setting only applies to new services that set the enabled parameter to true in the ServiceConnectConfiguration. You can set the namespace of each service individually in the ServiceConnectConfiguration to override this default parameter. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/String"
          description: The namespace name or full Amazon Resource Name (ARN) of the Cloud Map namespace. When you create a service and don't specify a Service Connect configuration, this namespace is used.
    DaemonDeploymentConfiguration:
      description: Optional deployment parameters that control how a daemon rolls out updates across container instances.
      type: object
      properties:
        drainPercent:
          $ref: "#/components/schemas/DaemonDrainPercent"
          description: The percentage of container instances to drain simultaneously during a daemon deployment. Valid values are between 0.0 and 100.0.
        alarms:
          $ref: "#/components/schemas/DaemonAlarmConfiguration"
          description: The CloudWatch alarm configuration for the daemon deployment. When alarms are triggered during a deployment, the deployment can be automatically rolled back.
        bakeTimeInMinutes:
          $ref: "#/components/schemas/Integer"
          description: The amount of time (in minutes) to wait after a successful deployment step before proceeding. This allows time to monitor for issues before continuing. The default value is 0.
    DaemonDrainPercent:
      type: number
      format: double
      minimum: 0
      maximum: 100
    DaemonAlarmConfiguration:
      description: The CloudWatch alarm configuration for a daemon. When enabled, CloudWatch alarms determine whether a daemon deployment has failed.
      type: object
      properties:
        alarmNames:
          $ref: "#/components/schemas/StringList"
          description: The CloudWatch alarm names to monitor during a daemon deployment.
        enable:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to use the CloudWatch alarm option in the daemon deployment process. The default value is false.
    DaemonPropagateTags:
      type: string
      enum:
        - DAEMON
        - NONE
    CreateDaemonResponse:
      type: object
      properties:
        daemonArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the daemon.
        status:
          $ref: "#/components/schemas/DaemonStatus"
          description: The status of the daemon.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the daemon was created.
        deploymentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the initial daemon deployment. This deployment places daemon tasks on each container instance of the specified capacity providers.
    DaemonStatus:
      type: string
      enum:
        - ACTIVE
        - DELETE_IN_PROGRESS
    Timestamp:
      type: string
      format: date-time
    ExpressGatewayContainer:
      description: Defines the configuration for the primary container in an Express service. This container receives traffic from the Application Load Balancer and runs your application code. The container configuration includes the container image, port mapping, logging settings, environment variables, and secrets. The container image is the only required parameter, with sensible defaults provided for other settings.
      type: object
      properties:
        image:
          $ref: "#/components/schemas/String"
          description: The image used to start a container. This string is passed directly to the Docker daemon. Images in the Docker Hub registry are available by default. Other repositories are specified with either repository-url/image:tag or repository-url/image@digest. For Express services, the image typically contains a web application that listens on the specified container port. The image can be stored in Amazon ECR, Docker Hub, or any other container registry accessible to your execution role.
        containerPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port number on the container that receives traffic from the load balancer. Default is 80.
        awsLogsConfiguration:
          $ref: "#/components/schemas/ExpressGatewayServiceAwsLogsConfiguration"
          description: The log configuration for the container.
        repositoryCredentials:
          $ref: "#/components/schemas/ExpressGatewayRepositoryCredentials"
          description: The configuration for repository credentials for private registry authentication.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command that is passed to the container.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to the container.
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the container.
      required:
        - image
    ExpressGatewayServiceAwsLogsConfiguration:
      description: Specifies the Amazon CloudWatch Logs configuration for the Express service container.
      type: object
      properties:
        logGroup:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch Logs log group to send container logs to.
        logStreamPrefix:
          $ref: "#/components/schemas/String"
          description: The prefix for the CloudWatch Logs log stream names. The default for an Express service is ecs.
      required:
        - logGroup
        - logStreamPrefix
    ExpressGatewayRepositoryCredentials:
      description: The repository credentials for private registry authentication to pass to the container.
      type: object
      properties:
        credentialsParameter:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the secret containing the private repository credentials.
    EnvironmentVariables:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    SecretList:
      type: array
      items:
        $ref: "#/components/schemas/Secret"
    Secret:
      description: "An object representing the secret to expose to your container. Secrets can be exposed to a container in the following ways: To inject sensitive data into your containers as environment variables, use the secrets container definition parameter. To reference sensitive information in the log configuration of a container, use the secretOptions container definition parameter. For more information, see Specifying sensitive data in the Amazon Elastic Container Service Developer Guide."
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the secret.
        valueFrom:
          $ref: "#/components/schemas/String"
          description: The secret to expose to the container. The supported values are either the full ARN of the Secrets Manager secret or the full ARN of the parameter in the SSM Parameter Store. For information about the require Identity and Access Management permissions, see Required IAM permissions for Amazon ECS secrets (for Secrets Manager) or Required IAM permissions for Amazon ECS secrets (for Systems Manager Parameter store) in the Amazon Elastic Container Service Developer Guide. If the SSM Parameter Store parameter exists in the same Region as the task you're launching, then you can use either the full ARN or name of the parameter. If the parameter exists in a different Region, then the full ARN must be specified.
      required:
        - name
        - valueFrom
    ExpressGatewayServiceNetworkConfiguration:
      description: The network configuration for an Express service. By default, an Express service utilizes subnets and security groups associated with the default VPC.
      type: object
      properties:
        securityGroups:
          $ref: "#/components/schemas/StringList"
          description: The IDs of the security groups associated with the Express service.
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The IDs of the subnets associated with the Express service.
    ExpressGatewayScalingTarget:
      description: Defines the auto-scaling configuration for an Express service. This determines how the service automatically adjusts the number of running tasks based on demand metrics such as CPU utilization, memory utilization, or request count per target. Auto-scaling helps ensure your application can handle varying levels of traffic while optimizing costs by scaling down during low-demand periods. You can specify the minimum and maximum number of tasks, the scaling metric, and the target value for that metric.
      type: object
      properties:
        minTaskCount:
          $ref: "#/components/schemas/BoxedInteger"
          description: The minimum number of tasks to run in the Express service.
        maxTaskCount:
          $ref: "#/components/schemas/BoxedInteger"
          description: The maximum number of tasks to run in the Express service.
        autoScalingMetric:
          $ref: "#/components/schemas/ExpressGatewayServiceScalingMetric"
          description: The metric used for auto-scaling decisions. The default metric used for an Express service is CPUUtilization.
        autoScalingTargetValue:
          $ref: "#/components/schemas/BoxedInteger"
          description: The target value for the auto-scaling metric. The default value for an Express service is 60.
    ExpressGatewayServiceScalingMetric:
      type: string
      enum:
        - AVERAGE_CPU
        - AVERAGE_MEMORY
        - REQUEST_COUNT_PER_TARGET
    CreateExpressGatewayServiceResponse:
      type: object
      properties:
        service:
          $ref: "#/components/schemas/ECSExpressGatewayService"
          description: The full description of your Express service following the create operation.
    ECSExpressGatewayService:
      description: Represents an Express service, which provides a simplified way to deploy containerized web applications on Amazon ECS with managed Amazon Web Services infrastructure. An Express service automatically provisions and manages Application Load Balancers, target groups, security groups, and auto-scaling policies. Express services use a service revision architecture where each service can have multiple active configurations, enabling blue-green deployments and gradual rollouts. The service maintains a list of active configurations and manages the lifecycle of the underlying Amazon Web Services resources.
      type: object
      properties:
        cluster:
          $ref: "#/components/schemas/String"
          description: The short name or full ARN of the cluster that hosts the Express service.
        serviceName:
          $ref: "#/components/schemas/String"
          description: The name of the Express service.
        serviceArn:
          $ref: "#/components/schemas/String"
          description: The ARN that identifies the Express service.
        infrastructureRoleArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the infrastructure role that manages Amazon Web Services resources for the Express service.
        status:
          $ref: "#/components/schemas/ExpressGatewayServiceStatus"
          description: The current status of the Express service.
        currentDeployment:
          $ref: "#/components/schemas/String"
          description: The current deployment configuration for the Express service.
        activeConfigurations:
          $ref: "#/components/schemas/ExpressGatewayServiceConfigurations"
          description: The list of active service configurations for the Express service.
        tags:
          $ref: "#/components/schemas/Tags"
          description: The metadata applied to the Express service.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when the Express service was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when the Express service was last updated.
    ExpressGatewayServiceStatus:
      description: An object that defines the status of Express service creation and information about the status of the service.
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/ExpressGatewayServiceStatusCode"
          description: The status of the Express service.
        statusReason:
          $ref: "#/components/schemas/String"
          description: Information about why the Express service is in the current status.
    ExpressGatewayServiceStatusCode:
      type: string
      enum:
        - ACTIVE
        - DRAINING
        - INACTIVE
    ExpressGatewayServiceConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/ExpressGatewayServiceConfiguration"
    ExpressGatewayServiceConfiguration:
      description: Represents a specific configuration revision of an Express service, containing all the settings and parameters for that revision.
      type: object
      properties:
        serviceRevisionArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the service revision.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the task execution role for the service revision.
        taskRoleArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the task role for the service revision.
        cpu:
          $ref: "#/components/schemas/String"
          description: The CPU allocation for tasks in this service revision.
        memory:
          $ref: "#/components/schemas/String"
          description: The memory allocation for tasks in this service revision.
        networkConfiguration:
          $ref: "#/components/schemas/ExpressGatewayServiceNetworkConfiguration"
          description: The network configuration for tasks in this service revision.
        healthCheckPath:
          $ref: "#/components/schemas/String"
          description: The health check path for this service revision.
        primaryContainer:
          $ref: "#/components/schemas/ExpressGatewayContainer"
          description: The primary container configuration for this service revision.
        scalingTarget:
          $ref: "#/components/schemas/ExpressGatewayScalingTarget"
          description: The auto-scaling configuration for this service revision.
        ingressPaths:
          $ref: "#/components/schemas/IngressPathSummaries"
          description: The entry point into this service revision.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when this service revision was created.
    IngressPathSummaries:
      type: array
      items:
        $ref: "#/components/schemas/IngressPathSummary"
    IngressPathSummary:
      description: The entry point into an Express service.
      type: object
      properties:
        accessType:
          $ref: "#/components/schemas/AccessType"
          description: The type of access to the endpoint for the Express service.
        endpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint for access to the service.
      required:
        - accessType
        - endpoint
    AccessType:
      type: string
      enum:
        - PUBLIC
        - PRIVATE
    AvailabilityZoneRebalancing:
      type: string
      enum:
        - ENABLED
        - DISABLED
    LoadBalancers:
      type: array
      items:
        $ref: "#/components/schemas/LoadBalancer"
    LoadBalancer:
      description: The load balancer configuration to use with a service or task set. When you add, update, or remove a load balancer configuration, Amazon ECS starts a new deployment with the updated Elastic Load Balancing configuration. This causes tasks to register to and deregister from load balancers. We recommend that you verify this on a test environment before you update the Elastic Load Balancing configuration. A service-linked role is required for services that use multiple target groups. For more information, see Using service-linked roles in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        targetGroupArn:
          $ref: "#/components/schemas/String"
          description: The full Amazon Resource Name (ARN) of the Elastic Load Balancing target group or groups associated with a service or task set. A target group ARN is only specified when using an Application Load Balancer or Network Load Balancer. For services using the ECS deployment controller, you can specify one or multiple target groups. For more information, see Registering multiple target groups with a service in the Amazon Elastic Container Service Developer Guide. For services using the CODE_DEPLOY deployment controller, you're required to define two target groups for the load balancer. For more information, see Blue/green deployment with CodeDeploy in the Amazon Elastic Container Service Developer Guide. If your service's task definition uses the awsvpc network mode, you must choose ip as the target type, not instance. Do this when creating your target groups because tasks that use the awsvpc network mode are associated with an elastic network interface, not an Amazon EC2 instance. This network mode is required for the Fargate launch type.
        loadBalancerName:
          $ref: "#/components/schemas/String"
          description: The name of the load balancer to associate with the Amazon ECS service or task set. If you are using an Application Load Balancer or a Network Load Balancer the load balancer name parameter should be omitted.
        containerName:
          $ref: "#/components/schemas/String"
          description: The name of the container (as it appears in a container definition) to associate with the load balancer. You need to specify the container name when configuring the target group for an Amazon ECS load balancer.
        containerPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port on the container to associate with the load balancer. This port must correspond to a containerPort in the task definition the tasks in the service are using. For tasks that use the EC2 launch type, the container instance they're launched on must allow ingress traffic on the hostPort of the port mapping.
        advancedConfiguration:
          $ref: "#/components/schemas/AdvancedConfiguration"
          description: The advanced settings for the load balancer used in blue/green deployments. Specify the alternate target group, listener rules, and IAM role required for traffic shifting during blue/green deployments.
    AdvancedConfiguration:
      description: The advanced settings for a load balancer used in blue/green deployments. Specify the alternate target group, listener rules, and IAM role required for traffic shifting during blue/green deployments. For more information, see Required resources for Amazon ECS blue/green deployments in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        alternateTargetGroupArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the alternate target group for Amazon ECS blue/green deployments.
        productionListenerRule:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that that identifies the production listener rule (in the case of an Application Load Balancer) or listener (in the case for an Network Load Balancer) for routing production traffic.
        testListenerRule:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that identifies ) that identifies the test listener rule (in the case of an Application Load Balancer) or listener (in the case for an Network Load Balancer) for routing test traffic.
        roleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role that grants Amazon ECS permission to call the Elastic Load Balancing APIs for you.
    ServiceRegistries:
      type: array
      items:
        $ref: "#/components/schemas/ServiceRegistry"
    ServiceRegistry:
      description: The details for the service registry. Each service may be associated with one service registry. Multiple service registries for each service are not supported. When you add, update, or remove the service registries configuration, Amazon ECS starts a new deployment. New tasks are registered and deregistered to the updated service registry configuration.
      type: object
      properties:
        registryArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the service registry. The currently supported service registry is Cloud Map. For more information, see CreateService.
        port:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port value used if your service discovery service specified an SRV record. This field might be used if both the awsvpc network mode and SRV records are used.
        containerName:
          $ref: "#/components/schemas/String"
          description: The container name value to be used for your service discovery service. It's already specified in the task definition. If the task definition that your service task specifies uses the bridge or host network mode, you must specify a containerName and containerPort combination from the task definition. If the task definition that your service task specifies uses the awsvpc network mode and a type SRV DNS record is used, you must specify either a containerName and containerPort combination or a port value. However, you can't specify both.
        containerPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port value to be used for your service discovery service. It's already specified in the task definition. If the task definition your service task specifies uses the bridge or host network mode, you must specify a containerName and containerPort combination from the task definition. If the task definition your service task specifies uses the awsvpc network mode and a type SRV DNS record is used, you must specify either a containerName and containerPort combination or a port value. However, you can't specify both.
    LaunchType:
      type: string
      enum:
        - EC2
        - FARGATE
        - EXTERNAL
        - MANAGED_INSTANCES
    DeploymentConfiguration:
      description: Optional deployment parameters that control how many tasks run during a deployment and the ordering of stopping and starting tasks.
      type: object
      properties:
        deploymentCircuitBreaker:
          $ref: "#/components/schemas/DeploymentCircuitBreaker"
          description: The deployment circuit breaker can only be used for services using the rolling update (ECS) deployment type. The deployment circuit breaker determines whether a service deployment will fail if the service can't reach a steady state. If you use the deployment circuit breaker, a service deployment will transition to a failed state and stop launching new tasks. If you use the rollback option, when a service deployment fails, the service is rolled back to the last deployment that completed successfully. For more information, see Rolling update in the Amazon Elastic Container Service Developer Guide
        maximumPercent:
          $ref: "#/components/schemas/BoxedInteger"
          description: If a service is using the rolling update (ECS) deployment type, the maximumPercent parameter represents an upper limit on the number of your service's tasks that are allowed in the RUNNING or PENDING state during a deployment, as a percentage of the desiredCount (rounded down to the nearest integer). This parameter enables you to define the deployment batch size. For example, if your service is using the REPLICA service scheduler and has a desiredCount of four tasks and a maximumPercent value of 200%, the scheduler may start four new tasks before stopping the four older tasks (provided that the cluster resources required to do this are available). The default maximumPercent value for a service using the REPLICA service scheduler is 200%. The Amazon ECS scheduler uses this parameter to replace unhealthy tasks by starting replacement tasks first and then stopping the unhealthy tasks, as long as cluster resources for starting replacement tasks are available. For more information about how the scheduler replaces unhealthy tasks, see Amazon ECS services. If a service is using either the blue/green (CODE_DEPLOY) or EXTERNAL deployment types, and tasks in the service use the EC2 launch type, the maximum percent value is set to the default value. The maximum percent value is used to define the upper limit on the number of the tasks in the service that remain in the RUNNING state while the container instances are in the DRAINING state. You can't specify a custom maximumPercent value for a service that uses either the blue/green (CODE_DEPLOY) or EXTERNAL deployment types and has tasks that use the EC2 launch type. If the service uses either the blue/green (CODE_DEPLOY) or EXTERNAL deployment types, and the tasks in the service use the Fargate launch type, the maximum percent value is not used. The value is still returned when describing your service.
        minimumHealthyPercent:
          $ref: "#/components/schemas/BoxedInteger"
          description: "If a service is using the rolling update (ECS) deployment type, the minimumHealthyPercent represents a lower limit on the number of your service's tasks that must remain in the RUNNING state during a deployment, as a percentage of the desiredCount (rounded up to the nearest integer). This parameter enables you to deploy without using additional cluster capacity. For example, if your service has a desiredCount of four tasks and a minimumHealthyPercent of 50%, the service scheduler may stop two existing tasks to free up cluster capacity before starting two new tasks. If any tasks are unhealthy and if maximumPercent doesn't allow the Amazon ECS scheduler to start replacement tasks, the scheduler stops the unhealthy tasks one-by-one — using the minimumHealthyPercent as a constraint — to clear up capacity to launch replacement tasks. For more information about how the scheduler replaces unhealthy tasks, see Amazon ECS services. For services that do not use a load balancer, the following should be noted: A service is considered healthy if all essential containers within the tasks in the service pass their health checks. If a task has no essential containers with a health check defined, the service scheduler will wait for 40 seconds after a task reaches a RUNNING state before the task is counted towards the minimum healthy percent total. If a task has one or more essential containers with a health check defined, the service scheduler will wait for the task to reach a healthy status before counting it towards the minimum healthy percent total. A task is considered healthy when all essential containers within the task have passed their health checks. The amount of time the service scheduler can wait for is determined by the container health check settings. For services that do use a load balancer, the following should be noted: If a task has no essential containers with a health check defined, the service scheduler will wait for the load balancer target group health check to return a healthy status before counting the task towards the minimum healthy percent total. If a task has an essential container with a health check defined, the service scheduler will wait for both the task to reach a healthy status and the load balancer target group health check to return a healthy status before counting the task towards the minimum healthy percent total. The default value for a replica service for minimumHealthyPercent is 100%. The default minimumHealthyPercent value for a service using the DAEMON service schedule is 0% for the CLI, the Amazon Web Services SDKs, and the APIs and 50% for the Amazon Web Services Management Console. The minimum number of healthy tasks during a deployment is the desiredCount multiplied by the minimumHealthyPercent/100, rounded up to the nearest integer value. If a service is using either the blue/green (CODE_DEPLOY) or EXTERNAL deployment types and is running tasks that use the EC2 launch type, the minimum healthy percent value is set to the default value. The minimum healthy percent value is used to define the lower limit on the number of the tasks in the service that remain in the RUNNING state while the container instances are in the DRAINING state. You can't specify a custom minimumHealthyPercent value for a service that uses either the blue/green (CODE_DEPLOY) or EXTERNAL deployment types and has tasks that use the EC2 launch type. If a service is using either the blue/green (CODE_DEPLOY) or EXTERNAL deployment types and is running tasks that use the Fargate launch type, the minimum healthy percent value is not used, although it is returned when describing your service."
        alarms:
          $ref: "#/components/schemas/DeploymentAlarms"
          description: Information about the CloudWatch alarms.
        strategy:
          $ref: "#/components/schemas/DeploymentStrategy"
          description: "The deployment strategy for the service. Choose from these valid values: ROLLING - When you create a service which uses the rolling update (ROLLING) deployment strategy, the Amazon ECS service scheduler replaces the currently running tasks with new tasks. The number of tasks that Amazon ECS adds or removes from the service during a rolling update is controlled by the service deployment configuration. BLUE_GREEN - A blue/green deployment strategy (BLUE_GREEN) is a release methodology that reduces downtime and risk by running two identical production environments called blue and green. With Amazon ECS blue/green deployments, you can validate new service revisions before directing production traffic to them. This approach provides a safer way to deploy changes with the ability to quickly roll back if needed. LINEAR - A linear deployment strategy (LINEAR) gradually shifts traffic from the current production environment to a new environment in equal percentages over time. With Amazon ECS linear deployments, you can control the pace of traffic shifting and validate new service revisions with increasing amounts of production traffic. CANARY - A canary deployment strategy (CANARY) shifts a small percentage of traffic to the new service revision first, then shifts the remaining traffic all at once after a specified time period. This allows you to test the new version with a subset of users before full deployment."
        bakeTimeInMinutes:
          $ref: "#/components/schemas/BoxedInteger"
          description: The time period when both blue and green service revisions are running simultaneously after the production traffic has shifted. You must provide this parameter when you use the BLUE_GREEN deployment strategy.
        lifecycleHooks:
          $ref: "#/components/schemas/DeploymentLifecycleHookList"
          description: An array of deployment lifecycle hook objects to run custom logic at specific stages of the deployment lifecycle.
        linearConfiguration:
          $ref: "#/components/schemas/LinearConfiguration"
          description: Configuration for linear deployment strategy. Only valid when the deployment strategy is LINEAR. This configuration enables progressive traffic shifting in equal percentage increments with configurable bake times between each step.
        canaryConfiguration:
          $ref: "#/components/schemas/CanaryConfiguration"
          description: Configuration for canary deployment strategy. Only valid when the deployment strategy is CANARY. This configuration enables shifting a fixed percentage of traffic for testing, followed by shifting the remaining traffic after a bake period.
    DeploymentCircuitBreaker:
      description: The deployment circuit breaker can only be used for services using the rolling update (ECS) deployment type. The deployment circuit breaker determines whether a service deployment will fail if the service can't reach a steady state. If it is turned on, a service deployment will transition to a failed state and stop launching new tasks. You can also configure Amazon ECS to roll back your service to the last completed deployment after a failure. For more information, see Rolling update in the Amazon Elastic Container Service Developer Guide. For more information about API failure reasons, see API failure reasons in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        enable:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to use the deployment circuit breaker logic for the service.
        rollback:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to configure Amazon ECS to roll back the service if a service deployment fails. If rollback is on, when a service deployment fails, the service is rolled back to the last deployment that completed successfully.
      required:
        - enable
        - rollback
    DeploymentAlarms:
      description: One of the methods which provide a way for you to quickly identify when a deployment has failed, and then to optionally roll back the failure to the last working deployment. When the alarms are generated, Amazon ECS sets the service deployment to failed. Set the rollback parameter to have Amazon ECS to roll back your service to the last completed deployment after a failure. You can only use the DeploymentAlarms method to detect failures when the DeploymentController is set to ECS. For more information, see Rolling update in the Amazon Elastic Container Service Developer Guide .
      type: object
      properties:
        alarmNames:
          $ref: "#/components/schemas/StringList"
          description: One or more CloudWatch alarm names. Use a "," to separate the alarms.
        rollback:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to configure Amazon ECS to roll back the service if a service deployment fails. If rollback is used, when a service deployment fails, the service is rolled back to the last deployment that completed successfully.
        enable:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to use the CloudWatch alarm option in the service deployment process.
      required:
        - alarmNames
        - rollback
        - enable
    DeploymentStrategy:
      type: string
      enum:
        - ROLLING
        - BLUE_GREEN
        - LINEAR
        - CANARY
    DeploymentLifecycleHookList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentLifecycleHook"
    DeploymentLifecycleHook:
      description: A deployment lifecycle hook runs custom logic at specific stages of the deployment process. Currently, you can use Lambda functions as hook targets. For more information, see Lifecycle hooks for Amazon ECS service deployments in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        hookTargetArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the hook target. Currently, only Lambda function ARNs are supported. You must provide this parameter when configuring a deployment lifecycle hook.
        roleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role that grants Amazon ECS permission to call Lambda functions on your behalf. For more information, see Permissions required for Lambda functions in Amazon ECS blue/green deployments in the Amazon Elastic Container Service Developer Guide.
        lifecycleStages:
          $ref: "#/components/schemas/DeploymentLifecycleHookStageList"
          description: "The lifecycle stages at which to run the hook. Choose from these valid values: RECONCILE_SERVICE The reconciliation stage that only happens when you start a new service deployment with more than 1 service revision in an ACTIVE state. You can use a lifecycle hook for this stage. PRE_SCALE_UP The green service revision has not started. The blue service revision is handling 100% of the production traffic. There is no test traffic. You can use a lifecycle hook for this stage. POST_SCALE_UP The green service revision has started. The blue service revision is handling 100% of the production traffic. There is no test traffic. You can use a lifecycle hook for this stage. TEST_TRAFFIC_SHIFT The blue and green service revisions are running. The blue service revision handles 100% of the production traffic. The green service revision is migrating from 0% to 100% of test traffic. You can use a lifecycle hook for this stage. POST_TEST_TRAFFIC_SHIFT The test traffic shift is complete. The green service revision handles 100% of the test traffic. You can use a lifecycle hook for this stage. PRODUCTION_TRAFFIC_SHIFT Production traffic is shifting to the green service revision. The green service revision is migrating from 0% to 100% of production traffic. You can use a lifecycle hook for this stage. POST_PRODUCTION_TRAFFIC_SHIFT The production traffic shift is complete. You can use a lifecycle hook for this stage. You must provide this parameter when configuring a deployment lifecycle hook."
        hookDetails:
          $ref: "#/components/schemas/HookDetails"
          description: Use this field to specify custom parameters that Amazon ECS will pass to your hook target invocations (such as a Lambda function).
    IAMRoleArn:
      type: string
    DeploymentLifecycleHookStageList:
      type: array
      items:
        $ref: "#/components/schemas/DeploymentLifecycleHookStage"
    DeploymentLifecycleHookStage:
      type: string
      enum:
        - RECONCILE_SERVICE
        - PRE_SCALE_UP
        - POST_SCALE_UP
        - TEST_TRAFFIC_SHIFT
        - POST_TEST_TRAFFIC_SHIFT
        - PRODUCTION_TRAFFIC_SHIFT
        - POST_PRODUCTION_TRAFFIC_SHIFT
    HookDetails:
      type: object
    LinearConfiguration:
      description: Configuration for linear deployment strategy that shifts production traffic in equal percentage increments with configurable wait times between each step until 100% of traffic is shifted to the new service revision. This is only valid when you run CreateService or UpdateService with deploymentController set to ECS and a deploymentConfiguration with a strategy set to LINEAR.
      type: object
      properties:
        stepPercent:
          $ref: "#/components/schemas/Double"
          description: The percentage of production traffic to shift in each step during a linear deployment. Valid values are multiples of 0.1 from 3.0 to 100.0. The default value is 10.0.
        stepBakeTimeInMinutes:
          $ref: "#/components/schemas/Integer"
          description: The amount of time in minutes to wait between each traffic shifting step during a linear deployment. Valid values are 0 to 1440 minutes (24 hours). The default value is 6. This bake time is not applied after reaching 100 percent traffic.
    Double:
      type: number
      format: double
    CanaryConfiguration:
      description: Configuration for a canary deployment strategy that shifts a fixed percentage of traffic to the new service revision, waits for a specified bake time, then shifts the remaining traffic. This is only valid when you run CreateService or UpdateService with deploymentController set to ECS and a deploymentConfiguration with a strategy set to CANARY.
      type: object
      properties:
        canaryPercent:
          $ref: "#/components/schemas/Double"
          description: The percentage of production traffic to shift to the new service revision during the canary phase. Valid values are multiples of 0.1 from 0.1 to 100.0. The default value is 5.0.
        canaryBakeTimeInMinutes:
          $ref: "#/components/schemas/Integer"
          description: The amount of time in minutes to wait during the canary phase before shifting the remaining production traffic to the new service revision. Valid values are 0 to 1440 minutes (24 hours). The default value is 10.
    PlacementConstraints:
      type: array
      items:
        $ref: "#/components/schemas/PlacementConstraint"
    PlacementConstraint:
      description: An object representing a constraint on task placement. For more information, see Task placement constraints in the Amazon Elastic Container Service Developer Guide. If you're using the Fargate launch type, task placement constraints aren't supported.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/PlacementConstraintType"
          description: The type of constraint. Use distinctInstance to ensure that each task in a particular group is running on a different container instance. Use memberOf to restrict the selection to a group of valid candidates.
        expression:
          $ref: "#/components/schemas/String"
          description: A cluster query language expression to apply to the constraint. The expression can have a maximum length of 2000 characters. You can't specify an expression if the constraint type is distinctInstance. For more information, see Cluster query language in the Amazon Elastic Container Service Developer Guide.
    PlacementConstraintType:
      type: string
      enum:
        - distinctInstance
        - memberOf
    PlacementStrategies:
      type: array
      items:
        $ref: "#/components/schemas/PlacementStrategy"
    PlacementStrategy:
      description: The task placement strategy for a task or service. For more information, see Task placement strategies in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/PlacementStrategyType"
          description: The type of placement strategy. The random placement strategy randomly places tasks on available candidates. The spread placement strategy spreads placement across available candidates evenly based on the field parameter. The binpack strategy places tasks on available candidates that have the least available amount of the resource that's specified with the field parameter. For example, if you binpack on memory, a task is placed on the instance with the least amount of remaining memory but still enough to run the task.
        field:
          $ref: "#/components/schemas/String"
          description: The field to apply the placement strategy against. For the spread placement strategy, valid values are instanceId (or host, which has the same effect), or any platform or custom attribute that's applied to a container instance, such as attribute:ecs.availability-zone. For the binpack placement strategy, valid values are cpu and memory. For the random placement strategy, this field is not used.
    PlacementStrategyType:
      type: string
      enum:
        - random
        - spread
        - binpack
    NetworkConfiguration:
      description: The network configuration for a task or service.
      type: object
      properties:
        awsvpcConfiguration:
          $ref: "#/components/schemas/AwsVpcConfiguration"
          description: The VPC subnets and security groups that are associated with a task. All specified subnets and security groups must be from the same VPC.
    AwsVpcConfiguration:
      description: An object representing the networking details for a task or service. For example awsVpcConfiguration={subnets=["subnet-12344321"],securityGroups=["sg-12344321"]}.
      type: object
      properties:
        subnets:
          $ref: "#/components/schemas/StringList"
          description: The IDs of the subnets associated with the task or service. There's a limit of 16 subnets that can be specified. All specified subnets must be from the same VPC.
        securityGroups:
          $ref: "#/components/schemas/StringList"
          description: The IDs of the security groups associated with the task or service. If you don't specify a security group, the default security group for the VPC is used. There's a limit of 5 security groups that can be specified. All specified security groups must be from the same VPC.
        assignPublicIp:
          $ref: "#/components/schemas/AssignPublicIp"
          description: "Whether the task's elastic network interface receives a public IP address. Consider the following when you set this value: When you use create-service or update-service, the default is DISABLED. When the service deploymentController is ECS, the value must be DISABLED."
      required:
        - subnets
    AssignPublicIp:
      type: string
      enum:
        - ENABLED
        - DISABLED
    SchedulingStrategy:
      type: string
      enum:
        - REPLICA
        - DAEMON
    DeploymentController:
      description: The deployment controller to use for the service.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DeploymentControllerType"
          description: "The deployment controller type to use. The deployment controller is the mechanism that determines how tasks are deployed for your service. The valid options are: ECS When you create a service which uses the ECS deployment controller, you can choose between the following deployment strategies: ROLLING: When you create a service which uses the rolling update (ROLLING) deployment strategy, the Amazon ECS service scheduler replaces the currently running tasks with new tasks. The number of tasks that Amazon ECS adds or removes from the service during a rolling update is controlled by the service deployment configuration. Rolling update deployments are best suited for the following scenarios: Gradual service updates: You need to update your service incrementally without taking the entire service offline at once. Limited resource requirements: You want to avoid the additional resource costs of running two complete environments simultaneously (as required by blue/green deployments). Acceptable deployment time: Your application can tolerate a longer deployment process, as rolling updates replace tasks one by one. No need for instant roll back: Your service can tolerate a rollback process that takes minutes rather than seconds. Simple deployment process: You prefer a straightforward deployment approach without the complexity of managing multiple environments, target groups, and listeners. No load balancer requirement: Your service doesn't use or require a load balancer, Application Load Balancer, Network Load Balancer, or Service Connect (which are required for blue/green deployments). Stateful applications: Your application maintains state that makes it difficult to run two parallel environments. Cost sensitivity: You want to minimize deployment costs by not running duplicate environments during deployment. Rolling updates are the default deployment strategy for services and provide a balance between deployment safety and resource efficiency for many common application scenarios. BLUE_GREEN: A blue/green deployment strategy (BLUE_GREEN) is a release methodology that reduces downtime and risk by running two identical production environments called blue and green. With Amazon ECS blue/green deployments, you can validate new service revisions before directing production traffic to them. This approach provides a safer way to deploy changes with the ability to quickly roll back if needed. Amazon ECS blue/green deployments are best suited for the following scenarios: Service validation: When you need to validate new service revisions before directing production traffic to them Zero downtime: When your service requires zero-downtime deployments Instant roll back: When you need the ability to quickly roll back if issues are detected Load balancer requirement: When your service uses Application Load Balancer, Network Load Balancer, or Service Connect External Use a third-party deployment controller. Blue/green deployment (powered by CodeDeploy) CodeDeploy installs an updated version of the application as a new replacement task set and reroutes production traffic from the original application task set to the replacement task set. The original task set is terminated after a successful deployment. Use this deployment controller to verify a new deployment of a service before sending production traffic to it."
      required:
        - type_
    DeploymentControllerType:
      type: string
      enum:
        - ECS
        - CODE_DEPLOY
        - EXTERNAL
    PropagateTags:
      type: string
      enum:
        - TASK_DEFINITION
        - SERVICE
        - NONE
    ServiceConnectConfiguration:
      description: The Service Connect configuration of your Amazon ECS service. The configuration for this service to discover and connect to services, and be discovered by, and connected from, other services within a namespace. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to use Service Connect with this service.
        namespace:
          $ref: "#/components/schemas/String"
          description: The namespace name or full Amazon Resource Name (ARN) of the Cloud Map namespace for use with Service Connect. The namespace must be in the same Amazon Web Services Region as the Amazon ECS service and cluster. The type of namespace doesn't affect Service Connect. For more information about Cloud Map, see Working with Services in the Cloud Map Developer Guide.
        services:
          $ref: "#/components/schemas/ServiceConnectServiceList"
          description: The list of Service Connect service objects. These are names and aliases (also known as endpoints) that are used by other Amazon ECS services to connect to this service. This field is not required for a "client" Amazon ECS service that's a member of a namespace only to connect to other services within the namespace. An example of this would be a frontend application that accepts incoming requests from either a load balancer that's attached to the service or by other means. An object selects a port from the task definition, assigns a name for the Cloud Map service, and a list of aliases (endpoints) and ports for client applications to refer to this service.
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
        accessLogConfiguration:
          $ref: "#/components/schemas/ServiceConnectAccessLogConfiguration"
          description: The configuration for Service Connect access logging. Access logs capture detailed information about requests made to your service, including request patterns, response codes, and timing data. They can be useful for debugging connectivity issues, monitoring service performance, and auditing service-to-service communication for security and compliance purposes. To enable access logs, you must also specify a logConfiguration in the serviceConnectConfiguration.
      required:
        - enabled
    ServiceConnectServiceList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceConnectService"
    ServiceConnectService:
      description: The Service Connect service object configuration. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        portName:
          $ref: "#/components/schemas/String"
          description: The portName must match the name of one of the portMappings from all the containers in the task definition of this Amazon ECS service.
        discoveryName:
          $ref: "#/components/schemas/String"
          description: The discoveryName is the name of the new Cloud Map service that Amazon ECS creates for this Amazon ECS service. This must be unique within the Cloud Map namespace. The name can contain up to 64 characters. The name can include lowercase letters, numbers, underscores (_), and hyphens (-). The name can't start with a hyphen. If the discoveryName isn't specified, the port mapping name from the task definition is used in portName.namespace.
        clientAliases:
          $ref: "#/components/schemas/ServiceConnectClientAliasList"
          description: The list of client aliases for this Service Connect service. You use these to assign names that can be used by client applications. The maximum number of client aliases that you can have in this list is 1. Each alias ("endpoint") is a fully-qualified name and port number that other Amazon ECS tasks ("clients") can use to connect to this service. Each name and port mapping must be unique within the namespace. For each ServiceConnectService, you must provide at least one clientAlias with one port.
        ingressPortOverride:
          $ref: "#/components/schemas/PortNumber"
          description: The port number for the Service Connect proxy to listen on. Use the value of this field to bypass the proxy for traffic on the port number specified in the named portMapping in the task definition of this application, and then use it in your VPC security groups to allow traffic into the proxy for this Amazon ECS service. In awsvpc mode and Fargate, the default value is the container port number. The container port number is in the portMapping in the task definition. In bridge mode, the default value is the ephemeral port of the Service Connect proxy.
        timeout:
          $ref: "#/components/schemas/TimeoutConfiguration"
          description: A reference to an object that represents the configured timeouts for Service Connect.
        tls:
          $ref: "#/components/schemas/ServiceConnectTlsConfiguration"
          description: A reference to an object that represents a Transport Layer Security (TLS) configuration.
      required:
        - portName
    ServiceConnectClientAliasList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceConnectClientAlias"
    ServiceConnectClientAlias:
      description: Each alias ("endpoint") is a fully-qualified name and port number that other tasks ("clients") can use to connect to this service. Each name and port mapping must be unique within the namespace. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        port:
          $ref: "#/components/schemas/PortNumber"
          description: The listening port number for the Service Connect proxy. This port is available inside of all of the tasks within the same namespace. To avoid changing your applications in client Amazon ECS services, set this to the same port that the client application uses by default. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
        dnsName:
          $ref: "#/components/schemas/String"
          description: The dnsName is the name that you use in the applications of client tasks to connect to this service. The name must be a valid DNS name but doesn't need to be fully-qualified. The name can include up to 127 characters. The name can include lowercase letters, numbers, underscores (_), hyphens (-), and periods (.). The name can't start with a hyphen. If this parameter isn't specified, the default value of discoveryName.namespace is used. If the discoveryName isn't specified, the port mapping name from the task definition is used in portName.namespace. To avoid changing your applications in client Amazon ECS services, set this to the same name that the client application uses by default. For example, a few common names are database, db, or the lowercase name of a database, such as mysql or redis. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
        testTrafficRules:
          $ref: "#/components/schemas/ServiceConnectTestTrafficRules"
          description: The configuration for test traffic routing rules used during blue/green deployments with Amazon ECS Service Connect. This allows you to route a portion of traffic to the new service revision of your service for testing before shifting all production traffic.
      required:
        - port
    PortNumber:
      type: integer
      minimum: 0
      maximum: 65535
    ServiceConnectTestTrafficRules:
      description: The test traffic routing configuration for Amazon ECS blue/green deployments. This configuration allows you to define rules for routing specific traffic to the new service revision during the deployment process, allowing for safe testing before full production traffic shift. For more information, see Service Connect for Amazon ECS blue/green deployments in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        header:
          $ref: "#/components/schemas/ServiceConnectTestTrafficHeaderRules"
          description: The HTTP header-based routing rules that determine which requests should be routed to the new service version during blue/green deployment testing. These rules provide fine-grained control over test traffic routing based on request headers.
      required:
        - header
    ServiceConnectTestTrafficHeaderRules:
      description: The HTTP header rules used to identify and route test traffic during Amazon ECS blue/green deployments. These rules specify which HTTP headers to examine and what values to match for routing decisions. For more information, see Service Connect for Amazon ECS blue/green deployments in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the HTTP header to examine for test traffic routing. Common examples include custom headers like X-Test-Version or X-Canary-Request that can be used to identify test traffic.
        value:
          $ref: "#/components/schemas/ServiceConnectTestTrafficHeaderMatchRules"
          description: The header value matching configuration that determines how the HTTP header value is evaluated for test traffic routing decisions.
      required:
        - name
    ServiceConnectTestTrafficHeaderMatchRules:
      description: The header matching rules for test traffic routing in Amazon ECS blue/green deployments. These rules determine how incoming requests are matched based on HTTP headers to route test traffic to the new service revision.
      type: object
      properties:
        exact:
          $ref: "#/components/schemas/String"
          description: The exact value that the HTTP header must match for the test traffic routing rule to apply. This provides precise control over which requests are routed to the new service revision during blue/green deployments.
      required:
        - exact
    TimeoutConfiguration:
      description: An object that represents the timeout configurations for Service Connect. If idleTimeout is set to a time that is less than perRequestTimeout, the connection will close when the idleTimeout is reached and not the perRequestTimeout.
      type: object
      properties:
        idleTimeoutSeconds:
          $ref: "#/components/schemas/Duration"
          description: The amount of time in seconds a connection will stay active while idle. A value of 0 can be set to disable idleTimeout. The idleTimeout default for HTTP/HTTP2/GRPC is 5 minutes. The idleTimeout default for TCP is 1 hour.
        perRequestTimeoutSeconds:
          $ref: "#/components/schemas/Duration"
          description: The amount of time waiting for the upstream to respond with a complete response per request. A value of 0 can be set to disable perRequestTimeout. perRequestTimeout can only be set if Service Connect appProtocol isn't TCP. Only idleTimeout is allowed for TCP appProtocol.
    Duration:
      type: integer
      minimum: 0
      maximum: 2147483647
    ServiceConnectTlsConfiguration:
      description: The key that encrypts and decrypts your resources for Service Connect TLS.
      type: object
      properties:
        issuerCertificateAuthority:
          $ref: "#/components/schemas/ServiceConnectTlsCertificateAuthority"
          description: The signer certificate authority.
        kmsKey:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Key Management Service key.
        roleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role that's associated with the Service Connect TLS.
      required:
        - issuerCertificateAuthority
    ServiceConnectTlsCertificateAuthority:
      description: The certificate root authority that secures your service.
      type: object
      properties:
        awsPcaAuthorityArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the Amazon Web Services Private Certificate Authority certificate.
    LogConfiguration:
      description: The log configuration for the container. This parameter maps to LogConfig in the docker container create command and the --log-driver option to docker run. By default, containers use the same logging driver that the Docker daemon uses. However, the container might use a different logging driver than the Docker daemon by specifying a log driver configuration in the container definition. Understand the following when specifying a log configuration for your containers. Amazon ECS currently supports a subset of the logging drivers available to the Docker daemon. Additional log drivers may be available in future releases of the Amazon ECS container agent. For tasks on Fargate, the supported log drivers are awslogs, splunk, and awsfirelens. For tasks hosted on Amazon EC2 instances, the supported log drivers are awslogs, fluentd, gelf, json-file, journald,syslog, splunk, and awsfirelens. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. For tasks that are hosted on Amazon EC2 instances, the Amazon ECS container agent must register the available logging drivers with the ECS_AVAILABLE_LOGGING_DRIVERS environment variable before containers placed on that instance can use these log configuration options. For more information, see Amazon ECS container agent configuration in the Amazon Elastic Container Service Developer Guide. For tasks that are on Fargate, because you don't have access to the underlying infrastructure your tasks are hosted on, any additional software needed must be installed outside of the task. For example, the Fluentd output aggregators or a remote host running Logstash to send Gelf logs to.
      type: object
      properties:
        logDriver:
          $ref: "#/components/schemas/LogDriver"
          description: The log driver to use for the container. For tasks on Fargate, the supported log drivers are awslogs, splunk, and awsfirelens. For tasks hosted on Amazon EC2 instances, the supported log drivers are awslogs, fluentd, gelf, json-file, journald, syslog, splunk, and awsfirelens. For more information about using the awslogs log driver, see Send Amazon ECS logs to CloudWatch in the Amazon Elastic Container Service Developer Guide. For more information about using the awsfirelens log driver, see Send Amazon ECS logs to an Amazon Web Services service or Amazon Web Services Partner. If you have a custom driver that isn't listed, you can fork the Amazon ECS container agent project that's available on GitHub and customize it to work with that driver. We encourage you to submit pull requests for changes that you would like to have included. However, we don't currently provide support for running modified copies of this software.
        options:
          type: object
          properties: {}
          description: "The configuration options to send to the log driver. The options you can specify depend on the log driver. Some of the options you can specify when you use the awslogs log driver to route logs to Amazon CloudWatch include the following: awslogs-create-group Required: No Specify whether you want the log group to be created automatically. If this option isn't specified, it defaults to false. Your IAM policy must include the logs:CreateLogGroup permission before you attempt to use awslogs-create-group. awslogs-region Required: Yes Specify the Amazon Web Services Region that the awslogs log driver is to send your Docker logs to. You can choose to send all of your logs from clusters in different Regions to a single region in CloudWatch Logs. This is so that they're all visible in one location. Otherwise, you can separate them by Region for more granularity. Make sure that the specified log group exists in the Region that you specify with this option. awslogs-group Required: Yes Make sure to specify a log group that the awslogs log driver sends its log streams to. awslogs-stream-prefix Required: Yes, when using Fargate.Optional when using EC2. Use the awslogs-stream-prefix option to associate a log stream with the specified prefix, the container name, and the ID of the Amazon ECS task that the container belongs to. If you specify a prefix with this option, then the log stream takes the format prefix-name/container-name/ecs-task-id. If you don't specify a prefix with this option, then the log stream is named after the container ID that's assigned by the Docker daemon on the container instance. Because it's difficult to trace logs back to the container that sent them with just the Docker container ID (which is only available on the container instance), we recommend that you specify a prefix with this option. For Amazon ECS services, you can use the service name as the prefix. Doing so, you can trace log streams to the service that the container belongs to, the name of the container that sent them, and the ID of the task that the container belongs to. You must specify a stream-prefix for your logs to have your logs appear in the Log pane when using the Amazon ECS console. awslogs-datetime-format Required: No This option defines a multiline start pattern in Python strftime format. A log message consists of a line that matches the pattern and any following lines that don’t match the pattern. The matched line is the delimiter between log messages. One example of a use case for using this format is for parsing output such as a stack dump, which might otherwise be logged in multiple entries. The correct pattern allows it to be captured in a single entry. For more information, see awslogs-datetime-format. You cannot configure both the awslogs-datetime-format and awslogs-multiline-pattern options. Multiline logging performs regular expression parsing and matching of all log messages. This might have a negative impact on logging performance. awslogs-multiline-pattern Required: No This option defines a multiline start pattern that uses a regular expression. A log message consists of a line that matches the pattern and any following lines that don’t match the pattern. The matched line is the delimiter between log messages. For more information, see awslogs-multiline-pattern. This option is ignored if awslogs-datetime-format is also configured. You cannot configure both the awslogs-datetime-format and awslogs-multiline-pattern options. Multiline logging performs regular expression parsing and matching of all log messages. This might have a negative impact on logging performance. The following options apply to all supported log drivers. mode Required: No Valid values: non-blocking | blocking This option defines the delivery mode of log messages from the container to the log driver specified using logDriver. The delivery mode you choose affects application availability when the flow of logs from container is interrupted. If you use the blocking mode and the flow of logs is interrupted, calls from container code to write to the stdout and stderr streams will block. The logging thread of the application will block as a result. This may cause the application to become unresponsive and lead to container healthcheck failure. If you use the non-blocking mode, the container's logs are instead stored in an in-memory intermediate buffer configured with the max-buffer-size option. This prevents the application from becoming unresponsive when logs cannot be sent. We recommend using this mode if you want to ensure service availability and are okay with some log loss. For more information, see Preventing log loss with non-blocking mode in the awslogs container log driver. You can set a default mode for all containers in a specific Amazon Web Services Region by using the defaultLogDriverMode account setting. If you don't specify the mode option or configure the account setting, Amazon ECS will default to the non-blocking mode. For more information about the account setting, see Default log driver mode in the Amazon Elastic Container Service Developer Guide. On June 25, 2025, Amazon ECS changed the default log driver mode from blocking to non-blocking to prioritize task availability over logging. To continue using the blocking mode after this change, do one of the following: Set the mode option in your container definition's logConfiguration as blocking. Set the defaultLogDriverMode account setting to blocking. max-buffer-size Required: No Default value: 10m When non-blocking mode is used, the max-buffer-size log option controls the size of the buffer that's used for intermediate message storage. Make sure to specify an adequate buffer size based on your application. When the buffer fills up, further logs cannot be stored. Logs that cannot be stored are lost. To route logs using the splunk log router, you need to specify a splunk-token and a splunk-url. When you use the awsfirelens log router to route logs to an Amazon Web Services Service or Amazon Web Services Partner Network destination for log storage and analytics, you can set the log-driver-buffer-limit option to limit the number of events that are buffered in memory, before being sent to the log router container. It can help to resolve potential log loss issue because high throughput might result in memory running out for the buffer inside of Docker. Other options you can specify when using awsfirelens to route logs depend on the destination. When you export logs to Amazon Data Firehose, you can specify the Amazon Web Services Region with region and a name for the log stream with delivery_stream. When you export logs to Amazon Kinesis Data Streams, you can specify an Amazon Web Services Region with region and a data stream name with stream. When you export logs to Amazon OpenSearch Service, you can specify options like Name, Host (OpenSearch Service endpoint without protocol), Port, Index, Type, Aws_auth, Aws_region, Suppress_Type_Name, and tls. For more information, see Under the hood: FireLens for Amazon ECS Tasks. When you export logs to Amazon S3, you can specify the bucket using the bucket option. You can also specify region, total_file_size, upload_timeout, and use_put_object as options. This parameter requires version 1.19 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}'"
        secretOptions:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the log configuration. For more information, see Specifying sensitive data in the Amazon Elastic Container Service Developer Guide.
      required:
        - logDriver
    LogDriver:
      type: string
      enum:
        - json-file
        - syslog
        - journald
        - gelf
        - fluentd
        - awslogs
        - splunk
        - awsfirelens
    ServiceConnectAccessLogConfiguration:
      description: Configuration for Service Connect access logging. Access logs provide detailed information about requests made to your service, including request patterns, response codes, and timing data for debugging and monitoring purposes. To enable access logs, you must also specify a logConfiguration in the serviceConnectConfiguration.
      type: object
      properties:
        format_:
          $ref: "#/components/schemas/ServiceConnectAccessLoggingFormat"
          description: The format for Service Connect access log output. Choose TEXT for human-readable logs or JSON for structured data that integrates well with log analysis tools.
        includeQueryParameters:
          $ref: "#/components/schemas/ServiceConnectIncludeQueryParameters"
          description: Specifies whether to include query parameters in Service Connect access logs. When enabled, query parameters from HTTP requests are included in the access logs. Consider security and privacy implications when enabling this feature, as query parameters may contain sensitive information such as request IDs and tokens. By default, this parameter is DISABLED.
      required:
        - format_
    ServiceConnectAccessLoggingFormat:
      description: The format for Service Connect access log output. Choose TEXT for human-readable logs or JSON for structured data that integrates well with log analysis tools.
      type: string
      enum:
        - TEXT
        - JSON
    ServiceConnectIncludeQueryParameters:
      description: Controls whether query parameters are included in Service Connect access logs. Consider security and privacy implications when enabling this feature. By default, this parameter is DISABLED.
      type: string
      enum:
        - DISABLED
        - ENABLED
    ServiceVolumeConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/ServiceVolumeConfiguration"
    ServiceVolumeConfiguration:
      description: The configuration for a volume specified in the task definition as a volume that is configured at launch time. Currently, the only supported volume type is an Amazon EBS volume.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ECSVolumeName"
          description: The name of the volume. This value must match the volume name from the Volume object in the task definition.
        managedEBSVolume:
          $ref: "#/components/schemas/ServiceManagedEBSVolumeConfiguration"
          description: The configuration for the Amazon EBS volume that Amazon ECS creates and manages on your behalf. These settings are used to create each Amazon EBS volume, with one volume created for each task in the service. The Amazon EBS volumes are visible in your account in the Amazon EC2 console once they are created.
      required:
        - name
    ECSVolumeName:
      type: string
    ServiceManagedEBSVolumeConfiguration:
      description: The configuration for the Amazon EBS volume that Amazon ECS creates and manages on your behalf. These settings are used to create each Amazon EBS volume, with one volume created for each task in the service. For information about the supported launch types and operating systems, see Supported operating systems and launch types in the Amazon Elastic Container Service Developer Guide. Many of these parameters map 1:1 with the Amazon EBS CreateVolume API request parameters.
      type: object
      properties:
        encrypted:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether the volume should be encrypted. If you turn on Region-level Amazon EBS encryption by default but set this value as false, the setting is overridden and the volume is encrypted with the KMS key specified for Amazon EBS encryption by default. This parameter maps 1:1 with the Encrypted parameter of the CreateVolume API in the Amazon EC2 API Reference.
        kmsKeyId:
          $ref: "#/components/schemas/EBSKMSKeyId"
          description: The Amazon Resource Name (ARN) identifier of the Amazon Web Services Key Management Service key to use for Amazon EBS encryption. When a key is specified using this parameter, it overrides Amazon EBS default encryption or any KMS key that you specified for cluster-level managed storage encryption. This parameter maps 1:1 with the KmsKeyId parameter of the CreateVolume API in the Amazon EC2 API Reference. For more information about encrypting Amazon EBS volumes attached to tasks, see Encrypt data stored in Amazon EBS volumes attached to Amazon ECS tasks. Amazon Web Services authenticates the Amazon Web Services Key Management Service key asynchronously. Therefore, if you specify an ID, alias, or ARN that is invalid, the action can appear to complete, but eventually fails.
        volumeType:
          $ref: "#/components/schemas/EBSVolumeType"
          description: "The volume type. This parameter maps 1:1 with the VolumeType parameter of the CreateVolume API in the Amazon EC2 API Reference. For more information, see Amazon EBS volume types in the Amazon EC2 User Guide. The following are the supported volume types. General Purpose SSD: gp2|gp3 Provisioned IOPS SSD: io1|io2 Throughput Optimized HDD: st1 Cold HDD: sc1 Magnetic: standard The magnetic volume type is not supported on Fargate."
        sizeInGiB:
          $ref: "#/components/schemas/BoxedInteger"
          description: "The size of the volume in GiB. You must specify either a volume size or a snapshot ID. If you specify a snapshot ID, the snapshot size is used for the volume size by default. You can optionally specify a volume size greater than or equal to the snapshot size. This parameter maps 1:1 with the Size parameter of the CreateVolume API in the Amazon EC2 API Reference. The following are the supported volume size values for each volume type. gp2 and gp3: 1-16,384 io1 and io2: 4-16,384 st1 and sc1: 125-16,384 standard: 1-1,024"
        snapshotId:
          $ref: "#/components/schemas/EBSSnapshotId"
          description: The snapshot that Amazon ECS uses to create volumes for attachment to tasks maintained by the service. You must specify either snapshotId or sizeInGiB in your volume configuration. This parameter maps 1:1 with the SnapshotId parameter of the CreateVolume API in the Amazon EC2 API Reference.
        volumeInitializationRate:
          $ref: "#/components/schemas/BoxedInteger"
          description: The rate, in MiB/s, at which data is fetched from a snapshot of an existing EBS volume to create new volumes for attachment to the tasks maintained by the service. This property can be specified only if you specify a snapshotId. For more information, see Initialize Amazon EBS volumes in the Amazon EBS User Guide.
        iops:
          $ref: "#/components/schemas/BoxedInteger"
          description: "The number of I/O operations per second (IOPS). For gp3, io1, and io2 volumes, this represents the number of IOPS that are provisioned for the volume. For gp2 volumes, this represents the baseline performance of the volume and the rate at which the volume accumulates I/O credits for bursting. The following are the supported values for each volume type. gp3: 3,000 - 16,000 IOPS io1: 100 - 64,000 IOPS io2: 100 - 256,000 IOPS This parameter is required for io1 and io2 volume types. The default for gp3 volumes is 3,000 IOPS. This parameter is not supported for st1, sc1, or standard volume types. This parameter maps 1:1 with the Iops parameter of the CreateVolume API in the Amazon EC2 API Reference."
        throughput:
          $ref: "#/components/schemas/BoxedInteger"
          description: The throughput to provision for a volume, in MiB/s, with a maximum of 1,000 MiB/s. This parameter maps 1:1 with the Throughput parameter of the CreateVolume API in the Amazon EC2 API Reference. This parameter is only supported for the gp3 volume type.
        tagSpecifications:
          $ref: "#/components/schemas/EBSTagSpecifications"
          description: The tags to apply to the volume. Amazon ECS applies service-managed tags by default. This parameter maps 1:1 with the TagSpecifications.N parameter of the CreateVolume API in the Amazon EC2 API Reference.
        roleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The ARN of the IAM role to associate with this volume. This is the Amazon ECS infrastructure IAM role that is used to manage your Amazon Web Services infrastructure. We recommend using the Amazon ECS-managed AmazonECSInfrastructureRolePolicyForVolumes IAM policy with this role. For more information, see Amazon ECS infrastructure IAM role in the Amazon ECS Developer Guide.
        filesystemType:
          $ref: "#/components/schemas/TaskFilesystemType"
          description: The filesystem type for the volume. For volumes created from a snapshot, you must specify the same filesystem type that the volume was using when the snapshot was created. If there is a filesystem type mismatch, the tasks will fail to start. The available Linux filesystem types are ext3, ext4, and xfs. If no value is specified, the xfs filesystem type is used by default. The available Windows filesystem types are NTFS.
      required:
        - roleArn
    EBSKMSKeyId:
      type: string
    EBSVolumeType:
      type: string
    EBSSnapshotId:
      type: string
    EBSTagSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/EBSTagSpecification"
    EBSTagSpecification:
      description: The tag specifications of an Amazon EBS volume.
      type: object
      properties:
        resourceType:
          $ref: "#/components/schemas/EBSResourceType"
          description: The type of volume resource.
        tags:
          $ref: "#/components/schemas/Tags"
          description: The tags applied to this Amazon EBS volume. AmazonECSCreated and AmazonECSManaged are reserved tags that can't be used.
        propagateTags:
          $ref: "#/components/schemas/PropagateTags"
          description: Determines whether to propagate the tags from the task definition to the Amazon EBS volume. Tags can only propagate to a SERVICE specified in ServiceVolumeConfiguration. If no value is specified, the tags aren't propagated.
      required:
        - resourceType
    EBSResourceType:
      type: string
      enum:
        - volume
    TaskFilesystemType:
      type: string
      enum:
        - ext3
        - ext4
        - xfs
        - ntfs
    VpcLatticeConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/VpcLatticeConfiguration"
    VpcLatticeConfiguration:
      description: The VPC Lattice configuration for your service that holds the information for the target group(s) Amazon ECS tasks will be registered to.
      type: object
      properties:
        roleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The ARN of the IAM role to associate with this VPC Lattice configuration. This is the Amazon ECS infrastructure IAM role that is used to manage your VPC Lattice infrastructure.
        targetGroupArn:
          $ref: "#/components/schemas/String"
          description: The full Amazon Resource Name (ARN) of the target group or groups associated with the VPC Lattice configuration that the Amazon ECS tasks will be registered to.
        portName:
          $ref: "#/components/schemas/String"
          description: The name of the port mapping to register in the VPC Lattice target group. This is the name of the portMapping you defined in your task definition.
      required:
        - roleArn
        - targetGroupArn
        - portName
    CreateServiceResponse:
      type: object
      properties:
        service:
          $ref: "#/components/schemas/Service"
          description: The full description of your service following the create call. A service will return either a capacityProviderStrategy or launchType parameter, but not both, depending where one was specified when it was created. If a service is using the ECS deployment controller, the deploymentController and taskSets parameters will not be returned. if the service uses the CODE_DEPLOY deployment controller, the deploymentController, taskSets and deployments parameters will be returned, however the deployments parameter will be an empty list.
    Service:
      description: Details on a service within a cluster.
      type: object
      properties:
        serviceArn:
          $ref: "#/components/schemas/String"
          description: The ARN that identifies the service. For more information about the ARN format, see Amazon Resource Name (ARN) in the Amazon ECS Developer Guide.
        serviceName:
          $ref: "#/components/schemas/String"
          description: The name of your service. Up to 255 letters (uppercase and lowercase), numbers, underscores, and hyphens are allowed. Service names must be unique within a cluster. However, you can have similarly named services in multiple clusters within a Region or across multiple Regions.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the cluster that hosts the service.
        loadBalancers:
          $ref: "#/components/schemas/LoadBalancers"
          description: A list of Elastic Load Balancing load balancer objects. It contains the load balancer name, the container name, and the container port to access from the load balancer. The container name is as it appears in a container definition.
        serviceRegistries:
          $ref: "#/components/schemas/ServiceRegistries"
          description: The details for the service discovery registries to assign to this service. For more information, see Service Discovery.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the service. The valid values are ACTIVE, DRAINING, or INACTIVE.
        desiredCount:
          $ref: "#/components/schemas/Integer"
          description: The desired number of instantiations of the task definition to keep running on the service. This value is specified when the service is created with CreateService , and it can be modified with UpdateService.
        runningCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the cluster that are in the RUNNING state.
        pendingCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the cluster that are in the PENDING state.
        launchType:
          $ref: "#/components/schemas/LaunchType"
          description: The launch type the service is using. When using the DescribeServices API, this field is omitted if the service was created using a capacity provider strategy.
        capacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy the service uses. When using the DescribeServices API, this field is omitted if the service was created using a launch type.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The platform version to run your service on. A platform version is only specified for tasks that are hosted on Fargate. If one isn't specified, the LATEST platform version is used. For more information, see Fargate Platform Versions in the Amazon Elastic Container Service Developer Guide.
        platformFamily:
          $ref: "#/components/schemas/String"
          description: The operating system that your tasks in the service run on. A platform family is specified only for tasks using the Fargate launch type. All tasks that run as part of this service must use the same platformFamily value as the service (for example, LINUX).
        taskDefinition:
          $ref: "#/components/schemas/String"
          description: The task definition to use for tasks in the service. This value is specified when the service is created with CreateService, and it can be modified with UpdateService.
        deploymentConfiguration:
          $ref: "#/components/schemas/DeploymentConfiguration"
          description: Optional deployment parameters that control how many tasks run during the deployment and the ordering of stopping and starting tasks.
        taskSets:
          $ref: "#/components/schemas/TaskSets"
          description: Information about a set of Amazon ECS tasks in either an CodeDeploy or an EXTERNAL deployment. An Amazon ECS task set includes details such as the desired number of tasks, how many tasks are running, and whether the task set serves production traffic.
        deployments:
          $ref: "#/components/schemas/Deployments"
          description: The current state of deployments for the service.
        roleArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the IAM role that's associated with the service. It allows the Amazon ECS container agent to register container instances with an Elastic Load Balancing load balancer.
        events:
          $ref: "#/components/schemas/ServiceEvents"
          description: The event stream for your service. A maximum of 100 of the latest events are displayed.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the service was created.
        currentServiceDeployment:
          $ref: "#/components/schemas/String"
          description: The ARN of the current service deployment.
        currentServiceRevisions:
          $ref: "#/components/schemas/ServiceCurrentRevisionSummaryList"
          description: The list of the service revisions.
        placementConstraints:
          $ref: "#/components/schemas/PlacementConstraints"
          description: The placement constraints for the tasks in the service.
        placementStrategy:
          $ref: "#/components/schemas/PlacementStrategies"
          description: The placement strategy that determines how tasks for the service are placed.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The VPC subnet and security group configuration for tasks that receive their own elastic network interface by using the awsvpc networking mode.
        healthCheckGracePeriodSeconds:
          $ref: "#/components/schemas/BoxedInteger"
          description: The period of time, in seconds, that the Amazon ECS service scheduler ignores unhealthy Elastic Load Balancing, VPC Lattice, and container health checks after a task has first started. If your service has more running tasks than desired, unhealthy tasks in the grace period might be stopped to reach the desired count.
        schedulingStrategy:
          $ref: "#/components/schemas/SchedulingStrategy"
          description: The scheduling strategy to use for the service. For more information, see Services. There are two service scheduler strategies available. REPLICA-The replica scheduling strategy places and maintains the desired number of tasks across your cluster. By default, the service scheduler spreads tasks across Availability Zones. You can use task placement strategies and constraints to customize task placement decisions. DAEMON-The daemon scheduling strategy deploys exactly one task on each active container instance. This task meets all of the task placement constraints that you specify in your cluster. The service scheduler also evaluates the task placement constraints for running tasks. It stop tasks that don't meet the placement constraints. Fargate tasks don't support the DAEMON scheduling strategy.
        deploymentController:
          $ref: "#/components/schemas/DeploymentController"
          description: The deployment controller type the service is using.
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that you apply to the service to help you categorize and organize them. Each tag consists of a key and an optional value. You define bot the key and value. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        createdBy:
          $ref: "#/components/schemas/String"
          description: The principal that created the service.
        enableECSManagedTags:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether to use Amazon ECS managed tags for the tasks in the service. For more information, see Tagging Your Amazon ECS Resources in the Amazon Elastic Container Service Developer Guide.
        propagateTags:
          $ref: "#/components/schemas/PropagateTags"
          description: Determines whether to propagate the tags from the task definition or the service to the task. If no value is specified, the tags aren't propagated.
        enableExecuteCommand:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether the execute command functionality is turned on for the service. If true, the execute command functionality is turned on for all containers in tasks as part of the service.
        availabilityZoneRebalancing:
          $ref: "#/components/schemas/AvailabilityZoneRebalancing"
          description: "Indicates whether to use Availability Zone rebalancing for the service. For more information, see Balancing an Amazon ECS service across Availability Zones in the Amazon Elastic Container Service Developer Guide . The default behavior of AvailabilityZoneRebalancing differs between create and update requests: For create service requests, when no value is specified for AvailabilityZoneRebalancing, Amazon ECS defaults the value to ENABLED. For update service requests, when no value is specified for AvailabilityZoneRebalancing, Amazon ECS defaults to the existing service’s AvailabilityZoneRebalancing value. If the service never had an AvailabilityZoneRebalancing value set, Amazon ECS treats this as DISABLED."
        resourceManagementType:
          $ref: "#/components/schemas/ResourceManagementType"
          description: Identifies whether an ECS Service is an Express Service managed by ECS, or managed by the customer. The valid values are ECS and CUSTOMER
    TaskSets:
      type: array
      items:
        $ref: "#/components/schemas/TaskSet"
    TaskSet:
      description: Information about a set of Amazon ECS tasks in either an CodeDeploy or an EXTERNAL deployment. An Amazon ECS task set includes details such as the desired number of tasks, how many tasks are running, and whether the task set serves production traffic.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID of the task set.
        taskSetArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the task set.
        serviceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the service the task set exists in.
        clusterArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the cluster that the service that hosts the task set exists in.
        startedBy:
          $ref: "#/components/schemas/String"
          description: The tag specified when a task set is started. If an CodeDeploy deployment created the task set, the startedBy parameter is CODE_DEPLOY. If an external deployment created the task set, the startedBy field isn't used.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID associated with the task set. If an CodeDeploy deployment created a task set, the externalId parameter contains the CodeDeploy deployment ID. If a task set is created for an external deployment and is associated with a service discovery registry, the externalId parameter contains the ECS_TASK_SET_EXTERNAL_ID Cloud Map attribute.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the task set. The following describes each state. PRIMARY The task set is serving production traffic. ACTIVE The task set isn't serving production traffic. DRAINING The tasks in the task set are being stopped, and their corresponding targets are being deregistered from their target group.
        taskDefinition:
          $ref: "#/components/schemas/String"
          description: The task definition that the task set is using.
        computedDesiredCount:
          $ref: "#/components/schemas/Integer"
          description: The computed desired count for the task set. This is calculated by multiplying the service's desiredCount by the task set's scale percentage. The result is always rounded up. For example, if the computed desired count is 1.2, it rounds up to 2 tasks.
        pendingCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the task set that are in the PENDING status during a deployment. A task in the PENDING state is preparing to enter the RUNNING state. A task set enters the PENDING status when it launches for the first time or when it's restarted after being in the STOPPED state.
        runningCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the task set that are in the RUNNING status during a deployment. A task in the RUNNING state is running and ready for use.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task set was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task set was last updated.
        launchType:
          $ref: "#/components/schemas/LaunchType"
          description: The launch type the tasks in the task set are using. For more information, see Amazon ECS launch types in the Amazon Elastic Container Service Developer Guide.
        capacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy that are associated with the task set.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The Fargate platform version where the tasks in the task set are running. A platform version is only specified for tasks run on Fargate. For more information, see Fargate platform versions in the Amazon Elastic Container Service Developer Guide.
        platformFamily:
          $ref: "#/components/schemas/String"
          description: The operating system that your tasks in the set are running on. A platform family is specified only for tasks that use the Fargate launch type. All tasks in the set must have the same value.
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The network configuration for the task set.
        loadBalancers:
          $ref: "#/components/schemas/LoadBalancers"
          description: Details on a load balancer that are used with a task set.
        serviceRegistries:
          $ref: "#/components/schemas/ServiceRegistries"
          description: The details for the service discovery registries to assign to this task set. For more information, see Service discovery.
        scale:
          $ref: "#/components/schemas/Scale"
          description: A floating-point percentage of your desired number of tasks to place and keep running in the task set.
        stabilityStatus:
          $ref: "#/components/schemas/StabilityStatus"
          description: "The stability status. This indicates whether the task set has reached a steady state. If the following conditions are met, the task set are in STEADY_STATE: The task runningCount is equal to the computedDesiredCount. The pendingCount is 0. There are no tasks that are running on container instances in the DRAINING status. All tasks are reporting a healthy status from the load balancers, service discovery, and container health checks. If any of those conditions aren't met, the stability status returns STABILIZING."
        stabilityStatusAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task set stability status was retrieved.
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that you apply to the task set to help you categorize and organize them. Each tag consists of a key and an optional value. You define both. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        fargateEphemeralStorage:
          $ref: "#/components/schemas/DeploymentEphemeralStorage"
          description: The Fargate ephemeral storage settings for the task set.
    Scale:
      description: A floating-point percentage of the desired number of tasks to place and keep running in the task set.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/Double"
          description: The value, specified as a percent total of a service's desiredCount, to scale the task set. Accepted values are numbers between 0 and 100.
        unit:
          $ref: "#/components/schemas/ScaleUnit"
          description: The unit of measure for the scale value.
    ScaleUnit:
      type: string
      enum:
        - PERCENT
    StabilityStatus:
      type: string
      enum:
        - STEADY_STATE
        - STABILIZING
    DeploymentEphemeralStorage:
      description: The amount of ephemeral storage to allocate for the deployment.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/String"
          description: Specify an Key Management Service key ID to encrypt the ephemeral storage for deployment.
    Deployments:
      type: array
      items:
        $ref: "#/components/schemas/Deployment"
    Deployment:
      description: The details of an Amazon ECS service deployment. This is used only when a service uses the ECS deployment controller type.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID of the deployment.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the deployment. The following describes each state. PRIMARY The most recent deployment of a service. ACTIVE A service deployment that still has running tasks, but are in the process of being replaced with a new PRIMARY deployment. INACTIVE A deployment that has been completely replaced.
        taskDefinition:
          $ref: "#/components/schemas/String"
          description: The most recent task definition that was specified for the tasks in the service to use.
        desiredCount:
          $ref: "#/components/schemas/Integer"
          description: The most recent desired count of tasks that was specified for the service to deploy or maintain.
        pendingCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the deployment that are in the PENDING status.
        runningCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks in the deployment that are in the RUNNING status.
        failedTasks:
          $ref: "#/components/schemas/Integer"
          description: The number of consecutively failed tasks in the deployment. A task is considered a failure if the service scheduler can't launch the task, the task doesn't transition to a RUNNING state, or if it fails any of its defined health checks and is stopped. Once a service deployment has one or more successfully running tasks, the failed task count resets to zero and stops being evaluated.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the service deployment was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the service deployment was last updated.
        capacityProviderStrategy:
          $ref: "#/components/schemas/CapacityProviderStrategy"
          description: The capacity provider strategy that the deployment is using.
        launchType:
          $ref: "#/components/schemas/LaunchType"
          description: The launch type the tasks in the service are using. For more information, see Amazon ECS Launch Types in the Amazon Elastic Container Service Developer Guide.
        platformVersion:
          $ref: "#/components/schemas/String"
          description: The platform version that your tasks in the service run on. A platform version is only specified for tasks using the Fargate launch type. If one isn't specified, the LATEST platform version is used. For more information, see Fargate Platform Versions in the Amazon Elastic Container Service Developer Guide.
        platformFamily:
          $ref: "#/components/schemas/String"
          description: The operating system that your tasks in the service, or tasks are running on. A platform family is specified only for tasks using the Fargate launch type. All tasks that run as part of this service must use the same platformFamily value as the service, for example, LINUX..
        networkConfiguration:
          $ref: "#/components/schemas/NetworkConfiguration"
          description: The VPC subnet and security group configuration for tasks that receive their own elastic network interface by using the awsvpc networking mode.
        rolloutState:
          $ref: "#/components/schemas/DeploymentRolloutState"
          description: The rolloutState of a service is only returned for services that use the rolling update (ECS) deployment type that aren't behind a Classic Load Balancer. The rollout state of the deployment. When a service deployment is started, it begins in an IN_PROGRESS state. When the service reaches a steady state, the deployment transitions to a COMPLETED state. If the service fails to reach a steady state and circuit breaker is turned on, the deployment transitions to a FAILED state. A deployment in FAILED state doesn't launch any new tasks. For more information, see DeploymentCircuitBreaker.
        rolloutStateReason:
          $ref: "#/components/schemas/String"
          description: A description of the rollout state of a deployment.
        serviceConnectConfiguration:
          $ref: "#/components/schemas/ServiceConnectConfiguration"
          description: The details of the Service Connect configuration that's used by this deployment. Compare the configuration between multiple deployments when troubleshooting issues with new deployments. The configuration for this service to discover and connect to services, and be discovered by, and connected from, other services within a namespace. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
        serviceConnectResources:
          $ref: "#/components/schemas/ServiceConnectServiceResourceList"
          description: The list of Service Connect resources that are associated with this deployment. Each list entry maps a discovery name to a Cloud Map service name.
        volumeConfigurations:
          $ref: "#/components/schemas/ServiceVolumeConfigurations"
          description: The details of the volume that was configuredAtLaunch. You can configure different settings like the size, throughput, volumeType, and ecryption in ServiceManagedEBSVolumeConfiguration. The name of the volume must match the name from the task definition.
        fargateEphemeralStorage:
          $ref: "#/components/schemas/DeploymentEphemeralStorage"
          description: The Fargate ephemeral storage settings for the deployment.
        vpcLatticeConfigurations:
          $ref: "#/components/schemas/VpcLatticeConfigurations"
          description: The VPC Lattice configuration for the service deployment.
    DeploymentRolloutState:
      type: string
      enum:
        - COMPLETED
        - FAILED
        - IN_PROGRESS
    ServiceConnectServiceResourceList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceConnectServiceResource"
    ServiceConnectServiceResource:
      description: The Service Connect resource. Each configuration maps a discovery name to a Cloud Map service name. The data is stored in Cloud Map as part of the Service Connect configuration for each discovery name of this Amazon ECS service. A task can resolve the dnsName for each of the clientAliases of a service. However a task can't resolve the discovery names. If you want to connect to a service, refer to the ServiceConnectConfiguration of that service for the list of clientAliases that you can use.
      type: object
      properties:
        discoveryName:
          $ref: "#/components/schemas/String"
          description: The discovery name of this Service Connect resource. The discoveryName is the name of the new Cloud Map service that Amazon ECS creates for this Amazon ECS service. This must be unique within the Cloud Map namespace. The name can contain up to 64 characters. The name can include lowercase letters, numbers, underscores (_), and hyphens (-). The name can't start with a hyphen. If the discoveryName isn't specified, the port mapping name from the task definition is used in portName.namespace.
        discoveryArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the service in Cloud Map that matches the discovery name for this Service Connect resource. You can use this ARN in other integrations with Cloud Map. However, Service Connect can't ensure connectivity outside of Amazon ECS.
    ServiceEvents:
      type: array
      items:
        $ref: "#/components/schemas/ServiceEvent"
    ServiceEvent:
      description: The details for an event that's associated with a service.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID string for the event.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the event was triggered.
        message:
          $ref: "#/components/schemas/String"
          description: The event message.
    ServiceCurrentRevisionSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceCurrentRevisionSummary"
    ServiceCurrentRevisionSummary:
      description: The summary of the current service revision configuration
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The ARN of the current service revision.
        requestedTaskCount:
          $ref: "#/components/schemas/Integer"
          description: The number of requested tasks in the current service revision
        runningTaskCount:
          $ref: "#/components/schemas/Integer"
          description: The number of running tasks of the current service revision
        pendingTaskCount:
          $ref: "#/components/schemas/Integer"
          description: The number of pending tasks in the current service revision
    ResourceManagementType:
      type: string
      enum:
        - CUSTOMER
        - ECS
    CreateTaskSetResponse:
      type: object
      properties:
        taskSet:
          $ref: "#/components/schemas/TaskSet"
          description: Information about a set of Amazon ECS tasks in either an CodeDeploy or an EXTERNAL deployment. A task set includes details such as the desired number of tasks, how many tasks are running, and whether the task set serves production traffic.
    SettingName:
      type: string
      enum:
        - serviceLongArnFormat
        - taskLongArnFormat
        - containerInstanceLongArnFormat
        - awsvpcTrunking
        - containerInsights
        - fargateFIPSMode
        - tagResourceAuthorization
        - fargateTaskRetirementWaitPeriod
        - guardDutyActivate
        - defaultLogDriverMode
        - fargateEventWindows
    DeleteAccountSettingResponse:
      type: object
      properties:
        setting:
          $ref: "#/components/schemas/Setting"
          description: The account setting for the specified principal ARN.
    Setting:
      description: The current account setting for a resource.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SettingName"
          description: The Amazon ECS resource name.
        value:
          $ref: "#/components/schemas/String"
          description: Determines whether the account setting is on or off for the specified resource.
        principalArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the principal. It can be a user, role, or the root user. If this field is omitted, the authenticated user is assumed.
        type_:
          $ref: "#/components/schemas/SettingType"
          description: Indicates whether Amazon Web Services manages the account setting, or if the user manages it. aws_managed account settings are read-only, as Amazon Web Services manages such on the customer's behalf. Currently, the guardDutyActivate account setting is the only one Amazon Web Services manages.
    SettingType:
      type: string
      enum:
        - user
        - aws_managed
    Attributes:
      type: array
      items:
        $ref: "#/components/schemas/Attribute"
    Attribute:
      description: An attribute is a name-value pair that's associated with an Amazon ECS object. Use attributes to extend the Amazon ECS data model by adding custom metadata to your resources. For more information, see Attributes in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the attribute. The name must contain between 1 and 128 characters. The name may contain letters (uppercase and lowercase), numbers, hyphens (-), underscores (_), forward slashes (/), back slashes (\), or periods (.).
        value:
          $ref: "#/components/schemas/String"
          description: The value of the attribute. The value must contain between 1 and 128 characters. It can contain letters (uppercase and lowercase), numbers, hyphens (-), underscores (_), periods (.), at signs (@), forward slashes (/), back slashes (\), colons (:), or spaces. The value can't start or end with a space.
        targetType:
          $ref: "#/components/schemas/TargetType"
          description: The type of the target to attach the attribute with. This parameter is required if you use the short form ID for a resource instead of the full ARN.
        targetId:
          $ref: "#/components/schemas/String"
          description: The ID of the target. You can specify the short form ID for a resource or the full Amazon Resource Name (ARN).
      required:
        - name
    TargetType:
      type: string
      enum:
        - container-instance
    DeleteAttributesResponse:
      type: object
      properties:
        attributes:
          $ref: "#/components/schemas/Attributes"
          description: A list of attribute objects that were successfully deleted from your resource.
    DeleteCapacityProviderResponse:
      type: object
      properties:
        capacityProvider:
          $ref: "#/components/schemas/CapacityProvider"
          description: The details of the capacity provider.
    DeleteClusterResponse:
      type: object
      properties:
        cluster:
          $ref: "#/components/schemas/Cluster"
          description: The full description of the deleted cluster.
    DeleteDaemonResponse:
      type: object
      properties:
        daemonArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the daemon.
        status:
          $ref: "#/components/schemas/DaemonStatus"
          description: The status of the daemon. After you call DeleteDaemon, the status changes to DELETE_IN_PROGRESS.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the daemon was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the daemon was last updated.
        deploymentArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the daemon deployment that was triggered by the delete operation. This deployment drains existing daemon tasks from the container instances.
    DeleteDaemonTaskDefinitionResponse:
      type: object
      properties:
        daemonTaskDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The full Amazon Resource Name (ARN) of the deleted daemon task definition.
    DeleteExpressGatewayServiceResponse:
      type: object
      properties:
        service:
          $ref: "#/components/schemas/ECSExpressGatewayService"
          description: The full description of the deleted express service.
    DeleteServiceResponse:
      type: object
      properties:
        service:
          $ref: "#/components/schemas/Service"
          description: The full description of the deleted service.
    DeleteTaskDefinitionsResponse:
      type: object
      properties:
        taskDefinitions:
          $ref: "#/components/schemas/TaskDefinitionList"
          description: The list of deleted task definitions.
        failures:
          $ref: "#/components/schemas/Failures"
          description: Any failures associated with the call.
    TaskDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/TaskDefinition"
    TaskDefinition:
      description: The details of a task definition which describes the container and volume definitions of an Amazon Elastic Container Service task. You can specify which Docker images to use, the required resources, and other configurations related to launching the task definition through an Amazon ECS service or task.
      type: object
      properties:
        taskDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The full Amazon Resource Name (ARN) of the task definition.
        containerDefinitions:
          $ref: "#/components/schemas/ContainerDefinitions"
          description: A list of container definitions in JSON format that describe the different containers that make up your task. For more information about container definition parameters and defaults, see Amazon ECS Task Definitions in the Amazon Elastic Container Service Developer Guide.
        family:
          $ref: "#/components/schemas/String"
          description: The name of a family that this task definition is registered to. Up to 255 characters are allowed. Letters (both uppercase and lowercase letters), numbers, hyphens (-), and underscores (_) are allowed. A family groups multiple versions of a task definition. Amazon ECS gives the first task definition that you registered to a family a revision number of 1. Amazon ECS gives sequential revision numbers to each task definition that you add.
        taskRoleArn:
          $ref: "#/components/schemas/String"
          description: The short name or full Amazon Resource Name (ARN) of the Identity and Access Management role that grants containers in the task permission to call Amazon Web Services APIs on your behalf. For informationabout the required IAM roles for Amazon ECS, see IAM roles for Amazon ECS in the Amazon Elastic Container Service Developer Guide.
        executionRoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the task execution role that grants the Amazon ECS container agent permission to make Amazon Web Services API calls on your behalf. For informationabout the required IAM roles for Amazon ECS, see IAM roles for Amazon ECS in the Amazon Elastic Container Service Developer Guide.
        networkMode:
          $ref: "#/components/schemas/NetworkMode"
          description: The Docker networking mode to use for the containers in the task. The valid values are none, bridge, awsvpc, and host. If no network mode is specified, the default is bridge. For Amazon ECS tasks on Fargate, the awsvpc network mode is required. For Amazon ECS tasks on Amazon EC2 Linux instances, any network mode can be used. For Amazon ECS tasks on Amazon EC2 Windows instances, `<default>` or awsvpc can be used. If the network mode is set to none, you cannot specify port mappings in your container definitions, and the tasks containers do not have external connectivity. The host and awsvpc network modes offer the highest networking performance for containers because they use the EC2 network stack instead of the virtualized network stack provided by the bridge mode. With the host and awsvpc network modes, exposed container ports are mapped directly to the corresponding host port (for the host network mode) or the attached elastic network interface port (for the awsvpc network mode), so you cannot take advantage of dynamic host port mappings. When using the host network mode, you should not run containers using the root user (UID 0). It is considered best practice to use a non-root user. If the network mode is awsvpc, the task is allocated an elastic network interface, and you must specify a NetworkConfiguration value when you create a service or run a task with the task definition. For more information, see Task Networking in the Amazon Elastic Container Service Developer Guide. If the network mode is host, you cannot run multiple instantiations of the same task on a single container instance when port mappings are used.
        revision:
          $ref: "#/components/schemas/Integer"
          description: The revision of the task in a particular family. The revision is a version number of a task definition in a family. When you register a task definition for the first time, the revision is 1. Each time that you register a new revision of a task definition in the same family, the revision value always increases by one. This is even if you deregistered previous revisions in this family.
        volumes:
          $ref: "#/components/schemas/VolumeList"
          description: The list of data volume definitions for the task. For more information, see Using data volumes in tasks in the Amazon Elastic Container Service Developer Guide. The host and sourcePath parameters aren't supported for tasks run on Fargate.
        status:
          $ref: "#/components/schemas/TaskDefinitionStatus"
          description: The status of the task definition.
        requiresAttributes:
          $ref: "#/components/schemas/RequiresAttributes"
          description: The container instance attributes required by your task. When an Amazon EC2 instance is registered to your cluster, the Amazon ECS container agent assigns some standard attributes to the instance. You can apply custom attributes. These are specified as key-value pairs using the Amazon ECS console or the PutAttributes API. These attributes are used when determining task placement for tasks hosted on Amazon EC2 instances. For more information, see Attributes in the Amazon Elastic Container Service Developer Guide. This parameter isn't supported for tasks run on Fargate.
        placementConstraints:
          $ref: "#/components/schemas/TaskDefinitionPlacementConstraints"
          description: An array of placement constraint objects to use for tasks. This parameter isn't supported for tasks run on Fargate.
        compatibilities:
          $ref: "#/components/schemas/CompatibilityList"
          description: Amazon ECS validates the task definition parameters with those supported by the launch type. For more information, see Amazon ECS launch types in the Amazon Elastic Container Service Developer Guide.
        runtimePlatform:
          $ref: "#/components/schemas/RuntimePlatform"
          description: The operating system that your task definitions are running on. A platform family is specified only for tasks using the Fargate launch type. When you specify a task in a service, this value must match the runtimePlatform value of the service.
        requiresCompatibilities:
          $ref: "#/components/schemas/CompatibilityList"
          description: The task launch types the task definition was validated against. The valid values are MANAGED_INSTANCES, EC2, FARGATE, and EXTERNAL. For more information, see Amazon ECS launch types in the Amazon Elastic Container Service Developer Guide.
        cpu:
          $ref: "#/components/schemas/String"
          description: The number of cpu units used by the task. If you use the EC2 launch type, this field is optional. Any value can be used. If you use the Fargate launch type, this field is required. You must use one of the following values. The value that you choose determines your range of valid values for the memory parameter. If you're using the EC2 launch type or the external launch type, this field is optional. Supported values are between 128 CPU units (0.125 vCPUs) and 196608 CPU units (192 vCPUs). This field is required for Fargate. For information about the valid values, see Task size in the Amazon Elastic Container Service Developer Guide.
        memory:
          $ref: "#/components/schemas/String"
          description: "The amount (in MiB) of memory used by the task. If your tasks runs on Amazon EC2 instances, you must specify either a task-level memory value or a container-level memory value. This field is optional and any value can be used. If a task-level memory value is specified, the container-level memory value is optional. For more information regarding container-level memory and memory reservation, see ContainerDefinition. If your tasks runs on Fargate, this field is required. You must use one of the following values. The value you choose determines your range of valid values for the cpu parameter. 512 (0.5 GB), 1024 (1 GB), 2048 (2 GB) - Available cpu values: 256 (.25 vCPU) 1024 (1 GB), 2048 (2 GB), 3072 (3 GB), 4096 (4 GB) - Available cpu values: 512 (.5 vCPU) 2048 (2 GB), 3072 (3 GB), 4096 (4 GB), 5120 (5 GB), 6144 (6 GB), 7168 (7 GB), 8192 (8 GB) - Available cpu values: 1024 (1 vCPU) Between 4096 (4 GB) and 16384 (16 GB) in increments of 1024 (1 GB) - Available cpu values: 2048 (2 vCPU) Between 8192 (8 GB) and 30720 (30 GB) in increments of 1024 (1 GB) - Available cpu values: 4096 (4 vCPU) Between 16 GB and 60 GB in 4 GB increments - Available cpu values: 8192 (8 vCPU) This option requires Linux platform 1.4.0 or later. Between 32GB and 120 GB in 8 GB increments - Available cpu values: 16384 (16 vCPU) This option requires Linux platform 1.4.0 or later."
        inferenceAccelerators:
          $ref: "#/components/schemas/InferenceAccelerators"
          description: The Elastic Inference accelerator that's associated with the task.
        pidMode:
          $ref: "#/components/schemas/PidMode"
          description: The process namespace to use for the containers in the task. The valid values are host or task. On Fargate for Linux containers, the only valid value is task. For example, monitoring sidecars might need pidMode to access information about other containers running in the same task. If host is specified, all containers within the tasks that specified the host PID mode on the same container instance share the same process namespace with the host Amazon EC2 instance. If task is specified, all containers within the specified task share the same process namespace. If no value is specified, the The default is a private namespace for each container. If the host PID mode is used, there's a heightened risk of undesired process namespace exposure. This parameter is not supported for Windows containers. This parameter is only supported for tasks that are hosted on Fargate if the tasks are using platform version 1.4.0 or later (Linux). This isn't supported for Windows containers on Fargate.
        ipcMode:
          $ref: "#/components/schemas/IpcMode"
          description: The IPC resource namespace to use for the containers in the task. The valid values are host, task, or none. If host is specified, then all containers within the tasks that specified the host IPC mode on the same container instance share the same IPC resources with the host Amazon EC2 instance. If task is specified, all containers within the specified task share the same IPC resources. If none is specified, then IPC resources within the containers of a task are private and not shared with other containers in a task or on the container instance. If no value is specified, then the IPC resource namespace sharing depends on the Docker daemon setting on the container instance. If the host IPC mode is used, be aware that there is a heightened risk of undesired IPC namespace expose. If you are setting namespaced kernel parameters using systemControls for the containers in the task, the following will apply to your IPC resource namespace. For more information, see System Controls in the Amazon Elastic Container Service Developer Guide. For tasks that use the host IPC mode, IPC namespace related systemControls are not supported. For tasks that use the task IPC mode, IPC namespace related systemControls will apply to all containers within a task. This parameter is not supported for Windows containers or tasks run on Fargate.
        proxyConfiguration:
          $ref: "#/components/schemas/ProxyConfiguration"
          description: The configuration details for the App Mesh proxy. Your Amazon ECS container instances require at least version 1.26.0 of the container agent and at least version 1.26.0-1 of the ecs-init package to use a proxy configuration. If your container instances are launched from the Amazon ECS optimized AMI version 20190301 or later, they contain the required versions of the container agent and ecs-init. For more information, see Amazon ECS-optimized Linux AMI in the Amazon Elastic Container Service Developer Guide.
        registeredAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task definition was registered.
        deregisteredAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task definition was deregistered.
        deleteRequestedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the task definition delete was requested.
        registeredBy:
          $ref: "#/components/schemas/String"
          description: The principal that registered the task definition.
        ephemeralStorage:
          $ref: "#/components/schemas/EphemeralStorage"
          description: The ephemeral storage settings to use for tasks run with the task definition.
        enableFaultInjection:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Enables fault injection and allows for fault injection requests to be accepted from the task's containers. The default value is false.
    ContainerDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/ContainerDefinition"
    ContainerDefinition:
      description: Container definitions are used in task definitions to describe the different containers that are launched as part of a task.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of a container. If you're linking multiple containers together in a task definition, the name of one container can be entered in the links of another container to connect the containers. Up to 255 letters (uppercase and lowercase), numbers, underscores, and hyphens are allowed. This parameter maps to name in the docker container create command and the --name option to docker run.
        image:
          $ref: "#/components/schemas/String"
          description: "The image used to start a container. This string is passed directly to the Docker daemon. By default, images in the Docker Hub registry are available. Other repositories are specified with either repository-url/image:tag or repository-url/image@digest . For images using tags (repository-url/image:tag), up to 255 characters total are allowed, including letters (uppercase and lowercase), numbers, hyphens, underscores, colons, periods, forward slashes, and number signs (#). For images using digests (repository-url/image@digest), the 255 character limit applies only to the repository URL and image name (everything before the @ sign). The only supported hash function is sha256, and the hash value after sha256: must be exactly 64 characters (only letters A-F, a-f, and numbers 0-9 are allowed). This parameter maps to Image in the docker container create command and the IMAGE parameter of docker run. When a new task starts, the Amazon ECS container agent pulls the latest version of the specified image and tag for the container to use. However, subsequent updates to a repository image aren't propagated to already running tasks. Images in Amazon ECR repositories can be specified by either using the full registry/repository:tag or registry/repository@digest. For example, 012345678910.dkr.ecr.`<region-name>`.amazonaws.com/`<repository-name>`:latest or 012345678910.dkr.ecr.`<region-name>`.amazonaws.com/`<repository-name>`@sha256:94afd1f2e64d908bc90dbca0035a5b567EXAMPLE. Images in official repositories on Docker Hub use a single name (for example, ubuntu or mongo). Images in other repositories on Docker Hub are qualified with an organization name (for example, amazon/amazon-ecs-agent). Images in other online repositories are qualified further by a domain name (for example, quay.io/assemblyline/ubuntu)."
        repositoryCredentials:
          $ref: "#/components/schemas/RepositoryCredentials"
          description: The private repository authentication credentials to use.
        cpu:
          $ref: "#/components/schemas/Integer"
          description: "The number of cpu units reserved for the container. This parameter maps to CpuShares in the docker container create command and the --cpu-shares option to docker run. This field is optional for tasks using the Fargate launch type, and the only requirement is that the total amount of CPU reserved for all containers within a task be lower than the task-level cpu value. You can determine the number of CPU units that are available per EC2 instance type by multiplying the vCPUs listed for that instance type on the Amazon EC2 Instances detail page by 1,024. Linux containers share unallocated CPU units with other containers on the container instance with the same ratio as their allocated amount. For example, if you run a single-container task on a single-core instance type with 512 CPU units specified for that container, and that's the only task running on the container instance, that container could use the full 1,024 CPU unit share at any given time. However, if you launched another copy of the same task on that container instance, each task is guaranteed a minimum of 512 CPU units when needed. Moreover, each container could float to higher CPU usage if the other container was not using it. If both tasks were 100% active all of the time, they would be limited to 512 CPU units. On Linux container instances, the Docker daemon on the container instance uses the CPU value to calculate the relative CPU share ratios for running containers. The minimum valid CPU share value that the Linux kernel allows is 2, and the maximum valid CPU share value that the Linux kernel allows is 262144. However, the CPU parameter isn't required, and you can use CPU values below 2 or above 262144 in your container definitions. For CPU values below 2 (including null) or above 262144, the behavior varies based on your Amazon ECS container agent version: Agent versions less than or equal to 1.1.0: Null and zero CPU values are passed to Docker as 0, which Docker then converts to 1,024 CPU shares. CPU values of 1 are passed to Docker as 1, which the Linux kernel converts to two CPU shares. Agent versions greater than or equal to 1.2.0: Null, zero, and CPU values of 1 are passed to Docker as 2. Agent versions greater than or equal to 1.84.0: CPU values greater than 256 vCPU are passed to Docker as 256, which is equivalent to 262144 CPU shares. On Windows container instances, the CPU limit is enforced as an absolute limit, or a quota. Windows containers only have access to the specified amount of CPU that's described in the task definition. A null or zero CPU value is passed to Docker as 0, which Windows interprets as 1% of one CPU."
        memory:
          $ref: "#/components/schemas/BoxedInteger"
          description: The amount (in MiB) of memory to present to the container. If your container attempts to exceed the memory specified here, the container is killed. The total amount of memory reserved for all containers within a task must be lower than the task memory value, if one is specified. This parameter maps to Memory in the docker container create command and the --memory option to docker run. If using the Fargate launch type, this parameter is optional. If using the EC2 launch type, you must specify either a task-level memory value or a container-level memory value. If you specify both a container-level memory and memoryReservation value, memory must be greater than memoryReservation. If you specify memoryReservation, then that value is subtracted from the available memory resources for the container instance where the container is placed. Otherwise, the value of memory is used. The Docker 20.10.0 or later daemon reserves a minimum of 6 MiB of memory for a container. So, don't specify less than 6 MiB of memory for your containers. The Docker 19.03.13-ce or earlier daemon reserves a minimum of 4 MiB of memory for a container. So, don't specify less than 4 MiB of memory for your containers.
        memoryReservation:
          $ref: "#/components/schemas/BoxedInteger"
          description: The soft limit (in MiB) of memory to reserve for the container. When system memory is under heavy contention, Docker attempts to keep the container memory to this soft limit. However, your container can consume more memory when it needs to, up to either the hard limit specified with the memory parameter (if applicable), or all of the available memory on the container instance, whichever comes first. This parameter maps to MemoryReservation in the docker container create command and the --memory-reservation option to docker run. If a task-level memory value is not specified, you must specify a non-zero integer for one or both of memory or memoryReservation in a container definition. If you specify both, memory must be greater than memoryReservation. If you specify memoryReservation, then that value is subtracted from the available memory resources for the container instance where the container is placed. Otherwise, the value of memory is used. For example, if your container normally uses 128 MiB of memory, but occasionally bursts to 256 MiB of memory for short periods of time, you can set a memoryReservation of 128 MiB, and a memory hard limit of 300 MiB. This configuration would allow the container to only reserve 128 MiB of memory from the remaining resources on the container instance, but also allow the container to consume more memory resources when needed. The Docker 20.10.0 or later daemon reserves a minimum of 6 MiB of memory for a container. So, don't specify less than 6 MiB of memory for your containers. The Docker 19.03.13-ce or earlier daemon reserves a minimum of 4 MiB of memory for a container. So, don't specify less than 4 MiB of memory for your containers.
        links:
          $ref: "#/components/schemas/StringList"
          description: The links parameter allows containers to communicate with each other without the need for port mappings. This parameter is only supported if the network mode of a task definition is bridge. The name:internalName construct is analogous to name:alias in Docker links. Up to 255 letters (uppercase and lowercase), numbers, underscores, and hyphens are allowed.. This parameter maps to Links in the docker container create command and the --link option to docker run. This parameter is not supported for Windows containers. Containers that are collocated on a single container instance may be able to communicate with each other without requiring links or host port mappings. Network isolation is achieved on the container instance using security groups and VPC settings.
        portMappings:
          $ref: "#/components/schemas/PortMappingList"
          description: The list of port mappings for the container. Port mappings allow containers to access ports on the host container instance to send or receive traffic. For task definitions that use the awsvpc network mode, only specify the containerPort. The hostPort can be left blank or it must be the same value as the containerPort. Port mappings on Windows use the NetNAT gateway address rather than localhost. There's no loopback for port mappings on Windows, so you can't access a container's mapped port from the host itself. This parameter maps to PortBindings in the docker container create command and the --publish option to docker run. If the network mode of a task definition is set to none, then you can't specify port mappings. If the network mode of a task definition is set to host, then host ports must either be undefined or they must match the container port in the port mapping. After a task reaches the RUNNING status, manual and automatic host and container port assignments are visible in the Network Bindings section of a container description for a selected task in the Amazon ECS console. The assignments are also visible in the networkBindings section DescribeTasks responses.
        essential:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If the essential parameter of a container is marked as true, and that container fails or stops for any reason, all other containers that are part of the task are stopped. If the essential parameter of a container is marked as false, its failure doesn't affect the rest of the containers in a task. If this parameter is omitted, a container is assumed to be essential. All tasks must have at least one essential container. If you have an application that's composed of multiple containers, group containers that are used for a common purpose into components, and separate the different components into multiple task definitions. For more information, see Application Architecture in the Amazon Elastic Container Service Developer Guide.
        restartPolicy:
          $ref: "#/components/schemas/ContainerRestartPolicy"
          description: The restart policy for a container. When you set up a restart policy, Amazon ECS can restart the container without needing to replace the task. For more information, see Restart individual containers in Amazon ECS tasks with container restart policies in the Amazon Elastic Container Service Developer Guide.
        entryPoint:
          $ref: "#/components/schemas/StringList"
          description: Early versions of the Amazon ECS container agent don't properly handle entryPoint parameters. If you have problems using entryPoint, update your container agent or enter your commands and arguments as command array items instead. The entry point that's passed to the container. This parameter maps to Entrypoint in the docker container create command and the --entrypoint option to docker run.
        command:
          $ref: "#/components/schemas/StringList"
          description: The command that's passed to the container. This parameter maps to Cmd in the docker container create command and the COMMAND parameter to docker run. If there are multiple arguments, each argument is a separated string in the array.
        environment:
          $ref: "#/components/schemas/EnvironmentVariables"
          description: The environment variables to pass to a container. This parameter maps to Env in the docker container create command and the --env option to docker run. We don't recommend that you use plaintext environment variables for sensitive information, such as credential data.
        environmentFiles:
          $ref: "#/components/schemas/EnvironmentFiles"
          description: "A list of files containing the environment variables to pass to a container. This parameter maps to the --env-file option to docker run. You can specify up to ten environment files. The file must have a .env file extension. Each line in an environment file contains an environment variable in VARIABLE=VALUE format. Lines beginning with # are treated as comments and are ignored. If there are environment variables specified using the environment parameter in a container definition, they take precedence over the variables contained within an environment file. If multiple environment files are specified that contain the same variable, they're processed from the top down. We recommend that you use unique variable names. For more information, see Specifying Environment Variables in the Amazon Elastic Container Service Developer Guide."
        mountPoints:
          $ref: "#/components/schemas/MountPointList"
          description: The mount points for data volumes in your container. This parameter maps to Volumes in the docker container create command and the --volume option to docker run. Windows containers can mount whole directories on the same drive as $env:ProgramData. Windows containers can't mount directories on a different drive, and mount point can't be across drives.
        volumesFrom:
          $ref: "#/components/schemas/VolumeFromList"
          description: Data volumes to mount from another container. This parameter maps to VolumesFrom in the docker container create command and the --volumes-from option to docker run.
        linuxParameters:
          $ref: "#/components/schemas/LinuxParameters"
          description: Linux-specific modifications that are applied to the default Docker container configuration, such as Linux kernel capabilities. For more information see KernelCapabilities. This parameter is not supported for Windows containers.
        secrets:
          $ref: "#/components/schemas/SecretList"
          description: The secrets to pass to the container. For more information, see Specifying Sensitive Data in the Amazon Elastic Container Service Developer Guide.
        dependsOn:
          $ref: "#/components/schemas/ContainerDependencies"
          description: "The dependencies defined for container startup and shutdown. A container can contain multiple dependencies on other containers in a task definition. When a dependency is defined for container startup, for container shutdown it is reversed. For tasks using the EC2 launch type, the container instances require at least version 1.26.0 of the container agent to turn on container dependencies. However, we recommend using the latest container agent version. For information about checking your agent version and updating to the latest version, see Updating the Amazon ECS Container Agent in the Amazon Elastic Container Service Developer Guide. If you're using an Amazon ECS-optimized Linux AMI, your instance needs at least version 1.26.0-1 of the ecs-init package. If your container instances are launched from version 20190301 or later, then they contain the required versions of the container agent and ecs-init. For more information, see Amazon ECS-optimized Linux AMI in the Amazon Elastic Container Service Developer Guide. For tasks using the Fargate launch type, the task or service requires the following platforms: Linux platform version 1.3.0 or later. Windows platform version 1.0.0 or later."
        startTimeout:
          $ref: "#/components/schemas/BoxedInteger"
          description: "Time duration (in seconds) to wait before giving up on resolving dependencies for a container. For example, you specify two containers in a task definition with containerA having a dependency on containerB reaching a COMPLETE, SUCCESS, or HEALTHY status. If a startTimeout value is specified for containerB and it doesn't reach the desired status within that time then containerA gives up and not start. This results in the task transitioning to a STOPPED state. When the ECS_CONTAINER_START_TIMEOUT container agent configuration variable is used, it's enforced independently from this start timeout value. For tasks using the Fargate launch type, the task or service requires the following platforms: Linux platform version 1.3.0 or later. Windows platform version 1.0.0 or later. For tasks using the EC2 launch type, your container instances require at least version 1.26.0 of the container agent to use a container start timeout value. However, we recommend using the latest container agent version. For information about checking your agent version and updating to the latest version, see Updating the Amazon ECS Container Agent in the Amazon Elastic Container Service Developer Guide. If you're using an Amazon ECS-optimized Linux AMI, your instance needs at least version 1.26.0-1 of the ecs-init package. If your container instances are launched from version 20190301 or later, then they contain the required versions of the container agent and ecs-init. For more information, see Amazon ECS-optimized Linux AMI in the Amazon Elastic Container Service Developer Guide. The valid values for Fargate are 2-120 seconds."
        stopTimeout:
          $ref: "#/components/schemas/BoxedInteger"
          description: "Time duration (in seconds) to wait before the container is forcefully killed if it doesn't exit normally on its own. For tasks using the Fargate launch type, the task or service requires the following platforms: Linux platform version 1.3.0 or later. Windows platform version 1.0.0 or later. For tasks that use the Fargate launch type, the max stop timeout value is 120 seconds and if the parameter is not specified, the default value of 30 seconds is used. For tasks that use the EC2 launch type, if the stopTimeout parameter isn't specified, the value set for the Amazon ECS container agent configuration variable ECS_CONTAINER_STOP_TIMEOUT is used. If neither the stopTimeout parameter or the ECS_CONTAINER_STOP_TIMEOUT agent configuration variable are set, then the default values of 30 seconds for Linux containers and 30 seconds on Windows containers are used. Your container instances require at least version 1.26.0 of the container agent to use a container stop timeout value. However, we recommend using the latest container agent version. For information about checking your agent version and updating to the latest version, see Updating the Amazon ECS Container Agent in the Amazon Elastic Container Service Developer Guide. If you're using an Amazon ECS-optimized Linux AMI, your instance needs at least version 1.26.0-1 of the ecs-init package. If your container instances are launched from version 20190301 or later, then they contain the required versions of the container agent and ecs-init. For more information, see Amazon ECS-optimized Linux AMI in the Amazon Elastic Container Service Developer Guide. The valid values for Fargate are 2-120 seconds."
        versionConsistency:
          $ref: "#/components/schemas/VersionConsistency"
          description: Specifies whether Amazon ECS will resolve the container image tag provided in the container definition to an image digest. By default, the value is enabled. If you set the value for a container as disabled, Amazon ECS will not resolve the provided container image tag to a digest and will use the original image URI specified in the container definition for deployment. For more information about container image resolution, see Container image resolution in the Amazon ECS Developer Guide.
        hostname:
          $ref: "#/components/schemas/String"
          description: The hostname to use for your container. This parameter maps to Hostname in the docker container create command and the --hostname option to docker run. The hostname parameter is not supported if you're using the awsvpc network mode.
        user:
          $ref: "#/components/schemas/String"
          description: The user to use inside the container. This parameter maps to User in the docker container create command and the --user option to docker run. When running tasks using the host network mode, don't run containers using the root user (UID 0). We recommend using a non-root user for better security. You can specify the user using the following formats. If specifying a UID or GID, you must specify it as a positive integer. user user:group uid uid:gid user:gid uid:group This parameter is not supported for Windows containers.
        workingDirectory:
          $ref: "#/components/schemas/String"
          description: The working directory to run commands inside the container in. This parameter maps to WorkingDir in the docker container create command and the --workdir option to docker run.
        disableNetworking:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, networking is off within the container. This parameter maps to NetworkDisabled in the docker container create command. This parameter is not supported for Windows containers.
        privileged:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, the container is given elevated privileges on the host container instance (similar to the root user). This parameter maps to Privileged in the docker container create command and the --privileged option to docker run This parameter is not supported for Windows containers or tasks run on Fargate.
        readonlyRootFilesystem:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, the container is given read-only access to its root file system. This parameter maps to ReadonlyRootfs in the docker container create command and the --read-only option to docker run. This parameter is not supported for Windows containers.
        dnsServers:
          $ref: "#/components/schemas/StringList"
          description: A list of DNS servers that are presented to the container. This parameter maps to Dns in the docker container create command and the --dns option to docker run. This parameter is not supported for Windows containers.
        dnsSearchDomains:
          $ref: "#/components/schemas/StringList"
          description: A list of DNS search domains that are presented to the container. This parameter maps to DnsSearch in the docker container create command and the --dns-search option to docker run. This parameter is not supported for Windows containers.
        extraHosts:
          $ref: "#/components/schemas/HostEntryList"
          description: A list of hostnames and IP address mappings to append to the /etc/hosts file on the container. This parameter maps to ExtraHosts in the docker container create command and the --add-host option to docker run. This parameter isn't supported for Windows containers or tasks that use the awsvpc network mode.
        dockerSecurityOptions:
          $ref: "#/components/schemas/StringList"
          description: "A list of strings to provide custom configuration for multiple security systems. This field isn't valid for containers in tasks using the Fargate launch type. For Linux tasks on EC2, this parameter can be used to reference custom labels for SELinux and AppArmor multi-level security systems. For any tasks on EC2, this parameter can be used to reference a credential spec file that configures a container for Active Directory authentication. For more information, see Using gMSAs for Windows Containers and Using gMSAs for Linux Containers in the Amazon Elastic Container Service Developer Guide. This parameter maps to SecurityOpt in the docker container create command and the --security-opt option to docker run. The Amazon ECS container agent running on a container instance must register with the ECS_SELINUX_CAPABLE=true or ECS_APPARMOR_CAPABLE=true environment variables before containers placed on that instance can use these security options. For more information, see Amazon ECS Container Agent Configuration in the Amazon Elastic Container Service Developer Guide. Valid values: \"no-new-privileges\" | \"apparmor:PROFILE\" | \"label:value\" | \"credentialspec:CredentialSpecFilePath\""
        interactive:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, you can deploy containerized applications that require stdin or a tty to be allocated. This parameter maps to OpenStdin in the docker container create command and the --interactive option to docker run.
        pseudoTerminal:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When this parameter is true, a TTY is allocated. This parameter maps to Tty in the docker container create command and the --tty option to docker run.
        dockerLabels:
          type: object
          properties: {}
          description: "A key/value map of labels to add to the container. This parameter maps to Labels in the docker container create command and the --label option to docker run. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}'"
        ulimits:
          $ref: "#/components/schemas/UlimitList"
          description: "A list of ulimits to set in the container. If a ulimit value is specified in a task definition, it overrides the default values set by Docker. This parameter maps to Ulimits in the docker container create command and the --ulimit option to docker run. Valid naming values are displayed in the Ulimit data type. Amazon ECS tasks hosted on Fargate use the default resource limit values set by the operating system with the exception of the nofile resource limit parameter which Fargate overrides. The nofile resource limit sets a restriction on the number of open files that a container can use. The default nofile soft limit is 65535 and the default hard limit is 65535. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}' This parameter is not supported for Windows containers."
        logConfiguration:
          $ref: "#/components/schemas/LogConfiguration"
          description: "The log configuration specification for the container. This parameter maps to LogConfig in the docker container create command and the --log-driver option to docker run. By default, containers use the same logging driver that the Docker daemon uses. However the container can use a different logging driver than the Docker daemon by specifying a log driver with this parameter in the container definition. To use a different logging driver for a container, the log system must be configured properly on the container instance (or on a different log server for remote logging options). Amazon ECS currently supports a subset of the logging drivers available to the Docker daemon (shown in the LogConfiguration data type). Additional log drivers may be available in future releases of the Amazon ECS container agent. This parameter requires version 1.18 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}' The Amazon ECS container agent running on a container instance must register the logging drivers available on that instance with the ECS_AVAILABLE_LOGGING_DRIVERS environment variable before containers placed on that instance can use these log configuration options. For more information, see Amazon ECS Container Agent Configuration in the Amazon Elastic Container Service Developer Guide."
        healthCheck:
          $ref: "#/components/schemas/HealthCheck"
          description: The container health check command and associated configuration parameters for the container. This parameter maps to HealthCheck in the docker container create command and the HEALTHCHECK parameter of docker run.
        systemControls:
          $ref: "#/components/schemas/SystemControls"
          description: A list of namespaced kernel parameters to set in the container. This parameter maps to Sysctls in the docker container create command and the --sysctl option to docker run. For example, you can configure net.ipv4.tcp_keepalive_time setting to maintain longer lived connections.
        resourceRequirements:
          $ref: "#/components/schemas/ResourceRequirements"
          description: The type and amount of a resource to assign to a container. The only supported resource is a GPU.
        firelensConfiguration:
          $ref: "#/components/schemas/FirelensConfiguration"
          description: The FireLens configuration for the container. This is used to specify and configure a log router for container logs. For more information, see Custom Log Routing in the Amazon Elastic Container Service Developer Guide.
        credentialSpecs:
          $ref: "#/components/schemas/StringList"
          description: A list of ARNs in SSM or Amazon S3 to a credential spec (CredSpec) file that configures the container for Active Directory authentication. We recommend that you use this parameter instead of the dockerSecurityOptions. The maximum number of ARNs is 1. There are two formats for each ARN. credentialspecdomainless:MyARN You use credentialspecdomainless:MyARN to provide a CredSpec with an additional section for a secret in Secrets Manager. You provide the login credentials to the domain in the secret. Each task that runs on any container instance can join different domains. You can use this format without joining the container instance to a domain. credentialspec:MyARN You use credentialspec:MyARN to provide a CredSpec for a single domain. You must join the container instance to the domain before you start any tasks that use this task definition. In both formats, replace MyARN with the ARN in SSM or Amazon S3. If you provide a credentialspecdomainless:MyARN, the credspec must provide a ARN in Secrets Manager for a secret containing the username, password, and the domain to connect to. For better security, the instance isn't joined to the domain for domainless authentication. Other applications on the instance can't use the domainless credentials. You can use this parameter to run tasks on the same instance, even it the tasks need to join different domains. For more information, see Using gMSAs for Windows Containers and Using gMSAs for Linux Containers.
    RepositoryCredentials:
      description: The repository credentials for private registry authentication.
      type: object
      properties:
        credentialsParameter:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the secret containing the private repository credentials. When you use the Amazon ECS API, CLI, or Amazon Web Services SDK, if the secret exists in the same Region as the task that you're launching then you can use either the full ARN or the name of the secret. When you use the Amazon Web Services Management Console, you must specify the full ARN of the secret.
      required:
        - credentialsParameter
    PortMappingList:
      type: array
      items:
        $ref: "#/components/schemas/PortMapping"
    PortMapping:
      description: Port mappings allow containers to access ports on the host container instance to send or receive traffic. Port mappings are specified as part of the container definition. If you use containers in a task with the awsvpc or host network mode, specify the exposed ports using containerPort. The hostPort can be left blank or it must be the same value as the containerPort. Most fields of this parameter (containerPort, hostPort, protocol) maps to PortBindings in the docker container create command and the --publish option to docker run. If the network mode of a task definition is set to host, host ports must either be undefined or match the container port in the port mapping. You can't expose the same container port for multiple protocols. If you attempt this, an error is returned. After a task reaches the RUNNING status, manual and automatic host and container port assignments are visible in the networkBindings section of DescribeTasks API responses.
      type: object
      properties:
        containerPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port number on the container that's bound to the user-specified or automatically assigned host port. If you use containers in a task with the awsvpc or host network mode, specify the exposed ports using containerPort. If you use containers in a task with the bridge network mode and you specify a container port and not a host port, your container automatically receives a host port in the ephemeral port range. For more information, see hostPort. Port mappings that are automatically assigned in this way do not count toward the 100 reserved ports limit of a container instance.
        hostPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: "The port number on the container instance to reserve for your container. If you specify a containerPortRange, leave this field empty and the value of the hostPort is set as follows: For containers in a task with the awsvpc network mode, the hostPort is set to the same value as the containerPort. This is a static mapping strategy. For containers in a task with the bridge network mode, the Amazon ECS agent finds open ports on the host and automatically binds them to the container ports. This is a dynamic mapping strategy. If you use containers in a task with the awsvpc or host network mode, the hostPort can either be left blank or set to the same value as the containerPort. If you use containers in a task with the bridge network mode, you can specify a non-reserved host port for your container port mapping, or you can omit the hostPort (or set it to 0) while specifying a containerPort and your container automatically receives a port in the ephemeral port range for your container instance operating system and Docker version. The default ephemeral port range for Docker version 1.6.0 and later is listed on the instance under /proc/sys/net/ipv4/ip_local_port_range. If this kernel parameter is unavailable, the default ephemeral port range from 49153 through 65535 (Linux) or 49152 through 65535 (Windows) is used. Do not attempt to specify a host port in the ephemeral port range as these are reserved for automatic assignment. In general, ports below 32768 are outside of the ephemeral port range. The default reserved ports are 22 for SSH, the Docker ports 2375 and 2376, and the Amazon ECS container agent ports 51678-51680. Any host port that was previously specified in a running task is also reserved while the task is running. That is, after a task stops, the host port is released. The current reserved ports are displayed in the remainingResources of DescribeContainerInstances output. A container instance can have up to 100 reserved ports at a time. This number includes the default reserved ports. Automatically assigned ports aren't included in the 100 reserved ports quota."
        protocol:
          $ref: "#/components/schemas/TransportProtocol"
          description: The protocol used for the port mapping. Valid values are tcp and udp. The default is tcp. protocol is immutable in a Service Connect service. Updating this field requires a service deletion and redeployment.
        name:
          $ref: "#/components/schemas/String"
          description: The name that's used for the port mapping. This parameter is the name that you use in the serviceConnectConfiguration and the vpcLatticeConfigurations of a service. The name can include up to 64 characters. The characters can include lowercase letters, numbers, underscores (_), and hyphens (-). The name can't start with a hyphen.
        appProtocol:
          $ref: "#/components/schemas/ApplicationProtocol"
          description: The application protocol that's used for the port mapping. This parameter only applies to Service Connect. We recommend that you set this parameter to be consistent with the protocol that your application uses. If you set this parameter, Amazon ECS adds protocol-specific connection handling to the Service Connect proxy. If you set this parameter, Amazon ECS adds protocol-specific telemetry in the Amazon ECS console and CloudWatch. If you don't set a value for this parameter, then TCP is used. However, Amazon ECS doesn't add protocol-specific telemetry for TCP. appProtocol is immutable in a Service Connect service. Updating this field requires a service deletion and redeployment. Tasks that run in a namespace can use short names to connect to services in the namespace. Tasks can connect to services across all of the clusters in the namespace. Tasks connect through a managed proxy container that collects logs and metrics for increased visibility. Only the tasks that Amazon ECS services create are supported with Service Connect. For more information, see Service Connect in the Amazon Elastic Container Service Developer Guide.
        containerPortRange:
          $ref: "#/components/schemas/String"
          description: "The port number range on the container that's bound to the dynamically mapped host port range. The following rules apply when you specify a containerPortRange: You must use either the bridge network mode or the awsvpc network mode. This parameter is available for both the EC2 and Fargate launch types. This parameter is available for both the Linux and Windows operating systems. The container instance must have at least version 1.67.0 of the container agent and at least version 1.67.0-1 of the ecs-init package You can specify a maximum of 100 port ranges per container. You do not specify a hostPortRange. The value of the hostPortRange is set as follows: For containers in a task with the awsvpc network mode, the hostPortRange is set to the same value as the containerPortRange. This is a static mapping strategy. For containers in a task with the bridge network mode, the Amazon ECS agent finds open host ports from the default ephemeral range and passes it to docker to bind them to the container ports. The containerPortRange valid values are between 1 and 65535. A port can only be included in one port mapping per container. You cannot specify overlapping port ranges. The first port in the range must be less than last port in the range. Docker recommends that you turn off the docker-proxy in the Docker daemon config file when you have a large number of ports. For more information, see Issue #11185 on the Github website. For information about how to turn off the docker-proxy in the Docker daemon config file, see Docker daemon in the Amazon ECS Developer Guide. You can call DescribeTasks to view the hostPortRange which are the host ports that are bound to the container ports."
    TransportProtocol:
      type: string
      enum:
        - tcp
        - udp
    ApplicationProtocol:
      type: string
      enum:
        - http
        - http2
        - grpc
    ContainerRestartPolicy:
      description: You can enable a restart policy for each container defined in your task definition, to overcome transient failures faster and maintain task availability. When you enable a restart policy for a container, Amazon ECS can restart the container if it exits, without needing to replace the task. For more information, see Restart individual containers in Amazon ECS tasks with container restart policies in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether a restart policy is enabled for the container.
        ignoredExitCodes:
          $ref: "#/components/schemas/IntegerList"
          description: A list of exit codes that Amazon ECS will ignore and not attempt a restart on. You can specify a maximum of 50 container exit codes. By default, Amazon ECS does not ignore any exit codes.
        restartAttemptPeriod:
          $ref: "#/components/schemas/BoxedInteger"
          description: A period of time (in seconds) that the container must run for before a restart can be attempted. A container can be restarted only once every restartAttemptPeriod seconds. If a container isn't able to run for this time period and exits early, it will not be restarted. You can set a minimum restartAttemptPeriod of 60 seconds and a maximum restartAttemptPeriod of 1800 seconds. By default, a container must run for 300 seconds before it can be restarted.
      required:
        - enabled
    IntegerList:
      type: array
      items:
        $ref: "#/components/schemas/BoxedInteger"
    EnvironmentFiles:
      type: array
      items:
        $ref: "#/components/schemas/EnvironmentFile"
    EnvironmentFile:
      description: "A list of files containing the environment variables to pass to a container. You can specify up to ten environment files. The file must have a .env file extension. Each line in an environment file should contain an environment variable in VARIABLE=VALUE format. Lines beginning with # are treated as comments and are ignored. If there are environment variables specified using the environment parameter in a container definition, they take precedence over the variables contained within an environment file. If multiple environment files are specified that contain the same variable, they're processed from the top down. We recommend that you use unique variable names. For more information, see Use a file to pass environment variables to a container in the Amazon Elastic Container Service Developer Guide. Environment variable files are objects in Amazon S3 and all Amazon S3 security considerations apply. You must use the following platforms for the Fargate launch type: Linux platform version 1.4.0 or later. Windows platform version 1.0.0 or later. Consider the following when using the Fargate launch type: The file is handled like a native Docker env-file. There is no support for shell escape handling. The container entry point interperts the VARIABLE values."
      type: object
      properties:
        value:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon S3 object containing the environment variable file.
        type_:
          $ref: "#/components/schemas/EnvironmentFileType"
          description: The file type to use. Environment files are objects in Amazon S3. The only supported value is s3.
      required:
        - value
        - type_
    EnvironmentFileType:
      type: string
      enum:
        - s3
    MountPointList:
      type: array
      items:
        $ref: "#/components/schemas/MountPoint"
    MountPoint:
      description: The details for a volume mount point that's used in a container definition.
      type: object
      properties:
        sourceVolume:
          $ref: "#/components/schemas/String"
          description: The name of the volume to mount. Must be a volume name referenced in the name parameter of task definition volume.
        containerPath:
          $ref: "#/components/schemas/String"
          description: The path on the container to mount the host volume at.
        readOnly_:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If this value is true, the container has read-only access to the volume. If this value is false, then the container can write to the volume. The default value is false.
    VolumeFromList:
      type: array
      items:
        $ref: "#/components/schemas/VolumeFrom"
    VolumeFrom:
      description: Details on a data volume from another container in the same task definition.
      type: object
      properties:
        sourceContainer:
          $ref: "#/components/schemas/String"
          description: The name of another container within the same task definition to mount volumes from.
        readOnly_:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If this value is true, the container has read-only access to the volume. If this value is false, then the container can write to the volume. The default value is false.
    LinuxParameters:
      description: The Linux-specific options that are applied to the container, such as Linux KernelCapabilities.
      type: object
      properties:
        capabilities:
          $ref: "#/components/schemas/KernelCapabilities"
          description: The Linux capabilities for the container that are added to or dropped from the default configuration provided by Docker. For tasks that use the Fargate launch type, capabilities is supported for all platform versions but the add parameter is only supported if using platform version 1.4.0 or later.
        devices:
          $ref: "#/components/schemas/DevicesList"
          description: Any host devices to expose to the container. This parameter maps to Devices in the docker container create command and the --device option to docker run. If you're using tasks that use the Fargate launch type, the devices parameter isn't supported.
        initProcessEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: "Run an init process inside the container that forwards signals and reaps processes. This parameter maps to the --init option to docker run. This parameter requires version 1.25 of the Docker Remote API or greater on your container instance. To check the Docker Remote API version on your container instance, log in to your container instance and run the following command: sudo docker version --format '{{.Server.APIVersion}}'"
        sharedMemorySize:
          $ref: "#/components/schemas/BoxedInteger"
          description: The value for the size (in MiB) of the /dev/shm volume. This parameter maps to the --shm-size option to docker run. If you are using tasks that use the Fargate launch type, the sharedMemorySize parameter is not supported.
        tmpfs:
          $ref: "#/components/schemas/TmpfsList"
          description: The container path, mount options, and size (in MiB) of the tmpfs mount. This parameter maps to the --tmpfs option to docker run.
        maxSwap:
          $ref: "#/components/schemas/BoxedInteger"
          description: The total amount of swap memory (in MiB) a container can use. This parameter will be translated to the --memory-swap option to docker run where the value would be the sum of the container memory plus the maxSwap value. If a maxSwap value of 0 is specified, the container will not use swap. Accepted values are 0 or any positive integer. If the maxSwap parameter is omitted, the container will use the swap configuration for the container instance it is running on. A maxSwap value must be set for the swappiness parameter to be used. If you're using tasks that use the Fargate launch type, the maxSwap parameter isn't supported. If you're using tasks on Amazon Linux 2023 the swappiness parameter isn't supported.
        swappiness:
          $ref: "#/components/schemas/BoxedInteger"
          description: This allows you to tune a container's memory swappiness behavior. A swappiness value of 0 will cause swapping to not happen unless absolutely necessary. A swappiness value of 100 will cause pages to be swapped very aggressively. Accepted values are whole numbers between 0 and 100. If the swappiness parameter is not specified, a default value of 60 is used. If a value is not specified for maxSwap then this parameter is ignored. This parameter maps to the --memory-swappiness option to docker run. If you're using tasks that use the Fargate launch type, the swappiness parameter isn't supported. If you're using tasks on Amazon Linux 2023 the swappiness parameter isn't supported.
    KernelCapabilities:
      description: "The Linux capabilities to add or remove from the default Docker configuration for a container defined in the task definition. For more detailed information about these Linux capabilities, see the capabilities(7) Linux manual page. The following describes how Docker processes the Linux capabilities specified in the add and drop request parameters. For information about the latest behavior, see Docker Compose: order of cap_drop and cap_add in the Docker Community Forum. When the container is a privleged container, the container capabilities are all of the default Docker capabilities. The capabilities specified in the add request parameter, and the drop request parameter are ignored. When the add request parameter is set to ALL, the container capabilities are all of the default Docker capabilities, excluding those specified in the drop request parameter. When the drop request parameter is set to ALL, the container capabilities are the capabilities specified in the add request parameter. When the add request parameter and the drop request parameter are both empty, the capabilities the container capabilities are all of the default Docker capabilities. The default is to first drop the capabilities specified in the drop request parameter, and then add the capabilities specified in the add request parameter."
      type: object
      properties:
        add:
          $ref: "#/components/schemas/StringList"
          description: 'The Linux capabilities for the container that have been added to the default configuration provided by Docker. This parameter maps to CapAdd in the docker container create command and the --cap-add option to docker run. Tasks launched on Fargate only support adding the SYS_PTRACE kernel capability. Valid values: "ALL" | "AUDIT_CONTROL" | "AUDIT_WRITE" | "BLOCK_SUSPEND" | "CHOWN" | "DAC_OVERRIDE" | "DAC_READ_SEARCH" | "FOWNER" | "FSETID" | "IPC_LOCK" | "IPC_OWNER" | "KILL" | "LEASE" | "LINUX_IMMUTABLE" | "MAC_ADMIN" | "MAC_OVERRIDE" | "MKNOD" | "NET_ADMIN" | "NET_BIND_SERVICE" | "NET_BROADCAST" | "NET_RAW" | "SETFCAP" | "SETGID" | "SETPCAP" | "SETUID" | "SYS_ADMIN" | "SYS_BOOT" | "SYS_CHROOT" | "SYS_MODULE" | "SYS_NICE" | "SYS_PACCT" | "SYS_PTRACE" | "SYS_RAWIO" | "SYS_RESOURCE" | "SYS_TIME" | "SYS_TTY_CONFIG" | "SYSLOG" | "WAKE_ALARM"'
        drop:
          $ref: "#/components/schemas/StringList"
          description: 'The Linux capabilities for the container that have been removed from the default configuration provided by Docker. This parameter maps to CapDrop in the docker container create command and the --cap-drop option to docker run. Valid values: "ALL" | "AUDIT_CONTROL" | "AUDIT_WRITE" | "BLOCK_SUSPEND" | "CHOWN" | "DAC_OVERRIDE" | "DAC_READ_SEARCH" | "FOWNER" | "FSETID" | "IPC_LOCK" | "IPC_OWNER" | "KILL" | "LEASE" | "LINUX_IMMUTABLE" | "MAC_ADMIN" | "MAC_OVERRIDE" | "MKNOD" | "NET_ADMIN" | "NET_BIND_SERVICE" | "NET_BROADCAST" | "NET_RAW" | "SETFCAP" | "SETGID" | "SETPCAP" | "SETUID" | "SYS_ADMIN" | "SYS_BOOT" | "SYS_CHROOT" | "SYS_MODULE" | "SYS_NICE" | "SYS_PACCT" | "SYS_PTRACE" | "SYS_RAWIO" | "SYS_RESOURCE" | "SYS_TIME" | "SYS_TTY_CONFIG" | "SYSLOG" | "WAKE_ALARM"'
    DevicesList:
      type: array
      items:
        $ref: "#/components/schemas/Device"
    Device:
      description: An object representing a container instance host device.
      type: object
      properties:
        hostPath:
          $ref: "#/components/schemas/String"
          description: The path for the device on the host container instance.
        containerPath:
          $ref: "#/components/schemas/String"
          description: The path inside the container at which to expose the host device.
        permissions:
          $ref: "#/components/schemas/DeviceCgroupPermissions"
          description: The explicit permissions to provide to the container for the device. By default, the container has permissions for read, write, and mknod for the device.
      required:
        - hostPath
    DeviceCgroupPermissions:
      type: array
      items:
        $ref: "#/components/schemas/DeviceCgroupPermission"
    DeviceCgroupPermission:
      type: string
      enum:
        - read
        - write
        - mknod
    TmpfsList:
      type: array
      items:
        $ref: "#/components/schemas/Tmpfs"
    Tmpfs:
      description: The container path, mount options, and size of the tmpfs mount.
      type: object
      properties:
        containerPath:
          $ref: "#/components/schemas/String"
          description: The absolute file path where the tmpfs volume is to be mounted.
        size:
          $ref: "#/components/schemas/Integer"
          description: The maximum size (in MiB) of the tmpfs volume.
        mountOptions:
          $ref: "#/components/schemas/StringList"
          description: 'The list of tmpfs volume mount options. Valid values: "defaults" | "ro" | "rw" | "suid" | "nosuid" | "dev" | "nodev" | "exec" | "noexec" | "sync" | "async" | "dirsync" | "remount" | "mand" | "nomand" | "atime" | "noatime" | "diratime" | "nodiratime" | "bind" | "rbind" | "unbindable" | "runbindable" | "private" | "rprivate" | "shared" | "rshared" | "slave" | "rslave" | "relatime" | "norelatime" | "strictatime" | "nostrictatime" | "mode" | "uid" | "gid" | "nr_inodes" | "nr_blocks" | "mpol"'
      required:
        - containerPath
        - size
    ContainerDependencies:
      type: array
      items:
        $ref: "#/components/schemas/ContainerDependency"
    ContainerDependency:
      description: "The dependencies defined for container startup and shutdown. A container can contain multiple dependencies. When a dependency is defined for container startup, for container shutdown it is reversed. Your Amazon ECS container instances require at least version 1.26.0 of the container agent to use container dependencies. However, we recommend using the latest container agent version. For information about checking your agent version and updating to the latest version, see Updating the Amazon ECS Container Agent in the Amazon Elastic Container Service Developer Guide. If you're using an Amazon ECS-optimized Linux AMI, your instance needs at least version 1.26.0-1 of the ecs-init package. If your container instances are launched from version 20190301 or later, then they contain the required versions of the container agent and ecs-init. For more information, see Amazon ECS-optimized Linux AMI in the Amazon Elastic Container Service Developer Guide. For tasks that use the Fargate launch type, the task or service requires the following platforms: Linux platform version 1.3.0 or later. Windows platform version 1.0.0 or later. For more information about how to create a container dependency, see Container dependency in the Amazon Elastic Container Service Developer Guide."
      type: object
      properties:
        containerName:
          $ref: "#/components/schemas/String"
          description: The name of a container.
        condition:
          $ref: "#/components/schemas/ContainerCondition"
          description: "The dependency condition of the container. The following are the available conditions and their behavior: START - This condition emulates the behavior of links and volumes today. It validates that a dependent container is started before permitting other containers to start. COMPLETE - This condition validates that a dependent container runs to completion (exits) before permitting other containers to start. This can be useful for nonessential containers that run a script and then exit. This condition can't be set on an essential container. SUCCESS - This condition is the same as COMPLETE, but it also requires that the container exits with a zero status. This condition can't be set on an essential container. HEALTHY - This condition validates that the dependent container passes its Docker health check before permitting other containers to start. This requires that the dependent container has health checks configured. This condition is confirmed only at task startup."
      required:
        - containerName
        - condition
    ContainerCondition:
      type: string
      enum:
        - START
        - COMPLETE
        - SUCCESS
        - HEALTHY
    VersionConsistency:
      type: string
      enum:
        - enabled
        - disabled
    HostEntryList:
      type: array
      items:
        $ref: "#/components/schemas/HostEntry"
    HostEntry:
      description: Hostnames and IP address entries that are added to the /etc/hosts file of a container via the extraHosts parameter of its ContainerDefinition.
      type: object
      properties:
        hostname:
          $ref: "#/components/schemas/String"
          description: The hostname to use in the /etc/hosts entry.
        ipAddress:
          $ref: "#/components/schemas/String"
          description: The IP address to use in the /etc/hosts entry.
      required:
        - hostname
        - ipAddress
    UlimitList:
      type: array
      items:
        $ref: "#/components/schemas/Ulimit"
    Ulimit:
      description: The ulimit settings to pass to the container. Amazon ECS tasks hosted on Fargate use the default resource limit values set by the operating system with the exception of the nofile resource limit parameter which Fargate overrides. The nofile resource limit sets a restriction on the number of open files that a container can use. The default nofile soft limit is 65535 and the default hard limit is 65535. You can specify the ulimit settings for a container in a task definition.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/UlimitName"
          description: The type of the ulimit.
        softLimit:
          $ref: "#/components/schemas/Integer"
          description: The soft limit for the ulimit type. The value can be specified in bytes, seconds, or as a count, depending on the type of the ulimit.
        hardLimit:
          $ref: "#/components/schemas/Integer"
          description: The hard limit for the ulimit type. The value can be specified in bytes, seconds, or as a count, depending on the type of the ulimit.
      required:
        - name
        - softLimit
        - hardLimit
    UlimitName:
      type: string
      enum:
        - core
        - cpu
        - data
        - fsize
        - locks
        - memlock
        - msgqueue
        - nice
        - nofile
        - nproc
        - rss
        - rtprio
        - rttime
        - sigpending
        - stack
    HealthCheck:
      description: "An object representing a container health check. Health check parameters that are specified in a container definition override any Docker health checks that exist in the container image (such as those specified in a parent image or from the image's Dockerfile). This configuration maps to the HEALTHCHECK parameter of docker run. The Amazon ECS container agent only monitors and reports on the health checks specified in the task definition. Amazon ECS does not monitor Docker health checks that are embedded in a container image and not specified in the container definition. Health check parameters that are specified in a container definition override any Docker health checks that exist in the container image. You can view the health status of both individual containers and a task with the DescribeTasks API operation or when viewing the task details in the console. The health check is designed to make sure that your containers survive agent restarts, upgrades, or temporary unavailability. Amazon ECS performs health checks on containers with the default that launched the container instance or the task. The following describes the possible healthStatus values for a container: HEALTHY-The container health check has passed successfully. UNHEALTHY-The container health check has failed. UNKNOWN-The container health check is being evaluated, there's no container health check defined, or Amazon ECS doesn't have the health status of the container. The following describes the possible healthStatus values based on the container health checker status of essential containers in the task with the following priority order (high to low): UNHEALTHY-One or more essential containers have failed their health check. UNKNOWN-Any essential container running within the task is in an UNKNOWN state and no other essential containers have an UNHEALTHY state. HEALTHY-All essential containers within the task have passed their health checks. Consider the following task health example with 2 containers. If Container1 is UNHEALTHY and Container2 is UNKNOWN, the task health is UNHEALTHY. If Container1 is UNHEALTHY and Container2 is HEALTHY, the task health is UNHEALTHY. If Container1 is HEALTHY and Container2 is UNKNOWN, the task health is UNKNOWN. If Container1 is HEALTHY and Container2 is HEALTHY, the task health is HEALTHY. Consider the following task health example with 3 containers. If Container1 is UNHEALTHY and Container2 is UNKNOWN, and Container3 is UNKNOWN, the task health is UNHEALTHY. If Container1 is UNHEALTHY and Container2 is UNKNOWN, and Container3 is HEALTHY, the task health is UNHEALTHY. If Container1 is UNHEALTHY and Container2 is HEALTHY, and Container3 is HEALTHY, the task health is UNHEALTHY. If Container1 is HEALTHY and Container2 is UNKNOWN, and Container3 is HEALTHY, the task health is UNKNOWN. If Container1 is HEALTHY and Container2 is UNKNOWN, and Container3 is UNKNOWN, the task health is UNKNOWN. If Container1 is HEALTHY and Container2 is HEALTHY, and Container3 is HEALTHY, the task health is HEALTHY. If a task is run manually, and not as part of a service, the task will continue its lifecycle regardless of its health status. For tasks that are part of a service, if the task reports as unhealthy then the task will be stopped and the service scheduler will replace it. When a container health check fails for a task that is part of a service, the following process occurs: The task is marked as UNHEALTHY. The unhealthy task will be stopped, and during the stopping process, it will go through the following states: DEACTIVATING - In this state, Amazon ECS performs additional steps before stopping the task. For example, for tasks that are part of services configured to use Elastic Load Balancing target groups, target groups will be deregistered in this state. STOPPING - The task is in the process of being stopped. DEPROVISIONING - Resources associated with the task are being cleaned up. STOPPED - The task has been completely stopped. After the old task stops, a new task will be launched to ensure service operation, and the new task will go through the following lifecycle: PROVISIONING - Resources required for the task are being provisioned. PENDING - The task is waiting to be placed on a container instance. ACTIVATING - In this state, Amazon ECS pulls container images, creates containers, configures task networking, registers load balancer target groups, and configures service discovery status. RUNNING - The task is running and performing its work. For more detailed information about task lifecycle states, see Task lifecycle in the Amazon Elastic Container Service Developer Guide. The following are notes about container health check support: If the Amazon ECS container agent becomes disconnected from the Amazon ECS service, this won't cause a container to transition to an UNHEALTHY status. This is by design, to ensure that containers remain running during agent restarts or temporary unavailability. The health check status is the \"last heard from\" response from the Amazon ECS agent, so if the container was considered HEALTHY prior to the disconnect, that status will remain until the agent reconnects and another health check occurs. There are no assumptions made about the status of the container health checks. Container health checks require version 1.17.0 or greater of the Amazon ECS container agent. For more information, see Updating the Amazon ECS container agent. Container health checks are supported for Fargate tasks if you're using platform version 1.1.0 or greater. For more information, see Fargate platform versions. Container health checks aren't supported for tasks that are part of a service that's configured to use a Classic Load Balancer. For an example of how to specify a task definition with multiple containers where container dependency is specified, see Container dependency in the Amazon Elastic Container Service Developer Guide."
      type: object
      properties:
        command:
          $ref: "#/components/schemas/StringList"
          description: A string array representing the command that the container runs to determine if it is healthy. The string array must start with CMD to run the command arguments directly, or CMD-SHELL to run the command with the container's default shell. When you use the Amazon Web Services Management Console JSON panel, the Command Line Interface, or the APIs, enclose the list of commands in double quotes and brackets. [ "CMD-SHELL", "curl -f http://localhost/ || exit 1" ] You don't include the double quotes and brackets when you use the Amazon Web Services Management Console. CMD-SHELL, curl -f http://localhost/ || exit 1 An exit code of 0 indicates success, and non-zero exit code indicates failure. For more information, see HealthCheck in the docker container create command.
        interval:
          $ref: "#/components/schemas/BoxedInteger"
          description: The time period in seconds between each health check execution. You may specify between 5 and 300 seconds. The default value is 30 seconds. This value applies only when you specify a command.
        timeout:
          $ref: "#/components/schemas/BoxedInteger"
          description: The time period in seconds to wait for a health check to succeed before it is considered a failure. You may specify between 2 and 60 seconds. The default value is 5. This value applies only when you specify a command.
        retries:
          $ref: "#/components/schemas/BoxedInteger"
          description: The number of times to retry a failed health check before the container is considered unhealthy. You may specify between 1 and 10 retries. The default value is 3. This value applies only when you specify a command.
        startPeriod:
          $ref: "#/components/schemas/BoxedInteger"
          description: The optional grace period to provide containers time to bootstrap before failed health checks count towards the maximum number of retries. You can specify between 0 and 300 seconds. By default, the startPeriod is off. This value applies only when you specify a command. If a health check succeeds within the startPeriod, then the container is considered healthy and any subsequent failures count toward the maximum number of retries.
      required:
        - command
    SystemControls:
      type: array
      items:
        $ref: "#/components/schemas/SystemControl"
    SystemControl:
      description: "A list of namespaced kernel parameters to set in the container. This parameter maps to Sysctls in the docker container create command and the --sysctl option to docker run. For example, you can configure net.ipv4.tcp_keepalive_time setting to maintain longer lived connections. We don't recommend that you specify network-related systemControls parameters for multiple containers in a single task that also uses either the awsvpc or host network mode. Doing this has the following disadvantages: For tasks that use the awsvpc network mode including Fargate, if you set systemControls for any container, it applies to all containers in the task. If you set different systemControls for multiple containers in a single task, the container that's started last determines which systemControls take effect. For tasks that use the host network mode, the network namespace systemControls aren't supported. If you're setting an IPC resource namespace to use for the containers in the task, the following conditions apply to your system controls. For more information, see IPC mode. For tasks that use the host IPC mode, IPC namespace systemControls aren't supported. For tasks that use the task IPC mode, IPC namespace systemControls values apply to all containers within a task. This parameter is not supported for Windows containers. This parameter is only supported for tasks that are hosted on Fargate if the tasks are using platform version 1.4.0 or later (Linux). This isn't supported for Windows containers on Fargate."
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/String"
          description: The namespaced kernel parameter to set a value for.
        value:
          $ref: "#/components/schemas/String"
          description: 'The namespaced kernel parameter to set a value for. Valid IPC namespace values: "kernel.msgmax" | "kernel.msgmnb" | "kernel.msgmni" | "kernel.sem" | "kernel.shmall" | "kernel.shmmax" | "kernel.shmmni" | "kernel.shm_rmid_forced", and Sysctls that start with "fs.mqueue.*" Valid network namespace values: Sysctls that start with "net.*". Only namespaced Sysctls that exist within the container starting with "net.* are accepted. All of these values are supported by Fargate.'
    ResourceRequirements:
      type: array
      items:
        $ref: "#/components/schemas/ResourceRequirement"
    ResourceRequirement:
      description: The type and amount of a resource to assign to a container. The supported resource types are GPUs and Elastic Inference accelerators. For more information, see Working with GPUs on Amazon ECS or Working with Amazon Elastic Inference on Amazon ECS in the Amazon Elastic Container Service Developer Guide
      type: object
      properties:
        value:
          $ref: "#/components/schemas/String"
          description: The value for the specified resource type. When the type is GPU, the value is the number of physical GPUs the Amazon ECS container agent reserves for the container. The number of GPUs that's reserved for all containers in a task can't exceed the number of available GPUs on the container instance that the task is launched on. When the type is InferenceAccelerator, the value matches the deviceName for an InferenceAccelerator specified in a task definition.
        type_:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource to assign to a container.
      required:
        - value
        - type_
    ResourceType:
      type: string
      enum:
        - GPU
        - InferenceAccelerator
    FirelensConfiguration:
      description: The FireLens configuration for the container. This is used to specify and configure a log router for container logs. For more information, see Custom log routing in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FirelensConfigurationType"
          description: The log router to use. The valid values are fluentd or fluentbit.
        options:
          type: object
          properties: {}
          description: The options to use when configuring the log router. This field is optional and can be used to specify a custom configuration file or to add additional metadata, such as the task, task definition, cluster, and container instance details to the log event. If specified, the syntax to use is "options":{"enable-ecs-log-metadata":"true|false","config-file-type:"s3|file","config-file-value":"arn:aws:s3:::mybucket/fluent.conf|filepath"}. For more information, see Creating a task definition that uses a FireLens configuration in the Amazon Elastic Container Service Developer Guide. Tasks hosted on Fargate only support the file configuration file type.
      required:
        - type_
    FirelensConfigurationType:
      type: string
      enum:
        - fluentd
        - fluentbit
    NetworkMode:
      type: string
      enum:
        - bridge
        - host
        - awsvpc
        - none
    VolumeList:
      type: array
      items:
        $ref: "#/components/schemas/Volume"
    Volume:
      description: The data volume configuration for tasks launched using this task definition. Specifying a volume configuration in a task definition is optional. The volume configuration may contain multiple volumes but only one volume configured at launch is supported. Each volume defined in the volume configuration may only specify a name and one of either configuredAtLaunch, dockerVolumeConfiguration, efsVolumeConfiguration, s3filesVolumeConfiguration, fsxWindowsFileServerVolumeConfiguration, or host. If an empty volume configuration is specified, by default Amazon ECS uses a host volume. For more information, see Using data volumes in tasks.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the volume. Up to 255 letters (uppercase and lowercase), numbers, underscores, and hyphens are allowed. When using a volume configured at launch, the name is required and must also be specified as the volume name in the ServiceVolumeConfiguration or TaskVolumeConfiguration parameter when creating your service or standalone task. For all other types of volumes, this name is referenced in the sourceVolume parameter of the mountPoints object in the container definition. When a volume is using the efsVolumeConfiguration, the name is required. When a volume is using the s3filesVolumeConfiguration, the name is required.
        host:
          $ref: "#/components/schemas/HostVolumeProperties"
          description: This parameter is specified when you use bind mount host volumes. The contents of the host parameter determine whether your bind mount host volume persists on the host container instance and where it's stored. If the host parameter is empty, then the Docker daemon assigns a host path for your data volume. However, the data isn't guaranteed to persist after the containers that are associated with it stop running. Windows containers can mount whole directories on the same drive as $env:ProgramData. Windows containers can't mount directories on a different drive, and mount point can't be across drives. For example, you can mount C:\my\path:C:\my\path and D:\:D:\, but not D:\my\path:C:\my\path or D:\:C:\my\path.
        dockerVolumeConfiguration:
          $ref: "#/components/schemas/DockerVolumeConfiguration"
          description: This parameter is specified when you use Docker volumes. Windows containers only support the use of the local driver. To use bind mounts, specify the host parameter instead. Docker volumes aren't supported by tasks run on Fargate.
        efsVolumeConfiguration:
          $ref: "#/components/schemas/EFSVolumeConfiguration"
          description: This parameter is specified when you use an Amazon Elastic File System file system for task storage.
        s3filesVolumeConfiguration:
          $ref: "#/components/schemas/S3FilesVolumeConfiguration"
          description: This parameter is specified when you use an Amazon S3 Files file system for task storage.
        fsxWindowsFileServerVolumeConfiguration:
          $ref: "#/components/schemas/FSxWindowsFileServerVolumeConfiguration"
          description: This parameter is specified when you use Amazon FSx for Windows File Server file system for task storage.
        configuredAtLaunch:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether the volume should be configured at launch time. This is used to create Amazon EBS volumes for standalone tasks or tasks created as part of a service. Each task definition revision may only have one volume configured at launch in the volume configuration. To configure a volume at launch time, use this task definition revision and specify a volumeConfigurations object when calling the CreateService, UpdateService, RunTask or StartTask APIs.
    HostVolumeProperties:
      description: Details on a container instance bind mount host volume.
      type: object
      properties:
        sourcePath:
          $ref: "#/components/schemas/String"
          description: When the host parameter is used, specify a sourcePath to declare the path on the host container instance that's presented to the container. If this parameter is empty, then the Docker daemon has assigned a host path for you. If the host parameter contains a sourcePath file location, then the data volume persists at the specified location on the host container instance until you delete it manually. If the sourcePath value doesn't exist on the host container instance, the Docker daemon creates it. If the location does exist, the contents of the source path folder are exported. If you're using the Fargate launch type, the sourcePath parameter is not supported.
    DockerVolumeConfiguration:
      description: This parameter is specified when you're using Docker volumes. Docker volumes are only supported when you're using the EC2 launch type. Windows containers only support the use of the local driver. To use bind mounts, specify a host instead.
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/Scope"
          description: The scope for the Docker volume that determines its lifecycle. Docker volumes that are scoped to a task are automatically provisioned when the task starts and destroyed when the task stops. Docker volumes that are scoped as shared persist after the task stops.
        autoprovision:
          $ref: "#/components/schemas/BoxedBoolean"
          description: If this value is true, the Docker volume is created if it doesn't already exist. This field is only used if the scope is shared.
        driver:
          $ref: "#/components/schemas/String"
          description: The Docker volume driver to use. The driver value must match the driver name provided by Docker because it is used for task placement. If the driver was installed using the Docker plugin CLI, use docker plugin ls to retrieve the driver name from your container instance. If the driver was installed using another method, use Docker plugin discovery to retrieve the driver name. This parameter maps to Driver in the docker container create command and the xxdriver option to docker volume create.
        driverOpts:
          type: object
          properties: {}
          description: A map of Docker driver-specific options passed through. This parameter maps to DriverOpts in the docker create-volume command and the xxopt option to docker volume create.
        labels:
          type: object
          properties: {}
          description: Custom metadata to add to your Docker volume. This parameter maps to Labels in the docker container create command and the xxlabel option to docker volume create.
    Scope:
      type: string
      enum:
        - task
        - shared
    EFSVolumeConfiguration:
      description: This parameter is specified when you're using an Amazon Elastic File System file system for task storage. For more information, see Amazon EFS volumes in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        fileSystemId:
          $ref: "#/components/schemas/String"
          description: The Amazon EFS file system ID to use.
        rootDirectory:
          $ref: "#/components/schemas/String"
          description: The directory within the Amazon EFS file system to mount as the root directory inside the host. If this parameter is omitted, the root of the Amazon EFS volume will be used. Specifying / will have the same effect as omitting this parameter. If an EFS access point is specified in the authorizationConfig, the root directory parameter must either be omitted or set to / which will enforce the path set on the EFS access point.
        transitEncryption:
          $ref: "#/components/schemas/EFSTransitEncryption"
          description: Determines whether to use encryption for Amazon EFS data in transit between the Amazon ECS host and the Amazon EFS server. Transit encryption must be turned on if Amazon EFS IAM authorization is used. If this parameter is omitted, the default value of DISABLED is used. For more information, see Encrypting data in transit in the Amazon Elastic File System User Guide.
        transitEncryptionPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port to use when sending encrypted data between the Amazon ECS host and the Amazon EFS server. If you do not specify a transit encryption port, it will use the port selection strategy that the Amazon EFS mount helper uses. For more information, see EFS mount helper in the Amazon Elastic File System User Guide.
        authorizationConfig:
          $ref: "#/components/schemas/EFSAuthorizationConfig"
          description: The authorization configuration details for the Amazon EFS file system.
      required:
        - fileSystemId
    EFSTransitEncryption:
      type: string
      enum:
        - ENABLED
        - DISABLED
    EFSAuthorizationConfig:
      description: The authorization configuration details for the Amazon EFS file system.
      type: object
      properties:
        accessPointId:
          $ref: "#/components/schemas/String"
          description: The Amazon EFS access point ID to use. If an access point is specified, the root directory value specified in the EFSVolumeConfiguration must either be omitted or set to / which will enforce the path set on the EFS access point. If an access point is used, transit encryption must be on in the EFSVolumeConfiguration. For more information, see Working with Amazon EFS access points in the Amazon Elastic File System User Guide.
        iam:
          $ref: "#/components/schemas/EFSAuthorizationConfigIAM"
          description: Determines whether to use the Amazon ECS task role defined in a task definition when mounting the Amazon EFS file system. If it is turned on, transit encryption must be turned on in the EFSVolumeConfiguration. If this parameter is omitted, the default value of DISABLED is used. For more information, see Using Amazon EFS access points in the Amazon Elastic Container Service Developer Guide.
    EFSAuthorizationConfigIAM:
      type: string
      enum:
        - ENABLED
        - DISABLED
    S3FilesVolumeConfiguration:
      description: This parameter is specified when you're using an Amazon S3 Files file system for task storage. For more information, see Amazon S3 Files volumes in the Amazon Elastic Container Service Developer Guide. Your task definition must include a Task IAM Role. See IAM role for attaching your file system to AWS compute resources for required permissions.
      type: object
      properties:
        fileSystemArn:
          $ref: "#/components/schemas/String"
          description: The full ARN of the S3 Files file system to mount.
        rootDirectory:
          $ref: "#/components/schemas/String"
          description: The directory within the Amazon S3 Files file system to mount as the root directory. If this parameter is omitted, the root of the Amazon S3 Files file system will be used. Specifying / will have the same effect as omitting this parameter. If a S3 Files access point is specified in the accessPointArn, the root directory parameter must either be omitted or set to / which will enforce the path set on the S3 Files access point.
        transitEncryptionPort:
          $ref: "#/components/schemas/BoxedInteger"
          description: The port to use for sending encrypted data between the ECS host and the S3 Files file system. If you do not specify a transit encryption port, it will use the port selection strategy that the Amazon S3 Files mount helper uses. For more information, see S3 Files mount helper.
        accessPointArn:
          $ref: "#/components/schemas/String"
          description: The full ARN of the S3 Files access point to use. If an access point is specified, the root directory value specified in the S3FilesVolumeConfiguration must either be omitted or set to / which will enforce the path set on the S3 Files access point. For more information, see Creating S3 Files access points.
      required:
        - fileSystemArn
    FSxWindowsFileServerVolumeConfiguration:
      description: This parameter is specified when you're using Amazon FSx for Windows File Server file system for task storage. For more information and the input format, see Amazon FSx for Windows File Server volumes in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        fileSystemId:
          $ref: "#/components/schemas/String"
          description: The Amazon FSx for Windows File Server file system ID to use.
        rootDirectory:
          $ref: "#/components/schemas/String"
          description: The directory within the Amazon FSx for Windows File Server file system to mount as the root directory inside the host.
        authorizationConfig:
          $ref: "#/components/schemas/FSxWindowsFileServerAuthorizationConfig"
          description: The authorization configuration details for the Amazon FSx for Windows File Server file system.
      required:
        - fileSystemId
        - rootDirectory
        - authorizationConfig
    FSxWindowsFileServerAuthorizationConfig:
      description: The authorization configuration details for Amazon FSx for Windows File Server file system. See FSxWindowsFileServerVolumeConfiguration in the Amazon ECS API Reference. For more information and the input format, see Amazon FSx for Windows File Server Volumes in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        credentialsParameter:
          $ref: "#/components/schemas/String"
          description: The authorization credential option to use. The authorization credential options can be provided using either the Amazon Resource Name (ARN) of an Secrets Manager secret or SSM Parameter Store parameter. The ARN refers to the stored credentials.
        domain:
          $ref: "#/components/schemas/String"
          description: A fully qualified domain name hosted by an Directory Service Managed Microsoft AD (Active Directory) or self-hosted AD on Amazon EC2.
      required:
        - credentialsParameter
        - domain
    TaskDefinitionStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - DELETE_IN_PROGRESS
    RequiresAttributes:
      type: array
      items:
        $ref: "#/components/schemas/Attribute"
    TaskDefinitionPlacementConstraints:
      type: array
      items:
        $ref: "#/components/schemas/TaskDefinitionPlacementConstraint"
    TaskDefinitionPlacementConstraint:
      description: The constraint on task placement in the task definition. For more information, see Task placement constraints in the Amazon Elastic Container Service Developer Guide. Task placement constraints aren't supported for tasks run on Fargate.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/TaskDefinitionPlacementConstraintType"
          description: The type of constraint. The MemberOf constraint restricts selection to be from a group of valid candidates.
        expression:
          $ref: "#/components/schemas/String"
          description: A cluster query language expression to apply to the constraint. For more information, see Cluster query language in the Amazon Elastic Container Service Developer Guide.
    TaskDefinitionPlacementConstraintType:
      type: string
      enum:
        - memberOf
    CompatibilityList:
      type: array
      items:
        $ref: "#/components/schemas/Compatibility"
    Compatibility:
      type: string
      enum:
        - EC2
        - FARGATE
        - EXTERNAL
        - MANAGED_INSTANCES
    RuntimePlatform:
      description: Information about the platform for the Amazon ECS service or task. For more information about RuntimePlatform, see RuntimePlatform in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        cpuArchitecture:
          $ref: "#/components/schemas/CPUArchitecture"
          description: The CPU architecture. You can run your Linux tasks on an ARM-based platform by setting the value to ARM64. This option is available for tasks that run on Linux Amazon EC2 instance, Amazon ECS Managed Instances, or Linux containers on Fargate.
        operatingSystemFamily:
          $ref: "#/components/schemas/OSFamily"
          description: The operating system.
    CPUArchitecture:
      type: string
      enum:
        - X86_64
        - ARM64
    OSFamily:
      type: string
      enum:
        - WINDOWS_SERVER_2019_FULL
        - WINDOWS_SERVER_2019_CORE
        - WINDOWS_SERVER_2016_FULL
        - WINDOWS_SERVER_2004_CORE
        - WINDOWS_SERVER_2022_CORE
        - WINDOWS_SERVER_2022_FULL
        - WINDOWS_SERVER_2025_CORE
        - WINDOWS_SERVER_2025_FULL
        - WINDOWS_SERVER_20H2_CORE
        - LINUX
    InferenceAccelerators:
      type: array
      items:
        $ref: "#/components/schemas/InferenceAccelerator"
    InferenceAccelerator:
      description: Details on an Elastic Inference accelerator. For more information, see Working with Amazon Elastic Inference on Amazon ECS in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        deviceName:
          $ref: "#/components/schemas/String"
          description: The Elastic Inference accelerator device name. The deviceName must also be referenced in a container definition as a ResourceRequirement.
        deviceType:
          $ref: "#/components/schemas/String"
          description: The Elastic Inference accelerator type to use.
      required:
        - deviceName
        - deviceType
    PidMode:
      type: string
      enum:
        - host
        - task
    IpcMode:
      type: string
      enum:
        - host
        - task
        - none
    ProxyConfiguration:
      description: The configuration details for the App Mesh proxy. For tasks that use the EC2 launch type, the container instances require at least version 1.26.0 of the container agent and at least version 1.26.0-1 of the ecs-init package to use a proxy configuration. If your container instances are launched from the Amazon ECS optimized AMI version 20190301 or later, then they contain the required versions of the container agent and ecs-init. For more information, see Amazon ECS-optimized Linux AMI
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ProxyConfigurationType"
          description: The proxy type. The only supported value is APPMESH.
        containerName:
          $ref: "#/components/schemas/String"
          description: The name of the container that will serve as the App Mesh proxy.
        properties_:
          $ref: "#/components/schemas/ProxyConfigurationProperties"
          description: The set of network configuration parameters to provide the Container Network Interface (CNI) plugin, specified as key-value pairs. IgnoredUID - (Required) The user ID (UID) of the proxy container as defined by the user parameter in a container definition. This is used to ensure the proxy ignores its own traffic. If IgnoredGID is specified, this field can be empty. IgnoredGID - (Required) The group ID (GID) of the proxy container as defined by the user parameter in a container definition. This is used to ensure the proxy ignores its own traffic. If IgnoredUID is specified, this field can be empty. AppPorts - (Required) The list of ports that the application uses. Network traffic to these ports is forwarded to the ProxyIngressPort and ProxyEgressPort. ProxyIngressPort - (Required) Specifies the port that incoming traffic to the AppPorts is directed to. ProxyEgressPort - (Required) Specifies the port that outgoing traffic from the AppPorts is directed to. EgressIgnoredPorts - (Required) The egress traffic going to the specified ports is ignored and not redirected to the ProxyEgressPort. It can be an empty list. EgressIgnoredIPs - (Required) The egress traffic going to the specified IP addresses is ignored and not redirected to the ProxyEgressPort. It can be an empty list.
      required:
        - containerName
    ProxyConfigurationType:
      type: string
      enum:
        - APPMESH
    ProxyConfigurationProperties:
      type: array
      items:
        $ref: "#/components/schemas/KeyValuePair"
    EphemeralStorage:
      description: "The amount of ephemeral storage to allocate for the task. This parameter is used to expand the total amount of ephemeral storage available, beyond the default amount, for tasks hosted on Fargate. For more information, see Using data volumes in tasks in the Amazon ECS Developer Guide;. For tasks using the Fargate launch type, the task requires the following platforms: Linux platform version 1.4.0 or later. Windows platform version 1.0.0 or later."
      type: object
      properties:
        sizeInGiB:
          $ref: "#/components/schemas/Integer"
          description: The total amount, in GiB, of ephemeral storage to set for the task. The minimum supported value is 21 GiB and the maximum supported value is 200 GiB.
      required:
        - sizeInGiB
    Failures:
      type: array
      items:
        $ref: "#/components/schemas/Failure"
    Failure:
      description: A failed resource. For a list of common causes, see API failure reasons in the Amazon Elastic Container Service Developer Guide.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the failed resource.
        reason:
          $ref: "#/components/schemas/String"
          description: The reason for the failure.
        detail:
          $ref: "#/components/schemas/String"
          description: The details of the failure.
    DeleteTaskSetResponse:
      type: object
      properties:
        taskSet:
          $ref: "#/components/schemas/TaskSet"
          description: Details about the task set.
    DeregisterContainerInstanceResponse:
      type: object
      properties:
        containerInstance:
          $ref: "#/components/schemas/ContainerInstance"
          description: The container instance that was deregistered.
    ContainerInstance:
      description: An Amazon EC2 or External instance that's running the Amazon ECS agent and has been registered with a cluster.
      type: object
      properties:
        containerInstanceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the container instance. For more information about the ARN format, see Amazon Resource Name (ARN) in the Amazon ECS Developer Guide.
        ec2InstanceId:
          $ref: "#/components/schemas/String"
          description: The ID of the container instance. For Amazon EC2 instances, this value is the Amazon EC2 instance ID. For external instances, this value is the Amazon Web Services Systems Manager managed instance ID.
        capacityProviderName:
          $ref: "#/components/schemas/String"
          description: The capacity provider that's associated with the container instance.
        version:
          $ref: "#/components/schemas/Long"
          description: The version counter for the container instance. Every time a container instance experiences a change that triggers a CloudWatch event, the version counter is incremented. If you're replicating your Amazon ECS container instance state with CloudWatch Events, you can compare the version of a container instance reported by the Amazon ECS APIs with the version reported in CloudWatch Events for the container instance (inside the detail object) to verify that the version in your event stream is current.
        versionInfo:
          $ref: "#/components/schemas/VersionInfo"
          description: The version information for the Amazon ECS container agent and Docker daemon running on the container instance.
        remainingResources:
          $ref: "#/components/schemas/Resources"
          description: For CPU and memory resource types, this parameter describes the remaining CPU and memory that wasn't already allocated to tasks and is therefore available for new tasks. For port resource types, this parameter describes the ports that were reserved by the Amazon ECS container agent (at instance registration time) and any task containers that have reserved port mappings on the host (with the host or bridge network mode). Any port that's not specified here is available for new tasks.
        registeredResources:
          $ref: "#/components/schemas/Resources"
          description: For CPU and memory resource types, this parameter describes the amount of each resource that was available on the container instance when the container agent registered it with Amazon ECS. This value represents the total amount of CPU and memory that can be allocated on this container instance to tasks. For port resource types, this parameter describes the ports that were reserved by the Amazon ECS container agent when it registered the container instance with Amazon ECS.
        status:
          $ref: "#/components/schemas/String"
          description: The status of the container instance. The valid values are REGISTERING, REGISTRATION_FAILED, ACTIVE, INACTIVE, DEREGISTERING, or DRAINING. If your account has opted in to the awsvpcTrunking account setting, then any newly registered container instance will transition to a REGISTERING status while the trunk elastic network interface is provisioned for the instance. If the registration fails, the instance will transition to a REGISTRATION_FAILED status. You can describe the container instance and see the reason for failure in the statusReason parameter. Once the container instance is terminated, the instance transitions to a DEREGISTERING status while the trunk elastic network interface is deprovisioned. The instance then transitions to an INACTIVE status. The ACTIVE status indicates that the container instance can accept tasks. The DRAINING indicates that new tasks aren't placed on the container instance and any service tasks running on the container instance are removed if possible. For more information, see Container instance draining in the Amazon Elastic Container Service Developer Guide.
        statusReason:
          $ref: "#/components/schemas/String"
          description: The reason that the container instance reached its current status.
        agentConnected:
          $ref: "#/components/schemas/Boolean"
          description: This parameter returns true if the agent is connected to Amazon ECS. An instance with an agent that may be unhealthy or stopped return false. Only instances connected to an agent can accept task placement requests.
        runningTasksCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks on the container instance that have a desired status (desiredStatus) of RUNNING.
        pendingTasksCount:
          $ref: "#/components/schemas/Integer"
          description: The number of tasks on the container instance that are in the PENDING status.
        agentUpdateStatus:
          $ref: "#/components/schemas/AgentUpdateStatus"
          description: The status of the most recent agent update. If an update wasn't ever requested, this value is NULL.
        attributes:
          $ref: "#/components/schemas/Attributes"
          description: The attributes set for the container instance, either by the Amazon ECS container agent at instance registration or manually with the PutAttributes operation.
        registeredAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for the time when the container instance was registered.
        attachments:
          $ref: "#/components/schemas/Attachments"
          description: The resources attached to a container instance, such as an elastic network interface.
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that you apply to the container instance to help you categorize and organize them. Each tag consists of a key and an optional value. You define both. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
        healthStatus:
          $ref: "#/components/schemas/ContainerInstanceHealthStatus"
          description: An object representing the health status of the container instance.
    Long:
      type: integer
      format: int64
    VersionInfo:
      description: The Docker and Amazon ECS container agent version information about a container instance.
      type: object
      properties:
        agentVersion:
          $ref: "#/components/schemas/String"
          description: The version number of the Amazon ECS container agent.
        agentHash:
