    AutoScalingGroupProviderUpdate:
      description: The details of the Auto Scaling group capacity provider to update.
      type: object
      properties:
        managedScaling:
          $ref: "#/components/schemas/ManagedScaling"
          description: The managed scaling settings for the Auto Scaling group capacity provider.
        managedTerminationProtection:
          $ref: "#/components/schemas/ManagedTerminationProtection"
          description: The managed termination protection setting to use for the Auto Scaling group capacity provider. This determines whether the Auto Scaling group has managed termination protection. When using managed termination protection, managed scaling must also be used otherwise managed termination protection doesn't work. When managed termination protection is on, Amazon ECS prevents the Amazon EC2 instances in an Auto Scaling group that contain tasks from being terminated during a scale-in action. The Auto Scaling group and each instance in the Auto Scaling group must have instance protection from scale-in actions on. For more information, see Instance Protection in the Auto Scaling User Guide. When managed termination protection is off, your Amazon EC2 instances aren't protected from termination when the Auto Scaling group scales in.
        managedDraining:
          $ref: "#/components/schemas/ManagedDraining"
          description: The managed draining option for the Auto Scaling group capacity provider. When you enable this, Amazon ECS manages and gracefully drains the EC2 container instances that are in the Auto Scaling group capacity provider.
    UpdateManagedInstancesProviderConfiguration:
      description: The updated configuration for a Amazon ECS Managed Instances provider. You can modify the infrastructure role, instance launch template, and tag propagation settings. Changes apply to new instances launched after the update.
      type: object
      properties:
        infrastructureRoleArn:
          $ref: "#/components/schemas/String"
          description: The updated Amazon Resource Name (ARN) of the infrastructure role. The new role must have the necessary permissions to manage instances and access required Amazon Web Services services. For more information, see Amazon ECS infrastructure IAM role in the Amazon ECS Developer Guide.
        instanceLaunchTemplate:
          $ref: "#/components/schemas/InstanceLaunchTemplateUpdate"
          description: The updated launch template configuration. Changes to the launch template affect new instances launched after the update, while existing instances continue to use their original configuration.
        propagateTags:
          $ref: "#/components/schemas/PropagateMITags"
          description: The updated tag propagation setting. When changed, this affects only new instances launched after the update.
        infrastructureOptimization:
          $ref: "#/components/schemas/InfrastructureOptimization"
          description: The updated infrastructure optimization configuration. Changes to this setting affect how Amazon ECS optimizes instances going forward.
        autoRepairConfiguration:
          $ref: "#/components/schemas/AutoRepairConfiguration"
          description: The updated auto repair configuration for the Amazon ECS Managed Instances capacity provider.
      required:
        - infrastructureRoleArn
        - instanceLaunchTemplate
    InstanceLaunchTemplateUpdate:
      description: The updated launch template configuration for Amazon ECS Managed Instances. You can modify the instance profile, network configuration, storage settings, and instance requirements. Changes apply to new instances launched after the update. For more information, see Store instance launch parameters in Amazon EC2 launch templates in the Amazon EC2 User Guide.
      type: object
      properties:
        ec2InstanceProfileArn:
          $ref: "#/components/schemas/String"
          description: The updated Amazon Resource Name (ARN) of the instance profile. The new instance profile must have the necessary permissions for your tasks. For more information, see Amazon ECS instance profile for Managed Instances in the Amazon ECS Developer Guide.
        networkConfiguration:
          $ref: "#/components/schemas/ManagedInstancesNetworkConfiguration"
          description: The updated network configuration for Amazon ECS Managed Instances. Changes to subnets and security groups affect new instances launched after the update.
        storageConfiguration:
          $ref: "#/components/schemas/ManagedInstancesStorageConfiguration"
          description: The updated storage configuration for Amazon ECS Managed Instances. Changes to storage settings apply to new instances launched after the update.
        instanceMetadataTagsPropagation:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether tags are propagated to the instance metadata service (IMDS) for Amazon EC2 instances launched by the Managed Instances capacity provider. When enabled, all tags associated with the instance are available through the instance metadata service. When disabled, tags are not propagated to IMDS. Disable this setting if your tags contain characters that are not compatible with IMDS, such as /. IMDS requires tag keys to match the pattern [0-9a-zA-Z\-_+=,.@:]{1,255}. The default value is true. For more information, see Work with instance tags in instance metadata in the Amazon EC2 User Guide.
        localStorageConfiguration:
          $ref: "#/components/schemas/ManagedInstancesLocalStorageConfiguration"
          description: The updated local storage configuration for Amazon ECS Managed Instances. Changes to local storage settings apply to new instances launched after the update.
        monitoring:
          $ref: "#/components/schemas/ManagedInstancesMonitoringOptions"
          description: "CloudWatch provides two categories of monitoring: basic monitoring and detailed monitoring. By default, your managed instance is configured for basic monitoring. You can optionally enable detailed monitoring to help you more quickly identify and act on operational issues. You can enable or turn off detailed monitoring at launch or when the managed instance is running or stopped. For more information, see Detailed monitoring for Amazon ECS Managed Instances in the Amazon ECS Developer Guide."
        instanceRequirements:
          $ref: "#/components/schemas/InstanceRequirementsRequest"
          description: The updated instance requirements for attribute-based instance type selection. Changes to instance requirements affect which instance types Amazon ECS selects for new instances.
        capacityReservations:
          $ref: "#/components/schemas/CapacityReservationRequest"
          description: The updated capacity reservations specifications for Amazon ECS Managed Instances. Changes to capacity reservations settings apply to new instances launched after the update.
