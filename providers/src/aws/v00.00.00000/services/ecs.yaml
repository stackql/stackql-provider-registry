        - logGroupName
    ServiceFieldList:
      type: array
      items:
        $ref: "#/components/schemas/ServiceField"
    ServiceField:
      type: string
      enum:
        - TAGS
    DescribeServicesResponse:
      type: object
      properties:
        services:
          $ref: "#/components/schemas/Services"
          description: The list of services described.
        failures:
          $ref: "#/components/schemas/Failures"
          description: Any failures associated with the call.
    Services:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    TaskDefinitionFieldList:
      type: array
      items:
        $ref: "#/components/schemas/TaskDefinitionField"
    TaskDefinitionField:
      type: string
      enum:
        - TAGS
    DescribeTaskDefinitionResponse:
      type: object
      properties:
        taskDefinition:
          $ref: "#/components/schemas/TaskDefinition"
          description: The full task definition description.
        tags:
          $ref: "#/components/schemas/Tags"
          description: "The metadata that's applied to the task definition to help you categorize and organize them. Each tag consists of a key and an optional value. You define both. The following basic restrictions apply to tags: Maximum number of tags per resource - 50 For each resource, each tag key must be unique, and each tag key can have only one value. Maximum key length - 128 Unicode characters in UTF-8 Maximum value length - 256 Unicode characters in UTF-8 If your tagging schema is used across multiple services and resources, remember that other services may have restrictions on allowed characters. Generally allowed characters are: letters, numbers, and spaces representable in UTF-8, and the following characters: + - = . _ : / @. Tag keys and values are case-sensitive. Do not use aws:, AWS:, or any upper or lowercase combination of such as a prefix for either keys or values as it is reserved for Amazon Web Services use. You cannot edit or delete tag keys or values with this prefix. Tags with this prefix do not count against your tags per resource limit."
    TaskSetFieldList:
      type: array
      items:
        $ref: "#/components/schemas/TaskSetField"
    TaskSetField:
      type: string
      enum:
        - TAGS
    DescribeTaskSetsResponse:
      type: object
      properties:
        taskSets:
          $ref: "#/components/schemas/TaskSets"
          description: The list of task sets described.
        failures:
          $ref: "#/components/schemas/Failures"
          description: Any failures associated with the call.
    TaskFieldList:
      type: array
      items:
        $ref: "#/components/schemas/TaskField"
    TaskField:
      type: string
      enum:
        - TAGS
    DescribeTasksResponse:
      type: object
      properties:
