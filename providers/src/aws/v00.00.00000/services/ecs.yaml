      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the capacity provider.
        runningInstanceCount:
          $ref: "#/components/schemas/BoxedInteger"
          description: The number of instances running daemon tasks on this capacity provider.
        drainingInstanceCount:
          $ref: "#/components/schemas/BoxedInteger"
          description: The number of instances being drained on this capacity provider during the deployment.
    DaemonDeploymentRevisionDetailList:
      type: array
      items:
        $ref: "#/components/schemas/DaemonDeploymentRevisionDetail"
    DaemonCircuitBreaker:
