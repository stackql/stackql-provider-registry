                propagateTags:
                  $ref: "#/components/schemas/PropagateTags"
                  description: Specifies whether to propagate the tags from the task definition to the task. If no value is specified, the tags aren't propagated. Tags can only be propagated to the task during task creation. To add tags to a task after task creation, use theTagResource API action. An error will be received if you specify the SERVICE option when running a task.
