          description: The number of times the circuit breaker detected a daemon deployment failure.
        status:
          $ref: "#/components/schemas/DaemonDeploymentRollbackMonitorsStatus"
          description: The circuit breaker status. Amazon ECS is not using the circuit breaker for daemon deployment failures when the status is DISABLED.
        threshold:
          $ref: "#/components/schemas/Integer"
          description: The threshold which determines that the daemon deployment failed.
    DaemonDeploymentRollbackMonitorsStatus:
      type: string
