        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The Unix timestamp for when the Cloudwatch LogGroup was last updated
        logGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the Cloudwatch Log Group associated with the Express service.
