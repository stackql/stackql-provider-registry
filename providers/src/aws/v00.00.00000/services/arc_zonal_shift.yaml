openapi: 3.0.0
info:
  version: "2022-10-30"
  title: AWS ARC - Zonal Shift
  description: AWS ARC - Zonal Shift
  x-serviceName: arc-zonal-shift
  x-serviceAlias: arc_zonal_shift
  x-protocol: rest-json
  x-apiVersion: "2022-10-30"
  x-endpointPrefix: arc-zonal-shift
servers:
  - url: https://arc-zonal-shift.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for arc-zonal-shift
paths:
  /practiceruns/{zonal_shift_id}:
    delete:
      operationId: CancelPracticeRun
      description: Cancel an in-progress practice run zonal shift in Amazon Application Recovery Controller.
      parameters:
        - name: zonal_shift_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of a practice run zonal shift in Amazon Application Recovery Controller that you want to cancel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelPracticeRunResponse"
  /zonalshifts/{zonal_shift_id}:
    delete:
      operationId: CancelZonalShift
      description: Cancel a zonal shift in Amazon Application Recovery Controller. To cancel the zonal shift, specify the zonal shift ID. A zonal shift can be one that you've started for a resource in your Amazon Web Services account in an Amazon Web Services Region, or it can be a zonal shift started by a practice run with zonal autoshift.
      parameters:
        - name: zonal_shift_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ZonalShiftId"
          description: The internally-generated identifier of a zonal shift.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZonalShift"
    patch:
      operationId: UpdateZonalShift
      description: Update an active zonal shift in Amazon Application Recovery Controller in your Amazon Web Services account. You can update a zonal shift to set a new expiration, or edit or replace the comment for the zonal shift.
      parameters:
        - name: zonal_shift_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of a zonal shift.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  $ref: "#/components/schemas/ZonalShiftComment"
                expiresIn:
                  $ref: "#/components/schemas/ExpiresIn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZonalShift"
  /configuration:
    post:
      operationId: CreatePracticeRunConfiguration
      description: A practice run configuration for zonal autoshift is required when you enable zonal autoshift. A practice run configuration includes specifications for blocked dates and blocked time windows, and for Amazon CloudWatch alarms that you create to use with practice runs. The alarms that you specify are an outcome alarm, to monitor application health during practice runs and, optionally, a blocking alarm, to block practice runs from starting. When a resource has a practice run configuration, ARC starts zonal shifts for the resource weekly, to shift traffic for practice runs. Practice runs help you to ensure that shifting away traffic from an Availability Zone during an autoshift is safe for your application. For more information, see Considerations when you configure zonal autoshift in the Amazon Application Recovery Controller Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                blockedWindows:
                  $ref: "#/components/schemas/BlockedWindows"
                blockedDates:
                  $ref: "#/components/schemas/BlockedDates"
                blockingAlarms:
                  $ref: "#/components/schemas/BlockingAlarms"
                allowedWindows:
                  $ref: "#/components/schemas/AllowedWindows"
                outcomeAlarms:
                  $ref: "#/components/schemas/OutcomeAlarms"
              required:
                - resourceIdentifier
                - outcomeAlarms
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePracticeRunConfigurationResponse"
  /configuration/{resource_identifier}:
    delete:
      operationId: DeletePracticeRunConfiguration
      description: Deletes the practice run configuration for a resource. Before you can delete a practice run configuration for a resource., you must disable zonal autoshift for the resource. Practice runs must be configured for zonal autoshift to be enabled.
      parameters:
        - name: resource_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you want to delete the practice run configuration for. The identifier is the Amazon Resource Name (ARN) for the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePracticeRunConfigurationResponse"
    patch:
      operationId: UpdatePracticeRunConfiguration
      description: "Update a practice run configuration to change one or more of the following: add, change, or remove the blocking alarm; change the outcome alarm; or add, change, or remove blocking dates or time windows."
      parameters:
        - name: resource_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you want to update the practice run configuration for. The identifier is the Amazon Resource Name (ARN) for the resource.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                blockedWindows:
                  $ref: "#/components/schemas/BlockedWindows"
                blockedDates:
                  $ref: "#/components/schemas/BlockedDates"
                blockingAlarms:
                  $ref: "#/components/schemas/BlockingAlarms"
                allowedWindows:
                  $ref: "#/components/schemas/AllowedWindows"
                outcomeAlarms:
                  $ref: "#/components/schemas/OutcomeAlarms"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePracticeRunConfigurationResponse"
  /autoshift-observer-notification:
    get:
      operationId: GetAutoshiftObserverNotificationStatus
      description: Returns the status of the autoshift observer notification. Autoshift observer notifications notify you through Amazon EventBridge when there is an autoshift event for zonal autoshift. The status can be ENABLED or DISABLED. When ENABLED, a notification is sent when an autoshift is triggered. When DISABLED, notifications are not sent.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAutoshiftObserverNotificationStatusResponse"
    put:
      operationId: UpdateAutoshiftObserverNotificationStatus
      description: Update the status of autoshift observer notification. Autoshift observer notification enables you to be notified, through Amazon EventBridge, when there is an autoshift event for zonal autoshift. If the status is ENABLED, ARC includes all autoshift events when you use the EventBridge pattern Autoshift In Progress. When the status is DISABLED, ARC includes only autoshift events for autoshifts when one or more of your resources is included in the autoshift. For more information, see Notifications for practice runs and autoshifts in the Amazon Application Recovery Controller Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/AutoshiftObserverNotificationStatus"
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAutoshiftObserverNotificationStatusResponse"
  /managedresources/{resource_identifier}:
    get:
      operationId: GetManagedResource
      description: Get information about a resource that's been registered for zonal shifts with Amazon Application Recovery Controller in this Amazon Web Services Region. Resources that are registered for zonal shifts are managed resources in ARC. You can start zonal shifts and configure zonal autoshift for managed resources.
      parameters:
        - name: resource_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdentifier"
          description: "The identifier for the resource that Amazon Web Services shifts traffic for. The identifier is the Amazon Resource Name (ARN) for the resource. Amazon Application Recovery Controller currently supports enabling the following resources for zonal shift and zonal autoshift: Amazon EC2 Auto Scaling groups Amazon Elastic Kubernetes Service Application Load Balancer Network Load Balancer"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedResourceResponse"
    put:
      operationId: UpdateZonalAutoshiftConfiguration
      description: The zonal autoshift configuration for a resource includes the practice run configuration and the status for running autoshifts, zonal autoshift status. When a resource has a practice run configuration, ARC starts weekly zonal shifts for the resource, to shift traffic away from an Availability Zone. Weekly practice runs help you to make sure that your application can continue to operate normally with the loss of one Availability Zone. You can update the zonal autoshift status to enable or disable zonal autoshift. When zonal autoshift is ENABLED, you authorize Amazon Web Services to shift away resource traffic for an application from an Availability Zone during events, on your behalf, to help reduce time to recovery. Traffic is also shifted away for the required weekly practice runs.
      parameters:
        - name: resource_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you want to update the zonal autoshift configuration for. The identifier is the Amazon Resource Name (ARN) for the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                zonalAutoshiftStatus:
                  $ref: "#/components/schemas/ZonalAutoshiftStatus"
              required:
                - zonalAutoshiftStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateZonalAutoshiftConfigurationResponse"
  /autoshifts:
    get:
      operationId: ListAutoshifts
      description: Returns the autoshifts for an Amazon Web Services Region. By default, the call returns only ACTIVE autoshifts. Optionally, you can specify the status parameter to return COMPLETED autoshifts.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AutoshiftExecutionStatus"
          description: The status of the autoshift.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutoshiftsResponse"
  /managedresources:
    get:
      operationId: ListManagedResources
      description: Lists all the resources in your Amazon Web Services account in this Amazon Web Services Region that are managed for zonal shifts in Amazon Application Recovery Controller, and information about them. The information includes the zonal autoshift status for the resource, as well as the Amazon Resource Name (ARN), the Availability Zones that each resource is deployed in, and the resource name.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedResourcesResponse"
  /zonalshifts:
    get:
      operationId: ListZonalShifts
      description: Lists all active and completed zonal shifts in Amazon Application Recovery Controller in your Amazon Web Services account in this Amazon Web Services Region. ListZonalShifts returns customer-initiated zonal shifts, as well as practice run zonal shifts that ARC started on your behalf for zonal autoshift. For more information about listing autoshifts, see ">ListAutoshifts.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ZonalShiftStatus"
          description: "A status for a zonal shift. The Status for a zonal shift can have one of the following values: ACTIVE: The zonal shift has been started and is active. EXPIRED: The zonal shift has expired (the expiry time was exceeded). CANCELED: The zonal shift was canceled."
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of objects that you want to return with this call.
        - name: resourceIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you want to list zonal shifts for. The identifier is the Amazon Resource Name (ARN) for the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListZonalShiftsResponse"
    post:
      operationId: StartZonalShift
      description: "You start a zonal shift to temporarily move load balancer traffic away from an Availability Zone in an Amazon Web Services Region, to help your application recover immediately, for example, from a developer's bad code deployment or from an Amazon Web Services infrastructure failure in a single Availability Zone. You can start a zonal shift in ARC only for managed resources in your Amazon Web Services account in an Amazon Web Services Region. Resources are automatically registered with ARC by Amazon Web Services services. Amazon Application Recovery Controller currently supports enabling the following resources for zonal shift and zonal autoshift: Amazon EC2 Auto Scaling groups Amazon Elastic Kubernetes Service Application Load Balancer Network Load Balancer When you start a zonal shift, traffic for the resource is no longer routed to the Availability Zone. The zonal shift is created immediately in ARC. However, it can take a short time, typically up to a few minutes, for existing, in-progress connections in the Availability Zone to complete. For more information, see Zonal shift in the Amazon Application Recovery Controller Developer Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                awayFrom:
                  $ref: "#/components/schemas/AvailabilityZone"
                expiresIn:
                  $ref: "#/components/schemas/ExpiresIn"
                comment:
                  $ref: "#/components/schemas/ZonalShiftComment"
              required:
                - resourceIdentifier
                - awayFrom
                - expiresIn
                - comment
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZonalShift"
  /practiceruns:
    post:
      operationId: StartPracticeRun
      description: Start an on-demand practice run zonal shift in Amazon Application Recovery Controller. With zonal autoshift enabled, you can start an on-demand practice run to verify preparedness at any time. Amazon Web Services also runs automated practice runs about weekly when you have enabled zonal autoshift. For more information, see Considerations when you configure zonal autoshift in the Amazon Application Recovery Controller Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceIdentifier:
                  $ref: "#/components/schemas/ResourceIdentifier"
                awayFrom:
                  $ref: "#/components/schemas/AvailabilityZone"
                comment:
                  $ref: "#/components/schemas/ZonalShiftComment"
              required:
                - resourceIdentifier
                - awayFrom
                - comment
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPracticeRunResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ZonalShiftId:
      type: string
      minLength: 6
      maxLength: 36
      pattern: "[A-Za-z0-9-]+"
    CancelPracticeRunResponse:
      type: object
      properties:
        zonalShiftId:
          $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of the practice run zonal shift in Amazon Application Recovery Controller that was canceled.
        resourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you canceled a practice run zonal shift for. The identifier is the Amazon Resource Name (ARN) for the resource.
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic was moved away from for a resource that you specified for the practice run.
        expiryTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The expiry time (expiration time) for an on-demand practice run zonal shift is 30 minutes from the time when you start the practice run, unless you cancel it before that time. However, be aware that the expiryTime field for practice run zonal shifts always has a value of 1 minute.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (UTC) when the zonal shift starts.
        status:
          $ref: "#/components/schemas/ZonalShiftStatus"
          description: "A status for the practice run that you canceled (expected status is CANCELED). The Status for a practice run zonal shift can have one of the following values:"
        comment:
          $ref: "#/components/schemas/ZonalShiftComment"
          description: The initial comment that you entered about the practice run. Be aware that this comment can be overwritten by Amazon Web Services if the automatic check for balanced capacity fails. For more information, see Capacity checks for practice runs in the Amazon Application Recovery Controller Developer Guide.
      required:
        - zonalShiftId
        - resourceIdentifier
        - awayFrom
        - expiryTime
        - startTime
        - status
        - comment
    ResourceIdentifier:
      type: string
      minLength: 8
      maxLength: 1024
    AvailabilityZone:
      type: string
      minLength: 0
      maxLength: 20
    ExpiryTime:
      type: string
      format: date-time
    StartTime:
      type: string
      format: date-time
    ZonalShiftStatus:
      type: string
      enum:
        - ACTIVE
        - EXPIRED
        - CANCELED
    ZonalShiftComment:
      type: string
      minLength: 0
      maxLength: 128
    ZonalShift:
      type: object
      properties:
        zonalShiftId:
          $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of a zonal shift.
        resourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: "The identifier for the resource that Amazon Web Services shifts traffic for. The identifier is the Amazon Resource Name (ARN) for the resource. Amazon Application Recovery Controller currently supports enabling the following resources for zonal shift and zonal autoshift: Amazon EC2 Auto Scaling groups Amazon Elastic Kubernetes Service Application Load Balancer Network Load Balancer"
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic is moved away from for a resource when you start a zonal shift. Until the zonal shift expires or you cancel it, traffic for the resource is instead moved to other Availability Zones in the Amazon Web Services Region.
        expiryTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The expiry time (expiration time) for a customer-initiated zonal shift. A zonal shift is temporary and must be set to expire when you start the zonal shift. You can initially set a zonal shift to expire in a maximum of three days (72 hours). However, you can update a zonal shift to set a new expiration at any time. When you start a zonal shift, you specify how long you want it to be active, which ARC converts to an expiry time (expiration time). You can cancel a zonal shift when you're ready to restore traffic to the Availability Zone, or just wait for it to expire. Or you can update the zonal shift to specify another length of time to expire in.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (UTC) when the zonal shift starts.
        status:
          $ref: "#/components/schemas/ZonalShiftStatus"
          description: "A status for a zonal shift. The Status for a zonal shift can have one of the following values: ACTIVE: The zonal shift has been started and is active. EXPIRED: The zonal shift has expired (the expiry time was exceeded). CANCELED: The zonal shift was canceled."
        comment:
          $ref: "#/components/schemas/ZonalShiftComment"
          description: A comment that you enter about the zonal shift. Only the latest comment is retained; no comment history is maintained. A new comment overwrites any existing comment string.
      required:
        - zonalShiftId
        - resourceIdentifier
        - awayFrom
        - expiryTime
        - startTime
        - status
        - comment
    BlockedWindows:
      type: array
      items:
        $ref: "#/components/schemas/BlockedWindow"
    BlockedWindow:
      type: string
      minLength: 19
      maxLength: 19
      pattern: (Mon|Tue|Wed|Thu|Fri|Sat|Sun):[0-9]{2}:[0-9]{2}-(Mon|Tue|Wed|Thu|Fri|Sat|Sun):[0-9]{2}:[0-9]{2}
    BlockedDates:
      type: array
      items:
        $ref: "#/components/schemas/BlockedDate"
    BlockedDate:
      type: string
      minLength: 10
      maxLength: 10
      pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}"
    BlockingAlarms:
      type: array
      items:
        $ref: "#/components/schemas/ControlCondition"
    ControlCondition:
      description: A control condition is an alarm that you specify for a practice run. When you configure practice runs with zonal autoshift for a resource, you specify Amazon CloudWatch alarms, which you create in CloudWatch to use with the practice run. The alarms that you specify are an outcome alarm, to monitor application health during practice runs and, optionally, a blocking alarm, to block practice runs from starting or to interrupt a practice run in progress. Control condition alarms do not apply for autoshifts. For more information, see Considerations when you configure zonal autoshift in the Amazon Application Recovery Controller Developer Guide.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ControlConditionType"
          description: The type of alarm specified for a practice run. You can only specify Amazon CloudWatch alarms for practice runs, so the only valid value is CLOUDWATCH.
        alarmIdentifier:
          $ref: "#/components/schemas/MetricIdentifier"
          description: The Amazon Resource Name (ARN) for an Amazon CloudWatch alarm that you specify as a control condition for a practice run.
      required:
        - type_
        - alarmIdentifier
    ControlConditionType:
      type: string
      enum:
        - CLOUDWATCH
    MetricIdentifier:
      type: string
      minLength: 8
      maxLength: 1024
      pattern: .*
    AllowedWindows:
      type: array
      items:
        $ref: "#/components/schemas/AllowedWindow"
    AllowedWindow:
      type: string
      minLength: 19
      maxLength: 19
      pattern: (Mon|Tue|Wed|Thu|Fri|Sat|Sun):[0-9]{2}:[0-9]{2}-(Mon|Tue|Wed|Thu|Fri|Sat|Sun):[0-9]{2}:[0-9]{2}
    OutcomeAlarms:
      type: array
      items:
        $ref: "#/components/schemas/ControlCondition"
    CreatePracticeRunConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you configured the practice run for.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the resource that you configured the practice run for.
        zonalAutoshiftStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: The status for zonal autoshift for a resource. When you specify ENABLED for the autoshift status, Amazon Web Services shifts traffic away from shifts away application resource traffic from an Availability Zone, on your behalf, when internal telemetry indicates that there is an Availability Zone impairment that could potentially impact customers. When you enable zonal autoshift, you must also configure practice runs for the resource.
        practiceRunConfiguration:
          $ref: "#/components/schemas/PracticeRunConfiguration"
          description: A practice run configuration for a resource. Configurations include the outcome alarm that you specify for practice runs, and, optionally, a blocking alarm and blocking dates and windows.
      required:
        - arn
        - name
        - zonalAutoshiftStatus
        - practiceRunConfiguration
    ResourceArn:
      type: string
      minLength: 8
      maxLength: 1024
      pattern: arn:.*
    ResourceName:
      type: string
      minLength: 1
      maxLength: 256
    ZonalAutoshiftStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    PracticeRunConfiguration:
      description: A practice run configuration for a resource includes the Amazon CloudWatch alarms that you've specified for a practice run, as well as any blocked dates or blocked windows for the practice run. When a resource has a practice run configuration, ARC shifts traffic for the resource weekly for practice runs. Practice runs are required for zonal autoshift. The zonal shifts that ARC starts for practice runs help you to ensure that shifting away traffic from an Availability Zone during an autoshift is safe for your application. You can update or delete a practice run configuration. Before you delete a practice run configuration, you must disable zonal autoshift for the resource. A practice run configuration is required when zonal autoshift is enabled.
      type: object
      properties:
        blockingAlarms:
          $ref: "#/components/schemas/BlockingAlarms"
          description: Blocking alarms for practice runs are optional alarms that you can specify that block practice runs when one or more of the alarms is in an ALARM state.
        outcomeAlarms:
          $ref: "#/components/schemas/OutcomeAlarms"
          description: Outcome alarms for practice runs are alarms that you specify that end a practice run when one or more of the alarms is in an ALARM state.
        blockedWindows:
          $ref: "#/components/schemas/BlockedWindows"
          description: An array of one or more windows of days and times that you can block ARC from starting practice runs for a resource. Specify the blocked windows in UTC, using the format DAY:HH:MM-DAY:HH:MM, separated by spaces. For example, MON:18:30-MON:19:30 TUE:18:30-TUE:19:30. The blockedWindows have to start and end on the same day. Windows that span multiple days aren't supported.
        allowedWindows:
          $ref: "#/components/schemas/AllowedWindows"
          description: "An array of one or more windows of days and times that you can allow ARC to start practice runs for a resource. For example, say you want to allow practice runs only on Wednesdays and Fridays from noon to 5 p.m. For this scenario, you could set the following recurring days and times as allowed windows, for example: Wed-12:00-Wed:17:00 Fri-12:00-Fri:17:00. The allowedWindows have to start and end on the same day. Windows that span multiple days aren't supported."
        blockedDates:
          $ref: "#/components/schemas/BlockedDates"
          description: An array of one or more dates that you can specify when Amazon Web Services does not start practice runs for a resource. Specify blocked dates, in UTC, in the format YYYY-MM-DD, separated by spaces.
      required:
        - outcomeAlarms
    DeletePracticeRunConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you deleted the practice run for.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the resource that you deleted the practice run for.
        zonalAutoshiftStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: The status of zonal autoshift for the resource.
      required:
        - arn
        - name
        - zonalAutoshiftStatus
    GetAutoshiftObserverNotificationStatusResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AutoshiftObserverNotificationStatus"
          description: The status of autoshift observer notification. If the status is ENABLED, ARC includes all autoshift events when you use the Amazon EventBridge pattern Autoshift In Progress. When the status is DISABLED, ARC includes only autoshift events for autoshifts when one or more of your resources is included in the autoshift.
      required:
        - status
    AutoshiftObserverNotificationStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    GetManagedResourceResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) for the resource.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the resource.
        appliedWeights:
          type: object
          properties: {}
          description: A collection of key-value pairs that indicate whether resources are active in Availability Zones or not. The key name is the Availability Zone where the resource is deployed. The value is 1 or 0.
        zonalShifts:
          $ref: "#/components/schemas/ZonalShiftsInResource"
          description: The zonal shifts that are currently active for a resource.
        autoshifts:
          $ref: "#/components/schemas/AutoshiftsInResource"
          description: An array of the autoshifts that are active for the resource.
        practiceRunConfiguration:
          $ref: "#/components/schemas/PracticeRunConfiguration"
          description: The practice run configuration for zonal autoshift that's associated with the resource.
        zonalAutoshiftStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: The status for zonal autoshift for a resource. When the autoshift status is ENABLED, Amazon Web Services shifts traffic for a resource away from an Availability Zone, on your behalf, when Amazon Web Services determines that there's an issue in the Availability Zone that could potentially affect customers.
      required:
        - appliedWeights
        - zonalShifts
    ZonalShiftsInResource:
      type: array
      items:
        $ref: "#/components/schemas/ZonalShiftInResource"
    ZonalShiftInResource:
      description: A complex structure that lists the zonal shifts for a managed resource and their statuses for the resource.
      type: object
      properties:
        appliedStatus:
          $ref: "#/components/schemas/AppliedStatus"
          description: "The appliedStatus field specifies which application traffic shift is in effect for a resource when there is more than one active traffic shift. There can be more than one application traffic shift in progress at the same time - that is, practice run zonal shifts, customer-initiated zonal shifts, or an autoshift. The appliedStatus field for a shift that is in progress for a resource can have one of two values: APPLIED or NOT_APPLIED. The zonal shift or autoshift that is currently in effect for the resource has an appliedStatus set to APPLIED. The overall principle for precedence is that zonal shifts that you start as a customer take precedence autoshifts, which take precedence over practice runs. That is, customer-initiated zonal shifts > autoshifts > practice run zonal shifts. For more information, see How zonal autoshift and practice runs work in the Amazon Application Recovery Controller Developer Guide."
        zonalShiftId:
          $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of a zonal shift.
        resourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: "The identifier for the resource to include in a zonal shift. The identifier is the Amazon Resource Name (ARN) for the resource. Amazon Application Recovery Controller currently supports enabling the following resources for zonal shift and zonal autoshift: Amazon EC2 Auto Scaling groups Amazon Elastic Kubernetes Service Application Load Balancer Network Load Balancer"
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic is moved away from for a resource when you start a zonal shift. Until the zonal shift expires or you cancel it, traffic for the resource is instead moved to other Availability Zones in the Amazon Web Services Region.
        expiryTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The expiry time (expiration time) for a customer-initiated zonal shift. A zonal shift is temporary and must be set to expire when you start the zonal shift. You can initially set a zonal shift to expire in a maximum of three days (72 hours). However, you can update a zonal shift to set a new expiration at any time. When you start a zonal shift, you specify how long you want it to be active, which ARC converts to an expiry time (expiration time). You can cancel a zonal shift when you're ready to restore traffic to the Availability Zone, or just wait for it to expire. Or you can update the zonal shift to specify another length of time to expire in.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (UTC) when the zonal shift starts.
        comment:
          $ref: "#/components/schemas/ZonalShiftComment"
          description: A comment that you enter for a customer-initiated zonal shift. Only the latest comment is retained; no comment history is maintained. That is, a new comment overwrites any existing comment string.
        shiftType:
          $ref: "#/components/schemas/ShiftType"
          description: Defines the zonal shift type.
        practiceRunOutcome:
          $ref: "#/components/schemas/PracticeRunOutcome"
          description: "The outcome, or end state, returned for a practice run. The following values can be returned: PENDING: Outcome value when a practice run is in progress. SUCCEEDED: Outcome value when the outcome alarm specified for the practice run configuration does not go into an ALARM state during the practice run, and the practice run was not interrupted before it completed the expected 30 minute zonal shift. INTERRUPTED: Outcome value when the practice run was stopped before the expected 30 minute zonal shift duration, or there was another problem with the practice run that created an inconclusive outcome. FAILED: Outcome value when the outcome alarm specified for the practice run configuration goes into an ALARM state during the practice run, and the practice run was not interrupted before it completed. CAPACITY_CHECK_FAILED: The check for balanced capacity across Availability Zones for your load balancing and Auto Scaling group resources failed. For more information about practice run outcomes, see Considerations when you configure zonal autoshift in the Amazon Application Recovery Controller Developer Guide."
      required:
        - appliedStatus
        - zonalShiftId
        - resourceIdentifier
        - awayFrom
        - expiryTime
        - startTime
        - comment
    AppliedStatus:
      type: string
      enum:
        - APPLIED
        - NOT_APPLIED
    ShiftType:
      type: string
      enum:
        - ZONAL_SHIFT
        - PRACTICE_RUN
        - FIS_EXPERIMENT
        - ZONAL_AUTOSHIFT
    PracticeRunOutcome:
      type: string
      enum:
        - FAILED
        - INTERRUPTED
        - PENDING
        - SUCCEEDED
        - CAPACITY_CHECK_FAILED
    AutoshiftsInResource:
      type: array
      items:
        $ref: "#/components/schemas/AutoshiftInResource"
    AutoshiftInResource:
      description: A complex structure that lists an autoshift that is currently active for a managed resource and information about the autoshift. For more information, see How zonal autoshift and practice runs work in the Amazon Application Recovery Controller Developer Guide.
      type: object
      properties:
        appliedStatus:
          $ref: "#/components/schemas/AutoshiftAppliedStatus"
          description: "The appliedStatus field specifies which application traffic shift is in effect for a resource when there is more than one active traffic shift. There can be more than one application traffic shift in progress at the same time - that is, practice run zonal shifts, customer-initiated zonal shifts, or an autoshift. The appliedStatus field for a shift that is in progress for a resource can have one of two values: APPLIED or NOT_APPLIED. The zonal shift or autoshift that is currently in effect for the resource has an appliedStatus set to APPLIED. The overall principle for precedence is that zonal shifts that you start as a customer take precedence autoshifts, which take precedence over practice runs. That is, customer-initiated zonal shifts > autoshifts > practice run zonal shifts. For more information, see How zonal autoshift and practice runs work in the Amazon Application Recovery Controller Developer Guide."
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic is shifted away from for a resource, when Amazon Web Services starts an autoshift. Until the autoshift ends, traffic for the resource is instead directed to other Availability Zones in the Amazon Web Services Region. An autoshift can end for a resource, for example, when Amazon Web Services ends the autoshift for the Availability Zone or when you disable zonal autoshift for the resource.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (UTC) when the autoshift started.
      required:
        - appliedStatus
        - awayFrom
        - startTime
    AutoshiftAppliedStatus:
      type: string
      enum:
        - APPLIED
        - NOT_APPLIED
    String:
      type: string
    AutoshiftExecutionStatus:
      type: string
      enum:
        - ACTIVE
        - COMPLETED
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListAutoshiftsResponse:
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/AutoshiftSummaries"
          description: The items in the response list.
        nextToken:
          $ref: "#/components/schemas/String"
          description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
    AutoshiftSummaries:
      type: array
      items:
        $ref: "#/components/schemas/AutoshiftSummary"
    AutoshiftSummary:
      description: Information about an autoshift. Amazon Web Services starts an autoshift to temporarily move traffic for a resource away from an Availability Zone in an Amazon Web Services Region when Amazon Web Services determines that there's an issue in the Availability Zone that could potentially affect customers. You can configure zonal autoshift in ARC for managed resources in your Amazon Web Services account in a Region. Supported Amazon Web Services resources are automatically registered with ARC. Autoshifts are temporary. When the Availability Zone recovers, Amazon Web Services ends the autoshift, and traffic for the resource is no longer directed to the other Availability Zones in the Region. You can stop an autoshift for a resource by disabling zonal autoshift.
      type: object
      properties:
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic is shifted away from for a resource when Amazon Web Services starts an autoshift. Until the autoshift ends, traffic for the resource is instead directed to other Availability Zones in the Amazon Web Services Region. An autoshift can end for a resource, for example, when Amazon Web Services ends the autoshift for the Availability Zone or when you disable zonal autoshift for the resource.
        endTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The time (in UTC) when the autoshift ended.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (in UTC) when the autoshift started.
        status:
          $ref: "#/components/schemas/AutoshiftExecutionStatus"
          description: The status for an autoshift.
      required:
        - awayFrom
        - startTime
        - status
    ListManagedResourcesResponse:
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/ManagedResourceSummaries"
          description: The items in the response list.
        nextToken:
          $ref: "#/components/schemas/String"
          description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
      required:
        - items_
    ManagedResourceSummaries:
      type: array
      items:
        $ref: "#/components/schemas/ManagedResourceSummary"
    ManagedResourceSummary:
      description: A complex structure for a managed resource in an Amazon Web Services account with information about zonal shifts and autoshifts. You can start a zonal shift in ARC for a managed resource to temporarily move traffic for the resource away from an Availability Zone in an Amazon Web Services Region. You can also configure zonal autoshift for a managed resource. At this time, managed resources are Amazon EC2 Auto Scaling groups, Amazon Elastic Kubernetes Service, Network Load Balancers, and Application Load Balancer.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) for the managed resource.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the managed resource.
        availabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: The Availability Zones that a resource is deployed in.
        appliedWeights:
          type: object
          properties: {}
          description: A collection of key-value pairs that indicate whether resources are active in Availability Zones or not. The key name is the Availability Zone where the resource is deployed. The value is 1 or 0.
        zonalShifts:
          $ref: "#/components/schemas/ZonalShiftsInResource"
          description: An array of the zonal shifts for a resource.
        autoshifts:
          $ref: "#/components/schemas/AutoshiftsInResource"
          description: An array of the autoshifts that have been completed for a resource.
        zonalAutoshiftStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: The status of autoshift for a resource. When you configure zonal autoshift for a resource, you can set the value of the status to ENABLED or DISABLED.
        practiceRunStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: This status tracks whether a practice run configuration exists for a resource. When you configure a practice run for a resource so that a practice run configuration exists, ARC sets this value to ENABLED. If a you have not configured a practice run for the resource, or delete a practice run configuration, ARC sets the value to DISABLED. ARC updates this status; you can't set a practice run status to ENABLED or DISABLED.
      required:
        - availabilityZones
    AvailabilityZones:
      type: array
      items:
        $ref: "#/components/schemas/AvailabilityZone"
    ListZonalShiftsResponse:
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/ZonalShiftSummaries"
          description: The items in the response list.
        nextToken:
          $ref: "#/components/schemas/String"
          description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
    ZonalShiftSummaries:
      type: array
      items:
        $ref: "#/components/schemas/ZonalShiftSummary"
    ZonalShiftSummary:
      description: Lists information about zonal shifts in Amazon Application Recovery Controller, including zonal shifts that you start yourself and zonal shifts that ARC starts on your behalf for practice runs with zonal autoshift. Zonal shifts are temporary, including customer-initiated zonal shifts and the zonal autoshift practice run zonal shifts that ARC starts weekly, on your behalf. A zonal shift that a customer starts can be active for up to three days (72 hours). A practice run zonal shift has a 30 minute duration.
      type: object
      properties:
        zonalShiftId:
          $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of a zonal shift.
        resourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: "The identifier for the resource to include in a zonal shift. The identifier is the Amazon Resource Name (ARN) for the resource. Amazon Application Recovery Controller currently supports enabling the following resources for zonal shift and zonal autoshift: Amazon EC2 Auto Scaling groups Amazon Elastic Kubernetes Service Application Load Balancers Network Load Balancers"
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic is moved away from for a resource when you start a zonal shift. Until the zonal shift expires or you cancel it, traffic for the resource is instead moved to other Availability Zones in the Amazon Web Services Region.
        expiryTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The expiry time (expiration time) for a customer-initiated zonal shift. A zonal shift is temporary and must be set to expire when you start the zonal shift. You can initially set a zonal shift to expire in a maximum of three days (72 hours). However, you can update a zonal shift to set a new expiration at any time. When you start a zonal shift, you specify how long you want it to be active, which ARC converts to an expiry time (expiration time). You can cancel a zonal shift when you're ready to restore traffic to the Availability Zone, or just wait for it to expire. Or you can update the zonal shift to specify another length of time to expire in.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (UTC) when the zonal shift starts.
        status:
          $ref: "#/components/schemas/ZonalShiftStatus"
          description: "A status for a zonal shift. The Status for a zonal shift can have one of the following values: ACTIVE: The zonal shift has been started and is active. EXPIRED: The zonal shift has expired (the expiry time was exceeded). CANCELED: The zonal shift was canceled."
        comment:
          $ref: "#/components/schemas/ZonalShiftComment"
          description: A comment that you enter about the zonal shift. Only the latest comment is retained; no comment history is maintained. That is, a new comment overwrites any existing comment string.
        shiftType:
          $ref: "#/components/schemas/ShiftType"
          description: Defines the zonal shift type.
        practiceRunOutcome:
          $ref: "#/components/schemas/PracticeRunOutcome"
          description: "The outcome, or end state, of a practice run. The following values can be returned: PENDING: Outcome value when the practice run is in progress. SUCCEEDED: Outcome value when the outcome alarm specified for the practice run configuration does not go into an ALARM state during the practice run, and the practice run was not interrupted before it completed. INTERRUPTED: Outcome value when the practice run did not run for the expected 30 minutes or there was another problem with the practice run that created an inconclusive outcome. FAILED: Outcome value when the outcome alarm specified for the practice run configuration goes into an ALARM state during the practice run, and the practice run was not interrupted before it completed. CAPACITY_CHECK_FAILED: The check for balanced capacity across Availability Zones for your load balancing and Auto Scaling group resources failed. For more information about practice run outcomes, see Considerations when you configure zonal autoshift in the Amazon Application Recovery Controller Developer Guide."
      required:
        - zonalShiftId
        - resourceIdentifier
        - awayFrom
        - expiryTime
        - startTime
        - status
        - comment
    StartPracticeRunResponse:
      type: object
      properties:
        zonalShiftId:
          $ref: "#/components/schemas/ZonalShiftId"
          description: The identifier of a practice run zonal shift.
        resourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you want to shift traffic for. The identifier is the Amazon Resource Name (ARN) for the resource.
        awayFrom:
          $ref: "#/components/schemas/AvailabilityZone"
          description: The Availability Zone (for example, use1-az1) that traffic is shifted away from for the resource that you specify for the practice run.
        expiryTime:
          $ref: "#/components/schemas/ExpiryTime"
          description: The expiry time (expiration time) for an on-demand practice run zonal shift is 30 minutes from the time when you start the practice run, unless you cancel it before that time. However, be aware that the expiryTime field for practice run zonal shifts always has a value of 1 minute.
        startTime:
          $ref: "#/components/schemas/StartTime"
          description: The time (UTC) when the zonal shift starts.
        status:
          $ref: "#/components/schemas/ZonalShiftStatus"
          description: A status for the practice run (expected status is ACTIVE).
        comment:
          $ref: "#/components/schemas/ZonalShiftComment"
          description: The initial comment that you enter about the practice run. Be aware that this comment can be overwritten by Amazon Web Services if the automatic check for balanced capacity fails. For more information, see Capacity checks for practice runs in the Amazon Application Recovery Controller Developer Guide.
      required:
        - zonalShiftId
        - resourceIdentifier
        - awayFrom
        - expiryTime
        - startTime
        - status
        - comment
    ExpiresIn:
      type: string
      minLength: 2
      maxLength: 5
      pattern: ([1-9][0-9]*)(m|h)
    UpdateAutoshiftObserverNotificationStatusResponse:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AutoshiftObserverNotificationStatus"
          description: The status for autoshift observer notification.
      required:
        - status
    UpdatePracticeRunConfigurationResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you updated the practice run for.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the resource that you updated the practice run for.
        zonalAutoshiftStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: The zonal autoshift status for the resource that you updated the practice run for.
        practiceRunConfiguration:
          $ref: "#/components/schemas/PracticeRunConfiguration"
          description: The practice run configuration that was updated.
      required:
        - arn
        - name
        - zonalAutoshiftStatus
        - practiceRunConfiguration
    UpdateZonalAutoshiftConfigurationResponse:
      type: object
      properties:
        resourceIdentifier:
          $ref: "#/components/schemas/ResourceIdentifier"
          description: The identifier for the resource that you updated the zonal autoshift configuration for. The identifier is the Amazon Resource Name (ARN) for the resource.
        zonalAutoshiftStatus:
          $ref: "#/components/schemas/ZonalAutoshiftStatus"
          description: The updated zonal autoshift status for the resource.
      required:
        - resourceIdentifier
        - zonalAutoshiftStatus
