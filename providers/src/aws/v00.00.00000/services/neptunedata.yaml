          schema:
            $ref: "#/components/schemas/IteratorType"
          description: "Can be one of: AT_SEQUENCE_NUMBER - Indicates that reading should start from the event sequence number specified jointly by the commitNum and opNum parameters. AFTER_SEQUENCE_NUMBER - Indicates that reading should start right after the event sequence number specified jointly by the commitNum and opNum parameters. TRIM_HORIZON - Indicates that reading should start at the last untrimmed record in the system, which is the oldest unexpired (not yet deleted) record in the change-log stream. LATEST - Indicates that reading should start at the most recent record in the system, which is the latest unexpired (not yet deleted) record in the change-log stream."
        - name: commitNum
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Long"
          description: The commit number of the starting record to read from the change-log stream. This parameter is required when iteratorType isAT_SEQUENCE_NUMBER or AFTER_SEQUENCE_NUMBER, and ignored when iteratorType is TRIM_HORIZON or LATEST.
        - name: opNum
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Long"
          description: The operation sequence number within the specified commit to start reading from in the change-log stream data. The default is 1.
        - name: Accept-Encoding
