          description: A list of distinct outgoing edge labels present in this specific structure.
    NodeProperties:
      type: array
      items:
        $ref: "#/components/schemas/String"
    OutgoingEdgeLabels:
      type: array
      items:
        $ref: "#/components/schemas/String"
    EdgeStructures:
      type: array
      items:
        $ref: "#/components/schemas/EdgeStructure"
    EdgeStructure:
      description: An edge structure.
      type: object
      properties:
        count:
