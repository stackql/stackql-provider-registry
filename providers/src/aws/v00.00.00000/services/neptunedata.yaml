    Blob:
      type: string
      format: byte
    ExecuteOpenCypherQueryOutput:
      type: object
      properties:
        results:
          $ref: "#/components/schemas/Document"
          description: The openCypherquery results.
      required:
        - results
    GetEngineStatusOutput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/String"
          description: Set to healthy if the instance is not experiencing problems. If the instance is recovering from a crash or from being rebooted and there are active transactions running from the latest server shutdown, status is set to recovery.
        startTime:
          $ref: "#/components/schemas/String"
          description: Set to the UTC time at which the current server process started.
        dbEngineVersion:
          $ref: "#/components/schemas/String"
          description: Set to the Neptune engine version running on your DB cluster. If this engine version has been manually patched since it was released, the version number is prefixed by Patch-.
        role:
          $ref: "#/components/schemas/String"
          description: Set to reader if the instance is a read-replica, or to writer if the instance is the primary instance.
        dfeQueryEngine:
          $ref: "#/components/schemas/String"
          description: Set to enabled if the DFE engine is fully enabled, or to viaQueryHint (the default) if the DFE engine is only used with queries that have the useDFE query hint set to true.
        gremlin:
          $ref: "#/components/schemas/QueryLanguageVersion"
          description: Contains information about the Gremlin query language available on your cluster. Specifically, it contains a version field that specifies the current TinkerPop version being used by the engine.
        sparql:
          $ref: "#/components/schemas/QueryLanguageVersion"
          description: Contains information about the SPARQL query language available on your cluster. Specifically, it contains a version field that specifies the current SPARQL version being used by the engine.
        opencypher:
          $ref: "#/components/schemas/QueryLanguageVersion"
          description: Contains information about the openCypher query language available on your cluster. Specifically, it contains a version field that specifies the current operCypher version being used by the engine.
        labMode:
          type: object
          properties: {}
          description: Contains Lab Mode settings being used by the engine.
        rollingBackTrxCount:
          $ref: "#/components/schemas/Integer"
          description: If there are transactions being rolled back, this field is set to the number of such transactions. If there are none, the field doesn't appear at all.
        rollingBackTrxEarliestStartTime:
          $ref: "#/components/schemas/String"
          description: Set to the start time of the earliest transaction being rolled back. If no transactions are being rolled back, the field doesn't appear at all.
        features:
          type: object
          properties: {}
          description: Contains status information about the features enabled on your DB cluster.
        settings:
          type: object
          properties: {}
          description: Contains information about the current settings on your DB cluster. For example, contains the current cluster query timeout setting (clusterQueryTimeoutInMs).
    QueryLanguageVersion:
      description: Structure for expressing the query language version.
      type: object
      properties:
        version:
          $ref: "#/components/schemas/String"
          description: The version of the query language.
      required:
        - version
    GetGremlinQueryStatusOutput:
      type: object
      properties:
        queryId:
          $ref: "#/components/schemas/String"
          description: The ID of the query for which status is being returned.
        queryString:
          $ref: "#/components/schemas/String"
          description: The Gremlin query string.
        queryEvalStats:
          $ref: "#/components/schemas/QueryEvalStats"
          description: The evaluation status of the Gremlin query.
    QueryEvalStats:
      description: Structure to capture query statistics such as how many queries are running, accepted or waiting and their details.
      type: object
      properties:
        waited:
          $ref: "#/components/schemas/Integer"
          description: Indicates how long the query waited, in milliseconds.
        elapsed:
          $ref: "#/components/schemas/Integer"
          description: The number of milliseconds the query has been running so far.
        cancelled:
          $ref: "#/components/schemas/Boolean"
          description: Set to TRUE if the query was cancelled, or FALSE otherwise.
        subqueries:
          $ref: "#/components/schemas/Document"
          description: The number of subqueries in this query.
    PositiveInteger:
      type: integer
      minimum: 1
    GetLoaderJobStatusOutput:
      type: object
