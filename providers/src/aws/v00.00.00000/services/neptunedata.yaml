          description: A list of the configuration information for the models being used.
    Models:
      type: array
      items:
        $ref: "#/components/schemas/MlConfigDefinition"
    GetOpenCypherQueryStatusOutput:
      type: object
      properties:
        queryId:
          $ref: "#/components/schemas/String"
          description: The unique ID of the query for which status is being returned.
        queryString:
          $ref: "#/components/schemas/String"
          description: The openCypher query string.
        queryEvalStats:
          $ref: "#/components/schemas/QueryEvalStats"
          description: The openCypher query evaluation status.
    GetPropertygraphStatisticsOutput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/String"
          description: The HTTP return code of the request. If the request succeeded, the code is 200. See Common error codes for DFE statistics request for a list of common errors.
        payload:
          $ref: "#/components/schemas/Statistics"
          description: Statistics for property-graph data.
      required:
        - status
        - payload
    Statistics:
      description: Contains statistics information. The DFE engine uses information about the data in your Neptune graph to make effective trade-offs when planning query execution. This information takes the form of statistics that include so-called characteristic sets and predicate statistics that can guide query planning. See Managing statistics for the Neptune DFE to use.
      type: object
      properties:
        autoCompute:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether or not automatic statistics generation is enabled.
        active:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether or not DFE statistics generation is enabled at all.
        statisticsId:
          $ref: "#/components/schemas/String"
          description: Reports the ID of the current statistics generation run. A value of -1 indicates that no statistics have been generated.
        date:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The UTC time at which DFE statistics have most recently been generated.
        note:
          $ref: "#/components/schemas/String"
          description: A note about problems in the case where statistics are invalid.
        signatureInfo:
          $ref: "#/components/schemas/StatisticsSummary"
          description: "A StatisticsSummary structure that contains: signatureCount - The total number of signatures across all characteristic sets. instanceCount - The total number of characteristic-set instances. predicateCount - The total number of unique predicates."
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    StatisticsSummary:
      description: Information about the characteristic sets generated in the statistics.
      type: object
      properties:
        signatureCount:
          $ref: "#/components/schemas/Integer"
          description: The total number of signatures across all characteristic sets.
        instanceCount:
          $ref: "#/components/schemas/Integer"
          description: The total number of characteristic-set instances.
        predicateCount:
          $ref: "#/components/schemas/Integer"
          description: The total number of unique predicates.
    GetPropertygraphStreamInputLimitLong:
      type: integer
      format: int64
      minimum: 1
      maximum: 100000
    IteratorType:
      type: string
      enum:
        - AT_SEQUENCE_NUMBER
        - AFTER_SEQUENCE_NUMBER
        - TRIM_HORIZON
        - LATEST
    Encoding:
      type: string
      enum:
        - gzip
    GetPropertygraphStreamOutput:
      type: object
      properties:
        lastEventId:
          type: object
          properties: {}
          description: "Sequence identifier of the last change in the stream response. An event ID is composed of two fields: a commitNum, which identifies a transaction that changed the graph, and an opNum, which identifies a specific operation within that transaction:"
        lastTrxTimestampInMillis:
          $ref: "#/components/schemas/Long"
          description: The time at which the commit for the transaction was requested, in milliseconds from the Unix epoch.
        format_:
          $ref: "#/components/schemas/String"
          description: Serialization format for the change records being returned. Currently, the only supported value is PG_JSON.
        records:
          $ref: "#/components/schemas/PropertygraphRecordsList"
          description: An array of serialized change-log stream records included in the response.
        totalRecords:
          $ref: "#/components/schemas/Integer"
          description: The total number of records in the response.
      required:
        - lastEventId
        - lastTrxTimestampInMillis
        - format_
        - records
        - totalRecords
    PropertygraphRecordsList:
      type: array
      items:
        $ref: "#/components/schemas/PropertygraphRecord"
    PropertygraphRecord:
      description: Structure of a property graph record.
      type: object
      properties:
        commitTimestampInMillis:
          $ref: "#/components/schemas/Long"
          description: The time at which the commit for the transaction was requested, in milliseconds from the Unix epoch.
        eventId:
          type: object
          properties: {}
          description: The sequence identifier of the stream change record.
        data:
          $ref: "#/components/schemas/PropertygraphData"
          description: The serialized Gremlin or openCypher change record.
        op:
          $ref: "#/components/schemas/String"
          description: The operation that created the change.
        isLastOp:
          $ref: "#/components/schemas/Boolean"
          description: Only present if this operation is the last one in its transaction. If present, it is set to true. It is useful for ensuring that an entire transaction is consumed.
      required:
        - commitTimestampInMillis
        - eventId
        - data
        - op
    PropertygraphData:
      description: A Gremlin or openCypher change record.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID of the Gremlin or openCypher element.
        type_:
          $ref: "#/components/schemas/String"
          description: "The type of this Gremlin or openCypher element. Must be one of: v1 - Vertex label for Gremlin, or node label for openCypher. vp - Vertex properties for Gremlin, or node properties for openCypher. e - Edge and edge label for Gremlin, or relationship and relationship type for openCypher. ep - Edge properties for Gremlin, or relationship properties for openCypher."
        key:
          $ref: "#/components/schemas/String"
          description: The property name. For element labels, this is label.
        value:
          $ref: "#/components/schemas/Document"
          description: "This is a JSON object that contains a value field for the value itself, and a datatype field for the JSON data type of that value:"
        from:
          $ref: "#/components/schemas/String"
          description: If this is an edge (type = e), the ID of the corresponding from vertex or source node.
        to:
          $ref: "#/components/schemas/String"
          description: If this is an edge (type = e), the ID of the corresponding to vertex or target node.
      required:
        - id
        - type_
        - key
        - value
    GraphSummaryType:
      type: string
      enum:
        - basic
        - detailed
    GetPropertygraphSummaryOutput:
      type: object
      properties:
        statusCode:
          $ref: "#/components/schemas/Integer"
          description: The HTTP return code of the request. If the request succeeded, the code is 200.
