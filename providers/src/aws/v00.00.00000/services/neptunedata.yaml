          schema:
            $ref: "#/components/schemas/Encoding"
          description: If set to TRUE, Neptune compresses the response using gzip encoding.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSparqlStreamOutput"
  /gremlin/status:
    get:
