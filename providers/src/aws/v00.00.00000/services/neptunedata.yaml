      properties:
        version:
          $ref: "#/components/schemas/String"
          description: The version of this graph summary response.
        lastStatisticsComputationTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp, in ISO 8601 format, of the time at which Neptune last computed statistics.
        graphSummary:
          $ref: "#/components/schemas/PropertygraphSummary"
          description: The graph summary.
    PropertygraphSummary:
      description: The graph summary API returns a read-only list of node and edge labels and property keys, along with counts of nodes, edges, and properties. See Graph summary response for a property graph (PG).
      type: object
      properties:
        numNodes:
          $ref: "#/components/schemas/Long"
          description: The number of nodes in the graph.
        numEdges:
          $ref: "#/components/schemas/Long"
          description: The number of edges in the graph.
        numNodeLabels:
          $ref: "#/components/schemas/Long"
          description: The number of distinct node labels in the graph.
        numEdgeLabels:
          $ref: "#/components/schemas/Long"
          description: The number of distinct edge labels in the graph.
        nodeLabels:
          $ref: "#/components/schemas/NodeLabels"
          description: A list of the distinct node labels in the graph.
        edgeLabels:
          $ref: "#/components/schemas/EdgeLabels"
          description: A list of the distinct edge labels in the graph.
        numNodeProperties:
          $ref: "#/components/schemas/Long"
          description: A list of the distinct node properties in the graph, along with the count of nodes where each property is used.
        numEdgeProperties:
          $ref: "#/components/schemas/Long"
          description: The number of distinct edge properties in the graph.
        nodeProperties:
          $ref: "#/components/schemas/LongValuedMapList"
          description: The number of distinct node properties in the graph.
        edgeProperties:
          $ref: "#/components/schemas/LongValuedMapList"
          description: A list of the distinct edge properties in the graph, along with the count of edges where each property is used.
        totalNodePropertyValues:
          $ref: "#/components/schemas/Long"
          description: The total number of usages of all node properties.
        totalEdgePropertyValues:
          $ref: "#/components/schemas/Long"
          description: The total number of usages of all edge properties.
        nodeStructures:
          $ref: "#/components/schemas/NodeStructures"
          description: This field is only present when the requested mode is DETAILED. It contains a list of node structures.
        edgeStructures:
          $ref: "#/components/schemas/EdgeStructures"
          description: This field is only present when the requested mode is DETAILED. It contains a list of edge structures.
    NodeLabels:
      type: array
      items:
        $ref: "#/components/schemas/String"
    EdgeLabels:
      type: array
      items:
        $ref: "#/components/schemas/String"
    LongValuedMapList:
