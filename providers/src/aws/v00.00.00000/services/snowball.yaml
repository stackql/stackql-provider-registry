openapi: 3.0.0
info:
  version: "2016-06-30"
  title: Amazon Import/Export Snowball
  description: Amazon Import/Export Snowball
  x-serviceName: snowball
  x-serviceAlias: snowball
  x-protocol: json
  x-apiVersion: "2016-06-30"
  x-endpointPrefix: snowball
  x-targetPrefix: AWSIESnowballJobManagementService
  x-jsonVersion: "1.1"
servers:
  - url: https://snowball.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for snowball
paths:
  /CancelCluster:
    post:
      operationId: CancelCluster
      description: Cancels a cluster job. You can only cancel a cluster job while it's in the AwaitingQuorum status. You'll have at least an hour after creating a cluster job to cancel it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CancelCluster
            default: AWSIESnowballJobManagementService.CancelCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/ClusterId"
                  description: The 39-character ID for the cluster that you want to cancel, for example CID123e4567-e89b-12d3-a456-426655440000.
              required:
                - ClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelClusterResult"
  /CancelJob:
    post:
      operationId: CancelJob
      description: Cancels the specified job. You can only cancel a job before its JobState value changes to PreparingAppliance. Requesting the ListJobs or DescribeJob action returns a job's JobState as part of the response element data returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CancelJob
            default: AWSIESnowballJobManagementService.CancelJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The 39-character job ID for the job that you want to cancel, for example JID123e4567-e89b-12d3-a456-426655440000.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResult"
  /CreateAddress:
    post:
      operationId: CreateAddress
      description: Creates an address for a Snow device to be shipped to. In most regions, addresses are validated at the time of creation. The address you provide must be located within the serviceable area of your region. If the address is invalid or unsupported, then an exception is thrown. If providing an address as a JSON file through the cli-input-json option, include the full file path. For example, --cli-input-json file://create-address.json.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CreateAddress
            default: AWSIESnowballJobManagementService.CreateAddress
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Address:
                  $ref: "#/components/schemas/Address"
                  description: The address that you want the Snow device shipped to.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAddressResult"
  /CreateCluster:
    post:
      operationId: CreateCluster
      description: Creates an empty cluster. Each cluster supports five nodes. You use the CreateJob action separately to create the jobs for each of these nodes. The cluster does not ship until these five node jobs have been created.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CreateCluster
            default: AWSIESnowballJobManagementService.CreateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobType:
                  $ref: "#/components/schemas/JobType"
                  description: The type of job for this cluster. Currently, the only job type supported for clusters is LOCAL_USE. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
                Resources:
                  $ref: "#/components/schemas/JobResource"
                  description: The resources associated with the cluster job. These resources include Amazon S3 buckets and optional Lambda functions written in the Python language.
                OnDeviceServiceConfiguration:
                  $ref: "#/components/schemas/OnDeviceServiceConfiguration"
                  description: Specifies the service or services on the Snow Family device that your transferred data will be exported from or imported into. Amazon Web Services Snow Family device clusters support Amazon S3 and NFS (Network File System).
                Description:
                  $ref: "#/components/schemas/String"
                  description: An optional description of this specific cluster, for example Environmental Data Cluster-01.
                AddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The ID for the address that you want the cluster shipped to.
                KmsKeyARN:
                  $ref: "#/components/schemas/KmsKeyARN"
                  description: The KmsKeyARN value that you want to associate with this cluster. KmsKeyARN values are created by using the CreateKey API action in Key Management Service (KMS).
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: The RoleARN that you want to associate with this cluster. RoleArn values are created by using the CreateRole API action in Identity and Access Management (IAM).
                SnowballType:
                  $ref: "#/components/schemas/SnowballType"
                  description: The type of Snow Family devices to use for this cluster. For cluster jobs, Amazon Web Services Snow Family currently supports only the EDGE device type. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
                ShippingOption:
                  $ref: "#/components/schemas/ShippingOption"
                  description: "The shipping speed for each node in this cluster. This speed doesn't dictate how soon you'll get each Snowball Edge device, rather it represents how quickly each device moves to its destination while in transit. Regional shipping speeds are as follows: In Australia, you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In the European Union (EU), you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In addition, most countries in the EU have access to standard shipping, which typically takes less than a week, one way. In India, Snow devices are delivered in one to seven days. In the United States of America (US), you have access to one-day shipping and two-day shipping. In Australia, you have access to express shipping. Typically, devices shipped express are delivered in about a day. In the European Union (EU), you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In addition, most countries in the EU have access to standard shipping, which typically takes less than a week, one way. In India, Snow devices are delivered in one to seven days. In the US, you have access to one-day shipping and two-day shipping."
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The Amazon Simple Notification Service (Amazon SNS) notification settings for this cluster.
                ForwardingAddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The forwarding address ID for a cluster. This field is not supported in most regions.
                TaxDocuments:
                  $ref: "#/components/schemas/TaxDocuments"
                  description: The tax documents required in your Amazon Web Services Region.
                RemoteManagement:
                  $ref: "#/components/schemas/RemoteManagement"
                  description: Allows you to securely operate and manage Snow devices in a cluster remotely from outside of your internal network. When set to INSTALLED_AUTOSTART, remote management will automatically be available when the device arrives at your location. Otherwise, you need to use the Snowball Client to manage the device.
                InitialClusterSize:
                  $ref: "#/components/schemas/InitialClusterSize"
                  description: If provided, each job will be automatically created and associated with the new cluster. If not provided, will be treated as 0.
                ForceCreateJobs:
                  $ref: "#/components/schemas/Boolean"
                  description: Force to create cluster when user attempts to overprovision or underprovision a cluster. A cluster is overprovisioned or underprovisioned if the initial size of the cluster is more (overprovisioned) or less (underprovisioned) than what needed to meet capacity requirement specified with OnDeviceServiceConfiguration.
                LongTermPricingIds:
                  $ref: "#/components/schemas/LongTermPricingIdList"
                  description: Lists long-term pricing id that will be used to associate with jobs automatically created for the new cluster.
                SnowballCapacityPreference:
                  $ref: "#/components/schemas/SnowballCapacity"
                  description: If your job is being created in one of the US regions, you have the option of specifying what size Snow device you'd like for this job. In all other regions, Snowballs come with 80 TB in storage capacity. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
              required:
                - JobType
                - AddressId
                - SnowballType
                - ShippingOption
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResult"
  /CreateJob:
    post:
      operationId: CreateJob
      description: "Creates a job to import or export data between Amazon S3 and your on-premises data center. Your Amazon Web Services account must have the right trust policies and permissions in place to create a job for a Snow device. If you're creating a job for a node in a cluster, you only need to provide the clusterId value; the other job attributes are inherited from the cluster. Only the Snowball; Edge device type is supported when ordering clustered jobs. The device capacity is optional. Availability of device types differ by Amazon Web Services Region. For more information about Region availability, see Amazon Web Services Regional Services. Snow Family devices and their capacities. Device type: SNC1_SSD Capacity: T14 Description: Snowcone Device type: SNC1_HDD Capacity: T8 Description: Snowcone Device type: EDGE_S Capacity: T98 Description: Snowball Edge Storage Optimized for data transfer only Device type: EDGE_CG Capacity: T42 Description: Snowball Edge Compute Optimized with GPU Device type: EDGE_C Capacity: T42 Description: Snowball Edge Compute Optimized without GPU Device type: EDGE Capacity: T100 Description: Snowball Edge Storage Optimized with EC2 Compute This device is replaced with T98. Device type: STANDARD Capacity: T50 Description: Original Snowball device This device is only available in the Ningxia, Beijing, and Singapore Amazon Web Services Region Device type: STANDARD Capacity: T80 Description: Original Snowball device This device is only available in the Ningxia, Beijing, and Singapore Amazon Web Services Region. Snow Family device type: RACK_5U_C Capacity: T13 Description: Snowblade. Device type: V3_5S Capacity: T240 Description: Snowball Edge Storage Optimized 210TB"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CreateJob
            default: AWSIESnowballJobManagementService.CreateJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobType:
                  $ref: "#/components/schemas/JobType"
                  description: Defines the type of job that you're creating.
                Resources:
                  $ref: "#/components/schemas/JobResource"
                  description: Defines the Amazon S3 buckets associated with this job. With IMPORT jobs, you specify the bucket or buckets that your transferred data will be imported into. With EXPORT jobs, you specify the bucket or buckets that your transferred data will be exported from. Optionally, you can also specify a KeyRange value. If you choose to export a range, you define the length of the range by providing either an inclusive BeginMarker value, an inclusive EndMarker value, or both. Ranges are UTF-8 binary sorted.
                OnDeviceServiceConfiguration:
                  $ref: "#/components/schemas/OnDeviceServiceConfiguration"
                  description: Specifies the service or services on the Snow Family device that your transferred data will be exported from or imported into. Amazon Web Services Snow Family supports Amazon S3 and NFS (Network File System) and the Amazon Web Services Storage Gateway service Tape Gateway type.
                Description:
                  $ref: "#/components/schemas/String"
                  description: Defines an optional description of this specific job, for example Important Photos 2016-08-11.
                AddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The ID for the address that you want the Snow device shipped to.
                KmsKeyARN:
                  $ref: "#/components/schemas/KmsKeyARN"
                  description: The KmsKeyARN that you want to associate with this job. KmsKeyARNs are created using the CreateKey Key Management Service (KMS) API action.
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: The RoleARN that you want to associate with this job. RoleArns are created using the CreateRole Identity and Access Management (IAM) API action.
                SnowballCapacityPreference:
                  $ref: "#/components/schemas/SnowballCapacity"
                  description: If your job is being created in one of the US regions, you have the option of specifying what size Snow device you'd like for this job. In all other regions, Snowballs come with 80 TB in storage capacity. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
                ShippingOption:
                  $ref: "#/components/schemas/ShippingOption"
                  description: "The shipping speed for this job. This speed doesn't dictate how soon you'll get the Snow device, rather it represents how quickly the Snow device moves to its destination while in transit. Regional shipping speeds are as follows: In Australia, you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In the European Union (EU), you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In addition, most countries in the EU have access to standard shipping, which typically takes less than a week, one way. In India, Snow devices are delivered in one to seven days. In the US, you have access to one-day shipping and two-day shipping."
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: Defines the Amazon Simple Notification Service (Amazon SNS) notification settings for this job.
                ClusterId:
                  $ref: "#/components/schemas/ClusterId"
                  description: The ID of a cluster. If you're creating a job for a node in a cluster, you need to provide only this clusterId value. The other job attributes are inherited from the cluster.
                SnowballType:
                  $ref: "#/components/schemas/SnowballType"
                  description: The type of Snow Family devices to use for this job. For cluster jobs, Amazon Web Services Snow Family currently supports only the EDGE device type. The type of Amazon Web Services Snow device to use for this job. Currently, the only supported device type for cluster jobs is EDGE. For more information, see Snowball Edge Device Options in the Snowball Edge Developer Guide. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
                ForwardingAddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The forwarding address ID for a job. This field is not supported in most Regions.
                TaxDocuments:
                  $ref: "#/components/schemas/TaxDocuments"
                  description: The tax documents required in your Amazon Web Services Region.
                DeviceConfiguration:
                  $ref: "#/components/schemas/DeviceConfiguration"
                  description: Defines the device configuration for an Snowball Edge job. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
                RemoteManagement:
                  $ref: "#/components/schemas/RemoteManagement"
                  description: Allows you to securely operate and manage Snowcone devices remotely from outside of your internal network. When set to INSTALLED_AUTOSTART, remote management will automatically be available when the device arrives at your location. Otherwise, you need to use the Snowball Edge client to manage the device. When set to NOT_INSTALLED, remote management will not be available on the device.
                LongTermPricingId:
                  $ref: "#/components/schemas/LongTermPricingId"
                  description: The ID of the long-term pricing type for the device.
                ImpactLevel:
                  $ref: "#/components/schemas/ImpactLevel"
                  description: The highest impact level of data that will be stored or processed on the device, provided at job creation.
                PickupDetails:
                  $ref: "#/components/schemas/PickupDetails"
                  description: Information identifying the person picking up the device.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResult"
  /CreateLongTermPricing:
    post:
      operationId: CreateLongTermPricing
      description: Creates a job with the long-term usage option for a device. The long-term usage is a 1-year or 3-year long-term pricing type for the device. You are billed upfront, and Amazon Web Services provides discounts for long-term pricing.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CreateLongTermPricing
            default: AWSIESnowballJobManagementService.CreateLongTermPricing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LongTermPricingType:
                  $ref: "#/components/schemas/LongTermPricingType"
                  description: The type of long-term pricing option you want for the device, either 1-year or 3-year long-term pricing.
                IsLongTermPricingAutoRenew:
                  $ref: "#/components/schemas/JavaBoolean"
                  description: Specifies whether the current long-term pricing type for the device should be renewed.
                SnowballType:
                  $ref: "#/components/schemas/SnowballType"
                  description: The type of Snow Family devices to use for the long-term pricing job.
              required:
                - LongTermPricingType
                - SnowballType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLongTermPricingResult"
  /CreateReturnShippingLabel:
    post:
      operationId: CreateReturnShippingLabel
      description: Creates a shipping label that will be used to return the Snow device to Amazon Web Services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.CreateReturnShippingLabel
            default: AWSIESnowballJobManagementService.CreateReturnShippingLabel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The ID for a job that you want to create the return shipping label for; for example, JID123e4567-e89b-12d3-a456-426655440000.
                ShippingOption:
                  $ref: "#/components/schemas/ShippingOption"
                  description: "The shipping speed for a particular job. This speed doesn't dictate how soon the device is returned to Amazon Web Services. This speed represents how quickly it moves to its destination while in transit. Regional shipping speeds are as follows:"
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReturnShippingLabelResult"
  /DescribeAddress:
    post:
      operationId: DescribeAddress
      description: Takes an AddressId and returns specific details about that address in the form of an Address object.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.DescribeAddress
            default: AWSIESnowballJobManagementService.DescribeAddress
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The automatically generated ID for a specific address.
              required:
                - AddressId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAddressResult"
  /DescribeAddresses:
    post:
      operationId: DescribeAddresses
      description: Returns a specified number of ADDRESS objects. Calling this API in one of the US regions will return addresses from the list of all addresses associated with this account in all US regions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.DescribeAddresses
            default: AWSIESnowballJobManagementService.DescribeAddresses
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The number of ADDRESS objects to return.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: HTTP requests are stateless. To identify what object comes "next" in the list of ADDRESS objects, you have the option of specifying a value for NextToken as the starting point for your list of returned addresses.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAddressesResult"
  /DescribeCluster:
    post:
      operationId: DescribeCluster
      description: Returns information about a specific cluster including shipping information, cluster status, and other important metadata.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.DescribeCluster
            default: AWSIESnowballJobManagementService.DescribeCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/ClusterId"
                  description: The automatically generated ID for a cluster.
              required:
                - ClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeClusterResult"
  /DescribeJob:
    post:
      operationId: DescribeJob
      description: Returns information about a specific job including shipping information, job status, and other important metadata.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.DescribeJob
            default: AWSIESnowballJobManagementService.DescribeJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The automatically generated ID for a job, for example JID123e4567-e89b-12d3-a456-426655440000.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobResult"
  /DescribeReturnShippingLabel:
    post:
      operationId: DescribeReturnShippingLabel
      description: Information on the shipping label of a Snow device that is being returned to Amazon Web Services.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.DescribeReturnShippingLabel
            default: AWSIESnowballJobManagementService.DescribeReturnShippingLabel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The automatically generated ID for a job, for example JID123e4567-e89b-12d3-a456-426655440000.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReturnShippingLabelResult"
  /GetJobManifest:
    post:
      operationId: GetJobManifest
      description: Returns a link to an Amazon S3 presigned URL for the manifest file associated with the specified JobId value. You can access the manifest file for up to 60 minutes after this request has been made. To access the manifest file after 60 minutes have passed, you'll have to make another call to the GetJobManifest action. The manifest is an encrypted file that you can download after your job enters the WithCustomer status. This is the only valid status for calling this API as the manifest and UnlockCode code value are used for securing your device and should only be used when you have the device. The manifest is decrypted by using the UnlockCode code value, when you pass both values to the Snow device through the Snowball client when the client is started for the first time. As a best practice, we recommend that you don't save a copy of an UnlockCode value in the same location as the manifest file for that job. Saving these separately helps prevent unauthorized parties from gaining access to the Snow device associated with that job. The credentials of a given job, including its manifest file and unlock code, expire 360 days after the job is created.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.GetJobManifest
            default: AWSIESnowballJobManagementService.GetJobManifest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The ID for a job that you want to get the manifest file for, for example JID123e4567-e89b-12d3-a456-426655440000.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobManifestResult"
  /GetJobUnlockCode:
    post:
      operationId: GetJobUnlockCode
      description: Returns the UnlockCode code value for the specified job. A particular UnlockCode value can be accessed for up to 360 days after the associated job has been created. The UnlockCode value is a 29-character code with 25 alphanumeric characters and 4 hyphens. This code is used to decrypt the manifest file when it is passed along with the manifest to the Snow device through the Snowball client when the client is started for the first time. The only valid status for calling this API is WithCustomer as the manifest and Unlock code values are used for securing your device and should only be used when you have the device. As a best practice, we recommend that you don't save a copy of the UnlockCode in the same location as the manifest file for that job. Saving these separately helps prevent unauthorized parties from gaining access to the Snow device associated with that job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.GetJobUnlockCode
            default: AWSIESnowballJobManagementService.GetJobUnlockCode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The ID for the job that you want to get the UnlockCode value for, for example JID123e4567-e89b-12d3-a456-426655440000.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobUnlockCodeResult"
  /GetSnowballUsage:
    post:
      operationId: GetSnowballUsage
      description: Returns information about the Snow Family service limit for your account, and also the number of Snow devices your account has in use. The default service limit for the number of Snow devices that you can have at one time is 1. If you want to increase your service limit, contact Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.GetSnowballUsage
            default: AWSIESnowballJobManagementService.GetSnowballUsage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSnowballUsageResult"
  /GetSoftwareUpdates:
    post:
      operationId: GetSoftwareUpdates
      description: Returns an Amazon S3 presigned URL for an update file associated with a specified JobId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.GetSoftwareUpdates
            default: AWSIESnowballJobManagementService.GetSoftwareUpdates
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The ID for a job that you want to get the software update file for, for example JID123e4567-e89b-12d3-a456-426655440000.
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSoftwareUpdatesResult"
  /ListClusterJobs:
    post:
      operationId: ListClusterJobs
      description: Returns an array of JobListEntry objects of the specified length. Each JobListEntry object is for a job in the specified cluster and contains a job's state, a job's ID, and other information.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListClusterJobs
            default: AWSIESnowballJobManagementService.ListClusterJobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/ClusterId"
                  description: The 39-character ID for the cluster that you want to list, for example CID123e4567-e89b-12d3-a456-426655440000.
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The number of JobListEntry objects to return.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: HTTP requests are stateless. To identify what object comes "next" in the list of JobListEntry objects, you have the option of specifying NextToken as the starting point for your returned list.
              required:
                - ClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClusterJobsResult"
  /ListClusters:
    post:
      operationId: ListClusters
      description: Returns an array of ClusterListEntry objects of the specified length. Each ClusterListEntry object contains a cluster's state, a cluster's ID, and other important status information.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListClusters
            default: AWSIESnowballJobManagementService.ListClusters
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The number of ClusterListEntry objects to return.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: HTTP requests are stateless. To identify what object comes "next" in the list of ClusterListEntry objects, you have the option of specifying NextToken as the starting point for your returned list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersResult"
  /ListCompatibleImages:
    post:
      operationId: ListCompatibleImages
      description: This action returns a list of the different Amazon EC2-compatible Amazon Machine Images (AMIs) that are owned by your Amazon Web Services accountthat would be supported for use on a Snow device. Currently, supported AMIs are based on the Amazon Linux-2, Ubuntu 20.04 LTS - Focal, or Ubuntu 22.04 LTS - Jammy images, available on the Amazon Web Services Marketplace. Ubuntu 16.04 LTS - Xenial (HVM) images are no longer supported in the Market, but still supported for use on devices through Amazon EC2 VM Import/Export and running locally in AMIs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListCompatibleImages
            default: AWSIESnowballJobManagementService.ListCompatibleImages
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The maximum number of results for the list of compatible images. Currently, a Snowball Edge device can store 10 AMIs.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: HTTP requests are stateless. To identify what object comes "next" in the list of compatible images, you can specify a value for NextToken as the starting point for your list of returned images.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCompatibleImagesResult"
  /ListJobs:
    post:
      operationId: ListJobs
      description: Returns an array of JobListEntry objects of the specified length. Each JobListEntry object contains a job's state, a job's ID, and a value that indicates whether the job is a job part, in the case of export jobs. Calling this API action in one of the US regions will return jobs from the list of all jobs associated with this account in all US regions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListJobs
            default: AWSIESnowballJobManagementService.ListJobs
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The number of JobListEntry objects to return.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: HTTP requests are stateless. To identify what object comes "next" in the list of JobListEntry objects, you have the option of specifying NextToken as the starting point for your returned list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResult"
  /ListLongTermPricing:
    post:
      operationId: ListLongTermPricing
      description: Lists all long-term pricing types.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListLongTermPricing
            default: AWSIESnowballJobManagementService.ListLongTermPricing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The maximum number of ListLongTermPricing objects to return.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: Because HTTP requests are stateless, this is the starting point for your next list of ListLongTermPricing to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLongTermPricingResult"
  /ListPickupLocations:
    post:
      operationId: ListPickupLocations
      description: A list of locations from which the customer can choose to pickup a device.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListPickupLocations
            default: AWSIESnowballJobManagementService.ListPickupLocations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The maximum number of locations to list per page.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: HTTP requests are stateless. To identify what object comes "next" in the list of ListPickupLocationsRequest objects, you have the option of specifying NextToken as the starting point for your returned list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPickupLocationsResult"
  /ListServiceVersions:
    post:
      operationId: ListServiceVersions
      description: Lists all supported versions for Snow on-device services. Returns an array of ServiceVersion object containing the supported versions for a particular service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.ListServiceVersions
            default: AWSIESnowballJobManagementService.ListServiceVersions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceName:
                  $ref: "#/components/schemas/ServiceName"
                  description: The name of the service for which you're requesting supported versions.
                DependentServices:
                  $ref: "#/components/schemas/DependentServiceList"
                  description: A list of names and versions of dependant services of the requested service.
                MaxResults:
                  $ref: "#/components/schemas/ListLimit"
                  description: The maximum number of ListServiceVersions objects to return.
                NextToken:
                  $ref: "#/components/schemas/String"
                  description: Because HTTP requests are stateless, this is the starting point for the next list of returned ListServiceVersionsRequest versions.
              required:
                - ServiceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceVersionsResult"
  /UpdateCluster:
    post:
      operationId: UpdateCluster
      description: While a cluster's ClusterState value is in the AwaitingQuorum state, you can update some of the information associated with a cluster. Once the cluster changes to a different job state, usually 60 minutes after the cluster being created, this action is no longer available.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.UpdateCluster
            default: AWSIESnowballJobManagementService.UpdateCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClusterId:
                  $ref: "#/components/schemas/ClusterId"
                  description: The cluster ID of the cluster that you want to update, for example CID123e4567-e89b-12d3-a456-426655440000.
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: The new role Amazon Resource Name (ARN) that you want to associate with this cluster. To create a role ARN, use the CreateRole API action in Identity and Access Management (IAM).
                Description:
                  $ref: "#/components/schemas/String"
                  description: The updated description of this cluster.
                Resources:
                  $ref: "#/components/schemas/JobResource"
                  description: The updated arrays of JobResource objects that can include updated S3Resource objects or LambdaResource objects.
                OnDeviceServiceConfiguration:
                  $ref: "#/components/schemas/OnDeviceServiceConfiguration"
                  description: Specifies the service or services on the Snow Family device that your transferred data will be exported from or imported into. Amazon Web Services Snow Family device clusters support Amazon S3 and NFS (Network File System).
                AddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The ID of the updated Address object.
                ShippingOption:
                  $ref: "#/components/schemas/ShippingOption"
                  description: The updated shipping option value of this cluster's ShippingDetails object.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The new or updated Notification object.
                ForwardingAddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The updated ID for the forwarding address for a cluster. This field is not supported in most regions.
              required:
                - ClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClusterResult"
  /UpdateJob:
    post:
      operationId: UpdateJob
      description: While a job's JobState value is New, you can update some of the information associated with a job. Once the job changes to a different job state, usually within 60 minutes of the job being created, this action is no longer available.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.UpdateJob
            default: AWSIESnowballJobManagementService.UpdateJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The job ID of the job that you want to update, for example JID123e4567-e89b-12d3-a456-426655440000.
                RoleARN:
                  $ref: "#/components/schemas/RoleARN"
                  description: The new role Amazon Resource Name (ARN) that you want to associate with this job. To create a role ARN, use the CreateRoleIdentity and Access Management (IAM) API action.
                Notification:
                  $ref: "#/components/schemas/Notification"
                  description: The new or updated Notification object.
                Resources:
                  $ref: "#/components/schemas/JobResource"
                  description: The updated JobResource object, or the updated JobResource object.
                OnDeviceServiceConfiguration:
                  $ref: "#/components/schemas/OnDeviceServiceConfiguration"
                  description: Specifies the service or services on the Snow Family device that your transferred data will be exported from or imported into. Amazon Web Services Snow Family supports Amazon S3 and NFS (Network File System) and the Amazon Web Services Storage Gateway service Tape Gateway type.
                AddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The ID of the updated Address object.
                ShippingOption:
                  $ref: "#/components/schemas/ShippingOption"
                  description: The updated shipping option value of this job's ShippingDetails object.
                Description:
                  $ref: "#/components/schemas/String"
                  description: The updated description of this job's JobMetadata object.
                SnowballCapacityPreference:
                  $ref: "#/components/schemas/SnowballCapacity"
                  description: The updated SnowballCapacityPreference of this job's JobMetadata object. The 50 TB Snowballs are only available in the US regions. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
                ForwardingAddressId:
                  $ref: "#/components/schemas/AddressId"
                  description: The updated ID for the forwarding address for a job. This field is not supported in most regions.
                PickupDetails:
                  $ref: "#/components/schemas/PickupDetails"
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateJobResult"
  /UpdateJobShipmentState:
    post:
      operationId: UpdateJobShipmentState
      description: Updates the state when a shipment state changes to a different state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.UpdateJobShipmentState
            default: AWSIESnowballJobManagementService.UpdateJobShipmentState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
                  description: The job ID of the job whose shipment date you want to update, for example JID123e4567-e89b-12d3-a456-426655440000.
                ShipmentState:
                  $ref: "#/components/schemas/ShipmentState"
                  description: The state of a device when it is being shipped. Set to RECEIVED when the device arrives at your location. Set to RETURNED when you have returned the device to Amazon Web Services.
              required:
                - JobId
                - ShipmentState
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateJobShipmentStateResult"
  /UpdateLongTermPricing:
    post:
      operationId: UpdateLongTermPricing
      description: Updates the long-term pricing type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIESnowballJobManagementService.UpdateLongTermPricing
            default: AWSIESnowballJobManagementService.UpdateLongTermPricing
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LongTermPricingId:
                  $ref: "#/components/schemas/LongTermPricingId"
                  description: The ID of the long-term pricing type for the device.
                ReplacementJob:
                  $ref: "#/components/schemas/JobId"
                  description: Specifies that a device that is ordered with long-term pricing should be replaced with a new device.
                IsLongTermPricingAutoRenew:
                  $ref: "#/components/schemas/JavaBoolean"
                  description: If set to true, specifies that the current long-term pricing type for the device should be automatically renewed before the long-term pricing contract expires.
              required:
                - LongTermPricingId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLongTermPricingResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ClusterId:
      type: string
      minLength: 39
      maxLength: 39
      pattern: CID[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    CancelClusterResult:
      type: object
    JobId:
      type: string
      minLength: 39
      maxLength: 39
      pattern: (M|J)ID[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    CancelJobResult:
      type: object
    Address:
      description: The address that you want the Snow device(s) associated with a specific job to be shipped to. Addresses are validated at the time of creation. The address you provide must be located within the serviceable area of your region. Although no individual elements of the Address are required, if the address is invalid or unsupported, then an exception is thrown.
      type: object
      properties:
        AddressId:
          $ref: "#/components/schemas/AddressId"
          description: The unique ID for an address.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of a person to receive a Snow device at an address.
        Company:
          $ref: "#/components/schemas/String"
          description: The name of the company to receive a Snow device at an address.
        Street1:
          $ref: "#/components/schemas/String"
          description: The first line in a street address that a Snow device is to be delivered to.
        Street2:
          $ref: "#/components/schemas/String"
          description: The second line in a street address that a Snow device is to be delivered to.
        Street3:
          $ref: "#/components/schemas/String"
          description: The third line in a street address that a Snow device is to be delivered to.
        City:
          $ref: "#/components/schemas/String"
          description: The city in an address that a Snow device is to be delivered to.
        StateOrProvince:
          $ref: "#/components/schemas/String"
          description: The state or province in an address that a Snow device is to be delivered to.
        PrefectureOrDistrict:
          $ref: "#/components/schemas/String"
          description: This field is no longer used and the value is ignored.
        Landmark:
          $ref: "#/components/schemas/String"
          description: This field is no longer used and the value is ignored.
        Country:
          $ref: "#/components/schemas/String"
          description: The country in an address that a Snow device is to be delivered to.
        PostalCode:
          $ref: "#/components/schemas/String"
          description: The postal code in an address that a Snow device is to be delivered to.
        PhoneNumber:
          $ref: "#/components/schemas/String"
          description: The phone number associated with an address that a Snow device is to be delivered to.
        IsRestricted:
          $ref: "#/components/schemas/Boolean"
          description: If the address you are creating is a primary address, then set this option to true. This field is not supported in most regions.
        Type:
          $ref: "#/components/schemas/AddressType"
          description: Differentiates between delivery address and pickup address in the customer account. Provided at job creation.
    AddressId:
      type: string
      minLength: 40
      maxLength: 40
      pattern: ADID[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    String:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*
    Boolean:
      type: boolean
    AddressType:
      type: string
      enum:
        - CUST_PICKUP
        - AWS_SHIP
    CreateAddressResult:
      type: object
      properties:
        AddressId:
          $ref: "#/components/schemas/String"
          description: The automatically generated ID for a specific address. You'll use this ID when you create a job to specify which address you want the Snow device for that job shipped to.
    JobType:
      type: string
      enum:
        - IMPORT
        - EXPORT
        - LOCAL_USE
    JobResource:
      description: Contains an array of Amazon Web Services resource objects. Each object represents an Amazon S3 bucket, an Lambda function, or an Amazon Machine Image (AMI) based on Amazon EC2 that is associated with a particular job.
      type: object
      properties:
        S3Resources:
          $ref: "#/components/schemas/S3ResourceList"
          description: An array of S3Resource objects.
        LambdaResources:
          $ref: "#/components/schemas/LambdaResourceList"
          description: The Python-language Lambda functions for this job.
        Ec2AmiResources:
          $ref: "#/components/schemas/Ec2AmiResourceList"
          description: The Amazon Machine Images (AMIs) associated with this job.
    S3ResourceList:
      type: array
      items:
        $ref: "#/components/schemas/S3Resource"
    S3Resource:
      description: Each S3Resource object represents an Amazon S3 bucket that your transferred data will be exported from or imported into. For export jobs, this object can have an optional KeyRange value. The length of the range is defined at job creation, and has either an inclusive BeginMarker, an inclusive EndMarker, or both. Ranges are UTF-8 binary sorted.
      type: object
      properties:
        BucketArn:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) of an Amazon S3 bucket.
        KeyRange:
          $ref: "#/components/schemas/KeyRange"
          description: For export jobs, you can provide an optional KeyRange within a specific Amazon S3 bucket. The length of the range is defined at job creation, and has either an inclusive BeginMarker, an inclusive EndMarker, or both. Ranges are UTF-8 binary sorted.
        TargetOnDeviceServices:
          $ref: "#/components/schemas/TargetOnDeviceServiceList"
          description: Specifies the service or services on the Snow Family device that your transferred data will be exported from or imported into. Amazon Web Services Snow Family supports Amazon S3 and NFS (Network File System).
    ResourceARN:
      type: string
      maxLength: 255
      pattern: arn:aws.*:*
    KeyRange:
      description: Contains a key range. For export jobs, a S3Resource object can have an optional KeyRange value. The length of the range is defined at job creation, and has either an inclusive BeginMarker, an inclusive EndMarker, or both. Ranges are UTF-8 binary sorted.
      type: object
      properties:
        BeginMarker:
          $ref: "#/components/schemas/String"
          description: The key that starts an optional key range for an export job. Ranges are inclusive and UTF-8 binary sorted.
        EndMarker:
          $ref: "#/components/schemas/String"
          description: The key that ends an optional key range for an export job. Ranges are inclusive and UTF-8 binary sorted.
    TargetOnDeviceServiceList:
      type: array
      items:
        $ref: "#/components/schemas/TargetOnDeviceService"
    TargetOnDeviceService:
      description: An object that represents the service or services on the Snow Family device that your transferred data will be exported from or imported into. Amazon Web Services Snow Family supports Amazon S3 and NFS (Network File System).
      type: object
      properties:
        ServiceName:
          $ref: "#/components/schemas/DeviceServiceName"
          description: Specifies the name of the service on the Snow Family device that your transferred data will be exported from or imported into.
        TransferOption:
          $ref: "#/components/schemas/TransferOption"
          description: Specifies whether the data is being imported or exported. You can import or export the data, or use it locally on the device.
    DeviceServiceName:
      type: string
      enum:
        - NFS_ON_DEVICE_SERVICE
        - S3_ON_DEVICE_SERVICE
    TransferOption:
      type: string
      enum:
        - IMPORT
        - EXPORT
        - LOCAL_USE
    LambdaResourceList:
      type: array
      items:
        $ref: "#/components/schemas/LambdaResource"
    LambdaResource:
      description: Identifies
      type: object
      properties:
        LambdaArn:
          $ref: "#/components/schemas/ResourceARN"
          description: An Amazon Resource Name (ARN) that represents an Lambda function to be triggered by PUT object actions on the associated local Amazon S3 resource.
        EventTriggers:
          $ref: "#/components/schemas/EventTriggerDefinitionList"
          description: The array of ARNs for S3Resource objects to trigger the LambdaResource objects associated with this job.
    EventTriggerDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/EventTriggerDefinition"
    EventTriggerDefinition:
      description: The container for the EventTriggerDefinition$EventResourceARN.
      type: object
      properties:
        EventResourceARN:
          $ref: "#/components/schemas/ResourceARN"
          description: The Amazon Resource Name (ARN) for any local Amazon S3 resource that is an Lambda function's event trigger associated with this job.
    Ec2AmiResourceList:
      type: array
      items:
        $ref: "#/components/schemas/Ec2AmiResource"
    Ec2AmiResource:
      description: A JSON-formatted object that contains the IDs for an Amazon Machine Image (AMI), including the Amazon EC2-compatible AMI ID and the Snow device AMI ID. Each AMI has these two IDs to simplify identifying the AMI in both the Amazon Web Services Cloud and on the device.
      type: object
      properties:
        AmiId:
          $ref: "#/components/schemas/AmiId"
          description: The ID of the AMI in Amazon EC2.
        SnowballAmiId:
          $ref: "#/components/schemas/String"
          description: The ID of the AMI on the Snow device.
      required:
        - AmiId
    AmiId:
      type: string
      minLength: 12
      maxLength: 21
      pattern: (ami-[0-9a-f]{8})|(ami-[0-9a-f]{17})
    OnDeviceServiceConfiguration:
      description: An object that represents the metadata and configuration settings for services on an Amazon Web Services Snow Family device.
      type: object
      properties:
        NFSOnDeviceService:
          $ref: "#/components/schemas/NFSOnDeviceServiceConfiguration"
          description: Represents the NFS (Network File System) service on a Snow Family device.
        TGWOnDeviceService:
          $ref: "#/components/schemas/TGWOnDeviceServiceConfiguration"
          description: Represents the Storage Gateway service Tape Gateway type on a Snow Family device.
        EKSOnDeviceService:
          $ref: "#/components/schemas/EKSOnDeviceServiceConfiguration"
          description: The configuration of EKS Anywhere on the Snow Family device.
        S3OnDeviceService:
          $ref: "#/components/schemas/S3OnDeviceServiceConfiguration"
          description: Configuration for Amazon S3 compatible storage on Snow family devices.
    NFSOnDeviceServiceConfiguration:
      description: An object that represents the metadata and configuration settings for the NFS (Network File System) service on an Amazon Web Services Snow Family device.
      type: object
      properties:
        StorageLimit:
          $ref: "#/components/schemas/StorageLimit"
          description: The maximum NFS storage for one Snow Family device.
        StorageUnit:
          $ref: "#/components/schemas/StorageUnit"
          description: "The scale unit of the NFS storage on the device. Valid values: TB."
    StorageLimit:
      type: integer
      minimum: 0
    StorageUnit:
      type: string
      enum:
        - TB
    TGWOnDeviceServiceConfiguration:
      description: An object that represents the metadata and configuration settings for the Storage Gateway service Tape Gateway type on an Amazon Web Services Snow Family device.
      type: object
      properties:
        StorageLimit:
          $ref: "#/components/schemas/StorageLimit"
          description: The maximum number of virtual tapes to store on one Snow Family device. Due to physical resource limitations, this value must be set to 80 for Snowball Edge.
        StorageUnit:
          $ref: "#/components/schemas/StorageUnit"
          description: The scale unit of the virtual tapes on the device.
    EKSOnDeviceServiceConfiguration:
      description: An object representing the metadata and configuration settings of EKS Anywhere on the Snow Family device.
      type: object
      properties:
        KubernetesVersion:
          $ref: "#/components/schemas/String"
          description: The Kubernetes version for EKS Anywhere on the Snow Family device.
        EKSAnywhereVersion:
          $ref: "#/components/schemas/String"
          description: The optional version of EKS Anywhere on the Snow Family device.
    S3OnDeviceServiceConfiguration:
      description: Amazon S3 compatible storage on Snow family devices configuration items.
      type: object
      properties:
        StorageLimit:
          $ref: "#/components/schemas/S3StorageLimit"
          description: If the specified storage limit value matches storage limit of one of the defined configurations, that configuration will be used. If the specified storage limit value does not match any defined configuration, the request will fail. If more than one configuration has the same storage limit as specified, the other input need to be provided.
        StorageUnit:
          $ref: "#/components/schemas/StorageUnit"
          description: Storage unit. Currently the only supported unit is TB.
        ServiceSize:
          $ref: "#/components/schemas/ServiceSize"
          description: Applicable when creating a cluster. Specifies how many nodes are needed for Amazon S3 compatible storage on Snow family devices. If specified, the other input can be omitted.
        FaultTolerance:
          $ref: "#/components/schemas/NodeFaultTolerance"
          description: ">Fault tolerance level of the cluster. This indicates the number of nodes that can go down without degrading the performance of the cluster. This additional input helps when the specified StorageLimit matches more than one Amazon S3 compatible storage on Snow family devices service configuration."
    S3StorageLimit:
      type: number
      format: double
      minimum: 0
    ServiceSize:
      type: integer
      minimum: 3
      maximum: 16
    NodeFaultTolerance:
      type: integer
      minimum: 1
      maximum: 4
    KmsKeyARN:
      type: string
      maxLength: 255
      pattern: arn:aws.*:kms:.*:[0-9]{12}:key/.*
    RoleARN:
      type: string
      maxLength: 255
      pattern: arn:aws.*:iam::[0-9]{12}:role/.*
    SnowballType:
      type: string
      enum:
        - STANDARD
        - EDGE
        - EDGE_C
        - EDGE_CG
        - EDGE_S
        - SNC1_HDD
        - SNC1_SSD
        - V3_5C
        - V3_5S
        - RACK_5U_C
    ShippingOption:
      type: string
      enum:
        - SECOND_DAY
        - NEXT_DAY
        - EXPRESS
        - STANDARD
    Notification:
      description: The Amazon Simple Notification Service (Amazon SNS) notification settings associated with a specific job. The Notification object is returned as a part of the response syntax of the DescribeJob action in the JobMetadata data type. When the notification settings are defined during job creation, you can choose to notify based on a specific set of job states using the JobStatesToNotify array of strings, or you can specify that you want to have Amazon SNS notifications sent out for all job states with NotifyAll set to true.
      type: object
      properties:
        SnsTopicARN:
          $ref: "#/components/schemas/SnsTopicARN"
          description: The new SNS TopicArn that you want to associate with this job. You can create Amazon Resource Names (ARNs) for topics by using the CreateTopic Amazon SNS API action. You can subscribe email addresses to an Amazon SNS topic through the Amazon Web Services Management Console, or by using the Subscribe Amazon Simple Notification Service (Amazon SNS) API action.
        JobStatesToNotify:
          $ref: "#/components/schemas/JobStateList"
          description: The list of job states that will trigger a notification for this job.
        NotifyAll:
          $ref: "#/components/schemas/Boolean"
          description: Any change in job state will trigger a notification for this job.
        DevicePickupSnsTopicARN:
          $ref: "#/components/schemas/SnsTopicARN"
          description: Used to send SNS notifications for the person picking up the device (identified during job creation).
    SnsTopicARN:
      type: string
      maxLength: 255
      pattern: arn:aws.*:sns:.*:[0-9]{12}:.*
    JobStateList:
      type: array
      items:
        $ref: "#/components/schemas/JobState"
    JobState:
      type: string
      enum:
        - New
        - PreparingAppliance
        - PreparingShipment
        - InTransitToCustomer
        - WithCustomer
        - InTransitToAWS
        - WithAWSSortingFacility
        - WithAWS
        - InProgress
        - Complete
        - Cancelled
        - Listing
        - Pending
    TaxDocuments:
      description: The tax documents required in your Amazon Web Services Region.
      type: object
      properties:
        IND:
          $ref: "#/components/schemas/INDTaxDocuments"
    INDTaxDocuments:
      description: The tax documents required in Amazon Web Services Region in India.
      type: object
      properties:
        GSTIN:
          $ref: "#/components/schemas/GSTIN"
          description: The Goods and Services Tax (GST) documents required in Amazon Web Services Region in India.
    GSTIN:
      type: string
      minLength: 15
      maxLength: 15
      pattern: \d{2}[A-Z]{5}\d{4}[A-Z]{1}[A-Z\d]{1}[Z]{1}[A-Z\d]{1}
    RemoteManagement:
      type: string
      enum:
        - INSTALLED_ONLY
        - INSTALLED_AUTOSTART
        - NOT_INSTALLED
    InitialClusterSize:
      type: integer
      minimum: 0
      maximum: 16
    LongTermPricingIdList:
      type: array
      items:
        $ref: "#/components/schemas/LongTermPricingId"
    LongTermPricingId:
      type: string
      minLength: 41
      maxLength: 41
      pattern: LTPID[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    SnowballCapacity:
      type: string
      enum:
        - T50
        - T80
        - T100
        - T42
        - T98
        - T8
        - T14
        - T32
        - NoPreference
        - T240
        - T13
    CreateClusterResult:
      type: object
      properties:
        ClusterId:
          $ref: "#/components/schemas/ClusterId"
          description: The automatically generated ID for a cluster.
        JobListEntries:
          $ref: "#/components/schemas/JobListEntryList"
          description: List of jobs created for this cluster. For syntax, see ListJobsResult$JobListEntries in this guide.
    JobListEntryList:
      type: array
      items:
        $ref: "#/components/schemas/JobListEntry"
    JobListEntry:
      description: Each JobListEntry object contains a job's state, a job's ID, and a value that indicates whether the job is a job part, in the case of an export job.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/String"
          description: The automatically generated ID for a job, for example JID123e4567-e89b-12d3-a456-426655440000.
        JobState:
          $ref: "#/components/schemas/JobState"
          description: The current state of this job.
        IsMaster:
          $ref: "#/components/schemas/Boolean"
          description: A value that indicates that this job is a main job. A main job represents a successful request to create an export job. Main jobs aren't associated with any Snowballs. Instead, each main job will have at least one job part, and each job part is associated with a Snowball. It might take some time before the job parts associated with a particular main job are listed, because they are created after the main job is created.
        JobType:
          $ref: "#/components/schemas/JobType"
          description: The type of job.
        SnowballType:
          $ref: "#/components/schemas/SnowballType"
          description: The type of device used with this job.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date for this job.
        Description:
          $ref: "#/components/schemas/String"
          description: The optional description of this specific job, for example Important Photos 2016-08-11.
    Timestamp:
      type: string
      format: date-time
    DeviceConfiguration:
      description: The container for SnowconeDeviceConfiguration.
      type: object
      properties:
        SnowconeDeviceConfiguration:
          $ref: "#/components/schemas/SnowconeDeviceConfiguration"
          description: Returns information about the device configuration for an Snowball Edge job.
    SnowconeDeviceConfiguration:
      description: Specifies the device configuration for an Snowball Edge job.
      type: object
      properties:
        WirelessConnection:
          $ref: "#/components/schemas/WirelessConnection"
          description: Configures the wireless connection for the Snowball Edge device.
    WirelessConnection:
      description: Configures the wireless connection on an Snowball Edge device.
      type: object
      properties:
        IsWifiEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables the Wi-Fi adapter on an Snowball Edge device.
    ImpactLevel:
      type: string
      enum:
        - IL2
        - IL4
        - IL5
        - IL6
        - IL99
    PickupDetails:
      description: Information identifying the person picking up the device.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the person picking up the device.
        PhoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
          description: The phone number of the person picking up the device.
        Email:
          $ref: "#/components/schemas/Email"
          description: The email address of the person picking up the device.
        IdentificationNumber:
          $ref: "#/components/schemas/String"
          description: The number on the credential identifying the person picking up the device.
        IdentificationExpirationDate:
          $ref: "#/components/schemas/Timestamp"
          description: Expiration date of the credential identifying the person picking up the device.
        IdentificationIssuingOrg:
          $ref: "#/components/schemas/String"
          description: Organization that issued the credential identifying the person picking up the device.
        DevicePickupId:
          $ref: "#/components/schemas/DevicePickupId"
          description: The unique ID for a device that will be picked up.
    PhoneNumber:
      type: string
      minLength: 7
      maxLength: 30
      pattern: "^\\s*(?:\\+?(\\d{1,3}))?[-. (]*(\\d{3})[-. )]*(\\d{3})[-. ]*(\\d{4})(?: *x(\\d+))?\\s*$"
    Email:
      type: string
      minLength: 3
      maxLength: 320
      pattern: ^(?=.{3,100}$).+@.+[.].+$
    DevicePickupId:
      type: string
      minLength: 40
      maxLength: 40
      pattern: DPID[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    CreateJobResult:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The automatically generated ID for a job, for example JID123e4567-e89b-12d3-a456-426655440000.
    LongTermPricingType:
      type: string
      enum:
        - OneYear
        - ThreeYear
        - OneMonth
    JavaBoolean:
      type: boolean
    CreateLongTermPricingResult:
      type: object
      properties:
        LongTermPricingId:
          $ref: "#/components/schemas/LongTermPricingId"
          description: The ID of the long-term pricing type for the device.
    CreateReturnShippingLabelResult:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ShippingLabelStatus"
          description: The status information of the task on a Snow device that is being returned to Amazon Web Services.
    ShippingLabelStatus:
      type: string
      enum:
        - InProgress
        - TimedOut
        - Succeeded
        - Failed
    DescribeAddressResult:
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/Address"
          description: The address that you want the Snow device(s) associated with a specific job to be shipped to.
    ListLimit:
      type: integer
      minimum: 0
      maximum: 100
    DescribeAddressesResult:
      type: object
      properties:
        Addresses:
          $ref: "#/components/schemas/AddressList"
          description: The Snow device shipping addresses that were created for this account.
        NextToken:
          $ref: "#/components/schemas/String"
          description: HTTP requests are stateless. If you use the automatically generated NextToken value in your next DescribeAddresses call, your list of returned addresses will start from this point in the array.
    AddressList:
      type: array
      items:
        $ref: "#/components/schemas/Address"
    DescribeClusterResult:
      type: object
      properties:
        ClusterMetadata:
          $ref: "#/components/schemas/ClusterMetadata"
          description: Information about a specific cluster, including shipping information, cluster status, and other important metadata.
    ClusterMetadata:
      description: Contains metadata about a specific cluster.
      type: object
      properties:
        ClusterId:
          $ref: "#/components/schemas/String"
          description: The automatically generated ID for a cluster.
        Description:
          $ref: "#/components/schemas/String"
          description: The optional description of the cluster.
        KmsKeyARN:
          $ref: "#/components/schemas/KmsKeyARN"
          description: The KmsKeyARN Amazon Resource Name (ARN) associated with this cluster. This ARN was created using the CreateKey API action in Key Management Service (KMS.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The role ARN associated with this cluster. This ARN was created using the CreateRole API action in Identity and Access Management (IAM).
        ClusterState:
          $ref: "#/components/schemas/ClusterState"
          description: The current status of the cluster.
        JobType:
          $ref: "#/components/schemas/JobType"
          description: The type of job for this cluster. Currently, the only job type supported for clusters is LOCAL_USE.
        SnowballType:
          $ref: "#/components/schemas/SnowballType"
          description: The type of Snowball Edge device to use for this cluster. For cluster jobs, Amazon Web Services Snow Family currently supports only the EDGE device type.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date for this cluster.
        Resources:
          $ref: "#/components/schemas/JobResource"
          description: The arrays of JobResource objects that can include updated S3Resource objects or LambdaResource objects.
        AddressId:
          $ref: "#/components/schemas/AddressId"
          description: The automatically generated ID for a specific address.
        ShippingOption:
          $ref: "#/components/schemas/ShippingOption"
          description: "The shipping speed for each node in this cluster. This speed doesn't dictate how soon you'll get each device, rather it represents how quickly each device moves to its destination while in transit. Regional shipping speeds are as follows: In Australia, you have access to express shipping. Typically, devices shipped express are delivered in about a day. In the European Union (EU), you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In addition, most countries in the EU have access to standard shipping, which typically takes less than a week, one way. In India, Snow devices are delivered in one to seven days. In the US, you have access to one-day shipping and two-day shipping."
        Notification:
          $ref: "#/components/schemas/Notification"
          description: The Amazon Simple Notification Service (Amazon SNS) notification settings for this cluster.
        ForwardingAddressId:
          $ref: "#/components/schemas/AddressId"
          description: The ID of the address that you want a cluster shipped to, after it will be shipped to its primary address. This field is not supported in most regions.
        TaxDocuments:
          $ref: "#/components/schemas/TaxDocuments"
          description: The tax documents required in your Amazon Web Services Region.
        OnDeviceServiceConfiguration:
          $ref: "#/components/schemas/OnDeviceServiceConfiguration"
          description: Represents metadata and configuration settings for services on an Amazon Web Services Snow Family device.
    ClusterState:
      type: string
      enum:
        - AwaitingQuorum
        - Pending
        - InUse
        - Complete
        - Cancelled
    DescribeJobResult:
      type: object
      properties:
        JobMetadata:
          $ref: "#/components/schemas/JobMetadata"
          description: Information about a specific job, including shipping information, job status, and other important metadata.
        SubJobMetadata:
          $ref: "#/components/schemas/JobMetadataList"
          description: Information about a specific job part (in the case of an export job), including shipping information, job status, and other important metadata.
    JobMetadata:
      description: Contains information about a specific job including shipping information, job status, and other important metadata. This information is returned as a part of the response syntax of the DescribeJob action.
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/String"
          description: The automatically generated ID for a job, for example JID123e4567-e89b-12d3-a456-426655440000.
        JobState:
          $ref: "#/components/schemas/JobState"
          description: The current status of the jobs.
        JobType:
          $ref: "#/components/schemas/JobType"
          description: The type of job.
        SnowballType:
          $ref: "#/components/schemas/SnowballType"
          description: The type of device used with this job.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date for this job.
        Resources:
          $ref: "#/components/schemas/JobResource"
          description: An array of S3Resource objects. Each S3Resource object represents an Amazon S3 bucket that your transferred data will be exported from or imported into.
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the job, provided at job creation.
        KmsKeyARN:
          $ref: "#/components/schemas/KmsKeyARN"
          description: The Amazon Resource Name (ARN) for the Key Management Service (KMS) key associated with this job. This ARN was created using the CreateKey API action in KMS.
        RoleARN:
          $ref: "#/components/schemas/RoleARN"
          description: The role ARN associated with this job. This ARN was created using the CreateRole API action in Identity and Access Management.
        AddressId:
          $ref: "#/components/schemas/AddressId"
          description: The ID for the address that you want the Snow device shipped to.
        ShippingDetails:
          $ref: "#/components/schemas/ShippingDetails"
          description: A job's shipping information, including inbound and outbound tracking numbers and shipping speed options.
        SnowballCapacityPreference:
          $ref: "#/components/schemas/SnowballCapacity"
          description: The Snow device capacity preference for this job, specified at job creation. In US regions, you can choose between 50 TB and 80 TB Snowballs. All other regions use 80 TB capacity Snowballs. For more information, see "https://docs.aws.amazon.com/snowball/latest/snowcone-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide or "https://docs.aws.amazon.com/snowball/latest/developer-guide/snow-device-types.html" (Snow Family Devices and Capacity) in the Snowcone User Guide.
        Notification:
          $ref: "#/components/schemas/Notification"
          description: The Amazon Simple Notification Service (Amazon SNS) notification settings associated with a specific job. The Notification object is returned as a part of the response syntax of the DescribeJob action in the JobMetadata data type.
        DataTransferProgress:
          $ref: "#/components/schemas/DataTransfer"
          description: A value that defines the real-time status of a Snow device's data transfer while the device is at Amazon Web Services. This data is only available while a job has a JobState value of InProgress, for both import and export jobs.
        JobLogInfo:
          $ref: "#/components/schemas/JobLogs"
          description: Links to Amazon S3 presigned URLs for the job report and logs. For import jobs, the PDF job report becomes available at the end of the import process. For export jobs, your job report typically becomes available while the Snow device for your job part is being delivered to you.
        ClusterId:
          $ref: "#/components/schemas/String"
          description: The 39-character ID for the cluster, for example CID123e4567-e89b-12d3-a456-426655440000.
        ForwardingAddressId:
          $ref: "#/components/schemas/AddressId"
          description: The ID of the address that you want a job shipped to, after it will be shipped to its primary address. This field is not supported in most regions.
        TaxDocuments:
          $ref: "#/components/schemas/TaxDocuments"
          description: The metadata associated with the tax documents required in your Amazon Web Services Region.
        DeviceConfiguration:
          $ref: "#/components/schemas/DeviceConfiguration"
        RemoteManagement:
          $ref: "#/components/schemas/RemoteManagement"
          description: Allows you to securely operate and manage Snowcone devices remotely from outside of your internal network. When set to INSTALLED_AUTOSTART, remote management will automatically be available when the device arrives at your location. Otherwise, you need to use the Snowball Client to manage the device.
        LongTermPricingId:
          $ref: "#/components/schemas/LongTermPricingId"
          description: The ID of the long-term pricing type for the device.
        OnDeviceServiceConfiguration:
          $ref: "#/components/schemas/OnDeviceServiceConfiguration"
          description: Represents metadata and configuration settings for services on an Amazon Web Services Snow Family device.
        ImpactLevel:
          $ref: "#/components/schemas/ImpactLevel"
          description: The highest impact level of data that will be stored or processed on the device, provided at job creation.
        PickupDetails:
          $ref: "#/components/schemas/PickupDetails"
          description: Information identifying the person picking up the device.
        SnowballId:
          $ref: "#/components/schemas/String"
          description: Unique ID associated with a device.
    ShippingDetails:
      description: A job's shipping information, including inbound and outbound tracking numbers and shipping speed options.
      type: object
      properties:
        ShippingOption:
          $ref: "#/components/schemas/ShippingOption"
          description: "The shipping speed for a particular job. This speed doesn't dictate how soon you'll get the Snow device from the job's creation date. This speed represents how quickly it moves to its destination while in transit. Regional shipping speeds are as follows: In Australia, you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In the European Union (EU), you have access to express shipping. Typically, Snow devices shipped express are delivered in about a day. In addition, most countries in the EU have access to standard shipping, which typically takes less than a week, one way. In India, Snow devices are delivered in one to seven days. In the United States of America (US), you have access to one-day shipping and two-day shipping."
        InboundShipment:
          $ref: "#/components/schemas/Shipment"
          description: The Status and TrackingNumber values for a Snow device being returned to Amazon Web Services for a particular job.
        OutboundShipment:
          $ref: "#/components/schemas/Shipment"
          description: The Status and TrackingNumber values for a Snow device being delivered to the address that you specified for a particular job.
    Shipment:
      description: The Status and TrackingNumber information for an inbound or outbound shipment.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/String"
          description: Status information for a shipment.
        TrackingNumber:
          $ref: "#/components/schemas/String"
          description: The tracking number for this job. Using this tracking number with your region's carrier's website, you can track a Snow device as the carrier transports it. For India, the carrier is Amazon Logistics. For all other regions, UPS is the carrier.
    DataTransfer:
      description: Defines the real-time status of a Snow device's data transfer while the device is at Amazon Web Services. This data is only available while a job has a JobState value of InProgress, for both import and export jobs.
      type: object
      properties:
        BytesTransferred:
          $ref: "#/components/schemas/Long"
          description: The number of bytes transferred between a Snow device and Amazon S3.
        ObjectsTransferred:
          $ref: "#/components/schemas/Long"
          description: The number of objects transferred between a Snow device and Amazon S3.
        TotalBytes:
          $ref: "#/components/schemas/Long"
          description: The total bytes of data for a transfer between a Snow device and Amazon S3. This value is set to 0 (zero) until all the keys that will be transferred have been listed.
        TotalObjects:
          $ref: "#/components/schemas/Long"
          description: The total number of objects for a transfer between a Snow device and Amazon S3. This value is set to 0 (zero) until all the keys that will be transferred have been listed.
    Long:
      type: integer
      format: int64
    JobLogs:
      description: "Contains job logs. Whenever a Snow device is used to import data into or export data out of Amazon S3, you'll have the option of downloading a PDF job report. Job logs are returned as a part of the response syntax of the DescribeJob action in the JobMetadata data type. The job logs can be accessed for up to 60 minutes after this request has been made. To access any of the job logs after 60 minutes have passed, you'll have to make another call to the DescribeJob action. For import jobs, the PDF job report becomes available at the end of the import process. For export jobs, your job report typically becomes available while the Snow device for your job part is being delivered to you. The job report provides you insight into the state of your Amazon S3 data transfer. The report includes details about your job or job part for your records. For deeper visibility into the status of your transferred objects, you can look at the two associated logs: a success log and a failure log. The logs are saved in comma-separated value (CSV) format, and the name of each log includes the ID of the job or job part that the log describes."
      type: object
      properties:
        JobCompletionReportURI:
          $ref: "#/components/schemas/String"
          description: A link to an Amazon S3 presigned URL where the job completion report is located.
        JobSuccessLogURI:
          $ref: "#/components/schemas/String"
          description: A link to an Amazon S3 presigned URL where the job success log is located.
        JobFailureLogURI:
          $ref: "#/components/schemas/String"
          description: A link to an Amazon S3 presigned URL where the job failure log is located.
    JobMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/JobMetadata"
    DescribeReturnShippingLabelResult:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ShippingLabelStatus"
          description: The status information of the task on a Snow device that is being returned to Amazon Web Services.
        ExpirationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The expiration date of the current return shipping label.
        ReturnShippingLabelURI:
          $ref: "#/components/schemas/String"
          description: The pre-signed Amazon S3 URI used to download the return shipping label.
    GetJobManifestResult:
      type: object
      properties:
        ManifestURI:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 presigned URL for the manifest file associated with the specified JobId value.
    GetJobUnlockCodeResult:
      type: object
      properties:
        UnlockCode:
          $ref: "#/components/schemas/String"
          description: The UnlockCode value for the specified job. The UnlockCode value can be accessed for up to 360 days after the job has been created.
    GetSnowballUsageResult:
      type: object
      properties:
        SnowballLimit:
          $ref: "#/components/schemas/Integer"
          description: The service limit for number of Snow devices this account can have at once. The default service limit is 1 (one).
        SnowballsInUse:
          $ref: "#/components/schemas/Integer"
          description: The number of Snow devices that this account is currently using.
    Integer:
      type: integer
    GetSoftwareUpdatesResult:
      type: object
      properties:
        UpdatesURI:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 presigned URL for the update file associated with the specified JobId value. The software update will be available for 2 days after this request is made. To access an update after the 2 days have passed, you'll have to make another call to GetSoftwareUpdates.
    ListClusterJobsResult:
      type: object
      properties:
        JobListEntries:
          $ref: "#/components/schemas/JobListEntryList"
          description: Each JobListEntry object contains a job's state, a job's ID, and a value that indicates whether the job is a job part, in the case of export jobs.
        NextToken:
          $ref: "#/components/schemas/String"
          description: HTTP requests are stateless. If you use the automatically generated NextToken value in your next ListClusterJobsResult call, your list of returned jobs will start from this point in the array.
    ListClustersResult:
      type: object
      properties:
        ClusterListEntries:
          $ref: "#/components/schemas/ClusterListEntryList"
          description: Each ClusterListEntry object contains a cluster's state, a cluster's ID, and other important status information.
        NextToken:
          $ref: "#/components/schemas/String"
          description: HTTP requests are stateless. If you use the automatically generated NextToken value in your next ClusterListEntry call, your list of returned clusters will start from this point in the array.
    ClusterListEntryList:
      type: array
      items:
        $ref: "#/components/schemas/ClusterListEntry"
    ClusterListEntry:
      description: Contains a cluster's state, a cluster's ID, and other important information.
      type: object
      properties:
        ClusterId:
          $ref: "#/components/schemas/String"
          description: The 39-character ID for the cluster that you want to list, for example CID123e4567-e89b-12d3-a456-426655440000.
        ClusterState:
          $ref: "#/components/schemas/ClusterState"
          description: The current state of this cluster. For information about the state of a specific node, see JobListEntry$JobState.
        CreationDate:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date for this cluster.
        Description:
          $ref: "#/components/schemas/String"
          description: Defines an optional description of the cluster, for example Environmental Data Cluster-01.
    ListCompatibleImagesResult:
      type: object
      properties:
        CompatibleImages:
          $ref: "#/components/schemas/CompatibleImageList"
          description: A JSON-formatted object that describes a compatible AMI, including the ID and name for a Snow device AMI.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Because HTTP requests are stateless, this is the starting point for your next list of returned images.
    CompatibleImageList:
      type: array
      items:
        $ref: "#/components/schemas/CompatibleImage"
    CompatibleImage:
      description: A JSON-formatted object that describes a compatible Amazon Machine Image (AMI), including the ID and name for a Snow device AMI. This AMI is compatible with the device's physical hardware requirements, and it should be able to be run in an SBE1 instance on the device.
      type: object
      properties:
        AmiId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for an individual Snow device AMI.
        Name:
          $ref: "#/components/schemas/String"
          description: The optional name of a compatible image.
    ListJobsResult:
      type: object
      properties:
        JobListEntries:
          $ref: "#/components/schemas/JobListEntryList"
          description: Each JobListEntry object contains a job's state, a job's ID, and a value that indicates whether the job is a job part, in the case of export jobs.
        NextToken:
          $ref: "#/components/schemas/String"
          description: HTTP requests are stateless. If you use this automatically generated NextToken value in your next ListJobs call, your returned JobListEntry objects will start from this point in the array.
    ListLongTermPricingResult:
      type: object
      properties:
        LongTermPricingEntries:
          $ref: "#/components/schemas/LongTermPricingEntryList"
          description: Each LongTermPricingEntry object contains a status, ID, and other information about the LongTermPricing type.
        NextToken:
          $ref: "#/components/schemas/String"
          description: Because HTTP requests are stateless, this is the starting point for your next list of returned ListLongTermPricing list.
    LongTermPricingEntryList:
      type: array
      items:
        $ref: "#/components/schemas/LongTermPricingListEntry"
    LongTermPricingListEntry:
      description: Each LongTermPricingListEntry object contains information about a long-term pricing type.
      type: object
      properties:
        LongTermPricingId:
          $ref: "#/components/schemas/LongTermPricingId"
          description: The ID of the long-term pricing type for the device.
        LongTermPricingEndDate:
          $ref: "#/components/schemas/Timestamp"
          description: The end date the long-term pricing contract.
        LongTermPricingStartDate:
          $ref: "#/components/schemas/Timestamp"
          description: The start date of the long-term pricing contract.
        LongTermPricingType:
          $ref: "#/components/schemas/LongTermPricingType"
          description: The type of long-term pricing that was selected for the device.
        CurrentActiveJob:
          $ref: "#/components/schemas/JobId"
          description: The current active jobs on the device the long-term pricing type.
        ReplacementJob:
          $ref: "#/components/schemas/JobId"
          description: A new device that replaces a device that is ordered with long-term pricing.
        IsLongTermPricingAutoRenew:
          $ref: "#/components/schemas/JavaBoolean"
          description: If set to true, specifies that the current long-term pricing type for the device should be automatically renewed before the long-term pricing contract expires.
        LongTermPricingStatus:
          $ref: "#/components/schemas/String"
          description: The status of the long-term pricing type.
        SnowballType:
          $ref: "#/components/schemas/SnowballType"
          description: The type of Snow Family devices associated with this long-term pricing job.
        JobIds:
          $ref: "#/components/schemas/LongTermPricingAssociatedJobIdList"
          description: The IDs of the jobs that are associated with a long-term pricing type.
