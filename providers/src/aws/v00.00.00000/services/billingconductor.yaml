openapi: 3.0.0
info:
  version: "2021-07-30"
  title: AWSBillingConductor
  description: AWSBillingConductor
  x-serviceName: billingconductor
  x-serviceAlias: billingconductor
  x-protocol: rest-json
  x-apiVersion: "2021-07-30"
  x-endpointPrefix: billingconductor
servers:
  - url: https://billingconductor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for billingconductor
paths:
  /associate-accounts:
    post:
      operationId: AssociateAccounts
      description: Connects an array of account IDs in a consolidated billing family to a predefined billing group. The account IDs must be a part of the consolidated billing family during the current month, and not already associated with another billing group. The maximum number of accounts that can be associated in one call is 30.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/BillingGroupArn"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
              required:
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAccountsOutput"
  /associate-pricing-rules:
    put:
      operationId: AssociatePricingRules
      description: Connects an array of PricingRuleArns to a defined PricingPlan. The maximum number PricingRuleArn that can be associated in one call is 30.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/PricingPlanArn"
                PricingRuleArns:
                  $ref: "#/components/schemas/PricingRuleArnsNonEmptyInput"
              required:
                - PricingRuleArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePricingRulesOutput"
  /batch-associate-resources-to-custom-line-item:
    put:
      operationId: BatchAssociateResourcesToCustomLineItem
      description: Associates a batch of resources to a percentage custom line item.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TargetArn:
                  $ref: "#/components/schemas/CustomLineItemArn"
                ResourceArns:
                  $ref: "#/components/schemas/CustomLineItemBatchAssociationsList"
                BillingPeriodRange:
                  $ref: "#/components/schemas/CustomLineItemBillingPeriodRange"
              required:
                - TargetArn
                - ResourceArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateResourcesToCustomLineItemOutput"
  /batch-disassociate-resources-from-custom-line-item:
    put:
      operationId: BatchDisassociateResourcesFromCustomLineItem
      description: Disassociates a batch of resources from a percentage custom line item.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TargetArn:
                  $ref: "#/components/schemas/CustomLineItemArn"
                ResourceArns:
                  $ref: "#/components/schemas/CustomLineItemBatchDisassociationsList"
                BillingPeriodRange:
                  $ref: "#/components/schemas/CustomLineItemBillingPeriodRange"
              required:
                - TargetArn
                - ResourceArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateResourcesFromCustomLineItemOutput"
  /create-billing-group:
    post:
      operationId: CreateBillingGroup
      description: Creates a billing group that resembles a consolidated billing family that Amazon Web Services charges, based off of the predefined pricing plan computation.
      parameters:
        - name: X-Amzn-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you specify to ensure idempotency of the request. Idempotency ensures that an API request completes no more than one time. With an idempotent request, if the original request completes successfully, any subsequent retries complete successfully without performing any further actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/BillingGroupName"
                AccountGrouping:
                  $ref: "#/components/schemas/AccountGrouping"
                ComputationPreference:
                  $ref: "#/components/schemas/ComputationPreference"
                PrimaryAccountId:
                  $ref: "#/components/schemas/AccountId"
                Description:
                  $ref: "#/components/schemas/BillingGroupDescription"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - AccountGrouping
                - ComputationPreference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBillingGroupOutput"
  /create-custom-line-item:
    post:
      operationId: CreateCustomLineItem
      description: Creates a custom line item that can be used to create a one-time fixed charge that can be applied to a single billing group for the current or previous billing period. The one-time fixed charge is either a fee or discount.
      parameters:
        - name: X-Amzn-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you specify to ensure idempotency of the request. Idempotency ensures that an API request completes no more than one time. With an idempotent request, if the original request completes successfully, any subsequent retries complete successfully without performing any further actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CustomLineItemName"
                Description:
                  $ref: "#/components/schemas/CustomLineItemDescription"
                BillingGroupArn:
                  $ref: "#/components/schemas/BillingGroupArn"
                BillingPeriodRange:
                  $ref: "#/components/schemas/CustomLineItemBillingPeriodRange"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ChargeDetails:
                  $ref: "#/components/schemas/CustomLineItemChargeDetails"
                AccountId:
                  $ref: "#/components/schemas/AccountId"
                ComputationRule:
                  $ref: "#/components/schemas/ComputationRuleEnum"
                PresentationDetails:
                  $ref: "#/components/schemas/PresentationObject"
              required:
                - BillingGroupArn
                - ChargeDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomLineItemOutput"
  /create-pricing-plan:
    post:
      operationId: CreatePricingPlan
      description: Creates a pricing plan that is used for computing Amazon Web Services charges for billing groups.
      parameters:
        - name: X-Amzn-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you specify to ensure idempotency of the request. Idempotency ensures that an API request completes no more than one time. With an idempotent request, if the original request completes successfully, any subsequent retries complete successfully without performing any further actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/PricingPlanName"
                Description:
                  $ref: "#/components/schemas/PricingPlanDescription"
                PricingRuleArns:
                  $ref: "#/components/schemas/PricingRuleArnsInput"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePricingPlanOutput"
  /create-pricing-rule:
    post:
      operationId: CreatePricingRule
      description: Creates a pricing rule can be associated to a pricing plan, or a set of pricing plans.
      parameters:
        - name: X-Amzn-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique, case-sensitive identifier that you specify to ensure idempotency of the request. Idempotency ensures that an API request completes no more than one time. With an idempotent request, if the original request completes successfully, any subsequent retries complete successfully without performing any further actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/PricingRuleName"
                Description:
                  $ref: "#/components/schemas/PricingRuleDescription"
                Scope:
                  $ref: "#/components/schemas/PricingRuleScope"
                Type:
                  $ref: "#/components/schemas/PricingRuleType"
                ModifierPercentage:
                  $ref: "#/components/schemas/ModifierPercentage"
                Service:
                  $ref: "#/components/schemas/Service"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                BillingEntity:
                  $ref: "#/components/schemas/BillingEntity"
                Tiering:
                  $ref: "#/components/schemas/CreateTieringInput"
                UsageType:
                  $ref: "#/components/schemas/UsageType"
                Operation:
                  $ref: "#/components/schemas/Operation"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePricingRuleOutput"
  /delete-billing-group:
    post:
      operationId: DeleteBillingGroup
      description: Deletes a billing group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/BillingGroupArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBillingGroupOutput"
  /delete-custom-line-item:
    post:
      operationId: DeleteCustomLineItem
      description: Deletes the custom line item identified by the given ARN in the current, or previous billing period.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/CustomLineItemArn"
                BillingPeriodRange:
                  $ref: "#/components/schemas/CustomLineItemBillingPeriodRange"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomLineItemOutput"
  /delete-pricing-plan:
    post:
      operationId: DeletePricingPlan
      description: Deletes a pricing plan. The pricing plan must not be associated with any billing groups to delete successfully.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/PricingPlanArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePricingPlanOutput"
  /delete-pricing-rule:
    post:
      operationId: DeletePricingRule
      description: Deletes the pricing rule that's identified by the input Amazon Resource Name (ARN).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/PricingRuleArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePricingRuleOutput"
  /disassociate-accounts:
    post:
      operationId: DisassociateAccounts
      description: Removes the specified list of account IDs from the given billing group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/BillingGroupArn"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
              required:
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateAccountsOutput"
  /disassociate-pricing-rules:
    put:
      operationId: DisassociatePricingRules
      description: Disassociates a list of pricing rules from a pricing plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/PricingPlanArn"
                PricingRuleArns:
                  $ref: "#/components/schemas/PricingRuleArnsNonEmptyInput"
              required:
                - PricingRuleArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociatePricingRulesOutput"
  /get-billing-group-cost-report:
    post:
      operationId: GetBillingGroupCostReport
      description: Retrieves the margin summary report, which includes the Amazon Web Services cost and charged amount (pro forma cost) by Amazon Web Services service for a specific billing group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/BillingGroupArn"
                BillingPeriodRange:
                  $ref: "#/components/schemas/BillingPeriodRange"
                GroupBy:
                  $ref: "#/components/schemas/GroupByAttributesList"
                MaxResults:
                  $ref: "#/components/schemas/MaxBillingGroupCostReportResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBillingGroupCostReportOutput"
  /list-account-associations:
    post:
      operationId: ListAccountAssociations
      description: This is a paginated call to list linked accounts that are linked to the payer account for the specified time period. If no information is provided, the current billing period is used. The response will optionally include the billing group that's associated with the linked account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                Filters:
                  $ref: "#/components/schemas/ListAccountAssociationsFilter"
                NextToken:
                  $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountAssociationsOutput"
  /list-billing-group-cost-reports:
    post:
      operationId: ListBillingGroupCostReports
      description: A paginated call to retrieve a summary report of actual Amazon Web Services charges and the calculated Amazon Web Services charges based on the associated pricing plan of a billing group.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                MaxResults:
                  $ref: "#/components/schemas/MaxBillingGroupResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
                Filters:
                  $ref: "#/components/schemas/ListBillingGroupCostReportsFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBillingGroupCostReportsOutput"
  /list-billing-groups:
    post:
      operationId: ListBillingGroups
      description: A paginated call to retrieve a list of billing groups for the given billing period. If you don't provide a billing group, the current billing period is used.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                MaxResults:
                  $ref: "#/components/schemas/MaxBillingGroupResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
                Filters:
                  $ref: "#/components/schemas/ListBillingGroupsFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBillingGroupsOutput"
  /list-custom-line-item-versions:
    post:
      operationId: ListCustomLineItemVersions
      description: A paginated call to get a list of all custom line item versions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/CustomLineItemArn"
                MaxResults:
                  $ref: "#/components/schemas/MaxCustomLineItemResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
                Filters:
                  $ref: "#/components/schemas/ListCustomLineItemVersionsFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomLineItemVersionsOutput"
  /list-custom-line-items:
    post:
      operationId: ListCustomLineItems
      description: A paginated call to get a list of all custom line items (FFLIs) for the given billing period. If you don't provide a billing period, the current billing period is used.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                MaxResults:
                  $ref: "#/components/schemas/MaxCustomLineItemResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
                Filters:
                  $ref: "#/components/schemas/ListCustomLineItemsFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomLineItemsOutput"
  /list-pricing-plans:
    post:
      operationId: ListPricingPlans
      description: A paginated call to get pricing plans for the given billing period. If you don't provide a billing period, the current billing period is used.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                Filters:
                  $ref: "#/components/schemas/ListPricingPlansFilter"
                MaxResults:
                  $ref: "#/components/schemas/MaxPricingPlanResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPricingPlansOutput"
  /list-pricing-plans-associated-with-pricing-rule:
    post:
      operationId: ListPricingPlansAssociatedWithPricingRule
      description: A list of the pricing plans that are associated with a pricing rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                PricingRuleArn:
                  $ref: "#/components/schemas/PricingRuleArn"
                MaxResults:
                  $ref: "#/components/schemas/MaxPricingRuleResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - PricingRuleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPricingPlansAssociatedWithPricingRuleOutputDisplay"
  /list-pricing-rules:
    post:
      operationId: ListPricingRules
      description: Describes a pricing rule that can be associated to a pricing plan, or set of pricing plans.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                Filters:
                  $ref: "#/components/schemas/ListPricingRulesFilter"
                MaxResults:
                  $ref: "#/components/schemas/MaxPricingRuleResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPricingRulesOutput"
  /list-pricing-rules-associated-to-pricing-plan:
    post:
      operationId: ListPricingRulesAssociatedToPricingPlan
      description: Lists the pricing rules that are associated with a pricing plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                PricingPlanArn:
                  $ref: "#/components/schemas/PricingPlanArn"
                MaxResults:
                  $ref: "#/components/schemas/MaxPricingPlanResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
              required:
                - PricingPlanArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPricingRulesAssociatedToPricingPlanOutputDisplay"
  /list-resources-associated-to-custom-line-item:
    post:
      operationId: ListResourcesAssociatedToCustomLineItem
      description: List the resources that are associated to a custom line item.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                BillingPeriod:
                  $ref: "#/components/schemas/BillingPeriod"
                Arn:
                  $ref: "#/components/schemas/CustomLineItemArn"
                MaxResults:
                  $ref: "#/components/schemas/MaxCustomLineItemResults"
                NextToken:
                  $ref: "#/components/schemas/Token"
                Filters:
                  $ref: "#/components/schemas/ListResourcesAssociatedToCustomLineItemFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcesAssociatedToCustomLineItemOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: A list the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that identifies the resource to list the tags.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Associates the specified tags to a resource with the specified resourceArn. If existing tags on a resource are not specified in the request parameters, they are not changed.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource to which to add tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Deletes specified tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource to which to delete tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tags to delete from the resource as a list of key-value pairs.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /update-billing-group:
    post:
      operationId: UpdateBillingGroup
      description: This updates an existing billing group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/BillingGroupArn"
                Name:
                  $ref: "#/components/schemas/BillingGroupName"
                Status:
                  $ref: "#/components/schemas/BillingGroupStatus"
                ComputationPreference:
                  $ref: "#/components/schemas/ComputationPreference"
                Description:
                  $ref: "#/components/schemas/BillingGroupDescription"
                AccountGrouping:
                  $ref: "#/components/schemas/UpdateBillingGroupAccountGrouping"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBillingGroupOutput"
  /update-custom-line-item:
    post:
      operationId: UpdateCustomLineItem
      description: Update an existing custom line item in the current or previous billing period.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/CustomLineItemArn"
                Name:
                  $ref: "#/components/schemas/CustomLineItemName"
                Description:
                  $ref: "#/components/schemas/CustomLineItemDescription"
                ChargeDetails:
                  $ref: "#/components/schemas/UpdateCustomLineItemChargeDetails"
                BillingPeriodRange:
                  $ref: "#/components/schemas/CustomLineItemBillingPeriodRange"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCustomLineItemOutput"
  /update-pricing-plan:
    put:
      operationId: UpdatePricingPlan
      description: This updates an existing pricing plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/PricingPlanArn"
                Name:
                  $ref: "#/components/schemas/PricingPlanName"
                Description:
                  $ref: "#/components/schemas/PricingPlanDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePricingPlanOutput"
  /update-pricing-rule:
    put:
      operationId: UpdatePricingRule
      description: Updates an existing pricing rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/PricingRuleArn"
                Name:
                  $ref: "#/components/schemas/PricingRuleName"
                Description:
                  $ref: "#/components/schemas/PricingRuleDescription"
                Type:
                  $ref: "#/components/schemas/PricingRuleType"
                ModifierPercentage:
                  $ref: "#/components/schemas/ModifierPercentage"
                Tiering:
                  $ref: "#/components/schemas/UpdateTieringInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePricingRuleOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BillingGroupArn:
      type: string
      pattern: (arn:aws(-cn)?:billingconductor::[0-9]{12}:billinggroup/)?[a-zA-Z0-9]{10,12}
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    AssociateAccountsOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Amazon Resource Name (ARN) of the billing group that associates the array of account IDs.
    PricingPlanArn:
      type: string
      pattern: (arn:aws(-cn)?:billingconductor::(aws|[0-9]{12}):pricingplan/)?(BasicPricingPlan|Passthrough|[a-zA-Z0-9]{10})
    PricingRuleArnsNonEmptyInput:
      type: array
      items:
        $ref: "#/components/schemas/PricingRuleArn"
    PricingRuleArn:
      type: string
      pattern: (arn:aws(-cn)?:billingconductor::[0-9]{12}:pricingrule/)?[a-zA-Z0-9]{10}
    AssociatePricingRulesOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingPlanArn"
          description: The PricingPlanArn that the PricingRuleArns are associated with.
    CustomLineItemArn:
      type: string
      pattern: (arn:aws(-cn)?:billingconductor::[0-9]{12}:customlineitem/)?[a-zA-Z0-9]{10}
    CustomLineItemBatchAssociationsList:
      type: array
      items:
        $ref: "#/components/schemas/CustomLineItemAssociationElement"
    CustomLineItemAssociationElement:
      type: string
      pattern: (arn:aws(-cn)?:billingconductor::[0-9]{12}:(customlineitem|billinggroup)/)?[a-zA-Z0-9]{10,12}
    CustomLineItemBillingPeriodRange:
      description: The billing period range in which the custom line item request will be applied.
      type: object
      properties:
        InclusiveStartBillingPeriod:
          $ref: "#/components/schemas/BillingPeriod"
          description: The inclusive start billing period that defines a billing period range where a custom line is applied.
        ExclusiveEndBillingPeriod:
          $ref: "#/components/schemas/BillingPeriod"
          description: The inclusive end billing period that defines a billing period range where a custom line is applied.
      required:
        - InclusiveStartBillingPeriod
    BillingPeriod:
      type: string
      pattern: \d{4}-(0?[1-9]|1[012])
    BatchAssociateResourcesToCustomLineItemOutput:
      type: object
      properties:
        SuccessfullyAssociatedResources:
          $ref: "#/components/schemas/AssociateResourcesResponseList"
          description: A list of AssociateResourceResponseElement for each resource that's been associated to a percentage custom line item successfully.
        FailedAssociatedResources:
          $ref: "#/components/schemas/AssociateResourcesResponseList"
          description: A list of AssociateResourceResponseElement for each resource that failed association to a percentage custom line item.
    AssociateResourcesResponseList:
      type: array
      items:
        $ref: "#/components/schemas/AssociateResourceResponseElement"
    AssociateResourceResponseElement:
      description: A resource association result for a percentage custom line item.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/CustomLineItemAssociationElement"
          description: The resource ARN that was associated to the custom line item.
        Error:
          $ref: "#/components/schemas/AssociateResourceError"
          description: An AssociateResourceError that will populate if the resource association fails.
    AssociateResourceError:
      description: A representation of a resource association error.
      type: object
      properties:
        Message:
          $ref: "#/components/schemas/String"
          description: The reason why the resource association failed.
        Reason:
          $ref: "#/components/schemas/AssociateResourceErrorReason"
          description: A static error code that's used to classify the type of failure.
    String:
      type: string
    AssociateResourceErrorReason:
      type: string
      enum:
        - INVALID_ARN
        - SERVICE_LIMIT_EXCEEDED
        - ILLEGAL_CUSTOMLINEITEM
        - INTERNAL_SERVER_EXCEPTION
        - INVALID_BILLING_PERIOD_RANGE
    CustomLineItemBatchDisassociationsList:
      type: array
      items:
        $ref: "#/components/schemas/CustomLineItemAssociationElement"
    BatchDisassociateResourcesFromCustomLineItemOutput:
      type: object
      properties:
        SuccessfullyDisassociatedResources:
          $ref: "#/components/schemas/DisassociateResourcesResponseList"
          description: A list of DisassociateResourceResponseElement for each resource that's been disassociated from a percentage custom line item successfully.
        FailedDisassociatedResources:
          $ref: "#/components/schemas/DisassociateResourcesResponseList"
          description: A list of DisassociateResourceResponseElement for each resource that failed disassociation from a percentage custom line item.
    DisassociateResourcesResponseList:
      type: array
      items:
        $ref: "#/components/schemas/DisassociateResourceResponseElement"
    DisassociateResourceResponseElement:
      description: A resource disassociation result for a percentage custom line item.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/CustomLineItemAssociationElement"
          description: The resource ARN that was disassociated from the custom line item.
        Error:
          $ref: "#/components/schemas/AssociateResourceError"
          description: An AssociateResourceError that's shown if the resource disassociation fails.
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-]+"
    BillingGroupName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_\\+=\\.\\-@]+"
    AccountGrouping:
      description: The set of accounts that will be under the billing group. The set of accounts resemble the linked accounts in a consolidated billing family.
      type: object
      properties:
        LinkedAccountIds:
          $ref: "#/components/schemas/AccountIdList"
          description: The account IDs that make up the billing group. Account IDs must be a part of the consolidated billing family, and not associated with another billing group.
        AutoAssociate:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if this billing group will automatically associate newly added Amazon Web Services accounts that join your consolidated billing family.
        ResponsibilityTransferArn:
          $ref: "#/components/schemas/ResponsibilityTransferArn"
          description: The Amazon Resource Name (ARN) that identifies the transfer relationship owned by the Bill Transfer account (caller account). When specified, the PrimaryAccountId is no longer required.
    Boolean:
      type: boolean
    ResponsibilityTransferArn:
      type: string
      pattern: arn:[a-z0-9][a-z0-9-.]{0,62}:organizations::\d{12}:transfer/o-[a-z0-9]{10,32}/(billing)/(inbound|outbound)/rt-[0-9a-z]{8,32}
    ComputationPreference:
      description: The preferences and settings that will be used to compute the Amazon Web Services charges for a billing group.
      type: object
      properties:
        PricingPlanArn:
          $ref: "#/components/schemas/PricingPlanFullArn"
          description: The Amazon Resource Name (ARN) of the pricing plan that's used to compute the Amazon Web Services charges for a billing group.
      required:
        - PricingPlanArn
    PricingPlanFullArn:
      type: string
      pattern: arn:aws(-cn)?:billingconductor::(aws|[0-9]{12}):pricingplan/(BasicPricingPlan|Passthrough|[a-zA-Z0-9]{10})
    BillingGroupDescription:
      type: string
      minLength: 0
      maxLength: 1024
    TagMap:
      type: object
      properties: {}
    CreateBillingGroupOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Amazon Resource Name (ARN) of the created billing group.
    CustomLineItemName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_\\+=\\.\\-@]+"
    CustomLineItemDescription:
      type: string
      minLength: 1
      maxLength: 255
    CustomLineItemChargeDetails:
      description: The charge details of a custom line item. It should contain only one of Flat or Percentage.
      type: object
      properties:
        Flat:
          $ref: "#/components/schemas/CustomLineItemFlatChargeDetails"
          description: A CustomLineItemFlatChargeDetails that describes the charge details of a flat custom line item.
        Percentage:
          $ref: "#/components/schemas/CustomLineItemPercentageChargeDetails"
          description: A CustomLineItemPercentageChargeDetails that describes the charge details of a percentage custom line item.
        Type:
          $ref: "#/components/schemas/CustomLineItemType"
          description: The type of the custom line item that indicates whether the charge is a fee or credit.
        LineItemFilters:
          $ref: "#/components/schemas/LineItemFiltersList"
          description: A representation of the line item filter.
      required:
        - Type
    CustomLineItemFlatChargeDetails:
      description: A representation of the charge details that are associated with a flat custom line item.
      type: object
      properties:
        ChargeValue:
          $ref: "#/components/schemas/CustomLineItemChargeValue"
          description: The custom line item's fixed charge value in USD.
      required:
        - ChargeValue
    CustomLineItemChargeValue:
      type: number
      format: double
      minimum: 0
      maximum: 1000000
    CustomLineItemPercentageChargeDetails:
      description: A representation of the charge details that are associated with a percentage custom line item.
      type: object
      properties:
        PercentageValue:
          $ref: "#/components/schemas/CustomLineItemPercentageChargeValue"
          description: The custom line item's percentage value. This will be multiplied against the combined value of its associated resources to determine its charge value.
        AssociatedValues:
          $ref: "#/components/schemas/CustomLineItemAssociationsList"
          description: A list of resource ARNs to associate to the percentage custom line item.
      required:
        - PercentageValue
    CustomLineItemPercentageChargeValue:
      type: number
      format: double
      minimum: 0
      maximum: 10000
    CustomLineItemAssociationsList:
      type: array
      items:
        $ref: "#/components/schemas/CustomLineItemAssociationElement"
    CustomLineItemType:
      type: string
      enum:
        - CREDIT
        - FEE
    LineItemFiltersList:
      type: array
      items:
        $ref: "#/components/schemas/LineItemFilter"
    LineItemFilter:
      description: A representation of the line item filter for your custom line item. You can use line item filters to include or exclude specific resource values from the billing group's total cost. For example, if you create a custom line item and you want to filter out a value, such as Savings Plans discounts, you can update LineItemFilter to exclude it.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/LineItemFilterAttributeName"
          description: The attribute of the line item filter. This specifies what attribute that you can filter on.
        MatchOption:
          $ref: "#/components/schemas/MatchOption"
          description: The match criteria of the line item filter. This parameter specifies whether not to include the resource value from the billing group total cost.
        Values:
          $ref: "#/components/schemas/LineItemFilterValuesList"
          description: The values of the line item filter. This specifies the values to filter on. Currently, you can only exclude Savings Plans discounts.
        AttributeValues:
          $ref: "#/components/schemas/AttributeValueList"
          description: The values of the line item filter. This specifies the values to filter on.
      required:
        - Attribute
        - MatchOption
    LineItemFilterAttributeName:
      type: string
      enum:
        - LINE_ITEM_TYPE
        - SERVICE
    MatchOption:
      type: string
      enum:
        - NOT_EQUAL
        - EQUAL
    LineItemFilterValuesList:
      type: array
      items:
        $ref: "#/components/schemas/LineItemFilterValue"
    LineItemFilterValue:
      type: string
      enum:
        - SAVINGS_PLAN_NEGATION
    AttributeValueList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeValue"
    AttributeValue:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9]+"
    ComputationRuleEnum:
      description: The display settings of the custom line item
      type: string
      enum:
        - ITEMIZED
        - CONSOLIDATED
    PresentationObject:
      description: An object that defines how custom line item charges are presented in the bill, containing specifications for service presentation.
      type: object
      properties:
        Service:
          $ref: "#/components/schemas/Service"
          description: The service under which the custom line item charges will be presented. Must be a string between 1 and 128 characters matching the pattern "^[a-zA-Z0-9]+$".
      required:
        - Service
    Service:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9]+"
    CreateCustomLineItemOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/CustomLineItemArn"
          description: The Amazon Resource Name (ARN) of the created custom line item.
    PricingPlanName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_\\+=\\.\\-@]+"
    PricingPlanDescription:
      type: string
      minLength: 0
      maxLength: 1024
    PricingRuleArnsInput:
      type: array
      items:
        $ref: "#/components/schemas/PricingRuleArn"
    CreatePricingPlanOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingPlanArn"
          description: The Amazon Resource Name (ARN) of the created pricing plan.
    PricingRuleName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_\\+=\\.\\-@]+"
    PricingRuleDescription:
      type: string
      minLength: 0
      maxLength: 1024
    PricingRuleScope:
      type: string
      enum:
        - GLOBAL
        - SERVICE
        - BILLING_ENTITY
        - SKU
    PricingRuleType:
      type: string
      enum:
        - MARKUP
        - DISCOUNT
        - TIERING
    ModifierPercentage:
      type: number
      format: double
      minimum: 0
    BillingEntity:
      type: string
      pattern: "[a-zA-Z0-9() ]+"
    CreateTieringInput:
      description: The set of tiering configurations for the pricing rule.
      type: object
      properties:
        FreeTier:
          $ref: "#/components/schemas/CreateFreeTierConfig"
          description: The possible Amazon Web Services Free Tier configurations.
      required:
        - FreeTier
    CreateFreeTierConfig:
      description: The possible Amazon Web Services Free Tier configurations.
      type: object
      properties:
        Activated:
          $ref: "#/components/schemas/TieringActivated"
          description: Activate or deactivate Amazon Web Services Free Tier.
      required:
        - Activated
    TieringActivated:
      type: boolean
    UsageType:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \S+
    Operation:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \S+
    CreatePricingRuleOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingRuleArn"
          description: The Amazon Resource Name (ARN) of the created pricing rule.
    DeleteBillingGroupOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Amazon Resource Name (ARN) of the deleted billing group.
    DeleteCustomLineItemOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/CustomLineItemArn"
          description: The ARN of the deleted custom line item.
    DeletePricingPlanOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingPlanArn"
          description: The Amazon Resource Name (ARN) of the deleted pricing plan.
    DeletePricingRuleOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingRuleArn"
          description: The Amazon Resource Name (ARN) of the deleted pricing rule.
    DisassociateAccountsOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Amazon Resource Name (ARN) of the billing group that the array of account IDs is disassociated from.
    DisassociatePricingRulesOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingPlanArn"
          description: The Amazon Resource Name (ARN) of the pricing plan that the pricing rules successfully disassociated from.
    BillingPeriodRange:
      description: A time range for which the margin summary is effective. The time range can be up to 12 months.
      type: object
      properties:
        InclusiveStartBillingPeriod:
          $ref: "#/components/schemas/BillingPeriod"
          description: The inclusive start billing period that defines a billing period range for the margin summary.
        ExclusiveEndBillingPeriod:
          $ref: "#/components/schemas/BillingPeriod"
          description: The exclusive end billing period that defines a billing period range for the margin summary. For example, if you choose a billing period that starts in October 2023 and ends in December 2023, the margin summary will only include data from October 2023 and November 2023.
      required:
        - InclusiveStartBillingPeriod
        - ExclusiveEndBillingPeriod
    GroupByAttributesList:
      type: array
      items:
        $ref: "#/components/schemas/GroupByAttributeName"
    GroupByAttributeName:
      type: string
      enum:
        - PRODUCT_NAME
        - BILLING_PERIOD
    MaxBillingGroupCostReportResults:
      type: integer
      minimum: 200
      maximum: 300
    Token:
      type: string
    GetBillingGroupCostReportOutput:
      type: object
      properties:
        BillingGroupCostReportResults:
          $ref: "#/components/schemas/BillingGroupCostReportResultsList"
          description: The list of margin summary reports.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: The pagination token used on subsequent calls to get reports.
    BillingGroupCostReportResultsList:
      type: array
      items:
        $ref: "#/components/schemas/BillingGroupCostReportResultElement"
    BillingGroupCostReportResultElement:
      description: A paginated call to retrieve a list of summary reports of actual Amazon Web Services charges and the calculated Amazon Web Services charges, broken down by attributes.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Amazon Resource Number (ARN) that uniquely identifies the billing group.
        AWSCost:
          $ref: "#/components/schemas/AWSCost"
          description: The actual Amazon Web Services charges for the billing group.
        ProformaCost:
          $ref: "#/components/schemas/ProformaCost"
          description: The hypothetical Amazon Web Services charges based on the associated pricing plan of a billing group.
        Margin:
          $ref: "#/components/schemas/Margin"
          description: The billing group margin.
        MarginPercentage:
          $ref: "#/components/schemas/MarginPercentage"
          description: The percentage of the billing group margin.
        Currency:
          $ref: "#/components/schemas/Currency"
          description: The displayed currency.
        Attributes:
          $ref: "#/components/schemas/AttributesList"
          description: The list of key-value pairs that represent the attributes by which the BillingGroupCostReportResults are grouped. For example, if you want the Amazon S3 service-level breakdown of a billing group for November 2023, the attributes list will contain a key-value pair of "PRODUCT_NAME" and "S3" and a key-value pair of "BILLING_PERIOD" and "Nov 2023".
    AWSCost:
      type: string
    ProformaCost:
      type: string
    Margin:
      type: string
    MarginPercentage:
      type: string
    Currency:
      type: string
    AttributesList:
      type: array
      items:
        $ref: "#/components/schemas/Attribute"
    Attribute:
      description: The key-value pair that represents the attribute by which the BillingGroupCostReportResults are grouped. For example, if you want a service-level breakdown for Amazon Simple Storage Service (Amazon S3) of the billing group, the attribute will be a key-value pair of "PRODUCT_NAME" and "S3".
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: The key in a key-value pair that describes the margin summary.
        Value:
          $ref: "#/components/schemas/String"
          description: The value in a key-value pair that describes the margin summary.
    ListAccountAssociationsFilter:
      description: "The filter on the account ID of the linked account, or any of the following: MONITORED: linked accounts that are associated to billing groups. UNMONITORED: linked accounts that are not associated to billing groups. Billing Group Arn: linked accounts that are associated to the provided Billing Group Arn."
      type: object
      properties:
        Association:
          $ref: "#/components/schemas/Association"
          description: "MONITORED: linked accounts that are associated to billing groups. UNMONITORED: linked accounts that are not associated to billing groups. Billing Group Arn: linked accounts that are associated to the provided Billing Group Arn."
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID to filter on.
        AccountIds:
          $ref: "#/components/schemas/AccountIdFilterList"
          description: The list of Amazon Web Services IDs to retrieve their associated billing group for a given time range.
    Association:
      type: string
      pattern: ((arn:aws(-cn)?:billingconductor::[0-9]{12}:billinggroup/)?[a-zA-Z0-9]{10,12}|MONITORED|UNMONITORED)
    AccountIdFilterList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    ListAccountAssociationsOutput:
      type: object
      properties:
        LinkedAccounts:
          $ref: "#/components/schemas/AccountAssociationsList"
          description: The list of linked accounts in the payer account.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: The pagination token that's used on subsequent calls to get accounts.
    AccountAssociationsList:
      type: array
      items:
        $ref: "#/components/schemas/AccountAssociationsListElement"
    AccountAssociationsListElement:
      description: A representation of a linked account.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The associating array of account IDs.
        BillingGroupArn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Billing Group Arn that the linked account is associated to.
        AccountName:
          $ref: "#/components/schemas/AccountName"
          description: The Amazon Web Services account name.
        AccountEmail:
          $ref: "#/components/schemas/AccountEmail"
          description: The Amazon Web Services account email.
    AccountName:
      type: string
    AccountEmail:
      type: string
    MaxBillingGroupResults:
      type: integer
      minimum: 1
      maximum: 100
    ListBillingGroupCostReportsFilter:
      description: The filter used to retrieve specific BillingGroupCostReportElements.
      type: object
      properties:
        BillingGroupArns:
          $ref: "#/components/schemas/BillingGroupArnList"
          description: The list of Amazon Resource Names (ARNs) used to filter billing groups to retrieve reports.
    BillingGroupArnList:
      type: array
      items:
        $ref: "#/components/schemas/BillingGroupArn"
    ListBillingGroupCostReportsOutput:
      type: object
      properties:
        BillingGroupCostReports:
          $ref: "#/components/schemas/BillingGroupCostReportList"
          description: A list of BillingGroupCostReportElement retrieved.
        NextToken:
          $ref: "#/components/schemas/Token"
          description: The pagination token that's used on subsequent calls to get reports.
    BillingGroupCostReportList:
      type: array
      items:
        $ref: "#/components/schemas/BillingGroupCostReportElement"
    BillingGroupCostReportElement:
      description: A summary report of actual Amazon Web Services charges and calculated Amazon Web Services charges, based on the associated pricing plan of a billing group.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/BillingGroupArn"
          description: The Amazon Resource Name (ARN) of a billing group.
        AWSCost:
          $ref: "#/components/schemas/AWSCost"
          description: The actual Amazon Web Services charges for the billing group.
        ProformaCost:
          $ref: "#/components/schemas/ProformaCost"
          description: The hypothetical Amazon Web Services charges based on the associated pricing plan of a billing group.
        Margin:
          $ref: "#/components/schemas/Margin"
          description: The billing group margin.
        MarginPercentage:
          $ref: "#/components/schemas/MarginPercentage"
          description: The percentage of billing group margin.
        Currency:
          $ref: "#/components/schemas/Currency"
          description: The displayed currency.
    ListBillingGroupsFilter:
      description: The filter that specifies the billing groups and pricing plans to retrieve billing group information.
      type: object
      properties:
        Arns:
          $ref: "#/components/schemas/BillingGroupArnList"
