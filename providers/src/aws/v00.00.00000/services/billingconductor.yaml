      required:
        - PercentageValue
    UpdateCustomLineItemOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/CustomLineItemArn"
          description: The ARN of the successfully updated custom line item.
        BillingGroupArn:
          $ref: "#/components/schemas/BillingGroupFullArn"
          description: The ARN of the billing group that the custom line item is applied to.
        Name:
          $ref: "#/components/schemas/CustomLineItemName"
          description: The name of the successfully updated custom line item.
        Description:
          $ref: "#/components/schemas/CustomLineItemDescription"
          description: The description of the successfully updated custom line item.
        ChargeDetails:
          $ref: "#/components/schemas/ListCustomLineItemChargeDetails"
          description: A ListCustomLineItemChargeDetails containing the charge details of the successfully updated custom line item.
        LastModifiedTime:
          $ref: "#/components/schemas/Instant"
          description: The most recent time when the custom line item was modified.
        AssociationSize:
          $ref: "#/components/schemas/NumberOfAssociations"
          description: The number of resources that are associated to the custom line item.
    BillingGroupFullArn:
      type: string
      pattern: arn:aws(-cn)?:billingconductor::[0-9]{12}:billinggroup/[a-zA-Z0-9]{10,12}
    UpdatePricingPlanOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingPlanArn"
          description: The Amazon Resource Name (ARN) of the updated pricing plan.
        Name:
          $ref: "#/components/schemas/PricingPlanName"
          description: The name of the pricing plan. The name must be unique to each pricing plan.
        Description:
          $ref: "#/components/schemas/PricingPlanDescription"
          description: The new description for the pricing rule.
        Size:
          $ref: "#/components/schemas/NumberOfAssociatedPricingRules"
          description: The pricing rules count that's currently associated with this pricing plan list.
        LastModifiedTime:
          $ref: "#/components/schemas/Instant"
          description: The most recent time when the pricing plan was modified.
    UpdateTieringInput:
      description: The set of tiering configurations for the pricing rule.
      type: object
      properties:
        FreeTier:
          $ref: "#/components/schemas/UpdateFreeTierConfig"
          description: The possible Amazon Web Services Free Tier configurations.
      required:
        - FreeTier
    UpdateFreeTierConfig:
      description: The possible Amazon Web Services Free Tier configurations.
      type: object
      properties:
        Activated:
          $ref: "#/components/schemas/TieringActivated"
          description: Activate or deactivate application of Amazon Web Services Free Tier.
      required:
        - Activated
    UpdatePricingRuleOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/PricingRuleArn"
          description: The Amazon Resource Name (ARN) of the successfully updated pricing rule.
        Name:
          $ref: "#/components/schemas/PricingRuleName"
          description: The new name of the pricing rule. The name must be unique to each pricing rule.
        Description:
          $ref: "#/components/schemas/PricingRuleDescription"
          description: The new description for the pricing rule.
        Scope:
          $ref: "#/components/schemas/PricingRuleScope"
          description: The scope of pricing rule that indicates if it's globally applicable, or it's service-specific.
        Type:
          $ref: "#/components/schemas/PricingRuleType"
          description: The new pricing rule type.
        ModifierPercentage:
          $ref: "#/components/schemas/ModifierPercentage"
          description: The new modifier to show pricing plan rates as a percentage.
        Service:
          $ref: "#/components/schemas/Service"
          description: If the Scope attribute is set to SERVICE, the attribute indicates which service the PricingRule is applicable for.
        AssociatedPricingPlanCount:
          $ref: "#/components/schemas/NumberOfPricingPlansAssociatedWith"
          description: The pricing plans count that this pricing rule is associated with.
        LastModifiedTime:
          $ref: "#/components/schemas/Instant"
          description: The most recent time the pricing rule was modified.
        BillingEntity:
          $ref: "#/components/schemas/BillingEntity"
          description: The seller of services provided by Amazon Web Services, their affiliates, or third-party providers selling services via Amazon Web Services Marketplace.
        Tiering:
          $ref: "#/components/schemas/UpdateTieringInput"
          description: The set of tiering configurations for the pricing rule.
        UsageType:
          $ref: "#/components/schemas/UsageType"
          description: Usage type is the unit that each service uses to measure the usage of a specific type of resource. If the Scope attribute is set to SKU, this attribute indicates which usage type the PricingRule is modifying. For example, USW2-BoxUsage:m2.2xlarge describes an M2 High Memory Double Extra Large instance in the US West (Oregon) Region.
        Operation:
          $ref: "#/components/schemas/Operation"
          description: Operation refers to the specific Amazon Web Services covered by this line item. This describes the specific usage of the line item. If the Scope attribute is set to SKU, this attribute indicates which operation the PricingRule is modifying. For example, a value of RunInstances:0202 indicates the operation of running an Amazon EC2 instance.
