      maxLength: 1024
      pattern: .*
    PartialMatches:
      type: array
      items:
        $ref: "#/components/schemas/PartialMatch"
    PartialMatch:
      description: The reference rule that partially matches the ViolationTarget rule and violation reason.
      type: object
      properties:
        Reference:
          $ref: "#/components/schemas/ReferenceRule"
          description: The reference rule from the primary security group of the Firewall Manager policy.
        TargetViolationReasons:
          $ref: "#/components/schemas/TargetViolationReasons"
          description: The violation reason.
    ReferenceRule:
      type: string
    TargetViolationReasons:
      type: array
      items:
        $ref: "#/components/schemas/TargetViolationReason"
    TargetViolationReason:
      type: string
      minLength: 0
      maxLength: 256
      pattern: \w+
    SecurityGroupRemediationActions:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupRemediationAction"
    SecurityGroupRemediationAction:
      description: Remediation option for the rule specified in the ViolationTarget.
