openapi: 3.0.0
info:
  version: "2018-01-01"
  title: Firewall Management Service
  description: Firewall Management Service
  x-serviceName: fms
  x-serviceAlias: fms
  x-protocol: json
  x-apiVersion: "2018-01-01"
  x-endpointPrefix: fms
  x-targetPrefix: AWSFMS_20180101
  x-jsonVersion: "1.1"
servers:
  - url: https://fms.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for fms
paths:
  /AssociateAdminAccount:
    post:
      operationId: AssociateAdminAccount
      description: Sets a Firewall Manager default administrator account. The Firewall Manager default administrator account can manage third-party firewalls and has full administrative scope that allows administration of all policy types, accounts, organizational units, and Regions. This account must be a member account of the organization in Organizations whose resources you want to protect. For information about working with Firewall Manager administrator accounts, see Managing Firewall Manager administrators in the Firewall Manager Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.AssociateAdminAccount
            default: AWSFMS_20180101.AssociateAdminAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdminAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The Amazon Web Services account ID to associate with Firewall Manager as the Firewall Manager default administrator account. This account must be a member account of the organization in Organizations whose resources you want to protect. For more information about Organizations, see Managing the Amazon Web Services Accounts in Your Organization.
              required:
                - AdminAccount
      responses:
        "200":
          description: Success
  /AssociateThirdPartyFirewall:
    post:
      operationId: AssociateThirdPartyFirewall
      description: Sets the Firewall Manager policy administrator as a tenant administrator of a third-party firewall service. A tenant is an instance of the third-party firewall service that's associated with your Amazon Web Services customer account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.AssociateThirdPartyFirewall
            default: AWSFMS_20180101.AssociateThirdPartyFirewall
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ThirdPartyFirewall:
                  $ref: "#/components/schemas/ThirdPartyFirewall"
                  description: The name of the third-party firewall vendor.
              required:
                - ThirdPartyFirewall
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateThirdPartyFirewallResponse"
  /BatchAssociateResource:
    post:
      operationId: BatchAssociateResource
      description: Associate resources to a Firewall Manager resource set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.BatchAssociateResource
            default: AWSFMS_20180101.BatchAssociateResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceSetIdentifier:
                  $ref: "#/components/schemas/Identifier"
                  description: A unique identifier for the resource set, used in a request to refer to the resource set.
                Items:
                  $ref: "#/components/schemas/IdentifierList"
                  description: The uniform resource identifiers (URIs) of resources that should be associated to the resource set. The URIs must be Amazon Resource Names (ARNs).
              required:
                - ResourceSetIdentifier
                - Items
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateResourceResponse"
  /BatchDisassociateResource:
    post:
      operationId: BatchDisassociateResource
      description: Disassociates resources from a Firewall Manager resource set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.BatchDisassociateResource
            default: AWSFMS_20180101.BatchDisassociateResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceSetIdentifier:
                  $ref: "#/components/schemas/Identifier"
                  description: A unique identifier for the resource set, used in a request to refer to the resource set.
                Items:
                  $ref: "#/components/schemas/IdentifierList"
                  description: The uniform resource identifiers (URI) of resources that should be disassociated from the resource set. The URIs must be Amazon Resource Names (ARNs).
              required:
                - ResourceSetIdentifier
                - Items
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateResourceResponse"
  /DeleteAppsList:
    post:
      operationId: DeleteAppsList
      description: Permanently deletes an Firewall Manager applications list.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DeleteAppsList
            default: AWSFMS_20180101.DeleteAppsList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ListId:
                  $ref: "#/components/schemas/ListId"
                  description: The ID of the applications list that you want to delete. You can retrieve this ID from PutAppsList, ListAppsLists, and GetAppsList.
              required:
                - ListId
      responses:
        "200":
          description: Success
  /DeleteNotificationChannel:
    post:
      operationId: DeleteNotificationChannel
      description: Deletes an Firewall Manager association with the IAM role and the Amazon Simple Notification Service (SNS) topic that is used to record Firewall Manager SNS logs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DeleteNotificationChannel
            default: AWSFMS_20180101.DeleteNotificationChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
  /DeletePolicy:
    post:
      operationId: DeletePolicy
      description: Permanently deletes an Firewall Manager policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DeletePolicy
            default: AWSFMS_20180101.DeletePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PolicyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: The ID of the policy that you want to delete. You can retrieve this ID from PutPolicy and ListPolicies.
                DeleteAllPolicyResources:
                  $ref: "#/components/schemas/Boolean"
                  description: "If True, the request performs cleanup according to the policy type. For WAF and Shield Advanced policies, the cleanup does the following: Deletes rule groups created by Firewall Manager Removes web ACLs from in-scope resources Deletes web ACLs that contain no rules or rule groups For security group policies, the cleanup does the following for each security group in the policy: Disassociates the security group from in-scope resources Deletes the security group if it was created through Firewall Manager and if it's no longer associated with any resources through another policy For security group common policies, even if set to False, Firewall Manager deletes all security groups created by Firewall Manager that aren't associated with any other resources through another policy. After the cleanup, in-scope resources are no longer protected by web ACLs in this policy. Protection of out-of-scope resources remains unchanged. Scope is determined by tags that you create and accounts that you associate with the policy. When creating the policy, if you specify that only resources in specific accounts or with specific tags are in scope of the policy, those accounts and resources are handled by the policy. All others are out of scope. If you don't specify tags or accounts, all resources are in scope."
              required:
                - PolicyId
      responses:
        "200":
          description: Success
  /DeleteProtocolsList:
    post:
      operationId: DeleteProtocolsList
      description: Permanently deletes an Firewall Manager protocols list.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DeleteProtocolsList
            default: AWSFMS_20180101.DeleteProtocolsList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ListId:
                  $ref: "#/components/schemas/ListId"
                  description: The ID of the protocols list that you want to delete. You can retrieve this ID from PutProtocolsList, ListProtocolsLists, and GetProtocolsLost.
              required:
                - ListId
      responses:
        "200":
          description: Success
  /DeleteResourceSet:
    post:
      operationId: DeleteResourceSet
      description: Deletes the specified ResourceSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DeleteResourceSet
            default: AWSFMS_20180101.DeleteResourceSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/Base62Id"
                  description: A unique identifier for the resource set, used in a request to refer to the resource set.
              required:
                - Identifier
      responses:
        "200":
          description: Success
  /DisassociateAdminAccount:
    post:
      operationId: DisassociateAdminAccount
      description: Disassociates an Firewall Manager administrator account. To set a different account as an Firewall Manager administrator, submit a PutAdminAccount request. To set an account as a default administrator account, you must submit an AssociateAdminAccount request. Disassociation of the default administrator account follows the first in, last out principle. If you are the default administrator, all Firewall Manager administrators within the organization must first disassociate their accounts before you can disassociate your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DisassociateAdminAccount
            default: AWSFMS_20180101.DisassociateAdminAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
  /DisassociateThirdPartyFirewall:
    post:
      operationId: DisassociateThirdPartyFirewall
      description: Disassociates a Firewall Manager policy administrator from a third-party firewall tenant. When you call DisassociateThirdPartyFirewall, the third-party firewall vendor deletes all of the firewalls that are associated with the account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.DisassociateThirdPartyFirewall
            default: AWSFMS_20180101.DisassociateThirdPartyFirewall
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ThirdPartyFirewall:
                  $ref: "#/components/schemas/ThirdPartyFirewall"
                  description: The name of the third-party firewall vendor.
              required:
                - ThirdPartyFirewall
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateThirdPartyFirewallResponse"
  /GetAdminAccount:
    post:
      operationId: GetAdminAccount
      description: Returns the Organizations account that is associated with Firewall Manager as the Firewall Manager default administrator.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetAdminAccount
            default: AWSFMS_20180101.GetAdminAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdminAccountResponse"
  /GetAdminScope:
    post:
      operationId: GetAdminScope
      description: Returns information about the specified account's administrative scope. The administrative scope defines the resources that an Firewall Manager administrator can manage.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetAdminScope
            default: AWSFMS_20180101.GetAdminScope
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AdminAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The administrator account that you want to get the details for.
              required:
                - AdminAccount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdminScopeResponse"
  /GetAppsList:
    post:
      operationId: GetAppsList
      description: Returns information about the specified Firewall Manager applications list.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetAppsList
            default: AWSFMS_20180101.GetAppsList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ListId:
                  $ref: "#/components/schemas/ListId"
                  description: The ID of the Firewall Manager applications list that you want the details for.
                DefaultList:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the list to retrieve is a default list owned by Firewall Manager.
              required:
                - ListId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppsListResponse"
  /GetComplianceDetail:
    post:
      operationId: GetComplianceDetail
      description: Returns detailed compliance information about the specified member account. Details include resources that are in and out of compliance with the specified policy. The reasons for resources being considered compliant depend on the Firewall Manager policy type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetComplianceDetail
            default: AWSFMS_20180101.GetComplianceDetail
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PolicyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: The ID of the policy that you want to get the details for. PolicyId is returned by PutPolicy and by ListPolicies.
                MemberAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The Amazon Web Services account that owns the resources that you want to get the details for.
              required:
                - PolicyId
                - MemberAccount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComplianceDetailResponse"
  /GetNotificationChannel:
    post:
      operationId: GetNotificationChannel
      description: Information about the Amazon Simple Notification Service (SNS) topic that is used to record Firewall Manager SNS logs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetNotificationChannel
            default: AWSFMS_20180101.GetNotificationChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetNotificationChannelResponse"
  /GetPolicy:
    post:
      operationId: GetPolicy
      description: Returns information about the specified Firewall Manager policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetPolicy
            default: AWSFMS_20180101.GetPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PolicyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: The ID of the Firewall Manager policy that you want the details for.
              required:
                - PolicyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyResponse"
  /GetProtectionStatus:
    post:
      operationId: GetProtectionStatus
      description: If you created a Shield Advanced policy, returns policy-level attack summary information in the event of a potential DDoS attack. Other policy types are currently unsupported.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetProtectionStatus
            default: AWSFMS_20180101.GetProtectionStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PolicyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: The ID of the policy for which you want to get the attack information.
                MemberAccountId:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The Amazon Web Services account that is in scope of the policy that you want to get the details for.
                StartTime:
                  $ref: "#/components/schemas/TimeStamp"
                  description: The start of the time period to query for the attacks. This is a timestamp type. The request syntax listing indicates a number type because the default used by Firewall Manager is Unix time in seconds. However, any valid timestamp format is allowed.
                EndTime:
                  $ref: "#/components/schemas/TimeStamp"
                  description: The end of the time period to query for the attacks. This is a timestamp type. The request syntax listing indicates a number type because the default used by Firewall Manager is Unix time in seconds. However, any valid timestamp format is allowed.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: If you specify a value for MaxResults and you have more objects than the number that you specify for MaxResults, Firewall Manager returns a NextToken value in the response, which you can use to retrieve another group of objects. For the second and subsequent GetProtectionStatus requests, specify the value of NextToken from the previous response to get information about another batch of objects.
                MaxResults:
                  $ref: "#/components/schemas/PaginationMaxResults"
                  description: Specifies the number of objects that you want Firewall Manager to return for this request. If you have more objects than the number that you specify for MaxResults, the response includes a NextToken value that you can use to get another batch of objects.
              required:
                - PolicyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProtectionStatusResponse"
  /GetProtocolsList:
    post:
      operationId: GetProtocolsList
      description: Returns information about the specified Firewall Manager protocols list.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetProtocolsList
            default: AWSFMS_20180101.GetProtocolsList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ListId:
                  $ref: "#/components/schemas/ListId"
                  description: The ID of the Firewall Manager protocols list that you want the details for.
                DefaultList:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether the list to retrieve is a default list owned by Firewall Manager.
              required:
                - ListId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProtocolsListResponse"
  /GetResourceSet:
    post:
      operationId: GetResourceSet
      description: Gets information about a specific resource set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetResourceSet
            default: AWSFMS_20180101.GetResourceSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Identifier:
                  $ref: "#/components/schemas/Base62Id"
                  description: A unique identifier for the resource set, used in a request to refer to the resource set.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceSetResponse"
  /GetThirdPartyFirewallAssociationStatus:
    post:
      operationId: GetThirdPartyFirewallAssociationStatus
      description: The onboarding status of a Firewall Manager admin account to third-party firewall vendor tenant.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetThirdPartyFirewallAssociationStatus
            default: AWSFMS_20180101.GetThirdPartyFirewallAssociationStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ThirdPartyFirewall:
                  $ref: "#/components/schemas/ThirdPartyFirewall"
                  description: The name of the third-party firewall vendor.
              required:
                - ThirdPartyFirewall
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetThirdPartyFirewallAssociationStatusResponse"
  /GetViolationDetails:
    post:
      operationId: GetViolationDetails
      description: Retrieves violations for a resource based on the specified Firewall Manager policy and Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.GetViolationDetails
            default: AWSFMS_20180101.GetViolationDetails
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PolicyId:
                  $ref: "#/components/schemas/PolicyId"
                  description: "The ID of the Firewall Manager policy that you want the details for. You can get violation details for the following policy types: WAF DNS Firewall Imported Network Firewall Network Firewall Security group content audit Network ACL Third-party firewall"
                MemberAccount:
                  $ref: "#/components/schemas/AWSAccountId"
                  description: The Amazon Web Services account ID that you want the details for.
                ResourceId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The ID of the resource that has violations.
                ResourceType:
                  $ref: "#/components/schemas/ResourceType"
                  description: "The resource type. This is in the format shown in the Amazon Web Services Resource Types Reference. Supported resource types are: AWS::WAFv2::WebACL, AWS::EC2::Instance, AWS::EC2::NetworkInterface, AWS::EC2::SecurityGroup, AWS::NetworkFirewall::FirewallPolicy, and AWS::EC2::Subnet."
              required:
                - PolicyId
                - MemberAccount
                - ResourceId
                - ResourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetViolationDetailsResponse"
  /ListAdminAccountsForOrganization:
    post:
      operationId: ListAdminAccountsForOrganization
      description: Returns a AdminAccounts object that lists the Firewall Manager administrators within the organization that are onboarded to Firewall Manager by AssociateAdminAccount. This operation can be called only from the organization's management account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.ListAdminAccountsForOrganization
            default: AWSFMS_20180101.ListAdminAccountsForOrganization
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: When you request a list of objects with a MaxResults setting, if the number of objects that are still available for retrieval exceeds the maximum you requested, Firewall Manager returns a NextToken value in the response. To retrieve the next batch of objects, use the token returned from the prior request in your next request.
                MaxResults:
                  $ref: "#/components/schemas/PaginationMaxResults"
                  description: The maximum number of objects that you want Firewall Manager to return for this request. If more objects are available, in the response, Firewall Manager provides a NextToken value that you can use in a subsequent call to get the next batch of objects.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdminAccountsForOrganizationResponse"
  /ListAdminsManagingAccount:
    post:
      operationId: ListAdminsManagingAccount
      description: Lists the accounts that are managing the specified Organizations member account. This is useful for any member account so that they can view the accounts who are managing their account. This operation only returns the managing administrators that have the requested account within their AdminScope.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSFMS_20180101.ListAdminsManagingAccount
            default: AWSFMS_20180101.ListAdminsManagingAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
