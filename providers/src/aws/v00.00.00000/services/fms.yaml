        TargetViolationReason:
          $ref: "#/components/schemas/TargetViolationReason"
          description: The reason the resource has this violation, if one is available.
    NetworkFirewallMissingSubnetViolation:
      description: Violation detail for Network Firewall for an Availability Zone that's missing the expected Firewall Manager managed subnet.
      type: object
      properties:
        ViolationTarget:
