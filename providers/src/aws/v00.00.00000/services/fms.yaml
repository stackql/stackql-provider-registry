      properties:
        ViolationTarget:
          $ref: "#/components/schemas/ViolationTarget"
          description: The resource ID of the network interface.
        ViolatingSecurityGroups:
          $ref: "#/components/schemas/ResourceIdList"
          description: List of security groups that violate the rules specified in the primary security group of the Firewall Manager policy.
    ResourceIdList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceId"
    AwsEc2InstanceViolation:
      description: Violation detail for an EC2 instance resource.
      type: object
      properties:
        ViolationTarget:
          $ref: "#/components/schemas/ViolationTarget"
          description: The resource ID of the EC2 instance.
        AwsEc2NetworkInterfaceViolations:
          $ref: "#/components/schemas/AwsEc2NetworkInterfaceViolations"
          description: Violation detail for network interfaces associated with the EC2 instance.
    AwsEc2NetworkInterfaceViolations:
      type: array
      items:
        $ref: "#/components/schemas/AwsEc2NetworkInterfaceViolation"
    NetworkFirewallMissingFirewallViolation:
      description: Violation detail for Network Firewall for a subnet that doesn't have a Firewall Manager managed firewall in its VPC.
      type: object
      properties:
        ViolationTarget:
          $ref: "#/components/schemas/ViolationTarget"
          description: The ID of the Network Firewall or VPC resource that's in violation.
