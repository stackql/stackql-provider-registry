    NetworkFirewallPolicyDescription:
      description: The definition of the Network Firewall firewall policy.
      type: object
      properties:
        StatelessRuleGroups:
          $ref: "#/components/schemas/StatelessRuleGroupList"
          description: The stateless rule groups that are used in the Network Firewall firewall policy.
        StatelessDefaultActions:
          $ref: "#/components/schemas/NetworkFirewallActionList"
          description: The actions to take on packets that don't match any of the stateless rule groups.
        StatelessFragmentDefaultActions:
          $ref: "#/components/schemas/NetworkFirewallActionList"
          description: The actions to take on packet fragments that don't match any of the stateless rule groups.
        StatelessCustomActions:
          $ref: "#/components/schemas/NetworkFirewallActionList"
          description: Names of custom actions that are available for use in the stateless default actions settings.
        StatefulRuleGroups:
          $ref: "#/components/schemas/StatefulRuleGroupList"
          description: The stateful rule groups that are used in the Network Firewall firewall policy.
        StatefulDefaultActions:
          $ref: "#/components/schemas/NetworkFirewallActionList"
          description: "The default actions to take on a packet that doesn't match any stateful rules. The stateful default action is optional, and is only valid when using the strict rule order. Valid values of the stateful default action: aws:drop_strict aws:drop_established aws:alert_strict aws:alert_established"
        StatefulEngineOptions:
          $ref: "#/components/schemas/StatefulEngineOptions"
          description: Additional options governing how Network Firewall handles stateful rules. The stateful rule groups that you use in your policy must have stateful rule options settings that are compatible with these settings.
    StatelessRuleGroupList:
      type: array
      items:
        $ref: "#/components/schemas/StatelessRuleGroup"
    StatelessRuleGroup:
      description: Network Firewall stateless rule group, used in a NetworkFirewallPolicyDescription.
      type: object
      properties:
