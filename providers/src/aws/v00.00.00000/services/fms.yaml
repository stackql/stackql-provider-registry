    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AWSAccountId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^[0-9]+$
    ThirdPartyFirewall:
      type: string
      enum:
        - PALO_ALTO_NETWORKS_CLOUD_NGFW
        - FORTIGATE_CLOUD_NATIVE_FIREWALL
    AssociateThirdPartyFirewallResponse:
      type: object
      properties:
        ThirdPartyFirewallStatus:
          $ref: "#/components/schemas/ThirdPartyFirewallAssociationStatus"
          description: The current status for setting a Firewall Manager policy administrator's account as an administrator of the third-party firewall tenant. ONBOARDING - The Firewall Manager policy administrator is being designated as a tenant administrator. ONBOARD_COMPLETE - The Firewall Manager policy administrator is designated as a tenant administrator. OFFBOARDING - The Firewall Manager policy administrator is being removed as a tenant administrator. OFFBOARD_COMPLETE - The Firewall Manager policy administrator has been removed as a tenant administrator. NOT_EXIST - The Firewall Manager policy administrator doesn't exist as a tenant administrator.
    ThirdPartyFirewallAssociationStatus:
      type: string
      enum:
        - ONBOARDING
        - ONBOARD_COMPLETE
        - OFFBOARDING
        - OFFBOARD_COMPLETE
        - NOT_EXIST
    Identifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    IdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/Identifier"
    BatchAssociateResourceResponse:
      type: object
      properties:
        ResourceSetIdentifier:
          $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the resource set, used in a request to refer to the resource set.
        FailedItems:
          $ref: "#/components/schemas/FailedItemList"
          description: The resources that failed to associate to the resource set.
      required:
        - ResourceSetIdentifier
        - FailedItems
    FailedItemList:
      type: array
      items:
        $ref: "#/components/schemas/FailedItem"
    FailedItem:
      description: Details of a resource that failed when trying to update it's association to a resource set.
      type: object
      properties:
        URI:
          $ref: "#/components/schemas/Identifier"
          description: The univeral resource indicator (URI) of the resource that failed.
        Reason:
          $ref: "#/components/schemas/FailedItemReason"
          description: The reason the resource's association could not be updated.
    FailedItemReason:
      type: string
      enum:
        - NOT_VALID_ARN
        - NOT_VALID_PARTITION
        - NOT_VALID_REGION
        - NOT_VALID_SERVICE
        - NOT_VALID_RESOURCE_TYPE
        - NOT_VALID_ACCOUNT_ID
    BatchDisassociateResourceResponse:
      type: object
      properties:
        ResourceSetIdentifier:
          $ref: "#/components/schemas/Identifier"
          description: A unique identifier for the resource set, used in a request to refer to the resource set.
        FailedItems:
          $ref: "#/components/schemas/FailedItemList"
          description: The resources that failed to disassociate from the resource set.
      required:
        - ResourceSetIdentifier
        - FailedItems
    ListId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^[a-z0-9A-Z-]{36}$
    PolicyId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^[a-z0-9A-Z-]{36}$
    Boolean:
      type: boolean
    Base62Id:
      type: string
      minLength: 22
      maxLength: 22
      pattern: ^[a-z0-9A-Z]{22}$
    DisassociateThirdPartyFirewallResponse:
      type: object
      properties:
        ThirdPartyFirewallStatus:
          $ref: "#/components/schemas/ThirdPartyFirewallAssociationStatus"
          description: The current status for the disassociation of a Firewall Manager administrators account with a third-party firewall.
    GetAdminAccountResponse:
      type: object
      properties:
        AdminAccount:
          $ref: "#/components/schemas/AWSAccountId"
          description: The account that is set as the Firewall Manager default administrator.
        RoleStatus:
          $ref: "#/components/schemas/AccountRoleStatus"
          description: The status of the account that you set as the Firewall Manager default administrator.
    AccountRoleStatus:
      type: string
      enum:
        - READY
        - CREATING
        - PENDING_DELETION
        - DELETING
        - DELETED
    GetAdminScopeResponse:
      type: object
      properties:
        AdminScope:
          $ref: "#/components/schemas/AdminScope"
          description: Contains details about the administrative scope of the requested account.
        Status:
          $ref: "#/components/schemas/OrganizationStatus"
          description: The current status of the request to onboard a member account as an Firewall Manager administrator. ONBOARDING - The account is onboarding to Firewall Manager as an administrator. ONBOARDING_COMPLETE - Firewall Manager The account is onboarded to Firewall Manager as an administrator, and can perform actions on the resources defined in their AdminScope. OFFBOARDING - The account is being removed as an Firewall Manager administrator. OFFBOARDING_COMPLETE - The account has been removed as an Firewall Manager administrator.
    AdminScope:
      description: Defines the resources that the Firewall Manager administrator can manage. For more information about administrative scope, see Managing Firewall Manager administrators in the Firewall Manager Developer Guide.
      type: object
      properties:
        AccountScope:
          $ref: "#/components/schemas/AccountScope"
          description: Defines the accounts that the specified Firewall Manager administrator can apply policies to.
        OrganizationalUnitScope:
          $ref: "#/components/schemas/OrganizationalUnitScope"
          description: Defines the Organizations organizational units that the specified Firewall Manager administrator can apply policies to. For more information about OUs in Organizations, see Managing organizational units (OUs) in the Organizations User Guide.
        RegionScope:
          $ref: "#/components/schemas/RegionScope"
          description: Defines the Amazon Web Services Regions that the specified Firewall Manager administrator can perform actions in.
        PolicyTypeScope:
          $ref: "#/components/schemas/PolicyTypeScope"
          description: Defines the Firewall Manager policy types that the specified Firewall Manager administrator can create and manage.
    AccountScope:
      description: Configures the accounts within the administrator's Organizations organization that the specified Firewall Manager administrator can apply policies to.
      type: object
      properties:
        Accounts:
          $ref: "#/components/schemas/AccountIdList"
          description: The list of accounts within the organization that the specified Firewall Manager administrator either can or cannot apply policies to, based on the value of ExcludeSpecifiedAccounts. If ExcludeSpecifiedAccounts is set to true, then the Firewall Manager administrator can apply policies to all members of the organization except for the accounts in this list. If ExcludeSpecifiedAccounts is set to false, then the Firewall Manager administrator can only apply policies to the accounts in this list.
        AllAccountsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: A boolean value that indicates if the administrator can apply policies to all accounts within an organization. If true, the administrator can apply policies to all accounts within the organization. You can either enable management of all accounts through this operation, or you can specify a list of accounts to manage in AccountScope$Accounts. You cannot specify both.
        ExcludeSpecifiedAccounts:
          $ref: "#/components/schemas/Boolean"
          description: A boolean value that excludes the accounts in AccountScope$Accounts from the administrator's scope. If true, the Firewall Manager administrator can apply policies to all members of the organization except for the accounts listed in AccountScope$Accounts. You can either specify a list of accounts to exclude by AccountScope$Accounts, or you can enable management of all accounts by AccountScope$AllAccountsEnabled. You cannot specify both.
    AccountIdList:
      type: array
      items:
        $ref: "#/components/schemas/AWSAccountId"
    OrganizationalUnitScope:
      description: Defines the Organizations organizational units (OUs) that the specified Firewall Manager administrator can apply policies to. For more information about OUs in Organizations, see Managing organizational units (OUs) in the Organizations User Guide.
      type: object
      properties:
        OrganizationalUnits:
          $ref: "#/components/schemas/OrganizationalUnitIdList"
          description: The list of OUs within the organization that the specified Firewall Manager administrator either can or cannot apply policies to, based on the value of OrganizationalUnitScope$ExcludeSpecifiedOrganizationalUnits. If OrganizationalUnitScope$ExcludeSpecifiedOrganizationalUnits is set to true, then the Firewall Manager administrator can apply policies to all OUs in the organization except for the OUs in this list. If OrganizationalUnitScope$ExcludeSpecifiedOrganizationalUnits is set to false, then the Firewall Manager administrator can only apply policies to the OUs in this list.
        AllOrganizationalUnitsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: A boolean value that indicates if the administrator can apply policies to all OUs within an organization. If true, the administrator can manage all OUs within the organization. You can either enable management of all OUs through this operation, or you can specify OUs to manage in OrganizationalUnitScope$OrganizationalUnits. You cannot specify both.
        ExcludeSpecifiedOrganizationalUnits:
          $ref: "#/components/schemas/Boolean"
          description: A boolean value that excludes the OUs in OrganizationalUnitScope$OrganizationalUnits from the administrator's scope. If true, the Firewall Manager administrator can apply policies to all OUs in the organization except for the OUs listed in OrganizationalUnitScope$OrganizationalUnits. You can either specify a list of OUs to exclude by OrganizationalUnitScope$OrganizationalUnits, or you can enable management of all OUs by OrganizationalUnitScope$AllOrganizationalUnitsEnabled. You cannot specify both.
    OrganizationalUnitIdList:
      type: array
      items:
        $ref: "#/components/schemas/OrganizationalUnitId"
    OrganizationalUnitId:
      type: string
      minLength: 16
      maxLength: 68
      pattern: ^ou-[0-9a-z]{4,32}-[a-z0-9]{8,32}$
    RegionScope:
      description: Defines the Amazon Web Services Regions that the specified Firewall Manager administrator can manage.
      type: object
      properties:
        Regions:
          $ref: "#/components/schemas/AWSRegionList"
          description: The Amazon Web Services Regions that the specified Firewall Manager administrator can perform actions in.
        AllRegionsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Allows the specified Firewall Manager administrator to manage all Amazon Web Services Regions.
    AWSRegionList:
      type: array
      items:
        $ref: "#/components/schemas/AWSRegion"
    AWSRegion:
      type: string
      minLength: 6
      maxLength: 32
      pattern: ^(af|ap|ca|eu|il|me|mx|sa|us|cn|us-gov)-\w+-\d+$
    PolicyTypeScope:
      description: Defines the policy types that the specified Firewall Manager administrator can manage.
      type: object
      properties:
        PolicyTypes:
          $ref: "#/components/schemas/SecurityServiceTypeList"
          description: The list of policy types that the specified Firewall Manager administrator can manage.
        AllPolicyTypesEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Allows the specified Firewall Manager administrator to manage all Firewall Manager policy types, except for third-party policy types. Third-party policy types can only be managed by the Firewall Manager default administrator.
    SecurityServiceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityServiceType"
    SecurityServiceType:
      type: string
      enum:
        - WAF
        - WAFV2
        - SHIELD_ADVANCED
        - SECURITY_GROUPS_COMMON
        - SECURITY_GROUPS_CONTENT_AUDIT
        - SECURITY_GROUPS_USAGE_AUDIT
        - NETWORK_FIREWALL
        - DNS_FIREWALL
        - THIRD_PARTY_FIREWALL
        - IMPORT_NETWORK_FIREWALL
        - NETWORK_ACL_COMMON
    OrganizationStatus:
      type: string
      enum:
        - ONBOARDING
        - ONBOARDING_COMPLETE
        - OFFBOARDING
        - OFFBOARDING_COMPLETE
    GetAppsListResponse:
      type: object
      properties:
        AppsList:
          $ref: "#/components/schemas/AppsListData"
          description: Information about the specified Firewall Manager applications list.
        AppsListArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the applications list.
    AppsListData:
      description: An Firewall Manager applications list.
      type: object
      properties:
        ListId:
          $ref: "#/components/schemas/ListId"
          description: The ID of the Firewall Manager applications list.
        ListName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Firewall Manager applications list.
        ListUpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A unique identifier for each update to the list. When you update the list, the update token must match the token of the current version of the application list. You can retrieve the update token by getting the list.
        CreateTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time that the Firewall Manager applications list was created.
        LastUpdateTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time that the Firewall Manager applications list was last updated.
        AppsList:
          $ref: "#/components/schemas/AppsList"
          description: An array of applications in the Firewall Manager applications list.
        PreviousAppsList:
          type: object
          properties: {}
          description: A map of previous version numbers to their corresponding App object arrays.
      required:
        - ListName
        - AppsList
    ResourceName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    UpdateToken:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TimeStamp:
      type: string
      format: date-time
    AppsList:
      type: array
      items:
        $ref: "#/components/schemas/App"
    App:
      description: An individual Firewall Manager application.
      type: object
      properties:
        AppName:
          $ref: "#/components/schemas/ResourceName"
          description: The application's name.
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: The IP protocol name or number. The name can be one of tcp, udp, or icmp. For information on possible numbers, see Protocol Numbers.
        Port:
          $ref: "#/components/schemas/IPPortNumber"
          description: The application's port number, for example 80.
      required:
        - AppName
        - Protocol
        - Port
    Protocol:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    IPPortNumber:
      type: integer
      format: int64
      minimum: 0
      maximum: 65535
    ResourceArn:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    GetComplianceDetailResponse:
      type: object
      properties:
        PolicyComplianceDetail:
          $ref: "#/components/schemas/PolicyComplianceDetail"
          description: Information about the resources and the policy that you specified in the GetComplianceDetail request.
    PolicyComplianceDetail:
      description: Describes the noncompliant resources in a member account for a specific Firewall Manager policy. A maximum of 100 entries are displayed. If more than 100 resources are noncompliant, EvaluationLimitExceeded is set to True.
      type: object
      properties:
        PolicyOwner:
          $ref: "#/components/schemas/AWSAccountId"
          description: The Amazon Web Services account that created the Firewall Manager policy.
        PolicyId:
          $ref: "#/components/schemas/PolicyId"
          description: The ID of the Firewall Manager policy.
        MemberAccount:
          $ref: "#/components/schemas/AWSAccountId"
          description: The Amazon Web Services account ID.
        Violators:
          $ref: "#/components/schemas/ComplianceViolators"
          description: An array of resources that aren't protected by the WAF or Shield Advanced policy or that aren't in compliance with the security group policy.
        EvaluationLimitExceeded:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if over 100 resources are noncompliant with the Firewall Manager policy.
        ExpiredAt:
          $ref: "#/components/schemas/TimeStamp"
          description: A timestamp that indicates when the returned information should be considered out of date.
        IssueInfoMap:
          type: object
          properties: {}
          description: Details about problems with dependent services, such as WAF or Config, and the error message received that indicates the problem with the service.
    ComplianceViolators:
      type: array
      items:
        $ref: "#/components/schemas/ComplianceViolator"
    ComplianceViolator:
      description: Details of the resource that is not protected by the policy.
      type: object
      properties:
        ResourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The resource ID.
        ViolationReason:
          $ref: "#/components/schemas/ViolationReason"
          description: The reason that the resource is not protected by the policy.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: "The resource type. This is in the format shown in the Amazon Web Services Resource Types Reference. For example: AWS::ElasticLoadBalancingV2::LoadBalancer, AWS::CloudFront::Distribution, or AWS::NetworkFirewall::FirewallPolicy."
        Metadata:
          type: object
          properties: {}
          description: Metadata about the resource that doesn't comply with the policy scope.
    ResourceId:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    ViolationReason:
      type: string
      enum:
        - WEB_ACL_MISSING_RULE_GROUP
        - RESOURCE_MISSING_WEB_ACL
        - RESOURCE_INCORRECT_WEB_ACL
        - RESOURCE_MISSING_SHIELD_PROTECTION
        - RESOURCE_MISSING_WEB_ACL_OR_SHIELD_PROTECTION
        - RESOURCE_MISSING_SECURITY_GROUP
        - RESOURCE_VIOLATES_AUDIT_SECURITY_GROUP
        - SECURITY_GROUP_UNUSED
        - SECURITY_GROUP_REDUNDANT
        - FMS_CREATED_SECURITY_GROUP_EDITED
        - MISSING_FIREWALL
        - MISSING_FIREWALL_SUBNET_IN_AZ
        - MISSING_EXPECTED_ROUTE_TABLE
        - NETWORK_FIREWALL_POLICY_MODIFIED
        - FIREWALL_SUBNET_IS_OUT_OF_SCOPE
        - INTERNET_GATEWAY_MISSING_EXPECTED_ROUTE
        - FIREWALL_SUBNET_MISSING_EXPECTED_ROUTE
        - UNEXPECTED_FIREWALL_ROUTES
        - UNEXPECTED_TARGET_GATEWAY_ROUTES
        - TRAFFIC_INSPECTION_CROSSES_AZ_BOUNDARY
        - INVALID_ROUTE_CONFIGURATION
        - MISSING_TARGET_GATEWAY
        - INTERNET_TRAFFIC_NOT_INSPECTED
        - BLACK_HOLE_ROUTE_DETECTED
        - BLACK_HOLE_ROUTE_DETECTED_IN_FIREWALL_SUBNET
        - RESOURCE_MISSING_DNS_FIREWALL
        - ROUTE_HAS_OUT_OF_SCOPE_ENDPOINT
        - FIREWALL_SUBNET_MISSING_VPCE_ENDPOINT
        - INVALID_NETWORK_ACL_ENTRY
        - WEB_ACL_CONFIGURATION_OR_SCOPE_OF_USE
    ResourceType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    GetNotificationChannelResponse:
      type: object
      properties:
        SnsTopicArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The SNS topic that records Firewall Manager activity.
        SnsRoleName:
          $ref: "#/components/schemas/ResourceArn"
          description: The IAM role that is used by Firewall Manager to record activity to SNS.
    GetPolicyResponse:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/Policy"
          description: Information about the specified Firewall Manager policy.
        PolicyArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the specified policy.
    Policy:
      description: An Firewall Manager policy.
      type: object
      properties:
        PolicyId:
          $ref: "#/components/schemas/PolicyId"
          description: The ID of the Firewall Manager policy.
        PolicyName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Firewall Manager policy.
        PolicyUpdateToken:
          $ref: "#/components/schemas/PolicyUpdateToken"
          description: A unique identifier for each update to the policy. When issuing a PutPolicy request, the PolicyUpdateToken in the request must match the PolicyUpdateToken of the current policy version. To get the PolicyUpdateToken of the current policy version, use a GetPolicy request.
        SecurityServicePolicyData:
          $ref: "#/components/schemas/SecurityServicePolicyData"
          description: Details about the security service that is being used to protect the resources.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: "The type of resource protected by or in scope of the policy. This is in the format shown in the Amazon Web Services Resource Types Reference. To apply this policy to multiple resource types, specify a resource type of ResourceTypeList and then specify the resource types in a ResourceTypeList. The following are valid resource types for each Firewall Manager policy type: Amazon Web Services WAF Classic - AWS::ApiGateway::Stage, AWS::CloudFront::Distribution, and AWS::ElasticLoadBalancingV2::LoadBalancer. WAF - AWS::ApiGateway::Stage, AWS::ElasticLoadBalancingV2::LoadBalancer, and AWS::CloudFront::Distribution. Shield Advanced - AWS::ElasticLoadBalancingV2::LoadBalancer, AWS::ElasticLoadBalancing::LoadBalancer, AWS::EC2::EIP, and AWS::CloudFront::Distribution. Network ACL - AWS::EC2::Subnet. Security group usage audit - AWS::EC2::SecurityGroup. Security group content audit - AWS::EC2::SecurityGroup, AWS::EC2::NetworkInterface, and AWS::EC2::Instance. DNS Firewall, Network Firewall, and third-party firewall - AWS::EC2::VPC."
        ResourceTypeList:
          $ref: "#/components/schemas/ResourceTypeList"
          description: An array of ResourceType objects. Use this only to specify multiple resource types. To specify a single resource type, use ResourceType.
        ResourceTags:
          $ref: "#/components/schemas/ResourceTags"
          description: An array of ResourceTag objects.
        ExcludeResourceTags:
          $ref: "#/components/schemas/Boolean"
          description: If set to True, resources with the tags that are specified in the ResourceTag array are not in scope of the policy. If set to False, and the ResourceTag array is not null, only resources with the specified tags are in scope of the policy.
        RemediationEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the policy should be automatically applied to new resources.
        DeleteUnusedFMManagedResources:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Firewall Manager should automatically remove protections from resources that leave the policy scope and clean up resources that Firewall Manager is managing for accounts when those accounts leave policy scope. For example, Firewall Manager will disassociate a Firewall Manager managed web ACL from a protected customer resource when the customer resource leaves policy scope. By default, Firewall Manager doesn't remove protections or delete Firewall Manager managed resources. This option is not available for Shield Advanced or WAF Classic policies.
        IncludeMap:
          type: object
          properties: {}
          description: "Specifies the Amazon Web Services account IDs and Organizations organizational units (OUs) to include in the policy. Specifying an OU is the equivalent of specifying all accounts in the OU and in any of its child OUs, including any child OUs and accounts that are added at a later time. You can specify inclusions or exclusions, but not both. If you specify an IncludeMap, Firewall Manager applies the policy to all accounts specified by the IncludeMap, and does not evaluate any ExcludeMap specifications. If you do not specify an IncludeMap, then Firewall Manager applies the policy to all accounts except for those specified by the ExcludeMap. You can specify account IDs, OUs, or a combination: Specify account IDs by setting the key to ACCOUNT. For example, the following is a valid map: {“ACCOUNT” : [“accountID1”, “accountID2”]}. Specify OUs by setting the key to ORG_UNIT. For example, the following is a valid map: {“ORG_UNIT” : [“ouid111”, “ouid112”]}. Specify accounts and OUs together in a single map, separated with a comma. For example, the following is a valid map: {“ACCOUNT” : [“accountID1”, “accountID2”], “ORG_UNIT” : [“ouid111”, “ouid112”]}."
        ExcludeMap:
          type: object
          properties: {}
          description: "Specifies the Amazon Web Services account IDs and Organizations organizational units (OUs) to exclude from the policy. Specifying an OU is the equivalent of specifying all accounts in the OU and in any of its child OUs, including any child OUs and accounts that are added at a later time. You can specify inclusions or exclusions, but not both. If you specify an IncludeMap, Firewall Manager applies the policy to all accounts specified by the IncludeMap, and does not evaluate any ExcludeMap specifications. If you do not specify an IncludeMap, then Firewall Manager applies the policy to all accounts except for those specified by the ExcludeMap. You can specify account IDs, OUs, or a combination: Specify account IDs by setting the key to ACCOUNT. For example, the following is a valid map: {“ACCOUNT” : [“accountID1”, “accountID2”]}. Specify OUs by setting the key to ORG_UNIT. For example, the following is a valid map: {“ORG_UNIT” : [“ouid111”, “ouid112”]}. Specify accounts and OUs together in a single map, separated with a comma. For example, the following is a valid map: {“ACCOUNT” : [“accountID1”, “accountID2”], “ORG_UNIT” : [“ouid111”, “ouid112”]}."
        ResourceSetIds:
          $ref: "#/components/schemas/ResourceSetIds"
          description: The unique identifiers of the resource sets used by the policy.
        PolicyDescription:
          $ref: "#/components/schemas/ResourceDescription"
          description: Your description of the Firewall Manager policy.
        PolicyStatus:
          $ref: "#/components/schemas/CustomerPolicyStatus"
          description: Indicates whether the policy is in or out of an admin's policy or Region scope. ACTIVE - The administrator can manage and delete the policy. OUT_OF_ADMIN_SCOPE - The administrator can view the policy, but they can't edit or delete the policy. Existing policy protections stay in place. Any new resources that come into scope of the policy won't be protected.
        ResourceTagLogicalOperator:
          $ref: "#/components/schemas/ResourceTagLogicalOperator"
          description: "Specifies whether to combine multiple resource tags with AND, so that a resource must have all tags to be included or excluded, or OR, so that a resource must have at least one tag. Default: AND"
      required:
        - PolicyName
        - SecurityServicePolicyData
        - ResourceType
        - ExcludeResourceTags
        - RemediationEnabled
    PolicyUpdateToken:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    SecurityServicePolicyData:
      description: Details about the security service that is being used to protect the resources.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/SecurityServiceType"
          description: The service that the policy is using to protect the resources. This specifies the type of policy that is created, either an WAF policy, a Shield Advanced policy, or a security group policy. For security group policies, Firewall Manager supports one security group for each common policy and for each content audit policy. This is an adjustable limit that you can increase by contacting Amazon Web Services Support.
        ManagedServiceData:
          $ref: "#/components/schemas/ManagedServiceData"
          description: "Details about the service that are specific to the service type, in JSON format. Example: DNS_FIREWALL \"{\\\"type\\\":\\\"DNS_FIREWALL\\\",\\\"preProcessRuleGroups\\\":[{\\\"ruleGroupId\\\":\\\"rslvr-frg-1\\\",\\\"priority\\\":10}],\\\"postProcessRuleGroups\\\":[{\\\"ruleGroupId\\\":\\\"rslvr-frg-2\\\",\\\"priority\\\":9911}]}\" Valid values for preProcessRuleGroups are between 1 and 99. Valid values for postProcessRuleGroups are between 9901 and 10000. Example: IMPORT_NETWORK_FIREWALL \"{\\\"type\\\":\\\"IMPORT_NETWORK_FIREWALL\\\",\\\"awsNetworkFirewallConfig\\\":{\\\"networkFirewallStatelessRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-west-2:000000000000:stateless-rulegroup\\/rg1\\\",\\\"priority\\\":1}],\\\"networkFirewallStatelessDefaultActions\\\":[\\\"aws:drop\\\"],\\\"networkFirewallStatelessFragmentDefaultActions\\\":[\\\"aws:pass\\\"],\\\"networkFirewallStatelessCustomActions\\\":[],\\\"networkFirewallStatefulRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-west-2:aws-managed:stateful-rulegroup\\/ThreatSignaturesEmergingEventsStrictOrder\\\",\\\"priority\\\":8}],\\\"networkFirewallStatefulEngineOptions\\\":{\\\"ruleOrder\\\":\\\"STRICT_ORDER\\\"},\\\"networkFirewallStatefulDefaultActions\\\":[\\\"aws:drop_strict\\\"]}}\" \"{\\\"type\\\":\\\"DNS_FIREWALL\\\",\\\"preProcessRuleGroups\\\":[{\\\"ruleGroupId\\\":\\\"rslvr-frg-1\\\",\\\"priority\\\":10}],\\\"postProcessRuleGroups\\\":[{\\\"ruleGroupId\\\":\\\"rslvr-frg-2\\\",\\\"priority\\\":9911}]}\" Valid values for preProcessRuleGroups are between 1 and 99. Valid values for postProcessRuleGroups are between 9901 and 10000. Example: NETWORK_FIREWALL - Centralized deployment model \"{\\\"type\\\":\\\"NETWORK_FIREWALL\\\",\\\"awsNetworkFirewallConfig\\\":{\\\"networkFirewallStatelessRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateless-rulegroup/test\\\",\\\"priority\\\":1}],\\\"networkFirewallStatelessDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessFragmentDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessCustomActions\\\":[{\\\"actionName\\\":\\\"customActionName\\\",\\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"metricdimensionvalue\\\"}]}}}],\\\"networkFirewallStatefulRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateful-rulegroup/test\\\"}],\\\"networkFirewallLoggingConfiguration\\\":{\\\"logDestinationConfigs\\\":[{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"ALERT\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}},{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"FLOW\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}}],\\\"overrideExistingConfig\\\":true}},\\\"firewallDeploymentModel\\\":{\\\"centralizedFirewallDeploymentModel\\\":{\\\"centralizedFirewallOrchestrationConfig\\\":{\\\"inspectionVpcIds\\\":[{\\\"resourceId\\\":\\\"vpc-1234\\\",\\\"accountId\\\":\\\"123456789011\\\"}],\\\"firewallCreationConfig\\\":{\\\"endpointLocation\\\":{\\\"availabilityZoneConfigList\\\":[{\\\"availabilityZoneId\\\":null,\\\"availabilityZoneName\\\":\\\"us-east-1a\\\",\\\"allowedIPV4CidrList\\\":[\\\"10.0.0.0/28\\\"]}]}},\\\"allowedIPV4CidrList\\\":[]}}}}\" To use the centralized deployment model, you must set PolicyOption to CENTRALIZED. Example: NETWORK_FIREWALL - Distributed deployment model with automatic Availability Zone configuration \"{\\\"type\\\":\\\"NETWORK_FIREWALL\\\",\\\"networkFirewallStatelessRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateless-rulegroup/test\\\",\\\"priority\\\":1}],\\\"networkFirewallStatelessDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessFragmentDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessCustomActions\\\":[{\\\"actionName\\\":\\\"customActionName\\\",\\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"metricdimensionvalue\\\"}]}}}],\\\"networkFirewallStatefulRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateful-rulegroup/test\\\"}],\\\"networkFirewallOrchestrationConfig\\\":{\\\"singleFirewallEndpointPerVPC\\\":false,\\\"allowedIPV4CidrList\\\":[\\\"10.0.0.0/28\\\",\\\"192.168.0.0/28\\\"],\\\"routeManagementAction\\\":\\\"OFF\\\"},\\\"networkFirewallLoggingConfiguration\\\":{\\\"logDestinationConfigs\\\":[{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"ALERT\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}},{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"FLOW\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}}],\\\"overrideExistingConfig\\\":true}}\" With automatic Availbility Zone configuration, Firewall Manager chooses which Availability Zones to create the endpoints in. To use the distributed deployment model, you must set PolicyOption to NULL. Example: NETWORK_FIREWALL - Distributed deployment model with automatic Availability Zone configuration and route management \"{\\\"type\\\":\\\"NETWORK_FIREWALL\\\",\\\"networkFirewallStatelessRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateless-rulegroup/test\\\",\\\"priority\\\":1}],\\\"networkFirewallStatelessDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessFragmentDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessCustomActions\\\":[{\\\"actionName\\\":\\\"customActionName\\\",\\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"metricdimensionvalue\\\"}]}}}],\\\"networkFirewallStatefulRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateful-rulegroup/test\\\"}],\\\"networkFirewallOrchestrationConfig\\\":{\\\"singleFirewallEndpointPerVPC\\\":false,\\\"allowedIPV4CidrList\\\":[\\\"10.0.0.0/28\\\",\\\"192.168.0.0/28\\\"],\\\"routeManagementAction\\\":\\\"MONITOR\\\",\\\"routeManagementTargetTypes\\\":[\\\"InternetGateway\\\"]},\\\"networkFirewallLoggingConfiguration\\\":{\\\"logDestinationConfigs\\\":[{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"ALERT\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}},{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\": \\\"FLOW\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}}],\\\"overrideExistingConfig\\\":true}}\" To use the distributed deployment model, you must set PolicyOption to NULL. Example: NETWORK_FIREWALL - Distributed deployment model with custom Availability Zone configuration \"{\\\"type\\\":\\\"NETWORK_FIREWALL\\\",\\\"networkFirewallStatelessRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateless-rulegroup/test\\\",\\\"priority\\\":1}],\\\"networkFirewallStatelessDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessFragmentDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"fragmentcustomactionname\\\"],\\\"networkFirewallStatelessCustomActions\\\":[{\\\"actionName\\\":\\\"customActionName\\\", \\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"metricdimensionvalue\\\"}]}}},{\\\"actionName\\\":\\\"fragmentcustomactionname\\\",\\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"fragmentmetricdimensionvalue\\\"}]}}}],\\\"networkFirewallStatefulRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateful-rulegroup/test\\\"}],\\\"networkFirewallOrchestrationConfig\\\":{\\\"firewallCreationConfig\\\":{ \\\"endpointLocation\\\":{\\\"availabilityZoneConfigList\\\":[{\\\"availabilityZoneName\\\":\\\"us-east-1a\\\",\\\"allowedIPV4CidrList\\\":[\\\"10.0.0.0/28\\\"]},{\\\"availabilityZoneName\\\":\\\"us-east-1b\\\",\\\"allowedIPV4CidrList\\\":[ \\\"10.0.0.0/28\\\"]}]} },\\\"singleFirewallEndpointPerVPC\\\":false,\\\"allowedIPV4CidrList\\\":null,\\\"routeManagementAction\\\":\\\"OFF\\\",\\\"networkFirewallLoggingConfiguration\\\":{\\\"logDestinationConfigs\\\":[{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"ALERT\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}},{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"FLOW\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}}],\\\"overrideExistingConfig\\\":boolean}}\" With custom Availability Zone configuration, you define which specific Availability Zones to create endpoints in by configuring firewallCreationConfig. To configure the Availability Zones in firewallCreationConfig, specify either the availabilityZoneName or availabilityZoneId parameter, not both parameters. To use the distributed deployment model, you must set PolicyOption to NULL. Example: NETWORK_FIREWALL - Distributed deployment model with custom Availability Zone configuration and route management \"{\\\"type\\\":\\\"NETWORK_FIREWALL\\\",\\\"networkFirewallStatelessRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateless-rulegroup/test\\\",\\\"priority\\\":1}],\\\"networkFirewallStatelessDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"customActionName\\\"],\\\"networkFirewallStatelessFragmentDefaultActions\\\":[\\\"aws:forward_to_sfe\\\",\\\"fragmentcustomactionname\\\"],\\\"networkFirewallStatelessCustomActions\\\":[{\\\"actionName\\\":\\\"customActionName\\\",\\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"metricdimensionvalue\\\"}]}}},{\\\"actionName\\\":\\\"fragmentcustomactionname\\\",\\\"actionDefinition\\\":{\\\"publishMetricAction\\\":{\\\"dimensions\\\":[{\\\"value\\\":\\\"fragmentmetricdimensionvalue\\\"}]}}}],\\\"networkFirewallStatefulRuleGroupReferences\\\":[{\\\"resourceARN\\\":\\\"arn:aws:network-firewall:us-east-1:123456789011:stateful-rulegroup/test\\\"}],\\\"networkFirewallOrchestrationConfig\\\":{\\\"firewallCreationConfig\\\":{\\\"endpointLocation\\\":{\\\"availabilityZoneConfigList\\\":[{\\\"availabilityZoneName\\\":\\\"us-east-1a\\\",\\\"allowedIPV4CidrList\\\":[\\\"10.0.0.0/28\\\"]},{\\\"availabilityZoneName\\\":\\\"us-east-1b\\\",\\\"allowedIPV4CidrList\\\":[\\\"10.0.0.0/28\\\"]}]}},\\\"singleFirewallEndpointPerVPC\\\":false,\\\"allowedIPV4CidrList\\\":null,\\\"routeManagementAction\\\":\\\"MONITOR\\\",\\\"routeManagementTargetTypes\\\":[\\\"InternetGateway\\\"],\\\"routeManagementConfig\\\":{\\\"allowCrossAZTrafficIfNoEndpoint\\\":true}},\\\"networkFirewallLoggingConfiguration\\\":{\\\"logDestinationConfigs\\\":[{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"ALERT\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}},{\\\"logDestinationType\\\":\\\"S3\\\",\\\"logType\\\":\\\"FLOW\\\",\\\"logDestination\\\":{\\\"bucketName\\\":\\\"s3-bucket-name\\\"}}],\\\"overrideExistingConfig\\\":boolean}}\" To use the distributed deployment model, you must set PolicyOption to NULL. Example: SECURITY_GROUPS_COMMON \"{\\\"type\\\":\\\"SECURITY_GROUPS_COMMON\\\",\\\"securityGroups\\\":[{\\\"id\\\":\\\"sg-03b1f67d69ed00197\\\"}],\\\"revertManualSecurityGroupChanges\\\":true,\\\"exclusiveResourceSecurityGroupManagement\\\":true,\\\"applyToAllEC2InstanceENIs\\\":false,\\\"includeSharedVPC\\\":true,\\\"enableSecurityGroupReferencesDistribution\\\":true}\" Example: SECURITY_GROUPS_COMMON - Security group tag distribution \"\"{\\\"type\\\":\\\"SECURITY_GROUPS_COMMON\\\",\\\"securityGroups\\\":[{\\\"id\\\":\\\"sg-000e55995d61a06bd\\\"}],\\\"revertManualSecurityGroupChanges\\\":true,\\\"exclusiveResourceSecurityGroupManagement\\\":false,\\\"applyToAllEC2InstanceENIs\\\":false,\\\"includeSharedVPC\\\":false,\\\"enableTagDistribution\\\":true}\"\" Firewall Manager automatically distributes tags from the primary group to the security groups created by this policy. To use security group tag distribution, you must also set revertManualSecurityGroupChanges to true, otherwise Firewall Manager won't be able to create the policy. When you enable revertManualSecurityGroupChanges, Firewall Manager identifies and reports when the security groups created by this policy become non-compliant. Firewall Manager won't distribute system tags added by Amazon Web Services services into the replica security groups. System tags begin with the aws: prefix. Example: Shared VPCs. Apply the preceding policy to resources in shared VPCs as well as to those in VPCs that the account owns \"{\\\"type\\\":\\\"SECURITY_GROUPS_COMMON\\\",\\\"revertManualSecurityGroupChanges\\\":false,\\\"exclusiveResourceSecurityGroupManagement\\\":false, \\\"applyToAllEC2InstanceENIs\\\":false,\\\"includeSharedVPC\\\":true,\\\"securityGroups\\\":[{\\\"id\\\":\\\" sg-000e55995d61a06bd\\\"}]}\" Example: SECURITY_GROUPS_CONTENT_AUDIT \"{\\\"type\\\":\\\"SECURITY_GROUPS_CONTENT_AUDIT\\\",\\\"preManagedOptions\\\":[{\\\"denyProtocolAllValue\\\":true},{\\\"auditSgDirection\\\":{\\\"type\\\":\\\"ALL\\\"}}],\\\"securityGroups\\\":[{\\\"id\\\":\\\"sg-049b2393a25468971\\\"}],\\\"securityGroupAction\\\":{\\\"type\\\":\\\"ALLOW\\\"}}\" The security group action for content audit can be ALLOW or DENY. For ALLOW, all in-scope security group rules must be within the allowed range of the policy's security group rules. For DENY, all in-scope security group rules must not contain a value or a range that matches a rule value or range in the policy security group. Example: SECURITY_GROUPS_USAGE_AUDIT \"{\\\"type\\\":\\\"SECURITY_GROUPS_USAGE_AUDIT\\\",\\\"deleteUnusedSecurityGroups\\\":true,\\\"coalesceRedundantSecurityGroups\\\":true,\\\"optionalDelayForUnusedInMinutes\\\":60}\" Example: SHIELD_ADVANCED with web ACL management \"{\\\"type\\\":\\\"SHIELD_ADVANCED\\\",\\\"optimizeUnassociatedWebACL\\\":true}\" If you set optimizeUnassociatedWebACL to true, Firewall Manager creates web ACLs in accounts within the policy scope if the web ACLs will be used by at least one resource. Firewall Manager creates web ACLs in the accounts within policy scope only if the web ACLs will be used by at least one resource. If at any time an account comes into policy scope, Firewall Manager automatically creates a web ACL in the account if at least one resource will use the web ACL. Upon enablement, Firewall Manager performs a one-time cleanup of unused web ACLs in your account. The cleanup process can take several hours. If a resource leaves policy scope after Firewall Manager creates a web ACL, Firewall Manager doesn't disassociate the resource from the web ACL. If you want Firewall Manager to clean up the web ACL, you must first manually disassociate the resources from the web ACL, and then enable the manage unused web ACLs option in your policy. If you set optimizeUnassociatedWebACL to false, and Firewall Manager automatically creates an empty web ACL in each account that's within policy scope. Specification for SHIELD_ADVANCED for Amazon CloudFront distributions \"{\\\"type\\\":\\\"SHIELD_ADVANCED\\\",\\\"automaticResponseConfiguration\\\": {\\\"automaticResponseStatus\\\":\\\"ENABLED|IGNORED|DISABLED\\\", \\\"automaticResponseAction\\\":\\\"BLOCK|COUNT\\\"}, \\\"overrideCustomerWebaclClassic\\\":true|false, \\\"optimizeUnassociatedWebACL\\\":true|false}\" For example: \"{\\\"type\\\":\\\"SHIELD_ADVANCED\\\",\\\"automaticResponseConfiguration\\\": {\\\"automaticResponseStatus\\\":\\\"ENABLED\\\", \\\"automaticResponseAction\\\":\\\"COUNT\\\"}}\" The default value for automaticResponseStatus is IGNORED. The value for automaticResponseAction is only required when automaticResponseStatus is set to ENABLED. The default value for overrideCustomerWebaclClassic is false. For other resource types that you can protect with a Shield Advanced policy, this ManagedServiceData configuration is an empty string. Example: THIRD_PARTY_FIREWALL Replace THIRD_PARTY_FIREWALL_NAME with the name of the third-party firewall. \"{ \"type\":\"THIRD_PARTY_FIREWALL\", \"thirdPartyFirewall\":\"THIRD_PARTY_FIREWALL_NAME\", \"thirdPartyFirewallConfig\":{ \"thirdPartyFirewallPolicyList\":[\"global-1\"] }, \"firewallDeploymentModel\":{ \"distributedFirewallDeploymentModel\":{ \"distributedFirewallOrchestrationConfig\":{ \"firewallCreationConfig\":{ \"endpointLocation\":{ \"availabilityZoneConfigList\":[ { \"availabilityZoneName\":\"${AvailabilityZone}\" } ] } }, \"allowedIPV4CidrList\":[ ] } } } }\" Example: WAFV2 - Account takeover prevention, Bot Control managed rule groups, optimize unassociated web ACL, and rule action override \"{\\\"type\\\":\\\"WAFV2\\\",\\\"preProcessRuleGroups\\\":[{\\\"ruleGroupArn\\\":null,\\\"overrideAction\\\":{\\\"type\\\":\\\"NONE\\\"},\\\"managedRuleGroupIdentifier\\\":{\\\"versionEnabled\\\":null,\\\"version\\\":null,\\\"vendorName\\\":\\\"AWS\\\",\\\"managedRuleGroupName\\\":\\\"AWSManagedRulesATPRuleSet\\\",\\\"managedRuleGroupConfigs\\\":[{\\\"awsmanagedRulesATPRuleSet\\\":{\\\"loginPath\\\":\\\"/loginpath\\\",\\\"requestInspection\\\":{\\\"payloadType\\\":\\\"FORM_ENCODED|JSON\\\",\\\"usernameField\\\":{\\\"identifier\\\":\\\"/form/username\\\"},\\\"passwordField\\\":{\\\"identifier\\\":\\\"/form/password\\\"}}}}]},\\\"ruleGroupType\\\":\\\"ManagedRuleGroup\\\",\\\"excludeRules\\\":[],\\\"sampledRequestsEnabled\\\":true},{\\\"ruleGroupArn\\\":null,\\\"overrideAction\\\":{\\\"type\\\":\\\"NONE\\\"},\\\"managedRuleGroupIdentifier\\\":{\\\"versionEnabled\\\":null,\\\"version\\\":null,\\\"vendorName\\\":\\\"AWS\\\",\\\"managedRuleGroupName\\\":\\\"AWSManagedRulesBotControlRuleSet\\\",\\\"managedRuleGroupConfigs\\\":[{\\\"awsmanagedRulesBotControlRuleSet\\\":{\\\"inspectionLevel\\\":\\\"TARGETED|COMMON\\\"}}]},\\\"ruleGroupType\\\":\\\"ManagedRuleGroup\\\",\\\"excludeRules\\\":[],\\\"sampledRequestsEnabled\\\":true,\\\"ruleActionOverrides\\\":[{\\\"name\\\":\\\"Rule1\\\",\\\"actionToUse\\\":{\\\"allow|block|count|captcha|challenge\\\":{}}},{\\\"name\\\":\\\"Rule2\\\",\\\"actionToUse\\\":{\\\"allow|block|count|captcha|challenge\\\":{}}}]}],\\\"postProcessRuleGroups\\\":[],\\\"defaultAction\\\":{\\\"type\\\":\\\"ALLOW\\\"},\\\"customRequestHandling\\\":null,\\\"customResponse\\\":null,\\\"overrideCustomerWebACLAssociation\\\":false,\\\"loggingConfiguration\\\":null,\\\"sampledRequestsEnabledForDefaultActions\\\":true,\\\"optimizeUnassociatedWebACL\\\":true}\" Bot Control - For information about AWSManagedRulesBotControlRuleSet managed rule groups, see AWSManagedRulesBotControlRuleSet in the WAF API Reference. Fraud Control account takeover prevention (ATP) - For information about the properties available for AWSManagedRulesATPRuleSet managed rule groups, see AWSManagedRulesATPRuleSet in the WAF API Reference. Optimize unassociated web ACL - If you set optimizeUnassociatedWebACL to true, Firewall Manager creates web ACLs in accounts within the policy scope if the web ACLs will be used by at least one resource. Firewall Manager creates web ACLs in the accounts within policy scope only if the web ACLs will be used by at least one resource. If at any time an account comes into policy scope, Firewall Manager automatically creates a web ACL in the account if at least one resource will use the web ACL. Upon enablement, Firewall Manager performs a one-time cleanup of unused web ACLs in your account. The cleanup process can take several hours. If a resource leaves policy scope after Firewall Manager creates a web ACL, Firewall Manager disassociates the resource from the web ACL, but won't clean up the unused web ACL. Firewall Manager only cleans up unused web ACLs when you first enable management of unused web ACLs in a policy. If you set optimizeUnassociatedWebACL to false Firewall Manager doesn't manage unused web ACLs, and Firewall Manager automatically creates an empty web ACL in each account that's within policy scope. Rule action overrides - Firewall Manager supports rule action overrides only for managed rule groups. To configure a RuleActionOverrides add the Name of the rule to override, and ActionToUse, which is the new action to use for the rule. For information about using rule action override, see RuleActionOverride in the WAF API Reference. Example: WAFV2 - CAPTCHA and Challenge configs \"{\\\"type\\\":\\\"WAFV2\\\",\\\"preProcessRuleGroups\\\":[{\\\"ruleGroupArn\\\":null,\\\"overrideAction\\\":{\\\"type\\\":\\\"NONE\\\"},\\\"managedRuleGroupIdentifier\\\":{\\\"versionEnabled\\\":null,\\\"version\\\":null,\\\"vendorName\\\":\\\"AWS\\\",\\\"managedRuleGroupName\\\":\\\"AWSManagedRulesAdminProtectionRuleSet\\\"},\\\"ruleGroupType\\\":\\\"ManagedRuleGroup\\\",\\\"excludeRules\\\":[],\\\"sampledRequestsEnabled\\\":true}],\\\"postProcessRuleGroups\\\":[],\\\"defaultAction\\\":{\\\"type\\\":\\\"ALLOW\\\"},\\\"customRequestHandling\\\":null,\\\"customResponse\\\":null,\\\"overrideCustomerWebACLAssociation\\\":false,\\\"loggingConfiguration\\\":null,\\\"sampledRequestsEnabledForDefaultActions\\\":true,\\\"captchaConfig\\\":{\\\"immunityTimeProperty\\\":{\\\"immunityTime\\\":500}},\\\"challengeConfig\\\":{\\\"immunityTimeProperty\\\":{\\\"immunityTime\\\":800}},\\\"tokenDomains\\\":[\\\"google.com\\\",\\\"amazon.com\\\"],\\\"associationConfig\\\":{\\\"requestBody\\\":{\\\"CLOUDFRONT\\\":{\\\"defaultSizeInspectionLimit\\\":\\\"KB_16\\\"}}}}\" CAPTCHA and Challenge configs - If you update the policy's values for associationConfig, captchaConfig, challengeConfig, or tokenDomains, Firewall Manager will overwrite your local web ACLs to contain the new value(s). However, if you don't update the policy's associationConfig, captchaConfig, challengeConfig, or tokenDomains values, the values in your local web ACLs will remain unchanged. For information about association configs, see AssociationConfig. For information about CAPTCHA and Challenge configs, see CaptchaConfig and ChallengeConfig in the WAF API Reference. defaultSizeInspectionLimit - Specifies the maximum size of the web request body component that an associated Amazon CloudFront distribution should send to WAF for inspection. For more information, see DefaultSizeInspectionLimit in the WAF API Reference. Example: WAFV2 - Firewall Manager support for WAF managed rule group versioning \"{\\\"preProcessRuleGroups\\\":[{\\\"ruleGroupType\\\":\\\"ManagedRuleGroup\\\",\\\"overrideAction\\\":{\\\"type\\\":\\\"NONE\\\"},\\\"sampledRequestsEnabled\\\":true,\\\"managedRuleGroupIdentifier\\\":{\\\"managedRuleGroupName\\\":\\\"AWSManagedRulesAdminProtectionRuleSet\\\",\\\"vendorName\\\":\\\"AWS\\\",\\\"managedRuleGroupConfigs\\\":null}}],\\\"postProcessRuleGroups\\\":[],\\\"defaultAction\\\":{\\\"type\\\":\\\"ALLOW\\\"},\\\"customRequestHandling\\\":null,\\\"tokenDomains\\\":null,\\\"customResponse\\\":null,\\\"type\\\":\\\"WAFV2\\\",\\\"overrideCustomerWebACLAssociation\\\":false,\\\"sampledRequestsEnabledForDefaultActions\\\":true,\\\"optimizeUnassociatedWebACL\\\":true,\\\"webACLSource\\\":\\\"RETROFIT_EXISTING\\\"}\" To use a specific version of a WAF managed rule group in your Firewall Manager policy, you must set versionEnabled to true, and set version to the version you'd like to use. If you don't set versionEnabled to true, or if you omit versionEnabled, then Firewall Manager uses the default version of the WAF managed rule group. Example: WAFV2 - Logging configurations \"{\\\"type\\\":\\\"WAFV2\\\",\\\"preProcessRuleGroups\\\":[{\\\"ruleGroupArn\\\":null, \\\"overrideAction\\\":{\\\"type\\\":\\\"NONE\\\"},\\\"managedRuleGroupIdentifier\\\": {\\\"versionEnabled\\\":null,\\\"version\\\":null,\\\"vendorName\\\":\\\"AWS\\\", \\\"managedRuleGroupName\\\":\\\"AWSManagedRulesAdminProtectionRuleSet\\\"} ,\\\"ruleGroupType\\\":\\\"ManagedRuleGroup\\\",\\\"excludeRules\\\":[], \\\"sampledRequestsEnabled\\\":true}],\\\"postProcessRuleGroups\\\":[], \\\"defaultAction\\\":{\\\"type\\\":\\\"ALLOW\\\"},\\\"customRequestHandling\\\" :null,\\\"customResponse\\\":null,\\\"overrideCustomerWebACLAssociation\\\" :false,\\\"loggingConfiguration\\\":{\\\"logDestinationConfigs\\\": [\\\"arn:aws:s3:::aws-waf-logs-example-bucket\\\"] ,\\\"redactedFields\\\":[],\\\"loggingFilterConfigs\\\":{\\\"defaultBehavior\\\":\\\"KEEP\\\", \\\"filters\\\":[{\\\"behavior\\\":\\\"KEEP\\\",\\\"requirement\\\":\\\"MEETS_ALL\\\", \\\"conditions\\\":[{\\\"actionCondition\\\":\\\"CAPTCHA\\\"},{\\\"actionCondition\\\": \\\"CHALLENGE\\\"}, {\\\"actionCondition\\\":\\\"EXCLUDED_AS_COUNT\\\"}]}]}},\\\"sampledRequestsEnabledForDefaultActions\\\":true}\" Firewall Manager supports Amazon Kinesis Data Firehose and Amazon S3 as the logDestinationConfigs in your loggingConfiguration. For information about WAF logging configurations, see LoggingConfiguration in the WAF API Reference In the loggingConfiguration, you can specify one logDestinationConfigs. Optionally provide as many as 20 redactedFields. The RedactedFieldType must be one of URI, QUERY_STRING, HEADER, or METHOD. Example: WAF Classic \"{\\\"ruleGroups\\\":[{\\\"id\\\":\\\"78cb36c0-1b5e-4d7d-82b2-cf48d3ad9659\\\",\\\"overrideAction\\\":{\\\"type\\\":\\\"NONE\\\"}}],\\\"overrideCustomerWebACLAssociation\\\":true,\\\"defaultAction\\\":{\\\"type\\\":\\\"ALLOW\\\"},\\\"type\\\":\\\"WAF\\\"}\""
        PolicyOption:
          $ref: "#/components/schemas/PolicyOption"
          description: Contains the settings to configure a network ACL policy, a Network Firewall firewall policy deployment model, or a third-party firewall policy.
      required:
        - Type
    ManagedServiceData:
      type: string
      minLength: 1
      maxLength: 30000
      pattern: ^((?!\\[nr]).)+
    PolicyOption:
      description: Contains the settings to configure a network ACL policy, a Network Firewall firewall policy deployment model, or a third-party firewall policy.
      type: object
      properties:
        NetworkFirewallPolicy:
          $ref: "#/components/schemas/NetworkFirewallPolicy"
          description: Defines the deployment model to use for the firewall policy.
        ThirdPartyFirewallPolicy:
          $ref: "#/components/schemas/ThirdPartyFirewallPolicy"
          description: Defines the policy options for a third-party firewall policy.
        NetworkAclCommonPolicy:
          $ref: "#/components/schemas/NetworkAclCommonPolicy"
          description: Defines a Firewall Manager network ACL policy.
    NetworkFirewallPolicy:
      description: Configures the firewall policy deployment model of Network Firewall. For information about Network Firewall deployment models, see Network Firewall example architectures with routing in the Network Firewall Developer Guide.
      type: object
      properties:
        FirewallDeploymentModel:
          $ref: "#/components/schemas/FirewallDeploymentModel"
          description: Defines the deployment model to use for the firewall policy. To use a distributed model, set PolicyOption to NULL.
    FirewallDeploymentModel:
      type: string
      enum:
        - CENTRALIZED
        - DISTRIBUTED
    ThirdPartyFirewallPolicy:
      description: Configures the deployment model for the third-party firewall.
      type: object
      properties:
        FirewallDeploymentModel:
          $ref: "#/components/schemas/FirewallDeploymentModel"
          description: Defines the deployment model to use for the third-party firewall policy.
    NetworkAclCommonPolicy:
      description: Defines a Firewall Manager network ACL policy. This is used in the PolicyOption of a SecurityServicePolicyData for a Policy, when the SecurityServicePolicyData type is set to NETWORK_ACL_COMMON. For information about network ACLs, see Control traffic to subnets using network ACLs in the Amazon Virtual Private Cloud User Guide.
      type: object
      properties:
        NetworkAclEntrySet:
          $ref: "#/components/schemas/NetworkAclEntrySet"
          description: The definition of the first and last rules for the network ACL policy.
      required:
        - NetworkAclEntrySet
    NetworkAclEntrySet:
      description: The configuration of the first and last rules for the network ACL policy, and the remediation settings for each.
      type: object
      properties:
        FirstEntries:
          $ref: "#/components/schemas/NetworkAclEntries"
          description: The rules that you want to run first in the Firewall Manager managed network ACLs. Provide these in the order in which you want them to run. Firewall Manager will assign the specific rule numbers for you, in the network ACLs that it creates. You must specify at least one first entry or one last entry in any network ACL policy.
        ForceRemediateForFirstEntries:
          $ref: "#/components/schemas/BooleanObject"
          description: Applies only when remediation is enabled for the policy as a whole. Firewall Manager uses this setting when it finds policy violations that involve conflicts between the custom entries and the policy entries. If forced remediation is disabled, Firewall Manager marks the network ACL as noncompliant and does not try to remediate. For more information about the remediation behavior, see Remediation for managed network ACLs in the Firewall Manager Developer Guide.
        LastEntries:
          $ref: "#/components/schemas/NetworkAclEntries"
          description: The rules that you want to run last in the Firewall Manager managed network ACLs. Provide these in the order in which you want them to run. Firewall Manager will assign the specific rule numbers for you, in the network ACLs that it creates. You must specify at least one first entry or one last entry in any network ACL policy.
        ForceRemediateForLastEntries:
          $ref: "#/components/schemas/BooleanObject"
          description: Applies only when remediation is enabled for the policy as a whole. Firewall Manager uses this setting when it finds policy violations that involve conflicts between the custom entries and the policy entries. If forced remediation is disabled, Firewall Manager marks the network ACL as noncompliant and does not try to remediate. For more information about the remediation behavior, see Remediation for managed network ACLs in the Firewall Manager Developer Guide.
      required:
        - ForceRemediateForFirstEntries
        - ForceRemediateForLastEntries
    NetworkAclEntries:
      type: array
      items:
        $ref: "#/components/schemas/NetworkAclEntry"
    NetworkAclEntry:
      description: Describes a rule in a network ACL. Each network ACL has a set of numbered ingress rules and a separate set of numbered egress rules. When determining whether a packet should be allowed in or out of a subnet associated with the network ACL, Amazon Web Services processes the entries in the network ACL according to the rule numbers, in ascending order. When you manage an individual network ACL, you explicitly specify the rule numbers. When you specify the network ACL rules in a Firewall Manager policy, you provide the rules to run first, in the order that you want them to run, and the rules to run last, in the order that you want them to run. Firewall Manager assigns the rule numbers for you when you save the network ACL policy specification.
      type: object
      properties:
        IcmpTypeCode:
          $ref: "#/components/schemas/NetworkAclIcmpTypeCode"
          description: "ICMP protocol: The ICMP type and code."
        Protocol:
          $ref: "#/components/schemas/LengthBoundedString"
          description: The protocol number. A value of "-1" means all protocols.
        PortRange:
          $ref: "#/components/schemas/NetworkAclPortRange"
          description: "TCP or UDP protocols: The range of ports the rule applies to."
        CidrBlock:
          $ref: "#/components/schemas/LengthBoundedNonEmptyString"
          description: The IPv4 network range to allow or deny, in CIDR notation.
        Ipv6CidrBlock:
          $ref: "#/components/schemas/LengthBoundedNonEmptyString"
          description: The IPv6 network range to allow or deny, in CIDR notation.
        RuleAction:
          $ref: "#/components/schemas/NetworkAclRuleAction"
          description: Indicates whether to allow or deny the traffic that matches the rule.
        Egress:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether the rule is an egress, or outbound, rule (applied to traffic leaving the subnet). If it's not an egress rule, then it's an ingress, or inbound, rule.
      required:
        - Protocol
        - RuleAction
        - Egress
    NetworkAclIcmpTypeCode:
      description: "ICMP protocol: The ICMP type and code."
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/IntegerObject"
          description: ICMP code.
        Type:
          $ref: "#/components/schemas/IntegerObject"
          description: ICMP type.
    IntegerObject:
      type: integer
      minimum: -2147483648
      maximum: 2147483647
    LengthBoundedString:
      type: string
      minLength: 0
      maxLength: 1024
    NetworkAclPortRange:
      description: "TCP or UDP protocols: The range of ports the rule applies to."
      type: object
      properties:
        From:
          $ref: "#/components/schemas/IPPortNumberInteger"
          description: The beginning port number of the range.
        To:
          $ref: "#/components/schemas/IPPortNumberInteger"
          description: The ending port number of the range.
    IPPortNumberInteger:
      type: integer
      minimum: 0
      maximum: 65535
    LengthBoundedNonEmptyString:
      type: string
      minLength: 1
      maxLength: 1024
    NetworkAclRuleAction:
      type: string
      enum:
        - allow
        - deny
    BooleanObject:
      type: boolean
    ResourceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceTags:
      type: array
      items:
        $ref: "#/components/schemas/ResourceTag"
    ResourceTag:
      description: "The resource tags that Firewall Manager uses to determine if a particular resource should be included or excluded from the Firewall Manager policy. Tags enable you to categorize your Amazon Web Services resources in different ways, for example, by purpose, owner, or environment. Each tag consists of a key and an optional value. If you add more than one tag to a policy, you can specify whether to combine them using the logical AND operator or the logical OR operator. For more information, see Working with Tag Editor. Every resource tag must have a string value, either a non-empty string or an empty string. If you don't provide a value for a resource tag, Firewall Manager saves the value as an empty string: \"\". When Firewall Manager compares tags, it only matches two tags if they have the same key and the same value. A tag with an empty string value only matches with tags that also have an empty string value."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/ResourceTagKey"
          description: The resource tag key.
        Value:
          $ref: "#/components/schemas/ResourceTagValue"
          description: The resource tag value. To specify an empty string value, either don't provide this or specify it as "".
      required:
        - Key
    ResourceTagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:\/=+\-@*\\]*)$
    ResourceTagValue:
      type: string
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:\/=+\-@*\\]*)$
    ResourceSetIds:
      type: array
      items:
        $ref: "#/components/schemas/Base62Id"
    ResourceDescription:
      type: string
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    CustomerPolicyStatus:
      type: string
      enum:
        - ACTIVE
        - OUT_OF_ADMIN_SCOPE
    ResourceTagLogicalOperator:
      type: string
      enum:
        - AND
        - OR
    PaginationToken:
      type: string
      minLength: 1
      maxLength: 4096
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    PaginationMaxResults:
      type: integer
      minimum: 1
      maximum: 100
    GetProtectionStatusResponse:
      type: object
      properties:
        AdminAccountId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the Firewall Manager administrator account for this policy.
        ServiceType:
          $ref: "#/components/schemas/SecurityServiceType"
          description: The service type that is protected by the policy. Currently, this is always SHIELD_ADVANCED.
        Data:
          $ref: "#/components/schemas/ProtectionData"
          description: "Details about the attack, including the following: Attack type Account ID ARN of the resource attacked Start time of the attack End time of the attack (ongoing attacks will not have an end time) The details are in JSON format."
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: If you have more objects than the number that you specified for MaxResults in the request, the response includes a NextToken value. To list more objects, submit another GetProtectionStatus request, and specify the NextToken value from the response in the NextToken value in the next request. Amazon Web Services SDKs provide auto-pagination that identify NextToken in a response and make subsequent request calls automatically on your behalf. However, this feature is not supported by GetProtectionStatus. You must submit subsequent requests with NextToken using your own processes.
    ProtectionData:
      type: string
    GetProtocolsListResponse:
      type: object
      properties:
        ProtocolsList:
          $ref: "#/components/schemas/ProtocolsListData"
          description: Information about the specified Firewall Manager protocols list.
        ProtocolsListArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the specified protocols list.
    ProtocolsListData:
      description: An Firewall Manager protocols list.
      type: object
      properties:
        ListId:
          $ref: "#/components/schemas/ListId"
          description: The ID of the Firewall Manager protocols list.
        ListName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the Firewall Manager protocols list.
        ListUpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: A unique identifier for each update to the list. When you update the list, the update token must match the token of the current version of the application list. You can retrieve the update token by getting the list.
        CreateTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time that the Firewall Manager protocols list was created.
        LastUpdateTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The time that the Firewall Manager protocols list was last updated.
        ProtocolsList:
          $ref: "#/components/schemas/ProtocolsList"
          description: An array of protocols in the Firewall Manager protocols list.
        PreviousProtocolsList:
          type: object
          properties: {}
          description: A map of previous version numbers to their corresponding protocol arrays.
      required:
        - ListName
        - ProtocolsList
    ProtocolsList:
      type: array
      items:
        $ref: "#/components/schemas/Protocol"
    GetResourceSetResponse:
      type: object
      properties:
        ResourceSet:
          $ref: "#/components/schemas/ResourceSet"
          description: Information about the specified resource set.
        ResourceSetArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource set.
      required:
        - ResourceSet
        - ResourceSetArn
    ResourceSet:
      description: A set of resources to include in a policy.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Base62Id"
          description: A unique identifier for the resource set. This ID is returned in the responses to create and list commands. You provide it to operations like update and delete.
        Name:
          $ref: "#/components/schemas/Name"
          description: The descriptive name of the resource set. You can't change the name of a resource set after you create it.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of the resource set.
        UpdateToken:
          $ref: "#/components/schemas/UpdateToken"
          description: An optional token that you can use for optimistic locking. Firewall Manager returns a token to your requests that access the resource set. The token marks the state of the resource set resource at the time of the request. Update tokens are not allowed when creating a resource set. After creation, each subsequent update call to the resource set requires the update token. To make an unconditional change to the resource set, omit the token in your update request. Without the token, Firewall Manager performs your updates regardless of whether the resource set has changed since you last retrieved it. To make a conditional change to the resource set, provide the token in your update request. Firewall Manager uses the token to ensure that the resource set hasn't changed since you last retrieved it. If it has changed, the operation fails with an InvalidTokenException. If this happens, retrieve the resource set again to get a current copy of it with a new token. Reapply your changes as needed, then try the operation again using the new token.
        ResourceTypeList:
          $ref: "#/components/schemas/ResourceTypeList"
          description: Determines the resources that can be associated to the resource set. Depending on your setting for max results and the number of resource sets, a single call might not return the full list.
        LastUpdateTime:
          $ref: "#/components/schemas/TimeStamp"
          description: The last time that the resource set was changed.
        ResourceSetStatus:
          $ref: "#/components/schemas/ResourceSetStatus"
          description: Indicates whether the resource set is in or out of an admin's Region scope. ACTIVE - The administrator can manage and delete the resource set. OUT_OF_ADMIN_SCOPE - The administrator can view the resource set, but they can't edit or delete the resource set. Existing protections stay in place. Any new resource that come into scope of the resource set won't be protected.
      required:
        - Name
        - ResourceTypeList
    Name:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    Description:
      type: string
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    ResourceSetStatus:
      type: string
      enum:
        - ACTIVE
        - OUT_OF_ADMIN_SCOPE
    GetThirdPartyFirewallAssociationStatusResponse:
      type: object
      properties:
        ThirdPartyFirewallStatus:
          $ref: "#/components/schemas/ThirdPartyFirewallAssociationStatus"
          description: The current status for setting a Firewall Manager policy administrators account as an administrator of the third-party firewall tenant. ONBOARDING - The Firewall Manager policy administrator is being designated as a tenant administrator. ONBOARD_COMPLETE - The Firewall Manager policy administrator is designated as a tenant administrator. OFFBOARDING - The Firewall Manager policy administrator is being removed as a tenant administrator. OFFBOARD_COMPLETE - The Firewall Manager policy administrator has been removed as a tenant administrator. NOT_EXIST - The Firewall Manager policy administrator doesn't exist as a tenant administrator.
        MarketplaceOnboardingStatus:
          $ref: "#/components/schemas/MarketplaceSubscriptionOnboardingStatus"
          description: The status for subscribing to the third-party firewall vendor in the Amazon Web Services Marketplace. NO_SUBSCRIPTION - The Firewall Manager policy administrator isn't subscribed to the third-party firewall service in the Amazon Web Services Marketplace. NOT_COMPLETE - The Firewall Manager policy administrator is in the process of subscribing to the third-party firewall service in the Amazon Web Services Marketplace, but doesn't yet have an active subscription. COMPLETE - The Firewall Manager policy administrator has an active subscription to the third-party firewall service in the Amazon Web Services Marketplace.
    MarketplaceSubscriptionOnboardingStatus:
      type: string
      enum:
        - NO_SUBSCRIPTION
        - NOT_COMPLETE
        - COMPLETE
    GetViolationDetailsResponse:
      type: object
      properties:
        ViolationDetail:
          $ref: "#/components/schemas/ViolationDetail"
          description: Violation detail for a resource.
    ViolationDetail:
      description: Violations for a resource based on the specified Firewall Manager policy and Amazon Web Services account.
      type: object
      properties:
        PolicyId:
          $ref: "#/components/schemas/PolicyId"
          description: The ID of the Firewall Manager policy that the violation details were requested for.
        MemberAccount:
          $ref: "#/components/schemas/AWSAccountId"
          description: The Amazon Web Services account that the violation details were requested for.
        ResourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The resource ID that the violation details were requested for.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type that the violation details were requested for.
        ResourceViolations:
          $ref: "#/components/schemas/ResourceViolations"
          description: List of violations for the requested resource.
        ResourceTags:
          $ref: "#/components/schemas/TagList"
          description: The ResourceTag objects associated with the resource.
        ResourceDescription:
          $ref: "#/components/schemas/LengthBoundedString"
          description: Brief description for the requested resource.
      required:
        - PolicyId
        - MemberAccount
        - ResourceId
        - ResourceType
        - ResourceViolations
    ResourceViolations:
      type: array
      items:
        $ref: "#/components/schemas/ResourceViolation"
    ResourceViolation:
      description: Violation detail based on resource type.
      type: object
      properties:
        AwsVPCSecurityGroupViolation:
          $ref: "#/components/schemas/AwsVPCSecurityGroupViolation"
          description: Violation detail for security groups.
        AwsEc2NetworkInterfaceViolation:
          $ref: "#/components/schemas/AwsEc2NetworkInterfaceViolation"
          description: Violation detail for a network interface.
        AwsEc2InstanceViolation:
          $ref: "#/components/schemas/AwsEc2InstanceViolation"
          description: Violation detail for an EC2 instance.
        NetworkFirewallMissingFirewallViolation:
          $ref: "#/components/schemas/NetworkFirewallMissingFirewallViolation"
          description: Violation detail for an Network Firewall policy that indicates that a subnet has no Firewall Manager managed firewall in its VPC.
        NetworkFirewallMissingSubnetViolation:
          $ref: "#/components/schemas/NetworkFirewallMissingSubnetViolation"
          description: Violation detail for an Network Firewall policy that indicates that an Availability Zone is missing the expected Firewall Manager managed subnet.
        NetworkFirewallMissingExpectedRTViolation:
          $ref: "#/components/schemas/NetworkFirewallMissingExpectedRTViolation"
          description: Violation detail for an Network Firewall policy that indicates that a subnet is not associated with the expected Firewall Manager managed route table.
        NetworkFirewallPolicyModifiedViolation:
          $ref: "#/components/schemas/NetworkFirewallPolicyModifiedViolation"
          description: Violation detail for an Network Firewall policy that indicates that a firewall policy in an individual account has been modified in a way that makes it noncompliant. For example, the individual account owner might have deleted a rule group, changed the priority of a stateless rule group, or changed a policy default action.
        NetworkFirewallInternetTrafficNotInspectedViolation:
          $ref: "#/components/schemas/NetworkFirewallInternetTrafficNotInspectedViolation"
          description: Violation detail for the subnet for which internet traffic hasn't been inspected.
        NetworkFirewallInvalidRouteConfigurationViolation:
          $ref: "#/components/schemas/NetworkFirewallInvalidRouteConfigurationViolation"
          description: The route configuration is invalid.
        NetworkFirewallBlackHoleRouteDetectedViolation:
          $ref: "#/components/schemas/NetworkFirewallBlackHoleRouteDetectedViolation"
        NetworkFirewallUnexpectedFirewallRoutesViolation:
          $ref: "#/components/schemas/NetworkFirewallUnexpectedFirewallRoutesViolation"
          description: There's an unexpected firewall route.
        NetworkFirewallUnexpectedGatewayRoutesViolation:
          $ref: "#/components/schemas/NetworkFirewallUnexpectedGatewayRoutesViolation"
          description: There's an unexpected gateway route.
        NetworkFirewallMissingExpectedRoutesViolation:
          $ref: "#/components/schemas/NetworkFirewallMissingExpectedRoutesViolation"
          description: Expected routes are missing from Network Firewall.
        DnsRuleGroupPriorityConflictViolation:
          $ref: "#/components/schemas/DnsRuleGroupPriorityConflictViolation"
          description: Violation detail for a DNS Firewall policy that indicates that a rule group that Firewall Manager tried to associate with a VPC has the same priority as a rule group that's already associated.
        DnsDuplicateRuleGroupViolation:
          $ref: "#/components/schemas/DnsDuplicateRuleGroupViolation"
          description: Violation detail for a DNS Firewall policy that indicates that a rule group that Firewall Manager tried to associate with a VPC is already associated with the VPC and can't be associated again.
        DnsRuleGroupLimitExceededViolation:
          $ref: "#/components/schemas/DnsRuleGroupLimitExceededViolation"
          description: Violation detail for a DNS Firewall policy that indicates that the VPC reached the limit for associated DNS Firewall rule groups. Firewall Manager tried to associate another rule group with the VPC and failed.
        FirewallSubnetIsOutOfScopeViolation:
          $ref: "#/components/schemas/FirewallSubnetIsOutOfScopeViolation"
          description: Contains details about the firewall subnet that violates the policy scope.
        RouteHasOutOfScopeEndpointViolation:
          $ref: "#/components/schemas/RouteHasOutOfScopeEndpointViolation"
          description: Contains details about the route endpoint that violates the policy scope.
        ThirdPartyFirewallMissingFirewallViolation:
          $ref: "#/components/schemas/ThirdPartyFirewallMissingFirewallViolation"
          description: The violation details for a third-party firewall that's been deleted.
        ThirdPartyFirewallMissingSubnetViolation:
          $ref: "#/components/schemas/ThirdPartyFirewallMissingSubnetViolation"
          description: The violation details for a third-party firewall's subnet that's been deleted.
        ThirdPartyFirewallMissingExpectedRouteTableViolation:
          $ref: "#/components/schemas/ThirdPartyFirewallMissingExpectedRouteTableViolation"
          description: The violation details for a third-party firewall that has the Firewall Manager managed route table that was associated with the third-party firewall has been deleted.
        FirewallSubnetMissingVPCEndpointViolation:
          $ref: "#/components/schemas/FirewallSubnetMissingVPCEndpointViolation"
          description: The violation details for a third-party firewall's VPC endpoint subnet that was deleted.
        InvalidNetworkAclEntriesViolation:
          $ref: "#/components/schemas/InvalidNetworkAclEntriesViolation"
          description: Violation detail for the entries in a network ACL resource.
        PossibleRemediationActions:
          $ref: "#/components/schemas/PossibleRemediationActions"
          description: A list of possible remediation action lists. Each individual possible remediation action is a list of individual remediation actions.
        WebACLHasIncompatibleConfigurationViolation:
          $ref: "#/components/schemas/WebACLHasIncompatibleConfigurationViolation"
          description: The violation details for a web ACL whose configuration is incompatible with the Firewall Manager policy.
        WebACLHasOutOfScopeResourcesViolation:
          $ref: "#/components/schemas/WebACLHasOutOfScopeResourcesViolation"
          description: The violation details for a web ACL that's associated with at least one resource that's out of scope of the Firewall Manager policy.
    AwsVPCSecurityGroupViolation:
      description: Violation detail for the rule violation in a security group when compared to the primary security group of the Firewall Manager policy.
      type: object
      properties:
        ViolationTarget:
          $ref: "#/components/schemas/ViolationTarget"
          description: The security group rule that is being evaluated.
        ViolationTargetDescription:
          $ref: "#/components/schemas/LengthBoundedString"
          description: A description of the security group that violates the policy.
        PartialMatches:
          $ref: "#/components/schemas/PartialMatches"
          description: List of rules specified in the security group of the Firewall Manager policy that partially match the ViolationTarget rule.
        PossibleSecurityGroupRemediationActions:
          $ref: "#/components/schemas/SecurityGroupRemediationActions"
          description: Remediation options for the rule specified in the ViolationTarget.
    ViolationTarget:
      type: string
