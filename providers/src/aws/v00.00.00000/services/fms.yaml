          $ref: "#/components/schemas/ResourceId"
          description: The resource ID of the rule group.
        Priority:
          $ref: "#/components/schemas/StatelessRuleGroupPriority"
          description: The priority of the rule group. Network Firewall evaluates the stateless rule groups in a firewall policy starting from the lowest priority setting.
    NetworkFirewallResourceName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9-]+$
    StatelessRuleGroupPriority:
      type: integer
      minimum: 1
      maximum: 65535
    NetworkFirewallActionList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkFirewallAction"
    NetworkFirewallAction:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9]+$
    StatefulRuleGroupList:
      type: array
      items:
        $ref: "#/components/schemas/StatefulRuleGroup"
    StatefulRuleGroup:
      description: Network Firewall stateful rule group, used in a NetworkFirewallPolicyDescription.
      type: object
      properties:
        RuleGroupName:
          $ref: "#/components/schemas/NetworkFirewallResourceName"
          description: The name of the rule group.
        ResourceId:
          $ref: "#/components/schemas/ResourceId"
          description: The resource ID of the rule group.
        Priority:
          $ref: "#/components/schemas/PriorityNumber"
          description: An integer setting that indicates the order in which to run the stateful rule groups in a single Network Firewall firewall policy. This setting only applies to firewall policies that specify the STRICT_ORDER rule order in the stateful engine options settings. Network Firewall evalutes each stateful rule group against a packet starting with the group that has the lowest priority setting. You must ensure that the priority settings are unique within each policy. For information about You can change the priority settings of your rule groups at any time. To make it easier to insert rule groups later, number them so there's a wide range in between, for example use 100, 200, and so on.
        Override:
          $ref: "#/components/schemas/NetworkFirewallStatefulRuleGroupOverride"
          description: The action that allows the policy owner to override the behavior of the rule group within a policy.
    PriorityNumber:
      type: integer
    NetworkFirewallStatefulRuleGroupOverride:
      description: The setting that allows the policy owner to change the behavior of the rule group within a policy.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/NetworkFirewallOverrideAction"
          description: The action that changes the rule group from DROP to ALERT. This only applies to managed rule groups.
    NetworkFirewallOverrideAction:
      type: string
      enum:
        - DROP_TO_ALERT
    StatefulEngineOptions:
      description: Configuration settings for the handling of the stateful rule groups in a Network Firewall firewall policy.
      type: object
      properties:
        RuleOrder:
          $ref: "#/components/schemas/RuleOrder"
          description: "Indicates how to manage the order of stateful rule evaluation for the policy. Stateful rules are provided to the rule engine as Suricata compatible strings, and Suricata evaluates them based on certain settings. For more information, see Evaluation order for stateful rules in the Network Firewall Developer Guide. Default: DEFAULT_ACTION_ORDER"
        StreamExceptionPolicy:
          $ref: "#/components/schemas/StreamExceptionPolicy"
          description: "Indicates how Network Firewall should handle traffic when a network connection breaks midstream. DROP - Fail closed and drop all subsequent traffic going to the firewall. CONTINUE - Continue to apply rules to subsequent traffic without context from traffic before the break. This impacts the behavior of rules that depend on context. For example, with a stateful rule that drops HTTP traffic, Network Firewall won't match subsequent traffic because the it won't have the context from session initialization, which defines the application layer protocol as HTTP. However, a TCP-layer rule using a flow:stateless rule would still match, and so would the aws:drop_strict default action. REJECT - Fail closed and drop all subsequent traffic going to the firewall. With this option, Network Firewall also sends a TCP reject packet back to the client so the client can immediately establish a new session. With the new session, Network Firewall will have context and will apply rules appropriately. For applications that are reliant on long-lived TCP connections that trigger Gateway Load Balancer idle timeouts, this is the recommended setting. FMS_IGNORE - Firewall Manager doesn't monitor or modify the Network Firewall stream exception policy settings. For more information, see Stream exception policy in your firewall policy in the Network Firewall Developer Guide. Default: FMS_IGNORE"
    RuleOrder:
      type: string
      enum:
        - STRICT_ORDER
        - DEFAULT_ACTION_ORDER
    StreamExceptionPolicy:
      type: string
      enum:
        - DROP
        - CONTINUE
        - REJECT
        - FMS_IGNORE
