          $ref: "#/components/schemas/IntegerObjectMinimum0"
          description: The rule number for the entry. ACL entries are processed in ascending order by rule number. In a Firewall Manager network ACL policy, Firewall Manager assigns rule numbers.
        EntryType:
          $ref: "#/components/schemas/EntryType"
          description: Specifies whether the entry is managed by Firewall Manager or by a user, and, for Firewall Manager-managed entries, specifies whether the entry is among those that run first in the network ACL or those that run last.
