        PrimaryWorkspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the standby WorkSpace.
        VolumeEncryptionKey:
          $ref: "#/components/schemas/VolumeEncryptionKey"
          description: The volume encryption key of the standby WorkSpace.
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier of the directory for the standby WorkSpace.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the standby WorkSpace.
        DataReplication:
          $ref: "#/components/schemas/DataReplication"
          description: Indicates whether data replication is enabled, and if enabled, the type of data replication.
      required:
        - PrimaryWorkspaceId
        - DirectoryId
    VolumeEncryptionKey:
      type: string
    DataReplication:
      type: string
      enum:
        - NO_REPLICATION
        - PRIMARY_AS_SOURCE
    CreateStandbyWorkspacesResult:
      type: object
      properties:
        FailedStandbyRequests:
          $ref: "#/components/schemas/FailedCreateStandbyWorkspacesRequestList"
          description: Information about the standby WorkSpace that could not be created.
        PendingStandbyRequests:
          $ref: "#/components/schemas/PendingCreateStandbyWorkspacesRequestList"
          description: Information about the standby WorkSpace that was created.
    FailedCreateStandbyWorkspacesRequestList:
      type: array
      items:
        $ref: "#/components/schemas/FailedCreateStandbyWorkspacesRequest"
    FailedCreateStandbyWorkspacesRequest:
      description: Describes the standby WorkSpace that could not be created.
