    WorkspaceProperties:
      description: Describes a WorkSpace.
      type: object
      properties:
        RunningMode:
          $ref: "#/components/schemas/RunningMode"
          description: The running mode. For more information, see Manage the WorkSpace Running Mode. The MANUAL value is only supported by Amazon WorkSpaces Core. Contact your account team to be allow-listed to use this value. For more information, see Amazon WorkSpaces Core. Review your running mode to ensure you are using one that is optimal for your needs and budget. For more information on switching running modes, see Can I switch between hourly and monthly billing?
        RunningModeAutoStopTimeoutInMinutes:
          $ref: "#/components/schemas/RunningModeAutoStopTimeoutInMinutes"
