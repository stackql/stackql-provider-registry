    WorkspaceDirectory:
      description: Describes a directory that is used with Amazon WorkSpaces.
      type: object
      properties:
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The directory identifier.
        Alias:
          $ref: "#/components/schemas/Alias"
          description: The directory alias.
        DirectoryName:
          $ref: "#/components/schemas/DirectoryName"
          description: The name of the directory.
        RegistrationCode:
          $ref: "#/components/schemas/RegistrationCode"
          description: The registration code for the directory. This is the code that users enter in their Amazon WorkSpaces client application to connect to the directory.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The identifiers of the subnets used with the directory.
        DnsIpAddresses:
          $ref: "#/components/schemas/DnsIpAddresses"
          description: The IP addresses of the DNS servers for the directory.
        DnsIpv6Addresses:
          $ref: "#/components/schemas/DnsIpv6Addresses"
          description: The IPv6 addresses of the DNS servers for the directory.
        CustomerUserName:
          $ref: "#/components/schemas/UserName"
          description: The user name for the service account.
        IamRoleId:
          $ref: "#/components/schemas/ARN"
          description: The identifier of the IAM role. This is the role that allows Amazon WorkSpaces to make calls to other services, such as Amazon EC2, on your behalf.
        DirectoryType:
          $ref: "#/components/schemas/WorkspaceDirectoryType"
          description: The directory type.
        WorkspaceSecurityGroupId:
          $ref: "#/components/schemas/SecurityGroupId"
          description: The identifier of the security group that is assigned to new WorkSpaces.
        State:
          $ref: "#/components/schemas/WorkspaceDirectoryState"
          description: The state of the directory's registration with Amazon WorkSpaces. After a directory is deregistered, the DEREGISTERED state is returned very briefly before the directory metadata is cleaned up, so this state is rarely returned. To confirm that a directory is deregistered, check for the directory ID by using DescribeWorkspaceDirectories. If the directory ID isn't returned, then the directory has been successfully deregistered.
        WorkspaceCreationProperties:
          $ref: "#/components/schemas/DefaultWorkspaceCreationProperties"
          description: The default creation properties for all WorkSpaces in the directory.
        ipGroupIds:
          $ref: "#/components/schemas/IpGroupIdList"
          description: The identifiers of the IP access control groups associated with the directory.
        WorkspaceAccessProperties:
          $ref: "#/components/schemas/WorkspaceAccessProperties"
          description: The devices and operating systems that users can use to access WorkSpaces.
        Tenancy:
          $ref: "#/components/schemas/Tenancy"
          description: Specifies whether the directory is dedicated or shared. To use Bring Your Own License (BYOL), this value must be set to DEDICATED. For more information, see Bring Your Own Windows Desktop Images.
        SelfservicePermissions:
          $ref: "#/components/schemas/SelfservicePermissions"
          description: The default self-service permissions for WorkSpaces in the directory.
        SamlProperties:
          $ref: "#/components/schemas/SamlProperties"
          description: Describes the enablement status, user access URL, and relay state parameter name that are used for configuring federation with an SAML 2.0 identity provider.
        CertificateBasedAuthProperties:
          $ref: "#/components/schemas/CertificateBasedAuthProperties"
          description: The certificate-based authentication properties used to authenticate SAML 2.0 Identity Provider (IdP) user identities to Active Directory for WorkSpaces login.
        EndpointEncryptionMode:
          $ref: "#/components/schemas/EndpointEncryptionMode"
          description: Endpoint encryption mode that allows you to configure the specified directory between Standard TLS and FIPS 140-2 validated mode.
        MicrosoftEntraConfig:
          $ref: "#/components/schemas/MicrosoftEntraConfig"
          description: Specifies details about Microsoft Entra configurations.
        WorkspaceDirectoryName:
          $ref: "#/components/schemas/WorkspaceDirectoryName"
          description: The name fo the WorkSpace directory.
        WorkspaceDirectoryDescription:
          $ref: "#/components/schemas/WorkspaceDirectoryDescription"
          description: The description of the WorkSpace directory
        UserIdentityType:
          $ref: "#/components/schemas/UserIdentityType"
          description: Indicates the identity type of the specifired user.
        WorkspaceType:
          $ref: "#/components/schemas/WorkspaceType"
          description: Indicates whether the directory's WorkSpace type is personal or pools.
        IDCConfig:
          $ref: "#/components/schemas/IDCConfig"
          description: Specifies details about identity center configurations.
        ActiveDirectoryConfig:
          $ref: "#/components/schemas/ActiveDirectoryConfig"
          description: Information about the Active Directory config.
        StreamingProperties:
          $ref: "#/components/schemas/StreamingProperties"
          description: The streaming properties to configure.
        ErrorMessage:
          $ref: "#/components/schemas/Description"
          description: The error message returned.
    Alias:
