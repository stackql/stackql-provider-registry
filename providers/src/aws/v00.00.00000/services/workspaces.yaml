          description: The size of the root volume. For important information about how to modify the size of the root and user volumes, see Modify a WorkSpace.
        UserVolumeSizeGib:
          $ref: "#/components/schemas/UserVolumeSizeGib"
          description: The size of the user storage. For important information about how to modify the size of the root and user volumes, see Modify a WorkSpace.
        ComputeTypeName:
