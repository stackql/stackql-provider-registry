          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.TerminateWorkspacesPoolSession
            default: WorkspacesService.TerminateWorkspacesPoolSession
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SessionId:
                  $ref: "#/components/schemas/AmazonUuid"
                  description: The identifier of the pool session.
              required:
                - SessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminateWorkspacesPoolSessionResult"
  /UpdateConnectClientAddIn:
    post:
      operationId: UpdateConnectClientAddIn
      description: Updates a Amazon Connect client add-in. Use this action to update the name and endpoint URL of a Amazon Connect client add-in.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.UpdateConnectClientAddIn
            default: WorkspacesService.UpdateConnectClientAddIn
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AddInId:
                  $ref: "#/components/schemas/AmazonUuid"
                  description: The identifier of the client add-in to update.
                ResourceId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The directory identifier for which the client add-in is configured.
                Name:
                  $ref: "#/components/schemas/AddInName"
                  description: The name of the client add-in.
                URL:
                  $ref: "#/components/schemas/AddInUrl"
                  description: The endpoint URL of the Amazon Connect client add-in.
              required:
                - AddInId
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectClientAddInResult"
  /UpdateConnectionAliasPermission:
    post:
      operationId: UpdateConnectionAliasPermission
      description: Shares or unshares a connection alias with one account by specifying whether that account has permission to associate the connection alias with a directory. If the association permission is granted, the connection alias is shared with that account. If the association permission is revoked, the connection alias is unshared with the account. For more information, see Cross-Region Redirection for Amazon WorkSpaces. Before performing this operation, call DescribeConnectionAliases to make sure that the current state of the connection alias is CREATED. To delete a connection alias that has been shared, the shared account must first disassociate the connection alias from any directories it has been associated with. Then you must unshare the connection alias from the account it has been shared with. You can delete a connection alias only after it is no longer shared with any accounts or associated with any directories.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.UpdateConnectionAliasPermission
            default: WorkspacesService.UpdateConnectionAliasPermission
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AliasId:
                  $ref: "#/components/schemas/ConnectionAliasId"
                  description: The identifier of the connection alias that you want to update permissions for.
                ConnectionAliasPermission:
                  $ref: "#/components/schemas/ConnectionAliasPermission"
                  description: Indicates whether to share or unshare the connection alias with the specified Amazon Web Services account.
              required:
                - AliasId
                - ConnectionAliasPermission
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectionAliasPermissionResult"
  /UpdateRulesOfIpGroup:
    post:
      operationId: UpdateRulesOfIpGroup
      description: Replaces the current rules of the specified IP access control group with the specified rules.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.UpdateRulesOfIpGroup
            default: WorkspacesService.UpdateRulesOfIpGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GroupId:
                  $ref: "#/components/schemas/IpGroupId"
                  description: The identifier of the group.
                UserRules:
                  $ref: "#/components/schemas/IpRuleList"
                  description: One or more rules.
              required:
                - GroupId
                - UserRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRulesOfIpGroupResult"
  /UpdateWorkspaceBundle:
    post:
      operationId: UpdateWorkspaceBundle
      description: Updates a WorkSpace bundle with a new image. For more information about updating WorkSpace bundles, see Update a Custom WorkSpaces Bundle. Existing WorkSpaces aren't automatically updated when you update the bundle that they're based on. To update existing WorkSpaces that are based on a bundle that you've updated, you must either rebuild the WorkSpaces or delete and recreate them.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.UpdateWorkspaceBundle
            default: WorkspacesService.UpdateWorkspaceBundle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BundleId:
                  $ref: "#/components/schemas/BundleId"
                  description: The identifier of the bundle.
                ImageId:
                  $ref: "#/components/schemas/WorkspaceImageId"
                  description: The identifier of the image.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceBundleResult"
  /UpdateWorkspaceImagePermission:
    post:
      operationId: UpdateWorkspaceImagePermission
      description: Shares or unshares an image with one account in the same Amazon Web Services Region by specifying whether that account has permission to copy the image. If the copy image permission is granted, the image is shared with that account. If the copy image permission is revoked, the image is unshared with the account. After an image has been shared, the recipient account can copy the image to other Regions as needed. In the China (Ningxia) Region, you can copy images only within the same Region. In Amazon Web Services GovCloud (US), to copy images to and from other Regions, contact Amazon Web Services Support. For more information about sharing images, see Share or Unshare a Custom WorkSpaces Image. To delete an image that has been shared, you must unshare the image before you delete it. Sharing Bring Your Own License (BYOL) images across Amazon Web Services accounts isn't supported at this time in Amazon Web Services GovCloud (US). To share BYOL images across accounts in Amazon Web Services GovCloud (US), contact Amazon Web Services Support.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.UpdateWorkspaceImagePermission
            default: WorkspacesService.UpdateWorkspaceImagePermission
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ImageId:
                  $ref: "#/components/schemas/WorkspaceImageId"
                  description: The identifier of the image.
                AllowCopyImage:
                  $ref: "#/components/schemas/BooleanObject"
                  description: The permission to copy the image. This permission can be revoked only after an image has been shared.
                SharedAccountId:
                  $ref: "#/components/schemas/AwsAccount"
                  description: The identifier of the Amazon Web Services account to share or unshare the image with. Before sharing the image, confirm that you are sharing to the correct Amazon Web Services account ID.
              required:
                - ImageId
                - AllowCopyImage
                - SharedAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceImagePermissionResult"
  /UpdateWorkspacesPool:
    post:
      operationId: UpdateWorkspacesPool
      description: Updates the specified pool.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.UpdateWorkspacesPool
            default: WorkspacesService.UpdateWorkspacesPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PoolId:
                  $ref: "#/components/schemas/WorkspacesPoolId"
                  description: The identifier of the specified pool to update.
                Description:
                  $ref: "#/components/schemas/UpdateDescription"
                  description: Describes the specified pool to update.
                BundleId:
                  $ref: "#/components/schemas/BundleId"
                  description: The identifier of the bundle.
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory.
                Capacity:
                  $ref: "#/components/schemas/Capacity"
                  description: The desired capacity for the pool.
                ApplicationSettings:
                  $ref: "#/components/schemas/ApplicationSettingsRequest"
                  description: The persistent application settings for users in the pool.
                TimeoutSettings:
                  $ref: "#/components/schemas/TimeoutSettings"
                  description: Indicates the timeout settings of the specified pool.
                RunningMode:
                  $ref: "#/components/schemas/PoolsRunningMode"
                  description: The desired running mode for the pool. The running mode can only be updated when the pool is in a stopped state.
              required:
                - PoolId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspacesPoolResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LinkId:
      type: string
      pattern: ^link-.{8,24}$
    ClientToken:
      type: string
      pattern: ^.{1,64}$
    AcceptAccountLinkInvitationResult:
      type: object
      properties:
        AccountLink:
          $ref: "#/components/schemas/AccountLink"
          description: Information about the account link.
    AccountLink:
      description: Information about about the account link.
      type: object
      properties:
        AccountLinkId:
          $ref: "#/components/schemas/LinkId"
          description: The identifier of the account link.
        AccountLinkStatus:
          $ref: "#/components/schemas/AccountLinkStatusEnum"
          description: The status of the account link.
        SourceAccountId:
          $ref: "#/components/schemas/AwsAccount"
          description: The identifier of the source account.
        TargetAccountId:
          $ref: "#/components/schemas/AwsAccount"
          description: The identifier of the target account.
    AccountLinkStatusEnum:
      type: string
      enum:
        - LINKED
        - LINKING_FAILED
        - LINK_NOT_FOUND
        - PENDING_ACCEPTANCE_BY_TARGET_ACCOUNT
        - REJECTED
    AwsAccount:
      type: string
      pattern: ^\d{12}$
    ConnectionAliasId:
      type: string
      minLength: 13
      maxLength: 68
      pattern: ^wsca-[0-9a-z]{8,63}$
    NonEmptyString:
      type: string
      minLength: 1
    AssociateConnectionAliasResult:
      type: object
      properties:
        ConnectionIdentifier:
          $ref: "#/components/schemas/ConnectionIdentifier"
          description: The identifier of the connection alias association. You use the connection identifier in the DNS TXT record when you're configuring your DNS routing policies.
    ConnectionIdentifier:
      type: string
      minLength: 1
      maxLength: 20
      pattern: ^[a-zA-Z0-9]+$
    DirectoryId:
      type: string
      minLength: 10
      maxLength: 65
      pattern: ^(d-[0-9a-f]{8,63}$)|(wsd-[0-9a-z]{8,63}$)
    IpGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/IpGroupId"
    IpGroupId:
      type: string
      pattern: wsipg-[0-9a-z]{8,63}$
    AssociateIpGroupsResult:
      type: object
    WorkspaceId:
      type: string
      pattern: ^ws-[0-9a-z]{8,63}$
    WorkSpaceApplicationId:
      type: string
      pattern: ^wsa-[0-9a-z]{8,63}$
    AssociateWorkspaceApplicationResult:
      type: object
      properties:
        Association:
          $ref: "#/components/schemas/WorkspaceResourceAssociation"
          description: Information about the association between the specified WorkSpace and the specified application.
    WorkspaceResourceAssociation:
      description: Describes the association between an application and a WorkSpace resource.
      type: object
      properties:
        AssociatedResourceId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the associated resource.
        AssociatedResourceType:
          $ref: "#/components/schemas/WorkSpaceAssociatedResourceType"
          description: The resource types of the associated resource.
        Created:
          $ref: "#/components/schemas/Timestamp"
          description: The time the association is created.
        LastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the association status was last updated.
        State:
          $ref: "#/components/schemas/AssociationState"
          description: The status of the WorkSpace resource association.
        StateReason:
          $ref: "#/components/schemas/AssociationStateReason"
          description: The reason the association deployment failed.
        WorkspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the WorkSpace.
    WorkSpaceAssociatedResourceType:
      type: string
      enum:
        - APPLICATION
    Timestamp:
      type: string
      format: date-time
    AssociationState:
      type: string
      enum:
        - PENDING_INSTALL
        - PENDING_INSTALL_DEPLOYMENT
        - PENDING_UNINSTALL
        - PENDING_UNINSTALL_DEPLOYMENT
        - INSTALLING
        - UNINSTALLING
        - ERROR
        - COMPLETED
        - REMOVED
    AssociationStateReason:
      description: Indicates the reason that the association deployment failed, including the error code and error message.
      type: object
      properties:
        ErrorCode:
          $ref: "#/components/schemas/AssociationErrorCode"
          description: The error code of the association deployment failure.
        ErrorMessage:
          $ref: "#/components/schemas/String2048"
          description: The error message of the association deployment failure.
    AssociationErrorCode:
      type: string
      enum:
        - ValidationError.InsufficientDiskSpace
        - ValidationError.InsufficientMemory
        - ValidationError.UnsupportedOperatingSystem
        - DeploymentError.InternalServerError
        - DeploymentError.WorkspaceUnreachable
        - ValidationError.ApplicationOldVersionExists
    String2048:
      type: string
      minLength: 0
      maxLength: 2048
    IpRuleList:
      type: array
      items:
        $ref: "#/components/schemas/IpRuleItem"
    IpRuleItem:
      description: Describes a rule for an IP access control group.
      type: object
      properties:
        ipRule:
          $ref: "#/components/schemas/IpRule"
          description: The IP address range, in CIDR notation.
        ruleDesc:
          $ref: "#/components/schemas/IpRuleDesc"
          description: The description.
    IpRule:
      type: string
    IpRuleDesc:
      type: string
    AuthorizeIpRulesResult:
      type: object
    WorkspaceImageName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9_./()\\-]+$
    WorkspaceImageDescription:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^[a-zA-Z0-9_./() -]+$
    WorkspaceImageId:
      type: string
      pattern: wsi-[0-9a-z]{9,63}$
    Region:
      type: string
      minLength: 1
      maxLength: 31
      pattern: ^[-0-9a-z]{1,31}$
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Describes a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 127
    TagValue:
      type: string
      maxLength: 255
    CopyWorkspaceImageResult:
      type: object
      properties:
        ImageId:
          $ref: "#/components/schemas/WorkspaceImageId"
          description: The identifier of the image.
    CreateAccountLinkInvitationResult:
      type: object
      properties:
        AccountLink:
          $ref: "#/components/schemas/AccountLink"
          description: Information about the account link.
    AddInName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^.*$
    AddInUrl:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^(http|https)\://\S+
    CreateConnectClientAddInResult:
      type: object
      properties:
        AddInId:
          $ref: "#/components/schemas/AmazonUuid"
          description: The client add-in identifier.
    AmazonUuid:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    ConnectionString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[.0-9a-zA-Z\-]{1,255}$
    CreateConnectionAliasResult:
      type: object
      properties:
        AliasId:
          $ref: "#/components/schemas/ConnectionAliasId"
          description: The identifier of the connection alias.
    IpGroupName:
      type: string
    IpGroupDesc:
      type: string
    CreateIpGroupResult:
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/IpGroupId"
          description: The identifier of the group.
    StandbyWorkspacesList:
      type: array
      items:
        $ref: "#/components/schemas/StandbyWorkspace"
    StandbyWorkspace:
