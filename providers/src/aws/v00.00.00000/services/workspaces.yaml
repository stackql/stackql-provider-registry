openapi: 3.0.0
info:
  version: "2015-04-08"
  title: Amazon WorkSpaces
  description: Amazon WorkSpaces
  x-serviceName: workspaces
  x-serviceAlias: workspaces
  x-protocol: json
  x-apiVersion: "2015-04-08"
  x-endpointPrefix: workspaces
  x-targetPrefix: WorkspacesService
  x-jsonVersion: "1.1"
servers:
  - url: https://workspaces.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for workspaces
paths:
  /AcceptAccountLinkInvitation:
    post:
      operationId: AcceptAccountLinkInvitation
      description: Accepts the account link invitation. There's currently no unlinking capability after you accept the account linking invitation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.AcceptAccountLinkInvitation
            default: WorkspacesService.AcceptAccountLinkInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LinkId:
                  $ref: "#/components/schemas/LinkId"
                  description: The identifier of the account link.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A string of up to 64 ASCII characters that Amazon WorkSpaces uses to ensure idempotent creation.
              required:
                - LinkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAccountLinkInvitationResult"
  /AssociateConnectionAlias:
    post:
      operationId: AssociateConnectionAlias
      description: Associates the specified connection alias with the specified directory to enable cross-Region redirection. For more information, see Cross-Region Redirection for Amazon WorkSpaces. Before performing this operation, call DescribeConnectionAliases to make sure that the current state of the connection alias is CREATED.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.AssociateConnectionAlias
            default: WorkspacesService.AssociateConnectionAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AliasId:
                  $ref: "#/components/schemas/ConnectionAliasId"
                  description: The identifier of the connection alias.
                ResourceId:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The identifier of the directory to associate the connection alias with.
              required:
                - AliasId
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateConnectionAliasResult"
  /AssociateIpGroups:
    post:
      operationId: AssociateIpGroups
      description: Associates the specified IP access control group with the specified directory.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.AssociateIpGroups
            default: WorkspacesService.AssociateIpGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory.
                GroupIds:
                  $ref: "#/components/schemas/IpGroupIdList"
                  description: The identifiers of one or more IP access control groups.
              required:
                - DirectoryId
                - GroupIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateIpGroupsResult"
  /AssociateWorkspaceApplication:
    post:
      operationId: AssociateWorkspaceApplication
      description: Associates the specified application to the specified WorkSpace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.AssociateWorkspaceApplication
            default: WorkspacesService.AssociateWorkspaceApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                WorkspaceId:
                  $ref: "#/components/schemas/WorkspaceId"
                  description: The identifier of the WorkSpace.
                ApplicationId:
                  $ref: "#/components/schemas/WorkSpaceApplicationId"
                  description: The identifier of the application.
              required:
                - WorkspaceId
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWorkspaceApplicationResult"
  /AuthorizeIpRules:
    post:
      operationId: AuthorizeIpRules
      description: Adds one or more rules to the specified IP access control group. This action gives users permission to access their WorkSpaces from the CIDR address ranges specified in the rules.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.AuthorizeIpRules
            default: WorkspacesService.AuthorizeIpRules
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GroupId:
                  $ref: "#/components/schemas/IpGroupId"
                  description: The identifier of the group.
                UserRules:
                  $ref: "#/components/schemas/IpRuleList"
                  description: The rules to add to the group.
              required:
                - GroupId
                - UserRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeIpRulesResult"
  /CopyWorkspaceImage:
    post:
      operationId: CopyWorkspaceImage
      description: Copies the specified image from the specified Region to the current Region. For more information about copying images, see Copy a Custom WorkSpaces Image. In the China (Ningxia) Region, you can copy images only within the same Region. In Amazon Web Services GovCloud (US), to copy images to and from other Regions, contact Amazon Web Services Support. Before copying a shared image, be sure to verify that it has been shared from the correct Amazon Web Services account. To determine if an image has been shared and to see the ID of the Amazon Web Services account that owns an image, use the DescribeWorkSpaceImages and DescribeWorkspaceImagePermissions API operations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CopyWorkspaceImage
            default: WorkspacesService.CopyWorkspaceImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/WorkspaceImageName"
                  description: The name of the image.
                Description:
                  $ref: "#/components/schemas/WorkspaceImageDescription"
                  description: A description of the image.
                SourceImageId:
                  $ref: "#/components/schemas/WorkspaceImageId"
                  description: The identifier of the source image.
                SourceRegion:
                  $ref: "#/components/schemas/Region"
                  description: The identifier of the source Region.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the image.
              required:
                - Name
                - SourceImageId
                - SourceRegion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyWorkspaceImageResult"
  /CreateAccountLinkInvitation:
    post:
      operationId: CreateAccountLinkInvitation
      description: Creates the account link invitation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateAccountLinkInvitation
            default: WorkspacesService.CreateAccountLinkInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TargetAccountId:
                  $ref: "#/components/schemas/AwsAccount"
                  description: The identifier of the target account.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A string of up to 64 ASCII characters that Amazon WorkSpaces uses to ensure idempotent creation.
              required:
                - TargetAccountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountLinkInvitationResult"
  /CreateConnectClientAddIn:
    post:
      operationId: CreateConnectClientAddIn
      description: Creates a client-add-in for Amazon Connect within a directory. You can create only one Amazon Connect client add-in within a directory. This client add-in allows WorkSpaces users to seamlessly connect to Amazon Connect.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateConnectClientAddIn
            default: WorkspacesService.CreateConnectClientAddIn
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The directory identifier for which to configure the client add-in.
                Name:
                  $ref: "#/components/schemas/AddInName"
                  description: The name of the client add-in.
                URL:
                  $ref: "#/components/schemas/AddInUrl"
                  description: The endpoint URL of the Amazon Connect client add-in.
              required:
                - ResourceId
                - Name
                - URL
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectClientAddInResult"
  /CreateConnectionAlias:
    post:
      operationId: CreateConnectionAlias
      description: Creates the specified connection alias for use with cross-Region redirection. For more information, see Cross-Region Redirection for Amazon WorkSpaces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateConnectionAlias
            default: WorkspacesService.CreateConnectionAlias
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ConnectionString:
                  $ref: "#/components/schemas/ConnectionString"
                  description: A connection string in the form of a fully qualified domain name (FQDN), such as www.example.com. After you create a connection string, it is always associated to your Amazon Web Services account. You cannot recreate the same connection string with a different account, even if you delete all instances of it from the original account. The connection string is globally reserved for your account.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to associate with the connection alias.
              required:
                - ConnectionString
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionAliasResult"
  /CreateIpGroup:
    post:
      operationId: CreateIpGroup
      description: Creates an IP access control group. An IP access control group provides you with the ability to control the IP addresses from which users are allowed to access their WorkSpaces. To specify the CIDR address ranges, add rules to your IP access control group and then associate the group with your directory. You can add rules when you create the group or at any time using AuthorizeIpRules. There is a default IP access control group associated with your directory. If you don't associate an IP access control group with your directory, the default group is used. The default group includes a default rule that allows users to access their WorkSpaces from anywhere. You cannot modify the default IP access control group for your directory.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateIpGroup
            default: WorkspacesService.CreateIpGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                GroupName:
                  $ref: "#/components/schemas/IpGroupName"
                  description: The name of the group.
                GroupDesc:
                  $ref: "#/components/schemas/IpGroupDesc"
                  description: The description of the group.
                UserRules:
                  $ref: "#/components/schemas/IpRuleList"
                  description: The rules to add to the group.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags. Each WorkSpaces resource can have a maximum of 50 tags.
              required:
                - GroupName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIpGroupResult"
  /CreateStandbyWorkspaces:
    post:
      operationId: CreateStandbyWorkspaces
      description: Creates a standby WorkSpace in a secondary Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateStandbyWorkspaces
            default: WorkspacesService.CreateStandbyWorkspaces
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PrimaryRegion:
                  $ref: "#/components/schemas/Region"
                  description: The Region of the primary WorkSpace.
                StandbyWorkspaces:
                  $ref: "#/components/schemas/StandbyWorkspacesList"
                  description: Information about the standby WorkSpace to be created.
              required:
                - PrimaryRegion
                - StandbyWorkspaces
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStandbyWorkspacesResult"
  /CreateTags:
    post:
      operationId: CreateTags
      description: Creates the specified tags for the specified WorkSpaces resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateTags
            default: WorkspacesService.CreateTags
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/NonEmptyString"
                  description: The identifier of the WorkSpaces resource. The supported resource types are WorkSpaces, registered directories, images, custom bundles, IP access control groups, and connection aliases.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags. Each WorkSpaces resource can have a maximum of 50 tags.
              required:
                - ResourceId
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTagsResult"
  /CreateUpdatedWorkspaceImage:
    post:
      operationId: CreateUpdatedWorkspaceImage
      description: Creates a new updated WorkSpace image based on the specified source image. The new updated WorkSpace image has the latest drivers and other updates required by the Amazon WorkSpaces components. To determine which WorkSpace images need to be updated with the latest Amazon WorkSpaces requirements, use DescribeWorkspaceImages. Only Windows 10, Windows Server 2016, and Windows Server 2019 WorkSpace images can be programmatically updated at this time. Microsoft Windows updates and other application updates are not included in the update process. The source WorkSpace image is not deleted. You can delete the source image after you've verified your new updated image and created a new bundle.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateUpdatedWorkspaceImage
            default: WorkspacesService.CreateUpdatedWorkspaceImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/WorkspaceImageName"
                  description: The name of the new updated WorkSpace image.
                Description:
                  $ref: "#/components/schemas/WorkspaceImageDescription"
                  description: A description of whether updates for the WorkSpace image are available.
                SourceImageId:
                  $ref: "#/components/schemas/WorkspaceImageId"
                  description: The identifier of the source WorkSpace image.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags that you want to add to the new updated WorkSpace image. To add tags at the same time when you're creating the updated image, you must create an IAM policy that grants your IAM user permissions to use workspaces:CreateTags.
              required:
                - SourceImageId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUpdatedWorkspaceImageResult"
  /CreateWorkspaceBundle:
    post:
      operationId: CreateWorkspaceBundle
      description: Creates the specified WorkSpace bundle. For more information about creating WorkSpace bundles, see Create a Custom WorkSpaces Image and Bundle.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateWorkspaceBundle
            default: WorkspacesService.CreateWorkspaceBundle
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                BundleName:
                  $ref: "#/components/schemas/WorkspaceBundleName"
                  description: The name of the bundle.
                BundleDescription:
                  $ref: "#/components/schemas/WorkspaceBundleDescription"
                  description: The description of the bundle.
                ImageId:
                  $ref: "#/components/schemas/WorkspaceImageId"
                  description: The identifier of the image that is used to create the bundle.
                ComputeType:
                  $ref: "#/components/schemas/ComputeType"
                UserStorage:
                  $ref: "#/components/schemas/UserStorage"
                RootStorage:
                  $ref: "#/components/schemas/RootStorage"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags associated with the bundle. To add tags at the same time when you're creating the bundle, you must create an IAM policy that grants your IAM user permissions to use workspaces:CreateTags.
              required:
                - BundleName
                - BundleDescription
                - ImageId
                - ComputeType
                - UserStorage
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceBundleResult"
  /CreateWorkspaceImage:
    post:
      operationId: CreateWorkspaceImage
      description: Creates a new WorkSpace image from an existing WorkSpace.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateWorkspaceImage
            default: WorkspacesService.CreateWorkspaceImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/WorkspaceImageName"
                  description: The name of the new WorkSpace image.
                Description:
                  $ref: "#/components/schemas/WorkspaceImageDescription"
                  description: The description of the new WorkSpace image.
                WorkspaceId:
                  $ref: "#/components/schemas/WorkspaceId"
                  description: The identifier of the source WorkSpace
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags that you want to add to the new WorkSpace image. To add tags when you're creating the image, you must create an IAM policy that grants your IAM user permission to use workspaces:CreateTags.
              required:
                - WorkspaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceImageResult"
  /CreateWorkspaces:
    post:
      operationId: CreateWorkspaces
      description: Creates one or more WorkSpaces. This operation is asynchronous and returns before the WorkSpaces are created. The MANUAL running mode value is only supported by Amazon WorkSpaces Core. Contact your account team to be allow-listed to use this value. For more information, see Amazon WorkSpaces Core. You don't need to specify the PCOIP protocol for Linux bundles because DCV (formerly WSP) is the default protocol for those bundles. User-decoupled WorkSpaces are only supported by Amazon WorkSpaces Core. Review your running mode to ensure you are using one that is optimal for your needs and budget. For more information on switching running modes, see Can I switch between hourly and monthly billing?
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateWorkspaces
            default: WorkspacesService.CreateWorkspaces
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Workspaces:
                  $ref: "#/components/schemas/WorkspaceRequestList"
                  description: The WorkSpaces to create. You can specify up to 25 WorkSpaces.
              required:
                - Workspaces
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspacesResult"
  /CreateWorkspacesPool:
    post:
      operationId: CreateWorkspacesPool
      description: Creates a pool of WorkSpaces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.CreateWorkspacesPool
            default: WorkspacesService.CreateWorkspacesPool
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PoolName:
                  $ref: "#/components/schemas/WorkspacesPoolName"
                  description: The name of the pool.
                Description:
                  $ref: "#/components/schemas/UpdateDescription"
                  description: The pool description.
                BundleId:
                  $ref: "#/components/schemas/BundleId"
                  description: The identifier of the bundle for the pool.
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The identifier of the directory for the pool.
                Capacity:
                  $ref: "#/components/schemas/Capacity"
                  description: The user capacity of the pool.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the pool.
                ApplicationSettings:
                  $ref: "#/components/schemas/ApplicationSettingsRequest"
                  description: Indicates the application settings of the pool.
                TimeoutSettings:
                  $ref: "#/components/schemas/TimeoutSettings"
                  description: Indicates the timeout settings of the pool.
                RunningMode:
                  $ref: "#/components/schemas/PoolsRunningMode"
                  description: The running mode for the pool.
              required:
                - PoolName
                - Description
                - BundleId
                - DirectoryId
                - Capacity
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspacesPoolResult"
  /DeleteAccountLinkInvitation:
    post:
      operationId: DeleteAccountLinkInvitation
      description: Deletes the account link invitation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.DeleteAccountLinkInvitation
            default: WorkspacesService.DeleteAccountLinkInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                LinkId:
                  $ref: "#/components/schemas/LinkId"
                  description: The identifier of the account link.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A string of up to 64 ASCII characters that Amazon WorkSpaces uses to ensure idempotent creation.
              required:
                - LinkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountLinkInvitationResult"
  /DeleteClientBranding:
    post:
      operationId: DeleteClientBranding
      description: Deletes customized client branding. Client branding allows you to customize your WorkSpace's client login portal. You can tailor your login portal company logo, the support email address, support link, link to reset password, and a custom message for users trying to sign in. After you delete your customized client branding, your login portal reverts to the default client branding.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.DeleteClientBranding
            default: WorkspacesService.DeleteClientBranding
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The directory identifier of the WorkSpace for which you want to delete client branding.
                Platforms:
                  $ref: "#/components/schemas/ClientDeviceTypeList"
                  description: The device type for which you want to delete client branding.
              required:
                - ResourceId
                - Platforms
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClientBrandingResult"
  /DeleteConnectClientAddIn:
    post:
      operationId: DeleteConnectClientAddIn
      description: Deletes a client-add-in for Amazon Connect that is configured within a directory.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - WorkspacesService.DeleteConnectClientAddIn
            default: WorkspacesService.DeleteConnectClientAddIn
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AddInId:
                  $ref: "#/components/schemas/AmazonUuid"
                  description: The identifier of the client add-in to delete.
                ResourceId:
                  $ref: "#/components/schemas/DirectoryId"
                  description: The directory identifier for which the client add-in is configured.
              required:
                - AddInId
                - ResourceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectClientAddInResult"
  /DeleteConnectionAlias:
    post:
      operationId: DeleteConnectionAlias
