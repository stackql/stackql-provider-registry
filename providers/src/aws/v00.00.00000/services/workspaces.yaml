          $ref: "#/components/schemas/MicrosoftEntraConfigTenantId"
          description: The identifier of the tenant.
        ApplicationConfigSecretArn:
          $ref: "#/components/schemas/SecretsManagerArn"
          description: The Amazon Resource Name (ARN) of the application config.
