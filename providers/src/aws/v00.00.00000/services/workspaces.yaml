        - AD_CONNECTOR
        - CUSTOMER_MANAGED
        - AWS_IAM_IDENTITY_CENTER
    SecurityGroupId:
      type: string
      minLength: 11
      maxLength: 20
      pattern: ^(sg-([0-9a-f]{8}|[0-9a-f]{17}))$
    WorkspaceDirectoryState:
      type: string
      enum:
        - REGISTERING
        - REGISTERED
        - DEREGISTERING
        - DEREGISTERED
        - ERROR
    DefaultWorkspaceCreationProperties:
      description: Describes the default values that are used to create WorkSpaces. For more information, see Update Directory Details for Your WorkSpaces.
      type: object
      properties:
        EnableInternetAccess:
          $ref: "#/components/schemas/BooleanObject"
          description: Specifies whether to automatically assign an Elastic public IP address to WorkSpaces in this directory by default. If enabled, the Elastic public IP address allows outbound internet access from your WorkSpaces when you’re using an internet gateway in the Amazon VPC in which your WorkSpaces are located. If you're using a Network Address Translation (NAT) gateway for outbound internet access from your VPC, or if your WorkSpaces are in public subnets and you manually assign them Elastic IP addresses, you should disable this setting. This setting applies to new WorkSpaces that you launch or to existing WorkSpaces that you rebuild. For more information, see Configure a VPC for Amazon WorkSpaces.
        DefaultOu:
          $ref: "#/components/schemas/DefaultOu"
          description: The organizational unit (OU) in the directory for the WorkSpace machine accounts.
        CustomSecurityGroupId:
          $ref: "#/components/schemas/SecurityGroupId"
          description: The identifier of the default security group to apply to WorkSpaces when they are created. For more information, see Security Groups for Your WorkSpaces.
        UserEnabledAsLocalAdministrator:
          $ref: "#/components/schemas/BooleanObject"
          description: Specifies whether WorkSpace users are local administrators on their WorkSpaces.
        EnableMaintenanceMode:
          $ref: "#/components/schemas/BooleanObject"
          description: Specifies whether maintenance mode is enabled for WorkSpaces. For more information, see WorkSpace Maintenance.
        InstanceIamRoleArn:
          $ref: "#/components/schemas/ARN"
          description: Indicates the IAM role ARN of the instance.
    DefaultOu:
      type: string
    WorkspaceAccessProperties:
      description: The device types and operating systems that can be used to access a WorkSpace. For more information, see Amazon WorkSpaces Client Network Requirements.
      type: object
      properties:
        DeviceTypeWindows:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use Windows clients to access their WorkSpaces.
        DeviceTypeOsx:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use macOS clients to access their WorkSpaces.
        DeviceTypeWeb:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can access their WorkSpaces through a web browser.
        DeviceTypeIos:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use iOS devices to access their WorkSpaces.
        DeviceTypeAndroid:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use Android and Android-compatible Chrome OS devices to access their WorkSpaces.
        DeviceTypeChromeOs:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use Chromebooks to access their WorkSpaces.
        DeviceTypeZeroClient:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use zero client devices to access their WorkSpaces.
        DeviceTypeLinux:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can use Linux clients to access their WorkSpaces.
        DeviceTypeWorkSpacesThinClient:
          $ref: "#/components/schemas/AccessPropertyValue"
          description: Indicates whether users can access their WorkSpaces through a WorkSpaces Thin Client.
        AccessEndpointConfig:
          $ref: "#/components/schemas/AccessEndpointConfig"
          description: Specifies the configuration for accessing the WorkSpace.
    AccessPropertyValue:
      type: string
      enum:
        - ALLOW
        - DENY
    AccessEndpointConfig:
      description: Describes the access endpoint configuration for a WorkSpace.
      type: object
      properties:
        AccessEndpoints:
          $ref: "#/components/schemas/AccessEndpointList"
          description: Indicates a list of access endpoints associated with this directory.
        InternetFallbackProtocols:
          $ref: "#/components/schemas/InternetFallbackProtocolList"
          description: Indicates a list of protocols that fallback to using the public Internet when streaming over a VPC endpoint is not available.
      required:
        - AccessEndpoints
    AccessEndpointList:
      type: array
      items:
        $ref: "#/components/schemas/AccessEndpoint"
    AccessEndpoint:
      description: Describes the access type and endpoint for a WorkSpace.
      type: object
      properties:
        AccessEndpointType:
          $ref: "#/components/schemas/AccessEndpointType"
          description: Indicates the type of access endpoint.
        VpcEndpointId:
          $ref: "#/components/schemas/AlphanumericDashUnderscoreNonEmptyString"
          description: Indicates the VPC endpoint to use for access.
    AccessEndpointType:
      type: string
      enum:
        - STREAMING_WSP
    AlphanumericDashUnderscoreNonEmptyString:
      type: string
      pattern: ^[a-zA-Z0-9\_\-]{1,1000}$
    InternetFallbackProtocolList:
      type: array
      items:
        $ref: "#/components/schemas/InternetFallbackProtocol"
    InternetFallbackProtocol:
      type: string
      enum:
        - PCOIP
    Tenancy:
      type: string
      enum:
        - DEDICATED
        - SHARED
    SelfservicePermissions:
      description: Describes the self-service permissions for a directory. For more information, see Enable Self-Service WorkSpace Management Capabilities for Your Users.
      type: object
      properties:
        RestartWorkspace:
          $ref: "#/components/schemas/ReconnectEnum"
          description: Specifies whether users can restart their WorkSpace.
        IncreaseVolumeSize:
          $ref: "#/components/schemas/ReconnectEnum"
          description: Specifies whether users can increase the volume size of the drives on their WorkSpace.
        ChangeComputeType:
          $ref: "#/components/schemas/ReconnectEnum"
          description: Specifies whether users can change the compute type (bundle) for their WorkSpace.
        SwitchRunningMode:
          $ref: "#/components/schemas/ReconnectEnum"
          description: Specifies whether users can switch the running mode of their WorkSpace.
        RebuildWorkspace:
          $ref: "#/components/schemas/ReconnectEnum"
          description: Specifies whether users can rebuild the operating system of a WorkSpace to its original state.
    SamlProperties:
      description: Describes the enablement status, user access URL, and relay state parameter name that are used for configuring federation with an SAML 2.0 identity provider.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SamlStatusEnum"
          description: Indicates the status of SAML 2.0 authentication. These statuses include the following. If the setting is DISABLED, end users will be directed to login with their directory credentials. If the setting is ENABLED, end users will be directed to login via the user access URL. Users attempting to connect to WorkSpaces from a client application that does not support SAML 2.0 authentication will not be able to connect. If the setting is ENABLED_WITH_DIRECTORY_LOGIN_FALLBACK, end users will be directed to login via the user access URL on supported client applications, but will not prevent clients that do not support SAML 2.0 authentication from connecting as if SAML 2.0 authentication was disabled.
        UserAccessUrl:
          $ref: "#/components/schemas/SamlUserAccessUrl"
          description: The SAML 2.0 identity provider (IdP) user access URL is the URL a user would navigate to in their web browser in order to federate from the IdP and directly access the application, without any SAML 2.0 service provider (SP) bindings.
        RelayStateParameterName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The relay state parameter name supported by the SAML 2.0 identity provider (IdP). When the end user is redirected to the user access URL from the WorkSpaces client application, this relay state parameter name is appended as a query parameter to the URL along with the relay state endpoint to return the user to the client application session. To use SAML 2.0 authentication with WorkSpaces, the IdP must support IdP-initiated deep linking for the relay state URL. Consult your IdP documentation for more information.
    SamlStatusEnum:
      type: string
      enum:
        - DISABLED
        - ENABLED
        - ENABLED_WITH_DIRECTORY_LOGIN_FALLBACK
    SamlUserAccessUrl:
      type: string
      minLength: 8
      maxLength: 200
      pattern: ^(http|https)\://\S+$
    CertificateBasedAuthProperties:
      description: Describes the properties of the certificate-based authentication you want to use with your WorkSpaces.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/CertificateBasedAuthStatusEnum"
          description: The status of the certificate-based authentication properties.
        CertificateAuthorityArn:
          $ref: "#/components/schemas/CertificateAuthorityArn"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Certificate Manager Private CA resource.
    CertificateBasedAuthStatusEnum:
      type: string
      enum:
        - DISABLED
        - ENABLED
    CertificateAuthorityArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: arn:[\w+=/,.@-]+:[\w+=/,.@-]+:[\w+=/,.@-]*:[0-9]*:[\w+=,.@-]+(/[\w+=,.@-]+)*
    EndpointEncryptionMode:
      type: string
      enum:
        - STANDARD_TLS
        - FIPS_VALIDATED
    MicrosoftEntraConfig:
      description: Specifies the configurations of the Microsoft Entra.
      type: object
      properties:
