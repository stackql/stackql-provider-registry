    Workspace:
      description: Describes a WorkSpace.
      type: object
      properties:
        WorkspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The identifier of the WorkSpace.
        DirectoryId:
          $ref: "#/components/schemas/DirectoryId"
          description: The identifier of the Directory Service directory for the WorkSpace.
        UserName:
          $ref: "#/components/schemas/UserName"
          description: The user for the WorkSpace.
        IpAddress:
          $ref: "#/components/schemas/IpAddress"
          description: The IP address of the WorkSpace.
        Ipv6Address:
          $ref: "#/components/schemas/Ipv6Address"
          description: The IPv6 address of the WorkSpace.
        State:
          $ref: "#/components/schemas/WorkspaceState"
          description: The operational state of the WorkSpace. PENDING – The WorkSpace is in a waiting state (for example, the WorkSpace is being created). AVAILABLE – The WorkSpace is running and has passed the health checks. IMPAIRED – Refer to UNHEALTHY state. UNHEALTHY – The WorkSpace is not responding to health checks. REBOOTING – The WorkSpace is being rebooted (restarted). STARTING – The WorkSpace is starting up and health checks are being run. REBUILDING – The WorkSpace is being rebuilt. RESTORING – The WorkSpace is being restored. MAINTENANCE – The WorkSpace is undergoing scheduled maintenance by Amazon Web Services. ADMIN_MAINTENANCE – The WorkSpace is undergoing maintenance by the WorkSpaces administrator. TERMINATING – The WorkSpace is being deleted. TERMINATED – The WorkSpace has been deleted. SUSPENDED – The WorkSpace has been suspended for image creation. UPDATING – The WorkSpace is undergoing an update. STOPPING – The WorkSpace is being stopped. STOPPED – The WorkSpace has been stopped. ERROR – The WorkSpace is an error state (for example, an error occurred during startup). After a WorkSpace is terminated, the TERMINATED state is returned only briefly before the WorkSpace directory metadata is cleaned up, so this state is rarely returned. To confirm that a WorkSpace is terminated, check for the WorkSpace ID by using DescribeWorkSpaces. If the WorkSpace ID isn't returned, then the WorkSpace has been successfully terminated.
        BundleId:
          $ref: "#/components/schemas/BundleId"
          description: The identifier of the bundle used to create the WorkSpace.
        SubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: The identifier of the subnet for the WorkSpace.
        ErrorMessage:
          $ref: "#/components/schemas/Description"
          description: The text of the error message that is returned if the WorkSpace cannot be created.
        ErrorCode:
          $ref: "#/components/schemas/WorkspaceErrorCode"
          description: The error code that is returned if the WorkSpace cannot be created.
        ComputerName:
          $ref: "#/components/schemas/ComputerName"
          description: The name of the WorkSpace, as seen by the operating system. The format of this name varies. For more information, see Launch a WorkSpace.
        VolumeEncryptionKey:
          $ref: "#/components/schemas/VolumeEncryptionKey"
          description: The ARN of the symmetric KMS key used to encrypt data stored on your WorkSpace. Amazon WorkSpaces does not support asymmetric KMS keys.
        UserVolumeEncryptionEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether the data stored on the user volume is encrypted.
        RootVolumeEncryptionEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether the data stored on the root volume is encrypted.
        WorkspaceName:
          $ref: "#/components/schemas/WorkspaceName"
          description: The name of the user-decoupled WorkSpace.
        WorkspaceProperties:
          $ref: "#/components/schemas/WorkspaceProperties"
          description: The properties of the WorkSpace.
        ModificationStates:
          $ref: "#/components/schemas/ModificationStateList"
          description: The modification states of the WorkSpace.
        RelatedWorkspaces:
          $ref: "#/components/schemas/RelatedWorkspaces"
          description: The standby WorkSpace or primary WorkSpace related to the specified WorkSpace.
        DataReplicationSettings:
          $ref: "#/components/schemas/DataReplicationSettings"
          description: Indicates the settings of the data replication.
        StandbyWorkspacesProperties:
          $ref: "#/components/schemas/StandbyWorkspacesPropertiesList"
          description: The properties of the standby WorkSpace
