      type: object
      properties:
        WorkspaceBundle:
          $ref: "#/components/schemas/WorkspaceBundle"
    WorkspaceBundle:
      description: Describes a WorkSpace bundle.
      type: object
      properties:
        BundleId:
          $ref: "#/components/schemas/BundleId"
