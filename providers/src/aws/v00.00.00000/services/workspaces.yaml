        - AVAILABLE
        - IMPAIRED
        - UNHEALTHY
        - REBOOTING
        - STARTING
        - REBUILDING
        - RESTORING
        - MAINTENANCE
        - ADMIN_MAINTENANCE
        - TERMINATING
        - TERMINATED
        - SUSPENDED
        - UPDATING
        - STOPPING
        - STOPPED
        - ERROR
    CreateTagsResult:
