          $ref: "#/components/schemas/string1To255"
          description: The ObjectType name that is used to resolve profile merging conflicts when choosing SOURCE as the ConflictResolvingModel.
      required:
        - ConflictResolvingModel
    ConflictResolvingModel:
      type: string
      enum:
