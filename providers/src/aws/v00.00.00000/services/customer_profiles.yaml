          description: The day and time when do you want to start the Identity Resolution Job every week.
        AutoMerging:
          $ref: "#/components/schemas/AutoMerging"
          description: Configuration information about the auto-merging process.
        ExportingConfig:
          $ref: "#/components/schemas/ExportingConfig"
          description: Configuration information for exporting Identity Resolution results, for example, to an S3 bucket.
    RuleBasedMatchingResponse:
      description: The response of the Rule-based matching request.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/optionalBoolean"
          description: The flag that enables the rule-based matching process of duplicate profiles.
        MatchingRules:
          $ref: "#/components/schemas/MatchingRules"
          description: Configures how the rule-based matching process should match profiles. You can have up to 15 MatchingRule in the MatchingRules.
        Status:
          $ref: "#/components/schemas/RuleBasedMatchingStatus"
          description: PENDING The first status after configuration a rule-based matching rule. If it is an existing domain, the rule-based Identity Resolution waits one hour before creating the matching rule. If it is a new domain, the system will skip the PENDING stage. IN_PROGRESS The system is creating the rule-based matching rule. Under this status, the system is evaluating the existing data and you can no longer change the Rule-based matching configuration. ACTIVE The rule is ready to use. You can change the rule a day after the status is in ACTIVE.
        MaxAllowedRuleLevelForMerging:
          $ref: "#/components/schemas/MaxAllowedRuleLevelForMerging"
          description: MatchingRule
        MaxAllowedRuleLevelForMatching:
          $ref: "#/components/schemas/MaxAllowedRuleLevelForMatching"
          description: Indicates the maximum allowed rule level.
        AttributeTypesSelector:
          $ref: "#/components/schemas/AttributeTypesSelector"
          description: Configures information about the AttributeTypesSelector where the rule-based identity resolution uses to match profiles.
        ConflictResolution:
          $ref: "#/components/schemas/ConflictResolution"
        ExportingConfig:
          $ref: "#/components/schemas/ExportingConfig"
    RuleBasedMatchingStatus:
