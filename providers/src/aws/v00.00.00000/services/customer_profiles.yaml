    RuleBasedMatchingRequest:
      description: The request to enable the rule-based matching.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/optionalBoolean"
          description: The flag that enables the rule-based matching process of duplicate profiles.
        MatchingRules:
          $ref: "#/components/schemas/MatchingRules"
          description: Configures how the rule-based matching process should match profiles. You can have up to 15 MatchingRule in the MatchingRules.
        MaxAllowedRuleLevelForMerging:
          $ref: "#/components/schemas/MaxAllowedRuleLevelForMerging"
          description: MatchingRule
        MaxAllowedRuleLevelForMatching:
          $ref: "#/components/schemas/MaxAllowedRuleLevelForMatching"
          description: Indicates the maximum allowed rule level.
        AttributeTypesSelector:
          $ref: "#/components/schemas/AttributeTypesSelector"
          description: Configures information about the AttributeTypesSelector where the rule-based identity resolution uses to match profiles.
        ConflictResolution:
          $ref: "#/components/schemas/ConflictResolution"
        ExportingConfig:
          $ref: "#/components/schemas/ExportingConfig"
      required:
        - Enabled
    MatchingRules:
      type: array
      items:
        $ref: "#/components/schemas/MatchingRule"
    MatchingRule:
      description: "Specifies how does the rule-based matching process should match profiles. You can choose from the following attributes to build the matching Rule: AccountNumber Address.Address Address.City Address.Country Address.County Address.PostalCode Address.State Address.Province BirthDate BusinessName EmailAddress FirstName Gender LastName MiddleName PhoneNumber Any customized profile attributes that start with the Attributes"
      type: object
      properties:
        Rule:
          $ref: "#/components/schemas/MatchingRuleAttributeList"
          description: A single rule level of the MatchRules. Configures how the rule-based matching process should match profiles.
      required:
        - Rule
    MatchingRuleAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/string1To255"
    MaxAllowedRuleLevelForMerging:
      type: integer
      minimum: 1
      maximum: 15
    MaxAllowedRuleLevelForMatching:
      type: integer
      minimum: 1
      maximum: 15
    AttributeTypesSelector:
      description: "Configuration information about the AttributeTypesSelector where the rule-based identity resolution uses to match profiles. You can choose how profiles are compared across attribute types and which attribute to use for matching from each type. There are three attribute types you can configure: Email type You can choose from Email, BusinessEmail, and PersonalEmail Phone number type You can choose from Phone, HomePhone, and MobilePhone Address type You can choose from Address, BusinessAddress, MaillingAddress, and ShippingAddress You can either choose ONE_TO_ONE or MANY_TO_MANY as the AttributeMatchingModel. When choosing MANY_TO_MANY, the system can match attribute across the sub-types of an attribute type. For example, if the value of the Email field of Profile A and the value of BusinessEmail field of Profile B matches, the two profiles are matched on the Email type. When choosing ONE_TO_ONE the system can only match if the sub-types are exact matches. For example, only when the value of the Email field of Profile A and the value of the Email field of Profile B matches, the two profiles are matched on the Email type."
      type: object
      properties:
        AttributeMatchingModel:
          $ref: "#/components/schemas/AttributeMatchingModel"
          description: Configures the AttributeMatchingModel, you can either choose ONE_TO_ONE or MANY_TO_MANY.
        Address:
          $ref: "#/components/schemas/AddressList"
          description: The Address type. You can choose from Address, BusinessAddress, MaillingAddress, and ShippingAddress. You only can use the Address type in the MatchingRule. For example, if you want to match profile based on BusinessAddress.City or MaillingAddress.City, you need to choose the BusinessAddress and the MaillingAddress to represent the Address type and specify the Address.City on the matching rule.
        PhoneNumber:
          $ref: "#/components/schemas/PhoneNumberList"
          description: The PhoneNumber type. You can choose from PhoneNumber, HomePhoneNumber, and MobilePhoneNumber. You only can use the PhoneNumber type in the MatchingRule. For example, if you want to match a profile based on Phone or HomePhone, you need to choose the Phone and the HomePhone to represent the PhoneNumber type and only specify the PhoneNumber on the matching rule.
        EmailAddress:
          $ref: "#/components/schemas/EmailList"
          description: The Email type. You can choose from EmailAddress, BusinessEmailAddress and PersonalEmailAddress. You only can use the EmailAddress type in the MatchingRule. For example, if you want to match profile based on PersonalEmailAddress or BusinessEmailAddress, you need to choose the PersonalEmailAddress and the BusinessEmailAddress to represent the EmailAddress type and only specify the EmailAddress on the matching rule.
      required:
        - AttributeMatchingModel
    AttributeMatchingModel:
      type: string
      enum:
        - ONE_TO_ONE
        - MANY_TO_MANY
    AddressList:
      type: array
      items:
        $ref: "#/components/schemas/string1To255"
    PhoneNumberList:
      type: array
      items:
        $ref: "#/components/schemas/string1To255"
    EmailList:
      type: array
      items:
        $ref: "#/components/schemas/string1To255"
    DataStoreRequest:
