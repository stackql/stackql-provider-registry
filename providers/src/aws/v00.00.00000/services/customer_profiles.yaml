openapi: 3.0.0
info:
  version: "2020-08-15"
  title: Amazon Connect Customer Profiles
  description: Amazon Connect Customer Profiles
  x-serviceName: profile
  x-serviceAlias: customer_profiles
  x-protocol: rest-json
  x-apiVersion: "2020-08-15"
  x-endpointPrefix: profile
  x-jsonVersion: "1.1"
servers:
  - url: https://profile.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for customer-profiles
paths:
  /domains/{domain_name}/profiles/keys:
    post:
      operationId: AddProfileKey
      description: Associates a new key value with a specific profile, such as a Contact Record ContactId. A profile object can have a single unique key and any number of additional keys that can be used to identify the profile that it belongs to.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileId:
                  $ref: "#/components/schemas/uuid"
                KeyName:
                  $ref: "#/components/schemas/name"
                Values:
                  $ref: "#/components/schemas/requestValueList"
              required:
                - ProfileId
                - KeyName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddProfileKeyResponse"
  /domains/{domain_name}/calculated-attributes/{calculated_attribute_name}/batch-get-for-profiles:
    post:
      operationId: BatchGetCalculatedAttributeForProfile
      description: Fetch the possible attribute values given the attribute name.
      parameters:
        - name: calculated_attribute_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/typeName"
          description: The unique name of the calculated attribute.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileIds:
                  $ref: "#/components/schemas/BatchGetCalculatedAttributeForProfileIdList"
                ConditionOverrides:
                  $ref: "#/components/schemas/ConditionOverrides"
              required:
                - ProfileIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCalculatedAttributeForProfileResponse"
  /domains/{domain_name}/batch-get-profiles:
    post:
      operationId: BatchGetProfile
      description: Get a batch of profiles.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileIds:
                  $ref: "#/components/schemas/BatchGetProfileIdList"
              required:
                - ProfileIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetProfileResponse"
  /domains/{domain_name}/calculated-attributes/{calculated_attribute_name}:
    post:
      operationId: CreateCalculatedAttributeDefinition
      description: Creates a new calculated attribute definition. After creation, new object data ingested into Customer Profiles will be included in the calculated attribute, which can be retrieved for a profile using the GetCalculatedAttributeForProfile API. Defining a calculated attribute makes it available for all profiles within a domain. Each calculated attribute can only reference one ObjectType and at most, two fields from that ObjectType.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: calculated_attribute_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/typeName"
          description: The unique name of the calculated attribute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DisplayName:
                  $ref: "#/components/schemas/displayName"
                Description:
                  $ref: "#/components/schemas/sensitiveText"
                AttributeDetails:
                  $ref: "#/components/schemas/AttributeDetails"
                Conditions:
                  $ref: "#/components/schemas/Conditions"
                Filter:
                  $ref: "#/components/schemas/Filter"
                Statistic:
                  $ref: "#/components/schemas/Statistic"
                UseHistoricalData:
                  $ref: "#/components/schemas/optionalBoolean"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - AttributeDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCalculatedAttributeDefinitionResponse"
    delete:
      operationId: DeleteCalculatedAttributeDefinition
      description: Deletes an existing calculated attribute definition. Note that deleting a default calculated attribute is possible, however once deleted, you will be unable to undo that action and will need to recreate it on your own using the CreateCalculatedAttributeDefinition API if you want it back.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: calculated_attribute_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/typeName"
          description: The unique name of the calculated attribute.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCalculatedAttributeDefinitionResponse"
    get:
      operationId: GetCalculatedAttributeDefinition
      description: Provides more information on a calculated attribute definition for Customer Profiles.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: calculated_attribute_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/typeName"
          description: The unique name of the calculated attribute.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCalculatedAttributeDefinitionResponse"
    put:
      operationId: UpdateCalculatedAttributeDefinition
      description: Updates an existing calculated attribute definition. When updating the Conditions, note that increasing the date range of a calculated attribute will not trigger inclusion of historical data greater than the current date range.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: calculated_attribute_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/typeName"
          description: The unique name of the calculated attribute.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                DisplayName:
                  $ref: "#/components/schemas/displayName"
                Description:
                  $ref: "#/components/schemas/sensitiveText"
                Conditions:
                  $ref: "#/components/schemas/Conditions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCalculatedAttributeDefinitionResponse"
  /domains/{domain_name}:
    post:
      operationId: CreateDomain
      description: "Creates a domain, which is a container for all customer data, such as customer profile attributes, object types, profile keys, and encryption keys. You can create multiple domains, and each domain can have multiple third-party integrations. Each Amazon Connect instance can be associated with only one domain. Multiple Amazon Connect instances can be associated with one domain. Use this API or UpdateDomain to enable identity resolution: set Matching to true. To prevent cross-service impersonation when you call this API, see Cross-service confused deputy prevention for sample policies that you should apply. It is not possible to associate a Customer Profiles domain with an Amazon Connect Instance directly from the API. If you would like to create a domain and associate a Customer Profiles domain, use the Amazon Connect admin website. For more information, see Enable Customer Profiles. Each Amazon Connect instance can be associated with only one domain. Multiple Amazon Connect instances can be associated with one domain."
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DefaultExpirationDays:
                  $ref: "#/components/schemas/expirationDaysInteger"
                DefaultEncryptionKey:
                  $ref: "#/components/schemas/encryptionKey"
                DeadLetterQueueUrl:
                  $ref: "#/components/schemas/sqsQueueUrl"
                Matching:
                  $ref: "#/components/schemas/MatchingRequest"
                RuleBasedMatching:
                  $ref: "#/components/schemas/RuleBasedMatchingRequest"
                DataStore:
                  $ref: "#/components/schemas/DataStoreRequest"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - DefaultExpirationDays
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainResponse"
    delete:
      operationId: DeleteDomain
      description: Deletes a specific domain and all of its customer data, such as customer profile attributes and their related objects.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainResponse"
    get:
      operationId: GetDomain
      description: Returns information about a specific domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainResponse"
    put:
      operationId: UpdateDomain
      description: "Updates the properties of a domain, including creating or selecting a dead letter queue or an encryption key. After a domain is created, the name can’t be changed. Use this API or CreateDomain to enable identity resolution: set Matching to true. To prevent cross-service impersonation when you call this API, see Cross-service confused deputy prevention for sample policies that you should apply. To add or remove tags on an existing Domain, see TagResource/UntagResource."
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                DefaultExpirationDays:
                  $ref: "#/components/schemas/expirationDaysInteger"
                DefaultEncryptionKey:
                  $ref: "#/components/schemas/encryptionKey"
                DeadLetterQueueUrl:
                  $ref: "#/components/schemas/sqsQueueUrl"
                Matching:
                  $ref: "#/components/schemas/MatchingRequest"
                RuleBasedMatching:
                  $ref: "#/components/schemas/RuleBasedMatchingRequest"
                DataStore:
                  $ref: "#/components/schemas/DataStoreRequest"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDomainResponse"
  /domains/{domain_name}/layouts/{layout_definition_name}:
    post:
      operationId: CreateDomainLayout
      description: Creates the layout to view data for a specific domain. This API can only be invoked from the Amazon Connect admin website.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: layout_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the layout.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/sensitiveText"
                DisplayName:
                  $ref: "#/components/schemas/displayName"
                IsDefault:
                  $ref: "#/components/schemas/boolean"
                LayoutType:
                  $ref: "#/components/schemas/LayoutType"
                Layout:
                  $ref: "#/components/schemas/sensitiveString1To2000000"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - DisplayName
                - LayoutType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDomainLayoutResponse"
    delete:
      operationId: DeleteDomainLayout
      description: Deletes the layout used to view data for a specific domain. This API can only be invoked from the Amazon Connect admin website.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: layout_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the layout.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDomainLayoutResponse"
    get:
      operationId: GetDomainLayout
      description: Gets the layout to view data for a specific domain. This API can only be invoked from the Amazon Connect admin website.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: layout_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the layout.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDomainLayoutResponse"
    put:
      operationId: UpdateDomainLayout
      description: Updates the layout used to view data for a specific domain. This API can only be invoked from the Amazon Connect admin website.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: layout_definition_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the layout.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/sensitiveText"
                DisplayName:
                  $ref: "#/components/schemas/displayName"
                IsDefault:
                  $ref: "#/components/schemas/boolean"
                LayoutType:
                  $ref: "#/components/schemas/LayoutType"
                Layout:
                  $ref: "#/components/schemas/sensitiveString1To2000000"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDomainLayoutResponse"
  /domains/{domain_name}/event-streams/{event_stream_name}:
    post:
      operationId: CreateEventStream
      description: Creates an event stream, which is a subscription to real-time events, such as when profiles are created and updated through Amazon Connect Customer Profiles. Each event stream can be associated with only one Kinesis Data Stream destination in the same region and Amazon Web Services account as the customer profiles domain
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_stream_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The name of the event stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Uri:
                  $ref: "#/components/schemas/string1To255"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - Uri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventStreamResponse"
    delete:
      operationId: DeleteEventStream
      description: Disables and deletes the specified event stream.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_stream_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The name of the event stream
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventStreamResponse"
    get:
      operationId: GetEventStream
      description: Returns information about the specified event stream in a specific domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_stream_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The name of the event stream provided during create operations.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventStreamResponse"
  /domains/{domain_name}/event-triggers/{event_trigger_name}:
    post:
      operationId: CreateEventTrigger
      description: Creates an event trigger, which specifies the rules when to perform action based on customer's ingested data. Each event stream can be associated with only one integration in the same region and AWS account as the event stream.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_trigger_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the event trigger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ObjectTypeName:
                  $ref: "#/components/schemas/typeName"
                Description:
                  $ref: "#/components/schemas/sensitiveText"
                EventTriggerConditions:
                  $ref: "#/components/schemas/EventTriggerConditions"
                SegmentFilter:
                  $ref: "#/components/schemas/name"
                EventTriggerLimits:
                  $ref: "#/components/schemas/EventTriggerLimits"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ObjectTypeName
                - EventTriggerConditions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventTriggerResponse"
    delete:
      operationId: DeleteEventTrigger
      description: Disable and deletes the Event Trigger. You cannot delete an Event Trigger with an active Integration associated.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_trigger_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the event trigger.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventTriggerResponse"
    get:
      operationId: GetEventTrigger
      description: Get a specific Event Trigger from the domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_trigger_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the event trigger.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventTriggerResponse"
    put:
      operationId: UpdateEventTrigger
      description: Update the properties of an Event Trigger.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
        - name: event_trigger_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the event trigger.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ObjectTypeName:
                  $ref: "#/components/schemas/typeName"
                Description:
                  $ref: "#/components/schemas/sensitiveText"
                EventTriggerConditions:
                  $ref: "#/components/schemas/EventTriggerConditions"
                SegmentFilter:
                  $ref: "#/components/schemas/name"
                EventTriggerLimits:
                  $ref: "#/components/schemas/EventTriggerLimits"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventTriggerResponse"
  /domains/{domain_name}/workflows/integrations:
    post:
      operationId: CreateIntegrationWorkflow
      description: Creates an integration workflow. An integration workflow is an async process which ingests historic data and sets up an integration for ongoing updates. The supported Amazon AppFlow sources are Salesforce, ServiceNow, and Marketo.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                WorkflowType:
                  $ref: "#/components/schemas/WorkflowType"
                IntegrationConfig:
                  $ref: "#/components/schemas/IntegrationConfig"
                ObjectTypeName:
                  $ref: "#/components/schemas/typeName"
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - WorkflowType
                - IntegrationConfig
                - ObjectTypeName
                - RoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIntegrationWorkflowResponse"
  /domains/{domain_name}/profiles:
    post:
      operationId: CreateProfile
      description: Creates a standard profile. A standard profile represents the following attributes for a customer profile in a domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountNumber:
                  $ref: "#/components/schemas/sensitiveString1To255"
                AdditionalInformation:
                  $ref: "#/components/schemas/sensitiveString1To1000"
                PartyType:
                  $ref: "#/components/schemas/PartyType"
                BusinessName:
                  $ref: "#/components/schemas/sensitiveString1To255"
                FirstName:
                  $ref: "#/components/schemas/sensitiveString1To255"
                MiddleName:
                  $ref: "#/components/schemas/sensitiveString1To255"
                LastName:
                  $ref: "#/components/schemas/sensitiveString1To255"
                BirthDate:
                  $ref: "#/components/schemas/sensitiveString1To255"
                Gender:
                  $ref: "#/components/schemas/Gender"
                PhoneNumber:
                  $ref: "#/components/schemas/sensitiveString1To255"
                MobilePhoneNumber:
                  $ref: "#/components/schemas/sensitiveString1To255"
                HomePhoneNumber:
                  $ref: "#/components/schemas/sensitiveString1To255"
                BusinessPhoneNumber:
                  $ref: "#/components/schemas/sensitiveString1To255"
                EmailAddress:
                  $ref: "#/components/schemas/sensitiveString1To255"
                PersonalEmailAddress:
                  $ref: "#/components/schemas/sensitiveString1To255"
                BusinessEmailAddress:
                  $ref: "#/components/schemas/sensitiveString1To255"
                Address:
                  $ref: "#/components/schemas/Address"
                ShippingAddress:
                  $ref: "#/components/schemas/Address"
                MailingAddress:
                  $ref: "#/components/schemas/Address"
                BillingAddress:
                  $ref: "#/components/schemas/Address"
                Attributes:
                  $ref: "#/components/schemas/Attributes"
                PartyTypeString:
                  $ref: "#/components/schemas/sensitiveString1To255"
                GenderString:
                  $ref: "#/components/schemas/sensitiveString1To255"
                ProfileType:
                  $ref: "#/components/schemas/ProfileType"
                EngagementPreferences:
                  $ref: "#/components/schemas/EngagementPreferences"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProfileResponse"
    put:
      operationId: UpdateProfile
      description: Updates the properties of a profile. The ProfileId is required for updating a customer profile. When calling the UpdateProfile API, specifying an empty string value means that any existing value will be removed. Not specifying a string value means that any value already there will be kept.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/name"
          description: The unique name of the domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ProfileId:
                  $ref: "#/components/schemas/uuid"
                AdditionalInformation:
                  $ref: "#/components/schemas/sensitiveString0To1000"
                AccountNumber:
                  $ref: "#/components/schemas/sensitiveString0To255"
                PartyType:
                  $ref: "#/components/schemas/PartyType"
                BusinessName:
                  $ref: "#/components/schemas/sensitiveString0To255"
                FirstName:
                  $ref: "#/components/schemas/sensitiveString0To255"
                MiddleName:
                  $ref: "#/components/schemas/sensitiveString0To255"
                LastName:
