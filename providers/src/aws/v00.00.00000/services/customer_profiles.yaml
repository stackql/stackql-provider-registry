      description: The relative time period over which data is included in the aggregation.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Value"
          description: The amount of time of the specified unit.
        Unit:
          $ref: "#/components/schemas/Unit"
          description: The unit of time.
        ValueRange:
          $ref: "#/components/schemas/ValueRange"
          description: A structure letting customers specify a relative time window over which over which data is included in the Calculated Attribute. Use positive numbers to indicate that the endpoint is in the past, and negative numbers to indicate it is in the future. ValueRange overrides Value.
        TimestampSource:
          $ref: "#/components/schemas/string1To255"
          description: 'An expression specifying the field in your JSON object from which the date should be parsed. The expression should follow the structure of \"{ObjectTypeName.<Location of timestamp field in JSON pointer format>}\". E.g. if your object type is MyType and source JSON is {"generatedAt": {"timestamp": "1737587945945"}}, then TimestampSource should be "{MyType.generatedAt.timestamp}".'
        TimestampFormat:
          $ref: "#/components/schemas/string1To255"
          description: 'The format the timestamp field in your JSON object is specified. This value should be one of EPOCHMILLI (for Unix epoch timestamps with second/millisecond level precision) or ISO_8601 (following ISO_8601 format with second/millisecond level precision, with an optional offset of Z or in the format HH:MM or HHMM.). E.g. if your object type is MyType and source JSON is {"generatedAt": {"timestamp": "2001-07-04T12:08:56.235-0700"}}, then TimestampFormat should be "ISO_8601".'
