  /ListDatasetEntries:
    post:
      operationId: ListDatasetEntries
      description: This operation applies only to Amazon Rekognition Custom Labels. Lists the entries (images) within a dataset. An entry is a JSON Line that contains the information for a single image, including the image location, assigned labels, and object location bounding boxes. For more information, see Creating a manifest file. JSON Lines in the response include information about non-terminal errors found in the dataset. Non terminal errors are reported in errors lists within each JSON Line. The same information is reported in the training and testing validation result manifests that Amazon Rekognition Custom Labels creates during model training. You can filter the response in variety of ways, such as choosing which labels to return and returning JSON Lines created after a specific date. This operation requires permissions to perform the rekognition:ListDatasetEntries action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.ListDatasetEntries
            default: RekognitionService.ListDatasetEntries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DatasetArn:
                  $ref: "#/components/schemas/DatasetArn"
                  description: The Amazon Resource Name (ARN) for the dataset that you want to use.
                ContainsLabels:
                  $ref: "#/components/schemas/DatasetLabels"
                  description: Specifies a label filter for the response. The response includes an entry only if one or more of the labels in ContainsLabels exist in the entry.
                Labeled:
                  $ref: "#/components/schemas/IsLabeled"
                  description: Specify true to get only the JSON Lines where the image is labeled. Specify false to get only the JSON Lines where the image isn't labeled. If you don't specify Labeled, ListDatasetEntries returns JSON Lines for labeled and unlabeled images.
                SourceRefContains:
                  $ref: "#/components/schemas/QueryString"
                  description: If specified, ListDatasetEntries only returns JSON Lines where the value of SourceRefContains is part of the source-ref field. The source-ref field contains the Amazon S3 location of the image. You can use SouceRefContains for tasks such as getting the JSON Line for a single image, or gettting JSON Lines for all images within a specific folder.
                HasErrors:
                  $ref: "#/components/schemas/HasErrors"
                  description: Specifies an error filter for the response. Specify True to only include entries that have errors.
                NextToken:
                  $ref: "#/components/schemas/ExtendedPaginationToken"
                  description: If the previous response was incomplete (because there is more results to retrieve), Amazon Rekognition Custom Labels returns a pagination token in the response. You can use this pagination token to retrieve the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/ListDatasetEntriesPageSize"
                  description: The maximum number of results to return per paginated call. The largest value you can specify is 100. If you specify a value greater than 100, a ValidationException error occurs. The default value is 100.
              required:
                - DatasetArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatasetEntriesOutputDisplay"
  /ListDatasetLabels:
    post:
      operationId: ListDatasetLabels
      description: This operation applies only to Amazon Rekognition Custom Labels. Lists the labels in a dataset. Amazon Rekognition Custom Labels uses labels to describe images. For more information, see Labeling images. Lists the labels in a dataset. Amazon Rekognition Custom Labels uses labels to describe images. For more information, see Labeling images in the Amazon Rekognition Custom Labels Developer Guide.
