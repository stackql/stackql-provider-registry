      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CollectionId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.\\-]+"
    UserId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.\\-:]+"
    UserFaceIdList:
      type: array
      items:
        $ref: "#/components/schemas/FaceId"
    FaceId:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    Percent:
      type: number
      format: float
      minimum: 0
      maximum: 100
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-_]+$
    AssociateFacesResponse:
      type: object
      properties:
        AssociatedFaces:
          $ref: "#/components/schemas/AssociatedFacesList"
          description: An array of AssociatedFace objects containing FaceIDs that have been successfully associated with the UserID. Returned if the AssociateFaces action is successful.
        UnsuccessfulFaceAssociations:
          $ref: "#/components/schemas/UnsuccessfulFaceAssociationList"
          description: An array of UnsuccessfulAssociation objects containing FaceIDs that are not successfully associated along with the reasons. Returned if the AssociateFaces action is successful.
        UserStatus:
          $ref: "#/components/schemas/UserStatus"
          description: The status of an update made to a UserID. Reflects if the UserID has been updated for every requested change.
    AssociatedFacesList:
      type: array
      items:
        $ref: "#/components/schemas/AssociatedFace"
    AssociatedFace:
      description: Provides face metadata for the faces that are associated to a specific UserID.
      type: object
      properties:
        FaceId:
          $ref: "#/components/schemas/FaceId"
          description: Unique identifier assigned to the face.
    UnsuccessfulFaceAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/UnsuccessfulFaceAssociation"
    UnsuccessfulFaceAssociation:
      description: Contains metadata like FaceId, UserID, and Reasons, for a face that was unsuccessfully associated.
      type: object
      properties:
        FaceId:
          $ref: "#/components/schemas/FaceId"
          description: A unique identifier assigned to the face.
        UserId:
          $ref: "#/components/schemas/UserId"
          description: A provided ID for the UserID. Unique within the collection.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Match confidence with the UserID, provides information regarding if a face association was unsuccessful because it didn't meet UserMatchThreshold.
        Reasons:
          $ref: "#/components/schemas/UnsuccessfulFaceAssociationReasons"
          description: The reason why the association was unsuccessful.
    UnsuccessfulFaceAssociationReasons:
      type: array
      items:
        $ref: "#/components/schemas/UnsuccessfulFaceAssociationReason"
    UnsuccessfulFaceAssociationReason:
      type: string
      enum:
        - FACE_NOT_FOUND
        - ASSOCIATED_TO_A_DIFFERENT_USER
        - LOW_MATCH_CONFIDENCE
    UserStatus:
      type: string
      enum:
        - ACTIVE
        - UPDATING
        - CREATING
        - CREATED
    Image:
      description: Provides the input image either as bytes or an S3 object. You pass image bytes to an Amazon Rekognition API operation by using the Bytes property. For example, you would use the Bytes property to pass an image loaded from a local file system. Image bytes passed by using the Bytes property must be base64-encoded. Your code may not need to encode image bytes if you are using an AWS SDK to call Amazon Rekognition API operations. For more information, see Analyzing an Image Loaded from a Local File System in the Amazon Rekognition Developer Guide. You pass images stored in an S3 bucket to an Amazon Rekognition API operation by using the S3Object property. Images stored in an S3 bucket do not need to be base64-encoded. The region for the S3 bucket containing the S3 object must match the region you use for Amazon Rekognition operations. If you use the AWS CLI to call Amazon Rekognition operations, passing image bytes using the Bytes property is not supported. You must first upload the image to an Amazon S3 bucket and then call the operation using the S3Object property. For Amazon Rekognition to process an S3 object, the user must have permission to access the S3 object. For more information, see How Amazon Rekognition works with IAM in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        Bytes:
          $ref: "#/components/schemas/ImageBlob"
          description: Blob of image bytes up to 5 MBs. Note that the maximum image size you can pass to DetectCustomLabels is 4MB.
        S3Object:
          $ref: "#/components/schemas/S3Object"
          description: Identifies an S3 object as the image source.
    ImageBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 5242880
    S3Object:
      description: Provides the S3 bucket name and object name. The region for the S3 bucket containing the S3 object must match the region you use for Amazon Rekognition operations. For Amazon Rekognition to process an S3 object, the user must have permission to access the S3 object. For more information, see How Amazon Rekognition works with IAM in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: Name of the S3 bucket.
        Name:
          $ref: "#/components/schemas/S3ObjectName"
          description: S3 object key name.
        Version:
          $ref: "#/components/schemas/S3ObjectVersion"
          description: If the bucket is versioning enabled, you can specify the object version.
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[0-9A-Za-z\\.\\-_]*"
    S3ObjectName:
      type: string
      minLength: 1
      maxLength: 1024
    S3ObjectVersion:
      type: string
      minLength: 1
      maxLength: 1024
    QualityFilter:
      type: string
      enum:
        - NONE
        - AUTO
        - LOW
        - MEDIUM
        - HIGH
    CompareFacesResponse:
      type: object
      properties:
        SourceImageFace:
          $ref: "#/components/schemas/ComparedSourceImageFace"
          description: The face in the source image that was used for comparison.
        FaceMatches:
          $ref: "#/components/schemas/CompareFacesMatchList"
          description: An array of faces in the target image that match the source image face. Each CompareFacesMatch object provides the bounding box, the confidence level that the bounding box contains a face, and the similarity score for the face in the bounding box and the face in the source image.
        UnmatchedFaces:
          $ref: "#/components/schemas/CompareFacesUnmatchList"
          description: An array of faces in the target image that did not match the source image face.
        SourceImageOrientationCorrection:
          $ref: "#/components/schemas/OrientationCorrection"
          description: The value of SourceImageOrientationCorrection is always null. If the input image is in .jpeg format, it might contain exchangeable image file format (Exif) metadata that includes the image's orientation. Amazon Rekognition uses this orientation information to perform image correction. The bounding box coordinates are translated to represent object locations after the orientation information in the Exif metadata is used to correct the image orientation. Images in .png format don't contain Exif metadata. Amazon Rekognition doesn’t perform image correction for images in .png format and .jpeg images without orientation information in the image Exif metadata. The bounding box coordinates aren't translated and represent the object locations before the image is rotated.
        TargetImageOrientationCorrection:
          $ref: "#/components/schemas/OrientationCorrection"
          description: The value of TargetImageOrientationCorrection is always null. If the input image is in .jpeg format, it might contain exchangeable image file format (Exif) metadata that includes the image's orientation. Amazon Rekognition uses this orientation information to perform image correction. The bounding box coordinates are translated to represent object locations after the orientation information in the Exif metadata is used to correct the image orientation. Images in .png format don't contain Exif metadata. Amazon Rekognition doesn’t perform image correction for images in .png format and .jpeg images without orientation information in the image Exif metadata. The bounding box coordinates aren't translated and represent the object locations before the image is rotated.
    ComparedSourceImageFace:
      description: Type that describes the face Amazon Rekognition chose to compare with the faces in the target. This contains a bounding box for the selected face and confidence level that the bounding box contains a face. Note that Amazon Rekognition selects the largest face in the source image for this comparison.
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: Bounding box of the face.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Confidence level that the selected bounding box contains a face.
    BoundingBox:
      description: Identifies the bounding box around the label, face, text, object of interest, or personal protective equipment. The left (x-coordinate) and top (y-coordinate) are coordinates representing the top and left sides of the bounding box. Note that the upper-left corner of the image is the origin (0,0). The top and left values returned are ratios of the overall image size. For example, if the input image is 700x200 pixels, and the top-left coordinate of the bounding box is 350x50 pixels, the API returns a left value of 0.5 (350/700) and a top value of 0.25 (50/200). The width and height values represent the dimensions of the bounding box as a ratio of the overall image dimension. For example, if the input image is 700x200 pixels, and the bounding box width is 70 pixels, the width returned is 0.1. The bounding box coordinates can have negative values. For example, if Amazon Rekognition is able to detect a face that is at the image edge and is only partially visible, the service can return coordinates that are outside the image bounds and, depending on the image edge, you might get negative values or values greater than 1 for the left or top values.
      type: object
      properties:
        Width:
          $ref: "#/components/schemas/Float"
          description: Width of the bounding box as a ratio of the overall image width.
        Height:
          $ref: "#/components/schemas/Float"
          description: Height of the bounding box as a ratio of the overall image height.
        Left:
          $ref: "#/components/schemas/Float"
          description: Left coordinate of the bounding box as a ratio of overall image width.
        Top:
          $ref: "#/components/schemas/Float"
          description: Top coordinate of the bounding box as a ratio of overall image height.
    Float:
      type: number
      format: float
    CompareFacesMatchList:
      type: array
      items:
        $ref: "#/components/schemas/CompareFacesMatch"
    CompareFacesMatch:
      description: Provides information about a face in a target image that matches the source image face analyzed by CompareFaces. The Face property contains the bounding box of the face in the target image. The Similarity property is the confidence that the source image face matches the face in the bounding box.
      type: object
      properties:
        Similarity:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence that the faces match.
        Face:
          $ref: "#/components/schemas/ComparedFace"
          description: Provides face metadata (bounding box and confidence that the bounding box actually contains a face).
    ComparedFace:
      description: Provides face metadata for target image faces that are analyzed by CompareFaces and RecognizeCelebrities.
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: Bounding box of the face.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence that what the bounding box contains is a face.
        Landmarks:
          $ref: "#/components/schemas/Landmarks"
          description: An array of facial landmarks.
        Pose:
          $ref: "#/components/schemas/Pose"
          description: Indicates the pose of the face as determined by its pitch, roll, and yaw.
        Quality:
          $ref: "#/components/schemas/ImageQuality"
          description: Identifies face image brightness and sharpness.
        Emotions:
          $ref: "#/components/schemas/Emotions"
          description: The emotions that appear to be expressed on the face, and the confidence level in the determination. Valid values include "Happy", "Sad", "Angry", "Confused", "Disgusted", "Surprised", "Calm", "Unknown", and "Fear".
        Smile:
          $ref: "#/components/schemas/Smile"
          description: Indicates whether or not the face is smiling, and the confidence level in the determination.
    Landmarks:
      type: array
      items:
        $ref: "#/components/schemas/Landmark"
    Landmark:
      description: Indicates the location of the landmark on the face.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/LandmarkType"
          description: Type of landmark.
        X:
          $ref: "#/components/schemas/Float"
          description: The x-coordinate of the landmark expressed as a ratio of the width of the image. The x-coordinate is measured from the left-side of the image. For example, if the image is 700 pixels wide and the x-coordinate of the landmark is at 350 pixels, this value is 0.5.
        "Y":
          $ref: "#/components/schemas/Float"
          description: The y-coordinate of the landmark expressed as a ratio of the height of the image. The y-coordinate is measured from the top of the image. For example, if the image height is 200 pixels and the y-coordinate of the landmark is at 50 pixels, this value is 0.25.
    LandmarkType:
      type: string
      enum:
        - eyeLeft
        - eyeRight
        - nose
        - mouthLeft
        - mouthRight
        - leftEyeBrowLeft
        - leftEyeBrowRight
        - leftEyeBrowUp
        - rightEyeBrowLeft
        - rightEyeBrowRight
        - rightEyeBrowUp
        - leftEyeLeft
        - leftEyeRight
        - leftEyeUp
        - leftEyeDown
        - rightEyeLeft
        - rightEyeRight
        - rightEyeUp
        - rightEyeDown
        - noseLeft
        - noseRight
        - mouthUp
        - mouthDown
        - leftPupil
        - rightPupil
        - upperJawlineLeft
        - midJawlineLeft
        - chinBottom
        - midJawlineRight
        - upperJawlineRight
    Pose:
      description: Indicates the pose of the face as determined by its pitch, roll, and yaw.
      type: object
      properties:
        Roll:
          $ref: "#/components/schemas/Degree"
          description: Value representing the face rotation on the roll axis.
        Yaw:
          $ref: "#/components/schemas/Degree"
          description: Value representing the face rotation on the yaw axis.
        Pitch:
          $ref: "#/components/schemas/Degree"
          description: Value representing the face rotation on the pitch axis.
    Degree:
      type: number
      format: float
      minimum: -180
      maximum: 180
    ImageQuality:
      description: Identifies face image brightness and sharpness.
      type: object
      properties:
        Brightness:
          $ref: "#/components/schemas/Float"
          description: Value representing brightness of the face. The service returns a value between 0 and 100 (inclusive). A higher value indicates a brighter face image.
        Sharpness:
          $ref: "#/components/schemas/Float"
          description: Value representing sharpness of the face. The service returns a value between 0 and 100 (inclusive). A higher value indicates a sharper face image.
    Emotions:
      type: array
      items:
        $ref: "#/components/schemas/Emotion"
    Emotion:
      description: The API returns a prediction of an emotion based on a person's facial expressions, along with the confidence level for the predicted emotion. It is not a determination of the person’s internal emotional state and should not be used in such a way. For example, a person pretending to have a sad face might not be sad emotionally. The API is not intended to be used, and you may not use it, in a manner that violates the EU Artificial Intelligence Act or any other applicable law.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/EmotionName"
          description: Type of emotion detected.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    EmotionName:
      type: string
      enum:
        - HAPPY
        - SAD
        - ANGRY
        - CONFUSED
        - DISGUSTED
        - SURPRISED
        - CALM
        - UNKNOWN
        - FEAR
    Smile:
      description: Indicates whether or not the face is smiling, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the face is smiling or not.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    Boolean:
      type: boolean
    CompareFacesUnmatchList:
      type: array
      items:
        $ref: "#/components/schemas/ComparedFace"
    OrientationCorrection:
      type: string
      enum:
        - ROTATE_0
        - ROTATE_90
        - ROTATE_180
        - ROTATE_270
    ProjectArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: (^arn:[a-z\d-]+:rekognition:[a-z\d-]+:\d{12}:project\/[a-zA-Z0-9_.\-]{1,255}\/[0-9]+$)
    ProjectVersionArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: (^arn:[a-z\d-]+:rekognition:[a-z\d-]+:\d{12}:project\/[a-zA-Z0-9_.\-]{1,255}\/version\/[a-zA-Z0-9_.\-]{1,255}\/[0-9]+$)
    VersionName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.\\-]+"
    OutputConfig:
      description: The S3 bucket and folder location where training output is placed.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The S3 bucket where training output is placed.
        S3KeyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: The prefix applied to the training output files.
    S3KeyPrefix:
      type: string
      maxLength: 1024
    TagMap:
      type: object
      properties: {}
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]{0,2048}$
    CopyProjectVersionResponse:
      type: object
      properties:
        ProjectVersionArn:
          $ref: "#/components/schemas/ProjectVersionArn"
          description: The ARN of the copied model version in the destination project.
    CreateCollectionResponse:
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/UInteger"
          description: HTTP status code indicating the result of the operation.
        CollectionArn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) of the collection. You can use this to manage permissions on your resources.
        FaceModelVersion:
          $ref: "#/components/schemas/String"
          description: Version number of the face detection model associated with the collection you are creating.
    UInteger:
      type: integer
      minimum: 0
    String:
      type: string
    DatasetSource:
      description: The source that Amazon Rekognition Custom Labels uses to create a dataset. To use an Amazon Sagemaker format manifest file, specify the S3 bucket location in the GroundTruthManifest field. The S3 bucket must be in your AWS account. To create a copy of an existing dataset, specify the Amazon Resource Name (ARN) of an existing dataset in DatasetArn. You need to specify a value for DatasetArn or GroundTruthManifest, but not both. if you supply both values, or if you don't specify any values, an InvalidParameterException exception occurs. For more information, see CreateDataset.
      type: object
      properties:
        GroundTruthManifest:
          $ref: "#/components/schemas/GroundTruthManifest"
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The ARN of an Amazon Rekognition Custom Labels dataset that you want to copy.
    GroundTruthManifest:
      description: The S3 bucket that contains an Amazon Sagemaker Ground Truth format manifest file.
      type: object
      properties:
        S3Object:
          $ref: "#/components/schemas/S3Object"
    DatasetArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: (^arn:[a-z\d-]+:rekognition:[a-z\d-]+:\d{12}:project\/[a-zA-Z0-9_.\-]{1,255}\/dataset\/(train|test)\/[0-9]+$)
    DatasetType:
      type: string
      enum:
        - TRAIN
        - TEST
    CreateDatasetResponse:
      type: object
      properties:
        DatasetArn:
          $ref: "#/components/schemas/DatasetArn"
          description: The ARN of the created Amazon Rekognition Custom Labels dataset.
    CreateFaceLivenessSessionRequestSettings:
      description: A session settings object. It contains settings for the operation to be performed. It accepts arguments for OutputConfig and AuditImagesLimit.
      type: object
      properties:
        OutputConfig:
          $ref: "#/components/schemas/LivenessOutputConfig"
          description: Can specify the location of an Amazon S3 bucket, where reference and audit images will be stored. Note that the Amazon S3 bucket must be located in the caller's AWS account and in the same region as the Face Liveness end-point. Additionally, the Amazon S3 object keys are auto-generated by the Face Liveness system. Requires that the caller has the s3:PutObject permission on the Amazon S3 bucket.
        AuditImagesLimit:
          $ref: "#/components/schemas/AuditImagesLimit"
          description: Number of audit images to be returned back. Takes an integer between 0-4. Any integer less than 0 will return 0, any integer above 4 will return 4 images in the response. By default, it is set to 0. The limit is best effort and is based on the actual duration of the selfie-video.
        ChallengePreferences:
          $ref: "#/components/schemas/ChallengePreferences"
          description: Indicates preferred challenge types and versions for the Face Liveness session to be created.
    LivenessOutputConfig:
      description: Contains settings that specify the location of an Amazon S3 bucket used to store the output of a Face Liveness session. Note that the S3 bucket must be located in the caller's AWS account and in the same region as the Face Liveness end-point. Additionally, the Amazon S3 object keys are auto-generated by the Face Liveness system.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The path to an AWS Amazon S3 bucket used to store Face Liveness session results.
        S3KeyPrefix:
          $ref: "#/components/schemas/LivenessS3KeyPrefix"
          description: The prefix prepended to the output files for the Face Liveness session results.
      required:
        - S3Bucket
    LivenessS3KeyPrefix:
      type: string
      maxLength: 950
      pattern: \S*
    AuditImagesLimit:
      type: integer
      minimum: 0
      maximum: 4
    ChallengePreferences:
      type: array
      items:
        $ref: "#/components/schemas/ChallengePreference"
    ChallengePreference:
      description: An ordered list of preferred challenge type and versions.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ChallengeType"
          description: The types of challenges that have been selected for the Face Liveness session.
        Versions:
          $ref: "#/components/schemas/Versions"
          description: The version of the challenges that have been selected for the Face Liveness session.
      required:
        - Type
    ChallengeType:
      type: string
      enum:
        - FaceMovementAndLightChallenge
        - FaceMovementChallenge
    Versions:
      description: Object specifying the acceptable range of challenge versions.
      type: object
      properties:
        Minimum:
          $ref: "#/components/schemas/Version"
          description: The desired minimum version for the challenge.
        Maximum:
          $ref: "#/components/schemas/Version"
          description: The desired maximum version for the challenge.
    Version:
      type: string
      minLength: 5
      maxLength: 11
      pattern: ^(0|[1-9]\d{0,2})\.(0|[1-9]\d{0,2})\.(0|[1-9]\d{0,2})$
    CreateFaceLivenessSessionResponse:
      type: object
      properties:
        SessionId:
          $ref: "#/components/schemas/LivenessSessionId"
          description: A unique 128-bit UUID identifying a Face Liveness session. A new sessionID must be used for every Face Liveness check. If a given sessionID is used for subsequent Face Liveness checks, the checks will fail. Additionally, a SessionId expires 3 minutes after it's sent, making all Liveness data associated with the session (e.g., sessionID, reference image, audit images, etc.) unavailable.
      required:
        - SessionId
    LivenessSessionId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    ProjectName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.\\-]+"
    CustomizationFeature:
      type: string
      enum:
        - CONTENT_MODERATION
        - CUSTOM_LABELS
    ProjectAutoUpdate:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateProjectResponse:
      type: object
      properties:
        ProjectArn:
          $ref: "#/components/schemas/ProjectArn"
          description: The Amazon Resource Name (ARN) of the new project. You can use the ARN to configure IAM access to the project.
    TrainingData:
      description: The dataset used for training.
      type: object
      properties:
        Assets:
          $ref: "#/components/schemas/Assets"
          description: A manifest file that contains references to the training images and ground-truth annotations.
    Assets:
      type: array
      items:
        $ref: "#/components/schemas/Asset"
    Asset:
      description: Assets are the images that you use to train and evaluate a model version. Assets can also contain validation information that you use to debug a failed model training.
      type: object
      properties:
        GroundTruthManifest:
          $ref: "#/components/schemas/GroundTruthManifest"
    TestingData:
      description: The dataset used for testing. Optionally, if AutoCreate is set, Amazon Rekognition uses the training dataset to create a test dataset with a temporary split of the training dataset.
      type: object
      properties:
        Assets:
          $ref: "#/components/schemas/Assets"
          description: The assets used for testing.
        AutoCreate:
          $ref: "#/components/schemas/Boolean"
          description: If specified, Rekognition splits training dataset to create a test dataset for the training job.
    VersionDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9-_. ()':,;?]+"
    CustomizationFeatureConfig:
      description: Feature specific configuration for the training job. Configuration provided for the job must match the feature type parameter associated with project. If configuration and feature type do not match an InvalidParameterException is returned.
      type: object
      properties:
        ContentModeration:
          $ref: "#/components/schemas/CustomizationFeatureContentModerationConfig"
          description: Configuration options for Custom Moderation training.
    CustomizationFeatureContentModerationConfig:
      description: Configuration options for Content Moderation training.
      type: object
      properties:
        ConfidenceThreshold:
          $ref: "#/components/schemas/Percent"
          description: The confidence level you plan to use to identify if unsafe content is present during inference.
    CreateProjectVersionResponse:
      type: object
      properties:
        ProjectVersionArn:
          $ref: "#/components/schemas/ProjectVersionArn"
          description: The ARN of the model or the project version that was created. Use DescribeProjectVersion to get the current status of the training operation.
    StreamProcessorInput:
      description: Information about the source streaming video.
      type: object
      properties:
        KinesisVideoStream:
          $ref: "#/components/schemas/KinesisVideoStream"
          description: The Kinesis video stream input stream for the source streaming video.
    KinesisVideoStream:
      description: Kinesis video stream stream that provides the source streaming video for a Amazon Rekognition Video stream processor. For more information, see CreateStreamProcessor in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/KinesisVideoArn"
          description: ARN of the Kinesis video stream stream that streams the source video.
    KinesisVideoArn:
      type: string
      pattern: (^arn:([a-z\d-]+):kinesisvideo:([a-z\d-]+):\d{12}:.+$)
    StreamProcessorOutput:
      description: Information about the Amazon Kinesis Data Streams stream to which a Amazon Rekognition Video stream processor streams the results of a video analysis. For more information, see CreateStreamProcessor in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        KinesisDataStream:
          $ref: "#/components/schemas/KinesisDataStream"
          description: The Amazon Kinesis Data Streams stream to which the Amazon Rekognition stream processor streams the analysis results.
        S3Destination:
          $ref: "#/components/schemas/S3Destination"
          description: The Amazon S3 bucket location to which Amazon Rekognition publishes the detailed inference results of a video analysis operation.
    KinesisDataStream:
      description: The Kinesis data stream Amazon Rekognition to which the analysis results of a Amazon Rekognition stream processor are streamed. For more information, see CreateStreamProcessor in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/KinesisDataArn"
          description: ARN of the output Amazon Kinesis Data Streams stream.
    KinesisDataArn:
      type: string
      pattern: (^arn:([a-z\d-]+):kinesis:([a-z\d-]+):\d{12}:.+$)
    S3Destination:
      description: The Amazon S3 bucket location to which Amazon Rekognition publishes the detailed inference results of a video analysis operation. These results include the name of the stream processor resource, the session ID of the stream processing session, and labeled timestamps and bounding boxes for detected labels.
      type: object
      properties:
        Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The name of the Amazon S3 bucket you want to associate with the streaming video project. You must be the owner of the Amazon S3 bucket.
        KeyPrefix:
          $ref: "#/components/schemas/S3KeyPrefix"
          description: The prefix value of the location within the bucket that you want the information to be published to. For more information, see Using prefixes.
    StreamProcessorName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.\\-]+"
    StreamProcessorSettings:
      description: Input parameters used in a streaming video analyzed by a Amazon Rekognition stream processor. You can use FaceSearch to recognize faces in a streaming video, or you can use ConnectedHome to detect labels.
      type: object
      properties:
        FaceSearch:
          $ref: "#/components/schemas/FaceSearchSettings"
          description: Face search settings to use on a streaming video.
        ConnectedHome:
          $ref: "#/components/schemas/ConnectedHomeSettings"
    FaceSearchSettings:
      description: Input face recognition parameters for an Amazon Rekognition stream processor. Includes the collection to use for face recognition and the face attributes to detect. Defining the settings is required in the request parameter for CreateStreamProcessor.
      type: object
      properties:
        CollectionId:
          $ref: "#/components/schemas/CollectionId"
          description: The ID of a collection that contains faces that you want to search for.
        FaceMatchThreshold:
          $ref: "#/components/schemas/Percent"
          description: Minimum face match confidence score that must be met to return a result for a recognized face. The default is 80. 0 is the lowest confidence. 100 is the highest confidence. Values between 0 and 100 are accepted, and values lower than 80 are set to 80.
    ConnectedHomeSettings:
      description: Label detection settings to use on a streaming video. Defining the settings is required in the request parameter for CreateStreamProcessor. Including this setting in the CreateStreamProcessor request enables you to use the stream processor for label detection. You can then select what you want the stream processor to detect, such as people or pets. When the stream processor has started, one notification is sent for each object class specified. For example, if packages and pets are selected, one SNS notification is published the first time a package is detected and one SNS notification is published the first time a pet is detected, as well as an end-of-session summary.
      type: object
      properties:
        Labels:
          $ref: "#/components/schemas/ConnectedHomeLabels"
          description: 'Specifies what you want to detect in the video, such as people, packages, or pets. The current valid labels you can include in this list are: "PERSON", "PET", "PACKAGE", and "ALL".'
        MinConfidence:
          $ref: "#/components/schemas/Percent"
          description: The minimum confidence required to label an object in the video.
      required:
        - Labels
    ConnectedHomeLabels:
      type: array
      items:
        $ref: "#/components/schemas/ConnectedHomeLabel"
    ConnectedHomeLabel:
      type: string
    RoleArn:
      type: string
      pattern: arn:aws:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    StreamProcessorNotificationChannel:
      description: The Amazon Simple Notification Service topic to which Amazon Rekognition publishes the object detection results and completion status of a video analysis operation. Amazon Rekognition publishes a notification the first time an object of interest or a person is detected in the video stream. For example, if Amazon Rekognition detects a person at second 2, a pet at second 4, and a person again at second 5, Amazon Rekognition sends 2 object class detected notifications, one for a person at second 2 and one for a pet at second 4. Amazon Rekognition also publishes an an end-of-session notification with a summary when the stream processing session is complete.
      type: object
      properties:
        SNSTopicArn:
          $ref: "#/components/schemas/SNSTopicArn"
          description: The Amazon Resource Number (ARN) of the Amazon Amazon Simple Notification Service topic to which Amazon Rekognition posts the completion status.
      required:
        - SNSTopicArn
    SNSTopicArn:
      type: string
      pattern: (^arn:aws:sns:.*:\w{12}:.+$)
    RegionsOfInterest:
      type: array
      items:
        $ref: "#/components/schemas/RegionOfInterest"
    RegionOfInterest:
      description: Specifies a location within the frame that Rekognition checks for objects of interest such as text, labels, or faces. It uses a BoundingBox or Polygon to set a region of the screen. A word, face, or label is included in the region if it is more than half in that region. If there is more than one region, the word, face, or label is compared with all regions of the screen. Any object of interest that is more than half in a region is kept in the results.
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: The box representing a region of interest on screen.
        Polygon:
          $ref: "#/components/schemas/Polygon"
          description: Specifies a shape made up of up to 10 Point objects to define a region of interest.
    Polygon:
      type: array
      items:
        $ref: "#/components/schemas/Point"
    Point:
      description: The X and Y coordinates of a point on an image or video frame. The X and Y values are ratios of the overall image size or video resolution. For example, if an input image is 700x200 and the values are X=0.5 and Y=0.25, then the point is at the (350,50) pixel coordinate on the image. An array of Point objects makes up a Polygon. A Polygon is returned by DetectText and by DetectCustomLabels Polygon represents a fine-grained polygon around a detected item. For more information, see Geometry in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        X:
          $ref: "#/components/schemas/Float"
          description: The value of the X coordinate for a point on a Polygon.
        "Y":
          $ref: "#/components/schemas/Float"
          description: The value of the Y coordinate for a point on a Polygon.
    StreamProcessorDataSharingPreference:
      description: Allows you to opt in or opt out to share data with Rekognition to improve model performance. You can choose this option at the account level or on a per-stream basis. Note that if you opt out at the account level this setting is ignored on individual streams.
      type: object
      properties:
        OptIn:
          $ref: "#/components/schemas/Boolean"
          description: If this option is set to true, you choose to share data with Rekognition to improve model performance.
      required:
        - OptIn
    CreateStreamProcessorResponse:
      type: object
      properties:
        StreamProcessorArn:
          $ref: "#/components/schemas/StreamProcessorArn"
          description: Amazon Resource Number for the newly created stream processor.
    StreamProcessorArn:
      type: string
      pattern: (^arn:[a-z\d-]+:rekognition:[a-z\d-]+:\d{12}:streamprocessor\/.+$)
    CreateUserResponse:
      type: object
    DeleteCollectionResponse:
