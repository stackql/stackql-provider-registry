          description: The F1 score for the evaluation of all labels. The F1 score metric evaluates the overall precision and recall performance of the model as a single value. A higher value indicates better precision and recall performance. A lower score indicates that precision, recall, or both are performing poorly.
        Summary:
          $ref: "#/components/schemas/Summary"
          description: The S3 bucket that contains the training summary.
    Summary:
      description: The S3 bucket that contains the training summary. The training summary includes aggregated evaluation metrics for the entire testing dataset and metrics for each individual label. You get the training summary S3 bucket location by calling DescribeProjectVersions.
      type: object
      properties:
        S3Object:
          $ref: "#/components/schemas/S3Object"
    ProjectsPageSize:
