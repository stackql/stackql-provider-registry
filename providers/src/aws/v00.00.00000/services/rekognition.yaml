          description: The location of the detected object on the image that corresponds to the custom label. Includes an axis aligned coarse bounding box surrounding the object and a finer grain polygon for more accurate spatial information.
    Geometry:
      description: Information about where an object (DetectCustomLabels) or text (DetectText) is located on an image.
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: An axis-aligned coarse representation of the detected item's location on the image.
        Polygon:
          $ref: "#/components/schemas/Polygon"
          description: Within the bounding box, a fine-grained polygon around the detected item.
    Attributes:
      type: array
      items:
        $ref: "#/components/schemas/Attribute"
    Attribute:
      type: string
      enum:
        - DEFAULT
        - ALL
        - AGE_RANGE
        - BEARD
        - EMOTIONS
        - EYE_DIRECTION
        - EYEGLASSES
        - EYES_OPEN
        - GENDER
        - MOUTH_OPEN
        - MUSTACHE
        - FACE_OCCLUDED
        - SMILE
        - SUNGLASSES
    DetectFacesResponse:
      type: object
      properties:
        FaceDetails:
          $ref: "#/components/schemas/FaceDetailList"
          description: Details of each face found in the image.
        OrientationCorrection:
          $ref: "#/components/schemas/OrientationCorrection"
          description: The value of OrientationCorrection is always null. If the input image is in .jpeg format, it might contain exchangeable image file format (Exif) metadata that includes the image's orientation. Amazon Rekognition uses this orientation information to perform image correction. The bounding box coordinates are translated to represent object locations after the orientation information in the Exif metadata is used to correct the image orientation. Images in .png format don't contain Exif metadata. Amazon Rekognition doesn’t perform image correction for images in .png format and .jpeg images without orientation information in the image Exif metadata. The bounding box coordinates aren't translated and represent the object locations before the image is rotated.
    FaceDetailList:
      type: array
      items:
        $ref: "#/components/schemas/FaceDetail"
    FaceDetail:
      description: "Structure containing attributes of the face that the algorithm detected. A FaceDetail object contains either the default facial attributes or all facial attributes. The default attributes are BoundingBox, Confidence, Landmarks, Pose, and Quality. GetFaceDetection is the only Amazon Rekognition Video stored video operation that can return a FaceDetail object with all attributes. To specify which attributes to return, use the FaceAttributes input parameter for StartFaceDetection. The following Amazon Rekognition Video operations return only the default attributes. The corresponding Start operations don't have a FaceAttributes input parameter: GetCelebrityRecognition GetPersonTracking GetFaceSearch The Amazon Rekognition Image DetectFaces and IndexFaces operations can return all facial attributes. To specify which attributes to return, use the Attributes input parameter for DetectFaces. For IndexFaces, use the DetectAttributes input parameter."
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: Bounding box of the face. Default attribute.
        AgeRange:
          $ref: "#/components/schemas/AgeRange"
          description: The estimated age range, in years, for the face. Low represents the lowest estimated age and High represents the highest estimated age.
        Smile:
          $ref: "#/components/schemas/Smile"
          description: Indicates whether or not the face is smiling, and the confidence level in the determination.
        Eyeglasses:
          $ref: "#/components/schemas/Eyeglasses"
          description: Indicates whether or not the face is wearing eye glasses, and the confidence level in the determination.
        Sunglasses:
          $ref: "#/components/schemas/Sunglasses"
          description: Indicates whether or not the face is wearing sunglasses, and the confidence level in the determination.
        Gender:
          $ref: "#/components/schemas/Gender"
          description: The predicted gender of a detected face.
        Beard:
          $ref: "#/components/schemas/Beard"
          description: Indicates whether or not the face has a beard, and the confidence level in the determination.
        Mustache:
          $ref: "#/components/schemas/Mustache"
          description: Indicates whether or not the face has a mustache, and the confidence level in the determination.
        EyesOpen:
          $ref: "#/components/schemas/EyeOpen"
          description: Indicates whether or not the eyes on the face are open, and the confidence level in the determination.
        MouthOpen:
          $ref: "#/components/schemas/MouthOpen"
          description: Indicates whether or not the mouth on the face is open, and the confidence level in the determination.
        Emotions:
          $ref: "#/components/schemas/Emotions"
          description: The emotions that appear to be expressed on the face, and the confidence level in the determination. The API is only making a determination of the physical appearance of a person's face. It is not a determination of the person’s internal emotional state and should not be used in such a way. For example, a person pretending to have a sad face might not be sad emotionally.
        Landmarks:
          $ref: "#/components/schemas/Landmarks"
          description: Indicates the location of landmarks on the face. Default attribute.
        Pose:
          $ref: "#/components/schemas/Pose"
          description: Indicates the pose of the face as determined by its pitch, roll, and yaw. Default attribute.
        Quality:
          $ref: "#/components/schemas/ImageQuality"
          description: Identifies image brightness and sharpness. Default attribute.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Confidence level that the bounding box contains a face (and not a different object such as a tree). Default attribute.
        FaceOccluded:
          $ref: "#/components/schemas/FaceOccluded"
          description: FaceOccluded should return "true" with a high confidence score if a detected face’s eyes, nose, and mouth are partially captured or if they are covered by masks, dark sunglasses, cell phones, hands, or other objects. FaceOccluded should return "false" with a high confidence score if common occurrences that do not impact face verification are detected, such as eye glasses, lightly tinted sunglasses, strands of hair, and others.
        EyeDirection:
          $ref: "#/components/schemas/EyeDirection"
          description: Indicates the direction the eyes are gazing in, as defined by pitch and yaw.
    AgeRange:
      description: Structure containing the estimated age range, in years, for a face. Amazon Rekognition estimates an age range for faces detected in the input image. Estimated age ranges can overlap. A face of a 5-year-old might have an estimated range of 4-6, while the face of a 6-year-old might have an estimated range of 4-8.
      type: object
      properties:
        Low:
          $ref: "#/components/schemas/UInteger"
          description: The lowest estimated age.
        High:
          $ref: "#/components/schemas/UInteger"
          description: The highest estimated age.
    Eyeglasses:
      description: Indicates whether or not the face is wearing eye glasses, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the face is wearing eye glasses or not.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    Sunglasses:
      description: Indicates whether or not the face is wearing sunglasses, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the face is wearing sunglasses or not.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    Gender:
      description: The predicted gender of a detected face. Amazon Rekognition makes gender binary (male/female) predictions based on the physical appearance of a face in a particular image. This kind of prediction is not designed to categorize a person’s gender identity, and you shouldn't use Amazon Rekognition to make such a determination. For example, a male actor wearing a long-haired wig and earrings for a role might be predicted as female. Using Amazon Rekognition to make gender binary predictions is best suited for use cases where aggregate gender distribution statistics need to be analyzed without identifying specific users. For example, the percentage of female users compared to male users on a social media platform. We don't recommend using gender binary predictions to make decisions that impact an individual's rights, privacy, or access to services.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/GenderType"
          description: The predicted gender of the face.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the prediction.
    GenderType:
      type: string
      enum:
        - Male
        - Female
    Beard:
      description: Indicates whether or not the face has a beard, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the face has beard or not.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    Mustache:
      description: Indicates whether or not the face has a mustache, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the face has mustache or not.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    EyeOpen:
      description: Indicates whether or not the eyes on the face are open, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the eyes on the face are open.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    MouthOpen:
      description: Indicates whether or not the mouth on the face is open, and the confidence level in the determination.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: Boolean value that indicates whether the mouth on the face is open or not.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence in the determination.
    FaceOccluded:
      description: FaceOccluded should return "true" with a high confidence score if a detected face’s eyes, nose, and mouth are partially captured or if they are covered by masks, dark sunglasses, cell phones, hands, or other objects. FaceOccluded should return "false" with a high confidence score if common occurrences that do not impact face verification are detected, such as eye glasses, lightly tinted sunglasses, strands of hair, and others. You can use FaceOccluded to determine if an obstruction on a face negatively impacts using the image for face matching.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Boolean"
          description: True if a detected face’s eyes, nose, and mouth are partially captured or if they are covered by masks, dark sunglasses, cell phones, hands, or other objects. False if common occurrences that do not impact face verification are detected, such as eye glasses, lightly tinted sunglasses, strands of hair, and others.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence that the service has detected the presence of a face occlusion.
    EyeDirection:
      description: Indicates the direction the eyes are gazing in (independent of the head pose) as determined by its pitch and yaw.
      type: object
      properties:
        Yaw:
          $ref: "#/components/schemas/Degree"
          description: Value representing eye direction on the yaw axis.
        Pitch:
          $ref: "#/components/schemas/Degree"
          description: Value representing eye direction on the pitch axis.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence that the service has in its predicted eye direction.
    DetectLabelsFeatureList:
      type: array
      items:
        $ref: "#/components/schemas/DetectLabelsFeatureName"
    DetectLabelsFeatureName:
      type: string
      enum:
        - GENERAL_LABELS
        - IMAGE_PROPERTIES
    DetectLabelsSettings:
      description: Settings for the DetectLabels request. Settings can include filters for both GENERAL_LABELS and IMAGE_PROPERTIES. GENERAL_LABELS filters can be inclusive or exclusive and applied to individual labels or label categories. IMAGE_PROPERTIES filters allow specification of a maximum number of dominant colors.
      type: object
      properties:
        GeneralLabels:
          $ref: "#/components/schemas/GeneralLabelsSettings"
          description: Contains the specified filters for GENERAL_LABELS.
        ImageProperties:
          $ref: "#/components/schemas/DetectLabelsImagePropertiesSettings"
          description: Contains the chosen number of maximum dominant colors in an image.
    GeneralLabelsSettings:
      description: Contains filters for the object labels returned by DetectLabels. Filters can be inclusive, exclusive, or a combination of both and can be applied to individual labels or entire label categories. To see a list of label categories, see Detecting Labels.
      type: object
      properties:
        LabelInclusionFilters:
          $ref: "#/components/schemas/GeneralLabelsFilterList"
          description: The labels that should be included in the return from DetectLabels.
        LabelExclusionFilters:
          $ref: "#/components/schemas/GeneralLabelsFilterList"
          description: The labels that should be excluded from the return from DetectLabels.
        LabelCategoryInclusionFilters:
          $ref: "#/components/schemas/GeneralLabelsFilterList"
          description: The label categories that should be included in the return from DetectLabels.
        LabelCategoryExclusionFilters:
          $ref: "#/components/schemas/GeneralLabelsFilterList"
          description: The label categories that should be excluded from the return from DetectLabels.
    GeneralLabelsFilterList:
      type: array
      items:
        $ref: "#/components/schemas/GeneralLabelsFilterValue"
    GeneralLabelsFilterValue:
      type: string
      minLength: 0
      maxLength: 50
      pattern: "[A-Za-z0-9àâèçñó'-_(). ]*"
    DetectLabelsImagePropertiesSettings:
      description: Settings for the IMAGE_PROPERTIES feature type.
      type: object
      properties:
        MaxDominantColors:
          $ref: "#/components/schemas/DetectLabelsMaxDominantColors"
          description: The maximum number of dominant colors to return when detecting labels in an image. The default value is 10.
    DetectLabelsMaxDominantColors:
      type: integer
      minimum: 0
      maximum: 20
    DetectLabelsResponse:
      type: object
      properties:
        Labels:
          $ref: "#/components/schemas/Labels"
          description: An array of labels for the real-world objects detected.
        OrientationCorrection:
          $ref: "#/components/schemas/OrientationCorrection"
          description: The value of OrientationCorrection is always null. If the input image is in .jpeg format, it might contain exchangeable image file format (Exif) metadata that includes the image's orientation. Amazon Rekognition uses this orientation information to perform image correction. The bounding box coordinates are translated to represent object locations after the orientation information in the Exif metadata is used to correct the image orientation. Images in .png format don't contain Exif metadata. Amazon Rekognition doesn’t perform image correction for images in .png format and .jpeg images without orientation information in the image Exif metadata. The bounding box coordinates aren't translated and represent the object locations before the image is rotated.
        LabelModelVersion:
          $ref: "#/components/schemas/String"
          description: Version number of the label detection model that was used to detect labels.
        ImageProperties:
          $ref: "#/components/schemas/DetectLabelsImageProperties"
          description: Information about the properties of the input image, such as brightness, sharpness, contrast, and dominant colors.
    Labels:
      type: array
      items:
        $ref: "#/components/schemas/Label"
    Label:
      description: Structure containing details about the detected label, including the name, detected instances, parent labels, and level of confidence.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name (label) of the object or scene.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Level of confidence.
        Instances:
          $ref: "#/components/schemas/Instances"
          description: If Label represents an object, Instances contains the bounding boxes for each instance of the detected object. Bounding boxes are returned for common object labels such as people, cars, furniture, apparel or pets.
        Parents:
          $ref: "#/components/schemas/Parents"
          description: The parent labels for a label. The response includes all ancestor labels.
        Aliases:
          $ref: "#/components/schemas/LabelAliases"
          description: A list of potential aliases for a given label.
        Categories:
          $ref: "#/components/schemas/LabelCategories"
          description: A list of the categories associated with a given label.
    Instances:
      type: array
      items:
        $ref: "#/components/schemas/Instance"
    Instance:
      description: An instance of a label returned by Amazon Rekognition Image (DetectLabels) or by Amazon Rekognition Video (GetLabelDetection).
      type: object
      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: The position of the label instance on the image.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence that Amazon Rekognition has in the accuracy of the bounding box.
        DominantColors:
          $ref: "#/components/schemas/DominantColors"
          description: The dominant colors found in an individual instance of a label.
    DominantColors:
      type: array
      items:
        $ref: "#/components/schemas/DominantColor"
    DominantColor:
      description: A description of the dominant colors in an image.
      type: object
      properties:
        Red:
          $ref: "#/components/schemas/UInteger"
          description: The Red RGB value for a dominant color.
        Blue:
          $ref: "#/components/schemas/UInteger"
          description: The Blue RGB value for a dominant color.
        Green:
          $ref: "#/components/schemas/UInteger"
          description: The Green RGB value for a dominant color.
        HexCode:
          $ref: "#/components/schemas/String"
          description: The Hex code equivalent of the RGB values for a dominant color.
        CSSColor:
          $ref: "#/components/schemas/String"
          description: The CSS color name of a dominant color.
        SimplifiedColor:
          $ref: "#/components/schemas/String"
          description: One of 12 simplified color names applied to a dominant color.
        PixelPercent:
          $ref: "#/components/schemas/Percent"
          description: The percentage of image pixels that have a given dominant color.
    Parents:
      type: array
      items:
        $ref: "#/components/schemas/Parent"
    Parent:
      description: A parent label for a label. A label can have 0, 1, or more parents.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the parent label.
    LabelAliases:
      type: array
      items:
        $ref: "#/components/schemas/LabelAlias"
    LabelAlias:
      description: A potential alias of for a given label.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of an alias for a given label.
    LabelCategories:
      type: array
      items:
        $ref: "#/components/schemas/LabelCategory"
    LabelCategory:
      description: The category that applies to a given label.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of a category that applies to a given label.
    DetectLabelsImageProperties:
      description: Information about the quality and dominant colors of an input image. Quality and color information is returned for the entire image, foreground, and background.
      type: object
      properties:
        Quality:
          $ref: "#/components/schemas/DetectLabelsImageQuality"
          description: Information about the quality of the image foreground as defined by brightness, sharpness, and contrast. The higher the value the greater the brightness, sharpness, and contrast respectively.
        DominantColors:
          $ref: "#/components/schemas/DominantColors"
          description: Information about the dominant colors found in an image, described with RGB values, CSS color name, simplified color name, and PixelPercentage (the percentage of image pixels that have a particular color).
        Foreground:
          $ref: "#/components/schemas/DetectLabelsImageForeground"
          description: Information about the properties of an image’s foreground, including the foreground’s quality and dominant colors, including the quality and dominant colors of the image.
        Background:
          $ref: "#/components/schemas/DetectLabelsImageBackground"
          description: Information about the properties of an image’s background, including the background’s quality and dominant colors, including the quality and dominant colors of the image.
    DetectLabelsImageQuality:
      description: The quality of an image provided for label detection, with regard to brightness, sharpness, and contrast.
      type: object
      properties:
        Brightness:
          $ref: "#/components/schemas/Float"
          description: The brightness of an image provided for label detection.
        Sharpness:
          $ref: "#/components/schemas/Float"
          description: The sharpness of an image provided for label detection.
        Contrast:
          $ref: "#/components/schemas/Float"
          description: The contrast of an image provided for label detection.
    DetectLabelsImageForeground:
      description: The foreground of the image with regard to image quality and dominant colors.
      type: object
      properties:
        Quality:
          $ref: "#/components/schemas/DetectLabelsImageQuality"
          description: The quality of the image foreground as defined by brightness and sharpness.
        DominantColors:
          $ref: "#/components/schemas/DominantColors"
          description: The dominant colors found in the foreground of an image, defined with RGB values, CSS color name, simplified color name, and PixelPercentage (the percentage of image pixels that have a particular color).
    DetectLabelsImageBackground:
      description: The background of the image with regard to image quality and dominant colors.
      type: object
      properties:
        Quality:
          $ref: "#/components/schemas/DetectLabelsImageQuality"
          description: The quality of the image background as defined by brightness and sharpness.
        DominantColors:
          $ref: "#/components/schemas/DominantColors"
          description: The dominant colors found in the background of an image, defined with RGB values, CSS color name, simplified color name, and PixelPercentage (the percentage of image pixels that have a particular color).
    HumanLoopConfig:
      description: Sets up the flow definition the image will be sent to if one of the conditions is met. You can also set certain attributes of the image before review.
      type: object
      properties:
        HumanLoopName:
          $ref: "#/components/schemas/HumanLoopName"
          description: The name of the human review used for this image. This should be kept unique within a region.
        FlowDefinitionArn:
          $ref: "#/components/schemas/FlowDefinitionArn"
          description: The Amazon Resource Name (ARN) of the flow definition. You can create a flow definition by using the Amazon Sagemaker CreateFlowDefinition Operation.
        DataAttributes:
          $ref: "#/components/schemas/HumanLoopDataAttributes"
          description: Sets attributes of the input data.
      required:
        - HumanLoopName
        - FlowDefinitionArn
    HumanLoopName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[a-z0-9](-*[a-z0-9])*
    FlowDefinitionArn:
      type: string
      maxLength: 256
    HumanLoopDataAttributes:
      description: Allows you to set attributes of the image. Currently, you can declare an image as free of personally identifiable information.
      type: object
      properties:
        ContentClassifiers:
          $ref: "#/components/schemas/ContentClassifiers"
          description: Sets whether the input image is free of personally identifiable information.
    ContentClassifiers:
      type: array
      items:
        $ref: "#/components/schemas/ContentClassifier"
    ContentClassifier:
      type: string
      enum:
        - FreeOfPersonallyIdentifiableInformation
        - FreeOfAdultContent
    ProjectVersionId:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: (^arn:[a-z\d-]+:rekognition:[a-z\d-]+:\d{12}:project\/[a-zA-Z0-9_.\-]{1,255}\/version\/[a-zA-Z0-9_.\-]{1,255}\/[0-9]+$)
    DetectModerationLabelsResponse:
      type: object
      properties:
        ModerationLabels:
          $ref: "#/components/schemas/ModerationLabels"
          description: Array of detected Moderation labels. For video operations, this includes the time, in milliseconds from the start of the video, they were detected.
        ModerationModelVersion:
          $ref: "#/components/schemas/String"
          description: Version number of the base moderation detection model that was used to detect unsafe content.
        HumanLoopActivationOutput:
          $ref: "#/components/schemas/HumanLoopActivationOutput"
          description: Shows the results of the human in the loop evaluation.
        ProjectVersion:
          $ref: "#/components/schemas/ProjectVersionId"
          description: Identifier of the custom adapter that was used during inference. If during inference the adapter was EXPIRED, then the parameter will not be returned, indicating that a base moderation detection project version was used.
        ContentTypes:
          $ref: "#/components/schemas/ContentTypes"
          description: A list of predicted results for the type of content an image contains. For example, the image content might be from animation, sports, or a video game.
    ModerationLabels:
      type: array
      items:
        $ref: "#/components/schemas/ModerationLabel"
    ModerationLabel:
      description: Provides information about a single type of inappropriate, unwanted, or offensive content found in an image or video. Each type of moderated content has a label within a hierarchical taxonomy. For more information, see Content moderation in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Specifies the confidence that Amazon Rekognition has that the label has been correctly identified. If you don't specify the MinConfidence parameter in the call to DetectModerationLabels, the operation returns labels with a confidence value greater than or equal to 50 percent.
        Name:
          $ref: "#/components/schemas/String"
          description: The label name for the type of unsafe content detected in the image.
        ParentName:
          $ref: "#/components/schemas/String"
          description: The name for the parent label. Labels at the top level of the hierarchy have the parent label "".
        TaxonomyLevel:
          $ref: "#/components/schemas/UInteger"
          description: The level of the moderation label with regard to its taxonomy, from 1 to 3.
    HumanLoopActivationOutput:
      description: Shows the results of the human in the loop evaluation. If there is no HumanLoopArn, the input did not trigger human review.
      type: object
      properties:
        HumanLoopArn:
          $ref: "#/components/schemas/HumanLoopArn"
          description: The Amazon Resource Name (ARN) of the HumanLoop created.
        HumanLoopActivationReasons:
          $ref: "#/components/schemas/HumanLoopActivationReasons"
          description: Shows if and why human review was needed.
        HumanLoopActivationConditionsEvaluationResults:
          $ref: "#/components/schemas/HumanLoopActivationConditionsEvaluationResults"
          description: Shows the result of condition evaluations, including those conditions which activated a human review.
    HumanLoopArn:
      type: string
      maxLength: 256
    HumanLoopActivationReasons:
      type: array
      items:
        $ref: "#/components/schemas/HumanLoopActivationReason"
    HumanLoopActivationReason:
      type: string
    HumanLoopActivationConditionsEvaluationResults:
      type: string
      maxLength: 10240
    ContentTypes:
      type: array
      items:
        $ref: "#/components/schemas/ContentType"
    ContentType:
      description: Contains information regarding the confidence and name of a detected content type.
      type: object
      properties:
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence level of the label given
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the label
    ProtectiveEquipmentSummarizationAttributes:
      description: Specifies summary attributes to return from a call to DetectProtectiveEquipment. You can specify which types of PPE to summarize. You can also specify a minimum confidence value for detections. Summary information is returned in the Summary (ProtectiveEquipmentSummary) field of the response from DetectProtectiveEquipment. The summary includes which persons in an image were detected wearing the requested types of person protective equipment (PPE), which persons were detected as not wearing PPE, and the persons in which a determination could not be made. For more information, see ProtectiveEquipmentSummary.
      type: object
      properties:
        MinConfidence:
          $ref: "#/components/schemas/Percent"
          description: The minimum confidence level for which you want summary information. The confidence level applies to person detection, body part detection, equipment detection, and body part coverage. Amazon Rekognition doesn't return summary information with a confidence than this specified value. There isn't a default value. Specify a MinConfidence value that is between 50-100% as DetectProtectiveEquipment returns predictions only where the detection confidence is between 50% - 100%. If you specify a value that is less than 50%, the results are the same specifying a value of 50%.
        RequiredEquipmentTypes:
          $ref: "#/components/schemas/ProtectiveEquipmentTypes"
          description: An array of personal protective equipment types for which you want summary information. If a person is detected wearing a required requipment type, the person's ID is added to the PersonsWithRequiredEquipment array field returned in ProtectiveEquipmentSummary by DetectProtectiveEquipment.
      required:
        - MinConfidence
        - RequiredEquipmentTypes
    ProtectiveEquipmentTypes:
      type: array
      items:
        $ref: "#/components/schemas/ProtectiveEquipmentType"
    ProtectiveEquipmentType:
      type: string
      enum:
        - FACE_COVER
        - HAND_COVER
