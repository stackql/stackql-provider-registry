      type: object
      properties:
        TechnicalCueFilter:
          $ref: "#/components/schemas/StartTechnicalCueDetectionFilter"
          description: Filters that are specific to technical cues.
        ShotFilter:
          $ref: "#/components/schemas/StartShotDetectionFilter"
          description: Filters that are specific to shot detections.
    StartTechnicalCueDetectionFilter:
      description: Filters for the technical segments returned by GetSegmentDetection. For more information, see StartSegmentDetectionFilters.
      type: object
      properties:
        MinSegmentConfidence:
          $ref: "#/components/schemas/SegmentConfidence"
          description: Specifies the minimum confidence that Amazon Rekognition Video must have in order to return a detected segment. Confidence represents how certain Amazon Rekognition is that a segment is correctly identified. 0 is the lowest confidence. 100 is the highest confidence. Amazon Rekognition Video doesn't return any segments with a confidence level lower than this specified value. If you don't specify MinSegmentConfidence, GetSegmentDetection returns segments with confidence values greater than or equal to 50 percent.
        BlackFrame:
          $ref: "#/components/schemas/BlackFrame"
          description: A filter that allows you to control the black frame detection by specifying the black levels and pixel coverage of black pixels in a frame. Videos can come from multiple sources, formats, and time periods, with different standards and varying noise levels for black frames that need to be accounted for.
    BlackFrame:
      description: A filter that allows you to control the black frame detection by specifying the black levels and pixel coverage of black pixels in a frame. As videos can come from multiple sources, formats, and time periods, they may contain different standards and varying noise levels for black frames that need to be accounted for. For more information, see StartSegmentDetection.
      type: object
      properties:
        MaxPixelThreshold:
          $ref: "#/components/schemas/MaxPixelThreshold"
          description: "A threshold used to determine the maximum luminance value for a pixel to be considered black. In a full color range video, luminance values range from 0-255. A pixel value of 0 is pure black, and the most strict filter. The maximum black pixel value is computed as follows: max_black_pixel_value = minimum_luminance + MaxPixelThreshold *luminance_range. For example, for a full range video with BlackPixelThreshold = 0.1, max_black_pixel_value is 0 + 0.1 * (255-0) = 25.5. The default value of MaxPixelThreshold is 0.2, which maps to a max_black_pixel_value of 51 for a full range video. You can lower this threshold to be more strict on black levels."
        MinCoveragePercentage:
          $ref: "#/components/schemas/MinCoveragePercentage"
          description: The minimum percentage of pixels in a frame that need to have a luminance below the max_black_pixel_value for a frame to be considered a black frame. Luminance is calculated using the BT.709 matrix. The default value is 99, which means at least 99% of all pixels in the frame are black pixels as per the MaxPixelThreshold set. You can reduce this value to allow more noise on the black frame.
    MaxPixelThreshold:
      type: number
      format: float
      minimum: 0
      maximum: 1
    MinCoveragePercentage:
      type: number
      format: float
      minimum: 0
      maximum: 100
    StartShotDetectionFilter:
      description: Filters for the shot detection segments returned by GetSegmentDetection. For more information, see StartSegmentDetectionFilters.
      type: object
      properties:
        MinSegmentConfidence:
          $ref: "#/components/schemas/SegmentConfidence"
          description: Specifies the minimum confidence that Amazon Rekognition Video must have in order to return a detected segment. Confidence represents how certain Amazon Rekognition is that a segment is correctly identified. 0 is the lowest confidence. 100 is the highest confidence. Amazon Rekognition Video doesn't return any segments with a confidence level lower than this specified value. If you don't specify MinSegmentConfidence, the GetSegmentDetection returns segments with confidence values greater than or equal to 50 percent.
