      properties:
        ProjectVersionArn:
          $ref: "#/components/schemas/ProjectVersionArn"
          description: The Amazon Resource Name (ARN) of the project version.
        CreationTimestamp:
          $ref: "#/components/schemas/DateTime"
          description: The Unix datetime for the date and time that training started.
        MinInferenceUnits:
          $ref: "#/components/schemas/InferenceUnits"
