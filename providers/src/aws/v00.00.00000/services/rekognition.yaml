      properties:
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: A bounding box surrounding the item of detected PPE.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence that Amazon Rekognition has that the bounding box (BoundingBox) contains an item of PPE.
        Type:
          $ref: "#/components/schemas/ProtectiveEquipmentType"
          description: The type of detected PPE.
        CoversBodyPart:
          $ref: "#/components/schemas/CoversBodyPart"
          description: Information about the body part covered by the detected PPE.
    CoversBodyPart:
      description: Information about an item of Personal Protective Equipment covering a corresponding body part. For more information, see DetectProtectiveEquipment.
      type: object
      properties:
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence that Amazon Rekognition has in the value of Value.
        Value:
          $ref: "#/components/schemas/Boolean"
          description: True if the PPE covers the corresponding body part, otherwise false.
    ProtectiveEquipmentSummary:
      description: Summary information for required items of personal protective equipment (PPE) detected on persons by a call to DetectProtectiveEquipment. You specify the required type of PPE in the SummarizationAttributes (ProtectiveEquipmentSummarizationAttributes) input parameter. The summary includes which persons were detected wearing the required personal protective equipment (PersonsWithRequiredEquipment), which persons were detected as not wearing the required PPE (PersonsWithoutRequiredEquipment), and the persons in which a determination could not be made (PersonsIndeterminate). To get a total for each category, use the size of the field array. For example, to find out how many people were detected as wearing the specified PPE, use the size of the PersonsWithRequiredEquipment array. If you want to find out more about a person, such as the location (BoundingBox) of the person on the image, use the person ID in each array element. Each person ID matches the ID field of a ProtectiveEquipmentPerson object returned in the Persons array by DetectProtectiveEquipment.
      type: object
      properties:
        PersonsWithRequiredEquipment:
          $ref: "#/components/schemas/ProtectiveEquipmentPersonIds"
          description: An array of IDs for persons who are wearing detected personal protective equipment.
        PersonsWithoutRequiredEquipment:
          $ref: "#/components/schemas/ProtectiveEquipmentPersonIds"
          description: An array of IDs for persons who are not wearing all of the types of PPE specified in the RequiredEquipmentTypes field of the detected personal protective equipment.
        PersonsIndeterminate:
          $ref: "#/components/schemas/ProtectiveEquipmentPersonIds"
          description: An array of IDs for persons where it was not possible to determine if they are wearing personal protective equipment.
    ProtectiveEquipmentPersonIds:
      type: array
      items:
        $ref: "#/components/schemas/UInteger"
    DetectTextFilters:
      description: A set of optional parameters that you can use to set the criteria that the text must meet to be included in your response. WordFilter looks at a word’s height, width, and minimum confidence. RegionOfInterest lets you set a specific region of the image to look for text in.
      type: object
      properties:
        WordFilter:
          $ref: "#/components/schemas/DetectionFilter"
        RegionsOfInterest:
          $ref: "#/components/schemas/RegionsOfInterest"
          description: A Filter focusing on a certain area of the image. Uses a BoundingBox object to set the region of the image.
    DetectionFilter:
      description: A set of parameters that allow you to filter out certain results from your returned results.
      type: object
      properties:
        MinConfidence:
          $ref: "#/components/schemas/Percent"
          description: Sets the confidence of word detection. Words with detection confidence below this will be excluded from the result. Values should be between 0 and 100. The default MinConfidence is 80.
        MinBoundingBoxHeight:
          $ref: "#/components/schemas/BoundingBoxHeight"
          description: Sets the minimum height of the word bounding box. Words with bounding box heights lesser than this value will be excluded from the result. Value is relative to the video frame height.
        MinBoundingBoxWidth:
          $ref: "#/components/schemas/BoundingBoxWidth"
          description: Sets the minimum width of the word bounding box. Words with bounding boxes widths lesser than this value will be excluded from the result. Value is relative to the video frame width.
    BoundingBoxHeight:
      type: number
      format: float
      minimum: 0
      maximum: 1
    BoundingBoxWidth:
      type: number
      format: float
      minimum: 0
      maximum: 1
    DetectTextResponse:
      type: object
      properties:
