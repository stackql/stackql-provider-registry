    TextDetection:
      description: Information about a word or line of text detected by DetectText. The DetectedText field contains the text that Amazon Rekognition detected in the image. Every word and line has an identifier (Id). Each word belongs to a line and has a parent identifier (ParentId) that identifies the line of text in which the word appears. The word Id is also an index for the word within a line of words. For more information, see Detecting text in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        DetectedText:
          $ref: "#/components/schemas/String"
          description: The word or line of text recognized by Amazon Rekognition.
        Type:
          $ref: "#/components/schemas/TextTypes"
          description: The type of text that was detected.
        Id:
          $ref: "#/components/schemas/UInteger"
          description: The identifier for the detected text. The identifier is only unique for a single call to DetectText.
        ParentId:
          $ref: "#/components/schemas/UInteger"
          description: The Parent identifier for the detected text identified by the value of ID. If the type of detected text is LINE, the value of ParentId is Null.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: The confidence that Amazon Rekognition has in the accuracy of the detected text and the accuracy of the geometry points around the detected text.
        Geometry:
          $ref: "#/components/schemas/Geometry"
          description: The location of the detected text on the image. Includes an axis aligned coarse bounding box surrounding the text and a finer grain polygon for more accurate spatial information.
