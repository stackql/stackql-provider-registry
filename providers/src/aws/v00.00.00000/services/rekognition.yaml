            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/ExtendedPaginationToken"
                  description: Pagination token, if the previous response was incomplete.
                MaxResults:
                  $ref: "#/components/schemas/ListMediaAnalysisJobsPageSize"
                  description: The maximum number of results to return per paginated call. The largest value user can specify is 100. If user specifies a value greater than 100, an InvalidParameterException error occurs. The default value is 100.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMediaAnalysisJobsResponse"
  /ListProjectPolicies:
    post:
      operationId: ListProjectPolicies
      description: This operation applies only to Amazon Rekognition Custom Labels. Gets a list of the project policies attached to a project. To attach a project policy to a project, call PutProjectPolicy. To remove a project policy from a project, call DeleteProjectPolicy. This operation requires permissions to perform the rekognition:ListProjectPolicies action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.ListProjectPolicies
            default: RekognitionService.ListProjectPolicies
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProjectArn:
                  $ref: "#/components/schemas/ProjectArn"
                  description: The ARN of the project for which you want to list the project policies.
                NextToken:
                  $ref: "#/components/schemas/ExtendedPaginationToken"
                  description: If the previous response was incomplete (because there is more results to retrieve), Amazon Rekognition Custom Labels returns a pagination token in the response. You can use this pagination token to retrieve the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/ListProjectPoliciesPageSize"
                  description: The maximum number of results to return per paginated call. The largest value you can specify is 5. If you specify a value greater than 5, a ValidationException error occurs. The default value is 5.
              required:
                - ProjectArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProjectPoliciesResponse"
  /ListStreamProcessors:
    post:
      operationId: ListStreamProcessors
      description: Gets a list of stream processors that you have created with CreateStreamProcessor.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.ListStreamProcessors
            default: RekognitionService.ListStreamProcessors
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: If the previous response was incomplete (because there are more stream processors to retrieve), Amazon Rekognition Video returns a pagination token in the response. You can use this pagination token to retrieve the next set of stream processors.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Maximum number of stream processors you want Amazon Rekognition Video to return in the response. The default is 1000.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamProcessorsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of tags in an Amazon Rekognition collection, stream processor, or Custom Labels model. This operation requires permissions to perform the rekognition:ListTagsForResource action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.ListTagsForResource
            default: RekognitionService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: Amazon Resource Name (ARN) of the model, collection, or stream processor that contains the tags that you want a list of.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ListUsers:
    post:
      operationId: ListUsers
      description: Returns metadata of the User such as UserID in the specified collection. Anonymous User (to reserve faces without any identity) is not returned as part of this request. The results are sorted by system generated primary key ID. If the response is truncated, NextToken is returned in the response that can be used in the subsequent request to retrieve the next set of identities.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.ListUsers
            default: RekognitionService.ListUsers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CollectionId:
                  $ref: "#/components/schemas/CollectionId"
                  description: The ID of an existing collection.
                MaxResults:
                  $ref: "#/components/schemas/MaxUserResults"
                  description: Maximum number of UsersID to return.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Pagingation token to receive the next set of UsersID.
              required:
                - CollectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
  /PutProjectPolicy:
    post:
      operationId: PutProjectPolicy
      description: This operation applies only to Amazon Rekognition Custom Labels. Attaches a project policy to a Amazon Rekognition Custom Labels project in a trusting AWS account. A project policy specifies that a trusted AWS account can copy a model version from a trusting AWS account to a project in the trusted AWS account. To copy a model version you use the CopyProjectVersion operation. Only applies to Custom Labels projects. For more information about the format of a project policy document, see Attaching a project policy (SDK) in the Amazon Rekognition Custom Labels Developer Guide. The response from PutProjectPolicy is a revision ID for the project policy. You can attach multiple project policies to a project. You can also update an existing project policy by specifying the policy revision ID of the existing policy. To remove a project policy from a project, call DeleteProjectPolicy. To get a list of project policies attached to a project, call ListProjectPolicies. You copy a model version by calling CopyProjectVersion. This operation requires permissions to perform the rekognition:PutProjectPolicy action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.PutProjectPolicy
            default: RekognitionService.PutProjectPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProjectArn:
                  $ref: "#/components/schemas/ProjectArn"
                  description: The Amazon Resource Name (ARN) of the project that the project policy is attached to.
                PolicyName:
                  $ref: "#/components/schemas/ProjectPolicyName"
                  description: A name for the policy.
                PolicyRevisionId:
                  $ref: "#/components/schemas/ProjectPolicyRevisionId"
                  description: The revision ID for the Project Policy. Each time you modify a policy, Amazon Rekognition Custom Labels generates and assigns a new PolicyRevisionId and then deletes the previous version of the policy.
                PolicyDocument:
                  $ref: "#/components/schemas/ProjectPolicyDocument"
                  description: A resource policy to add to the model. The policy is a JSON structure that contains one or more statements that define the policy. The policy must follow the IAM syntax. For more information about the contents of a JSON policy document, see IAM JSON policy reference.
              required:
                - ProjectArn
                - PolicyName
                - PolicyDocument
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutProjectPolicyResponse"
  /RecognizeCelebrities:
    post:
      operationId: RecognizeCelebrities
      description: Returns an array of celebrities recognized in the input image. For more information, see Recognizing celebrities in the Amazon Rekognition Developer Guide. RecognizeCelebrities returns the 64 largest faces in the image. It lists the recognized celebrities in the CelebrityFaces array and any unrecognized faces in the UnrecognizedFaces array. RecognizeCelebrities doesn't return celebrities whose faces aren't among the largest 64 faces in the image. For each celebrity recognized, RecognizeCelebrities returns a Celebrity object. The Celebrity object contains the celebrity name, ID, URL links to additional information, match confidence, and a ComparedFace object that you can use to locate the celebrity's face on the image. Amazon Rekognition doesn't retain information about which images a celebrity has been recognized in. Your application must store this information and use the Celebrity ID property as a unique identifier for the celebrity. If you don't store the celebrity name or additional information URLs returned by RecognizeCelebrities, you will need the ID to identify the celebrity in a call to the GetCelebrityInfo operation. You pass the input image either as base64-encoded image bytes or as a reference to an image in an Amazon S3 bucket. If you use the AWS CLI to call Amazon Rekognition operations, passing image bytes is not supported. The image must be either a PNG or JPEG formatted file. For an example, see Recognizing celebrities in an image in the Amazon Rekognition Developer Guide. This operation requires permissions to perform the rekognition:RecognizeCelebrities operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.RecognizeCelebrities
            default: RekognitionService.RecognizeCelebrities
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Image:
                  $ref: "#/components/schemas/Image"
                  description: The input image as base64-encoded bytes or an S3 object. If you use the AWS CLI to call Amazon Rekognition operations, passing base64-encoded image bytes is not supported. If you are using an AWS SDK to call Amazon Rekognition, you might not need to base64-encode image bytes passed using the Bytes field. For more information, see Images in the Amazon Rekognition developer guide.
              required:
                - Image
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecognizeCelebritiesResponse"
  /SearchFaces:
    post:
      operationId: SearchFaces
      description: For a given input face ID, searches for matching faces in the collection the face belongs to. You get a face ID when you add a face to the collection using the IndexFaces operation. The operation compares the features of the input face with faces in the specified collection. You can also search faces without indexing faces by using the SearchFacesByImage operation. The operation response returns an array of faces that match, ordered by similarity score with the highest similarity first. More specifically, it is an array of metadata for each face match that is found. Along with the metadata, the response also includes a confidence value for each face match, indicating the confidence that the specific face matches the input face. For an example, see Searching for a face using its face ID in the Amazon Rekognition Developer Guide. This operation requires permissions to perform the rekognition:SearchFaces action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.SearchFaces
            default: RekognitionService.SearchFaces
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CollectionId:
                  $ref: "#/components/schemas/CollectionId"
                  description: ID of the collection the face belongs to.
                FaceId:
                  $ref: "#/components/schemas/FaceId"
                  description: ID of a face to find matches for in the collection.
                MaxFaces:
                  $ref: "#/components/schemas/MaxFaces"
                  description: Maximum number of faces to return. The operation returns the maximum number of faces with the highest confidence in the match.
                FaceMatchThreshold:
                  $ref: "#/components/schemas/Percent"
                  description: Optional value specifying the minimum confidence in the face match to return. For example, don't return any matches where confidence in matches is less than 70%. The default value is 80%.
              required:
                - CollectionId
                - FaceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchFacesResponse"
  /SearchFacesByImage:
    post:
      operationId: SearchFacesByImage
      description: For a given input image, first detects the largest face in the image, and then searches the specified collection for matching faces. The operation compares the features of the input face with faces in the specified collection. To search for all faces in an input image, you might first call the IndexFaces operation, and then use the face IDs returned in subsequent calls to the SearchFaces operation. You can also call the DetectFaces operation and use the bounding boxes in the response to make face crops, which then you can pass in to the SearchFacesByImage operation. You pass the input image either as base64-encoded image bytes or as a reference to an image in an Amazon S3 bucket. If you use the AWS CLI to call Amazon Rekognition operations, passing image bytes is not supported. The image must be either a PNG or JPEG formatted file. The response returns an array of faces that match, ordered by similarity score with the highest similarity first. More specifically, it is an array of metadata for each face match found. Along with the metadata, the response also includes a similarity indicating how similar the face is to the input face. In the response, the operation also returns the bounding box (and a confidence level that the bounding box contains a face) of the face that Amazon Rekognition used for the input image. If no faces are detected in the input image, SearchFacesByImage returns an InvalidParameterException error. For an example, Searching for a Face Using an Image in the Amazon Rekognition Developer Guide. The QualityFilter input parameter allows you to filter out detected faces that don’t meet a required quality bar. The quality bar is based on a variety of common use cases. Use QualityFilter to set the quality bar for filtering by specifying LOW, MEDIUM, or HIGH. If you do not want to filter detected faces, specify NONE. The default value is NONE. To use quality filtering, you need a collection associated with version 3 of the face model or higher. To get the version of the face model associated with a collection, call DescribeCollection. This operation requires permissions to perform the rekognition:SearchFacesByImage action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.SearchFacesByImage
            default: RekognitionService.SearchFacesByImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CollectionId:
                  $ref: "#/components/schemas/CollectionId"
                  description: ID of the collection to search.
                Image:
                  $ref: "#/components/schemas/Image"
                  description: The input image as base64-encoded bytes or an S3 object. If you use the AWS CLI to call Amazon Rekognition operations, passing base64-encoded image bytes is not supported. If you are using an AWS SDK to call Amazon Rekognition, you might not need to base64-encode image bytes passed using the Bytes field. For more information, see Images in the Amazon Rekognition developer guide.
                MaxFaces:
                  $ref: "#/components/schemas/MaxFaces"
                  description: Maximum number of faces to return. The operation returns the maximum number of faces with the highest confidence in the match.
                FaceMatchThreshold:
                  $ref: "#/components/schemas/Percent"
                  description: (Optional) Specifies the minimum confidence in the face match to return. For example, don't return any matches where confidence in matches is less than 70%. The default value is 80%.
                QualityFilter:
                  $ref: "#/components/schemas/QualityFilter"
                  description: A filter that specifies a quality bar for how much filtering is done to identify faces. Filtered faces aren't searched for in the collection. If you specify AUTO, Amazon Rekognition chooses the quality bar. If you specify LOW, MEDIUM, or HIGH, filtering removes all faces that don’t meet the chosen quality bar. The quality bar is based on a variety of common use cases. Low-quality detections can occur for a number of reasons. Some examples are an object that's misidentified as a face, a face that's too blurry, or a face with a pose that's too extreme to use. If you specify NONE, no filtering is performed. The default value is NONE. To use quality filtering, the collection you are using must be associated with version 3 of the face model or higher.
              required:
                - CollectionId
                - Image
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchFacesByImageResponse"
  /SearchUsers:
    post:
      operationId: SearchUsers
      description: Searches for UserIDs within a collection based on a FaceId or UserId. This API can be used to find the closest UserID (with a highest similarity) to associate a face. The request must be provided with either FaceId or UserId. The operation returns an array of UserID that match the FaceId or UserId, ordered by similarity score with the highest similarity first.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.SearchUsers
            default: RekognitionService.SearchUsers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CollectionId:
                  $ref: "#/components/schemas/CollectionId"
                  description: The ID of an existing collection containing the UserID, used with a UserId or FaceId. If a FaceId is provided, UserId isn’t required to be present in the Collection.
                UserId:
                  $ref: "#/components/schemas/UserId"
                  description: ID for the existing User.
                FaceId:
                  $ref: "#/components/schemas/FaceId"
                  description: ID for the existing face.
                UserMatchThreshold:
                  $ref: "#/components/schemas/Percent"
                  description: Optional value that specifies the minimum confidence in the matched UserID to return. Default value of 80.
                MaxUsers:
                  $ref: "#/components/schemas/MaxUserResults"
                  description: Maximum number of identities to return.
              required:
                - CollectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsersResponse"
  /SearchUsersByImage:
    post:
      operationId: SearchUsersByImage
      description: Searches for UserIDs using a supplied image. It first detects the largest face in the image, and then searches a specified collection for matching UserIDs. The operation returns an array of UserIDs that match the face in the supplied image, ordered by similarity score with the highest similarity first. It also returns a bounding box for the face found in the input image. Information about faces detected in the supplied image, but not used for the search, is returned in an array of UnsearchedFace objects. If no valid face is detected in the image, the response will contain an empty UserMatches list and no SearchedFace object.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.SearchUsersByImage
            default: RekognitionService.SearchUsersByImage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CollectionId:
                  $ref: "#/components/schemas/CollectionId"
                  description: The ID of an existing collection containing the UserID.
                Image:
                  $ref: "#/components/schemas/Image"
                UserMatchThreshold:
                  $ref: "#/components/schemas/Percent"
                  description: Specifies the minimum confidence in the UserID match to return. Default value is 80.
                MaxUsers:
                  $ref: "#/components/schemas/MaxUserResults"
                  description: Maximum number of UserIDs to return.
                QualityFilter:
                  $ref: "#/components/schemas/QualityFilter"
                  description: A filter that specifies a quality bar for how much filtering is done to identify faces. Filtered faces aren't searched for in the collection. The default value is NONE.
              required:
                - CollectionId
                - Image
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsersByImageResponse"
  /StartCelebrityRecognition:
    post:
      operationId: StartCelebrityRecognition
      description: Starts asynchronous recognition of celebrities in a stored video. Amazon Rekognition Video can detect celebrities in a video must be stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartCelebrityRecognition returns a job identifier (JobId) which you use to get the results of the analysis. When celebrity recognition analysis is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the results of the celebrity recognition analysis, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetCelebrityRecognition and pass the job identifier (JobId) from the initial call to StartCelebrityRecognition. For more information, see Recognizing celebrities in the Amazon Rekognition Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartCelebrityRecognition
            default: RekognitionService.StartCelebrityRecognition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                  description: The video in which you want to recognize celebrities. The video must be stored in an Amazon S3 bucket.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartCelebrityRecognition requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The Amazon SNS topic ARN that you want Amazon Rekognition Video to publish the completion status of the celebrity recognition analysis to. The Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy.
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
              required:
                - Video
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCelebrityRecognitionResponse"
  /StartContentModeration:
    post:
      operationId: StartContentModeration
      description: Starts asynchronous detection of inappropriate, unwanted, or offensive content in a stored video. For a list of moderation labels in Amazon Rekognition, see Using the image and video moderation APIs. Amazon Rekognition Video can moderate content in a video stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartContentModeration returns a job identifier (JobId) which you use to get the results of the analysis. When content analysis is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the results of the content analysis, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetContentModeration and pass the job identifier (JobId) from the initial call to StartContentModeration. For more information, see Moderating content in the Amazon Rekognition Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartContentModeration
            default: RekognitionService.StartContentModeration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                  description: The video in which you want to detect inappropriate, unwanted, or offensive content. The video must be stored in an Amazon S3 bucket.
                MinConfidence:
                  $ref: "#/components/schemas/Percent"
                  description: Specifies the minimum confidence that Amazon Rekognition must have in order to return a moderated content label. Confidence represents how certain Amazon Rekognition is that the moderated content is correctly identified. 0 is the lowest confidence. 100 is the highest confidence. Amazon Rekognition doesn't return any moderated content labels with a confidence level lower than this specified value. If you don't specify MinConfidence, GetContentModeration returns labels with confidence values greater than or equal to 50 percent.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartContentModeration requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The Amazon SNS topic ARN that you want Amazon Rekognition Video to publish the completion status of the content analysis to. The Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy to access the topic.
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
              required:
                - Video
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartContentModerationResponse"
  /StartFaceDetection:
    post:
      operationId: StartFaceDetection
      description: Starts asynchronous detection of faces in a stored video. Amazon Rekognition Video can detect faces in a video stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartFaceDetection returns a job identifier (JobId) that you use to get the results of the operation. When face detection is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the results of the face detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetFaceDetection and pass the job identifier (JobId) from the initial call to StartFaceDetection. For more information, see Detecting faces in a stored video in the Amazon Rekognition Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartFaceDetection
            default: RekognitionService.StartFaceDetection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                  description: The video in which you want to detect faces. The video must be stored in an Amazon S3 bucket.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartFaceDetection requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The ARN of the Amazon SNS topic to which you want Amazon Rekognition Video to publish the completion status of the face detection operation. The Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy.
                FaceAttributes:
                  $ref: "#/components/schemas/FaceAttributes"
                  description: "The face attributes you want returned. DEFAULT - The following subset of facial attributes are returned: BoundingBox, Confidence, Pose, Quality and Landmarks. ALL - All facial attributes are returned."
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
              required:
                - Video
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFaceDetectionResponse"
  /StartFaceSearch:
    post:
      operationId: StartFaceSearch
      description: Starts the asynchronous search for faces in a collection that match the faces of persons detected in a stored video. The video must be stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartFaceSearch returns a job identifier (JobId) which you use to get the search results once the search has completed. When searching is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the search results, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetFaceSearch and pass the job identifier (JobId) from the initial call to StartFaceSearch. For more information, see Searching stored videos for faces.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartFaceSearch
            default: RekognitionService.StartFaceSearch
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                  description: The video you want to search. The video must be stored in an Amazon S3 bucket.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartFaceSearch requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                FaceMatchThreshold:
                  $ref: "#/components/schemas/Percent"
                  description: The minimum confidence in the person match to return. For example, don't return any matches where confidence in matches is less than 70%. The default value is 80%.
                CollectionId:
                  $ref: "#/components/schemas/CollectionId"
                  description: ID of the collection that contains the faces you want to search for.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The ARN of the Amazon SNS topic to which you want Amazon Rekognition Video to publish the completion status of the search. The Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy to access the topic.
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
              required:
                - Video
                - CollectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFaceSearchResponse"
  /StartLabelDetection:
    post:
      operationId: StartLabelDetection
      description: Starts asynchronous detection of labels in a stored video. Amazon Rekognition Video can detect labels in a video. Labels are instances of real-world entities. This includes objects like flower, tree, and table; events like wedding, graduation, and birthday party; concepts like landscape, evening, and nature; and activities like a person getting out of a car or a person skiing. The video must be stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartLabelDetection returns a job identifier (JobId) which you use to get the results of the operation. When label detection is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the results of the label detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetLabelDetection and pass the job identifier (JobId) from the initial call to StartLabelDetection. Optional Parameters StartLabelDetection has the GENERAL_LABELS Feature applied by default. This feature allows you to provide filtering criteria to the Settings parameter. You can filter with sets of individual labels or with label categories. You can specify inclusive filters, exclusive filters, or a combination of inclusive and exclusive filters. For more information on filtering, see Detecting labels in a video. You can specify MinConfidence to control the confidence threshold for the labels returned. The default is 50.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartLabelDetection
            default: RekognitionService.StartLabelDetection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                  description: The video in which you want to detect labels. The video must be stored in an Amazon S3 bucket.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartLabelDetection requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                MinConfidence:
                  $ref: "#/components/schemas/Percent"
                  description: Specifies the minimum confidence that Amazon Rekognition Video must have in order to return a detected label. Confidence represents how certain Amazon Rekognition is that a label is correctly identified.0 is the lowest confidence. 100 is the highest confidence. Amazon Rekognition Video doesn't return any labels with a confidence level lower than this specified value. If you don't specify MinConfidence, the operation returns labels and bounding boxes (if detected) with confidence values greater than or equal to 50 percent.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The Amazon SNS topic ARN you want Amazon Rekognition Video to publish the completion status of the label detection operation to. The Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy.
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
                Features:
                  $ref: "#/components/schemas/LabelDetectionFeatureList"
                  description: The features to return after video analysis. You can specify that GENERAL_LABELS are returned.
                Settings:
                  $ref: "#/components/schemas/LabelDetectionSettings"
                  description: The settings for a StartLabelDetection request.Contains the specified parameters for the label detection request of an asynchronous label analysis operation. Settings can include filters for GENERAL_LABELS.
              required:
                - Video
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartLabelDetectionResponse"
  /StartMediaAnalysisJob:
    post:
      operationId: StartMediaAnalysisJob
      description: Initiates a new media analysis job. Accepts a manifest file in an Amazon S3 bucket. The output is a manifest file and a summary of the manifest stored in the Amazon S3 bucket.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartMediaAnalysisJob
            default: RekognitionService.StartMediaAnalysisJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotency token used to prevent the accidental creation of duplicate versions. If you use the same token with multiple StartMediaAnalysisJobRequest requests, the same response is returned. Use ClientRequestToken to prevent the same request from being processed more than once.
                JobName:
                  $ref: "#/components/schemas/MediaAnalysisJobName"
                  description: The name of the job. Does not have to be unique.
                OperationsConfig:
                  $ref: "#/components/schemas/MediaAnalysisOperationsConfig"
                  description: Configuration options for the media analysis job to be created.
                Input:
                  $ref: "#/components/schemas/MediaAnalysisInput"
                  description: Input data to be analyzed by the job.
                OutputConfig:
                  $ref: "#/components/schemas/MediaAnalysisOutputConfig"
                  description: The Amazon S3 bucket location to store the results.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The identifier of customer managed AWS KMS key (name or ARN). The key is used to encrypt images copied into the service. The key is also used to encrypt results and manifest files written to the output Amazon S3 bucket.
              required:
                - OperationsConfig
                - Input
                - OutputConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMediaAnalysisJobResponse"
  /StartPersonTracking:
    post:
      operationId: StartPersonTracking
      description: "End of support notice: On October 31, 2025, AWS will discontinue support for Amazon Rekognition People Pathing. After October 31, 2025, you will no longer be able to use the Rekognition People Pathing capability. For more information, visit this blog post. Starts the asynchronous tracking of a person's path in a stored video. Amazon Rekognition Video can track the path of people in a video stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartPersonTracking returns a job identifier (JobId) which you use to get the results of the operation. When label detection is finished, Amazon Rekognition publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the results of the person detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. If so, call GetPersonTracking and pass the job identifier (JobId) from the initial call to StartPersonTracking."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartPersonTracking
            default: RekognitionService.StartPersonTracking
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                  description: The video in which you want to detect people. The video must be stored in an Amazon S3 bucket.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartPersonTracking requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The Amazon SNS topic ARN you want Amazon Rekognition Video to publish the completion status of the people detection operation to. The Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy.
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
              required:
                - Video
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPersonTrackingResponse"
  /StartProjectVersion:
    post:
      operationId: StartProjectVersion
      description: This operation applies only to Amazon Rekognition Custom Labels. Starts the running of the version of a model. Starting a model takes a while to complete. To check the current state of the model, use DescribeProjectVersions. Once the model is running, you can detect custom labels in new images by calling DetectCustomLabels. You are charged for the amount of time that the model is running. To stop a running model, call StopProjectVersion. This operation requires permissions to perform the rekognition:StartProjectVersion action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartProjectVersion
            default: RekognitionService.StartProjectVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProjectVersionArn:
                  $ref: "#/components/schemas/ProjectVersionArn"
                  description: The Amazon Resource Name(ARN) of the model version that you want to start.
                MinInferenceUnits:
                  $ref: "#/components/schemas/InferenceUnits"
                  description: The minimum number of inference units to use. A single inference unit represents 1 hour of processing. Use a higher number to increase the TPS throughput of your model. You are charged for the number of inference units that you use.
                MaxInferenceUnits:
                  $ref: "#/components/schemas/InferenceUnits"
                  description: The maximum number of inference units to use for auto-scaling the model. If you don't specify a value, Amazon Rekognition Custom Labels doesn't auto-scale the model.
              required:
                - ProjectVersionArn
                - MinInferenceUnits
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartProjectVersionResponse"
  /StartSegmentDetection:
    post:
      operationId: StartSegmentDetection
      description: Starts asynchronous detection of segment detection in a stored video. Amazon Rekognition Video can detect segments in a video stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartSegmentDetection returns a job identifier (JobId) which you use to get the results of the operation. When segment detection is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. You can use the Filters (StartSegmentDetectionFilters) input parameter to specify the minimum detection confidence returned in the response. Within Filters, use ShotFilter (StartShotDetectionFilter) to filter detected shots. Use TechnicalCueFilter (StartTechnicalCueDetectionFilter) to filter technical cues. To get the results of the segment detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. if so, call GetSegmentDetection and pass the job identifier (JobId) from the initial call to StartSegmentDetection. For more information, see Detecting video segments in stored video in the Amazon Rekognition Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartSegmentDetection
            default: RekognitionService.StartSegmentDetection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartSegmentDetection requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidently started more than once.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                  description: The ARN of the Amazon SNS topic to which you want Amazon Rekognition Video to publish the completion status of the segment detection operation. Note that the Amazon SNS topic must have a topic name that begins with AmazonRekognition if you are using the AmazonRekognitionServiceRole permissions policy to access the topic.
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier you specify that's returned in the completion notification that's published to your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
                Filters:
                  $ref: "#/components/schemas/StartSegmentDetectionFilters"
                  description: Filters for technical cue or shot detection.
                SegmentTypes:
                  $ref: "#/components/schemas/SegmentTypes"
                  description: An array of segment types to detect in the video. Valid values are TECHNICAL_CUE and SHOT.
              required:
                - Video
                - SegmentTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSegmentDetectionResponse"
  /StartStreamProcessor:
    post:
      operationId: StartStreamProcessor
      description: Starts processing a stream processor. You create a stream processor by calling CreateStreamProcessor. To tell StartStreamProcessor which stream processor to start, use the value of the Name field specified in the call to CreateStreamProcessor. If you are using a label detection stream processor to detect labels, you need to provide a Start selector and a Stop selector to determine the length of the stream processing time.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartStreamProcessor
            default: RekognitionService.StartStreamProcessor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/StreamProcessorName"
                  description: The name of the stream processor to start processing.
                StartSelector:
                  $ref: "#/components/schemas/StreamProcessingStartSelector"
                  description: Specifies the starting point in the Kinesis stream to start processing. You can use the producer timestamp or the fragment number. If you use the producer timestamp, you must put the time in milliseconds. For more information about fragment numbers, see Fragment. This is a required parameter for label detection stream processors and should not be used to start a face search stream processor.
                StopSelector:
                  $ref: "#/components/schemas/StreamProcessingStopSelector"
                  description: Specifies when to stop processing the stream. You can specify a maximum amount of time to process the video. This is a required parameter for label detection stream processors and should not be used to start a face search stream processor.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartStreamProcessorResponse"
  /StartTextDetection:
    post:
      operationId: StartTextDetection
      description: Starts asynchronous detection of text in a stored video. Amazon Rekognition Video can detect text in a video stored in an Amazon S3 bucket. Use Video to specify the bucket name and the filename of the video. StartTextDetection returns a job identifier (JobId) which you use to get the results of the operation. When text detection is finished, Amazon Rekognition Video publishes a completion status to the Amazon Simple Notification Service topic that you specify in NotificationChannel. To get the results of the text detection operation, first check that the status value published to the Amazon SNS topic is SUCCEEDED. if so, call GetTextDetection and pass the job identifier (JobId) from the initial call to StartTextDetection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StartTextDetection
            default: RekognitionService.StartTextDetection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Video:
                  $ref: "#/components/schemas/Video"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Idempotent token used to identify the start request. If you use the same token with multiple StartTextDetection requests, the same JobId is returned. Use ClientRequestToken to prevent the same job from being accidentaly started more than once.
                NotificationChannel:
                  $ref: "#/components/schemas/NotificationChannel"
                JobTag:
                  $ref: "#/components/schemas/JobTag"
                  description: An identifier returned in the completion status published by your Amazon Simple Notification Service topic. For example, you can use JobTag to group related jobs and identify them in the completion notification.
                Filters:
                  $ref: "#/components/schemas/StartTextDetectionFilters"
                  description: Optional parameters that let you set criteria the text must meet to be included in your response.
              required:
                - Video
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartTextDetectionResponse"
  /StopProjectVersion:
    post:
      operationId: StopProjectVersion
      description: This operation applies only to Amazon Rekognition Custom Labels. Stops a running model. The operation might take a while to complete. To check the current status, call DescribeProjectVersions. Only applies to Custom Labels projects. This operation requires permissions to perform the rekognition:StopProjectVersion action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StopProjectVersion
            default: RekognitionService.StopProjectVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ProjectVersionArn:
                  $ref: "#/components/schemas/ProjectVersionArn"
                  description: The Amazon Resource Name (ARN) of the model version that you want to stop. This operation requires permissions to perform the rekognition:StopProjectVersion action.
              required:
                - ProjectVersionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopProjectVersionResponse"
  /StopStreamProcessor:
    post:
      operationId: StopStreamProcessor
      description: Stops a running stream processor that was created by CreateStreamProcessor.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.StopStreamProcessor
            default: RekognitionService.StopStreamProcessor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/StreamProcessorName"
                  description: The name of a stream processor created by CreateStreamProcessor.
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopStreamProcessorResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds one or more key-value tags to an Amazon Rekognition collection, stream processor, or Custom Labels model. For more information, see Tagging AWS Resources. This operation requires permissions to perform the rekognition:TagResource action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.TagResource
            default: RekognitionService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: Amazon Resource Name (ARN) of the model, collection, or stream processor that you want to assign the tags to.
                Tags:
                  $ref: "#/components/schemas/TagMap"
                  description: The key-value tags to assign to the resource.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes one or more tags from an Amazon Rekognition collection, stream processor, or Custom Labels model. This operation requires permissions to perform the rekognition:UntagResource action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.UntagResource
            default: RekognitionService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: Amazon Resource Name (ARN) of the model, collection, or stream processor that you want to remove the tags from.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of the tags that you want to remove.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateDatasetEntries:
    post:
      operationId: UpdateDatasetEntries
      description: This operation applies only to Amazon Rekognition Custom Labels. Adds or updates one or more entries (images) in a dataset. An entry is a JSON Line which contains the information for a single image, including the image location, assigned labels, and object location bounding boxes. For more information, see Image-Level labels in manifest files and Object localization in manifest files in the Amazon Rekognition Custom Labels Developer Guide. If the source-ref field in the JSON line references an existing image, the existing image in the dataset is updated. If source-ref field doesn't reference an existing image, the image is added as a new image to the dataset. You specify the changes that you want to make in the Changes input parameter. There isn't a limit to the number JSON Lines that you can change, but the size of Changes must be less than 5MB. UpdateDatasetEntries returns immediatly, but the dataset update might take a while to complete. Use DescribeDataset to check the current status. The dataset updated successfully if the value of Status is UPDATE_COMPLETE. To check if any non-terminal errors occured, call ListDatasetEntries and check for the presence of errors lists in the JSON Lines. Dataset update fails if a terminal error occurs (Status = UPDATE_FAILED). Currently, you can't access the terminal error information from the Amazon Rekognition Custom Labels SDK. This operation requires permissions to perform the rekognition:UpdateDatasetEntries action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.UpdateDatasetEntries
            default: RekognitionService.UpdateDatasetEntries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DatasetArn:
                  $ref: "#/components/schemas/DatasetArn"
                  description: The Amazon Resource Name (ARN) of the dataset that you want to update.
                Changes:
                  $ref: "#/components/schemas/DatasetChanges"
                  description: The changes that you want to make to the dataset.
              required:
                - DatasetArn
                - Changes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDatasetEntriesResponse"
  /UpdateStreamProcessor:
    post:
      operationId: UpdateStreamProcessor
      description: Allows you to update a stream processor. You can change some settings and regions of interest and delete certain parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - RekognitionService.UpdateStreamProcessor
            default: RekognitionService.UpdateStreamProcessor
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/StreamProcessorName"
                  description: Name of the stream processor that you want to update.
                SettingsForUpdate:
                  $ref: "#/components/schemas/StreamProcessorSettingsForUpdate"
                  description: The stream processor settings that you want to update. Label detection settings can be updated to detect different labels with a different minimum confidence.
                RegionsOfInterestForUpdate:
                  $ref: "#/components/schemas/RegionsOfInterest"
                  description: Specifies locations in the frames where Amazon Rekognition checks for objects or people. This is an optional parameter for label detection stream processors.
                DataSharingPreferenceForUpdate:
                  $ref: "#/components/schemas/StreamProcessorDataSharingPreference"
                  description: Shows whether you are sharing data with Rekognition to improve model performance. You can choose this option at the account level or on a per-stream basis. Note that if you opt out at the account level this setting is ignored on individual streams.
                ParametersToDelete:
                  $ref: "#/components/schemas/StreamProcessorParametersToDelete"
                  description: A list of parameters you want to delete from the stream processor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStreamProcessorResponse"
