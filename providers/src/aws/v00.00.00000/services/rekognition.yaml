      type: integer
      minimum: 1
    TrainingDataResult:
      description: The data validation manifest created for the training dataset during model training.
      type: object
      properties:
        Input:
          $ref: "#/components/schemas/TrainingData"
          description: The training data that you supplied.
        Output:
          $ref: "#/components/schemas/TrainingData"
          description: Reference to images (assets) that were actually used during training with trained model predictions.
        Validation:
          $ref: "#/components/schemas/ValidationData"
          description: A manifest that you supplied for training, with validation results for each line.
    ValidationData:
      description: Contains the Amazon S3 bucket location of the validation data for a model training job. The validation data includes error information for individual JSON Lines in the dataset. For more information, see Debugging a Failed Model Training in the Amazon Rekognition Custom Labels Developer Guide. You get the ValidationData object for the training dataset (TrainingDataResult) and the test dataset (TestingDataResult) by calling DescribeProjectVersions. The assets array contains a single Asset object. The GroundTruthManifest field of the Asset object contains the S3 bucket location of the validation data.
      type: object
      properties:
        Assets:
          $ref: "#/components/schemas/Assets"
          description: The assets that comprise the validation data.
    TestingDataResult:
      description: Sagemaker Groundtruth format manifest files for the input, output and validation datasets that are used and created during testing.
      type: object
      properties:
        Input:
          $ref: "#/components/schemas/TestingData"
          description: The testing dataset that was supplied for training.
        Output:
          $ref: "#/components/schemas/TestingData"
          description: The subset of the dataset that was actually tested. Some images (assets) might not be tested due to file formatting and other issues.
        Validation:
          $ref: "#/components/schemas/ValidationData"
          description: The location of the data validation manifest. The data validation manifest is created for the test dataset during model training.
    EvaluationResult:
      description: The evaluation results for the training of a model.
      type: object
      properties:
        F1Score:
