        UserId:
          $ref: "#/components/schemas/UserId"
          description: A provided ID for the UserID. Unique within the collection.
        Reasons:
          $ref: "#/components/schemas/UnsuccessfulFaceDeletionReasons"
          description: The reason why the deletion was unsuccessful.
    UnsuccessfulFaceDeletionReasons:
      type: array
      items:
        $ref: "#/components/schemas/UnsuccessfulFaceDeletionReason"
    UnsuccessfulFaceDeletionReason:
