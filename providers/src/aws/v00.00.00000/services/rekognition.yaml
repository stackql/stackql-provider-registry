        TrainingDataResult:
          $ref: "#/components/schemas/TrainingDataResult"
          description: Contains information about the training results.
        TestingDataResult:
          $ref: "#/components/schemas/TestingDataResult"
          description: Contains information about the testing results.
        EvaluationResult:
          $ref: "#/components/schemas/EvaluationResult"
          description: The training results. EvaluationResult is only returned if training is successful.
        ManifestSummary:
          $ref: "#/components/schemas/GroundTruthManifest"
          description: The location of the summary manifest. The summary manifest provides aggregate data validation results for the training and test datasets.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The identifer for the AWS Key Management Service key (AWS KMS key) that was used to encrypt the model during training.
        MaxInferenceUnits:
          $ref: "#/components/schemas/InferenceUnits"
          description: The maximum number of inference units Amazon Rekognition uses to auto-scale the model. Applies only to Custom Labels projects. For more information, see StartProjectVersion.
        SourceProjectVersionArn:
          $ref: "#/components/schemas/ProjectVersionArn"
          description: If the model version was copied from a different project, SourceProjectVersionArn contains the ARN of the source model version.
        VersionDescription:
          $ref: "#/components/schemas/VersionDescription"
          description: A user-provided description of the project version.
        Feature:
          $ref: "#/components/schemas/CustomizationFeature"
          description: The feature that was customized.
        BaseModelVersion:
          $ref: "#/components/schemas/String"
          description: The base detection model version used to create the project version.
        FeatureConfig:
          $ref: "#/components/schemas/CustomizationFeatureConfig"
          description: Feature specific configuration that was applied during training.
