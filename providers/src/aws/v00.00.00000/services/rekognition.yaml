        JobId:
          $ref: "#/components/schemas/JobId"
          description: Job identifier for the face search operation for which you want to obtain results. The job identifer is returned by an initial call to StartFaceSearch.
        Video:
          $ref: "#/components/schemas/Video"
        JobTag:
          $ref: "#/components/schemas/JobTag"
          description: A job identifier specified in the call to StartFaceSearch and returned in the job completion notification sent to your Amazon Simple Notification Service topic.
    PersonMatches:
      type: array
      items:
        $ref: "#/components/schemas/PersonMatch"
    PersonMatch:
      description: Information about a person whose face matches a face(s) in an Amazon Rekognition collection. Includes information about the faces in the Amazon Rekognition collection (FaceMatch), information about the person (PersonDetail), and the time stamp for when the person was detected in a video. An array of PersonMatch objects is returned by GetFaceSearch.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in milliseconds from the beginning of the video, that the person was matched in the video.
        Person:
          $ref: "#/components/schemas/PersonDetail"
          description: Information about the matched person.
        FaceMatches:
          $ref: "#/components/schemas/FaceMatchList"
          description: Information about the faces in the input collection that match the face of a person in the video.
    PersonDetail:
      description: Details about a person detected in a video analysis request.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/PersonIndex"
          description: Identifier for the person detected person within a video. Use to keep track of the person throughout the video. The identifier is not stored by Amazon Rekognition.
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: Bounding box around the detected person.
        Face:
          $ref: "#/components/schemas/FaceDetail"
          description: Face details for the detected person.
    PersonIndex:
      type: integer
      format: int64
    FaceMatchList:
      type: array
      items:
        $ref: "#/components/schemas/FaceMatch"
    FaceMatch:
      description: Provides face metadata. In addition, it also provides the confidence in the match of this face with the input face.
      type: object
      properties:
        Similarity:
          $ref: "#/components/schemas/Percent"
          description: Confidence in the match of this face with the input face.
        Face:
          $ref: "#/components/schemas/Face"
          description: Describes the face properties such as the bounding box, face ID, image ID of the source image, and external image ID that you assigned.
    Face:
      description: Describes the face properties such as the bounding box, face ID, image ID of the input image, and external image ID that you assigned.
      type: object
      properties:
        FaceId:
          $ref: "#/components/schemas/FaceId"
          description: Unique identifier that Amazon Rekognition assigns to the face.
        BoundingBox:
          $ref: "#/components/schemas/BoundingBox"
          description: Bounding box of the face.
        ImageId:
          $ref: "#/components/schemas/ImageId"
          description: Unique identifier that Amazon Rekognition assigns to the input image.
        ExternalImageId:
          $ref: "#/components/schemas/ExternalImageId"
          description: Identifier that you assign to all the faces in the input image.
        Confidence:
          $ref: "#/components/schemas/Percent"
          description: Confidence level that the bounding box contains a face (and not a different object such as a tree).
        IndexFacesModelVersion:
          $ref: "#/components/schemas/IndexFacesModelVersion"
          description: The version of the face detect and storage model that was used when indexing the face vector.
        UserId:
          $ref: "#/components/schemas/UserId"
          description: Unique identifier assigned to the user.
    ImageId:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    ExternalImageId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.\\-:]+"
    IndexFacesModelVersion:
      type: string
      pattern: "[0-9\\.]+"
    LabelDetectionSortBy:
      type: string
      enum:
        - NAME
        - TIMESTAMP
    LabelDetectionAggregateBy:
      type: string
      enum:
        - TIMESTAMPS
        - SEGMENTS
    GetLabelDetectionResponse:
      type: object
      properties:
        JobStatus:
          $ref: "#/components/schemas/VideoJobStatus"
          description: The current status of the label detection job.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: If the job fails, StatusMessage provides a descriptive error message.
        VideoMetadata:
          $ref: "#/components/schemas/VideoMetadata"
          description: Information about a video that Amazon Rekognition Video analyzed. Videometadata is returned in every page of paginated responses from a Amazon Rekognition video operation.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: If the response is truncated, Amazon Rekognition Video returns this token that you can use in the subsequent request to retrieve the next set of labels.
        Labels:
          $ref: "#/components/schemas/LabelDetections"
          description: An array of labels detected in the video. Each element contains the detected label and the time, in milliseconds from the start of the video, that the label was detected.
        LabelModelVersion:
          $ref: "#/components/schemas/String"
          description: Version number of the label detection model that was used to detect labels.
        JobId:
          $ref: "#/components/schemas/JobId"
          description: Job identifier for the label detection operation for which you want to obtain results. The job identifer is returned by an initial call to StartLabelDetection.
        Video:
          $ref: "#/components/schemas/Video"
        JobTag:
          $ref: "#/components/schemas/JobTag"
          description: A job identifier specified in the call to StartLabelDetection and returned in the job completion notification sent to your Amazon Simple Notification Service topic.
        GetRequestMetadata:
          $ref: "#/components/schemas/GetLabelDetectionRequestMetadata"
          description: Information about the paramters used when getting a response. Includes information on aggregation and sorting methods.
    LabelDetections:
      type: array
      items:
        $ref: "#/components/schemas/LabelDetection"
    LabelDetection:
      description: Information about a label detected in a video analysis request and the time the label was detected in the video.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: Time, in milliseconds from the start of the video, that the label was detected. Note that Timestamp is not guaranteed to be accurate to the individual frame where the label first appears.
        Label:
          $ref: "#/components/schemas/Label"
          description: Details about the detected label.
        StartTimestampMillis:
          $ref: "#/components/schemas/ULong"
          description: The time in milliseconds defining the start of the timeline segment containing a continuously detected label.
        EndTimestampMillis:
          $ref: "#/components/schemas/ULong"
          description: The time in milliseconds defining the end of the timeline segment containing a continuously detected label.
        DurationMillis:
          $ref: "#/components/schemas/ULong"
          description: The time duration of a segment in milliseconds, I.e. time elapsed from StartTimestampMillis to EndTimestampMillis.
    GetLabelDetectionRequestMetadata:
      description: Contains metadata about a label detection request, including the SortBy and AggregateBy options.
      type: object
      properties:
        SortBy:
          $ref: "#/components/schemas/LabelDetectionSortBy"
          description: The sorting method chosen for a GetLabelDetection request.
        AggregateBy:
          $ref: "#/components/schemas/LabelDetectionAggregateBy"
          description: The aggregation method chosen for a GetLabelDetection request.
    MediaAnalysisJobId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9-_]+$
    GetMediaAnalysisJobResponse:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/MediaAnalysisJobId"
          description: The identifier for the media analysis job.
        JobName:
          $ref: "#/components/schemas/MediaAnalysisJobName"
          description: The name of the media analysis job.
        OperationsConfig:
          $ref: "#/components/schemas/MediaAnalysisOperationsConfig"
          description: Operation configurations that were provided during job creation.
        Status:
          $ref: "#/components/schemas/MediaAnalysisJobStatus"
          description: The current status of the media analysis job.
        FailureDetails:
          $ref: "#/components/schemas/MediaAnalysisJobFailureDetails"
          description: Details about the error that resulted in failure of the job.
        CreationTimestamp:
          $ref: "#/components/schemas/DateTime"
          description: The Unix date and time when the job was started.
        CompletionTimestamp:
          $ref: "#/components/schemas/DateTime"
          description: The Unix date and time when the job finished.
        Input:
          $ref: "#/components/schemas/MediaAnalysisInput"
          description: Reference to the input manifest that was provided in the job creation request.
        OutputConfig:
          $ref: "#/components/schemas/MediaAnalysisOutputConfig"
          description: Output configuration that was provided in the creation request.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: KMS Key that was provided in the creation request.
        Results:
          $ref: "#/components/schemas/MediaAnalysisResults"
          description: Output manifest that contains prediction results.
        ManifestSummary:
          $ref: "#/components/schemas/MediaAnalysisManifestSummary"
          description: The summary manifest provides statistics on input manifest and errors identified in the input manifest.
      required:
        - JobId
        - OperationsConfig
        - Status
        - CreationTimestamp
        - Input
        - OutputConfig
    MediaAnalysisJobName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_.\\-]+"
    MediaAnalysisOperationsConfig:
      description: Configuration options for a media analysis job. Configuration is operation-specific.
      type: object
      properties:
        DetectModerationLabels:
          $ref: "#/components/schemas/MediaAnalysisDetectModerationLabelsConfig"
          description: Contains configuration options for a DetectModerationLabels job.
    MediaAnalysisDetectModerationLabelsConfig:
      description: Configuration for Moderation Labels Detection.
      type: object
      properties:
        MinConfidence:
          $ref: "#/components/schemas/Percent"
          description: Specifies the minimum confidence level for the moderation labels to return. Amazon Rekognition doesn't return any labels with a confidence level lower than this specified value.
        ProjectVersion:
          $ref: "#/components/schemas/ProjectVersionId"
          description: Specifies the custom moderation model to be used during the label detection job. If not provided the pre-trained model is used.
    MediaAnalysisJobStatus:
      type: string
      enum:
        - CREATED
        - QUEUED
        - IN_PROGRESS
        - SUCCEEDED
        - FAILED
    MediaAnalysisJobFailureDetails:
      description: Details about the error that resulted in failure of the job.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/MediaAnalysisJobFailureCode"
          description: Error code for the failed job.
        Message:
          $ref: "#/components/schemas/String"
          description: Human readable error message.
    MediaAnalysisJobFailureCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - INVALID_S3_OBJECT
        - INVALID_MANIFEST
        - INVALID_OUTPUT_CONFIG
        - INVALID_KMS_KEY
        - ACCESS_DENIED
        - RESOURCE_NOT_FOUND
        - RESOURCE_NOT_READY
        - THROTTLED
    MediaAnalysisInput:
      description: Contains input information for a media analysis job.
      type: object
      properties:
        S3Object:
          $ref: "#/components/schemas/S3Object"
      required:
        - S3Object
    MediaAnalysisOutputConfig:
      description: Output configuration provided in the job creation request.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: Specifies the Amazon S3 bucket to contain the output of the media analysis job.
        S3KeyPrefix:
          $ref: "#/components/schemas/MediaAnalysisS3KeyPrefix"
          description: Specifies the Amazon S3 key prefix that comes after the name of the bucket you have designated for storage.
      required:
        - S3Bucket
    MediaAnalysisS3KeyPrefix:
      type: string
      maxLength: 800
      pattern: \S*
    MediaAnalysisResults:
      description: Contains the results for a media analysis job created with StartMediaAnalysisJob.
      type: object
      properties:
        S3Object:
          $ref: "#/components/schemas/S3Object"
        ModelVersions:
          $ref: "#/components/schemas/MediaAnalysisModelVersions"
          description: Information about the model versions for the features selected in a given job.
    MediaAnalysisModelVersions:
      description: Object containing information about the model versions of selected features in a given job.
      type: object
      properties:
        Moderation:
          $ref: "#/components/schemas/String"
          description: The Moderation base model version.
    MediaAnalysisManifestSummary:
      description: Summary that provides statistics on input manifest and errors identified in the input manifest.
      type: object
      properties:
        S3Object:
          $ref: "#/components/schemas/S3Object"
    PersonTrackingSortBy:
      type: string
      enum:
        - INDEX
        - TIMESTAMP
    GetPersonTrackingResponse:
      type: object
      properties:
        JobStatus:
          $ref: "#/components/schemas/VideoJobStatus"
          description: The current status of the person tracking job.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: If the job fails, StatusMessage provides a descriptive error message.
        VideoMetadata:
          $ref: "#/components/schemas/VideoMetadata"
          description: Information about a video that Amazon Rekognition Video analyzed. Videometadata is returned in every page of paginated responses from a Amazon Rekognition Video operation.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: If the response is truncated, Amazon Rekognition Video returns this token that you can use in the subsequent request to retrieve the next set of persons.
        Persons:
          $ref: "#/components/schemas/PersonDetections"
          description: An array of the persons detected in the video and the time(s) their path was tracked throughout the video. An array element will exist for each time a person's path is tracked.
        JobId:
          $ref: "#/components/schemas/JobId"
          description: Job identifier for the person tracking operation for which you want to obtain results. The job identifer is returned by an initial call to StartPersonTracking.
        Video:
          $ref: "#/components/schemas/Video"
        JobTag:
          $ref: "#/components/schemas/JobTag"
          description: A job identifier specified in the call to StartCelebrityRecognition and returned in the job completion notification sent to your Amazon Simple Notification Service topic.
    PersonDetections:
      type: array
      items:
        $ref: "#/components/schemas/PersonDetection"
    PersonDetection:
      description: Details and path tracking information for a single time a person's path is tracked in a video. Amazon Rekognition operations that track people's paths return an array of PersonDetection objects with elements for each time a person's path is tracked in a video. For more information, see GetPersonTracking in the Amazon Rekognition Developer Guide.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in milliseconds from the start of the video, that the person's path was tracked. Note that Timestamp is not guaranteed to be accurate to the individual frame where the person's path first appears.
        Person:
          $ref: "#/components/schemas/PersonDetail"
          description: Details about a person whose path was tracked in a video.
    GetSegmentDetectionResponse:
      type: object
      properties:
        JobStatus:
          $ref: "#/components/schemas/VideoJobStatus"
          description: Current status of the segment detection job.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: If the job fails, StatusMessage provides a descriptive error message.
        VideoMetadata:
          $ref: "#/components/schemas/VideoMetadataList"
          description: Currently, Amazon Rekognition Video returns a single object in the VideoMetadata array. The object contains information about the video stream in the input file that Amazon Rekognition Video chose to analyze. The VideoMetadata object includes the video codec, video format and other information. Video metadata is returned in each page of information returned by GetSegmentDetection.
        AudioMetadata:
          $ref: "#/components/schemas/AudioMetadataList"
          description: An array of objects. There can be multiple audio streams. Each AudioMetadata object contains metadata for a single audio stream. Audio information in an AudioMetadata objects includes the audio codec, the number of audio channels, the duration of the audio stream, and the sample rate. Audio metadata is returned in each page of information returned by GetSegmentDetection.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: If the previous response was incomplete (because there are more labels to retrieve), Amazon Rekognition Video returns a pagination token in the response. You can use this pagination token to retrieve the next set of text.
        Segments:
          $ref: "#/components/schemas/SegmentDetections"
          description: An array of segments detected in a video. The array is sorted by the segment types (TECHNICAL_CUE or SHOT) specified in the SegmentTypes input parameter of StartSegmentDetection. Within each segment type the array is sorted by timestamp values.
        SelectedSegmentTypes:
          $ref: "#/components/schemas/SegmentTypesInfo"
          description: An array containing the segment types requested in the call to StartSegmentDetection.
        JobId:
          $ref: "#/components/schemas/JobId"
          description: Job identifier for the segment detection operation for which you want to obtain results. The job identifer is returned by an initial call to StartSegmentDetection.
        Video:
          $ref: "#/components/schemas/Video"
        JobTag:
          $ref: "#/components/schemas/JobTag"
          description: A job identifier specified in the call to StartSegmentDetection and returned in the job completion notification sent to your Amazon Simple Notification Service topic.
    VideoMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/VideoMetadata"
    AudioMetadataList:
      type: array
      items:
        $ref: "#/components/schemas/AudioMetadata"
    AudioMetadata:
      description: Metadata information about an audio stream. An array of AudioMetadata objects for the audio streams found in a stored video is returned by GetSegmentDetection.
      type: object
      properties:
        Codec:
          $ref: "#/components/schemas/String"
          description: The audio codec used to encode or decode the audio stream.
        DurationMillis:
          $ref: "#/components/schemas/ULong"
          description: The duration of the audio stream in milliseconds.
        SampleRate:
          $ref: "#/components/schemas/ULong"
          description: The sample rate for the audio stream.
        NumberOfChannels:
          $ref: "#/components/schemas/ULong"
          description: The number of audio channels in the segment.
    SegmentDetections:
      type: array
      items:
        $ref: "#/components/schemas/SegmentDetection"
    SegmentDetection:
      description: A technical cue or shot detection segment detected in a video. An array of SegmentDetection objects containing all segments detected in a stored video is returned by GetSegmentDetection.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/SegmentType"
          description: The type of the segment. Valid values are TECHNICAL_CUE and SHOT.
        StartTimestampMillis:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the detected segment in milliseconds from the start of the video. This value is rounded down. For example, if the actual timestamp is 100.6667 milliseconds, Amazon Rekognition Video returns a value of 100 millis.
        EndTimestampMillis:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the detected segment, in milliseconds, from the start of the video. This value is rounded down.
        DurationMillis:
          $ref: "#/components/schemas/ULong"
          description: The duration of the detected segment in milliseconds.
        StartTimecodeSMPTE:
          $ref: "#/components/schemas/Timecode"
          description: The frame-accurate SMPTE timecode, from the start of a video, for the start of a detected segment. StartTimecode is in HH:MM:SS:fr format (and ;fr for drop frame-rates).
        EndTimecodeSMPTE:
          $ref: "#/components/schemas/Timecode"
          description: The frame-accurate SMPTE timecode, from the start of a video, for the end of a detected segment. EndTimecode is in HH:MM:SS:fr format (and ;fr for drop frame-rates).
        DurationSMPTE:
          $ref: "#/components/schemas/Timecode"
          description: The duration of the timecode for the detected segment in SMPTE format.
        TechnicalCueSegment:
          $ref: "#/components/schemas/TechnicalCueSegment"
          description: If the segment is a technical cue, contains information about the technical cue.
        ShotSegment:
          $ref: "#/components/schemas/ShotSegment"
          description: If the segment is a shot detection, contains information about the shot detection.
        StartFrameNumber:
          $ref: "#/components/schemas/ULong"
          description: The frame number of the start of a video segment, using a frame index that starts with 0.
        EndFrameNumber:
          $ref: "#/components/schemas/ULong"
          description: The frame number at the end of a video segment, using a frame index that starts with 0.
        DurationFrames:
          $ref: "#/components/schemas/ULong"
          description: The duration of a video segment, expressed in frames.
    SegmentType:
      type: string
      enum:
        - TECHNICAL_CUE
        - SHOT
    Timecode:
      type: string
    TechnicalCueSegment:
      description: Information about a technical cue segment. For more information, see SegmentDetection.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/TechnicalCueType"
          description: The type of the technical cue.
        Confidence:
          $ref: "#/components/schemas/SegmentConfidence"
          description: The confidence that Amazon Rekognition Video has in the accuracy of the detected segment.
    TechnicalCueType:
      type: string
      enum:
        - ColorBars
        - EndCredits
        - BlackFrames
        - OpeningCredits
        - StudioLogo
        - Slate
        - Content
    SegmentConfidence:
      type: number
      format: float
      minimum: 50
      maximum: 100
    ShotSegment:
      description: Information about a shot detection segment detected in a video. For more information, see SegmentDetection.
      type: object
      properties:
        Index:
          $ref: "#/components/schemas/ULong"
          description: An Identifier for a shot detection segment detected in a video.
        Confidence:
          $ref: "#/components/schemas/SegmentConfidence"
          description: The confidence that Amazon Rekognition Video has in the accuracy of the detected segment.
    SegmentTypesInfo:
      type: array
      items:
        $ref: "#/components/schemas/SegmentTypeInfo"
    SegmentTypeInfo:
      description: Information about the type of a segment requested in a call to StartSegmentDetection. An array of SegmentTypeInfo objects is returned by the response from GetSegmentDetection.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/SegmentType"
          description: The type of a segment (technical cue or shot detection).
        ModelVersion:
          $ref: "#/components/schemas/String"
          description: The version of the model used to detect segments.
    GetTextDetectionResponse:
      type: object
      properties:
        JobStatus:
          $ref: "#/components/schemas/VideoJobStatus"
          description: Current status of the text detection job.
        StatusMessage:
          $ref: "#/components/schemas/StatusMessage"
          description: If the job fails, StatusMessage provides a descriptive error message.
        VideoMetadata:
          $ref: "#/components/schemas/VideoMetadata"
        TextDetections:
          $ref: "#/components/schemas/TextDetectionResults"
          description: An array of text detected in the video. Each element contains the detected text, the time in milliseconds from the start of the video that the text was detected, and where it was detected on the screen.
        NextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: If the response is truncated, Amazon Rekognition Video returns this token that you can use in the subsequent request to retrieve the next set of text.
        TextModelVersion:
          $ref: "#/components/schemas/String"
          description: Version number of the text detection model that was used to detect text.
        JobId:
          $ref: "#/components/schemas/JobId"
          description: Job identifier for the text detection operation for which you want to obtain results. The job identifer is returned by an initial call to StartTextDetection.
        Video:
          $ref: "#/components/schemas/Video"
        JobTag:
          $ref: "#/components/schemas/JobTag"
          description: A job identifier specified in the call to StartTextDetection and returned in the job completion notification sent to your Amazon Simple Notification Service topic.
    TextDetectionResults:
      type: array
      items:
        $ref: "#/components/schemas/TextDetectionResult"
    TextDetectionResult:
      description: Information about text detected in a video. Incudes the detected text, the time in milliseconds from the start of the video that the text was detected, and where it was detected on the screen.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The time, in milliseconds from the start of the video, that the text was detected. Note that Timestamp is not guaranteed to be accurate to the individual frame where the text first appears.
        TextDetection:
          $ref: "#/components/schemas/TextDetection"
          description: Details about text detected in a video.
    MaxFacesToIndex:
      type: integer
      minimum: 1
    IndexFacesResponse:
      type: object
      properties:
        FaceRecords:
          $ref: "#/components/schemas/FaceRecordList"
          description: An array of faces detected and added to the collection. For more information, see Searching Faces in a Collection in the Amazon Rekognition Developer Guide.
        OrientationCorrection:
          $ref: "#/components/schemas/OrientationCorrection"
          description: "If your collection is associated with a face detection model that's later than version 3.0, the value of OrientationCorrection is always null and no orientation information is returned. If your collection is associated with a face detection model that's version 3.0 or earlier, the following applies: If the input image is in .jpeg format, it might contain exchangeable image file format (Exif) metadata that includes the image's orientation. Amazon Rekognition uses this orientation information to perform image correction - the bounding box coordinates are translated to represent object locations after the orientation information in the Exif metadata is used to correct the image orientation. Images in .png format don't contain Exif metadata. The value of OrientationCorrection is null. If the image doesn't contain orientation information in its Exif metadata, Amazon Rekognition returns an estimated orientation (ROTATE_0, ROTATE_90, ROTATE_180, ROTATE_270). Amazon Rekognition doesn’t perform image correction for images. The bounding box coordinates aren't translated and represent the object locations before the image is rotated. Bounding box information is returned in the FaceRecords array. You can get the version of the face detection model by calling DescribeCollection."
        FaceModelVersion:
          $ref: "#/components/schemas/String"
          description: The version number of the face detection model that's associated with the input collection (CollectionId).
        UnindexedFaces:
          $ref: "#/components/schemas/UnindexedFaces"
          description: An array of faces that were detected in the image but weren't indexed. They weren't indexed because the quality filter identified them as low quality, or the MaxFaces request parameter filtered them out. To use the quality filter, you specify the QualityFilter request parameter.
    FaceRecordList:
      type: array
      items:
        $ref: "#/components/schemas/FaceRecord"
    FaceRecord:
      description: Object containing both the face metadata (stored in the backend database), and facial attributes that are detected but aren't stored in the database.
      type: object
      properties:
        Face:
          $ref: "#/components/schemas/Face"
          description: Describes the face properties such as the bounding box, face ID, image ID of the input image, and external image ID that you assigned.
        FaceDetail:
          $ref: "#/components/schemas/FaceDetail"
          description: Structure containing attributes of the face that the algorithm detected.
    UnindexedFaces:
      type: array
      items:
        $ref: "#/components/schemas/UnindexedFace"
    UnindexedFace:
      description: A face that IndexFaces detected, but didn't index. Use the Reasons response attribute to determine why a face wasn't indexed.
      type: object
      properties:
        Reasons:
          $ref: "#/components/schemas/Reasons"
          description: An array of reasons that specify why a face wasn't indexed. EXTREME_POSE - The face is at a pose that can't be detected. For example, the head is turned too far away from the camera. EXCEEDS_MAX_FACES - The number of faces detected is already higher than that specified by the MaxFaces input parameter for IndexFaces. LOW_BRIGHTNESS - The image is too dark. LOW_SHARPNESS - The image is too blurry. LOW_CONFIDENCE - The face was detected with a low confidence. SMALL_BOUNDING_BOX - The bounding box around the face is too small.
        FaceDetail:
          $ref: "#/components/schemas/FaceDetail"
          description: The structure that contains attributes of a face that IndexFacesdetected, but didn't index.
