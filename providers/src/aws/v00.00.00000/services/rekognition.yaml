          description: The number of faces that are indexed into the collection. To index faces into a collection, use IndexFaces.
        FaceModelVersion:
          $ref: "#/components/schemas/String"
          description: The version of the face model that's used by the collection for face detection. For more information, see Model versioning in the Amazon Rekognition Developer Guide.
        CollectionARN:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the collection.
        CreationTimestamp:
          $ref: "#/components/schemas/DateTime"
          description: The number of milliseconds since the Unix epoch time until the creation of the collection. The Unix epoch time is 00:00:00 Coordinated Universal Time (UTC), Thursday, 1 January 1970.
        UserCount:
          $ref: "#/components/schemas/ULong"
          description: The number of UserIDs assigned to the specified colleciton.
    ULong:
      type: integer
      format: int64
      minimum: 0
    DateTime:
      type: string
      format: date-time
    DescribeDatasetResponse:
      type: object
      properties:
        DatasetDescription:
          $ref: "#/components/schemas/DatasetDescription"
          description: The description for the dataset.
    DatasetDescription:
