      description: This is a required parameter for label detection stream processors and should not be used to start a face search stream processor.
      type: object
      properties:
        KVSStreamStartSelector:
          $ref: "#/components/schemas/KinesisVideoStreamStartSelector"
          description: Specifies the starting point in the stream to start processing. This can be done with a producer timestamp or a fragment number in a Kinesis stream.
    KinesisVideoStreamStartSelector:
      description: Specifies the starting point in a Kinesis stream to start processing. You can use the producer timestamp or the fragment number. One of either producer timestamp or fragment number is required. If you use the producer timestamp, you must put the time in milliseconds. For more information about fragment numbers, see Fragment.
      type: object
      properties:
        ProducerTimestamp:
          $ref: "#/components/schemas/ULong"
          description: The timestamp from the producer corresponding to the fragment, in milliseconds, expressed in unix time format.
        FragmentNumber:
          $ref: "#/components/schemas/KinesisVideoStreamFragmentNumber"
          description: The unique identifier of the fragment. This value monotonically increases based on the ingestion order.
    KinesisVideoStreamFragmentNumber:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[0-9]+$
    StreamProcessingStopSelector:
      description: Specifies when to stop processing the stream. You can specify a maximum amount of time to process the video.
      type: object
      properties:
        MaxDurationInSeconds:
          $ref: "#/components/schemas/MaxDurationInSecondsULong"
          description: Specifies the maximum amount of time in seconds that you want the stream to be processed. The largest amount of time is 2 minutes. The default is 10 seconds.
    MaxDurationInSecondsULong:
      type: integer
      format: int64
      minimum: 1
      maximum: 120
    StartStreamProcessorResponse:
      type: object
      properties:
        SessionId:
          $ref: "#/components/schemas/StartStreamProcessorSessionId"
          description: A unique identifier for the stream processing session.
    StartStreamProcessorSessionId:
      type: string
    StartTextDetectionFilters:
      description: Set of optional parameters that let you set the criteria text must meet to be included in your response. WordFilter looks at a word's height, width and minimum confidence. RegionOfInterest lets you set a specific region of the screen to look for text in.
      type: object
      properties:
        WordFilter:
          $ref: "#/components/schemas/DetectionFilter"
          description: Filters focusing on qualities of the text, such as confidence or size.
        RegionsOfInterest:
          $ref: "#/components/schemas/RegionsOfInterest"
          description: Filter focusing on a certain area of the frame. Uses a BoundingBox object to set the region of the screen.
    StartTextDetectionResponse:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: Identifier for the text detection job. Use JobId to identify the job in a subsequent call to GetTextDetection.
    StopProjectVersionResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ProjectVersionStatus"
          description: The current status of the stop operation.
    StopStreamProcessorResponse:
      type: object
    TagResourceResponse:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^(?!aws:)[\p{L}\p{Z}\p{N}_.:/=+\-@]*$
    UntagResourceResponse:
      type: object
    DatasetChanges:
      description: Describes updates or additions to a dataset. A Single update or addition is an entry (JSON Line) that provides information about a single image. To update an existing entry, you match the source-ref field of the update entry with the source-ref filed of the entry that you want to update. If the source-ref field doesn't match an existing entry, the entry is added to dataset as a new entry.
      type: object
      properties:
        GroundTruth:
          $ref: "#/components/schemas/GroundTruthBlob"
          description: A Base64-encoded binary data object containing one or JSON lines that either update the dataset or are additions to the dataset. You change a dataset by calling UpdateDatasetEntries. If you are using an AWS SDK to call UpdateDatasetEntries, you don't need to encode Changes as the SDK encodes the data for you. For example JSON lines, see Image-Level labels in manifest files and and Object localization in manifest files in the Amazon Rekognition Custom Labels Developer Guide.
      required:
        - GroundTruth
    GroundTruthBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 5242880
    UpdateDatasetEntriesResponse:
      type: object
    StreamProcessorSettingsForUpdate:
      description: The stream processor settings that you want to update. ConnectedHome settings can be updated to detect different labels with a different minimum confidence.
      type: object
      properties:
        ConnectedHomeForUpdate:
          $ref: "#/components/schemas/ConnectedHomeSettingsForUpdate"
          description: The label detection settings you want to use for your stream processor.
    ConnectedHomeSettingsForUpdate:
      description: The label detection settings you want to use in your stream processor. This includes the labels you want the stream processor to detect and the minimum confidence level allowed to label objects.
      type: object
      properties:
        Labels:
          $ref: "#/components/schemas/ConnectedHomeLabels"
          description: 'Specifies what you want to detect in the video, such as people, packages, or pets. The current valid labels you can include in this list are: "PERSON", "PET", "PACKAGE", and "ALL".'
        MinConfidence:
          $ref: "#/components/schemas/Percent"
          description: The minimum confidence required to label an object in the video.
    StreamProcessorParametersToDelete:
      type: array
      items:
        $ref: "#/components/schemas/StreamProcessorParameterToDelete"
    StreamProcessorParameterToDelete:
      type: string
      enum:
        - ConnectedHomeMinConfidence
        - RegionsOfInterest
    UpdateStreamProcessorResponse:
      type: object
