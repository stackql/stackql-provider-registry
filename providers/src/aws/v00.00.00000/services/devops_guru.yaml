          description: 'Describes the specified KMS key. To specify a KMS key, use its key ID, key ARN, alias name, or alias ARN. When using an alias name, prefix it with "alias/". If you specify a predefined Amazon Web Services alias (an Amazon Web Services alias with no key ID), Amazon Web Services KMS associates the alias with an Amazon Web Services managed key and returns its KeyId and Arn in the response. To specify a KMS key in a different Amazon Web Services account, you must use the key ARN or alias ARN. For example: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-east-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias ARN: arn:aws:kms:us-east-2:111122223333:alias/ExampleAlias'
        OptInStatus:
          $ref: "#/components/schemas/OptInStatus"
          description: Specifies if DevOps Guru is enabled for customer managed keys.
        Type:
          $ref: "#/components/schemas/ServerSideEncryptionType"
          description: The type of KMS key used. Customer managed keys are the KMS keys that you create. Amazon Web Services owned keys are keys that are owned and managed by DevOps Guru.
    KMSKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^.*$
    ServerSideEncryptionType:
      type: string
      enum:
        - CUSTOMER_MANAGED_KEY
        - AWS_OWNED_KMS_KEY
    GetCostEstimationResponse:
      type: object
      properties:
        ResourceCollection:
          $ref: "#/components/schemas/CostEstimationResourceCollectionFilter"
          description: The collection of the Amazon Web Services resources used to create your monthly DevOps Guru cost estimate.
        Status:
          $ref: "#/components/schemas/CostEstimationStatus"
          description: The status of creating this cost estimate. If it's still in progress, the status ONGOING is returned. If it is finished, the status COMPLETED is returned.
        Costs:
          $ref: "#/components/schemas/ServiceResourceCosts"
          description: An array of ResourceCost objects that each contains details about the monthly cost estimate to analyze one of your Amazon Web Services resources.
        TimeRange:
          $ref: "#/components/schemas/CostEstimationTimeRange"
          description: The start and end time of the cost estimation.
        TotalCost:
          $ref: "#/components/schemas/Cost"
          description: The estimated monthly cost to analyze the Amazon Web Services resources. This value is the sum of the estimated costs to analyze each resource in the Costs object in this response.
        NextToken:
          $ref: "#/components/schemas/UuidNextToken"
          description: The pagination token to use to retrieve the next page of results for this operation. If there are no more pages, this value is null.
    CostEstimationResourceCollectionFilter:
      description: Information about a filter used to specify which Amazon Web Services resources are analyzed to create a monthly DevOps Guru cost estimate. For more information, see Estimate your Amazon DevOps Guru costs and Amazon DevOps Guru pricing.
      type: object
      properties:
        CloudFormation:
          $ref: "#/components/schemas/CloudFormationCostEstimationResourceCollectionFilter"
          description: An object that specifies the CloudFormation stack that defines the Amazon Web Services resources used to create a monthly estimate for DevOps Guru.
        Tags:
          $ref: "#/components/schemas/TagCostEstimationResourceCollectionFilters"
          description: The Amazon Web Services tags used to filter the resource collection that is used for a cost estimate. Tags help you identify and organize your Amazon Web Services resources. Many Amazon Web Services services support tagging, so you can assign the same tag to resources from different services to indicate that the resources are related. For example, you can assign the same tag to an Amazon DynamoDB table resource that you assign to an Lambda function. For more information about using tags, see the Tagging best practices whitepaper. Each Amazon Web Services tag has two parts. A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case-sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case-sensitive. Together these are known as key-value pairs. The string used for a key in a tag that you use to define your resource coverage must begin with the prefix Devops-guru-. The tag key might be DevOps-Guru-deployment-application or devops-guru-rds-application. When you create a key, the case of characters in the key can be whatever you choose. After you create a key, it is case-sensitive. For example, DevOps Guru works with a key named devops-guru-rds and a key named DevOps-Guru-RDS, and these act as two different keys. Possible key/value pairs in your application might be Devops-Guru-production-application/RDS or Devops-Guru-production-application/containers.
    CloudFormationCostEstimationResourceCollectionFilter:
      description: Information about an Amazon Web Services CloudFormation stack used to create a monthly cost estimate for DevOps Guru to analyze Amazon Web Services resources. The maximum number of stacks you can specify for a cost estimate is one. The estimate created is for the cost to analyze the Amazon Web Services resources defined by the stack. For more information, see Stacks in the Amazon Web Services CloudFormation User Guide.
      type: object
      properties:
        StackNames:
          $ref: "#/components/schemas/CostEstimationStackNames"
          description: An array of CloudFormation stack names. Its size is fixed at 1 item.
