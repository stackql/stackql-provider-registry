openapi: 3.0.0
info:
  version: "2020-12-01"
  title: Amazon DevOps Guru
  description: Amazon DevOps Guru
  x-serviceName: devops-guru
  x-serviceAlias: devops_guru
  x-protocol: rest-json
  x-apiVersion: "2020-12-01"
  x-endpointPrefix: devops-guru
  x-jsonVersion: "1.1"
servers:
  - url: https://devops-guru.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for devops-guru
paths:
  /channels:
    put:
      operationId: AddNotificationChannel
      description: Adds a notification channel to DevOps Guru. A notification channel is used to notify you about important DevOps Guru events, such as when an insight is generated. If you use an Amazon SNS topic in another account, you must attach a policy to it that grants DevOps Guru permission to send it notifications. DevOps Guru adds the required policy on your behalf to send notifications using Amazon SNS in your account. DevOps Guru only supports standard SNS topics. For more information, see Permissions for Amazon SNS topics. If you use an Amazon SNS topic that is encrypted by an Amazon Web Services Key Management Service customer-managed key (CMK), then you must add permissions to the CMK. For more information, see Permissions for Amazon Web Services KMS–encrypted Amazon SNS topics.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Config:
                  $ref: "#/components/schemas/NotificationChannelConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddNotificationChannelResponse"
    post:
      operationId: ListNotificationChannels
      description: Returns a list of notification channels configured for DevOps Guru. Each notification channel is used to notify you when DevOps Guru generates an insight that contains information about how to improve your operations. The one supported notification channel is Amazon Simple Notification Service (Amazon SNS).
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotificationChannelsResponse"
  /insights/{id}:
    delete:
      operationId: DeleteInsight
      description: Deletes the insight along with the associated anomalies, events and recommendations.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InsightId"
          description: The ID of the insight.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInsightResponse"
    get:
      operationId: DescribeInsight
      description: Returns details about an insight that you specify using its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InsightId"
          description: The ID of the insight.
        - name: AccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the member account in the organization.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeInsightResponse"
  /accounts/health:
    get:
      operationId: DescribeAccountHealth
      description: Returns the number of open reactive insights, the number of open proactive insights, and the number of metrics analyzed in your Amazon Web Services account. Use these numbers to gauge the health of operations in your Amazon Web Services account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountHealthResponse"
  /accounts/overview:
    post:
      operationId: DescribeAccountOverview
      description: For the time range passed in, returns the number of open reactive insight that were created, the number of open proactive insights that were created, and the Mean Time to Recover (MTTR) for all closed reactive insights.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FromTime:
                  $ref: "#/components/schemas/Timestamp"
                ToTime:
                  $ref: "#/components/schemas/Timestamp"
              required:
                - FromTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAccountOverviewResponse"
  /anomalies/{id}:
    get:
      operationId: DescribeAnomaly
      description: Returns details about an anomaly that you specify using its ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AnomalyId"
          description: The ID of the anomaly.
        - name: AccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AwsAccountId"
          description: The ID of the member account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAnomalyResponse"
  /event-sources:
    post:
      operationId: DescribeEventSourcesConfig
      description: Returns the integration status of services that are integrated with DevOps Guru as Consumer via EventBridge. The one service that can be integrated with DevOps Guru is Amazon CodeGuru Profiler, which can produce proactive recommendations which can be stored and viewed in DevOps Guru.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEventSourcesConfigResponse"
    put:
      operationId: UpdateEventSourcesConfig
      description: Enables or disables integration with a service that can be integrated with DevOps Guru. The one service that can be integrated with DevOps Guru is Amazon CodeGuru Profiler, which can produce proactive recommendations which can be stored and viewed in DevOps Guru.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                EventSources:
                  $ref: "#/components/schemas/EventSourcesConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventSourcesConfigResponse"
  /feedback:
    post:
      operationId: DescribeFeedback
      description: Returns the most recent feedback submitted in the current Amazon Web Services account and Region.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightId:
                  $ref: "#/components/schemas/InsightId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFeedbackResponse"
    put:
      operationId: PutFeedback
      description: Collects customer feedback about the specified insight.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightFeedback:
                  $ref: "#/components/schemas/InsightFeedback"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutFeedbackResponse"
  /organization/health:
    post:
      operationId: DescribeOrganizationHealth
      description: Returns active insights, predictive insights, and resource hours analyzed in last hour.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
                OrganizationalUnitIds:
                  $ref: "#/components/schemas/OrganizationalUnitIdList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOrganizationHealthResponse"
  /organization/overview:
    post:
      operationId: DescribeOrganizationOverview
      description: Returns an overview of your organization's history based on the specified time range. The overview includes the total reactive and proactive insights.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FromTime:
                  $ref: "#/components/schemas/Timestamp"
                ToTime:
                  $ref: "#/components/schemas/Timestamp"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
                OrganizationalUnitIds:
                  $ref: "#/components/schemas/OrganizationalUnitIdList"
              required:
                - FromTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOrganizationOverviewResponse"
  /organization/health/resource-collection:
    post:
      operationId: DescribeOrganizationResourceCollectionHealth
      description: Provides an overview of your system's health. If additional member accounts are part of your organization, you can filter those accounts using the AccountIds field.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OrganizationResourceCollectionType:
                  $ref: "#/components/schemas/OrganizationResourceCollectionType"
                AccountIds:
                  $ref: "#/components/schemas/AccountIdList"
                OrganizationalUnitIds:
                  $ref: "#/components/schemas/OrganizationalUnitIdList"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
                MaxResults:
                  $ref: "#/components/schemas/OrganizationResourceCollectionMaxResults"
              required:
                - OrganizationResourceCollectionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOrganizationResourceCollectionHealthResponse"
  /accounts/health/resource-collection/{resource_collection_type}:
    get:
      operationId: DescribeResourceCollectionHealth
      description: Returns the number of open proactive insights, open reactive insights, and the Mean Time to Recover (MTTR) for all closed insights in resource collections in your account. You specify the type of Amazon Web Services resources collection. The two types of Amazon Web Services resource collections supported are Amazon Web Services CloudFormation stacks and Amazon Web Services resources that contain the same Amazon Web Services tag. DevOps Guru can be configured to analyze the Amazon Web Services resources that are defined in the stacks or that are tagged using the same tag key. You can specify up to 500 Amazon Web Services CloudFormation stacks.
      parameters:
        - name: resource_collection_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceCollectionType"
          description: An Amazon Web Services resource collection type. This type specifies how analyzed Amazon Web Services resources are defined. The two types of Amazon Web Services resource collections supported are Amazon Web Services CloudFormation stacks and Amazon Web Services resources that contain the same Amazon Web Services tag. DevOps Guru can be configured to analyze the Amazon Web Services resources that are defined in the stacks or that are tagged using the same tag key. You can specify up to 500 Amazon Web Services CloudFormation stacks.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UuidNextToken"
          description: The pagination token to use to retrieve the next page of results for this operation. If this value is null, it retrieves the first page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeResourceCollectionHealthResponse"
  /service-integrations:
    get:
      operationId: DescribeServiceIntegration
      description: Returns the integration status of services that are integrated with DevOps Guru. The one service that can be integrated with DevOps Guru is Amazon Web Services Systems Manager, which can be used to create an OpsItem for each generated insight.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeServiceIntegrationResponse"
    put:
      operationId: UpdateServiceIntegration
      description: Enables or disables integration with a service that can be integrated with DevOps Guru. The one service that can be integrated with DevOps Guru is Amazon Web Services Systems Manager, which can be used to create an OpsItem for each generated insight.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ServiceIntegration:
                  $ref: "#/components/schemas/UpdateServiceIntegrationConfig"
              required:
                - ServiceIntegration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateServiceIntegrationResponse"
  /cost-estimation:
    get:
      operationId: GetCostEstimation
      description: Returns an estimate of the monthly cost for DevOps Guru to analyze your Amazon Web Services resources. For more information, see Estimate your Amazon DevOps Guru costs and Amazon DevOps Guru pricing.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UuidNextToken"
          description: The pagination token to use to retrieve the next page of results for this operation. If this value is null, it retrieves the first page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCostEstimationResponse"
    put:
      operationId: StartCostEstimation
      description: Starts the creation of an estimate of the monthly cost to analyze your Amazon Web Services resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceCollection:
                  $ref: "#/components/schemas/CostEstimationResourceCollectionFilter"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - ResourceCollection
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCostEstimationResponse"
  /resource-collections/{resource_collection_type}:
    get:
      operationId: GetResourceCollection
      description: Returns lists Amazon Web Services resources that are of the specified resource collection type. The two types of Amazon Web Services resource collections supported are Amazon Web Services CloudFormation stacks and Amazon Web Services resources that contain the same Amazon Web Services tag. DevOps Guru can be configured to analyze the Amazon Web Services resources that are defined in the stacks or that are tagged using the same tag key. You can specify up to 500 Amazon Web Services CloudFormation stacks.
      parameters:
        - name: resource_collection_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceCollectionType"
          description: The type of Amazon Web Services resource collections to return. The one valid value is CLOUD_FORMATION for Amazon Web Services CloudFormation stacks.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UuidNextToken"
          description: The pagination token to use to retrieve the next page of results for this operation. If this value is null, it retrieves the first page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceCollectionResponse"
  /anomalies/insight/{insight_id}:
    post:
      operationId: ListAnomaliesForInsight
      description: Returns a list of the anomalies that belong to an insight that you specify using its ID.
      parameters:
        - name: insight_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InsightId"
          description: The ID of the insight. The returned anomalies belong to this insight.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTimeRange:
                  $ref: "#/components/schemas/StartTimeRange"
                MaxResults:
                  $ref: "#/components/schemas/ListAnomaliesForInsightMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
                AccountId:
                  $ref: "#/components/schemas/AwsAccountId"
                Filters:
                  $ref: "#/components/schemas/ListAnomaliesForInsightFilters"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnomaliesForInsightResponse"
  /list-log-anomalies:
    post:
      operationId: ListAnomalousLogGroups
      description: Returns the list of log groups that contain log anomalies.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightId:
                  $ref: "#/components/schemas/InsightId"
                MaxResults:
                  $ref: "#/components/schemas/ListAnomalousLogGroupsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
              required:
                - InsightId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnomalousLogGroupsResponse"
  /events:
    post:
      operationId: ListEvents
      description: Returns a list of the events emitted by the resources that are evaluated by DevOps Guru. You can use filters to specify which events are returned.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ListEventsFilters"
                MaxResults:
                  $ref: "#/components/schemas/ListEventsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
                AccountId:
                  $ref: "#/components/schemas/AwsAccountId"
              required:
                - Filters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventsResponse"
  /insights:
    post:
      operationId: ListInsights
      description: Returns a list of insights in your Amazon Web Services account. You can specify which insights are returned by their start time and status (ONGOING, CLOSED, or ANY).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StatusFilter:
                  $ref: "#/components/schemas/ListInsightsStatusFilter"
                MaxResults:
                  $ref: "#/components/schemas/ListInsightsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
              required:
                - StatusFilter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInsightsResponse"
  /monitoredResources:
    post:
      operationId: ListMonitoredResources
      description: Returns the list of all log groups that are being monitored and tagged by DevOps Guru.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/ListMonitoredResourcesFilters"
                MaxResults:
                  $ref: "#/components/schemas/ListMonitoredResourcesMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMonitoredResourcesResponse"
  /organization/insights:
    post:
      operationId: ListOrganizationInsights
      description: Returns a list of insights associated with the account or OU Id.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StatusFilter:
                  $ref: "#/components/schemas/ListInsightsStatusFilter"
                MaxResults:
                  $ref: "#/components/schemas/ListInsightsMaxResults"
                AccountIds:
                  $ref: "#/components/schemas/ListInsightsAccountIdList"
                OrganizationalUnitIds:
                  $ref: "#/components/schemas/ListInsightsOrganizationalUnitIdList"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
              required:
                - StatusFilter
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationInsightsResponse"
  /recommendations:
    post:
      operationId: ListRecommendations
      description: Returns a list of a specified insight's recommendations. Each recommendation includes a list of related metrics and a list of related events.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                InsightId:
                  $ref: "#/components/schemas/InsightId"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
                Locale:
                  $ref: "#/components/schemas/Locale"
                AccountId:
                  $ref: "#/components/schemas/AwsAccountId"
              required:
                - InsightId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationsResponse"
  /channels/{id}:
    delete:
      operationId: RemoveNotificationChannel
      description: Removes a notification channel from DevOps Guru. A notification channel is used to notify you when DevOps Guru generates an insight that contains information about how to improve your operations.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NotificationChannelId"
          description: The ID of the notification channel to be removed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveNotificationChannelResponse"
  /insights/search:
    post:
      operationId: SearchInsights
      description: Returns a list of insights in your Amazon Web Services account. You can specify which insights are returned by their start time, one or more statuses (ONGOING or CLOSED), one or more severities (LOW, MEDIUM, and HIGH), and type (REACTIVE or PROACTIVE). Use the Filters parameter to specify status and severity search parameters. Use the Type parameter to specify REACTIVE or PROACTIVE in your search.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTimeRange:
                  $ref: "#/components/schemas/StartTimeRange"
                Filters:
                  $ref: "#/components/schemas/SearchInsightsFilters"
                MaxResults:
                  $ref: "#/components/schemas/SearchInsightsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
                Type:
                  $ref: "#/components/schemas/InsightType"
              required:
                - StartTimeRange
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchInsightsResponse"
  /organization/insights/search:
    post:
      operationId: SearchOrganizationInsights
      description: Returns a list of insights in your organization. You can specify which insights are returned by their start time, one or more statuses (ONGOING, CLOSED, and CLOSED), one or more severities (LOW, MEDIUM, and HIGH), and type (REACTIVE or PROACTIVE). Use the Filters parameter to specify status and severity search parameters. Use the Type parameter to specify REACTIVE or PROACTIVE in your search.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIds:
                  $ref: "#/components/schemas/SearchInsightsAccountIdList"
                StartTimeRange:
                  $ref: "#/components/schemas/StartTimeRange"
                Filters:
                  $ref: "#/components/schemas/SearchOrganizationInsightsFilters"
                MaxResults:
                  $ref: "#/components/schemas/SearchOrganizationInsightsMaxResults"
                NextToken:
                  $ref: "#/components/schemas/UuidNextToken"
                Type:
                  $ref: "#/components/schemas/InsightType"
              required:
                - AccountIds
                - StartTimeRange
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchOrganizationInsightsResponse"
  /resource-collections:
    put:
      operationId: UpdateResourceCollection
      description: Updates the collection of resources that DevOps Guru analyzes. The two types of Amazon Web Services resource collections supported are Amazon Web Services CloudFormation stacks and Amazon Web Services resources that contain the same Amazon Web Services tag. DevOps Guru can be configured to analyze the Amazon Web Services resources that are defined in the stacks or that are tagged using the same tag key. You can specify up to 500 Amazon Web Services CloudFormation stacks. This method also creates the IAM role required for you to use DevOps Guru.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Action:
                  $ref: "#/components/schemas/UpdateResourceCollectionAction"
                ResourceCollection:
                  $ref: "#/components/schemas/UpdateResourceCollectionFilter"
              required:
                - Action
                - ResourceCollection
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResourceCollectionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NotificationChannelConfig:
      description: Information about notification channels you have configured with DevOps Guru. The one supported notification channel is Amazon Simple Notification Service (Amazon SNS).
      type: object
      properties:
        Sns:
          $ref: "#/components/schemas/SnsChannelConfig"
          description: Information about a notification channel configured in DevOps Guru to send notifications when insights are created. If you use an Amazon SNS topic in another account, you must attach a policy to it that grants DevOps Guru permission to send it notifications. DevOps Guru adds the required policy on your behalf to send notifications using Amazon SNS in your account. DevOps Guru only supports standard SNS topics. For more information, see Permissions for Amazon SNS topics. If you use an Amazon SNS topic that is encrypted by an Amazon Web Services Key Management Service customer-managed key (CMK), then you must add permissions to the CMK. For more information, see Permissions for Amazon Web Services KMS–encrypted Amazon SNS topics.
        Filters:
          $ref: "#/components/schemas/NotificationFilterConfig"
          description: The filter configurations for the Amazon SNS notification topic you use with DevOps Guru. If you do not provide filter configurations, the default configurations are to receive notifications for all message types of High or Medium severity.
      required:
        - Sns
    SnsChannelConfig:
      description: Contains the Amazon Resource Name (ARN) of an Amazon Simple Notification Service topic. If you use an Amazon SNS topic in another account, you must attach a policy to it that grants DevOps Guru permission to send it notifications. DevOps Guru adds the required policy on your behalf to send notifications using Amazon SNS in your account. DevOps Guru only supports standard SNS topics. For more information, see Permissions for Amazon SNS topics. If you use an Amazon SNS topic that is encrypted by an Amazon Web Services Key Management Service customer-managed key (CMK), then you must add permissions to the CMK. For more information, see Permissions for Amazon Web Services KMS–encrypted Amazon SNS topics.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/TopicArn"
          description: The Amazon Resource Name (ARN) of an Amazon Simple Notification Service topic.
    TopicArn:
      type: string
      minLength: 36
      maxLength: 1024
      pattern: ^arn:aws[a-z0-9-]*:sns:[a-z0-9-]+:\d{12}:[^:]+$
    NotificationFilterConfig:
      description: The filter configurations for the Amazon SNS notification topic you use with DevOps Guru. You can choose to specify which events or message types to receive notifications for. You can also choose to specify which severity levels to receive notifications for.
      type: object
      properties:
        Severities:
          $ref: "#/components/schemas/InsightSeverities"
          description: The severity levels that you want to receive notifications for. For example, you can choose to receive notifications only for insights with HIGH and MEDIUM severity levels. For more information, see Understanding insight severities.
        MessageTypes:
          $ref: "#/components/schemas/NotificationMessageTypes"
          description: The events that you want to receive notifications for. For example, you can choose to receive notifications only when the severity level is upgraded or a new insight is created.
    InsightSeverities:
      type: array
      items:
        $ref: "#/components/schemas/InsightSeverity"
    InsightSeverity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    NotificationMessageTypes:
      type: array
      items:
        $ref: "#/components/schemas/NotificationMessageType"
    NotificationMessageType:
      type: string
      enum:
        - NEW_INSIGHT
        - CLOSED_INSIGHT
        - NEW_ASSOCIATION
        - SEVERITY_UPGRADED
        - NEW_RECOMMENDATION
    AddNotificationChannelResponse:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NotificationChannelId"
          description: The ID of the added notification channel.
      required:
        - Id
    NotificationChannelId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    InsightId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[\w-]*$
    DeleteInsightResponse:
      type: object
    DescribeAccountHealthResponse:
      type: object
      properties:
        OpenReactiveInsights:
          $ref: "#/components/schemas/NumOpenReactiveInsights"
          description: An integer that specifies the number of open reactive insights in your Amazon Web Services account.
        OpenProactiveInsights:
          $ref: "#/components/schemas/NumOpenProactiveInsights"
          description: An integer that specifies the number of open proactive insights in your Amazon Web Services account.
        MetricsAnalyzed:
          $ref: "#/components/schemas/NumMetricsAnalyzed"
          description: An integer that specifies the number of metrics that have been analyzed in your Amazon Web Services account.
        ResourceHours:
          $ref: "#/components/schemas/ResourceHours"
          description: The number of Amazon DevOps Guru resource analysis hours billed to the current Amazon Web Services account in the last hour.
        AnalyzedResourceCount:
          $ref: "#/components/schemas/AnalyzedResourceCount"
          description: Number of resources that DevOps Guru is monitoring in your Amazon Web Services account.
      required:
        - OpenReactiveInsights
        - OpenProactiveInsights
        - MetricsAnalyzed
        - ResourceHours
    NumOpenReactiveInsights:
      type: integer
    NumOpenProactiveInsights:
      type: integer
    NumMetricsAnalyzed:
      type: integer
    ResourceHours:
      type: integer
      format: int64
    AnalyzedResourceCount:
      type: integer
      format: int64
    Timestamp:
      type: string
      format: date-time
    DescribeAccountOverviewResponse:
      type: object
      properties:
        ReactiveInsights:
          $ref: "#/components/schemas/NumReactiveInsights"
          description: An integer that specifies the number of open reactive insights in your Amazon Web Services account that were created during the time range passed in.
        ProactiveInsights:
          $ref: "#/components/schemas/NumProactiveInsights"
          description: An integer that specifies the number of open proactive insights in your Amazon Web Services account that were created during the time range passed in.
        MeanTimeToRecoverInMilliseconds:
          $ref: "#/components/schemas/MeanTimeToRecoverInMilliseconds"
          description: The Mean Time to Recover (MTTR) for all closed insights that were created during the time range passed in.
      required:
        - ReactiveInsights
        - ProactiveInsights
        - MeanTimeToRecoverInMilliseconds
    NumReactiveInsights:
      type: integer
    NumProactiveInsights:
      type: integer
    MeanTimeToRecoverInMilliseconds:
      type: integer
      format: int64
    AnomalyId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[\w~.-]*$
    AwsAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: ^\d{12}$
    DescribeAnomalyResponse:
      type: object
      properties:
        ProactiveAnomaly:
          $ref: "#/components/schemas/ProactiveAnomaly"
          description: A ProactiveAnomaly object that represents the requested anomaly.
        ReactiveAnomaly:
          $ref: "#/components/schemas/ReactiveAnomaly"
          description: A ReactiveAnomaly object that represents the requested anomaly.
    ProactiveAnomaly:
      description: Information about an anomaly. This object is returned by ListAnomalies.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/AnomalyId"
          description: The ID of a proactive anomaly.
        Severity:
          $ref: "#/components/schemas/AnomalySeverity"
          description: The severity of the anomaly. The severity of anomalies that generate an insight determine that insight's severity. For more information, see Understanding insight severities in the Amazon DevOps Guru User Guide.
        Status:
          $ref: "#/components/schemas/AnomalyStatus"
          description: The status of a proactive anomaly.
        UpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time of the anomaly's most recent update.
        AnomalyTimeRange:
          $ref: "#/components/schemas/AnomalyTimeRange"
        AnomalyReportedTimeRange:
          $ref: "#/components/schemas/AnomalyReportedTimeRange"
          description: An AnomalyReportedTimeRange object that specifies the time range between when the anomaly is opened and the time when it is closed.
        PredictionTimeRange:
          $ref: "#/components/schemas/PredictionTimeRange"
        SourceDetails:
          $ref: "#/components/schemas/AnomalySourceDetails"
          description: Details about the source of the analyzed operational data that triggered the anomaly. The one supported source is Amazon CloudWatch metrics.
        AssociatedInsightId:
          $ref: "#/components/schemas/InsightId"
          description: The ID of the insight that contains this anomaly. An insight is composed of related anomalies.
        ResourceCollection:
          $ref: "#/components/schemas/ResourceCollection"
        Limit:
          $ref: "#/components/schemas/AnomalyLimit"
          description: A threshold that was exceeded by behavior in analyzed resources. Exceeding this threshold is related to the anomalous behavior that generated this anomaly.
        SourceMetadata:
          $ref: "#/components/schemas/AnomalySourceMetadata"
          description: The metadata for the anomaly.
        AnomalyResources:
          $ref: "#/components/schemas/AnomalyResources"
          description: Information about a resource in which DevOps Guru detected anomalous behavior.
        Description:
          $ref: "#/components/schemas/AnomalyDescription"
          description: A description of the proactive anomaly.
    AnomalySeverity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    AnomalyStatus:
      type: string
      enum:
        - ONGOING
        - CLOSED
    AnomalyTimeRange:
      description: A time range that specifies when the observed unusual behavior in an anomaly started and ended. This is different from AnomalyReportedTimeRange, which specifies the time range when DevOps Guru opens and then closes an anomaly.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the anomalous behavior started.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the anomalous behavior ended.
      required:
        - StartTime
    AnomalyReportedTimeRange:
      description: A time range that specifies when DevOps Guru opens and then closes an anomaly. This is different from AnomalyTimeRange, which specifies the time range when DevOps Guru actually observes the anomalous behavior.
      type: object
      properties:
        OpenTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when an anomaly is opened.
        CloseTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when an anomaly is closed.
      required:
        - OpenTime
    PredictionTimeRange:
      description: The time range during which anomalous behavior in a proactive anomaly or an insight is expected to occur.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time range during which a metric limit is expected to be exceeded. This applies to proactive insights only.
        EndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the behavior in a proactive insight is expected to end.
      required:
        - StartTime
    AnomalySourceDetails:
      description: Details about the source of the anomalous operational data that triggered the anomaly.
      type: object
      properties:
        CloudWatchMetrics:
          $ref: "#/components/schemas/CloudWatchMetricsDetails"
          description: An array of CloudWatchMetricsDetail objects that contain information about analyzed CloudWatch metrics that show anomalous behavior.
        PerformanceInsightsMetrics:
          $ref: "#/components/schemas/PerformanceInsightsMetricsDetails"
          description: An array of PerformanceInsightsMetricsDetail objects that contain information about analyzed Performance Insights metrics that show anomalous behavior.
    CloudWatchMetricsDetails:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchMetricsDetail"
    CloudWatchMetricsDetail:
      description: Information about an Amazon CloudWatch metric.
      type: object
      properties:
        MetricName:
          $ref: "#/components/schemas/CloudWatchMetricsMetricName"
          description: The name of the CloudWatch metric.
        Namespace:
          $ref: "#/components/schemas/CloudWatchMetricsNamespace"
          description: The namespace of the CloudWatch metric. A namespace is a container for CloudWatch metrics.
        Dimensions:
          $ref: "#/components/schemas/CloudWatchMetricsDimensions"
          description: An array of CloudWatch dimensions associated with
        Stat:
          $ref: "#/components/schemas/CloudWatchMetricsStat"
          description: The type of statistic associated with the CloudWatch metric. For more information, see Statistics in the Amazon CloudWatch User Guide.
        Unit:
          $ref: "#/components/schemas/CloudWatchMetricsUnit"
          description: The unit of measure used for the CloudWatch metric. For example, Bytes, Seconds, Count, and Percent.
        Period:
          $ref: "#/components/schemas/CloudWatchMetricsPeriod"
          description: The length of time associated with the CloudWatch metric in number of seconds.
        MetricDataSummary:
          $ref: "#/components/schemas/CloudWatchMetricsDataSummary"
          description: This object returns anomaly metric data.
    CloudWatchMetricsMetricName:
      type: string
    CloudWatchMetricsNamespace:
      type: string
    CloudWatchMetricsDimensions:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchMetricsDimension"
    CloudWatchMetricsDimension:
      description: The dimension of an Amazon CloudWatch metric that is used when DevOps Guru analyzes the resources in your account for operational problems and anomalous behavior. A dimension is a name/value pair that is part of the identity of a metric. A metric can have up to 10 dimensions. For more information, see Dimensions in the Amazon CloudWatch User Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/CloudWatchMetricsDimensionName"
          description: The name of the CloudWatch dimension.
        Value:
          $ref: "#/components/schemas/CloudWatchMetricsDimensionValue"
          description: The value of the CloudWatch dimension.
    CloudWatchMetricsDimensionName:
      type: string
    CloudWatchMetricsDimensionValue:
      type: string
    CloudWatchMetricsStat:
      type: string
      enum:
        - Sum
        - Average
        - SampleCount
        - Minimum
        - Maximum
        - p99
        - p90
        - p50
    CloudWatchMetricsUnit:
      type: string
    CloudWatchMetricsPeriod:
      type: integer
    CloudWatchMetricsDataSummary:
      description: Contains information about the analyzed metrics that displayed anomalous behavior.
      type: object
      properties:
        TimestampMetricValuePairList:
          $ref: "#/components/schemas/TimestampMetricValuePairList"
          description: This is a list of Amazon CloudWatch metric values at given timestamp.
        StatusCode:
          $ref: "#/components/schemas/CloudWatchMetricDataStatusCode"
          description: This is an enum of the status showing whether the metric value pair list has partial or complete data, or if there was an error.
    TimestampMetricValuePairList:
      type: array
      items:
        $ref: "#/components/schemas/TimestampMetricValuePair"
    TimestampMetricValuePair:
      description: A pair that contains metric values at the respective timestamp.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: A Timestamp that specifies the time the event occurred.
        MetricValue:
          $ref: "#/components/schemas/MetricValue"
          description: Value of the anomalous metric data point at respective Timestamp.
    MetricValue:
      type: number
      format: double
    CloudWatchMetricDataStatusCode:
      type: string
      enum:
        - Complete
        - InternalError
        - PartialData
    PerformanceInsightsMetricsDetails:
      type: array
      items:
        $ref: "#/components/schemas/PerformanceInsightsMetricsDetail"
    PerformanceInsightsMetricsDetail:
      description: Details about Performance Insights metrics. Amazon RDS Performance Insights enables you to monitor and explore different dimensions of database load based on data captured from a running DB instance. DB load is measured as average active sessions. Performance Insights provides the data to API consumers as a two-dimensional time-series dataset. The time dimension provides DB load data for each time point in the queried time range. Each time point decomposes overall load in relation to the requested dimensions, measured at that time point. Examples include SQL, Wait event, User, and Host. To learn more about Performance Insights and Amazon Aurora DB instances, go to the Amazon Aurora User Guide. To learn more about Performance Insights and Amazon RDS DB instances, go to the Amazon RDS User Guide.
      type: object
      properties:
        MetricDisplayName:
          $ref: "#/components/schemas/PerformanceInsightsMetricDisplayName"
          description: The name used for a specific Performance Insights metric.
        Unit:
          $ref: "#/components/schemas/PerformanceInsightsMetricUnit"
          description: The unit of measure for a metric. For example, a session or a process.
        MetricQuery:
          $ref: "#/components/schemas/PerformanceInsightsMetricQuery"
          description: A single query to be processed for the metric. For more information, see PerformanceInsightsMetricQuery .
        ReferenceData:
          $ref: "#/components/schemas/PerformanceInsightsReferenceDataList"
          description: For more information, see PerformanceInsightsReferenceData .
        StatsAtAnomaly:
          $ref: "#/components/schemas/PerformanceInsightsStats"
          description: The metric statistics during the anomalous period detected by DevOps Guru;
        StatsAtBaseline:
          $ref: "#/components/schemas/PerformanceInsightsStats"
          description: Typical metric statistics that are not considered anomalous. When DevOps Guru analyzes metrics, it compares them to StatsAtBaseline to help determine if they are anomalous.
    PerformanceInsightsMetricDisplayName:
      type: string
    PerformanceInsightsMetricUnit:
      type: string
    PerformanceInsightsMetricQuery:
      description: A single query to be processed. Use these parameters to query the Performance Insights GetResourceMetrics API to retrieve the metrics for an anomaly. For more information, see GetResourceMetrics in the Amazon RDS Performance Insights API Reference. Amazon RDS Performance Insights enables you to monitor and explore different dimensions of database load based on data captured from a running DB instance. DB load is measured as average active sessions. Performance Insights provides the data to API consumers as a two-dimensional time-series dataset. The time dimension provides DB load data for each time point in the queried time range. Each time point decomposes overall load in relation to the requested dimensions, measured at that time point. Examples include SQL, Wait event, User, and Host. To learn more about Performance Insights and Amazon Aurora DB instances, go to the Amazon Aurora User Guide. To learn more about Performance Insights and Amazon RDS DB instances, go to the Amazon RDS User Guide.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/PerformanceInsightsMetricName"
          description: "The name of the meteric used used when querying an Performance Insights GetResourceMetrics API for anomaly metrics. Valid values for Metric are: db.load.avg - a scaled representation of the number of active sessions for the database engine. db.sampledload.avg - the raw number of active sessions for the database engine. If the number of active sessions is less than an internal Performance Insights threshold, db.load.avg and db.sampledload.avg are the same value. If the number of active sessions is greater than the internal threshold, Performance Insights samples the active sessions, with db.load.avg showing the scaled values, db.sampledload.avg showing the raw values, and db.sampledload.avg less than db.load.avg. For most use cases, you can query db.load.avg only."
        GroupBy:
          $ref: "#/components/schemas/PerformanceInsightsMetricDimensionGroup"
          description: The specification for how to aggregate the data points from a Performance Insights GetResourceMetrics API query. The Performance Insights query returns all of the dimensions within that group, unless you provide the names of specific dimensions within that group. You can also request that Performance Insights return a limited number of values for a dimension.
        Filter:
          type: object
          properties: {}
          description: "One or more filters to apply to a Performance Insights GetResourceMetrics API query. Restrictions: Any number of filters by the same dimension, as specified in the GroupBy parameter. A single filter for any other dimension in this dimension group."
    PerformanceInsightsMetricName:
      type: string
    PerformanceInsightsMetricDimensionGroup:
      description: "A logical grouping of Performance Insights metrics for a related subject area. For example, the db.sql dimension group consists of the following dimensions: db.sql.id, db.sql.db_id, db.sql.statement, and db.sql.tokenized_id. Each response element returns a maximum of 500 bytes. For larger elements, such as SQL statements, only the first 500 bytes are returned. Amazon RDS Performance Insights enables you to monitor and explore different dimensions of database load based on data captured from a running DB instance. DB load is measured as average active sessions. Performance Insights provides the data to API consumers as a two-dimensional time-series dataset. The time dimension provides DB load data for each time point in the queried time range. Each time point decomposes overall load in relation to the requested dimensions, measured at that time point. Examples include SQL, Wait event, User, and Host. To learn more about Performance Insights and Amazon Aurora DB instances, go to the Amazon Aurora User Guide. To learn more about Performance Insights and Amazon RDS DB instances, go to the Amazon RDS User Guide."
      type: object
      properties:
        Group:
          $ref: "#/components/schemas/PerformanceInsightsMetricGroup"
          description: "The name of the dimension group. Its valid values are: db - The name of the database to which the client is connected (only Aurora PostgreSQL, Amazon RDS PostgreSQL, Aurora MySQL, Amazon RDS MySQL, and MariaDB) db.application - The name of the application that is connected to the database (only Aurora PostgreSQL and RDS PostgreSQL) db.host - The host name of the connected client (all engines) db.session_type - The type of the current session (only Aurora PostgreSQL and RDS PostgreSQL) db.sql - The SQL that is currently executing (all engines) db.sql_tokenized - The SQL digest (all engines) db.wait_event - The event for which the database backend is waiting (all engines) db.wait_event_type - The type of event for which the database backend is waiting (all engines) db.user - The user logged in to the database (all engines)"
        Dimensions:
          $ref: "#/components/schemas/PerformanceInsightsMetricDimensions"
          description: "A list of specific dimensions from a dimension group. If this parameter is not present, then it signifies that all of the dimensions in the group were requested or are present in the response. Valid values for elements in the Dimensions array are: db.application.name - The name of the application that is connected to the database (only Aurora PostgreSQL and RDS PostgreSQL) db.host.id - The host ID of the connected client (all engines) db.host.name - The host name of the connected client (all engines) db.name - The name of the database to which the client is connected (only Aurora PostgreSQL, Amazon RDS PostgreSQL, Aurora MySQL, Amazon RDS MySQL, and MariaDB) db.session_type.name - The type of the current session (only Aurora PostgreSQL and RDS PostgreSQL) db.sql.id - The SQL ID generated by Performance Insights (all engines) db.sql.db_id - The SQL ID generated by the database (all engines) db.sql.statement - The SQL text that is being executed (all engines) db.sql.tokenized_id db.sql_tokenized.id - The SQL digest ID generated by Performance Insights (all engines) db.sql_tokenized.db_id - SQL digest ID generated by the database (all engines) db.sql_tokenized.statement - The SQL digest text (all engines) db.user.id - The ID of the user logged in to the database (all engines) db.user.name - The name of the user logged in to the database (all engines) db.wait_event.name - The event for which the backend is waiting (all engines) db.wait_event.type - The type of event for which the backend is waiting (all engines) db.wait_event_type.name - The name of the event type for which the backend is waiting (all engines)"
        Limit:
          $ref: "#/components/schemas/PerformanceInsightsMetricLimitInteger"
          description: The maximum number of items to fetch for this dimension group.
    PerformanceInsightsMetricGroup:
      type: string
    PerformanceInsightsMetricDimensions:
      type: array
      items:
        $ref: "#/components/schemas/PerformanceInsightsMetricDimension"
    PerformanceInsightsMetricDimension:
      type: string
    PerformanceInsightsMetricLimitInteger:
      type: integer
      minimum: 1
      maximum: 10
    PerformanceInsightsReferenceDataList:
      type: array
      items:
        $ref: "#/components/schemas/PerformanceInsightsReferenceData"
    PerformanceInsightsReferenceData:
      description: Reference data used to evaluate Performance Insights to determine if its performance is anomalous or not.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/PerformanceInsightsReferenceName"
          description: The name of the reference data.
        ComparisonValues:
          $ref: "#/components/schemas/PerformanceInsightsReferenceComparisonValues"
          description: The specific reference values used to evaluate the Performance Insights. For more information, see PerformanceInsightsReferenceComparisonValues .
    PerformanceInsightsReferenceName:
      type: string
    PerformanceInsightsReferenceComparisonValues:
      description: Reference scalar values and other metrics that DevOps Guru displays on a graph in its console along with the actual metrics it analyzed. Compare these reference values to your actual metrics to help you understand anomalous behavior that DevOps Guru detected.
      type: object
      properties:
        ReferenceScalar:
          $ref: "#/components/schemas/PerformanceInsightsReferenceScalar"
          description: A scalar value DevOps Guru for a metric that DevOps Guru compares to actual metric values. This reference value is used to determine if an actual metric value should be considered anomalous.
        ReferenceMetric:
          $ref: "#/components/schemas/PerformanceInsightsReferenceMetric"
          description: A metric that DevOps Guru compares to actual metric values. This reference metric is used to determine if an actual metric should be considered anomalous.
    PerformanceInsightsReferenceScalar:
      description: A reference value to compare Performance Insights metrics against to determine if the metrics demonstrate anomalous behavior.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/PerformanceInsightsValueDouble"
          description: The reference value.
    PerformanceInsightsValueDouble:
      type: number
      format: double
    PerformanceInsightsReferenceMetric:
      description: Information about a reference metric used to evaluate Performance Insights.
      type: object
      properties:
        MetricQuery:
          $ref: "#/components/schemas/PerformanceInsightsMetricQuery"
          description: A query to be processed on the metric.
    PerformanceInsightsStats:
      type: array
      items:
        $ref: "#/components/schemas/PerformanceInsightsStat"
    PerformanceInsightsStat:
      description: A statistic in a Performance Insights collection.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/PerformanceInsightsStatType"
          description: The statistic type.
        Value:
          $ref: "#/components/schemas/PerformanceInsightsValueDouble"
          description: The value of the statistic.
    PerformanceInsightsStatType:
      type: string
    ResourceCollection:
      description: A collection of Amazon Web Services resources supported by DevOps Guru. The two types of Amazon Web Services resource collections supported are Amazon Web Services CloudFormation stacks and Amazon Web Services resources that contain the same Amazon Web Services tag. DevOps Guru can be configured to analyze the Amazon Web Services resources that are defined in the stacks or that are tagged using the same tag key. You can specify up to 500 Amazon Web Services CloudFormation stacks.
      type: object
      properties:
        CloudFormation:
          $ref: "#/components/schemas/CloudFormationCollection"
          description: An array of the names of Amazon Web Services CloudFormation stacks. The stacks define Amazon Web Services resources that DevOps Guru analyzes. You can specify up to 500 Amazon Web Services CloudFormation stacks.
        Tags:
          $ref: "#/components/schemas/TagCollections"
          description: The Amazon Web Services tags that are used by resources in the resource collection. Tags help you identify and organize your Amazon Web Services resources. Many Amazon Web Services services support tagging, so you can assign the same tag to resources from different services to indicate that the resources are related. For example, you can assign the same tag to an Amazon DynamoDB table resource that you assign to an Lambda function. For more information about using tags, see the Tagging best practices whitepaper. Each Amazon Web Services tag has two parts. A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case-sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case-sensitive. Together these are known as key-value pairs. The string used for a key in a tag that you use to define your resource coverage must begin with the prefix Devops-guru-. The tag key might be DevOps-Guru-deployment-application or devops-guru-rds-application. When you create a key, the case of characters in the key can be whatever you choose. After you create a key, it is case-sensitive. For example, DevOps Guru works with a key named devops-guru-rds and a key named DevOps-Guru-RDS, and these act as two different keys. Possible key/value pairs in your application might be Devops-Guru-production-application/RDS or Devops-Guru-production-application/containers.
    CloudFormationCollection:
      description: Information about Amazon Web Services CloudFormation stacks. You can use up to 500 stacks to specify which Amazon Web Services resources in your account to analyze. For more information, see Stacks in the Amazon Web Services CloudFormation User Guide.
      type: object
      properties:
        StackNames:
          $ref: "#/components/schemas/StackNames"
          description: An array of CloudFormation stack names.
    StackNames:
      type: array
      items:
        $ref: "#/components/schemas/StackName"
    StackName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z*]+[a-zA-Z0-9-]*$
    TagCollections:
      type: array
      items:
        $ref: "#/components/schemas/TagCollection"
    TagCollection:
      description: A collection of Amazon Web Services tags. Tags help you identify and organize your Amazon Web Services resources. Many Amazon Web Services services support tagging, so you can assign the same tag to resources from different services to indicate that the resources are related. For example, you can assign the same tag to an Amazon DynamoDB table resource that you assign to an Lambda function. For more information about using tags, see the Tagging best practices whitepaper. Each Amazon Web Services tag has two parts. A tag key (for example, CostCenter, Environment, Project, or Secret). Tag keys are case-sensitive. An optional field known as a tag value (for example, 111122223333, Production, or a team name). Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case-sensitive. Together these are known as key-value pairs. The string used for a key in a tag that you use to define your resource coverage must begin with the prefix Devops-guru-. The tag key might be DevOps-Guru-deployment-application or devops-guru-rds-application. When you create a key, the case of characters in the key can be whatever you choose. After you create a key, it is case-sensitive. For example, DevOps Guru works with a key named devops-guru-rds and a key named DevOps-Guru-RDS, and these act as two different keys. Possible key/value pairs in your application might be Devops-Guru-production-application/RDS or Devops-Guru-production-application/containers.
      type: object
      properties:
        AppBoundaryKey:
          $ref: "#/components/schemas/AppBoundaryKey"
          description: An Amazon Web Services tag key that is used to identify the Amazon Web Services resources that DevOps Guru analyzes. All Amazon Web Services resources in your account and Region tagged with this key make up your DevOps Guru application and analysis boundary. The string used for a key in a tag that you use to define your resource coverage must begin with the prefix Devops-guru-. The tag key might be DevOps-Guru-deployment-application or devops-guru-rds-application. When you create a key, the case of characters in the key can be whatever you choose. After you create a key, it is case-sensitive. For example, DevOps Guru works with a key named devops-guru-rds and a key named DevOps-Guru-RDS, and these act as two different keys. Possible key/value pairs in your application might be Devops-Guru-production-application/RDS or Devops-Guru-production-application/containers.
        TagValues:
          $ref: "#/components/schemas/TagValues"
          description: The values in an Amazon Web Services tag collection. The tag's value is an optional field used to associate a string with the tag key (for example, 111122223333, Production, or a team name). The key and value are the tag's key pair. Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case-sensitive. You can specify a maximum of 256 characters for a tag value.
      required:
        - AppBoundaryKey
        - TagValues
    AppBoundaryKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValues:
      type: array
      items:
        $ref: "#/components/schemas/TagValue"
    TagValue:
      type: string
