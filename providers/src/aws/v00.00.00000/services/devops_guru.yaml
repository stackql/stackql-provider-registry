    UpdateTagCollectionFilter:
      description: A new collection of Amazon Web Services resources that are defined by an Amazon Web Services tag or tag key/value pair.
      type: object
      properties:
        AppBoundaryKey:
          $ref: "#/components/schemas/AppBoundaryKey"
          description: An Amazon Web Services tag key that is used to identify the Amazon Web Services resources that DevOps Guru analyzes. All Amazon Web Services resources in your account and Region tagged with this key make up your DevOps Guru application and analysis boundary. The string used for a key in a tag that you use to define your resource coverage must begin with the prefix Devops-guru-. The tag key might be DevOps-Guru-deployment-application or devops-guru-rds-application. When you create a key, the case of characters in the key can be whatever you choose. After you create a key, it is case-sensitive. For example, DevOps Guru works with a key named devops-guru-rds and a key named DevOps-Guru-RDS, and these act as two different keys. Possible key/value pairs in your application might be Devops-Guru-production-application/RDS or Devops-Guru-production-application/containers.
        TagValues:
          $ref: "#/components/schemas/UpdateTagValues"
          description: The values in an Amazon Web Services tag collection. The tag's value is an optional field used to associate a string with the tag key (for example, 111122223333, Production, or a team name). The key and value are the tag's key pair. Omitting the tag value is the same as using an empty string. Like tag keys, tag values are case-sensitive. You can specify a maximum of 256 characters for a tag value.
      required:
        - AppBoundaryKey
        - TagValues
    UpdateTagValues:
      type: array
      items:
        $ref: "#/components/schemas/TagValue"
    UpdateResourceCollectionResponse:
      type: object
    UpdateServiceIntegrationConfig:
      description: Information about updating the integration status of an Amazon Web Services service, such as Amazon Web Services Systems Manager, with DevOps Guru.
      type: object
      properties:
        OpsCenter:
          $ref: "#/components/schemas/OpsCenterIntegrationConfig"
        LogsAnomalyDetection:
          $ref: "#/components/schemas/LogsAnomalyDetectionIntegrationConfig"
          description: Information about whether DevOps Guru is configured to perform log anomaly detection on Amazon CloudWatch log groups.
        KMSServerSideEncryption:
          $ref: "#/components/schemas/KMSServerSideEncryptionIntegrationConfig"
          description: Information about whether DevOps Guru is configured to encrypt server-side data using KMS.
    OpsCenterIntegrationConfig:
      description: Information about whether DevOps Guru is configured to create an OpsItem in Amazon Web Services Systems Manager OpsCenter for each created insight. You can use this to update the configuration.
      type: object
      properties:
        OptInStatus:
          $ref: "#/components/schemas/OptInStatus"
          description: Specifies if DevOps Guru is enabled to create an Amazon Web Services Systems Manager OpsItem for each created insight.
    LogsAnomalyDetectionIntegrationConfig:
      description: Information about the integration of DevOps Guru with CloudWatch log groups for log anomaly detection. You can use this to update the configuration.
      type: object
      properties:
        OptInStatus:
          $ref: "#/components/schemas/OptInStatus"
          description: Specifies if DevOps Guru is configured to perform log anomaly detection on CloudWatch log groups.
    KMSServerSideEncryptionIntegrationConfig:
      description: Information about whether DevOps Guru is configured to encrypt server-side data using KMS.
      type: object
      properties:
        KMSKeyId:
          $ref: "#/components/schemas/KMSKeyId"
          description: 'Describes the specified KMS key. To specify a KMS key, use its key ID, key ARN, alias name, or alias ARN. When using an alias name, prefix it with "alias/". If you specify a predefined Amazon Web Services alias (an Amazon Web Services alias with no key ID), Amazon Web Services KMS associates the alias with an Amazon Web Services managed key and returns its KeyId and Arn in the response. To specify a KMS key in a different Amazon Web Services account, you must use the key ARN or alias ARN. For example: Key ID: 1234abcd-12ab-34cd-56ef-1234567890ab Key ARN: arn:aws:kms:us-east-2:111122223333:key/1234abcd-12ab-34cd-56ef-1234567890ab Alias name: alias/ExampleAlias Alias ARN: arn:aws:kms:us-east-2:111122223333:alias/ExampleAlias'
        OptInStatus:
          $ref: "#/components/schemas/OptInStatus"
          description: Specifies if DevOps Guru is enabled for KMS integration.
        Type:
          $ref: "#/components/schemas/ServerSideEncryptionType"
          description: The type of KMS key used. Customer managed keys are the KMS keys that you create. Amazon Web Services owned keys are keys that are owned and managed by DevOps Guru.
    UpdateServiceIntegrationResponse:
      type: object
