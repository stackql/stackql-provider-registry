          description: List of stream details.
    StreamSession:
      description: Object that captures the Amazon IVS configuration that the customer provisioned, the ingest configurations that the broadcaster used, and the most recent Amazon IVS stream events it encountered.
      type: object
      properties:
        streamId:
          $ref: "#/components/schemas/StreamId"
          description: Unique identifier for a live or previously live stream in the specified channel.
        startTime:
          $ref: "#/components/schemas/Time"
          description: Time when the channel went live. This is an ISO 8601 timestamp; note that this is returned as a string.
        endTime:
          $ref: "#/components/schemas/Time"
          description: Time when the channel went offline. This is an ISO 8601 timestamp; note that this is returned as a string. For live streams, this is NULL.
        channel:
          $ref: "#/components/schemas/Channel"
          description: The properties of the channel at the time of going live.
        ingestConfiguration:
          $ref: "#/components/schemas/IngestConfiguration"
          description: "The properties of the incoming RTMP stream. Note: ingestConfiguration is deprecated in favor of ingestConfigurations but retained to ensure backward compatibility. If multitrack is not enabled, ingestConfiguration and ingestConfigurations contain the same data, namely information about Track0 (the sole track). If multitrack is enabled, ingestConfiguration contains data for only the first track (Track0) and ingestConfigurations contains data for all tracks."
        ingestConfigurations:
          $ref: "#/components/schemas/IngestConfigurations"
          description: The properties of the incoming RTMP stream. If multitrack is enabled, ingestConfigurations contains data for all tracks; otherwise, it contains data only for Track0 (the sole track).
        recordingConfiguration:
          $ref: "#/components/schemas/RecordingConfiguration"
          description: The properties of recording the live stream.
        truncatedEvents:
          $ref: "#/components/schemas/StreamEvents"
          description: List of Amazon IVS events that the stream encountered. The list is sorted by most recent events and contains up to 500 events. For Amazon IVS events, see Using Amazon EventBridge with Amazon IVS.
    Time:
      type: string
      format: date-time
    IngestConfiguration:
      description: "Object specifying the ingest configuration set up by the broadcaster, usually in an encoder. Note: IngestConfiguration is deprecated in favor of IngestConfigurations but retained to ensure backward compatibility. If multitrack is not enabled, IngestConfiguration and IngestConfigurations contain the same data, namely information about Track0 (the sole track). If multitrack is enabled, IngestConfiguration contains data for only the first track (Track0) and IngestConfigurations contains data for all tracks."
      type: object
      properties:
        video:
          $ref: "#/components/schemas/VideoConfiguration"
          description: Encoder settings for video.
        audio:
          $ref: "#/components/schemas/AudioConfiguration"
          description: Encoder settings for audio.
    VideoConfiguration:
      description: Object specifying a stream’s video configuration, as set up by the broadcaster (usually in an encoder). This is part of the IngestConfigurations object and the deprecated IngestConfiguration object. It is used for monitoring stream health.
      type: object
      properties:
        avcProfile:
          $ref: "#/components/schemas/String"
          description: (Deprecated) Indicates to the decoder the requirements for decoding the stream. For definitions of the valid values, see the H.264 specification. This is populated only when VideoConfiguration is part of the deprecated IngestConfiguration; otherwise, this is an empty string.
        avcLevel:
          $ref: "#/components/schemas/String"
          description: (Deprecated) Indicates the degree of required decoder performance for a profile. Normally this is set automatically by the encoder. For details, see the H.264 specification. This is populated only when VideoConfiguration is part of the deprecated IngestConfiguration; otherwise, this is an empty string.
        codec:
          $ref: "#/components/schemas/String"
          description: Codec used for the video encoding.
        encoder:
          $ref: "#/components/schemas/String"
          description: Software or hardware used to encode the video.
        targetBitrate:
          $ref: "#/components/schemas/Integer"
          description: The expected ingest bitrate (bits per second). This is configured in the encoder.
        targetFramerate:
          $ref: "#/components/schemas/Integer"
          description: The expected ingest framerate. This is configured in the encoder.
        videoHeight:
          $ref: "#/components/schemas/Integer"
          description: Video-resolution height in pixels.
        videoWidth:
          $ref: "#/components/schemas/Integer"
          description: Video-resolution width in pixels.
        level:
          $ref: "#/components/schemas/String"
          description: Indicates the degree of required decoder performance for a profile. Normally this is set automatically by the encoder. When an AVC codec is used, this field has the same value as avcLevel.
        track:
          $ref: "#/components/schemas/String"
          description: Name of the video track. If multitrack is not enabled, this is Track0 (the sole track).
        profile:
          $ref: "#/components/schemas/String"
          description: Indicates to the decoder the requirements for decoding the stream. When an AVC codec is used, this field has the same value as avcProfile.
    Integer:
      type: integer
      format: int64
    AudioConfiguration:
      description: Object specifying a stream’s audio configuration, as set up by the broadcaster (usually in an encoder). This is part of the IngestConfigurations object and the deprecated IngestConfiguration object. It is used for monitoring stream health.
      type: object
      properties:
        codec:
