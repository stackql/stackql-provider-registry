      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ChannelArnList:
      type: array
      items:
        $ref: "#/components/schemas/ChannelArn"
    ChannelArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:channel/[a-zA-Z0-9-]+
    BatchGetChannelResponse:
      type: object
      properties:
        accessControlAllowOrigin:
          $ref: "#/components/schemas/String"
          description: See Access-Control-Allow-Origin in the MDN Web Docs.
        accessControlExposeHeaders:
          $ref: "#/components/schemas/String"
          description: See Access-Control-Expose-Headers in the MDN Web Docs.
        cacheControl:
          $ref: "#/components/schemas/String"
          description: See Cache-Control in the MDN Web Docs.
        contentSecurityPolicy:
          $ref: "#/components/schemas/String"
          description: See Content-Security-Policy in the MDN Web Docs.
        strictTransportSecurity:
          $ref: "#/components/schemas/String"
          description: See Strict-Transport-Security in the MDN Web Docs.
        xContentTypeOptions:
          $ref: "#/components/schemas/String"
