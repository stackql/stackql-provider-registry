          description: Time of the stream’s start. This is an ISO 8601 timestamp; note that this is returned as a string.
        state:
          $ref: "#/components/schemas/StreamState"
          description: The stream’s state. Do not rely on the OFFLINE state, as the API may not return it; instead, a "NotBroadcasting" error will indicate that the stream is not live.
        health:
          $ref: "#/components/schemas/StreamHealth"
          description: The stream’s health.
        viewerCount:
          $ref: "#/components/schemas/StreamViewerCount"
          description: A count of concurrent views of the stream. Typically, a new view appears in viewerCount within 15 seconds of when video playback starts and a view is removed from viewerCount within 1 minute of when video playback ends. A value of -1 indicates that the request timed out; in this case, retry.
    StreamId:
      type: string
      minLength: 26
      maxLength: 26
      pattern: st-[a-zA-Z0-9]+
    StreamStartTime:
      type: string
      format: date-time
    StreamState:
      type: string
      enum:
        - LIVE
        - OFFLINE
    StreamHealth:
      type: string
      enum:
        - HEALTHY
        - STARVING
        - UNKNOWN
