    CreatePlaybackRestrictionPolicyResponse:
      type: object
      properties:
        playbackRestrictionPolicy:
          $ref: "#/components/schemas/PlaybackRestrictionPolicy"
    PlaybackRestrictionPolicy:
      description: An object representing a policy to constrain playback by country and/or origin sites.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/PlaybackRestrictionPolicyArn"
          description: Playback-restriction-policy ARN
        allowedCountries:
          $ref: "#/components/schemas/PlaybackRestrictionPolicyAllowedCountryList"
          description: "A list of country codes that control geoblocking restriction. Allowed values are the officially assigned ISO 3166-1 alpha-2 codes. Default: All countries (an empty array)."
        allowedOrigins:
          $ref: "#/components/schemas/PlaybackRestrictionPolicyAllowedOriginList"
          description: "A list of origin sites that control CORS restriction. Allowed values are the same as valid values of the Origin header defined at https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Origin. Default: All origins (an empty array)."
        enableStrictOriginEnforcement:
          $ref: "#/components/schemas/PlaybackRestrictionPolicyEnableStrictOriginEnforcement"
          description: "Whether channel playback is constrained by origin site. Default: false."
        name:
          $ref: "#/components/schemas/PlaybackRestrictionPolicyName"
          description: Playback-restriction-policy name. The value does not need to be unique.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of 1-50 maps, each of the form string:string (key:value). See Best practices and strategies in Tagging Amazon Web Services Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no service-specific constraints beyond what is documented there.
      required:
        - arn
        - allowedCountries
        - allowedOrigins
    PlaybackRestrictionPolicyArn:
      type: string
      minLength: 1
