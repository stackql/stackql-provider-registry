openapi: 3.0.0
info:
  version: "2020-07-14"
  title: Amazon Interactive Video Service
  description: Amazon Interactive Video Service
  x-serviceName: ivs
  x-serviceAlias: ivs
  x-protocol: rest-json
  x-apiVersion: "2020-07-14"
  x-endpointPrefix: ivs
servers:
  - url: https://ivs.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ivs
paths:
  /BatchGetChannel:
    post:
      operationId: BatchGetChannel
      description: Performs GetChannel on multiple ARNs simultaneously.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arns:
                  $ref: "#/components/schemas/ChannelArnList"
              required:
                - arns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetChannelResponse"
  /BatchGetStreamKey:
    post:
      operationId: BatchGetStreamKey
      description: Performs GetStreamKey on multiple ARNs simultaneously.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arns:
                  $ref: "#/components/schemas/StreamKeyArnList"
              required:
                - arns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetStreamKeyResponse"
  /BatchStartViewerSessionRevocation:
    post:
      operationId: BatchStartViewerSessionRevocation
      description: Performs StartViewerSessionRevocation on multiple channel ARN and viewer ID pairs simultaneously.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                viewerSessions:
                  $ref: "#/components/schemas/BatchStartViewerSessionRevocationViewerSessionList"
              required:
                - viewerSessions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStartViewerSessionRevocationResponse"
  /CreateAdConfiguration:
    post:
      operationId: CreateAdConfiguration
      description: Creates a new ad configuration to be used for server-side ad insertion.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AdConfigurationName"
                mediaTailorPlaybackConfigurations:
                  $ref: "#/components/schemas/MediaTailorPlaybackConfigurationsList"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - mediaTailorPlaybackConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdConfigurationResponse"
  /CreateChannel:
    post:
      operationId: CreateChannel
      description: Creates a new channel and an associated stream key to start streaming.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ChannelName"
                latencyMode:
                  $ref: "#/components/schemas/ChannelLatencyMode"
                type:
                  $ref: "#/components/schemas/ChannelType"
                authorized:
                  $ref: "#/components/schemas/Boolean"
                recordingConfigurationArn:
                  $ref: "#/components/schemas/ChannelRecordingConfigurationArn"
                tags:
                  $ref: "#/components/schemas/Tags"
                insecureIngest:
                  $ref: "#/components/schemas/Boolean"
                preset:
                  $ref: "#/components/schemas/TranscodePreset"
                playbackRestrictionPolicyArn:
                  $ref: "#/components/schemas/ChannelPlaybackRestrictionPolicyArn"
                multitrackInputConfiguration:
                  $ref: "#/components/schemas/MultitrackInputConfiguration"
                containerFormat:
                  $ref: "#/components/schemas/ContainerFormat"
                adConfigurationArn:
                  $ref: "#/components/schemas/ChannelAdConfigurationArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
  /CreatePlaybackRestrictionPolicy:
    post:
      operationId: CreatePlaybackRestrictionPolicy
      description: Creates a new playback restriction policy, for constraining playback by countries and/or origins.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                allowedCountries:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyAllowedCountryList"
                allowedOrigins:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyAllowedOriginList"
                enableStrictOriginEnforcement:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyEnableStrictOriginEnforcement"
                name:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyName"
                tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePlaybackRestrictionPolicyResponse"
  /CreateRecordingConfiguration:
    post:
      operationId: CreateRecordingConfiguration
      description: "Creates a new recording configuration, used to enable recording to Amazon S3. Known issue: In the us-east-1 region, if you use the Amazon Web Services CLI to create a recording configuration, it returns success even if the S3 bucket is in a different region. In this case, the state of the recording configuration is CREATE_FAILED (instead of ACTIVE). (In other regions, the CLI correctly returns failure if the bucket is in a different region.) Workaround: Ensure that your S3 bucket is in the same region as the recording configuration. If you create a recording configuration in a different region as your S3 bucket, delete that recording configuration and create a new one with an S3 bucket from the correct region."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/RecordingConfigurationName"
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
                thumbnailConfiguration:
                  $ref: "#/components/schemas/ThumbnailConfiguration"
                recordingReconnectWindowSeconds:
                  $ref: "#/components/schemas/RecordingReconnectWindowSeconds"
                renditionConfiguration:
                  $ref: "#/components/schemas/RenditionConfiguration"
              required:
                - destinationConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecordingConfigurationResponse"
  /CreateStreamKey:
    post:
      operationId: CreateStreamKey
      description: Creates a stream key, used to initiate a stream, for the specified channel ARN. Note that CreateChannel creates a stream key. If you subsequently use CreateStreamKey on the same channel, it will fail because a stream key already exists and there is a limit of 1 stream key per channel. To reset the stream key on a channel, use DeleteStreamKey and then CreateStreamKey.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - channelArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStreamKeyResponse"
  /DeleteAdConfiguration:
    post:
      operationId: DeleteAdConfiguration
      description: Deletes the specified ad configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AdConfigurationArn"
              required:
                - arn
      responses:
        "204":
          description: Success
  /DeleteChannel:
    post:
      operationId: DeleteChannel
      description: Deletes the specified channel and its associated stream keys. If you try to delete a live channel, you will get an error (409 ConflictException). To delete a channel that is live, call StopStream, wait for the Amazon EventBridge "Stream End" event (to verify that the stream's state is no longer Live), then call DeleteChannel. (See Using EventBridge with Amazon IVS.)
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ChannelArn"
              required:
                - arn
      responses:
        "204":
          description: Success
  /DeletePlaybackKeyPair:
    post:
      operationId: DeletePlaybackKeyPair
      description: Deletes a specified authorization key pair. This invalidates future viewer tokens generated using the key pair’s privateKey. For more information, see Setting Up Private Channels in the Amazon IVS User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlaybackKeyPairArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePlaybackKeyPairResponse"
  /DeletePlaybackRestrictionPolicy:
    post:
      operationId: DeletePlaybackRestrictionPolicy
      description: Deletes the specified playback restriction policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyArn"
              required:
                - arn
      responses:
        "204":
          description: Success
  /DeleteRecordingConfiguration:
    post:
      operationId: DeleteRecordingConfiguration
      description: Deletes the recording configuration for the specified ARN. If you try to delete a recording configuration that is associated with a channel, you will get an error (409 ConflictException). To avoid this, for all channels that reference the recording configuration, first use UpdateChannel to set the recordingConfigurationArn field to an empty string, then use DeleteRecordingConfiguration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/RecordingConfigurationArn"
              required:
                - arn
      responses:
        "204":
          description: Success
  /DeleteStreamKey:
    post:
      operationId: DeleteStreamKey
      description: Deletes the stream key for the specified ARN, so it can no longer be used to stream.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StreamKeyArn"
              required:
                - arn
      responses:
        "204":
          description: Success
  /GetAdConfiguration:
    post:
      operationId: GetAdConfiguration
      description: Gets the ad configuration represented by the specified ARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/AdConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdConfigurationResponse"
  /GetChannel:
    post:
      operationId: GetChannel
      description: Gets the channel configuration for the specified channel ARN. See also BatchGetChannel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ChannelArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelResponse"
  /GetPlaybackKeyPair:
    post:
      operationId: GetPlaybackKeyPair
      description: Gets a specified playback authorization key pair and returns the arn and fingerprint. The privateKey held by the caller can be used to generate viewer authorization tokens, to grant viewers access to private channels. For more information, see Setting Up Private Channels in the Amazon IVS User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlaybackKeyPairArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlaybackKeyPairResponse"
  /GetPlaybackRestrictionPolicy:
    post:
      operationId: GetPlaybackRestrictionPolicy
      description: Gets the specified playback restriction policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlaybackRestrictionPolicyResponse"
  /GetRecordingConfiguration:
    post:
      operationId: GetRecordingConfiguration
      description: Gets the recording configuration for the specified ARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/RecordingConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecordingConfigurationResponse"
  /GetStream:
    post:
      operationId: GetStream
      description: Gets information about the active (live) stream on a specified channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
              required:
                - channelArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamResponse"
  /GetStreamKey:
    post:
      operationId: GetStreamKey
      description: Gets stream-key information for a specified ARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StreamKeyArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamKeyResponse"
  /GetStreamSession:
    post:
      operationId: GetStreamSession
      description: Gets metadata on a specified stream.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                streamId:
                  $ref: "#/components/schemas/StreamId"
              required:
                - channelArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamSessionResponse"
  /ImportPlaybackKeyPair:
    post:
      operationId: ImportPlaybackKeyPair
      description: Imports the public portion of a new key pair and returns its arn and fingerprint. The privateKey can then be used to generate viewer authorization tokens, to grant viewers access to private channels. For more information, see Setting Up Private Channels in the Amazon IVS User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publicKeyMaterial:
                  $ref: "#/components/schemas/PlaybackPublicKeyMaterial"
                name:
                  $ref: "#/components/schemas/PlaybackKeyPairName"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - publicKeyMaterial
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPlaybackKeyPairResponse"
  /InsertAdBreak:
    post:
      operationId: InsertAdBreak
      description: "Inserts an ad marker in the playlist for the specified channel and duration using the ad configuration associated with the channel. Note: AWS Elemental MediaTailor (EMT), the service that handles ad requests, provides CloudWatch metrics to help you monitor the success or failure of each InsertAdBreak operation. See Monitoring AWS Elemental MediaTailor with Amazon CloudWatch metrics in the AWS Elemental MediaTailor User Guide for details on available metrics."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                durationSeconds:
                  $ref: "#/components/schemas/AdDurationSeconds"
              required:
                - channelArn
                - durationSeconds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsertAdBreakResponse"
  /ListAdConfigurations:
    post:
      operationId: ListAdConfigurations
      description: Gets summary information about all ad configurations in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxAdConfigurationResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdConfigurationsResponse"
  /ListChannels:
    post:
      operationId: ListChannels
      description: Gets summary information about all channels in your account, in the Amazon Web Services region where the API request is processed. This list can be filtered to match a specified name or recording-configuration ARN. Filters are mutually exclusive and cannot be used together. If you try to use both filters, you will get an error (409 ConflictException).
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filterByName:
                  $ref: "#/components/schemas/ChannelName"
                filterByRecordingConfigurationArn:
                  $ref: "#/components/schemas/ChannelRecordingConfigurationArn"
                filterByPlaybackRestrictionPolicyArn:
                  $ref: "#/components/schemas/ChannelPlaybackRestrictionPolicyArn"
                filterByAdConfigurationArn:
                  $ref: "#/components/schemas/ChannelAdConfigurationArn"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxChannelResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsResponse"
  /ListPlaybackKeyPairs:
    post:
      operationId: ListPlaybackKeyPairs
      description: Gets summary information about playback key pairs. For more information, see Setting Up Private Channels in the Amazon IVS User Guide.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxPlaybackKeyPairResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlaybackKeyPairsResponse"
  /ListPlaybackRestrictionPolicies:
    post:
      operationId: ListPlaybackRestrictionPolicies
      description: Gets summary information about playback restriction policies.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxPlaybackRestrictionPolicyResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlaybackRestrictionPoliciesResponse"
  /ListRecordingConfigurations:
    post:
      operationId: ListRecordingConfigurations
      description: Gets summary information about all recording configurations in your account, in the Amazon Web Services region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxRecordingConfigurationResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecordingConfigurationsResponse"
  /ListStreamKeys:
    post:
      operationId: ListStreamKeys
      description: Gets summary information about stream keys for the specified channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxStreamKeyResults"
              required:
                - channelArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamKeysResponse"
  /ListStreamSessions:
    post:
      operationId: ListStreamSessions
      description: Gets a summary of current and previous streams for a specified channel in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxStreamResults"
              required:
                - channelArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamSessionsResponse"
  /ListStreams:
    post:
      operationId: ListStreams
      description: Gets summary information about live streams in your account, in the Amazon Web Services region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filterBy:
                  $ref: "#/components/schemas/StreamFilters"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxStreamResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Gets information about Amazon Web Services tags for the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be retrieved. The ARN must be URL-encoded.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds or updates tags for the Amazon Web Services resource with the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: ARN of the resource for which tags are to be added or updated. The ARN must be URL-encoded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from the resource with the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: ARN of the resource for which tags are to be removed. The ARN must be URL-encoded.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Array of tag keys (strings) for the tags to be removed. See Best practices and strategies in Tagging Amazon Web Services Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no service-specific constraints beyond what is documented there.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /PutMetadata:
    post:
      operationId: PutMetadata
      description: Inserts metadata into the active stream of the specified channel. At most 5 requests per second per channel are allowed, each with a maximum 1 KB payload. (If 5 TPS is not sufficient for your needs, we recommend batching your data into a single PutMetadata call.) At most 155 requests per second per account are allowed. Also see Embedding Metadata within a Video Stream in the Amazon IVS User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                metadata:
                  $ref: "#/components/schemas/StreamMetadata"
              required:
                - channelArn
                - metadata
      responses:
        "204":
          description: Success
  /StartViewerSessionRevocation:
    post:
      operationId: StartViewerSessionRevocation
      description: Starts the process of revoking the viewer session associated with a specified channel ARN and viewer ID. Optionally, you can provide a version to revoke viewer sessions less than and including that version. For instructions on associating a viewer ID with a viewer session, see Setting Up Private Channels.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
                viewerId:
                  $ref: "#/components/schemas/ViewerId"
                viewerSessionVersionsLessThanOrEqualTo:
                  $ref: "#/components/schemas/ViewerSessionVersion"
              required:
                - channelArn
                - viewerId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartViewerSessionRevocationResponse"
  /StopStream:
    post:
      operationId: StopStream
      description: Disconnects the incoming RTMPS stream for the specified channel. Can be used in conjunction with DeleteStreamKey to prevent further streaming to a channel. Many streaming client-software libraries automatically reconnect a dropped RTMPS session, so to stop the stream permanently, you may want to first revoke the streamKey attached to the channel.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelArn:
                  $ref: "#/components/schemas/ChannelArn"
              required:
                - channelArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopStreamResponse"
  /UpdateChannel:
    post:
      operationId: UpdateChannel
      description: Updates a channel's configuration. Live channels cannot be updated. You must stop the ongoing stream, update the channel, and restart the stream for the changes to take effect.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/ChannelArn"
                name:
                  $ref: "#/components/schemas/ChannelName"
                latencyMode:
                  $ref: "#/components/schemas/ChannelLatencyMode"
                type:
                  $ref: "#/components/schemas/ChannelType"
                authorized:
                  $ref: "#/components/schemas/Boolean"
                recordingConfigurationArn:
                  $ref: "#/components/schemas/ChannelRecordingConfigurationArn"
                insecureIngest:
                  $ref: "#/components/schemas/Boolean"
                preset:
                  $ref: "#/components/schemas/TranscodePreset"
                playbackRestrictionPolicyArn:
                  $ref: "#/components/schemas/ChannelPlaybackRestrictionPolicyArn"
                multitrackInputConfiguration:
                  $ref: "#/components/schemas/MultitrackInputConfiguration"
                containerFormat:
                  $ref: "#/components/schemas/ContainerFormat"
                adConfigurationArn:
                  $ref: "#/components/schemas/ChannelAdConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateChannelResponse"
  /UpdatePlaybackRestrictionPolicy:
    post:
      operationId: UpdatePlaybackRestrictionPolicy
      description: Updates a specified playback restriction policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyArn"
                allowedCountries:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyAllowedCountryList"
                allowedOrigins:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyAllowedOriginList"
                enableStrictOriginEnforcement:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyEnableStrictOriginEnforcement"
                name:
                  $ref: "#/components/schemas/PlaybackRestrictionPolicyName"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePlaybackRestrictionPolicyResponse"
components:
  parameters:
