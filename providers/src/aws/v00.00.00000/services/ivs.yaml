          description: Auto-generated passphrase to enable encryption. This field is applicable only if the end user has not enabled the insecureIngest option for the channel.
    SrtEndpoint:
      type: string
    SrtPassphrase:
      type: string
    ChannelPlaybackRestrictionPolicyArn:
      type: string
