        xFrameOptions:
          $ref: "#/components/schemas/String"
          description: See X-Frame-Options in the MDN Web Docs.
        channels:
          $ref: "#/components/schemas/Channels"
        errors:
          $ref: "#/components/schemas/BatchErrors"
          description: Each error object is related to a specific ARN in the request.
    String:
      type: string
    Channels:
      type: array
      items:
        $ref: "#/components/schemas/Channel"
    Channel:
      description: Object specifying a channel.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ChannelArn"
          description: Channel ARN.
        name:
          $ref: "#/components/schemas/ChannelName"
          description: Channel name.
        latencyMode:
          $ref: "#/components/schemas/ChannelLatencyMode"
          description: "Channel latency mode. Use NORMAL to broadcast and deliver live video up to Full HD. Use LOW for near-real-time interaction with viewers. Default: LOW."
        type_:
          $ref: "#/components/schemas/ChannelType"
          description: "Channel type, which determines the allowable resolution and bitrate. If you exceed the allowable input resolution or bitrate, the stream probably will disconnect immediately. Default: STANDARD. For details, see Channel Types."
        recordingConfigurationArn:
          $ref: "#/components/schemas/ChannelRecordingConfigurationArn"
          description: 'Recording-configuration ARN. A valid ARN value here both specifies the ARN and enables recording. Default: "" (empty string, recording is disabled).'
        ingestEndpoint:
          $ref: "#/components/schemas/IngestEndpoint"
          description: Channel ingest endpoint, part of the definition of an ingest server, used when you set up streaming software.
        playbackUrl:
          $ref: "#/components/schemas/PlaybackURL"
          description: Channel playback URL.
        authorized:
          $ref: "#/components/schemas/IsAuthorized"
          description: "Whether the channel is private (enabled for playback authorization). Default: false."
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of 1-50 maps, each of the form string:string (key:value). See Best practices and strategies in Tagging Amazon Web Services Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no service-specific constraints beyond what is documented there.
        insecureIngest:
          $ref: "#/components/schemas/InsecureIngest"
          description: "Whether the channel allows insecure RTMP ingest. Default: false."
        preset:
          $ref: "#/components/schemas/TranscodePreset"
          description: Optional transcode preset for the channel. This is selectable only for ADVANCED_HD and ADVANCED_SD channel types. For those channel types, the default preset is HIGHER_BANDWIDTH_DELIVERY. For other channel types (BASIC and STANDARD), preset is the empty string ("").
        srt:
          $ref: "#/components/schemas/Srt"
          description: Specifies the endpoint and optional passphrase for streaming with the SRT protocol.
        playbackRestrictionPolicyArn:
          $ref: "#/components/schemas/ChannelPlaybackRestrictionPolicyArn"
          description: 'Playback-restriction-policy ARN. A valid ARN value here both specifies the ARN and enables playback restriction. Default: "" (empty string, no playback restriction policy is applied).'
        multitrackInputConfiguration:
          $ref: "#/components/schemas/MultitrackInputConfiguration"
          description: "Object specifying multitrack input configuration. Default: no multitrack input configuration is specified."
        containerFormat:
          $ref: "#/components/schemas/ContainerFormat"
          description: "Indicates which content-packaging format is used (MPEG-TS or fMP4). If multitrackInputConfiguration is specified and enabled is true, then containerFormat is required and must be set to FRAGMENTED_MP4. Otherwise, containerFormat may be set to TS or FRAGMENTED_MP4. Default: TS."
        adConfigurationArn:
          $ref: "#/components/schemas/ChannelAdConfigurationArn"
          description: ARN of the ad configuration associated with the channel.
    ChannelName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    ChannelLatencyMode:
      type: string
      enum:
