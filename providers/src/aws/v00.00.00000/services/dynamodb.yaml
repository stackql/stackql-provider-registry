  /PutItem:
    post:
      operationId: PutItem
      description: Creates a new item, or replaces an old item with a new item. If an item that has the same primary key as the new item already exists in the specified table, the new item completely replaces the existing item. You can perform a conditional put operation (add a new item if one with the specified primary key doesn't exist), or replace an existing item if it has certain attribute values. You can return the item's attribute values in the same operation, using the ReturnValues parameter. When you add an item, the primary key attributes are the only required attributes. Empty String and Binary attribute values are allowed. Attribute values of type String and Binary must have a length greater than zero if the attribute is used as a key attribute for a table or index. Set type attributes cannot be empty. Invalid Requests with empty values will be rejected with a ValidationException exception. To prevent a new item from replacing an existing item, use a conditional expression that contains the attribute_not_exists function with the name of the attribute being used as the partition key for the table. Since every record must contain that attribute, the attribute_not_exists function will only succeed if no matching item exists. To determine whether PutItem overwrote an existing item, use ReturnValues set to ALL_OLD. If the response includes the Attributes element, an existing item was overwritten. For more information about PutItem, see Working with Items in the Amazon DynamoDB Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.PutItem
            default: DynamoDB_20120810.PutItem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table to contain the item. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                Item:
                  $ref: "#/components/schemas/PutItemInputAttributeMap"
                  description: A map of attribute name/value pairs, one for each attribute. Only the primary key attributes are required; you can optionally provide other attribute name-value pairs for the item. You must provide all of the attributes for the primary key. For example, with a simple primary key, you only need to provide a value for the partition key. For a composite primary key, you must provide both values for both the partition key and the sort key. If you specify any attributes that are part of an index key, then the data types for those attributes must match those of the schema in the table's attribute definition. Empty String and Binary attribute values are allowed. Attribute values of type String and Binary must have a length greater than zero if the attribute is used as a key attribute for a table or index. For more information about primary keys, see Primary Key in the Amazon DynamoDB Developer Guide. Each element in the Item map is an AttributeValue object.
                Expected:
                  $ref: "#/components/schemas/ExpectedAttributeMap"
                  description: This is a legacy parameter. Use ConditionExpression instead. For more information, see Expected in the Amazon DynamoDB Developer Guide.
                ReturnValues:
                  $ref: "#/components/schemas/ReturnValue"
                  description: "Use ReturnValues if you want to get the item attributes as they appeared before they were updated with the PutItem request. For PutItem, the valid values are: NONE - If ReturnValues is not specified, or if its value is NONE, then nothing is returned. (This setting is the default for ReturnValues.) ALL_OLD - If PutItem overwrote an attribute name-value pair, then the content of the old item is returned. The values returned are strongly consistent. There is no additional cost associated with requesting a return value aside from the small network and processing overhead of receiving a larger response. No read capacity units are consumed. The ReturnValues parameter is used by several DynamoDB operations; however, PutItem does not recognize any values other than NONE or ALL_OLD."
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                ReturnItemCollectionMetrics:
                  $ref: "#/components/schemas/ReturnItemCollectionMetrics"
                  description: Determines whether item collection metrics are returned. If set to SIZE, the response includes statistics about item collections, if any, that were modified during the operation are returned in the response. If set to NONE (the default), no statistics are returned.
                ConditionalOperator:
                  $ref: "#/components/schemas/ConditionalOperator"
                  description: This is a legacy parameter. Use ConditionExpression instead. For more information, see ConditionalOperator in the Amazon DynamoDB Developer Guide.
                ConditionExpression:
                  $ref: "#/components/schemas/ConditionExpression"
                  description: "A condition that must be satisfied in order for a conditional PutItem operation to succeed. An expression can contain any of the following: Functions: attribute_exists | attribute_not_exists | attribute_type | contains | begins_with | size These function names are case-sensitive. Comparison operators: = | <> | < | > | <= | >= | BETWEEN | IN Logical operators: AND | OR | NOT For more information on condition expressions, see Condition Expressions in the Amazon DynamoDB Developer Guide."
                ExpressionAttributeNames:
                  $ref: "#/components/schemas/ExpressionAttributeNameMap"
                  description: 'One or more substitution tokens for attribute names in an expression. The following are some use cases for using ExpressionAttributeNames: To access an attribute whose name conflicts with a DynamoDB reserved word. To create a placeholder for repeating occurrences of an attribute name in an expression. To prevent special characters in an attribute name from being misinterpreted in an expression. Use the # character in an expression to dereference an attribute name. For example, consider the following attribute name: Percentile The name of this attribute conflicts with a reserved word, so it cannot be used directly in an expression. (For the complete list of reserved words, see Reserved Words in the Amazon DynamoDB Developer Guide). To work around this, you could specify the following for ExpressionAttributeNames: {"#P":"Percentile"} You could then use this substitution in an expression, as in this example: #P = :val Tokens that begin with the : character are expression attribute values, which are placeholders for the actual value at runtime. For more information on expression attribute names, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.'
                ExpressionAttributeValues:
                  $ref: "#/components/schemas/ExpressionAttributeValueMap"
                  description: 'One or more values that can be substituted in an expression. Use the : (colon) character in an expression to dereference an attribute value. For example, suppose that you wanted to check whether the value of the ProductStatus attribute was one of the following: Available | Backordered | Discontinued You would first need to specify ExpressionAttributeValues as follows: { ":avail":{"S":"Available"}, ":back":{"S":"Backordered"}, ":disc":{"S":"Discontinued"} } You could then use these values in an expression, such as this: ProductStatus IN (:avail, :back, :disc) For more information on expression attribute values, see Condition Expressions in the Amazon DynamoDB Developer Guide.'
                ReturnValuesOnConditionCheckFailure:
                  $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
                  description: An optional parameter that returns the item attributes for a PutItem operation that failed a condition check. There is no additional cost associated with requesting a return value aside from the small network and processing overhead of receiving a larger response. No read capacity units are consumed.
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutItemOutput"
  /PutResourcePolicy:
    post:
      operationId: PutResourcePolicy
      description: Attaches a resource-based policy document to the resource, which can be a table or stream. When you attach a resource-based policy using this API, the policy application is eventually consistent . PutResourcePolicy is an idempotent operation; running it multiple times on the same resource using the same policy document will return the same revision ID. If you specify an ExpectedRevisionId that doesn't match the current policy's RevisionId, the PolicyNotFoundException will be returned. PutResourcePolicy is an asynchronous operation. If you issue a GetResourcePolicy request immediately after a PutResourcePolicy request, DynamoDB might return your previous policy, if there was one, or return the PolicyNotFoundException. This is because GetResourcePolicy uses an eventually consistent query, and the metadata for your policy or table might not be available at that moment. Wait for a few seconds, and then try the GetResourcePolicy request again.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.PutResourcePolicy
            default: DynamoDB_20120810.PutResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
                  description: The Amazon Resource Name (ARN) of the DynamoDB resource to which the policy will be attached. The resources you can specify include tables and streams. You can control index permissions using the base table's policy. To specify the same permission level for your table and its indexes, you can provide both the table and index Amazon Resource Name (ARN)s in the Resource field of a given Statement in your policy document. Alternatively, to specify different permissions for your table, indexes, or both, you can define multiple Statement fields in your policy document.
                Policy:
                  $ref: "#/components/schemas/ResourcePolicy"
                  description: An Amazon Web Services resource-based policy document in JSON format. The maximum size supported for a resource-based policy document is 20 KB. DynamoDB counts whitespaces when calculating the size of a policy against this limit. Within a resource-based policy, if the action for a DynamoDB service-linked role (SLR) to replicate data for a global table is denied, adding or deleting a replica will fail with an error. For a full list of all considerations that apply while attaching a resource-based policy, see Resource-based policy considerations.
                ExpectedRevisionId:
                  $ref: "#/components/schemas/PolicyRevisionId"
                  description: A string value that you can use to conditionally update your policy. You can provide the revision ID of your existing policy to make mutating requests against that policy. When you provide an expected revision ID, if the revision ID of the existing policy on the resource doesn't match or if there's no policy attached to the resource, your request will be rejected with a PolicyNotFoundException. To conditionally attach a policy when no policy exists for the resource, specify NO_POLICY for the revision ID.
                ConfirmRemoveSelfResourceAccess:
                  $ref: "#/components/schemas/ConfirmRemoveSelfResourceAccess"
                  description: Set this parameter to true to confirm that you want to remove your permissions to change the policy of this resource in the future.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyOutput"
  /Query:
    post:
      operationId: Query
      description: You must provide the name of the partition key attribute and a single value for that attribute. Query returns all items with that partition key value. Optionally, you can provide a sort key attribute and use a comparison operator to refine the search results. Use the KeyConditionExpression parameter to provide a specific value for the partition key. The Query operation will return all of the items from the table or index with that partition key value. You can optionally narrow the scope of the Query operation by specifying a sort key value and a comparison operator in KeyConditionExpression. To further refine the Query results, you can optionally provide a FilterExpression. A FilterExpression determines which items within the results should be returned to you. All of the other results are discarded. A Query operation always returns a result set. If no matching items are found, the result set will be empty. Queries that do not return results consume the minimum number of read capacity units for that type of read operation. DynamoDB calculates the number of read capacity units consumed based on item size, not on the amount of data that is returned to an application. The number of capacity units consumed will be the same whether you request all of the attributes (the default behavior) or just some of them (using a projection expression). The number will also be the same whether or not you use a FilterExpression. Query results are always sorted by the sort key value. If the data type of the sort key is Number, the results are returned in numeric order; otherwise, the results are returned in order of UTF-8 bytes. By default, the sort order is ascending. To reverse the order, set the ScanIndexForward parameter to false. A single Query operation will read up to the maximum number of items set (if using the Limit parameter) or a maximum of 1 MB of data and then apply any filtering to the results using FilterExpression. If LastEvaluatedKey is present in the response, you will need to paginate the result set. For more information, see Paginating the Results in the Amazon DynamoDB Developer Guide. FilterExpression is applied after a Query finishes, but before the results are returned. A FilterExpression cannot contain partition key or sort key attributes. You need to specify those attributes in the KeyConditionExpression. A Query operation can return an empty result set and a LastEvaluatedKey if all the items read for the page of results are filtered out. You can query a table, a local secondary index, or a global secondary index. For a query on a table or on a local secondary index, you can set the ConsistentRead parameter to true and obtain a strongly consistent result. Global secondary indexes support eventually consistent reads only, so do not specify ConsistentRead when querying a global secondary index.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.Query
            default: DynamoDB_20120810.Query
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table containing the requested items. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                IndexName:
                  $ref: "#/components/schemas/IndexName"
                  description: The name of an index to query. This index can be any local secondary index or global secondary index on the table. Note that if you use the IndexName parameter, you must also provide TableName.
                Select:
                  $ref: "#/components/schemas/Select"
                  description: The attributes to be returned in the result. You can retrieve all item attributes, specific item attributes, the count of matching items, or in the case of an index, some or all of the attributes projected into the index. ALL_ATTRIBUTES - Returns all of the item attributes from the specified table or index. If you query a local secondary index, then for each matching item in the index, DynamoDB fetches the entire item from the parent table. If the index is configured to project all item attributes, then all of the data can be obtained from the local secondary index, and no fetching is required. ALL_PROJECTED_ATTRIBUTES - Allowed only when querying an index. Retrieves all attributes that have been projected into the index. If the index is configured to project all attributes, this return value is equivalent to specifying ALL_ATTRIBUTES. COUNT - Returns the number of matching items, rather than the matching items themselves. Note that this uses the same quantity of read capacity units as getting the items, and is subject to the same item size calculations. SPECIFIC_ATTRIBUTES - Returns only the attributes listed in ProjectionExpression. This return value is equivalent to specifying ProjectionExpression without specifying any value for Select. If you query or scan a local secondary index and request only attributes that are projected into that index, the operation will read only the index and not the table. If any of the requested attributes are not projected into the local secondary index, DynamoDB fetches each of these attributes from the parent table. This extra fetching incurs additional throughput cost and latency. If you query or scan a global secondary index, you can only request attributes that are projected into the index. Global secondary index queries cannot fetch attributes from the parent table. If neither Select nor ProjectionExpression are specified, DynamoDB defaults to ALL_ATTRIBUTES when accessing a table, and ALL_PROJECTED_ATTRIBUTES when accessing an index. You cannot use both Select and ProjectionExpression together in a single request, unless the value for Select is SPECIFIC_ATTRIBUTES. (This usage is equivalent to specifying ProjectionExpression without any value for Select.) If you use the ProjectionExpression parameter, then the value for Select can only be SPECIFIC_ATTRIBUTES. Any other value for Select will return an error.
                AttributesToGet:
                  $ref: "#/components/schemas/AttributeNameList"
                  description: This is a legacy parameter. Use ProjectionExpression instead. For more information, see AttributesToGet in the Amazon DynamoDB Developer Guide.
                Limit:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: The maximum number of items to evaluate (not necessarily the number of matching items). If DynamoDB processes the number of items up to the limit while processing the results, it stops the operation and returns the matching values up to that point, and a key in LastEvaluatedKey to apply in a subsequent operation, so that you can pick up where you left off. Also, if the processed dataset size exceeds 1 MB before DynamoDB reaches this limit, it stops the operation and returns the matching values up to the limit, and a key in LastEvaluatedKey to apply in a subsequent operation to continue the operation. For more information, see Query and Scan in the Amazon DynamoDB Developer Guide.
                ConsistentRead:
                  $ref: "#/components/schemas/ConsistentRead"
                  description: "Determines the read consistency model: If set to true, then the operation uses strongly consistent reads; otherwise, the operation uses eventually consistent reads. Strongly consistent reads are not supported on global secondary indexes. If you query a global secondary index with ConsistentRead set to true, you will receive a ValidationException."
                KeyConditions:
                  $ref: "#/components/schemas/KeyConditions"
                  description: This is a legacy parameter. Use KeyConditionExpression instead. For more information, see KeyConditions in the Amazon DynamoDB Developer Guide.
                QueryFilter:
                  $ref: "#/components/schemas/FilterConditionMap"
                  description: This is a legacy parameter. Use FilterExpression instead. For more information, see QueryFilter in the Amazon DynamoDB Developer Guide.
                ConditionalOperator:
                  $ref: "#/components/schemas/ConditionalOperator"
                  description: This is a legacy parameter. Use FilterExpression instead. For more information, see ConditionalOperator in the Amazon DynamoDB Developer Guide.
                ScanIndexForward:
                  $ref: "#/components/schemas/BooleanObject"
                  description: "Specifies the order for index traversal: If true (default), the traversal is performed in ascending order; if false, the traversal is performed in descending order. Items with the same partition key value are stored in sorted order by sort key. If the sort key data type is Number, the results are stored in numeric order. For type String, the results are stored in order of UTF-8 bytes. For type Binary, DynamoDB treats each byte of the binary data as unsigned. If ScanIndexForward is true, DynamoDB returns the results in the order in which they are stored (by sort key value). This is the default behavior. If ScanIndexForward is false, DynamoDB reads the results in reverse order by sort key value, and then returns the results to the client."
                ExclusiveStartKey:
                  $ref: "#/components/schemas/Key"
                  description: The primary key of the first item that this operation will evaluate. Use the value that was returned for LastEvaluatedKey in the previous operation. The data type for ExclusiveStartKey must be String, Number, or Binary. No set data types are allowed.
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                ProjectionExpression:
                  $ref: "#/components/schemas/ProjectionExpression"
                  description: A string that identifies one or more attributes to retrieve from the table. These attributes can include scalars, sets, or elements of a JSON document. The attributes in the expression must be separated by commas. If no attribute names are specified, then all attributes will be returned. If any of the requested attributes are not found, they will not appear in the result. For more information, see Accessing Item Attributes in the Amazon DynamoDB Developer Guide.
                FilterExpression:
                  $ref: "#/components/schemas/ConditionExpression"
                  description: A string that contains conditions that DynamoDB applies after the Query operation, but before the data is returned to you. Items that do not satisfy the FilterExpression criteria are not returned. A FilterExpression does not allow key attributes. You cannot define a filter expression based on a partition key or a sort key. A FilterExpression is applied after the items have already been read; the process of filtering does not consume any additional read capacity units. For more information, see Filter Expressions in the Amazon DynamoDB Developer Guide.
                KeyConditionExpression:
                  $ref: "#/components/schemas/KeyExpression"
                  description: "The condition that specifies the key values for items to be retrieved by the Query action. The condition must perform an equality test on a single partition key value. The condition can optionally perform one of several comparison tests on a single sort key value. This allows Query to retrieve one item with a given partition key value and sort key value, or several items that have the same partition key value but different sort key values. The partition key equality test is required, and must be specified in the following format: partitionKeyName = :partitionkeyval If you also want to provide a condition for the sort key, it must be combined using AND with the condition for the sort key. Following is an example, using the = comparison operator for the sort key: partitionKeyName = :partitionkeyval AND sortKeyName = :sortkeyval Valid comparisons for the sort key condition are as follows: sortKeyName = :sortkeyval - true if the sort key value is equal to :sortkeyval. sortKeyName < :sortkeyval - true if the sort key value is less than :sortkeyval. sortKeyName <= :sortkeyval - true if the sort key value is less than or equal to :sortkeyval. sortKeyName > :sortkeyval - true if the sort key value is greater than :sortkeyval. sortKeyName >= :sortkeyval - true if the sort key value is greater than or equal to :sortkeyval. sortKeyName BETWEEN :sortkeyval1 AND :sortkeyval2 - true if the sort key value is greater than or equal to :sortkeyval1, and less than or equal to :sortkeyval2. begins_with ( sortKeyName, :sortkeyval ) - true if the sort key value begins with a particular operand. (You cannot use this function with a sort key that is of type Number.) Note that the function name begins_with is case-sensitive. Use the ExpressionAttributeValues parameter to replace tokens such as :partitionval and :sortval with actual values at runtime. You can optionally use the ExpressionAttributeNames parameter to replace the names of the partition key and sort key with placeholder tokens. This option might be necessary if an attribute name conflicts with a DynamoDB reserved word. For example, the following KeyConditionExpression parameter causes an error because Size is a reserved word: Size = :myval To work around this, define a placeholder (such a #S) to represent the attribute name Size. KeyConditionExpression then is as follows: #S = :myval For a list of reserved words, see Reserved Words in the Amazon DynamoDB Developer Guide. For more information on ExpressionAttributeNames and ExpressionAttributeValues, see Using Placeholders for Attribute Names and Values in the Amazon DynamoDB Developer Guide."
                ExpressionAttributeNames:
                  $ref: "#/components/schemas/ExpressionAttributeNameMap"
                  description: 'One or more substitution tokens for attribute names in an expression. The following are some use cases for using ExpressionAttributeNames: To access an attribute whose name conflicts with a DynamoDB reserved word. To create a placeholder for repeating occurrences of an attribute name in an expression. To prevent special characters in an attribute name from being misinterpreted in an expression. Use the # character in an expression to dereference an attribute name. For example, consider the following attribute name: Percentile The name of this attribute conflicts with a reserved word, so it cannot be used directly in an expression. (For the complete list of reserved words, see Reserved Words in the Amazon DynamoDB Developer Guide). To work around this, you could specify the following for ExpressionAttributeNames: {"#P":"Percentile"} You could then use this substitution in an expression, as in this example: #P = :val Tokens that begin with the : character are expression attribute values, which are placeholders for the actual value at runtime. For more information on expression attribute names, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.'
                ExpressionAttributeValues:
                  $ref: "#/components/schemas/ExpressionAttributeValueMap"
                  description: 'One or more values that can be substituted in an expression. Use the : (colon) character in an expression to dereference an attribute value. For example, suppose that you wanted to check whether the value of the ProductStatus attribute was one of the following: Available | Backordered | Discontinued You would first need to specify ExpressionAttributeValues as follows: { ":avail":{"S":"Available"}, ":back":{"S":"Backordered"}, ":disc":{"S":"Discontinued"} } You could then use these values in an expression, such as this: ProductStatus IN (:avail, :back, :disc) For more information on expression attribute values, see Specifying Conditions in the Amazon DynamoDB Developer Guide.'
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryOutput"
  /RestoreTableFromBackup:
    post:
      operationId: RestoreTableFromBackup
      description: "Creates a new table from an existing backup. Any number of users can execute up to 50 concurrent restores (any type of restore) in a given account. You can call RestoreTableFromBackup at a maximum rate of 10 times per second. You must manually set up the following on the restored table: Auto scaling policies IAM policies Amazon CloudWatch metrics and alarms Tags Stream settings Time to Live (TTL) settings"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.RestoreTableFromBackup
            default: DynamoDB_20120810.RestoreTableFromBackup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TargetTableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the new table to which the backup must be restored.
                BackupArn:
                  $ref: "#/components/schemas/BackupArn"
                  description: The Amazon Resource Name (ARN) associated with the backup.
                BillingModeOverride:
                  $ref: "#/components/schemas/BillingMode"
                  description: The billing mode of the restored table.
                GlobalSecondaryIndexOverride:
                  $ref: "#/components/schemas/GlobalSecondaryIndexList"
                  description: List of global secondary indexes for the restored table. The indexes provided should match existing secondary indexes. You can choose to exclude some or all of the indexes at the time of restore.
                LocalSecondaryIndexOverride:
                  $ref: "#/components/schemas/LocalSecondaryIndexList"
                  description: List of local secondary indexes for the restored table. The indexes provided should match existing secondary indexes. You can choose to exclude some or all of the indexes at the time of restore.
                ProvisionedThroughputOverride:
                  $ref: "#/components/schemas/ProvisionedThroughput"
                  description: Provisioned throughput settings for the restored table.
                OnDemandThroughputOverride:
                  $ref: "#/components/schemas/OnDemandThroughput"
                SSESpecificationOverride:
                  $ref: "#/components/schemas/SSESpecification"
                  description: The new server-side encryption settings for the restored table.
              required:
                - TargetTableName
                - BackupArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreTableFromBackupOutput"
  /RestoreTableToPointInTime:
    post:
      operationId: RestoreTableToPointInTime
      description: "Restores the specified table to the specified point in time within EarliestRestorableDateTime and LatestRestorableDateTime. You can restore your table to any point in time in the last 35 days. You can set the recovery period to any value between 1 and 35 days. Any number of users can execute up to 50 concurrent restores (any type of restore) in a given account. When you restore using point in time recovery, DynamoDB restores your table data to the state based on the selected date and time (day:hour:minute:second) to a new table. Along with data, the following are also included on the new restored table using point in time recovery: Global secondary indexes (GSIs) Local secondary indexes (LSIs) Provisioned read and write capacity Encryption settings All these settings come from the current settings of the source table at the time of restore. You must manually set up the following on the restored table: Auto scaling policies IAM policies Amazon CloudWatch metrics and alarms Tags Stream settings Time to Live (TTL) settings Point in time recovery settings"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.RestoreTableToPointInTime
            default: DynamoDB_20120810.RestoreTableToPointInTime
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                SourceTableArn:
                  $ref: "#/components/schemas/TableArn"
                  description: The DynamoDB table that will be restored. This value is an Amazon Resource Name (ARN).
                SourceTableName:
                  $ref: "#/components/schemas/TableName"
                  description: Name of the source table that is being restored.
                TargetTableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the new table to which it must be restored to.
                UseLatestRestorableTime:
                  $ref: "#/components/schemas/BooleanObject"
                  description: Restore the table to the latest possible time. LatestRestorableDateTime is typically 5 minutes before the current time.
                RestoreDateTime:
                  $ref: "#/components/schemas/Date"
                  description: Time in the past to restore the table to.
                BillingModeOverride:
                  $ref: "#/components/schemas/BillingMode"
                  description: The billing mode of the restored table.
                GlobalSecondaryIndexOverride:
                  $ref: "#/components/schemas/GlobalSecondaryIndexList"
                  description: List of global secondary indexes for the restored table. The indexes provided should match existing secondary indexes. You can choose to exclude some or all of the indexes at the time of restore.
                LocalSecondaryIndexOverride:
                  $ref: "#/components/schemas/LocalSecondaryIndexList"
                  description: List of local secondary indexes for the restored table. The indexes provided should match existing secondary indexes. You can choose to exclude some or all of the indexes at the time of restore.
                ProvisionedThroughputOverride:
                  $ref: "#/components/schemas/ProvisionedThroughput"
                  description: Provisioned throughput settings for the restored table.
                OnDemandThroughputOverride:
                  $ref: "#/components/schemas/OnDemandThroughput"
                SSESpecificationOverride:
                  $ref: "#/components/schemas/SSESpecification"
                  description: The new server-side encryption settings for the restored table.
              required:
                - TargetTableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreTableToPointInTimeOutput"
  /Scan:
    post:
      operationId: Scan
      description: The Scan operation returns one or more items and item attributes by accessing every item in a table or a secondary index. To have DynamoDB return fewer items, you can provide a FilterExpression operation. If the total size of scanned items exceeds the maximum dataset size limit of 1 MB, the scan completes and results are returned to the user. The LastEvaluatedKey value is also returned and the requestor can use the LastEvaluatedKey to continue the scan in a subsequent operation. Each scan response also includes number of items that were scanned (ScannedCount) as part of the request. If using a FilterExpression, a scan result can result in no items meeting the criteria and the Count will result in zero. If you did not use a FilterExpression in the scan request, then Count is the same as ScannedCount. Count and ScannedCount only return the count of items specific to a single scan request and, unless the table is less than 1MB, do not represent the total number of items in the table. A single Scan operation first reads up to the maximum number of items set (if using the Limit parameter) or a maximum of 1 MB of data and then applies any filtering to the results if a FilterExpression is provided. If LastEvaluatedKey is present in the response, pagination is required to complete the full table scan. For more information, see Paginating the Results in the Amazon DynamoDB Developer Guide. Scan operations proceed sequentially; however, for faster performance on a large table or secondary index, applications can request a parallel Scan operation by providing the Segment and TotalSegments parameters. For more information, see Parallel Scan in the Amazon DynamoDB Developer Guide. By default, a Scan uses eventually consistent reads when accessing the items in a table. Therefore, the results from an eventually consistent Scan may not include the latest item changes at the time the scan iterates through each item in the table. If you require a strongly consistent read of each item as the scan iterates through the items in the table, you can set the ConsistentRead parameter to true. Strong consistency only relates to the consistency of the read at the item level. DynamoDB does not provide snapshot isolation for a scan operation when the ConsistentRead parameter is set to true. Thus, a DynamoDB scan operation does not guarantee that all reads in a scan see a consistent snapshot of the table when the scan operation was requested.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.Scan
            default: DynamoDB_20120810.Scan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table containing the requested items or if you provide IndexName, the name of the table to which that index belongs. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                IndexName:
                  $ref: "#/components/schemas/IndexName"
                  description: The name of a secondary index to scan. This index can be any local secondary index or global secondary index. Note that if you use the IndexName parameter, you must also provide TableName.
                AttributesToGet:
                  $ref: "#/components/schemas/AttributeNameList"
                  description: This is a legacy parameter. Use ProjectionExpression instead. For more information, see AttributesToGet in the Amazon DynamoDB Developer Guide.
                Limit:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: The maximum number of items to evaluate (not necessarily the number of matching items). If DynamoDB processes the number of items up to the limit while processing the results, it stops the operation and returns the matching values up to that point, and a key in LastEvaluatedKey to apply in a subsequent operation, so that you can pick up where you left off. Also, if the processed dataset size exceeds 1 MB before DynamoDB reaches this limit, it stops the operation and returns the matching values up to the limit, and a key in LastEvaluatedKey to apply in a subsequent operation to continue the operation. For more information, see Working with Queries in the Amazon DynamoDB Developer Guide.
                Select:
                  $ref: "#/components/schemas/Select"
                  description: The attributes to be returned in the result. You can retrieve all item attributes, specific item attributes, the count of matching items, or in the case of an index, some or all of the attributes projected into the index. ALL_ATTRIBUTES - Returns all of the item attributes from the specified table or index. If you query a local secondary index, then for each matching item in the index, DynamoDB fetches the entire item from the parent table. If the index is configured to project all item attributes, then all of the data can be obtained from the local secondary index, and no fetching is required. ALL_PROJECTED_ATTRIBUTES - Allowed only when querying an index. Retrieves all attributes that have been projected into the index. If the index is configured to project all attributes, this return value is equivalent to specifying ALL_ATTRIBUTES. COUNT - Returns the number of matching items, rather than the matching items themselves. Note that this uses the same quantity of read capacity units as getting the items, and is subject to the same item size calculations. SPECIFIC_ATTRIBUTES - Returns only the attributes listed in ProjectionExpression. This return value is equivalent to specifying ProjectionExpression without specifying any value for Select. If you query or scan a local secondary index and request only attributes that are projected into that index, the operation reads only the index and not the table. If any of the requested attributes are not projected into the local secondary index, DynamoDB fetches each of these attributes from the parent table. This extra fetching incurs additional throughput cost and latency. If you query or scan a global secondary index, you can only request attributes that are projected into the index. Global secondary index queries cannot fetch attributes from the parent table. If neither Select nor ProjectionExpression are specified, DynamoDB defaults to ALL_ATTRIBUTES when accessing a table, and ALL_PROJECTED_ATTRIBUTES when accessing an index. You cannot use both Select and ProjectionExpression together in a single request, unless the value for Select is SPECIFIC_ATTRIBUTES. (This usage is equivalent to specifying ProjectionExpression without any value for Select.) If you use the ProjectionExpression parameter, then the value for Select can only be SPECIFIC_ATTRIBUTES. Any other value for Select will return an error.
                ScanFilter:
                  $ref: "#/components/schemas/FilterConditionMap"
                  description: This is a legacy parameter. Use FilterExpression instead. For more information, see ScanFilter in the Amazon DynamoDB Developer Guide.
                ConditionalOperator:
                  $ref: "#/components/schemas/ConditionalOperator"
                  description: This is a legacy parameter. Use FilterExpression instead. For more information, see ConditionalOperator in the Amazon DynamoDB Developer Guide.
                ExclusiveStartKey:
                  $ref: "#/components/schemas/Key"
                  description: The primary key of the first item that this operation will evaluate. Use the value that was returned for LastEvaluatedKey in the previous operation. The data type for ExclusiveStartKey must be String, Number or Binary. No set data types are allowed. In a parallel scan, a Scan request that includes ExclusiveStartKey must specify the same segment whose previous Scan returned the corresponding value of LastEvaluatedKey.
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                TotalSegments:
                  $ref: "#/components/schemas/ScanTotalSegments"
                  description: For a parallel Scan request, TotalSegments represents the total number of segments into which the Scan operation will be divided. The value of TotalSegments corresponds to the number of application workers that will perform the parallel scan. For example, if you want to use four application threads to scan a table or an index, specify a TotalSegments value of 4. The value for TotalSegments must be greater than or equal to 1, and less than or equal to 1000000. If you specify a TotalSegments value of 1, the Scan operation will be sequential rather than parallel. If you specify TotalSegments, you must also specify Segment.
                Segment:
                  $ref: "#/components/schemas/ScanSegment"
                  description: For a parallel Scan request, Segment identifies an individual segment to be scanned by an application worker. Segment IDs are zero-based, so the first segment is always 0. For example, if you want to use four application threads to scan a table or an index, then the first thread specifies a Segment value of 0, the second thread specifies 1, and so on. The value of LastEvaluatedKey returned from a parallel Scan request must be used as ExclusiveStartKey with the same segment ID in a subsequent Scan operation. The value for Segment must be greater than or equal to 0, and less than the value provided for TotalSegments. If you provide Segment, you must also provide TotalSegments.
                ProjectionExpression:
                  $ref: "#/components/schemas/ProjectionExpression"
                  description: A string that identifies one or more attributes to retrieve from the specified table or index. These attributes can include scalars, sets, or elements of a JSON document. The attributes in the expression must be separated by commas. If no attribute names are specified, then all attributes will be returned. If any of the requested attributes are not found, they will not appear in the result. For more information, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.
                FilterExpression:
                  $ref: "#/components/schemas/ConditionExpression"
                  description: A string that contains conditions that DynamoDB applies after the Scan operation, but before the data is returned to you. Items that do not satisfy the FilterExpression criteria are not returned. A FilterExpression is applied after the items have already been read; the process of filtering does not consume any additional read capacity units. For more information, see Filter Expressions in the Amazon DynamoDB Developer Guide.
                ExpressionAttributeNames:
                  $ref: "#/components/schemas/ExpressionAttributeNameMap"
                  description: 'One or more substitution tokens for attribute names in an expression. The following are some use cases for using ExpressionAttributeNames: To access an attribute whose name conflicts with a DynamoDB reserved word. To create a placeholder for repeating occurrences of an attribute name in an expression. To prevent special characters in an attribute name from being misinterpreted in an expression. Use the # character in an expression to dereference an attribute name. For example, consider the following attribute name: Percentile The name of this attribute conflicts with a reserved word, so it cannot be used directly in an expression. (For the complete list of reserved words, see Reserved Words in the Amazon DynamoDB Developer Guide). To work around this, you could specify the following for ExpressionAttributeNames: {"#P":"Percentile"} You could then use this substitution in an expression, as in this example: #P = :val Tokens that begin with the : character are expression attribute values, which are placeholders for the actual value at runtime. For more information on expression attribute names, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.'
                ExpressionAttributeValues:
                  $ref: "#/components/schemas/ExpressionAttributeValueMap"
                  description: 'One or more values that can be substituted in an expression. Use the : (colon) character in an expression to dereference an attribute value. For example, suppose that you wanted to check whether the value of the ProductStatus attribute was one of the following: Available | Backordered | Discontinued You would first need to specify ExpressionAttributeValues as follows: { ":avail":{"S":"Available"}, ":back":{"S":"Backordered"}, ":disc":{"S":"Discontinued"} } You could then use these values in an expression, such as this: ProductStatus IN (:avail, :back, :disc) For more information on expression attribute values, see Condition Expressions in the Amazon DynamoDB Developer Guide.'
                ConsistentRead:
                  $ref: "#/components/schemas/ConsistentRead"
                  description: "A Boolean value that determines the read consistency model during the scan: If ConsistentRead is false, then the data returned from Scan might not contain the results from other recently completed write operations (PutItem, UpdateItem, or DeleteItem). If ConsistentRead is true, then all of the write operations that completed before the Scan began are guaranteed to be contained in the Scan response. The default setting for ConsistentRead is false. The ConsistentRead parameter is not supported on global secondary indexes. If you scan a global secondary index with ConsistentRead set to true, you will receive a ValidationException."
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Associate a set of tags with an Amazon DynamoDB resource. You can then activate these user-defined tags so that they appear on the Billing and Cost Management console for cost allocation tracking. You can call TagResource up to five times per second, per account. TagResource is an asynchronous operation. If you issue a ListTagsOfResource request immediately after a TagResource request, DynamoDB might return your previous tag set, if there was one, or an empty tag set. This is because ListTagsOfResource uses an eventually consistent query, and the metadata for your tags or table might not be available at that moment. Wait for a few seconds, and then try the ListTagsOfResource request again. The application or removal of tags using TagResource and UntagResource APIs is eventually consistent. ListTagsOfResource API will only reflect the changes after a few seconds. For an overview on tagging DynamoDB resources, see Tagging for DynamoDB in the Amazon DynamoDB Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.TagResource
            default: DynamoDB_20120810.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
                  description: Identifies the Amazon DynamoDB resource to which tags should be added. This value is an Amazon Resource Name (ARN).
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to be assigned to the Amazon DynamoDB resource.
              required:
                - ResourceArn
                - Tags
      responses:
        "200":
          description: Success
  /TransactGetItems:
    post:
      operationId: TransactGetItems
      description: "TransactGetItems is a synchronous operation that atomically retrieves multiple items from one or more tables (but not from indexes) in a single account and Region. A TransactGetItems call can contain up to 100 TransactGetItem objects, each of which contains a Get structure that specifies an item to retrieve from a table in the account and Region. A call to TransactGetItems cannot retrieve items from tables in more than one Amazon Web Services account or Region. The aggregate size of the items in the transaction cannot exceed 4 MB. DynamoDB rejects the entire TransactGetItems request if any of the following is true: A conflicting operation is in the process of updating an item to be read. There is insufficient provisioned capacity for the transaction to be completed. There is a user error, such as an invalid data format. The aggregate size of the items in the transaction exceeded 4 MB."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.TransactGetItems
            default: DynamoDB_20120810.TransactGetItems
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TransactItems:
                  $ref: "#/components/schemas/TransactGetItemList"
                  description: An ordered array of up to 100 TransactGetItem objects, each of which contains a Get structure.
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                  description: A value of TOTAL causes consumed capacity information to be returned, and a value of NONE prevents that information from being returned. No other value is valid.
              required:
                - TransactItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactGetItemsOutput"
  /TransactWriteItems:
    post:
      operationId: TransactWriteItems
      description: "TransactWriteItems is a synchronous write operation that groups up to 100 action requests. These actions can target items in different tables, but not in different Amazon Web Services accounts or Regions, and no two actions can target the same item. For example, you cannot both ConditionCheck and Update the same item. The aggregate size of the items in the transaction cannot exceed 4 MB. The actions are completed atomically so that either all of them succeed, or all of them fail. They are defined by the following objects: Put — Initiates a PutItem operation to write a new item. This structure specifies the primary key of the item to be written, the name of the table to write it in, an optional condition expression that must be satisfied for the write to succeed, a list of the item's attributes, and a field indicating whether to retrieve the item's attributes if the condition is not met. Update — Initiates an UpdateItem operation to update an existing item. This structure specifies the primary key of the item to be updated, the name of the table where it resides, an optional condition expression that must be satisfied for the update to succeed, an expression that defines one or more attributes to be updated, and a field indicating whether to retrieve the item's attributes if the condition is not met. Delete — Initiates a DeleteItem operation to delete an existing item. This structure specifies the primary key of the item to be deleted, the name of the table where it resides, an optional condition expression that must be satisfied for the deletion to succeed, and a field indicating whether to retrieve the item's attributes if the condition is not met. ConditionCheck — Applies a condition to an item that is not being modified by the transaction. This structure specifies the primary key of the item to be checked, the name of the table where it resides, a condition expression that must be satisfied for the transaction to succeed, and a field indicating whether to retrieve the item's attributes if the condition is not met. DynamoDB rejects the entire TransactWriteItems request if any of the following is true: A condition in one of the condition expressions is not met. An ongoing operation is in the process of updating the same item. There is insufficient provisioned capacity for the transaction to be completed. An item size becomes too large (bigger than 400 KB), a local secondary index (LSI) becomes too large, or a similar validation error occurs because of changes made by the transaction. The aggregate size of the items in the transaction exceeds 4 MB. There is a user error, such as an invalid data format."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.TransactWriteItems
            default: DynamoDB_20120810.TransactWriteItems
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TransactItems:
                  $ref: "#/components/schemas/TransactWriteItemList"
                  description: An ordered array of up to 100 TransactWriteItem objects, each of which contains a ConditionCheck, Put, Update, or Delete object. These can operate on items in different tables, but the tables must reside in the same Amazon Web Services account and Region, and no two of them can operate on the same item.
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                ReturnItemCollectionMetrics:
                  $ref: "#/components/schemas/ReturnItemCollectionMetrics"
                  description: Determines whether item collection metrics are returned. If set to SIZE, the response includes statistics about item collections (if any), that were modified during the operation and are returned in the response. If set to NONE (the default), no statistics are returned.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Providing a ClientRequestToken makes the call to TransactWriteItems idempotent, meaning that multiple identical calls have the same effect as one single call. Although multiple identical calls using the same client request token produce the same result on the server (no side effects), the responses to the calls might not be the same. If the ReturnConsumedCapacity parameter is set, then the initial TransactWriteItems call returns the amount of write capacity units consumed in making the changes. Subsequent TransactWriteItems calls with the same client token return the number of read capacity units consumed in reading the item. A client request token is valid for 10 minutes after the first request that uses it is completed. After 10 minutes, any request with the same client token is treated as a new request. Do not resubmit the same request with the same client token for more than 10 minutes, or the result might not be idempotent. If you submit a request with the same client token but a change in other parameters within the 10-minute idempotency window, DynamoDB returns an IdempotentParameterMismatch exception.
              required:
                - TransactItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactWriteItemsOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes the association of tags from an Amazon DynamoDB resource. You can call UntagResource up to five times per second, per account. UntagResource is an asynchronous operation. If you issue a ListTagsOfResource request immediately after an UntagResource request, DynamoDB might return your previous tag set, if there was one, or an empty tag set. This is because ListTagsOfResource uses an eventually consistent query, and the metadata for your tags or table might not be available at that moment. Wait for a few seconds, and then try the ListTagsOfResource request again. The application or removal of tags using TagResource and UntagResource APIs is eventually consistent. ListTagsOfResource API will only reflect the changes after a few seconds. For an overview on tagging DynamoDB resources, see Tagging for DynamoDB in the Amazon DynamoDB Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UntagResource
            default: DynamoDB_20120810.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
                  description: The DynamoDB resource that the tags will be removed from. This value is an Amazon Resource Name (ARN).
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys. Existing tags of the resource whose keys are members of this list will be removed from the DynamoDB resource.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
  /UpdateContinuousBackups:
    post:
      operationId: UpdateContinuousBackups
      description: UpdateContinuousBackups enables or disables point in time recovery for the specified table. A successful UpdateContinuousBackups call returns the current ContinuousBackupsDescription. Continuous backups are ENABLED on all tables at table creation. If point in time recovery is enabled, PointInTimeRecoveryStatus will be set to ENABLED. Once continuous backups and point in time recovery are enabled, you can restore to any point in time within EarliestRestorableDateTime and LatestRestorableDateTime. LatestRestorableDateTime is typically 5 minutes before the current time. You can restore your table to any point in time in the last 35 days. You can set the RecoveryPeriodInDays to any value between 1 and 35 days.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateContinuousBackups
            default: DynamoDB_20120810.UpdateContinuousBackups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                PointInTimeRecoverySpecification:
                  $ref: "#/components/schemas/PointInTimeRecoverySpecification"
                  description: Represents the settings used to enable point in time recovery.
              required:
                - TableName
                - PointInTimeRecoverySpecification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContinuousBackupsOutput"
  /UpdateContributorInsights:
    post:
      operationId: UpdateContributorInsights
      description: Updates the status for contributor insights for a specific table or index. CloudWatch Contributor Insights for DynamoDB graphs display the partition key and (if applicable) sort key of frequently accessed items and frequently throttled items in plaintext. If you require the use of Amazon Web Services Key Management Service (KMS) to encrypt this table’s partition key and sort key data with an Amazon Web Services managed key or customer managed key, you should not enable CloudWatch Contributor Insights for DynamoDB for this table.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateContributorInsights
            default: DynamoDB_20120810.UpdateContributorInsights
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                IndexName:
                  $ref: "#/components/schemas/IndexName"
                  description: The global secondary index name, if applicable.
                ContributorInsightsAction:
                  $ref: "#/components/schemas/ContributorInsightsAction"
                  description: Represents the contributor insights action.
                ContributorInsightsMode:
                  $ref: "#/components/schemas/ContributorInsightsMode"
                  description: Specifies whether to track all access and throttled events or throttled events only for the DynamoDB table or index.
              required:
                - TableName
                - ContributorInsightsAction
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContributorInsightsOutput"
  /UpdateGlobalTable:
    post:
      operationId: UpdateGlobalTable
      description: "Adds or removes replicas in the specified global table. The global table must already exist to be able to use this operation. Any replica to be added must be empty, have the same name as the global table, have the same key schema, have DynamoDB Streams enabled, and have the same provisioned and maximum write capacity units. This documentation is for version 2017.11.29 (Legacy) of global tables, which should be avoided for new global tables. Customers should use Global Tables version 2019.11.21 (Current) when possible, because it provides greater flexibility, higher efficiency, and consumes less write capacity than 2017.11.29 (Legacy). To determine which version you're using, see Determining the global table version you are using. To update existing global tables from version 2017.11.29 (Legacy) to version 2019.11.21 (Current), see Upgrading global tables. If you are using global tables Version 2019.11.21 (Current) you can use UpdateTable instead. Although you can use UpdateGlobalTable to add replicas and remove replicas in a single request, for simplicity we recommend that you issue separate requests for adding or removing replicas. If global secondary indexes are specified, then the following conditions must also be met: The global secondary indexes must have the same name. The global secondary indexes must have the same hash key and sort key (if present). The global secondary indexes must have the same provisioned and maximum write capacity units."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateGlobalTable
            default: DynamoDB_20120810.UpdateGlobalTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GlobalTableName:
                  $ref: "#/components/schemas/TableName"
                  description: The global table name.
                ReplicaUpdates:
                  $ref: "#/components/schemas/ReplicaUpdateList"
                  description: A list of Regions that should be added or removed from the global table.
              required:
                - GlobalTableName
                - ReplicaUpdates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGlobalTableOutput"
  /UpdateGlobalTableSettings:
    post:
      operationId: UpdateGlobalTableSettings
      description: Updates settings for a global table. This documentation is for version 2017.11.29 (Legacy) of global tables, which should be avoided for new global tables. Customers should use Global Tables version 2019.11.21 (Current) when possible, because it provides greater flexibility, higher efficiency, and consumes less write capacity than 2017.11.29 (Legacy). To determine which version you're using, see Determining the global table version you are using. To update existing global tables from version 2017.11.29 (Legacy) to version 2019.11.21 (Current), see Upgrading global tables.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateGlobalTableSettings
            default: DynamoDB_20120810.UpdateGlobalTableSettings
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GlobalTableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the global table
                GlobalTableBillingMode:
                  $ref: "#/components/schemas/BillingMode"
                  description: The billing mode of the global table. If GlobalTableBillingMode is not specified, the global table defaults to PROVISIONED capacity billing mode. PROVISIONED - We recommend using PROVISIONED for predictable workloads. PROVISIONED sets the billing mode to Provisioned capacity mode. PAY_PER_REQUEST - We recommend using PAY_PER_REQUEST for unpredictable workloads. PAY_PER_REQUEST sets the billing mode to On-demand capacity mode.
                GlobalTableProvisionedWriteCapacityUnits:
                  $ref: "#/components/schemas/PositiveLongObject"
                  description: The maximum number of writes consumed per second before DynamoDB returns a ThrottlingException.
                GlobalTableProvisionedWriteCapacityAutoScalingSettingsUpdate:
                  $ref: "#/components/schemas/AutoScalingSettingsUpdate"
                  description: Auto scaling settings for managing provisioned write capacity for the global table.
                GlobalTableGlobalSecondaryIndexSettingsUpdate:
                  $ref: "#/components/schemas/GlobalTableGlobalSecondaryIndexSettingsUpdateList"
                  description: Represents the settings of a global secondary index for a global table that will be modified.
                ReplicaSettingsUpdate:
                  $ref: "#/components/schemas/ReplicaSettingsUpdateList"
                  description: Represents the settings for a global table in a Region that will be modified.
              required:
                - GlobalTableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGlobalTableSettingsOutput"
  /UpdateItem:
    post:
      operationId: UpdateItem
      description: Edits an existing item's attributes, or adds a new item to the table if it does not already exist. You can put, delete, or add attribute values. You can also perform a conditional update on an existing item (insert a new attribute name-value pair if it doesn't exist, or replace an existing name-value pair if it has certain expected attribute values). You can also return the item's attribute values in the same UpdateItem operation using the ReturnValues parameter.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateItem
            default: DynamoDB_20120810.UpdateItem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table containing the item to update. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                Key:
                  $ref: "#/components/schemas/Key"
                  description: The primary key of the item to be updated. Each element consists of an attribute name and a value for that attribute. For the primary key, you must provide all of the attributes. For example, with a simple primary key, you only need to provide a value for the partition key. For a composite primary key, you must provide values for both the partition key and the sort key.
                AttributeUpdates:
                  $ref: "#/components/schemas/AttributeUpdates"
                  description: This is a legacy parameter. Use UpdateExpression instead. For more information, see AttributeUpdates in the Amazon DynamoDB Developer Guide.
                Expected:
                  $ref: "#/components/schemas/ExpectedAttributeMap"
                  description: This is a legacy parameter. Use ConditionExpression instead. For more information, see Expected in the Amazon DynamoDB Developer Guide.
                ConditionalOperator:
                  $ref: "#/components/schemas/ConditionalOperator"
                  description: This is a legacy parameter. Use ConditionExpression instead. For more information, see ConditionalOperator in the Amazon DynamoDB Developer Guide.
                ReturnValues:
                  $ref: "#/components/schemas/ReturnValue"
                  description: "Use ReturnValues if you want to get the item attributes as they appear before or after they are successfully updated. For UpdateItem, the valid values are: NONE - If ReturnValues is not specified, or if its value is NONE, then nothing is returned. (This setting is the default for ReturnValues.) ALL_OLD - Returns all of the attributes of the item, as they appeared before the UpdateItem operation. UPDATED_OLD - Returns only the updated attributes, as they appeared before the UpdateItem operation. ALL_NEW - Returns all of the attributes of the item, as they appear after the UpdateItem operation. UPDATED_NEW - Returns only the updated attributes, as they appear after the UpdateItem operation. There is no additional cost associated with requesting a return value aside from the small network and processing overhead of receiving a larger response. No read capacity units are consumed. The values returned are strongly consistent."
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                ReturnItemCollectionMetrics:
                  $ref: "#/components/schemas/ReturnItemCollectionMetrics"
                  description: Determines whether item collection metrics are returned. If set to SIZE, the response includes statistics about item collections, if any, that were modified during the operation are returned in the response. If set to NONE (the default), no statistics are returned.
                UpdateExpression:
                  $ref: "#/components/schemas/UpdateExpression"
                  description: "An expression that defines one or more attributes to be updated, the action to be performed on them, and new values for them. The following action values are available for UpdateExpression. SET - Adds one or more attributes and values to an item. If any of these attributes already exist, they are replaced by the new values. You can also use SET to add or subtract from an attribute that is of type Number. For example: SET myNum = myNum + :val SET supports the following functions: if_not_exists (path, operand) - if the item does not contain an attribute at the specified path, then if_not_exists evaluates to operand; otherwise, it evaluates to path. You can use this function to avoid overwriting an attribute that may already be present in the item. list_append (operand, operand) - evaluates to a list with a new element added to it. You can append the new element to the start or the end of the list by reversing the order of the operands. These function names are case-sensitive. REMOVE - Removes one or more attributes from an item. ADD - Adds the specified value to the item, if the attribute does not already exist. If the attribute does exist, then the behavior of ADD depends on the data type of the attribute: If the existing attribute is a number, and if Value is also a number, then Value is mathematically added to the existing attribute. If Value is a negative number, then it is subtracted from the existing attribute. If you use ADD to increment or decrement a number value for an item that doesn't exist before the update, DynamoDB uses 0 as the initial value. Similarly, if you use ADD for an existing item to increment or decrement an attribute value that doesn't exist before the update, DynamoDB uses 0 as the initial value. For example, suppose that the item you want to update doesn't have an attribute named itemcount, but you decide to ADD the number 3 to this attribute anyway. DynamoDB will create the itemcount attribute, set its initial value to 0, and finally add 3 to it. The result will be a new itemcount attribute in the item, with a value of 3. If the existing data type is a set and if Value is also a set, then Value is added to the existing set. For example, if the attribute value is the set [1,2], and the ADD action specified [3], then the final attribute value is [1,2,3]. An error occurs if an ADD action is specified for a set attribute and the attribute type specified does not match the existing set type. Both sets must have the same primitive data type. For example, if the existing data type is a set of strings, the Value must also be a set of strings. The ADD action only supports Number and set data types. DELETE - Deletes an element from a set. If a set of values is specified, then those values are subtracted from the old set. For example, if the attribute value was the set [a,b,c] and the DELETE action specifies [a,c], then the final attribute value is [b]. Specifying an empty set is an error. The DELETE action only supports set data types. You can have many actions in a single expression, such as the following: SET a=:value1, b=:value2 DELETE :value3, :value4, :value5 For more information on update expressions, see Modifying Items and Attributes in the Amazon DynamoDB Developer Guide."
                ConditionExpression:
                  $ref: "#/components/schemas/ConditionExpression"
                  description: "A condition that must be satisfied in order for a conditional update to succeed. An expression can contain any of the following: Functions: attribute_exists | attribute_not_exists | attribute_type | contains | begins_with | size These function names are case-sensitive. Comparison operators: = | <> | < | > | <= | >= | BETWEEN | IN Logical operators: AND | OR | NOT For more information about condition expressions, see Specifying Conditions in the Amazon DynamoDB Developer Guide."
                ExpressionAttributeNames:
                  $ref: "#/components/schemas/ExpressionAttributeNameMap"
                  description: 'One or more substitution tokens for attribute names in an expression. The following are some use cases for using ExpressionAttributeNames: To access an attribute whose name conflicts with a DynamoDB reserved word. To create a placeholder for repeating occurrences of an attribute name in an expression. To prevent special characters in an attribute name from being misinterpreted in an expression. Use the # character in an expression to dereference an attribute name. For example, consider the following attribute name: Percentile The name of this attribute conflicts with a reserved word, so it cannot be used directly in an expression. (For the complete list of reserved words, see Reserved Words in the Amazon DynamoDB Developer Guide.) To work around this, you could specify the following for ExpressionAttributeNames: {"#P":"Percentile"} You could then use this substitution in an expression, as in this example: #P = :val Tokens that begin with the : character are expression attribute values, which are placeholders for the actual value at runtime. For more information about expression attribute names, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.'
                ExpressionAttributeValues:
                  $ref: "#/components/schemas/ExpressionAttributeValueMap"
                  description: 'One or more values that can be substituted in an expression. Use the : (colon) character in an expression to dereference an attribute value. For example, suppose that you wanted to check whether the value of the ProductStatus attribute was one of the following: Available | Backordered | Discontinued You would first need to specify ExpressionAttributeValues as follows: { ":avail":{"S":"Available"}, ":back":{"S":"Backordered"}, ":disc":{"S":"Discontinued"} } You could then use these values in an expression, such as this: ProductStatus IN (:avail, :back, :disc) For more information on expression attribute values, see Condition Expressions in the Amazon DynamoDB Developer Guide.'
                ReturnValuesOnConditionCheckFailure:
                  $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
                  description: An optional parameter that returns the item attributes for an UpdateItem operation that failed a condition check. There is no additional cost associated with requesting a return value aside from the small network and processing overhead of receiving a larger response. No read capacity units are consumed.
              required:
                - TableName
                - Key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateItemOutput"
  /UpdateKinesisStreamingDestination:
    post:
      operationId: UpdateKinesisStreamingDestination
      description: The command to update the Kinesis stream destination.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateKinesisStreamingDestination
            default: DynamoDB_20120810.UpdateKinesisStreamingDestination
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The table name for the Kinesis streaming destination input. You can also provide the ARN of the table in this parameter.
                StreamArn:
                  $ref: "#/components/schemas/StreamArn"
                  description: The Amazon Resource Name (ARN) for the Kinesis stream input.
                UpdateKinesisStreamingConfiguration:
                  $ref: "#/components/schemas/UpdateKinesisStreamingConfiguration"
                  description: The command to update the Kinesis stream configuration.
              required:
                - TableName
                - StreamArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateKinesisStreamingDestinationOutput"
  /UpdateTable:
    post:
      operationId: UpdateTable
      description: "Modifies the provisioned throughput settings, global secondary indexes, or DynamoDB Streams settings for a given table. You can only perform one of the following operations at once: Modify the provisioned throughput settings of the table. Remove a global secondary index from the table. Create a new global secondary index on the table. After the index begins backfilling, you can use UpdateTable to perform other operations. UpdateTable is an asynchronous operation; while it's executing, the table status changes from ACTIVE to UPDATING. While it's UPDATING, you can't issue another UpdateTable request. When the table returns to the ACTIVE state, the UpdateTable operation is complete."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateTable
            default: DynamoDB_20120810.UpdateTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AttributeDefinitions:
                  $ref: "#/components/schemas/AttributeDefinitions"
                  description: An array of attributes that describe the key schema for the table and indexes. If you are adding a new global secondary index to the table, AttributeDefinitions must include the key element(s) of the new index.
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table to be updated. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                BillingMode:
                  $ref: "#/components/schemas/BillingMode"
                  description: Controls how you are charged for read and write throughput and how you manage capacity. When switching from pay-per-request to provisioned capacity, initial provisioned capacity values must be set. The initial provisioned capacity values are estimated based on the consumed read and write capacity of your table and global secondary indexes over the past 30 minutes. PAY_PER_REQUEST - We recommend using PAY_PER_REQUEST for most DynamoDB workloads. PAY_PER_REQUEST sets the billing mode to On-demand capacity mode. PROVISIONED - We recommend using PROVISIONED for steady workloads with predictable growth where capacity requirements can be reliably forecasted. PROVISIONED sets the billing mode to Provisioned capacity mode.
                ProvisionedThroughput:
                  $ref: "#/components/schemas/ProvisionedThroughput"
                  description: The new provisioned throughput settings for the specified table or index.
                GlobalSecondaryIndexUpdates:
                  $ref: "#/components/schemas/GlobalSecondaryIndexUpdateList"
                  description: "An array of one or more global secondary indexes for the table. For each index in the array, you can request one action: Create - add a new global secondary index to the table. Update - modify the provisioned throughput settings of an existing global secondary index. Delete - remove a global secondary index from the table. You can create or delete only one global secondary index per UpdateTable operation. For more information, see Managing Global Secondary Indexes in the Amazon DynamoDB Developer Guide."
                StreamSpecification:
                  $ref: "#/components/schemas/StreamSpecification"
                  description: Represents the DynamoDB Streams configuration for the table. You receive a ValidationException if you try to enable a stream on a table that already has a stream, or if you try to disable a stream on a table that doesn't have a stream.
                SSESpecification:
                  $ref: "#/components/schemas/SSESpecification"
                  description: The new server-side encryption settings for the specified table.
                ReplicaUpdates:
                  $ref: "#/components/schemas/ReplicationGroupUpdateList"
                  description: A list of replica update actions (create, delete, or update) for the table.
                TableClass:
                  $ref: "#/components/schemas/TableClass"
                  description: The table class of the table to be updated. Valid values are STANDARD and STANDARD_INFREQUENT_ACCESS.
                DeletionProtectionEnabled:
                  $ref: "#/components/schemas/DeletionProtectionEnabled"
                  description: Indicates whether deletion protection is to be enabled (true) or disabled (false) on the table.
                MultiRegionConsistency:
                  $ref: "#/components/schemas/MultiRegionConsistency"
                  description: "Specifies the consistency mode for a new global table. This parameter is only valid when you create a global table by specifying one or more Create actions in the ReplicaUpdates action list. You can specify one of the following consistency modes: EVENTUAL: Configures a new global table for multi-Region eventual consistency (MREC). This is the default consistency mode for global tables. STRONG: Configures a new global table for multi-Region strong consistency (MRSC). If you don't specify this field, the global table consistency mode defaults to EVENTUAL. For more information about global tables consistency modes, see Consistency modes in DynamoDB developer guide."
                GlobalTableWitnessUpdates:
                  $ref: "#/components/schemas/GlobalTableWitnessGroupUpdateList"
                  description: "A list of witness updates for a MRSC global table. A witness provides a cost-effective alternative to a full replica in a MRSC global table by maintaining replicated change data written to global table replicas. You cannot perform read or write operations on a witness. For each witness, you can request one action: Create - add a new witness to the global table. Delete - remove a witness from the global table. You can create or delete only one witness per UpdateTable operation. For more information, see Multi-Region strong consistency (MRSC) in the Amazon DynamoDB Developer Guide"
                OnDemandThroughput:
                  $ref: "#/components/schemas/OnDemandThroughput"
                  description: Updates the maximum number of read and write units for the specified table in on-demand capacity mode. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both.
                WarmThroughput:
                  $ref: "#/components/schemas/WarmThroughput"
                  description: Represents the warm throughput (in read units per second and write units per second) for updating a table.
                GlobalTableSettingsReplicationMode:
                  $ref: "#/components/schemas/GlobalTableSettingsReplicationMode"
                  description: "Controls the settings replication mode for a global table replica. This attribute can be defined using UpdateTable operation only on a regional table with values: ENABLED: Defines settings replication on a regional table to be used as a source table for creating Multi-Account Global Table. DISABLED: Remove settings replication on a regional table. Settings replication needs to be defined to ENABLED again in order to create a Multi-Account Global Table using this table."
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTableOutput"
  /UpdateTableReplicaAutoScaling:
    post:
      operationId: UpdateTableReplicaAutoScaling
      description: Updates auto scaling settings on your global tables at once.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateTableReplicaAutoScaling
            default: DynamoDB_20120810.UpdateTableReplicaAutoScaling
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                GlobalSecondaryIndexUpdates:
                  $ref: "#/components/schemas/GlobalSecondaryIndexAutoScalingUpdateList"
                  description: Represents the auto scaling settings of the global secondary indexes of the replica to be updated.
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the global table to be updated. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                ProvisionedWriteCapacityAutoScalingUpdate:
                  $ref: "#/components/schemas/AutoScalingSettingsUpdate"
                ReplicaUpdates:
                  $ref: "#/components/schemas/ReplicaAutoScalingUpdateList"
                  description: Represents the auto scaling settings of replicas of the table that will be modified.
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTableReplicaAutoScalingOutput"
  /UpdateTimeToLive:
    post:
      operationId: UpdateTimeToLive
      description: The UpdateTimeToLive method enables or disables Time to Live (TTL) for the specified table. A successful UpdateTimeToLive call returns the current TimeToLiveSpecification. It can take up to one hour for the change to fully process. Any additional UpdateTimeToLive calls for the same table during this one hour duration result in a ValidationException. TTL compares the current time in epoch time format to the time stored in the TTL attribute of an item. If the epoch time value stored in the attribute is less than the current time, the item is marked as expired and subsequently deleted. The epoch time format is the number of seconds elapsed since 12:00:00 AM January 1, 1970 UTC. DynamoDB deletes expired items on a best-effort basis to ensure availability of throughput for other data operations. DynamoDB typically deletes expired items within two days of expiration. The exact duration within which an item gets deleted after expiration is specific to the nature of the workload. Items that have expired and not been deleted will still show up in reads, queries, and scans. As items are deleted, they are removed from any local secondary index and global secondary index immediately in the same eventually consistent way as a standard delete operation. For more information, see Time To Live in the Amazon DynamoDB Developer Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.UpdateTimeToLive
            default: DynamoDB_20120810.UpdateTimeToLive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table to be configured. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                TimeToLiveSpecification:
                  $ref: "#/components/schemas/TimeToLiveSpecification"
                  description: Represents the settings used to enable or disable Time to Live for the specified table.
              required:
                - TableName
                - TimeToLiveSpecification
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTimeToLiveOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    PartiQLBatchRequest:
      type: array
      items:
        $ref: "#/components/schemas/BatchStatementRequest"
    BatchStatementRequest:
      description: A PartiQL batch statement request.
      type: object
      properties:
        Statement:
          $ref: "#/components/schemas/PartiQLStatement"
          description: A valid PartiQL statement.
        Parameters:
          $ref: "#/components/schemas/PreparedStatementParameters"
          description: The parameters associated with a PartiQL statement in the batch request.
        ConsistentRead:
          $ref: "#/components/schemas/ConsistentRead"
          description: The read consistency of the PartiQL batch request.
        ReturnValuesOnConditionCheckFailure:
          $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
          description: An optional parameter that returns the item attributes for a PartiQL batch request operation that failed a condition check. There is no additional cost associated with requesting a return value aside from the small network and processing overhead of receiving a larger response. No read capacity units are consumed.
      required:
        - Statement
    PartiQLStatement:
      type: string
      minLength: 1
      maxLength: 8192
    PreparedStatementParameters:
      type: array
      items:
        $ref: "#/components/schemas/AttributeValue"
    AttributeValue:
      description: Represents the data for an attribute. Each attribute value is described as a name-value pair. The name is the data type, and the value is the data itself. For more information, see Data Types in the Amazon DynamoDB Developer Guide.
      type: object
      properties:
        S:
          $ref: "#/components/schemas/StringAttributeValue"
          description: 'An attribute of type String. For example: "S": "Hello"'
        "N":
          $ref: "#/components/schemas/NumberAttributeValue"
          description: 'An attribute of type Number. For example: "N": "123.45" Numbers are sent across the network to DynamoDB as strings, to maximize compatibility across languages and libraries. However, DynamoDB treats them as number type attributes for mathematical operations.'
        B:
          $ref: "#/components/schemas/BinaryAttributeValue"
          description: 'An attribute of type Binary. For example: "B": "dGhpcyB0ZXh0IGlzIGJhc2U2NC1lbmNvZGVk"'
        SS:
          $ref: "#/components/schemas/StringSetAttributeValue"
          description: 'An attribute of type String Set. For example: "SS": ["Giraffe", "Hippo" ,"Zebra"]'
        NS:
          $ref: "#/components/schemas/NumberSetAttributeValue"
          description: 'An attribute of type Number Set. For example: "NS": ["42.2", "-19", "7.5", "3.14"] Numbers are sent across the network to DynamoDB as strings, to maximize compatibility across languages and libraries. However, DynamoDB treats them as number type attributes for mathematical operations.'
        BS:
          $ref: "#/components/schemas/BinarySetAttributeValue"
          description: 'An attribute of type Binary Set. For example: "BS": ["U3Vubnk=", "UmFpbnk=", "U25vd3k="]'
        M:
          type: object
          properties: {}
          description: 'An attribute of type Map. For example: "M": {"Name": {"S": "Joe"}, "Age": {"N": "35"}}'
        L:
          $ref: "#/components/schemas/ListAttributeValue"
          description: 'An attribute of type List. For example: "L": [ {"S": "Cookies"} , {"S": "Coffee"}, {"N": "3.14159"}]'
        "NULL":
          $ref: "#/components/schemas/NullAttributeValue"
          description: 'An attribute of type Null. For example: "NULL": true'
        BOOL:
          $ref: "#/components/schemas/BooleanAttributeValue"
          description: 'An attribute of type Boolean. For example: "BOOL": true'
    StringAttributeValue:
      type: string
    NumberAttributeValue:
      type: string
    BinaryAttributeValue:
      type: string
      format: byte
    StringSetAttributeValue:
      type: array
      items:
        $ref: "#/components/schemas/StringAttributeValue"
    NumberSetAttributeValue:
      type: array
      items:
        $ref: "#/components/schemas/NumberAttributeValue"
    BinarySetAttributeValue:
      type: array
      items:
        $ref: "#/components/schemas/BinaryAttributeValue"
    ListAttributeValue:
      type: array
      items:
        $ref: "#/components/schemas/AttributeValue"
    NullAttributeValue:
      type: boolean
    BooleanAttributeValue:
      type: boolean
    ConsistentRead:
      type: boolean
    ReturnValuesOnConditionCheckFailure:
      type: string
      enum:
        - ALL_OLD
        - NONE
    ReturnConsumedCapacity:
      description: "Determines the level of detail about either provisioned or on-demand throughput consumption that is returned in the response: INDEXES - The response includes the aggregate ConsumedCapacity for the operation, together with ConsumedCapacity for each table and secondary index that was accessed. Note that some operations, such as GetItem and BatchGetItem, do not access any indexes at all. In these cases, specifying INDEXES will only return ConsumedCapacity information for table(s). TOTAL - The response includes only the aggregate ConsumedCapacity for the operation. NONE - No ConsumedCapacity details are included in the response."
      type: string
      enum:
        - INDEXES
        - TOTAL
        - NONE
    BatchExecuteStatementOutput:
      type: object
      properties:
        Responses:
          $ref: "#/components/schemas/PartiQLBatchResponse"
          description: The response to each PartiQL statement in the batch. The values of the list are ordered according to the ordering of the request statements.
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacityMultiple"
          description: The capacity units consumed by the entire operation. The values of the list are ordered according to the ordering of the statements.
    PartiQLBatchResponse:
      type: array
      items:
        $ref: "#/components/schemas/BatchStatementResponse"
    BatchStatementResponse:
      description: A PartiQL batch statement response..
      type: object
      properties:
        Error:
          $ref: "#/components/schemas/BatchStatementError"
          description: The error associated with a failed PartiQL batch statement.
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The table name associated with a failed PartiQL batch statement.
        Item:
          type: object
          properties: {}
          description: A DynamoDB item associated with a BatchStatementResponse
    BatchStatementError:
      description: An error associated with a statement in a PartiQL batch that was run.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/BatchStatementErrorCodeEnum"
          description: The error code associated with the failed PartiQL batch statement.
        Message:
          $ref: "#/components/schemas/String"
          description: The error message associated with the PartiQL batch response.
        Item:
          type: object
          properties: {}
          description: The item which caused the condition check to fail. This will be set if ReturnValuesOnConditionCheckFailure is specified as ALL_OLD.
    BatchStatementErrorCodeEnum:
      type: string
      enum:
        - ConditionalCheckFailed
        - ItemCollectionSizeLimitExceeded
        - RequestLimitExceeded
        - ValidationError
        - ProvisionedThroughputExceeded
        - TransactionConflict
        - ThrottlingError
        - InternalServerError
        - ResourceNotFound
        - AccessDenied
        - DuplicateItem
    String:
      type: string
    TableName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    ConsumedCapacityMultiple:
      type: array
      items:
        $ref: "#/components/schemas/ConsumedCapacity"
    ConsumedCapacity:
      description: The capacity units consumed by an operation. The data returned includes the total provisioned throughput consumed, along with statistics for the table and any indexes involved in the operation. ConsumedCapacity is only returned if the request asked for it. For more information, see Provisioned capacity mode in the Amazon DynamoDB Developer Guide.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/TableArn"
          description: The name of the table that was affected by the operation. If you had specified the Amazon Resource Name (ARN) of a table in the input, you'll see the table ARN in the response.
        CapacityUnits:
          $ref: "#/components/schemas/ConsumedCapacityUnits"
          description: The total number of capacity units consumed by the operation.
        ReadCapacityUnits:
          $ref: "#/components/schemas/ConsumedCapacityUnits"
          description: The total number of read capacity units consumed by the operation.
        WriteCapacityUnits:
          $ref: "#/components/schemas/ConsumedCapacityUnits"
          description: The total number of write capacity units consumed by the operation.
        Table:
          $ref: "#/components/schemas/Capacity"
          description: The amount of throughput consumed on the table affected by the operation.
        LocalSecondaryIndexes:
          type: object
          properties: {}
          description: The amount of throughput consumed on each local index affected by the operation.
        GlobalSecondaryIndexes:
          type: object
          properties: {}
          description: The amount of throughput consumed on each global index affected by the operation.
    TableArn:
      type: string
      minLength: 1
      maxLength: 1024
    ConsumedCapacityUnits:
      type: number
      format: double
    Capacity:
      description: Represents the amount of provisioned throughput capacity consumed on a table or an index.
      type: object
      properties:
        ReadCapacityUnits:
          $ref: "#/components/schemas/ConsumedCapacityUnits"
          description: The total number of read capacity units consumed on a table or an index.
        WriteCapacityUnits:
          $ref: "#/components/schemas/ConsumedCapacityUnits"
          description: The total number of write capacity units consumed on a table or an index.
        CapacityUnits:
          $ref: "#/components/schemas/ConsumedCapacityUnits"
          description: The total number of capacity units consumed on a table or an index.
    BatchGetRequestMap:
      type: object
      properties: {}
    BatchGetItemOutput:
      description: Represents the output of a BatchGetItem operation.
      type: object
      properties:
        Responses:
          type: object
          properties: {}
          description: A map of table name or table ARN to a list of items. Each object in Responses consists of a table name or ARN, along with a map of attribute data consisting of the data type and attribute value.
        UnprocessedKeys:
          type: object
          properties: {}
          description: "A map of tables and their respective keys that were not processed with the current response. The UnprocessedKeys value is in the same form as RequestItems, so the value can be provided directly to a subsequent BatchGetItem operation. For more information, see RequestItems in the Request Parameters section. Each element consists of: Keys - An array of primary key attribute values that define specific items in the table. ProjectionExpression - One or more attributes to be retrieved from the table or index. By default, all attributes are returned. If a requested attribute is not found, it does not appear in the result. ConsistentRead - The consistency of a read operation. If set to true, then a strongly consistent read is used; otherwise, an eventually consistent read is used. If there are no unprocessed keys remaining, the response contains an empty UnprocessedKeys map."
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacityMultiple"
          description: "The read capacity units consumed by the entire BatchGetItem operation. Each element consists of: TableName - The table that consumed the provisioned throughput. CapacityUnits - The total number of capacity units consumed."
    BatchWriteItemRequestMap:
      type: object
      properties: {}
    ReturnItemCollectionMetrics:
      type: string
      enum:
        - SIZE
        - NONE
    BatchWriteItemOutput:
      description: Represents the output of a BatchWriteItem operation.
      type: object
      properties:
        UnprocessedItems:
          type: object
          properties: {}
          description: "A map of tables and requests against those tables that were not processed. The UnprocessedItems value is in the same form as RequestItems, so you can provide this value directly to a subsequent BatchWriteItem operation. For more information, see RequestItems in the Request Parameters section. Each UnprocessedItems entry consists of a table name or table ARN and, for that table, a list of operations to perform (DeleteRequest or PutRequest). DeleteRequest - Perform a DeleteItem operation on the specified item. The item to be deleted is identified by a Key subelement: Key - A map of primary key attribute values that uniquely identify the item. Each entry in this map consists of an attribute name and an attribute value. PutRequest - Perform a PutItem operation on the specified item. The item to be put is identified by an Item subelement: Item - A map of attributes and their values. Each entry in this map consists of an attribute name and an attribute value. Attribute values must not be null; string and binary type attributes must have lengths greater than zero; and set type attributes must not be empty. Requests that contain empty values will be rejected with a ValidationException exception. If you specify any attributes that are part of an index key, then the data types for those attributes must match those of the schema in the table's attribute definition. If there are no unprocessed items remaining, the response contains an empty UnprocessedItems map."
        ItemCollectionMetrics:
          type: object
          properties: {}
          description: "A list of tables that were processed by BatchWriteItem and, for each table, information about any item collections that were affected by individual DeleteItem or PutItem operations. Each entry consists of the following subelements: ItemCollectionKey - The partition key value of the item collection. This is the same as the partition key value of the item. SizeEstimateRangeGB - An estimate of item collection size, expressed in GB. This is a two-element array containing a lower bound and an upper bound for the estimate. The estimate includes the size of all the items in the table, plus the size of all attributes projected into all of the local secondary indexes on the table. Use this estimate to measure whether a local secondary index is approaching its size limit. The estimate is subject to change over time; therefore, do not rely on the precision or accuracy of the estimate."
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacityMultiple"
          description: "The capacity units consumed by the entire BatchWriteItem operation. Each element consists of: TableName - The table that consumed the provisioned throughput. CapacityUnits - The total number of capacity units consumed."
    BackupName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    CreateBackupOutput:
      type: object
      properties:
        BackupDetails:
          $ref: "#/components/schemas/BackupDetails"
          description: Contains the details of the backup created for the table.
    BackupDetails:
      description: Contains the details of the backup created for the table.
      type: object
      properties:
        BackupArn:
          $ref: "#/components/schemas/BackupArn"
          description: ARN associated with the backup.
        BackupName:
          $ref: "#/components/schemas/BackupName"
          description: Name of the requested backup.
        BackupSizeBytes:
          $ref: "#/components/schemas/BackupSizeBytes"
          description: Size of the backup in bytes. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        BackupStatus:
          $ref: "#/components/schemas/BackupStatus"
          description: "Backup can be in one of the following states: CREATING, ACTIVE, DELETED."
        BackupType:
          $ref: "#/components/schemas/BackupType"
          description: "BackupType: USER - You create and manage these using the on-demand backup feature. SYSTEM - If you delete a table with point-in-time recovery enabled, a SYSTEM backup is automatically created and is retained for 35 days (at no additional cost). System backups allow you to restore the deleted table to the state it was in just before the point of deletion. AWS_BACKUP - On-demand backup created by you from Backup service."
        BackupCreationDateTime:
          $ref: "#/components/schemas/BackupCreationDateTime"
          description: Time at which the backup was created. This is the request time of the backup.
        BackupExpiryDateTime:
          $ref: "#/components/schemas/Date"
          description: Time at which the automatic on-demand backup created by DynamoDB will expire. This SYSTEM on-demand backup expires automatically 35 days after its creation.
      required:
        - BackupArn
        - BackupName
        - BackupStatus
        - BackupType
        - BackupCreationDateTime
    BackupArn:
      type: string
      minLength: 37
      maxLength: 1024
    BackupSizeBytes:
      type: integer
      format: int64
      minimum: 0
    BackupStatus:
      type: string
      enum:
        - CREATING
        - DELETED
        - AVAILABLE
    BackupType:
      type: string
      enum:
        - USER
        - SYSTEM
        - AWS_BACKUP
    BackupCreationDateTime:
      type: string
      format: date-time
    Date:
      type: string
      format: date-time
    ReplicaList:
      type: array
      items:
        $ref: "#/components/schemas/Replica"
    Replica:
      description: Represents the properties of a replica.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region where the replica needs to be created.
    RegionName:
      type: string
    CreateGlobalTableOutput:
      type: object
      properties:
        GlobalTableDescription:
          $ref: "#/components/schemas/GlobalTableDescription"
          description: Contains the details of the global table.
    GlobalTableDescription:
      description: Contains details about the global table.
      type: object
      properties:
        ReplicationGroup:
          $ref: "#/components/schemas/ReplicaDescriptionList"
          description: The Regions where the global table has replicas.
        GlobalTableArn:
          $ref: "#/components/schemas/GlobalTableArnString"
          description: The unique identifier of the global table.
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The creation time of the global table.
        GlobalTableStatus:
          $ref: "#/components/schemas/GlobalTableStatus"
          description: "The current state of the global table: CREATING - The global table is being created. UPDATING - The global table is being updated. DELETING - The global table is being deleted. ACTIVE - The global table is ready for use."
        GlobalTableName:
          $ref: "#/components/schemas/TableName"
          description: The global table name.
    ReplicaDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaDescription"
    ReplicaDescription:
      description: Contains the details of the replica.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The name of the Region.
        ReplicaStatus:
          $ref: "#/components/schemas/ReplicaStatus"
          description: "The current state of the replica: CREATING - The replica is being created. UPDATING - The replica is being updated. DELETING - The replica is being deleted. ACTIVE - The replica is ready for use. REGION_DISABLED - The replica is inaccessible because the Amazon Web Services Region has been disabled. If the Amazon Web Services Region remains inaccessible for more than 20 hours, DynamoDB will remove this replica from the replication group. The replica will not be deleted and replication will stop from and to this region. INACCESSIBLE_ENCRYPTION_CREDENTIALS - The KMS key used to encrypt the table is inaccessible. If the KMS key remains inaccessible for more than 20 hours, DynamoDB will remove this replica from the replication group. The replica will not be deleted and replication will stop from and to this region."
        ReplicaArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the global table replica.
        ReplicaStatusDescription:
          $ref: "#/components/schemas/ReplicaStatusDescription"
          description: Detailed information about the replica status.
        ReplicaStatusPercentProgress:
          $ref: "#/components/schemas/ReplicaStatusPercentProgress"
          description: Specifies the progress of a Create, Update, or Delete action on the replica as a percentage.
        KMSMasterKeyId:
          $ref: "#/components/schemas/KMSMasterKeyId"
          description: The KMS key of the replica that will be used for KMS encryption.
        ProvisionedThroughputOverride:
          $ref: "#/components/schemas/ProvisionedThroughputOverride"
          description: Replica-specific provisioned throughput. If not described, uses the source table's provisioned throughput settings.
        OnDemandThroughputOverride:
          $ref: "#/components/schemas/OnDemandThroughputOverride"
          description: Overrides the maximum on-demand throughput settings for the specified replica table.
        WarmThroughput:
          $ref: "#/components/schemas/TableWarmThroughputDescription"
          description: Represents the warm throughput value for this replica.
        GlobalSecondaryIndexes:
          $ref: "#/components/schemas/ReplicaGlobalSecondaryIndexDescriptionList"
          description: Replica-specific global secondary index settings.
        ReplicaInaccessibleDateTime:
          $ref: "#/components/schemas/Date"
          description: The time at which the replica was first detected as inaccessible. To determine cause of inaccessibility check the ReplicaStatus property.
        ReplicaTableClassSummary:
          $ref: "#/components/schemas/TableClassSummary"
        GlobalTableSettingsReplicationMode:
          $ref: "#/components/schemas/GlobalTableSettingsReplicationMode"
          description: "Indicates one of the settings synchronization modes for the global table replica: ENABLED: Indicates that the settings synchronization mode for the global table replica is enabled. DISABLED: Indicates that the settings synchronization mode for the global table replica is disabled. ENABLED_WITH_OVERRIDES: This mode is set by default for a same account global table. Indicates that certain global table settings can be overridden."
    ReplicaStatus:
      type: string
      enum:
        - CREATING
        - CREATION_FAILED
        - UPDATING
        - DELETING
        - ACTIVE
        - REGION_DISABLED
        - INACCESSIBLE_ENCRYPTION_CREDENTIALS
        - ARCHIVING
        - ARCHIVED
        - REPLICATION_NOT_AUTHORIZED
    ReplicaStatusDescription:
      type: string
    ReplicaStatusPercentProgress:
      type: string
    KMSMasterKeyId:
      type: string
    ProvisionedThroughputOverride:
      description: Replica-specific provisioned throughput settings. If not specified, uses the source table's provisioned throughput settings.
      type: object
      properties:
        ReadCapacityUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: Replica-specific read capacity units. If not specified, uses the source table's read capacity settings.
    PositiveLongObject:
      type: integer
      format: int64
      minimum: 1
    OnDemandThroughputOverride:
      description: Overrides the on-demand throughput settings for this replica table. If you don't specify a value for this parameter, it uses the source table's on-demand throughput settings.
      type: object
      properties:
        MaxReadRequestUnits:
          $ref: "#/components/schemas/LongObject"
          description: Maximum number of read request units for the specified replica table.
    LongObject:
      type: integer
      format: int64
    TableWarmThroughputDescription:
      description: Represents the warm throughput value (in read units per second and write units per second) of the table. Warm throughput is applicable for DynamoDB Standard-IA tables and specifies the minimum provisioned capacity maintained for immediate data access.
      type: object
      properties:
        ReadUnitsPerSecond:
          $ref: "#/components/schemas/PositiveLongObject"
          description: Represents the base table's warm throughput value in read units per second.
        WriteUnitsPerSecond:
          $ref: "#/components/schemas/PositiveLongObject"
          description: Represents the base table's warm throughput value in write units per second.
        Status:
          $ref: "#/components/schemas/TableStatus"
          description: Represents warm throughput value of the base table.
    TableStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - ACTIVE
        - INACCESSIBLE_ENCRYPTION_CREDENTIALS
        - ARCHIVING
        - ARCHIVED
        - REPLICATION_NOT_AUTHORIZED
    ReplicaGlobalSecondaryIndexDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaGlobalSecondaryIndexDescription"
    ReplicaGlobalSecondaryIndexDescription:
      description: Represents the properties of a replica global secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index.
        ProvisionedThroughputOverride:
          $ref: "#/components/schemas/ProvisionedThroughputOverride"
          description: If not described, uses the source table GSI's read capacity settings.
        OnDemandThroughputOverride:
          $ref: "#/components/schemas/OnDemandThroughputOverride"
          description: Overrides the maximum on-demand throughput for the specified global secondary index in the specified replica table.
        WarmThroughput:
          $ref: "#/components/schemas/GlobalSecondaryIndexWarmThroughputDescription"
          description: Represents the warm throughput of the global secondary index for this replica.
    IndexName:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    GlobalSecondaryIndexWarmThroughputDescription:
      description: The description of the warm throughput value on a global secondary index.
      type: object
      properties:
        ReadUnitsPerSecond:
          $ref: "#/components/schemas/PositiveLongObject"
          description: Represents warm throughput read units per second value for a global secondary index.
        WriteUnitsPerSecond:
          $ref: "#/components/schemas/PositiveLongObject"
          description: Represents warm throughput write units per second value for a global secondary index.
        Status:
          $ref: "#/components/schemas/IndexStatus"
          description: Represents the warm throughput status being created or updated on a global secondary index. The status can only be UPDATING or ACTIVE.
    IndexStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - ACTIVE
    TableClassSummary:
      description: Contains details of the table class.
      type: object
      properties:
        TableClass:
          $ref: "#/components/schemas/TableClass"
          description: The table class of the specified table. Valid values are STANDARD and STANDARD_INFREQUENT_ACCESS.
        LastUpdateDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time at which the table class was last updated.
    TableClass:
      type: string
      enum:
        - STANDARD
        - STANDARD_INFREQUENT_ACCESS
    GlobalTableSettingsReplicationMode:
      type: string
      enum:
        - ENABLED
        - DISABLED
        - ENABLED_WITH_OVERRIDES
    GlobalTableArnString:
      type: string
    GlobalTableStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - UPDATING
    AttributeDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/AttributeDefinition"
    AttributeDefinition:
      description: Represents an attribute for describing the schema for the table and indexes.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/KeySchemaAttributeName"
          description: A name for the attribute.
        AttributeType:
          $ref: "#/components/schemas/ScalarAttributeType"
          description: "The data type for the attribute, where: S - the attribute is of type String N - the attribute is of type Number B - the attribute is of type Binary"
      required:
        - AttributeName
        - AttributeType
    KeySchemaAttributeName:
      type: string
      minLength: 1
      maxLength: 255
    ScalarAttributeType:
      type: string
      enum:
        - S
        - "N"
        - B
    KeySchema:
      type: array
      items:
        $ref: "#/components/schemas/KeySchemaElement"
    KeySchemaElement:
      description: Represents a single element of a key schema. A key schema specifies the attributes that make up the primary key of a table, or the key attributes of an index. A KeySchemaElement represents exactly one attribute of the primary key. For example, a simple primary key would be represented by one KeySchemaElement (for the partition key). A composite primary key would require one KeySchemaElement for the partition key, and another KeySchemaElement for the sort key. A KeySchemaElement must be a scalar, top-level attribute (not a nested attribute). The data type must be one of String, Number, or Binary. The attribute cannot be nested within a List or a Map.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/KeySchemaAttributeName"
          description: The name of a key attribute.
        KeyType:
          $ref: "#/components/schemas/KeyType"
          description: "The role that this key attribute will assume: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
      required:
        - AttributeName
        - KeyType
    KeyType:
      type: string
      enum:
        - HASH
        - RANGE
    LocalSecondaryIndexList:
      type: array
      items:
        $ref: "#/components/schemas/LocalSecondaryIndex"
    LocalSecondaryIndex:
      description: Represents the properties of a local secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the local secondary index. The name must be unique among all other indexes on this table.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The complete key schema for the local secondary index, consisting of one or more pairs of attribute names and key types: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into the local secondary index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
      required:
        - IndexName
        - KeySchema
        - Projection
    Projection:
      description: Represents attributes that are copied (projected) from the table into an index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
      type: object
      properties:
        ProjectionType:
          $ref: "#/components/schemas/ProjectionType"
          description: "The set of attributes that are projected into the index: KEYS_ONLY - Only the index and primary keys are projected into the index. INCLUDE - In addition to the attributes described in KEYS_ONLY, the secondary index will include other non-key attributes that you specify. ALL - All of the table attributes are projected into the index. When using the DynamoDB console, ALL is selected by default."
        NonKeyAttributes:
          $ref: "#/components/schemas/NonKeyAttributeNameList"
          description: Represents the non-key attribute names which will be projected into the index. For global and local secondary indexes, the total count of NonKeyAttributes summed across all of the secondary indexes, must not exceed 100. If you project the same attribute into two different indexes, this counts as two distinct attributes when determining the total. This limit only applies when you specify the ProjectionType of INCLUDE. You still can specify the ProjectionType of ALL to project all attributes from the source table, even if the table has more than 100 attributes.
    ProjectionType:
      type: string
      enum:
        - ALL
        - KEYS_ONLY
        - INCLUDE
    NonKeyAttributeNameList:
      type: array
      items:
        $ref: "#/components/schemas/NonKeyAttributeName"
    NonKeyAttributeName:
      type: string
      minLength: 1
      maxLength: 255
    GlobalSecondaryIndexList:
      type: array
      items:
        $ref: "#/components/schemas/GlobalSecondaryIndex"
    GlobalSecondaryIndex:
      description: Represents the properties of a global secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index. The name must be unique among all other indexes on this table.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The complete key schema for a global secondary index, which consists of one or more pairs of attribute names and key types: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into the global secondary index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughput"
          description: Represents the provisioned throughput settings for the specified global secondary index. You must use either OnDemandThroughput or ProvisionedThroughput based on your table's capacity mode. For current minimum and maximum provisioned throughput values, see Service, Account, and Table Quotas in the Amazon DynamoDB Developer Guide.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
          description: The maximum number of read and write units for the specified global secondary index. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both. You must use either OnDemandThroughput or ProvisionedThroughput based on your table's capacity mode.
        WarmThroughput:
          $ref: "#/components/schemas/WarmThroughput"
          description: Represents the warm throughput value (in read units per second and write units per second) for the specified secondary index. If you use this parameter, you must specify ReadUnitsPerSecond, WriteUnitsPerSecond, or both.
      required:
        - IndexName
        - KeySchema
        - Projection
    ProvisionedThroughput:
      description: Represents the provisioned throughput settings for the specified global secondary index. You must use ProvisionedThroughput or OnDemandThroughput based on your table’s capacity mode. For current minimum and maximum provisioned throughput values, see Service, Account, and Table Quotas in the Amazon DynamoDB Developer Guide.
      type: object
      properties:
        ReadCapacityUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The maximum number of strongly consistent reads consumed per second before DynamoDB returns a ThrottlingException. For more information, see Specifying Read and Write Requirements in the Amazon DynamoDB Developer Guide. If read/write capacity mode is PAY_PER_REQUEST the value is set to 0.
        WriteCapacityUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The maximum number of writes consumed per second before DynamoDB returns a ThrottlingException. For more information, see Specifying Read and Write Requirements in the Amazon DynamoDB Developer Guide. If read/write capacity mode is PAY_PER_REQUEST the value is set to 0.
      required:
        - ReadCapacityUnits
        - WriteCapacityUnits
    OnDemandThroughput:
      description: Sets the maximum number of read and write units for the specified on-demand table. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both.
      type: object
      properties:
        MaxReadRequestUnits:
          $ref: "#/components/schemas/LongObject"
          description: Maximum number of read request units for the specified table. To specify a maximum OnDemandThroughput on your table, set the value of MaxReadRequestUnits as greater than or equal to 1. To remove the maximum OnDemandThroughput that is currently set on your table, set the value of MaxReadRequestUnits to -1.
        MaxWriteRequestUnits:
          $ref: "#/components/schemas/LongObject"
          description: Maximum number of write request units for the specified table. To specify a maximum OnDemandThroughput on your table, set the value of MaxWriteRequestUnits as greater than or equal to 1. To remove the maximum OnDemandThroughput that is currently set on your table, set the value of MaxWriteRequestUnits to -1.
    WarmThroughput:
      description: Provides visibility into the number of read and write operations your table or secondary index can instantaneously support. The settings can be modified using the UpdateTable operation to meet the throughput requirements of an upcoming peak event.
      type: object
      properties:
        ReadUnitsPerSecond:
          $ref: "#/components/schemas/LongObject"
          description: Represents the number of read operations your base table can instantaneously support.
        WriteUnitsPerSecond:
          $ref: "#/components/schemas/LongObject"
          description: Represents the number of write operations your base table can instantaneously support.
    BillingMode:
      type: string
      enum:
        - PROVISIONED
        - PAY_PER_REQUEST
    StreamSpecification:
      description: Represents the DynamoDB Streams configuration for a table in DynamoDB.
      type: object
      properties:
        StreamEnabled:
          $ref: "#/components/schemas/StreamEnabled"
          description: Indicates whether DynamoDB Streams is enabled (true) or disabled (false) on the table.
        StreamViewType:
          $ref: "#/components/schemas/StreamViewType"
          description: "When an item in the table is modified, StreamViewType determines what information is written to the stream for this table. Valid values for StreamViewType are: KEYS_ONLY - Only the key attributes of the modified item are written to the stream. NEW_IMAGE - The entire item, as it appears after it was modified, is written to the stream. OLD_IMAGE - The entire item, as it appeared before it was modified, is written to the stream. NEW_AND_OLD_IMAGES - Both the new and the old item images of the item are written to the stream."
      required:
        - StreamEnabled
    StreamEnabled:
      type: boolean
    StreamViewType:
      type: string
      enum:
        - NEW_IMAGE
        - OLD_IMAGE
        - NEW_AND_OLD_IMAGES
        - KEYS_ONLY
    SSESpecification:
      description: Represents the settings used to enable server-side encryption.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/SSEEnabled"
          description: Indicates whether server-side encryption is done using an Amazon Web Services managed key or an Amazon Web Services owned key. If enabled (true), server-side encryption type is set to KMS and an Amazon Web Services managed key is used (KMS charges apply). If disabled (false) or not specified, server-side encryption is set to Amazon Web Services owned key.
        SSEType:
          $ref: "#/components/schemas/SSEType"
          description: "Server-side encryption type. The only supported value is: KMS - Server-side encryption that uses Key Management Service. The key is stored in your account and is managed by KMS (KMS charges apply)."
        KMSMasterKeyId:
          $ref: "#/components/schemas/KMSMasterKeyId"
          description: The KMS key that should be used for the KMS encryption. To specify a key, use its key ID, Amazon Resource Name (ARN), alias name, or alias ARN. Note that you should only provide this parameter if the key is different from the default DynamoDB key alias/aws/dynamodb.
    SSEEnabled:
      type: boolean
    SSEType:
      type: string
      enum:
        - AES256
        - KMS
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "Describes a tag. A tag is a key-value pair. You can add up to 50 tags to a single DynamoDB table. Amazon Web Services-assigned tag names and values are automatically assigned the aws: prefix, which the user cannot assign. Amazon Web Services-assigned tag names do not count towards the tag limit of 50. User-assigned tag names have the prefix user: in the Cost Allocation Report. You cannot backdate the application of a tag. For an overview on tagging DynamoDB resources, see Tagging for DynamoDB in the Amazon DynamoDB Developer Guide."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKeyString"
          description: The key of the tag. Tag keys are case sensitive. Each DynamoDB table can only have up to one tag with the same key. If you try to add an existing tag (same key), the existing tag value will be updated to the new value.
        Value:
          $ref: "#/components/schemas/TagValueString"
          description: The value of the tag. Tag values are case-sensitive and can be null.
      required:
        - Key
        - Value
    TagKeyString:
      type: string
      minLength: 1
      maxLength: 128
    TagValueString:
      type: string
      minLength: 0
      maxLength: 256
    DeletionProtectionEnabled:
      type: boolean
    ResourcePolicy:
      type: string
    CreateTableOutput:
      description: Represents the output of a CreateTable operation.
      type: object
      properties:
        TableDescription:
          $ref: "#/components/schemas/TableDescription"
          description: Represents the properties of the table.
    TableDescription:
      description: Represents the properties of a table.
      type: object
      properties:
        AttributeDefinitions:
          $ref: "#/components/schemas/AttributeDefinitions"
          description: "An array of AttributeDefinition objects. Each of these objects describes one attribute in the table and index key schema. Each AttributeDefinition object in this array is composed of: AttributeName - The name of the attribute. AttributeType - The data type for the attribute."
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The primary key structure for the table. Each KeySchemaElement consists of: AttributeName - The name of the attribute. KeyType - The role of the attribute: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value. For more information about primary keys, see Primary Key in the Amazon DynamoDB Developer Guide."
        TableStatus:
          $ref: "#/components/schemas/TableStatus"
          description: "The current state of the table: CREATING - The table is being created. UPDATING - The table/index configuration is being updated. The table/index remains available for data operations when UPDATING. DELETING - The table is being deleted. ACTIVE - The table is ready for use. INACCESSIBLE_ENCRYPTION_CREDENTIALS - The KMS key used to encrypt the table in inaccessible. Table operations may fail due to failure to use the KMS key. DynamoDB will initiate the table archival process when a table's KMS key remains inaccessible for more than seven days. ARCHIVING - The table is being archived. Operations are not allowed until archival is complete. ARCHIVED - The table has been archived. See the ArchivalReason for more information."
        CreationDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the table was created, in UNIX epoch time format.
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughputDescription"
          description: The provisioned throughput settings for the table, consisting of read and write capacity units, along with data about increases and decreases.
        TableSizeBytes:
          $ref: "#/components/schemas/LongObject"
          description: The total size of the specified table, in bytes. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        ItemCount:
          $ref: "#/components/schemas/LongObject"
          description: The number of items in the specified table. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        TableArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the table.
        TableId:
          $ref: "#/components/schemas/TableId"
          description: Unique identifier for the table for which the backup was created.
        BillingModeSummary:
          $ref: "#/components/schemas/BillingModeSummary"
          description: Contains the details for the read/write capacity mode.
        LocalSecondaryIndexes:
          $ref: "#/components/schemas/LocalSecondaryIndexDescriptionList"
          description: "Represents one or more local secondary indexes on the table. Each index is scoped to a given partition key value. Tables with one or more local secondary indexes are subject to an item collection size limit, where the amount of data within a given item collection cannot exceed 10 GB. Each element is composed of: IndexName - The name of the local secondary index. KeySchema - Specifies the complete index key schema. The attribute names in the key schema must be between 1 and 255 characters (inclusive). The key schema must begin with the same partition key as the table. Projection - Specifies attributes that are copied (projected) from the table into the index. These are in addition to the primary key attributes and index key attributes, which are automatically projected. Each attribute specification is composed of: ProjectionType - One of the following: KEYS_ONLY - Only the index and primary keys are projected into the index. INCLUDE - Only the specified table attributes are projected into the index. The list of projected attributes is in NonKeyAttributes. ALL - All of the table attributes are projected into the index. NonKeyAttributes - A list of one or more non-key attribute names that are projected into the secondary index. The total count of attributes provided in NonKeyAttributes, summed across all of the secondary indexes, must not exceed 100. If you project the same attribute into two different indexes, this counts as two distinct attributes when determining the total. This limit only applies when you specify the ProjectionType of INCLUDE. You still can specify the ProjectionType of ALL to project all attributes from the source table, even if the table has more than 100 attributes. IndexSizeBytes - Represents the total size of the index, in bytes. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value. ItemCount - Represents the number of items in the index. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value. If the table is in the DELETING state, no information about indexes will be returned."
        GlobalSecondaryIndexes:
          $ref: "#/components/schemas/GlobalSecondaryIndexDescriptionList"
          description: "The global secondary indexes, if any, on the table. Each index is scoped to a given partition key value. Each element is composed of: Backfilling - If true, then the index is currently in the backfilling phase. Backfilling occurs only when a new global secondary index is added to the table. It is the process by which DynamoDB populates the new index with data from the table. (This attribute does not appear for indexes that were created during a CreateTable operation.) You can delete an index that is being created during the Backfilling phase when IndexStatus is set to CREATING and Backfilling is true. You can't delete the index that is being created when IndexStatus is set to CREATING and Backfilling is false. (This attribute does not appear for indexes that were created during a CreateTable operation.) IndexName - The name of the global secondary index. IndexSizeBytes - The total size of the global secondary index, in bytes. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value. IndexStatus - The current status of the global secondary index: CREATING - The index is being created. UPDATING - The index is being updated. DELETING - The index is being deleted. ACTIVE - The index is ready for use. ItemCount - The number of items in the global secondary index. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value. KeySchema - Specifies the complete index key schema. The attribute names in the key schema must be between 1 and 255 characters (inclusive). The key schema must begin with the same partition key as the table. Projection - Specifies attributes that are copied (projected) from the table into the index. These are in addition to the primary key attributes and index key attributes, which are automatically projected. Each attribute specification is composed of: ProjectionType - One of the following: KEYS_ONLY - Only the index and primary keys are projected into the index. INCLUDE - In addition to the attributes described in KEYS_ONLY, the secondary index will include other non-key attributes that you specify. ALL - All of the table attributes are projected into the index. NonKeyAttributes - A list of one or more non-key attribute names that are projected into the secondary index. The total count of attributes provided in NonKeyAttributes, summed across all of the secondary indexes, must not exceed 100. If you project the same attribute into two different indexes, this counts as two distinct attributes when determining the total. This limit only applies when you specify the ProjectionType of INCLUDE. You still can specify the ProjectionType of ALL to project all attributes from the source table, even if the table has more than 100 attributes. ProvisionedThroughput - The provisioned throughput settings for the global secondary index, consisting of read and write capacity units, along with data about increases and decreases. If the table is in the DELETING state, no information about indexes will be returned."
        StreamSpecification:
          $ref: "#/components/schemas/StreamSpecification"
          description: The current DynamoDB Streams configuration for the table.
        LatestStreamLabel:
          $ref: "#/components/schemas/String"
          description: "A timestamp, in ISO 8601 format, for this stream. Note that LatestStreamLabel is not a unique identifier for the stream, because it is possible that a stream from another table might have the same timestamp. However, the combination of the following three elements is guaranteed to be unique: Amazon Web Services customer ID Table name StreamLabel"
        LatestStreamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the latest stream for this table.
        GlobalTableVersion:
          $ref: "#/components/schemas/String"
          description: Represents the version of global tables in use, if the table is replicated across Amazon Web Services Regions.
        Replicas:
          $ref: "#/components/schemas/ReplicaDescriptionList"
          description: Represents replicas of the table.
        GlobalTableWitnesses:
          $ref: "#/components/schemas/GlobalTableWitnessDescriptionList"
          description: The witness Region and its current status in the MRSC global table. Only one witness Region can be configured per MRSC global table.
        GlobalTableSettingsReplicationMode:
          $ref: "#/components/schemas/GlobalTableSettingsReplicationMode"
          description: "Indicates one of the settings synchronization modes for the global table: ENABLED: Indicates that the settings synchronization mode for the global table is enabled. DISABLED: Indicates that the settings synchronization mode for the global table is disabled. ENABLED_WITH_OVERRIDES: This mode is set by default for a same account global table. Indicates that certain global table settings can be overridden."
        RestoreSummary:
          $ref: "#/components/schemas/RestoreSummary"
          description: Contains details for the restore.
        SSEDescription:
          $ref: "#/components/schemas/SSEDescription"
          description: The description of the server-side encryption status on the specified table.
        ArchivalSummary:
          $ref: "#/components/schemas/ArchivalSummary"
          description: Contains information about the table archive.
        TableClassSummary:
          $ref: "#/components/schemas/TableClassSummary"
          description: Contains details of the table class.
        DeletionProtectionEnabled:
          $ref: "#/components/schemas/DeletionProtectionEnabled"
          description: Indicates whether deletion protection is enabled (true) or disabled (false) on the table.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
          description: The maximum number of read and write units for the specified on-demand table. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both.
        WarmThroughput:
          $ref: "#/components/schemas/TableWarmThroughputDescription"
          description: Describes the warm throughput value of the base table.
        MultiRegionConsistency:
          $ref: "#/components/schemas/MultiRegionConsistency"
          description: "Indicates one of the following consistency modes for a global table: EVENTUAL: Indicates that the global table is configured for multi-Region eventual consistency (MREC). STRONG: Indicates that the global table is configured for multi-Region strong consistency (MRSC). If you don't specify this field, the global table consistency mode defaults to EVENTUAL. For more information about global tables consistency modes, see Consistency modes in DynamoDB developer guide."
    ProvisionedThroughputDescription:
      description: Represents the provisioned throughput settings for the table, consisting of read and write capacity units, along with data about increases and decreases.
      type: object
      properties:
        LastIncreaseDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time of the last provisioned throughput increase for this table.
        LastDecreaseDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time of the last provisioned throughput decrease for this table.
        NumberOfDecreasesToday:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The number of provisioned throughput decreases for this table during this UTC calendar day. For current maximums on provisioned throughput decreases, see Service, Account, and Table Quotas in the Amazon DynamoDB Developer Guide.
        ReadCapacityUnits:
          $ref: "#/components/schemas/NonNegativeLongObject"
          description: The maximum number of strongly consistent reads consumed per second before DynamoDB returns a ThrottlingException. Eventually consistent reads require less effort than strongly consistent reads, so a setting of 50 ReadCapacityUnits per second provides 100 eventually consistent ReadCapacityUnits per second.
        WriteCapacityUnits:
          $ref: "#/components/schemas/NonNegativeLongObject"
          description: The maximum number of writes consumed per second before DynamoDB returns a ThrottlingException.
    NonNegativeLongObject:
      type: integer
      format: int64
      minimum: 0
    TableId:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    BillingModeSummary:
      description: Contains the details for the read/write capacity mode. This page talks about PROVISIONED and PAY_PER_REQUEST billing modes. For more information about these modes, see Read/write capacity mode. You may need to switch to on-demand mode at least once in order to return a BillingModeSummary response.
      type: object
      properties:
        BillingMode:
          $ref: "#/components/schemas/BillingMode"
          description: Controls how you are charged for read and write throughput and how you manage capacity. This setting can be changed later. PROVISIONED - Sets the read/write capacity mode to PROVISIONED. We recommend using PROVISIONED for predictable workloads. PAY_PER_REQUEST - Sets the read/write capacity mode to PAY_PER_REQUEST. We recommend using PAY_PER_REQUEST for unpredictable workloads.
        LastUpdateToPayPerRequestDateTime:
          $ref: "#/components/schemas/Date"
          description: Represents the time when PAY_PER_REQUEST was last set as the read/write capacity mode.
    LocalSecondaryIndexDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/LocalSecondaryIndexDescription"
    LocalSecondaryIndexDescription:
      description: Represents the properties of a local secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: Represents the name of the local secondary index.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The complete key schema for the local secondary index, consisting of one or more pairs of attribute names and key types: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into the global secondary index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
        IndexSizeBytes:
          $ref: "#/components/schemas/LongObject"
          description: The total size of the specified index, in bytes. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        ItemCount:
          $ref: "#/components/schemas/LongObject"
          description: The number of items in the specified index. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        IndexArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the index.
    GlobalSecondaryIndexDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/GlobalSecondaryIndexDescription"
    GlobalSecondaryIndexDescription:
      description: Represents the properties of a global secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The complete key schema for a global secondary index, which consists of one or more pairs of attribute names and key types: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into the global secondary index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
        IndexStatus:
          $ref: "#/components/schemas/IndexStatus"
          description: "The current state of the global secondary index: CREATING - The index is being created. UPDATING - The index is being updated. DELETING - The index is being deleted. ACTIVE - The index is ready for use."
        Backfilling:
          $ref: "#/components/schemas/Backfilling"
          description: "Indicates whether the index is currently backfilling. Backfilling is the process of reading items from the table and determining whether they can be added to the index. (Not all items will qualify: For example, a partition key cannot have any duplicate values.) If an item can be added to the index, DynamoDB will do so. After all items have been processed, the backfilling operation is complete and Backfilling is false. You can delete an index that is being created during the Backfilling phase when IndexStatus is set to CREATING and Backfilling is true. You can't delete the index that is being created when IndexStatus is set to CREATING and Backfilling is false. For indexes that were created during a CreateTable operation, the Backfilling attribute does not appear in the DescribeTable output."
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughputDescription"
          description: Represents the provisioned throughput settings for the specified global secondary index. For current minimum and maximum provisioned throughput values, see Service, Account, and Table Quotas in the Amazon DynamoDB Developer Guide.
        IndexSizeBytes:
          $ref: "#/components/schemas/LongObject"
          description: The total size of the specified index, in bytes. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        ItemCount:
          $ref: "#/components/schemas/LongObject"
          description: The number of items in the specified index. DynamoDB updates this value approximately every six hours. Recent changes might not be reflected in this value.
        IndexArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the index.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
          description: The maximum number of read and write units for the specified global secondary index. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both.
        WarmThroughput:
          $ref: "#/components/schemas/GlobalSecondaryIndexWarmThroughputDescription"
          description: Represents the warm throughput value (in read units per second and write units per second) for the specified secondary index.
    Backfilling:
      type: boolean
    StreamArn:
      type: string
      minLength: 37
      maxLength: 1024
    GlobalTableWitnessDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/GlobalTableWitnessDescription"
    GlobalTableWitnessDescription:
      description: Represents the properties of a witness Region in a MRSC global table.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The name of the Amazon Web Services Region that serves as a witness for the MRSC global table.
        WitnessStatus:
          $ref: "#/components/schemas/WitnessStatus"
          description: The current status of the witness Region in the MRSC global table.
    WitnessStatus:
      type: string
      enum:
        - CREATING
        - DELETING
        - ACTIVE
    RestoreSummary:
      description: Contains details for the restore.
      type: object
      properties:
        SourceBackupArn:
          $ref: "#/components/schemas/BackupArn"
          description: The Amazon Resource Name (ARN) of the backup from which the table was restored.
        SourceTableArn:
          $ref: "#/components/schemas/TableArn"
          description: The ARN of the source table of the backup that is being restored.
        RestoreDateTime:
          $ref: "#/components/schemas/Date"
          description: Point in time or source backup time.
        RestoreInProgress:
          $ref: "#/components/schemas/RestoreInProgress"
          description: Indicates if a restore is in progress or not.
      required:
        - RestoreDateTime
        - RestoreInProgress
    RestoreInProgress:
      type: boolean
    SSEDescription:
      description: The description of the server-side encryption status on the specified table.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SSEStatus"
          description: "Represents the current state of server-side encryption. The only supported values are: ENABLED - Server-side encryption is enabled. UPDATING - Server-side encryption is being updated."
        SSEType:
          $ref: "#/components/schemas/SSEType"
          description: "Server-side encryption type. The only supported value is: KMS - Server-side encryption that uses Key Management Service. The key is stored in your account and is managed by KMS (KMS charges apply)."
        KMSMasterKeyArn:
          $ref: "#/components/schemas/KMSMasterKeyArn"
          description: The KMS key ARN used for the KMS encryption.
        InaccessibleEncryptionDateTime:
          $ref: "#/components/schemas/Date"
          description: Indicates the time, in UNIX epoch date format, when DynamoDB detected that the table's KMS key was inaccessible. This attribute will automatically be cleared when DynamoDB detects that the table's KMS key is accessible again. DynamoDB will initiate the table archival process when table's KMS key remains inaccessible for more than seven days from this date.
    SSEStatus:
      type: string
      enum:
        - ENABLING
        - ENABLED
        - DISABLING
        - DISABLED
        - UPDATING
    KMSMasterKeyArn:
      type: string
    ArchivalSummary:
      description: Contains details of a table archival operation.
      type: object
      properties:
        ArchivalDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when table archival was initiated by DynamoDB, in UNIX epoch time format.
        ArchivalReason:
          $ref: "#/components/schemas/ArchivalReason"
          description: "The reason DynamoDB archived the table. Currently, the only possible value is: INACCESSIBLE_ENCRYPTION_CREDENTIALS - The table was archived due to the table's KMS key being inaccessible for more than seven days. An On-Demand backup was created at the archival time."
        ArchivalBackupArn:
          $ref: "#/components/schemas/BackupArn"
          description: The Amazon Resource Name (ARN) of the backup the table was archived to, when applicable in the archival reason. If you wish to restore this backup to the same table name, you will need to delete the original table.
    ArchivalReason:
      type: string
    MultiRegionConsistency:
      type: string
      enum:
        - EVENTUAL
        - STRONG
    DeleteBackupOutput:
      type: object
      properties:
        BackupDescription:
          $ref: "#/components/schemas/BackupDescription"
          description: Contains the description of the backup created for the table.
    BackupDescription:
      description: Contains the description of the backup created for the table.
      type: object
      properties:
        BackupDetails:
          $ref: "#/components/schemas/BackupDetails"
          description: Contains the details of the backup created for the table.
        SourceTableDetails:
          $ref: "#/components/schemas/SourceTableDetails"
          description: Contains the details of the table when the backup was created.
        SourceTableFeatureDetails:
          $ref: "#/components/schemas/SourceTableFeatureDetails"
          description: Contains the details of the features enabled on the table when the backup was created. For example, LSIs, GSIs, streams, TTL.
    SourceTableDetails:
      description: Contains the details of the table when the backup was created.
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table for which the backup was created.
        TableId:
          $ref: "#/components/schemas/TableId"
          description: Unique identifier for the table for which the backup was created.
        TableArn:
          $ref: "#/components/schemas/TableArn"
          description: ARN of the table for which backup was created.
        TableSizeBytes:
          $ref: "#/components/schemas/LongObject"
          description: Size of the table in bytes. Note that this is an approximate value.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: Schema of the table.
        TableCreationDateTime:
          $ref: "#/components/schemas/TableCreationDateTime"
          description: Time when the source table was created.
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughput"
          description: Read IOPs and Write IOPS on the table when the backup was created.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
        ItemCount:
          $ref: "#/components/schemas/ItemCount"
          description: Number of items in the table. Note that this is an approximate value.
        BillingMode:
          $ref: "#/components/schemas/BillingMode"
          description: Controls how you are charged for read and write throughput and how you manage capacity. This setting can be changed later. PROVISIONED - Sets the read/write capacity mode to PROVISIONED. We recommend using PROVISIONED for predictable workloads. PAY_PER_REQUEST - Sets the read/write capacity mode to PAY_PER_REQUEST. We recommend using PAY_PER_REQUEST for unpredictable workloads.
      required:
        - TableName
        - TableId
        - KeySchema
        - TableCreationDateTime
        - ProvisionedThroughput
    TableCreationDateTime:
      type: string
      format: date-time
    ItemCount:
      type: integer
      format: int64
      minimum: 0
    SourceTableFeatureDetails:
      description: Contains the details of the features enabled on the table when the backup was created. For example, LSIs, GSIs, streams, TTL.
      type: object
      properties:
        LocalSecondaryIndexes:
          $ref: "#/components/schemas/LocalSecondaryIndexes"
          description: Represents the LSI properties for the table when the backup was created. It includes the IndexName, KeySchema and Projection for the LSIs on the table at the time of backup.
        GlobalSecondaryIndexes:
          $ref: "#/components/schemas/GlobalSecondaryIndexes"
          description: Represents the GSI properties for the table when the backup was created. It includes the IndexName, KeySchema, Projection, and ProvisionedThroughput for the GSIs on the table at the time of backup.
        StreamDescription:
          $ref: "#/components/schemas/StreamSpecification"
          description: Stream settings on the table when the backup was created.
        TimeToLiveDescription:
          $ref: "#/components/schemas/TimeToLiveDescription"
          description: Time to Live settings on the table when the backup was created.
        SSEDescription:
          $ref: "#/components/schemas/SSEDescription"
          description: The description of the server-side encryption status on the table when the backup was created.
    LocalSecondaryIndexes:
      type: array
      items:
        $ref: "#/components/schemas/LocalSecondaryIndexInfo"
    LocalSecondaryIndexInfo:
      description: Represents the properties of a local secondary index for the table when the backup was created.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: Represents the name of the local secondary index.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The complete key schema for a local secondary index, which consists of one or more pairs of attribute names and key types: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into the global secondary index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
    GlobalSecondaryIndexes:
      type: array
      items:
        $ref: "#/components/schemas/GlobalSecondaryIndexInfo"
    GlobalSecondaryIndexInfo:
      description: Represents the properties of a global secondary index for the table when the backup was created.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: "The complete key schema for a global secondary index, which consists of one or more pairs of attribute names and key types: HASH - partition key RANGE - sort key The partition key of an item is also known as its hash attribute. The term \"hash attribute\" derives from DynamoDB's usage of an internal hash function to evenly distribute data items across partitions, based on their partition key values. The sort key of an item is also known as its range attribute. The term \"range attribute\" derives from the way DynamoDB stores items with the same partition key physically close together, in sorted order by the sort key value."
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into the global secondary index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughput"
          description: Represents the provisioned throughput settings for the specified global secondary index.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
    TimeToLiveDescription:
      description: The description of the Time to Live (TTL) status on the specified table.
      type: object
      properties:
        TimeToLiveStatus:
          $ref: "#/components/schemas/TimeToLiveStatus"
          description: The TTL status for the table.
        AttributeName:
          $ref: "#/components/schemas/TimeToLiveAttributeName"
          description: The name of the TTL attribute for items in the table.
    TimeToLiveStatus:
      type: string
      enum:
        - ENABLING
