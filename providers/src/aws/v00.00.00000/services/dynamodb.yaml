  /ExecuteStatement:
    post:
      operationId: ExecuteStatement
      description: This operation allows you to perform reads and singleton writes on data stored in DynamoDB, using PartiQL. For PartiQL reads (SELECT statement), if the total number of processed items exceeds the maximum dataset size limit of 1 MB, the read stops and results are returned to the user as a LastEvaluatedKey value to continue the read in a subsequent operation. If the filter criteria in WHERE clause does not match any data, the read will return an empty result set. A single SELECT statement response can return up to the maximum number of items (if using the Limit parameter) or a maximum of 1 MB of data (and then apply any filtering to the results using WHERE clause). If LastEvaluatedKey is present in the response, you need to paginate the result set. If NextToken is present, you need to paginate the result set and include NextToken.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.ExecuteStatement
            default: DynamoDB_20120810.ExecuteStatement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Statement:
                  $ref: "#/components/schemas/PartiQLStatement"
                  description: The PartiQL statement representing the operation to run.
                Parameters:
                  $ref: "#/components/schemas/PreparedStatementParameters"
                  description: The parameters for the PartiQL statement, if any.
                ConsistentRead:
                  $ref: "#/components/schemas/ConsistentRead"
                  description: The consistency of a read operation. If set to true, then a strongly consistent read is used; otherwise, an eventually consistent read is used.
                NextToken:
                  $ref: "#/components/schemas/PartiQLNextToken"
                  description: Set this value to get remaining results, if NextToken was returned in the statement response.
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                Limit:
                  $ref: "#/components/schemas/PositiveIntegerObject"
                  description: The maximum number of items to evaluate (not necessarily the number of matching items). If DynamoDB processes the number of items up to the limit while processing the results, it stops the operation and returns the matching values up to that point, along with a key in LastEvaluatedKey to apply in a subsequent operation so you can pick up where you left off. Also, if the processed dataset size exceeds 1 MB before DynamoDB reaches this limit, it stops the operation and returns the matching values up to the limit, and a key in LastEvaluatedKey to apply in a subsequent operation to continue the operation.
                ReturnValuesOnConditionCheckFailure:
                  $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
                  description: An optional parameter that returns the item attributes for an ExecuteStatement operation that failed a condition check. There is no additional cost associated with requesting a return value aside from the small network and processing overhead of receiving a larger response. No read capacity units are consumed.
              required:
                - Statement
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteStatementOutput"
  /ExecuteTransaction:
    post:
      operationId: ExecuteTransaction
      description: This operation allows you to perform transactional reads or writes on data stored in DynamoDB, using PartiQL. The entire transaction must consist of either read statements or write statements, you cannot mix both in one transaction. The EXISTS function is an exception and can be used to check the condition of specific attributes of the item in a similar manner to ConditionCheck in the TransactWriteItems API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.ExecuteTransaction
            default: DynamoDB_20120810.ExecuteTransaction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TransactStatements:
                  $ref: "#/components/schemas/ParameterizedStatements"
                  description: The list of PartiQL statements representing the transaction to run.
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: Set this value to get remaining results, if NextToken was returned in the statement response.
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                  description: Determines the level of detail about either provisioned or on-demand throughput consumption that is returned in the response. For more information, see TransactGetItems and TransactWriteItems.
              required:
                - TransactStatements
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteTransactionOutput"
  /ExportTableToPointInTime:
    post:
      operationId: ExportTableToPointInTime
      description: Exports table data to an S3 bucket. The table must have point in time recovery enabled, and you can export data from any time within the point in time recovery window.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.ExportTableToPointInTime
            default: DynamoDB_20120810.ExportTableToPointInTime
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableArn:
                  $ref: "#/components/schemas/TableArn"
                  description: The Amazon Resource Name (ARN) associated with the table to export.
                ExportTime:
                  $ref: "#/components/schemas/ExportTime"
                  description: Time in the past from which to export table data, counted in seconds from the start of the Unix epoch. The table export will be a snapshot of the table's state at this point in time.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Providing a ClientToken makes the call to ExportTableToPointInTimeInput idempotent, meaning that multiple identical calls have the same effect as one single call. A client token is valid for 8 hours after the first request that uses it is completed. After 8 hours, any request with the same client token is treated as a new request. Do not resubmit the same request with the same client token for more than 8 hours, or the result might not be idempotent. If you submit a request with the same client token but a change in other parameters within the 8-hour idempotency window, DynamoDB returns an ExportConflictException.
                S3Bucket:
                  $ref: "#/components/schemas/S3Bucket"
                  description: The name of the Amazon S3 bucket to export the snapshot to.
                S3BucketOwner:
                  $ref: "#/components/schemas/S3BucketOwner"
                  description: The ID of the Amazon Web Services account that owns the bucket the export will be stored in. S3BucketOwner is a required parameter when exporting to a S3 bucket in another account.
                S3Prefix:
                  $ref: "#/components/schemas/S3Prefix"
                  description: The Amazon S3 bucket prefix to use as the file name and path of the exported snapshot.
                S3SseAlgorithm:
                  $ref: "#/components/schemas/S3SseAlgorithm"
                  description: "Type of encryption used on the bucket where export data will be stored. Valid values for S3SseAlgorithm are: AES256 - server-side encryption with Amazon S3 managed keys KMS - server-side encryption with KMS managed keys"
                S3SseKmsKeyId:
                  $ref: "#/components/schemas/S3SseKmsKeyId"
                  description: The ID of the KMS managed key used to encrypt the S3 bucket where export data will be stored (if applicable).
                ExportFormat:
                  $ref: "#/components/schemas/ExportFormat"
                  description: The format for the exported data. Valid values for ExportFormat are DYNAMODB_JSON or ION.
                ExportType:
                  $ref: "#/components/schemas/ExportType"
                  description: Choice of whether to execute as a full export or incremental export. Valid values are FULL_EXPORT or INCREMENTAL_EXPORT. The default value is FULL_EXPORT. If INCREMENTAL_EXPORT is provided, the IncrementalExportSpecification must also be used.
                IncrementalExportSpecification:
                  $ref: "#/components/schemas/IncrementalExportSpecification"
                  description: Optional object containing the parameters specific to an incremental export.
              required:
                - TableArn
                - S3Bucket
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportTableToPointInTimeOutput"
  /GetItem:
    post:
      operationId: GetItem
      description: The GetItem operation returns a set of attributes for the item with the given primary key. If there is no matching item, GetItem does not return any data and there will be no Item element in the response. GetItem provides an eventually consistent read by default. If your application requires a strongly consistent read, set ConsistentRead to true. Although a strongly consistent read might take more time than an eventually consistent read, it always returns the last updated value.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.GetItem
            default: DynamoDB_20120810.GetItem
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table containing the requested item. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                Key:
                  $ref: "#/components/schemas/Key"
                  description: A map of attribute names to AttributeValue objects, representing the primary key of the item to retrieve. For the primary key, you must provide all of the attributes. For example, with a simple primary key, you only need to provide a value for the partition key. For a composite primary key, you must provide values for both the partition key and the sort key.
                AttributesToGet:
                  $ref: "#/components/schemas/AttributeNameList"
                  description: This is a legacy parameter. Use ProjectionExpression instead. For more information, see AttributesToGet in the Amazon DynamoDB Developer Guide.
                ConsistentRead:
                  $ref: "#/components/schemas/ConsistentRead"
                  description: "Determines the read consistency model: If set to true, then the operation uses strongly consistent reads; otherwise, the operation uses eventually consistent reads."
                ReturnConsumedCapacity:
                  $ref: "#/components/schemas/ReturnConsumedCapacity"
                ProjectionExpression:
                  $ref: "#/components/schemas/ProjectionExpression"
                  description: A string that identifies one or more attributes to retrieve from the table. These attributes can include scalars, sets, or elements of a JSON document. The attributes in the expression must be separated by commas. If no attribute names are specified, then all attributes are returned. If any of the requested attributes are not found, they do not appear in the result. For more information, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.
                ExpressionAttributeNames:
                  $ref: "#/components/schemas/ExpressionAttributeNameMap"
                  description: 'One or more substitution tokens for attribute names in an expression. The following are some use cases for using ExpressionAttributeNames: To access an attribute whose name conflicts with a DynamoDB reserved word. To create a placeholder for repeating occurrences of an attribute name in an expression. To prevent special characters in an attribute name from being misinterpreted in an expression. Use the # character in an expression to dereference an attribute name. For example, consider the following attribute name: Percentile The name of this attribute conflicts with a reserved word, so it cannot be used directly in an expression. (For the complete list of reserved words, see Reserved Words in the Amazon DynamoDB Developer Guide). To work around this, you could specify the following for ExpressionAttributeNames: {"#P":"Percentile"} You could then use this substitution in an expression, as in this example: #P = :val Tokens that begin with the : character are expression attribute values, which are placeholders for the actual value at runtime. For more information on expression attribute names, see Specifying Item Attributes in the Amazon DynamoDB Developer Guide.'
              required:
                - TableName
                - Key
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetItemOutput"
  /GetResourcePolicy:
    post:
      operationId: GetResourcePolicy
      description: "Returns the resource-based policy document attached to the resource, which can be a table or stream, in JSON format. GetResourcePolicy follows an eventually consistent model. The following list describes the outcomes when you issue the GetResourcePolicy request immediately after issuing another request: If you issue a GetResourcePolicy request immediately after a PutResourcePolicy request, DynamoDB might return a PolicyNotFoundException. If you issue a GetResourcePolicyrequest immediately after a DeleteResourcePolicy request, DynamoDB might return the policy that was present before the deletion request. If you issue a GetResourcePolicy request immediately after a CreateTable request, which includes a resource-based policy, DynamoDB might return a ResourceNotFoundException or a PolicyNotFoundException. Because GetResourcePolicy uses an eventually consistent query, the metadata for your policy or table might not be available at that moment. Wait for a few seconds, and then retry the GetResourcePolicy request. After a GetResourcePolicy request returns a policy created using the PutResourcePolicy request, the policy will be applied in the authorization of requests to the resource. Because this process is eventually consistent, it will take some time to apply the policy to all requests to a resource. Policies that you attach while creating a table using the CreateTable request will always be applied to all requests for that table."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.GetResourcePolicy
            default: DynamoDB_20120810.GetResourcePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArnString"
                  description: The Amazon Resource Name (ARN) of the DynamoDB resource to which the policy is attached. The resources you can specify include tables and streams.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyOutput"
  /ImportTable:
    post:
      operationId: ImportTable
      description: Imports table data from an S3 bucket.
      parameters:
        - name: X-Amz-Target
          in: header
