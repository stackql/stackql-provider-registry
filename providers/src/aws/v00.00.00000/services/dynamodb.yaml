          $ref: "#/components/schemas/TableDescription"
          description: Represents the properties of a table.
    ScanTotalSegments:
      type: integer
      minimum: 1
      maximum: 1000000
    ScanSegment:
      type: integer
      minimum: 0
      maximum: 999999
    ScanOutput:
      description: Represents the output of a Scan operation.
      type: object
      properties:
        Items:
          $ref: "#/components/schemas/ItemList"
          description: An array of item attributes that match the scan criteria. Each element in this array consists of an attribute name and the value for that attribute.
        Count:
          $ref: "#/components/schemas/Integer"
          description: The number of items in the response. If you set ScanFilter in the request, then Count is the number of items returned after the filter was applied, and ScannedCount is the number of matching items before the filter was applied. If you did not use a filter in the request, then Count is the same as ScannedCount.
        ScannedCount:
          $ref: "#/components/schemas/Integer"
          description: The number of items evaluated, before any ScanFilter is applied. A high ScannedCount value with few, or no, Count results indicates an inefficient Scan operation. For more information, see Count and ScannedCount in the Amazon DynamoDB Developer Guide. If you did not use a filter in the request, then ScannedCount is the same as Count.
        LastEvaluatedKey:
          type: object
          properties: {}
          description: The primary key of the item where the operation stopped, inclusive of the previous result set. Use this value to start a new operation, excluding this value in the new request. If LastEvaluatedKey is empty, then the "last page" of results has been processed and there is no more data to be retrieved. If LastEvaluatedKey is not empty, it does not necessarily mean that there is more data in the result set. The only way to know when you have reached the end of the result set is when LastEvaluatedKey is empty.
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacity"
          description: The capacity units consumed by the Scan operation. The data returned includes the total provisioned throughput consumed, along with statistics for the table and any indexes involved in the operation. ConsumedCapacity is only returned if the ReturnConsumedCapacity parameter was specified. For more information, see Capacity unit consumption for read operations in the Amazon DynamoDB Developer Guide.
    TransactGetItemList:
      type: array
      items:
        $ref: "#/components/schemas/TransactGetItem"
    TransactGetItem:
      description: Specifies an item to be retrieved as part of the transaction.
      type: object
      properties:
        Get:
          $ref: "#/components/schemas/Get"
          description: Contains the primary key that identifies the item to get, together with the name of the table that contains the item, and optionally the specific attributes of the item to retrieve.
      required:
        - Get
    Get:
      description: Specifies an item and related attribute values to retrieve in a TransactGetItem object.
      type: object
      properties:
        Key:
          type: object
          properties: {}
          description: A map of attribute names to AttributeValue objects that specifies the primary key of the item to retrieve.
        TableName:
          $ref: "#/components/schemas/TableArn"
          description: The name of the table from which to retrieve the specified item. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
        ProjectionExpression:
          $ref: "#/components/schemas/ProjectionExpression"
          description: A string that identifies one or more attributes of the specified item to retrieve from the table. The attributes in the expression must be separated by commas. If no attribute names are specified, then all attributes of the specified item are returned. If any of the requested attributes are not found, they do not appear in the result.
        ExpressionAttributeNames:
          type: object
          properties: {}
          description: One or more substitution tokens for attribute names in the ProjectionExpression parameter.
      required:
        - Key
        - TableName
    TransactGetItemsOutput:
      type: object
      properties:
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacityMultiple"
          description: If the ReturnConsumedCapacity value was TOTAL, this is an array of ConsumedCapacity objects, one for each table addressed by TransactGetItem objects in the TransactItems parameter. These ConsumedCapacity objects report the read-capacity units consumed by the TransactGetItems call in that table.
        Responses:
          $ref: "#/components/schemas/ItemResponseList"
          description: An ordered array of up to 100 ItemResponse objects, each of which corresponds to the TransactGetItem object in the same position in the TransactItems array. Each ItemResponse object contains a Map of the name-value pairs that are the projected attributes of the requested item. If a requested item could not be retrieved, the corresponding ItemResponse object is Null, or if the requested item has no projected attributes, the corresponding ItemResponse object is an empty Map.
    TransactWriteItemList:
      type: array
      items:
        $ref: "#/components/schemas/TransactWriteItem"
    TransactWriteItem:
      description: A list of requests that can perform update, put, delete, or check operations on multiple items in one or more tables atomically.
      type: object
      properties:
        ConditionCheck:
          $ref: "#/components/schemas/ConditionCheck"
          description: A request to perform a check item operation.
        Put:
          $ref: "#/components/schemas/Put"
          description: A request to perform a PutItem operation.
        Delete:
          $ref: "#/components/schemas/Delete"
          description: A request to perform a DeleteItem operation.
        Update:
          $ref: "#/components/schemas/Update"
          description: A request to perform an UpdateItem operation.
    ConditionCheck:
      description: Represents a request to perform a check that an item exists or to check the condition of specific attributes of the item.
      type: object
      properties:
        Key:
          type: object
          properties: {}
          description: The primary key of the item to be checked. Each element consists of an attribute name and a value for that attribute.
        TableName:
          $ref: "#/components/schemas/TableArn"
          description: Name of the table for the check item request. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
        ConditionExpression:
          $ref: "#/components/schemas/ConditionExpression"
          description: A condition that must be satisfied in order for a conditional update to succeed. For more information, see Condition expressions in the Amazon DynamoDB Developer Guide.
        ExpressionAttributeNames:
          type: object
          properties: {}
          description: One or more substitution tokens for attribute names in an expression. For more information, see Expression attribute names in the Amazon DynamoDB Developer Guide.
        ExpressionAttributeValues:
          type: object
          properties: {}
          description: One or more values that can be substituted in an expression. For more information, see Condition expressions in the Amazon DynamoDB Developer Guide.
        ReturnValuesOnConditionCheckFailure:
          $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
          description: "Use ReturnValuesOnConditionCheckFailure to get the item attributes if the ConditionCheck condition fails. For ReturnValuesOnConditionCheckFailure, the valid values are: NONE and ALL_OLD."
      required:
        - Key
        - TableName
        - ConditionExpression
    Put:
      description: Represents a request to perform a PutItem operation.
      type: object
      properties:
        Item:
          type: object
          properties: {}
          description: A map of attribute name to attribute values, representing the primary key of the item to be written by PutItem. All of the table's primary key attributes must be specified, and their data types must match those of the table's key schema. If any attributes are present in the item that are part of an index key schema for the table, their types must match the index key schema.
        TableName:
          $ref: "#/components/schemas/TableArn"
          description: Name of the table in which to write the item. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
        ConditionExpression:
          $ref: "#/components/schemas/ConditionExpression"
          description: A condition that must be satisfied in order for a conditional update to succeed.
        ExpressionAttributeNames:
          type: object
          properties: {}
          description: One or more substitution tokens for attribute names in an expression.
        ExpressionAttributeValues:
          type: object
          properties: {}
          description: One or more values that can be substituted in an expression.
        ReturnValuesOnConditionCheckFailure:
          $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
          description: "Use ReturnValuesOnConditionCheckFailure to get the item attributes if the Put condition fails. For ReturnValuesOnConditionCheckFailure, the valid values are: NONE and ALL_OLD."
      required:
        - Item
        - TableName
    Delete:
      description: Represents a request to perform a DeleteItem operation.
      type: object
      properties:
        Key:
          type: object
          properties: {}
          description: The primary key of the item to be deleted. Each element consists of an attribute name and a value for that attribute.
        TableName:
          $ref: "#/components/schemas/TableArn"
          description: Name of the table in which the item to be deleted resides. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
        ConditionExpression:
          $ref: "#/components/schemas/ConditionExpression"
          description: A condition that must be satisfied in order for a conditional delete to succeed.
        ExpressionAttributeNames:
          type: object
          properties: {}
          description: One or more substitution tokens for attribute names in an expression.
        ExpressionAttributeValues:
          type: object
          properties: {}
          description: One or more values that can be substituted in an expression.
        ReturnValuesOnConditionCheckFailure:
          $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
          description: "Use ReturnValuesOnConditionCheckFailure to get the item attributes if the Delete condition fails. For ReturnValuesOnConditionCheckFailure, the valid values are: NONE and ALL_OLD."
      required:
        - Key
        - TableName
    Update:
      description: Represents a request to perform an UpdateItem operation.
      type: object
      properties:
        Key:
          type: object
          properties: {}
          description: The primary key of the item to be updated. Each element consists of an attribute name and a value for that attribute.
        UpdateExpression:
          $ref: "#/components/schemas/UpdateExpression"
          description: An expression that defines one or more attributes to be updated, the action to be performed on them, and new value(s) for them.
        TableName:
          $ref: "#/components/schemas/TableArn"
          description: Name of the table for the UpdateItem request. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
        ConditionExpression:
          $ref: "#/components/schemas/ConditionExpression"
          description: A condition that must be satisfied in order for a conditional update to succeed.
        ExpressionAttributeNames:
          type: object
          properties: {}
          description: One or more substitution tokens for attribute names in an expression.
        ExpressionAttributeValues:
          type: object
          properties: {}
          description: One or more values that can be substituted in an expression.
        ReturnValuesOnConditionCheckFailure:
          $ref: "#/components/schemas/ReturnValuesOnConditionCheckFailure"
          description: "Use ReturnValuesOnConditionCheckFailure to get the item attributes if the Update condition fails. For ReturnValuesOnConditionCheckFailure, the valid values are: NONE and ALL_OLD."
      required:
        - Key
        - UpdateExpression
        - TableName
    UpdateExpression:
      type: string
    TransactWriteItemsOutput:
      type: object
      properties:
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacityMultiple"
          description: The capacity units consumed by the entire TransactWriteItems operation. The values of the list are ordered according to the ordering of the TransactItems request parameter.
        ItemCollectionMetrics:
          type: object
          properties: {}
          description: A list of tables that were processed by TransactWriteItems and, for each table, information about any item collections that were affected by individual UpdateItem, PutItem, or DeleteItem operations.
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKeyString"
    PointInTimeRecoverySpecification:
      description: Represents the settings used to enable point in time recovery.
      type: object
      properties:
        PointInTimeRecoveryEnabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether point in time recovery is enabled (true) or disabled (false) on the table.
        RecoveryPeriodInDays:
          $ref: "#/components/schemas/RecoveryPeriodInDays"
          description: The number of preceding days for which continuous backups are taken and maintained. Your table data is only recoverable to any point-in-time from within the configured recovery period. This parameter is optional. If no value is provided, the value will default to 35.
      required:
        - PointInTimeRecoveryEnabled
    UpdateContinuousBackupsOutput:
      type: object
      properties:
        ContinuousBackupsDescription:
          $ref: "#/components/schemas/ContinuousBackupsDescription"
          description: Represents the continuous backups and point in time recovery settings on the table.
    ContributorInsightsAction:
      type: string
      enum:
        - ENABLE
        - DISABLE
    UpdateContributorInsightsOutput:
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table.
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index, if applicable.
        ContributorInsightsStatus:
          $ref: "#/components/schemas/ContributorInsightsStatus"
          description: The status of contributor insights
        ContributorInsightsMode:
          $ref: "#/components/schemas/ContributorInsightsMode"
          description: The updated mode of CloudWatch Contributor Insights that determines whether to monitor all access and throttled events or to track throttled events exclusively.
    ReplicaUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaUpdate"
    ReplicaUpdate:
      description: "Represents one of the following: A new replica to be added to an existing global table. New parameters for an existing replica. An existing replica to be removed from an existing global table."
      type: object
      properties:
        Create:
          $ref: "#/components/schemas/CreateReplicaAction"
          description: The parameters required for creating a replica on an existing global table.
        Delete:
          $ref: "#/components/schemas/DeleteReplicaAction"
          description: The name of the existing replica to be removed.
    CreateReplicaAction:
      description: Represents a replica to be added.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region of the replica to be added.
      required:
        - RegionName
    DeleteReplicaAction:
      description: Represents a replica to be removed.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region of the replica to be removed.
      required:
        - RegionName
    UpdateGlobalTableOutput:
      type: object
      properties:
        GlobalTableDescription:
          $ref: "#/components/schemas/GlobalTableDescription"
          description: Contains the details of the global table.
    AutoScalingSettingsUpdate:
      description: Represents the auto scaling settings to be modified for a global table or global secondary index.
      type: object
      properties:
        MinimumUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The minimum capacity units that a global table or global secondary index should be scaled down to.
        MaximumUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The maximum capacity units that a global table or global secondary index should be scaled up to.
        AutoScalingDisabled:
          $ref: "#/components/schemas/BooleanObject"
          description: Disabled auto scaling for this global table or global secondary index.
        AutoScalingRoleArn:
          $ref: "#/components/schemas/AutoScalingRoleArn"
          description: Role ARN used for configuring auto scaling policy.
        ScalingPolicyUpdate:
          $ref: "#/components/schemas/AutoScalingPolicyUpdate"
          description: The scaling policy to apply for scaling target global table or global secondary index capacity units.
    AutoScalingRoleArn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDC00-\\uDBFF\\uDFFF\\r\\n\\t]*"
    AutoScalingPolicyUpdate:
      description: Represents the auto scaling policy to be modified.
      type: object
      properties:
        PolicyName:
          $ref: "#/components/schemas/AutoScalingPolicyName"
          description: The name of the scaling policy.
        TargetTrackingScalingPolicyConfiguration:
          $ref: "#/components/schemas/AutoScalingTargetTrackingScalingPolicyConfigurationUpdate"
          description: Represents a target tracking scaling policy configuration.
      required:
        - TargetTrackingScalingPolicyConfiguration
    AutoScalingTargetTrackingScalingPolicyConfigurationUpdate:
      description: Represents the settings of a target tracking scaling policy that will be modified.
      type: object
      properties:
        DisableScaleIn:
          $ref: "#/components/schemas/BooleanObject"
          description: Indicates whether scale in by the target tracking policy is disabled. If the value is true, scale in is disabled and the target tracking policy won't remove capacity from the scalable resource. Otherwise, scale in is enabled and the target tracking policy can remove capacity from the scalable resource. The default value is false.
        ScaleInCooldown:
          $ref: "#/components/schemas/IntegerObject"
          description: The amount of time, in seconds, after a scale in activity completes before another scale in activity can start. The cooldown period is used to block subsequent scale in requests until it has expired. You should scale in conservatively to protect your application's availability. However, if another alarm triggers a scale out policy during the cooldown period after a scale-in, application auto scaling scales out your scalable target immediately.
        ScaleOutCooldown:
          $ref: "#/components/schemas/IntegerObject"
          description: The amount of time, in seconds, after a scale out activity completes before another scale out activity can start. While the cooldown period is in effect, the capacity that has been added by the previous scale out event that initiated the cooldown is calculated as part of the desired capacity for the next scale out. You should continuously (but not excessively) scale out.
        TargetValue:
          $ref: "#/components/schemas/DoubleObject"
          description: The target value for the metric. The range is 8.515920e-109 to 1.174271e+108 (Base 10) or 2e-360 to 2e360 (Base 2).
      required:
        - TargetValue
    GlobalTableGlobalSecondaryIndexSettingsUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/GlobalTableGlobalSecondaryIndexSettingsUpdate"
    GlobalTableGlobalSecondaryIndexSettingsUpdate:
      description: Represents the settings of a global secondary index for a global table that will be modified.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index. The name must be unique among all other indexes on this table.
        ProvisionedWriteCapacityUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The maximum number of writes consumed per second before DynamoDB returns a ThrottlingException.
        ProvisionedWriteCapacityAutoScalingSettingsUpdate:
          $ref: "#/components/schemas/AutoScalingSettingsUpdate"
          description: Auto scaling settings for managing a global secondary index's write capacity units.
      required:
        - IndexName
    ReplicaSettingsUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaSettingsUpdate"
    ReplicaSettingsUpdate:
      description: Represents the settings for a global table in a Region that will be modified.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region of the replica to be added.
        ReplicaProvisionedReadCapacityUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The maximum number of strongly consistent reads consumed per second before DynamoDB returns a ThrottlingException. For more information, see Specifying Read and Write Requirements in the Amazon DynamoDB Developer Guide.
        ReplicaProvisionedReadCapacityAutoScalingSettingsUpdate:
          $ref: "#/components/schemas/AutoScalingSettingsUpdate"
          description: Auto scaling settings for managing a global table replica's read capacity units.
        ReplicaGlobalSecondaryIndexSettingsUpdate:
          $ref: "#/components/schemas/ReplicaGlobalSecondaryIndexSettingsUpdateList"
          description: Represents the settings of a global secondary index for a global table that will be modified.
        ReplicaTableClass:
          $ref: "#/components/schemas/TableClass"
          description: Replica-specific table class. If not specified, uses the source table's table class.
      required:
        - RegionName
    ReplicaGlobalSecondaryIndexSettingsUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaGlobalSecondaryIndexSettingsUpdate"
    ReplicaGlobalSecondaryIndexSettingsUpdate:
      description: Represents the settings of a global secondary index for a global table that will be modified.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index. The name must be unique among all other indexes on this table.
        ProvisionedReadCapacityUnits:
          $ref: "#/components/schemas/PositiveLongObject"
          description: The maximum number of strongly consistent reads consumed per second before DynamoDB returns a ThrottlingException.
        ProvisionedReadCapacityAutoScalingSettingsUpdate:
          $ref: "#/components/schemas/AutoScalingSettingsUpdate"
          description: Auto scaling settings for managing a global secondary index replica's read capacity units.
      required:
        - IndexName
    UpdateGlobalTableSettingsOutput:
      type: object
      properties:
        GlobalTableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the global table.
        ReplicaSettings:
          $ref: "#/components/schemas/ReplicaSettingsDescriptionList"
          description: The Region-specific settings for the global table.
    AttributeUpdates:
      type: object
      properties: {}
    UpdateItemOutput:
      description: Represents the output of an UpdateItem operation.
      type: object
      properties:
        Attributes:
          type: object
          properties: {}
          description: A map of attribute values as they appear before or after the UpdateItem operation, as determined by the ReturnValues parameter. The Attributes map is only present if the update was successful and ReturnValues was specified as something other than NONE in the request. Each element represents one attribute.
        ConsumedCapacity:
          $ref: "#/components/schemas/ConsumedCapacity"
          description: The capacity units consumed by the UpdateItem operation. The data returned includes the total provisioned throughput consumed, along with statistics for the table and any indexes involved in the operation. ConsumedCapacity is only returned if the ReturnConsumedCapacity parameter was specified. For more information, see Capacity unity consumption for write operations in the Amazon DynamoDB Developer Guide.
        ItemCollectionMetrics:
          $ref: "#/components/schemas/ItemCollectionMetrics"
          description: "Information about item collections, if any, that were affected by the UpdateItem operation. ItemCollectionMetrics is only returned if the ReturnItemCollectionMetrics parameter was specified. If the table does not have any local secondary indexes, this information is not returned in the response. Each ItemCollectionMetrics element consists of: ItemCollectionKey - The partition key value of the item collection. This is the same as the partition key value of the item itself. SizeEstimateRangeGB - An estimate of item collection size, in gigabytes. This value is a two-element array containing a lower bound and an upper bound for the estimate. The estimate includes the size of all the items in the table, plus the size of all attributes projected into all of the local secondary indexes on that table. Use this estimate to measure whether a local secondary index is approaching its size limit. The estimate is subject to change over time; therefore, do not rely on the precision or accuracy of the estimate."
    UpdateKinesisStreamingConfiguration:
      description: Enables updating the configuration for Kinesis Streaming.
      type: object
      properties:
        ApproximateCreationDateTimePrecision:
          $ref: "#/components/schemas/ApproximateCreationDateTimePrecision"
          description: Enables updating the precision of Kinesis data stream timestamp.
    UpdateKinesisStreamingDestinationOutput:
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The table name for the Kinesis streaming destination output.
        StreamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The ARN for the Kinesis stream input.
        DestinationStatus:
          $ref: "#/components/schemas/DestinationStatus"
          description: The status of the attempt to update the Kinesis streaming destination output.
        UpdateKinesisStreamingConfiguration:
          $ref: "#/components/schemas/UpdateKinesisStreamingConfiguration"
          description: The command to update the Kinesis streaming destination configuration.
    GlobalSecondaryIndexUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/GlobalSecondaryIndexUpdate"
    GlobalSecondaryIndexUpdate:
      description: "Represents one of the following: A new global secondary index to be added to an existing table. New provisioned throughput parameters for an existing global secondary index. An existing global secondary index to be removed from an existing table."
      type: object
      properties:
        Update:
          $ref: "#/components/schemas/UpdateGlobalSecondaryIndexAction"
          description: The name of an existing global secondary index, along with new provisioned throughput settings to be applied to that index.
        Create:
          $ref: "#/components/schemas/CreateGlobalSecondaryIndexAction"
          description: "The parameters required for creating a global secondary index on an existing table: IndexName KeySchema AttributeDefinitions Projection ProvisionedThroughput"
        Delete:
          $ref: "#/components/schemas/DeleteGlobalSecondaryIndexAction"
          description: The name of an existing global secondary index to be removed.
    UpdateGlobalSecondaryIndexAction:
      description: Represents the new provisioned throughput settings to be applied to a global secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index to be updated.
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughput"
          description: Represents the provisioned throughput settings for the specified global secondary index. For current minimum and maximum provisioned throughput values, see Service, Account, and Table Quotas in the Amazon DynamoDB Developer Guide.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
          description: Updates the maximum number of read and write units for the specified global secondary index. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both.
        WarmThroughput:
          $ref: "#/components/schemas/WarmThroughput"
          description: Represents the warm throughput value of the new provisioned throughput settings to be applied to a global secondary index.
      required:
        - IndexName
    CreateGlobalSecondaryIndexAction:
      description: Represents a new global secondary index to be added to an existing table.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index to be created.
        KeySchema:
          $ref: "#/components/schemas/KeySchema"
          description: The key schema for the global secondary index. Global secondary index supports up to 4 partition and up to 4 sort keys.
        Projection:
          $ref: "#/components/schemas/Projection"
          description: Represents attributes that are copied (projected) from the table into an index. These are in addition to the primary key attributes and index key attributes, which are automatically projected.
        ProvisionedThroughput:
          $ref: "#/components/schemas/ProvisionedThroughput"
          description: Represents the provisioned throughput settings for the specified global secondary index. For current minimum and maximum provisioned throughput values, see Service, Account, and Table Quotas in the Amazon DynamoDB Developer Guide.
        OnDemandThroughput:
          $ref: "#/components/schemas/OnDemandThroughput"
          description: The maximum number of read and write units for the global secondary index being created. If you use this parameter, you must specify MaxReadRequestUnits, MaxWriteRequestUnits, or both. You must use either OnDemand Throughput or ProvisionedThroughput based on your table's capacity mode.
        WarmThroughput:
          $ref: "#/components/schemas/WarmThroughput"
          description: Represents the warm throughput value (in read units per second and write units per second) when creating a secondary index.
      required:
        - IndexName
        - KeySchema
        - Projection
    DeleteGlobalSecondaryIndexAction:
      description: Represents a global secondary index to be deleted from an existing table.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index to be deleted.
      required:
        - IndexName
    ReplicationGroupUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicationGroupUpdate"
    ReplicationGroupUpdate:
      description: "Represents one of the following: A new replica to be added to an existing regional table or global table. This request invokes the CreateTableReplica action in the destination Region. New parameters for an existing replica. This request invokes the UpdateTable action in the destination Region. An existing replica to be deleted. The request invokes the DeleteTableReplica action in the destination Region, deleting the replica and all if its items in the destination Region. When you manually remove a table or global table replica, you do not automatically remove any associated scalable targets, scaling policies, or CloudWatch alarms."
      type: object
      properties:
        Create:
          $ref: "#/components/schemas/CreateReplicationGroupMemberAction"
          description: The parameters required for creating a replica for the table.
        Update:
          $ref: "#/components/schemas/UpdateReplicationGroupMemberAction"
          description: The parameters required for updating a replica for the table.
        Delete:
          $ref: "#/components/schemas/DeleteReplicationGroupMemberAction"
          description: The parameters required for deleting a replica for the table.
    CreateReplicationGroupMemberAction:
      description: Represents a replica to be created.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region where the new replica will be created.
        KMSMasterKeyId:
          $ref: "#/components/schemas/KMSMasterKeyId"
          description: The KMS key that should be used for KMS encryption in the new replica. To specify a key, use its key ID, Amazon Resource Name (ARN), alias name, or alias ARN. Note that you should only provide this parameter if the key is different from the default DynamoDB KMS key alias/aws/dynamodb.
        ProvisionedThroughputOverride:
          $ref: "#/components/schemas/ProvisionedThroughputOverride"
          description: Replica-specific provisioned throughput. If not specified, uses the source table's provisioned throughput settings.
        OnDemandThroughputOverride:
          $ref: "#/components/schemas/OnDemandThroughputOverride"
          description: The maximum on-demand throughput settings for the specified replica table being created. You can only modify MaxReadRequestUnits, because you can't modify MaxWriteRequestUnits for individual replica tables.
        GlobalSecondaryIndexes:
          $ref: "#/components/schemas/ReplicaGlobalSecondaryIndexList"
          description: Replica-specific global secondary index settings.
        TableClassOverride:
          $ref: "#/components/schemas/TableClass"
          description: Replica-specific table class. If not specified, uses the source table's table class.
      required:
        - RegionName
    ReplicaGlobalSecondaryIndexList:
      type: array
      items:
        $ref: "#/components/schemas/ReplicaGlobalSecondaryIndex"
    ReplicaGlobalSecondaryIndex:
      description: Represents the properties of a replica global secondary index.
      type: object
      properties:
        IndexName:
          $ref: "#/components/schemas/IndexName"
          description: The name of the global secondary index.
        ProvisionedThroughputOverride:
          $ref: "#/components/schemas/ProvisionedThroughputOverride"
          description: Replica table GSI-specific provisioned throughput. If not specified, uses the source table GSI's read capacity settings.
        OnDemandThroughputOverride:
          $ref: "#/components/schemas/OnDemandThroughputOverride"
          description: Overrides the maximum on-demand throughput settings for the specified global secondary index in the specified replica table.
      required:
        - IndexName
    UpdateReplicationGroupMemberAction:
      description: Represents a replica to be modified.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region where the replica exists.
        KMSMasterKeyId:
          $ref: "#/components/schemas/KMSMasterKeyId"
          description: The KMS key of the replica that should be used for KMS encryption. To specify a key, use its key ID, Amazon Resource Name (ARN), alias name, or alias ARN. Note that you should only provide this parameter if the key is different from the default DynamoDB KMS key alias/aws/dynamodb.
        ProvisionedThroughputOverride:
          $ref: "#/components/schemas/ProvisionedThroughputOverride"
          description: Replica-specific provisioned throughput. If not specified, uses the source table's provisioned throughput settings.
        OnDemandThroughputOverride:
          $ref: "#/components/schemas/OnDemandThroughputOverride"
          description: Overrides the maximum on-demand throughput for the replica table.
        GlobalSecondaryIndexes:
          $ref: "#/components/schemas/ReplicaGlobalSecondaryIndexList"
          description: Replica-specific global secondary index settings.
        TableClassOverride:
          $ref: "#/components/schemas/TableClass"
          description: Replica-specific table class. If not specified, uses the source table's table class.
      required:
        - RegionName
    DeleteReplicationGroupMemberAction:
      description: Represents a replica to be deleted.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The Region where the replica exists.
      required:
        - RegionName
    GlobalTableWitnessGroupUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/GlobalTableWitnessGroupUpdate"
    GlobalTableWitnessGroupUpdate:
      description: "Represents one of the following: A new witness to be added to a new global table. An existing witness to be removed from an existing global table. You can configure one witness per MRSC global table."
      type: object
      properties:
        Create:
          $ref: "#/components/schemas/CreateGlobalTableWitnessGroupMemberAction"
          description: Specifies a witness Region to be added to a new MRSC global table. The witness must be added when creating the MRSC global table.
        Delete:
          $ref: "#/components/schemas/DeleteGlobalTableWitnessGroupMemberAction"
          description: Specifies a witness Region to be removed from an existing global table. Must be done in conjunction with removing a replica. The deletion of both a witness and replica converts the remaining replica to a single-Region DynamoDB table.
    CreateGlobalTableWitnessGroupMemberAction:
      description: Specifies the action to add a new witness Region to a MRSC global table. A MRSC global table can be configured with either three replicas, or with two replicas and one witness.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: "The Amazon Web Services Region name to be added as a witness Region for the MRSC global table. The witness must be in a different Region than the replicas and within the same Region set: US Region set: US East (N. Virginia), US East (Ohio), US West (Oregon) EU Region set: Europe (Ireland), Europe (London), Europe (Paris), Europe (Frankfurt) AP Region set: Asia Pacific (Tokyo), Asia Pacific (Seoul), Asia Pacific (Osaka)"
      required:
        - RegionName
    DeleteGlobalTableWitnessGroupMemberAction:
      description: Specifies the action to remove a witness Region from a MRSC global table. You cannot delete a single witness from a MRSC global table - you must delete both a replica and the witness together. The deletion of both a witness and replica converts the remaining replica to a single-Region DynamoDB table.
      type: object
      properties:
        RegionName:
          $ref: "#/components/schemas/RegionName"
          description: The witness Region name to be removed from the MRSC global table.
      required:
        - RegionName
    UpdateTableOutput:
      description: Represents the output of an UpdateTable operation.
      type: object
      properties:
        TableDescription:
          $ref: "#/components/schemas/TableDescription"
          description: Represents the properties of the table.
