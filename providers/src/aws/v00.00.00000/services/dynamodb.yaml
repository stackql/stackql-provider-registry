                $ref: "#/components/schemas/ImportTableOutput"
  /ListBackups:
    post:
      operationId: ListBackups
      description: List DynamoDB backups that are associated with an Amazon Web Services account and weren't made with Amazon Web Services Backup. To list these backups for a given table, specify TableName. ListBackups returns a paginated list of results with at most 1 MB worth of items in a page. You can also specify a maximum number of entries to be returned in a page. In the request, start time is inclusive, but end time is exclusive. Note that these boundaries are for the time at which the original backup was requested. You can call ListBackups a maximum of five times per second. If you want to retrieve the complete list of backups made with Amazon Web Services Backup, use the Amazon Web Services Backup list API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - DynamoDB_20120810.ListBackups
            default: DynamoDB_20120810.ListBackups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: Lists the backups from the table specified in TableName. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
                Limit:
                  $ref: "#/components/schemas/BackupsInputLimit"
                  description: Maximum number of backups to return at once.
                TimeRangeLowerBound:
                  $ref: "#/components/schemas/TimeRangeLowerBound"
                  description: Only backups created after this time are listed. TimeRangeLowerBound is inclusive.
                TimeRangeUpperBound:
                  $ref: "#/components/schemas/TimeRangeUpperBound"
                  description: Only backups created before this time are listed. TimeRangeUpperBound is exclusive.
                ExclusiveStartBackupArn:
                  $ref: "#/components/schemas/BackupArn"
                  description: LastEvaluatedBackupArn is the Amazon Resource Name (ARN) of the backup last evaluated when the current page of results was returned, inclusive of the current page of results. This value may be specified as the ExclusiveStartBackupArn of a new ListBackups operation in order to fetch the next page of results.
                BackupType:
                  $ref: "#/components/schemas/BackupTypeFilter"
                  description: "The backups from the table specified by BackupType are listed. Where BackupType can be: USER - On-demand backup created by you. (The default setting if no other backup types are specified.) SYSTEM - On-demand backup automatically created by DynamoDB. ALL - All types of on-demand backups (USER and SYSTEM)."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBackupsOutput"
