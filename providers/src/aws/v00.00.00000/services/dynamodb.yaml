            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableArn"
                  description: The name of the table to delete. You can also provide the Amazon Resource Name (ARN) of the table in this parameter.
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTableOutput"
