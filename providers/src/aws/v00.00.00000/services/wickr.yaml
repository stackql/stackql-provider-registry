        suspended:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the bot is currently suspended.
        lastLogin:
          $ref: "#/components/schemas/GenericString"
          description: The timestamp of the bot's last login.
    BotStatus:
      type: integer
    GetBotsCountResponse:
      type: object
      properties:
