openapi: 3.0.0
info:
  version: "2024-02-01"
  title: AWS Wickr Admin API
  description: AWS Wickr Admin API
  x-serviceName: wickr
  x-serviceAlias: wickr
  x-protocol: rest-json
  x-apiVersion: "2024-02-01"
  x-endpointPrefix: admin.wickr
servers:
  - url: https://admin.wickr.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for wickr
paths:
  /networks/{network_id}/users:
    post:
      operationId: BatchCreateUser
      description: Creates multiple users in a specified Wickr network. This operation allows you to provision multiple user accounts simultaneously, optionally specifying security groups, and validation requirements for each user. codeValidation, inviteCode, and inviteCodeTtl are restricted to networks under preview only.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where users will be created.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency. If you retry a request with the same client token, the service will return the same response without creating duplicate users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  $ref: "#/components/schemas/BatchCreateUserRequestItems"
              required:
                - users
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateUserResponse"
    get:
      operationId: ListUsers
      description: Retrieves a paginated list of users in a specified Wickr network. You can filter and sort the results based on various criteria such as name, status, or security group membership.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network from which to list users.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The token for retrieving the next page of results. This is returned from a previous request when there are more results available.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of users to return in a single page. Valid range is 1-100. Default is 10.
        - name: sortFields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The fields to sort users by. Multiple fields can be specified by separating them with '+'. Accepted values include 'username', 'firstName', 'lastName', 'status', and 'groupId'.
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortDirection"
          description: The direction to sort results. Valid values are 'ASC' (ascending) or 'DESC' (descending). Default is 'DESC'.
        - name: firstName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SensitiveString"
          description: Filter results to only include users with first names matching this value.
        - name: lastName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SensitiveString"
          description: Filter results to only include users with last names matching this value.
        - name: username
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: Filter results to only include users with usernames matching this value.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserStatus"
          description: Filter results to only include users with this status (1 for pending, 2 for active).
        - name: groupId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: Filter results to only include users belonging to this security group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponse"
    patch:
      operationId: UpdateUser
      description: Updates the properties of an existing user in a Wickr network. This operation allows you to modify the user's name, password, security group membership, and invite code settings. codeValidation, inviteCode, and inviteCodeTtl are restricted to networks under preview only.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the user to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  $ref: "#/components/schemas/UserId"
                userDetails:
                  $ref: "#/components/schemas/UpdateUserDetails"
              required:
                - userId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResponse"
  /networks/{network_id}/users/batch-delete:
    post:
      operationId: BatchDeleteUser
      description: Deletes multiple users from a specified Wickr network. This operation permanently removes user accounts and their associated data from the network.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network from which users will be deleted.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency. If you retry a request with the same client token, the service will return the same response without attempting to delete users again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  $ref: "#/components/schemas/UserIds"
              required:
                - userIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteUserResponse"
  /networks/{network_id}/users/uname-lookup:
    post:
      operationId: BatchLookupUserUname
      description: Looks up multiple user usernames from their unique username hashes (unames). This operation allows you to retrieve the email addresses associated with a list of username hashes.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where the users will be looked up.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                unames:
                  $ref: "#/components/schemas/Unames"
              required:
                - unames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchLookupUserUnameResponse"
  /networks/{network_id}/users/re-invite:
    patch:
      operationId: BatchReinviteUser
      description: Resends invitation codes to multiple users who have pending invitations in a Wickr network. This operation is useful when users haven't accepted their initial invitations or when invitations have expired.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where users will be reinvited.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  $ref: "#/components/schemas/UserIds"
              required:
                - userIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchReinviteUserResponse"
  /networks/{network_id}/users/{user_id}/devices:
    patch:
      operationId: BatchResetDevicesForUser
      description: Resets multiple devices for a specific user in a Wickr network. This operation forces the selected devices to log out and requires users to re-authenticate, which is useful for security purposes or when devices need to be revoked.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the user whose devices will be reset.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The ID of the user whose devices will be reset.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appIds:
                  $ref: "#/components/schemas/AppIds"
              required:
                - appIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResetDevicesForUserResponse"
    get:
      operationId: ListDevicesForUser
      description: Retrieves a paginated list of devices associated with a specific user in a Wickr network. This operation returns information about all devices where the user has logged into Wickr.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the user.
        - name: user_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UserId"
          description: The unique identifier of the user whose devices will be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The token for retrieving the next page of results. This is returned from a previous request when there are more results available.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of devices to return in a single page. Valid range is 1-100. Default is 10.
        - name: sortFields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The fields to sort devices by. Multiple fields can be specified by separating them with '+'. Accepted values include 'lastlogin', 'type', 'suspend', and 'created'.
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortDirection"
          description: The direction to sort results. Valid values are 'ASC' (ascending) or 'DESC' (descending). Default is 'DESC'.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDevicesForUserResponse"
  /networks/{network_id}/users/toggleSuspend:
    patch:
      operationId: BatchToggleUserSuspendStatus
      description: Suspends or unsuspends multiple users in a Wickr network. Suspended users cannot access the network until they are unsuspended. This operation is useful for temporarily restricting access without deleting user accounts.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where users will be suspended or unsuspended.
        - name: suspend
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A boolean value indicating whether to suspend (true) or unsuspend (false) the specified users.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  $ref: "#/components/schemas/UserIds"
              required:
                - userIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchToggleUserSuspendStatusResponse"
  /networks/{network_id}/bots:
    post:
      operationId: CreateBot
      description: Creates a new bot in a specified Wickr network. Bots are automated accounts that can send and receive messages, enabling integration with external systems and automation of tasks.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where the bot will be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  $ref: "#/components/schemas/GenericString"
                displayName:
                  $ref: "#/components/schemas/GenericString"
                groupId:
                  $ref: "#/components/schemas/GenericString"
                challenge:
                  $ref: "#/components/schemas/SensitiveString"
              required:
                - username
                - groupId
                - challenge
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotResponse"
    get:
      operationId: ListBots
      description: Retrieves a paginated list of bots in a specified Wickr network. You can filter and sort the results based on various criteria.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network from which to list bots.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The token for retrieving the next page of results. This is returned from a previous request when there are more results available.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of bots to return in a single page. Valid range is 1-100. Default is 10.
        - name: sortFields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The fields to sort bots by. Multiple fields can be specified by separating them with '+'. Accepted values include 'username', 'firstName', 'displayName', 'status', and 'groupId'.
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortDirection"
          description: The direction to sort results. Valid values are 'ASC' (ascending) or 'DESC' (descending). Default is 'DESC'.
        - name: displayName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: Filter results to only include bots with display names matching this value.
        - name: username
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: Filter results to only include bots with usernames matching this value.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BotStatus"
          description: Filter results to only include bots with this status (1 for pending, 2 for active).
        - name: groupId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: Filter results to only include bots belonging to this security group.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotsResponse"
  /networks/{network_id}/data-retention-bots:
    post:
      operationId: CreateDataRetentionBot
      description: Creates a data retention bot in a Wickr network. Data retention bots are specialized bots that handle message archiving and compliance by capturing and storing messages for regulatory or organizational requirements.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where the data retention bot will be created.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataRetentionBotResponse"
    delete:
      operationId: DeleteDataRetentionBot
      description: Deletes the data retention bot from a Wickr network. This operation permanently removes the bot and all its associated data from the database.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network from which the data retention bot will be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDataRetentionBotResponse"
    get:
      operationId: GetDataRetentionBot
      description: Retrieves information about the data retention bot in a Wickr network, including its status and whether the data retention service is enabled.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the data retention bot.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataRetentionBotResponse"
    patch:
      operationId: UpdateDataRetention
      description: Updates the data retention bot settings, allowing you to enable or disable the data retention service, or acknowledge the public key message.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the data retention bot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actionType:
                  $ref: "#/components/schemas/DataRetentionActionType"
              required:
                - actionType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDataRetentionResponse"
  /networks/{network_id}/data-retention-bots/challenge:
    post:
      operationId: CreateDataRetentionBotChallenge
      description: Creates a new challenge password for the data retention bot. This password is used for authentication when the bot connects to the network.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the data retention bot.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataRetentionBotChallengeResponse"
  /networks:
    post:
      operationId: CreateNetwork
      description: Creates a new Wickr network with specified access level and configuration. This operation provisions a new communication network for your organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                networkName:
                  $ref: "#/components/schemas/GenericString"
                accessLevel:
                  $ref: "#/components/schemas/AccessLevel"
                enablePremiumFreeTrial:
                  $ref: "#/components/schemas/Boolean"
                encryptionKeyArn:
                  $ref: "#/components/schemas/GenericString"
              required:
                - networkName
                - accessLevel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNetworkResponse"
    get:
      operationId: ListNetworks
      description: Retrieves a paginated list of all Wickr networks associated with your Amazon Web Services account. You can sort the results by network ID or name.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of networks to return in a single page. Valid range is 1-100. Default is 10.
        - name: sortFields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The field to sort networks by. Accepted values are 'networkId' and 'networkName'. Default is 'networkId'.
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortDirection"
          description: The direction to sort results. Valid values are 'ASC' (ascending) or 'DESC' (descending). Default is 'DESC'.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The token for retrieving the next page of results. This is returned from a previous request when there are more results available.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNetworksResponse"
  /networks/{network_id}/security-groups:
    post:
      operationId: CreateSecurityGroup
      description: Creates a new security group in a Wickr network. Security groups allow you to organize users and control their permissions, features, and security settings.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network where the security group will be created.
        - name: X-Client-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientToken"
          description: A unique identifier for this request to ensure idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/GenericString"
                securityGroupSettings:
                  $ref: "#/components/schemas/SecurityGroupSettingsRequest"
              required:
                - name
                - securityGroupSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSecurityGroupResponse"
    get:
      operationId: ListSecurityGroups
      description: Retrieves a paginated list of security groups in a specified Wickr network. You can sort the results by various criteria.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network from which to list security groups.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The token for retrieving the next page of results. This is returned from a previous request when there are more results available.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of security groups to return in a single page. Valid range is 1-100. Default is 10.
        - name: sortFields
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GenericString"
          description: The field to sort security groups by. Accepted values include 'id' and 'name'.
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortDirection"
          description: The direction to sort results. Valid values are 'ASC' (ascending) or 'DESC' (descending). Default is 'DESC'.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSecurityGroupsResponse"
  /networks/{network_id}/bots/{bot_id}:
    delete:
      operationId: DeleteBot
      description: Deletes a bot from a specified Wickr network. This operation permanently removes the bot account and its associated data from the network.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network from which the bot will be deleted.
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotId"
          description: The unique identifier of the bot to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBotResponse"
    get:
      operationId: GetBot
      description: Retrieves detailed information about a specific bot in a Wickr network, including its status, group membership, and authentication details.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the bot.
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotId"
          description: The unique identifier of the bot to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBotResponse"
    patch:
      operationId: UpdateBot
      description: Updates the properties of an existing bot in a Wickr network. This operation allows you to modify the bot's display name, security group, password, or suspension status.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NetworkId"
          description: The ID of the Wickr network containing the bot to update.
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotId"
          description: The unique identifier of the bot to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/GenericString"
                groupId:
                  $ref: "#/components/schemas/GenericString"
                challenge:
                  $ref: "#/components/schemas/SensitiveString"
                suspend:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBotResponse"
  /networks/{network_id}:
    delete:
      operationId: DeleteNetwork
      description: Deletes a Wickr network and all its associated resources, including users, bots, security groups, and settings. This operation is permanent and cannot be undone.
      parameters:
        - name: network_id
          in: path
          required: true
          schema:
