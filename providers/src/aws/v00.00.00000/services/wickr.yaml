components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NetworkId:
      type: string
      minLength: 8
      maxLength: 8
      pattern: "[0-9]{8}"
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-_:]+"
    BatchCreateUserRequestItems:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateUserRequestItem"
    BatchCreateUserRequestItem:
      description: Contains the details for a single user to be created in a batch user creation request. A user can only be assigned to a single security group. Attempting to add a user to multiple security groups is not supported and will result in an error. codeValidation, inviteCode, and inviteCodeTtl are restricted to networks under preview only.
      type: object
      properties:
        firstName:
          $ref: "#/components/schemas/SensitiveString"
          description: The first name of the user.
        lastName:
          $ref: "#/components/schemas/SensitiveString"
          description: The last name of the user.
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: A list of security group IDs to which the user should be assigned.
        username:
          $ref: "#/components/schemas/GenericString"
          description: The email address or username for the user. Must be unique within the network.
        inviteCode:
          $ref: "#/components/schemas/GenericString"
          description: A custom invite code for the user. If not provided, one will be generated automatically.
        inviteCodeTtl:
          $ref: "#/components/schemas/Integer"
          description: The time-to-live for the invite code in days. After this period, the invite code will expire.
        codeValidation:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the user can be verified through a custom invite code.
      required:
        - securityGroupIds
        - username
    SensitiveString:
      type: string
      pattern: "[\\S\\s]*"
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      pattern: "[\\S]+"
    GenericString:
      type: string
      pattern: "[\\S\\s]*"
    Integer:
      type: integer
    Boolean:
      type: boolean
    BatchCreateUserResponse:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/GenericString"
          description: A message indicating the overall result of the batch operation.
        successful:
          $ref: "#/components/schemas/Users"
          description: A list of user objects that were successfully created, including their assigned user IDs and invite codes.
        failed:
          $ref: "#/components/schemas/BatchUserErrorResponseItems"
          description: A list of user creation attempts that failed, including error details explaining why each user could not be created.
    Users:
      type: array
      items:
        $ref: "#/components/schemas/User"
    User:
      description: Represents a user account in a Wickr network with detailed profile information, status, security settings, and authentication details. codeValidation, inviteCode and inviteCodeTtl are restricted to networks under preview only.
      type: object
      properties:
        userId:
          $ref: "#/components/schemas/UserId"
          description: The unique identifier for the user within the network.
        firstName:
          $ref: "#/components/schemas/SensitiveString"
          description: The first name of the user.
        lastName:
          $ref: "#/components/schemas/SensitiveString"
          description: The last name of the user.
        username:
          $ref: "#/components/schemas/GenericString"
          description: The email address or username of the user. For bots, this must end in 'bot'.
        securityGroups:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: A list of security group IDs to which the user is assigned, determining their permissions and feature access.
        isAdmin:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the user has administrator privileges in the network.
        suspended:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the user is currently suspended and unable to access the network.
        status:
          $ref: "#/components/schemas/Integer"
          description: The current status of the user (1 for pending invitation, 2 for active).
        otpEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether one-time password (OTP) authentication is enabled for the user.
        scimId:
          $ref: "#/components/schemas/GenericString"
          description: The SCIM (System for Cross-domain Identity Management) identifier for the user, used for identity synchronization. Currently not used.
        type_:
          $ref: "#/components/schemas/GenericString"
          description: The descriptive type of the user account (e.g., 'user').
        cell:
          $ref: "#/components/schemas/GenericString"
          description: The phone number minus country code, used for cloud deployments.
        countryCode:
          $ref: "#/components/schemas/GenericString"
          description: The country code for the user's phone number, used for cloud deployments.
        challengeFailures:
          $ref: "#/components/schemas/Integer"
          description: The number of failed password attempts for enterprise deployments, used for account lockout policies.
        isInviteExpired:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the user's email invitation code has expired, applicable to cloud deployments.
        isUser:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this account is a user (as opposed to a bot or other account type).
        inviteCode:
          $ref: "#/components/schemas/GenericString"
          description: The invitation code for this user, used during registration to join the network.
        codeValidation:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the user can be verified through a custom invite code.
        uname:
          $ref: "#/components/schemas/GenericString"
          description: The unique identifier for the user.
