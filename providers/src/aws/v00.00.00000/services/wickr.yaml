    SecurityGroupSettingsRequest:
      description: Contains the security group configuration settings that can be specified when creating or updating a security group. This is a subset of SecurityGroupSettings containing only the modifiable federation and security settings.
      type: object
      properties:
        lockoutThreshold:
          $ref: "#/components/schemas/Integer"
          description: The number of failed password attempts before a user account is locked out.
        permittedNetworks:
          $ref: "#/components/schemas/PermittedNetworksList"
          description: A list of network IDs that are permitted for local federation when federation mode is set to restricted.
        enableGuestFederation:
          $ref: "#/components/schemas/Boolean"
          description: Guest users let you work with people outside your organization that only have limited access to Wickr. Only valid when federationMode is set to Global.
        globalFederation:
          $ref: "#/components/schemas/Boolean"
          description: Allow users to securely federate with all Amazon Web Services Wickr networks and Amazon Web Services Enterprise networks.
        federationMode:
          $ref: "#/components/schemas/Integer"
          description: "The local federation mode. Values: 0 (none), 1 (federated - all networks), 2 (restricted - only permitted networks)."
        enableRestrictedGlobalFederation:
          $ref: "#/components/schemas/Boolean"
          description: Enables restricted global federation to limit communication to specific permitted networks only. Requires globalFederation to be enabled.
        permittedWickrAwsNetworks:
          $ref: "#/components/schemas/WickrAwsNetworksList"
          description: A list of permitted Amazon Web Services Wickr networks for restricted global federation.
        permittedWickrEnterpriseNetworks:
          $ref: "#/components/schemas/PermittedWickrEnterpriseNetworksList"
          description: A list of permitted Wickr Enterprise networks for restricted global federation.
    PermittedNetworksList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkId"
    WickrAwsNetworksList:
      type: array
      items:
        $ref: "#/components/schemas/WickrAwsNetworks"
    WickrAwsNetworks:
      description: Identifies a Amazon Web Services Wickr network by region and network ID, used for configuring permitted networks for global federation.
      type: object
      properties:
        region:
          $ref: "#/components/schemas/GenericString"
          description: The Amazon Web Services region identifier where the network is hosted (e.g., 'us-east-1').
        networkId:
          $ref: "#/components/schemas/NetworkId"
          description: The network ID of the Wickr Amazon Web Services network.
      required:
        - region
        - networkId
    PermittedWickrEnterpriseNetworksList:
      type: array
      items:
        $ref: "#/components/schemas/PermittedWickrEnterpriseNetwork"
    PermittedWickrEnterpriseNetwork:
