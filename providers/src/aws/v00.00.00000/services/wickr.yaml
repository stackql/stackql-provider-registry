      type: object
      properties:
        domain:
          $ref: "#/components/schemas/GenericString"
          description: The domain identifier for the permitted Wickr enterprise network.
        networkId:
          $ref: "#/components/schemas/NetworkId"
          description: The network ID of the permitted Wickr enterprise network.
      required:
        - domain
        - networkId
    CreateSecurityGroupResponse:
      type: object
      properties:
        securityGroup:
          $ref: "#/components/schemas/SecurityGroup"
          description: The details of the newly created security group, including its ID, name, and settings.
      required:
        - securityGroup
    SecurityGroup:
      description: Represents a security group in a Wickr network, containing membership statistics, configuration, and all permission settings that apply to its members.
      type: object
      properties:
        activeMembers:
          $ref: "#/components/schemas/Integer"
          description: The number of active user members currently in the security group.
        botMembers:
          $ref: "#/components/schemas/Integer"
          description: The number of bot members currently in the security group.
        activeDirectoryGuid:
          $ref: "#/components/schemas/GenericString"
          description: The GUID of the Active Directory group associated with this security group, if synchronized with LDAP.
        id:
          $ref: "#/components/schemas/GenericString"
          description: The unique identifier of the security group.
        isDefault:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether this is the default security group for the network. Each network has only one default group.
        name:
          $ref: "#/components/schemas/GenericString"
          description: The human-readable name of the security group.
        modified:
          $ref: "#/components/schemas/Integer"
          description: The timestamp when the security group was last modified, specified in epoch seconds.
        securityGroupSettings:
          $ref: "#/components/schemas/SecurityGroupSettings"
          description: The comprehensive configuration settings that define capabilities and restrictions for members of this security group.
      required:
        - activeMembers
        - botMembers
        - id
        - isDefault
        - name
        - modified
        - securityGroupSettings
    SecurityGroupSettings:
      description: Comprehensive configuration settings that define all user capabilities, restrictions, and features for members of a security group. These settings control everything from calling permissions to federation settings to security policies.
      type: object
      properties:
        alwaysReauthenticate:
          $ref: "#/components/schemas/Boolean"
          description: Requires users to reauthenticate every time they return to the application, providing an additional layer of security.
        atakPackageValues:
          $ref: "#/components/schemas/SecurityGroupStringList"
          description: Configuration values for ATAK (Android Team Awareness Kit) package integration, when ATAK is enabled.
        calling:
          $ref: "#/components/schemas/CallingSettings"
          description: The calling feature permissions and settings that control what types of calls users can initiate and participate in.
        checkForUpdates:
          $ref: "#/components/schemas/Boolean"
          description: Enables automatic checking for Wickr client updates to ensure users stay current with the latest version.
        enableAtak:
          $ref: "#/components/schemas/Boolean"
          description: Enables ATAK (Android Team Awareness Kit) integration for tactical communication and situational awareness.
        enableCrashReports:
          $ref: "#/components/schemas/Boolean"
          description: Allow users to report crashes.
        enableFileDownload:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether users can download files from messages to their devices.
        enableGuestFederation:
          $ref: "#/components/schemas/Boolean"
          description: Allows users to communicate with guest users from other Wickr networks and federated external networks.
        enableNotificationPreview:
          $ref: "#/components/schemas/Boolean"
          description: Enables message preview text in push notifications, allowing users to see message content before opening the app.
        enableOpenAccessOption:
          $ref: "#/components/schemas/Boolean"
          description: Allow users to avoid censorship when they are geo-blocked or have network limitations.
        enableRestrictedGlobalFederation:
          $ref: "#/components/schemas/Boolean"
          description: Enables restricted global federation, limiting external communication to only specified permitted networks.
        filesEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables file sharing capabilities, allowing users to send and receive files in conversations.
        forceDeviceLockout:
          $ref: "#/components/schemas/Integer"
          description: Defines the number of failed login attempts before data stored on the device is reset. Should be less than lockoutThreshold.
        forceOpenAccess:
          $ref: "#/components/schemas/Boolean"
          description: Automatically enable and enforce Wickr open access on all devices. Valid only if enableOpenAccessOption settings is enabled.
        forceReadReceipts:
          $ref: "#/components/schemas/Boolean"
          description: Allow user approved bots to read messages in rooms without using a slash command.
        globalFederation:
          $ref: "#/components/schemas/Boolean"
          description: Allows users to communicate with users on other Wickr instances (Wickr Enterprise) outside the current network.
        isAtoEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enforces a two-factor authentication when a user adds a new device to their account.
        isLinkPreviewEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables automatic preview of links shared in messages, showing webpage thumbnails and descriptions.
        locationAllowMaps:
          $ref: "#/components/schemas/Boolean"
          description: Allows map integration in location sharing, enabling users to view shared locations on interactive maps. Only allowed when location setting is enabled.
        locationEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables location sharing features, allowing users to share their current location with others.
        maxAutoDownloadSize:
          $ref: "#/components/schemas/Long"
          description: The maximum file size in bytes that will be automatically downloaded without user confirmation. Only allowed if fileDownload is enabled. Valid Values [512000 (low_quality), 7340032 (high_quality) ]
        maxBor:
          $ref: "#/components/schemas/Integer"
          description: The maximum burn-on-read (BOR) time in seconds, which determines how long messages remain visible before auto-deletion after being read.
        maxTtl:
          $ref: "#/components/schemas/Long"
          description: The maximum time-to-live (TTL) in seconds for messages, after which they will be automatically deleted from all devices.
        messageForwardingEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables message forwarding, allowing users to forward messages from one conversation to another.
        passwordRequirements:
          $ref: "#/components/schemas/PasswordRequirements"
          description: The password complexity requirements that users must follow when creating or changing passwords.
        presenceEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables presence indicators that show whether users are online, away, or offline.
        quickResponses:
          $ref: "#/components/schemas/SecurityGroupStringList"
          description: A list of pre-defined quick response message templates that users can send with a single tap.
        showMasterRecoveryKey:
          $ref: "#/components/schemas/Boolean"
          description: Users will get a master recovery key that can be used to securely sign in to their Wickr account without having access to their primary device for authentication. Available in SSO enabled network.
        shredder:
          $ref: "#/components/schemas/ShredderSettings"
          description: The message shredder configuration that controls secure deletion of messages and files from devices.
        ssoMaxIdleMinutes:
          $ref: "#/components/schemas/Integer"
          description: The duration for which users SSO session remains inactive before automatically logging them out for security. Available in SSO enabled network.
        federationMode:
          $ref: "#/components/schemas/Integer"
          description: "The local federation mode controlling how users can communicate with other networks. Values: 0 (none), 1 (federated), 2 (restricted)."
        lockoutThreshold:
          $ref: "#/components/schemas/Integer"
          description: The number of failed password attempts before a user account is locked out.
        permittedNetworks:
          $ref: "#/components/schemas/PermittedNetworksList"
          description: A list of network IDs that are permitted for local federation when federation mode is set to restricted.
        permittedWickrAwsNetworks:
          $ref: "#/components/schemas/WickrAwsNetworksList"
          description: A list of permitted Wickr networks for global federation, restricting communication to specific approved networks.
        permittedWickrEnterpriseNetworks:
          $ref: "#/components/schemas/PermittedWickrEnterpriseNetworksList"
          description: A list of permitted Wickr Enterprise networks for global federation, restricting communication to specific approved networks.
    SecurityGroupStringList:
      type: array
      items:
        $ref: "#/components/schemas/GenericString"
    CallingSettings:
      description: Defines the calling feature permissions and settings for users in a security group, controlling what types of calls users can initiate and participate in.
      type: object
      properties:
        canStart11Call:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether users can start one-to-one calls.
        canVideoCall:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether users can make video calls (as opposed to audio-only calls). Valid only when audio call(canStart11Call) is enabled.
        forceTcpCall:
          $ref: "#/components/schemas/Boolean"
          description: When enabled, forces all calls to use TCP protocol instead of UDP for network traversal.
    Long:
      type: integer
      format: int64
    PasswordRequirements:
      description: Defines password complexity requirements for users in a security group, including minimum length and character type requirements.
      type: object
      properties:
        lowercase:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of lowercase letters required in passwords.
        minLength_:
          $ref: "#/components/schemas/Integer"
          description: The minimum password length in characters.
        numbers:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of numeric characters required in passwords.
        symbols:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of special symbol characters required in passwords.
        uppercase:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of uppercase letters required in passwords.
    ShredderSettings:
      description: Configuration for the message shredder feature, which securely deletes messages and files from devices to prevent data recovery.
      type: object
      properties:
        canProcessManually:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether users can manually trigger the shredder to delete content.
        intensity:
          $ref: "#/components/schemas/Integer"
          description: "Prevents Wickr data from being recovered by overwriting deleted Wickr data. Valid Values: Must be one of [0, 20, 60, 100]"
    DeleteBotResponse:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/GenericString"
