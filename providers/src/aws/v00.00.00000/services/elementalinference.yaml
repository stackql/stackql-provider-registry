openapi: 3.0.0
info:
  version: "2018-11-14"
  title: AWS Elemental Inference
  description: AWS Elemental Inference
  x-serviceName: elemental-inference
  x-serviceAlias: elementalinference
  x-protocol: rest-json
  x-apiVersion: "2018-11-14"
  x-endpointPrefix: elemental-inference
servers:
  - url: https://elemental-inference.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for elementalinference
paths:
  /v1/feed/{id}/associate:
    post:
      operationId: AssociateFeed
      description: Associates a resource with the feed. The resource provides the input that Elemental Inference needs needs in order to perform an Elemental Inference feature, such as cropping video. You always provide the resource by associating it with a feed. You can associate only one resource with each feed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeedId"
          description: The ID of the feed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                associatedResourceName:
                  $ref: "#/components/schemas/AssociatedResourceName"
                outputs:
                  $ref: "#/components/schemas/CreateOutputList"
                dryRun:
                  $ref: "#/components/schemas/Boolean"
              required:
                - associatedResourceName
                - outputs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateFeedResponse"
  /v1/feed:
    post:
      operationId: CreateFeed
      description: Creates a feed. The feed is the target for live streams being sent by the calling application. An example of a calling application is AWS Elemental MediaLive. After you create the feed, you can associate a resource with the feed.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                outputs:
                  $ref: "#/components/schemas/CreateOutputList"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - outputs
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFeedResponse"
  /v1/feed/{id}:
    delete:
      operationId: DeleteFeed
      description: Deletes the specified feed. The feed can be deleted at any time.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeedId"
          description: The ID of the feed.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFeedResponse"
    get:
      operationId: GetFeed
      description: Retrieves information about the specified feed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeedId"
          description: The ID of the feed to query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFeedResponse"
    put:
      operationId: UpdateFeed
      description: Updates the name and/or outputs in a feed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeedId"
          description: The ID of the feed to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceName"
                outputs:
                  $ref: "#/components/schemas/UpdateOutputList"
              required:
                - name
                - outputs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFeedResponse"
  /v1/feed/{id}/disassociate:
    post:
      operationId: DisassociateFeed
      description: Releases the resource (for example, an MediaLive channel) that is associated with this feed. The outputs in the feed become disabled.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FeedId"
          description: The ID of the feed where you want to release the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                associatedResourceName:
                  $ref: "#/components/schemas/AssociatedResourceName"
                dryRun:
                  $ref: "#/components/schemas/Boolean"
              required:
                - associatedResourceName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateFeedResponse"
  /v1/feeds:
    get:
      operationId: ListFeeds
      description: Displays a list of feeds that belong to this AWS account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListFeedsRequestMaxResultsInteger"
          description: "The maximum number of results to return per API request. For example, you submit a list request with MaxResults set at 5. Although 20 items match your request, the service returns no more than the first 5 items. (The service also returns a NextToken value that you can use to fetch the next batch of results.) The service might return fewer results than the MaxResults value. If MaxResults is not included in the request, the service defaults to pagination with a maximum of 10 results per page. Valid Range: Minimum value of 1. Maximum value of 1000."
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token that identifies the batch of results that you want to see. For example, you submit a ListBridges request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the ListBridges request a second time and specify the NextToken value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFeedsResponse"
  /v1/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: List all tags that are on an Elemental Inference resource in the current region.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource whose tags you want to query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Associates the specified tags to the resource identified by the specified resourceArn in the current region. If existing tags on a resource are not specified in the request parameters, they are not changed. When a resource is deleted, the tags associated with that resource are also deleted.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource where you want to add tags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: Deletes specified tags from the specified resource in the current region.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource where you want to delete one or more tags.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The keys of the tags to delete.
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    FeedId:
      type: string
      pattern: "[a-z0-9]{19}"
    AssociatedResourceName:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\w \\-\\.',@:;/]*"
    CreateOutputList:
      type: array
      items:
        $ref: "#/components/schemas/CreateOutput"
    CreateOutput:
      description: Contains configuration information about one output in a feed. It is used in the AssociateFeed and the CreateFeed actions.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: A name for the output.
        outputConfig:
          $ref: "#/components/schemas/OutputConfig"
          description: A typed property for an output in a feed. It is used in the CreateFeed and AssociateFeed actions. It identifies the action for Elemental Inference to perform. It also provides a repository for the results of that action. For example, CroppingConfig output will contain the metadata for the crop feature.
        status:
          $ref: "#/components/schemas/OutputStatus"
          description: The status to assign to the output.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: A description for the output.
      required:
        - name
        - outputConfig
        - status
    ResourceName:
      type: string
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9-_]{0,126}[a-zA-Z0-9])?"
    OutputConfig:
      description: Contains one typed output. It is used in the CreateOutput, GetOutput, and Update Output structures.
      type: object
      properties:
        cropping:
          $ref: "#/components/schemas/CroppingConfig"
          description: The output config type that applies to the cropping feature.
        clipping:
          $ref: "#/components/schemas/ClippingConfig"
          description: The output config type that applies to the clipping feature.
    CroppingConfig:
      description: A type of OutputConfig, used when the output in a feed is for the crop feature.
      type: object
    ClippingConfig:
      description: A type of OutputConfig, used when the output in a feed is for the clip feature.
      type: object
      properties:
        callbackMetadata:
          $ref: "#/components/schemas/ResourceDescription"
          description: The metadata that is the result of the clip request to Elemental Inference.
    ResourceDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\w \\-\\.',@:;]*"
    OutputStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    Boolean:
      type: boolean
    AssociateFeedResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: The AWS ARN for this association.
        id:
          $ref: "#/components/schemas/FeedId"
          description: An ID for this response. It is unique in Elemental Inference for this AWS account.
      required:
        - arn
        - id
    FeedArn:
      type: string
    TagMap:
      type: object
      properties: {}
    CreateFeedResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: A unique ARN that Elemental Inference assigns to the feed.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name that you specified.
        id:
          $ref: "#/components/schemas/FeedId"
          description: A unique ID that Elemental Inference assigns to the feed.
        dataEndpoints:
          $ref: "#/components/schemas/StringList"
          description: A unique ARN that Elemental Inference assigns to the feed.
        outputs:
          $ref: "#/components/schemas/GetOutputList"
          description: Data endpoints that Elemental Inference assigns to the feed.
        status:
          $ref: "#/components/schemas/FeedStatus"
          description: The current status of the feed. After creation of the feed has succeeded, the status will be AVAILABLE.
        association:
          $ref: "#/components/schemas/FeedAssociation"
          description: The association for this feed. When you create the feed, this property is empty. You must associate a resource with the feed using AssociateFeed.
        tags:
          type: object
          properties: {}
          description: Any tags that you included when you created the feed.
      required:
        - arn
        - name
        - id
        - dataEndpoints
        - outputs
        - status
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    GetOutputList:
      type: array
      items:
        $ref: "#/components/schemas/GetOutput"
    GetOutput:
      description: Contains configuration information about one output in a feed. It is used in the GetFeed action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The ARN of the output.
        outputConfig:
          $ref: "#/components/schemas/OutputConfig"
          description: A typed property for an output in a feed. It is used in the GetFeed action. It identifies the action for Elemental Inference to perform. It also provides a repository for the results of that action. For example, CroppingConfig output will contain the metadata for the crop feature.
        status:
          $ref: "#/components/schemas/OutputStatus"
          description: The status of the output.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the output.
        fromAssociation:
          $ref: "#/components/schemas/Boolean"
          description: True means that the output was originally created in the feed by the AssociateFeed operation. False means it was created using CreateFeed or UpdateFeed. You will need this value if you use the UpdateFeed operation to modify the list of outputs in the feed.
      required:
        - name
        - outputConfig
        - status
    FeedStatus:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - ACTIVE
        - UPDATING
        - DELETING
        - DELETED
        - ARCHIVED
    FeedAssociation:
      description: Contains information about the resource that is associated with a feed. It is used in the FeedSummary that is used in the response of a ListFeeds action.
      type: object
      properties:
        associatedResourceName:
          $ref: "#/components/schemas/AssociatedResourceName"
          description: The name of the associated resource.
      required:
        - associatedResourceName
    DeleteFeedResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: The ARN of the deleted feed.
        id:
          $ref: "#/components/schemas/FeedId"
          description: The ID of the deleted feed.
        status:
          $ref: "#/components/schemas/FeedStatus"
          description: The current status of the feed. When deletion of the feed has succeeded, the status will be DELETED.
      required:
        - arn
        - id
        - status
    DisassociateFeedResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: The ID of the feed where you deleted the associated resource.
        id:
          $ref: "#/components/schemas/FeedId"
          description: The ARN of the resource that you deleted.
      required:
        - arn
        - id
    GetFeedResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: The ARN of the feed.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the feed being queried.
        id:
          $ref: "#/components/schemas/FeedId"
          description: The ID of the feed being queried.
        dataEndpoints:
          $ref: "#/components/schemas/StringList"
          description: The dataEndpoints of the feed being queried.
        outputs:
          $ref: "#/components/schemas/GetOutputList"
          description: An array of the outputs in the feed being queried.
        status:
          $ref: "#/components/schemas/FeedStatus"
          description: The status of the feed being queried.
        association:
          $ref: "#/components/schemas/FeedAssociation"
          description: Information about the resource, if any, associated with the feed being queried.
        tags:
          type: object
          properties: {}
          description: A list of the tags, if any, for the feed being queried.
      required:
        - arn
        - name
        - id
        - dataEndpoints
        - outputs
        - status
    ListFeedsRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    ListFeedsResponse:
      type: object
      properties:
        feeds:
          $ref: "#/components/schemas/FeedSummaryList"
          description: A list of feed summaries.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The token that identifies the batch of results that you want to see. For example, you submit a list request with MaxResults set at 5. The service returns the first batch of results (up to 5) and a NextToken value. To see the next batch of results, you can submit the list request a second time and specify the NextToken value.
      required:
        - feeds
    FeedSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/FeedSummary"
    FeedSummary:
      description: Contains configuration information about a feed. It is used in the ListFeeds action.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: The ARN of the feed.
        id:
          $ref: "#/components/schemas/FeedId"
          description: The ID of the feed.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the feed
        association:
          $ref: "#/components/schemas/FeedAssociation"
          description: The resource, if any, associated with the feed.
        status:
          $ref: "#/components/schemas/FeedStatus"
          description: The status of the feed.
      required:
        - arn
        - id
        - name
        - status
    ResourceArn:
      type: string
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: A list of the tags that belong to this resource.
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    UpdateOutputList:
      type: array
      items:
        $ref: "#/components/schemas/UpdateOutput"
    UpdateOutput:
      description: Contains configuration information about one output in a feed. It is used in the UpdateFeed action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The name start here
        outputConfig:
          $ref: "#/components/schemas/OutputConfig"
          description: A typed property for an output in a feed. It is used in the UpdateFeed action. It identifies the action for Elemental Inference to perform. It also provides a repository for the results of that action. For example, CroppingConfig output will contain the metadata for the crop feature.
        status:
          $ref: "#/components/schemas/OutputStatus"
          description: The status of the output.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: A description of the output.
        fromAssociation:
          $ref: "#/components/schemas/Boolean"
          description: This property is set by the service when you add the output to the feed, and indicates how you added the output. True means that you used the AssociateFeed operation. False means that you used the CreateFeed or UpdateFeed operation. Use GetFeed to obtain the value. If the value is True, include this field here with a value of True. If the value is False, omit the field here.
      required:
        - name
        - outputConfig
        - status
    UpdateFeedResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/FeedArn"
          description: The ARN of the feed.
        name:
          $ref: "#/components/schemas/ResourceName"
          description: The updated or original name of the feed.
        id:
          $ref: "#/components/schemas/FeedId"
          description: The ID of the feed.
        dataEndpoints:
          $ref: "#/components/schemas/StringList"
          description: The data endpoints of the feed.
        outputs:
          $ref: "#/components/schemas/GetOutputList"
          description: The array of outputs in the feed. You might have left this array unchanged, or you might have changed it.
        status:
          $ref: "#/components/schemas/FeedStatus"
          description: The status of the output.
        association:
          $ref: "#/components/schemas/FeedAssociation"
          description: True means that the output was originally created in the feed by the AssociateFeed operation. False means it was created using CreateFeed or UpdateFeed. You will need this value if you use the UpdateFeed operation to modify the list of outputs in the feed.
        tags:
          type: object
          properties: {}
          description: The name of the resource currently associated with the feed, if any.
      required:
        - arn
        - name
        - id
        - dataEndpoints
        - outputs
        - status
  x-stackQL-resources:
    feeds:
      id: aws.elementalinference.feeds
      name: feeds
      title: feeds
      methods:
        associate_feed:
          operation:
            $ref: "#/paths/~1v1~1feed~1{id}~1associate/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        create_feed:
          operation:
            $ref: "#/paths/~1v1~1feed/post"
          response:
            openAPIDocKey: "202"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        delete_feed:
          operation:
            $ref: "#/paths/~1v1~1feed~1{id}/delete"
          response:
            openAPIDocKey: "202"
            mediaType: application/json
        get_feed:
          operation:
            $ref: "#/paths/~1v1~1feed~1{id}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        update_feed:
          operation:
            $ref: "#/paths/~1v1~1feed~1{id}/put"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        disassociate_feed:
          operation:
            $ref: "#/paths/~1v1~1feed~1{id}~1disassociate/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_feeds:
          operation:
            $ref: "#/paths/~1v1~1feeds/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.feeds
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/feeds/methods/get_feed"
          - $ref: "#/components/x-stackQL-resources/feeds/methods/list_feeds"
        insert:
          - $ref: "#/components/x-stackQL-resources/feeds/methods/create_feed"
        update:
          - $ref: "#/components/x-stackQL-resources/feeds/methods/associate_feed"
          - $ref: "#/components/x-stackQL-resources/feeds/methods/update_feed"
          - $ref: "#/components/x-stackQL-resources/feeds/methods/disassociate_feed"
        delete:
          - $ref: "#/components/x-stackQL-resources/feeds/methods/delete_feed"
    tags:
      id: aws.elementalinference.tags
      name: tags
      title: tags
      methods:
        list_tags_for_resource:
          operation:
            $ref: "#/paths/~1v1~1tags~1{resource_arn}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        tag_resource:
          operation:
            $ref: "#/paths/~1v1~1tags~1{resource_arn}/post"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        untag_resource:
          operation:
            $ref: "#/paths/~1v1~1tags~1{resource_arn}/delete"
          response:
            openAPIDocKey: "204"
          request:
            nativeCasing: pascal
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tags/methods/list_tags_for_resource"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/tags/methods/tag_resource"
          - $ref: "#/components/x-stackQL-resources/tags/methods/untag_resource"
        delete: []
