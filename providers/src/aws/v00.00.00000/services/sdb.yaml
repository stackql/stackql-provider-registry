        - DomainName
    AttributeNameList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AttributeDisplay:
      type: object
      properties:
        Name:
          type: string
          description: The name of the attribute.
        AlternateNameEncoding:
          type: string
        Value:
          type: string
          description: The value of the attribute.
        AlternateValueEncoding:
          type: string
    GetAttributesOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AttributeDisplay"
    GetAttributesRequest:
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/String"
          description: The name of the domain in which to perform the operation.
        ItemName:
          $ref: "#/components/schemas/String"
          description: The name of the item.
        AttributeNames:
          $ref: "#/components/schemas/AttributeNameList"
          description: The names of the attributes.
        ConsistentRead:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether or not strong consistency should be enforced when data is read from SimpleDB. If true, any data previously written to SimpleDB will be returned. Otherwise, results will be consistent eventually, and the client may not see data that was written immediately before your read.
      required:
        - DomainName
        - ItemName
    Integer:
      type: integer
    StringDisplay:
      type: object
      properties: {}
    ListDomainsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ListDomainsRowDisplay"
    ListDomainsRequest:
      type: object
      properties:
        MaxNumberOfDomains:
          $ref: "#/components/schemas/Integer"
          description: The maximum number of domain names you want returned. The range is 1 to 100. The default setting is 100.
        NextToken:
          $ref: "#/components/schemas/String"
          description: A string informing Amazon SimpleDB where to start the next list of domain names.
    ListDomainsRowDisplay:
      type: object
      properties:
        domain_name:
          type: string
          description: A list of domain names that match the expression.
    PutAttributesRequest:
      type: object
      properties:
        DomainName:
          $ref: "#/components/schemas/String"
          description: The name of the domain in which to perform the operation.
        ItemName:
          $ref: "#/components/schemas/String"
          description: The name of the item.
        Attributes:
          $ref: "#/components/schemas/ReplaceableAttributeList"
          description: The list of attributes.
        Expected:
