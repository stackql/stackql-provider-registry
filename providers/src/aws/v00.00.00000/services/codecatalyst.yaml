      properties:
        runtime:
          $ref: "#/components/schemas/IdeRuntimeString"
          description: A link to the IDE runtime image.
        name:
          $ref: "#/components/schemas/IdeNameString"
          description: The name of the IDE.
    IdeRuntimeString:
      type: string
      minLength: 1
      maxLength: 400
    IdeNameString:
      type: string
      minLength: 1
      maxLength: 128
    PersistentStorage:
      description: Information about the persistent storage for a Dev Environment.
      type: object
      properties:
        sizeInGiB:
          $ref: "#/components/schemas/PersistentStorageSizeInGiBInteger"
          description: The size of the persistent storage in gigabytes (specifically GiB). Valid values for storage are based on memory sizes in 16GB increments. Valid values are 16, 32, and 64.
      required:
        - sizeInGiB
    PersistentStorageSizeInGiBInteger:
      type: integer
      minimum: 0
      maximum: 64
    GetProjectResponse:
      type: object
      properties:
        spaceName:
          $ref: "#/components/schemas/NameString"
          description: The name of the space.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the project in the space.
        displayName:
          $ref: "#/components/schemas/String"
          description: The friendly name of the project displayed to users in Amazon CodeCatalyst.
        description:
          $ref: "#/components/schemas/String"
          description: The description of the project.
      required:
        - name
    GetSourceRepositoryResponse:
      type: object
      properties:
        spaceName:
          $ref: "#/components/schemas/NameString"
          description: The name of the space.
        projectName:
          $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        name:
          $ref: "#/components/schemas/SourceRepositoryNameString"
          description: The name of the source repository.
        description:
          $ref: "#/components/schemas/SourceRepositoryDescriptionString"
          description: The description of the source repository.
        lastUpdatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the source repository was last updated, in coordinated universal time (UTC) timestamp format as specified in RFC 3339.
        createdTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the source repository was created, in coordinated universal time (UTC) timestamp format as specified in RFC 3339.
