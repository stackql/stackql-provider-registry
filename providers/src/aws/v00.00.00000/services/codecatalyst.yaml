  /v1/spaces/{space_name}/projects/{project_name}/devEnvironments/{id}/stop:
    put:
      operationId: StopDevEnvironment
      description: Pauses a specified Dev Environment and places it in a non-running state. Stopped Dev Environments do not consume compute minutes.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The system-generated unique ID of the Dev Environment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDevEnvironmentResponse"
  /v1/spaces/{space_name}/projects/{project_name}/devEnvironments/{id}/session/{session_id}:
    delete:
      operationId: StopDevEnvironmentSession
      description: Stops a session for a specified Dev Environment.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
