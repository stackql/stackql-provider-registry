      required:
        - repositoryName
    GetDevEnvironmentResponseAliasString:
      type: string
      minLength: 0
      maxLength: 128
    Ides:
      type: array
      items:
        $ref: "#/components/schemas/Ide"
    Ide:
      description: Information about an integrated development environment (IDE) used in a Dev Environment.
