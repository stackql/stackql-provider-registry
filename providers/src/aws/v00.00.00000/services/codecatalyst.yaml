openapi: 3.0.0
info:
  version: "2022-09-28"
  title: Amazon CodeCatalyst
  description: Amazon CodeCatalyst
  x-serviceName: codecatalyst
  x-serviceAlias: codecatalyst
  x-protocol: rest-json
  x-apiVersion: "2022-09-28"
  x-endpointPrefix: codecatalyst
  x-jsonVersion: "1.1"
servers:
  - url: https://codecatalyst.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codecatalyst
paths:
  /v1/accessTokens:
    put:
      operationId: CreateAccessToken
      description: Creates a personal access token (PAT) for the current user. A personal access token (PAT) is similar to a password. It is associated with your user identity for use across all spaces and projects in Amazon CodeCatalyst. You use PATs to access CodeCatalyst from resources that include integrated development environments (IDEs) and Git-based source repositories. PATs represent you in Amazon CodeCatalyst and you can manage them in your user settings.For more information, see Managing personal access tokens in Amazon CodeCatalyst.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AccessTokenName"
                expiresTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessTokenResponse"
    post:
      operationId: ListAccessTokens
      description: Lists all personal access tokens (PATs) associated with the user who calls the API. You can only list PATs associated with your Amazon Web Services Builder ID.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/ListAccessTokensRequestMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/ListAccessTokensRequestNextTokenString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessTokensResponse"
  /v1/spaces/{space_name}/projects/{project_name}/devEnvironments:
    put:
      operationId: CreateDevEnvironment
      description: Creates a Dev Environment in Amazon CodeCatalyst, a cloud-based development environment that you can use to quickly work on the code stored in the source repositories of your project. When created in the Amazon CodeCatalyst console, by default a Dev Environment is configured to have a 2 core processor, 4GB of RAM, and 16GB of persistent storage. None of these defaults apply to a Dev Environment created programmatically.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repositories:
                  $ref: "#/components/schemas/RepositoriesInput"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                alias:
                  $ref: "#/components/schemas/CreateDevEnvironmentRequestAliasString"
                ides:
                  $ref: "#/components/schemas/IdeConfigurationList"
                instanceType:
                  $ref: "#/components/schemas/InstanceType"
                inactivityTimeoutMinutes:
                  $ref: "#/components/schemas/InactivityTimeoutMinutes"
                persistentStorage:
                  $ref: "#/components/schemas/PersistentStorageConfiguration"
                vpcConnectionName:
                  $ref: "#/components/schemas/NameString"
              required:
                - instanceType
                - persistentStorage
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDevEnvironmentResponse"
  /v1/spaces/{space_name}/projects:
    put:
      operationId: CreateProject
      description: Creates a project in a specified space.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/ProjectDisplayName"
                description:
                  $ref: "#/components/schemas/ProjectDescription"
              required:
                - displayName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
    post:
      operationId: ListProjects
      description: Retrieves a list of projects.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListProjectsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListProjectsRequestMaxResultsInteger"
                filters:
                  $ref: "#/components/schemas/ProjectListFilters"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProjectsResponse"
  /v1/spaces/{space_name}/projects/{project_name}/sourceRepositories/{name}:
    put:
      operationId: CreateSourceRepository
      description: Creates an empty Git-based source repository in a specified project. The repository is created with an initial empty commit with a default branch named main.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRepositoryNameString"
          description: The name of the source repository. For more information about name requirements, see Quotas for source repositories.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/SourceRepositoryDescriptionString"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSourceRepositoryResponse"
    delete:
      operationId: DeleteSourceRepository
      description: Deletes a source repository in Amazon CodeCatalyst. You cannot use this API to delete a linked repository. It can only be used to delete a Amazon CodeCatalyst source repository.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRepositoryNameString"
          description: The name of the source repository.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSourceRepositoryResponse"
    get:
      operationId: GetSourceRepository
      description: Returns information about a source repository.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRepositoryNameString"
          description: The name of the source repository.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSourceRepositoryResponse"
  /v1/spaces/{space_name}/projects/{project_name}/sourceRepositories/{source_repository_name}/branches/{name}:
    put:
      operationId: CreateSourceRepositoryBranch
      description: Creates a branch in a specified source repository in Amazon CodeCatalyst. This API only creates a branch in a source repository hosted in Amazon CodeCatalyst. You cannot use this API to create a branch in a linked repository.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: source_repository_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRepositoryNameString"
          description: The name of the repository where you want to create a branch.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRepositoryBranchString"
          description: The name for the branch you're creating.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                headCommitId:
                  $ref: "#/components/schemas/String"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSourceRepositoryBranchResponse"
  /v1/accessTokens/{id}:
    delete:
      operationId: DeleteAccessToken
      description: Deletes a specified personal access token (PAT). A personal access token can only be deleted by the user who created it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessTokenId"
          description: The ID of the personal access token to delete. You can find the IDs of all PATs associated with your Amazon Web Services Builder ID in a space by calling ListAccessTokens.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccessTokenResponse"
  /v1/spaces/{space_name}/projects/{project_name}/devEnvironments/{id}:
    delete:
      operationId: DeleteDevEnvironment
      description: Deletes a Dev Environment.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The system-generated unique ID of the Dev Environment you want to delete. To retrieve a list of Dev Environment IDs, use ListDevEnvironments.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDevEnvironmentResponse"
    get:
      operationId: GetDevEnvironment
      description: Returns information about a Dev Environment for a source repository in a project. Dev Environments are specific to the user who creates them.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The system-generated unique ID of the Dev Environment for which you want to view information. To retrieve a list of Dev Environment IDs, use ListDevEnvironments.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDevEnvironmentResponse"
    patch:
      operationId: UpdateDevEnvironment
      description: Changes one or more values for a Dev Environment. Updating certain values of the Dev Environment will cause a restart.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The system-generated unique ID of the Dev Environment.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  $ref: "#/components/schemas/UpdateDevEnvironmentRequestAliasString"
                ides:
                  $ref: "#/components/schemas/IdeConfigurationList"
                instanceType:
                  $ref: "#/components/schemas/InstanceType"
                inactivityTimeoutMinutes:
                  $ref: "#/components/schemas/InactivityTimeoutMinutes"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDevEnvironmentResponse"
  /v1/spaces/{space_name}/projects/{name}:
    delete:
      operationId: DeleteProject
      description: Deletes a project in a space.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space. To retrieve a list of project names, use ListProjects.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProjectResponse"
    get:
      operationId: GetProject
      description: Returns information about a project.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectResponse"
    patch:
      operationId: UpdateProject
      description: Changes one or more values for a project.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/ProjectDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProjectResponse"
  /v1/spaces/{name}:
    delete:
      operationId: DeleteSpace
      description: Deletes a space. Deleting a space cannot be undone. Additionally, since space names must be unique across Amazon CodeCatalyst, you cannot reuse names of deleted spaces.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space. To retrieve a list of space names, use ListSpaces.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSpaceResponse"
    get:
      operationId: GetSpace
      description: Returns information about an space.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSpaceResponse"
    patch:
      operationId: UpdateSpace
      description: Changes one or more values for a space.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/SpaceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSpaceResponse"
  /v1/spaces/{space_name}/projects/{project_name}/sourceRepositories/{source_repository_name}/cloneUrls:
    get:
      operationId: GetSourceRepositoryCloneUrls
      description: Returns information about the URLs that can be used with a Git client to clone a source repository.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: source_repository_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRepositoryNameString"
          description: The name of the source repository.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSourceRepositoryCloneUrlsResponse"
  /v1/spaces/{space_name}/subscription:
    get:
      operationId: GetSubscription
      description: Returns information about the Amazon Web Services account used for billing purposes and the billing plan for the space.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSubscriptionResponse"
  /userDetails:
    get:
      operationId: GetUserDetails
      description: Returns information about a user.
      parameters:
        - name: id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetUserDetailsRequestIdString"
          description: The system-generated unique ID of the user.
        - name: userName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetUserDetailsRequestUserNameString"
          description: The name of the user as displayed in Amazon CodeCatalyst.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserDetailsResponse"
  /v1/spaces/{space_name}/projects/{project_name}/workflows/{id}:
    get:
      operationId: GetWorkflow
      description: Returns information about a workflow.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The ID of the workflow. To rerieve a list of workflow IDs, use ListWorkflows.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetWorkflowRequestProjectNameString"
          description: The name of the project in the space.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowResponse"
  /v1/spaces/{space_name}/projects/{project_name}/workflowRuns/{id}:
    get:
      operationId: GetWorkflowRun
      description: Returns information about a specified run of a workflow.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The ID of the workflow run. To retrieve a list of workflow run IDs, use ListWorkflowRuns.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetWorkflowRunRequestProjectNameString"
          description: The name of the project in the space.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkflowRunResponse"
  /v1/spaces/{space_name}/projects/{project_name}/devEnvironments/{dev_environment_id}/sessions:
    post:
      operationId: ListDevEnvironmentSessions
      description: Retrieves a list of active sessions for a Dev Environment in a project.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
        - name: dev_environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The system-generated unique ID of the Dev Environment.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListDevEnvironmentSessionsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListDevEnvironmentSessionsRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDevEnvironmentSessionsResponse"
  /v1/spaces/{space_name}/devEnvironments:
    post:
      operationId: ListDevEnvironments
      description: Retrieves a list of Dev Environments in a project.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                projectName:
                  $ref: "#/components/schemas/NameString"
                filters:
                  $ref: "#/components/schemas/Filters"
                nextToken:
                  $ref: "#/components/schemas/ListDevEnvironmentsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListDevEnvironmentsRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDevEnvironmentsResponse"
  /v1/spaces/{space_name}/eventLogs:
    post:
      operationId: ListEventLogs
      description: Retrieves a list of events that occurred during a specific time in a space. You can use these events to audit user and system activity in a space. For more information, see Monitoring in the Amazon CodeCatalyst User Guide. ListEventLogs guarantees events for the last 30 days in a given space. You can also view and retrieve a list of management events over the last 90 days for Amazon CodeCatalyst in the CloudTrail console by viewing Event history, or by creating a trail to create and maintain a record of events that extends past 90 days. For more information, see Working with CloudTrail Event History and Working with CloudTrail trails.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                endTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                eventName:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/ListEventLogsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListEventLogsRequestMaxResultsInteger"
              required:
                - startTime
                - endTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventLogsResponse"
  /v1/spaces/{space_name}/projects/{project_name}/sourceRepositories:
    post:
      operationId: ListSourceRepositories
      description: Retrieves a list of source repositories in a project.
      parameters:
        - name: space_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the space.
        - name: project_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NameString"
          description: The name of the project in the space.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListSourceRepositoriesRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListSourceRepositoriesRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSourceRepositoriesResponse"
  /v1/spaces/{space_name}/projects/{project_name}/sourceRepositories/{source_repository_name}/branches:
    post:
      operationId: ListSourceRepositoryBranches
      description: Retrieves a list of branches in a specified source repository.
      parameters:
        - name: space_name
          in: path
