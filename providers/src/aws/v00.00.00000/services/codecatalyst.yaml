          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StartWorkflowRunRequestProjectNameString"
          description: The name of the project in the space.
        - name: workflowId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Uuid"
          description: The system-generated unique ID of the workflow. To retrieve a list of workflow IDs, use ListWorkflows.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/StartWorkflowRunRequestClientTokenString"
      responses:
