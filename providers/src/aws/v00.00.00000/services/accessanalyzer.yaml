        - UnusedPermissionRecommendation
    Status:
      type: string
      enum:
        - SUCCEEDED
        - FAILED
        - IN_PROGRESS
    GetFindingV2Response:
      type: object
      properties:
        analyzedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the resource-based policy or IAM entity that generated the finding was analyzed.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the finding was created.
        error:
          $ref: "#/components/schemas/String"
          description: An error.
        id:
          $ref: "#/components/schemas/FindingId"
          description: The ID of the finding to retrieve.
        nextToken:
          $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
        resource:
          $ref: "#/components/schemas/String"
          description: The resource that generated the finding.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of the resource identified in the finding.
        resourceOwnerAccount:
          $ref: "#/components/schemas/String"
          description: Tye Amazon Web Services account ID that owns the resource.
        status:
          $ref: "#/components/schemas/FindingStatus"
          description: The status of the finding.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the finding was updated.
        findingDetails:
          $ref: "#/components/schemas/FindingDetailsList"
          description: A localized message that explains the finding and provides guidance on how to address it.
        findingType:
          $ref: "#/components/schemas/FindingType"
          description: The type of the finding. For external access analyzers, the type is ExternalAccess. For unused access analyzers, the type can be UnusedIAMRole, UnusedIAMUserAccessKey, UnusedIAMUserPassword, or UnusedPermission. For internal access analyzers, the type is InternalAccess.
      required:
        - analyzedAt
        - createdAt
        - id
        - resourceType
        - resourceOwnerAccount
        - status
        - updatedAt
        - findingDetails
    FindingDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/FindingDetails"
    FindingDetails:
      description: Contains information about an external access or unused access finding. Only one parameter can be used in a FindingDetails object.
      type: object
      properties:
        internalAccessDetails:
          $ref: "#/components/schemas/InternalAccessDetails"
          description: The details for an internal access analyzer finding. This contains information about access patterns identified within your Amazon Web Services organization or account.
        externalAccessDetails:
          $ref: "#/components/schemas/ExternalAccessDetails"
          description: The details for an external access analyzer finding.
        unusedPermissionDetails:
          $ref: "#/components/schemas/UnusedPermissionDetails"
          description: The details for an unused access analyzer finding with an unused permission finding type.
        unusedIamUserAccessKeyDetails:
          $ref: "#/components/schemas/UnusedIamUserAccessKeyDetails"
          description: The details for an unused access analyzer finding with an unused IAM user access key finding type.
        unusedIamRoleDetails:
          $ref: "#/components/schemas/UnusedIamRoleDetails"
          description: The details for an unused access analyzer finding with an unused IAM role finding type.
        unusedIamUserPasswordDetails:
          $ref: "#/components/schemas/UnusedIamUserPasswordDetails"
          description: The details for an unused access analyzer finding with an unused IAM user password finding type.
    InternalAccessDetails:
      description: Contains information about an internal access finding. This includes details about the access that was identified within your Amazon Web Services organization or account.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/ActionList"
          description: The action in the analyzed policy statement that has internal access permission to use.
        condition:
          type: object
          properties: {}
          description: The condition in the analyzed policy statement that resulted in an internal access finding.
        principal:
          type: object
          properties: {}
          description: The principal that has access to a resource within the internal environment.
        principalOwnerAccount:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account ID that owns the principal identified in the internal access finding.
        accessType:
          $ref: "#/components/schemas/InternalAccessType"
          description: The type of internal access identified in the finding. This indicates how the access is granted within your Amazon Web Services environment.
        principalType:
          $ref: "#/components/schemas/PrincipalType"
          description: The type of principal identified in the internal access finding, such as IAM role or IAM user.
        sources:
          $ref: "#/components/schemas/FindingSourceList"
          description: The sources of the internal access finding. This indicates how the access that generated the finding is granted within your Amazon Web Services environment.
        resourceControlPolicyRestriction:
          $ref: "#/components/schemas/ResourceControlPolicyRestriction"
          description: "The type of restriction applied to the finding by the resource owner with an Organizations resource control policy (RCP). APPLICABLE: There is an RCP present in the organization but IAM Access Analyzer does not include it in the evaluation of effective permissions. For example, if s3:DeleteObject is blocked by the RCP and the restriction is APPLICABLE, then s3:DeleteObject would still be included in the list of actions for the finding. Only applicable to internal access findings with the account as the zone of trust. FAILED_TO_EVALUATE_RCP: There was an error evaluating the RCP. NOT_APPLICABLE: There was no RCP present in the organization. For internal access findings with the account as the zone of trust, NOT_APPLICABLE could also indicate that there was no RCP applicable to the resource. APPLIED: An RCP is present in the organization and IAM Access Analyzer included it in the evaluation of effective permissions. For example, if s3:DeleteObject is blocked by the RCP and the restriction is APPLIED, then s3:DeleteObject would not be included in the list of actions for the finding. Only applicable to internal access findings with the organization as the zone of trust."
        serviceControlPolicyRestriction:
          $ref: "#/components/schemas/ServiceControlPolicyRestriction"
          description: "The type of restriction applied to the finding by an Organizations service control policy (SCP). APPLICABLE: There is an SCP present in the organization but IAM Access Analyzer does not include it in the evaluation of effective permissions. Only applicable to internal access findings with the account as the zone of trust. FAILED_TO_EVALUATE_SCP: There was an error evaluating the SCP. NOT_APPLICABLE: There was no SCP present in the organization. For internal access findings with the account as the zone of trust, NOT_APPLICABLE could also indicate that there was no SCP applicable to the principal. APPLIED: An SCP is present in the organization and IAM Access Analyzer included it in the evaluation of effective permissions. Only applicable to internal access findings with the organization as the zone of trust."
    InternalAccessType:
      type: string
      enum:
        - INTRA_ACCOUNT
        - INTRA_ORG
    PrincipalType:
      type: string
      enum:
        - IAM_ROLE
        - IAM_USER
    ServiceControlPolicyRestriction:
      type: string
      enum:
        - APPLICABLE
        - FAILED_TO_EVALUATE_SCP
        - NOT_APPLICABLE
        - APPLIED
    ExternalAccessDetails:
      description: Contains information about an external access finding.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/ActionList"
          description: The action in the analyzed policy statement that an external principal has permission to use.
        condition:
          type: object
          properties: {}
          description: The condition in the analyzed policy statement that resulted in an external access finding.
        isPublic:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the external access finding is public.
        principal:
          type: object
          properties: {}
          description: The external principal that has access to a resource within the zone of trust.
        sources:
          $ref: "#/components/schemas/FindingSourceList"
          description: The sources of the external access finding. This indicates how the access that generated the finding is granted. It is populated for Amazon S3 bucket findings.
        resourceControlPolicyRestriction:
          $ref: "#/components/schemas/ResourceControlPolicyRestriction"
          description: "The type of restriction applied to the finding by the resource owner with an Organizations resource control policy (RCP). APPLICABLE: There is an RCP present in the organization but IAM Access Analyzer does not include it in the evaluation of effective permissions. For example, if s3:DeleteObject is blocked by the RCP and the restriction is APPLICABLE, then s3:DeleteObject would still be included in the list of actions for the finding. FAILED_TO_EVALUATE_RCP: There was an error evaluating the RCP. NOT_APPLICABLE: There was no RCP present in the organization, or there was no RCP applicable to the resource. For example, the resource being analyzed is an Amazon RDS snapshot and there is an RCP in the organization, but the RCP only impacts Amazon S3 buckets. APPLIED: This restriction is not currently available for external access findings."
      required:
        - condition
    UnusedPermissionDetails:
      description: Contains information about an unused access finding for a permission. IAM Access Analyzer charges for unused access analysis based on the number of IAM roles and users analyzed per month. For more details on pricing, see IAM Access Analyzer pricing.
      type: object
      properties:
        actions:
          $ref: "#/components/schemas/UnusedActionList"
          description: A list of unused actions for which the unused access finding was generated.
        serviceNamespace:
          $ref: "#/components/schemas/String"
          description: The namespace of the Amazon Web Services service that contains the unused actions.
        lastAccessed:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the permission was last accessed.
      required:
        - serviceNamespace
    UnusedActionList:
      type: array
      items:
        $ref: "#/components/schemas/UnusedAction"
    UnusedAction:
      description: Contains information about an unused access finding for an action. IAM Access Analyzer charges for unused access analysis based on the number of IAM roles and users analyzed per month. For more details on pricing, see IAM Access Analyzer pricing.
      type: object
      properties:
        action:
          $ref: "#/components/schemas/String"
          description: The action for which the unused access finding was generated.
        lastAccessed:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the action was last accessed.
      required:
        - action
    UnusedIamUserAccessKeyDetails:
      description: Contains information about an unused access finding for an IAM user access key. IAM Access Analyzer charges for unused access analysis based on the number of IAM roles and users analyzed per month. For more details on pricing, see IAM Access Analyzer pricing.
      type: object
      properties:
        accessKeyId:
          $ref: "#/components/schemas/String"
          description: The ID of the access key for which the unused access finding was generated.
        lastAccessed:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the access key was last accessed.
      required:
        - accessKeyId
    UnusedIamRoleDetails:
      description: Contains information about an unused access finding for an IAM role. IAM Access Analyzer charges for unused access analysis based on the number of IAM roles and users analyzed per month. For more details on pricing, see IAM Access Analyzer pricing.
      type: object
      properties:
        lastAccessed:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the role was last accessed.
    UnusedIamUserPasswordDetails:
      description: Contains information about an unused access finding for an IAM user password. IAM Access Analyzer charges for unused access analysis based on the number of IAM roles and users analyzed per month. For more details on pricing, see IAM Access Analyzer pricing.
      type: object
      properties:
        lastAccessed:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the password was last accessed.
    FindingType:
      type: string
      enum:
        - ExternalAccess
        - UnusedIAMRole
        - UnusedIAMUserAccessKey
        - UnusedIAMUserPassword
        - UnusedPermission
        - InternalAccess
    GetFindingsStatisticsResponse:
      type: object
      properties:
        findingsStatistics:
          $ref: "#/components/schemas/FindingsStatisticsList"
          description: A group of external access or unused access findings statistics.
        lastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the retrieval of the findings statistics was last updated. If the findings statistics have not been previously retrieved for the specified analyzer, this field will not be populated.
    FindingsStatisticsList:
      type: array
      items:
        $ref: "#/components/schemas/FindingsStatistics"
    FindingsStatistics:
      description: Contains information about the aggregate statistics for an external or unused access analyzer. Only one parameter can be used in a FindingsStatistics object.
      type: object
      properties:
        externalAccessFindingsStatistics:
          $ref: "#/components/schemas/ExternalAccessFindingsStatistics"
          description: The aggregate statistics for an external access analyzer.
        internalAccessFindingsStatistics:
          $ref: "#/components/schemas/InternalAccessFindingsStatistics"
          description: The aggregate statistics for an internal access analyzer. This includes information about active, archived, and resolved findings related to internal access within your Amazon Web Services organization or account.
        unusedAccessFindingsStatistics:
          $ref: "#/components/schemas/UnusedAccessFindingsStatistics"
          description: The aggregate statistics for an unused access analyzer.
    ExternalAccessFindingsStatistics:
      description: Provides aggregate statistics about the findings for the specified external access analyzer.
      type: object
      properties:
        resourceTypeStatistics:
          type: object
