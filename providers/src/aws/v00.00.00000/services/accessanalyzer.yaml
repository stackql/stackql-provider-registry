        recommendedAction:
          $ref: "#/components/schemas/RecommendedRemediationAction"
          description: A recommendation of whether to create or detach a policy for an unused permissions finding.
        recommendedPolicy:
          $ref: "#/components/schemas/String"
          description: If the recommended action for the unused permissions finding is to replace the existing policy, the contents of the recommended policy to replace the policy specified in the existingPolicyId field.
        existingPolicyId:
          $ref: "#/components/schemas/String"
          description: If the recommended action for the unused permissions finding is to detach a policy, the ID of an existing policy to be detached.
      required:
