          $ref: "#/components/schemas/Integer"
          description: The number of active findings for the specified internal access analyzer.
        totalArchivedFindings:
          $ref: "#/components/schemas/Integer"
          description: The number of archived findings for the specified internal access analyzer.
        totalResolvedFindings:
          $ref: "#/components/schemas/Integer"
          description: The number of resolved findings for the specified internal access analyzer.
    UnusedAccessFindingsStatistics:
