openapi: 3.0.0
info:
  version: "2019-11-01"
  title: Access Analyzer
  description: Access Analyzer
  x-serviceName: access-analyzer
  x-serviceAlias: accessanalyzer
  x-protocol: rest-json
  x-apiVersion: "2019-11-01"
  x-endpointPrefix: access-analyzer
servers:
  - url: https://access-analyzer.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for accessanalyzer
paths:
  /archive-rule:
    put:
      operationId: ApplyArchiveRule
      description: Retroactively applies the archive rule to existing findings that meet the archive rule criteria.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                ruleName:
                  $ref: "#/components/schemas/Name"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - analyzerArn
                - ruleName
      responses:
        "200":
          description: Success
  /policy/generation/{job_id}:
    put:
      operationId: CancelPolicyGeneration
      description: Cancels the requested policy generation.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The JobId that is returned by the StartPolicyGeneration operation. The JobId can be used with GetGeneratedPolicy to retrieve the generated policies or used with CancelPolicyGeneration to cancel the policy generation request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelPolicyGenerationResponse"
    get:
      operationId: GetGeneratedPolicy
      description: Retrieves the policy that was generated using StartPolicyGeneration.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The JobId that is returned by the StartPolicyGeneration operation. The JobId can be used with GetGeneratedPolicy to retrieve the generated policies or used with CancelPolicyGeneration to cancel the policy generation request.
        - name: includeResourcePlaceholders
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: The level of detail that you want to generate. You can specify whether to generate policies with placeholders for resource ARNs for actions that support resource level granularity in policies. For example, in the resource section of a policy, you can receive a placeholder such as "Resource":"arn:aws:s3:::${BucketName}" instead of "*".
        - name: includeServiceLevelTemplate
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: The level of detail that you want to generate. You can specify whether to generate service-level policies. IAM Access Analyzer uses iam:servicelastaccessed to identify services that have been used recently to create this service-level template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGeneratedPolicyResponse"
  /policy/check-access-not-granted:
    post:
      operationId: CheckAccessNotGranted
      description: Checks whether the specified access isn't allowed by a policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyDocument:
                  $ref: "#/components/schemas/AccessCheckPolicyDocument"
                access:
                  $ref: "#/components/schemas/CheckAccessNotGrantedRequestAccessList"
                policyType:
                  $ref: "#/components/schemas/AccessCheckPolicyType"
              required:
                - policyDocument
                - access
                - policyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckAccessNotGrantedResponse"
  /policy/check-no-new-access:
    post:
      operationId: CheckNoNewAccess
      description: Checks whether new access is allowed for an updated policy when compared to the existing policy. You can find examples for reference policies and learn how to set up and run a custom policy check for new access in the IAM Access Analyzer custom policy checks samples repository on GitHub. The reference policies in this repository are meant to be passed to the existingPolicyDocument request parameter.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPolicyDocument:
                  $ref: "#/components/schemas/AccessCheckPolicyDocument"
                existingPolicyDocument:
                  $ref: "#/components/schemas/AccessCheckPolicyDocument"
                policyType:
                  $ref: "#/components/schemas/AccessCheckPolicyType"
              required:
                - newPolicyDocument
                - existingPolicyDocument
                - policyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckNoNewAccessResponse"
  /policy/check-no-public-access:
    post:
      operationId: CheckNoPublicAccess
      description: Checks whether a resource policy can grant public access to the specified resource type.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyDocument:
                  $ref: "#/components/schemas/AccessCheckPolicyDocument"
                resourceType:
                  $ref: "#/components/schemas/AccessCheckResourceType"
              required:
                - policyDocument
                - resourceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckNoPublicAccessResponse"
  /access-preview:
    put:
      operationId: CreateAccessPreview
      description: Creates an access preview that allows you to preview IAM Access Analyzer findings for your resource before deploying resource permissions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                configurations:
                  $ref: "#/components/schemas/ConfigurationsMap"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - analyzerArn
                - configurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccessPreviewResponse"
    get:
      operationId: ListAccessPreviews
      description: Retrieves a list of access previews for the specified analyzer.
      parameters:
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer used to generate the access preview.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to return in the response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPreviewsResponse"
  /analyzer:
    put:
      operationId: CreateAnalyzer
      description: Creates an analyzer for your account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerName:
                  $ref: "#/components/schemas/Name"
                type:
                  $ref: "#/components/schemas/Type"
                archiveRules:
                  $ref: "#/components/schemas/InlineArchiveRulesList"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                clientToken:
                  $ref: "#/components/schemas/String"
                configuration:
                  $ref: "#/components/schemas/AnalyzerConfiguration"
              required:
                - analyzerName
                - type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnalyzerResponse"
    get:
      operationId: ListAnalyzers
      description: Retrieves a list of analyzers.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to return in the response.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Type"
          description: The type of analyzer.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalyzersResponse"
  /analyzer/{analyzer_name}/archive-rule:
    put:
      operationId: CreateArchiveRule
      description: Creates an archive rule for the specified analyzer. Archive rules automatically archive new findings that meet the criteria you define when you create the rule. To learn about filter keys that you can use to create an archive rule, see IAM Access Analyzer filter keys in the IAM User Guide.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the created analyzer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ruleName:
                  $ref: "#/components/schemas/Name"
                filter:
                  $ref: "#/components/schemas/FilterCriteriaMap"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - ruleName
                - filter
      responses:
        "200":
          description: Success
    get:
      operationId: ListArchiveRules
      description: Retrieves a list of archive rules created for the specified analyzer.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer to retrieve rules from.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to return in the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListArchiveRulesResponse"
  /analyzer/{analyzer_name}:
    delete:
      operationId: DeleteAnalyzer
      description: Deletes the specified analyzer. When you delete an analyzer, IAM Access Analyzer is disabled for the account or organization in the current or specific Region. All findings that were generated by the analyzer are deleted. You cannot undo this action.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A client token.
      responses:
        "200":
          description: Success
    get:
      operationId: GetAnalyzer
      description: Retrieves information about the specified analyzer.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer retrieved.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnalyzerResponse"
    put:
      operationId: UpdateAnalyzer
      description: Modifies the configuration of an existing analyzer. This action is not supported for external access analyzers.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer to modify.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/AnalyzerConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAnalyzerResponse"
  /analyzer/{analyzer_name}/archive-rule/{rule_name}:
    delete:
      operationId: DeleteArchiveRule
      description: Deletes the specified archive rule.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer that associated with the archive rule to delete.
        - name: rule_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the rule to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A client token.
      responses:
        "200":
          description: Success
    get:
      operationId: GetArchiveRule
      description: Retrieves information about an archive rule. To learn about filter keys that you can use to create an archive rule, see IAM Access Analyzer filter keys in the IAM User Guide.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer to retrieve rules from.
        - name: rule_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the rule to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetArchiveRuleResponse"
    put:
      operationId: UpdateArchiveRule
      description: Updates the criteria and values for the specified archive rule.
      parameters:
        - name: analyzer_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the analyzer to update the archive rules for.
        - name: rule_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Name"
          description: The name of the rule to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/FilterCriteriaMap"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - filter
      responses:
        "200":
          description: Success
  /recommendation/{id}:
    post:
      operationId: GenerateFindingRecommendation
      description: Creates a recommendation for an unused permissions finding.
      parameters:
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer used to generate the finding recommendation.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GenerateFindingRecommendationRequestIdString"
          description: The unique ID for the finding recommendation.
      responses:
        "200":
          description: Success
    get:
      operationId: GetFindingRecommendation
      description: Retrieves information about a finding recommendation for the specified analyzer.
      parameters:
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer used to generate the finding recommendation.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetFindingRecommendationRequestIdString"
          description: The unique ID for the finding recommendation.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetFindingRecommendationRequestMaxResultsInteger"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingRecommendationResponse"
  /access-preview/{access_preview_id}:
    get:
      operationId: GetAccessPreview
      description: Retrieves information about an access preview for the specified analyzer.
      parameters:
        - name: access_preview_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPreviewId"
          description: The unique ID for the access preview.
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer used to generate the access preview.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccessPreviewResponse"
    post:
      operationId: ListAccessPreviewFindings
      description: Retrieves a list of access preview findings generated by the specified access preview.
      parameters:
        - name: access_preview_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccessPreviewId"
          description: The unique ID for the access preview.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                filter:
                  $ref: "#/components/schemas/FilterCriteriaMap"
                nextToken:
                  $ref: "#/components/schemas/Token"
                maxResults:
                  $ref: "#/components/schemas/Integer"
              required:
                - analyzerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccessPreviewFindingsResponse"
  /analyzed-resource:
    get:
      operationId: GetAnalyzedResource
      description: Retrieves information about a resource that was analyzed. This action is supported only for external access analyzers.
      parameters:
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer to retrieve information from.
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to retrieve information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAnalyzedResourceResponse"
    post:
      operationId: ListAnalyzedResources
      description: Retrieves a list of resources of the specified type that have been analyzed by the specified analyzer.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                resourceType:
                  $ref: "#/components/schemas/ResourceType"
                nextToken:
                  $ref: "#/components/schemas/Token"
                maxResults:
                  $ref: "#/components/schemas/Integer"
              required:
                - analyzerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalyzedResourcesResponse"
  /finding/{id}:
    get:
      operationId: GetFinding
      description: Retrieves information about the specified finding. GetFinding and GetFindingV2 both use access-analyzer:GetFinding in the Action element of an IAM policy statement. You must have permission to perform the access-analyzer:GetFinding action. GetFinding is supported only for external access analyzers. You must use GetFindingV2 for internal and unused access analyzers.
      parameters:
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer that generated the finding.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FindingId"
          description: The ID of the finding to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingResponse"
  /findingv2/{id}:
    get:
      operationId: GetFindingV2
      description: Retrieves information about the specified finding. GetFinding and GetFindingV2 both use access-analyzer:GetFinding in the Action element of an IAM policy statement. You must have permission to perform the access-analyzer:GetFinding action.
      parameters:
        - name: analyzerArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer that generated the finding.
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FindingId"
          description: The ID of the finding to retrieve.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingV2Response"
  /analyzer/findings/statistics:
    post:
      operationId: GetFindingsStatistics
      description: Retrieves a list of aggregated finding statistics for an external access or unused access analyzer.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
              required:
                - analyzerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFindingsStatisticsResponse"
  /finding:
    post:
      operationId: ListFindings
      description: Retrieves a list of findings generated by the specified analyzer. ListFindings and ListFindingsV2 both use access-analyzer:ListFindings in the Action element of an IAM policy statement. You must have permission to perform the access-analyzer:ListFindings action. To learn about filter keys that you can use to retrieve a list of findings, see IAM Access Analyzer filter keys in the IAM User Guide. ListFindings is supported only for external access analyzers. You must use ListFindingsV2 for internal and unused access analyzers.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                filter:
                  $ref: "#/components/schemas/FilterCriteriaMap"
                sort:
                  $ref: "#/components/schemas/SortCriteria"
                nextToken:
                  $ref: "#/components/schemas/Token"
                maxResults:
                  $ref: "#/components/schemas/Integer"
              required:
                - analyzerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFindingsResponse"
    put:
      operationId: UpdateFindings
      description: Updates the status for the specified findings.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                status:
                  $ref: "#/components/schemas/FindingStatusUpdate"
                ids:
                  $ref: "#/components/schemas/FindingIdList"
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - analyzerArn
                - status
      responses:
        "200":
          description: Success
  /findingv2:
    post:
      operationId: ListFindingsV2
      description: Retrieves a list of findings generated by the specified analyzer. ListFindings and ListFindingsV2 both use access-analyzer:ListFindings in the Action element of an IAM policy statement. You must have permission to perform the access-analyzer:ListFindings action. To learn about filter keys that you can use to retrieve a list of findings, see IAM Access Analyzer filter keys in the IAM User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                filter:
                  $ref: "#/components/schemas/FilterCriteriaMap"
                maxResults:
                  $ref: "#/components/schemas/Integer"
                nextToken:
                  $ref: "#/components/schemas/Token"
                sort:
                  $ref: "#/components/schemas/SortCriteria"
              required:
                - analyzerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFindingsV2Response"
  /policy/generation:
    get:
      operationId: ListPolicyGenerations
      description: Lists all of the policy generations requested in the last seven days.
      parameters:
        - name: principalArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PrincipalArn"
          description: The ARN of the IAM entity (user or role) for which you are generating a policy. Use this with ListGeneratedPolicies to filter the results to only include results for a specific principal.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListPolicyGenerationsRequestMaxResultsInteger"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPolicyGenerationsResponse"
    put:
      operationId: StartPolicyGeneration
      description: Starts the policy generation request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyGenerationDetails:
                  $ref: "#/components/schemas/PolicyGenerationDetails"
                cloudTrailDetails:
                  $ref: "#/components/schemas/CloudTrailDetails"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - policyGenerationDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPolicyGenerationResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Retrieves a list of tags applied to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to retrieve tags from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds a tag to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to add the tag to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource to remove the tag from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The key for the tag to add.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /resource/scan:
    post:
      operationId: StartResourceScan
      description: Immediately starts a scan of the policies applied to the specified resource. This action is supported only for external access analyzers.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analyzerArn:
                  $ref: "#/components/schemas/AnalyzerArn"
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                resourceOwnerAccount:
                  $ref: "#/components/schemas/String"
              required:
                - analyzerArn
                - resourceArn
      responses:
        "200":
          description: Success
  /policy/validation:
    post:
      operationId: ValidatePolicy
      description: Requests the validation of a policy and returns a list of findings. The findings help you identify issues and provide actionable recommendations to resolve the issue and enable you to author functional policies that meet security best practices.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used for pagination of results returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                locale:
                  $ref: "#/components/schemas/Locale"
                policyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                policyType:
                  $ref: "#/components/schemas/PolicyType"
                validatePolicyResourceType:
                  $ref: "#/components/schemas/ValidatePolicyResourceType"
              required:
                - policyDocument
                - policyType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatePolicyResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AnalyzerArn:
      type: string
      pattern: "[^:]*:[^:]*:[^:]*:[^:]*:[^:]*:analyzer/.{1,255}"
    Name:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z][A-Za-z0-9_.-]*"
    String:
      type: string
    JobId:
      type: string
    CancelPolicyGenerationResponse:
      type: object
    AccessCheckPolicyDocument:
      type: string
    CheckAccessNotGrantedRequestAccessList:
      type: array
      items:
        $ref: "#/components/schemas/Access"
    Access:
      description: Contains information about actions and resources that define permissions to check against a policy.
      type: object
      properties:
        actions:
          $ref: "#/components/schemas/AccessActionsList"
          description: A list of actions for the access permissions. Any strings that can be used as an action in an IAM policy can be used in the list of actions to check.
        resources:
          $ref: "#/components/schemas/AccessResourcesList"
          description: A list of resources for the access permissions. Any strings that can be used as an Amazon Resource Name (ARN) in an IAM policy can be used in the list of resources to check. You can only use a wildcard in the portion of the ARN that specifies the resource ID.
    AccessActionsList:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      type: string
    AccessResourcesList:
      type: array
      items:
        $ref: "#/components/schemas/Resource"
    Resource:
      type: string
      minLength: 0
      maxLength: 2048
    AccessCheckPolicyType:
      type: string
      enum:
        - IDENTITY_POLICY
        - RESOURCE_POLICY
    CheckAccessNotGrantedResponse:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/CheckAccessNotGrantedResult"
          description: The result of the check for whether the access is allowed. If the result is PASS, the specified policy doesn't allow any of the specified permissions in the access object. If the result is FAIL, the specified policy might allow some or all of the permissions in the access object.
        message:
          $ref: "#/components/schemas/String"
          description: The message indicating whether the specified access is allowed.
        reasons:
          $ref: "#/components/schemas/ReasonSummaryList"
          description: A description of the reasoning of the result.
    CheckAccessNotGrantedResult:
      type: string
      enum:
        - PASS
        - FAIL
    ReasonSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/ReasonSummary"
    ReasonSummary:
      description: Contains information about the reasoning why a check for access passed or failed.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/String"
          description: A description of the reasoning of a result of checking for access.
        statementIndex:
          $ref: "#/components/schemas/Integer"
          description: The index number of the reason statement.
        statementId:
          $ref: "#/components/schemas/String"
          description: The identifier for the reason statement.
    Integer:
      type: integer
    CheckNoNewAccessResponse:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/CheckNoNewAccessResult"
          description: The result of the check for new access. If the result is PASS, no new access is allowed by the updated policy. If the result is FAIL, the updated policy might allow new access.
        message:
          $ref: "#/components/schemas/String"
          description: The message indicating whether the updated policy allows new access.
        reasons:
          $ref: "#/components/schemas/ReasonSummaryList"
          description: A description of the reasoning of the result.
    CheckNoNewAccessResult:
      type: string
      enum:
        - PASS
        - FAIL
    AccessCheckResourceType:
      type: string
      enum:
        - AWS::DynamoDB::Table
        - AWS::DynamoDB::Stream
        - AWS::EFS::FileSystem
        - AWS::OpenSearchService::Domain
        - AWS::Kinesis::Stream
        - AWS::Kinesis::StreamConsumer
        - AWS::KMS::Key
        - AWS::Lambda::Function
        - AWS::S3::Bucket
        - AWS::S3::AccessPoint
        - AWS::S3Express::DirectoryBucket
        - AWS::S3::Glacier
        - AWS::S3Outposts::Bucket
        - AWS::S3Outposts::AccessPoint
        - AWS::SecretsManager::Secret
        - AWS::SNS::Topic
        - AWS::SQS::Queue
        - AWS::IAM::AssumeRolePolicyDocument
        - AWS::S3Tables::TableBucket
        - AWS::ApiGateway::RestApi
        - AWS::CodeArtifact::Domain
        - AWS::Backup::BackupVault
        - AWS::CloudTrail::Dashboard
        - AWS::CloudTrail::EventDataStore
        - AWS::S3Tables::Table
        - AWS::S3Express::AccessPoint
    CheckNoPublicAccessResponse:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/CheckNoPublicAccessResult"
          description: The result of the check for public access to the specified resource type. If the result is PASS, the policy doesn't allow public access to the specified resource type. If the result is FAIL, the policy might allow public access to the specified resource type.
        message:
          $ref: "#/components/schemas/String"
          description: The message indicating whether the specified policy allows public access to resources.
        reasons:
          $ref: "#/components/schemas/ReasonSummaryList"
          description: A list of reasons why the specified resource policy grants public access for the resource type.
    CheckNoPublicAccessResult:
      type: string
      enum:
        - PASS
        - FAIL
    ConfigurationsMap:
      type: object
      properties: {}
    CreateAccessPreviewResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AccessPreviewId"
          description: The unique ID for the access preview.
      required:
        - id
    AccessPreviewId:
      type: string
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    Type:
      type: string
      enum:
        - ACCOUNT
        - ORGANIZATION
        - ACCOUNT_UNUSED_ACCESS
        - ORGANIZATION_UNUSED_ACCESS
        - ACCOUNT_INTERNAL_ACCESS
        - ORGANIZATION_INTERNAL_ACCESS
    InlineArchiveRulesList:
      type: array
      items:
        $ref: "#/components/schemas/InlineArchiveRule"
    InlineArchiveRule:
      description: An criterion statement in an archive rule. Each archive rule may have multiple criteria.
      type: object
      properties:
        ruleName:
          $ref: "#/components/schemas/Name"
          description: The name of the rule.
        filter:
          type: object
          properties: {}
          description: The condition and values for a criterion.
      required:
        - ruleName
        - filter
    TagsMap:
      type: object
      properties: {}
    AnalyzerConfiguration:
      description: Contains information about the configuration of an analyzer for an Amazon Web Services organization or account.
      type: object
      properties:
        unusedAccess:
          $ref: "#/components/schemas/UnusedAccessConfiguration"
          description: Specifies the configuration of an unused access analyzer for an Amazon Web Services organization or account.
        internalAccess:
          $ref: "#/components/schemas/InternalAccessConfiguration"
          description: Specifies the configuration of an internal access analyzer for an Amazon Web Services organization or account. This configuration determines how the analyzer evaluates access within your Amazon Web Services environment.
    UnusedAccessConfiguration:
      description: Contains information about an unused access analyzer.
      type: object
      properties:
        unusedAccessAge:
          $ref: "#/components/schemas/Integer"
          description: The specified access age in days for which to generate findings for unused access. For example, if you specify 90 days, the analyzer will generate findings for IAM entities within the accounts of the selected organization for any access that hasn't been used in 90 or more days since the analyzer's last scan. You can choose a value between 1 and 365 days.
        analysisRule:
          $ref: "#/components/schemas/AnalysisRule"
    AnalysisRule:
      description: Contains information about analysis rules for the analyzer. Analysis rules determine which entities will generate findings based on the criteria you define when you create the rule.
      type: object
      properties:
        exclusions:
          $ref: "#/components/schemas/AnalysisRuleCriteriaList"
          description: A list of rules for the analyzer containing criteria to exclude from analysis. Entities that meet the rule criteria will not generate findings.
    AnalysisRuleCriteriaList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleCriteria"
    AnalysisRuleCriteria:
      description: The criteria for an analysis rule for an analyzer. The criteria determine which entities will generate findings.
      type: object
      properties:
        accountIds:
          $ref: "#/components/schemas/AccountIdsList"
          description: A list of Amazon Web Services account IDs to apply to the analysis rule criteria. The accounts cannot include the organization analyzer owner account. Account IDs can only be applied to the analysis rule criteria for organization-level analyzers. The list cannot include more than 2,000 account IDs.
        resourceTags:
          $ref: "#/components/schemas/TagsList"
          description: An array of key-value pairs to match for your resources. You can use the set of Unicode letters, digits, whitespace, _, ., /, =, +, and -. For the tag key, you can specify a value that is 1 to 128 characters in length and cannot be prefixed with aws:. For the tag value, you can specify a value that is 0 to 256 characters in length. If the specified tag value is 0 characters, the rule is applied to all principals with the specified tag key.
    AccountIdsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    TagsList:
      type: array
      items:
        $ref: "#/components/schemas/TagsMap"
    InternalAccessConfiguration:
      description: Specifies the configuration of an internal access analyzer for an Amazon Web Services organization or account. This configuration determines how the analyzer evaluates internal access within your Amazon Web Services environment.
      type: object
      properties:
        analysisRule:
          $ref: "#/components/schemas/InternalAccessAnalysisRule"
          description: Contains information about analysis rules for the internal access analyzer. These rules determine which resources and access patterns will be analyzed.
    InternalAccessAnalysisRule:
      description: Contains information about analysis rules for the internal access analyzer. Analysis rules determine which entities will generate findings based on the criteria you define when you create the rule.
      type: object
      properties:
        inclusions:
          $ref: "#/components/schemas/InternalAccessAnalysisRuleCriteriaList"
          description: A list of rules for the internal access analyzer containing criteria to include in analysis. Only resources that meet the rule criteria will generate findings.
    InternalAccessAnalysisRuleCriteriaList:
      type: array
      items:
        $ref: "#/components/schemas/InternalAccessAnalysisRuleCriteria"
    InternalAccessAnalysisRuleCriteria:
      description: The criteria for an analysis rule for an internal access analyzer.
      type: object
      properties:
        accountIds:
          $ref: "#/components/schemas/AccountIdsList"
          description: A list of Amazon Web Services account IDs to apply to the internal access analysis rule criteria. Account IDs can only be applied to the analysis rule criteria for organization-level analyzers.
        resourceTypes:
          $ref: "#/components/schemas/ResourceTypeList"
          description: "A list of resource types to apply to the internal access analysis rule criteria. The analyzer will only generate findings for resources of these types. These resource types are currently supported for internal access analyzers: AWS::S3::Bucket AWS::RDS::DBSnapshot AWS::RDS::DBClusterSnapshot AWS::S3Express::DirectoryBucket AWS::DynamoDB::Table AWS::DynamoDB::Stream"
        resourceArns:
          $ref: "#/components/schemas/ResourceArnsList"
          description: A list of resource ARNs to apply to the internal access analysis rule criteria. The analyzer will only generate findings for resources that match these ARNs.
    ResourceTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceType"
    ResourceType:
      type: string
      enum:
        - AWS::S3::Bucket
        - AWS::IAM::Role
        - AWS::SQS::Queue
        - AWS::Lambda::Function
        - AWS::Lambda::LayerVersion
        - AWS::KMS::Key
        - AWS::SecretsManager::Secret
        - AWS::EFS::FileSystem
        - AWS::EC2::Snapshot
        - AWS::ECR::Repository
        - AWS::RDS::DBSnapshot
        - AWS::RDS::DBClusterSnapshot
        - AWS::SNS::Topic
        - AWS::S3Express::DirectoryBucket
        - AWS::DynamoDB::Table
        - AWS::DynamoDB::Stream
        - AWS::IAM::User
    ResourceArnsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CreateAnalyzerResponse:
      description: The response to the request to create an analyzer.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer that was created by the request.
    FilterCriteriaMap:
      type: object
      properties: {}
    GenerateFindingRecommendationRequestIdString:
      type: string
      minLength: 1
      maxLength: 2048
    GetAccessPreviewResponse:
      type: object
      properties:
        accessPreview:
          $ref: "#/components/schemas/AccessPreview"
          description: An object that contains information about the access preview.
      required:
        - accessPreview
    AccessPreview:
      description: Contains information about an access preview.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AccessPreviewId"
          description: The unique ID for the access preview.
        analyzerArn:
          $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer used to generate the access preview.
        configurations:
          type: object
          properties: {}
          description: A map of resource ARNs for the proposed resource configuration.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the access preview was created.
        status:
          $ref: "#/components/schemas/AccessPreviewStatus"
          description: The status of the access preview. Creating - The access preview creation is in progress. Completed - The access preview is complete. You can preview findings for external access to the resource. Failed - The access preview creation has failed.
        statusReason:
          $ref: "#/components/schemas/AccessPreviewStatusReason"
          description: Provides more details about the current status of the access preview. For example, if the creation of the access preview fails, a Failed status is returned. This failure can be due to an internal issue with the analysis or due to an invalid resource configuration.
      required:
        - id
        - analyzerArn
        - configurations
        - createdAt
        - status
    Timestamp:
      type: string
      format: date-time
    AccessPreviewStatus:
      type: string
      enum:
        - COMPLETED
        - CREATING
        - FAILED
    AccessPreviewStatusReason:
      description: Provides more details about the current status of the access preview. For example, if the creation of the access preview fails, a Failed status is returned. This failure can be due to an internal issue with the analysis or due to an invalid proposed resource configuration.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/AccessPreviewStatusReasonCode"
          description: The reason code for the current status of the access preview.
      required:
        - code
    AccessPreviewStatusReasonCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - INVALID_CONFIGURATION
    ResourceArn:
      type: string
      pattern: arn:[^:]*:[^:]*:[^:]*:[^:]*:.*
    GetAnalyzedResourceResponse:
      description: The response to the request.
      type: object
      properties:
        resource:
          $ref: "#/components/schemas/AnalyzedResource"
          description: An AnalyzedResource object that contains information that IAM Access Analyzer found when it analyzed the resource.
    AnalyzedResource:
      description: Contains details about the analyzed resource.
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource that was analyzed.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of the resource that was analyzed.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the finding was created.
        analyzedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the resource was analyzed.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the finding was updated.
        isPublic:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the policy that generated the finding grants public access to the resource.
        actions:
          $ref: "#/components/schemas/ActionList"
          description: The actions that an external principal is granted permission to use by the policy that generated the finding.
        sharedVia:
          $ref: "#/components/schemas/SharedViaList"
          description: Indicates how the access that generated the finding is granted. This is populated for Amazon S3 bucket findings.
        status:
          $ref: "#/components/schemas/FindingStatus"
          description: The current status of the finding generated from the analyzed resource.
        resourceOwnerAccount:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account ID that owns the resource.
        error:
          $ref: "#/components/schemas/String"
          description: An error message.
      required:
        - resourceArn
        - resourceType
        - createdAt
        - analyzedAt
        - updatedAt
        - isPublic
        - resourceOwnerAccount
    Boolean:
      type: boolean
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    SharedViaList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    FindingStatus:
      type: string
      enum:
        - ACTIVE
        - ARCHIVED
        - RESOLVED
    GetAnalyzerResponse:
      description: The response to the request.
      type: object
      properties:
        analyzer:
          $ref: "#/components/schemas/AnalyzerSummary"
          description: An AnalyzerSummary object that contains information about the analyzer.
      required:
        - analyzer
    AnalyzerSummary:
      description: Contains information about the analyzer.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AnalyzerArn"
          description: The ARN of the analyzer.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the analyzer.
        type_:
          $ref: "#/components/schemas/Type"
          description: The type represents the zone of trust or scope for the analyzer.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp for the time at which the analyzer was created.
        lastResourceAnalyzed:
          $ref: "#/components/schemas/String"
          description: The resource that was most recently analyzed by the analyzer.
        lastResourceAnalyzedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the most recently analyzed resource was analyzed.
        tags:
          type: object
          properties: {}
          description: An array of key-value pairs applied to the analyzer. The key-value pairs consist of the set of Unicode letters, digits, whitespace, _, ., /, =, +, and -. The tag key is a value that is 1 to 128 characters in length and cannot be prefixed with aws:. The tag value is a value that is 0 to 256 characters in length.
        status:
          $ref: "#/components/schemas/AnalyzerStatus"
          description: The status of the analyzer. An Active analyzer successfully monitors supported resources and generates new findings. The analyzer is Disabled when a user action, such as removing trusted access for Identity and Access Management Access Analyzer from Organizations, causes the analyzer to stop generating new findings. The status is Creating when the analyzer creation is in progress and Failed when the analyzer creation has failed.
        statusReason:
          $ref: "#/components/schemas/StatusReason"
          description: The statusReason provides more details about the current status of the analyzer. For example, if the creation for the analyzer fails, a Failed status is returned. For an analyzer with organization as the type, this failure can be due to an issue with creating the service-linked roles required in the member accounts of the Amazon Web Services organization.
        configuration:
          $ref: "#/components/schemas/AnalyzerConfiguration"
          description: Specifies if the analyzer is an external access, unused access, or internal access analyzer. The GetAnalyzer action includes this property in its response if a configuration is specified, while the ListAnalyzers action omits it.
      required:
        - arn
        - name
        - type_
        - createdAt
        - status
    AnalyzerStatus:
      type: string
      enum:
        - ACTIVE
        - CREATING
        - DISABLED
        - FAILED
    StatusReason:
      description: Provides more details about the current status of the analyzer. For example, if the creation for the analyzer fails, a Failed status is returned. For an analyzer with organization as the type, this failure can be due to an issue with creating the service-linked roles required in the member accounts of the Amazon Web Services organization.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ReasonCode"
          description: The reason code for the current status of the analyzer.
      required:
        - code
    ReasonCode:
      type: string
      enum:
        - AWS_SERVICE_ACCESS_DISABLED
        - DELEGATED_ADMINISTRATOR_DEREGISTERED
        - ORGANIZATION_DELETED
        - SERVICE_LINKED_ROLE_CREATION_FAILED
    GetArchiveRuleResponse:
      description: The response to the request.
      type: object
      properties:
        archiveRule:
          $ref: "#/components/schemas/ArchiveRuleSummary"
      required:
        - archiveRule
    ArchiveRuleSummary:
      description: Contains information about an archive rule. Archive rules automatically archive new findings that meet the criteria you define when you create the rule.
      type: object
      properties:
        ruleName:
          $ref: "#/components/schemas/Name"
          description: The name of the archive rule.
        filter:
          type: object
          properties: {}
          description: A filter used to define the archive rule.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the archive rule was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the archive rule was last updated.
      required:
        - ruleName
        - filter
        - createdAt
        - updatedAt
    FindingId:
      type: string
    GetFindingResponse:
      description: The response to the request.
      type: object
      properties:
        finding:
          $ref: "#/components/schemas/Finding"
          description: A finding object that contains finding details.
    Finding:
      description: Contains information about a finding.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/FindingId"
          description: The ID of the finding.
        principal:
          type: object
          properties: {}
          description: The external principal that has access to a resource within the zone of trust.
        action:
          $ref: "#/components/schemas/ActionList"
          description: The action in the analyzed policy statement that an external principal has permission to use.
        resource:
          $ref: "#/components/schemas/String"
          description: The resource that an external principal has access to.
        isPublic:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the policy that generated the finding allows public access to the resource.
        resourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of the resource identified in the finding.
        condition:
          type: object
          properties: {}
          description: The condition in the analyzed policy statement that resulted in a finding.
        createdAt:
