        recommendationType:
          $ref: "#/components/schemas/RecommendationType"
          description: The type of recommendation for the finding.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the retrieval of the finding recommendation.
      required:
        - startedAt
        - resourceArn
        - recommendationType
        - status
    RecommendationError:
      description: Contains information about the reason that the retrieval of a recommendation for a finding failed.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/String"
          description: The error code for a failed retrieval of a recommendation for a finding.
        message:
