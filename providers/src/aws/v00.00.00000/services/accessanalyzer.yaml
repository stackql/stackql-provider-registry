          description: The total number of findings for the specified unused access type.
    AccountAggregations:
      type: array
      items:
        $ref: "#/components/schemas/FindingAggregationAccountDetails"
    FindingAggregationAccountDetails:
      description: Contains information about the findings for an Amazon Web Services account in an organization unused access analyzer.
      type: object
      properties:
