    GetGeneratedPolicyResponse:
      type: object
      properties:
        jobDetails:
          $ref: "#/components/schemas/JobDetails"
          description: A GeneratedPolicyDetails object that contains details about the generated policy.
        generatedPolicyResult:
          $ref: "#/components/schemas/GeneratedPolicyResult"
          description: A GeneratedPolicyResult object that contains the generated policies and associated details.
      required:
        - jobDetails
        - generatedPolicyResult
    JobDetails:
      description: Contains details about the policy generation request.
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/JobId"
          description: The JobId that is returned by the StartPolicyGeneration operation. The JobId can be used with GetGeneratedPolicy to retrieve the generated policies or used with CancelPolicyGeneration to cancel the policy generation request.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the job request.
        startedOn:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of when the job was started.
        completedOn:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of when the job was completed.
        jobError:
          $ref: "#/components/schemas/JobError"
          description: The job error for the policy generation request.
      required:
        - jobId
        - status
        - startedOn
    JobStatus:
      type: string
      enum:
        - IN_PROGRESS
        - SUCCEEDED
        - FAILED
        - CANCELED
    JobError:
      description: Contains the details about the policy generation error.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/JobErrorCode"
          description: The job error code.
        message:
          $ref: "#/components/schemas/String"
          description: Specific information about the error. For example, which service quota was exceeded or which resource was not found.
      required:
        - code
        - message
    JobErrorCode:
      type: string
      enum:
        - AUTHORIZATION_ERROR
        - RESOURCE_NOT_FOUND_ERROR
        - SERVICE_QUOTA_EXCEEDED_ERROR
        - SERVICE_ERROR
    GeneratedPolicyResult:
      description: Contains the text for the generated policy and its details.
      type: object
      properties:
        properties_:
          $ref: "#/components/schemas/GeneratedPolicyProperties"
          description: A GeneratedPolicyProperties object that contains properties of the generated policy.
        generatedPolicies:
          $ref: "#/components/schemas/GeneratedPolicyList"
          description: The text to use as the content for the new policy. The policy is created using the CreatePolicy action.
      required:
        - properties_
    GeneratedPolicyProperties:
      description: Contains the generated policy details.
      type: object
      properties:
        isComplete:
          $ref: "#/components/schemas/Boolean"
          description: This value is set to true if the generated policy contains all possible actions for a service that IAM Access Analyzer identified from the CloudTrail trail that you specified, and false otherwise.
        principalArn:
          $ref: "#/components/schemas/PrincipalArn"
          description: The ARN of the IAM entity (user or role) for which you are generating a policy.
        cloudTrailProperties:
          $ref: "#/components/schemas/CloudTrailProperties"
          description: Lists details about the Trail used to generated policy.
      required:
        - principalArn
    PrincipalArn:
      type: string
      pattern: arn:[^:]*:iam::[^:]*:(role|user)/.{1,576}
    CloudTrailProperties:
      description: Contains information about CloudTrail access.
      type: object
      properties:
        trailProperties:
          $ref: "#/components/schemas/TrailPropertiesList"
          description: A TrailProperties object that contains settings for trail properties.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start of the time range for which IAM Access Analyzer reviews your CloudTrail events. Events with a timestamp before this time are not considered to generate a policy.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end of the time range for which IAM Access Analyzer reviews your CloudTrail events. Events with a timestamp after this time are not considered to generate a policy. If this is not included in the request, the default value is the current time.
      required:
        - trailProperties
        - startTime
        - endTime
    TrailPropertiesList:
      type: array
      items:
        $ref: "#/components/schemas/TrailProperties"
    TrailProperties:
      description: Contains details about the CloudTrail trail being analyzed to generate a policy.
      type: object
      properties:
        cloudTrailArn:
          $ref: "#/components/schemas/CloudTrailArn"
          description: Specifies the ARN of the trail. The format of a trail ARN is arn:aws:cloudtrail:us-east-2:123456789012:trail/MyTrail.
        regions:
          $ref: "#/components/schemas/RegionList"
          description: A list of regions to get CloudTrail data from and analyze to generate a policy.
        allRegions:
          $ref: "#/components/schemas/Boolean"
          description: Possible values are true or false. If set to true, IAM Access Analyzer retrieves CloudTrail data from all regions to analyze and generate a policy.
      required:
        - cloudTrailArn
    CloudTrailArn:
      type: string
      pattern: arn:[^:]*:cloudtrail:[^:]*:[^:]*:trail/.{1,576}
    RegionList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    GeneratedPolicyList:
      type: array
      items:
        $ref: "#/components/schemas/GeneratedPolicy"
    GeneratedPolicy:
      description: Contains the text for the generated policy.
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/String"
          description: The text to use as the content for the new policy. The policy is created using the CreatePolicy action.
