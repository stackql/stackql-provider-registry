          description: The number of active findings for the specified external access analyzer.
        totalArchivedFindings:
          $ref: "#/components/schemas/Integer"
          description: The number of archived findings for the specified external access analyzer.
        totalResolvedFindings:
          $ref: "#/components/schemas/Integer"
          description: The number of resolved findings for the specified external access analyzer.
    InternalAccessFindingsStatistics:
      description: Provides aggregate statistics about the findings for the specified internal access analyzer. This includes counts of active, archived, and resolved findings.
      type: object
      properties:
        resourceTypeStatistics:
          type: object
          properties: {}
