openapi: 3.0.0
info:
  version: "2020-09-10"
  title: AWS Application Cost Profiler
  description: AWS Application Cost Profiler
  x-serviceName: application-cost-profiler
  x-serviceAlias: applicationcostprofiler
  x-protocol: rest-json
  x-apiVersion: "2020-09-10"
  x-endpointPrefix: application-cost-profiler
  x-jsonVersion: "1.1"
servers:
  - url: https://application-cost-profiler.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for applicationcostprofiler
paths:
  /reportDefinition/{report_id}:
    delete:
      operationId: DeleteReportDefinition
      description: Deletes the specified report definition in AWS Application Cost Profiler. This stops the report from being generated.
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: Required. ID of the report to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReportDefinitionResult"
    get:
      operationId: GetReportDefinition
      description: Retrieves the definition of a report already configured in AWS Application Cost Profiler.
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: ID of the report to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReportDefinitionResult"
    put:
      operationId: UpdateReportDefinition
      description: Updates existing report in AWS Application Cost Profiler.
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReportId"
          description: Required. ID of the report to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reportDescription:
                  $ref: "#/components/schemas/ReportDescription"
                reportFrequency:
                  $ref: "#/components/schemas/ReportFrequency"
                format:
                  $ref: "#/components/schemas/Format"
                destinationS3Location:
                  $ref: "#/components/schemas/S3Location"
              required:
                - reportDescription
                - reportFrequency
                - format
                - destinationS3Location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReportDefinitionResult"
  /importApplicationUsage:
    post:
      operationId: ImportApplicationUsage
      description: Ingests application usage data from Amazon Simple Storage Service (Amazon S3). The data must already exist in the S3 location. As part of the action, AWS Application Cost Profiler copies the object from your S3 bucket to an S3 bucket owned by Amazon for processing asynchronously.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceS3Location:
                  $ref: "#/components/schemas/SourceS3Location"
              required:
                - sourceS3Location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportApplicationUsageResult"
  /reportDefinition:
    get:
      operationId: ListReportDefinitions
      description: Retrieves a list of all reports and their configurations for your AWS account. The maximum number of reports is one.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: The token value from a previous call to access the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The maximum number of results to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReportDefinitionsResult"
    post:
      operationId: PutReportDefinition
      description: Creates the report definition for a report in Application Cost Profiler.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reportId:
                  $ref: "#/components/schemas/ReportId"
                reportDescription:
                  $ref: "#/components/schemas/ReportDescription"
                reportFrequency:
                  $ref: "#/components/schemas/ReportFrequency"
                format:
                  $ref: "#/components/schemas/Format"
                destinationS3Location:
                  $ref: "#/components/schemas/S3Location"
              required:
                - reportId
                - reportDescription
                - reportFrequency
                - format
                - destinationS3Location
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutReportDefinitionResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ReportId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[0-9A-Za-z\.\-_]+$
    DeleteReportDefinitionResult:
      type: object
      properties:
        reportId:
          $ref: "#/components/schemas/ReportId"
          description: ID of the report that was deleted.
    GetReportDefinitionResult:
      type: object
      properties:
        reportId:
          $ref: "#/components/schemas/ReportId"
          description: ID of the report retrieved.
        reportDescription:
          $ref: "#/components/schemas/ReportDescription"
          description: Description of the report.
        reportFrequency:
          $ref: "#/components/schemas/ReportFrequency"
          description: Cadence used to generate the report.
        format_:
          $ref: "#/components/schemas/Format"
          description: Format of the generated report.
        destinationS3Location:
          $ref: "#/components/schemas/S3Location"
          description: Amazon Simple Storage Service (Amazon S3) location where the report is uploaded.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp (milliseconds) when this report definition was created.
        lastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp (milliseconds) when this report definition was last updated.
      required:
        - reportId
        - reportDescription
        - reportFrequency
        - format_
        - destinationS3Location
        - createdAt
        - lastUpdated
    ReportDescription:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*\S.*
    ReportFrequency:
      type: string
      enum:
        - MONTHLY
        - DAILY
        - ALL
    Format:
      type: string
      enum:
        - CSV
        - PARQUET
    S3Location:
      description: Represents the Amazon Simple Storage Service (Amazon S3) location where AWS Application Cost Profiler reports are generated and then written to.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: Name of the S3 bucket.
        prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: Prefix for the location to write to.
      required:
        - bucket
        - prefix
    S3Bucket:
      type: string
      minLength: 3
      maxLength: 63
      pattern: (?=^.{3,63}$)(?!^(\d+\.)+\d+$)(^(([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])\.)*([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])$)
    S3Prefix:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*\S.*
    Timestamp:
      type: string
      format: date-time
    SourceS3Location:
      description: Represents the Amazon Simple Storage Service (Amazon S3) location where usage data is read from.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: Name of the bucket.
        key:
          $ref: "#/components/schemas/S3Key"
          description: Key of the object.
        region:
          $ref: "#/components/schemas/S3BucketRegion"
          description: Region of the bucket. Only required for Regions that are disabled by default. For more infomration about Regions that are disabled by default, see Enabling a Region in the AWS General Reference guide.
      required:
        - bucket
        - key
    S3Key:
      type: string
      minLength: 1
      maxLength: 512
      pattern: .*\S.*
    S3BucketRegion:
      type: string
      enum:
        - ap-east-1
        - me-south-1
        - eu-south-1
        - af-south-1
    ImportApplicationUsageResult:
      type: object
      properties:
        importId:
          $ref: "#/components/schemas/ImportId"
          description: ID of the import request.
      required:
        - importId
    ImportId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[0-9A-Za-z\\.\\-_]*"
    Token:
      type: string
      minLength: 1
      maxLength: 102400
      pattern: ^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
    Integer:
      type: integer
      minimum: 1
      maximum: 100
    ListReportDefinitionsResult:
      type: object
      properties:
        reportDefinitions:
          $ref: "#/components/schemas/ReportDefinitionList"
          description: The retrieved reports.
        nextToken:
          $ref: "#/components/schemas/Token"
          description: The value of the next token, if it exists. Null if there are no more results.
    ReportDefinitionList:
      type: array
      items:
        $ref: "#/components/schemas/ReportDefinition"
    ReportDefinition:
      description: The configuration of a report in AWS Application Cost Profiler.
      type: object
      properties:
        reportId:
          $ref: "#/components/schemas/ReportId"
          description: The ID of the report.
        reportDescription:
          $ref: "#/components/schemas/ReportDescription"
          description: Description of the report
        reportFrequency:
          $ref: "#/components/schemas/ReportFrequency"
          description: The cadence at which the report is generated.
        format_:
          $ref: "#/components/schemas/Format"
          description: The format used for the generated reports.
        destinationS3Location:
          $ref: "#/components/schemas/S3Location"
          description: The location in Amazon Simple Storage Service (Amazon S3) the reports should be saved to.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp (milliseconds) when this report definition was created.
        lastUpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Timestamp (milliseconds) when this report definition was last updated.
    PutReportDefinitionResult:
      type: object
      properties:
        reportId:
          $ref: "#/components/schemas/ReportId"
          description: ID of the report.
    UpdateReportDefinitionResult:
      type: object
      properties:
        reportId:
          $ref: "#/components/schemas/ReportId"
          description: ID of the report.
  x-stackQL-resources:
    report_definitions:
      id: aws.applicationcostprofiler.report_definitions
      name: report_definitions
      title: report_definitions
      methods:
        delete_report_definition:
          operation:
            $ref: "#/paths/~1reportDefinition~1{report_id}/delete"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        get_report_definition:
          operation:
            $ref: "#/paths/~1reportDefinition~1{report_id}/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        update_report_definition:
          operation:
            $ref: "#/paths/~1reportDefinition~1{report_id}/put"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
        list_report_definitions:
          operation:
            $ref: "#/paths/~1reportDefinition/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.reportDefinitions
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
        put_report_definition:
          operation:
            $ref: "#/paths/~1reportDefinition/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/get_report_definition"
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/list_report_definitions"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/update_report_definition"
        replace:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/put_report_definition"
        delete:
          - $ref: "#/components/x-stackQL-resources/report_definitions/methods/delete_report_definition"
