openapi: 3.0.0
info:
  version: "2020-06-24"
  title: AWS Service Catalog App Registry
  description: AWS Service Catalog App Registry
  x-serviceName: servicecatalog
  x-serviceAlias: servicecatalog_appregistry
  x-protocol: rest-json
  x-apiVersion: "2020-06-24"
  x-endpointPrefix: servicecatalog-appregistry
  x-jsonVersion: "1.1"
servers:
  - url: https://servicecatalog-appregistry.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for servicecatalog-appregistry
paths:
  /applications/{application}/attribute-groups/{attribute_group}:
    put:
      operationId: AssociateAttributeGroup
      description: Associates an attribute group with an application to augment the application's metadata with the group's attributes. This feature enables applications to be described with user-defined details that are machine-readable, such as third-party integrations.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
        - name: attribute_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeGroupSpecifier"
          description: The name, ID, or ARN of the attribute group that holds the attributes to describe the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAttributeGroupResponse"
    delete:
      operationId: DisassociateAttributeGroup
      description: Disassociates an attribute group from an application to remove the extra attributes contained in the attribute group from the application's metadata. This operation reverts AssociateAttributeGroup.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
        - name: attribute_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeGroupSpecifier"
          description: The name, ID, or ARN of the attribute group that holds the attributes to describe the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateAttributeGroupResponse"
  /applications/{application}/resources/{resource_type}/{resource}:
    put:
      operationId: AssociateResource
      description: Associates a resource with an application. The resource can be specified by its ARN or name. The application can be specified by ARN, ID, or name. Minimum permissions You must have the following permissions to associate a resource using the OPTIONS parameter set to APPLY_APPLICATION_TAG. tag:GetResources tag:TagResources You must also have these additional permissions if you don't use the AWSServiceCatalogAppRegistryFullAccess policy. For more information, see AWSServiceCatalogAppRegistryFullAccess in the AppRegistry Administrator Guide. resource-groups:AssociateResource cloudformation:UpdateStack cloudformation:DescribeStacks In addition, you must have the tagging permission defined by the Amazon Web Services service that creates the resource. For more information, see TagResources in the Resource Groups Tagging API Reference.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of resource of which the application will be associated.
        - name: resource
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceSpecifier"
          description: The name or ID of the resource of which the application will be associated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                options:
                  $ref: "#/components/schemas/Options"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResourceResponse"
    delete:
      operationId: DisassociateResource
      description: Disassociates a resource from application. Both the resource and the application can be specified either by ID or name. Minimum permissions You must have the following permissions to remove a resource that's been associated with an application using the APPLY_APPLICATION_TAG option for AssociateResource. tag:GetResources tag:UntagResources You must also have the following permissions if you don't use the AWSServiceCatalogAppRegistryFullAccess policy. For more information, see AWSServiceCatalogAppRegistryFullAccess in the AppRegistry Administrator Guide. resource-groups:DisassociateResource cloudformation:UpdateStack cloudformation:DescribeStacks In addition, you must have the tagging permission defined by the Amazon Web Services service that creates the resource. For more information, see UntagResources in the Resource Groups Tagging API Reference.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name or ID of the application.
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of the resource that is being disassociated.
        - name: resource
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceSpecifier"
          description: The name or ID of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateResourceResponse"
    get:
      operationId: GetAssociatedResource
      description: Gets the resource associated with the application.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of resource associated with the application.
        - name: resource
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceSpecifier"
          description: The name or ID of the resource associated with the application.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A unique pagination token for each page of results. Make the call again with the returned token to retrieve the next page of results.
        - name: resourceTagStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetAssociatedResourceFilter"
          description: States whether an application tag is applied, not applied, in the process of being applied, or skipped.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return. If the parameter is omitted, it defaults to 25. The value is optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssociatedResourceResponse"
  /applications:
    post:
      operationId: CreateApplication
      description: Creates a new application that is the top-level node in a hierarchy of related cloud resource abstractions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                tags:
                  $ref: "#/components/schemas/Tags"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - clientToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
    get:
      operationId: ListApplications
      description: Retrieves a list of all of your applications. Results are paginated.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to use to get the next page of results after a previous API call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound of the number of results to return (cannot exceed 25). If this parameter is omitted, it defaults to 25. This value is optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /attribute-groups:
    post:
      operationId: CreateAttributeGroup
      description: Creates a new attribute group as a container for user-defined attributes. This feature enables users to have full control over their cloud application's metadata in a rich machine-readable format to facilitate integration with automated workflows and third-party tools.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                attributes:
                  $ref: "#/components/schemas/Attributes"
                tags:
                  $ref: "#/components/schemas/Tags"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - attributes
                - clientToken
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAttributeGroupResponse"
    get:
      operationId: ListAttributeGroups
      description: Lists all attribute groups which you have access to. Results are paginated.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to use to get the next page of results after a previous API call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound of the number of results to return (cannot exceed 25). If this parameter is omitted, it defaults to 25. This value is optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttributeGroupsResponse"
  /applications/{application}:
    delete:
      operationId: DeleteApplication
      description: Deletes an application that is specified either by its application ID, name, or ARN. All associated attribute groups and resources must be disassociated from it before deleting an application.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
    get:
      operationId: GetApplication
      description: Retrieves metadata information about one of your applications. The application can be specified by its ARN, ID, or name (which is unique within one account in one region at a given point in time). Specify by ARN or ID in automated workflows if you want to make sure that the exact same application is returned or a ResourceNotFoundException is thrown, avoiding the ABA addressing problem.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationResponse"
    patch:
      operationId: UpdateApplication
      description: Updates an existing application with new attributes.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application that will be updated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
  /attribute-groups/{attribute_group}:
    delete:
      operationId: DeleteAttributeGroup
      description: Deletes an attribute group, specified either by its attribute group ID, name, or ARN.
      parameters:
        - name: attribute_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeGroupSpecifier"
          description: The name, ID, or ARN of the attribute group that holds the attributes to describe the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAttributeGroupResponse"
    get:
      operationId: GetAttributeGroup
      description: Retrieves an attribute group by its ARN, ID, or name. The attribute group can be specified by its ARN, ID, or name.
      parameters:
        - name: attribute_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeGroupSpecifier"
          description: The name, ID, or ARN of the attribute group that holds the attributes to describe the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAttributeGroupResponse"
    patch:
      operationId: UpdateAttributeGroup
      description: Updates an existing attribute group with new details.
      parameters:
        - name: attribute_group
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeGroupSpecifier"
          description: The name, ID, or ARN of the attribute group that holds the attributes to describe the application.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                attributes:
                  $ref: "#/components/schemas/Attributes"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAttributeGroupResponse"
  /configuration:
    get:
      operationId: GetConfiguration
      description: Retrieves a TagKey configuration from an account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationResponse"
    put:
      operationId: PutConfiguration
      description: Associates a TagKey configuration to an account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/AppRegistryConfiguration"
              required:
                - configuration
      responses:
        "200":
          description: Success
  /applications/{application}/attribute-groups:
    get:
      operationId: ListAssociatedAttributeGroups
      description: Lists all attribute groups that are associated with specified application. Results are paginated.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name or ID of the application.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to use to get the next page of results after a previous API call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound of the number of results to return (cannot exceed 25). If this parameter is omitted, it defaults to 25. This value is optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociatedAttributeGroupsOutputDisplay"
  /applications/{application}/resources:
    get:
      operationId: ListAssociatedResources
      description: Lists all of the resources that are associated with the specified application. Results are paginated. If you share an application, and a consumer account associates a tag query to the application, all of the users who can access the application can also view the tag values in all accounts that are associated with it using this API.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name, ID, or ARN of the application.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token to use to get the next page of results after a previous API call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound of the number of results to return (cannot exceed 25). If this parameter is omitted, it defaults to 25. This value is optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociatedResourcesResponse"
  /applications/{application}/attribute-group-details:
    get:
      operationId: ListAttributeGroupsForApplication
      description: Lists the details of all attribute groups associated with a specific application. The results display in pages.
      parameters:
        - name: application
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApplicationSpecifier"
          description: The name or ID of the application.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: This token retrieves the next page of results after a previous API call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The upper bound of the number of results to return. The value cannot exceed 25. If you omit this parameter, it defaults to 25. This value is optional.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttributeGroupsForApplicationResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all of the tags on the resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon resource name (ARN) that specifies the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified resource. Each tag consists of a key and an optional value. If a tag with the same key is already associated with the resource, this action updates its value. This operation returns an empty response if the call was successful.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon resource name (ARN) that specifies the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a resource. This operation returns an empty response if the call was successful.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon resource name (ARN) that specifies the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: A list of the tag keys to remove from the specified resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /sync/{resource_type}/{resource}:
    post:
      operationId: SyncResource
      description: Syncs the resource with current AppRegistry records. Specifically, the resource’s AppRegistry system tags sync with its associated application. We remove the resource's AppRegistry system tags if it does not associate with the application. The caller must have permissions to read and update the resource.
      parameters:
        - name: resource_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceType"
          description: The type of resource of which the application will be associated.
        - name: resource
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceSpecifier"
          description: An entity you can work with and specify with a name or ID. Examples include an Amazon EC2 instance, an Amazon Web Services CloudFormation stack, or an Amazon S3 bucket.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ApplicationSpecifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ([-.\w]+)|(arn:aws[-a-z]*:servicecatalog:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:/applications/[-.\w]+)
    AttributeGroupSpecifier:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ([-.\w]+)|(arn:aws[-a-z]*:servicecatalog:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:/attribute-groups/[-.\w]+)
    AssociateAttributeGroupResponse:
      type: object
      properties:
        applicationArn:
          $ref: "#/components/schemas/ApplicationArn"
          description: The Amazon resource name (ARN) of the application that was augmented with attributes.
        attributeGroupArn:
          $ref: "#/components/schemas/AttributeGroupArn"
          description: The Amazon resource name (ARN) of the attribute group that contains the application's new attributes.
    ApplicationArn:
      type: string
      pattern: arn:aws[-a-z]*:servicecatalog:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:/applications/[a-z0-9]+
    AttributeGroupArn:
      type: string
      pattern: arn:aws[-a-z]*:servicecatalog:[a-z]{2}(-gov)?-[a-z]+-\d:\d{12}:/attribute-groups/[-.\w]+
    ResourceType:
      type: string
      enum:
        - CFN_STACK
        - RESOURCE_TAG_VALUE
    ResourceSpecifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: \S+
    Options:
      type: array
      items:
        $ref: "#/components/schemas/AssociationOption"
    AssociationOption:
      type: string
      enum:
        - APPLY_APPLICATION_TAG
        - SKIP_APPLICATION_TAG
    AssociateResourceResponse:
      type: object
      properties:
        applicationArn:
          $ref: "#/components/schemas/ApplicationArn"
          description: The Amazon resource name (ARN) of the application that was augmented with attributes.
        resourceArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon resource name (ARN) that specifies the resource.
        options:
          $ref: "#/components/schemas/Options"
          description: Determines whether an application tag is applied or skipped.
    Arn:
      type: string
      minLength: 1
      maxLength: 1600
      pattern: arn:(aws[a-zA-Z0-9-]*):([a-zA-Z0-9\-])+:([a-z]{2}(-gov)?-[a-z]+-\d{1})?:(\d{12})?:(.*)
    Name:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[-.\\w]+"
    Description:
      type: string
      maxLength: 1024
    Tags:
      type: object
      properties: {}
    ClientToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*"
    CreateApplicationResponse:
      type: object
      properties:
        application:
          $ref: "#/components/schemas/Application"
          description: Information about the application.
    Application:
      description: Represents a Amazon Web Services Service Catalog AppRegistry application that is the top-level node in a hierarchy of related cloud resource abstractions.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ApplicationId"
          description: The identifier of the application.
        arn:
          $ref: "#/components/schemas/ApplicationArn"
          description: The Amazon resource name (ARN) that specifies the application across services.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the application. The name must be unique in the region in which you are creating the application.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the application.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The ISO-8601 formatted timestamp of the moment when the application was created.
        lastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The ISO-8601 formatted timestamp of the moment when the application was last updated.
        tags:
          type: object
          properties: {}
          description: Key-value pairs you can use to associate with the application.
        applicationTag:
          type: object
          properties: {}
          description: A key-value pair that identifies an associated resource.
    ApplicationId:
      type: string
      minLength: 26
      maxLength: 26
      pattern: "[a-z0-9]+"
    Timestamp:
      type: string
      format: date-time
    Attributes:
      type: string
      minLength: 1
      maxLength: 8000
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    CreateAttributeGroupResponse:
      type: object
      properties:
        attributeGroup:
          $ref: "#/components/schemas/AttributeGroup"
          description: Information about the attribute group.
    AttributeGroup:
      description: Represents a Amazon Web Services Service Catalog AppRegistry attribute group that is rich metadata which describes an application and its components.
      type: object
      properties:
        id:
