          schema:
            $ref: "#/components/schemas/String"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponderGatewaysOutputDisplay"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RtbTaggableResourceArn"
          description: The Amazon Resource Name (ARN) of the resource for which you want to retrieve tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RtbTaggableResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag or tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RtbTaggableResourceArn"
          description: The Amazon Resource Name (ARN) of the resource that you want to untag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The keys of the key-value pairs for the tag or tags you want to remove from the specified resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /gateway/{gateway_id}/link/{link_id}/reject:
    post:
      operationId: RejectLink
      description: Rejects a link request between gateways. When a requester gateway requests to link with a responder gateway, the responder can use this operation to decline the link request.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectLinkResponse"
  /gateway/{gateway_id}/link/{link_id}/module-flow:
    post:
      operationId: UpdateLinkModuleFlow
      description: Updates a link module flow.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                modules:
                  $ref: "#/components/schemas/ModuleConfigurationList"
              required:
                - clientToken
                - modules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLinkModuleFlowResponse"
  /requester-gateway/{gateway_id}/update:
    post:
      operationId: UpdateRequesterGateway
      description: Updates a requester gateway.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/UpdateRequesterGatewayRequestDescriptionString"
              required:
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRequesterGatewayResponse"
  /responder-gateway/{gateway_id}/update:
    post:
      operationId: UpdateResponderGateway
      description: Updates a responder gateway.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domainName:
                  $ref: "#/components/schemas/DomainName"
                port:
                  $ref: "#/components/schemas/UpdateResponderGatewayRequestPortInteger"
                protocol:
                  $ref: "#/components/schemas/Protocol"
                listenerConfig:
                  $ref: "#/components/schemas/ListenerConfig"
                trustStoreConfiguration:
                  $ref: "#/components/schemas/TrustStoreConfiguration"
                managedEndpointConfiguration:
                  $ref: "#/components/schemas/ManagedEndpointConfiguration"
                clientToken:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/UpdateResponderGatewayRequestDescriptionString"
              required:
                - port
                - protocol
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponderGatewayResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GatewayId:
      type: string
      minLength: 8
      maxLength: 32
      pattern: rtb-gw-[a-z0-9-]{1,25}
    LinkId:
      type: string
      minLength: 6
      maxLength: 30
      pattern: link-[a-z0-9-]{1,25}
    LinkAttributes:
      description: Describes the attributes of a link.
      type: object
      properties:
        responderErrorMasking:
          $ref: "#/components/schemas/ResponderErrorMasking"
          description: Describes the masking for HTTP error codes.
        customerProvidedId:
          $ref: "#/components/schemas/CustomerProvidedId"
          description: The customer-provided unique identifier of the link.
    ResponderErrorMasking:
      type: array
      items:
        $ref: "#/components/schemas/ResponderErrorMaskingForHttpCode"
    ResponderErrorMaskingForHttpCode:
      description: Describes the masking for HTTP error codes.
      type: object
      properties:
        httpCode:
          $ref: "#/components/schemas/ResponderErrorMaskingForHttpCodeHttpCodeString"
          description: The HTTP error code.
        action:
          $ref: "#/components/schemas/ResponderErrorMaskingAction"
          description: The action for the error..
        loggingTypes:
          $ref: "#/components/schemas/ResponderErrorMaskingLoggingTypes"
          description: The error log type.
        responseLoggingPercentage:
          $ref: "#/components/schemas/ResponderErrorMaskingForHttpCodeResponseLoggingPercentageFloat"
          description: The percentage of response logging.
      required:
        - httpCode
        - action
        - loggingTypes
    ResponderErrorMaskingForHttpCodeHttpCodeString:
      type: string
      minLength: 3
      maxLength: 7
      pattern: DEFAULT|4XX|5XX|\d{3}
    ResponderErrorMaskingAction:
      type: string
      enum:
        - NO_BID
        - PASSTHROUGH
    ResponderErrorMaskingLoggingTypes:
      type: array
      items:
        $ref: "#/components/schemas/ResponderErrorMaskingLoggingType"
    ResponderErrorMaskingLoggingType:
      type: string
      enum:
        - NONE
        - METRIC
        - RESPONSE
    ResponderErrorMaskingForHttpCodeResponseLoggingPercentageFloat:
      type: number
      format: float
      minimum: 0
      maximum: 100
    CustomerProvidedId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_-]+"
    LinkLogSettings:
      description: Describes the settings for a link log.
      type: object
      properties:
        applicationLogs:
          $ref: "#/components/schemas/LinkApplicationLogConfiguration"
          description: Describes the configuration of a link application log.
      required:
        - applicationLogs
    LinkApplicationLogConfiguration:
      description: Describes the configuration of a link application log.
      type: object
      properties:
        sampling:
          $ref: "#/components/schemas/LinkApplicationLogSampling"
          description: Describes a link application log sample.
      required:
        - sampling
    LinkApplicationLogSampling:
      description: Describes a link application log sample.
      type: object
      properties:
        errorLog:
          $ref: "#/components/schemas/LinkApplicationLogSamplingErrorLogDouble"
          description: An error log entry.
        filterLog:
          $ref: "#/components/schemas/LinkApplicationLogSamplingFilterLogDouble"
          description: A filter log entry.
      required:
        - errorLog
        - filterLog
    LinkApplicationLogSamplingErrorLogDouble:
      type: number
      format: double
      minimum: 0
      maximum: 100
    LinkApplicationLogSamplingFilterLogDouble:
      type: number
      format: double
      minimum: 0
      maximum: 100
    LinkTimeoutInMillis:
      type: integer
      format: int64
      minimum: 100
      maximum: 5000
    AcceptLinkResponse:
      type: object
      properties:
        gatewayId:
          $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        peerGatewayId:
          $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the peer gateway.
        status:
          $ref: "#/components/schemas/LinkStatus"
          description: The status of the link.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the link was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the link was updated.
        direction:
          $ref: "#/components/schemas/LinkDirection"
          description: The direction of the link.
        flowModules:
          $ref: "#/components/schemas/ModuleConfigurationList"
          description: The configuration of flow modules.
        pendingFlowModules:
          $ref: "#/components/schemas/ModuleConfigurationList"
          description: The configuration of pending flow modules.
        attributes:
          $ref: "#/components/schemas/LinkAttributes"
          description: Attributes of the link.
        logSettings:
          $ref: "#/components/schemas/LinkLogSettings"
        connectivityType:
          $ref: "#/components/schemas/ConnectivityType"
          description: The connectivity type of the link.
        linkId:
          $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      required:
        - gatewayId
        - peerGatewayId
        - status
        - createdAt
        - updatedAt
        - linkId
    LinkStatus:
      type: string
      enum:
        - PENDING_CREATION
        - PENDING_REQUEST
        - REQUESTED
        - ACCEPTED
        - ACTIVE
        - REJECTED
        - FAILED
        - PENDING_DELETION
        - DELETED
        - PENDING_UPDATE
        - PENDING_ISOLATION
        - ISOLATED
        - PENDING_RESTORATION
    Timestamp:
      type: string
      format: date-time
    LinkDirection:
      type: string
      enum:
        - RESPONSE
        - REQUEST
    ModuleConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/ModuleConfiguration"
    ModuleConfiguration:
      description: Describes the configuration of a module.
      type: object
      properties:
        version:
          $ref: "#/components/schemas/Version"
          description: The version of the module.
        name:
          $ref: "#/components/schemas/FlowModuleName"
          description: The name of the module.
        dependsOn:
          $ref: "#/components/schemas/FlowModuleNameList"
          description: The dependencies of the module.
        moduleParameters:
          $ref: "#/components/schemas/ModuleParameters"
          description: Describes the parameters of a module.
      required:
        - name
    Version:
      type: string
      minLength: 1
      maxLength: 25
      pattern: "[a-z0-9-]{1,25}"
    FlowModuleName:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[A-Za-z0-9 -]+"
    FlowModuleNameList:
      type: array
      items:
        $ref: "#/components/schemas/FlowModuleName"
    ModuleParameters:
      description: Describes the parameters of a module.
      type: object
      properties:
        noBid:
          $ref: "#/components/schemas/NoBidModuleParameters"
          description: Describes the parameters of a no bid module.
        openRtbAttribute:
          $ref: "#/components/schemas/OpenRtbAttributeModuleParameters"
          description: Describes the parameters of an open RTB attribute module.
        rateLimiter:
          $ref: "#/components/schemas/RateLimiterModuleParameters"
          description: Describes the parameters of a rate limit.
    NoBidModuleParameters:
      description: Describes the parameters of a no bid module.
      type: object
      properties:
        reason:
          $ref: "#/components/schemas/NoBidModuleParametersReasonString"
          description: The reason description.
        reasonCode:
          $ref: "#/components/schemas/NoBidModuleParametersReasonCodeInteger"
          description: The reason code.
        passThroughPercentage:
          $ref: "#/components/schemas/NoBidModuleParametersPassThroughPercentageFloat"
          description: The pass through percentage.
    NoBidModuleParametersReasonString:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[a-zA-Z0-9]*"
    NoBidModuleParametersReasonCodeInteger:
      type: integer
      minimum: 0
      maximum: 10
    NoBidModuleParametersPassThroughPercentageFloat:
      type: number
      format: float
      minimum: 0
      maximum: 100
    OpenRtbAttributeModuleParameters:
      description: Describes the parameters of an open RTB attribute module.
      type: object
      properties:
        filterType:
          $ref: "#/components/schemas/FilterType"
          description: The filter type.
        filterConfiguration:
          $ref: "#/components/schemas/FilterConfiguration"
          description: Describes the configuration of a filter.
        action:
          $ref: "#/components/schemas/Action"
          description: Describes a bid action.
        holdbackPercentage:
          $ref: "#/components/schemas/OpenRtbAttributeModuleParametersHoldbackPercentageFloat"
          description: The hold back percentage.
      required:
        - filterType
        - filterConfiguration
        - action
        - holdbackPercentage
    FilterType:
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    FilterConfiguration:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: Describes the configuration of a filter.
      type: object
      properties:
        criteria:
          $ref: "#/components/schemas/FilterCriteria"
          description: Describes the criteria for a filter.
      required:
        - criteria
    FilterCriteria:
      type: array
      items:
        $ref: "#/components/schemas/FilterCriterion"
    FilterCriterion:
      description: Describes the criteria for a filter.
      type: object
      properties:
        path:
          $ref: "#/components/schemas/String"
          description: The path to filter.
        values:
          $ref: "#/components/schemas/FilterCriterionValuesList"
          description: The value to filter.
      required:
        - path
        - values
    String:
      type: string
    FilterCriterionValuesList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Action:
      description: Describes a bid action.
      type: object
      properties:
        noBid:
          $ref: "#/components/schemas/NoBidAction"
          description: Describes a no bid action.
        headerTag:
          $ref: "#/components/schemas/HeaderTagAction"
          description: Describes the header tag for a bid action.
    NoBidAction:
      description: Describes a no bid action.
      type: object
      properties:
        noBidReasonCode:
          $ref: "#/components/schemas/NoBidActionNoBidReasonCodeInteger"
          description: The reason code for the no bid action.
    NoBidActionNoBidReasonCodeInteger:
      type: integer
      minimum: 0
    HeaderTagAction:
      description: Describes the header tag for a bid action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of the bid action.
        value:
          $ref: "#/components/schemas/String"
          description: The value of the bid action.
      required:
        - name
        - value
    OpenRtbAttributeModuleParametersHoldbackPercentageFloat:
      type: number
      format: float
      minimum: 0
      maximum: 100
    RateLimiterModuleParameters:
      description: Describes the parameters of a rate limit.
      type: object
      properties:
        tps:
          $ref: "#/components/schemas/Float"
          description: The transactions per second rate limit.
    Float:
      type: number
      format: float
    ConnectivityType:
      description: The connectivity type for a link or gateway.
      type: string
      enum:
        - DEFAULT
        - PUBLIC_INGRESS
        - PUBLIC_EGRESS
        - EXTERNAL_INBOUND
    AcmCertificateArn:
      type: string
      minLength: 75
      maxLength: 256
      pattern: arn:(aws|aws-cn|aws-us-gov):acm:[a-z0-9-]+:[0-9]{12}:certificate/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    AssociateCertificateResponse:
      type: object
      properties:
        gatewayId:
          $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        acmCertificateArn:
          $ref: "#/components/schemas/AcmCertificateArn"
          description: The Amazon Resource Name (ARN) of the ACM certificate.
        status:
          $ref: "#/components/schemas/CertificateAssociationStatus"
          description: The status of the certificate association.
      required:
        - gatewayId
        - acmCertificateArn
        - status
    CertificateAssociationStatus:
      description: The status of a certificate association with a gateway.
      type: string
      enum:
        - PENDING_ASSOCIATION
        - ASSOCIATED
        - PENDING_DISASSOCIATION
        - DISASSOCIATED
        - FAILED
    TagsMap:
      type: object
      properties: {}
    CreateInboundExternalLinkResponse:
      type: object
      properties:
        gatewayId:
          $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        linkId:
          $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
        status:
          $ref: "#/components/schemas/LinkStatus"
          description: The status of the request.
        domainName:
          $ref: "#/components/schemas/DomainName"
          description: The domain name.
      required:
        - gatewayId
        - linkId
        - status
        - domainName
    DomainName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)(?:\.(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?))+
    Boolean:
      type: boolean
    CreateLinkResponse:
      type: object
      properties:
        gatewayId:
          $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        peerGatewayId:
          $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the peer gateway.
        status:
          $ref: "#/components/schemas/LinkStatus"
          description: The status of the request.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the link was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the link was updated.
        direction:
          $ref: "#/components/schemas/LinkDirection"
          description: The direction of the link.
        flowModules:
          $ref: "#/components/schemas/ModuleConfigurationList"
          description: The configuration of flow modules.
        pendingFlowModules:
          $ref: "#/components/schemas/ModuleConfigurationList"
          description: The configuration of pending flow modules.
        attributes:
          $ref: "#/components/schemas/LinkAttributes"
          description: Attributes of the link.
        logSettings:
          $ref: "#/components/schemas/LinkLogSettings"
        connectivityType:
          $ref: "#/components/schemas/ConnectivityType"
          description: The connectivity type of the link.
        linkId:
          $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
        customerProvidedId:
          $ref: "#/components/schemas/CreateLinkResponseCustomerProvidedIdString"
          description: The customer-provided unique identifier of the link.
      required:
        - gatewayId
        - peerGatewayId
        - status
        - createdAt
        - updatedAt
        - linkId
    CreateLinkResponseCustomerProvidedIdString:
      type: string
      pattern: "[a-zA-Z0-9_-]{5,50}"
    RulePriority:
      description: WAF-style evaluation priority. Lower number = evaluated first (priority 1 before 10). Gaps are allowed (1, 10, 20 is valid). Must be between 1 and 1000 inclusive. Uniqueness per link among non-deleted rules is enforced at the API layer (HTTP 409 on conflict).
      type: integer
      minimum: 1
      maximum: 1000
    RuleCondition:
      description: Conditions bag for a routing rule. All non-null fields must match (AND logic). At least one field must be set (enforced by CP).
      type: object
      properties:
        hostHeader:
          $ref: "#/components/schemas/RuleConditionHostHeaderString"
          description: Exact host match — RFC 3986 unreserved characters
        hostHeaderWildcard:
          $ref: "#/components/schemas/RuleConditionHostHeaderWildcardString"
          description: Wildcard host pattern (e.g., *.example.com) — RFC 3986 unreserved plus *
        pathPrefix:
          $ref: "#/components/schemas/RuleConditionPathPrefixString"
          description: Path prefix matching — strict starts-with, no wildcard (preferred for new rules). Must start with /; RFC 3986 unreserved plus /
        pathExact:
          $ref: "#/components/schemas/RuleConditionPathExactString"
          description: Exact path match — must start with /; RFC 3986 unreserved plus /
        queryStringEquals:
          $ref: "#/components/schemas/QueryStringKeyValuePair"
          description: Query string key=value pair match (single pair)
        queryStringExists:
          $ref: "#/components/schemas/RuleConditionQueryStringExistsString"
          description: Query string key presence check (any value accepted) — RFC 3986 unreserved characters
    RuleConditionHostHeaderString:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z0-9._~-]+"
    RuleConditionHostHeaderWildcardString:
      type: string
      minLength: 3
      maxLength: 255
      pattern: "[A-Za-z0-9._~*-]+"
    RuleConditionPathPrefixString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: /[A-Za-z0-9._~/-]*
    RuleConditionPathExactString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: /[A-Za-z0-9._~/-]*
    QueryStringKeyValuePair:
      description: Key-value pair for query string matching
      type: object
      properties:
        key:
          $ref: "#/components/schemas/QueryStringKeyValuePairKeyString"
          description: RFC 3986 unreserved characters
        value:
          $ref: "#/components/schemas/QueryStringKeyValuePairValueString"
          description: RFC 3986 unreserved characters
      required:
        - key
        - value
    QueryStringKeyValuePairKeyString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9._~-]+"
    QueryStringKeyValuePairValueString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9._~-]+"
    RuleConditionQueryStringExistsString:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9._~-]+"
    CreateLinkRoutingRuleResponse:
      type: object
      properties:
        ruleId:
          $ref: "#/components/schemas/RuleId"
          description: The unique identifier of the routing rule.
        status:
          $ref: "#/components/schemas/RuleStatus"
          description: The status of the routing rule.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the routing rule was created.
      required:
        - ruleId
        - status
        - createdAt
    RuleId:
      description: Identifier for a routing rule
      type: string
      minLength: 6
      maxLength: 30
      pattern: rule-[a-z0-9-]{1,25}
    RuleStatus:
      description: Status of a routing rule
      type: string
      enum:
