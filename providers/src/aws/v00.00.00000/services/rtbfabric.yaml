openapi: 3.0.0
info:
  version: "2023-05-15"
  title: RTBFabric
  description: RTBFabric
  x-serviceName: rtbfabric
  x-serviceAlias: rtbfabric
  x-protocol: rest-json
  x-apiVersion: "2023-05-15"
  x-endpointPrefix: rtbfabric
  x-jsonVersion: "1.1"
servers:
  - url: https://rtbfabric.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for rtbfabric
paths:
  /gateway/{gateway_id}/link/{link_id}/accept:
    post:
      operationId: AcceptLink
      description: Accepts a link request between gateways. When a requester gateway requests to link with a responder gateway, the responder can use this operation to accept the link request and establish the connection.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attributes:
                  $ref: "#/components/schemas/LinkAttributes"
                logSettings:
                  $ref: "#/components/schemas/LinkLogSettings"
                timeoutInMillis:
                  $ref: "#/components/schemas/LinkTimeoutInMillis"
              required:
                - logSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptLinkResponse"
  /responder-gateway/{gateway_id}/certificate:
    post:
      operationId: AssociateCertificate
      description: Associates an ACM certificate with a responder gateway.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                acmCertificateArn:
                  $ref: "#/components/schemas/AcmCertificateArn"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - acmCertificateArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateCertificateResponse"
    delete:
      operationId: DisassociateCertificate
      description: Removes a certificate association from a responder gateway.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: acmCertificateArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AcmCertificateArn"
          description: The Amazon Resource Name (ARN) of the ACM certificate to disassociate.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateCertificateResponse"
    get:
      operationId: GetCertificateAssociation
      description: Retrieves the details of a certificate association with a responder gateway.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: acmCertificateArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AcmCertificateArn"
          description: The Amazon Resource Name (ARN) of the ACM certificate.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCertificateAssociationResponse"
  /responder-gateway/{gateway_id}/inbound-external-link:
    post:
      operationId: CreateInboundExternalLink
      description: Creates an inbound external link.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                attributes:
                  $ref: "#/components/schemas/LinkAttributes"
                logSettings:
                  $ref: "#/components/schemas/LinkLogSettings"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - clientToken
                - logSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInboundExternalLinkResponse"
  /gateway/{gateway_id}/create-link:
    post:
      operationId: CreateLink
      description: Creates a new link between gateways. Establishes a connection that allows gateways to communicate and exchange bid requests and responses.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                peerGatewayId:
                  $ref: "#/components/schemas/GatewayId"
                attributes:
                  $ref: "#/components/schemas/LinkAttributes"
                httpResponderAllowed:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                logSettings:
                  $ref: "#/components/schemas/LinkLogSettings"
                timeoutInMillis:
                  $ref: "#/components/schemas/LinkTimeoutInMillis"
              required:
                - peerGatewayId
                - logSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLinkResponse"
  /responder-gateway/{gateway_id}/link/{link_id}/routing-rule:
    post:
      operationId: CreateLinkRoutingRule
      description: Creates a routing rule for a link. Routing rules use priority-based evaluation where lower priority numbers are evaluated first. Each rule specifies conditions that must all match for the rule to apply.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/String"
                priority:
                  $ref: "#/components/schemas/RulePriority"
                conditions:
                  $ref: "#/components/schemas/RuleCondition"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - clientToken
                - priority
                - conditions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLinkRoutingRuleResponse"
  /requester-gateway/{gateway_id}/outbound-external-link:
    post:
      operationId: CreateOutboundExternalLink
      description: Creates an outbound external link.
      parameters:
        - name: gateway_id
          in: path
