                publicEndpoint:
                  $ref: "#/components/schemas/URL"
                logSettings:
                  $ref: "#/components/schemas/LinkLogSettings"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - clientToken
                - publicEndpoint
                - logSettings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutboundExternalLinkResponse"
  /requester-gateway:
    post:
      operationId: CreateRequesterGateway
      description: Creates a requester gateway.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vpcId:
                  $ref: "#/components/schemas/VpcId"
                subnetIds:
                  $ref: "#/components/schemas/CreateRequesterGatewayRequestSubnetIdsList"
                securityGroupIds:
                  $ref: "#/components/schemas/CreateRequesterGatewayRequestSecurityGroupIdsList"
                clientToken:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/CreateRequesterGatewayRequestDescriptionString"
                tags:
                  $ref: "#/components/schemas/TagsMap"
              required:
                - vpcId
                - subnetIds
                - securityGroupIds
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRequesterGatewayResponse"
  /responder-gateway:
    post:
      operationId: CreateResponderGateway
      description: Creates a responder gateway. A domain name or managed endpoint is required.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vpcId:
                  $ref: "#/components/schemas/VpcId"
                subnetIds:
                  $ref: "#/components/schemas/CreateResponderGatewayRequestSubnetIdsList"
                securityGroupIds:
                  $ref: "#/components/schemas/CreateResponderGatewayRequestSecurityGroupIdsList"
                domainName:
                  $ref: "#/components/schemas/DomainName"
                port:
                  $ref: "#/components/schemas/CreateResponderGatewayRequestPortInteger"
                protocol:
                  $ref: "#/components/schemas/Protocol"
                listenerConfig:
                  $ref: "#/components/schemas/ListenerConfig"
                trustStoreConfiguration:
                  $ref: "#/components/schemas/TrustStoreConfiguration"
                managedEndpointConfiguration:
                  $ref: "#/components/schemas/ManagedEndpointConfiguration"
                clientToken:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/CreateResponderGatewayRequestDescriptionString"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                gatewayType:
                  $ref: "#/components/schemas/GatewayType"
              required:
                - vpcId
                - subnetIds
                - securityGroupIds
                - port
                - protocol
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponderGatewayResponse"
