  /gateway/{gateway_id}/link/{link_id}:
    delete:
      operationId: DeleteLink
      description: Deletes a link between gateways. Permanently removes the connection between gateways. This action cannot be undone.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLinkResponse"
    get:
      operationId: GetLink
      description: Retrieves information about a link between gateways. Returns detailed information about the link configuration, status, and associated gateways.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLinkResponse"
    patch:
      operationId: UpdateLink
      description: Updates the configuration of a link between gateways. Allows you to modify settings and parameters for an existing link.
      parameters:
        - name: gateway_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GatewayId"
          description: The unique identifier of the gateway.
        - name: link_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The unique identifier of the link.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                logSettings:
                  $ref: "#/components/schemas/LinkLogSettings"
                timeoutInMillis:
                  $ref: "#/components/schemas/LinkTimeoutInMillis"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLinkResponse"
  /responder-gateway/{gateway_id}/link/{link_id}/routing-rule/{rule_id}:
    delete:
      operationId: DeleteLinkRoutingRule
      description: Deletes a routing rule from a link.
      parameters:
        - name: gateway_id
          in: path
