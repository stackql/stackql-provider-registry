    LandingZoneDriftStatusSummary:
      description: The drift status summary of the landing zone. If the landing zone differs from the expected configuration, it is defined to be in a state of drift. You can repair this drift by resetting the landing zone.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LandingZoneDriftStatus"
          description: "The drift status of the landing zone. Valid values: DRIFTED: The landing zone deployed in this configuration does not match the configuration that Amazon Web Services Control Tower expected. IN_SYNC: The landing zone deployed in this configuration matches the configuration that Amazon Web Services Control Tower expected."
    LandingZoneDriftStatus:
