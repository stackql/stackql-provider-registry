          $ref: "#/components/schemas/BaselineOperation"
          description: A baselineOperation object that shows information about the specified operation ID.
      required:
        - baselineOperation
    BaselineOperation:
      description: An object of shape BaselineOperation, returning details about the specified Baseline operation ID.
      type: object
      properties:
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The identifier of the specified operation.
        operationType:
          $ref: "#/components/schemas/BaselineOperationType"
          description: An enumerated type (enum) with possible values of ENABLE_BASELINE, DISABLE_BASELINE, UPDATE_ENABLED_BASELINE, or RESET_ENABLED_BASELINE.
        status:
          $ref: "#/components/schemas/BaselineOperationStatus"
          description: An enumerated type (enum) with possible values of SUCCEEDED, FAILED, or IN_PROGRESS.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time of the operation, in ISO 8601 format.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time of the operation (if applicable), in ISO 8601 format.
        statusMessage:
          $ref: "#/components/schemas/String"
          description: A status message that gives more information about the operation's status, if applicable.
    BaselineOperationType:
      type: string
      enum:
        - ENABLE_BASELINE
        - DISABLE_BASELINE
        - UPDATE_ENABLED_BASELINE
        - RESET_ENABLED_BASELINE
    BaselineOperationStatus:
      type: string
      enum:
        - SUCCEEDED
        - FAILED
        - IN_PROGRESS
    Timestamp:
      type: string
      format: date-time
    GetControlOperationOutput:
      type: object
      properties:
        controlOperation:
          $ref: "#/components/schemas/ControlOperation"
          description: An operation performed by the control.
      required:
        - controlOperation
    ControlOperation:
      description: An operation performed by the control.
      type: object
      properties:
        operationType:
          $ref: "#/components/schemas/ControlOperationType"
          description: One of ENABLE_CONTROL or DISABLE_CONTROL.
        startTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time that the operation began.
        endTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time that the operation finished.
        status:
          $ref: "#/components/schemas/ControlOperationStatus"
          description: One of IN_PROGRESS, SUCEEDED, or FAILED.
        statusMessage:
          $ref: "#/components/schemas/String"
          description: If the operation result is FAILED, this string contains a message explaining why the operation failed.
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The identifier of the specified operation.
        controlIdentifier:
          $ref: "#/components/schemas/ControlIdentifier"
          description: The controlIdentifier of the control for the operation.
        targetIdentifier:
          $ref: "#/components/schemas/TargetIdentifier"
          description: The target upon which the control operation is working.
        enabledControlIdentifier:
          $ref: "#/components/schemas/Arn"
          description: The controlIdentifier of the enabled control.
    ControlOperationType:
      type: string
      enum:
        - ENABLE_CONTROL
        - DISABLE_CONTROL
        - UPDATE_ENABLED_CONTROL
        - RESET_ENABLED_CONTROL
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    ControlOperationStatus:
      type: string
      enum:
        - SUCCEEDED
        - FAILED
        - IN_PROGRESS
    GetEnabledBaselineOutput:
      type: object
      properties:
        enabledBaselineDetails:
          $ref: "#/components/schemas/EnabledBaselineDetails"
          description: Details of the EnabledBaseline resource.
    EnabledBaselineDetails:
      description: Details of the EnabledBaseline resource.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the EnabledBaseline resource.
        baselineIdentifier:
          $ref: "#/components/schemas/String"
          description: The specific Baseline enabled as part of the EnabledBaseline resource.
        baselineVersion:
          $ref: "#/components/schemas/String"
          description: The enabled version of the Baseline.
        driftStatusSummary:
          $ref: "#/components/schemas/EnabledBaselineDriftStatusSummary"
          description: The drift status of the enabled baseline.
        targetIdentifier:
          $ref: "#/components/schemas/String"
          description: The target on which to enable the Baseline.
        parentIdentifier:
          $ref: "#/components/schemas/Arn"
          description: An ARN that represents the parent EnabledBaseline at the Organizational Unit (OU) level, from which the child EnabledBaseline inherits its configuration. The value is returned by GetEnabledBaseline.
        statusSummary:
          $ref: "#/components/schemas/EnablementStatusSummary"
        parameters:
          $ref: "#/components/schemas/EnabledBaselineParameterSummaries"
          description: Shows the parameters that are applied when enabling this Baseline.
      required:
        - arn
        - baselineIdentifier
        - targetIdentifier
        - statusSummary
    EnabledBaselineDriftStatusSummary:
      description: The drift summary of the enabled baseline. Amazon Web Services Control Tower reports inheritance drift when an enabled baseline configuration of a member account is different than the configuration that applies to the OU. Amazon Web Services Control Tower reports this type of drift for a parent or child enabled baseline. One way to repair this drift by resetting the parent enabled baseline, on the OU. For example, you may see this type of drift if you move accounts between OUs, but the accounts are not yet (re-)enrolled.
      type: object
      properties:
        types:
          $ref: "#/components/schemas/EnabledBaselineDriftTypes"
          description: The types of drift that can be detected for an enabled baseline. Amazon Web Services Control Tower detects inheritance drift on enabled baselines that apply at the OU level.
    EnabledBaselineDriftTypes:
      description: "The types of drift that can be detected for an enabled baseline. Amazon Web Services Control Tower detects inheritance drift on the enabled baselines that target OUs: AWSControlTowerBaseline and BackupBaseline. Amazon Web Services Control Tower does not detect drift on the baselines that apply to your landing zone: IdentityCenterBaseline, AuditBaseline, LogArchiveBaseline, BackupCentralVaultBaseline, or BackupAdminBaseline. For more information, see Types of baselines. Baselines enabled on an OU are inherited by its member accounts as child EnabledBaseline resources. The baseline on the OU serves as the parent EnabledBaseline, which governs the configuration of each child EnabledBaseline. If the baseline configuration of a member account in an OU does not match the configuration of the parent OU, the parent and child baseline is in a state of inheritance drift. This drift could occur in the AWSControlTowerBaseline or the BackupBaseline related to that account."
      type: object
      properties:
        inheritance:
          $ref: "#/components/schemas/EnabledBaselineInheritanceDrift"
          description: At least one account within the target OU does not match the baseline configuration defined on that OU. An account is in inheritance drift when it does not match the configuration of a parent OU, possibly a new parent OU, if the account is moved.
    EnabledBaselineInheritanceDrift:
      description: The inheritance drift summary for the enabled baseline. Inheritance drift occurs when any accounts in the target OU do not match the baseline configuration defined on that OU.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/EnabledBaselineDriftStatus"
          description: The inheritance drift status for enabled baselines.
    EnabledBaselineDriftStatus:
      type: string
      enum:
        - IN_SYNC
        - DRIFTED
    EnablementStatusSummary:
      description: The deployment summary of an EnabledControl or EnabledBaseline resource.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/EnablementStatus"
          description: "The deployment status of the enabled resource. Valid values: SUCCEEDED: The EnabledControl or EnabledBaseline configuration was deployed successfully. UNDER_CHANGE: The EnabledControl or EnabledBaseline configuration is changing. FAILED: The EnabledControl or EnabledBaseline configuration failed to deploy."
        lastOperationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The last operation identifier for the enabled resource.
    EnablementStatus:
      type: string
      enum:
        - SUCCEEDED
        - FAILED
        - UNDER_CHANGE
    EnabledBaselineParameterSummaries:
      type: array
      items:
        $ref: "#/components/schemas/EnabledBaselineParameterSummary"
    EnabledBaselineParameterSummary:
      description: Summary of an applied parameter to an EnabledBaseline resource.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/String"
          description: A string denoting the parameter key.
        value:
          $ref: "#/components/schemas/EnabledBaselineParameterDocument"
          description: A low-level document object of any type (for example, a Java Object).
      required:
        - key
        - value
    GetEnabledControlOutput:
      type: object
      properties:
        enabledControlDetails:
          $ref: "#/components/schemas/EnabledControlDetails"
          description: Information about the enabled control.
      required:
        - enabledControlDetails
    EnabledControlDetails:
      description: Information about the enabled control.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the enabled control.
        controlIdentifier:
          $ref: "#/components/schemas/ControlIdentifier"
          description: The control identifier of the enabled control. For information on how to find the controlIdentifier, see the overview page.
        targetIdentifier:
          $ref: "#/components/schemas/TargetIdentifier"
          description: The ARN of the organizational unit. For information on how to find the targetIdentifier, see the overview page.
        statusSummary:
          $ref: "#/components/schemas/EnablementStatusSummary"
          description: The deployment summary of the enabled control.
        driftStatusSummary:
          $ref: "#/components/schemas/DriftStatusSummary"
          description: The drift status of the enabled control.
        parentIdentifier:
          $ref: "#/components/schemas/ParentIdentifier"
          description: The ARN of the parent enabled control from which this control inherits its configuration, if applicable.
        targetRegions:
          $ref: "#/components/schemas/TargetRegions"
          description: Target Amazon Web Services Regions for the enabled control.
        parameters:
          $ref: "#/components/schemas/EnabledControlParameterSummaries"
          description: Array of EnabledControlParameter objects.
    DriftStatusSummary:
      description: The drift summary of the enabled control. Amazon Web Services Control Tower expects the enabled control configuration to include all supported and governed Regions. If the enabled control differs from the expected configuration, it is defined to be in a state of drift. You can repair this drift by resetting the enabled control.
      type: object
      properties:
        driftStatus:
          $ref: "#/components/schemas/DriftStatus"
          description: "The drift status of the enabled control. Valid values: DRIFTED: The enabledControl deployed in this configuration doesn’t match the configuration that Amazon Web Services Control Tower expected. IN_SYNC: The enabledControl deployed in this configuration matches the configuration that Amazon Web Services Control Tower expected. NOT_CHECKING: Amazon Web Services Control Tower does not check drift for this enabled control. Drift is not supported for the control type. UNKNOWN: Amazon Web Services Control Tower is not able to check the drift status for the enabled control."
        types:
          $ref: "#/components/schemas/EnabledControlDriftTypes"
          description: An object that categorizes the different types of drift detected for the enabled control.
    DriftStatus:
      type: string
      enum:
        - DRIFTED
        - IN_SYNC
        - NOT_CHECKING
        - UNKNOWN
    EnabledControlDriftTypes:
      description: Defines the various categories of drift that can occur for an enabled control resource.
      type: object
      properties:
        inheritance:
          $ref: "#/components/schemas/EnabledControlInheritanceDrift"
          description: Indicates drift related to inheritance configuration between parent and child controls.
        resource:
          $ref: "#/components/schemas/EnabledControlResourceDrift"
          description: Indicates drift related to the underlying Amazon Web Services resources managed by the control.
    EnabledControlInheritanceDrift:
      description: Represents drift information related to control inheritance between organizational units.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/DriftStatus"
          description: The status of inheritance drift for the enabled control, indicating whether inheritance configuration matches expectations.
    EnabledControlResourceDrift:
      description: Represents drift information related to the underlying Amazon Web Services resources managed by the control.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/DriftStatus"
          description: The status of resource drift for the enabled control, indicating whether the underlying resources match the expected configuration.
    ParentIdentifier:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[0-9a-zA-Z_\-:\/]+
    TargetRegions:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      description: An Amazon Web Services Region in which Amazon Web Services Control Tower expects to find the control deployed. The expected Regions are based on the Regions that are governed by the landing zone. In certain cases, a control is not actually enabled in the Region as expected, such as during drift, or mixed governance.
      type: object
      properties:
