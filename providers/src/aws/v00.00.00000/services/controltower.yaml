openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Control Tower
  description: AWS Control Tower
  x-serviceName: controltower
  x-serviceAlias: controltower
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: controltower
servers:
  - url: https://controltower.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for controltower
paths:
  /create-landingzone:
    post:
      operationId: CreateLandingZone
      description: Creates a new landing zone. This API call starts an asynchronous operation that creates and configures a landing zone, based on the parameters specified in the manifest JSON file.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  $ref: "#/components/schemas/LandingZoneVersion"
                remediationTypes:
                  $ref: "#/components/schemas/RemediationTypes"
                tags:
                  $ref: "#/components/schemas/TagMap"
                manifest:
                  $ref: "#/components/schemas/Manifest"
              required:
                - version
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLandingZoneOutput"
  /delete-landingzone:
    post:
      operationId: DeleteLandingZone
      description: Decommissions a landing zone. This API call starts an asynchronous operation that deletes Amazon Web Services Control Tower resources deployed in accounts managed by Amazon Web Services Control Tower. Decommissioning a landing zone is a process with significant consequences, and it cannot be undone. We strongly recommend that you perform this decommissioning process only if you intend to stop using your landing zone.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                landingZoneIdentifier:
                  $ref: "#/components/schemas/String"
              required:
                - landingZoneIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLandingZoneOutput"
  /disable-baseline:
    post:
      operationId: DisableBaseline
      description: Disable an EnabledBaseline resource on the specified Target. This API starts an asynchronous operation to remove all resources deployed as part of the baseline enablement. The resource will vary depending on the enabled baseline. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabledBaselineIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - enabledBaselineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableBaselineOutput"
  /disable-control:
    post:
      operationId: DisableControl
      description: This API call turns off a control. It starts an asynchronous operation that deletes Amazon Web Services resources on the specified organizational unit and the accounts it contains. The resources will vary according to the control that you specify. For usage examples, see the Controls Reference Guide .
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                controlIdentifier:
                  $ref: "#/components/schemas/ControlIdentifier"
                targetIdentifier:
                  $ref: "#/components/schemas/TargetIdentifier"
                enabledControlIdentifier:
                  $ref: "#/components/schemas/Arn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableControlOutput"
  /enable-baseline:
    post:
      operationId: EnableBaseline
      description: Enable (apply) a Baseline to a Target. This API starts an asynchronous operation to deploy resources specified by the Baseline to the specified Target. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                baselineVersion:
                  $ref: "#/components/schemas/BaselineVersion"
                parameters:
                  $ref: "#/components/schemas/EnabledBaselineParameters"
                baselineIdentifier:
                  $ref: "#/components/schemas/Arn"
                targetIdentifier:
                  $ref: "#/components/schemas/Arn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - baselineVersion
                - baselineIdentifier
                - targetIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableBaselineOutput"
  /enable-control:
    post:
      operationId: EnableControl
      description: This API call activates a control. It starts an asynchronous operation that creates Amazon Web Services resources on the specified organizational unit and the accounts it contains. The resources created will vary according to the control that you specify. For usage examples, see the Controls Reference Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                controlIdentifier:
                  $ref: "#/components/schemas/ControlIdentifier"
                targetIdentifier:
                  $ref: "#/components/schemas/TargetIdentifier"
                tags:
                  $ref: "#/components/schemas/TagMap"
                parameters:
                  $ref: "#/components/schemas/EnabledControlParameters"
              required:
                - controlIdentifier
                - targetIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableControlOutput"
  /get-baseline:
    post:
      operationId: GetBaseline
      description: Retrieve details about an existing Baseline resource by specifying its identifier. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                baselineIdentifier:
                  $ref: "#/components/schemas/BaselineArn"
              required:
                - baselineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBaselineOutput"
  /get-baseline-operation:
    post:
      operationId: GetBaselineOperation
      description: "Returns the details of an asynchronous baseline operation, as initiated by any of these APIs: EnableBaseline, DisableBaseline, UpdateEnabledBaseline, ResetEnabledBaseline. A status message is displayed in case of operation failure. For usage examples, see the Amazon Web Services Control Tower User Guide ."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationIdentifier:
                  $ref: "#/components/schemas/OperationIdentifier"
              required:
                - operationIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBaselineOperationOutput"
  /get-control-operation:
    post:
      operationId: GetControlOperation
      description: Returns the status of a particular EnableControl or DisableControl operation. Displays a message in case of error. Details for an operation are available for 90 days. For usage examples, see the Controls Reference Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationIdentifier:
                  $ref: "#/components/schemas/OperationIdentifier"
              required:
                - operationIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetControlOperationOutput"
  /get-enabled-baseline:
    post:
      operationId: GetEnabledBaseline
      description: Retrieve details of an EnabledBaseline resource by specifying its identifier.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabledBaselineIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - enabledBaselineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnabledBaselineOutput"
  /get-enabled-control:
    post:
      operationId: GetEnabledControl
      description: Retrieves details about an enabled control. For usage examples, see the Controls Reference Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabledControlIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - enabledControlIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnabledControlOutput"
  /get-landingzone:
    post:
      operationId: GetLandingZone
      description: Returns details about the landing zone. Displays a message in case of error.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                landingZoneIdentifier:
                  $ref: "#/components/schemas/String"
              required:
                - landingZoneIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLandingZoneOutput"
  /get-landingzone-operation:
    post:
      operationId: GetLandingZoneOperation
      description: Returns the status of the specified landing zone operation. Details for an operation are available for 90 days.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operationIdentifier:
                  $ref: "#/components/schemas/OperationIdentifier"
              required:
                - operationIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLandingZoneOperationOutput"
  /list-baselines:
    post:
      operationId: ListBaselines
      description: Returns a summary list of all available baselines. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/ListBaselinesMaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBaselinesOutput"
  /list-control-operations:
    post:
      operationId: ListControlOperations
      description: Provides a list of operations in progress or queued. For usage examples, see ListControlOperation examples.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/ControlOperationFilter"
                nextToken:
                  $ref: "#/components/schemas/ListControlOperationsNextToken"
                maxResults:
                  $ref: "#/components/schemas/ListControlOperationsMaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListControlOperationsOutput"
  /list-enabled-baselines:
    post:
      operationId: ListEnabledBaselines
      description: Returns a list of summaries describing EnabledBaseline resources. You can filter the list by the corresponding Baseline or Target of the EnabledBaseline resources. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/EnabledBaselineFilter"
                nextToken:
                  $ref: "#/components/schemas/ListEnabledBaselinesNextToken"
                maxResults:
                  $ref: "#/components/schemas/ListEnabledBaselinesMaxResults"
                includeChildren:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnabledBaselinesOutput"
  /list-enabled-controls:
    post:
      operationId: ListEnabledControls
      description: Lists the controls enabled by Amazon Web Services Control Tower on the specified organizational unit and the accounts it contains. For usage examples, see the Controls Reference Guide .
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                targetIdentifier:
                  $ref: "#/components/schemas/TargetIdentifier"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                filter:
                  $ref: "#/components/schemas/EnabledControlFilter"
                includeChildren:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnabledControlsOutput"
  /list-landingzone-operations:
    post:
      operationId: ListLandingZoneOperations
      description: Lists all landing zone operations from the past 90 days. Results are sorted by time, with the most recent operation first.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/LandingZoneOperationFilter"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/ListLandingZoneOperationsMaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLandingZoneOperationsOutput"
  /list-landingzones:
    post:
      operationId: ListLandingZones
      description: Returns the landing zone ARN for the landing zone deployed in your managed account. This API also creates an ARN for existing accounts that do not yet have a landing zone ARN. Returns one landing zone ARN.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/ListLandingZonesMaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLandingZonesOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags associated with the resource. For usage examples, see the Controls Reference Guide .
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Applies tags to a resource. For usage examples, see the Controls Reference Guide .
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource to be tagged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes tags from a resource. For usage examples, see the Controls Reference Guide .
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: Tag keys to be removed from the resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /reset-enabled-baseline:
    post:
      operationId: ResetEnabledBaseline
      description: Re-enables an EnabledBaseline resource. For example, this API can re-apply the existing Baseline after a new member account is moved to the target OU. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabledBaselineIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - enabledBaselineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetEnabledBaselineOutput"
  /reset-enabled-control:
    post:
      operationId: ResetEnabledControl
      description: Resets an enabled control. Does not work for controls implemented with SCPs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabledControlIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - enabledControlIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetEnabledControlOutput"
  /reset-landingzone:
    post:
      operationId: ResetLandingZone
      description: This API call resets a landing zone. It starts an asynchronous operation that resets the landing zone to the parameters specified in the original configuration, which you specified in the manifest file. Nothing in the manifest file's original landing zone configuration is changed during the reset process, by default. This API is not the same as a rollback of a landing zone version, which is not a supported operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                landingZoneIdentifier:
                  $ref: "#/components/schemas/String"
              required:
                - landingZoneIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetLandingZoneOutput"
  /update-enabled-baseline:
    post:
      operationId: UpdateEnabledBaseline
      description: Updates an EnabledBaseline resource's applied parameters or version. For usage examples, see the Amazon Web Services Control Tower User Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                baselineVersion:
                  $ref: "#/components/schemas/BaselineVersion"
                parameters:
                  $ref: "#/components/schemas/EnabledBaselineParameters"
                enabledBaselineIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - baselineVersion
                - enabledBaselineIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnabledBaselineOutput"
  /update-enabled-control:
    post:
      operationId: UpdateEnabledControl
      description: Updates the configuration of an already enabled control. If the enabled control shows an EnablementStatus of SUCCEEDED, supply parameters that are different from the currently configured parameters. Otherwise, Amazon Web Services Control Tower will not accept the request. If the enabled control shows an EnablementStatus of FAILED, Amazon Web Services Control Tower updates the control to match any valid parameters that you supply. If the DriftSummary status for the control shows as DRIFTED, you cannot call this API. Instead, you can update the control by calling the ResetEnabledControl API. Alternatively, you can call DisableControl and then call EnableControl again. Also, you can run an extending governance operation to repair drift. For usage examples, see the Controls Reference Guide .
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parameters:
                  $ref: "#/components/schemas/EnabledControlParameters"
                enabledControlIdentifier:
                  $ref: "#/components/schemas/Arn"
              required:
                - parameters
                - enabledControlIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnabledControlOutput"
  /update-landingzone:
    post:
      operationId: UpdateLandingZone
      description: This API call updates the landing zone. It starts an asynchronous operation that updates the landing zone based on the new landing zone version, or on the changed parameters specified in the updated manifest file.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  $ref: "#/components/schemas/LandingZoneVersion"
                remediationTypes:
                  $ref: "#/components/schemas/RemediationTypes"
                landingZoneIdentifier:
                  $ref: "#/components/schemas/String"
                manifest:
                  $ref: "#/components/schemas/Manifest"
              required:
                - version
                - landingZoneIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLandingZoneOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LandingZoneVersion:
      type: string
      minLength: 3
      maxLength: 10
      pattern: \d+.\d+
    RemediationTypes:
      type: array
      items:
        $ref: "#/components/schemas/RemediationType"
    RemediationType:
      type: string
      enum:
        - INHERITANCE_DRIFT
    TagMap:
      type: object
      properties: {}
    Manifest:
      type: object
    CreateLandingZoneOutput:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the landing zone resource.
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: A unique identifier assigned to a CreateLandingZone operation. You can use this identifier as an input of GetLandingZoneOperation to check the operation's status.
      required:
        - arn
        - operationIdentifier
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[0-9a-zA-Z_\-:\/]+
    OperationIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
    String:
      type: string
    DeleteLandingZoneOutput:
      type: object
      properties:
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: ">A unique identifier assigned to a DeleteLandingZone operation. You can use this identifier as an input parameter of GetLandingZoneOperation to check the operation's status."
      required:
        - operationIdentifier
    DisableBaselineOutput:
      type: object
      properties:
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The ID (in UUID format) of the asynchronous DisableBaseline operation. This operationIdentifier is used to track status through calls to the GetBaselineOperation API.
      required:
        - operationIdentifier
    ControlIdentifier:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[0-9a-zA-Z_\-:\/]+
    TargetIdentifier:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[0-9a-zA-Z_\-:\/]+
    DisableControlOutput:
      type: object
      properties:
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The ID of the asynchronous operation, which is used to track status. The operation is available for 90 days.
      required:
        - operationIdentifier
    BaselineVersion:
      type: string
      minLength: 1
      maxLength: 10
      pattern: \d+(?:\.\d+){0,2}
    EnabledBaselineParameters:
      type: array
      items:
        $ref: "#/components/schemas/EnabledBaselineParameter"
    EnabledBaselineParameter:
      description: A key-value parameter to an EnabledBaseline resource.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/String"
          description: A string denoting the parameter key.
        value:
          $ref: "#/components/schemas/EnabledBaselineParameterDocument"
          description: A low-level Document object of any type (for example, a Java Object).
      required:
        - key
        - value
    EnabledBaselineParameterDocument:
      type: object
    EnableBaselineOutput:
      type: object
      properties:
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The ID (in UUID format) of the asynchronous EnableBaseline operation. This operationIdentifier is used to track status through calls to the GetBaselineOperation API.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the EnabledBaseline resource.
      required:
        - operationIdentifier
        - arn
    EnabledControlParameters:
      type: array
      items:
        $ref: "#/components/schemas/EnabledControlParameter"
    EnabledControlParameter:
      description: A key/value pair, where Key is of type String and Value is of type Document.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/String"
          description: The key of a key/value pair.
        value:
          $ref: "#/components/schemas/Document"
          description: The value of a key/value pair.
      required:
        - key
        - value
    Document:
      type: object
    EnableControlOutput:
      type: object
      properties:
        operationIdentifier:
          $ref: "#/components/schemas/OperationIdentifier"
          description: The ID of the asynchronous operation, which is used to track status. The operation is available for 90 days.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the EnabledControl resource.
      required:
        - operationIdentifier
    BaselineArn:
      type: string
