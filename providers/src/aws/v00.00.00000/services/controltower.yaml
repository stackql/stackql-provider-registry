          description: The operationIdentifier of the landing zone operation.
        status:
          $ref: "#/components/schemas/LandingZoneOperationStatus"
          description: "Valid values: SUCCEEDED: The landing zone operation succeeded. IN_PROGRESS: The landing zone operation is in progress. FAILED: The landing zone operation failed."
        startTime:
