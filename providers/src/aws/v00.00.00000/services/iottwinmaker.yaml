openapi: 3.0.0
info:
  version: "2021-11-29"
  title: AWS IoT TwinMaker
  description: AWS IoT TwinMaker
  x-serviceName: iottwinmaker
  x-serviceAlias: iottwinmaker
  x-protocol: rest-json
  x-apiVersion: "2021-11-29"
  x-endpointPrefix: iottwinmaker
servers:
  - url: https://iottwinmaker.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iottwinmaker
paths:
  /workspaces/{workspace_id}/entity-properties:
    post:
      operationId: BatchPutPropertyValues
      description: Sets values for multiple time series properties.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the properties to set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  $ref: "#/components/schemas/Entries"
              required:
                - entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutPropertyValuesResponse"
  /metadata-transfer-jobs/{metadata_transfer_job_id}/cancel:
    put:
      operationId: CancelMetadataTransferJob
      description: Cancels the metadata transfer job.
      parameters:
        - name: metadata_transfer_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The metadata transfer job Id.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMetadataTransferJobResponse"
  /workspaces/{workspace_id}/component-types/{component_type_id}:
    post:
      operationId: CreateComponentType
      description: Creates a component type.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the component type.
        - name: component_type_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentTypeId"
          description: The ID of the component type.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                isSingleton:
                  $ref: "#/components/schemas/Boolean"
                description:
                  $ref: "#/components/schemas/Description"
                propertyDefinitions:
                  $ref: "#/components/schemas/PropertyDefinitionsRequest"
                extendsFrom:
                  $ref: "#/components/schemas/ExtendsFrom"
                functions:
                  $ref: "#/components/schemas/FunctionsRequest"
                tags:
                  $ref: "#/components/schemas/TagMap"
                propertyGroups:
                  $ref: "#/components/schemas/PropertyGroupsRequest"
                componentTypeName:
                  $ref: "#/components/schemas/ComponentTypeName"
                compositeComponentTypes:
                  $ref: "#/components/schemas/CompositeComponentTypesRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateComponentTypeResponse"
    delete:
      operationId: DeleteComponentType
      description: Deletes a component type.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the component type.
        - name: component_type_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentTypeId"
          description: The ID of the component type to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteComponentTypeResponse"
    get:
      operationId: GetComponentType
      description: Retrieves information about a component type.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the component type.
        - name: component_type_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentTypeId"
          description: The ID of the component type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentTypeResponse"
    put:
      operationId: UpdateComponentType
      description: Updates information in a component type.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
        - name: component_type_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ComponentTypeId"
          description: The ID of the component type.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                isSingleton:
                  $ref: "#/components/schemas/Boolean"
                description:
                  $ref: "#/components/schemas/Description"
                propertyDefinitions:
                  $ref: "#/components/schemas/PropertyDefinitionsRequest"
                extendsFrom:
                  $ref: "#/components/schemas/ExtendsFrom"
                functions:
                  $ref: "#/components/schemas/FunctionsRequest"
                propertyGroups:
                  $ref: "#/components/schemas/PropertyGroupsRequest"
                componentTypeName:
                  $ref: "#/components/schemas/ComponentTypeName"
                compositeComponentTypes:
                  $ref: "#/components/schemas/CompositeComponentTypesRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateComponentTypeResponse"
  /workspaces/{workspace_id}/entities:
    post:
      operationId: CreateEntity
      description: Creates an entity.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the entity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entityId:
                  $ref: "#/components/schemas/EntityId"
                entityName:
                  $ref: "#/components/schemas/EntityName"
                description:
                  $ref: "#/components/schemas/Description"
                components:
                  $ref: "#/components/schemas/ComponentsMapRequest"
                compositeComponents:
                  $ref: "#/components/schemas/CompositeComponentsMapRequest"
                parentEntityId:
                  $ref: "#/components/schemas/ParentEntityId"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - entityName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEntityResponse"
  /metadata-transfer-jobs:
    post:
      operationId: CreateMetadataTransferJob
      description: Creates a new metadata transfer job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadataTransferJobId:
                  $ref: "#/components/schemas/Id"
                description:
                  $ref: "#/components/schemas/Description"
                sources:
                  $ref: "#/components/schemas/SourceConfigurations"
                destination:
                  $ref: "#/components/schemas/DestinationConfiguration"
              required:
                - sources
                - destination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMetadataTransferJobResponse"
  /workspaces/{workspace_id}/scenes:
    post:
      operationId: CreateScene
      description: Creates a scene.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the scene.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sceneId:
                  $ref: "#/components/schemas/Id"
                contentLocation:
                  $ref: "#/components/schemas/S3Url"
                description:
                  $ref: "#/components/schemas/Description"
                capabilities:
                  $ref: "#/components/schemas/SceneCapabilities"
                tags:
                  $ref: "#/components/schemas/TagMap"
                sceneMetadata:
                  $ref: "#/components/schemas/SceneMetadataMap"
              required:
                - sceneId
                - contentLocation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSceneResponse"
  /workspaces/{workspace_id}/sync-jobs/{sync_source}:
    post:
      operationId: CreateSyncJob
      description: This action creates a SyncJob.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The workspace ID.
        - name: sync_source
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SyncSource"
          description: The sync source. Currently the only supported syncSoource is SITEWISE .
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                syncRole:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - syncRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSyncJobResponse"
    delete:
      operationId: DeleteSyncJob
      description: Delete the SyncJob.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The workspace ID.
        - name: sync_source
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SyncSource"
          description: The sync source. Currently the only supported syncSource is SITEWISE .
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSyncJobResponse"
  /workspaces/{workspace_id}:
    post:
      operationId: CreateWorkspace
      description: Creates a workplace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                s3Location:
                  $ref: "#/components/schemas/S3Location"
                role:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceResponse"
    delete:
      operationId: DeleteWorkspace
      description: Deletes a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceResponse"
    get:
      operationId: GetWorkspace
      description: Retrieves information about a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdOrArn"
          description: The ID of the workspace.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkspaceResponse"
    put:
      operationId: UpdateWorkspace
      description: Updates a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                role:
                  $ref: "#/components/schemas/RoleArn"
                s3Location:
                  $ref: "#/components/schemas/S3Location"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceResponse"
  /workspaces/{workspace_id}/entities/{entity_id}:
    delete:
      operationId: DeleteEntity
      description: Deletes an entity.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the entity to delete.
        - name: entity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The ID of the entity to delete.
        - name: isRecursive
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A Boolean value that specifies whether the operation deletes child entities.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEntityResponse"
    get:
      operationId: GetEntity
      description: Retrieves information about an entity.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
        - name: entity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The ID of the entity.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEntityResponse"
    put:
      operationId: UpdateEntity
      description: Updates an entity.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the entity.
        - name: entity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The ID of the entity.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                entityName:
                  $ref: "#/components/schemas/EntityName"
                description:
                  $ref: "#/components/schemas/Description"
                componentUpdates:
                  $ref: "#/components/schemas/ComponentUpdatesMapRequest"
                compositeComponentUpdates:
                  $ref: "#/components/schemas/CompositeComponentUpdatesMapRequest"
                parentEntityUpdate:
                  $ref: "#/components/schemas/ParentEntityUpdateRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEntityResponse"
  /workspaces/{workspace_id}/scenes/{scene_id}:
    delete:
      operationId: DeleteScene
      description: Deletes a scene.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
        - name: scene_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the scene to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSceneResponse"
    get:
      operationId: GetScene
      description: Retrieves information about a scene.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the scene.
        - name: scene_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the scene.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSceneResponse"
    put:
      operationId: UpdateScene
      description: Updates a scene.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace that contains the scene.
        - name: scene_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the scene.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                contentLocation:
                  $ref: "#/components/schemas/S3Url"
                description:
                  $ref: "#/components/schemas/Description"
                capabilities:
                  $ref: "#/components/schemas/SceneCapabilities"
                sceneMetadata:
                  $ref: "#/components/schemas/SceneMetadataMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSceneResponse"
  /queries/execution:
    post:
      operationId: ExecuteQuery
      description: Run queries to access information from your knowledge graph of entities within individual workspaces. The ExecuteQuery action only works with Amazon Web Services Java SDK2. ExecuteQuery will not work with any Amazon Web Services Java SDK version < 2.x.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspaceId:
                  $ref: "#/components/schemas/Id"
                queryStatement:
                  $ref: "#/components/schemas/QueryStatement"
                maxResults:
                  $ref: "#/components/schemas/QueryServiceMaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - workspaceId
                - queryStatement
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteQueryResponse"
  /metadata-transfer-jobs/{metadata_transfer_job_id}:
    get:
      operationId: GetMetadataTransferJob
      description: Gets a nmetadata transfer job.
      parameters:
        - name: metadata_transfer_job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The metadata transfer job Id.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetadataTransferJobResponse"
  /pricingplan:
    get:
      operationId: GetPricingPlan
      description: Gets the pricing plan.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPricingPlanResponse"
    post:
      operationId: UpdatePricingPlan
      description: Update the pricing plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pricingMode:
                  $ref: "#/components/schemas/PricingMode"
                bundleNames:
                  $ref: "#/components/schemas/PricingBundles"
              required:
                - pricingMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePricingPlanResponse"
  /workspaces/{workspace_id}/entity-properties/value:
    post:
      operationId: GetPropertyValue
      description: Gets the property values for a component, component type, entity, or workspace. You must specify a value for either componentName, componentTypeId, entityId, or workspaceId.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace whose values the operation returns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                componentName:
                  $ref: "#/components/schemas/Name"
                componentPath:
                  $ref: "#/components/schemas/ComponentPath"
                componentTypeId:
                  $ref: "#/components/schemas/ComponentTypeId"
                entityId:
                  $ref: "#/components/schemas/EntityId"
                selectedProperties:
                  $ref: "#/components/schemas/SelectedPropertyList"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                propertyGroupName:
                  $ref: "#/components/schemas/Name"
                tabularConditions:
                  $ref: "#/components/schemas/TabularConditions"
              required:
                - selectedProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPropertyValueResponse"
  /workspaces/{workspace_id}/entity-properties/history:
    post:
      operationId: GetPropertyValueHistory
      description: Retrieves information about the history of a time series property value for a component, component type, entity, or workspace. You must specify a value for workspaceId. For entity-specific queries, specify values for componentName and entityId. For cross-entity quries, specify a value for componentTypeId.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entityId:
                  $ref: "#/components/schemas/EntityId"
                componentName:
                  $ref: "#/components/schemas/Name"
                componentPath:
                  $ref: "#/components/schemas/ComponentPath"
                componentTypeId:
                  $ref: "#/components/schemas/ComponentTypeId"
                selectedProperties:
                  $ref: "#/components/schemas/SelectedPropertyList"
                propertyFilters:
                  $ref: "#/components/schemas/PropertyFilters"
                startDateTime:
                  $ref: "#/components/schemas/Timestamp"
                endDateTime:
                  $ref: "#/components/schemas/Timestamp"
                interpolation:
                  $ref: "#/components/schemas/InterpolationParameters"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                orderByTime:
                  $ref: "#/components/schemas/OrderByTime"
                startTime:
                  $ref: "#/components/schemas/Time"
                endTime:
                  $ref: "#/components/schemas/Time"
              required:
                - selectedProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPropertyValueHistoryResponse"
  /sync-jobs/{sync_source}:
    get:
      operationId: GetSyncJob
      description: Gets the SyncJob.
      parameters:
        - name: sync_source
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SyncSource"
          description: The sync source. Currently the only supported syncSource is SITEWISE .
        - name: workspace
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Id"
          description: The workspace ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSyncJobResponse"
  /workspaces/{workspace_id}/component-types-list:
    post:
      operationId: ListComponentTypes
      description: Lists all component types in a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/ListComponentTypesFilters"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentTypesResponse"
  /workspaces/{workspace_id}/entities/{entity_id}/components-list:
    post:
      operationId: ListComponents
      description: This API lists the components of an entity.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The workspace ID.
        - name: entity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The ID for the entity whose metadata (component/properties) is returned by the operation.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                componentPath:
                  $ref: "#/components/schemas/ComponentPath"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsResponse"
  /workspaces/{workspace_id}/entities-list:
    post:
      operationId: ListEntities
      description: Lists all entities in a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the workspace.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/ListEntitiesFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
