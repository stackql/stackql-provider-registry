components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Id:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z_0-9][a-zA-Z_\\-0-9]*[a-zA-Z0-9]+"
    Entries:
      type: array
      items:
        $ref: "#/components/schemas/PropertyValueEntry"
    PropertyValueEntry:
      description: An object that specifies information about time series property values. This object is used and consumed by the BatchPutPropertyValues action.
      type: object
      properties:
        entityPropertyReference:
          $ref: "#/components/schemas/EntityPropertyReference"
          description: An object that contains information about the entity that has the property.
        propertyValues:
          $ref: "#/components/schemas/PropertyValues"
          description: A list of objects that specify time series property values.
      required:
        - entityPropertyReference
    EntityPropertyReference:
      description: An object that uniquely identifies an entity property.
      type: object
      properties:
        componentName:
          $ref: "#/components/schemas/Name"
          description: The name of the component.
        componentPath:
          $ref: "#/components/schemas/ComponentPath"
          description: This string specifies the path to the composite component, starting from the top-level component.
        externalIdProperty:
          type: object
          properties: {}
          description: A mapping of external IDs to property names. External IDs uniquely identify properties from external data stores.
        entityId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the entity.
        propertyName:
          $ref: "#/components/schemas/Name"
          description: The name of the property.
      required:
        - propertyName
    Name:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z_\\-0-9]+"
    ComponentPath:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[a-zA-Z_\\-0-9/]+"
    EntityId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|^[a-zA-Z0-9][a-zA-Z_\\-0-9.:]*[a-zA-Z0-9]+"
    PropertyValues:
      type: array
      items:
        $ref: "#/components/schemas/PropertyValue"
    PropertyValue:
      description: An object that contains information about a value for a time series property.
      type: object
      properties:
        timestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of a value for a time series property.
        value:
          $ref: "#/components/schemas/DataValue"
          description: An object that specifies a value for a time series property.
        time:
          $ref: "#/components/schemas/Time"
          description: "ISO8601 DateTime of a value for a time series property. The time for when the property value was recorded in ISO 8601 format: YYYY-MM-DDThh:mm:ss[.SSSSSSSSS][Z/±HH:mm]. [YYYY]: year [MM]: month [DD]: day [hh]: hour [mm]: minute [ss]: seconds [.SSSSSSSSS]: additional precision, where precedence is maintained. For example: [.573123] is equal to 573123000 nanoseconds. Z: default timezone UTC ± HH:mm: time zone offset in Hours and Minutes. Required sub-fields: YYYY-MM-DDThh:mm:ss and [Z/±HH:mm]"
      required:
        - value
    Timestamp:
      description: supports epoch seconds value
      type: string
      format: date-time
    DataValue:
      description: An object that specifies a value for a property.
      type: object
      properties:
        booleanValue:
          $ref: "#/components/schemas/Boolean"
          description: A Boolean value.
        doubleValue:
          $ref: "#/components/schemas/Double"
          description: A double value.
        integerValue:
          $ref: "#/components/schemas/Integer"
          description: An integer value.
        longValue:
          $ref: "#/components/schemas/Long"
          description: A long value.
        stringValue:
          $ref: "#/components/schemas/String"
          description: A string value.
        listValue:
          $ref: "#/components/schemas/DataValueList"
          description: A list of multiple values.
        mapValue:
          type: object
          properties: {}
          description: An object that maps strings to multiple DataValue objects.
        relationshipValue:
          $ref: "#/components/schemas/RelationshipValue"
          description: A value that relates a component to another component.
        expression:
          $ref: "#/components/schemas/Expression"
          description: An expression that produces the value.
    Boolean:
      type: boolean
    Double:
      type: number
      format: double
    Integer:
      type: integer
    Long:
      type: integer
      format: int64
    String:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*
    DataValueList:
      type: array
      items:
        $ref: "#/components/schemas/DataValue"
    RelationshipValue:
      description: A value that associates a component and an entity.
      type: object
      properties:
        targetEntityId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the target entity associated with this relationship value.
        targetComponentName:
          $ref: "#/components/schemas/Name"
          description: The name of the target component associated with the relationship value.
    Expression:
      type: string
      minLength: 1
      maxLength: 316
      pattern: (^\$\{Parameters\.[a-zA-z]+([a-zA-z_0-9]*)}$)
    Time:
      description: Timestamp represented in ISO 8601 format
      type: string
      minLength: 20
      maxLength: 35
    BatchPutPropertyValuesResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/ErrorEntries"
          description: Entries that caused errors in the batch put operation.
      required:
        - errorEntries
    ErrorEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutPropertyErrorEntry"
    BatchPutPropertyErrorEntry:
      description: An object that contains information about errors returned by the BatchPutProperty action.
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/Errors"
          description: A list of objects that contain information about errors returned by the BatchPutProperty action.
      required:
        - errors
    Errors:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutPropertyError"
    BatchPutPropertyError:
      description: An error returned by the BatchPutProperty action.
      type: object
      properties:
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: The error message.
        entry:
          $ref: "#/components/schemas/PropertyValueEntry"
          description: An object that contains information about errors returned by the BatchPutProperty action.
      required:
        - errorCode
        - errorMessage
        - entry
    CancelMetadataTransferJobResponse:
      type: object
      properties:
        metadataTransferJobId:
          $ref: "#/components/schemas/Id"
          description: The metadata transfer job Id.
        arn:
          $ref: "#/components/schemas/TwinMakerArn"
          description: The metadata transfer job ARN.
        updateDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: Used to update the DateTime property.
        status:
          $ref: "#/components/schemas/MetadataTransferJobStatus"
          description: The metadata transfer job's status.
        progress:
          $ref: "#/components/schemas/MetadataTransferJobProgress"
          description: The metadata transfer job's progress.
      required:
        - metadataTransferJobId
        - arn
        - updateDateTime
        - status
    TwinMakerArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:((aws)|(aws-cn)|(aws-us-gov)):iottwinmaker:[a-z0-9-]+:[0-9]{12}:[\/a-zA-Z0-9_\-\.:]+
    MetadataTransferJobStatus:
      description: The metadata transfer job status.
      type: object
      properties:
        state:
          $ref: "#/components/schemas/MetadataTransferJobState"
          description: The metadata transfer job state.
        error:
          $ref: "#/components/schemas/ErrorDetails"
          description: The metadata transfer job error.
        queuedPosition:
          $ref: "#/components/schemas/Integer"
          description: The queued position.
    MetadataTransferJobState:
      type: string
      enum:
        - VALIDATING
        - PENDING
        - RUNNING
        - CANCELLING
        - ERROR
        - COMPLETED
        - CANCELLED
    ErrorDetails:
      description: The error details.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        message:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message.
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - INTERNAL_FAILURE
        - SYNC_INITIALIZING_ERROR
        - SYNC_CREATING_ERROR
        - SYNC_PROCESSING_ERROR
        - SYNC_DELETING_ERROR
        - PROCESSING_ERROR
        - COMPOSITE_COMPONENT_FAILURE
    ErrorMessage:
      type: string
      minLength: 0
      maxLength: 2048
    MetadataTransferJobProgress:
      description: The metadata transfer job's progress.
      type: object
      properties:
        totalCount:
          $ref: "#/components/schemas/Integer"
          description: The total count. [of what]
        succeededCount:
          $ref: "#/components/schemas/Integer"
          description: The succeeded count.
        skippedCount:
          $ref: "#/components/schemas/Integer"
          description: The skipped count.
        failedCount:
          $ref: "#/components/schemas/Integer"
          description: The failed count.
    ComponentTypeId:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z_\\.\\-0-9:]+"
    Description:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: .*
    PropertyDefinitionsRequest:
      type: object
      properties: {}
    ExtendsFrom:
      type: array
      items:
        $ref: "#/components/schemas/ComponentTypeId"
    FunctionsRequest:
      type: object
      properties: {}
    TagMap:
      type: object
      properties: {}
    PropertyGroupsRequest:
      type: object
      properties: {}
    ComponentTypeName:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*[^\u0000-\u001F\u007F]*.*
    CompositeComponentTypesRequest:
      type: object
      properties: {}
    CreateComponentTypeResponse:
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/TwinMakerArn"
          description: The ARN of the component type.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the entity was created.
        state:
          $ref: "#/components/schemas/State"
          description: The current state of the component type.
      required:
        - arn
        - creationDateTime
        - state
    State:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - ACTIVE
        - ERROR
    EntityName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[^\\u0000-\\u001F\\u007F]+"
    ComponentsMapRequest:
      type: object
      properties: {}
    CompositeComponentsMapRequest:
      type: object
      properties: {}
    ParentEntityId:
      type: string
      minLength: 1
      maxLength: 128
      pattern: \$ROOT|^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|^[a-zA-Z0-9][a-zA-Z_\-0-9.:]*[a-zA-Z0-9]+
    CreateEntityResponse:
      type: object
      properties:
        entityId:
          $ref: "#/components/schemas/EntityId"
          description: The ID of the entity.
        arn:
          $ref: "#/components/schemas/TwinMakerArn"
          description: The ARN of the entity.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the entity was created.
        state:
          $ref: "#/components/schemas/State"
          description: The current state of the entity.
      required:
        - entityId
        - arn
        - creationDateTime
        - state
    SourceConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/SourceConfiguration"
    SourceConfiguration:
      description: The source configuration.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/SourceType"
          description: The source configuration type.
        s3Configuration:
          $ref: "#/components/schemas/S3SourceConfiguration"
          description: The source configuration S3 configuration.
        iotSiteWiseConfiguration:
          $ref: "#/components/schemas/IotSiteWiseSourceConfiguration"
          description: The source configuration IoT SiteWise configuration.
        iotTwinMakerConfiguration:
          $ref: "#/components/schemas/IotTwinMakerSourceConfiguration"
          description: The source configuration IoT TwinMaker configuration.
      required:
        - type_
    SourceType:
      type: string
      enum:
        - s3
        - iotsitewise
        - iottwinmaker
    S3SourceConfiguration:
      description: The S3 destination source configuration.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/S3SourceLocation"
          description: The S3 destination source configuration location.
      required:
        - location
    S3SourceLocation:
      type: string
      pattern: .*(^arn:((aws)|(aws-cn)|(aws-us-gov)):s3:::)([a-zA-Z0-9_-]+)\/([/.a-zA-Z0-9_-]+$).*
    IotSiteWiseSourceConfiguration:
      description: The metadata transfer job AWS IoT SiteWise source configuration.
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/IotSiteWiseSourceConfigurationFilters"
          description: The AWS IoT SiteWise soucre configuration filters.
    IotSiteWiseSourceConfigurationFilters:
      type: array
      items:
        $ref: "#/components/schemas/IotSiteWiseSourceConfigurationFilter"
    IotSiteWiseSourceConfigurationFilter:
