components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CrossClusterSearchConnectionId:
      type: string
    AcceptInboundCrossClusterSearchConnectionResponse:
      description: The result of a AcceptInboundCrossClusterSearchConnection operation. Contains details of accepted inbound connection.
      type: object
      properties:
        CrossClusterSearchConnection:
          $ref: "#/components/schemas/InboundCrossClusterSearchConnection"
          description: Specifies the InboundCrossClusterSearchConnection of accepted inbound connection.
    InboundCrossClusterSearchConnection:
      description: Specifies details of an inbound connection.
      type: object
      properties:
        SourceDomainInfo:
          $ref: "#/components/schemas/DomainInformation"
          description: Specifies the DomainInformation for the source Elasticsearch domain.
        DestinationDomainInfo:
          $ref: "#/components/schemas/DomainInformation"
          description: Specifies the DomainInformation for the destination Elasticsearch domain.
        CrossClusterSearchConnectionId:
          $ref: "#/components/schemas/CrossClusterSearchConnectionId"
          description: Specifies the connection id for the inbound cross-cluster search connection.
        ConnectionStatus:
          $ref: "#/components/schemas/InboundCrossClusterSearchConnectionStatus"
          description: Specifies the InboundCrossClusterSearchConnectionStatus for the outbound connection.
    DomainInformation:
      type: object
      properties:
        OwnerId:
          $ref: "#/components/schemas/OwnerId"
        DomainName:
          $ref: "#/components/schemas/DomainName"
        Region:
          $ref: "#/components/schemas/Region"
      required:
        - DomainName
    OwnerId:
      type: string
      minLength: 12
      maxLength: 12
    DomainName:
      description: "The name of an Elasticsearch domain. Domain names are unique across the domains owned by an account within an AWS region. Domain names start with a letter or number and can contain the following characters: a-z (lowercase), 0-9, and - (hyphen)."
      type: string
      minLength: 3
      maxLength: 28
      pattern: "[a-z][a-z0-9\\-]+"
    Region:
      type: string
    InboundCrossClusterSearchConnectionStatus:
      description: Specifies the coonection status of an inbound cross-cluster search connection.
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/InboundCrossClusterSearchConnectionStatusCode"
          description: "The state code for inbound connection. This can be one of the following: PENDING_ACCEPTANCE: Inbound connection is not yet accepted by destination domain owner. APPROVED: Inbound connection is pending acceptance by destination domain owner. REJECTING: Inbound connection rejection is in process. REJECTED: Inbound connection is rejected. DELETING: Inbound connection deletion is in progress. DELETED: Inbound connection is deleted and cannot be used further."
        Message:
          $ref: "#/components/schemas/CrossClusterSearchConnectionStatusMessage"
          description: Specifies verbose information for the inbound connection status.
    InboundCrossClusterSearchConnectionStatusCode:
      type: string
      enum:
        - PENDING_ACCEPTANCE
        - APPROVED
        - REJECTING
        - REJECTED
        - DELETING
        - DELETED
    CrossClusterSearchConnectionStatusMessage:
      type: string
    ARN:
      description: The Amazon Resource Name (ARN) of the Elasticsearch domain. See Identifiers for IAM Entities in Using AWS Identity and Access Management for more information.
      type: string
    TagList:
      description: A list of Tag
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Specifies a key value pair for a resource tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Specifies the TagKey, the name of the tag. Tag keys must be unique for the Elasticsearch domain to which they are attached.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "Specifies the TagValue, the value assigned to the corresponding tag key. Tag values can be null and do not have to be unique in a tag set. For example, you can have a key value pair in a tag set of project : Trinity and cost-center : Trinity"
      required:
        - Key
        - Value
    TagKey:
      description: A string of length from 1 to 128 characters that specifies the key for a Tag. Tag keys must be unique for the Elasticsearch domain to which they are attached.
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      description: A string of length from 0 to 256 characters that specifies the value for a Tag. Tag values can be null and do not have to be unique in a tag set.
      type: string
      minLength: 0
      maxLength: 256
    PackageID:
      type: string
    AssociatePackageResponse:
      description: Container for response returned by AssociatePackage operation.
      type: object
      properties:
        DomainPackageDetails:
          $ref: "#/components/schemas/DomainPackageDetails"
          description: DomainPackageDetails
    DomainPackageDetails:
      description: Information on a package that is associated with a domain.
      type: object
      properties:
        PackageID:
          $ref: "#/components/schemas/PackageID"
          description: Internal ID of the package.
        PackageName:
          $ref: "#/components/schemas/PackageName"
          description: User specified name of the package.
        PackageType:
          $ref: "#/components/schemas/PackageType"
          description: Currently supports only TXT-DICTIONARY.
        LastUpdated:
          $ref: "#/components/schemas/LastUpdated"
          description: Timestamp of the most-recent update to the association status.
        DomainName:
          $ref: "#/components/schemas/DomainName"
          description: Name of the domain you've associated a package with.
        DomainPackageStatus:
          $ref: "#/components/schemas/DomainPackageStatus"
          description: State of the association. Values are ASSOCIATING/ASSOCIATION_FAILED/ACTIVE/DISSOCIATING/DISSOCIATION_FAILED.
        PackageVersion:
          $ref: "#/components/schemas/PackageVersion"
        ReferencePath:
          $ref: "#/components/schemas/ReferencePath"
          description: The relative path on Amazon ES nodes, which can be used as synonym_path when the package is synonym file.
        ErrorDetails:
          $ref: "#/components/schemas/ErrorDetails"
          description: Additional information if the package is in an error state. Null otherwise.
    PackageName:
      type: string
      minLength: 3
      maxLength: 28
      pattern: "[a-z][a-z0-9\\-]+"
    PackageType:
      type: string
      enum:
        - TXT-DICTIONARY
    LastUpdated:
      type: string
      format: date-time
    DomainPackageStatus:
      type: string
      enum:
        - ASSOCIATING
        - ASSOCIATION_FAILED
        - ACTIVE
        - DISSOCIATING
        - DISSOCIATION_FAILED
    PackageVersion:
      type: string
    ReferencePath:
      type: string
    ErrorDetails:
      type: object
      properties:
        ErrorType:
          $ref: "#/components/schemas/ErrorType"
        ErrorMessage:
          $ref: "#/components/schemas/ErrorMessage"
    ErrorType:
      type: string
    ErrorMessage:
      type: string
    AWSAccount:
      type: string
      pattern: ^[0-9]+$
    AuthorizeVpcEndpointAccessResponse:
      description: Container for response parameters to the AuthorizeVpcEndpointAccess operation. Contains the account ID and the type of the account being authorized to access the VPC endpoint.
      type: object
      properties:
        AuthorizedPrincipal:
          $ref: "#/components/schemas/AuthorizedPrincipal"
          description: Information about the account or service that was provided access to the domain.
      required:
        - AuthorizedPrincipal
    AuthorizedPrincipal:
      description: Information about an account or service that has access to an Amazon OpenSearch Service domain through the use of an interface VPC endpoint.
      type: object
      properties:
        PrincipalType:
          $ref: "#/components/schemas/PrincipalType"
          description: The type of principal.
        Principal:
          $ref: "#/components/schemas/String"
          description: The IAM principal that is allowed access to the domain.
    PrincipalType:
      description: "Specifies the type of AWS account permitted to manage VPC endpoints.: AWS_ACCOUNT: Indicates that the account is owned by an AWS user. AWS_SERVICE: Indicates the the account is owned by an AWS service."
      type: string
      enum:
        - AWS_ACCOUNT
        - AWS_SERVICE
    String:
      type: string
    DryRun:
      type: boolean
    CancelDomainConfigChangeResponse:
      description: Contains the details of the cancelled domain config change.
      type: object
      properties:
        DryRun:
          $ref: "#/components/schemas/DryRun"
          description: Whether or not the request was a dry run. If True, the changes were not actually cancelled.
        CancelledChangeIds:
          $ref: "#/components/schemas/GUIDList"
          description: The unique identifiers of the changes that were cancelled.
        CancelledChangeProperties:
          $ref: "#/components/schemas/CancelledChangePropertyList"
          description: The domain change properties that were cancelled.
    GUIDList:
      type: array
      items:
        $ref: "#/components/schemas/GUID"
    GUID:
      type: string
      pattern: \p{XDigit}{8}-\p{XDigit}{4}-\p{XDigit}{4}-\p{XDigit}{4}-\p{XDigit}{12}
    CancelledChangePropertyList:
      type: array
      items:
        $ref: "#/components/schemas/CancelledChangeProperty"
    CancelledChangeProperty:
      description: A property change that was cancelled for an Amazon OpenSearch Service domain.
      type: object
      properties:
        PropertyName:
          $ref: "#/components/schemas/String"
          description: The name of the property whose change was cancelled.
        CancelledValue:
          $ref: "#/components/schemas/String"
          description: The pending value of the property that was cancelled. This would have been the eventual value of the property if the chance had not been cancelled.
        ActiveValue:
          $ref: "#/components/schemas/String"
          description: The current value of the property, after the change was cancelled.
    CancelElasticsearchServiceSoftwareUpdateResponse:
      description: The result of a CancelElasticsearchServiceSoftwareUpdate operation. Contains the status of the update.
      type: object
      properties:
        ServiceSoftwareOptions:
          $ref: "#/components/schemas/ServiceSoftwareOptions"
          description: The current status of the Elasticsearch service software update.
    ServiceSoftwareOptions:
      description: The current options of an Elasticsearch domain service software options.
      type: object
      properties:
        CurrentVersion:
          $ref: "#/components/schemas/String"
          description: The current service software version that is present on the domain.
        NewVersion:
          $ref: "#/components/schemas/String"
          description: The new service software version if one is available.
        UpdateAvailable:
          $ref: "#/components/schemas/Boolean"
          description: True if you are able to update you service software version. False if you are not able to update your service software version.
        Cancellable:
          $ref: "#/components/schemas/Boolean"
          description: True if you are able to cancel your service software version update. False if you are not able to cancel your service software version.
        UpdateStatus:
          $ref: "#/components/schemas/DeploymentStatus"
          description: "The status of your service software update. This field can take the following values: ELIGIBLE, PENDING_UPDATE, IN_PROGRESS, COMPLETED, and NOT_ELIGIBLE."
        Description:
          $ref: "#/components/schemas/String"
          description: The description of the UpdateStatus.
        AutomatedUpdateDate:
          $ref: "#/components/schemas/DeploymentCloseDateTimeStamp"
          description: Timestamp, in Epoch time, until which you can manually request a service software update. After this date, we automatically update your service software.
        OptionalDeployment:
          $ref: "#/components/schemas/Boolean"
          description: True if a service software is never automatically updated. False if a service software is automatically updated after AutomatedUpdateDate.
    Boolean:
      type: boolean
    DeploymentStatus:
      type: string
      enum:
        - PENDING_UPDATE
        - IN_PROGRESS
        - COMPLETED
        - NOT_ELIGIBLE
        - ELIGIBLE
    DeploymentCloseDateTimeStamp:
      type: string
