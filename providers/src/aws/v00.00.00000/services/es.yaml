    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CognitoOptions:
      description: Options to specify the Cognito user and identity pools for Kibana authentication. For more information, see Amazon Cognito Authentication for Kibana.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies the option to enable Cognito for Kibana authentication.
        UserPoolId:
          $ref: "#/components/schemas/UserPoolId"
          description: Specifies the Cognito user pool ID for Kibana authentication.
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: Specifies the Cognito identity pool ID for Kibana authentication.
        RoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: Specifies the role ARN that provides Elasticsearch permissions for accessing Cognito resources.
    UserPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+_[0-9a-zA-Z]+"
    IdentityPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+:[0-9a-f-]+"
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
    EncryptionAtRestOptions:
      description: Specifies the Encryption At Rest Options.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies the option to enable Encryption At Rest.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: Specifies the KMS Key ID for Encryption At Rest options.
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 500
    NodeToNodeEncryptionOptions:
      description: Specifies the node-to-node encryption options.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specify true to enable node-to-node encryption.
    AdvancedOptions:
      description: "Exposes select native Elasticsearch configuration values from elasticsearch.yml. Currently, the following advanced options are available: Option to allow references to indices in an HTTP request body. Must be false when configuring access to individual sub-resources. By default, the value is true. See Configuration Advanced Options for more information. Option to specify the percentage of heap space that is allocated to field data. By default, this setting is unbounded. For more information, see Configuring Advanced Options."
      type: object
      properties: {}
    LogPublishingOptions:
      type: object
      properties: {}
    DomainEndpointOptions:
      description: Options to configure endpoint for the Elasticsearch domain.
      type: object
      properties:
        EnforceHTTPS:
          $ref: "#/components/schemas/Boolean"
          description: Specify if only HTTPS endpoint should be enabled for the Elasticsearch domain.
        TLSSecurityPolicy:
          $ref: "#/components/schemas/TLSSecurityPolicy"
          description: "Specify the TLS security policy that needs to be applied to the HTTPS endpoint of Elasticsearch domain. It can be one of the following values: Policy-Min-TLS-1-0-2019-07: TLS security policy that supports TLS version 1.0 to TLS version 1.2 Policy-Min-TLS-1-2-2019-07: TLS security policy that supports only TLS version 1.2 Policy-Min-TLS-1-2-PFS-2023-10: TLS security policy that supports TLS version 1.2 to TLS version 1.3 with perfect forward secrecy cipher suites Policy-Min-TLS-1-2-RFC9151-FIPS-2024-08: TLS security policy that supports TLS version 1.3 with FIPS"
        CustomEndpointEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specify if custom endpoint should be enabled for the Elasticsearch domain.
        CustomEndpoint:
          $ref: "#/components/schemas/DomainNameFqdn"
          description: Specify the fully qualified domain for your custom endpoint.
        CustomEndpointCertificateArn:
          $ref: "#/components/schemas/ARN"
          description: Specify ACM certificate ARN for your custom endpoint.
    TLSSecurityPolicy:
      type: string
      enum:
        - Policy-Min-TLS-1-0-2019-07
        - Policy-Min-TLS-1-2-2019-07
        - Policy-Min-TLS-1-2-PFS-2023-10
        - Policy-Min-TLS-1-2-RFC9151-FIPS-2024-08
    DomainNameFqdn:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(((?!-)[A-Za-z0-9-]{0,62}[A-Za-z0-9])\.)+((?!-)[A-Za-z0-9-]{1,62}[A-Za-z0-9])$
    AdvancedSecurityOptionsInput:
      description: "Specifies the advanced security configuration: whether advanced security is enabled, whether the internal database option is enabled, master username and password (if internal database is enabled), and master user ARN (if IAM is enabled)."
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: True if advanced security is enabled.
        InternalUserDatabaseEnabled:
          $ref: "#/components/schemas/Boolean"
          description: True if the internal user database is enabled.
        MasterUserOptions:
          $ref: "#/components/schemas/MasterUserOptions"
          description: "Credentials for the master user: username and password, ARN, or both."
        SAMLOptions:
          $ref: "#/components/schemas/SAMLOptionsInput"
          description: Specifies the SAML application configuration for the domain.
        AnonymousAuthEnabled:
          $ref: "#/components/schemas/Boolean"
          description: True if Anonymous auth is enabled. Anonymous auth can be enabled only when AdvancedSecurity is enabled on existing domains.
    MasterUserOptions:
      description: "Credentials for the master user: username and password, ARN, or both."
