      description: Specifies the deployment strategy for the domain. Valid values are Default and CapacityOptimized.
      type: string
      enum:
        - Default
        - CapacityOptimized
    AutomatedSnapshotPauseRequestOptions:
      description: "Specifies the automated snapshot pause request options for the domain. Suspending snapshots reduces data protection. You cannot restore your domain to points in time when snapshots are suspended. Use this feature only for short-term operational needs such as migrations or maintenance windows. Maximum suspension duration: 3 days."
