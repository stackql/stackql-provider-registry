openapi: 3.0.0
info:
  version: "2015-01-01"
  title: Amazon Elasticsearch Service
  description: Amazon Elasticsearch Service
  x-serviceName: es
  x-serviceAlias: es
  x-protocol: rest-json
  x-apiVersion: "2015-01-01"
  x-endpointPrefix: es
servers:
  - url: https://es.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for es
paths:
  /2015-01-01/es/ccs/inboundConnection/{connection_id}/accept:
    put:
      operationId: AcceptInboundCrossClusterSearchConnection
      description: Allows the destination domain owner to accept an inbound cross-cluster search connection request.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CrossClusterSearchConnectionId"
          description: The id of the inbound connection that you want to accept.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInboundCrossClusterSearchConnectionResponse"
  /2015-01-01/tags:
    post:
      operationId: AddTags
      description: Attaches tags to an existing Elasticsearch domain. Tags are a set of case-sensitive key value pairs. An Elasticsearch domain may have up to 10 tags. See Tagging Amazon Elasticsearch Service Domains for more information.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ARN:
                  $ref: "#/components/schemas/ARN"
                TagList:
                  $ref: "#/components/schemas/TagList"
              required:
                - TagList
      responses:
        "200":
          description: Success
  /2015-01-01/packages/associate/{package_id}/{domain_name}:
    post:
      operationId: AssociatePackage
      description: Associates a package with an Amazon ES domain.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageID"
          description: Internal ID of the package that you want to associate with a domain. Use DescribePackages to find this value.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: Name of the domain that you want to associate the package with.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociatePackageResponse"
  /2015-01-01/es/domain/{domain_name}/authorizeVpcEndpointAccess:
    post:
      operationId: AuthorizeVpcEndpointAccess
      description: Provides access to an Amazon OpenSearch Service domain through the use of an interface VPC endpoint.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the OpenSearch Service domain to provide access to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Account:
                  $ref: "#/components/schemas/AWSAccount"
              required:
                - Account
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeVpcEndpointAccessResponse"
  /2015-01-01/es/domain/{domain_name}/config/cancel:
    post:
      operationId: CancelDomainConfigChange
      description: Cancels a pending configuration change on an Amazon OpenSearch Service domain.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: Name of the OpenSearch Service domain configuration request to cancel.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                DryRun:
                  $ref: "#/components/schemas/DryRun"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelDomainConfigChangeResponse"
  /2015-01-01/es/serviceSoftwareUpdate/cancel:
    post:
      operationId: CancelElasticsearchServiceSoftwareUpdate
      description: Cancels a scheduled service software update for an Amazon ES domain. You can only perform this operation before the AutomatedUpdateDate and when the UpdateStatus is in the PENDING_UPDATE state.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelElasticsearchServiceSoftwareUpdateResponse"
  /2015-01-01/es/domain:
    post:
      operationId: CreateElasticsearchDomain
      description: Creates a new Elasticsearch domain. For more information, see Creating Elasticsearch Domains in the Amazon Elasticsearch Service Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                ElasticsearchVersion:
                  $ref: "#/components/schemas/ElasticsearchVersionString"
                ElasticsearchClusterConfig:
                  $ref: "#/components/schemas/ElasticsearchClusterConfig"
                EBSOptions:
                  $ref: "#/components/schemas/EBSOptions"
                AccessPolicies:
                  $ref: "#/components/schemas/PolicyDocument"
                SnapshotOptions:
                  $ref: "#/components/schemas/SnapshotOptions"
                VPCOptions:
                  $ref: "#/components/schemas/VPCOptions"
                CognitoOptions:
                  $ref: "#/components/schemas/CognitoOptions"
                EncryptionAtRestOptions:
                  $ref: "#/components/schemas/EncryptionAtRestOptions"
                NodeToNodeEncryptionOptions:
                  $ref: "#/components/schemas/NodeToNodeEncryptionOptions"
                AdvancedOptions:
                  $ref: "#/components/schemas/AdvancedOptions"
                LogPublishingOptions:
                  $ref: "#/components/schemas/LogPublishingOptions"
                DomainEndpointOptions:
                  $ref: "#/components/schemas/DomainEndpointOptions"
                AdvancedSecurityOptions:
                  $ref: "#/components/schemas/AdvancedSecurityOptionsInput"
                AutoTuneOptions:
                  $ref: "#/components/schemas/AutoTuneOptionsInput"
                TagList:
                  $ref: "#/components/schemas/TagList"
                DeploymentStrategyOptions:
                  $ref: "#/components/schemas/DeploymentStrategyOptions"
                AutomatedSnapshotPauseOptions:
                  $ref: "#/components/schemas/AutomatedSnapshotPauseRequestOptions"
              required:
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateElasticsearchDomainResponse"
  /2015-01-01/es/ccs/outboundConnection:
    post:
      operationId: CreateOutboundCrossClusterSearchConnection
      description: Creates a new cross-cluster search connection from a source domain to a destination domain.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceDomainInfo:
                  $ref: "#/components/schemas/DomainInformation"
                DestinationDomainInfo:
                  $ref: "#/components/schemas/DomainInformation"
                ConnectionAlias:
                  $ref: "#/components/schemas/ConnectionAlias"
              required:
                - SourceDomainInfo
                - DestinationDomainInfo
                - ConnectionAlias
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutboundCrossClusterSearchConnectionResponse"
  /2015-01-01/packages:
    post:
      operationId: CreatePackage
      description: Create a package for use with Amazon ES domains.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PackageName:
                  $ref: "#/components/schemas/PackageName"
                PackageType:
                  $ref: "#/components/schemas/PackageType"
                PackageDescription:
                  $ref: "#/components/schemas/PackageDescription"
                PackageSource:
                  $ref: "#/components/schemas/PackageSource"
              required:
                - PackageName
                - PackageType
                - PackageSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackageResponse"
  /2015-01-01/es/vpcEndpoints:
    post:
      operationId: CreateVpcEndpoint
      description: Creates an Amazon OpenSearch Service-managed VPC endpoint.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainArn:
                  $ref: "#/components/schemas/DomainArn"
                VpcOptions:
                  $ref: "#/components/schemas/VPCOptions"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - DomainArn
                - VpcOptions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVpcEndpointResponse"
    get:
      operationId: ListVpcEndpoints
      description: Retrieves all Amazon OpenSearch Service-managed VPC endpoints in the current account and Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Identifier to allow retrieval of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVpcEndpointsResponse"
  /2015-01-01/es/domain/{domain_name}:
    delete:
      operationId: DeleteElasticsearchDomain
      description: Permanently deletes the specified Elasticsearch domain and all of its data. Once a domain is deleted, it cannot be recovered.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the Elasticsearch domain that you want to permanently delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteElasticsearchDomainResponse"
    get:
      operationId: DescribeElasticsearchDomain
      description: Returns domain configuration information about the specified Elasticsearch domain, including the domain ID, domain endpoint, and domain ARN.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the Elasticsearch domain for which you want information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeElasticsearchDomainResponse"
  /2015-01-01/es/role:
    delete:
      operationId: DeleteElasticsearchServiceRole
      description: Deletes the service-linked role that Elasticsearch Service uses to manage and maintain VPC domains. Role deletion will fail if any existing VPC domains use the role. You must delete any such Elasticsearch domains before deleting the role. See Deleting Elasticsearch Service Role in VPC Endpoints for Amazon Elasticsearch Service Domains.
      parameters: []
      responses:
        "200":
          description: Success
  /2015-01-01/es/ccs/inboundConnection/{connection_id}:
    delete:
      operationId: DeleteInboundCrossClusterSearchConnection
      description: Allows the destination domain owner to delete an existing inbound cross-cluster search connection.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CrossClusterSearchConnectionId"
          description: The id of the inbound connection that you want to permanently delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteInboundCrossClusterSearchConnectionResponse"
  /2015-01-01/es/ccs/outboundConnection/{connection_id}:
    delete:
      operationId: DeleteOutboundCrossClusterSearchConnection
      description: Allows the source domain owner to delete an existing outbound cross-cluster search connection.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CrossClusterSearchConnectionId"
          description: The id of the outbound connection that you want to permanently delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOutboundCrossClusterSearchConnectionResponse"
  /2015-01-01/packages/{package_id}:
    delete:
      operationId: DeletePackage
      description: Delete the package.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageID"
          description: Internal ID of the package that you want to delete. Use DescribePackages to find this value.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePackageResponse"
  /2015-01-01/es/vpcEndpoints/{vpc_endpoint_id}:
    delete:
      operationId: DeleteVpcEndpoint
      description: Deletes an Amazon OpenSearch Service-managed interface VPC endpoint.
      parameters:
        - name: vpc_endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/VpcEndpointId"
          description: The unique identifier of the endpoint to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVpcEndpointResponse"
  /2015-01-01/es/domain/{domain_name}/autoTunes:
    get:
      operationId: DescribeDomainAutoTunes
      description: Provides scheduled Auto-Tune action details for the Elasticsearch domain, such as Auto-Tune action type, description, severity, and scheduled date.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: Specifies the domain name for which you want Auto-Tune action details.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Set this value to limit the number of results returned. If not specified, defaults to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: NextToken is sent in case the earlier API call results contain the NextToken. It is used for pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDomainAutoTunesResponse"
  /2015-01-01/es/domain/{domain_name}/progress:
    get:
      operationId: DescribeDomainChangeProgress
      description: Returns information about the current blue/green deployment happening on a domain, including a change ID, status, and progress stages.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The domain you want to get the progress information about.
        - name: changeid
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GUID"
          description: The specific change ID for which you want to get progress information. This is an optional parameter. If omitted, the service returns information about the most recent configuration change.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDomainChangeProgressResponse"
  /2015-01-01/es/domain/{domain_name}/config:
    get:
      operationId: DescribeElasticsearchDomainConfig
      description: Provides cluster configuration information about the specified Elasticsearch domain, such as the state, creation date, update version, and update date for cluster options.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The Elasticsearch domain that you want to get information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeElasticsearchDomainConfigResponse"
    post:
      operationId: UpdateElasticsearchDomainConfig
      description: Modifies the cluster configuration of the specified Elasticsearch domain, setting as setting the instance type and the number of instances.
      parameters:
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: The name of the Elasticsearch domain that you are updating.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ElasticsearchClusterConfig:
                  $ref: "#/components/schemas/ElasticsearchClusterConfig"
                EBSOptions:
                  $ref: "#/components/schemas/EBSOptions"
                SnapshotOptions:
                  $ref: "#/components/schemas/SnapshotOptions"
                VPCOptions:
                  $ref: "#/components/schemas/VPCOptions"
                CognitoOptions:
                  $ref: "#/components/schemas/CognitoOptions"
                AdvancedOptions:
                  $ref: "#/components/schemas/AdvancedOptions"
                AccessPolicies:
                  $ref: "#/components/schemas/PolicyDocument"
                LogPublishingOptions:
                  $ref: "#/components/schemas/LogPublishingOptions"
                DomainEndpointOptions:
                  $ref: "#/components/schemas/DomainEndpointOptions"
                AdvancedSecurityOptions:
                  $ref: "#/components/schemas/AdvancedSecurityOptionsInput"
                NodeToNodeEncryptionOptions:
                  $ref: "#/components/schemas/NodeToNodeEncryptionOptions"
                EncryptionAtRestOptions:
                  $ref: "#/components/schemas/EncryptionAtRestOptions"
                AutoTuneOptions:
                  $ref: "#/components/schemas/AutoTuneOptions"
                DryRun:
                  $ref: "#/components/schemas/DryRun"
                DeploymentStrategyOptions:
                  $ref: "#/components/schemas/DeploymentStrategyOptions"
                AutomatedSnapshotPauseOptions:
                  $ref: "#/components/schemas/AutomatedSnapshotPauseRequestOptions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateElasticsearchDomainConfigResponse"
  /2015-01-01/es/domain-info:
    post:
      operationId: DescribeElasticsearchDomains
      description: Returns domain configuration information about the specified Elasticsearch domains, including the domain ID, domain endpoint, and domain ARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DomainNames:
                  $ref: "#/components/schemas/DomainNameList"
              required:
                - DomainNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeElasticsearchDomainsResponse"
  /2015-01-01/es/instanceTypeLimits/{elasticsearch_version}/{instance_type}:
    get:
      operationId: DescribeElasticsearchInstanceTypeLimits
      description: Describe Elasticsearch Limits for a given InstanceType and ElasticsearchVersion. When modifying existing Domain, specify the DomainName to know what Limits are supported for modifying.
      parameters:
        - name: domainName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DomainName"
          description: DomainName represents the name of the Domain that we are trying to modify. This should be present only if we are querying for Elasticsearch Limits for existing domain.
        - name: instance_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ESPartitionInstanceType"
          description: The instance type for an Elasticsearch cluster for which Elasticsearch Limits are needed.
        - name: elasticsearch_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ElasticsearchVersionString"
          description: Version of Elasticsearch for which Limits are needed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeElasticsearchInstanceTypeLimitsResponse"
  /2015-01-01/es/ccs/inboundConnection/search:
    post:
      operationId: DescribeInboundCrossClusterSearchConnections
      description: Lists all the inbound cross-cluster search connections for a destination domain.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/FilterList"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeInboundCrossClusterSearchConnectionsResponse"
  /2015-01-01/es/ccs/outboundConnection/search:
    post:
      operationId: DescribeOutboundCrossClusterSearchConnections
      description: Lists all the outbound cross-cluster search connections for a source domain.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/FilterList"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeOutboundCrossClusterSearchConnectionsResponse"
  /2015-01-01/packages/describe:
    post:
      operationId: DescribePackages
      description: Describes all packages available to Amazon ES. Includes options for filtering, limiting the number of results, and pagination.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Filters:
                  $ref: "#/components/schemas/DescribePackagesFilterList"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackagesResponse"
  /2015-01-01/es/reservedInstanceOfferings:
    get:
      operationId: DescribeReservedElasticsearchInstanceOfferings
      description: Lists available reserved Elasticsearch instance offerings.
      parameters:
        - name: offeringId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GUID"
          description: The offering identifier filter value. Use this parameter to show only the available offering that matches the specified reservation identifier.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Set this value to limit the number of results returned. If not specified, defaults to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: NextToken should be sent in case if earlier API call produced result containing NextToken. It is used for pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReservedElasticsearchInstanceOfferingsResponse"
  /2015-01-01/es/reservedInstances:
    get:
      operationId: DescribeReservedElasticsearchInstances
      description: Returns information about reserved Elasticsearch instances for this account.
      parameters:
        - name: reservationId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GUID"
          description: The reserved instance identifier filter value. Use this parameter to show only the reservation that matches the specified reserved Elasticsearch instance ID.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Set this value to limit the number of results returned. If not specified, defaults to 100.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: NextToken should be sent in case if earlier API call produced result containing NextToken. It is used for pagination.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReservedElasticsearchInstancesResponse"
  /2015-01-01/es/vpcEndpoints/describe:
    post:
      operationId: DescribeVpcEndpoints
      description: Describes one or more Amazon OpenSearch Service-managed VPC endpoints.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                VpcEndpointIds:
                  $ref: "#/components/schemas/VpcEndpointIdList"
              required:
                - VpcEndpointIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVpcEndpointsResponse"
  /2015-01-01/packages/dissociate/{package_id}/{domain_name}:
    post:
      operationId: DissociatePackage
      description: Dissociates a package from the Amazon ES domain.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageID"
          description: Internal ID of the package that you want to associate with a domain. Use DescribePackages to find this value.
        - name: domain_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainName"
          description: Name of the domain that you want to associate the package with.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DissociatePackageResponse"
  /2015-01-01/es/compatibleVersions:
    get:
      operationId: GetCompatibleElasticsearchVersions
      description: Returns a list of upgrade compatible Elastisearch versions. You can optionally pass a DomainName to get all upgrade compatible Elasticsearch versions for that specific domain.
      parameters:
        - name: domainName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DomainName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCompatibleElasticsearchVersionsResponse"
  /2015-01-01/packages/{package_id}/history:
    get:
      operationId: GetPackageVersionHistory
      description: Returns a list of versions of the package, along with their creation time and commit message.
      parameters:
        - name: package_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PackageID"
