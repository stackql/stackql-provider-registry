        failureReason:
          $ref: "#/components/schemas/ErrorMessage"
          description: The reason for failure if the artifact generation failed
    Uri:
      type: string
      minLength: 1
      pattern: .*(s3://|http(s*)://).+.*
    PostStreamArtifactGenerationStatus:
      type: string
      enum:
        - IN_PROGRESS
        - FAILED
        - COMPLETED
    ErrorMessage:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[\\s\\S]*"
    NonNullBoolean:
      type: boolean
    MedicalScribeStreamStatus:
      type: string
      enum:
        - IN_PROGRESS
        - PAUSED
        - FAILED
        - COMPLETED
    JobId:
      type: string
      minLength: 1
      maxLength: 36
    GetPatientInsightsJobResponse:
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/JobId"
        jobArn:
          $ref: "#/components/schemas/JobArn"
