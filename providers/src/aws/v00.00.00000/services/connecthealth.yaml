          $ref: "#/components/schemas/SessionId"
          description: The Session identifier
        domainId:
          $ref: "#/components/schemas/DomainId"
          description: The Domain identifier
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
          description: The Subscription identifier
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The Request identifier
        languageCode:
          $ref: "#/components/schemas/MedicalScribeLanguageCode"
          description: The Language Code for the audio in the session
        mediaSampleRateHertz:
          $ref: "#/components/schemas/MedicalScribeMediaSampleRateHertz"
          description: The sample rate of the input audio
        mediaEncoding:
          $ref: "#/components/schemas/MedicalScribeMediaEncoding"
          description: The encoding for the input audio
        responseStream:
          $ref: "#/components/schemas/MedicalScribeOutputStream"
          description: The output stream containing transcript events
    RequestId:
      type: string
      minLength: 1
      maxLength: 256
    MedicalScribeOutputStream:
      description: Output stream from Medical Scribe containing transcript events and errors
      type: object
      properties:
        transcriptEvent:
          $ref: "#/components/schemas/MedicalScribeTranscriptEvent"
        internalFailureException:
          $ref: "#/components/schemas/InternalServerException"
        validationException:
          $ref: "#/components/schemas/ValidationException"
    MedicalScribeTranscriptEvent:
      description: An event containing transcript data from the Medical Scribe stream
      type: object
      properties:
        transcriptSegment:
          $ref: "#/components/schemas/MedicalScribeTranscriptSegment"
          description: A segment of the transcript
    MedicalScribeTranscriptSegment:
      description: A segment of transcript text with timing and channel information
      type: object
      properties:
        segmentId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for this segment
        audioBeginOffset:
          $ref: "#/components/schemas/AudioOffset"
          description: The offset from audio start when the audio for this segment begins
        audioEndOffset:
          $ref: "#/components/schemas/AudioOffset"
          description: The offset from audio start when the audio for this segment ends
        isPartial:
          $ref: "#/components/schemas/NonNullBoolean"
          description: Indicates whether this is a partial or final transcript
        channelId:
          $ref: "#/components/schemas/String"
          description: The channel identifier for this segment
        content:
          $ref: "#/components/schemas/String"
          description: The transcript text content
    AudioOffset:
      type: number
      format: double
    InternalServerException:
      description: This error is thrown when a transient error causes our API to fail.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
    ValidationException:
      description: This error is thrown when the client supplies invalid input to the API.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
    StartPatientInsightsJobResponse:
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/JobArn"
        jobId:
          $ref: "#/components/schemas/JobId"
        creationTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: Date and time the patient insights job was submitted.
      required:
        - jobArn
        - jobId
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
