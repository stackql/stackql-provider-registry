          $ref: "#/components/schemas/PatientInsightsPatientContext"
        insightsContext:
          $ref: "#/components/schemas/InsightsContext"
        encounterContext:
          $ref: "#/components/schemas/PatientInsightsEncounterContext"
        userContext:
          $ref: "#/components/schemas/UserContext"
