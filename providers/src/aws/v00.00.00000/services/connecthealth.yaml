          $ref: "#/components/schemas/MedicalScribeSessionControlEvent"
        configurationEvent:
          $ref: "#/components/schemas/MedicalScribeConfigurationEvent"
    MedicalScribeAudioEvent:
      description: An event containing audio data for the Medical Scribe stream
