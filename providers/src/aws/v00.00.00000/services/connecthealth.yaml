        audioChunk:
          $ref: "#/components/schemas/AudioChunk"
          description: The audio data chunk
      required:
        - audioChunk
    AudioChunk:
      type: string
      format: byte
    MedicalScribeSessionControlEvent:
      description: An event for controlling the Medical Scribe session
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/MedicalScribeSessionControlEventType"
          description: The type of session control event
    MedicalScribeSessionControlEventType:
      type: string
      enum:
        - END_OF_SESSION
