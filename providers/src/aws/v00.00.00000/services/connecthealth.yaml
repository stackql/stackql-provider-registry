      description: Configuration for using a managed note template
      type: object
      properties:
        templateType:
          $ref: "#/components/schemas/ManagedNoteTemplate"
          description: The type of managed template to use
      required:
        - templateType
    CustomTemplate:
      description: Configuration for using a custom note template with specific instructions
      type: object
      properties:
        templateType:
          $ref: "#/components/schemas/CustomTemplateBase"
          description: The base template type to customize
        templateInstructions:
          $ref: "#/components/schemas/TemplateInstructions"
