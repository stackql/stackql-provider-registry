          $ref: "#/components/schemas/SensitiveMarkdownString"
          description: The instruction for generating this section
      required:
        - sectionHeader
        - sectionInstruction
    SensitiveAlphanumericString:
      type: string
      pattern: "[a-zA-Z0-9]+"
    SensitiveMarkdownString:
      type: string
      pattern: "[a-zA-Z0-9\\s\\*_\\-#\\[\\]\\(\\)\\.,:;!?'\"`<>~/]+"
