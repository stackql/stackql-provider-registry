        - jobStatus
        - patientContext
        - insightsContext
        - encounterContext
        - userContext
        - inputDataConfig
        - outputDataConfig
    JobArn:
      type: string
      minLength: 20
      maxLength: 200
      pattern: arn:aws[-a-z]*:health-agent:[-a-z0-9]+:[0-9]{12}:domain/[-a-zA-Z0-9-]+/patient-insights-job/[-a-zA-Z0-9_/.]+
    JobStatus:
      type: string
      enum:
        - SUBMITTED
        - IN_PROGRESS
        - FAILED
        - SUCCEEDED
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    InsightsOutput:
      description: Output of patient insights job
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/S3Uri"
      required:
        - uri
    NonEmptyString:
      type: string
      pattern: .*[\s\S]*\S[\s\S]*.*
    PatientInsightsPatientContext:
      description: Details for a patient
      type: object
      properties:
        patientId:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: Unique identifier of the patient
        dateOfBirth:
          $ref: "#/components/schemas/SensitiveIsoDateString"
          description: Date of birth of the patient.
        pronouns:
          $ref: "#/components/schemas/Pronouns"
          description: Pronouns preferred by the patient.
      required:
        - patientId
    SensitiveNonEmptyString:
      type: string
      pattern: .*[\s\S]*\S[\s\S]*.*
    SensitiveIsoDateString:
      type: string
      pattern: \d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])
    Pronouns:
      type: string
      enum:
        - HE_HIM
        - SHE_HER
        - THEY_THEM
    InsightsContext:
      description: Details for insights that user wants to generate
      type: object
      properties:
        insightsType:
          $ref: "#/components/schemas/InsightsType"
      required:
        - insightsType
    InsightsType:
      type: string
      enum:
        - PRE_VISIT
    PatientInsightsEncounterContext:
      description: Details for an encounter
      type: object
      properties:
        encounterReason:
          $ref: "#/components/schemas/PatientInsightsEncounterContextEncounterReasonString"
          description: Chief complaint for the visit
      required:
        - encounterReason
    PatientInsightsEncounterContextEncounterReasonString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9 .,-]+"
    UserContext:
