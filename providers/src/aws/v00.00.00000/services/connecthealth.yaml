        specialty:
          $ref: "#/components/schemas/Specialty"
      required:
        - role
        - userId
    ProviderRole:
      type: string
      enum:
        - CLINICIAN
    Specialty:
      type: string
      enum:
        - PRIMARY_CARE
    InputDataConfig:
      description: Configuration details for input patient data
      type: object
      properties:
        fhirServer:
          $ref: "#/components/schemas/FHIRServer"
          description: FHIR server configuration to retrieve patient data.
        s3Sources:
          $ref: "#/components/schemas/S3Sources"
          description: List of S3 sources containing patient data.
    FHIRServer:
      description: FHIR server configuration for input data source
      type: object
      properties:
        fhirEndpoint:
          $ref: "#/components/schemas/FHIRServerFhirEndpointString"
          description: FHIR server endpoint URL for accessing patient data.
        oauthToken:
          $ref: "#/components/schemas/SensitiveNonEmptyString"
          description: OAuth token for authenticating with the FHIR server.
      required:
        - fhirEndpoint
    FHIRServerFhirEndpointString:
      type: string
      pattern: https?://[a-zA-Z0-9\-._~:/?#\[\]@!$&'()*+,;=%]+
    S3Sources:
      type: array
      items:
        $ref: "#/components/schemas/S3Source"
    S3Source:
      description: S3 uri for input data source
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 URI.
      required:
        - uri
    OutputDataConfig:
      description: Configuration details for insights output.
      type: object
      properties:
        s3OutputPath:
          $ref: "#/components/schemas/S3Uri"
          description: S3 URI where the insights output will be stored.
      required:
        - s3OutputPath
    GetSubscriptionOutput:
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/SubscriptionDescription"
    ListDomainsInputMaxResultsInteger:
      type: integer
