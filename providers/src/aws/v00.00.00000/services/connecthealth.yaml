        transcriptResult:
          $ref: "#/components/schemas/ArtifactDetails"
          description: Details about the generated transcript
        afterVisitSummaryResult:
          $ref: "#/components/schemas/ArtifactDetails"
          description: Details about the generated after visit summary
    ArtifactDetails:
