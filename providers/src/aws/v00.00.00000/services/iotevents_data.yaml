openapi: 3.0.0
info:
  version: "2018-10-23"
  title: AWS IoT Events Data
  description: AWS IoT Events Data
  x-serviceName: ioteventsdata
  x-serviceAlias: iotevents_data
  x-protocol: rest-json
  x-apiVersion: "2018-10-23"
  x-endpointPrefix: data.iotevents
servers:
  - url: https://data.iotevents.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotevents-data
paths:
  /alarms/acknowledge:
    post:
      operationId: BatchAcknowledgeAlarm
      description: Acknowledges one or more alarms. The alarms change to the ACKNOWLEDGED state after you acknowledge them.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                acknowledgeActionRequests:
                  $ref: "#/components/schemas/AcknowledgeAlarmActionRequests"
              required:
                - acknowledgeActionRequests
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAcknowledgeAlarmResponse"
  /detectors/delete:
    post:
      operationId: BatchDeleteDetector
      description: Deletes one or more detectors that were created. When a detector is deleted, its state will be cleared and the detector will be removed from the list of detectors. The deleted detector will no longer appear if referenced in the ListDetectors API call.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                detectors:
                  $ref: "#/components/schemas/DeleteDetectorRequests"
              required:
                - detectors
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteDetectorResponse"
  /alarms/disable:
    post:
      operationId: BatchDisableAlarm
      description: Disables one or more alarms. The alarms change to the DISABLED state after you disable them.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                disableActionRequests:
                  $ref: "#/components/schemas/DisableAlarmActionRequests"
              required:
                - disableActionRequests
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisableAlarmResponse"
  /alarms/enable:
    post:
      operationId: BatchEnableAlarm
      description: Enables one or more alarms. The alarms change to the NORMAL state after you enable them.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enableActionRequests:
                  $ref: "#/components/schemas/EnableAlarmActionRequests"
              required:
                - enableActionRequests
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEnableAlarmResponse"
  /inputs/messages:
    post:
      operationId: BatchPutMessage
      description: Sends a set of messages to the IoT Events system. Each message payload is transformed into the input you specify ("inputName") and ingested into any detectors that monitor that input. If multiple messages are sent, the order in which the messages are processed isn't guaranteed. To guarantee ordering, you must send messages one at a time and wait for a successful response.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  $ref: "#/components/schemas/Messages"
              required:
                - messages
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutMessageResponse"
  /alarms/reset:
    post:
      operationId: BatchResetAlarm
      description: Resets one or more alarms. The alarms return to the NORMAL state after you reset them.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resetActionRequests:
                  $ref: "#/components/schemas/ResetAlarmActionRequests"
              required:
                - resetActionRequests
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResetAlarmResponse"
  /alarms/snooze:
    post:
      operationId: BatchSnoozeAlarm
      description: Changes one or more alarms to the snooze mode. The alarms change to the SNOOZE_DISABLED state after you set them to the snooze mode.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                snoozeActionRequests:
                  $ref: "#/components/schemas/SnoozeAlarmActionRequests"
              required:
                - snoozeActionRequests
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSnoozeAlarmResponse"
  /detectors:
    post:
      operationId: BatchUpdateDetector
      description: Updates the state, variable values, and timer settings of one or more detectors (instances) of a specified detector model.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                detectors:
                  $ref: "#/components/schemas/UpdateDetectorRequests"
              required:
                - detectors
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateDetectorResponse"
  /alarms/{alarm_model_name}/keyValues/:
    get:
      operationId: DescribeAlarm
      description: Retrieves information about an alarm.
      parameters:
        - name: alarm_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        - name: keyValue
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAlarmResponse"
  /detectors/{detector_model_name}/keyValues/:
    get:
      operationId: DescribeDetector
      description: Returns information about the specified detector (instance).
      parameters:
        - name: detector_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model whose detectors (instances) you want information about.
        - name: keyValue
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/KeyValue"
          description: A filter used to limit results to detectors (instances) created because of the given key ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDetectorResponse"
  /alarms/{alarm_model_name}:
    get:
      operationId: ListAlarms
      description: Lists one or more alarms. The operation returns only the metadata associated with each alarm.
      parameters:
        - name: alarm_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlarmsResponse"
  /detectors/{detector_model_name}:
    get:
      operationId: ListDetectors
      description: Lists detectors (the instances of a detector model).
      parameters:
        - name: detector_model_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model whose detectors (instances) are listed.
        - name: stateName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/StateName"
          description: A filter that limits results to those detectors (instances) in the given state.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that you can use to return the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned per request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDetectorsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AcknowledgeAlarmActionRequests:
      type: array
      items:
        $ref: "#/components/schemas/AcknowledgeAlarmActionRequest"
    AcknowledgeAlarmActionRequest:
      description: Information needed to acknowledge the alarm.
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The request ID. Each ID must be unique within each batch.
        alarmModelName:
          $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
        note:
          $ref: "#/components/schemas/Note"
          description: The note that you can leave when you acknowledge the alarm.
      required:
        - requestId
        - alarmModelName
    RequestId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9_-]+$
    AlarmModelName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9_-]+$
    KeyValue:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9\-_:]+$
    Note:
      type: string
      maxLength: 256
    BatchAcknowledgeAlarmResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/BatchAlarmActionErrorEntries"
          description: A list of errors associated with the request, or null if there are no errors. Each error entry contains an entry ID that helps you identify the entry that failed.
    BatchAlarmActionErrorEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchAlarmActionErrorEntry"
    BatchAlarmActionErrorEntry:
      description: "Contains error messages associated with one of the following requests: BatchAcknowledgeAlarm BatchDisableAlarm BatchEnableAlarm BatchResetAlarm BatchSnoozeAlarm"
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The request ID. Each ID must be unique within each batch.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that describes the error.
    ErrorCode:
      type: string
      enum:
        - ResourceNotFoundException
        - InvalidRequestException
        - InternalFailureException
        - ServiceUnavailableException
        - ThrottlingException
    ErrorMessage:
      type: string
    DeleteDetectorRequests:
      type: array
      items:
        $ref: "#/components/schemas/DeleteDetectorRequest"
    DeleteDetectorRequest:
      description: Information used to delete the detector model.
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The ID to assign to the DeleteDetectorRequest. Each "messageId" must be unique within each batch sent.
        detectorModelName:
          $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model that was used to create the detector instance.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used to identify the detector.
      required:
        - messageId
        - detectorModelName
    MessageId:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9_-]+$
    DetectorModelName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9_-]+$
    BatchDeleteDetectorResponse:
      type: object
      properties:
        batchDeleteDetectorErrorEntries:
          $ref: "#/components/schemas/BatchDeleteDetectorErrorEntries"
          description: A list of errors associated with the request, or an empty array ([]) if there are no errors. Each error entry contains a messageId that helps you identify the entry that failed.
    BatchDeleteDetectorErrorEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteDetectorErrorEntry"
    BatchDeleteDetectorErrorEntry:
      description: Contains error messages associated with the deletion request.
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The ID of the message that caused the error. (See the value of the "messageId" in the detectors object of the DeleteDetectorRequest.)
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that describes the error.
    DisableAlarmActionRequests:
      type: array
      items:
        $ref: "#/components/schemas/DisableAlarmActionRequest"
    DisableAlarmActionRequest:
      description: Information used to disable the alarm.
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The request ID. Each ID must be unique within each batch.
        alarmModelName:
          $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
        note:
          $ref: "#/components/schemas/Note"
          description: The note that you can leave when you disable the alarm.
      required:
        - requestId
        - alarmModelName
    BatchDisableAlarmResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/BatchAlarmActionErrorEntries"
          description: A list of errors associated with the request, or null if there are no errors. Each error entry contains an entry ID that helps you identify the entry that failed.
    EnableAlarmActionRequests:
      type: array
      items:
        $ref: "#/components/schemas/EnableAlarmActionRequest"
    EnableAlarmActionRequest:
      description: Information needed to enable the alarm.
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The request ID. Each ID must be unique within each batch.
        alarmModelName:
          $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
        note:
          $ref: "#/components/schemas/Note"
          description: The note that you can leave when you enable the alarm.
      required:
        - requestId
        - alarmModelName
    BatchEnableAlarmResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/BatchAlarmActionErrorEntries"
          description: A list of errors associated with the request, or null if there are no errors. Each error entry contains an entry ID that helps you identify the entry that failed.
    Messages:
      type: array
      items:
        $ref: "#/components/schemas/Message"
    Message:
      description: Information about a message.
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The ID to assign to the message. Within each batch sent, each "messageId" must be unique.
        inputName:
          $ref: "#/components/schemas/EphemeralInputName"
          description: The name of the input into which the message payload is transformed.
        payload:
          $ref: "#/components/schemas/Payload"
          description: The payload of the message. This can be a JSON string or a Base-64-encoded string representing binary data (in which case you must decode it).
        timestamp:
          $ref: "#/components/schemas/TimestampValue"
          description: The timestamp associated with the message.
      required:
        - messageId
        - inputName
        - payload
    EphemeralInputName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9_.-]*$
    Payload:
      type: string
      format: byte
    TimestampValue:
      description: Contains information about a timestamp.
      type: object
      properties:
        timeInMillis:
          $ref: "#/components/schemas/EpochMilliTimestamp"
          description: The value of the timestamp, in the Unix epoch format.
    EpochMilliTimestamp:
      type: integer
      format: int64
      minimum: 1
      maximum: 9223372036854776000
    BatchPutMessageResponse:
      type: object
      properties:
        BatchPutMessageErrorEntries:
          $ref: "#/components/schemas/BatchPutMessageErrorEntries"
          description: A list of any errors encountered when sending the messages.
    BatchPutMessageErrorEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutMessageErrorEntry"
    BatchPutMessageErrorEntry:
      description: Contains information about the errors encountered.
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The ID of the message that caused the error. (See the value corresponding to the "messageId" key in the "message" object.)
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that describes the error.
    ResetAlarmActionRequests:
      type: array
      items:
        $ref: "#/components/schemas/ResetAlarmActionRequest"
    ResetAlarmActionRequest:
      description: Information needed to reset the alarm.
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The request ID. Each ID must be unique within each batch.
        alarmModelName:
          $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
        note:
          $ref: "#/components/schemas/Note"
          description: The note that you can leave when you reset the alarm.
      required:
        - requestId
        - alarmModelName
    BatchResetAlarmResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/BatchAlarmActionErrorEntries"
          description: A list of errors associated with the request, or null if there are no errors. Each error entry contains an entry ID that helps you identify the entry that failed.
    SnoozeAlarmActionRequests:
      type: array
      items:
        $ref: "#/components/schemas/SnoozeAlarmActionRequest"
    SnoozeAlarmActionRequest:
      description: Information needed to snooze the alarm.
      type: object
      properties:
        requestId:
          $ref: "#/components/schemas/RequestId"
          description: The request ID. Each ID must be unique within each batch.
        alarmModelName:
          $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
        note:
          $ref: "#/components/schemas/Note"
          description: The note that you can leave when you snooze the alarm.
        snoozeDuration:
          $ref: "#/components/schemas/SnoozeDuration"
          description: The snooze time in seconds. The alarm automatically changes to the NORMAL state after this duration.
      required:
        - requestId
        - alarmModelName
        - snoozeDuration
    SnoozeDuration:
      type: integer
    BatchSnoozeAlarmResponse:
      type: object
      properties:
        errorEntries:
          $ref: "#/components/schemas/BatchAlarmActionErrorEntries"
          description: A list of errors associated with the request, or null if there are no errors. Each error entry contains an entry ID that helps you identify the entry that failed.
    UpdateDetectorRequests:
      type: array
      items:
        $ref: "#/components/schemas/UpdateDetectorRequest"
    UpdateDetectorRequest:
      description: Information used to update the detector (instance).
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The ID to assign to the detector update "message". Each "messageId" must be unique within each batch sent.
        detectorModelName:
          $ref: "#/components/schemas/DetectorModelName"
          description: The name of the detector model that created the detectors (instances).
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the input key attribute (identifying the device or system) that caused the creation of this detector (instance).
        state:
          $ref: "#/components/schemas/DetectorStateDefinition"
          description: The new state, variable values, and timer settings of the detector (instance).
      required:
        - messageId
        - detectorModelName
        - state
    DetectorStateDefinition:
      description: The new state, variable values, and timer settings of the detector (instance).
      type: object
      properties:
        stateName:
          $ref: "#/components/schemas/StateName"
          description: The name of the new state of the detector (instance).
        variables:
          $ref: "#/components/schemas/VariableDefinitions"
          description: The new values of the detector's variables. Any variable whose value isn't specified is cleared.
        timers:
          $ref: "#/components/schemas/TimerDefinitions"
          description: The new values of the detector's timers. Any timer whose value isn't specified is cleared, and its timeout event won't occur.
      required:
        - stateName
        - variables
        - timers
    StateName:
      type: string
      minLength: 1
      maxLength: 128
    VariableDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/VariableDefinition"
    VariableDefinition:
      description: The new value of the variable.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/VariableName"
          description: The name of the variable.
        value:
          $ref: "#/components/schemas/VariableValue"
          description: The new value of the variable.
      required:
        - name
        - value
    VariableName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
    VariableValue:
      type: string
      minLength: 1
      maxLength: 1024
    TimerDefinitions:
      type: array
      items:
        $ref: "#/components/schemas/TimerDefinition"
    TimerDefinition:
      description: The new setting of a timer.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TimerName"
          description: The name of the timer.
        seconds:
          $ref: "#/components/schemas/Seconds"
          description: The new setting of the timer (the number of seconds before the timer elapses).
      required:
        - name
        - seconds
    TimerName:
      type: string
      minLength: 1
      maxLength: 128
    Seconds:
      type: integer
    BatchUpdateDetectorResponse:
      type: object
      properties:
        batchUpdateDetectorErrorEntries:
          $ref: "#/components/schemas/BatchUpdateDetectorErrorEntries"
          description: A list of those detector updates that resulted in errors. (If an error is listed here, the specific update did not occur.)
    BatchUpdateDetectorErrorEntries:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateDetectorErrorEntry"
    BatchUpdateDetectorErrorEntry:
      description: Information about the error that occurred when attempting to update a detector.
      type: object
      properties:
        messageId:
          $ref: "#/components/schemas/MessageId"
          description: The "messageId" of the update request that caused the error. (The value of the "messageId" in the update request "Detector" object.)
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The error code.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: A message that describes the error.
    DescribeAlarmResponse:
      type: object
      properties:
        alarm:
          $ref: "#/components/schemas/Alarm"
          description: Contains information about an alarm.
    Alarm:
      description: Contains information about an alarm.
      type: object
      properties:
        alarmModelName:
          $ref: "#/components/schemas/AlarmModelName"
          description: The name of the alarm model.
        alarmModelVersion:
          $ref: "#/components/schemas/AlarmModelVersion"
          description: The version of the alarm model.
        keyValue:
          $ref: "#/components/schemas/KeyValue"
          description: The value of the key used as a filter to select only the alarms associated with the key.
        alarmState:
          $ref: "#/components/schemas/AlarmState"
          description: Contains information about the current state of the alarm.
        severity:
          $ref: "#/components/schemas/Severity"
          description: A non-negative integer that reflects the severity level of the alarm.
        creationTime:
          $ref: "#/components/schemas/Timestamp"
