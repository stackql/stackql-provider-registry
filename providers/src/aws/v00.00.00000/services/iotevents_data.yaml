      type: string
      minLength: 1
      maxLength: 128
    AlarmState:
      description: Contains information about the current state of the alarm.
      type: object
      properties:
        stateName:
          $ref: "#/components/schemas/AlarmStateName"
          description: "The name of the alarm state. The state name can be one of the following values: DISABLED - When the alarm is in the DISABLED state, it isn't ready to evaluate data. To enable the alarm, you must change the alarm to the NORMAL state. NORMAL - When the alarm is in the NORMAL state, it's ready to evaluate data. ACTIVE - If the alarm is in the ACTIVE state, the alarm is invoked. ACKNOWLEDGED - When the alarm is in the ACKNOWLEDGED state, the alarm was invoked and you acknowledged the alarm. SNOOZE_DISABLED - When the alarm is in the SNOOZE_DISABLED state, the alarm is disabled for a specified period of time. After the snooze time, the alarm automatically changes to the NORMAL state. LATCHED - When the alarm is in the LATCHED state, the alarm was invoked. However, the data that the alarm is currently evaluating is within the specified range. To change the alarm to the NORMAL state, you must acknowledge the alarm."
        ruleEvaluation:
          $ref: "#/components/schemas/RuleEvaluation"
          description: Information needed to evaluate data.
        customerAction:
          $ref: "#/components/schemas/CustomerAction"
          description: Contains information about the action that you can take to respond to the alarm.
        systemEvent:
          $ref: "#/components/schemas/SystemEvent"
          description: Contains information about alarm state changes.
    AlarmStateName:
      type: string
      enum:
        - DISABLED
        - NORMAL
        - ACTIVE
        - ACKNOWLEDGED
        - SNOOZE_DISABLED
        - LATCHED
    RuleEvaluation:
      description: Information needed to evaluate data.
      type: object
      properties:
        simpleRuleEvaluation:
          $ref: "#/components/schemas/SimpleRuleEvaluation"
          description: Information needed to compare two values with a comparison operator.
    SimpleRuleEvaluation:
      description: Information needed to compare two values with a comparison operator.
      type: object
      properties:
        inputPropertyValue:
          $ref: "#/components/schemas/InputPropertyValue"
          description: The value of the input property, on the left side of the comparison operator.
        operator:
          $ref: "#/components/schemas/ComparisonOperator"
          description: The comparison operator.
        thresholdValue:
          $ref: "#/components/schemas/ThresholdValue"
          description: The threshold value, on the right side of the comparison operator.
    InputPropertyValue:
      type: string
    ComparisonOperator:
      type: string
      enum:
        - GREATER
        - GREATER_OR_EQUAL
        - LESS
        - LESS_OR_EQUAL
        - EQUAL
        - NOT_EQUAL
    ThresholdValue:
      type: string
    CustomerAction:
      description: Contains information about the action that you can take to respond to the alarm.
      type: object
      properties:
        actionName:
          $ref: "#/components/schemas/CustomerActionName"
          description: "The name of the action. The action name can be one of the following values: SNOOZE - When you snooze the alarm, the alarm state changes to SNOOZE_DISABLED. ENABLE - When you enable the alarm, the alarm state changes to NORMAL. DISABLE - When you disable the alarm, the alarm state changes to DISABLED. ACKNOWLEDGE - When you acknowledge the alarm, the alarm state changes to ACKNOWLEDGED. RESET - When you reset the alarm, the alarm state changes to NORMAL. For more information, see the AlarmState API."
        snoozeActionConfiguration:
          $ref: "#/components/schemas/SnoozeActionConfiguration"
          description: Contains the configuration information of a snooze action.
        enableActionConfiguration:
          $ref: "#/components/schemas/EnableActionConfiguration"
          description: Contains the configuration information of an enable action.
        disableActionConfiguration:
          $ref: "#/components/schemas/DisableActionConfiguration"
          description: Contains the configuration information of a disable action.
        acknowledgeActionConfiguration:
          $ref: "#/components/schemas/AcknowledgeActionConfiguration"
          description: Contains the configuration information of an acknowledge action.
        resetActionConfiguration:
          $ref: "#/components/schemas/ResetActionConfiguration"
          description: Contains the configuration information of a reset action.
    CustomerActionName:
      type: string
      enum:
        - SNOOZE
        - ENABLE
        - DISABLE
        - ACKNOWLEDGE
        - RESET
    SnoozeActionConfiguration:
      description: Contains the configuration information of a snooze action.
      type: object
      properties:
