openapi: 3.0.0
info:
  version: "2024-03-18"
  title: Partner Central Channel API
  description: Partner Central Channel API
  x-serviceName: partnercentral-channel
  x-serviceAlias: partnercentral_channel
  x-protocol: json
  x-apiVersion: "2024-03-18"
  x-endpointPrefix: partnercentral-channel
  x-targetPrefix: PartnerCentralChannel
  x-jsonVersion: "1.0"
servers:
  - url: https://partnercentral-channel.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for partnercentral-channel
paths:
  /AcceptChannelHandshake:
    post:
      operationId: AcceptChannelHandshake
      description: Accepts a pending channel handshake request from another AWS account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.AcceptChannelHandshake
            default: PartnerCentralChannel.AcceptChannelHandshake
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the handshake request.
                identifier:
                  $ref: "#/components/schemas/ChannelHandshakeIdentifier"
                  description: The unique identifier of the channel handshake to accept.
              required:
                - catalog
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptChannelHandshakeResponse"
  /CancelChannelHandshake:
    post:
      operationId: CancelChannelHandshake
      description: Cancels a pending channel handshake request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.CancelChannelHandshake
            default: PartnerCentralChannel.CancelChannelHandshake
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the handshake request.
                identifier:
                  $ref: "#/components/schemas/ChannelHandshakeIdentifier"
                  description: The unique identifier of the channel handshake to cancel.
              required:
                - catalog
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelChannelHandshakeResponse"
  /CreateChannelHandshake:
    post:
      operationId: CreateChannelHandshake
      description: Creates a new channel handshake request to establish a partnership with another AWS account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.CreateChannelHandshake
            default: PartnerCentralChannel.CreateChannelHandshake
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                handshakeType:
                  $ref: "#/components/schemas/HandshakeType"
                  description: The type of handshake to create (e.g., start service period, revoke service period).
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the handshake request.
                associatedResourceIdentifier:
                  $ref: "#/components/schemas/AssociatedResourceIdentifier"
                  description: The identifier of the resource associated with this handshake.
                payload:
                  $ref: "#/components/schemas/ChannelHandshakePayload"
                  description: The payload containing specific details for the handshake type.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Key-value pairs to associate with the channel handshake.
              required:
                - handshakeType
                - catalog
                - associatedResourceIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelHandshakeResponse"
  /CreateProgramManagementAccount:
    post:
      operationId: CreateProgramManagementAccount
      description: Creates a new program management account for managing partner relationships.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.CreateProgramManagementAccount
            default: PartnerCentralChannel.CreateProgramManagementAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the program management account.
                program:
                  $ref: "#/components/schemas/Program"
                  description: The program type for the management account.
                displayName:
                  $ref: "#/components/schemas/ProgramManagementAccountDisplayName"
                  description: A human-readable name for the program management account.
                accountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The AWS account ID to associate with the program management account.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Key-value pairs to associate with the program management account.
              required:
                - catalog
                - program
                - displayName
                - accountId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProgramManagementAccountResponse"
  /CreateRelationship:
    post:
      operationId: CreateRelationship
      description: Creates a new partner relationship between accounts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.CreateRelationship
            default: PartnerCentralChannel.CreateRelationship
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the relationship.
                associationType:
                  $ref: "#/components/schemas/AssociationType"
                  description: The type of association for the relationship (e.g., reseller, distributor).
                programManagementAccountIdentifier:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifier"
                  description: The identifier of the program management account for this relationship.
                associatedAccountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The AWS account ID to associate in this relationship.
                displayName:
                  $ref: "#/components/schemas/RelationshipDisplayName"
                  description: A human-readable name for the relationship.
                resaleAccountModel:
                  $ref: "#/components/schemas/ResaleAccountModel"
                  description: The resale account model for the relationship.
                sector:
                  $ref: "#/components/schemas/Sector"
                  description: The business sector for the relationship.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Key-value pairs to associate with the relationship.
                requestedSupportPlan:
                  $ref: "#/components/schemas/SupportPlan"
                  description: The support plan requested for this relationship.
              required:
                - catalog
                - associationType
                - programManagementAccountIdentifier
                - associatedAccountId
                - displayName
                - sector
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelationshipResponse"
  /DeleteProgramManagementAccount:
    post:
      operationId: DeleteProgramManagementAccount
      description: Deletes a program management account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.DeleteProgramManagementAccount
            default: PartnerCentralChannel.DeleteProgramManagementAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the program management account.
                identifier:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifier"
                  description: The unique identifier of the program management account to delete.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - catalog
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProgramManagementAccountResponse"
  /DeleteRelationship:
    post:
      operationId: DeleteRelationship
      description: Deletes a partner relationship.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.DeleteRelationship
            default: PartnerCentralChannel.DeleteRelationship
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the relationship.
                identifier:
                  $ref: "#/components/schemas/RelationshipIdentifier"
                  description: The unique identifier of the relationship to delete.
                programManagementAccountIdentifier:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifier"
                  description: The identifier of the program management account associated with the relationship.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier to ensure idempotency of the request.
              required:
                - catalog
                - identifier
                - programManagementAccountIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRelationshipResponse"
  /GetRelationship:
    post:
      operationId: GetRelationship
      description: Retrieves details of a specific partner relationship.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.GetRelationship
            default: PartnerCentralChannel.GetRelationship
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the relationship.
                programManagementAccountIdentifier:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifier"
                  description: The identifier of the program management account associated with the relationship.
                identifier:
                  $ref: "#/components/schemas/RelationshipIdentifier"
                  description: The unique identifier of the relationship to retrieve.
              required:
                - catalog
                - programManagementAccountIdentifier
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRelationshipResponse"
  /ListChannelHandshakes:
    post:
      operationId: ListChannelHandshakes
      description: Lists channel handshakes based on specified criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.ListChannelHandshakes
            default: PartnerCentralChannel.ListChannelHandshakes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                handshakeType:
                  $ref: "#/components/schemas/HandshakeType"
                  description: Filter results by handshake type.
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier to filter handshakes.
                participantType:
                  $ref: "#/components/schemas/ParticipantType"
                  description: Filter by participant type (sender or receiver).
                maxResults:
                  $ref: "#/components/schemas/ListChannelHandshakesRequestMaxResultsInteger"
                  description: The maximum number of results to return in a single call.
                statuses:
                  $ref: "#/components/schemas/HandshakeStatusList"
                  description: Filter results by handshake status.
                associatedResourceIdentifiers:
                  $ref: "#/components/schemas/AssociatedResourceIdentifierList"
                  description: Filter by associated resource identifiers.
                handshakeTypeFilters:
                  $ref: "#/components/schemas/ListChannelHandshakesTypeFilters"
                  description: Type-specific filters for handshakes.
                handshakeTypeSort:
                  $ref: "#/components/schemas/ListChannelHandshakesTypeSort"
                  description: Type-specific sorting options for handshakes.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Token for retrieving the next page of results.
              required:
                - handshakeType
                - catalog
                - participantType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelHandshakesResponse"
  /ListProgramManagementAccounts:
    post:
      operationId: ListProgramManagementAccounts
      description: Lists program management accounts based on specified criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.ListProgramManagementAccounts
            default: PartnerCentralChannel.ListProgramManagementAccounts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier to filter accounts.
                maxResults:
                  $ref: "#/components/schemas/ListProgramManagementAccountsRequestMaxResultsInteger"
                  description: The maximum number of results to return in a single call.
                displayNames:
                  $ref: "#/components/schemas/ProgramManagementAccountDisplayNameList"
                  description: Filter by display names.
                programs:
                  $ref: "#/components/schemas/ProgramList"
                  description: Filter by program types.
                accountIds:
                  $ref: "#/components/schemas/AccountIdList"
                  description: Filter by AWS account IDs.
                statuses:
                  $ref: "#/components/schemas/ProgramManagementAccountStatusList"
                  description: Filter by program management account statuses.
                sort:
                  $ref: "#/components/schemas/ListProgramManagementAccountsSortBase"
                  description: Sorting options for the results.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Token for retrieving the next page of results.
              required:
                - catalog
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProgramManagementAccountsResponse"
  /ListRelationships:
    post:
      operationId: ListRelationships
      description: Lists partner relationships based on specified criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.ListRelationships
            default: PartnerCentralChannel.ListRelationships
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier to filter relationships.
                maxResults:
                  $ref: "#/components/schemas/ListRelationshipsRequestMaxResultsInteger"
                  description: The maximum number of results to return in a single call.
                associatedAccountIds:
                  $ref: "#/components/schemas/AccountIdList"
                  description: Filter by associated AWS account IDs.
                associationTypes:
                  $ref: "#/components/schemas/AssociationTypeList"
                  description: Filter by association types.
                displayNames:
                  $ref: "#/components/schemas/RelationshipDisplayNameList"
                  description: Filter by display names.
                programManagementAccountIdentifiers:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifierList"
                  description: Filter by program management account identifiers.
                sort:
                  $ref: "#/components/schemas/ListRelationshipsSortBase"
                  description: Sorting options for the results.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Token for retrieving the next page of results.
              required:
                - catalog
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRelationshipsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists tags associated with a specific resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.ListTagsForResource
            default: PartnerCentralChannel.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/TaggableArn"
                  description: The Amazon Resource Name (ARN) of the resource to list tags for.
              required:
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /RejectChannelHandshake:
    post:
      operationId: RejectChannelHandshake
      description: Rejects a pending channel handshake request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.RejectChannelHandshake
            default: PartnerCentralChannel.RejectChannelHandshake
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the handshake request.
                identifier:
                  $ref: "#/components/schemas/ChannelHandshakeIdentifier"
                  description: The unique identifier of the channel handshake to reject.
              required:
                - catalog
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectChannelHandshakeResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or updates tags for a specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.TagResource
            default: PartnerCentralChannel.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/TaggableArn"
                  description: The Amazon Resource Name (ARN) of the resource to tag.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: Key-value pairs to associate with the resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from a specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.UntagResource
            default: PartnerCentralChannel.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/TaggableArn"
                  description: The Amazon Resource Name (ARN) of the resource to remove tags from.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The keys of the tags to remove from the resource.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateProgramManagementAccount:
    post:
      operationId: UpdateProgramManagementAccount
      description: Updates the properties of a program management account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.UpdateProgramManagementAccount
            default: PartnerCentralChannel.UpdateProgramManagementAccount
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the program management account.
                identifier:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifier"
                  description: The unique identifier of the program management account to update.
                revision:
                  $ref: "#/components/schemas/Revision"
                  description: The current revision number of the program management account.
                displayName:
                  $ref: "#/components/schemas/ProgramManagementAccountDisplayName"
                  description: The new display name for the program management account.
              required:
                - catalog
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProgramManagementAccountResponse"
  /UpdateRelationship:
    post:
      operationId: UpdateRelationship
      description: Updates the properties of a partner relationship.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralChannel.UpdateRelationship
            default: PartnerCentralChannel.UpdateRelationship
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the relationship.
                identifier:
                  $ref: "#/components/schemas/RelationshipIdentifier"
                  description: The unique identifier of the relationship to update.
                programManagementAccountIdentifier:
                  $ref: "#/components/schemas/ProgramManagementAccountIdentifier"
                  description: The identifier of the program management account associated with the relationship.
                revision:
                  $ref: "#/components/schemas/Revision"
                  description: The current revision number of the relationship.
                displayName:
                  $ref: "#/components/schemas/RelationshipDisplayName"
                  description: The new display name for the relationship.
                requestedSupportPlan:
                  $ref: "#/components/schemas/SupportPlan"
                  description: The updated support plan for the relationship.
              required:
                - catalog
                - identifier
                - programManagementAccountIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRelationshipResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Catalog:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z]*"
    ChannelHandshakeIdentifier:
      type: string
      minLength: 16
      maxLength: 1011
      pattern: (arn:[a-z-]+:partnercentral:[a-z0-9-]+:[0-9]{12}:catalog/[a-zA-Z]+/channel-handshake/)?ch-[a-z0-9]{13}
    AcceptChannelHandshakeResponse:
      type: object
      properties:
        channelHandshakeDetail:
          $ref: "#/components/schemas/AcceptChannelHandshakeDetail"
          description: Details of the accepted channel handshake.
    AcceptChannelHandshakeDetail:
      description: Contains details about an accepted channel handshake.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ChannelHandshakeId"
          description: The unique identifier of the accepted handshake.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the accepted handshake.
        status:
          $ref: "#/components/schemas/HandshakeStatus"
          description: The current status of the accepted handshake.
    ChannelHandshakeId:
      type: string
      minLength: 16
      maxLength: 16
      pattern: ch-[a-z0-9]{13}
    Arn:
      type: string
      minLength: 1
      maxLength: 1011
    HandshakeStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
        - REJECTED
        - CANCELED
        - EXPIRED
    CancelChannelHandshakeResponse:
      type: object
      properties:
        channelHandshakeDetail:
          $ref: "#/components/schemas/CancelChannelHandshakeDetail"
          description: Details of the canceled channel handshake.
    CancelChannelHandshakeDetail:
      description: Contains details about a canceled channel handshake.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ChannelHandshakeId"
          description: The unique identifier of the canceled handshake.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the canceled handshake.
        status:
          $ref: "#/components/schemas/HandshakeStatus"
          description: The current status of the canceled handshake.
    HandshakeType:
      type: string
      enum:
        - START_SERVICE_PERIOD
        - REVOKE_SERVICE_PERIOD
        - PROGRAM_MANAGEMENT_ACCOUNT
    AssociatedResourceIdentifier:
      type: string
      minLength: 16
