        - joinColumns
        - listColumns
    ConsolidatedPolicyListJoinColumnsList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleColumnName"
    ConsolidatedPolicyAggregation:
      description: Controls on the analysis specifications that can be run on a configured table.
      type: object
      properties:
        aggregateColumns:
          $ref: "#/components/schemas/ConsolidatedPolicyAggregationAggregateColumnsList"
          description: Aggregate columns in consolidated policy aggregation.
        joinColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: The columns to join on.
        joinRequired:
          $ref: "#/components/schemas/JoinRequiredOption"
          description: Join required
        allowedJoinOperators:
          $ref: "#/components/schemas/JoinOperatorsList"
          description: The allowed join operators.
        dimensionColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: The dimension columns of the consolidated policy aggregation.
        scalarFunctions:
          $ref: "#/components/schemas/ScalarFunctionsList"
          description: The scalar functions.
        outputConstraints:
          $ref: "#/components/schemas/AggregationConstraints"
          description: The output constraints of the consolidated policy aggregation.
        additionalAnalyses:
          $ref: "#/components/schemas/AdditionalAnalyses"
          description: Additional analyses for the consolidated policy aggregation.
        allowedResultReceivers:
          $ref: "#/components/schemas/AllowedResultReceivers"
          description: The allowed result receivers.
        allowedAdditionalAnalyses:
          $ref: "#/components/schemas/AllowedAdditionalAnalyses"
          description: The additional analyses allowed by the consolidated policy aggregation.
      required:
        - aggregateColumns
        - joinColumns
        - dimensionColumns
        - scalarFunctions
        - outputConstraints
    ConsolidatedPolicyAggregationAggregateColumnsList:
      type: array
      items:
        $ref: "#/components/schemas/AggregateColumn"
    ConsolidatedPolicyCustom:
      description: Controls on the analysis specifications that can be run on a configured table.
      type: object
      properties:
        allowedAnalyses:
          $ref: "#/components/schemas/ConsolidatedPolicyCustomAllowedAnalysesList"
          description: The allowed analyses.
        allowedAnalysisProviders:
          $ref: "#/components/schemas/ConsolidatedPolicyCustomAllowedAnalysisProvidersList"
          description: The allowed analysis providers.
        additionalAnalyses:
          $ref: "#/components/schemas/AdditionalAnalyses"
          description: Additional analyses for the consolidated policy.
        disallowedOutputColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: Disallowed output columns
        differentialPrivacy:
          $ref: "#/components/schemas/DifferentialPrivacyConfiguration"
        allowedResultReceivers:
          $ref: "#/components/schemas/AllowedResultReceivers"
          description: The allowed result receivers.
        allowedAdditionalAnalyses:
          $ref: "#/components/schemas/AllowedAdditionalAnalyses"
          description: The additional analyses allowed by the consolidated policy.
      required:
        - allowedAnalyses
    ConsolidatedPolicyCustomAllowedAnalysesList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisTemplateArnOrQueryWildcard"
    ConsolidatedPolicyCustomAllowedAnalysisProvidersList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    BatchGetSchemaAnalysisRuleErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetSchemaAnalysisRuleError"
    BatchGetSchemaAnalysisRuleError:
      description: An error that describes why a schema could not be fetched.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TableAlias"
          description: An error name for the error.
        type_:
          $ref: "#/components/schemas/AnalysisRuleType"
          description: The analysis rule type.
        code:
          $ref: "#/components/schemas/String"
          description: An error code for the error.
        message:
          $ref: "#/components/schemas/String"
          description: A description of why the call failed.
      required:
        - name
        - type_
        - code
        - message
    MembershipIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    TagMap:
      description: Map of tags assigned to a resource
      type: object
      properties: {}
    CreateAnalysisTemplateOutput:
      type: object
      properties:
        analysisTemplate:
          $ref: "#/components/schemas/AnalysisTemplate"
          description: The analysis template.
      required:
        - analysisTemplate
    AnalysisTemplate:
      description: The analysis template.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AnalysisTemplateIdentifier"
          description: The identifier for the analysis template.
        arn:
          $ref: "#/components/schemas/AnalysisTemplateArn"
          description: The Amazon Resource Name (ARN) of the analysis template.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the associated collaboration of the analysis template.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The unique ARN for the analysis template’s associated collaboration.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: The identifier of a member who created the analysis template.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The Amazon Resource Name (ARN) of the member who created the analysis template.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the analysis template.
        name:
          $ref: "#/components/schemas/ResourceAlias"
          description: The name of the analysis template.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the analysis template was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the analysis template was last updated.
        schema:
          $ref: "#/components/schemas/AnalysisSchema"
          description: The entire schema object.
        format_:
          $ref: "#/components/schemas/AnalysisFormat"
          description: The format of the analysis template.
        source:
          $ref: "#/components/schemas/AnalysisSource"
          description: The source of the analysis template.
        sourceMetadata:
          $ref: "#/components/schemas/AnalysisSourceMetadata"
          description: The source metadata for the analysis template.
        analysisParameters:
          $ref: "#/components/schemas/AnalysisParameterList"
          description: The parameters of the analysis template.
        validations:
          $ref: "#/components/schemas/AnalysisTemplateValidationStatusDetailList"
          description: Information about the validations performed on the analysis template.
        errorMessageConfiguration:
          $ref: "#/components/schemas/ErrorMessageConfiguration"
          description: The configuration that specifies the level of detail in error messages returned by analyses using this template. When set to DETAILED, error messages include more information to help troubleshoot issues with PySpark jobs. Detailed error messages may expose underlying data, including sensitive information. Recommended for faster troubleshooting in development and testing environments.
        syntheticDataParameters:
          $ref: "#/components/schemas/SyntheticDataParameters"
          description: The parameters used to generate synthetic data for this analysis template.
      required:
        - id
        - arn
        - collaborationId
        - collaborationArn
        - membershipId
        - membershipArn
        - name
        - createTime
        - updateTime
        - schema
        - format_
        - source
    MembershipArn:
      type: string
      minLength: 0
      maxLength: 100
      pattern: arn:aws:[\w]+:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+
    MemberList:
      type: array
      items:
        $ref: "#/components/schemas/MemberSpecification"
    MemberSpecification:
      description: Basic metadata used to construct a new member.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The identifier used to reference members of the collaboration. Currently only supports Amazon Web Services account ID.
        memberAbilities:
          $ref: "#/components/schemas/MemberAbilities"
          description: The abilities granted to the collaboration member.
        mlMemberAbilities:
          $ref: "#/components/schemas/MLMemberAbilities"
          description: The ML abilities granted to the collaboration member.
        displayName:
          $ref: "#/components/schemas/DisplayName"
          description: The member's display name.
        paymentConfiguration:
          $ref: "#/components/schemas/PaymentConfiguration"
          description: The collaboration member's payment responsibilities set by the collaboration creator. If the collaboration creator hasn't speciﬁed anyone as the member paying for query compute costs, then the member who can query is the default payer.
      required:
        - accountId
        - memberAbilities
        - displayName
    MemberAbilities:
      type: array
      items:
        $ref: "#/components/schemas/MemberAbility"
    MemberAbility:
      type: string
      enum:
        - CAN_QUERY
        - CAN_RECEIVE_RESULTS
        - CAN_RUN_JOB
    MLMemberAbilities:
      description: The ML member abilities for a collaboration member.
      type: object
      properties:
        customMLMemberAbilities:
          $ref: "#/components/schemas/CustomMLMemberAbilities"
          description: The custom ML member abilities for a collaboration member.
      required:
        - customMLMemberAbilities
    CustomMLMemberAbilities:
      type: array
      items:
        $ref: "#/components/schemas/CustomMLMemberAbility"
    CustomMLMemberAbility:
      type: string
      enum:
        - CAN_RECEIVE_MODEL_OUTPUT
        - CAN_RECEIVE_INFERENCE_OUTPUT
    DisplayName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: (?!\s*$)[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDBFF-\uDC00\uDFFF\t]*
    PaymentConfiguration:
      description: An object representing the collaboration member's payment responsibilities set by the collaboration creator.
      type: object
      properties:
        queryCompute:
          $ref: "#/components/schemas/QueryComputePaymentConfig"
          description: The collaboration member's payment responsibilities set by the collaboration creator for query compute costs.
        machineLearning:
          $ref: "#/components/schemas/MLPaymentConfig"
          description: An object representing the collaboration member's machine learning payment responsibilities set by the collaboration creator.
        jobCompute:
          $ref: "#/components/schemas/JobComputePaymentConfig"
          description: The compute configuration for the job.
      required:
        - queryCompute
    QueryComputePaymentConfig:
      description: An object representing the collaboration member's payment responsibilities set by the collaboration creator for query compute costs.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the collaboration creator has configured the collaboration member to pay for query compute costs (TRUE) or has not configured the collaboration member to pay for query compute costs (FALSE). Exactly one member can be configured to pay for query compute costs. An error is returned if the collaboration creator sets a TRUE value for more than one member in the collaboration. If the collaboration creator hasn't specified anyone as the member paying for query compute costs, then the member who can query is the default payer. An error is returned if the collaboration creator sets a FALSE value for the member who can query.
      required:
        - isResponsible
    MLPaymentConfig:
      description: An object representing the collaboration member's machine learning payment responsibilities set by the collaboration creator.
      type: object
      properties:
        modelTraining:
          $ref: "#/components/schemas/ModelTrainingPaymentConfig"
          description: The payment responsibilities accepted by the member for model training.
        modelInference:
          $ref: "#/components/schemas/ModelInferencePaymentConfig"
          description: The payment responsibilities accepted by the member for model inference.
        syntheticDataGeneration:
          $ref: "#/components/schemas/SyntheticDataGenerationPaymentConfig"
          description: The payment configuration for machine learning synthetic data generation.
    ModelTrainingPaymentConfig:
      description: An object representing the collaboration member's model training payment responsibilities set by the collaboration creator.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the collaboration creator has configured the collaboration member to pay for model training costs (TRUE) or has not configured the collaboration member to pay for model training costs (FALSE). Exactly one member can be configured to pay for model training costs. An error is returned if the collaboration creator sets a TRUE value for more than one member in the collaboration. If the collaboration creator hasn't specified anyone as the member paying for model training costs, then the member who can query is the default payer. An error is returned if the collaboration creator sets a FALSE value for the member who can query.
      required:
        - isResponsible
    ModelInferencePaymentConfig:
      description: An object representing the collaboration member's model inference payment responsibilities set by the collaboration creator.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the collaboration creator has configured the collaboration member to pay for model inference costs (TRUE) or has not configured the collaboration member to pay for model inference costs (FALSE). Exactly one member can be configured to pay for model inference costs. An error is returned if the collaboration creator sets a TRUE value for more than one member in the collaboration. If the collaboration creator hasn't specified anyone as the member paying for model inference costs, then the member who can query is the default payer. An error is returned if the collaboration creator sets a FALSE value for the member who can query.
      required:
        - isResponsible
    SyntheticDataGenerationPaymentConfig:
      description: Payment configuration for synthetic data generation.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates who is responsible for paying for synthetic data generation.
      required:
        - isResponsible
    JobComputePaymentConfig:
      description: An object representing the collaboration member's payment responsibilities set by the collaboration creator for query and job compute costs.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the collaboration creator has configured the collaboration member to pay for query and job compute costs (TRUE) or has not configured the collaboration member to pay for query and job compute costs (FALSE). Exactly one member can be configured to pay for query and job compute costs. An error is returned if the collaboration creator sets a TRUE value for more than one member in the collaboration. An error is returned if the collaboration creator sets a FALSE value for the member who can run queries and jobs.
      required:
        - isResponsible
    CollaborationName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: (?!\s*$)[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDBFF-\uDC00\uDFFF\t]*
    CollaborationDescription:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?!\s*$)[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDBFF-\uDC00\uDFFF\t\r\n]*
    DataEncryptionMetadata:
      description: The settings for client-side encryption for cryptographic computing.
      type: object
      properties:
        allowCleartext:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether encrypted tables can contain cleartext data (TRUE) or are to cryptographically process every column (FALSE).
        allowDuplicates:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Fingerprint columns can contain duplicate entries (TRUE) or are to contain only non-repeated values (FALSE).
        allowJoinsOnColumnsWithDifferentNames:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether Fingerprint columns can be joined on any other Fingerprint column with a different name (TRUE) or can only be joined on Fingerprint columns of the same name (FALSE).
        preserveNulls:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether NULL values are to be copied as NULL to encrypted tables (TRUE) or cryptographically processed (FALSE).
      required:
        - allowCleartext
        - allowDuplicates
        - allowJoinsOnColumnsWithDifferentNames
        - preserveNulls
    CollaborationQueryLogStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CollaborationJobLogStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AnalyticsEngine:
      type: string
      enum:
        - SPARK
        - CLEAN_ROOMS_SQL
    AutoApprovedChangeTypeList:
      type: array
      items:
        $ref: "#/components/schemas/AutoApprovedChangeType"
    AutoApprovedChangeType:
      type: string
      enum:
        - ADD_MEMBER
        - GRANT_RECEIVE_RESULTS_ABILITY
        - REVOKE_RECEIVE_RESULTS_ABILITY
    AllowedResultRegions:
      type: array
      items:
        $ref: "#/components/schemas/SupportedS3Region"
    SupportedS3Region:
      type: string
      enum:
        - us-west-1
        - us-west-2
        - us-east-1
        - us-east-2
        - af-south-1
        - ap-east-1
        - ap-east-2
        - ap-south-2
        - ap-southeast-1
        - ap-southeast-2
        - ap-southeast-3
        - ap-southeast-5
        - ap-southeast-4
        - ap-southeast-7
        - ap-south-1
        - ap-northeast-3
        - ap-northeast-1
        - ap-northeast-2
        - ca-central-1
        - ca-west-1
        - eu-south-1
        - eu-west-3
        - eu-south-2
        - eu-central-2
        - eu-central-1
        - eu-north-1
        - eu-west-1
        - eu-west-2
        - me-south-1
        - me-central-1
        - il-central-1
        - sa-east-1
        - mx-central-1
    CreateCollaborationOutput:
      type: object
      properties:
        collaboration:
          $ref: "#/components/schemas/Collaboration"
          description: The collaboration.
      required:
        - collaboration
    Collaboration:
      description: The multi-party data share environment. The collaboration contains metadata about its purpose and participants.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the collaboration.
        arn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The unique ARN for the collaboration.
        name:
          $ref: "#/components/schemas/CollaborationName"
          description: A human-readable identifier provided by the collaboration owner. Display names are not unique.
        description:
          $ref: "#/components/schemas/CollaborationDescription"
          description: A description of the collaboration provided by the collaboration owner.
        creatorAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The identifier used to reference members of the collaboration. Currently only supports Amazon Web Services account ID.
        creatorDisplayName:
          $ref: "#/components/schemas/DisplayName"
          description: A display name of the collaboration creator.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the collaboration was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the collaboration metadata was last updated.
        memberStatus:
          $ref: "#/components/schemas/MemberStatus"
          description: The status of a member in a collaboration.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for your membership within the collaboration.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The unique ARN for your membership within the collaboration.
        dataEncryptionMetadata:
          $ref: "#/components/schemas/DataEncryptionMetadata"
          description: The settings for client-side encryption for cryptographic computing.
        queryLogStatus:
          $ref: "#/components/schemas/CollaborationQueryLogStatus"
          description: An indicator as to whether query logging has been enabled or disabled for the collaboration. When ENABLED, Clean Rooms logs details about queries run within this collaboration and those logs can be viewed in Amazon CloudWatch Logs. The default value is DISABLED.
        jobLogStatus:
          $ref: "#/components/schemas/CollaborationJobLogStatus"
          description: An indicator as to whether job logging has been enabled or disabled for the collaboration. When ENABLED, Clean Rooms logs details about jobs run within this collaboration and those logs can be viewed in Amazon CloudWatch Logs. The default value is DISABLED.
        analyticsEngine:
          $ref: "#/components/schemas/AnalyticsEngine"
          description: The analytics engine for the collaboration. After July 16, 2025, the CLEAN_ROOMS_SQL parameter will no longer be available.
        autoApprovedChangeTypes:
          $ref: "#/components/schemas/AutoApprovedChangeTypeList"
          description: The types of change requests that are automatically approved for this collaboration.
        allowedResultRegions:
          $ref: "#/components/schemas/AllowedResultRegions"
          description: The Amazon Web Services Regions where collaboration query results can be stored. Returns the list of Region identifiers that were specified when the collaboration was created. This list is used to enforce regional storage policies and compliance requirements.
        isMetricsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: An indicator as to whether metrics are enabled for the collaboration. When true, collaboration members can opt in to Amazon CloudWatch metrics for their membership queries.
      required:
        - id
        - arn
        - name
        - creatorAccountId
        - creatorDisplayName
        - createTime
        - updateTime
        - memberStatus
        - queryLogStatus
    MemberStatus:
      type: string
      enum:
        - INVITED
        - ACTIVE
        - LEFT
        - REMOVED
    ChangeInputList:
      type: array
      items:
        $ref: "#/components/schemas/ChangeInput"
    ChangeInput:
      description: Specifies a change to apply to a collaboration.
      type: object
      properties:
        specificationType:
          $ref: "#/components/schemas/ChangeSpecificationType"
          description: The type of specification for the change. Currently supports MEMBER for member-related changes.
        specification:
          $ref: "#/components/schemas/ChangeSpecification"
          description: The specification details for the change. The structure depends on the specification type.
      required:
        - specificationType
        - specification
    ChangeSpecificationType:
      type: string
      enum:
        - MEMBER
        - COLLABORATION
    ChangeSpecification:
      description: A union that contains the specification details for different types of changes.
      type: object
      properties:
        member:
          $ref: "#/components/schemas/MemberChangeSpecification"
          description: The member change specification when the change type is MEMBER.
        collaboration:
          $ref: "#/components/schemas/CollaborationChangeSpecification"
          description: The collaboration configuration changes being requested. Currently, this only supports modifying which change types are auto-approved for the collaboration.
    MemberChangeSpecification:
      description: Specifies changes to collaboration membership, including adding new members with their abilities and display names.
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID of the member to add to the collaboration.
        memberAbilities:
          $ref: "#/components/schemas/MemberAbilities"
          description: "The abilities granted to the collaboration member. These determine what actions the member can perform within the collaboration. The following values are currently not supported: CAN_QUERY and CAN_RUN_JOB. Set the value of memberAbilities to [] to allow a member to contribute data. Set the value of memberAbilities to [CAN_RECEIVE_RESULTS] to allow a member to contribute data and receive results."
        displayName:
          $ref: "#/components/schemas/DisplayName"
          description: Specifies the display name that will be shown for this member in the collaboration. While this field is required when inviting new members, it becomes optional when modifying abilities of existing collaboration members.
      required:
        - accountId
        - memberAbilities
    CollaborationChangeSpecification:
      description: Defines the specific changes being requested for a collaboration, including configuration modifications and approval requirements.
      type: object
      properties:
        autoApprovedChangeTypes:
          $ref: "#/components/schemas/AutoApprovedChangeTypeList"
          description: Defines requested updates to properties of the collaboration. Currently, this only supports modifying which change types are auto-approved for the collaboration.
    CreateCollaborationChangeRequestOutput:
      type: object
      properties:
        collaborationChangeRequest:
          $ref: "#/components/schemas/CollaborationChangeRequest"
      required:
        - collaborationChangeRequest
    CollaborationChangeRequest:
      description: Represents a request to modify a collaboration. Change requests enable structured modifications to collaborations after they have been created.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier for the change request.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier for the collaboration being modified.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the change request was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the change request was last updated.
        status:
          $ref: "#/components/schemas/ChangeRequestStatus"
          description: The current status of the change request. Valid values are PENDING, APPROVED, DENIED, COMMITTED, and CANCELLED.
        isAutoApproved:
          $ref: "#/components/schemas/Boolean"
          description: Whether the change request was automatically approved based on the collaboration's auto-approval settings.
        changes:
          $ref: "#/components/schemas/ChangeList"
          description: The list of changes specified in this change request.
        approvals:
          type: object
          properties: {}
          description: A list of approval details from collaboration members, including approval status and multi-party approval workflow information.
      required:
        - id
        - collaborationId
        - createTime
        - updateTime
        - status
        - isAutoApproved
        - changes
    ChangeRequestStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - CANCELLED
        - DENIED
        - COMMITTED
    ChangeList:
      type: array
      items:
        $ref: "#/components/schemas/Change"
    Change:
      description: Represents a single change within a collaboration change request, containing the change identifier and specification.
      type: object
      properties:
        specificationType:
          $ref: "#/components/schemas/ChangeSpecificationType"
          description: The type of specification for this change.
        specification:
          $ref: "#/components/schemas/ChangeSpecification"
          description: The specification details for this change.
        types:
          $ref: "#/components/schemas/ChangeTypeList"
          description: The list of change types that were applied.
      required:
        - specificationType
        - specification
        - types
    ChangeTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ChangeType"
    ChangeType:
      type: string
      enum:
        - ADD_MEMBER
        - GRANT_RECEIVE_RESULTS_ABILITY
        - REVOKE_RECEIVE_RESULTS_ABILITY
        - EDIT_AUTO_APPROVED_CHANGE_TYPES
    ConfiguredAudienceModelArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:[0-9]{12}:configured-audience-model/[-a-zA-Z0-9_/.]+
    ConfiguredAudienceModelAssociationName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: (?!\s*$)[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDBFF-\uDC00\uDFFF\t]*
    CreateConfiguredAudienceModelAssociationOutput:
      type: object
      properties:
        configuredAudienceModelAssociation:
          $ref: "#/components/schemas/ConfiguredAudienceModelAssociation"
          description: Information about the configured audience model association.
      required:
        - configuredAudienceModelAssociation
    ConfiguredAudienceModelAssociation:
      description: Details about the configured audience model association.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ConfiguredAudienceModelAssociationIdentifier"
          description: A unique identifier of the configured audience model association.
        arn:
          $ref: "#/components/schemas/ConfiguredAudienceModelAssociationArn"
          description: The Amazon Resource Name (ARN) of the configured audience model association.
        configuredAudienceModelArn:
          $ref: "#/components/schemas/ConfiguredAudienceModelArn"
          description: The Amazon Resource Name (ARN) of the configured audience model that was used for this configured audience model association.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: A unique identifier for the membership that contains this configured audience model association.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The Amazon Resource Name (ARN) of the membership that contains this configured audience model association.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: A unique identifier of the collaboration that contains this configured audience model association.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The Amazon Resource Name (ARN) of the collaboration that contains this configured audience model association.
        name:
          $ref: "#/components/schemas/ConfiguredAudienceModelAssociationName"
          description: The name of the configured audience model association.
        manageResourcePolicies:
          $ref: "#/components/schemas/Boolean"
          description: When TRUE, indicates that the resource policy for the configured audience model resource being associated is configured for Clean Rooms to manage permissions related to the given collaboration. When FALSE, indicates that the configured audience model resource owner will manage permissions related to the given collaboration.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the configured audience model association.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the configured audience model association was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent time at which the configured audience model association was updated.
      required:
        - id
        - arn
        - configuredAudienceModelArn
        - membershipId
        - membershipArn
        - collaborationId
        - collaborationArn
        - name
        - manageResourcePolicies
        - createTime
        - updateTime
    ConfiguredAudienceModelAssociationIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    ConfiguredAudienceModelAssociationArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/configuredaudiencemodelassociation/[\d\w-]+
    TableReference:
