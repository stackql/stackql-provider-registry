openapi: 3.0.0
info:
  version: "2022-02-17"
  title: AWS Clean Rooms Service
  description: AWS Clean Rooms Service
  x-serviceName: cleanrooms
  x-serviceAlias: cleanrooms
  x-protocol: rest-json
  x-apiVersion: "2022-02-17"
  x-endpointPrefix: cleanrooms
servers:
  - url: https://cleanrooms.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cleanrooms
paths:
  /collaborations/{collaboration_identifier}/batch-analysistemplates:
    post:
      operationId: BatchGetCollaborationAnalysisTemplate
      description: Retrieves multiple analysis templates within a collaboration by their Amazon Resource Names (ARNs).
      parameters:
        - name: collaboration_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CollaborationIdentifier"
          description: A unique identifier for the collaboration that the analysis templates belong to. Currently accepts collaboration ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analysisTemplateArns:
                  $ref: "#/components/schemas/AnalysisTemplateArnList"
              required:
                - analysisTemplateArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCollaborationAnalysisTemplateOutput"
  /collaborations/{collaboration_identifier}/batch-schema:
    post:
      operationId: BatchGetSchema
      description: Retrieves multiple schemas by their identifiers.
      parameters:
        - name: collaboration_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CollaborationIdentifier"
          description: A unique identifier for the collaboration that the schemas belong to. Currently accepts collaboration ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                names:
                  $ref: "#/components/schemas/TableAliasList"
              required:
                - names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetSchemaOutput"
  /collaborations/{collaboration_identifier}/batch-schema-analysis-rule:
    post:
      operationId: BatchGetSchemaAnalysisRule
      description: Retrieves multiple analysis rule schemas.
      parameters:
        - name: collaboration_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CollaborationIdentifier"
          description: The unique identifier of the collaboration that contains the schema analysis rule.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schemaAnalysisRuleRequests:
                  $ref: "#/components/schemas/SchemaAnalysisRuleRequestList"
              required:
                - schemaAnalysisRuleRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetSchemaAnalysisRuleOutput"
  /memberships/{membership_identifier}/analysistemplates:
    post:
      operationId: CreateAnalysisTemplate
      description: Creates a new analysis template.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The identifier for a membership resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                name:
                  $ref: "#/components/schemas/TableAlias"
                format:
                  $ref: "#/components/schemas/AnalysisFormat"
                source:
                  $ref: "#/components/schemas/AnalysisSource"
                tags:
                  $ref: "#/components/schemas/TagMap"
                analysisParameters:
                  $ref: "#/components/schemas/AnalysisParameterList"
                schema:
                  $ref: "#/components/schemas/AnalysisSchema"
                errorMessageConfiguration:
                  $ref: "#/components/schemas/ErrorMessageConfiguration"
                syntheticDataParameters:
                  $ref: "#/components/schemas/SyntheticDataParameters"
              required:
                - name
                - format
                - source
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAnalysisTemplateOutput"
    get:
      operationId: ListAnalysisTemplates
      description: Lists analysis templates that the caller owns.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The identifier for a membership resource.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call. The service chooses a default number if you don't set one. The service might return a `nextToken` even if the `maxResults` value has not been met.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAnalysisTemplatesOutput"
  /collaborations:
    post:
      operationId: CreateCollaboration
      description: Creates a new collaboration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                members:
                  $ref: "#/components/schemas/MemberList"
                name:
                  $ref: "#/components/schemas/CollaborationName"
                description:
                  $ref: "#/components/schemas/CollaborationDescription"
                creatorMemberAbilities:
                  $ref: "#/components/schemas/MemberAbilities"
                creatorMLMemberAbilities:
                  $ref: "#/components/schemas/MLMemberAbilities"
                creatorDisplayName:
                  $ref: "#/components/schemas/DisplayName"
                dataEncryptionMetadata:
                  $ref: "#/components/schemas/DataEncryptionMetadata"
                queryLogStatus:
                  $ref: "#/components/schemas/CollaborationQueryLogStatus"
                jobLogStatus:
                  $ref: "#/components/schemas/CollaborationJobLogStatus"
                tags:
                  $ref: "#/components/schemas/TagMap"
                creatorPaymentConfiguration:
                  $ref: "#/components/schemas/PaymentConfiguration"
                analyticsEngine:
                  $ref: "#/components/schemas/AnalyticsEngine"
                autoApprovedChangeRequestTypes:
                  $ref: "#/components/schemas/AutoApprovedChangeTypeList"
                allowedResultRegions:
                  $ref: "#/components/schemas/AllowedResultRegions"
                isMetricsEnabled:
                  $ref: "#/components/schemas/Boolean"
              required:
                - members
                - name
                - description
                - creatorMemberAbilities
                - creatorDisplayName
                - queryLogStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCollaborationOutput"
    get:
      operationId: ListCollaborations
      description: Lists collaborations the caller owns, is active in, or has been invited to.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call. The service chooses a default number if you don't set one. The service might return a `nextToken` even if the `maxResults` value has not been met.
        - name: memberStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FilterableMemberStatus"
          description: The caller's status in a collaboration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCollaborationsOutput"
  /collaborations/{collaboration_identifier}/changeRequests:
    post:
      operationId: CreateCollaborationChangeRequest
      description: Creates a new change request to modify an existing collaboration. This enables post-creation modifications to collaborations through a structured API-driven approach.
      parameters:
        - name: collaboration_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CollaborationIdentifier"
          description: The identifier of the collaboration that the change request is made against.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                changes:
                  $ref: "#/components/schemas/ChangeInputList"
              required:
                - changes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCollaborationChangeRequestOutput"
    get:
      operationId: ListCollaborationChangeRequests
      description: Lists all change requests for a collaboration with pagination support. Returns change requests sorted by creation time.
      parameters:
        - name: collaboration_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CollaborationIdentifier"
          description: The identifier of the collaboration that the change request is made against.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ChangeRequestStatus"
          description: A filter to only return change requests with the specified status.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCollaborationChangeRequestsOutput"
  /memberships/{membership_identifier}/configuredaudiencemodelassociations:
    post:
      operationId: CreateConfiguredAudienceModelAssociation
      description: Provides the details necessary to create a configured audience model association.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for one of your memberships for a collaboration. The configured audience model is associated to the collaboration that this membership belongs to. Accepts a membership ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuredAudienceModelArn:
                  $ref: "#/components/schemas/ConfiguredAudienceModelArn"
                configuredAudienceModelAssociationName:
                  $ref: "#/components/schemas/ConfiguredAudienceModelAssociationName"
                manageResourcePolicies:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagMap"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
              required:
                - configuredAudienceModelArn
                - configuredAudienceModelAssociationName
                - manageResourcePolicies
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredAudienceModelAssociationOutput"
    get:
      operationId: ListConfiguredAudienceModelAssociations
      description: Lists information about requested configured audience model associations.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for a membership that contains the configured audience model associations that you want to retrieve.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call. The service chooses a default number if you don't set one. The service might return a `nextToken` even if the `maxResults` value has not been met.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfiguredAudienceModelAssociationsOutput"
  /configuredTables:
    post:
      operationId: CreateConfiguredTable
      description: Creates a new configured table resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DisplayName"
                description:
                  $ref: "#/components/schemas/TableDescription"
                tableReference:
                  $ref: "#/components/schemas/TableReference"
                allowedColumns:
                  $ref: "#/components/schemas/AllowedColumnList"
                analysisMethod:
                  $ref: "#/components/schemas/AnalysisMethod"
                selectedAnalysisMethods:
                  $ref: "#/components/schemas/SelectedAnalysisMethods"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - tableReference
                - allowedColumns
                - analysisMethod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredTableOutput"
    get:
      operationId: ListConfiguredTables
      description: Lists configured tables.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call. The service chooses a default number if you don't set one. The service might return a `nextToken` even if the `maxResults` value has not been met.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfiguredTablesOutput"
  /configuredTables/{configured_table_identifier}/analysisRule:
    post:
      operationId: CreateConfiguredTableAnalysisRule
      description: Creates a new analysis rule for a configured table. Currently, only one analysis rule can be created for a given configured table.
      parameters:
        - name: configured_table_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredTableIdentifier"
          description: The identifier for the configured table to create the analysis rule for. Currently accepts the configured table ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analysisRuleType:
                  $ref: "#/components/schemas/ConfiguredTableAnalysisRuleType"
                analysisRulePolicy:
                  $ref: "#/components/schemas/ConfiguredTableAnalysisRulePolicy"
              required:
                - analysisRuleType
                - analysisRulePolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredTableAnalysisRuleOutput"
  /memberships/{membership_identifier}/configuredTableAssociations:
    post:
      operationId: CreateConfiguredTableAssociation
      description: Creates a configured table association. A configured table association links a configured table with a collaboration.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for one of your memberships for a collaboration. The configured table is associated to the collaboration that this membership belongs to. Currently accepts a membership ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TableAlias"
                description:
                  $ref: "#/components/schemas/TableDescription"
                configuredTableIdentifier:
                  $ref: "#/components/schemas/ConfiguredTableIdentifier"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - configuredTableIdentifier
                - roleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredTableAssociationOutput"
    get:
      operationId: ListConfiguredTableAssociations
      description: Lists configured table associations for a membership.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for the membership to list configured table associations for. Currently accepts the membership ID.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call. The service chooses a default number if you don't set one. The service might return a `nextToken` even if the `maxResults` value has not been met.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfiguredTableAssociationsOutput"
  /memberships/{membership_identifier}/configuredTableAssociations/{configured_table_association_identifier}/analysisRule:
    post:
      operationId: CreateConfiguredTableAssociationAnalysisRule
      description: Creates a new analysis rule for an associated configured table.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for the membership that the configured table association belongs to. Currently accepts the membership ID.
        - name: configured_table_association_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConfiguredTableAssociationIdentifier"
          description: The unique ID for the configured table association. Currently accepts the configured table association ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analysisRuleType:
                  $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleType"
                analysisRulePolicy:
                  $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRulePolicy"
              required:
                - analysisRuleType
                - analysisRulePolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfiguredTableAssociationAnalysisRuleOutput"
  /memberships/{membership_identifier}/idmappingtables:
    post:
      operationId: CreateIdMappingTable
      description: Creates an ID mapping table.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The unique identifier of the membership that contains the ID mapping table.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceAlias"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                inputReferenceConfig:
                  $ref: "#/components/schemas/IdMappingTableInputReferenceConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                kmsKeyArn:
                  $ref: "#/components/schemas/KMSKeyArn"
              required:
                - name
                - inputReferenceConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIdMappingTableOutput"
    get:
      operationId: ListIdMappingTables
      description: Returns a list of ID mapping tables.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The unique identifier of the membership that contains the ID mapping tables that you want to view.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call. Service chooses a default if it has not been set. Service may return a nextToken even if the maximum results has not been met.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdMappingTablesOutput"
  /memberships/{membership_identifier}/idnamespaceassociations:
    post:
      operationId: CreateIdNamespaceAssociation
      description: Creates an ID namespace association.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The unique identifier of the membership that contains the ID namespace association.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                inputReferenceConfig:
                  $ref: "#/components/schemas/IdNamespaceAssociationInputReferenceConfig"
                tags:
                  $ref: "#/components/schemas/TagMap"
                name:
                  $ref: "#/components/schemas/GenericResourceName"
                description:
                  $ref: "#/components/schemas/ResourceDescription"
                idMappingConfig:
                  $ref: "#/components/schemas/IdMappingConfig"
              required:
                - inputReferenceConfig
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIdNamespaceAssociationOutput"
    get:
      operationId: ListIdNamespaceAssociations
      description: Returns a list of ID namespace associations.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The unique identifier of the membership that contains the ID namespace association that you want to view.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum size of the results that is returned per call. Service chooses a default if it has not been set. Service may return a nextToken even if the maximum results has not been met.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdNamespaceAssociationsOutput"
  /memberships:
    post:
      operationId: CreateMembership
      description: Creates a membership for a specific collaboration identifier and joins the collaboration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collaborationIdentifier:
                  $ref: "#/components/schemas/CollaborationIdentifier"
                queryLogStatus:
                  $ref: "#/components/schemas/MembershipQueryLogStatus"
                jobLogStatus:
                  $ref: "#/components/schemas/MembershipJobLogStatus"
                tags:
                  $ref: "#/components/schemas/TagMap"
                defaultResultConfiguration:
                  $ref: "#/components/schemas/MembershipProtectedQueryResultConfiguration"
                defaultJobResultConfiguration:
                  $ref: "#/components/schemas/MembershipProtectedJobResultConfiguration"
                paymentConfiguration:
                  $ref: "#/components/schemas/MembershipPaymentConfiguration"
                isMetricsEnabled:
                  $ref: "#/components/schemas/Boolean"
              required:
                - collaborationIdentifier
                - queryLogStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembershipOutput"
    get:
      operationId: ListMemberships
      description: Lists all memberships resources within the caller's account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned for an API request call. The service chooses a default number if you don't set one. The service might return a `nextToken` even if the `maxResults` value has not been met.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MembershipStatus"
          description: A filter which will return only memberships in the specified status.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembershipsOutput"
  /memberships/{membership_identifier}/privacybudgettemplates:
    post:
      operationId: CreatePrivacyBudgetTemplate
      description: Creates a privacy budget template for a specified collaboration. Each collaboration can have only one privacy budget template. If you need to change the privacy budget template, use the UpdatePrivacyBudgetTemplate operation.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for one of your memberships for a collaboration. The privacy budget template is created in the collaboration that this membership belongs to. Accepts a membership ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                autoRefresh:
                  $ref: "#/components/schemas/PrivacyBudgetTemplateAutoRefresh"
                privacyBudgetType:
                  $ref: "#/components/schemas/PrivacyBudgetType"
                parameters:
                  $ref: "#/components/schemas/PrivacyBudgetTemplateParametersInput"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - privacyBudgetType
                - parameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrivacyBudgetTemplateOutput"
    get:
      operationId: ListPrivacyBudgetTemplates
      description: Returns detailed information about the privacy budget templates in a specified membership.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for one of your memberships for a collaboration. The privacy budget templates are retrieved from the collaboration that this membership belongs to. Accepts a membership ID.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token that's used to fetch the next set of results.
        - name: maxResults
          in: query
