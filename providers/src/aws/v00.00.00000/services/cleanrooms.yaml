    AllowedAdditionalAnalyses:
      type: array
      items:
        $ref: "#/components/schemas/AdditionalAnalysesResourceArn"
    AdditionalAnalysesResourceArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:([\d]{12}|\*):membership\/[\*\d\w-]+\/configuredaudiencemodelassociation\/[\*\d\w-]+$|^arn:aws[-a-z]*:cleanrooms-ml:[-a-z0-9]+:([0-9]{12}|\*):membership\/[\*\d\w-]+\/configured-model-algorithm-association\/([-a-zA-Z0-9_\/.]+|\*)
    ConfiguredTableAssociationAnalysisRuleAggregation:
      description: The configured table association analysis rule applied to a configured table with the aggregation analysis rule.
      type: object
      properties:
        allowedResultReceivers:
          $ref: "#/components/schemas/AllowedResultReceivers"
          description: The list of collaboration members who are allowed to receive results of queries run with this configured table.
        allowedAdditionalAnalyses:
          $ref: "#/components/schemas/AllowedAdditionalAnalyses"
          description: The list of resources or wildcards (ARNs) that are allowed to perform additional analysis on query output. The allowedAdditionalAnalyses parameter is currently supported for the list analysis rule (AnalysisRuleList) and the custom analysis rule (AnalysisRuleCustom).
    ConfiguredTableAssociationAnalysisRuleCustom:
      description: The configured table association analysis rule applied to a configured table with the custom analysis rule.
      type: object
      properties:
        allowedResultReceivers:
          $ref: "#/components/schemas/AllowedResultReceivers"
          description: The list of collaboration members who are allowed to receive results of queries run with this configured table.
        allowedAdditionalAnalyses:
          $ref: "#/components/schemas/AllowedAdditionalAnalyses"
          description: The list of resources or wildcards (ARNs) that are allowed to perform additional analysis on query output.
    ConsolidatedPolicy:
      description: Controls on the analysis specifications that can be run on a configured table.
      type: object
      properties:
        v1:
          $ref: "#/components/schemas/ConsolidatedPolicyV1"
          description: The consolidated policy version 1.
    ConsolidatedPolicyV1:
      description: Controls on the analysis specifications that can be run on a configured table.
      type: object
      properties:
        list:
          $ref: "#/components/schemas/ConsolidatedPolicyList"
          description: The list of consolidated policies.
        aggregation:
          $ref: "#/components/schemas/ConsolidatedPolicyAggregation"
          description: The aggregation setting for the consolidated policy.
        custom:
          $ref: "#/components/schemas/ConsolidatedPolicyCustom"
          description: Custom policy
    ConsolidatedPolicyList:
      description: Controls on the analysis specifications that can be run on a configured table.
      type: object
      properties:
        joinColumns:
          $ref: "#/components/schemas/ConsolidatedPolicyListJoinColumnsList"
          description: The columns to join on.
        allowedJoinOperators:
          $ref: "#/components/schemas/JoinOperatorsList"
          description: The allowed join operators in the consolidated policy list.
        listColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: The columns in the consolidated policy list.
        additionalAnalyses:
          $ref: "#/components/schemas/AdditionalAnalyses"
          description: Additional analyses for the consolidated policy list.
        allowedResultReceivers:
          $ref: "#/components/schemas/AllowedResultReceivers"
          description: The allowed result receivers.
        allowedAdditionalAnalyses:
          $ref: "#/components/schemas/AllowedAdditionalAnalyses"
          description: The additional analyses allowed by the consolidated policy list.
