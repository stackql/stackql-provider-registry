                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Tags a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CleanroomsArn"
          description: The Amazon Resource Name (ARN) associated with the resource you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes a tag or list of tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CleanroomsArn"
          description: The Amazon Resource Name (ARN) associated with the resource you want to remove the tag from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: A list of key names of tags to be removed.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /memberships/{membership_identifier}/idmappingtables/{id_mapping_table_identifier}/populate:
    post:
      operationId: PopulateIdMappingTable
      description: Defines the information that's necessary to populate an ID mapping table.
      parameters:
        - name: id_mapping_table_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The unique identifier of the ID mapping table that you want to populate.
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: The unique identifier of the membership that contains the ID mapping table that you want to populate.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                jobType:
                  $ref: "#/components/schemas/JobType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopulateIdMappingTableOutput"
  /memberships/{membership_identifier}/previewprivacyimpact:
    post:
      operationId: PreviewPrivacyImpact
      description: An estimate of the number of aggregation functions that the member who can query can run given epsilon and noise parameters.
      parameters:
        - name: membership_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipIdentifier"
          description: A unique identifier for one of your memberships for a collaboration. Accepts a membership ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parameters:
                  $ref: "#/components/schemas/PreviewPrivacyImpactParametersInput"
              required:
                - parameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewPrivacyImpactOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CollaborationIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    AnalysisTemplateArnList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisTemplateArn"
    AnalysisTemplateArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:aws[-a-z]*:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/analysistemplate/[\d\w-]+
    BatchGetCollaborationAnalysisTemplateOutput:
      type: object
      properties:
        collaborationAnalysisTemplates:
          $ref: "#/components/schemas/CollaborationAnalysisTemplateList"
          description: The retrieved list of analysis templates within a collaboration.
        errors:
          $ref: "#/components/schemas/BatchGetCollaborationAnalysisTemplateErrorList"
          description: Error reasons for collaboration analysis templates that could not be retrieved. One error is returned for every collaboration analysis template that could not be retrieved.
      required:
        - collaborationAnalysisTemplates
        - errors
    CollaborationAnalysisTemplateList:
      type: array
      items:
        $ref: "#/components/schemas/CollaborationAnalysisTemplate"
    CollaborationAnalysisTemplate:
      description: The analysis template within a collaboration.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AnalysisTemplateIdentifier"
          description: The identifier of the analysis template.
        arn:
          $ref: "#/components/schemas/AnalysisTemplateArn"
          description: The Amazon Resource Name (ARN) of the analysis template.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: A unique identifier for the collaboration that the analysis templates belong to. Currently accepts collaboration ID.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The unique ARN for the analysis template’s associated collaboration.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the analysis template.
        creatorAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The identifier used to reference members of the collaboration. Currently only supports Amazon Web Services account ID.
        name:
          $ref: "#/components/schemas/ResourceAlias"
          description: The name of the analysis template.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the analysis template within a collaboration was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time that the analysis template in the collaboration was last updated.
        schema:
          $ref: "#/components/schemas/AnalysisSchema"
          description: The entire schema object.
        format_:
          $ref: "#/components/schemas/AnalysisFormat"
          description: The format of the analysis template in the collaboration.
        source:
          $ref: "#/components/schemas/AnalysisSource"
          description: The source of the analysis template within a collaboration.
        sourceMetadata:
          $ref: "#/components/schemas/AnalysisSourceMetadata"
          description: The source metadata for the collaboration analysis template.
        analysisParameters:
          $ref: "#/components/schemas/AnalysisParameterList"
          description: The analysis parameters that have been specified in the analysis template.
        validations:
          $ref: "#/components/schemas/AnalysisTemplateValidationStatusDetailList"
          description: The validations that were performed.
        errorMessageConfiguration:
          $ref: "#/components/schemas/ErrorMessageConfiguration"
          description: The configuration that specifies the level of detail in error messages returned by analyses using this template. When set to DETAILED, error messages include more information to help troubleshoot issues with PySpark jobs. Detailed error messages may expose underlying data, including sensitive information. Recommended for faster troubleshooting in development and testing environments.
        syntheticDataParameters:
          $ref: "#/components/schemas/SyntheticDataParameters"
          description: The synthetic data generation parameters configured for this collaboration analysis template.
      required:
        - id
        - arn
        - collaborationId
        - collaborationArn
        - creatorAccountId
        - name
        - createTime
        - updateTime
        - schema
        - format_
    AnalysisTemplateIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    UUID:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    CollaborationArn:
      type: string
      minLength: 0
      maxLength: 100
      pattern: arn:aws:[\w]+:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:collaboration/[\d\w-]+
    ResourceDescription:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDBFF-\\uDC00\\uDFFF\\t\\r\\n]*"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: \d+
    ResourceAlias:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_ ]+-)*([a-zA-Z0-9_ ]+))?"
    Timestamp:
      type: string
      format: date-time
    AnalysisSchema:
      description: A relation within an analysis.
      type: object
      properties:
        referencedTables:
          $ref: "#/components/schemas/QueryTables"
          description: The tables referenced in the analysis schema.
    QueryTables:
      type: array
      items:
        $ref: "#/components/schemas/TableAlias"
    TableAlias:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_ ]+-)*([a-zA-Z0-9_ ]+))?"
    AnalysisFormat:
      type: string
      enum:
        - SQL
        - PYSPARK_1_0
    AnalysisSource:
      description: The structure that defines the body of the analysis template.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/AnalysisTemplateText"
          description: The query text.
        artifacts:
          $ref: "#/components/schemas/AnalysisTemplateArtifacts"
          description: The artifacts of the analysis source.
    AnalysisTemplateText:
      type: string
      minLength: 0
      maxLength: 500000
    AnalysisTemplateArtifacts:
      description: The analysis template artifacts.
      type: object
      properties:
        entryPoint:
          $ref: "#/components/schemas/AnalysisTemplateArtifact"
          description: The entry point for the analysis template artifacts.
        additionalArtifacts:
          $ref: "#/components/schemas/AnalysisTemplateArtifactList"
          description: Additional artifacts for the analysis template.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The role ARN for the analysis template artifacts.
      required:
        - entryPoint
        - roleArn
    AnalysisTemplateArtifact:
      description: The analysis template artifact.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/S3Location"
          description: The artifact location.
      required:
        - location
    S3Location:
      description: The S3 location.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3LocationBucketString"
          description: The bucket name.
        key:
          $ref: "#/components/schemas/S3LocationKeyString"
          description: The object key.
      required:
        - bucket
        - key
    S3LocationBucketString:
      type: string
      minLength: 3
      maxLength: 63
      pattern: .*(?!^(\d+\.)+\d+$)(^(([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])\.)*([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])$).*
    S3LocationKeyString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[a-zA-Z0-9!_.*'()-/]+"
    AnalysisTemplateArtifactList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisTemplateArtifact"
    RoleArn:
      type: string
      minLength: 32
      maxLength: 512
      pattern: arn:aws:iam::[\w]+:role/[\w+=./@-]+
    AnalysisSourceMetadata:
      description: The analysis source metadata.
      type: object
      properties:
        artifacts:
          $ref: "#/components/schemas/AnalysisTemplateArtifactMetadata"
          description: The artifacts of the analysis source metadata.
    AnalysisTemplateArtifactMetadata:
      description: The analysis template artifact metadata.
      type: object
      properties:
        entryPointHash:
          $ref: "#/components/schemas/Hash"
          description: The hash of the entry point for the analysis template artifact metadata.
        additionalArtifactHashes:
          $ref: "#/components/schemas/HashList"
          description: Additional artifact hashes for the analysis template.
      required:
        - entryPointHash
    Hash:
      description: Hash
      type: object
      properties:
        sha256:
          $ref: "#/components/schemas/String"
          description: The SHA-256 hash value.
    String:
      type: string
    HashList:
      type: array
      items:
        $ref: "#/components/schemas/Hash"
    AnalysisParameterList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisParameter"
    AnalysisParameter:
      description: Optional. The member who can query can provide this placeholder for a literal data value in an analysis template.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ParameterName"
          description: The name of the parameter. The name must use only alphanumeric or underscore (_) characters.
        type_:
          $ref: "#/components/schemas/ParameterType"
          description: The type of parameter.
        defaultValue:
          $ref: "#/components/schemas/ParameterValue"
          description: Optional. The default value that is applied in the analysis template. The member who can query can override this value in the query editor.
      required:
        - name
        - type_
    ParameterName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[0-9a-zA-Z_]+"
    ParameterType:
      type: string
      enum:
        - SMALLINT
        - INTEGER
        - BIGINT
        - DECIMAL
        - REAL
        - DOUBLE_PRECISION
        - BOOLEAN
        - CHAR
        - VARCHAR
        - DATE
        - TIMESTAMP
        - TIMESTAMPTZ
        - TIME
        - TIMETZ
        - VARBYTE
        - BINARY
        - BYTE
        - CHARACTER
        - DOUBLE
        - FLOAT
        - INT
        - LONG
        - NUMERIC
        - SHORT
        - STRING
        - TIMESTAMP_LTZ
        - TIMESTAMP_NTZ
        - TINYINT
    ParameterValue:
      type: string
      minLength: 0
      maxLength: 1000
    AnalysisTemplateValidationStatusDetailList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisTemplateValidationStatusDetail"
    AnalysisTemplateValidationStatusDetail:
      description: The status details of the analysis template validation. Clean Rooms Differential Privacy uses a general-purpose query structure to support complex SQL queries and validates whether an analysis template fits that general-purpose query structure. Validation is performed when analysis templates are created and fetched. Because analysis templates are immutable by design, we recommend that you create analysis templates after you associate the configured tables with their analysis rule to your collaboration. For more information, see https://docs.aws.amazon.com/clean-rooms/latest/userguide/analysis-rules-custom.html#custom-diff-privacy.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/AnalysisTemplateValidationType"
          description: The type of validation that was performed.
        status:
          $ref: "#/components/schemas/AnalysisTemplateValidationStatus"
          description: The status of the validation.
        reasons:
          $ref: "#/components/schemas/AnalysisTemplateValidationStatusReasonList"
          description: The reasons for the validation results.
      required:
        - type_
        - status
    AnalysisTemplateValidationType:
      type: string
      enum:
        - DIFFERENTIAL_PRIVACY
    AnalysisTemplateValidationStatus:
      type: string
      enum:
        - VALID
        - INVALID
        - UNABLE_TO_VALIDATE
    AnalysisTemplateValidationStatusReasonList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisTemplateValidationStatusReason"
    AnalysisTemplateValidationStatusReason:
      description: The reasons for the validation results.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/String"
          description: The validation message.
      required:
        - message
    ErrorMessageConfiguration:
      description: A structure that defines the level of detail included in error messages returned by PySpark jobs. This configuration allows you to control the verbosity of error messages to help with troubleshooting PySpark jobs while maintaining appropriate security controls.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ErrorMessageType"
          description: The level of detail for error messages returned by the PySpark job. When set to DETAILED, error messages include more information to help troubleshoot issues with your PySpark job. Because this setting may expose sensitive data, it is recommended for development and testing environments.
      required:
        - type_
    ErrorMessageType:
      type: string
      enum:
        - DETAILED
    SyntheticDataParameters:
      description: The parameters that control how synthetic data is generated, including privacy settings, column classifications, and other configuration options that affect the data synthesis process.
      type: object
      properties:
        mlSyntheticDataParameters:
          $ref: "#/components/schemas/MLSyntheticDataParameters"
          description: The machine learning-specific parameters for synthetic data generation.
    MLSyntheticDataParameters:
      description: Parameters that control the generation of synthetic data for machine learning, including privacy settings and column classification details.
      type: object
      properties:
        epsilon:
          $ref: "#/components/schemas/MLSyntheticDataParametersEpsilonDouble"
          description: The epsilon value for differential privacy when generating synthetic data. Lower values provide stronger privacy guarantees but may reduce data utility.
        maxMembershipInferenceAttackScore:
          $ref: "#/components/schemas/MaxMembershipInferenceAttackScore"
          description: The maximum acceptable score for membership inference attack vulnerability. Synthetic data generation fails if the score for the resulting data exceeds this threshold.
        columnClassification:
          $ref: "#/components/schemas/ColumnClassificationDetails"
          description: Classification details for data columns that specify how each column should be treated during synthetic data generation.
      required:
        - epsilon
        - maxMembershipInferenceAttackScore
        - columnClassification
    MLSyntheticDataParametersEpsilonDouble:
      type: number
      format: double
      minimum: 0.0001
      maximum: 10
    MaxMembershipInferenceAttackScore:
      type: number
      format: double
      minimum: 0.5
      maximum: 1
    ColumnClassificationDetails:
      description: Contains classification information for data columns, including mappings that specify how columns should be handled during synthetic data generation and privacy analysis.
      type: object
      properties:
        columnMapping:
          $ref: "#/components/schemas/ColumnMappingList"
          description: A mapping that defines the classification of data columns for synthetic data generation and specifies how each column should be handled during the privacy-preserving data synthesis process.
      required:
        - columnMapping
    ColumnMappingList:
      type: array
      items:
        $ref: "#/components/schemas/SyntheticDataColumnProperties"
    SyntheticDataColumnProperties:
      description: Properties that define how a specific data column should be handled during synthetic data generation, including its name, type, and role in predictive modeling.
      type: object
      properties:
        columnName:
          $ref: "#/components/schemas/SyntheticDataColumnName"
          description: The name of the data column as it appears in the dataset.
        columnType:
          $ref: "#/components/schemas/SyntheticDataColumnType"
          description: The data type of the column, which determines how the synthetic data generation algorithm processes and synthesizes values for this column.
        isPredictiveValue:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if this column contains predictive values that should be treated as target variables in machine learning models. This affects how the synthetic data generation preserves statistical relationships.
      required:
        - columnName
        - columnType
        - isPredictiveValue
    SyntheticDataColumnName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-z0-9_](([a-z0-9_]+-)*([a-z0-9_]+))?"
    SyntheticDataColumnType:
      type: string
      enum:
        - CATEGORICAL
        - NUMERICAL
    Boolean:
      type: boolean
    BatchGetCollaborationAnalysisTemplateErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetCollaborationAnalysisTemplateError"
    BatchGetCollaborationAnalysisTemplateError:
      description: Details of errors thrown by the call to retrieve multiple analysis templates within a collaboration by their identifiers.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/AnalysisTemplateArn"
          description: The Amazon Resource Name (ARN) of the analysis template.
        code:
          $ref: "#/components/schemas/String"
          description: An error code for the error.
        message:
          $ref: "#/components/schemas/String"
          description: A description of why the call failed.
      required:
        - arn
        - code
        - message
    TableAliasList:
      type: array
      items:
        $ref: "#/components/schemas/TableAlias"
    BatchGetSchemaOutput:
      type: object
      properties:
        schemas:
          $ref: "#/components/schemas/SchemaList"
          description: The retrieved list of schemas.
        errors:
          $ref: "#/components/schemas/BatchGetSchemaErrorList"
          description: Error reasons for schemas that could not be retrieved. One error is returned for every schema that could not be retrieved.
      required:
        - schemas
        - errors
    SchemaList:
      type: array
      items:
        $ref: "#/components/schemas/Schema"
    Schema:
      description: A schema is a relation within a collaboration.
      type: object
      properties:
        columns:
          $ref: "#/components/schemas/ColumnList"
          description: The columns for the relation that this schema represents.
        partitionKeys:
          $ref: "#/components/schemas/ColumnList"
          description: The partition keys for the dataset underlying this schema.
        analysisRuleTypes:
          $ref: "#/components/schemas/AnalysisRuleTypeList"
          description: The analysis rule types that are associated with the schema. Currently, only one entry is present.
        analysisMethod:
          $ref: "#/components/schemas/AnalysisMethod"
          description: The analysis method for the schema. DIRECT_QUERY allows SQL queries to be run directly on this table. DIRECT_JOB allows PySpark jobs to be run directly on this table. MULTIPLE allows both SQL queries and PySpark jobs to be run directly on this table.
        selectedAnalysisMethods:
          $ref: "#/components/schemas/SelectedAnalysisMethods"
          description: The selected analysis methods for the schema.
        creatorAccountId:
          $ref: "#/components/schemas/AccountId"
          description: The unique account ID for the Amazon Web Services account that owns the schema.
        name:
          $ref: "#/components/schemas/TableAlias"
          description: A name for the schema. The schema relation is referred to by this name when queried by a protected query.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the collaboration that the schema belongs to.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The unique Amazon Resource Name (ARN) for the collaboration that the schema belongs to.
        description:
          $ref: "#/components/schemas/TableDescription"
          description: A description for the schema.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the schema was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent time at which the schema was updated.
        type_:
          $ref: "#/components/schemas/SchemaType"
          description: The type of schema.
        schemaStatusDetails:
          $ref: "#/components/schemas/SchemaStatusDetailList"
          description: Details about the status of the schema. Currently, only one entry is present.
        resourceArn:
          $ref: "#/components/schemas/SchemaResourceArn"
          description: The Amazon Resource Name (ARN) of the schema resource.
        schemaTypeProperties:
          $ref: "#/components/schemas/SchemaTypeProperties"
          description: The schema type properties.
      required:
        - columns
        - partitionKeys
        - analysisRuleTypes
        - creatorAccountId
        - name
        - collaborationId
        - collaborationArn
        - description
        - createTime
        - updateTime
        - type_
        - schemaStatusDetails
    ColumnList:
      type: array
      items:
        $ref: "#/components/schemas/Column"
    Column:
      description: A column within a schema relation, derived from the underlying table.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ColumnName"
          description: The name of the column.
        type_:
          $ref: "#/components/schemas/ColumnTypeString"
          description: The type of the column.
      required:
        - name
        - type_
    ColumnName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-z0-9_](([a-z0-9_ ]+-)*([a-z0-9_ ]+))?"
    ColumnTypeString:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDBFF-\\uDC00\\uDFFF\\t]*"
    AnalysisRuleTypeList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleType"
    AnalysisRuleType:
      type: string
      enum:
        - AGGREGATION
        - LIST
        - CUSTOM
        - ID_MAPPING_TABLE
    AnalysisMethod:
      type: string
      enum:
        - DIRECT_QUERY
        - DIRECT_JOB
        - MULTIPLE
    SelectedAnalysisMethods:
      type: array
      items:
        $ref: "#/components/schemas/SelectedAnalysisMethod"
    SelectedAnalysisMethod:
      type: string
      enum:
        - DIRECT_QUERY
        - DIRECT_JOB
    TableDescription:
      type: string
      minLength: 0
      maxLength: 255
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDBFF-\\uDC00\\uDFFF\\t\\r\\n]*"
    SchemaType:
      type: string
      enum:
        - TABLE
        - ID_MAPPING_TABLE
    SchemaStatusDetailList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaStatusDetail"
    SchemaStatusDetail:
      description: Information about the schema status. A status of READY means that based on the schema analysis rule, queries of the given analysis rule type are properly configured to run queries on this schema.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/SchemaStatus"
          description: The status of the schema, indicating if it is ready to query.
        reasons:
          $ref: "#/components/schemas/SchemaStatusReasonList"
          description: The reasons why the schema status is set to its current state.
        analysisRuleType:
          $ref: "#/components/schemas/AnalysisRuleType"
          description: The analysis rule type for which the schema status has been evaluated.
        configurations:
          $ref: "#/components/schemas/SchemaConfigurationList"
          description: The configuration details of the schema analysis rule for the given type.
        analysisType:
          $ref: "#/components/schemas/AnalysisType"
          description: The type of analysis that can be performed on the schema. A schema can have an analysisType of DIRECT_ANALYSIS, ADDITIONAL_ANALYSIS_FOR_AUDIENCE_GENERATION, or both.
      required:
        - status
        - analysisType
    SchemaStatus:
      type: string
      enum:
        - READY
        - NOT_READY
    SchemaStatusReasonList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaStatusReason"
    SchemaStatusReason:
      description: A reason why the schema status is set to its current value.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/SchemaStatusReasonCode"
          description: The schema status reason code.
        message:
          $ref: "#/components/schemas/String"
          description: An explanation of the schema status reason code.
      required:
        - code
        - message
    SchemaStatusReasonCode:
      type: string
      enum:
        - ANALYSIS_RULE_MISSING
        - ANALYSIS_TEMPLATES_NOT_CONFIGURED
        - ANALYSIS_PROVIDERS_NOT_CONFIGURED
        - DIFFERENTIAL_PRIVACY_POLICY_NOT_CONFIGURED
        - ID_MAPPING_TABLE_NOT_POPULATED
        - COLLABORATION_ANALYSIS_RULE_NOT_CONFIGURED
        - ADDITIONAL_ANALYSES_NOT_CONFIGURED
        - RESULT_RECEIVERS_NOT_CONFIGURED
        - ADDITIONAL_ANALYSES_NOT_ALLOWED
        - RESULT_RECEIVERS_NOT_ALLOWED
        - ANALYSIS_RULE_TYPES_NOT_COMPATIBLE
    SchemaConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaConfiguration"
    SchemaConfiguration:
      type: string
      enum:
        - DIFFERENTIAL_PRIVACY
    AnalysisType:
      type: string
      enum:
        - DIRECT_ANALYSIS
        - ADDITIONAL_ANALYSIS
    SchemaResourceArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:aws:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership\/[\d\w-]+\/(configuredtableassociation|idmappingtable)\/[\d\w-]+
    SchemaTypeProperties:
      description: Information about the schema type properties.
      type: object
      properties:
        idMappingTable:
          $ref: "#/components/schemas/IdMappingTableSchemaTypeProperties"
          description: The ID mapping table for the schema type properties.
    IdMappingTableSchemaTypeProperties:
      description: Additional properties that are specific to the type of the associated schema.
      type: object
      properties:
        idMappingTableInputSource:
          $ref: "#/components/schemas/IdMappingTableInputSourceList"
          description: Defines which ID namespace associations are used to create the ID mapping table.
      required:
        - idMappingTableInputSource
    IdMappingTableInputSourceList:
      type: array
      items:
        $ref: "#/components/schemas/IdMappingTableInputSource"
    IdMappingTableInputSource:
      description: The input source of the ID mapping table.
      type: object
      properties:
        idNamespaceAssociationId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the ID namespace association.
        type_:
          $ref: "#/components/schemas/IdNamespaceType"
          description: The type of the input source of the ID mapping table.
      required:
        - idNamespaceAssociationId
        - type_
    IdNamespaceType:
      type: string
      enum:
        - SOURCE
        - TARGET
    BatchGetSchemaErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetSchemaError"
    BatchGetSchemaError:
      description: An error describing why a schema could not be fetched.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TableAlias"
          description: An error name for the error.
        code:
          $ref: "#/components/schemas/String"
          description: An error code for the error.
        message:
          $ref: "#/components/schemas/String"
          description: An error message for the error.
      required:
        - name
        - code
        - message
    SchemaAnalysisRuleRequestList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaAnalysisRuleRequest"
    SchemaAnalysisRuleRequest:
      description: Defines the information that's necessary to retrieve an analysis rule schema. Schema analysis rules are uniquely identiﬁed by a combination of the schema name and the analysis rule type for a given collaboration.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TableAlias"
          description: The name of the analysis rule schema that you are requesting.
        type_:
          $ref: "#/components/schemas/AnalysisRuleType"
          description: The type of analysis rule schema that you are requesting.
      required:
        - name
        - type_
    BatchGetSchemaAnalysisRuleOutput:
      type: object
      properties:
        analysisRules:
          $ref: "#/components/schemas/SchemaAnalysisRuleList"
          description: The retrieved list of analysis rules.
        errors:
          $ref: "#/components/schemas/BatchGetSchemaAnalysisRuleErrorList"
          description: Error reasons for schemas that could not be retrieved. One error is returned for every schema that could not be retrieved.
      required:
        - analysisRules
        - errors
    SchemaAnalysisRuleList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRule"
    AnalysisRule:
      description: A specification about how data from the configured table can be used in a query.
      type: object
      properties:
        collaborationId:
          $ref: "#/components/schemas/CollaborationIdentifier"
          description: The unique ID for the associated collaboration.
        type_:
          $ref: "#/components/schemas/AnalysisRuleType"
          description: The type of analysis rule.
        name:
          $ref: "#/components/schemas/TableAlias"
          description: The name for the analysis rule.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the analysis rule was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the analysis rule was last updated.
        policy:
          $ref: "#/components/schemas/AnalysisRulePolicy"
          description: A policy that describes the associated data usage limitations.
        collaborationPolicy:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRulePolicy"
        consolidatedPolicy:
          $ref: "#/components/schemas/ConsolidatedPolicy"
          description: The consolidated policy for the analysis rule.
      required:
        - collaborationId
        - type_
        - name
        - createTime
        - updateTime
        - policy
    AnalysisRulePolicy:
      description: Controls on the query specifications that can be run on configured table.
      type: object
      properties:
        v1:
          $ref: "#/components/schemas/AnalysisRulePolicyV1"
          description: Controls on the query specifications that can be run on configured table.
    AnalysisRulePolicyV1:
      description: Controls on the query specifications that can be run on configured table.
      type: object
      properties:
        list:
          $ref: "#/components/schemas/AnalysisRuleList"
          description: Analysis rule type that enables only list queries on a configured table.
        aggregation:
          $ref: "#/components/schemas/AnalysisRuleAggregation"
          description: Analysis rule type that enables only aggregation queries on a configured table.
        custom:
          $ref: "#/components/schemas/AnalysisRuleCustom"
          description: Analysis rule type that enables custom SQL queries on a configured table.
        idMappingTable:
          $ref: "#/components/schemas/AnalysisRuleIdMappingTable"
          description: The ID mapping table.
    AnalysisRuleList:
      description: A type of analysis rule that enables row-level analysis.
      type: object
      properties:
        joinColumns:
          $ref: "#/components/schemas/AnalysisRuleListJoinColumnsList"
          description: Columns that can be used to join a configured table with the table of the member who can query and other members' configured tables.
        allowedJoinOperators:
          $ref: "#/components/schemas/JoinOperatorsList"
          description: The logical operators (if any) that are to be used in an INNER JOIN match condition. Default is AND.
        listColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: Columns that can be listed in the output.
        additionalAnalyses:
          $ref: "#/components/schemas/AdditionalAnalyses"
          description: An indicator as to whether additional analyses (such as Clean Rooms ML) can be applied to the output of the direct query.
      required:
        - joinColumns
        - listColumns
    AnalysisRuleListJoinColumnsList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleColumnName"
    AnalysisRuleColumnName:
      type: string
      minLength: 1
      maxLength: 127
      pattern: "[a-z0-9_](([a-z0-9_ ]+-)*([a-z0-9_ ]+))?"
    JoinOperatorsList:
      type: array
      items:
        $ref: "#/components/schemas/JoinOperator"
    JoinOperator:
      type: string
      enum:
        - OR
        - AND
    AnalysisRuleColumnList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleColumnName"
    AdditionalAnalyses:
      type: string
      enum:
        - ALLOWED
        - REQUIRED
        - NOT_ALLOWED
    AnalysisRuleAggregation:
      description: A type of analysis rule that enables query structure and specified queries that produce aggregate statistics.
      type: object
      properties:
        aggregateColumns:
          $ref: "#/components/schemas/AnalysisRuleAggregationAggregateColumnsList"
          description: The columns that query runners are allowed to use in aggregation queries.
        joinColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: Columns in configured table that can be used in join statements and/or as aggregate columns. They can never be outputted directly.
        joinRequired:
          $ref: "#/components/schemas/JoinRequiredOption"
          description: Control that requires member who runs query to do a join with their configured table and/or other configured table in query.
        allowedJoinOperators:
          $ref: "#/components/schemas/JoinOperatorsList"
          description: Which logical operators (if any) are to be used in an INNER JOIN match condition. Default is AND.
        dimensionColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: The columns that query runners are allowed to select, group by, or filter by.
        scalarFunctions:
          $ref: "#/components/schemas/ScalarFunctionsList"
          description: Set of scalar functions that are allowed to be used on dimension columns and the output of aggregation of metrics.
        outputConstraints:
          $ref: "#/components/schemas/AggregationConstraints"
          description: Columns that must meet a specific threshold value (after an aggregation function is applied to it) for each output row to be returned.
        additionalAnalyses:
          $ref: "#/components/schemas/AdditionalAnalyses"
          description: An indicator as to whether additional analyses (such as Clean Rooms ML) can be applied to the output of the direct query. The additionalAnalyses parameter is currently supported for the list analysis rule (AnalysisRuleList) and the custom analysis rule (AnalysisRuleCustom).
      required:
        - aggregateColumns
        - joinColumns
        - dimensionColumns
        - scalarFunctions
        - outputConstraints
    AnalysisRuleAggregationAggregateColumnsList:
      type: array
      items:
        $ref: "#/components/schemas/AggregateColumn"
    AggregateColumn:
      description: Column in configured table that can be used in aggregate function in query.
      type: object
      properties:
        columnNames:
          $ref: "#/components/schemas/AggregateColumnColumnNamesList"
          description: Column names in configured table of aggregate columns.
        function:
          $ref: "#/components/schemas/AggregateFunctionName"
          description: Aggregation function that can be applied to aggregate column in query.
      required:
        - columnNames
        - function
    AggregateColumnColumnNamesList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleColumnName"
    AggregateFunctionName:
      type: string
      enum:
        - SUM
        - SUM_DISTINCT
        - COUNT
        - COUNT_DISTINCT
        - AVG
    JoinRequiredOption:
      type: string
      enum:
        - QUERY_RUNNER
    ScalarFunctionsList:
      type: array
      items:
        $ref: "#/components/schemas/ScalarFunctions"
    ScalarFunctions:
      type: string
      enum:
        - ABS
        - CAST
        - CEILING
        - COALESCE
        - CONVERT
        - CURRENT_DATE
        - DATEADD
        - EXTRACT
        - FLOOR
        - GETDATE
        - LN
        - LOG
        - LOWER
        - ROUND
        - RTRIM
        - SQRT
        - SUBSTRING
        - TO_CHAR
        - TO_DATE
        - TO_NUMBER
        - TO_TIMESTAMP
        - TRIM
        - TRUNC
        - UPPER
    AggregationConstraints:
      type: array
      items:
        $ref: "#/components/schemas/AggregationConstraint"
    AggregationConstraint:
      description: Constraint on query output removing output rows that do not meet a minimum number of distinct values of a specified column.
      type: object
      properties:
        columnName:
          $ref: "#/components/schemas/AnalysisRuleColumnName"
          description: Column in aggregation constraint for which there must be a minimum number of distinct values in an output row for it to be in the query output.
        minimum_:
          $ref: "#/components/schemas/AggregationConstraintMinimumInteger"
          description: The minimum number of distinct values that an output row must be an aggregation of. Minimum threshold of distinct values for a specified column that must exist in an output row for it to be in the query output.
        type_:
          $ref: "#/components/schemas/AggregationType"
          description: The type of aggregation the constraint allows. The only valid value is currently `COUNT_DISTINCT`.
      required:
        - columnName
        - minimum_
        - type_
    AggregationConstraintMinimumInteger:
      type: integer
      minimum: 2
      maximum: 100000
    AggregationType:
      type: string
      enum:
        - COUNT_DISTINCT
    AnalysisRuleCustom:
      description: A type of analysis rule that enables the table owner to approve custom SQL queries on their configured tables. It supports differential privacy.
      type: object
      properties:
        allowedAnalyses:
          $ref: "#/components/schemas/AnalysisRuleCustomAllowedAnalysesList"
          description: The ARN of the analysis templates that are allowed by the custom analysis rule.
        allowedAnalysisProviders:
          $ref: "#/components/schemas/AnalysisRuleCustomAllowedAnalysisProvidersList"
          description: The IDs of the Amazon Web Services accounts that are allowed to query by the custom analysis rule. Required when allowedAnalyses is ANY_QUERY.
        additionalAnalyses:
          $ref: "#/components/schemas/AdditionalAnalyses"
          description: An indicator as to whether additional analyses (such as Clean Rooms ML) can be applied to the output of the direct query.
        disallowedOutputColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: A list of columns that aren't allowed to be shown in the query output.
        differentialPrivacy:
          $ref: "#/components/schemas/DifferentialPrivacyConfiguration"
          description: The differential privacy configuration.
      required:
        - allowedAnalyses
    AnalysisRuleCustomAllowedAnalysesList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisTemplateArnOrQueryWildcard"
    AnalysisTemplateArnOrQueryWildcard:
      type: string
      minLength: 0
      maxLength: 200
      pattern: (ANY_QUERY|ANY_JOB|arn:aws:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/analysistemplate/[\d\w-]+)
    AnalysisRuleCustomAllowedAnalysisProvidersList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    DifferentialPrivacyConfiguration:
      description: Specifies the unique identifier for your users.
      type: object
      properties:
        columns:
          $ref: "#/components/schemas/DifferentialPrivacyColumnList"
          description: The name of the column (such as user_id) that contains the unique identifier of your users whose privacy you want to protect. If you want to turn on diﬀerential privacy for two or more tables in a collaboration, you must conﬁgure the same column as the user identiﬁer column in both analysis rules.
      required:
        - columns
    DifferentialPrivacyColumnList:
      type: array
      items:
        $ref: "#/components/schemas/DifferentialPrivacyColumn"
    DifferentialPrivacyColumn:
      description: Specifies the name of the column that contains the unique identifier of your users, whose privacy you want to protect.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ColumnName"
          description: The name of the column, such as user_id, that contains the unique identifier of your users, whose privacy you want to protect. If you want to turn on differential privacy for two or more tables in a collaboration, you must configure the same column as the user identifier column in both analysis rules.
      required:
        - name
    AnalysisRuleIdMappingTable:
      description: Defines details for the analysis rule ID mapping table.
      type: object
      properties:
        joinColumns:
          $ref: "#/components/schemas/AnalysisRuleIdMappingTableJoinColumnsList"
          description: The columns that query runners are allowed to use in an INNER JOIN statement.
        queryConstraints:
          $ref: "#/components/schemas/QueryConstraintList"
          description: The query constraints of the analysis rule ID mapping table.
        dimensionColumns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: The columns that query runners are allowed to select, group by, or filter by.
      required:
        - joinColumns
        - queryConstraints
    AnalysisRuleIdMappingTableJoinColumnsList:
      type: array
      items:
        $ref: "#/components/schemas/AnalysisRuleColumnName"
    QueryConstraintList:
      type: array
      items:
        $ref: "#/components/schemas/QueryConstraint"
    QueryConstraint:
      description: Provides any necessary query constraint information.
      type: object
      properties:
        requireOverlap:
          $ref: "#/components/schemas/QueryConstraintRequireOverlap"
          description: An array of column names that specifies which columns are required in the JOIN statement.
    QueryConstraintRequireOverlap:
      description: Provides the name of the columns that are required to overlap.
      type: object
      properties:
        columns:
          $ref: "#/components/schemas/AnalysisRuleColumnList"
          description: The columns that are required to overlap.
    ConfiguredTableAssociationAnalysisRulePolicy:
      description: Controls on the query specifications that can be run on an associated configured table.
      type: object
      properties:
        v1:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRulePolicyV1"
          description: The policy for the configured table association analysis rule.
    ConfiguredTableAssociationAnalysisRulePolicyV1:
      description: Controls on the query specifications that can be run on an associated configured table.
      type: object
      properties:
        list:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleList"
          description: Analysis rule type that enables only list queries on a configured table.
        aggregation:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleAggregation"
          description: Analysis rule type that enables only aggregation queries on a configured table.
        custom:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleCustom"
          description: Analysis rule type that enables the table owner to approve custom SQL queries on their configured tables. It supports differential privacy.
    ConfiguredTableAssociationAnalysisRuleList:
      description: The configured table association analysis rule applied to a configured table with the list analysis rule.
      type: object
      properties:
        allowedResultReceivers:
          $ref: "#/components/schemas/AllowedResultReceivers"
