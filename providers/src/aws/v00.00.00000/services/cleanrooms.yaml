          description: A summary of the elements in the privacy budget template.
      required:
        - privacyBudgetTemplate
    PrivacyBudgetTemplate:
      description: An object that defines the privacy budget template.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/PrivacyBudgetTemplateIdentifier"
          description: The unique identifier of the privacy budget template.
        arn:
          $ref: "#/components/schemas/PrivacyBudgetTemplateArn"
          description: The ARN of the privacy budget template.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: The identifier for a membership resource.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The Amazon Resource Name (ARN) of the member who created the privacy budget template.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID of the collaboration that contains this privacy budget template.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The ARN of the collaboration that contains this privacy budget template.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the privacy budget template was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent time at which the privacy budget template was updated.
        privacyBudgetType:
          $ref: "#/components/schemas/PrivacyBudgetType"
          description: Specifies the type of the privacy budget template.
        autoRefresh:
          $ref: "#/components/schemas/PrivacyBudgetTemplateAutoRefresh"
          description: How often the privacy budget refreshes. If you plan to regularly bring new data into the collaboration, use CALENDAR_MONTH to automatically get a new privacy budget for the collaboration every calendar month. Choosing this option allows arbitrary amounts of information to be revealed about rows of the data when repeatedly queried across refreshes. Avoid choosing this if the same rows will be repeatedly queried between privacy budget refreshes.
        parameters:
          $ref: "#/components/schemas/PrivacyBudgetTemplateParametersOutput"
          description: Specifies the epsilon and noise parameters for the privacy budget template.
      required:
        - id
        - arn
        - membershipId
        - membershipArn
        - collaborationId
        - collaborationArn
        - createTime
        - updateTime
        - privacyBudgetType
        - autoRefresh
        - parameters
