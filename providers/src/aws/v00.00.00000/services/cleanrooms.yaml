    AccessBudget:
      description: Controls and tracks usage limits for associated configured tables within a collaboration across queries and job. Supports both period-based budgets that can renew (daily, weekly, or monthly) and fixed lifetime budgets. Contains the resource ARN, remaining budget information, and up to two budget configurations (period-based and lifetime). By default, table usage is unlimited unless a budget is configured.
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/BudgetedResourceArn"
          description: The Amazon Resource Name (ARN) of the access budget resource.
        details:
          $ref: "#/components/schemas/AccessBudgetDetailsList"
          description: Detailed budget information including time bounds, remaining budget, and refresh settings.
        aggregateRemainingBudget:
          $ref: "#/components/schemas/RemainingBudget"
          description: The total remaining budget across all budget parameters, showing the lower value between the per-period budget and lifetime budget for this access budget. For individual parameter budgets, see remainingBudget.
      required:
        - resourceArn
        - details
        - aggregateRemainingBudget
    AccessBudgetDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/AccessBudgetDetails"
    AccessBudgetDetails:
      description: Detailed information about an access budget including time bounds, budget allocation, and configuration settings.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The start time for the access budget period.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The end time for the access budget period.
        remainingBudget:
          $ref: "#/components/schemas/RemainingBudget"
          description: The remaining budget amount available for use within this access budget.
        budget:
          $ref: "#/components/schemas/Budget"
          description: The total budget allocation amount for this access budget.
        budgetType:
          $ref: "#/components/schemas/AccessBudgetType"
          description: "Specifies the time period for limiting table usage in queries and jobs. For calendar-based periods, the budget can renew if auto refresh is enabled. For lifetime budgets, the limit applies to the total usage throughout the collaboration. Valid values are: CALENDAR_DAY - Limit table usage per day. CALENDAR_WEEK - Limit table usage per week. CALENDAR_MONTH - Limit table usage per month. LIFETIME - Limit total table usage for the collaboration duration."
        autoRefresh:
          $ref: "#/components/schemas/AutoRefreshMode"
          description: "Indicates whether the budget automatically refreshes for each time period specified in budgetType. Valid values are: ENABLED - The budget refreshes automatically at the start of each period. DISABLED - The budget must be refreshed manually. NULL - The value is null when budgetType is set to LIFETIME."
      required:
        - startTime
        - remainingBudget
        - budget
        - budgetType
