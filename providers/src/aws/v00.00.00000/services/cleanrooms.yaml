    PrivacyBudgetTemplateAutoRefresh:
      type: string
      enum:
        - CALENDAR_MONTH
        - NONE
    PrivacyBudgetType:
      type: string
      enum:
        - DIFFERENTIAL_PRIVACY
        - ACCESS_BUDGET
    PrivacyBudgetTemplateParametersInput:
      description: The epsilon and noise parameters that you want to use for the privacy budget template.
      type: object
      properties:
        differentialPrivacy:
          $ref: "#/components/schemas/DifferentialPrivacyTemplateParametersInput"
          description: An object that specifies the epsilon and noise parameters.
        accessBudget:
          $ref: "#/components/schemas/AccessBudgetsPrivacyTemplateParametersInput"
          description: Access budget configuration for the privacy budget template input, enabling integration with access budget functionality.
    DifferentialPrivacyTemplateParametersInput:
      description: The epsilon and noise parameter values that you want to use for the differential privacy template.
      type: object
      properties:
        epsilon:
          $ref: "#/components/schemas/Epsilon"
          description: The epsilon value that you want to use.
        usersNoisePerQuery:
          $ref: "#/components/schemas/UsersNoisePerQuery"
          description: Noise added per query is measured in terms of the number of users whose contributions you want to obscure. This value governs the rate at which the privacy budget is depleted.
      required:
        - epsilon
        - usersNoisePerQuery
    Epsilon:
      type: integer
      minimum: 1
      maximum: 20
    UsersNoisePerQuery:
      type: integer
      minimum: 10
      maximum: 100
    AccessBudgetsPrivacyTemplateParametersInput:
      description: Input parameters for privacy budget templates that support access budgets functionality, enabling enhanced budget management capabilities.
      type: object
      properties:
        budgetParameters:
          $ref: "#/components/schemas/BudgetParameters"
          description: An array of budget parameters that define the access budget configuration for the privacy template.
        resourceArn:
          $ref: "#/components/schemas/BudgetedResourceArn"
          description: The Amazon Resource Name (ARN) of the resource associated with this privacy budget template.
      required:
        - budgetParameters
        - resourceArn
    BudgetParameters:
      type: array
      items:
        $ref: "#/components/schemas/BudgetParameter"
    BudgetParameter:
      description: Individual budget parameter configuration that defines specific budget allocation settings for access budgets.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/AccessBudgetType"
          description: The type of budget parameter being configured.
        budget:
          $ref: "#/components/schemas/Budget"
          description: The budget allocation amount for this specific parameter.
        autoRefresh:
          $ref: "#/components/schemas/AutoRefreshMode"
          description: Whether this individual budget parameter automatically refreshes when the budget period resets.
      required:
        - type_
        - budget
    AccessBudgetType:
      type: string
      enum:
        - CALENDAR_DAY
        - CALENDAR_MONTH
        - CALENDAR_WEEK
        - LIFETIME
    Budget:
      type: integer
      minimum: 0
      maximum: 1000000
    AutoRefreshMode:
      type: string
      enum:
        - ENABLED
        - DISABLED
    BudgetedResourceArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:aws:[\w]+:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/configuredtableassociation/[\d\w-]+
    CreatePrivacyBudgetTemplateOutput:
      type: object
      properties:
