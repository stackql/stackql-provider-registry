    MembershipPaymentConfiguration:
      description: An object representing the payment responsibilities accepted by the collaboration member.
      type: object
      properties:
        queryCompute:
          $ref: "#/components/schemas/MembershipQueryComputePaymentConfig"
          description: The payment responsibilities accepted by the collaboration member for query compute costs.
        machineLearning:
          $ref: "#/components/schemas/MembershipMLPaymentConfig"
          description: The payment responsibilities accepted by the collaboration member for machine learning costs.
        jobCompute:
          $ref: "#/components/schemas/MembershipJobComputePaymentConfig"
          description: The payment responsibilities accepted by the collaboration member for job compute costs.
      required:
        - queryCompute
    MembershipQueryComputePaymentConfig:
      description: An object representing the payment responsibilities accepted by the collaboration member for query compute costs.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: "Indicates whether the collaboration member has accepted to pay for query compute costs (TRUE) or has not accepted to pay for query compute costs (FALSE). If the collaboration creator has not specified anyone to pay for query compute costs, then the member who can query is the default payer. An error message is returned for the following reasons: If you set the value to FALSE but you are responsible to pay for query compute costs. If you set the value to TRUE but you are not responsible to pay for query compute costs."
      required:
        - isResponsible
    MembershipMLPaymentConfig:
      description: An object representing the collaboration member's machine learning payment responsibilities set by the collaboration creator.
      type: object
      properties:
        modelTraining:
          $ref: "#/components/schemas/MembershipModelTrainingPaymentConfig"
          description: The payment responsibilities accepted by the member for model training.
        modelInference:
          $ref: "#/components/schemas/MembershipModelInferencePaymentConfig"
          description: The payment responsibilities accepted by the member for model inference.
        syntheticDataGeneration:
          $ref: "#/components/schemas/MembershipSyntheticDataGenerationPaymentConfig"
          description: The payment configuration for synthetic data generation for this machine learning membership.
    MembershipModelTrainingPaymentConfig:
      description: An object representing the collaboration member's model training payment responsibilities set by the collaboration creator.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: "Indicates whether the collaboration member has accepted to pay for model training costs (TRUE) or has not accepted to pay for model training costs (FALSE). If the collaboration creator has not specified anyone to pay for model training costs, then the member who can query is the default payer. An error message is returned for the following reasons: If you set the value to FALSE but you are responsible to pay for model training costs. If you set the value to TRUE but you are not responsible to pay for model training costs."
      required:
        - isResponsible
    MembershipModelInferencePaymentConfig:
      description: An object representing the collaboration member's model inference payment responsibilities set by the collaboration creator.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: "Indicates whether the collaboration member has accepted to pay for model inference costs (TRUE) or has not accepted to pay for model inference costs (FALSE). If the collaboration creator has not specified anyone to pay for model inference costs, then the member who can query is the default payer. An error message is returned for the following reasons: If you set the value to FALSE but you are responsible to pay for model inference costs. If you set the value to TRUE but you are not responsible to pay for model inference costs."
      required:
        - isResponsible
    MembershipSyntheticDataGenerationPaymentConfig:
      description: Configuration for payment for synthetic data generation in a membership.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if this membership is responsible for paying for synthetic data generation.
      required:
        - isResponsible
    MembershipJobComputePaymentConfig:
      description: An object representing the payment responsibilities accepted by the collaboration member for query and job compute costs.
      type: object
      properties:
        isResponsible:
          $ref: "#/components/schemas/Boolean"
          description: "Indicates whether the collaboration member has accepted to pay for job compute costs (TRUE) or has not accepted to pay for query and job compute costs (FALSE). There is only one member who pays for queries and jobs. An error message is returned for the following reasons: If you set the value to FALSE but you are responsible to pay for query and job compute costs. If you set the value to TRUE but you are not responsible to pay for query and job compute costs."
      required:
        - isResponsible
