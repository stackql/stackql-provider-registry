    GlueDatabaseName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_]+-)*([a-zA-Z0-9_]+))?"
    SnowflakeTableReference:
      description: A reference to a table within Snowflake.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/SecretsManagerArn"
          description: The secret ARN of the Snowflake table reference.
        accountIdentifier:
          $ref: "#/components/schemas/SnowflakeAccountIdentifier"
          description: The account identifier for the Snowflake table reference.
        databaseName:
          $ref: "#/components/schemas/SnowflakeDatabaseName"
          description: The name of the database the Snowflake table belongs to.
        tableName:
          $ref: "#/components/schemas/SnowflakeTableName"
          description: The name of the Snowflake table.
        schemaName:
          $ref: "#/components/schemas/SnowflakeSchemaName"
          description: The schema name of the Snowflake table reference.
        tableSchema:
          $ref: "#/components/schemas/SnowflakeTableSchema"
          description: The schema of the Snowflake table.
      required:
        - secretArn
        - accountIdentifier
        - databaseName
        - tableName
        - schemaName
        - tableSchema
    SecretsManagerArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws:secretsmanager:[a-z]{2}-[a-z]+-[0-9]:\d{12}:secret:.*
    SnowflakeAccountIdentifier:
      type: string
      minLength: 3
      maxLength: 256
      pattern: "[\\p{L}\\p{M}\\p{N}\\p{Pc}\\p{Pd}\\p{Zs}.]+"
    SnowflakeDatabaseName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}\\p{M}\\p{N}\\p{Pc}\\p{Pd}\\p{Zs}]+"
    SnowflakeTableName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}\\p{M}\\p{N}\\p{Pc}\\p{Pd}\\p{Zs}]+"
    SnowflakeSchemaName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}\\p{M}\\p{N}\\p{Pc}\\p{Pd}\\p{Zs}]+"
    SnowflakeTableSchema:
      description: The schema of a Snowflake table.
      type: object
      properties:
        v1:
          $ref: "#/components/schemas/SnowflakeTableSchemaList"
          description: The schema of a Snowflake table.
    SnowflakeTableSchemaList:
      type: array
      items:
        $ref: "#/components/schemas/SnowflakeTableSchemaV1"
    SnowflakeTableSchemaV1:
      description: The Snowflake table schema.
      type: object
      properties:
        columnName:
          $ref: "#/components/schemas/ColumnName"
          description: The column name.
        columnType:
          $ref: "#/components/schemas/ColumnTypeString"
          description: "The column's data type. Supported data types: ARRAY, BIGINT, BOOLEAN, CHAR, DATE, DECIMAL, DOUBLE, DOUBLE PRECISION, FLOAT, FLOAT4, INT, INTEGER, MAP, NUMERIC, NUMBER, REAL, SMALLINT, STRING, TIMESTAMP, TIMESTAMP_LTZ, TIMESTAMP_NTZ, DATETIME, TINYINT, VARCHAR, TEXT, CHARACTER."
      required:
        - columnName
        - columnType
    AthenaTableReference:
      description: A reference to a table within Athena.
      type: object
      properties:
        region:
          $ref: "#/components/schemas/CommercialRegion"
          description: The Amazon Web Services Region where the Athena table is located. This parameter is required to uniquely identify and access tables across different Regions.
        workGroup:
          $ref: "#/components/schemas/AthenaWorkGroup"
          description: The workgroup of the Athena table reference.
        outputLocation:
          $ref: "#/components/schemas/AthenaOutputLocation"
          description: The output location for the Athena table.
        databaseName:
          $ref: "#/components/schemas/AthenaDatabaseName"
          description: The database name.
        tableName:
          $ref: "#/components/schemas/AthenaTableName"
          description: The table reference.
        catalogName:
          $ref: "#/components/schemas/AthenaCatalogName"
          description: The catalog name.
      required:
        - workGroup
        - databaseName
        - tableName
    AthenaWorkGroup:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([a-zA-Z0-9._-])*
    AthenaOutputLocation:
      type: string
      minLength: 8
      maxLength: 1024
      pattern: s3://[a-z0-9.-]{3,63}(.*)
    AthenaDatabaseName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_]+-)*([a-zA-Z0-9_]+))?"
    AthenaTableName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9_](([a-zA-Z0-9_]+)*([a-zA-Z0-9_]+))?"
    AthenaCatalogName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9_-]+"
    AllowedColumnList:
      type: array
      items:
        $ref: "#/components/schemas/ColumnName"
    CreateConfiguredTableOutput:
      type: object
      properties:
        configuredTable:
          $ref: "#/components/schemas/ConfiguredTable"
          description: The created configured table.
      required:
        - configuredTable
    ConfiguredTable:
      description: A table that has been configured for use in a collaboration.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the configured table.
        arn:
          $ref: "#/components/schemas/ConfiguredTableArn"
          description: The unique ARN for the configured table.
        name:
          $ref: "#/components/schemas/DisplayName"
          description: A name for the configured table.
        description:
          $ref: "#/components/schemas/TableDescription"
          description: A description for the configured table.
        tableReference:
          $ref: "#/components/schemas/TableReference"
          description: The table that this configured table represents.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the configured table was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the configured table was last updated
        analysisRuleTypes:
          $ref: "#/components/schemas/ConfiguredTableAnalysisRuleTypeList"
          description: The types of analysis rules associated with this configured table. Currently, only one analysis rule may be associated with a configured table.
        analysisMethod:
          $ref: "#/components/schemas/AnalysisMethod"
          description: The analysis method for the configured table. DIRECT_QUERY allows SQL queries to be run directly on this table. DIRECT_JOB allows PySpark jobs to be run directly on this table. MULTIPLE allows both SQL queries and PySpark jobs to be run directly on this table.
        allowedColumns:
          $ref: "#/components/schemas/AllowedColumnList"
          description: The columns within the underlying Glue table that can be used within collaborations.
        selectedAnalysisMethods:
          $ref: "#/components/schemas/SelectedAnalysisMethods"
          description: The selected analysis methods for the configured table.
      required:
        - id
        - arn
        - name
        - tableReference
        - createTime
        - updateTime
        - analysisRuleTypes
        - analysisMethod
        - allowedColumns
    ConfiguredTableArn:
      type: string
      minLength: 0
      maxLength: 100
      pattern: arn:aws:[\w]+:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:configuredtable/[\d\w-]+
    ConfiguredTableAnalysisRuleTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ConfiguredTableAnalysisRuleType"
    ConfiguredTableAnalysisRuleType:
      type: string
      enum:
        - AGGREGATION
        - LIST
        - CUSTOM
    ConfiguredTableIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    ConfiguredTableAnalysisRulePolicy:
      description: Controls on the query specifications that can be run on a configured table.
      type: object
      properties:
        v1:
          $ref: "#/components/schemas/ConfiguredTableAnalysisRulePolicyV1"
          description: Controls on the query specifications that can be run on a configured table.
    ConfiguredTableAnalysisRulePolicyV1:
      description: Controls on the query specifications that can be run on a configured table.
      type: object
      properties:
        list:
          $ref: "#/components/schemas/AnalysisRuleList"
          description: Analysis rule type that enables only list queries on a configured table.
        aggregation:
          $ref: "#/components/schemas/AnalysisRuleAggregation"
          description: Analysis rule type that enables only aggregation queries on a configured table.
        custom:
          $ref: "#/components/schemas/AnalysisRuleCustom"
    CreateConfiguredTableAnalysisRuleOutput:
      type: object
      properties:
        analysisRule:
          $ref: "#/components/schemas/ConfiguredTableAnalysisRule"
          description: The analysis rule that was created for the configured table.
      required:
        - analysisRule
    ConfiguredTableAnalysisRule:
      description: A configured table analysis rule, which limits how data for this table can be used.
      type: object
      properties:
        configuredTableId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the configured table.
        configuredTableArn:
          $ref: "#/components/schemas/ConfiguredTableArn"
          description: The unique ARN for the configured table.
        policy:
          $ref: "#/components/schemas/ConfiguredTableAnalysisRulePolicy"
          description: The policy that controls SQL query rules.
        type_:
          $ref: "#/components/schemas/ConfiguredTableAnalysisRuleType"
          description: The type of configured table analysis rule.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the configured table analysis rule was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the configured table analysis rule was last updated.
      required:
        - configuredTableId
        - configuredTableArn
        - policy
        - type_
        - createTime
        - updateTime
    CreateConfiguredTableAssociationOutput:
      type: object
      properties:
        configuredTableAssociation:
          $ref: "#/components/schemas/ConfiguredTableAssociation"
          description: The configured table association.
      required:
        - configuredTableAssociation
    ConfiguredTableAssociation:
      description: A configured table association links a configured table to a collaboration.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/ConfiguredTableAssociationArn"
          description: The unique ARN for the configured table association.
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the configured table association.
        configuredTableId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the configured table that the association refers to.
        configuredTableArn:
          $ref: "#/components/schemas/ConfiguredTableArn"
          description: The unique ARN for the configured table that the association refers to.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: The unique ID for the membership this configured table association belongs to.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The unique ARN for the membership this configured table association belongs to.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The service will assume this role to access catalog metadata and query the table.
        name:
          $ref: "#/components/schemas/TableAlias"
          description: The name of the configured table association, in lowercase. The table is identified by this name when running protected queries against the underlying data.
        description:
          $ref: "#/components/schemas/TableDescription"
          description: A description of the configured table association.
        analysisRuleTypes:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleTypeList"
          description: The analysis rule types for the configured table association.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the configured table association was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time the configured table association was last updated.
      required:
        - arn
        - id
        - configuredTableId
        - configuredTableArn
        - membershipId
        - membershipArn
        - roleArn
        - name
        - createTime
        - updateTime
    ConfiguredTableAssociationArn:
      type: string
      minLength: 0
      maxLength: 100
      pattern: arn:aws:[\w]+:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:configuredtableassociation/[\d\w-]+/[\d\w-]+
    ConfiguredTableAssociationAnalysisRuleTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleType"
    ConfiguredTableAssociationAnalysisRuleType:
      type: string
      enum:
        - AGGREGATION
        - LIST
        - CUSTOM
    ConfiguredTableAssociationIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    CreateConfiguredTableAssociationAnalysisRuleOutput:
      type: object
      properties:
        analysisRule:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRule"
          description: The analysis rule for the conﬁgured table association. In the console, the ConfiguredTableAssociationAnalysisRule is referred to as the collaboration analysis rule.
      required:
        - analysisRule
    ConfiguredTableAssociationAnalysisRule:
      description: An analysis rule for a configured table association. This analysis rule specifies how data from the table can be used within its associated collaboration. In the console, the ConfiguredTableAssociationAnalysisRule is referred to as the collaboration analysis rule.
      type: object
      properties:
        membershipIdentifier:
          $ref: "#/components/schemas/MembershipIdentifier"
          description: The membership identifier for the configured table association analysis rule.
        configuredTableAssociationId:
          $ref: "#/components/schemas/ConfiguredTableAssociationIdentifier"
          description: The unique identifier for the configured table association.
        configuredTableAssociationArn:
          $ref: "#/components/schemas/ConfiguredTableAssociationArn"
          description: The Amazon Resource Name (ARN) of the configured table association.
        policy:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRulePolicy"
          description: The policy of the configured table association analysis rule.
        type_:
          $ref: "#/components/schemas/ConfiguredTableAssociationAnalysisRuleType"
          description: The type of the configured table association analysis rule.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation time of the configured table association analysis rule.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The update time of the configured table association analysis rule.
      required:
        - membershipIdentifier
        - configuredTableAssociationId
        - configuredTableAssociationArn
        - policy
        - type_
        - createTime
        - updateTime
    IdMappingTableInputReferenceConfig:
      description: Provides the input reference configuration for the ID mapping table.
      type: object
      properties:
        inputReferenceArn:
          $ref: "#/components/schemas/IdMappingTableInputReferenceArn"
          description: The Amazon Resource Name (ARN) of the referenced resource in Entity Resolution. Valid values are ID mapping workflow ARNs.
        manageResourcePolicies:
          $ref: "#/components/schemas/Boolean"
          description: When TRUE, Clean Rooms manages permissions for the ID mapping table resource. When FALSE, the resource owner manages permissions for the ID mapping table resource.
      required:
        - inputReferenceArn
        - manageResourcePolicies
    IdMappingTableInputReferenceArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:(aws|aws-us-gov|aws-cn):entityresolution:.*:[0-9]+:(idmappingworkflow/.*)
    KMSKeyArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws:kms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:key/[a-zA-Z0-9-]+
    CreateIdMappingTableOutput:
      type: object
      properties:
        idMappingTable:
          $ref: "#/components/schemas/IdMappingTable"
          description: The ID mapping table that was created.
      required:
        - idMappingTable
    IdMappingTable:
      description: Describes information about the ID mapping table.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier of the ID mapping table.
        arn:
          $ref: "#/components/schemas/IdMappingTableArn"
          description: The Amazon Resource Name (ARN) of the ID mapping table.
        inputReferenceConfig:
          $ref: "#/components/schemas/IdMappingTableInputReferenceConfig"
          description: The input reference configuration for the ID mapping table.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier of the membership resource for the ID mapping table.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The Amazon Resource Name (ARN) of the membership resource for the ID mapping table.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier of the collaboration that contains this ID mapping table.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The Amazon Resource Name (ARN) of the collaboration that contains this ID mapping table.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the ID mapping table.
        name:
          $ref: "#/components/schemas/ResourceAlias"
          description: The name of the ID mapping table.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the ID mapping table was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent time at which the ID mapping table was updated.
        inputReferenceProperties:
          $ref: "#/components/schemas/IdMappingTableInputReferenceProperties"
          description: The input reference properties for the ID mapping table.
        kmsKeyArn:
          $ref: "#/components/schemas/KMSKeyArn"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services KMS key.
      required:
        - id
        - arn
        - inputReferenceConfig
        - membershipId
        - membershipArn
        - collaborationId
        - collaborationArn
        - name
        - createTime
        - updateTime
        - inputReferenceProperties
    IdMappingTableArn:
      type: string
      minLength: 0
      maxLength: 200
      pattern: arn:aws:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/idmappingtable/[\d\w-]+
    IdMappingTableInputReferenceProperties:
      description: The input reference properties for the ID mapping table.
      type: object
      properties:
        idMappingTableInputSource:
          $ref: "#/components/schemas/IdMappingTableInputSourceList"
          description: The input source of the ID mapping table.
      required:
        - idMappingTableInputSource
    IdNamespaceAssociationInputReferenceConfig:
      description: Provides the information for the ID namespace association input reference configuration.
      type: object
      properties:
        inputReferenceArn:
          $ref: "#/components/schemas/IdNamespaceAssociationInputReferenceArn"
          description: The Amazon Resource Name (ARN) of the Entity Resolution resource that is being associated to the collaboration. Valid resource ARNs are from the ID namespaces that you own.
        manageResourcePolicies:
          $ref: "#/components/schemas/Boolean"
          description: When TRUE, Clean Rooms manages permissions for the ID namespace association resource. When FALSE, the resource owner manages permissions for the ID namespace association resource.
      required:
        - inputReferenceArn
        - manageResourcePolicies
    IdNamespaceAssociationInputReferenceArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws:entityresolution:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:idnamespace/[\d\w-]+
    GenericResourceName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: (?!\s*$)[\u0020-\uD7FF\uE000-\uFFFD\uD800\uDBFF-\uDC00\uDFFF\t]*
    IdMappingConfig:
      description: The configuration settings for the ID mapping table.
      type: object
      properties:
        allowUseAsDimensionColumn:
          $ref: "#/components/schemas/Boolean"
          description: An indicator as to whether you can use your column as a dimension column in the ID mapping table (TRUE) or not (FALSE). Default is FALSE.
      required:
        - allowUseAsDimensionColumn
    CreateIdNamespaceAssociationOutput:
      type: object
      properties:
        idNamespaceAssociation:
          $ref: "#/components/schemas/IdNamespaceAssociation"
          description: The ID namespace association that was created.
      required:
        - idNamespaceAssociation
    IdNamespaceAssociation:
      description: Provides information to create the ID namespace association.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/IdNamespaceAssociationIdentifier"
          description: The unique identifier for this ID namespace association.
        arn:
          $ref: "#/components/schemas/IdNamespaceAssociationArn"
          description: The Amazon Resource Name (ARN) of the ID namespace association.
        membershipId:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier of the membership resource for this ID namespace association.
        membershipArn:
          $ref: "#/components/schemas/MembershipArn"
          description: The Amazon Resource Name (ARN) of the membership resource for this ID namespace association.
        collaborationId:
          $ref: "#/components/schemas/UUID"
          description: The unique identifier of the collaboration that contains this ID namespace association.
        collaborationArn:
          $ref: "#/components/schemas/CollaborationArn"
          description: The Amazon Resource Name (ARN) of the collaboration that contains this ID namespace association.
        name:
          $ref: "#/components/schemas/GenericResourceName"
          description: The name of this ID namespace association.
        description:
          $ref: "#/components/schemas/ResourceDescription"
          description: The description of the ID namespace association.
        createTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the ID namespace association was created.
        updateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent time at which the ID namespace association was updated.
        inputReferenceConfig:
          $ref: "#/components/schemas/IdNamespaceAssociationInputReferenceConfig"
          description: The input reference configuration for the ID namespace association.
        inputReferenceProperties:
          $ref: "#/components/schemas/IdNamespaceAssociationInputReferenceProperties"
          description: The input reference properties for the ID namespace association.
        idMappingConfig:
          $ref: "#/components/schemas/IdMappingConfig"
          description: The configuration settings for the ID mapping table.
      required:
        - id
        - arn
        - membershipId
        - membershipArn
        - collaborationId
        - collaborationArn
        - name
        - createTime
        - updateTime
        - inputReferenceConfig
        - inputReferenceProperties
    IdNamespaceAssociationIdentifier:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    IdNamespaceAssociationArn:
      type: string
      minLength: 0
      maxLength: 256
      pattern: arn:aws:cleanrooms:[\w]{2}-[\w]{4,9}-[\d]:[\d]{12}:membership/[\d\w-]+/idnamespaceassociation/[\d\w-]+
    IdNamespaceAssociationInputReferenceProperties:
      description: Provides the information for the ID namespace association input reference properties.
      type: object
      properties:
        idNamespaceType:
          $ref: "#/components/schemas/IdNamespaceType"
          description: The ID namespace type for this ID namespace association.
        idMappingWorkflowsSupported:
          $ref: "#/components/schemas/IdMappingWorkflowsSupported"
          description: Defines how ID mapping workflows are supported for this ID namespace association.
      required:
        - idNamespaceType
        - idMappingWorkflowsSupported
    IdMappingWorkflowsSupported:
      type: array
      items:
        $ref: "#/components/schemas/Document"
    Document:
      type: object
    MembershipQueryLogStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    MembershipJobLogStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    MembershipProtectedQueryResultConfiguration:
      description: Contains configurations for protected query results.
      type: object
      properties:
        outputConfiguration:
          $ref: "#/components/schemas/MembershipProtectedQueryOutputConfiguration"
          description: Configuration for protected query results.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The unique ARN for an IAM role that is used by Clean Rooms to write protected query results to the result location, given by the member who can receive results.
      required:
        - outputConfiguration
    MembershipProtectedQueryOutputConfiguration:
      description: Contains configurations for protected query results.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/ProtectedQueryS3OutputConfiguration"
    ProtectedQueryS3OutputConfiguration:
      description: Contains the configuration to write the query results to S3.
      type: object
      properties:
        resultFormat:
          $ref: "#/components/schemas/ResultFormat"
          description: Intended file format of the result.
        bucket:
          $ref: "#/components/schemas/ProtectedQueryS3OutputConfigurationBucketString"
          description: The S3 bucket to unload the protected query results.
        keyPrefix:
          $ref: "#/components/schemas/KeyPrefix"
          description: The S3 prefix to unload the protected query results.
        singleFileOutput:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether files should be output as a single file (TRUE) or output as multiple files (FALSE). This parameter is only supported for analyses with the Spark analytics engine.
      required:
        - resultFormat
        - bucket
    ResultFormat:
      description: File format of the returned data.
      type: string
      enum:
        - CSV
        - PARQUET
    ProtectedQueryS3OutputConfigurationBucketString:
      type: string
      minLength: 3
      maxLength: 63
      pattern: .*(?!^(\d+\.)+\d+$)(^(([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])\.)*([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])$).*
    KeyPrefix:
      type: string
      minLength: 0
      maxLength: 512
      pattern: "[\\w!.=*/-]*"
    MembershipProtectedJobResultConfiguration:
      description: Contains configurations for protected job results.
      type: object
      properties:
        outputConfiguration:
          $ref: "#/components/schemas/MembershipProtectedJobOutputConfiguration"
          description: The output configuration for a protected job result.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The unique ARN for an IAM role that is used by Clean Rooms to write protected job results to the result location, given by the member who can receive results.
      required:
        - outputConfiguration
        - roleArn
    MembershipProtectedJobOutputConfiguration:
      description: Contains configurations for protected job results.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/ProtectedJobS3OutputConfigurationInput"
          description: Contains the configuration to write the job results to S3.
    ProtectedJobS3OutputConfigurationInput:
      description: Contains input information for protected jobs with an S3 output type.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/ProtectedJobS3OutputConfigurationInputBucketString"
          description: The S3 bucket for job output.
        keyPrefix:
