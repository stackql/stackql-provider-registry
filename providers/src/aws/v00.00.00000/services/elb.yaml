      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_SetLoadBalancerPoliciesForBackendServer
      description: Replaces the set of policies associated with the specified port on which the EC2 instance is listening with a new set of policies. At this time, only the back-end server authentication policy type can be applied to the instance ports; this policy type is composed of multiple public key policies. Each time you use SetLoadBalancerPoliciesForBackendServer to enable the policies, use the PolicyNames parameter to list the policies that you want to enable. You can use DescribeLoadBalancers or DescribeLoadBalancerPolicies to verify that the policy is associated with the EC2 instance. For more information about enabling back-end instance authentication, see Configure Back-end Instance Authentication in the Classic Load Balancers Guide. For more information about Proxy Protocol, see Configure Proxy Protocol Support in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: InstancePort
          in: query
          required: true
          description: The port number associated with the EC2 instance.
          schema:
            $ref: "#/components/schemas/EndPointPort"
        - name: PolicyNames
          in: query
          required: true
          description: The names of the policies. If the list is empty, then all current polices are removed from the EC2 instance.
          schema:
            $ref: "#/components/schemas/PolicyNames"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SetLoadBalancerPoliciesForBackendServerOutputDisplay"
    post:
      operationId: POST_SetLoadBalancerPoliciesForBackendServer
      description: Replaces the set of policies associated with the specified port on which the EC2 instance is listening with a new set of policies. At this time, only the back-end server authentication policy type can be applied to the instance ports; this policy type is composed of multiple public key policies. Each time you use SetLoadBalancerPoliciesForBackendServer to enable the policies, use the PolicyNames parameter to list the policies that you want to enable. You can use DescribeLoadBalancers or DescribeLoadBalancerPolicies to verify that the policy is associated with the EC2 instance. For more information about enabling back-end instance authentication, see Configure Back-end Instance Authentication in the Classic Load Balancers Guide. For more information about Proxy Protocol, see Configure Proxy Protocol Support in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SetLoadBalancerPoliciesForBackendServerOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/SetLoadBalancerPoliciesForBackendServerInput"
  /?Action=SetLoadBalancerPoliciesOfListener&Version=2012-06-01:
    parameters:
