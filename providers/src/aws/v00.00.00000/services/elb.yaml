      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    LoadBalancerNames:
      type: array
      items:
        $ref: "#/components/schemas/AccessPointName"
    AccessPointName:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Information about a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    AddTagsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AddTagsOutputDisplay"
    AddTagsInput:
      description: Contains the parameters for AddTags.
      type: object
      properties:
        LoadBalancerNames:
          $ref: "#/components/schemas/LoadBalancerNames"
          description: The name of the load balancer. You can specify one load balancer only.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags.
      required:
        - LoadBalancerNames
        - Tags
    SecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
    ApplySecurityGroupsToLoadBalancerOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ApplySecurityGroupsToLoadBalancerOutputDisplay"
    ApplySecurityGroupsToLoadBalancerInput:
      description: Contains the parameters for ApplySecurityGroupsToLoadBalancer.
      type: object
      properties:
        LoadBalancerName:
          $ref: "#/components/schemas/AccessPointName"
          description: The name of the load balancer.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: The IDs of the security groups to associate with the load balancer. Note that you cannot specify the name of the security group.
      required:
        - LoadBalancerName
        - SecurityGroups
    Subnets:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
    AttachLoadBalancerToSubnetsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AttachLoadBalancerToSubnetsOutputDisplay"
    AttachLoadBalancerToSubnetsInput:
      description: Contains the parameters for AttachLoaBalancerToSubnets.
      type: object
      properties:
        LoadBalancerName:
          $ref: "#/components/schemas/AccessPointName"
          description: The name of the load balancer.
        Subnets:
          $ref: "#/components/schemas/Subnets"
          description: The IDs of the subnets to add. You can add only one subnet per Availability Zone.
      required:
        - LoadBalancerName
        - Subnets
    HealthCheck:
      description: Information about a health check.
      type: object
      properties:
        Target:
          $ref: "#/components/schemas/HealthCheckTarget"
          description: 'The instance being checked. The protocol is either TCP, HTTP, HTTPS, or SSL. The range of valid ports is one (1) through 65535. TCP is the default, specified as a TCP: port pair, for example "TCP:5000". In this case, a health check simply attempts to open a TCP connection to the instance on the specified port. Failure to connect within the configured timeout is considered unhealthy. SSL is also specified as SSL: port pair, for example, SSL:5000. For HTTP/HTTPS, you must include a ping path in the string. HTTP is specified as a HTTP:port;/;PathToPing; grouping, for example "HTTP:80/weather/us/wa/seattle". In this case, a HTTP GET request is issued to the instance on the given port and path. Any answer other than "200 OK" within the timeout period is considered unhealthy. The total length of the HTTP ping target must be 1024 16-bit Unicode characters or less.'
        Interval:
          $ref: "#/components/schemas/HealthCheckInterval"
          description: The approximate interval, in seconds, between health checks of an individual instance.
        Timeout:
          $ref: "#/components/schemas/HealthCheckTimeout"
          description: The amount of time, in seconds, during which no response means a failed health check. This value must be less than the Interval value.
        UnhealthyThreshold:
          $ref: "#/components/schemas/UnhealthyThreshold"
          description: The number of consecutive health check failures required before moving the instance to the Unhealthy state.
        HealthyThreshold:
          $ref: "#/components/schemas/HealthyThreshold"
          description: The number of consecutive health checks successes required before moving the instance to the Healthy state.
      required:
        - Target
        - Interval
        - Timeout
        - UnhealthyThreshold
        - HealthyThreshold
    HealthCheckTarget:
      type: string
    HealthCheckInterval:
      type: integer
      minimum: 5
      maximum: 300
    HealthCheckTimeout:
      type: integer
      minimum: 2
      maximum: 60
    UnhealthyThreshold:
      type: integer
      minimum: 2
      maximum: 10
    HealthyThreshold:
      type: integer
      minimum: 2
      maximum: 10
    HealthCheckDisplay:
      type: object
      properties:
        Target:
          type: string
          description: 'The instance being checked. The protocol is either TCP, HTTP, HTTPS, or SSL. The range of valid ports is one (1) through 65535. TCP is the default, specified as a TCP: port pair, for example "TCP:5000". In this case, a health check simply attempts to open a TCP connection to the instance on the specified port. Failure to connect within the configured timeout is considered unhealthy. SSL is also specified as SSL: port pair, for example, SSL:5000. For HTTP/HTTPS, you must include a ping path in the string. HTTP is specified as a HTTP:port;/;PathToPing; grouping, for example "HTTP:80/weather/us/wa/seattle". In this case, a HTTP GET request is issued to the instance on the given port and path. Any answer other than "200 OK" within the timeout period is considered unhealthy. The total length of the HTTP ping target must be 1024 16-bit Unicode characters or less.'
        Interval:
          type: integer
          description: The approximate interval, in seconds, between health checks of an individual instance.
        Timeout:
          type: integer
          description: The amount of time, in seconds, during which no response means a failed health check. This value must be less than the Interval value.
        UnhealthyThreshold:
          type: integer
          description: The number of consecutive health check failures required before moving the instance to the Unhealthy state.
        HealthyThreshold:
          type: integer
          description: The number of consecutive health checks successes required before moving the instance to the Healthy state.
    ConfigureHealthCheckOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheckDisplay"
    ConfigureHealthCheckInput:
      description: Contains the parameters for ConfigureHealthCheck.
      type: object
      properties:
        LoadBalancerName:
          $ref: "#/components/schemas/AccessPointName"
          description: The name of the load balancer.
        HealthCheck:
          $ref: "#/components/schemas/HealthCheck"
          description: The configuration information.
      required:
        - LoadBalancerName
        - HealthCheck
    PolicyName:
      type: string
    CookieName:
      type: string
    CreateAppCookieStickinessPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAppCookieStickinessPolicyOutputDisplay"
    CreateAppCookieStickinessPolicyInput:
      description: Contains the parameters for CreateAppCookieStickinessPolicy.
      type: object
      properties:
        LoadBalancerName:
          $ref: "#/components/schemas/AccessPointName"
          description: The name of the load balancer.
        PolicyName:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the policy being created. Policy names must consist of alphanumeric characters and dashes (-). This name must be unique within the set of policies for this load balancer.
        CookieName:
          $ref: "#/components/schemas/CookieName"
          description: The name of the application cookie used for stickiness.
      required:
        - LoadBalancerName
        - PolicyName
        - CookieName
    CookieExpirationPeriod:
      type: integer
      format: int64
    CreateLBCookieStickinessPolicyOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateLBCookieStickinessPolicyOutputDisplay"
    CreateLBCookieStickinessPolicyInput:
      description: Contains the parameters for CreateLBCookieStickinessPolicy.
      type: object
      properties:
        LoadBalancerName:
          $ref: "#/components/schemas/AccessPointName"
          description: The name of the load balancer.
        PolicyName:
          $ref: "#/components/schemas/PolicyName"
          description: The name of the policy being created. Policy names must consist of alphanumeric characters and dashes (-). This name must be unique within the set of policies for this load balancer.
        CookieExpirationPeriod:
          $ref: "#/components/schemas/CookieExpirationPeriod"
          description: The time period, in seconds, after which the cookie should be considered stale. If you do not specify this parameter, the default value is 0, which indicates that the sticky session should last for the duration of the browser session.
      required:
        - LoadBalancerName
        - PolicyName
    Listeners:
      type: array
      items:
        $ref: "#/components/schemas/Listener"
    Listener:
      description: Information about a listener. For information about the protocols and the ports supported by Elastic Load Balancing, see Listeners for Your Classic Load Balancer in the Classic Load Balancers Guide.
      type: object
      properties:
        Protocol:
          $ref: "#/components/schemas/Protocol"
          description: "The load balancer transport protocol to use for routing: HTTP, HTTPS, TCP, or SSL."
        LoadBalancerPort:
          $ref: "#/components/schemas/AccessPointPort"
          description: "The port on which the load balancer is listening. On EC2-VPC, you can specify any port from the range 1-65535. On EC2-Classic, you can specify any port from the following list: 25, 80, 443, 465, 587, 1024-65535."
        InstanceProtocol:
          $ref: "#/components/schemas/Protocol"
          description: "The protocol to use for routing traffic to instances: HTTP, HTTPS, TCP, or SSL. If the front-end protocol is TCP or SSL, the back-end protocol must be TCP or SSL. If the front-end protocol is HTTP or HTTPS, the back-end protocol must be HTTP or HTTPS. If there is another listener with the same InstancePort whose InstanceProtocol is secure, (HTTPS or SSL), the listener's InstanceProtocol must also be secure. If there is another listener with the same InstancePort whose InstanceProtocol is HTTP or TCP, the listener's InstanceProtocol must be HTTP or TCP."
        InstancePort:
          $ref: "#/components/schemas/InstancePort"
          description: The port on which the instance is listening.
        SSLCertificateId:
          $ref: "#/components/schemas/SSLCertificateId"
          description: The Amazon Resource Name (ARN) of the server certificate.
      required:
        - Protocol
        - LoadBalancerPort
        - InstancePort
    Protocol:
      type: string
    AccessPointPort:
      type: integer
    InstancePort:
      type: integer
      minimum: 1
      maximum: 65535
    SSLCertificateId:
      type: string
    AvailabilityZones:
      type: array
      items:
        $ref: "#/components/schemas/AvailabilityZone"
    AvailabilityZone:
      type: string
    LoadBalancerScheme:
      type: string
    CreateAccessPointOutputDisplay:
      type: object
      properties:
        DNSName:
          type: string
          description: The DNS name of the load balancer.
    CreateLoadBalancerOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateAccessPointOutputDisplay"
    CreateAccessPointInput:
      description: Contains the parameters for CreateLoadBalancer.
      type: object
      properties:
        LoadBalancerName:
          $ref: "#/components/schemas/AccessPointName"
          description: The name of the load balancer. This name must be unique within your set of load balancers for the region, must have a maximum of 32 characters, must contain only alphanumeric characters or hyphens, and cannot begin or end with a hyphen.
