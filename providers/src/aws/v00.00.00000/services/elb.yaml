openapi: 3.0.0
info:
  version: "2012-06-01"
  title: Elastic Load Balancing
  description: Elastic Load Balancing
  x-serviceName: elasticloadbalancing
  x-serviceAlias: elb
  x-protocol: query
  x-apiVersion: "2012-06-01"
  x-endpointPrefix: elasticloadbalancing
servers:
  - url: https://elasticloadbalancing.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for elb
paths:
  /?Action=AddTags&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddTags
      description: Adds the specified tags to the specified load balancer. Each load balancer can have a maximum of 10 tags. Each tag consists of a key and an optional value. If a tag with the same key is already associated with the load balancer, AddTags updates its value. For more information, see Tag Your Classic Load Balancer in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerNames
          in: query
          required: true
          description: The name of the load balancer. You can specify one load balancer only.
          schema:
            $ref: "#/components/schemas/LoadBalancerNames"
        - name: Tags
          in: query
          required: false
          description: The tags.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddTagsOutputDisplay"
    post:
      operationId: POST_AddTags
      description: Adds the specified tags to the specified load balancer. Each load balancer can have a maximum of 10 tags. Each tag consists of a key and an optional value. If a tag with the same key is already associated with the load balancer, AddTags updates its value. For more information, see Tag Your Classic Load Balancer in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddTagsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddTagsInput"
  /?Action=ApplySecurityGroupsToLoadBalancer&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ApplySecurityGroupsToLoadBalancer
      description: Associates one or more security groups with your load balancer in a virtual private cloud (VPC). The specified security groups override the previously associated security groups. For more information, see Security Groups for Load Balancers in a VPC in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: SecurityGroups
          in: query
          required: true
          description: The IDs of the security groups to associate with the load balancer. Note that you cannot specify the name of the security group.
          schema:
            $ref: "#/components/schemas/SecurityGroups"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplySecurityGroupsToLoadBalancerOutputDisplay"
    post:
      operationId: POST_ApplySecurityGroupsToLoadBalancer
      description: Associates one or more security groups with your load balancer in a virtual private cloud (VPC). The specified security groups override the previously associated security groups. For more information, see Security Groups for Load Balancers in a VPC in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplySecurityGroupsToLoadBalancerOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ApplySecurityGroupsToLoadBalancerInput"
  /?Action=AttachLoadBalancerToSubnets&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AttachLoadBalancerToSubnets
      description: Adds one or more subnets to the set of configured subnets for the specified load balancer. The load balancer evenly distributes requests across all registered subnets. For more information, see Add or Remove Subnets for Your Load Balancer in a VPC in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: Subnets
          in: query
          required: false
          description: The IDs of the subnets to add. You can add only one subnet per Availability Zone.
          schema:
            $ref: "#/components/schemas/Subnets"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancerToSubnetsOutputDisplay"
    post:
      operationId: POST_AttachLoadBalancerToSubnets
      description: Adds one or more subnets to the set of configured subnets for the specified load balancer. The load balancer evenly distributes requests across all registered subnets. For more information, see Add or Remove Subnets for Your Load Balancer in a VPC in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AttachLoadBalancerToSubnetsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AttachLoadBalancerToSubnetsInput"
  /?Action=ConfigureHealthCheck&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ConfigureHealthCheck
      description: Specifies the health check settings to use when evaluating the health state of your EC2 instances. For more information, see Configure Health Checks for Your Load Balancer in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: HealthCheck
          in: query
          required: true
          description: The configuration information.
          schema:
            $ref: "#/components/schemas/HealthCheck"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ConfigureHealthCheckOutputDisplay"
    post:
      operationId: POST_ConfigureHealthCheck
      description: Specifies the health check settings to use when evaluating the health state of your EC2 instances. For more information, see Configure Health Checks for Your Load Balancer in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ConfigureHealthCheckOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ConfigureHealthCheckInput"
  /?Action=CreateAppCookieStickinessPolicy&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateAppCookieStickinessPolicy
      description: Generates a stickiness policy with sticky session lifetimes that follow that of an application-generated cookie. This policy can be associated only with HTTP/HTTPS listeners. This policy is similar to the policy created by CreateLBCookieStickinessPolicy, except that the lifetime of the special Elastic Load Balancing cookie, AWSELB, follows the lifetime of the application-generated cookie specified in the policy configuration. The load balancer only inserts a new stickiness cookie when the application response includes a new application cookie. If the application cookie is explicitly removed or expires, the session stops being sticky until a new application cookie is issued. For more information, see Application-Controlled Session Stickiness in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: PolicyName
          in: query
          required: true
          description: The name of the policy being created. Policy names must consist of alphanumeric characters and dashes (-). This name must be unique within the set of policies for this load balancer.
          schema:
            $ref: "#/components/schemas/PolicyName"
        - name: CookieName
          in: query
          required: true
          description: The name of the application cookie used for stickiness.
          schema:
            $ref: "#/components/schemas/CookieName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateAppCookieStickinessPolicyOutputDisplay"
    post:
      operationId: POST_CreateAppCookieStickinessPolicy
      description: Generates a stickiness policy with sticky session lifetimes that follow that of an application-generated cookie. This policy can be associated only with HTTP/HTTPS listeners. This policy is similar to the policy created by CreateLBCookieStickinessPolicy, except that the lifetime of the special Elastic Load Balancing cookie, AWSELB, follows the lifetime of the application-generated cookie specified in the policy configuration. The load balancer only inserts a new stickiness cookie when the application response includes a new application cookie. If the application cookie is explicitly removed or expires, the session stops being sticky until a new application cookie is issued. For more information, see Application-Controlled Session Stickiness in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateAppCookieStickinessPolicyOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateAppCookieStickinessPolicyInput"
  /?Action=CreateLBCookieStickinessPolicy&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateLBCookieStickinessPolicy
      description: Generates a stickiness policy with sticky session lifetimes controlled by the lifetime of the browser (user-agent) or a specified expiration period. This policy can be associated only with HTTP/HTTPS listeners. When a load balancer implements this policy, the load balancer uses a special cookie to track the instance for each request. When the load balancer receives a request, it first checks to see if this cookie is present in the request. If so, the load balancer sends the request to the application server specified in the cookie. If not, the load balancer sends the request to a server that is chosen based on the existing load-balancing algorithm. A cookie is inserted into the response for binding subsequent requests from the same user to that server. The validity of the cookie is based on the cookie expiration time, which is specified in the policy configuration. For more information, see Duration-Based Session Stickiness in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: PolicyName
          in: query
          required: true
          description: The name of the policy being created. Policy names must consist of alphanumeric characters and dashes (-). This name must be unique within the set of policies for this load balancer.
          schema:
            $ref: "#/components/schemas/PolicyName"
        - name: CookieExpirationPeriod
          in: query
          required: false
          description: The time period, in seconds, after which the cookie should be considered stale. If you do not specify this parameter, the default value is 0, which indicates that the sticky session should last for the duration of the browser session.
          schema:
            $ref: "#/components/schemas/CookieExpirationPeriod"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLBCookieStickinessPolicyOutputDisplay"
    post:
      operationId: POST_CreateLBCookieStickinessPolicy
      description: Generates a stickiness policy with sticky session lifetimes controlled by the lifetime of the browser (user-agent) or a specified expiration period. This policy can be associated only with HTTP/HTTPS listeners. When a load balancer implements this policy, the load balancer uses a special cookie to track the instance for each request. When the load balancer receives a request, it first checks to see if this cookie is present in the request. If so, the load balancer sends the request to the application server specified in the cookie. If not, the load balancer sends the request to a server that is chosen based on the existing load-balancing algorithm. A cookie is inserted into the response for binding subsequent requests from the same user to that server. The validity of the cookie is based on the cookie expiration time, which is specified in the policy configuration. For more information, see Duration-Based Session Stickiness in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLBCookieStickinessPolicyOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateLBCookieStickinessPolicyInput"
  /?Action=CreateLoadBalancer&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateLoadBalancer
      description: Creates a Classic Load Balancer. You can add listeners, security groups, subnets, and tags when you create your load balancer, or you can add them later using CreateLoadBalancerListeners, ApplySecurityGroupsToLoadBalancer, AttachLoadBalancerToSubnets, and AddTags. To describe your current load balancers, see DescribeLoadBalancers. When you are finished with a load balancer, you can delete it using DeleteLoadBalancer. You can create up to 20 load balancers per region per account. You can request an increase for the number of load balancers for your account. For more information, see Limits for Your Classic Load Balancer in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer. This name must be unique within your set of load balancers for the region, must have a maximum of 32 characters, must contain only alphanumeric characters or hyphens, and cannot begin or end with a hyphen.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: Listeners
          in: query
          required: true
          description: The listeners. For more information, see Listeners for Your Classic Load Balancer in the Classic Load Balancers Guide.
          schema:
            $ref: "#/components/schemas/Listeners"
        - name: AvailabilityZones
          in: query
          required: false
          description: One or more Availability Zones from the same region as the load balancer. You must specify at least one Availability Zone. You can add more Availability Zones after you create the load balancer using EnableAvailabilityZonesForLoadBalancer.
          schema:
            $ref: "#/components/schemas/AvailabilityZones"
        - name: Subnets
          in: query
          required: false
          description: The IDs of the subnets in your VPC to attach to the load balancer. Specify one subnet per Availability Zone specified in AvailabilityZones.
          schema:
            $ref: "#/components/schemas/Subnets"
        - name: SecurityGroups
          in: query
          required: false
          description: The IDs of the security groups to assign to the load balancer.
          schema:
            $ref: "#/components/schemas/SecurityGroups"
        - name: Scheme
          in: query
          required: false
          description: The type of a load balancer. Valid only for load balancers in a VPC. By default, Elastic Load Balancing creates an Internet-facing load balancer with a DNS name that resolves to public IP addresses. For more information about Internet-facing and Internal load balancers, see Load Balancer Scheme in the Elastic Load Balancing User Guide. Specify internal to create a load balancer with a DNS name that resolves to private IP addresses.
          schema:
            $ref: "#/components/schemas/LoadBalancerScheme"
        - name: Tags
          in: query
          required: false
          description: A list of tags to assign to the load balancer. For more information about tagging your load balancer, see Tag Your Classic Load Balancer in the Classic Load Balancers Guide.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerOutputDisplay"
    post:
      operationId: POST_CreateLoadBalancer
      description: Creates a Classic Load Balancer. You can add listeners, security groups, subnets, and tags when you create your load balancer, or you can add them later using CreateLoadBalancerListeners, ApplySecurityGroupsToLoadBalancer, AttachLoadBalancerToSubnets, and AddTags. To describe your current load balancers, see DescribeLoadBalancers. When you are finished with a load balancer, you can delete it using DeleteLoadBalancer. You can create up to 20 load balancers per region per account. You can request an increase for the number of load balancers for your account. For more information, see Limits for Your Classic Load Balancer in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateAccessPointInput"
  /?Action=CreateLoadBalancerListeners&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateLoadBalancerListeners
      description: Creates one or more listeners for the specified load balancer. If a listener with the specified port does not already exist, it is created; otherwise, the properties of the new listener must match the properties of the existing listener. For more information, see Listeners for Your Classic Load Balancer in the Classic Load Balancers Guide.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: Listeners
          in: query
          required: true
          description: The listeners.
          schema:
            $ref: "#/components/schemas/Listeners"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerListenersOutputDisplay"
    post:
      operationId: POST_CreateLoadBalancerListeners
      description: Creates one or more listeners for the specified load balancer. If a listener with the specified port does not already exist, it is created; otherwise, the properties of the new listener must match the properties of the existing listener. For more information, see Listeners for Your Classic Load Balancer in the Classic Load Balancers Guide.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerListenersOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateLoadBalancerListenerInput"
  /?Action=CreateLoadBalancerPolicy&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateLoadBalancerPolicy
      description: Creates a policy with the specified attributes for the specified load balancer. Policies are settings that are saved for your load balancer and that can be applied to the listener or the application server, depending on the policy type.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: PolicyName
          in: query
          required: true
          description: The name of the load balancer policy to be created. This name must be unique within the set of policies for this load balancer.
          schema:
            $ref: "#/components/schemas/PolicyName"
        - name: PolicyTypeName
          in: query
          required: true
          description: The name of the base policy type. To get the list of policy types, use DescribeLoadBalancerPolicyTypes.
          schema:
            $ref: "#/components/schemas/PolicyTypeName"
        - name: PolicyAttributes
          in: query
          required: false
          description: The policy attributes.
          schema:
            $ref: "#/components/schemas/PolicyAttributes"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerPolicyOutputDisplay"
    post:
      operationId: POST_CreateLoadBalancerPolicy
      description: Creates a policy with the specified attributes for the specified load balancer. Policies are settings that are saved for your load balancer and that can be applied to the listener or the application server, depending on the policy type.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateLoadBalancerPolicyOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateLoadBalancerPolicyInput"
  /?Action=DeleteLoadBalancer&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_DeleteLoadBalancer
      description: Deletes the specified load balancer. If you are attempting to recreate a load balancer, you must reconfigure all settings. The DNS name associated with a deleted load balancer are no longer usable. The name and associated DNS record of the deleted load balancer no longer exist and traffic sent to any of its IP addresses is no longer delivered to your instances. If the load balancer does not exist or has already been deleted, the call to DeleteLoadBalancer still succeeds.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/DeleteLoadBalancerOutputDisplay"
    post:
      operationId: POST_DeleteLoadBalancer
      description: Deletes the specified load balancer. If you are attempting to recreate a load balancer, you must reconfigure all settings. The DNS name associated with a deleted load balancer are no longer usable. The name and associated DNS record of the deleted load balancer no longer exist and traffic sent to any of its IP addresses is no longer delivered to your instances. If the load balancer does not exist or has already been deleted, the call to DeleteLoadBalancer still succeeds.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/DeleteLoadBalancerOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/DeleteAccessPointInput"
  /?Action=DeleteLoadBalancerListeners&Version=2012-06-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_DeleteLoadBalancerListeners
      description: Deletes the specified listeners from the specified load balancer.
      parameters:
        - name: LoadBalancerName
          in: query
          required: true
          description: The name of the load balancer.
          schema:
            $ref: "#/components/schemas/AccessPointName"
        - name: LoadBalancerPorts
          in: query
          required: true
          description: The client port numbers of the listeners.
          schema:
            $ref: "#/components/schemas/Ports"
      responses:
        "200":
