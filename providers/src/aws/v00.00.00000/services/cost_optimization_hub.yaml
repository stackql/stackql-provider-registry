          $ref: "#/components/schemas/Order"
          description: The order that's used to sort the data.
    Order:
      type: string
      enum:
        - Asc
        - Desc
    ListEfficiencyMetricsResponse:
      type: object
      properties:
        efficiencyMetricsByGroup:
          $ref: "#/components/schemas/EfficiencyMetricsByGroupList"
          description: A list of cost efficiency metrics grouped by the specified dimension. Each group contains time-series data points with cost efficiency, potential savings, and optimzable spend for the specified time period.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The token to retrieve the next page of results. When this value is present in the response, additional groups are available. Pass this token in the nextToken parameter of a subsequent request to retrieve the next page.
    EfficiencyMetricsByGroupList:
      description: A list of cost efficiency metrics grouped by the specified dimension.
      type: array
      items:
        $ref: "#/components/schemas/EfficiencyMetricsByGroup"
    EfficiencyMetricsByGroup:
      description: Contains cost efficiency metrics for a specific group over time. The group is defined by the grouping dimension specified in the request, such as account ID, Amazon Web Services Region.
      type: object
      properties:
        metricsByTime:
          $ref: "#/components/schemas/MetricsByTimeList"
          description: A list of time-series data points containing efficiency metrics for this group. Each data point includes an efficiency score, estimated savings, spending, and a timestamp corresponding to the specified granularity. This field is null when efficiency metrics cannot be calculated for the group, in which case the message field provides an explanation.
        group:
          $ref: "#/components/schemas/String"
          description: The value of the grouping dimension for this set of metrics. For example, if grouped by account ID, this field contains the account ID. If no grouping is specified, this field is empty.
        message:
          $ref: "#/components/schemas/String"
          description: An explanation of why efficiency metrics could not be calculated for this group when the metricsByTime field is null. Common reasons include insufficient or inconclusive cost and usage data during the specified time period. This field is null or empty when metrics are successfully calculated.
    MetricsByTimeList:
      description: A list of time-series efficiency metric data points.
      type: array
      items:
        $ref: "#/components/schemas/MetricsByTime"
    MetricsByTime:
      description: Contains efficiency metrics for a specific point in time, including an efficiency score, potential savings, optimizable spend, and timestamp.
      type: object
      properties:
        score:
          $ref: "#/components/schemas/Double"
          description: The efficiency score for this time period. The score represents a measure of how effectively the cloud resources are being optimized, with higher scores indicating better optimization performance.
        savings:
          $ref: "#/components/schemas/Double"
          description: The estimated savings amount for this time period, representing the potential cost reduction achieved through optimization recommendations.
        spend:
          $ref: "#/components/schemas/Double"
          description: The total spending amount for this time period.
        timestamp:
          $ref: "#/components/schemas/String"
          description: "The timestamp for this data point. The format depends on the granularity: YYYY-MM-DD for daily metrics, or YYYY-MM for monthly metrics."
    PrimitiveBoolean:
      type: boolean
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    MaxResults:
      type: integer
      minimum: 0
      maximum: 100
