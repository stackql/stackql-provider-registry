openapi: 3.0.0
info:
  version: "2022-07-26"
  title: Cost Optimization Hub
  description: Cost Optimization Hub
  x-serviceName: cost-optimization-hub
  x-serviceAlias: cost_optimization_hub
  x-protocol: json
  x-apiVersion: "2022-07-26"
  x-endpointPrefix: cost-optimization-hub
  x-targetPrefix: CostOptimizationHubService
  x-jsonVersion: "1.0"
servers:
  - url: https://cost-optimization-hub.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cost-optimization-hub
paths:
  /GetPreferences:
    post:
      operationId: GetPreferences
      description: Returns a set of preferences for an account in order to add account-specific preferences into the service. These preferences impact how the savings associated with recommendations are presented—estimated savings after discounts or estimated savings before discounts, for example.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.GetPreferences
            default: CostOptimizationHubService.GetPreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPreferencesResponse"
  /GetRecommendation:
    post:
      operationId: GetRecommendation
      description: Returns both the current and recommended resource configuration and the estimated cost impact for a recommendation. The recommendationId is only valid for up to a maximum of 24 hours as recommendations are refreshed daily. To retrieve the recommendationId, use the ListRecommendations API.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.GetRecommendation
            default: CostOptimizationHubService.GetRecommendation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                recommendationId:
                  $ref: "#/components/schemas/String"
                  description: The ID for the recommendation.
              required:
                - recommendationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecommendationResponse"
  /ListEfficiencyMetrics:
    post:
      operationId: ListEfficiencyMetrics
      description: Returns cost efficiency metrics aggregated over time and optionally grouped by a specified dimension. The metrics provide insights into your cost optimization progress by tracking estimated savings, spending, and measures how effectively you're optimizing your Cloud resources. The operation supports both daily and monthly time granularities and allows grouping results by account ID, Amazon Web Services Region. Results are returned as time-series data, enabling you to analyze trends in your cost optimization performance over the specified time period.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.ListEfficiencyMetrics
            default: CostOptimizationHubService.ListEfficiencyMetrics
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                groupBy:
                  $ref: "#/components/schemas/String"
                  description: The dimension by which to group the cost efficiency metrics. Valid values include account ID, Amazon Web Services Region. When no grouping is specified, metrics are aggregated across all resources in the specified time period.
                granularity:
                  $ref: "#/components/schemas/GranularityType"
                  description: The time granularity for the cost efficiency metrics. Specify Daily for metrics aggregated by day, or Monthly for metrics aggregated by month.
                timePeriod:
                  $ref: "#/components/schemas/TimePeriod"
                  description: The time period for which to retrieve the cost efficiency metrics. The start date is inclusive and the end date is exclusive. Dates can be specified in either YYYY-MM-DD format or YYYY-MM format depending on the desired granularity.
                maxResults:
                  $ref: "#/components/schemas/ListEfficiencyMetricsRequestMaxResultsInteger"
                  description: The maximum number of groups to return in the response. Valid values range from 0 to 1000. Use in conjunction with nextToken to paginate through results when the total number of groups exceeds this limit.
                orderBy:
                  $ref: "#/components/schemas/OrderBy"
                  description: The ordering specification for the results. Defines which dimension to sort by and whether to sort in ascending or descending order.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The token to retrieve the next page of results. This value is returned in the response when the number of groups exceeds the specified maxResults value.
              required:
                - granularity
                - timePeriod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEfficiencyMetricsResponse"
  /ListEnrollmentStatuses:
    post:
      operationId: ListEnrollmentStatuses
      description: Retrieves the enrollment status for an account. It can also return the list of accounts that are enrolled under the organization.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.ListEnrollmentStatuses
            default: CostOptimizationHubService.ListEnrollmentStatuses
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                includeOrganizationInfo:
                  $ref: "#/components/schemas/PrimitiveBoolean"
                  description: Indicates whether to return the enrollment status for the organization.
                accountId:
                  $ref: "#/components/schemas/AccountId"
                  description: The account ID of a member account in the organization.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The token to retrieve the next set of results.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of objects that are returned for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnrollmentStatusesResponse"
  /ListRecommendationSummaries:
    post:
      operationId: ListRecommendationSummaries
      description: "Returns a concise representation of savings estimates for resources. Also returns de-duped savings across different types of recommendations. The following filters are not supported for this API: recommendationIds, resourceArns, and resourceIds."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.ListRecommendationSummaries
            default: CostOptimizationHubService.ListRecommendationSummaries
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/Filter"
                groupBy:
                  $ref: "#/components/schemas/String"
                  description: The grouping of recommendations by a dimension.
                maxResults:
                  $ref: "#/components/schemas/ListRecommendationSummariesRequestMaxResultsInteger"
                  description: The maximum number of recommendations to be returned for the request.
                metrics:
                  $ref: "#/components/schemas/SummaryMetricsList"
                  description: Additional metrics to be returned for the request. The only valid value is savingsPercentage.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The token to retrieve the next set of results.
              required:
                - groupBy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationSummariesResponse"
  /ListRecommendations:
    post:
      operationId: ListRecommendations
      description: Returns a list of recommendations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.ListRecommendations
            default: CostOptimizationHubService.ListRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/Filter"
                  description: The constraints that you want all returned recommendations to match.
                orderBy:
                  $ref: "#/components/schemas/OrderBy"
                  description: The ordering of recommendations by a dimension.
                includeAllRecommendations:
                  $ref: "#/components/schemas/PrimitiveBoolean"
                  description: List of all recommendations for a resource, or a single recommendation if de-duped by resourceId.
                maxResults:
                  $ref: "#/components/schemas/ListRecommendationsRequestMaxResultsInteger"
                  description: The maximum number of recommendations that are returned for the request.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: The token to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationsResponse"
  /UpdateEnrollmentStatus:
    post:
      operationId: UpdateEnrollmentStatus
      description: Updates the enrollment (opt in and opt out) status of an account to the Cost Optimization Hub service. If the account is a management account of an organization, this action can also be used to enroll member accounts of the organization. You must have the appropriate permissions to opt in to Cost Optimization Hub and to view its recommendations. When you opt in, Cost Optimization Hub automatically creates a service-linked role in your account to access its data.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.UpdateEnrollmentStatus
            default: CostOptimizationHubService.UpdateEnrollmentStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/EnrollmentStatus"
                  description: Sets the account status.
                includeMemberAccounts:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether to enroll member accounts of the organization if the account is the management account or delegated administrator.
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEnrollmentStatusResponse"
  /UpdatePreferences:
    post:
      operationId: UpdatePreferences
      description: Updates a set of preferences for an account in order to add account-specific preferences into the service. These preferences impact how the savings associated with recommendations are presented.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CostOptimizationHubService.UpdatePreferences
            default: CostOptimizationHubService.UpdatePreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                savingsEstimationMode:
                  $ref: "#/components/schemas/SavingsEstimationMode"
                  description: Sets the "savings estimation mode" preference.
                memberAccountDiscountVisibility:
                  $ref: "#/components/schemas/MemberAccountDiscountVisibility"
                  description: Sets the "member account discount visibility" preference.
                preferredCommitment:
                  $ref: "#/components/schemas/PreferredCommitment"
                  description: Sets the preferences for how Reserved Instances and Savings Plans cost-saving opportunities are prioritized in terms of payment option and term length.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePreferencesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GetPreferencesResponse:
      type: object
      properties:
        savingsEstimationMode:
          $ref: "#/components/schemas/SavingsEstimationMode"
          description: Retrieves the status of the "savings estimation mode" preference.
        memberAccountDiscountVisibility:
          $ref: "#/components/schemas/MemberAccountDiscountVisibility"
          description: Retrieves the status of the "member account discount visibility" preference.
        preferredCommitment:
          $ref: "#/components/schemas/PreferredCommitment"
          description: Retrieves the current preferences for how Reserved Instances and Savings Plans cost-saving opportunities are prioritized in terms of payment option and term length.
    SavingsEstimationMode:
      type: string
      enum:
        - BeforeDiscounts
        - AfterDiscounts
    MemberAccountDiscountVisibility:
      type: string
      enum:
        - All
        - None
    PreferredCommitment:
      description: The preferred configuration for Reserved Instances and Savings Plans commitment-based discounts, consisting of a payment option and a commitment duration.
      type: object
      properties:
        term:
          $ref: "#/components/schemas/Term"
          description: The preferred length of the commitment period. If the value is null, it will default to ThreeYears (highest savings) where applicable.
        paymentOption:
          $ref: "#/components/schemas/PaymentOption"
          description: The preferred upfront payment structure for commitments. If the value is null, it will default to AllUpfront (highest savings) where applicable.
    Term:
      type: string
      enum:
        - OneYear
        - ThreeYears
    PaymentOption:
      type: string
      enum:
        - AllUpfront
        - PartialUpfront
        - NoUpfront
    String:
      type: string
    GetRecommendationResponse:
      type: object
      properties:
        recommendationId:
          $ref: "#/components/schemas/String"
          description: The ID for the recommendation.
        resourceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the resource. This is the same as the Amazon Resource Name (ARN), if available.
        resourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource.
        accountId:
          $ref: "#/components/schemas/String"
          description: The account to which the recommendation applies.
        currencyCode:
          $ref: "#/components/schemas/String"
          description: The currency code used for the recommendation.
        recommendationLookbackPeriodInDays:
          $ref: "#/components/schemas/Integer"
          description: The lookback period that's used to generate the recommendation.
        costCalculationLookbackPeriodInDays:
          $ref: "#/components/schemas/Integer"
          description: The lookback period used to calculate cost impact for a recommendation.
        estimatedSavingsPercentage:
          $ref: "#/components/schemas/Double"
          description: The estimated savings percentage relative to the total cost over the cost calculation lookback period.
        estimatedSavingsOverCostCalculationLookbackPeriod:
          $ref: "#/components/schemas/Double"
          description: The estimated savings amount over the lookback period used to calculate cost impact for a recommendation.
        currentResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of resource.
        recommendedResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The resource type of the recommendation.
        region:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region of the resource.
        source:
          $ref: "#/components/schemas/Source"
          description: The source of the recommendation.
        lastRefreshTimestamp:
          $ref: "#/components/schemas/Datetime"
          description: The time when the recommendation was last generated.
        estimatedMonthlySavings:
          $ref: "#/components/schemas/Double"
          description: The estimated monthly savings amount for the recommendation.
        estimatedMonthlyCost:
          $ref: "#/components/schemas/Double"
          description: The estimated monthly cost of the current resource. For Reserved Instances and Savings Plans, it refers to the cost for eligible usage.
        implementationEffort:
          $ref: "#/components/schemas/ImplementationEffort"
          description: The effort required to implement the recommendation.
        restartNeeded:
          $ref: "#/components/schemas/Boolean"
          description: Whether or not implementing the recommendation requires a restart.
        actionType:
          $ref: "#/components/schemas/ActionType"
          description: The type of action you can take by adopting the recommendation.
        rollbackPossible:
          $ref: "#/components/schemas/Boolean"
          description: Whether or not implementing the recommendation can be rolled back.
        currentResourceDetails:
          $ref: "#/components/schemas/ResourceDetails"
          description: The details for the resource.
        recommendedResourceDetails:
          $ref: "#/components/schemas/ResourceDetails"
          description: The details about the recommended resource.
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of tags associated with the resource for which the recommendation exists.
    Integer:
      type: integer
    Double:
      type: number
      format: double
    ResourceType:
      type: string
      enum:
        - Ec2Instance
        - LambdaFunction
        - EbsVolume
        - EcsService
        - Ec2AutoScalingGroup
        - Ec2InstanceSavingsPlans
        - ComputeSavingsPlans
        - SageMakerSavingsPlans
        - Ec2ReservedInstances
        - RdsReservedInstances
        - OpenSearchReservedInstances
        - RedshiftReservedInstances
        - ElastiCacheReservedInstances
        - RdsDbInstanceStorage
        - RdsDbInstance
        - AuroraDbClusterStorage
        - DynamoDbReservedCapacity
        - MemoryDbReservedInstances
        - NatGateway
    Source:
      type: string
      enum:
        - ComputeOptimizer
        - CostExplorer
    Datetime:
      type: string
      format: date-time
    ImplementationEffort:
      type: string
      enum:
        - VeryLow
        - Low
        - Medium
        - High
        - VeryHigh
    Boolean:
      type: boolean
    ActionType:
      type: string
      enum:
        - Rightsize
        - Stop
        - Upgrade
        - PurchaseSavingsPlans
        - PurchaseReservedInstances
        - MigrateToGraviton
        - Delete
        - ScaleIn
    ResourceDetails:
      description: Contains detailed information about the specified resource.
      type: object
      properties:
        lambdaFunction:
          $ref: "#/components/schemas/LambdaFunction"
          description: The Lambda function recommendation details.
        ecsService:
          $ref: "#/components/schemas/EcsService"
          description: The ECS service recommendation details.
        ec2Instance:
          $ref: "#/components/schemas/Ec2Instance"
          description: The EC2 instance recommendation details.
        ebsVolume:
          $ref: "#/components/schemas/EbsVolume"
          description: The Amazon Elastic Block Store volume recommendation details.
        ec2AutoScalingGroup:
          $ref: "#/components/schemas/Ec2AutoScalingGroup"
          description: The EC2 Auto Scaling group recommendation details.
        ec2ReservedInstances:
          $ref: "#/components/schemas/Ec2ReservedInstances"
          description: The EC2 reserved instances recommendation details.
        rdsReservedInstances:
          $ref: "#/components/schemas/RdsReservedInstances"
          description: The RDS reserved instances recommendation details.
        elastiCacheReservedInstances:
          $ref: "#/components/schemas/ElastiCacheReservedInstances"
          description: The ElastiCache reserved instances recommendation details.
        openSearchReservedInstances:
          $ref: "#/components/schemas/OpenSearchReservedInstances"
          description: The OpenSearch reserved instances recommendation details.
        redshiftReservedInstances:
          $ref: "#/components/schemas/RedshiftReservedInstances"
          description: The Redshift reserved instances recommendation details.
        ec2InstanceSavingsPlans:
          $ref: "#/components/schemas/Ec2InstanceSavingsPlans"
          description: The EC2 instance Savings Plans recommendation details.
        computeSavingsPlans:
          $ref: "#/components/schemas/ComputeSavingsPlans"
          description: The Compute Savings Plans recommendation details.
        sageMakerSavingsPlans:
          $ref: "#/components/schemas/SageMakerSavingsPlans"
          description: The SageMaker AI Savings Plans recommendation details.
        rdsDbInstance:
          $ref: "#/components/schemas/RdsDbInstance"
          description: The DB instance recommendation details.
        rdsDbInstanceStorage:
          $ref: "#/components/schemas/RdsDbInstanceStorage"
          description: The DB instance storage recommendation details.
        auroraDbClusterStorage:
          $ref: "#/components/schemas/AuroraDbClusterStorage"
          description: The Aurora DB cluster storage recommendation details.
        dynamoDbReservedCapacity:
          $ref: "#/components/schemas/DynamoDbReservedCapacity"
          description: The DynamoDB reserved capacity recommendation details.
        memoryDbReservedInstances:
          $ref: "#/components/schemas/MemoryDbReservedInstances"
          description: The MemoryDB reserved instances recommendation details.
        natGateway:
          $ref: "#/components/schemas/NatGateway"
          description: The NAT Gateway recommendation details.
    LambdaFunction:
      description: The Lambda function recommendation details.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/LambdaFunctionConfiguration"
          description: The Lambda function configuration used for recommendations.
        costCalculation:
          $ref: "#/components/schemas/ResourceCostCalculation"
          description: Cost impact of the recommendation.
    LambdaFunctionConfiguration:
      description: The Lambda function configuration used for recommendations.
      type: object
      properties:
        compute:
          $ref: "#/components/schemas/ComputeConfiguration"
          description: Details about the compute configuration.
    ComputeConfiguration:
      description: Describes the performance configuration for compute services such as Amazon EC2, Lambda, and ECS.
      type: object
      properties:
        vCpu:
          $ref: "#/components/schemas/Double"
          description: The number of vCPU cores in the resource.
        memorySizeInMB:
          $ref: "#/components/schemas/Integer"
          description: The memory size of the resource.
        architecture:
          $ref: "#/components/schemas/String"
          description: The architecture of the resource.
        platform:
          $ref: "#/components/schemas/String"
          description: The platform of the resource. The platform is the specific combination of operating system, license model, and software on an instance.
    ResourceCostCalculation:
      description: Cost impact of the resource recommendation.
      type: object
      properties:
        usages:
          $ref: "#/components/schemas/UsageList"
          description: Usage details of the resource recommendation.
        pricing:
          $ref: "#/components/schemas/ResourcePricing"
          description: Pricing details of the resource recommendation.
    UsageList:
      type: array
      items:
        $ref: "#/components/schemas/Usage"
    Usage:
      description: Details about the usage.
      type: object
      properties:
        usageType:
          $ref: "#/components/schemas/String"
          description: The usage type.
        usageAmount:
          $ref: "#/components/schemas/Double"
          description: The usage amount.
        operation:
          $ref: "#/components/schemas/String"
          description: The operation value.
        productCode:
          $ref: "#/components/schemas/String"
          description: The product code.
        unit:
          $ref: "#/components/schemas/String"
          description: The usage unit.
    ResourcePricing:
      description: Contains pricing information about the specified resource.
      type: object
      properties:
        estimatedCostBeforeDiscounts:
          $ref: "#/components/schemas/Double"
          description: The savings estimate using Amazon Web Services public pricing without incorporating any discounts.
        estimatedNetUnusedAmortizedCommitments:
          $ref: "#/components/schemas/Double"
          description: The estimated net unused amortized commitment for the recommendation.
        estimatedDiscounts:
          $ref: "#/components/schemas/EstimatedDiscounts"
          description: The estimated discounts for a recommendation.
        estimatedCostAfterDiscounts:
          $ref: "#/components/schemas/Double"
          description: The savings estimate incorporating all discounts with Amazon Web Services, such as Reserved Instances and Savings Plans.
    EstimatedDiscounts:
      description: Estimated discount details of the current and recommended resource configuration for a recommendation.
      type: object
      properties:
        savingsPlansDiscount:
          $ref: "#/components/schemas/Double"
          description: Estimated Savings Plans discounts.
        reservedInstancesDiscount:
          $ref: "#/components/schemas/Double"
          description: Estimated reserved instance discounts.
        otherDiscount:
          $ref: "#/components/schemas/Double"
          description: Estimated other discounts include all discounts that are not itemized. Itemized discounts include reservedInstanceDiscount and savingsPlansDiscount.
    EcsService:
      description: The ECS service recommendation details.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/EcsServiceConfiguration"
          description: The ECS service configuration used for recommendations.
        costCalculation:
          $ref: "#/components/schemas/ResourceCostCalculation"
          description: Cost impact of the recommendation.
    EcsServiceConfiguration:
      description: The ECS service configuration used for recommendations.
      type: object
      properties:
        compute:
          $ref: "#/components/schemas/ComputeConfiguration"
          description: Details about the compute configuration.
    Ec2Instance:
      description: Describes the EC2 instance configuration of the current and recommended resource configuration for a recommendation.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/Ec2InstanceConfiguration"
          description: The EC2 instance configuration used for recommendations.
        costCalculation:
          $ref: "#/components/schemas/ResourceCostCalculation"
          description: Cost impact of the recommendation.
    Ec2InstanceConfiguration:
      description: The EC2 instance configuration used for recommendations.
      type: object
      properties:
        instance:
          $ref: "#/components/schemas/InstanceConfiguration"
          description: Details about the instance.
    InstanceConfiguration:
      description: The instance configuration used for recommendations.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/String"
          description: The instance type of the configuration.
    EbsVolume:
      description: Describes the Amazon Elastic Block Store volume configuration of the current and recommended resource configuration for a recommendation.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/EbsVolumeConfiguration"
          description: The Amazon Elastic Block Store volume configuration used for recommendations.
        costCalculation:
          $ref: "#/components/schemas/ResourceCostCalculation"
          description: Cost impact of the recommendation.
    EbsVolumeConfiguration:
      description: The Amazon Elastic Block Store volume configuration used for recommendations.
      type: object
      properties:
        storage:
          $ref: "#/components/schemas/StorageConfiguration"
          description: The disk storage of the Amazon Elastic Block Store volume.
        performance:
          $ref: "#/components/schemas/BlockStoragePerformanceConfiguration"
          description: The Amazon Elastic Block Store performance configuration.
        attachmentState:
          $ref: "#/components/schemas/String"
          description: The Amazon Elastic Block Store attachment state.
    StorageConfiguration:
      description: The storage configuration used for recommendations.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/String"
          description: The storage type.
