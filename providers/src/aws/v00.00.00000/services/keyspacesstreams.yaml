openapi: 3.0.0
info:
  version: "2024-09-09"
  title: Amazon Keyspaces Streams
  description: Amazon Keyspaces Streams
  x-serviceName: cassandra
  x-serviceAlias: keyspacesstreams
  x-protocol: json
  x-apiVersion: "2024-09-09"
  x-endpointPrefix: cassandra-streams
  x-targetPrefix: KeyspacesStreams
  x-jsonVersion: "1.0"
servers:
  - url: https://cassandra-streams.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for keyspacesstreams
paths:
  /GetRecords:
    post:
      operationId: GetRecords
      description: Retrieves data records from a specified shard in an Amazon Keyspaces data stream. This operation returns a collection of data records from the shard, including the primary key columns and information about modifications made to the captured table data. Each record represents a single data modification in the Amazon Keyspaces table and includes metadata about when the change occurred.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesStreams.GetRecords
            default: KeyspacesStreams.GetRecords
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                shardIterator:
                  $ref: "#/components/schemas/ShardIterator"
                  description: The unique identifier of the shard iterator. A shard iterator specifies the position in the shard from which you want to start reading data records sequentially. You obtain this value by calling the GetShardIterator operation. Each shard iterator is valid for 15 minutes after creation.
                maxResults:
                  $ref: "#/components/schemas/GetRecordsInputMaxResultsInteger"
                  description: The maximum number of records to return in a single GetRecords request. The default value is 100. You can specify a limit between 1 and 1000, but the actual number returned might be less than the specified maximum if the size of the data for the returned records exceeds the internal size limit.
              required:
                - shardIterator
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecordsOutput"
  /GetShardIterator:
    post:
      operationId: GetShardIterator
      description: Returns a shard iterator that serves as a bookmark for reading data from a specific position in an Amazon Keyspaces data stream's shard. The shard iterator specifies the shard position from which to start reading data records sequentially. You can specify whether to begin reading at the latest record, the oldest record, or at a particular sequence number within the shard.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesStreams.GetShardIterator
            default: KeyspacesStreams.GetShardIterator
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                streamArn:
                  $ref: "#/components/schemas/StreamArn"
                  description: The Amazon Resource Name (ARN) of the stream for which to get the shard iterator. The ARN uniquely identifies the stream within Amazon Keyspaces.
                shardId:
                  $ref: "#/components/schemas/ShardId"
                  description: The identifier of the shard within the stream. The shard ID uniquely identifies a subset of the stream's data records that you want to access.
                shardIteratorType:
                  $ref: "#/components/schemas/ShardIteratorType"
                  description: "Determines how the shard iterator is positioned. Must be one of the following: TRIM_HORIZON - Start reading at the last untrimmed record in the shard, which is the oldest data record in the shard. AT_SEQUENCE_NUMBER - Start reading exactly from the specified sequence number. AFTER_SEQUENCE_NUMBER - Start reading right after the specified sequence number. LATEST - Start reading just after the most recent record in the shard, so that you always read the most recent data."
                sequenceNumber:
                  $ref: "#/components/schemas/SequenceNumber"
                  description: The sequence number of the data record in the shard from which to start reading. Required if ShardIteratorType is AT_SEQUENCE_NUMBER or AFTER_SEQUENCE_NUMBER. This parameter is ignored for other iterator types.
              required:
                - streamArn
                - shardId
                - shardIteratorType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetShardIteratorOutput"
  /GetStream:
    post:
      operationId: GetStream
      description: Returns detailed information about a specific data capture stream for an Amazon Keyspaces table. The information includes the stream's Amazon Resource Name (ARN), creation time, current status, retention period, shard composition, and associated table details. This operation helps you monitor and manage the configuration of your Amazon Keyspaces data streams.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesStreams.GetStream
            default: KeyspacesStreams.GetStream
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                streamArn:
                  $ref: "#/components/schemas/StreamArn"
                  description: The Amazon Resource Name (ARN) of the stream for which detailed information is requested. This uniquely identifies the specific stream you want to get information about.
                maxResults:
                  $ref: "#/components/schemas/GetStreamInputMaxResultsInteger"
                  description: The maximum number of shard objects to return in a single GetStream request. The default value is 100. The minimum value is 1 and the maximum value is 100.
                shardFilter:
                  $ref: "#/components/schemas/ShardFilter"
                  description: Optional filter criteria to apply when retrieving shards. You can filter shards based on their parent shardID to get a list of children shards to narrow down the results returned by the GetStream operation.
                nextToken:
                  $ref: "#/components/schemas/ShardIdToken"
                  description: An optional pagination token provided by a previous GetStream operation. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxResults.
              required:
                - streamArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStreamOutput"
  /ListStreams:
    post:
      operationId: ListStreams
      description: Returns a list of all data capture streams associated with your Amazon Keyspaces account or for a specific keyspace or table. The response includes information such as stream ARNs, table associations, creation timestamps, and current status. This operation helps you discover and manage all active data streams in your Amazon Keyspaces environment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - KeyspacesStreams.ListStreams
            default: KeyspacesStreams.ListStreams
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                keyspaceName:
                  $ref: "#/components/schemas/KeyspaceName"
                  description: The name of the keyspace for which to list streams. If specified, only streams associated with tables in this keyspace are returned. If omitted, streams from all keyspaces are included in the results.
                tableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table for which to list streams. Must be used together with keyspaceName. If specified, only streams associated with this specific table are returned.
                maxResults:
                  $ref: "#/components/schemas/ListStreamsInputMaxResultsInteger"
                  description: The maximum number of streams to return in a single ListStreams request. The default value is 100. The minimum value is 1 and the maximum value is 100.
                nextToken:
                  $ref: "#/components/schemas/StreamArnToken"
                  description: An optional pagination token provided by a previous ListStreams operation. If this parameter is specified, the response includes only records beyond the token, up to the value specified by maxResults.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStreamsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ShardIterator:
      type: string
      minLength: 1
      maxLength: 4096
    GetRecordsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 1000
    GetRecordsOutput:
      type: object
      properties:
        changeRecords:
          $ref: "#/components/schemas/RecordList"
          description: An array of change data records retrieved from the specified shard. Each record represents a single data modification (insert, update, or delete) to a row in the Amazon Keyspaces table. Records include the primary key columns and information about what data was modified.
        nextShardIterator:
          $ref: "#/components/schemas/ShardIterator"
          description: The next position in the shard from which to start sequentially reading data records. If null, the shard has been closed and the requested iterator will not return any more data.
    RecordList:
      type: array
      items:
        $ref: "#/components/schemas/Record"
    Record:
      description: Represents a change data capture record for a row in an Amazon Keyspaces table, containing both the new and old states of the row.
      type: object
      properties:
        eventVersion:
          $ref: "#/components/schemas/String"
          description: The version of the record format, used to track the evolution of the record structure over time.
        createdAt:
          $ref: "#/components/schemas/Date"
          description: The timestamp indicating when this change data capture record was created.
        origin:
          $ref: "#/components/schemas/OriginType"
          description: The origin or source of this change data capture record.
        partitionKeys:
          type: object
          properties: {}
          description: The partition key columns and their values for the affected row.
        clusteringKeys:
          type: object
          properties: {}
          description: The clustering key columns and their values for the affected row, which determine the order of rows within a partition.
        newImage:
          $ref: "#/components/schemas/KeyspacesRow"
          description: The state of the row after the change operation that generated this record.
        oldImage:
          $ref: "#/components/schemas/KeyspacesRow"
          description: The state of the row before the change operation that generated this record.
        sequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: A unique identifier assigned to this record within the shard, used for ordering and tracking purposes.
    String:
      type: string
    Date:
      type: string
      format: date-time
    OriginType:
      type: string
      enum:
        - USER
        - REPLICATION
        - TTL
    KeyspacesRow:
      description: Represents a row in an Amazon Keyspaces table, containing regular column values, static column values, and row-level metadata.
      type: object
      properties:
        valueCells:
          type: object
          properties: {}
          description: A map of regular (non-static) column cells in the row, where keys are column names and values are the corresponding cells.
        staticCells:
          type: object
          properties: {}
          description: A map of static column cells shared by all rows with the same partition key, where keys are column names and values are the corresponding cells.
        rowMetadata:
          $ref: "#/components/schemas/KeyspacesMetadata"
          description: Metadata that applies to the entire row, such as timestamps and TTL information.
    KeyspacesMetadata:
      description: Contains metadata information associated with Amazon Keyspaces cells and rows.
      type: object
      properties:
        expirationTime:
          $ref: "#/components/schemas/String"
          description: The time at which the associated data will expire, based on the time-to-live (TTL) setting.
        writeTime:
          $ref: "#/components/schemas/String"
          description: The timestamp at which the associated data was written to the database.
    SequenceNumber:
      type: string
      minLength: 21
      maxLength: 48
    StreamArn:
      type: string
      minLength: 37
      maxLength: 1024
    ShardId:
      type: string
      minLength: 28
      maxLength: 65
    ShardIteratorType:
      type: string
      enum:
        - TRIM_HORIZON
        - LATEST
        - AT_SEQUENCE_NUMBER
        - AFTER_SEQUENCE_NUMBER
    GetShardIteratorOutput:
      type: object
      properties:
        shardIterator:
          $ref: "#/components/schemas/ShardIterator"
          description: The unique identifier for the shard iterator. This value is used in the GetRecords operation to retrieve data records from the specified shard. Each shard iterator expires 15 minutes after it is returned to the requester.
    GetStreamInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    ShardFilter:
      description: A filter used to limit the shards returned by a GetStream operation.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ShardFilterType"
          description: The type of shard filter to use, which determines how the shardId parameter is interpreted.
        shardId:
          $ref: "#/components/schemas/ShardId"
          description: The identifier of a specific shard used to filter results based on the specified filter type.
    ShardFilterType:
      type: string
      enum:
        - CHILD_SHARDS
    ShardIdToken:
      type: string
      minLength: 80
      maxLength: 3000
    GetStreamOutput:
      type: object
      properties:
        streamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies the stream within Amazon Keyspaces. This ARN can be used in other API operations to reference this specific stream.
        streamLabel:
          $ref: "#/components/schemas/String"
          description: A timestamp that serves as a unique identifier for this stream, used for debugging and monitoring purposes. The stream label represents the point in time when the stream was created.
        streamStatus:
          $ref: "#/components/schemas/StreamStatus"
          description: The current status of the stream. Values can be ENABLING, ENABLED, DISABLING, or DISABLED. Operations on the stream depend on its current status.
        streamViewType:
          $ref: "#/components/schemas/StreamViewType"
          description: "The format of the data records in this stream. Currently, this can be one of the following options: NEW_AND_OLD_IMAGES - both versions of the row, before and after the change. This is the default. NEW_IMAGE - the version of the row after the change. OLD_IMAGE - the version of the row before the change. KEYS_ONLY - the partition and clustering keys of the row that was changed."
        creationRequestDateTime:
          $ref: "#/components/schemas/Date"
          description: The date and time when the request to create this stream was issued. The value is represented in ISO 8601 format.
        keyspaceName:
          $ref: "#/components/schemas/KeyspaceName"
          description: The name of the keyspace containing the table associated with this stream. The keyspace name is part of the table's hierarchical identifier in Amazon Keyspaces.
        tableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table associated with this stream. The stream captures changes to rows in this Amazon Keyspaces table.
        shards:
          $ref: "#/components/schemas/ShardDescriptionList"
          description: An array of shard objects associated with this stream. Each shard contains a subset of the stream's data records and has its own unique identifier. The collection of shards represents the complete stream data.
        nextToken:
          $ref: "#/components/schemas/ShardIdToken"
          description: A pagination token that can be used in a subsequent GetStream request. This token is returned if the response contains more shards than can be returned in a single response.
      required:
        - streamArn
        - streamLabel
        - streamStatus
        - streamViewType
        - creationRequestDateTime
        - keyspaceName
        - tableName
    StreamStatus:
      type: string
      enum:
        - ENABLING
        - ENABLED
        - DISABLING
        - DISABLED
    StreamViewType:
      type: string
      enum:
        - NEW_IMAGE
        - OLD_IMAGE
        - NEW_AND_OLD_IMAGES
        - KEYS_ONLY
    KeyspaceName:
      type: string
      minLength: 1
      maxLength: 48
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_]{0,47}"
    TableName:
      type: string
      minLength: 1
      maxLength: 48
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_]{0,47}"
    ShardDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/Shard"
    Shard:
      description: Represents a uniquely identified group of change records within a change data capture stream for Amazon Keyspaces.
      type: object
      properties:
        shardId:
          $ref: "#/components/schemas/ShardId"
          description: A unique identifier for this shard within the stream.
        sequenceNumberRange:
          $ref: "#/components/schemas/SequenceNumberRange"
          description: The range of sequence numbers contained within this shard.
        parentShardIds:
          $ref: "#/components/schemas/ShardIdList"
          description: The identifiers of parent shards that this shard evolved from, if this shard was created through resharding.
    SequenceNumberRange:
      description: Defines a range of sequence numbers within a change data capture stream's shard for Amazon Keyspaces.
      type: object
      properties:
        startingSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The starting sequence number of the range.
        endingSequenceNumber:
          $ref: "#/components/schemas/SequenceNumber"
          description: The ending sequence number of the range, which may be null for open-ended ranges.
    ShardIdList:
      type: array
      items:
        $ref: "#/components/schemas/ShardId"
    ListStreamsInputMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    StreamArnToken:
      type: string
      minLength: 80
      maxLength: 3000
    ListStreamsOutput:
      type: object
      properties:
        streams:
          $ref: "#/components/schemas/StreamList"
          description: An array of stream objects, each containing summary information about a stream including its ARN, status, and associated table information. This list includes all streams that match the request criteria.
        nextToken:
          $ref: "#/components/schemas/StreamArnToken"
          description: A pagination token that can be used in a subsequent ListStreams request. This token is returned if the response contains more streams than can be returned in a single response based on the maxResults parameter.
    StreamList:
      type: array
      items:
        $ref: "#/components/schemas/Stream"
    Stream:
      description: Represents a change data capture stream for an Amazon Keyspaces table, which enables tracking and processing of data changes.
      type: object
      properties:
        streamArn:
          $ref: "#/components/schemas/StreamArn"
          description: The Amazon Resource Name (ARN) that uniquely identifies this stream.
        keyspaceName:
          $ref: "#/components/schemas/KeyspaceName"
          description: The name of the keyspace containing the table associated with this stream.
        tableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table associated with this stream.
        streamLabel:
          $ref: "#/components/schemas/String"
          description: A unique identifier for this stream that can be used in stream operations.
      required:
        - streamArn
        - keyspaceName
        - tableName
        - streamLabel
  x-stackQL-resources:
    records:
      id: aws.keyspacesstreams.records
      name: records
      title: records
      methods:
        get_records:
          operation:
            $ref: "#/paths/~1GetRecords/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/records/methods/get_records"
        insert: []
        update: []
        delete: []
    shard_iterators:
      id: aws.keyspacesstreams.shard_iterators
      name: shard_iterators
      title: shard_iterators
      methods:
        get_shard_iterator:
          operation:
            $ref: "#/paths/~1GetShardIterator/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/shard_iterators/methods/get_shard_iterator"
        insert: []
        update: []
        delete: []
    streams:
      id: aws.keyspacesstreams.streams
      name: streams
      title: streams
      methods:
        get_stream:
          operation:
            $ref: "#/paths/~1GetStream/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.shards
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            pagination:
              requestToken:
                key: nextToken
                location: body
              responseToken:
                key: $.nextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
        list_streams:
          operation:
            $ref: "#/paths/~1ListStreams/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            objectKey: $.streams
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            pagination:
              requestToken:
                key: nextToken
                location: body
              responseToken:
                key: $.nextToken
                location: body
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/streams/methods/get_stream"
          - $ref: "#/components/x-stackQL-resources/streams/methods/list_streams"
        insert: []
        update: []
        delete: []
