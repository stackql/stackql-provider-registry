      operationId: StartDbNode
      description: Starts the specified DB node in a VM cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.StartDbNode
            default: Odb.StartDbNode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudVmClusterId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the VM cluster that contains the DB node to start.
                dbNodeId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the DB node to start.
              required:
                - cloudVmClusterId
                - dbNodeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDbNodeOutput"
  /StopDbNode:
    post:
      operationId: StopDbNode
      description: Stops the specified DB node in a VM cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.StopDbNode
            default: Odb.StopDbNode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudVmClusterId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the VM cluster that contains the DB node to stop.
                dbNodeId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the DB node to stop.
              required:
                - cloudVmClusterId
                - dbNodeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDbNodeOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Applies tags to the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.TagResource
            default: Odb.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to apply tags to.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: The list of tags to apply to the resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.UntagResource
            default: Odb.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
