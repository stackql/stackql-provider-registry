openapi: 3.0.0
info:
  version: "2024-08-20"
  title: odb
  description: odb
  x-serviceName: odb
  x-serviceAlias: odb
  x-protocol: json
  x-apiVersion: "2024-08-20"
  x-endpointPrefix: odb
  x-targetPrefix: Odb
  x-jsonVersion: "1.0"
servers:
  - url: https://odb.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for odb
paths:
  /AcceptMarketplaceRegistration:
    post:
      operationId: AcceptMarketplaceRegistration
      description: Registers the Amazon Web Services Marketplace token for your Amazon Web Services account to activate your Oracle Database@Amazon Web Services subscription.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.AcceptMarketplaceRegistration
            default: Odb.AcceptMarketplaceRegistration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                marketplaceRegistrationToken:
                  $ref: "#/components/schemas/String"
                  description: The registration token that's generated by Amazon Web Services Marketplace and sent to Oracle Database@Amazon Web Services.
              required:
                - marketplaceRegistrationToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptMarketplaceRegistrationOutput"
  /AssociateIamRoleToResource:
    post:
      operationId: AssociateIamRoleToResource
      description: Associates an Amazon Web Services Identity and Access Management (IAM) service role with a specified resource to enable Amazon Web Services service integration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.AssociateIamRoleToResource
            default: Odb.AssociateIamRoleToResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                iamRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                  description: The Amazon Resource Name (ARN) of the Amazon Web Services Identity and Access Management (IAM) service role to associate with the resource.
                awsIntegration:
                  $ref: "#/components/schemas/SupportedAwsIntegration"
                  description: The Amazon Web Services integration configuration settings for the Amazon Web Services Identity and Access Management (IAM) service role association.
                resourceArn:
                  $ref: "#/components/schemas/AssociateIamRoleToResourceInputResourceArnString"
                  description: The Amazon Resource Name (ARN) of the target resource to associate with the Amazon Web Services Identity and Access Management (IAM) service role.
              required:
                - iamRoleArn
                - awsIntegration
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateIamRoleToResourceOutput"
  /CreateCloudAutonomousVmCluster:
    post:
      operationId: CreateCloudAutonomousVmCluster
      description: Creates a new Autonomous VM cluster in the specified Exadata infrastructure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.CreateCloudAutonomousVmCluster
            default: Odb.CreateCloudAutonomousVmCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudExadataInfrastructureId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the Exadata infrastructure where the VM cluster will be created.
                odbNetworkId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the ODB network to be used for the VM cluster.
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: The display name for the Autonomous VM cluster. The name does not need to be unique.
                clientToken:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputClientTokenString"
                  description: A client-provided token to ensure idempotency of the request.
                autonomousDataStorageSizeInTBs:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputAutonomousDataStorageSizeInTBsDouble"
                  description: The data disk group size to be allocated for Autonomous Databases, in terabytes (TB).
                cpuCoreCountPerNode:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputCpuCoreCountPerNodeInteger"
                  description: The number of CPU cores to be enabled per VM cluster node.
                dbServers:
                  $ref: "#/components/schemas/StringList"
                  description: The list of database servers to be used for the Autonomous VM cluster.
                description:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputDescriptionString"
                  description: A user-provided description of the Autonomous VM cluster.
                isMtlsEnabledVmCluster:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to enable mutual TLS (mTLS) authentication for the Autonomous VM cluster.
                licenseModel:
                  $ref: "#/components/schemas/LicenseModel"
                  description: The Oracle license model to apply to the Autonomous VM cluster.
                maintenanceWindow:
                  $ref: "#/components/schemas/MaintenanceWindow"
                  description: The scheduling details for the maintenance window. Patching and system updates take place during the maintenance window.
                memoryPerOracleComputeUnitInGBs:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputMemoryPerOracleComputeUnitInGBsInteger"
                  description: The amount of memory to be allocated per OCPU, in GB.
                scanListenerPortNonTls:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputScanListenerPortNonTlsInteger"
                  description: The SCAN listener port for non-TLS (TCP) protocol.
                scanListenerPortTls:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputScanListenerPortTlsInteger"
                  description: The SCAN listener port for TLS (TCP) protocol.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: Free-form tags for this resource. Each tag is a key-value pair with no predefined name, type, or namespace.
                timeZone:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputTimeZoneString"
                  description: The time zone to use for the Autonomous VM cluster.
                totalContainerDatabases:
                  $ref: "#/components/schemas/CreateCloudAutonomousVmClusterInputTotalContainerDatabasesInteger"
                  description: The total number of Autonomous CDBs that you can create in the Autonomous VM cluster.
              required:
                - cloudExadataInfrastructureId
                - odbNetworkId
                - displayName
                - autonomousDataStorageSizeInTBs
                - cpuCoreCountPerNode
                - memoryPerOracleComputeUnitInGBs
                - totalContainerDatabases
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudAutonomousVmClusterOutput"
  /CreateCloudExadataInfrastructure:
    post:
      operationId: CreateCloudExadataInfrastructure
      description: Creates an Exadata infrastructure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.CreateCloudExadataInfrastructure
            default: Odb.CreateCloudExadataInfrastructure
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: A user-friendly name for the Exadata infrastructure.
                shape:
                  $ref: "#/components/schemas/CreateCloudExadataInfrastructureInputShapeString"
                  description: The model name of the Exadata infrastructure. For the list of valid model names, use the ListDbSystemShapes operation.
                availabilityZone:
                  $ref: "#/components/schemas/CreateCloudExadataInfrastructureInputAvailabilityZoneString"
                  description: "The name of the Availability Zone (AZ) where the Exadata infrastructure is located. This operation requires that you specify a value for either availabilityZone or availabilityZoneId. Example: us-east-1a"
                availabilityZoneId:
                  $ref: "#/components/schemas/CreateCloudExadataInfrastructureInputAvailabilityZoneIdString"
                  description: "The AZ ID of the AZ where the Exadata infrastructure is located. This operation requires that you specify a value for either availabilityZone or availabilityZoneId. Example: use1-az1"
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: The list of resource tags to apply to the Exadata infrastructure.
                computeCount:
                  $ref: "#/components/schemas/Integer"
                  description: The number of database servers for the Exadata infrastructure. Valid values for this parameter depend on the shape. To get information about the minimum and maximum values, use the ListDbSystemShapes operation.
                customerContactsToSendToOCI:
                  $ref: "#/components/schemas/CustomerContacts"
                  description: The email addresses of contacts to receive notification from Oracle about maintenance updates for the Exadata infrastructure.
                maintenanceWindow:
                  $ref: "#/components/schemas/MaintenanceWindow"
                  description: The maintenance window configuration for the Exadata Cloud infrastructure. This allows you to define when maintenance operations such as patching and updates can be performed on the infrastructure.
                storageCount:
                  $ref: "#/components/schemas/Integer"
                  description: The number of storage servers to activate for this Exadata infrastructure. Valid values for this parameter depend on the shape. To get information about the minimum and maximum values, use the ListDbSystemShapes operation.
                clientToken:
                  $ref: "#/components/schemas/CreateCloudExadataInfrastructureInputClientTokenString"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, the Amazon Web Services SDK automatically generates a client token and uses it for the request to ensure idempotency. The client token is valid for up to 24 hours after it's first used.
                databaseServerType:
                  $ref: "#/components/schemas/CreateCloudExadataInfrastructureInputDatabaseServerTypeString"
                  description: The database server model type of the Exadata infrastructure. For the list of valid model names, use the ListDbSystemShapes operation.
                storageServerType:
                  $ref: "#/components/schemas/CreateCloudExadataInfrastructureInputStorageServerTypeString"
                  description: The storage server model type of the Exadata infrastructure. For the list of valid model names, use the ListDbSystemShapes operation.
              required:
                - displayName
                - shape
                - computeCount
                - storageCount
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudExadataInfrastructureOutput"
  /CreateCloudVmCluster:
    post:
      operationId: CreateCloudVmCluster
      description: Creates a VM cluster on the specified Exadata infrastructure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.CreateCloudVmCluster
            default: Odb.CreateCloudVmCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudExadataInfrastructureId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the Exadata infrastructure for this VM cluster.
                cpuCoreCount:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputCpuCoreCountInteger"
                  description: The number of CPU cores to enable on the VM cluster.
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: A user-friendly name for the VM cluster.
                giVersion:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputGiVersionString"
                  description: "A valid software version of Oracle Grid Infrastructure (GI). To get the list of valid values, use the ListGiVersions operation and specify the shape of the Exadata infrastructure. Example: 19.0.0.0"
                hostname:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputHostnameString"
                  description: "The host name for the VM cluster. Constraints: Can't be \"localhost\" or \"hostname\". Can't contain \"-version\". The maximum length of the combined hostname and domain is 63 characters. The hostname must be unique within the subnet."
                sshPublicKeys:
                  $ref: "#/components/schemas/StringList"
                  description: The public key portion of one or more key pairs used for SSH access to the VM cluster.
                odbNetworkId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the ODB network for the VM cluster.
                clusterName:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputClusterNameString"
                  description: A name for the Grid Infrastructure cluster. The name isn't case sensitive.
                dataCollectionOptions:
                  $ref: "#/components/schemas/DataCollectionOptions"
                  description: The set of preferences for the various diagnostic collection options for the VM cluster.
                dataStorageSizeInTBs:
                  $ref: "#/components/schemas/Double"
                  description: The size of the data disk group, in terabytes (TBs), to allocate for the VM cluster.
                dbNodeStorageSizeInGBs:
                  $ref: "#/components/schemas/Integer"
                  description: The amount of local node storage, in gigabytes (GBs), to allocate for the VM cluster.
                dbServers:
                  $ref: "#/components/schemas/StringList"
                  description: The list of database servers for the VM cluster.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: The list of resource tags to apply to the VM cluster.
                isLocalBackupEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to enable database backups to local Exadata storage for the VM cluster.
                isSparseDiskgroupEnabled:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to create a sparse disk group for the VM cluster.
                licenseModel:
                  $ref: "#/components/schemas/LicenseModel"
                  description: "The Oracle license model to apply to the VM cluster. Default: LICENSE_INCLUDED"
                memorySizeInGBs:
                  $ref: "#/components/schemas/Integer"
                  description: The amount of memory, in gigabytes (GBs), to allocate for the VM cluster.
                systemVersion:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputSystemVersionString"
                  description: The version of the operating system of the image for the VM cluster.
                timeZone:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputTimeZoneString"
                  description: "The time zone for the VM cluster. For a list of valid values for time zone, you can check the options in the console. Default: UTC"
                clientToken:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputClientTokenString"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, the Amazon Web Services SDK automatically generates a client token and uses it for the request to ensure idempotency. The client token is valid for up to 24 hours after it's first used.
                scanListenerPortTcp:
                  $ref: "#/components/schemas/CreateCloudVmClusterInputScanListenerPortTcpInteger"
                  description: "The port number for TCP connections to the single client access name (SCAN) listener. Valid values: 1024–8999 with the following exceptions: 2484, 6100, 6200, 7060, 7070, 7085, and 7879 Default: 1521"
              required:
                - cloudExadataInfrastructureId
                - cpuCoreCount
                - displayName
                - giVersion
                - hostname
                - sshPublicKeys
                - odbNetworkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudVmClusterOutput"
  /CreateOdbNetwork:
    post:
      operationId: CreateOdbNetwork
      description: Creates an ODB network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.CreateOdbNetwork
            default: Odb.CreateOdbNetwork
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: A user-friendly name for the ODB network.
                availabilityZone:
                  $ref: "#/components/schemas/CreateOdbNetworkInputAvailabilityZoneString"
                  description: The Amazon Web Services Availability Zone (AZ) where the ODB network is located. This operation requires that you specify a value for either availabilityZone or availabilityZoneId.
                availabilityZoneId:
                  $ref: "#/components/schemas/CreateOdbNetworkInputAvailabilityZoneIdString"
                  description: The AZ ID of the AZ where the ODB network is located. This operation requires that you specify a value for either availabilityZone or availabilityZoneId.
                clientSubnetCidr:
                  $ref: "#/components/schemas/CreateOdbNetworkInputClientSubnetCidrString"
                  description: "The CIDR range of the client subnet for the ODB network. Constraints: Must not overlap with the CIDR range of the backup subnet. Must not overlap with the CIDR ranges of the VPCs that are connected to the ODB network. Must not use the following CIDR ranges that are reserved by OCI: 100.106.0.0/16 and 100.107.0.0/16 169.254.0.0/16 224.0.0.0 - 239.255.255.255 240.0.0.0 - 255.255.255.255"
                backupSubnetCidr:
                  $ref: "#/components/schemas/CreateOdbNetworkInputBackupSubnetCidrString"
                  description: "The CIDR range of the backup subnet for the ODB network. Constraints: Must not overlap with the CIDR range of the client subnet. Must not overlap with the CIDR ranges of the VPCs that are connected to the ODB network. Must not use the following CIDR ranges that are reserved by OCI: 100.106.0.0/16 and 100.107.0.0/16 169.254.0.0/16 224.0.0.0 - 239.255.255.255 240.0.0.0 - 255.255.255.255"
                customDomainName:
                  $ref: "#/components/schemas/CreateOdbNetworkInputCustomDomainNameString"
                  description: The domain name to use for the resources in the ODB network.
                defaultDnsPrefix:
                  $ref: "#/components/schemas/CreateOdbNetworkInputDefaultDnsPrefixString"
                  description: The DNS prefix to the default DNS domain name. The default DNS domain name is oraclevcn.com.
                clientToken:
                  $ref: "#/components/schemas/CreateOdbNetworkInputClientTokenString"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. If you don't specify a client token, the Amazon Web Services SDK automatically generates a client token and uses it for the request to ensure idempotency. The client token is valid for up to 24 hours after it's first used.
                s3Access:
                  $ref: "#/components/schemas/Access"
                  description: Specifies the configuration for Amazon S3 access from the ODB network.
                zeroEtlAccess:
                  $ref: "#/components/schemas/Access"
                  description: Specifies the configuration for Zero-ETL access from the ODB network.
                stsAccess:
                  $ref: "#/components/schemas/Access"
                  description: The Amazon Web Services Security Token Service (STS) access configuration for the ODB network.
                kmsAccess:
                  $ref: "#/components/schemas/Access"
                  description: The Amazon Web Services Key Management Service (KMS) access configuration for the ODB network.
                s3PolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: Specifies the endpoint policy for Amazon S3 access from the ODB network.
                stsPolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The Amazon Web Services Security Token Service (STS) policy document that defines permissions for token service usage within the ODB network.
                kmsPolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The Amazon Web Services Key Management Service (KMS) policy document that defines permissions for key usage within the ODB network.
                crossRegionS3RestoreSourcesToEnable:
                  $ref: "#/components/schemas/StringList"
                  description: The cross-Region Amazon S3 restore sources to enable for the ODB network.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: The list of resource tags to apply to the ODB network.
              required:
                - displayName
                - clientSubnetCidr
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOdbNetworkOutput"
  /CreateOdbPeeringConnection:
    post:
      operationId: CreateOdbPeeringConnection
      description: Creates a peering connection between an ODB network and a VPC. A peering connection enables private connectivity between the networks for application-tier communication.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.CreateOdbPeeringConnection
            default: Odb.CreateOdbPeeringConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                odbNetworkId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the ODB network that initiates the peering connection.
                peerNetworkId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the peer network. This can be either a VPC ID or another ODB network ID.
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: The display name for the ODB peering connection.
                peerNetworkCidrsToBeAdded:
                  $ref: "#/components/schemas/PeeredCidrList"
                  description: A list of CIDR blocks to add to the peering connection. These CIDR blocks define the IP address ranges that can communicate through the peering connection.
                peerNetworkRouteTableIds:
                  $ref: "#/components/schemas/PeerNetworkRouteTableIdList"
                  description: The unique identifier of the VPC route table for which a route to the ODB network is automatically created during peering connection establishment.
                clientToken:
                  $ref: "#/components/schemas/CreateOdbPeeringConnectionInputClientTokenString"
                  description: "The client token for the ODB peering connection request. Constraints: Must be unique for each request."
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: The tags to assign to the ODB peering connection.
              required:
                - odbNetworkId
                - peerNetworkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOdbPeeringConnectionOutput"
  /DeleteCloudAutonomousVmCluster:
    post:
      operationId: DeleteCloudAutonomousVmCluster
      description: Deletes an Autonomous VM cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.DeleteCloudAutonomousVmCluster
            default: Odb.DeleteCloudAutonomousVmCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudAutonomousVmClusterId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the Autonomous VM cluster to delete.
              required:
                - cloudAutonomousVmClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCloudAutonomousVmClusterOutput"
  /DeleteCloudExadataInfrastructure:
    post:
      operationId: DeleteCloudExadataInfrastructure
      description: Deletes the specified Exadata infrastructure. Before you use this operation, make sure to delete all of the VM clusters that are hosted on this Exadata infrastructure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.DeleteCloudExadataInfrastructure
            default: Odb.DeleteCloudExadataInfrastructure
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudExadataInfrastructureId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the Exadata infrastructure to delete.
              required:
                - cloudExadataInfrastructureId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCloudExadataInfrastructureOutput"
  /DeleteCloudVmCluster:
    post:
      operationId: DeleteCloudVmCluster
      description: Deletes the specified VM cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.DeleteCloudVmCluster
            default: Odb.DeleteCloudVmCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudVmClusterId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The unique identifier of the VM cluster to delete.
              required:
                - cloudVmClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCloudVmClusterOutput"
  /DeleteOdbNetwork:
    post:
      operationId: DeleteOdbNetwork
      description: Deletes the specified ODB network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.DeleteOdbNetwork
            default: Odb.DeleteOdbNetwork
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                odbNetworkId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the ODB network to delete.
                deleteAssociatedResources:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether to delete associated OCI networking resources along with the ODB network.
              required:
                - odbNetworkId
                - deleteAssociatedResources
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOdbNetworkOutput"
  /DeleteOdbPeeringConnection:
    post:
      operationId: DeleteOdbPeeringConnection
      description: Deletes an ODB peering connection. When you delete an ODB peering connection, the underlying VPC peering connection is also deleted.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.DeleteOdbPeeringConnection
            default: Odb.DeleteOdbPeeringConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                odbPeeringConnectionId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the ODB peering connection to delete.
              required:
                - odbPeeringConnectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOdbPeeringConnectionOutput"
  /DisassociateIamRoleFromResource:
    post:
      operationId: DisassociateIamRoleFromResource
      description: Disassociates an Amazon Web Services Identity and Access Management (IAM) service role from a specified resource to disable Amazon Web Services service integration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.DisassociateIamRoleFromResource
            default: Odb.DisassociateIamRoleFromResource
      requestBody:
