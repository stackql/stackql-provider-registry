        - BRING_YOUR_OWN_LICENSE
        - LICENSE_INCLUDED
    MaintenanceWindow:
      description: The scheduling details for the maintenance window. Patching and system updates take place during the maintenance window.
      type: object
      properties:
        customActionTimeoutInMins:
          $ref: "#/components/schemas/MaintenanceWindowCustomActionTimeoutInMinsInteger"
          description: The custom action timeout in minutes for the maintenance window.
        daysOfWeek:
          $ref: "#/components/schemas/DaysOfWeek"
          description: The days of the week when maintenance can be performed.
        hoursOfDay:
          $ref: "#/components/schemas/HoursOfDay"
          description: The hours of the day when maintenance can be performed.
        isCustomActionTimeoutEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether custom action timeout is enabled for the maintenance window.
        leadTimeInWeeks:
          $ref: "#/components/schemas/MaintenanceWindowLeadTimeInWeeksInteger"
          description: The lead time in weeks before the maintenance window.
        months:
          $ref: "#/components/schemas/Months"
          description: The months when maintenance can be performed.
