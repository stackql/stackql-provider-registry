            type: string
            enum:
              - Odb.UpdateCloudExadataInfrastructure
            default: Odb.UpdateCloudExadataInfrastructure
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                cloudExadataInfrastructureId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the Exadata infrastructure to update.
                maintenanceWindow:
                  $ref: "#/components/schemas/MaintenanceWindow"
              required:
                - cloudExadataInfrastructureId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCloudExadataInfrastructureOutput"
  /UpdateOdbNetwork:
    post:
      operationId: UpdateOdbNetwork
      description: Updates properties of a specified ODB network.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.UpdateOdbNetwork
            default: Odb.UpdateOdbNetwork
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                odbNetworkId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The unique identifier of the ODB network to update.
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: The new user-friendly name of the ODB network.
                peeredCidrsToBeAdded:
                  $ref: "#/components/schemas/StringList"
                  description: The list of CIDR ranges from the peered VPC that allow access to the ODB network.
                peeredCidrsToBeRemoved:
                  $ref: "#/components/schemas/StringList"
                  description: The list of CIDR ranges from the peered VPC to remove from the ODB network.
                s3Access:
                  $ref: "#/components/schemas/Access"
                  description: Specifies the updated configuration for Amazon S3 access from the ODB network.
                zeroEtlAccess:
                  $ref: "#/components/schemas/Access"
                  description: Specifies the updated configuration for Zero-ETL access from the ODB network.
                stsAccess:
                  $ref: "#/components/schemas/Access"
                  description: The Amazon Web Services Security Token Service (STS) access configuration for the ODB network.
                kmsAccess:
                  $ref: "#/components/schemas/Access"
                  description: The Amazon Web Services Key Management Service (KMS) access configuration for the ODB network.
                s3PolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: Specifies the updated endpoint policy for Amazon S3 access from the ODB network.
                stsPolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The Amazon Web Services Security Token Service (STS) policy document that defines permissions for token service usage within the ODB network.
                kmsPolicyDocument:
                  $ref: "#/components/schemas/PolicyDocument"
                  description: The Amazon Web Services Key Management Service (KMS) policy document that defines permissions for key usage within the ODB network.
                crossRegionS3RestoreSourcesToEnable:
                  $ref: "#/components/schemas/StringList"
                  description: The cross-Region Amazon S3 restore sources to enable for the ODB network.
                crossRegionS3RestoreSourcesToDisable:
                  $ref: "#/components/schemas/StringList"
                  description: The cross-Region Amazon S3 restore sources to disable for the ODB network.
              required:
                - odbNetworkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOdbNetworkOutput"
  /UpdateOdbPeeringConnection:
    post:
      operationId: UpdateOdbPeeringConnection
      description: Modifies the settings of an Oracle Database@Amazon Web Services peering connection. You can update the display name and add or remove CIDR blocks from the peering connection.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - Odb.UpdateOdbPeeringConnection
            default: Odb.UpdateOdbPeeringConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                odbPeeringConnectionId:
                  $ref: "#/components/schemas/ResourceIdOrArn"
                  description: The identifier of the Oracle Database@Amazon Web Services peering connection to update.
                displayName:
                  $ref: "#/components/schemas/ResourceDisplayName"
                  description: A new display name for the peering connection.
                peerNetworkCidrsToBeAdded:
                  $ref: "#/components/schemas/PeeredCidrList"
                  description: A list of CIDR blocks to add to the peering connection. These CIDR blocks define the IP address ranges that can communicate through the peering connection. The CIDR blocks must not overlap with existing CIDR blocks in the Oracle Database@Amazon Web Services network.
                peerNetworkCidrsToBeRemoved:
                  $ref: "#/components/schemas/PeeredCidrList"
                  description: A list of CIDR blocks to remove from the peering connection. The CIDR blocks must currently exist in the peering connection.
              required:
                - odbPeeringConnectionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOdbPeeringConnectionOutput"
