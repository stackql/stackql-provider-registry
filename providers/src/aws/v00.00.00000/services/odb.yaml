              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to remove tags from.
                tagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: The names (keys) of the tags to remove from the resource.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateCloudExadataInfrastructure:
    post:
      operationId: UpdateCloudExadataInfrastructure
      description: Updates the properties of an Exadata infrastructure resource.
      parameters:
