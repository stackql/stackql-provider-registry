        PUSH:
          type: object
          properties: {}
          description: Specifies the schedule settings for the push channel.
        VOICE:
          type: object
          properties: {}
          description: Specifies the schedule settings for the voice channel.
        CUSTOM:
          type: object
          properties: {}
          description: Specifies the schedule settings for the custom channel.
    ClosedDays:
