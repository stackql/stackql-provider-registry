        ClosedDays:
          $ref: "#/components/schemas/ClosedDays"
          description: The time when a journey will not send messages. QuietTime should be configured first and SendingSchedule should be set to true.
        TimezoneEstimationMethods:
          $ref: "#/components/schemas/ListOf__TimezoneEstimationMethodsElement"
          description: An array of time zone estimation methods, if any, to use for determining an Endpoints time zone if the Endpoint does not have a value for the Demographic.Timezone attribute. PHONE_NUMBER - A time zone is determined based on the Endpoint.Address and Endpoint.Location.Country. POSTAL_CODE - A time zone is determined based on the Endpoint.Location.PostalCode and Endpoint.Location.Country. POSTAL_CODE detection is only supported in the United States, United Kingdom, Australia, New Zealand, Canada, France, Italy, Spain, Germany and in regions where Amazon Pinpoint is available.
      required:
        - Name
        - Id
        - ApplicationId
    PushNotificationTemplateRequest:
      description: Specifies the content and settings for a message template that can be used in messages that are sent through a push notification channel.
      type: object
      properties:
        ADM:
          $ref: "#/components/schemas/AndroidPushNotificationTemplate"
          description: The message template to use for the ADM (Amazon Device Messaging) channel. This message template overrides the default template for push notification channels (DefaultPushNotificationTemplate).
        APNS:
          $ref: "#/components/schemas/APNSPushNotificationTemplate"
          description: The message template to use for the APNs (Apple Push Notification service) channel. This message template overrides the default template for push notification channels (DefaultPushNotificationTemplate).
        Baidu:
          $ref: "#/components/schemas/AndroidPushNotificationTemplate"
          description: The message template to use for the Baidu (Baidu Cloud Push) channel. This message template overrides the default template for push notification channels (DefaultPushNotificationTemplate).
        Default:
          $ref: "#/components/schemas/DefaultPushNotificationTemplate"
          description: The default message template to use for push notification channels.
        DefaultSubstitutions:
          $ref: "#/components/schemas/__string"
          description: A JSON object that specifies the default values to use for message variables in the message template. This object is a set of key-value pairs. Each key defines a message variable in the template. The corresponding value defines the default value for that variable. When you create a message that's based on the template, you can override these defaults with message-specific and address-specific variables and values.
        GCM:
          $ref: "#/components/schemas/AndroidPushNotificationTemplate"
          description: The message template to use for the GCM channel, which is used to send notifications through the Firebase Cloud Messaging (FCM), formerly Google Cloud Messaging (GCM), service. This message template overrides the default template for push notification channels (DefaultPushNotificationTemplate).
        RecommenderId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the recommender model to use for the message template. Amazon Pinpoint uses this value to determine how to retrieve and process data from a recommender model when it sends messages that use the template, if the template contains message variables for recommendation data.
        tags:
          type: object
          properties: {}
          description: As of 22-05-2023 tags has been deprecated for update operations. After this date any value in tags is not processed and an error code is not returned. To manage tags we recommend using either Tags in the API Reference for Amazon Pinpoint, resourcegroupstaggingapi commands in the AWS Command Line Interface Documentation or resourcegroupstaggingapi in the AWS SDK. (Deprecated) A string-to-string map of key-value pairs that defines the tags to associate with the message template. Each tag consists of a required tag key and an associated tag value.
        TemplateDescription:
          $ref: "#/components/schemas/__string"
          description: A custom description of the message template.
    AndroidPushNotificationTemplate:
      description: Specifies channel-specific content and settings for a message template that can be used in push notifications that are sent through the ADM (Amazon Device Messaging), Baidu (Baidu Cloud Push), or GCM (Firebase Cloud Messaging, formerly Google Cloud Messaging) channel.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if a recipient taps a push notification that's based on the message template. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This action uses the deep-linking features of the Android platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The message body to use in a push notification that's based on the message template.
        ImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the large icon image to display in the content view of a push notification that's based on the message template.
        ImageUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image to display in a push notification that's based on the message template.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for a push notification that's based on the message template. If specified, this value overrides all other content for the message template.
        SmallImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the small icon image to display in the status bar and the content view of a push notification that's based on the message template.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The sound to play when a recipient receives a push notification that's based on the message template. You can use the default stream or specify the file name of a sound resource that's bundled in your app. On an Android platform, the sound file must reside in /res/raw/.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to use in a push notification that's based on the message template. This title appears above the notification message on a recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in a recipient's default mobile browser, if a recipient taps a push notification that's based on the message template and the value of the Action property is URL.
    APNSPushNotificationTemplate:
      description: Specifies channel-specific content and settings for a message template that can be used in push notifications that are sent through the APNs (Apple Push Notification service) channel.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if a recipient taps a push notification that's based on the message template. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This setting uses the deep-linking features of the iOS platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The message body to use in push notifications that are based on the message template.
        MediaUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image or video to display in push notifications that are based on the message template.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for push notifications that are based on the message template. If specified, this value overrides all other content for the message template.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The key for the sound to play when the recipient receives a push notification that's based on the message template. The value for this key is the name of a sound file in your app's main bundle or the Library/Sounds folder in your app's data container. If the sound file can't be found or you specify default for the value, the system plays the default alert sound.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to use in push notifications that are based on the message template. This title appears above the notification message on a recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in the recipient's default mobile browser, if a recipient taps a push notification that's based on the message template and the value of the Action property is URL.
    DefaultPushNotificationTemplate:
      description: Specifies the default settings and content for a message template that can be used in messages that are sent through a push notification channel.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if a recipient taps a push notification that's based on the message template. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This setting uses the deep-linking features of the iOS and Android platforms. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The message body to use in push notifications that are based on the message template.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The sound to play when a recipient receives a push notification that's based on the message template. You can use the default stream or specify the file name of a sound resource that's bundled in your app. On an Android platform, the sound file must reside in /res/raw/. For an iOS platform, this value is the key for the name of a sound file in your app's main bundle or the Library/Sounds folder in your app's data container. If the sound file can't be found or you specify default for the value, the system plays the default alert sound.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to use in push notifications that are based on the message template. This title appears above the notification message on a recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in a recipient's default mobile browser, if a recipient taps a push notification that's based on the message template and the value of the Action property is URL.
    CreatePushTemplateResponse:
      type: object
      properties:
        CreateTemplateMessageBody:
          $ref: "#/components/schemas/CreateTemplateMessageBody"
      required:
        - CreateTemplateMessageBody
    CreateRecommenderConfiguration:
      description: Specifies Amazon Pinpoint configuration settings for retrieving and processing recommendation data from a recommender model.
      type: object
      properties:
        Attributes:
          type: object
          properties: {}
          description: "A map of key-value pairs that defines 1-10 custom endpoint or user attributes, depending on the value for the RecommendationProviderIdType property. Each of these attributes temporarily stores a recommended item that's retrieved from the recommender model and sent to an AWS Lambda function for additional processing. Each attribute can be used as a message variable in a message template. In the map, the key is the name of a custom attribute and the value is a custom display name for that attribute. The display name appears in the Attribute finder of the template editor on the Amazon Pinpoint console. The following restrictions apply to these names: An attribute name must start with a letter or number and it can contain up to 50 characters. The characters can be letters, numbers, underscores (_), or hyphens (-). Attribute names are case sensitive and must be unique. An attribute display name must start with a letter or number and it can contain up to 25 characters. The characters can be letters, numbers, spaces, underscores (_), or hyphens (-). This object is required if the configuration invokes an AWS Lambda function (RecommendationTransformerUri) to process recommendation data. Otherwise, don't include this object in your request."
        Description:
          $ref: "#/components/schemas/__string"
          description: "A custom description of the configuration for the recommender model. The description can contain up to 128 characters. The characters can be letters, numbers, spaces, or the following symbols: _ ; () , ‐."
        Name:
          $ref: "#/components/schemas/__string"
          description: A custom name of the configuration for the recommender model. The name must start with a letter or number and it can contain up to 128 characters. The characters can be letters, numbers, spaces, underscores (_), or hyphens (-).
        RecommendationProviderIdType:
          $ref: "#/components/schemas/__string"
          description: "The type of Amazon Pinpoint ID to associate with unique user IDs in the recommender model. This value enables the model to use attribute and event data that’s specific to a particular endpoint or user in an Amazon Pinpoint application. Valid values are: PINPOINT_ENDPOINT_ID - Associate each user in the model with a particular endpoint in Amazon Pinpoint. The data is correlated based on endpoint IDs in Amazon Pinpoint. This is the default value. PINPOINT_USER_ID - Associate each user in the model with a particular user and endpoint in Amazon Pinpoint. The data is correlated based on user IDs in Amazon Pinpoint. If you specify this value, an endpoint definition in Amazon Pinpoint has to specify both a user ID (UserId) and an endpoint ID. Otherwise, messages won’t be sent to the user's endpoint."
        RecommendationProviderRoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that authorizes Amazon Pinpoint to retrieve recommendation data from the recommender model.
        RecommendationProviderUri:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the recommender model to retrieve recommendation data from. This value must match the ARN of an Amazon Personalize campaign.
        RecommendationTransformerUri:
          $ref: "#/components/schemas/__string"
          description: The name or Amazon Resource Name (ARN) of the AWS Lambda function to invoke for additional processing of recommendation data that's retrieved from the recommender model.
        RecommendationsDisplayName:
          $ref: "#/components/schemas/__string"
          description: A custom display name for the standard endpoint or user attribute (RecommendationItems) that temporarily stores recommended items for each endpoint or user, depending on the value for the RecommendationProviderIdType property. This value is required if the configuration doesn't invoke an AWS Lambda function (RecommendationTransformerUri) to perform additional processing of recommendation data. This name appears in the Attribute finder of the template editor on the Amazon Pinpoint console. The name can contain up to 25 characters. The characters can be letters, numbers, spaces, underscores (_), or hyphens (-). These restrictions don't apply to attribute values.
        RecommendationsPerMessage:
          $ref: "#/components/schemas/__integer"
          description: The number of recommended items to retrieve from the model for each endpoint or user, depending on the value for the RecommendationProviderIdType property. This number determines how many recommended items are available for use in message variables. The minimum value is 1. The maximum value is 5. The default value is 5. To use multiple recommended items and custom attributes with message variables, you have to use an AWS Lambda function (RecommendationTransformerUri) to perform additional processing of recommendation data.
      required:
        - RecommendationProviderUri
        - RecommendationProviderRoleArn
    CreateRecommenderConfigurationResponse:
      type: object
      properties:
        RecommenderConfigurationResponse:
          $ref: "#/components/schemas/RecommenderConfigurationResponse"
      required:
        - RecommenderConfigurationResponse
    RecommenderConfigurationResponse:
      description: Provides information about Amazon Pinpoint configuration settings for retrieving and processing data from a recommender model.
      type: object
      properties:
        Attributes:
          type: object
          properties: {}
          description: A map that defines 1-10 custom endpoint or user attributes, depending on the value for the RecommendationProviderIdType property. Each of these attributes temporarily stores a recommended item that's retrieved from the recommender model and sent to an AWS Lambda function for additional processing. Each attribute can be used as a message variable in a message template. This value is null if the configuration doesn't invoke an AWS Lambda function (RecommendationTransformerUri) to perform additional processing of recommendation data.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date, in extended ISO 8601 format, when the configuration was created for the recommender model.
        Description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the configuration for the recommender model.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the recommender model configuration.
        LastModifiedDate:
          $ref: "#/components/schemas/__string"
          description: The date, in extended ISO 8601 format, when the configuration for the recommender model was last modified.
        Name:
          $ref: "#/components/schemas/__string"
          description: The custom name of the configuration for the recommender model.
        RecommendationProviderIdType:
          $ref: "#/components/schemas/__string"
          description: "The type of Amazon Pinpoint ID that's associated with unique user IDs in the recommender model. This value enables the model to use attribute and event data that’s specific to a particular endpoint or user in an Amazon Pinpoint application. Possible values are: PINPOINT_ENDPOINT_ID - Each user in the model is associated with a particular endpoint in Amazon Pinpoint. The data is correlated based on endpoint IDs in Amazon Pinpoint. This is the default value. PINPOINT_USER_ID - Each user in the model is associated with a particular user and endpoint in Amazon Pinpoint. The data is correlated based on user IDs in Amazon Pinpoint. If this value is specified, an endpoint definition in Amazon Pinpoint has to specify both a user ID (UserId) and an endpoint ID. Otherwise, messages won’t be sent to the user's endpoint."
        RecommendationProviderRoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that authorizes Amazon Pinpoint to retrieve recommendation data from the recommender model.
        RecommendationProviderUri:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the recommender model that Amazon Pinpoint retrieves the recommendation data from. This value is the ARN of an Amazon Personalize campaign.
        RecommendationTransformerUri:
          $ref: "#/components/schemas/__string"
          description: The name or Amazon Resource Name (ARN) of the AWS Lambda function that Amazon Pinpoint invokes to perform additional processing of recommendation data that it retrieves from the recommender model.
        RecommendationsDisplayName:
          $ref: "#/components/schemas/__string"
          description: The custom display name for the standard endpoint or user attribute (RecommendationItems) that temporarily stores recommended items for each endpoint or user, depending on the value for the RecommendationProviderIdType property. This name appears in the Attribute finder of the template editor on the Amazon Pinpoint console. This value is null if the configuration doesn't invoke an AWS Lambda function (RecommendationTransformerUri) to perform additional processing of recommendation data.
        RecommendationsPerMessage:
          $ref: "#/components/schemas/__integer"
          description: The number of recommended items that are retrieved from the model for each endpoint or user, depending on the value for the RecommendationProviderIdType property. This number determines how many recommended items are available for use in message variables.
      required:
        - RecommendationProviderUri
        - LastModifiedDate
        - CreationDate
        - RecommendationProviderRoleArn
        - Id
    WriteSegmentRequest:
      description: Specifies the configuration, dimension, and other settings for a segment. A WriteSegmentRequest object can include a Dimensions object or a SegmentGroups object, but not both.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/SegmentDimensions"
          description: The criteria that define the dimensions for the segment.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the segment.
        SegmentGroups:
          $ref: "#/components/schemas/SegmentGroupList"
          description: The segment group to use and the dimensions to apply to the group's base segments in order to build the segment. A segment group can consist of zero or more base segments. Your request can include only one segment group.
        tags:
          type: object
          properties: {}
          description: As of 22-05-2023 tags has been deprecated for update operations. After this date any value in tags is not processed and an error code is not returned. To manage tags we recommend using either Tags in the API Reference for Amazon Pinpoint, resourcegroupstaggingapi commands in the AWS Command Line Interface Documentation or resourcegroupstaggingapi in the AWS SDK. (Deprecated) A string-to-string map of key-value pairs that defines the tags to associate with the segment. Each tag consists of a required tag key and an associated tag value.
    SegmentDimensions:
      description: Specifies the dimension settings for a segment.
      type: object
      properties:
        Attributes:
          type: object
          properties: {}
          description: One or more custom attributes to use as criteria for the segment.
        Behavior:
          $ref: "#/components/schemas/SegmentBehaviors"
          description: The behavior-based criteria, such as how recently users have used your app, for the segment.
        Demographic:
          $ref: "#/components/schemas/SegmentDemographics"
          description: The demographic-based criteria, such as device platform, for the segment.
        Location:
          $ref: "#/components/schemas/SegmentLocation"
          description: The location-based criteria, such as region or GPS coordinates, for the segment.
        Metrics:
          type: object
          properties: {}
          description: One or more custom metrics to use as criteria for the segment.
        UserAttributes:
          type: object
          properties: {}
          description: One or more custom user attributes to use as criteria for the segment.
    SegmentBehaviors:
      description: Specifies dimension settings for including or excluding endpoints from a segment based on how recently an endpoint was active.
      type: object
      properties:
        Recency:
          $ref: "#/components/schemas/RecencyDimension"
          description: The dimension settings that are based on how recently an endpoint was active.
    RecencyDimension:
      description: Specifies criteria for including or excluding endpoints from a segment based on how recently an endpoint was active.
      type: object
      properties:
        Duration:
          $ref: "#/components/schemas/Duration"
          description: The duration to use when determining whether an endpoint is active or inactive.
        RecencyType:
          $ref: "#/components/schemas/RecencyType"
          description: "The type of recency dimension to use for the segment. Valid values are: ACTIVE, endpoints that were active within the specified duration are included in the segment; and, INACTIVE, endpoints that weren't active within the specified duration are included in the segment."
      required:
        - Duration
        - RecencyType
    Duration:
      type: string
      enum:
        - HR_24
        - DAY_7
        - DAY_14
        - DAY_30
    RecencyType:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    SegmentDemographics:
      description: Specifies demographic-based dimension settings for including or excluding endpoints from a segment. These settings derive from characteristics of endpoint devices, such as platform, make, and model.
      type: object
      properties:
        AppVersion:
          $ref: "#/components/schemas/SetDimension"
          description: The app version criteria for the segment.
        Channel:
          $ref: "#/components/schemas/SetDimension"
          description: The channel criteria for the segment.
        DeviceType:
          $ref: "#/components/schemas/SetDimension"
          description: The device type criteria for the segment.
        Make:
          $ref: "#/components/schemas/SetDimension"
          description: The device make criteria for the segment.
        Model:
          $ref: "#/components/schemas/SetDimension"
          description: The device model criteria for the segment.
        Platform:
          $ref: "#/components/schemas/SetDimension"
          description: The device platform criteria for the segment.
    SegmentLocation:
      description: Specifies geographical dimension settings for a segment.
      type: object
      properties:
        Country:
          $ref: "#/components/schemas/SetDimension"
          description: The country or region code, in ISO 3166-1 alpha-2 format, for the segment.
        GPSPoint:
          $ref: "#/components/schemas/GPSPointDimension"
          description: The GPS location and range for the segment.
    GPSPointDimension:
      description: Specifies GPS-based criteria for including or excluding endpoints from a segment.
      type: object
      properties:
        Coordinates:
          $ref: "#/components/schemas/GPSCoordinates"
          description: The GPS coordinates to measure distance from.
        RangeInKilometers:
          $ref: "#/components/schemas/__double"
          description: The range, in kilometers, from the GPS coordinates.
      required:
        - Coordinates
    GPSCoordinates:
      description: Specifies the GPS coordinates of a location.
      type: object
      properties:
        Latitude:
          $ref: "#/components/schemas/__double"
          description: The latitude coordinate of the location.
        Longitude:
          $ref: "#/components/schemas/__double"
          description: The longitude coordinate of the location.
      required:
        - Latitude
        - Longitude
    __double:
      type: number
      format: double
    SegmentGroupList:
      description: Specifies the settings that define the relationships between segment groups for a segment.
      type: object
      properties:
        Groups:
          $ref: "#/components/schemas/ListOfSegmentGroup"
          description: An array that defines the set of segment criteria to evaluate when handling segment groups for the segment.
        Include:
          $ref: "#/components/schemas/Include"
          description: Specifies how to handle multiple segment groups for the segment. For example, if the segment includes three segment groups, whether the resulting segment includes endpoints that match all, any, or none of the segment groups.
    ListOfSegmentGroup:
      type: array
      items:
        $ref: "#/components/schemas/SegmentGroup"
    SegmentGroup:
      description: Specifies the base segments and dimensions for a segment, and the relationships between these base segments and dimensions.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/ListOfSegmentDimensions"
          description: An array that defines the dimensions for the segment.
        SourceSegments:
          $ref: "#/components/schemas/ListOfSegmentReference"
          description: The base segment to build the segment on. A base segment, also referred to as a source segment, defines the initial population of endpoints for a segment. When you add dimensions to a segment, Amazon Pinpoint filters the base segment by using the dimensions that you specify. You can specify more than one dimensional segment or only one imported segment. If you specify an imported segment, the Amazon Pinpoint console displays a segment size estimate that indicates the size of the imported segment without any filters applied to it.
        SourceType:
          $ref: "#/components/schemas/SourceType"
          description: Specifies how to handle multiple base segments for the segment. For example, if you specify three base segments for the segment, whether the resulting segment is based on all, any, or none of the base segments.
        Type:
          $ref: "#/components/schemas/Type"
          description: Specifies how to handle multiple dimensions for the segment. For example, if you specify three dimensions for the segment, whether the resulting segment includes endpoints that match all, any, or none of the dimensions.
    ListOfSegmentDimensions:
      type: array
      items:
        $ref: "#/components/schemas/SegmentDimensions"
    ListOfSegmentReference:
      type: array
      items:
        $ref: "#/components/schemas/SegmentReference"
    SegmentReference:
      description: Specifies the segment identifier and version of a segment.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the segment.
        Version:
          $ref: "#/components/schemas/__integer"
          description: The version number of the segment.
      required:
        - Id
    SourceType:
      type: string
      enum:
        - ALL
        - ANY
        - NONE
    Type:
      type: string
      enum:
        - ALL
        - ANY
        - NONE
    Include:
      type: string
      enum:
        - ALL
        - ANY
        - NONE
    CreateSegmentResponse:
      type: object
      properties:
        SegmentResponse:
          $ref: "#/components/schemas/SegmentResponse"
      required:
        - SegmentResponse
    SegmentResponse:
      description: Provides information about the configuration, dimension, and other settings for a segment.
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the application that the segment is associated with.
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the segment.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date and time when the segment was created.
        Dimensions:
          $ref: "#/components/schemas/SegmentDimensions"
          description: The dimension settings for the segment.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the segment.
        ImportDefinition:
          $ref: "#/components/schemas/SegmentImportResource"
          description: The settings for the import job that's associated with the segment.
        LastModifiedDate:
          $ref: "#/components/schemas/__string"
          description: The date and time when the segment was last modified.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the segment.
        SegmentGroups:
          $ref: "#/components/schemas/SegmentGroupList"
          description: A list of one or more segment groups that apply to the segment. Each segment group consists of zero or more base segments and the dimensions that are applied to those base segments.
        SegmentType:
          $ref: "#/components/schemas/SegmentType"
          description: "The segment type. Valid values are: DIMENSIONAL - A dynamic segment, which is a segment that uses selection criteria that you specify and is based on endpoint data that's reported by your app. Dynamic segments can change over time. IMPORT - A static segment, which is a segment that uses selection criteria that you specify and is based on endpoint definitions that you import from a file. Imported segments are static; they don't change over time."
        tags:
          type: object
          properties: {}
          description: A string-to-string map of key-value pairs that identifies the tags that are associated with the segment. Each tag consists of a required tag key and an associated tag value.
        Version:
          $ref: "#/components/schemas/__integer"
          description: The version number of the segment.
      required:
        - SegmentType
        - CreationDate
        - Id
        - Arn
        - ApplicationId
    SegmentImportResource:
      description: Provides information about the import job that created a segment. An import job is a job that creates a user segment by importing endpoint definitions.
      type: object
      properties:
        ChannelCounts:
          type: object
          properties: {}
          description: The number of channel types in the endpoint definitions that were imported to create the segment.
        ExternalId:
