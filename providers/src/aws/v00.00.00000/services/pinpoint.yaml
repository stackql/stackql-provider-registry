components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CreateApplicationRequest:
      description: Specifies the display name of an application and the tags to associate with the application.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/__string"
          description: The display name of the application. This name is displayed as the Project name on the Amazon Pinpoint console.
        tags:
          type: object
          properties: {}
          description: A string-to-string map of key-value pairs that defines the tags to associate with the application. Each tag consists of a required tag key and an associated tag value.
      required:
        - Name
    __string:
      type: string
    CreateAppResponse:
      type: object
      properties:
        ApplicationResponse:
          $ref: "#/components/schemas/ApplicationResponse"
      required:
        - ApplicationResponse
    ApplicationResponse:
      description: Provides information about an application.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the application. This identifier is displayed as the Project ID on the Amazon Pinpoint console.
        Name:
          $ref: "#/components/schemas/__string"
          description: The display name of the application. This name is displayed as the Project name on the Amazon Pinpoint console.
        tags:
          type: object
          properties: {}
          description: A string-to-string map of key-value pairs that identifies the tags that are associated with the application. Each tag consists of a required tag key and an associated tag value.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date and time when the Application was created.
      required:
        - Id
        - Arn
        - Name
    WriteCampaignRequest:
      description: Specifies the configuration and other settings for a campaign.
      type: object
      properties:
        AdditionalTreatments:
          $ref: "#/components/schemas/ListOfWriteTreatmentResource"
          description: An array of requests that defines additional treatments for the campaign, in addition to the default treatment for the campaign.
        CustomDeliveryConfiguration:
          $ref: "#/components/schemas/CustomDeliveryConfiguration"
          description: The delivery configuration settings for sending the campaign through a custom channel. This object is required if the MessageConfiguration object for the campaign specifies a CustomMessage object.
        Description:
          $ref: "#/components/schemas/__string"
          description: A custom description of the campaign.
        HoldoutPercent:
          $ref: "#/components/schemas/__integer"
          description: The allocated percentage of users (segment members) who shouldn't receive messages from the campaign.
        Hook:
          $ref: "#/components/schemas/CampaignHook"
          description: The settings for the AWS Lambda function to invoke as a code hook for the campaign. You can use this hook to customize the segment that's used by the campaign.
        IsPaused:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether to pause the campaign. A paused campaign doesn't run unless you resume it by changing this value to false.
        Limits:
          $ref: "#/components/schemas/CampaignLimits"
          description: The messaging limits for the campaign.
        MessageConfiguration:
          $ref: "#/components/schemas/MessageConfiguration"
          description: The message configuration settings for the campaign.
        Name:
          $ref: "#/components/schemas/__string"
          description: A custom name for the campaign.
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: The schedule settings for the campaign.
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the segment to associate with the campaign.
        SegmentVersion:
          $ref: "#/components/schemas/__integer"
          description: The version of the segment to associate with the campaign.
        tags:
          type: object
          properties: {}
          description: As of 22-05-2023 tags has been deprecated for update operations. After this date any value in tags is not processed and an error code is not returned. To manage tags we recommend using either Tags in the API Reference for Amazon Pinpoint, resourcegroupstaggingapi commands in the AWS Command Line Interface Documentation or resourcegroupstaggingapi in the AWS SDK. (Deprecated) A string-to-string map of key-value pairs that defines the tags to associate with the campaign. Each tag consists of a required tag key and an associated tag value.
        TemplateConfiguration:
          $ref: "#/components/schemas/TemplateConfiguration"
          description: The message template to use for the campaign.
        TreatmentDescription:
          $ref: "#/components/schemas/__string"
          description: A custom description of the default treatment for the campaign.
        TreatmentName:
          $ref: "#/components/schemas/__string"
          description: A custom name of the default treatment for the campaign, if the campaign has multiple treatments. A treatment is a variation of a campaign that's used for A/B testing.
        Priority:
          $ref: "#/components/schemas/__integer"
          description: Defines the priority of the campaign, used to decide the order of messages displayed to user if there are multiple messages scheduled to be displayed at the same moment.
    ListOfWriteTreatmentResource:
      type: array
      items:
        $ref: "#/components/schemas/WriteTreatmentResource"
    WriteTreatmentResource:
      description: Specifies the settings for a campaign treatment. A treatment is a variation of a campaign that's used for A/B testing of a campaign.
      type: object
      properties:
        CustomDeliveryConfiguration:
          $ref: "#/components/schemas/CustomDeliveryConfiguration"
          description: The delivery configuration settings for sending the treatment through a custom channel. This object is required if the MessageConfiguration object for the treatment specifies a CustomMessage object.
        MessageConfiguration:
          $ref: "#/components/schemas/MessageConfiguration"
          description: The message configuration settings for the treatment.
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: The schedule settings for the treatment.
        SizePercent:
          $ref: "#/components/schemas/__integer"
          description: The allocated percentage of users (segment members) to send the treatment to.
        TemplateConfiguration:
          $ref: "#/components/schemas/TemplateConfiguration"
          description: The message template to use for the treatment.
        TreatmentDescription:
          $ref: "#/components/schemas/__string"
          description: A custom description of the treatment.
        TreatmentName:
          $ref: "#/components/schemas/__string"
          description: A custom name for the treatment.
      required:
        - SizePercent
    CustomDeliveryConfiguration:
      description: Specifies the delivery configuration settings for sending a campaign or campaign treatment through a custom channel. This object is required if you use the CampaignCustomMessage object to define the message to send for the campaign or campaign treatment.
      type: object
      properties:
        DeliveryUri:
          $ref: "#/components/schemas/__string"
          description: "The destination to send the campaign or treatment to. This value can be one of the following: The name or Amazon Resource Name (ARN) of an AWS Lambda function to invoke to handle delivery of the campaign or treatment. The URL for a web application or service that supports HTTPS and can receive the message. The URL has to be a full URL, including the HTTPS protocol."
        EndpointTypes:
          $ref: "#/components/schemas/ListOf__EndpointTypesElement"
          description: The types of endpoints to send the campaign or treatment to. Each valid value maps to a type of channel that you can associate with an endpoint by using the ChannelType property of an endpoint.
      required:
        - DeliveryUri
    ListOf__EndpointTypesElement:
      type: array
      items:
        $ref: "#/components/schemas/__EndpointTypesElement"
    __EndpointTypesElement:
      type: string
      enum:
        - PUSH
        - GCM
        - APNS
        - APNS_SANDBOX
        - APNS_VOIP
        - APNS_VOIP_SANDBOX
        - ADM
        - SMS
        - VOICE
        - EMAIL
        - BAIDU
        - CUSTOM
        - IN_APP
    MessageConfiguration:
      description: Specifies the message configuration settings for a campaign.
      type: object
      properties:
        ADMMessage:
          $ref: "#/components/schemas/Message"
          description: The message that the campaign sends through the ADM (Amazon Device Messaging) channel. If specified, this message overrides the default message.
        APNSMessage:
          $ref: "#/components/schemas/Message"
          description: The message that the campaign sends through the APNs (Apple Push Notification service) channel. If specified, this message overrides the default message.
        BaiduMessage:
          $ref: "#/components/schemas/Message"
          description: The message that the campaign sends through the Baidu (Baidu Cloud Push) channel. If specified, this message overrides the default message.
        CustomMessage:
          $ref: "#/components/schemas/CampaignCustomMessage"
          description: The message that the campaign sends through a custom channel, as specified by the delivery configuration (CustomDeliveryConfiguration) settings for the campaign. If specified, this message overrides the default message.
        DefaultMessage:
          $ref: "#/components/schemas/Message"
          description: The default message that the campaign sends through all the channels that are configured for the campaign.
        EmailMessage:
          $ref: "#/components/schemas/CampaignEmailMessage"
          description: The message that the campaign sends through the email channel. If specified, this message overrides the default message.
        GCMMessage:
          $ref: "#/components/schemas/Message"
          description: The message that the campaign sends through the GCM channel, which enables Amazon Pinpoint to send push notifications through the Firebase Cloud Messaging (FCM), formerly Google Cloud Messaging (GCM), service. If specified, this message overrides the default message.
        SMSMessage:
          $ref: "#/components/schemas/CampaignSmsMessage"
          description: The message that the campaign sends through the SMS channel. If specified, this message overrides the default message.
        InAppMessage:
          $ref: "#/components/schemas/CampaignInAppMessage"
          description: The in-app message configuration.
    Message:
      description: Specifies the content and settings for a push notification that's sent to recipients of a campaign.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if a recipient taps the push notification. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This setting uses the deep-linking features of iOS and Android. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the notification message. The maximum number of characters is 200.
        ImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the image to display as the push-notification icon, such as the icon for the app.
        ImageSmallIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the image to display as the small, push-notification icon, such as a small version of the icon for the app.
        ImageUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image to display in the push notification.
        JsonBody:
          $ref: "#/components/schemas/__string"
          description: The JSON payload to use for a silent push notification.
        MediaUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the image or video to display in the push notification.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for the notification message. If specified, this value overrides all other content for the message.
        SilentPush:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the notification is a silent push notification, which is a push notification that doesn't display on a recipient's device. Silent push notifications can be used for cases such as updating an app's configuration, displaying messages in an in-app message center, or supporting phone home functionality.
        TimeToLive:
          $ref: "#/components/schemas/__integer"
          description: The number of seconds that the push-notification service should keep the message, if the service is unable to deliver the notification the first time. This value is converted to an expiration value when it's sent to a push-notification service. If this value is 0, the service treats the notification as if it expires immediately and the service doesn't store or try to deliver the notification again. This value doesn't apply to messages that are sent through the Amazon Device Messaging (ADM) service.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to display above the notification message on a recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in a recipient's default mobile browser, if a recipient taps the push notification and the value of the Action property is URL.
    Action:
      type: string
      enum:
        - OPEN_APP
        - DEEP_LINK
        - URL
    __boolean:
      type: boolean
    __integer:
      type: integer
    CampaignCustomMessage:
      description: Specifies the contents of a message that's sent through a custom channel to recipients of a campaign.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for the message. The maximum size is 5 KB.
    CampaignEmailMessage:
      description: Specifies the content and "From" address for an email message that's sent to recipients of a campaign.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the email for recipients whose email clients don't render HTML content.
        FromAddress:
          $ref: "#/components/schemas/__string"
          description: The verified email address to send the email from. The default address is the FromAddress specified for the email channel for the application.
        Headers:
          $ref: "#/components/schemas/ListOfMessageHeader"
          description: The list of MessageHeaders for the email. You can have up to 15 MessageHeaders for each email.
        HtmlBody:
          $ref: "#/components/schemas/__string"
          description: The body of the email, in HTML format, for recipients whose email clients render HTML content.
        Title:
          $ref: "#/components/schemas/__string"
          description: The subject line, or title, of the email.
    ListOfMessageHeader:
      type: array
      items:
        $ref: "#/components/schemas/MessageHeader"
    MessageHeader:
      description: Contains the name and value pair of an email header to add to your email. You can have up to 15 MessageHeaders. A header can contain information such as the sender, receiver, route, or timestamp.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the message header. The header name can contain up to 126 characters.
        Value:
          $ref: "#/components/schemas/__string"
          description: The value of the message header. The header value can contain up to 870 characters, including the length of any rendered attributes. For example if you add the {CreationDate} attribute, it renders as YYYY-MM-DDTHH:MM:SS.SSSZ and is 24 characters in length.
    CampaignSmsMessage:
      description: Specifies the content and settings for an SMS message that's sent to recipients of a campaign.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the SMS message.
        MessageType:
          $ref: "#/components/schemas/MessageType"
          description: The SMS message type. Valid values are TRANSACTIONAL (for messages that are critical or time-sensitive, such as a one-time passwords) and PROMOTIONAL (for messsages that aren't critical or time-sensitive, such as marketing messages).
        OriginationNumber:
          $ref: "#/components/schemas/__string"
          description: The long code to send the SMS message from. This value should be one of the dedicated long codes that's assigned to your AWS account. Although it isn't required, we recommend that you specify the long code using an E.164 format to ensure prompt and accurate delivery of the message. For example, +12065550100.
        SenderId:
          $ref: "#/components/schemas/__string"
          description: The sender ID to display on recipients' devices when they receive the SMS message.
        EntityId:
          $ref: "#/components/schemas/__string"
          description: The entity ID or Principal Entity (PE) id received from the regulatory body for sending SMS in your country.
        TemplateId:
          $ref: "#/components/schemas/__string"
          description: The template ID received from the regulatory body for sending SMS in your country.
    MessageType:
      type: string
      enum:
        - TRANSACTIONAL
        - PROMOTIONAL
    CampaignInAppMessage:
      description: In-app message configuration.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The message body of the notification, the email body or the text message.
        Content:
          $ref: "#/components/schemas/ListOfInAppMessageContent"
          description: In-app message content.
        CustomConfig:
          type: object
          properties: {}
          description: Custom config to be sent to client.
        Layout:
          $ref: "#/components/schemas/Layout"
          description: In-app message layout.
    ListOfInAppMessageContent:
      type: array
      items:
        $ref: "#/components/schemas/InAppMessageContent"
    InAppMessageContent:
      description: The configuration for the message content.
      type: object
      properties:
        BackgroundColor:
          $ref: "#/components/schemas/__string"
          description: The background color for the message.
        BodyConfig:
          $ref: "#/components/schemas/InAppMessageBodyConfig"
          description: The configuration for the message body.
        HeaderConfig:
          $ref: "#/components/schemas/InAppMessageHeaderConfig"
          description: The configuration for the message header.
        ImageUrl:
          $ref: "#/components/schemas/__string"
          description: The image url for the background of message.
        PrimaryBtn:
          $ref: "#/components/schemas/InAppMessageButton"
          description: The first button inside the message.
        SecondaryBtn:
          $ref: "#/components/schemas/InAppMessageButton"
          description: The second button inside message.
    InAppMessageBodyConfig:
      description: Text config for Message Body.
      type: object
      properties:
        Alignment:
          $ref: "#/components/schemas/Alignment"
          description: "The alignment of the text. Valid values: LEFT, CENTER, RIGHT."
        Body:
          $ref: "#/components/schemas/__string"
          description: Message Body.
        TextColor:
          $ref: "#/components/schemas/__string"
          description: The text color.
      required:
        - Alignment
        - TextColor
        - Body
    Alignment:
      type: string
      enum:
        - LEFT
        - CENTER
        - RIGHT
    InAppMessageHeaderConfig:
      description: Text config for Message Header.
      type: object
      properties:
        Alignment:
          $ref: "#/components/schemas/Alignment"
          description: "The alignment of the text. Valid values: LEFT, CENTER, RIGHT."
        Header:
          $ref: "#/components/schemas/__string"
          description: Message Header.
        TextColor:
          $ref: "#/components/schemas/__string"
          description: The text color.
      required:
        - Alignment
        - Header
        - TextColor
    InAppMessageButton:
      description: Button Config for an in-app message.
      type: object
      properties:
        Android:
          $ref: "#/components/schemas/OverrideButtonConfiguration"
          description: Default button content.
        DefaultConfig:
          $ref: "#/components/schemas/DefaultButtonConfiguration"
          description: Default button content.
        IOS:
          $ref: "#/components/schemas/OverrideButtonConfiguration"
          description: Default button content.
        Web:
          $ref: "#/components/schemas/OverrideButtonConfiguration"
          description: Default button content.
    OverrideButtonConfiguration:
      description: Override button configuration.
      type: object
      properties:
        ButtonAction:
          $ref: "#/components/schemas/ButtonAction"
          description: Action triggered by the button.
        Link:
          $ref: "#/components/schemas/__string"
          description: Button destination.
      required:
        - ButtonAction
    ButtonAction:
      type: string
      enum:
        - LINK
        - DEEP_LINK
        - CLOSE
    DefaultButtonConfiguration:
      description: Default button configuration.
      type: object
      properties:
        BackgroundColor:
          $ref: "#/components/schemas/__string"
          description: The background color of the button.
        BorderRadius:
          $ref: "#/components/schemas/__integer"
          description: The border radius of the button.
        ButtonAction:
          $ref: "#/components/schemas/ButtonAction"
          description: Action triggered by the button.
        Link:
          $ref: "#/components/schemas/__string"
          description: Button destination.
        Text:
          $ref: "#/components/schemas/__string"
          description: Button text.
        TextColor:
          $ref: "#/components/schemas/__string"
          description: The text color of the button.
      required:
        - ButtonAction
        - Text
    Layout:
      type: string
      enum:
        - BOTTOM_BANNER
        - TOP_BANNER
        - OVERLAYS
        - MOBILE_FEED
        - MIDDLE_BANNER
        - CAROUSEL
    Schedule:
      description: Specifies the schedule settings for a campaign.
      type: object
      properties:
        EndTime:
          $ref: "#/components/schemas/__string"
          description: The scheduled time, in ISO 8601 format, when the campaign ended or will end.
        EventFilter:
          $ref: "#/components/schemas/CampaignEventFilter"
          description: The type of event that causes the campaign to be sent, if the value of the Frequency property is EVENT.
        Frequency:
          $ref: "#/components/schemas/Frequency"
          description: Specifies how often the campaign is sent or whether the campaign is sent in response to a specific event.
        IsLocalTime:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the start and end times for the campaign schedule use each recipient's local time. To base the schedule on each recipient's local time, set this value to true.
        QuietTime:
          $ref: "#/components/schemas/QuietTime"
          description: "The default quiet time for the campaign. Quiet time is a specific time range when a campaign doesn't send messages to endpoints, if all the following conditions are met: The EndpointDemographic.Timezone property of the endpoint is set to a valid value. The current time in the endpoint's time zone is later than or equal to the time specified by the QuietTime.Start property for the campaign. The current time in the endpoint's time zone is earlier than or equal to the time specified by the QuietTime.End property for the campaign. If any of the preceding conditions isn't met, the endpoint will receive messages from the campaign, even if quiet time is enabled."
        StartTime:
          $ref: "#/components/schemas/__string"
          description: "The scheduled time when the campaign began or will begin. Valid values are: IMMEDIATE, to start the campaign immediately; or, a specific time in ISO 8601 format."
        Timezone:
          $ref: "#/components/schemas/__string"
          description: "The starting UTC offset for the campaign schedule, if the value of the IsLocalTime property is true. Valid values are: UTC, UTC+01, UTC+02, UTC+03, UTC+03:30, UTC+04, UTC+04:30, UTC+05, UTC+05:30, UTC+05:45, UTC+06, UTC+06:30, UTC+07, UTC+08, UTC+09, UTC+09:30, UTC+10, UTC+10:30, UTC+11, UTC+12, UTC+13, UTC-02, UTC-03, UTC-04, UTC-05, UTC-06, UTC-07, UTC-08, UTC-09, UTC-10, and UTC-11."
      required:
        - StartTime
    CampaignEventFilter:
      description: Specifies the settings for events that cause a campaign to be sent.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/EventDimensions"
          description: The dimension settings of the event filter for the campaign.
        FilterType:
          $ref: "#/components/schemas/FilterType"
          description: "The type of event that causes the campaign to be sent. Valid values are: SYSTEM, sends the campaign when a system event occurs; and, ENDPOINT, sends the campaign when an endpoint event (Events resource) occurs."
      required:
        - FilterType
        - Dimensions
    EventDimensions:
      description: Specifies the dimensions for an event filter that determines when a campaign is sent or a journey activity is performed.
      type: object
      properties:
        Attributes:
          type: object
          properties: {}
          description: One or more custom attributes that your application reports to Amazon Pinpoint. You can use these attributes as selection criteria when you create an event filter.
        EventType:
          $ref: "#/components/schemas/SetDimension"
          description: The name of the event that causes the campaign to be sent or the journey activity to be performed. This can be a standard event that Amazon Pinpoint generates, such as _email.delivered. For campaigns, this can also be a custom event that's specific to your application. For information about standard events, see Streaming Amazon Pinpoint Events in the Amazon Pinpoint Developer Guide.
        Metrics:
          type: object
          properties: {}
          description: One or more custom metrics that your application reports to Amazon Pinpoint. You can use these metrics as selection criteria when you create an event filter.
    SetDimension:
      description: Specifies the dimension type and values for a segment dimension.
      type: object
      properties:
        DimensionType:
          $ref: "#/components/schemas/DimensionType"
          description: "The type of segment dimension to use. Valid values are: INCLUSIVE, endpoints that match the criteria are included in the segment; and, EXCLUSIVE, endpoints that match the criteria are excluded from the segment."
        Values:
          $ref: "#/components/schemas/ListOf__string"
          description: The criteria values to use for the segment dimension. Depending on the value of the DimensionType property, endpoints are included or excluded from the segment if their values match the criteria values.
      required:
        - Values
    DimensionType:
      type: string
      enum:
        - INCLUSIVE
        - EXCLUSIVE
    ListOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    FilterType:
      type: string
      enum:
        - SYSTEM
        - ENDPOINT
    Frequency:
      type: string
      enum:
        - ONCE
        - HOURLY
        - DAILY
        - WEEKLY
        - MONTHLY
        - EVENT
        - IN_APP_EVENT
    QuietTime:
      description: Specifies the start and end times that define a time range when messages aren't sent to endpoints.
      type: object
      properties:
        End:
          $ref: "#/components/schemas/__string"
          description: The specific time when quiet time ends. This value has to use 24-hour notation and be in HH:MM format, where HH is the hour (with a leading zero, if applicable) and MM is the minutes. For example, use 02:30 to represent 2:30 AM, or 14:30 to represent 2:30 PM.
        Start:
          $ref: "#/components/schemas/__string"
          description: The specific time when quiet time begins. This value has to use 24-hour notation and be in HH:MM format, where HH is the hour (with a leading zero, if applicable) and MM is the minutes. For example, use 02:30 to represent 2:30 AM, or 14:30 to represent 2:30 PM.
    TemplateConfiguration:
      description: Specifies the message template to use for the message, for each type of channel.
      type: object
      properties:
        EmailTemplate:
          $ref: "#/components/schemas/Template"
          description: The email template to use for the message.
        PushTemplate:
          $ref: "#/components/schemas/Template"
          description: The push notification template to use for the message.
        SMSTemplate:
          $ref: "#/components/schemas/Template"
          description: The SMS template to use for the message.
        VoiceTemplate:
          $ref: "#/components/schemas/Template"
          description: The voice template to use for the message. This object isn't supported for campaigns.
        InAppTemplate:
          $ref: "#/components/schemas/Template"
          description: The InApp template to use for the message. The InApp template object is not supported for SendMessages.
    Template:
      description: Specifies the name and version of the message template to use for the message.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the message template to use for the message. If specified, this value must match the name of an existing message template.
        Version:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the version of the message template to use for the message. If specified, this value must match the identifier for an existing template version. To retrieve a list of versions and version identifiers for a template, use the Template Versions resource. If you don't specify a value for this property, Amazon Pinpoint uses the active version of the template. The active version is typically the version of a template that's been most recently reviewed and approved for use, depending on your workflow. It isn't necessarily the latest version of a template.
    CampaignHook:
      description: Specifies settings for invoking an AWS Lambda function that customizes a segment for a campaign.
      type: object
      properties:
        LambdaFunctionName:
          $ref: "#/components/schemas/__string"
          description: The name or Amazon Resource Name (ARN) of the AWS Lambda function that Amazon Pinpoint invokes to customize a segment for a campaign.
        Mode:
          $ref: "#/components/schemas/Mode"
          description: "The mode that Amazon Pinpoint uses to invoke the AWS Lambda function. Possible values are: FILTER - Invoke the function to customize the segment that's used by a campaign. DELIVERY - (Deprecated) Previously, invoked the function to send a campaign through a custom channel. This functionality is not supported anymore. To send a campaign through a custom channel, use the CustomDeliveryConfiguration and CampaignCustomMessage objects of the campaign."
        WebUrl:
          $ref: "#/components/schemas/__string"
          description: The web URL that Amazon Pinpoint calls to invoke the AWS Lambda function over HTTPS.
    Mode:
      type: string
      enum:
        - DELIVERY
        - FILTER
    CampaignLimits:
      description: For a campaign, specifies limits on the messages that the campaign can send. For an application, specifies the default limits for messages that campaigns in the application can send.
      type: object
      properties:
        Daily:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages that a campaign can send to a single endpoint during a 24-hour period. For an application, this value specifies the default limit for the number of messages that campaigns and journeys can send to a single endpoint during a 24-hour period. The maximum value is 100.
        MaximumDuration:
          $ref: "#/components/schemas/__integer"
          description: The maximum amount of time, in seconds, that a campaign can attempt to deliver a message after the scheduled start time for the campaign. The minimum value is 60 seconds.
        MessagesPerSecond:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages that a campaign can send each second. For an application, this value specifies the default limit for the number of messages that campaigns can send each second. The minimum value is 1. The maximum value is 20,000.
        Total:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages that a campaign can send to a single endpoint during the course of the campaign. If a campaign recurs, this setting applies to all runs of the campaign. The maximum value is 100.
        Session:
          $ref: "#/components/schemas/__integer"
          description: The maximum total number of messages that the campaign can send per user session.
    CreateCampaignResponse:
      type: object
      properties:
        CampaignResponse:
          $ref: "#/components/schemas/CampaignResponse"
      required:
        - CampaignResponse
    CampaignResponse:
      description: Provides information about the status, configuration, and other settings for a campaign.
      type: object
      properties:
        AdditionalTreatments:
          $ref: "#/components/schemas/ListOfTreatmentResource"
          description: An array of responses, one for each treatment that you defined for the campaign, in addition to the default treatment.
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the application that the campaign applies to.
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the campaign.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the campaign was created.
        CustomDeliveryConfiguration:
          $ref: "#/components/schemas/CustomDeliveryConfiguration"
          description: The delivery configuration settings for sending the campaign through a custom channel.
        DefaultState:
          $ref: "#/components/schemas/CampaignState"
          description: The current status of the campaign's default treatment. This value exists only for campaigns that have more than one treatment.
        Description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the campaign.
        HoldoutPercent:
          $ref: "#/components/schemas/__integer"
          description: The allocated percentage of users (segment members) who shouldn't receive messages from the campaign.
        Hook:
          $ref: "#/components/schemas/CampaignHook"
          description: The settings for the AWS Lambda function to use as a code hook for the campaign. You can use this hook to customize the segment that's used by the campaign.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the campaign.
        IsPaused:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the campaign is paused. A paused campaign doesn't run unless you resume it by changing this value to false.
        LastModifiedDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the campaign was last modified.
        Limits:
          $ref: "#/components/schemas/CampaignLimits"
          description: The messaging limits for the campaign.
        MessageConfiguration:
          $ref: "#/components/schemas/MessageConfiguration"
          description: The message configuration settings for the campaign.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the campaign.
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: The schedule settings for the campaign.
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the segment that's associated with the campaign.
        SegmentVersion:
          $ref: "#/components/schemas/__integer"
          description: The version number of the segment that's associated with the campaign.
        State:
          $ref: "#/components/schemas/CampaignState"
          description: The current status of the campaign.
        tags:
          type: object
          properties: {}
          description: A string-to-string map of key-value pairs that identifies the tags that are associated with the campaign. Each tag consists of a required tag key and an associated tag value.
        TemplateConfiguration:
          $ref: "#/components/schemas/TemplateConfiguration"
          description: The message template that’s used for the campaign.
        TreatmentDescription:
          $ref: "#/components/schemas/__string"
          description: The custom description of the default treatment for the campaign.
        TreatmentName:
          $ref: "#/components/schemas/__string"
          description: The custom name of the default treatment for the campaign, if the campaign has multiple treatments. A treatment is a variation of a campaign that's used for A/B testing.
        Version:
          $ref: "#/components/schemas/__integer"
          description: The version number of the campaign.
        Priority:
          $ref: "#/components/schemas/__integer"
          description: Defines the priority of the campaign, used to decide the order of messages displayed to user if there are multiple messages scheduled to be displayed at the same moment.
      required:
        - LastModifiedDate
        - CreationDate
        - SegmentId
        - SegmentVersion
        - Id
        - Arn
        - ApplicationId
    ListOfTreatmentResource:
      type: array
      items:
        $ref: "#/components/schemas/TreatmentResource"
    TreatmentResource:
      description: Specifies the settings for a campaign treatment. A treatment is a variation of a campaign that's used for A/B testing of a campaign.
      type: object
      properties:
        CustomDeliveryConfiguration:
          $ref: "#/components/schemas/CustomDeliveryConfiguration"
          description: The delivery configuration settings for sending the treatment through a custom channel. This object is required if the MessageConfiguration object for the treatment specifies a CustomMessage object.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the treatment.
        MessageConfiguration:
          $ref: "#/components/schemas/MessageConfiguration"
          description: The message configuration settings for the treatment.
        Schedule:
          $ref: "#/components/schemas/Schedule"
          description: The schedule settings for the treatment.
        SizePercent:
          $ref: "#/components/schemas/__integer"
          description: The allocated percentage of users (segment members) that the treatment is sent to.
        State:
          $ref: "#/components/schemas/CampaignState"
          description: The current status of the treatment.
        TemplateConfiguration:
          $ref: "#/components/schemas/TemplateConfiguration"
          description: The message template to use for the treatment.
        TreatmentDescription:
          $ref: "#/components/schemas/__string"
          description: The custom description of the treatment.
        TreatmentName:
          $ref: "#/components/schemas/__string"
          description: The custom name of the treatment.
      required:
        - Id
        - SizePercent
    CampaignState:
      description: Provides information about the status of a campaign.
      type: object
      properties:
        CampaignStatus:
          $ref: "#/components/schemas/CampaignStatus"
          description: The current status of the campaign, or the current status of a treatment that belongs to an A/B test campaign. If a campaign uses A/B testing, the campaign has a status of COMPLETED only if all campaign treatments have a status of COMPLETED. If you delete the segment that's associated with a campaign, the campaign fails and has a status of DELETED.
    CampaignStatus:
      type: string
      enum:
        - SCHEDULED
        - EXECUTING
        - PENDING_NEXT_RUN
        - COMPLETED
        - PAUSED
        - DELETED
        - INVALID
    EmailTemplateRequest:
      description: Specifies the content and settings for a message template that can be used in messages that are sent through the email channel.
      type: object
      properties:
        DefaultSubstitutions:
          $ref: "#/components/schemas/__string"
          description: A JSON object that specifies the default values to use for message variables in the message template. This object is a set of key-value pairs. Each key defines a message variable in the template. The corresponding value defines the default value for that variable. When you create a message that's based on the template, you can override these defaults with message-specific and address-specific variables and values.
        HtmlPart:
          $ref: "#/components/schemas/__string"
          description: The message body, in HTML format, to use in email messages that are based on the message template. We recommend using HTML format for email clients that render HTML content. You can include links, formatted text, and more in an HTML message.
        RecommenderId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the recommender model to use for the message template. Amazon Pinpoint uses this value to determine how to retrieve and process data from a recommender model when it sends messages that use the template, if the template contains message variables for recommendation data.
        Subject:
          $ref: "#/components/schemas/__string"
          description: The subject line, or title, to use in email messages that are based on the message template.
        Headers:
          $ref: "#/components/schemas/ListOfMessageHeader"
          description: The list of MessageHeaders for the email. You can have up to 15 Headers.
        tags:
          type: object
          properties: {}
          description: As of 22-05-2023 tags has been deprecated for update operations. After this date any value in tags is not processed and an error code is not returned. To manage tags we recommend using either Tags in the API Reference for Amazon Pinpoint, resourcegroupstaggingapi commands in the AWS Command Line Interface Documentation or resourcegroupstaggingapi in the AWS SDK. (Deprecated) A string-to-string map of key-value pairs that defines the tags to associate with the message template. Each tag consists of a required tag key and an associated tag value.
        TemplateDescription:
          $ref: "#/components/schemas/__string"
          description: A custom description of the message template.
        TextPart:
          $ref: "#/components/schemas/__string"
          description: The message body, in plain text format, to use in email messages that are based on the message template. We recommend using plain text format for email clients that don't render HTML content and clients that are connected to high-latency networks, such as mobile devices.
    CreateEmailTemplateResponse:
      type: object
      properties:
        CreateTemplateMessageBody:
          $ref: "#/components/schemas/CreateTemplateMessageBody"
      required:
        - CreateTemplateMessageBody
    CreateTemplateMessageBody:
      description: Provides information about a request to create a message template.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the message template that was created.
        Message:
          $ref: "#/components/schemas/__string"
          description: The message that's returned from the API for the request to create the message template.
        RequestID:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the request to create the message template.
    ExportJobRequest:
      description: Specifies the settings for a job that exports endpoint definitions to an Amazon Simple Storage Service (Amazon S3) bucket.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that authorizes Amazon Pinpoint to access the Amazon S3 location where you want to export endpoint definitions to.
        S3UrlPrefix:
          $ref: "#/components/schemas/__string"
          description: "The URL of the location in an Amazon Simple Storage Service (Amazon S3) bucket where you want to export endpoint definitions to. This location is typically a folder that contains multiple files. The URL should be in the following format: s3://bucket-name/folder-name/."
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The identifier for the segment to export endpoint definitions from. If you don't specify this value, Amazon Pinpoint exports definitions for all the endpoints that are associated with the application.
        SegmentVersion:
          $ref: "#/components/schemas/__integer"
          description: The version of the segment to export endpoint definitions from, if specified.
      required:
        - S3UrlPrefix
        - RoleArn
    CreateExportJobResponse:
      type: object
      properties:
        ExportJobResponse:
          $ref: "#/components/schemas/ExportJobResponse"
      required:
        - ExportJobResponse
    ExportJobResponse:
      description: Provides information about the status and settings of a job that exports endpoint definitions to a file. The file can be added directly to an Amazon Simple Storage Service (Amazon S3) bucket by using the Amazon Pinpoint API or downloaded directly to a computer by using the Amazon Pinpoint console.
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the application that's associated with the export job.
        CompletedPieces:
          $ref: "#/components/schemas/__integer"
          description: The number of pieces that were processed successfully (completed) by the export job, as of the time of the request.
        CompletionDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the export job was completed.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the export job was created.
        Definition:
          $ref: "#/components/schemas/ExportJobResource"
          description: The resource settings that apply to the export job.
        FailedPieces:
          $ref: "#/components/schemas/__integer"
          description: The number of pieces that weren't processed successfully (failed) by the export job, as of the time of the request.
        Failures:
          $ref: "#/components/schemas/ListOf__string"
          description: An array of entries, one for each of the first 100 entries that weren't processed successfully (failed) by the export job, if any.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the export job.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the export job. The job status is FAILED if Amazon Pinpoint wasn't able to process one or more pieces in the job.
        TotalFailures:
          $ref: "#/components/schemas/__integer"
          description: The total number of endpoint definitions that weren't processed successfully (failed) by the export job, typically because an error, such as a syntax error, occurred.
        TotalPieces:
          $ref: "#/components/schemas/__integer"
          description: The total number of pieces that must be processed to complete the export job. Each piece consists of an approximately equal portion of the endpoint definitions that are part of the export job.
        TotalProcessed:
          $ref: "#/components/schemas/__integer"
          description: The total number of endpoint definitions that were processed by the export job.
        Type:
          $ref: "#/components/schemas/__string"
          description: The job type. This value is EXPORT for export jobs.
      required:
        - JobStatus
        - CreationDate
        - Type
        - Definition
        - Id
        - ApplicationId
    ExportJobResource:
      description: Provides information about the resource settings for a job that exports endpoint definitions to a file. The file can be added directly to an Amazon Simple Storage Service (Amazon S3) bucket by using the Amazon Pinpoint API or downloaded directly to a computer by using the Amazon Pinpoint console.
      type: object
      properties:
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that authorized Amazon Pinpoint to access the Amazon S3 location where the endpoint definitions were exported to.
        S3UrlPrefix:
          $ref: "#/components/schemas/__string"
          description: "The URL of the location in an Amazon Simple Storage Service (Amazon S3) bucket where the endpoint definitions were exported to. This location is typically a folder that contains multiple files. The URL should be in the following format: s3://bucket-name/folder-name/."
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The identifier for the segment that the endpoint definitions were exported from. If this value isn't present, Amazon Pinpoint exported definitions for all the endpoints that are associated with the application.
        SegmentVersion:
          $ref: "#/components/schemas/__integer"
          description: The version of the segment that the endpoint definitions were exported from.
      required:
        - S3UrlPrefix
        - RoleArn
    JobStatus:
      type: string
      enum:
        - CREATED
        - PREPARING_FOR_INITIALIZATION
        - INITIALIZING
        - PROCESSING
        - PENDING_JOB
        - COMPLETING
        - COMPLETED
        - FAILING
        - FAILED
    ImportJobRequest:
      description: Specifies the settings for a job that imports endpoint definitions from an Amazon Simple Storage Service (Amazon S3) bucket.
      type: object
      properties:
        DefineSegment:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether to create a segment that contains the endpoints, when the endpoint definitions are imported.
        ExternalId:
          $ref: "#/components/schemas/__string"
          description: (Deprecated) Your AWS account ID, which you assigned to an external ID key in an IAM trust policy. Amazon Pinpoint previously used this value to assume an IAM role when importing endpoint definitions, but we removed this requirement. We don't recommend use of external IDs for IAM roles that are assumed by Amazon Pinpoint.
        Format:
          $ref: "#/components/schemas/Format"
          description: "The format of the files that contain the endpoint definitions to import. Valid values are: CSV, for comma-separated values format; and, JSON, for newline-delimited JSON format. If the Amazon S3 location stores multiple files that use different formats, Amazon Pinpoint imports data only from the files that use the specified format."
        RegisterEndpoints:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether to register the endpoints with Amazon Pinpoint, when the endpoint definitions are imported.
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that authorizes Amazon Pinpoint to access the Amazon S3 location to import endpoint definitions from.
        S3Url:
          $ref: "#/components/schemas/__string"
          description: "The URL of the Amazon Simple Storage Service (Amazon S3) bucket that contains the endpoint definitions to import. This location can be a folder or a single file. If the location is a folder, Amazon Pinpoint imports endpoint definitions from the files in this location, including any subfolders that the folder contains. The URL should be in the following format: s3://bucket-name/folder-name/file-name. The location can end with the key for an individual object or a prefix that qualifies multiple objects."
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The identifier for the segment to update or add the imported endpoint definitions to, if the import job is meant to update an existing segment.
        SegmentName:
          $ref: "#/components/schemas/__string"
          description: A custom name for the segment that's created by the import job, if the value of the DefineSegment property is true.
      required:
        - Format
        - S3Url
        - RoleArn
    Format:
      type: string
      enum:
        - CSV
        - JSON
    CreateImportJobResponse:
      type: object
      properties:
        ImportJobResponse:
          $ref: "#/components/schemas/ImportJobResponse"
      required:
        - ImportJobResponse
    ImportJobResponse:
      description: Provides information about the status and settings of a job that imports endpoint definitions from one or more files. The files can be stored in an Amazon Simple Storage Service (Amazon S3) bucket or uploaded directly from a computer by using the Amazon Pinpoint console.
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the application that's associated with the import job.
        CompletedPieces:
          $ref: "#/components/schemas/__integer"
          description: The number of pieces that were processed successfully (completed) by the import job, as of the time of the request.
        CompletionDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the import job was completed.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the import job was created.
        Definition:
          $ref: "#/components/schemas/ImportJobResource"
          description: The resource settings that apply to the import job.
        FailedPieces:
          $ref: "#/components/schemas/__integer"
          description: The number of pieces that weren't processed successfully (failed) by the import job, as of the time of the request.
        Failures:
          $ref: "#/components/schemas/ListOf__string"
          description: An array of entries, one for each of the first 100 entries that weren't processed successfully (failed) by the import job, if any.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the import job.
        JobStatus:
          $ref: "#/components/schemas/JobStatus"
          description: The status of the import job. The job status is FAILED if Amazon Pinpoint wasn't able to process one or more pieces in the job.
        TotalFailures:
          $ref: "#/components/schemas/__integer"
          description: The total number of endpoint definitions that weren't processed successfully (failed) by the import job, typically because an error, such as a syntax error, occurred.
        TotalPieces:
          $ref: "#/components/schemas/__integer"
          description: The total number of pieces that must be processed to complete the import job. Each piece consists of an approximately equal portion of the endpoint definitions that are part of the import job.
        TotalProcessed:
          $ref: "#/components/schemas/__integer"
          description: The total number of endpoint definitions that were processed by the import job.
        Type:
          $ref: "#/components/schemas/__string"
          description: The job type. This value is IMPORT for import jobs.
      required:
        - JobStatus
        - CreationDate
        - Type
        - Definition
        - Id
        - ApplicationId
    ImportJobResource:
      description: Provides information about the resource settings for a job that imports endpoint definitions from one or more files. The files can be stored in an Amazon Simple Storage Service (Amazon S3) bucket or uploaded directly from a computer by using the Amazon Pinpoint console.
      type: object
      properties:
        DefineSegment:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the import job creates a segment that contains the endpoints, when the endpoint definitions are imported.
        ExternalId:
          $ref: "#/components/schemas/__string"
          description: (Deprecated) Your AWS account ID, which you assigned to an external ID key in an IAM trust policy. Amazon Pinpoint previously used this value to assume an IAM role when importing endpoint definitions, but we removed this requirement. We don't recommend use of external IDs for IAM roles that are assumed by Amazon Pinpoint.
        Format:
          $ref: "#/components/schemas/Format"
          description: "The format of the files that contain the endpoint definitions to import. Valid values are: CSV, for comma-separated values format; and, JSON, for newline-delimited JSON format. If the files are stored in an Amazon S3 location and that location contains multiple files that use different formats, Amazon Pinpoint imports data only from the files that use the specified format."
        RegisterEndpoints:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the import job registers the endpoints with Amazon Pinpoint, when the endpoint definitions are imported.
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the AWS Identity and Access Management (IAM) role that authorizes Amazon Pinpoint to access the Amazon S3 location to import endpoint definitions from.
        S3Url:
          $ref: "#/components/schemas/__string"
          description: "The URL of the Amazon Simple Storage Service (Amazon S3) bucket that contains the endpoint definitions to import. This location can be a folder or a single file. If the location is a folder, Amazon Pinpoint imports endpoint definitions from the files in this location, including any subfolders that the folder contains. The URL should be in the following format: s3://bucket-name/folder-name/file-name. The location can end with the key for an individual object or a prefix that qualifies multiple objects."
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The identifier for the segment that the import job updates or adds endpoint definitions to, if the import job updates an existing segment.
        SegmentName:
          $ref: "#/components/schemas/__string"
          description: The custom name for the segment that's created by the import job, if the value of the DefineSegment property is true.
      required:
