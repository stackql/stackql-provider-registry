    MessageRequest:
      description: Specifies the configuration and other settings for a message.
      type: object
      properties:
        Addresses:
          type: object
          properties: {}
          description: A map of key-value pairs, where each key is an address and each value is an AddressConfiguration object. An address can be a push notification token, a phone number, or an email address. You can use an AddressConfiguration object to tailor the message for an address by specifying settings such as content overrides and message variables.
        Context:
