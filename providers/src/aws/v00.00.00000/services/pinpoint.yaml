        RefreshFrequency:
          $ref: "#/components/schemas/__string"
          description: The frequency with which Amazon Pinpoint evaluates segment and event data for the journey, as a duration in ISO 8601 format.
        Schedule:
          $ref: "#/components/schemas/JourneySchedule"
          description: The schedule settings for the journey.
        StartActivity:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the first activity in the journey.
        StartCondition:
          $ref: "#/components/schemas/StartCondition"
          description: The segment that defines which users are participants in the journey.
        State:
          $ref: "#/components/schemas/State"
          description: "The current status of the journey. Possible values are: DRAFT - The journey is being developed and hasn't been published yet. ACTIVE - The journey has been developed and published. Depending on the journey's schedule, the journey may currently be running or scheduled to start running at a later time. If a journey's status is ACTIVE, you can't add, change, or remove activities from it. COMPLETED - The journey has been published and has finished running. All participants have entered the journey and no participants are waiting to complete the journey or any activities in the journey. CANCELLED - The journey has been stopped. If a journey's status is CANCELLED, you can't add, change, or remove activities or segment settings from the journey. CLOSED - The journey has been published and has started running. It may have also passed its scheduled end time, or passed its scheduled start time and a refresh frequency hasn't been specified for it. If a journey's status is CLOSED, you can't add participants to it, and no existing participants can enter the journey for the first time. However, any existing participants who are currently waiting to start an activity may continue the journey."
