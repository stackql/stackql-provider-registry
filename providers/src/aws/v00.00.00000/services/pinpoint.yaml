    EndpointResponse:
      description: Provides information about the channel type and other settings for an endpoint.
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/__string"
          description: The destination address for messages or push notifications that you send to the endpoint. The address varies by channel. For example, the address for a push-notification channel is typically the token provided by a push notification service, such as an Apple Push Notification service (APNs) device token or a Firebase Cloud Messaging (FCM) registration token. The address for the SMS channel is a phone number in E.164 format, such as +12065550100. The address for the email channel is an email address.
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the application that's associated with the endpoint.
        Attributes:
          type: object
          properties: {}
          description: 'One or more custom attributes that describe the endpoint by associating a name with an array of values. For example, the value of a custom attribute named Interests might be: ["Science", "Music", "Travel"]. You can use these attributes as filter criteria when you create segments.'
        ChannelType:
          $ref: "#/components/schemas/ChannelType"
          description: The channel that's used when sending messages or push notifications to the endpoint.
        CohortId:
          $ref: "#/components/schemas/__string"
          description: A number from 0-99 that represents the cohort that the endpoint is assigned to. Endpoints are grouped into cohorts randomly, and each cohort contains approximately 1 percent of the endpoints for an application. Amazon Pinpoint assigns cohorts to the holdout or treatment allocations for campaigns.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date and time, in ISO 8601 format, when the endpoint was created.
        Demographic:
          $ref: "#/components/schemas/EndpointDemographic"
          description: The demographic information for the endpoint, such as the time zone and platform.
        EffectiveDate:
          $ref: "#/components/schemas/__string"
          description: The date and time, in ISO 8601 format, when the endpoint was last updated.
        EndpointStatus:
          $ref: "#/components/schemas/__string"
          description: "Specifies whether messages or push notifications are sent to the endpoint. Possible values are: ACTIVE, messages are sent to the endpoint; and, INACTIVE, messages aren’t sent to the endpoint. Amazon Pinpoint automatically sets this value to ACTIVE when you create an endpoint or update an existing endpoint. Amazon Pinpoint automatically sets this value to INACTIVE if you update another endpoint that has the same address specified by the Address property."
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier that you assigned to the endpoint. The identifier should be a globally unique identifier (GUID) to ensure that it doesn't conflict with other endpoint identifiers that are associated with the application.
        Location:
          $ref: "#/components/schemas/EndpointLocation"
          description: The geographic information for the endpoint.
        Metrics:
          type: object
          properties: {}
          description: One or more custom metrics that your app reports to Amazon Pinpoint for the endpoint.
        OptOut:
          $ref: "#/components/schemas/__string"
          description: "Specifies whether the user who's associated with the endpoint has opted out of receiving messages and push notifications from you. Possible values are: ALL, the user has opted out and doesn't want to receive any messages or push notifications; and, NONE, the user hasn't opted out and wants to receive all messages and push notifications."
        RequestId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the most recent request to update the endpoint.
        User:
          $ref: "#/components/schemas/EndpointUser"
          description: One or more custom user attributes that your app reports to Amazon Pinpoint for the user who's associated with the endpoint.
    ChannelType:
      type: string
      enum:
        - PUSH
        - GCM
        - APNS
        - APNS_SANDBOX
        - APNS_VOIP
        - APNS_VOIP_SANDBOX
        - ADM
        - SMS
        - VOICE
        - EMAIL
        - BAIDU
        - CUSTOM
        - IN_APP
    EndpointDemographic:
      description: Specifies demographic information about an endpoint, such as the applicable time zone and platform.
      type: object
      properties:
        AppVersion:
          $ref: "#/components/schemas/__string"
          description: The version of the app that's associated with the endpoint.
        Locale:
          $ref: "#/components/schemas/__string"
          description: "The locale of the endpoint, in the following format: the ISO 639-1 alpha-2 code, followed by an underscore (_), followed by an ISO 3166-1 alpha-2 value."
        Make:
          $ref: "#/components/schemas/__string"
          description: The manufacturer of the endpoint device, such as apple or samsung.
        Model:
          $ref: "#/components/schemas/__string"
          description: The model name or number of the endpoint device, such as iPhone or SM-G900F.
        ModelVersion:
          $ref: "#/components/schemas/__string"
          description: The model version of the endpoint device.
        Platform:
          $ref: "#/components/schemas/__string"
          description: The platform of the endpoint device, such as ios.
        PlatformVersion:
          $ref: "#/components/schemas/__string"
          description: The platform version of the endpoint device.
        Timezone:
          $ref: "#/components/schemas/__string"
          description: The time zone of the endpoint, specified as a tz database name value, such as America/Los_Angeles.
    EndpointLocation:
      description: Specifies geographic information about an endpoint.
      type: object
      properties:
        City:
          $ref: "#/components/schemas/__string"
          description: The name of the city where the endpoint is located.
        Country:
          $ref: "#/components/schemas/__string"
          description: The two-character code, in ISO 3166-1 alpha-2 format, for the country or region where the endpoint is located. For example, US for the United States.
        Latitude:
          $ref: "#/components/schemas/__double"
          description: The latitude coordinate of the endpoint location, rounded to one decimal place.
        Longitude:
          $ref: "#/components/schemas/__double"
          description: The longitude coordinate of the endpoint location, rounded to one decimal place.
        PostalCode:
          $ref: "#/components/schemas/__string"
          description: The postal or ZIP code for the area where the endpoint is located.
        Region:
          $ref: "#/components/schemas/__string"
          description: The name of the region where the endpoint is located. For locations in the United States, this value is the name of a state.
    EndpointUser:
      description: Specifies data for one or more attributes that describe the user who's associated with an endpoint.
      type: object
      properties:
        UserAttributes:
          type: object
          properties: {}
