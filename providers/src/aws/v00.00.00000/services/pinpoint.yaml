    InAppTemplateRequest:
      description: InApp Template Request.
      type: object
      properties:
        Content:
          $ref: "#/components/schemas/ListOfInAppMessageContent"
          description: The content of the message, can include up to 5 modals. Each modal must contain a message, a header, and background color. ImageUrl and buttons are optional.
        CustomConfig:
          type: object
          properties: {}
          description: Custom config to be sent to client.
        Layout:
          $ref: "#/components/schemas/Layout"
          description: The layout of the message.
        tags:
          type: object
          properties: {}
          description: As of 22-05-2023 tags has been deprecated for update operations. After this date any value in tags is not processed and an error code is not returned. To manage tags we recommend using either Tags in the API Reference for Amazon Pinpoint, resourcegroupstaggingapi commands in the AWS Command Line Interface Documentation or resourcegroupstaggingapi in the AWS SDK. (Deprecated) A string-to-string map of key-value pairs that defines the tags to associate with the message template. Each tag consists of a required tag key and an associated tag value.
        TemplateDescription:
          $ref: "#/components/schemas/__string"
          description: The description of the template.
    CreateInAppTemplateResponse:
      type: object
      properties:
        TemplateCreateMessageBody:
          $ref: "#/components/schemas/TemplateCreateMessageBody"
      required:
        - TemplateCreateMessageBody
    TemplateCreateMessageBody:
      description: Provides information about a request to create a message template.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the message template that was created.
        Message:
          $ref: "#/components/schemas/__string"
          description: The message that's returned from the API for the request to create the message template.
        RequestID:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the request to create the message template.
    WriteJourneyRequest:
      description: Specifies the configuration and other settings for a journey.
      type: object
      properties:
        Activities:
          type: object
          properties: {}
          description: A map that contains a set of Activity objects, one object for each activity in the journey. For each Activity object, the key is the unique identifier (string) for an activity and the value is the settings for the activity. An activity identifier can contain a maximum of 100 characters. The characters must be alphanumeric characters.
        CreationDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the journey was created.
        LastModifiedDate:
          $ref: "#/components/schemas/__string"
          description: The date, in ISO 8601 format, when the journey was last modified.
        Limits:
          $ref: "#/components/schemas/JourneyLimits"
          description: The messaging and entry limits for the journey.
        LocalTime:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the journey's scheduled start and end times use each participant's local time. To base the schedule on each participant's local time, set this value to true.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the journey. A journey name can contain a maximum of 150 characters. The characters can be alphanumeric characters or symbols, such as underscores (_) or hyphens (-). A journey name can't contain any spaces.
        QuietTime:
          $ref: "#/components/schemas/QuietTime"
          description: "The quiet time settings for the journey. Quiet time is a specific time range when a journey doesn't send messages to participants, if all the following conditions are met: The EndpointDemographic.Timezone property of the endpoint for the participant is set to a valid value. The current time in the participant's time zone is later than or equal to the time specified by the QuietTime.Start property for the journey. The current time in the participant's time zone is earlier than or equal to the time specified by the QuietTime.End property for the journey. If any of the preceding conditions isn't met, the participant will receive messages from the journey, even if quiet time is enabled."
        RefreshFrequency:
          $ref: "#/components/schemas/__string"
          description: The frequency with which Amazon Pinpoint evaluates segment and event data for the journey, as a duration in ISO 8601 format.
        Schedule:
          $ref: "#/components/schemas/JourneySchedule"
          description: The schedule settings for the journey.
        StartActivity:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the first activity in the journey. The identifier for this activity can contain a maximum of 128 characters. The characters must be alphanumeric characters.
        StartCondition:
          $ref: "#/components/schemas/StartCondition"
          description: The segment that defines which users are participants in the journey.
        State:
          $ref: "#/components/schemas/State"
          description: "The status of the journey. Valid values are: DRAFT - Saves the journey and doesn't publish it. ACTIVE - Saves and publishes the journey. Depending on the journey's schedule, the journey starts running immediately or at the scheduled start time. If a journey's status is ACTIVE, you can't add, change, or remove activities from it. PAUSED, CANCELLED, COMPLETED, and CLOSED states are not supported in requests to create or update a journey. To cancel, pause, or resume a journey, use the Journey State resource."
        WaitForQuietTime:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether endpoints in quiet hours should enter a wait till the end of their quiet hours.
        RefreshOnSegmentUpdate:
          $ref: "#/components/schemas/__boolean"
          description: Indicates whether the journey participants should be refreshed when a segment is updated.
        JourneyChannelSettings:
          $ref: "#/components/schemas/JourneyChannelSettings"
          description: The channel-specific configurations for the journey.
        SendingSchedule:
          $ref: "#/components/schemas/__boolean"
          description: Indicates if journey has Advance Quiet Time enabled. This flag should be set to true in order to allow using OpenHours and ClosedDays.
        OpenHours:
          $ref: "#/components/schemas/OpenHours"
          description: The time when journey allow to send messages. QuietTime should be configured first and SendingSchedule should be set to true.
        ClosedDays:
          $ref: "#/components/schemas/ClosedDays"
          description: The time when journey will stop sending messages. QuietTime should be configured first and SendingSchedule should be set to true.
        TimezoneEstimationMethods:
          $ref: "#/components/schemas/ListOf__TimezoneEstimationMethodsElement"
          description: An array of time zone estimation methods, if any, to use for determining an Endpoints time zone if the Endpoint does not have a value for the Demographic.Timezone attribute. PHONE_NUMBER - A time zone is determined based on the Endpoint.Address and Endpoint.Location.Country. POSTAL_CODE - A time zone is determined based on the Endpoint.Location.PostalCode and Endpoint.Location.Country. POSTAL_CODE detection is only supported in the United States, United Kingdom, Australia, New Zealand, Canada, France, Italy, Spain, Germany and in regions where Amazon Pinpoint is available.
      required:
        - Name
    JourneyLimits:
      description: Specifies limits on the messages that a journey can send and the number of times participants can enter a journey.
      type: object
      properties:
        DailyCap:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages that the journey can send to a single participant during a 24-hour period. The maximum value is 100.
        EndpointReentryCap:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of times that a participant can enter the journey. The maximum value is 100. To allow participants to enter the journey an unlimited number of times, set this value to 0.
        MessagesPerSecond:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages that the journey can send each second.
        EndpointReentryInterval:
          $ref: "#/components/schemas/__string"
          description: Minimum time that must pass before an endpoint can re-enter a given journey. The duration should use an ISO 8601 format, such as PT1H.
        TimeframeCap:
          $ref: "#/components/schemas/JourneyTimeframeCap"
          description: The number of messages that an endpoint can receive during the specified timeframe.
        TotalCap:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages a journey can sent to a single endpoint. The maximum value is 100. If set to 0, this limit will not apply.
    JourneyTimeframeCap:
      description: The number of messages that can be sent to an endpoint during the specified timeframe for all journeys.
      type: object
      properties:
        Cap:
          $ref: "#/components/schemas/__integer"
          description: The maximum number of messages that all journeys can send to an endpoint during the specified timeframe. The maximum value is 100. If set to 0, this limit will not apply.
        Days:
          $ref: "#/components/schemas/__integer"
          description: The length of the timeframe in days. The maximum value is 30. If set to 0, this limit will not apply.
    JourneySchedule:
      description: Specifies the schedule settings for a journey.
      type: object
      properties:
        EndTime:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The scheduled time, in ISO 8601 format, when the journey ended or will end.
        StartTime:
          $ref: "#/components/schemas/__timestampIso8601"
          description: The scheduled time, in ISO 8601 format, when the journey began or will begin.
        Timezone:
          $ref: "#/components/schemas/__string"
          description: "The starting UTC offset for the journey schedule, if the value of the journey's LocalTime property is true. Valid values are: UTC, UTC+01, UTC+02, UTC+03, UTC+03:30, UTC+04, UTC+04:30, UTC+05, UTC+05:30, UTC+05:45, UTC+06, UTC+06:30, UTC+07, UTC+08, UTC+08:45, UTC+09, UTC+09:30, UTC+10, UTC+10:30, UTC+11, UTC+12, UTC+12:45, UTC+13, UTC+13:45, UTC-02, UTC-02:30, UTC-03, UTC-03:30, UTC-04, UTC-05, UTC-06, UTC-07, UTC-08, UTC-09, UTC-09:30, UTC-10, and UTC-11."
    __timestampIso8601:
      type: string
      format: date-time
    StartCondition:
      description: Specifies the conditions for the first activity in a journey. This activity and its conditions determine which users are participants in a journey.
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/__string"
          description: The custom description of the condition.
        EventStartCondition:
          $ref: "#/components/schemas/EventStartCondition"
        SegmentStartCondition:
          $ref: "#/components/schemas/SegmentCondition"
          description: The segment that's associated with the first activity in the journey. This segment determines which users are participants in the journey.
    EventStartCondition:
      description: Specifies the settings for an event that causes a journey activity to start.
      type: object
      properties:
        EventFilter:
          $ref: "#/components/schemas/EventFilter"
        SegmentId:
          $ref: "#/components/schemas/__string"
    EventFilter:
      description: Specifies the settings for an event that causes a campaign to be sent or a journey activity to be performed.
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/EventDimensions"
          description: The dimensions for the event filter to use for the campaign or the journey activity.
        FilterType:
          $ref: "#/components/schemas/FilterType"
          description: "The type of event that causes the campaign to be sent or the journey activity to be performed. Valid values are: SYSTEM, sends the campaign or performs the activity when a system event occurs; and, ENDPOINT, sends the campaign or performs the activity when an endpoint event (Events resource) occurs."
      required:
        - FilterType
        - Dimensions
    SegmentCondition:
      description: Specifies a segment to associate with an activity in a journey.
      type: object
      properties:
        SegmentId:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the segment to associate with the activity.
      required:
        - SegmentId
    State:
      type: string
      enum:
        - DRAFT
        - ACTIVE
        - COMPLETED
        - CANCELLED
        - CLOSED
        - PAUSED
    JourneyChannelSettings:
      description: The channel-specific configurations for the journey.
      type: object
      properties:
        ConnectCampaignArn:
          $ref: "#/components/schemas/__string"
          description: Amazon Resource Name (ARN) of the Connect Campaign.
        ConnectCampaignExecutionRoleArn:
          $ref: "#/components/schemas/__string"
          description: IAM role ARN to be assumed when invoking Connect campaign execution APIs for dialing.
    OpenHours:
