          description: The unique identifier for tracing the message. This identifier is visible to message recipients.
      required:
        - MessageConfiguration
    DirectMessageConfiguration:
      description: Specifies the settings and content for the default message and any default messages that you tailored for specific channels.
      type: object
      properties:
        ADMMessage:
          $ref: "#/components/schemas/ADMMessage"
          description: The default push notification message for the ADM (Amazon Device Messaging) channel. This message overrides the default push notification message (DefaultPushNotificationMessage).
        APNSMessage:
          $ref: "#/components/schemas/APNSMessage"
          description: The default push notification message for the APNs (Apple Push Notification service) channel. This message overrides the default push notification message (DefaultPushNotificationMessage).
        BaiduMessage:
          $ref: "#/components/schemas/BaiduMessage"
          description: The default push notification message for the Baidu (Baidu Cloud Push) channel. This message overrides the default push notification message (DefaultPushNotificationMessage).
        DefaultMessage:
          $ref: "#/components/schemas/DefaultMessage"
          description: The default message for all channels.
        DefaultPushNotificationMessage:
          $ref: "#/components/schemas/DefaultPushNotificationMessage"
          description: The default push notification message for all push notification channels.
        EmailMessage:
          $ref: "#/components/schemas/EmailMessage"
          description: The default message for the email channel. This message overrides the default message (DefaultMessage).
        GCMMessage:
          $ref: "#/components/schemas/GCMMessage"
          description: The default push notification message for the GCM channel, which is used to send notifications through the Firebase Cloud Messaging (FCM), formerly Google Cloud Messaging (GCM), service. This message overrides the default push notification message (DefaultPushNotificationMessage).
        SMSMessage:
          $ref: "#/components/schemas/SMSMessage"
          description: The default message for the SMS channel. This message overrides the default message (DefaultMessage).
        VoiceMessage:
          $ref: "#/components/schemas/VoiceMessage"
          description: The default message for the voice channel. This message overrides the default message (DefaultMessage).
    ADMMessage:
      description: Specifies the settings for a one-time message that's sent directly to an endpoint through the ADM (Amazon Device Messaging) channel.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if the recipient taps the push notification. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This action uses the deep-linking features of the Android platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the notification message.
        ConsolidationKey:
          $ref: "#/components/schemas/__string"
          description: An arbitrary string that indicates that multiple messages are logically the same and that Amazon Device Messaging (ADM) can drop previously enqueued messages in favor of this message.
        Data:
          type: object
          properties: {}
          description: The JSON data payload to use for the push notification, if the notification is a silent push notification. This payload is added to the data.pinpoint.jsonBody object of the notification.
        ExpiresAfter:
          $ref: "#/components/schemas/__string"
          description: The amount of time, in seconds, that ADM should store the message if the recipient's device is offline. Amazon Pinpoint specifies this value in the expiresAfter parameter when it sends the notification message to ADM.
        IconReference:
          $ref: "#/components/schemas/__string"
          description: The icon image name of the asset saved in your app.
        ImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the large icon image to display in the content view of the push notification.
        ImageUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image to display in the push notification.
        MD5:
          $ref: "#/components/schemas/__string"
          description: The base64-encoded, MD5 checksum of the value specified by the Data property. ADM uses the MD5 value to verify the integrity of the data.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for the notification message. If specified, this value overrides all other content for the message.
        SilentPush:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the notification is a silent push notification, which is a push notification that doesn't display on a recipient's device. Silent push notifications can be used for cases such as updating an app's configuration or supporting phone home functionality.
        SmallImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the small icon image to display in the status bar and the content view of the push notification.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The sound to play when the recipient receives the push notification. You can use the default stream or specify the file name of a sound resource that's bundled in your app. On an Android platform, the sound file must reside in /res/raw/.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the notification message. You can override the default variables with individual address variables.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to display above the notification message on the recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in the recipient's default mobile browser, if a recipient taps the push notification and the value of the Action property is URL.
    APNSMessage:
      description: Specifies the settings for a one-time message that's sent directly to an endpoint through the APNs (Apple Push Notification service) channel.
      type: object
      properties:
        APNSPushType:
          $ref: "#/components/schemas/__string"
          description: "The type of push notification to send. Valid values are: alert - For a standard notification that's displayed on recipients' devices and prompts a recipient to interact with the notification. background - For a silent notification that delivers content in the background and isn't displayed on recipients' devices. complication - For a notification that contains update information for an app’s complication timeline. fileprovider - For a notification that signals changes to a File Provider extension. mdm - For a notification that tells managed devices to contact the MDM server. voip - For a notification that provides information about an incoming VoIP call. Amazon Pinpoint specifies this value in the apns-push-type request header when it sends the notification message to APNs. If you don't specify a value for this property, Amazon Pinpoint sets the value to alert or background automatically, based on the value that you specify for the SilentPush or RawContent property of the message. For more information about the apns-push-type request header, see Sending Notification Requests to APNs on the Apple Developer website."
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if the recipient taps the push notification. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This setting uses the deep-linking features of the iOS platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Badge:
          $ref: "#/components/schemas/__integer"
          description: The key that indicates whether and how to modify the badge of your app's icon when the recipient receives the push notification. If this key isn't included in the dictionary, the badge doesn't change. To remove the badge, set this value to 0.
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the notification message.
        Category:
          $ref: "#/components/schemas/__string"
          description: The key that indicates the notification type for the push notification. This key is a value that's defined by the identifier property of one of your app's registered categories.
        CollapseId:
          $ref: "#/components/schemas/__string"
          description: An arbitrary identifier that, if assigned to multiple messages, APNs uses to coalesce the messages into a single push notification instead of delivering each message individually. This value can't exceed 64 bytes. Amazon Pinpoint specifies this value in the apns-collapse-id request header when it sends the notification message to APNs.
        Data:
          type: object
          properties: {}
          description: The JSON payload to use for a silent push notification. This payload is added to the data.pinpoint.jsonBody object of the notification.
        MediaUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image or video to display in the push notification.
        PreferredAuthenticationMethod:
          $ref: "#/components/schemas/__string"
          description: The authentication method that you want Amazon Pinpoint to use when authenticating with APNs, CERTIFICATE or TOKEN.
        Priority:
          $ref: "#/components/schemas/__string"
          description: para>5 - Low priority, the notification might be delayed, delivered as part of a group, or throttled. /listitem> 10 - High priority, the notification is sent immediately. This is the default value. A high priority notification should trigger an alert, play a sound, or badge your app's icon on the recipient's device. /para> Amazon Pinpoint specifies this value in the apns-priority request header when it sends the notification message to APNs. The equivalent values for Firebase Cloud Messaging (FCM), formerly Google Cloud Messaging (GCM), are normal, for 5, and high, for 10. If you specify an FCM value for this property, Amazon Pinpoint accepts and converts the value to the corresponding APNs value.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for the notification message. If specified, this value overrides all other content for the message. If you specify the raw content of an APNs push notification, the message payload has to include the content-available key. The value of the content-available key has to be an integer, and can only be 0 or 1. If you're sending a standard notification, set the value of content-available to 0. If you're sending a silent (background) notification, set the value of content-available to 1. Additionally, silent notification payloads can't include the alert, badge, or sound keys. For more information, see Generating a Remote Notification and Pushing Background Updates to Your App on the Apple Developer website.
        SilentPush:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the notification is a silent push notification. A silent (or background) push notification isn't displayed on recipients' devices. You can use silent push notifications to make small updates to your app, or to display messages in an in-app message center. Amazon Pinpoint uses this property to determine the correct value for the apns-push-type request header when it sends the notification message to APNs. If you specify a value of true for this property, Amazon Pinpoint sets the value for the apns-push-type header field to background. If you specify the raw content of an APNs push notification, the message payload has to include the content-available key. For silent (background) notifications, set the value of content-available to 1. Additionally, the message payload for a silent notification can't include the alert, badge, or sound keys. For more information, see Generating a Remote Notification and Pushing Background Updates to Your App on the Apple Developer website. Apple has indicated that they will throttle "excessive" background notifications based on current traffic volumes. To prevent your notifications being throttled, Apple recommends that you send no more than 3 silent push notifications to each recipient per hour.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The key for the sound to play when the recipient receives the push notification. The value for this key is the name of a sound file in your app's main bundle or the Library/Sounds folder in your app's data container. If the sound file can't be found or you specify default for the value, the system plays the default alert sound.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the notification message. You can override these default variables with individual address variables.
        ThreadId:
          $ref: "#/components/schemas/__string"
          description: The key that represents your app-specific identifier for grouping notifications. If you provide a Notification Content app extension, you can use this value to group your notifications together.
        TimeToLive:
          $ref: "#/components/schemas/__integer"
          description: The amount of time, in seconds, that APNs should store and attempt to deliver the push notification, if the service is unable to deliver the notification the first time. If this value is 0, APNs treats the notification as if it expires immediately and the service doesn't store or try to deliver the notification again. Amazon Pinpoint specifies this value in the apns-expiration request header when it sends the notification message to APNs.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to display above the notification message on the recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in the recipient's default mobile browser, if a recipient taps the push notification and the value of the Action property is URL.
    BaiduMessage:
      description: Specifies the settings for a one-time message that's sent directly to an endpoint through the Baidu (Baidu Cloud Push) channel.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if the recipient taps the push notification. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This action uses the deep-linking features of the Android platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the notification message.
        Data:
          type: object
          properties: {}
          description: The JSON data payload to use for the push notification, if the notification is a silent push notification. This payload is added to the data.pinpoint.jsonBody object of the notification.
        IconReference:
          $ref: "#/components/schemas/__string"
          description: The icon image name of the asset saved in your app.
        ImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the large icon image to display in the content view of the push notification.
        ImageUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image to display in the push notification.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for the notification message. If specified, this value overrides all other content for the message.
        SilentPush:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the notification is a silent push notification, which is a push notification that doesn't display on a recipient's device. Silent push notifications can be used for cases such as updating an app's configuration or supporting phone home functionality.
        SmallImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the small icon image to display in the status bar and the content view of the push notification.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The sound to play when the recipient receives the push notification. You can use the default stream or specify the file name of a sound resource that's bundled in your app. On an Android platform, the sound file must reside in /res/raw/.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the notification message. You can override the default variables with individual address variables.
        TimeToLive:
          $ref: "#/components/schemas/__integer"
          description: The amount of time, in seconds, that the Baidu Cloud Push service should store the message if the recipient's device is offline. The default value and maximum supported time is 604,800 seconds (7 days).
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to display above the notification message on the recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in the recipient's default mobile browser, if a recipient taps the push notification and the value of the Action property is URL.
    DefaultMessage:
      description: Specifies the default message for all channels.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The default body of the message.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the message. You can override these default variables with individual address variables.
    DefaultPushNotificationMessage:
      description: Specifies the default settings and content for a push notification that's sent directly to an endpoint.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The default action to occur if a recipient taps the push notification. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This setting uses the deep-linking features of the iOS and Android platforms. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The default body of the notification message.
        Data:
          type: object
          properties: {}
          description: The JSON data payload to use for the default push notification, if the notification is a silent push notification. This payload is added to the data.pinpoint.jsonBody object of the notification.
        SilentPush:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the default notification is a silent push notification, which is a push notification that doesn't display on a recipient's device. Silent push notifications can be used for cases such as updating an app's configuration or delivering messages to an in-app notification center.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the notification message. You can override the default variables with individual address variables.
        Title:
          $ref: "#/components/schemas/__string"
          description: The default title to display above the notification message on a recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The default URL to open in a recipient's default mobile browser, if a recipient taps the push notification and the value of the Action property is URL.
    EmailMessage:
      description: Specifies the default settings and content for a one-time email message that's sent directly to an endpoint.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the email message.
        FeedbackForwardingAddress:
          $ref: "#/components/schemas/__string"
          description: The email address to forward bounces and complaints to, if feedback forwarding is enabled.
        FromAddress:
          $ref: "#/components/schemas/__string"
          description: The verified email address to send the email message from. The default value is the FromAddress specified for the email channel.
        RawEmail:
          $ref: "#/components/schemas/RawEmail"
          description: The email message, represented as a raw MIME message.
        ReplyToAddresses:
          $ref: "#/components/schemas/ListOf__string"
          description: The reply-to email address(es) for the email message. If a recipient replies to the email, each reply-to address receives the reply.
        SimpleEmail:
          $ref: "#/components/schemas/SimpleEmail"
          description: The email message, composed of a subject, a text part, and an HTML part.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the email message. You can override the default variables with individual address variables.
    RawEmail:
      description: Specifies the contents of an email message, represented as a raw MIME message.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/__blob"
          description: The email message, represented as a raw MIME message. The entire message must be base64 encoded.
    __blob:
      type: string
      format: byte
    SimpleEmail:
      description: Specifies the contents of an email message, composed of a subject, a text part, and an HTML part.
      type: object
      properties:
        HtmlPart:
          $ref: "#/components/schemas/SimpleEmailPart"
          description: The body of the email message, in HTML format. We recommend using HTML format for email clients that render HTML content. You can include links, formatted text, and more in an HTML message.
        Subject:
          $ref: "#/components/schemas/SimpleEmailPart"
          description: The subject line, or title, of the email.
        TextPart:
          $ref: "#/components/schemas/SimpleEmailPart"
          description: The body of the email message, in plain text format. We recommend using plain text format for email clients that don't render HTML content and clients that are connected to high-latency networks, such as mobile devices.
        Headers:
          $ref: "#/components/schemas/ListOfMessageHeader"
          description: The list of MessageHeaders for the email. You can have up to 15 Headers.
    SimpleEmailPart:
      description: Specifies the subject or body of an email message, represented as textual email data and the applicable character set.
      type: object
      properties:
        Charset:
          $ref: "#/components/schemas/__string"
          description: The applicable character set for the message content.
        Data:
          $ref: "#/components/schemas/__string"
          description: The textual data of the message content.
    GCMMessage:
      description: Specifies the settings for a one-time message that's sent directly to an endpoint through the GCM channel. The GCM channel enables Amazon Pinpoint to send messages to the Firebase Cloud Messaging (FCM), formerly Google Cloud Messaging (GCM), service.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/Action"
          description: "The action to occur if the recipient taps the push notification. Valid values are: OPEN_APP - Your app opens or it becomes the foreground app if it was sent to the background. This is the default action. DEEP_LINK - Your app opens and displays a designated user interface in the app. This action uses the deep-linking features of the Android platform. URL - The default mobile browser on the recipient's device opens and loads the web page at a URL that you specify."
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the notification message.
        CollapseKey:
          $ref: "#/components/schemas/__string"
          description: An arbitrary string that identifies a group of messages that can be collapsed to ensure that only the last message is sent when delivery can resume. This helps avoid sending too many instances of the same messages when the recipient's device comes online again or becomes active. Amazon Pinpoint specifies this value in the Firebase Cloud Messaging (FCM) collapse_key parameter when it sends the notification message to FCM.
        Data:
          type: object
          properties: {}
          description: The JSON data payload to use for the push notification, if the notification is a silent push notification. This payload is added to the data.pinpoint.jsonBody object of the notification.
        IconReference:
          $ref: "#/components/schemas/__string"
          description: The icon image name of the asset saved in your app.
        ImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the large icon image to display in the content view of the push notification.
        ImageUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of an image to display in the push notification.
        PreferredAuthenticationMethod:
          $ref: "#/components/schemas/__string"
          description: The preferred authentication method, with valid values "KEY" or "TOKEN". If a value isn't provided then the DefaultAuthenticationMethod is used.
        Priority:
          $ref: "#/components/schemas/__string"
          description: para>normal – The notification might be delayed. Delivery is optimized for battery usage on the recipient's device. Use this value unless immediate delivery is required. /listitem> high – The notification is sent immediately and might wake a sleeping device. /para> Amazon Pinpoint specifies this value in the FCM priority parameter when it sends the notification message to FCM. The equivalent values for Apple Push Notification service (APNs) are 5, for normal, and 10, for high. If you specify an APNs value for this property, Amazon Pinpoint accepts and converts the value to the corresponding FCM value.
        RawContent:
          $ref: "#/components/schemas/__string"
          description: The raw, JSON-formatted string to use as the payload for the notification message. If specified, this value overrides all other content for the message.
        RestrictedPackageName:
          $ref: "#/components/schemas/__string"
          description: The package name of the application where registration tokens must match in order for the recipient to receive the message.
        SilentPush:
          $ref: "#/components/schemas/__boolean"
          description: Specifies whether the notification is a silent push notification, which is a push notification that doesn't display on a recipient's device. Silent push notifications can be used for cases such as updating an app's configuration or supporting phone home functionality.
        SmallImageIconUrl:
          $ref: "#/components/schemas/__string"
          description: The URL of the small icon image to display in the status bar and the content view of the push notification.
        Sound:
          $ref: "#/components/schemas/__string"
          description: The sound to play when the recipient receives the push notification. You can use the default stream or specify the file name of a sound resource that's bundled in your app. On an Android platform, the sound file must reside in /res/raw/.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the notification message. You can override the default variables with individual address variables.
        TimeToLive:
          $ref: "#/components/schemas/__integer"
          description: The amount of time, in seconds, that FCM should store and attempt to deliver the push notification, if the service is unable to deliver the notification the first time. If you don't specify this value, FCM defaults to the maximum value, which is 2,419,200 seconds (28 days). Amazon Pinpoint specifies this value in the FCM time_to_live parameter when it sends the notification message to FCM.
        Title:
          $ref: "#/components/schemas/__string"
          description: The title to display above the notification message on the recipient's device.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL to open in the recipient's default mobile browser, if a recipient taps the push notification and the value of the Action property is URL.
    SMSMessage:
      description: Specifies the default settings for a one-time SMS message that's sent directly to an endpoint.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The body of the SMS message.
        Keyword:
          $ref: "#/components/schemas/__string"
          description: The SMS program name that you provided to AWS Support when you requested your dedicated number.
        MediaUrl:
          $ref: "#/components/schemas/__string"
          description: This field is reserved for future use.
        MessageType:
          $ref: "#/components/schemas/MessageType"
          description: The SMS message type. Valid values are TRANSACTIONAL (for messages that are critical or time-sensitive, such as a one-time passwords) and PROMOTIONAL (for messsages that aren't critical or time-sensitive, such as marketing messages).
        OriginationNumber:
          $ref: "#/components/schemas/__string"
          description: The number to send the SMS message from. This value should be one of the dedicated long or short codes that's assigned to your AWS account. If you don't specify a long or short code, Amazon Pinpoint assigns a random long code to the SMS message and sends the message from that code.
        SenderId:
          $ref: "#/components/schemas/__string"
          description: The sender ID to display as the sender of the message on a recipient's device. Support for sender IDs varies by country or region.
        Substitutions:
          type: object
          properties: {}
          description: The message variables to use in the SMS message. You can override the default variables with individual address variables.
        EntityId:
          $ref: "#/components/schemas/__string"
          description: The entity ID or Principal Entity (PE) id received from the regulatory body for sending SMS in your country.
        TemplateId:
          $ref: "#/components/schemas/__string"
          description: The template ID received from the regulatory body for sending SMS in your country.
    VoiceMessage:
      description: Specifies the settings for a one-time voice message that's sent directly to an endpoint through the voice channel.
      type: object
      properties:
        Body:
          $ref: "#/components/schemas/__string"
          description: The text of the script to use for the voice message.
        LanguageCode:
          $ref: "#/components/schemas/__string"
          description: The code for the language to use when synthesizing the text of the message script. For a list of supported languages and the code for each one, see the Amazon Polly Developer Guide.
        OriginationNumber:
          $ref: "#/components/schemas/__string"
          description: The long code to send the voice message from. This value should be one of the dedicated long codes that's assigned to your AWS account. Although it isn't required, we recommend that you specify the long code in E.164 format, for example +12065550100, to ensure prompt and accurate delivery of the message.
        Substitutions:
          type: object
          properties: {}
          description: The default message variables to use in the voice message. You can override the default variables with individual address variables.
        VoiceId:
          $ref: "#/components/schemas/__string"
          description: The name of the voice to use when delivering the message. For a list of supported voices, see the Amazon Polly Developer Guide.
    SendMessagesResponse:
