openapi: 3.0.0
info:
  version: "2020-08-18"
  title: Amazon Managed Grafana
  description: Amazon Managed Grafana
  x-serviceName: grafana
  x-serviceAlias: grafana
  x-protocol: rest-json
  x-apiVersion: "2020-08-18"
  x-endpointPrefix: grafana
servers:
  - url: https://grafana.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for grafana
paths:
  /workspaces/{workspace_id}/licenses/{license_type}:
    post:
      operationId: AssociateLicense
      description: Assigns a Grafana Enterprise license to a workspace. To upgrade, you must use ENTERPRISE for the licenseType, and pass in a valid Grafana Labs token for the grafanaToken. Upgrading to Grafana Enterprise incurs additional fees. For more information, see Upgrade a workspace to Grafana Enterprise.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to associate the license with.
        - name: license_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LicenseType"
          description: The type of license to associate with the workspace. Amazon Managed Grafana workspaces no longer support Grafana Enterprise free trials.
        - name: Grafana-Token
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/GrafanaToken"
          description: A token from Grafana Labs that ties your Amazon Web Services account with a Grafana Labs account. For more information, see Link your account with Grafana Labs.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateLicenseResponse"
    delete:
      operationId: DisassociateLicense
      description: Removes the Grafana Enterprise license from a workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to remove the Grafana Enterprise license from.
        - name: license_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LicenseType"
          description: The type of license to remove from the workspace.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateLicenseResponse"
  /workspaces:
    post:
      operationId: CreateWorkspace
      description: Creates a workspace. In a workspace, you can create Grafana dashboards and visualizations to analyze your metrics, logs, and traces. You don't have to build, package, or deploy any hardware to run the Grafana server. Don't use CreateWorkspace to modify an existing workspace. Instead, use UpdateWorkspace.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountAccessType:
                  $ref: "#/components/schemas/AccountAccessType"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                organizationRoleName:
                  $ref: "#/components/schemas/OrganizationRoleName"
                permissionType:
                  $ref: "#/components/schemas/PermissionType"
                stackSetName:
                  $ref: "#/components/schemas/StackSetName"
                workspaceDataSources:
                  $ref: "#/components/schemas/DataSourceTypesList"
                workspaceDescription:
                  $ref: "#/components/schemas/Description"
                workspaceName:
                  $ref: "#/components/schemas/WorkspaceName"
                workspaceNotificationDestinations:
                  $ref: "#/components/schemas/NotificationDestinationsList"
                workspaceOrganizationalUnits:
                  $ref: "#/components/schemas/OrganizationalUnitList"
                workspaceRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                authenticationProviders:
                  $ref: "#/components/schemas/AuthenticationProviders"
                tags:
                  $ref: "#/components/schemas/TagMap"
                vpcConfiguration:
                  $ref: "#/components/schemas/VpcConfiguration"
                configuration:
                  $ref: "#/components/schemas/OverridableConfigurationJson"
                networkAccessControl:
                  $ref: "#/components/schemas/NetworkAccessConfiguration"
                grafanaVersion:
                  $ref: "#/components/schemas/GrafanaVersion"
                ipAddressType:
                  $ref: "#/components/schemas/IPAddressType"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
              required:
                - accountAccessType
                - permissionType
                - authenticationProviders
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceResponse"
    get:
      operationId: ListWorkspaces
      description: Returns a list of Amazon Managed Grafana workspaces in the account, with some information about each workspace. For more complete information about one workspace, use DescribeWorkspace.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListWorkspacesRequestMaxResultsInteger"
          description: The maximum number of workspaces to include in the results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next set of workspaces to return. (You receive this token from a previous ListWorkspaces operation.)
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspacesResponse"
  /workspaces/{workspace_id}/apikeys:
    post:
      operationId: CreateWorkspaceApiKey
      description: Creates a Grafana API key for the workspace. This key can be used to authenticate requests sent to the workspace's HTTP API. See https://docs.aws.amazon.com/grafana/latest/userguide/Using-Grafana-APIs.html for available APIs and example requests. In workspaces compatible with Grafana version 9 or above, use workspace service accounts instead of API keys. API keys will be removed in a future release.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to create an API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keyName:
                  $ref: "#/components/schemas/ApiKeyName"
                keyRole:
                  $ref: "#/components/schemas/String"
                secondsToLive:
                  $ref: "#/components/schemas/CreateWorkspaceApiKeyRequestSecondsToLiveInteger"
              required:
                - keyName
                - keyRole
                - secondsToLive
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceApiKeyResponse"
  /workspaces/{workspace_id}/serviceaccounts:
    post:
      operationId: CreateWorkspaceServiceAccount
      description: Creates a service account for the workspace. A service account can be used to call Grafana HTTP APIs, and run automated workloads. After creating the service account with the correct GrafanaRole for your use case, use CreateWorkspaceServiceAccountToken to create a token that can be used to authenticate and authorize Grafana HTTP API calls. You can only create service accounts for workspaces that are compatible with Grafana version 9 and above. For more information about service accounts, see Service accounts in the Amazon Managed Grafana User Guide. For more information about the Grafana HTTP APIs, see Using Grafana HTTP APIs in the Amazon Managed Grafana User Guide.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace within which to create the service account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ServiceAccountName"
                grafanaRole:
                  $ref: "#/components/schemas/Role"
              required:
                - name
                - grafanaRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceServiceAccountResponse"
    get:
      operationId: ListWorkspaceServiceAccounts
      description: Returns a list of service accounts for a workspace. Service accounts are only available for workspaces that are compatible with Grafana version 9 and above.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListWorkspaceServiceAccountsRequestMaxResultsInteger"
          description: The maximum number of service accounts to include in the results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next set of service accounts to return. (You receive this token from a previous ListWorkspaceServiceAccounts operation.)
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The workspace for which to list service accounts.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspaceServiceAccountsResponse"
  /workspaces/{workspace_id}/serviceaccounts/{service_account_id}/tokens:
    post:
      operationId: CreateWorkspaceServiceAccountToken
      description: Creates a token that can be used to authenticate and authorize Grafana HTTP API operations for the given workspace service account. The service account acts as a user for the API operations, and defines the permissions that are used by the API. When you create the service account token, you will receive a key that is used when calling Grafana APIs. Do not lose this key, as it will not be retrievable again. If you do lose the key, you can delete the token and recreate it to receive a new key. This will disable the initial key. Service accounts are only available for workspaces that are compatible with Grafana version 9 and above.
      parameters:
        - name: service_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the service account for which to create a token.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace the service account resides within.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ServiceAccountTokenName"
                secondsToLive:
                  $ref: "#/components/schemas/CreateWorkspaceServiceAccountTokenRequestSecondsToLiveInteger"
              required:
                - name
                - secondsToLive
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceServiceAccountTokenResponse"
    get:
      operationId: ListWorkspaceServiceAccountTokens
      description: Returns a list of tokens for a workspace service account. This does not return the key for each token. You cannot access keys after they are created. To create a new key, delete the token and recreate it. Service accounts are only available for workspaces that are compatible with Grafana version 9 and above.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListWorkspaceServiceAccountTokensRequestMaxResultsInteger"
          description: The maximum number of tokens to include in the results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next set of service accounts to return. (You receive this token from a previous ListWorkspaceServiceAccountTokens operation.)
        - name: service_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the service account for which to return tokens.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace for which to return tokens.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspaceServiceAccountTokensResponse"
  /workspaces/{workspace_id}:
    delete:
      operationId: DeleteWorkspace
      description: Deletes an Amazon Managed Grafana workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceResponse"
    get:
      operationId: DescribeWorkspace
      description: Displays information about one Amazon Managed Grafana workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to display information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkspaceResponse"
    put:
      operationId: UpdateWorkspace
      description: Modifies an existing Amazon Managed Grafana workspace. If you use this operation and omit any optional parameters, the existing values of those parameters are not changed. To modify the user authentication methods that the workspace uses, such as SAML or IAM Identity Center, use UpdateWorkspaceAuthentication. To modify which users in the workspace have the Admin and Editor Grafana roles, use UpdatePermissions.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountAccessType:
                  $ref: "#/components/schemas/AccountAccessType"
                organizationRoleName:
                  $ref: "#/components/schemas/OrganizationRoleName"
                permissionType:
                  $ref: "#/components/schemas/PermissionType"
                stackSetName:
                  $ref: "#/components/schemas/StackSetName"
                workspaceDataSources:
                  $ref: "#/components/schemas/DataSourceTypesList"
                workspaceDescription:
                  $ref: "#/components/schemas/Description"
                workspaceName:
                  $ref: "#/components/schemas/WorkspaceName"
                workspaceNotificationDestinations:
                  $ref: "#/components/schemas/NotificationDestinationsList"
                workspaceOrganizationalUnits:
                  $ref: "#/components/schemas/OrganizationalUnitList"
                workspaceRoleArn:
                  $ref: "#/components/schemas/IamRoleArn"
                vpcConfiguration:
                  $ref: "#/components/schemas/VpcConfiguration"
                removeVpcConfiguration:
                  $ref: "#/components/schemas/Boolean"
                networkAccessControl:
                  $ref: "#/components/schemas/NetworkAccessConfiguration"
                removeNetworkAccessConfiguration:
                  $ref: "#/components/schemas/Boolean"
                ipAddressType:
                  $ref: "#/components/schemas/IPAddressType"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceResponse"
  /workspaces/{workspace_id}/apikeys/{key_name}:
    delete:
      operationId: DeleteWorkspaceApiKey
      description: Deletes a Grafana API key for the workspace. In workspaces compatible with Grafana version 9 or above, use workspace service accounts instead of API keys. API keys will be removed in a future release.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ApiKeyName"
          description: The name of the API key to delete.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceApiKeyResponse"
  /workspaces/{workspace_id}/serviceaccounts/{service_account_id}:
    delete:
      operationId: DeleteWorkspaceServiceAccount
      description: Deletes a workspace service account from the workspace. This will delete any tokens created for the service account, as well. If the tokens are currently in use, the will fail to authenticate / authorize after they are deleted. Service accounts are only available for workspaces that are compatible with Grafana version 9 and above.
      parameters:
        - name: service_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the service account to delete.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace where the service account resides.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceServiceAccountResponse"
  /workspaces/{workspace_id}/serviceaccounts/{service_account_id}/tokens/{token_id}:
    delete:
      operationId: DeleteWorkspaceServiceAccountToken
      description: Deletes a token for the workspace service account. This will disable the key associated with the token. If any automation is currently using the key, it will no longer be authenticated or authorized to perform actions with the Grafana HTTP APIs. Service accounts are only available for workspaces that are compatible with Grafana version 9 and above.
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the token to delete.
        - name: service_account_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the service account from which to delete the token.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace from which to delete the token.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceServiceAccountTokenResponse"
  /workspaces/{workspace_id}/authentication:
    get:
      operationId: DescribeWorkspaceAuthentication
      description: Displays information about the authentication methods used in one Amazon Managed Grafana workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to return authentication information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkspaceAuthenticationResponse"
    post:
      operationId: UpdateWorkspaceAuthentication
      description: Use this operation to define the identity provider (IdP) that this workspace authenticates users from, using SAML. You can also map SAML assertion attributes to workspace user information and define which groups in the assertion attribute are to have the Admin and Editor roles in the workspace. Changes to the authentication method for a workspace may take a few minutes to take effect.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update the authentication for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authenticationProviders:
                  $ref: "#/components/schemas/AuthenticationProviders"
                samlConfiguration:
                  $ref: "#/components/schemas/SamlConfiguration"
              required:
                - authenticationProviders
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceAuthenticationResponse"
  /workspaces/{workspace_id}/configuration:
    get:
      operationId: DescribeWorkspaceConfiguration
      description: Gets the current configuration string for the given workspace.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to get configuration information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeWorkspaceConfigurationResponse"
    put:
      operationId: UpdateWorkspaceConfiguration
      description: Updates the configuration string for the given workspace
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                configuration:
                  $ref: "#/components/schemas/OverridableConfigurationJson"
                grafanaVersion:
                  $ref: "#/components/schemas/GrafanaVersion"
              required:
                - configuration
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateWorkspaceConfigurationResponse"
  /workspaces/{workspace_id}/permissions:
    get:
      operationId: ListPermissions
      description: Lists the users and groups who have the Grafana Admin and Editor roles in this workspace. If you use this operation without specifying userId or groupId, the operation returns the roles of all users and groups. If you specify a userId or a groupId, only the roles for that user or group are returned. If you do this, you can specify only one userId or one groupId.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListPermissionsRequestMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token to use when requesting the next set of results. You received this token from a previous ListPermissions operation.
        - name: userType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserType"
          description: (Optional) If you specify SSO_USER, then only the permissions of IAM Identity Center users are returned. If you specify SSO_GROUP, only the permissions of IAM Identity Center groups are returned.
        - name: userId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SsoId"
          description: (Optional) Limits the results to only the user that matches this ID.
        - name: groupId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SsoId"
          description: (Optional) Limits the results to only the group that matches this ID.
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to list permissions for. This parameter is required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionsResponse"
    patch:
      operationId: UpdatePermissions
      description: Updates which users in a workspace have the Grafana Admin or Editor roles.
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updateInstructionBatch:
                  $ref: "#/components/schemas/UpdateInstructionBatch"
              required:
                - updateInstructionBatch
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePermissionsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: The ListTagsForResource operation returns the tags that are associated with the Amazon Managed Service for Grafana resource specified by the resourceArn. Currently, the only resource that can be tagged is a workspace.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource the list of tags are associated with.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: The TagResource operation associates tags with an Amazon Managed Grafana resource. Currently, the only resource that can be tagged is workspaces. If you specify a new tag key for the resource, this tag is appended to the list of tags associated with the resource. If you specify a tag key that is already associated with the resource, the new tag value that you specify replaces the previous value for that tag.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource the tag is associated with.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: The UntagResource operation removes the association of the tag with the Amazon Managed Grafana resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the resource the tag association is removed from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: The key values of the tag to be removed from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /versions:
    get:
      operationId: ListVersions
      description: Lists available versions of Grafana. These are available when calling CreateWorkspace. Optionally, include a workspace to list the versions to which it can be upgraded.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListVersionsRequestMaxResultsInteger"
          description: The maximum number of results to include in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token to use when requesting the next set of results. You receive this token from a previous ListVersions operation.
        - name: workspace-id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace to list the available upgrade versions. If not included, lists all versions of Grafana that are supported for CreateWorkspace.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVersionsOutputDisplay"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WorkspaceId:
      type: string
      pattern: g-[0-9a-f]{10}
    LicenseType:
      type: string
      enum:
        - ENTERPRISE
        - ENTERPRISE_FREE_TRIAL
    GrafanaToken:
      type: string
      minLength: 1
      maxLength: 36
    AssociateLicenseResponse:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDescription"
          description: A structure containing data about the workspace.
      required:
        - workspace
    WorkspaceDescription:
      description: A structure containing information about an Amazon Managed Grafana workspace in your account.
      type: object
      properties:
        accountAccessType:
          $ref: "#/components/schemas/AccountAccessType"
          description: Specifies whether the workspace can access Amazon Web Services resources in this Amazon Web Services account only, or whether it can also access Amazon Web Services resources in other accounts in the same organization. If this is ORGANIZATION, the workspaceOrganizationalUnits parameter specifies which organizational units the workspace can access.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the workspace was created.
        dataSources:
          $ref: "#/components/schemas/DataSourceTypesList"
          description: Specifies the Amazon Web Services data sources that have been configured to have IAM roles and permissions created to allow Amazon Managed Grafana to read data from these sources. This list is only used when the workspace was created through the Amazon Web Services console, and the permissionType is SERVICE_MANAGED.
        description:
          $ref: "#/components/schemas/Description"
          description: The user-defined description of the workspace.
        endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The URL that users can use to access the Grafana console in the workspace.
        grafanaVersion:
          $ref: "#/components/schemas/GrafanaVersion"
          description: The version of Grafana supported in this workspace.
        id:
          $ref: "#/components/schemas/WorkspaceId"
          description: The unique ID of this workspace.
        modified:
          $ref: "#/components/schemas/Timestamp"
          description: The most recent date that the workspace was modified.
        name:
          $ref: "#/components/schemas/WorkspaceName"
          description: The name of the workspace.
        organizationRoleName:
          $ref: "#/components/schemas/OrganizationRoleName"
          description: The name of the IAM role that is used to access resources through Organizations.
        notificationDestinations:
          $ref: "#/components/schemas/NotificationDestinationsList"
          description: The Amazon Web Services notification channels that Amazon Managed Grafana can automatically create IAM roles and permissions for, to allow Amazon Managed Grafana to use these channels.
        organizationalUnits:
          $ref: "#/components/schemas/OrganizationalUnitList"
          description: Specifies the organizational units that this workspace is allowed to use data sources from, if this workspace is in an account that is part of an organization.
        permissionType:
          $ref: "#/components/schemas/PermissionType"
          description: If this is SERVICE_MANAGED, and the workplace was created through the Amazon Managed Grafana console, then Amazon Managed Grafana automatically creates the IAM roles and provisions the permissions that the workspace needs to use Amazon Web Services data sources and notification channels. If this is CUSTOMER_MANAGED, you must manage those roles and permissions yourself. If you are working with a workspace in a member account of an organization and that account is not a delegated administrator account, and you want the workspace to access data sources in other Amazon Web Services accounts in the organization, this parameter must be set to CUSTOMER_MANAGED. For more information about converting between customer and service managed, see Managing permissions for data sources and notification channels. For more information about the roles and permissions that must be managed for customer managed workspaces, see Amazon Managed Grafana permissions and policies for Amazon Web Services data sources and notification channels
        stackSetName:
          $ref: "#/components/schemas/StackSetName"
          description: The name of the CloudFormation stack set that is used to generate IAM roles to be used for this workspace.
        status:
          $ref: "#/components/schemas/WorkspaceStatus"
          description: The current status of the workspace.
        workspaceRoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The IAM role that grants permissions to the Amazon Web Services resources that the workspace will view data from. This role must already exist.
        licenseType:
          $ref: "#/components/schemas/LicenseType"
          description: Specifies whether this workspace has a full Grafana Enterprise license. Amazon Managed Grafana workspaces no longer support Grafana Enterprise free trials.
        freeTrialConsumed:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether this workspace has already fully used its free trial for Grafana Enterprise. Amazon Managed Grafana workspaces no longer support Grafana Enterprise free trials.
        licenseExpiration:
          $ref: "#/components/schemas/Timestamp"
          description: If this workspace has a full Grafana Enterprise license purchased through Amazon Web Services Marketplace, this specifies when the license ends and will need to be renewed. Purchasing the Enterprise plugins option through Amazon Managed Grafana does not have an expiration. It is valid until the license is removed.
        freeTrialExpiration:
          $ref: "#/components/schemas/Timestamp"
          description: If this workspace is currently in the free trial period for Grafana Enterprise, this value specifies when that free trial ends. Amazon Managed Grafana workspaces no longer support Grafana Enterprise free trials.
        authentication:
          $ref: "#/components/schemas/AuthenticationSummary"
          description: A structure that describes whether the workspace uses SAML, IAM Identity Center, or both methods for user authentication.
        tags:
          type: object
          properties: {}
          description: The list of tags associated with the workspace.
        vpcConfiguration:
          $ref: "#/components/schemas/VpcConfiguration"
          description: The configuration for connecting to data sources in a private VPC (Amazon Virtual Private Cloud).
        networkAccessControl:
          $ref: "#/components/schemas/NetworkAccessConfiguration"
          description: The configuration settings for network access to your workspace.
        grafanaToken:
          $ref: "#/components/schemas/GrafanaToken"
          description: The token that ties this workspace to a Grafana Labs account. For more information, see Link your account with Grafana Labs.
        ipAddressType:
          $ref: "#/components/schemas/IPAddressType"
          description: The type of IP addresses supported for connection to the workspace. Valid values are IPv4 and DualStack.
        kmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The ID or ARN of the Key Management Service key used for encrypting workspace data.
      required:
        - created
        - dataSources
        - endpoint
        - grafanaVersion
        - id
        - modified
        - status
        - authentication
    AccountAccessType:
      type: string
      enum:
        - CURRENT_ACCOUNT
        - ORGANIZATION
    Timestamp:
      type: string
      format: date-time
    DataSourceTypesList:
      type: array
      items:
        $ref: "#/components/schemas/DataSourceType"
    DataSourceType:
      type: string
      enum:
        - AMAZON_OPENSEARCH_SERVICE
        - CLOUDWATCH
        - PROMETHEUS
        - XRAY
        - TIMESTREAM
        - SITEWISE
        - ATHENA
        - REDSHIFT
        - TWINMAKER
    Description:
      type: string
      minLength: 0
      maxLength: 2048
    Endpoint:
      type: string
      minLength: 1
      maxLength: 2048
    GrafanaVersion:
      type: string
      minLength: 1
      maxLength: 255
    WorkspaceName:
      type: string
      pattern: "[a-zA-Z0-9-._~]{1,255}"
    OrganizationRoleName:
      type: string
      minLength: 1
      maxLength: 2048
    NotificationDestinationsList:
      type: array
      items:
        $ref: "#/components/schemas/NotificationDestinationType"
    NotificationDestinationType:
      type: string
      enum:
        - SNS
    OrganizationalUnitList:
      type: array
      items:
        $ref: "#/components/schemas/OrganizationalUnit"
    OrganizationalUnit:
      type: string
    PermissionType:
      type: string
      enum:
        - CUSTOMER_MANAGED
        - SERVICE_MANAGED
    StackSetName:
      type: string
    WorkspaceStatus:
      type: string
      enum:
        - ACTIVE
        - CREATING
        - DELETING
        - FAILED
        - UPDATING
        - UPGRADING
        - DELETION_FAILED
        - CREATION_FAILED
        - UPDATE_FAILED
        - UPGRADE_FAILED
        - LICENSE_REMOVAL_FAILED
        - VERSION_UPDATING
        - VERSION_UPDATE_FAILED
    IamRoleArn:
      type: string
      minLength: 1
      maxLength: 2048
    Boolean:
      type: boolean
    AuthenticationSummary:
      description: A structure that describes whether the workspace uses SAML, IAM Identity Center, or both methods for user authentication, and whether that authentication is fully configured.
      type: object
      properties:
        providers:
          $ref: "#/components/schemas/AuthenticationProviders"
          description: Specifies whether the workspace uses SAML, IAM Identity Center, or both methods for user authentication.
        samlConfigurationStatus:
          $ref: "#/components/schemas/SamlConfigurationStatus"
          description: Specifies whether the workplace's user authentication method is fully configured.
      required:
        - providers
    AuthenticationProviders:
      type: array
      items:
        $ref: "#/components/schemas/AuthenticationProviderTypes"
    AuthenticationProviderTypes:
      type: string
      enum:
        - AWS_SSO
        - SAML
    SamlConfigurationStatus:
      type: string
      enum:
        - CONFIGURED
        - NOT_CONFIGURED
    VpcConfiguration:
      description: The configuration settings for an Amazon VPC that contains data sources for your Grafana workspace to connect to. Provided securityGroupIds and subnetIds must be part of the same VPC. Connecting to a private VPC is not yet available in the Asia Pacific (Seoul) Region (ap-northeast-2).
      type: object
      properties:
        securityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The list of Amazon EC2 security group IDs attached to the Amazon VPC for your Grafana workspace to connect. Duplicates not allowed.
        subnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The list of Amazon EC2 subnet IDs created in the Amazon VPC for your Grafana workspace to connect. Duplicates not allowed.
      required:
        - securityGroupIds
        - subnetIds
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 0
      maxLength: 255
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
      minLength: 0
      maxLength: 255
    NetworkAccessConfiguration:
      description: The configuration settings for in-bound network access to your workspace. When this is configured, only listed IP addresses and VPC endpoints will be able to access your workspace. Standard Grafana authentication and authorization are still required. Access is granted to a caller that is in either the IP address list or the VPC endpoint list - they do not need to be in both. If this is not configured, or is removed, then all IP addresses and VPC endpoints are allowed. Standard Grafana authentication and authorization are still required. While both prefixListIds and vpceIds are required, you can pass in an empty array of strings for either parameter if you do not want to allow any of that type. If both are passed as empty arrays, no traffic is allowed to the workspace, because only explicitly allowed connections are accepted.
      type: object
      properties:
        prefixListIds:
          $ref: "#/components/schemas/PrefixListIds"
          description: An array of prefix list IDs. A prefix list is a list of CIDR ranges of IP addresses. The IP addresses specified are allowed to access your workspace. If the list is not included in the configuration (passed an empty array) then no IP addresses are allowed to access the workspace. You create a prefix list using the Amazon VPC console. Prefix list IDs have the format pl-1a2b3c4d . For more information about prefix lists, see Group CIDR blocks using managed prefix listsin the Amazon Virtual Private Cloud User Guide.
        vpceIds:
          $ref: "#/components/schemas/VpceIds"
          description: An array of Amazon VPC endpoint IDs for the workspace. You can create VPC endpoints to your Amazon Managed Grafana workspace for access from within a VPC. If a NetworkAccessConfiguration is specified then only VPC endpoints specified here are allowed to access the workspace. If you pass in an empty array of strings, then no VPCs are allowed to access the workspace. VPC endpoint IDs have the format vpce-1a2b3c4d . For more information about creating an interface VPC endpoint, see Interface VPC endpoints in the Amazon Managed Grafana User Guide. The only VPC endpoints that can be specified here are interface VPC endpoints for Grafana workspaces (using the com.amazonaws.[region].grafana-workspace service endpoint). Other VPC endpoints are ignored.
      required:
        - prefixListIds
        - vpceIds
    PrefixListIds:
      type: array
      items:
        $ref: "#/components/schemas/PrefixListId"
    PrefixListId:
      type: string
      minLength: 1
      maxLength: 100
    VpceIds:
      type: array
      items:
        $ref: "#/components/schemas/VpceId"
    VpceId:
      type: string
      minLength: 1
      maxLength: 100
    IPAddressType:
      type: string
      enum:
        - IPv4
        - DualStack
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[a-zA-Z0-9:/_-]+"
    ClientToken:
      type: string
      pattern: "[!-~]{1,64}"
    TagMap:
      type: object
      properties: {}
    OverridableConfigurationJson:
      type: string
      minLength: 2
      maxLength: 65536
    CreateWorkspaceResponse:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDescription"
          description: A structure containing data about the workspace that was created.
      required:
        - workspace
    ApiKeyName:
      type: string
      minLength: 1
      maxLength: 100
    String:
      type: string
    CreateWorkspaceApiKeyRequestSecondsToLiveInteger:
      type: integer
      minimum: 1
      maximum: 2592000
    CreateWorkspaceApiKeyResponse:
      type: object
      properties:
        keyName:
          $ref: "#/components/schemas/ApiKeyName"
          description: The name of the key that was created.
        key:
          $ref: "#/components/schemas/ApiKeyToken"
          description: The key token. Use this value as a bearer token to authenticate HTTP requests to the workspace.
        workspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace that the key is valid for.
      required:
        - keyName
        - key
        - workspaceId
    ApiKeyToken:
      type: string
    ServiceAccountName:
      type: string
      minLength: 1
      maxLength: 128
    Role:
      type: string
      enum:
        - ADMIN
        - EDITOR
        - VIEWER
    CreateWorkspaceServiceAccountResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID of the service account.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the service account.
        grafanaRole:
          $ref: "#/components/schemas/Role"
          description: The permission level given to the service account.
        workspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The workspace with which the service account is associated.
      required:
        - id
        - name
        - grafanaRole
        - workspaceId
    ServiceAccountTokenName:
      type: string
      minLength: 1
      maxLength: 128
    CreateWorkspaceServiceAccountTokenRequestSecondsToLiveInteger:
      type: integer
      minimum: 1
      maximum: 2592000
    CreateWorkspaceServiceAccountTokenResponse:
      type: object
      properties:
        serviceAccountToken:
          $ref: "#/components/schemas/ServiceAccountTokenSummaryWithKey"
          description: Information about the created token, including the key. Be sure to store the key securely.
        serviceAccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the service account where the token was created.
        workspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace where the token was created.
      required:
        - serviceAccountToken
        - serviceAccountId
        - workspaceId
    ServiceAccountTokenSummaryWithKey:
      description: A structure that contains the information about a service account token. This structure is returned when creating the token. It is important to store the key that is returned, as it is not retrievable at a later time. If you lose the key, you can delete and recreate the token, which will create a new key.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The unique ID of the service account token.
        name:
          $ref: "#/components/schemas/String"
          description: The name of the service account token.
        key:
          $ref: "#/components/schemas/ServiceAccountTokenKey"
          description: The key for the service account token. Used when making calls to the Grafana HTTP APIs to authenticate and authorize the requests.
      required:
        - id
        - name
        - key
    ServiceAccountTokenKey:
      type: string
    DeleteWorkspaceResponse:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDescription"
          description: A structure containing information about the workspace that was deleted.
      required:
        - workspace
    DeleteWorkspaceApiKeyResponse:
      type: object
      properties:
        keyName:
          $ref: "#/components/schemas/ApiKeyName"
          description: The name of the key that was deleted.
        workspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace where the key was deleted.
      required:
        - keyName
        - workspaceId
    DeleteWorkspaceServiceAccountResponse:
      type: object
      properties:
        serviceAccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the service account deleted.
        workspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace where the service account was deleted.
      required:
        - serviceAccountId
        - workspaceId
    DeleteWorkspaceServiceAccountTokenResponse:
      type: object
      properties:
        tokenId:
          $ref: "#/components/schemas/String"
          description: The ID of the token that was deleted.
        serviceAccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the service account where the token was deleted.
        workspaceId:
          $ref: "#/components/schemas/WorkspaceId"
          description: The ID of the workspace where the token was deleted.
      required:
        - tokenId
        - serviceAccountId
        - workspaceId
    DescribeWorkspaceResponse:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDescription"
          description: A structure containing information about the workspace.
      required:
        - workspace
    DescribeWorkspaceAuthenticationResponse:
      type: object
      properties:
        authentication:
          $ref: "#/components/schemas/AuthenticationDescription"
          description: A structure containing information about the authentication methods used in the workspace.
      required:
        - authentication
    AuthenticationDescription:
      description: A structure containing information about the user authentication methods used by the workspace.
      type: object
      properties:
        providers:
          $ref: "#/components/schemas/AuthenticationProviders"
          description: Specifies whether this workspace uses IAM Identity Center, SAML, or both methods to authenticate users to use the Grafana console in the Amazon Managed Grafana workspace.
        saml:
          $ref: "#/components/schemas/SamlAuthentication"
          description: A structure containing information about how this workspace works with SAML, including what attributes within the assertion are to be mapped to user information in the workspace.
        awsSso:
          $ref: "#/components/schemas/AwsSsoAuthentication"
          description: A structure containing information about how this workspace works with IAM Identity Center.
      required:
        - providers
    SamlAuthentication:
      description: A structure containing information about how this workspace works with SAML.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/SamlConfigurationStatus"
          description: Specifies whether the workspace's SAML configuration is complete.
        configuration:
          $ref: "#/components/schemas/SamlConfiguration"
          description: A structure containing details about how this workspace works with SAML.
      required:
        - status
    SamlConfiguration:
      description: A structure containing information about how this workspace works with SAML.
      type: object
      properties:
        idpMetadata:
          $ref: "#/components/schemas/IdpMetadata"
          description: A structure containing the identity provider (IdP) metadata used to integrate the identity provider with this workspace.
        assertionAttributes:
          $ref: "#/components/schemas/AssertionAttributes"
          description: A structure that defines which attributes in the SAML assertion are to be used to define information about the users authenticated by that IdP to use the workspace.
        roleValues:
          $ref: "#/components/schemas/RoleValues"
          description: A structure containing arrays that map group names in the SAML assertion to the Grafana Admin and Editor roles in the workspace.
        allowedOrganizations:
          $ref: "#/components/schemas/AllowedOrganizations"
          description: Lists which organizations defined in the SAML assertion are allowed to use the Amazon Managed Grafana workspace. If this is empty, all organizations in the assertion attribute have access.
        loginValidityDuration:
          $ref: "#/components/schemas/LoginValidityDuration"
          description: How long a sign-on session by a SAML user is valid, before the user has to sign on again.
      required:
        - idpMetadata
    IdpMetadata:
      description: A structure containing the identity provider (IdP) metadata used to integrate the identity provider with this workspace. You can specify the metadata either by providing a URL to its location in the url parameter, or by specifying the full metadata in XML format in the xml parameter. Specifying both will cause an error.
      type: object
      properties:
        url:
          $ref: "#/components/schemas/IdpMetadataUrl"
          description: The URL of the location containing the IdP metadata.
        xml_:
          $ref: "#/components/schemas/String"
          description: The full IdP metadata, in XML format.
    IdpMetadataUrl:
      type: string
      minLength: 1
      maxLength: 2048
    AssertionAttributes:
      description: A structure that defines which attributes in the IdP assertion are to be used to define information about the users authenticated by the IdP to use the workspace.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AssertionAttribute"
          description: The name of the attribute within the SAML assertion to use as the user full "friendly" names for SAML users.
        login:
          $ref: "#/components/schemas/AssertionAttribute"
          description: The name of the attribute within the SAML assertion to use as the login names for SAML users.
        email:
          $ref: "#/components/schemas/AssertionAttribute"
          description: The name of the attribute within the SAML assertion to use as the email names for SAML users.
        groups:
          $ref: "#/components/schemas/AssertionAttribute"
          description: The name of the attribute within the SAML assertion to use as the user full "friendly" names for user groups.
        role:
          $ref: "#/components/schemas/AssertionAttribute"
          description: The name of the attribute within the SAML assertion to use as the user roles.
        org:
          $ref: "#/components/schemas/AssertionAttribute"
          description: The name of the attribute within the SAML assertion to use as the user full "friendly" names for the users' organizations.
    AssertionAttribute:
      type: string
      minLength: 1
      maxLength: 256
    RoleValues:
      description: This structure defines which groups defined in the SAML assertion attribute are to be mapped to the Grafana Admin and Editor roles in the workspace. SAML authenticated users not part of Admin or Editor role groups have Viewer permission over the workspace.
      type: object
      properties:
        editor:
          $ref: "#/components/schemas/RoleValueList"
          description: A list of groups from the SAML assertion attribute to grant the Grafana Editor role to.
        admin:
          $ref: "#/components/schemas/RoleValueList"
          description: A list of groups from the SAML assertion attribute to grant the Grafana Admin role to.
    RoleValueList:
      type: array
      items:
        $ref: "#/components/schemas/RoleValue"
    RoleValue:
      type: string
      minLength: 1
      maxLength: 256
    AllowedOrganizations:
      type: array
      items:
        $ref: "#/components/schemas/AllowedOrganization"
    AllowedOrganization:
      type: string
      minLength: 1
      maxLength: 256
    LoginValidityDuration:
      type: integer
    AwsSsoAuthentication:
      description: A structure containing information about how this workspace works with IAM Identity Center.
      type: object
      properties:
        ssoClientId:
          $ref: "#/components/schemas/SSOClientId"
          description: The ID of the IAM Identity Center-managed application that is created by Amazon Managed Grafana.
    SSOClientId:
      type: string
    DescribeWorkspaceConfigurationResponse:
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/OverridableConfigurationJson"
          description: The configuration string for the workspace that you requested. For more information about the format and configuration options available, see Working in your Grafana workspace.
        grafanaVersion:
          $ref: "#/components/schemas/GrafanaVersion"
          description: The supported Grafana version for the workspace.
      required:
        - configuration
    DisassociateLicenseResponse:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/WorkspaceDescription"
          description: A structure containing information about the workspace.
      required:
        - workspace
    ListPermissionsRequestMaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    PaginationToken:
      type: string
    UserType:
      type: string
      enum:
        - SSO_USER
        - SSO_GROUP
    SsoId:
      type: string
      minLength: 1
      maxLength: 47
    ListPermissionsResponse:
      type: object
      properties:
        nextToken:
          $ref: "#/components/schemas/PaginationToken"
          description: The token to use in a subsequent ListPermissions operation to return the next set of results.
        permissions:
          $ref: "#/components/schemas/PermissionEntryList"
          description: The permissions returned by the operation.
      required:
        - permissions
    PermissionEntryList:
      type: array
      items:
        $ref: "#/components/schemas/PermissionEntry"
    PermissionEntry:
      description: A structure containing the identity of one user or group and the Admin, Editor, or Viewer role that they have.
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
          description: A structure with the ID of the user or group with this role.
        role:
          $ref: "#/components/schemas/Role"
          description: Specifies whether the user or group has the Admin, Editor, or Viewer role.
      required:
        - user
        - role
    User:
      description: A structure that specifies one user or group in the workspace.
      type: object
      properties:
