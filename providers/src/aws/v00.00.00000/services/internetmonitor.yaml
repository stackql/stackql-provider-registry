    ImpactedLocation:
      description: Information about a location impacted by a health event in Amazon CloudWatch Internet Monitor. Geographic regions are hierarchically categorized into country, subdivision, metro and city geographic granularities. The geographic region is identified based on the IP address used at the client locations.
      type: object
      properties:
        ASName:
          $ref: "#/components/schemas/String"
          description: The name of the internet service provider (ISP) or network (ASN).
        ASNumber:
          $ref: "#/components/schemas/Long"
          description: The Autonomous System Number (ASN) of the network at an impacted location.
        Country:
          $ref: "#/components/schemas/String"
          description: The name of the country where the health event is located.
        Subdivision:
          $ref: "#/components/schemas/String"
          description: The subdivision location where the health event is located. The subdivision usually maps to states in most countries (including the United States). For United Kingdom, it maps to a country (England, Scotland, Wales) or province (Northern Ireland).
        Metro:
          $ref: "#/components/schemas/String"
          description: The metro area where the health event is located. Metro indicates a metropolitan region in the United States, such as the region around New York City. In non-US countries, this is a second-level subdivision. For example, in the United Kingdom, it could be a county, a London borough, a unitary authority, council area, and so on.
        City:
          $ref: "#/components/schemas/String"
          description: The name of the city where the health event is located.
        Latitude:
          $ref: "#/components/schemas/Double"
          description: The latitude where the health event is located.
        Longitude:
          $ref: "#/components/schemas/Double"
          description: The longitude where the health event is located.
        CountryCode:
          $ref: "#/components/schemas/String"
          description: The country code where the health event is located. The ISO 3166-2 codes for the country is provided, when available.
        SubdivisionCode:
          $ref: "#/components/schemas/String"
          description: The subdivision code where the health event is located. The ISO 3166-2 codes for country subdivisions is provided, when available.
        ServiceLocation:
          $ref: "#/components/schemas/String"
          description: The service location where the health event is located.
        Status:
          $ref: "#/components/schemas/HealthEventStatus"
          description: The status of the health event at an impacted location.
        CausedBy:
