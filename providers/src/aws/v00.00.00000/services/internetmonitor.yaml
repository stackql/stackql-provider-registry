          description: The type of impairment of a specific health event.
        HealthScoreThreshold:
          $ref: "#/components/schemas/Percentage"
          description: The threshold percentage for a health score that determines, along with other configuration information, when Internet Monitor creates a health event when there's an internet issue that affects your application end users.
