openapi: 3.0.0
info:
  version: "2021-06-03"
  title: Amazon CloudWatch Internet Monitor
  description: Amazon CloudWatch Internet Monitor
  x-serviceName: internetmonitor
  x-serviceAlias: internetmonitor
  x-protocol: rest-json
  x-apiVersion: "2021-06-03"
  x-endpointPrefix: internetmonitor
servers:
  - url: https://internetmonitor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for internetmonitor
paths:
  /v20210603/Monitors:
    post:
      operationId: CreateMonitor
      description: "Creates a monitor in Amazon CloudWatch Internet Monitor. A monitor is built based on information from the application resources that you add: VPCs, Network Load Balancers (NLBs), Amazon CloudFront distributions, and Amazon WorkSpaces directories. Internet Monitor then publishes internet measurements from Amazon Web Services that are specific to the city-networks. That is, the locations and ASNs (typically internet service providers or ISPs), where clients access your application. For more information, see Using Amazon CloudWatch Internet Monitor in the Amazon CloudWatch User Guide. When you create a monitor, you choose the percentage of traffic that you want to monitor. You can also set a maximum limit for the number of city-networks where client traffic is monitored, that caps the total traffic that Internet Monitor monitors. A city-network maximum is the limit of city-networks, but you only pay for the number of city-networks that are actually monitored. You can update your monitor at any time to change the percentage of traffic to monitor or the city-networks maximum. For more information, see Choosing a city-network maximum value in the Amazon CloudWatch User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MonitorName:
                  $ref: "#/components/schemas/ResourceName"
                Resources:
                  $ref: "#/components/schemas/SetOfARNs"
                ClientToken:
                  $ref: "#/components/schemas/String"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                MaxCityNetworksToMonitor:
                  $ref: "#/components/schemas/MaxCityNetworksToMonitor"
                InternetMeasurementsLogDelivery:
                  $ref: "#/components/schemas/InternetMeasurementsLogDelivery"
                TrafficPercentageToMonitor:
                  $ref: "#/components/schemas/TrafficPercentageToMonitor"
                HealthEventsConfig:
                  $ref: "#/components/schemas/HealthEventsConfig"
              required:
                - MonitorName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMonitorOutput"
    get:
      operationId: ListMonitors
      description: Lists all of your monitors for Amazon CloudWatch Internet Monitor and their statuses, along with the Amazon Resource Name (ARN) and name of each monitor.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of monitor objects that you want to return with this call.
        - name: MonitorStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The status of a monitor. This includes the status of the data processing for the monitor and the status of the monitor itself. For information about the statuses for a monitor, see Monitor.
        - name: IncludeLinkedAccounts
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A boolean option that you can set to TRUE to include monitors for linked accounts in a list of monitors, when you've set up cross-account sharing in Amazon CloudWatch Internet Monitor. You configure cross-account sharing by using Amazon CloudWatch Observability Access Manager. For more information, see Internet Monitor cross-account observability in the Amazon CloudWatch Internet Monitor User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMonitorsOutput"
  /v20210603/Monitors/{monitor_name}:
    delete:
      operationId: DeleteMonitor
      description: Deletes a monitor in Amazon CloudWatch Internet Monitor.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMonitorOutput"
    get:
      operationId: GetMonitor
      description: Gets information about a monitor in Amazon CloudWatch Internet Monitor based on a monitor name. The information returned includes the Amazon Resource Name (ARN), create time, modified time, resources included in the monitor, and status information.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: LinkedAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID for an account that you've set up cross-account sharing for in Amazon CloudWatch Internet Monitor. You configure cross-account sharing by using Amazon CloudWatch Observability Access Manager. For more information, see Internet Monitor cross-account observability in the Amazon CloudWatch Internet Monitor User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMonitorOutput"
    patch:
      operationId: UpdateMonitor
      description: Updates a monitor. You can update a monitor to change the percentage of traffic to monitor or the maximum number of city-networks (locations and ASNs), to add or remove resources, or to change the status of the monitor. Note that you can't change the name of a monitor. The city-network maximum that you choose is the limit, but you only pay for the number of city-networks that are actually monitored. For more information, see Choosing a city-network maximum value in the Amazon CloudWatch User Guide.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourcesToAdd:
                  $ref: "#/components/schemas/SetOfARNs"
                ResourcesToRemove:
                  $ref: "#/components/schemas/SetOfARNs"
                Status:
                  $ref: "#/components/schemas/MonitorConfigState"
                ClientToken:
                  $ref: "#/components/schemas/String"
                MaxCityNetworksToMonitor:
                  $ref: "#/components/schemas/MaxCityNetworksToMonitor"
                InternetMeasurementsLogDelivery:
                  $ref: "#/components/schemas/InternetMeasurementsLogDelivery"
                TrafficPercentageToMonitor:
                  $ref: "#/components/schemas/TrafficPercentageToMonitor"
                HealthEventsConfig:
                  $ref: "#/components/schemas/HealthEventsConfig"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMonitorOutput"
  /v20210603/Monitors/{monitor_name}/HealthEvents/{event_id}:
    get:
      operationId: GetHealthEvent
      description: Gets information that Amazon CloudWatch Internet Monitor has created and stored about a health event for a specified monitor. This information includes the impacted locations, and all the information related to the event, by location. The information returned includes the impact on performance, availability, and round-trip time, information about the network providers (ASNs), the event type, and so on. Information rolled up at the global traffic level is also returned, including the impact type and total traffic impact.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: event_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HealthEventName"
          description: The internally-generated identifier of a health event. Because EventID contains the forward slash (“/”) character, you must URL-encode the EventID field in the request URL.
        - name: LinkedAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID for an account that you've set up cross-account sharing for in Amazon CloudWatch Internet Monitor. You configure cross-account sharing by using Amazon CloudWatch Observability Access Manager. For more information, see Internet Monitor cross-account observability in the Amazon CloudWatch Internet Monitor User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthEventOutput"
  /v20210603/InternetEvents/{event_id}:
    get:
      operationId: GetInternetEvent
      description: Gets information that Amazon CloudWatch Internet Monitor has generated about an internet event. Internet Monitor displays information about recent global health events, called internet events, on a global outages map that is available to all Amazon Web Services customers. The information returned here includes the impacted location, when the event started and (if the event is over) ended, the type of event (PERFORMANCE or AVAILABILITY), and the status (ACTIVE or RESOLVED).
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/InternetEventId"
          description: The EventId of the internet event to return information for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetInternetEventOutput"
  /v20210603/Monitors/{monitor_name}/Queries/{query_id}/Results:
    get:
      operationId: GetQueryResults
      description: Return the data for a query with the Amazon CloudWatch Internet Monitor query interface. Specify the query that you want to return results for by providing a QueryId and a monitor name. For more information about using the query interface, including examples, see Using the Amazon CloudWatch Internet Monitor query interface in the Amazon CloudWatch Internet Monitor User Guide.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to return data for.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the query that you want to return data results for. A QueryId is an internally-generated identifier for a specific query.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueryMaxResults"
          description: The number of query results that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryResultsOutput"
  /v20210603/Monitors/{monitor_name}/Queries/{query_id}/Status:
    get:
      operationId: GetQueryStatus
      description: "Returns the current status of a query for the Amazon CloudWatch Internet Monitor query interface, for a specified query ID and monitor. When you run a query, check the status to make sure that the query has SUCCEEDED before you review the results. QUEUED: The query is scheduled to run. RUNNING: The query is in progress but not complete. SUCCEEDED: The query completed sucessfully. FAILED: The query failed due to an error. CANCELED: The query was canceled."
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the query that you want to return the status for. A QueryId is an internally-generated dentifier for a specific query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryStatusOutput"
  /v20210603/Monitors/{monitor_name}/HealthEvents:
    get:
      operationId: ListHealthEvents
      description: Lists all health events for a monitor in Amazon CloudWatch Internet Monitor. Returns information for health events including the event start and end times, and the status. Health events that have start times during the time frame that is requested are not included in the list of health events.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: StartTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time when a health event started.
        - name: EndTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time when a health event ended. If the health event is still ongoing, then the end time is not set.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of health event objects that you want to return with this call.
        - name: EventStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/HealthEventStatus"
          description: The status of a health event.
        - name: LinkedAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The account ID for an account that you've set up cross-account sharing for in Amazon CloudWatch Internet Monitor. You configure cross-account sharing by using Amazon CloudWatch Observability Access Manager. For more information, see Internet Monitor cross-account observability in the Amazon CloudWatch Internet Monitor User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHealthEventsOutput"
  /v20210603/InternetEvents:
    get:
      operationId: ListInternetEvents
      description: Lists internet events that cause performance or availability issues for client locations. Amazon CloudWatch Internet Monitor displays information about recent global health events, called internet events, on a global outages map that is available to all Amazon Web Services customers. You can constrain the list of internet events returned by providing a start time and end time to define a total time frame for events you want to list. Both start time and end time specify the time when an event started. End time is optional. If you don't include it, the default end time is the current time. You can also limit the events returned to a specific status (ACTIVE or RESOLVED) or type (PERFORMANCE or AVAILABILITY).
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: InternetEventMaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InternetEventMaxResults"
          description: The number of query results that you want to return with this call.
        - name: StartTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The start time of the time window that you want to get a list of internet events for.
        - name: EndTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The end time of the time window that you want to get a list of internet events for.
        - name: EventStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The status of an internet event.
        - name: EventType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The type of network impairment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInternetEventsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for a resource. Tags are supported only for monitors in Amazon CloudWatch Internet Monitor.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MonitorArn"
          description: The Amazon Resource Name (ARN) for a resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds a tag to a resource. Tags are supported only for monitors in Amazon CloudWatch Internet Monitor. You can add a maximum of 50 tags in Internet Monitor. A minimum of one tag is required for this call. It returns an error if you use the TagResource request with 0 tags.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MonitorArn"
          description: The Amazon Resource Name (ARN) for a tag that you add to a resource. Tags are supported only for monitors in Amazon CloudWatch Internet Monitor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MonitorArn"
          description: The Amazon Resource Name (ARN) for a tag you remove a resource from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: Tag keys that you remove from a resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /v20210603/Monitors/{monitor_name}/Queries:
    post:
      operationId: StartQuery
      description: Start a query to return data for a specific query type for the Amazon CloudWatch Internet Monitor query interface. Specify a time period for the data that you want returned by using StartTime and EndTime. You filter the query results to return by providing parameters that you specify with FilterParameters. For more information about using the query interface, including examples, see Using the Amazon CloudWatch Internet Monitor query interface in the Amazon CloudWatch Internet Monitor User Guide.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StartTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                EndTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                QueryType:
                  $ref: "#/components/schemas/QueryType"
                FilterParameters:
                  $ref: "#/components/schemas/FilterParameters"
                LinkedAccountId:
                  $ref: "#/components/schemas/AccountId"
              required:
                - StartTime
                - EndTime
                - QueryType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQueryOutput"
  /v20210603/Monitors/{monitor_name}/Queries/{query_id}:
    delete:
      operationId: StopQuery
      description: Stop a query that is progress for a specific monitor.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the query that you want to stop. A QueryId is an internally-generated identifier for a specific query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopQueryOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    SetOfARNs:
      type: array
      items:
        $ref: "#/components/schemas/Arn"
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:.*
    String:
      type: string
    TagMap:
      type: object
      properties: {}
    MaxCityNetworksToMonitor:
      type: integer
      minimum: 1
      maximum: 500000
    InternetMeasurementsLogDelivery:
      description: Publish internet measurements to an Amazon S3 bucket in addition to CloudWatch Logs.
      type: object
      properties:
        S3Config:
          $ref: "#/components/schemas/S3Config"
          description: The configuration information for publishing Internet Monitor internet measurements to Amazon S3. The configuration includes the bucket name and (optionally) prefix for the S3 bucket to store the measurements, and the delivery status. The delivery status is ENABLED or DISABLED, depending on whether you choose to deliver internet measurements to S3 logs.
    S3Config:
      description: The configuration for publishing Amazon CloudWatch Internet Monitor internet measurements to Amazon S3. The configuration includes the bucket name and (optionally) prefix for the S3 bucket to store the measurements, and the delivery status. The delivery status is ENABLED or DISABLED, depending on whether you choose to deliver internet measurements to S3 logs.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/S3ConfigBucketNameString"
          description: The Amazon S3 bucket name.
        BucketPrefix:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 bucket prefix.
        LogDeliveryStatus:
          $ref: "#/components/schemas/LogDeliveryStatus"
          description: The status of publishing Internet Monitor internet measurements to an Amazon S3 bucket.
    S3ConfigBucketNameString:
      type: string
      minLength: 3
    LogDeliveryStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    TrafficPercentageToMonitor:
      type: integer
      minimum: 1
      maximum: 100
    HealthEventsConfig:
      description: A complex type with the configuration information that determines the threshold and other conditions for when Internet Monitor creates a health event for an overall performance or availability issue, across an application's geographies. Defines the percentages, for overall performance scores and availability scores for an application, that are the thresholds for when Amazon CloudWatch Internet Monitor creates a health event. You can override the defaults to set a custom threshold for overall performance or availability scores, or both. You can also set thresholds for local health scores,, where Internet Monitor creates a health event when scores cross a threshold for one or more city-networks, in addition to creating an event when an overall score crosses a threshold. If you don't set a health event threshold, the default value is 95%. For local thresholds, you also set a minimum percentage of overall traffic that is impacted by an issue before Internet Monitor creates an event. In addition, you can disable local thresholds, for performance scores, availability scores, or both. For more information, see Change health event thresholds in the Internet Monitor section of the CloudWatch User Guide.
      type: object
      properties:
        AvailabilityScoreThreshold:
          $ref: "#/components/schemas/Percentage"
          description: The health event threshold percentage set for availability scores.
        PerformanceScoreThreshold:
          $ref: "#/components/schemas/Percentage"
          description: The health event threshold percentage set for performance scores.
        AvailabilityLocalHealthEventsConfig:
          $ref: "#/components/schemas/LocalHealthEventsConfig"
          description: The configuration that determines the threshold and other conditions for when Internet Monitor creates a health event for a local availability issue.
        PerformanceLocalHealthEventsConfig:
          $ref: "#/components/schemas/LocalHealthEventsConfig"
          description: The configuration that determines the threshold and other conditions for when Internet Monitor creates a health event for a local performance issue.
    Percentage:
      type: number
      format: double
      minimum: 0
      maximum: 100
    LocalHealthEventsConfig:
      description: A complex type with the configuration information that determines the threshold and other conditions for when Internet Monitor creates a health event for a local performance or availability issue, when scores cross a threshold for one or more city-networks. Defines the percentages, for performance scores or availability scores, that are the local thresholds for when Amazon CloudWatch Internet Monitor creates a health event. Also defines whether a local threshold is enabled or disabled, and the minimum percentage of overall traffic that must be impacted by an issue before Internet Monitor creates an event when a threshold is crossed for a local health score. If you don't set a local health event threshold, the default value is 60%. For more information, see Change health event thresholds in the Internet Monitor section of the CloudWatch User Guide.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/LocalHealthEventsConfigStatus"
          description: The status of whether Internet Monitor creates a health event based on a threshold percentage set for a local health score. The status can be ENABLED or DISABLED.
        HealthScoreThreshold:
          $ref: "#/components/schemas/Percentage"
          description: The health event threshold percentage set for a local health score.
        MinTrafficImpact:
          $ref: "#/components/schemas/Percentage"
          description: The minimum percentage of overall traffic for an application that must be impacted by an issue before Internet Monitor creates an event when a threshold is crossed for a local health score. If you don't set a minimum traffic impact threshold, the default value is 0.1%.
    LocalHealthEventsConfigStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateMonitorOutput:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/MonitorArn"
          description: The Amazon Resource Name (ARN) of the monitor.
        Status:
          $ref: "#/components/schemas/MonitorConfigState"
          description: The status of a monitor.
      required:
        - Arn
        - Status
    MonitorArn:
      type: string
      minLength: 20
      maxLength: 512
      pattern: arn:.*
    MonitorConfigState:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - INACTIVE
        - ERROR
    DeleteMonitorOutput:
      type: object
    HealthEventName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9/_.-]+"
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
    GetHealthEventOutput:
      type: object
      properties:
        EventArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the event.
        EventId:
          $ref: "#/components/schemas/HealthEventName"
          description: The internally-generated identifier of a health event.
        StartedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
