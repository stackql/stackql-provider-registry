openapi: 3.0.0
info:
  version: "2017-01-11"
  title: Amazon CloudDirectory
  description: Amazon CloudDirectory
  x-serviceName: clouddirectory
  x-serviceAlias: clouddirectory
  x-protocol: rest-json
  x-apiVersion: "2017-01-11"
  x-endpointPrefix: clouddirectory
servers:
  - url: https://clouddirectory.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for clouddirectory
paths:
  /amazonclouddirectory/2017-01-11/object/facets:
    put:
      operationId: AddFacetToObject
      description: Adds a new Facet to an object. An object can have more than one facet applied on it.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where the object resides. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SchemaFacet:
                  $ref: "#/components/schemas/SchemaFacet"
                ObjectAttributeList:
                  $ref: "#/components/schemas/AttributeKeyAndValueList"
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - SchemaFacet
                - ObjectReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFacetToObjectResponse"
  /amazonclouddirectory/2017-01-11/schema/apply:
    put:
      operationId: ApplySchema
      description: Copies the input published schema, at the specified version, into the Directory with the same name and version as that of the published schema.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory into which the schema is copied. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PublishedSchemaArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - PublishedSchemaArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplySchemaResponse"
  /amazonclouddirectory/2017-01-11/object/attach:
    put:
      operationId: AttachObject
      description: "Attaches an existing object to another object. An object can be accessed in two ways: Using the path Using ObjectIdentifier"
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: Amazon Resource Name (ARN) that is associated with the Directory where both objects reside. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ParentReference:
                  $ref: "#/components/schemas/ObjectReference"
                ChildReference:
                  $ref: "#/components/schemas/ObjectReference"
                LinkName:
                  $ref: "#/components/schemas/LinkName"
              required:
                - ParentReference
                - ChildReference
                - LinkName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachObjectResponse"
  /amazonclouddirectory/2017-01-11/policy/attach:
    put:
      operationId: AttachPolicy
      description: Attaches a policy object to a regular object. An object can have a limited number of attached policies.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where both objects reside. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PolicyReference:
                  $ref: "#/components/schemas/ObjectReference"
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - PolicyReference
                - ObjectReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachPolicyResponse"
  /amazonclouddirectory/2017-01-11/index/attach:
    put:
      operationId: AttachToIndex
      description: Attaches the specified object to the specified index.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the directory where the object and index exist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IndexReference:
                  $ref: "#/components/schemas/ObjectReference"
                TargetReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - IndexReference
                - TargetReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachToIndexResponse"
  /amazonclouddirectory/2017-01-11/typedlink/attach:
    put:
      operationId: AttachTypedLink
      description: Attaches a typed link to a specified source and target object. For more information, see Typed Links.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the directory where you want to attach the typed link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
                TargetObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
                TypedLinkFacet:
                  $ref: "#/components/schemas/TypedLinkSchemaAndFacetName"
                Attributes:
                  $ref: "#/components/schemas/AttributeNameAndValueList"
              required:
                - SourceObjectReference
                - TargetObjectReference
                - TypedLinkFacet
                - Attributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachTypedLinkResponse"
  /amazonclouddirectory/2017-01-11/batchread:
    post:
      operationId: BatchRead
      description: Performs all the read operations in a batch.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory. For more information, see arns.
        - name: x-amz-consistency-level
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ConsistencyLevel"
          description: Represents the manner and timing in which the successful write or update of an object is reflected in a subsequent read operation of that same object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Operations:
                  $ref: "#/components/schemas/BatchReadOperationList"
              required:
                - Operations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchReadResponse"
  /amazonclouddirectory/2017-01-11/batchwrite:
    put:
      operationId: BatchWrite
      description: Performs all the write operations in a batch. Either all the operations succeed or none.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Operations:
                  $ref: "#/components/schemas/BatchWriteOperationList"
              required:
                - Operations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchWriteResponse"
  /amazonclouddirectory/2017-01-11/directory/create:
    put:
      operationId: CreateDirectory
      description: Creates a Directory by copying the published schema into the directory. A directory cannot be created without a schema. You can also quickly create a directory using a managed schema, called the QuickStartSchema. For more information, see Managed Schema in the Amazon Cloud Directory Developer Guide.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the published schema that will be copied into the data Directory. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DirectoryName"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectoryResponse"
  /amazonclouddirectory/2017-01-11/facet/create:
    put:
      operationId: CreateFacet
      description: Creates a new Facet in a schema. Facet creation is allowed only in development or applied schemas.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The schema ARN in which the new Facet will be created. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FacetName"
                Attributes:
                  $ref: "#/components/schemas/FacetAttributeList"
                ObjectType:
                  $ref: "#/components/schemas/ObjectType"
                FacetStyle:
                  $ref: "#/components/schemas/FacetStyle"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFacetResponse"
  /amazonclouddirectory/2017-01-11/index:
    put:
      operationId: CreateIndex
      description: Creates an index object. See Indexing and search for more information.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the directory where the index should be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OrderedIndexedAttributeList:
                  $ref: "#/components/schemas/AttributeKeyList"
                IsUnique:
                  $ref: "#/components/schemas/Bool"
                ParentReference:
                  $ref: "#/components/schemas/ObjectReference"
                LinkName:
                  $ref: "#/components/schemas/LinkName"
              required:
                - OrderedIndexedAttributeList
                - IsUnique
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIndexResponse"
  /amazonclouddirectory/2017-01-11/object:
    put:
      operationId: CreateObject
      description: Creates an object in a Directory. Additionally attaches the object to a parent, if a parent reference and LinkName is specified. An object is simply a collection of Facet attributes. You can also use this API call to create a policy object, if the facet from which you create the object is a policy facet.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory in which the object will be created. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SchemaFacets:
                  $ref: "#/components/schemas/SchemaFacetList"
                ObjectAttributeList:
                  $ref: "#/components/schemas/AttributeKeyAndValueList"
                ParentReference:
                  $ref: "#/components/schemas/ObjectReference"
                LinkName:
                  $ref: "#/components/schemas/LinkName"
              required:
                - SchemaFacets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateObjectResponse"
  /amazonclouddirectory/2017-01-11/schema/create:
    put:
      operationId: CreateSchema
      description: "Creates a new schema in a development state. A schema can exist in three phases: Development: This is a mutable phase of the schema. All new schemas are in the development phase. Once the schema is finalized, it can be published. Published: Published schemas are immutable and have a version associated with them. Applied: Applied schemas are mutable in a way that allows you to add new schema facets. You can also add new, nonrequired attributes to existing schema facets. You can apply only published schemas to directories."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SchemaName"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSchemaResponse"
  /amazonclouddirectory/2017-01-11/typedlink/facet/create:
    put:
      operationId: CreateTypedLinkFacet
      description: Creates a TypedLinkFacet. For more information, see Typed Links.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the schema. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Facet:
                  $ref: "#/components/schemas/TypedLinkFacet"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTypedLinkFacetResponse"
  /amazonclouddirectory/2017-01-11/directory:
    put:
      operationId: DeleteDirectory
      description: Deletes a directory. Only disabled directories can be deleted. A deleted directory cannot be undone. Exercise extreme caution when deleting directories.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the directory to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDirectoryResponse"
  /amazonclouddirectory/2017-01-11/facet/delete:
    put:
      operationId: DeleteFacet
      description: Deletes a given Facet. All attributes and Rules that are associated with the facet will be deleted. Only development schema facets are allowed deletion.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Facet. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FacetName"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFacetResponse"
  /amazonclouddirectory/2017-01-11/object/delete:
    put:
      operationId: DeleteObject
      description: Deletes an object and its associated attributes. Only objects with no children and no parents can be deleted. The maximum number of attributes that can be deleted during an object deletion is 30. For more information, see Amazon Cloud Directory Limits.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where the object resides. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - ObjectReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteObjectResponse"
  /amazonclouddirectory/2017-01-11/schema:
    put:
      operationId: DeleteSchema
      description: Deletes a given schema. Schemas in a development and published state can only be deleted.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the development schema. For more information, see arns.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSchemaResponse"
  /amazonclouddirectory/2017-01-11/typedlink/facet/delete:
    put:
      operationId: DeleteTypedLinkFacet
      description: Deletes a TypedLinkFacet. For more information, see Typed Links.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the schema. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/TypedLinkName"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTypedLinkFacetResponse"
  /amazonclouddirectory/2017-01-11/index/detach:
    put:
      operationId: DetachFromIndex
      description: Detaches the specified object from the specified index.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the directory the index and object exist in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IndexReference:
                  $ref: "#/components/schemas/ObjectReference"
                TargetReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - IndexReference
                - TargetReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetachFromIndexResponse"
  /amazonclouddirectory/2017-01-11/object/detach:
    put:
      operationId: DetachObject
      description: Detaches a given object from the parent object. The object that is to be detached from the parent is specified by the link name.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where objects reside. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ParentReference:
                  $ref: "#/components/schemas/ObjectReference"
                LinkName:
                  $ref: "#/components/schemas/LinkName"
              required:
                - ParentReference
                - LinkName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetachObjectResponse"
  /amazonclouddirectory/2017-01-11/policy/detach:
    put:
      operationId: DetachPolicy
      description: Detaches a policy from an object.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where both objects reside. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PolicyReference:
                  $ref: "#/components/schemas/ObjectReference"
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - PolicyReference
                - ObjectReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetachPolicyResponse"
  /amazonclouddirectory/2017-01-11/typedlink/detach:
    put:
      operationId: DetachTypedLink
      description: Detaches a typed link from a specified source and target object. For more information, see Typed Links.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the directory where you want to detach the typed link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TypedLinkSpecifier:
                  $ref: "#/components/schemas/TypedLinkSpecifier"
              required:
                - TypedLinkSpecifier
      responses:
        "200":
          description: Success
  /amazonclouddirectory/2017-01-11/directory/disable:
    put:
      operationId: DisableDirectory
      description: Disables the specified directory. Disabled directories cannot be read or written to. Only enabled directories can be disabled. Disabled directories may be reenabled.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the directory to disable.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableDirectoryResponse"
  /amazonclouddirectory/2017-01-11/directory/enable:
    put:
      operationId: EnableDirectory
      description: Enables the specified directory. Only disabled directories can be enabled. Once enabled, the directory can then be read and written to.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the directory to enable.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableDirectoryResponse"
  /amazonclouddirectory/2017-01-11/schema/getappliedschema:
    post:
      operationId: GetAppliedSchemaVersion
      description: Returns current applied schema version ARN, including the minor version in use.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SchemaArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - SchemaArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppliedSchemaVersionResponse"
  /amazonclouddirectory/2017-01-11/directory/get:
    post:
      operationId: GetDirectory
      description: Retrieves metadata about a directory.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryArn"
          description: The ARN of the directory.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDirectoryResponse"
  /amazonclouddirectory/2017-01-11/facet:
    post:
      operationId: GetFacet
      description: Gets details of the Facet, such as facet name, attributes, Rules, or ObjectType. You can call this on all kinds of schema facets -- published, development, or applied.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Facet. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FacetName"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFacetResponse"
    put:
      operationId: UpdateFacet
      description: "Does the following: Adds new Attributes, Rules, or ObjectTypes. Updates existing Attributes, Rules, or ObjectTypes. Deletes existing Attributes, Rules, or ObjectTypes."
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Facet. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FacetName"
                AttributeUpdates:
                  $ref: "#/components/schemas/FacetAttributeUpdateList"
                ObjectType:
                  $ref: "#/components/schemas/ObjectType"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFacetResponse"
  /amazonclouddirectory/2017-01-11/typedlink/attributes/get:
    post:
      operationId: GetLinkAttributes
      description: Retrieves attributes that are associated with a typed link.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where the typed link resides. For more information, see arns or Typed Links.
      requestBody:
        required: true
