              properties:
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/NumberResults"
              required:
                - ObjectReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupPolicyResponse"
  /amazonclouddirectory/2017-01-11/schema/publish:
    put:
      operationId: PublishSchema
      description: Publishes a development schema with a major version and a recommended minor version.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the development schema. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Version:
                  $ref: "#/components/schemas/Version"
                MinorVersion:
                  $ref: "#/components/schemas/Version"
                Name:
                  $ref: "#/components/schemas/SchemaName"
              required:
                - Version
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishSchemaResponse"
  /amazonclouddirectory/2017-01-11/object/facets/delete:
    put:
      operationId: RemoveFacetFromObject
      description: Removes the specified facet from the specified object.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the directory in which the object resides.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SchemaFacet:
                  $ref: "#/components/schemas/SchemaFacet"
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
              required:
                - SchemaFacet
                - ObjectReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveFacetFromObjectResponse"
  /amazonclouddirectory/2017-01-11/tags/add:
    put:
      operationId: TagResource
      description: An API operation for adding tags to a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - ResourceArn
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /amazonclouddirectory/2017-01-11/tags/remove:
    put:
      operationId: UntagResource
      description: An API operation for removing tags from a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /amazonclouddirectory/2017-01-11/typedlink/attributes/update:
    post:
      operationId: UpdateLinkAttributes
      description: Updates a given typed link’s attributes. Attributes to be updated must not contribute to the typed link’s identity, as defined by its IdentityAttributeOrder.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where the updated typed link resides. For more information, see arns or Typed Links.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TypedLinkSpecifier:
                  $ref: "#/components/schemas/TypedLinkSpecifier"
                AttributeUpdates:
                  $ref: "#/components/schemas/LinkAttributeUpdateList"
              required:
                - TypedLinkSpecifier
                - AttributeUpdates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLinkAttributesResponse"
  /amazonclouddirectory/2017-01-11/object/update:
    put:
      operationId: UpdateObjectAttributes
      description: Updates a given object's attributes.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the Directory where the object resides. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ObjectReference:
                  $ref: "#/components/schemas/ObjectReference"
                AttributeUpdates:
                  $ref: "#/components/schemas/ObjectAttributeUpdateList"
              required:
                - ObjectReference
                - AttributeUpdates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateObjectAttributesResponse"
  /amazonclouddirectory/2017-01-11/schema/update:
    put:
      operationId: UpdateSchema
      description: Updates the schema name with a new name. Only development schema names can be updated.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the development schema. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/SchemaName"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSchemaResponse"
  /amazonclouddirectory/2017-01-11/typedlink/facet:
    put:
      operationId: UpdateTypedLinkFacet
      description: Updates a TypedLinkFacet. For more information, see Typed Links.
      parameters:
        - name: x-amz-data-partition
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the schema. For more information, see arns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/TypedLinkName"
                AttributeUpdates:
                  $ref: "#/components/schemas/TypedLinkFacetAttributeUpdateList"
                IdentityAttributeOrder:
                  $ref: "#/components/schemas/AttributeNameList"
              required:
                - Name
                - AttributeUpdates
                - IdentityAttributeOrder
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTypedLinkFacetResponse"
  /amazonclouddirectory/2017-01-11/schema/upgradeapplied:
    put:
      operationId: UpgradeAppliedSchema
      description: "Upgrades a single directory in-place using the PublishedSchemaArn with schema updates found in MinorVersion. Backwards-compatible minor version upgrades are instantaneously available for readers on all objects in the directory. Note: This is a synchronous API call and upgrades only one schema on a given directory per call. To upgrade multiple directories from one schema, you would need to call this API on each directory."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                PublishedSchemaArn:
                  $ref: "#/components/schemas/Arn"
                DirectoryArn:
                  $ref: "#/components/schemas/Arn"
                DryRun:
                  $ref: "#/components/schemas/Bool"
              required:
                - PublishedSchemaArn
                - DirectoryArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeAppliedSchemaResponse"
  /amazonclouddirectory/2017-01-11/schema/upgradepublished:
    put:
      operationId: UpgradePublishedSchema
      description: Upgrades a published schema under a new minor version revision using the current contents of DevelopmentSchemaArn.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DevelopmentSchemaArn:
                  $ref: "#/components/schemas/Arn"
                PublishedSchemaArn:
                  $ref: "#/components/schemas/Arn"
                MinorVersion:
                  $ref: "#/components/schemas/Version"
                DryRun:
                  $ref: "#/components/schemas/Bool"
              required:
                - DevelopmentSchemaArn
                - PublishedSchemaArn
                - MinorVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradePublishedSchemaResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Arn:
      type: string
    SchemaFacet:
      description: A facet.
      type: object
      properties:
        SchemaArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the schema that contains the facet with no minor component. See arns and In-Place Schema Upgrade for a description of when to provide minor versions. If this value is set, FacetName must also be set.
        FacetName:
          $ref: "#/components/schemas/FacetName"
          description: The name of the facet. If this value is set, SchemaArn must also be set.
    FacetName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-zA-Z0-9._-]*$
    AttributeKeyAndValueList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeKeyAndValue"
    AttributeKeyAndValue:
      description: The combination of an attribute key and an attribute value.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/AttributeKey"
          description: The key of the attribute.
        Value:
          $ref: "#/components/schemas/TypedAttributeValue"
          description: The value of the attribute.
      required:
        - Key
        - Value
    AttributeKey:
      description: A unique identifier for an attribute.
      type: object
      properties:
        SchemaArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the schema that contains the facet and attribute.
        FacetName:
          $ref: "#/components/schemas/FacetName"
          description: The name of the facet that the attribute exists within.
        Name:
          $ref: "#/components/schemas/AttributeName"
          description: The name of the attribute.
      required:
        - SchemaArn
        - FacetName
        - Name
    AttributeName:
      type: string
      minLength: 1
      maxLength: 230
      pattern: ^[a-zA-Z0-9._:-]*$
    TypedAttributeValue:
      description: Represents the data for a typed attribute. You can set one, and only one, of the elements. Each attribute in an item is a name-value pair. Attributes have a single value.
      type: object
      properties:
        StringValue:
          $ref: "#/components/schemas/StringAttributeValue"
          description: A string data value.
        BinaryValue:
          $ref: "#/components/schemas/BinaryAttributeValue"
          description: A binary data value.
        BooleanValue:
          $ref: "#/components/schemas/BooleanAttributeValue"
          description: A Boolean data value.
        NumberValue:
          $ref: "#/components/schemas/NumberAttributeValue"
          description: A number data value.
        DatetimeValue:
          $ref: "#/components/schemas/DatetimeAttributeValue"
          description: A date and time value.
    StringAttributeValue:
      type: string
    BinaryAttributeValue:
      type: string
      format: byte
    BooleanAttributeValue:
      type: boolean
    NumberAttributeValue:
      type: string
    DatetimeAttributeValue:
      type: string
      format: date-time
    ObjectReference:
      description: The reference that identifies an object.
      type: object
      properties:
        Selector:
          $ref: "#/components/schemas/SelectorObjectReference"
          description: "A path selector supports easy selection of an object by the parent/child links leading to it from the directory root. Use the link names from each parent/child link to construct the path. Path selectors start with a slash (/) and link names are separated by slashes. For more information about paths, see Access Objects. You can identify an object in one of the following ways: $ObjectIdentifier - An object identifier is an opaque string provided by Amazon Cloud Directory. When creating objects, the system will provide you with the identifier of the created object. An object’s identifier is immutable and no two objects will ever share the same object identifier. To identify an object with ObjectIdentifier, the ObjectIdentifier must be wrapped in double quotes. /some/path - Identifies the object based on path #SomeBatchReference - Identifies the object in a batch call"
    SelectorObjectReference:
      type: string
    AddFacetToObjectResponse:
      type: object
    ApplySchemaResponse:
      type: object
      properties:
        AppliedSchemaArn:
          $ref: "#/components/schemas/Arn"
          description: The applied schema ARN that is associated with the copied schema in the Directory. You can use this ARN to describe the schema information applied on this directory. For more information, see arns.
        DirectoryArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN that is associated with the Directory. For more information, see arns.
    LinkName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[^\\/\\[\\]\\(\\):\\{\\}#@!?\\s\\\\;]+"
    AttachObjectResponse:
      type: object
      properties:
        AttachedObjectIdentifier:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: The attached ObjectIdentifier, which is the child ObjectIdentifier.
    ObjectIdentifier:
      type: string
    AttachPolicyResponse:
      type: object
    AttachToIndexResponse:
      type: object
      properties:
        AttachedObjectIdentifier:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: The ObjectIdentifier of the object that was attached to the index.
    TypedLinkSchemaAndFacetName:
      description: Identifies the schema Amazon Resource Name (ARN) and facet name for the typed link.
      type: object
      properties:
        SchemaArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) that is associated with the schema. For more information, see arns.
        TypedLinkName:
          $ref: "#/components/schemas/TypedLinkName"
          description: The unique name of the typed link facet.
      required:
        - SchemaArn
        - TypedLinkName
    TypedLinkName:
      type: string
      pattern: ^[a-zA-Z0-9._-]*$
    AttributeNameAndValueList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeNameAndValue"
    AttributeNameAndValue:
      description: Identifies the attribute name and value for a typed link.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/AttributeName"
          description: The attribute name of the typed link.
        Value:
          $ref: "#/components/schemas/TypedAttributeValue"
          description: The value for the typed link.
      required:
        - AttributeName
        - Value
    AttachTypedLinkResponse:
      type: object
      properties:
        TypedLinkSpecifier:
          $ref: "#/components/schemas/TypedLinkSpecifier"
          description: Returns a typed link specifier as output.
    TypedLinkSpecifier:
      description: Contains all the information that is used to uniquely identify a typed link. The parameters discussed in this topic are used to uniquely specify the typed link being operated on. The AttachTypedLink API returns a typed link specifier while the DetachTypedLink API accepts one as input. Similarly, the ListIncomingTypedLinks and ListOutgoingTypedLinks API operations provide typed link specifiers as output. You can also construct a typed link specifier from scratch.
      type: object
      properties:
        TypedLinkFacet:
          $ref: "#/components/schemas/TypedLinkSchemaAndFacetName"
          description: Identifies the typed link facet that is associated with the typed link.
        SourceObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Identifies the source object that the typed link will attach to.
        TargetObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Identifies the target object that the typed link will attach to.
        IdentityAttributeValues:
          $ref: "#/components/schemas/AttributeNameAndValueList"
          description: Identifies the attribute value to update.
      required:
        - TypedLinkFacet
        - SourceObjectReference
        - TargetObjectReference
        - IdentityAttributeValues
    ConsistencyLevel:
      type: string
      enum:
        - SERIALIZABLE
        - EVENTUAL
    BatchReadOperationList:
      type: array
      items:
        $ref: "#/components/schemas/BatchReadOperation"
    BatchReadOperation:
      description: Represents the output of a BatchRead operation.
      type: object
      properties:
        ListObjectAttributes:
          $ref: "#/components/schemas/BatchListObjectAttributes"
          description: Lists all attributes that are associated with an object.
        ListObjectChildren:
          $ref: "#/components/schemas/BatchListObjectChildren"
          description: Returns a paginated list of child objects that are associated with a given object.
        ListAttachedIndices:
          $ref: "#/components/schemas/BatchListAttachedIndices"
          description: Lists indices attached to an object.
        ListObjectParentPaths:
          $ref: "#/components/schemas/BatchListObjectParentPaths"
          description: Retrieves all available parent paths for any object type such as node, leaf node, policy node, and index node objects. For more information about objects, see Directory Structure.
        GetObjectInformation:
          $ref: "#/components/schemas/BatchGetObjectInformation"
          description: Retrieves metadata about an object.
        GetObjectAttributes:
          $ref: "#/components/schemas/BatchGetObjectAttributes"
          description: Retrieves attributes within a facet that are associated with an object.
        ListObjectParents:
          $ref: "#/components/schemas/BatchListObjectParents"
          description: Lists parent objects that are associated with a given object in pagination fashion.
        ListObjectPolicies:
          $ref: "#/components/schemas/BatchListObjectPolicies"
          description: Returns policies attached to an object in pagination fashion.
        ListPolicyAttachments:
          $ref: "#/components/schemas/BatchListPolicyAttachments"
          description: Returns all of the ObjectIdentifiers to which a given policy is attached.
        LookupPolicy:
          $ref: "#/components/schemas/BatchLookupPolicy"
          description: Lists all policies from the root of the Directory to the object specified. If there are no policies present, an empty list is returned. If policies are present, and if some objects don't have the policies attached, it returns the ObjectIdentifier for such objects. If policies are present, it returns ObjectIdentifier, policyId, and policyType. Paths that don't lead to the root from the target object are ignored. For more information, see Policies.
        ListIndex:
          $ref: "#/components/schemas/BatchListIndex"
          description: Lists objects attached to the specified index.
        ListOutgoingTypedLinks:
          $ref: "#/components/schemas/BatchListOutgoingTypedLinks"
          description: Returns a paginated list of all the outgoing TypedLinkSpecifier information for an object. It also supports filtering by typed link facet and identity attributes. For more information, see Typed Links.
        ListIncomingTypedLinks:
          $ref: "#/components/schemas/BatchListIncomingTypedLinks"
          description: Returns a paginated list of all the incoming TypedLinkSpecifier information for an object. It also supports filtering by typed link facet and identity attributes. For more information, see Typed Links.
        GetLinkAttributes:
          $ref: "#/components/schemas/BatchGetLinkAttributes"
          description: Retrieves attributes that are associated with a typed link.
    BatchListObjectAttributes:
      description: Represents the output of a ListObjectAttributes operation.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference of the object whose attributes need to be listed.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of items to be retrieved in a single call. This is an approximate number.
        FacetFilter:
          $ref: "#/components/schemas/SchemaFacet"
          description: Used to filter the list of object attributes that are associated with a certain facet.
      required:
        - ObjectReference
    NextToken:
      type: string
    NumberResults:
      type: integer
      minimum: 1
    BatchListObjectChildren:
      description: Represents the output of a ListObjectChildren operation.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference of the object for which child objects are being listed.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: Maximum number of items to be retrieved in a single call. This is an approximate number.
      required:
        - ObjectReference
    BatchListAttachedIndices:
      description: Lists indices attached to an object inside a BatchRead operation. For more information, see ListAttachedIndices and BatchReadRequest$Operations.
      type: object
      properties:
        TargetReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the object that has indices attached.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - TargetReference
    BatchListObjectParentPaths:
      description: Retrieves all available parent paths for any object type such as node, leaf node, policy node, and index node objects inside a BatchRead operation. For more information, see ListObjectParentPaths and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the object whose attributes will be listed.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - ObjectReference
    BatchGetObjectInformation:
      description: Retrieves metadata about an object inside a BatchRead operation. For more information, see GetObjectInformation and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the object.
      required:
        - ObjectReference
    BatchGetObjectAttributes:
      description: Retrieves attributes within a facet that are associated with an object inside an BatchRead operation. For more information, see GetObjectAttributes and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference that identifies the object whose attributes will be retrieved.
        SchemaFacet:
          $ref: "#/components/schemas/SchemaFacet"
          description: Identifier for the facet whose attributes will be retrieved. See SchemaFacet for details.
        AttributeNames:
          $ref: "#/components/schemas/AttributeNameList"
          description: List of attribute names whose values will be retrieved.
      required:
        - ObjectReference
        - SchemaFacet
        - AttributeNames
    AttributeNameList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeName"
    BatchListObjectParents:
      description: Lists parent objects that are associated with a given object in pagination fashion.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of items to be retrieved in a single call. This is an approximate number.
      required:
        - ObjectReference
    BatchListObjectPolicies:
      description: Returns policies attached to an object in pagination fashion inside a BatchRead operation. For more information, see ListObjectPolicies and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the object whose attributes will be listed.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - ObjectReference
    BatchListPolicyAttachments:
      description: Returns all of the ObjectIdentifiers to which a given policy is attached inside a BatchRead operation. For more information, see ListPolicyAttachments and BatchReadRequest$Operations.
      type: object
      properties:
        PolicyReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the policy object.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - PolicyReference
    BatchLookupPolicy:
      description: Lists all policies from the root of the Directory to the object specified inside a BatchRead operation. For more information, see LookupPolicy and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference that identifies the object whose policies will be looked up.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - ObjectReference
    BatchListIndex:
      description: Lists objects attached to the specified index inside a BatchRead operation. For more information, see ListIndex and BatchReadRequest$Operations.
      type: object
      properties:
        RangesOnIndexedValues:
          $ref: "#/components/schemas/ObjectAttributeRangeList"
          description: Specifies the ranges of indexed values that you want to query.
        IndexReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference to the index to list.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
      required:
        - IndexReference
    ObjectAttributeRangeList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectAttributeRange"
    ObjectAttributeRange:
      description: A range of attributes.
      type: object
      properties:
        AttributeKey:
          $ref: "#/components/schemas/AttributeKey"
          description: The key of the attribute that the attribute range covers.
        Range:
          $ref: "#/components/schemas/TypedAttributeValueRange"
          description: The range of attribute values being selected.
    TypedAttributeValueRange:
      description: A range of attribute values. For more information, see Range Filters.
      type: object
      properties:
        StartMode:
          $ref: "#/components/schemas/RangeMode"
          description: The inclusive or exclusive range start.
        StartValue:
          $ref: "#/components/schemas/TypedAttributeValue"
          description: The value to start the range at.
        EndMode:
          $ref: "#/components/schemas/RangeMode"
          description: The inclusive or exclusive range end.
        EndValue:
          $ref: "#/components/schemas/TypedAttributeValue"
          description: The attribute value to terminate the range at.
      required:
        - StartMode
        - EndMode
    RangeMode:
      type: string
      enum:
        - FIRST
        - LAST
        - LAST_BEFORE_MISSING_VALUES
        - INCLUSIVE
        - EXCLUSIVE
    BatchListOutgoingTypedLinks:
      description: Returns a paginated list of all the outgoing TypedLinkSpecifier information for an object inside a BatchRead operation. For more information, see ListOutgoingTypedLinks and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the object whose attributes will be listed.
        FilterAttributeRanges:
          $ref: "#/components/schemas/TypedLinkAttributeRangeList"
          description: Provides range filters for multiple attributes. When providing ranges to typed link selection, any inexact ranges must be specified at the end. Any attributes that do not have a range specified are presumed to match the entire range.
        FilterTypedLink:
          $ref: "#/components/schemas/TypedLinkSchemaAndFacetName"
          description: Filters are interpreted in the order of the attributes defined on the typed link facet, not the order they are supplied to any API calls.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - ObjectReference
    TypedLinkAttributeRangeList:
      type: array
      items:
        $ref: "#/components/schemas/TypedLinkAttributeRange"
    TypedLinkAttributeRange:
      description: Identifies the range of attributes that are used by a specified filter.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/AttributeName"
          description: The unique name of the typed link attribute.
        Range:
          $ref: "#/components/schemas/TypedAttributeValueRange"
          description: The range of attribute values that are being selected.
      required:
        - Range
    BatchListIncomingTypedLinks:
      description: Returns a paginated list of all the incoming TypedLinkSpecifier information for an object inside a BatchRead operation. For more information, see ListIncomingTypedLinks and BatchReadRequest$Operations.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the object whose attributes will be listed.
        FilterAttributeRanges:
          $ref: "#/components/schemas/TypedLinkAttributeRangeList"
          description: Provides range filters for multiple attributes. When providing ranges to typed link selection, any inexact ranges must be specified at the end. Any attributes that do not have a range specified are presumed to match the entire range.
        FilterTypedLink:
          $ref: "#/components/schemas/TypedLinkSchemaAndFacetName"
          description: Filters are interpreted in the order of the attributes on the typed link facet, not the order in which they are supplied to any API calls.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
        MaxResults:
          $ref: "#/components/schemas/NumberResults"
          description: The maximum number of results to retrieve.
      required:
        - ObjectReference
    BatchGetLinkAttributes:
      description: Retrieves attributes that are associated with a typed link inside a BatchRead operation. For more information, see GetLinkAttributes and BatchReadRequest$Operations.
      type: object
      properties:
        TypedLinkSpecifier:
          $ref: "#/components/schemas/TypedLinkSpecifier"
          description: Allows a typed link specifier to be accepted as input.
        AttributeNames:
          $ref: "#/components/schemas/AttributeNameList"
          description: A list of attribute names whose values will be retrieved.
      required:
        - TypedLinkSpecifier
        - AttributeNames
    BatchReadResponse:
      type: object
      properties:
        Responses:
          $ref: "#/components/schemas/BatchReadOperationResponseList"
          description: A list of all the responses for each batch read.
    BatchReadOperationResponseList:
      type: array
      items:
        $ref: "#/components/schemas/BatchReadOperationResponse"
    BatchReadOperationResponse:
      description: Represents the output of a BatchRead response operation.
      type: object
      properties:
        SuccessfulResponse:
          $ref: "#/components/schemas/BatchReadSuccessfulResponse"
          description: Identifies which operation in a batch has succeeded.
        ExceptionResponse:
          $ref: "#/components/schemas/BatchReadException"
          description: Identifies which operation in a batch has failed.
    BatchReadSuccessfulResponse:
      description: Represents the output of a BatchRead success response operation.
      type: object
      properties:
        ListObjectAttributes:
          $ref: "#/components/schemas/BatchListObjectAttributesResponse"
          description: Lists all attributes that are associated with an object.
        ListObjectChildren:
          $ref: "#/components/schemas/BatchListObjectChildrenResponse"
          description: Returns a paginated list of child objects that are associated with a given object.
        GetObjectInformation:
          $ref: "#/components/schemas/BatchGetObjectInformationResponse"
          description: Retrieves metadata about an object.
        GetObjectAttributes:
          $ref: "#/components/schemas/BatchGetObjectAttributesResponse"
          description: Retrieves attributes within a facet that are associated with an object.
        ListAttachedIndices:
          $ref: "#/components/schemas/BatchListAttachedIndicesResponse"
          description: Lists indices attached to an object.
        ListObjectParentPaths:
          $ref: "#/components/schemas/BatchListObjectParentPathsResponse"
          description: Retrieves all available parent paths for any object type such as node, leaf node, policy node, and index node objects. For more information about objects, see Directory Structure.
        ListObjectPolicies:
          $ref: "#/components/schemas/BatchListObjectPoliciesResponse"
          description: Returns policies attached to an object in pagination fashion.
        ListPolicyAttachments:
          $ref: "#/components/schemas/BatchListPolicyAttachmentsResponse"
          description: Returns all of the ObjectIdentifiers to which a given policy is attached.
        LookupPolicy:
          $ref: "#/components/schemas/BatchLookupPolicyResponse"
          description: Lists all policies from the root of the Directory to the object specified. If there are no policies present, an empty list is returned. If policies are present, and if some objects don't have the policies attached, it returns the ObjectIdentifier for such objects. If policies are present, it returns ObjectIdentifier, policyId, and policyType. Paths that don't lead to the root from the target object are ignored. For more information, see Policies.
        ListIndex:
          $ref: "#/components/schemas/BatchListIndexResponse"
          description: Lists objects attached to the specified index.
        ListOutgoingTypedLinks:
          $ref: "#/components/schemas/BatchListOutgoingTypedLinksResponse"
          description: Returns a paginated list of all the outgoing TypedLinkSpecifier information for an object. It also supports filtering by typed link facet and identity attributes. For more information, see Typed Links.
        ListIncomingTypedLinks:
          $ref: "#/components/schemas/BatchListIncomingTypedLinksResponse"
          description: Returns a paginated list of all the incoming TypedLinkSpecifier information for an object. It also supports filtering by typed link facet and identity attributes. For more information, see Typed Links.
        GetLinkAttributes:
          $ref: "#/components/schemas/BatchGetLinkAttributesResponse"
          description: The list of attributes to retrieve from the typed link.
        ListObjectParents:
          $ref: "#/components/schemas/BatchListObjectParentsResponse"
          description: The list of parent objects to retrieve.
    BatchListObjectAttributesResponse:
      description: Represents the output of a ListObjectAttributes response operation.
      type: object
      properties:
        Attributes:
          $ref: "#/components/schemas/AttributeKeyAndValueList"
          description: The attributes map that is associated with the object. AttributeArn is the key; attribute value is the value.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    BatchListObjectChildrenResponse:
      description: Represents the output of a ListObjectChildren response operation.
      type: object
      properties:
        Children:
          type: object
          properties: {}
          description: The children structure, which is a map with the key as the LinkName and ObjectIdentifier as the value.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    BatchGetObjectInformationResponse:
      description: Represents the output of a GetObjectInformation response operation.
      type: object
      properties:
        SchemaFacets:
          $ref: "#/components/schemas/SchemaFacetList"
          description: The facets attached to the specified object.
        ObjectIdentifier:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: The ObjectIdentifier of the specified object.
    SchemaFacetList:
      type: array
      items:
        $ref: "#/components/schemas/SchemaFacet"
    BatchGetObjectAttributesResponse:
      description: Represents the output of a GetObjectAttributes response operation.
      type: object
      properties:
        Attributes:
          $ref: "#/components/schemas/AttributeKeyAndValueList"
          description: The attribute values that are associated with an object.
    BatchListAttachedIndicesResponse:
      description: Represents the output of a ListAttachedIndices response operation.
      type: object
      properties:
        IndexAttachments:
          $ref: "#/components/schemas/IndexAttachmentList"
          description: The indices attached to the specified object.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    IndexAttachmentList:
      type: array
      items:
        $ref: "#/components/schemas/IndexAttachment"
    IndexAttachment:
      description: Represents an index and an attached object.
      type: object
      properties:
        IndexedAttributes:
          $ref: "#/components/schemas/AttributeKeyAndValueList"
          description: The indexed attribute values.
        ObjectIdentifier:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: In response to ListIndex, the ObjectIdentifier of the object attached to the index. In response to ListAttachedIndices, the ObjectIdentifier of the index attached to the object. This field will always contain the ObjectIdentifier of the object on the opposite side of the attachment specified in the query.
    BatchListObjectParentPathsResponse:
      description: Represents the output of a ListObjectParentPaths response operation.
      type: object
      properties:
        PathToObjectIdentifiersList:
          $ref: "#/components/schemas/PathToObjectIdentifiersList"
          description: Returns the path to the ObjectIdentifiers that are associated with the directory.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    PathToObjectIdentifiersList:
      type: array
      items:
        $ref: "#/components/schemas/PathToObjectIdentifiers"
    PathToObjectIdentifiers:
      description: Returns the path to the ObjectIdentifiers that is associated with the directory.
      type: object
      properties:
        Path:
          $ref: "#/components/schemas/PathString"
          description: The path that is used to identify the object starting from directory root.
        ObjectIdentifiers:
          $ref: "#/components/schemas/ObjectIdentifierList"
          description: Lists ObjectIdentifiers starting from directory root to the object in the request.
    PathString:
      type: string
    ObjectIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectIdentifier"
    BatchListObjectPoliciesResponse:
      description: Represents the output of a ListObjectPolicies response operation.
      type: object
      properties:
        AttachedPolicyIds:
          $ref: "#/components/schemas/ObjectIdentifierList"
          description: A list of policy ObjectIdentifiers, that are attached to the object.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    BatchListPolicyAttachmentsResponse:
      description: Represents the output of a ListPolicyAttachments response operation.
      type: object
      properties:
        ObjectIdentifiers:
          $ref: "#/components/schemas/ObjectIdentifierList"
          description: A list of ObjectIdentifiers to which the policy is attached.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    BatchLookupPolicyResponse:
      description: Represents the output of a LookupPolicy response operation.
      type: object
      properties:
        PolicyToPathList:
          $ref: "#/components/schemas/PolicyToPathList"
          description: Provides list of path to policies. Policies contain PolicyId, ObjectIdentifier, and PolicyType. For more information, see Policies.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    PolicyToPathList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyToPath"
    PolicyToPath:
      description: Used when a regular object exists in a Directory and you want to find all of the policies that are associated with that object and the parent to that object.
      type: object
      properties:
        Path:
          $ref: "#/components/schemas/PathString"
          description: The path that is referenced from the root.
        Policies:
          $ref: "#/components/schemas/PolicyAttachmentList"
          description: List of policy objects.
    PolicyAttachmentList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyAttachment"
    PolicyAttachment:
      description: Contains the PolicyType, PolicyId, and the ObjectIdentifier to which it is attached. For more information, see Policies.
      type: object
      properties:
        PolicyId:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: The ID of PolicyAttachment.
        ObjectIdentifier:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: The ObjectIdentifier that is associated with PolicyAttachment.
        PolicyType:
          $ref: "#/components/schemas/PolicyType"
          description: The type of policy that can be associated with PolicyAttachment.
    PolicyType:
      type: string
    BatchListIndexResponse:
      description: Represents the output of a ListIndex response operation.
      type: object
      properties:
        IndexAttachments:
          $ref: "#/components/schemas/IndexAttachmentList"
          description: The objects and indexed values attached to the index.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    BatchListOutgoingTypedLinksResponse:
      description: Represents the output of a ListOutgoingTypedLinks response operation.
      type: object
      properties:
        TypedLinkSpecifiers:
          $ref: "#/components/schemas/TypedLinkSpecifierList"
          description: Returns a typed link specifier as output.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    TypedLinkSpecifierList:
      type: array
      items:
        $ref: "#/components/schemas/TypedLinkSpecifier"
    BatchListIncomingTypedLinksResponse:
      description: Represents the output of a ListIncomingTypedLinks response operation.
      type: object
      properties:
        LinkSpecifiers:
          $ref: "#/components/schemas/TypedLinkSpecifierList"
          description: Returns one or more typed link specifiers as output.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    BatchGetLinkAttributesResponse:
      description: Represents the output of a GetLinkAttributes response operation.
      type: object
      properties:
        Attributes:
          $ref: "#/components/schemas/AttributeKeyAndValueList"
          description: The attributes that are associated with the typed link.
    BatchListObjectParentsResponse:
      description: Represents the output of a ListObjectParents response operation.
      type: object
      properties:
        ParentLinks:
          $ref: "#/components/schemas/ObjectIdentifierAndLinkNameList"
          description: Returns a list of parent reference and LinkName Tuples.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token.
    ObjectIdentifierAndLinkNameList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectIdentifierAndLinkNameTuple"
    ObjectIdentifierAndLinkNameTuple:
      description: A pair of ObjectIdentifier and LinkName.
      type: object
      properties:
        ObjectIdentifier:
          $ref: "#/components/schemas/ObjectIdentifier"
          description: The ID that is associated with the object.
        LinkName:
          $ref: "#/components/schemas/LinkName"
          description: The name of the link between the parent and the child object.
    BatchReadException:
      description: The batch read exception structure, which contains the exception type and message.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/BatchReadExceptionType"
          description: A type of exception, such as InvalidArnException.
        Message:
          $ref: "#/components/schemas/ExceptionMessage"
          description: An exception message that is associated with the failure.
    BatchReadExceptionType:
      type: string
      enum:
        - ValidationException
        - InvalidArnException
        - ResourceNotFoundException
        - InvalidNextTokenException
        - AccessDeniedException
        - NotNodeException
        - FacetValidationException
        - CannotListParentOfRootException
        - NotIndexException
        - NotPolicyException
        - DirectoryNotEnabledException
        - LimitExceededException
        - InternalServiceException
    ExceptionMessage:
      type: string
    BatchWriteOperationList:
      type: array
      items:
        $ref: "#/components/schemas/BatchWriteOperation"
    BatchWriteOperation:
      description: Represents the output of a BatchWrite operation.
      type: object
      properties:
        CreateObject:
          $ref: "#/components/schemas/BatchCreateObject"
          description: Creates an object.
        AttachObject:
          $ref: "#/components/schemas/BatchAttachObject"
          description: Attaches an object to a Directory.
        DetachObject:
          $ref: "#/components/schemas/BatchDetachObject"
          description: Detaches an object from a Directory.
        UpdateObjectAttributes:
          $ref: "#/components/schemas/BatchUpdateObjectAttributes"
          description: Updates a given object's attributes.
        DeleteObject:
          $ref: "#/components/schemas/BatchDeleteObject"
          description: Deletes an object in a Directory.
        AddFacetToObject:
          $ref: "#/components/schemas/BatchAddFacetToObject"
          description: A batch operation that adds a facet to an object.
        RemoveFacetFromObject:
          $ref: "#/components/schemas/BatchRemoveFacetFromObject"
          description: A batch operation that removes a facet from an object.
        AttachPolicy:
          $ref: "#/components/schemas/BatchAttachPolicy"
          description: Attaches a policy object to a regular object. An object can have a limited number of attached policies.
        DetachPolicy:
          $ref: "#/components/schemas/BatchDetachPolicy"
          description: Detaches a policy from a Directory.
        CreateIndex:
          $ref: "#/components/schemas/BatchCreateIndex"
          description: Creates an index object. See Indexing and search for more information.
        AttachToIndex:
          $ref: "#/components/schemas/BatchAttachToIndex"
          description: Attaches the specified object to the specified index.
        DetachFromIndex:
          $ref: "#/components/schemas/BatchDetachFromIndex"
          description: Detaches the specified object from the specified index.
        AttachTypedLink:
          $ref: "#/components/schemas/BatchAttachTypedLink"
          description: Attaches a typed link to a specified source and target object. For more information, see Typed Links.
        DetachTypedLink:
          $ref: "#/components/schemas/BatchDetachTypedLink"
          description: Detaches a typed link from a specified source and target object. For more information, see Typed Links.
        UpdateLinkAttributes:
          $ref: "#/components/schemas/BatchUpdateLinkAttributes"
          description: Updates a given object's attributes.
    BatchCreateObject:
      description: Represents the output of a CreateObject operation.
      type: object
      properties:
        SchemaFacet:
          $ref: "#/components/schemas/SchemaFacetList"
          description: A list of FacetArns that will be associated with the object. For more information, see arns.
        ObjectAttributeList:
          $ref: "#/components/schemas/AttributeKeyAndValueList"
          description: An attribute map, which contains an attribute ARN as the key and attribute value as the map value.
        ParentReference:
          $ref: "#/components/schemas/ObjectReference"
          description: If specified, the parent reference to which this object will be attached.
        LinkName:
          $ref: "#/components/schemas/LinkName"
          description: The name of the link.
        BatchReferenceName:
          $ref: "#/components/schemas/BatchReferenceName"
          description: The batch reference name. See Transaction Support for more information.
      required:
        - SchemaFacet
        - ObjectAttributeList
    BatchReferenceName:
      type: string
    BatchAttachObject:
      description: Represents the output of an AttachObject operation.
      type: object
      properties:
        ParentReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The parent object reference.
        ChildReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The child object reference that is to be attached to the object.
        LinkName:
          $ref: "#/components/schemas/LinkName"
          description: The name of the link.
      required:
        - ParentReference
        - ChildReference
        - LinkName
    BatchDetachObject:
      description: Represents the output of a DetachObject operation.
      type: object
      properties:
        ParentReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Parent reference from which the object with the specified link name is detached.
        LinkName:
          $ref: "#/components/schemas/LinkName"
          description: The name of the link.
        BatchReferenceName:
          $ref: "#/components/schemas/BatchReferenceName"
          description: The batch reference name. See Transaction Support for more information.
      required:
        - ParentReference
        - LinkName
    BatchUpdateObjectAttributes:
      description: Represents the output of a BatchUpdate operation.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference that identifies the object.
        AttributeUpdates:
          $ref: "#/components/schemas/ObjectAttributeUpdateList"
          description: Attributes update structure.
      required:
        - ObjectReference
        - AttributeUpdates
    ObjectAttributeUpdateList:
      type: array
      items:
        $ref: "#/components/schemas/ObjectAttributeUpdate"
    ObjectAttributeUpdate:
      description: Structure that contains attribute update information.
      type: object
      properties:
        ObjectAttributeKey:
          $ref: "#/components/schemas/AttributeKey"
          description: The key of the attribute being updated.
        ObjectAttributeAction:
          $ref: "#/components/schemas/ObjectAttributeAction"
          description: The action to perform as part of the attribute update.
    ObjectAttributeAction:
      description: The action to take on the object attribute.
      type: object
      properties:
        ObjectAttributeActionType:
          $ref: "#/components/schemas/UpdateActionType"
          description: A type that can be either Update or Delete.
        ObjectAttributeUpdateValue:
          $ref: "#/components/schemas/TypedAttributeValue"
          description: The value that you want to update to.
    UpdateActionType:
      type: string
      enum:
        - CREATE_OR_UPDATE
        - DELETE
    BatchDeleteObject:
      description: Represents the output of a DeleteObject operation.
      type: object
      properties:
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the object.
      required:
        - ObjectReference
    BatchAddFacetToObject:
      description: Represents the output of a batch add facet to object operation.
      type: object
      properties:
        SchemaFacet:
          $ref: "#/components/schemas/SchemaFacet"
          description: Represents the facet being added to the object.
        ObjectAttributeList:
          $ref: "#/components/schemas/AttributeKeyAndValueList"
          description: The attributes to set on the object.
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the object being mutated.
      required:
        - SchemaFacet
        - ObjectAttributeList
        - ObjectReference
    BatchRemoveFacetFromObject:
      description: A batch operation to remove a facet from an object.
      type: object
      properties:
        SchemaFacet:
          $ref: "#/components/schemas/SchemaFacet"
          description: The facet to remove from the object.
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the object whose facet will be removed.
      required:
        - SchemaFacet
        - ObjectReference
    BatchAttachPolicy:
      description: Attaches a policy object to a regular object inside a BatchRead operation. For more information, see AttachPolicy and BatchReadRequest$Operations.
      type: object
      properties:
        PolicyReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that is associated with the policy object.
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: The reference that identifies the object to which the policy will be attached.
      required:
        - PolicyReference
        - ObjectReference
    BatchDetachPolicy:
      description: Detaches the specified policy from the specified directory inside a BatchWrite operation. For more information, see DetachPolicy and BatchWriteRequest$Operations.
      type: object
      properties:
        PolicyReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference that identifies the policy object.
        ObjectReference:
          $ref: "#/components/schemas/ObjectReference"
          description: Reference that identifies the object whose policy object will be detached.
      required:
        - PolicyReference
        - ObjectReference
    BatchCreateIndex:
      description: Creates an index object inside of a BatchRead operation. For more information, see CreateIndex and BatchReadRequest$Operations.
      type: object
      properties:
        OrderedIndexedAttributeList:
          $ref: "#/components/schemas/AttributeKeyList"
          description: Specifies the attributes that should be indexed on. Currently only a single attribute is supported.
        IsUnique:
          $ref: "#/components/schemas/Bool"
          description: Indicates whether the attribute that is being indexed has unique values or not.
        ParentReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the parent object that contains the index object.
        LinkName:
          $ref: "#/components/schemas/LinkName"
          description: The name of the link between the parent object and the index object.
        BatchReferenceName:
          $ref: "#/components/schemas/BatchReferenceName"
          description: The batch reference name. See Transaction Support for more information.
      required:
        - OrderedIndexedAttributeList
        - IsUnique
    AttributeKeyList:
      type: array
      items:
        $ref: "#/components/schemas/AttributeKey"
    Bool:
      type: boolean
    BatchAttachToIndex:
      description: Attaches the specified object to the specified index inside a BatchRead operation. For more information, see AttachToIndex and BatchReadRequest$Operations.
      type: object
      properties:
        IndexReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the index that you are attaching the object to.
        TargetReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the object that you are attaching to the index.
      required:
        - IndexReference
        - TargetReference
    BatchDetachFromIndex:
      description: Detaches the specified object from the specified index inside a BatchRead operation. For more information, see DetachFromIndex and BatchReadRequest$Operations.
      type: object
      properties:
        IndexReference:
          $ref: "#/components/schemas/ObjectReference"
          description: A reference to the index object.
        TargetReference:
          $ref: "#/components/schemas/ObjectReference"
