          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResult"
  /PutContactPolicy:
    post:
      operationId: PutContactPolicy
      description: Adds a resource policy to the specified contact or escalation plan. The resource policy is used to share the contact or escalation plan using Resource Access Manager (RAM). For more information about cross-account sharing, see Setting up cross-account functionality.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.PutContactPolicy
            default: SSMContacts.PutContactPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactArn:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact or escalation plan.
                Policy:
                  $ref: "#/components/schemas/Policy"
                  description: Details of the resource policy.
              required:
                - ContactArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutContactPolicyResult"
  /SendActivationCode:
    post:
      operationId: SendActivationCode
      description: Sends an activation code to a contact channel. The contact can use this code to activate the contact channel in the console or with the ActivateChannel operation. Incident Manager can't engage a contact channel until it has been activated.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.SendActivationCode
