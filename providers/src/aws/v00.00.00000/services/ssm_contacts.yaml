          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact you are retrieving engagements for.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The pagination token to continue to the next page of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of engagements to contact channels to list per page of results.
              required:
                - ContactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPagesByContactResult"
  /ListPagesByEngagement:
    post:
      operationId: ListPagesByEngagement
      description: Lists the engagements to contact channels that occurred by engaging a contact.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListPagesByEngagement
            default: SSMContacts.ListPagesByEngagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EngagementId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the engagement.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The pagination token to continue to the next page of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of engagements to contact channels to list per page of results.
              required:
                - EngagementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPagesByEngagementResult"
  /ListPreviewRotationShifts:
    post:
      operationId: ListPreviewRotationShifts
      description: Returns a list of shifts based on rotation configuration parameters. The Incident Manager primarily uses this operation to populate the Preview calendar. It is not typically run by end users.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListPreviewRotationShifts
            default: SSMContacts.ListPreviewRotationShifts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationStartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time a rotation would begin. The first shift is calculated from this date and time.
                StartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: Used to filter the range of calculated shifts before sending the response back to the user.
                EndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time a rotation shift would end.
                Members:
                  $ref: "#/components/schemas/RotationPreviewMemberList"
                  description: The contacts that would be assigned to a rotation.
                TimeZoneId:
                  $ref: "#/components/schemas/TimeZoneId"
                  description: 'The time zone the rotation’s activity would be based on, in Internet Assigned Numbers Authority (IANA) format. For example: "America/Los_Angeles", "UTC", or "Asia/Seoul".'
                Recurrence:
                  $ref: "#/components/schemas/RecurrenceSettings"
                  description: Information about how long a rotation would last before restarting at the beginning of the shift order.
                Overrides:
                  $ref: "#/components/schemas/OverrideList"
                  description: Information about changes that would be made in a rotation override.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A token to start the list. This token is used to get the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return for this call. The call also returns a token that can be specified in a subsequent call to get the next set of results.
              required:
                - EndTime
                - Members
                - TimeZoneId
                - Recurrence
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPreviewRotationShiftsResult"
  /ListRotationOverrides:
    post:
      operationId: ListRotationOverrides
