                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the rotation to retrieve information about.
                StartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time for the beginning of a time range for listing overrides.
                EndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time for the end of a time range for listing overrides.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A token to start the list. Use this token to get the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
              required:
                - RotationId
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRotationOverridesResult"
  /ListRotationShifts:
    post:
      operationId: ListRotationShifts
