            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the rotation to retrieve shift information about.
                StartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time for the beginning of the time range to list shifts for.
                EndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time for the end of the time range to list shifts for.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A token to start the list. Use this token to get the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
              required:
                - RotationId
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRotationShiftsResult"
  /ListRotations:
    post:
      operationId: ListRotations
      description: Retrieves a list of on-call rotations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListRotations
            default: SSMContacts.ListRotations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationNamePrefix:
                  $ref: "#/components/schemas/RotationName"
                  description: A filter to include rotations in list results based on their common prefix. For example, entering prod returns a list of all rotation names that begin with prod, such as production and prod-1.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: A token to start the list. Use this token to get the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRotationsResult"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags of a contact, escalation plan, rotation, or on-call schedule.
