      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the contact or escalation plan.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The key of the tag that you want to remove.
              required:
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResult"
  /UpdateContact:
    post:
      operationId: UpdateContact
      description: Updates the contact or escalation plan specified.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.UpdateContact
            default: SSMContacts.UpdateContact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact or escalation plan you're updating.
                DisplayName:
                  $ref: "#/components/schemas/ContactName"
                  description: The full name of the contact or escalation plan.
                Plan:
                  $ref: "#/components/schemas/Plan"
                  description: A list of stages. A contact has an engagement plan with stages for specified contact channels. An escalation plan uses these stages to contact specified contacts.
              required:
                - ContactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContactResult"
  /UpdateContactChannel:
    post:
      operationId: UpdateContactChannel
      description: Updates a contact's contact channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.UpdateContactChannel
            default: SSMContacts.UpdateContactChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact channel you want to update.
                Name:
                  $ref: "#/components/schemas/ChannelName"
                  description: The name of the contact channel.
                DeliveryAddress:
                  $ref: "#/components/schemas/ContactChannelAddress"
                  description: The details that Incident Manager uses when trying to engage the contact channel.
              required:
                - ContactChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateContactChannelResult"
  /UpdateRotation:
    post:
      operationId: UpdateRotation
      description: Updates the information specified for an on-call rotation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.UpdateRotation
            default: SSMContacts.UpdateRotation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the rotation to update.
                ContactIds:
                  $ref: "#/components/schemas/RotationContactsArnList"
                  description: The Amazon Resource Names (ARNs) of the contacts to include in the updated rotation. Only the PERSONAL contact type is supported. The contact types ESCALATION and ONCALL_SCHEDULE are not supported for this operation. The order in which you list the contacts is their shift order in the rotation schedule.
                StartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time the rotation goes into effect.
                TimeZoneId:
                  $ref: "#/components/schemas/TimeZoneId"
                  description: "The time zone to base the updated rotation’s activity on, in Internet Assigned Numbers Authority (IANA) format. For example: \"America/Los_Angeles\", \"UTC\", or \"Asia/Seoul\". For more information, see the Time Zone Database on the IANA website. Designators for time zones that don’t support Daylight Savings Time Rules, such as Pacific Standard Time (PST), aren't supported."
                Recurrence:
                  $ref: "#/components/schemas/RecurrenceSettings"
                  description: Information about how long the updated rotation lasts before restarting at the beginning of the shift order.
              required:
                - RotationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRotationResult"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SsmContactsArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:(aws|aws-cn|aws-us-gov):ssm-contacts:[-\w+=\/,.@]*:[0-9]+:([\w+=\/,.@:-]+)*
    AcceptType:
      type: string
      enum:
        - DELIVERED
        - READ
    ReceiptInfo:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^[.\s\S]*$
    AcceptCode:
      type: string
      minLength: 6
      maxLength: 10
      pattern: ^[0-9]*$
    AcceptCodeValidation:
      type: string
      enum:
        - IGNORE
        - ENFORCE
    AcceptPageResult:
      type: object
    ActivationCode:
      type: string
      minLength: 6
      maxLength: 10
      pattern: ^[0-9]*$
    ActivateContactChannelResult:
      type: object
    ContactAlias:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[a-z0-9_\-]*$
    ContactName:
      type: string
      minLength: 0
      maxLength: 255
      pattern: ^[\p{L}\p{Z}\p{N}_.\-]*$
    ContactType:
      type: string
      enum:
        - PERSONAL
        - ESCALATION
        - ONCALL_SCHEDULE
    Plan:
      description: Information about the stages and on-call rotation teams associated with an escalation plan or engagement plan.
      type: object
      properties:
        Stages:
          $ref: "#/components/schemas/StagesList"
          description: A list of stages that the escalation plan or engagement plan uses to engage contacts and contact methods.
        RotationIds:
          $ref: "#/components/schemas/SsmContactsArnList"
          description: The Amazon Resource Names (ARNs) of the on-call rotations associated with the plan.
    StagesList:
      type: array
      items:
        $ref: "#/components/schemas/Stage"
    Stage:
      description: A set amount of time that an escalation plan or engagement plan engages the specified contacts or contact methods.
      type: object
      properties:
        DurationInMinutes:
          $ref: "#/components/schemas/StageDurationInMins"
