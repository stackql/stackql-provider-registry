          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact channel.
              required:
                - ContactChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendActivationCodeResult"
  /StartEngagement:
    post:
      operationId: StartEngagement
      description: Starts an engagement to a contact or escalation plan. The engagement engages each contact specified in the incident.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.StartEngagement
            default: SSMContacts.StartEngagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact being engaged.
                Sender:
                  $ref: "#/components/schemas/Sender"
                  description: The user that started the engagement.
                Subject:
                  $ref: "#/components/schemas/Subject"
                  description: The secure subject of the message that was sent to the contact. Use this field for engagements to VOICE or EMAIL.
                Content:
                  $ref: "#/components/schemas/Content"
                  description: The secure content of the message that was sent to the contact. Use this field for engagements to VOICE or EMAIL.
                PublicSubject:
                  $ref: "#/components/schemas/PublicSubject"
                  description: The insecure subject of the message that was sent to the contact. Use this field for engagements to SMS.
                PublicContent:
                  $ref: "#/components/schemas/PublicContent"
                  description: The insecure content of the message that was sent to the contact. Use this field for engagements to SMS.
                IncidentId:
                  $ref: "#/components/schemas/IncidentId"
                  description: The ARN of the incident that the engagement is part of.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A token ensuring that the operation is called only once with the specified details.
              required:
                - ContactId
                - Sender
                - Subject
                - Content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartEngagementResult"
  /StopEngagement:
    post:
      operationId: StopEngagement
      description: Stops an engagement before it finishes the final stage of the escalation plan or engagement plan. Further contacts aren't engaged.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.StopEngagement
            default: SSMContacts.StopEngagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EngagementId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the engagement.
                Reason:
                  $ref: "#/components/schemas/StopReason"
                  description: The reason that you're stopping the engagement.
              required:
                - EngagementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopEngagementResult"
  /TagResource:
    post:
      operationId: TagResource
      description: Tags a contact or escalation plan. You can tag only contacts and escalation plans in the first region of your replication set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.TagResource
            default: SSMContacts.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon Resource Name (ARN) of the contact or escalation plan.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: A list of tags that you are adding to the contact or escalation plan.
              required:
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResult"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified resource.
