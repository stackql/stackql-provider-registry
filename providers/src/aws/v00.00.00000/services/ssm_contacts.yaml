openapi: 3.0.0
info:
  version: "2021-05-03"
  title: AWS Systems Manager Incident Manager Contacts
  description: AWS Systems Manager Incident Manager Contacts
  x-serviceName: ssm-contacts
  x-serviceAlias: ssm_contacts
  x-protocol: json
  x-apiVersion: "2021-05-03"
  x-endpointPrefix: ssm-contacts
  x-targetPrefix: SSMContacts
  x-jsonVersion: "1.1"
servers:
  - url: https://ssm-contacts.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ssm-contacts
paths:
  /AcceptPage:
    post:
      operationId: AcceptPage
      description: Used to acknowledge an engagement to a contact channel during an incident.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.AcceptPage
            default: SSMContacts.AcceptPage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PageId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the engagement to a contact channel.
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The ARN of the contact channel.
                AcceptType:
                  $ref: "#/components/schemas/AcceptType"
                  description: The type indicates if the page was DELIVERED or READ.
                Note:
                  $ref: "#/components/schemas/ReceiptInfo"
                  description: Information provided by the user when the user acknowledges the page.
                AcceptCode:
                  $ref: "#/components/schemas/AcceptCode"
                  description: A 6-digit code used to acknowledge the page.
                AcceptCodeValidation:
                  $ref: "#/components/schemas/AcceptCodeValidation"
                  description: An optional field that Incident Manager uses to ENFORCE AcceptCode validation when acknowledging an page. Acknowledgement can occur by replying to a page, or when entering the AcceptCode in the console. Enforcing AcceptCode validation causes Incident Manager to verify that the code entered by the user matches the code sent by Incident Manager with the page. Incident Manager can also IGNORE AcceptCode validation. Ignoring AcceptCode validation causes Incident Manager to accept any value entered for the AcceptCode.
              required:
                - PageId
                - AcceptType
                - AcceptCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptPageResult"
  /ActivateContactChannel:
    post:
      operationId: ActivateContactChannel
      description: Activates a contact's contact channel. Incident Manager can't engage a contact until the contact channel has been activated.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ActivateContactChannel
            default: SSMContacts.ActivateContactChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact channel.
                ActivationCode:
                  $ref: "#/components/schemas/ActivationCode"
                  description: The code sent to the contact channel when it was created in the contact.
              required:
                - ContactChannelId
                - ActivationCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateContactChannelResult"
  /CreateContact:
    post:
      operationId: CreateContact
      description: Contacts are either the contacts that Incident Manager engages during an incident or the escalation plans that Incident Manager uses to engage contacts in phases during an incident.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.CreateContact
            default: SSMContacts.CreateContact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Alias:
                  $ref: "#/components/schemas/ContactAlias"
                  description: The short name to quickly identify a contact or escalation plan. The contact alias must be unique and identifiable.
                DisplayName:
                  $ref: "#/components/schemas/ContactName"
                  description: The full name of the contact or escalation plan.
                Type:
                  $ref: "#/components/schemas/ContactType"
                  description: "The type of contact to create. PERSONAL: A single, individual contact. ESCALATION: An escalation plan. ONCALL_SCHEDULE: An on-call schedule."
                Plan:
                  $ref: "#/components/schemas/Plan"
                  description: A list of stages. A contact has an engagement plan with stages that contact specified contact channels. An escalation plan uses stages that contact specified contacts.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: Adds a tag to the target. You can only tag resources created in the first Region of your replication set.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A token ensuring that the operation is called only once with the specified details.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContactResult"
  /CreateContactChannel:
    post:
      operationId: CreateContactChannel
      description: A contact channel is the method that Incident Manager uses to engage your contact.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.CreateContactChannel
            default: SSMContacts.CreateContactChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact you are adding the contact channel to.
                Name:
                  $ref: "#/components/schemas/ChannelName"
                  description: The name of the contact channel.
                Type:
                  $ref: "#/components/schemas/ChannelType"
                  description: "Incident Manager supports three types of contact channels: SMS VOICE EMAIL"
                DeliveryAddress:
                  $ref: "#/components/schemas/ContactChannelAddress"
                  description: "The details that Incident Manager uses when trying to engage the contact channel. The format is dependent on the type of the contact channel. The following are the expected formats: SMS - '+' followed by the country code and phone number VOICE - '+' followed by the country code and phone number EMAIL - any standard email format"
                DeferActivation:
                  $ref: "#/components/schemas/DeferActivation"
                  description: If you want to activate the channel at a later time, you can choose to defer activation. Incident Manager can't engage your contact channel until it has been activated.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A token ensuring that the operation is called only once with the specified details.
              required:
                - ContactId
                - DeliveryAddress
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContactChannelResult"
  /CreateRotation:
    post:
      operationId: CreateRotation
      description: Creates a rotation in an on-call schedule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.CreateRotation
            default: SSMContacts.CreateRotation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/RotationName"
                  description: The name of the rotation.
                ContactIds:
                  $ref: "#/components/schemas/RotationContactsArnList"
                  description: The Amazon Resource Names (ARNs) of the contacts to add to the rotation. Only the PERSONAL contact type is supported. The contact types ESCALATION and ONCALL_SCHEDULE are not supported for this operation. The order that you list the contacts in is their shift order in the rotation schedule. To change the order of the contact's shifts, use the UpdateRotation operation.
                StartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time that the rotation goes into effect.
                TimeZoneId:
                  $ref: "#/components/schemas/TimeZoneId"
                  description: 'The time zone to base the rotation’s activity on in Internet Assigned Numbers Authority (IANA) format. For example: "America/Los_Angeles", "UTC", or "Asia/Seoul". For more information, see the Time Zone Database on the IANA website. Designators for time zones that don’t support Daylight Savings Time rules, such as Pacific Standard Time (PST), are not supported.'
                Recurrence:
                  $ref: "#/components/schemas/RecurrenceSettings"
                  description: Information about the rule that specifies when a shift's team members rotate.
                Tags:
                  $ref: "#/components/schemas/TagsList"
                  description: Optional metadata to assign to the rotation. Tags enable you to categorize a resource in different ways, such as by purpose, owner, or environment. For more information, see Tagging Incident Manager resources in the Incident Manager User Guide.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A token that ensures that the operation is called only once with the specified details.
              required:
                - ContactIds
                - TimeZoneId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRotationResult"
  /CreateRotationOverride:
    post:
      operationId: CreateRotationOverride
      description: Creates an override for a rotation in an on-call schedule.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.CreateRotationOverride
            default: SSMContacts.CreateRotationOverride
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the rotation to create an override for.
                NewContactIds:
                  $ref: "#/components/schemas/RotationOverrideContactsArnList"
                  description: The Amazon Resource Names (ARNs) of the contacts to replace those in the current on-call rotation with. If you want to include any current team members in the override shift, you must include their ARNs in the new contact ID list.
                StartTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time when the override goes into effect.
                EndTime:
                  $ref: "#/components/schemas/DateTime"
                  description: The date and time when the override ends.
                IdempotencyToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A token that ensures that the operation is called only once with the specified details.
              required:
                - RotationId
                - NewContactIds
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRotationOverrideResult"
  /DeactivateContactChannel:
    post:
      operationId: DeactivateContactChannel
      description: To no longer receive Incident Manager engagements to a contact channel, you can deactivate the channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DeactivateContactChannel
            default: SSMContacts.DeactivateContactChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact channel you're deactivating.
              required:
                - ContactChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeactivateContactChannelResult"
  /DeleteContact:
    post:
      operationId: DeleteContact
      description: To remove a contact from Incident Manager, you can delete the contact. However, deleting a contact does not remove it from escalation plans and related response plans. Deleting an escalation plan also does not remove it from all related response plans. To modify an escalation plan, we recommend using the UpdateContact action to specify a different existing contact.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DeleteContact
            default: SSMContacts.DeleteContact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact that you're deleting.
              required:
                - ContactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContactResult"
  /DeleteContactChannel:
    post:
      operationId: DeleteContactChannel
      description: To stop receiving engagements on a contact channel, you can delete the channel from a contact. Deleting the contact channel does not remove it from the contact's engagement plan, but the stage that includes the channel will be ignored. If you delete the only contact channel for a contact, you'll no longer be able to engage that contact during an incident.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DeleteContactChannel
            default: SSMContacts.DeleteContactChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact channel.
              required:
                - ContactChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContactChannelResult"
  /DeleteRotation:
    post:
      operationId: DeleteRotation
      description: Deletes a rotation from the system. If a rotation belongs to more than one on-call schedule, this operation deletes it from all of them.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DeleteRotation
            default: SSMContacts.DeleteRotation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the on-call rotation to delete.
              required:
                - RotationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRotationResult"
  /DeleteRotationOverride:
    post:
      operationId: DeleteRotationOverride
      description: Deletes an existing override for an on-call rotation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DeleteRotationOverride
            default: SSMContacts.DeleteRotationOverride
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the rotation that was overridden.
                RotationOverrideId:
                  $ref: "#/components/schemas/Uuid"
                  description: The Amazon Resource Name (ARN) of the on-call rotation override to delete.
              required:
                - RotationId
                - RotationOverrideId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRotationOverrideResult"
  /DescribeEngagement:
    post:
      operationId: DescribeEngagement
      description: Incident Manager uses engagements to engage contacts and escalation plans during an incident. Use this command to describe the engagement that occurred during an incident.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DescribeEngagement
            default: SSMContacts.DescribeEngagement
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EngagementId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the engagement you want the details of.
              required:
                - EngagementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEngagementResult"
  /DescribePage:
    post:
      operationId: DescribePage
      description: Lists details of the engagement to a contact channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.DescribePage
            default: SSMContacts.DescribePage
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PageId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The ID of the engagement to a contact channel.
              required:
                - PageId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePageResult"
  /GetContact:
    post:
      operationId: GetContact
      description: Retrieves information about the specified contact or escalation plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.GetContact
            default: SSMContacts.GetContact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact or escalation plan.
              required:
                - ContactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContactResult"
  /GetContactChannel:
    post:
      operationId: GetContactChannel
      description: List details about a specific contact channel.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.GetContactChannel
            default: SSMContacts.GetContactChannel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactChannelId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact channel you want information about.
              required:
                - ContactChannelId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContactChannelResult"
  /GetContactPolicy:
    post:
      operationId: GetContactPolicy
      description: Retrieves the resource policies attached to the specified contact or escalation plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.GetContactPolicy
            default: SSMContacts.GetContactPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactArn:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact or escalation plan.
              required:
                - ContactArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContactPolicyResult"
  /GetRotation:
    post:
      operationId: GetRotation
      description: Retrieves information about an on-call rotation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.GetRotation
            default: SSMContacts.GetRotation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the on-call rotation to retrieve information about.
              required:
                - RotationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRotationResult"
  /GetRotationOverride:
    post:
      operationId: GetRotationOverride
      description: Retrieves information about an override to an on-call rotation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.GetRotationOverride
            default: SSMContacts.GetRotationOverride
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                RotationId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the overridden rotation to retrieve information about.
                RotationOverrideId:
                  $ref: "#/components/schemas/Uuid"
                  description: The Amazon Resource Name (ARN) of the on-call rotation override to retrieve information about.
              required:
                - RotationId
                - RotationOverrideId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRotationOverrideResult"
  /ListContactChannels:
    post:
      operationId: ListContactChannels
      description: Lists all contact channels for the specified contact.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListContactChannels
            default: SSMContacts.ListContactChannels
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContactId:
                  $ref: "#/components/schemas/SsmContactsArn"
                  description: The Amazon Resource Name (ARN) of the contact.
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The pagination token to continue to the next page of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of contact channels per page.
              required:
                - ContactId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContactChannelsResult"
  /ListContacts:
    post:
      operationId: ListContacts
      description: Lists all contacts and escalation plans in Incident Manager.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListContacts
            default: SSMContacts.ListContacts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The pagination token to continue to the next page of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of contacts and escalation plans per page of results.
                AliasPrefix:
                  $ref: "#/components/schemas/ContactAlias"
                  description: Used to list only contacts who's aliases start with the specified prefix.
                Type:
                  $ref: "#/components/schemas/ContactType"
                  description: The type of contact.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContactsResult"
  /ListEngagements:
    post:
      operationId: ListEngagements
      description: Lists all engagements that have happened in an incident.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListEngagements
            default: SSMContacts.ListEngagements
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: The pagination token to continue to the next page of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of engagements per page of results.
                IncidentId:
                  $ref: "#/components/schemas/IncidentId"
                  description: The Amazon Resource Name (ARN) of the incident you're listing engagements for.
                TimeRangeValue:
                  $ref: "#/components/schemas/TimeRange"
                  description: The time range to lists engagements for an incident.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEngagementsResult"
  /ListPageReceipts:
    post:
      operationId: ListPageReceipts
      description: Lists all of the engagements to contact channels that have been acknowledged.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SSMContacts.ListPageReceipts
            default: SSMContacts.ListPageReceipts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                PageId:
                  $ref: "#/components/schemas/SsmContactsArn"
