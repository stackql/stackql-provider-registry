openapi: 3.0.0
info:
  version: "2018-02-27"
  title: AWS Performance Insights
  description: AWS Performance Insights
  x-serviceName: pi
  x-serviceAlias: pi
  x-protocol: json
  x-apiVersion: "2018-02-27"
  x-endpointPrefix: pi
  x-targetPrefix: PerformanceInsightsv20180227
  x-jsonVersion: "1.1"
servers:
  - url: https://pi.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pi
paths:
  /CreatePerformanceAnalysisReport:
    post:
      operationId: CreatePerformanceAnalysisReport
      description: Creates a new performance analysis report for a specific time period for the DB instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.CreatePerformanceAnalysisReport
            default: PerformanceInsightsv20180227.CreatePerformanceAnalysisReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights will return metrics. Valid value is RDS.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable, Amazon Web Services Region-unique identifier for a data source. Performance Insights gathers metrics from this data source. To use an Amazon RDS instance as a data source, you specify its DbiResourceId value. For example, specify db-ADECBTYHKTSAUMUZQYPDS2GW4A.
                StartTime:
                  $ref: "#/components/schemas/ISOTimestamp"
                  description: The start time defined for the analysis report.
                EndTime:
                  $ref: "#/components/schemas/ISOTimestamp"
                  description: The end time defined for the analysis report.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata assigned to the analysis report consisting of a key-value pair.
              required:
                - ServiceType
                - Identifier
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePerformanceAnalysisReportResponse"
  /DeletePerformanceAnalysisReport:
    post:
      operationId: DeletePerformanceAnalysisReport
      description: Deletes a performance analysis report.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.DeletePerformanceAnalysisReport
            default: PerformanceInsightsv20180227.DeletePerformanceAnalysisReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights will return metrics. Valid value is RDS.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. In the console, the identifier is shown as ResourceID. When you call DescribeDBInstances, the identifier is returned as DbiResourceId. To use a DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
                AnalysisReportId:
                  $ref: "#/components/schemas/AnalysisReportId"
                  description: The unique identifier of the analysis report for deletion.
              required:
                - ServiceType
                - Identifier
                - AnalysisReportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePerformanceAnalysisReportResponse"
  /DescribeDimensionKeys:
    post:
      operationId: DescribeDimensionKeys
      description: For a specific time period, retrieve the top N dimension keys for a metric. Each response element returns a maximum of 500 bytes. For larger elements, such as SQL statements, only the first 500 bytes are returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.DescribeDimensionKeys
            default: PerformanceInsightsv20180227.DescribeDimensionKeys
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: "The Amazon Web Services service for which Performance Insights will return metrics. Valid values are as follows: RDS DOCDB"
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable, Amazon Web Services Region-unique identifier for a data source. Performance Insights gathers metrics from this data source. To use an Amazon RDS instance as a data source, you specify its DbiResourceId value. For example, specify db-FAIHNTYBKTGAUSUZQYPDS2GW4A.
                StartTime:
                  $ref: "#/components/schemas/ISOTimestamp"
                  description: The date and time specifying the beginning of the requested time series data. You must specify a StartTime within the past 7 days. The value specified is inclusive, which means that data points equal to or greater than StartTime are returned. The value for StartTime must be earlier than the value for EndTime.
                EndTime:
                  $ref: "#/components/schemas/ISOTimestamp"
                  description: The date and time specifying the end of the requested time series data. The value specified is exclusive, which means that data points less than (but not equal to) EndTime are returned. The value for EndTime must be later than the value for StartTime.
                Metric:
                  $ref: "#/components/schemas/RequestString"
                  description: "The name of a Performance Insights metric to be measured. Valid values for Metric are: db.load.avg - A scaled representation of the number of active sessions for the database engine. db.sampledload.avg - The raw number of active sessions for the database engine. If the number of active sessions is less than an internal Performance Insights threshold, db.load.avg and db.sampledload.avg are the same value. If the number of active sessions is greater than the internal threshold, Performance Insights samples the active sessions, with db.load.avg showing the scaled values, db.sampledload.avg showing the raw values, and db.sampledload.avg less than db.load.avg. For most use cases, you can query db.load.avg only."
                PeriodInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: "The granularity, in seconds, of the data points returned from Performance Insights. A period can be as short as one second, or as long as one day (86400 seconds). Valid values are: 1 (one second) 60 (one minute) 300 (five minutes) 3600 (one hour) 86400 (twenty-four hours) If you don't specify PeriodInSeconds, then Performance Insights chooses a value for you, with a goal of returning roughly 100-200 data points in the response."
                GroupBy:
                  $ref: "#/components/schemas/DimensionGroup"
                  description: A specification for how to aggregate the data points from a query result. You must specify a valid dimension group. Performance Insights returns all dimensions within this group, unless you provide the names of specific dimensions within this group. You can also request that Performance Insights return a limited number of values for a dimension.
                AdditionalMetrics:
                  $ref: "#/components/schemas/AdditionalMetricsList"
                  description: 'Additional metrics for the top N dimension keys. If the specified dimension group in the GroupBy parameter is db.sql_tokenized, you can specify per-SQL metrics to get the values for the top N SQL digests. The response syntax is as follows: "AdditionalMetrics" : { "string" : "string" }. The only supported statistic function is .avg.'
                PartitionBy:
                  $ref: "#/components/schemas/DimensionGroup"
                  description: For each dimension specified in GroupBy, specify a secondary dimension to further subdivide the partition keys in the response.
                Filter:
                  $ref: "#/components/schemas/MetricQueryFilterMap"
                  description: "One or more filters to apply in the request. Restrictions: Any number of filters by the same dimension, as specified in the GroupBy or Partition parameters. A single filter for any other dimension in this dimension group. The db.sql.db_id filter isn't available for RDS for SQL Server DB instances."
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return in the response. If more items exist than the specified MaxRecords value, a pagination token is included in the response so that the remaining results can be retrieved.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxRecords.
              required:
                - ServiceType
                - Identifier
                - StartTime
                - EndTime
                - Metric
                - GroupBy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDimensionKeysResponse"
  /GetDimensionKeyDetails:
    post:
      operationId: GetDimensionKeyDetails
      description: Get the attributes of the specified dimension group for a DB instance or data source. For example, if you specify a SQL ID, GetDimensionKeyDetails retrieves the full text of the dimension db.sql.statement associated with this ID. This operation is useful because GetResourceMetrics and DescribeDimensionKeys don't support retrieval of large SQL statement text, lock snapshots, and execution plans.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.GetDimensionKeyDetails
            default: PerformanceInsightsv20180227.GetDimensionKeyDetails
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights returns data. The only valid value is RDS.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: The ID for a data source from which to gather dimension data. This ID must be immutable and unique within an Amazon Web Services Region. When a DB instance is the data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
                Group:
                  $ref: "#/components/schemas/RequestString"
                  description: "The name of the dimension group. Performance Insights searches the specified group for the dimension group ID. The following group name values are valid: db.execution_plan (Amazon RDS and Aurora only) db.lock_snapshot (Aurora only) db.query (Amazon DocumentDB only) db.sql (Amazon RDS and Aurora only)"
                GroupIdentifier:
                  $ref: "#/components/schemas/RequestString"
                  description: "The ID of the dimension group from which to retrieve dimension details. For dimension group db.sql, the group ID is db.sql.id. The following group ID values are valid: db.execution_plan.id for dimension group db.execution_plan (Aurora and RDS only) db.sql.id for dimension group db.sql (Aurora and RDS only) db.query.id for dimension group db.query (DocumentDB only) For the dimension group db.lock_snapshot, the GroupIdentifier is the epoch timestamp when Performance Insights captured the snapshot, in seconds. You can retrieve this value with the GetResourceMetrics operation for a 1 second period."
                RequestedDimensions:
                  $ref: "#/components/schemas/RequestedDimensionList"
                  description: "A list of dimensions to retrieve the detail data for within the given dimension group. If you don't specify this parameter, Performance Insights returns all dimension data within the specified dimension group. Specify dimension names for the following dimension groups: db.execution_plan - Specify the dimension name db.execution_plan.raw_plan or the short dimension name raw_plan (Amazon RDS and Aurora only) db.lock_snapshot - Specify the dimension name db.lock_snapshot.lock_trees or the short dimension name lock_trees. (Aurora only) db.sql - Specify either the full dimension name db.sql.statement or the short dimension name statement (Aurora and RDS only). db.query - Specify either the full dimension name db.query.statement or the short dimension name statement (DocumentDB only)."
              required:
                - ServiceType
                - Identifier
                - Group
                - GroupIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDimensionKeyDetailsResponse"
  /GetPerformanceAnalysisReport:
    post:
      operationId: GetPerformanceAnalysisReport
      description: Retrieves the report including the report ID, status, time details, and the insights with recommendations. The report status can be RUNNING, SUCCEEDED, or FAILED. The insights include the description and recommendation fields.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.GetPerformanceAnalysisReport
            default: PerformanceInsightsv20180227.GetPerformanceAnalysisReport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights will return metrics. Valid value is RDS.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. In the console, the identifier is shown as ResourceID. When you call DescribeDBInstances, the identifier is returned as DbiResourceId. To use a DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
                AnalysisReportId:
                  $ref: "#/components/schemas/AnalysisReportId"
                  description: A unique identifier of the created analysis report. For example, report-12345678901234567
                TextFormat:
                  $ref: "#/components/schemas/TextFormat"
                  description: Indicates the text format in the report. The options are PLAIN_TEXT or MARKDOWN. The default value is plain text.
                AcceptLanguage:
                  $ref: "#/components/schemas/AcceptLanguage"
                  description: The text language in the report. The default language is EN_US (English).
              required:
                - ServiceType
                - Identifier
                - AnalysisReportId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPerformanceAnalysisReportResponse"
  /GetResourceMetadata:
    post:
      operationId: GetResourceMetadata
      description: Retrieve the metadata for different features. For example, the metadata might indicate that a feature is turned on or off on a specific DB instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.GetResourceMetadata
            default: PerformanceInsightsv20180227.GetResourceMetadata
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights returns metrics.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. To use a DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
              required:
                - ServiceType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceMetadataResponse"
  /GetResourceMetrics:
    post:
      operationId: GetResourceMetrics
      description: Retrieve Performance Insights metrics for a set of data sources over a time period. You can provide specific dimension groups and dimensions, and provide filtering criteria for each group. You must specify an aggregate function for each metric. Each response element returns a maximum of 500 bytes. For larger elements, such as SQL statements, only the first 500 bytes are returned.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.GetResourceMetrics
            default: PerformanceInsightsv20180227.GetResourceMetrics
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: "The Amazon Web Services service for which Performance Insights returns metrics. Valid values are as follows: RDS DOCDB"
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. In the console, the identifier is shown as ResourceID. When you call DescribeDBInstances, the identifier is returned as DbiResourceId. To use a DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
                MetricQueries:
                  $ref: "#/components/schemas/MetricQueryList"
                  description: An array of one or more queries to perform. Each query must specify a Performance Insights metric and specify an aggregate function, and you can provide filtering criteria. You must append the aggregate function to the metric. For example, to find the average for the metric db.load you must use db.load.avg. Valid values for aggregate functions include .avg, .min, .max, and .sum.
                StartTime:
                  $ref: "#/components/schemas/ISOTimestamp"
                  description: The date and time specifying the beginning of the requested time series query range. You can't specify a StartTime that is earlier than 7 days ago. By default, Performance Insights has 7 days of retention, but you can extend this range up to 2 years. The value specified is inclusive. Thus, the command returns data points equal to or greater than StartTime. The value for StartTime must be earlier than the value for EndTime.
                EndTime:
                  $ref: "#/components/schemas/ISOTimestamp"
                  description: The date and time specifying the end of the requested time series query range. The value specified is exclusive. Thus, the command returns data points less than (but not equal to) EndTime. The value for EndTime must be later than the value for StartTime.
                PeriodInSeconds:
                  $ref: "#/components/schemas/Integer"
                  description: "The granularity, in seconds, of the data points returned from Performance Insights. A period can be as short as one second, or as long as one day (86400 seconds). Valid values are: 1 (one second) 60 (one minute) 300 (five minutes) 3600 (one hour) 86400 (twenty-four hours) If you don't specify PeriodInSeconds, then Performance Insights will choose a value for you, with a goal of returning roughly 100-200 data points in the response."
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return in the response.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxRecords.
                PeriodAlignment:
                  $ref: "#/components/schemas/PeriodAlignment"
                  description: The returned timestamp which is the start or end time of the time periods. The default value is END_TIME.
              required:
                - ServiceType
                - MetricQueries
                - StartTime
                - EndTime
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceMetricsResponse"
  /ListAvailableResourceDimensions:
    post:
      operationId: ListAvailableResourceDimensions
      description: Retrieve the dimensions that can be queried for each specified metric type on a specified DB instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.ListAvailableResourceDimensions
            default: PerformanceInsightsv20180227.ListAvailableResourceDimensions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights returns metrics.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique within an Amazon Web Services Region. Performance Insights gathers metrics from this data source. To use an Amazon RDS DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VWZ.
                Metrics:
                  $ref: "#/components/schemas/DimensionsMetricList"
                  description: The types of metrics for which to retrieve dimensions. Valid values include db.load.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return in the response. If more items exist than the specified MaxRecords value, a pagination token is included in the response so that the remaining results can be retrieved.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxRecords.
                AuthorizedActions:
                  $ref: "#/components/schemas/AuthorizedActionsList"
                  description: The actions to discover the dimensions you are authorized to access. If you specify multiple actions, then the response will contain the dimensions common for all the actions. When you don't specify this request parameter or provide an empty list, the response contains all the available dimensions for the target database engine whether or not you are authorized to access them.
              required:
                - ServiceType
                - Identifier
                - Metrics
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAvailableResourceDimensionsResponse"
  /ListAvailableResourceMetrics:
    post:
      operationId: ListAvailableResourceMetrics
      description: Retrieve metrics of the specified types that can be queried for a specified DB instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.ListAvailableResourceMetrics
            default: PerformanceInsightsv20180227.ListAvailableResourceMetrics
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights returns metrics.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique within an Amazon Web Services Region. Performance Insights gathers metrics from this data source. To use an Amazon RDS DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VWZ.
                MetricTypes:
                  $ref: "#/components/schemas/MetricTypeList"
                  description: "The types of metrics to return in the response. Valid values in the array include the following: os (OS counter metrics) - All engines db (DB load metrics) - All engines except for Amazon DocumentDB db.sql.stats (per-SQL metrics) - All engines except for Amazon DocumentDB db.sql_tokenized.stats (per-SQL digest metrics) - All engines except for Amazon DocumentDB"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxRecords.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return. If the MaxRecords value is less than the number of existing items, the response includes a pagination token.
              required:
                - ServiceType
                - Identifier
                - MetricTypes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAvailableResourceMetricsResponse"
  /ListPerformanceAnalysisReports:
    post:
      operationId: ListPerformanceAnalysisReports
      description: Lists all the analysis reports created for the DB instance. The reports are sorted based on the start time of each report.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.ListPerformanceAnalysisReports
            default: PerformanceInsightsv20180227.ListPerformanceAnalysisReports
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights returns metrics. Valid value is RDS.
                Identifier:
                  $ref: "#/components/schemas/IdentifierString"
                  description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. In the console, the identifier is shown as ResourceID. When you call DescribeDBInstances, the identifier is returned as DbiResourceId. To use a DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxResults.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of items to return in the response. If more items exist than the specified MaxResults value, a pagination token is included in the response so that the remaining results can be retrieved.
                ListTags:
                  $ref: "#/components/schemas/Boolean"
                  description: Specifies whether or not to include the list of tags in the response.
              required:
                - ServiceType
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPerformanceAnalysisReportsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Retrieves all the metadata tags associated with Amazon RDS Performance Insights resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.ListTagsForResource
            default: PerformanceInsightsv20180227.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: List the tags for the Amazon Web Services service for which Performance Insights returns metrics. Valid value is RDS.
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: Lists all the tags for the Amazon RDS Performance Insights resource. This value is an Amazon Resource Name (ARN). For information about creating an ARN, see Constructing an RDS Amazon Resource Name (ARN).
              required:
                - ServiceType
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds metadata tags to the Amazon RDS Performance Insights resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.TagResource
            default: PerformanceInsightsv20180227.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: The Amazon Web Services service for which Performance Insights returns metrics. Valid value is RDS.
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon RDS Performance Insights resource that the tags are added to. This value is an Amazon Resource Name (ARN). For information about creating an ARN, see Constructing an RDS Amazon Resource Name (ARN).
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The metadata assigned to an Amazon RDS resource consisting of a key-value pair.
              required:
                - ServiceType
                - ResourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Deletes the metadata tags from the Amazon RDS Performance Insights resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PerformanceInsightsv20180227.UntagResource
            default: PerformanceInsightsv20180227.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ServiceType:
                  $ref: "#/components/schemas/ServiceType"
                  description: List the tags for the Amazon Web Services service for which Performance Insights returns metrics. Valid value is RDS.
                ResourceARN:
                  $ref: "#/components/schemas/AmazonResourceName"
                  description: The Amazon RDS Performance Insights resource that the tags are added to. This value is an Amazon Resource Name (ARN). For information about creating an ARN, see Constructing an RDS Amazon Resource Name (ARN).
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The metadata assigned to an Amazon RDS Performance Insights resource consisting of a key-value pair.
              required:
                - ServiceType
                - ResourceARN
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ServiceType:
      type: string
      enum:
        - RDS
        - DOCDB
    IdentifierString:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^[a-zA-Z0-9-]+$
    ISOTimestamp:
      type: string
      format: date-time
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to an Amazon RDS resource consisting of a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "A key is the required name of the tag. The string value can be from 1 to 128 Unicode characters in length and can't be prefixed with aws: or rds:. The string can only contain only the set of Unicode letters, digits, white-space, '_', '.', ':', '/', '=', '+', '-', '@' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-@]*)$\")."
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "A value is the optional value of the tag. The string value can be from 1 to 256 Unicode characters in length and can't be prefixed with aws: or rds:. The string can only contain only the set of Unicode letters, digits, white-space, '_', '.', ':', '/', '=', '+', '-', '@' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-@]*)$\")."
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^.*$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^.*$
    CreatePerformanceAnalysisReportResponse:
      type: object
      properties:
        AnalysisReportId:
          $ref: "#/components/schemas/AnalysisReportId"
          description: A unique identifier for the created analysis report.
    AnalysisReportId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: report-[0-9a-f]{17}
    DeletePerformanceAnalysisReportResponse:
      type: object
    RequestString:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*\S.*
    Integer:
      type: integer
    DimensionGroup:
      description: "A logical grouping of Performance Insights metrics for a related subject area. For example, the db.sql dimension group consists of the following dimensions: db.sql.id - The hash of a running SQL statement, generated by Performance Insights. db.sql.db_id - Either the SQL ID generated by the database engine, or a value generated by Performance Insights that begins with pi-. db.sql.statement - The full text of the SQL statement that is running, for example, SELECT * FROM employees. db.sql_tokenized.id - The hash of the SQL digest generated by Performance Insights. Each response element returns a maximum of 500 bytes. For larger elements, such as SQL statements, only the first 500 bytes are returned."
      type: object
      properties:
        Group:
          $ref: "#/components/schemas/SanitizedString"
          description: "The name of the dimension group. Valid values are as follows: db - The name of the database to which the client is connected. The following values are permitted: Aurora PostgreSQL Amazon RDS PostgreSQL Aurora MySQL Amazon RDS MySQL Amazon RDS MariaDB Amazon DocumentDB db.application - The name of the application that is connected to the database. The following values are permitted: Aurora PostgreSQL Amazon RDS PostgreSQL Amazon DocumentDB db.blocking_sql - The SQL queries blocking the most DB load. db.blocking_session - The sessions blocking the most DB load. db.blocking_object - The object resources acquired by other sessions that are blocking the most DB load. db.host - The host name of the connected client (all engines). db.plans - The execution plans for the query (only Aurora PostgreSQL). db.query - The query that is currently running (only Amazon DocumentDB). db.query_tokenized - The digest query (only Amazon DocumentDB). db.session_type - The type of the current session (only Aurora PostgreSQL and RDS PostgreSQL). db.sql - The text of the SQL statement that is currently running (all engines except Amazon DocumentDB). db.sql_tokenized - The SQL digest (all engines except Amazon DocumentDB). db.user - The user logged in to the database (all engines except Amazon DocumentDB). db.wait_event - The event for which the database backend is waiting (all engines except Amazon DocumentDB). db.wait_event_type - The type of event for which the database backend is waiting (all engines except Amazon DocumentDB). db.wait_state - The event for which the database backend is waiting (only Amazon DocumentDB)."
        Dimensions:
          $ref: "#/components/schemas/SanitizedStringList"
          description: "A list of specific dimensions from a dimension group. If this parameter is not present, then it signifies that all of the dimensions in the group were requested, or are present in the response. Valid values for elements in the Dimensions array are: db.application.name - The name of the application that is connected to the database. Valid values are as follows: Aurora PostgreSQL Amazon RDS PostgreSQL Amazon DocumentDB db.blocking_sql.id - The ID for each of the SQL queries blocking the most DB load. db.blocking_sql.sql - The SQL text for each of the SQL queries blocking the most DB load. db.blocking_session.id - The ID for each of the sessions blocking the most DB load. db.blocking_object.id - The ID for each of the object resources acquired by other sessions that are blocking the most DB load. db.blocking_object.type - The object type for each of the object resources acquired by other sessions that are blocking the most DB load. db.blocking_object.value - The value for each of the object resources acquired by other sessions that are blocking the most DB load. db.host.id - The host ID of the connected client (all engines). db.host.name - The host name of the connected client (all engines). db.name - The name of the database to which the client is connected. Valid values are as follows: Aurora PostgreSQL Amazon RDS PostgreSQL Aurora MySQL Amazon RDS MySQL Amazon RDS MariaDB Amazon DocumentDB db.query.id - The query ID generated by Performance Insights (only Amazon DocumentDB). db.query.db_id - The query ID generated by the database (only Amazon DocumentDB). db.query.statement - The text of the query that is being run (only Amazon DocumentDB). db.query.tokenized_id db.query.tokenized.id - The query digest ID generated by Performance Insights (only Amazon DocumentDB). db.query.tokenized.db_id - The query digest ID generated by Performance Insights (only Amazon DocumentDB). db.query.tokenized.statement - The text of the query digest (only Amazon DocumentDB). db.session_type.name - The type of the current session (only Amazon DocumentDB). db.sql.id - The hash of the full, non-tokenized SQL statement generated by Performance Insights (all engines except Amazon DocumentDB). db.sql.db_id - Either the SQL ID generated by the database engine, or a value generated by Performance Insights that begins with pi- (all engines except Amazon DocumentDB). db.sql.statement - The full text of the SQL statement that is running, as in SELECT * FROM employees (all engines except Amazon DocumentDB) db.sql.tokenized_id - The hash of the SQL digest generated by Performance Insights (all engines except Amazon DocumentDB). The db.sql.tokenized_id dimension fetches the value of the db.sql_tokenized.id dimension. Amazon RDS returns db.sql.tokenized_id from the db.sql dimension group. db.sql_tokenized.id - The hash of the SQL digest generated by Performance Insights (all engines except Amazon DocumentDB). In the console, db.sql_tokenized.id is called the Support ID because Amazon Web Services Support can look at this data to help you troubleshoot database issues. db.sql_tokenized.db_id - Either the native database ID used to refer to the SQL statement, or a synthetic ID such as pi-2372568224 that Performance Insights generates if the native database ID isn't available (all engines except Amazon DocumentDB). db.sql_tokenized.statement - The text of the SQL digest, as in SELECT * FROM employees WHERE employee_id = ? (all engines except Amazon DocumentDB) db.user.id - The ID of the user logged in to the database (all engines except Amazon DocumentDB). db.user.name - The name of the user logged in to the database (all engines except Amazon DocumentDB). db.wait_event.name - The event for which the backend is waiting (all engines except Amazon DocumentDB). db.wait_event.type - The type of event for which the backend is waiting (all engines except Amazon DocumentDB). db.wait_event_type.name - The name of the event type for which the backend is waiting (all engines except Amazon DocumentDB). db.wait_state.name - The event for which the backend is waiting (only Amazon DocumentDB)."
        Limit:
          $ref: "#/components/schemas/Limit"
          description: The maximum number of items to fetch for this dimension group.
      required:
        - Group
    SanitizedString:
      description: A generic string type that forbids characters that could expose our service (or services downstream) to security risks around injections.
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^[a-zA-Z0-9-_\.:/*)( ]+$
    SanitizedStringList:
      type: array
      items:
        $ref: "#/components/schemas/SanitizedString"
    Limit:
      type: integer
      minimum: 1
      maximum: 25
    AdditionalMetricsList:
      type: array
      items:
        $ref: "#/components/schemas/SanitizedString"
    MetricQueryFilterMap:
      type: object
      properties: {}
    MaxResults:
      type: integer
      minimum: 0
      maximum: 25
    NextToken:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: ^[a-zA-Z0-9_=-]+$
    DescribeDimensionKeysResponse:
      type: object
      properties:
        AlignedStartTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The start time for the returned dimension keys, after alignment to a granular boundary (as specified by PeriodInSeconds). AlignedStartTime will be less than or equal to the value of the user-specified StartTime.
        AlignedEndTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The end time for the returned dimension keys, after alignment to a granular boundary (as specified by PeriodInSeconds). AlignedEndTime will be greater than or equal to the value of the user-specified Endtime.
        PartitionKeys:
          $ref: "#/components/schemas/ResponsePartitionKeyList"
          description: If PartitionBy was present in the request, PartitionKeys contains the breakdown of dimension keys by the specified partitions.
        Keys:
          $ref: "#/components/schemas/DimensionKeyDescriptionList"
          description: The dimension keys that were requested.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: A pagination token that indicates the response didn’t return all available records because MaxRecords was specified in the previous request. To get the remaining records, specify NextToken in a separate request with this value.
    ResponsePartitionKeyList:
      type: array
      items:
        $ref: "#/components/schemas/ResponsePartitionKey"
    ResponsePartitionKey:
      description: If PartitionBy was specified in a DescribeDimensionKeys request, the dimensions are returned in an array. Each element in the array specifies one dimension.
      type: object
      properties:
        Dimensions:
          type: object
          properties: {}
          description: A dimension map that contains the dimensions for this partition.
      required:
        - Dimensions
    DimensionKeyDescriptionList:
      type: array
      items:
        $ref: "#/components/schemas/DimensionKeyDescription"
    DimensionKeyDescription:
      description: An object that includes the requested dimension key values and aggregated metric values within a dimension group.
      type: object
      properties:
        Dimensions:
          type: object
          properties: {}
          description: A map of name-value pairs for the dimensions in the group.
        Total:
          $ref: "#/components/schemas/Double"
          description: The aggregated metric value for the dimensions, over the requested time range.
        AdditionalMetrics:
          type: object
          properties: {}
          description: A map that contains the value for each additional metric.
        Partitions:
          $ref: "#/components/schemas/MetricValuesList"
          description: If PartitionBy was specified, PartitionKeys contains the dimensions that were.
    Double:
      type: number
      format: double
    MetricValuesList:
      type: array
      items:
        $ref: "#/components/schemas/Double"
    RequestedDimensionList:
      type: array
      items:
        $ref: "#/components/schemas/SanitizedString"
    GetDimensionKeyDetailsResponse:
      type: object
      properties:
        Dimensions:
          $ref: "#/components/schemas/DimensionKeyDetailList"
          description: The details for the requested dimensions.
    DimensionKeyDetailList:
      type: array
      items:
        $ref: "#/components/schemas/DimensionKeyDetail"
    DimensionKeyDetail:
      description: An object that describes the details for a specified dimension.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/String"
          description: "The value of the dimension detail data. Depending on the return status, this value is either the full or truncated SQL query for the following dimensions: db.query.statement (Amazon DocumentDB) db.sql.statement (Amazon RDS and Aurora)"
        Dimension:
          $ref: "#/components/schemas/String"
          description: "The full name of the dimension. The full name includes the group name and key name. The following values are valid: db.query.statement (Amazon DocumentDB) db.sql.statement (Amazon RDS and Aurora)"
        Status:
          $ref: "#/components/schemas/DetailStatus"
          description: "The status of the dimension detail data. Possible values include the following: AVAILABLE - The dimension detail data is ready to be retrieved. PROCESSING - The dimension detail data isn't ready to be retrieved because more processing time is required. If the requested detail data has the status PROCESSING, Performance Insights returns the truncated query. UNAVAILABLE - The dimension detail data could not be collected successfully."
    String:
      type: string
      minLength: 0
      maxLength: 256
      pattern: .*\S.*
    DetailStatus:
      type: string
      enum:
        - AVAILABLE
        - PROCESSING
        - UNAVAILABLE
    TextFormat:
      type: string
      enum:
        - PLAIN_TEXT
        - MARKDOWN
    AcceptLanguage:
      type: string
      enum:
        - EN_US
    GetPerformanceAnalysisReportResponse:
      type: object
      properties:
        AnalysisReport:
          $ref: "#/components/schemas/AnalysisReport"
          description: The summary of the performance analysis report created for a time period.
    AnalysisReport:
      description: Retrieves the summary of the performance analysis report created for a time period.
      type: object
      properties:
        AnalysisReportId:
          $ref: "#/components/schemas/AnalysisReportId"
          description: The name of the analysis report.
        Identifier:
          $ref: "#/components/schemas/IdentifierString"
          description: The unique identifier of the analysis report.
        ServiceType:
          $ref: "#/components/schemas/ServiceType"
          description: "List the tags for the Amazon Web Services service for which Performance Insights returns metrics. Valid values are as follows: RDS DOCDB"
        CreateTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The time you created the analysis report.
        StartTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The analysis start time in the report.
        EndTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The analysis end time in the report.
        Status:
          $ref: "#/components/schemas/AnalysisStatus"
          description: The status of the created analysis report.
        Insights:
          $ref: "#/components/schemas/InsightList"
          description: The list of identified insights in the analysis report.
      required:
        - AnalysisReportId
    AnalysisStatus:
      type: string
      enum:
        - RUNNING
        - SUCCEEDED
        - FAILED
    InsightList:
      type: array
      items:
        $ref: "#/components/schemas/Insight"
    Insight:
      description: Retrieves the list of performance issues which are identified.
      type: object
      properties:
        InsightId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the insight. For example, insight-12345678901234567.
        InsightType:
          $ref: "#/components/schemas/String"
          description: The type of insight. For example, HighDBLoad, HighCPU, or DominatingSQLs.
        Context:
          $ref: "#/components/schemas/ContextType"
          description: Indicates if the insight is causal or correlated insight.
        StartTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The start time of the insight. For example, 2018-10-30T00:00:00Z.
        EndTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The end time of the insight. For example, 2018-10-30T00:00:00Z.
        Severity:
          $ref: "#/components/schemas/Severity"
          description: "The severity of the insight. The values are: Low, Medium, or High."
        SupportingInsights:
          $ref: "#/components/schemas/InsightList"
          description: List of supporting insights that provide additional factors for the insight.
        Description:
          $ref: "#/components/schemas/MarkdownString"
          description: "Description of the insight. For example: A high severity Insight found between 02:00 to 02:30, where there was an unusually high DB load 600x above baseline. Likely performance impact."
        Recommendations:
          $ref: "#/components/schemas/RecommendationList"
          description: "List of recommendations for the insight. For example, Investigate the following SQLs that contributed to 100% of the total DBLoad during that time period: sql-id."
        InsightData:
          $ref: "#/components/schemas/DataList"
          description: List of data objects containing metrics and references from the time range while generating the insight.
        BaselineData:
          $ref: "#/components/schemas/DataList"
          description: Metric names and values from the timeframe used as baseline to generate the insight.
      required:
        - InsightId
    ContextType:
      type: string
      enum:
        - CAUSAL
        - CONTEXTUAL
    Severity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    MarkdownString:
      type: string
      minLength: 0
      maxLength: 8000
      pattern: (.|\n)*
    RecommendationList:
      type: array
      items:
        $ref: "#/components/schemas/Recommendation"
    Recommendation:
      description: The list of recommendations for the insight.
      type: object
      properties:
        RecommendationId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the recommendation.
        RecommendationDescription:
          $ref: "#/components/schemas/MarkdownString"
          description: "The recommendation details to help resolve the performance issue. For example, Investigate the following SQLs that contributed to 100% of the total DBLoad during that time period: sql-id"
    DataList:
      type: array
      items:
        $ref: "#/components/schemas/Data"
    Data:
      description: List of data objects which provide details about source metrics. This field can be used to determine the PI metric to render for the insight. This data type also includes static values for the metrics for the Insight that were calculated and included in text and annotations on the DB load chart.
      type: object
      properties:
        PerformanceInsightsMetric:
          $ref: "#/components/schemas/PerformanceInsightsMetric"
          description: This field determines the Performance Insights metric to render for the insight. The name field refers to a Performance Insights metric.
    PerformanceInsightsMetric:
      description: This data type helps to determine Performance Insights metric to render for the insight.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/DescriptiveString"
          description: The Performance Insights metric.
        DisplayName:
          $ref: "#/components/schemas/DescriptiveString"
          description: The Performance Insights metric name.
        Dimensions:
          type: object
          properties: {}
          description: A dimension map that contains the dimensions for this partition.
        Filter:
          type: object
          properties: {}
          description: The filter for the Performance Insights metric.
        Value:
          $ref: "#/components/schemas/Double"
          description: The value of the metric. For example, 9 for db.load.avg.
    DescriptiveString:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: ^.*$
    GetResourceMetadataResponse:
      type: object
      properties:
        Identifier:
          $ref: "#/components/schemas/String"
          description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. To use a DB instance as a data source, specify its DbiResourceId value. For example, specify db-ABCDEFGHIJKLMNOPQRSTU1VW2X.
        Features:
          type: object
          properties: {}
          description: The metadata for different features. For example, the metadata might indicate that a feature is turned on or off on a specific DB instance.
    MetricQueryList:
      type: array
      items:
        $ref: "#/components/schemas/MetricQuery"
    MetricQuery:
      description: A single query to be processed. You must provide the metric to query and append an aggregate function to the metric. For example, to find the average for the metric db.load you must use db.load.avg. Valid values for aggregate functions include .avg, .min, .max, and .sum. If no other parameters are specified, Performance Insights returns all data points for the specified metric. Optionally, you can request that the data points be aggregated by dimension group (GroupBy), and return only those data points that match your criteria (Filter).
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/SanitizedString"
          description: "The name of a Performance Insights metric to be measured. Valid values for Metric are: db.load.avg - A scaled representation of the number of active sessions for the database engine. db.sampledload.avg - The raw number of active sessions for the database engine. The counter metrics listed in Performance Insights operating system counters in the Amazon Aurora User Guide. The counter metrics listed in Performance Insights operating system counters in the Amazon RDS User Guide. If the number of active sessions is less than an internal Performance Insights threshold, db.load.avg and db.sampledload.avg are the same value. If the number of active sessions is greater than the internal threshold, Performance Insights samples the active sessions, with db.load.avg showing the scaled values, db.sampledload.avg showing the raw values, and db.sampledload.avg less than db.load.avg. For most use cases, you can query db.load.avg only."
        GroupBy:
          $ref: "#/components/schemas/DimensionGroup"
          description: A specification for how to aggregate the data points from a query result. You must specify a valid dimension group. Performance Insights will return all of the dimensions within that group, unless you provide the names of specific dimensions within that group. You can also request that Performance Insights return a limited number of values for a dimension.
        Filter:
          type: object
          properties: {}
          description: "One or more filters to apply in the request. Restrictions: Any number of filters by the same dimension, as specified in the GroupBy parameter. A single filter for any other dimension in this dimension group. The db.sql.db_id filter isn't available for RDS for SQL Server DB instances."
      required:
        - Metric
    PeriodAlignment:
      type: string
      enum:
        - END_TIME
        - START_TIME
    GetResourceMetricsResponse:
      type: object
      properties:
        AlignedStartTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The start time for the returned metrics, after alignment to a granular boundary (as specified by PeriodInSeconds). AlignedStartTime will be less than or equal to the value of the user-specified StartTime.
        AlignedEndTime:
          $ref: "#/components/schemas/ISOTimestamp"
          description: The end time for the returned metrics, after alignment to a granular boundary (as specified by PeriodInSeconds). AlignedEndTime will be greater than or equal to the value of the user-specified Endtime.
        Identifier:
          $ref: "#/components/schemas/String"
          description: An immutable identifier for a data source that is unique for an Amazon Web Services Region. Performance Insights gathers metrics from this data source. In the console, the identifier is shown as ResourceID. When you call DescribeDBInstances, the identifier is returned as DbiResourceId.
        MetricList:
          $ref: "#/components/schemas/MetricKeyDataPointsList"
          description: An array of metric results, where each array element contains all of the data points for a particular dimension.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the token, up to the value specified by MaxRecords.
    MetricKeyDataPointsList:
      type: array
      items:
        $ref: "#/components/schemas/MetricKeyDataPoints"
    MetricKeyDataPoints:
      description: A time-ordered series of data points, corresponding to a dimension of a Performance Insights metric.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/ResponseResourceMetricKey"
          description: The dimensions to which the data points apply.
        DataPoints:
          $ref: "#/components/schemas/DataPointsList"
          description: An array of timestamp-value pairs, representing measurements over a period of time.
    ResponseResourceMetricKey:
      description: An object describing a Performance Insights metric and one or more dimensions for that metric.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/String"
          description: "The name of a Performance Insights metric to be measured. Valid values for Metric are: db.load.avg - A scaled representation of the number of active sessions for the database engine. db.sampledload.avg - The raw number of active sessions for the database engine. The counter metrics listed in Performance Insights operating system counters in the Amazon Aurora User Guide. The counter metrics listed in Performance Insights operating system counters in the Amazon RDS User Guide. If the number of active sessions is less than an internal Performance Insights threshold, db.load.avg and db.sampledload.avg are the same value. If the number of active sessions is greater than the internal threshold, Performance Insights samples the active sessions, with db.load.avg showing the scaled values, db.sampledload.avg showing the raw values, and db.sampledload.avg less than db.load.avg. For most use cases, you can query db.load.avg only."
        Dimensions:
          type: object
          properties: {}
          description: The valid dimensions for the metric.
      required:
        - Metric
    DataPointsList:
      type: array
      items:
        $ref: "#/components/schemas/DataPoint"
    DataPoint:
      description: A timestamp, and a single numerical value, which together represent a measurement at a particular point in time.
      type: object
      properties:
        Timestamp:
          $ref: "#/components/schemas/ISOTimestamp"
