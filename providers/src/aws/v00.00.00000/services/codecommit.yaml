openapi: 3.0.0
info:
  version: "2015-04-13"
  title: AWS CodeCommit
  description: AWS CodeCommit
  x-serviceName: codecommit
  x-serviceAlias: codecommit
  x-protocol: json
  x-apiVersion: "2015-04-13"
  x-endpointPrefix: codecommit
  x-targetPrefix: CodeCommit_20150413
  x-jsonVersion: "1.1"
servers:
  - url: https://codecommit.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codecommit
paths:
  /AssociateApprovalRuleTemplateWithRepository:
    post:
      operationId: AssociateApprovalRuleTemplateWithRepository
      description: Creates an association between an approval rule template and a specified repository. Then, the next time a pull request is created in the repository where the destination reference (if specified) matches the destination reference (branch) for the pull request, an approval rule that matches the template conditions is automatically created for that pull request. If no destination references are specified in the template, an approval rule that matches the template contents is created for all pull requests in that repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.AssociateApprovalRuleTemplateWithRepository
            default: CodeCommit_20150413.AssociateApprovalRuleTemplateWithRepository
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                approvalRuleTemplateName:
                  $ref: "#/components/schemas/ApprovalRuleTemplateName"
                  description: The name for the approval rule template.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that you want to associate with the template.
              required:
                - approvalRuleTemplateName
                - repositoryName
      responses:
        "200":
          description: Success
  /BatchAssociateApprovalRuleTemplateWithRepositories:
    post:
      operationId: BatchAssociateApprovalRuleTemplateWithRepositories
      description: Creates an association between an approval rule template and one or more specified repositories.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.BatchAssociateApprovalRuleTemplateWithRepositories
            default: CodeCommit_20150413.BatchAssociateApprovalRuleTemplateWithRepositories
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                approvalRuleTemplateName:
                  $ref: "#/components/schemas/ApprovalRuleTemplateName"
                  description: The name of the template you want to associate with one or more repositories.
                repositoryNames:
                  $ref: "#/components/schemas/RepositoryNameList"
                  description: The names of the repositories you want to associate with the template. The length constraint limit is for each string in the array. The array itself can be empty.
              required:
                - approvalRuleTemplateName
                - repositoryNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchAssociateApprovalRuleTemplateWithRepositoriesOutput"
  /BatchDescribeMergeConflicts:
    post:
      operationId: BatchDescribeMergeConflicts
      description: Returns information about one or more merge conflicts in the attempted merge of two commit specifiers using the squash or three-way merge strategy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.BatchDescribeMergeConflicts
            default: CodeCommit_20150413.BatchDescribeMergeConflicts
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that contains the merge conflicts you want to review.
                destinationCommitSpecifier:
                  $ref: "#/components/schemas/CommitName"
                  description: The branch, tag, HEAD, or other fully qualified reference used to identify a commit (for example, a branch name or a full commit ID).
                sourceCommitSpecifier:
                  $ref: "#/components/schemas/CommitName"
                  description: The branch, tag, HEAD, or other fully qualified reference used to identify a commit (for example, a branch name or a full commit ID).
                mergeOption:
                  $ref: "#/components/schemas/MergeOptionTypeEnum"
                  description: The merge option or strategy you want to use to merge the code.
                maxMergeHunks:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of merge hunks to include in the output.
                maxConflictFiles:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of files to include in the output.
                filePaths:
                  $ref: "#/components/schemas/FilePaths"
                  description: The path of the target files used to describe the conflicts. If not specified, the default is all conflict files.
                conflictDetailLevel:
                  $ref: "#/components/schemas/ConflictDetailLevelTypeEnum"
                  description: The level of conflict detail to use. If unspecified, the default FILE_LEVEL is used, which returns a not-mergeable result if the same file has differences in both branches. If LINE_LEVEL is specified, a conflict is considered not mergeable if the same file in both branches has differences on the same line.
                conflictResolutionStrategy:
                  $ref: "#/components/schemas/ConflictResolutionStrategyTypeEnum"
                  description: Specifies which branch to use when resolving conflicts, or whether to attempt automatically merging two versions of a file. The default is NONE, which requires any conflicts to be resolved manually before the merge operation is successful.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An enumeration token that, when provided in a request, returns the next batch of the results.
              required:
                - repositoryName
                - destinationCommitSpecifier
                - sourceCommitSpecifier
                - mergeOption
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDescribeMergeConflictsOutput"
  /BatchDisassociateApprovalRuleTemplateFromRepositories:
    post:
      operationId: BatchDisassociateApprovalRuleTemplateFromRepositories
      description: Removes the association between an approval rule template and one or more specified repositories.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.BatchDisassociateApprovalRuleTemplateFromRepositories
            default: CodeCommit_20150413.BatchDisassociateApprovalRuleTemplateFromRepositories
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                approvalRuleTemplateName:
                  $ref: "#/components/schemas/ApprovalRuleTemplateName"
                  description: The name of the template that you want to disassociate from one or more repositories.
                repositoryNames:
                  $ref: "#/components/schemas/RepositoryNameList"
                  description: The repository names that you want to disassociate from the approval rule template. The length constraint limit is for each string in the array. The array itself can be empty.
              required:
                - approvalRuleTemplateName
                - repositoryNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisassociateApprovalRuleTemplateFromRepositoriesOutput"
  /BatchGetCommits:
    post:
      operationId: BatchGetCommits
      description: Returns information about the contents of one or more commits in a repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.BatchGetCommits
            default: CodeCommit_20150413.BatchGetCommits
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                commitIds:
                  $ref: "#/components/schemas/CommitIdsInputList"
                  description: The full commit IDs of the commits to get information about. You must supply the full SHA IDs of each commit. You cannot use shortened SHA IDs.
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that contains the commits.
              required:
                - commitIds
                - repositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetCommitsOutput"
  /BatchGetRepositories:
    post:
      operationId: BatchGetRepositories
      description: Returns information about one or more repositories. The description field for a repository accepts all HTML characters and all valid Unicode characters. Applications that do not HTML-encode the description and display it in a webpage can expose users to potentially malicious code. Make sure that you HTML-encode the description field in any application that uses this API to display the repository description on a webpage.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.BatchGetRepositories
            default: CodeCommit_20150413.BatchGetRepositories
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryNames:
                  $ref: "#/components/schemas/RepositoryNameList"
                  description: The names of the repositories to get information about. The length constraint limit is for each string in the array. The array itself can be empty.
              required:
                - repositoryNames
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetRepositoriesOutput"
  /CreateApprovalRuleTemplate:
    post:
      operationId: CreateApprovalRuleTemplate
      description: Creates a template for approval rules that can then be associated with one or more repositories in your Amazon Web Services account. When you associate a template with a repository, CodeCommit creates an approval rule that matches the conditions of the template for all pull requests that meet the conditions of the template. For more information, see AssociateApprovalRuleTemplateWithRepository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreateApprovalRuleTemplate
            default: CodeCommit_20150413.CreateApprovalRuleTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                approvalRuleTemplateName:
                  $ref: "#/components/schemas/ApprovalRuleTemplateName"
                  description: The name of the approval rule template. Provide descriptive names, because this name is applied to the approval rules created automatically in associated repositories.
                approvalRuleTemplateContent:
                  $ref: "#/components/schemas/ApprovalRuleTemplateContent"
                  description: "The content of the approval rule that is created on pull requests in associated repositories. If you specify one or more destination references (branches), approval rules are created in an associated repository only if their destination references (branches) match those specified in the template. When you create the content of the approval rule template, you can specify approvers in an approval pool in one of two ways: CodeCommitApprovers: This option only requires an Amazon Web Services account and a resource. It can be used for both IAM users and federated access users whose name matches the provided resource name. This is a very powerful option that offers a great deal of flexibility. For example, if you specify the Amazon Web Services account 123456789012 and Mary_Major, all of the following are counted as approvals coming from that user: An IAM user in the account (arn:aws:iam::123456789012:user/Mary_Major) A federated user identified in IAM as Mary_Major (arn:aws:sts::123456789012:federated-user/Mary_Major) This option does not recognize an active session of someone assuming the role of CodeCommitReview with a role session name of Mary_Major (arn:aws:sts::123456789012:assumed-role/CodeCommitReview/Mary_Major) unless you include a wildcard (*Mary_Major). Fully qualified ARN: This option allows you to specify the fully qualified Amazon Resource Name (ARN) of the IAM user or role. For more information about IAM ARNs, wildcards, and formats, see IAM Identifiers in the IAM User Guide."
                approvalRuleTemplateDescription:
                  $ref: "#/components/schemas/ApprovalRuleTemplateDescription"
                  description: The description of the approval rule template. Consider providing a description that explains what this template does and when it might be appropriate to associate it with repositories.
              required:
                - approvalRuleTemplateName
                - approvalRuleTemplateContent
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApprovalRuleTemplateOutput"
  /CreateBranch:
    post:
      operationId: CreateBranch
      description: Creates a branch in a repository and points the branch to a commit. Calling the create branch operation does not set a repository's default branch. To do this, call the update default branch operation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreateBranch
            default: CodeCommit_20150413.CreateBranch
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository in which you want to create the new branch.
                branchName:
                  $ref: "#/components/schemas/BranchName"
                  description: The name of the new branch to create.
                commitId:
                  $ref: "#/components/schemas/CommitId"
                  description: The ID of the commit to point the new branch to.
              required:
                - repositoryName
                - branchName
                - commitId
      responses:
        "200":
          description: Success
  /CreateCommit:
    post:
      operationId: CreateCommit
      description: Creates a commit for a repository on the tip of a specified branch.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreateCommit
            default: CodeCommit_20150413.CreateCommit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository where you create the commit.
                branchName:
                  $ref: "#/components/schemas/BranchName"
                  description: The name of the branch where you create the commit.
                parentCommitId:
                  $ref: "#/components/schemas/CommitId"
                  description: The ID of the commit that is the parent of the commit you create. Not required if this is an empty repository.
                authorName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the author who created the commit. This information is used as both the author and committer for the commit.
                email:
                  $ref: "#/components/schemas/Email"
                  description: The email address of the person who created the commit.
                commitMessage:
                  $ref: "#/components/schemas/Message"
                  description: The commit message you want to include in the commit. Commit messages are limited to 256 KB. If no message is specified, a default message is used.
                keepEmptyFolders:
                  $ref: "#/components/schemas/KeepEmptyFolders"
                  description: If the commit contains deletions, whether to keep a folder or folder structure if the changes leave the folders empty. If true, a ..gitkeep file is created for empty folders. The default is false.
                putFiles:
                  $ref: "#/components/schemas/PutFileEntries"
                  description: The files to add or update in this commit.
                deleteFiles:
                  $ref: "#/components/schemas/DeleteFileEntries"
                  description: The files to delete in this commit. These files still exist in earlier commits.
                setFileModes:
                  $ref: "#/components/schemas/SetFileModeEntries"
                  description: The file modes to update for files in this commit.
              required:
                - repositoryName
                - branchName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommitOutput"
  /CreatePullRequest:
    post:
      operationId: CreatePullRequest
      description: Creates a pull request in the specified repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreatePullRequest
            default: CodeCommit_20150413.CreatePullRequest
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/Title"
                  description: The title of the pull request. This title is used to identify the pull request to other users in the repository.
                description:
                  $ref: "#/components/schemas/Description"
                  description: A description of the pull request.
                targets:
                  $ref: "#/components/schemas/TargetList"
                  description: The targets for the pull request, including the source of the code to be reviewed (the source branch) and the destination where the creator of the pull request intends the code to be merged after the pull request is closed (the destination branch).
                clientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                  description: A unique, client-generated idempotency token that, when provided in a request, ensures the request cannot be repeated with a changed parameter. If a request is received with the same parameters and a token is included, the request returns information about the initial request that used that token. The Amazon Web ServicesSDKs prepopulate client request tokens. If you are using an Amazon Web ServicesSDK, an idempotency token is created for you.
              required:
                - title
                - targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePullRequestOutput"
  /CreatePullRequestApprovalRule:
    post:
      operationId: CreatePullRequestApprovalRule
      description: Creates an approval rule for a pull request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreatePullRequestApprovalRule
            default: CodeCommit_20150413.CreatePullRequestApprovalRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pullRequestId:
                  $ref: "#/components/schemas/PullRequestId"
                  description: The system-generated ID of the pull request for which you want to create the approval rule.
                approvalRuleName:
                  $ref: "#/components/schemas/ApprovalRuleName"
                  description: The name for the approval rule.
                approvalRuleContent:
                  $ref: "#/components/schemas/ApprovalRuleContent"
                  description: "The content of the approval rule, including the number of approvals needed and the structure of an approval pool defined for approvals, if any. For more information about approval pools, see the CodeCommit User Guide. When you create the content of the approval rule, you can specify approvers in an approval pool in one of two ways: CodeCommitApprovers: This option only requires an Amazon Web Services account and a resource. It can be used for both IAM users and federated access users whose name matches the provided resource name. This is a very powerful option that offers a great deal of flexibility. For example, if you specify the Amazon Web Services account 123456789012 and Mary_Major, all of the following would be counted as approvals coming from that user: An IAM user in the account (arn:aws:iam::123456789012:user/Mary_Major) A federated user identified in IAM as Mary_Major (arn:aws:sts::123456789012:federated-user/Mary_Major) This option does not recognize an active session of someone assuming the role of CodeCommitReview with a role session name of Mary_Major (arn:aws:sts::123456789012:assumed-role/CodeCommitReview/Mary_Major) unless you include a wildcard (*Mary_Major). Fully qualified ARN: This option allows you to specify the fully qualified Amazon Resource Name (ARN) of the IAM user or role. For more information about IAM ARNs, wildcards, and formats, see IAM Identifiers in the IAM User Guide."
              required:
                - pullRequestId
                - approvalRuleName
                - approvalRuleContent
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePullRequestApprovalRuleOutput"
  /CreateRepository:
    post:
      operationId: CreateRepository
      description: Creates a new, empty repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreateRepository
            default: CodeCommit_20150413.CreateRepository
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the new repository to be created. The repository name must be unique across the calling Amazon Web Services account. Repository names are limited to 100 alphanumeric, dash, and underscore characters, and cannot include certain characters. For more information about the limits on repository names, see Quotas in the CodeCommit User Guide. The suffix .git is prohibited.
                repositoryDescription:
                  $ref: "#/components/schemas/RepositoryDescription"
                  description: A comment or description about the new repository. The description field for a repository accepts all HTML characters and all valid Unicode characters. Applications that do not HTML-encode the description and display it in a webpage can expose users to potentially malicious code. Make sure that you HTML-encode the description field in any application that uses this API to display the repository description on a webpage.
                tags:
                  $ref: "#/components/schemas/TagsMap"
                  description: One or more tag key-value pairs to use when tagging this repository.
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: The ID of the encryption key. You can view the ID of an encryption key in the KMS console, or use the KMS APIs to programmatically retrieve a key ID. For more information about acceptable values for kmsKeyID, see KeyId in the Decrypt API description in the Key Management Service API Reference. If no key is specified, the default aws/codecommit Amazon Web Services managed key is used.
              required:
                - repositoryName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRepositoryOutput"
  /CreateUnreferencedMergeCommit:
    post:
      operationId: CreateUnreferencedMergeCommit
      description: Creates an unreferenced commit that represents the result of merging two branches using a specified merge strategy. This can help you determine the outcome of a potential merge. This API cannot be used with the fast-forward merge strategy because that strategy does not create a merge commit. This unreferenced merge commit can only be accessed using the GetCommit API or through git commands such as git fetch. To retrieve this commit, you must specify its commit ID or otherwise reference it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.CreateUnreferencedMergeCommit
            default: CodeCommit_20150413.CreateUnreferencedMergeCommit
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository where you want to create the unreferenced merge commit.
                sourceCommitSpecifier:
                  $ref: "#/components/schemas/CommitName"
                  description: The branch, tag, HEAD, or other fully qualified reference used to identify a commit (for example, a branch name or a full commit ID).
                destinationCommitSpecifier:
                  $ref: "#/components/schemas/CommitName"
                  description: The branch, tag, HEAD, or other fully qualified reference used to identify a commit (for example, a branch name or a full commit ID).
                mergeOption:
                  $ref: "#/components/schemas/MergeOptionTypeEnum"
                  description: The merge option or strategy you want to use to merge the code.
                conflictDetailLevel:
                  $ref: "#/components/schemas/ConflictDetailLevelTypeEnum"
                  description: The level of conflict detail to use. If unspecified, the default FILE_LEVEL is used, which returns a not-mergeable result if the same file has differences in both branches. If LINE_LEVEL is specified, a conflict is considered not mergeable if the same file in both branches has differences on the same line.
                conflictResolutionStrategy:
                  $ref: "#/components/schemas/ConflictResolutionStrategyTypeEnum"
                  description: Specifies which branch to use when resolving conflicts, or whether to attempt automatically merging two versions of a file. The default is NONE, which requires any conflicts to be resolved manually before the merge operation is successful.
                authorName:
                  $ref: "#/components/schemas/Name"
                  description: The name of the author who created the unreferenced commit. This information is used as both the author and committer for the commit.
                email:
                  $ref: "#/components/schemas/Email"
                  description: The email address for the person who created the unreferenced commit.
                commitMessage:
                  $ref: "#/components/schemas/Message"
                  description: The commit message for the unreferenced commit.
                keepEmptyFolders:
                  $ref: "#/components/schemas/KeepEmptyFolders"
                  description: If the commit contains deletions, whether to keep a folder or folder structure if the changes leave the folders empty. If this is specified as true, a .gitkeep file is created for empty folders. The default is false.
                conflictResolution:
                  $ref: "#/components/schemas/ConflictResolution"
                  description: If AUTOMERGE is the conflict resolution strategy, a list of inputs to use when resolving conflicts during a merge.
              required:
                - repositoryName
                - sourceCommitSpecifier
                - destinationCommitSpecifier
                - mergeOption
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUnreferencedMergeCommitOutput"
  /DeleteApprovalRuleTemplate:
    post:
      operationId: DeleteApprovalRuleTemplate
      description: Deletes a specified approval rule template. Deleting a template does not remove approval rules on pull requests already created with the template.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.DeleteApprovalRuleTemplate
            default: CodeCommit_20150413.DeleteApprovalRuleTemplate
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                approvalRuleTemplateName:
                  $ref: "#/components/schemas/ApprovalRuleTemplateName"
                  description: The name of the approval rule template to delete.
              required:
                - approvalRuleTemplateName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApprovalRuleTemplateOutput"
  /DeleteBranch:
    post:
      operationId: DeleteBranch
      description: Deletes a branch from a repository, unless that branch is the default branch for the repository.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodeCommit_20150413.DeleteBranch
            default: CodeCommit_20150413.DeleteBranch
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                repositoryName:
                  $ref: "#/components/schemas/RepositoryName"
                  description: The name of the repository that contains the branch to be deleted.
                branchName:
                  $ref: "#/components/schemas/BranchName"
                  description: The name of the branch to delete.
              required:
                - repositoryName
                - branchName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
