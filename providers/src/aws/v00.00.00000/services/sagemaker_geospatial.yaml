          description: A string value representing Predefined Output Resolution for a stacking operation. Allowed values are HIGHEST, LOWEST, and AVERAGE.
        UserDefined:
          $ref: "#/components/schemas/UserDefined"
          description: The structure representing User Output Resolution for a Stacking operation defined as a value and unit.
    PredefinedResolution:
      type: string
      enum:
        - HIGHEST
        - LOWEST
        - AVERAGE
    TemporalStatisticsConfigInput:
