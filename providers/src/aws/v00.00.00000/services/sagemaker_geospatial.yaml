          description: 'The Amazon Resource Name (ARN) or an ID of a Amazon Web Services Key Management Service (Amazon Web Services KMS) key that Amazon SageMaker uses to decrypt your output artifacts with Amazon S3 server-side encryption. The SageMaker execution role must have kms:GenerateDataKey permission. The KmsKeyId can be any of the following formats: // KMS Key ID "1234abcd-12ab-34cd-56ef-1234567890ab" // Amazon Resource Name (ARN) of a KMS Key "arn:aws:kms:`<region>`:`<account>`:key/`<key-id-12ab-34cd-56ef-1234567890ab>`" For more information about key identifiers, see Key identifiers (KeyID) in the Amazon Web Services Key Management Service (Amazon Web Services KMS) documentation.'
      required:
        - Statistics
        - ZoneS3Path
    ZonalStatisticsListInput:
      type: array
      items:
        $ref: "#/components/schemas/ZonalStatistics"
    ZonalStatistics:
