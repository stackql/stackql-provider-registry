  /v2/domains/{domain_identifier}/form-types/{form_type_identifier}:
    delete:
      operationId: DeleteFormType
      description: "Deletes and metadata form type in Amazon DataZone. Prerequisites: The form type must exist in the domain. The form type must not be in use by any asset types or assets. The domain must be valid and accessible. User must have delete permissions on the form type. Any dependencies (such as linked asset types) must be removed first."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which the metadata form type is deleted.
        - name: form_type_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FormTypeIdentifier"
          description: The ID of the metadata form type that is deleted.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFormTypeOutput"
    get:
      operationId: GetFormType
      description: Gets a metadata form type in Amazon DataZone. Form types define the structure and validation rules for collecting metadata about assets in Amazon DataZone. They act as templates that ensure consistent metadata capture across similar types of assets, while allowing for customization to meet specific organizational needs. Form types can include required fields, validation rules, and dependencies, helping maintain high-quality metadata that makes data assets more discoverable and usable. The form type with the specified identifier must exist in the given domain. The domain must be valid and active. User must have permission on the form type. The form type should not be deleted or in an invalid state. One use case for this API is to determine whether a form field is indexed for search. A searchable field will be annotated with @amazon.datazone#searchable. By default, searchable fields are indexed for semantic search, where related query terms will match the attribute value even if they are not stemmed or keyword matches. If a field is indexed technical identifier search, it will be annotated with @amazon.datazone#searchable(modes:["TECHNICAL"]). If a field is indexed for lexical search (supports stemmed and prefix matches but not semantic matches), it will be annotated with @amazon.datazone#searchable(modes:["LEXICAL"]). A field storing glossary term IDs (which is filterable) will be annotated with @amazon.datazone#glossaryterm("${glossaryId}").
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which this metadata form type exists.
        - name: form_type_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FormTypeIdentifier"
          description: The ID of the metadata form type.
        - name: revision
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Revision"
          description: The revision of this metadata form type.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFormTypeOutput"
  /v2/domains/{domain_identifier}/glossaries/{identifier}:
    delete:
      operationId: DeleteGlossary
      description: "Deletes a business glossary in Amazon DataZone. Prerequisites: The glossary must be in DISABLED state. The glossary must not have any glossary terms associated with it. The glossary must exist in the specified domain. The caller must have the datazone:DeleteGlossary permission in the domain and glossary. Glossary should not be linked to any active metadata forms."
