  /v2/domains/{domain_identifier}/assets/{identifier}:
    delete:
      operationId: DeleteAsset
      description: Deletes an asset in Amazon DataZone. --domain-identifier must refer to a valid and existing domain. --identifier must refer to an existing asset in the specified domain. Asset must not be referenced in any existing asset filters. Asset must not be linked to any draft or published data product. User must have delete permissions for the domain and project.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which the asset is deleted.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetIdentifier"
          description: The identifier of the asset that is deleted.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssetOutput"
    get:
      operationId: GetAsset
      description: "Gets an Amazon DataZone asset. An asset is the fundamental building block in Amazon DataZone, representing any data resource that needs to be cataloged and managed. It can take many forms, from Amazon S3 buckets and database tables to dashboards and machine learning models. Each asset contains comprehensive metadata about the resource, including its location, schema, ownership, and lineage information. Assets are essential for organizing and managing data resources across an organization, making them discoverable and usable while maintaining proper governance. Before using the Amazon DataZone GetAsset command, ensure the following prerequisites are met: Domain identifier must exist and be valid Asset identifier must exist User must have the required permissions to perform the action"
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain to which the asset belongs.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetIdentifier"
          description: The ID of the Amazon DataZone asset. This parameter supports either the value of assetId or externalIdentifier as input. If you are passing the value of externalIdentifier, you must prefix this value with externalIdentifer%2F.
        - name: revision
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Revision"
          description: The revision of the Amazon DataZone asset.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetOutput"
  /v2/domains/{domain_identifier}/assets/{asset_identifier}/filters/{identifier}:
    delete:
      operationId: DeleteAssetFilter
      description: "Deletes an asset filter. Prerequisites: The asset filter must exist. The domain and asset must not have been deleted. Ensure the --identifier refers to a valid filter ID."
      parameters:
        - name: domain_identifier
          in: path
          required: true
