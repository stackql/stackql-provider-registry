  /v2/domains/{domain_identifier}/metadata-generation-runs:
    get:
      operationId: ListMetadataGenerationRuns
      description: "Lists all metadata generation runs. Metadata generation runs represent automated processes that leverage AI/ML capabilities to create or enhance asset metadata at scale. This feature helps organizations maintain comprehensive and consistent metadata across large numbers of assets without manual intervention. It can automatically generate business descriptions, tags, and other metadata elements, significantly reducing the time and effort required for metadata management while improving consistency and completeness. Prerequisites: Valid domain identifier. User must have access to metadata generation runs in the domain."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain where you want to list metadata generation runs.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MetadataGenerationRunStatus"
          description: The status of the metadata generation runs.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MetadataGenerationRunType"
          description: The type of the metadata generation runs.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: When the number of metadata generation runs is greater than the default value for the MaxResults parameter, or if you explicitly specify a value for MaxResults that is less than the number of metadata generation runs, the response includes a pagination token named NextToken. You can specify this NextToken value in a subsequent call to ListMetadataGenerationRuns to list the next set of revisions.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of metadata generation runs to return in a single call to ListMetadataGenerationRuns. When the number of metadata generation runs to be listed is greater than the value of MaxResults, the response contains a NextToken value that you can use in a subsequent call to ListMetadataGenerationRuns to list the next set of revisions.
        - name: targetIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The target ID for which you want to list metadata generation runs.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMetadataGenerationRunsOutput"
    post:
      operationId: StartMetadataGenerationRun
      description: "Starts the metadata generation run. Prerequisites: Asset must be created and belong to the specified domain and project. Asset type must be supported for metadata generation (e.g., Amazon Web Services Glue table). Asset must have a structured schema with valid rows and columns. Valid values for --type: BUSINESS_DESCRIPTIONS, BUSINESS_NAMES, BUSINESS_GLOSSARY_ASSOCIATIONS. The user must have permission to run metadata generation in the domain/project."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain where you want to start a metadata generation run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/MetadataGenerationRunType"
                types:
                  $ref: "#/components/schemas/MetadataGenerationRunTypes"
                target:
                  $ref: "#/components/schemas/MetadataGenerationRunTarget"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                owningProjectIdentifier:
                  $ref: "#/components/schemas/ProjectId"
              required:
                - target
                - owningProjectIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMetadataGenerationRunOutput"
