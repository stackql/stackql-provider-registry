openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Amazon DataZone
  description: Amazon DataZone
  x-serviceName: datazone
  x-serviceAlias: datazone
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: datazone
servers:
  - url: https://datazone.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for datazone
paths:
  /v2/domains/{domain_identifier}/assets/{identifier}/accept-predictions:
    put:
      operationId: AcceptPredictions
      description: Accepts automatically generated business-friendly metadata for your Amazon DataZone assets.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The identifier of the Amazon DataZone domain.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetIdentifier"
          description: The identifier of the asset.
        - name: revision
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Revision"
          description: The revision that is to be made to the asset.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                acceptRule:
                  $ref: "#/components/schemas/AcceptRule"
                acceptChoices:
                  $ref: "#/components/schemas/AcceptChoices"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptPredictionsOutput"
  /v2/domains/{domain_identifier}/subscription-requests/{identifier}/accept:
    put:
      operationId: AcceptSubscriptionRequest
      description: Accepts a subscription request to a specific asset.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The Amazon DataZone domain where the specified subscription request is being accepted.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionRequestId"
          description: The unique identifier of the subscription request that is to be accepted.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                decisionComment:
                  $ref: "#/components/schemas/DecisionComment"
                assetScopes:
                  $ref: "#/components/schemas/AcceptedAssetScopes"
                assetPermissions:
                  $ref: "#/components/schemas/AssetPermissions"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptSubscriptionRequestOutput"
  /v2/domains/{domain_identifier}/entities/{entity_type}/{entity_identifier}/addOwner:
    post:
      operationId: AddEntityOwner
      description: Adds the owner of an entity (a domain unit).
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain in which you want to add the entity owner.
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DataZoneEntityType"
          description: The type of an entity.
        - name: entity_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the entity to which you want to add an owner.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner:
                  $ref: "#/components/schemas/OwnerProperties"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - owner
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddEntityOwnerOutput"
  /v2/domains/{domain_identifier}/policies/managed/{entity_type}/{entity_identifier}/addGrant:
    post:
      operationId: AddPolicyGrant
      description: Adds a policy grant (an authorization policy) to a specified entity, including domain units, environment blueprint configurations, or environment profiles.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where you want to add a policy grant.
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TargetEntityType"
          description: The type of entity (resource) to which the grant is added.
        - name: entity_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ID of the entity (resource) to which you want to add a policy grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyType:
                  $ref: "#/components/schemas/ManagedPolicyType"
                principal:
                  $ref: "#/components/schemas/PolicyGrantPrincipal"
                detail:
                  $ref: "#/components/schemas/PolicyGrantDetail"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - policyType
                - principal
                - detail
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddPolicyGrantOutput"
  /v2/domains/{domain_identifier}/environments/{environment_identifier}/roles/{environment_role_arn}:
    put:
      operationId: AssociateEnvironmentRole
      description: Associates the environment role in Amazon DataZone.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which the environment role is associated.
        - name: environment_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the Amazon DataZone environment.
        - name: environment_role_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the environment role.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateEnvironmentRoleOutput"
    delete:
      operationId: DisassociateEnvironmentRole
      description: Disassociates the environment role in Amazon DataZone.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which an environment role is disassociated.
        - name: environment_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EnvironmentId"
          description: The ID of the environment.
        - name: environment_role_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the environment role.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateEnvironmentRoleOutput"
  /v2/domains/{domain_identifier}/entities/{entity_type}/{entity_identifier}/associate-governed-terms:
    patch:
      operationId: AssociateGovernedTerms
      description: Associates governed terms with an asset.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where governed terms are to be associated with an asset.
        - name: entity_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityIdentifier"
          description: The ID of the asset with which you want to associate a governed term.
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GovernedEntityType"
          description: The type of the asset with which you want to associate a governed term.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                governedGlossaryTerms:
                  $ref: "#/components/schemas/AssociateGovernedTermsInputGovernedGlossaryTermsList"
              required:
                - governedGlossaryTerms
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateGovernedTermsOutput"
  /v2/domains/{domain_identifier}/entities/{entity_type}/{entity_identifier}/attributes-metadata:
    get:
      operationId: BatchGetAttributesMetadata
      description: Gets the attribute metadata.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The domain ID where you want to get the attribute metadata.
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeEntityType"
          description: The entity type for which you want to get attribute metadata.
        - name: entity_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The entity ID for which you want to get attribute metadata.
        - name: entityRevision
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Revision"
          description: The entity revision for which you want to get attribute metadata.
        - name: attributeIdentifier
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AttributesList"
          description: The attribute identifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAttributesMetadataOutput"
    put:
      operationId: BatchPutAttributesMetadata
      description: Writes the attribute metadata.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The domain ID where you want to write the attribute metadata.
        - name: entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttributeEntityType"
          description: The entity type for which you want to write the attribute metadata.
        - name: entity_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EntityId"
          description: The entity ID for which you want to write the attribute metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                attributes:
                  $ref: "#/components/schemas/Attributes"
              required:
                - attributes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutAttributesMetadataOutput"
  /v2/domains/{domain_identifier}/metadata-generation-runs/{identifier}/cancel:
    post:
      operationId: CancelMetadataGenerationRun
      description: "Cancels the metadata generation run. Prerequisites: The run must exist and be in a cancelable status (e.g., SUBMITTED, IN_PROGRESS). Runs in SUCCEEDED status cannot be cancelled. User must have access to the run and cancel permissions."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which the metadata generation run is to be cancelled.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MetadataGenerationRunIdentifier"
          description: The ID of the metadata generation run.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMetadataGenerationRunOutput"
  /v2/domains/{domain_identifier}/subscriptions/{identifier}/cancel:
    put:
      operationId: CancelSubscription
      description: Cancels the subscription to the specified asset.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Amazon DataZone domain where the subscription request is being cancelled.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SubscriptionId"
          description: The unique identifier of the subscription that is being cancelled.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSubscriptionOutput"
  /v2/domains/{domain_identifier}/account-pools:
    post:
      operationId: CreateAccountPool
      description: Creates an account pool.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where the account pool is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AccountPoolName"
                description:
                  $ref: "#/components/schemas/Description"
                resolutionStrategy:
                  $ref: "#/components/schemas/ResolutionStrategy"
                accountSource:
                  $ref: "#/components/schemas/AccountSource"
              required:
                - name
                - resolutionStrategy
                - accountSource
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountPoolOutput"
    get:
      operationId: ListAccountPools
      description: Lists existing account pools.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where exsting account pools are to be listed.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountPoolName"
          description: The name of the account pool to be listed.
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortFieldAccountPool"
          description: The sort by mechanism in which the existing account pools are to be listed.
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: The sort order in which the existing account pools are to be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: When the number of account pools is greater than the default value for the MaxResults parameter, or if you explicitly specify a value for MaxResults that is less than the number of account pools, the response includes a pagination token named NextToken. You can specify this NextToken value in a subsequent call to ListAccountPools to list the next set of account pools.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of account pools to return in a single call to ListAccountPools. When the number of account pools to be listed is greater than the value of MaxResults, the response contains a NextToken value that you can use in a subsequent call to ListAccountPools to list the next set of account pools.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountPoolsOutput"
  /v2/domains/{domain_identifier}/assets:
    post:
      operationId: CreateAsset
      description: "Creates an asset in Amazon DataZone catalog. Before creating assets, make sure that the following requirements are met: --domain-identifier must refer to an existing domain. --owning-project-identifier must be a valid project within the domain. Asset type must be created beforehand using create-asset-type, or be a supported system-defined type. For more information, see create-asset-type. --type-revision (if used) must match a valid revision of the asset type. formsInput is required when it is associated as required in the asset-type. For more information, see create-form-type. Form content must include all required fields as per the form schema (e.g., bucketArn). You must invoke the following pre-requisite commands before invoking this API: CreateFormType CreateAssetType"
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: Amazon DataZone domain where the asset is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AssetName"
                externalIdentifier:
                  $ref: "#/components/schemas/ExternalIdentifier"
                typeIdentifier:
                  $ref: "#/components/schemas/AssetTypeIdentifier"
                typeRevision:
                  $ref: "#/components/schemas/Revision"
                description:
                  $ref: "#/components/schemas/Description"
                glossaryTerms:
                  $ref: "#/components/schemas/GlossaryTerms"
                formsInput:
                  $ref: "#/components/schemas/FormInputList"
                owningProjectIdentifier:
                  $ref: "#/components/schemas/ProjectId"
                predictionConfiguration:
                  $ref: "#/components/schemas/PredictionConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - typeIdentifier
                - owningProjectIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetOutput"
  /v2/domains/{domain_identifier}/assets/{asset_identifier}/filters:
    post:
      operationId: CreateAssetFilter
      description: "Creates a data asset filter. Asset filters provide a sophisticated way to create controlled views of data assets by selecting specific columns or applying row-level filters. This capability is crucial for organizations that need to share data while maintaining security and privacy controls. For example, your database might be filtered to show only non-PII fields to certain users, or sales data might be filtered by region for different regional teams. Asset filters enable fine-grained access control while maintaining a single source of truth. Prerequisites: A valid domain (--domain-identifier) must exist. A data asset (--asset-identifier) must already be created under that domain. The asset must have the referenced columns available in its schema for column-based filtering. You cannot specify both (columnConfiguration, rowConfiguration)at the same time."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain in which you want to create an asset filter.
        - name: asset_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetId"
          description: The ID of the data asset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FilterName"
                description:
                  $ref: "#/components/schemas/Description"
                configuration:
                  $ref: "#/components/schemas/AssetFilterConfiguration"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - name
                - configuration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetFilterOutput"
    get:
      operationId: ListAssetFilters
      description: "Lists asset filters. Prerequisites: A valid domain and asset must exist. The asset must have at least one filter created to return results."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where you want to list asset filters.
        - name: asset_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetId"
          description: The ID of the data asset.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FilterStatus"
          description: The status of the asset filter.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: When the number of asset filters is greater than the default value for the MaxResults parameter, or if you explicitly specify a value for MaxResults that is less than the number of asset filters, the response includes a pagination token named NextToken. You can specify this NextToken value in a subsequent call to ListAssetFilters to list the next set of asset filters.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of asset filters to return in a single call to ListAssetFilters. When the number of asset filters to be listed is greater than the value of MaxResults, the response contains a NextToken value that you can use in a subsequent call to ListAssetFilters to list the next set of asset filters.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetFiltersOutput"
  /v2/domains/{domain_identifier}/assets/{identifier}/revisions:
    post:
      operationId: CreateAssetRevision
      description: "Creates a revision of the asset. Asset revisions represent new versions of existing assets, capturing changes to either the underlying data or its metadata. They maintain a historical record of how assets evolve over time, who made changes, and when those changes occurred. This versioning capability is crucial for governance and compliance, allowing organizations to track changes, understand their impact, and roll back if necessary. Prerequisites: Asset must already exist in the domain with identifier. formsInput is required when asset has the form type. typeRevision should be the latest version of form type. The form content must include all required fields (e.g., bucketArn for S3ObjectCollectionForm). The owning project of the original asset must still exist and be active. User must have write access to the project and domain."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the domain where the asset is being revised.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetIdentifier"
          description: The identifier of the asset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AssetName"
                typeRevision:
                  $ref: "#/components/schemas/Revision"
                description:
                  $ref: "#/components/schemas/Description"
                glossaryTerms:
                  $ref: "#/components/schemas/GlossaryTerms"
                formsInput:
                  $ref: "#/components/schemas/FormInputList"
                predictionConfiguration:
                  $ref: "#/components/schemas/PredictionConfiguration"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetRevisionOutput"
    get:
      operationId: ListAssetRevisions
      description: "Lists the revisions for the asset. Prerequisites: The asset must exist in the domain. There must be at least one revision of the asset (which happens automatically after creation). The domain must be valid and active. User must have permissions on the asset and domain."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The identifier of the domain.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetIdentifier"
          description: The identifier of the asset.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: When the number of revisions is greater than the default value for the MaxResults parameter, or if you explicitly specify a value for MaxResults that is less than the number of revisions, the response includes a pagination token named NextToken. You can specify this NextToken value in a subsequent call to ListAssetRevisions to list the next set of revisions.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of revisions to return in a single call to ListAssetRevisions. When the number of revisions to be listed is greater than the value of MaxResults, the response contains a NextToken value that you can use in a subsequent call to ListAssetRevisions to list the next set of revisions.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetRevisionsOutput"
  /v2/domains/{domain_identifier}/asset-types:
    post:
      operationId: CreateAssetType
      description: "Creates a custom asset type. Prerequisites: The formsInput field is required, however, can be passed as empty (e.g. -forms-input {}). You must have CreateAssetType permissions. The domain-identifier and owning-project-identifier must be valid and active. The name of the asset type must be unique within the domain — duplicate names will cause failure. JSON input must be valid — incorrect formatting causes Invalid JSON errors."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The unique identifier of the Amazon DataZone domain where the custom asset type is being created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/TypeName"
                description:
                  $ref: "#/components/schemas/Description"
                formsInput:
                  $ref: "#/components/schemas/FormsInputMap"
                owningProjectIdentifier:
                  $ref: "#/components/schemas/ProjectId"
              required:
                - name
                - formsInput
                - owningProjectIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetTypeOutput"
  /v2/domains/{domain_identifier}/connections:
    post:
      operationId: CreateConnection
      description: Creates a new connection. In Amazon DataZone, a connection enables you to connect your resources (domains, projects, and environments) to external resources and services.
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where the connection is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                awsLocation:
                  $ref: "#/components/schemas/AwsLocation"
                clientToken:
                  $ref: "#/components/schemas/String"
                configurations:
                  $ref: "#/components/schemas/Configurations"
                description:
                  $ref: "#/components/schemas/CreateConnectionInputDescriptionString"
                environmentIdentifier:
                  $ref: "#/components/schemas/EnvironmentId"
                name:
                  $ref: "#/components/schemas/ConnectionName"
                props:
                  $ref: "#/components/schemas/ConnectionPropertiesInput"
                enableTrustedIdentityPropagation:
                  $ref: "#/components/schemas/Boolean"
                scope:
                  $ref: "#/components/schemas/ConnectionScope"
              required:
