      operationId: CreateDataProduct
      description: "Creates a data product. A data product is a comprehensive package that combines data assets with their associated metadata, documentation, and access controls. It's designed to serve specific business needs or use cases, making it easier for users to find and consume data appropriately. Data products include important information about data quality, freshness, and usage guidelines, effectively bridging the gap between data producers and consumers while ensuring proper governance. Prerequisites: The domain must exist and be accessible. The owning project must be valid and active. The name must be unique within the domain (no existing data product with the same name). User must have create permissions for data products in the project."
