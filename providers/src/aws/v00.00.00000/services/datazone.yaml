  /v2/domains/{domain_identifier}/form-types:
    post:
      operationId: CreateFormType
      description: 'Creates a metadata form type. Prerequisites: The domain must exist and be in an ENABLED state. The owning project must exist and be accessible. The name must be unique within the domain. For custom form types, to indicate that a field should be searchable, annotate it with @amazon.datazone#searchable. By default, searchable fields are indexed for semantic search, where related query terms will match the attribute value even if they are not stemmed or keyword matches. To indicate that a field should be indexed for lexical search (which disables semantic search but supports stemmed and partial matches), annotate it with @amazon.datazone#searchable(modes:["LEXICAL"]). To indicate that a field should be indexed for technical identifier search (for more information on technical identifier search, see: https://aws.amazon.com/blogs/big-data/streamline-data-discovery-with-precise-technical-identifier-search-in-amazon-sagemaker-unified-studio/), annotate it with @amazon.datazone#searchable(modes:["TECHNICAL"]). To denote that a field will store glossary term ids (which are filterable via the Search/SearchListings APIs), annotate it with @amazon.datazone#glossaryterm("${GLOSSARY_ID}"), where ${GLOSSARY_ID} is the id of the glossary that the glossary terms stored in the field belong to.'
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which this metadata form type is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/FormTypeName"
                model:
                  $ref: "#/components/schemas/Model"
                owningProjectIdentifier:
                  $ref: "#/components/schemas/ProjectId"
                status:
                  $ref: "#/components/schemas/FormTypeStatus"
                description:
                  $ref: "#/components/schemas/Description"
              required:
                - name
                - model
                - owningProjectIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFormTypeOutput"
  /v2/domains/{domain_identifier}/glossaries:
    post:
      operationId: CreateGlossary
      description: "Creates an Amazon DataZone business glossary. Specifies that this is a create glossary policy. A glossary serves as the central repository for business terminology and definitions within an organization. It helps establish and maintain a common language across different departments and teams, reducing miscommunication and ensuring consistent interpretation of business concepts. Glossaries can include hierarchical relationships between terms, cross-references, and links to actual data assets, making them invaluable for both business users and technical teams trying to understand and use data correctly. Prerequisites: Domain must exist and be in an active state. Owning project must exist and be accessible by the caller. The glossary name must be unique within the domain."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which this business glossary is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/GlossaryName"
                owningProjectIdentifier:
                  $ref: "#/components/schemas/ProjectId"
                description:
                  $ref: "#/components/schemas/GlossaryDescription"
                status:
                  $ref: "#/components/schemas/GlossaryStatus"
                usageRestrictions:
                  $ref: "#/components/schemas/GlossaryUsageRestrictions"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - owningProjectIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGlossaryOutput"
  /v2/domains/{domain_identifier}/glossary-terms:
    post:
      operationId: CreateGlossaryTerm
      description: "Creates a business glossary term. A glossary term represents an individual entry within the Amazon DataZone glossary, serving as a standardized definition for a specific business concept or data element. Each term can include rich metadata such as detailed definitions, synonyms, related terms, and usage examples. Glossary terms can be linked directly to data assets, providing business context to technical data elements. This linking capability helps users understand the business meaning of data fields and ensures consistent interpretation across different systems and teams. Terms can also have relationships with other terms, creating a semantic network that reflects the complexity of business concepts. Prerequisites: Domain must exist. Glossary must exist. The term name must be unique within the glossary. Ensure term does not conflict with existing terms in hierarchy."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the Amazon DataZone domain in which this business glossary term is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                glossaryIdentifier:
                  $ref: "#/components/schemas/GlossaryTermId"
