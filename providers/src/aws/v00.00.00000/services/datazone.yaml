      operationId: GetAssetFilter
      description: "Gets an asset filter. Prerequisites: Domain (--domain-identifier), asset (--asset-identifier), and filter (--identifier) must all exist. The asset filter should not have been deleted. The asset must still exist (since the filter is linked to it)."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where you want to get an asset filter.
        - name: asset_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetId"
          description: The ID of the data asset.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FilterId"
          description: The ID of the asset filter.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetFilterOutput"
    patch:
      operationId: UpdateAssetFilter
      description: "Updates an asset filter. Prerequisites: The domain, asset, and asset filter identifier must all exist. The asset must contain the columns being referenced in the update. If applying a row filter, ensure the column referenced in the expression exists in the asset schema."
      parameters:
        - name: domain_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DomainId"
          description: The ID of the domain where you want to update an asset filter.
        - name: asset_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AssetId"
          description: The ID of the data asset.
        - name: identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FilterId"
          description: The ID of the asset filter.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                description:
                  $ref: "#/components/schemas/Description"
                configuration:
                  $ref: "#/components/schemas/AssetFilterConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAssetFilterOutput"
  /v2/domains/{domain_identifier}/asset-types/{identifier}:
    delete:
      operationId: DeleteAssetType
      description: "Deletes an asset type in Amazon DataZone. Prerequisites: The asset type must exist in the domain. You must have DeleteAssetType permission. The asset type must not be in use (e.g., assigned to any asset). If used, deletion will fail. You should retrieve the asset type using get-asset-type to confirm its presence before deletion."
