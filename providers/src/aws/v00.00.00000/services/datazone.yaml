components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DomainId:
      type: string
      pattern: dzd[-_][a-zA-Z0-9_-]{1,36}
    AssetIdentifier:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,36}"
    Revision:
      type: string
      minLength: 1
      maxLength: 64
    AcceptRule:
      description: Specifies the rule and the threshold under which a prediction can be accepted.
      type: object
      properties:
        rule:
          $ref: "#/components/schemas/AcceptRuleBehavior"
          description: Specifies whether you want to accept the top prediction for all targets or none.
        threshold:
          $ref: "#/components/schemas/Float"
          description: The confidence score that specifies the condition at which a prediction can be accepted.
    AcceptRuleBehavior:
      type: string
      enum:
        - ALL
        - NONE
    Float:
      type: number
      format: float
    AcceptChoices:
      type: array
      items:
        $ref: "#/components/schemas/AcceptChoice"
    AcceptChoice:
      description: Specifies the prediction (aka, the automatically generated piece of metadata) and the target (for example, a column name) that can be accepted.
      type: object
      properties:
        predictionTarget:
          $ref: "#/components/schemas/String"
          description: Specifies the target (for example, a column name) where a prediction can be accepted.
        predictionChoice:
          $ref: "#/components/schemas/Integer"
          description: Specifies the prediction (aka, the automatically generated piece of metadata) that can be accepted.
        editedValue:
          $ref: "#/components/schemas/EditedValue"
          description: The edit of the prediction.
      required:
        - predictionTarget
    String:
      type: string
    Integer:
      type: integer
    EditedValue:
      type: string
      minLength: 1
      maxLength: 5000
    ClientToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\x21-\\x7E]+"
    AcceptPredictionsOutput:
      type: object
      properties:
        domainId:
          $ref: "#/components/schemas/DomainId"
          description: The identifier of the Amazon DataZone domain.
        assetId:
          $ref: "#/components/schemas/AssetId"
          description: The ID of the asset.
        revision:
          $ref: "#/components/schemas/Revision"
          description: The revision that is to be made to the asset.
      required:
        - domainId
        - assetId
        - revision
    AssetId:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,36}"
    SubscriptionRequestId:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,36}"
    DecisionComment:
      type: string
      minLength: 1
      maxLength: 4096
    AcceptedAssetScopes:
      type: array
      items:
        $ref: "#/components/schemas/AcceptedAssetScope"
    AcceptedAssetScope:
      description: The accepted asset scope.
      type: object
      properties:
        assetId:
          $ref: "#/components/schemas/AssetId"
          description: The asset ID of the accepted asset scope.
        filterIds:
          $ref: "#/components/schemas/FilterIds"
          description: The filter IDs of the accepted asset scope.
      required:
        - assetId
        - filterIds
    FilterIds:
      type: array
      items:
        $ref: "#/components/schemas/FilterId"
    FilterId:
      type: string
      pattern: "[a-zA-Z0-9_-]{1,36}"
    AssetPermissions:
      type: array
      items:
        $ref: "#/components/schemas/AssetPermission"
    AssetPermission:
      description: The asset permissions.
      type: object
      properties:
        assetId:
          $ref: "#/components/schemas/AssetId"
          description: The asset ID as part of the asset permissions.
        permissions:
          $ref: "#/components/schemas/Permissions"
          description: The details as part of the asset permissions.
      required:
        - assetId
        - permissions
    Permissions:
