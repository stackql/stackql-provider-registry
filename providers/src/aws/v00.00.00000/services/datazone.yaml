          description: The ID of the business glossary.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGlossaryOutput"
    patch:
      operationId: UpdateGlossary
      description: "Updates the business glossary in Amazon DataZone. Prerequisites: The glossary must exist in the given domain. The caller must have the datazone:UpdateGlossary permission to update it. When updating the name, the new name must be unique within the domain. The glossary must not be deleted or in a terminal state."
      parameters:
        - name: domain_identifier
