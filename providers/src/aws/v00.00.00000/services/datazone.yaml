                longDescription:
                  $ref: "#/components/schemas/LongDescription"
                termRelations:
                  $ref: "#/components/schemas/TermRelations"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - glossaryIdentifier
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGlossaryTermOutput"
