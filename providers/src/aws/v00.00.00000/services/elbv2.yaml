          description: The Amazon Resource Name (ARN) of the target group.
        HealthCheckProtocol:
          $ref: "#/components/schemas/ProtocolEnum"
          description: The protocol the load balancer uses when performing health checks on targets. For Application Load Balancers, the default is HTTP. For Network Load Balancers and Gateway Load Balancers, the default is TCP. The TCP protocol is not supported for health checks if the protocol of the target group is HTTP or HTTPS. It is supported for health checks only if the protocol of the target group is TCP, TLS, UDP, or TCP_UDP. The GENEVE, TLS, UDP, TCP_UDP, QUIC, and TCP_QUIC protocols are not supported for health checks.
        HealthCheckPort:
          $ref: "#/components/schemas/HealthCheckPort"
          description: The port the load balancer uses when performing health checks on targets.
        HealthCheckPath:
          $ref: "#/components/schemas/Path"
          description: "[HTTP/HTTPS health checks] The destination for health checks on the targets. [HTTP1 or HTTP2 protocol version] The ping path. The default is /. [GRPC protocol version] The path of a custom health check method with the format /package.service/method. The default is /Amazon Web Services.ALB/healthcheck."
        HealthCheckEnabled:
          $ref: "#/components/schemas/HealthCheckEnabled"
          description: Indicates whether health checks are enabled. If the target type is lambda, health checks are disabled by default but can be enabled. If the target type is instance, ip, or alb, health checks are always enabled and can't be disabled.
        HealthCheckIntervalSeconds:
          $ref: "#/components/schemas/HealthCheckIntervalSeconds"
          description: The approximate amount of time, in seconds, between health checks of an individual target.
        HealthCheckTimeoutSeconds:
          $ref: "#/components/schemas/HealthCheckTimeoutSeconds"
          description: "[HTTP/HTTPS health checks] The amount of time, in seconds, during which no response means a failed health check."
        HealthyThresholdCount:
          $ref: "#/components/schemas/HealthCheckThresholdCount"
          description: The number of consecutive health checks successes required before considering an unhealthy target healthy.
        UnhealthyThresholdCount:
          $ref: "#/components/schemas/HealthCheckThresholdCount"
          description: The number of consecutive health check failures required before considering the target unhealthy.
        Matcher:
          $ref: "#/components/schemas/Matcher"
          description: "[HTTP/HTTPS health checks] The HTTP or gRPC codes to use when checking for a successful response from a target. For target groups with a protocol of TCP, TCP_UDP, UDP or TLS the range is 200-599. For target groups with a protocol of HTTP or HTTPS, the range is 200-499. For target groups with a protocol of GENEVE, the range is 200-399."
