  /?Action=SetSubnets&Version=2015-12-01:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_SetSubnets
      description: Enables the Availability Zones for the specified public subnets for the specified Application Load Balancer, Network Load Balancer or Gateway Load Balancer. The specified subnets replace the previously enabled subnets.
      parameters:
        - name: LoadBalancerArn
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the load balancer.
          schema:
            $ref: "#/components/schemas/LoadBalancerArn"
        - name: Subnets
          in: query
          required: false
          description: The IDs of the public subnets. You can specify only one subnet per Availability Zone. You must specify either subnets or subnet mappings. [Application Load Balancers] You must specify subnets from at least two Availability Zones. [Application Load Balancers on Outposts] You must specify one Outpost subnet. [Application Load Balancers on Local Zones] You can specify subnets from one or more Local Zones. [Network Load Balancers] You can specify subnets from one or more Availability Zones. [Gateway Load Balancers] You can specify subnets from one or more Availability Zones. You must include all subnets that were enabled previously, with their existing configurations, plus any additional subnets.
          schema:
            $ref: "#/components/schemas/Subnets"
        - name: SubnetMappings
          in: query
          required: false
          description: The IDs of the public subnets. You can specify only one subnet per Availability Zone. You must specify either subnets or subnet mappings. [Application Load Balancers] You must specify subnets from at least two Availability Zones. You can't specify Elastic IP addresses for your subnets. [Application Load Balancers on Outposts] You must specify one Outpost subnet. [Application Load Balancers on Local Zones] You can specify subnets from one or more Local Zones. [Network Load Balancers] You can specify subnets from one or more Availability Zones. You can specify one Elastic IP address per subnet if you need static IP addresses for your internet-facing load balancer. For internal load balancers, you can specify one private IP address per subnet from the IPv4 range of the subnet. For internet-facing load balancer, you can specify one IPv6 address per subnet. [Gateway Load Balancers] You can specify subnets from one or more Availability Zones.
          schema:
            $ref: "#/components/schemas/SubnetMappings"
        - name: IpAddressType
          in: query
          required: false
          description: The IP address type. [Application Load Balancers] The possible values are ipv4 (IPv4 addresses), dualstack (IPv4 and IPv6 addresses), and dualstack-without-public-ipv4 (public IPv6 addresses and private IPv4 and IPv6 addresses). [Network Load Balancers and Gateway Load Balancers] The possible values are ipv4 (IPv4 addresses) and dualstack (IPv4 and IPv6 addresses).
          schema:
            $ref: "#/components/schemas/IpAddressType"
        - name: EnablePrefixForIpv6SourceNat
          in: query
          required: false
          description: "[Network Load Balancers with UDP listeners] Indicates whether to use an IPv6 prefix from each subnet for source NAT. The IP address type must be dualstack. The default value is off."
          schema:
            $ref: "#/components/schemas/EnablePrefixForIpv6SourceNatEnum"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SetSubnetsOutputDisplay"
    post:
      operationId: POST_SetSubnets
      description: Enables the Availability Zones for the specified public subnets for the specified Application Load Balancer, Network Load Balancer or Gateway Load Balancer. The specified subnets replace the previously enabled subnets.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SetSubnetsOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/SetSubnetsInput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ListenerArn:
      type: string
    CertificateList:
      type: array
      items:
        $ref: "#/components/schemas/Certificate"
    Certificate:
      description: Information about an SSL server certificate.
      type: object
      properties:
        CertificateArn:
          $ref: "#/components/schemas/CertificateArn"
          description: The Amazon Resource Name (ARN) of the certificate.
        IsDefault:
          $ref: "#/components/schemas/Default"
          description: Indicates whether the certificate is the default certificate. Do not set this value when specifying a certificate as an input. This value is not included in the output when describing a listener, but is included when describing listener certificates.
    CertificateArn:
      type: string
    Default:
      type: boolean
    AddListenerCertificatesOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AddListenerCertificatesOutputDisplay"
    AddListenerCertificatesInput:
      type: object
      properties:
        ListenerArn:
          $ref: "#/components/schemas/ListenerArn"
          description: The Amazon Resource Name (ARN) of the listener.
        Certificates:
          $ref: "#/components/schemas/CertificateList"
          description: The certificate to add. You can specify one certificate per call. Set CertificateArn to the certificate ARN but do not set IsDefault.
      required:
        - ListenerArn
        - Certificates
    ResourceArns:
      type: array
      items:
        $ref: "#/components/schemas/ResourceArn"
    ResourceArn:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Information about a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the tag.
      required:
        - Key
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    AddTagsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/AddTagsOutputDisplay"
    AddTagsInput:
      type: object
      properties:
        ResourceArns:
          $ref: "#/components/schemas/ResourceArns"
          description: The Amazon Resource Name (ARN) of the resource.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags.
      required:
        - ResourceArns
        - Tags
    TrustStoreArn:
      type: string
    RevocationContents:
      type: array
      items:
        $ref: "#/components/schemas/RevocationContent"
    RevocationContent:
      description: Information about a revocation file.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The Amazon S3 bucket for the revocation file.
        S3Key:
          $ref: "#/components/schemas/S3Key"
          description: The Amazon S3 path for the revocation file.
        S3ObjectVersion:
          $ref: "#/components/schemas/S3ObjectVersion"
          description: The Amazon S3 object version of the revocation file.
        RevocationType:
          $ref: "#/components/schemas/RevocationType"
          description: The type of revocation file.
    S3Bucket:
      type: string
    S3Key:
      type: string
    S3ObjectVersion:
      type: string
    RevocationType:
      type: string
      enum:
        - CRL
    TrustStoreRevocationDisplay:
      type: object
      properties:
        TrustStoreArn:
          type: string
          description: The Amazon Resource Name (ARN) of the trust store.
        RevocationId:
          type: integer
          description: The revocation ID of the revocation file.
        RevocationType:
          type: string
          description: The type of revocation file.
        NumberOfRevokedEntries:
          type: integer
          description: The number of revoked certificates.
    AddTrustStoreRevocationsOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/TrustStoreRevocationDisplay"
    AddTrustStoreRevocationsInput:
      type: object
      properties:
        TrustStoreArn:
          $ref: "#/components/schemas/TrustStoreArn"
          description: The Amazon Resource Name (ARN) of the trust store.
        RevocationContents:
          $ref: "#/components/schemas/RevocationContents"
          description: The revocation file to add.
      required:
        - TrustStoreArn
    LoadBalancerArn:
      type: string
    ProtocolEnum:
      type: string
      enum:
        - HTTP
        - HTTPS
        - TCP
        - TLS
        - UDP
        - TCP_UDP
        - GENEVE
        - QUIC
        - TCP_QUIC
    Port:
      type: integer
      minimum: 1
      maximum: 65535
    SslPolicyName:
      type: string
    Actions:
      type: array
      items:
        $ref: "#/components/schemas/Action"
    Action:
      description: "Information about an action. Each rule must include exactly one of the following routing actions: forward, fixed-response, or redirect, and it must be the last action to be performed. Optionally, a rule for an HTTPS listener can also include one of the following user authentication actions: authenticate-oidc, authenticate-cognito, or jwt-validation."
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ActionTypeEnum"
          description: The type of action.
        TargetGroupArn:
          $ref: "#/components/schemas/TargetGroupArn"
          description: The Amazon Resource Name (ARN) of the target group. Specify only when Type is forward and you want to route to a single target group. To route to multiple target groups, you must use ForwardConfig instead.
        AuthenticateOidcConfig:
          $ref: "#/components/schemas/AuthenticateOidcActionConfig"
          description: "[HTTPS listeners] Information about an identity provider that is compliant with OpenID Connect (OIDC). Specify only when Type is authenticate-oidc."
        AuthenticateCognitoConfig:
          $ref: "#/components/schemas/AuthenticateCognitoActionConfig"
          description: "[HTTPS listeners] Information for using Amazon Cognito to authenticate users. Specify only when Type is authenticate-cognito."
        Order:
          $ref: "#/components/schemas/ActionOrder"
          description: The order for the action. This value is required for rules with multiple actions. The action with the lowest value for order is performed first.
        RedirectConfig:
          $ref: "#/components/schemas/RedirectActionConfig"
          description: "[Application Load Balancer] Information for creating a redirect action. Specify only when Type is redirect."
        FixedResponseConfig:
          $ref: "#/components/schemas/FixedResponseActionConfig"
          description: "[Application Load Balancer] Information for creating an action that returns a custom HTTP response. Specify only when Type is fixed-response."
        ForwardConfig:
          $ref: "#/components/schemas/ForwardActionConfig"
          description: Information for creating an action that distributes requests among multiple target groups. Specify only when Type is forward. If you specify both ForwardConfig and TargetGroupArn, you can specify only one target group using ForwardConfig and it must be the same target group specified in TargetGroupArn.
        JwtValidationConfig:
          $ref: "#/components/schemas/JwtValidationActionConfig"
          description: "[HTTPS listeners] Information for validating JWT access tokens in client requests. Specify only when Type is jwt-validation."
      required:
        - Type
    ActionTypeEnum:
      type: string
      enum:
        - forward
        - authenticate-oidc
        - authenticate-cognito
        - redirect
        - fixed-response
        - jwt-validation
    TargetGroupArn:
      type: string
    AuthenticateOidcActionConfig:
      description: Request parameters when using an identity provider (IdP) that is compliant with OpenID Connect (OIDC) to authenticate users.
      type: object
      properties:
        Issuer:
          $ref: "#/components/schemas/AuthenticateOidcActionIssuer"
          description: The OIDC issuer identifier of the IdP. This must be a full URL, including the HTTPS protocol, the domain, and the path.
        AuthorizationEndpoint:
          $ref: "#/components/schemas/AuthenticateOidcActionAuthorizationEndpoint"
          description: The authorization endpoint of the IdP. This must be a full URL, including the HTTPS protocol, the domain, and the path.
        TokenEndpoint:
          $ref: "#/components/schemas/AuthenticateOidcActionTokenEndpoint"
          description: The token endpoint of the IdP. This must be a full URL, including the HTTPS protocol, the domain, and the path.
        UserInfoEndpoint:
          $ref: "#/components/schemas/AuthenticateOidcActionUserInfoEndpoint"
          description: The user info endpoint of the IdP. This must be a full URL, including the HTTPS protocol, the domain, and the path.
        ClientId:
          $ref: "#/components/schemas/AuthenticateOidcActionClientId"
          description: The OAuth 2.0 client identifier.
        ClientSecret:
          $ref: "#/components/schemas/AuthenticateOidcActionClientSecret"
          description: The OAuth 2.0 client secret. This parameter is required if you are creating a rule. If you are modifying a rule, you can omit this parameter if you set UseExistingClientSecret to true.
        SessionCookieName:
          $ref: "#/components/schemas/AuthenticateOidcActionSessionCookieName"
          description: The name of the cookie used to maintain session information. The default is AWSELBAuthSessionCookie.
        Scope:
          $ref: "#/components/schemas/AuthenticateOidcActionScope"
          description: The set of user claims to be requested from the IdP. The default is openid. To verify which scope values your IdP supports and how to separate multiple values, see the documentation for your IdP.
        SessionTimeout:
          $ref: "#/components/schemas/AuthenticateOidcActionSessionTimeout"
          description: The maximum duration of the authentication session, in seconds. The default is 604800 seconds (7 days).
        AuthenticationRequestExtraParams:
          type: object
          properties: {}
          description: The query parameters (up to 10) to include in the redirect request to the authorization endpoint.
        OnUnauthenticatedRequest:
          $ref: "#/components/schemas/AuthenticateOidcActionConditionalBehaviorEnum"
          description: "The behavior if the user is not authenticated. The following are possible values: deny - Return an HTTP 401 Unauthorized error. allow - Allow the request to be forwarded to the target. authenticate - Redirect the request to the IdP authorization endpoint. This is the default value."
        UseExistingClientSecret:
          $ref: "#/components/schemas/AuthenticateOidcActionUseExistingClientSecret"
          description: Indicates whether to use the existing client secret when modifying a rule. If you are creating a rule, you can omit this parameter or set it to false.
      required:
        - Issuer
        - AuthorizationEndpoint
        - TokenEndpoint
        - UserInfoEndpoint
        - ClientId
    AuthenticateOidcActionIssuer:
      type: string
    AuthenticateOidcActionAuthorizationEndpoint:
      type: string
    AuthenticateOidcActionTokenEndpoint:
      type: string
    AuthenticateOidcActionUserInfoEndpoint:
      type: string
    AuthenticateOidcActionClientId:
      type: string
    AuthenticateOidcActionClientSecret:
      type: string
    AuthenticateOidcActionSessionCookieName:
      type: string
    AuthenticateOidcActionScope:
      type: string
    AuthenticateOidcActionSessionTimeout:
      type: integer
      format: int64
    AuthenticateOidcActionConditionalBehaviorEnum:
      type: string
      enum:
        - deny
        - allow
        - authenticate
    AuthenticateOidcActionUseExistingClientSecret:
      type: boolean
    AuthenticateCognitoActionConfig:
      description: Request parameters to use when integrating with Amazon Cognito to authenticate users.
      type: object
      properties:
        UserPoolArn:
          $ref: "#/components/schemas/AuthenticateCognitoActionUserPoolArn"
          description: The Amazon Resource Name (ARN) of the Amazon Cognito user pool.
        UserPoolClientId:
          $ref: "#/components/schemas/AuthenticateCognitoActionUserPoolClientId"
          description: The ID of the Amazon Cognito user pool client.
        UserPoolDomain:
          $ref: "#/components/schemas/AuthenticateCognitoActionUserPoolDomain"
          description: The domain prefix or fully-qualified domain name of the Amazon Cognito user pool.
        SessionCookieName:
          $ref: "#/components/schemas/AuthenticateCognitoActionSessionCookieName"
          description: The name of the cookie used to maintain session information. The default is AWSELBAuthSessionCookie.
        Scope:
          $ref: "#/components/schemas/AuthenticateCognitoActionScope"
          description: The set of user claims to be requested from the IdP. The default is openid. To verify which scope values your IdP supports and how to separate multiple values, see the documentation for your IdP.
        SessionTimeout:
          $ref: "#/components/schemas/AuthenticateCognitoActionSessionTimeout"
          description: The maximum duration of the authentication session, in seconds. The default is 604800 seconds (7 days).
        AuthenticationRequestExtraParams:
          type: object
          properties: {}
          description: The query parameters (up to 10) to include in the redirect request to the authorization endpoint.
        OnUnauthenticatedRequest:
          $ref: "#/components/schemas/AuthenticateCognitoActionConditionalBehaviorEnum"
          description: "The behavior if the user is not authenticated. The following are possible values: deny - Return an HTTP 401 Unauthorized error. allow - Allow the request to be forwarded to the target. authenticate - Redirect the request to the IdP authorization endpoint. This is the default value."
      required:
        - UserPoolArn
        - UserPoolClientId
        - UserPoolDomain
    AuthenticateCognitoActionUserPoolArn:
      type: string
    AuthenticateCognitoActionUserPoolClientId:
      type: string
    AuthenticateCognitoActionUserPoolDomain:
      type: string
    AuthenticateCognitoActionSessionCookieName:
      type: string
    AuthenticateCognitoActionScope:
      type: string
    AuthenticateCognitoActionSessionTimeout:
      type: integer
      format: int64
    AuthenticateCognitoActionConditionalBehaviorEnum:
      type: string
      enum:
        - deny
        - allow
        - authenticate
    ActionOrder:
      type: integer
      minimum: 1
      maximum: 50000
    RedirectActionConfig:
      description: 'Information about a redirect action. A URI consists of the following components: protocol://hostname:port/path?query. You must modify at least one of the following components to avoid a redirect loop: protocol, hostname, port, or path. Any components that you do not modify retain their original values. You can reuse URI components using the following reserved keywords: #{protocol} #{host} #{port} #{path} (the leading "/" is removed) #{query} For example, you can change the path to "/new/#{path}", the hostname to "example.#{host}", or the query to "#{query}&value=xyz".'
      type: object
      properties:
        Protocol:
          $ref: "#/components/schemas/RedirectActionProtocol"
          description: "The protocol. You can specify HTTP, HTTPS, or #{protocol}. You can redirect HTTP to HTTP, HTTP to HTTPS, and HTTPS to HTTPS. You can't redirect HTTPS to HTTP."
        Port:
          $ref: "#/components/schemas/RedirectActionPort"
          description: "The port. You can specify a value from 1 to 65535 or #{port}."
        Host:
          $ref: "#/components/schemas/RedirectActionHost"
          description: "The hostname. This component is not percent-encoded. The hostname can contain #{host}."
        Path:
          $ref: "#/components/schemas/RedirectActionPath"
          description: 'The absolute path, starting with the leading "/". This component is not percent-encoded. The path can contain #{host}, #{path}, and #{port}.'
        Query:
          $ref: "#/components/schemas/RedirectActionQuery"
          description: The query parameters, URL-encoded when necessary, but not percent-encoded. Do not include the leading "?", as it is automatically added. You can specify any of the reserved keywords.
        StatusCode:
          $ref: "#/components/schemas/RedirectActionStatusCodeEnum"
          description: The HTTP redirect code. The redirect is either permanent (HTTP 301) or temporary (HTTP 302).
      required:
        - StatusCode
    RedirectActionProtocol:
      type: string
      pattern: ^(HTTPS?|#\{protocol\})$
    RedirectActionPort:
      type: string
    RedirectActionHost:
      type: string
      minLength: 1
      maxLength: 128
    RedirectActionPath:
      type: string
      minLength: 1
      maxLength: 128
    RedirectActionQuery:
      type: string
      minLength: 0
      maxLength: 128
    RedirectActionStatusCodeEnum:
      type: string
      enum:
        - HTTP_301
        - HTTP_302
    FixedResponseActionConfig:
      description: Information about an action that returns a custom HTTP response.
      type: object
      properties:
        MessageBody:
          $ref: "#/components/schemas/FixedResponseActionMessage"
          description: The message.
        StatusCode:
          $ref: "#/components/schemas/FixedResponseActionStatusCode"
          description: The HTTP response code (2XX, 4XX, or 5XX).
        ContentType:
          $ref: "#/components/schemas/FixedResponseActionContentType"
          description: "The content type. Valid Values: text/plain | text/css | text/html | application/javascript | application/json"
      required:
        - StatusCode
    FixedResponseActionMessage:
      type: string
      minLength: 0
      maxLength: 1024
    FixedResponseActionStatusCode:
      type: string
      pattern: ^(2|4|5)\d\d$
    FixedResponseActionContentType:
      type: string
      minLength: 0
      maxLength: 32
    ForwardActionConfig:
      description: Information about a forward action.
      type: object
      properties:
        TargetGroups:
          $ref: "#/components/schemas/TargetGroupList"
          description: The target groups.
        TargetGroupStickinessConfig:
          $ref: "#/components/schemas/TargetGroupStickinessConfig"
          description: The target group stickiness for the rule.
    TargetGroupList:
      type: array
      items:
        $ref: "#/components/schemas/TargetGroupTuple"
    TargetGroupTuple:
      description: Information about how traffic will be distributed between multiple target groups in a forward rule.
      type: object
      properties:
        TargetGroupArn:
          $ref: "#/components/schemas/TargetGroupArn"
          description: The Amazon Resource Name (ARN) of the target group.
        Weight:
          $ref: "#/components/schemas/TargetGroupWeight"
          description: The weight. The range is 0 to 999.
    TargetGroupWeight:
      type: integer
    TargetGroupStickinessConfig:
      description: Information about the target group stickiness for a rule.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/TargetGroupStickinessEnabled"
          description: Indicates whether target group stickiness is enabled.
        DurationSeconds:
          $ref: "#/components/schemas/TargetGroupStickinessDurationSeconds"
          description: "[Application Load Balancers] The time period, in seconds, during which requests from a client should be routed to the same target group. The range is 1-604800 seconds (7 days). You must specify this value when enabling target group stickiness."
    TargetGroupStickinessEnabled:
      type: boolean
    TargetGroupStickinessDurationSeconds:
      type: integer
    JwtValidationActionConfig:
      description: Information about a JSON Web Token (JWT) validation action.
      type: object
      properties:
        JwksEndpoint:
          $ref: "#/components/schemas/JwtValidationActionJwksEndpoint"
          description: The JSON Web Key Set (JWKS) endpoint. This endpoint contains JSON Web Keys (JWK) that are used to validate signatures from the provider. This must be a full URL, including the HTTPS protocol, the domain, and the path. The maximum length is 256 characters.
        Issuer:
          $ref: "#/components/schemas/JwtValidationActionIssuer"
          description: The issuer of the JWT. The maximum length is 256 characters.
        AdditionalClaims:
          $ref: "#/components/schemas/JwtValidationActionAdditionalClaims"
          description: Additional claims to validate. The maximum size of the list is 10. We validate the exp, iss, nbf, and iat claims by default.
      required:
        - JwksEndpoint
        - Issuer
    JwtValidationActionJwksEndpoint:
      type: string
    JwtValidationActionIssuer:
      type: string
    JwtValidationActionAdditionalClaims:
      type: array
      items:
        $ref: "#/components/schemas/JwtValidationActionAdditionalClaim"
    JwtValidationActionAdditionalClaim:
      description: Information about an additional claim to validate.
      type: object
      properties:
        Format:
          $ref: "#/components/schemas/JwtValidationActionAdditionalClaimFormatEnum"
          description: The format of the claim value.
        Name:
          $ref: "#/components/schemas/JwtValidationActionAdditionalClaimName"
          description: The name of the claim. You can't specify exp, iss, nbf, or iat because we validate them by default.
        Values:
          $ref: "#/components/schemas/JwtValidationActionAdditionalClaimValues"
          description: The claim value. The maximum size of the list is 10. Each value can be up to 256 characters in length. If the format is space-separated-values, the values can't include spaces.
      required:
        - Format
        - Name
        - Values
    JwtValidationActionAdditionalClaimFormatEnum:
      type: string
      enum:
        - single-string
        - string-array
        - space-separated-values
    JwtValidationActionAdditionalClaimName:
      type: string
    JwtValidationActionAdditionalClaimValues:
      type: array
      items:
        $ref: "#/components/schemas/JwtValidationActionAdditionalClaimValue"
    JwtValidationActionAdditionalClaimValue:
      type: string
    AlpnPolicyName:
      type: array
      items:
        $ref: "#/components/schemas/AlpnPolicyValue"
    AlpnPolicyValue:
      type: string
    MutualAuthenticationAttributes:
      description: Information about the mutual authentication attributes of a listener.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/Mode"
          description: The client certificate handling method. Options are off, passthrough or verify. The default value is off.
        TrustStoreArn:
          $ref: "#/components/schemas/TrustStoreArn"
          description: The Amazon Resource Name (ARN) of the trust store.
        IgnoreClientCertificateExpiry:
          $ref: "#/components/schemas/IgnoreClientCertificateExpiry"
          description: Indicates whether expired client certificates are ignored.
        TrustStoreAssociationStatus:
          $ref: "#/components/schemas/TrustStoreAssociationStatusEnum"
          description: Indicates a shared trust stores association status.
        AdvertiseTrustStoreCaNames:
          $ref: "#/components/schemas/AdvertiseTrustStoreCaNamesEnum"
          description: Indicates whether trust store CA certificate names are advertised.
    Mode:
      type: string
    IgnoreClientCertificateExpiry:
      type: boolean
    TrustStoreAssociationStatusEnum:
      type: string
      enum:
        - active
        - removed
    AdvertiseTrustStoreCaNamesEnum:
      type: string
      enum:
        - "on"
        - "off"
    CreateListenerOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateListenerOutputDisplay"
    CreateListenerInput:
      type: object
      properties:
        LoadBalancerArn:
          $ref: "#/components/schemas/LoadBalancerArn"
          description: The Amazon Resource Name (ARN) of the load balancer.
        Protocol:
          $ref: "#/components/schemas/ProtocolEnum"
          description: The protocol for connections from clients to the load balancer. For Application Load Balancers, the supported protocols are HTTP and HTTPS. For Network Load Balancers, the supported protocols are TCP, TLS, UDP, TCP_UDP, QUIC, and TCP_QUIC. You can’t specify the UDP, TCP_UDP, QUIC, or TCP_QUIC protocol if dual-stack mode is enabled. You can't specify a protocol for a Gateway Load Balancer.
        Port:
          $ref: "#/components/schemas/Port"
          description: The port on which the load balancer is listening. You can't specify a port for a Gateway Load Balancer.
        SslPolicy:
          $ref: "#/components/schemas/SslPolicyName"
          description: "[HTTPS and TLS listeners] The security policy that defines which protocols and ciphers are supported. For more information, see Security policies in the Application Load Balancers Guide and Security policies in the Network Load Balancers Guide."
        Certificates:
          $ref: "#/components/schemas/CertificateList"
          description: "[HTTPS and TLS listeners] The default certificate for the listener. You must provide exactly one certificate. Set CertificateArn to the certificate ARN but do not set IsDefault."
        DefaultActions:
          $ref: "#/components/schemas/Actions"
          description: The actions for the default rule.
        AlpnPolicy:
          $ref: "#/components/schemas/AlpnPolicyName"
          description: "[TLS listeners] The name of the Application-Layer Protocol Negotiation (ALPN) policy. You can specify one policy name. The following are the possible values: HTTP1Only HTTP2Only HTTP2Optional HTTP2Preferred None For more information, see ALPN policies in the Network Load Balancers Guide."
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to assign to the listener.
        MutualAuthentication:
          $ref: "#/components/schemas/MutualAuthenticationAttributes"
          description: "[HTTPS listeners] The mutual authentication configuration information."
      required:
        - LoadBalancerArn
        - DefaultActions
    LoadBalancerName:
      type: string
    Subnets:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
    SubnetMappings:
      type: array
      items:
        $ref: "#/components/schemas/SubnetMapping"
    SubnetMapping:
      description: Information about a subnet mapping.
      type: object
      properties:
        SubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: The ID of the subnet.
        AllocationId:
          $ref: "#/components/schemas/AllocationId"
          description: "[Network Load Balancers] The allocation ID of the Elastic IP address for an internet-facing load balancer."
        PrivateIPv4Address:
          $ref: "#/components/schemas/PrivateIPv4Address"
          description: "[Network Load Balancers] The private IPv4 address for an internal load balancer."
        IPv6Address:
          $ref: "#/components/schemas/IPv6Address"
          description: "[Network Load Balancers] The IPv6 address."
        SourceNatIpv6Prefix:
          $ref: "#/components/schemas/SourceNatIpv6Prefix"
          description: "[Network Load Balancers with UDP listeners] The IPv6 prefix to use for source NAT. Specify an IPv6 prefix (/80 netmask) from the subnet CIDR block or auto_assigned to use an IPv6 prefix selected at random from the subnet CIDR block."
    AllocationId:
      type: string
    PrivateIPv4Address:
      type: string
    IPv6Address:
      type: string
    SourceNatIpv6Prefix:
      type: string
    SecurityGroups:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
    LoadBalancerSchemeEnum:
      type: string
      enum:
        - internet-facing
        - internal
    LoadBalancerTypeEnum:
      type: string
      enum:
        - application
        - network
        - gateway
    IpAddressType:
      type: string
      enum:
        - ipv4
        - dualstack
        - dualstack-without-public-ipv4
    CustomerOwnedIpv4Pool:
      type: string
      maxLength: 256
      pattern: ^(ipv4pool-coip-)[a-zA-Z0-9]+$
    EnablePrefixForIpv6SourceNatEnum:
      type: string
      enum:
        - "on"
        - "off"
    IpamPools:
      description: An IPAM pool is a collection of IP address CIDRs. IPAM pools enable you to organize your IP addresses according to your routing and security needs.
      type: object
      properties:
        Ipv4IpamPoolId:
          $ref: "#/components/schemas/IpamPoolId"
          description: The ID of the IPv4 IPAM pool.
    IpamPoolId:
      type: string
      maxLength: 1000
      pattern: ^(ipam-pool-)[a-zA-Z0-9]+$
    CreateLoadBalancerOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/CreateLoadBalancerOutputDisplay"
    CreateLoadBalancerInput:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/LoadBalancerName"
          description: The name of the load balancer. This name must be unique per region per account, can have a maximum of 32 characters, must contain only alphanumeric characters or hyphens, must not begin or end with a hyphen, and must not begin with "internal-".
        Subnets:
          $ref: "#/components/schemas/Subnets"
          description: The IDs of the subnets. You can specify only one subnet per Availability Zone. You must specify either subnets or subnet mappings, but not both. To specify an Elastic IP address, specify subnet mappings instead of subnets. [Application Load Balancers] You must specify subnets from at least two Availability Zones. [Application Load Balancers on Outposts] You must specify one Outpost subnet. [Application Load Balancers on Local Zones] You can specify subnets from one or more Local Zones. [Network Load Balancers and Gateway Load Balancers] You can specify subnets from one or more Availability Zones.
        SubnetMappings:
          $ref: "#/components/schemas/SubnetMappings"
          description: The IDs of the subnets. You can specify only one subnet per Availability Zone. You must specify either subnets or subnet mappings, but not both. [Application Load Balancers] You must specify subnets from at least two Availability Zones. You can't specify Elastic IP addresses for your subnets. [Application Load Balancers on Outposts] You must specify one Outpost subnet. [Application Load Balancers on Local Zones] You can specify subnets from one or more Local Zones. [Network Load Balancers] You can specify subnets from one or more Availability Zones. You can specify one Elastic IP address per subnet if you need static IP addresses for your internet-facing load balancer. For internal load balancers, you can specify one private IP address per subnet from the IPv4 range of the subnet. For internet-facing load balancer, you can specify one IPv6 address per subnet. [Gateway Load Balancers] You can specify subnets from one or more Availability Zones. You can't specify Elastic IP addresses for your subnets.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: "[Application Load Balancers and Network Load Balancers] The IDs of the security groups for the load balancer."
        Scheme:
          $ref: "#/components/schemas/LoadBalancerSchemeEnum"
          description: The nodes of an Internet-facing load balancer have public IP addresses. The DNS name of an Internet-facing load balancer is publicly resolvable to the public IP addresses of the nodes. Therefore, Internet-facing load balancers can route requests from clients over the internet. The nodes of an internal load balancer have only private IP addresses. The DNS name of an internal load balancer is publicly resolvable to the private IP addresses of the nodes. Therefore, internal load balancers can route requests only from clients with access to the VPC for the load balancer. The default is an Internet-facing load balancer. You can't specify a scheme for a Gateway Load Balancer.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to assign to the load balancer.
        Type:
          $ref: "#/components/schemas/LoadBalancerTypeEnum"
          description: The type of load balancer. The default is application.
        IpAddressType:
          $ref: "#/components/schemas/IpAddressType"
          description: The IP address type. Internal load balancers must use ipv4. [Application Load Balancers] The possible values are ipv4 (IPv4 addresses), dualstack (IPv4 and IPv6 addresses), and dualstack-without-public-ipv4 (public IPv6 addresses and private IPv4 and IPv6 addresses). [Network Load Balancers and Gateway Load Balancers] The possible values are ipv4 (IPv4 addresses) and dualstack (IPv4 and IPv6 addresses).
        CustomerOwnedIpv4Pool:
          $ref: "#/components/schemas/CustomerOwnedIpv4Pool"
          description: "[Application Load Balancers on Outposts] The ID of the customer-owned address pool (CoIP pool)."
        EnablePrefixForIpv6SourceNat:
          $ref: "#/components/schemas/EnablePrefixForIpv6SourceNatEnum"
          description: "[Network Load Balancers with UDP listeners] Indicates whether to use an IPv6 prefix from each subnet for source NAT. The IP address type must be dualstack. The default value is off."
        IpamPools:
          $ref: "#/components/schemas/IpamPools"
          description: "[Application Load Balancers] The IPAM pools to use with the load balancer."
      required:
        - Name
    RuleConditionList:
      type: array
      items:
        $ref: "#/components/schemas/RuleCondition"
    RuleCondition:
      description: "Information about a condition for a rule. Each rule can optionally include up to one of each of the following conditions: http-request-method, host-header, path-pattern, and source-ip. Each rule can also optionally include one or more of each of the following conditions: http-header and query-string. Note that the value for a condition can't be empty. For more information, see Quotas for your Application Load Balancers."
      type: object
      properties:
        Field:
          $ref: "#/components/schemas/ConditionFieldName"
          description: "The field in the HTTP request. The following are the possible values: http-header http-request-method host-header path-pattern query-string source-ip"
        Values:
          $ref: "#/components/schemas/ListOfString"
          description: "The condition value. Specify only when Field is host-header or path-pattern. Alternatively, to specify multiple host names or multiple path patterns, use HostHeaderConfig or PathPatternConfig. If Field is host-header and you are not using HostHeaderConfig, you can specify a single host name (for example, my.example.com) in Values. A host name is case insensitive, can be up to 128 characters in length, and can contain any of the following characters. A-Z, a-z, 0-9 - . * (matches 0 or more characters) ? (matches exactly 1 character) If Field is path-pattern and you are not using PathPatternConfig, you can specify a single path pattern (for example, /img/*) in Values. A path pattern is case-sensitive, can be up to 128 characters in length, and can contain any of the following characters. A-Z, a-z, 0-9 _ - . $ / ~ \" ' @ : + & (using &amp;) * (matches 0 or more characters) ? (matches exactly 1 character)"
        HostHeaderConfig:
          $ref: "#/components/schemas/HostHeaderConditionConfig"
          description: Information for a host header condition. Specify only when Field is host-header.
        PathPatternConfig:
          $ref: "#/components/schemas/PathPatternConditionConfig"
          description: Information for a path pattern condition. Specify only when Field is path-pattern.
        HttpHeaderConfig:
          $ref: "#/components/schemas/HttpHeaderConditionConfig"
          description: Information for an HTTP header condition. Specify only when Field is http-header.
        QueryStringConfig:
          $ref: "#/components/schemas/QueryStringConditionConfig"
          description: Information for a query string condition. Specify only when Field is query-string.
        HttpRequestMethodConfig:
          $ref: "#/components/schemas/HttpRequestMethodConditionConfig"
          description: Information for an HTTP method condition. Specify only when Field is http-request-method.
        SourceIpConfig:
          $ref: "#/components/schemas/SourceIpConditionConfig"
          description: Information for a source IP condition. Specify only when Field is source-ip.
        RegexValues:
          $ref: "#/components/schemas/ListOfString"
          description: The regular expressions to match against the condition field. The maximum length of each string is 128 characters. Specify only when Field is http-header, host-header, or path-pattern.
    ConditionFieldName:
      type: string
      maxLength: 64
    ListOfString:
      type: array
      items:
        $ref: "#/components/schemas/StringValue"
    StringValue:
      type: string
    HostHeaderConditionConfig:
      description: Information about a host header condition.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ListOfString"
          description: 'The host names. The maximum length of each string is 128 characters. The comparison is case insensitive. The following wildcard characters are supported: * (matches 0 or more characters) and ? (matches exactly 1 character). You must include at least one "." character. You can include only alphabetical characters after the final "." character. If you specify multiple strings, the condition is satisfied if one of the strings matches the host name.'
        RegexValues:
          $ref: "#/components/schemas/ListOfString"
          description: The regular expressions to compare against the host header. The maximum length of each string is 128 characters.
    PathPatternConditionConfig:
      description: Information about a path pattern condition.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ListOfString"
          description: "The path patterns to compare against the request URL. The maximum length of each string is 128 characters. The comparison is case sensitive. The following wildcard characters are supported: * (matches 0 or more characters) and ? (matches exactly 1 character). If you specify multiple strings, the condition is satisfied if one of them matches the request URL. The path pattern is compared only to the path of the URL, not to its query string. To compare against the query string, use a query string condition."
        RegexValues:
          $ref: "#/components/schemas/ListOfString"
          description: The regular expressions to compare against the request URL. The maximum length of each string is 128 characters.
    HttpHeaderConditionConfig:
      description: Information about an HTTP header condition. There is a set of standard HTTP header fields. You can also define custom HTTP header fields.
      type: object
      properties:
        HttpHeaderName:
          $ref: "#/components/schemas/HttpHeaderConditionName"
          description: The name of the HTTP header field. The maximum length is 40 characters. The header name is case insensitive. The allowed characters are specified by RFC 7230. Wildcards are not supported. You can't use an HTTP header condition to specify the host header. Instead, use a host condition.
        Values:
          $ref: "#/components/schemas/ListOfString"
          description: "The strings to compare against the value of the HTTP header. The maximum length of each string is 128 characters. The comparison strings are case insensitive. The following wildcard characters are supported: * (matches 0 or more characters) and ? (matches exactly 1 character). If the same header appears multiple times in the request, we search them in order until a match is found. If you specify multiple strings, the condition is satisfied if one of the strings matches the value of the HTTP header. To require that all of the strings are a match, create one condition per string."
        RegexValues:
          $ref: "#/components/schemas/ListOfString"
          description: The regular expression to compare against the HTTP header. The maximum length of each string is 128 characters.
    HttpHeaderConditionName:
      type: string
    QueryStringConditionConfig:
      description: Information about a query string condition. The query string component of a URI starts after the first '?' character and is terminated by either a '#' character or the end of the URI. A typical query string contains key/value pairs separated by '&' characters. The allowed characters are specified by RFC 3986. Any character can be percentage encoded.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/QueryStringKeyValuePairList"
          description: "The key/value pairs or values to find in the query string. The maximum length of each string is 128 characters. The comparison is case insensitive. The following wildcard characters are supported: * (matches 0 or more characters) and ? (matches exactly 1 character). To search for a literal '*' or '?' character in a query string, you must escape these characters in Values using a '\\' character. If you specify multiple key/value pairs or values, the condition is satisfied if one of them is found in the query string."
    QueryStringKeyValuePairList:
      type: array
      items:
        $ref: "#/components/schemas/QueryStringKeyValuePair"
    QueryStringKeyValuePair:
      description: Information about a key/value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/StringValue"
          description: The key. You can omit the key.
        Value:
          $ref: "#/components/schemas/StringValue"
          description: The value.
    HttpRequestMethodConditionConfig:
      description: Information about an HTTP method condition. HTTP defines a set of request methods, also referred to as HTTP verbs. For more information, see the HTTP Method Registry. You can also define custom HTTP methods.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ListOfString"
          description: The name of the request method. The maximum length is 40 characters. The allowed characters are A-Z, hyphen (-), and underscore (_). The comparison is case sensitive. Wildcards are not supported; therefore, the method name must be an exact match. If you specify multiple strings, the condition is satisfied if one of the strings matches the HTTP request method. We recommend that you route GET and HEAD requests in the same way, because the response to a HEAD request may be cached.
    SourceIpConditionConfig:
      description: Information about a source IP condition. You can use this condition to route based on the IP address of the source that connects to the load balancer. If a client is behind a proxy, this is the IP address of the proxy not the IP address of the client.
      type: object
      properties:
        Values:
          $ref: "#/components/schemas/ListOfString"
