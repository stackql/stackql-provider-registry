  /browser-profiles/{profile_identifier}/save:
    put:
      operationId: SaveBrowserSessionProfile
      description: "Saves the current state of a browser session as a reusable profile in Amazon Bedrock AgentCore. A browser profile captures persistent browser data such as cookies and local storage from an active session, enabling you to reuse this data in future browser sessions. To save a browser session profile, you must specify the profile identifier, browser identifier, and session ID. The session must be active when saving the profile. Once saved, the profile can be used with the StartBrowserSession operation to initialize new sessions with the stored browser state. Browser profiles are useful for scenarios that require persistent authentication, maintaining user preferences across sessions, or continuing tasks that depend on previously stored browser data. The following operations are related to SaveBrowserSessionProfile: StartBrowserSession GetBrowserSession"
      parameters:
        - name: X-Amzn-Trace-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SaveBrowserSessionProfileRequestTraceIdString"
          description: The trace identifier for request tracking.
        - name: traceparent
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SaveBrowserSessionProfileRequestTraceParentString"
          description: The parent trace information for distributed tracing.
        - name: profile_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BrowserProfileId"
          description: The unique identifier for the browser profile. This identifier is used to reference the profile when starting new browser sessions. The identifier must follow the pattern of an alphanumeric name (up to 48 characters) followed by a hyphen and a 10-character alphanumeric suffix.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                browserIdentifier:
                  $ref: "#/components/schemas/String"
                sessionId:
                  $ref: "#/components/schemas/BrowserSessionId"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - browserIdentifier
                - sessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveBrowserSessionProfileResponse"
