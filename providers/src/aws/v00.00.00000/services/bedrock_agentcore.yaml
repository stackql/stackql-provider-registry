  /browsers/{browser_identifier}/sessions/start:
    put:
      operationId: StartBrowserSession
      description: "Creates and initializes a browser session in Amazon Bedrock AgentCore. The session enables agents to navigate and interact with web content, extract information from websites, and perform web-based tasks as part of their response generation. To create a session, you must specify a browser identifier and a name. You can also configure the viewport dimensions to control the visible area of web content. The session remains active until it times out or you explicitly stop it using the StopBrowserSession operation. The following operations are related to StartBrowserSession: GetBrowserSession UpdateBrowserStream SaveBrowserSessionProfile StopBrowserSession InvokeBrowser"
      parameters:
        - name: X-Amzn-Trace-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/StartBrowserSessionRequestTraceIdString"
          description: The trace identifier for request tracking.
        - name: traceparent
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/StartBrowserSessionRequestTraceParentString"
          description: The parent trace information for distributed tracing.
        - name: browser_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique identifier of the browser to use for this session. This identifier specifies which browser environment to initialize for the session.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/Name"
                sessionTimeoutSeconds:
                  $ref: "#/components/schemas/BrowserSessionTimeout"
                viewPort:
                  $ref: "#/components/schemas/ViewPort"
                extensions:
                  $ref: "#/components/schemas/BrowserExtensions"
                profileConfiguration:
                  $ref: "#/components/schemas/BrowserProfileConfiguration"
                proxyConfiguration:
                  $ref: "#/components/schemas/ProxyConfiguration"
                enterprisePolicies:
                  $ref: "#/components/schemas/BrowserEnterprisePolicies"
                certificates:
                  $ref: "#/components/schemas/Certificates"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartBrowserSessionResponse"
  /code-interpreters/{code_interpreter_identifier}/sessions/start:
    put:
      operationId: StartCodeInterpreterSession
      description: "Creates and initializes a code interpreter session in Amazon Bedrock AgentCore. The session enables agents to execute code as part of their response generation, supporting programming languages such as Python for data analysis, visualization, and computation tasks. To create a session, you must specify a code interpreter identifier and a name. The session remains active until it times out or you explicitly stop it using the StopCodeInterpreterSession operation. The following operations are related to StartCodeInterpreterSession: InvokeCodeInterpreter GetCodeInterpreterSession StopCodeInterpreterSession"
