        outboundAuth:
          $ref: "#/components/schemas/HarnessGatewayOutboundAuth"
          description: How harness authenticates to this Gateway. Defaults to AWS_IAM (SigV4) if omitted.
      required:
        - gatewayArn
    HarnessGatewayOutboundAuth:
      description: Authentication method for calling a Gateway.
      type: object
      properties:
        awsIam:
          $ref: "#/components/schemas/Unit"
          description: SigV4-sign requests using the agent's execution role.
        none:
          $ref: "#/components/schemas/Unit"
          description: No authentication.
        oauth:
          $ref: "#/components/schemas/OAuthCredentialProvider"
          description: OAuth 2.0 authentication via AgentCore Identity.
    Unit:
      type: object
    OAuthCredentialProvider:
      description: Configuration for an OAuth 2.0 credential provider used to authenticate tool calls.
      type: object
      properties:
        providerArn:
          $ref: "#/components/schemas/OAuthCredentialProviderArn"
          description: The ARN of the OAuth 2.0 credential provider in AgentCore Identity.
        scopes:
          $ref: "#/components/schemas/OAuthScopes"
          description: The OAuth 2.0 scopes to request when obtaining an access token.
        customParameters:
          type: object
          properties: {}
          description: Additional custom parameters to include in the OAuth 2.0 token request.
        grantType:
          $ref: "#/components/schemas/OAuthGrantType"
          description: The OAuth 2.0 grant type to use for authentication.
        defaultReturnUrl:
          $ref: "#/components/schemas/OAuthDefaultReturnUrl"
          description: The default return URL for the OAuth 2.0 authorization flow.
      required:
        - providerArn
        - scopes
    OAuthCredentialProviderArn:
      type: string
      pattern: arn:([^:]*):([^:]*):([^:]*):([0-9]{12})?:(.+)
    OAuthScopes:
