        status:
          $ref: "#/components/schemas/PaymentInstrumentStatus"
          description: The status of the instrument after deletion. Always DELETED for successful soft delete.
      required:
        - status
    DeletePaymentSessionResponse:
      description: Response structure for deleting a payment session Returns the deletion status with HTTP 200 status code on successful deletion.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PaymentSessionStatus"
          description: The status of the deletion. Always DELETED for successful hard delete.
      required:
        - status
    PaymentSessionStatus:
      description: The status of a payment session
      type: string
      enum:
        - ACTIVE
        - EXPIRED
        - DELETED
    RecommendationId:
      type: string
      pattern: "[0-9a-zA-Z_-]{1,48}-[0-9A-Z]{10}"
    DeleteRecommendationResponse:
      type: object
      properties:
        recommendationId:
          $ref: "#/components/schemas/RecommendationId"
          description: The unique identifier of the deleted recommendation.
        status:
          $ref: "#/components/schemas/RecommendationStatus"
          description: The status of the recommendation deletion operation.
      required:
        - recommendationId
        - status
    RecommendationStatus:
      type: string
      enum:
        - PENDING
        - IN_PROGRESS
        - COMPLETED
        - FAILED
        - DELETING
    EvaluatorId:
      type: string
      pattern: (Builtin.[a-zA-Z0-9_-]+|[a-zA-Z][a-zA-Z0-9-_]{0,99}-[a-zA-Z0-9]{10})
    EvaluationInput:
      description: The input data structure containing agent session spans in OpenTelemetry format. Supports traces from frameworks like Strands (AgentCore Runtime) and LangGraph with OpenInference instrumentation for comprehensive evaluation.
      type: object
      properties:
        sessionSpans:
          $ref: "#/components/schemas/Spans"
          description: The collection of spans representing agent execution traces within a session. Each span contains detailed information about tool calls, model interactions, and other agent activities that can be evaluated for quality and performance.
    Spans:
      type: array
      items:
        $ref: "#/components/schemas/Span"
    Span:
      type: object
    EvaluationTarget:
      description: "The specification of which trace or span IDs to evaluate within the provided input data. Allows precise targeting of evaluation at different levels: tool calls, traces, or sessions."
      type: object
      properties:
        spanIds:
          $ref: "#/components/schemas/SpanIds"
          description: The list of specific span IDs to evaluate within the provided traces. Used to target evaluation at individual tool calls or specific operations within the agent's execution flow.
        traceIds:
          $ref: "#/components/schemas/TraceIds"
          description: The list of trace IDs to evaluate, representing complete request-response interactions. Used to evaluate entire conversation turns or specific agent interactions within a session.
    SpanIds:
      type: array
      items:
        $ref: "#/components/schemas/SpanId"
    SpanId:
      type: string
      minLength: 16
      maxLength: 16
    TraceIds:
      type: array
      items:
        $ref: "#/components/schemas/TraceId"
    TraceId:
      type: string
      minLength: 32
      maxLength: 32
    EvaluationReferenceInputs:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationReferenceInput"
    EvaluationReferenceInput:
      description: A reference input containing ground truth data for evaluation, scoped to a specific context level (session or trace) through its span context.
      type: object
      properties:
        context:
          $ref: "#/components/schemas/Context"
        expectedResponse:
          $ref: "#/components/schemas/EvaluationContent"
          description: The expected response for trace-level evaluation. Built-in evaluators that support this field compare the agent's actual response against this value for assessment. Custom evaluators can access it through the {expected_response} placeholder in their instructions.
        assertions:
          $ref: "#/components/schemas/EvaluationContentList"
          description: A list of assertion statements for session-level evaluation. Each assertion describes an expected behavior or outcome the agent should demonstrate during the session.
        expectedTrajectory:
          $ref: "#/components/schemas/EvaluationExpectedTrajectory"
          description: The expected tool call sequence for session-level trajectory evaluation. Contains a list of tool names representing the tools the agent is expected to invoke.
      required:
        - context
    Context:
      description: The contextual information associated with an evaluation, including span context details that identify the specific traces and sessions being evaluated within the agent's execution flow.
      type: object
      properties:
        spanContext:
          $ref: "#/components/schemas/SpanContext"
          description: The span context information that uniquely identifies the trace and span being evaluated, including session ID, trace ID, and span ID for precise targeting within the agent's execution flow.
    SpanContext:
      description: The contextual information that uniquely identifies a span within the distributed tracing system. Contains session, trace, and span identifiers used to correlate evaluation results with specific agent execution points.
      type: object
      properties:
        sessionId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the session containing this span. Sessions represent complete conversation flows and are detected using configurable SessionTimeoutMinutes (default 15 minutes).
        traceId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the trace containing this span. Traces represent individual request-response interactions within a session and group related spans together.
        spanId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the specific span being referenced. Spans represent individual operations like tool calls, model invocations, or other discrete actions within the agent's execution.
      required:
        - sessionId
    EvaluationContent:
      description: A content block for ground truth data in evaluation reference inputs. Supports text content for expected responses and assertions.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/EvaluationContentTextString"
          description: The text content of the ground truth data. Used for expected response text and assertion statements.
    EvaluationContentTextString:
      type: string
      minLength: 1
      maxLength: 100000
    EvaluationContentList:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationContent"
    EvaluationExpectedTrajectory:
      description: The expected tool call trajectory for trajectory-based evaluation.
      type: object
      properties:
        toolNames:
          $ref: "#/components/schemas/EvaluationToolNames"
          description: The list of tool names representing the expected tool call sequence.
    EvaluationToolNames:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationToolName"
    EvaluationToolName:
      type: string
      minLength: 1
      maxLength: 500
    EvaluateResponse:
      type: object
      properties:
        evaluationResults:
          $ref: "#/components/schemas/EvaluationResults"
          description: The detailed evaluation results containing scores, explanations, and metadata. Includes the evaluator information, numerical or categorical ratings based on the evaluator's rating scale, and token usage statistics for the evaluation process.
      required:
        - evaluationResults
    EvaluationResults:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationResultContent"
    EvaluationResultContent:
      description: The comprehensive result of an evaluation containing the score, explanation, evaluator metadata, and execution details. Provides both quantitative ratings and qualitative insights about agent performance.
      type: object
      properties:
        evaluatorArn:
          $ref: "#/components/schemas/EvaluatorArn"
          description: The Amazon Resource Name (ARN) of the evaluator used to generate this result. For custom evaluators, this is the full ARN; for built-in evaluators, this follows the pattern Builtin.{EvaluatorName}.
        evaluatorId:
          $ref: "#/components/schemas/EvaluatorId"
          description: The unique identifier of the evaluator that produced this result. This matches the evaluatorId provided in the evaluation request and can be used to identify which evaluator generated specific results.
        evaluatorName:
          $ref: "#/components/schemas/EvaluatorName"
          description: The human-readable name of the evaluator used for this evaluation. For built-in evaluators, this is the descriptive name (e.g., "Helpfulness", "Correctness"); for custom evaluators, this is the user-defined name.
        explanation:
          $ref: "#/components/schemas/EvaluationExplanation"
          description: The detailed explanation provided by the evaluator describing the reasoning behind the assigned score. This qualitative feedback helps understand why specific ratings were given and provides actionable insights for improvement.
        context:
          $ref: "#/components/schemas/Context"
          description: The contextual information associated with this evaluation result, including span context details that identify the specific traces and sessions that were evaluated.
        value:
          $ref: "#/components/schemas/Double"
          description: The numerical score assigned by the evaluator according to its configured rating scale. For numerical scales, this is a decimal value within the defined range. This field is not allowed for categorical scales.
        label:
          $ref: "#/components/schemas/String"
          description: The categorical label assigned by the evaluator when using a categorical rating scale. This provides a human-readable description of the evaluation result (e.g., "Excellent", "Good", "Poor") corresponding to the numerical value. For numerical scales, this field is optional and provides a natural language explanation of what the value means (e.g., value 0.5 = "Somewhat Helpful").
        tokenUsage:
          $ref: "#/components/schemas/TokenUsage"
          description: The token consumption statistics for this evaluation, including input tokens, output tokens, and total tokens used by the underlying language model during the evaluation process.
        errorMessage:
          $ref: "#/components/schemas/EvaluationErrorMessage"
          description: The error message describing what went wrong if the evaluation failed. Provides detailed information about evaluation failures to help diagnose and resolve issues with evaluator configuration or input data.
        errorCode:
          $ref: "#/components/schemas/EvaluationErrorCode"
          description: The error code indicating the type of failure that occurred during evaluation. Used to programmatically identify and handle different categories of evaluation errors.
        ignoredReferenceInputFields:
          $ref: "#/components/schemas/IgnoredReferenceInputFields"
          description: The list of reference input field names that were provided but not used by the evaluator. Helps identify which ground truth data was not consumed during evaluation.
      required:
        - evaluatorArn
        - evaluatorId
        - evaluatorName
        - context
    EvaluatorArn:
      type: string
      pattern: arn:aws:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:evaluator\/[a-zA-Z][a-zA-Z0-9-_]{0,99}-[a-zA-Z0-9]{10}$|^arn:aws:bedrock-agentcore:::evaluator/Builtin.[a-zA-Z0-9_-]+
    EvaluatorName:
      type: string
      pattern: (Builtin.[a-zA-Z0-9_-]+|[a-zA-Z][a-zA-Z0-9_]{0,47})
    EvaluationExplanation:
      type: string
      minLength: 0
      maxLength: 2048
    Double:
      type: number
      format: double
    TokenUsage:
      description: The token consumption statistics for language model operations during evaluation. Provides detailed breakdown of input, output, and total tokens used for cost tracking and performance monitoring.
      type: object
      properties:
        inputTokens:
          $ref: "#/components/schemas/Integer"
          description: The number of tokens consumed for input processing during the evaluation. Includes tokens from the evaluation prompt, agent traces, and any additional context provided to the evaluator model.
        outputTokens:
          $ref: "#/components/schemas/Integer"
          description: The number of tokens generated by the evaluator model in its response. Includes tokens for the score, explanation, and any additional output produced during the evaluation process.
        totalTokens:
          $ref: "#/components/schemas/Integer"
          description: The total number of tokens consumed during the evaluation, calculated as the sum of input and output tokens. Used for cost calculation and rate limiting within the service limits.
    EvaluationErrorMessage:
      type: string
      minLength: 0
      maxLength: 2048
    EvaluationErrorCode:
      type: string
      minLength: 1
      maxLength: 1024
    IgnoredReferenceInputFields:
      type: array
      items:
        $ref: "#/components/schemas/IgnoredReferenceInputField"
    IgnoredReferenceInputField:
      type: string
      minLength: 1
      maxLength: 1000
    GetABTestResponse:
      type: object
      properties:
        abTestId:
          $ref: "#/components/schemas/ABTestId"
          description: The unique identifier of the A/B test.
        abTestArn:
          $ref: "#/components/schemas/ABTestArn"
          description: The Amazon Resource Name (ARN) of the A/B test.
        name:
          $ref: "#/components/schemas/ABTestName"
          description: The name of the A/B test.
        description:
          $ref: "#/components/schemas/ABTestDescription"
          description: The description of the A/B test.
        status:
          $ref: "#/components/schemas/ABTestStatus"
          description: The current status of the A/B test.
        executionStatus:
          $ref: "#/components/schemas/ABTestExecutionStatus"
          description: The execution status indicating whether the A/B test is currently running.
        gatewayArn:
          $ref: "#/components/schemas/GatewayArn"
          description: The Amazon Resource Name (ARN) of the gateway used for traffic splitting.
        variants:
          $ref: "#/components/schemas/VariantList"
          description: The list of variants in the A/B test.
        gatewayFilter:
          $ref: "#/components/schemas/GatewayFilter"
          description: The gateway filter restricting which target paths are included.
        evaluationConfig:
          $ref: "#/components/schemas/ABTestEvaluationConfig"
          description: The evaluation configuration for measuring variant performance.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM role ARN used by the A/B test.
        currentRunId:
          $ref: "#/components/schemas/String"
          description: The identifier of the current run of the A/B test.
        errorDetails:
          $ref: "#/components/schemas/ErrorDetailsList"
          description: The error details if the A/B test encountered failures.
        startedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the A/B test was started.
        stoppedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the A/B test was stopped.
        maxDurationExpiresAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the A/B test will automatically expire.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the A/B test was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the A/B test was last updated.
        results:
          $ref: "#/components/schemas/ABTestResults"
          description: The statistical results of the A/B test, including per-evaluator metrics and significance analysis.
      required:
        - abTestId
        - abTestArn
        - name
        - status
        - executionStatus
        - gatewayArn
        - variants
        - evaluationConfig
        - createdAt
        - updatedAt
    ErrorDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/ErrorDetailsListMemberString"
    ErrorDetailsListMemberString:
      type: string
      minLength: 0
      maxLength: 1000
    ABTestResults:
      description: The statistical results of an A/B test.
      type: object
      properties:
        analysisTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the analysis was performed.
        evaluatorMetrics:
          $ref: "#/components/schemas/EvaluatorMetricList"
          description: The per-evaluator metrics comparing control and treatment variants.
      required:
        - evaluatorMetrics
    EvaluatorMetricList:
      type: array
      items:
        $ref: "#/components/schemas/EvaluatorMetric"
    EvaluatorMetric:
      description: Statistical metrics for a single evaluator comparing control and treatment variants.
      type: object
      properties:
        evaluatorArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the evaluator.
        controlStats:
          $ref: "#/components/schemas/ControlStats"
          description: The statistics for the control variant.
        variantResults:
          $ref: "#/components/schemas/VariantResultList"
          description: The results for each treatment variant compared against the control.
      required:
        - evaluatorArn
        - controlStats
        - variantResults
    ControlStats:
      description: Statistics for the control variant in an A/B test.
      type: object
      properties:
        variantName:
          $ref: "#/components/schemas/String"
          description: The name of the control variant.
        sampleSize:
          $ref: "#/components/schemas/Integer"
          description: The number of sessions evaluated for the control variant.
        mean:
          $ref: "#/components/schemas/Double"
          description: The mean evaluation score for the control variant.
      required:
        - variantName
        - sampleSize
        - mean
    VariantResultList:
      type: array
      items:
        $ref: "#/components/schemas/VariantResult"
    VariantResult:
      description: Statistical results for a treatment variant compared against the control.
      type: object
      properties:
        variantName:
          $ref: "#/components/schemas/String"
          description: The name of the treatment variant.
        sampleSize:
          $ref: "#/components/schemas/Integer"
          description: The number of sessions evaluated for this variant.
        mean:
          $ref: "#/components/schemas/Double"
          description: The mean evaluation score for this variant.
        absoluteChange:
          $ref: "#/components/schemas/Double"
          description: The absolute change in mean score compared to the control variant.
        percentChange:
          $ref: "#/components/schemas/Double"
          description: The percentage change in mean score compared to the control variant.
        pValue:
          $ref: "#/components/schemas/Double"
          description: The p-value indicating the statistical significance of the observed difference.
        confidenceInterval:
          $ref: "#/components/schemas/ConfidenceInterval"
          description: The confidence interval for the observed difference.
        isSignificant:
          $ref: "#/components/schemas/Boolean"
          description: Whether the observed difference is statistically significant.
      required:
        - variantName
        - sampleSize
        - mean
        - isSignificant
    ConfidenceInterval:
      description: A confidence interval for a statistical measurement.
      type: object
      properties:
        lower:
          $ref: "#/components/schemas/Double"
          description: The lower bound of the confidence interval.
        upper:
          $ref: "#/components/schemas/Double"
          description: The upper bound of the confidence interval.
    SessionType:
      type: string
      minLength: 33
      maxLength: 256
    GetAgentCardResponse:
      type: object
      properties:
        runtimeSessionId:
          $ref: "#/components/schemas/SessionId"
          description: The ID of the session associated with the AgentCore Runtime agent.
        agentCard:
          $ref: "#/components/schemas/AgentCard"
          description: An agent card document that contains metadata and capabilities for an AgentCore Runtime agent.
        statusCode:
          $ref: "#/components/schemas/HttpResponseCode"
          description: The status code of the request.
      required:
        - agentCard
    AgentCard:
      type: object
    HttpResponseCode:
      type: integer
    GetBatchEvaluationResponse:
      type: object
      properties:
        batchEvaluationId:
          $ref: "#/components/schemas/BatchEvaluationId"
          description: The unique identifier of the batch evaluation.
        batchEvaluationArn:
          $ref: "#/components/schemas/BatchEvaluationArn"
          description: The Amazon Resource Name (ARN) of the batch evaluation.
        batchEvaluationName:
          $ref: "#/components/schemas/BatchEvaluationName"
          description: The name of the batch evaluation.
        status:
          $ref: "#/components/schemas/BatchEvaluationStatus"
          description: The current status of the batch evaluation.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp when the batch evaluation was created.
        evaluators:
          $ref: "#/components/schemas/EvaluatorList"
          description: The list of evaluators applied during the batch evaluation.
        dataSourceConfig:
          $ref: "#/components/schemas/DataSourceConfig"
          description: The data source configuration specifying where agent traces are pulled from.
        outputConfig:
          $ref: "#/components/schemas/OutputConfig"
          description: The output configuration specifying where evaluation results are written.
        evaluationResults:
          $ref: "#/components/schemas/EvaluationJobResults"
          description: The aggregated evaluation results, including session completion counts and evaluator score summaries.
        errorDetails:
          $ref: "#/components/schemas/ErrorDetailsList"
          description: The error details if the batch evaluation encountered failures.
        description:
          $ref: "#/components/schemas/BatchEvaluationDescription"
          description: The description of the batch evaluation.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp when the batch evaluation was last updated.
      required:
        - batchEvaluationId
        - batchEvaluationArn
        - batchEvaluationName
        - status
        - createdAt
    BatchEvaluationName:
      description: Human-readable name for a batch evaluation
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,47}"
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    EvaluatorList:
      type: array
      items:
        $ref: "#/components/schemas/Evaluator"
    Evaluator:
      description: An evaluator to run against sessions
      type: object
      properties:
        evaluatorId:
          $ref: "#/components/schemas/EvaluatorId"
          description: The unique identifier of the evaluator. Can reference built-in evaluators (e.g., Builtin.Helpfulness) or custom evaluators.
      required:
        - evaluatorId
    DataSourceConfig:
      description: Where to pull session spans from
      type: object
      properties:
        cloudWatchLogs:
          $ref: "#/components/schemas/CloudWatchLogsSource"
          description: Pull session spans from CloudWatch
    CloudWatchLogsSource:
      description: The configuration for reading agent traces from CloudWatch Logs.
      type: object
      properties:
        serviceNames:
          $ref: "#/components/schemas/CloudWatchLogsSourceServiceNamesList"
          description: The list of agent service names to filter traces within the specified log groups.
        logGroupNames:
          $ref: "#/components/schemas/CloudWatchLogsSourceLogGroupNamesList"
          description: The list of CloudWatch log group names to read agent traces from. Maximum of 5 log groups.
        filterConfig:
          $ref: "#/components/schemas/CloudWatchFilterConfig"
          description: Optional filter configuration to narrow down which sessions to evaluate.
      required:
        - serviceNames
        - logGroupNames
    CloudWatchLogsSourceServiceNamesList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CloudWatchLogsSourceLogGroupNamesList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    CloudWatchFilterConfig:
      description: Filter configuration for narrowing down CloudWatch Logs sessions for evaluation.
      type: object
      properties:
        sessionIds:
          $ref: "#/components/schemas/CloudWatchFilterConfigSessionIdsList"
          description: A list of specific session IDs to evaluate. If specified, only these sessions are included in the evaluation.
        timeRange:
          $ref: "#/components/schemas/SessionFilterConfig"
          description: The time range filter for selecting sessions to evaluate.
    CloudWatchFilterConfigSessionIdsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    SessionFilterConfig:
      description: A time range filter for selecting sessions. Specifies the start and end times to narrow down which sessions are included.
      type: object
      properties:
        startTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The start time of the time range. Only sessions with activity at or after this timestamp are included.
        endTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The end time of the time range. Only sessions with activity before this timestamp are included.
    OutputConfig:
      description: Output destination configuration
      type: object
      properties:
        cloudWatchConfig:
          $ref: "#/components/schemas/CloudWatchOutputConfig"
          description: The CloudWatch Logs configuration for writing evaluation results.
    CloudWatchOutputConfig:
      description: CloudWatch Logs destination for batch evaluation results
      type: object
      properties:
        logGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch log group where evaluation results will be written.
        logStreamName:
          $ref: "#/components/schemas/String"
          description: The name of the CloudWatch log stream where evaluation results will be written.
      required:
        - logGroupName
        - logStreamName
    EvaluationJobResults:
      description: Aggregated results from a batch evaluation, including session completion counts and evaluator score summaries.
      type: object
      properties:
        numberOfSessionsCompleted:
          $ref: "#/components/schemas/Integer"
          description: The number of sessions that have been successfully evaluated.
        numberOfSessionsInProgress:
          $ref: "#/components/schemas/Integer"
          description: The number of sessions currently being evaluated.
        numberOfSessionsFailed:
          $ref: "#/components/schemas/Integer"
          description: The number of sessions that failed evaluation.
        totalNumberOfSessions:
          $ref: "#/components/schemas/Integer"
          description: The total number of sessions included in the batch evaluation.
        numberOfSessionsIgnored:
          $ref: "#/components/schemas/Integer"
          description: The number of sessions that were ignored during evaluation.
        evaluatorSummaries:
          $ref: "#/components/schemas/EvaluatorSummaryList"
          description: A list of per-evaluator summary statistics.
    EvaluatorSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/EvaluatorSummary"
    EvaluatorSummary:
      description: Summary statistics for a single evaluator within a batch evaluation.
      type: object
      properties:
        evaluatorId:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the evaluator.
        statistics:
          $ref: "#/components/schemas/EvaluatorStatistics"
          description: The aggregated statistics for this evaluator.
        totalEvaluated:
          $ref: "#/components/schemas/Integer"
          description: The total number of sessions evaluated by this evaluator.
        totalFailed:
          $ref: "#/components/schemas/Integer"
          description: The total number of sessions that failed evaluation by this evaluator.
    EvaluatorStatistics:
      description: Aggregated statistics for an evaluator.
      type: object
      properties:
        averageScore:
          $ref: "#/components/schemas/Double"
          description: The average score across all evaluated sessions for this evaluator.
    BatchEvaluationDescription:
      type: string
      minLength: 0
      maxLength: 200
    BrowserSessionId:
      type: string
      pattern: "[0-9a-zA-Z]{1,40}"
    GetBrowserSessionResponse:
      type: object
      properties:
        browserIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the browser.
        sessionId:
          $ref: "#/components/schemas/BrowserSessionId"
          description: The identifier of the browser session.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the browser session.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the browser session was created.
        viewPort:
          $ref: "#/components/schemas/ViewPort"
        extensions:
          $ref: "#/components/schemas/BrowserExtensions"
          description: The list of browser extensions that are configured in the browser session.
        enterprisePolicies:
          $ref: "#/components/schemas/BrowserEnterprisePolicies"
          description: A list of files containing enterprise policies for the browser session.
        profileConfiguration:
          $ref: "#/components/schemas/BrowserProfileConfiguration"
          description: The browser profile configuration associated with this session. Contains the profile identifier that links to persistent browser data such as cookies and local storage.
        sessionTimeoutSeconds:
          $ref: "#/components/schemas/BrowserSessionTimeout"
          description: The timeout period for the browser session in seconds.
        status:
          $ref: "#/components/schemas/BrowserSessionStatus"
          description: The current status of the browser session. Possible values include ACTIVE, STOPPING, and STOPPED.
        streams:
          $ref: "#/components/schemas/BrowserSessionStream"
          description: The streams associated with this browser session. These include the automation stream and live view stream.
        proxyConfiguration:
          $ref: "#/components/schemas/ProxyConfiguration"
          description: The active proxy configuration for this browser session. This field is only present if proxy configuration was provided when the session was started using StartBrowserSession. The configuration includes proxy servers, domain bypass rules and the proxy authentication credentials.
        certificates:
          $ref: "#/components/schemas/Certificates"
          description: The list of certificates installed in the browser session.
        sessionReplayArtifact:
          $ref: "#/components/schemas/String"
          description: The artifact containing the session replay information.
        lastUpdatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the browser session was last updated.
      required:
        - browserIdentifier
        - sessionId
        - createdAt
    Name:
      type: string
      minLength: 1
      maxLength: 100
    ViewPort:
      description: The configuration that defines the dimensions of a browser viewport in a browser session. The viewport determines the visible area of web content and affects how web pages are rendered and displayed. Proper viewport configuration ensures that web content is displayed correctly for the agent's browsing tasks.
      type: object
      properties:
        width:
          $ref: "#/components/schemas/ViewPortWidth"
          description: The width of the viewport in pixels. This value determines the horizontal dimension of the visible area. Valid values range from 800 to 1920 pixels.
        height:
          $ref: "#/components/schemas/ViewPortHeight"
          description: The height of the viewport in pixels. This value determines the vertical dimension of the visible area. Valid values range from 600 to 1080 pixels.
      required:
        - width
        - height
    ViewPortWidth:
      type: integer
      minimum: 320
      maximum: 3840
    ViewPortHeight:
      type: integer
      minimum: 240
      maximum: 2160
    BrowserExtensions:
      type: array
      items:
        $ref: "#/components/schemas/BrowserExtension"
    BrowserExtension:
      description: Browser extension configuration.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: The location where the browser extension files are stored. This specifies the source from which the extension will be loaded and installed.
      required:
        - location
    ResourceLocation:
      description: The location of the browser extension.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Location"
          description: The Amazon S3 location of the resource. Use this when the resource is stored in an Amazon S3 bucket.
    S3Location:
      description: The Amazon S3 location configuration of a resource.
      type: object
      properties:
        bucket:
          $ref: "#/components/schemas/S3LocationBucketString"
          description: The name of the Amazon S3 bucket where the resource is stored.
        prefix:
          $ref: "#/components/schemas/S3LocationPrefixString"
          description: The name of the Amazon S3 prefix/key where the resource is stored.
        versionId:
          $ref: "#/components/schemas/S3LocationVersionIdString"
          description: The name of the Amazon S3 version ID where the resource is stored (Optional).
      required:
        - bucket
        - prefix
    S3LocationBucketString:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9][a-z0-9.-]*[a-z0-9]"
    S3LocationPrefixString:
      type: string
      minLength: 1
      maxLength: 1024
    S3LocationVersionIdString:
      type: string
      minLength: 1
      maxLength: 1024
    BrowserEnterprisePolicies:
      type: array
      items:
        $ref: "#/components/schemas/BrowserEnterprisePolicy"
    BrowserEnterprisePolicy:
      description: Browser enterprise policy configuration.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/ResourceLocation"
          description: The location of the enterprise policy file.
        type_:
          $ref: "#/components/schemas/BrowserEnterprisePolicyType"
          description: The enterprise policy type. See BrowserEnterprisePolicyType.
      required:
        - location
    BrowserEnterprisePolicyType:
      description: The type of browser enterprise policy. Available values are MANAGED and RECOMMENDED.
      type: string
      enum:
        - MANAGED
        - RECOMMENDED
    BrowserProfileConfiguration:
      description: The configuration for a browser profile in Amazon Bedrock AgentCore. A browser profile contains persistent browser data such as cookies and local storage that can be saved from one browser session and reused in subsequent sessions. Browser profiles enable continuity for tasks that require authentication, maintain user preferences, or depend on previously stored browser state.
      type: object
      properties:
        profileIdentifier:
          $ref: "#/components/schemas/BrowserProfileId"
          description: The unique identifier of the browser profile. This identifier is used to reference the profile when starting new browser sessions or saving session data to the profile.
      required:
        - profileIdentifier
    BrowserProfileId:
      type: string
      pattern: "[a-zA-Z][a-zA-Z0-9_]{0,47}-[a-zA-Z0-9]{10}"
    BrowserSessionTimeout:
      type: integer
      minimum: 1
      maximum: 28800
    BrowserSessionStatus:
      type: string
      enum:
        - READY
        - TERMINATED
    BrowserSessionStream:
      description: The collection of streams associated with a browser session in Amazon Bedrock AgentCore. These streams provide different ways to interact with and observe the browser session, including programmatic control and visual representation of the browser content.
      type: object
      properties:
        automationStream:
          $ref: "#/components/schemas/AutomationStream"
          description: The stream that enables programmatic control of the browser. This stream allows agents to perform actions such as navigating to URLs, clicking elements, and filling forms.
        liveViewStream:
          $ref: "#/components/schemas/LiveViewStream"
          description: The stream that provides a visual representation of the browser content. This stream allows agents to observe the current state of the browser, including rendered web pages and visual elements.
      required:
        - automationStream
    AutomationStream:
      description: The configuration for a stream that enables programmatic control of a browser session in Amazon Bedrock AgentCore. This stream provides a bidirectional communication channel for sending commands to the browser and receiving responses, allowing agents to automate web interactions such as navigation, form filling, and element clicking.
      type: object
      properties:
        streamEndpoint:
          $ref: "#/components/schemas/BrowserStreamEndpoint"
          description: The endpoint URL for the automation stream. This URL is used to establish a WebSocket connection to the stream for sending commands and receiving responses.
        streamStatus:
          $ref: "#/components/schemas/AutomationStreamStatus"
          description: The current status of the automation stream. This indicates whether the stream is available for use. Possible values include ACTIVE, CONNECTING, and DISCONNECTED.
      required:
        - streamEndpoint
        - streamStatus
    BrowserStreamEndpoint:
      type: string
      minLength: 10
      maxLength: 512
    AutomationStreamStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    LiveViewStream:
      description: The configuration for a stream that provides a visual representation of a browser session in Amazon Bedrock AgentCore. This stream enables agents to observe the current state of the browser, including rendered web pages, visual elements, and the results of interactions.
      type: object
      properties:
        streamEndpoint:
          $ref: "#/components/schemas/BrowserStreamEndpoint"
          description: The endpoint URL for the live view stream. This URL is used to establish a connection to receive visual updates from the browser session.
    ProxyConfiguration:
      description: Configuration for routing browser traffic through customer-managed proxy servers. Supports 1-5 proxy servers for domain-based routing and proxy bypass rules.
      type: object
      properties:
        proxies:
          $ref: "#/components/schemas/ProxyConfigurationProxiesList"
          description: An array of 1-5 proxy server configurations for domain-based routing. Each proxy can specify which domains it handles via domainPatterns, enabling flexible routing of different traffic through different proxies based on destination domain.
        bypass:
          $ref: "#/components/schemas/ProxyBypass"
          description: Optional configuration for domains that should bypass all proxies and connect directly to their destination, like the internet. Takes precedence over all proxy routing rules.
      required:
        - proxies
    ProxyConfigurationProxiesList:
      type: array
      items:
        $ref: "#/components/schemas/Proxy"
    Proxy:
      description: Union type representing different proxy configurations. Currently supports external customer-managed proxies.
      type: object
      properties:
        externalProxy:
          $ref: "#/components/schemas/ExternalProxy"
          description: Configuration for an external customer-managed proxy server.
    ExternalProxy:
      description: Configuration for a customer-managed external proxy server. Includes server location, optional domain-based routing patterns, and authentication credentials.
      type: object
      properties:
        server:
          $ref: "#/components/schemas/HostName"
          description: The hostname of the proxy server. Must be a valid DNS hostname (maximum 253 characters).
        port:
          $ref: "#/components/schemas/ExternalProxyPortInteger"
          description: "The port number of the proxy server. Valid range: 1-65535."
        domainPatterns:
          $ref: "#/components/schemas/DomainPatterns"
          description: Optional array of domain patterns that should route through this specific proxy. Supports .example.com for subdomain matching (matches any subdomain of example.com) or example.com for exact domain matching. If omitted, this proxy acts as a catch-all for domains not matched by other proxies. Maximum 100 patterns per proxy, each up to 253 characters.
        credentials:
          $ref: "#/components/schemas/ProxyCredentials"
          description: Optional authentication credentials for the proxy server. If omitted, the proxy is accessed without authentication (useful for IP-allowlisted proxies).
      required:
        - server
        - port
    HostName:
      type: string
      minLength: 1
      maxLength: 253
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9\\-]{0,61}[a-zA-Z0-9])?(\\.[a-zA-Z0-9]([a-zA-Z0-9\\-]{0,61}[a-zA-Z0-9])?)*"
    ExternalProxyPortInteger:
      type: integer
      minimum: 1
      maximum: 65535
    DomainPatterns:
      type: array
      items:
        $ref: "#/components/schemas/DomainPattern"
    DomainPattern:
      type: string
      minLength: 1
      maxLength: 253
      pattern: (\.)?[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?)*
    ProxyCredentials:
      description: Union type representing different proxy authentication methods. Currently supports HTTP Basic Authentication (username and password).
      type: object
      properties:
        basicAuth:
          $ref: "#/components/schemas/BasicAuth"
          description: HTTP Basic Authentication credentials (username and password) stored in Amazon Web Services Secrets Manager.
    BasicAuth:
      description: "Configuration for HTTP Basic Authentication using credentials stored in Amazon Web Services Secrets Manager. The secret must contain a JSON object with username and password string fields. Username allows alphanumeric characters and @._+=- symbols (pattern: ^[a-zA-Z0-9@._+=\\-]+$). Password allows alphanumeric characters and @._+=-!#$%&* symbols (pattern: ^[a-zA-Z0-9@._+=\\-!#$%&*]+$). Both fields have a maximum length of 256 characters."
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/SecretArn"
          description: 'The Amazon Resource Name (ARN) of the Amazon Web Services Secrets Manager secret containing proxy credentials. The secret must be a JSON object with username and password string fields that meet validation requirements. The caller must have secretsmanager:GetSecretValue permission for this ARN. Example secret format: {"username": "proxy_user", "password": "secure_password"}'
      required:
        - secretArn
    SecretArn:
      type: string
      pattern: arn:aws(-[a-z-]+)?:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[a-zA-Z0-9/_+=.@-]+
    ProxyBypass:
      description: Configuration for domains that should bypass all proxies and connect directly to the internet. These bypass rules take precedence over all proxy routing rules.
      type: object
      properties:
        domainPatterns:
          $ref: "#/components/schemas/DomainPatterns"
          description: Array of domain patterns that should bypass the proxy. Supports .amazonaws.com for subdomain matching or amazonaws.com for exact domain matching. Requests to these domains connect directly without using any proxy. Maximum 253 characters per pattern.
    Certificates:
      type: array
      items:
        $ref: "#/components/schemas/Certificate"
    Certificate:
      description: A certificate to install in the browser or code interpreter session.
      type: object
      properties:
        location:
          $ref: "#/components/schemas/CertificateLocation"
          description: The location of the certificate.
      required:
        - location
    CertificateLocation:
      description: The location from which to retrieve a certificate.
      type: object
      properties:
        secretsManager:
          $ref: "#/components/schemas/SecretsManagerLocation"
          description: The Amazon Web Services Secrets Manager location of the certificate.
    SecretsManagerLocation:
      description: The Amazon Web Services Secrets Manager location configuration.
      type: object
      properties:
        secretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of the Amazon Web Services Secrets Manager secret containing the certificate.
      required:
        - secretArn
    CodeInterpreterSessionId:
      type: string
      pattern: "[0-9a-zA-Z]{1,40}"
    GetCodeInterpreterSessionResponse:
      type: object
      properties:
        codeInterpreterIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the code interpreter.
        sessionId:
          $ref: "#/components/schemas/CodeInterpreterSessionId"
          description: The identifier of the code interpreter session.
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the code interpreter session.
        createdAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The time at which the code interpreter session was created.
        sessionTimeoutSeconds:
          $ref: "#/components/schemas/CodeInterpreterSessionTimeout"
          description: The timeout period for the code interpreter session in seconds.
        status:
          $ref: "#/components/schemas/CodeInterpreterSessionStatus"
          description: The current status of the code interpreter session. Possible values include ACTIVE, STOPPING, and STOPPED.
        certificates:
          $ref: "#/components/schemas/Certificates"
          description: The list of certificates installed in the code interpreter session.
      required:
        - codeInterpreterIdentifier
        - sessionId
        - createdAt
    CodeInterpreterSessionTimeout:
      type: integer
      minimum: 1
      maximum: 28800
    CodeInterpreterSessionStatus:
      type: string
      enum:
        - READY
        - TERMINATED
    GetEventOutput:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/Event"
          description: The requested event information.
      required:
        - event
    GetMemoryRecordOutput:
      type: object
      properties:
        memoryRecord:
          $ref: "#/components/schemas/MemoryRecord"
          description: The requested memory record.
      required:
        - memoryRecord
    MemoryRecord:
      description: Contains information about a memory record in an AgentCore Memory resource.
      type: object
      properties:
        memoryRecordId:
          $ref: "#/components/schemas/MemoryRecordId"
          description: The unique identifier of the memory record.
        content:
          $ref: "#/components/schemas/MemoryContent"
          description: The content of the memory record.
        memoryStrategyId:
          $ref: "#/components/schemas/MemoryStrategyId"
          description: The identifier of the memory strategy associated with this record.
        namespaces:
          $ref: "#/components/schemas/NamespacesList"
          description: The namespaces associated with this memory record. Namespaces help organize and categorize memory records.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the memory record was created.
        metadata:
          type: object
          properties: {}
          description: A map of metadata key-value pairs associated with a memory record.
      required:
        - memoryRecordId
        - content
        - memoryStrategyId
        - namespaces
        - createdAt
    GetPaymentInstrumentResponse:
      description: Response structure for getting a payment instrument
      type: object
      properties:
        paymentInstrument:
          $ref: "#/components/schemas/PaymentInstrument"
      required:
        - paymentInstrument
    BlockchainChainId:
      description: Supported blockchain chain identifiers for balance queries. Each value maps to a specific chain supported by the underlying providers (Privy, Coinbase).
      type: string
      enum:
        - BASE
        - BASE_SEPOLIA
        - ETHEREUM
        - SOLANA
        - SOLANA_DEVNET
    InstrumentBalanceToken:
      description: Supported tokens for instrument balance queries. Only tokens supported for X402 payments are returned.
      type: string
      enum:
        - USDC
    GetPaymentInstrumentBalanceResponse:
      description: Response structure for getting payment instrument balance
      type: object
      properties:
        paymentInstrumentId:
          $ref: "#/components/schemas/PaymentInstrumentId"
          description: The ID of the payment instrument.
        tokenBalance:
          $ref: "#/components/schemas/TokenBalance"
          description: The balance of the supported token on the requested chain.
      required:
        - paymentInstrumentId
        - tokenBalance
    TokenBalance:
      description: A single token balance entry
      type: object
      properties:
        amount:
          $ref: "#/components/schemas/String"
          description: Raw balance in the smallest denomination (e.g., USDC base units where 1 USDC = 1000000).
        decimals:
          $ref: "#/components/schemas/Integer"
          description: Number of decimal places for the token (e.g., 6 for USDC).
        token:
          $ref: "#/components/schemas/InstrumentBalanceToken"
          description: The supported token for this balance.
        network:
          $ref: "#/components/schemas/CryptoWalletNetwork"
          description: The blockchain network family (ETHEREUM or SOLANA).
        chain:
          $ref: "#/components/schemas/BlockchainChainId"
          description: The specific blockchain chain.
      required:
        - amount
        - decimals
        - token
        - network
        - chain
    GetPaymentSessionResponse:
      description: Response structure for getting a payment session
      type: object
      properties:
        paymentSession:
          $ref: "#/components/schemas/PaymentSession"
      required:
        - paymentSession
    GetRecommendationResponse:
      type: object
      properties:
        recommendationId:
          $ref: "#/components/schemas/RecommendationId"
          description: The unique identifier of the recommendation.
        recommendationArn:
          $ref: "#/components/schemas/RecommendationArn"
          description: The Amazon Resource Name (ARN) of the recommendation.
        name:
          $ref: "#/components/schemas/RecommendationName"
          description: The name of the recommendation.
        description:
          $ref: "#/components/schemas/RecommendationDescription"
          description: The description of the recommendation.
        type_:
          $ref: "#/components/schemas/RecommendationType"
          description: The type of recommendation.
        recommendationConfig:
          $ref: "#/components/schemas/RecommendationConfig"
          description: The configuration for the recommendation.
        status:
          $ref: "#/components/schemas/RecommendationStatus"
          description: The current status of the recommendation.
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp when the recommendation was created.
        updatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp when the recommendation was last updated.
        recommendationResult:
          $ref: "#/components/schemas/RecommendationResult"
          description: The result of the recommendation, containing the optimized system prompt or tool descriptions. Only present when the recommendation status is COMPLETED.
      required:
        - recommendationId
        - recommendationArn
        - name
        - type_
        - recommendationConfig
        - status
        - createdAt
        - updatedAt
    RecommendationArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:bedrock-agentcore:[a-z0-9-]+:[0-9]{12}:recommendation/[0-9a-zA-Z_-]{1,48}-[0-9A-Z]{10}
    RecommendationName:
      type: string
      minLength: 0
      maxLength: 100
      pattern: "[a-zA-Z][a-zA-Z0-9_-]{0,47}"
    RecommendationDescription:
      type: string
      minLength: 0
      maxLength: 4096
    RecommendationType:
      type: string
      enum:
        - SYSTEM_PROMPT_RECOMMENDATION
        - TOOL_DESCRIPTION_RECOMMENDATION
    RecommendationConfig:
      description: The configuration for a recommendation, varying by recommendation type.
      type: object
      properties:
        systemPromptRecommendationConfig:
          $ref: "#/components/schemas/SystemPromptRecommendationConfig"
          description: The configuration for a system prompt recommendation.
        toolDescriptionRecommendationConfig:
          $ref: "#/components/schemas/ToolDescriptionRecommendationConfig"
          description: The configuration for a tool description recommendation.
    SystemPromptRecommendationConfig:
      description: Configuration for generating system prompt optimization recommendations.
      type: object
      properties:
        systemPrompt:
          $ref: "#/components/schemas/SystemPromptConfig"
          description: The current system prompt to optimize.
        agentTraces:
          $ref: "#/components/schemas/AgentTracesConfig"
          description: The agent traces to analyze for generating recommendations.
        evaluationConfig:
          $ref: "#/components/schemas/RecommendationEvaluationConfig"
          description: The evaluation configuration specifying which evaluator to use for assessing recommendation quality.
      required:
        - systemPrompt
        - agentTraces
        - evaluationConfig
    SystemPromptConfig:
      description: The system prompt input, either as inline text or from a configuration bundle.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/SystemPromptText"
          description: The system prompt text provided inline.
        configurationBundle:
          $ref: "#/components/schemas/SystemPromptConfigurationBundle"
          description: The system prompt sourced from a configuration bundle version.
    SystemPromptText:
      type: string
      minLength: 1
      maxLength: 20000
    SystemPromptConfigurationBundle:
      description: A system prompt sourced from a configuration bundle version.
      type: object
      properties:
        bundleArn:
          $ref: "#/components/schemas/ConfigurationBundleArn"
          description: The Amazon Resource Name (ARN) of the configuration bundle.
        versionId:
          $ref: "#/components/schemas/ConfigurationBundleVersionId"
          description: The version identifier of the configuration bundle.
        systemPromptJsonPath:
          $ref: "#/components/schemas/String"
          description: The JSON path within the configuration bundle that contains the system prompt.
      required:
        - bundleArn
        - versionId
        - systemPromptJsonPath
    ConfigurationBundleVersionId:
      type: string
    AgentTracesConfig:
      description: The configuration specifying where to read agent traces from for recommendation analysis.
      type: object
      properties:
        sessionSpans:
          $ref: "#/components/schemas/Spans"
          description: Agent traces provided as inline session spans in OpenTelemetry format.
        cloudwatchLogs:
          $ref: "#/components/schemas/CloudWatchLogsTraceConfig"
          description: Agent traces read from CloudWatch Logs.
    CloudWatchLogsTraceConfig:
      description: Configuration for reading agent traces from CloudWatch Logs for recommendation analysis.
      type: object
      properties:
        logGroupArns:
          $ref: "#/components/schemas/CloudWatchLogsTraceConfigLogGroupArnsList"
          description: The list of CloudWatch log group ARNs to read agent traces from.
        serviceNames:
          $ref: "#/components/schemas/ServiceNameList"
