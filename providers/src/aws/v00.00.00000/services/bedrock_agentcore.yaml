        $ref: "#/components/schemas/OAuthScope"
    OAuthScope:
      type: string
      minLength: 1
      maxLength: 64
    OAuthGrantType:
      type: string
      enum:
        - CLIENT_CREDENTIALS
        - AUTHORIZATION_CODE
        - TOKEN_EXCHANGE
    OAuthDefaultReturnUrl:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: \w+:(\/?\/?)[^\s]+
