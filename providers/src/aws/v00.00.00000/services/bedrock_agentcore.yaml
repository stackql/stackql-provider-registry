        memoryRecordId:
          $ref: "#/components/schemas/MemoryRecordId"
          description: The identifier of the memory record that was deleted.
      required:
        - memoryRecordId
    DeletePaymentInstrumentResponse:
      description: Response structure for deleting a payment instrument Returns the deletion status with HTTP 200 OK status code on successful soft deletion.
      type: object
