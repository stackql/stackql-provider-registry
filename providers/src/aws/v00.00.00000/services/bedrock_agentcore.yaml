      type: object
      properties:
        availableSpendAmount:
          $ref: "#/components/schemas/Amount"
          description: The available spend amount for this session.
        updatedAt:
          $ref: "#/components/schemas/DateTimestamp"
          description: The timestamp when the available limits were last updated.
    DeleteABTestResponse:
