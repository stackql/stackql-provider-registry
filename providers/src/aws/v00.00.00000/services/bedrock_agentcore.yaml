  /runtimes/{agent_runtime_arn}/invocations:
    post:
      operationId: InvokeAgentRuntime
      description: Sends a request to an agent or tool hosted in an Amazon Bedrock AgentCore Runtime and receives responses in real-time. To invoke an agent, you can specify either the AgentCore Runtime ARN or the agent ID with an account ID, and provide a payload containing your request. When you use the agent ID instead of the full ARN, you don't need to URL-encode the identifier. You can optionally specify a qualifier to target a specific endpoint of the agent. This operation supports streaming responses, allowing you to receive partial responses as they become available. We recommend using pagination to ensure that the operation returns quickly and successfully when processing large responses. For example code, see Invoke an AgentCore Runtime agent. If you're integrating your agent with OAuth, you can't use the Amazon Web Services SDK to call InvokeAgentRuntime. Instead, make a HTTPS request to InvokeAgentRuntime. For an example, see Authenticate and authorize with Inbound Auth and Outbound Auth. To use this operation, you must have the bedrock-agentcore:InvokeAgentRuntime permission. If you are making a call to InvokeAgentRuntime on behalf of a user ID with the X-Amzn-Bedrock-AgentCore-Runtime-User-Id header, You require permissions to both actions (bedrock-agentcore:InvokeAgentRuntime and bedrock-agentcore:InvokeAgentRuntimeForUser).
      parameters:
        - name: Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The MIME type of the input data in the payload. This tells the agent runtime how to interpret the payload data. Common values include application/json for JSON data.
        - name: Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The desired MIME type for the response from the agent runtime. This tells the agent runtime what format to use for the response data. Common values include application/json for JSON data.
        - name: Mcp-Session-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/StringType"
          description: The identifier of the MCP session.
        - name: X-Amzn-Bedrock-AgentCore-Runtime-Session-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SessionType"
          description: The identifier of the runtime session.
        - name: Mcp-Protocol-Version
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/StringType"
          description: The version of the MCP protocol being used.
        - name: X-Amzn-Bedrock-AgentCore-Runtime-User-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/StringType"
          description: The identifier of the runtime user.
        - name: X-Amzn-Trace-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeRequestTraceIdString"
          description: The trace identifier for request tracking.
        - name: traceparent
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeRequestTraceParentString"
          description: The parent trace information for distributed tracing.
        - name: tracestate
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeRequestTraceStateString"
          description: The trace state information for distributed tracing.
        - name: baggage
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeRequestBaggageString"
          description: Additional context information for distributed tracing.
        - name: agent_runtime_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier of the agent runtime to invoke. You can specify either the full Amazon Web Services Resource Name (ARN) or the agent ID. If you use the agent ID, you must also provide the accountId query parameter.
        - name: qualifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The qualifier to use for the agent runtime. This is an endpoint name that points to a specific version. If not specified, Amazon Bedrock AgentCore uses the default endpoint of the agent runtime.
        - name: accountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeRequestAccountIdString"
          description: The identifier of the Amazon Web Services account for the agent runtime resource. This parameter is required when you specify an agent ID instead of the full ARN for agentRuntimeArn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  $ref: "#/components/schemas/Body"
              required:
                - payload
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeAgentRuntimeResponse"
  /runtimes/{agent_runtime_arn}/commands:
    post:
      operationId: InvokeAgentRuntimeCommand
      description: Executes a command in a runtime session container and streams the output back to the caller. This operation allows you to run shell commands within the agent runtime environment and receive real-time streaming responses including standard output and standard error. To invoke a command, you must specify the agent runtime ARN and a runtime session ID. The command execution supports streaming responses, allowing you to receive output as it becomes available through contentStart, contentDelta, and contentStop events. To use this operation, you must have the bedrock-agentcore:InvokeAgentRuntimeCommand permission.
      parameters:
        - name: Content-Type
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The MIME type of the input data in the request payload. This tells the agent runtime how to interpret the payload data. Common values include application/json for JSON data.
        - name: Accept
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/MimeType"
          description: The desired MIME type for the response from the agent runtime command. This tells the agent runtime what format to use for the response data. Common values include application/json for JSON data.
        - name: X-Amzn-Bedrock-AgentCore-Runtime-Session-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SessionType"
          description: The unique identifier of the runtime session in which to execute the command. This session ID is used to maintain state and context across multiple command invocations.
        - name: X-Amzn-Trace-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeCommandRequestTraceIdString"
          description: The trace identifier for request tracking.
        - name: traceparent
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeCommandRequestTraceParentString"
          description: The parent trace information for distributed tracing.
        - name: tracestate
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeCommandRequestTraceStateString"
          description: The trace state information for distributed tracing.
        - name: baggage
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeCommandRequestBaggageString"
          description: Additional context information for distributed tracing.
        - name: agent_runtime_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the agent runtime on which to execute the command. This identifies the specific agent runtime environment where the command will run.
        - name: qualifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The qualifier to use for the agent runtime. This is an endpoint name that points to a specific version. If not specified, Amazon Bedrock AgentCore uses the default endpoint of the agent runtime.
        - name: accountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InvokeAgentRuntimeCommandRequestAccountIdString"
          description: The identifier of the Amazon Web Services account for the agent runtime resource. This parameter is required when you specify an agent ID instead of the full ARN for agentRuntimeArn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/InvokeAgentRuntimeCommandRequestBody"
              required:
                - body
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeAgentRuntimeCommandResponse"
  /browsers/{browser_identifier}/sessions/invoke:
    post:
      operationId: InvokeBrowser
      description: "Invokes an operating system-level action on a browser session in Amazon Bedrock AgentCore. This operation provides direct OS-level control over browser sessions, enabling mouse actions, keyboard input, and screenshots that the WebSocket-based Chrome DevTools Protocol (CDP) cannot handle — such as interacting with print dialogs, context menus, and JavaScript alerts. You send a request with exactly one action in the BrowserAction union, and receive a corresponding result in the BrowserActionResult union. The following operations are related to InvokeBrowser: StartBrowserSession GetBrowserSession StopBrowserSession"
