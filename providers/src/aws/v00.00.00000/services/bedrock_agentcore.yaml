openapi: 3.0.0
info:
  version: "2024-02-28"
  title: Amazon Bedrock AgentCore
  description: Amazon Bedrock AgentCore
  x-serviceName: bedrock-agentcore
  x-serviceAlias: bedrock_agentcore
  x-protocol: rest-json
  x-apiVersion: "2024-02-28"
  x-endpointPrefix: bedrock-agentcore
servers:
  - url: https://bedrock-agentcore.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-agentcore
paths:
  /memories/{memory_id}/memoryRecords/batchCreate:
    post:
      operationId: BatchCreateMemoryRecords
      description: Creates multiple memory records in a single batch operation for the specified memory with custom content.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The unique ID of the memory resource where records will be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  $ref: "#/components/schemas/MemoryRecordsCreateInputList"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - records
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateMemoryRecordsOutput"
  /memories/{memory_id}/memoryRecords/batchDelete:
    post:
      operationId: BatchDeleteMemoryRecords
      description: Deletes multiple memory records in a single batch operation from the specified memory.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The unique ID of the memory resource where records will be deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  $ref: "#/components/schemas/MemoryRecordsDeleteInputList"
              required:
                - records
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteMemoryRecordsOutput"
  /memories/{memory_id}/memoryRecords/batchUpdate:
    post:
      operationId: BatchUpdateMemoryRecords
      description: Updates multiple memory records with custom content in a single batch operation within the specified memory.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The unique ID of the memory resource where records will be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  $ref: "#/components/schemas/MemoryRecordsUpdateInputList"
              required:
                - records
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateMemoryRecordsOutput"
  /identities/CompleteResourceTokenAuth:
    post:
      operationId: CompleteResourceTokenAuth
      description: Confirms the user authentication session for obtaining OAuth2.0 tokens for a resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIdentifier:
                  $ref: "#/components/schemas/UserIdentifier"
                sessionUri:
                  $ref: "#/components/schemas/RequestUri"
              required:
                - userIdentifier
                - sessionUri
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteResourceTokenAuthResponse"
  /ab-tests:
    post:
      operationId: CreateABTest
      description: Creates an A/B test for comparing agent configurations. A/B tests split traffic between a control variant and a treatment variant through a gateway, then evaluate performance using online evaluation configurations to determine which variant performs better.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ABTestName"
                description:
                  $ref: "#/components/schemas/ABTestDescription"
                gatewayArn:
                  $ref: "#/components/schemas/GatewayArn"
                variants:
                  $ref: "#/components/schemas/VariantList"
                gatewayFilter:
                  $ref: "#/components/schemas/GatewayFilter"
                evaluationConfig:
                  $ref: "#/components/schemas/ABTestEvaluationConfig"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                enableOnCreate:
                  $ref: "#/components/schemas/Boolean"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - name
                - gatewayArn
                - variants
                - evaluationConfig
                - roleArn
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateABTestResponse"
    get:
      operationId: ListABTests
      description: Lists all A/B tests in the account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListABTestsRequestMaxResultsInteger"
          description: The maximum number of results to return in the response. If the total number of results is greater than this value, use the token returned in the response in the nextToken field when making another request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: If the total number of results is greater than the maxResults value provided in the request, enter the token returned in the nextToken field in the response in this field to return the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListABTestsResponse"
  /memories/{memory_id}/events:
    post:
      operationId: CreateEvent
      description: Creates an event in an AgentCore Memory resource. Events represent interactions or activities that occur within a session and are associated with specific actors. To use this operation, you must have the bedrock-agentcore:CreateEvent permission. This operation is subject to request rate limiting.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The identifier of the AgentCore Memory resource in which to create the event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actorId:
                  $ref: "#/components/schemas/ActorId"
                sessionId:
                  $ref: "#/components/schemas/SessionId"
                eventTimestamp:
                  $ref: "#/components/schemas/Timestamp"
                payload:
                  $ref: "#/components/schemas/PayloadTypeList"
                branch:
                  $ref: "#/components/schemas/Branch"
                clientToken:
                  $ref: "#/components/schemas/String"
                metadata:
                  $ref: "#/components/schemas/MetadataMap"
              required:
                - actorId
                - eventTimestamp
                - payload
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventOutput"
  /payments/createPaymentInstrument:
    post:
      operationId: CreatePaymentInstrument
      description: Create a new payment instrument for a connector
      parameters:
        - name: X-Amzn-Bedrock-AgentCore-Payments-User-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The user ID associated with this payment instrument.
        - name: X-Amzn-Bedrock-AgentCore-Payments-Agent-Name
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PaymentAgentName"
          description: The agent name associated with this request, used for observability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentManagerArn:
                  $ref: "#/components/schemas/PaymentManagerArn"
                paymentConnectorId:
                  $ref: "#/components/schemas/PaymentConnectorId"
                paymentInstrumentType:
                  $ref: "#/components/schemas/PaymentInstrumentType"
                paymentInstrumentDetails:
                  $ref: "#/components/schemas/PaymentInstrumentDetails"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - paymentManagerArn
                - paymentConnectorId
                - paymentInstrumentType
                - paymentInstrumentDetails
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePaymentInstrumentResponse"
  /payments/createPaymentSession:
    post:
      operationId: CreatePaymentSession
      description: Create a new payment manager session
      parameters:
        - name: X-Amzn-Bedrock-AgentCore-Payments-User-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The user ID associated with this payment session.
        - name: X-Amzn-Bedrock-AgentCore-Payments-Agent-Name
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PaymentAgentName"
          description: The agent name associated with this request, used for observability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentManagerArn:
                  $ref: "#/components/schemas/PaymentManagerArn"
                limits:
                  $ref: "#/components/schemas/SessionLimits"
                expiryTimeInMinutes:
                  $ref: "#/components/schemas/CreatePaymentSessionRequestExpiryTimeInMinutesInteger"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - paymentManagerArn
                - expiryTimeInMinutes
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePaymentSessionResponse"
  /ab-tests/{ab_test_id}:
    delete:
      operationId: DeleteABTest
      description: Deletes an A/B test and its associated gateway rules.
      parameters:
        - name: ab_test_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ABTestId"
          description: The unique identifier of the A/B test to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteABTestResponse"
    get:
      operationId: GetABTest
      description: Retrieves detailed information about an A/B test, including its configuration, status, and statistical results.
      parameters:
        - name: ab_test_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ABTestId"
          description: The unique identifier of the A/B test to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetABTestResponse"
    put:
      operationId: UpdateABTest
      description: Updates an A/B test's configuration, including variants, traffic allocation, evaluation settings, or execution status.
      parameters:
        - name: ab_test_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ABTestId"
          description: The unique identifier of the A/B test to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ABTestName"
                description:
                  $ref: "#/components/schemas/ABTestDescription"
                variants:
                  $ref: "#/components/schemas/VariantList"
                gatewayFilter:
                  $ref: "#/components/schemas/GatewayFilter"
                evaluationConfig:
                  $ref: "#/components/schemas/ABTestEvaluationConfig"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                executionStatus:
                  $ref: "#/components/schemas/ABTestExecutionStatus"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateABTestResponse"
  /evaluations/batch-evaluate/{batch_evaluation_id}:
    delete:
      operationId: DeleteBatchEvaluation
      description: Deletes a batch evaluation and its associated results.
      parameters:
        - name: batch_evaluation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BatchEvaluationId"
          description: The unique identifier of the batch evaluation to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBatchEvaluationResponse"
    get:
      operationId: GetBatchEvaluation
      description: Retrieves detailed information about a batch evaluation, including its status, configuration, results, and any error details.
      parameters:
        - name: batch_evaluation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BatchEvaluationId"
          description: The unique identifier of the batch evaluation to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBatchEvaluationResponse"
  /memories/{memory_id}/actor/{actor_id}/sessions/{session_id}/events/{event_id}:
    delete:
      operationId: DeleteEvent
      description: Deletes an event from an AgentCore Memory resource. When you delete an event, it is permanently removed. To use this operation, you must have the bedrock-agentcore:DeleteEvent permission.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The identifier of the AgentCore Memory resource from which to delete the event.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the session containing the event to delete.
        - name: event_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EventId"
          description: The identifier of the event to delete.
        - name: actor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ActorId"
          description: The identifier of the actor associated with the event to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventOutput"
    get:
      operationId: GetEvent
      description: Retrieves information about a specific event in an AgentCore Memory resource. To use this operation, you must have the bedrock-agentcore:GetEvent permission.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The identifier of the AgentCore Memory resource containing the event.
        - name: session_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
          description: The identifier of the session containing the event.
        - name: actor_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ActorId"
          description: The identifier of the actor associated with the event.
        - name: event_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EventId"
          description: The identifier of the event to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEventOutput"
  /memories/{memory_id}/memoryRecords/{memory_record_id}:
    delete:
      operationId: DeleteMemoryRecord
      description: Deletes a memory record from an AgentCore Memory resource. When you delete a memory record, it is permanently removed. To use this operation, you must have the bedrock-agentcore:DeleteMemoryRecord permission.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The identifier of the AgentCore Memory resource from which to delete the memory record.
        - name: memory_record_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryRecordId"
          description: The identifier of the memory record to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMemoryRecordOutput"
  /payments/deletePaymentInstrument:
    post:
      operationId: DeletePaymentInstrument
      description: "Delete a payment instrument Marks a payment instrument as deleted by updating its status to DELETED. This is a soft delete operation that preserves the record in the database for audit and compliance purposes. The record remains queryable for audit purposes but is excluded from normal list and get operations. Deleting an already-deleted or non-existent instrument returns ResourceNotFoundException (404). Authorization: The caller must own the instrument (accountId, userId, and paymentManagerId must match). If authorization fails, a 403 Forbidden error is returned. Timestamp Management: The updatedAt timestamp is set to the current time, while createdAt is preserved. The version field is incremented for optimistic locking. Errors: ResourceNotFoundException: The instrument does not exist or is already deleted AccessDeniedException: The caller is not authorized to delete this instrument ValidationException: Required fields are missing or invalid InternalServerException: An unexpected server error occurred"
      parameters:
        - name: X-Amzn-Bedrock-AgentCore-Payments-User-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The user ID making the delete request. Must match the instrument's userId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentManagerArn:
                  $ref: "#/components/schemas/PaymentManagerArn"
                paymentConnectorId:
                  $ref: "#/components/schemas/PaymentConnectorId"
                paymentInstrumentId:
                  $ref: "#/components/schemas/PaymentInstrumentId"
              required:
                - paymentManagerArn
                - paymentConnectorId
                - paymentInstrumentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePaymentInstrumentResponse"
  /payments/deletePaymentSession:
    post:
      operationId: DeletePaymentSession
      description: "Delete a payment manager session Permanently removes a payment session record from the database. This is a hard delete operation that removes the session completely. Deleting a non-existent or already-deleted session returns ResourceNotFoundException (404). Authorization: The caller must own the session (accountId, userId, and paymentManagerId must match). If authorization fails, a 403 Forbidden error is returned. Errors: ResourceNotFoundException: The session does not exist or has already been deleted AccessDeniedException: The caller is not authorized to delete this session ValidationException: Required fields are missing or invalid InternalServerException: An unexpected server error occurred"
      parameters:
        - name: X-Amzn-Bedrock-AgentCore-Payments-User-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The user ID making the delete request. Must match the session's userId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentManagerArn:
                  $ref: "#/components/schemas/PaymentManagerArn"
                paymentSessionId:
                  $ref: "#/components/schemas/PaymentSessionId"
              required:
                - paymentManagerArn
                - paymentSessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePaymentSessionResponse"
  /recommendations/{recommendation_id}:
    delete:
      operationId: DeleteRecommendation
      description: Deletes a recommendation and its associated results.
      parameters:
        - name: recommendation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecommendationId"
          description: The unique identifier of the recommendation to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteRecommendationResponse"
    get:
      operationId: GetRecommendation
      description: Retrieves detailed information about a recommendation, including its configuration, status, and results.
      parameters:
        - name: recommendation_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RecommendationId"
          description: The unique identifier of the recommendation to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecommendationResponse"
  /evaluations/evaluate/{evaluator_id}:
    post:
      operationId: Evaluate
      description: Performs on-demand evaluation of agent traces using a specified evaluator. This synchronous API accepts traces in OpenTelemetry format and returns immediate scoring results with detailed explanations.
      parameters:
        - name: evaluator_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EvaluatorId"
          description: The unique identifier of the evaluator to use for scoring. Can be a built-in evaluator (e.g., Builtin.Helpfulness, Builtin.Correctness) or a custom evaluator Id created through the control plane API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evaluationInput:
                  $ref: "#/components/schemas/EvaluationInput"
                evaluationTarget:
                  $ref: "#/components/schemas/EvaluationTarget"
                evaluationReferenceInputs:
                  $ref: "#/components/schemas/EvaluationReferenceInputs"
              required:
                - evaluationInput
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
  /runtimes/{agent_runtime_arn}/invocations/.well-known/agent-card.json:
    get:
      operationId: GetAgentCard
      description: Retrieves the A2A agent card associated with an AgentCore Runtime agent.
      parameters:
        - name: X-Amzn-Bedrock-AgentCore-Runtime-Session-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/SessionType"
          description: The session ID that the AgentCore Runtime agent is using.
        - name: agent_runtime_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The ARN of the AgentCore Runtime agent for which you want to get the A2A agent card.
        - name: qualifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Optional qualifier to specify an agent alias, such as prodcode> or dev. If you don't provide a value, the DEFAULT alias is used.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAgentCardResponse"
  /browsers/{browser_identifier}/sessions/get:
    get:
      operationId: GetBrowserSession
      description: "Retrieves detailed information about a specific browser session in Amazon Bedrock AgentCore. This operation returns the session's configuration, current status, associated streams, and metadata. To get a browser session, you must specify both the browser identifier and the session ID. The response includes information about the session's viewport configuration, timeout settings, and stream endpoints. The following operations are related to GetBrowserSession: StartBrowserSession ListBrowserSessions StopBrowserSession"
      parameters:
        - name: browser_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique identifier of the browser associated with the session.
        - name: sessionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BrowserSessionId"
          description: The unique identifier of the browser session to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBrowserSessionResponse"
  /code-interpreters/{code_interpreter_identifier}/sessions/get:
    get:
      operationId: GetCodeInterpreterSession
      description: "Retrieves detailed information about a specific code interpreter session in Amazon Bedrock AgentCore. This operation returns the session's configuration, current status, and metadata. To get a code interpreter session, you must specify both the code interpreter identifier and the session ID. The response includes information about the session's timeout settings and current status. The following operations are related to GetCodeInterpreterSession: StartCodeInterpreterSession ListCodeInterpreterSessions StopCodeInterpreterSession"
      parameters:
        - name: code_interpreter_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The unique identifier of the code interpreter associated with the session.
        - name: sessionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CodeInterpreterSessionId"
          description: The unique identifier of the code interpreter session to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCodeInterpreterSessionResponse"
  /memories/{memory_id}/memoryRecord/{memory_record_id}:
    get:
      operationId: GetMemoryRecord
      description: Retrieves a specific memory record from an AgentCore Memory resource. To use this operation, you must have the bedrock-agentcore:GetMemoryRecord permission.
      parameters:
        - name: memory_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryId"
          description: The identifier of the AgentCore Memory resource containing the memory record.
        - name: memory_record_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MemoryRecordId"
          description: The identifier of the memory record to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMemoryRecordOutput"
  /payments/getPaymentInstrument:
    post:
      operationId: GetPaymentInstrument
      description: Get a payment instrument by ID
      parameters:
        - name: X-Amzn-Bedrock-AgentCore-Payments-User-Id
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/UserId"
          description: The user ID associated with this payment instrument.
        - name: X-Amzn-Bedrock-AgentCore-Payments-Agent-Name
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/PaymentAgentName"
          description: The agent name associated with this request, used for observability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentManagerArn:
                  $ref: "#/components/schemas/PaymentManagerArn"
                paymentConnectorId:
                  $ref: "#/components/schemas/PaymentConnectorId"
                paymentInstrumentId:
                  $ref: "#/components/schemas/PaymentInstrumentId"
              required:
                - paymentManagerArn
                - paymentInstrumentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPaymentInstrumentResponse"
  /payments/getPaymentInstrumentBalance:
