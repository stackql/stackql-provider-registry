      type: object
      properties:
        value:
          $ref: "#/components/schemas/String"
          description: The numeric value of the amount.
        currency:
          $ref: "#/components/schemas/Currency"
          description: The currency code for this amount.
      required:
        - value
        - currency
    Currency:
      description: Supported currency codes
      type: string
      enum:
        - USD
    CreatePaymentSessionRequestExpiryTimeInMinutesInteger:
      type: integer
      minimum: 15
      maximum: 480
    CreatePaymentSessionResponse:
      description: Response structure for creating a payment session
      type: object
      properties:
        paymentSession:
          $ref: "#/components/schemas/PaymentSession"
      required:
        - paymentSession
    PaymentSession:
      description: Payment manager session
      type: object
      properties:
        paymentSessionId:
          $ref: "#/components/schemas/PaymentSessionId"
          description: The unique identifier for this payment session.
        paymentManagerArn:
          $ref: "#/components/schemas/PaymentManagerArn"
