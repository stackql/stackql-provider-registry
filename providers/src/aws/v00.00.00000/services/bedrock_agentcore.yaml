        agentCoreBrowser:
          $ref: "#/components/schemas/HarnessAgentCoreBrowserConfig"
          description: Configuration for AgentCore Browser.
        agentCoreGateway:
          $ref: "#/components/schemas/HarnessAgentCoreGatewayConfig"
          description: Configuration for AgentCore Gateway.
        inlineFunction:
          $ref: "#/components/schemas/HarnessInlineFunctionConfig"
          description: Configuration for an inline function tool.
        agentCoreCodeInterpreter:
          $ref: "#/components/schemas/HarnessAgentCoreCodeInterpreterConfig"
          description: Configuration for AgentCore Code Interpreter.
    HarnessRemoteMcpConfig:
      description: Configuration for connecting to a remote MCP server.
