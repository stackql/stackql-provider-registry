      enum:
        - NONE
        - HARD
    ColorMetadata:
      description: Choose Insert for this setting to include color metadata in this output. Choose Ignore to exclude color metadata from this output. If you don't specify a value, the service sets this to Insert by default.
      type: string
      enum:
        - IGNORE
        - INSERT
    DropFrameTimecode:
      description: Applies only to 29.97 fps outputs. When this feature is enabled, the service will use drop-frame timecode on outputs. If it is not possible to use drop-frame timecode, the system will fall back to non-drop-frame. This setting is enabled by default when Timecode insertion or Timecode track is enabled.
      type: string
      enum:
        - DISABLED
        - ENABLED
    RespondToAfd:
      description: Use Respond to AFD to specify how the service changes the video itself in response to AFD values in the input. * Choose Respond to clip the input video frame according to the AFD value, input display aspect ratio, and output display aspect ratio. * Choose Passthrough to include the input AFD values. Do not choose this when AfdSignaling is set to NONE. A preferred implementation of this workflow is to set RespondToAfd to and set AfdSignaling to AUTO. * Choose None to remove all input AFD values from this output.
      type: string
      enum:
        - NONE
        - RESPOND
        - PASSTHROUGH
    ScalingBehavior:
      description: Specify the video Scaling behavior when your output has a different resolution than your input. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/video-scaling.html Select Smart Cropping using Elemental Inference as your scaling behavior to have Elemental Inference automatically crop your video. Smart Crop requires a vertical output aspect ratio (1:1 is the widest aspect ratio supported).
      type: string
      enum:
        - DEFAULT
        - STRETCH_TO_OUTPUT
        - FIT
        - FIT_NO_UPSCALE
        - FILL
        - SMART_CROP
    VideoTimecodeInsertion:
      description: Applies only to H.264, H.265, MPEG2, and ProRes outputs. Only enable Timecode insertion when the input frame rate is identical to the output frame rate. To include timecodes in this output, set Timecode insertion to PIC_TIMING_SEI. To leave them out, set it to DISABLED. Default is DISABLED. When the service inserts timecodes in an output, by default, it uses any embedded timecodes from the input. If none are present, the service will set the timecode for the first output frame to zero. To change this default behavior, adjust the settings under Timecode configuration. In the console, these settings are located under Job > Job settings > Timecode configuration. Note - Timecode source under input settings does not affect the timecodes that are inserted in the output. Source under Job settings > Timecode configuration does.
      type: string
      enum:
        - DISABLED
        - PIC_TIMING_SEI
    TimecodeTrack:
      description: "To include a timecode track in your MP4 output: Choose Enabled. MediaConvert writes the timecode track in the Null Media Header box (NMHD), without any timecode text formatting information. You can also specify dropframe or non-dropframe timecode under the Drop Frame Timecode setting. To not include a timecode track: Keep the default value, Disabled."
      type: string
      enum:
        - DISABLED
        - ENABLED
    VideoPreprocessor:
      description: Find additional transcoding features under Preprocessors. Enable the features at each output individually. These features are disabled by default.
      type: object
      properties:
        ColorCorrector:
          $ref: "#/components/schemas/ColorCorrector"
          description: Use these settings to convert the color space or to modify properties such as hue and contrast for this output. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/converting-the-color-space.html.
        Deinterlacer:
          $ref: "#/components/schemas/Deinterlacer"
          description: Use the deinterlacer to produce smoother motion and a clearer picture. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/working-with-scan-type.html.
        DolbyVision:
          $ref: "#/components/schemas/DolbyVision"
          description: Enable Dolby Vision feature to produce Dolby Vision compatible video output.
        Hdr10Plus:
          $ref: "#/components/schemas/Hdr10Plus"
          description: Enable HDR10+ analysis and metadata injection. Compatible with HEVC only.
        ImageInserter:
          $ref: "#/components/schemas/ImageInserter"
          description: Enable the Image inserter feature to include a graphic overlay on your video. Enable or disable this feature for each output individually. This setting is disabled by default.
        NoiseReducer:
          $ref: "#/components/schemas/NoiseReducer"
          description: Enable the Noise reducer feature to remove noise from your video output if necessary. Enable or disable this feature for each output individually. This setting is disabled by default. When you enable Noise reducer, you must also select a value for Noise reducer filter. For AVC outputs, when you include Noise reducer, you cannot include the Bandwidth reduction filter.
        PartnerWatermarking:
          $ref: "#/components/schemas/PartnerWatermarking"
          description: If you work with a third party video watermarking partner, use the group of settings that correspond with your watermarking partner to include watermarks in your output.
        TimecodeBurnin:
          $ref: "#/components/schemas/TimecodeBurnin"
          description: Settings for burning the output timecode and specified prefix into the output.
    ColorCorrector:
      description: Settings for color correction.
      type: object
      properties:
        Brightness:
          $ref: "#/components/schemas/__integerMin1Max100"
          description: Brightness level.
        ClipLimits:
          $ref: "#/components/schemas/ClipLimits"
          description: Specify YUV limits and RGB tolerances when you set Sample range conversion to Limited range clip.
        ColorSpaceConversion:
          $ref: "#/components/schemas/ColorSpaceConversion"
          description: "Specify the color space you want for this output. The service supports conversion between HDR formats, between SDR formats, from SDR to HDR, and from HDR to SDR. SDR to HDR conversion doesn't upgrade the dynamic range. The converted video has an HDR format, but visually appears the same as an unconverted output. HDR to SDR conversion uses tone mapping to approximate the outcome of manually regrading from HDR to SDR. When you specify an output color space, MediaConvert uses the following color space metadata, which includes color primaries, transfer characteristics, and matrix coefficients: * HDR 10: BT.2020, PQ, BT.2020 non-constant * HLG 2020: BT.2020, HLG, BT.2020 non-constant * P3DCI (Theater): DCIP3, SMPTE 428M, BT.709 * P3D65 (SDR): Display P3, sRGB, BT.709 * P3D65 (HDR): Display P3, PQ, BT.709"
        Contrast:
          $ref: "#/components/schemas/__integerMin1Max100"
          description: Contrast level.
        Hdr10Metadata:
          $ref: "#/components/schemas/Hdr10Metadata"
          description: Use these settings when you convert to the HDR 10 color space. Specify the SMPTE ST 2086 Mastering Display Color Volume static metadata that you want signaled in the output. These values don't affect the pixel values that are encoded in the video stream. They are intended to help the downstream video player display content in a way that reflects the intentions of the the content creator. When you set Color space conversion to HDR 10, these settings are required. You must set values for Max frame average light level and Max content light level; these settings don't have a default value. The default values for the other HDR 10 metadata settings are defined by the P3D65 color space. For more information about MediaConvert HDR jobs, see https://docs.aws.amazon.com/console/mediaconvert/hdr.
        HdrToSdrToneMapper:
          $ref: "#/components/schemas/HDRToSDRToneMapper"
          description: "Specify how MediaConvert maps brightness and colors from your HDR input to your SDR output. The mode that you select represents a creative choice, with different tradeoffs in the details and tones of your output. To maintain details in bright or saturated areas of your output: Choose Preserve details. For some sources, your SDR output may look less bright and less saturated when compared to your HDR source. MediaConvert automatically applies this mode for HLG sources, regardless of your choice. For a bright and saturated output: Choose Vibrant. We recommend that you choose this mode when any of your source content is HDR10, and for the best results when it is mastered for 1000 nits. You may notice loss of details in bright or saturated areas of your output. HDR to SDR tone mapping has no effect when your input is SDR."
        Hue:
          $ref: "#/components/schemas/__integerMinNegative180Max180"
          description: Hue in degrees.
        MaxLuminance:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the maximum mastering display luminance. Enter an integer from 0 to 2147483647, in units of 0.0001 nits. For example, enter 10000000 for 1000 nits.
        SampleRangeConversion:
          $ref: "#/components/schemas/SampleRangeConversion"
          description: "Specify how MediaConvert limits the color sample range for this output. To create a limited range output from a full range input: Choose Limited range squeeze. For full range inputs, MediaConvert performs a linear offset to color samples equally across all pixels and frames. Color samples in 10-bit outputs are limited to 64 through 940, and 8-bit outputs are limited to 16 through 235. Note: For limited range inputs, values for color samples are passed through to your output unchanged. MediaConvert does not limit the sample range. To correct pixels in your input that are out of range or out of gamut: Choose Limited range clip. Use for broadcast applications. MediaConvert conforms any pixels outside of the values that you specify under Minimum YUV and Maximum YUV to limited range bounds. MediaConvert also corrects any YUV values that, when converted to RGB, would be outside the bounds you specify under Minimum RGB tolerance and Maximum RGB tolerance. With either limited range conversion, MediaConvert writes the sample range metadata in the output."
        Saturation:
          $ref: "#/components/schemas/__integerMin1Max100"
          description: Saturation level.
        SdrReferenceWhiteLevel:
          $ref: "#/components/schemas/__integerMin100Max1000"
          description: "Specify the reference white level, in nits, for all of your SDR inputs. Use to correct brightness levels within HDR10 outputs. The following color metadata must be present in your SDR input: color primaries, transfer characteristics, and matrix coefficients. If your SDR input has missing color metadata, or if you want to correct input color metadata, manually specify a color space in the input video selector. For 1,000 nit peak brightness displays, we recommend that you set SDR reference white level to 203 (according to ITU-R BT.2408). Leave blank to use the default value of 100, or specify an integer from 100 to 1000."
    ClipLimits:
      description: Specify YUV limits and RGB tolerances when you set Sample range conversion to Limited range clip.
      type: object
      properties:
        MaximumRGBTolerance:
          $ref: "#/components/schemas/__integerMin90Max105"
          description: Specify the Maximum RGB color sample range tolerance for your output. MediaConvert corrects any YUV values that, when converted to RGB, would be outside the upper tolerance that you specify. Enter an integer from 90 to 105 as an offset percentage to the maximum possible value. Leave blank to use the default value 100. When you specify a value for Maximum RGB tolerance, you must set Sample range conversion to Limited range clip.
        MaximumYUV:
          $ref: "#/components/schemas/__integerMin920Max1023"
          description: Specify the Maximum YUV color sample limit. MediaConvert conforms any pixels in your input above the value that you specify to typical limited range bounds. Enter an integer from 920 to 1023. Leave blank to use the default value 940. The value that you enter applies to 10-bit ranges. For 8-bit ranges, MediaConvert automatically scales this value down. When you specify a value for Maximum YUV, you must set Sample range conversion to Limited range clip.
        MinimumRGBTolerance:
          $ref: "#/components/schemas/__integerMinNegative5Max10"
          description: Specify the Minimum RGB color sample range tolerance for your output. MediaConvert corrects any YUV values that, when converted to RGB, would be outside the lower tolerance that you specify. Enter an integer from -5 to 10 as an offset percentage to the minimum possible value. Leave blank to use the default value 0. When you specify a value for Minimum RGB tolerance, you must set Sample range conversion to Limited range clip.
        MinimumYUV:
          $ref: "#/components/schemas/__integerMin0Max128"
          description: Specify the Minimum YUV color sample limit. MediaConvert conforms any pixels in your input below the value that you specify to typical limited range bounds. Enter an integer from 0 to 128. Leave blank to use the default value 64. The value that you enter applies to 10-bit ranges. For 8-bit ranges, MediaConvert automatically scales this value down. When you specify a value for Minumum YUV, you must set Sample range conversion to Limited range clip.
    __integerMin90Max105:
      type: integer
      minimum: 90
      maximum: 105
    __integerMin920Max1023:
      type: integer
      minimum: 920
      maximum: 1023
    __integerMinNegative5Max10:
      type: integer
      minimum: -5
      maximum: 10
    ColorSpaceConversion:
