    __integerMinNegative180Max180:
      type: integer
      minimum: -180
      maximum: 180
    SampleRangeConversion:
      description: "Specify how MediaConvert limits the color sample range for this output. To create a limited range output from a full range input: Choose Limited range squeeze. For full range inputs, MediaConvert performs a linear offset to color samples equally across all pixels and frames. Color samples in 10-bit outputs are limited to 64 through 940, and 8-bit outputs are limited to 16 through 235. Note: For limited range inputs, values for color samples are passed through to your output unchanged. MediaConvert does not limit the sample range. To correct pixels in your input that are out of range or out of gamut: Choose Limited range clip. Use for broadcast applications. MediaConvert conforms any pixels outside of the values that you specify under Minimum YUV and Maximum YUV to limited range bounds. MediaConvert also corrects any YUV values that, when converted to RGB, would be outside the bounds you specify under Minimum RGB tolerance and Maximum RGB tolerance. With either limited range conversion, MediaConvert writes the sample range metadata in the output."
      type: string
      enum:
        - LIMITED_RANGE_SQUEEZE
        - NONE
        - LIMITED_RANGE_CLIP
    Deinterlacer:
      description: Settings for deinterlacer
      type: object
      properties:
        Algorithm:
          $ref: "#/components/schemas/DeinterlaceAlgorithm"
          description: "Only applies when you set Deinterlace mode to Deinterlace or Adaptive. Interpolate produces sharper pictures, while blend produces smoother motion. If your source file includes a ticker, such as a scrolling headline at the bottom of the frame: Choose Interpolate ticker or Blend ticker. To apply field doubling: Choose Linear interpolation. Note that Linear interpolation may introduce video artifacts into your output."
        Control:
          $ref: "#/components/schemas/DeinterlacerControl"
          description: "- When set to NORMAL (default), the deinterlacer does not convert frames that are tagged in metadata as progressive. It will only convert those that are tagged as some other type. - When set to FORCE_ALL_FRAMES, the deinterlacer converts every frame to progressive - even those that are already tagged as progressive. Turn Force mode on only if there is a good chance that the metadata has tagged frames as progressive when they are not progressive. Do not turn on otherwise; processing frames that are already progressive into progressive will probably result in lower quality video."
        Mode:
          $ref: "#/components/schemas/DeinterlacerMode"
          description: Use Deinterlacer to choose how the service will do deinterlacing. Default is Deinterlace. - Deinterlace converts interlaced to progressive. - Inverse telecine converts Hard Telecine 29.97i to progressive 23.976p. - Adaptive auto-detects and converts to progressive.
    DeinterlaceAlgorithm:
      description: "Only applies when you set Deinterlace mode to Deinterlace or Adaptive. Interpolate produces sharper pictures, while blend produces smoother motion. If your source file includes a ticker, such as a scrolling headline at the bottom of the frame: Choose Interpolate ticker or Blend ticker. To apply field doubling: Choose Linear interpolation. Note that Linear interpolation may introduce video artifacts into your output."
      type: string
      enum:
        - INTERPOLATE
        - INTERPOLATE_TICKER
        - BLEND
        - BLEND_TICKER
        - LINEAR_INTERPOLATION
    DeinterlacerControl:
      description: "- When set to NORMAL (default), the deinterlacer does not convert frames that are tagged in metadata as progressive. It will only convert those that are tagged as some other type. - When set to FORCE_ALL_FRAMES, the deinterlacer converts every frame to progressive - even those that are already tagged as progressive. Turn Force mode on only if there is a good chance that the metadata has tagged frames as progressive when they are not progressive. Do not turn on otherwise; processing frames that are already progressive into progressive will probably result in lower quality video."
      type: string
      enum:
        - FORCE_ALL_FRAMES
        - NORMAL
    DeinterlacerMode:
      description: Use Deinterlacer to choose how the service will do deinterlacing. Default is Deinterlace. - Deinterlace converts interlaced to progressive. - Inverse telecine converts Hard Telecine 29.97i to progressive 23.976p. - Adaptive auto-detects and converts to progressive.
      type: string
      enum:
        - DEINTERLACE
        - INVERSE_TELECINE
        - ADAPTIVE
    DolbyVision:
      description: Create Dolby Vision Profile 5 or Profile 8.1 compatible video output.
      type: object
      properties:
        Compatibility:
          $ref: "#/components/schemas/DolbyVisionCompatibility"
          description: When you set Compatibility mapping to Duplicate Stream, DolbyVision streams that have a backward compatible base layer (e.g., DolbyVision 8.1) will cause a duplicate stream to be signaled in the manifest as a duplicate stream. When you set Compatibility mapping to Supplemntal Codecs, DolbyVision streams that have a backward compatible base layer (e.g., DolbyVision 8.1) will cause the associate stream in the manifest to include a SUPPLEMENTAL_CODECS property.
        L6Metadata:
          $ref: "#/components/schemas/DolbyVisionLevel6Metadata"
          description: Use these settings when you set DolbyVisionLevel6Mode to SPECIFY to override the MaxCLL and MaxFALL values in your input with new values.
        L6Mode:
          $ref: "#/components/schemas/DolbyVisionLevel6Mode"
          description: Use Dolby Vision Mode to choose how the service will handle Dolby Vision MaxCLL and MaxFALL properies.
        Mapping:
          $ref: "#/components/schemas/DolbyVisionMapping"
          description: Required when you set Dolby Vision Profile to Profile 8.1. When you set Content mapping to None, content mapping is not applied to the HDR10-compatible signal. Depending on the source peak nit level, clipping might occur on HDR devices without Dolby Vision. When you set Content mapping to HDR10 1000, the transcoder creates a 1,000 nits peak HDR10-compatible signal by applying static content mapping to the source. This mode is speed-optimized for PQ10 sources with metadata that is created from analysis. For graded Dolby Vision content, be aware that creative intent might not be guaranteed with extreme 1,000 nits trims.
        Profile:
          $ref: "#/components/schemas/DolbyVisionProfile"
          description: Required when you enable Dolby Vision. Use Profile 5 to include frame-interleaved Dolby Vision metadata in your output. Your input must include Dolby Vision metadata or an HDR10 YUV color space. Use Profile 8.1 to include frame-interleaved Dolby Vision metadata and HDR10 metadata in your output. Your input must include Dolby Vision metadata.
    DolbyVisionCompatibility:
      description: When you set Compatibility mapping to Duplicate Stream, DolbyVision streams that have a backward compatible base layer (e.g., DolbyVision 8.1) will cause a duplicate stream to be signaled in the manifest as a duplicate stream. When you set Compatibility mapping to Supplemntal Codecs, DolbyVision streams that have a backward compatible base layer (e.g., DolbyVision 8.1) will cause the associate stream in the manifest to include a SUPPLEMENTAL_CODECS property.
      type: string
      enum:
        - DUPLICATE_STREAM
        - SUPPLEMENTAL_CODECS
    DolbyVisionLevel6Metadata:
      description: Use these settings when you set DolbyVisionLevel6Mode to SPECIFY to override the MaxCLL and MaxFALL values in your input with new values.
      type: object
      properties:
        MaxCll:
          $ref: "#/components/schemas/__integerMin0Max65535"
          description: Maximum Content Light Level. Static HDR metadata that corresponds to the brightest pixel in the entire stream. Measured in nits.
        MaxFall:
          $ref: "#/components/schemas/__integerMin0Max65535"
          description: Maximum Frame-Average Light Level. Static HDR metadata that corresponds to the highest frame-average brightness in the entire stream. Measured in nits.
    DolbyVisionLevel6Mode:
      description: Use Dolby Vision Mode to choose how the service will handle Dolby Vision MaxCLL and MaxFALL properies.
      type: string
      enum:
        - PASSTHROUGH
        - RECALCULATE
        - SPECIFY
    DolbyVisionMapping:
      description: Required when you set Dolby Vision Profile to Profile 8.1. When you set Content mapping to None, content mapping is not applied to the HDR10-compatible signal. Depending on the source peak nit level, clipping might occur on HDR devices without Dolby Vision. When you set Content mapping to HDR10 1000, the transcoder creates a 1,000 nits peak HDR10-compatible signal by applying static content mapping to the source. This mode is speed-optimized for PQ10 sources with metadata that is created from analysis. For graded Dolby Vision content, be aware that creative intent might not be guaranteed with extreme 1,000 nits trims.
      type: string
      enum:
        - HDR10_NOMAP
        - HDR10_1000
    DolbyVisionProfile:
      description: Required when you enable Dolby Vision. Use Profile 5 to include frame-interleaved Dolby Vision metadata in your output. Your input must include Dolby Vision metadata or an HDR10 YUV color space. Use Profile 8.1 to include frame-interleaved Dolby Vision metadata and HDR10 metadata in your output. Your input must include Dolby Vision metadata.
      type: string
      enum:
        - PROFILE_5
        - PROFILE_8_1
    Hdr10Plus:
      description: Setting for HDR10+ metadata insertion
      type: object
      properties:
        MasteringMonitorNits:
          $ref: "#/components/schemas/__integerMin0Max4000"
          description: Specify the HDR10+ mastering display normalized peak luminance, in nits. This is the normalized actual peak luminance of the mastering display, as defined by ST 2094-40.
        TargetMonitorNits:
          $ref: "#/components/schemas/__integerMin0Max4000"
          description: Specify the HDR10+ target display nominal peak luminance, in nits. This is the nominal maximum luminance of the target display as defined by ST 2094-40.
    __integerMin0Max4000:
      type: integer
      minimum: 0
      maximum: 4000
    NoiseReducer:
      description: Enable the Noise reducer feature to remove noise from your video output if necessary. Enable or disable this feature for each output individually. This setting is disabled by default. When you enable Noise reducer, you must also select a value for Noise reducer filter. For AVC outputs, when you include Noise reducer, you cannot include the Bandwidth reduction filter.
      type: object
      properties:
        Filter:
          $ref: "#/components/schemas/NoiseReducerFilter"
          description: Use Noise reducer filter to select one of the following spatial image filtering functions. To use this setting, you must also enable Noise reducer. * Bilateral preserves edges while reducing noise. * Mean (softest), Gaussian, Lanczos, and Sharpen (sharpest) do convolution filtering. * Conserve does min/max noise reduction. * Spatial does frequency-domain filtering based on JND principles. * Temporal optimizes video quality for complex motion.
        FilterSettings:
          $ref: "#/components/schemas/NoiseReducerFilterSettings"
          description: Settings for a noise reducer filter
        SpatialFilterSettings:
          $ref: "#/components/schemas/NoiseReducerSpatialFilterSettings"
          description: Noise reducer filter settings for spatial filter.
        TemporalFilterSettings:
          $ref: "#/components/schemas/NoiseReducerTemporalFilterSettings"
          description: Noise reducer filter settings for temporal filter.
    NoiseReducerFilter:
      description: Use Noise reducer filter to select one of the following spatial image filtering functions. To use this setting, you must also enable Noise reducer. * Bilateral preserves edges while reducing noise. * Mean (softest), Gaussian, Lanczos, and Sharpen (sharpest) do convolution filtering. * Conserve does min/max noise reduction. * Spatial does frequency-domain filtering based on JND principles. * Temporal optimizes video quality for complex motion.
      type: string
      enum:
        - BILATERAL
        - MEAN
        - GAUSSIAN
        - LANCZOS
        - SHARPEN
        - CONSERVE
        - SPATIAL
        - TEMPORAL
    NoiseReducerFilterSettings:
      description: Settings for a noise reducer filter
      type: object
      properties:
        Strength:
          $ref: "#/components/schemas/__integerMin0Max3"
          description: Relative strength of noise reducing filter. Higher values produce stronger filtering.
    __integerMin0Max3:
      type: integer
      minimum: 0
      maximum: 3
    NoiseReducerSpatialFilterSettings:
      description: Noise reducer filter settings for spatial filter.
      type: object
      properties:
        PostFilterSharpenStrength:
          $ref: "#/components/schemas/__integerMin0Max3"
          description: Specify strength of post noise reduction sharpening filter, with 0 disabling the filter and 3 enabling it at maximum strength.
        Speed:
          $ref: "#/components/schemas/__integerMinNegative2Max3"
          description: The speed of the filter, from -2 (lower speed) to 3 (higher speed), with 0 being the nominal value.
        Strength:
          $ref: "#/components/schemas/__integerMin0Max16"
          description: Relative strength of noise reducing filter. Higher values produce stronger filtering.
    __integerMinNegative2Max3:
      type: integer
      minimum: -2
      maximum: 3
    __integerMin0Max16:
      type: integer
      minimum: 0
      maximum: 16
    NoiseReducerTemporalFilterSettings:
      description: Noise reducer filter settings for temporal filter.
      type: object
      properties:
        AggressiveMode:
          $ref: "#/components/schemas/__integerMin0Max4"
          description: Use Aggressive mode for content that has complex motion. Higher values produce stronger temporal filtering. This filters highly complex scenes more aggressively and creates better VQ for low bitrate outputs.
        PostTemporalSharpening:
          $ref: "#/components/schemas/NoiseFilterPostTemporalSharpening"
          description: When you set Noise reducer to Temporal, the bandwidth and sharpness of your output is reduced. You can optionally use Post temporal sharpening to apply sharpening to the edges of your output. Note that Post temporal sharpening will also make the bandwidth reduction from the Noise reducer smaller. The default behavior, Auto, allows the transcoder to determine whether to apply sharpening, depending on your input type and quality. When you set Post temporal sharpening to Enabled, specify how much sharpening is applied using Post temporal sharpening strength. Set Post temporal sharpening to Disabled to not apply sharpening.
        PostTemporalSharpeningStrength:
          $ref: "#/components/schemas/NoiseFilterPostTemporalSharpeningStrength"
          description: Use Post temporal sharpening strength to define the amount of sharpening the transcoder applies to your output. Set Post temporal sharpening strength to Low, Medium, or High to indicate the amount of sharpening.
        Speed:
          $ref: "#/components/schemas/__integerMinNegative1Max3"
          description: The speed of the filter (higher number is faster). Low setting reduces bit rate at the cost of transcode time, high setting improves transcode time at the cost of bit rate.
        Strength:
          $ref: "#/components/schemas/__integerMin0Max16"
          description: "Specify the strength of the noise reducing filter on this output. Higher values produce stronger filtering. We recommend the following value ranges, depending on the result that you want: * 0-2 for complexity reduction with minimal sharpness loss * 2-8 for complexity reduction with image preservation * 8-16 for a high level of complexity reduction"
    __integerMin0Max4:
      type: integer
      minimum: 0
      maximum: 4
    NoiseFilterPostTemporalSharpening:
      description: When you set Noise reducer to Temporal, the bandwidth and sharpness of your output is reduced. You can optionally use Post temporal sharpening to apply sharpening to the edges of your output. Note that Post temporal sharpening will also make the bandwidth reduction from the Noise reducer smaller. The default behavior, Auto, allows the transcoder to determine whether to apply sharpening, depending on your input type and quality. When you set Post temporal sharpening to Enabled, specify how much sharpening is applied using Post temporal sharpening strength. Set Post temporal sharpening to Disabled to not apply sharpening.
      type: string
      enum:
        - DISABLED
        - ENABLED
        - AUTO
    NoiseFilterPostTemporalSharpeningStrength:
      description: Use Post temporal sharpening strength to define the amount of sharpening the transcoder applies to your output. Set Post temporal sharpening strength to Low, Medium, or High to indicate the amount of sharpening.
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    __integerMinNegative1Max3:
      type: integer
      minimum: -1
      maximum: 3
    PartnerWatermarking:
      description: If you work with a third party video watermarking partner, use the group of settings that correspond with your watermarking partner to include watermarks in your output.
      type: object
      properties:
        NexguardFileMarkerSettings:
          $ref: "#/components/schemas/NexGuardFileMarkerSettings"
          description: For forensic video watermarking, MediaConvert supports Nagra NexGuard File Marker watermarking. MediaConvert supports both PreRelease Content (NGPR/G2) and OTT Streaming workflows.
    NexGuardFileMarkerSettings:
      description: For forensic video watermarking, MediaConvert supports Nagra NexGuard File Marker watermarking. MediaConvert supports both PreRelease Content (NGPR/G2) and OTT Streaming workflows.
      type: object
      properties:
        License:
          $ref: "#/components/schemas/__stringMin1Max100000"
          description: Use the base64 license string that Nagra provides you. Enter it directly in your JSON job specification or in the console. Required when you include Nagra NexGuard File Marker watermarking in your job.
        Payload:
          $ref: "#/components/schemas/__integerMin0Max4194303"
          description: Specify the payload ID that you want associated with this output. Valid values vary depending on your Nagra NexGuard forensic watermarking workflow. Required when you include Nagra NexGuard File Marker watermarking in your job. For PreRelease Content (NGPR/G2), specify an integer from 1 through 4,194,303. You must generate a unique ID for each asset you watermark, and keep a record of which ID you have assigned to each asset. Neither Nagra nor MediaConvert keep track of the relationship between output files and your IDs. For OTT Streaming, create two adaptive bitrate (ABR) stacks for each asset. Do this by setting up two output groups. For one output group, set the value of Payload ID to 0 in every output. For the other output group, set Payload ID to 1 in every output.
        Preset:
          $ref: "#/components/schemas/__stringMin1Max256"
          description: Enter one of the watermarking preset strings that Nagra provides you. Required when you include Nagra NexGuard File Marker watermarking in your job.
        Strength:
          $ref: "#/components/schemas/WatermarkingStrength"
          description: Optional. Ignore this setting unless Nagra support directs you to specify a value. When you don't specify a value here, the Nagra NexGuard library uses its default value.
    __stringMin1Max100000:
      type: string
      minLength: 1
      maxLength: 100000
    __integerMin0Max4194303:
      type: integer
      minimum: 0
      maximum: 4194303
    WatermarkingStrength:
      description: Optional. Ignore this setting unless Nagra support directs you to specify a value. When you don't specify a value here, the Nagra NexGuard library uses its default value.
      type: string
      enum:
        - LIGHTEST
        - LIGHTER
        - DEFAULT
        - STRONGER
        - STRONGEST
    TimecodeBurnin:
      description: Settings for burning the output timecode and specified prefix into the output.
      type: object
      properties:
        FontSize:
          $ref: "#/components/schemas/__integerMin10Max48"
          description: Use Font size to set the font size of any burned-in timecode. Valid values are 10, 16, 32, 48.
        Position:
          $ref: "#/components/schemas/TimecodeBurninPosition"
          description: Use Position under Timecode burn-in to specify the location the burned-in timecode on output video.
        Prefix:
          $ref: "#/components/schemas/__stringPattern"
          description: Use Prefix to place ASCII characters before any burned-in timecode. For example, a prefix of "EZ-" will result in the timecode "EZ-00:00:00:00". Provide either the characters themselves or the ASCII code equivalents. The supported range of characters is 0x20 through 0x7e. This includes letters, numbers, and all special characters represented on a standard English keyboard.
    __integerMin10Max48:
      type: integer
      minimum: 10
      maximum: 48
    TimecodeBurninPosition:
      description: Use Position under Timecode burn-in to specify the location the burned-in timecode on output video.
      type: string
      enum:
        - TOP_CENTER
        - TOP_LEFT
        - TOP_RIGHT
        - MIDDLE_LEFT
        - MIDDLE_CENTER
        - MIDDLE_RIGHT
        - BOTTOM_LEFT
        - BOTTOM_CENTER
        - BOTTOM_RIGHT
    __stringPattern:
      type: string
      pattern: ^[ -~]+$
    TimecodeConfig:
      description: These settings control how the service handles timecodes throughout the job. These settings don't affect input clipping.
      type: object
      properties:
        Anchor:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: If you use an editing platform that relies on an anchor timecode, use Anchor Timecode to specify a timecode that will match the input video frame to the output video frame. Use 24-hour format with frame number, (HH:MM:SS:FF) or (HH:MM:SS;FF). This setting ignores frame rate conversion. System behavior for Anchor Timecode varies depending on your setting for Source. * If Source is set to Specified Start, the first input frame is the specified value in Start Timecode. Anchor Timecode and Start Timecode are used calculate output timecode. * If Source is set to Start at 0 the first frame is 00:00:00:00. * If Source is set to Embedded, the first frame is the timecode value on the first input frame of the input.
        Source:
          $ref: "#/components/schemas/TimecodeSource"
          description: Use Source to set how timecodes are handled within this job. To make sure that your video, audio, captions, and markers are synchronized and that time-based features, such as image inserter, work correctly, choose the Timecode source option that matches your assets. All timecodes are in a 24-hour format with frame number (HH:MM:SS:FF). * Embedded - Use the timecode that is in the input video. If no embedded timecode is in the source, the service will use Start at 0 instead. * Start at 0 - Set the timecode of the initial frame to 00:00:00:00. * Specified Start - Set the timecode of the initial frame to a value other than zero. You use Start timecode to provide this value.
        Start:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: Only use when you set Source to Specified start. Use Start timecode to specify the timecode for the initial frame. Use 24-hour format with frame number, (HH:MM:SS:FF) or (HH:MM:SS;FF).
        TimestampOffset:
          $ref: "#/components/schemas/__stringPattern0940191020191209301"
          description: Only applies to outputs that support program-date-time stamp. Use Timestamp offset to overwrite the timecode date without affecting the time and frame number. Provide the new date as a string in the format "yyyy-mm-dd". To use Timestamp offset, you must also enable Insert program-date-time in the output settings. For example, if the date part of your timecodes is 2002-1-25 and you want to change it to one year later, set Timestamp offset to 2003-1-25.
    TimecodeSource:
      description: Use Source to set how timecodes are handled within this job. To make sure that your video, audio, captions, and markers are synchronized and that time-based features, such as image inserter, work correctly, choose the Timecode source option that matches your assets. All timecodes are in a 24-hour format with frame number (HH:MM:SS:FF). * Embedded - Use the timecode that is in the input video. If no embedded timecode is in the source, the service will use Start at 0 instead. * Start at 0 - Set the timecode of the initial frame to 00:00:00:00. * Specified Start - Set the timecode of the initial frame to a value other than zero. You use Start timecode to provide this value.
      type: string
      enum:
        - EMBEDDED
        - ZEROBASED
        - SPECIFIEDSTART
    __stringPattern0940191020191209301:
      type: string
      pattern: ^([0-9]{4})-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])$
    TimedMetadataInsertion:
      description: Insert user-defined custom ID3 metadata at timecodes that you specify. In each output that you want to include this metadata, you must set ID3 metadata to Passthrough.
      type: object
      properties:
        Id3Insertions:
          $ref: "#/components/schemas/__listOfId3Insertion"
          description: Id3Insertions contains the array of Id3Insertion instances.
    __listOfId3Insertion:
      type: array
      items:
        $ref: "#/components/schemas/Id3Insertion"
    Id3Insertion:
      description: To insert ID3 tags in your output, specify two values. Use ID3 tag to specify the base 64 encoded string and use Timecode to specify the time when the tag should be inserted. To insert multiple ID3 tags in your output, create multiple instances of ID3 insertion.
      type: object
      properties:
        Id3:
          $ref: "#/components/schemas/__stringPatternAZaZ0902"
          description: Use ID3 tag to provide a fully formed ID3 tag in base64-encode format.
        Timecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: Provide a Timecode in HH:MM:SS:FF or HH:MM:SS;FF format.
    SimulateReservedQueue:
      description: Enable this setting when you run a test job to estimate how many reserved transcoding slots (RTS) you need. When this is enabled, MediaConvert runs your job from an on-demand queue with similar performance to what you will see with one RTS in a reserved queue. This setting is disabled by default.
      type: string
      enum:
        - DISABLED
        - ENABLED
    StatusUpdateInterval:
      description: Specify how often MediaConvert sends STATUS_UPDATE events to Amazon CloudWatch Events. Set the interval, in seconds, between status updates. MediaConvert sends an update at this interval from the time the service begins processing your job to the time it completes the transcode or encounters an error.
      type: string
      enum:
        - SECONDS_10
        - SECONDS_12
        - SECONDS_15
        - SECONDS_20
        - SECONDS_30
        - SECONDS_60
        - SECONDS_120
        - SECONDS_180
        - SECONDS_240
        - SECONDS_300
        - SECONDS_360
        - SECONDS_420
        - SECONDS_480
        - SECONDS_540
        - SECONDS_600
    __mapOf__string:
      type: object
      properties: {}
    CreateJobResponse:
      type: object
      properties:
        Job:
          $ref: "#/components/schemas/Job"
          description: Each job converts an input file into an output file or files. For more information, see the User Guide at https://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
    Job:
      description: Each job converts an input file into an output file or files. For more information, see the User Guide at https://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
      type: object
      properties:
        AccelerationSettings:
          $ref: "#/components/schemas/AccelerationSettings"
          description: Accelerated transcoding can significantly speed up jobs with long, visually complex content.
        AccelerationStatus:
          $ref: "#/components/schemas/AccelerationStatus"
          description: Describes whether the current job is running with accelerated transcoding. For jobs that have Acceleration (AccelerationMode) set to DISABLED, AccelerationStatus is always NOT_APPLICABLE. For jobs that have Acceleration (AccelerationMode) set to ENABLED or PREFERRED, AccelerationStatus is one of the other states. AccelerationStatus is IN_PROGRESS initially, while the service determines whether the input files and job settings are compatible with accelerated transcoding. If they are, AcclerationStatus is ACCELERATED. If your input files and job settings aren't compatible with accelerated transcoding, the service either fails your job or runs it without accelerated transcoding, depending on how you set Acceleration (AccelerationMode). When the service runs your job without accelerated transcoding, AccelerationStatus is NOT_ACCELERATED.
        Arn:
          $ref: "#/components/schemas/__string"
          description: An identifier for this resource that is unique within all of AWS.
        BillingTagsSource:
          $ref: "#/components/schemas/BillingTagsSource"
          description: The tag type that AWS Billing and Cost Management will use to sort your AWS Elemental MediaConvert costs on any billing report that you set up.
        ClientRequestToken:
          $ref: "#/components/schemas/__string"
          description: Prevent duplicate jobs from being created and ensure idempotency for your requests. A client request token can be any string that includes up to 64 ASCII characters. If you reuse a client request token within one minute of a successful request, the API returns the job details of the original request instead. For more information see https://docs.aws.amazon.com/mediaconvert/latest/apireference/idempotency.html.
        CreatedAt:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time, in Unix epoch format in seconds, when the job got created.
        CurrentPhase:
          $ref: "#/components/schemas/JobPhase"
          description: A job's phase can be PROBING, TRANSCODING OR UPLOADING
        ElementalInferenceConfiguration:
          $ref: "#/components/schemas/ElementalInferenceConfiguration"
          description: The Elemental Inference configuration used in this job.
        ErrorCode:
          $ref: "#/components/schemas/__integer"
          description: Error code for the job
        ErrorMessage:
          $ref: "#/components/schemas/__string"
          description: Error message of Job
        HopDestinations:
          $ref: "#/components/schemas/__listOfHopDestination"
          description: Optional list of hop destinations.
        Id:
          $ref: "#/components/schemas/__string"
          description: A portion of the job's ARN, unique within your AWS Elemental MediaConvert resources
        JobEngineVersionRequested:
          $ref: "#/components/schemas/__string"
          description: The Job engine version that you requested for your job. Valid versions are in a YYYY-MM-DD format.
        JobEngineVersionUsed:
          $ref: "#/components/schemas/__string"
          description: The Job engine version that your job used. Job engine versions are in a YYYY-MM-DD format. When you request an expired version, the response for this property will be empty. Requests to create jobs with an expired version result in a regular job, as if no specific Job engine version was requested. When you request an invalid version, the response for this property will be empty. Requests to create jobs with an invalid version result in a 400 error message, and no job is created.
        JobPercentComplete:
          $ref: "#/components/schemas/__integer"
          description: "An estimate of how far your job has progressed. This estimate is shown as a percentage of the total time from when your job leaves its queue to when your output files appear in your output Amazon S3 bucket. AWS Elemental MediaConvert provides jobPercentComplete in CloudWatch STATUS_UPDATE events and in the response to GetJob and ListJobs requests. The jobPercentComplete estimate is reliable for the following input containers: Quicktime, Transport Stream, MP4, and MXF. For some jobs, the service can't provide information about job progress. In those cases, jobPercentComplete returns a null value."
        JobTemplate:
          $ref: "#/components/schemas/__string"
          description: The job template that the job is created from, if it is created from a job template.
        LastShareDetails:
          $ref: "#/components/schemas/__string"
          description: Contains information about the most recent share attempt for the job. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/creating-resource-share.html
        Messages:
          $ref: "#/components/schemas/JobMessages"
          description: Provides messages from the service about jobs that you have already successfully submitted.
        OutputGroupDetails:
          $ref: "#/components/schemas/__listOfOutputGroupDetail"
          description: List of output group details
        Priority:
          $ref: "#/components/schemas/__integerMinNegative50Max50"
          description: Relative priority on the job.
        Queue:
          $ref: "#/components/schemas/__string"
          description: When you create a job, you can specify a queue to send it to. If you don't specify, the job will go to the default queue. For more about queues, see the User Guide topic at https://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
        QueueTransitions:
          $ref: "#/components/schemas/__listOfQueueTransition"
          description: The job's queue hopping history.
        RetryCount:
          $ref: "#/components/schemas/__integer"
          description: The number of times that the service automatically attempted to process your job after encountering an error.
        Role:
          $ref: "#/components/schemas/__string"
          description: The IAM role you use for creating this job. For details about permissions, see the User Guide topic at the User Guide at https://docs.aws.amazon.com/mediaconvert/latest/ug/iam-role.html
        Settings:
          $ref: "#/components/schemas/JobSettings"
          description: JobSettings contains all the transcode settings for a job.
        ShareStatus:
          $ref: "#/components/schemas/ShareStatus"
          description: A job's share status can be NOT_SHARED, INITIATED, or SHARED
        SimulateReservedQueue:
          $ref: "#/components/schemas/SimulateReservedQueue"
          description: Enable this setting when you run a test job to estimate how many reserved transcoding slots (RTS) you need. When this is enabled, MediaConvert runs your job from an on-demand queue with similar performance to what you will see with one RTS in a reserved queue. This setting is disabled by default.
        Status:
          $ref: "#/components/schemas/JobStatus"
          description: A job's status can be SUBMITTED, PROGRESSING, COMPLETE, CANCELED, or ERROR.
        StatusUpdateInterval:
          $ref: "#/components/schemas/StatusUpdateInterval"
          description: Specify how often MediaConvert sends STATUS_UPDATE events to Amazon CloudWatch Events. Set the interval, in seconds, between status updates. MediaConvert sends an update at this interval from the time the service begins processing your job to the time it completes the transcode or encounters an error.
        Timing:
          $ref: "#/components/schemas/Timing"
          description: Information about when jobs are submitted, started, and finished is specified in Unix epoch format in seconds.
        UserMetadata:
          type: object
          properties: {}
          description: User-defined metadata that you want to associate with an MediaConvert job. You specify metadata in key/value pairs.
        Warnings:
          $ref: "#/components/schemas/__listOfWarningGroup"
          description: Contains any warning messages for the job. Use to help identify potential issues with your input, output, or job. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/warning_codes.html
      required:
        - Settings
        - Role
    AccelerationStatus:
      description: Describes whether the current job is running with accelerated transcoding. For jobs that have Acceleration (AccelerationMode) set to DISABLED, AccelerationStatus is always NOT_APPLICABLE. For jobs that have Acceleration (AccelerationMode) set to ENABLED or PREFERRED, AccelerationStatus is one of the other states. AccelerationStatus is IN_PROGRESS initially, while the service determines whether the input files and job settings are compatible with accelerated transcoding. If they are, AcclerationStatus is ACCELERATED. If your input files and job settings aren't compatible with accelerated transcoding, the service either fails your job or runs it without accelerated transcoding, depending on how you set Acceleration (AccelerationMode). When the service runs your job without accelerated transcoding, AccelerationStatus is NOT_ACCELERATED.
      type: string
      enum:
        - NOT_APPLICABLE
        - IN_PROGRESS
        - ACCELERATED
        - NOT_ACCELERATED
    __timestampUnix:
      type: string
      format: date-time
    JobPhase:
      description: A job's phase can be PROBING, TRANSCODING OR UPLOADING
      type: string
      enum:
        - PROBING
        - TRANSCODING
        - UPLOADING
    ElementalInferenceConfiguration:
      description: The Elemental Inference configuration used in this job.
      type: object
      properties:
        Features:
          $ref: "#/components/schemas/__listOfElementalInferenceFeature"
          description: A list of Elemental Inference features used in this job.
        Feeds:
          $ref: "#/components/schemas/__listOfElementalInferenceFeed"
          description: A list of Elemental Inference feeds used by this job.
    __listOfElementalInferenceFeature:
      type: array
      items:
        $ref: "#/components/schemas/ElementalInferenceFeature"
    ElementalInferenceFeature:
      description: Elemental Inference feature.
      type: string
      enum:
        - SMART_CROP
    __listOfElementalInferenceFeed:
      type: array
      items:
        $ref: "#/components/schemas/ElementalInferenceFeed"
    ElementalInferenceFeed:
      description: Elemental Inference Feed.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: Feed ARN.
        FeedManagementState:
          $ref: "#/components/schemas/ElementalInferenceFeedManagementState"
          description: Elemental Inference Feed management state.
    ElementalInferenceFeedManagementState:
      description: Elemental Inference Feed management state.
      type: string
      enum:
        - CREATED
        - ASSOCIATED
        - PENDING_DELETION
        - DELETED
    JobMessages:
      description: Provides messages from the service about jobs that you have already successfully submitted.
      type: object
      properties:
        Info:
          $ref: "#/components/schemas/__listOf__string"
          description: List of messages that are informational only and don't indicate a problem with your job.
        Warning:
          $ref: "#/components/schemas/__listOf__string"
          description: List of messages that warn about conditions that might cause your job not to run or to fail.
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    __listOfOutputGroupDetail:
      type: array
      items:
        $ref: "#/components/schemas/OutputGroupDetail"
    OutputGroupDetail:
      description: Contains details about the output groups specified in the job settings.
      type: object
      properties:
        OutputDetails:
          $ref: "#/components/schemas/__listOfOutputDetail"
          description: Details about the output
    __listOfOutputDetail:
      type: array
      items:
        $ref: "#/components/schemas/OutputDetail"
    OutputDetail:
      description: Details regarding output
      type: object
      properties:
        DurationInMs:
          $ref: "#/components/schemas/__integer"
          description: Duration in milliseconds
        VideoDetails:
          $ref: "#/components/schemas/VideoDetail"
          description: Contains details about the output's video stream
    VideoDetail:
      description: Contains details about the output's video stream
      type: object
      properties:
        HeightInPx:
          $ref: "#/components/schemas/__integer"
          description: Height in pixels for the output
        WidthInPx:
          $ref: "#/components/schemas/__integer"
          description: Width in pixels for the output
    __listOfQueueTransition:
      type: array
      items:
        $ref: "#/components/schemas/QueueTransition"
    QueueTransition:
      description: Description of the source and destination queues between which the job has moved, along with the timestamp of the move
      type: object
      properties:
        DestinationQueue:
          $ref: "#/components/schemas/__string"
          description: The queue that the job was on after the transition.
        SourceQueue:
          $ref: "#/components/schemas/__string"
          description: The queue that the job was on before the transition.
        Timestamp:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time, in Unix epoch format, that the job moved from the source queue to the destination queue.
    ShareStatus:
      type: string
      enum:
        - NOT_SHARED
        - INITIATED
        - SHARED
    JobStatus:
      description: A job's status can be SUBMITTED, PROGRESSING, COMPLETE, CANCELED, or ERROR.
      type: string
      enum:
        - SUBMITTED
        - PROGRESSING
        - COMPLETE
        - CANCELED
        - ERROR
    Timing:
      description: Information about when jobs are submitted, started, and finished is specified in Unix epoch format in seconds.
      type: object
      properties:
        FinishTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time, in Unix epoch format, that the transcoding job finished
        StartTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time, in Unix epoch format, that transcoding for the job began.
        SubmitTime:
          $ref: "#/components/schemas/__timestampUnix"
          description: The time, in Unix epoch format, that you submitted the job.
    __listOfWarningGroup:
      type: array
      items:
        $ref: "#/components/schemas/WarningGroup"
    WarningGroup:
      description: Contains any warning codes and their count for the job.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/__integer"
          description: Warning code that identifies a specific warning in the job. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/warning_codes.html
        Count:
          $ref: "#/components/schemas/__integer"
          description: The number of times this warning occurred in the job.
      required:
        - Count
        - Code
    JobTemplateSettings:
      description: JobTemplateSettings contains all the transcode settings saved in the template that will be applied to jobs created from it.
      type: object
      properties:
        AdAvailOffset:
          $ref: "#/components/schemas/__integerMinNegative1000Max1000"
          description: When specified, this offset (in milliseconds) is added to the input Ad Avail PTS time.
        AvailBlanking:
          $ref: "#/components/schemas/AvailBlanking"
          description: Settings for ad avail blanking. Video can be blanked or overlaid with an image, and audio muted during SCTE-35 triggered ad avails.
        ColorConversion3DLUTSettings:
          $ref: "#/components/schemas/__listOfColorConversion3DLUTSetting"
          description: "Use 3D LUTs to specify custom color mapping behavior when you convert from one color space into another. You can include up to 8 different 3D LUTs. For more information, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/3d-luts.html"
        Esam:
          $ref: "#/components/schemas/EsamSettings"
          description: Settings for Event Signaling And Messaging (ESAM). If you don't do ad insertion, you can ignore these settings.
        ExtendedDataServices:
          $ref: "#/components/schemas/ExtendedDataServices"
          description: If your source content has EIA-608 Line 21 Data Services, enable this feature to specify what MediaConvert does with the Extended Data Services (XDS) packets. You can choose to pass through XDS packets, or remove them from the output. For more information about XDS, see EIA-608 Line Data Services, section 9.5.1.5 05h Content Advisory.
        FollowSource:
          $ref: "#/components/schemas/__integerMin1Max150"
          description: Specify the input that MediaConvert references for your default output settings. MediaConvert uses this input's Resolution, Frame rate, and Pixel aspect ratio for all outputs that you don't manually specify different output settings for. Enabling this setting will disable "Follow source" for all other inputs. If MediaConvert cannot follow your source, for example if you specify an audio-only input, MediaConvert uses the first followable input instead. In your JSON job specification, enter an integer from 1 to 150 corresponding to the order of your inputs.
        Inputs:
          $ref: "#/components/schemas/__listOfInputTemplate"
          description: Use Inputs to define the source file used in the transcode job. There can only be one input in a job template. Using the API, you can include multiple inputs when referencing a job template.
        KantarWatermark:
          $ref: "#/components/schemas/KantarWatermarkSettings"
          description: Use these settings only when you use Kantar watermarking. Specify the values that MediaConvert uses to generate and place Kantar watermarks in your output audio. These settings apply to every output in your job. In addition to specifying these values, you also need to store your Kantar credentials in AWS Secrets Manager. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/kantar-watermarking.html.
        MotionImageInserter:
          $ref: "#/components/schemas/MotionImageInserter"
          description: Overlay motion graphics on top of your video. The motion graphics that you specify here appear on all outputs in all output groups. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/motion-graphic-overlay.html.
        NielsenConfiguration:
          $ref: "#/components/schemas/NielsenConfiguration"
          description: Settings for your Nielsen configuration. If you don't do Nielsen measurement and analytics, ignore these settings. When you enable Nielsen configuration, MediaConvert enables PCM to ID3 tagging for all outputs in the job.
        NielsenNonLinearWatermark:
          $ref: "#/components/schemas/NielsenNonLinearWatermarkSettings"
          description: "Ignore these settings unless you are using Nielsen non-linear watermarking. Specify the values that MediaConvert uses to generate and place Nielsen watermarks in your output audio. In addition to specifying these values, you also need to set up your cloud TIC server. These settings apply to every output in your job. The MediaConvert implementation is currently with the following Nielsen versions: Nielsen Watermark SDK Version 6.0.13 Nielsen NLM Watermark Engine Version 1.3.3 Nielsen Watermark Authenticator [SID_TIC] Version [7.0.0]"
        OutputGroups:
          $ref: "#/components/schemas/__listOfOutputGroup"
          description: Contains one group of settings for each set of outputs that share a common package type. All unpackaged files (MPEG-4, MPEG-2 TS, Quicktime, MXF, and no container) are grouped in a single output group as well. Required in is a group of settings that apply to the whole group. This required object depends on the value you set for Type. Type, settings object pairs are as follows. * FILE_GROUP_SETTINGS, FileGroupSettings * HLS_GROUP_SETTINGS, HlsGroupSettings * DASH_ISO_GROUP_SETTINGS, DashIsoGroupSettings * MS_SMOOTH_GROUP_SETTINGS, MsSmoothGroupSettings * CMAF_GROUP_SETTINGS, CmafGroupSettings
        TimecodeConfig:
          $ref: "#/components/schemas/TimecodeConfig"
          description: These settings control how the service handles timecodes throughout the job. These settings don't affect input clipping.
        TimedMetadataInsertion:
          $ref: "#/components/schemas/TimedMetadataInsertion"
          description: Insert user-defined custom ID3 metadata at timecodes that you specify. In each output that you want to include this metadata, you must set ID3 metadata to Passthrough.
    __listOfInputTemplate:
      type: array
      items:
        $ref: "#/components/schemas/InputTemplate"
    InputTemplate:
      description: Specified video input in a template.
      type: object
      properties:
        AdvancedInputFilter:
          $ref: "#/components/schemas/AdvancedInputFilter"
          description: "Use to remove noise, blocking, blurriness, or ringing from your input as a pre-filter step before encoding. The Advanced input filter removes more types of compression artifacts and is an improvement when compared to basic Deblock and Denoise filters. To remove video compression artifacts from your input and improve the video quality: Choose Enabled. Additionally, this filter can help increase the video quality of your output relative to its bitrate, since noisy inputs are more complex and require more bits to encode. To help restore loss of detail after applying the filter, you can optionally add texture or sharpening as an additional step. Jobs that use this feature incur pro-tier pricing. To not apply advanced input filtering: Choose Disabled. Note that you can still apply basic filtering with Deblock and Denoise."
        AdvancedInputFilterSettings:
          $ref: "#/components/schemas/AdvancedInputFilterSettings"
          description: Optional settings for Advanced input filter when you set Advanced input filter to Enabled.
        AudioSelectorGroups:
          type: object
          properties: {}
          description: Use audio selector groups to combine multiple sidecar audio inputs so that you can assign them to a single output audio tab. Note that, if you're working with embedded audio, it's simpler to assign multiple input tracks into a single audio selector rather than use an audio selector group.
        AudioSelectors:
          type: object
          properties: {}
          description: Use Audio selectors to specify a track or set of tracks from the input that you will use in your outputs. You can use multiple Audio selectors per input.
        CaptionSelectors:
          type: object
          properties: {}
          description: Use captions selectors to specify the captions data from your input that you use in your outputs. You can use up to 100 captions selectors per input.
        Crop:
          $ref: "#/components/schemas/Rectangle"
          description: Use Cropping selection to specify the video area that the service will include in the output video frame. If you specify a value here, it will override any value that you specify in the output setting Cropping selection.
        DeblockFilter:
          $ref: "#/components/schemas/InputDeblockFilter"
          description: Enable Deblock to produce smoother motion in the output. Default is disabled. Only manually controllable for MPEG2 and uncompressed video inputs.
        DenoiseFilter:
          $ref: "#/components/schemas/InputDenoiseFilter"
          description: Enable Denoise to filter noise from the input. Default is disabled. Only applicable to MPEG2, H.264, H.265, and uncompressed video inputs.
        DolbyVisionMetadataXml:
          $ref: "#/components/schemas/__stringMin14PatternS3XmlXMLHttpsXmlXML"
          description: Use this setting only when your video source has Dolby Vision studio mastering metadata that is carried in a separate XML file. Specify the Amazon S3 location for the metadata XML file. MediaConvert uses this file to provide global and frame-level metadata for Dolby Vision preprocessing. When you specify a file here and your input also has interleaved global and frame level metadata, MediaConvert ignores the interleaved metadata and uses only the the metadata from this external XML file. Note that your IAM service role must grant MediaConvert read permissions to this file. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/iam-role.html.
        DynamicAudioSelectors:
          type: object
          properties: {}
          description: Use Dynamic audio selectors when you do not know the track layout of your source when you submit your job, but want to select multiple audio tracks. When you include an audio track in your output and specify this Dynamic audio selector as the Audio source, MediaConvert creates an output audio track for each dynamically selected track. Note that when you include a Dynamic audio selector for two or more inputs, each input must have the same number of audio tracks and audio channels.
        FilterEnable:
          $ref: "#/components/schemas/InputFilterEnable"
          description: "Specify whether to apply input filtering to improve the video quality of your input. To apply filtering depending on your input type and quality: Choose Auto. To apply no filtering: Choose Disable. To apply filtering regardless of your input type and quality: Choose Force. When you do, you must also specify a value for Filter strength."
        FilterStrength:
          $ref: "#/components/schemas/__integerMin0Max5"
          description: "Specify the strength of the input filter. To apply an automatic amount of filtering based the compression artifacts measured in your input: We recommend that you leave Filter strength blank and set Filter enable to Auto. To manually apply filtering: Enter a value from 1 to 5, where 1 is the least amount of filtering and 5 is the most. The value that you enter applies to the strength of the Deblock or Denoise filters, or to the strength of the Advanced input filter."
        ImageInserter:
          $ref: "#/components/schemas/ImageInserter"
          description: Enable the image inserter feature to include a graphic overlay on your video. Enable or disable this feature for each input individually. This setting is disabled by default.
        InputClippings:
          $ref: "#/components/schemas/__listOfInputClipping"
          description: Contains sets of start and end times that together specify a portion of the input to be used in the outputs. If you provide only a start time, the clip will be the entire input from that point to the end. If you provide only an end time, it will be the entire input up to that point. When you specify more than one input clip, the transcoding service creates the job outputs by stringing the clips together in the order you specify them.
        InputScanType:
          $ref: "#/components/schemas/InputScanType"
          description: When you have a progressive segmented frame (PsF) input, use this setting to flag the input as PsF. MediaConvert doesn't automatically detect PsF. Therefore, flagging your input as PsF results in better preservation of video quality when you do deinterlacing and frame rate conversion. If you don't specify, the default value is Auto. Auto is the correct setting for all inputs that are not PsF. Don't set this value to PsF when your input is interlaced. Doing so creates horizontal interlacing artifacts.
        MultiViewSettings:
          $ref: "#/components/schemas/__listOfMultiViewSettings"
          description: Specify the enhancement layer input video file path for Multi View outputs. The base layer input is treated as the left eye and this Multi View input is treated as the right eye. Only one Multi View input is currently supported. MediaConvert encodes both views into a single MV-HEVC output codec. When you add MultiViewSettings to your job, you can only produce Multi View outputs. Adding any other codec output to the same job is not supported.
        Position:
          $ref: "#/components/schemas/Rectangle"
          description: Use Selection placement to define the video area in your output frame. The area outside of the rectangle that you specify here is black. If you specify a value here, it will override any value that you specify in the output setting Selection placement. If you specify a value here, this will override any AFD values in your input, even if you set Respond to AFD to Respond. If you specify a value here, this will ignore anything that you specify for the setting Scaling Behavior.
        ProgramNumber:
          $ref: "#/components/schemas/__integerMin1Max2147483647"
          description: Use Program to select a specific program from within a multi-program transport stream. Note that Quad 4K is not currently supported. Default is the first program within the transport stream. If the program you specify doesn't exist, the transcoding service will use this default.
        PsiControl:
          $ref: "#/components/schemas/InputPsiControl"
          description: Set PSI control for transport stream inputs to specify which data the demux process to scans. * Ignore PSI - Scan all PIDs for audio and video. * Use PSI - Scan only PSI data.
        TimecodeSource:
          $ref: "#/components/schemas/InputTimecodeSource"
          description: Use this Timecode source setting, located under the input settings, to specify how the service counts input video frames. This input frame count affects only the behavior of features that apply to a single input at a time, such as input clipping and synchronizing some captions formats. Choose Embedded to use the timecodes in your input video. Choose Start at zero to start the first frame at zero. Choose Specified start to start the first frame at the timecode that you specify in the setting Start timecode. If you don't specify a value for Timecode source, the service will use Embedded by default. For more information about timecodes, see https://docs.aws.amazon.com/console/mediaconvert/timecode.
        TimecodeStart:
          $ref: "#/components/schemas/__stringMin11Max11Pattern01D20305D205D"
          description: Specify the timecode that you want the service to use for this input's initial frame. To use this setting, you must set the Timecode source setting, located under the input settings, to Specified start. For more information about timecodes, see https://docs.aws.amazon.com/console/mediaconvert/timecode.
        VideoOverlays:
          $ref: "#/components/schemas/__listOfVideoOverlay"
          description: Contains an array of video overlays.
        VideoSelector:
          $ref: "#/components/schemas/VideoSelector"
          description: Input video selectors contain the video settings for the input. Each of your inputs can have up to one video selector.
    CreateJobTemplateResponse:
      type: object
      properties:
        JobTemplate:
          $ref: "#/components/schemas/JobTemplate"
          description: A job template is a pre-made set of encoding instructions that you can use to quickly create a job.
    JobTemplate:
      description: A job template is a pre-made set of encoding instructions that you can use to quickly create a job.
      type: object
      properties:
        AccelerationSettings:
          $ref: "#/components/schemas/AccelerationSettings"
          description: Accelerated transcoding can significantly speed up jobs with long, visually complex content.
        Arn:
          $ref: "#/components/schemas/__string"
          description: An identifier for this resource that is unique within all of AWS.
        Category:
          $ref: "#/components/schemas/__string"
          description: An optional category you create to organize your job templates.
        CreatedAt:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp in epoch seconds for Job template creation.
        Description:
          $ref: "#/components/schemas/__string"
          description: An optional description you create for each job template.
        HopDestinations:
          $ref: "#/components/schemas/__listOfHopDestination"
          description: Optional list of hop destinations.
        LastUpdated:
          $ref: "#/components/schemas/__timestampUnix"
          description: The timestamp in epoch seconds when the Job template was last updated.
        Name:
          $ref: "#/components/schemas/__string"
          description: A name you create for each job template. Each name must be unique within your account.
        Priority:
          $ref: "#/components/schemas/__integerMinNegative50Max50"
          description: Relative priority on the job.
        Queue:
          $ref: "#/components/schemas/__string"
          description: Optional. The queue that jobs created from this template are assigned to. If you don't specify this, jobs will go to the default queue.
        Settings:
          $ref: "#/components/schemas/JobTemplateSettings"
          description: JobTemplateSettings contains all the transcode settings saved in the template that will be applied to jobs created from it.
        StatusUpdateInterval:
          $ref: "#/components/schemas/StatusUpdateInterval"
          description: Specify how often MediaConvert sends STATUS_UPDATE events to Amazon CloudWatch Events. Set the interval, in seconds, between status updates. MediaConvert sends an update at this interval from the time the service begins processing your job to the time it completes the transcode or encounters an error.
        Type:
          $ref: "#/components/schemas/Type"
          description: "A job template can be of two types: system or custom. System or built-in job templates can't be modified or deleted by the user."
      required:
        - Settings
        - Name
    Type:
      type: string
      enum:
        - SYSTEM
        - CUSTOM
    PresetSettings:
      description: Settings for preset
      type: object
      properties:
        AudioDescriptions:
          $ref: "#/components/schemas/__listOfAudioDescription"
          description: Contains groups of audio encoding settings organized by audio codec. Include one instance of per output. Can contain multiple groups of encoding settings.
        CaptionDescriptions:
          $ref: "#/components/schemas/__listOfCaptionDescriptionPreset"
          description: This object holds groups of settings related to captions for one output. For each output that has captions, include one instance of CaptionDescriptions.
        ContainerSettings:
          $ref: "#/components/schemas/ContainerSettings"
          description: Container specific settings.
        VideoDescription:
          $ref: "#/components/schemas/VideoDescription"
          description: VideoDescription contains a group of video encoding settings. The specific video settings depend on the video codec that you choose for the property codec. Include one instance of VideoDescription per output.
    __listOfCaptionDescriptionPreset:
      type: array
      items:
        $ref: "#/components/schemas/CaptionDescriptionPreset"
    CaptionDescriptionPreset:
      description: Caption Description for preset
      type: object
      properties:
        CustomLanguageCode:
          $ref: "#/components/schemas/__stringPatternAZaZ23AZaZ"
          description: "Specify the language for this captions output track. For most captions output formats, the encoder puts this language information in the output captions metadata. If your output captions format is DVB-Sub or Burn in, the encoder uses this language information when automatically selecting the font script for rendering the captions text. For all outputs, you can use an ISO 639-2 or ISO 639-3 code. For streaming outputs, you can also use any other code in the full RFC-5646 specification. Streaming outputs are those that are in one of the following output groups: CMAF, DASH ISO, Apple HLS, or Microsoft Smooth Streaming."
        DestinationSettings:
          $ref: "#/components/schemas/CaptionDestinationSettings"
