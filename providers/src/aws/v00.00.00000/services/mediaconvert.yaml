        - AUTO
    CaptionDestinationType:
      description: Specify the format for this set of captions on this output. The default format is embedded without SCTE-20. Note that your choice of video output container constrains your choice of output captions format. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/captions-support-tables.html. If you are using SCTE-20 and you want to create an output that complies with the SCTE-43 spec, choose SCTE-20 plus embedded. To create a non-compliant output where the embedded captions come first, choose Embedded plus SCTE-20.
      type: string
      enum:
        - BURN_IN
        - DVB_SUB
        - EMBEDDED
        - EMBEDDED_PLUS_SCTE20
        - IMSC
        - SCTE20_PLUS_EMBEDDED
        - SCC
        - SRT
        - SMI
        - TELETEXT
        - TTML
        - WEBVTT
    DvbSubDestinationSettings:
      description: Settings related to DVB-Sub captions. Set up DVB-Sub captions in the same output as your video. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/dvb-sub-output-captions.html.
      type: object
      properties:
