        ApplyFontColor:
          $ref: "#/components/schemas/BurninSubtitleApplyFontColor"
          description: Ignore this setting unless Style passthrough is set to Enabled and Font color set to Black, Yellow, Red, Green, Blue, or Hex. Use Apply font color for additional font color controls. When you choose White text only, or leave blank, your font color setting only applies to white text in your input captions. For example, if your font color setting is Yellow, and your input captions have red and white text, your output captions will have red and yellow text. When you choose ALL_TEXT, your font color setting applies to all of your output captions text.
        BackgroundColor:
          $ref: "#/components/schemas/BurninSubtitleBackgroundColor"
          description: Specify the color of the rectangle behind the captions. Leave background color blank and set Style passthrough to enabled to use the background color data from your input captions, if present.
        BackgroundOpacity:
          $ref: "#/components/schemas/__integerMin0Max255"
          description: Specify the opacity of the background rectangle. Enter a value from 0 to 255, where 0 is transparent and 255 is opaque. If Style passthrough is set to enabled, leave blank to pass through the background style information in your input captions to your output captions. If Style passthrough is set to disabled, leave blank to use a value of 0 and remove all backgrounds from your output captions.
        FallbackFont:
          $ref: "#/components/schemas/BurninSubtitleFallbackFont"
          description: Specify the font that you want the service to use for your burn in captions when your input captions specify a font that MediaConvert doesn't support. When you set Fallback font to best match, or leave blank, MediaConvert uses a supported font that most closely matches the font that your input captions specify. When there are multiple unsupported fonts in your input captions, MediaConvert matches each font with the supported font that matches best. When you explicitly choose a replacement font, MediaConvert uses that font to replace all unsupported fonts from your input.
        FontColor:
          $ref: "#/components/schemas/BurninSubtitleFontColor"
          description: Specify the color of the burned-in captions text. Leave Font color blank and set Style passthrough to enabled to use the font color data from your input captions, if present.
        FontFileBold:
          $ref: "#/components/schemas/__stringPatternS3TtfHttpsTtf"
          description: Specify a bold TrueType font file to use when rendering your output captions. Enter an S3, HTTP, or HTTPS URL. When you do, you must also separately specify a regular, an italic, and a bold italic font file.
        FontFileBoldItalic:
          $ref: "#/components/schemas/__string"
          description: Specify a bold italic TrueType font file to use when rendering your output captions. Enter an S3, HTTP, or HTTPS URL. When you do, you must also separately specify a regular, a bold, and an italic font file.
        FontFileItalic:
          $ref: "#/components/schemas/__stringPatternS3TtfHttpsTtf"
          description: Specify an italic TrueType font file to use when rendering your output captions. Enter an S3, HTTP, or HTTPS URL. When you do, you must also separately specify a regular, a bold, and a bold italic font file.
        FontFileRegular:
          $ref: "#/components/schemas/__stringPatternS3TtfHttpsTtf"
          description: Specify a regular TrueType font file to use when rendering your output captions. Enter an S3, HTTP, or HTTPS URL. When you do, you must also separately specify a bold, an italic, and a bold italic font file.
        FontOpacity:
          $ref: "#/components/schemas/__integerMin0Max255"
          description: Specify the opacity of the burned-in captions. 255 is opaque; 0 is transparent.
        FontResolution:
          $ref: "#/components/schemas/__integerMin96Max600"
          description: Specify the Font resolution in DPI (dots per inch).
        FontScript:
          $ref: "#/components/schemas/FontScript"
          description: Set Font script to Automatically determined, or leave blank, to automatically determine the font script in your input captions. Otherwise, set to Simplified Chinese (HANS) or Traditional Chinese (HANT) if your input font script uses Simplified or Traditional Chinese.
        FontSize:
          $ref: "#/components/schemas/__integerMin0Max96"
          description: Specify the Font size in pixels. Must be a positive integer. Set to 0, or leave blank, for automatic font size.
        HexFontColor:
          $ref: "#/components/schemas/__stringMin6Max8Pattern09aFAF609aFAF2"
          description: Ignore this setting unless your Font color is set to Hex. Enter either six or eight hexidecimal digits, representing red, green, and blue, with two optional extra digits for alpha. For example a value of 1122AABB is a red value of 0x11, a green value of 0x22, a blue value of 0xAA, and an alpha value of 0xBB.
        OutlineColor:
          $ref: "#/components/schemas/BurninSubtitleOutlineColor"
          description: Specify font outline color. Leave Outline color blank and set Style passthrough to enabled to use the font outline color data from your input captions, if present.
        OutlineSize:
          $ref: "#/components/schemas/__integerMin0Max10"
          description: Specify the Outline size of the caption text, in pixels. Leave Outline size blank and set Style passthrough to enabled to use the outline size data from your input captions, if present.
        RemoveRubyReserveAttributes:
          $ref: "#/components/schemas/RemoveRubyReserveAttributes"
          description: "Optionally remove any tts:rubyReserve attributes present in your input, that do not have a tts:ruby attribute in the same element, from your output. Use if your vertical Japanese output captions have alignment issues. To remove ruby reserve attributes when present: Choose Enabled. To not remove any ruby reserve attributes: Keep the default value, Disabled."
        ShadowColor:
          $ref: "#/components/schemas/BurninSubtitleShadowColor"
          description: Specify the color of the shadow cast by the captions. Leave Shadow color blank and set Style passthrough to enabled to use the shadow color data from your input captions, if present.
        ShadowOpacity:
          $ref: "#/components/schemas/__integerMin0Max255"
          description: Specify the opacity of the shadow. Enter a value from 0 to 255, where 0 is transparent and 255 is opaque. If Style passthrough is set to Enabled, leave Shadow opacity blank to pass through the shadow style information in your input captions to your output captions. If Style passthrough is set to disabled, leave blank to use a value of 0 and remove all shadows from your output captions.
        ShadowXOffset:
          $ref: "#/components/schemas/__integerMinNegative2147483648Max2147483647"
          description: Specify the horizontal offset of the shadow, relative to the captions in pixels. A value of -2 would result in a shadow offset 2 pixels to the left.
        ShadowYOffset:
          $ref: "#/components/schemas/__integerMinNegative2147483648Max2147483647"
          description: Specify the vertical offset of the shadow relative to the captions in pixels. A value of -2 would result in a shadow offset 2 pixels above the text. Leave Shadow y-offset blank and set Style passthrough to enabled to use the shadow y-offset data from your input captions, if present.
        StylePassthrough:
          $ref: "#/components/schemas/BurnInSubtitleStylePassthrough"
          description: "To use the available style, color, and position information from your input captions: Set Style passthrough to Enabled. Note that MediaConvert uses default settings for any missing style or position information in your input captions To ignore the style and position information from your input captions and use default settings: Leave blank or keep the default value, Disabled. Default settings include white text with black outlining, bottom-center positioning, and automatic sizing. Whether you set Style passthrough to enabled or not, you can also choose to manually override any of the individual style and position settings. You can also override any fonts by manually specifying custom font files."
        TeletextSpacing:
          $ref: "#/components/schemas/BurninSubtitleTeletextSpacing"
          description: Specify whether the text spacing in your captions is set by the captions grid, or varies depending on letter width. Choose fixed grid to conform to the spacing specified in the captions file more accurately. Choose proportional to make the text easier to read for closed captions.
        XPosition:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the horizontal position of the captions, relative to the left side of the output in pixels. A value of 10 would result in the captions starting 10 pixels from the left of the output. If no explicit x_position is provided, the horizontal caption position will be determined by the alignment parameter.
        YPosition:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the vertical position of the captions, relative to the top of the output in pixels. A value of 10 would result in the captions starting 10 pixels from the top of the output. If no explicit y_position is provided, the caption will be positioned towards the bottom of the output.
    BurninSubtitleAlignment:
      description: Specify the alignment of your captions. If no explicit x_position is provided, setting alignment to centered will placethe captions at the bottom center of the output. Similarly, setting a left alignment willalign captions to the bottom left of the output. If x and y positions are given in conjunction with the alignment parameter, the font will be justified (either left or centered) relative to those coordinates.
      type: string
      enum:
        - CENTERED
        - LEFT
        - AUTO
    BurninSubtitleApplyFontColor:
      description: Ignore this setting unless Style passthrough is set to Enabled and Font color set to Black, Yellow, Red, Green, Blue, or Hex. Use Apply font color for additional font color controls. When you choose White text only, or leave blank, your font color setting only applies to white text in your input captions. For example, if your font color setting is Yellow, and your input captions have red and white text, your output captions will have red and yellow text. When you choose ALL_TEXT, your font color setting applies to all of your output captions text.
