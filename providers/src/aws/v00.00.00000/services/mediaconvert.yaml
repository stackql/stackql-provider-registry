        SrtDestinationSettings:
          $ref: "#/components/schemas/SrtDestinationSettings"
          description: Settings related to SRT captions. SRT is a sidecar format that holds captions in a file that is separate from the video container. Set up sidecar captions in the same output group, but different output from your video.
        TeletextDestinationSettings:
          $ref: "#/components/schemas/TeletextDestinationSettings"
          description: Settings related to teletext captions. Set up teletext captions in the same output as your video. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/teletext-output-captions.html.
        TtmlDestinationSettings:
          $ref: "#/components/schemas/TtmlDestinationSettings"
          description: Settings related to TTML captions. TTML is a sidecar format that holds captions in a file that is separate from the video container. Set up sidecar captions in the same output group, but different output from your video. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/ttml-and-webvtt-output-captions.html.
        WebvttDestinationSettings:
          $ref: "#/components/schemas/WebvttDestinationSettings"
