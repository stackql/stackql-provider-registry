    MotionImageInserter:
      description: Overlay motion graphics on top of your video. The motion graphics that you specify here appear on all outputs in all output groups. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/motion-graphic-overlay.html.
      type: object
      properties:
        Framerate:
          $ref: "#/components/schemas/MotionImageInsertionFramerate"
          description: If your motion graphic asset is a .mov file, keep this setting unspecified. If your motion graphic asset is a series of .png files, specify the frame rate of the overlay in frames per second, as a fraction. For example, specify 24 fps as 24/1. Make sure that the number of images in your series matches the frame rate and your intended overlay duration. For example, if you want a 30-second overlay at 30 fps, you should have 900 .png images. This overlay frame rate doesn't need to match the frame rate of the underlying video.
        Input:
          $ref: "#/components/schemas/__stringMin14PatternS3Mov09PngHttpsMov09Png"
          description: Specify the .mov file or series of .png files that you want to overlay on your video. For .png files, provide the file name of the first file in the series. Make sure that the names of the .png files end with sequential numbers that specify the order that they are played in. For example, overlay_000.png, overlay_001.png, overlay_002.png, and so on. The sequence must start at zero, and each image file name must have the same number of digits. Pad your initial file names with enough zeros to complete the sequence. For example, if the first image is overlay_0.png, there can be only 10 images in the sequence, with the last image being overlay_9.png. But if the first image is overlay_00.png, there can be 100 images in the sequence.
        InsertionMode:
          $ref: "#/components/schemas/MotionImageInsertionMode"
          description: Choose the type of motion graphic asset that you are providing for your overlay. You can choose either a .mov file or a series of .png files.
        Offset:
          $ref: "#/components/schemas/MotionImageInsertionOffset"
          description: Use Offset to specify the placement of your motion graphic overlay on the video frame. Specify in pixels, from the upper-left corner of the frame. If you don't specify an offset, the service scales your overlay to the full size of the frame. Otherwise, the service inserts the overlay at its native resolution and scales the size up or down with any video scaling.
        Playback:
          $ref: "#/components/schemas/MotionImagePlayback"
          description: Specify whether your motion graphic overlay repeats on a loop or plays only once.
        StartTime:
          $ref: "#/components/schemas/__stringMin11Max11Pattern01D20305D205D"
          description: Specify when the motion overlay begins. Use timecode format (HH:MM:SS:FF or HH:MM:SS;FF). Make sure that the timecode you provide here takes into account how you have set up your timecode configuration under both job settings and input settings. The simplest way to do that is to set both to start at 0. If you need to set up your job to follow timecodes embedded in your source that don't start at zero, make sure that you specify a start time that is after the first embedded timecode. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/setting-up-timecode.html
    MotionImageInsertionFramerate:
      description: For motion overlays that don't have a built-in frame rate, specify the frame rate of the overlay in frames per second, as a fraction. For example, specify 24 fps as 24/1. The overlay frame rate doesn't need to match the frame rate of the underlying video.
      type: object
      properties:
        FramerateDenominator:
          $ref: "#/components/schemas/__integerMin1Max17895697"
          description: The bottom of the fraction that expresses your overlay frame rate. For example, if your frame rate is 24 fps, set this value to 1.
        FramerateNumerator:
          $ref: "#/components/schemas/__integerMin1Max2147483640"
          description: The top of the fraction that expresses your overlay frame rate. For example, if your frame rate is 24 fps, set this value to 24.
    __integerMin1Max17895697:
      type: integer
      minimum: 1
      maximum: 17895697
    __integerMin1Max2147483640:
      type: integer
      minimum: 1
      maximum: 2147483640
    __stringMin14PatternS3Mov09PngHttpsMov09Png:
      type: string
      minLength: 14
      pattern: ^((s3://(.*)(\.mov|[0-9]+\.png))|(https?://(.*)(\.mov|[0-9]+\.png)(\?([^&=]+=[^&]+&)*[^&=]+=[^&]+)?))$
    MotionImageInsertionMode:
      description: Choose the type of motion graphic asset that you are providing for your overlay. You can choose either a .mov file or a series of .png files.
      type: string
      enum:
        - MOV
        - PNG
    MotionImageInsertionOffset:
      description: Specify the offset between the upper-left corner of the video frame and the top left corner of the overlay.
      type: object
      properties:
        ImageX:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Set the distance, in pixels, between the overlay and the left edge of the video frame.
        ImageY:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Set the distance, in pixels, between the overlay and the top edge of the video frame.
    MotionImagePlayback:
      description: Specify whether your motion graphic overlay repeats on a loop or plays only once.
      type: string
      enum:
        - ONCE
        - REPEAT
    NielsenConfiguration:
      description: Settings for your Nielsen configuration. If you don't do Nielsen measurement and analytics, ignore these settings. When you enable Nielsen configuration, MediaConvert enables PCM to ID3 tagging for all outputs in the job.
      type: object
      properties:
        BreakoutCode:
          $ref: "#/components/schemas/__integerMin0Max0"
          description: Nielsen has discontinued the use of breakout code functionality. If you must include this property, set the value to zero.
        DistributorId:
          $ref: "#/components/schemas/__string"
          description: Use Distributor ID to specify the distributor ID that is assigned to your organization by Nielsen.
    __integerMin0Max0:
      type: integer
      minimum: 0
      maximum: 0
    NielsenNonLinearWatermarkSettings:
      description: "Ignore these settings unless you are using Nielsen non-linear watermarking. Specify the values that MediaConvert uses to generate and place Nielsen watermarks in your output audio. In addition to specifying these values, you also need to set up your cloud TIC server. These settings apply to every output in your job. The MediaConvert implementation is currently with the following Nielsen versions: Nielsen Watermark SDK Version 6.0.13 Nielsen NLM Watermark Engine Version 1.3.3 Nielsen Watermark Authenticator [SID_TIC] Version [7.0.0]"
      type: object
      properties:
        ActiveWatermarkProcess:
          $ref: "#/components/schemas/NielsenActiveWatermarkProcessType"
          description: Choose the type of Nielsen watermarks that you want in your outputs. When you choose NAES 2 and NW, you must provide a value for the setting SID. When you choose CBET, you must provide a value for the setting CSID. When you choose NAES 2, NW, and CBET, you must provide values for both of these settings.
        AdiFilename:
          $ref: "#/components/schemas/__stringPatternS3"
          description: "Optional. Use this setting when you want the service to include an ADI file in the Nielsen metadata .zip file. To provide an ADI file, store it in Amazon S3 and provide a URL to it here. The URL should be in the following format: S3://bucket/path/ADI-file. For more information about the metadata .zip file, see the setting Metadata destination."
        AssetId:
          $ref: "#/components/schemas/__stringMin1Max20"
          description: Use the asset ID that you provide to Nielsen to uniquely identify this asset. Required for all Nielsen non-linear watermarking.
        AssetName:
          $ref: "#/components/schemas/__stringMin1Max50"
          description: Use the asset name that you provide to Nielsen for this asset. Required for all Nielsen non-linear watermarking.
        CbetSourceId:
          $ref: "#/components/schemas/__stringPattern0xAFaF0908190908"
          description: Use the CSID that Nielsen provides to you. This CBET source ID should be unique to your Nielsen account but common to all of your output assets that have CBET watermarking. Required when you choose a value for the setting Watermark types that includes CBET.
        EpisodeId:
          $ref: "#/components/schemas/__stringMin1Max20"
          description: Optional. If this asset uses an episode ID with Nielsen, provide it here.
        MetadataDestination:
          $ref: "#/components/schemas/__stringPatternS3"
          description: Specify the Amazon S3 location where you want MediaConvert to save your Nielsen non-linear metadata .zip file. This Amazon S3 bucket must be in the same Region as the one where you do your MediaConvert transcoding. If you want to include an ADI file in this .zip file, use the setting ADI file to specify it. MediaConvert delivers the Nielsen metadata .zip files only to your metadata destination Amazon S3 bucket. It doesn't deliver the .zip files to Nielsen. You are responsible for delivering the metadata .zip files to Nielsen.
        SourceId:
          $ref: "#/components/schemas/__integerMin0Max65534"
          description: Use the SID that Nielsen provides to you. This source ID should be unique to your Nielsen account but common to all of your output assets. Required for all Nielsen non-linear watermarking. This ID should be unique to your Nielsen account but common to all of your output assets. Required for all Nielsen non-linear watermarking.
        SourceWatermarkStatus:
          $ref: "#/components/schemas/NielsenSourceWatermarkStatusType"
          description: Required. Specify whether your source content already contains Nielsen non-linear watermarks. When you set this value to Watermarked, the service fails the job. Nielsen requires that you add non-linear watermarking to only clean content that doesn't already have non-linear Nielsen watermarks.
        TicServerUrl:
          $ref: "#/components/schemas/__stringPatternHttps"
          description: Specify the endpoint for the TIC server that you have deployed and configured in the AWS Cloud. Required for all Nielsen non-linear watermarking. MediaConvert can't connect directly to a TIC server. Instead, you must use API Gateway to provide a RESTful interface between MediaConvert and a TIC server that you deploy in your AWS account. For more information on deploying a TIC server in your AWS account and the required API Gateway, contact Nielsen support.
        UniqueTicPerAudioTrack:
          $ref: "#/components/schemas/NielsenUniqueTicPerAudioTrackType"
          description: To create assets that have the same TIC values in each audio track, keep the default value Share TICs. To create assets that have unique TIC values for each audio track, choose Use unique TICs.
    NielsenActiveWatermarkProcessType:
      description: Choose the type of Nielsen watermarks that you want in your outputs. When you choose NAES 2 and NW, you must provide a value for the setting SID. When you choose CBET, you must provide a value for the setting CSID. When you choose NAES 2, NW, and CBET, you must provide values for both of these settings.
      type: string
      enum:
        - NAES2_AND_NW
        - CBET
        - NAES2_AND_NW_AND_CBET
    __stringPattern0xAFaF0908190908:
      type: string
      pattern: (^0x[A-Fa-f0-9]{0,8}$|^[1-9][0-9]{0,8}$)
    __integerMin0Max65534:
      type: integer
      minimum: 0
      maximum: 65534
    NielsenSourceWatermarkStatusType:
      description: Required. Specify whether your source content already contains Nielsen non-linear watermarks. When you set this value to Watermarked, the service fails the job. Nielsen requires that you add non-linear watermarking to only clean content that doesn't already have non-linear Nielsen watermarks.
      type: string
      enum:
        - CLEAN
        - WATERMARKED
    __stringPatternHttps:
      type: string
      pattern: ^https:\/\/.*$
    NielsenUniqueTicPerAudioTrackType:
      description: To create assets that have the same TIC values in each audio track, keep the default value Share TICs. To create assets that have unique TIC values for each audio track, choose Use unique TICs.
      type: string
      enum:
        - RESERVE_UNIQUE_TICS_PER_TRACK
        - SAME_TICS_PER_TRACK
    __listOfOutputGroup:
      type: array
      items:
        $ref: "#/components/schemas/OutputGroup"
    OutputGroup:
      description: Group of outputs
      type: object
      properties:
        AutomatedEncodingSettings:
          $ref: "#/components/schemas/AutomatedEncodingSettings"
          description: Use automated encoding to have MediaConvert choose your encoding settings for you, based on characteristics of your input video.
        CustomName:
          $ref: "#/components/schemas/__string"
          description: Use Custom Group Name to specify a name for the output group. This value is displayed on the console and can make your job settings JSON more human-readable. It does not affect your outputs. Use up to twelve characters that are either letters, numbers, spaces, or underscores.
        Name:
          $ref: "#/components/schemas/__stringMax2048"
          description: Name of the output group
        OutputGroupSettings:
          $ref: "#/components/schemas/OutputGroupSettings"
          description: Output Group settings, including type
        Outputs:
          $ref: "#/components/schemas/__listOfOutput"
          description: This object holds groups of encoding settings, one group of settings per output.
    AutomatedEncodingSettings:
      description: Use automated encoding to have MediaConvert choose your encoding settings for you, based on characteristics of your input video.
      type: object
      properties:
        AbrSettings:
          $ref: "#/components/schemas/AutomatedAbrSettings"
          description: Use automated ABR to have MediaConvert set up the renditions in your ABR package for you automatically, based on characteristics of your input video. This feature optimizes video quality while minimizing the overall size of your ABR package.
    AutomatedAbrSettings:
      description: Use automated ABR to have MediaConvert set up the renditions in your ABR package for you automatically, based on characteristics of your input video. This feature optimizes video quality while minimizing the overall size of your ABR package.
      type: object
      properties:
        MaxAbrBitrate:
          $ref: "#/components/schemas/__integerMin100000Max100000000"
          description: Specify the maximum average bitrate for MediaConvert to use in your automated ABR stack. If you don't specify a value, MediaConvert uses 8,000,000 (8 mb/s) by default. The average bitrate of your highest-quality rendition will be equal to or below this value, depending on the quality, complexity, and resolution of your content. Note that the instantaneous maximum bitrate may vary above the value that you specify.
        MaxQualityLevel:
          $ref: "#/components/schemas/__doubleMin1Max10"
          description: "Optional. Specify the QVBR quality level to use for all renditions in your automated ABR stack. To have MediaConvert automatically determine the quality level: Leave blank. To manually specify a quality level: Enter a value from 1 to 10. MediaConvert will use a quality level up to the value that you specify, depending on your source. For more information about QVBR quality levels, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/qvbr-guidelines.html"
        MaxRenditions:
          $ref: "#/components/schemas/__integerMin3Max15"
          description: Optional. The maximum number of renditions that MediaConvert will create in your automated ABR stack. The number of renditions is determined automatically, based on analysis of each job, but will never exceed this limit. When you set this to Auto in the console, which is equivalent to excluding it from your JSON job specification, MediaConvert defaults to a limit of 15.
        MinAbrBitrate:
          $ref: "#/components/schemas/__integerMin100000Max100000000"
          description: Specify the minimum average bitrate for MediaConvert to use in your automated ABR stack. If you don't specify a value, MediaConvert uses 600,000 (600 kb/s) by default. The average bitrate of your lowest-quality rendition will be near this value. Note that the instantaneous minimum bitrate may vary below the value that you specify.
        Rules:
          $ref: "#/components/schemas/__listOfAutomatedAbrRule"
          description: Optional. Use Automated ABR rules to specify restrictions for the rendition sizes MediaConvert will create in your ABR stack. You can use these rules if your ABR workflow has specific rendition size requirements, but you still want MediaConvert to optimize for video quality and overall file size.
    __integerMin100000Max100000000:
      type: integer
      minimum: 100000
      maximum: 100000000
    __doubleMin1Max10:
      type: number
      format: double
    __integerMin3Max15:
      type: integer
      minimum: 3
      maximum: 15
    __listOfAutomatedAbrRule:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedAbrRule"
    AutomatedAbrRule:
      description: "Specify one or more Automated ABR rule types. Note: Force include and Allowed renditions are mutually exclusive."
      type: object
      properties:
        AllowedRenditions:
          $ref: "#/components/schemas/__listOfAllowedRenditionSize"
          description: When customer adds the allowed renditions rule for auto ABR ladder, they are required to add at leat one rendition to allowedRenditions list
        ForceIncludeRenditions:
          $ref: "#/components/schemas/__listOfForceIncludeRenditionSize"
          description: When customer adds the force include renditions rule for auto ABR ladder, they are required to add at leat one rendition to forceIncludeRenditions list
        MinBottomRenditionSize:
          $ref: "#/components/schemas/MinBottomRenditionSize"
          description: "Use Min bottom rendition size to specify a minimum size for the lowest resolution in your ABR stack. * The lowest resolution in your ABR stack will be equal to or greater than the value that you enter. For example: If you specify 640x360 the lowest resolution in your ABR stack will be equal to or greater than to 640x360. * If you specify a Min top rendition size rule, the value that you specify for Min bottom rendition size must be less than, or equal to, Min top rendition size."
        MinTopRenditionSize:
          $ref: "#/components/schemas/MinTopRenditionSize"
          description: "Use Min top rendition size to specify a minimum size for the highest resolution in your ABR stack. * The highest resolution in your ABR stack will be equal to or greater than the value that you enter. For example: If you specify 1280x720 the highest resolution in your ABR stack will be equal to or greater than 1280x720. * If you specify a value for Max resolution, the value that you specify for Min top rendition size must be less than, or equal to, Max resolution."
        Type:
          $ref: "#/components/schemas/RuleType"
          description: "Use Min top rendition size to specify a minimum size for the highest resolution in your ABR stack. * The highest resolution in your ABR stack will be equal to or greater than the value that you enter. For example: If you specify 1280x720 the highest resolution in your ABR stack will be equal to or greater than 1280x720. * If you specify a value for Max resolution, the value that you specify for Min top rendition size must be less than, or equal to, Max resolution. Use Min bottom rendition size to specify a minimum size for the lowest resolution in your ABR stack. * The lowest resolution in your ABR stack will be equal to or greater than the value that you enter. For example: If you specify 640x360 the lowest resolution in your ABR stack will be equal to or greater than to 640x360. * If you specify a Min top rendition size rule, the value that you specify for Min bottom rendition size must be less than, or equal to, Min top rendition size. Use Force include renditions to specify one or more resolutions to include your ABR stack. * (Recommended) To optimize automated ABR, specify as few resolutions as possible. * (Required) The number of resolutions that you specify must be equal to, or less than, the Max renditions setting. * If you specify a Min top rendition size rule, specify at least one resolution that is equal to, or greater than, Min top rendition size. * If you specify a Min bottom rendition size rule, only specify resolutions that are equal to, or greater than, Min bottom rendition size. * If you specify a Force include renditions rule, do not specify a separate rule for Allowed renditions. * Note: The ABR stack may include other resolutions that you do not specify here, depending on the Max renditions setting. Use Allowed renditions to specify a list of possible resolutions in your ABR stack. * (Required) The number of resolutions that you specify must be equal to, or greater than, the Max renditions setting. * MediaConvert will create an ABR stack exclusively from the list of resolutions that you specify. * Some resolutions in the Allowed renditions list may not be included, however you can force a resolution to be included by setting Required to ENABLED. * You must specify at least one resolution that is greater than or equal to any resolutions that you specify in Min top rendition size or Min bottom rendition size. * If you specify Allowed renditions, you must not specify a separate rule for Force include renditions."
    __listOfAllowedRenditionSize:
      type: array
      items:
        $ref: "#/components/schemas/AllowedRenditionSize"
    AllowedRenditionSize:
      description: Use Allowed renditions to specify a list of possible resolutions in your ABR stack. * MediaConvert will create an ABR stack exclusively from the list of resolutions that you specify. * Some resolutions in the Allowed renditions list may not be included, however you can force a resolution to be included by setting Required to ENABLED. * You must specify at least one resolution that is greater than or equal to any resolutions that you specify in Min top rendition size or Min bottom rendition size. * If you specify Allowed renditions, you must not specify a separate rule for Force include renditions.
      type: object
      properties:
        Height:
          $ref: "#/components/schemas/__integerMin32Max8192"
          description: Use Height to define the video resolution height, in pixels, for this rule.
        Required:
