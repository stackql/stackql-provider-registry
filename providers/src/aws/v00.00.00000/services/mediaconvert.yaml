    HlsCaptionLanguageSetting:
      description: "Applies only to 608 Embedded output captions. Insert: Include CLOSED-CAPTIONS lines in the manifest. Specify at least one language in the CC1 Language Code field. One CLOSED-CAPTION line is added for each Language Code you specify. Make sure to specify the languages in the order in which they appear in the original source (if the source is embedded format) or the order of the caption selectors (if the source is other than embedded). Otherwise, languages in the manifest will not match up properly with the output captions. None: Include CLOSED-CAPTIONS=NONE line in the manifest. Omit: Omit any CLOSED-CAPTIONS line from the manifest."
      type: string
      enum:
        - INSERT
        - OMIT
        - NONE
    HlsCaptionSegmentLengthControl:
      description: Set Caption segment length control to Match video to create caption segments that align with the video segments from the first video output in this output group. For example, if the video segments are 2 seconds long, your WebVTT segments will also be 2 seconds long. Keep the default setting, Large segments to create caption segments that are 300 seconds long.
      type: string
      enum:
        - LARGE_SEGMENTS
        - MATCH_VIDEO
    HlsClientCache:
      description: "Disable this setting only when your workflow requires the #EXT-X-ALLOW-CACHE:no tag. Otherwise, keep the default value Enabled and control caching in your video distribution set up. For example, use the Cache-Control http header."
      type: string
      enum:
        - DISABLED
        - ENABLED
    HlsCodecSpecification:
      description: Specification to use (RFC-6381 or the default RFC-4281) during m3u8 playlist generation.
      type: string
      enum:
        - RFC_6381
        - RFC_4281
    HlsDirectoryStructure:
      description: Indicates whether segments should be placed in subdirectories.
      type: string
      enum:
        - SINGLE_DIRECTORY
        - SUBDIRECTORY_PER_STREAM
    HlsEncryptionSettings:
      description: Settings for HLS encryption
      type: object
      properties:
        ConstantInitializationVector:
          $ref: "#/components/schemas/__stringMin32Max32Pattern09aFAF32"
          description: This is a 128-bit, 16-byte hex value represented by a 32-character text string. If this parameter is not set then the Initialization Vector will follow the segment number by default.
        EncryptionMethod:
          $ref: "#/components/schemas/HlsEncryptionType"
          description: Encrypts the segments with the given encryption scheme. Leave blank to disable. Selecting 'Disabled' in the web interface also disables encryption.
        InitializationVectorInManifest:
          $ref: "#/components/schemas/HlsInitializationVectorInManifest"
          description: The Initialization Vector is a 128-bit number used in conjunction with the key for encrypting blocks. If set to INCLUDE, Initialization Vector is listed in the manifest. Otherwise Initialization Vector is not in the manifest.
        OfflineEncrypted:
          $ref: "#/components/schemas/HlsOfflineEncrypted"
          description: Enable this setting to insert the EXT-X-SESSION-KEY element into the master playlist. This allows for offline Apple HLS FairPlay content protection.
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
          description: If your output group type is HLS, DASH, or Microsoft Smooth, use these settings when doing DRM encryption with a SPEKE-compliant key provider. If your output group type is CMAF, use the SpekeKeyProviderCmaf settings instead.
        StaticKeyProvider:
          $ref: "#/components/schemas/StaticKeyProvider"
          description: Use these settings to set up encryption with a static key provider.
        Type:
          $ref: "#/components/schemas/HlsKeyProviderType"
          description: Specify whether your DRM encryption key is static or from a key provider that follows the SPEKE standard. For more information about SPEKE, see https://docs.aws.amazon.com/speke/latest/documentation/what-is-speke.html.
    HlsEncryptionType:
      description: Encrypts the segments with the given encryption scheme. Leave blank to disable. Selecting 'Disabled' in the web interface also disables encryption.
      type: string
      enum:
        - AES128
        - SAMPLE_AES
    HlsInitializationVectorInManifest:
      description: The Initialization Vector is a 128-bit number used in conjunction with the key for encrypting blocks. If set to INCLUDE, Initialization Vector is listed in the manifest. Otherwise Initialization Vector is not in the manifest.
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    HlsOfflineEncrypted:
      description: Enable this setting to insert the EXT-X-SESSION-KEY element into the master playlist. This allows for offline Apple HLS FairPlay content protection.
      type: string
      enum:
        - ENABLED
        - DISABLED
    HlsKeyProviderType:
      description: Specify whether your DRM encryption key is static or from a key provider that follows the SPEKE standard. For more information about SPEKE, see https://docs.aws.amazon.com/speke/latest/documentation/what-is-speke.html.
      type: string
      enum:
        - SPEKE
        - STATIC_KEY
    HlsImageBasedTrickPlay:
      description: "Specify whether MediaConvert generates images for trick play. Keep the default value, None, to not generate any images. Choose Thumbnail to generate tiled thumbnails. Choose Thumbnail and full frame to generate tiled thumbnails and full-resolution images of single frames. MediaConvert creates a child manifest for each set of images that you generate and adds corresponding entries to the parent manifest. A common application for these images is Roku trick mode. The thumbnails and full-frame images that MediaConvert creates with this feature are compatible with this Roku specification: https://developer.roku.com/docs/developer-program/media-playback/trick-mode/hls-and-dash.md"
      type: string
      enum:
        - NONE
        - THUMBNAIL
        - THUMBNAIL_AND_FULLFRAME
        - ADVANCED
    HlsImageBasedTrickPlaySettings:
      description: Tile and thumbnail settings applicable when imageBasedTrickPlay is ADVANCED
      type: object
      properties:
        IntervalCadence:
          $ref: "#/components/schemas/HlsIntervalCadence"
          description: The cadence MediaConvert follows for generating thumbnails. If set to FOLLOW_IFRAME, MediaConvert generates thumbnails for each IDR frame in the output (matching the GOP cadence). If set to FOLLOW_CUSTOM, MediaConvert generates thumbnails according to the interval you specify in thumbnailInterval. If set to FOLLOW_SEGMENTATION, MediaConvert generates thumbnail playlist entries that align exactly with video segment boundaries. FOLLOW_SEGMENTATION requires 1x1 tiling.
        ThumbnailHeight:
          $ref: "#/components/schemas/__integerMin2Max4096"
          description: Height of each thumbnail within each tile image, in pixels. Leave blank to maintain aspect ratio with thumbnail width. If following the aspect ratio would lead to a total tile height greater than 4096, then the job will be rejected. Must be divisible by 2.
        ThumbnailInterval:
          $ref: "#/components/schemas/__doubleMin0Max2147483647"
          description: Enter the interval, in seconds, that MediaConvert uses to generate thumbnails. If the interval you enter doesn't align with the output frame rate, MediaConvert automatically rounds the interval to align with the output frame rate. For example, if the output frame rate is 29.97 frames per second and you enter 5, MediaConvert uses a 150 frame interval to generate thumbnails.
        ThumbnailWidth:
          $ref: "#/components/schemas/__integerMin8Max4096"
          description: Width of each thumbnail within each tile image, in pixels. Default is 312. Must be divisible by 8.
        TileHeight:
          $ref: "#/components/schemas/__integerMin1Max2048"
          description: Number of thumbnails in each column of a tile image. Set a value between 2 and 2048. Must be divisible by 2.
        TileWidth:
          $ref: "#/components/schemas/__integerMin1Max512"
          description: Number of thumbnails in each row of a tile image. Set a value between 1 and 512.
    HlsIntervalCadence:
      description: The cadence MediaConvert follows for generating thumbnails. If set to FOLLOW_IFRAME, MediaConvert generates thumbnails for each IDR frame in the output (matching the GOP cadence). If set to FOLLOW_CUSTOM, MediaConvert generates thumbnails according to the interval you specify in thumbnailInterval. If set to FOLLOW_SEGMENTATION, MediaConvert generates thumbnail playlist entries that align exactly with video segment boundaries. FOLLOW_SEGMENTATION requires 1x1 tiling.
      type: string
      enum:
        - FOLLOW_IFRAME
        - FOLLOW_CUSTOM
        - FOLLOW_SEGMENTATION
    HlsManifestCompression:
      description: When set to GZIP, compresses HLS playlist.
      type: string
      enum:
        - GZIP
        - NONE
    HlsManifestDurationFormat:
      description: Indicates whether the output manifest should use floating point values for segment duration.
      type: string
      enum:
        - FLOATING_POINT
        - INTEGER
    HlsOutputSelection:
      description: Indicates whether the .m3u8 manifest file should be generated for this HLS output group.
      type: string
      enum:
        - MANIFESTS_AND_SEGMENTS
        - SEGMENTS_ONLY
    HlsProgramDateTime:
      description: "Includes or excludes EXT-X-PROGRAM-DATE-TIME tag in .m3u8 manifest files. The value is calculated as follows: either the program date and time are initialized using the input timecode source, or the time is initialized using the input timecode source and the date is initialized using the timestamp_offset."
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    __integerMin0Max3600:
      type: integer
      minimum: 0
      maximum: 3600
    HlsProgressiveWriteHlsManifest:
      description: "Specify whether MediaConvert generates HLS manifests while your job is running or when your job is complete. To generate HLS manifests while your job is running: Choose Enabled. Use if you want to play back your content as soon as it's available. MediaConvert writes the parent and child manifests after the first three media segments are written to your destination S3 bucket. It then writes new updated manifests after each additional segment is written. The parent manifest includes the latest BANDWIDTH and AVERAGE-BANDWIDTH attributes, and child manifests include the latest available media segment. When your job completes, the final child playlists include an EXT-X-ENDLIST tag. To generate HLS manifests only when your job completes: Choose Disabled."
      type: string
      enum:
        - ENABLED
        - DISABLED
    HlsSegmentControl:
      description: "When set to SINGLE_FILE, emits program as a single media resource (.ts) file, uses #EXT-X-BYTERANGE tags to index segment for playback."
      type: string
      enum:
        - SINGLE_FILE
        - SEGMENTED_FILES
    HlsSegmentLengthControl:
      description: "Specify how you want MediaConvert to determine segment lengths in this output group. To use the exact value that you specify under Segment length: Choose Exact. Note that this might result in additional I-frames in the output GOP. To create segment lengths that are a multiple of the GOP: Choose Multiple of GOP. MediaConvert will round up the segment lengths to match the next GOP boundary. To have MediaConvert automatically determine a segment duration that is a multiple of both the audio packets and the frame rates: Choose Match. When you do, also specify a target segment duration under Segment length. This is useful for some ad-insertion or segment replacement workflows. Note that Match has the following requirements: - Output containers: Include at least one video output and at least one audio output. Audio-only outputs are not supported. - Output frame rate: Follow source is not supported. - Multiple output frame rates: When you specify multiple outputs, we recommend they share a similar frame rate (as in X/3, X/2, X, or 2X). For example: 5, 15, 30 and 60. Or: 25 and 50. (Outputs must share an integer multiple.) - Output audio codec: Specify Advanced Audio Coding (AAC). - Output sample rate: Choose 48kHz."
      type: string
      enum:
        - EXACT
        - GOP_MULTIPLE
        - MATCH
    HlsStreamInfResolution:
      description: Include or exclude RESOLUTION attribute for video in EXT-X-STREAM-INF tag of variant manifest.
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    HlsTargetDurationCompatibilityMode:
      description: When set to LEGACY, the segment target duration is always rounded up to the nearest integer value above its current value in seconds. When set to SPEC\\_COMPLIANT, the segment target duration is rounded up to the nearest integer value if fraction seconds are greater than or equal to 0.5 (>= 0.5) and rounded down if less than 0.5 (< 0.5). You may need to use LEGACY if your client needs to ensure that the target duration is always longer than the actual duration of the segment. Some older players may experience interrupted playback when the actual duration of a track in a segment is longer than the target duration.
      type: string
      enum:
        - LEGACY
        - SPEC_COMPLIANT
    HlsTimedMetadataId3Frame:
      description: "Specify the type of the ID3 frame to use for ID3 timestamps in your output. To include ID3 timestamps: Specify PRIV or TDRL and set ID3 metadata to Passthrough. To exclude ID3 timestamps: Set ID3 timestamp frame type to None."
      type: string
      enum:
        - NONE
        - PRIV
        - TDRL
    MsSmoothGroupSettings:
      description: Settings related to your Microsoft Smooth Streaming output package. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/outputs-file-ABR.html.
      type: object
      properties:
        AdditionalManifests:
          $ref: "#/components/schemas/__listOfMsSmoothAdditionalManifest"
          description: By default, the service creates one .ism Microsoft Smooth Streaming manifest for each Microsoft Smooth Streaming output group in your job. This default manifest references every output in the output group. To create additional manifests that reference a subset of the outputs in the output group, specify a list of them here.
        AudioDeduplication:
          $ref: "#/components/schemas/MsSmoothAudioDeduplication"
          description: COMBINE_DUPLICATE_STREAMS combines identical audio encoding settings across a Microsoft Smooth output group into a single audio stream.
        Destination:
          $ref: "#/components/schemas/__stringPatternS3"
          description: Use Destination to specify the S3 output location and the output filename base. Destination accepts format identifiers. If you do not specify the base filename in the URI, the service will use the filename of the input file. If your job has multiple inputs, the service uses the filename of the first input file.
        DestinationSettings:
          $ref: "#/components/schemas/DestinationSettings"
          description: Settings associated with the destination. Will vary based on the type of destination
        Encryption:
          $ref: "#/components/schemas/MsSmoothEncryptionSettings"
          description: If you are using DRM, set DRM System to specify the value SpekeKeyProvider.
        FragmentLength:
          $ref: "#/components/schemas/__integerMin1Max2147483647"
          description: Specify how you want MediaConvert to determine the fragment length. Choose Exact to have the encoder use the exact length that you specify with the setting Fragment length. This might result in extra I-frames. Choose Multiple of GOP to have the encoder round up the segment lengths to match the next GOP boundary.
        FragmentLengthControl:
          $ref: "#/components/schemas/MsSmoothFragmentLengthControl"
          description: Specify how you want MediaConvert to determine the fragment length. Choose Exact to have the encoder use the exact length that you specify with the setting Fragment length. This might result in extra I-frames. Choose Multiple of GOP to have the encoder round up the segment lengths to match the next GOP boundary.
        ManifestEncoding:
          $ref: "#/components/schemas/MsSmoothManifestEncoding"
          description: Use Manifest encoding to specify the encoding format for the server and client manifest. Valid options are utf8 and utf16.
    __listOfMsSmoothAdditionalManifest:
      type: array
      items:
        $ref: "#/components/schemas/MsSmoothAdditionalManifest"
    MsSmoothAdditionalManifest:
      description: Specify the details for each additional Microsoft Smooth Streaming manifest that you want the service to generate for this output group. Each manifest can reference a different subset of outputs in the group.
      type: object
      properties:
        ManifestNameModifier:
          $ref: "#/components/schemas/__stringMin1"
          description: Specify a name modifier that the service adds to the name of this manifest to make it different from the file names of the other main manifests in the output group. For example, say that the default main manifest for your Microsoft Smooth group is film-name.ismv. If you enter "-no-premium" for this setting, then the file name the service generates for this top-level manifest is film-name-no-premium.ismv.
        SelectedOutputs:
          $ref: "#/components/schemas/__listOf__stringMin1"
          description: Specify the outputs that you want this additional top-level manifest to reference.
    MsSmoothAudioDeduplication:
      description: COMBINE_DUPLICATE_STREAMS combines identical audio encoding settings across a Microsoft Smooth output group into a single audio stream.
      type: string
      enum:
        - COMBINE_DUPLICATE_STREAMS
        - NONE
    MsSmoothEncryptionSettings:
      description: If you are using DRM, set DRM System to specify the value SpekeKeyProvider.
      type: object
      properties:
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
          description: If your output group type is HLS, DASH, or Microsoft Smooth, use these settings when doing DRM encryption with a SPEKE-compliant key provider. If your output group type is CMAF, use the SpekeKeyProviderCmaf settings instead.
    MsSmoothFragmentLengthControl:
      description: Specify how you want MediaConvert to determine the fragment length. Choose Exact to have the encoder use the exact length that you specify with the setting Fragment length. This might result in extra I-frames. Choose Multiple of GOP to have the encoder round up the segment lengths to match the next GOP boundary.
      type: string
      enum:
        - EXACT
        - GOP_MULTIPLE
    MsSmoothManifestEncoding:
      description: Use Manifest encoding to specify the encoding format for the server and client manifest. Valid options are utf8 and utf16.
      type: string
      enum:
        - UTF8
        - UTF16
    __listOfFrameMetricType:
      type: array
      items:
        $ref: "#/components/schemas/FrameMetricType"
    FrameMetricType:
      description: "* PSNR: Peak Signal-to-Noise Ratio * SSIM: Structural Similarity Index Measure * MS_SSIM: Multi-Scale Similarity Index Measure * PSNR_HVS: Peak Signal-to-Noise Ratio, Human Visual System * VMAF: Video Multi-Method Assessment Fusion * QVBR: Quality-Defined Variable Bitrate. This option is only available when your output uses the QVBR rate control mode. * SHOT_CHANGE: Shot Changes"
      type: string
      enum:
        - PSNR
        - SSIM
        - MS_SSIM
        - PSNR_HVS
        - VMAF
        - QVBR
        - SHOT_CHANGE
    OutputGroupType:
      description: Type of output group (File group, Apple HLS, DASH ISO, Microsoft Smooth Streaming, CMAF)
      type: string
      enum:
        - HLS_GROUP_SETTINGS
        - DASH_ISO_GROUP_SETTINGS
        - FILE_GROUP_SETTINGS
        - MS_SMOOTH_GROUP_SETTINGS
        - CMAF_GROUP_SETTINGS
    __listOfOutput:
      type: array
      items:
        $ref: "#/components/schemas/Output"
    Output:
      description: Each output in your job is a collection of settings that describes how you want MediaConvert to encode a single output file or stream. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/create-outputs.html.
      type: object
      properties:
        AudioDescriptions:
          $ref: "#/components/schemas/__listOfAudioDescription"
          description: Contains groups of audio encoding settings organized by audio codec. Include one instance of per output. Can contain multiple groups of encoding settings.
        CaptionDescriptions:
          $ref: "#/components/schemas/__listOfCaptionDescription"
          description: Contains groups of captions settings. For each output that has captions, include one instance of CaptionDescriptions. Can contain multiple groups of captions settings.
        ContainerSettings:
          $ref: "#/components/schemas/ContainerSettings"
          description: Container specific settings.
        Extension:
          $ref: "#/components/schemas/__stringMax256"
          description: Use Extension to specify the file extension for outputs in File output groups. If you do not specify a value, the service will use default extensions by container type as follows * MPEG-2 transport stream, m2ts * Quicktime, mov * MXF container, mxf * MPEG-4 container, mp4 * WebM container, webm * Animated GIF container, gif * No Container, the service will use codec extensions (e.g. AAC, H265, H265, AC3)
        NameModifier:
          $ref: "#/components/schemas/__stringMin1Max256"
          description: Use Name modifier to have the service add a string to the end of each output filename. You specify the base filename as part of your destination URI. When you create multiple outputs in the same output group, Name modifier is required. Name modifier also accepts format identifiers. For DASH ISO outputs, if you use the format identifiers $Number$ or $Time$ in one output, you must use them in the same way in all outputs of the output group.
        OutputSettings:
          $ref: "#/components/schemas/OutputSettings"
          description: Specific settings for this type of output.
        Preset:
          $ref: "#/components/schemas/__stringMin0"
          description: Use Preset to specify a preset for your transcoding settings. Provide the system or custom preset name. You can specify either Preset or Container settings, but not both.
        VideoDescription:
          $ref: "#/components/schemas/VideoDescription"
          description: VideoDescription contains a group of video encoding settings. The specific video settings depend on the video codec that you choose for the property codec. Include one instance of VideoDescription per output.
    __listOfAudioDescription:
      type: array
      items:
        $ref: "#/components/schemas/AudioDescription"
    AudioDescription:
      description: Settings related to one audio tab on the MediaConvert console. In your job JSON, an instance of AudioDescription is equivalent to one audio tab in the console. Usually, one audio tab corresponds to one output audio track. Depending on how you set up your input audio selectors and whether you use audio selector groups, one audio tab can correspond to a group of output audio tracks.
      type: object
      properties:
        AudioChannelTaggingSettings:
          $ref: "#/components/schemas/AudioChannelTaggingSettings"
          description: Specify the QuickTime audio channel layout tags for the audio channels in this audio track. When you don't specify a value, MediaConvert labels your track as Center (C) by default. To use Audio layout tagging, your output must be in a QuickTime (MOV) container and your audio codec must be AAC, WAV, or AIFF.
        AudioNormalizationSettings:
          $ref: "#/components/schemas/AudioNormalizationSettings"
          description: Advanced audio normalization settings. Ignore these settings unless you need to comply with a loudness standard.
        AudioPitchCorrectionSettings:
          $ref: "#/components/schemas/AudioPitchCorrectionSettings"
          description: Settings for audio pitch correction during framerate conversion.
        AudioSourceName:
          $ref: "#/components/schemas/__stringMax2048"
          description: Specifies which audio data to use from each input. In the simplest case, specify an "Audio Selector":#inputs-audio_selector by name based on its order within each input. For example if you specify "Audio Selector 3", then the third audio selector will be used from each input. If an input does not have an "Audio Selector 3", then the audio selector marked as "default" in that input will be used. If there is no audio selector marked as "default", silence will be inserted for the duration of that input. Alternatively, an "Audio Selector Group":#inputs-audio_selector_group name may be specified, with similar default/silence behavior. If no audio_source_name is specified, then "Audio Selector 1" will be chosen automatically.
        AudioType:
          $ref: "#/components/schemas/__integerMin0Max255"
          description: "Applies only if Follow Input Audio Type is unchecked (false). A number between 0 and 255. The following are defined in ISO-IEC 13818-1: 0 = Undefined, 1 = Clean Effects, 2 = Hearing Impaired, 3 = Visually Impaired Commentary, 4-255 = Reserved."
        AudioTypeControl:
          $ref: "#/components/schemas/AudioTypeControl"
          description: When set to FOLLOW_INPUT, if the input contains an ISO 639 audio_type, then that value is passed through to the output. If the input contains no ISO 639 audio_type, the value in Audio Type is included in the output. Otherwise the value in Audio Type is included in the output. Note that this field and audioType are both ignored if audioDescriptionBroadcasterMix is set to BROADCASTER_MIXED_AD.
        CodecSettings:
          $ref: "#/components/schemas/AudioCodecSettings"
          description: Settings related to audio encoding. The settings in this group vary depending on the value that you choose for your audio codec.
        CustomLanguageCode:
          $ref: "#/components/schemas/__stringPatternAZaZ23AZaZ09"
          description: "Specify the language for this audio output track. The service puts this language code into your output audio track when you set Language code control to Use configured. The service also uses your specified custom language code when you set Language code control to Follow input, but your input file doesn't specify a language code. For all outputs, you can use an ISO 639-2 or ISO 639-3 code. For streaming outputs, you can also use any other code in the full RFC-5646 specification. Streaming outputs are those that are in one of the following output groups: CMAF, DASH ISO, Apple HLS, or Microsoft Smooth Streaming."
        LanguageCode:
          $ref: "#/components/schemas/LanguageCode"
          description: "Specify the language for your output audio track. To follow the input language: Leave blank. When you do, also set Language code control to Follow input. If no input language is detected MediaConvert will not write an output language code. To follow the input langauge, but fall back to a specified language code if there is no input language to follow: Enter an ISO 639-2 three-letter language code in all capital letters. When you do, also set Language code control to Follow input. To specify the language code: Enter an ISO 639 three-letter language code in all capital letters. When you do, also set Language code control to Use configured."
        LanguageCodeControl:
          $ref: "#/components/schemas/AudioLanguageCodeControl"
          description: Specify which source for language code takes precedence for this audio track. When you choose Follow input, the service uses the language code from the input track if it's present. If there's no languge code on the input track, the service uses the code that you specify in the setting Language code. When you choose Use configured, the service uses the language code that you specify.
        RemixSettings:
          $ref: "#/components/schemas/RemixSettings"
          description: Advanced audio remixing settings.
        StreamName:
          $ref: "#/components/schemas/__stringPatternWS"
          description: Specify a label for this output audio stream. For example, "English", "Director commentary", or "track_2". For streaming outputs, MediaConvert passes this information into destination manifests for display on the end-viewer's player device. For outputs in other output groups, the service ignores this setting.
    AudioChannelTaggingSettings:
      description: Specify the QuickTime audio channel layout tags for the audio channels in this audio track. When you don't specify a value, MediaConvert labels your track as Center (C) by default. To use Audio layout tagging, your output must be in a QuickTime (MOV) container and your audio codec must be AAC, WAV, or AIFF.
      type: object
      properties:
        ChannelTag:
          $ref: "#/components/schemas/AudioChannelTag"
          description: Specify the QuickTime audio channel layout tags for the audio channels in this audio track. Enter channel layout tags in the same order as your output's audio channel order. For example, if your output audio track has a left and a right channel, enter Left (L) for the first channel and Right (R) for the second. If your output has multiple single-channel audio tracks, enter a single channel layout tag for each track.
        ChannelTags:
          $ref: "#/components/schemas/__listOfAudioChannelTag"
          description: Specify the QuickTime audio channel layout tags for the audio channels in this audio track. Enter channel layout tags in the same order as your output's audio channel order. For example, if your output audio track has a left and a right channel, enter Left (L) for the first channel and Right (R) for the second. If your output has multiple single-channel audio tracks, enter a single channel layout tag for each track.
    AudioChannelTag:
      description: Specify the QuickTime audio channel layout tags for the audio channels in this audio track. Enter channel layout tags in the same order as your output's audio channel order. For example, if your output audio track has a left and a right channel, enter Left (L) for the first channel and Right (R) for the second. If your output has multiple single-channel audio tracks, enter a single channel layout tag for each track.
      type: string
      enum:
        - L
        - R
        - C
        - LFE
        - LS
        - RS
        - LC
        - RC
        - CS
        - LSD
        - RSD
        - TCS
        - VHL
        - VHC
        - VHR
        - TBL
        - TBC
        - TBR
        - RSL
        - RSR
        - LW
        - RW
        - LFE2
        - LT
        - RT
        - HI
        - NAR
        - M
    __listOfAudioChannelTag:
      type: array
      items:
        $ref: "#/components/schemas/AudioChannelTag"
    AudioNormalizationSettings:
      description: Advanced audio normalization settings. Ignore these settings unless you need to comply with a loudness standard.
      type: object
      properties:
        Algorithm:
          $ref: "#/components/schemas/AudioNormalizationAlgorithm"
          description: "Choose one of the following audio normalization algorithms: ITU-R BS.1770-1: Ungated loudness. A measurement of ungated average loudness for an entire piece of content, suitable for measurement of short-form content under ATSC recommendation A/85. Supports up to 5.1 audio channels. ITU-R BS.1770-2: Gated loudness. A measurement of gated average loudness compliant with the requirements of EBU-R128. Supports up to 5.1 audio channels. ITU-R BS.1770-3: Modified peak. The same loudness measurement algorithm as 1770-2, with an updated true peak measurement. ITU-R BS.1770-4: Higher channel count. Allows for more audio channels than the other algorithms, including configurations such as 7.1."
        AlgorithmControl:
          $ref: "#/components/schemas/AudioNormalizationAlgorithmControl"
          description: When enabled the output audio is corrected using the chosen algorithm. If disabled, the audio will be measured but not adjusted.
        CorrectionGateLevel:
          $ref: "#/components/schemas/__integerMinNegative70Max0"
          description: Content measuring above this level will be corrected to the target level. Content measuring below this level will not be corrected.
        LoudnessLogging:
          $ref: "#/components/schemas/AudioNormalizationLoudnessLogging"
          description: If set to LOG, log each output's audio track loudness to a CSV file.
        PeakCalculation:
          $ref: "#/components/schemas/AudioNormalizationPeakCalculation"
          description: If set to TRUE_PEAK, calculate and log the TruePeak for each output's audio track loudness.
        TargetLkfs:
          $ref: "#/components/schemas/__doubleMinNegative59Max0"
          description: When you use Audio normalization, optionally use this setting to specify a target loudness. If you don't specify a value here, the encoder chooses a value for you, based on the algorithm that you choose for Algorithm. If you choose algorithm 1770-1, the encoder will choose -24 LKFS; otherwise, the encoder will choose -23 LKFS.
        TruePeakLimiterThreshold:
          $ref: "#/components/schemas/__doubleMinNegative8Max0"
          description: Specify the True-peak limiter threshold in decibels relative to full scale (dBFS). The peak inter-audio sample loudness in your output will be limited to the value that you specify, without affecting the overall target LKFS. Enter a value from 0 to -8. Leave blank to use the default value 0.
    AudioNormalizationAlgorithm:
      description: "Choose one of the following audio normalization algorithms: ITU-R BS.1770-1: Ungated loudness. A measurement of ungated average loudness for an entire piece of content, suitable for measurement of short-form content under ATSC recommendation A/85. Supports up to 5.1 audio channels. ITU-R BS.1770-2: Gated loudness. A measurement of gated average loudness compliant with the requirements of EBU-R128. Supports up to 5.1 audio channels. ITU-R BS.1770-3: Modified peak. The same loudness measurement algorithm as 1770-2, with an updated true peak measurement. ITU-R BS.1770-4: Higher channel count. Allows for more audio channels than the other algorithms, including configurations such as 7.1."
      type: string
      enum:
        - ITU_BS_1770_1
        - ITU_BS_1770_2
        - ITU_BS_1770_3
        - ITU_BS_1770_4
    AudioNormalizationAlgorithmControl:
      description: When enabled the output audio is corrected using the chosen algorithm. If disabled, the audio will be measured but not adjusted.
      type: string
      enum:
        - CORRECT_AUDIO
        - MEASURE_ONLY
    __integerMinNegative70Max0:
      type: integer
      minimum: -70
      maximum: 0
    AudioNormalizationLoudnessLogging:
      description: If set to LOG, log each output's audio track loudness to a CSV file.
      type: string
      enum:
        - LOG
        - DONT_LOG
    AudioNormalizationPeakCalculation:
      description: If set to TRUE_PEAK, calculate and log the TruePeak for each output's audio track loudness.
      type: string
      enum:
        - TRUE_PEAK
        - NONE
    __doubleMinNegative59Max0:
      type: number
      format: double
    __doubleMinNegative8Max0:
      type: number
      format: double
    AudioPitchCorrectionSettings:
      description: Settings for audio pitch correction during framerate conversion.
      type: object
      properties:
        SlowPalPitchCorrection:
          $ref: "#/components/schemas/SlowPalPitchCorrection"
          description: "Use Slow PAL pitch correction to compensate for audio pitch changes during slow PAL frame rate conversion. This setting only applies when Slow PAL is enabled in your output video codec settings. To automatically apply audio pitch correction: Choose Enabled. MediaConvert automatically applies a pitch correction to your output to match the original content's audio pitch. To not apply audio pitch correction: Keep the default value, Disabled."
    SlowPalPitchCorrection:
      description: "Use Slow PAL pitch correction to compensate for audio pitch changes during slow PAL frame rate conversion. This setting only applies when Slow PAL is enabled in your output video codec settings. To automatically apply audio pitch correction: Choose Enabled. MediaConvert automatically applies a pitch correction to your output to match the original content's audio pitch. To not apply audio pitch correction: Keep the default value, Disabled."
      type: string
      enum:
        - DISABLED
        - ENABLED
    __integerMin0Max255:
      type: integer
      minimum: 0
      maximum: 255
    AudioTypeControl:
      description: When set to FOLLOW_INPUT, if the input contains an ISO 639 audio_type, then that value is passed through to the output. If the input contains no ISO 639 audio_type, the value in Audio Type is included in the output. Otherwise the value in Audio Type is included in the output. Note that this field and audioType are both ignored if audioDescriptionBroadcasterMix is set to BROADCASTER_MIXED_AD.
      type: string
      enum:
        - FOLLOW_INPUT
        - USE_CONFIGURED
    AudioCodecSettings:
      description: Settings related to audio encoding. The settings in this group vary depending on the value that you choose for your audio codec.
      type: object
      properties:
        AacSettings:
          $ref: "#/components/schemas/AacSettings"
          description: Required when you set Codec to the value AAC. The service accepts one of two mutually exclusive groups of AAC settings--VBR and CBR. To select one of these modes, set the value of Bitrate control mode to "VBR" or "CBR". In VBR mode, you control the audio quality with the setting VBR quality. In CBR mode, you use the setting Bitrate. Defaults and valid values depend on the rate control mode.
        Ac3Settings:
          $ref: "#/components/schemas/Ac3Settings"
          description: Required when you set Codec to the value AC3.
        Ac4Settings:
          $ref: "#/components/schemas/Ac4Settings"
          description: Required when you set Codec to the value AC4.
        AiffSettings:
          $ref: "#/components/schemas/AiffSettings"
          description: Required when you set Codec to the value AIFF.
        Codec:
          $ref: "#/components/schemas/AudioCodec"
          description: "Choose the audio codec for this output. Note that the option Dolby Digital passthrough applies only to Dolby Digital and Dolby Digital Plus audio inputs. Make sure that you choose a codec that's supported with your output container: https://docs.aws.amazon.com/mediaconvert/latest/ug/reference-codecs-containers.html#reference-codecs-containers-output-audio For audio-only outputs, make sure that both your input audio codec and your output audio codec are supported for audio-only workflows. For more information, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/reference-codecs-containers-input.html#reference-codecs-containers-input-audio-only and https://docs.aws.amazon.com/mediaconvert/latest/ug/reference-codecs-containers.html#audio-only-output"
        Eac3AtmosSettings:
          $ref: "#/components/schemas/Eac3AtmosSettings"
          description: Required when you set Codec to the value EAC3_ATMOS.
        Eac3Settings:
          $ref: "#/components/schemas/Eac3Settings"
          description: Required when you set Codec to the value EAC3.
        FlacSettings:
          $ref: "#/components/schemas/FlacSettings"
          description: Required when you set Codec, under AudioDescriptions>CodecSettings, to the value FLAC.
        Mp2Settings:
          $ref: "#/components/schemas/Mp2Settings"
          description: Required when you set Codec to the value MP2.
        Mp3Settings:
          $ref: "#/components/schemas/Mp3Settings"
          description: Required when you set Codec, under AudioDescriptions>CodecSettings, to the value MP3.
        OpusSettings:
          $ref: "#/components/schemas/OpusSettings"
          description: Required when you set Codec, under AudioDescriptions>CodecSettings, to the value OPUS.
        VorbisSettings:
          $ref: "#/components/schemas/VorbisSettings"
          description: Required when you set Codec, under AudioDescriptions>CodecSettings, to the value Vorbis.
        WavSettings:
          $ref: "#/components/schemas/WavSettings"
          description: Required when you set Codec to the value WAV.
    AacSettings:
      description: Required when you set Codec to the value AAC. The service accepts one of two mutually exclusive groups of AAC settings--VBR and CBR. To select one of these modes, set the value of Bitrate control mode to "VBR" or "CBR". In VBR mode, you control the audio quality with the setting VBR quality. In CBR mode, you use the setting Bitrate. Defaults and valid values depend on the rate control mode.
      type: object
      properties:
        AudioDescriptionBroadcasterMix:
          $ref: "#/components/schemas/AacAudioDescriptionBroadcasterMix"
          description: Choose BROADCASTER_MIXED_AD when the input contains pre-mixed main audio + audio description (AD) as a stereo pair. The value for AudioType will be set to 3, which signals to downstream systems that this stream contains "broadcaster mixed AD". Note that the input received by the encoder must contain pre-mixed audio; the encoder does not perform the mixing. When you choose BROADCASTER_MIXED_AD, the encoder ignores any values you provide in AudioType and FollowInputAudioType. Choose NORMAL when the input does not contain pre-mixed audio + audio description (AD). In this case, the encoder will use any values you provide for AudioType and FollowInputAudioType.
        Bitrate:
          $ref: "#/components/schemas/__integerMin6000Max1024000"
          description: "Specify the average bitrate in bits per second. The set of valid values for this setting is: 6000, 8000, 10000, 12000, 14000, 16000, 20000, 24000, 28000, 32000, 40000, 48000, 56000, 64000, 80000, 96000, 112000, 128000, 160000, 192000, 224000, 256000, 288000, 320000, 384000, 448000, 512000, 576000, 640000, 768000, 896000, 1024000. The value you set is also constrained by the values that you choose for Profile, Bitrate control mode, and Sample rate. Default values depend on Bitrate control mode and Profile."
        CodecProfile:
          $ref: "#/components/schemas/AacCodecProfile"
          description: "Specify the AAC profile. For the widest player compatibility and where higher bitrates are acceptable: Keep the default profile, LC (AAC-LC) For improved audio performance at lower bitrates: Choose HEV1 or HEV2. HEV1 (AAC-HE v1) adds spectral band replication to improve speech audio at low bitrates. HEV2 (AAC-HE v2) adds parametric stereo, which optimizes for encoding stereo audio at very low bitrates. For improved audio quality at lower bitrates, adaptive audio bitrate switching, and loudness control: Choose XHE."
        CodingMode:
          $ref: "#/components/schemas/AacCodingMode"
          description: "The Coding mode that you specify determines the number of audio channels and the audio channel layout metadata in your AAC output. Valid coding modes depend on the Rate control mode and Profile that you select. The following list shows the number of audio channels and channel layout for each coding mode. * 1.0 Audio Description (Receiver Mix): One channel, C. Includes audio description data from your stereo input. For more information see ETSI TS 101 154 Annex E. * 1.0 Mono: One channel, C. * 2.0 Stereo: Two channels, L, R. * 5.1 Surround: Six channels, C, L, R, Ls, Rs, LFE. To follow the number of channels from your input audio, choose CODING_MODE_AUTO, and the service will automatically choose from one of the coding modes above."
        LoudnessMeasurementMode:
          $ref: "#/components/schemas/AacLoudnessMeasurementMode"
          description: "Choose the loudness measurement mode for your audio content. For music or advertisements: We recommend that you keep the default value, Program. For speech or other content: We recommend that you choose Anchor. When you do, MediaConvert optimizes the loudness of your output for clarify by applying speech gates."
        RapInterval:
          $ref: "#/components/schemas/__integerMin2000Max30000"
          description: "Specify the RAP (Random Access Point) interval for your xHE-AAC audio output. A RAP allows a decoder to decode audio data mid-stream, without the need to reference previous audio frames, and perform adaptive audio bitrate switching. To specify the RAP interval: Enter an integer from 2000 to 30000, in milliseconds. Smaller values allow for better seeking and more frequent stream switching, while large values improve compression efficiency. To have MediaConvert automatically determine the RAP interval: Leave blank."
        RateControlMode:
          $ref: "#/components/schemas/AacRateControlMode"
          description: "Specify the AAC rate control mode. For a constant bitrate: Choose CBR. Your AAC output bitrate will be equal to the value that you choose for Bitrate. For a variable bitrate: Choose VBR. Your AAC output bitrate will vary according to your audio content and the value that you choose for Bitrate quality."
        RawFormat:
          $ref: "#/components/schemas/AacRawFormat"
          description: Enables LATM/LOAS AAC output. Note that if you use LATM/LOAS AAC in an output, you must choose "No container" for the output container.
        SampleRate:
          $ref: "#/components/schemas/__integerMin8000Max96000"
          description: "Specify the AAC sample rate in samples per second (Hz). Valid sample rates depend on the AAC profile and Coding mode that you select. For a list of supported sample rates, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/aac-support.html"
        Specification:
          $ref: "#/components/schemas/AacSpecification"
          description: Use MPEG-2 AAC instead of MPEG-4 AAC audio for raw or MPEG-2 Transport Stream containers.
        TargetLoudnessRange:
          $ref: "#/components/schemas/__integerMin6Max16"
          description: 'Specify the xHE-AAC loudness target. Enter an integer from 6 to 16, representing "loudness units". For more information, see the following specification: Supplementary information for R 128 EBU Tech 3342-2023.'
        VbrQuality:
          $ref: "#/components/schemas/AacVbrQuality"
          description: "Specify the quality of your variable bitrate (VBR) AAC audio. For a list of approximate VBR bitrates, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/aac-support.html#aac_vbr"
    AacAudioDescriptionBroadcasterMix:
      description: Choose BROADCASTER_MIXED_AD when the input contains pre-mixed main audio + audio description (AD) as a stereo pair. The value for AudioType will be set to 3, which signals to downstream systems that this stream contains "broadcaster mixed AD". Note that the input received by the encoder must contain pre-mixed audio; the encoder does not perform the mixing. When you choose BROADCASTER_MIXED_AD, the encoder ignores any values you provide in AudioType and FollowInputAudioType. Choose NORMAL when the input does not contain pre-mixed audio + audio description (AD). In this case, the encoder will use any values you provide for AudioType and FollowInputAudioType.
      type: string
      enum:
        - BROADCASTER_MIXED_AD
        - NORMAL
    __integerMin6000Max1024000:
      type: integer
      minimum: 6000
      maximum: 1024000
    AacCodecProfile:
      description: "Specify the AAC profile. For the widest player compatibility and where higher bitrates are acceptable: Keep the default profile, LC (AAC-LC) For improved audio performance at lower bitrates: Choose HEV1 or HEV2. HEV1 (AAC-HE v1) adds spectral band replication to improve speech audio at low bitrates. HEV2 (AAC-HE v2) adds parametric stereo, which optimizes for encoding stereo audio at very low bitrates. For improved audio quality at lower bitrates, adaptive audio bitrate switching, and loudness control: Choose XHE."
      type: string
      enum:
        - LC
        - HEV1
        - HEV2
        - XHE
    AacCodingMode:
      description: "The Coding mode that you specify determines the number of audio channels and the audio channel layout metadata in your AAC output. Valid coding modes depend on the Rate control mode and Profile that you select. The following list shows the number of audio channels and channel layout for each coding mode. * 1.0 Audio Description (Receiver Mix): One channel, C. Includes audio description data from your stereo input. For more information see ETSI TS 101 154 Annex E. * 1.0 Mono: One channel, C. * 2.0 Stereo: Two channels, L, R. * 5.1 Surround: Six channels, C, L, R, Ls, Rs, LFE. To follow the number of channels from your input audio, choose CODING_MODE_AUTO, and the service will automatically choose from one of the coding modes above."
      type: string
      enum:
        - AD_RECEIVER_MIX
        - CODING_MODE_1_0
        - CODING_MODE_1_1
        - CODING_MODE_2_0
        - CODING_MODE_5_1
        - CODING_MODE_AUTO
    AacLoudnessMeasurementMode:
      description: "Choose the loudness measurement mode for your audio content. For music or advertisements: We recommend that you keep the default value, Program. For speech or other content: We recommend that you choose Anchor. When you do, MediaConvert optimizes the loudness of your output for clarify by applying speech gates."
      type: string
      enum:
        - PROGRAM
        - ANCHOR
    __integerMin2000Max30000:
      type: integer
      minimum: 2000
      maximum: 30000
    AacRateControlMode:
      description: "Specify the AAC rate control mode. For a constant bitrate: Choose CBR. Your AAC output bitrate will be equal to the value that you choose for Bitrate. For a variable bitrate: Choose VBR. Your AAC output bitrate will vary according to your audio content and the value that you choose for Bitrate quality."
      type: string
      enum:
        - CBR
        - VBR
    AacRawFormat:
      description: Enables LATM/LOAS AAC output. Note that if you use LATM/LOAS AAC in an output, you must choose "No container" for the output container.
      type: string
      enum:
        - LATM_LOAS
        - NONE
    __integerMin8000Max96000:
      type: integer
      minimum: 8000
      maximum: 96000
    AacSpecification:
      description: Use MPEG-2 AAC instead of MPEG-4 AAC audio for raw or MPEG-2 Transport Stream containers.
      type: string
      enum:
        - MPEG2
        - MPEG4
    __integerMin6Max16:
      type: integer
      minimum: 6
      maximum: 16
    AacVbrQuality:
      description: "Specify the quality of your variable bitrate (VBR) AAC audio. For a list of approximate VBR bitrates, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/aac-support.html#aac_vbr"
      type: string
      enum:
        - LOW
        - MEDIUM_LOW
        - MEDIUM_HIGH
        - HIGH
    Ac3Settings:
      description: Required when you set Codec to the value AC3.
      type: object
      properties:
        Bitrate:
          $ref: "#/components/schemas/__integerMin64000Max640000"
          description: "Specify the average bitrate in bits per second. The bitrate that you specify must be a multiple of 8000 within the allowed minimum and maximum values. Leave blank to use the default bitrate for the coding mode you select according ETSI TS 102 366. Valid bitrates for coding mode 1/0: Default: 96000. Minimum: 64000. Maximum: 128000. Valid bitrates for coding mode 1/1: Default: 192000. Minimum: 128000. Maximum: 384000. Valid bitrates for coding mode 2/0: Default: 192000. Minimum: 128000. Maximum: 384000. Valid bitrates for coding mode 3/2 with FLE: Default: 384000. Minimum: 384000. Maximum: 640000."
        BitstreamMode:
          $ref: "#/components/schemas/Ac3BitstreamMode"
          description: Specify the bitstream mode for the AC-3 stream that the encoder emits. For more information about the AC3 bitstream mode, see ATSC A/52-2012 (Annex E).
        CodingMode:
          $ref: "#/components/schemas/Ac3CodingMode"
          description: Dolby Digital coding mode. Determines number of channels.
        Dialnorm:
          $ref: "#/components/schemas/__integerMin1Max31"
          description: Sets the dialnorm for the output. If blank and input audio is Dolby Digital, dialnorm will be passed through.
        DynamicRangeCompressionLine:
          $ref: "#/components/schemas/Ac3DynamicRangeCompressionLine"
          description: "Choose the Dolby Digital dynamic range control (DRC) profile that MediaConvert uses when encoding the metadata in the Dolby Digital stream for the line operating mode. Related setting: When you use this setting, MediaConvert ignores any value you provide for Dynamic range compression profile. For information about the Dolby Digital DRC operating modes and profiles, see the Dynamic Range Control chapter of the Dolby Metadata Guide at https://developer.dolby.com/globalassets/professional/documents/dolby-metadata-guide.pdf."
        DynamicRangeCompressionProfile:
          $ref: "#/components/schemas/Ac3DynamicRangeCompressionProfile"
          description: When you want to add Dolby dynamic range compression (DRC) signaling to your output stream, we recommend that you use the mode-specific settings instead of Dynamic range compression profile. The mode-specific settings are Dynamic range compression profile, line mode and Dynamic range compression profile, RF mode. Note that when you specify values for all three settings, MediaConvert ignores the value of this setting in favor of the mode-specific settings. If you do use this setting instead of the mode-specific settings, choose None to leave out DRC signaling. Keep the default Film standard to set the profile to Dolby's film standard profile for all operating modes.
        DynamicRangeCompressionRf:
          $ref: "#/components/schemas/Ac3DynamicRangeCompressionRf"
          description: "Choose the Dolby Digital dynamic range control (DRC) profile that MediaConvert uses when encoding the metadata in the Dolby Digital stream for the RF operating mode. Related setting: When you use this setting, MediaConvert ignores any value you provide for Dynamic range compression profile. For information about the Dolby Digital DRC operating modes and profiles, see the Dynamic Range Control chapter of the Dolby Metadata Guide at https://developer.dolby.com/globalassets/professional/documents/dolby-metadata-guide.pdf."
        LfeFilter:
          $ref: "#/components/schemas/Ac3LfeFilter"
          description: Applies a 120Hz lowpass filter to the LFE channel prior to encoding. Only valid with 3_2_LFE coding mode.
        MetadataControl:
          $ref: "#/components/schemas/Ac3MetadataControl"
          description: When set to FOLLOW_INPUT, encoder metadata will be sourced from the DD, DD+, or DolbyE decoder that supplied this audio data. If audio was not supplied from one of these streams, then the static metadata settings will be used.
        SampleRate:
          $ref: "#/components/schemas/__integerMin48000Max48000"
          description: This value is always 48000. It represents the sample rate in Hz.
