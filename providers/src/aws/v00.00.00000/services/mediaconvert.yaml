    M2tsKlvMetadata:
      description: "To include key-length-value metadata in this output: Set KLV metadata insertion to Passthrough. MediaConvert reads KLV metadata present in your input and passes it through to the output transport stream. To exclude this KLV metadata: Set KLV metadata insertion to None or leave blank."
      type: string
      enum:
        - PASSTHROUGH
        - NONE
    __integerMin0Max500:
      type: integer
      minimum: 0
      maximum: 500
    __integerMin0Max10000:
      type: integer
      minimum: 0
      maximum: 10000
    M2tsNielsenId3:
      description: If INSERT, Nielsen inaudible tones for media tracking will be detected in the input audio and an equivalent ID3 tag will be inserted in the output.
      type: string
      enum:
        - INSERT
        - NONE
    __integerMin0Max1000:
      type: integer
      minimum: 0
      maximum: 1000
    M2tsPcrControl:
      description: When set to PCR_EVERY_PES_PACKET, a Program Clock Reference value is inserted for every Packetized Elementary Stream (PES) header. This is effective only when the PCR PID is the same as the video or audio elementary stream.
      type: string
      enum:
        - PCR_EVERY_PES_PACKET
        - CONFIGURED_PCR_PERIOD
    M2tsPreventBufferUnderflow:
      description: "Specify whether MediaConvert automatically attempts to prevent decoder buffer underflows in your transport stream output. Use if you are seeing decoder buffer underflows in your output and are unable to increase your transport stream's bitrate. For most workflows: We recommend that you keep the default value, Disabled. To prevent decoder buffer underflows in your output, when possible: Choose Enabled. Note that if MediaConvert prevents a decoder buffer underflow in your output, output video quality is reduced and your job will take longer to complete."
      type: string
      enum:
        - DISABLED
        - ENABLED
    TsPtsOffset:
      description: "Specify the initial presentation timestamp (PTS) offset for your transport stream output. To let MediaConvert automatically determine the initial PTS offset: Keep the default value, Auto. We recommend that you choose Auto for the widest player compatibility. The initial PTS will be at least two seconds and vary depending on your output's bitrate, HRD buffer size and HRD buffer initial fill percentage. To manually specify an initial PTS offset: Choose Seconds or Milliseconds. Then specify the number of seconds or milliseconds with PTS offset."
      type: string
      enum:
        - AUTO
        - SECONDS
        - MILLISECONDS
    M2tsRateMode:
      description: When set to CBR, inserts null packets into transport stream to fill specified bitrate. When set to VBR, the bitrate setting acts as the maximum bitrate, but the output will not be padded up to that bitrate.
      type: string
      enum:
        - VBR
        - CBR
    M2tsScte35Esam:
      description: Settings for SCTE-35 signals from ESAM. Include this in your job settings to put SCTE-35 markers in your HLS and transport stream outputs at the insertion points that you specify in an ESAM XML document. Provide the document in the setting SCC XML.
      type: object
      properties:
        Scte35EsamPid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) of the SCTE-35 stream in the transport stream generated by ESAM.
    M2tsScte35Source:
      description: For SCTE-35 markers from your input-- Choose Passthrough if you want SCTE-35 markers that appear in your input to also appear in this output. Choose None if you don't want SCTE-35 markers in this output. For SCTE-35 markers from an ESAM XML document-- Choose None. Also provide the ESAM XML as a string in the setting Signal processing notification XML. Also enable ESAM SCTE-35 (include the property scte35Esam).
      type: string
      enum:
        - PASSTHROUGH
        - NONE
    M2tsSegmentationMarkers:
      description: Inserts segmentation markers at each segmentation_time period. rai_segstart sets the Random Access Indicator bit in the adaptation field. rai_adapt sets the RAI bit and adds the current timecode in the private data bytes. psi_segstart inserts PAT and PMT tables at the start of segments. ebp adds Encoder Boundary Point information to the adaptation field as per OpenCable specification OC-SP-EBP-I01-130118. ebp_legacy adds Encoder Boundary Point information to the adaptation field using a legacy proprietary format.
      type: string
      enum:
        - NONE
        - RAI_SEGSTART
        - RAI_ADAPT
        - PSI_SEGSTART
        - EBP
        - EBP_LEGACY
    M2tsSegmentationStyle:
      description: The segmentation style parameter controls how segmentation markers are inserted into the transport stream. With avails, it is possible that segments may be truncated, which can influence where future segmentation markers are inserted. When a segmentation style of "reset_cadence" is selected and a segment is truncated due to an avail, we will reset the segmentation cadence. This means the subsequent segment will have a duration of of $segmentation_time seconds. When a segmentation style of "maintain_cadence" is selected and a segment is truncated due to an avail, we will not reset the segmentation cadence. This means the subsequent segment will likely be truncated as well. However, all segments after that will have a duration of $segmentation_time seconds. Note that EBP lookahead is a slight exception to this rule.
      type: string
      enum:
        - MAINTAIN_CADENCE
        - RESET_CADENCE
    M3u8Settings:
      description: These settings relate to the MPEG-2 transport stream (MPEG2-TS) container for the MPEG2-TS segments in your HLS outputs.
      type: object
      properties:
        AudioDuration:
          $ref: "#/components/schemas/M3u8AudioDuration"
          description: Specify this setting only when your output will be consumed by a downstream repackaging workflow that is sensitive to very small duration differences between video and audio. For this situation, choose Match video duration. In all other cases, keep the default value, Default codec duration. When you choose Match video duration, MediaConvert pads the output audio streams with silence or trims them to ensure that the total duration of each audio stream is at least as long as the total duration of the video stream. After padding or trimming, the audio stream duration is no more than one frame longer than the video stream. MediaConvert applies audio padding or trimming only to the end of the last segment of the output. For unsegmented outputs, MediaConvert adds padding only to the end of the file. When you keep the default value, any minor discrepancies between audio and video duration will depend on your output audio codec.
        AudioFramesPerPes:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: The number of audio frames to insert for each PES packet.
        AudioPids:
          $ref: "#/components/schemas/__listOf__integerMin32Max8182"
          description: Packet Identifier (PID) of the elementary audio stream(s) in the transport stream. Multiple values are accepted, and can be entered in ranges and/or by comma separation.
        AudioPtsOffsetDelta:
          $ref: "#/components/schemas/__integerMinNegative10000Max10000"
          description: Manually specify the difference in PTS offset that will be applied to the audio track, in seconds or milliseconds, when you set PTS offset to Seconds or Milliseconds. Enter an integer from -10000 to 10000. Leave blank to keep the default value 0.
        DataPTSControl:
          $ref: "#/components/schemas/M3u8DataPtsControl"
          description: If you select ALIGN_TO_VIDEO, MediaConvert writes captions and data packets with Presentation Timestamp (PTS) values greater than or equal to the first video packet PTS (MediaConvert drops captions and data packets with lesser PTS values). Keep the default value AUTO to allow all PTS values.
        MaxPcrInterval:
          $ref: "#/components/schemas/__integerMin0Max500"
          description: Specify the maximum time, in milliseconds, between Program Clock References (PCRs) inserted into the transport stream.
        NielsenId3:
          $ref: "#/components/schemas/M3u8NielsenId3"
          description: If INSERT, Nielsen inaudible tones for media tracking will be detected in the input audio and an equivalent ID3 tag will be inserted in the output.
        PatInterval:
          $ref: "#/components/schemas/__integerMin0Max1000"
          description: The number of milliseconds between instances of this table in the output transport stream.
        PcrControl:
          $ref: "#/components/schemas/M3u8PcrControl"
          description: When set to PCR_EVERY_PES_PACKET a Program Clock Reference value is inserted for every Packetized Elementary Stream (PES) header. This parameter is effective only when the PCR PID is the same as the video or audio elementary stream.
        PcrPid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) of the Program Clock Reference (PCR) in the transport stream. When no value is given, the encoder will assign the same value as the Video PID.
        PmtInterval:
          $ref: "#/components/schemas/__integerMin0Max1000"
          description: The number of milliseconds between instances of this table in the output transport stream.
        PmtPid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) for the Program Map Table (PMT) in the transport stream.
        PrivateMetadataPid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) of the private metadata stream in the transport stream.
        ProgramNumber:
          $ref: "#/components/schemas/__integerMin0Max65535"
          description: The value of the program number field in the Program Map Table.
        PtsOffset:
          $ref: "#/components/schemas/__integerMin0Max3600"
          description: Manually specify the initial PTS offset, in seconds, when you set PTS offset to Seconds. Enter an integer from 0 to 3600. Leave blank to keep the default value 2.
        PtsOffsetMode:
          $ref: "#/components/schemas/TsPtsOffset"
          description: "Specify the initial presentation timestamp (PTS) offset for your transport stream output. To let MediaConvert automatically determine the initial PTS offset: Keep the default value, Auto. We recommend that you choose Auto for the widest player compatibility. The initial PTS will be at least two seconds and vary depending on your output's bitrate, HRD buffer size and HRD buffer initial fill percentage. To manually specify an initial PTS offset: Choose Seconds or Milliseconds. Then specify the number of seconds or milliseconds with PTS offset."
        Scte35Pid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) of the SCTE-35 stream in the transport stream.
        Scte35Source:
          $ref: "#/components/schemas/M3u8Scte35Source"
          description: For SCTE-35 markers from your input-- Choose Passthrough if you want SCTE-35 markers that appear in your input to also appear in this output. Choose None if you don't want SCTE-35 markers in this output. For SCTE-35 markers from an ESAM XML document-- Choose None if you don't want manifest conditioning. Choose Passthrough and choose Ad markers if you do want manifest conditioning. In both cases, also provide the ESAM XML as a string in the setting Signal processing notification XML.
        TimedMetadata:
          $ref: "#/components/schemas/TimedMetadata"
          description: "Set ID3 metadata to Passthrough to include ID3 metadata in this output. This includes ID3 metadata from the following features: ID3 timestamp period, and Custom ID3 metadata inserter. To exclude this ID3 metadata in this output: set ID3 metadata to None or leave blank."
        TimedMetadataPid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) of the ID3 metadata stream in the transport stream.
        TransportStreamId:
          $ref: "#/components/schemas/__integerMin0Max65535"
          description: The value of the transport stream ID field in the Program Map Table.
        VideoPid:
          $ref: "#/components/schemas/__integerMin32Max8182"
          description: Packet Identifier (PID) of the elementary video stream in the transport stream.
    M3u8AudioDuration:
      description: Specify this setting only when your output will be consumed by a downstream repackaging workflow that is sensitive to very small duration differences between video and audio. For this situation, choose Match video duration. In all other cases, keep the default value, Default codec duration. When you choose Match video duration, MediaConvert pads the output audio streams with silence or trims them to ensure that the total duration of each audio stream is at least as long as the total duration of the video stream. After padding or trimming, the audio stream duration is no more than one frame longer than the video stream. MediaConvert applies audio padding or trimming only to the end of the last segment of the output. For unsegmented outputs, MediaConvert adds padding only to the end of the file. When you keep the default value, any minor discrepancies between audio and video duration will depend on your output audio codec.
      type: string
      enum:
        - DEFAULT_CODEC_DURATION
        - MATCH_VIDEO_DURATION
    M3u8DataPtsControl:
      description: If you select ALIGN_TO_VIDEO, MediaConvert writes captions and data packets with Presentation Timestamp (PTS) values greater than or equal to the first video packet PTS (MediaConvert drops captions and data packets with lesser PTS values). Keep the default value AUTO to allow all PTS values.
      type: string
      enum:
        - AUTO
        - ALIGN_TO_VIDEO
    M3u8NielsenId3:
      description: If INSERT, Nielsen inaudible tones for media tracking will be detected in the input audio and an equivalent ID3 tag will be inserted in the output.
      type: string
      enum:
        - INSERT
        - NONE
    M3u8PcrControl:
      description: When set to PCR_EVERY_PES_PACKET a Program Clock Reference value is inserted for every Packetized Elementary Stream (PES) header. This parameter is effective only when the PCR PID is the same as the video or audio elementary stream.
      type: string
      enum:
        - PCR_EVERY_PES_PACKET
        - CONFIGURED_PCR_PERIOD
    M3u8Scte35Source:
      description: For SCTE-35 markers from your input-- Choose Passthrough if you want SCTE-35 markers that appear in your input to also appear in this output. Choose None if you don't want SCTE-35 markers in this output. For SCTE-35 markers from an ESAM XML document-- Choose None if you don't want manifest conditioning. Choose Passthrough and choose Ad markers if you do want manifest conditioning. In both cases, also provide the ESAM XML as a string in the setting Signal processing notification XML.
      type: string
      enum:
        - PASSTHROUGH
        - NONE
    TimedMetadata:
      description: "Set ID3 metadata to Passthrough to include ID3 metadata in this output. This includes ID3 metadata from the following features: ID3 timestamp period, and Custom ID3 metadata inserter. To exclude this ID3 metadata in this output: set ID3 metadata to None or leave blank."
      type: string
      enum:
        - PASSTHROUGH
        - NONE
    MovSettings:
      description: These settings relate to your QuickTime MOV output container.
      type: object
      properties:
        ClapAtom:
          $ref: "#/components/schemas/MovClapAtom"
          description: When enabled, include 'clap' atom if appropriate for the video output settings.
        CslgAtom:
          $ref: "#/components/schemas/MovCslgAtom"
          description: When enabled, file composition times will start at zero, composition times in the 'ctts' (composition time to sample) box for B-frames will be negative, and a 'cslg' (composition shift least greatest) box will be included per 14496-1 amendment 1. This improves compatibility with Apple players and tools.
        Mpeg2FourCCControl:
          $ref: "#/components/schemas/MovMpeg2FourCCControl"
          description: When set to XDCAM, writes MPEG2 video streams into the QuickTime file using XDCAM fourcc codes. This increases compatibility with Apple editors and players, but may decrease compatibility with other players. Only applicable when the video codec is MPEG2.
        PaddingControl:
          $ref: "#/components/schemas/MovPaddingControl"
          description: "Unless you need Omneon compatibility: Keep the default value, None. To make this output compatible with Omneon: Choose Omneon. When you do, MediaConvert increases the length of the 'elst' edit list atom. Note that this might cause file rejections when a recipient of the output file doesn't expect this extra padding."
        Reference:
          $ref: "#/components/schemas/MovReference"
          description: Always keep the default value (SELF_CONTAINED) for this setting.
    MovClapAtom:
      description: When enabled, include 'clap' atom if appropriate for the video output settings.
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    MovCslgAtom:
      description: When enabled, file composition times will start at zero, composition times in the 'ctts' (composition time to sample) box for B-frames will be negative, and a 'cslg' (composition shift least greatest) box will be included per 14496-1 amendment 1. This improves compatibility with Apple players and tools.
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    MovMpeg2FourCCControl:
      description: When set to XDCAM, writes MPEG2 video streams into the QuickTime file using XDCAM fourcc codes. This increases compatibility with Apple editors and players, but may decrease compatibility with other players. Only applicable when the video codec is MPEG2.
      type: string
      enum:
        - XDCAM
        - MPEG
    MovPaddingControl:
      description: "Unless you need Omneon compatibility: Keep the default value, None. To make this output compatible with Omneon: Choose Omneon. When you do, MediaConvert increases the length of the 'elst' edit list atom. Note that this might cause file rejections when a recipient of the output file doesn't expect this extra padding."
      type: string
      enum:
        - OMNEON
        - NONE
    MovReference:
      description: Always keep the default value (SELF_CONTAINED) for this setting.
      type: string
      enum:
        - SELF_CONTAINED
        - EXTERNAL
    Mp4Settings:
      description: These settings relate to your MP4 output container. You can create audio only outputs with this container. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/supported-codecs-containers-audio-only.html#output-codecs-and-containers-supported-for-audio-only.
      type: object
      properties:
        AudioDuration:
          $ref: "#/components/schemas/CmfcAudioDuration"
          description: Specify this setting only when your output will be consumed by a downstream repackaging workflow that is sensitive to very small duration differences between video and audio. For this situation, choose Match video duration. In all other cases, keep the default value, Default codec duration. When you choose Match video duration, MediaConvert pads the output audio streams with silence or trims them to ensure that the total duration of each audio stream is at least as long as the total duration of the video stream. After padding or trimming, the audio stream duration is no more than one frame longer than the video stream. MediaConvert applies audio padding or trimming only to the end of the last segment of the output. For unsegmented outputs, MediaConvert adds padding only to the end of the file. When you keep the default value, any minor discrepancies between audio and video duration will depend on your output audio codec.
        C2paManifest:
          $ref: "#/components/schemas/Mp4C2paManifest"
          description: When enabled, a C2PA compliant manifest will be generated, signed and embeded in the output. For more information on C2PA, see https://c2pa.org/specifications/specifications/2.1/index.html
        CertificateSecret:
          $ref: "#/components/schemas/__stringMin1Max2048PatternArnAZSecretsmanagerWD12SecretAZAZ09"
          description: "Specify the name or ARN of the AWS Secrets Manager secret that contains your C2PA public certificate chain in PEM format. Provide a valid secret name or ARN. Note that your MediaConvert service role must allow access to this secret. The public certificate chain is added to the COSE header (x5chain) for signature validation. Include the signer's certificate and all intermediate certificates. Do not include the root certificate. For details on COSE, see: https://opensource.contentauthenticity.org/docs/manifest/signing-manifests"
        CslgAtom:
          $ref: "#/components/schemas/Mp4CslgAtom"
          description: When enabled, file composition times will start at zero, composition times in the 'ctts' (composition time to sample) box for B-frames will be negative, and a 'cslg' (composition shift least greatest) box will be included per 14496-1 amendment 1. This improves compatibility with Apple players and tools.
        CttsVersion:
          $ref: "#/components/schemas/__integerMin0Max1"
          description: Ignore this setting unless compliance to the CTTS box version specification matters in your workflow. Specify a value of 1 to set your CTTS box version to 1 and make your output compliant with the specification. When you specify a value of 1, you must also set CSLG atom to the value INCLUDE. Keep the default value 0 to set your CTTS box version to 0. This can provide backward compatibility for some players and packagers.
        FreeSpaceBox:
          $ref: "#/components/schemas/Mp4FreeSpaceBox"
          description: Inserts a free-space box immediately after the moov box.
        MoovPlacement:
          $ref: "#/components/schemas/Mp4MoovPlacement"
          description: "To place the MOOV atom at the beginning of your output, which is useful for progressive downloading: Leave blank or choose Progressive download. To place the MOOV at the end of your output: Choose Normal."
        Mp4MajorBrand:
          $ref: "#/components/schemas/__string"
          description: Overrides the "Major Brand" field in the output file. Usually not necessary to specify.
        SigningKmsKey:
          $ref: "#/components/schemas/__stringMin1PatternArnAwsUsGovCnKmsAZ26EastWestCentralNorthSouthEastWest1912D12KeyAFAF098AFAF094AFAF094AFAF094AFAF0912MrkAFAF0932"
          description: Specify the ID or ARN of the AWS KMS key used to sign the C2PA manifest in your MP4 output. Provide a valid KMS key ARN. Note that your MediaConvert service role must allow access to this key.
    Mp4C2paManifest:
      description: When enabled, a C2PA compliant manifest will be generated, signed and embeded in the output. For more information on C2PA, see https://c2pa.org/specifications/specifications/2.1/index.html
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    Mp4CslgAtom:
      description: When enabled, file composition times will start at zero, composition times in the 'ctts' (composition time to sample) box for B-frames will be negative, and a 'cslg' (composition shift least greatest) box will be included per 14496-1 amendment 1. This improves compatibility with Apple players and tools.
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    __integerMin0Max1:
      type: integer
      minimum: 0
      maximum: 1
    Mp4FreeSpaceBox:
      description: Inserts a free-space box immediately after the moov box.
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    Mp4MoovPlacement:
      description: "To place the MOOV atom at the beginning of your output, which is useful for progressive downloading: Leave blank or choose Progressive download. To place the MOOV at the end of your output: Choose Normal."
      type: string
      enum:
        - PROGRESSIVE_DOWNLOAD
        - NORMAL
    MpdSettings:
      description: These settings relate to the fragmented MP4 container for the segments in your DASH outputs.
      type: object
      properties:
        AccessibilityCaptionHints:
          $ref: "#/components/schemas/MpdAccessibilityCaptionHints"
          description: "Optional. Choose Include to have MediaConvert mark up your DASH manifest with elements for embedded 608 captions. This markup isn't generally required, but some video players require it to discover and play embedded 608 captions. Keep the default value, Exclude, to leave these elements out. When you enable this setting, this is the markup that MediaConvert includes in your manifest:"
        AudioDuration:
          $ref: "#/components/schemas/MpdAudioDuration"
          description: Specify this setting only when your output will be consumed by a downstream repackaging workflow that is sensitive to very small duration differences between video and audio. For this situation, choose Match video duration. In all other cases, keep the default value, Default codec duration. When you choose Match video duration, MediaConvert pads the output audio streams with silence or trims them to ensure that the total duration of each audio stream is at least as long as the total duration of the video stream. After padding or trimming, the audio stream duration is no more than one frame longer than the video stream. MediaConvert applies audio padding or trimming only to the end of the last segment of the output. For unsegmented outputs, MediaConvert adds padding only to the end of the file. When you keep the default value, any minor discrepancies between audio and video duration will depend on your output audio codec.
        C2paManifest:
          $ref: "#/components/schemas/MpdC2paManifest"
          description: When enabled, a C2PA compliant manifest will be generated, signed and embeded in the output. For more information on C2PA, see https://c2pa.org/specifications/specifications/2.1/index.html
        CaptionContainerType:
          $ref: "#/components/schemas/MpdCaptionContainerType"
          description: Use this setting only in DASH output groups that include sidecar TTML, IMSC or WEBVTT captions. You specify sidecar captions in a separate output from your audio and video. Choose Raw for captions in a single XML file in a raw container. Choose Fragmented MPEG-4 for captions in XML format contained within fragmented MP4 files. This set of fragmented MP4 files is separate from your video and audio fragmented MP4 files.
        CertificateSecret:
          $ref: "#/components/schemas/__stringMin1Max2048PatternArnAZSecretsmanagerWD12SecretAZAZ09"
          description: "Specify the name or ARN of the AWS Secrets Manager secret that contains your C2PA public certificate chain in PEM format. Provide a valid secret name or ARN. Note that your MediaConvert service role must allow access to this secret. The public certificate chain is added to the COSE header (x5chain) for signature validation. Include the signer's certificate and all intermediate certificates. Do not include the root certificate. For details on COSE, see: https://opensource.contentauthenticity.org/docs/manifest/signing-manifests"
        KlvMetadata:
          $ref: "#/components/schemas/MpdKlvMetadata"
          description: "To include key-length-value metadata in this output: Set KLV metadata insertion to Passthrough. MediaConvert reads KLV metadata present in your input and writes each instance to a separate event message box in the output, according to MISB ST1910.1. To exclude this KLV metadata: Set KLV metadata insertion to None or leave blank."
        ManifestMetadataSignaling:
          $ref: "#/components/schemas/MpdManifestMetadataSignaling"
          description: To add an InbandEventStream element in your output MPD manifest for each type of event message, set Manifest metadata signaling to Enabled. For ID3 event messages, the InbandEventStream element schemeIdUri will be same value that you specify for ID3 metadata scheme ID URI. For SCTE35 event messages, the InbandEventStream element schemeIdUri will be "urn:scte:scte35:2013:bin". To leave these elements out of your output MPD manifest, set Manifest metadata signaling to Disabled. To enable Manifest metadata signaling, you must also set SCTE-35 source to Passthrough, ESAM SCTE-35 to insert, or ID3 metadata to Passthrough.
        Scte35Esam:
          $ref: "#/components/schemas/MpdScte35Esam"
          description: Use this setting only when you specify SCTE-35 markers from ESAM. Choose INSERT to put SCTE-35 markers in this output at the insertion points that you specify in an ESAM XML document. Provide the document in the setting SCC XML.
        Scte35Source:
          $ref: "#/components/schemas/MpdScte35Source"
          description: Ignore this setting unless you have SCTE-35 markers in your input video file. Choose Passthrough if you want SCTE-35 markers that appear in your input to also appear in this output. Choose None if you don't want those SCTE-35 markers in this output.
        SigningKmsKey:
          $ref: "#/components/schemas/__stringMin1PatternArnAwsUsGovCnKmsAZ26EastWestCentralNorthSouthEastWest1912D12KeyAFAF098AFAF094AFAF094AFAF094AFAF0912MrkAFAF0932"
          description: Specify the ID or ARN of the AWS KMS key used to sign the C2PA manifest in your MP4 output. Provide a valid KMS key ARN. Note that your MediaConvert service role must allow access to this key.
        TimedMetadata:
          $ref: "#/components/schemas/MpdTimedMetadata"
          description: "To include ID3 metadata in this output: Set ID3 metadata to Passthrough. Specify this ID3 metadata in Custom ID3 metadata inserter. MediaConvert writes each instance of ID3 metadata in a separate Event Message (eMSG) box. To exclude this ID3 metadata: Set ID3 metadata to None or leave blank."
        TimedMetadataBoxVersion:
          $ref: "#/components/schemas/MpdTimedMetadataBoxVersion"
          description: Specify the event message box (eMSG) version for ID3 timed metadata in your output. For more information, see ISO/IEC 23009-1:2022 section 5.10.3.3.3 Syntax. Leave blank to use the default value Version 0. When you specify Version 1, you must also set ID3 metadata to Passthrough.
        TimedMetadataSchemeIdUri:
          $ref: "#/components/schemas/__stringMax1000"
          description: "Specify the event message box (eMSG) scheme ID URI for ID3 timed metadata in your output. For more information, see ISO/IEC 23009-1:2022 section 5.10.3.3.4 Semantics. Leave blank to use the default value: https://aomedia.org/emsg/ID3 When you specify a value for ID3 metadata scheme ID URI, you must also set ID3 metadata to Passthrough."
        TimedMetadataValue:
          $ref: "#/components/schemas/__stringMax1000"
          description: Specify the event message box (eMSG) value for ID3 timed metadata in your output. For more information, see ISO/IEC 23009-1:2022 section 5.10.3.3.4 Semantics. When you specify a value for ID3 Metadata Value, you must also set ID3 metadata to Passthrough.
    MpdAccessibilityCaptionHints:
      description: "Optional. Choose Include to have MediaConvert mark up your DASH manifest with elements for embedded 608 captions. This markup isn't generally required, but some video players require it to discover and play embedded 608 captions. Keep the default value, Exclude, to leave these elements out. When you enable this setting, this is the markup that MediaConvert includes in your manifest:"
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    MpdAudioDuration:
      description: Specify this setting only when your output will be consumed by a downstream repackaging workflow that is sensitive to very small duration differences between video and audio. For this situation, choose Match video duration. In all other cases, keep the default value, Default codec duration. When you choose Match video duration, MediaConvert pads the output audio streams with silence or trims them to ensure that the total duration of each audio stream is at least as long as the total duration of the video stream. After padding or trimming, the audio stream duration is no more than one frame longer than the video stream. MediaConvert applies audio padding or trimming only to the end of the last segment of the output. For unsegmented outputs, MediaConvert adds padding only to the end of the file. When you keep the default value, any minor discrepancies between audio and video duration will depend on your output audio codec.
      type: string
      enum:
        - DEFAULT_CODEC_DURATION
        - MATCH_VIDEO_DURATION
    MpdC2paManifest:
      description: When enabled, a C2PA compliant manifest will be generated, signed and embeded in the output. For more information on C2PA, see https://c2pa.org/specifications/specifications/2.1/index.html
      type: string
      enum:
        - INCLUDE
        - EXCLUDE
    MpdCaptionContainerType:
      description: Use this setting only in DASH output groups that include sidecar TTML, IMSC or WEBVTT captions. You specify sidecar captions in a separate output from your audio and video. Choose Raw for captions in a single XML file in a raw container. Choose Fragmented MPEG-4 for captions in XML format contained within fragmented MP4 files. This set of fragmented MP4 files is separate from your video and audio fragmented MP4 files.
      type: string
      enum:
        - RAW
        - FRAGMENTED_MP4
    MpdKlvMetadata:
      description: "To include key-length-value metadata in this output: Set KLV metadata insertion to Passthrough. MediaConvert reads KLV metadata present in your input and writes each instance to a separate event message box in the output, according to MISB ST1910.1. To exclude this KLV metadata: Set KLV metadata insertion to None or leave blank."
      type: string
      enum:
        - NONE
        - PASSTHROUGH
    MpdManifestMetadataSignaling:
      description: To add an InbandEventStream element in your output MPD manifest for each type of event message, set Manifest metadata signaling to Enabled. For ID3 event messages, the InbandEventStream element schemeIdUri will be same value that you specify for ID3 metadata scheme ID URI. For SCTE35 event messages, the InbandEventStream element schemeIdUri will be "urn:scte:scte35:2013:bin". To leave these elements out of your output MPD manifest, set Manifest metadata signaling to Disabled. To enable Manifest metadata signaling, you must also set SCTE-35 source to Passthrough, ESAM SCTE-35 to insert, or ID3 metadata to Passthrough.
      type: string
      enum:
        - ENABLED
        - DISABLED
    MpdScte35Esam:
      description: Use this setting only when you specify SCTE-35 markers from ESAM. Choose INSERT to put SCTE-35 markers in this output at the insertion points that you specify in an ESAM XML document. Provide the document in the setting SCC XML.
      type: string
      enum:
        - INSERT
        - NONE
    MpdScte35Source:
      description: Ignore this setting unless you have SCTE-35 markers in your input video file. Choose Passthrough if you want SCTE-35 markers that appear in your input to also appear in this output. Choose None if you don't want those SCTE-35 markers in this output.
      type: string
      enum:
        - PASSTHROUGH
        - NONE
    MpdTimedMetadata:
      description: "To include ID3 metadata in this output: Set ID3 metadata to Passthrough. Specify this ID3 metadata in Custom ID3 metadata inserter. MediaConvert writes each instance of ID3 metadata in a separate Event Message (eMSG) box. To exclude this ID3 metadata: Set ID3 metadata to None or leave blank."
      type: string
      enum:
        - PASSTHROUGH
        - NONE
    MpdTimedMetadataBoxVersion:
      description: Specify the event message box (eMSG) version for ID3 timed metadata in your output. For more information, see ISO/IEC 23009-1:2022 section 5.10.3.3.3 Syntax. Leave blank to use the default value Version 0. When you specify Version 1, you must also set ID3 metadata to Passthrough.
      type: string
      enum:
        - VERSION_0
        - VERSION_1
    MxfSettings:
      description: These settings relate to your MXF output container.
      type: object
      properties:
        AfdSignaling:
          $ref: "#/components/schemas/MxfAfdSignaling"
          description: "Optional. When you have AFD signaling set up in your output video stream, use this setting to choose whether to also include it in the MXF wrapper. Choose Don't copy to exclude AFD signaling from the MXF wrapper. Choose Copy from video stream to copy the AFD values from the video stream for this output to the MXF wrapper. Regardless of which option you choose, the AFD values remain in the video stream. Related settings: To set up your output to include or exclude AFD values, see AfdSignaling, under VideoDescription. On the console, find AFD signaling under the output's video encoding settings."
        Profile:
          $ref: "#/components/schemas/MxfProfile"
          description: Specify the MXF profile, also called shim, for this output. To automatically select a profile according to your output video codec and resolution, leave blank. For a list of codecs supported with each MXF profile, see https://docs.aws.amazon.com/mediaconvert/latest/ug/codecs-supported-with-each-mxf-profile.html. For more information about the automatic selection behavior, see https://docs.aws.amazon.com/mediaconvert/latest/ug/default-automatic-selection-of-mxf-profiles.html.
        UncompressedAudioWrapping:
          $ref: "#/components/schemas/MxfUncompressedAudioWrapping"
          description: "Choose the audio frame wrapping mode for PCM tracks in MXF outputs. AUTO (default): Uses codec-appropriate defaults - BWF for H.264/AVC, AES3 for MPEG2/XDCAM. AES3: Use AES3 frame wrapping with SMPTE-compliant descriptors. This setting only takes effect when the MXF profile is OP1a."
        XavcProfileSettings:
          $ref: "#/components/schemas/MxfXavcProfileSettings"
          description: Specify the XAVC profile settings for MXF outputs when you set your MXF profile to XAVC.
    MxfAfdSignaling:
      description: "Optional. When you have AFD signaling set up in your output video stream, use this setting to choose whether to also include it in the MXF wrapper. Choose Don't copy to exclude AFD signaling from the MXF wrapper. Choose Copy from video stream to copy the AFD values from the video stream for this output to the MXF wrapper. Regardless of which option you choose, the AFD values remain in the video stream. Related settings: To set up your output to include or exclude AFD values, see AfdSignaling, under VideoDescription. On the console, find AFD signaling under the output's video encoding settings."
      type: string
      enum:
        - NO_COPY
        - COPY_FROM_VIDEO
    MxfProfile:
      description: Specify the MXF profile, also called shim, for this output. To automatically select a profile according to your output video codec and resolution, leave blank. For a list of codecs supported with each MXF profile, see https://docs.aws.amazon.com/mediaconvert/latest/ug/codecs-supported-with-each-mxf-profile.html. For more information about the automatic selection behavior, see https://docs.aws.amazon.com/mediaconvert/latest/ug/default-automatic-selection-of-mxf-profiles.html.
      type: string
      enum:
        - D_10
        - XDCAM
        - OP1A
        - XAVC
        - XDCAM_RDD9
    MxfUncompressedAudioWrapping:
      description: "Choose the audio frame wrapping mode for PCM tracks in MXF outputs. AUTO (default): Uses codec-appropriate defaults - BWF for H.264/AVC, AES3 for MPEG2/XDCAM. AES3: Use AES3 frame wrapping with SMPTE-compliant descriptors. This setting only takes effect when the MXF profile is OP1a."
      type: string
      enum:
        - AUTO
        - AES3
    MxfXavcProfileSettings:
      description: Specify the XAVC profile settings for MXF outputs when you set your MXF profile to XAVC.
      type: object
      properties:
        DurationMode:
          $ref: "#/components/schemas/MxfXavcDurationMode"
          description: To create an output that complies with the XAVC file format guidelines for interoperability, keep the default value, Drop frames for compliance. To include all frames from your input in this output, keep the default setting, Allow any duration. The number of frames that MediaConvert excludes when you set this to Drop frames for compliance depends on the output frame rate and duration.
        MaxAncDataSize:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify a value for this setting only for outputs that you set up with one of these two XAVC profiles: XAVC HD Intra CBG or XAVC 4K Intra CBG. Specify the amount of space in each frame that the service reserves for ancillary data, such as teletext captions. The default value for this setting is 1492 bytes per frame. This should be sufficient to prevent overflow unless you have multiple pages of teletext captions data. If you have a large amount of teletext data, specify a larger number."
    MxfXavcDurationMode:
      description: To create an output that complies with the XAVC file format guidelines for interoperability, keep the default value, Drop frames for compliance. To include all frames from your input in this output, keep the default setting, Allow any duration. The number of frames that MediaConvert excludes when you set this to Drop frames for compliance depends on the output frame rate and duration.
      type: string
      enum:
        - ALLOW_ANY_DURATION
        - DROP_FRAMES_FOR_COMPLIANCE
    __stringMax256:
      type: string
      maxLength: 256
    OutputSettings:
      description: Specific settings for this type of output.
      type: object
      properties:
        HlsSettings:
          $ref: "#/components/schemas/HlsSettings"
          description: Settings for HLS output groups
    HlsSettings:
      description: Settings for HLS output groups
      type: object
      properties:
        AudioGroupId:
          $ref: "#/components/schemas/__string"
          description: Specifies the group to which the audio rendition belongs.
        AudioOnlyContainer:
          $ref: "#/components/schemas/HlsAudioOnlyContainer"
          description: Use this setting only in audio-only outputs. Choose MPEG-2 Transport Stream (M2TS) to create a file in an MPEG2-TS container. Keep the default value Automatic to create an audio-only file in a raw container. Regardless of the value that you specify here, if this output has video, the service will place the output into an MPEG2-TS container.
        AudioRenditionSets:
          $ref: "#/components/schemas/__string"
          description: List all the audio groups that are used with the video output stream. Input all the audio GROUP-IDs that are associated to the video, separate by ','.
        AudioTrackType:
          $ref: "#/components/schemas/HlsAudioTrackType"
          description: "Four types of audio-only tracks are supported: Audio-Only Variant Stream The client can play back this audio-only stream instead of video in low-bandwidth scenarios. Represented as an EXT-X-STREAM-INF in the HLS manifest. Alternate Audio, Auto Select, Default Alternate rendition that the client should try to play back by default. Represented as an EXT-X-MEDIA in the HLS manifest with DEFAULT=YES, AUTOSELECT=YES Alternate Audio, Auto Select, Not Default Alternate rendition that the client may try to play back by default. Represented as an EXT-X-MEDIA in the HLS manifest with DEFAULT=NO, AUTOSELECT=YES Alternate Audio, not Auto Select Alternate rendition that the client will not try to play back by default. Represented as an EXT-X-MEDIA in the HLS manifest with DEFAULT=NO, AUTOSELECT=NO"
        DescriptiveVideoServiceFlag:
          $ref: "#/components/schemas/HlsDescriptiveVideoServiceFlag"
          description: Specify whether to flag this audio track as descriptive video service (DVS) in your HLS parent manifest. When you choose Flag, MediaConvert includes the parameter CHARACTERISTICS="public.accessibility.describes-video" in the EXT-X-MEDIA entry for this track. When you keep the default choice, Don't flag, MediaConvert leaves this parameter out. The DVS flag can help with accessibility on Apple devices. For more information, see the Apple documentation.
        IFrameOnlyManifest:
          $ref: "#/components/schemas/HlsIFrameOnlyManifest"
          description: "Generate a variant manifest that lists only the I-frames for this rendition. You might use this manifest as part of a workflow that creates preview functions for your video. MediaConvert adds both the I-frame only variant manifest and the regular variant manifest to the multivariant manifest. To have MediaConvert write a variant manifest that references I-frames from your output content using EXT-X-BYTERANGE tags: Choose Include. To have MediaConvert output I-frames as single frame TS files and a corresponding variant manifest that references them: Choose Include as TS. When you don't need the I-frame only variant manifest: Keep the default value, Exclude."
        SegmentModifier:
          $ref: "#/components/schemas/__string"
          description: Use this setting to add an identifying string to the filename of each segment. The service adds this string between the name modifier and segment index number. You can use format identifiers in the string. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/using-variables-in-your-job-settings.html
    HlsAudioOnlyContainer:
      description: Use this setting only in audio-only outputs. Choose MPEG-2 Transport Stream (M2TS) to create a file in an MPEG2-TS container. Keep the default value Automatic to create a raw audio-only file with no container. Regardless of the value that you specify here, if this output has video, the service will place outputs into an MPEG2-TS container.
      type: string
      enum:
        - AUTOMATIC
        - M2TS
    HlsAudioTrackType:
      description: "Four types of audio-only tracks are supported: Audio-Only Variant Stream The client can play back this audio-only stream instead of video in low-bandwidth scenarios. Represented as an EXT-X-STREAM-INF in the HLS manifest. Alternate Audio, Auto Select, Default Alternate rendition that the client should try to play back by default. Represented as an EXT-X-MEDIA in the HLS manifest with DEFAULT=YES, AUTOSELECT=YES Alternate Audio, Auto Select, Not Default Alternate rendition that the client may try to play back by default. Represented as an EXT-X-MEDIA in the HLS manifest with DEFAULT=NO, AUTOSELECT=YES Alternate Audio, not Auto Select Alternate rendition that the client will not try to play back by default. Represented as an EXT-X-MEDIA in the HLS manifest with DEFAULT=NO, AUTOSELECT=NO"
      type: string
      enum:
        - ALTERNATE_AUDIO_AUTO_SELECT_DEFAULT
        - ALTERNATE_AUDIO_AUTO_SELECT
        - ALTERNATE_AUDIO_NOT_AUTO_SELECT
        - AUDIO_ONLY_VARIANT_STREAM
    HlsDescriptiveVideoServiceFlag:
      description: Specify whether to flag this audio track as descriptive video service (DVS) in your HLS parent manifest. When you choose Flag, MediaConvert includes the parameter CHARACTERISTICS="public.accessibility.describes-video" in the EXT-X-MEDIA entry for this track. When you keep the default choice, Don't flag, MediaConvert leaves this parameter out. The DVS flag can help with accessibility on Apple devices. For more information, see the Apple documentation.
      type: string
      enum:
        - DONT_FLAG
        - FLAG
    HlsIFrameOnlyManifest:
      description: "Generate a variant manifest that lists only the I-frames for this rendition. You might use this manifest as part of a workflow that creates preview functions for your video. MediaConvert adds both the I-frame only variant manifest and the regular variant manifest to the multivariant manifest. To have MediaConvert write a variant manifest that references I-frames from your output content using EXT-X-BYTERANGE tags: Choose Include. To have MediaConvert output I-frames as single frame TS files and a corresponding variant manifest that references them: Choose Include as TS. When you don't need the I-frame only variant manifest: Keep the default value, Exclude."
      type: string
      enum:
        - INCLUDE
        - INCLUDE_AS_TS
        - EXCLUDE
    __stringMin0:
      type: string
      minLength: 0
    VideoDescription:
      description: Settings related to video encoding of your output. The specific video settings depend on the video codec that you choose.
      type: object
      properties:
        AfdSignaling:
          $ref: "#/components/schemas/AfdSignaling"
          description: This setting only applies to H.264, H.265, and MPEG2 outputs. Use Insert AFD signaling to specify whether the service includes AFD values in the output video data and what those values are. * Choose None to remove all AFD values from this output. * Choose Fixed to ignore input AFD values and instead encode the value specified in the job. * Choose Auto to calculate output AFD values based on the input AFD scaler data.
        AntiAlias:
          $ref: "#/components/schemas/AntiAlias"
          description: The anti-alias filter is automatically applied to all outputs. The service no longer accepts the value DISABLED for AntiAlias. If you specify that in your job, the service will ignore the setting.
        ChromaPositionMode:
          $ref: "#/components/schemas/ChromaPositionMode"
          description: "Specify the chroma sample positioning metadata for your H.264 or H.265 output. To have MediaConvert automatically determine chroma positioning: We recommend that you keep the default value, Auto. To specify center positioning: Choose Force center. To specify top left positioning: Choose Force top left."
        CodecSettings:
          $ref: "#/components/schemas/VideoCodecSettings"
          description: Video codec settings contains the group of settings related to video encoding. The settings in this group vary depending on the value that you choose for Video codec. For each codec enum that you choose, define the corresponding settings object. The following lists the codec enum, settings object pairs. * AV1, Av1Settings * AVC_INTRA, AvcIntraSettings * FRAME_CAPTURE, FrameCaptureSettings * GIF, GifSettings * H_264, H264Settings * H_265, H265Settings * MPEG2, Mpeg2Settings * PRORES, ProresSettings * UNCOMPRESSED, UncompressedSettings * VC3, Vc3Settings * VP8, Vp8Settings * VP9, Vp9Settings * XAVC, XavcSettings
        ColorMetadata:
          $ref: "#/components/schemas/ColorMetadata"
          description: Choose Insert for this setting to include color metadata in this output. Choose Ignore to exclude color metadata from this output. If you don't specify a value, the service sets this to Insert by default.
        Crop:
          $ref: "#/components/schemas/Rectangle"
          description: Use Cropping selection to specify the video area that the service will include in the output video frame.
        DropFrameTimecode:
          $ref: "#/components/schemas/DropFrameTimecode"
          description: Applies only to 29.97 fps outputs. When this feature is enabled, the service will use drop-frame timecode on outputs. If it is not possible to use drop-frame timecode, the system will fall back to non-drop-frame. This setting is enabled by default when Timecode insertion or Timecode track is enabled.
        FixedAfd:
          $ref: "#/components/schemas/__integerMin0Max15"
          description: Applies only if you set AFD Signaling to Fixed. Use Fixed to specify a four-bit AFD value which the service will write on all frames of this video output.
        Height:
          $ref: "#/components/schemas/__integerMin32Max8192"
          description: "Use Height to define the video resolution height, in pixels, for this output. To use the same resolution as your input: Leave both Width and Height blank. To evenly scale from your input resolution: Leave Height blank and enter a value for Width. For example, if your input is 1920x1080 and you set Width to 1280, your output will be 1280x720."
        Position:
          $ref: "#/components/schemas/Rectangle"
          description: Use Selection placement to define the video area in your output frame. The area outside of the rectangle that you specify here is black.
        RespondToAfd:
          $ref: "#/components/schemas/RespondToAfd"
          description: Use Respond to AFD to specify how the service changes the video itself in response to AFD values in the input. * Choose Respond to clip the input video frame according to the AFD value, input display aspect ratio, and output display aspect ratio. * Choose Passthrough to include the input AFD values. Do not choose this when AfdSignaling is set to NONE. A preferred implementation of this workflow is to set RespondToAfd to and set AfdSignaling to AUTO. * Choose None to remove all input AFD values from this output.
        ScalingBehavior:
          $ref: "#/components/schemas/ScalingBehavior"
          description: Specify the video Scaling behavior when your output has a different resolution than your input. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/video-scaling.html Select Smart Cropping using Elemental Inference as your scaling behavior to have Elemental Inference automatically crop your video. Smart Crop requires a vertical output aspect ratio (1:1 is the widest aspect ratio supported).
        Sharpness:
          $ref: "#/components/schemas/__integerMin0Max100"
          description: Use Sharpness setting to specify the strength of anti-aliasing. This setting changes the width of the anti-alias filter kernel used for scaling. Sharpness only applies if your output resolution is different from your input resolution. 0 is the softest setting, 100 the sharpest, and 50 recommended for most content.
        TimecodeInsertion:
          $ref: "#/components/schemas/VideoTimecodeInsertion"
          description: Applies only to H.264, H.265, MPEG2, and ProRes outputs. Only enable Timecode insertion when the input frame rate is identical to the output frame rate. To include timecodes in this output, set Timecode insertion to PIC_TIMING_SEI. To leave them out, set it to DISABLED. Default is DISABLED. When the service inserts timecodes in an output, by default, it uses any embedded timecodes from the input. If none are present, the service will set the timecode for the first output frame to zero. To change this default behavior, adjust the settings under Timecode configuration. In the console, these settings are located under Job > Job settings > Timecode configuration. Note - Timecode source under input settings does not affect the timecodes that are inserted in the output. Source under Job settings > Timecode configuration does.
        TimecodeTrack:
          $ref: "#/components/schemas/TimecodeTrack"
          description: "To include a timecode track in your MP4 output: Choose Enabled. MediaConvert writes the timecode track in the Null Media Header box (NMHD), without any timecode text formatting information. You can also specify dropframe or non-dropframe timecode under the Drop Frame Timecode setting. To not include a timecode track: Keep the default value, Disabled."
        VideoPreprocessors:
          $ref: "#/components/schemas/VideoPreprocessor"
          description: Find additional transcoding features under Preprocessors. Enable the features at each output individually. These features are disabled by default.
        Width:
          $ref: "#/components/schemas/__integerMin32Max8192"
          description: "Use Width to define the video resolution width, in pixels, for this output. To use the same resolution as your input: Leave both Width and Height blank. To evenly scale from your input resolution: Leave Width blank and enter a value for Height. For example, if your input is 1920x1080 and you set Height to 720, your output will be 1280x720."
    AfdSignaling:
      description: This setting only applies to H.264, H.265, and MPEG2 outputs. Use Insert AFD signaling to specify whether the service includes AFD values in the output video data and what those values are. * Choose None to remove all AFD values from this output. * Choose Fixed to ignore input AFD values and instead encode the value specified in the job. * Choose Auto to calculate output AFD values based on the input AFD scaler data.
      type: string
      enum:
        - NONE
        - AUTO
        - FIXED
    AntiAlias:
      description: The anti-alias filter is automatically applied to all outputs. The service no longer accepts the value DISABLED for AntiAlias. If you specify that in your job, the service will ignore the setting.
      type: string
      enum:
        - DISABLED
        - ENABLED
    ChromaPositionMode:
      description: "Specify the chroma sample positioning metadata for your H.264 or H.265 output. To have MediaConvert automatically determine chroma positioning: We recommend that you keep the default value, Auto. To specify center positioning: Choose Force center. To specify top left positioning: Choose Force top left."
      type: string
      enum:
        - AUTO
        - FORCE_CENTER
        - FORCE_TOP_LEFT
    VideoCodecSettings:
      description: Video codec settings contains the group of settings related to video encoding. The settings in this group vary depending on the value that you choose for Video codec. For each codec enum that you choose, define the corresponding settings object. The following lists the codec enum, settings object pairs. * AV1, Av1Settings * AVC_INTRA, AvcIntraSettings * FRAME_CAPTURE, FrameCaptureSettings * GIF, GifSettings * H_264, H264Settings * H_265, H265Settings * MPEG2, Mpeg2Settings * PRORES, ProresSettings * UNCOMPRESSED, UncompressedSettings * VC3, Vc3Settings * VP8, Vp8Settings * VP9, Vp9Settings * XAVC, XavcSettings
      type: object
      properties:
        Av1Settings:
          $ref: "#/components/schemas/Av1Settings"
          description: Required when you set Codec, under VideoDescription>CodecSettings to the value AV1.
        AvcIntraSettings:
          $ref: "#/components/schemas/AvcIntraSettings"
          description: Required when you choose AVC-Intra for your output video codec. For more information about the AVC-Intra settings, see the relevant specification. For detailed information about SD and HD in AVC-Intra, see https://ieeexplore.ieee.org/document/7290936. For information about 4K/2K in AVC-Intra, see https://pro-av.panasonic.net/en/avc-ultra/AVC-ULTRAoverview.pdf.
        Codec:
          $ref: "#/components/schemas/VideoCodec"
          description: "Specifies the video codec. This must be equal to one of the enum values defined by the object VideoCodec. To passthrough the video stream of your input without any video encoding: Choose Passthrough. More information about passthrough codec support and job settings requirements, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/video-passthrough-feature-restrictions.html"
        FrameCaptureSettings:
          $ref: "#/components/schemas/FrameCaptureSettings"
          description: Required when you set Codec to the value FRAME_CAPTURE.
        GifSettings:
          $ref: "#/components/schemas/GifSettings"
          description: Required when you set (Codec) under (VideoDescription)>(CodecSettings) to the value GIF
        H264Settings:
          $ref: "#/components/schemas/H264Settings"
          description: Required when you set Codec to the value H_264.
        H265Settings:
          $ref: "#/components/schemas/H265Settings"
          description: Settings for H265 codec
        Mpeg2Settings:
          $ref: "#/components/schemas/Mpeg2Settings"
          description: Required when you set Codec to the value MPEG2.
        PassthroughSettings:
          $ref: "#/components/schemas/PassthroughSettings"
          description: Optional settings when you set Codec to the value Passthrough.
        ProresSettings:
          $ref: "#/components/schemas/ProresSettings"
          description: Required when you set Codec to the value PRORES.
        UncompressedSettings:
          $ref: "#/components/schemas/UncompressedSettings"
          description: Required when you set Codec, under VideoDescription>CodecSettings to the value UNCOMPRESSED.
        Vc3Settings:
          $ref: "#/components/schemas/Vc3Settings"
          description: Required when you set Codec to the value VC3
        Vp8Settings:
          $ref: "#/components/schemas/Vp8Settings"
          description: Required when you set Codec to the value VP8.
        Vp9Settings:
          $ref: "#/components/schemas/Vp9Settings"
          description: Required when you set Codec to the value VP9.
        XavcSettings:
          $ref: "#/components/schemas/XavcSettings"
          description: Required when you set Codec to the value XAVC.
    Av1Settings:
      description: Required when you set Codec, under VideoDescription>CodecSettings to the value AV1.
      type: object
      properties:
        AdaptiveQuantization:
          $ref: "#/components/schemas/Av1AdaptiveQuantization"
          description: Specify the strength of any adaptive quantization filters that you enable. The value that you choose here applies to Spatial adaptive quantization.
        BitDepth:
          $ref: "#/components/schemas/Av1BitDepth"
          description: Specify the Bit depth. You can choose 8-bit or 10-bit.
        FilmGrainSynthesis:
          $ref: "#/components/schemas/Av1FilmGrainSynthesis"
          description: Film grain synthesis replaces film grain present in your content with similar quality synthesized AV1 film grain. We recommend that you choose Enabled to reduce the bandwidth of your QVBR quality level 5, 6, 7, or 8 outputs. For QVBR quality level 9 or 10 outputs we recommend that you keep the default value, Disabled. When you include Film grain synthesis, you cannot include the Noise reducer preprocessor.
        FramerateControl:
          $ref: "#/components/schemas/Av1FramerateControl"
          description: Use the Framerate setting to specify the frame rate for this output. If you want to keep the same frame rate as the input video, choose Follow source. If you want to do frame rate conversion, choose a frame rate from the dropdown list or choose Custom. The framerates shown in the dropdown list are decimal approximations of fractions. If you choose Custom, specify your frame rate as a fraction.
        FramerateConversionAlgorithm:
          $ref: "#/components/schemas/Av1FramerateConversionAlgorithm"
          description: "Choose the method that you want MediaConvert to use when increasing or decreasing your video's frame rate. For numerically simple conversions, such as 60 fps to 30 fps: We recommend that you keep the default value, Drop duplicate. For numerically complex conversions, to avoid stutter: Choose Interpolate. This results in a smooth picture, but might introduce undesirable video artifacts. For complex frame rate conversions, especially if your source video has already been converted from its original cadence: Choose FrameFormer to do motion-compensated interpolation. FrameFormer uses the best conversion method frame by frame. Note that using FrameFormer increases the transcoding time and incurs a significant add-on cost. When you choose FrameFormer, your input video resolution must be at least 128x96. To create an output with the same number of frames as your input: Choose Maintain frame count. When you do, MediaConvert will not drop, interpolate, add, or otherwise change the frame count from your input to your output. Note that since the frame count is maintained, the duration of your output will become shorter at higher frame rates and longer at lower frame rates."
        FramerateDenominator:
          $ref: "#/components/schemas/__integerMin1Max2147483647"
          description: When you use the API for transcode jobs that use frame rate conversion, specify the frame rate as a fraction. For example, 24000 / 1001 = 23.976 fps. Use FramerateDenominator to specify the denominator of this fraction. In this example, use 1001 for the value of FramerateDenominator. When you use the console for transcode jobs that use frame rate conversion, provide the value as a decimal number for Framerate. In this example, specify 23.976.
        FramerateNumerator:
          $ref: "#/components/schemas/__integerMin1Max2147483647"
          description: When you use the API for transcode jobs that use frame rate conversion, specify the frame rate as a fraction. For example, 24000 / 1001 = 23.976 fps. Use FramerateNumerator to specify the numerator of this fraction. In this example, use 24000 for the value of FramerateNumerator. When you use the console for transcode jobs that use frame rate conversion, provide the value as a decimal number for Framerate. In this example, specify 23.976.
        GopSize:
          $ref: "#/components/schemas/__doubleMin0"
          description: Specify the GOP length (keyframe interval) in frames. With AV1, MediaConvert doesn't support GOP length in seconds. This value must be greater than zero and preferably equal to 1 + ((numberBFrames + 1) * x), where x is an integer value.
        MaxBitrate:
          $ref: "#/components/schemas/__integerMin1000Max1152000000"
          description: Maximum bitrate in bits/second. For example, enter five megabits per second as 5000000. Required when Rate control mode is QVBR.
        NumberBFramesBetweenReferenceFrames:
          $ref: "#/components/schemas/__integerMin0Max15"
          description: Specify from the number of B-frames, in the range of 0-15. For AV1 encoding, we recommend using 7 or 15. Choose a larger number for a lower bitrate and smaller file size; choose a smaller number for better video quality.
        PerFrameMetrics:
          $ref: "#/components/schemas/__listOfFrameMetricType"
          description: "Optionally choose one or more per frame metric reports to generate along with your output. You can use these metrics to analyze your video output according to one or more commonly used image quality metrics. You can specify per frame metrics for output groups or for individual outputs. When you do, MediaConvert writes a CSV (Comma-Separated Values) file to your S3 output destination, named after the output name and metric type. For example: videofile_PSNR.csv Jobs that generate per frame metrics will take longer to complete, depending on the resolution and complexity of your output. For example, some 4K jobs might take up to twice as long to complete. Note that when analyzing the video quality of your output, or when comparing the video quality of multiple different outputs, we generally also recommend a detailed visual review in a controlled environment. You can choose from the following per frame metrics: * PSNR: Peak Signal-to-Noise Ratio * SSIM: Structural Similarity Index Measure * MS_SSIM: Multi-Scale Similarity Index Measure * PSNR_HVS: Peak Signal-to-Noise Ratio, Human Visual System * VMAF: Video Multi-Method Assessment Fusion * QVBR: Quality-Defined Variable Bitrate. This option is only available when your output uses the QVBR rate control mode. * SHOT_CHANGE: Shot Changes"
        QvbrSettings:
          $ref: "#/components/schemas/Av1QvbrSettings"
          description: Settings for quality-defined variable bitrate encoding with the H.265 codec. Use these settings only when you set QVBR for Rate control mode.
        RateControlMode:
          $ref: "#/components/schemas/Av1RateControlMode"
          description: "'With AV1 outputs, for rate control mode, MediaConvert supports only quality-defined variable bitrate (QVBR). You can''t use CBR or VBR.'"
        Slices:
          $ref: "#/components/schemas/__integerMin1Max32"
          description: Specify the number of slices per picture. This value must be 1, 2, 4, 8, 16, or 32. For progressive pictures, this value must be less than or equal to the number of macroblock rows. For interlaced pictures, this value must be less than or equal to half the number of macroblock rows.
        SpatialAdaptiveQuantization:
          $ref: "#/components/schemas/Av1SpatialAdaptiveQuantization"
          description: "Keep the default value, Enabled, to adjust quantization within each frame based on spatial variation of content complexity. When you enable this feature, the encoder uses fewer bits on areas that can sustain more distortion with no noticeable visual degradation and uses more bits on areas where any small distortion will be noticeable. For example, complex textured blocks are encoded with fewer bits and smooth textured blocks are encoded with more bits. Enabling this feature will almost always improve your video quality. Note, though, that this feature doesn't take into account where the viewer's attention is likely to be. If viewers are likely to be focusing their attention on a part of the screen with a lot of complex texture, you might choose to disable this feature. Related setting: When you enable spatial adaptive quantization, set the value for Adaptive quantization depending on your content. For homogeneous content, such as cartoons and video games, set it to Low. For content with a wider variety of textures, set it to High or Higher."
    Av1AdaptiveQuantization:
      description: Specify the strength of any adaptive quantization filters that you enable. The value that you choose here applies to Spatial adaptive quantization.
      type: string
      enum:
        - "OFF"
        - LOW
        - MEDIUM
        - HIGH
        - HIGHER
        - MAX
    Av1BitDepth:
      description: Specify the Bit depth. You can choose 8-bit or 10-bit.
      type: string
      enum:
        - BIT_8
        - BIT_10
    Av1FilmGrainSynthesis:
      description: Film grain synthesis replaces film grain present in your content with similar quality synthesized AV1 film grain. We recommend that you choose Enabled to reduce the bandwidth of your QVBR quality level 5, 6, 7, or 8 outputs. For QVBR quality level 9 or 10 outputs we recommend that you keep the default value, Disabled. When you include Film grain synthesis, you cannot include the Noise reducer preprocessor.
      type: string
      enum:
        - DISABLED
        - ENABLED
    Av1FramerateControl:
      description: Use the Framerate setting to specify the frame rate for this output. If you want to keep the same frame rate as the input video, choose Follow source. If you want to do frame rate conversion, choose a frame rate from the dropdown list or choose Custom. The framerates shown in the dropdown list are decimal approximations of fractions. If you choose Custom, specify your frame rate as a fraction.
      type: string
      enum:
        - INITIALIZE_FROM_SOURCE
        - SPECIFIED
    Av1FramerateConversionAlgorithm:
      description: "Choose the method that you want MediaConvert to use when increasing or decreasing your video's frame rate. For numerically simple conversions, such as 60 fps to 30 fps: We recommend that you keep the default value, Drop duplicate. For numerically complex conversions, to avoid stutter: Choose Interpolate. This results in a smooth picture, but might introduce undesirable video artifacts. For complex frame rate conversions, especially if your source video has already been converted from its original cadence: Choose FrameFormer to do motion-compensated interpolation. FrameFormer uses the best conversion method frame by frame. Note that using FrameFormer increases the transcoding time and incurs a significant add-on cost. When you choose FrameFormer, your input video resolution must be at least 128x96. To create an output with the same number of frames as your input: Choose Maintain frame count. When you do, MediaConvert will not drop, interpolate, add, or otherwise change the frame count from your input to your output. Note that since the frame count is maintained, the duration of your output will become shorter at higher frame rates and longer at lower frame rates."
      type: string
      enum:
        - DUPLICATE_DROP
        - INTERPOLATE
        - FRAMEFORMER
        - MAINTAIN_FRAME_COUNT
    __integerMin1000Max1152000000:
      type: integer
      minimum: 1000
      maximum: 1152000000
    __integerMin0Max15:
      type: integer
      minimum: 0
      maximum: 15
    Av1QvbrSettings:
      description: Settings for quality-defined variable bitrate encoding with the AV1 codec. Use these settings only when you set QVBR for Rate control mode.
      type: object
      properties:
        QvbrQualityLevel:
          $ref: "#/components/schemas/__integerMin1Max10"
          description: Use this setting only when you set Rate control mode to QVBR. Specify the target quality level for this output. MediaConvert determines the right number of bits to use for each part of the video to maintain the video quality that you specify. When you keep the default value, AUTO, MediaConvert picks a quality level for you, based on characteristics of your input video. If you prefer to specify a quality level, specify a number from 1 through 10. Use higher numbers for greater quality. Level 10 results in nearly lossless compression. The quality level for most broadcast-quality transcodes is between 6 and 9. Optionally, to specify a value between whole numbers, also provide a value for the setting qvbrQualityLevelFineTune. For example, if you want your QVBR quality level to be 7.33, set qvbrQualityLevel to 7 and set qvbrQualityLevelFineTune to .33.
        QvbrQualityLevelFineTune:
          $ref: "#/components/schemas/__doubleMin0Max1"
          description: Optional. Specify a value here to set the QVBR quality to a level that is between whole numbers. For example, if you want your QVBR quality level to be 7.33, set qvbrQualityLevel to 7 and set qvbrQualityLevelFineTune to .33. MediaConvert rounds your QVBR quality level to the nearest third of a whole number. For example, if you set qvbrQualityLevel to 7 and you set qvbrQualityLevelFineTune to .25, your actual QVBR quality level is 7.33.
    __integerMin1Max10:
      type: integer
      minimum: 1
      maximum: 10
    __doubleMin0Max1:
      type: number
      format: double
    Av1RateControlMode:
      description: "'With AV1 outputs, for rate control mode, MediaConvert supports only quality-defined variable bitrate (QVBR). You can''t use CBR or VBR.'"
      type: string
      enum:
        - QVBR
    Av1SpatialAdaptiveQuantization:
      description: "Keep the default value, Enabled, to adjust quantization within each frame based on spatial variation of content complexity. When you enable this feature, the encoder uses fewer bits on areas that can sustain more distortion with no noticeable visual degradation and uses more bits on areas where any small distortion will be noticeable. For example, complex textured blocks are encoded with fewer bits and smooth textured blocks are encoded with more bits. Enabling this feature will almost always improve your video quality. Note, though, that this feature doesn't take into account where the viewer's attention is likely to be. If viewers are likely to be focusing their attention on a part of the screen with a lot of complex texture, you might choose to disable this feature. Related setting: When you enable spatial adaptive quantization, set the value for Adaptive quantization depending on your content. For homogeneous content, such as cartoons and video games, set it to Low. For content with a wider variety of textures, set it to High or Higher."
      type: string
      enum:
        - DISABLED
        - ENABLED
    AvcIntraSettings:
      description: Required when you choose AVC-Intra for your output video codec. For more information about the AVC-Intra settings, see the relevant specification. For detailed information about SD and HD in AVC-Intra, see https://ieeexplore.ieee.org/document/7290936. For information about 4K/2K in AVC-Intra, see https://pro-av.panasonic.net/en/avc-ultra/AVC-ULTRAoverview.pdf.
      type: object
      properties:
        AvcIntraClass:
          $ref: "#/components/schemas/AvcIntraClass"
          description: Specify the AVC-Intra class of your output. The AVC-Intra class selection determines the output video bit rate depending on the frame rate of the output. Outputs with higher class values have higher bitrates and improved image quality. Note that for Class 4K/2K, MediaConvert supports only 4:2:2 chroma subsampling.
        AvcIntraUhdSettings:
          $ref: "#/components/schemas/AvcIntraUhdSettings"
          description: Optional when you set AVC-Intra class to Class 4K/2K. When you set AVC-Intra class to a different value, this object isn't allowed.
        FramerateControl:
          $ref: "#/components/schemas/AvcIntraFramerateControl"
          description: If you are using the console, use the Framerate setting to specify the frame rate for this output. If you want to keep the same frame rate as the input video, choose Follow source. If you want to do frame rate conversion, choose a frame rate from the dropdown list or choose Custom. The framerates shown in the dropdown list are decimal approximations of fractions. If you choose Custom, specify your frame rate as a fraction.
        FramerateConversionAlgorithm:
          $ref: "#/components/schemas/AvcIntraFramerateConversionAlgorithm"
          description: "Choose the method that you want MediaConvert to use when increasing or decreasing your video's frame rate. For numerically simple conversions, such as 60 fps to 30 fps: We recommend that you keep the default value, Drop duplicate. For numerically complex conversions, to avoid stutter: Choose Interpolate. This results in a smooth picture, but might introduce undesirable video artifacts. For complex frame rate conversions, especially if your source video has already been converted from its original cadence: Choose FrameFormer to do motion-compensated interpolation. FrameFormer uses the best conversion method frame by frame. Note that using FrameFormer increases the transcoding time and incurs a significant add-on cost. When you choose FrameFormer, your input video resolution must be at least 128x96. To create an output with the same number of frames as your input: Choose Maintain frame count. When you do, MediaConvert will not drop, interpolate, add, or otherwise change the frame count from your input to your output. Note that since the frame count is maintained, the duration of your output will become shorter at higher frame rates and longer at lower frame rates."
        FramerateDenominator:
          $ref: "#/components/schemas/__integerMin1Max1001"
          description: When you use the API for transcode jobs that use frame rate conversion, specify the frame rate as a fraction. For example, 24000 / 1001 = 23.976 fps. Use FramerateDenominator to specify the denominator of this fraction. In this example, use 1001 for the value of FramerateDenominator. When you use the console for transcode jobs that use frame rate conversion, provide the value as a decimal number for Framerate. In this example, specify 23.976.
        FramerateNumerator:
          $ref: "#/components/schemas/__integerMin24Max60000"
          description: When you use the API for transcode jobs that use frame rate conversion, specify the frame rate as a fraction. For example, 24000 / 1001 = 23.976 fps. Use FramerateNumerator to specify the numerator of this fraction. In this example, use 24000 for the value of FramerateNumerator. When you use the console for transcode jobs that use frame rate conversion, provide the value as a decimal number for Framerate. In this example, specify 23.976.
        InterlaceMode:
          $ref: "#/components/schemas/AvcIntraInterlaceMode"
          description: Choose the scan line type for the output. Keep the default value, Progressive to create a progressive output, regardless of the scan type of your input. Use Top field first or Bottom field first to create an output that's interlaced with the same field polarity throughout. Use Follow, default top or Follow, default bottom to produce outputs with the same field polarity as the source. For jobs that have multiple inputs, the output field polarity might change over the course of the output. Follow behavior depends on the input scan type. If the source is interlaced, the output will be interlaced with the same polarity as the source. If the source is progressive, the output will be interlaced with top field bottom field first, depending on which of the Follow options you choose.
        PerFrameMetrics:
          $ref: "#/components/schemas/__listOfFrameMetricType"
          description: "Optionally choose one or more per frame metric reports to generate along with your output. You can use these metrics to analyze your video output according to one or more commonly used image quality metrics. You can specify per frame metrics for output groups or for individual outputs. When you do, MediaConvert writes a CSV (Comma-Separated Values) file to your S3 output destination, named after the output name and metric type. For example: videofile_PSNR.csv Jobs that generate per frame metrics will take longer to complete, depending on the resolution and complexity of your output. For example, some 4K jobs might take up to twice as long to complete. Note that when analyzing the video quality of your output, or when comparing the video quality of multiple different outputs, we generally also recommend a detailed visual review in a controlled environment. You can choose from the following per frame metrics: * PSNR: Peak Signal-to-Noise Ratio * SSIM: Structural Similarity Index Measure * MS_SSIM: Multi-Scale Similarity Index Measure * PSNR_HVS: Peak Signal-to-Noise Ratio, Human Visual System * VMAF: Video Multi-Method Assessment Fusion * QVBR: Quality-Defined Variable Bitrate. This option is only available when your output uses the QVBR rate control mode. * SHOT_CHANGE: Shot Changes"
        ScanTypeConversionMode:
          $ref: "#/components/schemas/AvcIntraScanTypeConversionMode"
          description: "Use this setting for interlaced outputs, when your output frame rate is half of your input frame rate. In this situation, choose Optimized interlacing to create a better quality interlaced output. In this case, each progressive frame from the input corresponds to an interlaced field in the output. Keep the default value, Basic interlacing, for all other output frame rates. With basic interlacing, MediaConvert performs any frame rate conversion first and then interlaces the frames. When you choose Optimized interlacing and you set your output frame rate to a value that isn't suitable for optimized interlacing, MediaConvert automatically falls back to basic interlacing. Required settings: To use optimized interlacing, you must set Telecine to None or Soft. You can't use optimized interlacing for hard telecine outputs. You must also set Interlace mode to a value other than Progressive."
        SlowPal:
          $ref: "#/components/schemas/AvcIntraSlowPal"
          description: "Ignore this setting unless your input frame rate is 23.976 or 24 frames per second (fps). Enable slow PAL to create a 25 fps output. When you enable slow PAL, MediaConvert relabels the video frames to 25 fps and resamples your audio to keep it synchronized with the video. Note that enabling this setting will slightly reduce the duration of your video. Required settings: You must also set Framerate to 25."
        Telecine:
          $ref: "#/components/schemas/AvcIntraTelecine"
          description: When you do frame rate conversion from 23.976 frames per second (fps) to 29.97 fps, and your output scan type is interlaced, you can optionally enable hard telecine to create a smoother picture. When you keep the default value, None, MediaConvert does a standard frame rate conversion to 29.97 without doing anything with the field polarity to create a smoother picture.
    AvcIntraClass:
      description: Specify the AVC-Intra class of your output. The AVC-Intra class selection determines the output video bit rate depending on the frame rate of the output. Outputs with higher class values have higher bitrates and improved image quality. Note that for Class 4K/2K, MediaConvert supports only 4:2:2 chroma subsampling.
      type: string
      enum:
        - CLASS_50
        - CLASS_100
        - CLASS_200
        - CLASS_4K_2K
    AvcIntraUhdSettings:
      description: Optional when you set AVC-Intra class to Class 4K/2K. When you set AVC-Intra class to a different value, this object isn't allowed.
      type: object
      properties:
        QualityTuningLevel:
          $ref: "#/components/schemas/AvcIntraUhdQualityTuningLevel"
          description: Optional. Use Quality tuning level to choose how many transcoding passes MediaConvert does with your video. When you choose Multi-pass, your video quality is better and your output bitrate is more accurate. That is, the actual bitrate of your output is closer to the target bitrate defined in the specification. When you choose Single-pass, your encoding time is faster. The default behavior is Single-pass.
    AvcIntraUhdQualityTuningLevel:
      description: Optional. Use Quality tuning level to choose how many transcoding passes MediaConvert does with your video. When you choose Multi-pass, your video quality is better and your output bitrate is more accurate. That is, the actual bitrate of your output is closer to the target bitrate defined in the specification. When you choose Single-pass, your encoding time is faster. The default behavior is Single-pass.
      type: string
      enum:
        - SINGLE_PASS
        - MULTI_PASS
