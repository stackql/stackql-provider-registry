openapi: 3.0.0
info:
  version: "2017-08-29"
  title: AWS Elemental MediaConvert
  description: AWS Elemental MediaConvert
  x-serviceName: mediaconvert
  x-serviceAlias: mediaconvert
  x-protocol: rest-json
  x-apiVersion: "2017-08-29"
  x-endpointPrefix: mediaconvert
  x-jsonVersion: "1.1"
servers:
  - url: https://mediaconvert.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediaconvert
paths:
  /2017-08-29/certificates:
    post:
      operationId: AssociateCertificate
      description: Associates an AWS Certificate Manager (ACM) Amazon Resource Name (ARN) with AWS Elemental MediaConvert.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateCertificateResponse"
  /2017-08-29/jobs/{id}:
    delete:
      operationId: CancelJob
      description: Permanently cancel a job. Once you have canceled a job, you can't start it again.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Job ID of the job to be cancelled.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
    get:
      operationId: GetJob
      description: Retrieve the JSON for a specific transcoding job.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: the job ID of the job.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobResponse"
  /2017-08-29/jobs:
    post:
      operationId: CreateJob
      description: Create a new transcoding job. For information about jobs and job settings, see the User Guide at http://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccelerationSettings:
                  $ref: "#/components/schemas/AccelerationSettings"
                BillingTagsSource:
                  $ref: "#/components/schemas/BillingTagsSource"
                ClientRequestToken:
                  $ref: "#/components/schemas/__string"
                HopDestinations:
                  $ref: "#/components/schemas/__listOfHopDestination"
                JobEngineVersion:
                  $ref: "#/components/schemas/__string"
                JobTemplate:
                  $ref: "#/components/schemas/__string"
                Priority:
                  $ref: "#/components/schemas/__integerMinNegative50Max50"
                Queue:
                  $ref: "#/components/schemas/__string"
                Role:
                  $ref: "#/components/schemas/__string"
                Settings:
                  $ref: "#/components/schemas/JobSettings"
                SimulateReservedQueue:
                  $ref: "#/components/schemas/SimulateReservedQueue"
                StatusUpdateInterval:
                  $ref: "#/components/schemas/StatusUpdateInterval"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
                UserMetadata:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
    get:
      operationId: ListJobs
      description: Retrieve a JSON array of up to twenty of your most recently created jobs. This array includes in-process, completed, and errored jobs. This will return the jobs themselves, not just a list of the jobs. To retrieve the twenty next most recent jobs, use the nextToken string returned with the array.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integerMin1Max20"
          description: Optional. Number of jobs, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optional. Use this string, provided with the response to a previous request, to request the next batch of jobs.
        - name: order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Order"
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
        - name: queue
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optional. Provide a queue name to get back only jobs from that queue.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
          description: Optional. A job's status can be SUBMITTED, PROGRESSING, COMPLETE, CANCELED, or ERROR.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResponse"
  /2017-08-29/jobTemplates:
    post:
      operationId: CreateJobTemplate
      description: Create a new job template. For information about job templates see the User Guide at http://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccelerationSettings:
                  $ref: "#/components/schemas/AccelerationSettings"
                Category:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                HopDestinations:
                  $ref: "#/components/schemas/__listOfHopDestination"
                Name:
                  $ref: "#/components/schemas/__string"
                Priority:
                  $ref: "#/components/schemas/__integerMinNegative50Max50"
                Queue:
                  $ref: "#/components/schemas/__string"
                Settings:
                  $ref: "#/components/schemas/JobTemplateSettings"
                StatusUpdateInterval:
                  $ref: "#/components/schemas/StatusUpdateInterval"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobTemplateResponse"
    get:
      operationId: ListJobTemplates
      description: Retrieve a JSON array of up to twenty of your job templates. This will return the templates themselves, not just a list of them. To retrieve the next twenty templates, use the nextToken string returned with the array
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optionally, specify a job template category to limit responses to only job templates from that category.
        - name: listBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobTemplateListBy"
          description: Optional. When you request a list of job templates, you can choose to list them alphabetically by NAME or chronologically by CREATION_DATE. If you don't specify, the service will list them by name.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integerMin1Max20"
          description: Optional. Number of job templates, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Use this string, provided with the response to a previous request, to request the next batch of job templates.
        - name: order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Order"
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobTemplatesResponse"
  /2017-08-29/presets:
    post:
      operationId: CreatePreset
      description: Create a new preset. For information about job templates see the User Guide at http://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Category:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                Name:
                  $ref: "#/components/schemas/__string"
                Settings:
                  $ref: "#/components/schemas/PresetSettings"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePresetResponse"
    get:
      operationId: ListPresets
      description: Retrieve a JSON array of up to twenty of your presets. This will return the presets themselves, not just a list of them. To retrieve the next twenty presets, use the nextToken string returned with the array.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optionally, specify a preset category to limit responses to only presets from that category.
        - name: listBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PresetListBy"
          description: Optional. When you request a list of presets, you can choose to list them alphabetically by NAME or chronologically by CREATION_DATE. If you don't specify, the service will list them by name.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integerMin1Max20"
          description: Optional. Number of presets, up to twenty, that will be returned at one time
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Use this string, provided with the response to a previous request, to request the next batch of presets.
        - name: order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Order"
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPresetsResponse"
  /2017-08-29/queues:
    post:
      operationId: CreateQueue
      description: Create a new transcoding queue. For information about queues, see Working With Queues in the User Guide at https://docs.aws.amazon.com/mediaconvert/latest/ug/working-with-queues.html
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConcurrentJobs:
                  $ref: "#/components/schemas/__integer"
                Description:
                  $ref: "#/components/schemas/__string"
                MaximumConcurrentFeeds:
                  $ref: "#/components/schemas/__integerMin0"
                Name:
                  $ref: "#/components/schemas/__string"
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                ReservationPlanSettings:
                  $ref: "#/components/schemas/ReservationPlanSettings"
                Status:
                  $ref: "#/components/schemas/QueueStatus"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateQueueResponse"
    get:
      operationId: ListQueues
      description: Retrieve a JSON array of up to twenty of your queues. This will return the queues themselves, not just a list of them. To retrieve the next twenty queues, use the nextToken string returned with the array.
      parameters:
        - name: listBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueueListBy"
          description: Optional. When you request a list of queues, you can choose to list them alphabetically by NAME or chronologically by CREATION_DATE. If you don't specify, the service will list them by creation date.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integerMin1Max20"
          description: Optional. Number of queues, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Use this string, provided with the response to a previous request, to request the next batch of queues.
        - name: order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Order"
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListQueuesResponse"
  /2017-08-29/resourceShares:
    post:
      operationId: CreateResourceShare
      description: Create a new resource share request for MediaConvert resources with AWS Support.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/__string"
                SupportCaseId:
                  $ref: "#/components/schemas/__string"
              required:
                - JobId
                - SupportCaseId
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceShareResponse"
  /2017-08-29/jobTemplates/{name}:
    delete:
      operationId: DeleteJobTemplate
      description: Permanently delete a job template you have created.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the job template to be deleted.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJobTemplateResponse"
    get:
      operationId: GetJobTemplate
      description: Retrieve the JSON for a specific job template.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the job template.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobTemplateResponse"
    put:
      operationId: UpdateJobTemplate
      description: Modify one of your existing job templates.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the job template you are modifying
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccelerationSettings:
                  $ref: "#/components/schemas/AccelerationSettings"
                Category:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                HopDestinations:
                  $ref: "#/components/schemas/__listOfHopDestination"
                Priority:
                  $ref: "#/components/schemas/__integerMinNegative50Max50"
                Queue:
                  $ref: "#/components/schemas/__string"
                Settings:
                  $ref: "#/components/schemas/JobTemplateSettings"
                StatusUpdateInterval:
                  $ref: "#/components/schemas/StatusUpdateInterval"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateJobTemplateResponse"
  /2017-08-29/policy:
    delete:
      operationId: DeletePolicy
      description: Permanently delete a policy that you created.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePolicyResponse"
    get:
      operationId: GetPolicy
      description: Retrieve the JSON for your policy.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPolicyResponse"
    put:
      operationId: PutPolicy
      description: Create or change your policy. For more information about policies, see the user guide at http://docs.aws.amazon.com/mediaconvert/latest/ug/what-is.html
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/Policy"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutPolicyResponse"
  /2017-08-29/presets/{name}:
    delete:
      operationId: DeletePreset
      description: Permanently delete a preset you have created.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the preset to be deleted.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePresetResponse"
    get:
      operationId: GetPreset
      description: Retrieve the JSON for a specific preset.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the preset.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPresetResponse"
    put:
      operationId: UpdatePreset
      description: Modify one of your existing presets.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the preset you are modifying.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Category:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                Settings:
                  $ref: "#/components/schemas/PresetSettings"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePresetResponse"
  /2017-08-29/queues/{name}:
    delete:
      operationId: DeleteQueue
      description: Permanently delete a queue you have created.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the queue that you want to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteQueueResponse"
    get:
      operationId: GetQueue
      description: Retrieve the JSON for a specific queue.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the queue that you want information about.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueueResponse"
    put:
      operationId: UpdateQueue
      description: Modify one of your existing queues.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the queue that you are modifying.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ConcurrentJobs:
                  $ref: "#/components/schemas/__integer"
                Description:
                  $ref: "#/components/schemas/__string"
                MaximumConcurrentFeeds:
                  $ref: "#/components/schemas/__integerMin0"
                ReservationPlanSettings:
                  $ref: "#/components/schemas/ReservationPlanSettings"
                Status:
                  $ref: "#/components/schemas/QueueStatus"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateQueueResponse"
  /2017-08-29/endpoints:
    post:
      operationId: DescribeEndpoints
      description: Send a request with an empty body to the regional API endpoint to get your account API endpoint. Note that DescribeEndpoints is no longer required. We recommend that you send your requests directly to the regional endpoint instead.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/__integer"
                Mode:
                  $ref: "#/components/schemas/DescribeEndpointsMode"
                NextToken:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeEndpointsResponse"
  /2017-08-29/certificates/{arn}:
    delete:
      operationId: DisassociateCertificate
      description: Removes an association between the Amazon Resource Name (ARN) of an AWS Certificate Manager (ACM) certificate and an AWS Elemental MediaConvert resource.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ARN of the ACM certificate that you want to disassociate from your MediaConvert resource.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateCertificateResponse"
  /2017-08-29/jobsQueries/{id}:
    get:
      operationId: GetJobsQueryResults
      description: Retrieve a JSON array of up to twenty of your most recent jobs matched by a jobs query.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the jobs query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobsQueryResultsResponse"
  /2017-08-29/tags/{arn}:
    get:
      operationId: ListTagsForResource
      description: Retrieve the tags for a MediaConvert resource.
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource that you want to list tags for. To get the ARN, send a GET request with the resource name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    put:
      operationId: UntagResource
      description: Remove tags from a MediaConvert queue, preset, or job template. For information about tagging, see the User Guide at https://docs.aws.amazon.com/mediaconvert/latest/ug/tagging-resources.html
      parameters:
        - name: arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the resource that you want to remove tags from. To get the ARN, send a GET request with the resource name.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                TagKeys:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /2017-08-29/versions:
    get:
      operationId: ListVersions
      description: Retrieve a JSON array of all available Job engine versions and the date they expire.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integerMin1Max20"
          description: Optional. Number of valid Job engine versions, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optional. Use this string, provided with the response to a previous request, to request the next batch of Job engine versions.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVersionsResponse"
  /2017-08-29/probe:
    post:
      operationId: Probe
      description: Use Probe to obtain detailed information about your input media files. Probe returns a JSON that includes container, codec, frame rate, resolution, track count, audio layout, captions, and more. You can use this information to learn more about your media files, or to help make decisions while automating your transcoding workflow.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                InputFiles:
                  $ref: "#/components/schemas/__listOfProbeInputFile"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResponse"
  /2017-08-29/search:
    get:
      operationId: SearchJobs
      description: Retrieve a JSON array that includes job details for up to twenty of your most recent jobs. Optionally filter results further according to input file, queue, or status. To retrieve the twenty next most recent jobs, use the nextToken string returned with the array.
      parameters:
        - name: inputFile
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optional. Provide your input file URL or your partial input file name. The maximum length for an input file is 300 characters.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integerMin1Max20"
          description: Optional. Number of jobs, up to twenty, that will be returned at one time.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optional. Use this string, provided with the response to a previous request, to request the next batch of jobs.
        - name: order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Order"
          description: Optional. When you request lists of resources, you can specify whether they are sorted in ASCENDING or DESCENDING order. Default varies by resource.
        - name: queue
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Optional. Provide a queue name, or a queue ARN, to return only jobs from that queue.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
          description: Optional. A job's status can be SUBMITTED, PROGRESSING, COMPLETE, CANCELED, or ERROR.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchJobsResponse"
  /2017-08-29/jobsQueries:
    post:
      operationId: StartJobsQuery
      description: Start an asynchronous jobs query using the provided filters. To receive the list of jobs that match your query, call the GetJobsQueryResults API using the query ID returned by this API.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                FilterList:
                  $ref: "#/components/schemas/__listOfJobsQueryFilter"
                MaxResults:
                  $ref: "#/components/schemas/__integerMin1Max20"
                NextToken:
                  $ref: "#/components/schemas/__string"
                Order:
                  $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobsQueryResponse"
  /2017-08-29/tags:
    post:
      operationId: TagResource
      description: Add tags to a MediaConvert queue, preset, or job template. For information about tagging, see the User Guide at https://docs.aws.amazon.com/mediaconvert/latest/ug/tagging-resources.html
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Arn:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
              required:
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    AssociateCertificateResponse:
      type: object
    CancelJobResponse:
      type: object
    AccelerationSettings:
      description: Accelerated transcoding can significantly speed up jobs with long, visually complex content.
      type: object
      properties:
        Mode:
          $ref: "#/components/schemas/AccelerationMode"
          description: Specify the conditions when the service will run your job with accelerated transcoding.
      required:
        - Mode
    AccelerationMode:
      description: Specify whether the service runs your job with accelerated transcoding. Choose DISABLED if you don't want accelerated transcoding. Choose ENABLED if you want your job to run with accelerated transcoding and to fail if your input files or your job settings aren't compatible with accelerated transcoding. Choose PREFERRED if you want your job to run with accelerated transcoding if the job is compatible with the feature and to run at standard speed if it's not.
      type: string
      enum:
        - DISABLED
        - ENABLED
        - PREFERRED
    BillingTagsSource:
      description: The tag type that AWS Billing and Cost Management will use to sort your AWS Elemental MediaConvert costs on any billing report that you set up.
      type: string
      enum:
        - QUEUE
        - PRESET
        - JOB_TEMPLATE
        - JOB
    __listOfHopDestination:
      type: array
      items:
        $ref: "#/components/schemas/HopDestination"
    HopDestination:
      description: Optional. Configuration for a destination queue to which the job can hop once a customer-defined minimum wait time has passed.
      type: object
      properties:
        Priority:
          $ref: "#/components/schemas/__integerMinNegative50Max50"
          description: Optional. When you set up a job to use queue hopping, you can specify a different relative priority for the job in the destination queue. If you don't specify, the relative priority will remain the same as in the previous queue.
        Queue:
          $ref: "#/components/schemas/__string"
          description: Optional unless the job is submitted on the default queue. When you set up a job to use queue hopping, you can specify a destination queue. This queue cannot be the original queue to which the job is submitted. If the original queue isn't the default queue and you don't specify the destination queue, the job will move to the default queue.
        WaitMinutes:
          $ref: "#/components/schemas/__integer"
          description: Required for setting up a job to use queue hopping. Minimum wait time in minutes until the job can hop to the destination queue. Valid range is 1 to 4320 minutes, inclusive.
    __integerMinNegative50Max50:
      type: integer
      minimum: -50
      maximum: 50
    __integer:
      type: integer
    JobSettings:
      description: JobSettings contains all the transcode settings for a job.
      type: object
      properties:
        AdAvailOffset:
          $ref: "#/components/schemas/__integerMinNegative1000Max1000"
          description: When specified, this offset (in milliseconds) is added to the input Ad Avail PTS time.
        AvailBlanking:
          $ref: "#/components/schemas/AvailBlanking"
          description: Settings for ad avail blanking. Video can be blanked or overlaid with an image, and audio muted during SCTE-35 triggered ad avails.
        ColorConversion3DLUTSettings:
          $ref: "#/components/schemas/__listOfColorConversion3DLUTSetting"
          description: "Use 3D LUTs to specify custom color mapping behavior when you convert from one color space into another. You can include up to 8 different 3D LUTs. For more information, see: https://docs.aws.amazon.com/mediaconvert/latest/ug/3d-luts.html"
        Esam:
          $ref: "#/components/schemas/EsamSettings"
          description: Settings for Event Signaling And Messaging (ESAM). If you don't do ad insertion, you can ignore these settings.
        ExtendedDataServices:
          $ref: "#/components/schemas/ExtendedDataServices"
          description: If your source content has EIA-608 Line 21 Data Services, enable this feature to specify what MediaConvert does with the Extended Data Services (XDS) packets. You can choose to pass through XDS packets, or remove them from the output. For more information about XDS, see EIA-608 Line Data Services, section 9.5.1.5 05h Content Advisory.
        FollowSource:
          $ref: "#/components/schemas/__integerMin1Max150"
          description: Specify the input that MediaConvert references for your default output settings. MediaConvert uses this input's Resolution, Frame rate, and Pixel aspect ratio for all outputs that you don't manually specify different output settings for. Enabling this setting will disable "Follow source" for all other inputs. If MediaConvert cannot follow your source, for example if you specify an audio-only input, MediaConvert uses the first followable input instead. In your JSON job specification, enter an integer from 1 to 150 corresponding to the order of your inputs.
        Inputs:
          $ref: "#/components/schemas/__listOfInput"
          description: Use Inputs to define source file used in the transcode job. There can be multiple inputs add in a job. These inputs will be concantenated together to create the output.
        KantarWatermark:
          $ref: "#/components/schemas/KantarWatermarkSettings"
          description: Use these settings only when you use Kantar watermarking. Specify the values that MediaConvert uses to generate and place Kantar watermarks in your output audio. These settings apply to every output in your job. In addition to specifying these values, you also need to store your Kantar credentials in AWS Secrets Manager. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/kantar-watermarking.html.
        MotionImageInserter:
          $ref: "#/components/schemas/MotionImageInserter"
          description: Overlay motion graphics on top of your video. The motion graphics that you specify here appear on all outputs in all output groups. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/motion-graphic-overlay.html.
        NielsenConfiguration:
          $ref: "#/components/schemas/NielsenConfiguration"
          description: Settings for your Nielsen configuration. If you don't do Nielsen measurement and analytics, ignore these settings. When you enable Nielsen configuration, MediaConvert enables PCM to ID3 tagging for all outputs in the job.
        NielsenNonLinearWatermark:
          $ref: "#/components/schemas/NielsenNonLinearWatermarkSettings"
          description: "Ignore these settings unless you are using Nielsen non-linear watermarking. Specify the values that MediaConvert uses to generate and place Nielsen watermarks in your output audio. In addition to specifying these values, you also need to set up your cloud TIC server. These settings apply to every output in your job. The MediaConvert implementation is currently with the following Nielsen versions: Nielsen Watermark SDK Version 6.0.13 Nielsen NLM Watermark Engine Version 1.3.3 Nielsen Watermark Authenticator [SID_TIC] Version [7.0.0]"
        OutputGroups:
          $ref: "#/components/schemas/__listOfOutputGroup"
          description: Contains one group of settings for each set of outputs that share a common package type. All unpackaged files (MPEG-4, MPEG-2 TS, Quicktime, MXF, and no container) are grouped in a single output group as well. Required in is a group of settings that apply to the whole group. This required object depends on the value you set for Type. Type, settings object pairs are as follows. * FILE_GROUP_SETTINGS, FileGroupSettings * HLS_GROUP_SETTINGS, HlsGroupSettings * DASH_ISO_GROUP_SETTINGS, DashIsoGroupSettings * MS_SMOOTH_GROUP_SETTINGS, MsSmoothGroupSettings * CMAF_GROUP_SETTINGS, CmafGroupSettings
        TimecodeConfig:
          $ref: "#/components/schemas/TimecodeConfig"
          description: These settings control how the service handles timecodes throughout the job. These settings don't affect input clipping.
        TimedMetadataInsertion:
          $ref: "#/components/schemas/TimedMetadataInsertion"
          description: Insert user-defined custom ID3 metadata at timecodes that you specify. In each output that you want to include this metadata, you must set ID3 metadata to Passthrough.
    __integerMinNegative1000Max1000:
      type: integer
      minimum: -1000
      maximum: 1000
    AvailBlanking:
      description: Use ad avail blanking settings to specify your output content during SCTE-35 triggered ad avails. You can blank your video or overlay it with an image. MediaConvert also removes any audio and embedded captions during the ad avail. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/ad-avail-blanking.html.
      type: object
      properties:
        AvailBlankingImage:
          $ref: "#/components/schemas/__stringMin14PatternS3BmpBMPPngPNGHttpsBmpBMPPngPNG"
          description: Blanking image to be used. Leave empty for solid black. Only bmp and png images are supported.
    __stringMin14PatternS3BmpBMPPngPNGHttpsBmpBMPPngPNG:
      type: string
      minLength: 14
      pattern: ^((s3://(.*?)\.(bmp|BMP|png|PNG))|(https?://(.*?)\.(bmp|BMP|png|PNG)(\?([^&=]+=[^&]+&)*[^&=]+=[^&]+)?))$
    __listOfColorConversion3DLUTSetting:
      type: array
      items:
        $ref: "#/components/schemas/ColorConversion3DLUTSetting"
    ColorConversion3DLUTSetting:
      description: Custom 3D lut settings
      type: object
      properties:
        FileInput:
          $ref: "#/components/schemas/__stringMin14PatternS3CubeCUBEHttpsCubeCUBE"
          description: Specify the input file S3, HTTP, or HTTPS URL for your 3D LUT .cube file. Note that MediaConvert accepts 3D LUT files up to 8MB in size.
        InputColorSpace:
          $ref: "#/components/schemas/ColorSpace"
          description: Specify which inputs use this 3D LUT, according to their color space.
        InputMasteringLuminance:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify which inputs use this 3D LUT, according to their luminance. To apply this 3D LUT to HDR10 or P3D65 (HDR) inputs with a specific mastering luminance: Enter an integer from 0 to 2147483647, corresponding to the input's Maximum luminance value. To apply this 3D LUT to any input regardless of its luminance: Leave blank, or enter 0."
        OutputColorSpace:
          $ref: "#/components/schemas/ColorSpace"
          description: Specify which outputs use this 3D LUT, according to their color space.
        OutputMasteringLuminance:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify which outputs use this 3D LUT, according to their luminance. To apply this 3D LUT to HDR10 or P3D65 (HDR) outputs with a specific luminance: Enter an integer from 0 to 2147483647, corresponding to the output's luminance. To apply this 3D LUT to any output regardless of its luminance: Leave blank, or enter 0."
    __stringMin14PatternS3CubeCUBEHttpsCubeCUBE:
      type: string
      minLength: 14
      pattern: ^((s3://(.*?)\.(cube|CUBE))|(https?://(.*?)\.(cube|CUBE)(\?([^&=]+=[^&]+&)*[^&=]+=[^&]+)?))$
    ColorSpace:
      description: "If your input video has accurate color space metadata, or if you don't know about color space: Keep the default value, Follow. MediaConvert will automatically detect your input color space. If your input video has metadata indicating the wrong color space, or has missing metadata: Specify the accurate color space here. If your input video is HDR 10 and the SMPTE ST 2086 Mastering Display Color Volume static metadata isn't present in your video stream, or if that metadata is present but not accurate: Choose Force HDR 10. Specify correct values in the input HDR 10 metadata settings. For more information about HDR jobs, see https://docs.aws.amazon.com/console/mediaconvert/hdr. When you specify an input color space, MediaConvert uses the following color space metadata, which includes color primaries, transfer characteristics, and matrix coefficients: * HDR 10: BT.2020, PQ, BT.2020 non-constant * HLG 2020: BT.2020, HLG, BT.2020 non-constant * P3DCI (Theater): DCIP3, SMPTE 428M, BT.709 * P3D65 (SDR): Display P3, sRGB, BT.709 * P3D65 (HDR): Display P3, PQ, BT.709"
      type: string
      enum:
        - FOLLOW
        - REC_601
        - REC_709
        - HDR10
        - HLG_2020
        - P3DCI
        - P3D65_SDR
        - P3D65_HDR
    __integerMin0Max2147483647:
      type: integer
      minimum: 0
      maximum: 2147483647
    EsamSettings:
      description: Settings for Event Signaling And Messaging (ESAM). If you don't do ad insertion, you can ignore these settings.
      type: object
      properties:
        ManifestConfirmConditionNotification:
          $ref: "#/components/schemas/EsamManifestConfirmConditionNotification"
          description: Specifies an ESAM ManifestConfirmConditionNotification XML as per OC-SP-ESAM-API-I03-131025. The transcoder uses the manifest conditioning instructions that you provide in the setting MCC XML.
        ResponseSignalPreroll:
          $ref: "#/components/schemas/__integerMin0Max30000"
          description: Specifies the stream distance, in milliseconds, between the SCTE 35 messages that the transcoder places and the splice points that they refer to. If the time between the start of the asset and the SCTE-35 message is less than this value, then the transcoder places the SCTE-35 marker at the beginning of the stream.
        SignalProcessingNotification:
          $ref: "#/components/schemas/EsamSignalProcessingNotification"
          description: Specifies an ESAM SignalProcessingNotification XML as per OC-SP-ESAM-API-I03-131025. The transcoder uses the signal processing instructions that you provide in the setting SCC XML.
    EsamManifestConfirmConditionNotification:
      description: ESAM ManifestConfirmConditionNotification defined by OC-SP-ESAM-API-I03-131025.
      type: object
      properties:
        MccXml:
          $ref: "#/components/schemas/__stringPatternSNManifestConfirmConditionNotificationNS"
          description: Provide your ESAM ManifestConfirmConditionNotification XML document inside your JSON job settings. Form the XML document as per OC-SP-ESAM-API-I03-131025. The transcoder will use the Manifest Conditioning instructions in the message that you supply.
    __stringPatternSNManifestConfirmConditionNotificationNS:
      type: string
      pattern: ^\s*<(.|\n)*ManifestConfirmConditionNotification(.|\n)*>\s*$
    __integerMin0Max30000:
      type: integer
      minimum: 0
      maximum: 30000
    EsamSignalProcessingNotification:
      description: ESAM SignalProcessingNotification data defined by OC-SP-ESAM-API-I03-131025.
      type: object
      properties:
        SccXml:
          $ref: "#/components/schemas/__stringPatternSNSignalProcessingNotificationNS"
          description: Provide your ESAM SignalProcessingNotification XML document inside your JSON job settings. Form the XML document as per OC-SP-ESAM-API-I03-131025. The transcoder will use the signal processing instructions in the message that you supply. For your MPEG2-TS file outputs, if you want the service to place SCTE-35 markers at the insertion points you specify in the XML document, you must also enable SCTE-35 ESAM. Note that you can either specify an ESAM XML document or enable SCTE-35 passthrough. You can't do both.
    __stringPatternSNSignalProcessingNotificationNS:
      type: string
      pattern: ^\s*<(.|\n)*SignalProcessingNotification(.|\n)*>\s*$
    ExtendedDataServices:
      description: If your source content has EIA-608 Line 21 Data Services, enable this feature to specify what MediaConvert does with the Extended Data Services (XDS) packets. You can choose to pass through XDS packets, or remove them from the output. For more information about XDS, see EIA-608 Line Data Services, section 9.5.1.5 05h Content Advisory.
      type: object
      properties:
        CopyProtectionAction:
          $ref: "#/components/schemas/CopyProtectionAction"
          description: The action to take on copy and redistribution control XDS packets. If you select PASSTHROUGH, packets will not be changed. If you select STRIP, any packets will be removed in output captions.
        VchipAction:
          $ref: "#/components/schemas/VchipAction"
          description: The action to take on content advisory XDS packets. If you select PASSTHROUGH, packets will not be changed. If you select STRIP, any packets will be removed in output captions.
    CopyProtectionAction:
      description: The action to take on copy and redistribution control XDS packets. If you select PASSTHROUGH, packets will not be changed. If you select STRIP, any packets will be removed in output captions.
      type: string
      enum:
        - PASSTHROUGH
        - STRIP
    VchipAction:
      description: The action to take on content advisory XDS packets. If you select PASSTHROUGH, packets will not be changed. If you select STRIP, any packets will be removed in output captions.
      type: string
      enum:
        - PASSTHROUGH
        - STRIP
    __integerMin1Max150:
      type: integer
      minimum: 1
      maximum: 150
    __listOfInput:
      type: array
      items:
        $ref: "#/components/schemas/Input"
    Input:
      description: Use inputs to define the source files used in your transcoding job. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/specify-input-settings.html. You can use multiple video inputs to do input stitching. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/assembling-multiple-inputs-and-input-clips.html
      type: object
      properties:
        AdvancedInputFilter:
          $ref: "#/components/schemas/AdvancedInputFilter"
          description: "Use to remove noise, blocking, blurriness, or ringing from your input as a pre-filter step before encoding. The Advanced input filter removes more types of compression artifacts and is an improvement when compared to basic Deblock and Denoise filters. To remove video compression artifacts from your input and improve the video quality: Choose Enabled. Additionally, this filter can help increase the video quality of your output relative to its bitrate, since noisy inputs are more complex and require more bits to encode. To help restore loss of detail after applying the filter, you can optionally add texture or sharpening as an additional step. Jobs that use this feature incur pro-tier pricing. To not apply advanced input filtering: Choose Disabled. Note that you can still apply basic filtering with Deblock and Denoise."
        AdvancedInputFilterSettings:
          $ref: "#/components/schemas/AdvancedInputFilterSettings"
          description: Optional settings for Advanced input filter when you set Advanced input filter to Enabled.
        AudioSelectorGroups:
          type: object
          properties: {}
          description: Use audio selector groups to combine multiple sidecar audio inputs so that you can assign them to a single output audio tab. Note that, if you're working with embedded audio, it's simpler to assign multiple input tracks into a single audio selector rather than use an audio selector group.
        AudioSelectors:
          type: object
          properties: {}
          description: Use Audio selectors to specify a track or set of tracks from the input that you will use in your outputs. You can use multiple Audio selectors per input.
        CaptionSelectors:
          type: object
          properties: {}
          description: Use captions selectors to specify the captions data from your input that you use in your outputs. You can use up to 100 captions selectors per input.
        Crop:
          $ref: "#/components/schemas/Rectangle"
          description: Use Cropping selection to specify the video area that the service will include in the output video frame. If you specify a value here, it will override any value that you specify in the output setting Cropping selection.
        DeblockFilter:
          $ref: "#/components/schemas/InputDeblockFilter"
          description: Enable Deblock to produce smoother motion in the output. Default is disabled. Only manually controllable for MPEG2 and uncompressed video inputs.
        DecryptionSettings:
          $ref: "#/components/schemas/InputDecryptionSettings"
          description: Settings for decrypting any input files that you encrypt before you upload them to Amazon S3. MediaConvert can decrypt files only when you use AWS Key Management Service (KMS) to encrypt the data key that you use to encrypt your content.
        DenoiseFilter:
          $ref: "#/components/schemas/InputDenoiseFilter"
          description: Enable Denoise to filter noise from the input. Default is disabled. Only applicable to MPEG2, H.264, H.265, and uncompressed video inputs.
        DolbyVisionMetadataXml:
          $ref: "#/components/schemas/__stringMin14PatternS3XmlXMLHttpsXmlXML"
          description: Use this setting only when your video source has Dolby Vision studio mastering metadata that is carried in a separate XML file. Specify the Amazon S3 location for the metadata XML file. MediaConvert uses this file to provide global and frame-level metadata for Dolby Vision preprocessing. When you specify a file here and your input also has interleaved global and frame level metadata, MediaConvert ignores the interleaved metadata and uses only the the metadata from this external XML file. Note that your IAM service role must grant MediaConvert read permissions to this file. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/iam-role.html.
        DynamicAudioSelectors:
          type: object
          properties: {}
          description: Use Dynamic audio selectors when you do not know the track layout of your source when you submit your job, but want to select multiple audio tracks. When you include an audio track in your output and specify this Dynamic audio selector as the Audio source, MediaConvert creates an output audio track for each dynamically selected track. Note that when you include a Dynamic audio selector for two or more inputs, each input must have the same number of audio tracks and audio channels.
        FileInput:
          $ref: "#/components/schemas/__stringMax2048PatternS3Https"
          description: Specify the source file for your transcoding job. You can use multiple inputs in a single job. The service concatenates these inputs, in the order that you specify them in the job, to create the outputs. For standard inputs, provide the path to your S3, HTTP, or HTTPS source file. For example, s3://amzn-s3-demo-bucket/input.mp4 for an Amazon S3 input or https://example.com/input.mp4 for an HTTPS input. For TAMS inputs, specify the HTTPS endpoint of your TAMS server. For example, https://tams-server.example.com . When you do, also specify Source ID, Timerange, GAP handling, and the Authorization connection ARN under TAMS settings. (Don't include these parameters in the Input file URL.) For IMF inputs, specify your input by providing the path to your CPL. For example, s3://amzn-s3-demo-bucket/vf/cpl.xml . If the CPL is in an incomplete IMP, make sure to use Supplemental IMPsto specify any supplemental IMPs that contain assets referenced by the CPL.
        FilterEnable:
          $ref: "#/components/schemas/InputFilterEnable"
          description: "Specify whether to apply input filtering to improve the video quality of your input. To apply filtering depending on your input type and quality: Choose Auto. To apply no filtering: Choose Disable. To apply filtering regardless of your input type and quality: Choose Force. When you do, you must also specify a value for Filter strength."
        FilterStrength:
          $ref: "#/components/schemas/__integerMin0Max5"
          description: "Specify the strength of the input filter. To apply an automatic amount of filtering based the compression artifacts measured in your input: We recommend that you leave Filter strength blank and set Filter enable to Auto. To manually apply filtering: Enter a value from 1 to 5, where 1 is the least amount of filtering and 5 is the most. The value that you enter applies to the strength of the Deblock or Denoise filters, or to the strength of the Advanced input filter."
        ImageInserter:
          $ref: "#/components/schemas/ImageInserter"
          description: Enable the image inserter feature to include a graphic overlay on your video. Enable or disable this feature for each input individually. This setting is disabled by default.
        InputClippings:
          $ref: "#/components/schemas/__listOfInputClipping"
          description: Contains sets of start and end times that together specify a portion of the input to be used in the outputs. If you provide only a start time, the clip will be the entire input from that point to the end. If you provide only an end time, it will be the entire input up to that point. When you specify more than one input clip, the transcoding service creates the job outputs by stringing the clips together in the order you specify them.
        InputScanType:
          $ref: "#/components/schemas/InputScanType"
          description: When you have a progressive segmented frame (PsF) input, use this setting to flag the input as PsF. MediaConvert doesn't automatically detect PsF. Therefore, flagging your input as PsF results in better preservation of video quality when you do deinterlacing and frame rate conversion. If you don't specify, the default value is Auto. Auto is the correct setting for all inputs that are not PsF. Don't set this value to PsF when your input is interlaced. Doing so creates horizontal interlacing artifacts.
        MultiViewSettings:
          $ref: "#/components/schemas/__listOfMultiViewSettings"
          description: Specify the enhancement layer input video file path for Multi View outputs. The base layer input is treated as the left eye and this Multi View input is treated as the right eye. Only one Multi View input is currently supported. MediaConvert encodes both views into a single MV-HEVC output codec. When you add MultiViewSettings to your job, you can only produce Multi View outputs. Adding any other codec output to the same job is not supported.
        Position:
          $ref: "#/components/schemas/Rectangle"
          description: Use Selection placement to define the video area in your output frame. The area outside of the rectangle that you specify here is black. If you specify a value here, it will override any value that you specify in the output setting Selection placement. If you specify a value here, this will override any AFD values in your input, even if you set Respond to AFD to Respond. If you specify a value here, this will ignore anything that you specify for the setting Scaling Behavior.
        ProgramNumber:
          $ref: "#/components/schemas/__integerMin1Max2147483647"
          description: Use Program to select a specific program from within a multi-program transport stream. Note that Quad 4K is not currently supported. Default is the first program within the transport stream. If the program you specify doesn't exist, the transcoding service will use this default.
        PsiControl:
          $ref: "#/components/schemas/InputPsiControl"
          description: Set PSI control for transport stream inputs to specify which data the demux process to scans. * Ignore PSI - Scan all PIDs for audio and video. * Use PSI - Scan only PSI data.
        SupplementalImps:
          $ref: "#/components/schemas/__listOf__stringPatternS3ASSETMAPXml"
          description: Provide a list of any necessary supplemental IMPs. You need supplemental IMPs if the CPL that you're using for your input is in an incomplete IMP. Specify either the supplemental IMP directories with a trailing slash or the ASSETMAP.xml files. For example ["s3://bucket/ov/", "s3://bucket/vf2/ASSETMAP.xml"]. You don't need to specify the IMP that contains your input CPL, because the service automatically detects it.
        TamsSettings:
          $ref: "#/components/schemas/InputTamsSettings"
          description: "Specify a Time Addressable Media Store (TAMS) server as an input source. TAMS is an open-source API specification that provides access to time-segmented media content. Use TAMS to retrieve specific time ranges from live or archived media streams. When you specify TAMS settings, MediaConvert connects to your TAMS server, retrieves the media segments for your specified time range, and processes them as a single input. This enables workflows like extracting clips from live streams or processing specific portions of archived content. To use TAMS, you must: 1. Have access to a TAMS-compliant server 2. Specify the server URL in the Input file URL field 3. Provide the required SourceId and Timerange parameters 4. Configure authentication, if your TAMS server requires it"
        TimecodeSource:
          $ref: "#/components/schemas/InputTimecodeSource"
          description: Use this Timecode source setting, located under the input settings, to specify how the service counts input video frames. This input frame count affects only the behavior of features that apply to a single input at a time, such as input clipping and synchronizing some captions formats. Choose Embedded to use the timecodes in your input video. Choose Start at zero to start the first frame at zero. Choose Specified start to start the first frame at the timecode that you specify in the setting Start timecode. If you don't specify a value for Timecode source, the service will use Embedded by default. For more information about timecodes, see https://docs.aws.amazon.com/console/mediaconvert/timecode.
        TimecodeStart:
          $ref: "#/components/schemas/__stringMin11Max11Pattern01D20305D205D"
          description: Specify the timecode that you want the service to use for this input's initial frame. To use this setting, you must set the Timecode source setting, located under the input settings, to Specified start. For more information about timecodes, see https://docs.aws.amazon.com/console/mediaconvert/timecode.
        VideoGenerator:
          $ref: "#/components/schemas/InputVideoGenerator"
          description: When you include Video generator, MediaConvert creates a video input with black frames. Use this setting if you do not have a video input or if you want to add black video frames before, or after, other inputs. You can specify Video generator, or you can specify an Input file, but you cannot specify both. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/video-generator.html
        VideoOverlays:
          $ref: "#/components/schemas/__listOfVideoOverlay"
          description: Contains an array of video overlays.
        VideoSelector:
          $ref: "#/components/schemas/VideoSelector"
          description: Input video selectors contain the video settings for the input. Each of your inputs can have up to one video selector.
    AdvancedInputFilter:
      description: "Use to remove noise, blocking, blurriness, or ringing from your input as a pre-filter step before encoding. The Advanced input filter removes more types of compression artifacts and is an improvement when compared to basic Deblock and Denoise filters. To remove video compression artifacts from your input and improve the video quality: Choose Enabled. Additionally, this filter can help increase the video quality of your output relative to its bitrate, since noisy inputs are more complex and require more bits to encode. To help restore loss of detail after applying the filter, you can optionally add texture or sharpening as an additional step. Jobs that use this feature incur pro-tier pricing. To not apply advanced input filtering: Choose Disabled. Note that you can still apply basic filtering with Deblock and Denoise."
      type: string
      enum:
        - ENABLED
        - DISABLED
    AdvancedInputFilterSettings:
      description: Optional settings for Advanced input filter when you set Advanced input filter to Enabled.
      type: object
      properties:
        AddTexture:
          $ref: "#/components/schemas/AdvancedInputFilterAddTexture"
          description: "Add texture and detail to areas of your input video content that were lost after applying the Advanced input filter. To adaptively add texture and reduce softness: Choose Enabled. To not add any texture: Keep the default value, Disabled. We recommend that you choose Disabled for input video content that doesn't have texture, including screen recordings, computer graphics, or cartoons."
        Sharpening:
          $ref: "#/components/schemas/AdvancedInputFilterSharpen"
          description: "Optionally specify the amount of sharpening to apply when you use the Advanced input filter. Sharpening adds contrast to the edges of your video content and can reduce softness. To apply no sharpening: Keep the default value, Off. To apply a minimal amount of sharpening choose Low, or for the maximum choose High."
    AdvancedInputFilterAddTexture:
      description: "Add texture and detail to areas of your input video content that were lost after applying the Advanced input filter. To adaptively add texture and reduce softness: Choose Enabled. To not add any texture: Keep the default value, Disabled. We recommend that you choose Disabled for input video content that doesn't have texture, including screen recordings, computer graphics, or cartoons."
      type: string
      enum:
        - ENABLED
        - DISABLED
    AdvancedInputFilterSharpen:
      description: "Optionally specify the amount of sharpening to apply when you use the Advanced input filter. Sharpening adds contrast to the edges of your video content and can reduce softness. To apply no sharpening: Keep the default value, Off. To apply a minimal amount of sharpening choose Low, or for the maximum choose High."
      type: string
      enum:
        - "OFF"
        - LOW
        - HIGH
    Rectangle:
      description: Use Rectangle to identify a specific area of the video frame.
      type: object
      properties:
        Height:
          $ref: "#/components/schemas/__integerMin2Max2147483647"
          description: Height of rectangle in pixels. Specify only even numbers.
        Width:
          $ref: "#/components/schemas/__integerMin2Max2147483647"
          description: Width of rectangle in pixels. Specify only even numbers.
        X:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: The distance, in pixels, between the rectangle and the left edge of the video frame. Specify only even numbers.
        "Y":
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: The distance, in pixels, between the rectangle and the top edge of the video frame. Specify only even numbers.
    __integerMin2Max2147483647:
      type: integer
      minimum: 2
      maximum: 2147483647
    InputDeblockFilter:
      description: Enable Deblock to produce smoother motion in the output. Default is disabled. Only manually controllable for MPEG2 and uncompressed video inputs.
      type: string
      enum:
        - ENABLED
        - DISABLED
    InputDecryptionSettings:
      description: Settings for decrypting any input files that you encrypt before you upload them to Amazon S3. MediaConvert can decrypt files only when you use AWS Key Management Service (KMS) to encrypt the data key that you use to encrypt your content.
      type: object
      properties:
        DecryptionMode:
          $ref: "#/components/schemas/DecryptionMode"
          description: Specify the encryption mode that you used to encrypt your input files.
        EncryptedDecryptionKey:
          $ref: "#/components/schemas/__stringMin24Max512PatternAZaZ0902"
          description: Warning! Don't provide your encryption key in plaintext. Your job settings could be intercepted, making your encrypted content vulnerable. Specify the encrypted version of the data key that you used to encrypt your content. The data key must be encrypted by AWS Key Management Service (KMS). The key can be 128, 192, or 256 bits.
        InitializationVector:
          $ref: "#/components/schemas/__stringMin16Max24PatternAZaZ0922AZaZ0916"
          description: Specify the initialization vector that you used when you encrypted your content before uploading it to Amazon S3. You can use a 16-byte initialization vector with any encryption mode. Or, you can use a 12-byte initialization vector with GCM or CTR. MediaConvert accepts only initialization vectors that are base64-encoded.
        KmsKeyRegion:
          $ref: "#/components/schemas/__stringMin9Max19PatternAZ26EastWestCentralNorthSouthEastWest1912"
          description: Specify the AWS Region for AWS Key Management Service (KMS) that you used to encrypt your data key, if that Region is different from the one you are using for AWS Elemental MediaConvert.
    DecryptionMode:
      description: Specify the encryption mode that you used to encrypt your input files.
      type: string
      enum:
        - AES_CTR
        - AES_CBC
        - AES_GCM
    __stringMin24Max512PatternAZaZ0902:
      type: string
      minLength: 24
      maxLength: 512
      pattern: ^[A-Za-z0-9+\/]+={0,2}$
    __stringMin16Max24PatternAZaZ0922AZaZ0916:
      type: string
      minLength: 16
      maxLength: 24
      pattern: ^[A-Za-z0-9+\/]{22}==$|^[A-Za-z0-9+\/]{16}$
    __stringMin9Max19PatternAZ26EastWestCentralNorthSouthEastWest1912:
      type: string
      minLength: 9
      maxLength: 19
      pattern: ^[a-z-]{2,6}-(east|west|central|((north|south)(east|west)?))-[1-9]{1,2}$
    InputDenoiseFilter:
      description: Enable Denoise to filter noise from the input. Default is disabled. Only applicable to MPEG2, H.264, H.265, and uncompressed video inputs.
      type: string
      enum:
        - ENABLED
        - DISABLED
    __stringMin14PatternS3XmlXMLHttpsXmlXML:
      type: string
      minLength: 14
      pattern: ^((s3://(.*?)\.(xml|XML))|(https?://(.*?)\.(xml|XML)(\?([^&=]+=[^&]+&)*[^&=]+=[^&]+)?))$
    __stringMax2048PatternS3Https:
      type: string
      maxLength: 2048
      pattern: ^s3://([^\/]+\/+)+((([^\/]*)))|^https?://[^\/].*[^&]$
    InputFilterEnable:
      description: "Specify whether to apply input filtering to improve the video quality of your input. To apply filtering depending on your input type and quality: Choose Auto. To apply no filtering: Choose Disable. To apply filtering regardless of your input type and quality: Choose Force. When you do, you must also specify a value for Filter strength."
      type: string
      enum:
        - AUTO
        - DISABLE
        - FORCE
    __integerMin0Max5:
      type: integer
      minimum: 0
      maximum: 5
    ImageInserter:
      description: Use the image inserter feature to include a graphic overlay on your video. Enable or disable this feature for each input or output individually. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/graphic-overlay.html. This setting is disabled by default.
      type: object
      properties:
        InsertableImages:
          $ref: "#/components/schemas/__listOfInsertableImage"
          description: Specify the images that you want to overlay on your video. The images must be PNG or TGA files.
        SdrReferenceWhiteLevel:
          $ref: "#/components/schemas/__integerMin100Max1000"
          description: Specify the reference white level, in nits, for all of your image inserter images. Use to correct brightness levels within HDR10 outputs. For 1,000 nit peak brightness displays, we recommend that you set SDR reference white level to 203 (according to ITU-R BT.2408). Leave blank to use the default value of 100, or specify an integer from 100 to 1000.
    __listOfInsertableImage:
      type: array
      items:
        $ref: "#/components/schemas/InsertableImage"
    InsertableImage:
      description: These settings apply to a specific graphic overlay. You can include multiple overlays in your job.
      type: object
      properties:
        Duration:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the time, in milliseconds, for the image to remain on the output video. This duration includes fade-in time but not fade-out time.
        FadeIn:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the length of time, in milliseconds, between the Start time that you specify for the image insertion and the time that the image appears at full opacity. Full opacity is the level that you specify for the opacity setting. If you don't specify a value for Fade-in, the image will appear abruptly at the overlay start time.
        FadeOut:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the length of time, in milliseconds, between the end of the time that you have specified for the image overlay Duration and when the overlaid image has faded to total transparency. If you don't specify a value for Fade-out, the image will disappear abruptly at the end of the inserted image duration.
        Height:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the height of the inserted image in pixels. If you specify a value that's larger than the video resolution height, the service will crop your overlaid image to fit. To use the native height of the image, keep this setting blank.
        ImageInserterInput:
          $ref: "#/components/schemas/__stringMin14PatternS3BmpBMPPngPNGTgaTGAHttpsBmpBMPPngPNGTgaTGA"
          description: Specify the HTTP, HTTPS, or Amazon S3 location of the image that you want to overlay on the video. Use a PNG or TGA file.
        ImageX:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the distance, in pixels, between the inserted image and the left edge of the video frame. Required for any image overlay that you specify.
        ImageY:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the distance, in pixels, between the overlaid image and the top edge of the video frame. Required for any image overlay that you specify.
        Layer:
          $ref: "#/components/schemas/__integerMin0Max99"
          description: Specify how overlapping inserted images appear. Images with higher values for Layer appear on top of images with lower values for Layer.
        Opacity:
          $ref: "#/components/schemas/__integerMin0Max100"
          description: Use Opacity to specify how much of the underlying video shows through the inserted image. 0 is transparent and 100 is fully opaque. Default is 50.
        StartTime:
          $ref: "#/components/schemas/__stringPattern01D20305D205D"
          description: Specify the timecode of the frame that you want the overlay to first appear on. This must be in timecode (HH:MM:SS:FF or HH:MM:SS;FF) format. Remember to take into account your timecode source settings.
        Width:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the width of the inserted image in pixels. If you specify a value that's larger than the video resolution width, the service will crop your overlaid image to fit. To use the native width of the image, keep this setting blank.
    __stringMin14PatternS3BmpBMPPngPNGTgaTGAHttpsBmpBMPPngPNGTgaTGA:
      type: string
      minLength: 14
      pattern: ^((s3://(.*?)\.(bmp|BMP|png|PNG|tga|TGA))|(https?://(.*?)\.(bmp|BMP|png|PNG|tga|TGA)(\?([^&=]+=[^&]+&)*[^&=]+=[^&]+)?))$
    __integerMin0Max99:
      type: integer
      minimum: 0
      maximum: 99
    __integerMin0Max100:
      type: integer
      minimum: 0
      maximum: 100
    __stringPattern01D20305D205D:
      type: string
      pattern: ^((([0-1]\d)|(2[0-3]))(:[0-5]\d){2}([:;][0-5]\d))$
    __integerMin100Max1000:
      type: integer
      minimum: 100
      maximum: 1000
    __listOfInputClipping:
      type: array
      items:
        $ref: "#/components/schemas/InputClipping"
    InputClipping:
      description: To transcode only portions of your input, include one input clip for each part of your input that you want in your output. All input clips that you specify will be included in every output of the job. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/assembling-multiple-inputs-and-input-clips.html.
      type: object
      properties:
        EndTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092090909"
          description: Set End timecode to the end of the portion of the input you are clipping. The frame corresponding to the End timecode value is included in the clip. Start timecode or End timecode may be left blank, but not both. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When choosing this value, take into account your setting for timecode source under input settings. For example, if you have embedded timecodes that start at 01:00:00:00 and you want your clip to end six minutes into the video, use 01:06:00:00.
        StartTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092090909"
          description: Set Start timecode to the beginning of the portion of the input you are clipping. The frame corresponding to the Start timecode value is included in the clip. Start timecode or End timecode may be left blank, but not both. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When choosing this value, take into account your setting for Input timecode source. For example, if you have embedded timecodes that start at 01:00:00:00 and you want your clip to begin five minutes into the video, use 01:05:00:00.
    __stringPattern010920405090509092090909:
      type: string
      pattern: ^([01][0-9]|2[0-4]):[0-5][0-9]:[0-5][0-9][:;][0-9]{2}(@[0-9]+(\.[0-9]+)?(:[0-9]+)?)?$
    InputScanType:
      description: When you have a progressive segmented frame (PsF) input, use this setting to flag the input as PsF. MediaConvert doesn't automatically detect PsF. Therefore, flagging your input as PsF results in better preservation of video quality when you do deinterlacing and frame rate conversion. If you don't specify, the default value is Auto. Auto is the correct setting for all inputs that are not PsF. Don't set this value to PsF when your input is interlaced. Doing so creates horizontal interlacing artifacts.
      type: string
      enum:
        - AUTO
        - PSF
    __listOfMultiViewSettings:
      type: array
      items:
        $ref: "#/components/schemas/MultiViewSettings"
    MultiViewSettings:
      description: Specify the enhancement layer input video file path for Multi View outputs. The base layer input is treated as the left eye and this Multi View input is treated as the right eye. Only one Multi View input is currently supported. MediaConvert encodes both views into a single MV-HEVC output codec. When you add MultiViewSettings to your job, you can only produce Multi View outputs. Adding any other codec output to the same job is not supported.
      type: object
      properties:
        Input:
          $ref: "#/components/schemas/MultiViewInput"
          description: Input settings for MultiView Settings. You can include exactly one input as enhancement layer.
    MultiViewInput:
      description: Input settings for MultiView Settings. You can include exactly one input as enhancement layer.
      type: object
      properties:
        FileInput:
          $ref: "#/components/schemas/__stringPatternS3Https"
          description: Specify the input file S3, HTTP, or HTTPS URL for your right eye view video.
    __stringPatternS3Https:
      type: string
      pattern: ^s3://([^\/]+\/+)+((([^\/]*)))|^https?://[^\/].*[^&]$
    __integerMin1Max2147483647:
      type: integer
      minimum: 1
      maximum: 2147483647
    InputPsiControl:
      description: Set PSI control for transport stream inputs to specify which data the demux process to scans. * Ignore PSI - Scan all PIDs for audio and video. * Use PSI - Scan only PSI data.
      type: string
      enum:
        - IGNORE_PSI
        - USE_PSI
    __listOf__stringPatternS3ASSETMAPXml:
      type: array
      items:
        $ref: "#/components/schemas/__stringPatternS3ASSETMAPXml"
    __stringPatternS3ASSETMAPXml:
      type: string
      pattern: ^s3:\/\/.*\/(ASSETMAP.xml)?$
    InputTamsSettings:
      description: "Specify a Time Addressable Media Store (TAMS) server as an input source. TAMS is an open-source API specification that provides access to time-segmented media content. Use TAMS to retrieve specific time ranges from live or archived media streams. When you specify TAMS settings, MediaConvert connects to your TAMS server, retrieves the media segments for your specified time range, and processes them as a single input. This enables workflows like extracting clips from live streams or processing specific portions of archived content. To use TAMS, you must: 1. Have access to a TAMS-compliant server 2. Specify the server URL in the Input file URL field 3. Provide the required SourceId and Timerange parameters 4. Configure authentication, if your TAMS server requires it"
      type: object
      properties:
        AuthConnectionArn:
          $ref: "#/components/schemas/__stringPatternArnAwsAZ09EventsAZ090912ConnectionAZAZ09AF0936"
          description: "Specify the ARN (Amazon Resource Name) of an EventBridge Connection to authenticate with your TAMS server. The EventBridge Connection stores your authentication credentials securely. MediaConvert assumes your job's IAM role to access this connection, so ensure the role has the events:RetrieveConnectionCredentials, secretsmanager:DescribeSecret, and secretsmanager:GetSecretValue permissions. Format: arn:aws:events:region:account-id:connection/connection-name/unique-id This setting is required when you include TAMS settings in your job."
        GapHandling:
          $ref: "#/components/schemas/TamsGapHandling"
          description: "Specify how MediaConvert handles gaps between media segments in your TAMS source. Gaps can occur in live streams due to network issues or other interruptions. Choose from the following options: * Skip gaps - Default. Skip over gaps and join segments together. This creates a continuous output with no blank frames, but may cause timeline discontinuities. * Fill with black - Insert black frames to fill gaps between segments. This maintains timeline continuity but adds black frames where content is missing. * Hold last frame - Repeat the last frame before a gap until the next segment begins. This maintains visual continuity during gaps."
        SourceId:
          $ref: "#/components/schemas/__string"
          description: Specify the unique identifier for the media source in your TAMS server. MediaConvert uses this source ID to locate the appropriate flows containing the media segments you want to process. The source ID corresponds to a specific media source registered in your TAMS server. This source must be of type urn:x-nmos:format:multi, and can can reference multiple flows for audio, video, or combined audio/video content. MediaConvert automatically selects the highest quality flows available for your job. This setting is required when you include TAMS settings in your job.
        Timerange:
          $ref: "#/components/schemas/__stringPattern019090190908019090190908"
          description: "Specify the time range of media segments to retrieve from your TAMS server. MediaConvert fetches only the segments that fall within this range. Use the format specified by your TAMS server implementation. This must be two timestamp values with the format {sign?}{seconds}:{nanoseconds}, separated by an underscore, surrounded by either parentheses or square brackets. Example: [15:0_35:0) This setting is required when you include TAMS settings in your job."
    __stringPatternArnAwsAZ09EventsAZ090912ConnectionAZAZ09AF0936:
      type: string
      pattern: ^arn:aws[a-z0-9-]*:events:[a-z0-9-]+:[0-9]{12}:connection/[a-zA-Z0-9-]+/[a-f0-9-]{36}$
    TamsGapHandling:
      description: "Specify how MediaConvert handles gaps between media segments in your TAMS source. Gaps can occur in live streams due to network issues or other interruptions. Choose from the following options: * Skip gaps - Default. Skip over gaps and join segments together. This creates a continuous output with no blank frames, but may cause timeline discontinuities. * Fill with black - Insert black frames to fill gaps between segments. This maintains timeline continuity but adds black frames where content is missing. * Hold last frame - Repeat the last frame before a gap until the next segment begins. This maintains visual continuity during gaps."
      type: string
      enum:
        - SKIP_GAPS
        - FILL_WITH_BLACK
        - HOLD_LAST_FRAME
    __stringPattern019090190908019090190908:
      type: string
      pattern: ^(\[|\()?(-?(0|[1-9][0-9]*):(0|[1-9][0-9]{0,8}))?(_(-?(0|[1-9][0-9]*):(0|[1-9][0-9]{0,8}))?)?(\]|\))?$
    InputTimecodeSource:
      description: Use this Timecode source setting, located under the input settings, to specify how the service counts input video frames. This input frame count affects only the behavior of features that apply to a single input at a time, such as input clipping and synchronizing some captions formats. Choose Embedded to use the timecodes in your input video. Choose Start at zero to start the first frame at zero. Choose Specified start to start the first frame at the timecode that you specify in the setting Start timecode. If you don't specify a value for Timecode source, the service will use Embedded by default. For more information about timecodes, see https://docs.aws.amazon.com/console/mediaconvert/timecode.
      type: string
      enum:
        - EMBEDDED
        - ZEROBASED
        - SPECIFIEDSTART
    __stringMin11Max11Pattern01D20305D205D:
      type: string
      minLength: 11
      maxLength: 11
      pattern: ^((([0-1]\d)|(2[0-3]))(:[0-5]\d){2}([:;][0-5]\d))$
    InputVideoGenerator:
      description: When you include Video generator, MediaConvert creates a video input with black frames. Use this setting if you do not have a video input or if you want to add black video frames before, or after, other inputs. You can specify Video generator, or you can specify an Input file, but you cannot specify both. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/video-generator.html
      type: object
      properties:
        Channels:
          $ref: "#/components/schemas/__integerMin1Max32"
          description: Specify the number of audio channels to include in your video generator input. MediaConvert creates these audio channels as silent audio within a single audio track. Enter an integer from 1 to 32.
        Duration:
          $ref: "#/components/schemas/__integerMin1Max86400000"
          description: Specify the duration, in milliseconds, for your video generator input. Enter an integer from 1 to 86400000.
        FramerateDenominator:
          $ref: "#/components/schemas/__integerMin1Max1001"
          description: Specify the denominator of the fraction that represents the frame rate for your video generator input. When you do, you must also specify a value for Frame rate numerator. MediaConvert uses a default frame rate of 29.97 when you leave Frame rate numerator and Frame rate denominator blank.
        FramerateNumerator:
          $ref: "#/components/schemas/__integerMin1Max60000"
          description: Specify the numerator of the fraction that represents the frame rate for your video generator input. When you do, you must also specify a value for Frame rate denominator. MediaConvert uses a default frame rate of 29.97 when you leave Frame rate numerator and Frame rate denominator blank.
        Height:
          $ref: "#/components/schemas/__integerMin32Max8192"
          description: "Specify the height, in pixels, for your video generator input. This is useful for positioning when you include one or more video overlays for this input. To use the default resolution 540x360: Leave both width and height blank. To specify a height: Enter an even integer from 32 to 8192. When you do, you must also specify a value for width."
        ImageInput:
          $ref: "#/components/schemas/__stringMin14PatternS3BmpBMPPngPNGTgaTGAHttpsBmpBMPPngPNGTgaTGA"
          description: Specify the HTTP, HTTPS, or Amazon S3 location of the image that you want to overlay on the video. Use a PNG or TGA file.
        SampleRate:
          $ref: "#/components/schemas/__integerMin32000Max48000"
          description: Specify the audio sample rate, in Hz, for the silent audio in your video generator input. Enter an integer from 32000 to 48000.
        Width:
          $ref: "#/components/schemas/__integerMin32Max8192"
          description: "Specify the width, in pixels, for your video generator input. This is useful for positioning when you include one or more video overlays for this input. To use the default resolution 540x360: Leave both width and height blank. To specify a width: Enter an even integer from 32 to 8192. When you do, you must also specify a value for height."
    __integerMin1Max32:
      type: integer
      minimum: 1
      maximum: 32
    __integerMin1Max86400000:
      type: integer
      minimum: 1
      maximum: 86400000
    __integerMin1Max1001:
      type: integer
      minimum: 1
      maximum: 1001
    __integerMin1Max60000:
      type: integer
      minimum: 1
      maximum: 60000
    __integerMin32Max8192:
      type: integer
      minimum: 32
      maximum: 8192
    __integerMin32000Max48000:
      type: integer
      minimum: 32000
      maximum: 48000
    __listOfVideoOverlay:
      type: array
      items:
        $ref: "#/components/schemas/VideoOverlay"
    VideoOverlay:
      description: Overlay one or more videos on top of your input video. For more information, see https://docs.aws.amazon.com/mediaconvert/latest/ug/video-overlays.html
      type: object
      properties:
        Crop:
          $ref: "#/components/schemas/VideoOverlayCrop"
          description: Specify a rectangle of content to crop and use from your video overlay's input video. When you do, MediaConvert uses the cropped dimensions that you specify under X offset, Y offset, Width, and Height.
        EndTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: "Enter the end timecode in the base input video for this overlay. Your overlay will be active through this frame. To display your video overlay for the duration of the base input video: Leave blank. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS isthe second, and FF is the frame number. When entering this value, take into account your choice for the base input video's timecode source. For example, if you have embedded timecodes that start at 01:00:00:00 and you want your overlay to end ten minutes into the video, enter 01:10:00:00."
        InitialPosition:
          $ref: "#/components/schemas/VideoOverlayPosition"
          description: "Specify the Initial position of your video overlay. To specify the Initial position of your video overlay, including distance from the left or top edge of the base input video's frame, or size: Enter a value for X position, Y position, Width, or Height. To use the full frame of the base input video: Leave blank."
        Input:
          $ref: "#/components/schemas/VideoOverlayInput"
          description: Input settings for Video overlay. You can include one or more video overlays in sequence at different times that you specify.
        Playback:
          $ref: "#/components/schemas/VideoOverlayPlayBackMode"
          description: "Specify whether your video overlay repeats or plays only once. To repeat your video overlay on a loop: Keep the default value, Repeat. Your overlay will repeat for the duration of the base input video. To playback your video overlay only once: Choose Once. With either option, you can end playback at a time that you specify by entering a value for End timecode."
        StartTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: "Enter the start timecode in the base input video for this overlay. Your overlay will be active starting with this frame. To display your video overlay starting at the beginning of the base input video: Leave blank. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When entering this value, take into account your choice for the base input video's timecode source. For example, if you have embedded timecodes that start at 01:00:00:00 and you want your overlay to begin five minutes into the video, enter 01:05:00:00."
        Transitions:
          $ref: "#/components/schemas/__listOfVideoOverlayTransition"
          description: "Specify one or more transitions for your video overlay. Use Transitions to reposition or resize your overlay over time. To use the same position and size for the duration of your video overlay: Leave blank. To specify a Transition: Enter a value for Start timecode, End Timecode, X Position, Y Position, Width, or Height."
    VideoOverlayCrop:
      description: Specify a rectangle of content to crop and use from your video overlay's input video. When you do, MediaConvert uses the cropped dimensions that you specify under X offset, Y offset, Width, and Height.
      type: object
      properties:
        Height:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify the height of the video overlay cropping rectangle. To use the same height as your overlay input video: Keep blank, or enter 0. To specify a different height for the cropping rectangle: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 100 and choose Pixels, the cropping rectangle will be 100 pixels high. When you enter 10, choose Percentage, and your overlay input video is 1920x1080, the cropping rectangle will be 108 pixels high."
        Unit:
          $ref: "#/components/schemas/VideoOverlayUnit"
          description: Specify the Unit type to use when you enter a value for X position, Y position, Width, or Height. You can choose Pixels or Percentage. Leave blank to use the default value, Pixels.
        Width:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify the width of the video overlay cropping rectangle. To use the same width as your overlay input video: Keep blank, or enter 0. To specify a different width for the cropping rectangle: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 100 and choose Pixels, the cropping rectangle will be 100 pixels wide. When you enter 10, choose Percentage, and your overlay input video is 1920x1080, the cropping rectangle will be 192 pixels wide."
        X:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify the distance between the cropping rectangle and the left edge of your overlay video's frame. To position the cropping rectangle along the left edge: Keep blank, or enter 0. To position the cropping rectangle to the right, relative to the left edge of your overlay video's frame: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 10 and choose Pixels, the cropping rectangle will be positioned 10 pixels from the left edge of the overlay video's frame. When you enter 10, choose Percentage, and your overlay input video is 1920x1080, the cropping rectangle will be positioned 192 pixels from the left edge of the overlay video's frame."
        "Y":
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: "Specify the distance between the cropping rectangle and the top edge of your overlay video's frame. To position the cropping rectangle along the top edge: Keep blank, or enter 0. To position the cropping rectangle down, relative to the top edge of your overlay video's frame: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 10 and choose Pixels, the cropping rectangle will be positioned 10 pixels from the top edge of the overlay video's frame. When you enter 10, choose Percentage, and your overlay input video is 1920x1080, the cropping rectangle will be positioned 108 pixels from the top edge of the overlay video's frame."
    VideoOverlayUnit:
      description: Specify the Unit type to use when you enter a value for X position, Y position, Width, or Height. You can choose Pixels or Percentage. Leave blank to use the default value, Pixels.
      type: string
      enum:
        - PIXELS
        - PERCENTAGE
    __stringPattern010920405090509092:
      type: string
      pattern: ^([01][0-9]|2[0-4]):[0-5][0-9]:[0-5][0-9][:;][0-9]{2}$
    VideoOverlayPosition:
      description: position of video overlay
      type: object
      properties:
        Height:
          $ref: "#/components/schemas/__integerMinNegative1Max2147483647"
          description: "To scale your video overlay to the same height as the base input video: Leave blank. To scale the height of your video overlay to a different height: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 360 and choose Pixels, your video overlay will be rendered with a height of 360. When you enter 50, choose Percentage, and your overlay's source has a height of 1080, your video overlay will be rendered with a height of 540. To scale your overlay to a specific height while automatically maintaining its original aspect ratio, enter a value for Height and leave Width blank."
        Opacity:
          $ref: "#/components/schemas/__integerMin0Max100"
          description: Use Opacity to specify how much of the underlying video shows through the overlay video. 0 is transparent and 100 is fully opaque. Default is 100.
        Unit:
          $ref: "#/components/schemas/VideoOverlayUnit"
          description: Specify the Unit type to use when you enter a value for X position, Y position, Width, or Height. You can choose Pixels or Percentage. Leave blank to use the default value, Pixels.
        Width:
          $ref: "#/components/schemas/__integerMinNegative1Max2147483647"
          description: "To scale your video overlay to the same width as the base input video: Leave blank. To scale the width of your video overlay to a different width: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 640 and choose Pixels, your video overlay will scale to a height of 640 pixels. When you enter 50, choose Percentage, and your overlay's source has a width of 1920, your video overlay will scale to a width of 960. To scale your overlay to a specific width while automatically maintaining its original aspect ratio, enter a value for Width and leave Height blank."
        XPosition:
          $ref: "#/components/schemas/__integerMinNegative2147483648Max2147483647"
          description: "To position the left edge of your video overlay along the left edge of the base input video's frame: Keep blank, or enter 0. To position the left edge of your video overlay to the right, relative to the left edge of the base input video's frame: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 10 and choose Pixels, your video overlay will be positioned 10 pixels from the left edge of the base input video's frame. When you enter 10, choose Percentage, and your base input video is 1920x1080, your video overlay will be positioned 192 pixels from the left edge of the base input video's frame."
        YPosition:
          $ref: "#/components/schemas/__integerMinNegative2147483648Max2147483647"
          description: "To position the top edge of your video overlay along the top edge of the base input video's frame: Keep blank, or enter 0. To position the top edge of your video overlay down, relative to the top edge of the base input video's frame: Enter an integer representing the Unit type that you choose, either Pixels or Percentage. For example, when you enter 10 and choose Pixels, your video overlay will be positioned 10 pixels from the top edge of the base input video's frame. When you enter 10, choose Percentage, and your underlying video is 1920x1080, your video overlay will be positioned 108 pixels from the top edge of the base input video's frame."
    __integerMinNegative1Max2147483647:
      type: integer
      minimum: -1
      maximum: 2147483647
    __integerMinNegative2147483648Max2147483647:
      type: integer
      minimum: -2147483648
      maximum: 2147483647
    VideoOverlayInput:
      description: Input settings for Video overlay. You can include one or more video overlays in sequence at different times that you specify.
      type: object
      properties:
        AudioSelectors:
          type: object
          properties: {}
          description: Use Audio selectors to specify audio to use during your Video overlay. You can use multiple Audio selectors per Video overlay. When you include an Audio selector within a Video overlay, MediaConvert mutes any Audio selectors with the same name from the underlying input. For example, if your underlying input has Audio selector 1 and Audio selector 2, and your Video overlay only has Audio selector 1, then MediaConvert replaces all audio for Audio selector 1 during the Video overlay. To replace all audio for all Audio selectors from the underlying input by using a single Audio selector in your overlay, set DefaultSelection to DEFAULT (Check \"Use as default\" in the MediaConvert console).
        FileInput:
          $ref: "#/components/schemas/__stringPatternS3Https"
          description: "Specify the input file S3, HTTP, or HTTPS URL for your video overlay. To specify one or more Transitions for your base input video instead: Leave blank."
        InputClippings:
          $ref: "#/components/schemas/__listOfVideoOverlayInputClipping"
          description: Specify one or more clips to use from your video overlay. When you include an input clip, you must also specify its start timecode, end timecode, or both start and end timecode.
        TimecodeSource:
          $ref: "#/components/schemas/InputTimecodeSource"
          description: "Specify the timecode source for your video overlay input clips. To use the timecode present in your video overlay: Choose Embedded. To use a zerobased timecode: Choose Start at 0. To choose a timecode: Choose Specified start. When you do, enter the starting timecode in Start timecode. If you don't specify a value for Timecode source, MediaConvert uses Embedded by default."
        TimecodeStart:
          $ref: "#/components/schemas/__stringMin11Max11Pattern01D20305D205D"
          description: Specify the starting timecode for this video overlay. To use this setting, you must set Timecode source to Specified start.
    __listOfVideoOverlayInputClipping:
      type: array
      items:
        $ref: "#/components/schemas/VideoOverlayInputClipping"
    VideoOverlayInputClipping:
      description: To transcode only portions of your video overlay, include one input clip for each part of your video overlay that you want in your output.
      type: object
      properties:
        EndTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092090909"
          description: Specify the timecode of the last frame to include in your video overlay's clip. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When entering this value, take into account your choice for Timecode source.
        StartTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092090909"
          description: Specify the timecode of the first frame to include in your video overlay's clip. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When entering this value, take into account your choice for Timecode source.
    VideoOverlayPlayBackMode:
      description: "Specify whether your video overlay repeats or plays only once. To repeat your video overlay on a loop: Keep the default value, Repeat. Your overlay will repeat for the duration of the base input video. To playback your video overlay only once: Choose Once. With either option, you can end playback at a time that you specify by entering a value for End timecode."
      type: string
      enum:
        - ONCE
        - REPEAT
    __listOfVideoOverlayTransition:
      type: array
      items:
        $ref: "#/components/schemas/VideoOverlayTransition"
    VideoOverlayTransition:
      description: "Specify one or more Transitions for your video overlay. Use Transitions to reposition or resize your overlay over time. To use the same position and size for the duration of your video overlay: Leave blank. To specify a Transition: Enter a value for Start timecode, End Timecode, X Position, Y Position, Width, Height, or Opacity"
      type: object
      properties:
        EndPosition:
          $ref: "#/components/schemas/VideoOverlayPosition"
          description: Specify the ending position for this transition, relative to the base input video's frame. Your video overlay will move smoothly to this position, beginning at this transition's Start timecode and ending at this transition's End timecode.
        EndTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: Specify the timecode for when this transition ends. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When entering this value, take into account your choice for Timecode source.
        StartTimecode:
          $ref: "#/components/schemas/__stringPattern010920405090509092"
          description: Specify the timecode for when this transition begins. Use the format HH:MM:SS:FF or HH:MM:SS;FF, where HH is the hour, MM is the minute, SS is the second, and FF is the frame number. When entering this value, take into account your choice for Timecode source.
    VideoSelector:
      description: Input video selectors contain the video settings for the input. Each of your inputs can have up to one video selector.
      type: object
      properties:
        AlphaBehavior:
          $ref: "#/components/schemas/AlphaBehavior"
          description: Ignore this setting unless this input is a QuickTime animation with an alpha channel. Use this setting to create separate Key and Fill outputs. In each output, specify which part of the input MediaConvert uses. Leave this setting at the default value DISCARD to delete the alpha channel and preserve the video. Set it to REMAP_TO_LUMA to delete the video and map the alpha channel to the luma channel of your outputs.
        ColorSpace:
          $ref: "#/components/schemas/ColorSpace"
          description: "If your input video has accurate color space metadata, or if you don't know about color space: Keep the default value, Follow. MediaConvert will automatically detect your input color space. If your input video has metadata indicating the wrong color space, or has missing metadata: Specify the accurate color space here. If your input video is HDR 10 and the SMPTE ST 2086 Mastering Display Color Volume static metadata isn't present in your video stream, or if that metadata is present but not accurate: Choose Force HDR 10. Specify correct values in the input HDR 10 metadata settings. For more information about HDR jobs, see https://docs.aws.amazon.com/console/mediaconvert/hdr. When you specify an input color space, MediaConvert uses the following color space metadata, which includes color primaries, transfer characteristics, and matrix coefficients: * HDR 10: BT.2020, PQ, BT.2020 non-constant * HLG 2020: BT.2020, HLG, BT.2020 non-constant * P3DCI (Theater): DCIP3, SMPTE 428M, BT.709 * P3D65 (SDR): Display P3, sRGB, BT.709 * P3D65 (HDR): Display P3, PQ, BT.709"
        ColorSpaceUsage:
          $ref: "#/components/schemas/ColorSpaceUsage"
          description: There are two sources for color metadata, the input file and the job input settings Color space and HDR master display information settings. The Color space usage setting determines which takes precedence. Choose Force to use color metadata from the input job settings. If you don't specify values for those settings, the service defaults to using metadata from your input. FALLBACK - Choose Fallback to use color metadata from the source when it is present. If there's no color metadata in your input file, the service defaults to using values you specify in the input settings.
        EmbeddedTimecodeOverride:
          $ref: "#/components/schemas/EmbeddedTimecodeOverride"
          description: Set Embedded timecode override to Use MDPM when your AVCHD input contains timecode tag data in the Modified Digital Video Pack Metadata. When you do, we recommend you also set Timecode source to Embedded. Leave Embedded timecode override blank, or set to None, when your input does not contain MDPM timecode.
        Hdr10Metadata:
          $ref: "#/components/schemas/Hdr10Metadata"
          description: Use these settings to provide HDR 10 metadata that is missing or inaccurate in your input video. Appropriate values vary depending on the input video and must be provided by a color grader. The color grader generates these values during the HDR 10 mastering process. The valid range for each of these settings is 0 to 50,000. Each increment represents 0.00002 in CIE1931 color coordinate. Related settings - When you specify these values, you must also set Color space to HDR 10. To specify whether the the values you specify here take precedence over the values in the metadata of your input file, set Color space usage. To specify whether color metadata is included in an output, set Color metadata. For more information about MediaConvert HDR jobs, see https://docs.aws.amazon.com/console/mediaconvert/hdr.
        MaxLuminance:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Specify the maximum mastering display luminance. Enter an integer from 0 to 2147483647, in units of 0.0001 nits. For example, enter 10000000 for 1000 nits.
        PadVideo:
          $ref: "#/components/schemas/PadVideo"
          description: "Use this setting if your input has video and audio durations that don't align, and your output or player has strict alignment requirements. Examples: Input audio track has a delayed start. Input video track ends before audio ends. When you set Pad video to Black, MediaConvert generates black video frames so that output video and audio durations match. Black video frames are added at the beginning or end, depending on your input. To keep the default behavior and not generate black video, set Pad video to Disabled or leave blank."
        Pid:
          $ref: "#/components/schemas/__integerMin1Max2147483647"
          description: Use PID to select specific video data from an input file. Specify this value as an integer; the system automatically converts it to the hexidecimal value. For example, 257 selects PID 0x101. A PID, or packet identifier, is an identifier for a set of data in an MPEG-2 transport stream container.
        ProgramNumber:
          $ref: "#/components/schemas/__integerMinNegative2147483648Max2147483647"
          description: Selects a specific program from within a multi-program transport stream. Note that Quad 4K is not currently supported.
        Rotate:
          $ref: "#/components/schemas/InputRotate"
          description: Use Rotate to specify how the service rotates your video. You can choose automatic rotation or specify a rotation. You can specify a clockwise rotation of 0, 90, 180, or 270 degrees. If your input video container is .mov or .mp4 and your input has rotation metadata, you can choose Automatic to have the service rotate your video according to the rotation specified in the metadata. The rotation must be within one degree of 90, 180, or 270 degrees. If the rotation metadata specifies any other rotation, the service will default to no rotation. By default, the service does no rotation, even if your input video has rotation metadata. The service doesn't pass through rotation metadata.
        SampleRange:
          $ref: "#/components/schemas/InputSampleRange"
          description: If the sample range metadata in your input video is accurate, or if you don't know about sample range, keep the default value, Follow, for this setting. When you do, the service automatically detects your input sample range. If your input video has metadata indicating the wrong sample range, specify the accurate sample range here. When you do, MediaConvert ignores any sample range information in the input metadata. Regardless of whether MediaConvert uses the input sample range or the sample range that you specify, MediaConvert uses the sample range for transcoding and also writes it to the output metadata.
        SelectorType:
          $ref: "#/components/schemas/VideoSelectorType"
          description: "Choose the video selector type for your HLS input. Use to specify which video rendition MediaConvert uses from your HLS input. To have MediaConvert automatically use the highest bitrate rendition from your HLS input: Keep the default value, Auto. To manually specify a rendition: Choose Stream. Then enter the unique stream number in the Streams array, starting at 1, corresponding to the stream order in the manifest."
        Streams:
          $ref: "#/components/schemas/__listOf__integerMin1Max2147483647"
          description: Specify one or more video streams for MediaConvert to use from your HLS input. Enter an integer corresponding to the stream number, with the first stream in your HLS multivariant playlist starting at 1. For re-encoding workflows, MediaConvert uses the video stream that you select with the highest bitrate as the input. For video passthrough workflows, you specify whether to passthrough a single video stream or multiple video streams under Video selector source in the output video encoding settings.
    AlphaBehavior:
      description: Ignore this setting unless this input is a QuickTime animation with an alpha channel. Use this setting to create separate Key and Fill outputs. In each output, specify which part of the input MediaConvert uses. Leave this setting at the default value DISCARD to delete the alpha channel and preserve the video. Set it to REMAP_TO_LUMA to delete the video and map the alpha channel to the luma channel of your outputs.
      type: string
      enum:
        - DISCARD
        - REMAP_TO_LUMA
    ColorSpaceUsage:
      description: There are two sources for color metadata, the input file and the job input settings Color space and HDR master display information settings. The Color space usage setting determines which takes precedence. Choose Force to use color metadata from the input job settings. If you don't specify values for those settings, the service defaults to using metadata from your input. FALLBACK - Choose Fallback to use color metadata from the source when it is present. If there's no color metadata in your input file, the service defaults to using values you specify in the input settings.
      type: string
      enum:
        - FORCE
        - FALLBACK
    EmbeddedTimecodeOverride:
      description: Set Embedded timecode override to Use MDPM when your AVCHD input contains timecode tag data in the Modified Digital Video Pack Metadata. When you do, we recommend you also set Timecode source to Embedded. Leave Embedded timecode override blank, or set to None, when your input does not contain MDPM timecode.
      type: string
      enum:
        - NONE
        - USE_MDPM
    Hdr10Metadata:
      description: Use these settings to specify static color calibration metadata, as defined by SMPTE ST 2086. These values don't affect the pixel values that are encoded in the video stream. They are intended to help the downstream video player display content in a way that reflects the intentions of the the content creator.
      type: object
      properties:
        BluePrimaryX:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        BluePrimaryY:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        GreenPrimaryX:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        GreenPrimaryY:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        MaxContentLightLevel:
          $ref: "#/components/schemas/__integerMin0Max65535"
          description: Maximum light level among all samples in the coded video sequence, in units of candelas per square meter. This setting doesn't have a default value; you must specify a value that is suitable for the content.
        MaxFrameAverageLightLevel:
          $ref: "#/components/schemas/__integerMin0Max65535"
          description: Maximum average light level of any frame in the coded video sequence, in units of candelas per square meter. This setting doesn't have a default value; you must specify a value that is suitable for the content.
        MaxLuminance:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Nominal maximum mastering display luminance in units of of 0.0001 candelas per square meter.
        MinLuminance:
          $ref: "#/components/schemas/__integerMin0Max2147483647"
          description: Nominal minimum mastering display luminance in units of of 0.0001 candelas per square meter
        RedPrimaryX:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        RedPrimaryY:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        WhitePointX:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
        WhitePointY:
          $ref: "#/components/schemas/__integerMin0Max50000"
          description: HDR Master Display Information must be provided by a color grader, using color grading tools. Range is 0 to 50,000, each increment represents 0.00002 in CIE1931 color coordinate. Note that this setting is not for color correction.
    __integerMin0Max50000:
      type: integer
      minimum: 0
      maximum: 50000
    __integerMin0Max65535:
      type: integer
      minimum: 0
      maximum: 65535
    PadVideo:
      description: "Use this setting if your input has video and audio durations that don't align, and your output or player has strict alignment requirements. Examples: Input audio track has a delayed start. Input video track ends before audio ends. When you set Pad video to Black, MediaConvert generates black video frames so that output video and audio durations match. Black video frames are added at the beginning or end, depending on your input. To keep the default behavior and not generate black video, set Pad video to Disabled or leave blank."
