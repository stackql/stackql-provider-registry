      description: Configuration for the grader used in reinforcement fine-tuning to evaluate model responses and provide reward signals.
      type: object
      properties:
        lambdaGrader:
          $ref: "#/components/schemas/LambdaGraderConfig"
          description: Configuration for using an AWS Lambda function as the grader for evaluating model responses and provide reward signals in reinforcement fine-tuning.
