        - ERROR
    AutomatedReasoningPolicyGeneratedTestCases:
      description: Contains a comprehensive test suite generated by the build workflow, providing validation capabilities for automated reasoning policies.
      type: object
      properties:
        generatedTestCases:
          $ref: "#/components/schemas/AutomatedReasoningPolicyGeneratedTestCaseList"
          description: Represents a collection of generated test cases.
      required:
        - generatedTestCases
    AutomatedReasoningPolicyGeneratedTestCaseList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyGeneratedTestCase"
    AutomatedReasoningPolicyGeneratedTestCase:
      description: Represents a generated test case, consisting of query content, guard content, and expected results.
      type: object
      properties:
        queryContent:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestQueryContent"
          description: The input query or prompt that generated the content. This provides context for the validation.
        guardContent:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestGuardContent"
          description: The output content that's validated by the Automated Reasoning policy. This represents the foundation model response that will be checked for accuracy.
        expectedAggregatedFindingsResult:
          $ref: "#/components/schemas/AutomatedReasoningCheckResult"
          description: "The expected results of the generated test case. Possible values include: VALID - The claims are true. The claims are implied by the premises and the Automated Reasoning policy. Given the Automated Reasoning policy and premises, it is not possible for these claims to be false. In other words, there are no alternative answers that are true that contradict the claims. INVALID - The claims are false. The claims are not implied by the premises and Automated Reasoning policy. Furthermore, there exists different claims that are consistent with the premises and Automated Reasoning policy. SATISFIABLE - The claims can be true or false. It depends on what assumptions are made for the claim to be implied from the premises and Automated Reasoning policy rules. In this situation, different assumptions can make input claims false and alternative claims true. IMPOSSIBLE - Automated Reasoning can’t make a statement about the claims. This can happen if the premises are logically incorrect, or if there is a conflict within the Automated Reasoning policy itself."
      required:
        - queryContent
        - guardContent
        - expectedAggregatedFindingsResult
    AutomatedReasoningPolicyScenarios:
      description: Contains a comprehensive entity encompassing all the scenarios generated by the build workflow, which can be used to validate an Automated Reasoning policy.
      type: object
      properties:
        policyScenarios:
          $ref: "#/components/schemas/AutomatedReasoningPolicyScenarioList"
          description: Represents a collection of generated policy scenarios.
      required:
        - policyScenarios
    AutomatedReasoningPolicyScenarioList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyScenario"
    AutomatedReasoningPolicyScenario:
