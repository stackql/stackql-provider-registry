          description: Configuration for the grader that evaluates model responses and provides reward signals during RFT training.
        hyperParameters:
          $ref: "#/components/schemas/RFTHyperParameters"
          description: Hyperparameters that control the reinforcement fine-tuning training process, including learning rate, batch size, and epoch count.
