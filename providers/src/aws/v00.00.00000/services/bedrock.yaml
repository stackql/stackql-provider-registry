          description: The unique identifier of the foundation model used for model inference.
        clientRequestToken:
          $ref: "#/components/schemas/ModelInvocationIdempotencyToken"
          description: A unique, case-sensitive identifier to ensure that the API request completes no more than one time. If this token matches a previous request, Amazon Bedrock ignores the request, but does not return an error. For more information, see Ensuring idempotency.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the service role with permissions to carry out and manage batch inference. You can use the console to create a default service role or follow the steps at Create a service role for batch inference.
        status:
          $ref: "#/components/schemas/ModelInvocationJobStatus"
          description: "The status of the batch inference job. The following statuses are possible: Submitted – This job has been submitted to a queue for validation. Validating – This job is being validated for the requirements described in Format and upload your batch inference data. The criteria include the following: Your IAM service role has access to the Amazon S3 buckets containing your files. Your files are .jsonl files and each individual record is a JSON object in the correct format. Note that validation doesn't check if the modelInput value matches the request body for the model. Your files fulfill the requirements for file size and number of records. For more information, see Quotas for Amazon Bedrock. Scheduled – This job has been validated and is now in a queue. The job will automatically start when it reaches its turn. Expired – This job timed out because it was scheduled but didn't begin before the set timeout duration. Submit a new job request. InProgress – This job has begun. You can start viewing the results in the output S3 location. Completed – This job has successfully completed. View the output files in the output S3 location. PartiallyCompleted – This job has partially completed. Not all of your records could be processed in time. View the output files in the output S3 location. Failed – This job has failed. Check the failure message for any further details. For further assistance, reach out to the Amazon Web Services Support Center. Stopped – This job was stopped by a user. Stopping – This job is being stopped by a user."
        message:
          $ref: "#/components/schemas/Message"
          description: If the batch inference job failed, this field contains a message describing why the job failed.
        submitTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the batch inference job was submitted.
        lastModifiedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the batch inference job was last modified.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the batch inference job ended.
        inputDataConfig:
          $ref: "#/components/schemas/ModelInvocationJobInputDataConfig"
          description: Details about the location of the input to the batch inference job.
        outputDataConfig:
          $ref: "#/components/schemas/ModelInvocationJobOutputDataConfig"
          description: Details about the location of the output of the batch inference job.
        vpcConfig:
          $ref: "#/components/schemas/VpcConfig"
          description: The configuration of the Virtual Private Cloud (VPC) for the data in the batch inference job. For more information, see Protect batch inference jobs using a VPC.
        timeoutDurationInHours:
          $ref: "#/components/schemas/ModelInvocationJobTimeoutDurationInHours"
          description: The number of hours after which batch inference job was set to time out.
        jobExpirationTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the batch inference job times or timed out.
        modelInvocationType:
          $ref: "#/components/schemas/ModelInvocationType"
          description: The invocation endpoint for ModelInvocationJob
        totalRecordCount:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The total number of records in the batch inference job.
        processedRecordCount:
          $ref: "#/components/schemas/NonNegativeLong"
          description: The number of records that have been processed in the batch inference job.
        successRecordCount:
