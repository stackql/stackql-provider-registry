openapi: 3.0.0
info:
  version: "2023-04-20"
  title: Amazon Bedrock
  description: Amazon Bedrock
  x-serviceName: bedrock
  x-serviceAlias: bedrock
  x-protocol: rest-json
  x-apiVersion: "2023-04-20"
  x-endpointPrefix: bedrock
servers:
  - url: https://bedrock.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock
paths:
  /advanced-prompt-optimization-job/batch-delete:
    post:
      operationId: BatchDeleteAdvancedPromptOptimizationJob
      description: Batch delete the specified advanced prompt optimization jobs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobIdentifiers:
                  $ref: "#/components/schemas/AdvancedPromptOptimizationJobIdentifiers"
              required:
                - jobIdentifiers
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteAdvancedPromptOptimizationJobResponse"
  /evaluation-jobs/batch-delete:
    post:
      operationId: BatchDeleteEvaluationJob
      description: Deletes a batch of evaluation jobs. An evaluation job can only be deleted if it has following status FAILED, COMPLETED, and STOPPED. You can request up to 25 model evaluation jobs be deleted in a single request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobIdentifiers:
                  $ref: "#/components/schemas/EvaluationJobIdentifiers"
              required:
                - jobIdentifiers
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteEvaluationJobResponse"
  /automated-reasoning-policies/{policy_arn}/build-workflows/{build_workflow_id}/cancel:
    post:
      operationId: CancelAutomatedReasoningPolicyBuildWorkflow
      description: Cancels a running Automated Reasoning policy build workflow. This stops the policy generation process and prevents further processing of the source documents.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy whose build workflow you want to cancel.
        - name: build_workflow_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyBuildWorkflowId"
          description: The unique identifier of the build workflow to cancel. You can get this ID from the StartAutomatedReasoningPolicyBuildWorkflow response or by listing build workflows.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAutomatedReasoningPolicyBuildWorkflowResponse"
  /advanced-prompt-optimization-jobs:
    post:
      operationId: CreateAdvancedPromptOptimizationJob
      description: Creates an asynchronous batch job for advanced prompt optimization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/AdvancedPromptOptimizationJobName"
                jobDescription:
                  $ref: "#/components/schemas/AdvancedPromptOptimizationJobDescription"
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                inputConfig:
                  $ref: "#/components/schemas/AdvancedPromptOptimizationInputConfig"
                outputConfig:
                  $ref: "#/components/schemas/AdvancedPromptOptimizationOutputConfig"
                encryptionKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                tags:
                  $ref: "#/components/schemas/TagList"
                modelConfigurations:
                  $ref: "#/components/schemas/ModelConfigurations"
              required:
                - jobName
                - inputConfig
                - outputConfig
                - modelConfigurations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdvancedPromptOptimizationJobResponse"
    get:
      operationId: ListAdvancedPromptOptimizationJobs
      description: Lists all advanced prompt optimization jobs for the account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Pagination token for the next page of results.
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortJobsBy"
          description: Field to sort by in the returned list of jobs.
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: Sort order for the results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdvancedPromptOptimizationJobsResponse"
  /automated-reasoning-policies:
    post:
      operationId: CreateAutomatedReasoningPolicy
      description: Creates an Automated Reasoning policy for Amazon Bedrock Guardrails. Automated Reasoning policies use mathematical techniques to detect hallucinations, suggest corrections, and highlight unstated assumptions in the responses of your GenAI application. To create a policy, you upload a source document that describes the rules that you're encoding. Automated Reasoning extracts important concepts from the source document that will become variables in the policy and infers policy rules.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyName"
                description:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyDescription"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                policyDefinition:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyDefinition"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutomatedReasoningPolicyResponse"
    get:
      operationId: ListAutomatedReasoningPolicies
      description: Lists all Automated Reasoning policies in your account, with optional filtering by policy ARN. This helps you manage and discover existing policies.
      parameters:
        - name: policyArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: Optional filter to list only the policy versions with the specified Amazon Resource Name (ARN). If not provided, the DRAFT versions for all policies are listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token from a previous request to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of policies to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomatedReasoningPoliciesResponse"
  /automated-reasoning-policies/{policy_arn}/test-cases:
    post:
      operationId: CreateAutomatedReasoningPolicyTestCase
      description: Creates a test for an Automated Reasoning policy. Tests validate that your policy works as expected by providing sample inputs and expected outcomes. Use tests to verify policy behavior before deploying to production.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy for which to create the test.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                guardContent:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyTestGuardContent"
                queryContent:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyTestQueryContent"
                expectedAggregatedFindingsResult:
                  $ref: "#/components/schemas/AutomatedReasoningCheckResult"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                confidenceThreshold:
                  $ref: "#/components/schemas/AutomatedReasoningCheckTranslationConfidence"
              required:
                - guardContent
                - expectedAggregatedFindingsResult
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutomatedReasoningPolicyTestCaseResponse"
    get:
      operationId: ListAutomatedReasoningPolicyTestCases
      description: Lists tests for an Automated Reasoning policy. We recommend using pagination to ensure that the operation returns quickly and successfully.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy for which to list tests.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The pagination token from a previous request to retrieve the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of tests to return in a single call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAutomatedReasoningPolicyTestCasesResponse"
  /automated-reasoning-policies/{policy_arn}/versions:
    post:
      operationId: CreateAutomatedReasoningPolicyVersion
      description: Creates a new version of an existing Automated Reasoning policy. This allows you to iterate on your policy rules while maintaining previous versions for rollback or comparison purposes.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy for which to create a version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                lastUpdatedDefinitionHash:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyHash"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - lastUpdatedDefinitionHash
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutomatedReasoningPolicyVersionResponse"
  /custom-models/create-custom-model:
    post:
      operationId: CreateCustomModel
      description: "Creates a new custom model in Amazon Bedrock. After the model is active, you can use it for inference. To use the model for inference, you must purchase Provisioned Throughput for it. You can't use On-demand inference with these custom models. For more information about Provisioned Throughput, see Provisioned Throughput. The model appears in ListCustomModels with a customizationType of imported. To track the status of the new model, you use the GetCustomModel API operation. The model can be in the following states: Creating - Initial state during validation and registration Active - Model is ready for use in inference Failed - Creation process encountered an error Related APIs GetCustomModel ListCustomModels DeleteCustomModel"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modelName:
                  $ref: "#/components/schemas/CustomModelName"
                modelSourceConfig:
                  $ref: "#/components/schemas/ModelDataSource"
                modelKmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                modelTags:
                  $ref: "#/components/schemas/TagList"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - modelName
                - modelSourceConfig
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomModelResponse"
  /model-customization/custom-model-deployments:
    post:
      operationId: CreateCustomModelDeployment
      description: "Deploys a custom model for on-demand inference in Amazon Bedrock. After you deploy your custom model, you use the deployment's Amazon Resource Name (ARN) as the modelId parameter when you submit prompts and generate responses with model inference. For more information about setting up on-demand inference for custom models, see Set up inference for a custom model. The following actions are related to the CreateCustomModelDeployment operation: GetCustomModelDeployment ListCustomModelDeployments DeleteCustomModelDeployment"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                modelDeploymentName:
                  $ref: "#/components/schemas/ModelDeploymentName"
                modelArn:
                  $ref: "#/components/schemas/CustomModelArn"
                description:
                  $ref: "#/components/schemas/CustomModelDeploymentDescription"
                tags:
                  $ref: "#/components/schemas/TagList"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - modelDeploymentName
                - modelArn
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomModelDeploymentResponse"
    get:
      operationId: ListCustomModelDeployments
      description: "Lists custom model deployments in your account. You can filter the results by creation time, name, status, and associated model. Use this operation to manage and monitor your custom model deployments. We recommend using pagination to ensure that the operation returns quickly and successfully. The following actions are related to the ListCustomModelDeployments operation: CreateCustomModelDeployment GetCustomModelDeployment DeleteCustomModelDeployment"
      parameters:
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Filters deployments created before the specified date and time.
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Filters deployments created after the specified date and time.
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ModelDeploymentName"
          description: Filters deployments whose names contain the specified string.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in a single call.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next set of results. Use this token to retrieve additional results when the response is truncated.
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortModelsBy"
          description: The field to sort the results by. The only supported value is CreationTime.
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: The sort order for the results. Valid values are Ascending and Descending. Default is Descending.
        - name: statusEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CustomModelDeploymentStatus"
          description: Filters deployments by status. Valid values are CREATING, ACTIVE, and FAILED.
        - name: modelArnEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CustomModelArn"
          description: Filters deployments by the Amazon Resource Name (ARN) of the associated custom model.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomModelDeploymentsResponse"
  /evaluation-jobs:
    post:
      operationId: CreateEvaluationJob
      description: Creates an evaluation job.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobName:
                  $ref: "#/components/schemas/EvaluationJobName"
                jobDescription:
                  $ref: "#/components/schemas/EvaluationJobDescription"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                customerEncryptionKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                jobTags:
                  $ref: "#/components/schemas/TagList"
                applicationType:
                  $ref: "#/components/schemas/ApplicationType"
                evaluationConfig:
                  $ref: "#/components/schemas/EvaluationConfig"
                inferenceConfig:
                  $ref: "#/components/schemas/EvaluationInferenceConfig"
                outputDataConfig:
                  $ref: "#/components/schemas/EvaluationOutputDataConfig"
              required:
                - jobName
                - roleArn
                - evaluationConfig
                - inferenceConfig
                - outputDataConfig
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEvaluationJobResponse"
    get:
      operationId: ListEvaluationJobs
      description: Lists all existing evaluation jobs.
      parameters:
        - name: creationTimeAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: A filter to only list evaluation jobs created after a specified time.
        - name: creationTimeBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: A filter to only list evaluation jobs created before a specified time.
        - name: statusEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EvaluationJobStatus"
          description: A filter to only list evaluation jobs that are of a certain status.
        - name: applicationTypeEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApplicationType"
          description: A filter to only list evaluation jobs that are either model evaluations or knowledge base evaluations.
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EvaluationJobName"
          description: A filter to only list evaluation jobs that contain a specified string in the job name.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Continuation token from the previous response, for Amazon Bedrock to list the next set of results.
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortJobsBy"
          description: Specifies a creation time to sort the list of evaluation jobs by when they were created.
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: Specifies whether to sort the list of evaluation jobs by either ascending or descending order.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEvaluationJobsResponse"
  /create-foundation-model-agreement:
    post:
      operationId: CreateFoundationModelAgreement
      description: Request a model access agreement for the specified model.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offerToken:
                  $ref: "#/components/schemas/OfferToken"
                modelId:
                  $ref: "#/components/schemas/BedrockModelId"
              required:
                - offerToken
                - modelId
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFoundationModelAgreementResponse"
  /guardrails:
    post:
      operationId: CreateGuardrail
      description: Creates a guardrail to block topics and to implement safeguards for your generative AI applications. You can configure the following policies in a guardrail to avoid undesirable and harmful content, filter out denied topics and words, and remove sensitive information for privacy protection. Content filters - Adjust filter strengths to block input prompts or model responses containing harmful content. Denied topics - Define a set of topics that are undesirable in the context of your application. These topics will be blocked if detected in user queries or model responses. Word filters - Configure filters to block undesirable words, phrases, and profanity. Such words can include offensive terms, competitor names etc. Sensitive information filters - Block or mask sensitive information such as personally identifiable information (PII) or custom regex in user inputs and model responses. In addition to the above policies, you can also configure the messages to be returned to the user if a user input or model response is in violation of the policies defined in the guardrail. For more information, see Amazon Bedrock Guardrails in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/GuardrailName"
                description:
                  $ref: "#/components/schemas/GuardrailDescription"
                topicPolicyConfig:
                  $ref: "#/components/schemas/GuardrailTopicPolicyConfig"
                contentPolicyConfig:
                  $ref: "#/components/schemas/GuardrailContentPolicyConfig"
                wordPolicyConfig:
                  $ref: "#/components/schemas/GuardrailWordPolicyConfig"
                sensitiveInformationPolicyConfig:
                  $ref: "#/components/schemas/GuardrailSensitiveInformationPolicyConfig"
                contextualGroundingPolicyConfig:
                  $ref: "#/components/schemas/GuardrailContextualGroundingPolicyConfig"
                automatedReasoningPolicyConfig:
                  $ref: "#/components/schemas/GuardrailAutomatedReasoningPolicyConfig"
                crossRegionConfig:
                  $ref: "#/components/schemas/GuardrailCrossRegionConfig"
                blockedInputMessaging:
                  $ref: "#/components/schemas/GuardrailBlockedMessaging"
                blockedOutputsMessaging:
                  $ref: "#/components/schemas/GuardrailBlockedMessaging"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                tags:
                  $ref: "#/components/schemas/TagList"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
              required:
                - name
                - blockedInputMessaging
                - blockedOutputsMessaging
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGuardrailResponse"
    get:
      operationId: ListGuardrails
      description: Lists details about all the guardrails in an account. To list the DRAFT version of all your guardrails, don't specify the guardrailIdentifier field. To list all versions of a guardrail, specify the ARN of the guardrail in the guardrailIdentifier field. You can set the maximum number of results to return in a response in the maxResults field. If there are more results than the number you set, the response returns a nextToken that you can send in another ListGuardrails request to see the next batch of results.
      parameters:
        - name: guardrailIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail. This can be an ID or the ARN.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: If there are more results than were returned in the response, the response returns a nextToken that you can send in another ListGuardrails request to see the next batch of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGuardrailsResponse"
  /guardrails/{guardrail_identifier}:
    post:
      operationId: CreateGuardrailVersion
      description: Creates a version of the guardrail. Use this API to create a snapshot of the guardrail when you are satisfied with a configuration, or to compare the configuration with another version.
      parameters:
        - name: guardrail_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail. This can be an ID or the ARN.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/GuardrailDescription"
                clientRequestToken:
                  $ref: "#/components/schemas/IdempotencyToken"
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGuardrailVersionResponse"
    delete:
      operationId: DeleteGuardrail
      description: Deletes a guardrail. To delete a guardrail, only specify the ARN of the guardrail in the guardrailIdentifier field. If you delete a guardrail, all of its versions will be deleted. To delete a version of a guardrail, specify the ARN of the guardrail in the guardrailIdentifier field and the version in the guardrailVersion field.
      parameters:
        - name: guardrail_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail. This can be an ID or the ARN.
        - name: guardrailVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailNumericalVersion"
          description: The version of the guardrail.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGuardrailResponse"
    get:
      operationId: GetGuardrail
      description: Gets details about a guardrail. If you don't specify a version, the response returns details for the DRAFT version.
      parameters:
        - name: guardrail_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail for which to get details. This can be an ID or the ARN.
        - name: guardrailVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GuardrailVersion"
          description: The version of the guardrail for which to get details. If you don't specify a version, the response returns details for the DRAFT version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGuardrailResponse"
    put:
      operationId: UpdateGuardrail
      description: Updates a guardrail with the values you specify. Specify a name and optional description. Specify messages for when the guardrail successfully blocks a prompt or a model response in the blockedInputMessaging and blockedOutputsMessaging fields. Specify topics for the guardrail to deny in the topicPolicyConfig object. Each GuardrailTopicConfig object in the topicsConfig list pertains to one topic. Give a name and description so that the guardrail can properly identify the topic. Specify DENY in the type field. (Optional) Provide up to five prompts that you would categorize as belonging to the topic in the examples list. Specify filter strengths for the harmful categories defined in Amazon Bedrock in the contentPolicyConfig object. Each GuardrailContentFilterConfig object in the filtersConfig list pertains to a harmful category. For more information, see Content filters. For more information about the fields in a content filter, see GuardrailContentFilterConfig. Specify the category in the type field. Specify the strength of the filter for prompts in the inputStrength field and for model responses in the strength field of the GuardrailContentFilterConfig. (Optional) For security, include the ARN of a KMS key in the kmsKeyId field.
      parameters:
        - name: guardrail_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardrailIdentifier"
          description: The unique identifier of the guardrail. This can be an ID or the ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/GuardrailName"
                description:
                  $ref: "#/components/schemas/GuardrailDescription"
                topicPolicyConfig:
                  $ref: "#/components/schemas/GuardrailTopicPolicyConfig"
                contentPolicyConfig:
                  $ref: "#/components/schemas/GuardrailContentPolicyConfig"
                wordPolicyConfig:
                  $ref: "#/components/schemas/GuardrailWordPolicyConfig"
                sensitiveInformationPolicyConfig:
                  $ref: "#/components/schemas/GuardrailSensitiveInformationPolicyConfig"
                contextualGroundingPolicyConfig:
                  $ref: "#/components/schemas/GuardrailContextualGroundingPolicyConfig"
                automatedReasoningPolicyConfig:
                  $ref: "#/components/schemas/GuardrailAutomatedReasoningPolicyConfig"
                crossRegionConfig:
                  $ref: "#/components/schemas/GuardrailCrossRegionConfig"
                blockedInputMessaging:
                  $ref: "#/components/schemas/GuardrailBlockedMessaging"
                blockedOutputsMessaging:
                  $ref: "#/components/schemas/GuardrailBlockedMessaging"
                kmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
              required:
                - name
                - blockedInputMessaging
                - blockedOutputsMessaging
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGuardrailResponse"
