      description: Configuration for using an AWS Lambda function to grade model responses during reinforcement fine-tuning training.
      type: object
      properties:
        lambdaArn:
          $ref: "#/components/schemas/LambdaArn"
          description: ARN of the AWS Lambda function that will evaluate model responses and return reward scores for RFT training.
      required:
        - lambdaArn
