    RequestMetadataFilters:
      description: Rules for filtering invocation logs. A filter can be a mapping of a metadata key to a value that it should or should not equal (a base filter), or a list of base filters that are all applied with AND or OR logical operators
      type: object
      properties:
        equals:
          type: object
          properties: {}
          description: Include results where the key equals the value.
        notEquals:
          type: object
          properties: {}
          description: Include results where the key does not equal the value.
        andAll:
          $ref: "#/components/schemas/RequestMetadataFiltersList"
          description: Include results where all of the based filters match.
        orAll:
          $ref: "#/components/schemas/RequestMetadataFiltersList"
          description: Include results where any of the base filters match.
    RequestMetadataFiltersList:
      type: array
      items:
        $ref: "#/components/schemas/RequestMetadataBaseFilters"
    RequestMetadataBaseFilters:
      description: A mapping of a metadata key to a value that it should or should not equal.
      type: object
      properties:
        equals:
          type: object
          properties: {}
          description: Include results where the key equals the value.
        notEquals:
          type: object
          properties: {}
          description: Include results where the key does not equal the value.
