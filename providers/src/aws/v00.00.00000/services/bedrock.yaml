        $ref: "#/components/schemas/AutomatedReasoningPolicyBuildResultAssetManifestEntry"
    AutomatedReasoningPolicyBuildResultAssetManifestEntry:
      description: Represents a single entry in the asset manifest, describing one artifact produced by the build workflow.
      type: object
      properties:
        assetType:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildResultAssetType"
          description: The type of asset (e.g., BUILD_LOG, QUALITY_REPORT, POLICY_DEFINITION, GENERATED_TEST_CASES, POLICY_SCENARIOS, FIDELITY_REPORT, ASSET_MANIFEST, SOURCE_DOCUMENT).
        assetName:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildResultAssetName"
          description: A human-readable name for the asset, if applicable. This helps identify specific documents or reports within the workflow results.
        assetId:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildResultAssetId"
          description: A unique identifier for the asset, if applicable. Use this ID when requesting specific assets through the API.
      required:
        - assetType
    AutomatedReasoningPolicyBuildResultAssetName:
      type: string
      minLength: 0
      maxLength: 256
    AutomatedReasoningPolicySourceDocument:
      description: Represents a source document that was processed during a build workflow. Contains the document content, metadata, and a hash for verification.
      type: object
      properties:
        document:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildDocumentBlob"
          description: The raw content of the source document as a binary blob.
        documentContentType:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildDocumentContentType"
          description: The MIME type of the document (e.g., application/pdf, text/plain).
        documentName:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildDocumentName"
          description: The name of the source document for identification purposes.
        documentDescription:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildDocumentDescription"
          description: An optional description providing context about the document's content and purpose.
        documentHash:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDocumentSha256"
          description: A SHA-256 hash of the document content, used for verification and integrity checking.
      required:
        - document
        - documentContentType
        - documentName
        - documentHash
    AutomatedReasoningPolicyBuildDocumentBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 5000000
    AutomatedReasoningPolicyDocumentSha256:
      type: string
      minLength: 64
      maxLength: 64
    AutomatedReasoningPolicyFidelityReport:
      description: A comprehensive analysis report that measures how accurately a generated policy represents the source documents. The report includes coverage and accuracy scores, detailed grounding information linking policy elements to source statements, and annotated document content.
      type: object
      properties:
        coverageScore:
          $ref: "#/components/schemas/AutomatedReasoningPolicyCoverageScore"
          description: A score from 0.0 to 1.0 indicating how well the policy covers the statements in the source documents. A higher score means more of the source content is represented in the policy.
        accuracyScore:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAccuracyScore"
          description: A score from 0.0 to 1.0 indicating how accurate the policy rules are relative to the source documents. A higher score means the policy rules more faithfully represent the source material.
        ruleReports:
          type: object
          properties: {}
          description: A mapping from rule identifiers to detailed fidelity reports for each rule, showing which source statements ground each rule and how accurate it is.
        variableReports:
          type: object
          properties: {}
          description: A mapping from variable names to detailed fidelity reports for each variable, showing which source statements ground each variable and how accurate it is.
        documentSources:
          $ref: "#/components/schemas/AutomatedReasoningPolicyReportSourceDocumentList"
          description: A list of source documents with their content broken down into atomic statements and annotated with line numbers for precise referencing.
      required:
        - coverageScore
        - accuracyScore
        - ruleReports
        - variableReports
        - documentSources
    AutomatedReasoningPolicyCoverageScore:
      type: number
      format: double
      minimum: 0
      maximum: 1
    AutomatedReasoningPolicyAccuracyScore:
      type: number
      format: double
      minimum: 0
      maximum: 1
    AutomatedReasoningPolicyReportSourceDocumentList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyReportSourceDocument"
    AutomatedReasoningPolicyReportSourceDocument:
      description: Represents a source document that was analyzed during fidelity report generation, including the document's metadata and its content broken down into atomic statements.
      type: object
      properties:
        documentName:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildDocumentName"
          description: The name of the source document that was analyzed.
        documentHash:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDocumentSha256"
          description: A SHA-256 hash of the document content, used for verification and ensuring the document hasn't changed since analysis.
        documentId:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDocumentId"
          description: A unique identifier for this document within the fidelity report.
        atomicStatements:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAtomicStatementList"
          description: The list of atomic statements extracted from this document, representing the fundamental units of meaning used for grounding.
        documentContent:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAnnotatedChunkList"
          description: The document's content organized into annotated chunks with line number information for precise referencing.
      required:
        - documentName
        - documentHash
        - documentId
        - atomicStatements
        - documentContent
    AutomatedReasoningPolicyDocumentId:
      type: string
      minLength: 0
      maxLength: 8
      pattern: "[a-zA-Z0-9]*"
    AutomatedReasoningPolicyAtomicStatementList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyAtomicStatement"
    AutomatedReasoningPolicyAtomicStatement:
      description: Represents a single, indivisible statement extracted from a source document. Atomic statements are the fundamental units used to ground policy rules and variables to their source material.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AutomatedReasoningPolicyStatementId"
          description: A unique identifier for this atomic statement within the fidelity report.
        text:
          $ref: "#/components/schemas/AutomatedReasoningPolicyStatementText"
          description: The actual text content of the atomic statement as extracted from the source document.
        location:
          $ref: "#/components/schemas/AutomatedReasoningPolicyStatementLocation"
          description: Information about where this statement appears in the source document, including line numbers.
      required:
        - id
        - text
        - location
    AutomatedReasoningPolicyStatementId:
      type: string
      minLength: 0
      maxLength: 8
      pattern: "[a-zA-Z0-9]*"
    AutomatedReasoningPolicyStatementText:
      type: string
      minLength: 0
      maxLength: 1024
    AutomatedReasoningPolicyStatementLocation:
      description: Describes the location of a statement within a source document using line numbers.
      type: object
      properties:
        lines:
          $ref: "#/components/schemas/AutomatedReasoningPolicyLineNumberList"
          description: The line numbers in the source document where this statement appears.
      required:
        - lines
    AutomatedReasoningPolicyLineNumberList:
      type: array
      items:
        $ref: "#/components/schemas/Integer"
    AutomatedReasoningPolicyAnnotatedChunkList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyAnnotatedChunk"
    AutomatedReasoningPolicyAnnotatedChunk:
      description: Represents a portion of a source document with line number annotations. Chunks help organize document content for easier navigation and reference.
      type: object
      properties:
        pageNumber:
          $ref: "#/components/schemas/Integer"
          description: The page number where this chunk begins, if the document is divided into pages.
        content:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAnnotatedContentList"
          description: The lines of text contained within this chunk, each annotated with its line number.
      required:
        - content
    AutomatedReasoningPolicyAnnotatedContentList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyAnnotatedContent"
    AutomatedReasoningPolicyAnnotatedContent:
      description: Represents a content element within an annotated chunk. This union type allows for different types of content elements to be included in document chunks, such as individual lines of text with their line numbers.
      type: object
      properties:
        line:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAnnotatedLine"
          description: An annotated line of text from the source document, including both the line number and the text content.
    AutomatedReasoningPolicyAnnotatedLine:
      description: Represents a single line of text from a source document, annotated with its line number for precise referencing.
      type: object
      properties:
        lineNumber:
          $ref: "#/components/schemas/Integer"
          description: The line number of this text within the source document.
        lineText:
          $ref: "#/components/schemas/AutomatedReasoningPolicyLineText"
          description: The actual text content of this line from the source document.
    AutomatedReasoningPolicyLineText:
      type: string
      minLength: 0
      maxLength: 256
    GetAutomatedReasoningPolicyNextScenarioResponse:
      type: object
      properties:
        policyArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
