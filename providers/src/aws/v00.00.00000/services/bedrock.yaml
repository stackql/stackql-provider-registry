      description: Lists all batch inference jobs in the account. For more information, see View details about a batch inference job.
      parameters:
        - name: submitTimeAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Specify a time to filter for batch inference jobs that were submitted after the time you specify.
        - name: submitTimeBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Specify a time to filter for batch inference jobs that were submitted before the time you specify.
        - name: statusEquals
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ModelInvocationJobStatus"
          description: "Specify a status to filter for batch inference jobs whose statuses match the string you specify. The following statuses are possible: Submitted – This job has been submitted to a queue for validation. Validating – This job is being validated for the requirements described in Format and upload your batch inference data. The criteria include the following: Your IAM service role has access to the Amazon S3 buckets containing your files. Your files are .jsonl files and each individual record is a JSON object in the correct format. Note that validation doesn't check if the modelInput value matches the request body for the model. Your files fulfill the requirements for file size and number of records. For more information, see Quotas for Amazon Bedrock. Scheduled – This job has been validated and is now in a queue. The job will automatically start when it reaches its turn. Expired – This job timed out because it was scheduled but didn't begin before the set timeout duration. Submit a new job request. InProgress – This job has begun. You can start viewing the results in the output S3 location. Completed – This job has successfully completed. View the output files in the output S3 location. PartiallyCompleted – This job has partially completed. Not all of your records could be processed in time. View the output files in the output S3 location. Failed – This job has failed. Check the failure message for any further details. For further assistance, reach out to the Amazon Web Services Support Center. Stopped – This job was stopped by a user. Stopping – This job is being stopped by a user."
        - name: nameContains
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ModelInvocationJobName"
          description: Specify a string to filter for batch inference jobs whose names contain the string.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return. If there are more results than the number that you specify, a nextToken value is returned. Use the nextToken in a request to return the next batch of results.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: If there were more results than the value you specified in the maxResults field in a previous ListModelInvocationJobs request, the response would have returned a nextToken value. To see the next batch of results, send the nextToken value in another request.
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortJobsBy"
          description: An attribute by which to sort the results.
        - name: sortOrder
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
          description: Specifies whether to sort the results by ascending or descending order.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModelInvocationJobsResponse"
