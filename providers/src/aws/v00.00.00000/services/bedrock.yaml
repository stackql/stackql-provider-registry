      maxLength: 512
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2}(-gov)?-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9-_\.]+(:(\$LATEST|[a-zA-Z0-9-_]+))?
    RFTHyperParameters:
      description: Hyperparameters for controlling the reinforcement fine-tuning training process, including learning settings and evaluation intervals.
      type: object
      properties:
        epochCount:
          $ref: "#/components/schemas/EpochCount"
          description: Number of training epochs to run during reinforcement fine-tuning. Higher values may improve performance but increase training time.
        batchSize:
          $ref: "#/components/schemas/RFTBatchSize"
          description: Number of training samples processed in each batch during reinforcement fine-tuning (RFT) training. Larger batches may improve training stability.
        learningRate:
          $ref: "#/components/schemas/RFTLearningRate"
          description: Learning rate for the reinforcement fine-tuning. Controls how quickly the model adapts to reward signals.
        maxPromptLength:
          $ref: "#/components/schemas/RFTMaxPromptLength"
          description: Maximum length of input prompts during RFT training, measured in tokens. Longer prompts allow more context but increase memory usage and training-time.
        trainingSamplePerPrompt:
          $ref: "#/components/schemas/RFTTrainingSamplePerPrompt"
          description: Number of response samples generated per prompt during RFT training. More samples provide better reward signal estimation.
        inferenceMaxTokens:
          $ref: "#/components/schemas/RFTInferenceMaxTokens"
          description: Maximum number of tokens the model can generate in response to each prompt during RFT training.
        reasoningEffort:
          $ref: "#/components/schemas/ReasoningEffort"
          description: Level of reasoning effort applied during RFT training. Higher values may improve response quality but increase training time.
        evalInterval:
          $ref: "#/components/schemas/RFTEvalInterval"
          description: Interval between evaluation runs during RFT training, measured in training steps. More frequent evaluation provides better monitoring.
