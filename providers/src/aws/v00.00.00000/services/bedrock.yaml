  /automated-reasoning-policies/{policy_arn}:
    delete:
      operationId: DeleteAutomatedReasoningPolicy
      description: Deletes an Automated Reasoning policy or policy version. This operation is idempotent. If you delete a policy more than once, each call succeeds. Deleting a policy removes it permanently and cannot be undone.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy to delete.
        - name: force
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Specifies whether to force delete the automated reasoning policy even if it has active resources. When false, Amazon Bedrock validates if all artifacts have been deleted (e.g. policy version, test case, test result) for a policy before deletion. When true, Amazon Bedrock will delete the policy and all its artifacts without validation. Default is false.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAutomatedReasoningPolicyResponse"
    get:
      operationId: GetAutomatedReasoningPolicy
      description: Retrieves details about an Automated Reasoning policy or policy version. Returns information including the policy definition, metadata, and timestamps.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy to retrieve. Can be either the unversioned ARN for the draft policy or an ARN for a specific policy version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAutomatedReasoningPolicyResponse"
    patch:
      operationId: UpdateAutomatedReasoningPolicy
      description: Updates an existing Automated Reasoning policy with new rules, variables, or configuration. This creates a new version of the policy while preserving the previous version.
      parameters:
        - name: policy_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy to update. This must be the ARN of a draft policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyDefinition:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyDefinition"
                name:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyName"
                description:
                  $ref: "#/components/schemas/AutomatedReasoningPolicyDescription"
              required:
