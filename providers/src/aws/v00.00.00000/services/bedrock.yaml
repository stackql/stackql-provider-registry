      type: object
      properties:
        expression:
          $ref: "#/components/schemas/AutomatedReasoningPolicyScenarioExpression"
          description: The logical expression or condition that defines this test scenario.
        alternateExpression:
          $ref: "#/components/schemas/AutomatedReasoningPolicyScenarioAlternateExpression"
          description: An alternative way to express the same test scenario, used for validation and comparison purposes.
        expectedResult:
          $ref: "#/components/schemas/AutomatedReasoningCheckResult"
          description: The expected outcome when this scenario is evaluated against the policy (e.g., PASS, FAIL, VIOLATION).
        ruleIds:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRuleIdList"
          description: The list of rule identifiers that are expected to be triggered or evaluated by this test scenario.
      required:
        - expression
        - alternateExpression
        - expectedResult
        - ruleIds
    AutomatedReasoningPolicyScenarioAlternateExpression:
      type: string
      minLength: 0
      maxLength: 1024
    AutomatedReasoningPolicyBuildResultAssetManifest:
      description: A catalog of all artifacts produced by a build workflow, providing a comprehensive list of available assets including their types and identifiers.
      type: object
      properties:
        entries:
          $ref: "#/components/schemas/AutomatedReasoningPolicyBuildResultAssetManifestList"
          description: The list of asset entries in the manifest, each describing an available artifact that can be retrieved.
      required:
        - entries
    AutomatedReasoningPolicyBuildResultAssetManifestList:
      type: array
