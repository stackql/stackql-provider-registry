      type: array
      items:
        $ref: "#/components/schemas/GuardrailTopic"
    GuardrailTopic:
      description: "Details about topics for the guardrail to identify and deny. This data type is used in the following API operations: GetGuardrail response body"
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GuardrailTopicName"
          description: The name of the topic to deny.
        definition:
