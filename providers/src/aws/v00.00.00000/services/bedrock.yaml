        updateType:
          $ref: "#/components/schemas/AutomatedReasoningPolicyUpdateTypeAnnotation"
          description: An operation to modify an existing custom type in the policy, such as changing its name, description, or allowed values.
        deleteType:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDeleteTypeAnnotation"
          description: An operation to remove a custom type from the policy. The type must not be referenced by any variables or rules.
        addVariable:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAddVariableAnnotation"
          description: An operation to add a new variable to the policy, which can be used in rule expressions to represent dynamic values.
        updateVariable:
          $ref: "#/components/schemas/AutomatedReasoningPolicyUpdateVariableAnnotation"
          description: An operation to modify an existing variable in the policy, such as changing its name, type, or description.
        deleteVariable:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDeleteVariableAnnotation"
          description: An operation to remove a variable from the policy. The variable must not be referenced by any rules.
        addRule:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAddRuleAnnotation"
          description: An operation to add a new logical rule to the policy using formal mathematical expressions.
        updateRule:
          $ref: "#/components/schemas/AutomatedReasoningPolicyUpdateRuleAnnotation"
          description: An operation to modify an existing rule in the policy, such as changing its logical expression or conditions.
        deleteRule:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDeleteRuleAnnotation"
          description: An operation to remove a rule from the policy.
        addRuleFromNaturalLanguage:
          $ref: "#/components/schemas/AutomatedReasoningPolicyAddRuleFromNaturalLanguageAnnotation"
          description: An operation to add a new rule by converting natural language descriptions into formal logical expressions.
        updateFromRulesFeedback:
          $ref: "#/components/schemas/AutomatedReasoningPolicyUpdateFromRuleFeedbackAnnotation"
          description: An operation to update the policy based on feedback about how specific rules performed during testing or validation.
        updateFromScenarioFeedback:
          $ref: "#/components/schemas/AutomatedReasoningPolicyUpdateFromScenarioFeedbackAnnotation"
          description: An operation to update the policy based on feedback about how it performed on specific test scenarios.
        ingestContent:
          $ref: "#/components/schemas/AutomatedReasoningPolicyIngestContentAnnotation"
          description: An operation to process and incorporate new content into the policy, extracting additional rules and concepts.
