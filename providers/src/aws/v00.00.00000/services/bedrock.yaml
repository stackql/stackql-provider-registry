        scenario:
          $ref: "#/components/schemas/AutomatedReasoningPolicyScenario"
          description: The next test scenario to validate, including the test expression and expected results.
      required:
        - policyArn
    GetAutomatedReasoningPolicyTestCaseResponse:
      type: object
      properties:
        policyArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the policy that contains the test.
        testCase:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestCase"
          description: The test details including the content, query, expected result, and metadata.
      required:
        - policyArn
        - testCase
    AutomatedReasoningPolicyTestCase:
      description: Represents a test for validating an Automated Reasoning policy. tests contain sample inputs and expected outcomes to verify policy behavior.
      type: object
      properties:
        testCaseId:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestCaseId"
          description: The unique identifier of the test.
        guardContent:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestGuardContent"
          description: The output content to be validated by the policy, typically representing a foundation model response.
        queryContent:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestQueryContent"
          description: The input query or prompt that generated the content. This provides context for the validation.
        expectedAggregatedFindingsResult:
          $ref: "#/components/schemas/AutomatedReasoningCheckResult"
          description: The expected result of the Automated Reasoning check for this test.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the test was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the test was last updated.
        confidenceThreshold:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslationConfidence"
          description: The minimum confidence level for logic validation. Content meeting this threshold is considered high-confidence and can be validated.
      required:
        - testCaseId
        - guardContent
        - createdAt
        - updatedAt
    GetAutomatedReasoningPolicyTestResultResponse:
      type: object
      properties:
        testResult:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestResult"
          description: The test result containing validation findings, execution status, and detailed analysis.
      required:
        - testResult
    AutomatedReasoningPolicyTestResult:
      description: Contains the results of testing an Automated Reasoning policy against various scenarios and validation checks.
      type: object
      properties:
        testCase:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestCase"
          description: The test case that was executed, including the input content, expected results, and configuration parameters used during validation.
        policyArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy that was tested.
        testRunStatus:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestRunStatus"
          description: The overall status of the test run (e.g., COMPLETED, FAILED, IN_PROGRESS).
        testFindings:
          $ref: "#/components/schemas/AutomatedReasoningCheckFindingList"
          description: Detailed findings from the test run, including any issues, violations, or unexpected behaviors discovered.
        testRunResult:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestRunResult"
          description: The overall result of the test run, indicating whether the policy passed or failed validation.
        aggregatedTestFindingsResult:
          $ref: "#/components/schemas/AutomatedReasoningCheckResult"
          description: A summary of all test findings, aggregated to provide an overall assessment of policy quality and correctness.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the test results were last updated.
      required:
        - testCase
        - policyArn
        - testRunStatus
        - updatedAt
    AutomatedReasoningPolicyTestRunStatus:
      type: string
      enum:
        - NOT_STARTED
        - SCHEDULED
        - IN_PROGRESS
        - COMPLETED
        - FAILED
    AutomatedReasoningCheckFindingList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningCheckFinding"
    AutomatedReasoningCheckFinding:
      description: Represents the result of an Automated Reasoning validation check, indicating whether the content is logically valid, invalid, or falls into other categories based on the policy rules.
      type: object
      properties:
        valid:
          $ref: "#/components/schemas/AutomatedReasoningCheckValidFinding"
          description: Indicates that the claims are true. The claims are implied by the premises and the Automated Reasoning policy. Given the Automated Reasoning policy and premises, it is not possible for these claims to be false.
        invalid:
          $ref: "#/components/schemas/AutomatedReasoningCheckInvalidFinding"
          description: Indicates that the claims are false. The claims are not implied by the premises and Automated Reasoning policy. Furthermore, there exist different claims that are consistent with the premises and Automated Reasoning policy.
        satisfiable:
          $ref: "#/components/schemas/AutomatedReasoningCheckSatisfiableFinding"
          description: Indicates that the claims can be true or false. It depends on what assumptions are made for the claim to be implied from the premises and Automated Reasoning policy rules. In this situation, different assumptions can make input claims false and alternative claims true.
        impossible:
          $ref: "#/components/schemas/AutomatedReasoningCheckImpossibleFinding"
          description: Indicates that Automated Reasoning cannot make a statement about the claims. This can happen if the premises are logically incorrect, or if there is a conflict within the Automated Reasoning policy itself.
        translationAmbiguous:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslationAmbiguousFinding"
          description: Indicates that an ambiguity was detected in the translation, making it unsound to continue with validity checking. Additional context or follow-up questions might be needed to get translation to succeed.
        tooComplex:
          $ref: "#/components/schemas/AutomatedReasoningCheckTooComplexFinding"
          description: Indicates that the input contains too much information for Automated Reasoning to process within its latency limits.
        noTranslations:
          $ref: "#/components/schemas/AutomatedReasoningCheckNoTranslationsFinding"
          description: Identifies that some or all of the input prompt wasn't translated into logic. This can happen if the input isn't relevant to the Automated Reasoning policy, or if the policy doesn't have variables to model relevant input.
    AutomatedReasoningCheckValidFinding:
      description: Indicates that the claims are definitively true and logically implied by the premises, with no possible alternative interpretations.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslation"
          description: The logical translation of the input that this finding validates.
        claimsTrueScenario:
          $ref: "#/components/schemas/AutomatedReasoningCheckScenario"
          description: An example scenario demonstrating how the claims are logically true.
        supportingRules:
          $ref: "#/components/schemas/AutomatedReasoningCheckRuleList"
          description: The automated reasoning policy rules that support why this result is considered valid.
        logicWarning:
          $ref: "#/components/schemas/AutomatedReasoningCheckLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    AutomatedReasoningCheckTranslation:
      description: Contains the logical translation of natural language input into formal logical statements, including premises, claims, and confidence scores.
      type: object
      properties:
        premises:
          $ref: "#/components/schemas/AutomatedReasoningLogicStatementList"
          description: The logical statements that serve as the foundation or assumptions for the claims.
        claims:
          $ref: "#/components/schemas/AutomatedReasoningLogicStatementList"
          description: The logical statements that are being validated against the premises and policy rules.
        untranslatedPremises:
          $ref: "#/components/schemas/AutomatedReasoningCheckInputTextReferenceList"
          description: References to portions of the original input text that correspond to the premises but could not be fully translated.
        untranslatedClaims:
          $ref: "#/components/schemas/AutomatedReasoningCheckInputTextReferenceList"
          description: References to portions of the original input text that correspond to the claims but could not be fully translated.
        confidence:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslationConfidence"
          description: A confidence score between 0 and 1 indicating how certain the system is about the logical translation.
      required:
        - claims
        - confidence
    AutomatedReasoningLogicStatementList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningLogicStatement"
    AutomatedReasoningLogicStatement:
      description: Represents a logical statement that can be expressed both in formal logic notation and natural language, providing dual representations for better understanding and validation.
      type: object
      properties:
        logic:
          $ref: "#/components/schemas/AutomatedReasoningLogicStatementContent"
          description: The formal logic representation of the statement using mathematical notation and logical operators.
        naturalLanguage:
          $ref: "#/components/schemas/AutomatedReasoningNaturalLanguageStatementContent"
          description: The natural language representation of the logical statement, providing a human-readable interpretation of the formal logic.
      required:
        - logic
    AutomatedReasoningLogicStatementContent:
      type: string
      minLength: 0
      maxLength: 1000
    AutomatedReasoningNaturalLanguageStatementContent:
      type: string
      minLength: 0
      maxLength: 1000
    AutomatedReasoningCheckInputTextReferenceList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningCheckInputTextReference"
    AutomatedReasoningCheckInputTextReference:
      description: References a portion of the original input text that corresponds to logical elements.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/AutomatedReasoningNaturalLanguageStatementContent"
          description: The specific text from the original input that this reference points to.
    AutomatedReasoningCheckScenario:
      description: Represents a logical scenario where claims can be evaluated as true or false, containing specific logical assignments.
      type: object
      properties:
        statements:
          $ref: "#/components/schemas/AutomatedReasoningLogicStatementList"
          description: List of logical assignments and statements that define this scenario.
    AutomatedReasoningCheckRuleList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningCheckRule"
    AutomatedReasoningCheckRule:
      description: References a specific automated reasoning policy rule that was applied during evaluation.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRuleId"
          description: The unique identifier of the automated reasoning rule.
        policyVersionArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The ARN of the automated reasoning policy version that contains this rule.
    AutomatedReasoningCheckLogicWarning:
      description: Identifies logical issues in the translated statements that exist independent of any policy rules, such as statements that are always true or always false.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/AutomatedReasoningCheckLogicWarningType"
          description: The category of the detected logical issue, such as statements that are always true or always false.
        premises:
          $ref: "#/components/schemas/AutomatedReasoningLogicStatementList"
          description: The logical statements that serve as premises under which the claims are validated.
        claims:
          $ref: "#/components/schemas/AutomatedReasoningLogicStatementList"
          description: The logical statements that are validated while assuming the policy and premises.
    AutomatedReasoningCheckLogicWarningType:
      type: string
      enum:
        - ALWAYS_TRUE
        - ALWAYS_FALSE
    AutomatedReasoningCheckInvalidFinding:
      description: Indicates that the claims are logically false and contradictory to the established rules or premises.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslation"
          description: The logical translation of the input that this finding invalidates.
        contradictingRules:
          $ref: "#/components/schemas/AutomatedReasoningCheckRuleList"
          description: The automated reasoning policy rules that contradict the claims in the input.
        logicWarning:
          $ref: "#/components/schemas/AutomatedReasoningCheckLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    AutomatedReasoningCheckSatisfiableFinding:
      description: Indicates that the claims could be either true or false depending on additional assumptions not provided in the input.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslation"
          description: The logical translation of the input that this finding evaluates.
        claimsTrueScenario:
          $ref: "#/components/schemas/AutomatedReasoningCheckScenario"
          description: An example scenario demonstrating how the claims could be logically true.
        claimsFalseScenario:
          $ref: "#/components/schemas/AutomatedReasoningCheckScenario"
          description: An example scenario demonstrating how the claims could be logically false.
        logicWarning:
          $ref: "#/components/schemas/AutomatedReasoningCheckLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    AutomatedReasoningCheckImpossibleFinding:
      description: Indicates that no valid claims can be made due to logical contradictions in the premises or rules.
      type: object
      properties:
        translation:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslation"
          description: The logical translation of the input that this finding evaluates.
        contradictingRules:
          $ref: "#/components/schemas/AutomatedReasoningCheckRuleList"
          description: The automated reasoning policy rules that contradict the claims and/or premises in the input.
        logicWarning:
          $ref: "#/components/schemas/AutomatedReasoningCheckLogicWarning"
          description: Indication of a logic issue with the translation without needing to consider the automated reasoning policy rules.
    AutomatedReasoningCheckTranslationAmbiguousFinding:
      description: Indicates that the input has multiple valid logical interpretations, requiring additional context or clarification.
      type: object
      properties:
        options:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslationOptionList"
          description: Different logical interpretations that were detected during translation of the input.
        differenceScenarios:
          $ref: "#/components/schemas/AutomatedReasoningCheckDifferenceScenarioList"
          description: Scenarios showing how the different translation options differ in meaning.
    AutomatedReasoningCheckTranslationOptionList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningCheckTranslationOption"
    AutomatedReasoningCheckTranslationOption:
      description: Represents one possible logical interpretation of ambiguous input content.
      type: object
      properties:
        translations:
          $ref: "#/components/schemas/AutomatedReasoningCheckTranslationList"
          description: Different logical interpretations that were detected during translation of the input.
    AutomatedReasoningCheckTranslationList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningCheckTranslation"
    AutomatedReasoningCheckDifferenceScenarioList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningCheckScenario"
    AutomatedReasoningCheckTooComplexFinding:
      description: Indicates that the input exceeds the processing capacity due to the volume or complexity of the logical information.
      type: object
    AutomatedReasoningCheckNoTranslationsFinding:
      description: Indicates that no relevant logical information could be extracted from the input for validation.
      type: object
    AutomatedReasoningPolicyTestRunResult:
      type: string
      enum:
        - PASSED
        - FAILED
    GetCustomModelResponse:
