                $ref: "#/components/schemas/StopAdvancedPromptOptimizationJobResponse"
  /evaluation-job/{job_identifier}/stop:
    post:
      operationId: StopEvaluationJob
      description: Stops an evaluation job that is current being created or running.
      parameters:
        - name: job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/EvaluationJobIdentifier"
          description: The Amazon Resource Name (ARN) of the evaluation job you want to stop.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopEvaluationJobResponse"
  /model-customization-jobs/{job_identifier}/stop:
    post:
      operationId: StopModelCustomizationJob
      description: Stops an active model customization job. For more information, see Custom models in the Amazon Bedrock User Guide.
      parameters:
        - name: job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ModelCustomizationJobIdentifier"
          description: Job identifier of the job to stop.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopModelCustomizationJobResponse"
  /model-invocation-job/{job_identifier}/stop:
    post:
      operationId: StopModelInvocationJob
      description: Stops a batch inference job. You're only charged for tokens that were already processed. For more information, see Stop a batch inference job.
      parameters:
        - name: job_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ModelInvocationJobIdentifier"
          description: The Amazon Resource Name (ARN) of the batch inference job to stop.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopModelInvocationJobResponse"
  /tagResource:
    post:
      operationId: TagResource
      description: Associate tags with a resource. For more information, see Tagging resources in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourcesArn"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - resourceARN
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /untagResource:
    post:
      operationId: UntagResource
      description: Remove one or more tags from a resource. For more information, see Tagging resources in the Amazon Bedrock User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourcesArn"
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - resourceARN
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AdvancedPromptOptimizationJobIdentifiers:
      description: List of advanced prompt optimization job identifiers.
      type: array
      items:
        $ref: "#/components/schemas/AdvancedPromptOptimizationJobIdentifier"
    AdvancedPromptOptimizationJobIdentifier:
      description: ARN or ID of the advanced prompt optimization job.
      type: string
      minLength: 0
      maxLength: 1011
      pattern: ((arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:advanced-prompt-optimization-job/)?[a-z0-9]{12})
    BatchDeleteAdvancedPromptOptimizationJobResponse:
      description: Batch Delete Advanced Prompt Optimization Jobs Response
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDeleteAdvancedPromptOptimizationJobErrors"
          description: List of errors encountered during batch deletion.
        advancedPromptOptimizationJobs:
          $ref: "#/components/schemas/BatchDeleteAdvancedPromptOptimizationJobItems"
          description: List of successfully deleted advanced prompt optimization jobs.
      required:
        - errors
        - advancedPromptOptimizationJobs
    BatchDeleteAdvancedPromptOptimizationJobErrors:
      description: List of batch deletion errors for advanced prompt optimization jobs.
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteAdvancedPromptOptimizationJobError"
    BatchDeleteAdvancedPromptOptimizationJobError:
      description: Batch deletion error for an advanced prompt optimization job.
      type: object
      properties:
        jobIdentifier:
          $ref: "#/components/schemas/AdvancedPromptOptimizationJobIdentifier"
          description: Identifier of the job that failed to delete.
        code:
          $ref: "#/components/schemas/String"
          description: Error code for the deletion failure.
        message:
          $ref: "#/components/schemas/String"
          description: Error message describing the deletion failure.
      required:
        - jobIdentifier
        - code
    String:
      type: string
    BatchDeleteAdvancedPromptOptimizationJobItems:
      description: List of successfully deleted advanced prompt optimization jobs.
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteAdvancedPromptOptimizationJobItem"
    BatchDeleteAdvancedPromptOptimizationJobItem:
      description: Successfully deleted advanced prompt optimization job.
      type: object
      properties:
        jobIdentifier:
          $ref: "#/components/schemas/AdvancedPromptOptimizationJobIdentifier"
          description: Identifier of the deleted job.
        jobStatus:
          $ref: "#/components/schemas/AdvancedPromptOptimizationJobStatus"
          description: Status of the deleted job.
      required:
        - jobIdentifier
        - jobStatus
    AdvancedPromptOptimizationJobStatus:
      description: Status of the advanced prompt optimization job.
      type: string
      enum:
        - InProgress
        - Completed
        - Failed
        - PartiallyCompleted
        - Stopping
        - Stopped
        - Deleting
    EvaluationJobIdentifiers:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationJobIdentifier"
    EvaluationJobIdentifier:
      type: string
      minLength: 0
      maxLength: 1011
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:evaluation-job/[a-z0-9]{12})
    BatchDeleteEvaluationJobResponse:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchDeleteEvaluationJobErrors"
          description: A JSON object containing the HTTP status codes and the ARNs of evaluation jobs that failed to be deleted.
        evaluationJobs:
          $ref: "#/components/schemas/BatchDeleteEvaluationJobItems"
          description: The list of evaluation jobs for deletion.
      required:
        - errors
        - evaluationJobs
    BatchDeleteEvaluationJobErrors:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteEvaluationJobError"
    BatchDeleteEvaluationJobError:
      description: A JSON array that provides the status of the evaluation jobs being deleted.
      type: object
      properties:
        jobIdentifier:
          $ref: "#/components/schemas/EvaluationJobIdentifier"
          description: The ARN of the evaluation job being deleted.
        code:
          $ref: "#/components/schemas/String"
          description: A HTTP status code of the evaluation job being deleted.
        message:
          $ref: "#/components/schemas/String"
          description: A status message about the evaluation job deletion.
      required:
        - jobIdentifier
        - code
    BatchDeleteEvaluationJobItems:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteEvaluationJobItem"
    BatchDeleteEvaluationJobItem:
      description: An evaluation job for deletion, and it’s current status.
      type: object
      properties:
        jobIdentifier:
          $ref: "#/components/schemas/EvaluationJobIdentifier"
          description: The Amazon Resource Name (ARN) of the evaluation job for deletion.
        jobStatus:
          $ref: "#/components/schemas/EvaluationJobStatus"
          description: The status of the evaluation job for deletion.
      required:
        - jobIdentifier
        - jobStatus
    EvaluationJobStatus:
      type: string
      enum:
        - InProgress
        - Completed
        - Failed
        - Stopping
        - Stopped
        - Deleting
    AutomatedReasoningPolicyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:automated-reasoning-policy/[a-z0-9]{12}(:([1-9][0-9]{0,11}))?
    AutomatedReasoningPolicyBuildWorkflowId:
      type: string
      minLength: 0
      maxLength: 36
      pattern: "[a-f0-9]{8}-?[a-f0-9]{4}-?4[a-f0-9]{3}-?[89ab][a-f0-9]{3}-?[a-f0-9]{12}"
    CancelAutomatedReasoningPolicyBuildWorkflowResponse:
      type: object
    AdvancedPromptOptimizationJobName:
      description: Name of the advanced prompt optimization job.
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9][a-zA-Z0-9.+-]*"
    AdvancedPromptOptimizationJobDescription:
      description: Description of the advanced prompt optimization job.
      type: string
      minLength: 1
      maxLength: 500
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9]([-a-zA-Z0-9]{0,254}[a-zA-Z0-9])?"
    AdvancedPromptOptimizationInputConfig:
      description: Input data configuration for the advanced prompt optimization job.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: S3 URI of the input JSONL file.
      required:
        - s3Uri
    S3Uri:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: s3://[a-z0-9][-.a-z0-9]{1,61}[a-z0-9](?:/[-!_*'().a-z0-9A-Z]+(?:/[-!_*'().a-z0-9A-Z]+)*)?/?
    AdvancedPromptOptimizationOutputConfig:
      description: Output data configuration for the advanced prompt optimization job.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3UriFolder"
          description: S3 URI prefix for the output location.
      required:
        - s3Uri
    S3UriFolder:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: s3://[a-z0-9][-.a-z0-9]{1,61}[a-z0-9](?:/[-!_*'().a-z0-9A-Z]+(?:/[-!_*'().a-z0-9A-Z]+)*)?/
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:kms:[a-zA-Z0-9-]*:[0-9]{12}:key/[a-zA-Z0-9-]{36}
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Definition of the key/value pair for a tag.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: Key for the tag.
        value:
          $ref: "#/components/schemas/TagValue"
          description: Value for the tag.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9\\s._:/=+@-]*"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[a-zA-Z0-9\\s._:/=+@-]*"
    ModelConfigurations:
      description: Model configurations for advanced prompt optimization.
      type: array
      items:
        $ref: "#/components/schemas/ModelConfiguration"
    ModelConfiguration:
      description: Configuration for a model used in advanced prompt optimization.
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/BedrockModelId"
          description: The model ID.
        inferenceConfig:
          $ref: "#/components/schemas/InferenceConfiguration"
          description: Inference configuration for the model.
        additionalModelRequestFields:
          type: object
          properties: {}
          description: Additional model request fields.
      required:
        - modelId
    BedrockModelId:
      type: string
      minLength: 0
      maxLength: 140
      pattern: "[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([a-z0-9-]{1,63}[.]){0,2}[a-z0-9-]{1,63}([:][a-z0-9-]{1,63}){0,2}(/[a-z0-9]{12}|)"
    InferenceConfiguration:
      description: Inference configuration for a model.
      type: object
      properties:
        maxTokens:
          $ref: "#/components/schemas/InferenceConfigurationMaxTokensInteger"
          description: The maximum number of tokens to generate.
        temperature:
          $ref: "#/components/schemas/InferenceConfigurationTemperatureFloat"
          description: The temperature for sampling.
        topP:
          $ref: "#/components/schemas/InferenceConfigurationTopPFloat"
          description: The top-p value for nucleus sampling.
        stopSequences:
          $ref: "#/components/schemas/InferenceConfigurationStopSequencesList"
          description: Stop sequences that end generation.
    InferenceConfigurationMaxTokensInteger:
      type: integer
      minimum: 1
    InferenceConfigurationTemperatureFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    InferenceConfigurationTopPFloat:
      type: number
      format: float
      minimum: 0
      maximum: 1
    InferenceConfigurationStopSequencesList:
      description: A list of non-empty strings.
      type: array
      items:
        $ref: "#/components/schemas/InferenceConfigurationStopSequencesListMemberString"
    InferenceConfigurationStopSequencesListMemberString:
      type: string
      minLength: 1
    CreateAdvancedPromptOptimizationJobResponse:
      description: Create Advanced Prompt Optimization Job Response
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/AdvancedPromptOptimizationJobArn"
          description: ARN of the created advanced prompt optimization job.
      required:
        - jobArn
    AdvancedPromptOptimizationJobArn:
      description: ARN of the advanced prompt optimization job.
      type: string
      minLength: 0
      maxLength: 1011
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:advanced-prompt-optimization-job/[a-z0-9]{12}
    AutomatedReasoningPolicyName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[0-9a-zA-Z-_ ]+"
    AutomatedReasoningPolicyDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\s\\S]+"
    AutomatedReasoningPolicyDefinition:
      description: Contains the formal logic rules, variables, and custom variable types that define an Automated Reasoning policy. The policy definition specifies the constraints used to validate foundation model responses for accuracy and logical consistency.
      type: object
      properties:
        version:
          $ref: "#/components/schemas/AutomatedReasoningPolicyFormatVersion"
          description: The version of the policy definition format.
        types:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeList"
          description: The custom user-defined vairable types used in the policy. Types are enum-based variable types that provide additional context beyond the predefined variable types.
        rules:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRuleList"
          description: The formal logic rules extracted from the source document. Rules define the logical constraints that determine whether model responses are valid, invalid, or satisfiable.
        variables:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionVariableList"
          description: The variables that represent concepts in the policy. Variables can have values assigned when translating natural language into formal logic. Their descriptions are crucial for accurate translation.
    AutomatedReasoningPolicyFormatVersion:
      type: string
    AutomatedReasoningPolicyDefinitionTypeList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionType"
    AutomatedReasoningPolicyDefinitionType:
      description: Represents a custom user-defined viarble type in an Automated Reasoning policy. Types are enum-based and provide additional context beyond predefined variable types.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeName"
          description: The name of the custom type.
        description:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeDescription"
          description: The description of what the custom type represents.
        values:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeValueList"
          description: The possible values for this enum-based type, each with its own description.
      required:
        - name
        - values
    AutomatedReasoningPolicyDefinitionTypeName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z][A-Za-z0-9_]*"
    AutomatedReasoningPolicyDefinitionTypeDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\s\\S]+"
    AutomatedReasoningPolicyDefinitionTypeValueList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeValue"
    AutomatedReasoningPolicyDefinitionTypeValue:
      description: Represents a single value within a custom type definition, including its identifier and description.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeValueName"
          description: The actual value or identifier for this type value.
        description:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeValueDescription"
          description: A human-readable description explaining what this type value represents and when it should be used.
      required:
        - value
    AutomatedReasoningPolicyDefinitionTypeValueName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z][A-Za-z0-9_]*"
    AutomatedReasoningPolicyDefinitionTypeValueDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\s\\S]+"
    AutomatedReasoningPolicyDefinitionRuleList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRule"
    AutomatedReasoningPolicyDefinitionRule:
      description: Represents a formal logic rule in an Automated Reasoning policy. For example, rules can be expressed as if-then statements that define logical constraints.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRuleId"
          description: The unique identifier of the rule within the policy.
        expression:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRuleExpression"
          description: The formal logic expression of the rule.
        alternateExpression:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionRuleAlternateExpression"
          description: The human-readable form of the rule expression, often in natural language or simplified notation.
      required:
        - id
        - expression
    AutomatedReasoningPolicyDefinitionRuleId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[A-Z][0-9A-Z]{11}"
    AutomatedReasoningPolicyDefinitionRuleExpression:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\s\\S]+"
    AutomatedReasoningPolicyDefinitionRuleAlternateExpression:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: "[\\s\\S]+"
    AutomatedReasoningPolicyDefinitionVariableList:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionVariable"
    AutomatedReasoningPolicyDefinitionVariable:
      description: Represents a variable in an Automated Reasoning policy. Variables represent concepts that can have values assigned during natural language translation.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionVariableName"
          description: The name of the variable. Use descriptive names that clearly indicate the concept being represented.
        type_:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionTypeName"
          description: The data type of the variable. Valid types include bool, int, real, enum, and custom types that you can provide.
        description:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDefinitionVariableDescription"
          description: The description of the variable that explains what it represents and how users might refer to it. Clear and comprehensive descriptions are essential for accurate natural language translation.
      required:
        - name
        - type_
        - description
    AutomatedReasoningPolicyDefinitionVariableName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z][A-Za-z0-9_]*"
    AutomatedReasoningPolicyDefinitionVariableDescription:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\s\\S]+"
    KmsKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:kms:[a-zA-Z0-9-]*:[0-9]{12}:((key/[a-zA-Z0-9-]{36})|(alias/[a-zA-Z0-9-_/]+)))|([a-zA-Z0-9-]{36})|(alias/[a-zA-Z0-9-_/]+)
    CreateAutomatedReasoningPolicyResponse:
      type: object
      properties:
        policyArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the Automated Reasoning policy that you created.
        version:
          $ref: "#/components/schemas/AutomatedReasoningPolicyVersion"
          description: The version number of the newly created Automated Reasoning policy. The initial version is always DRAFT.
        name:
          $ref: "#/components/schemas/AutomatedReasoningPolicyName"
          description: The name of the Automated Reasoning policy.
        description:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDescription"
          description: The description of the Automated Reasoning policy.
        definitionHash:
          $ref: "#/components/schemas/AutomatedReasoningPolicyHash"
          description: The hash of the policy definition. This is used as a concurrency token for creating policy versions that you can use in your application.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the policy was created.
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the policy was last updated.
      required:
        - policyArn
        - version
        - name
        - createdAt
        - updatedAt
    AutomatedReasoningPolicyVersion:
      type: string
      minLength: 0
      maxLength: 12
      pattern: ([1-9][0-9]{0,11})
    AutomatedReasoningPolicyHash:
      type: string
      minLength: 128
      maxLength: 128
      pattern: "[0-9a-z]{128}"
    Timestamp:
      type: string
      format: date-time
    AutomatedReasoningPolicyTestGuardContent:
      type: string
      minLength: 0
      maxLength: 2048
    AutomatedReasoningPolicyTestQueryContent:
      type: string
      minLength: 0
      maxLength: 1024
    AutomatedReasoningCheckResult:
      type: string
      enum:
        - VALID
        - INVALID
        - SATISFIABLE
        - IMPOSSIBLE
        - TRANSLATION_AMBIGUOUS
        - TOO_COMPLEX
        - NO_TRANSLATION
    AutomatedReasoningCheckTranslationConfidence:
      type: number
      format: double
      minimum: 0
      maximum: 1
    CreateAutomatedReasoningPolicyTestCaseResponse:
      type: object
      properties:
        policyArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The Amazon Resource Name (ARN) of the policy for which the test was created.
        testCaseId:
          $ref: "#/components/schemas/AutomatedReasoningPolicyTestCaseId"
          description: The unique identifier of the created test.
      required:
        - policyArn
        - testCaseId
    AutomatedReasoningPolicyTestCaseId:
      type: string
      minLength: 0
      maxLength: 12
      pattern: "[0-9A-Z]{12}"
    CreateAutomatedReasoningPolicyVersionResponse:
      type: object
      properties:
        policyArn:
          $ref: "#/components/schemas/AutomatedReasoningPolicyArn"
          description: The versioned Amazon Resource Name (ARN) of the policy version.
        version:
          $ref: "#/components/schemas/AutomatedReasoningPolicyVersion"
          description: The version number of the policy version.
        name:
          $ref: "#/components/schemas/AutomatedReasoningPolicyName"
          description: The name of the policy version.
        description:
          $ref: "#/components/schemas/AutomatedReasoningPolicyDescription"
          description: The description of the policy version.
        definitionHash:
          $ref: "#/components/schemas/AutomatedReasoningPolicyHash"
          description: The hash of the policy definition for this version.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the policy version was created.
      required:
        - policyArn
        - version
        - name
        - definitionHash
        - createdAt
    CustomModelName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ([0-9a-zA-Z][_-]?){1,63}
    ModelDataSource:
      description: The data source of the model to import.
      type: object
      properties:
        s3DataSource:
          $ref: "#/components/schemas/S3DataSource"
          description: The Amazon S3 data source of the model to import.
    S3DataSource:
      description: The Amazon S3 data source of the model to import.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The URI of the Amazon S3 data source.
      required:
        - s3Uri
    RoleArn:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:aws(-[^:]+)?:iam::([0-9]{12})?:role/.+
    CreateCustomModelResponse:
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/ModelArn"
          description: The Amazon Resource Name (ARN) of the new custom model.
      required:
        - modelArn
    ModelArn:
      type: string
      minLength: 20
      maxLength: 1011
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:(([0-9]{12}:custom-model/((imported)|([a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}))(([:][a-z0-9-]{1,63}){0,2})?/[a-z0-9]{12})|(:foundation-model/[a-z0-9-]{1,63}[.]{1}([a-z0-9-]{1,63}[.]){0,2}[a-z0-9-]{1,63}([:][a-z0-9-]{1,63}){0,2}))
    ModelDeploymentName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ([0-9a-zA-Z][_-]?){1,63}
    CustomModelArn:
      type: string
      minLength: 20
      maxLength: 1011
      pattern: arn:aws(|-us-gov|-cn|-iso|-iso-b):bedrock:[a-z0-9-]{1,20}:[0-9]{12}:custom-model/(imported|[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([a-z0-9-]{1,63}[.]){0,2}[a-z0-9-]{1,63}([:][a-z0-9-]{1,63}){0,2})/[a-z0-9]{12}
    CustomModelDeploymentDescription:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*
    CreateCustomModelDeploymentResponse:
      type: object
      properties:
        customModelDeploymentArn:
          $ref: "#/components/schemas/CustomModelDeploymentArn"
          description: The Amazon Resource Name (ARN) of the custom model deployment. Use this ARN as the modelId parameter when invoking the model with the InvokeModel or Converse operations.
      required:
        - customModelDeploymentArn
    CustomModelDeploymentArn:
      type: string
      minLength: 0
      maxLength: 1011
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:custom-model-deployment/[a-z0-9]{12}
    EvaluationJobName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-z0-9](-*[a-z0-9]){0,62}"
    EvaluationJobDescription:
      type: string
      minLength: 1
      maxLength: 200
      pattern: .+
    ApplicationType:
      type: string
      enum:
        - ModelEvaluation
        - RagEvaluation
    EvaluationConfig:
      description: The configuration details of either an automated or human-based evaluation job.
      type: object
      properties:
        automated:
          $ref: "#/components/schemas/AutomatedEvaluationConfig"
          description: Contains the configuration details of an automated evaluation job that computes metrics.
        human:
          $ref: "#/components/schemas/HumanEvaluationConfig"
          description: Contains the configuration details of an evaluation job that uses human workers.
    AutomatedEvaluationConfig:
      description: The configuration details of an automated evaluation job. The EvaluationDatasetMetricConfig object is used to specify the prompt datasets, task type, and metric names.
      type: object
      properties:
        datasetMetricConfigs:
          $ref: "#/components/schemas/EvaluationDatasetMetricConfigs"
          description: Configuration details of the prompt datasets and metrics you want to use for your evaluation job.
        evaluatorModelConfig:
          $ref: "#/components/schemas/EvaluatorModelConfig"
          description: Contains the evaluator model configuration details. EvaluatorModelConfig is required for evaluation jobs that use a knowledge base or in model evaluation job that use a model as judge. This model computes all evaluation related metrics.
        customMetricConfig:
          $ref: "#/components/schemas/AutomatedEvaluationCustomMetricConfig"
          description: Defines the configuration of custom metrics to be used in an evaluation job.
      required:
        - datasetMetricConfigs
    EvaluationDatasetMetricConfigs:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationDatasetMetricConfig"
    EvaluationDatasetMetricConfig:
      description: Defines the prompt datasets, built-in metric names and custom metric names, and the task type.
      type: object
      properties:
        taskType:
          $ref: "#/components/schemas/EvaluationTaskType"
          description: The the type of task you want to evaluate for your evaluation job. This applies only to model evaluation jobs and is ignored for knowledge base evaluation jobs.
        dataset:
          $ref: "#/components/schemas/EvaluationDataset"
          description: Specifies the prompt dataset.
        metricNames:
          $ref: "#/components/schemas/EvaluationMetricNames"
          description: The names of the metrics you want to use for your evaluation job. For knowledge base evaluation jobs that evaluate retrieval only, valid values are "Builtin.ContextRelevance", "Builtin.ContextCoverage". For knowledge base evaluation jobs that evaluate retrieval with response generation, valid values are "Builtin.Correctness", "Builtin.Completeness", "Builtin.Helpfulness", "Builtin.LogicalCoherence", "Builtin.Faithfulness", "Builtin.Harmfulness", "Builtin.Stereotyping", "Builtin.Refusal". For automated model evaluation jobs, valid values are "Builtin.Accuracy", "Builtin.Robustness", and "Builtin.Toxicity". In model evaluation jobs that use a LLM as judge you can specify "Builtin.Correctness", "Builtin.Completeness", "Builtin.Faithfulness", "Builtin.Helpfulness", "Builtin.Coherence", "Builtin.Relevance", "Builtin.FollowingInstructions", "Builtin.ProfessionalStyleAndTone", You can also specify the following responsible AI related metrics only for model evaluation job that use a LLM as judge "Builtin.Harmfulness", "Builtin.Stereotyping", and "Builtin.Refusal". For human-based model evaluation jobs, the list of strings must match the name parameter specified in HumanEvaluationCustomMetric.
      required:
        - taskType
        - dataset
        - metricNames
    EvaluationTaskType:
      type: string
      enum:
        - Summarization
        - Classification
        - QuestionAndAnswer
        - Generation
        - Custom
      minLength: 1
      maxLength: 63
      pattern: "[A-Za-z0-9]+"
    EvaluationDataset:
      description: Used to specify the name of a built-in prompt dataset and optionally, the Amazon S3 bucket where a custom prompt dataset is saved.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/EvaluationDatasetName"
          description: Used to specify supported built-in prompt datasets. Valid values are Builtin.Bold, Builtin.BoolQ, Builtin.NaturalQuestions, Builtin.Gigaword, Builtin.RealToxicityPrompts, Builtin.TriviaQA, Builtin.T-Rex, Builtin.WomensEcommerceClothingReviews and Builtin.Wikitext2.
        datasetLocation:
          $ref: "#/components/schemas/EvaluationDatasetLocation"
          description: For custom prompt datasets, you must specify the location in Amazon S3 where the prompt dataset is saved.
      required:
        - name
    EvaluationDatasetName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[0-9a-zA-Z-_.]+"
    EvaluationDatasetLocation:
      description: The location in Amazon S3 where your prompt dataset is stored.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The S3 URI of the S3 bucket specified in the job.
    EvaluationMetricNames:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationMetricName"
    EvaluationMetricName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[0-9a-zA-Z-_.]+"
    EvaluatorModelConfig:
      description: Specifies the model configuration for the evaluator model. EvaluatorModelConfig is required for evaluation jobs that use a knowledge base or in model evaluation job that use a model as judge. This model computes all evaluation related metrics.
      type: object
      properties:
        bedrockEvaluatorModels:
          $ref: "#/components/schemas/BedrockEvaluatorModels"
          description: The evaluator model used in knowledge base evaluation job or in model evaluation job that use a model as judge. This model computes all evaluation related metrics.
    BedrockEvaluatorModels:
      type: array
      items:
        $ref: "#/components/schemas/BedrockEvaluatorModel"
    BedrockEvaluatorModel:
      description: The evaluator model used in knowledge base evaluation job or in model evaluation job that use a model as judge. This model computes all evaluation related metrics.
      type: object
      properties:
        modelIdentifier:
          $ref: "#/components/schemas/EvaluatorModelIdentifier"
          description: The Amazon Resource Name (ARN) of the evaluator model used used in knowledge base evaluation job or in model evaluation job that use a model as judge.
      required:
        - modelIdentifier
    EvaluatorModelIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:((:foundation-model/[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63}))|([0-9]{12}:inference-profile/(([a-z-]{2,8}.)[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63})))))$|(^[a-z0-9-]+[.][a-z0-9-]+([.][a-z0-9-]+)*(:[a-z0-9-]+)?$)|^[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([a-z0-9-]{1,63}[.]){0,2}[a-z0-9-]{1,63}([:][a-z0-9-]{1,63}){0,2}(/[a-z0-9]{12}|)
    AutomatedEvaluationCustomMetricConfig:
      description: Defines the configuration of custom metrics to be used in an evaluation job. To learn more about using custom metrics in Amazon Bedrock evaluation jobs, see Create a prompt for a custom metrics (LLM-as-a-judge model evaluations) and Create a prompt for a custom metrics (RAG evaluations).
      type: object
      properties:
        customMetrics:
          $ref: "#/components/schemas/AutomatedEvaluationCustomMetrics"
          description: Defines a list of custom metrics to be used in an Amazon Bedrock evaluation job.
        evaluatorModelConfig:
          $ref: "#/components/schemas/CustomMetricEvaluatorModelConfig"
          description: Configuration of the evaluator model you want to use to evaluate custom metrics in an Amazon Bedrock evaluation job.
      required:
        - customMetrics
        - evaluatorModelConfig
    AutomatedEvaluationCustomMetrics:
      type: array
      items:
        $ref: "#/components/schemas/AutomatedEvaluationCustomMetricSource"
    AutomatedEvaluationCustomMetricSource:
      description: An array item definining a single custom metric for use in an Amazon Bedrock evaluation job.
      type: object
      properties:
        customMetricDefinition:
          $ref: "#/components/schemas/CustomMetricDefinition"
          description: The definition of a custom metric for use in an Amazon Bedrock evaluation job.
    CustomMetricDefinition:
      description: The definition of a custom metric for use in an Amazon Bedrock evaluation job. A custom metric definition includes a metric name, prompt (instructions) and optionally, a rating scale. Your prompt must include a task description and input variables. The required input variables are different for model-as-a-judge and RAG evaluations. For more information about how to define a custom metric in Amazon Bedrock, see Create a prompt for a custom metrics (LLM-as-a-judge model evaluations) and Create a prompt for a custom metrics (RAG evaluations).
      type: object
      properties:
        name:
          $ref: "#/components/schemas/MetricName"
          description: The name for a custom metric. Names must be unique in your Amazon Web Services region.
        instructions:
          $ref: "#/components/schemas/CustomMetricInstructions"
          description: The prompt for a custom metric that instructs the evaluator model how to rate the model or RAG source under evaluation.
        ratingScale:
          $ref: "#/components/schemas/RatingScale"
          description: Defines the rating scale to be used for a custom metric. We recommend that you always define a ratings scale when creating a custom metric. If you don't define a scale, Amazon Bedrock won't be able to visually display the results of the evaluation in the console or calculate average values of numerical scores. For more information on specifying a rating scale, see Specifying an output schema (rating scale).
      required:
        - name
        - instructions
    MetricName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[0-9a-zA-Z-_.]+"
    CustomMetricInstructions:
      type: string
      minLength: 1
      maxLength: 5000
    RatingScale:
      type: array
      items:
        $ref: "#/components/schemas/RatingScaleItem"
    RatingScaleItem:
      description: Defines the value and corresponding definition for one rating in a custom metric rating scale.
      type: object
      properties:
        definition:
          $ref: "#/components/schemas/RatingScaleItemDefinition"
          description: Defines the definition for one rating in a custom metric rating scale.
        value:
          $ref: "#/components/schemas/RatingScaleItemValue"
          description: Defines the value for one rating in a custom metric rating scale.
      required:
        - definition
        - value
    RatingScaleItemDefinition:
      type: string
      minLength: 1
      maxLength: 100
    RatingScaleItemValue:
      description: Defines the value for one rating in a custom metric rating scale.
      type: object
      properties:
        stringValue:
          $ref: "#/components/schemas/RatingScaleItemValueStringValueString"
          description: A string representing the value for a rating in a custom metric rating scale.
        floatValue:
          $ref: "#/components/schemas/Float"
          description: A floating point number representing the value for a rating in a custom metric rating scale.
    RatingScaleItemValueStringValueString:
      type: string
      minLength: 1
      maxLength: 100
    Float:
      type: number
      format: float
    CustomMetricEvaluatorModelConfig:
      description: Configuration of the evaluator model you want to use to evaluate custom metrics in an Amazon Bedrock evaluation job.
      type: object
      properties:
        bedrockEvaluatorModels:
          $ref: "#/components/schemas/CustomMetricBedrockEvaluatorModels"
          description: Defines the model you want to evaluate custom metrics in an Amazon Bedrock evaluation job.
      required:
        - bedrockEvaluatorModels
    CustomMetricBedrockEvaluatorModels:
      type: array
      items:
        $ref: "#/components/schemas/CustomMetricBedrockEvaluatorModel"
    CustomMetricBedrockEvaluatorModel:
      description: Defines the model you want to evaluate custom metrics in an Amazon Bedrock evaluation job.
      type: object
      properties:
        modelIdentifier:
          $ref: "#/components/schemas/EvaluatorModelIdentifier"
          description: The Amazon Resource Name (ARN) of the evaluator model for custom metrics. For a list of supported evaluator models, see Evaluate model performance using another LLM as a judge and Evaluate the performance of RAG sources using Amazon Bedrock evaluations.
      required:
        - modelIdentifier
    HumanEvaluationConfig:
      description: Specifies the custom metrics, how tasks will be rated, the flow definition ARN, and your custom prompt datasets. Model evaluation jobs use human workers only support the use of custom prompt datasets. To learn more about custom prompt datasets and the required format, see Custom prompt datasets. When you create custom metrics in HumanEvaluationCustomMetric you must specify the metric's name. The list of names specified in the HumanEvaluationCustomMetric array, must match the metricNames array of strings specified in EvaluationDatasetMetricConfig. For example, if in the HumanEvaluationCustomMetric array your specified the names "accuracy", "toxicity", "readability" as custom metrics then the metricNames array would need to look like the following ["accuracy", "toxicity", "readability"] in EvaluationDatasetMetricConfig.
      type: object
      properties:
        humanWorkflowConfig:
          $ref: "#/components/schemas/HumanWorkflowConfig"
          description: The parameters of the human workflow.
        customMetrics:
          $ref: "#/components/schemas/HumanEvaluationCustomMetrics"
          description: A HumanEvaluationCustomMetric object. It contains the names the metrics, how the metrics are to be evaluated, an optional description.
        datasetMetricConfigs:
          $ref: "#/components/schemas/EvaluationDatasetMetricConfigs"
          description: Use to specify the metrics, task, and prompt dataset to be used in your model evaluation job.
      required:
        - datasetMetricConfigs
    HumanWorkflowConfig:
      description: Contains SageMakerFlowDefinition object. The object is used to specify the prompt dataset, task type, rating method and metric names.
      type: object
      properties:
        flowDefinitionArn:
          $ref: "#/components/schemas/SageMakerFlowDefinitionArn"
          description: The Amazon Resource Number (ARN) for the flow definition
        instructions:
          $ref: "#/components/schemas/HumanTaskInstructions"
          description: Instructions for the flow definition
      required:
        - flowDefinitionArn
    SageMakerFlowDefinitionArn:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: arn:aws(-[^:]+)?:sagemaker:[a-z0-9-]{1,20}:[0-9]{12}:flow-definition/.*
    HumanTaskInstructions:
      type: string
      minLength: 1
      maxLength: 5000
      pattern: "[\\S\\s]+"
    HumanEvaluationCustomMetrics:
      type: array
      items:
        $ref: "#/components/schemas/HumanEvaluationCustomMetric"
    HumanEvaluationCustomMetric:
      description: In a model evaluation job that uses human workers you must define the name of the metric, and how you want that metric rated ratingMethod, and an optional description of the metric.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/EvaluationMetricName"
          description: The name of the metric. Your human evaluators will see this name in the evaluation UI.
        description:
          $ref: "#/components/schemas/EvaluationMetricDescription"
          description: An optional description of the metric. Use this parameter to provide more details about the metric.
        ratingMethod:
          $ref: "#/components/schemas/EvaluationRatingMethod"
          description: Choose how you want your human workers to evaluation your model. Valid values for rating methods are ThumbsUpDown, IndividualLikertScale,ComparisonLikertScale, ComparisonChoice, and ComparisonRank
      required:
        - name
        - ratingMethod
    EvaluationMetricDescription:
      type: string
      minLength: 1
      maxLength: 63
      pattern: .+
    EvaluationRatingMethod:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[0-9a-zA-Z-_]+"
    EvaluationInferenceConfig:
      description: The configuration details of the inference model for an evaluation job. For automated model evaluation jobs, only a single model is supported. For human-based model evaluation jobs, your annotator can compare the responses for up to two different models.
      type: object
      properties:
        models:
          $ref: "#/components/schemas/EvaluationModelConfigs"
          description: Specifies the inference models.
        ragConfigs:
          $ref: "#/components/schemas/RagConfigs"
          description: Contains the configuration details of the inference for a knowledge base evaluation job, including either the retrieval only configuration or the retrieval with response generation configuration.
    EvaluationModelConfigs:
      type: array
      items:
        $ref: "#/components/schemas/EvaluationModelConfig"
    EvaluationModelConfig:
      description: Defines the models used in the model evaluation job.
      type: object
      properties:
        bedrockModel:
          $ref: "#/components/schemas/EvaluationBedrockModel"
          description: Defines the Amazon Bedrock model or inference profile and inference parameters you want used.
        precomputedInferenceSource:
          $ref: "#/components/schemas/EvaluationPrecomputedInferenceSource"
          description: Defines the model used to generate inference response data for a model evaluation job where you provide your own inference response data.
    EvaluationBedrockModel:
      description: Contains the ARN of the Amazon Bedrock model or inference profile specified in your evaluation job. Each Amazon Bedrock model supports different inferenceParams. To learn more about supported inference parameters for Amazon Bedrock models, see Inference parameters for foundation models. The inferenceParams are specified using JSON. To successfully insert JSON as string make sure that all quotations are properly escaped. For example, "temperature":"0.25" key value pair would need to be formatted as \"temperature\":\"0.25\" to successfully accepted in the request.
      type: object
      properties:
        modelIdentifier:
          $ref: "#/components/schemas/EvaluationBedrockModelIdentifier"
          description: The ARN of the Amazon Bedrock model or inference profile specified.
        inferenceParams:
          $ref: "#/components/schemas/EvaluationModelInferenceParams"
          description: Each Amazon Bedrock support different inference parameters that change how the model behaves during inference.
        performanceConfig:
          $ref: "#/components/schemas/PerformanceConfiguration"
          description: Specifies performance settings for the model or inference profile.
      required:
        - modelIdentifier
    EvaluationBedrockModelIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:((:foundation-model/[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63}))|([0-9]{12}:provisioned-model/[a-z0-9]{12})|([0-9]{12}:imported-model/[a-z0-9]{12})|([0-9]{12}:application-inference-profile/[a-z0-9]{12})|([0-9]{12}:inference-profile/(([a-z-]{2,8}.)[a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63})))|([0-9]{12}:(default-prompt-router|prompt-router)/[a-zA-Z0-9-:.]+)))|(([a-z]{2,4}[.]{1})([a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63})))|([a-z0-9-]{1,63}[.]{1}[a-z0-9-]{1,63}([.:]?[a-z0-9-]{1,63}))|arn:aws(-[^:]+)?:sagemaker:[a-z0-9-]{1,20}:[0-9]{12}:endpoint/[a-z0-9-]{1,63}
    EvaluationModelInferenceParams:
      type: string
      minLength: 1
      maxLength: 1023
    PerformanceConfiguration:
      description: Contains performance settings for a model.
      type: object
      properties:
        latency:
          $ref: "#/components/schemas/PerformanceConfigLatency"
          description: Specifies whether to use the latency-optimized or standard version of a model or inference profile.
    PerformanceConfigLatency:
      type: string
      enum:
        - standard
        - optimized
    EvaluationPrecomputedInferenceSource:
      description: A summary of a model used for a model evaluation job where you provide your own inference response data.
      type: object
      properties:
        inferenceSourceIdentifier:
          $ref: "#/components/schemas/EvaluationPrecomputedInferenceSourceIdentifier"
          description: A label that identifies a model used in a model evaluation job where you provide your own inference response data.
      required:
        - inferenceSourceIdentifier
    EvaluationPrecomputedInferenceSourceIdentifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9._-]){0,255}"
    RagConfigs:
      type: array
      items:
        $ref: "#/components/schemas/RAGConfig"
    RAGConfig:
      description: Contains configuration details for retrieval of information and response generation.
      type: object
      properties:
        knowledgeBaseConfig:
          $ref: "#/components/schemas/KnowledgeBaseConfig"
          description: Contains configuration details for knowledge base retrieval and response generation.
        precomputedRagSourceConfig:
          $ref: "#/components/schemas/EvaluationPrecomputedRagSourceConfig"
          description: Contains configuration details about the RAG source used to generate inference response data for a Knowledge Base evaluation job.
    KnowledgeBaseConfig:
      description: The configuration details for retrieving information from a knowledge base and generating responses.
      type: object
      properties:
        retrieveConfig:
          $ref: "#/components/schemas/RetrieveConfig"
          description: Contains configuration details for retrieving information from a knowledge base.
        retrieveAndGenerateConfig:
          $ref: "#/components/schemas/RetrieveAndGenerateConfiguration"
          description: Contains configuration details for retrieving information from a knowledge base and generating responses.
    RetrieveConfig:
      description: The configuration details for retrieving information from a knowledge base.
      type: object
      properties:
        knowledgeBaseId:
          $ref: "#/components/schemas/KnowledgeBaseId"
          description: The unique identifier of the knowledge base.
        knowledgeBaseRetrievalConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseRetrievalConfiguration"
          description: Contains configuration details for knowledge base retrieval.
      required:
        - knowledgeBaseId
        - knowledgeBaseRetrievalConfiguration
    KnowledgeBaseId:
      type: string
      minLength: 0
      maxLength: 10
      pattern: "[0-9a-zA-Z]+"
    KnowledgeBaseRetrievalConfiguration:
      description: Contains configuration details for retrieving information from a knowledge base.
      type: object
      properties:
        vectorSearchConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseVectorSearchConfiguration"
          description: Contains configuration details for returning the results from the vector search.
      required:
        - vectorSearchConfiguration
    KnowledgeBaseVectorSearchConfiguration:
      description: The configuration details for returning the results from the knowledge base vector search.
      type: object
      properties:
        numberOfResults:
          $ref: "#/components/schemas/KnowledgeBaseVectorSearchConfigurationNumberOfResultsInteger"
          description: The number of text chunks to retrieve; the number of results to return.
        overrideSearchType:
          $ref: "#/components/schemas/SearchType"
          description: By default, Amazon Bedrock decides a search strategy for you. If you're using an Amazon OpenSearch Serverless vector store that contains a filterable text field, you can specify whether to query the knowledge base with a HYBRID search using both vector embeddings and raw text, or SEMANTIC search using only vector embeddings. For other vector store configurations, only SEMANTIC search is available.
        filter:
          $ref: "#/components/schemas/RetrievalFilter"
          description: Specifies the filters to use on the metadata fields in the knowledge base data sources before returning results.
        implicitFilterConfiguration:
          $ref: "#/components/schemas/ImplicitFilterConfiguration"
          description: Configuration for implicit filtering in Knowledge Base vector searches. This allows the system to automatically apply filters based on the query context without requiring explicit filter expressions.
        rerankingConfiguration:
          $ref: "#/components/schemas/VectorSearchRerankingConfiguration"
          description: Configuration for reranking search results in Knowledge Base vector searches. Reranking improves search relevance by reordering initial vector search results using more sophisticated relevance models.
    KnowledgeBaseVectorSearchConfigurationNumberOfResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    SearchType:
      type: string
      enum:
        - HYBRID
        - SEMANTIC
    RetrievalFilter:
      description: Specifies the filters to use on the metadata attributes/fields in the knowledge base data sources before returning results.
      type: object
      properties:
        equals:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value matches the value in this object. The following example would return data sources with an animal attribute whose value is 'cat': \"equals\": { \"key\": \"animal\", \"value\": \"cat\" }"
        notEquals:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources that contain a metadata attribute whose name matches the key and whose value doesn't match the value in this object are returned. The following example would return data sources that don't contain an animal attribute whose value is 'cat': \"notEquals\": { \"key\": \"animal\", \"value\": \"cat\" }"
        greaterThan:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is greater than the value in this object. The following example would return data sources with an year attribute whose value is greater than '1989': \"greaterThan\": { \"key\": \"year\", \"value\": 1989 }"
        greaterThanOrEquals:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is greater than or equal to the value in this object. The following example would return data sources with an year attribute whose value is greater than or equal to '1989': \"greaterThanOrEquals\": { \"key\": \"year\", \"value\": 1989 }"
        lessThan:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is less than the value in this object. The following example would return data sources with an year attribute whose value is less than to '1989': \"lessThan\": { \"key\": \"year\", \"value\": 1989 }"
        lessThanOrEquals:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is less than or equal to the value in this object. The following example would return data sources with an year attribute whose value is less than or equal to '1989': \"lessThanOrEquals\": { \"key\": \"year\", \"value\": 1989 }"
        in:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is in the list specified in the value in this object. The following example would return data sources with an animal attribute that is either 'cat' or 'dog': \"in\": { \"key\": \"animal\", \"value\": [\"cat\", \"dog\"] }"
        notIn:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value isn't in the list specified in the value in this object. The following example would return data sources whose animal attribute is neither 'cat' nor 'dog': \"notIn\": { \"key\": \"animal\", \"value\": [\"cat\", \"dog\"] }"
        startsWith:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value starts with the value in this object. This filter is currently only supported for Amazon OpenSearch Serverless vector stores. The following example would return data sources with an animal attribute starts with 'ca' (for example, 'cat' or 'camel'). \"startsWith\": { \"key\": \"animal\", \"value\": \"ca\" }"
        listContains:
          $ref: "#/components/schemas/FilterAttribute"
          description: 'Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is a list that contains the value as one of its members. The following example would return data sources with an animals attribute that is a list containing a cat member (for example, ["dog", "cat"]): "listContains": { "key": "animals", "value": "cat" }'
        stringContains:
          $ref: "#/components/schemas/FilterAttribute"
          description: "Knowledge base data sources are returned if they contain a metadata attribute whose name matches the key and whose value is one of the following: A string that contains the value as a substring. The following example would return data sources with an animal attribute that contains the substring at (for example, 'cat'): \"stringContains\": { \"key\": \"animal\", \"value\": \"at\" } A list with a member that contains the value as a substring. The following example would return data sources with an animals attribute that is a list containing a member that contains the substring at (for example, [\"dog\", \"cat\"]): \"stringContains\": { \"key\": \"animals\", \"value\": \"at\" }"
        andAll:
          $ref: "#/components/schemas/RetrievalFilterList"
          description: Knowledge base data sources are returned if their metadata attributes fulfill all the filter conditions inside this list.
        orAll:
          $ref: "#/components/schemas/RetrievalFilterList"
          description: Knowledge base data sources are returned if their metadata attributes fulfill at least one of the filter conditions inside this list.
    FilterAttribute:
      description: Specifies the name of the metadata attribute/field to apply filters. You must match the name of the attribute/field in your data source/document metadata.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/FilterKey"
          description: The name of metadata attribute/field, which must match the name in your data source/document metadata.
        value:
          $ref: "#/components/schemas/FilterValue"
          description: The value of the metadata attribute/field.
      required:
        - key
        - value
    FilterKey:
      type: string
      minLength: 1
      maxLength: 100
    FilterValue:
      type: object
    RetrievalFilterList:
      type: array
      items:
        $ref: "#/components/schemas/RetrievalFilter"
    ImplicitFilterConfiguration:
      description: Configuration for implicit filtering in Knowledge Base vector searches. Implicit filtering allows you to automatically filter search results based on metadata attributes without requiring explicit filter expressions in each query.
      type: object
      properties:
        metadataAttributes:
          $ref: "#/components/schemas/MetadataAttributeSchemaList"
          description: A list of metadata attribute schemas that define the structure and properties of metadata fields used for implicit filtering. Each attribute defines a key, type, and optional description.
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The Amazon Resource Name (ARN) of the foundation model used for implicit filtering. This model processes the query to extract relevant filtering criteria.
      required:
        - metadataAttributes
        - modelArn
    MetadataAttributeSchemaList:
      type: array
      items:
        $ref: "#/components/schemas/MetadataAttributeSchema"
    MetadataAttributeSchema:
      description: Defines the schema for a metadata attribute used in Knowledge Base vector searches. Metadata attributes provide additional context for documents and can be used for filtering and reranking search results.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/MetadataAttributeSchemaKeyString"
          description: The unique identifier for the metadata attribute. This key is used to reference the attribute in filter expressions and reranking configurations.
        type_:
          $ref: "#/components/schemas/AttributeType"
          description: The data type of the metadata attribute. The type determines how the attribute can be used in filter expressions and reranking.
        description:
          $ref: "#/components/schemas/MetadataAttributeSchemaDescriptionString"
          description: An optional description of the metadata attribute that provides additional context about its purpose and usage.
      required:
        - key
        - type_
        - description
    MetadataAttributeSchemaKeyString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\s\\S]+"
    AttributeType:
      type: string
      enum:
        - STRING
        - NUMBER
        - BOOLEAN
        - STRING_LIST
    MetadataAttributeSchemaDescriptionString:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\s\\S]+"
    BedrockModelArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:(bedrock|sagemaker):[a-z0-9-]{1,20}:([0-9]{12})?:([a-z-]+/)?)?([a-zA-Z0-9.-]{1,63}){0,2}(([:][a-z0-9-]{1,63}){0,2})?(/[a-z0-9]{1,12})?
    VectorSearchRerankingConfiguration:
      description: Configuration for reranking vector search results to improve relevance. Reranking applies additional relevance models to reorder the initial vector search results based on more sophisticated criteria.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/VectorSearchRerankingConfigurationType"
          description: The type of reranking to apply to vector search results. Currently, the only supported value is BEDROCK, which uses Amazon Bedrock foundation models for reranking.
        bedrockRerankingConfiguration:
          $ref: "#/components/schemas/VectorSearchBedrockRerankingConfiguration"
          description: Configuration for using Amazon Bedrock foundation models to rerank search results. This is required when the reranking type is set to BEDROCK.
      required:
        - type_
    VectorSearchRerankingConfigurationType:
      type: string
      enum:
        - BEDROCK_RERANKING_MODEL
    VectorSearchBedrockRerankingConfiguration:
      description: Configuration for using Amazon Bedrock foundation models to rerank Knowledge Base vector search results. This enables more sophisticated relevance ranking using large language models.
      type: object
      properties:
        modelConfiguration:
          $ref: "#/components/schemas/VectorSearchBedrockRerankingModelConfiguration"
          description: Configuration for the Amazon Bedrock foundation model used for reranking. This includes the model ARN and any additional request fields required by the model.
        numberOfRerankedResults:
          $ref: "#/components/schemas/VectorSearchBedrockRerankingConfigurationNumberOfRerankedResultsInteger"
          description: The maximum number of results to rerank. This limits how many of the initial vector search results will be processed by the reranking model. A smaller number improves performance but may exclude potentially relevant results.
        metadataConfiguration:
          $ref: "#/components/schemas/MetadataConfigurationForReranking"
          description: Configuration for how document metadata should be used during the reranking process. This determines which metadata fields are included when reordering search results.
      required:
        - modelConfiguration
    VectorSearchBedrockRerankingModelConfiguration:
      description: Configuration for the Amazon Bedrock foundation model used for reranking vector search results. This specifies which model to use and any additional parameters required by the model.
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/BedrockRerankingModelArn"
          description: The Amazon Resource Name (ARN) of the foundation model to use for reranking. This model processes the query and search results to determine a more relevant ordering.
        additionalModelRequestFields:
          type: object
          properties: {}
          description: A list of additional fields to include in the model request during reranking. These fields provide extra context or configuration options specific to the selected foundation model.
      required:
        - modelArn
    BedrockRerankingModelArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: (arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}::foundation-model/(.*))?
    VectorSearchBedrockRerankingConfigurationNumberOfRerankedResultsInteger:
      type: integer
      minimum: 1
      maximum: 100
    MetadataConfigurationForReranking:
      description: Configuration for how metadata should be used during the reranking process in Knowledge Base vector searches. This determines which metadata fields are included or excluded when reordering search results.
      type: object
      properties:
        selectionMode:
          $ref: "#/components/schemas/RerankingMetadataSelectionMode"
          description: The mode for selecting which metadata fields to include in the reranking process. Valid values are ALL (use all available metadata fields) or SELECTIVE (use only specified fields).
        selectiveModeConfiguration:
          $ref: "#/components/schemas/RerankingMetadataSelectiveModeConfiguration"
          description: Configuration for selective mode, which allows you to explicitly include or exclude specific metadata fields during reranking. This is only used when selectionMode is set to SELECTIVE.
      required:
        - selectionMode
    RerankingMetadataSelectionMode:
      type: string
      enum:
        - SELECTIVE
        - ALL
    RerankingMetadataSelectiveModeConfiguration:
      description: Configuration for selectively including or excluding metadata fields during the reranking process. This allows you to control which metadata attributes are considered when reordering search results.
      type: object
      properties:
        fieldsToInclude:
          $ref: "#/components/schemas/FieldsForReranking"
          description: A list of metadata field names to explicitly include in the reranking process. Only these fields will be considered when reordering search results. This parameter cannot be used together with fieldsToExclude.
        fieldsToExclude:
          $ref: "#/components/schemas/FieldsForReranking"
          description: A list of metadata field names to explicitly exclude from the reranking process. All metadata fields except these will be considered when reordering search results. This parameter cannot be used together with fieldsToInclude.
    FieldsForReranking:
      type: array
      items:
        $ref: "#/components/schemas/FieldForReranking"
    FieldForReranking:
      description: Specifies a field to be used during the reranking process in a Knowledge Base vector search. This structure identifies metadata fields that should be considered when reordering search results to improve relevance.
      type: object
      properties:
        fieldName:
          $ref: "#/components/schemas/FieldForRerankingFieldNameString"
          description: The name of the metadata field to be used during the reranking process.
      required:
        - fieldName
    FieldForRerankingFieldNameString:
      type: string
      minLength: 1
      maxLength: 2000
    RetrieveAndGenerateConfiguration:
      description: Contains configuration details for a knowledge base retrieval and response generation.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/RetrieveAndGenerateType"
          description: The type of resource that contains your data for retrieving information and generating responses. If you choose to use EXTERNAL_SOURCES, then currently only Claude 3 Sonnet models for knowledge bases are supported.
        knowledgeBaseConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseRetrieveAndGenerateConfiguration"
          description: Contains configuration details for the knowledge base retrieval and response generation.
        externalSourcesConfiguration:
          $ref: "#/components/schemas/ExternalSourcesRetrieveAndGenerateConfiguration"
          description: The configuration for the external source wrapper object in the retrieveAndGenerate function.
      required:
        - type_
    RetrieveAndGenerateType:
      type: string
      enum:
        - KNOWLEDGE_BASE
        - EXTERNAL_SOURCES
    KnowledgeBaseRetrieveAndGenerateConfiguration:
      description: Contains configuration details for retrieving information from a knowledge base and generating responses.
      type: object
      properties:
        knowledgeBaseId:
          $ref: "#/components/schemas/KnowledgeBaseId"
          description: The unique identifier of the knowledge base.
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The Amazon Resource Name (ARN) of the foundation model or inference profile used to generate responses.
        retrievalConfiguration:
          $ref: "#/components/schemas/KnowledgeBaseRetrievalConfiguration"
          description: Contains configuration details for retrieving text chunks.
        generationConfiguration:
          $ref: "#/components/schemas/GenerationConfiguration"
          description: Contains configurations details for response generation based on retrieved text chunks.
        orchestrationConfiguration:
          $ref: "#/components/schemas/OrchestrationConfiguration"
          description: Contains configuration details for the model to process the prompt prior to retrieval and response generation.
      required:
        - knowledgeBaseId
        - modelArn
    GenerationConfiguration:
      description: The configuration details for response generation based on retrieved text chunks.
      type: object
      properties:
        promptTemplate:
          $ref: "#/components/schemas/PromptTemplate"
          description: Contains the template for the prompt that's sent to the model for response generation.
        guardrailConfiguration:
          $ref: "#/components/schemas/GuardrailConfiguration"
          description: Contains configuration details for the guardrail.
        kbInferenceConfig:
          $ref: "#/components/schemas/KbInferenceConfig"
          description: Contains configuration details for inference for knowledge base retrieval and response generation.
        additionalModelRequestFields:
          type: object
          properties: {}
          description: Additional model parameters and corresponding values not included in the textInferenceConfig structure for a knowledge base. This allows you to provide custom model parameters specific to the language model being used.
    PromptTemplate:
      description: The template for the prompt that's sent to the model for response generation.
      type: object
      properties:
        textPromptTemplate:
          $ref: "#/components/schemas/TextPromptTemplate"
          description: The template for the prompt that's sent to the model for response generation. You can include prompt placeholders, which become replaced before the prompt is sent to the model to provide instructions and context to the model. In addition, you can include XML tags to delineate meaningful sections of the prompt template. For more information, see Knowledge base prompt template and Use XML tags with Anthropic Claude models.
    TextPromptTemplate:
      type: string
      minLength: 1
      maxLength: 100000
    GuardrailConfiguration:
      description: The configuration details for the guardrail.
      type: object
      properties:
        guardrailId:
          $ref: "#/components/schemas/GuardrailConfigurationGuardrailIdString"
          description: The unique identifier for the guardrail.
        guardrailVersion:
          $ref: "#/components/schemas/GuardrailConfigurationGuardrailVersionString"
          description: The version of the guardrail.
      required:
        - guardrailId
        - guardrailVersion
    GuardrailConfigurationGuardrailIdString:
      type: string
      minLength: 0
      maxLength: 64
      pattern: "[a-z0-9]+"
    GuardrailConfigurationGuardrailVersionString:
      type: string
      minLength: 1
      maxLength: 5
      pattern: (([1-9][0-9]{0,7})|(DRAFT))
    KbInferenceConfig:
      description: Contains configuration details of the inference for knowledge base retrieval and response generation.
      type: object
      properties:
        textInferenceConfig:
          $ref: "#/components/schemas/TextInferenceConfig"
          description: Contains configuration details for text generation using a language model via the RetrieveAndGenerate function.
    TextInferenceConfig:
      description: The configuration details for text generation using a language model via the RetrieveAndGenerate function.
      type: object
      properties:
        temperature:
          $ref: "#/components/schemas/Temperature"
          description: Controls the random-ness of text generated by the language model, influencing how much the model sticks to the most predictable next words versus exploring more surprising options. A lower temperature value (e.g. 0.2 or 0.3) makes model outputs more deterministic or predictable, while a higher temperature (e.g. 0.8 or 0.9) makes the outputs more creative or unpredictable.
        topP:
          $ref: "#/components/schemas/TopP"
          description: A probability distribution threshold which controls what the model considers for the set of possible next tokens. The model will only consider the top p% of the probability distribution when generating the next token.
        maxTokens:
          $ref: "#/components/schemas/MaxTokens"
          description: The maximum number of tokens to generate in the output text. Do not use the minimum of 0 or the maximum of 65536. The limit values described here are arbitrary values, for actual values consult the limits defined by your specific model.
        stopSequences:
          $ref: "#/components/schemas/RAGStopSequences"
          description: A list of sequences of characters that, if generated, will cause the model to stop generating further tokens. Do not use a minimum length of 1 or a maximum length of 1000. The limit values described here are arbitrary values, for actual values consult the limits defined by your specific model.
    Temperature:
      type: number
      format: float
      minimum: 0
      maximum: 1
    TopP:
      type: number
      format: float
      minimum: 0
      maximum: 1
    MaxTokens:
      type: integer
      minimum: 0
      maximum: 65536
    RAGStopSequences:
      type: array
      items:
        $ref: "#/components/schemas/RAGStopSequencesMemberString"
    RAGStopSequencesMemberString:
      type: string
      minLength: 1
      maxLength: 1000
    OrchestrationConfiguration:
      description: The configuration details for the model to process the prompt prior to retrieval and response generation.
      type: object
      properties:
        queryTransformationConfiguration:
          $ref: "#/components/schemas/QueryTransformationConfiguration"
          description: Contains configuration details for transforming the prompt.
      required:
        - queryTransformationConfiguration
    QueryTransformationConfiguration:
      description: The configuration details for transforming the prompt.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/QueryTransformationType"
          description: The type of transformation to apply to the prompt.
      required:
        - type_
    QueryTransformationType:
      type: string
      enum:
        - QUERY_DECOMPOSITION
    ExternalSourcesRetrieveAndGenerateConfiguration:
      description: The configuration of the external source wrapper object in the retrieveAndGenerate function.
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The Amazon Resource Name (ARN) of the foundation model or inference profile used to generate responses.
        sources:
          $ref: "#/components/schemas/ExternalSources"
          description: The document for the external source wrapper object in the retrieveAndGenerate function.
        generationConfiguration:
          $ref: "#/components/schemas/ExternalSourcesGenerationConfiguration"
          description: Contains configurations details for response generation based on retrieved text chunks.
      required:
        - modelArn
        - sources
    ExternalSources:
      type: array
      items:
        $ref: "#/components/schemas/ExternalSource"
    ExternalSource:
      description: The unique external source of the content contained in the wrapper object.
      type: object
      properties:
        sourceType:
          $ref: "#/components/schemas/ExternalSourceType"
          description: The source type of the external source wrapper object.
        s3Location:
          $ref: "#/components/schemas/S3ObjectDoc"
          description: The S3 location of the external source wrapper object.
        byteContent:
          $ref: "#/components/schemas/ByteContentDoc"
          description: The identifier, content type, and data of the external source wrapper object.
      required:
        - sourceType
    ExternalSourceType:
      type: string
      enum:
        - S3
        - BYTE_CONTENT
    S3ObjectDoc:
      description: The unique wrapper object of the document from the S3 location.
      type: object
      properties:
        uri:
          $ref: "#/components/schemas/kBS3Uri"
          description: The S3 URI location for the wrapper object of the document.
      required:
        - uri
    kBS3Uri:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: s3://[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]/.{1,1024}
    ByteContentDoc:
      description: Contains the document contained in the wrapper object, along with its attributes/fields.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/Identifier"
          description: The file name of the document contained in the wrapper object.
        contentType:
          $ref: "#/components/schemas/ContentType"
          description: The MIME type of the document contained in the wrapper object.
        data:
          $ref: "#/components/schemas/ByteContentBlob"
          description: The byte value of the file to upload, encoded as a Base-64 string.
      required:
        - identifier
        - contentType
        - data
    Identifier:
      type: string
      minLength: 1
      maxLength: 1024
    ContentType:
      type: string
      pattern: .*[a-z]{1,20}/.{1,20}.*
    ByteContentBlob:
      type: string
      format: byte
      minLength: 1
      maxLength: 10485760
    ExternalSourcesGenerationConfiguration:
      description: The response generation configuration of the external source wrapper object.
      type: object
      properties:
        promptTemplate:
          $ref: "#/components/schemas/PromptTemplate"
          description: Contains the template for the prompt for the external source wrapper object.
        guardrailConfiguration:
          $ref: "#/components/schemas/GuardrailConfiguration"
          description: Configuration details for the guardrail.
        kbInferenceConfig:
          $ref: "#/components/schemas/KbInferenceConfig"
          description: Configuration details for inference when using RetrieveAndGenerate to generate responses while using an external source.
        additionalModelRequestFields:
          type: object
          properties: {}
          description: Additional model parameters and their corresponding values not included in the text inference configuration for an external source. Takes in custom model parameters specific to the language model being used.
    EvaluationPrecomputedRagSourceConfig:
      description: A summary of a RAG source used for a Knowledge Base evaluation job where you provide your own inference response data.
      type: object
      properties:
        retrieveSourceConfig:
          $ref: "#/components/schemas/EvaluationPrecomputedRetrieveSourceConfig"
          description: A summary of a RAG source used for a retrieve-only Knowledge Base evaluation job where you provide your own inference response data.
        retrieveAndGenerateSourceConfig:
          $ref: "#/components/schemas/EvaluationPrecomputedRetrieveAndGenerateSourceConfig"
          description: A summary of a RAG source used for a retrieve-and-generate Knowledge Base evaluation job where you provide your own inference response data.
    EvaluationPrecomputedRetrieveSourceConfig:
      description: A summary of a RAG source used for a retrieve-only Knowledge Base evaluation job where you provide your own inference response data.
      type: object
      properties:
        ragSourceIdentifier:
          $ref: "#/components/schemas/EvaluationPrecomputedRagSourceIdentifier"
          description: A label that identifies the RAG source used for a retrieve-only Knowledge Base evaluation job where you provide your own inference response data.
      required:
        - ragSourceIdentifier
    EvaluationPrecomputedRagSourceIdentifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9]([a-zA-Z0-9._-]){0,255}"
    EvaluationPrecomputedRetrieveAndGenerateSourceConfig:
      description: A summary of a RAG source used for a retrieve-and-generate Knowledge Base evaluation job where you provide your own inference response data.
      type: object
      properties:
        ragSourceIdentifier:
          $ref: "#/components/schemas/EvaluationPrecomputedRagSourceIdentifier"
          description: A label that identifies the RAG source used for a retrieve-and-generate Knowledge Base evaluation job where you provide your own inference response data.
      required:
        - ragSourceIdentifier
    EvaluationOutputDataConfig:
      description: The Amazon S3 location where the results of your evaluation job are saved.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: The Amazon S3 URI where the results of the evaluation job are saved.
      required:
        - s3Uri
    CreateEvaluationJobResponse:
      type: object
      properties:
        jobArn:
          $ref: "#/components/schemas/EvaluationJobArn"
          description: The Amazon Resource Name (ARN) of the evaluation job.
      required:
        - jobArn
    EvaluationJobArn:
      type: string
      minLength: 0
      maxLength: 1011
      pattern: arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:evaluation-job/[a-z0-9]{12}
    OfferToken:
      type: string
    CreateFoundationModelAgreementResponse:
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/BedrockModelId"
          description: Model Id of the model for the access request.
      required:
        - modelId
    GuardrailName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[0-9a-zA-Z-_]+"
    GuardrailDescription:
      type: string
      minLength: 1
      maxLength: 200
    GuardrailTopicPolicyConfig:
      description: Contains details about topics that the guardrail should identify and deny.
      type: object
      properties:
        topicsConfig:
          $ref: "#/components/schemas/GuardrailTopicsConfig"
          description: A list of policies related to topics that the guardrail should deny.
        tierConfig:
          $ref: "#/components/schemas/GuardrailTopicsTierConfig"
          description: The tier that your guardrail uses for denied topic filters.
      required:
        - topicsConfig
    GuardrailTopicsConfig:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailTopicConfig"
    GuardrailTopicConfig:
      description: Details about topics for the guardrail to identify and deny.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/GuardrailTopicName"
          description: The name of the topic to deny.
        definition:
          $ref: "#/components/schemas/GuardrailTopicDefinition"
          description: A definition of the topic to deny.
        examples:
          $ref: "#/components/schemas/GuardrailTopicExamples"
          description: A list of prompts, each of which is an example of a prompt that can be categorized as belonging to the topic.
        type_:
          $ref: "#/components/schemas/GuardrailTopicType"
          description: Specifies to deny the topic.
        inputAction:
          $ref: "#/components/schemas/GuardrailTopicAction"
          description: "Specifies the action to take when harmful content is detected in the input. Supported values include: BLOCK – Block the content and replace it with blocked messaging. NONE – Take no action but return detection information in the trace response."
        outputAction:
          $ref: "#/components/schemas/GuardrailTopicAction"
          description: "Specifies the action to take when harmful content is detected in the output. Supported values include: BLOCK – Block the content and replace it with blocked messaging. NONE – Take no action but return detection information in the trace response."
        inputEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to enable guardrail evaluation on the input. When disabled, you aren't charged for the evaluation. The evaluation doesn't appear in the response.
        outputEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to enable guardrail evaluation on the output. When disabled, you aren't charged for the evaluation. The evaluation doesn't appear in the response.
      required:
        - name
        - definition
        - type_
    GuardrailTopicName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[0-9a-zA-Z-_ !?.]+"
    GuardrailTopicDefinition:
      type: string
      minLength: 1
      maxLength: 200
    GuardrailTopicExamples:
      type: array
      items:
        $ref: "#/components/schemas/GuardrailTopicExample"
    GuardrailTopicExample:
      type: string
      minLength: 1
      maxLength: 100
    GuardrailTopicType:
      type: string
      enum:
        - DENY
    GuardrailTopicAction:
      type: string
      enum:
        - BLOCK
        - NONE
    Boolean:
      type: boolean
    GuardrailTopicsTierConfig:
      description: The tier that your guardrail uses for denied topic filters. Consider using a tier that balances performance, accuracy, and compatibility with your existing generative AI workflows.
      type: object
      properties:
        tierName:
          $ref: "#/components/schemas/GuardrailTopicsTierName"
          description: "The tier that your guardrail uses for denied topic filters. Valid values include: CLASSIC tier – Provides established guardrails functionality supporting English, French, and Spanish languages. STANDARD tier – Provides a more robust solution than the CLASSIC tier and has more comprehensive language support. This tier requires that your guardrail use cross-Region inference."
      required:
        - tierName
    GuardrailTopicsTierName:
      type: string
      enum:
        - CLASSIC
        - STANDARD
    GuardrailContentPolicyConfig:
      description: Contains details about how to handle harmful content.
      type: object
      properties:
        filtersConfig:
          $ref: "#/components/schemas/GuardrailContentFiltersConfig"
          description: Contains the type of the content filter and how strongly it should apply to prompts and model responses.
        tierConfig:
          $ref: "#/components/schemas/GuardrailContentFiltersTierConfig"
