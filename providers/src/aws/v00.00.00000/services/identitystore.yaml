openapi: 3.0.0
info:
  version: "2020-06-15"
  title: AWS SSO Identity Store
  description: AWS SSO Identity Store
  x-serviceName: identitystore
  x-serviceAlias: identitystore
  x-protocol: json
  x-apiVersion: "2020-06-15"
  x-endpointPrefix: identitystore
  x-targetPrefix: AWSIdentityStore
  x-jsonVersion: "1.1"
servers:
  - url: https://identitystore.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for identitystore
paths:
  /CreateGroup:
    post:
      operationId: CreateGroup
      description: Creates a group within the specified identity store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.CreateGroup
            default: AWSIdentityStore.CreateGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                DisplayName:
                  $ref: "#/components/schemas/GroupDisplayName"
                  description: A string containing the name of the group. This value is commonly displayed when the group is referenced. Administrator and AWSAdministrators are reserved names and can't be used for users or groups.
                Description:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing the description of the group.
              required:
                - IdentityStoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupResponse"
  /CreateGroupMembership:
    post:
      operationId: CreateGroupMembership
      description: "Creates a relationship between a member and a group. The following identifiers must be specified: GroupId, IdentityStoreId, and MemberId."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.CreateGroupMembership
            default: AWSIdentityStore.CreateGroupMembership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                GroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a group in the identity store.
                MemberId:
                  $ref: "#/components/schemas/MemberId"
                  description: An object that contains the identifier of a group member. Setting the UserID field to the specific identifier for a user indicates that the user is a member of the group.
              required:
                - IdentityStoreId
                - GroupId
                - MemberId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupMembershipResponse"
  /CreateUser:
    post:
      operationId: CreateUser
      description: Creates a user within the specified identity store.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.CreateUser
            default: AWSIdentityStore.CreateUser
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                UserName:
                  $ref: "#/components/schemas/UserName"
                  description: A unique string used to identify the user. The length limit is 128 characters. This value can consist of letters, accented characters, symbols, numbers, and punctuation. This value is specified at the time the user is created and stored as an attribute of the user object in the identity store. Administrator and AWSAdministrators are reserved names and can't be used for users or groups.
                Name:
                  $ref: "#/components/schemas/Name"
                  description: An object containing the name of the user. When used in IAM Identity Center, this parameter is required.
                DisplayName:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing the name of the user. This value is typically formatted for display when the user is referenced. For example, "John Doe." When used in IAM Identity Center, this parameter is required.
                NickName:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing an alternate name for the user.
                ProfileUrl:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing a URL that might be associated with the user.
                Emails:
                  $ref: "#/components/schemas/Emails"
                  description: A list of Email objects containing email addresses associated with the user.
                Addresses:
                  $ref: "#/components/schemas/Addresses"
                  description: A list of Address objects containing addresses associated with the user.
                PhoneNumbers:
                  $ref: "#/components/schemas/PhoneNumbers"
                  description: A list of PhoneNumber objects containing phone numbers associated with the user.
                UserType:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string indicating the type of user. Possible values are left unspecified. The value can vary based on your specific use case.
                Title:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing the title of the user. Possible values are left unspecified. The value can vary based on your specific use case.
                PreferredLanguage:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing the preferred language of the user. For example, "American English" or "en-us."
                Locale:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing the geographical region or location of the user.
                Timezone:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: A string containing the time zone of the user.
                Photos:
                  $ref: "#/components/schemas/Photos"
                  description: A list of photos associated with the user. You can add up to 3 photos per user. Each photo can include a value, type, display name, and primary designation.
                Website:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: The user's personal website or blog URL. This field allows users to provide a link to their personal or professional website.
                Birthdate:
                  $ref: "#/components/schemas/SensitiveStringType"
                  description: The user's birthdate in YYYY-MM-DD format. This field supports standard date format for storing personal information.
                Roles:
                  $ref: "#/components/schemas/Roles"
                  description: A list of Role objects containing roles associated with the user.
                Extensions:
                  $ref: "#/components/schemas/Extensions"
                  description: A map with additional attribute extensions for the user. Each map key corresponds to an extension name, while map values represent extension data in Document type (not supported by Java V1, Go V1 and older versions of the CLI). aws:identitystore:enterprise is the only supported extension name.
              required:
                - IdentityStoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"
  /DeleteGroup:
    post:
      operationId: DeleteGroup
      description: Delete a group within an identity store given GroupId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.DeleteGroup
            default: AWSIdentityStore.DeleteGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                GroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a group in the identity store.
              required:
                - IdentityStoreId
                - GroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupResponse"
  /DeleteGroupMembership:
    post:
      operationId: DeleteGroupMembership
      description: Delete a membership within a group given MembershipId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.DeleteGroupMembership
            default: AWSIdentityStore.DeleteGroupMembership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                MembershipId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a GroupMembership in an identity store.
              required:
                - IdentityStoreId
                - MembershipId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupMembershipResponse"
  /DeleteUser:
    post:
      operationId: DeleteUser
      description: Deletes a user within an identity store given UserId.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.DeleteUser
            default: AWSIdentityStore.DeleteUser
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                UserId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a user in the identity store.
              required:
                - IdentityStoreId
                - UserId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserResponse"
  /DescribeGroup:
    post:
      operationId: DescribeGroup
      description: Retrieves the group metadata and attributes from GroupId in an identity store. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.DescribeGroup
            default: AWSIdentityStore.DescribeGroup
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store, such as d-1234567890. In this example, d- is a fixed prefix, and 1234567890 is a randomly generated string that contains numbers and lower case letters. This value is generated at the time that a new identity store is created.
                GroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a group in the identity store.
              required:
                - IdentityStoreId
                - GroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGroupResponse"
  /DescribeGroupMembership:
    post:
      operationId: DescribeGroupMembership
      description: Retrieves membership metadata and attributes from MembershipId in an identity store. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.DescribeGroupMembership
            default: AWSIdentityStore.DescribeGroupMembership
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                MembershipId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a GroupMembership in an identity store.
              required:
                - IdentityStoreId
                - MembershipId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGroupMembershipResponse"
  /DescribeUser:
    post:
      operationId: DescribeUser
      description: Retrieves the user metadata and attributes from the UserId in an identity store. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.DescribeUser
            default: AWSIdentityStore.DescribeUser
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store, such as d-1234567890. In this example, d- is a fixed prefix, and 1234567890 is a randomly generated string that contains numbers and lower case letters. This value is generated at the time that a new identity store is created.
                UserId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a user in the identity store.
                Extensions:
                  $ref: "#/components/schemas/ExtensionNames"
                  description: A collection of extension names indicating what extensions the service should retrieve alongside other user attributes. aws:identitystore:enterprise is the only supported extension name.
              required:
                - IdentityStoreId
                - UserId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeUserResponse"
  /GetGroupId:
    post:
      operationId: GetGroupId
      description: Retrieves GroupId in an identity store. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.GetGroupId
            default: AWSIdentityStore.GetGroupId
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                AlternateIdentifier:
                  $ref: "#/components/schemas/AlternateIdentifier"
                  description: A unique identifier for a user or group that is not the primary identifier. This value can be an identifier from an external identity provider (IdP) that is associated with the user, the group, or a unique attribute. For the unique attribute, the only valid path is displayName.
              required:
                - IdentityStoreId
                - AlternateIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupIdResponse"
  /GetGroupMembershipId:
    post:
      operationId: GetGroupMembershipId
      description: Retrieves the MembershipId in an identity store. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.GetGroupMembershipId
            default: AWSIdentityStore.GetGroupMembershipId
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                GroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a group in the identity store.
                MemberId:
                  $ref: "#/components/schemas/MemberId"
                  description: An object that contains the identifier of a group member. Setting the UserID field to the specific identifier for a user indicates that the user is a member of the group.
              required:
                - IdentityStoreId
                - GroupId
                - MemberId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupMembershipIdResponse"
  /GetUserId:
    post:
      operationId: GetUserId
      description: Retrieves the UserId in an identity store. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.GetUserId
            default: AWSIdentityStore.GetUserId
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                AlternateIdentifier:
                  $ref: "#/components/schemas/AlternateIdentifier"
                  description: A unique identifier for a user or group that is not the primary identifier. This value can be an identifier from an external identity provider (IdP) that is associated with the user, the group, or a unique attribute. For the unique attribute, the only valid paths are userName and emails.value.
              required:
                - IdentityStoreId
                - AlternateIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserIdResponse"
  /IsMemberInGroups:
    post:
      operationId: IsMemberInGroups
      description: Checks the user's membership in all requested groups and returns if the member exists in all queried groups. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.IsMemberInGroups
            default: AWSIdentityStore.IsMemberInGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                MemberId:
                  $ref: "#/components/schemas/MemberId"
                  description: An object containing the identifier of a group member.
                GroupIds:
                  $ref: "#/components/schemas/GroupIds"
                  description: A list of identifiers for groups in the identity store.
              required:
                - IdentityStoreId
                - MemberId
                - GroupIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IsMemberInGroupsResponse"
  /ListGroupMemberships:
    post:
      operationId: ListGroupMemberships
      description: For the specified group in the specified identity store, returns the list of all GroupMembership objects and returns results in paginated form. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.ListGroupMemberships
            default: AWSIdentityStore.ListGroupMemberships
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                GroupId:
                  $ref: "#/components/schemas/ResourceId"
                  description: The identifier for a group in the identity store.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to be returned per request. This parameter is used in all List requests to specify how many results to return in one page.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token used for the ListUsers, ListGroups and ListGroupMemberships API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
              required:
                - IdentityStoreId
                - GroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupMembershipsResponse"
  /ListGroupMembershipsForMember:
    post:
      operationId: ListGroupMembershipsForMember
      description: For the specified member in the specified identity store, returns the list of all GroupMembership objects and returns results in paginated form. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.ListGroupMembershipsForMember
            default: AWSIdentityStore.ListGroupMembershipsForMember
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store.
                MemberId:
                  $ref: "#/components/schemas/MemberId"
                  description: An object that contains the identifier of a group member. Setting the UserID field to the specific identifier for a user indicates that the user is a member of the group.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to be returned per request. This parameter is used in the ListUsers and ListGroups requests to specify how many results to return in one page. The length limit is 50 characters.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token used for the ListUsers, ListGroups, and ListGroupMemberships API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
              required:
                - IdentityStoreId
                - MemberId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupMembershipsForMemberResponse"
  /ListGroups:
    post:
      operationId: ListGroups
      description: Lists all groups in the identity store. Returns a paginated list of complete Group objects. Filtering for a Group by the DisplayName attribute is deprecated. Instead, use the GetGroupId API action. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.ListGroups
            default: AWSIdentityStore.ListGroups
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store, such as d-1234567890. In this example, d- is a fixed prefix, and 1234567890 is a randomly generated string that contains numbers and lower case letters. This value is generated at the time that a new identity store is created.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to be returned per request. This parameter is used in the ListUsers and ListGroups requests to specify how many results to return in one page. The length limit is 50 characters.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token used for the ListUsers and ListGroups API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
                Filters:
                  $ref: "#/components/schemas/Filters"
                  description: A list of Filter objects, which is used in the ListUsers and ListGroups requests.
              required:
                - IdentityStoreId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsResponse"
  /ListUsers:
    post:
      operationId: ListUsers
      description: Lists all users in the identity store. Returns a paginated list of complete User objects. Filtering for a User by the UserName attribute is deprecated. Instead, use the GetUserId API action. If you have access to a member account, you can use this API operation from the member account. For more information, see Limiting access to the identity store from member accounts in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSIdentityStore.ListUsers
            default: AWSIdentityStore.ListUsers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                IdentityStoreId:
                  $ref: "#/components/schemas/IdentityStoreId"
                  description: The globally unique identifier for the identity store, such as d-1234567890. In this example, d- is a fixed prefix, and 1234567890 is a randomly generated string that contains numbers and lower case letters. This value is generated at the time that a new identity store is created.
                Extensions:
                  $ref: "#/components/schemas/ExtensionNames"
                  description: A collection of extension names indicating what extensions the service should retrieve alongside other user attributes. aws:identitystore:enterprise is the only supported extension name.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to be returned per request. This parameter is used in the ListUsers and ListGroups requests to specify how many results to return in one page. The length limit is 50 characters.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The pagination token used for the ListUsers and ListGroups API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
                Filters:
                  $ref: "#/components/schemas/Filters"
                  description: A list of Filter objects, which is used in the ListUsers and ListGroups requests.
              required:
