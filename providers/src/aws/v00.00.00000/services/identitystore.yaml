components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    IdentityStoreId:
      type: string
      minLength: 1
      maxLength: 36
      pattern: d-[0-9a-f]{10}$|^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
    GroupDisplayName:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\t\\n\\r  ]+"
    SensitiveStringType:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\t\\n\\r  　]+"
    CreateGroupResponse:
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier of the newly created group in the identity store.
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
      required:
        - GroupId
        - IdentityStoreId
    ResourceId:
      type: string
      minLength: 1
      maxLength: 47
      pattern: ([0-9a-f]{10}-|)[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}
    MemberId:
      description: An object containing the identifier of a group member.
      type: object
      properties:
        UserId:
          $ref: "#/components/schemas/ResourceId"
          description: An object containing the identifiers of resources that can be members.
    CreateGroupMembershipResponse:
      type: object
      properties:
        MembershipId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a newly created GroupMembership in an identity store.
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
      required:
        - MembershipId
        - IdentityStoreId
    UserName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    Name:
      description: The full name of the user.
      type: object
      properties:
        Formatted:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing a formatted version of the name for display.
        FamilyName:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The family name of the user.
        GivenName:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The given name of the user.
        MiddleName:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The middle name of the user.
        HonorificPrefix:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The honorific prefix of the user. For example, "Dr."
        HonorificSuffix:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The honorific suffix of the user. For example, "M.D."
    Emails:
      type: array
      items:
        $ref: "#/components/schemas/Email"
    Email:
      description: The email address associated with the user.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing an email address. For example, "johndoe@amazon.com."
        Type:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string representing the type of address. For example, "Work."
        Primary:
          $ref: "#/components/schemas/BooleanType"
          description: A Boolean value representing whether this is the primary email address for the associated resource.
    BooleanType:
      type: boolean
    Addresses:
      type: array
      items:
        $ref: "#/components/schemas/Address"
    Address:
      description: The address associated with the specified user.
      type: object
      properties:
        StreetAddress:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The street of the address.
        Locality:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string of the address locality.
        Region:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The region of the address.
        PostalCode:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The postal code of the address.
        Country:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The country of the address.
        Formatted:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing a formatted version of the address for display.
        Type:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string representing the type of address. For example, "Home."
        Primary:
          $ref: "#/components/schemas/BooleanType"
          description: A Boolean value representing whether this is the primary address for the associated resource.
    PhoneNumbers:
      type: array
      items:
        $ref: "#/components/schemas/PhoneNumber"
    PhoneNumber:
      description: The phone number associated with the user.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing a phone number. For example, "8675309" or "+1 (800) 123-4567".
        Type:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string representing the type of a phone number. For example, "Mobile."
        Primary:
          $ref: "#/components/schemas/BooleanType"
          description: A Boolean value representing whether this is the primary phone number for the associated resource.
    Photos:
      type: array
      items:
        $ref: "#/components/schemas/Photo"
    Photo:
      description: Contains information about a user's photo. Users can have up to 3 photos, with one designated as primary. Supports common image formats, including jpg, jpeg, png, and gif.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The photo data or URL. Supported formats include jpg, jpeg, png, and gif. This field is required for all photo entries.
        Type:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The type of photo. This field is optional and can be used to categorize different types of photos.
        Display:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A human-readable description of the photo for display purposes. This optional field provides context about the photo.
        Primary:
          $ref: "#/components/schemas/BooleanType"
          description: Specifies whether this is the user's primary photo. Default value is false. Only one photo can be designated as primary per user.
      required:
        - Value
    Roles:
      type: array
      items:
        $ref: "#/components/schemas/Role"
    Role:
      description: The role associated with the user.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing a role name. For example, "Researcher."
        Type:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string representing the type of role. For example, "Work."
        Primary:
          $ref: "#/components/schemas/BooleanType"
          description: A Boolean value representing whether this is the primary role for the associated resource.
    Extensions:
      type: object
      properties: {}
    CreateUserResponse:
      type: object
      properties:
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
        UserId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier of the newly created user in the identity store.
      required:
        - IdentityStoreId
        - UserId
    DeleteGroupResponse:
      type: object
    DeleteGroupMembershipResponse:
      type: object
    DeleteUserResponse:
      type: object
    DescribeGroupResponse:
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a group in the identity store.
        DisplayName:
          $ref: "#/components/schemas/GroupDisplayName"
          description: The group’s display name value. The length limit is 1,024 characters. This value can consist of letters, accented characters, symbols, numbers, punctuation, tab, new line, carriage return, space, and nonbreaking space in this attribute. This value is specified at the time that the group is created and stored as an attribute of the group object in the identity store.
        ExternalIds:
          $ref: "#/components/schemas/ExternalIds"
          description: A list of ExternalId objects that contains the identifiers issued to this resource by an external identity provider.
        Description:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing a description of the group.
        CreatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the group was created.
        UpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the group was last updated.
        CreatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that created the group.
        UpdatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that last updated the group.
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
      required:
        - GroupId
        - IdentityStoreId
    ExternalIds:
      type: array
      items:
        $ref: "#/components/schemas/ExternalId"
    ExternalId:
      description: The identifier issued to this resource by an external identity provider.
      type: object
      properties:
        Issuer:
          $ref: "#/components/schemas/ExternalIdIssuer"
          description: The issuer for an external identifier.
        Id:
          $ref: "#/components/schemas/ExternalIdIdentifier"
          description: The identifier issued to this resource by an external identity provider.
      required:
        - Issuer
        - Id
    ExternalIdIssuer:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    ExternalIdIdentifier:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
    DateType:
      type: string
      format: date-time
    StringType:
      type: string
    DescribeGroupMembershipResponse:
      type: object
      properties:
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
        MembershipId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a GroupMembership in an identity store.
        GroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a group in the identity store.
        MemberId:
          $ref: "#/components/schemas/MemberId"
        CreatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the group membership was created.
        UpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the group membership was last updated.
        CreatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that created the group membership.
        UpdatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that last updated the group membership.
      required:
        - IdentityStoreId
        - MembershipId
        - GroupId
        - MemberId
    ExtensionNames:
      type: array
      items:
        $ref: "#/components/schemas/ExtensionName"
    ExtensionName:
      type: string
      minLength: 1
      maxLength: 50
      pattern: aws:identitystore:[a-z]{1,20}
    DescribeUserResponse:
      type: object
      properties:
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
        UserId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a user in the identity store.
        UserName:
          $ref: "#/components/schemas/UserName"
          description: A unique string used to identify the user. The length limit is 128 characters. This value can consist of letters, accented characters, symbols, numbers, and punctuation. This value is specified at the time the user is created and stored as an attribute of the user object in the identity store.
        ExternalIds:
          $ref: "#/components/schemas/ExternalIds"
          description: A list of ExternalId objects that contains the identifiers issued to this resource by an external identity provider.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the user.
        DisplayName:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The display name of the user.
        NickName:
          $ref: "#/components/schemas/SensitiveStringType"
          description: An alternative descriptive name for the user.
        ProfileUrl:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A URL link for the user's profile.
        Emails:
          $ref: "#/components/schemas/Emails"
          description: The email address of the user.
        Addresses:
          $ref: "#/components/schemas/Addresses"
          description: The physical address of the user.
        PhoneNumbers:
          $ref: "#/components/schemas/PhoneNumbers"
          description: A list of PhoneNumber objects associated with a user.
        UserType:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string indicating the type of user.
        Title:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing the title of the user.
        PreferredLanguage:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The preferred language of the user.
        Locale:
          $ref: "#/components/schemas/SensitiveStringType"
          description: A string containing the geographical region or location of the user.
        Timezone:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The time zone for a user.
        UserStatus:
          $ref: "#/components/schemas/UserStatus"
          description: The current status of the user account.
        Photos:
          $ref: "#/components/schemas/Photos"
          description: A list of photos associated with the user. Returns up to 3 photos with their associated metadata including type, display name, and primary designation.
        Website:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The user's personal website or blog URL. Returns the stored website information for the user.
        Birthdate:
          $ref: "#/components/schemas/SensitiveStringType"
          description: The user's birthdate in YYYY-MM-DD format. This field returns the stored birthdate information for the user.
        Roles:
          $ref: "#/components/schemas/Roles"
          description: The roles of the user.
        CreatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the user was created.
        CreatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that created the user.
        UpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the user was last updated.
        UpdatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that last updated the user.
        Extensions:
          type: object
          properties: {}
          description: A map of explicitly requested attribute extensions associated with the user. Not populated if the user has no requested extensions.
      required:
        - IdentityStoreId
        - UserId
    UserStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AlternateIdentifier:
      description: A unique identifier for a user or group that is not the primary identifier. This value can be an identifier from an external identity provider (IdP) that is associated with the user, the group, or a unique attribute.
      type: object
      properties:
        ExternalId:
          $ref: "#/components/schemas/ExternalId"
          description: The identifier issued to this resource by an external identity provider.
        UniqueAttribute:
          $ref: "#/components/schemas/UniqueAttribute"
          description: An entity attribute that's unique to a specific entity.
    UniqueAttribute:
      description: An entity attribute that's unique to a specific entity.
      type: object
      properties:
        AttributePath:
          $ref: "#/components/schemas/AttributePath"
          description: A string representation of the path to a given attribute or sub-attribute. Supports JMESPath.
        AttributeValue:
          $ref: "#/components/schemas/AttributeValue"
          description: The value of the attribute. This is a Document type. This type is not supported by Java V1, Go V1, and older versions of the CLI.
      required:
        - AttributePath
        - AttributeValue
    AttributePath:
      type: string
      minLength: 1
      maxLength: 255
      pattern: (?:\p{L}+:\p{L}+:\p{L}+(?:\.\p{L}+){0,3}|\p{L}+(?:\.\p{L}+){0,2})
    AttributeValue:
      description: The value of the attribute. This is a Document type. This type is not supported by Java V1, Go V1, and older versions of the CLI.
      type: object
    GetGroupIdResponse:
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a group in the identity store.
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
      required:
        - GroupId
        - IdentityStoreId
    GetGroupMembershipIdResponse:
      type: object
      properties:
        MembershipId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a GroupMembership in an identity store.
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
      required:
        - MembershipId
        - IdentityStoreId
    GetUserIdResponse:
      type: object
      properties:
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
        UserId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a user in the identity store.
      required:
        - IdentityStoreId
        - UserId
    GroupIds:
      type: array
      items:
        $ref: "#/components/schemas/ResourceId"
    IsMemberInGroupsResponse:
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/GroupMembershipExistenceResults"
          description: A list containing the results of membership existence checks.
      required:
        - Results
    GroupMembershipExistenceResults:
      type: array
      items:
        $ref: "#/components/schemas/GroupMembershipExistenceResult"
    GroupMembershipExistenceResult:
      description: Indicates whether a resource is a member of a group in the identity store.
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a group in the identity store.
        MemberId:
          $ref: "#/components/schemas/MemberId"
          description: An object that contains the identifier of a group member. Setting the UserID field to the specific identifier for a user indicates that the user is a member of the group.
        MembershipExists:
          $ref: "#/components/schemas/BooleanType"
          description: Indicates whether a membership relation exists or not.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    NextToken:
      type: string
      minLength: 1
      maxLength: 65535
      pattern: "[-a-zA-Z0-9+=/:_]*"
    ListGroupMembershipsResponse:
      type: object
      properties:
        GroupMemberships:
          $ref: "#/components/schemas/GroupMemberships"
          description: A list of GroupMembership objects in the group.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token used for the ListUsers, ListGroups, and ListGroupMemberships API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
      required:
        - GroupMemberships
    GroupMemberships:
      type: array
      items:
        $ref: "#/components/schemas/GroupMembership"
    GroupMembership:
      description: Contains the identifiers for a group, a group member, and a GroupMembership object in the identity store.
      type: object
      properties:
        IdentityStoreId:
          $ref: "#/components/schemas/IdentityStoreId"
          description: The globally unique identifier for the identity store.
        MembershipId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a GroupMembership object in an identity store.
        GroupId:
          $ref: "#/components/schemas/ResourceId"
          description: The identifier for a group in the identity store.
        MemberId:
          $ref: "#/components/schemas/MemberId"
          description: An object that contains the identifier of a group member. Setting the UserID field to the specific identifier for a user indicates that the user is a member of the group.
        CreatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the group membership was created.
        UpdatedAt:
          $ref: "#/components/schemas/DateType"
          description: The date and time the group membership was last updated.
        CreatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that created the group membership.
        UpdatedBy:
          $ref: "#/components/schemas/StringType"
          description: The identifier of the user or system that last updated the group membership.
      required:
        - IdentityStoreId
    ListGroupMembershipsForMemberResponse:
      type: object
      properties:
        GroupMemberships:
          $ref: "#/components/schemas/GroupMemberships"
          description: A list of GroupMembership objects in the group for a specified member.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token used for the ListUsers, ListGroups, and ListGroupMemberships API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
      required:
        - GroupMemberships
    Filters:
      type: array
      items:
        $ref: "#/components/schemas/Filter"
    Filter:
      description: A query filter used by ListUsers and ListGroups. This filter object provides the attribute name and attribute value to search users or groups.
      type: object
      properties:
        AttributePath:
          $ref: "#/components/schemas/AttributePath"
          description: The attribute path that is used to specify which attribute name to search. Length limit is 255 characters. For example, UserName is a valid attribute path for the ListUsers API, and DisplayName is a valid attribute path for the ListGroups API.
        AttributeValue:
          $ref: "#/components/schemas/SensitiveStringType"
          description: Represents the data for an attribute. Each attribute value is described as a name-value pair.
      required:
        - AttributePath
        - AttributeValue
    ListGroupsResponse:
      type: object
      properties:
        Groups:
          $ref: "#/components/schemas/Groups"
          description: A list of Group objects in the identity store.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: The pagination token used for the ListUsers and ListGroups API operations. This value is generated by the identity store service. It is returned in the API response if the total results are more than the size of one page. This token is also returned when it is used in the API request to search for the next page.
      required:
        - Groups
    Groups:
      type: array
      items:
        $ref: "#/components/schemas/Group"
    Group:
      description: A group object that contains the metadata and attributes for a specified group.
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/ResourceId"
