openapi: 3.0.0
info:
  version: "2020-11-22"
  title: AWS IoT Wireless
  description: AWS IoT Wireless
  x-serviceName: iotwireless
  x-serviceAlias: iotwireless
  x-protocol: rest-json
  x-apiVersion: "2020-11-22"
  x-endpointPrefix: api.iotwireless
servers:
  - url: https://api.iotwireless.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotwireless
paths:
  /partner-accounts:
    post:
      operationId: AssociateAwsAccountWithPartnerAccount
      description: Associates a partner account with your AWS account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Sidewalk:
                  $ref: "#/components/schemas/SidewalkAccountInfo"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAwsAccountWithPartnerAccountResponse"
    get:
      operationId: ListPartnerAccounts
      description: Lists the partner accounts associated with your AWS account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPartnerAccountsResponse"
  /fuota-tasks/{id}/multicast-group:
    put:
      operationId: AssociateMulticastGroupWithFuotaTask
      description: Associate a multicast group with a FUOTA task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FuotaTaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MulticastGroupId:
                  $ref: "#/components/schemas/MulticastGroupId"
              required:
                - MulticastGroupId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateMulticastGroupWithFuotaTaskResponse"
  /fuota-tasks/{id}/wireless-device:
    put:
      operationId: AssociateWirelessDeviceWithFuotaTask
      description: Associate a wireless device with a FUOTA task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/FuotaTaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                WirelessDeviceId:
                  $ref: "#/components/schemas/WirelessDeviceId"
              required:
                - WirelessDeviceId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWirelessDeviceWithFuotaTaskResponse"
  /multicast-groups/{id}/wireless-device:
    put:
      operationId: AssociateWirelessDeviceWithMulticastGroup
      description: Associates a wireless device with a multicast group.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MulticastGroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                WirelessDeviceId:
                  $ref: "#/components/schemas/WirelessDeviceId"
              required:
                - WirelessDeviceId
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWirelessDeviceWithMulticastGroupResponse"
  /wireless-devices/{id}/thing:
    put:
      operationId: AssociateWirelessDeviceWithThing
      description: Associates a wireless device with a thing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessDeviceId"
          description: The ID of the resource to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ThingArn:
                  $ref: "#/components/schemas/ThingArn"
              required:
                - ThingArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWirelessDeviceWithThingResponse"
    delete:
      operationId: DisassociateWirelessDeviceFromThing
      description: Disassociates a wireless device from its currently associated thing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessDeviceId"
          description: The ID of the resource to update.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateWirelessDeviceFromThingResponse"
  /wireless-gateways/{id}/certificate:
    put:
      operationId: AssociateWirelessGatewayWithCertificate
      description: Associates a wireless gateway with a certificate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IotCertificateId:
                  $ref: "#/components/schemas/IotCertificateId"
              required:
                - IotCertificateId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWirelessGatewayWithCertificateResponse"
    delete:
      operationId: DisassociateWirelessGatewayFromCertificate
      description: Disassociates a wireless gateway from its currently associated certificate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to update.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateWirelessGatewayFromCertificateResponse"
    get:
      operationId: GetWirelessGatewayCertificate
      description: Gets the ID of the certificate that is currently associated with a wireless gateway.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWirelessGatewayCertificateResponse"
  /wireless-gateways/{id}/thing:
    put:
      operationId: AssociateWirelessGatewayWithThing
      description: Associates a wireless gateway with a thing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ThingArn:
                  $ref: "#/components/schemas/ThingArn"
              required:
                - ThingArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateWirelessGatewayWithThingResponse"
    delete:
      operationId: DisassociateWirelessGatewayFromThing
      description: Disassociates a wireless gateway from its currently associated thing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to update.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateWirelessGatewayFromThingResponse"
  /multicast-groups/{id}/session:
    delete:
      operationId: CancelMulticastGroupSession
      description: Cancels an existing multicast group session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MulticastGroupId"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMulticastGroupSessionResponse"
    get:
      operationId: GetMulticastGroupSession
      description: Gets information about a multicast group session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MulticastGroupId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMulticastGroupSessionResponse"
    put:
      operationId: StartMulticastGroupSession
      description: Starts a multicast group session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MulticastGroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANMulticastSession"
              required:
                - LoRaWAN
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMulticastGroupSessionResponse"
  /destinations:
    post:
      operationId: CreateDestination
      description: Creates a new destination that maps a device message to an AWS IoT rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DestinationName"
                ExpressionType:
                  $ref: "#/components/schemas/ExpressionType"
                Expression:
                  $ref: "#/components/schemas/Expression"
                Description:
                  $ref: "#/components/schemas/Description"
                RoleArn:
                  $ref: "#/components/schemas/RoleArn"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - ExpressionType
                - RoleArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDestinationResponse"
    get:
      operationId: ListDestinations
      description: Lists the destinations registered to your AWS account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this operation.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDestinationsResponse"
  /device-profiles:
    post:
      operationId: CreateDeviceProfile
      description: Creates a new device profile.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/DeviceProfileName"
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANDeviceProfile"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                Sidewalk:
                  $ref: "#/components/schemas/SidewalkCreateDeviceProfile"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeviceProfileResponse"
    get:
      operationId: ListDeviceProfiles
      description: Lists the device profiles registered to your AWS account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this operation.
        - name: deviceProfileType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceProfileType"
          description: A filter to list only device profiles that use this type, which can be LoRaWAN or Sidewalk.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeviceProfilesResponse"
  /fuota-tasks:
    post:
      operationId: CreateFuotaTask
      description: Creates a FUOTA task.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FuotaTaskName"
                Description:
                  $ref: "#/components/schemas/Description"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANFuotaTask"
                FirmwareUpdateImage:
                  $ref: "#/components/schemas/FirmwareUpdateImage"
                FirmwareUpdateRole:
                  $ref: "#/components/schemas/FirmwareUpdateRole"
                Tags:
                  $ref: "#/components/schemas/TagList"
                RedundancyPercent:
                  $ref: "#/components/schemas/RedundancyPercent"
                FragmentSizeBytes:
                  $ref: "#/components/schemas/FragmentSizeBytes"
                FragmentIntervalMS:
                  $ref: "#/components/schemas/FragmentIntervalMS"
                Descriptor:
                  $ref: "#/components/schemas/FileDescriptor"
              required:
                - FirmwareUpdateImage
                - FirmwareUpdateRole
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFuotaTaskResponse"
    get:
      operationId: ListFuotaTasks
      description: Lists the FUOTA tasks registered to your AWS account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFuotaTasksResponse"
  /multicast-groups:
    post:
      operationId: CreateMulticastGroup
      description: Creates a multicast group.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/MulticastGroupName"
                Description:
                  $ref: "#/components/schemas/Description"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANMulticast"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - LoRaWAN
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMulticastGroupResponse"
    get:
      operationId: ListMulticastGroups
      description: Lists the multicast groups registered to your AWS account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMulticastGroupsResponse"
  /network-analyzer-configurations:
    post:
      operationId: CreateNetworkAnalyzerConfiguration
      description: Creates a new network analyzer configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NetworkAnalyzerConfigurationName"
                TraceContent:
                  $ref: "#/components/schemas/TraceContent"
                WirelessDevices:
                  $ref: "#/components/schemas/WirelessDeviceList"
                WirelessGateways:
                  $ref: "#/components/schemas/WirelessGatewayList"
                Description:
                  $ref: "#/components/schemas/Description"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                MulticastGroups:
                  $ref: "#/components/schemas/NetworkAnalyzerMulticastGroupList"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateNetworkAnalyzerConfigurationResponse"
    get:
      operationId: ListNetworkAnalyzerConfigurations
      description: Lists the network analyzer configurations.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNetworkAnalyzerConfigurationsResponse"
  /service-profiles:
    post:
      operationId: CreateServiceProfile
      description: Creates a new service profile.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ServiceProfileName"
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANServiceProfile"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceProfileResponse"
    get:
      operationId: ListServiceProfiles
      description: Lists the service profiles registered to your AWS account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServiceProfilesResponse"
  /wireless-devices:
    post:
      operationId: CreateWirelessDevice
      description: Provisions a wireless device.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Type:
                  $ref: "#/components/schemas/WirelessDeviceType"
                Name:
                  $ref: "#/components/schemas/WirelessDeviceName"
                Description:
                  $ref: "#/components/schemas/Description"
                DestinationName:
                  $ref: "#/components/schemas/DestinationName"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANDevice"
                Tags:
                  $ref: "#/components/schemas/TagList"
                Positioning:
                  $ref: "#/components/schemas/PositioningConfigStatus"
                Sidewalk:
                  $ref: "#/components/schemas/SidewalkCreateWirelessDevice"
              required:
                - DestinationName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWirelessDeviceResponse"
    get:
      operationId: ListWirelessDevices
      description: Lists the wireless devices registered to your AWS account.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this operation.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: destinationName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DestinationName"
          description: A filter to list only the wireless devices that use as uplink destination.
        - name: deviceProfileId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceProfileId"
          description: A filter to list only the wireless devices that use this device profile.
        - name: serviceProfileId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ServiceProfileId"
          description: A filter to list only the wireless devices that use this service profile.
        - name: wirelessDeviceType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WirelessDeviceType"
          description: A filter to list only the wireless devices that use this wireless device type.
        - name: fuotaTaskId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/FuotaTaskId"
        - name: multicastGroupId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MulticastGroupId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWirelessDevicesResponse"
  /wireless-gateways:
    post:
      operationId: CreateWirelessGateway
      description: Provisions a wireless gateway. When provisioning a wireless gateway, you might run into duplication errors for the following reasons. If you specify a GatewayEui value that already exists. If you used a ClientRequestToken with the same parameters within the last 10 minutes. To avoid this error, make sure that you use unique identifiers and parameters for each request within the specified time period.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/WirelessGatewayName"
                Description:
                  $ref: "#/components/schemas/Description"
                LoRaWAN:
                  $ref: "#/components/schemas/LoRaWANGateway"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
              required:
                - LoRaWAN
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWirelessGatewayResponse"
    get:
      operationId: ListWirelessGateways
      description: Lists the wireless gateways registered to your AWS account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: To retrieve the next set of results, the nextToken value from a previous response; otherwise null to receive the first set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in this operation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWirelessGatewaysResponse"
  /wireless-gateways/{id}/tasks:
    post:
      operationId: CreateWirelessGatewayTask
      description: Creates a task for a wireless gateway.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                WirelessGatewayTaskDefinitionId:
                  $ref: "#/components/schemas/WirelessGatewayTaskDefinitionId"
              required:
                - WirelessGatewayTaskDefinitionId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWirelessGatewayTaskResponse"
    delete:
      operationId: DeleteWirelessGatewayTask
      description: Deletes a wireless gateway task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to delete.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWirelessGatewayTaskResponse"
    get:
      operationId: GetWirelessGatewayTask
      description: Gets information about a wireless gateway task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/WirelessGatewayId"
          description: The ID of the resource to get.
      responses:
