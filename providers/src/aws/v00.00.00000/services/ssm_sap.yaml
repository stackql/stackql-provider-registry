openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Systems Manager for SAP
  description: AWS Systems Manager for SAP
  x-serviceName: ssm-sap
  x-serviceAlias: ssm_sap
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: ssm-sap
servers:
  - url: https://ssm-sap.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ssm-sap
paths:
  /delete-resource-permission:
    post:
      operationId: DeleteResourcePermission
      description: Removes permissions associated with the target database.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionType:
                  $ref: "#/components/schemas/PermissionActionType"
                SourceResourceArn:
                  $ref: "#/components/schemas/Arn"
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePermissionOutput"
  /deregister-application:
    post:
      operationId: DeregisterApplication
      description: Deregister an SAP application with AWS Systems Manager for SAP. This action does not aﬀect the existing setup of your SAP workloads on Amazon EC2.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterApplicationOutput"
  /get-application:
    post:
      operationId: GetApplication
      description: Gets an application registered with AWS Systems Manager for SAP. It also returns the components of the application.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ApplicationArn:
                  $ref: "#/components/schemas/SsmSapArn"
                AppRegistryArn:
                  $ref: "#/components/schemas/AppRegistryArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationOutput"
  /get-component:
    post:
      operationId: GetComponent
      description: Gets the component of an application registered with AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ComponentId:
                  $ref: "#/components/schemas/ComponentId"
              required:
                - ApplicationId
                - ComponentId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetComponentOutput"
  /get-configuration-check-operation:
    post:
      operationId: GetConfigurationCheckOperation
      description: Gets the details of a configuration check operation by specifying the operation ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OperationId:
                  $ref: "#/components/schemas/OperationId"
              required:
                - OperationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationCheckOperationOutput"
  /get-database:
    post:
      operationId: GetDatabase
      description: Gets the SAP HANA database of an application registered with AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ComponentId:
                  $ref: "#/components/schemas/ComponentId"
                DatabaseId:
                  $ref: "#/components/schemas/DatabaseId"
                DatabaseArn:
                  $ref: "#/components/schemas/SsmSapArn"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDatabaseOutput"
  /get-operation:
    post:
      operationId: GetOperation
      description: Gets the details of an operation by specifying the operation ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OperationId:
                  $ref: "#/components/schemas/OperationId"
              required:
                - OperationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOperationOutput"
  /get-resource-permission:
    post:
      operationId: GetResourcePermission
      description: Gets permissions associated with the target database.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionType:
                  $ref: "#/components/schemas/PermissionActionType"
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePermissionOutput"
  /list-applications:
    post:
      operationId: ListApplications
      description: Lists all the applications registered with AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                Filters:
                  $ref: "#/components/schemas/FilterList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsOutput"
  /list-components:
    post:
      operationId: ListComponents
      description: Lists all the components registered with AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsOutput"
  /list-configuration-check-definitions:
    post:
      operationId: ListConfigurationCheckDefinitions
      description: Lists all configuration check types supported by AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationCheckDefinitionsOutput"
  /list-configuration-check-operations:
    post:
      operationId: ListConfigurationCheckOperations
      description: Lists the configuration check operations performed by AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ListMode:
                  $ref: "#/components/schemas/ConfigurationCheckOperationListingMode"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Filters:
                  $ref: "#/components/schemas/FilterList"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConfigurationCheckOperationsOutput"
  /list-databases:
    post:
      operationId: ListDatabases
      description: Lists the SAP HANA databases of an application registered with AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ComponentId:
                  $ref: "#/components/schemas/ComponentId"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatabasesOutput"
  /list-operation-events:
    post:
      operationId: ListOperationEvents
      description: Returns a list of operations events. Available parameters include OperationID, as well as optional parameters MaxResults, NextToken, and Filters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OperationId:
                  $ref: "#/components/schemas/OperationId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Filters:
                  $ref: "#/components/schemas/FilterList"
              required:
                - OperationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOperationEventsOutput"
  /list-operations:
    post:
      operationId: ListOperations
      description: Lists the operations performed by AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                Filters:
                  $ref: "#/components/schemas/FilterList"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOperationsOutput"
  /list-sub-check-results:
    post:
      operationId: ListSubCheckResults
      description: Lists the sub-check results of a specified configuration check operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OperationId:
                  $ref: "#/components/schemas/OperationId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - OperationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubCheckResultsOutput"
  /list-sub-check-rule-results:
    post:
      operationId: ListSubCheckRuleResults
      description: Lists the rules of a specified sub-check belonging to a configuration check operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SubCheckResultId:
                  $ref: "#/components/schemas/SubCheckResultId"
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                NextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - SubCheckResultId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubCheckRuleResultsOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists all tags on an SAP HANA application and/or database registered with AWS Systems Manager for SAP.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SsmSapArn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Creates tag for a resource by specifying the ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SsmSapArn"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Delete the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SsmSapArn"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Adds/updates or removes credentials for applications registered with AWS Systems Manager for SAP.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /put-resource-permission:
    post:
      operationId: PutResourcePermission
      description: Adds permissions to the target database.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ActionType:
                  $ref: "#/components/schemas/PermissionActionType"
                SourceResourceArn:
                  $ref: "#/components/schemas/Arn"
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - ActionType
                - SourceResourceArn
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePermissionOutput"
  /register-application:
    post:
      operationId: RegisterApplication
      description: Register an SAP application with AWS Systems Manager for SAP. You must meet the following requirements before registering. The SAP application you want to register with AWS Systems Manager for SAP is running on Amazon EC2. AWS Systems Manager Agent must be setup on an Amazon EC2 instance along with the required IAM permissions. Amazon EC2 instance(s) must have access to the secrets created in AWS Secrets Manager to manage SAP applications and components.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ApplicationType:
                  $ref: "#/components/schemas/ApplicationType"
                Instances:
                  $ref: "#/components/schemas/InstanceList"
                SapInstanceNumber:
                  $ref: "#/components/schemas/SAPInstanceNumber"
                Sid:
                  $ref: "#/components/schemas/SID"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Credentials:
                  $ref: "#/components/schemas/ApplicationCredentialList"
                DatabaseArn:
                  $ref: "#/components/schemas/SsmSapArn"
                ComponentsInfo:
                  $ref: "#/components/schemas/ComponentInfoList"
              required:
                - ApplicationId
                - ApplicationType
                - Instances
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterApplicationOutput"
  /start-application:
    post:
      operationId: StartApplication
      description: Request is an operation which starts an application. Parameter ApplicationId is required.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartApplicationOutput"
  /start-application-refresh:
    post:
      operationId: StartApplicationRefresh
      description: Refreshes a registered application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartApplicationRefreshOutput"
  /start-configuration-checks:
    post:
      operationId: StartConfigurationChecks
      description: Initiates configuration check operations against a specified application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                ConfigurationCheckIds:
                  $ref: "#/components/schemas/ConfigurationCheckTypeList"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartConfigurationChecksOutput"
  /stop-application:
    post:
      operationId: StopApplication
      description: Request is an operation to stop an application. Parameter ApplicationId is required. Parameters StopConnectedEntity and IncludeEc2InstanceShutdown are optional.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                StopConnectedEntity:
                  $ref: "#/components/schemas/ConnectedEntityType"
                IncludeEc2InstanceShutdown:
                  $ref: "#/components/schemas/Boolean"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopApplicationOutput"
  /update-application-settings:
    post:
      operationId: UpdateApplicationSettings
      description: Updates the settings of an application registered with AWS Systems Manager for SAP.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ApplicationId:
                  $ref: "#/components/schemas/ApplicationId"
                CredentialsToAddOrUpdate:
                  $ref: "#/components/schemas/ApplicationCredentialList"
                CredentialsToRemove:
                  $ref: "#/components/schemas/ApplicationCredentialList"
                Backint:
                  $ref: "#/components/schemas/BackintConfig"
                DatabaseArn:
                  $ref: "#/components/schemas/SsmSapArn"
              required:
                - ApplicationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationSettingsOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    PermissionActionType:
      type: string
      enum:
        - RESTORE
    Arn:
      type: string
      pattern: arn:(.+:){2,4}.+$|^arn:(.+:){1,3}.+\/.+
    DeleteResourcePermissionOutput:
      type: object
      properties:
        Policy:
          $ref: "#/components/schemas/String"
          description: The policy that removes permissions on the target database.
    String:
      type: string
    ApplicationId:
      type: string
      minLength: 1
      maxLength: 60
      pattern: "[\\w\\d\\.-]+"
    DeregisterApplicationOutput:
      type: object
    SsmSapArn:
      type: string
      pattern: arn:(.+:){2,4}.+$|^arn:(.+:){1,3}.+\/.+
    AppRegistryArn:
      type: string
      pattern: arn:aws:servicecatalog:[a-z0-9:\/-]+
    GetApplicationOutput:
      type: object
      properties:
        Application:
          $ref: "#/components/schemas/Application"
          description: Returns all of the metadata of an application registered with AWS Systems Manager for SAP.
        Tags:
          type: object
          properties: {}
          description: The tags of a registered application.
    Application:
      description: An SAP application registered with AWS Systems Manager for SAP.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/ApplicationId"
          description: The ID of the application.
        Type:
          $ref: "#/components/schemas/ApplicationType"
          description: The type of the application.
        Arn:
          $ref: "#/components/schemas/SsmSapArn"
          description: The Amazon Resource Name (ARN) of the application.
        AppRegistryArn:
          $ref: "#/components/schemas/AppRegistryArn"
          description: The Amazon Resource Name (ARN) of the Application Registry.
        Status:
          $ref: "#/components/schemas/ApplicationStatus"
          description: The status of the application.
        DiscoveryStatus:
          $ref: "#/components/schemas/ApplicationDiscoveryStatus"
          description: The latest discovery result for the application.
        Components:
          $ref: "#/components/schemas/ComponentIdList"
          description: The components of the application.
        LastUpdated:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the application was last updated.
        StatusMessage:
          $ref: "#/components/schemas/String"
          description: The status message.
        AssociatedApplicationArns:
          $ref: "#/components/schemas/ApplicationArnList"
          description: The Amazon Resource Names of the associated AWS Systems Manager for SAP applications.
    ApplicationType:
      type: string
      enum:
        - HANA
        - SAP_ABAP
    ApplicationStatus:
      type: string
      enum:
        - ACTIVATED
        - STARTING
        - STOPPED
        - STOPPING
        - FAILED
        - REGISTERING
        - DELETING
        - UNKNOWN
    ApplicationDiscoveryStatus:
      type: string
      enum:
        - SUCCESS
        - REGISTRATION_FAILED
        - REFRESH_FAILED
        - REGISTERING
        - DELETING
    ComponentIdList:
      type: array
      items:
        $ref: "#/components/schemas/ComponentId"
    ComponentId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[\\w\\d-]+"
    Timestamp:
      type: string
      format: date-time
    ApplicationArnList:
      type: array
      items:
        $ref: "#/components/schemas/SsmSapArn"
    GetComponentOutput:
      type: object
      properties:
        Component:
          $ref: "#/components/schemas/Component"
          description: The component of an application registered with AWS Systems Manager for SAP.
        Tags:
          type: object
          properties: {}
          description: The tags of a component.
    Component:
      description: The SAP component of your application.
      type: object
      properties:
        ComponentId:
          $ref: "#/components/schemas/ComponentId"
          description: The ID of the component.
        Sid:
          $ref: "#/components/schemas/SID"
          description: The SAP System Identifier of the application component.
        SystemNumber:
          $ref: "#/components/schemas/SAPInstanceNumber"
          description: The SAP system number of the application component.
        ParentComponent:
          $ref: "#/components/schemas/ComponentId"
          description: The parent component of a highly available environment. For example, in a highly available SAP on AWS workload, the parent component consists of the entire setup, including the child components.
        ChildComponents:
          $ref: "#/components/schemas/ComponentIdList"
          description: The child components of a highly available environment. For example, in a highly available SAP on AWS workload, the child component consists of the primary and secondar instances.
        ApplicationId:
          $ref: "#/components/schemas/ApplicationId"
          description: The ID of the application.
        ComponentType:
          $ref: "#/components/schemas/ComponentType"
          description: The type of the component.
        Status:
          $ref: "#/components/schemas/ComponentStatus"
          description: The status of the component. ACTIVATED - this status has been deprecated. STARTING - the component is in the process of being started. STOPPED - the component is not running. STOPPING - the component is in the process of being stopped. RUNNING - the component is running. RUNNING_WITH_ERROR - one or more child component(s) of the parent component is not running. Call GetComponent to review the status of each child component. UNDEFINED - AWS Systems Manager for SAP cannot provide the component status based on the discovered information. Verify your SAP application.
        SapHostname:
          $ref: "#/components/schemas/String"
          description: The hostname of the component.
        SapFeature:
          $ref: "#/components/schemas/String"
          description: The SAP feature of the component.
        SapKernelVersion:
          $ref: "#/components/schemas/String"
          description: The kernel version of the component.
        HdbVersion:
          $ref: "#/components/schemas/String"
          description: The SAP HANA version of the component.
        Resilience:
          $ref: "#/components/schemas/Resilience"
          description: Details of the SAP HANA system replication for the component.
        AssociatedHost:
          $ref: "#/components/schemas/AssociatedHost"
          description: The associated host of the component.
        Databases:
          $ref: "#/components/schemas/DatabaseIdList"
